    dust_mask_type:
      name: Tipo di maschera antipolvere
      description: Specifica il fattore di forma delle maschere antipolvere protettive,
        come coppa o piega piatta
    dvi_connection_type:
      name: Tipo di connessione DVI
      description: Identifica il connettore DVI specifico e il formato di collegamento
        supportato (ad es., DVI-D single-link, DVI-I dual-link, Mini-DVI)
    dye_form:
      name: Formato della tintura
      description: Descrive lo stato fisico dei coloranti artigianali, ad esempio
        gel o polvere
    dynamic_level:
      name: Livello dinamico
      description: Classifica le palline da racquetball e squash in base alla velocità
        e al rimbalzo, ad es. punto verde, punto rosso
    dynamics_processing_function:
      name: Funzione di elaborazione della dinamica
      description: Identifica le attività principali di dinamica che l'unità esegue
        (ad es., compressore, limiter, noise gate, de-esser)
    e_book_formats_supported:
      name: Formati e-book supportati
      description: Identifica la gamma di formati e-book compatibili con il dispositivo,
        ad esempio PDF o EPUB
    e_book_reader_part_location:
      name: Posizione della parte dell'e-reader
      description: Specifica dove sul dispositivo la parte è installata o posizionata
    e_cigarette/vaporizer_style:
      name: Stile della sigaretta elettronica/vaporizzatore
      description: Classifica le sigarette elettroniche e i vaporizzatori in base
        al fattore di forma, ad es. usa e getta, penna
    e_liquid_flavor:
      name: Sapore del liquido per sigaretta elettronica
      description: Specifica il gusto degli e-liquid per vaporizzatori e sigarette
        elettroniche, ad es. caffè, fragola
    e_liquid_variety:
      name: Varietà del liquido per sigaretta elettronica
      description: Distingue tra diverse opzioni di e-liquid, ad es. riempimento corto,
        shot di nicotina
    e_reader_display_technology:
      name: Tecnologia di visualizzazione dell'e-reader
      description: Identifica il tipo di tecnologia dello schermo utilizzata negli
        e-reader, ad esempio LCD o e-ink
    ear_care_application_method:
      name: Metodo di applicazione per la cura dell'orecchio
      description: Specifica il metodo di applicazione degli articoli per la cura
        dell'orecchio, ad esempio ugello o contagocce
    ear_dryer_technology:
      name: Tecnologia dell'asciugatore per orecchie
      description: Identifica il meccanismo di asciugatura principale utilizzato dal
        prodotto
    ear_orientation:
      name: Orientamento dell'orecchio
      description: Specifica se l'auricolare è progettato per l'orecchio sinistro,
        destro o può essere indossato su entrambi
    ear_pick_tip_style:
      name: Stile della punta del pulisci orecchie
      description: Definisce la forma o il design della punta di lavoro che rimuove
        il cerume
    ear_side:
      name: Lato dell'orecchio
      description: Specifica se l'ausilio è destinato all'orecchio sinistro, destro,
        o per l'uso come coppia bilaterale
    ear_tip_size:
      name: Taglia del gommino auricolare
      description: Fornisce l'etichetta di dimensione generica comunemente utilizzata
        per i gommini intrauricolari quando le dimensioni esatte in millimetri non
        sono fornite
    ear_tip_style:
      name: Stile del gommino auricolare
      description: Definisce la forma geometrica del gommino auricolare che influenza
        la vestibilità e la tenuta acustica
    earphone_features:
      name: Funzionalità degli auricolari
      description: Evidenzia le caratteristiche uniche degli auricolari, ad esempio
        microfono integrato o controllo del volume
    earplug_cord_style:
      name: Stile del cordino del tappo per le orecchie
      description: Indica se i tappi per le orecchie sono collegati con un cordino,
        che aiuta a prevenire la perdita e facilita la rimozione
    earplug_shape:
      name: Forma del tappo per le orecchie
      description: Descrive il profilo fisico del tappo per le orecchie, influenzando
        comfort e vestibilità all'interno di diversi canali auricolari
    earplug_type:
      name: Tipo di tappo per le orecchie
      description: Classifica lo stile di costruzione dei tappi per le orecchie dispensati
        (ad es., schiuma, modellato, filtrato)
    earplug_use:
      name: Utilizzo dei tappi per le orecchie
      description: Definisce l'attività o lo scopo specifico dei tappi per le orecchie,
        ad esempio nuotare o dormire
    earring_design:
      name: Disegno dell'orecchino
      description: Descrive lo stile o la struttura di un orecchino, ad esempio a
        cerchio o a perno
    edge_style:
      name: Stile del bordo
      description: Specifica la forma dei bordi su elementi come controsoffitti, ad
        es. a toro, smussati
    edge_type:
      name: Tipo di bordo
      description: Identifica lo stile del bordo su strumenti o utensili, ad esempio
        micro-seghettato o dentellato
    education_level:
      name: Livello scolastico
      description: Specifica la fase educativa in cui è progettato il software, ad
        esempio scuola elementare o scuola di specializzazione
    effects_processor_form_factor:
      name: Fattore di forma del processore di effetti
      description: Descrive il formato fisico o di consegna del processore
    egg_decorating_items_included:
      name: Articoli per la decorazione delle uova inclusi
      description: Specifica gli accessori forniti nei kit per decorare le uova, ad
        es. compresse coloranti, mestoli per uova
    egg_turning:
      name: Girare le uova
      description: Descrive il metodo di rotazione delle uova nelle incubatrici, come
        automatico o manuale
    electric_scooter_motor_type:
      name: Tipo di motore dello scooter elettrico
      description: Specifica il tipo e la configurazione dei motori degli scooter,
        come DC con spazzole o DC senza spazzole
    electrode_connector_type:
      name: Tipo di connettore dell'elettrodo
      description: Descrive l'interfaccia fisica utilizzata per collegare elettrodi
        o cuscinetti
    electronic_drum_components:
      name: Componenti per batteria elettronica
      description: Specifica gli elementi di una batteria elettronica, ad esempio
        modulo per batteria o pad per batteria
    electronic_game_genre:
      name: Genere di gioco elettronico
      description: Identifica la categoria di un gioco elettronico, ad esempio fitness
        o puzzle
    electrotherapy_modality:
      name: Modalità di elettroterapia
      description: Specifica i tipi di tecnologie di stimolazione che il dispositivo
        supporta (ad es., TENS, EMS, IFC)
    embellishment/trim_material:
      name: Materiale di abbellimento/rifinitura
      description: Identifica il materiale utilizzato per dettagli decorativi o finiture,
        come paillettes o perle
    embellishments:
      name: Decorazioni
      description: Identifica gli elementi decorativi aggiunti su un prodotto, come
        paillettes o bottoni
    embossing_project_type:
      name: Tipo di progetto di goffratura
      description: Identifica il tipo di progetto artigianale, ad esempio scrapbooking
        o creazione di gioielli
    embouchure_hole_shape:
      name: Forma del foro dell'imboccatura
      description: Descrive la forma del foro sulla testata del flauto, ad esempio
        rotondo o ovale
    emergency/safety_sign_design:
      name: Design del cartello di emergenza/sicurezza
      description: Identifica il tipo di messaggio di sicurezza o di emergenza su
        un segnale, come uscita antincendio o cane da guardia
    emergency_items_included:
      name: Articoli di emergenza inclusi
      description: Specifica gli articoli inclusi nei kit di emergenza, ad esempio
        radio o batterie
    enclosure_type:
      name: Tipo di alloggiamento
      description: Specifica il tipo di involucro o copertura per stampanti 3D, ad
        esempio telaio aperto o custodia fai-da-te
    end_design:
      name: Design dell'estremità
      description: Specifica il numero di estremità funzionali e se sono sostituibili
        o intercambiabili
    enema_device_type:
      name: Tipo di dispositivo per clistere
      description: Classifica il design principale o il sistema di somministrazione
        del prodotto
    enema_nozzle_type:
      name: Tipo di ugello del clistere
      description: Specifica lo stile o il materiale dell'ugello o punta fornito con
        il kit (ad es., punta sottile, punta pediatrica, ugello in acciaio inossidabile)
    energy_efficiency_class:
      name: Classe di efficienza energetica
      description: Definisce la classe di efficienza energetica di un prodotto, ad
        es. A+++
    energy_efficiency_class_hdr:
      name: Classe di efficienza energetica (HDR)
      description: Specifica l'efficienza energetica dei dispositivi abilitati HDR,
        in genere televisori; ad es. A+++
    energy_efficiency_class_sdr:
      name: Classe di efficienza energetica (SDR)
      description: Specifica l'efficienza energetica dei dispositivi abilitati SDR,
        in genere televisori; ad es. A+++
    engine_design:
      name: Design del motore
      description: Descrive la configurazione del motore di un veicolo, ad es. 2 tempi
    engine_purpose:
      name: Funzione del motore
      description: Identifica la destinazione d'uso di un piccolo motore, ad esempio
        tosaerba o motosega
    engine_type:
      name: Tipo di motore
      description: Identifica il tipo di motore di un veicolo o di una parte, ad esempio
        elettrico o diesel
    engraving:
      name: Incisione
      description: Descrive in dettaglio il tipo di incisione su un prodotto, ad esempio
        testo personalizzato o incisione del logo
    entry_orientation:
      name: Orientamento di ingresso
      description: Descrive la direzione in cui le monete vengono inserite nel meccanismo
        (ad es., frontale, superiore, laterale, inferiore)
    envelope_features:
      name: Funzionalità della busta
      description: Descrive le caratteristiche speciali delle buste, ad esempio chiusura
        a fermaglio o foderata
    envelope_seal_design:
      name: Design del sigillo della busta
      description: Descrive l'estetica o lo stile dei sigilli delle buste, ad esempio
        floreale o monogramma
    equalizer_type:
      name: Tipo di equalizzatore
      description: Classifica la topologia o lo stile di elaborazione dell'equalizzazione
        fornito dall'unità
    equipment_operation:
      name: Funzionamento dell'attrezzatura
      description: Descrive il funzionamento di un'apparecchiatura medica, ad esempio
        manuale o elettrica
    era:
      name: Epoca
      description: Utilizzato per classificare oggetti da collezione o oggetti d'antiquariato
        in base al periodo di tempo, ad esempio Selvaggio West o Seconda Guerra Mondiale
    error_correction_type:
      name: Tipo di correzione degli errori
      description: Indica se il modulo di memoria include capacità di correzione degli
        errori e, in caso affermativo, la tecnologia ECC specifica o lo stile di buffering
        utilizzato
    esrb_rating:
      name: Valutazione del CERS
      description: Identifica l'idoneità all'età dei videogiochi, ad esempio E (Tutti)
        o T (Teen)
    ethernet_cable_category:
      name: Categoria del cavo ethernet
      description: Indica la classificazione di categoria TIA/EIA dei cavi ethernet
        a doppino intrecciato, che definisce larghezza di banda e prestazioni
    ethernet_lan_interface_type:
      name: Tipo di interfaccia Ethernet LAN
      description: Specifica il tipo di connessione Ethernet supportata da un prodotto,
        ad esempio LAN o veloce
    ev_battery_features:
      name: Funzionalità della batteria dei veicoli elettrici
      description: Evidenzia le caratteristiche delle batterie dei veicoli elettrici,
        ad esempio lunga durata o sistema di gestione intelligente della batteria
    ev_battery_type:
      name: Tipo di batteria EV
      description: Identifica il tipo di batteria utilizzata nei veicoli elettrici,
        ad esempio agli ioni di litio o al piombo
    ev_connector/adapter_type:
      name: Tipo di adattatore/connettore EV
      description: Identifica il tipo di connettore o adattatore per veicoli elettrici,
        come CCS o Tesla
    ev_conversion_kit_components:
      name: Componenti del kit di conversione EV
      description: Identifica le parti incluse in un kit di conversione EV, come motore
        o pacco batteria
    evaporation_technology:
      name: Tecnologia di evaporazione
      description: Definisce il sistema di evaporazione nei dispositivi di climatizzazione,
        ad esempio naturale o ultrasonico
    event_type:
      name: Tipo di evento
      description: Classifica la natura di un evento, ad esempio concerto, seminario
        o festival
    exercise_equipment_included:
      name: Attrezzatura per esercizi inclusa
      description: Identifica gli articoli specifici per esercizi inclusi in un set,
        come tappetino da yoga o manubri
    exercise_equipment_material:
      name: Materiale per attrezzature sportive
      description: Identifica il materiale principale utilizzato nelle attrezzature
        per il fitness, come acciaio o gomma
    exercise_machine_board_function:
      name: Funzione della scheda della macchina per esercizi
      description: Descrive la funzione primaria o la posizione della scheda all'interno
        della macchina (ad es., controllo motore, display)
    exercise_machine_features:
      name: Funzionalità della macchina per esercizi
      description: Descrive le caratteristiche speciali delle attrezzature sportive,
        come velocità regolabile o display integrato
    exercise_mat_material:
      name: Materiale del tappetino per esercizi
      description: Specifica il tipo di materiale utilizzato nei tappetini per esercizi,
        ad esempio PVC o sughero
    exfoliating_agent_type:
      name: Tipo di agente esfoliante
      description: Identifica l'esfoliante abrasivo o chimico principale utilizzato
    exfoliation_level:
      name: Livello di esfoliazione
      description: Indica quanto delicata o decisa è l'azione esfoliante della spugna
    exfoliation_method:
      name: Metodo di esfoliazione
      description: Indica se e come il detergente esfolia la pelle (ad es., fisico,
        chimico, enzimatico)
    expansion_slots:
      name: Slot di espansione
      description: Specifica gli slot per l'aggiunta di hardware in computer o server,
        ad es. PCIe, M.2
    exposure_control:
      name: Controllo dell'esposizione
      description: Definisce il metodo di regolazione della quantità di luce in una
        foto, ad es. priorità dell'otturatore, priorità dell'apertura
    extended_saxophone_range:
      name: Gamma estesa di sassofoni
      description: Specifica l'intervallo di note esteso di un sassofono, ad esempio
        tasto FA# alto o tasto LA basso
    external_antenna_connector_type:
      name: Tipo di connettore antenna esterna
      description: Definisce il connettore fisico utilizzato per collegare antenne
        esterne
    external_defibrillator_features:
      name: Funzionalità del defibrillatore esterno
      description: Evidenzia le caratteristiche principali dei defibrillatori medici,
        ad esempio funzione pediatrica o ECG su schermo
    extinguisher_rating:
      name: Classificazione dell'estintore
      description: Indica la classificazione degli estintori, ad es. Classe A, Classe
        B
    extinguishing_agent_type:
      name: Tipo di agente estinguente
      description: Specifica il tipo di sostanza estinguente nei prodotti per la sicurezza
        antincendio, ad esempio acqua o schiuma
    extraction_method:
      name: Metodo di estrazione
      description: Identifica la tecnica utilizzata per estrarre i cannabinoidi dal
        materiale vegetale di canapa
    extraction_technology:
      name: Tecnologia di estrazione
      description: Descrive il meccanismo principale che il prodotto utilizza per
        estrarre le impurità
    extraction_type:
      name: Tipo di estrazione
      description: Specifica il metodo di rimozione dell'aria nelle cappe da cucina,
        ad esempio senza condotto o convertibili
    extractor_items_included:
      name: Articoli estrattori inclusi
      description: Elenca i diversi strumenti estrattori o accessori inclusi in un
        set
    extractor_tip_style:
      name: Tipo di punta dell'estrattore
      description: Definisce il design della punta sugli strumenti di estrazione,
        ad es. paletta, ago
    eye_care_applicator_type:
      name: Tipo di applicatore per la cura degli occhi
      description: Definisce lo stile dell'applicatore integrato o della punta del
        dispenser fornita con il prodotto per il trattamento degli occhi
    eye_condition_treated:
      name: Condizione oculare trattata
      description: Indica il problema oculare principale che il prodotto è formulato
        per alleviare o trattare
    eye_pillow_shape:
      name: Forma del cuscino per gli occhi
      description: Definisce la forma fisica di un cuscino per gli occhi, ad esempio
        sagomato o rettangolare
    eye_shadow_effect:
      name: Effetto dell'ombretto
      description: Definisce l'impatto visivo dell'ombretto, ad es. fumoso, glitterato
    eye_shadow_palette_size:
      name: Taglia della palette di ombretti
      description: Classifica i prodotti per formati di palette comuni per una navigazione
        rapida
    eyebrow_applicator_type:
      name: Tipo di applicatore per sopracciglia
      description: Descrive l'applicatore o la punta utilizzata per applicare il prodotto
        per sopracciglia
    eyebrow_enhancer_color:
      name: Colore potenziatore per sopracciglia
      description: Specifica il colore dei prodotti per le sopracciglia, come il nero
        o il biondo chiaro
    eyebrow_stencil_shape:
      name: Forma dello stencil per sopracciglia
      description: Descrive la forma principale delle sopracciglia o lo stile dell'arco
        che lo stencil è destinato a creare
    eyelash_applicator_design:
      name: Modello di applicatore per ciglia
      description: Definisce lo stile degli applicatori per ciglia finte, ad es. dritto,
        curvo
    eyelash_curl_type:
      name: Tipo di curvatura delle ciglia
      description: Specifica la classificazione della curvatura (ad es., curva C,
        curva D) delle fibre delle ciglia
    eyelash_curler_type:
      name: Tipo di piegaciglia
      description: Specifica il design o il meccanismo del piegaciglia
    eyelash_material:
      name: Materiale per ciglia
      description: Identifica il tipo di materiale utilizzato nelle ciglia finte,
        ad esempio seta o sintetico
    eyelash_remover_formulation:
      name: Formulazione del rimuovi ciglia
      description: Identifica il tipo di formula principale del rimuovi
    eyelash_style:
      name: Stile delle ciglia
      description: Descrive l'effetto visivo complessivo o il design del set di ciglia
        (ad es., naturale, occhio di gatto, drammatico)
    eyelash_type:
      name: Tipo di ciglia
      description: Specifica il tipo di ciglia finte, per esempio ciglia a striscia,
        extension
    eyepiece/adapter_material:
      name: Materiale dell'oculare/adattatore
      description: Identifica il materiale utilizzato negli oculari o negli adattatori
        del microscopio, come vetro o metallo
    eyewear_compatibility:
      name: Compatibilità con occhiali
      description: Indica il tipo di occhiali per cui è destinata la cinghia.
    eyewear_frame_color:
      name: Colore montatura occhiali
      description: Identifica il colore della montatura di un occhiale, come il nero
        o l'oro
    eyewear_frame_design:
      name: Design della montatura degli occhiali
      description: Descrive lo stile degli occhiali da sole, ad esempio aviatore o
        cat-eye
    eyewear_frame_material:
      name: Materiale della montatura degli occhiali
      description: Specifica il tipo di materiale utilizzato per le montature degli
        occhiali, ad esempio bambù o fibra di carbonio
    eyewear_frame_pattern:
      name: Modello di montatura degli occhiali
      description: Identifica il motivo sulle montature degli occhiali, ad esempio
        a righe o a scacchiera
    eyewear_frame_shape:
      name: Forma della montatura degli occhiali
      description: Descrive la forma degli occhiali da vista, come tonda o quadrata
    eyewear_hinge_type:
      name: Tipo di cerniera degli occhiali
      description: Descrive il meccanismo di cerniera utilizzato sulle stanghette,
        influenzando durabilità e flessibilità
    eyewear_lens_color:
      name: Colore delle lenti degli occhiali
      description: Identifica il colore della lente di un occhiale, ad esempio trasparente
        o arancione
    eyewear_lens_material:
      name: Materiale delle lenti degli occhiali
      description: Specifica il tipo di materiale utilizzato per le lenti degli occhiali,
        ad esempio plastica o vetro ad alto indice
    eyewear_lens_pattern:
      name: Modello di lenti degli occhiali
      description: Descrive il design o la stampa sulle lenti degli occhiali, ad esempio
        cuori o paisley
    eyewear_strap_features:
      name: Caratteristiche della cinghia per occhiali
      description: Evidenzia caratteristiche funzionali notevoli della cinghia o catena
        (ad es., galleggiante, riflettente, sgancio rapido)
    eyewear_strap_or_chain_style:
      name: Stile di cinghia o catena per occhiali
      description: Specifica lo stile di costruzione principale o il fattore di forma
        della cinghia o catena per occhiali (ad es., cordino, catena a maglie metalliche,
        cinghia in neoprene)
    fabric:
      name: Tessuto
      description: Identifica il tipo di tessuto utilizzato in un prodotto, ad esempio
        cotone o denim
    fabric_structure:
      name: Struttura in tessuto
      description: Indica la composizione strutturale del tessuto, ad esempio tessuto
        o non tessuto
    face_area:
      name: Zona del viso
      description: Specifica l'area del viso per cui è pensato un prodotto per la
        cura della pelle, ad esempio gli occhi o il collo
    face_powder_color:
      name: Colore della cipria
      description: Specifica la tonalità della polvere per il viso, come oro rosa
        o marrone intenso
    face_powder_type:
      name: Tipo di cipria
      description: Identifica il tipo di polvere per il viso, come quella di finitura
        o quella sciolta
    faceplate_design:
      name: Progettazione del frontalino
      description: Identifica il tipo di mascherina dell'elettronica del veicolo,
        come staccabile o fissa
    facial_cleansing_kit_items_included:
      name: Articoli inclusi nel kit di pulizia facciale
      description: Elenca i prodotti o strumenti specifici contenuti nel kit di pulizia
        facciale (ad es., detergente, tonico, siero, spazzola, pochette da viaggio)
    facial_steamer_features:
      name: Caratteristiche del vaporizzatore facciale
      description: Elenca le funzionalità integrate chiave che migliorano il trattamento
        a vapore
    facility_sign_design:
      name: Design del cartello della struttura
      description: Descrive l'area o la stanza specifica a cui è destinato il cartello,
        come cucina o ufficio
    fader_type:
      name: Tipo di fader
      description: Identifica lo stile fisico dei fader di canale sul mixer
    false_eyelash_adhesive_formulation:
      name: Formulazione dell'adesivo per ciglia finte
      description: Specifica la formulazione chimica principale della colla
    false_nail_adhesive_type:
      name: Tipo di adesivo per unghie finte
      description: Identifica il tipo di opzione adesiva fornita o richiesta per le
        unghie (ad es., colla, linguette, entrambe, nessuna)
    false_nail_application_method:
      name: Metodo di applicazione delle unghie finte
      description: Identifica il modo in cui vengono applicate le unghie finte, ad
        esempio a colla o a pressione
    fastener_finish:
      name: Finitura della chiusura
      description: Descrive il rivestimento superficiale di un accessorio hardware,
        come ottone o cromo
    fastener_material:
      name: Materiale di fissaggio
      description: Specifica il tipo di materiale utilizzato negli elementi di fissaggio,
        ad es. ottone, acciaio inossidabile
    fastener_type:
      name: Tipo di dispositivo di fissaggio
      description: Identifica il tipo di meccanismo di fissaggio utilizzato, ad esempio
        magnetico
    fat_content:
      name: Contenuto di grassi
      description: Specifica la quantità di grassi nei prodotti alimentari e nelle
        bevande, ad es. grassi interi, poveri di grassi
    faucet_thread:
      name: Filo del rubinetto
      description: Specifica il tipo di connessione filettata del rubinetto, ad esempio
        doppia o femmina
    features:
      name: Funzionalità
      description: Descrive qualità o caratteristiche aggiuntive di un prodotto, ad
        esempio leggero o pieghevole
    feed_system:
      name: Sistema di alimentazione
      description: Descrive la modalità di alimentazione della carta in un dispositivo,
        ad esempio automatica o manuale
    feet_type:
      name: Tipo di piedi
      description: Specifica il tipo di piedini sugli accessori elettronici, in genere
        bastoncini per selfie; ad es. retrattile
    felt_tip_design:
      name: Design con punta in feltro
      description: Descrive lo spessore della punta in feltro della penna, ad esempio
        medio o fine
    feminine_sanitary_supply_features:
      name: Funzionalità dell'offerta sanitaria femminile
      description: Descrive le caratteristiche specifiche dei prodotti sanitari femminili,
        ad es. design traspirante, rapido assorbimento
    fencing_components:
      name: Componenti per recinzioni
      description: Identifica le parti di un sistema di recinzione, ad esempio un
        binario o un pannello
    fertility_metrics_measured:
      name: Metriche di fertilità misurate
      description: Elenca le metriche o i parametri biologici che il prodotto fornisce
        all'utente
    fiber_art_project_type:
      name: Tipo di progetto di fiber art
      description: Classifica l'artigianato in fibra, ad esempio ricamo o macramè
    fiber_optic_mode:
      name: Modalità fibra ottica
      description: Specifica se un accessorio in fibra è progettato per fibra ottica
        monomodale o multimodale
    field_flatness:
      name: Planarità del campo
      description: Indica la planarità del campo nelle lenti del microscopio, ad esempio
        superpiano, semipiano
    filament_type:
      name: Tipo di filamento
      description: Identifica il tipo di filamento utilizzato per la stampa 3D, ad
        esempio resina o materiale alimentare
    file_format_type:
      name: Tipo di formato del file
      description: Specifica il formato dei file digitali, ad es. GIF, PDF
    file_shape:
      name: Forma della cartella
      description: Descrive la forma delle lime dei piedi, ad esempio sagomata o ovale
    filler_material:
      name: Materiale dell’imbottitura
      description: Identifica il tipo di materiale utilizzato per riempire un prodotto,
        in genere cuscini; ad es. memory foam, piume
    filler_support:
      name: Supporto del riempitore
      description: Specifica il livello di rigidità o lo stile dell'interno di un
        cuscino, ad esempio morbido o memory foam
    filler_type:
      name: Tipo di riempitore
      description: Specifica il tipo di riempitivo utilizzato nella manutenzione del
        veicolo, come fibra di vetro o leggero
    filling/padding_project_type:
      name: Tipo di progetto riempimento/imbottitura
      description: Specifica l'uso previsto del materiale di riempimento o imbottitura,
        ad es. per la realizzazione di giocattoli di peluche
    film_application_method:
      name: Metodo di applicazione della pellicola
      description: Specifica come vengono applicate le pellicole per finestre, ad
        es. adesione statica, autoadesive
    film_format:
      name: Formato della pellicola
      description: Specifica il tipo di pellicola utilizzata nelle fotocamere, ad
        esempio 35 mm o Instax mini
    film_type:
      name: Tipo di pellicola
      description: Identifica la dimensione e il formato della pellicola utilizzata
        nelle fotocamere, ad esempio 35 mm o 120 mm
    filter_form_factor:
      name: Fattore di forma del filtro
      description: Descrive lo stile fisico dell'unità filtrante per controlli di
        compatibilità (ad es., cartuccia, filtro ventola, capsula, disco, set di filtri)
    filter_installation_type:
      name: Tipo di installazione del filtro
      description: Specifica lo stile fisico e il metodo di installazione del filtro
        DSL
    filter_material:
      name: Materiale filtrante
      description: Specifica il tipo di materiale utilizzato nei filtri, in genere
        per il caffè; ad es. carta, canapa
    filter_slope:
      name: Pendenza del filtro
      description: Specifica il tasso di attenuazione dei filtri del crossover, espresso
        in dB per ottava
    filter_topology:
      name: Topologia del filtro
      description: Specifica la famiglia di risposta del filtro, che determina la
        forma della risposta in frequenza e le caratteristiche di fase
    filter_type:
      name: Tipo di filtro
      description: Distingue tra filtri, in genere per acquari; ad es. meccanico,
        chimico
    filtering_modes:
      name: Modalità di filtraggio
      description: Definisce le modalità operative dei rilevatori radar o di velocità,
        ad es. modalità autostrada, blocchi GPS
    filtration_class:
      name: Classe di filtrazione
      description: Classifica il livello di filtrazione degli accessori respiratori,
        ad esempio FFP1 o B3
    filtration_technology:
      name: Tecnologia di filtrazione
      description: Identifica la tecnologia o la fase utilizzata dal filtro per rimuovere
        i contaminanti nell'aria prodotti durante la stampa
    fin_material:
      name: Materiale delle pinne
      description: Specifica il tipo di materiale delle pinne per immersione o snorkeling,
        ad esempio plastica o gomma
    fin_pocket_type:
      name: Tipo di tasca per pinna
      description: Specifica il disegno della scarpetta sulle pinne da immersione;
        ad es. piede intero, tallone aperto
    fin_profile:
      name: Profilo della pinna
      description: Classifica la tavola da surf in base alla configurazione delle
        pinne, ad es. cinque pinne, doppie
    fingerboard_color:
      name: Colore della tastiera
      description: Specifica il colore della tastiera degli strumenti a corda, ad
        esempio argento o bianco
    fingerboard_material:
      name: Materiale della tastiera
      description: Specifica il tipo di materiale utilizzato per la tastiera delle
        chitarre, ad esempio legno di ebano o sintetico
    fingerboard_pattern:
      name: Modello della tastiera
      description: Descrive il design o il motivo sulla tastiera di una chitarra,
        ad esempio floreale o geometrico
    fingerprint_capture_method:
      name: Metodo di acquisizione delle impronte digitali
      description: Definisce il tipo di metodo di rilevamento delle impronte digitali
        utilizzato, ad esempio capacitivo o ottico
    finial_shape:
      name: Forma della decorazione
      description: Definisce il disegno o la forma di un terminale decorativo, ad
        esempio una ghianda o una sfera
    finish:
      name: Finish
      description: Descrive la qualità della superficie di un prodotto, come satinata
        o opaca
    fire_extinguisher_items_included:
      name: Articoli estintori inclusi
      description: Specifica gli elementi aggiuntivi inclusi in un estintore, come
        il tubo di scarico o la staffa di montaggio
    firewire_standard:
      name: Standard FireWire
      description: Identifica la specifica IEEE 1394 supportata dal cavo, che determina
        la velocità massima e la compatibilità del dispositivo.
    firmness:
      name: Solidità
      description: Definisce il livello di rigidità di articoli come mobili o materassi,
        ad es. extra morbido, rigido
    first_aid_container_type:
      name: Tipo di contenitore per pronto soccorso
      description: Definisce lo stile principale del contenitore o custodia fornita
        con il kit
    first_aid_kit_compliance_standard:
      name: Standard di conformità del kit di pronto soccorso
      description: Specifica qualsiasi standard o regolamento formale che il kit soddisfa
    first_aid_kit_components:
      name: Componenti del kit di pronto soccorso
      description: Fornisce dettagli sul contenuto dei kit di pronto soccorso, ad
        es. bende, forbici
    first_aid_kit_usage:
      name: Utilizzo del kit di primo soccorso
      description: Specifica la destinazione d'uso dei kit di pronto soccorso, ad
        es. viaggi, sport
    first_steps/crawlers_style:
      name: Primi passi/stile crawler
      description: Specifica il tipo di calzature per i bambini che imparano a camminare
        o a gattonare, ad esempio pre-walkers, scarpe con suola morbida
    fish_type:
      name: Tipo di pesce
      description: Aiuta ad abbinare specie di pesci specifiche, ad esempio acque
        tropicali o fredde
    fishing_rod_action:
      name: Azione della canna da pesca
      description: Indica la reattività di una canna da pesca, ad esempio lenta o
        extra veloce
    fishing_rod_power:
      name: Potenza della canna da pesca
      description: Indica la robustezza della canna da pesca, ad es. ultra leggera,
        extra pesante
    fishing_wire_material:
      name: Materiale del filo da pesca
      description: Identifica la composizione del filo da pesca, ad esempio nylon
        o acciaio inossidabile
    fit:
      name: Vestibilità
      description: Descrive la vestibilità di un indumento, in genere la forma di
        un pantalone; ad es. gamba magra, larga
    fit_type:
      name: Tipo di vestibilità
      description: Descrive il tipo di adattamento per parti e accessori del veicolo,
        come personalizzato o universale
    fixation_type:
      name: Tipo attacco
      description: Definisce il meccanismo di fissaggio, in genere per i supporti
        per alberi di Natale; ad es. punta di fissaggio, vite di fissaggio
    flag_shape:
      name: Forma della bandiera
      description: Definisce la forma geometrica di bandiere e maniche a vento, ad
        esempio a goccia o stendardo
    flammability_rating_ul_94:
      name: Classificazione di infiammabilità (UL 94)
      description: Indica la classificazione ignifuga UL 94 del materiale della guaina
    flare_type:
      name: Tipo di bagliore
      description: Identifica la tipologia di segnali stradali di emergenza, ad esempio
        LED o tradizionali
    flash_card_theme:
      name: Tema della scheda flash
      description: Specifica il tema di apprendimento delle flash card, ad esempio
        l'alfabeto o i numeri
    flash_cell_type:
      name: Tipo di cella flash
      description: Identifica il numero di bit memorizzati per cella flash all'interno
        dell'architettura di memoria (ad es., SLC, MLC, TLC).
    flash_modes:
      name: Modalità del flash
      description: Identifica le diverse impostazioni per il flash di una fotocamera,
        ad esempio automatico o manuale
    flash_type:
      name: Tipo di flash
      description: Identifica il tipo di flash utilizzato nelle fotocamere, ad esempio
        anello o macro
    flashing_material:
      name: Materiale lampeggiante
      description: Identifica il materiale utilizzato nelle scossaline del tetto,
        ad esempio plastica o rame
    flat_shoe_style:
      name: Stile scarpa piatta
      description: Identifica il design specifico delle scarpe basse, come le ballerine
        o le espadrillas
    flatware_material:
      name: Materiale delle posate
      description: Identifica la composizione degli articoli di posate, ad esempio
        acciaio inossidabile o argento
    flatware_pieces_included:
      name: Posate incluse
      description: Specifica i tipi di utensili in un set di posate, come un coltello
        da burro o un cucchiaio da minestra
    flavor:
      name: Gusto
      description: Specifica il gusto o l'aroma di un prodotto, ad es. vaniglia, menta
    flavor_profile:
      name: Profilo aromatico
      description: Identifica le note di gusto specifiche degli articoli, in genere
        per la produzione di birra; ad es. caramello, nocciola
    flexibility_rating:
      name: Classificazione della flessibilità
      description: Indica il livello di flessibilità degli attacchi per snowboard
        o racchette da neve, ad es. 4
    floor_configuration:
      name: Configurazione del pavimento
      description: Indica se la tenda include un pavimento e, in caso affermativo,
        il tipo di pavimento fornito.
    floral_wire_design:
      name: Design filo per fiorista
      description: Descrive il tipo di filo floreale utilizzato nel crafting, come
        il filo per legare o il filo rivestito di stoffa
    flour/grain_type:
      name: Tipo di farina/cereale
      description: Specifica il tipo di grano o farina in un prodotto, ad es. mais,
        grano
    flow_rate_type:
      name: Tipo di portata
      description: Definisce la velocità con cui viene erogato il liquido, in genere
        per i biberon; ad es. medio, lento
    flower_color:
      name: Colore del fiore
      description: Specifica il colore del fiore, ad esempio rosa o multicolore
    flower_pattern:
      name: Motivo floreale
      description: Descrive il motivo che si trova nei fiori, ad esempio a strisce
        o a pois
    flue_type:
      name: Tipologia canna fumaria
      description: Identifica il tipo di canna fumaria dei caminetti, come quella
        bilanciata o quella convenzionale
    fluid_type:
      name: Tipo di fluido
      description: Specifica il fluido richiesto per le apparecchiature per effetti
        speciali, come ghiaccio secco o succo di nebbia
    fluoride_content:
      name: Contenuto di fluoro
      description: Indica la presenza e la concentrazione relativa di fluoro nel collutorio
    flush_plate_color:
      name: Colore della placca di azionamento
      description: Identifica il colore della placca di comando delle cassette WC,
        ad esempio bianco o argento
    flush_plate_pattern:
      name: Modello placca di comando
      description: Descrive il design o il motivo sulla placca dello sciacquone del
        water, ad esempio floreale o plaid
    flush_system:
      name: Sistema di scarico
      description: Specifica il sistema di scarico utilizzato negli impianti idraulici,
        ad esempio singolo o doppio
    flute_configuration:
      name: Configurazione del flauto
      description: Identifica la configurazione specifica di un flauto, ad esempio
        B footjoint o Inline G
    fm_transmitter_playback_source:
      name: Sorgente di riproduzione trasmettitore FM
      description: Identifica le opzioni di input multimediale da cui il dispositivo
        può riprodurre, oltre al Bluetooth (ad es., chiavetta USB, scheda microSD)
    foam_form:
      name: Formato della schiuma
      description: Identifica la forma o il tipo di prodotto in schiuma artigianale,
        come palline o fogli
    focus_adjustment:
      name: Regolazione della messa a fuoco
      description: Specifica il modo in cui una telecamera regola la messa a fuoco,
        ad es. automatica, manuale
    focus_device_type:
      name: Tipo di dispositivo per la messa a fuoco
      description: Identifica il tipo di dispositivo di messa a fuoco utilizzato nelle
        fotocamere, ad es. strumento di assistenza alla messa a fuoco, manovella di
        messa a fuoco
    focus_type:
      name: Tipo di messa a fuoco
      description: Identifica il metodo di messa a fuoco nelle telecamere, ad esempio
        TTL o TTL-CT-SIR
    fold_type:
      name: Tipo di piegatura
      description: Identifica lo stile di piegatura nei prodotti cartacei, ad esempio
        piegatura a Z o piegatura doppia
    folder/report_cover_material:
      name: Materiale di copertina della cartella/report
      description: Identifica il materiale utilizzato per realizzare cartelle o copertine
        di report, ad esempio carta o pelle
    folding_mechanism:
      name: Meccanismo di piegatura
      description: Definisce come si piega un prodotto, in genere per i passeggini;
        ad es. compatto, con una sola mano
    font_style:
      name: Tipo di font
      description: Specifica il tipo di carattere nei prodotti software, ad esempio
        sans serif o script
    food_bag_material:
      name: Materiale del sacchetto per alimenti
      description: Identifica il materiale utilizzato nei sacchetti per la conservazione
        degli alimenti, ad esempio carta o silicone
    food_dispenser_type:
      name: Tipo di dispenser per alimenti
      description: Specifica il tipo di alimento a cui è destinato il dispenser, ad
        esempio cereali o pasta
    food_product_form:
      name: Formato del prodotto cibo
      description: Specifica la forma in cui viene presentato il prodotto alimentare,
        ad esempio essiccato o congelato
    food_storage_material:
      name: Materiale per la conservazione degli alimenti
      description: Identifica il materiale utilizzato negli articoli per la conservazione
        degli alimenti, ad esempio vetro o plastica
    food_supplement_form:
      name: Modulo integratore alimentare
      description: Specifica il formato di un integratore sanitario, ad esempio liquido
        o compresse
    foot_arch_type:
      name: Tipo di arco plantare
      description: Specifica il tipo di arco plantare che il prodotto è progettato
        per supportare
    foot_side:
      name: Lato del piede
      description: Indica se il supporto per caviglia è progettato per il piede sinistro,
        destro o può essere utilizzato su entrambi i lati
    footage_type:
      name: Tipo di filmato
      description: Descrive la categoria di fotografie stock o riprese video, ad es.
        animazioni, texture
    footboard_type:
      name: Tipo di pedana
      description: Specifica lo stile della pedana sui pedali della batteria, ad esempio
        solida o perforata
    footwear_color:
      name: Colore delle calzature
      description: Indica il colore principale di una scarpa, ad esempio bianco o
        rosso
    footwear_material:
      name: Materiale per calzature
      description: Specifica il tipo di materiale utilizzato in una scarpa, ad esempio
        pelle scamosciata o gomma
    footwear_pattern:
      name: Modello di calzature
      description: Descrive il motivo visivo sulle scarpe, ad esempio a righe o a
        foglie
    force_feedback_type:
      name: Tipo di force feedback
      description: Descrive il meccanismo di azionamento utilizzato per generare il
        force feedback e la resistenza dello sterzo
    format_supported:
      name: Formato supportato
      description: Specifica le dimensioni compatibili, in genere per gli album fotografici;
        ad es. 13 x 18 cm
    formula_level:
      name: Fasce di età latte in polvere
      description: Specifica l'idoneità all'età del latte artificiale, ad es. Livello
        1 (0-6 mesi)
    formulation_strength:
      name: Forza della formulazione
      description: Indica la potenza comparativa della formula del prodotto
    fossil_type:
      name: Tipo di fossile
      description: Specifica il tipo di fossile, ad esempio denti di squalo o ossa
        di dinosauro
    foundation_color:
      name: Colore del fondotinta
      description: Identifica il colore delle fondamenta di un materasso, come il
        beige o il nero
    foundation_material:
      name: Materiale di fondazione
      description: Identifica il materiale principale utilizzato nelle basi dei materassi,
        ad esempio metallo o legno
    foundation_pattern:
      name: Modello di fondazione
      description: Descrive il design o il motivo su una base per materasso, ad esempio
        chevron o damasco
    fragrance:
      name: Fragranza
      description: Definisce se un prodotto è profumato o meno, ad es. floreale, non
        profumato
    fragrance_level:
      name: Livello di fragranza
      description: Specifica l'intensità del profumo di un prodotto, ad es. inodore,
        leggermente profumato
    frame_color:
      name: Colore del telaio
      description: Specifica il colore del telaio di un prodotto, ad esempio trasparente
        o oro
    frame_design:
      name: Modello del telaio
      description: Descrive lo stile o il materiale della struttura di un prodotto,
        ad esempio metallo o legno
    frame_material:
      name: Materiale del telaio
      description: Definisce il materiale utilizzato nella struttura del prodotto,
        ad esempio legno o plastica
    frame_pattern:
      name: Motivo della cornice
      description: Descrive il design visivo o lo stile del telaio di un prodotto,
        ad esempio geometrica o a strisce
    frame_style:
      name: Stile della cornice
      description: Descrive il design o il tipo di cornice per opere d'arte, ad esempio
        moderna o rustica
    frequency/radio_bands_supported:
      name: Bande di frequenza/radio supportate
      description: Indica le bande radio con cui un dispositivo è compatibile, ad
        es. AM, UHF
    frequency_type:
      name: Tipo di frequenza
      description: Identifica l'impostazione della frequenza dei metal detector, ad
        esempio singola o simultanea
    frequency_weighting:
      name: Ponderazione in frequenza
      description: Descrive la risposta in frequenza di un fonometro, ad esempio ponderazione
        A
    frog_material:
      name: Materiale del nasetto
      description: Identifica il materiale utilizzato nel nasetto di un arco per strumenti
        a corda, come legno di ebano o argento
    fruit_source:
      name: Origine della frutta
      description: Identifica se la frutta nelle bevande proviene da concentrato o
        meno
    fuel_additives:
      name: Additivi per carburante
      description: Identifica il tipo di additivo presente nei prodotti carburanti,
        ad esempio antigel o inibitore di corrosione
    fuel_container_features:
      name: Funzionalità del contenitore del carburante
      description: Descrive le caratteristiche specifiche dei serbatoi del carburante,
        ad esempio beccuccio a prova di fuoriuscite o indicatore del carburante
    fuel_grade:
      name: Grado del carburante
      description: Specifica il grado dei prodotti combustibili, ad esempio biocalore
        o 2-K
    fuel_purity:
      name: Purezza del carburante
      description: Specifica il livello di purezza del carburante propano, ad es.
        HD-5, commerciale
    fuel_source:
      name: Fonte di carburante
      description: Specifica la fonte di energia utilizzata, in genere per le celle
        a combustibile; ad es. idrogeno, propano
    fuel_supply:
      name: Rifornimento di carburante
      description: Specifica la fonte di carburante per veicoli o motori, ad esempio
        diesel o ibrido
    furniture/fixture_color:
      name: Colore mobili/infissi
      description: Identifica il colore di mobili o arredi, come il beige o il nero
    furniture/fixture_features:
      name: Funzionalità dei mobili/infissi
      description: Evidenzia le caratteristiche speciali di mobili o infissi, come
        ripiani regolabili o specchio incorporato
    furniture/fixture_material:
      name: Materiale per mobili/infissi
      description: Identifica il materiale principale utilizzato nei mobili o negli
        infissi, come legno o metallo
    furniture/fixture_pattern:
      name: Modello di mobili/infissi
      description: Identifica il tema visivo su articoli di arredamento, ad esempio
        a righe o a quadri
    game_components:
      name: Componenti del gioco
      description: Identifica le parti incluse in un set di gioco, ad esempio dadi
        o tabellone di gioco
    game_console_skin_coverage:
      name: Copertura skin console giochi
      description: Indica quali parti del dispositivo copre il set di skin
    game_difficulty:
      name: Difficoltà del gioco
      description: Descrive il livello di sfida in un gioco di società, ad esempio
        medio o difficile
    game_features:
      name: Funzionalità del gioco
      description: Evidenzia le caratteristiche speciali di un gioco, ad esempio facilità
        di viaggio o personalizzazione
    game_name:
      name: Nome del gioco
      description: Identifica il nome specifico di un gioco alcolico, ad esempio Beer
        pong o Kings Cup
    gameplay_skills:
      name: Abilità di gioco
      description: Identifica le abilità potenziate da un gioco, come pensiero strategico
        o memoria
    games_included:
      name: Giochi inclusi
      description: Elenca i giochi forniti con il prodotto, ad esempio carte o dama
    gaming_enhancement_features:
      name: Funzionalità di miglioramento del gioco
      description: Indica le tecnologie orientate al gaming HDMI 2.1 supportate dal
        ricevitore
    garage_door_material:
      name: Materiale della porta del garage
      description: Identifica il materiale di costruzione delle porte da garage, ad
        esempio acciaio o legno
    gardening_use:
      name: Utilizzo nel giardinaggio
      description: Definisce lo scopo di giardinaggio di un prodotto, ad es. pacciamatura,
        paesaggistica
    garment_steamer_design:
      name: Design del vaporizzatore per indumenti
      description: Definisce lo stile o il tipo di vaporizzatore per indumenti, ad
        esempio portatile o spazzola a vapore
    gases_detected:
      name: Gas rilevati
      description: Identifica i gas specifici che un rilevatore può rilevare, ad esempio
        metano o radon
    gate_mounting_type:
      name: Tipo di montaggio del cancello
      description: Specifica dove è installato il cancelletto per bambini o animali
        domestici, ad esempio un muro o una porta
    gauge_type:
      name: Tipo di indicatore
      description: Specifica il tipo di indicatore del veicolo, ad esempio livello
        del carburante o temperatura
    gear_material:
      name: Materiale degli ingranaggi
      description: Specifica il materiale utilizzato nella costruzione degli ingranaggi,
        ad esempio fibra di carbonio o titanio
    gear_ratio:
      name: Rapporto di recupero
      description: Definisce il rapporto di trasmissione nei mulinelli da pesca, ad
        es. 6:1, 1:1
    gearing_type:
      name: Tipo di ingranaggio
      description: Specifica il tipo di sistema di ingranaggi nei prodotti per il
        ciclismo, come catena o cintura
    gel_strength:
      name: Forza del gel
      description: Indica la forza del gel o della fioritura dei prodotti gelatinosi,
        ad es. elevata fioritura, bassa fioritura
    gemstone_type:
      name: Tipo di pietra preziosa
      description: Specifica la pietra preziosa primaria utilizzata nell'articolo,
        basata sulla classificazione minerale o del materiale della pietra
    genre:
      name: Genere
      description: Classifica la categoria o lo stile dei media, ad esempio horror
        o fantasy
    geological_era:
      name: Era geologica
      description: Classifica l'età delle rocce o dei fossili da collezione, ad esempio
        Mesozoico o Cenozoico
    gift_bag_handle_design:
      name: Design del manico del sacchetto regalo
      description: Descrive lo stile delle maniglie dei sacchetti regalo, ad esempio
        corda o nastro
    gift_set_format:
      name: Formato del set da regalo
      description: Specifica lo stile di presentazione dei set regalo, ad esempio
        confezione regalo o sacchetto regalo
    gimbal_stabilization_axes:
      name: Assi di stabilizzazione del gimbal
      description: Identifica il numero di assi di stabilizzazione elettronica o meccanica
        forniti quando il selfie stick include una funzione gimbal
    gin_variety:
      name: Varietà di gin
      description: Classifica i prodotti gin in base al tipo specifico, ad es. aromatizzato,
        London dry
    glaze_finish:
      name: Finitura smaltata
      description: Indica la consistenza e la lucentezza di uno smalto in ceramica
        o terracotta, come raso o craquelé
    glazing_type:
      name: Tipo di vetro
      description: Identifica il tipo di vetratura della finestra, ad esempio doppio
        vetro o vetro singolo
    glide_style:
      name: Stile di scorrimento
      description: Indica la caratteristica di scorrimento prevista dei pattini (ad
        es., velocità, controllo)
    glitter_particle_size:
      name: Taglia delle particelle di glitter
      description: Categorizza la dimensione delle particelle del glitter, influenzando
        l'intensità dello scintillio, la texture e la facilità di applicazione
    glitter_shape:
      name: Forma dei glitter
      description: Definisce la forma dei glitter, come cuore o stella
    glucose_measurement_units:
      name: Unità di misura del glucosio
      description: Indica in quali unità di misura (mg/dL o mmol/L) il misuratore
        può visualizzare i risultati
    glucose_meter_features:
      name: Funzionalità del glucometro
      description: Descrive le caratteristiche speciali dei glucometri, come funzione
        portatile o di memoria
    glue_gun_features:
      name: Funzionalità della pistola per colla
      description: Evidenzia gli aspetti unici di una pistola per colla, ad esempio
        riscaldamento rapido o caratteristiche di sicurezza
    glue_gun_operation:
      name: Funzionamento della pistola per colla
      description: Identifica la fonte di alimentazione di una pistola per colla,
        ad esempio con o senza filo
    glue_gun_technology:
      name: Tecnologia della pistola per colla
      description: Specifica il tipo di tecnologia utilizzata in una pistola per colla,
        ad esempio fredda o calda
    glue_strength:
      name: Forza della colla
      description: Indica la capacità legante di una colla, ad es. forte, delicata
    glue_viscosity:
      name: Viscosità della colla
      description: Descrive lo spessore della colla, influenzando il flusso e il controllo
        dell'applicazione
    golf_ball_type:
      name: Tipo di pallina da golf
      description: Specifica le caratteristiche di prestazione delle palline da golf,
        ad esempio le prestazioni del tour o la distanza morbida
    golf_equipment_included:
      name: Attrezzatura da golf inclusa
      description: Identifica gli articoli da golf extra inclusi nel set, ad esempio
        strumento per divot o custodia per palline da golf
    gps_compatible_device:
      name: Dispositivo GPS compatibile
      description: Specifica i dispositivi che possono utilizzare software GPS, ad
        esempio laptop o dispositivi aeronautici
    gps_device_features:
      name: Funzionalità del dispositivo GPS
      description: Descrive le funzionalità speciali di un dispositivo GPS, come la
        dash cam integrata o basato sull'intelligenza artificiale
    gps_map_type:
      name: Tipo di mappa GPS
      description: Specifica il tipo di mappa utilizzata nel software GPS, come le
        carte topografiche o nautiche
    gps_software_focus:
      name: Messa a fuoco del software GPS
      description: Identifica l'uso principale del software GPS, come la navigazione
        automobilistica o l'analisi geospaziale
    grading:
      name: Classificazione
      description: Indica la qualità o la condizione delle carte collezionabili, ad
        esempio BCCG o PSA
    grain:
      name: Cereali
      description: Indica il livello di granulosità della pellicola fotografica, ad
        esempio alto o fine
    grape_variety:
      name: Varietà di uva
      description: Identifica il tipo di uva utilizzata nella vinificazione, ad esempio
        Cabernet Sauvignon o Chardonnay
    graphics_card_type:
      name: Tipo di scheda grafica
      description: Specifica il tipo di scheda grafica in un computer, ad es. professionale,
        dedicata
    graphics_tablet_accessories_included:
      name: Accessori per tavoletta grafica inclusi
      description: Identifica gli elementi aggiuntivi inclusi in una tavoletta grafica,
        come il supporto per la penna o la cinghia per la penna
    graphics_tablet_specialized_features:
      name: Funzionalità specializzate della tavoletta grafica
      description: Descrive in dettaglio le caratteristiche speciali di una tavoletta
        grafica, ad esempio impermeabilità o retroilluminazione a LED
    gravel/substrate_material:
      name: Materiale ghiaia/substrato
      description: Specifica la composizione della ghiaia o dei substrati dell'acquario,
        ad es. argilla, quarzo
    gray_coverage_level:
      name: Livello di copertura grigio
      description: Indica la percentuale o il grado di capelli grigi o bianchi che
        il prodotto può coprire o sfumare
    grease_filter_material:
      name: Materiale del filtro antigrasso
      description: Specifica il materiale utilizzato nel filtro di grasso del prodotto,
        ad es. metallo, acciaio inossidabile
    grind_size:
      name: Dimensione della macinatura
      description: Indica la grossolanità o la finezza dei fondi di caffè, ad esempio
        extra grosso o fine
    grip_or_holder_style:
      name: Stile dell'impugnatura o del supporto
      description: Identifica la forma fisica primaria del prodotto, aiutando chi
        sceglie a filtrare rapidamente il design preferito.
    grip_texture:
      name: Trama antiscivolo
      description: Descrive la sensazione superficiale della presa di un prodotto,
        come liscia o ruvida
    grip_type:
      name: Tipo di impugnatura
      description: Definisce lo stile di presa dell'attrezzatura da scherma, ad es.
        francese, pistola
    grit_type:
      name: Tipo di grana
      description: Specifica il livello di grana degli strumenti o dei prodotti dentistici,
        ad esempio grossolana o ultra fine
    grooming_kit_format:
      name: Formato del kit per la cura del bambino
      description: Specifica il tipo di imballaggio dei kit di toelettatura, ad es.
        borsa o scatola del kit
    guitar_fitting/part_type:
      name: Tipo di raccordo/parte per chitarra
      description: Specifica il tipo di componente o accessorio per chitarra, come
        il battipenna o il chiodo per l'accordatura
    guitar_size:
      name: Misura della chitarra
      description: Specifica la dimensione della chitarra, ad esempio dimensione intera
        o 3/4
    gutter_fitting_type:
      name: Tipo di raccordo per grondaia
      description: Identifica il tipo di raccordo utilizzato nei sistemi di grondaie,
        come connettore di scarico o tappo terminale
    gutter_style:
      name: Stile grondaia
      description: Specifica il tipo di grondaia, ad esempio a flusso profondo o industriale
    habitat_material:
      name: Materiale dell'habitat
      description: Identifica il materiale principale degli habitat degli animali
        domestici, come acrilico o legno
    hair_care_effect:
      name: Effetto per la cura dei capelli
      description: Definisce i benefici o risultati primari che lo shampoo è formulato
        per fornire
    hair_care_finish:
      name: Finish del prodotto per capelli
      description: Definisce l'aspetto finale o la consistenza dei capelli dopo l'uso,
        ad es. lucido, opaco
    hair_care_items_included:
      name: Articoli per la cura dei capelli inclusi
      description: Specifica i tipi di articoli per la cura dei capelli inclusi in
        un set, come il siero per capelli o la maschera per capelli
    hair_care_technology:
      name: Tecnologia per la cura dei capelli
      description: Definisce la tecnologia utilizzata nei prodotti per la cura dei
        capelli, ad es. vapore, termolisi
    hair_color:
      name: Tintura per capelli
      description: Identifica il colore o la tonalità dei prodotti per la cura dei
        capelli, come biondo o castano scuro
    hair_color_formulation:
      name: Formulazione del colore per capelli
      description: Indica la longevità o il tipo funzionale dell'effetto colore del
        prodotto (ad es., tintura permanente, tonalizzante, ritocco radici)
    hair_concealer_fiber_material:
      name: Materiale delle fibre del correttore per capelli
      description: Specifica il materiale primario delle fibre o polveri costruttive
        del prodotto
    hair_dryer_motor_type:
      name: Tipo di motore dell'asciugacapelli
      description: Specifica il tipo di motore utilizzato nell'asciugacapelli, influenzando
        durabilità, livello di rumore e potenza del flusso d'aria
    hair_dye_type_removed:
      name: Tipo di tintura per capelli rimossa
      description: Specifica quali tipi di tintura per capelli il prodotto è progettato
        per rimuovere (ad es., permanente, henné)
    hair_loss_type:
      name: Causa della perdita dei capelli
      description: Organizza i prodotti in base al tipo di caduta dei capelli, ad
        es. alopecia areata, calvizie maschile
    hair_oil_application:
      name: Applicazione dell'olio per capelli
      description: Specifica come l'olio per capelli è destinato ad essere utilizzato
        o applicato
    hair_oil_effect:
      name: Effetto dell'olio per capelli
      description: Indica i benefici o risultati primari forniti dall'olio per capelli
    hair_shear_type:
      name: Tipo di taglio dei capelli
      description: Definisce lo stile delle forbici per capelli utilizzate per la
        cura dei capelli, ad esempio per la testurizzazione, per lo sfoltimento
    hair_styling_benefits:
      name: Benefici per lo styling dei capelli
      description: Evidenzia i principali benefici prestazionali o effetti che il
        prodotto fornisce ai capelli
    hair_styling_items_included:
      name: Articoli per acconciature inclusi
      description: Identifica gli strumenti per lo styling dei capelli inclusi in
        un set, come ferro arricciacapelli o spazzola per capelli
    hair_styling_tool_features:
      name: Funzionalità dello strumento per lo styling dei capelli
      description: Identifica le caratteristiche speciali degli strumenti per lo styling
        dei capelli, come termostato regolabile o spegnimento automatico
    hair_treatment_effect:
      name: Effetto del trattamento per capelli
      description: Specifica i benefici primari forniti dal siero per capelli
    hair_type:
      name: Tipo di capelli
      description: Classifica i prodotti in base a tipi o condizioni di capelli specifici,
        ad esempio ricci o secchi
    hammer_head_material:
      name: Materiale della testa del martello
      description: Identifica la composizione della testa di un martello, come acciaio
        o fibra di vetro
    hand_side:
      name: Lato della presa
      description: Specifica il tipo di mano per cui è progettato un prodotto, ad
        es. sinistra, entrambi i lati
    hand_soap_features:
      name: Caratteristiche del sapone per le mani
      description: Evidenzia caratteristiche o benefici speciali del sapone in polvere
        per le mani
    hand_warmer_type:
      name: Tipo scaldamani
      description: Identifica il tipo di scaldamani, ad esempio attivato ad aria o
        alimentato a batteria
    handcuff_lock_type:
      name: Tipo di serratura per manette
      description: Identifica il meccanismo di chiusura delle manette, come chiave
        o doppia serratura
    handle_color:
      name: Colore della maniglia
      description: Specifica il colore della maniglia di un prodotto, ad esempio nero
        o blu
    handle_design:
      name: Forma del manico
      description: Descrive lo stile dell'impugnatura di uno strumento, ad esempio
        dritta o a pistola
    handle_grip_texture:
      name: Trama dell’impugnatura
      description: Definisce la sensazione della superficie della maniglia di un prodotto,
        ad esempio rigata o liscia
    handle_material:
      name: Materiale dell’impugnatura
      description: Specifica il materiale utilizzato nel manico del prodotto, come
        bambù o plastica
    handle_pattern:
      name: Modello di maniglia
      description: Descrive il design o il motivo sulla maniglia di un prodotto, ad
        esempio floreale o geometrico
    handle_style:
      name: Stile dell'impugnatura
      description: Definisce il design o la forma dell'impugnatura del bastone da
        passeggio, influenzando il comfort della presa, l'ergonomia e l'estetica
    handle_type:
      name: Tipo di manico
      description: Specifica la lunghezza o la presenza di una maniglia su un prodotto,
        ad es. corta, senza maniglia
    handset_type:
      name: Tipo di ricevitore
      description: Definisce il ricevitore per i telefoni, ad esempio con cavo o cordless
    handwear_features:
      name: Funzionalità della manifattura
      description: Descrive le caratteristiche speciali di guanti o muffole, come
        chiusura regolabile o presa migliorata
    handwear_material:
      name: Materiale per la manifattura
      description: Descrive il tipo di materiale utilizzato in guanti o muffole, ad
        esempio pelliccia sintetica o lana
    handwear_type:
      name: Tipo di abbigliamento
      description: Classifica il tipo di indumenti per le mani, ad esempio guanti
        senza dita, guanti da neve
    hanging_chair_design:
      name: Design della sedia sospesa
      description: Specifica se una poltrona sospesa è dotata o meno di supporto
    haptic_feedback_type:
      name: Tipo di feedback aptico
      description: Descrive il tipo di feedback tattile o di movimento fornito dal
        controller
    hard_cider_variety:
      name: Varietà di sidro
      description: Specifica il profilo aromatico del sidro duro, ad es. piccante,
        dolce
    hard_drive_features:
      name: Funzionalità del disco rigido
      description: Identifica le capacità speciali di un disco rigido, ad esempio
        basato sull'intelligenza artificiale o antiurto
    hard_drive_form_factor:
      name: Fattore di forma del disco rigido
      description: Specifica la dimensione fisica di un disco rigido, per esempio
        2,5 pollici, 3,5 pollici
    hard_drive_installation:
      name: Installazione del disco rigido
      description: Identifica il posizionamento di un disco rigido nell'elettronica,
        ad esempio interno o esterno
    hardhat_class:
      name: Classe dell'elmetto
      description: Identifica la classificazione di sicurezza degli elmetti protettivi,
        ad es. C (conduttivo), E (elettrico);
    hardness:
      name: Durezza
      description: Indica la consistenza di un prodotto, ad es. morbido, medio, duro
    hardness_rating_pencil_scale:
      name: Grado di durezza (scala a matita)
      description: Specifica il grado di durezza del vetro temperato in base alla
        scala di durezza della matita
    hardware_finish:
      name: Finitura degli attrezzi
      description: Descrive il trattamento superficiale o il rivestimento di articoli
        hardware, come ottone o cromo
    hardware_material:
      name: Materiale dell'hardware
      description: Specifica la composizione degli elementi hardware, ad esempio metallo
        o acciaio inossidabile
    hardware_mounting_type:
      name: Tipo di montaggio dell’hardware
      description: Identifica la modalità di installazione o posizionamento di un
        prodotto hardware, ad es. a parete o indipendente
    hardwood_lumber_grade:
      name: Classificazione del legno massiccio
      description: Classifica la qualità del legname di legno duro, ad es. N. 2A comune
    harness_closure_type:
      name: Tipo di chiusura dell’imbracatura
      description: Specifica il tipo di chiusura utilizzata nelle imbracature, ad
        esempio fibbia a sgancio laterale o cerniera
    harp_size:
      name: Misura dell’arma
      description: Specifica la categoria di dimensione di un'arpa, ad es. piccola,
        coda da concerto
    hatch_suitable_location:
      name: Tipo di posizionamento ideale del portello
      description: Identifica il posizionamento ideale per le botole, ad esempio a
        pavimento o a parete
    hazmat_suit_design:
      name: Modello della tuta di protezione chimica
      description: Descrive lo stile delle tute per materiali pericolosi, ad esempio
        tute o incapsulate
    hdmi_version_supported:
      name: Versione HDMI supportata
      description: Specifica la versione più alta della specifica HDMI che il dispositivo
        supporta completamente (ad es., HDMI 2.1 per 4K @ 120 Hz)
    hdr_format:
      name: Formato HDR
      description: Specifica l'High Dynamic Range (HDR) dei televisori, ad es. HDR10,
        Dolby Vision
    headjoint_cut:
      name: Taglio della testata
      description: Specifica il taglio della testata nei flauti, ad es. ondulato,
        taglio a Z
    headphone_cushion_shape:
      name: Forma del cuscinetto delle cuffie
      description: Descrive il contorno fisico del cuscinetto per aiutare la clientela
        ad abbinare la geometria del padiglione auricolare
    headphone_driver_technology:
      name: Tecnologia dei driver delle cuffie
      description: Definisce il tipo di trasduttore utilizzato per creare il suono
        nelle cuffie
    headphone_jack_type:
      name: Tipo di jack per cuffie
      description: Specifica il tipo di dimensione del jack per cuffie, ad esempio
        3,5 mm, USB tipo C
    headphone_style:
      name: Tipo di cuffie
      description: Definisce il design delle cuffie, ad es. dietro la nuca, auricolari
    headset_connection_type:
      name: Tipo di connessione dell'auricolare
      description: Specifica l'/le interfaccia/interfacce disponibili per collegare
        cuffie esterne al telefono
    headwear_features:
      name: Funzionalità del copricapo
      description: Evidenzia le caratteristiche uniche del copricapo, ad es. pieghevole,
        versatile
    hearing_aid_compatibility:
      name: Compatibilità con apparecchi acustici
      description: Specifica se il telefono soddisfa i requisiti di compatibilità
        con gli apparecchi acustici (HAC) e, se applicabile, il livello di valutazione
    hearing_aid_ear_side:
      name: Lato dell'orecchio per apparecchio acustico
      description: Specifica se l'apparecchio acustico è progettato per l'orecchio
        sinistro, destro o entrambe le orecchie
    hearing_aid_features:
      name: Funzionalità degli apparecchi acustici
      description: Evidenzia le caratteristiche speciali degli apparecchi acustici,
        come la batteria ricaricabile o digitale
    hearing_aid_material:
      name: Materiale per apparecchi acustici
      description: Identifica il materiale principale utilizzato nella costruzione
        degli apparecchi acustici, ad esempio plastica o silicone
    hearing_loss_level:
      name: Livello di perdita uditiva
      description: Specifica il grado di perdita uditiva che l'apparecchio acustico
        è progettato per affrontare
    hearing_protection_class:
      name: Classe di protezione dell'udito
      description: Specifica la classe di certificazione locale che indica le prestazioni
        di attenuazione secondo gli standard regionali
    heat_function:
      name: Funzionalità calore
      description: Indica se un prodotto è dotato di funzione di riscaldamento, in
        genere per articoli per la cura personale
    heat_level:
      name: Livello di calore
      description: Indica la piccantezza di prodotti alimentari e bevande, ad esempio
        dolce o molto piccante
    heat_settings:
      name: Impostazioni di calore
      description: Specifica i livelli di controllo della temperatura di un prodotto,
        ad esempio basso, medio, alto
    heat_source:
      name: Fonte di calore
      description: Specifica il tipo di fonte di calore nei cuscinetti riscaldanti,
        ad es. microonde, gel termico
    heat_therapy_type:
      name: Tipo di terapia del calore
      description: Indica se il prodotto fornisce calore umido, calore secco, o entrambi
    heating_instructions:
      name: Istruzioni per il riscaldamento
      description: Specifica come riscaldare correttamente il prodotto, ad es. forno,
        piano cottura
    heating_method:
      name: Metodo di riscaldamento
      description: Specifica la tecnica utilizzata per il riscaldamento, in genere
        per gli scaldabiberon; ad es. vapore, bagnomaria
    heating_pad_design:
      name: Design del cuscinetto riscaldante
      description: Specifica lo stile fisico o il fattore di forma del cuscinetto
        riscaldante
    heating_pad_features:
      name: Caratteristiche del cuscinetto riscaldante
      description: Evidenzia caratteristiche funzionali o di convenienza speciali
        integrate nel cuscinetto riscaldante
    heating_speed:
      name: Velocità di riscaldamento
      description: Indica la velocità con cui un prodotto si riscalda, ad es. veloce,
        lento
    heel_height_type:
      name: Tipo di altezza del tacco
      description: Definisce l'altezza del tacco di una scarpa, ad esempio piatto
        o alto
    heel_shoe_type:
      name: Tipo di scarpa con tacco
      description: Identifica il tipo di tacco di una scarpa, ad esempio a zeppa o
        a plateau
    height_adjustment:
      name: Regolazione dell'altezza
      description: Specifica se l'altezza di un prodotto può essere modificata, ad
        es. altezza fissa, altezza regolabile
    helicobacter_pylori_detection_method:
      name: Metodo di rilevamento dell'Helicobacter pylori
      description: Identifica il principio biologico o l'approccio che il kit utilizza
        per rilevare l'infezione da Helicobacter pylori
    helmet_shade_design:
      name: Modello della visiera del casco
      description: Descrive il tipo di meccanismo di oscuramento nei caschi per saldatura,
        come fisso o auto-oscurante
    herbal_supplement_health_goal:
      name: Obiettivo di salute dell'integratore erboristico
      description: Indica l'obiettivo di benessere primario, il sistema corporeo o
        l'area fisiologica che l'integratore erboristico è destinato a supportare
        (ad es., supporto immunitario, sollievo dallo stress, supporto per fegato
        e disintossicazione)
    hitch_class:
      name: Classe di gancio
      description: Identifica la capacità di traino dell'attacco di un veicolo, ad
        esempio Classe I o Classe II
    hitch_type:
      name: Tipo di aggancio
      description: Specifica il metodo di montaggio dei rimorchi per biciclette, ad
        esempio montato sull'asse o sul reggisella
    hiv_test_generation:
      name: Generazione del test HIV
      description: Indica la generazione del test diagnostico HIV, riflettendo miglioramenti
        nella sensibilità e nella finestra di rilevamento
    hockey_equipment_included:
      name: Attrezzatura da hockey inclusa
      description: Specifica gli articoli in un set di attrezzatura da lacrosse, ad
        esempio bastone da lacrosse o spalline
    hold_level:
      name: Livello di tenuta
      description: Definisce la forza dei prodotti per lo styling dei capelli, ad
        es. leggero, forte
    hole_plating_type:
      name: Tipo di placcatura dei fori
      description: Indica se i fori della scheda sono non placcati, metallizzati o
        presentano via barrels, il che influisce sulla saldatura e sulla connettività
        tra gli strati
    hook_design:
      name: Design del gancio
      description: Identifica il design di ganci, fibbie e dispositivi di fissaggio,
        ad es. a molla, a doppia estremità
    hook_grip_design:
      name: Design dell’impugnatura del gancio
      description: Descrive lo stile di presa degli uncinetti, ad esempio antiscivolo
        o ergonomico
    hook_size:
      name: Dimensioni dell'uncinetto
      description: Identifica la dimensione degli uncinetti, ad esempio B, G o I
    hook_type:
      name: Tipo di mezzo marinaio
      description: Identifica lo stile dei mezzi marinai, ad esempio fissi o telescopici
    hoop_shape:
      name: Forma del canestro
      description: Descrive la forma di un oggetto basato su un cerchio, in genere
        reti da pesca; ad es. a forma di D
    horse_category:
      name: Categoria di cavalli
      description: Classifica i finimenti del cavallo in base alla taglia e alla razza
        del cavallo, ad es. pony, standard
    horse_grooming_accessories_included:
      name: Accessori per la toelettatura del cavallo inclusi
      description: Identifica articoli aggiuntivi inclusi nei prodotti per la toelettatura
        del cavallo, come lame o custodia per il trasporto
    hose_material:
      name: Materiale del tubo
      description: Specifica il tipo di materiale utilizzato nelle tubazioni flessibili,
        ad esempio PVC o alluminio
    host_interface:
      name: Interfaccia host
      description: Specifica il metodo utilizzato per connettersi ai dischi rigidi,
        ad esempio Thunderbolt 3 o SATA
    housing_color:
      name: Colore dell'alloggiamento
      description: Identifica il colore dell'involucro esterno di un prodotto, come
        beige o trasparente
    housing_material:
      name: Materiale dell’alloggiamento
      description: Specifica il materiale utilizzato nello strato esterno del prodotto,
        ad es. acciaio inossidabile, legno
    housing_pattern:
      name: Modello abitativo
      description: Descrive il design o il motivo sulla parte esterna di un prodotto,
        ad esempio astratto o con un logo.
    hub/switch_storage_options:
      name: Opzioni di archiviazione hub/switch
      description: Identifica le capacità di archiviazione di hub o switch, come stackable
        o non-stackable
    humidification_system:
      name: Sistema di umidificazione
      description: Descrive il tipo di opzione di umidificazione inclusa o supportata
        dalla macchina PAP
    humidifier_design:
      name: Progettazione dell'umidificatore
      description: Descrive il modello di un umidificatore, come fissabile o portatile
    humidity_control:
      name: Controllo dell'umidità
      description: Indica la capacità del prodotto di regolare i livelli di umidità,
        in genere per gli umidificatori per sigari; ad es. 0,65
    humidity_control_method:
      name: Metodo di controllo dell'umidità
      description: Specifica il tipo di regolazione dell'umidità nei dispositivi,
        ad esempio semiautomatica o manuale
    hunting/survival_knife_design:
      name: Design del coltello da caccia/sopravvivenza
      description: Identifica il design di un coltello da caccia/sopravvivenza, ad
        esempio punta a lancia o punta tanto
    hunting_blind_design:
      name: Design cieco da caccia
      description: Specifica il tipo di design della tenda da caccia, ad esempio senza
        schermo, con un solo senso di visibilità
    hvac_control_type:
      name: Tipo di controllo HVAC
      description: Identifica il tipo di controllo HVAC, ad esempio digitale o manuale
    ice_pack_type:
      name: Tipo di borsa del ghiaccio
      description: Specifica il materiale o la tecnologia utilizzata in un impacco
        di ghiaccio, ad es. impacco di gel, impacco di schiuma
    icon_type:
      name: Tipo di icona
      description: Specifica il tipo di icona del computer, ad esempio cartella o
        social media
    identity_verification_requirement:
      name: Requisito di verifica dell'identità
      description: Specifica se è richiesta la registrazione con nome reale o la verifica
        dell'identità eKYC prima che la SIM o eSIM possa essere utilizzata
    ignition_system:
      name: Sistema di accensione
      description: Identifica il tipo di sistema di accensione nei generatori, ad
        esempio manuale o elettronico
    illumination_technique:
      name: Tecnica di illuminazione
      description: Identifica il metodo di illuminazione utilizzato nei microscopi,
        ad esempio campo chiaro o campo scuro
    image_formats_supported:
      name: Formati immagine supportati
      description: Identifica i tipi di file immagine che una fotocamera può produrre,
        ad esempio JPEG o RAW
    image_sensor_size:
      name: Dimensioni del sensore di immagine
      description: Indica la dimensione del sensore di immagine nelle fotocamere,
        ad esempio 1/1,7 o full frame
    immobilizer_type:
      name: Tipo di immobilizzatore
      description: Specifica il tipo di dispositivo utilizzato per prevenire il furto
        del veicolo, ad esempio blocca pneumatici o blocca volante
    incense_fragrance:
      name: Fragranza dell’incenso
      description: Identifica il profumo di un prodotto a base di incenso, ad esempio
        lavanda o legno di sandalo
    incense_kit_items_included:
      name: Articoli del kit di incenso inclusi
      description: Identifica gli elementi contenuti in un kit per la produzione di
        incenso, ad es. bastoncini di bambù, stampi
    incense_type:
      name: Tipo di incenso
      description: Identifica la forma dell'incenso, ad esempio cono o bastoncino
    incontinence_aid_features:
      name: Funzionalità degli ausili per l'incontinenza
      description: Descrive le caratteristiche speciali degli ausili per l'incontinenza,
        come a tenuta stagna o ipoallergenici
    incontinence_pad_type:
      name: Tipo di assorbente per incontinenza
      description: 'Definisce lo stile o la forma dell''assorbente (es.: salvaslip,
        protezione, assorbente di rinforzo)'
    inductance_tolerance:
      name: Tolleranza dell'induttanza
      description: Definisce la deviazione percentuale consentita dal valore nominale
        di induttanza
    industry_focus:
      name: Focus del settore
      description: Evidenzia i settori target di un prodotto, ad esempio istruzione
        o settore manifatturiero
    infant_age_group:
      name: Fascia di età del bambino
      description: Classifica i prodotti adatti a specifiche fasce di età dei neonati,
        ad es. neonati, 0-6 mesi
    inflation_method:
      name: Metodo di gonfiaggio
      description: Identifica il modo in cui un prodotto viene gonfiato, ad esempio
        in modo automatico o idrostatico
    ingredient_category:
      name: Categoria degli ingredienti
      description: Classifica il tipo di ingredienti in vitamine e integratori, ad
        es. fibre, erbe
    ingredient_origin:
      name: Origine dei componenti
      description: Specifica la fonte degli ingredienti del prodotto, ad es. naturale,
        sintetico
    ingredient_pathway:
      name: Derivazione degli ingredienti
      description: Indica se gli ingredienti della profumeria sono derivati naturalmente
        tramite separazione fisica dalla biomassa senza alterazione chimica, o sintetizzati
        con altri metodi
    ingredients:
      name: Ingredienti
      description: Specifica i componenti utilizzati nella formulazione di un prodotto,
        ad es. ossido di zinco, aloe vera
    ingress_protection_ip_rating:
      name: Grado di protezione ingresso (IP)
      description: Fornisce il grado di resistenza ufficiale all'acqua/polvere IP
        a cui è conforme la custodia (ad esempio, IP68)
    ink_application_technique:
      name: Tecnica di applicazione dell'inchiostro
      description: Descrive il metodo utilizzato per applicare l'inchiostro nelle
        arti e nei mestieri, ad esempio serigrafia
    ink_color:
      name: Colore dell’inchiostro
      description: Identifica il colore dell'inchiostro, in genere per le forniture
        per ufficio; ad es. nero, argento
    ink_form:
      name: Formato dell’inchiostro
      description: Descrive il metodo di imballaggio o consegna dell'inchiostro artistico,
        come penna o bottiglia
    ink_pattern:
      name: Modello di inchiostro
      description: Identifica il tema visivo delle penne o dei timbri, ad esempio
        geometrico o natalizio
    ink_type:
      name: Tipo di inchiostro
      description: Identifica il tipo di inchiostro utilizzato in un prodotto, ad
        esempio a base solvente o colorante
    inline_skating_style:
      name: Stile di pattinaggio in linea
      description: Definisce lo stile specifico di pattinaggio in linea per il quale
        il prodotto è progettato, ad esempio pattinaggio in linea ricreativo o di
        velocità
    input/output_ports:
      name: Porte di ingresso/uscita
      description: Identifica i tipi di porte disponibili su un dispositivo, ad esempio
        USB o jack di uscita
    input_connection:
      name: Connessione in ingresso
      description: Specifica il tipo di connessione di ingresso dei cavi audio, ad
        esempio 3,5 mm o RCA
    input_connection_type:
      name: Tipo di connessione di ingresso
      description: Specifica il connettore o lo standard di interfaccia accettato
        sul lato di ingresso del convertitore
    input_signal_interface:
      name: Interfaccia del segnale di ingresso
      description: Specifica il tipo o i tipi di connessioni di ingresso che il convertitore
        audio accetta
    input_video_interface:
      name: Interfaccia video di ingresso
      description: Specifica il tipo o i tipi di connettore video accettati come ingresso
        dal convertitore di scansione
    insole_length_type:
      name: Tipo di lunghezza della soletta
      description: Definisce la copertura o lo stile di lunghezza dell'inserto
    installation_accessories_included:
      name: Accessori di installazione inclusi
      description: Identifica eventuali strumenti o materiali didattici inclusi con
        la batteria per facilitare l'installazione
    installation_tools_included:
      name: Strumenti di installazione inclusi
      description: Elenca eventuali strumenti o materiali di consumo inclusi con il
        componente per facilitare l'installazione
    instruction_set_architecture:
      name: Instruction Set Architecture
      description: Definisce l'architettura del computer che può comprendere un processore,
        ad es. 32 bit
    instrument/accessory_finish:
      name: Finitura dello strumento/accessorio
      description: Descrive il trattamento superficiale o il colore di uno strumento
        musicale o di un accessorio, ad esempio placcato in oro o laccato
    instrument_accessory_material:
      name: Materiale accessorio dello strumento
      description: Identifica il materiale utilizzato negli accessori per strumenti
        musicali, come legno o ottone
    instrument_bow_material:
      name: Materiale dell'arco dello strumento
      description: Identifica il materiale utilizzato nella costruzione dell'arco
        di uno strumento musicale, ad esempio fibra di carbonio o legno brasiliano
    instrument_color:
      name: Colore dello strumento
      description: Identifica il colore di uno strumento musicale, come il nero o
        l'argento
    instrument_controller_type:
      name: Tipo di controller di strumenti
      description: Identifica lo strumento musicale simulato da un controller di gioco,
        ad esempio una chitarra o un microfono
    instrument_material:
      name: Materiale dello strumento
      description: Identifica il materiale principale utilizzato nella costruzione
        di uno strumento musicale, come legno d'acero o ottone
    instrument_part_material:
      name: Materiale della parte dello strumento
      description: Specifica il tipo di materiale utilizzato nelle parti dello strumento,
        ad esempio legno di ebano o placcato in oro
    instrument_pattern:
      name: Modello di strumento
      description: Descrive il design o il motivo visivo di uno strumento musicale,
        come un solido o una texture
    instrument_string_color:
      name: Colore delle corde dello strumento
      description: Identifica il colore delle corde degli strumenti musicali, come
        oro o argento
    instrument_string_material:
      name: Materiale delle corde dello strumento
      description: Specifica la composizione delle corde degli strumenti musicali,
        ad esempio bronzo o fluorocarburo
    instrument_string_pattern:
      name: Modello delle corde dello strumento
      description: Indica il motivo sulle corde della chitarra, ad esempio solido
        o geometrico
    instrument_support_type:
      name: Tipo di supporto dello strumento
      description: Identifica il tipo di supporto utilizzato per uno strumento musicale,
        come una cinghia per il collo o un leggio
    insulation_material:
      name: Materiale isolante
      description: Specifica la composizione dell'isolamento, ad esempio lana minerale
        o poliuretano (PU)
    integrated_led_lighting:
      name: Illuminazione LED integrata
      description: Indica se l'altoparlante incorpora illuminazione LED o RGB integrata
        e il suo tipo
    integrated_power/charging_options:
      name: Opzioni integrate di alimentazione/ricarica
      description: Specifica se il supporto include prese elettriche integrate e/o
        porte di ricarica USB, migliorando l'utilità per i dispositivi collegati
    integrated_stand_type:
      name: Tipo di supporto integrato
      description: Descrive lo stile del supporto o del meccanismo di supporto integrato
        nella custodia
    intended_application:
      name: Applicazione prevista
      description: Identifica l'uso specifico di vernici e macchie, ad es. porte,
        ponti/recinzioni
    intended_effect:
      name: Effetto previsto
      description: Descrive il beneficio di benessere primario per cui l'integratore
        di CBD è commercializzato per fornire
    intended_jewelry_type:
      name: Tipo di gioielli previsto
      description: Indica quali tipi di gioielli il supporto è progettato per contenere
        o esporre
    intended_surface:
      name: Superficie prevista
      description: Identifica la superficie primaria che il cuscinetto è progettato
        per proteggere
    intercom_communication_type:
      name: Tipo di comunicazione interfono
      description: Classifica il formato di comunicazione fondamentale supportato
        dall'unità
    intercom_wiring_type:
      name: Tipo di cablaggio interfono
      description: Specifica lo schema di cablaggio o comunicazione per cui è progettata
        un'unità altoparlante interfono
    interface_type:
      name: Tipo di interfaccia
      description: Identifica il tipo di connessione utilizzata da un prodotto, ad
        esempio Bluetooth o USB
    interior_lining_material:
      name: Materiale del rivestimento interno
      description: Identifica il materiale primario che riveste l'interno del portagioie,
        proteggendo i gioielli da graffi e usura
    interior_texture:
      name: Texture interna
      description: Definisce il modello della superficie interna che aiuta a creare
        schiuma all'interno della ciotola o tazza
    internal_drive_form_factor_supported:
      name: Fattore di forma dell'unità interna supportato
      description: Indica le dimensioni del disco rigido compatibili di un dispositivo,
        ad es. 2,5 pollici
    internet_radio_form_factor:
      name: Fattore di forma della radio internet
      description: Definisce lo stile fisico o l'orientamento di montaggio della radio
        internet
    intimate_apparel_features:
      name: Funzionalità dell'abbigliamento intimo
      description: Descrive le caratteristiche speciali dell'abbigliamento intimo,
        come design traspirante o vestibilità comoda
    inverter_type:
      name: Tipo di inverter
      description: Identifica il tipo di inverter di potenza nelle parti EV, come
        onda sinusoidale pura o onda quadra
    invitation_personalization_design:
      name: Design della personalizzazione dell’invito
      description: Definisce le caratteristiche del design di un invito, ad es. RSVP
        incluso, personalizzabile
    ironing_features:
      name: Funzionalità di stiratura
      description: Specifica le caratteristiche speciali di un ferro o di un sistema
        stirante, ad es. spegnimento automatico, colpo di vapore
    item_condition:
      name: Condizione dell’articolo
      description: Indica la qualità di un articolo, in genere veicoli o parti di
        veicoli; ad es. usato certificato, ristrutturato
    item_material:
      name: Materiale dell'articolo
      description: Specifica la sostanza primaria di un articolo, in genere per parti
        e accessori di veicoli; ad es. rame, fibra di vetro
    item_style:
      name: Stile dell'articolo
      description: Descrive il tema estetico o di design di un prodotto, ad esempio
        moderno o rustico
    j_cup_type:
      name: Tipo di J-Cup
      description: Definisce lo stile delle coppe J sulle attrezzature per il sollevamento
        pesi, ad es. piatte, sandwich
    jaw_advancement_adjustability:
      name: Regolabilità dell'avanzamento mandibolare
      description: Indica se e come la posizione della mascella inferiore fornita
        dal dispositivo può essere regolata dall'utente
    jaw_material:
      name: Materiale della ganascia
      description: Identifica il materiale utilizzato nella ganascia di uno strumento,
        come acciaio o titanio
    jewelry_cleaning_accessories_included:
      name: Accessori per la pulizia dei gioielli inclusi
      description: Elenca eventuali strumenti o accessori extra forniti con il detergente
        (ad es., spazzole, vassoi, panni per lucidare)
    jewelry_cleaning_purpose:
      name: Scopo della pulizia dei gioielli
      description: Indica la funzione primaria prevista del prodotto (ad es., rimozione
        dell'ossidazione, lucidatura, rivestimento protettivo)
    jewelry_finding_type:
      name: Tipo di ricerca di gioielli
      description: Identifica il componente specifico utilizzato per la creazione
        di gioielli, come il tappo per perline o gli anellini
    jewelry_material:
      name: Materiale per gioielli
      description: Identifica il materiale principale utilizzato negli articoli di
        gioielleria, ad esempio oro o smalto
    jewelry_project_type:
      name: Tipo di progetto gioielleria
      description: Specifica il tipo di progetto di gioielleria, ad esempio realizzazione
        di collane o lavori in filo metallico
    jewelry_set_type:
      name: Tipo di set di gioielli
      description: Identifica il tipo di gioiello in un kit per la creazione di gioielli,
        ad esempio anello o collana
    jewelry_steam_cleaner_features:
      name: Caratteristiche del pulitore a vapore per gioielli
      description: Elenca caratteristiche integrate notevoli o funzioni di sicurezza
        che differenziano i modelli
    jewelry_type:
      name: Tipo di gioiello
      description: Distingue tra i tipi di gioielleria, ad esempio gioielleria raffinata
        o imitazione
    joint_connection:
      name: Collegamento congiunto
      description: Specifica la connessione congiunta nelle stecche da biliardo, ad
        es. composita, senza giunto
    joint_face_type:
      name: Tipo di faccia congiunta
      description: Specifica il tipo di faccia del giunto sulle aste billiard, ad
        esempio piena o pilotata
    joint_style:
      name: Tipo di giunzione
      description: Definisce il tipo di giunto utilizzato nelle stecche da biliardo,
        ad esempio uni-loc o radiale
    journey_type:
      name: Tipo di viaggio
      description: Specifica il tipo di viaggio coperto dal biglietto in base al numero
        di viaggi e alla direzione di viaggio
    joystick_mounting_style:
      name: Stile di montaggio del joystick
      description: Indica come l'assemblaggio del joystick è fissato a un pannello
        di controllo o cabinet
    joystick_sensor_technology:
      name: Tecnologia del sensore del joystick
      description: Identifica la tecnologia di rilevamento principale utilizzata per
        rilevare movimento o posizione
    jump_rope_design:
      name: Progettazione della corda per saltare
      description: Descrive il tipo di corda per saltare, ad esempio normale o intelligente
    jumping_surface_color:
      name: Colore della superficie di salto
      description: Identifica il colore della superficie di salto del trampolino,
        come il blu o il nero
    jumping_surface_material:
      name: Materiale della superficie di salto
      description: Specifica il tessuto dell'area di salto del trampolino, ad es.
        sintetico, polipropilene
    jumping_surface_pattern:
      name: Modello di superficie di salto
      description: Identifica il disegno o la stampa sulla superficie di salto di
        un trampolino, ad esempio stelle o strisce
    karaoke_modes:
      name: Modalità di karaoke
      description: Specifica il tipo di performance karaoke, ad esempio singolo o
        duetto
    kerosene_application:
      name: Applicazione del cherosene
      description: Identifica l'uso specifico del cherosene, ad esempio per riscaldatori
        o carburante per aerei
    key_purpose:
      name: Funzione principale
      description: Specifica dove deve essere utilizzata una chiave o una chiave grezza,
        ad es. porta, lucchetto
    keyboard_action:
      name: Azione della tastiera
      description: Specifica la sensazione dei tasti del pianoforte, ad esempio azione
        del martello o tasti pesati
    keyboard_assembly_type:
      name: Tipo di assemblaggio della tastiera
      description: Definisce l'assemblaggio fisico fornito (ad es., tastiera autonoma,
        poggiapolsi con tastiera, set di tasti individuali)
    keyboard_backlight_type:
      name: Tipo di retroilluminazione della tastiera
      description: Descrive in dettaglio la tecnologia o lo stile di illuminazione
        utilizzato per i tasti della tastiera o la scocca
    keyboard_format:
      name: Formato della tastiera
      description: Definisce le dimensioni e il layout di una tastiera, ad esempio
        full-size o compatta
    keyboard_key_type:
      name: Tipo di tasto della tastiera
      description: Descrive la risposta o la sensazione dei tasti sulle tastiere musicali,
        come pesate o semi-pesate
    keyboard_language:
      name: Lingua della tastiera
      description: Specifica il layout della lingua di una tastiera, ad esempio ENG
        (inglese) o DEU (tedesco)
    keyboard_layout:
      name: Layout della tastiera
      description: Specifica la disposizione dei tasti su una tastiera, ad es. QWERTY,
        Workman
    keyboard_mounting_style:
      name: Stile di montaggio della tastiera
      description: Definisce il metodo di montaggio della piastra interna che influenza
        il suono e la sensazione delle tastiere meccaniche
    keyboard_port_type:
      name: Tipo di porta della tastiera
      description: Specifica il tipo di porta per la connettività della tastiera,
        ad esempio USB tipo C
    keyboard_specialized_features:
      name: Funzionalità specializzate della tastiera
      description: Identifica le caratteristiche uniche di una tastiera, come angolazione
        regolabile o retroilluminazione
    keyboard_switch_type:
      name: Tipo di interruttore da tastiera
      description: Specifica lo stile di feedback della tastiera, ad esempio tattile
        o cliccabile
    keyboard_type:
      name: Tipo di tastiera
      description: Specifica il design e la funzionalità di una tastiera, ad es. standard,
        retroilluminata
    keycap_legend_printing_method:
      name: Metodo di stampa della legenda del copritasto
      description: Descrive come le legende sono applicate ai copritasti, influenzando
        longevità e aspetto
    keycap_material:
      name: Materiale del copritasto
      description: Indica il materiale principale o il processo di produzione dei
        copritasti che influisce su durabilità, texture e legende
    keycap_profile:
      name: Profilo del copritasto
      description: Specifica la famiglia di forme o sculture del set di copritasti,
        che influenza la sensazione di digitazione e l'estetica
    keypad_style:
      name: Stile della tastiera
      description: Definisce il metodo di input per le tastiere, ad esempio digitale
        o alfanumerico
    keystone_correction_type:
      name: Tipo di correzione trapezoidale
      description: Descrive il tipo di correzione trapezoidale o geometrica che il
        proiettore supporta per eliminare la distorsione trapezoidale (ad es., verticale
        manuale, automatica a quattro punti)
    kiln_features:
      name: Caratteristiche del forno
      description: Specifica le capacità funzionali e le caratteristiche di design
        del forno
    kiln_loading_style:
      name: Stile di caricamento del forno
      description: Specifica il metodo con cui gli oggetti vengono posizionati e rimossi
        dalla camera del forno
    kit_construction_type:
      name: Tipo di kit di costruzione
      description: Specifica il tessuto dell'area di salto di un trampolino, ad es.
        sintetico, polipropilene
    kitchen/dining_furniture_items_included:
      name: Mobili da cucina/sala da pranzo inclusi
      description: Identifica i pezzi di arredamento specifici inclusi in un set,
        come le sedie da pranzo o l'isola della cucina
    kitchen_utensil_items_included:
      name: Utensili da cucina inclusi
      description: Identifica gli strumenti inclusi in un set di utensili da cucina,
        ad esempio frusta o pinze
    kitesurfing_style:
      name: Stile del kitesurf
      description: Definisce lo stile specifico di kitesurf per il quale il prodotto
        è progettato, ad esempio il wave riding
    knee_brace_style:
      name: Stile del tutore per ginocchio
      description: Definisce il design strutturale del tutore, riflettendo come viene
        indossato e il livello di supporto fornito
    kneeboard_features:
      name: Funzionalità del kneeboard
      description: Descrive le caratteristiche specifiche di un kneeboard, come cinghia
        regolabile o antiscivolo
    knife_type:
      name: Tipo di coltello
      description: Classifica i coltelli in base all'uso previsto o al design, ad
        esempio multiutensile o EDC
    knitting/padding_project_type:
      name: Tipo di progetto di lavoro a maglia/imbottitura
      description: Identifica l’uso previsto dei materiali di articoli a maglia o
        imbottiture, ad es. impuntitura, realizzazione di guanciali
    knitting_project_type:
      name: Tipo di progetto di lavoro a maglia
      description: Specifica il tipo di progetto di lavoro a maglia, ad esempio realizzazione
        di cuscini o di peluche
    knob/handle_design:
      name: Design del pomello/maniglia
      description: Descrive lo stile dell'hardware del mobile, ad esempio manopola
        rotonda o barra di trazione
    knob_function:
      name: Funzione della manopola
      description: Specifica la funzione delle manopole dell'amplificatore, ad esempio
        guadagno o presenza
    knob_style:
      name: Stile della manopola
      description: Descrive il design delle manopole sugli amplificatori per strumenti
        musicali, come standard o retrò/vintage
    knot_shape:
      name: Forma del nodo
      description: Specifica la forma o il profilo complessivo del nodo o della testina
        della spazzola
    labeling_project_type:
      name: Etichettatura del tipo di progetto
      description: Specifica lo scopo di creazione delle etichette da cucire, come
        realizzazione di tessuti per la casa o creazione di regali personalizzati
    laboratory_freezer_design:
      name: Design del congelatore da laboratorio
      description: Descrive la configurazione di un congelatore da laboratorio, ad
        esempio verticale o orizzontale
    lacrosse_equipment_included:
      name: Attrezzatura da lacrosse inclusa
      description: Specifica gli articoli in un set di attrezzatura da lacrosse, ad
        esempio bastone da lacrosse o spalline
    ladder_type:
      name: Tipo di scala
      description: Identifica lo stile della scala per barca, ad esempio fissa o telescopica
    lamination_mode:
      name: Modalità di laminazione
      description: Identifica il tipo di processo di laminazione utilizzato, come
        la laminazione a freddo o a caldo
    lamination_type:
      name: Tipo di plastificazione
      description: Identifica se la superficie del grafico o del modello è plastificata
        e, in caso affermativo, se è su un solo lato o su entrambi i lati
    lamp_assembly_type:
      name: Tipo di assemblaggio lampada
      description: Specifica se il prodotto è una lampadina nuda, una lampada con
        alloggiamento, un doppio pacchetto o un'altra configurazione di assemblaggio
    lamp_quality_grade:
      name: Grado di qualità della lampada
      description: Indica se la lampada è OEM originale, utilizza una lampadina OEM
        in alloggiamento o è un ricambio/compatibile completamente compatibile
    lamp_type:
      name: Tipo di lampada
      description: Specifica la sorgente luminosa negli ingranditori fotografici,
        ad es. luce fredda, dicroica
    lancet_mechanism_type:
      name: Tipo di meccanismo della lancetta
      description: Definisce il meccanismo operativo o il design di sicurezza delle
        lancette (ad es., retrattile di sicurezza, attivato a pressione)
    language:
      name: Lingua
      description: Specifica la lingua utilizzata o la lingua compatibile, ad es.
        inglese, multilingue
    language_version:
      name: Versione in lingua
      description: Specifica la versione in lingua di un prodotto multimediale, ad
        esempio ENG-US o ARA-arabo
    laptop_cable_type:
      name: Tipo di cavo del laptop
      description: Identifica lo scopo funzionale del cavo all'interno del laptop
    laptop_housing_part_type:
      name: Tipo di parte dell'alloggiamento del laptop
      description: Specifica quale componente esterno viene fornito (ad es., base
        inferiore, poggiapolsi, cornice)
    laser_color:
      name: Colore del laser
      description: Identifica il colore di un puntatore laser, come rosso o verde
    laser_light_source:
      name: Sorgente della luce laser
      description: Specifica la tecnologia della luce utilizzata nei puntatori laser,
        ad esempio LED
    laser_pattern:
      name: Modello laser
      description: Identifica il disegno o il motivo prodotto da un laser, come stelle
        o animali
    lathe_application:
      name: Applicazione del tornio
      description: Specifica il tipo di lavoro per cui è progettato un tornio, come
        la filatura dell'acrilico o la lavorazione del vetro
    laundry_detergent_features:
      name: Funzionalità del detersivo per bucato
      description: Descrive le caratteristiche speciali del detersivo per bucato,
        come protezione del colore o rimozione delle macchie
    lead_grade:
      name: Durezza della mina
      description: Specifica il grado di piombo negli strumenti da scrittura, ad es.
        H, 9B
    leash_design:
      name: Progettazione del guinzaglio
      description: Descrive la funzionalità dei guinzagli per animali domestici, come
        staccabili o retrattili
    leather/vinyl_texture:
      name: Trama della pelle/vinile
      description: Descrive la sensazione della superficie dei prodotti in pelle o
        vinile, come liscia o granulosa
    leather_type:
      name: Tipo di pelle
      description: Specifica la fonte animale o il tipo di pelle utilizzato nel prodotto
        (ad esempio, pelle bovina, pelle di vitello, coccodrillo, pitone, sintetico)
    lectern_mounting_type:
      name: Tipo di montaggio del leggio
      description: Specifica lo stile di installazione di un leggio, come da tavolo
        o da pavimento
    led_light_mode:
      name: Modalità luce LED
      description: Elenca le modalità operative selezionabili che combinano diversi
        spettri o intensità (ad es., blu, rosso, blu e rosso)
    leg_color:
      name: Colore della gamba
      description: Definisce la tonalità delle gambe di un prodotto, ad es. bianco,
        marrone
    leg_lock_type:
      name: Tipo di blocco delle gambe
      description: Identifica il tipo di blocco della gamba utilizzato negli accessori
        elettronici, in genere bastoncini per selfie; ad es., la serratura a rotazione
    leg_material:
      name: Materiale della gamba
      description: Specifica il materiale utilizzato per le gambe di un prodotto,
        ad esempio legno di ciliegio o bambù
    leg_pattern:
      name: Modello delle gambe
      description: 'Definisce il disegno o la stampa sulle gambe del prodotto, ad
        esempio animali o geometrici '
    leg_sections:
      name: Sezioni delle gambe
      description: Indica il numero di sezioni delle gambe negli accessori elettronici,
        in genere bastoncini per selfie; ad es. 5+
    legend_type:
      name: Tipo di legenda
      description: Indica se il marcatore è vuoto o prestampato con numeri, lettere,
        simboli o altri contrassegni
    length_adjustability:
      name: Regolabilità della lunghezza
      description: Indica se la lunghezza della cinghia o catena può essere modificata
        dall'utente o è fissa
    lens/slide_material:
      name: Materiale delle lenti/diapositive
      description: Specifica il materiale utilizzato nella realizzazione di lenti
        o vetrini, come plastica o vetro
    lens_cap_compatible_device:
      name: Dispositivo compatibile con il copriobiettivo
      description: Specifica l'attrezzatura compatibile con i copriobiettivi, ad esempio
        fotocamera monoculare o digitale
    lens_case_accessories_included:
      name: Accessori per custodia lenti inclusi
      description: Elenca gli articoli aggiuntivi confezionati con la custodia (ad
        es., pinzette, flacone di soluzione)
    lens_characteristic:
      name: Caratteristica delle lenti
      description: Elenca le caratteristiche funzionali speciali applicate alle lenti
        (ad es., blocco luce blu, UV400)
    lens_coating:
      name: Rivestimento della lente
      description: Specifica il tipo di rivestimento delle lenti degli occhiali, ad
        es. antiriflesso, antigraffio
    lens_color:
      name: Colore dell’obiettivo
      description: Specifica il colore delle lenti degli occhiali, ad esempio giallo
        o nero
    lens_color_combination:
      name: Combinazione colore lenti
      description: Specifica l'abbinamento di colori delle lenti utilizzato per gli
        occhiali 3D anaglifi
    lens_configuration:
      name: Configurazione dell’obiettivo
      description: Specifica l'impostazione dell'obiettivo in elementi quali lenti
        di ingrandimento, ad esempio singolo o multiplo
    lens_filter_category:
      name: Categoria del filtro della lente
      description: Specifica la categoria di filtro standard europea (0-4) che classifica
        le lenti in base alla loro densità di colorazione e alle condizioni di illuminazione
        per cui sono adatte
    lens_filter_effects:
      name: Effetti del filtro dell’obiettivo
      description: Descrive gli effetti specifici forniti da un filtro dell'obiettivo,
        come correzione del colore o macro
    lens_filter_type:
      name: Tipo di filtro dell’obiettivo
      description: Specifica la categoria del filtro per gli obiettivi della fotocamera,
        ad es. gradiente, densità neutra
    lens_kit_accessories_included:
      name: Kit di accessori per lenti inclusi
      description: Elenca gli articoli supplementari forniti con l'obiettivo o il
        kit di filtri del telefono, consentendo all'utenza di sapere esattamente cosa
        acquista e di confrontare i diversi pacchetti.
    lens_material:
      name: Materiale delle lenti
      description: Identifica il materiale principale utilizzato per gli elementi
        ottici o l'alloggiamento della lente, ad esempio vetro ottico, plastica o
        lega di alluminio
    lens_pattern:
      name: Modello di lente
      description: Descrive il disegno o l'aspetto visivo delle lenti degli occhiali,
        ad esempio tinta unita o trama
    lens_polarization:
      name: Polarizzazione della lente
      description: Indica il tipo di polarizzazione delle lenti negli occhiali, ad
        es. fotopolarizzate
    lens_protector_coverage_style:
      name: Stile di copertura della protezione dell'obiettivo
      description: Definisce il fattore di forma fisica o il design della copertura
        di una protezione per l'obiettivo della fotocamera di un telefono cellulare.
    lens_protector_features:
      name: Caratteristiche della protezione dell'obiettivo
      description: Elenca le caratteristiche funzionali speciali offerte dal protettore.
    lens_refractive_index:
      name: Indice di rifrazione della lente
      description: Specifica l'indice di rifrazione numerico (ad es., 1.50, 1.60,
        1.67) che è direttamente correlato allo spessore e al peso della lente
    lens_storage_type:
      name: Tipo di conservazione dell'obiettivo
      description: Descrive il tipo di custodia per gli obiettivi delle macchine fotografiche,
        come custodia per obiettivi o custodia per obiettivi
    lens_tint_type:
      name: Tipo di colorazione della lente
      description: Descrive la colorazione applicata alla lente per visibilità di
        manipolazione o scopi cosmetici
    lens_type:
      name: Tipo di lente
      description: Specifica il tipo di lente nei prodotti di ottica, come polarizzata
        o progressiva
    license_type:
      name: Tipo di licenza
      description: Specifica il tipo di licenza software, ad esempio open source o
        acquisto una tantum
    lid_material:
      name: Materiale del coperchio
      description: Identifica il tipo di materiale utilizzato nel coperchio del prodotto,
        ad esempio vetro o acciaio inossidabile
    lid_type:
      name: Tipo di coperchio
      description: Specifica il tipo di coperchio utilizzato, ad esempio flip-top
        o snap-on
    life_jacket_features:
      name: Funzionalità del giubbotto di salvataggio
      description: Evidenzia le caratteristiche uniche dei giubbotti di salvataggio,
        come riflettenti o galleggianti
    light_attachment_type:
      name: Tipo di fissaggio della luce
      description: Descrive come si collega la luce di un libro, ad esempio flessibile
        o fissa
    light_color:
      name: Colore della luce
      description: Definisce il colore o la tonalità della luce, ad esempio bianco
        o multicolore
    light_control:
      name: Controllo della luce
      description: Definisce il livello di blocco della luce dovuto alle tende delle
        finestre, ad es. oscuramento, velatura
    light_design:
      name: Design leggero
      description: Descrive il tipo di design della luce negli accessori della fotocamera,
        ad esempio LED o anello
    light_exposure_modes:
      name: Modalità di esposizione alla luce
      description: Specifica le opzioni di regolazione della luce nelle fotocamere,
        come AE con priorità dell'otturatore o AE con priorità del diaframma
    light_filtering:
      name: Filtraggio dell'acqua
      description: Specifica le capacità di filtraggio della luce di un prodotto,
        ad esempio diffusione o oscuramento
    light_options:
      name: Opzioni di luce
      description: Specifica le caratteristiche di illuminazione di un prodotto, ad
        esempio la luce soffusa o il cambio di colore
    light_pattern:
      name: Modello leggero
      description: Definisce il tema visivo dei prodotti per l'illuminazione, ad esempio,
        geometrico o arcobaleno
    light_rejection_type:
      name: Indica se e come lo schermo respinge la luce ambientale o del soffitto,
        migliorando il contrasto dell'immagine in ambienti luminosi
      description: Grado di qualità della lampada
    light_source:
      name: Sorgente luminosa
      description: Identifica il tipo di lampadina utilizzata in un prodotto, ad esempio
        LED o fluorescente
    light_spectrum:
      name: Spettro luminoso
      description: Definisce la gamma di lunghezze d'onda della luce che un prodotto
        può produrre, ad es. luce blu, luce infrarossa
    light_temperature:
      name: Temperatura della luce
      description: Definisce le caratteristiche cromatiche delle sorgenti luminose,
        ad esempio il bianco caldo o la luce del giorno
    light_therapy_device_form_factor:
      name: Fattore di forma del dispositivo per terapia della luce
      description: Descrive lo stile fisico o la configurazione del dispositivo (ad
        es., pannello, maschera, portatile)
    light_type:
      name: Tipo di luce
      description: Identifica il tipo specifico di luce utilizzata nelle imbarcazioni,
        ad es. navigazione, subacquea
    lighting_features:
      name: Funzionalità di illuminazione
      description: Descrive le caratteristiche speciali dell'illuminazione, come luminosità
        regolabile o illuminazione a LED
    lighting_options:
      name: Opzioni di illuminazione
      description: Specifica il tipo di illuminazione per la segnaletica, ad esempio
        illuminata o non illuminata
    lighting_type:
      name: Tipo di illuminazione
      description: Descrive eventuali funzioni di illuminazione integrate nell'headset
    line/rope_type:
      name: Tipo di corda/cima
      description: Identifica lo stile di costruzione delle linee di ancoraggio o
        delle corde, come tre trefoli o doppia treccia
    line_spacing_options:
      name: Opzioni di interlinea
      description: Identifica le opzioni di interlinea, in genere per le macchine
        da scrivere; ad es. doppio, regolabile
    liner_features:
      name: Funzionalità della fodera
      description: Descrive le caratteristiche specifiche dei rivestimenti, ad esempio
        impermeabili o biodegradabili
    lip_balm_tint_level:
      name: Livello di colorazione del balsamo labbra
      description: Classifica il livello di colorazione o intensità del colore che
        il balsamo fornisce
    lip_gloss_applicator_type:
      name: Tipo di applicatore del lucidalabbra
      description: Identifica lo stile dell'applicatore incluso con il lucidalabbra,
        che influisce sulla facilità di applicazione e sulla preferenza dell'utente
    lip_gloss_effect:
      name: Effetto del lucidalabbra
      description: Descrive l'effetto o la finitura fornita da un lucidalabbra, ad
        es. levigante, rimpolpante
    lip_gloss_formulation:
      name: Formulazione del lucidalabbra
      description: Definisce la texture o il formato principale del lucidalabbra
    lip_liner_design:
      name: Design della matita per labbra
      description: Identifica il tipo di matite per labbra, come retrattile o fisso
    lip_makeup_opacity:
      name: Opacità del trucco labbra
      description: Indica il livello di copertura o opacità del prodotto una volta
        applicato
    lip_plate_material:
      name: Materiale dei crini
      description: Identifica il materiale utilizzato per la piastra del labbro di
        un flauto, come argento o legno
    lipstick_coverage:
      name: Copertura del rossetto
      description: Descrive il livello di opacità del colore fornito dal rossetto
        (ad es., trasparente, media, completa)
    lipstick_effect:
      name: Effetto del rossetto
      description: Descrive l'effetto o la finitura fornita da un rossetto, ad es.
        levigante, rimpolpante
    liqueur_variety:
      name: Varietà di liquore
      description: Classifica i liquori in base ai loro profili aromatici primari,
        ad es. nocciola, panna
    livestock_food_ingredients:
      name: Ingredienti degli alimenti per il bestiame
      description: Specifica gli ingredienti primari nei mangimi per animali, ad esempio
        orzo o farina di soia
    lnb_output:
      name: Uscita LNB
      description: Specifica il numero di connessioni del ricevitore satellitare,
        ad esempio singola o quadrupla
    lnb_technology:
      name: Tecnologia LNB
      description: Classifica il tipo di tecnologia degli LNB satellitari, ad esempio
        universale o a basso rumore
    load_capacity:
      name: Capacità di carico
      description: Specifica il limite di peso che un prodotto può gestire, ad esempio
        leggero o pesante
    loading_ramp_type:
      name: Tipo di rampa di carico
      description: Identifica lo stile della rampa di carico per i veicoli, come piega
        singola o tripla
    loading_type:
      name: Tipo di caricamento
      description: Specifica la modalità di caricamento degli elettrodomestici per
        la lavanderia, ad esempio caricamento frontale o dall'alto
    lock_placement:
      name: Posizionamento del blocco
      description: Identifica la posizione del lucchetto sulle parti del motore della
        moto d'acqua, ad esempio fuoribordo o entrobordo
    lock_type:
      name: Tipo di blocco
      description: Specifica il meccanismo di blocco utilizzato da un prodotto, ad
        esempio chiave o codice
    locking_mechanism:
      name: Meccanismo di blocco
      description: Specifica il tipo di serratura utilizzata, in genere per i prodotti
        di sicurezza; ad es., chiusura automatica, scorrimento
    logic_family:
      name: Famiglia logica
      description: Identifica la famiglia logica o la tecnologia dei semiconduttori
        dell'IC
    lovibond:
      name: Lovibond
      description: Indica l'intensità del colore dei cereali e dei malti per la produzione
        della birra, ad esempio chiari o scuri
    lubricant_application:
      name: Applicazione del lubrificante
      description: Definisce le aree di applicazione adatte per il lubrificante personale,
        ad esempio massaggio o vaginale
    lubricant_composition:
      name: Composizione del lubrificante
      description: Definisce l'ingrediente base dei lubrificanti personali, ad esempio
        a base d'acqua o a base di silicone
    lubricant_dispenser_type:
      name: Tipo di dispenser del lubrificante
      description: Identifica il tipo di imballaggio o contenitore per i lubrificanti,
        come fusto o bottiglia
    lubricant_effect:
      name: Effetto del lubrificante
      description: Indica qualsiasi effetto funzionale o stile fornito dalla lubrificazione
        del preservativo
    lubricant_form:
      name: Formato del lubrificante
      description: Descrive la consistenza di un lubrificante, ad esempio gel o pasta
    luggage/bag_closure:
      name: Chiusura del bagaglio/borsa
      description: Identifica il tipo di chiusura utilizzata su valigie o borse, ad
        esempio cerniera o bottone a pressione
    lumber/wood_type:
      name: Tipo di legname/legno
      description: Identifica il tipo specifico di legno o legname utilizzato in un
        prodotto, come quercia o pino
    lyre/flip_folder_attachment_type:
      name: Tipo di accessorio per letturino/raccoglitore girevole
      description: Specifica il tipo di attacco per lire musicali e cartellette a
        fogli mobili, come cinghia o morsetto per lira
    m_2_drive_length_supported:
      name: Lunghezza dell'unità M.2 supportata
      description: Specifica quali lunghezze di schede M.2 l'involucro o l'adattatore
        può accettare
    magnet_type:
      name: Tipo di magnete
      description: Identifica il tipo di magnete utilizzato in un prodotto, ad es.
        ceramica, titanio
    magnification:
      name: Ingrandimento
      description: Specifica il potere di ingrandimento di un prodotto, ad esempio
        1x o 100x
    magsafe_compatibility:
      name: Compatibilità MagSafe
      description: Indica se l'accessorio supporta l'attacco magnetico MagSafe di
        Apple o l'ecosistema di ricarica
    makeup_brush_application:
      name: Applicazione del pennello per trucco
      description: Specifica l'uso cosmetico principale o l'area per cui il pennello
        è progettato (ad es., fondotinta, ombretto, contorno)
    makeup_features:
      name: Funzionalità del trucco
      description: Evidenzia le caratteristiche chiave dei cosmetici, ad esempio elevata
        pigmentazione o assenza di profumo
    makeup_shade:
      name: Tonalità del trucco
      description: Descrive la tonalità dei cosmetici, come rosa medio o marrone intenso
    mallet_material:
      name: Materiale del martello
      description: Identifica il tipo di materiale utilizzato nelle bacchette per
        percussioni, ad esempio ottone o gomma
    management_type:
      name: Tipo di gestione
      description: Descrive il livello di gestibilità del dispositivo (ad es., completamente
        gestito, gestito intelligente, non gestito), in modo che l'utenza possa abbinare
        le capacità del prodotto ai requisiti di rete
    mandibular_device_fitting_method:
      name: Metodo di adattamento del dispositivo mandibolare
      description: Descrive come il dispositivo viene adattato o modellato sui denti
        dell'utente
    mandolin_back_shape:
      name: Forma del dorso del mandolino
      description: Specifica la curvatura e il design del dorso del mandolino, come
        il dorso piatto o quello arcuato
    manufacturer_type:
      name: Tipo di produttore
      description: Specifica la fonte delle parti o degli accessori del veicolo, ad
        esempio originali o di terze parti
    map_update_policy:
      name: Politica di aggiornamento delle mappe
      description: Indica come vengono forniti o prezzati gli aggiornamenti delle
        mappe per il dispositivo
    marine_navigator_features:
      name: Funzionalità del navigatore marino
      description: Specifica le funzionalità degli strumenti di navigazione marina,
        ad esempio touchscreen o impermeabili
    marker_format:
      name: Formato del marcatore
      description: Definisce lo stile fisico o la costruzione del marcatore
    marker_text_color:
      name: Colore del testo del marcatore
      description: Specifica il colore della legenda stampata o del testo sulla superficie
        del marcatore (distinto dal colore del corpo del marcatore)
    marker_tip_design:
      name: Design della punta del pennarello
      description: Descrive la forma della punta di un pennarello, ad esempio a forma
        di proiettile o di scalpello
    marquee_substrate:
      name: Substrato del marquee
      description: Specifica il mezzo fisico su cui è stampata o fornita l'opera d'arte
        (ad es., pellicola traslucida, acrilico stampato sul retro, decalcomania in
        vinile)
    mascara_brush_shape:
      name: Forma dello spazzolino del mascara
      description: Specifica la forma o il design della bacchetta o dello spazzolino
        del primer integrato, che influenza fortemente l'applicazione e i risultati
    mascara_effect:
      name: Effetto del mascara
      description: Descrive il risultato o la caratteristica desiderata del mascara,
        ad es. incurvare, allungare
    mascara_formulation:
      name: Formulazione del mascara
      description: Indica la composizione di base del prodotto o la tecnologia speciale
        (ad es., liquido, infuso di fibre, tubolare) che influisce su texture, tenuta
        e rimozione
    mask_cushion_material:
      name: Materiale del cuscinetto della maschera
      description: Descrive il materiale specifico utilizzato per il cuscinetto o
        la guarnizione della maschera
    mask_size:
      name: Taglia della maschera
      description: Specifica la designazione di dimensione fornita dal produttore
    mask_type:
      name: Tipo di mascherina
      description: Specifica la progettazione delle maschere, in genere per le cure
        respiratorie; ad es. orale, nasale
    masonry_material:
      name: Materiale per muratura
      description: Specifica la composizione degli elementi in muratura, ad esempio
        cemento o pietra calcarea
    masonry_product_form:
      name: Formato del prodotto di muratura
      description: Specifica la forma dei prodotti in muratura, ad esempio pasta o
        polvere
    massage_area:
      name: Zona di massaggio
      description: Specifica la parte del corpo a cui è destinato il prodotto, ad
        esempio viso, zona bikini
    massage_mechanism_dimensionality:
      name: Dimensionalità del meccanismo di massaggio
      description: Specifica il numero di assi di movimento in cui operano i rulli
        di massaggio (ad es., 2D, 3D, 4D, 5D)
    massage_stone_texture:
      name: Struttura della pietra per massaggio
      description: Descrive la sensazione superficiale delle pietre da massaggio,
        come liscia o ruvida
    massage_technique:
      name: Tecnica del massaggio
      description: Definisce le modalità di massaggio offerte da un prodotto, ad es.
        percussione, tessuto profondo
    mat/rug_shape:
      name: Forma di tappetino/tappeto
      description: Descrive la forma di stuoie o tappeti, ad esempio rotondi o quadrati
    mat_base_material:
      name: Materiale base opaco
      description: Specifica il tipo di materiale utilizzato per la base dei tappetini,
        ovvero sughero, memory foam
    mat_features:
      name: Funzionalità del tappetino
      description: Descrive le caratteristiche specifiche dei tappetini per la casa
        o l'ufficio, ad esempio antiscivolo o impermeabilità
    material:
      name: Materiale
      description: Definisce il materiale principale di un prodotto, ad esempio cotone
        o lana
    material_firmness:
      name: Solidità del materiale
      description: Descrive la durezza o la morbidezza di un prodotto, ad es. rigido,
        flessibile
    material_hardness:
      name: Durezza del materiale
      description: Definisce la fermezza del prodotto, in genere per attrezzature
        sportive o per il fitness; ad es. extra morbido, alta resistenza
    material_origin:
      name: Origine del materiale
      description: Indica la forma o lo stato in cui vengono forniti i materiali preziosi
        (ad esempio, gioielli sfusi/non montati, finiti, buoni regalo stampati/digitali)
    material_treatment:
      name: Trattamento dei materiali
      description: Specifica i trattamenti chimici o fisici applicati ai materiali
        per la conservazione o la sicurezza (ad esempio, trattati termicamente, fumigati,
        trattati chimicamente)
    maternity_clothing_features:
      name: Funzionalità dell'abbigliamento premaman
      description: Descrive le caratteristiche uniche dell'abbigliamento premaman,
        ad es. spazio per la crescita della pancia, coppe di sostegno
    maternity_sleepwear_style:
      name: Stile pigiama premaman
      description: Specifica lo stile degli articoli di indumenti da notte premaman,
        come tutine o camicie per il sonno
    mattress_features:
      name: Funzionalità del materasso
      description: Evidenzia le caratteristiche speciali di un materasso, ad esempio
        funzione ipoallergenica o rinfrescante
    maximum_bit_depth:
      name: Profondità di bit massima
      description: Definisce la lunghezza massima della parola digitale (in bit) supportata
        dal convertitore, che influenza la gamma dinamica e la risoluzione
    maximum_magnification:
      name: Ingrandimento massimo
      description: Indica il fattore di ingrandimento massimo che un microscopio può
        raggiungere, ad esempio 10x o 100x
    maximum_reel_diameter_supported:
      name: Diametro massimo della bobina supportato
      description: Specifica il diametro più grande della bobina che il deck può ospitare
    measured_parameters:
      name: Parametri misurati
      description: Elenca le metriche elettriche o della batteria che il dispositivo
        può misurare o visualizzare.
    measuring_method:
      name: Metodo di misurazione
      description: Definisce la tecnica utilizzata per quantificare il grasso corporeo,
        ad es. ottica, calibri
    measuring_tool_features:
      name: Funzionalità dello strumento di misura
      description: Descrive le caratteristiche speciali degli strumenti di misurazione,
        come fotocamera incorporata o portatile
    measuring_type:
      name: Tipo di misurazione
      description: Specifica il metodo di misurazione dei dispositivi sanitari, ad
        es. fronte, dito
    meat_cut:
      name: Taglio di carne
      description: Aiuta a identificare il taglio o lo stile specifico della carne,
        ad es. hamburger, ali
    meat_type:
      name: Tipo di carne
      description: Identifica la fonte degli articoli a base di carne, ad es. a base
        vegetale, pollo
    media_access:
      name: Accesso ai contenuti multimediali
      description: Definisce il modo in cui l'utenza può accedere ai media, ad es.
        abbonamento digitale, cartaceo e online
    media_content_type:
      name: Tipo di contenuto multimediale
      description: Identifica il genere o la categoria dei contenuti multimediali,
        come reality TV o cabaret
    media_format:
      name: Formato multimediale
      description: Definisce i formati multimediali compatibili per un dispositivo,
        ad esempio vinile o VHS
    media_physical_size:
      name: Taglia fisica del supporto
      description: Specifica la dimensione fisica standardizzata o il fattore di forma
        del supporto vergine.
    media_player_form_factor:
      name: Fattore di forma del lettore multimediale
      description: Descrive lo stile fisico del dispositivo, offrendo una guida nella
        scelta tra stick compatti e set-top box più grandi
    media_section:
      name: Sezione media
      description: Identifica la categoria specifica di un giornale o una rivista,
        come sport o politica
    media_theme:
      name: Tema dei contenuti multimediali
      description: Classifica i contenuti multimediali in base al loro obiettivo principale,
        ad esempio viaggi o giochi
    medical_alarm_features:
      name: Funzionalità di allarme medico
      description: Descrive le funzionalità di un sistema di allarme medico, ad esempio
        lunga durata della batteria o comunicazione bidirezionale
    medical_device_certification:
      name: Certificazione del dispositivo medico
      description: Elenca le approvazioni normative o gli standard con cui il monitor
        biometrico è conforme (ad es., CE, FDA 510(k))
    medical_identification_type:
      name: Tipo di identificazione medica
      description: Identifica la forma dell'ID medico, come un braccialetto o una
        collana
    medical_symbol:
      name: Simbolo medico
      description: Specifica il simbolo visualizzato sul gioiello o sulla targhetta,
        facilitando il rapido riconoscimento da parte dei soccorritori
    medical_syringe_purpose:
      name: Utilizzo della siringa medica
      description: Identifica l'uso previsto di una siringa medica, ad esempio per
        iniezione o irrigazione
    medical_tape_material:
      name: Materiale del nastro medico
      description: Identifica la composizione del nastro medicale, ad esempio plastica
        o lattice
    medicine/drug_form:
      name: Forma medicinale/farmaco
      description: Identifica la forma fisica di un medicinale o farmaco, ad esempio
        compresse o liquido
    medicine/supplement_form:
      name: Modulo medicinali/integratori
      description: Identifica l’aspetto fisico di un medicinale o di un  farmaco,
        come compresse o liquido
    medium:
      name: Medium
      description: Identifica il tipo di oggetto da collezione, ad esempio cimeli
        o carte collezionabili
    melodica_style:
      name: Stile melodico
      description: Specifica lo stile di layout di uno strumento melodico, ad esempio
        lo stile piano o tastiera
    memory_channels:
      name: Canali di memoria
      description: Definisce la capacità di trasmissione dei dati dei processori del
        computer, ad esempio dual o quad
    memory_form_factor:
      name: Fattore di forma della memoria
      description: Specifica il layout fisico dei moduli di memoria, ad esempio DIMM
        o micro-DIMM
    memory_rank:
      name: Rank di memoria
      description: Indica la disposizione del rank del modulo (come sono organizzati
        i chip), che influenza la compatibilità e l'ottimizzazione delle prestazioni
    memory_storage_type:
      name: Tipo di storage della memoria
      description: Identifica il tipo di memoria utilizzata nelle fotocamere, come
        scheda Micro SD o memoria integrata
    memory_technology:
      name: Tecnologia della memoria
      description: Specifica il tipo di memoria utilizzata nei dispositivi elettronici,
        ad esempio DDR o SDRAM
    menstrual_cup_shape:
      name: Forma della coppetta mestruale
      description: Descrive la forma delle coppette mestruali, ad es. a campana, a
        forma di V
    menstrual_cup_size:
      name: Taglia della coppetta mestruale
      description: Indica la categoria di dimensione etichettata dal produttore (ad
        es., piccola, Taglia 1)
    menstrual_cup_stem_type:
      name: Tipo di gambo della coppetta mestruale
      description: Specifica il design del gambo o maniglia di rimozione della coppetta
    mesh_networking_technology:
      name: Tecnologia di rete mesh
      description: Specifica se il punto di accesso supporta la capacità mesh e lo
        standard o protocollo utilizzato
    mesh_type:
      name: Tipo di maglia
      description: Specifica lo stile o la realizzazione del tessuto a maglia, indicandone
        l’uso previsto o le caratteristiche, ad esempio atletico, spazzolato
    metal_detector_features:
      name: Funzionalità del rilevatore di metalli
      description: Evidenzia le caratteristiche uniche dei metal detector, ad es.
        fondina, impermeabile
    metal_molding_application:
      name: Applicazione della modanatura di metallo
      description: Identifica la destinazione d'uso degli stampi per fusione di metallo,
        ad esempio gioielli o figurine
    meter_type:
      name: Tipo di misuratore
      description: Identifica il tipo di contatore utilizzato nei sistemi di carburante
        delle imbarcazioni, ad esempio digitale o analogico
    metrics_supported:
      name: Metriche supportate
      description: Specifica i tipi di misurazioni biometriche fornite da un prodotto,
        ad es. massa ossea, massa muscolare
    micrometer_type:
      name: Tipo micrometro
      description: Identifica l’applicazione specifica o il design di un micrometro,
        come lama o foro
    microphone_design:
      name: Design del microfono
      description: Definisce la categoria di design per i microfoni, ad esempio a
        condensatore, dinamico
    microphone_preamp_form_factor:
      name: Fattore di forma del preamplificatore microfonico
      description: Identifica lo stile fisico o il formato dell'involucro del preamplificatore
        microfonico per l'installazione o l'uso
    microphone_thread:
      name: Filettatura del microfono
      description: Specifica la dimensione della filettatura per i microfoni, ad es.
        1/4"-20, M6
    microphone_type:
      name: Tipo di microfono
      description: Definisce la tecnologia del microfono utilizzata, ad esempio condensatore
        o dinamico
    microphone_windshield_type:
      name: Tipo di antivento per microfono
      description: Specifica lo stile di costruzione dell'antivento (ad es., cuffia
        in schiuma, deadcat peloso, blimp, cestello), in modo da poter selezionare
        rapidamente la soluzione appropriata per il rumore del vento
    microscope_features:
      name: Funzionalità del microscopio
      description: Evidenzia gli aspetti unici dei microscopi, ad esempio portabilità
        o funzione di memoria
    microscope_slide_material:
      name: Materiale per vetrini per microscopio
      description: Specifica il tipo di materiale utilizzato nei vetrini per microscopio,
        ad esempio vetro o plastica
    midi_connectivity:
      name: Connettività MIDI
      description: Identifica il tipo di connessione MIDI sugli strumenti musicali,
        come MIDI in o USB midi
    mimo_technology:
      name: Tecnologia MIMO
      description: Indica la tecnologia wireless Multiple-Input Multiple-Output supportata
        dal router
    mineral_class:
      name: Classe minerale
      description: Identifica la categoria specifica di un minerale, come ossidi o
        silicati
    mineral_compound_form:
      name: Forma del composto minerale
      description: Specifica la forma chimica o chelato del minerale (ad es., citrato,
        glicinato) che influisce sull'assorbimento
    minimum_magnification:
      name: Ingrandimento minimo
      description: Indica il livello di ingrandimento più basso di una lente del microscopio,
        ad esempio 1x o 0,5x
    mirror_handle_design:
      name: Design della maniglia dello specchio
      description: Descrive lo stile della maniglia sugli specchietti dentali, come
        a doppia o singola estremità
    mirror_sides:
      name: Lati dello specchio
      description: Indica il numero o la configurazione delle superfici riflettenti
        di uno specchio (ad es., lato singolo, doppio lato, triplo)
    mist_application_area:
      name: Area di applicazione della nebbia
      description: Indica l'area o le aree di utilizzo previste per la nebbia (ad
        es., corpo, capelli, stanza, biancheria)
    mixer_type:
      name: Tipo di mixer
      description: Classifica i mixer DJ in base al loro design, ad esempio digitale
        o scratch
    mobile_mounting_type:
      name: Tipo di montaggio del mobile
      description: Specifica dove può essere fissata la giostrina per bambini, ad
        es. culla, passeggino
    mobile_movement:
      name: Movimento mobile
      description: Descrive il meccanismo delle giostrine per bambini, ad esempio
        quelle a batteria o a carica
    mobile_phone_accessories_included:
      name: Accessori per telefono cellulare inclusi
      description: Elenca gli articoli supplementari forniti nel set di accessori
        per telefono cellulare in modo che la clientela sappia esattamente quali componenti
        sono inclusi
    mobile_phone_case_features:
      name: Funzionalità della custodia per cellulare
      description: Descrive le caratteristiche uniche di una custodia per cellulare,
        ad esempio antiurto o aderenza perfetta
    mobile_phone_connector_type:
      name: Tipo di connettore per telefono cellulare
      description: Identifica lo standard di interfaccia di un modulo di ricarica
        o di porta dati sostitutivo.
    mobile_phone_form_factor:
      name: Fattore di forma del telefono cellulare
      description: Stile di progettazione fisica del telefono
    mobility/accessibility_equipment_features:
      name: Funzionalità delle attrezzature per la mobilità/accessibilità
      description: Descrive le caratteristiche uniche degli ausili per l'accessibilità,
        ad esempio lunga durata della batteria o arresto di emergenza
    mobility_scooter_type:
      name: Tipo di scooter per anziani e disabili
      description: Distingue tra diversi tipi di scooter per disabili, ad es. portatili,
        a 3 ruote
    mobility_type:
      name: Tipo di mobilità
      description: Indica lo stile della base che influisce sulla mobilità, distinguendo
        tra piedini stazionari, rotelle mobili o opzioni intercambiabili
    model_control_technology:
      name: Tecnologia di controllo del modello
      description: Specifica il tipo di sistema di controllo per i modellini di treni,
        ad esempio wireless o digitale
    model_gender_representation:
      name: Rappresentazione di genere del modello
      description: Specifica se il modello umano rappresenta l'anatomia maschile,
        femminile o unisex
    model_train_accessory_type:
      name: Tipo di accessori per modellini di treni
      description: Classifica gli accessori del modello di treno, ad esempio illuminazione
        o materiali dello scenario
    model_train_theme:
      name: Tema del modellino del treno
      description: Identifica l'ambientazione o l'epoca di un modellino di treno,
        ad esempio moderno o fantascientifico
    modem_form_factor:
      name: Fattore di forma del modem
      description: Descrive lo stile di design fisico del modem (ad es., chiavetta
        USB, unità desktop, modulo M.2)
    modem_technology:
      name: Tecnologia del modem
      description: Specifica il mezzo di trasmissione principale o la tecnologia di
        rete che il modem utilizza per accedere alla rete del fornitore di servizi
        (ad es., Cavo/DOCSIS, DSL, Cellulare)
    modulation_method:
      name: Metodo di modulazione
      description: Specifica la tecnica utilizzata per modificare un segnale nei dispositivi
        elettronici, ad esempio AM o PCM
    moisturizer_type:
      name: Tipo di idratante
      description: Identifica il tempo di utilizzo della crema idratante, ad esempio
        per tutto il giorno o per la notte
    mold/cut_shape:
      name: Forma modellata/tagliata
      description: Descrive la forma o il disegno di uno stampo o di un taglio artigianale,
        come stella o animale
    mold_shape:
      name: Forma della formina
      description: Descrive la forma o il modello di uno stampo artigianale, ad esempio
        rotondo o a lettera
    molding_application:
      name: Applicazione della modanatura
      description: Specifica il tipo di modanatura utilizzata nella costruzione, ad
        esempio rivestimento o binario per sedia
    molding_shape:
      name: Forma della modanatura
      description: Descrive la forma o il modello di uno stampo di cemento, come blocco
        o colonna
    monitor/screen_specialized_features:
      name: Funzionalità specializzate del monitor/schermo
      description: Descrive le caratteristiche specifiche di uno schermo, come gli
        altoparlanti integrati o l'idoneità per il gaming
    monitor_mounting_type:
      name: Tipo di montaggio del monitor
      description: Identifica la modalità di installazione del monitor di sicurezza,
        ad esempio a parete o a libera installazione
    monitor_shape:
      name: Forma del monitor
      description: Specifica il contorno dello schermo di un monitor, ad esempio piatto
        o curvo
    monitor_specialized_features:
      name: Funzionalità specializzate del monitor
      description: Evidenzia le caratteristiche uniche del monitor di un computer,
        ad esempio supporto 3D o angolo di visione regolabile
    monitor_type:
      name: Tipo di monitor
      description: Specifica il tipo di monitor integrato nella fotocamera, ad es.
        touchscreen, HDR
    monitoring_method:
      name: Metodo di monitoraggio
      description: Identifica la tecnica fisiologica che il dispositivo utilizza per
        ottenere letture del glucosio
    monitoring_service_type:
      name: Tipo di servizio di monitoraggio
      description: Indica se il sistema è monitorato professionalmente 24/7, auto-monitorato
        o non monitorato
    monocular_design:
      name: Design del monocolo
      description: Identifica la funzionalità di un monoculare, come zoom o visione
        notturna
    motherboard_chipset_family:
      name: Famiglia di chipset della scheda madre
      description: Specifica il tipo di chipset in una scheda madre, ad esempio Intel
        o NVIDIA
    motherboard_form_factor:
      name: Fattore di forma della scheda madre
      description: Specifica le dimensioni fisiche e gli standard della scheda madre,
        ad es. ATX, Mini-ITX
    motherboard_memory_features:
      name: Funzionalità della memoria della scheda madre
      description: Descrive le caratteristiche della memoria di una scheda madre,
        come ECC o senza buffer
    motion:
      name: Movimento
      description: Definisce il tipo di movimento dell'attrezzatura per bambini, ad
        esempio vibrazione o rimbalzo
    motion_sensor_type:
      name: Tipo di sensore di movimento
      description: Identifica la tecnologia utilizzata nei sensori di movimento, ad
        esempio infrarossi o laser
    motor_starting_method:
      name: Metodo di avviamento del motore
      description: Identifica il metodo utilizzato per avviare un motore, ad esempio
        DOL o autotrasformatore
    motor_type:
      name: Tipo di motore
      description: Specifica se il trapano utilizza un motore con spazzole o brushless,
        influenzando rumore, longevità e prezzo
    motor_vehicle_placement:
      name: Posizionamento del veicolo a motore
      description: Identifica il punto in cui un componente è progettato per essere
        montato su un veicolo, ad esempio anteriore o posteriore
    motor_vehicle_type:
      name: Tipo di veicolo a motore
      description: Specifica la categoria del veicolo a motore, ad esempio auto o
        SUV
    motorcycle/scooter_type:
      name: Tipo di motociclo/scooter
      description: Classifica il tipo di moto o scooter, ad esempio fuoristrada o
        ciclomotore
    motorcycle_drive_type:
      name: Tipo di trazione del motociclo
      description: Specifica il meccanismo di trasmissione della motocicletta, ad
        esempio albero o catena
    motorcycle_glove_purpose:
      name: Funzione del guanto da moto
      description: Identifica la destinazione d'uso dei guanti da moto, ad esempio
        fuoristrada o touring
    motorcycle_tire_type:
      name: Tipo di pneumatico del motociclo
      description: Classifica il pneumatico moto in base al suo utilizzo, ad esempio
        racing o scooter
    mount/stand_features:
      name: Funzionalità di montaggio/supporto
      description: Descrive in dettaglio le caratteristiche specifiche del supporto
        o del supporto di un prodotto, come angolo regolabile o pieghevole
    mount_installation_point:
      name: Punto di installazione del supporto
      description: Indica dove sul veicolo o sull'attrezzatura viene installato il
        supporto
    mount_interface_system:
      name: Sistema di interfaccia di montaggio
      description: Identifica la piattaforma di connessione proprietaria o standard
        del settore integrata nel supporto (ad es., modello RAM AMPS, Quad Lock)
    mount_material:
      name: Materiale di montaggio
      description: Specifica la composizione del supporto di un prodotto, ad esempio
        acciaio inossidabile o plastica
    mounting_hardware:
      name: Hardware da montare
      description: Identifica il tipo di hardware utilizzato per installare o montare
        un prodotto, come viti o ventosa
    mounting_interface_pattern:
      name: Schema dell'interfaccia di montaggio
      description: Identifica l'interfaccia meccanica o lo schema di fori utilizzato
        per collegare il supporto a una culla radio, staffa o sistema a sfera
    mounting_interface_standard:
      name: Standard dell'interfaccia di montaggio
      description: Specifica il modello di montaggio o l'interfaccia supportata dal
        supporto o dalla base (ad es., AMPS, VESA 75, RAM B ball)
    mounting_mechanism:
      name: Meccanismo di montaggio
      description: Definisce il modo in cui il telefono o la fotocamera si agganciano
        allo stick o al supporto
    mounting_style:
      name: Stile di montaggio
      description: Specifica come il pulsante è fissato a un pannello di controllo,
        influenzando il metodo di installazione e la compatibilità dello spessore
        del pannello
    mounting_technology:
      name: Tecnologia di montaggio
      description: Indica se l'IC è progettato per l'assemblaggio through-hole o a
        montaggio superficiale
    mounting_thread_size:
      name: Taglia della filettatura di montaggio
      description: Indica la dimensione della filettatura standard per treppiede o
        accessori fornita sul prodotto (ad es., 1/4"-20)
    mounting_type:
      name: Tipo di montaggio
      description: Specifica la modalità di installazione o fissaggio di un prodotto,
        ad esempio clip-on o ventosa
    mouse/trackball_features:
      name: Funzionalità del mouse/trackball
      description: Descrive le caratteristiche speciali dei mouse/trackball, come
        design ergonomico o peso regolabile
    mouse_pad_features:
      name: Funzionalità del tappetino per il mouse
      description: Descrive le caratteristiche uniche di un tappetino per mouse, ad
        esempio illuminazione o bordi cuciti
    mouse_port_type:
      name: Tipo di porta del mouse
      description: Definisce il tipo di connessione del mouse del computer, ad es.
        wireless UBS, Bluetooth
    mouse_technology:
      name: Tecnologia del mouse
      description: Specifica la funzionalità o il design del mouse di un computer,
        ad esempio wireless o da gioco
    mouthgard_design:
      name: Design del paradenti
      description: Specifica il design dei paradenti sportivi, ad esempio doppio o
        singolo
    mouthpiece:
      name: Bocchino
      description: Identifica il tipo di bocchino per strumenti musicali, ad esempio
        LA o Basso
    moving/shipping_box_material:
      name: Materiale della scatola per trasloco/spedizione
      description: Identifica il materiale utilizzato per lo spostamento o la spedizione
        delle scatole, ad esempio cartone o plastica
    mp3_player_accessories_included:
      name: Accessori per lettore MP3 inclusi
      description: Identifica gli accessori extra forniti con un lettore MP3, ad esempio
        custodia o caricabatteria per auto
    mpaa_rating:
      name: Classificazione MPAA
      description: Identifica la classificazione della Motion Picture Association
        of America (MPAA) per i media, come G o PG-13
    multi_gpu_technology:
      name: Tecnologia multi-GPU
      description: 'Indica la capacità di una scheda madre di supportare più GPU,
        ad es. non supportato, CrossFireX '
    multiplexer_technology:
      name: Tecnologia del multiplexer
      description: Specifica la tecnologia di segnale o lunghezza d'onda sottostante
        utilizzata dal multiplexer (ad es., CWDM, DWDM)
    muscle_stimulator_design:
      name: Design dello stimolatore muscolare
      description: Identifica il tipo di stimolatore muscolare, ad esempio fascia
        per le gambe o piastra adesiva
    music_genre:
      name: Genere musicare
      description: Classifica i prodotti in base al genere musicale specifico, ad
        esempio Natale o pop rock
    music_stand_design:
      name: Design del leggio musicale
      description: Descrive il tipo di leggio, ad esempio da pavimento o da parete
    musical_key:
      name: Chiave musicale
      description: Specifica la tonalità musicale di uno strumento, ad es. Do maggiore,
        Fa#
    nail_art_items_included:
      name: Articoli per nail art inclusi
      description: Identifica gli accessori specifici per la nail art contenuti in
        un kit, come le decalcomanie o lo strumento per fare i puntini
    nail_art_medium_type:
      name: Tipo di mezzo per nail art
      description: Specifica il mezzo principale o il formato del materiale della
        fornitura per nail art
    nail_care_features:
      name: Funzionalità per la cura delle unghie
      description: Descrive le qualità specifiche dei prodotti per la cura delle unghie,
        come resistenza alle scheggiature o asciugatura rapida
    nail_design:
      name: Decorazione delle unghie
      description: Definisce il motivo estetico o la finitura degli elementi per unghie,
        ad es. french tip, ombre
    nail_polish_drying_form:
      name: Forma per asciugare lo smalto
      description: Identifica il metodo di applicazione degli ausili per l'asciugatura
        dello smalto, come gocce o spray
    nail_shape:
      name: Forma delle unghie
      description: Descrive lo stile delle punte delle unghie per prodotti cosmetici,
        ad es. mandorla, quadrata
    national/regional_rating:
      name: Classificazione nazionale/dell’area geografica
      description: Specifica la classificazione nazionale o regionale per un videogioco,
        ad es. MA 15+, tutte le età
    native_aspect_ratio:
      name: Rapporto d'aspetto nativo
      description: Specifica le proporzioni originali di un display, in genere dei
        proiettori; ad es. 16:8
    nebulizer_design:
      name: Design del nebulizzatore
      description: Definisce il design e la portabilità di un nebulizzatore, ad es.
        portatile, da tavolo
    nebulizer_technology:
      name: Tecnologia del nebulizzatore
      description: Specifica la tecnologia utilizzata nei nebulizzatori, ad es. mesh,
        jet
    neck_color:
      name: Colore del collo
      description: Identifica il colore del manico di una chitarra, ad esempio bianco
        o multicolore
    neck_material:
      name: Materiale del manico
      description: Identifica il materiale utilizzato nel manico degli strumenti a
        corda, come legno di acero o palissandro
    neck_pattern:
      name: Modello del collo
      description: Identifica il disegno o la stampa sul manico di una chitarra, ad
        esempio floreale o a righe
    necklace_design:
      name: Design di collane
      description: Descrive lo stile di una collana, come un ciondolo o un girocollo
    neckline:
      name: Scollatura
      description: Utilizzato per descrivere la forma del collo di un indumento, ad
        esempio scollo a V o barca
    needle_coating_type:
      name: Tipo di rivestimento dell'ago
      description: Specifica qualsiasi rivestimento superficiale applicato al gambo
        dell'ago per migliorare lo scorrimento o le proprietà terapeutiche
    needle_eye_type:
      name: Tipo di cruna dell'ago
      description: Descrive la dimensione e lo stile della cruna dell'ago, ad esempio
        grande o divisa
    needle_gauge:
      name: Misura dell'ago
      description: Indica lo spessore degli aghi utilizzati nelle pratiche mediche
        o nei tatuaggi, come 18 o 22
    needle_housing_material:
      name: Materiale dell'alloggiamento dell'ago
      description: Identifica il materiale dell'alloggiamento dell'ago, ad esempio
        plastica o acciaio inossidabile
    needle_material:
      name: Materiale dell’ago
      description: Specifica la composizione degli aghi, in genere nell'agopuntura;
        ad es. acciaio inossidabile, placcato oro
    needle_size:
      name: Dimensioni dell'ago
      description: Descrive la dimensione degli aghi per il bricolage, ad es. 14,
        100/16
    needlecraft_kit_type:
      name: Tipo di kit per ricamo
      description: Identifica il tipo di kit per il lavoro all'ago, come l'uncinetto
        o il punto croce
    negative/slide_storage_type:
      name: Tipo di conservazione di negativi e lastre
      description: Specifica il metodo di conservazione dei negativi fotografici o
        delle diapositive, ad es. scatola di archiviazione, carosello di diapositive
    nema_enclosure_rating:
      name: Classificazione involucro NEMA
      description: Specifica la classificazione del tipo NEMA che definisce la protezione
        contro i rischi ambientali (ad es., tipo 4X, tipo 12)
    net_material:
      name: Materiale rete
      description: Identifica il tipo di materiale utilizzato nei prodotti a base
        di rete, ad esempio nylon o poliestere
    net_mounting_type:
      name: Tipo di montaggio rete
      description: Identifica la modalità di montaggio della rete da tennis, ad esempio
        supporto a clip o treppiede
    network_cable_interface:
      name: Interfaccia cavo di rete
      description: Specifica il tipo di connettore su un cavo di rete, ad es. BNC,
        MPO/MTP
    network_layer_support:
      name: Supporto del livello di rete
      description: Indica le caratteristiche di switching o routing del livello OSI
        più alto fornite dallo switch
    network_protocols_supported:
      name: Protocolli di rete supportati
      description: Definisce gli standard di rete supportati da un dispositivo, ad
        es. TCP/IP, DNS
    networking_standards:
      name: Standard di rete
      description: 'Specifica i protocolli supportati da un dispositivo di rete, ad
        es. IEEE 802.3 '
    neutral_density_rating:
      name: Valutazione della densità neutra
      description: Definisce la densità ottica o la forza di un filtro ND, espressa
        da fattori ND comuni o riduzioni di stop
    nightgown_style:
      name: Stile della camicia da notte
      description: Specifica lo stile della camicia da notte, ad es. babydoll, chemise
    nipple_material:
      name: Materiale della tettarella
      description: Specifica il materiale utilizzato per la tettarella del biberon,
        ad es. lattice, gomma
    nipple_shape:
      name: Forma della tettarella
      description: Definisce la forma delle tettarelle dei biberon, ad esempio piatte
        o angolate
    nipple_type:
      name: Tipo di tettarella
      description: Specifica il tipo di tettarella sui biberon, ad esempio collo largo
        o standard
    nock_material:
      name: Materiale della cocca
      description: Specifica il tipo di materiale utilizzato per le cocche delle frecce,
        ad esempio alluminio o plastica
    noise_cancellation_technology:
      name: Tecnologia di cancellazione del rumore
      description: Specifica il tipo di sistema di riduzione del rumore utilizzato
        nelle cuffie, aiutando l'utenza a identificare i modelli con controllo del
        rumore attivo, passivo o adattivo
    noise_intensity:
      name: Intensità del rumore
      description: Descrive il livello di suono prodotto da un prodotto, in genere
        fuochi d'artificio; ad es. basso, alto
    noise_reduction_system:
      name: Sistema di riduzione del rumore
      description: Specifica gli standard di riduzione del rumore analogici integrati
        supportati dal deck
    notepad_cover_type:
      name: Tipo di copertina del blocco note
      description: Identifica il tipo di copertina di un blocco note, come copertina
        rigida o brossura
    notepad_design:
      name: Design del blocco note
      description: Descrive la rilegatura o l'impaginazione di un blocco note, ad
        esempio a spirale o a disco
    nozzle_coating:
      name: Rivestimento dell'ugello
      description: Specifica qualsiasi trattamento superficiale applicato all'ugello
        per migliorare la resistenza all'usura o ridurre l'adesione del filamento
    nozzle_thread_type:
      name: Tipo di filettatura dell'ugello
      description: Definisce la filettatura meccanica o lo standard di montaggio utilizzato
        per fissare l'ugello (ad es., M6, MK8, E3D V6, Volcano)
    nozzle_type:
      name: Tipo di ugello
      description: Specifica il tipo di ugello per idropulsori dentali, ad es. ortodontico,
        puliscilingua
    nursery_theme:
      name: Tema della stanza per bambini
      description: Definisce il design o il motivo dei prodotti legati alla cameretta,
        come giungla o dinosauri
    nursing_cover_coverage:
      name: Copertura del telo copri-allattamento
      description: Definisce la copertura fornita da una copertura infermieristica,
        ad esempio totale o parziale
    nursing_pad_design:
      name: Modello di cuscinetto per allattamento
      description: Descrive le caratteristiche fisiche delle coppette assorbilatte,
        ad esempio spesse o rotonde
    nursing_pillow_shape:
      name: Forma del cuscino da allattamento
      description: Identifica il contorno dei cuscini da allattamento, ad esempio
        a forma di C o a forma di U
    nut/seed_type:
      name: Tipo di noce/seme
      description: Identifica il tipo specifico di noce o seme in un prodotto, ad
        esempio mandorle o semi di chia
    nut_butter_variety:
      name: Varietà di burro di frutta secca
      description: Identifica la varietà di frutta secca nelle creme spalmabili a
        base di frutta secca, ad es. arachidi, mandorle
    nut_form:
      name: Forma del dado
      description: Descrive la forma dei bulloni dell'hardware, ad es. esagonali,
        a macchina
    nut_processing_method:
      name: Metodo di lavorazione delle noci
      description: Definisce come vengono preparati frutta secca o semi, ad es. canditi,
        crudi
    nutrient_content:
      name: Contenuto nutritivo
      description: Specifica gli elementi nutritivi presenti, in genere per i fertilizzanti;
        ad es. azoto, fosforo
    oboe_key_system:
      name: Sistema tonale dell’oboe
      description: Identifica il sistema di tonalità di un oboe, ad esempio francese
        o conservatorio
    ocarina_style:
      name: Stile dell’ocarina
      description: Descrive lo stile delle ocarine, ad es. trasversale o pendente
    occasion:
      name: Evento
      description: Specifica l'evento o l'ambientazione adatti per un prodotto, ad
        es. casual, formale
    occasion_style:
      name: Stile dell’occasione
      description: Aiuta a classificare i prodotti in base all'occasione, ad es. casual,
        abbigliamento
    odor_remover_application_area:
      name: Area di applicazione del rimuovi odori
      description: Specifica dove il prodotto è destinato a essere applicato per la
        rimozione degli odori
    office_cart_features:
      name: Funzionalità del carrello da ufficio
      description: Descrive le caratteristiche specifiche di un carrello da ufficio,
        ad esempio ripiani regolabili o ruote bloccabili
    office_instrument_material:
      name: Materiale per strumenti da ufficio
      description: Specifica la composizione degli strumenti da ufficio, ad esempio
        legno o acrilico
    office_supply_material:
      name: Materiale per forniture per ufficio
      description: Identifica il materiale principale delle forniture per ufficio,
        come pelle o cartone
    oil_extraction_method:
      name: Metodo di estrazione dell'olio
      description: Specifica come l'olio principale è stato processato o estratto
        (ad es., spremuto a freddo, raffinato)
    oil_type:
      name: Tipo di olio
      description: Specifica il tipo di olio utilizzato in un prodotto, ad es. paraffina,
        cherosene
    olfactory_family:
      name: Famiglia olfattiva
      description: Definisce la categoria olfattiva complessiva a cui appartiene una
        fragranza, ad esempio aldeidica, animale
    one_piece_style:
      name: Stile monopezzo
      description: Identifica lo stile specifico di un capo d'abbigliamento monopezzo,
        come una tuta o una pagliaccetto
    open/closed_sign_design:
      name: Design del cartello di apertura/chiusura
      description: Specifica lo stile di un segnale di apertura/chiusura, ad es. orari
        di apertura, personalizzato
    opening_direction:
      name: Direzione di apertura
      description: Specifica la direzione in cui si apre un prodotto, in genere per
        i cancelli; ad es., oscillazione unidirezionale
    opening_mechanism:
      name: Meccanismo di apertura
      description: Specifica come viene aperto un prodotto, in genere per cancelli
        per bambini o animali domestici; ad es. leva, pedale
    operating_mode:
      name: Modalità di funzionamento
      description: Definisce il metodo di funzionamento, in genere per le apparecchiature
        mediche; ad es. semiautomatico
    operating_system:
      name: Sistema operativo
      description: Definisce il software di sistema utilizzato da un dispositivo,
        ad esempio iOS o ChromeOS
    operating_system_compatibility:
      name: Compatibilità del sistema operativo
      description: Identifica i sistemi operativi supportati dall'otturatore remoto
        di default.
    operation_mechanism:
      name: Meccanismo di funzionamento
      description: Descrive come lo strumento applica tensione e taglia la fascetta
        (ad es., manuale, pneumatico, automatico)
    operation_method:
      name: Metodo di funzionamento
      description: Definisce il modo in cui viene utilizzato un prodotto, in genere
        per gli apriporta dei garage; ad es. trasmissione a cinghia, idraulica
    optical_disc_recordability:
      name: Registrabilità del disco ottico
      description: Definisce se un disco ottico è scrivibile una sola volta o riscrivibile
        e se è a strato singolo o doppio
    optical_drive_form_factor:
      name: Fattore di forma dell'unità ottica
      description: Definisce la dimensione fisica e lo stile di installazione dell'unità
    optical_drive_loading_mechanism:
      name: Meccanismo di caricamento dell'unità ottica
      description: Indica come i dischi vengono inseriti nell'unità (ad es., caricamento
        a vassoio, caricamento a fessura, caricamento dall'alto)
    optical_drive_type:
      name: Tipo di unità ottica
      description: Identifica i formati multimediali che l'unità ottica di un dispositivo
        può leggere e scrivere, ad es. CD-ROM, DVD-ROM
    optical_frame_design:
      name: Modello di montatura da vista
      description: Definisce se gli occhiali hanno o meno montatura, ad es. senza
        montatura, montatura intera
    optical_zoom:
      name: Zoom ottico
      description: Indica la capacità di zoom di una fotocamera, ad es. senza zoom,
        superiore a 30x
    oral_care_function:
      name: Funzione per la cura orale
      description: Evidenzia il beneficio primario per la salute dentale o orale che
        il prodotto affronta (ad es., sbiancamento, sollievo dalla sensibilità, salute
        delle gengive)
    oral_care_items_included:
      name: Articoli per la cura orale inclusi
      description: Elenca i tipi di prodotti per la cura orale contenuti nel set
    organizer_type:
      name: Tipo di organizzatore
      description: Specifica la categoria di stoccaggio del veicolo, ad esempio portabicchieri
        o vano portaoggetti
    orientation:
      name: Orientamento
      description: Specifica il posizionamento previsto del prodotto, ad es. orizzontale,
        verticale
    orthotic_coverage_length:
      name: Lunghezza di copertura ortopedica
      description: Definisce quanto del plantare il supporto dell'arco copre (ad es.,
        lunghezza completa, 3/4 di lunghezza, coppa del tallone)
    outdoor_equipment_features:
      name: Funzionalità dell'attrezzatura per esterni
      description: Identifica i tratti unici degli attrezzi da esterno, ad esempio
        resistenti agli agenti atmosferici o portatili
    outdoor_furniture_items_included:
      name: Articoli di arredo per esterni inclusi
      description: Identifica gli elementi specifici inclusi in un set di mobili da
        esterno, come sedie o tavolo
    outdoor_power_accessories_included:
      name: Accessori per le apparecchiature elettriche da esterno inclusi
      description: Specifica gli articoli aggiuntivi forniti con l'attrezzatura elettrica
        per esterni, ad es. motosega, tappi per le orecchie
    outdoor_walking_activity:
      name: Camminata all’aperto
      description: Classifica i prodotti in base all'attività di camminata all'aperto
        prevista, ad es. trekking, trail running
    outerwear_clothing_features:
      name: Funzionalità dell'abbigliamento capispalla
      description: Identifica le caratteristiche speciali dell'abbigliamento esterno,
        come isolante o impermeabile
    outlet_type:
      name: Tipo di presa
      description: Specifica il tipo di spina dei dispositivi elettronici, ad es.
        tipo A, tipo L
    output_connection:
      name: Connessione in uscita
      description: Specifica il tipo di connessione di uscita dei cavi audio, ad esempio
        3,5 mm o RCA
    output_connection_type:
      name: Tipo di connessione di uscita
      description: Specifica il connettore o lo standard di interfaccia fornito dal
        convertitore sul lato di uscita
    output_level:
      name: Livello di uscita
      description: Descrive il livello di uscita degli accessori per strumenti musicali,
        come basso o alto
    output_signal_interface:
      name: Interfaccia del segnale di uscita
      description: Specifica il tipo o i tipi di connessioni di uscita fornite dal
        convertitore
    output_video_interface:
      name: Interfaccia video di uscita
      description: Specifica il tipo o i tipi di connettore video forniti come uscita
        dal convertitore di scansione
    output_waveform:
      name: Forma d'onda di uscita
      description: Specifica il tipo di segnale generato da un oscillatore elettronico,
        ad esempio a dente di sega o sinusoidale
    oven_accessories_included:
      name: Accessori per il forno inclusi
      description: Fornisce dettagli sui componenti extra del forno inclusi, metodo
        di riscaldamento, ad esempio teglia o griglia
    overclock_profile_support:
      name: Supporto profilo overclock
      description: Identifica i profili di overclocking standardizzati memorizzati
        nel modulo (ad es., Intel XMP, AMD EXPO)
    oxygen_cylinder_outlet_standard:
      name: Standard di uscita della bombola di ossigeno
      description: Specifica lo standard di connessione CGA della valvola della bombola
    oxygen_tank_valve_type:
      name: Tipo di valvola della bombola di ossigeno
      description: Specifica la valvola utilizzata nei serbatoi di ossigeno, ad es.
        levetta, valvola post
    pa_rating:
      name: Valutazione PA
      description: Specifica il grado di protezione UVA della crema solare (ad es.,
        PA+, PA+++, PA++++) basato sul metodo di oscuramento del pigmento persistente
        (PPD)
    pacifier/teether_design:
      name: Modello di ciuccio
      description: Descrive il design dei succhietti e dei massaggiagengive per neonati,
        ad es. a forma di anello, ortodontici
    package_type:
      name: Tipo di imballaggio
      description: Definisce il tipo di imballaggio di un prodotto, ad es. barattolo,
        pompa
    packing_materials_included:
      name: Materiali di imballaggio inclusi
      description: Identifica il tipo di materiali di imballaggio forniti, come cuscini
        d'aria o pluriball
    pad_display_profile:
      name: Profilo di visualizzazione del pad
      description: Descrive la visualizzazione a colori dei pad di acquisizione della
        firma, ad esempio monocromatica o a colori
    pad_thickness:
      name: Spessore dell'assorbente
      description: Classifica il profilo di spessore complessivo dell'assorbente (ad
        es., ultra-sottile, maxi)
    pad_type:
      name: Tipo di applicatore
      description: Specifica il tipo di assorbente del prodotto, ad es. lavabile in
        lavatrice, sostituibile
    pad_wing_style:
      name: Stile delle ali dell'assorbente
      description: Indica se l'assorbente mestruale include ali laterali per il fissaggio
        e la protezione dalle perdite
    paddle/oar_material:
      name: Materiale pagaia/remo
      description: Identifica il materiale utilizzato per la costruzione di pagaie
        o remi, come alluminio o legno
    paddle_equipment_included:
      name: Attrezzatura da paddle inclusa
      description: Specifica l'attrezzatura supplementare nei set da paddle, ad esempio
        pali o palline da paddle
    paddleboard_features:
      name: Funzionalità del paddleboard
      description: Descrive le caratteristiche specifiche di un paddleboard, ad esempio
        gonfiabile o hard top
    page_layout:
      name: Layout della pagina
      description: Definisce il layout delle pagine, in genere nelle rubriche; ad
        es. vuoto, con schede
    page_size:
      name: Dimensione della pagina
      description: Determina le dimensioni di un prodotto, ad esempio 11" x 17" o
        A4
    pager_application:
      name: Applicazione pager
      description: Identifica il caso d'uso principale o l'ambiente per cui è destinato
        il pager
    pain_reduction_technology:
      name: Tecnologia di riduzione del dolore
      description: Identifica eventuali caratteristiche orientate al comfort che riducono
        il disagio durante l'epilazione (ad es., raffreddamento, rulli massaggianti)
    paint/dye_form:
      name: Forma di pittura/tintura
      description: Descrive la consistenza o il tipo di vernice o colorante, come
        gel o spray
    paint_brush_design:
      name: Forma del pennello
      description: Descrive la forma o lo stile di un pennello, come rotondo o piatto
    paint_finish:
      name: Finitura della pittura
      description: Indica il tipo di finitura della vernice, in genere per veicoli;
        ad es. metallico, lucido
    paint_form:
      name: Forma di pittura
      description: Identifica la forma della vernice artigianale, ad esempio gel o
        polvere
    paint_medium_type:
      name: Tipo di medium per pittura
      description: Specifica il tipo di mezzo pittorico negli oggetti artigianali,
        ad esempio vernice o acquerello
    paint_type:
      name: Tipo di pittura
      description: Specifica la varietà di vernice negli oggetti di arti e mestieri,
        come smalto o acquerello
    paintball/airsoft_equipment_included:
      name: Attrezzatura paintball/softair inclusa
      description: Specifica l'attrezzatura da paintball o softair inclusa, come occhiali
        protettivi o gilet tattico
    paintball_equipment_included:
      name: Attrezzatura da paintball inclusa
