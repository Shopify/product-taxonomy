    binocular_design:
      name: Design del binocolo
      description: Descrive l'uso o la funzionalità specifica del binocolo, ad esempio
        caccia o astronomia
    biometric_authentication_method:
      name: Autenticazione biometrica
      description: Elenca le opzioni di sicurezza biometrica integrate disponibili
        sul telefono, come il sensore di impronte digitali o il riconoscimento facciale.
    biometric_certifications:
      name: Certificazioni biometriche
      description: Elenca le certificazioni biometriche formali del settore o governative
        che il dispositivo soddisfa (ad es., FBI PIV, FIPS 201)
    biometric_monitor_accessory_features:
      name: Funzionalità accessorie del monitor biometrico
      description: Identifica le funzioni speciali degli accessori del monitor biometrico,
        come cardiofrequenzimetro o contapassi
    bios_type:
      name: Tipo di bios
      description: Specifica il tipo di BIOS utilizzato nelle schede madri, ad es.
        ibrido, legacy
    bird_cage/stand_design:
      name: Design di gabbia per uccelli/supporto
      description: Identifica lo stile di una gabbia o di un supporto per uccelli,
        ad esempio gabbia a cupola o supporto su ruote
    bird_food_form:
      name: Forma di cibo per uccelli
      description: Descrive la forma del cibo per uccelli, come semi o pellet
    bird_food_ingredients:
      name: Ingredienti per il cibo degli uccelli
      description: Specifica il tipo di ingredienti del mangime per uccelli, come
        vermi o semi di girasole
    bird_treat_type:
      name: Tipo di dolcetto per uccelli
      description: Identifica la categoria delle leccornie per uccelli, come biscotti
        o frutta
    birthday_candle_design:
      name: Design delle candeline di compleanno
      description: Descrive il tema visivo delle candeline di compleanno, ad esempio
        a forma di animale o di personaggio dei cartoni animati
    birthday_candle_type:
      name: Tipo di candela di compleanno
      description: Identifica le caratteristiche uniche delle candele di compleanno,
        ad esempio profumate o scintillanti
    bitter_variety:
      name: Varietà amara
      description: Classifica gli amari in base ai loro profili aromatici, ad es.
        floreale, speziato
    blade_coating:
      name: Rivestimento della lama
      description: Specifica qualsiasi rivestimento prestazionale applicato alla lama
        per affilatura o scorrevolezza (ad es., platino, PTFE, titanio)
    blade_curve:
      name: Curvatura della lama
      description: Specifica la curva della lama su una mazza da hockey, ad es. aperta,
        punta
    blade_design:
      name: Design della lama
      description: Specifica lo stile della lama sui coltelli multiuso, ad esempio
        rasoio o a spezzare
    blade_edge_configuration:
      name: Configurazione del filo della lama
      description: Specifica il formato del filo di una singola lama (ad es., filo
        singolo, doppio filo, sistema a cartuccia, mezza lama)
    blade_material:
      name: Materiale della lama
      description: Specifica il materiale utilizzato nella costruzione di una lama,
        ad esempio acciaio o alluminio
    blade_type:
      name: Tipo di lama
      description: Definisce la forma e lo stile della lama di un prodotto, ad esempio
        dritta o a pugnale
    blanket_color:
      name: Colore della coperta
      description: Identifica il colore primario di una coperta, ad esempio navy o
        multicolore
    blanket_pattern:
      name: Modello di coperta
      description: Descrive il design o il motivo su una coperta, ad esempio floreale
        o geometrico
    blending_type:
      name: Tipo di miscelazione
      description: Identifica il metodo di miscelazione utilizzato nelle apparecchiature
        di laboratorio, ad esempio continuo o batch
    blind/shade_style:
      name: Stile cieco/ombreggiato
      description: Identifica il design o il tipo di tende o tende, come tende a rullo
        o tende verticali
    blocked_signal_types:
      name: Tipi di segnali bloccati
      description: Specifica le categorie di segnali wireless che il disturbatore
        può bloccare
    blood_group_systems_detected:
      name: Sistemi di gruppi sanguigni rilevati
      description: Identifica quali sistemi di gruppi sanguigni il kit può determinare
    blood_test_kit_components:
      name: Componenti del kit per analisi del sangue
      description: Specifica gli articoli inclusi in un kit per analisi del sangue,
        ad es. garze, bende adesive
    bluetooth_functionality:
      name: Funzionalità Bluetooth
      description: Indica se il dispositivo agisce come trasmettitore, ricevitore
        o entrambi (ricetrasmettitore)
    board_concave_shape:
      name: Forma concava della tavola
      description: Definisce la curva concava delle tavole da surf o paddleboard;
        ad es. concavo a V, piatto
    board_game_features:
      name: Funzionalità del gioco da tavolo
      description: Evidenzia gli aspetti unici di un gioco da tavolo, ad es. configurazione
        rapida, espansione disponibile
    board_game_mechanics:
      name: Meccaniche dei giochi da tavolo
      description: Descrive la struttura del gameplay di un gioco da tavolo, ad esempio
        strategico o cooperativo
    board_material:
      name: Materiale della tavola
      description: Specifica il tipo di materiale nei pannelli di presentazione, come
        acrilico o porcellana
    board_mounting_type:
      name: Tipo di montaggio della tavola
      description: Specifica lo stile di installazione delle lavagne di presentazione,
        ad esempio portatile o con supporto su cavalletto
    board_profile:
      name: Profilo della tavola
      description: Definisce il profilo di una tavola da surf, ad es. piatta, rocker
    board_surface:
      name: Superficie della tavola
      description: Descrive il tipo di superficie su un tabellone, come tessuto o
        sughero
    board_type:
      name: Tipo di tavola
      description: Classifica gli skateboard in base al design e allo scopo, ad esempio
        classico o cruiser
    boat_type:
      name: Tipo di barca
      description: Identifica il progetto o il modello specifico di un'imbarcazione,
        come pontone o barca a ponte
    body/facial_hair_type:
      name: Tipo di peli del corpo/viso
      description: Aiuta ad abbinare i prodotti per la toelettatura ai tipi di capelli
        fini o grossolani, in genere per la decolorazione dei capelli
    body_area:
      name: Parte del corpo
      description: Specifica la parte del corpo a cui è destinato il prodotto, ad
        es. viso, zona bikini
    body_color:
      name: Colore del corpo
      description: Specifica il colore primario dei veicoli o delle parti, ad esempio
        bianco o argento
    body_jewelry_type:
      name: Tipo di gioielli per il corpo
      description: Identifica il tipo specifico di gioielli per il corpo, ad esempio
        piercing sulla pancia, braccialetto all'orecchio
    body_material:
      name: Materiale del corpo
      description: Specifica il materiale primario di un prodotto, in genere canne
        da pesca; ad es. composito, alluminio
    body_paint/foundation_type:
      name: Tipo di vernice per il corpo/fondotinta
      description: Specifica la categoria di prodotti per il trucco del corpo, come
        il fondotinta o il sangue finto
    body_paint_formula_base:
      name: Base della formula della pittura per il corpo
      description: Identifica la base di formulazione principale, che influisce su
        durabilità, finitura e metodo di rimozione
    body_pattern:
      name: Modello del corpo
      description: Descrive il design o il motivo visivo sulla superficie primaria
        di un prodotto, ad esempio floreale, geometrico
    body_side:
      name: Lato del corpo
      description: Definisce se il prodotto è progettato per il lato sinistro, destro
        o è adatto per uso bilaterale
    bodyboard_features:
      name: Funzionalità del bodyboard
      description: Descrive gli aspetti unici di un bodyboard, ad esempio il tetto
        rigido o il gonfiabile
    boiler_system:
      name: Impianto caldaia
      description: Specifica il sistema caldaia per apparecchi di riscaldamento, ad
        es. combi, solo
    bolt_form:
      name: Forma del bullone
      description: Descrive la forma dei bulloni dell'hardware, ad es. esagonali,
        a macchina
    bolt_material:
      name: Materiale del bullone
      description: Identifica la composizione dei dardi per tiro con l'arco, ad esempio
        bambù o fibra di vetro
    bone_anchored_interface_type:
      name: Tipo di interfaccia ancorata all'osso
      description: Definisce come il processore si attacca all'impianto, distinguendo
        tra moncone percutaneo e sistemi magnetici transcutanei
    book/file_cover_material:
      name: Materiale per la copertina del libro/file
      description: Identifica il materiale utilizzato nelle copertine di libri o raccoglitori,
        come cartone o pelle
    book_cover_material:
      name: Materiale per la copertina del libro
      description: Identifica il materiale utilizzato per le copertine dei libri,
        ad esempio pelle o carta
    book_cover_type:
      name: Tipo di copertina
      description: Identifica il tipo di copertina di un libro, ad esempio copertina
        rigida o tascabile
    bookmark_design:
      name: Design del segnalibro
      description: Descrive lo stile o il tipo di segnalibro, ad esempio magnetico
        o a clip
    bookmark_shape:
      name: Forma del segnalibro
      description: Descrive la forma o il contorno di un segnalibro, ad esempio rotondo
        o quadrato
    boombox_lighting_effects:
      name: Effetti di illuminazione boombox
      description: Descrive la presenza e lo stile di spettacoli di luci LED o RGB
        integrati nell'altoparlante
    boot_style:
      name: Stile dello stivale
      description: Specifica lo stile degli stivali, ad es. stivaletti
    boot_type:
      name: Tipo di stivale
      description: Classifica lo stile di avvio, ad es. avvio morbido, avvio rigido
    borescope_design:
      name: Modello del periscopio
      description: Descrive il tipo di boroscopio, ad esempio flessibile, rigido o
        fibroscopio
    bottle/container_closure:
      name: Chiusura della bottiglia/contenitore
      description: Identifica il tipo di chiusura su bottiglie o contenitori, come
        pompa o tappo a scatto
    bottle_closure_type:
      name: Tipo di chiusura della bottiglia
      description: Identifica il tipo di chiusura utilizzata su una bottiglia, ad
        esempio tappo in sughero o corona
    bottle_design:
      name: Forma della bottiglia
      description: Descrive le caratteristiche di un biberon, in genere per prodotti
        per bambini; ad es. facile da tenere in mano
    bottle_material:
      name: Materiale della bottiglia
      description: Identifica la sostanza utilizzata nella costruzione di una bottiglia,
        ad esempio vetro o plastica
    bottle_sterilizer_features:
      name: Funzionalità dello sterilizzatore per bottiglie
      description: Evidenzia le funzioni specifiche degli sterilizzatori per bottiglie,
        come spegnimento automatico o funzione di scongelamento
    bottle_type:
      name: Tipo di bottiglia
      description: Specifica il tipo di chiusura su una bottiglia, come spremere o
        spruzzare
    bottle_warmer/sterilizer_features:
      name: Funzionalità scaldabiberon/sterilizzatore
      description: Evidenzia le caratteristiche speciali degli scaldabiberon o degli
        sterilizzatori, come lo spegnimento automatico o il timer
    bottle_warmer_features:
      name: Funzionalità dello scaldabiberon
      description: Evidenzia le caratteristiche uniche degli scaldabiberon, ad esempio
        il display LCD o il timer
    bottom_surface_material:
      name: Materiale della superficie inferiore
      description: Identifica il materiale della superficie inferiore del prodotto,
        ad esempio metallo o vetro
    bow/crossbow_features:
      name: Funzionalità dell'arco/balestra
      description: Descrive le caratteristiche speciali degli archi/balestre, come
        estrazione regolabile o mirino illuminato
    bow_features:
      name: Funzionalità dell'arco
      description: Identifica le caratteristiche uniche degli archi da tiro con l'arco,
        ad es. l'allungamento regolabile, il mirino illuminato
    bow_hair_material:
      name: Materiale delle corde dell'arco
      description: Specifica la composizione dei crini dell'arco negli strumenti a
        corda, ad es. sintetici, crine di cavallo
    bow_material:
      name: Materiale dell’arco
      description: Specifica il tipo di materiale utilizzato negli archi per il tiro
        con l'arco, ovvero alluminio, fibra di vetro
    box_type:
      name: Tipo di scatola
      description: Identifica lo stile dei box portaoggetti o degli organizzatori
        per veicoli, come baule o crossover
    bra_closure_type:
      name: Tipo di chiusura del reggiseno
      description: Identifica come i reggiseni sono allacciati o aperti, ad es. sul
        davanti, pull-on (senza chiusura)
    bra_coverage:
      name: Copertura del reggiseno
      description: Specifica il livello di copertura fornito da un reggiseno, ad esempio
        intero o demi
    bra_features:
      name: Funzionalità del reggiseno
      description: Descrive in dettaglio le caratteristiche uniche dei reggiseni,
        ad es. l'imbottitura rimovibile, il tessuto traspirante
    bra_strap_type:
      name: Tipo di spallina del reggiseno
      description: Specifica lo stile e la funzionalità delle spalline del reggiseno,
        ad esempio a vogatore
    bra_style:
      name: Stile reggiseno
      description: Identifica il design o lo stile di un reggiseno, ad esempio push-up
        o senza spalline
    bra_support_level:
      name: Livello di supporto del reggiseno
      description: Indica il livello di sostegno fornito da un reggiseno, ad es. basso,
        medio, alto
    brace_support_level:
      name: Livello di supporto del tutore
      description: Indica il livello complessivo di supporto o protezione designato
        dal produttore offerto dal tutore
    bracelet_design:
      name: Disegno del braccialetto
      description: Specifica il design di un braccialetto, come charm o polsino
    bracket/brace_design:
      name: Design della staffa/rinforzo
      description: Descrive lo stile delle parentesi graffe, ad es. parentesi angolare,
        parentesi graffa angolare
    bracket_profile:
      name: Profilo della staffa
      description: Indica lo stile fisico della staffa fornita con la scheda, determinando
        la compatibilità con il chassis
    brandy_variety:
      name: Varietà di brandy
      description: Distingue tra diversi stili di brandy, ad es. cognac, grappa
    breadboard_type:
      name: Tipo di breadboard
      description: Classifica la breadboard per stile di costruzione o dimensione
        fondamentale
    breath_spray_benefit:
      name: Beneficio dello spray per l'alito
      description: Identifica il beneficio primario per la cura orale che lo spray
        per l'alito afferma di fornire
    breath_sprays_certifications:
      name: Certificazioni degli spray per l’alito
      description: Specifica gli standard soddisfatti da uno spray per l'alito, ad
        esempio il commercio equo e senza glutine
    bridge/router_advanced_features:
      name: Funzionalità avanzate del bridge/router
      description: Evidenzia le funzionalità avanzate di bridge/router, come supporto
        basato sull'intelligenza artificiale o VPN
    brightness_levels:
      name: Livelli di luminosità
      description: Specifica la gamma di emissione luminosa per i prodotti, ad esempio
        media o alta
    bristle_grade:
      name: Grado delle setole
      description: Identifica la qualità o la classificazione dei peli animali o sintetici
        utilizzati (ad es., tasso argentato, fibra sintetica argentata)
    bristle_hardness:
      name: Durezza delle setole
      description: Indica la rigidità delle setole dello spazzolino
    bristle_material:
      name: Materiale delle setole
      description: Identifica la composizione delle setole della spazzola, ad esempio
        nylon o crine di cavallo
    bristle_shape:
      name: Forma delle setole
      description: Definisce la forma delle setole del pennello, ad es. piatte, angolate
    broadcast_video_standard:
      name: Standard video di trasmissione
      description: Indica gli standard di trasmissione analogici con cui il VCR è
        compatibile
    broadcasting_standard_supported:
      name: Standard di trasmissione supportato
      description: Specifica gli standard di trasmissione televisiva o di modulazione
        (satellite, cavo, terrestre) che il prodotto può decodificare o gestire
    broadhead/field_point_material:
      name: Materiale per punti Broadhead/Field
      description: Identifica il materiale utilizzato nelle punte da caccia o nelle
        punte da campo per tiro con l'arco, come acciaio inossidabile o acciaio al
        carbonio
    broadhead_design:
      name: Design testa larga
      description: Indica il tipo di design della testa larga utilizzata nel tiro
        con l’arco, ad esempio lama fissa, meccanica
    brush_application:
      name: Applicazione a pennello
      description: Descrive la destinazione d'uso dei pennelli per l'arte, come acrilico
        o acquerello
    brush_end_type:
      name: Tipo di estremità del pennello
      description: Descrive il formato strutturale delle estremità del pennello (ad
        es., estremità singola, doppia estremità, retrattile)
    brush_head_shape:
      name: Forma della testina dello spazzolino
      description: Definisce il fattore di forma complessivo della testina dello spazzolino,
        che determina portata e adeguatezza per diversi profili d'uso
    brush_head_usage:
      name: Utilizzo della testa per spazzola
      description: Specifica la destinazione d'uso delle testine, in genere per i
        cosmetici; ad es. pulizia profonda, esfoliazione
    brush_material:
      name: Materiale del pennello
      description: Specifica il tipo di materiale utilizzato nella costruzione delle
        spazzole, ad esempio silicone o plastica
    brush_size:
      name: Dimensioni del pennello
      description: Specifica la dimensione di un pennello artistico, ad es. 0, 12
    brush_type:
      name: Tipo di pennello
      description: Specifica il materiale utilizzato in un pennello da barba, ad esempio
        peli sintetici o di tasso
    brushing_mode:
      name: Modalità di spazzolamento
      description: Elenca i programmi di pulizia preimpostati che lo spazzolino può
        eseguire in ciclo (ad es., pulizia, sensibile, sbiancamento)
    bug_type:
      name: Tipo di insetto
      description: Specifica la specie di insetti a cui è rivolto il prodotto, come
        formiche o calabroni
    building_board_material:
      name: Materiale del pannello da costruzione
      description: Specifica il tipo di materiale utilizzato nei pannelli da costruzione,
        ad esempio compensato o cemento
    building_consumable_form:
      name: Formato dei materiali di consumo per costruzioni
      description: Specifica la forma dei composti di rappezzatura delle pareti, ad
        esempio liquido o polvere
    building_toy_type:
      name: Tipo di giocattolo da costruzione
      description: Specifica la categoria di giocattoli da costruzione, per esempio
        set di costruzioni STEM, piastrelle magnetiche
    bulb_cap_type:
      name: Tipo di attacco della lampadina
      description: Specifica il tipo di attacco o base di una lampadina o di un apparecchio,
        ad es. E12, GU10
    bulb_shape:
      name: Forma della lampadina
      description: Descrive la forma dei prodotti di illuminazione, ad es. tubo, spirale
    bulb_size:
      name: Dimensioni della lampadina
      description: Specifica la dimensione delle lampadine, ad es. A19, C7
    bulb_type:
      name: Tipo di lampadina
      description: Specifica il tipo di lampadina utilizzata nei prodotti di illuminazione,
        ad es. LED, alogena
    bulldozer_blade_type:
      name: Tipo di lama dozer
      description: Identifica lo stile della lama di un bulldozer, ad esempio angolare
        o diritta (lama a S)
    bullet_protection_level:
      name: Livello di protezione antiproiettile
      description: Indica il livello di protezione dai proiettili nei giubbotti, ad
        es. IIA, IV
    bullhorn_features:
      name: Funzionalità dell'altoparlante
      description: Evidenzia le funzionalità uniche di un megafono, come registrazione
        vocale o funzione sirena
    bullion_form:
      name: Forma del lingotto
      description: Specifica il tipo di lingotto, ad esempio tondi o barre
    bungee_arm_mechanism:
      name: Meccanismo del braccio elastico
      description: Definisce la tecnologia utilizzata per sospendere e guidare il
        cavo del mouse (ad es., braccio a molla, corda elastica, sospensione magnetica)
    burner_material:
      name: Materiale del fornello
      description: Identifica il materiale utilizzato nella costruzione di un fornello
        o di un bruciatore grill, ad esempio ghisa o acciaio inossidabile
    butt_cap_color:
      name: Colore del fondello
      description: Specifica il colore del fondello delle canne da pesca, come il
        nero o il blu
    butt_cap_material:
      name: Materiale del tappo
      description: Definisce la composizione dell'estremità inferiore del manico su
        articoli sportivi, ad es. EVA (etilene vinil acetato), sughero
    butt_cap_pattern:
      name: Modello di tappo di testa
      description: Descrive il design o il motivo sulla parte finale di una canna
        da pesca, ad esempio mimetico o floreale
    button/snap_closure_type:
      name: Tipo di chiusura con bottone/a scatto
      description: Descrive lo stile del meccanismo di fissaggio, ad esempio magnetico
        o invisibile
    button_surface_profile:
      name: Profilo della superficie del pulsante
      description: Descrive il contorno fisico della superficie dello stantuffo del
        pulsante, influenzando ergonomia e stile visivo
    cabinet_type:
      name: Tipo di cabinato
      description: Specifica il design e il fattore di forma dei giochi arcade, ad
        esempio bartop o mini arcade
    cable_form_factor:
      name: Fattore di forma del cavo
      description: Descrive lo stile di design fisico o la forma del cavo
    cable_housing_material:
      name: Materiale dell'alloggiamento del cavo
      description: Identifica il materiale utilizzato per la guaina del cavo, ad esempio
        nylon o PVC
    cable_jacket_rating:
      name: Classificazione della guaina del cavo
      description: Specifica la classificazione ambientale o di sicurezza della guaina
        esterna del cavo (ad es., plenum, interramento diretto, resistente ai raggi
        UV)
    cable_shielding:
      name: Schermatura del cavo
      description: Specifica il tipo di protezione utilizzata nei cavi, ad es. intrecciata
        (STP), lamina (FTP)
    cable_style:
      name: Stile del cavo
      description: Descrive il design fisico del cavo (ad es., intrecciato, piatto,
        a spirale, retrattile)
    cable_tie_type:
      name: Tipo di fascetta
      description: Specifica lo stile di costruzione o il meccanismo di fissaggio
        della fascetta
    cable_tray_style:
      name: Stile del vassoio portacavi
      description: Descrive lo stile strutturale della sezione del vassoio portacavi
        che determina la ventilazione e il metodo di supporto dei cavi
    cable_type:
      name: Tipo di cavo
      description: Classifica la varietà di cavi, in genere nell'attrezzatura ciclistica;
        ad es. freno, cambio
    cache_level:
      name: Livello della cache
      description: Indica la posizione gerarchica della cache (ad es., L1, L2, L3),
        che influenza dimensione, latenza e prossimità ai core del processore
    caffeine_content:
      name: Contenuto di caffeina
      description: Indica la quantità di caffeina presente in un prodotto, ad esempio
        decaffeinato, a basso contenuto di caffeina
    cage_type:
      name: Tipo di gabbia
      description: Identifica lo stile della gabbia di sicurezza nei veicoli, come
        gabbia intera o mezza gabbia
    calculator_accessory_type:
      name: Tipo di accessorio calcolatrice
      description: Specifica il tipo di accessorio della calcolatrice, come il rotolo
        di carta o l'adattatore per la stampante
    calculator_features:
      name: Funzionalità della calcolatrice
      description: Descrive le funzioni che può eseguire una calcolatrice, ad esempio
        il calcolo del prestito o l'analisi statistica
    calendar/organizer_features:
      name: Funzionalità del calendario/organizzatore
      description: Descrive le caratteristiche speciali dei calendari o degli organizzatori,
        come spazi per appuntamenti o festività contrassegnate
    calendar_format:
      name: Formato del calendario
      description: Specifica l'intervallo di tempo di un prodotto di calendario, ad
        esempio giornaliero o mensile
    calibration_sensor_type:
      name: Tipo di sensore di calibrazione
      description: Specifica la tecnologia hardware sottostante o il fattore di forma
