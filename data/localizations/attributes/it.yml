      name: Progettazione dei condotti
      description: Identifica la forma dei condotti dell'aria nei sistemi HVAC, ad
        esempio solidi, flessibili
    duct_shape:
      name: Forma del condotto
      description: Descrive la forma dei condotti dell'aria nei sistemi HVAC, ad esempio
        rotondi o piatti
    duplex_component_type:
      name: Tipo di componente duplex
      description: Definisce la forma specifica della parte duplex fornita (ad es.,
        assemblaggio, vassoio, ingranaggio)
    duplexer_installation_type:
      name: Tipo di installazione duplexer
      description: Chiarisce come il duplexer si attacca alla stampante (ad es., slot
        interno, attacco esterno posteriore)
    duplexing_technology:
      name: Tecnologia duplex
      description: Specifica se una stampante supporta la stampa fronte-retro, ad
        esempio stampa fronte/retro non supportata, automatica
    duplication_operation_mode:
      name: Modalità di funzionamento della duplicazione
      description: Indica se il duplicatore funziona in modo indipendente, richiede
        la connessione a un computer o supporta entrambe le modalità
    durability_features:
      name: Funzionalità di durabilità
      description: Evidenzia la capacità di un prodotto di resistere a varie condizioni,
        ad es. antiruggine, antiurto
    dust_container_type:
      name: Tipo di contenitore per la polvere
      description: Specifica il tipo di sistema di raccolta della polvere negli aspirapolvere
