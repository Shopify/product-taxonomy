    dress_occasion:
      name: Occasione del vestito
      description: Specifica l'occasione per cui un abito è destinato, ad esempio
        per le vacanze o per tutti i giorni
    dress_style:
      name: Stile del vestito
      description: Identifica il design di un abito, ad esempio a portafoglio o a
        vita impero
    drill_features:
      name: Funzionalità del trapano
      description: Identifica le caratteristiche speciali di un trapano, come velocità
