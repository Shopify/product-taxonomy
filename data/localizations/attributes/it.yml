    canopy_color:
      name: Colore del tettuccio
      description: Specifica la tonalità della calotta di un ombrello o di un parasole,
        come il nero
    canopy_material:
      name: Materiale della copertura
      description: Specifica il materiale utilizzato per ombrelloni o capottine parasole,
        ad esempio cotone o vinile
    canopy_pattern:
      name: Modello del baldacchino
      description: Identifica il motivo visivo sui tettucci degli ombrelli o degli
        ombrelloni, ad esempio a scacchiera o artistico
    cantilever_material:
      name: Materiale del cantilever
      description: Indica il materiale del cantilever che tiene lo stilo, influenzando
        la capacità di tracciamento e la firma sonora
    canvas_finish:
      name: Finitura della tela
      description: Indica se una tela è pronta per essere dipinta, ad es. preparata
