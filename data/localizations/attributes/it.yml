    clothing_accessory_material:
      name: Materiale accessorio per abbigliamento
      description: Identifica il materiale principale utilizzato negli accessori di
        abbigliamento, come pelle o lino
    clothing_features:
      name: Funzionalità dell'abbigliamento
      description: Descrive le proprietà uniche dell'abbigliamento, ad esempio la
        resistenza all'acqua o alle pieghe
    club_subset:
      name: Sottoinsieme di mazza
      description: 'Classifica le mazze da golf in sottocategorie specifiche, ad es.
        sand wedge, blade putter '
    club_type:
      name: Tipo di mazza
      description: Classifica le mazze da golf in base al loro utilizzo specifico,
        ad es. driver, ferro
    coating/sealant_application:
      name: Applicazione del rivestimento/sigillante
      description: Descrive la funzione dei rivestimenti protettivi e dei sigillanti,
