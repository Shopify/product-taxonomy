    display_board_features:
      name: Funzionalità del tabellone
      description: Descrive le caratteristiche uniche dei tabelloni, ad esempio supporto
        autoadesivo o robustezza
    display_color_mode:
      name: Modalità del colore del display
      description: Specifica il colore di visualizzazione del prodotto, ad es. colore,
        bianco e nero
    display_features:
      name: Funzionalità di visualizzazione
      description: Descrive il tipo di visualizzazione su un prodotto, ad esempio
        touchscreen o comandi tramite pulsanti
    display_interface:
      name: Interfaccia del display
      description: Specifica l'interfaccia video o dati utilizzata dal modulo schermo
    display_mode:
      name: Modalità del display
      description: Descrive il metodo di visualizzazione di un prodotto, ad esempio
        digitale o analogico
    display_recommended_use:
      name: Uso consigliato del display
      description: Suggerisce l'utilizzo ideale degli espositori fieristici in base
        al formato e al design, come commerciale o didattico
    display_resolution:
      name: Risoluzione del display
      description: Definisce la risoluzione di un display digitale, ad es. 1280 x
        1024, full HD
    display_sign_design:
      name: Design del cartello di visualizzazione
      description: Identifica il tipo di informazioni trasmesse da un segnale, come
        bagno, vendita o uscita
    display_technology:
      name: Tecnologia del display
      description: Definisce il tipo di tecnologia dello schermo utilizzata in un
        prodotto, ad es. LED, e-ink
    disposable/reusable_bag_features:
      name: Funzionalità della borsa monouso/riutilizzabile
