      description: Kategoriserer de specifikke komponenter eller tilbehørsdele, der
        er udviklet til luftgeværer, så kunderne hurtigt kan finde den helt rigtige
        reservedel, opgradering eller ekstraudstyr (f.eks. løb, stempelpakning eller
        hurtiglader).
    beach_ball_features:
      name: Badeboldens egenskaber
      description: Særlige funktionelle egenskaber for badebolde.
    beach_bucket_features:
      name: Strandspandfunktioner
      description: Strandspandens funktionelle egenskaber, der har betydning for brug,
        holdbarhed og brugervenlighed.
    beach_sand_toy_items_included:
      name: Medfølgende strand- og sandlegetøjsdele
      description: Ekstra strand- og sandlegetøjsdele, der følger med spanden (hvis
        den sælges som et sæt).
    bead_breaker_type:
      name: Perlebrydertype
      description: Type/design af perlehul-mekanismen.
    bead_hole_style:
      name: Perlehulsstil
      description: Angiver typen af hul eller åbning i perlen, som bestemmer hvordan
        den placeres på en krog eller line.
    bead_type:
      name: Perletype
      description: Primære perletyper, som kræves til mønsteret.
    bead_type_patch_embellishment:
      name: Perletype (lapudsmykning)
      description: Den primære perletype, der bruges på patchoverfladen.
    beaded_accessory_project_type:
      name: Projekttype for tilbehør med perler
      description: Hvilket tilbehør mønsteret danner.
    beading_needle_flexibility:
      name: Perlenålens fleksibilitet
      description: Nåleskaftets relative fleksibilitet til navigering i snævre perlebroderier.
    beading_pattern_bead_size:
      name: Størrelsen på perler i perlemønsteret
      description: Anbefalede perlestørrelser, der er angivet i mønsteret (typisk
        størrelser for frøperler, f.eks. 11/0 eller 8/0).
    beading_pattern_chart_format:
      name: Format for diagram over perlemønster
      description: Hvordan mønsteret vises visuelt (f.eks. som diagram eller trin-for-trin
        fotos).
    beading_pattern_stitch_technique:
      name: Perlemønstersting/-teknik
      description: Primær perlevævningsteknik, der bruges i mønsteret.
    beading_technique_stitch:
      name: Perleteknik/perlesyning
      description: Angiver den primære perlevævningsteknik eller stingtype, der bruges
        i mønsteret (f.eks. peyote-sting, brick-sting).
    beading_thread_fiber_type:
      name: Fibertype for perletråd
      description: Angiver fiber-/materialeundertypen af perletråd (mere specifikt
        end generisk materiale), der er relevant for resultatet.
    beading_thread_size:
      name: Perletrådsstørrelse
      description: Angiver den størrelsesbetegnelse, som producenten/branchen anvender
        for perletråd (mærke-/seriespecifik), f.eks. størrelse D eller 00.
    beading_thread_use_case:
      name: Eksempel på brug af perletråd
      description: Angiver den primære anbefalede brug af perletråden og hjælper kunder
        med at vælge det rette produkt til projektet.
    beading_wire_coating_material:
      name: Belægningsmateriale på perlewire
      description: Angiver det ydre belægningsmateriale på perletråden (hvis det er
        til stede), hvilket påvirker føling, holdbarhed og knækmodstand.
    beading_wire_strand_count:
      name: Antal tråde i perletråd
      description: Angiver hvor mange tråde perlewiren består af (f.eks. 7-, 19- eller
        49-trådet), hvilket påvirker fleksibilitet og smidighed.
    beadlock_type:
      name: Beadlock-type
      description: Angiver om hjulet har låsefælg, og hvilken type det er (relevant
        for off-road/UTV).
    beam_material:
      name: Stangtype
      description: Bjælkens/stangens primære materiale (ofte anderledes end hovederne/beslagene).
    beam_pattern:
      name: Bjælkemønster
      description: Fordelingsmønster af lys ved køre- og off-road-belysning.
    bean_bag_fabric_material:
      name: Sækkestolstofmateriale
      description: Angiver det yderstof, der bruges til sækkestolene, som følger med
        sættet.
    bean_paste_variety:
      name: Variationer af bønnepasta
      description: Klassificerer den specifikke type af bønnepasta baseret på fremstillingsmetode
        eller hovedingrediens.
    bean_preparation:
      name: Tilberedning af bønner
      description: Angiver, hvordan bønnerne tilberedes eller forarbejdes før salg
        (f.eks. hele bælge, afskallede, hakkede, eller spirede).
    bean_variety:
      name: Bønnevariant
      description: Angiver bønnernes botaniske eller handelsmæssige sort (f.eks. grønne
        bønner, edamame eller lange bønner).
    beanie_style:
      name: Type af beanie
      description: Beskriver beanies overordnede design, udformning eller silhuet,
        så kunderne hurtigt kan vælge mellem de mest almindelige varianter.
    bearing_clearance:
      name: Lejefrirum
      description: Angiver lejets klasse for indre radialfrirum (det indre frirums
        størrelse). Klasse C0 kaldes også for CN eller normalt frirum.
    bearing_construction_type:
      name: Lejekonstruktionstype
      description: Angiver den type lejekonstruktion der bruges i navet (f.eks. patronleje
        eller løse kugler).
    bearing_edge_type:
      name: Type af lejekant
      description: Typen/profilen af trommeskallens lejekant, som påvirker anslag
        og efterklang.
    bearing_lubrication:
      name: Lejesmøring
      description: Angiver typen af smøremiddel, der anvendes i lejet ved fremstilling,
        f.eks. fedt eller olie.
    bearing_material:
      name: Lejemateriale
      description: Angiver hvilket materiale lejet er lavet af (f.eks. stål eller
        keramisk hybrid) og hjælper ved valg mellem holdbarhed, pris og ydeevne
    bearing_rating:
      name: Lejeklassificering
      description: Angiver lejeklasse eller præcisionsniveau skøjterne bruger (f.eks.
        ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Lejetætningskode
      description: Angiver typen af tætning på lejet, som påvirker holdbarhed og rullemodstand.
    bearing_seal_type:
      name: Lejetætningstype
      description: Angiver den tætnings- eller afskærmningsdesign, der beskytter lejets
        indre dele mod forurenende stoffer og påvirker luftmodstanden (f.eks. 2RS,
        ZZ, LLU eller åben).
    bearing_shield_type:
      name: Type af lejeskjold
      description: Type af afskærmning eller tætning, der beskytter lejets indre dele.
    bearing_size_code:
      name: Kode for lejestørrelse
      description: Standardiseret lejekode (f.eks. 608, 688), der beskriver indvendig
        diameter, udvendig diameter og bredde.
    bearing_type:
      name: Lejetype
      description: Angiver konstruktionsstilen for de lejer, der anvendes i headsettet.
    beater_head_material:
      name: Piskehovedmateriale
      description: Angiver det materiale stortrommens beaterhoved er lavet af (f.eks.
        filt, træ eller gummi).
    beaters_included:
      name: Pedalkølle medfølger
      description: Angiver antallet af pedalkøller på trommepedalen (f.eks. enkelt
        eller dobbelt), eller om der slet ikke medfølger kølle.
    bed_base_type:
      name: Sengebundstype
      description: Angiver den strukturelle opbygning af sengens eller divanens bund
        (f.eks. platform, lamelbund eller justerbar).
    bed_storage_type:
      name: Sengeopbevaringstype
      description: Angiver den indbyggede opbevaringsløsning i sengerammen.
    bedroom_furniture_items_included:
      name: Møbelartikler til badeværelse medfølger
      description: Angiver de enkelte møbler, der følger med i soveværelsessættet
        (f.eks. seng, kommode eller natborde), så kunden hurtigt kan se, hvad der
        er inkluderet, uden at læse lange beskrivelser.
    bedroom_vanity_items_included:
      name: Dele til sminkebord, der følger med
      description: Viser en liste over de enkelte dele der følger med et sminkebords-sæt,
        så kunden kan se præcis, hvad der leveres (f.eks. spejl, stol og belysning).
    beer_based_cocktail_variety:
      name: Type af ølbaseret cocktail
      description: Klassificerer ølbaserede cocktails efter deres specifikke variant,
        f.eks. Radler, Shandy eller Michelada.
    beet_variety:
      name: Bedevariant
      description: Angiver kultivar eller sort af rødbede, hvilket hjælper kunder
        med at identificere smag, farve og kulinariske anvendelser (f.eks. Red, Golden
        eller Chioggia).
    bell_actuation_mechanism:
      name: Klokkeaktiveringsmekanisme
      description: Angiver den brugerhandling, der kræves for at ringe på klokken,
        hvilket hjælper købere med at vælge den ønskede ergonomi.
    bell_guard_coverage_area:
      name: Koblingshusets dækningsområde
      description: Angiver den del af klokken, beskyttelsesdelen dækker.
    bell_material:
      name: Klokkemateriale
      description: Angiver materialet i klokkedelen (hvis det er specificeret separat
        fra instrumentets overordnede materiale).
    bellhousing_bolt_pattern:
      name: Boltmønster til koblingshus
      description: Angiver den standard for boltmønsteret på koblingshuset/motorsiden
        eller den mønsterfamilie, som gearkassen anvender.
    bellows_material:
      name: Bælgmateriale
      description: Materiale i bælgens hoveddel eller overtræk (hvis relevant).
    bellows_orientation:
      name: Bælgretning
      description: Angiver den bælgtype der anvendes til at føre luft til pibene.
    belly_panel_style:
      name: Type af mavepanel
      description: Beskriver udformningen af linningen eller mavepanelet, der giver
        plads til en voksende mave.
    belt_buckle_type:
      name: Bæltespændetype
      description: Beskriver den specifikke spændemekanisme eller type design, der
        bruges på bæltet.
    beret_style:
      name: Type af baret
      description: Angiver det specifikke baret-design eller den kulturelle variant.
    berry_species:
      name: Bærarter
      description: Angiver den bærart produktet indeholder, så kunder hurtigt kan
        filtrere efter deres foretrukne bær.
    beta_casein_variant:
      name: Beta-kaseinvariant
      description: Angiver den beta-kasein-proteinvariant (f.eks. A2), der findes
        i mælken, for forbrugere med fordøjelsesproblemer.
    beverage_sweetness_level:
      name: Drikkevares sødmeniveau
      description: Klassificerer drikken efter graden af tilsat sødme eller sukker.
    bezel_graduation_units:
      name: Graduering på bezel-enheder
      description: Angiver enhedsmærkningerne på den roterende bezel (grader, mil
        eller dobbelt skala).
    bicycle_brake_set_components_included:
      name: Komponenter til cykelbremsesæt, der er inkluderet
      description: Viser en oversigt over de enkelte dele, der følger med i sættet,
        så kunderne ved præcis, hvad der er inkluderet, og kan sammenligne forskellige
        pakkekonfigurationer.
    bicycle_cage_mounting_position:
      name: Placering af flaskeholderens montering på cyklen
      description: Angiver, hvor på cyklen buret er designet til at blive installeret.
    bicycle_computer_mount_placement:
      name: Placering af cykelcomputerbeslag
      description: Angiver, hvor på cyklen computerholderen monteres, f.eks. foran
        på styret eller på frempindens topkappe.
    bicycle_folding_mechanism:
      name: Cykelfoldemekanisme
      description: Angiver det mekaniske foldesystem, der bruges på cykelrammen (f.eks.
        halvfold, lodret fold).
    bicycle_frame_design:
      name: Cykelstellets udformning
      description: Angiver den overordnede stil på cykelrammen, som påvirker tilgængelighed,
        lastekapacitet og opbevaring.
    bicycle_frame_style:
      name: Type af cykelramme
      description: Beskriver cykelrammens konstruktionstype (lav indstigning, lowrider,
        chopper stretch osv.), som har indflydelse på cyklistens kropsholdning og
        cykelens udseende.
    bicycle_handlebar_type:
      name: Cykelstyrstype
      description: Angiver den specifikke type eller geometri af styret, så ryttere
        kan vælge det styr, der passer til deres kørestilling og disciplin.
    bicycle_headset_configuration:
      name: Konfiguration af cyklens headset
      description: Angiver den strukturelle type eller standard for cyklens headset
        baseret på dets kop-/lejeopsætning (f.eks. ekstern kop, ZeroStack, integreret
        eller gevindskåret).
    bicycle_hub_type:
      name: Cykeltype
      description: Beskriver navets mekanisme, som følger med hjulet, og som påvirker
        kompatibilitet med drivlinjen samt kørestil.
    bicycle_lock_security_certification:
      name: Sikkerhedscertificering for cykellås
      description: Uafhængig tredjepartscertificering, der bekræfter tyverisikringen
        (f.eks. Sold Secure, ART eller Varefakta).
    bicycle_pedal_type:
      name: Pedaltype på cykel
      description: Angiver pedalens overordnede funktionsstil eller design, såsom
        platform-, klik- eller hybridpedaler, og hjælper ryttere med at vælge den
        rette type kontaktflade til deres kørestil.
    bicycle_propulsion_type:
      name: Fremdrivningstype for trehjulet cykel
      description: Angiver, hvordan cyklen drives frem, såsom manuel pedaltråd, elektrisk
        assistance eller forbrændingsmotor.
    bicycle_pump_type:
      name: Cykelpumpetype
      description: Angiver pumpens strukturelle type, så kunder kan vælge det design,
        der passer bedst til deres kørsel, opbevaring eller nødsituationer.
    bicycle_rack_mounting_type:
      name: Monteringstype for cykelholder
      description: Beskriver den primære metode eller det sted, hvor stativet fastgøres
        til cyklen, hvilket hjælper brugerne med at kontrollere, om det passer til
        deres stel og beslag.
    bicycle_suspension_type:
      name: Affjedringstype i cykel
      description: Angiver, om cyklen er udstyret med affjedring, og hvordan den er
        indstillet.
    bicycle_tire_tread_pattern:
      name: Dækmønster på cykeldæk
      description: Angiver dækkets slidbanemønster, som påvirker vejgreb og rullemodstand
        på forskellige underlag.
    bidirectional_charging_capability:
      name: Tovejsladningsfunktion
      description: Angiver, om det elektriske køretøj understøtter tovejsladning,
        såsom V2G (vehicle-to-grid) og/eller V2H (vehicle-to-home).
    bike_rack_mounting_style:
      name: Monteringsstil for cykelstativ
      description: Angiver, hvordan cyklen placeres og sikres på holderen.
    bike_rack_tilt_function:
      name: Vippefunktion til cykelstativ
      description: Angiver om og hvordan holderen kan vippes, mens den stadig er monteret.
    bikini_top_style:
      name: Type af bikinitop
      description: Angiver bikini-toppens design eller snit, hvilket hjælper kunderne
        med at finde deres foretrukne pasform og silhuet.
    billiard_brush_type:
      name: Type af billiardbørste
      description: Angiver den specifikke type rengøringsredskab til billardbord (f.eks.
        bordbørste, kantbørste eller poleringsklods).
    billiard_glove_finger_coverage:
      name: Dækning af fingre i billardhandske
      description: Angiver, hvilke fingre der er dækket af handskens design, hvilket
        giver en præcis inddeling af handsketyper, der er specielt udviklet til billard.
    billiard_pocket_style:
      name: Billiardlommestil
      description: Angiver lommens form eller udseende, hvilket har betydning for,
        hvor godt den passer til borddækningen.
    billiard_rack_style:
      name: Type af trekant til billard
      description: Beskriver stativets fysiske udformning eller konstruktion (f.eks.
        traditionel ramme, skabelonplade eller sammenklappelig).
    billiard_table_type:
      name: Type af billardbord
      description: Angiver den type kø-sport eller spil bordet er designet til (f.eks.
        pool, snooker eller carambole).
    billiards_discipline:
      name: Billarddisciplin
      description: Angiver den specifikke variant af kø-sport (spiltype), som produktet
        er beregnet til eller kompatibelt med.
    binding_compatibility_standard:
      name: Standard for bindingskompatibilitet
      description: Angiver bindingens kontaktflade (sålstandard), som skistøvlen er
        certificeret til, hvilket sikrer korrekt og sikker kompatibilitet med skibindinger.
    binding_inclusion:
      name: Inklusion af bindinger
      description: Angiver, om skiene sælges uden bindinger, med et integreret system
        eller med separate bindinger inkluderet.
    binding_interface:
      name: Bindingsfastgørelse
      description: Angiver, hvilken bindingsplade eller beslagstandard, som skiene
        er monteret med eller er kompatible med, hvilket sikrer kompatibilitet mellem
        støvle og binding.
    binding_liner_type:
      name: Type af inderstøvle til binding
      description: Beskriver typen af inderstøvle i bindingen/skistøvlen (f.eks. udtagelig,
        gåbar eller varmeformbar).
    binding_mounting_system:
      name: Bindingsmonteringssystem
      description: Angiver den type fastgørelse, der anvendes til at montere bindingen
        på skien (fladmontering, skinne/spor, plade osv.).
    binding_position:
      name: Fastgørelsesposition
      description: Angiver den tiltænkte monteringsposition eller konfiguration for
        bindingen (f.eks. forreste støvle, bagerste støvle, ARTP).
    binding_strap_position:
      name: Placering af bindingsrem
      description: Angiver, hvor på bindingen remmen skal monteres.
    bingo_components_included:
      name: Bingokomponenter medfølger
      description: Viser en liste over de komponenter, der følger med bingosættet,
        såsom bingokugler, kort og markører.
    bingo_number_range:
      name: Bingo-talinterval
      description: Identificerer bingonummerintervallet/-varianten, der understøttes
        af sættet.
    bingo_set_features:
      name: Bingosættets egenskaber
      description: Angiver bingosættets primære produktformat (fysisk/manuelt eller
        elektronisk/interaktivt).
    bipod_mounting_interface:
      name: Monteringsflade til tobenet stativ
      description: Angiver den monteringskontaktflade, der bruges til at fastgøre
        bipoden til våbnet eller skinnesystemet.
    bit_attachment_type:
      name: Fastgørelsestype for bit
      description: Angiver, hvordan hovedtøjet forbindes til biddet (f.eks. bindebånd,
        spænder eller Chicago-skruer).
    bit_mouthpiece_design:
      name: Design af bidets mundstykke
      description: Angiver mundstykkets konstruktionstype eller samlingskonfiguration,
        som bestemmer trykfordelingen, afstanden til ganen og den generelle hårdhed.
    bit_ring_style:
      name: Type af bidring
      description: Beskriver udformningen af den del af biddet, der fastgøres til
        hovedtøj, hvilket har indflydelse på hestens bevægelser, sidestyring og tøjlefornemmelsen.
    bladder_material:
      name: Blæremateriale
      description: Angiver materialet i den indvendige blære, som holder luften.
    blade_attachment_type:
      name: Bladfastgørelsestype
      description: Angiver om skøjten bruger en klapmekanisme (hængslet) eller en
        fast bladmontering.
    blade_finish_coating:
      name: Finish eller belægning på bladet
      description: Overfladebehandling på klingen af æstetiske årsager eller som korrosionsbeskyttelse.
    blade_hosel_type:
      name: Klingens halsform
      description: Angiver tilslutningstypen for bladets hosel, der passer i skaftet,
        og som påvirker kompatibiliteten (f.eks. standard eller konisk).
    blade_length_type:
      name: Klingelængdetype
      description: Klassificerer finnernes bladlængde som kort, medium eller lang,
        hvor hver type påvirker svømmefrekvens og træningsmål.
    blade_lie:
      name: Bladets vinkel
      description: Angiver lie-vinklen på hockeystavens blad, hvilket angiver, hvordan
        bladet ligger på isen i forhold til skaftet.
    blade_sharpness:
      name: Bladets skarphed
      description: Angiver om våbnets æg er slebet eller sløvt og beregnet til træning.
    blade_size_category:
      name: Klingestørrelsens kategori
      description: Standardiseret international sabelbladstørrelseskode (skøjte) (0-5),
        der bruges til at skelne mellem sabelklinger til unge og voksne.
    blade_size_class:
      name: Klingestørrelsesklasse
      description: Klassificerer bladet efter spillers størrelseskategori, så det
        matcher skaftstørrelser som ungdom, junior, mellemtrin eller senior.
    blade_size_number:
      name: Bladstørrelsesnummer
      description: Almindelig numerisk størrelseskode (0-5), der er fastsat i reglerne
        for fægtning, som bestemmer klingens længde, og hvilken aldersgruppe der må
        konkurreres i.
    blaster_mechanism:
      name: Blastermekanisme
      description: Definerer gelblasterens interne funktionsmekanisme (f.eks. GBB,
        AEG eller fjederdrevet).
    block_edge_style:
      name: Blokkantstil
      description: Beskriver hvordan træklodsens kanter/hjørner er afsluttet med hensyn
        til greb og sikkerhed.
    blocking_mat_features:
      name: Blokeringsmåttefunktioner
      description: Funktionelle egenskaber ved blokeringsmåtter (opbevaring, transportabilitet
        og brugervenlighed).
    blocking_mat_grid_unit:
      name: Gitterenhed på blokeringsmåtte
      description: Det målesystem, der anvendes på det trykte gitter, og som hjælper
        brugerne med at sammenholde mønstre og mål.
    blocking_mat_surface_markings:
      name: Overmaling af markeringer på blokmåtter
      description: Type af måle- eller guide-markeringer, der er trykt eller indstøbt
        i måttens overflade.
    blocking_wire_coating:
      name: Blokledningsbelægning
      description: Overfladebehandling eller belægning på blokeringswiren, som påvirker
        rustbestandighed, glathed og risiko for at hænge fast.
    blocking_wire_end_cap_type:
      name: Type af endekappe på blokeringswire
      description: Angiver typen af endebeskyttelse eller afslutning på blokeringswirens
        ender for sikkerhed og beskyttelse af stoffet.
    blocking_wire_set_includes:
      name: Indhold i blokeringswiresættet
      description: Angiver hvilke komponenter der følger med blokeringswiren (f.eks.
        T-pins, opbevaringsrør).
    blocking_wire_usage:
      name: Blokledningsbrug
      description: Primært anvendelsesformål, som den fleksible blokeringswire er
        designet til.
    bloom_stage:
      name: Blomstringsstadie
      description: Angiver, hvor åbne margueritblomsterne er ved levering/afsendelse.
    blower_motor_bearing_type:
      name: Type af lejer i blæsermotoren
      description: Angiver det lejedesign, der anvendes i blæsermotoren.
    blower_motor_mounting_position:
      name: Blæsermotorens monteringsposition
      description: Hvor blæsermotoren er monteret i HVAC-modulet/køretøjet (f.eks.
        foran eller bagpå).
    blowpipe_valve_type:
      name: Ventiltype til blæserør
      description: Angiver typen af ventil på blæserøret (hvis inkluderet).
    bo_staff_style:
      name: Bo-stavens stil
      description: Angiver den strukturelle type eller opbygning af staven (f.eks.
        lige, konisk, skumpolstret eller sammenklappelig).
    board_game_theme:
      name: Brætspillets tema
      description: Brætspillets fortællingstema eller univers (bruges til opdagelse
        og browsing).
    board_rail_shape:
      name: Form på brætkant
      description: Angiver brættets kantprofil (f.eks. blød, hård eller 50/50), som
        har indflydelse på grebet og fremdriften på en bølge.
    board_size_classification:
      name: Klassificering af brætstørrelser
      description: Inddeler cornhole-brættet eller -sættet i almindelige standardstørrelser.
    board_type_compatibility:
      name: Kompatibilitet med brættype
      description: Angiver den type bræt, som snoren er designet til.
    boat_construction_type:
      name: Bådkonstruktionstype
      description: Beskriver robådens strukturelle stil eller format (f.eks. oppustelig
        eller solid).
    boat_hook_flotation:
      name: Bådshagens flydeevne
      description: Angiver, om bådshagen er designet til at flyde, hvis den tabes
        i vand.
    boat_ladder_stowage_style:
      name: Lejderens opbevaringsstil
      description: Beskriver, hvordan lejderen fungerer, når den ikke er i brug (f.eks.
        sammenklappelig, udtrækkelig eller aftagelig).
    boat_trailer_construction_type:
      name: Bådtrailerens konstruktionstype
      description: Angiver, om traileren understøtter båden med køjer, ruller eller
        et hybridsystem.
    boat_weaving_shuttle_weft_exit_type:
      name: Hvordan islætstråden føres ud af væveskytten
      description: Hvordan islætstråden føres ud af skytten under vævning.
    bobbin_loading_type:
      name: Type af spoletilførsel
      description: Angiver, hvordan spolen indsættes/isættes i symaskinen.
    bobbin_system:
      name: Spolesystem
      description: System/type af spoleindsætning i symaskinen.
    bobbin_type:
      name: Spoletype
      description: Angiver den type garnholder, som skytten er designet til at bruge
        (eller inkluderer), som bestemmer kompatibilitet og typisk anvendelse (f.eks.
        bruger bådskyttter ofte spoler, mens kludskytter kan være åbne til strimler).
    bobbin_winder_winding_direction:
      name: Oprulningsretning for spoleopruller
      description: Angiver den oprulnings- eller rotationsretning, som spoleoprulleren
        understøtter.
    bobble_mechanism:
      name: Vippemekanisme
      description: Angiver vippemekanismens type, der har betydning for bevægelighed
        og holdbarhed.
    bocal_material:
      name: Materiale i det S-formede rør
      description: Angiver materialet i den eller de medfølgende bocaler.
    bodhr_n_head_material:
      name: Materiale i bodhrán-skind
      description: Materialet i spillefladen (membranen), som har stor indflydelse
        på klang og vedligeholdelsesbehov.
    bodhr_n_tuning_system_type:
      name: Stemmesystemtype for bodhrán
      description: Type af indbygget stemmemekanisme, der bruges til at justere skindets
        spænding (hvis den er stembar).
    body_armor_coverage_area:
      name: Dækningsområde for skudsikre veste
      description: Angiver hvilke kropszoner produktet beskytter.
    body_armor_intended_use:
      name: Tiltænkt anvendelse af kropsbeskyttelse
      description: Angiver det primære køre- eller anvendelsesscenarie, som ATV/UTV-kropsbeskyttelsen
        er designet til.
    body_cord_connector_style:
      name: Type af tilslutning til kropsledning
      description: Beskriver stikkonfigurationen i ledningens ender (f.eks. antal
        ben eller bajonetstil), som afgør, om den er kompatibel med våben og pointkasser.
    body_panel_finish_state:
      name: Finish på karrosseripanel
      description: Beskriver kvartpanelens overfladeforberedelse/finish som leveret
        til maling/montering.
    body_shape:
      name: Kropsform
      description: Angiver den overordnede kropsform eller stil på elguitaren.
    bodysuit_bottom_coverage:
      name: Heldragtens bunddækning
      description: Angiver udskæringen og dækningen af bodysuitens underdel, hvilket
        påvirker komfort og kompatibilitet med tøj.
    boilie_shape:
      name: Form på boilie
      description: Angiver formen på de boilies, der fremstilles på rullebordet, så
        lystfiskere kan vælge mellem forskellige agnprofiler.
    boilie_stop_buoyancy:
      name: Flydeevne for boilie-stop
      description: Angiver, om boilie-stoppet er designet til at flyde, synke eller
        være neutralt flydende, hvilket påvirker agnens præsentation i vandet.
    bok_choy_variety:
      name: Pak choi-sort
      description: Angiver kultivaren, handelsnavnet eller varianten af bok choy (f.eks.
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), så købere kan vælge ønsket
        smag, størrelse og udseende.
    bolt_drive_style:
      name: Type af bolt-drev
      description: Angiver typen af drivsystem på skateboardets monteringsbolte, som
        bestemmer hvilken type værktøj der bruges (f.eks. unbrako/Allen eller stjerneskruetrækker/Phillips).
    bone_content:
      name: Benindhold
      description: Angiver om kødet indeholder ben.
    bongo_center_block_material:
      name: Materiale i bongos centerblok
      description: Materiale i centerblokken, der forbinder de to bongoskaller (hvis
        relevant).
    bongo_shell_material:
      name: Bongo-skalmateriale
      description: Materialet i bongoskallerne (trommekroppene), eksklusive skind
        og beslag.
    bongo_tuning_system:
      name: Bongo-stemmesystem
      description: Type af stemmesystem/konstruktion for bongos (f.eks. traditionel
        lug-stemning eller rebstemning), som påvirker vedligeholdelse og autenticitet.
    boning_type:
      name: Stivertype
      description: Angiver det indvendige støttesystem i taljeformgiveren, herunder
        både materiale og type/form på de indlagte stivere, som direkte påvirker støtte,
        fleksibilitet og holdbarhed.
    boot_liner_type:
      name: Type af inderstøvle
      description: Beskriver konstruktionen eller mulighederne for tilpasning af den
        indvendige foring i snowboardstøvlen (f.eks. varmeformbar eller udtagelig).
    boot_sole_compatibility:
      name: Kompatibilitet med støvlesåler
      description: Viser en oversigt over de sålstandarder eller kontaktfladesystemer,
        som bindingen er kompatibel med.
    boot_support_level:
      name: Støvlens støtteniveau
      description: Beskriver den samlede ankel- eller støvle-stivhed/supportgrad,
        som skøjten giver.
    boot_width_code:
      name: Kode for støvlebredde
      description: Producentens bogstavbaserede breddeangivelse, som bruges specifikt
        til størrelser af kunstskøjter (f.eks. AAA, AA, B, C, D).
    booth_configuration:
      name: Konfiguration af bås
      description: Identificerer den overordnede siddekonfiguration for boksen (f.eks.
        enkeltsidet, hjørne eller modulær).
    bootie_toe_design:
      name: Støvletå-design
      description: Beskriver tåkonstruktionen på surfstøvler og revstøvler.
    border_type:
      name: Kanttype
      description: Kantfinish/-type på det broderede mærke (påvirker udseende, modstandsdygtighed
        mod trevling og den oplevede kvalitet).
    bore_cleaner_format:
      name: Borerenseformat
      description: Angiver borerenseproduktets fysiske formfaktor (værktøj eller forbrugsvare).
    bore_cleaner_safe_for_finish:
      name: Sikker for overfladebehandling ved brug af løbsrenser
      description: Angiver, hvilke almindelige overfladebehandlinger på messinginstrumenter
        rensemidlet til rørene kan bruges sikkert sammen med.
    bottle_cage_loading_direction:
      name: Flaskeholderens læsseretning
      description: Beskriver den retning, som en flaske indsættes i eller tages ud
        af flaskeholderen.
    bottle_neck_finish_closure_size:
      name: Flaskehalsens udformning/lukningens størrelse
      description: Den standardiserede flaskeåbning/flaskehalsstørrelse, der sikrer
        kompatibilitet med kapsler, propper og kapselmaskiner (f.eks. 26 mm kronhals).
    bottle_style:
      name: Flaskestil
      description: Almindelige formtyper for aftapningsflasker, der anvendes til hjemmebrygning
        og vinfremstilling.
    bottom_bracket_interface:
      name: Krankboks-kontaktflade
      description: Angiver den spindel-/krankboksstandard, som kranken er designet
        til, så stel og krankboks er kompatible.
    bottom_bracket_standard:
      name: Standard for kranksæt
      description: Angiver den krankboks-skal/kontaktflade, som stellet understøtter,
        og som afgør kompatibilitet med kranksæt.
    bottom_type_suitability:
      name: Egnethed til bundtype
      description: Angiver de havbundsforhold, som ankeret er konstrueret til at holde
        bedst i.
    bounce_level:
      name: Opspringsniveau
      description: Angiver, hvor meget bolden springer tilbage, når den tabes eller
        kastes, hvilket hjælper brugerne med at vælge den rigtige bold til øvelser
        som f.eks. kast mod væggen eller slam.
    bouncy_ball_surface_finish:
      name: Hoppeboldens overfladefinish
      description: Angiver den taktile og/eller visuelle overfladebehandling på en
        hoppebold (f.eks. glat, pigge eller med glitter).
    boundary_marker_type:
      name: Grænsemarkørtype
      description: Angiver den fysiske udformning af markeringen eller markeringsmidlet,
        der afgrænser banen eller spilleområdet (f.eks. kegler, bånd, maling, skabeloner
        eller maskiner).
    bouquet_size_tier:
      name: Størrelsesniveau for buket
      description: Standardiseret størrelsesniveau for buket/bundt, uafhængigt af
        antal stilke (anvendes ved blandede buketter).
    bow_and_yo_yo_edge_finish:
      name: Kantfinish på sløjfe- og yo-yo
      description: Beskriver kant-/båndfinishen på sløjfen/yo-yoen (især for sløjfer
        med bånd).
    bow_case_shell_type:
      name: Skaltype for buetasken
      description: Beskriver konstruktionen af buetaskens ydre (f.eks. hård skal eller
        blødt etui).
    bow_compatibility:
      name: Buekompatabilitet
      description: Angiver den type bue jagtspidsen er beregnet til eller godkendt
        til at blive brugt med.
    bow_hair_color:
      name: Hårfarve til buer
      description: Angiver farven/udseendet på hårene på buen til et orkesterstrengeinstrument
        (f.eks. hvid/bleget, naturlig hvid eller sort).
    bow_stick_material:
      name: Buepindsmateriale
      description: Angiver det materiale, der er brugt til buens skaft (hovedstammen),
        hvilket har stor indflydelse på vægt, føling og pris.
    bow_type:
      name: Buetype
      description: Angiver den strukturelle udformning af ungdomsbuen (f.eks. compoundbue,
        recurvebue eller langbue), som har stor betydning for skydestil, nødvendigt
        udstyr og træningsprogrammer.
    bow_winding_material:
      name: Bueviklingsmateriale
      description: Angiver det materiale, der er anvendt til bueviklingen, hvilket
        har indflydelse på grebet og balancen.
    bow_yo_yo_embellishment_style:
      name: Bue-/yo-yo-udsmykningsstil
      description: Angiver den fremstillede stil af pyntedetaljen (sløjfe eller stof-yo-yo-konstruktion).
    bowling_ball_core_type:
      name: Kernetype for bowlingkugle
      description: Beskriver bowlingkuglens indre kernekonstruktion eller symmetri,
        som har indflydelse på kuglens bevægelse og evne til at dreje.
    bowling_ball_coverstock_type:
      name: Type af yderbelægning på bowlingkuglen
      description: Angiver materialet eller teknologien i bowlingkuglens yderbelægning,
        som bestemmer banegreb og kurvepotentiale.
    bowling_set_style:
      name: Type/stil af bowlingsæt
      description: Angiver den overordnede type eller anvendelse af bowlingsættet.
    box_lid_type:
      name: Type af æskelåg
      description: Type af låg- eller åbningsmekanisme, som gaveæsken eller dåsen
        bruger.
    box_spring_profile:
      name: Profil af boxmadras
      description: Klassificerer boxmadrassens samlede højde i brugervenlige profilkategorier
        (f.eks. lav, standard eller høj profil), så kunder hurtigt kan filtrere uden
        at kende præcise mål.
    box_spring_requirement:
      name: Krav til boxmadras
      description: Angiver, om der er behov for en ekstra boxmadras eller sengeramme/fundament.
    boxing_ring_style:
      name: Bokseringsstil
      description: Klassificerer ringens overordnede konstruktionstype eller tiltænkte
        anvendelsesscenarie (f.eks. konkurrence eller træning, forhøjet eller gulvmodel).
    bra_length_type:
      name: BH-længdetype
      description: Angiver bh’ens længdeklassifikation baseret på lodret dækning,
        såsom standard, longline, midi eller cropped.
    bra_padding_type:
      name: Type af bh-udfyldning
      description: Beskriver niveauet eller tilstedeværelsen af udfyldning i kopperne.
    braces_compatibility:
      name: Mundbeskytterkompatibilitet
      description: Angiver om tandbeskytteren kan bruges sammen med tandbøjle, og
        i hvilket omfang.
    brake_band_form:
      name: Form på bremsebånd
      description: Angiver, om bremsebåndet leveres som en endeløs sløjfe eller som
        et afskåret stykke, der skal fastgøres.
    brake_band_material_type:
      name: Materialetype for bremsebånd
      description: Angiver det materiale, som bremsebåndet er fremstillet af (f.eks.
        bomuldssnor, nylonsnor eller fjederstål), hvilket har indflydelse på holdbarhed,
        greb, elasticitet og støj.
    brake_band_style:
      name: Type af bremsebånd
      description: Angiver bremsesnorspændingssystemet/-typen, der anvendes på en
        spinderok til at regulere spændingen på spindeskiven og spolen.
    brake_bleeding_method:
      name: Bremseudluftningsmetode
      description: Understøttet udluftningsmetode i sættet.
    brake_booster_assist_type:
      name: Type bremseforstærker
      description: Angiver den hjælpemekanisme, der anvendes af bremseforstærkeren.
    brake_booster_diaphragm_configuration:
      name: Membran-konfiguration i bremseforstærkeren
      description: Angiver antal og type af membraner, der anvendes i bremseforstærkeren.
    brake_caliper_bleeder_screw_position:
      name: Placering af udluftningsskrue på bremsekaliberen
      description: Angiver udluftningsskruens placering på bremsekaliperen, når den
        er monteret (bruges til at kontrollere, at udluftningsskruen er placeret på
        det højeste punkt for at sikre korrekt udluftning).
    brake_caliper_finish:
      name: Overfladefinish på bremsekaliber
      description: Angiver den overfladefinish eller beskyttende belægning, der er
        påført bremsekaliberens hus (f.eks. maling, metallisk belægning eller anodisering).
    brake_caliper_included_hardware:
      name: Dele, der følger med bremsekaliperen
      description: Angiver, hvad der følger med til bremsekaliber-enheden.
    brake_caliper_mount_type:
      name: Type af montering til bremsekaliber
      description: Monteringsflade, der anvendes til at fastgøre bremsekaliperen til
        ledet/beslaget.
    brake_caliper_paint_base_chemistry:
      name: Kemisk base for bremsekaliberens maling
      description: Det anvendte malings-/harpikssystem eller den anvendte kemikalieserie.
    brake_caliper_paint_kit_contents:
      name: Indhold i lakeringssæt til bremsekalipre
      description: Angiver, hvad der er inkluderet i pakken ud over selve malingen.
    brake_circuit_type:
      name: Type af bremsesystemkredsløb
      description: Angiver den hydrauliske kredsløbskonfiguration, som hovedcylinderen
        understøtter.
    brake_clutch_fluid_base_chemistry:
      name: Bremse-/koblingsvæskebaseret kemi
      description: Primær kemisk base for bremse-/koblingsvæsken, som påvirker kompatibilitet
        og blandbarhed.
    brake_clutch_fluid_dot_specification:
      name: DOT-specifikation for bremse-/koblingsvæske
      description: DOT-ydelsesklassifikation for hydraulisk bremse-/koblingsvæske
        (f.eks. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Bremsetromlens overflade/belægning
      description: Overfladefinish eller beskyttende belægning på bremsetromlen (f.eks
        elektroforetisk lakering, malet eller zinkbelagt).
    brake_drum_type:
      name: Bremsetromletype
      description: Konstruktionstype for bremsetromlen (med eller uden integreret
        nav/leje).
    brake_fluid_base:
      name: Bremsevæskebase
      description: Angiver typen af den hydrauliske bremsevæske, der kræves eller
        følger med.
    brake_fluid_base_chemistry:
      name: Kemisk base for bremsevæske
      description: Definerer den kemiske base for bremsevæsken, som bestemmer kompatibilitet
        og blandingsregler.
    brake_fluid_dot_specification:
      name: DOT-specifikation for bremsevæske
      description: Angiver DOT-bremsevæskeklassificeringen/specifikationen (f.eks.
        DOT 3 eller DOT 4) for bremsevæskeprodukter.
    brake_fluid_standards_compliance:
      name: Overholdelse af standarder for bremsevæske
      description: Industrielle standarder, som bremsevæsken opfylder (ud over DOT-klassificeringen).
    brake_fluid_type:
      name: Type af bremsevæske
      description: Angiver den bremsevæske, der kræves til hydrauliske cykelbremsekalibre.
    brake_hose_end_fitting_type:
      name: Type af bremseslangetilslutning
      description: Tilslutningstype i hver ende af bremseslangen (f.eks. banjo, konus
        eller hun-/han-gevind), som sikrer kompatibilitet med kalibre og ledninger.
    brake_lever_pull_type:
      name: Bremsegrebets træktype
      description: Angiver trækforholdet/mekanikken, som håndtaget er konstrueret
        til, hvilket sikrer kompatibilitet med bestemte bremsekalibre (f.eks. fælgbremser
        med kort træk i forhold til V-bremser med langt træk).
    brake_light_switch_actuation_type:
      name: Aktiveringstype for bremselyskontakt
      description: Angiver den fysiske påvirkning der aktiverer kontakten (f.eks.
        pedal/stempel eller hydraulisk tryk).
    brake_light_switch_connector_type:
      name: Stiktype for bremselyskontakt
      description: Angiver typen af elektrisk stik/tilslutning, som bremselyskontakten
        bruger til at tilslutte køretøjets ledningsnet.
    brake_light_switch_contact_type:
      name: Stiktype for bremselyskontakt
      description: Bremselyskontaktens elektriske kontaktkonfiguration/funktion (f.eks.
        normalt åben/lukket, omskifter eller flere kredsløb).
    brake_light_switch_mounting_style:
      name: Monteringsstil for bremselyskontakt
      description: Angiver, hvordan bremselyskontakten er monteret/installeret på
        køretøjet eller bremsesystemet (f.eks. gevindmontering, klips, beslag eller
        banjobolt).
    brake_master_cylinder_mounting_type:
      name: Monteringstype for hovedbremsecylinder
      description: Hvordan hovedcylinderen monteres på køretøjet/bremseforstærkeren
        (boltmønster/flangetype).
    brake_master_cylinder_reservoir_type:
      name: Beholdertype for hovedbremsecylinder
      description: Type/konfiguration til den bremsevæskebeholder, der følger med
        hovedcylinderen eller kræves af denne.
    brake_mount_type:
      name: Bremsebeslagstype
      description: Angiver, hvilken bremseforbindelse der er indbygget i forgaflen,
        så cyklister kan kontrollere, om deres bremsesystem er kompatibelt.
    brake_mounting_flange_bolt_pattern:
      name: Boltmønster for bremsemonteringsflange
      description: Angiver monteringsflangehul-/boltmønsteret, der bruges til at fastgøre
        bremsebagpladen eller bremsekaliperbeslaget til anhængerakslen (f.eks. 4 bolte).
    brake_pad_backing_plate_material:
      name: Bremseklodsens bagplademateriale
      description: Angiver materialet i bremseklodsernes bagplade, hvilket påvirker
        varmeafledning og vægt.
    brake_pad_compatible_rotor_type:
      name: Type af kompatibel bremseklods (rotor)
      description: Angiver den tilsigtede rotor-/skiveoverfladetype, som klodsen er
        designet til at fungere med.
    brake_pad_compound:
      name: Bremseklodsblanding
      description: Angiver bremseklodsens friktionsmaterialesammensætning (formel).
    brake_pad_form_factor:
      name: Formfaktor for bremseklods
      description: Angiver hvilket bremsesystem/formfaktor bremseklodsen er designet
        til (f.eks. skive-, tromle- eller parkeringsbremse).
    brake_pad_material:
      name: Materiale i bremseklodsebelægning
      description: Angiver den friktionsblanding/materialefamilie, der anvendes i
        bremseklodsbelægningen.
    brake_pad_shim_included:
      name: Mellemlag til bremseklodser medfølger
      description: Angiver, om støjdæmpende mellemlag medfølger eller er monteret
        på forhånd.
    brake_pad_wear_indicator_type:
      name: Type af slidindikator på bremseklods
      description: Angiver, hvilken type slidindikator der følger med bremseklodserne
        (f.eks. mekanisk hvinelyd eller elektronisk sensor).
    brake_position:
      name: Bremseposition
      description: Angiver, hvor på køretøjet bremsekomponenten er beregnet til at
        blive installeret.
    brake_rotor_mount_type:
      name: Monteringstype for bremseskive
      description: Definerer den overflade, der bruges til at fastgøre en bremseskive
        til navet (hvis det er relevant).
    brake_service_kit_components_included:
      name: Medfølgende komponenter i bremsevedligeholdelsesættet
      description: Liste over værktøj, adaptere og forbrugsdele, der følger med i
        bremseservicesættet.
    brake_shoe_friction_material:
      name: Friktionsmateriale til bremseklodser
      description: Den friktions-/belægningsblandingen, der anvendes på bremseklodsen
        (det materiale, der er i kontakt med tromlen).
    brake_shoe_set_contents:
      name: Indhold i bremseklodssættet
      description: Hvad er der med i pakken (f.eks. kun klodser eller klodser plus
        beslag/fjedre)?
    brake_system_type:
      name: Type af bremsesystem
      description: Angiver den bremsemekanisme, der anvendes til at styre spolens
        rotation under udkastet.
    brake_type:
      name: Bremsetype
      description: Type af bremse-/spændemekanisme til kædebommen.
    brandy_age_classification:
      name: Aldersklassificering for brændevin
      description: Kategoriserer brandy efter branchestandardiserede kvalitets- og
        aldersbetegnelser (f.eks. VS, VSOP, XO), som afspejler minimumskrav til lagringstid.
    brass_cleaning_tool_type:
      name: Type af værktøj til rensning af messing
      description: Angiver den type værktøj, der bruges til at rense eller vedligeholde
        messingblæseinstrumenter.
    brass_instrument_application_area:
      name: Anvendelsesområder for messinginstrumenter
      description: De dele af messinginstrumentet, som desinfektionssprayen er beregnet
        til at blive brugt på.
    brass_instrument_care_kit_purpose:
      name: Formål med plejesæt til messinginstrumenter
      description: Beskriver det tiltænkte anvendelsesscenarie for sættet (f.eks.
        rutinemæssig vedligeholdelse, grundig rengøring, rejse/nødsituation eller
        startsæt til studerende).
    brass_instrument_case_shell_material:
      name: Materiale til kassen til messinginstrumenter
      description: Hovedmaterialet i den stive skal/ramme (hvis det er relevant),
        som er adskilt fra det generelle materiale i tasken/kufferten.
    brass_instrument_lubricant_additives_features:
      name: Smøremiddeltilsætningsstoffer/egenskaber til messinginstrumenter
      description: Vigtige funktionelle egenskaber ved smøremiddelformuleringen.
    brass_instrument_lubricant_base_composition:
      name: Grundlæggende sammensætning af smøremiddel til messingblæseinstrumenter
      description: Primær smøremiddelbase/kemiske sammensætning anvendt i smøremidler
        til messingblæseinstrumenter.
    brass_instrument_lubricant_viscosity_grade:
      name: Viskositetsgrad for smøremiddel til messinginstrumenter
      description: Viskositet/flydeevne for smøremidlet til messinginstrumenter.
    brass_instrument_replacement_part_type:
      name: Reservedelstype til messinginstrumenter
      description: Angiver den type reservedele til messingblæseinstrumenter (f.eks.
        ventil-, træk- eller vandklapsdele, kork/filt eller beskyttelsesdele).
    brass_instrument_valve_configuration:
      name: Konfiguration af messinginstrumentets ventil
      description: Hvordan instrumentet ændrer tonehøjde (ventil-/skydemekanisme).
    brass_lubricant_application_area:
      name: Anvendelsesområder for messingsmøremiddel
      description: Mekanismen på messinginstrumentet, som smøremidlet er beregnet
        til.
    brass_mouthpiece_backbore:
      name: Bagboring på messingmundstykke
      description: Mundstykkets bagboringsprofil/kategori (formen og størrelsen på
        mundstykkets bagboring, som påvirker klang og intonation).
    brass_mouthpiece_cup_depth:
      name: Messingmundstykkets kopdybde
      description: Kopdybde-klassifikation for mundstykket (hvor dyb koppen er), hvilket
        påvirker klang og respons.
    brass_polishing_cloth_abrasiveness_level:
      name: Abrasivitetsniveau for pudseklud til messing
      description: Angiver hvor aggressiv kluden er i forhold til at fjerne anløbning
        kontra at give en skånsom glans.
    bread_crumb_base_ingredient:
      name: Grundingrediens i rasp
      description: Angiver hovedingrediensen, som rasp er fremstillet af, f.eks. hvede,
        ris, svinesvær eller mandel.
    bread_variety:
      name: Brødvariant
      description: Angiver typen eller varianten af brød eller boller, så kunder kan
        finde specifikke typer (f.eks. brioche, baguette eller naan).
    breadstick_style:
      name: Type af grissini
      description: Angiver den specifikke traditionelle stil eller form på grissinien.
    bridge_head_material:
      name: Brohovedmateriale
      description: Materiale anvendt udelukkende til brohovedet, som påvirker vægt,
        fornemmelse og holdbarhed.
    bridge_head_type:
      name: Brohovedtype
      description: Angiver typen af brohoved, så købere kan vælge den foretrukne form
        på kø-støtten.
    bridle_part_type:
      name: Type af bidestykke
      description: Angiver, hvilken specifik del af seletøjet udskiftningsdelen dækker,
        så kunderne lettere kan finde netop den del, de har brug for.
    bridle_style:
      name: Seletøjsstil
      description: Inddeler seletøjet efter overordnet stil eller konstruktion, så
        ryttere hurtigt kan finde udstyr, der passer til deres behov eller disciplin.
    broadhead_field_point_attachment_style:
      name: Monteringstype for jagtspids/træningsspids
      description: Angiver, hvordan pilen med bred spids eller feltpilen fastgøres
        til pilens skaft.
    broadhead_thread_size:
      name: Gevindstørrelse på jagtspids
      description: Angiver den gevindspecifikation, der anvendes til at fastgøre pilen
        med bred spids eller feltspidsen til pileindsatsen eller pileskaftet.
    broadhead_tip_type:
      name: Type af spids på jagtspids
      description: Beskriver udformningen af den brede pils spids/muffe, som indleder
        indtrængningen, og som har indflydelse på effektiviteten ved jagt på forskellige
        vildtarter.
    broccoli_cut:
      name: Broccoliudskæring
      description: Angiver, hvordan broccolien er blevet skåret eller tilberedt før
        emballeringen (f.eks. hele hovedet, buketter eller hakket).
    broccoli_variety:
      name: Broccolivariant
      description: Angiver broccoliens specifikke sort eller markedsvariant (f.eks.
        Tenderstem eller Romanesco).
    broom_head_material:
      name: Kostehovedmateriale
      description: Angiver børstehovedets materialesammensætning, som har indflydelse
        på holdbarheden og spilleegenskaberne.
    brush_format:
      name: Børsteformat
      description: Angiver den fysiske form på en ski- eller snowboardbørste, og skelner
        mellem håndholdte blokke og bore-/maskindrevne roterende typer som roto-uld
        eller roto-filt-cylindre.
    brush_shape:
      name: Børsteform
      description: Angiver børstehovedets fysiske form eller profil, hvilket har indflydelse
        på kontaktfladen og håndteringen.
    brussel_sprout_preparation:
      name: Tilberedning af rosenkål
      description: Beskriver den fysiske tilberedning eller udskæring af de leverede
        rosenkål.
    brussels_sprout_variety:
      name: Rosenkålsvariant
      description: Angiver rosenkålens kultivar eller sort, der tager højde for nuværende
        og fremtidige sorter.
    bubble_blower_features:
      name: Bobleblæserens egenskaber
      description: Viser en oversigt over bobleblæserens almindelige egenskaber.
    bubble_gun_bubble_output_modes:
      name: Boblepistolens bobleudledningstilstande
      description: Angiver sæbeboblepistolens funktioner, såsom enkeltbobler, kontinuerlig
        bobleproduktion eller flere hastighedsindstillinger.
    bubble_machine_features:
      name: Boblemaskinens funktioner
      description: Fremhæver almindelige funktionelle egenskaber ved boblemaskiner
        ud over grundlæggende drift.
    bubble_machine_items_included:
      name: Medfølgende dele til boblemaskinen
      description: Angiver de vigtigste varer, der er inkluderet i æsken (f.eks. boblevæske,
        ekstra stave, bærerem og fjernbetjening).
    bubble_output_rate:
      name: Bobleudgangshastighed
      description: Angiver boblemaskinens omtrentlige/kvalitative bobledannelseshastighed
        (f.eks. lav/middel/høj), herunder om dannelsen kan justeres.
    bubble_solution_container_type:
      name: Type af beholder til bobleopløsning
      description: Angiver, hvordan boblevæsken tilføres/anvendes i boblepistolen
        (f.eks. indbygget beholder, påmonteret flaske eller separat bakke/dypning).
    bubble_toy_included_accessories:
      name: Medfølgende tilbehør til boblelegetøj
      description: Viser en liste over de almindelige dele, der følger med boblelegetøjet
        (f.eks. flaske med boblevæske, bakke eller ekstra boblestave).
    buckwheat_processing_method:
      name: Forarbejdningsmetode for boghvede
      description: Beskriver den forarbejdning, som boghveden gennemgår inden salg
        (f.eks. ristet, spiret eller puffet).
    buckwheat_product_form:
      name: Produktform for boghvede
      description: Boghvede-specifik fysisk præsentationsform, som dækker former,
        der ikke er omfattet af den generiske liste (f.eks. flager, puffede produkter
        og portionsposer til instant-tilberedning).
    bug_collecting_kit_items_included:
      name: Medfølgende dele i insektindsamlingssæt
      description: Værktøj og undervisningsmateriale, der følger med et insektsamlingssæt.
    built_in_storage_type:
      name: Type af indbygget opbevaring
      description: Angiver hvilke typer opbevaring, der er integreret i køjesengens
        ramme (f.eks. skuffer, hylder eller opbevaring i trappe).
    bumper_finish:
      name: Kofangerfinish
      description: Angiver den overfladebelægning eller finish, der er påført kofangeren.
    bumper_sensor_cutouts:
      name: Udskæringer til kofangersensorer
      description: Angiver hvilke OEM-assistentåbninger/-udskæringer kofangeren har
        eller understøtter.
    bunk_bed_configuration:
      name: Køjesengskonfiguration
      description: Angiver køjesengens strukturelle opbygning og kombinationen af
        madrasstørrelser.
    buoyancy:
      name: Opdrift
      description: Angiver agnens eller woblerens opdriftsadfærd i vandsøjlen, såsom
        flydende, synkende eller suspenderende.
    burkini_pieces_included:
      name: Burkinidele medfølger
      description: Viser de beklædningsdele, der følger med i burkini-sættet, så kunderne
        ved præcis, hvad de køber.
    burn_rate:
      name: Forbrændingshastighed
      description: Beskriver, hvor hurtigt cigaretpapiret brænder, når det er tændt.
    bus_model_type:
      name: Busmodeltype
      description: Angiver den virkelige buskonfiguration/-type, som skalamodellen
        repræsenterer (karrosseri- eller anvendelsesklasse).
    bust_design:
      name: Brystdesign
      description: Beskriver bodysuit’ens brystpartikonfiguration og udskæringens
        dækning (f.eks. åben barm, indbygget bh eller dyb udskæring).
    butter_variety:
      name: Smørvariant
      description: Angiver smørrets fremstillingsmetode eller særlige type, f.eks.
        kultursmør, smør med sød fløde, smør efter europæisk opskrift, klaret smør
        (ghee) eller vallesmør.
    buttermilk_variety:
      name: Kernemælksvariant
      description: Angiver den specifikke type eller form af kærnemælk, der sælges
        (f.eks. syrnet, traditionelt eller pulver).
    button_application:
      name: Anvendelse af knapper
      description: Angiver den tiltænkte anvendelse for knappen (f.eks. beklædning,
        polstring).
    button_attachment_type:
      name: Fastgørelsestype for knap
      description: Angiver, hvordan knappen er konstrueret med henblik på fastgørelse
        til stof (f.eks. syhuller eller med skaft), ikke lukkemåden.
    button_finish:
      name: Knapfinish
      description: Beskriver knapens overfladebehandling/udseende (f.eks. mat eller
        blank).
    buttonhole_elastic_application:
      name: Anvendelse af knaphulselastik
      description: Primær anvendelse/formål for det foldbare elastikbånd til pynt.
    cab_type:
      name: Taxatype
      description: Angiver lastbilens førerhuskonfiguration.
    cabasa_construction_type:
      name: Cabasa-konstruktionstype
      description: Angiver den fysiske konstruktion/stil af cabasaens krop samt kæde-/perlemekanisme.
    cabbage_variety:
      name: Kålvariant
      description: Angiver sorten eller typen af kål (f.eks. grønkål, kinakål eller
        savoykål), så kunderne kan filtrere efter smag, konsistens og anvendelse i
        madlavningen.
    cabinet_door_style:
      name: Skabslåges stil
      description: Angiver skabslågens visuelle design, såsom Shaker-stil eller hævet
        panel, for at matche køkkenets æstetik.
    cabinet_overlay_type:
      name: Overlægstype for skabslåger
      description: Angiver, hvordan lågerne overlapper eller placeres i forhold til
        skabsrammen.
    cable_end_type:
      name: Kabelendetype
      description: Beskriver formen eller udformningen af den ende af kablet, der
        sidder sammen med bremse- eller gearhåndtagene.
    cable_housing_construction:
      name: Kabelhylsterets konstruktion
      description: Beskriver hylsterets strukturelle design – såsom spiralviklet,
        kompressionsfrit eller segmenteret led – som påvirker modstandsdygtighed mod
        kompression, fleksibilitet og brugsfornemmelse.
    cable_housing_liner_type:
      name: Type af inderforing i kabelhylster
      description: Angiver, om huset er udstyret med en indvendig foring og/eller
        smørebeklædning, samt hvilket materiale eller hvilken teknologi der er anvendt,
        hvilket har betydning for friktionsreduktion og vejrbestandighed.
    cable_management_type:
      name: Kabelstyringstype
      description: Angiver typen af indbyggede kabel- eller strømstyringsfunktioner,
        som konferencebordet tilbyder.
    cable_surface_treatment:
      name: Håndtering af kabeloverflader
      description: Angiver eventuel særlig belægning eller finish på kablet, som reducerer
        friktion eller beskytter mod korrosion.
    cabochon_back_type:
      name: Cabochon-bagsidetype
      description: Angiver cabochonens bagsideprofil/overflade, hvilket har betydning
        for indfatnings- og limemetoder samt kompatibilitet.
    cacao_bean_variety:
      name: Kakaobønnesort
      description: Angiver den botaniske variant eller kultivar af den kakaobønne,
        der anvendes.
    cacao_roast_level:
      name: Kakaoristningsniveau
      description: Beskriver graden af ristning af kakaobønnerne før formaling.
    cage_package_type:
      name: Type af burpakning
      description: Angiver, hvilke komponenter der følger med ved købet (f.eks. kun
        nettet, rammesæt eller komplet sæt).
    cajon_body_shell_material:
      name: Cajonens krops-/skalmateriale
      description: Angiver materialet i cajonens krop/skal (eksklusive tapaen).
    cajon_corner_control_system:
      name: Cajon-hjørnekontrolsystem
      description: Angiver, om cajonen understøtter justering af hjørne-lyd (f.eks.
        hjørneskruer) for at variere slagresponsen.
    cajon_corner_edge_design:
      name: Cajon-hjørne-/kantdesign
      description: Beskriver hjørne-/kantkonstruktionen, der påvirker komfort og spilbarhed.
    cajon_feet_type:
      name: Type af cajon-fødder
      description: Angiver typen af fødder på cajonen, hvilket påvirker stabilitet
        og resonans.
    cajon_snare_adjustability:
      name: Justerbarhed af cajon-snarer
      description: Angiver, om og hvordan snare-effekten kan justeres (spænding, aktivering
        eller begge dele).
    cajon_snare_system_type:
      name: Type af cajon-snaresystem
      description: Angiver den interne snare-mekanisme, der bruges til at skabe snare-effekten.
    cake_shape:
      name: Kageform
      description: Beskriver den form, som kaffekagen bages i.
    cake_topping:
      name: Kagepynt
      description: Angiver den primære topping eller finish, der er påført kaffekagen.
    cake_type:
      name: Kagetype
      description: Beskriver kagens stil eller type (f.eks. sandkage, sukkerbrødskage
        eller cheesecake).
    caliper_mount_type:
      name: Type af bremsekaliberbeslag
      description: Angiver, hvilken standard for ramme- eller gaffelmontering bremsekaliperen
        anvender (f.eks. Post Mount eller Flat Mount).
    caliper_mounting_standard:
      name: Standard for montering af bremsekaliper
      description: Angiver monteringsstandarden/kontaktfladen (f.eks. Flat Mount,
        Post Mount, IS osv.), som bruges til at fastgøre bremsekaliberen til cykelrammen
        eller forgaflen.
    camera_mounting_location_vehicle_exterior:
      name: Kameramonteringsplacering (køretøjets ydre)
      description: Hvor kameraet/kameraerne er beregnet til at blive monteret på køretøjet
        (f.eks. frontgrill, bagende, sidespejle).
    camouflage_environment_type:
      name: Type af camouflage-miljø
      description: Angiver det primære miljø, som camouflagemønsteret er designet
        til, såsom skov, ørken eller marsk.
    camping_oil_application:
      name: Påføring af campingolie
      description: Angiver den primære anvendelse af olien i forbindelse med camping
        (f.eks. brændstof til lygter ifht. brændstof til komfurer).
    camshaft_construction:
      name: Knastakselkonstruktion
      description: Fremstilling/udførelse af knastakslen.
    camshaft_material:
      name: Knastakselmateriale
      description: Grundmateriale til knastakslens kerne/aksel (grundmateriale).
    camshaft_position:
      name: Knastakselposition
      description: Angiver knastakslens tilsigtede placering/type i motoren (f.eks.
        indsugnings- eller udstødningsrør eller en specifik motorbank/position).
    candle_container_type_included:
      name: Type af medfølgende stearinlysbeholder
      description: Angiver typen af stearinlysbeholder(e), der følger med i sættet,
        hvis nogen.
    candle_dye_form:
      name: Form for farvestof til stearinlys
      description: Angiver den fysiske form af lysfarvestof/farvepigment, der anvendes
        til fremstilling af stearinlys.
    candle_fragrance_form:
      name: Type af duft til stearinlys
      description: Angiver typen/formen af duftingrediens beregnet til fremstilling
        af stearinlys.
    candle_making_tool_type:
      name: Type af værktøj til fremstilling af stearinlys
      description: Angiver den type værktøj til lysfremstilling, produktet er (f.eks.
        støbekande, vægecentreringsværktøj eller termometer).
    candy_texture:
      name: Sliktekstur
      description: Beskriver slikkets mundfølelse eller konsistens, uafhængigt af
        smag eller form.
    candying_method:
      name: Kandiseringsmetode
      description: Beskriver, hvordan frugten er kandiseret eller konserveret med
        sukker (f.eks. krystalliseret, glaseret eller i sirup).
    canned_meat_form:
      name: Type af dåsekød
      description: Angiver, hvordan kødet er forarbejdet eller præsenteret i emballagen.
    canoe_construction_type:
      name: Kanoens konstruktionstype
      description: Angiver forskellige konstruktionsstilarter for kanoens skrog, såsom
        hård skal, oppustelig eller sammenklappelig.
    canoe_hull_shape:
      name: Kanoens skrogform
      description: Definerer skrogets primære tværsnit eller bundprofil, som påvirker
        stabilitet og manøvreegenskaber.
    canoe_stern_design:
      name: Design af kanoens agterende
      description: Bestemmer skrogets agterstavnsform, hvilket har indflydelse på
        motorens kompatibilitet og manøvredygtighed.
    canopy_type:
      name: Type af baldakin
      description: Beskriver typen af baldakin eller overdækning, der følger med til
        cabanasengen.
    canvas_compatible_media:
      name: Medietyper kompatible med lærredet
      description: Angiver de kunst-/håndværksmedier, lærredet er beregnet til at
        blive brugt med.
    canvas_format:
      name: Lærredsformat
      description: Angiver om det printbare lærred sælges som ark, ruller eller forudskårne
        paneler.
    canvas_mounting_format:
      name: Montering/format på lærred
      description: Fysisk format/monteringstype for lærredet.
    canvas_stretcher_assembly_type:
      name: Lærredbårens monteringstype
      description: Om båren sælges samlet som et stel eller som stænger/sæt, der skal
        samles.
    canvas_stretcher_corner_joint_type:
      name: Type af hjørnesamling på lærredets blindramme
      description: Angiver hvordan blindrammens hjørner er samlet/konstrueret (f.eks.
        tapsamling, fingersamling, hæftet eller med kiler).
    canvas_surface_tone:
      name: Lærredets overfladetone
      description: Grundfarve/grundtone på det grundede lærred (grundering), ikke
        noget trykt design eller mønster (f.eks. hvid, sort eller tonet).
    canvas_weave_type:
      name: Lærredsvævningstype
      description: Beskriver lærredets vævningskonstruktion, som påvirker tekstur
        og hvordan malingen opfører sig.
    cap_attachment_style:
      name: Dækslets fastgørelsesstil
      description: Angiver konstruktion-/fastgørelsestypen for en saxofon-mundstykkehætte,
        hvilket kan påvirke beskyttelse og pasform i etui.
    cap_construction:
      name: Dækselkonstruktion
      description: Angiver hvordan parykhætten er konstrueret (f.eks. lace front,
        full lace eller håndbundet), hvilket påvirker realisme, komfort og stylingmuligheder.
    cap_crown_structure:
      name: Kronestruktur på låg
      description: Angiver om lågets krone er struktureret (stiv/forstærket) eller
        ustruktureret (blød).
    cap_fit_type:
      name: Dækslets pasformstype
      description: Definerer, hvordan kasketten passer eller justeres på brugerens
        hoved (f.eks. tilpasset ifht. justerbar).
    cap_seal_type:
      name: Type af lågforsegling
      description: Angiver den tætningskomponent, der bruges til at forhindre olielækage
        og dampudslip (f.eks. O-ring eller pakning).
    cap_size:
      name: Lågstørrelse
      description: Etiketter i standardstørrelse, der angiver den samlede hovedstrømstørrelse,
        som parykhuen passer til.
    cap_type:
      name: Dækseltype
      description: Type af prop/lukkeanordning, der anvendes på overløbsbeholderen.
    caper_size_grade:
      name: Størrelsesgrad for kapers
      description: Klassificerer kapers efter branchespecifikke standardgrader, som
        svarer til knopstørrelse (diameter).
    capo_clamping_mechanism:
      name: Kapodasterens spændingsmekanisme
      description: Angiver den type klemme-/aktiveringsmekanisme, der bruges til at
        presse strengene ned (hvordan capoen betjenes).
    capo_finish:
      name: Kapodasterens overflade
      description: Overfladen på kapodasterens hoveddel (udseende/følelse i hånden),
        uafhængigt af farve (f.eks. mat kontra blank).
    capo_fit_type:
      name: Capoens pasformstype
      description: Angiver den halsprofil, capoen er designet til at passe til (inklusive
        radius/fladhed), hvilket påvirker vibrationsfri klemning og intonation.
    capo_pad_material:
      name: Pudemateriale til Capo
      description: Angiver materialet i kontaktpuden, der berører strengene/gribebrættet
        (påvirker greb, stemmestabilitet og risiko for mærker i finishen).
    capo_tension_mechanism:
      name: Capoens spændingsmekanisme
      description: Angiver, hvordan tryk/spænding påføres og justeres på strengene
        ved brug af den glidende kapodaster.
    capture_method:
      name: Fangstmetode
      description: Angiver om fælden er beregnet til levende indfangning eller dødelig
        aflivning.
    car_ev_conversion_kit_motor_type:
      name: Motortype i elbil-konverteringssæt
      description: Angiver den trækkraftmotorteknologi, der følger med eller kræves
        i konverteringssættet (f.eks. AC induktionsmotor eller permanent magnetmotor).
    car_playset_items_included:
      name: Medfølgende dele til legetøjsbilsæt
      description: Viser en liste over de vigtigste komponenter, der følger med i
        billegesættet ud over grundstrukturen (f.eks. biler, figurer og skilte).
    car_shampoo_application_method:
      name: Påføringsmetode for bilshampoo
      description: Hvordan shampooen er beregnet til at blive påført under vask.
    car_wash_solution_form:
      name: Bilvaskemiddelform
      description: Angiver bilvaskemidlets fysiske form af (f.eks. væske, skum eller
        vådservietter).
    car_wash_solution_scent:
      name: Duft af bilvaskemiddel
      description: Angiver duften/aromaen af bilvaskemidlet (hvis det er tilsat parfume).
    carbonated_water_variety:
      name: Type af kulsyreholdigt vand
      description: Klassificerer kulsyreholdigt vand efter almindelige markedsvarianter
        og sammensætning (f.eks. tonic, seltzer eller funktionelt danskvand).
    carbonation:
      name: Kulsyre
      description: Beskriver graden eller typen af kulsyre i drikken (f.eks. uden
        kulsyre, let perlende, perlende eller nitro).
    carburetor_barrel_count:
      name: Antal karburatorløb
      description: Angiver antallet af gasspjæld i karburatoren.
    carburetor_choke_type:
      name: Karburatorens chokertype
      description: Angiver den chokeraktiveringsstil, som karburatoren bruger.
    carburetor_mounting_flange_type:
      name: Karburatormonterings-flangetype
      description: Angiver typen af monteringsflade på karburatoren for at sikre,
        at den passer til indsugningsmanifolden (f.eks. tap kontra flange/boltmønstre).
    card_binder_page_type:
      name: Type af kortbindersider
      description: 'For ringbind/portfolier: typen af sider, der bruges til opbevaring
        af kort.'
    card_box_holder_type:
      name: Type af kortæske/kortholder
      description: Angiver produktets funktionelle formfaktor til indsamling eller
        opbevaring af kort ved et arrangement (f.eks. æske, postkasse-lignende boks,
        kurv eller holder/stativ).
    card_game_accessory_features:
      name: Kortspiltilbehørets egenskaber
      description: Bemærkelsesværdige funktionelle egenskaber ved tilbehør til kortspil.
    card_lot_type:
      name: Kortpakketype
      description: Angiver om produktet er et enkelt kort eller et parti/sæt med flere
        kort.
    card_sleeve_size_format_compatibility:
      name: Kompatibilitet med kortlommers størrelse/format
      description: Angiver, hvilke kortstørrelser kortlommerne/siderne/kortæskerne
        er designet til at passe til.
    carding_surface_pin_material:
      name: Nålmateriale i kardeflade
      description: Det materiale, som stifterne/tænderne er fremstillet af, og som
        bruges til at rede og åbne fibrene.
    care_durability:
      name: Holdbarhed ved pleje
      description: Angiver forventet holdbarhed ved vask og varme af etiketten efter
        påføring.
    care_label_attachment_type:
      name: Type af fastgørelse af plejeetiket
      description: Angiver hvordan plejeetiketten er designet til at blive påført
        produktet (f.eks. indsyet, stryge-/varmeoverført eller med klæbemiddel).
    care_label_format:
      name: Format for plejeetiket
      description: Den fysiske/trykte form af plejeetiketten som produkt.
    care_label_symbol_system:
      name: Symbolsystem til vaskeanvisninger
      description: De standarder/symboler, der anvendes på etiketten (f.eks. ISO-plejesymboler
        eller ASTM/US-symboler).
    cargo_area_configuration:
      name: Konfiguration af lastrum
      description: Angiver lastrummets konstruktionsmæssige udformning eller placering
        på en lastcykel (f.eks. longtail, frontlæsser eller trehjulet cykel).
    cargo_net_adjustability:
      name: Justerbarhed af lastnet
      description: Angiver, om og hvordan lastnettet kan justeres med hensyn til spænding/pasform.
    cargo_net_position:
      name: Placering af lastnet
      description: Angiver hvor i bagagerummet/lastrummet nettet er beregnet til at
        blive monteret eller anvendt.
    cargo_net_stretch_type:
      name: Type af stræk i lastnet
      description: Angiver om lastnettet i bagagerummet er elastisk/strækbart eller
        fast/ikke-strækbart.
    cargo_net_style:
      name: Type af lastnet
      description: Angiver lastnettets konstruktionstype eller form (f.eks. elastiksnor,
        bånd, afskærmning eller hængekøje).
    cargo_rack_finish:
      name: Finish på lastbærer
      description: Bagagebærerens overfladebehandling/belægning.
    carpet_cleaner_application_method:
      name: Påføringsmetode for tæpperenser
      description: Angiver den tiltænkte anvendelsesmetode for produktet, og hvordan
        det arbejdes ind i tæppet (ud over den generelle form).
    carrier_style:
      name: Bæresystem
      description: Angiver den bæremekanisme/det bæresystem, der bruges til at understøtte
        båden på køretøjet.
    carrot_size:
      name: Gulerodsstørrelse
      description: Klassificerer gulerodsproduktets generelle størrelse.
    carrot_variety:
      name: Gulerodssort
      description: Angiver den specifikke variant eller kultivar af gulerod.
    carrying_capacity_pairs_boards:
      name: Bæreevne (par/plader)
      description: Angiver hvor mange ski (par) eller snowboards et tilbehør kan rumme
        eller er beregnet til at understøtte, når det bruges sammen med stativet (f.eks.
        forlængersæt).
    cartridge_thread_compatibility:
      name: Gevindkompatibilitet for patron
      description: Angiver den gevindstandard, som en vaporizer eller batteri understøtter,
        så patroner og batterier er fysisk kompatible.
    case_capacity_butts_shafts:
      name: Etuikapacitet (skaft × spids/ender)
      description: Angiver, hvor mange køender og skafter kufferten kan rumme, angivet
        i formatet køende-skaft (f.eks. 2x4 = 2 køender og 4 skafter).
    case_features:
      name: Taskefunktioner
      description: Fremhæver funktionelle egenskaber ved etuiet til bækkener/trommesæt
        i forhold til beskyttelse og transport.
    case_humidifier_refill_type:
      name: Refill-type til etui-luftfugter
      description: Angiver om luftfugteren bruger genanvendeligt (kan genfugtes/regenereres)
        materiale eller engangsudskiftelige refills.
    case_lining_material:
      name: Taskens foringsmateriale
      description: Angiver det primære materiale i foret på indersiden af et etui
        eller en instrumenttaske, som kommer i kontakt med og beskytter instrumentet
        eller indholdet.
    case_material:
      name: Taskemateriale
      description: Angiver det primære materiale i urkassen, som påvirker holdbarhed,
        vægt og æstetik.
    case_mounting_method:
      name: Monteringsmetode til kasse
      description: Hvordan luftfugteren skal placeres eller fastgøres inde i instrumentkassen.
    case_structure:
      name: Kassestruktur
      description: Angiver kassekonstruktionens stivhed.
    case_style_cymbal_drum:
      name: Kasseform (bækken/tromme)
      description: Angiver om produktet er en blød taske, et hårdt etui eller et hybriddesign
        til transport af bækkener eller trommesæt.
    casing_material:
      name: Husmateriale
      description: Angiver det primære materiale, der er anvendt i dækstammen, hvilket
        har indflydelse på vægten, køreegenskaberne og punkteringsbeskyttelsen.
    casino_set_chip_material:
      name: Materiale til jetoner i casinosæt
      description: Hovedmateriale i de medfølgende chips (hvis det er relevant).
    casino_set_layout_included:
      name: Layout medfølger i casinosæt
      description: Angiver den type spilleflade/layout, der følger med i sættet.
    cask_finish:
      name: Tøndefinish
      description: Angiver den type tønde eller fad, der bruges til lagring eller
        modning af spiritussen, f.eks. bourbonfad eller sherryfad.
    cassava_variety:
      name: Cassavavariant
      description: Angiver den specifikke kultivar eller variant af yuca/cassava,
        som påvirker smag, farve og tilberedningsegenskaber.
    cassette_body_type:
      name: Type af kassettehus
      description: Frinav- eller drivstandarden, som bagnavet eller hjulet understøtter
        (f.eks. HG 11, XDR eller Microspline).
    cassette_deck_feature_set:
      name: Funktioner i kassettebåndoptager
      description: Angiver funktioner til kassettehåndtering og afspilning, som er
        typiske for indbyggede kassetteafspillere i instrumentbrættet.
    cassette_speed_compatibility:
      name: Kompatibilitet med kassettehastighed
      description: Angiver antallet af gear (f.eks. 7- eller 12-trins), som kassetten
        eller friløbet er beregnet til, hvilket sikrer, at kæden, gearskifteren og
        skifteren er kompatible.
    castanet_shell_size_class:
      name: Størrelsesklasse for Castanet-skaller
      description: Standardiseret størrelsesklasse for kastagnetskaller, som bruges
        af spillere/lærere til at vælge pasform og klang.
    castanets_included_pieces:
      name: Antal dele inkluderet i kastagnetter
      description: Angiver, hvad der er inkluderet i produktudbuddet (par eller enkelt
        samt ekstraudstyr).
    castanets_pitch:
      name: Kastanjetternes tonehøjde
      description: Angiver den almindelige betegnelse for tonehøjde/størrelse, som
        instrumentbyggere bruger til at beskrive lydområdet.
    castanets_type:
      name: Type kastagnetter
      description: Angiver kastagnetternes stil eller tilsigtede anvendelseskategori.
    caster_type:
      name: Hjultype
      description: Angiver typen af hjul/meder monteret på vognen (f.eks. drejelige
        eller med lås), hvilket påvirker manøvredygtighed og stabilitet.
    castle_playset_included_items:
      name: Indhold i slotssættet
      description: Angiver de vigtigste komponenter, der følger med i slotslegesættet,
        så kunder kan sammenligne sæt (f.eks. figurer, møbler, køretøjer og tilbehør).
    catcher_equipment_included:
      name: Catchertilbehør medfølger
      description: Angiver de komponenter, der følger med i et catcher-udstyrssæt,
        såsom catcher-hjelm eller brystbeskytter.
    catcher_helmet_style:
      name: Catcher-hjelmens udformning
      description: Angiver den overordnede designstil for catcherens beskyttelseshovedgear.
    cattle_breed:
      name: Kvægrace
      description: Angiver kvægracen, som oksekødet stammer fra (f.eks. Angus, Wagyu
        eller Hereford).
    cauliflower_variety:
      name: Blomkålssort
      description: Identificerer kultivar, farve eller specialsort for den blomkål,
        der sælges.
    celery_form:
      name: Selleriform
      description: Angiver den fysiske form eller udskæringsstil, som selleri sælges
        i.
    celery_variety:
      name: Sellerivariant
      description: Angiver den specifikke sort eller variant af selleri, så kunderne
        kan vælge ud fra smag, farve eller anvendelse i madlavningen.
    cereal_bar_texture:
      name: Müslibarens tekstur
      description: Beskriver mundfornemmelsen og konsistensen af müslibaren (f.eks.
        sej, sprød).
    cereal_type:
      name: Kornsort
      description: Klassificerer formen eller typen af morgenmadsprodukt (flager,
        puffet, granola-klumper, müsli osv.) for at hjælpe kunder med at finde en
        foretrukken tekstur eller tilberedningsform.
    certificate_border_style:
      name: Certifikatkantstil
      description: Beskriver den dekorative kantudformning på certifikatet.
    certificate_personalization_type:
      name: Type af personalisering på certifikat
      description: Angiver hvordan certifikatet kan personaliseres (f.eks. blank til
        håndskrift, printbar skabelon eller fortrykt med variable felter).
    certification_service:
      name: Certificeringstjeneste
      description: Tredjepartsbedømmelses-/certificeringsvirksomhed (hvis det er relevant).
    certification_standard:
      name: Certificeringsstandard
      description: Angiver den sikkerheds- og brandhæmmende certificering eller standard,
        som balaclavaen er klassificeret efter.
    chain_coating_finish:
      name: Belægning/finish på kæde
      description: Angiver enhver overfladebehandling eller finish, der påføres kæden
        for at forbedre holdbarheden, reducere friktion, forhindre korrosion eller
        ændre udseendet (f.eks. Ti-nitrid, DLC, nikkel eller rustfri EPT).
    chain_connection_type:
      name: Kædeforbindelsestype
      description: Angiver den lukkemetode, der er angivet eller kræves for at forbinde
        kædens ender.
    chain_tier_configuration:
      name: Kædelagskonfiguration
      description: Angiver antallet og opbygningen af kædelag i opsamlings-/fangstsystemet
        (enkelt-, dobbelt- eller tredobbelt lag).
    chain_tool_type:
      name: Kædeværktøjstype
      description: Klassificerer den specifikke type cykelkædeværktøj, så kunder hurtigt
        kan finde det korrekte værktøj.
    chainring_shape:
      name: Form på kædehjul
      description: Angiver kædehjulets form, f.eks. rund eller oval/elliptisk.
    chair_accessories_included:
      name: Stoletilbehør medfølger
      description: Viser en liste over det indbyggede eller medfølgende tilbehør,
        der forbedrer stolens funktionalitet.
    chair_sash_care_instructions:
      name: Plejeanvisninger for stolens dekorationsbånd
      description: Beskriver den anbefalede rengørings- og vedligeholdelsesmetode
        for stolbåndet.
    chair_sash_finish:
      name: Finish på stolbånd
      description: Beskriver glansen eller overfladefinishen på stoffet i stolbåndet.
    chair_storage_design:
      name: Stoleopbevaringsdesign
      description: Angiver hvordan foldestolen er beregnet til at blive opbevaret
        (f.eks. sammenfoldelig, stabelbar eller ikke-sammenklappelig), så kunder kan
        vurdere opbevaring og transportmuligheder.
    chaise_or_sectional_orientation:
      name: Orientering af chaiselong eller modulsofa
      description: Angiver på hvilken side en integreret chaiselong eller forlænget
        sektion er placeret, når sofaen ses forfra.
    chamber_size:
      name: Kammerets størrelse
      description: Angiver mundstykkets kammerstørrelse/volumen, hvilket har indflydelse
        på modstanden og klangfarven.
    chanter_finger_spacing:
      name: Fingerafstand på chanter
      description: Angiver chanterens fingerafstand/størrelsesprofil (ofte beskrevet
        som standard, små hænder eller store hænder).
    chanter_type:
      name: Chantertype
      description: Type eller udformning af den chanter, der følger med instrumentet
        (eller som instrumentet bruger), f.eks. åben, lukket, til øvelse eller med
        klapper.
    chard_variety:
      name: Mangoldsort
      description: Angiver den specifikke kultivar eller farvevariant af bladbede,
        der sælges.
    charging_port_location:
      name: Ladeportens placering
      description: Fysisk placering af køretøjets primære eksterne ladeindgang (ladeport).
    chassis_construction_type:
      name: Chassiskonstruktionstype
      description: Beskriver den primære konstruktionsmetode for køretøjets chassis.
    checkbook_loading_orientation:
      name: Indsætningsretning for checkhæfte
      description: Angiver om checkhæftet er kompatibelt med top-indsætning, side-indsætning
        eller universelle checkformater.
    cheekpiece_style:
      name: Type af kindstøtte
      description: Definerer typen af kind-/ringkonfiguration på en trensebid, som
        bestemmer tøjlevirkning og lateral stabilitet.
    cheese_alternative_form:
      name: Type af ostealternativ
      description: Angiver den fysiske form eller udskæringsform, som ostealternativet
        sælges i.
    cheese_form:
      name: Osteform
      description: Beskriver den fysiske præsentation af osteproduktet (f.eks. hjul,
        blok, skåret eller revet).
    cheese_texture:
      name: Ostekonsistens
      description: Klassificerer osten efter dens generelle tekstur eller fasthed.
    cheese_variety:
      name: Ostevariant
      description: Identificerer den type ost, der bruges som den primære smagsstof
        i snacken.
    cherimoya_variety:
      name: Cherimoya-variant
      description: Angiver den specifikke kultivar eller variant af cherimoya (f.eks.
        Fino de Jete, El Bumpo).
    cherry_variety:
      name: Kirsebærvariant
      description: Angiver den specifikke kultivar eller variant af kirsebær, hvilket
        hjælper kunder med at vælge bestemte typer baseret på smag, farve, størrelse
        eller anvendelse i madlavning.
    chest_pocket_style:
      name: Type af brystlomme
      description: Angiver om skjorten har brystlommer samt deres placering og udformning.
    chewing_tobacco_form:
      name: Form af tyggetobak
      description: Angiver skråtobakkens fysiske form, skæreform eller posestørrelse
        (f.eks. løse blade, lange stykker eller smal pose).
    chicory_variety:
      name: Cikorievariant
      description: Angiver den specifikke variant eller kultivar af cikorie, der sælges
        (f.eks. radicchio, belgisk endivie eller escarole).
    chiffon_recommended_use:
      name: Anbefalet anvendelse af chiffon
      description: Primære anbefalede sy- eller hobbyanvendelser for chiffonstoffet.
    child_seat_accessory_type:
      name: Type af tilbehør til barnesæde
      description: Angiver den specifikke type tilbehør eller reservedel til en børnesæde
        (f.eks. sædehynde, fodstøtte eller monteringsadapter), så kunderne hurtigt
        kan finde frem til den vare, de har brug for, uden at der oprettes en masse
        underkategorier.
    child_seat_mounting_type:
      name: Monteringstype for børnesæde
      description: Angiver, hvordan cykelbarnestolen fastgøres til stellet, bagagebæreren
        eller styret.
    chime_sound_character:
      name: Klokkeklangens karakter
      description: Beskriver klokkernes tilsigtede klangfarve.
    chin_cup_type:
      name: Type af hagekop
      description: Angiver typen eller konstruktionen af hagekoppen, som påvirker
        komfort og beskyttelse ved stød.
    chin_strap_type:
      name: Hageremtype
      description: Angiver typen af hagerem på en hat — ingen, fast, justerbar eller
        aftagelig — så kunder kan vælge modeller, der sidder sikkert i blæsende eller
        aktive omgivelser.
    china_cymbal_edge_shape:
      name: Kantform på china-bækken
      description: Beskriver kant-/flangeprofilen på china-bækkener (hvor meget kanten
        er opadbøjet), hvilket påvirker spilfornemmelse og lyd.
    china_cymbal_sound_character:
      name: Lydkarakter for china-bækken
      description: Primære lyd-/klangkarakteristika for et china-bækken, brugt til
        søgning og filtrering (f.eks. trashy, mørk, lys). Flere værdier kan være gældende.
    chinstrap_type:
      name: Type af hagerem
      description: Angiver typen af hagerem, der følger med hjelmen.
    chip_cut_style:
      name: Chip-skåret stil
      description: Angiver den fysiske form eller teksturtype af chipsene (f.eks.
        riflet, grydefriterede eller puffede).
    chip_denomination:
      name: Chipværdi
      description: Angiver, hvilke chipværdier (pålydende) der er inkluderet i sættet
        (trykt eller tildelt).
    chocolate_form:
      name: Chokoladeform
      description: Beskriver den fysiske form, som bagechokoladen sælges i.
    choy_sum_variety:
      name: Choy sum-sort
      description: Angiver den specifikke markeds- eller botaniske variant af choy
        sum, der sælges.
    cigar_wrapper_color:
      name: Farve på cigaromslag
      description: Standard farveklassifikation af cigarens omslagsblad.
    cigarette_filter_type:
      name: Cigaretfiltertype
      description: Angiver om cigaretten har et filter, og i så fald filterets konstruktion
        eller eventuelle særlige egenskaber.
    cigarette_size:
      name: Cigaretstørrelse
      description: Klassificerer cigaretter efter branchestandard for længde eller
        format (f.eks. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Beskrivelse af cigaretstyrke
      description: En mærkning, der traditionelt anvendes af virksomheder til at angive
        tjære- og nikotinindholdet (f.eks. Light, Bold eller Silver).
    cinch_liner_material:
      name: Cinch-foringsmateriale
      description: Identificerer det materiale, der bruges til foret eller udfyldningen,
        der sidder mod hesten.
    circular_knitting_needle_cable_type:
      name: Rundpinds wiretype
      description: Kabelmateriale/-egenskaber og konstruktion (f.eks. belagt stål
        eller nylon), som påvirker hukommelse/kinkdannelse og drejeegenskaber.
    circular_knitting_needles_tip_material:
      name: Rundpindes spidsmateriale
      description: Materialet i de to nålespidser (i modsætning til wirematerialet).
    circumference_adjustment_mechanism:
      name: Mekanisme til justering af omkreds
      description: Mekanisme, der bruges til at justere eller låse nøglets omkreds.
    clamp_design:
      name: Klemmedesign
      description: Beskriver klemmens strukturelle eller mekaniske stil.
    clamp_sheet_music_clip_features:
      name: Funktioner for klemme til nodestativ
      description: Funktionelle egenskaber og beskyttelsesfunktioner ved klemme til
        noder (f.eks. polstring, skridsikkerhed, drejefunktion).
    clamping_closure_type:
      name: Type af klemme/lukkemekanisme
      description: Angiver den mekanisme, der bruges til at stramme eller fastgøre
        broderirammen omkring stoffet.
    clarinet_bell_acoustic_design:
      name: Akustisk design af klarinethorn
      description: Beskriver hornets lyd- og ventilationsdesign, der har til formål
        at påvirke respons og intonation.
    clarinet_bell_adjustment_mechanism:
      name: Justeringsmekanisme til klarinethorn
      description: Beskriver, hvordan klokkelængden eller geometrien justeres.
    clarinet_bell_ring_material:
      name: Materiale i klarinettens klokkering
      description: Angiver materialet på den beskyttende ring/bånd ved klarinettens
        klokkekant, hvis den findes.
    clarinet_bell_tuning_effect:
      name: Indvirkning på stemning fra klarinettens klokkedel
      description: Angiver, hvordan hornet er udformet til at påvirke stemningen/intonationen
        (især i de dybe toner og det lave register) sammenlignet med et standardhorn.
    clarinet_body_type:
      name: Kropstype for klarinet
      description: Angiver den primære konstruktionstype for A-klarinettens krop.
    clarinet_bore_type:
      name: Type af klarinetboring
      description: Beskriver altklarinettens boringstype.
    clarinet_cap_style:
      name: Type af klarinetkapsel
      description: Designet af den medfølgende hætte til en klarinetligatur og/eller
        et mundstykke (f.eks. omvendt eller med ventilationshuller).
    clarinet_care_kit_intended_use:
      name: Anvendelsesformål for klarinetplejesæt
      description: Den primære anvendelsessituation, som sættet er beregnet til (f.eks.
        hurtig daglig tørring kontra grundig rengøring/vedligeholdelse).
    clarinet_included_accessories:
      name: Klarinettilbehør medfølger
      description: Angiver, hvad der følger med Bb-klarinetten.
    clarinet_keywork_material:
      name: Materiale i klarinetmekanik
      description: Angiver, hvilket materiale klarinettens klapmekanisme er fremstillet
        af (f.eks. messing, nikkelsølv eller sølvbelagt).
    clarinet_keywork_plating:
      name: Belægning på klarinettens klaviatur
      description: Angiver overfladebehandlingen på klarinettens klapmekanisme (klapperne).
    clarinet_mouthpiece_baffle_profile:
      name: Profilen på et klarinetmundstykkes lydplade
      description: Beskriver den indvendige baffel-/tagprofil i klarinetmundstykket,
        som påvirker klangens lyshed og projektion.
    clarinet_mouthpiece_beak_shape:
      name: Klarinetmundstykkets spidsform
      description: Angiver den ydre næb-profil/vinkel på mundstykket, som påvirker
        komfort og embouchure-fornemmelse.
    clarinet_mouthpiece_chamber_size:
      name: Kammerstørrelse på klarinettens mundstykke
      description: Beskriver den relative kammerstørrelse på et klarinetmundstykke
        (som angivet af producenten), hvilket kan påvirke klangfarven og modstanden
        ved spil.
    clarinet_mouthpiece_intended_tone:
      name: Klarinetmundstykkes tiltænkte klang
      description: Beskriver det generelle klangmål, som mundstykket er markedsført
        med.
    clarinet_mouthpiece_player_level:
      name: Tiltænkt spillerniveau for klarinetmundstykke
      description: Angiver mundstykkets typiske tilsigtede anvendelsesniveau.
    clarinet_reed_cut:
      name: Type af skæring på klarinetblad
      description: Angiver rørbladets udskæring/profil (f.eks. filet eller ikke filet
        samt andre udskæringsvarianter på markedet), hvilket har indflydelse på respons
        og klang.
    clarinet_reed_material_type:
      name: Klarinetbladets materialetype
      description: Angiver hvilket materiale klarinetbladet er lavet af (f.eks. rør
        eller syntetisk samt almindelige typer af syntetiske materialer).
    clarinet_thumb_rest_type:
      name: Type af tommelfingerstøtte på klarinet
      description: Type/egenskab for højre hånds tommelfingerstøtte.
    classical_guitar_string_3rd_string_type:
      name: Klassisk guitarstreng, type med 3. streng
      description: Angiver om G-strengen (3. streng) er uden vikling (monofilament)
        eller omspundet.
    classical_guitar_string_bass_winding_material:
      name: Materiale i omvikling på basstrenge til klassisk guitar
      description: Det omviklingsmateriale, der anvendes på basstrengene (typisk streng
        4–6).
    classical_guitar_string_set_configuration:
      name: Konfiguration af strengesæt til klassisk guitar
      description: Angiver, om produktet er et komplet sæt eller bestemte strenge
        (typisk til diskant- eller bassiden) til en klassisk guitar.
    clay_modeling_dough_base_material:
      name: Grundmateriale i modellervoks og modellermasse
      description: Primær formulering eller basistype for modelleringsmaterialet.
    clay_modeling_dough_curing_method:
      name: Hærdningsmetode for ler og modellermasse
      description: Hvordan materialet hærder (eller forbliver genanvendeligt), hvilket
        afgør, hvilke værktøjer der er behov for, og hvilke anvendelsesmuligheder
        der typisk er.
    clay_paintability:
      name: Malbarhed af ler
      description: Angiver om den hærdede leroverflade kan males, samt hvilke typer
        maling der anbefales.
    clay_primary_composition:
      name: Lerets primære sammensætning
      description: Det primære grundmateriale/bindemiddel i den lufttørrende ler (f.eks.
        papir- eller mineralbaseret).
    clay_shooting_discipline:
      name: Lerdueskydnings-disciplin
      description: Angiver den disciplin eller det stævne inden for lerdueskydning,
        som produktet er beregnet til.
    cleaner_format:
      name: Renere format
      description: Emballage-/formattype for rensemiddel til instrument-slides.
    cleaner_sanitizer_intended_area:
      name: Anvendelsesområde for rengørings-/desinfektionsmiddel
      description: Den primære del af messinginstrumentet, som produktet er beregnet
        til at rense/desinficere.
    cleaning_formula:
      name: Rengøringsformel
      description: Angiver den primære kemiske produktgruppe for rengørings- og desinfektionsmidler
        (ikke mærke) med henblik på filtrering efter sikkerhed, kompatibilitet og
        anvendelse.
    cleaning_task_focus:
      name: Rengøringsopgaves fokusområde
      description: Angiver de primære rengøringsproblemer, som den vandløse vask er
        beregnet til at løse.
    cleanup_method:
      name: Rengøringsmetode
      description: Angiver, hvordan limen kan fjernes (mens den stadig er våd) fra
        hænder, værktøj eller overflader.
    clear_glue_application_method:
      name: Påføringsmetode for klar lim
      description: Angiver typen af doserings-/påføringsapplikator, der følger med
        emballagen til klar lim.
    clear_glue_finish_after_drying:
      name: Finish for klar lim (efter tørring)
      description: Beskriver limens udseende, når den er tørret/hærdet (f.eks. krystalklar
        eller gennemsigtig, blank eller mat).
    cleat_bolt_pattern:
      name: Boltmønster til klamper
      description: Angiver den klampebolt-konfiguration, der bruges til at montere
        klampen, hvilket bestemmer kompatibilitet med pedaler og sko (f.eks. 2-bolt
        MTB eller 3-bolt landevej).
    cleat_compatibility:
      name: Klampekompatibilitet
      description: Angiver de pedal- eller klampesystemer skoovertrækket er kompatibelt
        med.
    cleat_finish:
      name: Overfladefinish på klampe
      description: Angiver overfladefinishen/belægningen på fortøjningsklampen, som
        påvirker korrosionsbestandighed og udseende.
    cleat_receptacle_system:
      name: System til fastgørelse af klamper
      description: Angiver den kompatible fastgørelsesflade til pigge/klamper, der
        anvendes på golfsko med pigge.
    cleat_release_mechanism:
      name: Udløsningsmekanisme for klampe
      description: Angiver, hvordan en cykelklampe frigøres fra pedalen (f.eks. enkeltretning
        eller flerretning).
    cleat_stud_type:
      name: Klampespidstype
      description: Angiver konstruktionen eller fastgørelsestypen af knopper/pigge
        på ydersålen af amerikanske fodboldstøvler.
    climate_control_module_function:
      name: Klimastyringsmodulets funktion
      description: Angiver modulets primære funktion i køretøjets HVAC-system (varme-,
        ventilations- og klimaanlæg).
    climbing_hold_mounting_type:
      name: Monteringstype for klatregreb
      description: Angiver, hvordan holderen fastgøres til væggen eller træningspladen.
    climbing_hold_type:
      name: Klatregrebstype
      description: Angiver grebets form eller type, som bestemmer, hvordan det holdes.
    climbing_protection_device_type:
      name: Klatrebeskyttelsesanordningens type
      description: Angiver typen af sikringsudstyr (f.eks. kamsikring, kile eller
        piton), hvilket hjælper klatrere med hurtigt at vælge det rette udstyr til
        en given klippeformation eller klatretype.
    climbing_rope_middle_marking:
      name: Midtermarkering på klatrereb
      description: Beskriver, hvordan rebets midtpunkt (og/eller ender) er markeret
        for at hjælpe med sikker nedfiring og abseiling.
    climbing_rope_treatment:
      name: Rebets overfladebehandling
      description: Angiver eventuel vandafvisende, tør- eller beskyttelsesbehandling,
        der er påført rebets kappe og/eller kerne.
    climbing_rope_type:
      name: Type af klatrereb
      description: Kategoriserer rebet efter UIAA-certificering og anvendelsesformål
        (f.eks. dynamisk enkeltreb, halvreb, tvillingreb, statisk reb eller hjælpereb),
        så kunderne hurtigt kan finde det rigtige reb til deres aktivitet.
    climbing_safety_certifications:
      name: Sikkerhedscertificeringer for klatring
      description: Viser en liste over de klatre- og industri-sikkerhedsstandarder,
        som udstyret opfylder.
    clip_color:
      name: Farve på klemme
      description: Primær farve på klemme til noder.
    clip_mechanism_type:
      name: Mekanismetype til pengeklips
      description: Beskriver den fastgørelsesmekanisme, der anvendes i en penneklemme
        eller en tegnebog med penneklemme, og hjælper kunderne med at vælge mellem
        typer med magnet, fjeder eller håndtag og andre typer.
    clip_style:
      name: Type af pengeklips
      description: Angiver den specifikke klemme, der bruges til at fastgøre holderen,
        samt oplysninger om kompatibilitet (f.eks. krokodilleklemme eller karabinhage).
    clipper_motor_technology:
      name: Motorteknologi i hesteklipper
      description: Angiver det motordesign, der anvendes i klippemaskinen, hvilket
        påvirker effekt, støjniveau, holdbarhed og vedligeholdelse.
    closet_configuration:
      name: Konfiguration af skab
      description: Definerer den overordnede form eller layout for walk-in-closet-systemet
        (f.eks. L-formet, U-formet, med ø).
    closing_mechanism:
      name: Lukkemekanisme
      description: Angiver, hvordan skuffen lukkes, f.eks. standard, soft-close, selvlukkende
        eller åbning med tryk.
    cloth_construction:
      name: Tøjkonstruktion
      description: Angiver vævningen eller overfladebehandlingen af stoffet, som påvirker
        hastighed og holdbarhed (f.eks. kamgarn eller uldgarn).
    cloth_thickness:
      name: Stoffets tykkelse
      description: Angiver poleringskludens tykkelse/vægtklasse.
    club_head_material:
      name: Køllehovedmateriale
      description: Angiver det primære materiale, der bruges i konstruktionen af køllehovedet.
    clutch_hydraulic_system_type:
      name: Type af hydraulisk koblingssystem
      description: Angiver, om koblingsbetjeningen er kompatibel med det hydrauliske
        system (f.eks. ved ombygning fra hydraulisk kobling til kabelbetjening).
    clutch_line_connection_type:
      name: Type af tilslutning for koblingsledning
      description: Angiver tilslutningen/stikket, der anvendes til koblingsledningen
        (vigtigt for kompatibiliteten med hoved- og slavecylindre samt faste rørledninger).
    clutch_pressure_plate_actuation_type:
      name: Aktiveringstype for koblingstrykplade
      description: Angiver om koblingen udløses via en tryk- eller træk-udløsningsmekanisme
        (membranfjederaktivering).
    clutch_pressure_plate_release_mechanism_type:
      name: Type af udløsningsmekanisme for koblingens trykplade
      description: Type af udløsnings-/aktiveringskontaktflade på trykpladen.
    clutch_pressure_plate_surface_type:
      name: Type af overflade på koblingens trykplade
      description: Type af friktionskontaktflade på trykpladen.
    clutch_slave_cylinder_connection_type:
      name: Tilslutningstype for koblingens slavecylinder
      description: Hydraulisk tilslutningskontaktflade på slavecylinderen (f.eks.
        gevindport, quick-connect, banjo osv.).
    clutch_slave_cylinder_mounting_type:
      name: Monteringstype for koblingsslavecylinder
      description: Monteringstype for slavecylinderen på gearkasse/klokkehus (f.eks.
        boltmonteret, clipmonteret eller integreret koncentrisk).
    coating_type:
      name: Type af belægning
      description: Angiver eventuel ydre belægning, drys eller glasur på kornbaren
        (f.eks. chokolade eller yoghurt).
    cocking_mechanism:
      name: Spændemekanisme
      description: Angiver den primære metode eller enhed, der bruges til at spænde
        eller afspænde armbrøststrengen.
    cocktail_garnish_form:
      name: Form på cocktailpynt
      description: Beskriver, hvordan pynt til cocktails er forberedt og præsenteret
        til brug (f.eks. frisk eller dehydreret/tørret).
    cocktail_mix_variety:
      name: Udvalg af cocktailblandinger
      description: Angiver den specifikke cocktail, som blandingen er beregnet til
        at lave (f.eks. Margarita, Mojito eller Piña Colada).
    cocktail_napkin_features:
      name: Cocktail-servietternes servietter
      description: Fremhæver cocktail-servietternes funktionelle, praktiske og miljøvenlige
        egenskaber.
    cocktail_pick_tip_style:
      name: Type af spids på cocktailpind
      description: Beskriver spidsens form eller udformning, som bruges til at gennembore
        eller holde pynt.
    cocktail_pick_top_handle_style:
      name: Type af top eller håndtag på cocktailpind
      description: Beskriver den dekorative overdel eller håndtagsform, der bruges
        til at holde eller til præsentation.
    cocktail_type:
      name: Type af cocktail
      description: Angiver den specifikke cocktailopskrift eller -stil, som det færdigblandede
        produkt repræsenterer (f.eks. Margarita, Negroni eller Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Materiale til cocktailparaplyens skaft/spids
      description: Materiale i skaftet/pinden (ekskl. parasolskærm) på cocktailparaplyen.
    cocoa_processing_method:
      name: Forarbejdningsmetode for kakao
      description: Angiver hvordan kakaopulveret er blevet forarbejdet (f.eks. naturligt,
        alkaliseret eller sort kakao).
    cocoa_product_form:
      name: Kakaoproduktform
      description: Angiver den fysiske form, som kakaoproduktet sælges i.
    coconut_husk_status:
      name: Status for kokosnøddens skal
      description: Angiver i hvilken grad kokosnødens ydre skal eller fiberlag er
        fjernet, hvilket påvirker brugervenlighed, opbevaring og affaldsmængde.
    coconut_maturity_stage:
      name: Kokosnøddens modningsfase
      description: Angiver kokosnøddens udviklingsstadium ved høst, hvilket har stor
        indflydelse på smag, vandindhold og anvendelse i madlavningen (f.eks. som
        drik eller til madlavning).
    coconut_oil_refinement_type:
      name: Type af raffineringsgrad for kokosolie
      description: Angiver kokosoliens forædlingsgrad eller kvalitet, f.eks. jomfru,
        raffineret, MCT eller fraktioneret.
    coconut_preparation_form:
      name: Forberedelsesform for kokosnød
      description: Angiver, hvordan kokosnøtten fysisk tilberedes eller skæres (hel,
        skåret i skiver, revet, pureret osv.), hvilket hjælper kunden med hurtigt
        at finde det format, der er nødvendigt til opskrifter eller snacks.
    coffee_bean_species:
      name: Kaffebønneart
      description: Angiver den kaffebønneart, der anvendes i produktet.
    coffee_beverage_variety:
      name: Kaffedrik-variant
      description: Klassificerer færdiglavede eller blandbare kaffedrikke efter type/stil.
    coffee_processing_method:
      name: Forarbejdningsmetode for kaffe
      description: Angiver den forarbejdningsmetode, der anvendes efter høst på kaffebønnerne.
    coil_material:
      name: Spolemateriale
      description: Angiver det primære materiale eller nettype, der anvendes i varmeelementet,
        hvilket påvirker smag, levetid og kompatibilitet med temperaturstyring.
    coil_spring_design:
      name: Design af spiralfjeder
      description: Angiver fjedervinklen og -formen på spiralfjederen, som påvirker
        køreegenskaberne.
    coil_spring_finish_coating:
      name: Spiralfjederens overflade/belægning
      description: Overfladebehandling eller belægning, der er påført som korrosionsbeskyttelse.
    coil_spring_material:
      name: Spiralfjedermateriale
      description: Spiralfjederens primære materiale/sammensætning.
    coil_system_type:
      name: Type af spiralsystem
      description: Angiver den specifikke spiral- eller fjederkonstruktion, der anvendes
        i madrasser, såsom pocket-fjedre eller Bonnell-fjedre.
    coil_type:
      name: Fjedertype
      description: Beskriver den type af varmeelement-konstruktion eller teknologi,
        der anvendes, hvilket påvirker dampproduktion og smag.
    coin_grade_numismatic:
      name: Møntkvalitet (numismatisk)
      description: Møntens standardiserede kvalitetsvurdering (f.eks. Sheldon-skalaen
        eller en beskrivende kvalitetsvurdering).
    coin_strike_or_finish:
      name: Møntprægning eller finish
      description: Angiver møntens prægningstype eller finish (f.eks. cirkulationsprægning
        eller proof).
    coin_strike_type:
      name: Type af møntprægning
      description: Beskriver møntens prægningstype eller finish (f.eks. proof eller
        cirkulationsprægning).
    collar_style:
      name: Kravestil
      description: Beskriver udformningen af kraven eller halsudskæringen på tøjet.
    collectible_gun_accessories_included:
      name: Samler-tilbehør til våben medfølger
      description: Viser en liste over det tilbehør og den dokumentation, der følger
        med samlervåbnet (f.eks. hylster, etui, bajonet og papirer).
    collectible_gun_firing_mechanism:
      name: Affyringsmekanisme i samlervåben
      description: Angiver skydevåbnets affyrings- eller tændingsmekanisme for samlervåben
        (især antikke og historiske våben).
    collectible_knife_blade_finish:
      name: Klingeoverflade/finish på samlerkniv
      description: Beskriver bladets overfladebehandling med henblik på udseende (og
        undertiden korrosionsbestandighed).
    color_code_system:
      name: Farvekodesystem
      description: Angiver det farvekodesystem, der anvendes til trådens numeriske
        farvereference (f.eks. DMC, Anchor), hvis relevant.
    color_coding_standard:
      name: Farvekodningsstandard
      description: Angiver om skiven følger en international farvekodningsstandard
        (f.eks. IWF eller IPF) eller et andet system.
    color_effect:
      name: Farveeffekt
      description: Angiver særlige farveteknikker eller effekter, der er anvendt på
        hår-extensions.
    color_family:
      name: Farvefamilie
      description: Overordnet farvefamilie for sumi-blæk (nyttigt når specifik farve
        er for detaljeret, f.eks. varm sort eller blåsort).
    color_finish:
      name: Farvefinish
      description: Angiver overfladefinishen på de synlige dele af håndbeskytteren
        (f.eks. mat eller blank), når farve alene ikke er tilstrækkelig.
    coloring_finish:
      name: Farvefinish
      description: Angiver det visuelle udseende eller den specielle effekt, som farven
        skaber, f.eks. metallisk eller neon.
    comb_material:
      name: Kammateriale
      description: Materiale i mundharmonikans kam (kroppen, der danner luftkamrene).
    comb_type:
      name: Kamtype
      description: Klassificerer hesteplejekamme efter deres primære funktionstype
        (f.eks. strigle, mankam eller udtyndingskam), så købere hurtigt kan finde
        det rette værktøj til specifikke plejeopgaver.
    combat_shorts_cut_style:
      name: Snit/stil på kampsportsshorts
      description: Angiver snit- eller pasformstype for kampsportsshorts (f.eks. højt
        skåret, retro-snit eller kompression).
    comic_creator_role:
      name: Rollen som tegneserieskaber
      description: Angiver den krediterede rolle, der er relevant for annoncen (f.eks.
        forfatter, kunstner).
    commemorative_coin_finish:
      name: Erindringsmøntens finish
      description: Beskriver prægetypen eller finishen på en erindringsmønt.
    commemorative_coin_mint_mark:
      name: Møntmærke på erindringsmønt
      description: Angiver møntmærket (eller fraværet af møntmærke) på mønten.
    commemorative_subject:
      name: Erindringsmotiv
      description: Det primære emne, der fejres (begivenhed, person, sted, jubilæum,
        organisation osv.).
    commercial_vehicle_class:
      name: Erhvervskøretøjsklasse
      description: GVWR-baseret regulerings- eller brancheklassificering, der bruges
        til at beskrive et erhvervskøretøjs vægtklasse til browsing og filtrering.
    compass_damping_medium:
      name: Dæmpningsmiddel i kompas
      description: Angiver det materiale, der anvendes til at stabilisere nålens bevægelse
        inde i kompasskapslen.
    compass_illumination_type:
      name: Kompasbelysningstype
      description: Angiver, hvordan kompasmarkeringerne gøres synlige under dårlige
        lysforhold (f.eks. selvlysende maling, tritium, LED-baggrundsbelysning).
    compass_mounting_style:
      name: Monteringsstil for kompas
      description: Beskriver, hvordan kompasset bæres, bruges eller monteres.
    compass_scale_units:
      name: Kompasskalaenheder
      description: Angiver de måleenheder (grader, mil eller begge dele), der er angivet
        på kompassets hus.
    compatible_abs_system:
      name: Kompatibelt ABS-system
      description: Angiver, om hovedcylinderen er beregnet til køretøjer udstyret
        med ABS.
    compatible_adapter_brand:
      name: Kompatibelt adaptermærke
      description: Angiver mærket på golfkøllehovedet, som skaftet er lavet til at
        passe til.
    compatible_airbag_system_type:
      name: Kompatibel airbagsystemtype
      description: Angiver den airbag-systemgeneration eller funktionspakke, som delen
        er kompatibel med (f.eks. enkelttrins- eller totrins-system).
    compatible_amplifier_fit_method:
      name: Kompatibel monteringsmetode for forstærker
      description: Angiver, hvordan kompatibiliteten er defineret for coveret/etuiet
        (universalpasform, modelspecifik eller efter mål).
    compatible_apparatus:
      name: Kompatibelt apparat
      description: Angiver det gymnastikudstyr eller den aktivitet, som grebene er
        designet til.
    compatible_archery_tool:
      name: Kompatibelt bueskydningsværktøj
      description: Angiver det primære bueskydningsværktøj eller -udstyr, som tilbehøret
        er designet til at fungere med.
    compatible_axle_size:
      name: Kompatibel akselstørrelse
      description: Angiver nav-/akseldiameteren eller trådstandarden, som fodstøtten
        er designet til at passe til (f.eks. 10 mm/3⁄8 tomme, 14 mm, 3/8 tomme 26
        TPI).
    compatible_axle_type:
      name: Kompatibel akseltype
      description: Angiver de standarder for bagakselmontering, som cykeltræneren
        understøtter, såsom quick-release eller gennemgående aksel-størrelser.
    compatible_axle_weight_rating:
      name: Kompatibel akselvægtklassificering
      description: Angiver den akselvægtklassificering (kapacitet pr. aksel) for trailer,
        som bremseaggregatet er designet til at passe til.
    compatible_bait_type:
      name: Kompatibel lokkemadstype
      description: Angiver de typer fiskemadding boremaskinen til agn er kompatibel
        med, så lystfiskere kan vælge et værktøj, der passer til deres foretrukne
        agn.
    compatible_bass_scale_length:
      name: Kompatibel basskalalængde
      description: Angiver den eller de skalalængder, som strengsættet er beregnet
        til (vigtigt for korrekt viklingslængde og pasform).
    compatible_battle_top_system:
      name: Kompatibelt system til konkurrencesnurretop
      description: Angiver det konkurrencesnurretop-produktøkosystem eller den serie,
        som toppen er designet til (bruges til at sikre kompatibilitet med dele og
        arena).
    compatible_bb_size:
      name: Kompatibel BB-størrelse
      description: Angiver diameteren på airsoft-kugler, som produktet understøtter.
    compatible_bed_frame_style:
      name: Kompatibel sengerammetype
      description: Angiver den seng- eller rammetype, som tilbehøret er designet til
        at passe til.
    compatible_bicycle_tire_type:
      name: Kompatibel cykeldæktype
      description: Angiver, hvilke cykeldæktyper produktet kan reparere eller forsegle.
    compatible_bike_component:
      name: Kompatibel cykelkomponent
      description: Angiver, hvilken del af cyklen værktøjet eller produktet er designet
        til at vedligeholde.
    compatible_billiard_game:
      name: Kompatibelt billardspil
      description: Angiver, hvilke billardspil/formater stativet er designet til,
        så kunder kan vælge et stativ, der passer til deres spil.
    compatible_billiard_table_size:
      name: Kompatibelt billardbords størrelse
      description: Angiver de standardbordlængder, som overtrækket er designet til
        at passe til, så kunder kan vælge et overtræk i korrekt størrelse til deres
        poolbord.
    compatible_bit_type:
      name: Kompatibel bittype
      description: Typer af bits, som beskyttelsesskærmen kan bruges med.
    compatible_blade_hosel:
      name: Kompatibel hosel til enden
      description: Angiver den type bladhosel/konisk udformning, som skaftet passer
        til, hvilket sikrer, at skaftet og bladet passer korrekt sammen.
    compatible_blade_system:
      name: Kompatibelt klingesystem
      description: 'Angiver det udskiftelige bladssystem/-format, som kniven understøtter
        (f.eks. standard hobbyblad #11 eller snap-off-segmentblade).'
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibel skyttelvæv med bådformet skyttel
      description: Hvilke vævetyper er væveskytten beregnet til at blive brugt sammen
        med?
    compatible_bobbin_type:
      name: Kompatibel spoletype
      description: Angiver, hvilken type spole væveskytten er beregnet til at bruge.
    compatible_bottle_mouth:
      name: Kompatibel flaskemunding
      description: Flaskemundingstype eller -diameter, som sugerøret eller låget er
        designet til at passe til.
    compatible_bow_attachment_system:
      name: Kompatibelt buefæste-system
      description: Angiver den type tilslutning til buearme eller tilbehør, som delen
        er designet til (f.eks. ILF, skruefatning eller hurtig afmontering).
    compatible_bow_crossbow_type:
      name: Kompatibel bue-/armbrøsttype
      description: Angiver den bue- eller armbrøststil, som tilbehøret er designet
        til at passe til.
    compatible_brake_fluid:
      name: Kompatibel bremsevæske
      description: De DOT-specifikationer for bremsevæske, som hovedcylinderens tætninger/materialer
        er konstrueret til at være kompatible med.
    compatible_brake_pad:
      name: Kompatibel bremseklods
      description: Angiver de bremseklodsmaterialer bremseskiven er godkendt til,
        for at sikre sikkerhed og optimal slidstyrke.
    compatible_brake_service_system:
      name: Kompatibelt bremseservicesystem
      description: Angiver, om delen er beregnet til skivebremser, tromlebremser eller
        begge dele.
    compatible_brake_system:
      name: Kompatibelt bremsesystem
      description: Angiver vigtige kompatibilitetsoplysninger for brug af bremsevæske.
    compatible_brake_type:
      name: Kompatibel bremsetype
      description: Angiver den bremsetype, som reolen er kompatibel med, f.eks. skivebremse
        eller fælg.
    compatible_brass_instrument_finish:
      name: Kompatibel finish til messingblæsere
      description: Angiver de overflader på messingblæseinstrumenter rengøringsmidlet
        sikkert kan anvendes på uden at beskadige finishen.
    compatible_building_toy_system:
      name: Kompatibelt byggesystem for legetøj
      description: Angiver det byggesystem eller den standard legetøjet er kompatibelt
        med (eller tilsvarende størrelsesstandard), f.eks. LEGO-kompatibelt eller
        proprietært system.
    compatible_capo_fretboard_radius:
      name: Den kompatible kapodaster-gribeplades radius
      description: Angiver gribebrættets radius/profil, som capoen er designet til
        at passe til, for optimal kontakt og stemmestabilitet.
    compatible_capo_number_of_strings:
      name: Kompatibelt antal strenge for capoen
      description: Angiver hvor mange strenge capoen er designet til at klemme over
        (relevant for 6-, 7-, 8-, 12-strengs og specialinstrumenter).
    compatible_cardio_machine_type:
      name: Kompatibel kardiomaskinetype
      description: Identificerer den type motionsmaskine, som tilbehøret eller delen
        er designet til at fungere med.
    compatible_chain_link_type:
      name: Kompatibel kædeledstype
      description: Angiver den kædeledstype, som værktøjet understøtter (standard,
        halvled, hurtigled osv.).
    compatible_chain_size:
      name: Kompatibel kædestørrelse
      description: Angiver de standarder for kædebredde eller -stigning (f.eks. 1/8
        tomme, 3/32 tomme), som værktøjet understøtter.
    compatible_chain_width:
      name: Kompatibel kædebredde
      description: Angiver hvilken kædestørrelse friløbet er designet til at fungere
        med.
    compatible_chip_denomination:
      name: Kompatibel chipvalør
      description: Angiver de chipvalører bakken/kassen har mærkede eller dedikerede
        pladser til (eller er beregnet til at organisere).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibel mundstykkeligatur til klarinet
      description: Angiver standarden for ligaturpasning eller kompatibilitetsbemærkninger
        for mundstykket.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibel strengemensur til klassisk guitar
      description: Den tilsigtede kompatibilitet mellem guitarens skala og strenglængde
        for dette sæt.
    compatible_clay_target_size:
      name: Kompatibel lerduestørrelse
      description: Angiver de størrelser eller former på lerduer, som kasteren kan
        håndtere for at sikre korrekt pasform og resultat.
    compatible_cleat_system:
      name: Kompatibelt klampesystem
      description: Angiver klampe- eller boltmonteringssystemet, som pedalen understøtter,
        så ryttere kan matche deres sko med det korrekte system.
    compatible_clipless_pedal_system:
      name: Kompatibelt klemmeløst pedalsystem
      description: Angiver den specifikke klikpedal-/klampestandard, som produktet
        er designet til at være kompatibelt med.
    compatible_clutch_type:
      name: Kompatibel koblingstype
      description: Kompatibilitet med koblingsgrænsefladen til svinghjulet (hvis det
        er relevant).
    compatible_coffee_pod_system:
      name: Kompatibelt kaffekapselsystem
      description: Angiver den kaffemaskine eller det bryggesystem kapslerne er designet
        til.
    compatible_construction_set_system:
      name: Kompatibelt byggesætsystem
      description: Angiver det byggesystem eller brand-økosystem sættet er kompatibelt
        med (f.eks. LEGO-kompatibelt, DUPLO-kompatibelt).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibel holder til kontrabasklarinet
      description: Angiver den type stativ-/pindtilslutning eller støtte, som kræves.
    compatible_coolant_chemistry:
      name: Kompatibel kølemiddelkemi
      description: Angiver de kølevæske-kemifamilier tilsætningsstoffet er formuleret
        til at være kompatibelt med.
    compatible_cooling_system_material:
      name: Kompatibelt kølesystemmateriale
      description: Angiver de kølesystemer/materialer radiatorskyllemidlet er sikkert
        at anvende i (f.eks. aluminiumsradiatorer, blandede metalsystemer).
    compatible_crib_format:
      name: Kompatibel krybbeformat
      description: Definerer den overordnede størrelse- eller formkategori for den
        madras eller det lagen, som tilbehøret er designet til at passe til.
    compatible_cross_stitch_fabric_count:
      name: Kompatibel trådtæthed til korssting
      description: Anbefalet trådtæthed til brodering af motivet.
    compatible_cross_stitch_frame:
      name: Kompatibel korsstingsramme
      description: Angiver, hvad rammen er designet til at bruges med (håndholdt brug,
        bordstativ, gulvstativ eller universel).
    compatible_crossbar:
      name: Kompatibel tværstang
      description: Angiver tagholderens kompatibilitet med køretøjets tagbøjlers tværstænger
        (hvis det er tagmonteret), herunder standarder for tværstangens form og profil.
    compatible_cycling_cleat:
      name: Kompatibel cykelklampe
      description: Angiver det klampe- eller pedalsystem, som cykelskoene er designet
        til at fungere med.
    compatible_cymbal_size:
      name: Kompatibel bækkenstørrelse
      description: Angiver den tiltænkte (eller maksimale) bækkendiameter, som kassen
        er designet til at passe til; dette er kompatibilitet for bækkenstørrelse
        og ikke kassens ydre diameter.
    compatible_device_type:
      name: Kompatibel enhedstype
      description: Angiver, hvilken type enhed beslaget er beregnet til at holde (f.eks.
        skærm/TV, tablet, smartphone eller bærbar DVD-afspiller).
    compatible_dock_structure_type:
      name: Kompatibel dock-strukturtype
      description: Den kajkonstruktion, som trapperne er beregnet til at blive monteret
        på.
    compatible_dough_type:
      name: Kompatibel dejtype
      description: Angiver de typer eller mærker af modellervoks værktøjet er designet
        til at fungere med (f.eks. standard modellervoks eller modelleringsler).
    compatible_drawing_ink_surface:
      name: Kompatibel tegneblækoverflade
      description: Angiver anbefalede overflader/materialer for optimal ydeevne.
    compatible_drivetrain_brand:
      name: Kompatibelt drivlinjebrand
      description: Angiver de mærker af drivlinjer eller bremsesystemer, som kablet
        er beregnet til at fungere sammen med.
    compatible_drivetrain_speeds:
      name: Kompatible gearantal i drivlinjen
      description: Angiver antallet af gear i drivlinjen (f.eks. 10-gear), som kranksættet
        eller klingen er kompatibelt med.
    compatible_equipment:
      name: Kompatibelt udstyr
      description: Angiver den type vintersportsudstyr skruestikken er designet til
        at holde.
    compatible_evap_system:
      name: Kompatibelt EVAP-system
      description: Angiver, om tankdækslet er designet til at opfylde EVAP-systemets
        krav (f.eks. OEM-spec tætning) og reducere risikoen for motorfejlindikator.
    compatible_exercise_bike_style:
      name: Kompatibel motionscykeltype
      description: Angiver, hvilke modeller af motionscykler tilbehøret eller reservedelen
        passer til.
    compatible_fencing_weapon:
      name: Kompatibelt fægtevåben
      description: Angiver, hvilket fægtevåben eller hvilken disciplin jakken eller
        laméen er beregnet til.
    compatible_fiber_type:
      name: Kompatibel fibertype
      description: Primære fibertyper, som kartevalsen er beregnet til at bearbejde
        effektivt.
    compatible_fin_box_system:
      name: Kompatibelt finneæskesystem
      description: Angiver det finneboks- eller monteringssystem finnen er designet
        til at passe i, så surfere kan vælge finner, der er kompatible med deres surfbræt
        (f.eks. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibel fingerbrætradius
      description: Angiver gribebrættets radius (flad, buet eller sammensat), som
        capoen er designet til at passe til, for jævnt tryk og reduceret snerren.
    compatible_finish_type:
      name: Kompatibel finishtype
      description: Angiver, hvilke typer instrumentoverflader sprayen er godkendt
        til.
    compatible_fishing_reel_type:
      name: Kompatibel fiskehjulstype
      description: Angiver den type fiskehjul, som tilbehøret er designet til at passe
        til eller fungere med (f.eks. spinning, udkast af madding eller flue).
    compatible_fly_line_weight:
      name: Kompatibelt fluelinelod
      description: Angiver de AFTMA-fluelinelodder, som spolen er beregnet til.
    compatible_flywheel_type:
      name: Kompatibel svinghjulstype
      description: Angiver den type svinghjul koblingens trykplade er beregnet til
        at blive brugt sammen med.
    compatible_football_kick_type:
      name: Kompatibel fodboldsparktype
      description: Angiver de sparkesituationer produktet er designet til at understøtte
        (f.eks. kickoff, field goal), så atleter hurtigt kan finde passende udstyr.
    compatible_fuel_system_type:
      name: Kompatibel brændstofssystemtype
      description: Angiver det brændstofsystem rengøringsmidlet er designet til.
    compatible_gas_type:
      name: Kompatibel benzintype
      description: Identificerer den type komprimeret gas, som paintball-lufttanken
        er designet til at bruge.
    compatible_gel_wax_additives:
      name: Tilsætningsstoffer kompatible med gelvoks
      description: Angiver de typer tilsætningsstoffer, der er kompatible med denne
        gelvoks (f.eks. farvestoffer eller indstøbninger).
    compatible_glaze_layering:
      name: Kompatibel glasurlagdeling
      description: Om glasuren er beregnet til at blive lagt i lag med andre glasurer
        for at skabe effekter.
    compatible_golf_bag_type:
      name: Kompatibel golftasketype
      description: Angiver hvilke golftaskeformater coveret eller æsken passer til.
    compatible_ground_polarity:
      name: Kompatibel jordreference
      description: Angiver, om spændingsregulatoren er beregnet til køretøjers elektriske
        systemer med negativ eller positiv jordforbindelse (eller om den ikke er polaritetsfølsom).
    compatible_guitar_body_shape:
      name: Kompatibel guitar-kropsform
      description: Angiver, hvilken guitarform kassen er designet til at passe til.
    compatible_guitar_case:
      name: Kompatibelt guitarkasse
      description: Angiver de typer af guitarkasser luftfugteren er designet til at
        passe i og fungere korrekt i.
    compatible_guitar_scale_length:
      name: Kompatibel længde på guitarskala
      description: Angiver de guitarskalalængder strengesættet er beregnet til at
        passe til (baseret på opviklingslængde/total længde).
    compatible_gun_platform:
      name: Kompatibel skydevåbenplatform
      description: Angiver den driftsplatform eller strømkilde, som produktet er kompatibelt
        med (f.eks. AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibel hårlængde
      description: Angiver den maksimale hårlængde eller det maksimale hårvolumen,
        som hovedbeklædningen kan rumme uden at være ubehagelig.
    compatible_head_and_neck_restraint_system:
      name: Kompatibelt hoved- og nakkestøttesystem
      description: Angiver, om hjelmen har ankerpunkter og/eller er kompatibel med
        hoved- og nakkesikringssystemer (f.eks. HANS), herunder om ankerstolper er
        inkluderet eller kan monteres.
    compatible_helmet_certification_standard:
      name: Standard for kompatibel hjelmcertificering
      description: Angiver de hjelmsikkerhedsstandarder eller certificeringer tilbehøret
        er designet til at understøtte (f.eks. racing-tilbehør som tear-offs, der
        ofte henviser til specifikke reglementer).
    compatible_helmet_shell_size:
      name: Kompatibel hjelmskalstørrelse
      description: Angiver de hjelmskalstørrelser en indvendig reservedel passer til
        (hjelmskaller grupperes ofte i størrelsesintervaller som XS–S, M, L–XL).
    compatible_helmet_size:
      name: Kompatibel hjelmstørrelse
      description: Angiver de hjelmstørrelser ansigtsmasken er kompatibel med.
    compatible_helmet_type:
      name: Kompatibel hjelmtype
      description: Hjelmkategori som nakkestøtten er designet til at fungere med.
    compatible_hitch_receiver_size:
      name: Kompatibel størrelse på anhængertræk-modtager
      description: Den åbning i anhængertrækket, som tilbehøret er designet til at
        passe i (for anhængertræksmonteret stativtilbehør).
    compatible_hook_size:
      name: Kompatibel krogstørrelse
      description: Hæklenålstørrelsessystem(er) og/eller størrelsesinterval, som opbevaringsetuiet
        er designet til at passe til (f.eks. amerikanske bogstav-/nummerstørrelser
        eller metriske mm-intervaller).
    compatible_horse_coat_type:
      name: Kompatibel hestepelstype
      description: Angiver de pelskarakteristika hos heste, som underuldsbørsten er
        bedst egnet til (f.eks. tyk vinterpels eller sensitiv pels).
    compatible_host_platform:
      name: Kompatibel hostet platform
      description: Angiver de værtsplatforme eller enhedstyper, som pad-controlleren
        er kompatibel med (f.eks. Windows, macOS, iOS, Android), eller om den kan
        fungere selvstændigt uden en computer.
    compatible_inflation_gas:
      name: Kompatibel gas til oppustning
      description: Angiver, hvad ballonen skal pustes op med (luft, helium eller begge
        dele).
    compatible_injection_type:
      name: Kompatibel indsprøjtningstype
      description: Angiver, hvilket brændstofindsprøjtningssystem produktet er designet
        til at rengøre.
    compatible_instrument_surface_material:
      name: Kompatible instrumentoverflader/materialer
      description: Angiver de instrumentoverflader/materialer, som poleringsmidlet
        er beregnet til at anvendes på.
    compatible_intercom_system:
      name: Kompatibelt intercom-system
      description: Angiver hjelmens kompatibilitet med eller mulighed for montering
        af et intercom-/kommunikationssystem til hjelm.
    compatible_interior_material:
      name: Kompatibelt indvendigt materiale
      description: Angiver hvilke materialer i bilens interiør pletfjerneren er sikker/effektiv
        til (f.eks. tæppe, stofbetræk, læder eller vinyl).
    compatible_kayak_type:
      name: Kompatibel kayaktype
      description: Viser de generelle kajaktyper, som sejlsættet er designet til montering
        på.
    compatible_license_plate_hole_pattern:
      name: Kompatibelt nummerplade-hulmønster
      description: Angiver den monteringshul-konfiguration, som beslaget/holderen
        understøtter (på køretøjs- og/eller nummerpladesiden).
    compatible_license_plate_size:
      name: Kompatibel nummerpladestørrelse
      description: Angiver de regionale eller dimensionelle registreringsskilstørrelser,
        som beslaget/holderen er designet til at passe til.
    compatible_loom:
      name: Kompatibelt væv
      description: Angiver de vævetyper, som den flade vævehammer er beregnet til
        at blive brugt sammen med.
    compatible_loom_type:
      name: Kompatibel vævstype
      description: Angiver, hvilken væveopsætning hammeren er beregnet til at blive
        brugt sammen med (f.eks. væve med fast skytte ifht. gobelinvæve).
    compatible_machine_type:
      name: Kompatibel maskintype
      description: Angiver, hvilken type quiltningsopsætning rammen er beregnet til
        (kun håndquiltning, almindelig symaskine eller quiltningsmaskine med lang
        arm).
    compatible_mast_type:
      name: Kompatibel mastetype
      description: 'Angiver hvilke mastediametre sejlet er designet til: reduceret
        diameter (RDM), standarddiameter (SDM) eller begge dele.'
    compatible_model_system_train_scale:
      name: Kompatibelt modelsystem (togskala)
      description: Angiver modeltogets størrelsesorden/system, som tilbehøret passer
        til, når det er relevant (f.eks. HO, N eller O).
    compatible_mounting_surface:
      name: Kompatibel monteringsoverflade
      description: Den tilsigtede overflade eller genstand, som klemmen er designet
        til at blive fastgjort på.
    compatible_mouthpiece_patch:
      name: Kompatibelt mundstykkeplaster
      description: Angiver, om mundstykket er beregnet til brug med mundstykke-puder/plaster,
        samt plastrenes anbefalede tykkelsesområde.
    compatible_mouthpiece_type:
      name: Kompatibel mundstykketype
      description: Angiver den type mundstykke/skaft, mellofonen er designet til at
        bruge (typisk horn- eller trompet-type, afhængigt af model).
    compatible_neck_profile_width:
      name: Kompatibel halsprofil/bredde
      description: Angiver den profil-/breddeklasse for guitarhalsen, som kapodasteren
        er designet til at passe til (f.eks. smal elektrisk ifht. bred klassisk).
    compatible_needle_size:
      name: Kompatibel nålestørrelse
      description: Angiver den nålestørrelse/typer, som æsken er beregnet til at passe
        til (f.eks. broderi, gobelin eller håndsyningsnålelængder).
    compatible_needle_system:
      name: Kompatibelt nålesystem
      description: Nålesystemer, som maskinen er kompatibel med (f.eks. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibel parkeringsbremsemekanisme
      description: Angiver, om bremsekaliperen er designet til at fungere med en integreret
        håndbremsemekanisme.
    compatible_pedal_instrument_type:
      name: Kompatibel pedalinstrumenttype
      description: Angiver hvad pedalen er beregnet til at blive brugt med (f.eks.
        digitalt klaver, keyboard/synthesizer eller MIDI-controller).
    compatible_pedal_type:
      name: Kompatibel pedaltype
      description: Angiver den pedalkategori eller -system remmen eller klipsen er
        designet til at passe til (f.eks. platform, SPD eller Look Keo).
    compatible_pin_type:
      name: Kompatibel nåletype
      description: Hvilken type stifter måtten er beregnet til at blive brugt sammen
        med (eller om den kan fastgøres med stifter).
    compatible_pipe_filter_size:
      name: Kompatibel rørfilterstørrelse
      description: Angiver den filterstørrelse eller -type piben er designet til at
        anvende (eller om der ikke kræves filter).
    compatible_plate_size:
      name: Kompatibel pladestørrelse
      description: Målene på skudsikre plader eller de standardstørrelser, som vesten
        kan rumme.
    compatible_play_vehicle_scale:
      name: Kompatibel skala for legekøretøj
      description: Angiver den legetøjsskala, tilbehøret er designet til at passe
        til (f.eks. 1:64), hvilket sikrer korrekt pasform og kompatibilitet for samlere
        og banesystemer.
    compatible_playing_surface:
      name: Kompatibel spilleoverflade
      description: Angiver den type spillefelt eller underlag amerikanske fodboldsko
        er designet til.
    compatible_pole_dimensions:
      name: Kompatible stangdimensioner
      description: Angiver, hvilket stangtværsnit tilbehøret passer til.
    compatible_pole_shape:
      name: Kompatibel stangform
      description: Angiver tværsnitsformen på den stang eller søjle, som polstringen
        er designet til at passe til.
    compatible_power_steering_system:
      name: Kompatibelt servostyringssystem
      description: Angiver den type styresystem(er), væsken er beregnet til.
    compatible_powerplant_type:
      name: Kompatibel strømkildetype
      description: Angiver, hvilket fremdrivningssystem på luftgeværet delen er beregnet
        til (f.eks. fjederstempel, CO2 eller PCP).
    compatible_presser_foot:
      name: Kompatibel trykfod
      description: Angiver, hvilket monterings-/kompatibilitetssystem til syfødder
        der understøttes af symaskinen (f.eks. klikfastgørelse eller skruemontering;
        lavt/højt/skråt skaft). Brug "Universal/Multiple", hvis flere systemer understøttes,
        eller hvis adaptere er inkluderet.
    compatible_protective_gear:
      name: Kompatibelt beskyttelsesudstyr
      description: Angiver hvilket andet beskyttelsesudstyr nakkebeskyttelsen er designet
        til at fungere sammen med.
    compatible_protective_gear_integration:
      name: Kompatibel integration med beskyttelsesudstyr
      description: Beskriver, hvordan beskytteren er beregnet til at blive båret eller
        integreret med andet udstyr (f.eks. indsatslomme eller separat remmontering).
    compatible_punching_bag_type:
      name: Kompatibel bokseboldtype
      description: Angiver den typer bokse- eller træningssække produktet er kompatibelt
        med.
    compatible_racing_discipline:
      name: Kompatibel racerkategori
      description: De motorsportsgrene, som hjelmen er beregnet til/godkendt til.
    compatible_rc_scale:
      name: Kompatibel RC-skala
      description: Angiver den RC-skala (f.eks. 1:10), som tilbehøret eller delen
        er designet til at passe til.
    compatible_recorder_size:
      name: Kompatibel fløjtestørrelse
      description: Angiver, hvilke størrelser af optagere etuiet er beregnet til.
    compatible_recorder_type:
      name: Kompatibel fløjtetype
      description: Angiver, hvilken type optager (serie/størrelse) tilbehøret er kompatibelt
        med (f.eks. sopran eller alt).
    compatible_reed_cut:
      name: Kompatibel bladskæring
      description: Angiver, hvilken type rørbladskæring ligaturen er beregnet til
        at passe til (f.eks. filet/fransk skæring ifht. ikke-filet/amerikansk skæring).
    compatible_reed_type:
      name: Kompatibel bladtype
      description: Angiver, hvilken type rørblad mundstykket er beregnet til.
    compatible_reel_type:
      name: Kompatibel hjultype
      description: Angiver den type fiskerihjul tasken, etuiet eller coveret er designet
        til at passe til.
    compatible_refrigerant_type:
      name: Kompatibel kølemiddeltype
      description: Angiver det kølemiddel klimaanlæggets fordamper er beregnet til
        at anvende.
    compatible_ride_equipment:
      name: Kompatibel rideudstyr
      description: Typer af sportsudstyr på hjul, som rampen er beregnet til.
    compatible_roof_height:
      name: Kompatibel taghøjde
      description: Angiver den tagprofil coveret er designet til (standard- eller
        forhøjet tag).
    compatible_roof_rail_type:
      name: Kompatibel tagrælingstype
      description: Angiver den tagkonfiguration basistagbøjlesystemet er designet
        til at blive monteret på.
    compatible_rope_count:
      name: Kompatibelt tovantal
      description: Angiver den tovsammensætning i bokseringen delen er designet til,
        f.eks. 3-tovsring, 4-tovsring eller universal pasform.
    compatible_rope_type:
      name: Kompatibel rebtype
      description: Angiver, hvilke rebkonstruktioner der kan anvendes sammen med enheden.
    compatible_saddle_type:
      name: Kompatibel saddeltype
      description: Angiver den sadeltype eller ridedisciplin, som tilbehøret er designet
        til, hvilket sikrer korrekt kompatibilitet med English- eller Western-sadler
        og andre sadler.
    compatible_saxophone_size:
      name: Kompatibel saxofonstørrelse
      description: Angiver den saxofonstørrelse produktet er kompatibelt med (f.eks.
        sopran, alt eller tenor).
    compatible_saxophone_type:
      name: Kompatibel saxofontype
      description: Angiver den saxofon ligaturen/cappen er designet til at passe til.
    compatible_scale_length:
      name: Kompatibel skalalængde
      description: Angiver det guitarskala-længdeinterval, som strengene er beregnet
        til (f.eks. kort skala, standard eller bariton).
    compatible_seat_airbag:
      name: Kompatibel sædeairbag
      description: Angiver, om sædet er udstyret med sideairbags eller er kompatibelt
        med køretøjer, der er udstyret med airbags monteret i sæderne.
    compatible_seating_capacity:
      name: Kompatibelt antal pladser
      description: Angiver antallet af sæder eller den sædekonfiguration, som tilbehøret
        er designet til at passe til.
    compatible_sensor_port_type:
      name: Kompatibel sensortilslutningstype
      description: Angiver, om olieopsamleren er udstyret med sensorer til måling
        af olieniveau og/eller olietemperatur, samt hvilken type tilslutning der er
        tale om, hvis det er relevant.
    compatible_shifter_type:
      name: Kompatibel skiftetype
      description: Angiver, hvilken gearstangstype eller -konfiguration gearstangsmanchetten
        er beregnet til.
    compatible_shis:
      name: Kompatibel SHIS-standard
      description: Viser en liste over de SHIS-koder (Standardized Headset Identification
        System), som delen passer til (f.eks. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatibel skøjtedisciplin
      description: Angiver den skøjtedisciplin(er) delen eller tilbehøret er designet
        til at passe til.
    compatible_snowshoe_deck_type:
      name: Kompatibel sneskobinding
      description: Angiver den type snesko-ramme eller snesko bindingen er kompatibel
        med.
    compatible_special_effects_lighting_features:
      name: Kompatible specialeffekt-lysfunktioner
      description: Fremhæver almindelige funktionsmuligheder, der påvirker købsbeslutninger
        for effektbelysning (udover farve/mønster), såsom sammenkobling af enheder
        eller lydstyring.
    compatible_spinning_wheel_drive_system:
      name: Kompatibelt drivsystem til spinderok
      description: Angiver, hvilke drevsystemer til spindehjul tilbehøret understøtter.
    compatible_spoke_gauge:
      name: Kompatibel egermåler
      description: Angiver de egertrådsstørrelser, som nipelgevindet passer til, så
        købere kan vælge de rigtige eger og nipler.
    compatible_steering_wheel_airbag:
      name: Kompatibel airbag i rattet
      description: Angiver om rattet understøtter brug af en OEM-airbagmodul (eller
        er beregnet til anvendelser uden airbag).
    compatible_steering_wheel_control_button:
      name: Kompatibel ratbetjeningsknap
      description: Angiver kompatibilitet med fabriksmonterede betjeningsknapper på
        rattet (lyd/fartpilot/telefon) og tilhørende ledningsføring.
    compatible_stencil_material:
      name: Kompatibelt skalbelonsmateriale
      description: Materialer, som maskinen kan fremstille stencils af eller bearbejde
        (f.eks. papir, plastfolie eller mylar).
    compatible_stencil_media_format:
      name: Kompatibelt stencilmedieformat
      description: 'Angiver de formater af stencilmateriale, maskinen understøtter:
        ark, ruller eller begge dele.'
    compatible_strap_retractor:
      name: Kompatibel remoptrækker
      description: Angiver om remmen er kompatibel med oprulningssystemer eller er
        designet til ikke-oprullelige (statiske) remme.
    compatible_string_instrument_finish:
      name: Kompatibel finish til strengeinstrumenter
      description: Angiver de typer instrumentfinish polishen er sikker at anvende
        på.
    compatible_substrate_material:
      name: Kompatibelt substratmateriale
      description: De overfladematerialer, som malingen er formuleret til at hæfte
        på.
    compatible_surface:
      name: Kompatibel overflade
      description: Angiver den overflade eller det materiale burrebåndets klæbemiddel
        er beregnet til at binde til.
    compatible_surface_material:
      name: Kompatibelt overflademateriale
      description: Køretøjets overfladematerialer, som produktet er beregnet til at
        anvendes på.
    compatible_tear_off_system:
      name: Kompatibelt afrivningssystem
      description: Angiver, om brillerne er kompatible med aftagelige folier og/eller
        rullefolier, herunder om de har monteringsstifter til aftagelige folier.
    compatible_thermostat_type:
      name: Kompatibel termostattype
      description: Angiver om vandstudsen/-huset er designet til at kunne anvende
        en termostat, og i givet fald hvilken type/størrelse.
    compatible_thread:
      name: Kompatibel tråd
      description: Angiver, hvilke typer tråd/garn trådtrækkeren er beregnet til (efter
        tykkelse/type).
    compatible_thread_spool_format:
      name: Kompatibelt tråd-/spoleformat
      description: Angiver, hvilke trådformater kassen er beregnet til at opbevare
        (spoler, undertrådsspoler, floss-spoler/kort, kegler osv.).
    compatible_thread_yarn_tool:
      name: Kompatibelt tråd- og garnværktøj
      description: Maskin-/systemkompatibilitet for værktøj, der monteres på eller
        anvendes sammen med andet udstyr (f.eks. symaskine, overlockmaskine, væv eller
        spinderok).
    compatible_tire_application:
      name: Kompatibel dækanvendelse
      description: Angiver den dæk-/hjulapplikationskategori, som dækafpresser-værktøjet
        er designet til (baseret på det dæk/hjul, der serviceres, ikke køretøjsmodellen).
    compatible_tom_pad_mounting:
      name: Kompatibel montering af trommepude
      description: Angiver hvad den elektroniske tom-tom monteres på (f.eks. klemme-/stangmontering,
        L-stang eller stativmontering), hvilket afgør om den passer til eksisterende
        stativsystemer.
    compatible_toy_vehicle_scale:
      name: Kompatibel skala for legekøretøj
      description: Angiver legetøjskøretøjets skala eller omtrentlige køretøjsstørrelse,
        som legesættet er kompatibelt med.
    compatible_tpms_sensor_type:
      name: Kompatibel TPMS-sensortype
      description: Angiver om fælgen understøtter TPMS-sensorer og/eller hvilken ventil-/sensortype
        der kræves.
    compatible_training_equipment:
      name: Kompatibelt træningsudstyr
      description: Viser en liste over de typer trænings- eller fitnessudstyr, der
        kan fastgøres til holderen.
    compatible_treadmill_design:
      name: Kompatibelt løbebåndsdesign
      description: Angiver det løbebåndsdesign, som tilbehøret er kompatibelt med,
        f.eks. foldbare eller ikke-foldbare modeller.
    compatible_tube:
      name: Kompatibel slange
      description: Angiver den slange- eller dækkonstruktion, som mærkaten er designet
        til, f.eks. butyl, latex, TPU eller uden slange.
    compatible_valve_type:
      name: Kompatibel ventiltype
      description: Angiver den type messingventil smøremidlet er kompatibelt med.
    compatible_vaporizing_material:
      name: Kompatibelt fordampningsmateriale
      description: Angiver de materialetyper, enheden er designet til at fordampe.
    compatible_vehicle_windshield_fluid:
      name: Kompatibel sprinklervæske til køretøjer
      description: Kompatibilitetsangivelser relateret til køretøjsudstyr eller glasbehandlinger
        (f.eks. egnet til regnafvisende belægninger, egnet til forlygtesprinklere).
    compatible_visor_system:
      name: Kompatibelt visirsystem
      description: Angiver de visir-/indsats-systemtyper, motorcykelhjelmen er kompatibel
        med.
    compatible_water_board_type:
      name: Kompatibel vandbrætstype
      description: De vandsportsbrætter stativet er beregnet til at transportere.
    compatible_water_sport_board_type:
      name: Kompatibel type vandsportsbræt
      description: Viser en liste over de typer brætter, som stativet er designet
        til at transportere.
    compatible_watercraft_communication_standard:
      name: Kompatibel kommunikationsstandard for vandfartøjer
      description: Angiver understøttede marine kommunikations-/netværksstandarder
        eller integrationsprotokoller til samspil med skibets elektroniske systemer.
    compatible_watercraft_engine_type:
      name: Kompatibel vandfartøjsmotortype
      description: Angiver den drivlinjekonfiguration delen er beregnet til (påhængsmotor,
        indenbordsmotor, sterndrive eller jetdrift).
    compatible_weight_plate_diameter:
      name: Kompatibel vægtskivediameter
      description: Angiver, hvilke vægtpladediametre maskinen accepterer.
    compatible_wheel_finish:
      name: Kompatibel fælgfinish
      description: Angiver de fælgfinisher/-materialer rengøringsmidlet er sikkert
        at anvende på (ifølge producentens anvisninger).
    compatible_whorl_drive_band_type:
      name: Kompatibel drivremtype til spindehjul
      description: Angiver, hvilken type drivrem hjulet er beregnet til at fungere
        sammen med.
    compatible_wick_series:
      name: Kompatibel vægeserie
      description: Angiver de almindelige vægeserier/-typer, som vægen er beregnet
        til (branchestandardbetegnelse), hvis dette er angivet af sælgeren.
    compatible_winder_head_bit:
      name: Kompatibel type opviklingshoved/bit
      description: Angiver den type tuner-/stemmeskruehoved eller -kontaktflade, som
        omdrejningshåndtaget understøtter (f.eks. slidsede hoveder, udskiftelige adaptere
        eller universalhoved).
    compatible_windlass_rode:
      name: Kompatibel ankerspil-ankerlænke
      description: Angiver den type ankerlænke ankerspillet er designet til at håndtere.
    compatible_windshield_type:
      name: Kompatibel forrudetype
      description: Angiver, hvilken forrudeopsætning kabinettet er designet til at
        fungere sammen med.
    compatible_wood:
      name: Kompatibelt træ
      description: Angiver de typer gribebrætstræ polishen er anbefalet eller sikker
        at anvende på.
    compatible_writing_surface:
      name: Kompatibel skriveoverflade
      description: Angiver de overflader/papirtyper, som blækket er beregnet til at
        fungere bedst på.
    compatible_zipper_size:
      name: Kompatibel lynlåsstørrelse
      description: 'Angiver den lynlåsstørrelse, som trækket er beregnet til (ofte
        angivet som #3, #5, #8 eller #10), hvilket forbedrer filtreringen efter kompatibilitet.'
    compliance_certification:
      name: Overholdelsescertificeringer
      description: Overensstemmelses- og godkendelsesstandarder, som lygtebaren opfylder
        for vejbrug og elektromagnetisk kompatibilitet.
    component_position:
      name: Komponentplacering
      description: Angiver delens relative placering i motorens timing-system (f.eks.
        forreste eller bageste dæksel eller øvre eller nedre placering). Ikke køretøjets
        for- eller bagplacering.
    concentration_level:
      name: Koncentrationsniveau
      description: Kvalitativ angivelse af, hvor koncentreret tomatpuréen er (enkelt-,
        dobbelt- eller tripelkoncentreret), nyttig til at matche opskriftskrav.
    concentration_type:
      name: Koncentrationstype
      description: Angiver om produktet er klar til brug eller koncentrat, og (hvis
        det er koncentrat) typiske retningslinjer for fortynding.
    concert_bass_drum_mounting_stand_type:
      name: Type stativ til montering af koncertbasstromme
      description: Hvordan koncertbasstrommen understøttes eller monteres ved brug.
    concert_pitch_standard:
      name: Standard for koncerttonehøjde
      description: Angiver den koncerttonereference (A4), som klaveret er stemt efter
        ved salgstidspunktet (f.eks. A440, A442 eller A444).
    condiment_form:
      name: Krydderiform
      description: Angiver peberrodsproduktets fysiske form eller konsistens (f.eks.
        pasta, pulver, fløde).
    condiment_texture:
      name: Krydderiets tekstur
      description: Beskriver den fysiske konsistens af relishen eller chutneyen (f.eks.
        grov, glat).
    confetti_format:
      name: Konfetti-format
      description: Angiver konfettiproduktets format ud fra, hvordan konfettien er
        pakket eller affyres (f.eks. løs konfetti ifht. konfettikanoner).
    conga_head_tensioning_system:
      name: System til spænding af conga-skind
      description: Den type beslag, der bruges til at spænde/stemme conga-skindet
        (f.eks. traditionel stemning med lugs ifht. moderne hurtigstemningsmekanismer).
    conga_set_included_drum_types:
      name: Conga-sættets inkluderede trommetyper
      description: De conga-typer der indgår i et congasæt (f.eks. quinto + conga
        + tumba).
    connector_case_style:
      name: Stikhusets type
      description: Klassificerer den overordnede konstruktionsstil for konnektor-etui
        (f.eks. hård skal eller blød pose) for at afspejle beskyttelsesniveau og bærbarhed.
    console_cover_installation_method:
      name: Installationsmetode for konsolcover
      description: Angiver, hvordan konsolafdækningen fastgøres til konsollen/armlænet
        (f.eks. ved at trække den over, med elastikker, velcro, klæbemiddel eller
        klips).
    console_display_type:
      name: Konsolskærmtype
      description: Angiver den type brugerdisplay maskinen er udstyret med (f.eks.
        LCD, LED eller touchskærm).
    construction_design:
      name: Konstruktionsdesign
      description: Angiver, hvor mange dele puden består af, hvilket har betydning
        for bevægeligheden (f.eks. 1 ifht. 3 dele).
    contact_angle:
      name: Kontaktvinkel
      description: Angiver kontaktvinklen for lejebanerne, udtrykt som en enkelt vinkel
        eller et vinkelpar (f.eks. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Type fyld i kontaktjongleringskugle
      description: Identificerer om bolden er solid eller fyldt (og hvilken slags
        fyld, hvis den er fyldt), hvilket påvirker vægtfordeling og holdbarhed.
    contact_juggling_ball_transparency:
      name: Gennemsigtighed for kontaktjongleringskugle
      description: Angiver kuglens gennemsigtighed/optiske udseende.
    contact_surface_material:
      name: Kontaktoverflademateriale
      description: Angiver, hvilket materiale der er anvendt på de steder, hvor instrumentet
        kommer i berøring med huden (f.eks. kork/gummi), for at forhindre ridser og
        forbedre grebet.
    container_material:
      name: Beholdermateriale
      description: Angiver det primære materiale i produktets butiksemballage (f.eks.
        glas, PET-plast eller aluminium).
    contaminant_removal:
      name: Fjernelse af forurenende stoffer
      description: Viser en liste over de typer forurenende stoffer, som produktet
        er certificeret til at fjerne eller reducere.
    contra_alto_clarinet_body_configuration:
      name: Konstruktion/udformning af kontra-altsaxofonens korpus
      description: Beskriver den fysiske konstruktionsform for kontra-altsaxofonen
        (f.eks. lige eller sammenfoldet design).
    contra_alto_clarinet_lowest_note_extension:
      name: Laveste toneudvidelse for kontra-altsaxofon
      description: Angiver instrumentets laveste spilbare tone (den laveste tone,
        som klaviaturet tillader), hvilket ofte bruges til at skelne mellem modeller
        med lavt E♭, lavt D og lavt C.
    contra_bass_clarinet_bell_type:
      name: Type klokke på kontrabasklarinet
      description: Hornkonfigurationen, der anvendes på kontrabasklarinetten.
    contra_bass_clarinet_bore_type:
      name: Type boring på kontrabasklarinet
      description: Instrumentets boringsdesign.
    contra_bass_clarinet_lowest_written_note:
      name: Kontrabasklarinets laveste skrevne tone
      description: Den laveste tone, instrumentet kan spille (afhænger ofte af, om
        det kan spille lavt C eller lavt Eb).
    control_arm_bushing_material:
      name: Bøsningsmateriale til styrearm
      description: Angiver materialet for de medfølgende/installerede bøsninger, hvis
        de findes.
    control_arm_bushings_included:
      name: Bøsninger til styrearm, der medfølger
      description: Angiver, om styrearmen leveres med monterede bøsninger.
    control_arm_finish:
      name: Overfladebehandling af styrearm
      description: Angiver den beskyttende finish på kontrolarmen (korrosionsbeskyttelse
        og udseende).
    control_arm_grease_fitting_type:
      name: Type smørenippel til styrearm
      description: Angiver, om kontrolarmen/kugleleddet inkluderer en smørenippel
        (zerk), og om den kan repareres.
    control_arm_material:
      name: Materiale til styrearmen
      description: Angiver styrearmskroppens primære materiale og fremstillingskonstruktion.
    control_arm_position:
      name: Styrearmens position
      description: Angiver den ophængsposition, som styrearmen er konstrueret til
        i forhold til akselens hjørne/side (f.eks. øverst/nederst, foran/bagved eller
        venstre/højre).
    control_arm_style:
      name: Styrearmens stil
      description: Identificerer den geometriske/designmæssige stil på den styrearm,
        der anvendes i ophængets layout.
    control_cable_connector_type:
      name: Type af stik til styrekabel
      description: Angiver den type stik/tilslutning, der anvendes på styrekablerne
        til forbindelse mellem styresystemet og motoren (f.eks. OEM-specifikke stik).
    control_voltage_or_gate_connectivity:
      name: Styrespænding eller gate-tilslutning
      description: Angiver understøttelsen af styrespænding/gate-forbindelse til integration
        med modulært/analogt udstyr.
    controller_function:
      name: Controllerfunction
      description: Beskriver løbebånds-styrekortets primære funktioner, såsom motorstyring,
        strømforsyning eller frekvensomformer.
    controller_type:
      name: Controllertype
      description: Beskriver motorstyringen/styresystemet, der følger med konverteringssættet
        til el-løbehjul (eller som er nødvendigt for at kunne bruge det), med fokus
        på styringens egenskaber, der er relevante for kompatibilitet og ydeevne.
    conversion_kit_cooling_method:
      name: Kølemetode til ombygningssæt
      description: Den primære metode til termisk styring, der anvendes i forbindelse
        med integrationen af motor, omformer og batteri.
    conversion_kit_installation_complexity:
      name: Monteringssværhedsgraden for ombygningssættet
      description: Forventet omfang af installationsarbejdet baseret på typiske kundekompetencer
        og nødvendigt værktøj.
    converted_bed_size:
      name: Ombygget sengs størrelse
      description: Angiver den sengestørrelse eller -konfiguration, som barnesengen
        kan omdannes til, når dette sæt monteres.
    convertible_configuration:
      name: Konvertibel konfiguration
      description: Angiver, hvor mange forskellige sengekonfigurationer produktet
        kan konverteres til (f.eks. 3-i-1-tremmeseng → småbørnsseng → daybed).
    convertible_high_chair_modes:
      name: Konvertible højstolstilstande
      description: Angiver de sædekonfigurationer, som stolen kan konverteres til.
    cookie_decorating_kit_items_included:
      name: Indhold i sæt til småkagepynt
      description: Viser de enkelte pynteartikler, der følger med, så kunderne ved
        præcis, hvad der er i æsken (f.eks. sprøjteposer, krymmel eller kageknive).
    cookie_variety:
      name: Småkagevarianter
      description: Identificerer den specifikke stil eller variant af småkager, hvilket
        hjælper kunder med hurtigt at finde deres foretrukne type.
    cooking_state:
      name: Tilberedningstilstand
      description: Angiver kyllingeproduktets klarhedsniveau ved salg (rå, fuldt tilberedt,
        marineret osv.).
    coolant_additive_purpose:
      name: Formålet med kølemiddeadditivet
      description: Kølevæskeadditivets primære anvendelsesformål (gælder ikke produkter
        til rensning af køler eller specielle tætningsmidler).
    coolant_base_fluid:
      name: Kølemiddelbaseret væske
      description: Identificerer den primære glykolbase, der anvendes i frostvæske-/kølemiddelformlen.
    coolant_outlet_connection_style:
      name: Kølemiddeludløbets tilslutningstype
      description: Udløbsforbindelsesgrænsefladen, der bruges til at fastgøre en radiatorslange
        eller kølevæskeledning.
    coolant_outlet_neck_angle:
      name: Vinkel på kølemidlets udløbsrør
      description: Vinklen/retningen på vandudløbet i forhold til monteringsflangen/motoren
        (nyttigt ved føring af den øverste kølerslange).
    coolant_technology:
      name: Kølemiddelteknologi
      description: Angiver den kemiske sammensætning eller teknologiske kategori,
        som frostvæsken/kølemidlet er baseret på (som det normalt fremgår af emballagen).
    coolant_temperature_sensor_port:
      name: Kølevæsketemperatursensorport
      description: Om vandrøret har en port til en kølemiddeltemperaturføler eller
        -kontakt, og hvilken tilslutning der anvendes.
    coolant_temperature_sensor_seal_type:
      name: Kølevæsketemperaturfølerens tætningstype
      description: Type tætningsmetode, der anvendes mellem sensoren og motoren/kølevandskredsløbet.
    cooling_system_component_included:
      name: Kølemiddelkomponent, der er inkluderet
      description: Viser en liste over yderligere kølesystemkomponenter, der følger
        med vandpumpen.
    cooling_system_flush_application_step:
      name: Trin til gennemskylning af kølesystemet
      description: Angiver, hvor produktet indgår i behandlingsprocessen (f.eks. forvaskemiddel
        kontra slutskyl/neutralisator).
    cooling_system_type:
      name: Kølesystemtype
      description: Angiver den konfiguration af kølesystemet, der anvendes i en indbygget
        bådmotor (f.eks. havvand/åbent kredsløb, lukket kredsløb/ferskvand med varmeveksler
        eller afkøling via kølen).
    cord_material:
      name: Ledningsmateriale
      description: Angiver, hvilket materiale den snor/tråd, der bruges til at trække
        puden igennem saxofonen, er lavet af.
    core_type_bass_strings:
      name: Kernetype (basstrenge)
      description: Angiver strengens kerneform, som har indflydelse på spillefornemmelsen
        og fleksibiliteten.
    cork_grease_base_material:
      name: Korkfedtets grundmateriale
      description: Korkfedtformlens primære base (f.eks. lanolinbaseret).
    cork_grease_form:
      name: Korkfedtform
      description: Korkfedtproduktets fysiske formfaktor.
    corn_presentation:
      name: Præsentation af majs
      description: Angiver majsproduktets fysiske præsentation eller form (f.eks.
        hel i skaller, kerner eller pulver).
    corn_syrup_variety:
      name: Variant af majssirup
      description: Angiver siruppens specifikke type eller fremstillingsvariant.
    corn_variety:
      name: Majsvariant
      description: Identificerer den specifikke botaniske eller markerede majssort,
        der sælges, hvilket gør det muligt for kunden at skelne mellem typer, der
        adskiller sig med hensyn til smag, tekstur, farve og kulinarisk anvendelse.
    corner_compatibility:
      name: Hjørnekompatibilitet
      description: Angiver de former (firkantede eller runde), som dækslet er designet
        til.
    corner_flag_features:
      name: Hjørneflagets egenskaber
      description: Fremhæver særlige funktionelle egenskaber eller forbedringer ved
        hjørneflagget (f.eks. sammenklappelig stang eller reflekterende materiale).
    cornet_mouthpiece_shank_type:
      name: Type af mundstykke til kornet
      description: Angiver, hvilken standard for mundstykkeholder/skaft der understøttes
        af kornetten af hensyn til kompatibiliteten.
    cornhole_league_certification:
      name: Certificering af cornhole-liga
      description: Angiver officielle certificeringer eller ligagodkendelse, som produktet
        opfylder.
    corrosion_resistance:
      name: Rustbestandighed
      description: Angiver korrosionsbeskyttelsesbehandlingen eller klassificeringen
        af beslaget/holderen til udendørs brug.
    corrosion_resistance_level:
      name: Rustbestandighedsniveau
      description: Angiver korrosionsbeskyttelse, der er egnet til ferskvands-/saltvandsmiljøer.
    costume_components_included:
      name: Kostumekomponenter, der er inkluderet
      description: En liste over beklædningsgenstande og tilbehør, der følger med
        kostumet, og præciserer, hvad der er en del af sættet.
    cotton_weave_type:
      name: Bomuldsvævningstype
      description: Beskriver den vævede/strikkede konstruktion af den printbare bomuldsoverflade,
        der påvirker tekstur og printskarphed.
    counter_type:
      name: Tællertype
      description: Angiver, om der er indbygget gentagelse eller tvungen sporing,
        samt hvilken type der er tale om.
    counterweight_fill_material:
      name: Modvægtens fyldmateriale
      description: Angiver det materiale, der kan bruges til at fylde ballast i eller
        fylde modvægten på forhånd.
    counterweight_type:
      name: Modvægtstype
      description: Angiver modvægtenes udformning eller konstruktionsform, f.eks.
        sandsæk eller stålplade, for at gøre kompatibilitet og montering nemmere.
    coupler_system:
      name: Koblingssystem
      description: Koblingstype/system, der er monteret på modeltoget for at sikre
        kompatibilitet med rullende materiel.
    court_surface_suitability:
      name: Banebelægningens egnethed
      description: Angiver den basketballbaneoverflade, som skoens ydersål er designet
        til, hvilket hjælper kunder med at vælge det rigtige greb og holdbarheden
        til indendørs træbaner, udendørs asfalt/beton eller begge dele.
    cover_fit_style:
      name: Dækpassetype
      description: Beskriver, hvordan betrækket sidder over bordet, hvilket påvirker
        udseendet og beskyttelsesniveauet.
    cover_fit_type:
      name: Type af overdækning
      description: Angiver, om overdækningen er skræddersyet (specialfremstillet/delvist
        specialfremstillet) eller universel, og om den er beregnet til fortøjning
        i vandet eller opbevaring/trailerbrug.
    cowbell_beater_type:
      name: Type slagtøj til koklokke
      description: Anbefalet type slagtøj til at frembringe lyden/afslutningen på
        koklokken (hvis dette er angivet i produktbeskrivelsen).
    cowbell_mounting_method:
      name: Monteringsmetode for koklokke
      description: Hvordan koklokken er beregnet til at blive monteret/brugt (håndholdt
        ifht. monteret på udstyr).
    cowbell_sound_character:
      name: Koklokkes lydegenskaber
      description: Den generelle klangform, der anvendes i oversigterne (gør det muligt
        at finde frem til oplysninger ud over størrelsen).
    cradle_capacity:
      name: Vuggekapacitet
      description: Angiver om vuggen er designet til at rumme et enkelt spædbarn eller
        tvillinger.
    craft_cutter_embosser_machine_operation:
      name: Betjening af en håndværksskærer/prægemaskine
      description: Angiver, hvordan skære-/prægemaskinen fungerer set ud fra brugerens
        arbejdsgang (f.eks. manuelt håndsving, elektrisk trykknap eller styring via
        en app).
    craft_decoration_maker_accessories_included:
      name: Tilbehør til håndlavet dekoration, der medfølger
      description: Her er en oversigt over det vigtigste tilbehør, der følger med
        dekorationsmaskinen (f.eks. startbånd/-film, ekstra klistermærker, glitterpatroner
        eller rengøringsværktøj).
    craft_foil_application_method:
      name: Metode til påføring af håndværksfolien
      description: Angiver, hvordan håndværksfolien skal påføres/aktiveres (klæbemiddel,
        varme, toner/reaktivt materiale osv.).
    craft_foil_format:
      name: Håndværksfoliens format
      description: Angiver det fysiske format, som håndværksfolien sælges i (f.eks.
        rulle eller ark).
    craft_glue_finish:
      name: Håndværkslimens finish
      description: Beskriver limens udseende efter tørring (f.eks. klar, hvid/uigennemsigtig,
        gennemskinnelig eller blank/mat).
    craft_magnet_application:
      name: Påføringaf håndværksmagnet
      description: Magnetproduktets primære anvendelsesformål eller monteringsflade.
    craft_magnet_holding_strength_level:
      name: Håndværksmagnetens holdekraft
      description: Kategori for håndværksmagneters relative styrke, så kunderne nemmere
        kan vælge den rette holdekraft til deres projekt.
    craft_organizer_storage_features:
      name: Opbevaringsløsninger til håndværksartikler
      description: Beskriver organiseringsfunktioner og indvendige opbevaringselementer
        i håndværksopbevaringssystemer (f.eks. justerbare skillevægge, skuffer og
        gennemsigtige lommer).
    craft_scoring_board_included_accessories:
      name: Håndværkspointtavlens inkluderede tilbehør
      description: Tilbehør, der følger med pointtavlen (f.eks. pointpen/foldestok,
        trekant og konvolutværktøj).
    craft_scoring_board_measurement_system:
      name: Håndværkspointtavlens målesystem
      description: Angiver det målesystem, der er angivet på resultattavlen (britisk,
        metrisk, begge eller ingen angivelse).
    craft_wire_finish_coating:
      name: Håndværksståltrådens overfladebehandling/belægning
      description: Angiver den overfladebehandling eller belægning, der er påført
        tråden for at give farve, modstandsdygtighed over for forringelse eller beskyttelse.
    craft_wood_surface_preparation:
      name: Forberedelse af håndværkstræets overflade
      description: Angiver, om træoverfladen er klar til efterbehandling/maling eller
        kræver forberedelse (f.eks. slibning/grunding).
    crank_spindle_interface:
      name: Krumtapspindlens kontaktflade
      description: Angiver, hvilket krumtapspindel-system det nederste beslag understøtter
        (f.eks. SRAM DUB eller Square Taper), hvilket sikrer kompatibilitet mellem
        krumtapsættet og det nederste beslag.
    crankshaft_balance_type:
      name: Krumtapakslens afbalanceringstype
      description: Angiver, om krumtapakslen er indvendigt afbalanceret (neutral)
        eller udvendigt afbalanceret (kræver harmonisk afbalanceringsvægt/svinghjulsvægte).
    crankshaft_bolt_pattern:
      name: Krumtapakslens boltmønster
      description: Boltmønster på bagflangen til montering af svinghjul/flexplade.
    crankshaft_sensor_reluctor_type:
      name: Krumtapsensorens tandkranstype
      description: Konfiguration af krumtapssensorens udløser-/tandkransskive (hvis
        det er relevant).
    craps_accessories_included:
      name: Crapstilbehør medfølger
      description: Angiver yderligere terningspil-specifikt tilbehør, der medfølger
        ud over terninger, jetoner og layout.
    crash_cymbal_profile:
      name: Crash-bækkenprofil
      description: Bækkenets generelle krumning/profil (hvor markant krumningen er),
        hvilket påvirker klangfarven og responsen.
    crash_cymbal_sound_character:
      name: Lydkarakter for crash-bækken
      description: De vigtigste beskrivelser af crash-bækkenlydens klangkarakter.
    crash_pad_size_class:
      name: Klatreunderlagets størrelsesklasse
      description: Angiver den generelle størrelseskategori for et klatreunderlag,
        så man hurtigt kan danne sig et indtryk af dækningsarealet uden at kende de
        nøjagtige mål.
    crate_engine_assembly_level:
      name: Motorblokkens monteringsniveau
      description: Hvor komplet motorblokken er ved levering (hvilke vigtige komponenter
        der følger med).
    cream_base_ingredient:
      name: Ingrediens til flødebund
      description: Angiver flødens primære kilde, herunder både mælkeprodukter og
        plantebaserede alternativer.
    cream_cheese_base:
      name: Flødeostbund
      description: Identificerer den primære mejeri- eller plantebaserede kilde, der
        bruges til at fremstille flødeosten, hvilket hjælper kunden med hensyn til
        kost, allergener og smag.
    cream_cheese_form:
      name: Flødeostform
      description: Beskriver flødeostens fysiske form eller konsistens (f.eks. i blok,
        pisket eller dip), hvilket har indflydelse på smørbarheden og den tilsigtede
        anvendelse.
    cream_variety:
      name: Flødevariant
      description: Identificerer den specifikke flødetype baseret på fedtindhold,
        tilberedningsmetoder eller tilsigtet kulinarisk anvendelse (f.eks. halvfløde,
        piskefløde eller madlavningsfløde).
    crib_accessory_features:
      name: Krybbetilbehørets funktioner
      description: Viser funktionelle eller komfortorienterede funktioner, der er
        specifikke for tilbehør til tremmesenge og småbørnssenge, såsom åndbarhed
        eller elastiske kanter.
    crib_bumper_features:
      name: Sengekantens egenskaber
      description: Fremhæver sengerandens særlige egenskaber.
    crib_conversion_kit_components:
      name: Sætkomponenter til krybbekonvertering
      description: Viser de vigtigste dele, der følger med sættet, så kunderne kan
        kontrollere, at de har alt det nødvendige til montering.
    cricket_ball_grade:
      name: Cricketboldens kvalitet
      description: Angiver boldens kvalitetsniveau eller tilsigtede spillestandard.
    cricket_ball_piece_construction:
      name: Cricketbold-delens konstruktion
      description: Angiver antallet af ydre dele eller støbte sektioner, der er anvendt
        til at fremstille boldens skal, hvilket er en vigtig indikator for kvalitet
        og pris.
    cricket_ball_type:
      name: Cricketboldtype
      description: Angiver, hvilken type cricketbold der følger med produktet, eller
        om der ikke medfølger nogen bold.
    cricket_bat_accessory_type:
      name: Type af cricketbattilbehør
      description: Angiver typen af cricketbattilbehør eller vedligeholdelsesartikel,
        så kunderne hurtigt kan filtrere frem til det produkt, de har brug for.
    cricket_bat_size:
      name: Cricketbat-størrelse
      description: Angiver den standardiserede cricketbat-størrelsesklassificering
        (0–6, Harrow, SH eller LH), der typisk vælges ud fra spillerens alder og højde.
    cricket_bat_size_compatibility:
      name: Kompatibilitet med cricketbatstørrelser
      description: Angiver den størrelse, som tilbehøret er designet til at passe
        til, hvilket sikrer korrekt kompatibilitet.
    cricket_helmet_role:
      name: Cricket-hjelmens rolle
      description: Angiver den spillerolle, hjelmen er designet til, såsom batting
        eller wicketkeeping.
    cricket_leg_guard_type:
      name: Cricket-benbeskyttertype
      description: Angiver cricket-benbeskytterens specifikke stil.
    cricket_player_role:
      name: Cricketspillerens rolle
      description: Angiver den primære spillerolle, som skoen er designet til.
    cricket_protection_grade:
      name: Cricketbeskyttelsesklasse
      description: Angiver den beskyttelsesklasse, som cricketudstyrets producenter
        har tildelt.
    cricket_stump_base_type:
      name: Cricketstolpens bundtype
      description: Angiver den grundlæggende udformning eller det materiale, som stolperne
        leveres med, hvilket har betydning for stabiliteten og egnetheden som spilleflade.
    cricket_stump_target_features:
      name: Cricket-stolpernes måleegenskaber
      description: Fremhæver særlige funktionelle egenskaber, der forbedrer produktets
        anvendelighed, synlighed, holdbarhed eller stabilitet.
    cricket_stump_type:
      name: Cricket-stolpetype
      description: Inddeler stolperne efter stil eller konstruktion for at hjælpe
        kunderne med at vælge mellem traditionelle kampstolper, træningsmodeller eller
        moderne modeller med lys.
    cricket_training_focus:
      name: Fokus på crickettræning
      description: Primær cricketfærdighed eller disciplin, som hjælpemidlet er designet
        til at forbedre.
    croquet_set_components_included:
      name: Kroketsætkomponenter medfølger
      description: Viser en oversigt over alle de vigtigste dele, der følger med sættet
        (f.eks. målstænger, pløkker og bæretaske), så kunderne ved præcis, hvad de
        køber.
    cross_country_binding_system:
      name: Langrends-bindingssystem
      description: Angiver den standard for langrendsbindinger, som produktet er boret
        til eller er kompatibelt med.
    cross_stitch_chart_symbol_type:
      name: Symboltype i broderidiagram
      description: Hvordan diagrammet er fremstillet (symboler, farver eller begge
        dele).
    cross_stitch_finishing_type:
      name: Type af broderiefterbehandling
      description: Den ønskede efterbehandling/udstillingsform for det færdigsyede
        projekt.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Fastgørelsesmekanisme til stof i broderirammer
      description: Angiver, hvordan stoffet fastgøres/spændes fast i rammen (f.eks.
        med klips, klemmer eller stifter), hvilket har betydning for brugervenligheden
        og stoffets egnethed.
    cross_stitch_frame_included_components:
      name: Komponenter, der medfølger til korsstingsrammen
      description: Angiver, hvad der følger med i pakken (f.eks. kun rammen eller
        rammen + klemmer + stativ), hvilket mindsker risikoen for uklarheder og returneringer.
    cross_stitch_frame_type:
      name: Type broderiramme
      description: Angiver broderirammens konstruktion/type (hvordan stoffet holdes
        fast), hvilket har betydning for brugervenligheden og projektets kompatibilitet.
    cross_stitch_pattern_technique:
      name: Teknik til broderimønster
      description: Den broderiteknik/-stil, der kræves af diagrammet.
    crossbar_shape_profile:
      name: Tværstangens form/profil
      description: Angiver tværstangens aerodynamik/profilform.
    crossbar_style:
      name: Tværstangsstil
      description: Angiver tværstangens konstruktionstype og skelner mellem stive
        konkurrencestænger og fleksible stænger eller hybrid-træningsstænger.
    crossbow_type:
      name: Armbrøsttype
      description: Angiver armbrøstets grundlæggende design, f.eks. compound-, recurve-
        eller pistolarmbrøst. Byggetypen har indflydelse på ydeevne, størrelse og
        anvendelsesmuligheder, så kunderne filtrerer ofte efter denne faktor.
    crossover_component_type:
      name: Type af crossover-komponent
      description: Angiver den primære komponenttopologi, der anvendes i det passive
        crossover-netværk.
    crossover_configuration:
      name: Konfiguration af crossover
      description: Angiver, om det pågældende crossover anvender et enkelt crossover-punkt
        eller flere punkter (f.eks. 2-vejs- kontra 3-vejs-konstruktioner).
    crossover_type:
      name: Crossover-type
      description: Type crossover-netværk, der er inkluderet i komponentsættet.
    crown_profile:
      name: Skyggeprofil
      description: Angiver højden/profilen på kasketten over skyggen.
    crown_style:
      name: Skyggestil
      description: Definerer den overordnede silhuet eller profil på en bowlerhats
        skygge.
    crust_taste_profile:
      name: Skorpens smagsprofil
      description: Angiver, om skorpen har en sød, salt eller neutral smag.
    crystal_finish:
      name: Krystaloverflade
      description: Beskriver overfladen, belægningen eller bearbejdningstilstanden
        for den løse krystal (f.eks. rå, poleret, tromlet, facetteret, matteret, aurabelagt,
        farvet eller varmebehandlet).
    crystal_material:
      name: Krystalmateriale
      description: Angiver det materiale, der er brugt til urglasset, der beskytter
        urskiven.
    crystalline_finish_style:
      name: Krystallinsk overfladestil
      description: Det karakteristiske krystallinske/fjerlignende udseende, der frembringes
        af palmevoksen i færdige lys.
    cucumber_variety:
      name: Agurkesort
      description: Angiver agurkens sort eller handelsvariant (f.eks. engelsk, persisk
        eller Kirby).
    cue_compatibility:
      name: Køllekompatibilitet
      description: Angiver, hvilken type køspids den pågældende taske er beregnet
        til, f.eks. køer i ét stykke eller køer med 3/4-samling.
    cue_construction:
      name: Køllekonstruktion
      description: Angiver, hvordan køen er konstrueret – antal dele, eller om der
        er tale om en delkomponent, f.eks. kun en ende eller kun et skaft – hvilket
        har betydning for bærbarheden og kompatibiliteten.
    cue_head_material:
      name: Køllehovedmateriale
      description: Angiver, hvilket materiale køhovedet (den del, der kommer berører
        pucken) er lavet af, hvilket har betydning for holdbarheden og overfladebeskyttelsen.
    cue_sport_compatibility:
      name: Kompatibilitet med køsport
      description: Identificerer hvilken køsport tilbehøret er designet til.
    cue_thread_size:
      name: Køtrådstørrelse
      description: Angiver den gevindspecifikation, der anvendes på forlængere, samlingsbeskyttere,
        vægtbolte og andet tilbehør til køer for at sikre korrekt pasform.
    cue_tip_hardness:
      name: Køspidsens hårdhed
      description: Angiver køspidsens stivhed, hvilket har indflydelse på kontrollen
        over den hvide kugle og tilbagemeldingen.
    cuff_height:
      name: Manchethøjde
      description: Angiver manchetten på støvlens højde (lav, middel, høj eller aftagelig/justerbar),
        hvilket har betydning for støtte og fleksibilitet.
    cuff_position:
      name: Manchetposition
      description: Angiver hvor på rytterens krop linemanchetten er designet til at
        blive fastgjort.
    cultivation_method:
      name: Dyrkningsmetode
      description: Beskriver, hvordan grøntsagerne er blevet dyrket, herunder dyrkningsteknikker
        og landbrugsmetoder.
    cup_type:
      name: Koptype
      description: Angiver paillettens overfladeprofil (flad eller konkav) og konkavitetens
        dybde, hvilket kan påvirke glansen, strukturen og hvordan den sidder, når
        den sys eller limes fast.
    cupcake_size:
      name: Cupcake-størrelse
      description: Angiver den fysiske størrelseskategori for de solgte cupcakes (f.eks.
        mini, standard eller jumbo).
    curd_size:
      name: Ostemassestørrelse
      description: Angiver hytteost-klumpernes størrelse eller konsistens.
    cure_method:
      name: Hærdningsmetode
      description: Beskriver den proces, der er nødvendig for, at limen kan hærde
        (f.eks. UV-lys, luftfugtighed eller varme).
    curing_or_preparation_method:
      name: Saltnings- eller tilberedningsmetode
      description: Angiver, hvordan oliven er blevet saltet eller på anden måde tilberedt
        (f.eks. i saltlage, i olie eller grillet).
    curling_broom_head_material:
      name: Materiale til curlingkostens hoved
      description: Angiver den primære materialesammensætning i kostens hoved eller
        puden.
    curling_broom_head_type:
      name: Curlingkostens hovedtype
      description: Angiver børstehovedets/børstepudens udformning eller konstruktion.
    curling_shoe_slider_material:
      name: Materiale til glidesko til curling
      description: Identificerer det primære materiale i den glidesål, der anvendes
        på curlingsko.
    curling_training_aid_type:
      name: Type hjælpemiddel til curlingtræning
      description: Identificerer typen af hjælpemiddel til curlingtræning.
    curry_variety:
      name: Karryvariant
      description: Inddeler karrysauceprodukter efter den specifikke karryvariant
        eller opskrift, de er beregnet til at fremstille, f.eks. Tikka Masala, Massaman
        eller grøn thailandsk karry, så det er muligt at lave nøjagtig filtrering
        efter smag og stil.
    cushion_rubber_profile:
      name: Pudegummiprofil
      description: Form- eller profilkode for gummipuder til skinner.
    cushioning_level:
      name: Støddæmpningsniveau
      description: Angiver, hvor meget polstring sokken har under foden for at beskytte
        mod stød og sikre komfort.
    custom_label_content_type:
      name: Indholdstype for tilpassede etiketter
      description: Angiver, hvilke oplysninger der er tilpasset på den indsyede etiket
        (f.eks. navn, logo, tekst, størrelse, vaskeanvisninger eller kontaktoplysninger).
    customization_type:
      name: Tilpasningstype
      description: Angiver, om trøjen er uden tryk, udleveret til en spiller eller
        specialfremstillet med tilpasset navn og nummer.
    cut_or_preparation_style:
      name: Skæring eller tilberedningsstil
      description: Angiver, hvordan grøntsagsstykkerne skæres eller tilberedes inde
        i dåsen eller glasset (f.eks. hele, i tern eller i skiver).
    cut_resistance_rating:
      name: Skæremodstandsklassificering
      description: Angiver produktets formelt testede skærefasthed.
    cut_type:
      name: Skæretype
      description: Angiver, om stoffet sælges pr. yard/meter, som færdigskåret stykke
        eller som rulle.
    cutting_application:
      name: Skæringsanvendelse
      description: Det primære formål, som saksen er beregnet til.
    cutting_mat_grid_style:
      name: Skæremåttens gitterstil
      description: Det trykte mønster på måttens overflade.
    cutting_mat_intended_use:
      name: Skæremåttens anvendelsesformål
      description: Det primære anvendelsesformål eller den primære arbejdsoverflade,
        som skæremåtten er designet til.
    cv_boot_clamp_type:
      name: Drivakselmanchettens klemmetype
      description: Angiver den klemme-/båndtype, der bruges til at fastgøre drivakselmanchetten.
    cv_boot_kit_contents:
      name: Indhold til drivakselmanchet-sættet
      description: Angiver, hvad der følger med CV-drivakselmanchetten (f.eks. klemmer,
        fedtpakke eller fastholdelsesbånd).
    cv_boot_material:
      name: Drivakselmanchet-materiale
      description: Angiver drivakselmanchettens primære materialekonstruktion.
    cv_boot_position:
      name: Drivakselmanchettens position
      description: Angiver, om drivakselmanchetten passer til den indvendige eller
        udvendige drivakselmanchet-ledsposition på akslen.
    cycling_apparel_fit:
      name: Cykeltøjets pasform
      description: Beskriver tøjets pasform og angiver den tilsigtede stramhed og
        aerodynamik (f.eks. til løb eller fritid).
    cylinder_head_assembly:
      name: Topstykke
      description: Angiver, hvor færdigmonteret topstykket er ved salg (f.eks. fuldt
        monteret med ventilstyringskomponenter monteret eller som et ikke-samlet støbning).
    cylinder_head_material_grade:
      name: Materialekvalitet for topstykke
      description: Topstykkets materialekvalitet
    cylinder_head_position:
      name: Topstykkets position
      description: Identificerer hvilken bank/side eller retning topstykket passer
        til på motorer med flere banker (f.eks. venstre/højre side eller bank 1/bank
        2).
    cymbal_alloy:
      name: Bækkenlegering
      description: Legering/sammensætning til bækkenerne i sættet.
    cymbal_application:
      name: Anvendelse af bækkener
      description: Det primære anvendelsesformål, som bækkenet er udviklet og markedsført
        til.
    cymbal_arm_mounting_interface:
      name: Monteringsoverflade til bækkenarm
      description: Angiver, hvordan bækkenarmen fastgøres til resten af trommeudstyret
        (f.eks. klemme, stativ eller stativholder).
    cymbal_arm_rotation_positioning_features:
      name: Funktioner til rotation og placering af bækkenarmen
      description: Angiver placeringsfunktioner, der bestemmer, hvordan armen kan
        vinkles, drejes og låses.
    cymbal_arm_style:
      name: Bækkenarmstil
      description: Angiver, om en bækkenarm er lige eller svingbar, afhængigt af behovet
        for rækkevidde og placering.
    cymbal_drum_case_wheel_configuration:
      name: Hjulkonfiguration til bækken- og trommekasse
      description: Angiver, om kassen har hjul, og hjulkonfigurationen til transport
        på hjul (hvis det er relevant).
    cymbal_hammering_style:
      name: Bækkenets fremstillingsstil
      description: Fremstillingsproces/-udseende, der påvirker kompleksitet og fornemmelse.
    cymbal_kit_components_included:
      name: Sætkomponenter til bækken medfølger
      description: Angiver, hvilke bækkertyper der indgår i ride-bækkensættet/-pakken
        (ud over selve ride-bækkenet).
    cymbal_kit_items_included:
      name: Artikler til bækkensæt medfølger
      description: Identificerer hvilke bækkener der er inkluderet i sættet/pakken
        (efter bækkentype).
    cymbal_lathing:
      name: Bækkendrejning
      description: Angiver, om og i hvilket omfang bækkenets overflade er rillet i
        forhold til urillet/rå overflade.
    cymbal_playing_style_genre:
      name: Bækkenspillestil/-genre
      description: Angiver den typiske anvendelsessituation, som bækkenerne er designet
        til (f.eks. zills til mavedans ifht. håndbækkener til march- og orkestermusik).
    cymbal_set_configuration:
      name: Bækkensætkonfiguration
      description: Angiver, om produktet sælges som en enkelt bækken, et par eller
        et sæt med flere par (f.eks. til gruppeundervisning).
    cymbal_sound_character:
      name: Bækkens lydegenskaber
      description: Beskriver den overordnede klangprofil/klangfarve for det bækken,
        der bruges i søgningen (f.eks. lys ifht. mørk).
    cymbal_sustain:
      name: Bækkenets klangvarighed
      description: Hvor længe bækkenet giver genlyd efter et slag.
    cymbal_type:
      name: Bækkentype
      description: Angiver den funktionelle rolle, som den elektroniske cymbal-pad
        er beregnet til at efterligne.
    cymbal_volume_level:
      name: Bækkenlydstyrke
      description: Bækkenets opfattede lydstyrke/-kategori.
    cymbal_weight_class:
      name: Bækkenets vægtklasse
      description: Angiver bækkenets vægtklasse, som påvirker tone, lydstyrke og respons.
    dairy_heat_treatment:
      name: Varmebehandling af mejeriprodukter.
      description: Angiver, hvilket forarbejdnings- eller pasteuriseringsniveau fløden
        er behandlet med (f.eks. rå, pasteuriseret eller UHT), hvilket har indflydelse
        på holdbarhed, smag og piskbarhed.
    damage_type:
      name: Skadetype
      description: Angiver de typer af forrudeskader, som sættet er beregnet til at
        reparere.
    damper_pedal_style:
      name: Dæmpers pedalstil
      description: Beskriver den fysiske udformning af dæmperpedalen, der bruges til
        keyboards og digitale klaverer.
    damping_adjustability:
      name: Dæmpningens justerbarhed
      description: Angiver, hvilke parametre for dæmpning og/eller kørehøjde der kan
        indstilles på støddæmperen.
    damping_level:
      name: Dæmpningsniveau
      description: Angiver den relative reduktion i lydstyrke og varighed, som dæmperen
        giver.
    dance_occasion:
      name: Danselejlighed
      description: Angiver, til hvilket formål tøjet er beregnet i forbindelse med
        dansetræning eller optræden.
    darbuka_accessories_included:
      name: Darbuka-tilbehør medfølger
      description: Her er en liste med det almindelige tilbehør, der følger med darbukaen.
    darbuka_body_finish_type:
      name: Darbuka-hoveddelens overfladetype
      description: Beskriver darbuka-hoveddelens udvendige overflade, belægning eller
        dekorative udformning.
    darbuka_head_material:
      name: Darbukaens hovedmateriale
      description: Angiver, hvilket materiale trommeskindets membran på en darbuka
        er lavet af.
    dart_barrel_material:
      name: Dartpilens materiale
      description: Angiver det primære materiale i dartpilen, hvilket har indflydelse
        på vægtfordelingen, holdbarheden og prisen.
    dart_shaft_design:
      name: Dartpilskaftets design
      description: Beskriver skaftets mekaniske udformning, f.eks. om det er fast,
        roterende, teleskopisk eller integreret med vingen, hvilket har indflydelse
        på ydeevne og pris.
    dart_shaft_thread_type:
      name: Dartpilskaftets trådtype
      description: Angiver den gevindstørrelse/-type, der bruges til at skrue skaftet
        fast i dartkpilen, hvilket sikrer, at skafter og dartpile passer sammen.
    dart_thread_size:
      name: Darttrådstørrelse
      description: Angiver den trådstørrelse/standard, som delen er kompatibel med,
        og sikrer pasform mellem skafter, spidser og cylindere.
    dart_tip_compatibility:
      name: Kompatibilitet med dartpilspidser
      description: Angiver, om dartpilen er beregnet til stålspids, blød spids eller
        begge typer.
    dart_tip_connection_type:
      name: Tilkoblingstype til dartpilspids
      description: Beskriver gevindtypen eller fastgørelsessystemet, som spidsen bruger
        til at fastgøre sig til en dartpils hoveddel eller skaft, hvilket sikrer kompatibilitet.
    dartboard_tournament_approval:
      name: Godkendelse af dartskive til turnering
      description: Angiver om dartskiven er officielt godkendt af specifikke dartpilforbund
        eller -ligaer.
    dartboard_type:
      name: Dartskivetype
      description: Inddeler dartskiverne efter konstruktionsteknologi og kompatibilitet
        med forskellige darttyper (f.eks. hår, elektronisk eller magnetisk).
    dash_cover_construction_type:
      name: Konstruktionstype for instrumentbrætdække
      description: Beskriver, hvordan instrumentbrættets beklædning er udformet/konstrueret
        (f.eks. støbt eller syet), hvilket har indflydelse på pasformen og udseendet.
    dash_cover_cutout_configuration:
      name: Konfiguration af udskæring til instrumentbrættets beklædning
      description: Angiver, hvilke OEM-instrumentbrætåbninger/sensorer dækslet er
        udskåret eller formet til.
    dashboard_accessory_position:
      name: Tilbehørs placering på instrumentbrættet
      description: Angiver, hvor på eller omkring instrumentbrættet tilbehøret er
        beregnet til at blive placeret eller monteret.
    date_variety:
      name: Dadelvariant
      description: Angiver dadlernes kultivar/sort (f.eks. Medjool, Deglet Noor eller
        Ajwa). Sorten har stor indflydelse på smag, størrelse og konsistens og fremhæves
        i de fleste produktnavne og -beskrivelser, og fremhævelsen af denne forbedrer
        filtreringen og synligheden.
    dayan_head_material:
      name: Dayan-hovedmateriale
      description: Materiale til spillefladen (pudi), f.eks. naturlæder eller syntetisk
        materiale.
    dayan_strap_material:
      name: Dayan-stropmateriale
      description: Materialet, som de snore (baddhi), der bruges til at snøre dayanen,
        er lavet af.
    dayan_syahi_type:
      name: Dayanens syahi-type
      description: Den type syahi (sort stemmepasta), der anvendes på dayan-hovedet.
    decaffeination_method:
      name: Metode til fjernelse af koffein
      description: Identificerer den proces, der bruges til at fjerne koffein fra
        koffeinfri kaffe.
    decal_installation_method:
      name: Metode til anbringelse af klistermærker
      description: Hvordan klistermærket påføres køretøjets overflade (f.eks. tør
        eller våd påføring). Oplysninger om værktøj/krav (f.eks. overførselstape eller
        varmepistol) bør angives i vejledningen eller i de relevante værktøjsegenskaber,
        hvor det er relevant.
    decal_orientation:
      name: Klistermærkets retning
      description: Uanset om klistermærket er beregnet til montering på indersiden
        af ruden eller på ydersiden.
    decal_placement_type:
      name: Placeringstype for mærkater
      description: Angiver, hvor på køretøjet mærkaten skal anbringes (f.eks. karrosseridel,
        kofanger eller motorhjelm).
    decal_visibility_property:
      name: Mærkatsynlighedens egenskab
      description: Et klistermærkes optiske egenskaber og synlighedsegenskaber, der
        har til formål at forbedre synligheden eller lysreaktionen (f.eks. reflekterende,
        fluorescerende, selvlysende eller gennemsigtige egenskaber).
    deck_concave_level:
      name: Dækets konkavitet
      description: Angiver dækkonkavitetens dybde eller intensitet (f.eks. mild, middel
        eller dyb).
    deck_flex_rating:
      name: Dækfleksibilitetens klassificering
      description: Kvalitativ vurdering af dækkets fleksibilitet/stivhed.
    deck_material:
      name: Brætmateriale
      description: Angiver det primære materiale, som skateboardbrættet er fremstillet
        af.
    decoder_interface_socket_type:
      name: Dekoderens grænseflade/stiktype
      description: Type digital dekodergrænseflade eller konfiguration for indbygget
        dekoder til lokomotivmodellen.
    decoration_technique:
      name: Dekorationsteknik
      description: Identificerer den primære metode, der bruges til at påføre grafik
        eller udsmykninger på T-shirten.
    decorative_stamp_form_factor:
      name: Dekorativt stempels formfaktor
      description: Angiver det fysiske stempelformat, og hvordan et motiv trykkes
        (enkeltfrimærke, sæt, rulle, baggrund osv.).
    decorative_tape_application:
      name: Anvendelse af dekorativt tape
      description: Det primære anvendelsesformål, som det dekorative tape er udviklet
        eller markedsført til.
    decorative_tape_format:
      name: Dekorativ tapes format
      description: Angiver, hvordan det dekorative tape leveres/pakkes til brug.
    decoy_buoyancy:
      name: Lokkemidlets flydeevne
      description: Beskriver, hvordan lokkemidlet opfører sig i vandsøjlen (flyder,
        svæver eller synker).
    decoy_joint_type:
      name: Lokkemidlets samlingstype
      description: Angiver, om lokkemidlet krop er solid eller leddelt, hvilket påvirker
        svømmeegenskaberne.
    decoy_motion_mechanism:
      name: Lokkemidlets bevægelsesmekanisme
      description: Beskriver, hvordan lokkemidlet skaber bevægelse eller forstyrrer
        vandet for at tiltrække vildt (hvis det overhovedet gør dette).
    decoy_posture:
      name: Lokkemidlets positur
      description: Angiver den stilling eller aktivitet, som dyret, der er afbildet
        på lokkemidlet, indtager (f.eks. om det indtager føde, hviler sig eller er
        på vagt).
    decoy_size_class:
      name: Lokkemidlets størrelsesklasse
      description: Kategoriserer lokkemidlets relative skala sammenlignet med det
        virkelige dyr (f.eks. Standard, Magnum eller Oversize).
    decoy_style:
      name: Lokkemidlets stil
      description: Angiver lokkemidlets fysiske formfaktor eller designklasse for
        at hjælpe jægerne med at vælge det rigtige udstyr.
    deli_meat_variety:
      name: Kødvarianter fra delikatesseforretningen
      description: Angiver den specifikke type pålæg (f.eks. salami, bologna, prosciutto
        eller roastbeef).
    delivery_form:
      name: Leveringsformular
      description: Injektorrenserens fysiske leveringsform.
    denim_composition:
      name: Denimstoffets sammensætning
      description: Denimstoffets primære fibersammensætning (grundfibre ekskl. farvestoffer
        og efterbehandlinger).
    denim_finish:
      name: Denimstoffets overfladebehandling
      description: Denimstoffets overflade/overfladebehandling.
    denim_intended_use:
      name: Denimstoffets formål
      description: Typisk projekt/brug, som denimstoffet markedsføres til.
    denim_stretch_type:
      name: Denimstoffets stræktype
      description: Uanset om denimstoffet har mekanisk stræk, er tilsat elastan/spandex
        eller slet ikke er elastisk.
    denim_wash:
      name: Denimvask
      description: Angiver den nuance eller vaskebehandling, der er anvendt på denimstof
        (f.eks. lys, mørk, rå eller syre).
    derailleur_cage_length:
      name: Derailleurs længde
      description: Angiver den længde på en derailleur, der bestemmer kædens kapacitet
        (primært for en derailleur bagpå).
    derailleur_mounting_style:
      name: Derailleurs monteringsstil
      description: Angiver, hvordan en derailleur fastgøres til cykelrammen eller
        hængeren (f.eks. påloddet, med klemme, direkte montering eller UDH).
    derailleur_type:
      name: Derailleur-type
      description: Angiver om produktet er en derailleur foran eller bagpå.
    deshedder_tool_type:
      name: Deshedder-værktøjstype
      description: Klassificerer en deshedders strukturelle stil, så kunden kan vælge
        sin foretrukne plejemetode (f.eks. blad, blok, curry eller handske).
    diabolo_axle_system:
      name: Diabolo-akselsystem
      description: Angiver diaboloens akselsystem/konfiguration, som har indflydelse
        på grinds, stabilitet og slid på snoren.
    diagnostic_functions_supported:
      name: Understøttede diagnosticeringsfunktioner
      description: Angiver de diagnosticerings- og vedligeholdelsesfunktioner, som
        scanneren kan udføre.
    diagnostic_interface_type:
      name: Diagnosticerings-interfacetype
      description: Forbindelse/interface , der bruges til at kommunikere med køretøjet
        eller enheden (f.eks. OBD-II, Bluetooth, Wi-Fi eller USB).
    diamond_color_grade:
      name: Diamantens farveklasse
      description: Angiver diamanters farveklasse, fra D (farveløs) til Z (lys farve),
        eller betegner diamanter med usædvanlige farver.
    diaper_cover_style:
      name: Blebetræksstil
      description: Angiver bleovertrækets design eller dekorative stil for at gøre
        søgning eller filtrering efter stil nemmere.
    diastatic_power_unit:
      name: Diastatisk kraftenhed
      description: Angiver det enhedssystem, der bruges til at rapportere et produkts
        diastatiske effektværdi (f.eks. °Lintner ifht. Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Stemmesystem til diatonisk mundharmonika
      description: Angiver det layout/stemmesystem, der bruges af den diatoniske harmonika.
    dice_sides:
      name: Terningsider
      description: Antal sider (flader) pr. terning for de terninger, der er inkluderet
        i produktet (f.eks. d6 eller d20). Ved blandede sæt skal du bruge den dominerende
        værdi eller angive flere værdier, hvis dette understøttes.
    didgeridoo_construction_type:
      name: Didgeridoo-konstruktionstype
      description: Hvordan didgeridooen er konstrueret eller formet (traditionel eller
        moderne konstruktionsmetode).
    dietary_formulation_claim:
      name: Påstand om kostformulering
      description: Fremhæv vigtige egenskaber ved sammensætningen eller undtagelser,
        der er relevante for hestenæring (f.eks. kornfri, lavt stivelsesindhold eller
        økologisk).
    dinosaur_playset_scale_figure_size_class:
      name: Størrelsesklasse for dinosaur-legesæt/figurer
      description: Angiver den generelle størrelsesforhold for de medfølgende dinosaurer/figurer
        for at sikre, at de passer sammen med andre sæt.
    dinosaur_species_included:
      name: Inkluderede dinosaurarter
      description: Angiver, hvilke dinosaurarter der indgår i legesættet (figurer
        eller støbte dinosaurer).
    dipsy_diver_size_designation:
      name: Dipsy divers størrelsesbetegnelse
      description: Angiver den af producenten fastlagte størrelseskode for fiskedipseyen,
        som svarer til vægten og dykkedybden.
    disc_brake_rotor_mount_type:
      name: Monteringstype for skivebremseskive
      description: Beskriver, hvordan en skivebremseskive monteres på navet (f.eks.
        6-bolte eller med Center Lock).
    disc_lock_accessories_included:
      name: Inkluderet tilbehør til skivelås
      description: Angiver den ekstra vare, der følger med en cykelskivelås, såsom
        et påmindelseskabel, en bæretaske, et monteringsbeslag eller batterier.
    disco_ball_mirror_tile_material:
      name: Materiale for discokuglens spejlfliser
      description: Materialet i de reflekterende felter på diskokuglen (hvis det er
        relevant).
    disco_ball_mirror_tile_size:
      name: Størrelse på diskokugle-designets spejlfelter
      description: Den omtrentlige størrelse på de enkelte spejlfelter/firkanter på
        diskokuglen.
    display_backlight_color:
      name: Farve på displayets baggrundsbelysning
      description: Baggrundsbelysning/belysningsfarve på målerdisplay/-skive.
    disposable_compostable_claim:
      name: Påstand om engangsbrug/komposteringsmulighed
      description: Angiver, om produktet er komposterbart, biologisk nedbrydeligt,
        genanvendeligt eller ingen af delene (hvis det er relevant).
    distillation_method:
      name: Destillationsmetode
      description: Identificerer den destillationsmetode eller destillationstype,
        der anvendes til at producere spiritussen.
    distilled_water_intended_use:
      name: Tilsigtet anvendelse af destilleret vand
      description: Definerer den primære anvendelse af destilleret vand (f.eks. drikkevand,
        CPAP-maskine, luftfugter eller dampstrygejern).
    distress_transmission_frequency:
      name: Frekvens til nødsignal
      description: Primære radiofrekvenser, der anvendes til nødsignaler.
    distressing_level:
      name: Bekymrende niveau
      description: Angiver omfanget af bevidst frembringelse af slitage, rifter eller
        flosser i stoffet.
    distressing_style:
      name: Bekymrende stil
      description: Angiver typen eller graden af slid på jeans, f.eks. revner eller
        slidmærker.
    distributor_advance_mechanism:
      name: Fremføringsmekanisme til fordeler
      description: Angiver, hvilken type mekanisme til indstilling af tændingsforløbet
        fordeleren anvender.
    distributor_cap_terminal_type:
      name: Terminaltype på tændingsdækslet
      description: Angiver udformningen af tændingsdækslets terminaler.
    distributor_gear_material:
      name: Materiale til fordelingsgear
      description: Angiver materialet i fordelerens drivgear.
    distributor_ignition_type:
      name: Fordelerens tændingstype
      description: Angiver, om fordeleren er beregnet til kontakttænding, elektronisk
        tænding eller HEI-systemer.
    distributor_kit_contents:
      name: Distributørsættets ndhold
      description: Angiver, hvilke komponenter der følger med tændingsfordeleren (f.eks.
        tændingsdæksel, rotor, tændingsmodul, pakning/O-ring, drivhjul eller ledninger/stik).
    dive_computer_form_factor:
      name: Dykkercomputerens formfaktor
      description: Angiver dykkercomputerens fysiske design eller monteringsmetode,
        f.eks. konsolmonteret eller urstil.
    diving_mask_design:
      name: Dykkermaskedesign
      description: Bestemmer dykkerbrillernes overordnede konstruktion, hvilket har
        indflydelse på pasform, synsfelt og anvendelsesformål.
    divot_tool_prong_configuration:
      name: Konfiguration af divotværktøjets tænder
      description: Angiver antallet og placeringen af tænderne på divotværktøjet,
        som bruges til at udbedre skader på græstørven.
    divot_tool_style:
      name: Divot-værktøjsstil
      description: Angiver divot-værktøjets overordnede konstruktion eller udformning,
        f.eks. fastmonteret, springkniv/sammenklappelig, multiværktøj eller tilbehør,
        der kan fastgøres til en kasket eller en golfkølle.
    djembe_shell_construction:
      name: Djembe-skalkonstruktion
      description: Beskriver djembe-skallens/-kroppens konstruktionsmetode.
    djembe_tuning_system:
      name: Djembe-stemmesystem
      description: Angiver, hvordan djemben er spændt/stemt.
    dmx_output_connector_type:
      name: Type af DMX-udgangsstik
      description: Det fysiske stikformat, der anvendes til controllerens DMX-udgange.
    doctor_playset_items_included:
      name: Artikler til lægelegesæt medfølger
      description: Angiver de legeredskaber og rollespilstilbehør, der følger med
        lægesættet (f.eks. stetoskop, sprøjte eller reflekshammer).
    doctor_playset_role_play_setting:
      name: Rollespilsmiljø til lægesæt
      description: Angiver den primære rollespilssituation, som lægesættet repræsenterer.
    doctor_playset_wearable_items_included:
      name: Tøjartikler til lægelegesæt medfølger
      description: Angiver, at der medfølger dele til udklædning i legesættet.
    doll_accessory_type:
      name: Dukketilbehørstype
      description: Definerer hvilken slags dukke- eller actionfigurtilbehør produktet
        er (f.eks. tøj, sko, møbler, udstillingsstativer), hvilket gør det muligt
        for kunden at browse og filtrere inden for denne tilbehørskategori.
    doll_eye_type:
      name: Dukkeøjetype
      description: Angiver konstruktionsstilen til dukkens øjne (f.eks. indsat akryl,
        malet eller LED-lys).
    doll_hair_fiber_type:
      name: Dukkehårets fibertype
      description: Hvilken type hår/fiber der er brugt på dukken (eller ingen), hvilket
        har betydning for realismen, styling og pleje.
    doll_making_kit_components_included:
      name: Sætkomponenter til dukkefremstilling medfølger
      description: Viser en oversigt over de vigtigste materialer og redskaber, der
        følger med dukkefremstillingssættet, så kunderne kan sammenligne de forskellige
        pakker og få et overblik over, hvad de selv skal anskaffe.
    dollhouse_installation_placement_type:
      name: Montering/placering af dukkehus
      description: Hvordan dukkehuset er beregnet til at blive brugt eller placeret
        (f.eks. på et bord, på gulvet eller på væggen).
    dollhouse_items_included:
      name: Inkluderet dukkehusudstyr
      description: Identificerer, hvad der følger med i æsken til dukkehuset (møbler,
        dukker og tilbehør).
    dollhouse_lighting_type:
      name: Dukkehusets belysningstype
      description: Hvilken type belysning der er indbygget i eller understøttes af
        dukkehuset.
    dollhouse_room_type:
      name: Dukkehusets værelsestype
      description: Angiver det tilsigtede rum/område i et dukkehus, hvor tilbehøret
        typisk bruges.
    dollhouse_scale:
      name: Dukkehusskala
      description: Målestok for et dukkehus eller tilbehør til dukkehus (f.eks. 1:12)
        for at sikre, at huse, møbler og figurer passer sammen.
    dollhouse_style_theme:
      name: Dukkehusets stil/tema
      description: Dukkehusets overordnede stil eller tema, når kunder kigge efter
        et eller vil give det som gave (f.eks. moderne eller victoriansk).
    donnos_playing_technique:
      name: Donnos-spilleteknik
      description: Hvordan Donnos betjenes (kun med hånden eller med pind/slagtøj),
        så den lever op til købers forventninger og det medfølgende tilbehør.
    donnos_tuning_system:
      name: Stemmesystem til donnos
      description: Den primære metode til at stemme eller ændre tonelejet (f.eks.
        stramning af strenge/trykmekanisme).
    door_assembly_type:
      name: Dørsamlingstype
      description: 'Angiver, hvad der er inkluderet: kun dørskal, dørbeklædning eller
        komplet dørenhed.'
    door_closure_mechanism:
      name: Dørlukningsmekanisme
      description: Definerer den mekanisme, der styrer dørens lukkefunktion (f.eks.
        soft close eller magnetisk lås).
    door_handle_components_included:
      name: Dørhåndtagskomponenter, der medfølger
      description: Angiver, hvilke vigtige dele der følger med dørhåndtaget (f.eks.
        låsecylinder, pakning/tætning, dæksel, monteringsbeslag, ledningsforbindelse
        eller låsearm/aktuator).
    door_handle_operation:
      name: Betjening af dørhåndtaget
      description: Angiver den primære betjeningsmåde for køretøjets dørhåndtag (f.eks.
        mekanisk kobling, nøglecylinder, nøglefri berørings-/knapbetjening eller elektrisk
        udklapning).
    door_lock_knob_attachment_method:
      name: Monteringsmetode for dørlåseknap
      description: Angiver, hvordan dørhåndtaget fastgøres til låsestangen (f.eks.
        med gevind eller med skub).
    door_lock_position:
      name: Dørlåsens position
      description: Angiver, hvilken dør- eller åbningsposition dørlåsen eller dørlåsedelen
        er beregnet til at passe på et køretøj.
    door_seal_feature_set:
      name: Oversigt over dørforseglingens egenskaber
      description: Dørforseglingens funktionelle egenskaber.
    door_seal_material_type:
      name: Dørforseglingens materialetype
      description: Den primære elastomer-/materialegruppe, der anvendes til dørforseglingen
        (ud over generiske materialer).
    door_seal_product_form:
      name: Dørforseglingens produktformular
      description: Angiver dørforseglingens salgs-/emballageform.
    door_window_operation:
      name: Betjening af dørvindue
      description: Angiver, om dørens vinduessystem er beregnet til manuel eller elektrisk
        betjening, eller om døren ikke har et vindue.
    double_decker_bus_deck_configuration:
      name: Konfiguration af dobbeltdækkerbusdæk
      description: Angiver konfigurationen for dækadgang/tag på en dobbeltdækkerbus.
    double_drum_pedal_linkage_medium:
      name: Metode til dobbelt trommepedals ophæng
      description: Angiver den metode, der anvendes til at forbinde den sekundære
        pedal med den primære pedal (f.eks. drivaksel, kæde eller rem).
    double_end_bag_core_type:
      name: Posekernetype med to ender
      description: Beskriver den indvendige slagkernekonstruktion, som er afgørende
        for tilbagespringshastighed, føling og vedligeholdelsesbehov.
    double_pointed_needle_point_style:
      name: Strikkepind med to spidser
      description: Beskriver spidsens skarphed og form, som er beregnet til forskellige
        garntyper og strikkestilarter.
    dough_extruder_accessories_included:
      name: Tilbehør til dejekstruder medfølger
      description: Ekstra tilbehør, der følger med dejudtrækkeren.
    dough_extruder_operation_type:
      name: Dejudtrækkerens betjeningstype
      description: Hvordan dejen presses gennem udtrækkeren for at danne former.
    dough_extruder_shape_disc_included:
      name: Medfølgende formskive til udtrækkeren
      description: De former, som udtrækkeren kan fremstille ved hjælp af de medfølgende
        skiver/dyser.
    dough_format:
      name: Dejformat
      description: Angiver dejens fysiske udseende/form inde i emballagen (f.eks.
        kugle, plade, skive eller strimler).
    doumbek_accessories_included:
      name: Doumbek-tilbehør medfølger
      description: Tilbehør, der følger med doumbeken (f.eks. stemmeskrue og kasse).
    doumbek_head_material:
      name: Materiale i Doumbek-hoved
      description: Materiale til trommeskindet (membranen) på doumbeken.
    doumbek_head_type:
      name: Doumbek-hovedtype
      description: Doumbek-hovedets konstruktion/type (hvordan membranen er lavet
        eller monteret).
    doumbek_playing_style_technique:
      name: Doumbek-spillestil/-teknik
      description: Den tilsigtede spillekontekst/stil, der typisk forbindes med doumbeken.
    doumbek_tuning_system:
      name: Stemmesystem til doumbek
      description: Hvordan doumbeken er spændt/stemt (eller om den ikke kan stemmes).
    dowel_end_style:
      name: Dyvelendens type
      description: Beskriver udskæringen/formen på dyvelenderne, hvilket har betydning
        for, hvor lette de er at sætte i, sikkerheden og den tilsigtede anvendelse
        i håndværksarbejdet.
    dowel_surface_texture:
      name: Overfladetekstur på dyvel
      description: Beskriver dyvelens overfladetilstand, f.eks. glat eller riflet,
        hvilket har indflydelse på udseendet og limens klæbeevne.
    drafting_compass_adjustment_mechanism:
      name: Justeringsmekanisme til passer
      description: Primær finjusteringsmekanisme, der bruges til at indstille radiussen
        præcist.
    drafting_compass_fine_adjustment_mechanism:
      name: Finjusteringsmekanisme til passer
      description: Type finjustering, der anvendes til præcis indstilling af radiussen
        (hvis dette er tilgængeligt).
    drafting_compass_lead_holder_type:
      name: Type stiftholdere til passer
      description: Type tegneindsats/holder, der medfølger eller understøttes af passeret.
    drag_system_material:
      name: Træksystemmateriale
      description: Angiver det materiale eller den teknologi, der anvendes i dragstakken,
        og som har indflydelse på varmebestandighed og glathed.
    drag_system_type:
      name: Træksystemtype
      description: Angiver, hvilken type bremse der anvendes i rullen, f.eks. frontbremse,
        bagbremse, håndtagsbremse, stjernebremse, magnetbremse eller skivebremse.
    drag_type:
      name: Træktype
      description: Angiver den type trækmekanisme, der anvendes af hjulet (placerings-
        eller aktiveringsmetode).
    drawer_features:
      name: Skuffefunktioner
      description: oplysninger om specielle skuffekonstruktionselementer eller -funktioner
        (f.eks. soft-close eller filtforet).
    drawer_slide_type:
      name: Skuffeskinnetype
      description: Angiver monterings- og udtræksstil for skuffeskinner (f.eks. undermontering
        eller fuld udtræk).
    drawing_ink_compatible_tools:
      name: Værktøjer, der er kompatible med tegneblæk
      description: Angiver de påføringsværktøjer, som blækket er beregnet til (f.eks.
        dyppepen ifht. pensel).
    drawing_ink_permanence:
      name: Tegneblæks holdbarhed
      description: Angiver holdbarhedsegenskaber, der er vigtige for det færdige kunstværk
        og reproduktion.
    dress_embellishment:
      name: Kjoleudsmykning
      description: Fremhæver de markante dekorative elementer, der indgår i kjolens
        design.
    dress_train_type:
      name: Type slæb på kjolen
      description: Angiver, om kjolen har et slæb, samt dets længde og udformning,
        hvilket giver en indikation af, hvor formel anledningen er, og om kjolen passer
        til stedet.
    dried_surface_finish:
      name: Tørret overfladefinish
      description: Beskriver det typiske overfladeudseende efter tørring (glans/tekstur).
    drink_tube_insulation:
      name: Isolering af drikkeslange
      description: Angiver, om drikkeslangen har isolering eller en termisk ærme,
        der forhindrer væsker i at blive varme eller kolde.
    drive_band_cross_section_shape:
      name: Drivremmens tværsnitsform
      description: Drivremmens profilform (rund, flad osv.).
    drive_band_join_type:
      name: Samlingstype for drivrem
      description: Hvordan drivremmen er samlet/konstrueret (endeløst eller skal samles
        med bånd osv.).
    drive_band_material_type:
      name: Materialetype for drivbånd
      description: Angiver materialet/typen til det drivbånd, der anvendes på spindehjul.
    drive_location:
      name: Drivremmens placering
      description: Angiver, hvor svinghjulet/drivmekanismen er placeret på crosstraineren,
        hvilket har indflydelse på pladsbehovet og bevægelsesfornemmelsen.
    drive_mechanism:
      name: Drivmekanisme
      description: Identificerer den type drivlinje, der bruges til at overføre kraft
        fra pedalerne til svinghjulet.
    drive_shaft_material:
      name: Drivakselmateriale
      description: Angiver det primære konstruktionsmateriale for drivakslens rør
        eller den komplette enhed.
    drive_system:
      name: Drivsystem
      description: Angiver den mekanisme, der overfører pedalkraften til modstandssystemet.
    drivetrain_configuration:
      name: Drivlinjekonfiguration
      description: Angiver cykelens drivlinjekonfiguration og angiver, om baghjulet
        er fast, har friløb med ét gear eller er flip-flop-typen.
    drivetrain_speed_compatibility:
      name: Kompatibilitet mellem drivlinjehastigheder
      description: Angiver de kædehastigheder, som kædehjulet er konstrueret til at
        fungere med, hvilket sikrer korrekte tandprofiler og tandafstande.
    drone_positioning_system:
      name: Dronepositioneringssystem
      description: Indbygget positionerings- og stabiliseringsteknologi, der understøttes
        af dronen til navigation og stabil svæveflyvning.
    drone_transmission_type:
      name: Drone-transmissionstype
      description: Den primære metode, der anvendes til styring og/eller videoforbindelse
        mellem dronen og fjernbetjeningen/enheden.
    drop_spindle_whorl_position:
      name: Spindelhjulets placering
      description: Hjulets placering på skaftet.
    drum_carder_accessories_included:
      name: Tromlekartertilbehør medfølger
      description: Typiske dele, der følger med et tromlekardesæt.
    drum_clamp_locking_mechanism:
      name: Låsemekanisme for tromleklemme
      description: Angiver, hvordan klemmen fastgøres/strammes til røret/ringen (f.eks.
        vingebolt, tromlenøglebolt eller hurtigudløser).
    drum_clamp_mount_interface:
      name: Monteringsoveflade til trommeklemme
      description: Angiver, hvilke fastgørelsesmuligheder klemmen tilbyder til montering
        af tilbehør (f.eks. L-stangsbeslag, kugleled eller bækkentilter).
    drum_clamp_type:
      name: Trommeklemmetype
      description: Angiver den type funktionel klemme, der anvendes i monteringsbeslag
        til trommesæt (f.eks. rørklemme ifht. stativ-/rørklemme).
    drum_head_application_batter_resonant:
      name: Montering af trommeskind (anslagssiden/resonanssiden)
      description: Angiver, hvilken side/funktion tromlehovedet er beregnet til på
        en tromme (den øverste spilleflade ifht. den nederste resonansside/snare-siden).
    drum_head_collar_type:
      name: Trommeskindets kravetype
      description: Angiver, om skindet har en standardkrave, en lav krave eller en
        specialkrave, der passer til bestemte lejekanter/lejekasser.
    drum_head_damping_control:
      name: Dæmpningskontrol til trommeskind
      description: Indbyggede funktioner til overtonestyring eller dæmpningsmekanisme,
        der er integreret i hovedkonstruktionen.
    drum_head_film_material:
      name: Trommeskindets filmmateriale
      description: Hovedfilmens primære materiale (typisk PET/mylar, men kan også
        omfatte specialmaterialer).
    drum_head_hoop_collar_type:
      name: Trommeskindets bøjle-/kravetype
      description: Beskriver trommeskindets ramme- og kravekonstruktion (f.eks. kraveprofil
        og bøjleemateriale), hvilket kan påvirke pasformen og stemningsstabiliteten
        på visse trommeskaller og -kanter.
    drum_head_hoop_rim_material:
      name: Trommeskindets bøjle-/kantmateriale
      description: Materialet i skindbøjlen (den indlejrede bøjle inde i trommeskallen),
        som kan påvirke holdbarheden og stemningsstabiliteten.
    drum_head_included:
      name: Trommeskind, der er inkluderet
      description: Angiver, om trommeskind og/eller resonansskind følger med trommen.
    drum_head_muffling_feature:
      name: Trommeskindets dæmpningsfunktioner
      description: Indbyggede funktioner til kontrol af overtoner, der er integreret
        i trommeskindet.
    drum_head_muffling_type:
      name: Type dæmpning af trommeskind
      description: Angiver, om trommeskindet har indbyggede elementer til regulering
        af overtoner/dæmpning.
    drum_head_ply_count:
      name: Antal lag i trommeskindet
      description: Antal filmlag, der er anvendt i tromlehovedets konstruktion (f.eks.
        1 eller 2 lag).
    drum_head_position:
      name: Trommeskindposition
      description: Angiver, om trommeskindet er beregnet som slagskind (øverst/slagside),
        resonansskind (nederst), snare-skind (nederst) eller kan bruges på begge måder.
    drum_head_reinforcement_type:
      name: Forstærkningsform til trommeskind
      description: Angiver, om snarehovedet har forstærkende elementer såsom en midterprik
        eller en kontrolring, der øger holdbarheden og fremhæver klangen.
    drum_head_surface_finish:
      name: Trommeskindets overfladefinish
      description: Overfladestrukturen/finishen på trommeskindet, som påvirker anslaget
        og trommens respons.
    drum_head_type:
      name: Trommeskindstype
      description: Angiver den anvendte konstruktion/type af trommeskind på trommen
        (gælder primært for de medfølgende slag- og resonansskind).
    drum_key_design_type:
      name: Designtype for stemmenøgle til tromme
      description: Beskriver den funktionelle udformning af spændetromlens nøgle (f.eks.
        standard, med skraldefunktion eller T-håndtag).
    drum_key_drive_type:
      name: Drivmekanisme til stemmenøgle
      description: Angiver driv-/berøringsfladetypen for den stemmenøgle, der bruges
        til at fastgøre spændestangen eller monteringsbeslagene.
    drum_key_handle_style:
      name: Stemmenøglens håndtagsdesign
      description: Beskriver stemmenøglens greb/ergonomiske udformning, som har betydning
        for komforten og løftekraften under stemningen.
    drum_kit_included_items:
      name: Indhold i trommesættet
      description: Angiver, hvilke vigtige dele der indgår i trommesættet ud over
        kedler og skind (f.eks. udstyr, bækkener og trommestol).
    drum_kit_portability:
      name: Trommesættets bærbarhed
      description: Angiver, om sættet er designet til kompakt opbevaring/transport
        (f.eks. rejse/kompakt/foldbart).
    drum_kit_shell_construction_features:
      name: Trommesættets konstruktionsegenskaber
      description: Hvordan kedlerne er konstrueret (antal/type af lag), hvilket påvirker
        tone og holdbarhed.
    drum_mount_clamp_type:
      name: Trommemonteringsklemmetype
      description: Beskriver klemmeformfaktoren, der anvendes i udstyr.
    drum_multi_clamp_clamp_type:
      name: Tromle-multiklemmens klemmetype
      description: Multiklemmens funktionelle stil/konfiguration (hvordan den klemmer,
        og hvad den forbinder).
    drum_mute_material:
      name: Trommedæmpermateriale
      description: Angiver det primære materiale i trommedæmperen, der er i kontakt
        med trommeskindet og/eller dæmper vibrationer.
    drum_pad_triggering_zones:
      name: Trommeskindets aktiveringszoner
      description: Angiver antallet/typen af aktiveringszoner, som en tom-pad understøtter
        (f.eks. kun skind eller skind+kant), hvilket har betydning for udtryksmulighederne
        og kompatibiliteten med moduler.
    drum_pedal_accessories_included:
      name: Trommepedaltilbehør medfølger
      description: Viser en liste over det vigtigste tilbehør og de komponenter, der
        følger med trommepedalen.
    drum_pedal_baseplate_type:
      name: Trommepedalens bundpladetype
      description: Angiver, om pedalen bruger en bundplade eller et flydende/rammeløst
        design.
    drum_pedal_bearing_type:
      name: Trommepedalens lejetype
      description: Angiver den lejemekanisme, der anvendes ved de primære drejepunkter
        (f.eks. vippearm, hæl eller kam).
    drum_pedal_cam_type:
      name: Trommepedalens kamtype
      description: Angiver kamformen/geometrien på en trommepedal, som påvirker følingen
        og responsen (f.eks. lineær ifht. accelerator).
    drum_pedal_chain_configuration:
      name: Trommepedalkædens konfiguration
      description: Angiver den kædeopstilling, der bruges af en kædedrevet trommepedal
        (f.eks. enkeltkæde, dobbeltkæde eller forskydningskæde).
    drum_pedal_chain_type:
      name: Trommepedalkædetype
      description: Angiver den type kæde, der bruges i drevet (f.eks. rullekæde ifht.
        cykelkæde), hvilket kan påvirke glathed og holdbarhed.
    drum_pedal_clamp_type:
      name: Trommepedalens klemmetype
      description: Angiver, hvordan pedalen fastgøres til stortrommebøjlen.
    drum_pedal_intended_use:
      name: Tilsigtet anvendelse af trommepedalen
      description: Angiver den primære anvendelsessituation, som pedalen med remtræk
        er udviklet og markedsført til.
    drum_pedal_spring_adjustment_method:
      name: Metode til justering af trommepedalens fjeder
      description: Angiver, hvordan fjederspændingen justeres på pedalen.
    drum_pedal_spring_type:
      name: Trommepedalens fjedertype
      description: Angiver den fjedermekanisme, der anvendes til pedalens tilbagetrækning.
    drum_shell_material:
      name: Trommens skalmateriale
      description: Angiver det primære materiale til kedelkonstruktion med akustiske
        trommer (f.eks. ahorn, birk eller akryl).
    drum_shell_wood_species:
      name: Træsort til trommekedel
      description: Angiver, hvilken træsort der er anvendt til trommekedlen, hvilket
        har indflydelse på klang og resonans.
    drumhead_type:
      name: Trommeskindstype
      description: Hovedkonfiguration/type, der er anvendt på Octoban.
    drumstick_model:
      name: Trommestikmodel
      description: Standardiseret trommestikmodel/størrelsesbetegnelse, der bruges
        af mange mærker (f.eks. 5A eller 7A).
    drumstick_taper:
      name: Trommestik-tilspidsning
      description: Beskriver den tilspidsede form fra skaft til spids, hvilket påvirker
        tilbagespring og balance.
    drysuit_footwear_style:
      name: Tørdragts fodtøjsstil
      description: Beskriver tørdragtens indbyggede benender (f.eks. indbyggede støvler,
        neoprensokker, strømpefod eller tætninger ved anklerne).
    dumbbell_style:
      name: Håndvægtstil
      description: Beskriver håndvægtens grundlæggende konstruktion – om der er tale
        om en fast model, et justerbart system eller en model med aftagelige vægtskiver
        – hvilket har stor indflydelse på købsbeslutninger og anvendelsesmulighederne
        i træningen.
    dundun_playing_position:
      name: Dundun-spilleposition
      description: Trommens tilsigtede placering, når den spilles eller bæres.
    dye_status:
      name: Farvestofstatus
      description: Angiver, om battet er farvet, ufarvet/naturligt eller indeholder
        flere farver/blandinger.
    dye_style:
      name: Farvestil
      description: Angiver, om trådens farve er ensfarvet, meleret eller på anden
        måde specialfarvet.
    dye_technique:
      name: Farveteknik
      description: Metoden til farvning af fibrene (f.eks. håndfarvet, grydefarvet
        eller space-dyed).
    dye_type_needlecraft_fabric:
      name: Farvetype (håndarbejdsstof)
      description: Angiver, om hørstoffet er ensfarvet, håndfarvet eller specialfarvet.
    dyeing_color_processing:
      name: Farvning/farvebehandling
      description: Angiver, om og hvordan fiberen er farvet (f.eks. ufarvet, bleget/hvid
        eller ved hjælp af bestemte farvningsteknikker).
    e_bike_certification_class:
      name: Elcykel-certificeringskursus
      description: Angiver dækkets officielle hastighedsklassificering for elcykler
        (f.eks. E-25 eller E-50).
    e_bike_speed_rating:
      name: Elcykel-hastighedsklassificering
      description: Angiver det officielle elcykel-certificeringsniveau for dækket
        (f.eks. E25 for ≤25 km/t eller E50 for ≤50 km/t).
    e_scooter_connector_type:
      name: Stiktype til el-løbehjul
      description: Identificerer typen af elektrisk forbindelseskomponent eller stik,
        der bruges af komponenten til strøm- eller signalforbindelse.
    e_scooter_throttle_type:
      name: Gashåndtagstype på el-løbehjul
      description: Angiver den type grænseflade, der bruges til at styre accelerationen
        på en el-scooter.
    ear_coverage:
      name: Øredækning
      description: Angiver, om hjelmen inkluderer høreværn, og om det kan tages af
    ear_coverage_style:
      name: Øredækningtype
      description: Beskriver hvordan eller hvorvidt ørerne er dækket af fluemasken.
    ear_coverage_type:
      name: Øredækningstype
      description: Angiver, hvordan huen dækker eller beskytter ørerne, herunder om
        den har øreklapper og hvilken type de er.
    ear_guard_type:
      name: Ørebeskyttertype
      description: Beskriver typen af høreværn, der er integreret i huen, f.eks. af
        hård plast, polstret eller aftageligt.
    earmuff_style:
      name: Øreklapper
      description: Angiver, hvordan øreklapperne bæres, eller deres konstruktionsmæssige
        udformning (f.eks. over hovedet eller bag om hovedet).
    earring_closure_type:
      name: Øreringslukningstype
      description: Angiver den mekanisme, der bruges til at fastgøre øreringen til
        øret (f.eks. push-back, leverback eller clip-on).
    easel_art_desk_features:
      name: Staffeli- og tegnebordsegenskaber
      description: Fremhæver staffeliets eller tegnebordets typiske funktionelle egenskaber
    easel_art_desk_surface_type:
      name: Type af staffeli og tegnebordsoverflade
      description: Angiver de tilgængelige tegne- og skriveflader (f.eks. tavle, whiteboard,
        papirrulle eller magnetplade).
    eb_clarinet_body_type:
      name: Kropstype for Eb-klarinet
      description: Angiver, om Eb-klarinetten er en sopran- eller variant.
    eco_material_type:
      name: Øko-materialetype
      description: Fremhæver den miljøvenlige skum- eller materialeteknologi, der
        er anvendt i puden.
    edge_construction:
      name: Kantkonstruktion
      description: Angiver, om skien har en metalkant langs hele, en del af eller
        intet af sin længde.
    edge_tuner_type:
      name: Type kantjustering
      description: Inddeler typer af kantjustering til ski eller snowboard, f.eks.
        en filstyring eller en elektrisk maskine.
    edible_plant_part:
      name: Spiselig plantedel
      description: Angiver hvilken del af planten der sælges til forbrug.
    educational_guide_included:
      name: Uddannelsesvejledning, der er inkluderet
      description: Angiver hvilke læringsmaterialer der er inkluderet i modellen.
    educational_topic:
      name: Uddannelsesmæssigt emne
      description: Hovedlæringsemne, der understøttes af myrefarmens pædagogiske indhold.
    egg_component:
      name: Æggebestanddel
      description: Angiver, hvilken del af ægget produktet indeholder, f.eks. hele
        æg, kun æggehvider, æggeblommer eller blandinger/erstatningsprodukter.
    egg_component_replaced:
      name: Udskiftet æggebestanddel
      description: Angiver hvilken del af ægget produktet skal erstatte (f.eks. et
        helt æg, hvidt æg).
    egg_enrichment:
      name: Berigelse af æg
      description: Angiver enhver ernæringsberigelse, der er tilsat æggene, såsom
        omega-3 eller D-vitaminberigelse.
    egg_farming_method:
      name: Metode til æggeproduktion
      description: Angiver den produktions- eller opdrætsmetode, der anvendes til
        æggene (f.eks. uden bur, fritgående eller økologisk).
    egg_grade:
      name: Æggekvalitet
      description: Angiver den kvalitetsklasse, der er tildelt af myndigheder eller
        brancheorganer.
    egg_processing_state:
      name: Status for æggeforarbejdning
      description: Angiver, hvilken behandling æggene har gennemgået inden salg (f.eks.
        friske, saltede eller tusindårsæg).
    egg_production_method:
      name: Æggeproduktionsmetode
      description: Angiver, hvilken opdræts- eller opstaldningsform der anvendes til
        produktion af æggene (f.eks. uden bur, fritgående eller økologisk).
    egg_replacer_main_ingredient:
      name: Hovedingrediens i æggeerstatning
      description: Angiver den primære basisingrediens, som æggeerstatningen er lavet
        af, hvilket hjælper brugerne med diætbehov eller ønskede bageegenskaber.
    egg_size:
      name: Æggestørrelse
      description: Sorterer æg efter standardstørrelser.
    egg_source_animal:
      name: Dyr, der leverer æg
      description: Identificerer den dyreart, der har lagt æggene.
    egg_white_processing_method:
      name: Metode til forarbejdning af æggehvide
      description: Angiver, hvordan æggehviderne er blevet behandlet efter indsamlingen
        (f.eks. pasteuriseret eller spraytørret), hvilket har indflydelse på fødevaresikkerheden,
        holdbarheden og anvendelsesmulighederne.
    eggplant_variety:
      name: Auberginesort
      description: Angiver auberginens sort eller markedsvariant, så kunderne kan
        vælge mellem forskellige typer, der adskiller sig i størrelse, smag, farve
        og anvendelse i madlavningen.
    eggshell_color:
      name: Æggeskallens farve
      description: Angiver æggets dominerende skalfarve.
    elastic_edge_finish_type:
      name: Elastisk kantoverflade/type
      description: Angiver kanten på det vævede elastikbånd, hvilket har betydning
        for komforten og anvendelsen.
    elastic_intended_use:
      name: Tilsigtet anvendelse af elastik
      description: Den primære anvendelse, som elastikken er beregnet til (hjælper
        med at finde den rette størrelse og mindsker risikoen for forkert størrelse).
    elastic_recovery_performance:
      name: Elastisk genopretningsevne
      description: Beskriver, hvor godt det vævede elastikbånd vender tilbage til
        sin oprindelige længde efter at være blevet strakt.
    elastic_recovery_quality:
      name: Elastisk gendannelseskvalitet
      description: Angiver elastikkens strækgenopretning, dv. hvor godt den vender
        tilbage til sin oprindelige længde efter at være blevet strakt.
    elastic_stretch_level:
      name: Elastisk strækniveau
      description: Hvor meget elastikken kan strækkes under spænding (ofte udtrykt
        som relative niveauer, når den nøjagtige procentdel ikke er angivet).
    elastic_structure:
      name: Elastisk struktur
      description: Angiver knaphulselastikkens strukturelle opbygning af (f.eks. strikket,
        vævet eller flettet), hvilket kan påvirke elasticitet, tilbagetrækningsevne
        og syegenskaber.
    elastic_type:
      name: Elastiktype
      description: Angiver elastikkens konstruktionstype (f.eks. foldelastik (FOE),
        flettet, strikket eller vævet).
    electric_assist_type:
      name: Type elektrisk hjælpemiddel
      description: Angiver om cyklen har motorassistance, og hvilken type assistance
        der ydes.
    electric_bicycle_motor_position:
      name: Elcykelmotorens placering
      description: Hvor på elcyklen motoren sidder, f.eks. i midten eller på forhjulsnav,
        baghjulsnav eller dobbeltnav.
    electric_bike_class:
      name: Elcykelklasse
      description: Inddeler elcyklen i lovmæssige klasser, der fastlægger hastighedsgrænser
        og gashjælp.
    electric_guitar_bridge_type:
      name: Type af elektrisk guitarbro
      description: Angiver typen af bro-/vibrato-system på den elektriske guitar.
    electric_instrument_output_connection_type:
      name: Type tilslutning på elektrisk instrument
      description: Angiver de fysiske lydudgangstilslutninger, der findes på den elektriske
        cello.
    electric_riding_vehicle_control_options:
      name: Muligheder for styring af elektriske køretøjer
      description: Kontrol-/betjeningsmuligheder tilgængelige for føreren/forælderen
        (f.eks. pedal, rat eller fjernbetjening).
    electric_spinning_wheel_speed_control_type:
      name: Elektrisk spindehjuls hastighedskontroltype
      description: Beskriver, hvordan brugeren indstiller drejehastigheden på det
        elektriske hjul.
    electric_ukulele_output_jack_type:
      name: Type udgangsstik på elektrisk ukulele
      description: Angiver det fysiske udgangsstik, der bruges på den elektriske ukulele.
    electric_van_body_length_class:
      name: Længdeklasse for elektrisk varevogn
      description: Almindelig klassificering af varevogne efter akselafstand og længde,
        der anvendes i annoncer.
    electric_van_roof_height_class:
      name: Højdeklasse for elektrisk varevogns tag
      description: Almindelig klassificering af taghøjde, der anvendes til varevogne
        (især varevogne til godstransport).
    electric_vehicle_drivetrain_layout:
      name: Opbygning af drivlinjen i en elbil
      description: Motor-/akselkonfiguration, der angiver, hvor mange motorer der
        er, og hvor de er placeret (ud over de almindelige betegnelser AWD, FWD og
        RWD).
    electric_winder_accessories_included:
      name: Tilbehør til elektrisk spole, der medfølger
      description: Viser det tilbehør, der følger med den elektriske spolemaskine
        (f.eks. klemmer eller adaptere).
    electrical_connector_type:
      name: Elektrisk stiktype
      description: Angiver den type stik, der anvendes af dørlåsen/låsesystemet til
        elektrisk tilslutning (hvis det er relevant).
    electrical_system_voltage:
      name: Elektrisk systemspænding
      description: Angiver den nominelle spænding i køretøjets elektriske system,
        som regulatoren er designet til.
    electronic_cymbal_trigger_zones:
      name: Elektronisk bækkens aktiveringszoner
      description: Angiver, hvor mange uafhængige triggerzoner en cymbal-plade har
        (f.eks. bue/kant/klokke).
    electronic_drum_module_audio_interface_functionality:
      name: Funktionalitet for lydinterface til elektronisk trommemodul
      description: Angiver, om modulet kan fungere som et USB-lydinterface til optagelse/afspilning
        (ud over MIDI).
    electronic_drum_module_metronome_features:
      name: Funktioner i metronomen til det elektroniske trommemodul
      description: Angiver indbyggede øvelses- og metronomfunktioner.
    electronic_drum_module_power_source:
      name: Strømforsyning til elektronisk trommemodul
      description: Angiver den krævede eller understøttede strømkilde til kontrolmodulet.
    electronic_drum_module_sample_import_support:
      name: Understøttelse af import af samples til elektroniske trommemoduler
      description: Angiver, om modulet kan importere brugerprøver, og på hvilken måde.
    electronic_drum_pad_playing_surface_type:
      name: Type af spilleflade på det elektroniske trommeskind
      description: Beskriver konstruktionen af en tom-pads spilleflade (f.eks. netmembran
        ifht. gummi), hvilket har indflydelse på tilbagespring, lyd og fornemmelse.
    electronic_features:
      name: Elektroniske funktioner
      description: Angiver, om det pågældende legebankprodukt indeholder elektroniske/interaktive
        funktioner (hvis det er tilfældet).
    electronic_lights_and_sound:
      name: Elektronisk lys og lyd
      description: Angiver, om dukkehussættet indeholder elektronisk lys og/eller
        lydfunktioner (f.eks. lys, dørklokke, musik eller lydeffekter).
    electronics_power_source:
      name: Strømforsyning til elektronik
      description: Angiver, hvordan den aktive elektronik forsynes med strøm (hvis
        det er relevant).
    eligible_race_series:
      name: Kvalificerede løbsserier
      description: Den racerserie eller det forbund, som bilen er godkendt til at
        deltage i.
    elliptical_trainer_part_type:
      name: Type af del til crosstrainer
      description: Kategoriserer den specifikke type tilbehør eller reservedel til
        en crosstrainer (f.eks. rem, konsol eller pedal), så kunderne hurtigt kan
        finde den vare, de har brug for, uden at skulle gennemgå en lang række underkategorier.
    embellishment_technique:
      name: Udsmykningsteknik
      description: Beskriver de primære dekorative elementer eller overfladebehandlinger
        på tøjet, såsom broderi, tryk eller perlebroderi.
    embellishment_type:
      name: Udsmykningstype
      description: Angiver, hvilken type dekorativt element der er anvendt på strømpebåndet,
        f.eks. blonder, sløjfer eller perler.
    embossing_pen_ink_color:
      name: Prægningspennens farve
      description: Angiver farven på det blæk, der påføres med prægningspennen (kan
        være gennemsigtigt/klæbende eller pigmenteret). Anderledes end pennens/kroppens
        farve.
    embossing_stylus_tip_shape:
      name: Formen på prægningsstiftens spids
      description: Beskriver geometrien for den prægespids, der bruges til at skabe
        forskellige effekter (f.eks. rund eller spids).
    embroidered_coverage_level:
      name: Broderet dækningsniveau
      description: Omtrentlig mængde broderet tråddækning på mærkets forside.
    embroidered_patch_backing_type:
      name: Type bagside på broderet mærke
      description: Underlagslaget på bagsiden af det broderede mærke, som har betydning
        for holdbarheden og for, hvordan det kan påsættes.
    embroidery_hoop_type:
      name: Broderirammetype
      description: Identificerer broderirammens konstruktionsstil og dens primære
        spændingsmekanisme.
    embroidery_machine_bobbin_type:
      name: Spoletype til broderimaskine
      description: Spolens type/påsætningsmåde.
    emergency_lighting_configuration:
      name: Konfiguration af nødbelysning
      description: Angiver den primære konfiguration af det monterede nødblinklys
        på køretøjet (f.eks. taglygte eller lygter i kølergitteret).
    emergency_lighting_package:
      name: Nødbelysningspakke
      description: Angiver typerne af installerede nødadvarselslamper.
    emissions_compliance_standard:
      name: Overholdelse af emissionsstandard
      description: Angiver emissionscertificering/overholdelse af emissionskrav for
        motoren, hvor dette er relevant.
    emissions_standard:
      name: Emissionsstandard
      description: Emissionsoverholdelsesstandard for køretøjet (varierer efter område
        og år).
    enclosure_panel_configuration:
      name: Konfiguration af kabinepaneler
      description: Angiver, hvilke afskærmningspaneler eller sider der er inkluderet
        (konfiguration), f.eks. fuld afskærmning, kun sidegardiner eller 3-sidet (åben
        foran/bagpå).
    enclosure_window_material:
      name: Materiale til kabinevindue
      description: Angiver, hvilket materiale der er anvendt til kabinens gennemsigtige
        vinduespaneler.
    end_fitting_type:
      name: Type af endebeslag
      description: Den forbindelseskomponentstil, der anvendes i hver ende af stiveren
        (køretøjsside og lågside), der bestemmer monteringskompatibilitet.
    end_type:
      name: Endetype
      description: Angiver fastgørelsestypen for enderne af slæbestroppen til tilslutning
        til bjærgningspunkter.
    ends_style_blocking_wires:
      name: Endestil (blokerende ledninger)
      description: Hvordan spændetrådens ender er udformet for at sørge for sikkerhed
        og gøre det nemmere at trække den igennem blondekanterne.
    enduro_bike_suspension_adjustability:
      name: Justerbar affjedring på Enduro-cykel
      description: Angiver, hvilke indstillingsmuligheder der findes for affjedringen
        (typisk for forgaffel og bagstøddæmper).
    engine_bay_mounting_location:
      name: Monteringssted i motorrummet
      description: Hvor overløbstanken er beregnet til montering i motorens ventil
        (relativ position).
    engine_bearing_coating:
      name: Belægning på motorleje
      description: Angiver enhver overfladebelægning på lejet (for slidstyrke, indlejringsevne
        og reduceret friktion).
    engine_bearing_position:
      name: Motorlejeposition
      description: Angiver, hvor lejet skal monteres i motoren, og hvad dets funktion
        er.
    engine_bearing_size:
      name: Motorlejestørrelse
      description: Angiver, om lejet er i standardstørrelse eller en mindre eller
        større variant (afhængigt af krumtapsslibning og frirum).
    engine_configuration:
      name: Konfiguration af motor
      description: Beskriver motorens cylinderopstilling/konfiguration (f.eks. rækkemotor,
        V-motor eller boksermotor).
    engine_cooling_type:
      name: Motorkølingstype
      description: Angiver motorens kølemetode.
    engine_degreaser_form:
      name: Motoraffedtningsmiddels form
      description: Den fysiske form/leveringsform for motoraffedtningsmidlet.
    engine_degreaser_rinse_requirement:
      name: Krav til skylning af motoraffedtning
      description: Om affedtningsmidlet er beregnet til at blive skyllet med vand
        efter påføring.
    engine_mount_type:
      name: Motorophængstype
      description: Angiver motorophængets funktionelle design (f.eks. hydraulisk,
        solid eller momentstøtte).
    engine_oil_formulation:
      name: Motorolieformel
      description: Angiver motoroliens anvendelsesformål, f.eks. almindelig brug,
        pleje ved højt kilometertal, forlængede olieskiftintervaller eller anvendelse
        i vognparker eller til tung drift.
    engine_oil_specification:
      name: Motoroliespecifikation
      description: Den specifikation/standard, som olien opfylder (f.eks. API SP,
        API SN Plus, API CK-4, ACEA C3 eller ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Indhold i sæt til motorrenovering
      description: Angiver, hvilke hovedkomponenter der indgår i motorrenoveringssættet.
    engine_rotation_direction:
      name: Motorens rotationsretning
      description: Angiver motorens drejeretning ved anvendelse i sejlads.
    engine_timing_system_drive_type:
      name: Drevtype til motorens tidsstyringssystem
      description: Angiver, om motorens tidsstyringssystem er remdrevet, kædedrevet
        eller tandhjulsdrevet, med henblik på at sikre kompatibilitet.
    engine_valve_coating:
      name: Motorventilens belægning
      description: Angiver eventuel overfladebehandling eller belægning, der er påført
        ventilen for at sikre slid- og varmebestandighed.
    engine_valve_position:
      name: Motorventilens placering
      description: Angiver, om motorventilen er beregnet til motorens indsugningsside
        eller udstødningsside.
    engine_valve_stem_tip_type:
      name: Type af ventilstangspids
      description: Angiver ventilstangspidsens stil eller konstruktion ved kontaktpunktet
        med vippearmen eller justeringsanordningen.
    engine_valvetrain_type:
      name: Motorens ventilstyringstype
      description: Ventilmekanisme/knastakselkonfiguration.
    enhancement_level:
      name: Forbedringsniveau
      description: 'Den omtrentlige volumenforøgelse, som indlægget giver, angivet
        i skålstørrelser: diskret (op til 1 skål), moderat (1-2 skåle) eller markant
        (mere end 2 skåle).'
    entry_zipper_location:
      name: Lynlåsens placering
      description: Angiver, hvor dragten har sin primære lynlås eller åbning (f.eks.
        foran, bagpå, ved skulderen eller på skrå).
    epee_point_type:
      name: Kårdespidsform
      description: Angiver mærket eller standarden for den spids, der er installeret
        på klingen, hvilket påvirker kompatibilitet og vedligeholdelse.
    equestrian_discipline:
      name: Ridedisciplin
      description: Angiver den ridedisciplin, som sporen er beregnet til eller mest
        egnet til.
    equestrian_helmet_safety_certification:
      name: Sikkerhedscertificering for ridehjelm
      description: Angiver de sikkerhedsstandarder eller certificeringer, som hjelmen
        overholder.
    equine_application_area:
      name: Anvendelsesområde for heste
      description: Angiver, hvilken del af kroppen eller hvilket materiale produktet
        er beregnet til (f.eks. hov, manke eller rideudstyr).
    equipment_contact_material_brew_wine:
      name: Materialer i kontakt med produktet (øl/vin)
      description: Det materiale, som varen er fremstillet af, og som kommer i kontakt
        med væsken (f.eks. glas, rustfrit stål eller plast).
    eu_children_clothing_size:
      name: EU's børnetøjsstørrelse
      description: Angiver EU-børnenes tøjstørrelse efter højde, f.eks. 104 eller
        140
    eu_clothing_size:
      name: EU-tøjstørrelse
      description: Angiver europæisk tøjstørrelse, f.eks. 38 eller 46
    eu_cup_size:
      name: EU-skålstørrelse
      description: Angiver EU-skålstørrelse, f.eks. C eller E
    eu_ring_size:
      name: EU-ringstørrelse
      description: Angiver EU-ringstørrelsen efter omkreds, f.eks. 52 eller 63
    eu_shoe_size:
      name: EU-skostørrelse
      description: Angiver EU-skostørrelsen, f.eks. 42 eller 42 bred
    euphonium_included_accessories:
      name: Medfølgende tilbehør til euphonium
      description: Viser udstyr, der normalt følger med et euphonium (f.eks. mundstykke
        eller kasse).
    euphonium_valve_configuration:
      name: Euphonium-ventilkonfiguration
      description: Angiver antallet af ventiler og om den fjerde ventil betjenes manuelt
        eller via en sidebetjent mekanisme.
    european_sword_historical_period:
      name: Europæiske sværds historiske periode
      description: Den primære historiske periode, som sværdets mønster/replika er
        baseret på (eller den tid, hvor originalen stammer fra).
    european_sword_pattern_type:
      name: Europæisk sværdmønster/type
      description: Den specifikke europæiske sværdtype (typologi), som dette samlersværd
        repræsenterer.
    ev_connector_adapter_direction:
      name: Elbil-stik/-adapters retning
      description: Angiver, hvad adapteren konverterer FRA og TIL (køretøjets indgangsside
        ifht. oplader-/kabelsiden), hvilket giver mulighed for præcis filtrering efter
        kompatibilitet.
    ev_conversion_kit_completeness_level:
      name: Hvor komplet konverteringssættet er
      description: Angiver, om produktet er et komplet konverteringssæt eller delvist
        sæt/pakke (f.eks. kun motor og styreenhed).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfiguration af drivlinjen i et konverteringssæt til elbil
      description: Angiver drivlinjens opbygning i et konverteringssæt til elbiler,
        herunder motorens placering og drivlinjens udformning samt om den eksisterende
        gearkasse bevares.
    ev_conversion_kit_voltage_class:
      name: Spændingsklasse til elbil-konverteringssæt
      description: Den nominelle systemspændingsklasse (kategori), som EV-konverteringssættet
        er udviklet til. Brug dette til filtrering efter almindelige systemspændingsklasser
        ud over den nøjagtige spændingsmåling.
    evaporator_core_type:
      name: Fordamperkernetype
      description: Beskriver konstruktionsdesignet for en fordamper til et klimaanlæg
        i en bil.
    evenweave_fabric_finish_treatment:
      name: Evenweave-stoffinish/behandling
      description: Angiver enhver forbehandling eller behandling, der er anvendt på
        stoffet, som påvirker håndtering eller udseende.
    evenweave_fabric_package_format:
      name: Evenweave-stofpakkeformat
      description: Hvordan stoffet sælges (i faste stykker eller som løbende stof
        pr. meter).
    exercise_bike_accessory_part_type:
      name: Type tilbehør/reservedel til motionscykel
      description: Beskriver varens primære funktion eller deltype (f.eks. pedal,
        drivrem, flaskeholder, skærm eller krankskive).
    exercise_bike_cushion_component:
      name: Komponent til motionscykelpude
      description: Angiver den medfølgende sæderelaterede komponent, f.eks. en sædeindlæg,
        en sadel eller et sædebetræk.
    exercise_bike_metrics_tracked:
      name: Målinger fra motionscyklen
      description: Viser en liste over træningsdatafelter, som computeren kan måle
        og vise i realtid.
    exercise_mat_accessories_included:
      name: Tilbehør til træningsmåtte, der medfølger
      description: Angiver de ekstra dele, der følger med måtten, f.eks. stropper
        eller knæbeskyttere.
    exhaust_cooling_type:
      name: Udstødningskøletype
      description: Angiver, om udstødningskomponenten er beregnet til våde udstødningssystemer
        (vandkølet/med vandindsprøjtning) eller tørre udstødningssystemer.
    exhaust_installation_position:
      name: Udstødningens monteringsposition
      description: Angiver, hvor på køretøjet delen er monteret.
    exhaust_outlet_configuration:
      name: Udstødningsrørets konfiguration
      description: Angiver udstødningsrørets layout bag på køretøjet.
    expansion_tank_cap_connection_type:
      name: Tilslutningstype til udvidelsesbeholderens låg
      description: Den mekaniske fastgørelsesmetode, der anvendes til at fastgøre
        og tætne hætten på udvidelsestankens hals.
    expansion_tank_cap_pressure_relief_feature:
      name: Trykudligningsfunktion på ekspansionsbeholderens låg
      description: Angiver, om og hvordan hætten fungerer som tryk-/vakuumudligningsanordning.
    expansion_tank_cap_seal_material:
      name: Ekspansionsbeholderens pakningsmateriale
      description: Materialet i pakningen/tætningen, der er i kontakt med ekspansionsbeholderens
        hals.
    extension_attachment_method:
      name: Forlængerfastgørelsesmetode
      description: Angiver, hvordan forlængeren fastgøres til cyklens cockpit/styr,
        hvilket hjælper rytterne med at bekræfte kompatibiliteten med deres eksisterende
        opsætning.
    extension_bend_type:
      name: Forlængerbøjningstype
      description: Beskriver den geometriske stil eller bøjning af styrforlængeren,
        som påvirker rytterens ergonomi og aerodynamik.
    extension_mechanism:
      name: Forlængermekanisme
      description: Beskriver den metode, et bord bruger til at udvide længde eller
        overfladeareal, hvis det er relevant.
    extension_table_features:
      name: Forlængerbordets egenskaber
      description: Fremhæver funktionelle funktioner, der er specifikke for symaskiners
        forlængerborde.
    eyelet_grommet_installation_method:
      name: Montering af øje og tætningsring
      description: Angiver, hvordan øjet/tætningsringen monteres/fastgøres i materialet.
    eyewear_lens_shape:
      name: Brilleglasform
      description: Angiver linsens geometriske form, f.eks. cylindrisk eller sfærisk,
        hvilket har indflydelse på synsfeltet, forvrængningen og udseendet.
    eyewear_strap_material:
      name: Stropmateriale for brillestel
      description: Angiver, hvilket materiale den justerbare rem, der holder beskyttelsesbriller
        eller briller fast på brugerens hoved, er lavet af.
    fabric_backing_type:
      name: Stofbagsidetype
      description: Angiver, om den printbare bomuld har en stabiliserende Paper (og
        hvilken type), hvilket afgør, om den kan føres gennem standardprintere.
    fabric_cut_format:
      name: Stofskåret format
      description: Angiver udskæringen/formatet på håndarbejdslærredet.
    fabric_end_use:
      name: Stoffets anvendelsesformål
      description: Identificerer stoffets primære tilsigtede anvendelse (hvad det
        bedst bruges til).
    fabric_finish:
      name: Stoffets overfladebehandling
      description: Silkeoverfladebehandlingen, der påvirker glans, fornemmelse og
        egenskaber.
    fabric_intended_use:
      name: Tilsigtet brug for stoffet
      description: De primære anbefalede anvendelsesområder/projekter for linnedstoffet.
    fabric_opacity_level:
      name: Stoffets opacitetsniveau
      description: Angiver, hvor gennemsigtigt stoffet er, hvilket påvirker behovet
        for lagdeling og foring.
    fabric_patch_shape:
      name: Formen på stoflappen
      description: Beskriver formen på de lapper, der følger med i sættet.
    fabric_repair_kit_application_method:
      name: Anvendelse af reparationssæt til stof
      description: Angiver, hvordan reparationen udføres på stoffet (f.eks. strygning,
        påsyning eller klæbning).
    fabric_repair_kit_components_included:
      name: Komponenter til tekstilreparationssæt, der medfølger
      description: Angiver de specifikke komponenter, der medfølger i sættet (f.eks.
        plastre, tråd, nål eller klæbemiddel).
    fabric_repair_kit_intended_use:
      name: Tilsigtet anvendelse af tekstilreparationssæt
      description: Angiver den almindelige reparationsopgave, som sættet er beregnet
        til (f.eks. rifter, huller eller oplægning).
    fabric_selling_format:
      name: Det format, som stoffet sælges i
      description: Angiver, hvordan stoffet sælges (i hele baner, som færdigskårne
        stykker, på rulle eller som prøve).
    fabric_stretch_level:
      name: Stoffets strækbarhedsniveau
      description: Beskriver stoffets strækbarhed/elasticitet, hvilket hjælper kunderne
        med at vælge de rette stoffer til tætsiddende tøj eller projekter, der kræver
        en fast struktur.
    fabric_stretch_type:
      name: Stoffets stræktype
      description: Angiver, hvor elastisk stoffet i surfershortsene er, hvilket er
        vigtigt for bevægelsesfriheden, når man surfer eller svømmer.
    fabric_texture:
      name: Stoffets tekstur
      description: Beskriver stoffets overflade eller strikkestruktur, som er anvendt
        i denne loungewear-top.
    fabric_use_case:
      name: Anvendelseseksempel for stof
      description: Hovedanvendelsen for stykket/rullen med satinstof.
    fabric_weight_class:
      name: Stoffets vægtklasse
      description: Inddeler flannel efter typiske vægtklasser, så kunderne kan filtrere
        uden at kende den nøjagtige vægt i g/m² eller oz.
    face_mask_material:
      name: Ansigtsmaskemateriale
      description: Materialesammensætning for den ansigtsmaske, der følger med hjelmen
        eller er kompatibel med den.
    face_mask_style:
      name: Ansigtsmaskestil
      description: Beskriver den overordnede form eller designstil på modemasken,
        hvilket hjælper kunderne med at finde den pasform og det udseende, de foretrækker.
    face_mask_style_code:
      name: Kode for ansigtsmaske-stil
      description: Angiver ansigtsmaskens konstruktionsstangtype eller branchekodefamilie
        (f.eks. ROPO, OPO eller RJOP).
    face_protection_type:
      name: Ansigtsbeskyttelsestype
      description: Angiver typen af ansigtsbeskyttelse, der følger med eller er indbygget
        i hjelmen, f.eks. visir eller ansigtsgitter.
    faceplate_security_features:
      name: Frontpladens sikkerhedsfunktioner
      description: Beskriver tyverisikrings- og adgangsfunktioner i forbindelse med
        frontpladen, der går ud over det grundlæggende design.
    facing_length:
      name: Frontens længde
      description: Angiver mundstykkets længde (kurvelængde), hvilket har indflydelse
        på responsen og valget af rørblad.
    fan_shroud_type:
      name: Typen af ventilatorafskærmning
      description: Angiver dæknings-/geometri-typen for ventilatorafskærmningen (f.eks.
        fuld, halv eller ringformet).
    farming_method:
      name: Landbrugsmetode
      description: Fremhæver de dyrevelfærds- eller opdrætsmetoder, der anvendes i
        forbindelse med opdræt af dyrene, f.eks. friland eller økologisk.
    farming_practice:
      name: Landbrugspraksis
      description: Angiver den primære dyrkningsmetode, der er anvendt til produktet
        (f.eks. konventionel, økologisk eller hydroponisk).
    fascinator_style:
      name: Fascinatorstil
      description: Beskriver fascinatorens konstruktion eller form, så kunderne hurtigt
        kan filtrere efter populære hatte- og hovedbeklædningsmodeller.
    fastener_grade:
      name: Fastgørelsesklassificering
      description: Angiver boltens styrkeklasse, f.eks. klasse 8 eller klasse 10.9,
        som bestemmer belastningskapaciteten.
    fat_rendering_state:
      name: Tilstand for udsmeltning af fedt
      description: Angiver, om fedtet er smeltet, usmeltet (råt) eller delvist smeltet,
        hvilket har betydning for holdbarheden og anvendelsesmulighederne i madlavningen.
    fat_source:
      name: Fedtkilde
      description: Identificerer den primære kilde til fedt, der bruges til at producere
        smør, ghee eller margarine (animalsk eller plantebaseret), hvilket understøtter
        allergi- og kostfiltrering.
    faucet_hole_configuration:
      name: Konfiguration af vandhanehul
      description: Angiver antallet og placeringen af de forborede huller til vandhaner
        i bordpladen.
    feather_application:
      name: Anvendelse af fjer
      description: Kalkunfjerens primære anvendelsesformål eller anvendelse til håndværk
        eller fremstilling.
    feather_attachment_format:
      name: Fjerfastgørelse/format
      description: Hvordan de syntetiske fjer forarbejdes/sælges til brug (løse, på
        snor, på tape osv.).
    feather_coloration_style:
      name: Fjerfarvningsstil
      description: Beskriver, hvordan farven påføres/fremstår på fjerene (f.eks. ensfarvet,
        farvet i spidsen eller med farveovergang), uafhængigt af den grundlæggende
        farveværdi.
    feather_component:
      name: Fjerkomponent
      description: Angiver, hvilken del/type af påfuglefjer der sælges (f.eks. øjefjer
        eller herl).
    feather_curvature:
      name: Fjerkrumning
      description: Fjerens overordnede form/krumningsprofil.
    feather_finish:
      name: Fjerfinish
      description: Angiver, om strudsefjerene er naturlige eller er blevet behandlet
        (f.eks. farvet eller bleget) med henblik på dekorativ anvendelse.
    feather_form:
      name: Fjerform
      description: Angiver den fysiske form af de gåsefjerstykker, der sælges.
    feather_grade:
      name: Fjerkvalitet
      description: Fjerens samlede kvalitet/sorteringsklasse til håndværksbrug ifht.
        udstillingsbrug.
    feather_part:
      name: Fjerdel
      description: Den del af kalkunfjer, der sælges (almindeligt forekommende i udbud
        af håndværks- og fluebindingsartikler).
    feather_processing_type:
      name: Fjerforarbejdningstype
      description: Hvordan fjerene er blevet forarbejdet/behandlet til håndværksbrug
        (f.eks. farvet, bleget eller naturlige/ufarvede).
    feather_product_form:
      name: Fjerproduktform
      description: Fjerproduktets fysiske form/udskæring, som det sælges (f.eks. løse
        fjer, boaer eller frynser).
    feather_quantity_unit:
      name: Fjermængdeenhed
      description: Angiver, hvordan produktet sælges (f.eks. pr. stk., pr. vægt eller
        pr. bundt), for at muliggøre en præcis sammenligning mellem de forskellige
        varenumre.
    feather_source:
      name: Fjerkilde
      description: Angiver, hvilket dyr fjerene i fjerbolde stammer fra.
    feather_stiffness:
      name: Fjerstivhed
      description: Fjerens/strukturens relative stivhed.
    feed_mechanism:
      name: Fremføringsmekanisme
      description: Angiver, hvordan bolde føres ind i kastemaskinen.
    feed_purpose:
      name: Foderformål
      description: Beskriver det primære ernæringsmæssige eller funktionelle mål med
        foderet eller kosttilskuddet.
    feeder_mechanism_type:
      name: Fodringsmekanismetype
      description: Identificerer den dispenseringsmekanisme, som foderautomaten bruger
        til at frigive foder.
    feijoa_cultivar:
      name: Feijoa-kultivar
      description: Identificerer den specifikke feijoa-kultivar eller sort, da forskellige
        kultivarer tilbyder forskellige smagsvarianter, størrelse og høsttidspunkter.
    felt_duty:
      name: Slidstyrke
      description: Angiver tennisboldens slidstyrkeklasse (f.eks. ekstra slidstærk
        eller almindelig slidstyrke), hvilket har indflydelse på holdbarheden på forskellige
        underlag.
    felting_mold_intended_use:
      name: Tilsigtet anvendelse af filtformen
      description: Hvad formen er beregnet til at forme eller bruges til i filtningsprojekter.
    felting_pad_surface_material:
      name: Filtpudens overflademateriale
      description: Det materiale, der anvendes på filtunderlagets arbejdsflade, som
        er i kontakt med fibrene/nålen.
    fencing_certification:
      name: Fægtecertificering
      description: Angiver de officielle godkendelser fra de styrende organer, som
        fægtningsvåbnet opfylder (f.eks. FIE eller USFA), hvilket bekræfter, at det
        er godkendt til konkurrencebrug og lever op til kvalitetsstandarderne.
    fencing_connector_type:
      name: Type af hegntilslutning
      description: Angiver den forbindelsekonfiguration, der anvendes til tilslutning
        af hegnsslanger, stikdåser eller ruller (f.eks. 2-polet, 3-polet eller bajonet),
        hvilket sikrer, at komponenterne er kompatible.
    fencing_discipline:
      name: Fægtedisciplin
      description: Angiver det fægtevåben eller den disciplin, som produktet er designet
        til eller kompatibelt med.
    fencing_weapon_type:
      name: Fægtevåbentype
      description: Angiver den fægtnings- eller øvelsesvåbenstil, som træningshjælpemidlet
        er kompatibelt med eller repræsenterer, hvilket hjælper brugerne med at finde
        passende udstyr.
    fender_finish_state:
      name: Skærmens overfladebehandling
      description: Angiver skærmens leveringstilstand med hensyn til overflade og
        finish, så den er klar til maling og montering.
    fender_pieces_included:
      name: Skærmdele medfølger
      description: Angiver de komponenter, der følger med produktet, for at præcisere,
        om der er tale om en enkelt skærm eller et komplet sæt med tilbehør.
    fender_type:
      name: Skærmtype
      description: Klassificerer skærmens overordnede design eller stil.
    fennel_trimming:
      name: Fennikelbeskæring
      description: Angiver, hvilke plantedele der er inkluderet i fennikelløget (f.eks.
        med blade, trimmet top og rod).
    fennel_variety:
      name: Fennikelsort
      description: Angiver kultivar eller markeret sort for de fennikelløg, der sælges.
    fermentation_application:
      name: Anvendelse inden for fermentering
      description: Identificerer den primære fødevare eller drikkevare, som kulturen
        er designet til at fermentere (f.eks. ost, yoghurt, mælkekefir eller surdej).
    fermentation_method:
      name: Fermenteringsmetode
      description: Angiver, hvordan sojasaucen blev produceret eller fermenteret (f.eks.
        naturligt brygget eller kemisk hydrolyseret).
    fermentation_vessel_material:
      name: Fermenteringsbeholderens materiale
      description: Primært materiale i fermenteringsbeholderen, der er inkluderet
        i sættet (hvis det er relevant).
    ferrule_material:
      name: Ferrule-materiale
      description: Angiver det materiale, der er anvendt til ferrulen (f.eks. Juma,
        fenol, polycarbonat, XTC eller ingen), hvilket har indflydelse på holdbarheden
        og slagfornemmelsen.
    fia_homologation_certification:
      name: FIA-homologering/-certificering
      description: Angiver, om bilen (eller sikkerhedscellen) er certificeret/homologeret,
        og i henhold til hvilken standard.
    fiber_animal_source_type:
      name: Fibertype (dyreart/kilde)
      description: Det dyr eller den primære kilde, som ulden stammer fra (eller syntetisk),
        f.eks. merinould, alpaca eller plantefibre.
    fiber_luster_level:
      name: Fiberglansniveau
      description: Fiberens visuel glans, der spænder fra mat til højglans.
    fiber_preparation_processing_stage:
      name: Fiberforberedelse/-forarbejdningsfase
      description: Angiver, hvordan strimlen er blevet forberedt/forarbejdet til brug
        (f.eks. kort ifhr. kæmmet, blendet eller superwash).
    fiber_preparation_type:
      name: Type fiberforberedelse
      description: Angiver, hvordan fiberen er blevet forberedt til håndarbejde (f.eks.
        kartet plade, tromlekartet eller forhåndsfiltet ark).
    field_hockey_ball_playing_surface:
      name: Spilleflade til hockey
      description: Identificerer den spilleflade eller det miljø, som bolden er designet
        til.
    field_hockey_ball_type:
      name: Type bold til hockey
      description: Kategoriserer hockeybolden efter dens tilsigtede anvendelse eller
        særlige egenskab.
    field_hockey_goal_size_standard:
      name: Hockeymålets størrelsesstandard
      description: Klassificerer målet i henhold til almindelige hockeystandarder
        eller træningsstørrelser (f.eks. FIH's udendørsregler, unge eller mini).
    field_hockey_training_objective:
      name: Mål for hockeytræning
      description: Definerer den primære færdighed eller fokusområde, som træningshjælpemidlet
        er designet til at forbedre.
    field_point_attachment_method:
      name: Metode til fastgørelse af markpunkter
      description: Angiver, hvordan markpunkter er fastgjort til pilens skaft eller
        indsats (f.eks. med skruer eller lim).
    field_point_tip_style:
      name: Markspidsstil
      description: Angiver markspidsens geometriske udformning eller funktionelle
        profil, hvilket har indflydelse på indtrængning, indsatsen ved fjernelse og
        lovmæssigheden.
    fielding_glove_position:
      name: Markhandskeposition
      description: Identificerer den defensive position eller anvendelse, som handsken
        er designet til i baseball- eller softballspil.
    fielding_training_focus:
      name: Marktrænings fokusområde
      description: Angiver det primære færdighedsområde, som hjælpemidlet er målrettet
        mod under træningen.
    fig_variety:
      name: Fignevariant
      description: Angiver den specifikke kultivar eller variant af figne, der sælges
    figure_8_device_design:
      name: 8-talsdesign
      description: Angiver 8-tallets specifikke konfiguration, som har indflydelse
        på håndteringsegenskaberne og den tilsigtede anvendelse.
    figure_finish_type:
      name: Figurfinishtype
      description: Angiver overfladen/malingen på hestemodellen (hvordan den ser ud/føles
        som samlerobjekt).
    figurine_scale:
      name: Figurskala
      description: Figurens målestok i forhold til det virkelige motiv (hvis det er
        relevant), f.eks. 1:6.
    fill_status:
      name: Fyldstatus
      description: Angiver, om træningsdukken sælges færdigfyldt, ikke fyldt eller
        delvist fyldt, hvilket har betydning for forsendelsesomkostningerne og købers
        arbejdsbyrde.
    filling_consistency:
      name: Fyldets konsistens
      description: Beskriver fyldets konsistens eller tykkelse ved levering (f.eks.
        glat creme, frugtstykker eller pasta).
    filling_type:
      name: Fyldtype
      description: Angiver det primære fyld eller den creme, der er inde i småkagerne,
        hvis det er relevant.
    filtration_and_mother_status:
      name: Filtrering og moderstatus
      description: Angiver om eddiken er filtreret, ufiltreret, rå eller indeholder
        "moderenzymet", hvilket henvender sig til forbrugere, der søger probiotiske
        eller rå muligheder.
    filtration_method:
      name: Filtreringsmetode
      description: Materiale eller teknik, der anvendes til at filtrere og rense vodkaen
        efter destillation.
    fin_box_system:
      name: Finnekasseystem
      description: Angiver den finnekasse eller monteringsgrænseflade, som pladen
        bruger, og bestemmer dermed kompatibilitet med eftermarkedsfinner.
    fin_buoyancy:
      name: Svømmefodsopdrift
      description: Angiver, om svømmefoden har positiv, neutral eller negativ opdrift
        i vandet, hvilket har indflydelse på dykkerens retning og udstyrets balance.
    fin_flex_rating:
      name: Finnefleksibilitetens klassificering
      description: Angiver svømmefodens relative stivhed eller fleksibilitet, hvilket
        har indflydelse på den samlede ydeevne.
    fin_mounting_system:
      name: Finnemonteringssystem
      description: Angiver den fastgørelsesmetode eller standard, der anvendes til
        at fastgøre finnen til kiteboardet (f.eks. FCS II, skruemontering, 4-huls),
        hvilket sikrer kompatibilitet mellem finner og brædder.
    fin_position:
      name: Finneposition
      description: Angiver den tilsigtede monteringsposition for finnen på brættet.
    fin_strap_type:
      name: Finnesnørretype
      description: Angiver typen af rem eller fastgørelsessystem, der bruges til at
        fastgøre svømmefoden til hælen/foden.
    fin_template:
      name: Finneskabelon
      description: Dette kategoriserer den hydrodynamiske form eller kontur fpr surfbrættets
        finne, hvilket har indflydelse på svingegenskaber, hastighed og brættets generelle
        fornemmelse.
    finger_count:
      name: Fingerantal
      description: Angiver det antal fingre, som handsken, tappen eller udløserhåndtaget
        er beregnet til at bære.
    finger_coverage:
      name: Fingerdækning
      description: Angiver, hvor meget af fingrene der er dækket.
    finger_grip_adjustability:
      name: Fingergrebets justerbarhed
      description: Angiver, hvordan fingergrebet fastgøres eller justeres, så det
        passer til forskellige håndstørrelser.
    finger_hole_configuration:
      name: Konfiguration af fingerhul
      description: Angiver, hvilken hånd fingerhullerne er beregnet til (højrehåndet,
        venstrehåndet eller ligehåndet).
    finger_hole_count:
      name: Antal fingerhuller
      description: Angiver antallet af fingerhuller i grebslæderet, hvilket er en
        afgørende forskel i designet mellem modeller uden fingre, med 2 huller, 3
        huller og 4 huller.
    finger_pick_band_style:
      name: Fingerplektrum-båndstil
      description: Stilen på båndet/løkken, der sidder om fingeren, og som har betydning
        for komforten og justerbarheden.
    finger_pick_blade_length:
      name: Fingerplekter-bladets længde
      description: Længden på plekterbladet, der strækker sig fra båndet.
    finger_pick_blade_shape:
      name: Fingerplekterets bladform
      description: Formen/profilen på den del af plektret (bladet), der kommer i kontakt
        med strengene.
    finger_pick_size:
      name: Fingerplekterstørrelse
      description: Størrelse på fingerplekterens bånd/løkke, så den passer til forskellige
        finger- eller tommelfingeromkredse (ikke instrumentstørrelse).
    finger_pick_wear_location:
      name: Det sted, hvor fingerplektreren skal bæres
      description: Angiver, på hvilken finger plekteren er beregnet til at blive båret,
        eller om produktet er et sæt til tommelfinger og fingre.
    finger_protection:
      name: Fingerbeskyttelse
      description: Angiver, om handsken har beskyttelse på fingrene, og om beskyttelseselementerne
        kan tages af.
    fingerboard_bearing_type:
      name: Type af gribebrætleje
      description: Angiver den lejetype, der anvendes i gribebræthjul.
    fingerboard_grip_type:
      name: Grebstype på gribebræt
      description: Angiver gribeoverfladematerialet/-typen, der anvendes på gribebrættet.
    fining_agent_active_ingredient:
      name: Aktiv ingrediens i klaringsmiddel
      description: Det primære klaringsmiddel, der anvendes i produktet.
    fining_agent_type:
      name: Type af klaringsmiddel
      description: Angiver kemiske sammensætninger eller materialer til klaringsmidler,
        der anvendes til at gøre rødvin klare.
    finish_after_baking:
      name: Finish efter bagning
      description: Beskriver det typiske overfladeudseende efter hærdning/bagning.
    finish_effect:
      name: Finish-effekt
      description: Beskriver særlige overfladeeffekter og optiske effekter, der er
        anvendt på rhinstenen.
    finish_type:
      name: Behandlingstype
      description: Overfladebehandling på ukulelens krop.
    finished_product_format:
      name: Det færdige produkts format
      description: Angiver den type duftprodukt, som sættet er beregnet til at fremstille.
    fire_pit_accessories_included:
      name: Bålpladstilbehør medfølger
      description: Viser det vigtigste tilbehør, der følger med ildstedet, såsom gnistskærme
        eller lavasten, så man får et klart overblik over, hvad der er i pakken.
    firework_assortment_launch_type:
      name: Fyrværkerisortimentets affyringstype
      description: Beskriver, hvordan det medfølgende fyrværkeri typisk antændes/affyres.
    firework_assortment_types_included:
      name: Fyrværkerisortiment, der er inkluderet
      description: Angiver de vigtigste typer fyrværkeri i sortimentet, så kunderne
        lettere kan sammenligne indholdet i de forskellige pakker (f.eks. fontæner,
        romerlys og knaldperler).
    firework_effect_types:
      name: Typer af fyrværkerieffekter
      description: De primære visuelle og/eller sensoriske virkninger, som sortimentet
        frembringer (vælg alle relevante muligheder).
    firework_ignition_method:
      name: Metode til tænding af fyrværkeri
      description: Angiver, hvordan fyrværkeriet antændes eller udløses (f.eks. ved
        hjælp af en lunte eller en elektrisk tændsats).
    firework_visual_intensity_level:
      name: Fyrværkeriets visuelle intensitetsniveau
      description: Den samlede visuelle intensitet/mængde af gnister i fontæneeffekten.
    firing_mode:
      name: Afyringsmetode
      description: Viser de valgbare eller primære affyringsmetoder, som airsoft-pistolen
        understøtter.
    first_day_cover_cachet_type:
      name: Stempeltype for førstedagsomslag
      description: Type mærke på førstedagsomslaget (f.eks. trykt eller håndmalet).
    first_day_cover_cancellation_type:
      name: Stempeltype på førstedagsomslag
      description: Poststemplets type/stil på førstedagsomslaget (f.eks. maskin- eller
        håndstempel).
    first_day_cover_set_type:
      name: Førstedagsomslagets sættype
      description: Angiver, om omslaget repræsenterer et enkelt nummer, et helt sæt
        eller en delmængde/kombination.
    fishing_hook_size:
      name: Fiskekrogstørrelse
      description: 'Angiver den standardiserede størrelsesbetegnelse for fiskekrogen
        (f.eks. #4, 1/0 eller 10/0), hvilket hjælper lystfiskere med at matche krogdimensioner
        til målart og agn.'
    fishing_hook_style:
      name: Fiskekrogsstil
      description: Beskriver den enkelte krogs specifikke udformning eller bøjningsmønster,
        hvilket har indflydelse på præsentationen, krogens effektivitet og de anvendelsesformål,
        den er beregnet til.
    fishing_hook_type:
      name: Fiskekrogstype
      description: Beskriver den medfølgende krogkonfiguration til fiskeskeen (hvis
        det er relevant).
    fishing_line_application:
      name: Påføring af fiskesnøre
      description: Identificerer den tilsigtede anvendelse af fiskesnøren eller forfangsmaterialet
        (f.eks. forfang, hovedline eller endeline).
    fishing_line_buoyancy_type:
      name: Fiskeline opdriftstype
      description: Angiver, hvordan linen opfører sig i vandsøjlen (f.eks. flydende,
        mellemliggende eller synkende), hvilket hjælper lystfiskere med at vælge den
        rette dybde.
    fishing_needle_purpose:
      name: Formål med fiskenålen
      description: Identificerer nålens primære anvendelse inden for fiskeudstyr.
    fishing_needle_types_included:
      name: Fiskenåltyper, der er inkluderet
      description: Viser de specifikke typer af nåle eller monteringsværktøjer, der
        følger med sættet, så kunderne hurtigt kan se, hvad sættet indeholder.
    fit_profile:
      name: Pasformsprofil
      description: Beskriver pudens overordnede snit og silhuet, som påvirker mobilitet
        og dækning.
    fit_volume_classification:
      name: Klassificering af pasformsvolumen
      description: Inddeler støvlernes samlede indvendige volumen efter mærkernes
        betegnelser (f.eks. LV for lav volumen).
    fitting_angle:
      name: Monteringsvinkel
      description: Angiver beslagets bøjningsvinkel (f.eks. lige, 45° eller 90°).
        Brug "Justerbar/drejelig" til beslag med variabel vinkel og "Andet" til usædvanlige
        vinkler.
    flag_base_type:
      name: Flagbasetype
      description: Definerer forankrings- eller basestilen, der bruges til at fastgøre
        hjørneflaget på forskellige spilleflader.
    flag_design_theme:
      name: Flagdesigntema
      description: Beskriver det primære motiv på flaget (f.eks. land/nationalt, sportshold,
        helligdag) og understøtter søgning og filtrering i forbindelse med målrettet
        shopping.
    flag_mounting_method:
      name: Monteringsmetode for flag
      description: Angiver, hvordan flaget fastgøres til køretøjet (f.eks. antennemontering,
        anhængertrækmontering eller magnetisk).
    flag_type:
      name: Flagtype
      description: Angiver golfflagets specifikke formål eller type, f.eks. knappenålsflag,
        golfvognsflag eller træningsflag.
    flame_resistance_standard:
      name: Flammemodstands-standard
      description: Angiver den specifikke standard/certificering for flammehæmmende
        eller lysbuehæmmende egenskaber, som beklædningsgenstanden opfylder.
    flamenco_cajon_snare_system:
      name: Flamenco cajon-snaresystem
      description: Angiver den indbyggede snare-mekanisme, der bruges til at skabe
        den karakteristiske flamenco-summen (eller ingen).
    flammability_compliance:
      name: Overholdelse af brandbarhedskrav
      description: Angiver de gældende brandfarlighedsstandarder, som stoffet opfylder
        i forbindelse med bilinteriører.
    flannel_brushing_finish:
      name: Flannelbørstet overflade
      description: Angiver, om flanellen er børstet, og på hvilke sider, hvilket har
        betydning for blødhed, varme og udseende.
    flannel_use_type:
      name: Anvendelse af flannel
      description: Den primære anvendelse af flannelstof/rulle.
    flap_configuration:
      name: Konfiguration af flap
      description: Angiver sadlens klaptype, såsom monoflap eller dobbeltklap.
    flare_color:
      name: Blusfarve
      description: Farven på det udsendte lys/flammen (eller linsefarven for LED-blus).
    flash_card_included_features:
      name: Inkluderede Flash-kort funktioner
      description: Fremhæver funktionelle lærings- eller anvendelsesfunktioner, der
        følger med flashkortene.
    flavor_intensity:
      name: Smagsintensitet
      description: Angiver hvor koncentreret smagsproduktet er, så brugeren kan vurdere
        den passende dosering (f.eks. standardstyrke eller ekstra koncentreret).
    flavor_solvent_base:
      name: Opløsningsbase for smagsstof
      description: Angiver den primære bærestof eller det opløsningsmiddel, der bruges
        i smagsstoffet (f.eks. alkohol, propylenglykol eller glycerin).
    fleece_fiber_animal_type:
      name: Fleecefiber dyretype
      description: Dyrearten, som fleecefiberen stammer fra.
    fleece_finish_surface:
      name: Fleecefinish/-overflade
      description: Beskriver fleeceens overflade eller finish (f.eks. fnugresistent
        eller børstet), hvilket påvirker fnugdannelse, blødhed og udseende.
    fleece_preparation_method:
      name: Forarbejdningsmetode for fleece
      description: Hvordan fleecen er klargjort eller forarbejdet til håndarbejde
        og spinding (fiberens tilstand).
    flesh_color:
      name: Frugtkødets farve
      description: Angiver melonens indvendige frugtkødsfarve.
    fletching_orientation:
      name: Fjerenes orientering
      description: Angiver hvordan fjerene er monteret på skaftet (f.eks. lige, forskudt
        eller spiralformet), hvilket påvirker pilens rotation og flyveegenskaber.
    fletching_profile:
      name: Fjerprofil
      description: Angiver fjerenes geometriske form eller udskæring, som påvirker
        luftmodstand, frigang, støj og pilens generelle flyveegenskaber.
    flight_system_type:
      name: Systemtype for fjer
      description: Angiver fjerens konstruktionsmetode og skelner mellem foldbare,
        støbte og integrerede fjer- og skaftsystemer.
    float_attachment_method:
      name: Fastgørelsesmetode for flåd
      description: Beskriver hvordan flåddet er fastgjort til linen (f.eks. glidende
        eller fastmonteret), så lystfiskere kan filtrere efter monteringsmetode.
    float_design:
      name: Flydedesign
      description: Klassificerer den overordnede type eller stil af fiskeflåd (f.eks.
        bobber, waggler, pencil), så lystfiskere hurtigt kan vælge en model, der passer
        til deres teknik og forhold.
    float_raft_use_environment:
      name: Brugsmiljø for flåde/raft
      description: Primært tilsigtet vandmiljø for den oppustelige enhed (pool, roligt
        åbent vand eller bølger), som afspejler krav til holdbarhed og design.
    floatation:
      name: Opdrift
      description: Angiver om signalenheden er beregnet til at flyde i vand.
    floor_construction_type:
      name: Gulvkonstruktionstype
      description: Angiver typen af raftens gulvkonstruktion (f.eks. selvdrænende
        eller drop-stitch), hvilket påvirker dræning, stivhed og ydeevne.
    floor_design:
      name: Gulvdesign
      description: Type af bunddække, der følger med indhegningen.
    floor_inclusion:
      name: Gulv inkluderet
      description: Angiver om forrummet (vestibulen) har gulv, og om gulvet er aftageligt.
    floor_mat_cleaning_method:
      name: Rengøringsmetode for gulvmåtte
      description: Angiver producentens anbefalede primære rengøringsmetode til gulvmåtten.
    floor_mat_edge_style:
      name: Kanttype på gulvmåtte
      description: Beskriver om måtten har hævede kanter/læbe til at holde på spild
        og snavs.
    floor_mat_format:
      name: Gulvmåttens form
      description: Definerer gulvbeskyttelsesproduktets fysiske form eller type (f.eks.
        enkeltmåtte, klikfliser eller rulle).
    floor_mat_retention_system:
      name: Fastgørelsessystem for gulvmåtte
      description: Angiver metoden, der bruges til at holde måtten fast på plads.
    floor_mat_set_configuration:
      name: Konfiguration af gulvmåttesæt
      description: Angiver hvilke positioner der er inkluderet i pakken (f.eks. kun
        forreste par eller et komplet sæt).
    floss_sugar_granulation_grade:
      name: Granulationsgrad for candyfloss-sukker
      description: Beskriver krystalstørrelsen i sukkerblandingen (fin, medium eller
        grov), hvilket kan påvirke maskinens ydeevne og den færdige tekstur.
    floss_sugar_product_form:
      name: Form for sukker til candyfloss
      description: Angiver om candyfloss-sukkeret er klar til brug, et smagskoncentrat
        der skal blandes med basissukker, eller et farveløst basissukker.
    flour_grind_texture:
      name: Formalingsgrad af mel
      description: Angiver melens formalingsgrad eller tekstur, såsom superfint, medium,
        groft eller stenmalt, hvilket kan påvirke opskriftens resultat.
    flour_processing_method:
      name: Forarbejdningsmetode for mel
      description: Angiver særlige forarbejdnings- eller behandlingsmetoder anvendt
        på melet (f.eks. stenmaling, blegning, spiret eller beriget), som påvirker
        smag, farve eller næringsindhold.
    flower_care_instructions:
      name: Plejevejledning til blomster
      description: Angiver anbefalede plejetiltag for friske afskårne blomster (f.eks.
        beskæring af stilke, hvor ofte vandet skal skiftes).
    flugelhorn_leadpipe_material:
      name: Materiale i flugelhornets mundrør
      description: Angiver materialet i klokkedelen (hvis det er specificeret separat
        fra instrumentets overordnede materiale).
    flugelhorn_trigger_type:
      name: Aftrækker-type for flugelhorn
      description: Angiver om flygelhornet har en stemmetrigger, og hvilken slide/ventil
        den betjener.
    fluorescence_grade:
      name: Fluorescensgrad
      description: Angiver diamantens fluorescensintensitet ved eksponering for UV-lys.
    fluorescence_under_uv:
      name: Fluorescens under UV
      description: Angiver om prøven udviser fluorescens under ultraviolet lys, og
        hvilken type det er.
    fluorocarbon_content:
      name: Indhold af fluorcarbon
      description: Angiver om voksen indeholder fluorcarbon-tilsætningsstoffer, og
        i hvilket niveau.
    flute_case_capacity:
      name: Kapacitet for fløjteetui
      description: Angiver hvad etuiet er beregnet til at rumme ud over selve fløjten
        (f.eks. fløjte + piccolo eller ekstra hovedstykke).
    flute_cleaning_rod_tip_type:
      name: Type af spids på rengøringsstang til fløjte
      description: Beskriver udformningen af stangenden, som holder kluden/swaben
        eller kommer i kontakt med instrumentet (f.eks. slids, gevind eller øje).
    flute_footjoint_type:
      name: Type af fløjtes fodstykke
      description: Angiver fløjtes fodstykkets konfiguration.
    flute_headjoint_cork_type:
      name: Type af kork i fløjtens hovedstykke
      description: Angiver materialet eller typen af kork-/stopperenhed i fløjtens
        hovedstykke.
    flute_key_system:
      name: Fløjtenøglesystem
      description: Angiver det mekaniske/klapsystem, som fløjten anvender (f.eks.
        Boehm-system), hvor relevant.
    flute_keywork_material:
      name: Materiale i fløjteklaviatur
      description: Materiale og/eller belægning på klapperne (mekanikken), når dette
        er angivet separat fra instrumentets hovedmateriale.
    flute_offset_g:
      name: Forskudt G på fløjte
      description: Angiver om fløjten har forskudt G-klaplayout.
    flute_wall_thickness:
      name: Vægtykkelse for fløjte
      description: Kategori for vægtykkelse på fløjtens rør (tyndvægget, standard
        eller kraftig væg).
    fly_pattern_type:
      name: Fluemønstertype
      description: Klassificerer den kunstige flue efter fiskestil eller efterligning
        af insekt/byttedyr, så lystfiskere hurtigt kan filtrere den rette fluetype.
    fly_rod_style:
      name: Type af fluestang
      description: Klassificerer stangen efter dens tilsigtede kastedisciplin eller
        anvendelse (f.eks. enhånds-, switch- eller spey-stang).
    fly_style:
      name: Lynlåstype
      description: Angiver typen af gylp eller frontåbning på langbukserne.
    fly_tying_tools_included:
      name: Medfølgende fluebinding-værktøjer
      description: Viser en liste over de specifikke fluebindingsværktøjer, der følger
        med sættet, så kunder kan se præcist, hvad der er inkluderet og sammenligne
        sæt.
    fly_type:
      name: Fluetype
      description: Angiver om langbukserne har en funktionel gylp, og hvilken type
        gylp det er.
    flyer_hook_mounting_method:
      name: Monteringsmetode for flyer-krog
      description: Angiver hvordan krogen fastgøres til flyer-delen (f.eks. skruefast
        eller press-fit), hvilket påvirker montering og kompatibilitet.
    flyer_hook_orientation:
      name: Retning af flyer-krog
      description: Angiver om krogen er beregnet til venstre eller højre side af flyer-delen,
        eller om den er vendbar/universel.
    flyer_kit_finish_coating:
      name: Finish/belægning på flyer-sæt
      description: Overfladefinish på komponenterne i flyer-sættet.
    flyer_kit_included_components:
      name: Medfølgende komponenter i flyer-sættet
      description: Angiver de dele der er inkluderet i sættet.
    flyer_orifice_type:
      name: Type af flyer-åbning
      description: Angiver typen af åbning på flyer-delen.
    flying_disc_feature_set:
      name: Funktionssæt for flyvende disk
      description: Bemærkelsesværdige funktionelle egenskaber ved den flyvende disk.
    flysheet_material:
      name: Materiale på oversejl
      description: Angiver det primære stof, der anvendes til yderdugen/oversejlet,
        og som påvirker vægt, holdbarhed og vejrbestandighed.
    flywheel_balance_type:
      name: Type af svinghjulsbalance
      description: Angiver om svinghjulet er neutralt afbalanceret eller bruger en
        ekstern ubalanceret vægt.
    foam_blocks_size_class:
      name: Størrelsesklasse for skumklodser
      description: Angiver den overordnede størrelsesklasse for klodserne i sættet.
    foam_blocks_surface_texture:
      name: Overfladetekstur på skumklodser
      description: Beskriver skumklodsernes ydre overflades fornemmelse/finish.
    foam_surface_effect:
      name: Overfladeeffekt på skum
      description: Beskriver almindelige dekorative overfladeeffekter på hobby- eller
        styroporskum, såsom glitter-, metallisk- eller holografisk finish.
    foil_color:
      name: Farve på folie
      description: Angiver foliens accentfarve på certifikatet (hvis relevant).
    foil_curtain_mounting_method:
      name: Metode til montering af folieforhæng
      description: Angiver hvordan folieforhænget er beregnet til at blive monteret
        eller ophængt (f.eks. klæbestrimmel eller øjer).
    foil_discipline:
      name: Foil-disciplin
      description: Angiver den primære disciplin eller anvendelse, som foilen er beregnet
        til.
    foil_mast_board_mounting_type:
      name: Monteringstype for foilmast på board
      description: Angiver monteringsfladen øverst på masten, som fastgøres til boardet
        eller foil-sporet.
    foil_mast_fuselage_connection_type:
      name: Type af forbindelse mellem foilmast og fuselage
      description: Angiver, hvordan masten forbindes til fuselagen eller frontvingens
        samling.
    foil_mounting_interface:
      name: Monteringsgrænseflade for folie
      description: Angiver den forbindelsesstandard, som delen bruger til at fastgøre
        til boardet eller andre foildele.
    foil_mounting_system:
      name: Foliemonteringssystem
      description: Angiver monteringssystemet for foils eller finner på boardet og
        sikrer kompatibilitet med brugerens eksisterende udstyr.
    foil_mounting_type:
      name: Foliemonteringstype
      description: Angiver det kontaktsystem, der bruges til at fastgøre foilen til
        boardet, og sikrer kompatibilitet mellem komponenterne.
    fold_over_elastic_application:
      name: Anvendelse af fold-over-elastik
      description: Primær tilsigtet anvendelse af knaphuls-elastik.
    foldability:
      name: Foldbarhed
      description: Beskriver om skillevæggen kan foldes eller klappes sammen til opbevaring
        eller omkonfigurering, og i givet fald hvordan.
    foldability_stow:
      name: Foldbarhed (opbevaring)
      description: Angiver om stativet kan foldes sammen eller klappes væk, når det
        ikke er i brug (f.eks. foldes op mod køretøjet).
    folding_style:
      name: Foldestil
      description: Angiver hvordan faldbeskyttelsesmåtten foldes til transport og
        opbevaring, hvilket påvirker ensartetheden af landingsfladen og hvor kompakt
        den kan pakkes.
    food_basket_items_included:
      name: Medfølgende dele til madkurv
      description: Viser en liste over de primære typer fødevarer, der er inkluderet
        i kurven, så kunder kan vælge kurve, der passer til modtagerens smag eller
        kostbehov.
    food_coloring_form:
      name: Form for fødevarefarve
      description: Angiver den fysiske form eller leveringsform, som fødevarefarven
        leveres i (f.eks. gel, flydende, pulver eller spray).
    food_contact_material:
      name: Materiale i kontakt med fødevarer
      description: Primært materiale i vinfremstillingsudstyr (fermenteringsbeholdere,
        sifoner, tragte) anvendt til most/vin.
    food_packing_medium:
      name: Opbevaringslage for fødevarer
      description: Angiver den lage, som frugt eller grøntsager opbevares i (f.eks.
        vand, saltlage, sukkerlage eller olie).
    foosball_rod_type:
      name: Type af bordfodbold-stang
      description: Angiver den mekaniske udformning af stangen, som påvirker spillets
        fornemmelse og sikkerhed.
    foot_arch_type_compatibility:
      name: Kompatibilitet med fodsvangstype
      description: Angiver den fodsvangsprofil indlægget er beregnet til.
    foot_arch_type_suitability:
      name: Egnethed for fodsvangstype
      description: Angiver den fodsvangsprofil indlægget er beregnet til at støtte.
    foot_coverage:
      name: Foddækning
      description: Angiver om benbeklædningen har fod, er uden fod, har stigbøjle,
        eller har åben hæl.
    foot_guard_type:
      name: Type af fodbeskyttelse
      description: Angiver om en benbeskytter har en tå-/fodkappe, og om denne er
        fastmonteret eller aftagelig.
    foot_support_level:
      name: Fodstøtteniveau
      description: Angiver graden af strukturel støtte eller fasthed, som et skoindlæg
        giver, f.eks. lav, medium, høj eller ekstra høj.
    footbag_play_style:
      name: Spillestil for footbag
      description: Primær tilsigtet spillestil for footbag’en.
    football_ball_type:
      name: Type af fodbold
      description: Angiver det primære tilsigtede anvendelsesformål eller kontekst
        for fodbolden, såsom kamp, træning eller samler-/udstillingsbrug.
    football_dummy_type:
      name: Type af træningsdummy
      description: Klassificerer dummyens stil eller funktionelle design for at afspejle
        dens specifikke træningsformål.
    football_glove_certification:
      name: Certificering af fodboldhandsker
      description: Angiver den certificering eller standardoverensstemmelse, der kræves
        til konkurrencespil (f.eks. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Monteringstype for fodplade
      description: Angiver, hvordan fodbrættet fastgøres til sengebunden eller gulvet,
        hvilket hjælper købere med at vælge kompatible beslag og installationsmetoder.
    footboard_style:
      name: Fodbrætstil
      description: Definerer fodbrættets strukturelle eller æstetiske designstil.
    footrest_adjustability:
      name: Justerbarhed for fodstøtte
      description: Angiver om og hvordan fodstøtterne kan justeres for at passe til
        forskellige børns benlængder.
    footrest_type:
      name: Type af fodstøtte
      description: Angiver om der er en fodstøtte på taburetten, og hvilken udformning
        den har.
    footstrap_configuration:
      name: Konfiguration af fodstropper
      description: Angiver mønstret for indsætning af fodstropper på boardets dækside.
    footswitch_action_style:
      name: Aktionsstil for fodkontakt
      description: Angiver, om kontaktens handling er øjeblikkelig eller fastlåsende,
        og om den understøtter begge dele.
    footswitch_power_source:
      name: Strømkilde for fodkontakt
      description: Angiver hvordan fodkontakten forsynes med strøm, hvis relevant
        (passivt via forstærkerindgang, batteri, ekstern adapter, USB osv.).
    footwear_construction_method:
      name: Fodtøjskonstruktionsmetode
      description: Angiver den teknik, der bruges til at fastgøre overdelen til sålen,
        hvilket påvirker holdbarhed, muligheder for omforsåling og pris.
    footwear_cut:
      name: Fodtøjets snit
      description: Angiver ankelkravens højde (lav, midt eller høj), som afvejer bevægelighed
        og støtte.
    footwear_size_system:
      name: Størrelsessystem for fodtøj
      description: Angiver den regionale størrelsesstandard, der anvendes for den
        angivne skostørrelse (f.eks. US, EU eller UK).
    footwear_support_type:
      name: Type af støtte i fodtøj
      description: Angiver den biomekaniske støtte eller graden af pronationskontrol,
        som skoen giver (f.eks. neutral, stabilitet eller motion control).
    fork_material:
      name: Materiale i forgaffel
      description: Angiver materialet, der anvendes til cyklens forgaffel, hvilket
        påvirker stivhed, vægt og kørekomfort.
    form_factor:
      name: Formfaktor
      description: Primær hardware-formfaktor for DMX-controlleren.
    formula_car_series_class:
      name: Serie/klasse for formelbiler
      description: Angiver den racerklasse eller serie, som formelbilen er bygget
        til at konkurrere i.
    formulation_style:
      name: Formulationsstil
      description: Fremhæver specialudviklede formuleringer til bestemte anvendelser
        eller præferencer (f.eks. barista, ekstra cremet).
    formulation_type:
      name: Formuleringstype
      description: Desinfektionssprayens formuleringstype.
    fossil_preparation_level:
      name: Forberedelsesniveau for fossil
      description: Grad af forberedelse/rensning udført på prøven (f.eks. uforberedt
        i matrix vs. fuldt forberedt).
    fossil_preservation_type:
      name: Bevaringstype for fossil
      description: Angiver typen af fossilbevaring (f.eks. permineraliseret, afstøbning,
        aftryk eller støbeform).
    fossil_restoration_status:
      name: Restaureringsstatus for fossil
      description: Angiver om og hvordan prøven er blevet repareret eller restaureret
        (f.eks. limet, rekonstrueret eller sammensat).
    foundation_configuration:
      name: Konfiguration af fundament
      description: Angiver om sengerammen/fundamentet er fremstillet som én samlet
        enhed eller som et opdelt/to-delt sæt til større madrasstørrelser.
    foundation_profile:
      name: Profil for fundament
      description: Klassificerer den samlede højde af fundamentet (f.eks. ultra-lav,
        lav, standard eller høj profil), så kunder hurtigt kan matche madras-højdepræferencer
        og lagenpasform.
    frame_adjustability:
      name: Rammejusterbarhed
      description: Angiver om og hvordan rammen kan justeres (f.eks. bredde-/højdejustering,
        rotation eller hældning), hvilket påvirker ergonomi og tilpasning.
    frame_drum_jingle_configuration:
      name: Konfiguration af bækkerelementer på rammetromme
      description: Angiver om rammetrommen har jingler, og i givet fald den overordnede
        konfiguration af disse.
    frame_drum_tuning_system:
      name: Stemmesystem for rammetromme
      description: Angiver hvordan rammetrommen stemmes, eller om den er stembar.
    frame_finish:
      name: Overfladefinish på ramme
      description: Angiver den beskyttende belægning eller overfladefinish, der er
        påført rammen, hvilket påvirker holdbarhed og æstetik.
    frame_mounting_standard:
      name: Standard for rammemontering
      description: Angiver specifikationen for støvle-til-ramme-tilslutningen (f.eks.
        195 mm 2-punkts eller Trinity 3-punkts), som er afgørende for kompatibilitet
        med rammen.
    frame_steel_gauge:
      name: Ståltykkelse for ramme
      description: Angiver tykkelsen (gauge) af stålrørene, der anvendes i stativets
        lodrette stolper, hvilket er en vigtig indikator for styrke og stabilitet.
    frame_suspension_type:
      name: Type af affjedring i ramme
      description: Angiver affjedringsdesignet for cykelrammen, såsom rigid, hardtail
        eller fuld affjedring, så kunder kan vælge rammer, der passer til deres ønskede
        opbygning.
    free_reed_instrument_orientation:
      name: Orientering af fritungeinstrument
      description: Angiver, hvordan instrumentet holdes/spilles (håndholdt med bælg,
        skulderrem osv.) af hensyn til ergonomi og filtrering efter brug.
    free_weight_rack_type:
      name: Type af frit vægtstativ
      description: Klassificerer stativets strukturelle type eller funktion (f.eks.
        vægtstangsstativ, kettlebell-stativ eller vægtskivestativ).
    freehub_body_type:
      name: Type af freehubbody
      description: Angiver den friløbsbody- eller kassettedriverstandard, som det
        bageste cykelnav er kompatibelt med.
    freehub_driver_standard:
      name: Freehub-driverstandard
      description: Angiver den kassette-/driverstandard, som navdelen er kompatibel
        med (f.eks. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Standard for friløbsgevind
      description: Angiver navets gevindstandard eller -størrelse, som friløbet er
        kompatibelt med.
    french_horn_bell_construction:
      name: Klokkekonstruktion på valdhorn
      description: Angiver hvordan klokken er konstrueret, og om den kan afmonteres
        til transport eller service.
    french_horn_bell_material:
      name: Materiale for valdhornets lydstykke
      description: Angiver materialet/legeringen i klokken (og ofte klokkens udsvaj),
        som bruges på valdhornet.
    french_horn_bell_type:
      name: Valdhornets klokketype
      description: Konstruktionsstil for klokken.
    french_horn_finish:
      name: Overfladefinish på valdhorn
      description: Udvendig overfladefinish/belægning på instrumentet.
    french_horn_included_accessories:
      name: Medfølgende tilbehør til valdhorn
      description: Tilbehør inkluderet med valdhornet (kuffert, mundstykke osv.).
    french_horn_leadpipe_material:
      name: Materiale i valdhornets mundrør
      description: Angiver mundrøret materiale/legering.
    french_horn_wrap_type:
      name: Indpakningstype for valdhornet
      description: Overordnet form og rørføring for valdhornet.
    fretboard_radius_fit:
      name: Tilpasning til gribebrættets radius
      description: Angiver om capodastroens pude-kurvatur er beregnet til flade eller
        buede gribebrætter, eller om den er justerbar til at passe til flere gribebrætsradier.
    friction_surface_included:
      name: Medfølgende friktionsflade
      description: Angiver, om svinghjulet har en udskiftelig/monteret friktionsflade
        (f.eks. indsats eller ring), eller om det er en integreret friktionsflade
        i ét stykke.
    fringe_curtain_finish:
      name: Frynsefinish på gardin
      description: Beskriver den visuelle finish på frynseoverfladen (glans/tekstur).
    fringe_curtain_material:
      name: Materiale i frynsegardin
      description: Angiver det primære materiale i forhængsstrimlerne (f.eks. PET-folie,
        plast, papir eller stof).
    fringe_curtain_use_location:
      name: Anvendelsessted for frynsegardin
      description: Angiver om frynsegardinet er beregnet til indendørs brug, udendørs
        brug eller begge dele.
    fringe_trim_style:
      name: Stil for frynsekanter
      description: Angiver konstruktionen/stilen af frynsekanter (hvordan tråde eller
        løkker er udformet og præsenteret).
    front_axle_standard:
      name: Standard for foraksel
      description: Angiver akseldiameter og indbygningsbredde, som forgaflen er beregnet
        til at passe til (f.eks. 15 x 110 mm Boost), for at sikre navkompatibilitet.
    front_button_configuration:
      name: Konfiguration af forknop
      description: Angiver jakkens frontknaplukning og stil, herunder om den er enkelt-
        eller dobbeltradet samt antallet af knapper foran.
    front_closure_style:
      name: Type af frontlukning
      description: Angiver frontdesignets stil på trenchcoaten, såsom enkelt- eller
        dobbeltradet, åben, slå-om eller med lynlås.
    front_decoration_type:
      name: Fronttypedesign
      description: Angiver typen af pynt eller mærkat på forsiden af hatten (f.eks.
        broderet patch, læderpatch).
    front_point_configuration:
      name: Konfiguration af frontpunkt
      description: Angiver designet af frontspidserne (én spids, to spidser, modulopbygget,
        udskiftelige), hvilket påvirker præcisionen ved kontakt med is og blandet
        terræn.
    front_seat_position:
      name: Forsædeposition
      description: Angiver hvilken side eller position på forreste række sædet er
        beregnet til.
    front_style:
      name: Frontdesign
      description: Beskriver frontdesignet på chinos, dvs. om bukserne har glat front,
        læg eller anden detaljering.
    frosting_or_icing_type:
      name: Type af glasur eller frosting
      description: Angiver typen af frosting eller glasur, der er på kagen eller dessertbaren.
    fruit_cultivar_or_variety:
      name: Frugtsort eller kultivar
      description: Angiver den specifikke kultivar- eller sortsbetegnelse for frugten
        (f.eks. Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Skærestil for frugt
      description: Beskriver hvordan frugten er tilberedt eller skåret (f.eks. hel,
        i skiver eller i tern).
    fruit_mix_variety:
      name: Type af frugtblanding
      description: Angiver navnet på den tematiserede blanding eller den overordnede
        variant af frugtblandingen (f.eks. tropisk mix, bærmix).
    fruit_piece_form:
      name: Frugtstykkers form
      description: Beskriver den fysiske udskæring eller præsentation af tørrede frugtstykker,
        f.eks. hele, skåret i skiver eller pulveriseret.
    fruit_snack_form:
      name: Frugtsnackform
      description: Klassificerer den fysiske form eller stil, som frugtsnacken er
        præsenteret i.
    fruit_topping_format:
      name: Frugttoppingens format
      description: Beskriver toppingens fysiske form, tekstur eller stil, så kunder
        kan vælge mellem f.eks. sauce, sirup, frugtstykker, sprængkugler osv.
    fruit_variety:
      name: Frugtvariant
      description: Angiver den primære frugt, der bruges i en frugtvin-opskrift/kit
        (f.eks. æble, kirsebær, brombær).
    fuel_cap_gasket_seal_material:
      name: Pakningsmateriale i brændstofdæksel
      description: Angiver materialet i pakningen/O-ringen, der anvendes til brændstofdækslet.
    fuel_cap_locking_mechanism:
      name: Låsemekanisme for brændstofdæksel
      description: Angiver den låsemekanisme, der anvendes i et låsbart brændstofdæksel.
    fuel_cap_type:
      name: Brændstofdækseltype
      description: Angiver den funktionelle type/design af brændstofdækslet, der anvendes
        til et køretøjs påfyldningsstuds.
    fuel_cap_venting:
      name: Ventilation i brændstofdæksel
      description: Angiver om brændstofdækslet er ventileret, og i givet fald hvilken
        type ventilation.
    fuel_filter_features:
      name: Brændstoffilterets funktioner
      description: Viser en liste over de væsentlige funktionelle egenskaber ved brændstoffilteret
        (f.eks. vandudskillelse, aftapningsventil, sensorport osv.).
    fuel_filter_media_material:
      name: Materiale i brændstoffilter
      description: Angiver det primære filtreringsmedie i brændstoffilterets filterelement.
    fuel_filter_mounting_connection_type:
      name: Monterings- og tilslutningstype for brændstoffilter
      description: Angiver hvordan brændstoffilteret tilsluttes og monteres (f.eks.
        gevind/spin-on, hurtigkobling, slangestuds eller banjobolt).
    fuel_injection_cleaning_method:
      name: Metode til rensning af brændstofindsprøjtningssystem
      description: Angiver hvordan sættet anvendes til at rense brændstofindsprøjtningssystemet.
    fuel_injector_electrical_connector_type:
      name: Elektrisk stiktype for brændstofinjektor
      description: Angiver standarden/formen på injektorens elektriske stik.
    fuel_injector_seat_type:
      name: Sædetype for brændstofinjektor
      description: Angiver tætningstypen mellem injektorspids og sæde ved indsugning/brændstofskinne.
    fuel_injector_spray_pattern:
      name: Brændstofinjektorens sprøjtemønster
      description: Angiver injektorens brændstofsprøjte- eller fordelingsmønster i
        producent- eller brancheterminologi (f.eks. kegle, vifte, nålestråle eller
        multihul).
    fuel_level_sensor_mounting_type:
      name: Brændstofniveausensorens monteringstype
      description: Angiver den fysiske monteringstype, der bruges til at fastgøre
        brændstofniveausensoren/-føleren til brændstoftanken eller pumpemodulet.
    fuel_level_sensor_sensing_mechanism:
      name: Brændstofniveausensorens målemekanisme
      description: Angiver den målemekanisme/-teknologi, der anvendes til at måle
        brændstofniveauet i en brændstofniveausensor eller -føler.
    fuel_line_compliance_standard:
      name: Brændstofslangens overholdelsesstandard
      description: Angiver den regulatoriske standard eller branchestandard, som brændstofslangen
        opfylder (almindeligt i båd- og marineudstyr).
    fuel_line_connector_interface_type:
      name: Tilslutningstype for brændstofslange
      description: Angiver tilslutnings-/koblingstypen i enden eller enderne af brændstofslangen
        eller tilslutningen.
    fuel_pressure_regulator_body_material:
      name: Materiale i brændstoftryksregulatorens hus
      description: Angiver materialet i regulatorens kabinet for holdbarhed og korrosionsbestandighed.
    fuel_pressure_regulator_mounting_type:
      name: Brændstoftryksregulatorens monteringstype
      description: Angiver hvordan brændstoftryksregulatoren monteres eller installeres,
        hvilket påvirker pasform og kompatibilitet.
    fuel_pump_inlet_type:
      name: Brændstofpumpens indløbstype
      description: Tilslutningstype ved pumpeindløbet.
    fuel_pump_mounting_location:
      name: Brændstofpumpens monteringsplacering
      description: Angiver hvor brændstofpumpen er installeret i eller på køretøjets
        brændstofsystem.
    fuel_pump_outlet_connection_type:
      name: Brændstofpumpens udløbstilslutningstype
      description: Angiver den fysiske tilslutningstype ved brændstofpumpens udløb
        for at sikre monterings- og installationskompatibilitet.
    fuel_system_application:
      name: Anvendelse i brændstofsystem
      description: Den brændstofsystemarkitektur, som brændstofpumpen er beregnet
        til at understøtte (f.eks. karburator, EFI, GDI eller lavtryks diesel-forsyningspumpe).
    fuel_system_connection_type:
      name: Brændstofsystemets tilslutningstype
      description: Angiver, hvilke standarder eller adapterinterfaces for brændstofsystemets
        tilslutning, sættet understøtter.
    fuel_system_type:
      name: Brændstofsystemtype
      description: Angiver motorens brændstofsystem (f.eks. karburator- eller indsprøjtningssystem).
    fuel_tank_installation_position:
      name: Brændstoftankens monteringsplacering
      description: Angiver den typiske monteringsplacering af brændstoftanken på køretøjet.
    fuel_tank_orientation:
      name: Brændstoftankens orientering
      description: Angiver om brændstoftanken er beregnet til at blive installeret
        vandret eller lodret.
    fuel_tank_shape:
      name: Brændstoftankens form
      description: Beskriver brændstoftankens overordnede formfaktor/form for at sikre
        korrekt pasform og kompatibilitet ved udskiftning.
    fur_type:
      name: Type af pels
      description: Angiver typen af pels eller kunstpels på ydersiden af muffe, clutch
        eller taske.
    furniture_finish:
      name: Overfladefinish på møbel
      description: Beskriver den overfladebehandling eller finish, der er anvendt
        på møblet, hvilket påvirker dets udseende og vedligeholdelseskrav.
    fuse_form_factor:
      name: Sikringsformfaktor
      description: Angiver typen af fysisk sikring/format for at sikre, at den passer
        til den tilsigtede sikringsholder eller sikringsblok (f.eks. bladskrue vs.
        patron).
    fuse_terminal_or_mount_style:
      name: Sikringsterminal- eller monteringstype
      description: Angiver hvordan sikringen tilsluttes mekanisk og elektrisk (f.eks.
        stik-/indsætningssikring, boltmonteret sikring eller ledningssikring).
    fusible_application_method:
      name: Påføringsmetode for klæbemiddel
      description: Angiver hvordan et smeltbart klæbemiddel aktiveres eller påføres
        (f.eks. strygejern/varme, presning eller syningsforstærkning).
    fusible_hem_tape_application_method:
      name: Metode til påføring af smeltebånd til oplægning
      description: Beskriver hvordan tapen aktiveres eller påføres (f.eks. med strygejern
        eller varmepres).
    fusible_seam_tape_activation_method:
      name: Metode til aktivering af smeltbar sømtape
      description: Angiver hvordan klæbemidlet aktiveres under påføring.
    fusible_seam_tape_application:
      name: Påføring af smeltebånd til sømme
      description: Angiver det primære anvendelsesområde for smeltebånd til sømme.
    fusible_seam_tape_material:
      name: Materiale i smeltebånd til sømme
      description: Materiale eller sammensætning af tapen/vævet/bæreren (ikke stoffer
        det bindes til).
    fusible_seam_tape_washability:
      name: Vaskbarhed for smeltebånd til sømme
      description: Angiver om den sammensmeltede søm forbliver intakt efter vask eller
        rensning.
    fusible_seam_tape_waterproof_rating:
      name: Klassificering af vandtæthed for smeltebånd til sømme
      description: Angiver om sømforseglingstapen er beregnet til at skabe en vandtæt
        eller vandafvisende samling efter påføring.
    fusible_tape_backing_type:
      name: Type af bæremateriale for smeltebånd
      description: Angiver om tapen har et slip-/beskyttelsespapir, og hvilken form
        det har, hvilket påvirker håndtering og påføring.
    futon_frame_conversion_mechanism:
      name: Futonrammens konverteringsmekanisme
      description: Definerer den mekanisme eller strukturelle udformning, der bruges
        til at omdanne rammen mellem sofa-, lounge- og sengestilling.
    gaiter_height_type:
      name: Højde på gamacher
      description: Klassificerer gamacher efter den højde, de dækker på benet, såsom
        ankel-, midt på læg-, knæ- eller lårhøje.
    game_variation:
      name: Spilvariation
      description: Angiver den spiltype eller spillestil, som sættet er beregnet til
        (f.eks. klassisk tennis med fastgjort bold, tennis med fastgjort bold eller
        speedball).
    garlic_preparation_style:
      name: Tilberedningsstil for hvidløg
      description: Angiver, hvordan hvidløget er tilberedt eller forarbejdet før salg
        (f.eks. helt, hakket eller pulveriseret).
    garlic_variety:
      name: Hvidløgssort
      description: Angiver den botaniske eller kommercielle sort/kultivar af hvidløg.
    garment_back_style:
      name: Rygdesign på beklædning
      description: Angiver rygdesign eller -snit på beklædningen (f.eks. åben ryg,
        bryderryg eller krydsryg).
    garment_pattern_type:
      name: Beklædningens mønstertype
      description: Angiver, hvilken type beklædningsgenstand symønsteret er beregnet
        til at fremstille.
    garnish_type:
      name: Type af garniture
      description: Angiver den garniture (ingrediens eller pyntetype) der bruges til
        at færdiggøre en cocktail.
    gas_lift_class:
      name: Klasse for gaslift
      description: Angiver sikkerheds- og styrkeklassen for gasløftcylinderen, der
        bruges til højdejustering af sæde.
    gas_propellant_type:
      name: Type af drivgas
      description: Angiver den type drivgas, der anbefales eller er kompatibel, når
        blasteren er gasdrevet.
    gatta_tabla_tuning_block_material:
      name: Materiale i gatta (tabla-stemmeklods)
      description: Materiale i stemmeklodserne (gatta), der bruges mellem stemmesnoren
        og trommeskallen.
    gauge_mounting_type:
      name: Målermonteringstype
      description: Angiver hvordan brændstofmåleren er monteret/installeret på vandfartøjet.
    gauge_style:
      name: Målerens design
      description: Angiver typen af trykmåler, som pumpen anvender, såsom analog urskive,
        digital visning eller ingen måler.
    gear_oil_api_classification:
      name: Gearoliens API-klassifikation
      description: API GL-klassifikation for gearolier anvendt i differentialer og
        manuelle gearkasser.
    gel_wax_density_grade:
      name: Gelvoksens densitetsgrad
      description: Angiver gelvoksens densitetsgrad, som påvirker klarhed, duftindhold
        og egnethed til indstøbninger.
    gel_wax_transparency_level:
      name: Gennemsigtighedsniveauet for gelvoks
      description: Beskriver gelvoksens klarhed eller opacitet ved anvendelse.
    gelatin_form:
      name: Gelatinens form
      description: Angiver gelatinenes fysiske form, så brugeren kan vælge den korrekte
        type til opskrifter og industrielle anvendelser.
    gelatin_or_gelling_agent_source:
      name: Gelatine-/geleringsmiddels oprindelse
      description: Angiver oprindelsen eller typen af geleringsmiddel i produktet,
        hvilket er vigtigt af hensyn til kost og religiøse forhold.
    gelatin_source:
      name: Gelatinens oprindelse
      description: Angiver gelatines animalske, vegetabilske eller syntetiske oprindelse,
        så kunder kan vurdere overensstemmelse med kostmæssige, etiske eller religiøse
        krav.
    gelling_agent:
      name: Type geleringsmiddel
      description: Angiver det primære stivelses-/fortykningsmiddel i desserten, som
        er vigtigt for kosthensyn og tekstur.
    gemstone_clarity_grade:
      name: Ædelstenens klarhedsgrad
      description: Ædelstenens klarhedsgrad (når den er gradinddelt).
    gemstone_creation_method:
      name: Ædelstenens dannelsesmetode
      description: Angiver om ædelstenen er naturlig, laboratoriedyrket eller en imitation/simulant.
    gemstone_cut_style:
      name: Ædelstenens slibestil
      description: Beskriver ædelstenens slibestil/finish.
    gemstone_treatment_status:
      name: Ædelstenens behandlingsstatus
      description: Angiver om og hvordan ædelstenen er blevet behandlet eller forbedret.
    geological_period:
      name: Geologisk periode
      description: Geologisk periode (og eventuelt epoke) for fossilet, hvis kendt
        (f.eks. Jura, Kridt, Eocæn).
    gift_box_tin_insert_type:
      name: Indsatstype til gaveæske/metalæske
      description: Indre indsatskonfiguration til organisering og beskyttelse af indholdet
        i æsken eller metalæske.
    gift_box_tin_sustainability_features:
      name: Bæredygtighedsfeatures for gaveæske/metalæske
      description: Bæredygtighedsrelaterede egenskaber ved gaveæske-/metalæskeemballagen.
    gift_box_tin_window_type:
      name: Gaveæske-/blikvinduestype
      description: Angiver om gaveæsken har et gennemsigtigt vindue, og hvilken type
        det er.
    gift_message_option:
      name: Mulighed for gavebesked
      description: Angiver om en gavebesked/-note kan inkluderes, og hvordan (ingen,
        inkluderet eller tilpasselig).
    ginger_maturity:
      name: Modningsgrad for ingefær
      description: Angiver ingefærens høststadie, såsom ung eller moden, hvilket påvirker
        smagsintensitet og anvendelse i madlavning.
    ginger_variety:
      name: Ingefærsvariant
      description: Angiver sort, type eller beslægtet rhizom inden for ingefærfamilien
        for at skelne mellem smagsprofiler og kulinariske anvendelser.
    glass_kiln_controller_type:
      name: Styringstype for glasovn
      description: Type af temperatur-/brændingsstyring, der følger med ovnen.
    glass_kiln_firing_application:
      name: Anvendelse i glasovn/brænding
      description: Primære glasarbejdsanvendelser, som ovnen er beregnet til.
    glass_stone_application_method:
      name: Metode til påføring af glassten
      description: Angiver hvordan glassten er beregnet til at blive fastgjort/anvendt
        i hobbyarbejder (f.eks. lim, hotfix eller påsyning).
    glass_tint:
      name: Farvetone i glas
      description: Glas-/plastfarvetonen på flasken, som bruges til at kontrollere
        lysindfald (typisk i brygning og vinproduktion).
    glaze_firing_atmosphere:
      name: Atmosfære ved glasurbrænding
      description: Den/de brændingsatmosfærer glasuren er beregnet til.
    glaze_opacity:
      name: Glasuropacitet
      description: Hvor transparent glasuren fremstår efter brænding.
    glaze_product_form:
      name: Glasurproduktform
      description: Den fysiske form, som glasurproduktet leveres i (f.eks. væske,
        pulver, koncentrat eller spray).
    glider_avionics_package:
      name: Avionikpakke til svævefly
      description: Angiver det overordnede niveau af navigation og flyinstrumentering,
        der er installeret i svæveflyet.
    glider_certification_rating:
      name: Svæveflyets certificeringsklassifikation
      description: Officiel certificeringsklasse, der angiver svæveflyets sikkerheds-
        og ydeevneniveau (f.eks. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Svæveflyets landingsudstyrskonfiguration
      description: Angiver den landingsudstyrskonfiguration, som svæveflyet anvender.
    glider_launch_method:
      name: Svæveflyets startmetode
      description: Angiver, hvordan svæveflyet normalt bliver opsendt, eller om det
        kan starte selv.
    glider_performance_class:
      name: Svæveflyets ydeevneklasse
      description: Konkurrence-/ydeevneklasse eller kategori, der ofte anvendes for
        svævefly.
    glitter_application_method:
      name: Påføringsmetode for glitter
      description: Angiver den tilsigtede teknik til påføring/brug af hobbyglimmer
        (f.eks. drys/shaker, blandes i, gnides på, påføres over lim, pensles på, sprayes
        på eller varmefikseres/embosseres).
    glitter_eco_friendly_claim:
      name: Glitteret markedsføres som miljøvenligt
      description: Miljø- og bæredygtighedsoplysninger specifikke for løse glimmer-formuleringer.
    glitter_effect_type:
      name: Type af glimmereffekt
      description: Beskriver den visuelle effekt af glimmer/pailletter ud over basisfarven
        (f.eks. holografisk, iriserende).
    glitter_glue_base_solvent_type:
      name: Typen af base eller opløsningsmiddel i glitterlimen
      description: Beskriver den primære base i glimmerlimen (en vigtig faktor for
        rengøring og materialekompatibilitet).
    glitter_opacity_coverage:
      name: Opacitet/dækning for glimmer
      description: Angiver hvor uigennemsigtig glimmereffekten fremstår efter påføring.
    glitter_use_suitability:
      name: Glimmers anvendelsesegnethed
      description: Angiver glimmerpulverets tilsigtede anvendelsesområde og godkendelse
        (f.eks. hobby, kosmetik eller fødevarer).
    glove_armor_placement:
      name: Placering af handskebeskyttelse
      description: Angiver, hvor beskyttende forstærkning er placeret på handsken.
    glove_cuff_length:
      name: Længde på handskemanchet
      description: Angiver længden og typen af manchetdækning på en racinghandske
        ved håndled/underarm.
    glove_finger_coverage:
      name: Dækning af handskefinger
      description: Beskriver graden af fingerdækning, som handsken giver, fra fuldfinger-
        til fingerløse designs.
    glove_finger_design:
      name: Handskefingerdesign
      description: Angiver handskens fingerkonfiguration, såsom femfinger- eller vante-design.
    glove_fit_profile:
      name: Handskens pasformsprofil
      description: Beskriver handskens indvendige form og overordnede silhuet, så
        spillere kan vælge den fornemmelse/pasform, de foretrækker.
    glove_insulation:
      name: Isolering i handske
      description: Angiver handskens isolering/termiske konstruktion eller opvarmning
        (f.eks. isoleringsniveau, foring-/isoleringsteknologi eller opvarmet type).
    glove_palm_material:
      name: Materiale i handskens håndflade
      description: Angiver det primære materiale, der bruges på handskens håndflade
        (den primære kontakt-/grebsflade), som kan afvige fra oversiden af handsken.
    glove_size:
      name: Handskestørrelse
      description: Angiver den generelle håndstørrelse, som sandsækhandskerne er beregnet
        til, ofte angivet med beklædningsstørrelser eller ungdomsstørrelser.
    glove_webbing_style:
      name: Handskens nettype
      description: Definerer udformningen af handskens net eller lomme, hvilket påvirker
        boldkontrol, positionsegnethed og spillerpræference.
    glow_effect:
      name: Glødeffekt
      description: Angiver om gelkuglerne har selvlysende eller sporlys-egenskaber
        til spil i svagt lys.
    glow_plug_connector_type:
      name: Gløderørets tilslutningstype
      description: Elektrisk terminal-/tilslutningstype på gløderøret, som bruges
        til tilslutning til køretøjets ledningsnet.
    glow_plug_heating_element_type:
      name: Typen af gløderørets varmeelement
      description: Type/teknologi for varmeelementet i gløderøret.
    glue_application_format:
      name: Limens påføringsformat
      description: Angiver den applikator-/dispenseringsform, der bruges til at påføre
        skolelim.
    glue_applicator_type:
      name: Type limapplikator
      description: Angiver typen af indbygget applikator-/dispenseringsspids, der
        bruges til påføring af flydende lim.
    glue_base_formulation:
      name: Limens baseformulering
      description: Angiver den primære kemiske basis/formulering i flydende hobbylim
        (for ydeevne, sikkerhed og rengøringsforhold).
    glue_gun_nozzle_style:
      name: Dysetype til limpistol
      description: Angiver den fysiske udformning af limpistolens dysespids, som påvirker
        påføringspræcisionen og limdækningen.
    glue_safety_standard:
      name: Sikkerhedsstandard for lim
      description: Angiver om limen er giftfri/børnesikker i henhold til mærkning
        og gængse standarder.
    goal_frame_material:
      name: Materiale på målramme
      description: Angiver materialet i målstolperne/-rammen, som påvirker vægt, bærbarhed
        og vejrbestandighed.
    goal_size:
      name: Målstørrelse
      description: Klassificerer et fodboldmål i almindelige størrelsesgrupper til
        kamp eller træning, så det er lettere at vælge end ud fra de præcise mål alene.
    goal_size_classification:
      name: Størrelsesklassificering for mål
      description: Angiver målets standardiserede størrelsesklasse (f.eks. officiel
        fuldstørrelse, ungdom eller mini), så brugere hurtigt kan vælge udstyr, der
        passer til deres spilleniveau.
    goal_size_standard:
      name: Standard for målstørrelse
      description: Angiver hvilken officiel standard eller aldersgruppe målet opfylder
        (f.eks. World Aquatics-reglement eller 12U).
    goalie_configuration:
      name: Konfiguration af målmand
      description: Angiver antallet af målmænd pr. side på bordet (amerikansk 3-målmandsstil
        eller europæisk 1-målmandsstil).
    goalie_playing_surface:
      name: Målmands spilleoverflade
      description: Angiver den primære spilleoverflade eller det miljø, som hockeymålmandsudstyrssættet
        er beregnet til.
    goalkeeper_glove_cut:
      name: Udskæring i målmandshandske
      description: Angiver målmandshandskernes håndflade-/fingerkonstruktion (snit),
        som påvirker pasform, boldføling og kontrol.
    goalkeeper_training_aid_type:
      name: Hjælpemiddelstype til træning af målmand
      description: Angiver typen af målmandstræningsredskab, så det bliver lettere
        at filtrere præcist.
    goblet_drum_playing_style:
      name: Spillestil for bægertromme
      description: Angiver om instrumentet primært er beregnet til at blive spillet
        med hænderne eller med stikker/køller.
    gobo_format:
      name: Gobo-format
      description: Angiver goboens størrelse/standard, som projektoren er kompatibel
        med (diameter og tykkelsesklasse), så den er kompatibel med udskiftnings-
        eller specialdesignede gobos.
    gobo_root_variety:
      name: Plantesort af gobo-rod
      description: Angiver den specifikke sort eller kultivar af gobo (kardborre-rod).
    gobo_rotation:
      name: Gobo-rotation
      description: Angiver om goboen kan rotere, og hvilken retning der understøttes.
    goggle_accessory_type:
      name: Tilbehørstype for beskyttelsesbriller
      description: Klassificerer typen af tilbehør (f.eks. cover, etui eller rem),
        så kunder kan filtrere det brede produktsortiment inden for denne overordnede
        kategori.
    goggle_features:
      name: Egenskaber ved beskyttelsesbriller
      description: Viser en liste over de særlige funktionelle eller designmæssige
        egenskaber ved beskyttelsesbriller.
    goggle_fit_design:
      name: Pasformsdesign for beskyttelsesbriller
      description: Beskriver hvordan beskyttelsesbrillerne er designet til at sidde
        eller bæres, herunder kompatibilitet med OTG (over briller).
    goggle_gasket_material:
      name: Pakningsmateriale for beskyttelsesbriller
      description: Materiale i den tætning, der sidder mod ansigtet, som påvirker
        komfort, risiko for allergiske reaktioner og evnen til at forhindre lækage.
    goggle_integration:
      name: Integration af beskyttelsesbriller
      description: Angiver om hjelmen er beregnet til at kunne bruges sammen med beskyttelsesbriller
        og/eller har integrerede funktioner til fastholdelse af brillerne.
    goggle_lens_shape:
      name: Form på beskyttelsesbriller
      description: Definerer krumningsprofilen for erstatningslinsen, hvilket påvirker
        forvrængning og synsfelt (f.eks. cylindrisk, sfærisk, torisk).
    goggle_lens_tint:
      name: Farvetoning af brilleglas
      description: Definerer farvetoning eller finish på brilleglasset, som påvirker
        lysgennemgang, farveopfattelse og det visuelle udtryk.
    goggle_strap_material:
      name: Materiale i beskyttelsesbrillerstrop
      description: Primært materiale, der bruges til hovedstroppen, som påvirker holdbarhed
        og komfort.
    golf_accessory_set_purpose:
      name: Formål med golftilbehørssæt
      description: Angiver det primære tilsigtede brug eller tema for golftilbehørssættet.
    golf_bag_style:
      name: Type af golfbag
      description: Angiver den primære design- eller anvendelsestype for golfbagen
        (f.eks. standbag, vognbag eller tourbag).
    golf_ball_alignment_design:
      name: Design til justering på golfbold
      description: Angiver eventuelle indbyggede visuelle sigtehjælpemidler, der er
        trykt eller støbt på boldens overflade.
    golf_ball_construction:
      name: Golfboldkonstruktion
      description: Angiver antallet af lag/dele i golfboldens konstruktion, som påvirker
        spin, fornemmelse og længde.
    golf_ball_cover_material:
      name: Materiale i golfboldens yderste skal
      description: Angiver golfboldens materiale i yderlaget, som påvirker spin, holdbarhed
        og føling.
    golf_cart_cover_climate_use:
      name: Klimabrug for golfvognsovertræk
      description: Angiver de primære klima- eller årstidsforhold, som opbevaringsovertrækket
        er beregnet til at modstå.
    golf_cart_enclosure_fit_type:
      name: Pasformstype for golfvognsovertræk
      description: Angiver, om kabinettet er designet til et specifikt sædeantal/formfaktor
        eller tilbyder en universel/justerbar pasform.
    golf_cart_intended_use:
      name: Tilsigtet anvendelse af golfvogn
      description: Primært tilsigtet anvendelsesområde for golfvognen, som den er
        beregnet eller tilpasset til.
    golf_club_number:
      name: Golfkøllenummer
      description: Angiver det specifikke nummer eller wedge-betegnelse, der er trykt
        på køllen (f.eks. 5, PW, GW).
    golf_club_part_type:
      name: Type af golfkølle-del
      description: Kategoriserer golfkølle-tilbehør eller komponent i almindelige
        undertyper (f.eks. adapter-sleeve, ferrule eller vægt).
    golf_grip_size:
      name: Størrelse på golfgreb
      description: Angiver golfgrebets overordnede størrelseskategori, som beskriver
        hvor tykt grebet føles i hånden.
    golf_shoe_spike_type:
      name: Type af golfskospikes
      description: Angiver hvilken type grebssystem der bruges på ydersålen af golfsko
        (f.eks. med spikes eller uden spikes).
    golf_tee_style:
      name: Golf tee-stil
      description: Beskriver golf-tee’ens strukturelle eller funktionelle design,
        som påvirker boldens højde, holdbarhed eller reduktion af spin.
    golf_training_focus:
      name: Fokusområde for golftræning
      description: Klassificerer den primære færdighed eller det aspekt, som produktet
        har til hensigt at forbedre.
    golf_training_objective:
      name: Mål med golftræning
      description: Angiver den primære golffærdighed eller det aspekt, som træningshjælpemidlet
        er designet til at forbedre.
    gong_profile_type:
      name: Profiltype for gong
      description: Beskriver opera-gongens fysiske profil (f.eks. flad eller med hævet
        centrum), som i høj grad påvirker klang og spillestil.
    grading_scale:
      name: Graderingsskala
      description: Graderingsskalaen for en graderet bullion-mønt (f.eks. Sheldon
        1–70).
    grading_service:
      name: Graderingsservice
      description: Tredjeparts gradering- og certificeringsservice for mønten eller
        pengesedlen (f.eks. PCGS, NGC).
    graduation_increment:
      name: Gradueringsinterval
      description: Angiver den mindste trykte/indgraverede inddeling på sømmålerens
        skala (skalaens opløsning).
    grain_processing_method:
      name: Forarbejdningsmetode for korn
      description: Angiver den primære forarbejdningsmetode, der er anvendt på kornet
        (f.eks. parboiled, valset eller spiret), som påvirker tilberedningstid, tekstur
        og ernæringsindhold.
    grand_piano_soundboard_material:
      name: Materiale for flygels klangbund
      description: Angiver det primære materiale i klaverets resonansbund, som påvirker
        klang og holdbarhed.
    grappling_dummy_pose:
      name: Position på grappling-øvedukke
      description: Beskriver dukkens standard kropsposition/stilling, som bestemmer
        hvilke øvelser og teknikker den egner sig til.
    grease_application:
      name: Påføring af fedt
      description: Angiver det primære køretøjskomponent eller anvendelsesområde,
        som olien er beregnet til.
    grease_consistency_grade_nlgi:
      name: Konsistensgrad for fedt (NLGI)
      description: Angiver NLGI-konsistensnummeret, som beskriver fedtets fasthed
        (f.eks. er NLGI 2 et almindeligt universalfedt).
    grease_thickener_type:
      name: Fortyknertype i fedt
      description: Angiver den fortyknings- eller sæbesystemtype, der anvendes i fedtets
        formulering.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Type ventil i mundrør på Great Highland-sækkepibe
      description: Angiver den tilbageslagsventil, der anvendes i mundrøret.
    great_highland_bagpipes_drone_configuration:
      name: Konfiguration af bordunrør på Great Highland-sækkepibe
      description: Angiver de typer bordunrør, der indgår i sættet.
    great_highland_bagpipes_mounting_material:
      name: Monteringsmateriale for Great Highland-sækkepibe
      description: Angiver materialet i de dekorative beslag på sækkepiben (f.eks.
        nikkelsølv, imiteret elfenben).
    greens_maturity_stage:
      name: Modningsstadie for grøntsager
      description: Angiver grøntsagernes udviklingsstadie på høsttidspunktet.
    greens_preparation_state:
      name: Grøntsagernes forberedelsestilstand
      description: Beskriver hvordan bladgrøntsagerne er forarbejdet eller pakket
        (f.eks. skyllede, hakkede eller klar til brug).
    grenade_effect_type:
      name: Type af granateffekt
      description: Angiver den primære funktionelle effekt, som paintball-granaten
        producerer ved aktivering (f.eks. røg, maling eller flashbang).
    grid_unit:
      name: Gitterenhed
      description: Angiver det primære målesystem, der er trykt på måtten (hvis der
        findes et gitter eller en skala).
    grille_emblem_provision:
      name: Mulighed for emblem på frontgrill
      description: Angiver om frontgrillen er kompatibel med OEM-emblem/monogram og
        hvordan det monteres.
    grille_mounting_method:
      name: Monteringsmetode for gitter
      description: Angiver hvordan frontgrillen monteres på køretøjet (f.eks. direkte
        udskiftning eller indsats/overlay; bolt-on eller clips/snap; kræver boring
        eller uden boring).
    grille_style:
      name: Gitterstil
      description: Angiver det visuelle design eller stil på køretøjets frontgrill.
    grip_chalk_form:
      name: Form af gribekridt
      description: Angiver den fysiske form af kridtet, der leveres eller bruges med
        posen.
    grip_coverage:
      name: Dækning af greb
      description: Angiver om og hvor der er silikone- eller gummigreb på sokken.
    grip_design:
      name: Grebsdesign
      description: Angiver håndtags- eller hulkonfigurationen i vægtskiven for at
        skabe lettere håndtering og større alsidighed i træningssituationer.
    grip_enhancer_effect:
      name: Effekt af grebsforbedring
      description: Beskriver den primære funktionelle egenskab, som produktet giver
        (f.eks. fugtabsorption eller klæbrig harpiksfinish).
    grip_enhancer_form:
      name: Grebsforstærkerform
      description: Angiver den fysiske form eller produkttype for det grebsforbedrende
        produkt, så atleter kan vælge den passende påføringsmetode.
    grip_features:
      name: Grebsfunktioner
      description: Angiver indbyggede grebs- eller håndtagsfunktioner, der er beregnet
        til at forbedre greb, komfort eller kontrol under spil.
    grip_material:
      name: Grebsmateriale
      description: Angiver materialet, der bruges til buksernes grebsoverflade.
    grip_shape:
      name: Grebsform
      description: Beskriver grebets tværsnitsform eller stil, særligt relevant for
        puttergreb.
    grip_surface_type:
      name: Greboverfladetype
      description: Beskriver pedalfladens mønster-/grebsoverfladedesign, som påvirker
        greb og fornemmelse.
    grip_tackiness_level:
      name: Niveau af klæbrighed i grebet
      description: Angiver hvor klæbrig grebsoverfladen er, så spillere kan vælge
        mellem en tør fornemmelse og ultraklæbende kontrol.
    grip_tape_form:
      name: Form af grebstape
      description: Angiver leveringsformen for grebstape-produktet (f.eks. ark, rulle
        eller spray-on-sæt).
    grip_wax_form:
      name: Form af grebsvoks
      description: Klassificerer den fysiske form, som grebsvoksen sælges i.
    gripper_coverage:
      name: Skodækning
      description: Angiver typen af greb på den skridsikre sko, herunder dækningsgrad
        på overfladen og om det er aftageligt.
    grommet_application_material:
      name: Materiale til montering af øjer
      description: Angiver de primære materialer, som øjerne er beregnet til at blive
        monteret i (f.eks. stof, læder, vinyl eller presenning/canvas).
    grommet_duty_rating:
      name: Belastningsgrad for øjer
      description: Angiver den tiltænkte belastningsklasse for øjer.
    grommet_style:
      name: Type af øje
      description: Angiver konstruktionstypen for øjesættet og hvordan det er samlet
        eller anvendes.
    grooming_glove_texture_type:
      name: Tekstur af plejehandske
      description: Angiver den primære overfladetekstur til pleje og rengøring og
        viser, om den er beregnet til skrubning, polering eller vask.
    groove_orientation:
      name: Rilleretning
      description: Angiver retningen eller layoutet af riller eller forhøjninger på
        instrumentet.
    groove_sampler_onboard_effects:
      name: Indbyggede effekter i groove-sampler
      description: Angiver de kategorier af indbyggede effekter, der er tilgængelige
        i groove-sampleren (insert/master), såsom rumklang, delay, kompression, distortion,
        EQ og filtrering.
    groove_sampler_storage_expansion_type:
      name: Type af lagringsudvidelse til groove-sampler
      description: Angiver understøttede aftagelige eller udvidelige lagringsmuligheder
        for groove-sampleren.
    ground_attachment_method:
      name: Fastgørelsesmetode for jordforbindelse
      description: Beskriver hvordan pasningsbuen fastgøres til spillefladen, hvilket
        påvirker stabilitet og kompatibilitet med underlaget.
    groupset_components_included:
      name: Gruppesætkomponenter medfølger
      description: Angiver de specifikke drivlinjekomponenter, der indgår i gruppesættet,
        så kunder kan se, hvad pakken indeholder.
    gt_racing_class:
      name: GT-racerklasse
      description: Angiver den GT-kategori/klasse, som bilen er bygget eller homologeret
        til.
    guard_construction_type:
      name: Skærmkonstruktionstype
      description: Angiver om beskyttelsen er en hård skalbeskytter, en blød beskyttelsesindsats
        eller et ærme-/stropbaseret design.
    guard_size_measurement_basis:
      name: Målgrundlag for beskyttelsesstørrelse
      description: Angiver hvilket mål størrelsen er baseret på (f.eks. albueomkreds,
        håndledsomkreds eller underarmsomkreds).
    guard_style:
      name: Beskyttelsesstil
      description: Klassificerer konstruktionen eller typen af skøjtebladbeskytter,
        så kunder hurtigt kan skelne mellem hårde gåbeskyttere, bløde bladbeskyttere,
        fjederbelastede beskyttere og andre designs.
    guava_flesh_color:
      name: Farve på guavafrugtkød
      description: Angiver farven på guavafrugtens indre frugtkød.
    guava_variety:
      name: Guavavariant
      description: Angiver den specifikke kultivar eller markedssort af guava, der
        sælges (f.eks. æbleguava, Mexican Cream, thai, pink eller kernefri).
    guide_material:
      name: Føringsmateriale
      description: Materiale anvendt til fiskestangens lineføring eller indsatser.
    guide_type:
      name: Type af lineføring
      description: Angiver typen af lineføringer monteret på fiskestangen, såsom enkeltben,
        rulle eller slangeringe.
    guideline_markings:
      name: Markeringer til lineføring
      description: Angiver typen af visuelle justeringsmarkeringer, der er trykt eller
        indlagt på pitching-måttens overflade for at hjælpe med pitching-øvelser.
    guiro_scraper_material:
      name: Materiale i guiro-skraber
      description: Materiale i den medfølgende eller anbefalede skraber/pind, der
        bruges til guiroen.
    guiro_surface_style:
      name: Overfladestil på guiroen
      description: Beskriver mønsteret/geometrien på spilleoverfladen, som skrabes
        for at frembringe lyd.
    guitar_body_finish_type:
      name: Typen af finish på guitarens krop
      description: Angiver den finish, der anvendes på guitarens krop.
    guitar_bridge_system_type:
      name: Type af bro-system på guitar
      description: Designtypen for bro- og strengholder-systemet for at sikre kompatibilitet
        og gøre det lettere at browse.
    guitar_case_style:
      name: Type af guitarkasse
      description: Angiver den overordnede beskyttelses- og konstruktionsstil for
        guitarkassen eller den bløde guitartaske.
    guitar_humidifier_placement:
      name: Placering af guitarbefugter
      description: Angiver hvor befugteren er beregnet til at blive anvendt eller
        placeret i forhold til instrumentet eller omgivelserne.
    guitar_pedal_i_o_configuration:
      name: Guitarpedal I/O-konfiguration
      description: Angiver om pedalen er kompatibel med mono- eller stereo ind- og
        udgangsrouting.
    guitar_pedal_output_connector_type:
      name: Type af udgangsstik på guitareffektpedal
      description: Angiver den type lydudgang, der bruges af pedalen.
    guitar_slide_finish:
      name: Finish for slide til guitar
      description: Overfladefinish på guitarsliden, som påvirker fornemmelse og friktion
        mod strengene.
    guitar_slide_style:
      name: Guitarslidestil
      description: Angiver formfaktoren for guitarsliden eller tonebaren og hvordan
        den bæres eller anvendes.
    guitar_stand_type:
      name: Type af guitarstativ
      description: Angiver guitarstativets primære formfaktor (hvordan det holder
        eller opbevarer guitaren).
    guitar_strap_attachment_type:
      name: Type fastgørelse af guitarrem
      description: Angiver hvordan remmen fastgøres til guitaren (eller remknapperne),
        herunder om den bruger traditionelle endestykker eller hurtigudløsning-systemer.
    guitar_strap_end_material:
      name: Materiale i guitarrens remender
      description: Materiale anvendt i remmens ender/fastgørelsesstykker (de dele,
        der monteres på remknapper eller remlås-systemer).
    guitar_strap_features:
      name: Guitarremmens funktioner
      description: Bemærkelsesværdige funktionelle egenskaber ved guitarrremmen ud
        over grundlæggende størrelse/materiale (flere valg).
    guitar_string_coating:
      name: Belægning på guitarstrenge
      description: Angiver om strengene har en beskyttende belægning, og i givet fald
        hvilken type belægning.
    guitar_string_gauge_type:
      name: Type af strengtykkelse til guitar
      description: Den markedsførte tykkelseskategori for et sæt akustiske guitarstrenge
        (f.eks. ekstra let, let, medium). Ofte angivet ud fra den høje E-strengs tykkelse;
        de præcise tykkelsesintervaller kan variere fra producent til producent.
    guitar_string_set_gauge_category:
      name: Tykkelseskategori for guitarsæt
      description: Almindelige markedsførte tykkelseskategorier for et sæt guitarstrenge
        (typisk baseret på den høje E-streng / 1. streng).
    guitar_string_winding_type:
      name: Type af omspinding på guitarstrenge
      description: Angiver den ydre omspindingsstil på omviklede strenge i sættet.
    guitar_tuning_peg_button_shape:
      name: Form på knop til guitarens stemmeskrue
      description: Form/stil på knoppen til stemmeskruen.
    guitar_tuning_peg_configuration:
      name: Konfiguration af stemmeskruer på guitar
      description: Layout af stemmeskruer på guitarens hoved.
    guitar_tuning_peg_mounting_style:
      name: Monteringsstil for stemmeskrue til guitar
      description: Hvordan stemmeskruen monteres på guitarens hoved, herunder type
        af bøsning og metode til at forhindre rotation.
    guitar_tuning_peg_shaft_type:
      name: Type af aksel i stemmeskrue
      description: Angiver om strengepinden er massiv eller delt, samt hvordan strengen
        fastgøres.
    guitar_tuning_peg_style:
      name: Stemmeskruestil for guitar
      description: Den fysiske type af stemmemekanisme og monteringsformat på instrumentets
        hoved (f.eks. lukket gear, åbent gear, låsende eller slidsestolpe).
    gum_condition:
      name: Gummitilstand
      description: Tilstand for frimærkets gummi på bagsiden (f.eks. ubrugt uden hængsel,
        med hængsel eller uden gummi).
    gun_action_type:
      name: Skydemekanismetype
      description: Mekanisk funktionstype brugt til at lade/affyre (f.eks. boltlås,
        levermekanisme).
    gun_operational_status:
      name: Våbnets operationelle status
      description: Angiver om samlervåbnet er deaktiveret/ikke-funktionsdygtigt (og
        hvordan det præsenteres).
    gun_type:
      name: Våbentype
      description: Angiver den generelle våbentype/formfaktor for det antikke skydevåben.
    gusset_material:
      name: Kilemateriale
      description: Angiver materialet i skridt-/kileforingen, hvilket påvirker åndbarhed,
        hygiejne og komfort.
    gymnastics_discipline:
      name: Gymnastikdisciplin
      description: Angiver den gymnastikgren produktet er beregnet til (f.eks. artistisk
        gymnastik, rytmisk gymnastik eller akrobatisk gymnastik).
    hair_extension_texture:
      name: Tekstur på hårforlængelser
      description: Beskriver krøl-, bølge- eller teksturmønsteret i hårforlængelserne.
    hair_net_style:
      name: Hårnetsstil
      description: Angiver hårnettets design eller konstruktionstype (f.eks. rummeligt
        hårnet, snood eller hårknoldsovertræk).
    hair_quality_grade:
      name: Grad af hårkvalitet
      description: Angiver hårets kvalitets- eller oprindelsesbetegnelser i branchen.
    halter_style:
      name: Halterneck-stil
      description: Angiver grimens funktionelle eller designmæssige stil (f.eks. rebgrime,
        sikkerhedsgrime eller showgrime), så kunder kan vælge en grime, der passer
        til det ønskede formål.
    hammock_style:
      name: Hængekøjestil
      description: Beskriver hængekøjeens struktur eller konstruktion.
    hand_and_foot_coverage:
      name: Hånd- og foddækning
      description: Beskriver integrerede eller aftagelige vanter og futter, der dækker
        hænder og/eller fødder.
    hand_cymbal_set_configuration:
      name: Konfiguration af håndbækkensæt
      description: Angiver om produktet sælges som et matchet par, en enkelt bækken
        eller et større sæt.
    hand_drum_head_material:
      name: Materiale i trommeskind på håndtromme
      description: Materialet til trommeskindet (membranen), der anvendes på bægertrommen.
    hand_exerciser_style:
      name: Type af håndtræner
      description: Klassificerer den overordnede stil eller mekanisme for håndtræneren.
    hand_guard_backbone_material:
      name: Materiale i håndbeskytterens bærestruktur
      description: Materiale i den strukturelle ryg-/bærestruktur (hvis til stede),
        som bestemmer styrke og beskyttelse.
    hand_guard_coverage_style:
      name: Dækningsstil for håndbeskytter
      description: Beskriver håndbeskytterens dækningsområde/profil, som påvirker
        beskyttelse mod vind og stød.
    hand_guard_mounting_type:
      name: Monteringstype for håndbeskytter
      description: Angiver hvordan håndbeskytterne monteres på motorcyklen (f.eks.
        styrets ende med indvendig klemme eller kun klemme).
    hand_guard_set_configuration:
      name: Konfiguration af håndbeskyttelsessæt
      description: Angiver om produktet sælges som et venstre/højre-par eller som
        en enkelt side.
    hand_guard_style:
      name: Type af håndbeskytter
      description: Beskriver beskyttelsesdesignet eller -stilen (f.eks. lukket, åben,
        fuld, let, standard).
    hand_guard_weather_protection:
      name: Vejrbeskyttelse til håndbeskytter
      description: Angiver den tilsigtede vejrbeskyttelse, som håndbeskytterne giver.
    hand_paddle_strap_type:
      name: Type af rem til håndpadle
      description: Angiver typen af rem eller fravær af rem, der bruges til at fastgøre
        håndpadlen til brugerens hånd.
    hand_percussion_mount_attachment_mechanism:
      name: Håndpercussion-monteringsmekanisme
      description: Angiver hvordan monteringen fastgøres til et stativ, rack eller
        andet hardware (f.eks. klemme- eller stangmontering).
    hand_percussion_mounting_handling:
      name: Montering/brug af håndpercussion
      description: Angiver om instrumentet holdes i hånden, bæres på kroppen, monteres
        eller placeres på bord/gulv under almindelig brug.
    hand_percussion_pitch_type:
      name: Type tonehøjde for håndpercussion
      description: Angiver, om instrumentet producerer en bestemt tonehøjde (kan stemmes/afgive
        toner) eller en ubestemt tonehøjde.
    hand_percussion_playing_method:
      name: Spillemetode for håndpercussion
      description: Angiver hvordan instrumentet typisk spilles for at frembringe lyd
        (f.eks. rystet eller skrabet).
    hand_percussion_set_configuration:
      name: Konfiguration af håndpercussionsæt
      description: Angiver om produktet er et enkelt instrument, et matchet par eller
        et fler-delt sæt.
    hand_percussion_size_class:
      name: Størrelsesklasse for håndpercussion
      description: Generel størrelseskategori for instrumentet, når en præcis måling
        ikke er angivet, eller til brug for nem filtrering.
    hand_sewing_needle_point_type:
      name: Spidstype på håndsynål
      description: Angiver formen og typen af håndsynålens spids, som bruges til at
        trænge igennem forskellige materialer (f.eks. vævet stof, strik, læder) eller
        garn.
    hand_support_level:
      name: Håndstøtteniveau
      description: Angiver graden af støtte eller kompression, som handsken, omviklingen
        eller stroppen giver.
    hand_support_size:
      name: Håndstøttestørrelse
      description: Størrelse for handsken, stroppen eller omviklingen som angivet
        af producenten (XS-XXL eller one-size).
    handball_ball_type:
      name: Håndboldtype
      description: Angiver den tilsigtede brugskategori for håndbolden såsom kamp,
        træning eller strand.
    handball_playing_surface:
      name: Spilleoverflade til håndbold
      description: Angiver den/de underflade(r), som håndbolden er optimeret til.
    handball_target_type:
      name: Måltype til håndbold
      description: Angiver typen eller designet af skydemål, der bruges til håndboldtræning.
    handbrake_actuation_type:
      name: Type af aktivering af håndbremse
      description: Angiver hvordan parkeringsbremsen aktiveres.
    handbrake_orientation:
      name: Retning af håndbremse
      description: Angiver om håndbremsen er beregnet til venstrestyrede eller højrestyrede
        køretøjer, eller om den er universel.
    handgun_grip_material:
      name: Materiale til pistolgreb
      description: Primært materiale i pistolgreb/paneler.
    handle_configuration:
      name: Konfiguration af håndtag
      description: Beskriver wakeboard-håndtagets strukturelle udformning (f.eks.
        enkelt, dobbelt, Deep-V, T-wrap), så kunder kan matche niveau, tricks eller
        boardtype.
    handle_ergonomics:
      name: Ergonomi i grebet
      description: Beskriver ergonomiske egenskaber ved grebet, der er designet til
        at forbedre komfort og kontrol.
    handle_grip_material:
      name: Skaftgrebsmateriale
      description: Angiver materialet på grebets overflade, som påvirker komfort og
        greb, især når det er vådt.
    handle_grip_type:
      name: Skaftgrebstype
      description: Angiver grebets overfladebelægning/materiale eller overfladestil,
        som er designet til at forbedre komfort og kontrol.
    handle_shape:
      name: Form på greb
      description: Tværsnitsform eller profil af grebet.
    handlebar_design:
      name: Design af styr
      description: Angiver typen af håndtag på stepmaskinen, f.eks. ingen, faste,
        justerbare i højde, sammenklappelige eller med modstandsbånd.
    handlebar_type:
      name: Type af styr
      description: Angiver typen af styr monteret på cyklen, som påvirker kørestilling,
        kontrol og komfort.
    handslide_bore_type:
      name: Type af boring i trombonesliden
      description: Angiver, om basbasunen har enkelt bore eller dobbelt bore i trækstangen.
    handwear_cuff_style:
      name: Manchetform på handsker
      description: Beskriver manchet- eller håndledskonstruktionen på handsker eller
        vanter, som påvirker dækning og pasform.
    handwear_insulation_material:
      name: Isoleringsmateriale i handsker
      description: Angiver det isolerende eller forede materiale, der anvendes indvendigt
        i handsker eller vanter.
    handwear_size:
      name: Handskestørrelse
      description: Angiver størrelsen på handsker eller andet håndbeklædning for at
        sikre korrekt pasform.
    hang_glider_design:
      name: Design af hangglider
      description: Klassificerer svæveflyets strukturelle type (f.eks. fleksibel vinge,
        stiv vinge eller motordrevet).
    hanger_thread_size:
      name: Gevindstørrelse til ophæng
      description: Angiver skruens gevindstørrelse/-standard, der bruges til at montere
        holderen på banksticks eller bidmeldere, så kompatibilitet sikres.
    hanging_suspension_method:
      name: Ophængningsmetode
      description: Angiver det primære beslag eller system, der bruges til at ophænge
        gyngen (f.eks. reb, kæde eller stativramme).
    hardtop_finish_type:
      name: Type af hardtop-finish
      description: Angiver hardtoppens ydre finish (f.eks. grundet eller malet), som
        påvirker monteringsklarhed og udseende.
    hardtop_shell_material:
      name: Materiale i hardtop-skallen
      description: Angiver det primære materiale i et køretøjs tag (ikke eventuelt
        betræk), f.eks. glasfiber eller aluminium.
    hardtop_window_configuration:
      name: Vindueskonfiguration i hardtop
      description: Angiver, hvilke vinduer der sidder i bilen, samt deres konfiguration.
    harmonica_comb_material:
      name: Materiale for mundharmonikas kam
      description: Materiale i harmonikaens kam (luftkammerets krop).
    harmonica_cover_plate_finish:
      name: Finish på harmonikaens dæksplade
      description: Angiver finish eller belægning på harmonikaens dæksplader.
    harmonica_cover_plate_material:
      name: Materiale for mundharmonikas dækplade
      description: Materiale i de ydre dæksplader.
    harmonica_finish:
      name: Mundharmonikafinish
      description: Overfladefinish på harmonikaens dæksplader/krop.
    harmonica_included_accessories:
      name: Mundharmonikatilbehør medfølger
      description: Angiver det tilbehør, der følger med harmonikaen.
    harmonica_note_range:
      name: Harmonikaens toneomfang
      description: Klassifikation af instrumentets register i orkestersammenhæng (f.eks.
        bas, baryton, tenor).
    harmonica_reed_plate_material:
      name: Materiale i harmonikaens stemmeplader
      description: Materiale i stemmepladerne (f.eks. messing, rustfrit stål, aluminium).
    harmonica_system_type:
      name: Type/system for harmonika
      description: Angiver harmonikaens orkestrale system eller formfaktor (f.eks.
        akkord-, bas-, baryton- eller Polyphonia-type).
    harmonica_tuning_system:
      name: Stemmesystem til mundharmonika
      description: Angiver den stemnings-/tuning-opsætning, som harmonikaen bruger
        (f.eks. Richter-, Solo- eller orkesterstemning).
    harness_shell_type:
      name: Type af sele-skal
      description: Beskriver seletøjets skalkonstruktion og stivhed (f.eks. softshell,
        hardshell eller hybrid).
    harness_style:
      name: Type af sele
      description: Angiver seletøjets strukturelle type/design, f.eks. talje-, sæde-,
        bryst/vest-, vingebælte-, shorts-type- eller hybridmodel.
    harness_type:
      name: Seletype
      description: Klassificerer klatreseleens strukturelle type, såsom siddesele,
        helkropssele eller brystsele.
    harp_action_type:
      name: Harpebrugstype
      description: Primær mekanisme, der bruges til at ændre kromatik/halvtoner på
        harmonikaen.
    harp_finish:
      name: Overfladefinish på harpe
      description: Overfladefinish på harpekroppen (f.eks. naturlig, bejdset, malet,
        lakeret).
    harp_included_accessories:
      name: Harpetilbehør medfølger
      description: Viser en liste over det tilbehør, der følger med ved køb af pedalharpe.
    harvest_method:
      name: Høstmetode
      description: Angiver om skaldyr/fisk er vildtfanget, opdrættet eller fremstillet/indhentet
        på anden måde.
    harvest_stage:
      name: Høstfase
      description: Angiver det vækststadie, hvor rucolaen er høstet, såsom mikrogrønt,
        babyblade eller fuldt udvoksede planter.
    hat_style:
      name: Type af hat
      description: Angiver konstruktionstypen/designet af festhatten (f.eks. keglehat,
        krone, høj hat eller kasket/visir), så det afspejler produktets grundlæggende
        udseende.
    hazard_signal_mode:
      name: Tilstand for advarselsblink
      description: Valgbare lysmønstre/tilstande for LED-/elektroniske vejvarselslys.
    head_configuration:
      name: Hovedkonfiguration
      description: Angiver om øksehovedet har en tværgående skæreflade, hammer, begge
        dele eller ingen af delene, hvilket direkte påvirker funktionaliteten på is
        og blandet terræn.
    head_material:
      name: Hovedmateriale
      description: Materiale i spillehovedet, der følger med quintoen.
    head_movement_type:
      name: Type af hovedbevægelse
      description: Angiver den retningsbestemte bevægelsesfunktion for bipodens eller
        stanghovedets bevægelighed (f.eks. panorering, tilt eller hældning).
    head_side:
      name: Hovedside
      description: Angiver om trommeskindet er beregnet til slagsiden (batter-side),
        resonanssiden (front-side) eller begge dele.
    head_weight_style:
      name: Hovedets vægtstil
      description: Angiver vægtkonfigurationen ved fluens hoved, som påvirker synkehastighed
        og præsentation.
    headband_embellishment:
      name: Pynt på pandebånd
      description: Identificerer dekorative elementer, der er fastgjort til pandebåndet
        (f.eks. sløjfer, perler, krystaller, dyreører).
    headboard_style:
      name: Type af sengegavl
      description: Beskriver design- eller konstruktionsstilen på hovedgærdet, der
        følger med sengen.
    headgear_strap_configuration:
      name: Stroppens konfiguration på hovedbeklædning
      description: Angiver antallet af stropper, der bruges til at fastgøre bryderhovedbeskyttelsen.
    headjoint_crown_style:
      name: Kroneform på hovedstykke
      description: Angiver stil eller design af fløjtens hovedstykkekrone (endehætte),
        som kan påvirke udseende samt vægt og balance.
    headjoint_pitch_standard:
      name: Tonehøjde-standard for fløjtes hovedstykke
      description: Angiver den tilsigtede standard for tuning af hovedstykket (f.eks.
        A=440 vs. A=442).
    headliner_product_form:
      name: Loftbeklædningsproduktform
      description: Angiver om produktet er en komplet formstøbt loftbeklædningsenhed,
        et udskiftningsstof eller en reparations-/trimkomponent.
    headrest_mount_attachment_method:
      name: Monteringsmetode for nakkestøttebeslag
      description: Angiver hvordan beslaget fastgøres til nakkestøtten/sædestængerne.
    headrest_provision:
      name: Mulighed for nakkestøtte
      description: Angiver om nakkestøtter er inkluderet, og/eller om der er monteringspunkter
        til nakkestøtter.
    headset_standard:
      name: Headset-standard
      description: Type af kronrør/headsetstandard anvendt i stellet.
    headstall_style:
      name: Type af hovedtøj
      description: Klassificerer hovedtøjets strukturelle design eller udformning
        ved ører og pandebånd.
    headwear_intended_use:
      name: Tilsigtet anvendelse af hovedbeklædning
      description: Angiver det primære formål eller anvendelse for brug af turbanen
        (f.eks. kemoterapi/hårtab, svømning eller religiøs brug).
    hearing_enhancer_style:
      name: Type af høreforstærker
      description: Beskriver enhedens fysiske formfaktor, så brugeren kan vælge mellem
        over-øret, i-øret, bag-om-hovedet og andre designs.
    heart_rate_monitoring_method:
      name: Metode til overvågning af puls
      description: Angiver hvordan maskinen registrerer pulsdata under træning.
    heart_rate_sensing_technology:
      name: Teknologi til pulsmåling
      description: Angiver den fysiologiske målemetode, som monitoren bruger til at
        registrere puls (f.eks. elektrisk ECG eller optisk PPG).
    heart_rate_sensor_placement:
      name: Placering af pulssensor
      description: Angiver hvor sensoren bæres eller er placeret (på kroppen eller
        på cyklen), hvilket påvirker komfort og målenøjagtighed.
    heat_retention_technology:
      name: Teknologi til varmebevaring
      description: Beskriver teknologi, belægning eller materiale, der øger svedproduktion
        eller termisk aktivitet i talje-/mavebandage (f.eks. neopren med saunaeffekt).
    heated_glass_feature:
      name: Opvarmet glasfunktion
      description: Angiver om vinduesglasset har integrerede elektriske elementer,
        såsom en bagrudevarmetrådsnet og/eller en antenne indlejret i glasset.
    heater_control_actuation_method:
      name: Metode til aktivering af varmebetjening
      description: Angiver hvordan varme-/HVAC-styringen aktiverer køretøjets HVAC-enhed
        (f.eks. kabelstyret, vakuumstyret eller elektronisk signalstyring).
    heater_control_electrical_connector_type:
      name: Type af elektrisk stik til varme-/HVAC-styring
      description: Angiver den elektriske stiktype/tilslutningstype, som bruges af
        varmelegemets kontrolenhed (f.eks. pigtail eller stiktype).
    heating_technology:
      name: Varmeteknologi
      description: Angiver den primære opvarmningsmekanisme, som fordamperen bruger
        til at omdanne materiale til damp.
    heel_shape:
      name: Form på hælen
      description: Angiver hælens geometriske stil eller silhuet, hvilket hjælper
        kunder med at filtrere efter udseende og stabilitet (f.eks. stilethæl eller
        blokhæl).
    helicopter_mission_type:
      name: Type af helikoptermission
      description: Helikopterens primære anvendelsesformål/rolle.
    helicopter_rotor_configuration:
      name: Konfiguration af helikopterrotor
      description: Angiver helikopterens rotorsystemlayout (konfiguration af hoved-
        og halerotor), såsom enkelt hovedrotor med halerotor, koaksial, tandem eller
        sammenflettede rotorer.
    helmet_accessory_type:
      name: Tilbehørstype for hjelm
      description: Angiver den specifikke type cykelhjelmsdel eller tilbehør, så kunder
        hurtigt kan finde det rette produkt.
    helmet_audio_connector_type:
      name: Type af lydtilslutning til hjelm
      description: Angiver typen af luftfartøjets lydstik, som hjelmens kommunikationskabel
        bruger, hvis det er til stede.
    helmet_communication_system_readiness:
      name: Forberedt til kommunikationssystem i hjelm
      description: Angiver om hjelmen er beregnet til at kunne anvende et intercom-/Bluetooth-kommunikationssystem.
    helmet_construction_type:
      name: Hjelmkonstruktionstype
      description: Angiver konstruktionstypen for hjelmens skal og inderskal (f.eks.
        skum, hård skal eller hybrid).
    helmet_fit_head_shape:
      name: Hjelmens pasform (hovedform)
      description: Den indvendige pasformsprofil til forskellige hovedformer.
    helmet_interior_liner_type:
      name: Type af indvendig foring i hjelm
      description: Type af indvendig foring og om den er aftagelig/vaskbar.
    helmet_liner_material:
      name: Foringsmateriale i hjelm
      description: Angiver materialet i den indvendige foring eller polstring, som
        giver komfort og stødabsorbering.
    helmet_retention_closure_type:
      name: Type af hageremslukning på hjelm
      description: Angiver hjelmens hageremslukning/fastgørelsesmekanisme (f.eks.
        dobbelt D-ring eller mikrometrisk ratchet-spænde).
    helmet_safety_certification:
      name: Sikkerhedscertificering for hjelm
      description: Viser en liste over de sikkerhedsstandarder eller certificeringer
        hjelmen overholder.
    helmet_safety_certification_standard:
      name: Standard for certificering af hjelmsikkerhed
      description: Sikkerheds-/homologeringsstandarder, som motorcykelhjelmen er certificeret
        efter.
    helmet_shell_material:
      name: Skalmateriale i hjelm
      description: Primært ydre skalmateriale eller -konstruktion for hjelmen.
    helmet_size_system:
      name: Hjelmens størrelsessystem
      description: Det størrelsessystem, der bruges til at angive hjelmstørrelse.
    helmet_sun_visor_type:
      name: Type af solvisir i hjelm
      description: Angiver om hjelmen har et indvendigt nedfældeligt solvisir, et
        tonet ydre visir, begge dele eller ingen af delene.
    helmet_vehicle_fit:
      name: Kompatibilitet med køretøjstype for hjelm
      description: Type køretøj/kørsel, som hjelmen er beregnet til.
    helmet_ventilation_adjustability:
      name: Justerbar ventilation i hjelm
      description: Angiver hvordan hjelmens ventilation kan kontrolleres af føreren.
    helmet_ventilation_configuration:
      name: Konfiguration af hjelmventilation
      description: Beskriver hjelmens ventilationslayout og justerbarhed (f.eks. hageventil,
        pandeluftindtag og lukkelige ventilationsåbninger).
    helmet_visor_peak_adjustability:
      name: Justering af hjelmens visir/skygge
      description: Angiver om hjelmens offroad-skygge/visir kan justeres og/eller
        afmonteres.
    helmet_visor_shield_optical_features:
      name: Visirets (skærmens) optiske egenskaber i hjelm
      description: Optiske egenskaber og kompatibilitet for hovedvisir/skærm.
    helmet_visor_shield_type:
      name: Type af visir/skærm til hjelm
      description: Primær konfiguration af visir/skærm inkluderet med hjelmen.
    hem_style:
      name: Sømtype
      description: Angiver afslutningsstilen ved benåbningen (såsom ren afslutning,
        oprullet kant eller rå kant) som i høj grad påvirker beklædningsstykkets udseende.
    hemisphere_compatibility:
      name: Kompatibilitet med hemisfære
      description: Angiver hvilken halvkugle stjernekortet er beregnet til, baseret
        på de synlige stjernebilleder.
    hemline_style:
      name: Type af kantafslutning
      description: Definerer snit eller design af kjolens nederste kant.
    herbal_infusion_function:
      name: Funktion til udtræk af urter
      description: Angiver den primære velvære- eller funktionelle fordel, som infusionen
        er beregnet til.
    hex_size:
      name: Størrelse på sekskant
      description: Størrelse på nøglesekskant krævet til montering/afmontering af
        gløderøret.
    hi_hat_pair_type:
      name: Type af hi-hat-sæt
      description: Angiver om produktet er et matchet top-/bundpar eller en enkelt
        cymbalkomponent.
    hi_hat_sound_character:
      name: Hi-hats lydegenskaber
      description: Beskriver den overordnede klangprofil for at hjælpe kunder med
        at filtrere efter den ønskede lyd.
    high_visibility_class:
      name: Høj synlighedsklasse
      description: Angiver beklædningens synlighedsklassifikation i henhold til ANSI/ISEA
        107-standarden.
    highback_style:
      name: Design af rygplade
      description: Angiver den strukturelle stil eller design af highbacken, som påvirker
        køreegenskaberne.
    hitch_ball_diameter:
      name: Kuglediameter på anhængertræk
      description: Diameter på anhængertrækkets kuglehoved (sfære), som kobles til
        trailerens kobling (f.eks. 1 7/8”, 2”, 2 5/16”, 50 mm).
    hitch_ball_mounting_style:
      name: Monteringsstil for anhængertrækkets kugle
      description: Angiver om anhængertrækkets kugle er en standard møtrikmonteret
        kugle, en fast/presset type til specifikke trækhoveder eller har integreret
        monteringshardware.
    hobby_horse_handle_type:
      name: Type af håndtag på kæphest
      description: Angiver greb-/håndtagskonstruktionen, der bruges til at holde eller
        styre kæphesten.
    hobby_horse_sound_features:
      name: Lydfunktioner for kæphest
      description: Angiver om kæphesten har lydeffekter, og hvilken type de i så fald
        er.
    hockey_goal_type:
      name: Type af hockeymål
      description: Angiver stil eller anvendelsesformål for hockeymålet (f.eks. officiel
        ishockey, street hockey eller mini).
    hockey_size_category:
      name: Hockeystørrelseskategori
      description: Angiver den standardiserede udstyrs-størrelseskategori, som delen
        passer til (børn, junior, mellem, senior).
    hockey_size_segment:
      name: Størrelsessegment for hockeyudstyr
      description: Angiver den standardiserede størrelseskategori for hockeyudstyr,
        som bestemmer den samlede størrelse og pasform på beskyttelsesudstyret.
    hold_surface_texture:
      name: Overfladetekstur på grab
      description: Beskriver grovheden eller den taktile overfladefinish på grebsfladen.
    home_decor_sewing_pattern_project_type:
      name: Type af symønster til boligindretning
      description: Angiver hvilken type boligindretningselement syopskriften er til
        (f.eks. pudebetræk, gardin, bordløber).
    homologation_rule_set:
      name: Typegodkendelse/regelsæt
      description: Angiver det godkendelsesorgan eller regelsæt bilen er i overensstemmelse
        med (hvor relevant).
    honey_form:
      name: Type af honning
      description: Angiver honningens fysiske form eller præsentation.
    honey_processing_method:
      name: Forarbejdningsmetode for honning
      description: Angiver hvordan honningen blev behandlet eller forarbejdet før
        emballering.
    honey_variety:
      name: Honningvariant
      description: Angiver honningens botaniske eller florale oprindelse (enten monofloral
        eller polyfloral), hvilket har direkte betydning for smag, farve og pris.
    hood_configuration:
      name: Konfiguration af hætte
      description: Beskriver hættens design og justeringsmuligheder.
    hood_design:
      name: Hættedesign
      description: Angiver tilstedeværelsen og stilen af tøjets hætte.
    hood_style:
      name: Hættestil
      description: Angiver om produktet har en hætte, samt hættens type/stil.
    hood_type:
      name: Hættetype
      description: Angiver særlige designdetaljer ved hætten.
    hook_and_eye_size_hook_number:
      name: Hægte- og øjestørrelse (krogenummer)
      description: Standardiseret størrelses-/nummereringssystem for hægte og øje
        (hvor relevant), som bruges på emballage til at angive den samlede størrelse
        på hægte og øje.
    hook_and_loop_fastener_duty_rating:
      name: Belastningsklasse for burrelukning
      description: Angiver den tilsigtede styrke-/belastningsklasse for burrelukningen.
    hook_and_loop_fastener_format:
      name: Format for burrelukning
      description: Angiver den fysiske form eller emballageformatet for burrebåndsproduktet
        (f.eks. rulle/tape, prikker eller strimler).
    hook_and_loop_fastener_side:
      name: Fastgørelsesside for burrelukning
      description: Angiver om produktet kun indeholder krogsiden, kun løkkesiden eller
        et sæt med begge sider.
    hook_coating_finish:
      name: Krogbelægning/-finish
      description: Overfladebehandling eller belægning på krogen for korrosionsbeskyttelse,
        diskretion eller farve (f.eks. sort nikkel, blank tin).
    hook_configuration:
      name: Krogens udformning
      description: Beskriver om lokkefuglen leveres med kroge, samt hvilken type/stil
        de har.
    hook_eye_style:
      name: Krogøjestil
      description: Angiver formen eller orienteringen af krogens øje, som påvirker,
        hvordan krogen bindes eller fastgøres.
    hook_eye_type:
      name: Krogøjetype
      description: Angiver designet af krogens øje, som påvirker valg af knude og
        rigging.
    hook_loop_format:
      name: Type af burrelukning
      description: Angiver den fysiske formtype for det påsyelige burrebånd.
    hook_loop_side:
      name: Burrebåndsside
      description: Angiver om produktet er krogsiden, løkkesiden eller et matchende
        sæt med både krog og løkke.
    hook_material:
      name: Krogmateriale
      description: Angiver det materiale, der er anvendt specifikt til gafkrogen/-hovedet,
        som er en vigtig faktor for styrke og korrosionsbestandighed ved brug i saltvand.
    hook_organizer_style:
      name: Krogopbevaringsstil
      description: Den fysiske stil eller formfaktor for krogopbevaringen (f.eks.
        etui, rulle eller pose), som bruges til at understøtte browsing og filtrering
        efter organiseringstype.
    hook_point_configuration:
      name: Konfiguration af krogpunkt
      description: Angiver om krogen har to spidser (dobbelt) eller tre spidser (treble).
    hook_point_type:
      name: Type af krogspids
      description: Beskriver slibningen eller formen på fiskekrogens spids, som påvirker
        indtrængning og fastholdelsesevne.
    hook_shank_length:
      name: Krogens skaftlængde
      description: Angiver den relative længdeklassifikation af krogens skaft (f.eks.
        kort eller lang) til hurtig visuel og funktionel sammenligning.
    hooks_eyes_attachment_method:
      name: Fastgørelsesmetode for hægter og maller
      description: Angiver hvordan hægter og maller er fastgjort til beklædning eller
        arbejde.
    hop_up_type:
      name: Hop-up-type
      description: Angiver hvilket hop-up-system der anvendes til at give BB’er backspin
        for øget rækkevidde og præcision.
    horse_blanket_type:
      name: Type af hestedækken
      description: Angiver hovedtypen eller den tiltænkte anvendelse af hestedækkenet
        eller -tæppet.
    horse_brush_type:
      name: Type af hestebørste
      description: Klassificerer børsten efter dens specifikke plejestil eller tilsigtede
        formål, så kunder kan filtrere uden at opdele kategoristrukturen.
    horse_care_purpose:
      name: Formål med hestepleje
      description: Produktets primære funktionelle formål inden for hestepleje, herunder
        sundhed, grooming og daglig pasning og pleje.
    horse_feed_stage:
      name: Stadie for hestefoder
      description: Angiver hestens livsstadie eller fysiologiske tilstand, som foderet
        er beregnet til.
    horse_groomer_type:
      name: Type af hestebørste
      description: Klassificerer børstens type/stil, så kunder hurtigt kan finde det
        specifikke redskab, de har brug for.
    horse_leg_protection_type:
      name: Type af benbeskyttelse til hest
      description: Klassificerer den specifikke type eller funktion af hestestøvle,
        bandage eller gamache.
    horse_model_breed:
      name: Hesterace (model)
      description: Angiver den hesterace, som skala-modellen forestiller (hvis relevant).
    hosiery_toe_style:
      name: Tåstil for strømpebukser
      description: Angiver udformningen af tåområdet i strømpebukser, som er vigtig
        for holdbarhed og kompatibilitet med åbne sko.
    hot_air_balloon_basket_type:
      name: Kurvetype til varmluftballon
      description: Angiver den primære kurvkonfiguration/-stil (f.eks. standard sport,
        kommerciel høj kapacitet, opdelt eller med adgangsdør), som bruges til ombordstigning
        og tilsigtet drift.
    hot_air_balloon_burner_type:
      name: Brændertype i varmluftballon
      description: Type/konfiguration af brændersystem monteret på ballonen.
    hot_air_balloon_envelope_material:
      name: Materiale til varmluftballonens kuvert
      description: Primært stof/materiale anvendt til ballonens kuvert (canopy).
    hotfix_application_tool:
      name: Værktøj til påføring af hotfix
      description: Anbefalet værktøj eller varmekilde til påføring af hotfix-rhinsten.
    hub_axle_type:
      name: Navakseltype
      description: Angiver den akseltype/fastgørelsestype, som navet er beregnet til
        (f.eks. hurtigspænde, gennemgående aksel osv.).
    hub_motor_type:
      name: Type af navmotor
      description: Beskriver typen af navmotor og dens karakteristika (gearet, direkte
        drev, børstet eller børsteløs) for at oplyse kunder om egenskaber som moment,
        vægt og effektivitet.
    hula_hoop_construction_type:
      name: Hulahopringens konstruktionstype
      description: Beskriver hvordan ringen er konstrueret eller samlet.
    hula_hoop_features:
      name: Hulahopringens egenskaber
      description: Fremhæver særlige funktionelle eller designmæssige egenskaber ved
        hulahopringen.
    hull_design:
      name: Skrogdesign
      description: Beskriver skrogformen, som påvirker fartøjets ydeevne og manøvreegenskaber.
    hull_type:
      name: Skrogtype
      description: Beskriver skrogformen, som påvirker ydeevne og stabilitet.
    humidifier_refill_medium_type:
      name: Refill-type til luftfugter
      description: Angiver det fugtholdende refill-medium, der anvendes i luftfugteretuiet
        (det materiale, som vædes eller udskiftes).
    humidifier_refill_method:
      name: Påfyldningsmetode til luftfugter
      description: Angiver, hvordan luftfugteren genopfyldes med fugt eller udskiftes.
    humidifying_medium:
      name: Fugtgivende medium
      description: Angiver det fugtgivende element eller medie i produktet (det, der
        vædes eller aktiveres).
    hummus_base_ingredient:
      name: Hovedingrediens i hummus
      description: Angiver den primære bælgfrugt eller grøntsagsbase, som hummus er
        lavet af.
    hunting_call_type:
      name: Type af lokkekald
      description: Klassificerer lokkekaldets primære betjeningsstil eller mekanisme
        (f.eks. mundblæst, elektronisk, boks), så jægere hurtigt kan vælge det format,
        der passer bedst til behov og erfaring.
    hunting_dog_collar_function:
      name: Jagthundehalsbåndets funktion
      description: Klassificerer halsbåndets primære funktion eller formål, så kunder
        kan filtrere produkter efter funktioner som sporing, træning, synlighed eller
        almindelig brug.
    hvac_control_functions:
      name: HVAC-styringsfunktioner
      description: Angiver, hvilke HVAC-, afrimnings- eller luftstrømsfunktioner enheden
        styrer (mekanisk eller elektronisk).
    hybrid_drivetrain_configuration:
      name: Konfiguration af hybrid drivlinje
      description: Angiver PHEV-systemets arkitektur, som beskriver hvordan elmotor(er)
        og forbrændingsmotor bidrager til fremdrift.
    hybrid_system_type:
      name: Type af hybridsystem
      description: Klassificerer køretøjets hybridarkitektur.
    hybrid_truck_cab_type:
      name: Førerhustype for hybridlastbil
      description: Angiver konfigurationen af lastbilens førerhus, som påvirker siddekapacitet
        og kabineplads.
    hydration_bag_features:
      name: Egenskaber ved væskeblære
      description: Fremhæver særlige design- eller funktionsmæssige egenskaber ved
        væskeblærer.
    hydration_belt_features:
      name: Væskebæltets funktioner
      description: Viser en liste over bemærkelsesværdige indbyggede funktioner, der
        forbedrer brugervenlighed, sikkerhed eller komfort ved drikkebæltet.
    hydration_bladder_compatibility:
      name: Kompatibilitet med væskeblære
      description: Angiver om vesten inkluderer eller er kompatibel med et væskeblære-system.
    hydration_mouthpiece_style:
      name: Mundstykktype til væskeblære
      description: Angiver designet eller den funktionelle type af mundstykke eller
        ventil i et væskesystem, så kunder kan vælge den foretrukne drikkeløsning
        og sikre kompatibilitet.
    hydration_pack_style:
      name: Type af væskerygsæk
      description: Angiver væskerygsækkens strukturelle type, såsom rygsæk eller vest,
        for at understøtte filtrering efter pasform og anvendelse.
    hydration_system_insulation:
      name: Isolering af væskesystem
      description: Angiver om reservoiret og/eller drikkeslangen er isoleret for at
        hjælpe med at bevare væskens temperatur i varme eller kolde forhold.
    hydration_valve_type:
      name: Ventiltype til væskesystem
      description: Angiver typen af drikkeventil eller mundstykke, der følger med
        systemet eller flasken, herunder almindelige bidventiler og højflow-dyseudformninger.
    hydraulic_fluid_type:
      name: Type hydraulikvæske
      description: Angiver den type bremsevæske et hydraulisk cykelbremsegreb er beregnet
        til at anvende. Denne information er afgørende for vedligeholdelse og sikkerhed.
    hydrogenation_level:
      name: Hydrogeneringsgrad
      description: Angiver om fedtet er uhærdet, delvist hærdet eller fuldt hærdet,
        hvilket påvirker indholdet af transfedt og bageegenskaber.
    hydrophobicity_level:
      name: Vandafvisningsgrad
      description: Angiver graden af vandafvisning, som produktet er angivet som.
    ice_cream_format:
      name: Isformat
      description: Beskriver den fysiske form eller præsentation af isproduktet (f.eks.
        bæger, isbar, mochi).
    ice_skate_sharpener_type:
      name: Type af skøjtesliber
      description: Klassificerer sliberens overordnede design eller format (f.eks.
        håndholdt sten, elektrisk maskine, jig osv.).
    ice_temperature_suitability:
      name: Egnet temperaturområde for is
      description: Angiver det temperaturområde for isen, som hockey-stavvoks er udviklet
        til, hvilket påvirker ydeevne og sneafvisende egenskaber.
    icing_sugar_variety:
      name: Type af flormelis
      description: Klassificerer formuleringen eller den funktionelle type af flormelis
        (f.eks. fondant, ikke-smeltende snepulver, farvet eller aromatiseret).
    ignition_coil_configuration:
      name: Konfiguration af tændspole
      description: Angiver tændspolens formtype (enkeltspole/coil-on-plug, flertændspole
        pr. antal cylindre, coil rail/kassette eller fordelerbaseret type).
    ignition_lead_compliance_standard:
      name: Overensstemmelsesstandard for tændkabel
      description: Formel industristandard eller certificering, som tændkablet/-kablerne
        overholder ifølge producenten (f.eks. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Isoleringsmateriale for tændkabel
      description: Primært isolerings- og kappemateriale på tændkablet (yderkappe).
    ignition_lead_set_type:
      name: Type af tændkabelsæt
      description: Angiver om produktet er et enkelt tændkabel eller et komplet sæt,
        samt hvad sættet er beregnet til.
    ignition_lead_terminal_type:
      name: Terminaltype for tændkabel
      description: Angiver terminal-/tilslutningstype i begge ender af tændkablet
        (f.eks. tændrørsterminal og spole-/fordelerterminal).
    illumination_type:
      name: Belysningstype
      description: Angiver om og hvordan bolden er oplyst til spil i mørke (f.eks.
        selvlysende (phosphorescerende) eller slagaktiveret LED).
    immobilizer_installation_type:
      name: Installationstype for startspærring
      description: Angiver hvordan startspærren er installeret eller tilsluttet køretøjet.
    immobilizer_unlock_method:
      name: Oplåsningsmetode for startspærre
      description: Angiver hvordan startspærren aktiveres/deaktiveres eller låses
        op.
    impact_protection_certifications:
      name: Certificeringer for slagbeskyttelse
      description: Angiver den/de specifikke sikkerhedsstandard(er), som beskyttelsespuden
        opfylder eller overgår.
    impact_protection_level:
      name: Beskyttelsesniveau for sammenstød
      description: Angiver niveauet eller teknologien for slagbeskyttelse i den atletiske
        skålkappe.
    impact_protection_rating:
      name: Slagbeskyttelsesniveau
      description: Angiver det certificerede slagbeskyttelsesniveau i henhold til
        standarder (f.eks. EN 1621-1 Level 1, EN 14120 Level 2), så ryttere kan filtrere
        efter højere beskyttelsesgrad.
    impact_surface_material:
      name: Materiale for sammenstødsoverfladen
      description: Beskriver det primære materiale i slag-/stødfladen for sikkerhed
        og fornemmelse (f.eks. skum eller plast).
    incense_base_material:
      name: Basismateriale i røgelse
      description: Primært base- eller bindemateriale anvendt til fremstilling af
        røgelsen (pulverbase) i sættet.
    incense_making_method:
      name: Fremstillingsmetode for røgelse
      description: Angiver den fremstillingsmetode sættet er beregnet til.
    incense_tool_type:
      name: Type af røgelsesværktøj
      description: Angiver den type røgelsesværktøj produktet er (bruges til at forme,
        måle, presse, blande eller tørre røgelse).
    incline_adjustment_type:
      name: Type af hældningsjustering
      description: Beskriver hvordan (eller om) hældningen kan justeres under træning.
    included_accessories:
      name: Medfølgende tilbehør
      description: Viser en liste over det medfølgende tilbehør som f.eks. ekstra
        hoveder/bit, opbevaringsetui, opladerkabel eller AC-adapter.
    included_case_type:
      name: Type af medfølgende taske
      description: Type af medfølgende bæretaske/opbevaringskasse til bas-saxofon
        (hvis inkluderet).
    included_components:
      name: Medfølgende komponenter
      description: Viser en liste over hvad der er inkluderet i pakken (nyttigt for
        værktøjssæt og bundter).
    included_fastener_components:
      name: Medfølgende fastgørelseskomponenter
      description: Angiver om produktet er et sæt med hægte og maller, kun hægter,
        kun maller eller en beslægtet lukningstype til beklædning.
    included_hydration_vessel_type:
      name: Type af medfølgende væskebeholder
      description: Angiver typen af væskebeholder, der følger med eller passer til
        bæltet.
    included_items_woodwind_instrument:
      name: Medfølgende dele (træblæseinstrument)
      description: Viser en liste over hvilke almindeligt medfølgende dele, der er
        inkluderet i bas-saxofonpakken.
    included_materials:
      name: Medfølgende materialer
      description: Angiver de komponenter der er inkluderet ved køb af mønsteret (kun
        mønster eller mønster + materialer).
    included_mounting_accessories:
      name: Medfølgende monteringsdele
      description: Viser en liste over de monterings- og fastgørelsesdele, der følger
        med til højttalertelefonen.
    included_pump_type:
      name: Type af medfølgende pumpe
      description: Angiver hvilken type pumpe, der følger med eller er integreret
        i luftmadrassen.
    included_scraper_implement_type:
      name: Type af medfølgende skrabeværktøj
      description: Angiver de spilleværktøjer, der følger med til musikskraberen (f.eks.
        skrabepind/-stang, stålbørste).
    indicator_design:
      name: Indikatorens design
      description: Klassificerer den fysiske form eller type af fiskebidindikator.
    indicator_functions_tracked:
      name: Indikatorens registrerede funktioner
      description: Viser en liste over de specifikke kampdata indikatoren kan spore,
        såsom bolde, strikes, outs, innings, pitch count, overs, wickets, score eller
        downs.
    indoor_outdoor_use:
      name: Indendørs/udendørs brug
      description: Angiver, om bowlinglegetøjet er beregnet til indendørs brug, udendørs
        brug eller begge dele.
    inflatable_decoration_items_included:
      name: Medfølgende oppustelige dekorationsdele
      description: Viser en liste over de vigtigste tilbehørsdele, der følger med
        til den oppustelige dekoration (f.eks. blæser, pløkker, barduner).
    inflatable_decoration_type:
      name: Oppustelig dekorationstype
      description: Angiver typen af oppustelig festdekoration (form/faktor) for at
        hjælpe med browsing og filtrering.
    inflatable_raft_float_features:
      name: Egenskaber ved oppustelig tømmerflåde/flydeudstyr
      description: Angiver funktionelle egenskaber på oppustelig tømmerflåde/flydeudstyr.
    inflation_method_included:
      name: Medfølgende oppustningsmetode
      description: Angiver den type af dækoppustningsmetode, der følger med i reparationssættet,
        hvis nogen.
    infused_scent:
      name: Tilsat duft
      description: Angiver duft- eller smagstilsætninger der er indlejret i agnmaterialet.
    ingredient_base_type:
      name: Type af ingrediensbase
      description: Angiver den primære base, der anvendes til gæring (f.eks. druesaftkoncentrat,
        frisk saft eller frugtkoncentrat).
    ingredient_physical_form:
      name: Ingrediensens fysiske form
      description: Angiver den fysiske form, som duftingrediensen leveres i (anvendes
        til håndtering, dosering og formulering).
    ingredient_processing_method:
      name: Forarbejdningsmetode for ingrediens
      description: Angiver den primære forarbejdningsteknik, der er anvendt på ingrediensen
        (f.eks. frysetørret, ristet eller fermenteret).
    ink_colors_included:
      name: Medfølgende blækfarver
      description: Angiver de blækfarver, der følger med stempelpuderne i sættet.
    ink_pad_application_method:
      name: Påføringsmetode for stempelpude
      description: Angiver hvordan blækket påføres fra puden (f.eks. traditionel stempelpude,
        dupper eller penselspids-pude).
    ink_pad_permanence:
      name: Blækpudens holdbarhed
      description: Angiver om det stemplede blæk er permanent og/eller arkivbestandigt
        (modstandsdygtigt over for falmning og vand efter tørring).
    ink_pad_size:
      name: Størrelse på stempelpude
      description: Standardiseret størrelse/formfaktor for stempelpudens overflade
        eller etui.
    ink_pad_special_effects:
      name: Specialeffekter af blækpude
      description: Særlige visuelle eller funktionelle effekter af blækket ved stempling
        (f.eks. metallisk, glitter).
    ink_permanence:
      name: Blækkets holdbarhed
      description: Angiver om det tørrede sumi-blæk er beregnet til at være permanent/arkivbestandigt
        eller vaskbart/ikke-permanent.
    ink_preparation_required:
      name: Klargøring af blæk påkrævet
      description: Angiver om sumi-blækket er klar til brug, eller om det kræver fortynding
        med vand eller maling/gnidning før brug.
    inline_skate_brake_type:
      name: Type af bremse til inline-skates
      description: Angiver bremsekonfigurationen på inline-skates, f.eks. aftagelig
        hælbremse eller ingen bremse.
    inner_tent_configuration:
      name: Konfiguration af indertelt
      description: Angiver konfigurationen eller typen af indertelt, f.eks. fuldt
        indertelt, mesh-indlæg eller termisk liner.
    innerspring_coil_type:
      name: Type af inderfjederspiral
      description: Angiver konstruktionstypen af fjedersystemet med inderspiraler
        i madrassen, som påvirker støtte, bevægelsesisolering og pris.
    input_connector_type:
      name: Inputskonnektortype
      description: Angiver typen af lydindgangsstik, som pedalen bruger (typisk 1/4”
        TS).
    input_valve_type:
      name: Type af indgangsventil
      description: Angiver den ventilstandard, der findes på cykelslangen/hjulet,
        som adapteren forbindes FRA.
    insecticide_treatment:
      name: Insekticidbehandling
      description: Angiver om netmaterialet er fabriksbehandlet med insektmiddel,
        og i så fald hvilken behandlingstype der er anvendt for ekstra beskyttelse.
    insert_coverage_area:
      name: Indsæt dækningsområde
      description: Angiver, hvilken del af foden indlægget er designet til at dække
        (f.eks. fuld længde, kun hæl).
    insert_length_type:
      name: Indlægslængdetype
      description: Angiver hvor stor en del af fodsengen fodbue-støtten dækker.
    inside_message_type:
      name: Type af indvendig besked
      description: Angiver om kortet har en fortrykt besked indvendigt, og om den
        kan tilpasses.
    insole_attachment_method:
      name: Fastgørelsesmetode for indlægssål
      description: Angiver hvordan fodbue-støtten holdes på plads i skoen (f.eks.
        løs indsats, selvklæbende bagside, velcro osv.).
    insole_material:
      name: Materiale på indlægssål
      description: Beskriver materialet i den fodseng eller indersål, som foden hviler
        på, hvilket påvirker stødabsorbering og støtte.
    installation_fabrication_level:
      name: Installations- og fremstillingsniveau
      description: Angiver den typiske mængde specialfremstilling eller modifikation,
        der kræves for at installere sættet.
    installation_location:
      name: Installationssted
      description: Angiver det typiske installationspunkt for olietrykssensoren i
        motorens oliesystem (f.eks. blokoliegalleri-port, filterhus, sandwich-plade
        eller ekstern ledningsmontering).
    installation_method:
      name: Installationsmetode
      description: Angiver hvordan måtten eller flisen fastgøres eller monteres på
        gulvet.
    instant_coffee_form:
      name: Type af instant kaffe
      description: Beskriver den fysiske form, som instant kaffe leveres i, hvilket
        påvirker tilberedningsmetode og holdbarhed.
    instep_coverage:
      name: Dækning af vrist
      description: Angiver, om produktet kun beskytter skinnebenet eller både skinnebenet
        og vristen/foden.
    instruction_format:
      name: Instruktionsformat
      description: Angiver formatet på de instruktioner, der følger med i sættet.
    instrument_cleaning_swab_form_factor:
      name: Formfaktor for instrumentrenseklud
      description: Angiver rensekludens fysiske type (f.eks. gennemtræksklud eller
        stang-/børstesystem), så den passer til musikerens præferencer og instrumentets
        begrænsninger.
    instrument_dimensions_unit_context:
      name: Enhedskontekst for instrumentmål
      description: Præciserer, hvad de angivne højde-/bredde-/længdemål refererer
        til (f.eks. samlet instrument, længde på enkeltrør, stativhøjde).
    instrument_electronics_type:
      name: Type af instrumentelektronik
      description: Angiver om instrumentets pickup-/forforstærkersystem er aktivt
        eller passivt.
    instrument_key:
      name: Instrumentnøgle
      description: Angiver blokfløjtens toneartsbetegnelse anvendt i kataloger (oftest
        C eller F for større blokfløjter).
    instrument_level:
      name: Instrumentniveau
      description: Angiver hvilket niveau instrumentet er beregnet til.
    instrument_part_mounting_method:
      name: Monteringsmetode for instrumentdel
      description: Angiver hvordan delen fastgøres eller monteres (f.eks. klemme-,
        klæbe- eller skruefastgørelse).
    instrument_parts_included:
      name: Medfølgende instrumentdele
      description: Viser en liste over de større komponenter/dele, der følger med
        i pakken til en A-klarinet.
    instrument_playing_technique:
      name: Spilleteknik for instrument
      description: Angiver hvordan instrumentet typisk spilles eller aktiveres (f.eks.
        rystes, slås eller klappes sammen)
    instrument_size_class:
      name: Instrumentstørrelsesklasse
      description: Angiver instrumentets generelle størrelse som en brugervenlig størrelsesklasse
        frem for præcise mål.
    insulation_fill_material:
      name: Insulationsfyldemateriale
      description: Identificerer det primære materiale, der anvendes til isolering
        af jakken eller vesten.
    integrated_bottom_type:
      name: Integreret bundtype
      description: Angiver om tøjet har indbygget undertøj, shorts, leotard eller
        lignende underlag for dækning under bevægelse.
    integrated_charging_options:
      name: Integrerede opladningsmuligheder
      description: Viser en liste over indbyggede strøm- eller opladningsmuligheder
        i natbordet.
    integrated_furniture_function:
      name: Integreret møbelfunktion
      description: Angiver ekstra indbyggede møbelelementer, der er integreret i vægsengen
        eller rammen (f.eks. skrivebord, sofa, hylder).
    integrated_locking:
      name: Integreret lås
      description: Angiver om cykelholderen har en integreret lås til enten holder-til-bil
        og/eller cykel-til-holder.
    integrated_power_options:
      name: Integrerede strømforsyningsmuligheder
      description: Angiver typen af indbyggede strøm- eller opladningsfunktioner i
        sminkebordet.
    integrated_storage_features:
      name: Integrerede opbevaringsfunktioner
      description: Angiver ekstra opbevarings- eller tilbehørsfunktioner, som billardkø-stativet
        har ud over kø-holdere.
    integrated_tool_functions:
      name: Integrerede værktøjsfunktioner
      description: Angiver ekstra værktøjsfunktioner integreret i grebet/armen (f.eks.
        egekrog, ventilværktøj, dæksænkning).
    intended_board_type:
      name: Beregnet boardtype
      description: Angiver den type kiteboard finnen er beregnet til (f.eks. twin
        tip, surf directional eller hydrofoil).
    intended_consumption:
      name: Tilsigtet forbrug
      description: Angiver hvordan produktet er beregnet til at blive indtaget, herunder
        om det er sikkert at spise råt, kræver bagning, eller er delvist bagt.
    intended_craft:
      name: Tilsigtet hobby
      description: Angiver den type hobby/håndarbejde, som garnføren er beregnet til.
    intended_culinary_use:
      name: Tilsigtet kulinarisk anvendelse
      description: Angiver den primære kulinariske anvendelse for saucen, f.eks. som
        dip, til madlavning eller til glasering.
    intended_handlebar_style:
      name: Tilsigtet styrtype
      description: Beskriver den tilsigtede stang eller brug for grebet (f.eks. flad
        stang, drop-stang, aerodynamisk). Dette afgrænser hurtigt kompatibilitet uden
        at kræve yderligere underkategorier.
    intended_player_role:
      name: Tilsigtet spillerrolle
      description: Angiver den position eller rolle på banen, som hovedbeklædningen
        er beregnet til (f.eks. catcher eller dommer).
    intended_playing_surface:
      name: Tiltænkt spilleoverflade
      description: Angiver den overflade pucken, bolden eller ringen er beregnet til,
        såsom is, asfalt, sportshal eller syntetisk is.
    intended_repair_location:
      name: Tilsigtet reparationssted
      description: Angiver hvor på dækket reparationssættet er beregnet til at blive
        brugt.
    intended_seating_position:
      name: Tiltænkt siddeposition
      description: Angiver den tilsigtede placering af sikkerhedsselen i køretøjet.
    intended_sewing_application:
      name: Tilsigtet syanvendelse
      description: Angiver den type syning tråden er beregnet til (f.eks. generel
        beklædningssyning, patchwork eller polstring).
    intended_technique:
      name: Tilsigtet teknik
      description: Angiver den primære filteteknik, som puden/måtten er beregnet til.
    intended_use:
      name: Tiltænkt anvendelse
      description: Instrumentets primære anvendelseskontekst.
    intended_use_fleece_fabric:
      name: Tilsigtet anvendelse (fleece-stof)
      description: Angiver det primære anvendelsesområde for fleece-stoffet.
    intended_user:
      name: Tilsigtet bruger
      description: Angiver hvem flyets beskyttelsesudstyr er beregnet til.
    intended_yarn_form:
      name: Tilsigtet garnform
      description: Angiver hvilken garnform/opsætning garnskålen er bedst egnet til.
    interaction_mode:
      name: Interaktionstilstand
      description: Angiver den primære interaktionsmetode, der bruges til at udløse
        lyde eller aktiviteter.
    interactive_effects:
      name: Interaktive effekter
      description: Angiver de interaktive elektroniske eller mekaniske funktioner,
        som er inkluderet i et legekøkkensæt.
    interfacing_application_area:
      name: Anvendelsesområde for mellemfor
      description: Angiver de sy- og håndarbejdsområder mellemforet er beregnet til.
    interfacing_color_family:
      name: Farvefamilie for mellemfor
      description: Angiver den typiske grundfarve på mellemforet, til brug under lyse
        eller mørke stoffer.
    interfacing_selling_format:
      name: Salgstype for mellemfor
      description: Beskriver hvordan mellemfor sælges (f.eks. metervare i længde,
        færdigklippede stykker, ruller eller prøver).
    interfacing_stiffness_level:
      name: Stivhedsniveau for mellemfor
      description: Beskriver hvor stift eller fast mellemforet er.
    interior_padding_type:
      name: Type indvending polstring
      description: Angiver hvilken type indvendig polstring eller indsats etuiet har
        til at beskytte og organisere indholdet.
    interior_stall_configuration:
      name: Indvendig boksindretning
      description: Angiver den indvendige opbygning til dyretransport (boks- og staldindretning).
    invitation_printing_coverage:
      name: Trykdækning for invitationer
      description: Angiver om invitationen er trykt på forside, bagside eller begge
        sider.
    iodization:
      name: Jodberigelse
      description: Angiver, om og i hvilken grad der er tilsat jod til saltet.
    iridescence_level:
      name: Iriseringniveau
      description: Beskriver intensiteten af den naturlige eller behandlede iriserende
        glans, som typisk ses i påfuglefjer.
    irish_warpipe_set_configuration:
      name: Opsætning af irsk warpipe-sæt
      description: Angiver om den irske warpipe sælges som komplet instrument eller
        som dele/partielt sæt.
    iron_on_applique_application_method:
      name: Påstrygningsmetode for stofapplikation
      description: Angiver, hvordan påstrygningsapplikationen er beregnet til at blive
        påført materialet.
    ironing_center_features:
      name: Strygecenterets funktioner
      description: Viser en liste over specialfunktioner i strygecentre, der forbedrer
        brugervenlighed og praktik.
    jacket_breast_style:
      name: Jakkens bryststil
      description: Angiver om jakkesættet er enkelt- eller dobbeltradet.
    jacket_vent_style:
      name: Jakkeventilstil
      description: Angiver typen af slids (åbning) bag på jakkesætsjakken.
    jam_and_jelly_consistency:
      name: Konsistens af marmelade og gelé
      description: Beskriver konsistensen af smørepålægget, herunder om det indeholder
        frugtstykker eller kerner.
    jaw_shape:
      name: Kæbeform
      description: Angiver kæbernes eller spidsens geometri (f.eks. lige, vinklet
        eller langnæset), som påvirker præcision og rækkevidde.
    jerky_form:
      name: Form på jerky
      description: Beskriver den fysiske form eller udskæring af jerky-stykkerne (f.eks.
        strimler, stænger eller bidder).
    jersey_style:
      name: Jersey-stil
      description: Angiver jerseyens formfaktor eller bære-/brugsstil for fantrøjer.
    jew_harp_accessories_included:
      name: Jødeharpetilbehør medfølger
      description: Viser en liste over de dele, der følger med i pakken til en mundharpe
        (f.eks. etui, pose og brugsvejledning).
    jew_s_harp_frame_style:
      name: Rammeform for mundharpe
      description: Beskriver konstruktionstypen for mundharpens ramme/krop, som påvirker
        spilfornemmelse, holdbarhed og ergonomi.
    jew_s_harp_tongue_profile:
      name: Tungeprofil for mundharpe
      description: Beskriver mundharpens tunges profil (reed) og geometri, som påvirker
        respons og klang.
    jewelry_pieces_included:
      name: Smykker medfølger
      description: Viser en liste over de specifikke smykker, der indgår i sættet,
        så kunder præcist kan se, hvilke dele de køber.
    jigsaw_puzzle_piece_shape:
      name: Formen på puslespilsbrikker
      description: Angiver den overordnede udskærings- og formstil på delene samt
        kantprofilen.
    jockstrap_design_features:
      name: Designfunktioner for jockstrap
      description: Angiver særlige designelementer i en suspensorium, som påvirker
        funktion eller udseende.
    juggling_club_construction_type:
      name: Konstruktionstype for jonglerkølle
      description: Angiver den overordnede konstruktionstype for en jonglerkølle (f.eks.
        støbt i ét stykke eller samlet af flere dele), hvilket påvirker holdbarhed,
        følelse og vedligeholdelse.
    juggling_club_core_material:
      name: Kernemateriale i jonglerkølle
      description: Angiver det primære kernemateriale inde i jonglerkøllen (adskilt
        fra ydre belægning/tape).
    juggling_prop_set_size:
      name: Størrelse på rekvisitsæt til jonglering
      description: Angiver antallet af primære rekvisitter, der indgår i sættet (f.eks.
        3 bolde eller et par poi).
    juggling_ring_edge_style:
      name: Kantstil på jonglerring
      description: Angiver ringens kantprofil og betydning for komfort og greb.
    juice_form:
      name: Juiceform
      description: Angiver produktets fysiske form eller forarbejdningsgrad (f.eks.
        færdigblandet juice, koncentrat eller pulver).
    juice_processing_method:
      name: Forarbejdningsmetode for juice
      description: Angiver den primære forarbejdningsmetode, der anvendes til juice
        eller drikkevare, og som påvirker smag, næringsindhold og holdbarhed.
    jump_rope_style:
      name: Sjippetovsstil
      description: Klassificerer konstruktionsstilen af rebet/kablet (f.eks. perletråd,
        stof, speedkabel), hvilket i høj grad påvirker den tilsigtede anvendelse og
        ydeevne.
    kale_variety:
      name: Kålvariant
      description: Angiver den specifikke sort eller kultivar af grønkål (f.eks. kruset
        grønkål, lacinato/dinosaur eller rød russisk grønkål). Dette hjælper kunder
        med at vælge baseret på smag, tekstur og kulinarisk anvendelse.
    kaleidoscope_viewing_type:
      name: Kalejdoskopets visningstype
      description: Angiver kalejdoskopets visningsformat eller funktionsmåde (f.eks.
        klassisk kikkert/okular, linsebaseret teleidoskop, hjuldrevet eller projektion).
    kayak_construction_type:
      name: Kayakonstruktionstype
      description: Angiver den primære konstruktionsform for kajakken, f.eks. hård
        skal eller oppustelig.
    kayak_design_type:
      name: Type af kajakdesign
      description: Klassificerer kajakkens primære designformål (f.eks. surfski, playboat
        eller touringkajak).
    kayak_hull_design:
      name: Kajakkens skrogdesign
      description: Angiver kajakkens primære skrogform og dens påvirkning af stabilitet
        og manøvredygtighed i bølger.
    kayak_storage_bag_type:
      name: Type af kajakopbevaringstaske
      description: Angiver typen af kajakopbevaringspose (f.eks. tørpose eller pagajtaske).
    kayak_style:
      name: Kajakstil
      description: Angiver kajakkens primære design- eller brugstype (f.eks. fritids-,
        touring- eller oppustelig kajak).
    keel_type:
      name: Køltype
      description: Angiver sejlbådens kølkonfiguration.
    kettlebell_style:
      name: Kettlebell-stil
      description: Identificerer konstruktionen eller variant af kettlebellen (f.eks.
        konkurrence, justerbar, blød), hvilket hjælper kunder med at vælge den rigtige
        kettlebell til deres træningsbehov.
    key_attachment_mechanism:
      name: Nøglefastgørelsesmekanisme
      description: Angiver den hardware, der bruges til at fastgøre nøgler inde i
        æsken, f.eks. ringe, klemmer eller skruestolper.
    key_retention_when_unlocked:
      name: Nøglefastholdelse ved oplåsning
      description: Angiver, om nøglen kan tages ud af låsen, når den er i ulåst position.
    keyboard_amplifier_inputs:
      name: Tastaturforstærkerindgange
      description: Viser en liste over de inputforbindelser, der understøttes af keyboardforstærkeren
        (f.eks. 1/4 in TRS, MIDI in, Bluetooth).
    keyboard_amplifier_output_types:
      name: Udgangstyper for tastaturforstærkere
      description: Angiver de primære output-forbindingskomponenttyper, der understøttes
        af keyboardforstærkeren til routing af lyd til andre systemer.
    keyboard_case_handle_type:
      name: Type af håndtag på keyboardetuiet
      description: Det primære håndtagsystem, der bruges til at bære eller flytte
        keyboardetuiet (udover remme).
    keyboard_case_interior_padding_type:
      name: Angiver typen af indvendig polstring i keyboardetuiet
      description: Primær indvendig polstring/foring anvendt inde i den hårde æske.
    keyboard_case_protection_level:
      name: Keyboardetuiets beskyttelsesniveau
      description: Det samlede beskyttelses- og stivhedsniveau for hardcase-etuiet,
        hvor der skelnes mellem formstøbte hårde skaller og kraftige flight-/ATA-kasser.
    keyboard_case_wheel_type:
      name: Hjultype på keyboardetui
      description: Angiver hjulkonfigurationen for hardcases, der er udstyret med
        hjul.
    keyboard_pedal_connector_type:
      name: Type af forbindelseskomponent til keyboard
      description: Angiver den forbindelseskomponent/stiktype, der bruges til at tilslutte
        sustainpedalen til et keyboard eller digitalt klaver.
    keyboard_power_supply_type:
      name: Type strømforsyning til keyboardet
      description: Keyboardets primære strømforsyning (batteri, strømadapter eller
        USB-strøm).
    keyboard_stand_tier_type:
      name: Typen af niveauer for keyboardstativ
      description: Angiver, om stativet kun sælges som et basisstativ eller inkluderer/tilføjer
        ekstra tilbehør.
    keyboard_stand_tiers:
      name: Niveauer for keyboardstativ
      description: Antal spilleniveauer understøttet af Z-stil-standen (f.eks. enkelt
        eller to niveauer).
    keychain_attachment_type:
      name: Nøgleringstilbehørstype
      description: Angiver det primære hardware, der bruges til at fastgøre nøgleringen
        til nøgler, tasker eller bælter.
    keychain_style:
      name: Nøgleringstil
      description: Beskriver nøgleringens overordnede form (hvad den fysisk er).
    keywork_finish:
      name: Tasternes finish
      description: Beskriver finishen/belægningen specifikt på klaviaturerne (tasterne),
        adskilt fra kroppens finish.
    kick_point:
      name: Stavens bøjningspunkt
      description: Angiver placeringen af bøjningspunktet på en hockeystavs skaft,
        som påvirker skuddets hastighed og følelse.
    kick_zone_grip_system:
      name: Grebssystemet i kick-zone
      description: Angiver den teknologi, der anvendes i skiens kick-zone for greb.
    kickboard_features:
      name: Kickboard-funktioner
      description: Fremhæver særlige egenskaber ved kickboardet, der forbedrer træning
        eller komfort, herunder overfladens tekstur og muligheder for håndgreb.
    kickboard_handle_style:
      name: Stil på kickboardets greb
      description: Angiver, om og hvordan kickboardet har håndgreb eller overfladebehandlinger,
        der påvirker håndtering og komfort.
    kickstand_mounting_position:
      name: Monteringsposition for støtteben
      description: Angiver, hvor på cykelstellet støttebenet monteres (f.eks. centermonteret,
        på kædestag eller ved bagaksel).
    kickstand_type:
      name: Støttebenstype
      description: Angiver støttebenets strukturelle design eller mekanisme (f.eks.
        enkeltbenet sidestøtteben, dobbelbenet centerstøtteben eller teleskopisk).
    kidney_belt_support_level:
      name: Støtteniveau for nyrebælte
      description: Producentangivet samlet støtte, som leveres af et nyrebælte til
        stabilisering af lænden og maven.
    kiln_firing_atmosphere:
      name: Ovnfyringsatmosfære
      description: Angiver den/de brændingsatmosfære(r), som ovnen kan understøtte
        under drift (f.eks. oxidation eller reduktion).
    kiln_heating_element_type:
      name: Typen af varmeelement i ovnen
      description: Type/materiale af varmeelementer, der anvendes i ovnen.
    kingpin_design:
      name: Kingpin-design
      description: Angiver konstruktionsstilen for kingpin-beslaget, som påvirker
        vægt og grind-højden.
    kingpin_orientation:
      name: Kingpin-orientering
      description: Angiver orienteringen af truckens kingpin, som påvirker køreegenskaber
        og kompatibilitet med boardet.
    kit_components_included:
      name: Sætkomponenter medfølger
      description: Angiver de enkelte hardwaredele, der følger med sættet (f.eks.
        jordspyd, bolte, stropper og installationsværktøj), så kunder præcist ved,
        hvad der er inkluderet.
    kit_format:
      name: Sætformat
      description: Angiver, hvordan sættet er pakket og transporteret (f.eks. pose,
        æske, boks).
    kit_items_included:
      name: Inkluderede sætgenstande
      description: Angiver det vigtigste udstyr og de forsyninger, der er inkluderet
        i vinfremstillingssættet, så kunder kan skelne mellem startsæt og refills
        med kun ingredienser.
    kit_pouch_case_type:
      name: Typen af pose eller etui til sættet
      description: Angiver typen af den medfølgende opbevaringsløsning til plejesættet
        (hvis en sådan er inkluderet).
    kit_tools_included:
      name: Inkluderede sætværktøjer
      description: Angiver de primære værktøjer, der følger med sættet (hvis nogen),
        til at fuldføre projektet.
    kite_inflation_system:
      name: System til oppustning af kiten
      description: Angiver, hvordan kitens forkant og stivere er oppustede.
    kite_line_configuration:
      name: Kite line-konfiguration
      description: Angiver antallet af flyve-/kontrolliner, som kitesejlet er designet
        til at bruge, en almindelig specifikation for korrekt parring af stænger og
        liner.
    kite_type:
      name: Kitetype
      description: Angiver den strukturelle designkategori for kiten (form og bridlesystem).
    kiteboard_bag_style:
      name: Kiteboard-taskestil
      description: Specifik stil eller undertype af kiteboard-æske (f.eks. boardbag,
        golftaske, rejsetaske, folietaske).
    kiwifruit_variety:
      name: Kiwifrugtsort
      description: Identificerer den specifikke kultivar eller farvevariant af kiwifrugten
        (grøn, guld, rød osv.).
    knee_pad_pocket_type:
      name: Lommetype på knæbeskytter
      description: Angiver, om og hvordan beklædningsgenstanden er designet til at
        rumme beskyttende knæbeskyttere.
    knee_pad_style:
      name: Knæbeskytterstil
      description: Angiver konstruktionstypen eller formtypen for knæbeskyttelsen
        (f.eks. sleeve, skinne eller beskyttelsespude).
    knee_protection_design:
      name: Knæbeskyttelsesdesign
      description: Angiver antallet af hængslede knæsektioner, der er indbygget i
        benbeskytteren.
    kneeboard_construction:
      name: Knæbrætkonstruktion
      description: Identificerer den primære konstruktionsteknik eller kompositopbygning
        af brættet (f.eks. rotationsstøbt plast, kompressionsstøbt, kulfiber).
    kneeboard_strap_type:
      name: Remtype for knæbræt
      description: Angiver typen af knæstropsystem, der bruges til at fastgøre rytteren
        til brættet.
    knife_lock_mechanism:
      name: Låsemekanisme for kniv
      description: Angiver den mekanisme, der bruges til at fastgøre et foldeknivsblad
        i åben position, eller angiver ikke-låsende design.
    knife_locking_mechanism:
      name: Låsemekanisme for kniv
      description: Angiver den type mekanisme, der fastgør klingen i åben position,
        og påvirker direkte sikkerhed, styrke og brugervenlighed for låsning af bladknive.
    knife_opening_mechanism:
      name: Åbningsmekanisme for kniv
      description: Angiver, hvordan klingen foldes ud fra håndtaget og skelner mellem
        manuel, assisteret, automatisk og særlige åbningsmekanismer.
    knife_system:
      name: Knivsystem
      description: Angiver, om og hvordan skærekniven fungerer på overlockmaskinen.
    knit_elastic_application:
      name: Brug af strikket elastik
      description: Angiver den tilsigtede anvendelse i syning og håndarbejde for den
        strikkede elastikkant.
    knit_pattern:
      name: Strikmønster
      description: Angiver den primære strikketeknik eller tekstur i cardiganens stof,
        f.eks. kabelstrik, rib eller vaffelstrik, så kunder kan vælge specifikke strukturer
        og varmeegenskaber.
    knit_style:
      name: Strikstil
      description: Angiver den primære strikkonstruktion, tekstur eller dekorative
        mønster i sweaterens stof.
    knitting_marker_counter_type:
      name: Typen af strikkemarkør eller tæller
      description: Angiver den funktionelle produkttype inden for strikkemarkører
        og tællere.
    knitting_needle_tip_style:
      name: Typen af spids på strikkepinden
      description: Spidsens skarphed og form, som er optimeret til forskelligt garn
        og forskellige teknikker.
    knock_sensor_technology:
      name: Bankesensorteknologi
      description: Angiver den sensorteknologi, der anvendes i bankesensoren.
    knurl_aggressiveness:
      name: Riflingens aggressivitet
      description: Angiver, hvor skarp eller grov riflemønsteret er på stangens skaft,
        hvilket påvirker greb, komfort og sikkerhed.
    knurl_marking_standard:
      name: Angiver standarden for markering af rifling på stangen
      description: Angiver placeringen af reference-riller til håndplacering (f.eks.
        IPF- eller IWF-markeringer).
    kohlrabi_variety:
      name: Kålrabi-sort
      description: Angiver kultivaren eller sorten af kålrabihovedet, så kunder kan
        vælge mellem forskellige smagsprofiler, størrelser og farver.
    koji_mold_type:
      name: Angiver typen af koji-svamp
      description: Angiver typen eller stammen af koji-skimmel, der bruges under fermentering,
        hvilket påvirker aroma og smag.
    kumquat_variety:
      name: Kumquat-sorten
      description: Angiver sorten eller kultivaren af kumquats, så kunder kan vælge
        frugt ud fra smagsprofil, størrelse eller kulinarisk anvendelse.
    label_edge_type:
      name: Type kant på etiketten
      description: Angiver typen af kantfinish, der bruges til at forhindre trevling
        og definere det æstetiske udtryk.
    label_finish:
      name: Labelfinish
      description: Angiver overfladefinish, tekstur eller beskyttende belægning/overfladebehandling
        på etiketten.
    label_finish_edge_style:
      name: Labelfinish/kantstil
      description: Angiver kanternes stil, hvilket påvirker komfort og holdbarhed
        (f.eks. vævet kant eller laserskåret).
    label_fold_type:
      name: Typen af foldning af etiketten
      description: Angiver hvordan påsyningsetiketten er konstrueret til at blive
        syet i et produkt (f.eks. endefold eller centerfold), hvilket påvirker påsyning
        og placering.
    label_text_type:
      name: Labelteksttype
      description: Angiver om etiketten er blank, fortrykt eller beregnet til personlig
        tilpasning.
    lace_area_size:
      name: Størrelsen på snøreområdet
      description: Definerer størrelsen eller konfigurationen af snøreområdet (f.eks.
        4×4 lukning, 13×6 frontal), som bestemmer den tilgængelige adskillelse.
    lace_tightener_style:
      name: Snørestrammerstil
      description: Angiver den mekaniske designtype eller form for snørelukkemekanismen.
    lace_type:
      name: Snøretype
      description: Angiver snørematerialet eller finishen ved hårgrænsen, som påvirker
        realisme og match med hudfarve.
    lacrosse_ball_certification:
      name: Lacrosseboldcertificering
      description: Angiver de godkendelser eller standarder fra sportsforbund, som
        lacrossebolden opfylder.
    lacrosse_goal_regulation_certification:
      name: Angiver, hvilke officielle regler eller standarder lacrossemålet er certificeret
        efter.
      description: Angiver, om lacrossemålet eller nettet opfylder specifikke standarder
        fra et sportsforbund (f.eks. NCAA eller NFHS).
    lacrosse_pocket_type:
      name: Typen af pocket i lacrosse-staven
      description: Angiver den overordnede type af pocket eller net i stavens hoved,
        som påvirker boldkontrol og skud.
    lacrosse_string_type:
      name: Typen af snøre i lacrosse-staven
      description: Klassificerer den præcise type eller anvendelse af snor eller mesh,
        så kunder kan skelne mellem mesh-typer, sæt og specifikke snøreroller i en
        pocket.
    ladder_position:
      name: Stigeposition
      description: Angiver, hvor stigen eller trappen er placeret på høj seng til
        småbørn.
    lanyard_attachment_hardware:
      name: Fastgørelse til nøglesnor
      description: Angiver typen af beslag i enden af nøglesnoren, som bruges til
        at fastgøre nøgler, badges, telefoner eller andet tilbehør.
    lanyard_style:
      name: Nøglesnorsstil
      description: Angiver, hvordan nøglesnoren bæres eller holdes.
    lanyard_type:
      name: Nøglesnorstype
      description: Angiver typen af nøglesnor, der følger med eller er kompatibel
        med fløjten.
    lap_hand_loom_accessories_included:
      name: Medfølgende tilbehør til lapvæven
      description: Tilbehør, der følger med pakken til lapvæven.
    lapel_style:
      name: Reversstil
      description: Angiver designet af jakkens revers (f.eks. hakrevers, spidse revers
        eller sjalsrevers).
    laser_safety_class:
      name: Lasersikkerhedsklasse
      description: Angiver laserens sikkerhedsklasse (f.eks. klasse 2, 3R, 3B, 4)
        som angivet i produktets dokumentation eller mærkning.
    latex_processing_method:
      name: Forarbejdningsmetode for latex
      description: Angiver den fremstillingsproces, der bruges til at producere latexskummet
        – typisk Dunlop eller Talalay – hvilket påvirker følelse, responsivitet og
        pris.
    latex_type:
      name: Latextype
      description: Angiver latexens oprindelse og sammensætning i madrassen (naturlig,
        økologisk, syntetisk eller blandet), hvilket informerer om holdbarhed, miljøvenlighed
        og mulige allergener.
    launch_profile:
      name: Skudprofil
      description: Angiver den typiske boldbane (lav, medium eller høj), som skaftet
        i en golfkølle er designet til at producere.
    launcher_mounting_configuration:
      name: Monteringskonfiguration af kaster
      description: Angiver, hvordan affyringsenheden er monteret eller konfigureret
        til brug, så købere kan vælge mellem fritstående, underløbs- eller skinnemonterede
        løsninger.
    layer_construction:
      name: Lagskonstruktion
      description: Angiver laminatkonstruktionen i stoffet (f.eks. 2-lags, 2,5-lags
        eller 3-lags), som påvirker vægt, pakbarhed og holdbarhed.
    layer_design:
      name: Lagdesign
      description: Angiver hårnettets konstruktion i forhold til lag, eller om det
        er vendbart.
    lazy_kate_tension_control_type:
      name: Typen af spændingskontrol på en lazy kate
      description: Angiver, hvordan lazy katen skaber modstand/spænding på spolerne
        under tvinding eller oprulning.
    lead_hardware_type:
      name: Type af snorhardware
      description: Angiver typen af fastgørelse i enden af snoren (f.eks. karabinhage,
        clips, løkke eller kæde), hvilket påvirker brugervenlighed, sikkerhed og egnethed
        til forskellige discipliner.
    leaf_gelatin_grade:
      name: Klassificeringen af bladgelatine
      description: Angiver den standardiserede styrkeklassificering for bladgelatine.
    leaf_preparation:
      name: Bladklargøring
      description: Beskriver, hvordan bladene tilberedes inden emballering, f.eks.
        hakkes, strimles eller skæres med juliennejern.
    leaf_spring_material:
      name: Bladfjedermateriale
      description: Det primære konstruktionsmateriale i bladfjederpakken.
    leak_protection_layer:
      name: Lækagebeskyttelseslag
      description: Angiver om svømmejammerens indbyggede ble-system er designet med
        et enkelt- eller dobbeltlags lækagebeskyttelse.
    leash_clip_type:
      name: Snorklemmetype
      description: Angiver den klips- eller hardware, der bruges til at fastgøre snoren
        til et halsbånd eller en sele (f.eks. boltklik, karabinhage, drejeklips).
    leash_style:
      name: Snorstil
      description: Beskriver snorens konfiguration eller oprulningsstil.
    leash_type:
      name: Snortype
      description: Klassificerer snorens overordnede stil eller anvendelsesorienterede
        konfiguration, så man hurtigt kan filtrere efter tiltænkt brug.
    leavening_action_type:
      name: Hævemiddeltype
      description: Angiver den kemiske sammensætning eller hævningsmetode for bagepulver
        (f.eks. enkeltvirkende, dobbeltvirkende eller aluminiumfrit). Dette påvirker
        direkte bageevnen og egnetheden til forskellige opskrifter.
    leavening_agent:
      name: Hævemiddel
      description: Angiver den primære hævemekanisme, der anvendes i dejen.
    led_color_options:
      name: LED-farvemuligheder
      description: Angiver de valgbare LED-farver på alarmen til visuel bidindikation.
    led_indicator_color:
      name: LED-indikatorfarve
      description: Angiver farven på produktets LED-indikator, så lystfiskere kan
        matche flere alarmer eller vælge efter personlig præference.
    led_light_color:
      name: LED-lysets farve
      description: Angiver farven på eventuel integreret LED-belysning.
    leek_variety:
      name: Porresort
      description: Angiver sorten eller kultivaren af porren, så man kan skelne efter
        smag, størrelse og vækstsæson.
    leg_coverage:
      name: Bendækning
      description: Angiver, hvor stor en del af benet våddragtsdelen dækker (f.eks.
        kort model eller fuld længde).
    leg_cuff_style:
      name: Benmanchetstil
      description: Angiver den stilen ved buksernes ankelåbning.
    leg_cut_height:
      name: Snithøjde ved ben
      description: Angiver, hvor højt benåbningen er skåret på bikinitrussen.
    leg_cut_style:
      name: Benlængdetype
      description: Angiver formen på benåbningen, som påvirker udseende, komfort,
        og hvordan huden bliver solbrændt under brug.
    leg_length:
      name: Benlængde
      description: Kategoriserer badebukser efter relativ benlængde (kort, mellem
        eller lang), så kunder kan vælge deres foretrukne dækning uden at opdele kategorien.
    leg_loop_type:
      name: Benlooptype
      description: Beskriver designet af benløkkerne.
    leg_opening_style:
      name: Benåbningsstil
      description: Angiver, hvordan benåbningerne er afsluttet på joggingbukserne,
        f.eks. med elastikmanchetter, lynlåse eller åbne sømme.
    leg_style:
      name: Bentype
      description: Angiver design- eller konstruktionstypen for buksernes ben eller
        benafslutning.
    legging_foot_design:
      name: Leggingsfoddesign
      description: Angiver, om leggings er uden fod, med fod eller kan konverteres
        mellem begge typer.
    leggings_waistband_style:
      name: Taljestil for leggings
      description: Angiver den strukturelle udformning af linningen på leggings, som
        påvirker komfort, støtte og udseende.
    lei_closure_style:
      name: Lei-lukningsstil
      description: Angiver, om leis er en sammenhængende løkke eller har åbne ender,
        der bindes eller fastgøres med bånd.
    lemon_variety:
      name: Citronsort
      description: Angiver den specifikke sort eller kultivar af citroner (f.eks.
        Eureka, Meyer eller Amalfi).
    length_adjustment_method:
      name: Længdejusteringsmetode
      description: Angiver, om og hvordan sjippetovets længde kan justeres, så den
        passer til brugeren.
    lens_color_tint:
      name: Linsefarve/toning
      description: Farve eller toning af beskyttende brillelinser, følger med produktet.
    lens_construction:
      name: Linsekonstruktion
      description: Angiver linsens opbygning (f.eks. enkeltlag eller dobbeltlag med
        termisk isolering), som indikerer dugresistens og optisk ydeevne.
    lens_tint_category:
      name: Linsetintkategori
      description: Klassificerer linsens mørkhedsgrad baseret på internationale tint-kategorier,
        så kunder kan vælge linser, der passer til forskellige lysforhold.
    lettuce_variety:
      name: Salatsort
      description: Angiver den specifikke dyrkningssort af salat (f.eks. iceberg,
        romaine eller smørsalat), så man kan filtrere og sammenligne mere præcist.
    level_of_play:
      name: Spilleniveau
      description: Producentens angivne performance-niveau, som matcher spillerens
        konkurrence- og budgetniveau.
    lever_configuration:
      name: Konfiguration af håndtag
      description: Angiver konfigurationen af håndtag/greb til motorstyring på vandfartøjet
        (f.eks. enkeltgreb eller dobbeltgreb).
    lever_type:
      name: Håndtagstype
      description: Angiver typen eller mekanismen af de pedaler/håndtag, der ændrer
        tonehøjden på harpens strenge.
    license_plate_cover_style:
      name: Stilen for nummerpladerammen
      description: Angiver konstruktionstypen for nummerpladerammen (f.eks. fuld cover
        eller skruekapper).
    license_plate_personalization_type:
      name: Tilpasningstype for nummerplade
      description: Angiver, om nummerpladen er blank, fortrykt eller understøtter
        kundetilpasset design (tekst og/eller grafik).
    license_usage_terms:
      name: Licens-/brugsbetingelser
      description: Brugsrettigheder til mønsteret (f.eks. kun personlig brug vs. begrænset
        kommerciel brug).
    licensed_sports_property:
      name: Licenseret sportsejendom
      description: Angiver, om produktet er officielt licenseret af en liga/et hold/en
        organisation.
    lid_hinge_mechanism:
      name: Hængselmekanisme på låg
      description: Angiver den hængselmekanisme, der bruges til låget, hvilket påvirker
        sikkerhed og brugervenlighed.
    lid_support_positions:
      name: Positioner, hvor låget kan fastholdes
      description: Angiver de understøttede positioner for lågets støttepind på et
        flygel (hvor langt låget kan åbnes).
    lie_angle_color_code:
      name: Farvekode for liggende vinkel
      description: Angiver producentens farvekodede system for liggende vinkel på
        visse køller (f.eks. sort prik, grøn prik).
    life_jacket_certification_standard:
      name: Standard for certificering af redningsveste
      description: Angiver den officielle sikkerhedsklassificering eller standard,
        som produktet opfylder, f.eks. USCG-type eller ISO/AS-niveauer.
    life_raft_certification_standard:
      name: Standard for certificering af redningsflåder
      description: Angiver den sikkerhedsstandard eller certificering, som raften
        er bygget og serviceret efter.
    life_raft_container_type:
      name: Beholdertype til redningsflåde
      description: Hvordan redningsflåden pakkes til opbevaring og ibrugtagning.
    life_vest_approval_standard:
      name: Standard for godkendelse af redningsveste
      description: Angiver den certificerings-/godkendelsesstandard, som redningsvesten
        overholder.
    life_vest_intended_user:
      name: Tiltænkt bruger af redningsvesten
      description: Angiver den tiltænkte brugergruppe, så pasform og tilpasning af
        produktet passer korrekt.
    lifebuoy_approval_standard:
      name: Godkendelsesstandard for redningskrans
      description: Angiver den sikkerhedsgodkendelse eller standard, som redningskransen
        overholder (f.eks. USCG eller SOLAS).
    lifebuoy_features:
      name: Redningskransfunktioner
      description: Funktionel sikkerhed, montering/håndtering og inkluderede tilbehørsfunktioner
        til redningskranse.
    lift_mechanism_type:
      name: Liftmekanismetype
      description: Angiver den mekanisme, der hjælper med at hæve/sænke eller åbne/lukke
        vægsengen.
    lift_stand_support_point:
      name: Støttepunkt for lift/stativ
      description: Hvor liften/stativet berører/støtter køretøjet.
    lifting_gas_type:
      name: Løftegastype
      description: Angiver den primære løftegas eller det opdriftsmedie, som luftskibet
        anvender.
    lifting_support_type:
      name: Type af løfte- eller støtteudstyr
      description: Angiver, om der løftes via ramper/køreflader eller via arme/puder,
        der kontakter stellet/løftepunkterne.
    ligature_and_cap_component_type:
      name: Type af ligatur og kapselkomponent
      description: Angiver om produktet er en ligatur, en kapsel eller et sæt, der
        indeholder begge dele.
    ligature_material:
      name: Ligaturmateriale
      description: Det primære materiale i ligaturens krop, som er i kontakt med og
        fastholder bladet (f.eks. metal, læder eller stof).
    ligature_plating_or_finish:
      name: Ligaturbelægning eller -finish
      description: Angiver den belægning eller overfladefinish, der er påført en metal-ligatur
        og/eller kapsel til klarinet.
    ligature_reed_contact_style:
      name: Angiver, hvordan ligaturen trykker eller kontakter bladet
      description: Angiver, hvordan ligaturen er i kontakt med bladet (f.eks. minimal
        kontakt, flerpunkt eller omsluttende).
    ligature_screw_position_relative_to_reed:
      name: Skruens placering på ligaturen (i forhold til bladet)
      description: Angiver placeringen af ligaturens spændeskruer i forhold til bladets/den
        spillervendte side, når den er monteret på mundstykket.
    ligature_tension_adjustment_mechanism:
      name: Mekanisme til justering af ligaturspænding
      description: Angiver, hvordan ligaturen påfører og justerer tryk på bladet (fastgørelsesdesign).
    ligature_tightening_mechanism_type:
      name: Type af ligaturspændingsmekanisme
      description: Angiver den mekanisme, som ligaturen bruger til at stramme omkring
        mundstykke og blad (f.eks. enkelt skrue, dobbel skrue eller håndtag/quick-release).
    light_bar_housing_material:
      name: Materiale i lygtebjælken
      description: Primært materiale i lysbjælkekabinettet, hvilket påvirker holdbarhed
        og varmeafledning.
    light_bar_lens_material:
      name: Lygtebjælkens linsemateriale
      description: Angiver det primære materiale i lygtebjælkens linse/dæksel, som
        kan påvirke modstandsdygtighed overfor slag og optisk klarhed.
    light_bar_mounting_location:
      name: Monteringslokation for lygtebjælke
      description: Den primære tiltænkte monteringsposition på køretøjet.
    light_stand_style:
      name: Lysstativstil
      description: Angiver stativets strukturelle type eller form til understøttelse
        af specialeffektlys (f.eks. tripod, T-bar eller kranstativ), ikke installationsfladen
        (væg/loft), som dækkes af monteringstype.
    light_switch_function:
      name: Lyskontaktens funktioner
      description: Angiver, hvilke lyskredsløb eller -funktioner kontakten styrer.
    lighting_control_protocols_supported:
      name: Understøttede lysstyringsprotokoller
      description: Angiver, hvilke styre- eller netværksprotokoller controlleren understøtter
        som supplement til eller i stedet for DMX512.
    lighting_effects:
      name: Lyseffekter
      description: Angiver eventuelle integrerede lysfunktioner, der forbedrer spiloplevelsen
        eller æstetik.
    lighting_mode:
      name: Lystilstand
      description: Angiver de tilgængelige lysmønstre såsom konstant lys, blink, stroboskop
        eller SOS.
    lily_variety:
      name: Liljevariant
      description: Angiver den kommercielle/botaniske sort af liljer, der sælges som
        frisk afskåret blomst (f.eks. asiatisk eller orientalsk).
    limb_articulation:
      name: Lemmernes bevægelighed
      description: Angiver graden af lemmernes fleksibilitet eller bevægelighed i
        dukken (ingen, fast, semi-fleksibel, fuldt bevægelig).
    limb_material:
      name: Benmateriale
      description: Angiver det primære materiale i buens eller armbrøstens dele, som
        påvirker vægt, holdbarhed, vibration og samlet ydeevne.
    lime_variety:
      name: Limevariant
      description: Angiver den specifikke botaniske eller kommercielle sort af lime,
        der sælges.
    line_buoyancy:
      name: Snorens opdrift
      description: Angiver, om fletlinen naturligt flyder eller synker, samt i hvilken
        grad, hvilket påvirker agnpræsentation og linehåndtering.
    line_purpose:
      name: Linjeformål
      description: Angiver den tilsigtede funktion af linen i kitesystemet (f.eks.
        flyveline foran, depower-line eller bridle-line).
    linen_finish_treatment:
      name: Linnedets overfladefinish eller behandling
      description: Angiver enhver efterbehandling af linnedstoffet, som ændrer dets
        følelse, udseende eller egenskaber.
    linen_weave_type:
      name: Linnedvævningstype
      description: Angiver vævekonstruktionen af linnedstoffet, som påvirker tekstur,
        åndbarhed og fald.
    liner_padding_type:
      name: Sengerands polstringstype
      description: Angiver konstruktionen eller polstringstypen i foret (f.eks. mesh,
        let polstret eller quiltet).
    liner_shape:
      name: Polstringens form
      description: Angiver den overordnede form på sovepose-foret, så kunder kan matche
        det til deres sovepose og komfortpræferencer.
    liner_type:
      name: Foringstype
      description: Angiver, om shortsene har et indvendigt for, og i så fald hvilken
        stil det er.
    lining:
      name: Foring
      description: Angiver, om badebukserne er foret, og hvordan foret er udformet,
        herunder hvor stor en del af indersiden der er dækket.
    lining_material:
      name: Foringsmateriale
      description: Angiver det materiale, der bruges til skoens indvendige foring,
        hvilket påvirker komfort, åndbarhed og varme.
    lining_type:
      name: Foringstype
      description: Angiver, om badetøjet er foret og i hvilken grad.
    link_connection_style:
      name: Stil for forbindelsesled
      description: Angiver, hvordan kædeleddet samles (f.eks. quick link eller samlepin),
        så ryttere kan vælge korrekt monteringsmetode eller reservedel.
    live_bait_form:
      name: Levende agntype
      description: Angiver den fysiske form eller konserveringstilstand af agnet såsom
        levende, frossen eller tørret.
    living_room_furniture_items_included:
      name: Møbelartikler til stue medfølger
      description: Angiver de enkelte møbeldele, der indgår i stuesættet, så kunder
        hurtigt kan se præcis, hvilke komponenter (f.eks. sofa, loveseat eller sofabord)
        der er inkluderet.
    load_mechanism:
      name: Pålastningsmekanisme
      description: Angiver den primære metode, hvorved modstand genereres eller føjes
        til maskinen (f.eks. vægtmagasin, pladebelastet eller elastikbaseret).
    lock_cylinder_type:
      name: Låsecylindertype
      description: Angiver typen af nøglecylinder/-kerne (relevant for dirkesikkerhed
        og udskiftning af nøgler).
    lock_security_level:
      name: Lås' sikkerhedsniveau
      description: Beskriver låsens/cylinderens beskyttelse mod indbrud og boring.
    lock_system:
      name: Låsesystem
      description: Typen af sikkerhedslåsesystem, der holder liften i den ønskede
        højde.
    locker_bench_configuration:
      name: Konfiguration af skabsbænk
      description: Beskriver orienteringen eller den strukturelle konfiguration af
        garderobebænken (f.eks. enkeltsidet, dobbeltsidet køkken-ø, vægmonteret).
    locomotive_prototype_power_type:
      name: Type drivkraft, som lokomotivets prototype bruger
      description: Angiver den faktiske fremdriftstype for lokomotivet, som modellen
        repræsenterer.
    locomotive_wheel_arrangement_whyte_notation:
      name: Lokomotivets hjularrangement (Whyte-notation)
      description: Hjularrangementet for lokomotivets prototype (f.eks. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Højdekategorien for en loftseng
      description: Angiver den samlede højdetype for en loftseng (lav, mellem, høj
        eller ekstra høj), så kunder kan matche loftshøjde og pladsen under sengen.
    logo_application_method:
      name: Påføringsmetode for logo
      description: Angiver hvordan skolens emblem eller logo er påført beklædningsgenstanden
        (f.eks. broderet eller trykt).
    logo_label_compatible_fabric_weight:
      name: Stofvægt, som er kompatibel med logoetiketter
      description: Anbefalet stofvægtkategori til påsætning af etiketten uden at ændre
        formen eller give unødig fylde.
    logo_label_edge_finish:
      name: Typen af kantfinish på logoetiketten
      description: Angiver kantens konstruktion eller finish på etiketten, hvilket
        påvirker modstandsdygtighed mod trevling og komfort mod huden.
    logo_label_print_production_method:
      name: Logoetikettens fremstillingsmetode/trykmetode
      description: Hvordan logoet er påført eller lagt på etiketoverfladen.
    long_block_completeness:
      name: Long block-motors fuldstændighed
      description: Angiver, hvilke hovedkomponenter der er inkluderet i long block-samlingen.
    long_john_pieces_included:
      name: Long john-dele er inkluderet
      description: Angiver, om produktet kun omfatter underdelen, overdelen eller
        begge dele af et long john-sæt.
    longan_variety:
      name: Longansorten
      description: Angiver den specifikke kultivar eller kommercielle sort af longanfrugt
        (f.eks. Kohala, Biew Kiew), så kunder kan vælge ønsket smag, størrelse og
        sødme.
    loom_accessories_included:
      name: Vævstilbehør medfølger
      description: Vigtigt tilbehør medfølger væven i æsken/pakken.
    loom_finish:
      name: Vævens finish
      description: Vævens finish (primært for trævæve).
    loom_folding_portability_design_type:
      name: Vævens foldnings- eller transportdesign
      description: Om og hvordan væven kan foldes sammen til transport eller kompakt
        opbevaring.
    loom_frame_folding_design:
      name: Rammens foldedesign på væven
      description: Angiver, om og hvordan bordvævens ramme kan foldes, klappes sammen
        eller skilles ad til opbevaring eller transport.
    loom_tension_adjustment_method:
      name: Metode til justering af vævspænding
      description: Den primære metode til at justere kædespændingen på væven.
    loom_tie_up_system:
      name: Vævbindingssystem
      description: Typen af bindesystem eller forbindelsessystem mellem trædepedaler,
        lammer og skafter (f.eks. Texsolv eller metalkæde).
    loquat_variety:
      name: Loquat-sort
      description: Angiver sorten eller kultivaren af loquat, som afspejler forskelle
        i størrelse, smag, modningstid og udseende.
    lubricant_features:
      name: Smøremidlets egenskaber
      description: Angiver særlige egenskaber, additiver eller fordele ved smøremidlet.
    lubrication_requirement:
      name: Smørekrav
      description: Angiver, om samlingerne er forbehandlede/vedligeholdelsesfrie eller
        kræver løbende smøring eller voksbehandling.
    lubrication_type:
      name: Smøremiddeltype
      description: Angiver, om bøsningen er designet til at kunne smøres med fedt
        (f.eks. via smørespor eller smørenippel).
    lug_nut_seat_profile:
      name: Anlægsprofil på hjulmøtrikken
      description: Angiver den anlægsprofil på hjulmøtrikken, som fælgen kræver for
        at sikre korrekt kompatibilitet og sikker montering.
    lumbar_support_type:
      name: Type af lændestøtte
      description: Angiver typen af lændestøtte, som stolen er udstyret med (f.eks.
        aftagelig pude, justerbar mekanisme eller massagefunktion).
    lunge_trainer_style:
      name: Type af lungetræningsmaskine
      description: Definerer det strukturelle design af en lungetræningsmaskine.
    lure_buoyancy:
      name: Lokkens opdrift
      description: Angiver, hvordan agnen opfører sig i vandsøjlen under pause eller
        indspinning (f.eks. flydende på overfladen, flydende under vand eller synkende).
    luster:
      name: Glans
      description: Angiver, hvordan lys reflekteres fra prøvens overflade (f.eks.
        glasagtig eller metallisk).
    lychee_cultivar:
      name: Litchi-kultivar
      description: Angiver den specifikke litchisort eller kultivar - såsom Brewster,
        Hak Ip eller Mauritius - som kan variere i smag, frøstørrelse, høstsæson og
        pris.
    lyre_flip_folder_mounting_location:
      name: Monteringsplacering til lyre/flipfolder
      description: Hvor lyre- eller flipfolderen er beregnet til at blive monteret
        på instrumentet eller tilbehøret (f.eks. på klangstykket, mundrøret eller
        et stativ).
    lyrics_display_type:
      name: Visningstype for sangtekster
      description: Hvordan sangtekster vises (hvis det understøttes) under karaoke.
    magazine_compatibility:
      name: Magasinkompatibilitet
      description: Angiver de primære magasinkalibre eller -typer, som vestens integrerede
        lommer er designet til at rumme.
    magnet_requirement:
      name: Krav til magneter
      description: Angiver, om sensoren kræver en ekstern magnet for at fungere.
    magnet_toy_storage_included:
      name: Opbevaring tilmMagnetlegetøj inkluderet
      description: Typen af opbevaringsetui eller beholder, der følger med magnetlegetøjet
        til skrivebordsorganisering og transport.
    malanga_variety:
      name: Malanga-sorten
      description: Angiver den specifikke sort af malanga/taro-rod, der sælges, så
        kunder kan vælge deres ønskede smag, farve eller kulinariske anvendelse.
    malt_color_rating_system:
      name: Rangeringssystem til maltfarve
      description: Angiver, hvilken farveskala den angivne farve refererer til (Lovibond,
        SRM eller EBC).
    malt_crush:
      name: Maltknusning
      description: Angiver, om basismalten sælges hel/umalet eller forknust, og i
        så fald knusningsstilen.
    malt_form:
      name: Maltform
      description: Angiver, om produktet sælges som hele kerner eller forarbejdet
        til mos (f.eks. knust).
    malt_intended_use:
      name: Tilsigtet anvendelse for malt
      description: Maltens primære anvendelsesformål (brygning, destillering eller
        dobbelt anvendelse).
    malt_treatment:
      name: Maltbehandling
      description: Angiver, hvordan kornet/malten er blevet forarbejdet ud over almindelig
        tørring/kilning (typiske specialprocesser).
    malt_usage_purpose:
      name: Maltbrugsformål
      description: Beskriver det primære bidrag fra en specialmalt til en ølopskrift.
    man_overboard_system_type:
      name: Mand over bord-systemtype
      description: Angiver den primære kategori af mand over bord-løsning (MOB), som
        produktet tilbyder.
    mandolin_back_sides_wood:
      name: Trætype i mandolinens ryg og sider
      description: Angiver den træsort, der anvendes til mandolinens ryg og sider.
    mandolin_body_top_wood:
      name: Trætype i mandolinens krop
      description: Primært trætype/materiale brugt til mandolinens dæk (øverst).
    mandolin_bridge_type:
      name: Type mandolinbro
      description: Angiver den anvendte brostil på mandolinen.
    mandolin_pickup_configuration:
      name: Konfiguration af mandolintransducer
      description: Angiver, om mandolinen inkluderer elektronik, og hvilken type pickupsystem
        der er installeret.
    mandolin_string_configuration:
      name: Konfiguration af mandolinstreng
      description: Angiver mandoliens strengkonfiguratione efter samlet antal strenge
        og antal baner (f.eks. 8 strenge/4 baner).
    mangosteen_variety:
      name: Mangostanvariant
      description: Identificerer den specifikke art eller kultivar af mangostan eller
        den nært beslægtet garcinia-frugt, der sælges.
    mannequin_style:
      name: Mannequin-stil
      description: Beskriver træningsmannequinens strukturelle design eller konstruktionsstil.
    manufacturing_process:
      name: Fremstillingsproces
      description: Primær produktionsmetode for hjulet eller spolen (f.eks. CNC-maskinbearbejdet,
        støbt).
    map_coverage_sky_planet_body:
      name: Kortdækning (himmel/planetlegeme)
      description: 'Angiver, hvad kortet afbilder: nattehimlen (konstellationer) eller
        en specifik planet.'
    map_format:
      name: Kortformat
      description: Definerer den fysiske eller digitale præsentation af jagtkort og
        guider.
    map_sensor_output_signal_type:
      name: MAP-sensorens udgangssignaltype
      description: Angiver den type udgangssignal, som MAP-sensoren leverer til motorstyringsenheden
        (ECU).
    map_size_sheet:
      name: Kortstørrelse (ark)
      description: Angiver den færdige størrelse af kortarket/plakaten/planisfæren
        for at hjælpe med visning og kompatibilitet (rammestørrelse, vægplads).
    marabou_feather_form:
      name: Form af maraboufjer
      description: Formfaktoren for maraboufjer-produktet som solgt.
    marabou_feather_treatment:
      name: Behandling af maraboufjer
      description: Hvordan maraboufjeren blev forarbejdet eller færdiggjort til fluebinding.
    marble_track_set_feature_modules:
      name: Funktionsmoduler til kuglebanesæt
      description: Fremhæver de særlige funktionsmoduler, der medfølger i sættet (f.eks.
        elevator, affyringsrampe, sporskifter).
    marine_flare_certification_standard:
      name: Certificering/standard for marine-nødblus
      description: Angiver, hvilken eller hvilke maritime sikkerhedscertificeringer
        eller standarder nødblusset hævdes at opfylde.
    marine_safety_standard_compliance:
      name: Overholdelse af sikkerhedsstandarder for skibsfart
      description: Angiver, hvilke formelle standarder eller godkendelse for vandsikkerhed
        tilbehøret opfylder.
    marine_transmission_type:
      name: Marinetransmissionstype
      description: Angiver typen af marinetransmission parret med indenbordsmotoren
        (f.eks. direkte drev vs. V-drev).
    marker_action_type:
      name: Markørhandlingstype
      description: Beskriver markørens grundlæggende affyrings-/betjeningsmekanisme.
    marker_caliber:
      name: Markørkaliber
      description: Angiver diameteren af paintballkugler, markøren er beregnet til
        at affyre.
    marking_durability:
      name: Holdbarhed af opmærkning
      description: Angiver, hvor længe den malede linje forventes at forblive synlig
        under normale forhold, for eksempel midlertidig (op til 3 uger), semi-permanent
        (op til 6 måneder) eller permanent (mere end 6 måneder).
    marking_tip_type:
      name: Markeringsspidstype
      description: Type af markeringsindsats, som kompasset bruger til tegning (f.eks.
        blyantholder vs. blæk vs. ridsespids).
    marshmallow_processing_method:
      name: Forarbejdningsmetode for skumfiduser
      description: Beskriver enhver særlig forarbejdning, der anvendes på skumfiduserne,
        som påvirker tekstur, holdbarhed eller smag.
    marshmallow_size:
      name: Skumfidusstørrelse
      description: Klassificerer den relative størrelse af de enkelte skumfidusstykker.
    martial_arts_belt_rank:
      name: Kampsportsbæltes rang
      description: Indikerer færdighed/rangniveau, der angives af bæltets farve eller
        specielle farvekombination.
    mask_bib_type:
      name: Type af halsbeskytter på fægtemaske
      description: Angiver typen af halsbeskytter på fægtemasken, f.eks. standardstof,
        ledende, aftagelig eller ingen.
    mask_cage_material:
      name: Materiale til maskebeskyttelse
      description: Materiale, der specifikt anvendes til ansigtsbeskyttelse eller
        maskestellet.
    mask_goggle_design:
      name: Design af maske/beskyttelsesbriller
      description: Definerer det overordnede strukturelle design eller dækningsstilen
        for beskyttelsesudstyret.
    mask_skirt_material:
      name: Materiale i den nedre del af masken
      description: Identificerer materialet i det bløde stof, der giver den vandtætte
        forsegling mellem maske og ansigt.
    mask_strap_material:
      name: Maskestropmateriale
      description: Angiver materialet i den rem, der fastgør masken til hovedet.
    mass_air_flow_sensor_measurement_type:
      name: Måletype for luftmstrømssensor
      description: Angiver den sensorteknologi/outputstil, der anvendes af MAF-sensoren.
    mass_air_flow_sensor_mounting_type:
      name: Monteringstype for luftstrømssensoren
      description: Hvordan MAF-sensoren eller sensorenheden er monteret/installeret
        i indsugningssystemet.
    massage_feature:
      name: Massagefunktion
      description: Angiver, om den justerbare base har en integreret massagefunktion,
        og i så fald hvor mange massagezoner den tilbyder.
    mast_attachment_interface:
      name: Grænseflade til mastemontering
      description: Angiver forbindelsesstandarden mellem fuselagen og masten, hvilket
        hjælper kunden med at sikre, at komponenten passer.
    mast_base_type:
      name: Mastbasetype
      description: Identificerer monteringsgrænsefladen, der forbinder masten til
        brættet eller adapteren.
    mast_bend_curve:
      name: Mastbøjningskurve
      description: Mastens bøjningsmønster, der bestemmer sejlets kompatibilitet og
        håndtering.
    mast_diameter_type:
      name: Mastdiametertype
      description: Standardklassificering af diameter for windsurfingmasten (f.eks.
        RDM, SDM, MDM), anvendes til kompatibilitetstjek.
    mat_backing_type:
      name: Type undersidebeklædning på måtte
      description: Angiver typen af beklædning på undersiden af måtten, der hjælper
        med at holde den på plads på forskellige overflader.
    mat_installation_method:
      name: Installationsmetode for måtte
      description: Angiver, hvordan måtten er monteret eller fastgjort.
    mat_style:
      name: Måttestil
      description: Definerer måttens strukturelle stil eller formfaktor (f.eks. foldemåtte,
        klikfliser, beskyttelsespude).
    maternity_panel_type:
      name: Type graviditetspanel
      description: Angiver stilen på strækpanelet eller linningen, der er designet
        til at passe til væksten under graviditet.
    maternity_waistband_style:
      name: Stil af graviditetslinning
      description: Angiver designet og placeringen af linningen eller mavepanelet
        specifikt for graviditetsbukser og beskriver, hvordan beklædningsgenstanden
        støtter en voksende mave.
    mattress_top_type:
      name: Madrastop-type
      description: Angiver stilen for madrassens øverste lag eller overfladekonstruktion,
        f.eks. pudetop eller tæt top.
    maturation_vessel_material:
      name: Materiale for modningsbeholder
      description: Angiver det primære materiale i beholderen eller tønden, der anvendes
        til lagring af shochuen.
    maximum_quilt_size_supported:
      name: Maksimal understøttet quiltstørrelse
      description: Den maksimale quilt-/projektstørrelse, som rammen kan rumme (ofte
        beskrevet angivet i sengestørrelse eller maksimal bredde).
    meal_course:
      name: Måltidsret
      description: Identificerer det typiske måltid for produktet.
    meal_preparation_state:
      name: Madlavningstilstand
      description: Angiver, hvor meget forberedelse der kræves før spisning (f.eks.
        Klar til at spise, Måltidssæt).
    meat_processing_state:
      name: Kødforarbejdningstilstand
      description: Angiver graden af tilberedning eller saltning, der er anvendt på
        kødproduktet før udsalg.
    meat_quality_grade:
      name: Grad af kødkvalitet
      description: Angiver den kvalitetsklasse eller klassificering, som kødet er
        tildelt af en anerkendt klassificeringsmyndighed (f.eks. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Opdrætsmærkning
      description: Fremhæver almindelige mærkninger om dyrevelfærd eller opdrætsmetoder
        forbundet med kødet (f.eks. græsfodret, fritgående).
    mechanical_loom_assembly_status:
      name: Status for montering af maskinvæv
      description: Hvordan væven afsendes eller leveres med hensyn til den nødvendige
        montering.
    mechanical_loom_weaving_type:
      name: Vævningstype for maskinvæv
      description: Primær vævemekanisme/-type, der understøttes af væven.
    mechanical_puzzle_primary_mechanism:
      name: Primær mekanisme for mekaniske puslespil
      description: Primær interaktion/mekanisme brugt til at løse det mekaniske puslespil.
    mechanical_puzzle_solution_format:
      name: Format til løsning af mekaniske puslespil
      description: Format, hvor tip/løsninger gives, når de er inkluderet.
    medal_attachment_style:
      name: Fastgørelsesstil for medalje
      description: Angiver, hvordan medaljen er beregnet til at blive båret eller
        vist (f.eks. halsbånd, pin back-lås).
    medal_award_level:
      name: Niveau for medaljetildeling
      description: Angiver det tildelingsniveau, som medaljen repræsenterer (f.eks.
        1. plads, deltager).
    medal_finish:
      name: Medaljefinish
      description: Angiver medaljens overfladefinish (visuel glans/tekstur), uafhængigt
        af materiale.
    medal_packaging:
      name: Medaljeemballage
      description: Angiver typen af præsentationsemballage, der følger med medaljen.
    melodica_accessory_set_included:
      name: Inkluderet tilbehørssæt til melodica
      description: Hvilket almindeligt tilbehør der er inkluderet i melodica-pakken
    melodica_air_chamber_material:
      name: Materiale for luftkammer i melodica
      description: Materialet i melodicaens luftkammer (acrylonitril-butadien-styren,
        træ osv.), når sælgere skelner det fra andre dele.
    melodica_included_accessories:
      name: Melodikatilbehør medfølger
      description: Tilbehør, der følger med melodicaen i æsken.
    melodica_key_color_scheme:
      name: Farveskema for melodica-tangenter
      description: Farveskema for tangenterne (ikke instrumentet), hvilket påvirker
        læsbarheden (især for børn/begyndere).
    melodica_mouthpiece_configuration:
      name: Konfiguration af melodica-mundstykke
      description: Angiver, hvilke blæseinterfaces der er inkluderet/bruges til at
        spille melodicaen.
    melodica_mouthpiece_type:
      name: Mundstykketype til melodica
      description: Stil for blæseinterface inkluderet med melodicaen (mundstykke og/eller
        fleksibelt rør).
    melodica_reed_plate_material:
      name: Materiale i melodikaens stemmeplader
      description: Materialet i rørbladet (forskelligt fra instrumentets overordnede
        materiale), som kan påvirke holdbarhed og tone.
    melodica_size_class:
      name: Melodica størrelsesklasse
      description: Generel størrelses-/portabilitetsklasse for en melodica, typisk
        baseret på gruppering af tangentantal og formfaktor (f.eks. mini/student vs.
        standard vs. modeller med udvidet rækkevidde).
    melon_variety:
      name: Melonvariant
      description: Angiver den specifikke type melon i produktet for at hjælpe kunder
        med hurtigt at identificere deres foretrukne variant.
    memory_foam_infusion_material:
      name: Infusionsmateriale til memoryskum
      description: Identificerer særlige stoffer, der tilsættes i memoryskum til afkøling,
        lugtkontrol eller antimikrobielle formål.
    memory_wire_gauge:
      name: Måler til hukommelsestråd
      description: Angiver størrelsen på hukommelsestråden i henhold til American
        Wire Gauge (AWG).
    memory_wire_project_size:
      name: Størrelse på hukommelsestrådprojekt
      description: Angiver den tilsigtede smykkeform/spiralstørrelse, som hukommelsestråden
        er formet til (f.eks. armbånd, halskæde, ring).
    metal_purity:
      name: Metalrenhed
      description: Angiver finheds- eller renhedsgraden af det metal, der anvendes
        i smykkerne, typisk udtrykt i karat (K) eller tusindedele.
    metrics_counted:
      name: Optalte metrikværdier
      description: Viser de enkelte statistikker eller hændelser, som tælleren er
        designet til at spore.
    metronome_display_style:
      name: Metronomens visningsstil
      description: Angiver, hvordan tempoet vises/angives for brugeren (nål/pendul
        vs. numerisk LED/LCD vs. blinkende lys).
    metronome_output_method:
      name: Metronomens outputmetode
      description: Angiver tilgængelige outputmetoder for metronomens lyd-/taktsignal.
    microphone_toy_feature_set:
      name: Funktionssæt for mikrofonlegetøj
      description: Nøglefunktionalitet med fokus på leg for legetøjsmikrofoner (stemmeeffekter,
        forstærkning, optagelse osv.).
    midi_output_type:
      name: MIDI-udgangstype
      description: Angiver typen/typerne af MIDI-output, der leveres af udløsermodulet.
    military_branch:
      name: Militært værn
      description: Identificerer det militære værn, som uniformen er udstedt til eller
        inspireret af.
    milk_base_type:
      name: Mælketype
      description: Angiver den primære mælk eller det mælkealternativ, der anvendes
        i drikkevaren, hvis relevant.
    milk_feeding_method:
      name: Mælkefodringsmetode
      description: Angiver, hvordan kildedyrene blev fodret (f.eks. græsfoder eller
        kornfoder), hvilket kan have betydning for smag og ernæringsprofil.
    milk_processing_method:
      name: Forarbejdningsmetode for mælk
      description: Angiver den behandlings- eller forarbejdningsteknik, som mælken
        har gennemgået, hvilket påvirker sikkerhed, holdbarhed og ernæringsmæssige
        egenskaber.
    milk_source_animal:
      name: Dyr, der leverer mælken
      description: Identificerer det dyr, som mælken er udvundet fra, og hjælper forbrugerne
        med at vælge ko, ged, bøffel eller andre animalske mejeriprodukter.
    millet_processing_method:
      name: Forarbejdningsmetode for hirse
      description: Angiver den primære forarbejdningsmetode eller tilstand for hirsekorn
        (f.eks. upoleret, afskallet, spiret).
    millet_variety:
      name: Hirsevariant
      description: Identificerer den specifikke type hirsekorn, der er indeholdt i
        produktet (f.eks. perlehirse, rævehale, fingerhirse).
    milling_process:
      name: Formalingsproces
      description: Angiver den produktionsmetode, der anvendes til at formale melet,
        hvilket kan have betydning for smag, varmeeksponering og ernæringsprofil.
    mint_mark:
      name: Møntmærke
      description: Møntmærke som vist på mønten (hvis relevant).
    mirror_configuration:
      name: Konfiguration af spejl
      description: Angiver stilen eller strukturen på det spejl, der følger med sminkebords-sættet.
    mirror_coverage:
      name: Spejldækning
      description: Beskriver omfanget af spejlpaneler på skydedørene.
    mirror_curvature_type:
      name: Spejlkrumningstype
      description: Angiver, om spejloverfladen er konveks, flad eller konkav, hvilket
        påvirker synsfeltet.
    mirror_mounting_location:
      name: Monteringsplacering for spejl
      description: Angiver, hvor på cyklen eller rytteren spejlet er beregnet til
        at blive monteret.
    mirror_shape:
      name: Spejlform
      description: Angiver den geometriske form eller stil for det primære spejl,
        der følger med sminkebords-sættet.
    mix_ratio:
      name: Blandingsforhold
      description: Angiver det anbefalede fortyndingsforhold mellem kølemiddel og
        vand (for koncentrater) eller bekræfter det faste forblandingsforhold for
        forfortyndede produkter.
    mma_glove_type:
      name: MMA-handsketype
      description: Angiver handskens primære tilsigtede anvendelse eller stil inden
        for MMA-træning eller -konkurrence.
    mobility_features:
      name: Mobilitetsfunktioner
      description: Angiver indbyggede bevægelses- eller bærbarhedselementer såsom
        hjul eller foldbare ben.
    model_aircraft_assembly_level:
      name: Modelflys monteringsniveau
      description: Angiver, hvor meget bygning der kræves, før flyet kan tages i brug.
    model_making_kit_items_included:
      name: Inkluderede elementer i modelbygningssæt
      description: Viser, hvad der er inkluderet i et modelbygningssæt eller en sampak
        (f.eks. maling, lim, pensel).
    model_making_product_type:
      name: Modelbygningsprodukttype
      description: Identificerer, hvad elementet grundlæggende er inden for modelbygning
        (sæt, tilbehør, værktøj eller beholdning) for at forbedre søgning og filtrering
        på tværs af blandede produkttyper inden for modelbygning.
    model_rocket_kit_contents:
      name: Modelraketsættets indhold
      description: Angiver om produktet er en komplet model af et flertrinsraketsæt
        eller et sæt med tilføjelser/moduler/dele (f.eks. komponenter til booster-
        eller sustainertrinnet).
    model_rocket_kit_format:
      name: Modelrakettens sætformat
      description: Angiver om raketten sælges som et sæt, og hvor klar produktet er
        til at blive samlet.
    model_rocket_motor_impulse_class:
      name: Modelraketmotor i impulsklasse
      description: Angiver den standardiserede samlede impulsklasse for modelraketmotoren
        (f.eks. A, B, C ...).
    model_rocket_motor_mount_size:
      name: Ophængsstørrelse for modelraketmotor
      description: Angiver den diameter på motorhuset, som rakettens motorophæng er
        designet til at passe til.
    model_rocket_power_source_required:
      name: Påkrævet strømkilde til modelraket
      description: Angiver, om produktet kræver batterier/ekstern strømforsyning,
        og hvilken slags.
    model_rocket_propellant_type:
      name: Drivmiddeltype til modelraket
      description: Identificerer det drivmiddel/motorsystem, der anvendes til fremdrift
        i modelraketprodukter.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Anbefalet størrelse af affyringsstang eller skinne for modelraket
      description: Angiver den diameter på affyringsstang eller skinnestørrelse, som
        raketten er designet til (f.eks. 1/8 tomme stang, affyringsskinne 1010).
    model_rocket_recovery_method:
      name: Modelrakettens bjærgningsmetode
      description: Primært bjærgningssystem, der bruges til at indhente raketten sikkert
        efter flyvning.
    model_rocket_recovery_system_type:
      name: Type bjærgningssystem til modelraket
      description: Angiver den primære bjærgningsmetode, der anvendes til at returnere
        raketten sikkert efter flyvning.
    model_rocket_staging:
      name: Modelrakets trin
      description: Angiver, hvor mange elektriske trin modelraketten er designet til
        at flyve med.
    model_train_accessory_electrical_connection_type:
      name: Elektrisk forbindelsestype for modeltogtilbehør
      description: Angiver den forbindelses- eller terminaltype, der bruges til at
        forbinde elektriske modeltogtilbehør til et layout (hvis relevant).
    model_train_coupler_type:
      name: Modeltogkoblingstype
      description: Angiver den koblingsstandard, der er installeret på modeltogets
        rullende materiel eller lokomotiv.
    model_train_gauge:
      name: Fritprofil til modeltog
      description: Angiver det sporviddesystem for modeljernbanen, som tilbehøret
        er beregnet til (hvis relevant), hvilket hjælper med at sikre fysisk kompatibilitet
        med brugerens skinner og layout.
    model_train_lighting_features:
      name: Belysningsfunktioner i modeltog
      description: Angiver belysningsfunktionaliteten, der er inkluderet i modeltoget/lokomotivet.
    model_train_power_pickup_method:
      name: Modeltogets strømtilførselsmetode
      description: Angiver, hvordan modellen modtager strøm til drift (skinnestrøm,
        batteri osv.).
    model_train_scale:
      name: Skala for modeltog
      description: Angiver skala-/størrelsesstandarden for modeltoget (forholdet mellem
        modellen og det virkelige tog).
    model_train_sound_features:
      name: Lydfunktioner for modeltog
      description: Angiver, om modellen har interne lydeffekter, og hvilken type lyd
        den har.
    model_train_track_gauge:
      name: Sporvidde til modeltog
      description: Angiver den sporvidde-/skinnesystemstandard, som modellen er designet
        til at køre på (f.eks. standardsporvidde, smalsporede varianter eller mærke-/systemspecifikke
        sporvidder, hvor det er relevant).
    modeling_dough_base_material:
      name: Grundmateriale i modellervoks
      description: Modelleringsvoksen primære grundmateriale/sammensætning (f.eks.
        hvede-/melbaseret vs. polymerbaseret).
    modeling_dough_features:
      name: Egenskaber i modellervoks
      description: Vigtigste funktionelle egenskaber ved modellervoks, som kunder
        almindeligvis filtrerer efter.
    modification_level:
      name: Ændringsniveau
      description: Angiver graden af maltmodifikation (hvor grundigt byggens endosperm/proteiner
        er nedbrudt), ofte opsummeret som undermodificeret/modificeret/overmodificeret.
    molasses_base_ingredient:
      name: Hovedingrediens i melasse
      description: Identificerer den primære plante- eller frugtkilde, hvorfra melassen
        er fremstillet.
    molasses_grade:
      name: Melassekvalitet
      description: Klassificerer melassen efter ekstraktions-/raffineringsstadium,
        hvilket direkte påvirker smagsintensitet, farve og ernæringsprofil.
    mold_material:
      name: Formmateriale
      description: Primær materialesammensætning af selve formen (f.eks. silikone,
        plastik, metal).
    molle_compatibility:
      name: MOLLE-kompatibilitet
      description: Angiver, om vesten har MOLLE/PALS-båndsystem til fastgørelse af
        modulære lommer og tilbehør.
    motor_belt_type:
      name: Motorremtype
      description: Definerer designet/profilen af den rem, der anvendes i løbebåndets
        drivsystem.
    motor_configuration:
      name: Motorkonfiguration
      description: Angiver, hvor mange uafhængige drivmotorer scooteren bruger.
    motor_mounting_configuration:
      name: Monteringskonfiguration af motormontering
      description: Beskriver, hvordan motoren er monteret/implementeret i konverteringssættet
        til en scooter.
    motor_mounting_position:
      name: Monteringsposition for motoren
      description: Angiver, hvor på el-scooteren motoren er monteret, f.eks. forhjulsnav,
        baghjulsnav, dobbelthjulsnav eller MID-drev.
    motor_position:
      name: Motorplacering
      description: Angiver, hvor motoren er placeret på elcyklen, hvilket påvirker
        håndtering og vedligeholdelse.
    motor_vehicle_a_v_integration_features:
      name: Funktioner til A/V-integration i motorkøretøjer
      description: Integrationsfunktioner til smartphones og køretøjer understøttet
        af hovedenheden (f.eks. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Anvendelse/placering af pære i motorkøretøj
      description: Angiver den tilsigtede belysningsposition eller -funktion i køretøjet,
        som pæren er designet til (f.eks. nærlys, bremselys).
    motor_vehicle_bulb_approval_standard:
      name: Godkendelsesstandard for motorkøretøjspære
      description: Angiver overholdelse af regler/godkendelsesmarkering til vejbrug
        på målmarkedet.
    motor_vehicle_oxygen_sensor_bank:
      name: Lamdasensorbank til motorkøretøj
      description: Angiver, hvilken motorcylinderbank lambdasonden passer på (f.eks.
        bank 1 vs. bank 2) for V-type/boxermotorer. Brug Ikke relevant for rækkemotorer.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Antal ledninger til lambdasensor i motorkøretøj
      description: Antal ledninger i lambdasensorens ledningsnet.
    motor_vehicle_oxygen_sensor_position:
      name: Position af lambdasensor i motorkøretøjet
      description: Angiver, hvor lambdasensoren (O2) er installeret i udstødningssystemet
        i forhold til katalysatoren.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Nummer på lambdasensor til motorkøretøj
      description: Angiver sensornummeret (f.eks. Sensor 1 eller Sensor 2) inden for
        en given bank-/positionsbetegnelse.
    motor_vehicle_oxygen_sensor_type:
      name: Lambdasensortype til motorkøretøj
      description: Angiver lambdasensorens design/teknologi.
    motor_vehicle_paint_application_method:
      name: Metode til påføring af lak på motorkøretøjer
      description: Hvordan lakken er beregnet til at blive påført køretøjets overflade.
    motor_vehicle_paint_system_step:
      name: Trin i lakeringssystemet til motorkøretøjer
      description: Angiver, hvilket trin eller hvilken komponent i et reparationslakeringssystem
        til køretøjer produktet er beregnet til (f.eks. grunder, baselak, klarlak).
    motor_vehicle_speaker_mounting_type:
      name: Monteringstype for højttaler i motorkøretøj
      description: Hvordan højttaleren er beregnet til at blive installeret i køretøjet
        (monteringsformfaktor).
    motor_vehicle_subwoofer_size:
      name: Subwooferstørrelse i motorkøretøj
      description: Nominel subwooferdriverdiameter (f.eks. 8 tommer, 10 tommer, 12
        tommer), bruges til at matche plads i køretøjet og kabinetkompatibilitet.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguration af svingspolen til subwoofer i motorkøretøjer
      description: Antal/konfiguration af svingspoler, der bruges til at matche forstærkerens
        ledningsføringsmuligheder (f.eks. SVC vs. DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedans i subwooferens svingspole i motorkøretøj (pr. spole)
      description: Impedansklassificeringen for hver svingspole (ikke endelig ledningsbelastning),
        brugt til ledningsberegninger.
    motor_vehicle_voltage_regulator_type:
      name: Type spændingsregulator til motorkøretøjer
      description: Angiver den regulatorteknologi/-form, der anvendes i motorkøretøjer.
    motorcycle_armor_certification_standard:
      name: Standard for certificering af motorcykelbeskyttelsestøj
      description: Angiver den eller de formelle sikkerhedsstandarder, som beskytteren
        er certificeret til at opfylde (f.eks. EN 1621-2 for rygbeskyttere, EN 1621-3
        for brystbeskyttere).
    motorcycle_cover_size_class:
      name: Størrelsesklasse for motorcykelcover
      description: Beholder i standardiseret størrelse til opbevaringscover til motorcykel
        baseret på den typiske motorcykelkategori/længdeinterval, det passer til.
    motorcycle_glove_certification_standard:
      name: Standard for certificering af motorcykelhandsker
      description: Angiver den beskyttelsescertificering/standard, som handskerne
        overholder (f.eks. EN 13594-niveauer).
    motorcycle_glove_waterproof_construction:
      name: Vandtæt fremstilling af motorcykelhandsker
      description: Angiver den type vandtætningsmetode, der er anvendt i handsken
        (hvis relevant).
    motorcycle_guard_coverage_area:
      name: Dækningsområde for motorcykelbeskytter
      description: Produktets primære dækningsområde (albue, håndled, underarm, kombination).
    motorcycle_kidney_belt_construction_type:
      name: Konstruktionstype for nyrebælte til motorcykel
      description: Konstruktionsstil for nyrebæltet, der påvirker stivhed, luftstrøm
        og beskyttelse.
    motorcycle_kidney_belt_purpose:
      name: Formålet med nyrebælte til motorcykler
      description: Identificerer den primære kørestil eller det primære scenarie,
        som nyrebæltet til motorcykel er designet til.
    motorcycle_luggage_capacity_class:
      name: Kapacitetsklasse for motorcykelbagage
      description: Angiver motorcykelbagagens volumenkapacitet, udtrykt i liter.
    motorcycle_luggage_mounting_system:
      name: Monteringssystem for motorcykelbagage
      description: Fastgørelses-/monteringssystem, der bruges til at fastgøre tasken/sadeltasken
        til motorcyklen (f.eks. stropper, rack-montering med hurtigudløser).
    motorcycle_luggage_side:
      name: Motorcykelbagage side
      description: Angiver for sadeltasker, om produktet er til venstre side, højre
        side eller er et par/sæt.
    motorcycle_protective_gear_size_system:
      name: Størrelsessystem til motorcyklers beskyttelsesudstyr
      description: Angiver det størrelsessystem, der anvendes på produktet (f.eks.
        alfa-størrelse, numerisk, én størrelse).
    motorcycle_rack_carrier_style:
      name: Motorcykelholderstil
      description: Beskriver stilen for det funktionelle stativ til transport af en
        motorcykel eller scooter (platform vs. skinne vs. liftassisteret osv.).
    motorcycle_riding_discipline:
      name: Kørselsdisciplin for motorcykel
      description: Angiver den primære ride-/brugsdisciplin, som nakkestøtten er designet
        til.
    motorcycle_tire_speed_rating:
      name: Hastighedsklasse for motorcykeldæk
      description: Angiver den maksimale vedvarende hastighed, som dækket er klassificeret
        til, ved hjælp af standardbogstavkoden (f.eks. H, V, W).
    motorsport_window_net_certification:
      name: Certificering af vinduesnet til motorsport
      description: Den racersikkerhedscertificering eller homologering, som vinduesnettet
        opfylder (f.eks. SFI eller FIA), inklusive specifikationsnummer, hvor det
        er relevant.
    mound_usage_type:
      name: Brugstype for pitcherhøj
      description: Identificerer det tilsigtede anvendelsesmiljø for højen, såsom
        træning, kamp, bullpen eller multifunktionel.
    mount_attachment_method:
      name: Fastgørelsesmetode for beslag
      description: Angiver, hvordan monteringen fastgøres til køretøjets overflade/struktur.
    mountainboard_truck_type:
      name: Type af mountainboard-aksel
      description: Klassificerer stilen af aksler, der følger med boardet, hvilket
        påvirker svingrespons og holdbarhed.
    mounting_attachment_method:
      name: Monterings-/fastgørelsesmetode
      description: Hvordan holderen/tasken er designet til at blive fastgjort til
        en tromme, et stativ, et bælte eller en anden overflade.
    mounting_attachment_type:
      name: Monterings-/fastgørelsestype
      description: Hvordan udvekslingstilbehøret fastgøres eller forbindes med spinderokken.
    mounting_hardware_included_for_installation:
      name: Monteringshardware inkluderet (til installation)
      description: Angiver, om den nødvendige hardware til montering af bagsædet (f.eks.
        beslag, bolte, skinner) er inkluderet i produktet.
    mounting_location:
      name: Monteringssted
      description: Angiver det tilsigtede placeringsområde på udstyr eller karosseri
        til lyset/reflektoren (f.eks. forgaffel, hjelm, hjuleger).
    mounting_method:
      name: Monteringsmetode
      description: Hvordan en holder til trommestik/børste monteres eller fastgøres
        (f.eks. med klemme, strop, klæbende).
    mounting_position:
      name: Monteringsposition
      description: Angiver, hvor håndbremsebetjeningen skal monteres/installeres i
        køretøjets kabine.
    mounting_rail_type:
      name: Monteringsskinnetype
      description: Angiver den skinne- eller grænsefladestandard, som tilbehøret fastgøres
        til, f.eks. Picatinny eller M-LOK.
    mounting_receiver_size:
      name: Størrelse på anhængertræksmodtager
      description: Den nødvendige størrelse på anhængertrækkets modtager, som bagagebæreren
        monteres i.
    mounting_storage_type:
      name: Monterings-/opbevaringstype
      description: Hvordan enheden er beregnet til at blive monteret eller opbevaret
        på fartøjet/personen.
    mouth_grip_type:
      name: Mundgrebstype
      description: Beskriver typen af mundgreb eller beskyttelse på fløjten for komfort
        og hygiejne.
    mouthguard_mold_type:
      name: Tilpasningstype for tandbeskytter
      description: Beskriver, hvordan tandbeskytteren monteres på atletens tænder
        (f.eks. kog-og-bid, specialtilpasning af tænder).
    mouthpiece_facing_length:
      name: Mundstykkets længde
      description: Angiver mundstykkets kurvelængdekategori (ikke den samlede mundstykkelængde),
        som påvirker respons, modstand og rørbladskompatibilitet.
    mouthpiece_material:
      name: Mundstykkemateriale
      description: Angiver materialet i den del af mundstykket/spidsen, der har kontakt
        med munden, på en blowout (festhorn), som kan afvige fra resten af mundstykkets
        materiale.
    mouthpiece_shank_receiver_size:
      name: Størrelse af skaft/indstik for mundstykke
      description: Angiver standard for mundstykkets indstik/skaft, der er kompatibel
        med flygelhornet.
    mouthpiece_shank_size:
      name: Skaftstørrelse for mundstykke
      description: Angiver standardpasform for mundstykkets skaft/indstik for at sikre
        kompatibilitet med det tilsigtede messingblæseinstrument.
    mouthpiece_shank_type:
      name: Skafttype for mundstykke
      description: Angiver standarden for mundstykkeindstikket/skaftet for kompatibilitet
        (hvor det er relevant).
    mouthpiece_style:
      name: Mundstykkestil
      description: Klassificerer designet/formen af mundstykkedelen af trenseren,
        som har betydning for trykpunkter, sværhedsgrad og hestens præference.
    mouthpiece_type:
      name: Mundstykketype
      description: Type mundstykke ved blæseenden (indbygget, aftageligt eller som
        tilføjelse).
    movement_mechanism:
      name: Bevægelsesmekanisme
      description: Definerer, hvordan bænken bevæger sig under brug (gyngende, glidende,
        vippende osv.).
    muffin_size:
      name: Muffinstørrelse
      description: Klassificerer muffinproduktets fysiske størrelsesformat (f.eks.
        mini, standard, jumbo).
    mushroom_variety:
      name: Svampevariant
      description: Identificerer den specifikke art eller variant af svamp eller trøffel,
        der er indeholdt i produktet (f.eks. shiitake, kongeøsters, sort trøffel).
    music_stand_desk_tilt_adjustment:
      name: Justering af hældning på nodestativbord
      description: Angiver, om bordets vinkel kan justeres.
    music_stand_intended_use:
      name: Tilsigtet anvendelse af nodestativ
      description: Angiver den primære tiltænkte opsætning og brug af stativet.
    musical_block_pitch_type:
      name: Type tonehøjde for musikalske blokke
      description: Beskriver, om den musikalske blok producerer en bestemt tonehøjde
        (stemt) eller en ubestemt tonehøjde.
    musical_box_mechanism_type:
      name: Mekanismetype for spilledåse
      description: Hvordan spilledåsen producerer/afspiller lyd (f.eks. optræksbevægelse
        vs. elektronisk afspilning).
    musical_keyboard_case_fit_type:
      name: Pasform for kasse til musikkeyboard
      description: Beskriver, hvordan kassen er dimensioneret til instrumentet (f.eks.
        universel/generisk størrelsesorden vs. modelspecifik/tilpasset).
    musical_ratchet_sound_character:
      name: Lydegenskaber for musikalsk skralde
      description: Generel beskrivelse af skraldens klangfarve/lydstyrkeegenskaber.
    musical_scraper_groove_surface_material:
      name: Musikalsk skrabeoverflades materiale
      description: Angiver materialet på den rillede skrabeflade (kan afvige fra instrumentets
        øvrige materiale).
    musical_scraper_type:
      name: Type af skrabeinstrument
      description: Angiver stilen/designet af det musikalske skrabeinstrument (f.eks.
        guiro vs. reco-reco), hvilket påvirker lyd og spilleteknik.
    mute_attachment_method:
      name: Fastgørelsesmetode for dæmper
      description: Angiver, hvordan en bækkendæmper er fastgjort til eller holdt på
        plads på bækkenet (f.eks. gel, statisk adhæsion, magnet, klips).
    mute_attenuation_level:
      name: Lyddæmpningsniveau
      description: Angiver, hvor meget dæmperen reducerer den opfattede lydstyrke,
        især relevant for øvedæmpere.
    mute_cork_padding_material:
      name: Dæmperens kork-/polstringsmateriale
      description: Angiver materialet i dæmperens kontaktpolstring (f.eks. korkstrimler/puder),
        der bruges til greb/pasform og beskyttelse af klangstykke.
    mute_coverage_type:
      name: Dæmpningsdækningtype
      description: Angiver dæmperens stil/dækning på spillefladen, fra små punktdæmpere
        til øvedæmpere til hele overfladen.
    mute_finish:
      name: Dæmperens finish
      description: Overfladefinish på dæmperen, der kan påvirke holdbarhed og æstetik
        (f.eks. poleret vs. satin).
    name_label_text_template:
      name: Tekstskabelon til navneetiket
      description: Angiver den fortrykte tekst eller skabelon, der er trykt på etiketten
        (f.eks. “Tilhører”, “Lavet af”).
    napkin_ply:
      name: Servietlag
      description: Angiver tykkelsen af cocktailservietten efter antal lag.
    neck_brace_fit_system:
      name: System til tilpasning af nakkestøtte
      description: Angiver den primære metode, der bruges til at justere og fastgøre
        nakkestøtten til rytteren.
    neck_brace_size_basis:
      name: Størrelsesgrundlag for nakkestøtte
      description: Angiver det størrelsesgrundlag, der bruges til at vælge den korrekte
        størrelse på nakkestøtten.
    neck_configuration:
      name: Konfiguration af hals
      description: Specificerer den halstype eller -konfiguration, der følger med
        saxofonen, og som påvirker ergonomi og spilbarhed.
    neck_coverage_type:
      name: Halsdækningstype
      description: Specificerer den type halsdækning, der følger med tæppet.
    neck_support_size_system:
      name: Størrelsessystem for nakkestøtte
      description: Angiver det størrelsessystem, der bruges til racernakkestøtten
        eller -kraven, f.eks. voksen, junior eller one size.
    necklace_length_type:
      name: Længdetype for halsskæde
      description: Specificerer den almindelige længdekategori for halskæder, f.eks.
        choker eller opera, for at gøre det lettere at shoppe efter stil.
    needle_balance_zone:
      name: Balancezone for kompasnål
      description: Angiver den magnetiske balancezone eller halvkugle, som kompasnålen
        er afstemt til, så den giver præcise aflæsninger verden over.
    needle_case_format:
      name: Format for nåleetui
      description: Nåleetuiets overordnede organiseringsformat.
    needle_damping_type:
      name: Nåledæmpningstype
      description: Beskriver, hvordan kompasnålen stabiliseres, f.eks. væskefyldt,
        tør eller elektronisk stabiliseret, hvilket påvirker indstillingstid og holdbarhed.
    needle_felting_needle_profile:
      name: Nåleprofil for nålefiltning
      description: Tværsnit eller profil for en filtenål, som påvirker, hvordan fibrene
        flyttes, og hvilken finish der opnås.
    needle_holder_features:
      name: Funktioner for nåleholder
      description: Vigtige funktionelle egenskaber ved nåleholderen.
    needle_holder_mounting_attachment_method:
      name: Monterings- eller fastgørelsesmetode for nåleholder
      description: Hvordan nåleholderen er beregnet til at blive fastgjort eller brugt
        under opbevaring, f.eks. magnetisk, med clips eller med strop.
    needle_holder_style:
      name: Nåleholdertype
      description: Nåleholderens fysiske opbevarings- eller bærestil eller -design.
    needle_pushing_surface_type:
      name: Type af trykflade til nål
      description: Typen eller designet af nåletrykfladen på syhandsken, f.eks. metalfordybning,
        mønt eller forstærket lap.
    needle_requirement_beading_pattern:
      name: Nålekrav til perlemønster
      description: Den nåletype eller -størrelse, der anbefales til mønstret.
    needle_size_system:
      name: Størrelsessystem for nål
      description: Den størrelsesstandard, der bruges til angivelse af nålestørrelse.
    needle_threader_compatible_needle_type:
      name: Kompatibel nåletype for nåletråder
      description: Specificerer, hvilke nåletyper tråderen er designet til at fungere
        med, angivet efter nålekategori eller anvendelse.
    needle_threader_mechanism_type:
      name: Nåletråderens mekanismetype
      description: Beskriver, hvordan tråderen fanger eller trækker tråden gennem
        nåleøjet.
    needle_threader_packaging_type:
      name: Emballagetype for nåletråder
      description: Hvordan produktet sælges eller pakkes, f.eks. enkeltvis, som multipakning
        eller som sæt.
    needlecraft_fabric_color_family:
      name: Farvefamilie for håndarbejdsstof
      description: Normaliseret farvefamilie for evenweave-stof, som bruges sammen
        med Farve til facettering.
    needlecraft_fabric_composition:
      name: Materialsammensætning for håndarbejdsstof
      description: Specificerer fibersammensætningen eller blandingen i håndarbejdsstoffet,
        f.eks. 100 % bomuld eller hør- og bomuldsblanding.
    needlecraft_fabric_weave_type:
      name: Vævningstype for håndarbejdsstof
      description: Specificerer vævningen eller konstruktionen af hør til håndarbejde,
        f.eks. evenweave kontra traditionelt hør, hvilket påvirker stingadfærd og
        udseende.
    needlecraft_kit_items_included:
      name: Medfølgende dele i håndarbejdssæt
      description: Angiver de vigtigste komponenter i håndarbejdssættet, herunder
        værktøjer og forbrugsvarer.
    needlecraft_kit_project_type:
      name: Projekttype for håndarbejdssæt
      description: Identificerer, hvilken færdig vare sættet bruges til at lave.
    needlecraft_stitching_coverage:
      name: Stingdækning for håndarbejde
      description: Angiver, om stoffet sys over 1 tråd eller firkant eller over 2
        tråde, hvilket er almindeligt for evenweave og hør.
    needlepoint_canvas_mesh_count:
      name: Mesh count for stramaj
      description: Den tilsigtede canvas mesh count, dvs. antal tråde pr. tomme, som
        designet er optegnet til, ofte kaldet canvas count.
    needlepoint_frame_canvas_attachment_method:
      name: Metode til fastgørelse af stramaj på ramme
      description: Beskriver, hvordan stramajen fastgøres til stramajrammen.
    needlepoint_frame_compatible_stand_type:
      name: Kompatibel stativtype for stramajramme
      description: Hvis rammen er designet til at blive monteret på et stativ, specificeres
        det, hvilke stativtyper den er kompatibel med.
    needlepoint_frame_contents:
      name: Indhold i stramajramme
      description: Specificerer, hvilke komponenter og hvilket tilbehør der følger
        med stramajrammen, f.eks. ramme, ekstra stænger, tegnestifter/nåle, gribestrips
        eller bæretaske.
    needlepoint_frame_tension_adjustment_type:
      name: Type af spændingsjustering for stramajramme
      description: Angiver, hvordan eller om rammens spænding kan justeres under brug.
    needlepoint_pattern_chart_format:
      name: Format til nålemønsterdiagram
      description: Hvordan stramajdesignet er gengivet til syning, f.eks. som diagram
        eller trykt eller malet guide.
    needlepoint_project_type:
      name: Projekttype for stramaj
      description: Den tilsigtede færdige vare eller kategori, som stramajdesignet
        er beregnet til.
    net_design:
      name: Netdesign
      description: Identificerer nettets konstruktionstype og angiver, om det kan
        trækkes ind eller foldes sammen for bedre bærbarhed.
    net_mesh_pattern:
      name: Maskemønster i net
      description: Specificerer den geometriske form på netåbningerne, hvilket kan
        påvirke synlighed og styrke.
    net_twine_gauge:
      name: Garn- eller snoretykkelse i net
      description: Angiver tykkelsen eller styrken på nettets snor, traditionelt udtrykt
        som et gauge-nummer, f.eks. 18 eller 36.
    nicotine_source:
      name: Nikotinkilde
      description: Angiver, om nikotinen i produktet stammer fra tobak, er syntetisk,
        eller om produktet ikke indeholder nikotin.
    nipple_drive_interface:
      name: Drivgrænseflade for nippel
      description: Identificerer typen eller standarden for niplens drivgrænseflade
        eller hoved, internt eller eksternt, hvilket afgør det nødvendige værktøj
        og hjulbygningsmetode.
    nock_activation_method:
      name: Aktiveringsmetode for nock
      description: Specificerer den mekanisme, der tænder eller slukker LED’en i den
        lysende pilenock, f.eks. buestrengstryk, bevægelsessensor eller manuel kontakt.
    nock_fitment_code:
      name: Pasformskode for nock
      description: Producent- eller branchekode, der identificerer den nockfamilie
        eller -serie, nocken tilhører.
    nock_throat_size:
      name: Størrelse på nockhals
      description: Specificerer størrelsen på nockhalsen, dvs. rillen, der klikker
        fast på buestrengen.
    nock_transparency_level:
      name: Gennemsigtighedsniveauet for nock
      description: Beskriver, hvor gennemsigtigt nockmaterialet er – klart, transparent,
        opakt eller selvlysende i mørke – hvilket påvirker synlighed og æstetik.
    nock_type:
      name: Nocktype
      description: Specificerer det nockdesign, der bruges på en pil eller bolt, f.eks.
        pin, half-moon eller lysende nock.
    noise_reduction_type:
      name: Støjreduktionstype
      description: Specificerer den støjreduktionsteknologi, der bruges – eller ikke
        bruges – i hjelmens integrerede headset, hvis relevant.
    noise_suppression_technology:
      name: Støjdæmpningsteknologi
      description: Specificerer, om produktet bruger passiv støjdæmpning eller aktiv
        elektronisk kredsløbsteknologi, der komprimerer høje lyde og/eller forstærker
        omgivende lyd.
    non_slip_base_features:
      name: Skridsikre funktioner i basen
      description: Angiver de skridsikre funktioner, der hjælper med at holde pedalen
        på plads under brug.
    nose_bridge_type:
      name: Type af næsebro
      description: Angiver næsebroens design, hvilket påvirker pasformen på tværs
        af forskellige ansigtsstørrelser.
    nose_clip_accessories_included:
      name: Medfølgende tilbehør til næseklemme
      description: Angiver eventuelt ekstra tilbehør, der følger med svømmenæseklemmen,
        f.eks. ørepropper eller opbevaringsetui.
    nose_clip_features:
      name: Funktioner for næseklemme
      description: Fremhæver næseklemmens generelle funktionelle egenskaber eller
        komfortfunktioner.
    nose_coverage_style:
      name: Næsedækningstype
      description: Angiver, om fluemasken har beskyttelsespanel til næse eller mule,
        og hvilken type der er tale om.
    noseband_type:
      name: Type af næsebånd
      description: Specificerer designet af næsebåndet, hvis et sådant følger med
        trensen.
    number_of_canvas_meshes:
      name: Masketal for plastkanvas
      description: Plastkanvasarkets maskestørrelse, angivet som huller pr. tomme
        (HPI) eller count, hvilket bestemmer stingstørrelse og detaljegrad i projektet.
    number_of_chainrings:
      name: Antal klinger
      description: Angiver, hvor mange klinger kranksættet er designet til at montere
        eller leveres med.
    number_of_control_stations:
      name: Antal kontrolstationer
      description: Angiver, hvor mange ror- eller kontrolstationer betjeningssættet
        understøtter, f.eks. enkeltstation eller dobbeltstation.
    number_of_digits:
      name: Antal cifre
      description: Hvor mange cifre tælleren viser, f.eks. 1-cifret, 2-cifret eller
        3-cifret.
    number_of_guitar_slots:
      name: Antal guitarpladser
      description: Angiver, hvor mange guitarer etuiet eller gigbaggen er designet
        til at rumme.
    number_of_needlecraft_fabrics:
      name: Trådtal for håndarbejdsstof
      description: Specificerer count for håndarbejdskanvas eller -stof, typisk angivet
        som felter eller tråde pr. tomme, f.eks. 14-count.
    number_of_plastic_canvas_meshes:
      name: Masketal for plastkanvas
      description: Specificerer masketallet for plastkanvas, dvs. huller pr. tomme,
        hvilket bestemmer stingstørrelse og projektets detaljegrad.
    number_of_quilting_frame_rails:
      name: Antal skinner i quiltramme
      description: Antal skinner eller ruller, der følger med quiltrammen, f.eks.
        systemer med 2 eller 3 skinner.
    number_of_rope_slots:
      name: Antal rebkanaler
      description: Angiver, om sikringsbremsen er designet til brug med enkeltreb
        eller dobbeltreb.
    number_of_switch_poles:
      name: Antal afbryderpoler
      description: Antal polerAntal separate kredsløb (poler), som kontakten styrer,
        f.eks. SPST eller DPST.
    number_of_switch_throws:
      name: Antal kontaktpositioner
      description: Antal udgangsveje (throws) pr. pol, f.eks. SPDT.
    number_of_timing_chain_rows:
      name: Antal rækker i timingkæde
      description: Angiver, om timingkæden er enkeltrækket eller flerrækket.
    number_of_trailer_axles:
      name: Antal aksler på trailer
      description: Antal aksler på traileren.
    number_of_wheel_pieces:
      name: Antal dele i hjul
      description: Specificerer, om hjulet har 1-delt, 2-delt eller 3-delt konstruktion.
    numbering_style:
      name: Nummereringsstil
      description: Angiver, om og hvordan overtrækstrøjerne er forhåndsnummererede
        til holdidentifikation, f.eks. uden nummer, 1-10 eller brugerdefineret.
    nunchuck_connector_type:
      name: Forbindelsestype for nunchaku
      description: Type af forbindelse mellem de to nunchaku-håndtag, f.eks. reb,
        kæde eller kæde med swivel.
    nursing_access:
      name: Ammeadgang
      description: Identificerer den metode til ammeadgang, der er integreret i badekjolen,
        hvis relevant.
    nursing_access_type:
      name: Type af ammeadgang
      description: Specificerer, hvordan beklædningsdelen giver adgang til brystet
        ved amning eller pumpning.
    nut_butter_texture:
      name: Tekstur for nøddesmør
      description: Beskriver nøddesmørrets fysiske konsistens, så kunder nemt kan
        vælge mellem f.eks. glat eller crunchy.
    nutrient_fortification:
      name: Næringsstofberigelse
      description: Identificerer de vigtigste næringsstoffer, som drikkevaren eller
        fødevaren er beriget med.
    oak_product_form:
      name: Egeproduktform
      description: Identificerer den fysiske form for egetræ, der bruges til lagring
        eller smagstilsætning.
    oak_toast_level:
      name: Toastningsgrad for eg
      description: Specificerer toastningsgraden for egetræsprodukter.
    oboe_case_capacity:
      name: Kapacitet for oboens taske
      description: Angiver, hvilket instrument eller hvilke instrumenter og større
        komponenter etuiet er designet til at rumme.
    oboe_case_carry_configuration:
      name: Bærekonfiguration for oboetui
      description: Angiver den primære bærekonfiguration, som etuiet eller gigbaggen
        tilbyder.
    oboe_case_design:
      name: Design af oboetui
      description: Klassificerer konstruktionen eller stivheden af et oboetui eller
        en gigbag, f.eks. hårdt, halvstift eller blødt, for at angive beskyttelsesniveau.
    oboe_case_internal_fit_type:
      name: Indvendig pasform i oboetui
      description: Angiver, om indretningen er formstøbt til en bestemt instrumentkonfiguration
        eller har justerbare rum.
    oboe_keywork_plating:
      name: Belægning på oboklapper
      description: Specificerer belægningen eller finishen på oboens klapmekanik,
        adskilt fra kropsmaterialet.
    oboe_strap_padding:
      name: Polstring på obostrop
      description: Beskriver, om der er polstring i stroppens eller støttens kontaktområde
        for øget komfort, f.eks. polstret skulder- eller nakkeområde.
    oboe_swab_style:
      name: Type af oboswab
      description: Specificerer oboswabbens funktionelle stil eller konstruktion,
        f.eks. gennemtræksswab eller vægtet silke.
    observation_window_material:
      name: Materiale i observationsvindue
      description: Specificerer materialet i kiggepanelerne eller -vinduet, hvilket
        ofte påvirker klarhed og holdbarhed.
    ocarina_accessories_included:
      name: Ocarina-tilbehør medfølger
      description: Tilbehør, der følger med ocarinaen, f.eks. etui, halsrem eller
        fingersætningsoversigt.
    ocarina_chamber_count:
      name: Antal kamre i ocarina
      description: Angiver, hvor mange kamre inline-ocarinaen har, hvilket påvirker
        toneomfang og spillekompleksitet, f.eks. enkelt, dobbelt eller tredobbelt.
    ocarina_fingering_system:
      name: Ocarina-fingersystem
      description: Specificerer det fingersystem eller den standard, som vedhængsocarinaen
        følger, hvis relevant.
    ocarina_finish_type:
      name: Finish-type for ocarina
      description: Overfladefinish på ocarinaens krop, som påvirker følelse og æstetik.
    occupant_classification_sensor_support:
      name: Understøttelse af passagerklassificeringssensor
      description: Angiver, om sædet har en passagerklassificerings- eller vægtføler
        eller er forberedt til at overføre eller installere OEM-sensoren, ofte ved
        forsæder i passagersiden.
    octave_harmonica_cover_plate_material:
      name: Materiale for oktavstemt mundharmonikas dækplade
      description: Materiale i de udvendige dækplader på oktavmundharmonikaen.
    octave_harmonica_tuning_system:
      name: Stemmesystem til oktavstemt mundharmonika
      description: Den stemning eller temperatur, der bruges til oktavmundharmonikaen.
    octoban_mounting_system_type:
      name: Monteringssystem for octoban
      description: Hvordan octobanen monteres eller placeres under spil, f.eks. via
        beslag, stativ eller mount.
    odor_control_features:
      name: Lugtkontrolfunktioner
      description: Angiver, om produktet giver lugtneutralisering eller deodoriserende
        funktionalitet, og hvordan det gør det.
    office_furniture_items_included:
      name: Møbelartikler til kontor medfølger
      description: Identificerer de specifikke kontormøbler, der følger med sættet,
        f.eks. skrivebord eller arkivskab.
    oil_cooler_core_type:
      name: Kernetype for oliekøler
      description: Specificerer oliekølerens indvendige kernekonstruktion, hvilket
        påvirker køleeffektivitet, trykfald og holdbarhed.
    oil_cooler_mounting_style:
      name: Monteringsstil for oliekøler
      description: Beskriver, hvordan oliekøleren er beregnet til at blive monteret
        eller installeret på køretøjet.
    oil_dipstick_component_type:
      name: Komponenttype for oliepind
      description: Specificerer, hvilken komponent til måling af oliestand der sælges,
        f.eks. kun oliepindsblad eller -stang, kun håndtag, komplet samling eller
        oliepindsrør.
    oil_dipstick_measurement_markings:
      name: Markeringer på oliepind
      description: Specificerer, hvilke markeringer eller hvilken skala der findes
        på oliepinden til aflæsning af oliestanden.
    oil_dipstick_tube_mounting_type:
      name: Monteringstype for oliepindsrør
      description: Specificerer, hvordan oliepindsrøret fastholdes eller monteres
        på motoren eller motorblokken.
    oil_drain_plug_head_drive_type:
      name: Drevtype for hoved på olieaftapningsprop
      description: Specificerer værktøjsgrænsefladen på olieaftapningsproppens hoved
        til montering og afmontering.
    oil_drain_plug_magnet_type:
      name: Magnettype for olieaftapningsprop
      description: Specificerer, om aftapningsproppen er magnetisk, og i så fald hvilken
        type.
    oil_fill_cap_type:
      name: Type af oliepåfyldningsdæksel
      description: Type eller stil for oliepåfyldningsdækslets grænseflade, der bruges
        ved ventildækslet, hvis relevant.
    oil_filler_cap_attachment_type:
      name: Fastgørelsestype for oliepåfyldningsdæksel
      description: Specificerer, hvordan oliepåfyldningsdækslet fastholdes på motoren
        eller oliepåfyldningsstudsen, f.eks. med gevind, bajonet- eller kvartdrejning
        eller press-fit.
    oil_filler_cap_installation_position:
      name: Installationsposition for oliepåfyldningsdæksel
      description: Specificerer, hvor dækslet bruges, når der findes flere oliepåfyldningspunkter,
        f.eks. ventildæksel eller fjernpåfyldningsrør.
    oil_filler_cap_locking_type:
      name: Låsetype for oliepåfyldningsdæksel
      description: Specificerer, om oliepåfyldningsdækslet ikke kan låses eller har
        en låsende eller sikret afmonteringsmetode, f.eks. med nøgle eller værktøj,
        for at forhindre manipulation, tyveri eller utilsigtet åbning.
    oil_filler_cap_tether_type:
      name: Fastgørelsestype for oliepåfyldningsdæksel
      description: Specificerer, om oliepåfyldningsdækslet er fastgjort, så det ikke
        bliver væk, og hvilken type fastgørelse der bruges.
    oil_filler_cap_venting_type:
      name: Udluftningstype for oliepåfyldningsdæksel
      description: Specificerer, om dækslet er ventileret, og hvilken udluftningsmekanisme
        der bruges, hvis relevant.
    oil_filter_style:
      name: Oliefiltertype
      description: Specificerer oliefilterets formfaktor og monterings- eller installationstype
        for kompatibilitet med motorens filterbeslag.
    oil_pan_baffle_windage_features:
      name: Oliestyringsfunktioner i bundkar
      description: Angiver indvendige oliestyringsfunktioner i bundkarret.
    oil_pan_finish_coating:
      name: Oliebakkens finish/belægning
      description: Beskriver bundkarrets overfladefinish eller belægning, f.eks. malet,
        pulverlakeret, pletteret, rå osv.
    oil_pressure_sensor_function_type:
      name: Funktionstype for olietrykssensor
      description: Angiver, om delen er en olietrykssender med variabelt output til
        en måler eller ECU eller en tænd/sluk-olietrykskontakt, der udløser en advarselslampe.
    oil_pressure_sensor_signal_output_type:
      name: Signaloutputtype for olietrykssensor
      description: Specificerer den elektriske output- eller signaltype, som olietrykssensoren
        eller -senderen producerer.
    oil_processing_method:
      name: Forarbejdningsmetode for olie
      description: Specificerer, hvordan olien er produceret eller raffineret, f.eks.
        koldpresset, virgin eller raffineret, hvilket påvirker smag, ernæring og egnede
        madlavningsanvendelser.
    oil_pump_drive_method:
      name: Drivmetode for oliepumpe
      description: Angiver, hvad der driver oliepumpen i motoren.
    oil_pump_mounting_style:
      name: Monteringsstil for oliepumpe
      description: Specificerer, hvor og hvordan oliepumpen monteres i motoren, f.eks.
        internt kontra eksternt eller fjernmonteret, dækselmonteret eller bundkarsmonteret.
    oil_system_connection_thread_standard:
      name: Gevindstandard for oliesystemtilslutning
      description: Specificerer gevind- eller tilslutningsstandarden, der bruges ved
        delens oliesystemgrænseflade til installation og kompatibilitet, f.eks. M12x1,5,
        1/8-27 NPT eller BSPP.
    oil_viscosity_grade:
      name: Viskositetsgrad for olie
      description: Beskriver den relative tykkelse af spindeolie til håndarbejdsudstyr,
        ikke SAE-grader til biler.
    okra_variety:
      name: Okravariant
      description: Identificerer den specifikke kultivar eller markedsvariant af okra,
        der tilbydes, f.eks. Clemson Spineless, Red Burgundy eller Baby Okra.
    olfactory_arts_material_form:
      name: Materialeform i olfaktorisk kunst
      description: Specificerer materialets fysiske form ved salg.
    olfactory_arts_tool_kit_content:
      name: Indhold i værktøjssæt til olfaktorisk kunst
      description: Angiver, hvilke komponenter der følger med, når produktet sælges
        som et sæt til fremstilling af stearinlys, røgelse eller parfume.
    olive_variety:
      name: Olivenvariant
      description: Specificerer den olivenkultivar, der er brugt, hvilket påvirker
        smag, tekstur, farve og regional autenticitet.
    onion_variety:
      name: Løgvariant
      description: Specificerer den konkrete løgtype, så kunder hurtigt kan finde
        foretrukne profiler for farve, smag og anvendelse, samtidig med at forhandlere
        kan angive produkter præcist.
    opacity_level:
      name: Opacitetsniveau
      description: Angiver, hvor transparent eller uigennemsigtigt stoffet er.
    operating_modes:
      name: Driftstilstande
      description: Primære indbyggede effekt- eller bevægelsestilstande, som laserlyset
        understøtter.
    operating_voltage:
      name: Driftsspænding
      description: Specificerer den nominelle systemspænding, som injektoren er designet
        til.
    optical_toy_features:
      name: Funktioner i optisk legetøj
      description: Fremhæver den primære visuelle eller optiske effekt, som legetøjet
        producerer.
    orchestral_string_core_material:
      name: Kernemateriale i orkesterstreng
      description: Specificerer strengens kernemateriale, som har stor betydning for
        følelse, respons og klang.
    orchestral_string_end_type:
      name: Endetype for orkesterstreng
      description: Specificerer fastgørelsestypen i strengens ende ved strengeholderen.
    orchestral_string_included_strings:
      name: Medfølgende strenge til orkesterstrengeinstrument
      description: Angiver, hvilke specifikke strenge der følger med i pakken, hvilket
        varierer efter instrument.
    orchestral_string_instrument_fitting_part_type:
      name: Type af fitting eller del til orkesterstrengeinstrument
      description: Specificerer, hvilken type fitting eller del produktet er, f.eks.
        stol, strengeholder eller hagestøtte.
    orchestral_string_instrument_mute_type:
      name: Dæmpertype til orkesterstrengeinstrument
      description: Specificerer den funktionelle type dæmper til orkesterstrengeinstrument,
        f.eks. øve- eller hoteldæmper kontra performance- eller koncertdæmper, og/eller
        en almindelig designstil.
    orchestral_string_instrument_part_position:
      name: Placering af del på orkesterstrengeinstrument
      description: Angiver, hvor delen hører til på instrumentet, hvilket er nyttigt,
        når dele findes i øvre eller nedre eller venstre eller højre varianter.
    orchestral_string_winding_material:
      name: Beviklingsmateriale til orkesterstreng
      description: Specificerer det udvendige beviklings- eller omviklingsmateriale,
        der bruges på strengen.
    organza_finish_sheen:
      name: Organzafinish eller -glans
      description: Beskriver organzaens overfladeudtryk, f.eks. mat kontra skinnende
        eller iriserende effekter.
    organza_ribbon_transparency_level:
      name: Gennemsigtighedsniveau for organzabånd
      description: Beskriver, hvor gennemsigtigt organzabåndet er.
    organza_transparency_level:
      name: Gennemsigtighedsniveau for organza
      description: Beskriver, hvor transparent organzastoffet er, når det ligger i
        ét lag.
    origami_paper_shape:
      name: Form på origamipapir
      description: Specificerer arkformen, der bruges til foldning.
    origami_paper_sidedness:
      name: Sidethed for origamipapir
      description: Angiver, om origamipapiret har samme farve eller mønster på begge
        sider eller kontrasterende sider.
    ostrich_feather_part:
      name: Deltype for strudsefjer
      description: Identificerer den type eller del af strudsefjer, der bruges, f.eks.
        plume eller drab, hvilket påvirker blødhed, tæthed og typiske hobbyanvendelser.
    outboard_motor_shaft_type:
      name: Skafttype for påhængsmotor
      description: Standardklasse for skaftlængde, som bruges til påhængsmotorer –
        den betegnelse, der anvendes i marinebranchen.
    outboard_motor_steering_type:
      name: Styringstype for påhængsmotor
      description: Specificerer den styringsgrænseflade eller mekanisme, der bruges
        af påhængsmotoren, f.eks. rorpind eller fjernstyringssystem.
    outdoor_table_functionality:
      name: Funktionalitet for udendørsbord
      description: Identificerer specialiserede indbyggede funktioner, der rækker
        ud over en simpel bordplade, f.eks. kølerum, opbevaringshylde, gastankskjuler,
        parasolfod, stolekobling, sammenklappeligt design, egnethed til poolbrug,
        justerbar højde, integrerede hjul eller LED-belysning.
    outerwear_length_type:
      name: Længdetype for overtøj
      description: Klassificerer overtøjets samlede længde i standardiserede beskrivende
        intervaller.
    outerwear_pieces_included:
      name: Medfølgende dele til overtøj
      description: Angiver de beklædningsdele, der følger med, når produktet sælges
        som et sæt.
    outfit_attachment_mechanism:
      name: Fastgørelsesmekanisme for outfit
      description: Specificerer, hvordan outfit- eller tilbehørsdele fastgøres til
        dukken, f.eks. med flapper, klæbemiddel eller magneter.
    outfit_items_included:
      name: Medfølgende dele til outfit
      description: Angiver de specifikke beklædningsdele, der følger med sættet, f.eks.
        bodystocking, shorts eller pandebånd.
    outlet_thread_type:
      name: Gevindtype for udløbsport
      description: Gevindstandard, der bruges ved hovedcylinderens bremserørsudløb,
        f.eks. metrisk bubble flare kontra SAE inverted flare.
    output_jack_type_instrument:
      name: Type af outputjack (instrument)
      description: Specificerer typen af lydudgangsjack på den elektriske mandolin.
    output_signal_type:
      name: Type af outputsignal
      description: Den elektriske outputadfærd eller signaltype, som sensoren producerer,
        f.eks. analog modstand fra en NTC-termistor.
    outsole_marking_type:
      name: Type af mærkning på ydersål
      description: Angiver, om skoens ydersål efterlader mærker på baneoverflader,
        hvilket er en vigtig faktor for indendørs ketsjersport.
    outsole_material:
      name: Ydersålsmateriale
      description: Angiver materialet i skoens ydersål, som er i kontakt med underlaget,
        og som påvirker greb, fleksibilitet og holdbarhed.
    outsole_stud_type:
      name: Knoptype på ydersål
      description: Beskriver ydersålens eller knoppernes konfiguration, f.eks. støbte
        knopper, gummiknaster eller turf-nopper, som giver greb på den valgte spilleflade.
    oven_bake_clay_formulation:
      name: Formulering af ovnhærdende ler
      description: Identificerer miksturfamilien af ovnbagt ler (f.eks. polymer-ler
        vs. harpiks-ler), som påvirker håndtering, hærdningsadfærd og færdige egenskaber.
    oven_housing_configuration:
      name: Ovnkabinettets konfiguration
      description: Definerer det tilsigtede layout, som skabet skal kunne rumme (f.eks.
        enkelt ovn, dobbelt ovn eller kombination af ovn og mikrobølgeovn).
    overhead_mount_installation_method:
      name: Installationsmetode til overliggende montering
      description: Hvordan det overliggende beslag er fastgjort til køretøjet (hardware/fastgørelsestype).
    oversize_or_undersize_grade:
      name: Overdimensioneret eller underdimensioneret
      description: Angiver sættets størrelsesgrad (oversizestempler/-ringe og/eller
        undersizelejer) i forhold til OEM-standardstørrelse.
    p_tex_application_method:
      name: Påføringsmetode for P-Tex
      description: Beskriver, hvordan P-Tex-materialet påføres ski- eller snowboardbasen.
    p_tex_form:
      name: P-Tex-formular
      description: Identificerer den fysiske form, hvori reparationsmaterialet leveres.
    packability:
      name: Pakbarhed
      description: Angiver, om, og hvordan, vesten kan pakkes eller gemmes væk, når
        den ikke er i brug.
    packaging_format:
      name: Emballageformat
      description: Hvordan strengene pakkes/sælges (individuelle kuverter, løst, osv.).
    packaging_material:
      name: Emballagemateriale
      description: Angiver det primære materiale i den flaske eller beholder, der
        indeholder vandet.
    packaging_type:
      name: Emballagetype
      description: Beskriver, hvordan bobblehead'et er pakket til detail/udstilling/samleropbevaring.
    packing_medium:
      name: Pakningsmedium
      description: Angiver den væske eller det medium (såsom vand, forskellige sirupper,
        juice eller saltlage), der bruges til at konservere frugten inde i beholderen.
    pad_components_included:
      name: Medfølgende komponenter til pude
      description: Angiver, hvilke dele der er inkluderet, når produktet sælges som
        et sæt (f.eks. knæ- og albuebeskyttere, kun håndledsbeskyttere).
    pad_controller_additional_control:
      name: Pad controller – yderligere kontrol
      description: Typer af yderligere fysiske controls udover pads (drejeknapper,
        fadere, almindelige knapper), der findes på enheden.
    pad_controller_performance_features:
      name: Pad controllers performance-funktioner
      description: Vigtige performance-relaterede pad-funktioner til at spille samt
        udtryksfuld kontrol.
    pad_coverage_area:
      name: Dækningsområde for pudder
      description: Angiver de kropszoner, som bæltets integrerede puder beskytter.
    pad_material_or_technology:
      name: Pudemateriale eller -teknologi
      description: Angiver den patenterede stødabsorberende teknologi eller det brandede
        materiale, der er anvendt i puden.
    pad_mounting_or_holding_style:
      name: Montering eller fastholdelse af puden
      description: Angiver, hvordan puden holdes, bæres eller monteres under brug.
    pad_saver_style:
      name: Pudebeskytterstil
      description: Angiver den fysiske stil eller designet af den pudebeskytter, der
        bruges til at tørre pudderne og røret.
    pad_shape:
      name: Pudeform
      description: Definerer den geometriske form eller krumning af pudens slagflade
        eller hele kroppen (f.eks. rund, buet, rektangulær, flad), hvilket hjælper
        brugerne med at matche puder til træningsmål og slagtyper.
    pad_shell_type:
      name: Type pudeskal
      description: Klassificerer konstruktionsstilen på pudens ydre overflade (f.eks.
        hård skal, blød skal, indvendig indsats).
    pad_style:
      name: Pudestil
      description: Angiver pudetypen eller designet leveret med slæden.
    padding_layers:
      name: Pudelag
      description: Angiver antallet af skumlag, der bruges til at absorbere stød.
    padding_level:
      name: Pudeniveau
      description: Angiver mængden af udfyldning integreret i stroppens/støttens kontaktområder
        (nakke/skulder/ryg).
    padding_material:
      name: Pudemateriale
      description: Angiver det indvendige fyld eller pudemateriale, der absorberer
        stød inde i tasker, skjolde, vanter og sutter.
    paddle_ball_attachment_type:
      name: Paddlebolds fastgørelsestype
      description: Angiver, hvordan bolden er forbundet til paddlen (eller om den
        ikke er fastgjort).
    paddle_leash_style:
      name: Type paddle-line
      description: Identificerer stilen eller designet af paddlens linesnor.
    paddle_shape:
      name: Pagajform
      description: Definerer den overordnede silhuet af paddlehovedet/-kroppen (f.eks.
        standard, aflang, bred krop), hvilket påvirker støddets rækkevidde, sweet-spot-størrelse
        og manøvredygtighed.
    paddleboard_intended_use:
      name: Tilsigtet brug af paddleboard
      description: Klassificerer det primære designformål eller den aktivitet, som
        boardet er bygget til (f.eks. touring, yoga, racing).
    paint_application_method:
      name: Påføringsmetode for maling
      description: Den primære måde, hvorpå produktet er beregnet til at blive påført
        kaliberen.
    paint_by_number_surface_type:
      name: Paint-by-number-overfladetype
      description: Den overflade, som det nummererede design er trykt på (f.eks. lærred,
        papir, træpanel).
    paint_medium_application_method:
      name: Metode til påføring af malingsmedium
      description: Angiver den anbefalede måde at påføre mediet på.
    paint_medium_intended_effect:
      name: Malingsmediets tilsigtede effekt
      description: Indfanger det primære resultat, som mediet er beregnet til at oprette
        (tekstur, glans, glasering, flow osv.).
    paint_safe_bristles:
      name: Malingssikre børster
      description: Angiver, om børstens børstehår er markeret som sikre til brug på
        billak eller gennemsigtig lak (ridsefri).
    paintable_surface:
      name: Malbar overflade
      description: Angiver, om papmachéformer er klar til maling, som de er (f.eks.
        grundet/forseglet), eller om de kræver forberedelse.
    paintball_caliber:
      name: Paintball-kaliber
      description: Angiver diameteren/kaliberen af paintballkugler eller kompatibelt
        udstyr.
    paintball_feed_system:
      name: Indføringssystem til paintball
      description: Definerer, hvordan paintballkugler føres ind i markøren.
    paintball_fill_color:
      name: Paintball-fyldfarve
      description: Angiver farven på den indvendige markeringsfyldning, som kan afvige
        fra den udvendige skal, og som bestemmer den farve, der er tilbage bagefter.
    paintball_fill_type:
      name: Fyldtype for paintball
      description: Beskriver enhver særlig mikstur eller egenskab ved fyldet (f.eks.
        vaskbart, selvlysende, pulver).
    paintball_grade:
      name: Kvalitetsgrad for paintball
      description: Beskriver performance-klassen eller det tilsigtede anvendelsesniveau
        (f.eks. entré, felt, konkurrence, vinter).
    paintball_mask_coverage_level:
      name: Dækningsniveau for paintballmasker
      description: Angiver, hvilke dele af ansigtet eller hovedet som paintballbrillerne
        eller -masken beskytter (kun beskyttelsesbriller, halvt ansigt, fuldt ansigt
        eller fuldt hoved).
    paintball_tank_valve_type:
      name: Ventiltype for paintball-tank
      description: Beskriver ventil- eller regulatorgrænsefladen, der findes på tanken.
    painting_surface_priming_type:
      name: Type grunder til malingsoverflade
      description: Angiver grundingen/belægningen på malingsoverfladen (udover blot
        grundet/ikke-grundet), hvilket påvirker malingens vedhæftning og teknikkompatibilitet.
    palette_knife_blade_edge_profile:
      name: Paletknivbladets kantprofil
      description: Beskriver arbejdskantprofilen på et paletknivsblad (ikke skarpheden),
        som påvirker markering og blanding.
    palette_knife_flexibility:
      name: Paletknivens fleksibilitet
      description: Beskriver stivheden/fleksibiliteten af paletteknivbladet.
    palette_surface_finish:
      name: Paletoverfladefinish
      description: Beskriver blandingsfinish/belægning på overfladen, der påvirker
        pletbestandigheden og rengøringsvenligheden.
    palm_padding_level:
      name: Polstringsniveau i håndfladen
      description: Beskriver mængden af stødabsorbering i handskens eller grebspudens
        håndfladeområde.
    palm_padding_type:
      name: Polstringstype i håndfladen
      description: Angiver det materiale eller den konstruktion, der er anvendt til
        polstring ved håndfladen (f.eks. gel, skum, dobbeltlag).
    palm_wax_blend_readiness:
      name: Klarhed med palmevoksblanding
      description: Om produktet er ren palmevoks eller en præblandet mikstur beregnet
        til specifikke egenskaber.
    palm_wax_form:
      name: Palmevoksform
      description: Palmevoksens fysiske form som solgt, hvilket påvirker måleevnen,
        smeltehastigheden og håndteringen.
    pan_flute_tuning_standard:
      name: Standardstemning for panfløjte
      description: Referencefrekvens brugt til stemning (f.eks. A4=440 Hz), vigtig
        for at spille med andre instrumenter.
    pannier_configuration:
      name: Konfiguration af cykeltaske
      description: Angiver, om produktet sælges som en enkelt taske, en sammenhængende
        dobbelt eller et par/tre sæt kurve.
    pannier_mounting_system:
      name: Monteringssystem for cykeltaske
      description: Definerer den mekanisme, der bruges til at fastgøre kurven til
        cykelstellet eller rammen, hvilket sikrer kompatibilitet med forskellige opsætninger.
    pant_cuff_style:
      name: Buksemanchetstil
      description: Angiver finish eller justering ved buksernes ankel (f.eks. elastiske
        manchetter, lynlåse ved anklen, åben kant).
    pant_leg_conversion_type:
      name: Type omdannelse af bukseben
      description: Angiver, om, og hvordan, buksebenene kan omdannes eller justeres
        til forskellige længder.
    pantyhose_crotch_style:
      name: Skridtstil i strømpebukser
      description: Definerer designet af skridtområdet og skelner mellem standard
        lukket skridt, skridtløs eller forstærkede skridtversioner.
    papaya_variety:
      name: Papaya-sort
      description: Angiver kultivaren eller markedssorten af en papaya (f.eks. Solo,
        Maradol).
    paper_and_magnetic_doll_format:
      name: Papir og magnetisk dukkeformat
      description: Angiver, om produktet er et traditionelt papirdukkesæt, et magnetisk
        dukkesæt eller et hybridformat.
    paper_color_family:
      name: Paperfarvefamilie
      description: Angiver, om pakken er i én farve, assorterede farver eller specialblandinger
        (nyttigt, når farverne er i én farve, men pakkerne er blandede).
    paper_magnetic_doll_set_contents:
      name: Indhold i papir- og magnetisk dukkesæt
      description: Angiver, hvilke hovedkomponenter der er inkluderet i sættet.
    paper_opacity:
      name: Papergennemsigtighed
      description: Angiver, hvor gennemsigtigt papiret er, fra meget transparent til
        uigennemsigtig (nyttigt til sporing).
    paraglider_certification_rating:
      name: Certificeringsklassificering for paraglider
      description: Angiver den officielle flyvedygtighedsklassificering, der er tildelt
        en paraglider-vinge (f.eks. EN- eller LTF-klasser).
    parasite_types_controlled:
      name: Parasittype, der skal behandles
      description: Angiver de indre parasitter, som produktet er effektivt imod, så
        køber kan skræddersy ormekurprogrammer til specifikke angreb.
    parking_camera_mounting_location:
      name: Monteringsplacering for parkeringskamera
      description: Hvor på køretøjet kameraet er beregnet til at blive installeret
        (f.eks. i nummerpladeområdet, overflademontering bagpå, planmontering).
    parking_camera_night_vision_technology:
      name: Parkeringskameras night vision-teknologi
      description: Den metode, kameraet bruger i svagt lys.
    parking_camera_orientation:
      name: Parkeringskameraets retning
      description: Om kameraet er designet til bagudrettet syn (som back-up), fremadrettet
        syn eller valgbar/spejlvendt brug.
    parking_sensor_finish:
      name: Parkeringssensorens finish
      description: Angiver overfladefinish på parkeringssensorens forside/dæksel (f.eks.
        malbar/grundet, mat, blank) for at matche kofangerens æstetik.
    parking_sensor_type:
      name: Parkeringssensortype
      description: Angiver den registreringsteknologi, der anvendes af parkeringssensoren
        (f.eks. ultralyd, elektromagnetisk, radar, optisk).
    parsley_root_variety:
      name: Persillerodsort
      description: Angiver kultivar eller sort af persillerod, når den leveres af
        leverandøren.
    parsnip_variety:
      name: Pastinaksort
      description: Identificerer den specifikke sort eller kultivar af pastinak, såsom
        Hollow Crown eller White Gem, hvilket giver køberen mulighed for at vælge
        baseret på smag, sødme eller størrelsesforskelle.
    part_condition:
      name: Delstand
      description: Angiver, om delen er ny, brugt, renoveret osv.
    part_placement:
      name: Delplacering
      description: Angiver, hvor på maskinen (f.eks. trappeopgang eller stepper) delen
        er installeret, f.eks. venstre, højre, foran eller bagpå.
    partial_capo_covered_strings:
      name: Delvis capos dækkede strenge
      description: Angiver strengeområdet, som den delvise capo dækker, ved hjælp
        af standard-6-strengs-guitarnummerering (1 = høj E, 6 = lav E).
    parting_style:
      name: Frisørstil
      description: Angiver, hvordan parykken har eller kan have en skilning (f.eks.
        midterskilning, sideskilning, fri skilning), hvilket påvirker stylingsfleksibiliteten.
    party_favor_type:
      name: Festgavetype
      description: Angiver, hvilken slags festgave det er (f.eks. klistermærker, minlegetøj,
        bobler) for at muliggøre browsing/filtrering inden for festgaver.
    party_game_format:
      name: Format for selskabsspil
      description: Primært fysisk format af selskabsspillet.
    party_horn_mouthpiece_type:
      name: Mundstykketype til festhorn
      description: Specificerer mundstykkets konstruktion, hvilket påvirker hygiejne
        og komfort.
    party_horn_style:
      name: Festhornstil
      description: Beskriver festhornets konstruktion/adfærd (hvordan det forlænges
        eller producerer lyd).
    passenger_car_type:
      name: Type passagervogn
      description: Identificerer den specifikke type rullende materiel (passagervogn)
        for modellen (f.eks. personvogn, sovevogn), der bruges til browsing og bygning
        af kulisser.
    passion_fruit_variety:
      name: Passionsfrugtsort
      description: Identificerer/specificerer den botaniske eller kommercielle variant
        af passionsfrugt, der tilbydes (f.eks. Lilla, Gul, Granadilla).
    pasta_sauce_texture:
      name: Pastasaucens tekstur
      description: Beskriver saucens konsistens (f.eks. glat, klumpet, cremet), så
        den matcher forbrugerens mundfornemmelse.
    pasta_sauce_variety:
      name: Variation af pastasauce
      description: Klassificerer pastasaucer efter opskrift eller stil, så kunden
        hurtigt kan finde klassikere som marinara eller specialsaucer som vodka eller
        pesto.
    pastry_crust_state:
      name: Tærteskorpens tilstand
      description: Beskriver tilberednings- eller bagetilstanden af skorpen ved køb.
    pastry_crust_style:
      name: Tærtedejstype
      description: Identificerer den specifikke dejstil eller -type i skorpen.
    pastry_filling_type:
      name: Type af dejfyld
      description: Angiver den primære indvendige fyldning i dejen eller en scones.
    patch_adhesion_method:
      name: Metode til påsætning af lapning
      description: Angiver, hvordan lappen klæber til slangen eller dækket (f.eks.
        selvklæbende, vulkaniserende med cement eller varmeaktiveret).
    patch_backing_material:
      name: Bagsidemateriale for patch
      description: Materiale brugt på bagsiden/bunden af lappen (f.eks. filt, twill),
        der er i kontakt med det materiale, der skal udsmykkes.
    patch_backing_type:
      name: Bagsidetype for patch
      description: Bagsiden, der bruges på lappen (f.eks. varmeforsegling/strygning,
        selvklæbende klæbemiddel, velcro, ingen).
    patch_base_material:
      name: Basismateriale for patch
      description: Primært tekstilmateriale som bund/bagside af motivlappen (ikke
        de dekorative udsmykninger).
    patch_border_edge_finish:
      name: Lapkant/kantfinish
      description: Kantbehandlingsmetoden på lappen (f.eks. merrow- eller overlock-kant,
        laserskåret kant), der påvirker holdbarhed og udseende.
    patch_placement_area:
      name: Område til placering af lap
      description: Fælles tiltænkt placeringsområde for lappen på beklædning/tilbehør.
    pathogen_removal_capability:
      name: Evne til at fjerne patogener
      description: Angiver, hvilke klasser af mikroorganismer (bakterier, protozoer,
        vira) pumpen er certificeret til at fjerne.
    pattern_sizing_system:
      name: Mønsterets størrelsessystem
      description: Angiver det regionale størrelsessystem eller den standard, der
        bruges til mønsterets størrelsesdiagram (f.eks. USA, UK, EU).
    peak_style:
      name: Visirets stil
      description: Angiver stilen på visiret eller skyggen på hjelmen, hvilket påvirker
        dækning, æstetik og disciplinregler.
    pear_variety:
      name: Pæresort
      description: Identificerer kultivaren eller sorten af pærer (f.eks. Bartlett,
        Bosc, Conference), hvilket giver kunden mulighed for at vælge deres foretrukne
        smag, tekstur og kulinariske anvendelse.
    pearl_luster_grade:
      name: Perlens glansgrad
      description: Kvalitativ grad af glans på perleoverfladen.
    pearl_matching_level:
      name: Perlematchningsniveau
      description: Angiver, hvor godt perler passer sammen inden for et parti eller
        en streng (f.eks. efter farve, størrelse og glans).
    pearl_shape:
      name: Perleform
      description: Den overordnede formkategori for perlen.
    pearl_surface_condition:
      name: Perlens overfladestand
      description: Angiver den synlige overfladestand af en perle, baseret på tilstedeværelsen
        og sværhedsgraden af pletter eller skader.
    pearl_treatment:
      name: Perlebehandling
      description: Oplyser om enhver behandling, der er anvendt på perlen, som påvirker
        farve/udseende.
    pearl_type:
      name: Perletype
      description: Angiver perlesorten/-oprindelsen (f.eks. ferskvand, Akoya, Tahiti,
        Sydhavet) for løse perler.
    peat_level:
      name: Tørvegrad
      description: Beskriver intensiteten af tørverøgen i whiskyen, fra ikke-tørvet
        til kraftigt tørvet.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilitet mellem pedaler og klamper
      description: Angiver, hvilke pedal- eller klampestandarder mellemlægget eller
        kilen er designet til at fungere med, hvilket sikrer, at kunden vælger et
        produkt, der passer til deres pedaler og sko.
    pedal_configuration:
      name: Pedalkonfiguration
      description: Angiver, om stolen har en enkelt pedal, delte/uafhængige pedaler
        eller et konvertibelt design.
    pedal_mounting_style:
      name: Monteringsstil for pedal
      description: Angiver, hvordan pedalen eller pedaldækslet fastgøres til køretøjet
        (installations-/fastgørelsesmetode).
    pedal_set_components:
      name: Pedalsættets komponenter
      description: Angiver, hvilke pedaler der er inkluderet i sættet.
    pedal_spindle_material:
      name: Materiale til pedalakslen
      description: Materiale anvendt til pedalakslen, hvilket påvirker styrke, vægt
        og korrosionsbestandighed.
    pedal_spindle_thread_size:
      name: Pedalakslens trådstørrelse
      description: Angiver gevindstandarden for pedalakslen, der skrues ind i krankarmen.
    pedal_type:
      name: Pedaltype
      description: Beskriver typen af pedaler, der følger med cyklen, med angivelse
        af skokompatibilitet og kørestil.
    pellet_accessory_type:
      name: Tilbehørstype til pellets
      description: Identificerer den specifikke type pilletilbehør, så lystfiskere
        hurtigt kan finde bor, banders eller stop, alt efter hvad de har brug for
        til at samle deres udstyr.
    pellet_grade:
      name: Kuglekvalitet
      description: Angiver fremstillingspræcisionen eller performance-niveauet af
        airsoft-kuglerne.
    pen_ink_color:
      name: Blækfarve til pennen
      description: Angiver den faktiske blækfarve, der kommer ud af pennen, som kan
        afvige fra den ydre farve på kroppen.
    penalty_card_accessories_included:
      name: Medfølgende tilbehør til straffekort
      description: Viser en liste over ekstra dommertilbehør, der følger med straffekortet,
        såsom digital tegnebog, scoreblok, blyant, mønt, fløjte eller etui.
    penalty_card_colors_included:
      name: Farver på medfølgende strafkort
      description: Viser farve på de straffekort, der medfølger i produktsættet.
    penalty_flag_throw_distance:
      name: Kastafstand for straffeflag
      description: Designklassificering, der angiver flagets tilsigtede kasteafstand.
    pendant_cutter_safety_features:
      name: Sikkerhedsfunktioner for vedhængssaks
      description: Identificerer integrerede sikkerhedselementer, der reducerer utilsigtede
        snitsår under bæring/brug.
    pendant_cutter_wear_method:
      name: Bæremetode for vedhængssaks
      description: Angiver, hvordan vedhængssaksen er beregnet til at blive båret
        eller brugt.
    pepper_variety:
      name: Pebersort
      description: Angiver den anvendte pebersort eller -art i produktet, så kunden
        kan skelne mellem forskellige smagsprofiler og styrkeniveauer.
    percussion_case_style:
      name: Perkussionsæske, stil
      description: Klassificerer æskens overordnede stil/konstruktion blød taske vs.
        hård/stiv æske vs. hybrid).
    percussion_instruments_included:
      name: Medfølgende slagtøjsinstrumenter
      description: Viser de typer af perkussionsinstrumenter, der medfølger når produktet
        er et legetøjssæt med flere instrumenter.
    percussion_mallet_handle_grip_style:
      name: Stil for perkussionkølles håndtagsgreb
      description: Identificerer behandlingstypen for håndtagets greb (ud over tekstur),
        såsom bart træ, lakeret, gummieret greb eller omvikling.
    percussion_mallet_head_construction:
      name: Konstruktion af perkussionskøllehoved
      description: Beskriver køllehovedets konstruktion (f.eks. omviklet garn, filtomvikling,
        gummi, ubehandlet træ), hvilket påvirker lyd og holdbarhed.
    perfumery_base_carrier_type:
      name: Type basalt parfumebærestof
      description: Angiver bærestof-/opløsningsmiddelsystemet i en parfumebase (hvad
        basen primært er lavet af til fortynding og ydeevne).
    perfumery_base_intended_application:
      name: Tilsigtet anvendelse af parfumebase
      description: Angiver det slutbrugsformat, som basen er designet til (f.eks.
        duftspray vs. roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Parfumeingrediens' bærestof/opløsningsmiddel
      description: Identificerer det bærestof/opløsningsmiddel, som ingrediensen bruges
        i, hvis den er fortyndet (f.eks. ethanol, DPG, jojobaolie).
    perfumery_ingredient_form:
      name: Form på parfumeingrediens
      description: Angiver parfumeingrediensens fysiske form/tilstand som leveret.
    perfumery_ingredient_type:
      name: Type af parfumeingrediens
      description: Klassificerer parfumeingrediensen efter, hvad den er i parfumepraksis
        (f.eks. æterisk olie, aromakemikalie).
    perfumery_ingredient_usage_note:
      name: Note om brug af parfumeingredienser
      description: Angiver typisk rolle i en duftstruktur (top, midte/hjerte, basis),
        og anerkender at materialer kan spænde over noter.
    perfumery_ingredients:
      name: Parfumeingredienser
      description: Angiver de typer duftstof-forbrugsvarerder er inkluderet i sættet
        (f.eks. æteriske olier, duftolier, alkoholbase).
    perfumery_note_position:
      name: Parfumenotens position
      description: Angiver ingrediensens typiske rolle i en duftstruktur (top/hjerte/bund).
    persimmon_variety:
      name: Kakisort
      description: Identificerer kakiens varietet eller sort, da forskellige sorter
        som Fuyu eller Hachiya adskiller sig i tekstur, smag, adstringens og kulinarisk
        anvendelse.
    personalization_type:
      name: Tilpasningstype
      description: Angiver hvorvidt og hvordan produktet kan brugertilpasses til et
        arrangement (f.eks. monogram, navn/dato, indsat foto).
    phonics_focus:
      name: Fonetisk fokus
      description: Angiver hvilke fonetiske og læsemæssige færdigheder læselegetøjet
        er målrettet.
    physalis_variety:
      name: Physalissort
      description: Identificerer den specifikke botaniske art, varietet eller almindelige
        sort af physalis, der sælges.
    pi_ata_filler_type_included:
      name: Medfølgende piñata-fyldtype
      description: Hvis fyld medfølger, angives type af medfølgende indhold.
    pi_ata_hanging_method:
      name: Piñata-ophængningsmetode
      description: Hvordan piñataen er designet til at blive ophængt eller understøttet
        (løkke, krog, snor inkluderet osv.).
    pi_ata_opening_type:
      name: Piñata åbningstype
      description: Hvordan fyldåbningen tilgås/lukkes (klap, velcro, lynlås, forforseglet
        osv.).
    piccolo_key_system:
      name: Piccolofløjtes klapsystem
      description: Identificerer det klapsystem/-design, der anvendes på piccoloen
        (typisk Boehm-systemet til moderne piccoloer).
    piccolo_keywork_features:
      name: Piccolo-klapfunktioner
      description: Angiver nævneværdige klapmekanismer og valgmuligheder på piccoloen.
    pick_grip_aid:
      name: Plektergreb
      description: Angiver det primære indbyggede greb på plekteret ud over den generelle
        overfladefølelse/tekstur (f.eks. grebshuller, præget logo, indlagt gummi
    pickleball_construction_type:
      name: Konstruktionstype for pickleball
      description: Boldens fremstillingskonstruktion, såsom sømløs i ét stykke eller
        svejset i to dele, hvilket påvirker holdbarhed og ensartet boldbevægelse.
    pickling_method:
      name: Syltemetode
      description: Angiver det konserveringsmedium eller den teknik, der anvendes
        til syltning, såsom eddikelage eller mælkesyregæring.
    pickup_and_preamp_configuration:
      name: Konfiguration af pickup og forforstærker
      description: Angiver om violaen inkluderer en indbygget pickup og/eller aktiv
        forforstærker til forstærket ydeevne eller optagelse.
    pickup_configuration:
      name: Pickupkonfiguration
      description: Beskriver det overordnede pickup-layout for en elektrisk guitar
        ved hjælp af almindelige forkortelser (f.eks. SSS, HSS, HH).
    pickup_cover_material:
      name: Materiale i pickupcover
      description: Angiver det primære materiale for pickup-coveret (hvis det findes),
        inklusive almindelige belagte overflader, når det er sådan, producenten specificerer
        det.
    pickup_cover_type:
      name: Type pickup-cover
      description: Angiver, om en elektrisk guitar-pickup har et cover, og coverets
        materiale/stil (f.eks. metal vs. plastik).
    pickup_string_spacing:
      name: Pickups strengafstand
      description: Den standardafstand mellem polstykker/strenge, som pickup'en er
        lavet til (f.eks. Fender/F-afstand vs. Gibson/standard), hvilket påvirker
        justeringen på guitarer med vibratoarm
    pie_crust_type:
      name: Type tærtebund
      description: Angiver den skorpetype eller -stil, der bruges til tærten, såsom
        butterdej, digestivekiks eller glutenfri.
    piece_configuration:
      name: Delkonfiguration
      description: Angiver, hvor mange separate dele køen, skaftet eller broen består
        af, hvilket påvirker bærbarhed og spillestil.
    pillow_form_size:
      name: Pudeforms størrelse
      description: Standardiseret efterbehandlet størrelsesbetegnelse for pudeformer/-indlæg
        (f.eks. 18" x 18").
    pilot_helmet_communications_integration:
      name: Integration af pilothjelms-kommunikation
      description: Angiver, om hjelmen inkluderer eller er prækonfigureret til kommunikationskomponenter
        til luftfart.
    pilot_helmet_visor_configuration:
      name: Konfiguration af pilothjelmsvisir
      description: Angiver den visir-/ansigtsskærmkonfiguration, der følger med pilothjelmen.
    pin_attachment_type:
      name: Fastgørelsestype for pin
      description: Angiver den nålebagside/underlagsmekanisme, der bruges til at fastgøre
        nålen til tøj eller en overflade (f.eks. sommerfuglelås, magnetisk bagside).
    pin_backing_type:
      name: Bagsidetype for pin
      description: Angiver den fastgørelses-/underlagsmekanisme, der bruges til at
        fastgøre nålen til tøj eller tilbehør.
    pin_cushion_attachment_style:
      name: Nålepudes vedhæftningsstil
      description: Hvordan nålepuden bæres, fastgøres eller placeres under brug.
    pin_cushion_features:
      name: Nålepudes egenskaber
      description: Funktionelle egenskaber ud over at samle nåle.
    pin_face_customization_method:
      name: Metode for tilpasning af nåleforside
      description: Angiver frontdesignet f.eks. hård emalje, blød emalje, trykt).
    pin_type:
      name: Nåletype
      description: Angiver nåleproduktstil- eller -format anvendt til samleobjekter
        fra sportsfandoms.
    ping_pong_certification:
      name: Bordtenniscertificering
      description: Erklærer produktets officielle standard eller styreorgans godkendelsesniveau.
    ping_pong_competition_certification:
      name: Bordtennis-konkurrencecertificering
      description: Angiver den officielle certificeringsstatus for bordtennisbolden
        til godkendt spil (f.eks. ITTF-godkendt).
    ping_pong_paddle_handle_style:
      name: Stil for bordtennisbats håndtag
      description: Definerer bathåndtagets form/stil, hvilket påvirker gribekomfort
        og spilleteknik.
    ping_pong_robot_accessory_type:
      name: Bordtennisrobots tilbehørstype
      description: Identificerer tilbehørets funktionelle undertype, så kunder hurtigt
        kan indsnævre resultaterne (f.eks. net vs. strømadaptere).
    ping_pong_rubber_surface_type:
      name: Bordtennis, type gummioverflade
      description: Identificerer stilen/teksturen for den gummioverflade, battet er
        påført, hvilket påvirker spin- og hastighedsegenskaber.
    ping_pong_rubber_type:
      name: Bordtennisgummitype
      description: Angiver bordtennisgummilagetS soverfladekonstruktionsstil, hvilket
        påvirker spilleegenskaberne.
    ping_pong_table_type:
      name: Type af bordtennisbord
      description: Klassificerer bordets overordnede stil eller format til nemmere
        sammenligning (f.eks. bordtennisplade, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Blæserinstruments lydfrembringelsesmetode
      description: Angiver, hvordan instrumentet producerer lyd (luftstrømsmekanisme),
        hvilket hjælper med at skelne mellem panfløjter, rørfløjter og orgelpiber
        i filtre.
    piston_application_type:
      name: Stempels anvendelsestype
      description: Tilsigtet funktion/brug af stemplet (udskiftning vs. ydeevne/racing
        vs. højtydende).
    piston_crown_dish_style:
      name: Stempeltop/fordybningsstil
      description: Form på stempelkronen, der påvirker forbrændingskammerets volumen
        og kompression (f.eks. flad top, kuppel, skål).
    piston_pin_retention_type:
      name: Stempelpinds fastgørelsestype
      description: Angiver, hvordan led- (stempel-)pind fastgøres i stempel-/plejlstangsenheden.
    pit_configuration:
      name: Konfiguration af pit
      description: Definerer landingsområdets strukturelle format (et stykke vs. flere
        moduler) og endvidere det medleverede antal sektioner eller moduler.
    pit_cover_type:
      name: Type af pit-cover
      description: Angiver den beskyttende overflade eller det beskyttende lag, der
        følger med måtten, hvilket påvirker pigmodstand, vejrbeskyttelse og atletens
        præference.
    pitahaya_flesh_color:
      name: Pitahayas frugtkødsfarve
      description: Angiver den indre frugtkødsfarve af kødet i pitahayaen (dragefrugten)
        (f.eks. hvid, rød, magenta), en vigtig forskel, der påvirker smag, udseende
        og opfattet ernæring.
    pitch_mat_coverage_length:
      name: Dækningslængde for banemåtten
      description: Klassificerer cricketbanemåtten efter den del af gærdet, den dækker
        (f.eks. fuld eller halv bane).
    pitch_range:
      name: Toneområde
      description: Beskriver det opfattede toneområde/shakerlydens klarhed.
    pitch_standard:
      name: Tonehøjdestandard
      description: Angiver den tonehøjdestandard (referencetuning), som optageren
        er bygget til (f.eks. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Størrelsesbetegnelse for kasteplanke
      description: Angiver standardklassificeringen for banestørrelse for kasteplanken,
        hvilket forenkler udvælgelsen, uden at kunden behøver at kende de nøjagtige
        mål.
    pitching_screen_style:
      name: Kastenetstil
      description: Definerer nettets strukturelle design, så kunderne hurtigt kan
        vælge det korrekte layout til deres træningsscenarie.
    pitching_target_design:
      name: Design af pitching-mål
      description: Klassificerer den overordnede stil eller konfiguration af pitching-målet.
    pitching_wheel_count:
      name: Antal pitchinghjul
      description: Angiver antallet af fremdriftshjul, som en pitchingmaskine bruger.
    pivot_adjustability:
      name: Drejejusterbarhed
      description: Angiver om saksen har en justerbar drejeskrue til at justere klippespændingen.
    pivot_piece_type:
      name: Type drejestykke
      description: Skelner mellem forskellige medleverede former for drejepunkter,
        såsom traditionelle kopper eller rørformer.
    place_card_holder_closure_mechanism:
      name: Lukkemekanisme til bordkortholder
      description: Angiver, hvordan holderen griber eller fastgør kortet.
    place_card_orientation:
      name: Orientering af bordkort
      description: Angiver bordkortets orientering når det bruges/vises.
    place_card_printing_status:
      name: Status for udskrivning af bordkort
      description: Angiver om bordkortet er blankt til håndskrift/tryk, fortrykt (navne
        ikke tilpasset) eller personligt/specialtrykt.
    placket_type:
      name: Slidstype
      description: Angiver stilen på den forreste åbning på polotrøjen, inklusive
        antal knapper eller alternative lukninger.
    planetarium_content_theme:
      name: PlanetarieIndholdstema
      description: Primært indhold vist af planetarieprojektoren.
    planetarium_projection_content_format:
      name: Format for planetarieprojektionsindhold
      description: Angiver den projektionsindholdmekanisme, som planetariet bruger
        (fysiske diske/dias vs. digital/LED-effekt).
    plant_fiber_type:
      name: Plantefibertype
      description: Specifik oprindelse af plante fibertype, når stabil fiberkildetype
        er plante.
    plaster_gauze_finish:
      name: Gipsbindfinish
      description: Resulterende overfladefinish efter påføring og udglatning.
    plaster_gauze_grade:
      name: Gipsbindkvalitet
      description: Tilsigtet brugsgrad af gipsbindet f.eks. formning/studerende vs.
        professionel).
    plaster_gauze_weave_density:
      name: Gipsbindets vævningstæthed
      description: Bindvævningens relative åbenhed/tæthed, der påvirker styrke og
        vedhæng.
    plastic_canvas_finish:
      name: Plastlærredsfinish
      description: Plastlærredsrullens overflade-/finishbehandling.
    plastic_canvas_sheet_finish:
      name: Finish på plastkanvasark
      description: Overflade- eller kantbehandling af plastkanvasarket
    plastic_canvas_transparency:
      name: Plastlærreds gennemsigtighed
      description: Hvor gennemsigtig/uigennemsigtig plastlærredet er.
    plate_bottom_design:
      name: Design af pladebunden
      description: Beskriver konstruktionen af undersiden af pladen, som påvirker
        greb, stabilitet og sikkerhed på forskellige spilleunderlag.
    plate_compatibility_standard:
      name: Kompatibilitetsstandard for plade
      description: Angiver den vægtskivestandard, som stangen er designet til (f.eks.
        olympisk 50 mm, standard 25 mm).
    plate_installation_type:
      name: Pladeinstallationstype
      description: Angiver, hvordan pladen er fastgjort eller placeret på banen (f.eks.
        nedgravet, med pigge, nedkastet), hvilket giver køber mulighed for at vælge
        mellem permanente og bærbare muligheder.
    plate_size_category:
      name: Størrelseskategori for plade
      description: Klassificerer pladen efter spilleniveau eller regulativ standard,
        så køber hurtigt kan finde ligakompatibelt udstyr.
    play_dough_putty_kit_contents:
      name: Indhold af trylledejs- og modellervokssæt
      description: Identificerer de vigtigste inkluderede komponenter ud over selve
        pastaen (f.eks. værktøj, forme, udpresser, opbevaring).
    play_dough_tool_set_items_included:
      name: Medfølgende elementer i modellervoksværktøjssæt
      description: Identificerer de typer af værktøj og tilbehør, der indgår i et
        værktøjssæt til modellervoks (f.eks. ruller, udstikkere, forme).
    play_environment_suitability:
      name: Egnethed til legemiljøet
      description: Identificerer det tilsigtede legemiljø for sættet (f.eks. indendørs,
        udendørs, vand).
    play_food_features:
      name: Legemadfunktioner
      description: Legemadens særlige funktionelle eller realistiske egenskaber.
    play_food_items_included:
      name: Medfølgende elementer af legemad
      description: Angiver de typer legemad, der følger med køkkenlegesættet.
    play_food_size_scale:
      name: Legemadens skala
      description: Angiver den omtrentlige skala på delene i legemaden til sammenligning
        med legekøkkener, dukker og legesæt.
    play_money_set_components_included:
      name: Medfølgende komponenter i legepengesæt
      description: Angiver hvilke komponenttyper der er inkluderet i penge/banklegesættet.
    play_pattern:
      name: Legemønster
      description: Den primære måde, legetøjet er beregnet til at blive brugt på (f.eks.
        fidget/stresslindring, skrivebordsskulptur/kunst, bygge/anlæg eller puslespil).
    play_sprinkler_mounting_type:
      name: Monteringstype for legesprinkler
      description: Hvordan legesprinkleren er placeret/fastgjort under brug.
    play_vehicle_lights_and_sounds:
      name: Legekøretøjs lys og lyde
      description: Angiver, om legetøjskøretøjet indeholder elektroniske legeeffekter
        såsom lys og/eller lyde.
    play_vehicle_scale:
      name: Legekøretøjs skala
      description: Angiver størrelsesforholdet for legetøjskøretøjet (almindeligt
        brugt til støbte og modellignende legetøjskøretøjer).
    player_size_category:
      name: Størrelseskategori for spiller
      description: Definerer den tilsigtede spillerstørrelse/aldersgruppe, som griber-sættet
        passer til (f.eks. Tee Ball, ungdom, mellemklasse, voksen).
    player_size_range:
      name: Spillerstørrelse
      description: Angiver det tilsigtede brugerstørrelsesinterval for skridtbeskytter
        (f.eks. barn, voksen, universel).
    playing_environment:
      name: Spillemiljø
      description: Angiver primær spilleoverflade eller kontekst, som hockeybolden
        er designet til.
    playing_method:
      name: Spillemetode
      description: Den primære måde, instrumentet er beregnet til at blive spillet/aktiveret
        på.
    playing_surface_material:
      name: Materiale i spilleflade
      description: Identificerer materialet i cajon'ens forreste spilleflade (tapa),
        hvilket har stor indflydelse på tone og fornemmelse.
    playing_surface_type:
      name: Spilleoverfladetype
      description: Beskriver spilleoverfladens konstruktion/fornemmelse på øvemåtten.
    playset_activities_included:
      name: Medfølgende legesætaktiviteter
      description: Identificerer de vigtigste legeaktiviteter/komponenter, der er
        indbygget i gyngestativet/legesættet for at hjælpe kunden med at filtrere
        efter, hvad børnene kan lege på konstruktionen.
    playset_installation_type:
      name: Installationstype for legesæt
      description: Angiver, hvordan gyngestativet/legesættet er installeret eller
        fastgjort.
    playset_items_included:
      name: Medfølgende dele i legesæt
      description: Identificerer de typer legedele, der er inkluderet i picnic-legesættet
        (mad, service, tæppe, kurv osv.).
    pliers_jaw_style:
      name: Tangs kæbeform
      description: Beskriver tangens primære kæbekonfiguration eller funktionelle
        stil.
    plum_variety:
      name: Blommesort
      description: Identificerer den specifikke blommevarietet eller -sort, hvilket
        gør det muligt for kunden at vælge baseret på smag, farve og tilsigtet kulinarisk
        anvendelse.
    plumcot_variety:
      name: Plumcotvariant
      description: Identificerer den specifikke varietet eller kommercielle pluot-sort
        (f.eks. Flavor King, Dapple Dandy), hvilket kan påvirke smag, farve og høsstid.
    plunger_mute_handle_type:
      name: Type svuppersordin-håndtag
      description: Angiver type håndtag eller greb, der bruges til at holde og manipulere
        en svuppersordin ved wa wa-effekt.
    pocket_closure_type:
      name: Lommelukningstype
      description: Definerer, hvordan hver lomme er sikret, hvilket hjælper brugerne
        med at finde bukser med sikker opbevaring under aktivitet.
    pocket_knife_opening_mechanism:
      name: Åbningsmekanisme til lommekniv
      description: Hvordan bladet udtages/åbnes (manuelt neglehak, tommelknop, stiftåbning,
        assisteret, automatisk osv.).
    pocket_style:
      name: Lommestil
      description: Angiver den primære lommekonstruktion på bukserne.
    pocket_type:
      name: Lommetype
      description: Identificerer stilen eller tilstedeværelsen af lommer på beklædningsgenstanden.
    pod_retention_system:
      name: Kapselholdesystem
      description: Beskriver, hvordan paintballkapsler holdes på plads og frigøres
        fra selen eller pakken.
    pogo_stick_footrest_type:
      name: Fodstøtte af typen kængurustylte
      description: Beskriver fodplatformen/pløkkens design, der bruges til at stå
        på kængurustylten.
    pogo_stick_suspension_type:
      name: Kængurustyltes fjedringstype
      description: Angiver kængurustyltens fjedermekanisme, hvilket påvirker fornemmelse,
        holdbarhed og vedligeholdelse.
    poi_handle_type:
      name: Håndtagstype for poi
      description: Angiver typen af håndtag/greb/holder, der bruges til at holde poi'en.
    poi_light_source:
      name: Poi-lyskilde
      description: Til oplyst poi specificeres belysningsteknologien.
    poi_tether_type:
      name: Poi-fastgørelsestype
      description: Angiver den type fastgørelsestråd, der forbinder poi-hovedet med
        håndtaget, knappen eller håndledsløkken (f.eks. snor, reb, kæde).
    poi_type:
      name: Poi-type
      description: Angiver den primære poi-konstruktion/brugstype (f.eks. øvelse,
        LED, brand).
    point_type:
      name: Spidstype
      description: Form/stil på den spids, der bruges på broderinålen.
    pointe_shoe_shank_length:
      name: Skaftlængde for tåspidssko
      description: Den del af skolængden, svangen understøtter, f.eks. fuld eller
        3/4 længde.
    pointe_shoe_shank_strength:
      name: Balletskos svangstyrke
      description: Stivhedsniveauet af en balletskos svang, der påvirker støtte og
        tiden, de skal gås til.
    poker_accessory_storage_included:
      name: Medfølgende opbevaring til pokertilbehør
      description: Angiver hvilke ekstra pokerdele, tilbehøret har dedikeret opbevaring
        til.
    poker_chip_tray_rack_configuration:
      name: Konfiguration af pokerjetonbakke/chiprack
      description: Beskriver den interne organiseringsmåde for en jetonbakke (rækker
        og kapacitet pr. række).
    pole_anchoring_method:
      name: Forankringsmetode for stang
      description: Definerer, hvordan stangen er fastgjort til jorden eller legefladen.
    pole_basket_type:
      name: Trinsetype for stav
      description: Klassificerer stilen eller størrelsen af den trinse, der sidder
        nær spidsen af skistaven, hvilket angiver de tilsigtede sneforhold.
    pole_connection_system:
      name: Stangforbindelsessystem
      description: Identificerer den mekanisme, der forbinder stangsektioner, såsom
        støddæmpede, gevind- eller navsystemer, det hjælper brugerne med at vurdere
        opsætningshastighed og kompatibilitet.
    pole_system_type:
      name: Type af stangsystem
      description: Beskriver konstruktionens støtte eller opsætningsstil, som teltet
        bruger (f.eks. aluminiumsstænger, oppustelige luftslanger, opsætning med trekkingstave).
    police_equipment_fitment:
      name: Politiudstyr
      description: Angiver hvilket politiudstyr køretøjet er konfigureret eller fortrådet
        til at understøtte.
    police_vehicle_equipment_package:
      name: Politibils-udstyrspakke
      description: Angiver det politispecifikke udstyr, der følger med køretøjet som
        solgt.
    police_vehicle_light_siren_equipment:
      name: Politibilslys-/sireneudstyr
      description: Angiver hvilke nødadvarselssystemer der er installeret på politibilen.
    police_vehicle_upfit_level:
      name: Politikøretøjets opgraderingsniveau
      description: Beskriver hvilket politispecifikt (opgraderings-)udstyr, der er
        installeret på lastbilen.
    polish_formulation:
      name: Poleringsformulering
      description: Angiver formuleringens base/kemi for gribebrættets polering (ikke
        påføringsmetoden).
    polish_purpose:
      name: Poleringsformål
      description: Primært tilsigtede resultat af poleringen på instrumentoverfladen.
    pollen_level:
      name: Pollenniveau
      description: Angiver mængden/sandsynligheden for pollenfarvning fra liljesorten.
    polymer_clay_firmness_level:
      name: Polymerlers fasthedsniveau
      description: Polymerlerets relative fasthed/blødhed før bagning (bearbejdelighed).
    polymer_clay_translucency:
      name: Polymerlers gennemskinnelighed
      description: Polymerlerets opacitet/transparens efter hærdning.
    pom_pom_handle_style:
      name: Håndtagsstil for pompon
      description: Beskriver stilen eller konstruktionen af det håndtag/greb, der
        bruges til at holde pomponen.
    pom_pom_trim_backing_tape_material:
      name: Pompons pyntunderlag/-bånds materiale
      description: Identificerer materialet i påsyet bånd eller tresse, som pomponen
        er fastgjort til (pyntens underlag).
    pom_pom_type:
      name: Pompontype
      description: Angiver tilstedeværelsen og den specifikke type af pompon eller
        kvast på hovedtøjet.
    pomegranate_product_form:
      name: Granatæbles produktform
      description: Beskriver den tilbudte fysiske form (hel frugt, aftagne frøkapper,
        kerner, frosne frøkapper).
    pomegranate_variety:
      name: Granatæblesort
      description: Identificerer den specifikke varietet eller sort af granatæblefrugten
        (f.eks. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Elastikstil
      description: Beskriver elastikkens specifikke konstruktion eller form, så kunder
        kan vælge deres foretrukne stil.
    popcorn_form:
      name: Form for popcorn
      description: Angiver popcornproduktets fysiske form eller tilberedningsform,
        såsom spiseklar, kerner, mikroovnpakke, kryddersæt eller gavedåse.
    pork_rind_form:
      name: Form for flæskesvær
      description: Kategoriserer den fysiske form eller stil af svinesværssnacks (f.eks.
        svær, puffet, kugler osv.).
    portability_features:
      name: Bærbarhedsfunktioner
      description: Viser indbyggede elementer, der hjælper med at flytte, bære eller
        opbevare liggestolen.
    portability_frame_type:
      name: Bærbarhed/stativtype
      description: Om orkesterklokkerne er bærbare/marchrammestil eller faste/koncertrammestil.
    portable_electronic_game_features:
      name: Funktioner for bærbare elektroniske spil
      description: Vigtige gameplay-/hardwarefunktioner understøttet af enheden.
    post_surgery_stage_suitability:
      name: Egnethed til efter operation
      description: Angiver hvilket restitutionsstadium (om noget) bodysuit'en er designet
        til, vigtigt for købere af medicinsk støttetøj.
    postage_stamp_format:
      name: Frimærkeformat
      description: Hvordan brugsfrimærket tilbydes/pakkes (enkelt, par, strimmel,
        blok, ark, hæfte, spole osv.).
    postmark_type:
      name: Poststempeltype
      description: Type af afstempling/poststempel på brugte brugsfrimærker.
    potato_cut_style:
      name: Kartoffeludskæringsstil
      description: Angiver den fysiske udskæring eller tilberedningsmetode for kartofler,
        når de ikke sælges hele.
    potato_intended_use:
      name: Tilsigtet kartoffelanvendelse
      description: Adskiller kartofler beregnet til øjeblikkelig forbrug fra kartofler
        beregnet som læggekartofler eller frosne forarbejdede produkter.
    potato_variety:
      name: Kartoffelsort
      description: Angiver kartoflens sort/varietet, så kunden kan finde specifikke
        typer såsom "Yukon Guld", "Maris Piper" eller "Purple Majesty".
    pottery_clay_firing_required:
      name: Keramikbrænding påkrævet
      description: Om materialet kræver ovnbrænding for at nå sin tilsigtede endelige
        hårdhed/finish.
    pottery_slip_application_method:
      name: Metode til påføring af begitning
      description: Angiver den tilsigtede anvendelsesteknik for begitningen.
    pottery_slip_compatible_clay_body:
      name: Leremne kompatibelt med begitning
      description: Angiver den/de leremnetyper, som begitningen er tiltænkt at matche
        eller arbejde med.
    pottery_slip_form:
      name: Form for begitning
      description: Angiver, om begitningen sælges som en brugsklar væske eller som
        en tør blanding/pulver, der kræver blanding.
    pouch_design:
      name: Taskedesign
      description: Detaljerede oplysninger om konstruktionen eller forbedringsfunktionerne
        i det forreste taskeområde.
    pouch_style:
      name: Taskestil
      description: Specificerer designet af det forreste taskeområde med fokus på
        komfort, støtte og æstetiske præferencer.
    powdered_beverage_variety:
      name: Variant af pulverdrik
      description: Klassificerer produktet efter den type drik, det tilbereder (f.eks.
        limonade, sportsdrik, proteinshake).
    power_rack_style:
      name: Power rack-stil
      description: Angiver overordnet rackdesign/konfiguration, hvilket hjælper kunden
        med at skelne mellem hele racks, half racks og pladsbesparende varianter.
    power_steering_fluid_formulation:
      name: Formulering af servostyringsvæske
      description: Væskens generelle formulering (ATF-baseret vs. dedikeret hydraulisk/CHF
        vs. universal), anvendt til filtrering af højt kompatibilitetniveau.
    practice_mute_audio_output:
      name: Lydudgang fra øvelsesdæmper
      description: Angiver den type lydudgangsforbindelse, der er tilgængelig på øvelsesdæmperen
        til overvågning og/eller optagelse (almindeligt for lydløse/elektroniske øvelsesdæmpere).
    practice_mute_intonation_impact:
      name: Øvelsesdæmpers intoneringspåvirkning
      description: Beskriver den forventede tunings-/intoneringseffekt, når øvelsesdæmperen
        bruges.
    practice_mute_venting_valve_type:
      name: Øvelsesdæmpers ventilerings-/ventiltype
      description: Angiver hvorvidt og hvordan øvelsesdæmperen er ventileret eller
        inkluderer en justerbar ventil til at ændre modstand/lydstyrke.
    practice_pad_features:
      name: Funktioner for øvepad
      description: Fremhæver øvepudens funktionelle egenskaber ud over størrelse/materiale.
    practice_pad_mounting_style:
      name: Monteringsstil for øvepude
      description: Angiver, hvordan øvepuden er beregnet til at blive placeret eller
        fastgjort under brug.
    practice_pad_rebound_level:
      name: Stødelasticitet for øvepude
      description: Angiver den relative øvepudens relative stødelasticitet/respns
        sammenlignet med typiske trommeskind.
    practice_pad_surface_configuration:
      name: Konfiguration af øvepudens overflade
      description: Beskriver om øvepuden har en eller flere spilleflader, og om de
        giver forskellig følelse.
    pregnancy_stage_suitability:
      name: Egnethed for graviditetsstadie
      description: Angiver hvilke(n) graviditets- eller efterfødselsfase(r), tøjet
        er designet til.
    preparation_state:
      name: Forberedelsestilstand
      description: Angiver det påkrævede forberedelses- eller tilberedningsniveau
        før forbrug.
    preparation_style:
      name: Tilberedningsform
      description: Definerer vandkastanjernes udskærings- eller forarbejdningstilstand
        ved salg (f.eks. hele, skåret i skiver, ristede, frosne).
    preservation_medium:
      name: Konserveringsmedie
      description: Angiver primære væske eller primære medie, hvori oliven eller kapers
        er konserveret (f.eks. saltlage, olivenolie, eddike).
    presser_foot_attachment_method:
      name: Metode til fastgørelse af trykfod
      description: Angiver, hvordan symaskinens trykfod fastgøres til trykfodsholderen/-skaftet
        (f.eks. kliklås vs. skruelås), hvilket påvirker kompatibiliteten.
    pressure_gauge_type:
      name: Trykmålertype
      description: Angiver hvilken type trykmåler der følger med cykelpumpen, om nogen.
    pressure_measurement_unit:
      name: Trykmåleenhed
      description: Angiver den enhed, der bruges til tryksensorens udlæsning eller
        kalibrering. Nyttig til at sammenligne produkter og sikre kompatibilitet måler/ECU.
    pressure_plate_balance_type:
      name: Type trykpladebalance
      description: Angiver om trykpladen er internt balanceret eller kræver/antager
        ekstern balance, der matcher motor/svinghjulsopsætning.
    pressure_plate_components_included:
      name: Medfølgende trykpladekomponenter
      description: Hvad er inkluderet i trykpladens fortegnelse.
    pressure_sensor_application:
      name: Tryksensoranvendelse
      description: Identificerer det køretøjssystem/målepunkt, som tryksensoren er
        designet til.
    pressure_sensor_port_thread_standard:
      name: Tryksensorport / gevindstandard
      description: Angiver den mekaniske port-/gevindstandard, der bruges til at installere
        sensoren i køretøjets system.
    pressurization_method:
      name: Tryksætningsmetode
      description: Identificerer, hvordan tryk genereres eller opretholdes inde i
        enheden.
    pretend_housekeeping_set_items_included:
      name: Medfølgende dele i husholdningslegetøjssæt
      description: Angiver hvilket rengøringstilbehør der er inkluderet i sættet (f.eks.
        moppe, kost, fejebakke, sprayflaske).
    pretend_play_electronic_features:
      name: Elektroniske legefunktioner
      description: Elektroniske/interaktive funktioner inkluderet i legetøjsproduktet.
    pretend_play_set_pieces_included:
      name: Medfølgende dele i legesæt
      description: Vigtige rekvisitter/komponenter inkluderet i legesættet (f.eks.
        kasseapparat, legemad, værktøj).
    pretend_play_set_theme:
      name: Tema for legesæt
      description: Primært legescenarie/tema, produktet repræsenterer (nyttigt til
        tværgående opdagelse på tværs af alle legebørn).
    pretzel_coating:
      name: Kringlebelægning
      description: Identificerer eventuelle ydre krydderier eller belægninger, der
        er påført kringlen, og dækker både salte/krydrede og søde (chokolade, yoghurt,
        karamel) valgmuligheder.
    pretzel_shape:
      name: Kringleform
      description: Angiver kringlens fysiske form (f.eks. vrider, stang, bid), en
        vigtig faktor, som kunder bruger ved søgning eller filtrering.
    primary_component_material:
      name: Primært komponentmateriale
      description: Primært materiale i motorblokken.
    primary_dish_application:
      name: Primær anvendelse til ret
      description: Identificerer den hovedret eller tilberedning, som dejen er beregnet
        til.
    primary_plant_base:
      name: Primær plantebase
      description: Angiver den/de primære mælkefri ingrediens(er), der anvendes til
        at fremstille ostealternativet.
    primary_plant_protein_source:
      name: Primær planteproteinkilde
      description: Identificerer den primære planteingrediens, der leverer produktets
        protein.
    primary_sweetener_source:
      name: Primær sødekilde
      description: Identificerer den plante eller det råmateriale, siruppen er udvundet
        af.
    print_placement:
      name: Placering af print
      description: Angiver, hvor hovedgrafikken/logo er placeret på t-shirten.
    print_technique:
      name: Printteknik
      description: Angiver den anvendte dekorations-/printmetode på t-shirtens grafik.
    printable_canvas_intended_use:
      name: Tilsigtet brug af printbart lærred
      description: Primær anvendelse, som det printbare lærred er optimeret til.
    printable_fabric_format:
      name: Printbart stofformat
      description: Angiver, hvordan den printbare bomuld leveres (enkeltark vs. kontinuerlig
        rulle), hvilket påvirker printerens fremføring og projektets workflow.
    prism_material:
      name: Prismemateriale
      description: Angiver materialet i selve det optiske element (prismen), som påvirker
        klarhed, holdbarhed og ridsebestandighed.
    prisoner_transport_configuration:
      name: Konfiguration af fangetransport
      description: Angiver, hvorvidt og hvordan varevognen er konfigureret til transport
        af varetægtsfængslede/fanger.
    prisoner_transport_partition_type:
      name: Type af skillevæg til fangetransport
      description: Type indvendig skillevæg/bur, der adskiller forreste og bageste
        rum.
    privacy_or_acoustic_feature:
      name: Privatlivs- eller akustisk funktion
      description: Angiver indbyggede elementer til privatliv eller akustiske elementer
        såsom skillepaneler, akustiske skærme eller komplette indkapslinger.
    processing_state:
      name: Forarbejdningstilstand
      description: Om fjerene er steriliserede/vaskede eller på anden måde forberedt
        til krea.
    produce_grade:
      name: Produktkvalitet
      description: Klassificerer den kvalitetsklasse, der tildeles kiwifrugten, baseret
        på størrelse, udseende og tilstand.
    produce_growth_stage:
      name: Afgrødes vækstfase
      description: Angiver den vækstfas, afgrøden sælges i (f.eks. mikrogrønt, babyblad,
        modent blad, levende plante, frø).
    produce_washing_state:
      name: Afgrødes vasketilstand
      description: Angiver om grøntsagerne er vasket og klar til at spise.
    profile_shape:
      name: Profil/form
      description: Bækkenets overordnede krumning/profil (hvor stejlt den stiger fra
        kant til klokke).
    projectile_ammunition_type:
      name: Projektil-/ammunitionstype
      description: Angiver typen af projektiler eller forbrugsvarer, der om relevant
        anvendes af legetøjsvåbnet.
    projectile_finish:
      name: Projektilfinish
      description: Angiver enhver overfladebelægning, der påføres BB'en, for at forbedre
        korrosionsbestandigheden eller synligheden (f.eks. kobber, zink, maling).
    projectile_type:
      name: Projektiltype
      description: Identificerer den type projektil, som produktet bruger eller er
        beregnet til.
    pronation_support:
      name: Pronationsstøtte
      description: Angiver den type gang- eller pronationsmønster, som skoen er designet
        til.
    propellant_type:
      name: Drivmiddeltype
      description: Angiver det drivmiddel, som delen eller tilbehøret er designet
        til at bruge.
    propeller_blade_cup:
      name: Propelblads opbukning
      description: Angiver mængden af opbukning (bagkants krumning) på bladene.
    propeller_hub_type:
      name: Propelnavtype
      description: Angiver det nav-/bøsningssystem, der anvendes af propellen (udskifteligt
        navsæt vs. indpresset).
    propeller_rotation:
      name: Propelrotation
      description: Angiver rotationsretningen for en propel.
    protectant_formula_base:
      name: Beskyttende formuleringsbase
      description: Angiver beskyttelsesmidlets basisformulering, som påvirker glans,
        fornemmelse og rengøringsevne (f.eks. vandbaseret vs. opløsningsmiddelbaseret).
    protection_coverage_area:
      name: Beskyttelsesdækningsområde
      description: Identificerer hvilke dele af uret det beskyttende tilbehør dækker.
    protection_level:
      name: Beskyttelsesniveau
      description: Angiver æskens tilsigtede beskyttelsesniveau for transport og opbevaring
        af instrumentet.
    protective_case_interior_protection_type:
      name: Beskyttende æskes indvendige beskyttelsestype
      description: Beskriver den primære indvendige beskyttelsesmetode, der bruges
        til at sikre og polstre Indholdet.
    protective_case_shell_type:
      name: Beskyttende æskes ydre
      description: Identificerer æskens overordnede konstruktionsstil (stivhed) udvendigt,
        der påvirker klembeskyttelse og bærbarhed.
    protective_contact_padding_material:
      name: Beskyttende kontakt-polstringsmateriale
      description: Materiale brugt på instrumentets kontaktpunkter (åg/klokkeindsats)
        for at forhindre ridser (f.eks. filt, gummi).
    protective_cup_configuration:
      name: Konfiguration af skridtbeskytter
      description: Angiver, om en skridtbeskytter er inkluderet, aftagelig, eller
        om beklædningsgenstanden kun har en lomme til at indeholde en skridtbeskytter.
    protective_eyewear_standard_compliance:
      name: Overholdelse af standarder for beskyttelsesbriller
      description: Angiver de standarder eller certificering for sikkerhed eller påvirkningsresistans,
        som brillerne opfylder eller overopfylder ved sportsbrug.
    protective_gear_certification_standard:
      name: Certificeringsstandard for beskyttelsesudstyr
      description: 'Angiver den sikkerheds-/certificeringsstandard, som udstyret overholder
        (varierer efter varetype: hjelmstandarder, dragtstandarder, stødbeskyttelsesstandarder).'
    protective_gear_items_included:
      name: Medfølgende beskyttelsesudstyr
      description: Viser en liste over enkeltdele i et beskyttelsesudstyrssæt med
        flere dele.
    protective_gear_padding_type:
      name: Beskyttelsesudstyrs polstringstype
      description: Angiver den type polstring, der anvendes i beskyttelsesudstyr til
        stødbeskyttelse.
    protective_gear_safety_certifications:
      name: Sikkerhedscertificeringer for beskyttelsesudstyr
      description: Anfører anerkendte sportsspecifikke sikkerheds- eller ydeevnestandarder,
        som produktet opfylder, såsom NOCSAE- eller ASTM-standarder for hockeyhjelme.
    protective_pad_components_included:
      name: Medfølgende beskyttende pudekomponenter
      description: Angiver hvilke specifikke beskyttelsesartikler der er inkluderet
        i et sæt med flere dele, så kunderne ved præcis, hvilke kropsdele der er dækket.
    protective_shorts_intended_use:
      name: Tilsigtet anvendelse af beskyttelsesshorts
      description: Den primære ridnings-/væddeløbsdisciplin, som beskyttelsesshortsene
        er designet til.
    protective_shorts_padding_type:
      name: Polstringstype for beskyttelsesshorts
      description: Angiver de beskyttende elementers konstruktion/format, der anvendes
        i shortsene.
    protective_shorts_padding_zones:
      name: Polstringszoner i beskyttelsesshorts
      description: Identificerer hvilke kropsområder der har integreret polstring/beskyttelse
        i beskyttelsesshortsene.
    protective_treatment:
      name: Beskyttende behandling
      description: Angiver enhver beskyttende finish eller behandling, der anvendes
        til plet-, vand- eller UV-resistens (f.eks. Teflon).
    protector_coverage_area:
      name: Dækningsområde for beskytter
      description: Angiver hvilke(t) torsoområde(r) beskytteren er designet til at
        dække (f.eks. bryst, ryg, sider).
    puck_bottom_style:
      name: Puckbunds stil
      description: Beskriver puckens undersideprofil, som påvirker hastighed og kontrol
        på forskellige shuffleboard-underflader.
    puck_type:
      name: Pucktype
      description: Klassificerer den funktionelle stil eller tilsigtede anvendelse
        af hockeypucken, fra officielt spil til samlerobjekter som souvenirs.
    pull_buoy_style:
      name: Benflyderstil
      description: Angiver benflyderens funktionelle stil eller konfiguration, såsom
        standard, ankel eller kombi med svømmeplade.
    pull_through_weight_material:
      name: Trækvægtmateriale
      description: For trækrenseswabs identificerer dette materialet i den vægt, der
        bruges til at føre podepinden gennem instrumentet.
    pulp_content:
      name: Frugtkødsindhold
      description: Angiver mængden af frugt- eller grøntsagskød i drikkevaren.
    pump_accessories_included:
      name: Medfølgende pumpetilbehør
      description: Lister yderligere varer, der leveres kuglepumpen, så kunden kan
        forstå sampak-indholdet.
    pumping_compatibility:
      name: Pumpekompatibilitet
      description: Angiver om amme-bh'en er designet til håndfri pumpning samt amning.
    punch_pad_type:
      name: Type slagpude
      description: Angiver designet eller stilen på en slag-/træningspude, så kunden
        kan vælge den rigtige til sit træningsbehov.
    punching_training_bag_shape:
      name: Bokse-/træningsboldform
      description: Angiver den geometriske stil på den tunge bold, det hjælper kunden
        med at vælge modeller, der er egnede til bestemte slåøvelser (f.eks. uppercuts,
        body shots).
    puncture_protection_technology:
      name: Teknologi til punkteringsbeskyttelse
      description: Angiver eventuelle navnebeskyttede eller generiske antipunkteringslag
        eller forstærkningsteknologier til sidevæg/karkasse, der er indbygget i dækket
        (f.eks. EXO, SnakeSkin, Kevlarforstærkning).
    puppet_features:
      name: Dukkefunktioner
      description: Fremhæver funktionelle eller ydelsesmæssige funktioner ved dukken
        (f.eks. bevægelig mund, lydeffekter, vendbar).
    puppet_puppet_theater_accessory_type:
      name: Tilbehørstype til dukker og dukketeater
      description: Angiver, hvilken type tilbehør produktet er (f.eks. rekvisit, dukkekostume,
        styrestang, reservesnor).
    purity_unit:
      name: Renhedsenhed
      description: Hvordan møntens renhed udtrykkes (finhed vs. karat).
    push_up_bar_design:
      name: Udformning af push-up-bars
      description: Angiver den funktionelle designstil for push-up-bars (f.eks. faste,
        roterende, parallelbarer).
    pushrod_end_type:
      name: Type stødstangsende
      description: Angiver typen af stødstangsenden/beslaget, der bruges på pedal-
        eller hovedcylinder-kontaktfladen.
    putty_glow_activation_method:
      name: Metode til aktivering af selvlysende putty
      description: Hvordan putty'en oplades/aktiveres til at lyse (f.eks. sollys,
        UV/usynligt lys).
    putty_glow_color:
      name: Selvlysende puttys farve
      description: Identificerer den farve, putty'en afgiver, når det lyser i mørke.
    putty_inclusions:
      name: Inkluderet i putty
      description: Nævneværdige ingredienser i putty'en (f.eks. glimmer, konfetti,
        skumperler).
    putty_texture:
      name: Puttytekstur
      description: Putty'ens primære håndteringsegenskab (f.eks. elastisk, strækbar,
        væskeagtig).
    puzzle_accessory_features:
      name: Funktioner for puslespilstilbehør
      description: Funktionelle egenskaber og designelementer i puslespilstilbehør
        (varierer efter tilbehørstype).
    pyrometric_cone_range:
      name: Seeger-kegleområde
      description: De(n) anbefalede Seeger- kegle(r), som glasuren er formuleret til
        at brændes til (f.eks. kegle 06-04, kegle 5-6).
    quarter_panel_coverage_type:
      name: Dækningstype for kvartpanel
      description: Angiver, hvor meget af kvartpanelarealet produktet erstatter/reparerer.
    quarter_panel_set_contents:
      name: Kvartpanelsæts indhold
      description: Angiver den kvartalpanelkonfiguration, der er inkluderet i fortegnelsen
        (enkeltsidet, parret eller med yderligere reparationssektioner).
    quilting_ruler_markings:
      name: Quiltelineal-markeringer
      description: Angiver de typer trykte markeringer på quiltelinealen, der bruges
        til klipning/justering.
    quilting_ruler_non_slip_feature:
      name: Quiltelineals skridsikre funktion
      description: Angiver, om linealen har en skridsikker bagside/overfladebehandling
        for at reducere forskydning på stoffet.
    quilting_ruler_transparency:
      name: Quiltelineals gennemsigtighed
      description: Angiver linealmaterialets gennemsigtighed/synlighed for at se stof
        og markeringer nedenunder.
    quilting_thread_usage:
      name: Brug af quiltetråd
      description: Angiver trådens tilsigtede quilteanvendelse (hvordan den er beregnet
        til at blive brugt).
    quilting_thread_weight_system:
      name: Quiltetrådvægtsystem
      description: Angiver trådstørrelse/vægtklassificeringssystem, der bruges til
        at udtrykke trådtykkelse (f.eks. wt, Tex, Denier), så tallet kan fortolkes
        korrekt.
    quince_variety:
      name: Kvædevariant
      description: Identificerer kvædens specifikke varietet eller sort, da smag,
        aroma og kulinarisk egnethed kan variere fra sort til sort.
    quinoa_variety:
      name: Quinoa-sort
      description: Identificerer quinoaens specifikke farve eller sort, da forskellige
        sorter har forskellig smag, tekstur og tilberedningstid.
    quinto_tuning_system:
      name: Stemmesystem for quinto
      description: Hvordan quintoen er stemt/spændt.
    race_car_class:
      name: Racerbilklasse
      description: Konkurrenceklasse/kategori, som bilen er bygget til (regelsæt/homologeringsgruppe).
    racing_balaclava_face_opening_style:
      name: Ansigtsåbningsstil for kørehætte
      description: Kørehættens ansigtsåbningskonfiguration, hvilket påvirker hjelmens
        pasform, tætning og komfort.
    racing_balaclava_neck_coverage_length:
      name: Længde på kørehættes halsdækning
      description: Dækningslængden af den halskrave/afdækning, der er designet til
        at blive presset ind i dragten/nakkerestraint for at forsegle og beskytte.
    racing_balaclava_ventilation_zones:
      name: Ventilationszoner til racerbalaklava
      description: Udpegede åndbare/mesh- eller ventilerede zoner for at forbedre
        luftstrømning under hjelmen.
    racing_chest_guard_intended_use:
      name: Tilsigtet anvendelse af brystbeskytter til racerløb
      description: Primær motorsportsdisciplin eller kontekst, som brystbeskytteren
        er designet til.
    racing_chest_guard_size_type:
      name: Størrelsestype for brystbeskytter til racerløb
      description: Angiver, om produktets størrelse er til unge, voksne eller er universel/justerbar.
    racing_glove_certification_standard:
      name: Certificeringsstandard for racerhandske
      description: Angiver den sikkerhedscertificering/standard, som racerhandskerne
        overholder (f.eks. FIA, SFI, CE) og eventuelt klassificering/niveau, hvor
        det er relevant.
    racing_goggles_lens_system:
      name: Racerbrille-linsesystem
      description: Angiver det system til linseudskiftning/afrivning, der understøttes
        af brillerne.
    racing_helmet_certification_standard:
      name: Certificeringsstandard for racerhjelm
      description: Den/de sikkerhedscertificering(er), som racerhjelmen opfylder.
    racing_kart_brake_type:
      name: Bremsetype til racerkart
      description: Primær bremsesystemtype monteret på karten.
    racing_kart_class:
      name: Racerkartklasse
      description: Konkurrenceklasse eller regelsæt, som karten er bygget til at overholde.
    racing_kart_frame_material:
      name: Racerkarts chassismateriale
      description: Primært chassismateriale til karten.
    racing_kart_seat_size:
      name: Størrelse på racerkartsæde
      description: Kartsædestørrelsesbetegnelse brugt til montering.
    racing_neck_support_style:
      name: Stil for nakkestøtter til racerløb
      description: Racernakkestøtten/-bøjlens stil, og hvordan den interagerer med
        førerens torso/hjelm.
    racing_suit_certification_standard:
      name: Certificeringsstandard for racerdragt
      description: Angiver den sikkerhedscertificering/homologering for racerløb,
        som dragten opfylder (f.eks. FIA- eller SFI-standarder).
    racing_suit_cuff_design:
      name: Design for racerdragtmanchet
      description: Type ankel-/håndledsmanchet, der tilsluttes handsker/støvler og
        forbedrer forsegling/komfort.
    racing_suit_size_system:
      name: Størrelsessystem for racerdragt
      description: Dragtens størrelsessystem (f.eks. Alpha S-XXL, Numeric EU/US, Youth).
    racing_truck_discipline:
      name: Disciplin for racing-lastbil
      description: Angiver den primære racerdisciplin/format, som lastbilen er bygget
        til at konkurrere i.
    rack_side_configuration:
      name: Sidekonfiguration for stativ
      description: Angiver om stativet opbevarer måtter på den ene side eller begge
        sider, hvilket påvirker pladseffektivitet og tilgængelighed.
    rack_system_configuration:
      name: Racksystemkonfiguration
      description: Beskriver det overordnede layout/Shapes på trommestativsystemet.
    racket_dampener_type:
      name: Ketsjerdæmpertype
      description: Angiver installationsmekanismen eller den funktionelle stil for
        ketsjerens vibrationsdæmper.
    racket_grip_size:
      name: Ketsjergrebets størrelse
      description: Angiver den omkredsbaserede størrelsesklassificering af ketsjerhåndtaget
        (f.eks. G1 – G6) for at sikre korrekt pasform og komfort i hånden.
    racket_sport_shoe_court_surface:
      name: Ketsjersportssko, baneoverflade
      description: Angiver den tennisbaneoverflade, som skoen er designet eller optimeret
        til, hvilket hjælper spillere med at vælge fodtøj med det rigtige ydersålsmønster
        og gummiblanding til deres typiske spilleoverflade.
    racket_string_pattern:
      name: Strengemønster for ketsjer
      description: Angiver antallet af hoved- og tværstrenge i strengplanet (f.eks.
        16 x 18), som påvirker kontrol, spin og holdbarhed.
    racket_stringing_status:
      name: Status for ketsjeropstrengning
      description: Angiver om ketsjeren sælges strenget, ustrenget eller forstrenget.
    racket_weight_class:
      name: Ketjserens vægtklasse
      description: Indeholder standardvægtkategorierne "U" til badminton, så spillerne
        kan vælge ketsjere inden for deres foretrukne vægtinterval.
    racquet_toy_set_equipment_included:
      name: Ketsjerlegetøjssæt medfølger
      description: Angiver, hvilke varer der er inkluderet i legetøjet eller sættet
        (f.eks. net, bolde, padler/ketsjere).
    racquetball_squash_training_aid_type:
      name: Type af træningshjælp til racquetball og squash
      description: Klassificerer den specifikke type træningshjælpemiddel eller tilbehør,
        så kunderne hurtigt kan finde den vare, de har brug for.
    radiator_cap_gasket_material:
      name: Pakningsmateriale til kølerdæksel
      description: Materiale i den/de pakning(er), der anvendes på kølerdækslet.
    radiator_cap_pressure_relief_style:
      name: Kølerdæksels trykaflastningstype
      description: Angiver kølerdækslets trykaflastnings-/udluftnings-/aktueringsstil,
        hvilket kan påvirke håndtering, sikkerhed og tilsigtet anvendelse.
    radiator_expansion_tank_cap_application:
      name: Anvendelse af køler-/ekspansionsbeholderdæksel
      description: Identificerer, om dækslet er beregnet til en kølerpåfyldningshals
        eller til en kølevæskeekspansions-/overløbstank.
    radiator_fan_control_type:
      name: Kølerventilatorstyringstype
      description: Angiver hvordan radiatorventilatoren styres/udløser.
    radiator_fan_mounting_pattern:
      name: Monteringsmønster for radiatorventilator
      description: Angiver den monteringsstil/det mønster, der bruges til at fastgøre
        ventilatoren eller ventilatorenheden.
    radiator_fan_type:
      name: Kølerventilatortype
      description: Angiver kølerventilatorenhedens funktionstype/konfiguration.
    radiator_hose_end_type:
      name: Kølerslange-endetype
      description: Angiver den primære forbindelse/tætningstype, der anvendes på kølerslangens
        ende(r) til kontaktflade med radiator-/motorporte.
    radiator_hose_position:
      name: Kølerslanges position
      description: Kølerslanges funktionelle placering/type i kølesystemet.
    radiator_hose_shape:
      name: Kølerslanges form
      description: Overordnet slangegeometri/formfaktor anvendt til installationsføring
        og montering.
    radiator_overflow_tank_level_sensor_provision:
      name: Mulighed for niveauføler for radiatoroverløbstank
      description: Angiver, om tanken inkluderer eller understøtter en kølevæskeniveausensor.
    radiator_overflow_tank_shape:
      name: Form på overløbsbeholder til køler
      description: Overordnet formfaktor for overløbstankens hus.
    radish_variety:
      name: Radisesort
      description: Angiver radises varietet eller type, så kunden kan vælge specifik
        smag, farve eller størrelseskarakteristika (f.eks. daikon, Watermelon, French
        Breakfast).
    radius_of_hollow:
      name: Radius af hulrum
      description: Angiver bladets hulprofil produceret af sliberen, udtrykt som almindelig
        adskilt størrelse eller flad.
    rail_coverage_configuration:
      name: Konfiguration af skinnedækning
      description: Angiver hvilken(e) del(e) af krybben betrækket beskytter, det tydeliggør,
        om der købes et enkelt frontpanel eller et dækkende sæt med flere dele.
    rail_mount_standard:
      name: Standard for skinnemontering
      description: Identificerer den skinne- eller monteringsstandard, der bruges
        til at fastgøre et tilbehør (f.eks. sigte, lommelygte) til en luftpistol.
    rail_side:
      name: Skinneside
      description: Angiver, om reserveskinnen er til venstre side, højre side eller
        sælges i par.
    rail_style:
      name: Skinnestil
      description: Kategoriserer det overordnede design eller konfiguration af skinnen
        (f.eks. A-frame, regnbuefarvet, buet), hvilket bestemmer trick-muligheder
        og påkrævet plads.
    rail_system:
      name: Skinnesystem
      description: Identificerer det monteringspunkt til tilbehør, der findes på pistolen
        (f.eks. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Regnsensorteknologi
      description: Det sensorprincip, der bruges til at detektere vand på forruden.
    rain_suit_configuration:
      name: Regntøjskonfiguration
      description: Identificerer, om produktet er en heldragt i ét stykke, et sæt
        med flere dele eller en anden konfiguration.
    rainstick_construction_type:
      name: Regnmagers konstruktionstype
      description: Beskriver, hvordan regnmageren er konstrueret (traditionelt kaktus-/trærør
        vs. moderne alternativer).
    rainstick_fill_material:
      name: Fyldmateriale i regnmager
      description: Angiver det fyld, der bruges til at oprette brusende lyde (f.eks.
        frø, perler).
    rainstick_playing_technique:
      name: Teknik til at spille på regnmager
      description: Angiver den/de anbefalede spilleteknik(ker) eller håndteringsstil,
        der bruges til at producere den tilsigtede effekt på en regnmager.
    rainstick_sound_character:
      name: Regnmagers lydegenskaber
      description: Beskriver de overordnede lydegenskaber, der frembringes af regnmageren.
    raising_method:
      name: Opdrætsmetode
      description: Beskriver, hvordan dyrene blev opdrættet og slutfodret før forarbejdning
        (f.eks. græsfodret, græsopdrættet, slutfodret med korn).
    rally_competition_class:
      name: Rallykonkurrenceklasse
      description: Sanktionsorgan eller regelsætklasse, som rallybilen er bygget til
        (hvis det vides).
    rally_surface_setup:
      name: Opsætning af rallybane
      description: Primær overflade/terræn, rallybilens udformning eller opbygning
        er rettet mod.
    ramp_surface_texture:
      name: Overfladetekstur på rampe
      description: Beskriver finishen eller grebsniveauet på rampens køreflade.
    ratchet_mounting_style:
      name: Monteringsstil for skralde
      description: Hvordan den musikalske skralde holdes eller monteres under afspilning
        eller opsætning.
    rattle_element_material:
      name: Materiale i rasleelementer
      description: Materialet i de raslende elementer (f.eks. tænder/rasleskiver/perler),
        der frembringer den karakteristiske summen/raslen.
    rattle_type:
      name: Rangletype
      description: Angiver om lokkemidlet indeholder en intern rangle eller et lydkammer,
        og i så fald hvilken type rangle der anvendes.
    rc_airship_lifting_gas_type:
      name: Gastype, der bærer RC-luftskib
      description: Angiver hvilken gas luftskibet/ballonens yderkappe er beregnet
        til at blive fyldt med (hvis relevant).
    rc_helicopter_control_frequency:
      name: RC-helikopters kontrolfrekvens
      description: Radiofrekvensbåndet, der anvendes mellem styreenhed og helikopteren,
        påvirker interferensmodstand og kompatibilitet (f.eks. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Stabiliseringsfunktioner for RC-helikopter
      description: Viser en liste over stabilitets-/kontrolfunktioner, der gør flyvningen
        lettere eller tilføjer funktionalitet.
    rc_motorcycle_controller_type:
      name: Controllertype til RC-motorcykel
      description: Formfaktor for den medfølgende styreenhed.
    rc_plane_takeoff_launch_method:
      name: Metode til start af RC-fly
      description: Hvordan flyet typisk starter, det påvirker, hvor og hvordan det
        kan bruges.
    rc_vehicle_controller_type:
      name: RC-køretøjs styreenhedstype
      description: Angiver den formfaktor for styreenheden, der bruges til at betjene
        RC-køretøjet.
    rc_vehicle_scale:
      name: Skala for RC-køretøj
      description: Angiver skalaforholdet (størrelsesklasse) for den fjernstyrede
        bil/lastbil (f.eks. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: RC-køretøjs terræntype
      description: Angiver det primære terræn, som den fjernstyrede bil/lastbil er
        designet til.
    reach_adjustment_type:
      name: Rækkeviddejusteringstype
      description: Angiver, om afstanden mellem bremsegrebet og styret kan justeres,
        og hvis det er justerbart, om justeringen er værktøjsfri eller kræver værktøj.
    rear_axle_spacing:
      name: Bagakselafstand
      description: Gaffelende/akselstørrelse som bagenden af Frame er designet til
        at acceptere, hvilket påvirker hjulkompatibiliteten.
    rear_axle_standard:
      name: Bagakselstandard
      description: Definerer det akselkontaktpunkt/format, der bruges af baghjulet
        (f.eks. quick release, forskellige gennemgående akselstørrelser).
    rear_axle_type:
      name: Bagakseltype
      description: Angiver fastgørelsessystemet og akseldiameteren, der bruges til
        at fastgøre baghjulet til stellet.
    rear_coverage:
      name: Bagdækning
      description: Angiver, hvor meget af balderne bikinitrussen dækker (f.eks. fræk,
        fuld).
    rear_opening_type:
      name: Bagåbningstype
      description: Beskriver stilen på bagåbning eller bagklap til praktisk brug på
        badeværelset, såsom "drop seat" eller fuld lynlås bagpå.
    rear_seat_configuration:
      name: Bagsædekonfiguration
      description: Angiver konfigurationen af bagsædeenheden til at understøtte valg
        af montering og layout.
    rear_view_mirror_ornament_attachment_type:
      name: Fastgørelsestype for bakspejlspynt
      description: Angiver, hvordan ornamentet fastgøres til bakspejlets stilk eller
        hus (f.eks. snorløkke, klips, krog).
    rearview_mirror_mount_attachment_type:
      name: Fastgørelsestype for bakspejlsbeslag
      description: Definerer, hvordan beslaget fysisk fastgøres til bakspejlsenheden
        (spejlhus eller stilk), f.eks. som klemme, klips, rem, klæbepude eller boltet
        beslag.
    rebound_board_face_type:
      name: Pladens overflades tilbagestødstype
      description: Beskriver den overfladekonfiguration, der bestemmer tilbagestød,
        såsom flade, vinklede eller flerfladede designs.
    rebound_level:
      name: Tilbagestødsniveau
      description: Angiver, hvor meget vægkuglen hopper tilbage efter slag, hvilket
        hjælper brugerne med at vælge mellem designs uden og med moderat tilbagestød.
    rebound_surface_configuration:
      name: Konfiguration af strengfladens respons
      description: Angiver udformning af tilbagespringsflader og forudsigeligheden
        af tilbagespring (enkelt-, dobbelt- eller flersidet; forudsigelig vs. uforudsigelig).
    rebounder_design:
      name: Rebounderdesign
      description: Definerer produktets strukturelle stil eller konfiguration af tilbagespringsfladen.
    rebounder_design_type:
      name: Type tilbagespringsdesign
      description: Angiver trænerens tilbagespringsmekanisme eller konstruktionsstil
        (f.eks. elastisk snorebasis, net, pop op-mål).
    rebounder_sides:
      name: Rebounders sider
      description: Angiver om rebounderen kan returnere bolde fra den ene side eller
        begge.
    rebounding_mechanism_type:
      name: Type af reboundmekanisme
      description: Angiver den teknologi, der bruges til at returnere pucken eller
        bolden (f.eks. gummistøder, elastiksnor).
    recipient_relationship:
      name: Modtagerforhold
      description: Tiltænkt modtagerrelation (f.eks. mor, far, ven) for lykønskningskortet.
    recliner_control_type:
      name: Betjeningstype for lænestol
      description: Angiver, hvordan tilbagelænsmekanismen betjenes (f.eks. manuelt
        greb, elektrisk knappanel, fjernbetjening).
    recliner_motion_type:
      name: Bevægelsestype for hvilestol
      description: Definerer lænestolens primære bevægelsesfunktionalitet (f.eks.
        vippe, glide, dreje, pladsbesparende, løft).
    reclining_mechanism:
      name: Tilbagelænsmekanisme
      description: Angiver den mekanisme, der bruges til at betjene sofaens tilbagelænsfunktion.
    recommended_candle_format:
      name: Anbefalet stearinlysformat
      description: Angiver det/de anbefalede lysformat(er), som disse selvklæbende
        vægefødder er beregnet til.
    recommended_container_type:
      name: Anbefalet beholdertype
      description: Beholdermaterialer, der anbefales/er sikre til gelvokslys.
    recommended_fabric_type:
      name: Anbefalet stoftype
      description: Anbefalede stoffer til bedste resultater med symønsteret.
    recommended_fabric_weight:
      name: Anbefalet stofvægt
      description: Angiver den anbefalede stofvægtkategori for mønsteret.
    recommended_food_pairing:
      name: Anbefalet madparring
      description: Identificerer de primære proteiner eller retter, som saucen er
        beregnet til (f.eks. kylling, svinekød, oksekød, fisk, grøntsager).
    recommended_lane_condition:
      name: Anbefalet banestand
      description: Angiver det oliemønster eller den banestand, som kuglen er designet
        til.
    recommended_motor_impulse_class:
      name: Anbefalet motorisk impulsklasse
      description: Angiver den anbefalede modelraketmotors total impulsklasse med
        henblik på sikker/optimal flyvning.
    recommended_reading_level:
      name: Anbefalet læseniveau
      description: Angiver anbefalet læsetrin/-evne for produktet for at hjælpe kunden
        med at matche det med et barns aktuelle læseudvikling.
    recommended_sleep_position:
      name: Anbefalet sovestilling
      description: Identificerer, hvilke sovestillinger madrassen er designet til
        at support komfortabelt (f.eks. side- eller rygsovere).
    recommended_storage:
      name: Anbefalet opbevaring
      description: Angiver, hvordan produktet skal opbevares for at bevare friskheden.
    recommended_surfaces:
      name: Anbefalede overflader
      description: Angiver de tiltænkte limningsflader/materialekategorier for limen,
        ud over krea generelt (f.eks. kun apir vs. flere overflader).
    recommended_use_case:
      name: Anbefalet anvendelse
      description: Primært tilsigtet anvendelsesscenarie for forsegleren (midlertidigt/nødreparation
        vs. længerevarende reparation).
    recommended_use_location:
      name: Anbefalet brugssted
      description: Tiltænkt miljø for vippen (baghave vs. kommerciel legeplads osv.).
    recommended_vehicle_surfaces:
      name: Anbefalede køretøjsoverflader
      description: Angiver de køretøjsoverflader/-finisher, som penslen er tiltænkt
        at være sikker til (f.eks. gennemsigtig lak, mat/satin lak, vinylfolie/PPF,
        glas, fælge).
    recorder_accessories_included:
      name: Medfølgende tilbehør til blokfløjte
      description: Viser en liste over det medfølgende tilbehør, der følger med den
        store basblokfløjte.
    recorder_bore_design:
      name: Blokfløjtes udboringsdesign
      description: Profildesignet for den indvendige udboring i blokfløjtens midterdel.
    recorder_bore_type:
      name: Boringstype for blokfløjte
      description: Angiver blokfløjtens udboringsstil.
    recorder_case_shell_type:
      name: Blokfløjteæskes yderside
      description: Beskriver æskens strukturelle stivhed.
    recorder_finish:
      name: Blokfløjtefinish
      description: Overfladebehandling af blokfløjtens midterdel (særligt relevant
        for altblokfløjter af træ).
    recorder_hole_type:
      name: Blokfløjtes hultype
      description: Om hullerne er enkelte (ingen dobbelte huller) eller inkluderer
        dobbelte huller til forbedret kromatisk fingersætning.
    recorder_joint_configuration:
      name: Konfiguration af blokfløjtens dele
      description: Beskriver, hvor mange dele, blokfløjten har, hvilket påvirker bærbarhed,
        rengøring og udskiftning af dele.
    recorder_joint_style:
      name: Blokfløjtedeles stil
      description: Samlings-/forbindelsestypen mellem blokfløjtens sektioner, hvis
        relevant.
    recorder_keywork:
      name: Blokfløjtes klapper
      description: Angiver om blokfløjten har klapper (metal- eller plastmekanismer)
        til de dybe toner, som typisk findes på tenor-, bas- eller store blokfløjter.
    recorder_mouthpiece_type:
      name: Mundstykketype for blokfløjte
      description: Beskriver, om blokfløjtens mundstykke/hovedstykke er integreret
        (i ét stykke) eller aftageligt/udskifteligt.
    recorder_pitch_standard_a4:
      name: Standard for blokfløjtes tonehøjde (A4)
      description: Angiver den tonehøjdereference, som blokfløjten er bygget til (f.eks.
        A=440 Hz moderne tonehøjde vs. A=415 Hz baroktonehøjde).
    recorder_thumb_hole_type:
      name: Type af tommelfingerhul på blokfløjte
      description: Angiver, om optageren er udformet med enkelt eller dobbelt tommelfingerhul.
    recreational_vehicle_holding_tank_type:
      name: Autocampers type opsamlingstanke
      description: Angiver hvilke opsamlingstanke til spildevand, autocamperen har.
    recreational_vehicle_leveling_system:
      name: Autocampers køretøjsnivelleringssystem
      description: Type installeret nivellerings-/stabiliseringssystem.
    recycled_material_content:
      name: Indhold af genbrugsmateriale
      description: Angiver andelen af beklædningsgenstanden, der er lavet af genbrugsfibre
        eller garn.
    reed_dent_material:
      name: Kamtænders materiale
      description: Kamtændernes materiale (de dele, der adskiller trendtrådene), hvilket
        påvirker holdbarhed og slid på garnet.
    reed_type:
      name: Rørtbladype
      description: Angiver hvilken type rørbladskonstruktion der bruges i sækkepibens
        spillepibe og bordunpiber.
    reeds_included:
      name: Medfølgende rørblade
      description: Angiver, hvilke rørblade der er inkluderet i Great Highland sækkepibesættet
        (chanter og/eller drone), og om de er spanskrør eller kunstige.
    reefing_method:
      name: Rebningsmetode
      description: Angiver mekanismen (om nogen) til at mindske eller opbevare sejlet
        på vandet.
    reel_profile:
      name: Hjulprofil
      description: Klassificerer den strukturelle stil/profil på fiskehjulets hoveddel.
    reel_seat_material:
      name: Materiale i hjulholder
      description: Angiver konstruktionsmaterialet til hjulholderen, hvilket påvirker
        vægt, følsomhed og korrosionsbestandighed.
    reel_seat_type:
      name: Hjulholdertype
      description: Angiver den låsemekanisme, der fastgør fluehjulet til stangen.
    reel_size_class:
      name: Størrelsesklasse for hjul
      description: Producentudpeget størrelsesvurdering (f.eks. 1000, 3000, 5000),
        der angiver spolekapacitet og samlet hjulkonstruktion.
    referee_wallet_accessories_included:
      name: Dommertegnebog medfølger
      description: Viser de ekstra varer sampakket i en dommertegnebog, såsom rødt/gult
        kort, scoreark eller skriveredskaber, så køber ved, om tegnebogen sælges som
        et komplet sæt.
    refinement_level:
      name: Raffineringsniveau
      description: Angiver den grad af raffinering, som olien har gennemgået, hvilket
        påvirker smag, farve, næringsindhold og røgpunkt.
    reflective_finish:
      name: Reflekterende finish
      description: Angiver en diskokugles reflekterende overfladebehandling (f.eks.
        spejlstykker vs. holografiske/iriserende effekter).
    reflective_or_glow_effect:
      name: Refleks- eller glødeeffekt
      description: Angiver om antennekuglen har synlighedseffekter såsom reflekterende
        materiale, selvlysende eller lysende/LED-elementer.
    reflective_tape_pattern:
      name: Refleksbånds mønster
      description: Beskriver konfigurationen af refleksbånd på beklædningsgenstanden,
        der anvendes for at opfylde synlighedskravene.
    regulation_standard:
      name: Reguleringsstandard
      description: Angiver den officielle standard eller det styreorgans dimensioner/certificering,
        som nettet opfylder.
    regulator_diaphragm_material:
      name: Regulatormembranmateriale
      description: Angiver membranmaterialet, hvilket påvirker brændstof/ethanol-kompatibilitet
        (f.eks. E85) og holdbarhed.
    regulator_port_thread_standard:
      name: Regulatorports gevindstandard
      description: Angiver det portgevind/den forbindelsesstandard, der anvendes på
        regulatorhuset til indgangs-/udgangs-/returporte.
    rein_features:
      name: Tøjlefunktioner
      description: Fremhæver særlige funktionelle eller sikkerhedsmæssige funktioner
        på tøjlerne.
    rein_style:
      name: Tøjlestil
      description: Identificerer tøjlernes konstruktionsdesign eller konfiguration,
        så rytterne kan vælge den korrekte type til deres disciplin og personlige
        præferencer.
    reinforced_areas:
      name: Forstærkede områder
      description: Identificerer hvilke dele af beklædningsgenstanden der er forstærket
        for at sikre holdbarhed mod slid.
    reinforcement_type:
      name: Forstærkningstype
      description: Konstruktionsforstærkning brugt i radiatorslangen til styrke og
        temperatur-/trykmodstand.
    release_activation_method:
      name: Metode til aktivering af frigivelse
      description: Angiver, hvordan en udløserhjælp til bueskydning aktiveres af bueskytten.
    release_bearing_material:
      name: Udløserlejes materiale
      description: Primært materiale til leje-/fladekomponenter (hvor det er specificeret
        af producenten).
    release_jaw_style:
      name: Udløserkæbestil
      description: Beskriver designet af udløserhovedets kæber eller krog.
    release_strap_type:
      name: Udløserremtype
      description: Identificerer den rem eller det forbindelsessystem, der leveres
        med udløserhjælpen til bueskydning.
    remote_control_airship_envelope_material:
      name: Fjernstyret luftskibshylstermateriale
      description: Angiver det primære materiale i ballonen/luftskibets yderkappe
        (gaspose), forskelligt fra det overordnede legetøjsmateriale.
    remote_control_motorcycle_scale:
      name: Skala for RC-motorcykel
      description: Skalaen af den fjernstyrede motorcykel i forhold til en rigtig
        motorcykel (hvis den er modelleret som et skaleret køretøj).
    remote_control_motorcycle_terrain_suitability:
      name: Fjernbetjent motorcykels egnethed til terræn
      description: Det primære terræn, som den fjernstyrede motorcykel er designet
        til at køre på.
    remote_control_motorcycle_water_resistance:
      name: Fjernbetjent motorcykels vandtæthed
      description: Niveau af RC-motorcyklens elektroniks vandtæthed.
    remote_control_plane_kit_completion_level:
      name: Fjernbetjent flysæts kompletteringsniveau
      description: Angiver, hvad der er inkluderet, og hvor komplet sættet er (f.eks.
        klar til at flyve vs. kræver separat sender/modtager/batteri).
    remote_control_plane_landing_gear_type:
      name: Fjernbetjent flys landingsstelstype
      description: Angiver landingsudstyrets konfiguration, der påvirker holdbarhed
        og start-/landingsflade.
    remote_control_plane_power_type:
      name: Fjernbetjent flys strømtype
      description: Angiver, hvordan flyet drives/fremdrives (elektrisk vs. gløderør/benzin/nitro),
        hvilket påvirker vedligeholdelse, støj og hvor det kan flyves.
    remote_control_watercraft_features:
      name: Fjernstyret vandfartøjs funktioner
      description: Fremhæver vigtige specifikke funktioner for RC-vandfartøj, der
        påvirker brugervenlighed og holdbarhed.
    remote_control_watercraft_propulsion_drive_type:
      name: Fjernbetjent vandfartøjs fremdrifts-/drevtype
      description: Angiver, hvordan det fjernstyrede vandfartøj drives frem i vandet.
    remote_control_watercraft_water_environment:
      name: Fjernbetjent vandfartøjs vandmiljø
      description: Angiver de tilsigtede vandforhold, hvor det fjernstyrede vandfartøj
        yder bedst.
    remote_keyless_system_programming_method:
      name: Programmeringsmetode for fjernbetjent nøglefrit system
      description: Hvordan fjernbetjeningen/systemet er programmeret eller parret
        med køretøjet (f.eks. onboarding-procedure vs. professionelt værktøj).
    repair_compound_type:
      name: Reparationsblandingstype
      description: Type/formulering af det inkluderede forbrugsmateriale til reparation
        (f.eks. type karrosserispartelmasse, forruderesin, dækproplim/tætningsmiddel).
    repair_kit_components:
      name: Reparationssæts komponenter
      description: Viser de specifikke varer, der er inkluderet i reparationssættet,
        så kunden kan forstå indholdet og sammenligne sampak.
    repair_method:
      name: Reparationsmetode
      description: Angiver den primære reparationsmetode, som sættet bruger, såsom
        selvklæbende lapper eller ventiludskiftning.
    replacement_part_purpose:
      name: Formål med reservedel
      description: Angiver, om varen er en OEM-udskiftningsdel, en opgraderende /bedreydende
        del eller et tilføjelsestilbehør.
    replacement_part_type:
      name: Reservedelstype
      description: Identificerer den funktionelle kategori for elliptisk træner-delen,
        så kunden kan filtrere efter den komponent, de har brug for.
    replacement_parts_availability:
      name: Tilgængelighed af reservedele
      description: Angiver, om forbrugs-/udskiftelige dele understøttes af gevindskæreren
        (f.eks. udskiftningskroge/-tråde).
    replica_gun_action_type:
      name: Replikaskydevåbens handlingstype
      description: Angiver replikaskydevåbenets betjenings-/handlingstype (som den
        forestiller), f.eks. boltmekanisme eller vægtstangsmekanisme.
    replica_gun_firing_mechanism:
      name: Affyringsmekanisme for replikaskydevåben
      description: Angiver om og hvordan replikaen simulerer affyring/funktion (ikke-dødelig),
        såsom knaldhætter eller uden affyring.
    replica_gun_moving_parts:
      name: Bevægelige dele af replikaskydevåben
      description: Angiver hvilke dele der er funktionelle/bevægelige på replikaen.
    reservoir_orientation:
      name: Beholders retning
      description: Angiver blærens tilsigtede retning eller profil inde i pakken.
    reservoir_type:
      name: Beholdertype
      description: Koblingshovedcylinderens type beholderkonfiguration.
    resin_suitability:
      name: Egnethed til harpiks
      description: Angiver, om håndbolden er designet til brug med harpiks (lim) eller
        om den er harpiksfri.
    resistance_adjustability:
      name: Modstandsjusterbarhed
      description: Angiver, om brugeren kan ændre vejrtrækningsmodstanden.
    resistance_band_design:
      name: Modstandsbånds design
      description: Beskriver et modstandsbånds fysiske form eller stil (f.eks. løkke,
        rør med håndtag, 8-talsformet), det hjælper kunder med at vælge det rigtige
        design til deres træningsrutine.
    resistance_loading_type:
      name: Modstandsbelastningstype
      description: Angiver, hvordan modstand/vægt leveres eller påføres Smith-maskinen
        (f.eks. pladebelastet eller vælgerstyret vægtstak).
    response_fields_included:
      name: Svarfelter inkluderet
      description: Angiver hvilke standardsvarfelter/-muligheder der findes på svarkortet
        (f.eks. accepter/afvis, måltidsvalg).
    restoration_status:
      name: Restaureringsstatus
      description: Angiver om varevognen er i original, restaureret, ombygget eller
        projekteret stand.
    rhinestone_base_color_family:
      name: Rhinstensbases farvefamilie
      description: Identificerer rhinstensbasens farvefamilie (f.eks. gennemsigtig/krystal,
        guld/gul, blå).
    rhinestone_facet_style:
      name: Rhinstensfacetters stil
      description: Rhinstenens facet-/facettermønster påvirker glitren og udseende
        (f.eks. Xilion rose, brillantslibning, facetteret vs. glat).
    rhinestone_hole_reinforcement_material:
      name: Rhinstenshullers forstærkende materiale
      description: Materiale omkring/ved hullerne (f.eks. metaløje, støbt plastik)
        påvirker holdbarheden under syning.
    rhinestone_setting_type:
      name: Rhinstens indfatningstype
      description: Hvordan stenen er monteret/kantet til syning (f.eks. krogindfatning,
        rammeindfatning, kantindfatning).
    rhubarb_product_cut_type:
      name: Rabarberprodukts udskæringstype
      description: Beskriver den fysiske tilberedning eller udskæring af rabarberproduktet.
    ribbon_construction:
      name: Båndkonstruktion
      description: Beskriver centrale konstruktionsegenskaber ved grosgrain-bånd,
        såsom at det er metaltrådet eller elastisk, hvilket ændrer dets anvendelse
        (f.eks. sløjfer vs. syning).
    ribbon_packaging_type:
      name: Båndemballagetype
      description: Angiver hvordan båndet levers/sælges.
    ribbon_pattern_style:
      name: Båndmønsters stil
      description: Klassificerer den mønsterpåføringsmetode, der almindeligvis anvendes
        på grosgrain-bånd.
    ribbon_sheen_level:
      name: Bånds glansniveau
      description: Angiver skin/glans på satinbåndets overflade.
    ribbon_style:
      name: Båndstil
      description: Angiver båndets visuelle mønster/stil (f.eks. ensfarvet, stribet,
        trefarvet).
    ribbon_trim_backing_type:
      name: Bånd/pynts bagsidetype
      description: Angiver om båndet/pynten har en bagside, og hvilken type (til nem
        påføring).
    ribbon_trim_edge_finish:
      name: Bånd/pynts kantfinish
      description: Beskriver båndet/pyntens kantkonstruktion/finish (nyttig med hensyn
        til flosning og tilsigtet anvendelse).
    ric_rac_wave_size:
      name: Zigzag-bølgestørrelse
      description: Beskriver zigzag-udsvingene (hvor store zigzag-bølgerne er).
    rice_grain_length:
      name: Riskornlængde
      description: Klassificerer risprodukter efter kernelængde, såsom kort-, mellem-
        eller langkornet, hvilket påvirker tilberedningsegenskaber og kulinarisk anvendelse.
    rice_processing_method:
      name: Forarbejdningsmetode for ris
      description: Beskriver, hvordan risen er blevet forarbejdet eller tilberedt
        (f.eks. parboiled, spiret, flaget), det påvirker tilberedningstid, næringsindhold
        og anvendelse.
    rice_variety:
      name: Risvariant
      description: Angiver den specifikke rissort eller varietet, hvilket giver kunden
        mulighed for at vælge korn med den foretrukne smag, aroma, tekstur til det
        tiltænkte køkken.
    riding_toy_features:
      name: Egenskaber for ridelegetøj
      description: Fremhæver almindelige funktionelle/sikkerhedsmæssige funktioner,
        der er specifikke for ridelegetøj.
    rifle_action_type:
      name: Riffels handlingstype
      description: Riflens betjeningsmekanisme (hvordan den lades/affyres/udkaster),
        vigtigt for identifikation og samlerinteresse.
    rifle_finish:
      name: Riffelfinish
      description: Primær udvendig finish/metallets belægning.
    rifle_magazine_type:
      name: Riffelmagasintype
      description: Type tilførselssystem til riflen.
    rifle_stock_material:
      name: Riffelskæftemateriale
      description: Primært materiale anvendt til riffelskæftet/de udvendige dele (f.eks.
        valnød, polymer).
    rim_clamping_method:
      name: Fælgfastgøringsmetode
      description: Hvordan maskinen fastgør hjulet/fælgen under montering og afmontering.
    rim_strip_type:
      name: Fælgbåndtype
      description: Klassificerer strimlen/båndet efter dets stil, konstruktion eller
        specifikke anvendelse (f.eks. slangeløst fælgbånd vs. beskyttende gummistrimmel).
    rim_tubeless_compatibility:
      name: Kompatibilitet med slangeløs fælg
      description: Angiver om fælgen, båndet eller hjulet er designet til slangeløs
        dækopsætning.
    ripeness_stage:
      name: Modenhedsstadium
      description: Angiver frugtens modenhedsniveau på salgstidspunktet (f.eks. umoden,
        moden, klar til at spise).
    riser_pad_type:
      name: Type forhøjningsplade
      description: Klassificerer pladens funktionelle stil (f.eks. standardafstandsstykke,
        stødabsorberende, vinklet kile).
    roasted_malt_processing_type:
      name: Forarbejdningstype for ristet malt
      description: Den specifikke forarbejdningsmetode eller sort, der anvendes til
        at skabe den ristede malt eller det ristede korn (f.eks. umaltet, ristet byg,
        sort malt, afskallet sort eller med reduceret bitterhed).
    robotic_toy_interaction_mode:
      name: Robotlegetøjs interaktionstilstand
      description: Beskriver den primære måde, robotten interagerer eller bevæger
        sig på under leg.
    robotic_toy_light_features:
      name: Lysfunktioner i robotlegetøj
      description: Angiver, hvorvidt og hvordan legetøjet bruger lys som en del af
        legen (f.eks. LED'er, projektion).
    robotic_toy_programming_supported:
      name: Understøttelse af programmering af robotlegetøj
      description: Angiver hvilken programmeringsmetode, om nogen, legetøjet understøtter.
    robotic_toy_skill_level:
      name: Robotlegetøjs færdighedsniveau
      description: Angiver det kompleksitetsniveau for drift/programmering, der forventes
        af brugeren.
    robotic_toy_sound_features:
      name: Robotlegetøjs lydfunktioner
      description: Angiver robotlegetøjets lydfunktionalitet.
    rod_butt_style:
      name: Stangende-stil
      description: Definerer konfigurationen af stangens ende til trollingbrug.
    rod_construction_type:
      name: Konstruktionstype for fiskestang
      description: Angiver stangens overordnede konstruktionsstil med hensyn til dele
        og sammenklappelighed.
    rod_guide_material:
      name: Stangringes materiale
      description: Angiver det materiale, der bruges til fiskestangens ringe eller
        indsatser, hvilket påvirker holdbarhed, vægt og linefriktion.
    rod_guide_type:
      name: Stangringes type
      description: Angiver den primære type lineøjer, der sidder på stangen.
    rod_handle_type:
      name: Håndtagstype for fiskestang
      description: Angiver grebkonfigurationen for en fiskestang, hvilket hjælper
        med komfort og valg af teknik.
    roll_cage_tubing_material:
      name: Materiale til rør til rullebur
      description: Angiver det anvendte rørmateriale/legering til styrtburet/styrtbøjlen
        (f.eks. DOM-stål vs. 4130 chromolyte).
    roller_skate_brake_shape:
      name: Rulleskøjtebremse Shapes
      description: Beskriver bremsehovedets geometriske form/profil med henblik på
        ydeevne eller æstetiske præferencer.
    roller_skate_brake_type:
      name: Bremsetype for rulleskøjte
      description: Angiver det bremsesystem, der anvendes på rulleskøjter.
    roller_ski_technique:
      name: Teknik på rulleski
      description: Identificerer den langrendsteknik, som rulleskiene er designet
        til.
    roller_technology:
      name: Rulleteknologi
      description: Angiver integreret teknologi, der forbedrer massageydelsen, såsom
        vibration eller varme.
    rolling_case_wheel_configuration:
      name: Rullekasses hjulkonfiguration
      description: Angiver den hjulkonfiguration, der bruges på rullende keyboardkasser.
    rolling_paper_format:
      name: Rullepapirformat
      description: Identificerer produktets fysiske fremtræden (f.eks. flade ark,
        færdigrullede kegler, indpakning).
    rolling_paper_gum_type:
      name: Rullepapir af gummieret type
      description: Angiver det klæbemiddel (gummi), der bruges på papirkanten til
        forsegling, hvilket kan påvirke smag og ydeevne.
    rolling_paper_size:
      name: Rullepapirstørrelse
      description: Angiver standardstørrelsesklassificeringen for rullepapiret eller
        -keglen, hvilket gør det muligt for kunden hurtigt at vælge den korrekte bredde/længde
        til deres behov.
    rolling_stock_type:
      name: Type rullende materiel
      description: Angiver, hvilken type tog/skinnekøretøj modellen er (lokomotiv
        vs. person-/godsvogne og almindelige vognundertyper).
    roof_cargo_net_hook_fastener_style:
      name: Krog/fastgørelse til taglastnet
      description: Angiver typen af endehardware der bruges til at forbinde nettet
        til forankringspunkter (f.eks. S-krog, karabinhage, J-krog).
    roof_height_class:
      name: Højdeklasse for tag
      description: Kategoriserer taghøjde, der almindeligvis anvendes til varevogne
        (især relevant for ombyggede/campere).
    roof_type:
      name: Tagtype
      description: Konfiguration af kabinens tag- eller loftsektion.
    root_variety:
      name: Rodsort
      description: Identificerer sorten eller den almindelige type af roden (f.eks.
        peberrod versus ægte wasabi-sorter).
    rope_buoyancy:
      name: Opdrift for reb
      description: Angiver, om rebet er designet til at flyde på vandoverfladen, hvilket
        hjælper udøverne med at undgå at blive viklet ind i det og forenkler opsamlingen.
    rope_construction:
      name: Rebkonstruktion
      description: Specificerer fiberkonstruktionsoplysninger ud over fletningsstil,
        såsom snoet vs. flettet kerne/kappe og om rebet er i kernmantel-stil.
    rope_material:
      name: Rebmateriale
      description: Identificerer materialet i justeringsrebet/-snoren.
    rope_strand_compatibility:
      name: Kompatibilitet mellem rebtråde
      description: Angiver hvilke reb-tråd-konfigurationer, sikringsenheden kan håndtere
        (enkelt, halv/dobbelt, twin eller kombinationer).
    rope_stretch_type:
      name: Rebstræktype
      description: Beskriver rebets strækegenskaber og skelner mellem ikke-strækbare,
        lav-strækbare, standard eller bungee-typer.
    rose_bloom_stage:
      name: Rosens blomstringsstadium
      description: Angiver, hvor åbne rosenblomsterne er ved levering/ankomst (fra
        knop til helt åbne).
    rose_grade:
      name: Rosenkvalitet
      description: Afskårne roser af kommerciel kvalitet.
    rosette_center_type:
      name: Rosetcentertype
      description: Angiver typen af detaljer i centrum eller indsats på forsiden af
        rosetten.
    rosin_dust_level:
      name: Niveau af harpiksstøv
      description: Angiver den forventede mængde harpiksstøv, der produceres under
        normal brug.
    rosin_formula_additives:
      name: Harpiksformulering/tilsætningsstoffer
      description: Identificerer nævneværdige formuleringsegenskaber såsom allergivenlige,
        støvfattige eller metalinfunderede blandinger.
    rosin_hardness:
      name: Harpikshårdhed
      description: Angiver den relative hårdhed/blødhed for harpiks til buer, hvilket
        kan påvirke grebet og støv på tværs af klimaer og spillestile.
    rotation_mechanism_type:
      name: Rotationsmekanismetype
      description: Angiver den mekanisme, der tillader rebet at rotere, det påvirker
        glathed og opnåelig hastighed (f.eks. kuglelejer vs. bøsninger).
    rotation_motion_features:
      name: Rotations-/bevægelsesegenskaber
      description: Angiver om planeter/baner roterer eller bevæger sig, og hvordan.
    rotor_configuration_type:
      name: Rotorkonfigurationstype
      description: Identificerer RC-helikopterens rotorkonfiguration og kontrolstil
        (f.eks. koaksial, enkeltrotor med fast bladvinkel vs. kollektiv bladstyring,
        multirotor), hvilket væsentligt påvirker flyveegenskaber og egnethed til forskellige
        færdighedsniveauer.
    rotor_construction_type:
      name: Konstruktionstype for rotor
      description: Angiver rotorens konstruktionsstil, hvilket påvirker vægt, stivhed
        og varmehåndtering.
    rotor_mounting_interface:
      name: Monteringsgrænseflade for rotor
      description: Definerer den standard for navkontaktpunkt, der bruges til at fastgøre
        rotoren til hjulet.
    rotor_mounting_standard:
      name: Monteringsstandard for rotor
      description: Angiver den grænsefladestandard, der bruges til at fastgøre rotoren
        til navet (f.eks. 6-bolts eller Center Lock).
    roulette_set_components_included:
      name: Medfølgende komponenter i roulettesæt
      description: Vigtige roulette-relaterede komponenter inkluderet i hjulet/sættet.
    roulette_wheel_ball_track_type:
      name: Roulettehjuls kuglebanetype
      description: Beskriver stilen på kuglebanen, der bruges på hjulet, hvilket påvirker
        realismen og spillefølelsen.
    roulette_wheel_numbering_system:
      name: Nummereringssystem for roulettehjul
      description: Angiver roulettehjulets nummerering og nulkonfiguration for kompatibilitet
        mellem spil/odds.
    rounders_equipment_included:
      name: Medfølgende rundboldudstyr
      description: Angiver de specifikke rundboldsdele eller tilbehør, der leveres
        træningssættet eller pakken, så køberne ved præcis, hvad der er i æsken.
    rounders_governing_body_approval:
      name: Godkendelse fra rundbold-styrelsesorgan
      description: Angiver certificering eller godkendelse fra et officielt rundbolds-
        eller andet sportsstyrelsesorgan.
    row_counter_format:
      name: Rækketællerformat
      description: Angiver formatet/stilen for en strikketæller (f.eks. ring, kæde,
        mekanisk eller digital tæller).
    row_counter_mechanism:
      name: Rækketællermekanisme
      description: Angiver, hvordan rækkeantallet øges/registreres i værktøjet.
    row_counter_mounting_method:
      name: Fastgørelsesmetode for rækketæller
      description: Hvordan tælleren/markøren fastgøres under brug (til nålen, til
        fingeren, til projektet osv.).
    rowel_type:
      name: Sporehjulstype
      description: Beskriver sporehjulets form eller kantprofil med henblik på rytterens
        præferencer og hestens følsomhed.
    rowing_machine_part_type:
      name: Deltype til romaskine
      description: Identificerer den specifikke komponent, som produktet er beregnet
        til at erstatte på en romaskine, så kunderne hurtigt kan finde præcis den
        del, de har brug for uden at skabe et væld af mikrokategorier.
    rubber_ducky_character_theme:
      name: Gummiands egenskaber/tema
      description: Tema eller egenskab for styling af gummiand (nyttig til festartikler/samlerobjekter).
    rubber_ducky_features:
      name: Egenskaber for gummiand
      description: Funktionelle/designmæssige egenskaber specifikt for gummiænder
        som badelegetøj.
    rubber_ducky_size_class:
      name: Gummiands størrelsesklasse
      description: En kundevenlig størrelsesgruppering for gummiænder baseret på typisk
        brug (badekarslegetøj vs. kagetopper vs. jumbo).
    ruffle_style:
      name: Flæsens stil
      description: Beskriver konstruktionen eller den visuelle stil af flæsen på et
        stolebånd.
    rugby_headgear_safety_certification:
      name: Sikkerhedscertificering for rugbyhovedbeklædning
      description: Angiver, om hovedbeklædningen opfylder officielle sikkerhedsstandarder
        for rugby eller generelle sportssikkerhedsstandarder.
    rugby_size:
      name: Rugby-størrelse
      description: Kategoriserer udstyr efter almindelige rugbyspecifikke mærkater
        der bruges i produkttitlen.
    rugby_variant:
      name: Rugbyvariant
      description: Angiver den variant (kode eller format), som produktet er beregnet
        til.
    ruler_edge_type:
      name: Linealkanttype
      description: Identificerer kantprofilen/funktionen, der bruges til måling eller
        markering (f.eks. lige kant, skrå, udbuet rand).
    ruler_marking_style:
      name: Linealmarkeringsstil
      description: Beskriver markerings-/ layout der er trykt på linealen ud over
        basale afmærkninger.
    runner_configuration:
      name: Konfiguration af løber
      description: Beskriver antallet og placeringen af meder på slæden.
    runner_material:
      name: Medemateriale
      description: Angiver det materiale, der bruges til slædens meder eller glidelister.
    saddle_cover_style:
      name: Sadelbetrækstil
      description: Klassificerer produktets overordnede design eller brugsstil (f.eks.
        opbevaringsdækken, til at ride på, bæretaske).
    saddle_design:
      name: Sadeldesign
      description: Klassificerer sadlens overordnede ergonomiske eller aflastende
        design/stil (f.eks. udskæring, , snudeløs, delt snude, fjedret).
    saddle_discipline:
      name: Sadeldisciplin
      description: Angiver den primære ridedisciplin eller tilsigtede anvendelse/stil
        af sadlen.
    saddle_mounting_type:
      name: Monteringstype for sadel
      description: Angiver grænsefladen mellem sadel og sadelpind for kompatibilitet
        (f.eks. skinner, pivotal, I-Beam).
    saddle_pad_shape:
      name: Sadelunderlags form
      description: Beskriver underlagets fysiske udskæring/omrids, hvilket påvirker
        sadelkompatibilitet og æstetiske præferencer.
    saddle_pad_style:
      name: Sadelunderlagsstil
      description: Identificerer underlagets funktionelle stil eller tilsigtede disciplin,
        så rytterne kan vælge det rigtige design til deres aktivitet eller sadeltype.
    saddle_padding_material:
      name: Sadels underlagsmateriale
      description: Angiver det primære stødabsorberingsmateriale eller -teknologi
        inde i sadlen, der påvirker komfort og ridefornemmelse.
    saddle_rail_material:
      name: Materiale i sadelskinne
      description: Angiver det materiale, der bruges til skinnerne under en cykelsadel,
        hvilket påvirker styrke, komfort, vægt og pris.
    saddle_tree_material:
      name: Materiale i sadelbom
      description: Angiver det materiale, der bruges til sadelbommen, sadlens indvendige
        stel.
    saddle_tree_width:
      name: Sadelboms bredde
      description: Beskriver sadelbommens breddeklassificering, der bestemmer pasformen
        på hestens manke.
    safety_documentation_available:
      name: Tilgængelig sikkerhedsdokumentation
      description: Angiver hvilke overholdelses-/sikkerhedsdokumenter der er udarbejdet
        for ingrediensen (f.eks. sikkerhedsdatablad, IFRA-certifikat/-erklæring, allergenerklæring/-deklaration).
    safety_equipment_included:
      name: Medfølgende sikkerhedsudstyr
      description: Sikkerheds-/beskyttelsesudstyr inkluderet i sættet.
    safety_features:
      name: Sikkerhedsfunktioner
      description: Angiver indbyggede sikkerhedsfunktioner, der har til formål at
        reducere utilsigtede snit eller beskytte klingen under opbevaring.
    safety_harness_type:
      name: Sikkerhedsseletype
      description: Angiver stilen og konfigurationen på den børnesikkerhedssele, der
        følger med sædet.
    safety_mechanism_type:
      name: Sikkerhedsmekanismetype
      description: Beskriver den type indbyggede sikkerhedssystem, der bruges til
        at fange vægtstangen under mislykket løft.
    safety_restraint_type:
      name: Type sikkerhedsfastholdelsesanordning
      description: Type indbygget barnefastholdelsesanordning på gyngesædet, hvis
        relevant.
    safety_warning:
      name: Sikkerhedsadvarsel
      description: Angiver, om produktet har almindelige sikkerhedsadvarsler for legetøj,
        der er relevante for marmorkugler (f.eks. kvælningsfare).
    sail_shape:
      name: Sejlform
      description: Beskriver kajaksejlets geometriske stil, som påvirker effektivitet,
        håndtering og montering.
    salad_dressing_type:
      name: Type salatdressing
      description: Identificerer dressingens grundlæggende stil eller tekstur (f.eks.
        cremet, vinaigrette, yoghurtbaseret), hvilket hjælper kunden med at skelne
        mellem forskellige baser og konsistenser.
    salad_topping_base_ingredient:
      name: Ingrediens i salattopping-base
      description: Angiver den primære ingrediensgruppe, der udgør toppingen, hvilket
        hjælper kunder med at filtrere efter ernæringsmæssige præferencer, allergenproblemer
        eller ønsket tekstur.
    salt_level:
      name: Saltniveau
      description: Angiver mængden af salt eller natrium, der er tilsat nødderne eller
        kernerne.
    sand_cup_features:
      name: Sandbeholders funktioner
      description: Funktionelle/fysiske egenskaber ved sandbeholderen/sandbeholderne,
        der påvirker leg og brug.
    sand_shovel_handle_style:
      name: Sandskovls håndtagsstil
      description: Beskriver håndtaget/grebets form for enden af skovl-/ spadehåndtaget.
    sand_toy_set_pieces_included:
      name: Medfølgende dele i sandlegetøjssæt
      description: Viser en liste over de typer sandlegetøjskomponenter, der er inkluderet
        i sættet (f.eks. spand, skovl, forme), for at hjælpe kunder med at sammenligne
        sættene efter, hvad de indeholder.
    sand_water_mill_items_included:
      name: Medfølgende sand- og vandmølledele
      description: Viser en liste over de vigtigste tilbehørskomponenter, der følger
        med møllelegetøjet (spande, skovle, forme osv.).
    sandbag_style:
      name: Sandsæks stil
      description: Identificerer det specifikke design og den tilsigtede træningsanvendelse
        af sandsækken (f.eks. Bulgarian, strongman, power), hvilket hjælper kunden
        med at vælge mellem forskellige træningsformer.
    sandbox_bottom_type:
      name: Sandkassebundtype
      description: Den type base/bundkonstruktion, der anvendes under sandet.
    sandbox_drainage_type:
      name: Sandkasse dræningstype
      description: Hvordan sandkassen dræner vand (hvis relevant), f.eks. drænhuller
        eller en udtagelig prop.
    sandbox_seating_type:
      name: Siddetype i sandkasse
      description: Om sandkassen har integrerede siddepladser, og hvilken slags.
    sapodillo_variety:
      name: Sapodillo-sort
      description: Identificerer den specifikke varietet eller sort af sapodillo/chikoo
        (f.eks. "Alano", "Prolific"), hvilket gør det muligt for entusiaster at vælge
        foretrukne smagsprofiler og karakteristika.
    sapote_variety:
      name: Sapotevariant
      description: Angiver den specifikke art/type sapote, der tilbydes (f.eks. sort,
        hvid, mamey), så kunden kan skelne mellem forskellige slags.
    satin_ribbon_face_type:
      name: Satinbånds overfladetype
      description: Angiver, om båndet har en satinfinish på den ene side eller begge.
    sauce_consistency:
      name: Saucekonsistens
      description: Beskriver pizzasaucens tekstur eller tykkelse.
    sauce_product_form:
      name: Produktform for sauce
      description: Angiver sauceproduktets fysiske form, såsom væske, olie, pasta,
        pulver, flager eller sirup.
    sauce_variety:
      name: Sauce-variant
      description: Identificerer den hvide sauce/flødesaucens specifikke stil eller
        opskriftsfamilie (f.eks. Alfredo, béchamelsauce, hollandaisesauce).
    saxophone_body_finish:
      name: Finish for saxofons hoveddel
      description: Beskriver den primære finish/coating på saxofonens hoveddel (separat
        fra klapper).
    saxophone_body_type:
      name: Kropstype for saxofon
      description: Beskriver den overordnede fysiske konfiguration af bassaxofonens
        hoveddel, og hvordan tragtstykket vender.
    saxophone_construction_style:
      name: Saxofonkonstruktionstil
      description: Angiver almindelige saxofonkonstruktionsfunktioner, der påvirker
        holdbarhed, resonans og vedligehold.
    saxophone_included_accessories:
      name: Medfølgende tilbehør til saxofon
      description: Anfører tilbehør, der almindeligvis følger med en altsaxofon-sampak.
    saxophone_key_system:
      name: Saxofons klapsystem
      description: Identificerer det saxofon-klapsystem (standard for udformning/mekanisme),
        der er anvendt på instrumentet.
    saxophone_key_touch_material:
      name: Materiale til saxofons klapindlæg
      description: Angiver materialet på saxofonens klapindlæg (f.eks. perlemorsindlæg).
    saxophone_mouthpiece_baffle_type:
      name: Saxofonbaffles type resonansskærm
      description: Beskriver udformningen af baffle'n, der danner luftstrøm og lyshed
        i klangen.
    saxophone_neck_type:
      name: Saxofonhalstype
      description: Angiver den halskonfiguration, der leveres med bassaxofonen.
    saxophone_package_contents:
      name: Indhold af saxofonpakken
      description: Viser en liste over vigtige tilbehørsdele, der følger med saxofonen
        (f.eks. æske, mundstykke, ligatur, halsrem, regøringssæt).
    saxophone_reed_cut:
      name: Saxofonbladskæring
      description: Angiver skæringen/stilen på saxofonrørbladet, som påvirker reaktion,
        tone og fornemmelse.
    saxophone_reed_material_type:
      name: Saxofonblads materialetype
      description: Angiver kategorien af bladmateriale (f.eks. spanskrør vs. syntetisk).
    saxophone_reed_strength_scale:
      name: Saxofonblads styrkeskala
      description: Angiver det styrkenummereringssystem/den skala, der anvendes til
        bladet (ofte brandafhængigt), hvilket muliggør en klarere sammenligning på
        tværs af fortegnelser.
    saxophone_small_part_thread_size:
      name: Gevindstørrelse på saxofons smådele
      description: Specificerer gevindstørrelsen/standarden for små gevindskårne saxofondele
        (primært skruer), hvilket muliggør korrekt pasform.
    saxophone_swab_application_area:
      name: Påføringsområde for saxofonpind
      description: Angiver hvilken del af saxofonen, rengøringspinden er beregnet
        til at rengøre/tørre.
    scabbard_material:
      name: Skedemateriale
      description: Specificerer det primære materiale i den medfølgende skede/hylster,
        hvis relevant.
    scale_model_assembly_status:
      name: Skalamodellens samlingsstatus
      description: Angiver om skalamodellen er klar til fremvisning eller kræver samling/maling.
    scale_model_car_features:
      name: Skalamodelbils egenskaber
      description: Skalamodelbilens nævneværdige egenskaber såsom døre/motorhjelm,
        der kan åbnes, styrbare hjul, affjedring osv.
    scale_model_kit_assembly_requirements:
      name: Skalamodelsæts påkrævede samling
      description: Angiver hvilke yderligere samlingstrin/leveringer, der typisk kræves
        ud over basal kliksamling.
    scale_model_kit_components_included:
      name: Medfølgende komponenter i skalamodelsæt
      description: Viser, hvad der følger med tankskalamodellen/sættet (f.eks. klistermærker,
        figurer, fotoætsede dele).
    scale_model_paint_status:
      name: Status for skala-modelmaling
      description: Angiver om helikoptermodellen er formalet/færdigmalet eller skal
        males.
    scale_model_pose:
      name: Positur for skalamodel
      description: Angiver hestemodellens afbildede positur, der matcher fremvisning/diorama.
    scale_model_rotor_configuration:
      name: Skalamodels rotorkonfiguration
      description: Angiver den helikopterrotorkonfiguration, modellen viser.
    scale_model_truck_era:
      name: Skalamodellastbils æra
      description: Angiver den virkelige lastbils ærae/tidsperiode, som modellen repræsenterer
        (nyttigt for samlere, der søger vintage versus moderne lastbiler).
    scale_model_truck_propulsion_type:
      name: Skalamodellastbils fremdriftstype
      description: Angiver, om den afbildede lastbil er diesel-, benzin-, elektrisk,
        hybrid eller har en anden fremdriftstype (som repræsenteret af modellen).
    scale_units:
      name: Skala-enheder
      description: Måleenhederne trykt/indgraveret på bjælken til indstilling af radius/diameter.
    scent_function:
