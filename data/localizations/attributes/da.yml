    tabletop_color:
      name: Bordpladefarve
      description: Angiver farven på et bords overflade, f.eks. sort eller hvid
    tabletop_material:
      name: Bordplademateriale
      description: Identificerer sammensætningen af bordpladens overflade, f.eks.
