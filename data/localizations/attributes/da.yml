    towel_weave:
      name: Håndklædevævning
      description: Beskriver håndklædestoffets struktur eller vævestil, som påvirker
        tekstur, absorberingsevne og tørretid.
    track_lighting_rail_type:
      name: Skinnebelysning
      description: Definerer skinnens mekaniske/elektriske standard og fastlægger,
        hvilke beslag og stik der er kompatible.
    track_lighting_system_compatibility:
      name: Kompatibilitet med sporbelysningssystem
      description: Angiver den elektriske og mekaniske standard for det spor, som
        armaturet eller tilbehøret er designet til.
    track_rail_circuit_configuration:
      name: Sporeskinnes kredsløbskonfiguration
      description: Angiver antallet eller typen af elektriske kredsløb, som skinnen
        understøtter, hvilket påvirker den uafhængige styring af armaturgrupper.
    track_system_standard:
      name: Sporsystemstandard
      description: Identificerer det fysiske spor, som strømforsyningen passer til,
        så kunderne kan matche komponenterne til deres spor (f.eks. H-, J- eller L-spor).
    tractor_tire_application:
      name: Brug af traktordæk
      description: Angiver det primære anvendelsesområde eller miljø, som dækket er
        designet til.
    tractor_tire_tread_classification:
      name: Klassificering af traktordæk
      description: Klassificerer traktordækkets slidbanemønster i henhold til landbrugs-
        og industristandarder.
    tree_shape:
      name: Træform
      description: Beskriver et kunstigt træs overordnede silhuet eller profil.
    trigger_type:
      name: Udløsertype
      description: Angiver den udløsermekanisme, der bruges til at styre vandgennemstrømningen
        på dysen.
    trimmer_line_feed_system:
      name: Trimmertråds fremføringssystem
      description: Identificerer, hvordan skæretråden fremføres fra hovedet under
        drift.
    trimmer_line_shape:
      name: Trimmerlines form
      description: Beskriver trimmerlinens tværsnitsform, som påvirker skæreevne og
        støjniveau.
    turntable_type:
      name: Drejebord
      description: Identificerer typen af kogepladeoverflade, hvor der skelnes mellem
        traditionelle roterende glasplader og flade eller ikke-roterende designs.
    ultrasonic_cleaner_accessories_included:
      name: Tilbehør til ultralydsrenser medfølger
      description: Viser de ekstra komponenter, der følger med rengøringsmidlet, så
        kunderne ved præcis, hvad der er i kassen.
    umbrella_base_type:
      name: Paraplybasetype
      description: Definerer basens strukturelle stil eller monteringsdesign.
    umbrella_opening_mechanism:
      name: Paraplyåbningsmekanisme
      description: Definerer, hvordan paraplyens baldakin foldes ud og ind.
    umbrella_type:
      name: Paraplytype
      description: Angiver paraplyens overordnede design eller formfaktor.
    upf_rating:
      name: UPF-vurdering
      description: Angiver parasolstoffets ultraviolette beskyttelsesfaktor (UPF),
        der kvantificerer dens effektivitet til at blokere skadelige UV-stråler.
    utensil_flexibility:
      name: Redskabs fleksibilitet
      description: Angiver, hvor stiv eller fleksibel skraberen er, hvilket har betydning
        for egnetheden til buede skåle eller fast dej.
    utensil_holder_features:
      name: Redskabsholders egenskaber
      description: Beskriver særlige funktionelle egenskaber ved en beholder til køkkenredskaber.
    utensil_tray_features:
      name: Redskabsbakkes egenskaber
      description: Fremhæver særlige egenskaber, der forbedrer bakkens funktionalitet.
    vacuum_hose_connection_type:
      name: Vakuumslangetilslutningstype
      description: Beskriver tilslutningstypen på slangens ender, hvilket sikrer korrekt
        mekanisk tilpasning til støvsugere eller tilbehør.
    valance_style:
      name: Gardinkappestil
      description: Identificerer det dekorative design af gardinkappen og hjælper
        kunderne med at vælge en stil, der passer til deres indretning.
    valet_organizer_features:
      name: Opbevaringsorganisators funktioner
      description: Fremhæver specifikke organisatoriske funktioner, der er integreret
        i opladerstationen.
    valve_configuration:
      name: Ventilkonfiguration
      description: Definerer haveslangeventilens funktionelle stil, hvilket hjælper
        købere med hurtigt at vælge den rigtige løsning til deres vandingssystem.
    valve_stem_angle:
      name: Ventilstammevinkel
      description: Angiver ventilstammens retning/vinkel i forhold til slangen, hvilket
        påvirker oppumpningslethed og fælgens pasform.
    vase_filler_type:
      name: Vasefyld
      description: Kategoriserer produktet efter den specifikke type fyldmateriale
        eller form.
    vent_pipe_type:
      name: Udluftningsrørstype
      description: Klassificerer konstruktionsstilen for skorstenen eller udluftningsrøret.
    vent_style:
      name: Udluftningsstil
      description: Klassificerer ventilationskomponentens strukturelle stil eller
        formål.
    waffle_style:
      name: Vaffelstil
      description: Identificerer det vaffelmønster, der dannes af pladerne.
    wallpaper_removal_type:
      name: Type tapetfjernelse
      description: Angiver, hvor let det er at fjerne ved renovering.
    wallpaper_washability_rating:
      name: Tapetvaskbarhedsvurdering
      description: Definerer, hvordan tapetoverfladen kan rengøres, når det er påsat.
    warmer_type:
      name: Varmetype
      description: Angiver den primære opvarmningsmekanisme eller den tilsigtede anvendelse
        af stearinlyset eller olievarmeren.
    warmth_level:
      name: Varmeniveau
      description: Klassificerer det samlede varmeniveau eller passende sæson for
        dynen eller sengetæppet.
    warmth_rating:
      name: Varmeklassificering
      description: Angiver isoleringsniveauet for et tæppe, svarende til TOG-klassificeringen
        for sengetøj.
    waste_container_lid_features:
      name: Affaldsbeholders lågfunktioner
      description: Fremhæver særlige funktioner eller forbedringer, der er indbygget
        i låget.
    waste_container_sign_message:
      name: Skiltning af affaldscontainer
      description: Definerer den specifikke affaldsstrøm eller advarselstekst, der
        er trykt på labelen eller skiltet.
    water_filtration_technology:
      name: Vandfiltreringsteknologi
      description: Beskriver den centrale teknologi eller mekanisme, der anvendes
        til at rense vand.
    water_heater_element_connection_type:
      name: Vandvarmerelements tilslutningstype
      description: Identificerer elementets monteringsform, hvor der skelnes mellem
        skruemontering og forskellige flangetyper.
    water_sensor_design:
      name: Vandsensordesign
      description: Angiver den fysiske udformning af det vandfølsomme element.
    water_supply_type:
      name: Vandforsyningstype
      description: Identificerer, hvordan apparatet modtager vand, og skelner mellem
        manuel påfyldning og tilslutning til vandrør.
    watering_needs:
      name: Vandingsbehov
      description: Beskriver plantens typiske vandbehov.
    wax_paper_form:
      name: Vokspapirform
      description: Angiver, om vokspapiret sælges som en sammenhængende rulle eller
        som forudskårne ark.
    weather_guard_mounting_method:
      name: Monteringsmetode for vejrbeskyttelsesanordning
      description: Angiver, hvordan beskyttelsesanordningen fastgøres til fremføringsanordningen
        eller støttestrukturen.
    wheel_bearing_type:
      name: Hjullejetype
      description: Identificerer hjulets indre leje- eller bøsningskonstruktion, som
        påvirker rullemodstanden og vedligeholdelseskravene.
    wheel_tread_style:
      name: Hjulprofil
      description: Angiver hjulets slidbanedesign, som påvirker vejgreb, støjniveau
        og potentielle mærker på underlaget.
    whistling:
      name: Fløjten
      description: Angiver, om kedlen afgiver en fløjtelyd, når vandet når kogepunktet.
    wick_material:
      name: Vægemateriale
      description: Identificerer sammensætningen af den anvendte væge (f.eks. bomuld,
        glasfiber).
    window_film_installation_surface:
      name: Monteringsoverflade for vinduesfilm
      description: Angiver, om filmen er beregnet til indendørs, udendørs eller dobbeltsidet
        anvendelse.
    window_film_type:
      name: Vinduesfilmtype
      description: Kategoriserer filmens funktionelle stil (f.eks. privatliv vs. sikkerhed).
    window_rod_type:
      name: Vinduesstangtype
      description: Klassificerer gardinstangens funktionelle stil.
    window_screen_type:
      name: Vinduesskærmtype
      description: Definerer skærmens strukturelle stil eller funktionsmåde.
    window_treatment_lining_type:
      name: Foringstype til vinduesbehandling
      description: Angiver, om gardinkanten eller gardinbåndet er foret, og hvilken
        type foring der er anvendt.
    wine_aerator_type:
      name: Vinluftertype
      description: Angiver vinlufterens formfaktor eller betjeningsmåde.
    wine_glass_style:
      name: Vinglasstil
      description: Angiver den tilsigtede vintype eller glasdesign for at optimere
        aroma og smag.
    wok_bottom_type:
      name: Wokbundtype
      description: Definerer formen på wokbunden og bestemmer kompatibiliteten med
        forskellige kogeplader og wokringe.
    wood_grain_orientation:
      name: Træs åreretning
      description: Angiver retningen af træets årer i produktet, f.eks. endeårer,
        kantårer eller overfladeårer. Åreretningen påvirker holdbarheden og knivvenligheden.
    wood_seasoning_method:
      name: Træmodningsmetode
      description: Angiver, hvordan træbrændslet er tørret eller lagret, hvilket har
        indflydelse på fugtindhold og forbrændingskvalitet.
    wrap_format:
      name: Indpakningsformat
      description: Angiver den fysiske form, som madindpakningen leveres i, f.eks.
        ruller eller forudskårne ark.
    abacus_bead_material:
      name: Abacus-perlemateriale
      description: Primært materiale til abacusperlerne.
    abec_rating:
      name: ABEC-vurdering
      description: Angiver præcisionsgraden af lejerne baseret på ABEC-klassificeringer,
        der angiver glathed og toleranceniveauer.
    abrasive_level:
      name: Slibeniveau
      description: Relativ skærestyrke af en polerings- eller slibemasse på billak.
    absinthe_accessories_included:
      name: Absint-tilbehør medfølger
      description: Oplysninger om alt tilbehør, der følger med produktet, såsom skeer,
        glas eller sukkerknalder.
    ac_compressor_mounting_style:
      name: Monteringsstil for AC-kompressor
      description: Beskriver den mekaniske monterings- eller fastgørelsesmåde eller
        beslagets tilkobling mellem kompressoren og motoren/hjælpemotorsystemet.
    ac_compressor_oil_type:
      name: AC-kompressors olietype
      description: Angiver den smøreoliekemi, der kræves/anvendes af AC-kompressoren
        (almindelige typer omfatter PAG og POE).
    accent_modes:
      name: Detaljetilstande
      description: Angiver, hvordan metronomen kan fremhæve slag i en takt (ud over
        almindelige klik).
    access_mechanism:
      name: Adgangsmekanisme
      description: Beskriver, hvordan man kommer op på den hævede soveplatform.
    accessibility_features:
      name: Tilgængelighedsfunktioner
      description: Angiver tilgængelighedsrelateret udstyr og konfigurationer på minibussen.
    accessories_included:
      name: Medfølgende tilbehør
      description: Viser en liste med supplerende varer, der følger med stolen (f.eks.
        puf eller lændepude), så kunden får et gennemgående overblik over merværdien.
    accessory_pieces_included:
      name: Medfølgende tilbehørsdele
      description: Viser de tilbehørsartikler, der indgår i et gave- eller pakkesæt
        med flere dele af tøjtilbehør.
    acoustic_amplifier_feedback_control_features:
      name: Funktioner til kontrol af feedback fra akustisk forstærker
      description: Angiver indbyggede anti-feedback-værktøjer til akustiske instrumenter
        (f.eks. notch-filter, faseomskifter, automatisk feedbackundertrykkelse).
    acoustic_drum_kit_components_included:
      name: Komponenter til akustisk trommesæt inkluderet
      description: Angiver, hvilke hovedkomponenter der følger med sættet (kun trommesæt
        vs. komplet sæt; inkluderer bækkener/hardware).
    acoustic_guitar_body_shape:
      name: Akustisk guitars form
      description: Beskriver den akustiske guitars form/omrids, hvilket påvirker tone,
        komfort og typisk brug.
    acoustic_guitar_string_core_design:
      name: Design af akustisk guitarstrengs kerne
      description: Kernekonstruktionen af de viklede strenges.
    acoustic_piano_key_material:
      name: Materiale til tangenter på akustiske klaverer
      description: Angiver det primære materiale, der bruges til klavertangenternes
        overflader/tangentknapperne.
    acoustic_piano_lid_type:
      name: Lågtype på akustiske klaverer
      description: Angiver stilen på låg-/dækselmekanismen, der bruges på det akustiske
        klaver (til at skelne mellem flygel og opretstående klaver med klaplåg/topdæksel).
    acoustic_piano_plate_frame_material:
      name: Materiale til akustisk klavers ramme
      description: Angiver hovedmaterialet til klaverpladen/rammen (harpe), almindeligvis
        støbejern.
    acoustic_piano_soundboard_material:
      name: Materiale til klangbund af akustisk klaver
      description: Angiver det primære materiale, der bruges til klaverets klangbund.
    action_figure_scale:
      name: Actionfigurstørrelse
      description: Angiver det samlerstørrelsesforhold (f.eks. 1:12), som tilbehøret
        er beregnet til.
    action_type:
      name: Handlingstype
      description: Beskriver pistolens affyrings- eller spændemekanisme (f.eks. Repetér,
        break-barrel, lever action).
    actuation_mechanism:
      name: Aktiveringsmekanisme
      description: 'Angiver, hvordan håndtaget aktiverer bremsesystemet: rent mekanisk
        kabeldrevet, fuldt hydraulisk, kabeldrevet hydraulisk eller elektronisk/trådløst.'
    actuation_method:
      name: Aktiveringsmetode
      description: Hvordan støjdæmpningssystemet aktiveres eller aflades.
    adapter_orientation:
      name: Adapterretning
      description: Angiver vinklen eller konfigurationen af en ventiladapter til cykeldæk,
        der påvirker pumpens tilgængelighed (f.eks. lige, 90°).
    additive_application_stage:
      name: Additiv påføringsfase
      description: Angiver, hvornår i processen produktet er beregnet til at blive
        brugt.
    adhesive_backing:
      name: Selvklæbende bagside
      description: Om den printbare silke har en klæbende bagside til påføring med
        selvklæbende tape.
    adhesive_formulation:
      name: Klæbende mikstur
      description: Angiver den kemiske base eller mikstur af klæbemidlet, såsom cyanoacrylat
        eller epoxy.
    adhesive_sides:
      name: Selvklæbende sider
      description: Angiver, om det smeltbare klæbemiddel er på den ene eller begge
        sider af tapen.
    adjunct_grain_processing_form:
      name: Supplerende kornforarbejdningsform
      description: Angiver den fysiske form eller forarbejdningsform af det tilsætningskorn,
        som det sælges til brygning (f.eks. flager, torrificeret, maltet, rå).
    adjustability_type:
      name: Justeringstype
      description: Angiver, hvilken type justering fjederbenet understøtter (hvis
        det er relevant).
    adjustable_cup_mutes:
      name: Justerbare kopdæmpere
      description: Angiver, om skålen er justerbar/aftagelig, og justeringsmåden.
    adjustable_zones:
      name: Justerbare zoner
      description: Identificerer, hvilke sektioner af basen der kan justeres uafhængigt.
    adjustment_type:
      name: Justeringstype
      description: Angiver om regulatoren er justerbar, og hvordan justeringen udføres.
    administration_method:
      name: Administrationsmetode
      description: Angiver, hvordan ormekuren gives til hesten (f.eks. oralt eller
        ved injektion), hvilket hjælper kunden med at overholde veterinæranvisninger
        og vælge en håndterbar anvendelsesmetode.
    advice_card_prompt_type:
      name: Type af rådgivningskort
      description: Type af prompt, der er trykt på kortet (eller mangel på prompt).
    aeration_method:
      name: Luftningsmetode
      description: Beskriver den type iltning, der leveres eller understøttes af beholderen,
        og som sikrer tilstrækkelig ilt til levende agn.
    aero_package_components:
      name: Aero-pakkekomponenter
      description: Angiver, hvilke vigtige aerodynamiske komponenter der er installeret
        på køretøjet (vælg alle, der gælder).
    aerodynamic_elements_included:
      name: Aerodynamiske elementer inkluderet
      description: Angiver, hvilke aerodynamiske komponenter der er inkluderet i formelbilen
        (vælg alle, der gælder, hvis understøttet).
    aftertouch_support:
      name: Aftertouch-understøttelse
      description: Hvorvidt controlleren understøtter aftertouch (kanal eller polyfonisk)
        på tangenter/pads.
    agave_content_classification:
      name: Agave-indholdsklassificering
      description: Angiver, om tequilaen er produceret af 100 % Blå Weber-agave eller
        om det er en mix, der indeholder mindst 51 % agavesukker.
    aida_cloth_count:
      name: Aida-stofantal
      description: Angiver stofantallet i Aida-stof (antal firkanter/sting pr. tomme),
        hvilket bestemmer stingstørrelsen og designets skala.
    aida_cloth_pre_cut_format:
      name: Aida-stof i forudskåret format
      description: Angiver, om Aida-stoffet sælges som et forudskåret stykke, et kontinuerligt
        udskåret stykke eller på rulle.
    air_bag_material:
      name: Airbag-materiale
      description: Angiver materialet i luftbeholderen, der anvendes i den irske sækkepibe.
    air_bed_internal_construction:
      name: Indvendig konstruktion af luftmadrasse
      description: Beskriver den interne understøttelse eller teknologi, der anvendes
        inde i luftmadrassen for komfort og stabilitet.
    air_dry_clay_color_form:
      name: Lufttørret lerfarvet form
      description: Hvorvidt leret sælges præfarvet, hvidt/neutralt til maling eller
        som en blanding/assortering.
    air_hockey_items_included:
      name: Airhockey-udstyr inkluderet
      description: Viser de specifikke tilbehørsdele, der er indeholdt i et sæt, så
        kunderne ved præcis, hvad de modtager (f.eks. 2 puffere, 4 pucks, 2 filtpuder).
    air_intake_temperature_sensor_mounting_style:
      name: Monteringsstil for luftindsugningstemperaturføler
      description: Den fysiske monteringsstil af IAT-sensoren i indsugningssystemet.
    air_integration_capability:
      name: Funktionalitet til luftintegration
      description: Angiver, om og hvordan dykkercomputeren understøtter trådløse flasketrykstransmittere.
    air_mattress_valve_type:
      name: Luftmadrassens ventiltype
      description: Angiver den ventiltype, som et tilbehør passer til eller indeholder,
        hvilket sikrer kompatibilitet mellem pumper, ventiler og reservedele.
    air_water_rocket_kit_items_included:
      name: Dele til luft- og vandraketsæt inkluderet
      description: Nøglekomponenter inkluderet i raketsættet (affyringsrampe, pumpe,
        finner, genopfyldningsdele).
    air_water_rocket_launch_method:
      name: Luft- og vandrakets affyringsmetode
      description: Hvordan raketten får tryk eller affyres (brugerinteraktion og udstyrets
        stil).
    airbag_position:
      name: Luftbeholders position
      description: Angiver den tilsigtede fastholdelsesposition/zone, som luftbeholderdelen
        understøtter.
    aircraft_ads_b_capability:
      name: Luftfartøjs ADS-B-kapacitet
      description: Angiver, om luftfartøjet er udstyret til overholdelse af ADS-B
        Out-reglerne.
    aircraft_airframe_material:
      name: Luftfartøjets stelmateriale
      description: Primære materialer, der anvendes i konstruktionen af flymodellen.
    aircraft_cabin_configuration:
      name: Flykabineindretning
      description: Angiver flyets layout (f.eks. konferencegruppe, sofa eller kabine
        med fire zoner).
    aircraft_documentation_included:
      name: Dokumentation for luftfartøjet inkluderet
      description: Viser en liste over dokumenter, der følger med delen (f.eks. 8130-3).
    aircraft_galley_configuration:
      name: Flykøkkenindretning
      description: Tilstedeværelse og type af kabys/catering-faciliteter i kahytten.
    aircraft_installation_location:
      name: Placering af luftfartøjsinstallation
      description: Hvor på luftfartøjet delen eller tilbehøret er installeret eller
        brugt.
    aircraft_internet_connection:
      name: Luftfartøjs internetforbindelse
      description: Angiver tilstedeværelsen/typen af internetforbindelse i kabinen.
    aircraft_landing_gear_type:
      name: Type landingsstel for luftfartøj
      description: Angiver landingsudstyrets konfigurationen for autogyroen.
    aircraft_lavatory_configuration:
      name: Konfiguration af luftfartøjets toilet
      description: Type af toiletkonfiguration ombord.
    aircraft_maintenance_program_enrollment:
      name: Tilmelding til flyvedligeholdelsesprogram
      description: Angiver, om luftfartøjet er tilmeldt et vedligeholdelsesprogram
        for motor og/eller flystel, og i så fald hvilken dækningstype der gælder (motor,
        flystel eller begge).
    aircraft_operational_certification:
      name: Operationel certificering af luftfartøjet
      description: Angiver det regulatoriske eller operationelle certificeringsgrundlag,
        under hvilket luftfartøjet opereres (jurisdiktionsafhængigt, f.eks. FAA Part
        91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Certificering af beskyttelsesudstyr til luftfartøjet
      description: Angiver den luftfarts-/regulerings- eller branchestandard, som
        beskyttelsesudstyret er certificeret til at opfylde.
    aircraft_system_application:
      name: Anvendelse af luftfartøjets system
      description: Identificerer, hvilket luftfartøjssystem eller -område delen/tilbehøret
        er en del af (bruges til at gennemse og filtrere på tværs af forskellige luftfartsdele).
    airflow_resistance_level:
      name: Luftmodstandsniveau
      description: Angiver, hvor restriktiv dæmperen føles med hensyn til modtryk/luftmodstand.
    airship_envelope_material:
      name: Luftskibets hylstermateriale
      description: Hovedmaterialet i luftskibets kappe (skrog).
    airsoft_part_type:
      name: Airsoft-deltype
      description: Identificerer den funktionelle komponent eller tilbehørstype til
        airsoft guns (f.eks. magasin, løb, håndbeskytter).
    airworthiness_approval_basis:
      name: Luftdygtighedens godkendelsesgrundlag
      description: Angiver godkendelses-/certificeringsgrundlaget for delen, hvor
        det er relevant (f.eks. PMA, TSO eller STC).
    alarm_volume_adjustability:
      name: Justering af alarmlydstyrke
      description: Angiver, om og hvordan alarmens lydstyrke kan justeres af brugeren.
    alcohol_ink_finish_effect:
      name: Alkoholblæk-finisheffekt
      description: Beskriver den visuelle effekt eller det visuelle finish, der produceres
        af alkoholblækmiksturen (ud over blot farve), såsom metallisk eller perlemorsfarvet.
    alignment_aid_style:
      name: Stil for justeringshjælp
      description: Beskriver typen af justeringsvejledninger, der er trykt på eller
        integreret i måttens overflade (f.eks. lige linjer, afstandsmarkører).
    alternator_cooling_type:
      name: Generatorkølingstype
      description: Beskriver, hvordan generatoren køles og ventileres.
    alternator_marine_ignition_protection_rating:
      name: Tændingsbeskyttelsens klassificering for generatorer til marineformål
      description: Angiver, om generatoren er tændingsbeskyttet til marine motorrum
        (f.eks. SAE J1171 / ISO 8846 compliance).
    alternator_mounting_configuration:
      name: Konfiguration af generatormontering
      description: Angiver den fysiske monteringskonfiguration, der bruges til at
        fastgøre generatoren til et motorbeslag.
    alternator_pulley_type:
      name: Generatorens remskivetype
      description: Angiver remskive-/koblingsdesignet på generatoren (eller at en
        remskive ikke medfølger).
    alternator_regulator_type:
      name: Generatorregulatortype
      description: Angiver, om spændingsregulatoren er intern i generatoren eller
        ekstern, og om den er OEM-styret (computer-/PCM-styret).
    alternator_terminal_connection_type:
      name: Terminal forbindelsestype for generatoren
      description: Den primære tilslutningstype for generatorens udgangs- og magnetiseringsterminaler,
        der sikrer kompatibilitet med ledningsnettet.
    altitude_suitability:
      name: Højdeegnethed
      description: Angiver, om bolden er konstrueret til en specifik højde, som påvirker
        hastighed og spring.
    ambulance_stretcher_mount_type:
      name: Ambulancebåremonteringstype
      description: Angiver den type bårelæsnings-/monteringssystem, der understøttes
        af ambulancen.
    american_football_safety_certification:
      name: Sikkerhedscertificering for amerikansk fodbold
      description: Angiver de sikkerhedscertificeringer eller -standarder, der er
        specifikke for amerikansk fodbold, som produktet opfylder.
    amplifier_tube_function:
      name: Forstærkerrørets funktion
      description: Angiver rørets funktionelle rolle i et instrumentforstærkerkredsløb
        (f.eks. forforstærker vs. effekt).
    analog_synthesizer_cv_gate_i_o:
      name: Analog synthesizer CV/Gate I/O
      description: Angiver de typer af styrespændings- og gate-tilslutninger, der
        understøttes til integration med modulært/analogt udstyr.
    analog_synthesizer_keybed_configuration:
      name: Konfiguration af analog synthesizer-taster
      description: Beskriver om synthesizeren har et indbygget tangentbord, og i så
        hvor mange tangenter den har.
    anchor_configuration:
      name: Ankerkonfiguration
      description: Angiver, om ophængningssystemet bruger et enkelt centralt forankringspunkt
        eller flere uafhængige forankringspunkter, hvilket påvirker øvelsesvariationen
        og kompleksiteten af træningen.
    animal_raising_method:
      name: Metode til dyreopdræt
      description: Beskriver den landbrugs- eller husdyrpraksis, der anvendes for
        kildedyret.
    animal_species:
      name: Dyrearter
      description: Angiver det dyr eller den skabning, der repræsenteres af tøjdyret
        (f.eks. bjørn, kanin, dinosaur).
    animal_trap_jaw_style:
      name: Dyrefældes kæbestil
      description: Indstilling af fældens kæber, som påvirker fastholdelseskraften
        og dyrets velfærd.
    animal_trap_type:
      name: Type dyrefælde
      description: Klassificerer fældens mekaniske stil/design, så kunderne hurtigt
        kan finde den præcise fangstmetode, de har brug for, eller som reglerne tillader.
    ankle_collar_style:
      name: Ankelkravestil
      description: Beskriver stilen eller konstruktionen af en skos ankelkrave, såsom
        low cut, mid cut, high cut, sokkrave eller snøreløs, som påvirker støtte,
        pasform og æstetik.
    ankle_guard_protection_level:
      name: Beskyttelsesniveau for ankelbeskyttere
      description: Vurderer den samlede mængde beskyttelse, som ankelbeskytteren yder.
    ankle_strap_padding_type:
      name: Ankelrems udfyldningstype
      description: Beskriver det stødabsorberende materiale eller den udfyldningstilgang,
        der anvendes inde i remmen, som påvirker komforten.
    ankle_strap_type:
      name: Type ankelrem
      description: Klassificerer konstruktionen eller designet af en ankelrem til
        snowboardbinding.
    ant_farm_habitat_medium_type:
      name: Type af substrat til myrekoloni
      description: Angiver den primære tunnel-/observationstype, der leveres eller
        kræves af myrekolonien.
    ant_farm_kit_contents:
      name: Myrekolonisæts indhold
      description: Angiver, hvilke dele der følger med myrefarmssættet (f.eks. terrarium,
        sand/gel, myrekort eller fodringsredskaber).
    ant_farm_lighting_type:
      name: Belysningstype for myrekoloni
      description: Angiver den indbyggede belysningstype (hvis relevant), der bruges
        til observation.
    antenna_fit_type:
      name: Antennemonteringstype
      description: Den antenneformfaktor, som antennekuglen er beregnet til at passe
        til.
    anti_caking_agent:
      name: Antiklumpningsmiddel
      description: Angiver typen af antiklumpningsmiddel, der er tilsat for at forhindre
        klumpning, information, der er vigtig for allergihensyn og præcision i opskriften.
    anti_g_suit_bladder_material:
      name: Materiale i anti-G-dragtens trykblære
      description: Materiale, der anvendes til den eller de indvendige oppustelige
        kamre i anti-G-dragten. Angiv alle relevante materialer, hvis der anvendes
        flere.
    anti_g_suit_connector_type:
      name: Tilslutningstype til anti-G-dragt
      description: Angiver typen/standarden for den luft-/trykslangetilslutning, der
        anvendes til tilslutning til flyet eller regulatoren.
    anti_g_suit_inflation_method:
      name: Metode til oppustning af anti-G-dragt
      description: Angiver, hvordan dragtens trykkamre fyldes med trykluft for at
        yde G-beskyttelse.
    anti_g_suit_size_system:
      name: Anti-G-dragtens størrelsessystem
      description: Størrelsesstandard, der bruges til at specificere dragtens størrelse/pasformsystem.
    anti_reverse_type:
      name: Anti-reverse-type
      description: Angiver typen af anti-reverse-mekanisme, der anvendes, som påvirker
        hook-indstillingen og back-play.
    anti_theft_feature:
      name: Tyverisikringsfunktion
      description: Angiver, om monteringen/holderen har tyverisikring, f.eks. med
        låsemekanisme eller et manipulationssikret design.
    antique_gun_ignition_system:
      name: Tændingssystem til antik pistol
      description: Angiver det historiske affyrings-/tændingssystem, der anvendes
        i det antikke skydevåben.
    apple_variety:
      name: Æblesort
      description: Angiver æblets sort (f.eks. Gala, Fuji eller Granny Smith), hvilket
        hjælper kunderne med at vælge ud fra smag, konsistens og anvendelse i madlavningen.
    applique_edge_finish:
      name: Applikationskantens finish
      description: Beskriver, hvordan kanterne er behandlet, hvilket påvirker look
        og modstandsdygtighed over for flosning.
    arbor_type:
      name: Buetype
      description: Inddeler rullen efter spoleakslens udformning, hvilket har indflydelse
        på lineindspolingshastigheden, kapaciteten til at hive linen tilbage og linens
        hukommelse.
    archery_accessory_type:
      name: Type bueskydningstilbehør
      description: Angiver typen af tilbehør beregnet til bueskydningsværktøj, så
        kunden hurtigt kan filtrere produkter.
    archery_part_type:
      name: Bueskydning – deltype
      description: Identificerer den specifikke hardware eller reservedel, der sælges
        (f.eks. buestang, buearm, buestreng), hvilket muliggør præcis filtrering uden
        at eksplodere kategoritræet.
    archery_range_accessory_type:
      name: Tilbehørstype til bueskydningsbane
      description: Klassificerer den specifikke type tilbehør, der bruges på en bueskydebane,
        så kunderne hurtigt kan filtrere efter præcis det tilbehør, de har brug for.
    archery_target_features:
      name: Funktioner i bueskydningsmål
      description: Oplister særlige funktions- eller brugervenlighedsfunktioner, der
        ikke er omfattet af andre egenskaber (f.eks. selvudlignende skum eller bærehåndtag).
    archery_tool_type:
      name: Bueskydningsværktøjstype
      description: Klassificerer den specifikke type bueskydningsværktøj eller -udstyr.
    armband_features:
      name: Armbåndets funktioner
      description: Angiver særlige funktionelle eller visuelle funktioner, der forbedrer
        armbåndet.
    armguard_style:
      name: Armbeskytterstil
      description: Definerer armbeskytterens konstruktionsstil eller formfaktor, hvilket
        giver et indblik i designdækning og et traditionelt udseende ifht. et moderne.
    armor_protection_type:
      name: Panserbeskyttelsestype
      description: Den beskyttelse, som køretøjets pansersystem giver.
    armrest_adjustability:
      name: Justerbarhed af armlæn
      description: Definerer den dimensionelle justerbarhed og konfiguration af stolens
        armlæn (f.eks. fast, 2D, 3D, flip-up).
    armrest_type:
      name: Armlænstype
      description: Beskriver tilstedeværelsen og justerbarheden af armlæn på stolen
        (f.eks. ingen armlæn, faste, justerbare, aftagelige).
    arrow_bolt_point_type:
      name: Pil-/boltspidstype
      description: Angiver udformningen af den spids eller det hoved, der er monteret
        på en pil eller en bolt.
    arrow_component_type:
      name: Pilkomponenttype
      description: Klassificerer den specifikke del eller tilbehør til en pil (indsats,
        omvikling, bøsning, lim osv.), så kunder kan filtrere varer uden behov for
        en række ekstra underkategorier.
    arrow_containment_level:
      name: Pilens indeslutningsniveau
      description: Beskriver, om den resterende del indeholder pilen helt, delvist
        eller slet ikke.
    arrow_fletching_orientation:
      name: Retning af pilens fjer
      description: Angiver vinge- eller forskydningsorienteringen af pilens fjer (f.eks.
        venstrevinge, højrevinge, spiralformet), der bestemmer pilens rotationsretning.
    arrow_nock_groove_size:
      name: Størrelsen på pilens nokrille
      description: Angiver størrelsesklassificeringen af nokkens strengrille/hals,
        hvilket afgør, om den passer til buestrengene med forskellige diametre.
    arrow_nock_type:
      name: Pilens kærvstype
      description: Design/stil for pilens kærv, der har kontakt med buestrengen.
    arrow_rest_style:
      name: Pilerests stil
      description: Angiver den funktionelle stil/mekanisme for pilen rest (f.eks.
        drop-away, blade, whisker biscuit). Stilen bestemmer, hvordan resten understøtter,
        indeholder og frigiver pilen, og er en primær måde, hvorpå kunder differentierer
        produkter.
    arrow_shaft_compatibility:
      name: Pileskaftkompatibilitet
      description: Angiver, hvilken pilestang-/bøsningsstandard den oplyste pilekærv
        passer til (f.eks. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Tip til kunst- og håndværksværktøjer
      description: Beskriver formen/profilen af arbejdsspidsen (f.eks. spids vs. afrundet
        kugle) for at angive, hvilken type prægninger den efterlader.
    art_ink_lightfastness_rating:
      name: Farveblæks lysægthed
      description: Angiver blækkets modstandsdygtighed over for falmning, når den
        udsættes for lys, typisk udtrykt via standardvurderinger.
    art_ink_opacity:
      name: Kunstblæks opacitet
      description: Angiver dækningsgraden af blækket efter påføring.
    art_security_rating:
      name: ART-sikkerhedsvurdering
      description: Angiver den hollandske ART-klassificering (1–5 stjerner), som låsen
        har fået.
    artichoke_cut:
      name: Artiskokudskæring
      description: Angiver, hvilken del eller tilberedning af artiskokken der tilbydes
        (f.eks. hel, hjerte, bund), så kunder forstår udbyttet og den tilsigtede kulinarisk
        anvendelse.
    artichoke_variety:
      name: Artiskoksort
      description: Angiver artiskokkens kultivar eller botaniske variant for at hjælpe
        kunderne med at skelne mellem størrelser, farver, smag og anvendelsesmuligheder
        i madlavningen.
    articulation_features:
      name: Artikulationsfunktioner
      description: Angiver, om dinosaurmodellen har bevægelige dele (bevægelig kæbe,
        lemmer, hale) og generel bevægelighed.
    artificial_bait_form:
      name: Formen på kunstigt agn
      description: Angiver fiskeagnets eller -blinkets fysiske form eller udseende.
    asa_mounting_type:
      name: ASA-monteringstype
      description: Angiver typen af luftkildeadapterens (Air Source Adapter – ASA)
        grænseflade eller monteringsstandard, som drop forward'en bruger (f.eks. svalehale,
        skinne, direkte montering).
    ascender_descender_type:
      name: Ascender-/descender-type
      description: Inddeler klatreudstyret efter type (opstignings- eller nedstigningsredskab),
        så det er muligt at filtrere mere effektivt.
    aspiration_type:
      name: Aspirationstype
      description: Angiver, hvordan motoren aspirerer/boostes.
    assembly_state:
      name: Monteringsstatus
      description: Angiver, om skabet er færdigsamlet, forsamlet eller i en anden
        form.
    assistance_mechanism:
      name: Assistancemekanisme
      description: Angiver eventuelt indbygget assistance- eller modstandssystem,
        som power tower'et tilbyder til pull-ups, dips eller andre øvelser.
    atemoya_cultivar:
      name: Atemoyasort
      description: Angiver den navngivne kultivar/sort af atemoyafrugten, hvilket
        giver kunden mulighed for at vælge frugter med den smag, størrelse eller frøkarakteristika,
        de foretrækker.
    athletic_cup_size:
      name: Atletisk skålstørrelse
      description: Angiver den producentangivne størrelse på beskyttelseskoppen for
        at sikre korrekt pasform for atleten.
    attachment_position:
      name: Vedhæftningsposition
      description: Angiver, hvor på sadlen eller rytteren tasken er beregnet til at
        blive fastgjort.
    attractant_scent_profile:
      name: Lokkemidlets duftprofil
      description: Beskriver den specifikke lugt eller smag, der bruges til at tiltrække
        dyreliv eller maskere menneskelig duft.
    atv_utv_intended_use:
      name: Tilsigtet brug af ATV/UTV
      description: Primær tilsigtet anvendelse/stil for ATV/UTV'en.
    audio_channel_configuration:
      name: Konfiguration af lydkanal
      description: Antallet af separate lydkanaler, der understøttes af equalizer/DSP
        (f.eks. 2-kanals stereo, 4-kanals for/bag, 6-kanals).
    audio_inputs:
      name: Lydindgang
      description: Angiver de typer lydindgangsforbindelser, der er tilgængelige til
        sampling/optagelse (f.eks. 1/4"-linjeindgang, XLR, 3,5 mm, mikrofonforforstærker,
        phono).
    audio_output:
      name: Lydudgang
      description: Angiver, om legetøjet afgiver lyd, og hvordan lyden leveres.
    audio_outputs:
      name: Lydudgange
      description: Angiver den tilgængelige lydudgangsforbindelse, inklusive hovedudgange
        og eventuelle tildelbare udgange eller aux-udgange.
    audio_playback_source:
      name: Kilde til lydafspilning
      description: Primære mediekilder, som karaoke-sættet kan afspille musik fra.
    autograph_authentication:
      name: Autografgodkendelse
      description: Angiver godkendelsesstatus/-typen for en autograf på kortet.
    autograph_format:
      name: Autografformat
      description: Beskriver, om signaturen er en original håndskrevet autograf, en
        stemplet/trykt faksimile eller en indskrift/tilføjelse.
    autogyro_cockpit_enclosure:
      name: Kabineafskærmning til autogyro
      description: Angiver, om cockpittet er åbent eller lukket.
    available_firing_modes:
      name: Tilgængelige skydemåder
      description: Viser de skydemåder, som markøren understøtter som standard.
    avocado_variety:
      name: Avocadosort
      description: Angiver avocadoens kultivar eller sort, hvilket hjælper kunden
        med at skelne mellem forskelle i smag, tekstur, størrelse og olieindhold.
    award_customization_included:
      name: Præmietilpasning inkluderet
      description: Angiver, hvilken personlig tilpasning der følger med køb af præmien.
    award_material:
      name: Præmiemateriale
      description: Identificerer det/de primære materiale(r) i præmiegenstanden (trofæ,
        plakette, medalje, nål, bånd).
    award_mounting_display_type:
      name: Præmiemonterings-/udstillingstype
      description: Angiver, hvordan præmien skal vises eller monteres (væg vs. computer
        vs. bærbar).
    award_plaque_plate_material:
      name: Materiale til præmieplaketten
      description: Angiver materialet i den navneskilt/indgraveringsplade, der er
        fastgjort til plaketten (forskelligt fra bagsidematerialet).
    award_ribbon_attachment_type:
      name: Fastgørelsestype for præmiebånd
      description: Angiver, hvordan båndet er beregnet til at blive fastgjort eller
        båret.
    award_ribbon_imprint_method:
      name: Metode til impressum på præmiebånd
      description: Angiver, hvordan tekst/grafik påføres på båndet.
    award_ribbon_material:
      name: Materiale til præmiebånd
      description: Primært materiale til båndstoffet (f.eks. satin eller polyester).
    award_ribbon_placement_title:
      name: Placering af præmiebånd/titel
      description: Standardplaceringen eller titlen, der formidles af båndet (f.eks.
        1. plads, deltager).
    axle_compatibility:
      name: Akselkompatibilitet
      description: Angiver den akselstandard, som hjulet passer til, hvilket sikrer
        kompatibilitet med stellet og forgaflen.
    back_beam_type:
      name: Bagbjælketype
      description: Rygstøttens type/justerbarhed (f.eks. almindelig eller justerbar
        i højden).
    back_design:
      name: Bagdesign
      description: Specificerer bemærkelsesværdige rygkonstruktioner på beklædningsgenstande,
        der påvirker styling og støtte.
    back_panel_type:
      name: Bagpaneltype
      description: Angiver stilen eller materialet på kabinettets bagpanel, hvilket
        påvirker skærmens synlighed og indretningens matchning.
    back_sides_material:
      name: Materiale bagpå og på siderne
      description: Angiver det materiale, der bruges til bagsiden og siderne af den
        klassiske guitarkrop.
    backing_type:
      name: Bagsidestype
      description: Beskriver bagsiden/fastgørelsesstilen på det solgte rhinstensstykke
        (for selvklæbende produkter).
    backup_camera_mounting_location:
      name: Back-up-kameras monteringslokation
      description: Angiver den tilsigtede installationsplacering på køretøjet for
        back-up-kameraet.
    backup_camera_video_interface:
      name: Back-up-kameraets videogrænseflade
      description: Angiver den videoudgang, grænseflade eller det forbindelseskomponent,
        der bruges af back-up-kameraet til at tilslutte en skærm, DVR eller hovedenhed
        (f.eks. composite RCA, LVDS OEM, IP over Ethernet).
    badminton_set_components_included:
      name: Inkluderede badmintonsætdele
      description: Viser individuelle genstande i et badmintonsæt.
    bag_attachment_method:
      name: Fastgørelsesmetode for taske
      description: Angiver den primære metode, der bruges til at fastgøre væsketasken/-holderen
        til andet udstyr (f.eks. MOLLE-stropper, bæltestrop, karabinhage).
    bag_case_carrying_style:
      name: Bærestil for taske/æske
      description: Angiver den primære samlede bæreformfaktor for æsken/gigbag'en
        (hvordan den er bygget til at blive båret).
    bag_cover_material:
      name: Sækkens dækmateriale
      description: Angiver materialet til posebetrækket (ydre betræk), hvilket påvirker
        holdbarhed, greb og udseende.
    bag_embellishment:
      name: Taskeudsmykning
      description: Beskriver fremtrædende dekorative elementer på taskens yderside,
        såsom kvaster, nitter eller quiltning.
    bag_fill_medium:
      name: Fyldemateriale til beholderen
      description: Identificerer det stof, der bruges til at fylde eller sætte beholderen
        under tryk (f.eks. luft, vand, sand).
    bag_material:
      name: Beholderens materiale
      description: Materiale i luftbeholderen/blæren.
    bag_padding_level:
      name: Polstringsniveau i tasken
      description: Angiver graden eller stilen af udfyldning, der er indarbejdet i
        posen eller omslaget.
    bag_size_descriptor:
      name: Beskrivelse af beholderens størrelse
      description: Markedsføringsstørrelse for skuldertasken (f.eks. mini eller stor),
        der supplerer de nøjagtige mål.
    bagel_size:
      name: Bagelstørrelse
      description: Angiver bagelens generelle størrelse, f.eks. mini, tynd, standard,
        stor, ekstra stor eller jumbo.
    bagpipe_accessories_included:
      name: Sækkepibetilbehør medfølger
      description: Viser en liste over de vigtigste komponenter/tilbehør, der følger
        med sækkepiben (ud over selve piberne), f.eks. etui, øvepibe, overtræk, snore
        og fugtighedsregulator.
    bagpipes_playing_mode:
      name: Spilfunktion for sækkepibe
      description: Hvordan instrumentet forsynes med luft under spil.
    bait_compatibility:
      name: Lokkemadskompatibilitet
      description: Her vises de agntyper, som tilbehøret til pellets er beregnet til
        at fungere sammen med, så lystfiskere kan sikre sig, at det valgte redskab
        passer til deres foretrukne agn.
    bait_species:
      name: Agnarter
      description: Angiver den primære organisme, der anvendes som agn, hvilket hjælper
        lystfiskere med at sikre, at fiskeriet er lovligt, og at agnet er effektivt
        over for den pågældende art.
    baking_chip_form:
      name: Bagechips' form
      description: Beskriver bagechipsenes fysiske størrelse eller form, hvilket har
        indflydelse på smelteegenskaberne og opskriftens udseende.
    balance_board_style:
      name: Balanceboardstil
      description: Klassificerer balanceboards efter deres mekanisme eller konstruktionstype
        for at angive, hvordan brættet bevæger sig, og hvilken træningsudfordring
        det giver.
    balance_cushion_accessories_included:
      name: Tilbehør til balancepude medfølger
      description: Viser alt tilbehør, der følger med puden, så kunden kan sammenligne
        sampak-værdien.
    balance_type:
      name: Balancetype
      description: Angiver drivakslens balanceringstilstand/-grad ved salg (f.eks.
