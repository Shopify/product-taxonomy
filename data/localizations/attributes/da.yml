---
da:
  attributes:
    3d_glasses_fit_design:
      name: 3D-brilledesign
      description: Angiver hvordan brillerne bæres eller fastgøres (f.eks. clip-on,
        wrap-around, fit-over)
    3d_glasses_material:
      name: Materiale til 3D-briller
      description: Angiver det materiale, der bruges til 3D-briller, f.eks. bambus
        eller rustfrit stål
    3d_glasses_technology:
      name: 3D-brilleteknologi
      description: Angiver 3D-billede/synkroniseringsteknologien, som brillerne er
        designet til, hvilket bestemmer deres kompatibilitet med specifikke skærme
        eller projektorer
    3d_printer_case_style:
      name: 3D-printeretuistil
      description: Klassificerer den overordnede produkttype, så kunderne kan skelne
        mellem bløde bæretasker, hårde etuier, faste kabinetter og enkle støvovertræk
    3d_printer_cleaning_kit_components_included:
      name: Rengøringssæt til 3D-printer inkluderet
      description: Viser de individuelle værktøjer og forbrugsvarer, som sættet indeholder,
        så kunderne ved præcis, hvad de køber
    3d_printing_resin_type:
      name: Type af harpiks til 3D-print
      description: Angiver harpiksens sammensætning eller tilsigtede anvendelse, så
        kunderne hurtigt kan se, om harpiksen er standard, ingeniørkvalitet, kan støbes
        eller er af en anden specialtype
    80_plus_efficiency_rating:
      name: 80 Plus-effektivitetsvurdering
      description: Angiver det officielle certificeringsniveau for 80 Plus-energieffektiviteten,
        som PSU'en har opnået.
    abrasive_material:
      name: Slibende materiale
      description: Identificerer typen af slibemiddel, der bruges i slibeværktøjer,
        f.eks. diamant eller silikonecarbid
    absinthe_style:
      name: Absintstil
      description: Definerer stilarten for absint, f.eks. blandet, destilleret
    absinthe_variety:
      name: Absintvariant
      description: Differentierer absintprodukter ud fra deres unikke varianter, f.eks.
        rouge, verte
    absorbency_level:
      name: Absorberingsniveau
      description: Definerer absorberingsevnen, typisk for personlige plejeartikler;
        f.eks. natten over, lys
    absorbent_hygiene_product_features:
      name: Funktioner for absorberende hygiejneprodukter
      description: Identificerer særlige egenskaber for hygiejneprodukter, f.eks.
        lækagesikker eller hypoallergen
    academic_level:
      name: Akademisk niveau
      description: Angiver det akademiske niveau af medieindhold, f.eks. bachelor-
        eller doktorgrad
    accessibility_design_features:
      name: Funktioner til tilgængelighedsdesign
      description: Viser særlige designelementer, der hjælper brugere med høre-, syns-
        eller fingerfærdighedsudfordringer.
    accessory_material:
      name: Materiale til tilbehør
      description: Angiver typen af materiale i tilbehør, typisk til forsendelsesforsyninger;
        dvs. plast, pap
    accessory_size:
      name: Tilbehørsstørrelse
      description: Definerer størrelsen på et tilbehørsprodukt, f.eks. one-size eller
        kompakt
    accordion_tuning:
      name: Stemning af harmonika
      description: Angiver den type tuning, der bruges i en harmonika, f.eks. tør
        eller koncertpitch
    activation_mechanism:
      name: Aktiveringsmekanisme
      description: Angiver den primære metode der udløser alarmen.
    activation_method:
      name: Aktiveringsmetode
      description: Beskriver, hvordan den forudbetalte kredit eller SIM-kortet aktiveres
        af brugeren.
    active_ingredient:
      name: Aktiv ingrediens
      description: Identificerer primære stoffer i personlige plejeartikler, f.eks.
        vitamin A, retinol
    activewear_clothing_features:
      name: Funktioner for sportstøj
      description: Identificerer unikke egenskaber for aktivt tøj, f.eks. fire-vejs
        stræk eller åndbart design
    activity:
      name: Aktivitet
      description: Angiver den sport eller aktivitet, produktet er designet til, f.eks.
        tennis eller pilates
    activity_tracker_design:
      name: Aktivitetsmålerdesign
      description: Angiver, hvordan aktivitetsmåleren bæres, f.eks. clip-on, armbind
    acupuncture_model_format:
      name: Akupunkturmodelformat
      description: Definerer størrelsen og skalaen for akupunkturmodeller, f.eks.
        i naturlig størrelse, miniature
    acupuncture_model_type:
      name: Akupunkturmodeltype
      description: 'Angiver den/de kropsdel(e), som akupunkturmodellen repræsenterer,
        f.eks. hoved, hånd, dyr '
    adapter_directionality:
      name: Adapterretningsbestemmelse
      description: Angiver om adapteren understøtter signalstrøm i begge retninger
        eller kun i én specificeret retning.
    adapter_operating_modes:
      name: Tilstande for adapterbetjening
      description: Angiver om adapteren fungerer som en Bluetooth-modtager, -sender
        eller begge
    adaptive_sync_technology:
      name: Adaptiv synkroniseringsteknologi
      description: Angiver den variable opdateringshastigheds-teknologi (VRR), som
        skærmen understøtter, for at sikre billeder uden tearing.
    adc_resolution:
      name: ADC-opløsning
      description: Angiver opløsningen (i bits) af den integrerede analog-til-digital-konverter,
        som definerer målepræcisionen
    additional_animation_software_features:
      name: Yderligere funktioner for animationssoftware
      description: Specificerer unikke funktioner i softwaren til animering som f.eks.
        karakteranimation eller visuelle effekter
    additional_cleaning_technology:
      name: Yderligere rengøringsteknologi
      description: Angiver eventuelle rengøringsteknologier, som er inkluderet, ud
        over damp (f.eks. ultralyd, UV, ozon).
    additional_design_software_type:
      name: Yderligere type af designsoftware
      description: Specificerer yderligere muligheder for designsoftware som f.eks.
        virtuel rundvisning eller landskabsdesign
    additional_financial_software_features:
      name: Yderligere funktioner for finansiel software
      description: Identificerer ekstra kapaciteter ved finansiel software ligesom
        aktivstyring eller revision og compliance
    additional_graphic_software_features:
      name: Yderligere funktioner for grafiksoftware
      description: Fremhæver ekstra muligheder ved grafisk software ligesom digital
        illustration eller layoutdesign
    additional_publishing_software_features:
      name: Yderligere funktioner for udgivelsessoftware
      description: Fremhæver ekstra funktionaliteter i software til publicering ligesom
        printdesign eller digital publicering
    additional_security_software_features:
      name: Yderligere funktioner for sikkerhedssoftware
      description: Identificerer ekstra kapaciteter i sikkerhedssoftware, f.eks. diskkryptering,
        registrering af indtrængen
    adhesive_application_type:
      name: Klæbemiddelpåføringstype
      description: Definerer den tilsigtede vippeservice eller brugssituation for
        klæbemidlet.
    adhesive_features:
      name: Klæbefunktioner
      description: Fremhæver specielle egenskaber ved klæbemidlet brugt på plastre
        eller tape.
    adhesive_format:
      name: Klæbemiddelformat
      description: Angiver den fysiske form som klæbemidlet leveres i til reparationsbrug.
    adhesive_strength:
      name: Klæbeevne
      description: Angiver klæbeevnen eller løftekraften for næsestrips’ klæbemiddel
        (f.eks. original, ekstra stærk).
    adhesive_type:
      name: Klæbende type
      description: Identificerer typen af klæbemiddel, der bruges i et produkt, f.eks.
        aftagelig eller permanent
    aftershave_product_form:
      name: Produktform for aftershave
      description: Identificerer konsistensen af et aftershave-produkt som f.eks.
        balsam eller creme
    age_group:
      name: Aldersgruppe
      description: Definerer målalderintervallet for et produkt, f.eks. voksne eller
        børn
    age_restrictions:
      name: Aldersbegrænsninger
      description: Angiver minimumsalderen for et produkt eller et arrangement, f.eks.
        18 år eller ældre
    ai_application:
      name: AI-anvendelse
      description: Angiver funktionen af kunstig intelligens i en software, f.eks.
        forudsigende analyse eller talegenkendelse
    air_freshener_form:
      name: Luftfriskerform
      description: Definerer typen af luftfriskere til biler, f.eks. olie, ventilationsclips
    air_fryer_functions:
      name: Airfryer-funktioner
      description: Viser en liste med de forskellige tilberedningsmetoder til en airfryer
        eller et lignende apparat, f.eks. airfryer eller bagning
    air_mattress_features:
      name: Funktioner for luftmadras
      description: Beskriver unikke egenskaber for en luftmadras, f.eks. nem at puste
        op eller punkteringssikker
    air_tube_configuration:
      name: Luftslangekonfiguration
      description: Angiver antallet eller typen af luftfyldningsrør, der er integreret
        i manchetten.
    airbrush_feed_type:
      name: Feedtype for airbrush
      description: Identificerer metoden til påføring af maling i airbrushes, f.eks.
        tyngdekraft eller sifon
    airbrush_operation_method:
      name: Driftsmetode for airbrush
      description: Specificerer betjeningsstilen for luftpensler, for eksempel dobbeltvirkende
        eller enkeltvirkende
    aircraft_engine_configuration:
      name: Konfiguration af flymotor
      description: Angiver antallet af motorer, der driver flyet, f.eks. enkelt- eller
        dobbeltmotorer
    aircraft_engine_type:
      name: Flyets motortype
      description: Angiver den motortype, der driver flyet, såsom jet eller turboprop
    airflow_opening_design:
      name: Luftstrømsåbningens design
      description: Beskriver åndedræts- eller ventilationskonfigurationen indbygget
        i mundstykket.
    airsoft_equipment_included:
      name: Airsoft-udstyr medfølger
      description: Angiver ekstra udstyr, der leveres sammen med airsoft-produkter,
        f.eks. sikkerhedsbriller eller taktisk vest
    album_type:
      name: Albumtype
      description: Beskriver bindingsstilen for scrapbogs- eller stempelsæt, f.eks.
        spiralbundet, scrapbog
    alcohol/solvent_content:
      name: Alkohol-/opløsningsmiddelindhold
      description: Klassificerer produktet baseret på alkohol- eller opløsningsmiddelindhold
        til forsendelses- og reguleringsformål (f.eks. alkohol ≤24%, alkohol >24%,
        lille beholder med opløsningsmiddel)
    alcohol_content:
      name: Alkoholindhold
      description: Angiver om toneren er alkoholfri eller ikke, og i så tilfælde hvor
        meget alkohol formlen cirka indeholder.
    alert_type:
      name: Advarselstype
      description: Angiver den type advarsel et produkt giver, f.eks. lydalarmer eller
        smartphone-notifikationer
    allergen_information:
      name: Oplysninger om allergener
      description: Angiver potentielle allergener i mad eller drikkevarer, f.eks.
        hvede eller jordnødder
    allergen_test_type:
      name: Allergentesttype
      description: Angiver den allergentype, som testsættet er designet til at detektere,
        f.eks. mad eller miljømæssig påvirkning
    allergens:
      name: Allergener
      description: Angiver potentielle allergener i sundheds- og skønhedsprodukter,
        f.eks. linalool eller limonen
    allergy_friendly_features:
      name: Allergivenlige funktioner
      description: Identificerer om et produkt har allergivenlige egenskaber, f.eks.
        latexfri eller modstandsdygtig over for skimmelsvamp
    amino_acid_subtype:
      name: Aminosyreundertype
      description: Angiver den primære type eller profil af aminosyrer indeholdt i
        kosttilskuddet.
    amplifier/booster_suitable_location:
      name: Passende placering af forstærker/booster
      description: Angiver de bedste placeringer for forstærker eller signalforstærker,
        f.eks. køretøjer eller store spillesteder
    amplifier_class:
      name: Forstærkerklasse
      description: Definerer typen af forstærker, f.eks. AB eller D
    amplifier_configuration:
      name: Forstærkerkonfiguration
      description: Angiver opsætningen af forstærkere til motorkøretøjer, f.eks. to-
        eller fire-kanal
    amputation_level:
      name: Amputationsniveau
      description: Angiver amputationsniveauet, som stump-kompressionsbandagen er
        beregnet til.
    analyte_measured:
      name: Analysestof målt
      description: Identificerer biomarkøren(e) som kontrolløsningen bruges til at
        kalibrere.
    anamorphic_squeeze_ratio:
      name: Anamorfisk klemmeforhold
      description: Angiver den horisontale kompressionsfaktor for et anamorfisk objektiv,
        hvilket giver brugerne mulighed for at matche objektiver med deres ønskede
        desqueeze-output.
    anatomical_detail_displayed:
      name: Anatomisk detalje vist
      description: Angiver hvilke anatomiske eller meridianfunktioner der er fremhævet
        på modellen.
    anchor_type:
      name: Ankertype
      description: Definerer det anker, der bruges i udstyr til vandsport, hvor man
        trækkes, f.eks. fluke eller plov
    anemometer_application:
      name: Anvendelse af anemometer
      description: Identificerer den tiltænkte anvendelse af et anemometer, f.eks.
        industriel eller meteorologisk
    angles_supported:
      name: Understøttede vinkler
      description: Angiver udvalget af vinkler, som et produkt kan tilbyde, typisk
        for elektronik; f.eks. justerbar, 0° til 180°
    angling_style:
      name: Vinklingsstil
      description: Definerer den fisketeknik, produktet er designet til, f.eks. surfcasting
        eller fluefiskeri
    animal_feed_form:
      name: Form af dyrefoder
      description: Angiver formen for dyrefoder, f.eks. væske eller granulater
    animal_type:
      name: Dyretype
      description: Angiver den type dyr, et produkt er beregnet til, f.eks. ænder,
        hjorte eller hunde
    answering_machine_type:
      name: Telefonsvarertype
      description: Angiver tilstedeværelsen af og teknologien i en integreret telefonsvarer
    antenna_connector_type:
      name: Antennestiktype
      description: Angiver RF-stikket brugt til at tilslutte eksterne antenner
    antenna_rf_connector_type:
      name: Antenne-RF-stiktype
      description: Identificerer RF-stikket brugt af antennen.
    antenna_type:
      name: Antennetype
      description: Angiver typen af antenne til elektroniske enheder, f.eks. omnidirektionel,
        gitter
    anti_agin_skin_care_type:
      name: Hudplejetype for anti-aging
      description: Klassificerer typen af anti-aging hudpleje, f.eks. maske, skintonic
    anti_perspirant_strength_level:
      name: Antiperspirantstyrkeniveau
      description: Betegner antiperspirantens effektivitetsklassifikation (f.eks.
        klinisk styrke, sportsstyrke).
    antibody_class_tested:
      name: Antistofklasse testet
      description: Angiver immunglobulinet eller biomarkøren som sættet detekterer
        (f.eks. IgE, IgG4).
    antifreeze_type:
      name: Frostvæsketype
      description: Angiver typen af frostvæske til vedligeholdelse af køretøjer, f.eks.
        koncentrat, forfortyndet
    antique_car_design:
      name: Antik bildesign
      description: Beskriver den primære designstil for en antik bil, såsom t-bucket
        eller grand tourer
    antique_vehicle_era:
      name: Æra for antik bil
      description: Beskriver den historiske periode for en antikt bil, såsom messingæra
        eller vintage-æra
    appliance_board_function:
      name: Apparatets kortfunktion
      description: Angiver kortets funktionelle rolle i apparatet.
    appliance_unit_location:
      name: Apparatets enhedsplacering
      description: Angiver den fysiske del af apparatet, som kortet er beregnet til
        (f.eks. indendørs- eller udendørsenhed).
    application_area:
      name: Anvendelsesområde
      description: Angiver den kropsdel eller det område, hvor produktet påføres,
        f.eks. læber, fuld krop
    application_method:
      name: Anvendelsesmetode
      description: Definerer, hvordan et produkt påføres eller bruges, f.eks. gel,
        væske, spray
    application_type:
      name: Anvendelsestype
      description: Angiver om behandlingen skal blive siddende eller skylles ud samt
        eventuel særlig anvendelsesmetode.
    applicator_format:
      name: Applikatorformat
      description: Beskriver lotion- eller solcremesapplikatorens fysiske form eller
        type.
    applicator_material:
      name: Applikatormateriale
      description: Angiver det materiale, der anvendes i applikatoren, typisk for
        tamponer; f.eks. plast, pap
    applicator_type:
      name: Applikatortype
      description: Identificerer typen af applikator, der følger med tamponer, f.eks.
        applikator, ikke-applikator
    applique/patch_shape:
      name: Applikation/lappeform
      description: Beskriver formen for appliquéer eller lapper, f.eks. dyr eller
        geometrisk
    applique_shape:
      name: Applikationsform
      description: Beskriver formen på appliqué-artikler, f.eks. blomster eller dyr
    aquarium_filter_features:
      name: Filterfunktioner for akvarium
      description: Beskriver særlige egenskaber for akvariefiltre, f.eks. hurtigt
        patronskift, flertrinsfiltrering
    aquarium_light_spectrum:
      name: Lysspektrum til akvarie
      description: Angiver typen af lysspektrum til lamper til akvarier, f.eks. blåt,
        dagslys
    aquarium_overflow_box_design:
      name: Overløbskassedesign til akvarium
      description: Beskriver opsætningsstilen for en overløbskasse til akvarier som
        f.eks. ekstern eller hængende
    archery_activity:
      name: Bueskydningsaktivitet
      description: Angiver typen af bueskydning, f.eks. udendørs jagt, måltræning
    archery_equipment_included:
      name: Bueskydningsudstyr medfølger
      description: Angiver inkluderet tilbehør til bueskydning, f.eks. stabilisatorbeslag,
        sikkerhedsbrillepile
    archery_style:
      name: Bueskydningsstil
      description: Definerer den specifikke type bueskydning, produktet er designet
        til, f.eks. 3D-bueskydning, buejagt
    archery_target_type:
      name: Type af bueskydningsskive
      description: Angiver typen af bueskydningsskive, der er designet til forskellige
        skydeøvelser, f.eks. 3D-mål eller taskemål
    aromatherapy:
      name: Aromaterapi
      description: Angiver den anvendte duft eller æteriske olie, f.eks. eukalyptus,
        lavendel
    arrangement:
      name: Arrangement
      description: Angiver, hvordan blomster arrangeres eller præsenteres, f.eks.
        vase, kurv
    arrow/bolt_material:
      name: Pil/bolt-materiale
      description: Identificerer byggematerialet af pile eller bolte, f.eks. aluminium
        eller bambus
    arrow_fletching_material:
      name: Materiale til styrefjer til pil
      description: Identificerer det materiale, der bruges i styrefjer til pile, f.eks.
        syntetisk eller plast
    arrow_material:
      name: Pilemateriale
      description: Identificerer kompositionen af pile, f.eks. bambus eller glasfiber
    art/crafting_tool_material:
      name: Materiale til værktøjer til håndarbejde
      description: Identificerer hovedmaterialet i kunst- eller håndværksværktøjer,
        f.eks. træ eller metal
    art_fixative_application_method:
      name: Kunstpåføringsmetode
      description: Beskriver, hvordan et fiksérmidler påføres, f.eks. aerosol eller
        børst-på
    art_movement:
      name: Kunstretning
      description: Definerer et maleris stilistiske tilgang eller kunstretning, f.eks.
        impressionisme eller ekspressionisme
    art_style:
      name: Kunststil
      description: Beskriver den æstetiske stil for et produkt, f.eks. art nouveau
        eller typografi
    artwork_authenticity:
      name: Kunstværks autenticitet
      description: Angiver kunstværkets autenticitet og specificerer, om det er en
        original kreation eller en reproduktion
    artwork_frame_material:
      name: Rammemateriale til kunstværk
      description: Identificerer det materiale, der bruges i kunstrammer, f.eks. træ
        eller forgyldt
    artwork_type:
      name: Kunsttype
      description: Angiver stilen for digitale kunstværker, f.eks. typografi eller
        digitalt maleri
    assisted_braking_technology:
      name: Assisteret bremseteknologi
      description: Angiver typen af assisteret bremsning i sikringsenheder, f.eks.
        aktiv, passiv
    attachment_method:
      name: Vedhæftningsmetode
      description: Definerer den metode, der bruges til at fastgøre eller fiksere
        produktet, f.eks. velcro, clip-on
    attachment_options:
      name: Vedhæftningsmuligheder
      description: Angiver metoderne til fastgørelse eller sikring af et produkt,
        f.eks. snor
    attachment_type:
      name: Vedhæftningstype
      description: Definerer metoden for produktfastgørelse eller sammenkobling, f.eks.
        burrebånd.
    atv/off_road_tire_type:
      name: ATV/offroad-dæktype
      description: Identificerer den specifikke brug af ATV eller off-roaddæk, f.eks.
        sand eller mudder
    audio/scan_converter_features:
      name: Funktioner for lyd-/scanningskonverter
      description: Beskriver mulighederne, som en lyd-/scanningskonverter tilbyder,
        f.eks. automatisk konvertering eller fjernbetjening
    audio/video_cable_connector_type_end_a:
      name: Lyd-/videokabelstiktype (ende A)
      description: Specificerer det nøjagtige stik eller interface til stede i den
        første ende (ende A) af kablet.
    audio/video_cable_connector_type_end_b:
      name: Lyd-/videokabelstiktype (ende B)
      description: Specificerer det nøjagtige stik eller interface til stede i den
        anden ende (ende B) af kablet.
    audio_bypass_type:
      name: Lyd-bypass-type
      description: Angiver hvordan lydsignalet dirigeres når effekten er deaktiveret
        (f.eks. true bypass, buffered, relay)
    audio_cassette_tape_type:
      name: Lydkassettebåndtype
      description: Specificerer IEC-båndformuleringen (bias) for lydkassetter.
    audio_codecs/formats_supported:
      name: Understøttede lyd-codecs/formater
      description: Angiver de lydfiltyper et produkt kan afspille, f.eks. WAVE eller
        MP3
    audio_component_form_factor:
      name: Lydkomponent-formfaktor
      description: Definerer komponentens fysiske type eller installationsformat
    audio_connectivity:
      name: Lydforbindelse
      description: Definerer de typer lydforbindelse, som et produkt understøtter,
        f.eks. HDMI eller USB
    audio_conversion_direction:
      name: Lydkonverteringsretning
      description: Specificerer den signalstrøm, som konverteren understøtter (f.eks.
        analog-til-digital, digital-til-analog, tovejs).
    audio_converter_features:
      name: Funktioner for lydkonverter
      description: Skitserer hovedfunktionerne for en lydkonverter, f.eks. AI-drevet
        eller analog support
    audio_d/a_converter_dac:
      name: Audio D/A-konverter (Dac)
      description: Angiver typen af digital til analog (DAC)-konverter i lydenheder,
        f.eks. USB, optisk
    audio_duplex_capability:
      name: Lyd-dupleks-kapacitet
      description: Angiver om enheden understøtter fuld-dupleks (simultan tovejs)
        eller halv-dupleks lydkommunikation
    audio_mixer_type:
      name: Lydmixertype
      description: Identificerer typen af lydmixer som f.eks. analog eller streaming
    audio_output_channel:
      name: Lydudgangskanal
