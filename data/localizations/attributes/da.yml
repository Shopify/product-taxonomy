        er inkluderet.
    batting_helmet_accessories_included:
      name: Tilbehør til batting-hjelm inkluderet
      description: Viser en liste over de beskyttende eller visuelle tilbehørsdele,
        der følger med batting-hjelmen.
    batting_stuffing_form_factor:
      name: Formfaktor for batting og fyldmateriale
      description: Angiver om produktet sælges som løst fyld, ark, ruller, præskårne
