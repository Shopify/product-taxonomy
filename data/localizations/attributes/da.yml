      name: Kontaktstammekompatibilitet
      description: Angiver, hvilke mekaniske eller andre switch-stem-typer tastaturet
        eller tastsættet passer til.
    switching_layer:
      name: Switchlag
      description: Angiver det højeste OSI-lag, som switchen oprindeligt opererer
        på (f.eks. lag 2, lag 3, hybrider).
    switching_method:
      name: Skiftemetode
      description: Definerer den metode, der bruges til at skifte mellem forskellige
        input i elektroniske produkter; f.eks. fjernbetjening
    synthesis_method:
      name: Syntesemetode
      description: Angiver metoden til lydsyntese i elektroniske instrumenter, f.eks.
        virtuelt analoge eller modulære
    system/power_cable_connector_type_end_a:
      name: System-/strømkabelstiktype (ende A)
      description: Identificerer den nøjagtige stikstandard i den første ende af kablet
        (f.eks. IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: System-/strømkabelstiktype (ende B)
      description: Identificerer den nøjagtige stikstandard i den anden ende af kablet
        (f.eks. IEC C13, DC 5.5 × 2.1 mm, bananstik).
    system_components_included:
      name: Systemkomponenter inkluderet
      description: Viser de vigtigste hardwaredele, som leveres med systemet, så kunderne
