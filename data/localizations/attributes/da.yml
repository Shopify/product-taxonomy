    target_audience:
      name: Målgruppe
      description: Angiver, hvem et produkt er egnet til, f.eks. børn eller alle aldre
    target_facial_zone:
      name: Målrettet ansigtsområde
      description: Angiver det ansigtområde, som porestrimlen er designet til at behandle
