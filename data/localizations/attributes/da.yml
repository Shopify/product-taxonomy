        i produktformuleringen, inklusive urintyper, fødevarebaserede dufte, plantearomaer
        osv.
    school_bus_body_type:
      name: Skolebus-karosseritype
      description: Klassificerer en skolebus efter almindelige karosseri-/klasseformater,
        der anvendes på markedet (f.eks. type A-D).
    school_bus_safety_feature:
      name: Skolebus' sikkerhedsfunktion
      description: Nævneværdigt sikkerhedsudstyr installeret på skolebussen.
    school_glue_washability:
      name: Skolelims vaskbarhed
      description: Angiver, hvor let den tørrede/våde lim kan fjernes fra hud/tøj/overflader.
    scissors_application:
      name: Saksanvendelse
      description: Saksens primært tilsigtede klippeanvendelse/materiale.
    scooter_brake_pad_material:
      name: Materiale til bremseklodser på scooteren
      description: Angiver den anvendte forbindelse i bremseklodser, der påvirker
        ydeevne, støj og levetid.
    scoring_method:
      name: Scoringsmetode
      description: Angiver, hvordan scorer registreres på bordfodboldbordet, f.eks.
        manuel kugleramme eller elektronisk resultattavle.
    scoring_pattern:
      name: Scoringsmønster
      description: Scoringszoner trykt på spillebanen.
    scoring_system_type:
      name: Type af scoringssystem
      description: Beskriver den type scorings-registreringsmekanisme, der følger
        med bordet, såsom manuelle skydere eller forskellige elektroniske displays.
    scottish_smallpipes_bag_material:
      name: Scottish smallpipes' posemateriale
      description: Angiver posematerialet (luftbeholder), der følger med smallpipes'ene.
    scottish_smallpipes_drone_tuning_configuration:
      name: Dronestemning på Scottish smallpipes
      description: Angiver den dronestemningsopsætning, der følger med instrumentet
        (dronernes tonehøjder/roller i forhold til tonikaen).
    scottish_smallpipes_reed_type:
      name: Scottish smallpipes' bladtype
      description: Identificerer melodipibens bladtype (og/eller om rørbladene er
        syntetiske vs. spanskrør).
    scraping_surface_type:
      name: Type af skrabeflade
      description: Angiver konstruktionen/geometrien af den skrabeflade, der producerer
        lyd (f.eks. rillet, kam/tænder, bølget).
    screw_drive_type:
      name: Skruedrevtype
      description: Angiver typen af drevfordybning på skruen eller bolthovedet og
        angiver det værktøj, der kræves til at stramme eller fjerne den (f.eks. unbrako/allobelastisk,
        Torx).
    screw_thread_size:
      name: Gevindstørrelse
      description: Angiver gevindstørrelsesstandarden for de medfølgende eller kompatible
        skruer (f.eks. M4, M5, M6).
    sculpting_clay_base_type:
      name: Basetype for skulpturler
      description: Beskriver skulpturlerets underliggende formulering/base.
    seafood_cut:
      name: Fisk og skaldyrs udskæring
      description: Beskriver den fysiske udskæring eller præsentation af fisk og skaldyrsproduktet
        (f.eks. hel, filet, bøf).
    seafood_processing_method:
      name: Forarbejdningsmetode for fisk og skaldyr
      description: Angiver den primære konserverings- eller forarbejdningsteknik,
        der anvendes på fisk og skaldyr, såsom røget, saltet eller frysetørret.
    seafood_source:
      name: Fisk- og skaldyrskilde
      description: Angiver, om fisk og skaldyr er vildtfanget, opdrættet på landbrugsjord,
        plantebaseret eller fra en anden kilde, hvilket hjælper kunder med at evaluere
        bæredygtighed og kvalitet.
    seal_material:
      name: Tætningsmateriale
      description: Materiale, der bruges til tætninger eller pakninger til hals, håndled
        og ankel, der holder dragten vandtæt.
    seal_type:
      name: Tætningstype
      description: Angiver den tætningsmetode, fittingen anvender for at forhindre
        kølemiddellækager.
    sealant_formulation:
      name: Fugemasses formulering
      description: Angiver den primære kemiske formulering eller additivteknologi
        i cykeldækforseglingen (f.eks. latexbaseret, fiberforstærket, akryl).
    seals_leak_type:
      name: Type tætningslækage
      description: Type/placering af lækage i kølesystemet, som produktet er beregnet
        til at forsegle.
    seam_construction:
      name: Sømkonstruktion
      description: Beskriver, hvordan boldens søm er syet, hvilket påvirker drejning,
        holdbarhed og følelse.
    seam_design:
      name: Sømdesign
      description: Angiver sømkonstruktionen eller dekorative sømfunktioner på strømpebukserne.
    seam_gauge_scale_type:
      name: Sømmålers skalatype
      description: Angiver hvilke skalaer/markeringer der er inkluderet på sømmåleren
        ud over den grundlæggende linealskala.
    seam_gauge_slider_material:
      name: Sømmålerens glidermateriale
      description: Identificerer materialet i den justerbare skyder-/markørkomponent,
        hvis en sådan er til stede.
    seam_ripper_tip_style:
      name: Stil for sømopsprætters spids
      description: Beskriver det funktionelle spidsdesign, der bruges til at skubbe
        under sting og klippe tråd sikkert.
    seam_sealing_type:
      name: Sømforseglingstype
      description: Beskriver den metode, der anvendes til at forhindre vandindtrængning
        i regntøjets sømme (f.eks. fuldt tapelukket, svejset).
    seam_type:
      name: Sømtype
      description: Beskriver systilen på baseballen, hvilket påvirker greb, aerodynamik
        og det tilsigtede spilniveau.
    season_condition_protection:
      name: Sæson-/vejrforholdsbeskyttelse
      description: Angiver det primære vejr/miljø, som forrudeafdækningen er beregnet
        til at beskytte imod.
    season_rating:
      name: Sæsonklassificering
      description: Angiver teltets sæsonklassificering, som angiver dets egnethed
        til forskellige vejrforhold (f.eks. 3-sæson, 4-sæson, 5-sæson/ekspedition).
    seasoning_variety:
      name: Krydderivariant
      description: Klassificerer krydderiet efter dets tilberedningsstil eller traditionelle
        kulinariske anvendelse.
    seat_adjustment_power_type:
      name: Sædejusterings strømtype
      description: Angiver, hvordan sædejusteringsmekanismerne aktiveres (manuelle
        håndtag vs. elmotorer), hvilket kan påvirke ledningsføring/kompatibilitet.
    seat_belt_attachment_type:
      name: Sikkerhedsseles befæstelsestype
      description: Angiver, hvordan stroppen fastgøres til køretøjet/selens metaldel.
    seat_belt_buckle_electrical_connector_type:
      name: Sikkerhedsselespændes elektriske forbindelseskomponenttype
      description: Angiver den forbindelseskomponent/det kontaktpunkt, der anvendes
        til ledningsføring af spændekontakt/forstrammer, hvor det er relevant.
    seat_belt_buckle_mounting_type:
      name: Monteringstype for sikkerhedsselespænde
      description: Beskriver, hvordan spændet/beslaget fastgøres til køretøjet, sædet
        eller selefæstet (f.eks. med bolt eller klips).
    seat_belt_buckle_release_button_color:
      name: Sikkerhedsselespændeudløsers knapfarve
      description: Angiver farven på spændeudløserknappen.
    seat_belt_cover_placement:
      name: Placering af sikkerhedsselebetræk
      description: Specificerer, hvor på sikkerhedsselen coveret er beregnet til at
        blive brugt.
    seat_belt_integration:
      name: Integration med sikkerhedssele
      description: Angiver, om sædet har en integreret sikkerhedssele- og/eller sikkerhedsselelås,
        eller om køretøjets originale sikkerhedsselelås skal overføres ved installation.
    seat_belt_provision:
      name: Medfølgende sikkerhedssele
      description: Angiver, om sikkerhedsseler og/eller tilhørende metaldele (f.eks.
        spænder) er inkluderet i bagsædeenheden eller skal overføres fra det originale
        sæde.
    seat_belt_strap_installation_location:
      name: Sted for installation af sikkerhedsselestrop
      description: Angiver, hvor stroppen er installeret i selesystemet.
    seat_cover_placement:
      name: Placering af sædecover
      description: Angiver, hvilken(e) siddeplads(er) betrækket er beregnet til på
        køretøjet.
    seat_cover_securement_method:
      name: Metode til fastgørelse af sædebetræk
      description: Angiver den primære måde, hvorpå sædebetrækket er fastgjort til
        sædet. Hvis der anvendes flere metoder, skal du vælge den primære/primære
        metode.
    seat_cover_set_contents:
      name: Sædebetræksættets indhold
      description: Beskriver, hvilke dele der er inkluderet i pakken (f.eks. kun sædebunde
        vs. fuldt sæde + nakkestøtter).
    seat_fabric:
      name: Sædestof
      description: Primært stof, der anvendes til sæde- og ryglænsslynge på stolen.
    seat_height_category:
      name: Sædehøjdekategori
      description: Klassificerer skamlen efter typisk sædehøjde (f.eks. bord- eller
        barhøjde) for at forenkle valget.
    seat_material:
      name: Sædemateriale
      description: Identificerer det primære materiale i bænkens siddeflade.
    seat_mounting_type:
      name: Monteringstype for sæde
      description: Monterings-/sporkonfiguration, der bruges til at fastgøre sædet
        til køretøjets gulv.
    seating_surface_material:
      name: Materiale på siddeflade
      description: Angiver materialet i det område, en person læner sig tilbage på
        (f.eks. textilene-net, slyngestof, flet, polstret).
    seatpost_clamp_mechanism:
      name: Sadelpinds klemmemekanisme
      description: Type af klemme-/lukkesystem, der fastgør sadelpinden.
    section_orientation_compatibility:
      name: Kompatibilitet mellem sektionsorientering
      description: Angiver, om tilbehøret passer til en venstre-, højre- eller universalsektion.
    sectional_configuration:
      name: Sektionskonfiguration
      description: Definerer sektionsenhedens specifikke moduler eller orientering
        (f.eks. hjørne, venstre armlæn, chaiselong), så kunden kan sammensætte den
        ønskede konfiguration.
    sectional_shape:
      name: Sektionsform
      description: Definerer sofaens overordnede geometriske konfiguration.
    secured_components:
      name: Fastgjorte komponenter
      description: Angiver de specifikke cykeldele, som låsespyddet eller sikkerhedsmøtrikkerne
        beskytter (f.eks. forhjul, baghjul, sadelpind).
    seed_content:
      name: Kerneindhold
      description: Angiver, om citrusfrugten er uden kerner, har få kerner eller mange.
    seed_size_classification:
      name: Størrelsesklassificering for frø
      description: Angiver den relative størrelse på den uspiselige sten inde i litchien,
        hvilket påvirker mængden af spiseligt frugtkød.
    self_adhesive_backing_format:
      name: Format for selvklæbende bagside
      description: Fysisk format af den klæbende bagside, der leveres med vægeholderen
        (forudpåført klæbepude vs. separate klistermærker osv.).
    self_adhesive_hook_loop_backing_type:
      name: Selvklæbende velcrobagside
      description: Angiver den bagside-/slippefilmkonstruktion og det klæbesystem,
        der anvendes på den selvklæbende side.
    self_adhesive_hook_loop_fastener_shape:
      name: Form på selvklæbende burrebåndslukning
      description: Angiver udskæring/form for de medfølgende fastgørelsesdele.
    self_hardening_clay_finish:
      name: Selvhærdende lerfinish
      description: Beskriver overfladens udseende/glans, når den er fuldt hærdet (nyttig
        til at vælge mellem naturlig mat, satin osv.).
    self_hardening_clay_water_resistance_after_curing:
      name: Selvhærdende lers vandbestandighed efter hærdning
      description: Angiver modstandsdygtighed over for vandpåvirkning efter fuldstændig
        hærdning (uden yderligere tætning).
    sensor_functions:
      name: Sensoregenskaber
      description: Angiver, hvilke cykliske data sensoren måler.
    sensor_measurement_mode:
      name: Sensors måletilstand
      description: Angiver hvilke data sensoren kan registrere (f.eks. kun kadence,
        kun hastighed, dobbelt hastighed og kadence).
    sensor_mounting_position:
      name: Monteringsposition for sensor
      description: Angiver placeringen på cyklen eller rytteren, hvor sensoren er
        installeret, f.eks. på krankarm, hjulnav eller sko. Dette påvirker kompatibiliteten
        med forskellige cykelopsætninger.
    sensor_mounting_type:
      name: Monteringstype for sensor
      description: Angiver, hvordan MAP-sensoren monteres på indsugningsmanifolden/motoren
        (f.eks. boltet på flange vs. indstiksmuffe).
    sensor_or_gauge_mounting_location:
      name: Monteringsplacering af sensor eller måler
      description: Angiver, hvor på køretøjet sensoren eller måleren skal installeres
        (system-/lokationsniveau, ikke venstre/højre).
    sensory_modality:
      name: Sansemodalitet
      description: Primære sanseoplevelser, som legetøjet er designet til at give
        (kan være multisensorisk).
    sensory_toy_fidget_mechanism:
      name: Sanselegetøjs fidget-mekanisme
      description: Primær interaktion/mekanisme brugt til fidgeting og selvregulering.
    sensory_toy_light_features:
      name: Sanselegetøjs lysfunktioner
      description: Lysadfærd/-effekter som legetøjet leverer.
    sensory_toy_texture_type:
      name: Sanselegetøjs teksturtype
      description: Dominerende overfladefølelses-/teksturelementer brugt til berøringsstimulering.
    sequin_application_method:
      name: Påføringsmetode for pailletter
      description: Hvordan pailletten er beregnet til at blive påført/brugt (påsyning
        vs. limning vs. varmefiksering osv.).
    sequin_finish:
      name: Pailletfinish
      description: Beskriver overfladen/den visuelle finish og den reflekterende effekt
        for de pailletter, der er brugt på lappen (f.eks. mat, metallisk, holografisk),
        ikke lappens bagside eller fastgørelsesmetoden.
    serger_stitch_functions:
      name: Overlockmaskines stingfunktioner
      description: De stingfunktioner, som overlockmaskinen understøtter (overlock-/overkastningsvarianter
        samt specialsting).
    serger_thread_count:
      name: Overlockmaskines trådtal
      description: Antal tråde, som overlockmaskinen kan bruge til syning (f.eks.
        2/3/4/5-trådsfunktionalitet).
    service_interval:
      name: Serviceinterval
      description: Anbefalet maksimal tid mellem påkrævede inspektioner/service på
        et godkendt serviceværksted.
    serving_temperature:
      name: Serveringstemperatur
      description: Angiver den tilsigtede serveringstemperatur eller produktets tilstand
        ved forbrug.
    sesame_seed_hull_status:
      name: Sesamfrøs afskalningstatus
      description: Angiver, om tahinen er lavet af afskallede eller ikke-afskallede
        sesamfrø, hvilket påvirker farve, smag og næringsindhold.
    sesame_seed_roast_level:
      name: Sesamfrøristningsniveau
      description: Angiver, hvor meget sesamfrøene blev ristet før maling, hvilket
        hjælper kunderne med at vælge deres foretrukne smagsintensitet.
    sesame_seed_variety:
      name: Sesamfrøsort
      description: Identificerer den farve eller sort af sesamfrø, der bruges til
        at fremstille olien.
    set_classification:
      name: Sætklassificering
      description: Definerer kroketsættets tilsigtede spilleniveau eller spillestil
        (f.eks. turnering, fritid eller rejse).
    set_components:
      name: Sættets komponenter
      description: Angiver, hvilke dele der følger med produktet (f.eks. kun midterpind
        kontra komplet sæt).
    set_items_included:
      name: Medfølgende dele i sæt
      description: Specificerer de beklædningsdele eller accessoirer, der følger med
        sættet, f.eks. saristof, dupatta eller bælte.
    setup_mechanism:
      name: Opsætningsmetode
      description: Beskriver teltets primære opsætningsmetode (f.eks. pop op, oppusteligt/airbeam-baseret
        eller tagtelt med clamshell-åbning).
    setup_type:
      name: Opsætningstype
      description: Sådan samles eller opsættes legeteltet eller tunnelen.
    sew_in_interfacing_elasticity:
      name: Elasticitet i indlægsmateriale til isyning
      description: Angiver, om indlægsmaterialet til isyning har stræk, og i så fald
        i hvilken retning eller hvilke retninger, så det passer til strik- eller vævede
        projekter.
    sew_in_label_placement:
      name: Placering af påsyet label
      description: Angiver den tilsigtede placering på den færdige vare.
    sew_on_edge_finish:
      name: Kantfinish på påsyeligt burrebånd
      description: Angiver, om kanterne på burrebåndet er rå/klippede eller afsluttet
        for at modstå optrævling.
    sew_on_rhinestone_hole_orientation:
      name: Hulorientering på påsyelige rhinsten
      description: Hullernes placering eller orientering i forhold til stenen (f.eks.
        side om side, modsat hinanden eller kryds), så forskellige stingtyper understøttes.
    sewing_kit_components_included:
      name: Medfølgende komponenter i sysæt
      description: Angiver de syartikler og -værktøjer, der følger med et sysæt, så
        kunderne kan sammenligne indholdet i de forskellige sæt.
    sewing_machine_bobbin_class:
      name: Spoleklasse for symaskine
      description: Specificerer den spoleklasse eller det spolesystem, der er kompatibelt
        med symaskinen, for spoler og spolehuse.
    sewing_machine_buttonhole_type:
      name: Knaphulstype til symaskine
      description: Den metode til fremstilling af knaphuller, som maskinen understøtter.
    sewing_machine_display_type:
      name: Displaytype for symaskine
      description: Typen af betjenings- eller displaygrænseflade på symaskinen.
    sewing_machine_needle_point_type:
      name: Nålespidstype for symaskine
      description: Definerer nålens spidsgeometri/spidsfamilie, som bestemmer, hvordan
        den trænger gennem forskellige tekstiler (f.eks. spids, kuglespids eller trekantspids).
    sewing_machine_needle_system:
      name: Nålesystem for symaskine
      description: Det standardiserede nålesystem eller modelnummer, som bestemmer
        maskinkompatibiliteten (ofte angivet som f.eks. 130/705 H, HAx1, DBx1 15x1
        osv.).
    sewing_machine_needle_type:
      name: Nåletype for symaskine
      description: Specificerer nålens tilsigtede anvendelse eller type (f.eks. universal,
        kuglespids eller jeans/denim), hvilket påvirker stingkvalitet og stofegnethed.
    sewing_machine_shank_type:
      name: Skafttype for symaskine
      description: Specificerer den skaft-/ankelstandard for trykfoden, som trykfoden
        er designet til, for at sikre kompatibilitet med symaskinen (f.eks. lavt skaft,
        højt skaft eller skråt skaft).
    sewing_pattern_accessory_type:
      name: Tilbehørstype for symønster
      description: Specificerer, hvilket tilbehør symønstret bruges til at lave.
    sewing_pattern_notions_required:
      name: Påkrævede syartikler for symønster
      description: Angiver væsentlige ekstra materialer eller beslag, der kræves for
        at færdiggøre projektet (ud over stof og tråd).
    sewing_pattern_recommended_fabric:
      name: Anbefalet stof for symønster
      description: Angiver de stoftyper eller stofvægte, der anbefales til symønstret
        (som angivet af mønsterdesigneren).
    sewing_pattern_size_range:
      name: Størrelsesinterval for symønster
      description: Specificerer det tilsigtede størrelsesinterval, som mønstret dækker
        (f.eks. baby til voksen eller plusstørrelser).
    sewing_thread_size_system:
      name: Størrelsessystem for sytråd
      description: Den størrelsesstandard, der bruges til at angive trådstørrelsen
        (f.eks. Tex, Denier, Ticket, vægtangivelse eller V-størrelse).
    shaft_curvature:
      name: Skaftkrumning
      description: Beskriver skaftets overordnede form, som påvirker frigang, sving
        og ergonomi.
    shaft_kick_point:
      name: Skaftets kickpoint
      description: Identificerer det punkt langs skaftet, hvor det bøjer mest under
        et sving, hvilket påvirker boldens flyvebane.
    shaft_length_type:
      name: Type af skaftlængde
      description: Brancheanerkendt størrelsesbetegnelse for dartskafter (f.eks. Short
        eller Medium), der bruges, når nøjagtige mål i millimeter ikke er angivet.
    shaft_shape:
      name: Skaftform
      description: Definerer tonfa-skaftets tværsnitsprofil (f.eks. rund, firkantet
        eller ottekantet).
    shaker_fill_material:
      name: Fyldmateriale i shaker
      description: Specificerer det primære indvendige fyld, der skaber shakerlyden
        (hvor relevant), f.eks. perler, frø eller hagl.
    shaker_shell_material:
      name: Skalmateriale i shaker
      description: Specificerer det primære materiale i egg shakerens krop eller skal
        (det ydre hus).
    shallot_variety:
      name: Skalotteløgssort
      description: Identificerer den specifikke kultivar, markedstype eller sort for
        skalotteløgsproduktet.
    shank_style:
      name: Skankstil
      description: Beskriver den overordnede form eller konfiguration af kandarbiddets
        skanker (f.eks. lige, buede eller grazing).
    shapewear_enhancement_feature:
      name: Forbedringsfunktion i shapewear
      description: Fremhæver den primære funktionelle forbedring, som beklædningsdelen
        tilbyder (f.eks. mavekontrol, løft af bagdelen eller lækagesikkert indlæg).
    sheath_type:
      name: Type for knivskeden
      description: Den type skede eller bælteskede, der følger med samlerkniven.
    sheet_music_clip_padding_material:
      name: Polstringsmateriale til nodeklemme
      description: Materiale i eventuel kæbe- eller grebspolstring, der er i kontakt
        med papiret eller nodestativets kant for at forhindre rifter og at papiret
        glider.
    sheet_music_clip_spring_tension_level:
      name: Fjederspændingsniveau for nodeklemme
      description: Den relative styrke i klemmens fjeder eller klemkraft.
    sheet_music_clip_use_environment:
      name: Brugsmiljø for nodeklemme
      description: Det primære tilsigtede miljø, hvor klemmen er designet til at fungere
        bedst.
    shell_construction:
      name: Kedelkonstruktion
      description: Specificerer, hvordan stortrommens kedel er konstrueret, hvilket
        i høj grad påvirker tone og vægt.
    shell_finish:
      name: Kedelfinish
      description: Udvendig finishbehandling af doumbek-kedlen.
    shell_hull_status:
      name: Status for skal/skrog
      description: Specificerer, om nødderne eller frøene sælges med skal/skrog intakt
        eller fjernet.
    shift_boot_attachment_method:
      name: Fastgørelsesmetode for gearmanchet
      description: Specificerer, hvordan gearmanchetten fastgøres til bilens konsol
        eller gearskifterramme (f.eks. clip-in-ramme, holdering eller klæbemiddel).
    shift_boot_installation_hardware_included:
      name: Monteringsdele inkluderet til gearmanchet
      description: Angiver de monteringsdele og komponenter, der følger med gearmanchetten.
    shift_knob_illumination:
      name: Belysning i gearknop
      description: Specificerer, om gearknoppen har belysning, samt belysningsmetoden
        eller -typen (f.eks. fotoluminescerende, LED, fiberoptisk eller bagbelyst
        mønster).
    shift_knob_installation_method:
      name: Installationsmetode for gearknop
      description: Specificerer, hvordan gearknoppen fastgøres til gearstangen.
    shift_knob_shape:
      name: Form på gearknop
      description: Beskriver gearknoppens overordnede ergonomiske formfaktor.
    shift_pattern_type:
      name: Gearmønstertype
      description: Specificerer typen af gearmarkering på gearknoppen (hvis relevant).
    shifter_compatibility:
      name: Kompatibilitet med gearskifter
      description: Angiver, om styrforlængeren er kompatibel med elektroniske gearskiftere,
        mekaniske gearskiftere, begge dele eller ikke er kompatibel med gearskiftere.
    shifter_mounting_interface:
      name: Monteringsgrænseflade for gearskifter
      description: Beskriver, hvordan gearskifteren fastgøres til cyklen (f.eks. separat
        klemmestørrelse, I-Spec, MatchMaker, styrmonteret, skrårør eller trådløs).
    shifting_actuation_type:
      name: Gearskiftaktiveringstype
      description: Identificerer den mekanisme, der bruges til at skifte gear i gruppesættet
        (mekanisk, elektronisk med kabel, elektronisk trådløs eller hydraulisk).
    shifting_mechanism:
      name: Gearskiftemekanisme
      description: Identificerer, om gearskifteren fungerer mekanisk eller elektronisk,
        og om den er indekseret eller friktionsstyret.
    shim_purpose:
      name: Shim-formål
      description: Definerer produktets funktionelle type (f.eks. shim, kile eller
        afstandsstykke), så cyklister hurtigt kan finde den rette justeringsløsning
        uden at skulle bruge separate underkategorier.
    shin_guard_attachment_method:
      name: Fastgørelsesmetode for benskinne
      description: Klassificerer benskinnens overordnede designformat, herunder integreret
        ankelbeskytter eller sokkekonstruktion.
    shirt_cuff_style:
      name: Manchetstil for skjorte
      description: Identificerer konstruktionen af ærmemanchetten, hvilket påvirker
        formalitet, kombination med manchetknapper og komfort.
    shochu_base_ingredient:
      name: Basisingrediens i shochu
      description: Identificerer den primære stivelses- eller sukkerkilde, der bruges
        til at fremstille shochu.
    shochu_soju_variety:
      name: Shochu- og sojuvariant
      description: Klassificerer produktet efter dets anerkendte stil eller produktionstype.
    shock_absorber_bushing_material:
      name: Bøsningsmateriale til støddæmper
      description: Materiale i de monteringsbøsninger eller -isolatorer, der følger
        med eller er indbygget i støddæmperen.
    shock_absorber_charge_type:
      name: Ladetype for støddæmper
      description: Specificerer støddæmperens lade- eller dæmpningsteknologi (f.eks.
        hydraulisk/olie, gasladet eller luft) og/eller relateret rørdesign, hvor det
        er relevant.
    shock_absorber_mount_type_lower:
      name: Nedre monteringsgrænseflade for støddæmper
      description: Nederste monteringsgrænseflade for støddæmperen, som bruges til
        at sikre korrekt pasform.
    shock_absorber_mount_type_upper:
      name: Øvre monteringsgrænseflade for støddæmperen
      description: Specificerer den øvre monteringsgrænseflade for støddæmperen på
        et motorkøretøj for at sikre korrekt pasform og kompatibilitet.
    shock_absorber_position:
      name: Støddæmperposition
      description: Specificerer, om støddæmperen er beregnet til forreste, bageste,
        venstre eller højre position på køretøjet (mere detaljeret end kun akselplacering).
    shock_absorption_system:
      name: Støddæmpningssystem
      description: Definerer den mekanisme, der bruges til at reducere vibrationer
        og støj ved tilbageslag.
    shoe_collar_height:
      name: Skafthøjde for sko
      description: Klassificerer sko efter skafthøjde (lav, mellemhøj eller høj) for
        at angive ankeldækning og støtte.
    shoe_cover_height:
      name: Højde på skoovertræk
      description: Specificerer dækningsniveauet for cykelskoovertrækket og skelner
        mellem tåovertræk og fulddækkende oversko med højt skaft.
    shoe_sizing_system:
      name: Skostørrelsessystem
      description: Identificerer den størrelsesstandard (US, UK, EU, JP, Mondopoint
        osv.), der bruges til den angivne skostørrelse.
    shoelace_aglet_material:
      name: Materiale i snørebåndsdupper
      description: Identificerer det materiale, der bruges til dupperne for enden
        af snørebåndene, hvilket påvirker holdbarhed og stil.
    shooting_rest_design:
      name: Design af skydeunderstøttelse
      description: Klassificerer støttens strukturelle stil (skydesæk, slæde, trefodsstøtte,
        våbenholder osv.).
    shooting_stick_yoke_design:
      name: Gaffeldesign for skydestøtte
      description: Specificerer den vugge- eller gaffeltype, der har kontakt med skydevåbnet
        eller optikken.
    shooting_target_style:
      name: Type af skydemål
      description: Klassificerer stil eller design for mål til kunstskøjteløb og ishockey,
        så kunderne kan vælge det træningsfokus, de har brug for.
    shooting_target_type:
      name: Type af skydemål
      description: Klassificerer skydemål efter konstruktion, materiale eller design
        (f.eks. gong, silhuet, papirmål eller spinner), så skytter hurtigt kan finde
        det korrekte mål til deres disciplin og våbentype.
    short_block_assembly_balance_type:
      name: Balanceringstype for short block-samling
      description: Angiver, om den roterende samling er internt eller eksternt balanceret.
    short_block_intended_use:
      name: Tilsigtet brug af short block
      description: Primært tilsigtet anvendelsesområde for short block’en.
    short_block_rotating_assembly_included:
      name: Roterende samling inkluderet i short block
      description: Specificerer, hvilke større komponenter i den roterende samling
        der følger med short block’en.
    shot_size:
      name: Haglstørrelse
      description: Specificerer haglstørrelsesbetegnelsen for løse hagl eller genladningskomponenter.
    shotgun_action_type:
      name: Mekanismetype for haglgevær
      description: Specificerer haglgeværets betjeningsmekanisme.
    shotgun_choke_type:
      name: Choketype for haglgevær
      description: Specificerer choke-konfigurationen for haglgeværsløbet eller -løbene.
    shotgun_gauge:
      name: Kaliber for haglgevær
      description: Specificerer haglgeværets kaliber (og .410-bore, hvor relevant)
        til identifikation og filtrering i samlerobjektfortegnelser.
    shotgun_stock_material:
      name: Skæftemateriale for haglgevær
      description: Specificerer det primære materiale i skæftet eller forskæftet.
    shuffleboard_speed_rating:
      name: Hastighedsklassificering for shuffleboard
      description: Angiver den relative glidehastighed, som shuffleboardpulver eller
        et andet vedligeholdelsesprodukt giver på bordet, så spillere kan vælge den
        passende hastighed til deres færdighedsniveau og bordlængde.
    shuffleboard_table_length_compatibility:
      name: Kompatibilitet med shuffleboardbordlængde
      description: Standardlængden på shuffleboardbordet, som et produkt er designet
        til at passe til eller supplere.
    shuttlecock_base_material:
      name: Basismateriale i fjerbold
      description: Identificerer det materiale, der bruges til fjerboldens næse eller
        base, hvilket påvirker holdbarhed, følelse og rebound.
    shuttlecock_feather_material:
      name: Fjermateriale for fjerbold
      description: Identificerer den primære fjerkilde eller konstruktionstype, der
        bruges til fjerboldens skørt, hvilket påvirker holdbarhed, ensartethed og
        pris.
    shuttlecock_grade:
      name: Fjerboldkvalitet
      description: Specificerer det tilsigtede spilleniveau eller kvalitetsklassificeringen
        (f.eks. træning, klub eller konkurrence).
    shuttlecock_speed_rating:
      name: Hastighedsklassificering for fjerbold
      description: Specificerer producentens hastighedsbetegnelse eller -klassificering
        for fjerbolden, så spillere kan vælge den korrekte flyvehastighed til deres
        spilleforhold, temperatur og højde over havet.
    side_panel_installation_state:
      name: Leveringstilstand for sidepanel
      description: Specificerer, om sidepanelet leveres bart, grundet, malet eller
        på anden måde belagt eller forberedt til installation.
    side_wall_mechanism:
      name: Sidevægsmekanisme
      description: Beskriver, hvordan babysengens sidevæg åbnes eller sænkes for at
        give adgang til babyen.
    signal_source:
      name: Signalkilde
      description: Angiver, hvordan kilometertælleren modtager eller beregner oplysninger
        om distance eller tid.
    silk_fiber_type:
      name: Silkefibertype
      description: Type eller kilde for silkefiberen, der bruges til at fremstille
        stoffet (f.eks. morbær eller tussah), hvilket påvirker tekstur, ensartethed
        og pris.
    simulated_game_species:
      name: Simuleret vildtart
      description: Angiver den specifikke vildtfugl eller det dyr, som apportdummyen
        efterligner med henblik på realistisk træning.
    singlet_cut_style:
      name: Snitstil for bryderdragt
      description: Specificerer bryderdragtens snit eller stil med hensyn til strophøjde,
        rygstil samt variationer efter køn og alder.
    sink_material:
      name: Materiale i vask
      description: Specificerer materialet i den eller de integrerede vaske, der følger
        med vaskeskabet.
    sinker_attachment_style:
      name: Fastgørelsesmetode for synk
      description: Beskriver den mekanisme på synket, der bruges til at fastgøre det
        til fiskelinen eller rigget.
    sinker_finish:
      name: Finish på synk
      description: Specificerer synkets udvendige belægning eller overfladebehandling.
    sinker_shape:
      name: Form på synk
      description: Definerer synkets geometriske form (f.eks. kugle, cylinder eller
        dråbe), så lystfiskere kan vælge den optimale præsentation og modstandsdygtighed
        mod at sidde fast.
    siren_system_included:
      name: Sirene-/PA-system inkluderet
      description: Angiver, om et sirene-/PA-system er installeret, og hvilken type
        det er.
    siren_system_type:
      name: Type af sirenesystem
      description: Specificerer den installerede sirene-/PA-konfiguration på politibilen.
    size_designation:
      name: Størrelsesbetegnelse
      description: Standardiseret størrelsesbetegnelse for triangelinstrumentet.
    size_system:
      name: Størrelsessystem
      description: Specificerer det størrelsessystem eller den regionale standard,
        som størrelsesbetegnelsen svarer til (f.eks. US, UK, EU eller internationale
        bogstavstørrelser).
    sizzle_mechanism:
      name: Sizzle-mekanisme
      description: Specificerer, hvordan bækkenet frembringer sizzle-effekten (f.eks.
        nitter monteret i bækkenet, påsættelig kæde/sizzler eller intet tilbehør medfølger).
    skate_blade_discipline:
      name: Disciplin for skøjteklinge
      description: Identificerer den skøjtedisciplin eller anvendelse, som klingen
        er designet til, f.eks. ishockey eller kunstskøjteløb, så kunderne kan filtrere
        efter relevante klinger.
    skate_brake_type:
      name: Bremsetype for skøjte
      description: Identificerer den type bremsemekanisme, der følger med skøjterne.
    skateboard_nut_thread_size:
      name: Gevindstørrelse for skateboardmøtrik
      description: Specificerer møtrikkens gevindstørrelse (diameter og stigning)
        for at sikre kompatibilitet med skateboardaksler, kingpins eller monteringsdele.
    skein_winder_bearing_bushing_type:
      name: Leje-/bøsningstype for garnvinde
      description: Specificerer den type leje eller bøsning, der bruges i garnvindens
        roterende samling.
    skein_winder_drive_type:
      name: Drivtype for garnvinde
      description: Angiver, hvordan garnvinden drives eller drejes under brug.
    ski_binding_mechanism:
      name: Skibindingsmekanisme
      description: Definerer bindingens grundlæggende mekaniske design eller disciplin
        (f.eks. alpin, tech/pin eller telemark).
    ski_binding_part_type:
      name: Reservedelstype for skibinding
      description: Identificerer den specifikke komponent eller det specifikke tilbehør
        til skibindinger, hvilket muliggør hurtig filtrering på tværs af mange reservedelstyper.
    ski_boot_sole_standard:
      name: Sålnorm for skistøvle
      description: Identificerer den sålnorm eller bindingskompatibilitetsstandard,
        som skistøvlen er certificeret til.
    skill_focus:
      name: Færdighedsfokus
      description: Identificerer den primære basketballfærdighed, som træningshjælpen
        er beregnet til at udvikle.
    skimboard_construction:
      name: Konstruktion af skimboard
      description: Beskriver brættets primære konstruktion med fokus på kerne- og
        lamineringsteknik (f.eks. skumkerne eller trækerne).
    skin_presence:
      name: Skindstatus
      description: Specificerer, om kyllingen sælges med skind, uden skind eller med
        skindet delvist fjernet.
    slapstick_handle_type:
      name: Håndtagstype for slapstick
      description: Beskriver den type greb eller håndtag, der er integreret i slapsticken,
        og som påvirker ergonomi og spillekomfort.
    slapstick_playing_surface_material:
      name: Materiale i slagflade for slapstick
      description: Specificerer materialet i de slag- eller klappeelementer, der rammer
        hinanden for at frembringe lyden.
    sled_brake_type:
      name: Bremsetype for slæde
      description: Specificerer den bremsemekanisme, der følger med slæden, hvis relevant.
    sled_towing_method:
      name: Trækmetode for slæde
      description: Angiver den primære måde, slæden trækkes på.
    sleep_position_suitability:
      name: Egnethed for soveposition
      description: Angiver, hvilke sovepositioner madrassen er designet til at understøtte
        bedst.
    sleeping_bag_shape:
      name: Soveposeform
      description: Soveposens overordnede form, som påvirker varme, vægt og rummelighed.
    sleeping_pad_type:
      name: Type af liggeunderlag
      description: Identificerer underlagets konstruktionstype – f.eks. skum med lukkede
        celler eller oppustelig luftmadras – som har direkte indflydelse på komfort,
        vægt og isolering.
    sleepwear_set_pieces_included:
      name: Medfølgende dele i nattøjssæt
      description: Angiver de enkelte dele, der følger med i et sæt med flere dele
        til nattøj eller afslapningstøj.
    sleeve_bearing_type:
      name: Lejetype for vægtstangssleeve
      description: Identificerer den teknologi, der muliggør rotation af vægtstangssleevet,
        hvilket påvirker rotationskvaliteten ved olympiske løft.
    sleeve_style:
      name: Ærmestil
      description: Specificerer ærmets stil ud over længden (f.eks. raglan).
    slide_board_accessories_included:
      name: Medfølgende tilbehør til slide board
      description: Angiver de ekstra dele, der følger med slide boardet, så kunderne
        ved præcist, hvad der er inkluderet, og kan sammenligne sampakker.
    slide_installation_type:
      name: Installationstype for rutsjebane
      description: Hvordan rutsjebanen er beregnet til at blive opsat eller monteret
        (fritstående, fastgjort til et legestativ osv.).
    slide_intended_finger:
      name: Tilsigtet finger for slide
      description: Angiver, hvilken finger sliden er beregnet til at blive båret på,
        eller om det ikke er relevant (f.eks. en tonebar).
    slide_safety_features:
      name: Sikkerhedsfunktioner for rutsjebane
      description: Sikkerhedsrelaterede designelementer, der er inkluderet på rutsjebanen.
    slide_type:
      name: Slide-type
      description: Specificerer, hvilke messingslidemekanismer produktet er beregnet
        til at rengøre.
    slide_water_use_capability:
      name: Vandfunktion for rutsjebane
      description: Angiver, om rutsjebanen er designet til brug med vand (f.eks. slangetilslutning),
        og hvordan.
    slime_putty_kit_components_included:
      name: Medfølgende komponenter i slime- og puttysæt
      description: Angiver de værktøjer og tilsætninger, der følger med slime- eller
        putty-produktet, især ved sæt/sampakker.
    sling_material:
      name: Slyngemateriale
      description: Specificerer den fiber eller det tekstil, der bruges i quickdrawens
        slynge (dog-bone).
    smith_machine_bar_path:
      name: Stangens bevægelsesbane i Smith-maskine
      description: Beskriver stangens faste bevægelsesbane, hvilket informerer brugerne
        om biomekanik og pladsbehov.
    smoke_color:
      name: Røgfarve
      description: Farven på den røg, der produceres af nødblusset/røgsignalet, adskilt
        fra produktets kropsfarve.
    smoked_malt_smoking_material:
      name: Røgmateriale til røget malt
      description: For røget malt identificerer dette det materiale, der bruges under
        røgningen (f.eks. specifikke træsorter eller tørv).
    snack_mix_variety:
      name: Variant af snackblanding
      description: Klassificerer produktet efter blandingstype (f.eks. trail mix,
        nøddeblanding, namkeen eller sev).
    snack_processing_method:
      name: Forarbejdningsmetode for snack
      description: Angiver den primære forarbejdnings- eller konserveringsteknik,
        der bruges til at fremstille snacken (f.eks. frysetørret, bagt eller ristet).
    snack_texture:
      name: Snacktekstur
      description: Angiver sesamstængernes fysiske bid eller mundfølelse.
    snap_installation_method:
      name: Installationsmetode for tryklås
      description: Hvordan trykknappen monteres eller fastgøres til projektmaterialet.
    snare_drum_bearing_edge_profile:
      name: Lejekantsprofil for lilletromme
      description: Lejekantens snit eller profil på lilletrommens kedel.
    snare_drum_finish_type:
      name: Finish-type for lilletromme
      description: Overordnet finishkonstruktion eller -type, der bruges på lilletrommens
        kedel.
    snare_drum_hoop_type:
      name: Reifetype for lilletromme
      description: Type af reifer eller kanter, der bruges på lilletrommen.
    snare_drum_mounting_type:
      name: Monteringstype for lilletromme
      description: Hvordan lilletrommen er beregnet til at blive monteret eller brugt.
    snare_drum_shell_material:
      name: Kedelmateriale i lilletromme
      description: Specificerer det metal eller den legering, der bruges til lilletrommens
        kedel (hoveddelen), hvilket i høj grad påvirker tone, vægt og holdbarhed.
    snare_drum_strainer_mechanism:
      name: Seidingmekanisme for lilletromme
      description: Type af seiding- eller udløsermekanisme, der bruges til at aktivere
        eller deaktivere seidingstrengene.
    snare_drum_strainer_type:
      name: Seidingtype for lilletromme
      description: Type af seiding- eller udløsermekanisme, der bruges til at aktivere
        eller deaktivere seidingstrenge.
    snare_hoop_type:
      name: Reifetype for lilletromme
      description: Typen af reifer eller kanter på lilletrommen.
    snare_throw_off_type:
      name: Seidingudløsertype
      description: Typen af seiding- eller udløsermekanisme, der bruges til at aktivere/deaktivere
        seidingstrengene.
    snip_cutter_spring_mechanism:
      name: Fjedermekanisme for trådklipper
      description: Angiver, om trådklipperen bruger en fjeder- eller returmekanisme
        og hvilken type.
    snorkel_mount_position:
      name: Snorklens monteringsposition
      description: Beskriver, hvor snorklen er placeret på brugerens hoved under brug.
    snorkel_top_type:
      name: Type af snorkeltop
      description: Beskriver typen af beskyttelse mod vandindtrængning øverst på snorklen,
        som følger med sættet.
    snow_condition_suitability:
      name: Egnethed til sneforhold
      description: Beskriver de primære sneforhold, som voksen er beregnet til.
    snow_sports_helmet_safety_certification:
      name: Sikkerhedscertificering for snesportshjelm
      description: Identificerer de sikkerhedsstandarder, som hjelmen opfylder til
        ski- og snowboardbrug.
    snowboard_base_material:
      name: Snowboardbasemateriale
      description: Identificerer basens sammensætning eller finish (ekstruderet, sintrede
        varianter, proprietære formler), hvilket påvirker hastighed, holdbarhed og
        vedligeholdelse.
    snowboard_width_class:
      name: Snowboardbreddeklasse
      description: Kategoriserer brættets samlede bredde i forhold til støvlestørrelse
        (f.eks. Regular eller Wide).
    soccer_ball_compartment_type:
      name: Rumtype for fodbold
      description: Specificerer, hvordan (eller om) rygsækken har plads til en fodbold.
    soccer_ball_type:
      name: Fodboldtype
      description: Specificerer fodboldens tilsigtede brug eller stil (f.eks. kamp,
        træning eller futsal), så kunder hurtigt kan finde den rigtige variant uden
        behov for mange underkategorier.
    soccer_dummy_base_type:
      name: Basetype for fodbolddummy
      description: Beskriver typen af base eller forankringsmekanisme, som dummyen
        bruger.
    soccer_dummy_design:
      name: Design af fodbolddummy
      description: Specificerer konstruktionstypen for en fodbolddummy, f.eks. stiv
        eller oppustelig.
    soccer_goal_target_style:
      name: Måltype for fodboldtræner
      description: Definerer træningsmålets fysiske formfaktor eller design, så kunderne
        kan vælge den stil, der passer bedst til deres øvelser.
    soccer_goal_type:
      name: Type af fodboldmål
      description: Angiver målets strukturelle stil eller tilsigtede brug (f.eks.
        pop op, rebounder eller street).
    sock_cushioning:
      name: Sokpolstring
      description: Angiver mængden og typen af polstring under foden, der er integreret
        i sokken.
    sock_cushioning_level:
      name: Polstringsniveau for sok
      description: Specificerer mængden af polstring under foden, der er integreret
        i sokken.
    sock_grip_type:
      name: Grebtype for sok
      description: Beskriver eventuelle friktions- eller skridsikre funktioner, der
        er påført sokkens sål.
    sock_toe_style:
      name: Tåstil for sok
      description: Beskriver konstruktionstypen for sokkens tåområde.
    soft_bait_style:
      name: Softbait-stil
      description: Klassificerer kropsdesignet eller profilen for softbaitet (f.eks.
        orm, swimbait eller grub).
    soft_top_attachment_type:
      name: Fastgørelsestype for softtop
      description: Identificerer, hvordan softtoppen fastgøres til køretøjet (kanaler,
        trykknapper, burrebånd osv.).
    soft_top_includes_frame_hardware:
      name: Softtop med ramme/monteringsdele
      description: Angiver, om produktet inkluderer softtopramme/-bøjler og/eller
        monteringsdele.
    soft_top_installation_type:
      name: Installationstype for softtop
      description: Specificerer, hvordan køretøjets softtop installeres eller fastgøres,
        og angiver den forventede installationsmetode og den nødvendige indsats.
    soft_top_window_configuration:
      name: Vindueskonfiguration for softtop
      description: Angiver, hvor mange vinduer softtoppen har, og hvilke positioner
        der er til stede.
    softball_certification:
      name: Softballcertificering
      description: Angiver de mærkninger eller godkendelser fra officielle organer,
        der er trykt på bolden, og som bestemmer godkendelse til liga- eller kampbrug.
    softness_level:
      name: Blødhedsniveau
      description: Angiver, hvor blød og lavprofileret løkkesiden er, hvilket er relevant
        for komfort mod huden og anvendelser, hvor materialet skal fylde minimalt.
    solar_system_model_included_bodies:
      name: Himmellegemer inkluderet i solsystemmodel
      description: Angiver, hvilke himmellegemer der er repræsenteret i modelsættet.
    solar_system_model_scaling:
      name: Skalaforhold for solsystemmodel
      description: Angiver, om solsystemmodellen er i skala for planetstørrelser,
        afstande eller baner, begge dele eller er en skematisk eller ikke-skaleret
        gengivelse.
    sold_secure_certification_level:
      name: Sold Secure-certificeringsniveau
      description: Angiver den Sold Secure-vurdering, som låsen er tildelt af det
        uafhængige britiske testorgan (Bronze, Silver, Gold, Diamond).
    sold_secure_rating:
      name: Sold Secure-vurdering
      description: Angiver det Sold Secure-certificeringsniveau, der er tildelt låsen.
    sole_construction:
      name: Sålkonstruktion
      description: Angiver, hvordan skoens sål er opbygget (hel, delt, todelt osv.),
        hvilket direkte påvirker fleksibilitet, gulvkontakt og egnethed til specifikke
        danseteknikker.
    sole_type:
      name: Såltype
      description: Beskriver sålens strukturelle stil og angiver fleksibilitet og
        tilsigtet brug.
    soprano_saxophone_body_style:
      name: Kropsstil for sopransaxofon
      description: Beskriver den fysiske konfiguration af sopransaxofonens krop.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Baffeltype for sopransaxofonmundstykke
      description: Beskriver mundstykkets baffel- eller tagdesign (konturen bag spidsen),
        hvilket påvirker lyshed, projektion og respons.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Kammerstørrelse for sopransaxofonmundstykke
      description: Beskriver den indvendige kammerstørrelse i sopransaxofonmundstykket,
        hvilket påvirker modstand og klangfarve.
    soprano_saxophone_mouthpiece_finish:
      name: Finish på mundstykke til sopransaxofon
      description: Overfladefinish eller belægning på mundstykket (hvis relevant).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Medfølgende tilbehør til sopransaxofonmundstykke
      description: Identificerer, hvilket tilbehør der følger med mundstykket.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Klangkarakter for sopransaxofonmundstykke
      description: Overordnet klangprofil, der typisk forbindes med mundstykkets design.
    sound_character:
      name: Klangkarakter
      description: Beskriver den generelle klang, som slapsticken producerer.
    sound_expansion_method:
      name: Metode til udvidelse af lydbibliotek
      description: Specificerer, hvordan modulet kan tilføje eller udvide sit interne
        lydbibliotek ud over fabrikslydene (f.eks. indholdspakker, import af samples
        eller udvidelseskort).
    sound_module_sound_library_focus:
      name: Fokus for lydbibliotek i lydmodul
      description: Primært fokus for fabrikslydsættet, så kunder kan finde det rigtige
        modul til deres stil eller anvendelse.
    sound_port_type:
      name: Type af lydport
      description: Beskriver lydhul- eller portdesignet på bagsiden af cajonen, hvilket
        påvirker projektion og respons i det dybe register.
    sound_sensitivity_control:
      name: Justering af lydfølsomhed
      description: Angiver, om og hvordan lydfølsomheden kan justeres.
    sound_synthesizer_patch_memory:
      name: Patchhukommelse for lydsynthesizer
      description: Angiver, om synthesizeren kan gemme og hente forudindstillinger
        (patches).
    sound_type:
      name: Lydtype
      description: Primære lydtyper eller lydoutput, som måtten producerer (f.eks.
        instrumenter, sange eller stemmeprompter) for at guide legen.
    soundboard_material:
      name: Materiale i klangbund
      description: Materiale, der bruges til harpans klangbund (top), som skaber resonans
        og tone.
    soup_or_broth_variety:
      name: Suppe- eller bouillontype
      description: Specificerer suppens eller bouillonens stil, opskrift eller kulinariske
        tilberedning, så kunder hurtigt kan finde deres foretrukne type.
    sour_cream_variety:
      name: Cremefraiche-type
      description: Klassificerer cremefraicheprodukter efter deres specifikke type
        eller kulturelle stil, f.eks. crème fraîche eller mexicansk crema.
    soy_sauce_variety:
      name: Variant af sojasauce
      description: Identificerer den specifikke type af sojasauce (f.eks. lys, mørk,
        tamari eller ponzu), så kunder hurtigt kan filtrere efter smagsprofil og kulinarisk
        brug.
    spark_plug_electrode_material:
      name: Elektrodemateriale i tændrør
      description: Materiale eller teknologi for tændrørets elektrodespids(er) i tændenden
        (midterelektrode og/eller stel-elektrode), som markedsført (f.eks. kobber,
        platin eller iridium).
    spark_plug_seat_type:
      name: Sædetype for tændrør
      description: Tætnings- eller sædetype, der bruges af tændrøret ved grænsefladen
        til cylinderhovedet.
    spark_plug_terminal_type:
      name: Terminaltype på tændrør
      description: Øvre terminaltype, der bruges til at forbinde tændledningen eller
        -hætten.
    sparkler_shape:
      name: Stjernekasterform
      description: Stjernekasterens overordnede dekorative form eller formfaktor.
    speaker_cone_material:
      name: Højttalerkeglemateriale
      description: Primært materiale i højttalerkeglen (woofer- eller mellemtonekegle).
    speaker_size:
      name: Højttalerstørrelse
      description: Nominel driverstørrelse eller pasformstørrelse for komponenthøjttaleren
        (f.eks. 6,5" eller 6x9"), der bruges til at matche fabriksplaceringer og højttaleradaptere.
    special_effects_output_interface:
      name: Udgangsgrænseflade for special effects
      description: Specificerer det udgangsstik eller den udgangsgrænseflade, der
        bruges til at styre special effects-enheder.
    special_effects_stand_stability_features:
      name: Stabilitetsfunktioner for special effects-stativ
      description: Specificerer indbyggede stabilitets- og sikkerhedsfunktioner, der
        er beregnet til at forhindre, at stativet vælter eller glider under arrangementer.
    specialty_malt_name_type:
      name: Specialmaltnavn eller -type
      description: Identificerer den specifikke navngivne specialmalttype (ofte brugt
        som kommercielt stilnavn).
    specimen_presentation:
      name: Præsentation af samlerobjekt
      description: Angiver, hvordan samlerobjektet er klargjort eller præsenteret
        (f.eks. råt/uklargjort, poleret, slebet eller monteret).
    speed_bag_accessories_included:
      name: Medfølgende tilbehør til speed bag
      description: Angiver yderligere dele, der følger med speedbaggen, f.eks. handsker,
        luftpumper, svirvler, kæder eller stativer.
    speed_rating:
      name: Hastighedsklassificering
      description: Angiver spillefladens hastighed, som billardklædet giver (f.eks.
        langsom, medium eller hurtig).
    speedometer_backlight_type:
      name: Type af baggrundsbelysning for speedometer
      description: Specificerer, om og hvordan speedometeret er baggrundsbelyst for
        synlighed om natten.
    speedometer_display_type:
      name: Displaytype for speedometer
      description: 'Angiver speedometerets hastighedsvisningsstil: analog nål eller
        skive, digital numerisk visning eller en kombination af analoge og digitale
        elementer.'
    speedometer_unit_of_measure:
      name: Måleenhed for speedometer
      description: Specificerer de hastighedsenheder, der vises på skiven eller displayet.
    spike_replaceability:
      name: Udskiftelighed for pigge
      description: Angiver, om piggene på skoen kan udskiftes, er faste, eller om
        skoen er pigfri.
    spike_shape:
      name: Pigform
      description: Identificerer den geometriske stil for piggens spids, hvilket påvirker
        greb og egnethed til forskellige banebelægninger.
    spike_thread_size:
      name: Gevindstørrelse på pigge
      description: Specificerer størrelsen eller standarden for den gevindskårne fod,
        der skrues ind i skoen (f.eks. 1/4-20).
    spin_classification:
      name: Spinklassificering
      description: Angiver den spinprofil, diskossen er designet til (lav, medium,
        høj eller hyperspin).
    spin_profile:
      name: Spinprofil
      description: Specificerer de relative spin-egenskaber, som skaftet fremmer.
    spin_types_supported:
      name: Understøttede spintyper
      description: Angiver de typer spin, som maskinen kan give bolde, så spillere
        kan øve sig mod forskellige slagstile.
    spinach_preparation_style:
      name: Tilberedningsform for spinat
      description: Beskriver den fysiske forarbejdning eller produktform af spinatbladene
        (f.eks. hele blade, hakket eller tern).
    spinach_variety:
      name: Spinatvariant
      description: Identificerer den botaniske variant eller handelstype af spinat
        (f.eks. baby, savoy, vandspinat eller rød), så kunder kan vælge præcis den
        type, de ønsker.
    spindle_bearing_surface_material:
      name: Materiale i spindlens lejeflade
      description: Materiale i spidsen eller lejeoverfladen, der bruges i understøttede
        spindler (spids eller bund), hvilket påvirker glathed og slid.
    spindle_bearing_type:
      name: Lejetype for spindel
      description: Type af spindelspids- eller lejegrænseflade, der reducerer friktion
        mod støtteskålen eller -koppen.
    spindle_finish:
      name: Spindelfinish
      description: Overfladefinish eller -belægning på spindlen, hvilket påvirker
        følelse, holdbarhed og æstetik.
    spindle_hook_type:
      name: Spindelkrogtype
      description: Garnfangermekanismen øverst på spindlen, der bruges til at fastgøre
        førertråden eller garnet.
    spindle_support_method:
      name: Spindelstøttemetode
      description: Hvordan spindlen er beregnet til at blive understøttet under spinding.
    spindle_tip_style:
      name: Spindelspidsstil
      description: Form eller design på spidsen, der hviler i skålen eller koppen
        (lejeoverfladen), hvilket påvirker friktion og rotationsglathed.
    spindle_whorl_position:
      name: Placering af ten på spindel
      description: Angiver, hvor tenen sidder på spindelskaftet.
    spinner_blade_shape:
      name: Spinnerbladform
      description: Identificerer den primære bladform, der bruges på spinneren, hvilket
        påvirker vibration, flash og løbedybde.
    spinner_control_card_design_type:
      name: Design eller type af spinnerkontrolkort
      description: Beskriver typen af spinnerkontrolkort med hensyn til, hvordan det
        præsenterer kontroloplysninger (f.eks. forholdsreference, spændingsreference
        eller konverteringsdiagram).
    spinner_subtype:
      name: Undertype for spinner
      description: Klassificerer spinnerens overordnede design eller familie (f.eks.
        inline-spinner eller spinnerbait).
    spinning_oil_application_area:
      name: Anvendelsesområde for spinderoksolie
      description: Specificerer de tilsigtede påføringspunkter på et spinderok for
        olien.
    spinning_oil_application_tool:
      name: Påføringsværktøj til spinderoksolie
      description: Angiver applikator- eller emballagespidsens stil, der bruges til
        at påføre olie på spinderokkens dele med kontrolleret dosering.
    spinning_oil_features:
      name: Funktioner for spindeolie
      description: Fremhæver funktionelle egenskaber, der er relevante for spinderoksolier
        (restdannelse, misfarvning, oxidering og vaskbarhed).
    spinning_top_features:
      name: Funktioner i snurretop
      description: Særlige legefunktioner inkluderet i snurretoppen ud over grundlæggende
        snurren.
    spinning_top_launch_mechanism:
      name: Startmekanisme for snurretop
      description: Hvordan snurretoppen startes eller sættes i gang med at snurre.
    spinning_wheel_brake_tension_system_type:
      name: Bremse-/spændingssystemtype for spinderok
      description: Specificerer det bremse- eller opsamlingsspændingssystem, der bruges
        til at styre garnoptag.
    spinning_wheel_drive_system:
      name: Drivsystem for spinderok
      description: Angiver det drivsystem, som spolen er beregnet til.
    spinning_wheel_hook_system:
      name: Krogsystem for spinderok
      description: Specificerer, hvordan garnet føres langs flyerarmene.
    spinning_wheel_part_application:
      name: Anvendelse af spinderoksdel
      description: Specificerer, hvilke komponenter på spinderokken olien er beregnet
        til.
    spinning_wheel_portability_foldability:
      name: Bærbarhed eller sammenklappelighed for spinderok
      description: Angiver, om rokken er designet til at kunne foldes eller klappes
        sammen til transport.
    spinning_wheel_tension_adjustment_type:
      name: Type af spændingsjustering på spinderok
      description: Angiver, hvordan spændingen justeres på rokken for at styre optaget.
    splice_termination_type:
      name: Type af splejsning eller endeafslutning
      description: Specificerer den endeafslutning, der findes på ankerlinen, f.eks.
        splejset øje, kovs eller kædekrog.
    split_shot_cut_type:
      name: Snittype for klemmesynk
      description: Specificerer den rille eller åbning, der gør det muligt at fastgøre
        synket til linen.
    split_shot_shape:
      name: Form på klemmesynk
      description: Beskriver klemmesynkets fysiske form, som påvirker hydrodynamik
        og modstandsdygtighed mod at sætte sig fast.
    split_shot_size:
      name: Størrelse på klemmesynk
      description: Standardiseret alfanumerisk størrelseskode, f.eks. SSG, AAA, BB
        eller 1, som producenter og lystfiskere bruger til at klassificere klemmesynk.
        Supplerer præcise vægtangivelser.
    spoiler_adjustability:
      name: Justerbarhed for spoiler
      description: Angiver, om spoilerens vinkel eller højde kan justeres.
    spoke_accessory_function:
      name: Funktion for egertilbehør
      description: Klassificerer tilbehørets primære funktion på hjulet, f.eks. dekorativ,
        reflekterende eller belyst.
    spoke_butting_profile:
      name: Butting-profil for eger
      description: Beskriver, hvordan egerens diameter ændrer sig langs dens længde,
        f.eks. plain, single-butted, double-butted, triple-butted eller quad-butted,
        hvilket påvirker vægt og styrke.
    spoke_gauge:
      name: Egerdiameter
      description: Specificerer den gauge eller tråddiameter på eger, som niplen er
        kompatibel med.
    spoke_interface_type:
      name: Type af egergrænseflade
      description: Angiver den type egerhoved, som navet er designet til, f.eks. J-bend,
        straight-pull eller T-head.
    spoke_shape:
      name: Egerform
      description: Specificerer egertrådens udvendige tværsnit, hvilket påvirker aerodynamik
        og æstetik.
    spool_form_factor:
      name: Spoleformfaktor
      description: Spolekroppens udformningDen fysiske udformning af spolekroppen,
        og hvordan tråden eller garnet holdes på plads, f.eks. med flange eller som
        kegle.
    spoon_style:
      name: Skestil
      description: Angiver skeens funktionelle undertype eller stil, f.eks. casting,
        flutter eller trolling.
    sports_bra_padding_type:
      name: Type af polstring i sports-bh
      description: Specificerer, hvilken type polstring sports-bh’en har.
    sports_cap_style:
      name: Stil for sportskasket
      description: Identificerer kaskettens overordnede konstruktion eller stil, f.eks.
        baseballkasket eller snapback, uafhængigt af teambranding.
    sports_governing_body_certification:
      name: Certificering fra sportsforbund
      description: Angiver officielle certificeringer eller godkendelser fra anerkendte
        sportsforbund, som bekræfter, at produktet opfylder konkurrencestandarder.
    sports_surface_compatibility:
      name: Kompatibilitet med sportsoverflader
      description: Angiver de spille- eller overfladetyper, som malingen sikkert kan
        påføres.
    sports_toy_set_contents:
      name: Indhold i sportslegetøjssæt
      description: Identificerer, hvilke komponenter der følger med sportslegetøjssættet,
        f.eks. bold, bat, net eller mål.
    spray_string_cleanup_method:
      name: Metode til rengøring af sprayserpentiner
      description: Anbefalet metode til at fjerne eller rengøre rester fra sprayserpentiner.
    spray_string_finish_effect:
      name: Finish eller effekt for sprayserpentiner
      description: Den visuelle effekt af sprayserpentinerne efter påføring, f.eks.
        glans, refleksion eller specialeffekter.
    spray_string_formulation_type:
      name: Formuleringstype for sprayserpentiner
      description: Angiver, hvordan produktet opfører sig under og efter sprayning,
        f.eks. vaskbart kontra permanent-lignende.
    spray_string_recommended_surface:
      name: Anbefalet overflade til sprayserpentiner
      description: De overfladetyper, sprayserpentinerne er beregnet til at blive
        brugt på, og som de sandsynligvis kan rengøres af.
    spray_string_scent:
      name: Duft af sprayserpentiner
      description: Duft- eller lugtprofil for sprayserpentinerne, hvis relevant.
    spray_string_suitable_age_group:
      name: Egnet aldersgruppe for sprayserpentiner
      description: Anbefalet minimumsalder eller aldersgruppe for sikker brug.
    spread_consistency:
      name: Konsistens for smørepålæg eller dip
      description: Beskriver dippens eller smørepålæggets tekstur og konsistens, så
        kunderne ved, hvilken mundfølelse og anvendelse de kan forvente, f.eks. glat,
        grov eller pisket.
    spread_variety:
      name: Variant af smørepålæg
      description: Klassificerer den specifikke type frugtbaseret smørepålæg, f.eks.
        marmelade, gelé, appelsinmarmelade eller curd, så kunder kan skelne mellem
        forskellige tilberedningsformer og teksturer.
    spreader_bar_type:
      name: Sprederstangstype
      description: Angiver den type sprederstang eller krogsystem, der følger med
        eller er kompatibelt med selen.
    sprint_canoe_class:
      name: Klasse for sprintkano
      description: Specificerer den officielle klassebetegnelse for sprintkanoen.
    sprout_presentation:
      name: Præsentation af spirer
      description: Identificerer produktets fysiske præsentation, f.eks. friske spirer,
        mikrogrønt, levende dyrkningspotte eller pulver.
    squash_and_gourd_variety:
      name: Variant af squash og græskar
      description: Identificerer den specifikke kultivar eller markedsvariant af squashen
        eller græskaret, så kunder hurtigt kan finde den ønskede type.
    stability_class:
      name: Stabilitetsklasse
      description: Generel stabilitetskategorisering baseret på flyvevurderinger eller
        markedsføringspåstande.
    stabilizer_thread_size:
      name: Gevindstørrelse til stabilisator
      description: Gevindspecifikation, der bruges til at fastgøre en stabilisator
        eller et tilbehør til en bue eller armbrøst.
    stabilizer_type:
      name: Stabilisatortype
      description: Identificerer stil eller positionsklassificering for stabilisatoren
        til bue eller armbrøst.
    stages_supported:
      name: Understøttede stadier
      description: Angiver, hvor mange stadier en raket eller et sæt er designet til
        at flyve med.
    stain_remover_format:
      name: Format for pletfjerner
      description: Specificerer produktets leveringsform eller format til behandling
        af pletter på køretøjer, f.eks. sprayflaske, aerosol, skum, gel, pulver, wipes
        eller pen/marker.
    stake_shape:
      name: Pløkform
      description: Definerer teltpløkkens tværsnit eller designstil, hvilket påvirker
        holdekraften i forskellige jordtyper.
    stamp_block_features:
      name: Funktioner for stempelblok
      description: Fremhæver funktionelle egenskaber ved stempelblokke, f.eks. målegitre,
        håndtag eller skridsikre overflader.
    stamp_block_type:
      name: Type af stempelblok
      description: Specificerer stempelblokkens konstruktion eller stil, som bruges
        til at montere stempler til stempling, f.eks. klar akrylblok, træmonteret
        blok eller positioneringsblok.
    stamp_set_pieces_included:
      name: Medfølgende dele i stempelsæt
      description: Angiver, hvilke komponenter der følger med stempel- og stempelpudesættet,
        f.eks. stempler, blækpuder eller markers.
    stand_padding_material:
      name: Polstringsmateriale på stativ
      description: Materiale, der bruges på kontaktpunkterne for at beskytte instrumentets
        finish, f.eks. skum, gummi eller silikone.
    staple_fiber_animal_fiber_type:
      name: Animalsk fibertype for stapelfiber
      description: Specifik fibertype af animalsk oprindelse, når kildetypen for stapelfiber
        er animalsk.
    staple_fiber_crimp_level:
      name: Krølningsniveau for stapelfiber
      description: Graden af naturlig krølning eller bølgethed i fiberen.
    staple_fiber_preparation_type:
      name: Forberedelsestype for stapelfiber
      description: Fiberens forberedelses- eller forarbejdningstilstand ved salg,
        dvs. hvordan den er justeret eller håndteret. Dette har stor betydning for
        spindemetode, hvor let fiberen er at trække, og det endelige resultat.
    staple_fiber_source_type:
      name: Kildetype for stapelfiber
      description: Overordnet oprindelseskategori for fiberindholdet.
    starch_processing_type:
      name: Forarbejdningstype for stivelse
      description: Angiver, om stivelsen er nativ eller er blevet fysisk eller kemisk
        modificeret, f.eks. instant eller prægelatiniseret, for at give bestemte funktionelle
        egenskaber som hurtigere fortykning eller temperaturtolerance.
    starch_source:
      name: Stivelseskilde
      description: Specificerer den botaniske kilde, som madstivelsen eller fortykningsmidlet
        stammer fra, f.eks. majs, kartoffel eller tapioka. Kilden er den primære differentieringsfaktor
        for madstivelse og har direkte betydning for egnethed til opskrifter, allergenhensyn
        og forbrugernes søgeadfærd.
    starfruit_variety:
      name: Stjernefrugtvariant
      description: Identificerer den specifikke kultivar eller variant af stjernefrugt,
        f.eks. Arkin eller Fwang Tung.
    starter_drive_type:
      name: Type af startdrev
      description: Den type startdrev eller indgrebsmekanisme, der bruges til at bringe
        tanddrevet i indgreb med tandkransen.
    starter_pistol_action_type:
      name: Låsetype for startpistol
      description: Identificerer startpistolens affyrings- eller låsemekanisme, f.eks.
        single action, double action eller halvautomatisk.
    starter_pistol_caliber:
      name: Kaliber for startpistol
      description: Specificerer den blanke ammunition eller patronkaliber, som startpistolen
        er kamret til.
    starter_terminal_type:
      name: Terminaltype for starter
      description: Specificerer den terminal- eller forbindelsestype, der bruges til
        elektriske forbindelser på starteren eller startersolenoiden, f.eks. stud,
        spadestik eller stikforbindelse.
    starting_block_anchoring_method:
      name: Forankringsmetode for startblok
      description: Beskriver, hvordan blokkene fastgøres til baneoverfladen, f.eks.
        med pigge, sugekopper eller gummipuder.
    steerer_tube_design:
      name: Design af styrerør
      description: Beskriver styrerørets strukturelle design, f.eks. lige, konisk
        eller med gevind, hvilket bestemmer kompatibilitet med headset og stel.
    steering_cable_end_fitting_type:
      name: Type af endebeslag for styrekabel
      description: Identificerer afslutnings- eller fastgørelsesstilen i enderne af
        et styrekabel til vandfartøjer (rorende og motor- eller rorpindsende) for
        at sikre kompatibilitet med styreanordningen og motorens tilslutningspunkter.
        Brug standard- eller producentbetegnelsen, hvor det er relevant.
    steering_column_adjustability_features:
      name: Justeringsfunktioner for ratstamme
      description: Angiver, hvilke justeringsfunktioner der er indbygget i ratstammen.
    steering_column_ignition_provision:
      name: Tændingsforberedelse for ratstamme
      description: Angiver, om ratstammen er designet til at acceptere en tændingslåsecylinder
        eller -kontakt og/eller ratlås.
    steering_column_shaft_end_interface_type:
      name: Endegrænsefladetype for ratstammeaksel
      description: Identificerer grænsefladestilen for ratstammeakslens ende (f.eks.
        splined, double D eller keyed).
    steering_column_shift_type:
      name: Geartype for ratstamme
      description: Specificerer, om ratstammen omfatter en ratstammemonteret gearskiftemekanisme
        og dens transmissionstype.
    steering_component_drive_type:
      name: Drivtype for styrekomponent
      description: Specificerer den driv- eller assisteringsmekanisme, der er relevant
        for styrekomponenter (især pumper og EPS-systemer).
    steering_position:
      name: Styreposition
      description: Specificerer, om varevognen er venstrestyret eller højrestyret.
    steering_pump_pulley_type:
      name: Remskivetype for servostyringspumpe
      description: Specificerer remskivens drivtype eller grænseflade, der bruges
        sammen med servostyringspumpen.
    steering_rack_finish_coating:
      name: Finish eller belægning for tandstang
      description: Specificerer den udvendige finish eller belægning til korrosionsbeskyttelse.
    steering_rack_position:
      name: Placering af tandstang
      description: Specificerer, hvor tandstangen er monteret eller anvendt i køretøjets
        styresystem.
    steering_wheel_cover_installation_type:
      name: Installationstype for ratbetræk
      description: Hvordan ratbetrækket installeres eller fastgøres på rattet.
    steering_wheel_grip_material:
      name: Grebsmateriale for rat
      description: Specificerer materialet på rattets kant eller greb (hvor hænderne
        har kontakt), som kan adskille sig fra rattets kerne eller eger.
    steering_wheel_mounting_pattern:
      name: Monteringsmønster for rat
      description: Specificerer bolt- eller hulmonteringsmønsteret, der bruges til
        at fastgøre rattet til et nav eller en adapter (f.eks. 3-bolt eller 5-bolt).
    steering_wheel_rim_material_grip_surface:
      name: Kantmateriale for rat (grebsoverflade)
      description: Specificerer det primære grebs- eller kantbeklædningsmateriale
        (adskilt fra det samlede konstruktionsmateriale).
    stem_material:
      name: Stammemateriale
      description: Specificerer det materiale, der specifikt bruges til pibestammen
        eller mundstykket (f.eks. akryl, ebonite eller lucite).
    stencil_machine_consumable_type:
      name: Type af forbrugsvare for stencilmaskine
      description: Specificerer de forbrugsvarer, der kræves for at betjene den, hvis
        det er relevant.
    step_surface_texture:
      name: Overfladetekstur på trin
      description: Specificerer trinfladens design eller materiale, der er beregnet
        til at forbedre greb og komfort, når den er våd.
    stepper_motion_type:
      name: Bevægelsestype for stepper
      description: Definerer den primære trinbevægelse, som maskinen tilbyder.
    stick_bow_profile:
      name: Bueprofil for fieldhockeystav
      description: Specificerer krumningsprofilen (eller “buetype”) for fieldhockeystavens
        skaft, en afgørende faktor, der påvirker boldkontrol, drag-flick-ydeevne og
        spillestil.
    stick_construction:
      name: Konstruktion af stav
      description: Specificerer hockeystavens konstruktionstype, f.eks. komposit i
        ét stykke, komposit i to dele eller træ.
    stick_curvature_type:
      name: Krumningsprofil for kastestav
      description: Beskriver krumningsprofilen for kastestaven, hvilket påvirker kastelængde
        og nøjagtighed.
    stick_head_shape:
      name: Hovedform for stav
      description: Definerer stavhovedets form, hvilket påvirker trapping, slagstil
        og tæt boldkontrol.
    stick_size_compatibility:
      name: Størrelseskompatibilitet for stav
      description: Identificerer den størrelsesgruppe for hockeystav, som produktet
        er kompatibelt med (f.eks. Youth, Junior, Intermediate, Senior, Goalie eller
        Universal).
    sticker_decal_features:
      name: Funktioner for stickers/decals
      description: Indfanger anvendelses- og ydelsesegenskaber, der er specifikke
        for stickers/decals (f.eks. boblefri eller kan flyttes).
    sticker_finish:
      name: Finish på sticker
      description: Beskriver overfladefinishen eller den visuelle effekt af stickers.
    sticker_format:
      name: Stickerformat
      description: Specificerer den dekorative stickers detailformfaktor (f.eks. ark,
        rulle, individuel eller bog).
    sticker_material_type:
      name: Materialetype for sticker
      description: Specificerer det primære substrat eller materiale i den dekorative
        sticker (ikke udsmykningerne).
    stilt_foot_attachment_type:
      name: Fastgørelsestype for styltefod
      description: Specificerer, hvordan brugerens fod fastgøres til stylten (f.eks.
        spændestrop, burrebånd eller snøring).
    stirrup_style:
      name: Stigbøjlestil
      description: Klassificerer den design- eller disciplinspecifikke stil for stigbøjler,
        herunder sikkerhed, disciplin og konstruktionsvariationer.
    stirrup_tread_material:
      name: Trædemateriale for stigbøjle
      description: Specificerer det materiale, der bruges til stigbøjlens fodplade
        eller trædeflade, hvilket påvirker greb, komfort og slid.
    stitch_marker_and_counter_style:
      name: Stil for maskemarkør og omgangstæller
      description: Specificerer stilen eller formfaktoren for en maskemarkør eller
        maske- eller rækketæller (f.eks. låsbar maskemarkør, splitringmarkør, ringtæller
        eller digital tæller).
    stitch_types:
      name: Stingtyper
      description: Typer af sting (funktionelle og dekorative), som maskinen kan lave.
    stitching_method:
      name: Syningsmetode
      description: Angiver, hvordan boldens paneler er syet sammen.
    stitching_state:
      name: Syningstilstand
      description: Angiver, om beklædningsdelene leveres usyede, delvist syede, syede
        eller ready-to-wear.
    stock_car_race_series:
      name: Stockcar-løbsserie
      description: Specificerer den godkendende organisation eller løbsserie eller
        -klasse, som stockcaren er bygget til at konkurrere i.
    stone_adhesion:
      name: Stenvedhæftning
      description: Angiver, om fersken- eller nektarinkernen er freestone, clingstone
        eller semi-freestone.
    stone_creation_method:
      name: Metode til fremstilling af sten
      description: Specificerer, om stenen er naturlig, laboratoriedyrket, simuleret
        eller genanvendt.
    stone_cut_grade:
      name: Stenslibningsgrad
      description: Angiver den overordnede kvalitetsvurdering af stenens slibning.
    stone_cut_style:
      name: Slibningsstil for sten
      description: Slibnings- eller facetstil for glasstenen (f.eks. facetslebet kontra
        cabochon).
    stone_fruit_cultivar:
      name: Stenfrugtkultivar
      description: Identificerer den specifikke kultivar eller variant af ferskenen
        eller nektarinen.
    stone_fruit_variety:
      name: Stenfrugtvariant
      description: Skelner undertypen inden for kategorien (f.eks. fersken, nektarin
        eller donut-/flad fersken).
    stone_setting_type:
      name: Stenfatningstype
      description: Specificerer, hvordan en eventuel sten er fastgjort i smykket (bezel,
        grif, pavé osv.).
    stone_transparency:
      name: Stengennemsigtighed
      description: Glasstenens optiske gennemsigtighed eller opacitet.
    storage_case_type:
      name: Type af opbevaringsetui
      description: Angiver den type beholder, som sættet leveres i til opbevaring
        og transport (f.eks. æske, etui eller taske).
    storage_compartment_type:
      name: Type af opbevaringsrum
      description: Specificerer den type opbevaringsrum, som svømmebøjen har til personlige
        ejendele.
    storage_media_and_transfer_methods_supported:
      name: Understøttede lagermedier og overførselsmetoder
      description: Understøttede medier eller tilslutningsmetoder til import eller
        eksport af samples og lagring eller indlæsning af projekter.
    storage_requirements:
      name: Opbevaringskrav
      description: Specificerer, hvordan produktet skal opbevares før og/eller efter
        åbning for at bevare kvalitet og sikkerhed.
    stove_jack_compatibility:
      name: Kompatibilitet med stove jack
      description: Angiver, om teltet har en brandsikker åbning til et ovnrør.
    straight_pin_application:
      name: Anvendelse for knappenål
      description: Specificerer den tilsigtede anvendelse for knappenåle.
    straight_pin_finish:
      name: Finish for knappenål
      description: Beskriver knappenålens overfladefinish eller belægning (f.eks.
        forniklet), hvilket påvirker korrosionsbestandighed og glideevne.
    straight_pin_head_material:
      name: Hovedmateriale for knappenål
      description: Specificerer materialet i nålehovedet (hvis relevant), f.eks. plast
        eller glas.
    straight_pin_head_shape:
      name: Hovedform for knappenål
      description: Beskriver nålehovedets form eller stil med hensyn til brugervenlighed
        og synlighed.
    strand_configuration:
      name: Streng-/rækkekonfiguration
      description: Angiver, hvor mange separate rækker eller kæder tegnebogskæden
        består af (enkelt, dobbelt eller tredobbelt).
    strand_material:
      name: Materiale i tråde eller strimler
      description: Specificerer det materiale, der bruges til de individuelle tråde
        eller streamers.
    strap_attachment_hardware:
      name: Fastgørelsesbeslag til rem
      description: Specificerer typen eller designet af de beslag, der bruges til
        at fastgøre remmen til instrumentet eller støttepunktet.
    strap_configuration:
      name: Remkonfiguration
      description: Angiver antallet af fastgørelsespunkter på hjelmremmen (f.eks.
        2-punkts eller 4-punkts), hvilket er afgørende for pasform, sikkerhed og ligakrav.
    strap_functionality:
      name: Remfunktion
      description: Specificerer yogamåtteremmens primære tilsigtede brug eller design.
    strap_padding:
      name: Rempolstring
      description: Angiver graden af polstret konstruktion i remmen, der er beregnet
        til at forbedre komforten og fordele vægten.
    strap_side:
      name: Remplacering
      description: Angiver, om remmen er designet til venstre binding, højre binding
        eller sælges som et par.
    strap_width:
      name: Rembredde
      description: Angiver skulderstroppernes relative bredde (tynde, mellem eller
        brede) for at guide kunder, der søger specifik dækning eller support.
    strength_classification:
      name: Styrkeklassificering
      description: Markedsføringsbetegnelse for styrke, der ofte bruges af brands
        (f.eks. Light, Strong eller Extra Strong).
    strength_grade:
      name: Styrkegrad
      description: Beskriver den tilsigtede holdestyrke eller belastningsgrad for
        burrebåndslukningen.
    stretch_level:
      name: Strækniveau
      description: Angiver, hvor meget tekstilet strækker sig i brug.
    stretch_type:
      name: Stræktype
      description: Angiver, om stoffet har mekanisk eller elastisk stræk, og i hvilken
        retning eller retninger.
    stretcher_bar_material:
      name: Materiale til blindramme
      description: Materiale, der bruges til blindrammen eller rammen (f.eks. fyr,
        gran, poppel, birk eller MDF eller konstrueret træ).
    strike_shield_shape:
      name: Form på slagpude
      description: Specificerer den overordnede formfaktor for slagpudens slagflade.
    string_core_shape:
      name: Strengkernens form
      description: Specificerer den kernetrådsform, der bruges i omviklede strenge,
        hvilket påvirker følelse og stabilitet.
    string_coverage:
      name: Dækkede strenge
      description: Specificerer, hvilke strenge den delvise capo er designet til at
        gribe eller dække (efter antal eller almindeligt sæt).
    string_end_type:
      name: Strengendestype
      description: Specificerer, hvordan strengen afsluttes ved stolen eller strengeholderen
        for kompatibilitet (særligt vigtigt for akustisk/elektrisk guitar og nogle
        basser).
    string_set_type:
      name: Type af strengesæt
      description: Specificerer, om produktet er et komplet sæt eller individuelle
        erstatningsstrenge.
    strung_status:
      name: Opstrengningsstatus
      description: Angiver, om lacrossehovedet leveres forhåndsopstrenget med en lomme
        eller sælges uopstrenget.
    strut_placement:
      name: Placering af fjederben
      description: Specificerer den tilsigtede installationsposition på køretøjet
        (foran/bagpå og venstre/højre) for fjederbenet.
    stud_attachment_type:
      name: Fastgørelsestype for knopper
      description: Specificerer, hvordan knopperne eller cleatsene er fastgjort eller
        konfigureret på ydersålen, hvilket påvirker greb, vedligeholdelse og overholdelse
        af ligaregler.
    stud_configuration:
      name: Konfiguration af knopper
      description: Definerer formen og placeringen af knopper eller cleats på ydersålen,
        hvilket påvirker greb og ydeevne på forskellige underlag.
    stud_material:
      name: Materiale i knopper
      description: Identificerer det primære materiale i knopperne eller cleatsene,
        hvilket informerer om holdbarhed, vægt og overholdelse af sikkerhedsregler.
    stuffed_animal_features:
      name: Funktioner for tøjdyr
      description: Fremhæver indbyggede lege- og komfortfunktioner i tøjdyret.
    stump_base_type:
      name: Basetype for cricketstump
      description: Definerer den base- eller monteringssystemtype, som cricketstumpen
        bruger (spyd, fjederretur, vægtet gummi osv.).
    stump_mechanism:
      name: Mekanisme for cricketstump
      description: Specificerer cricketstumpsenes retur- eller monteringsmekanisme
        (f.eks. spring-back eller fast).
    stump_size:
      name: Cricketstumpstørrelse
      description: Kategorisk størrelsesbetegnelse, der bruges til cricketstumps og
        angiver typisk højde og egnet spilleraldersgruppe.
    subwoofer_installation_type:
      name: Installationstype for subwoofer
      description: Hvordan subwooferen er beregnet til at blive installeret i et køretøjs
        lydsystem.
    sugar_cane_variety:
      name: Sukkerrørsvariant
      description: Identificerer den specifikke kultivar eller markedsvariant af sukkerrør,
        som kan påvirke farve, sødme og fiberindhold.
    sugar_content_level:
      name: Sukkerindholdsniveau
      description: Klassificerer det samlede sukkerniveau eller formulering af drikkekoncentratet,
        så kunder hurtigt kan finde almindelige, reducerede eller sukkerfri varianter.
    sugar_refinement_level:
      name: Sukkerraffineringsniveau
      description: Angiver raffineringsgraden eller -typen (farve, melasseindhold
        eller forarbejdningsniveau).
    sugar_source:
      name: Sukkerkilde
      description: Identificerer den botaniske eller råvaremæssige oprindelse, som
        sukkeret stammer fra.
    suit_fit:
      name: Jakkesætpasform
      description: Jakkesættets overordnede snit, som angiver, hvor tæt det sidder
        på kroppen.
    suit_pieces:
      name: Jakkesættets dele
      description: Specificerer, hvor mange koordinerede beklædningsdele der følger
        med i jakkesættet (f.eks. 2-delt, 3-delt eller 4-delt).
    suitable_for_anchoring_use:
      name: Egnet til forankringsbrug
      description: Angiver den tilsigtede forankringsrelaterede anvendelse for linen
        eller rebet.
    suitable_for_craft_type:
      name: Egnet håndarbejdstype
      description: Primær anvendelse til håndarbejde, som blokeringstråden er beregnet
        til.
    suitable_for_paint_type:
      name: Egnet malingstype
      description: Angiver, hvilke malingstyper lærredet er beregnet til eller sikkert
        kan bruges med.
    suitable_for_swim_stroke:
      name: Egnet til svømmetag
      description: Angiver, hvilke svømmetag håndpladen er designet eller optimeret
        til.
    suitable_mounting_surface_material:
      name: Egnet materiale til monteringsflade
      description: Specificerer den tilsigtede monteringsflade eller det materiale,
        som den selvklæbende bagside er designet til at binde til.
    suitable_play_location:
      name: Egnet legested
      description: Primært tilsigtet legemiljø eller legemiljøer for sand- og vandmøllelegetøjet.
    suitable_riding_conditions:
      name: Egnede køreforhold
      description: Angiver de køreforhold (f.eks. tørt, vådt eller vinter), som et
        cykelsmøremiddel eller -rengøringsmiddel er formuleret til.
    suitable_snow_conditions:
      name: Egnede sneforhold
      description: Angiver de primære sneforhold, som gripvoksen er formuleret til.
    suitable_surface_type:
      name: Egnet overfladetype
      description: Specificerer de gangoverflader, som grebet er designet til.
    suitable_table_size:
      name: Egnet bordstørrelse
      description: Angiver den eller de pool- eller snookerbordlængder, som lampen
        er designet til at oplyse.
    sun_protection_rating_upf:
      name: Solbeskyttelsesvurdering (UPF)
      description: Angiver beklædningsdelens certificerede UPF-solbeskyttelsesniveau.
    sun_shade_attachment_method:
      name: Fastgørelsesmetode til solskærm
      description: Hvordan solskærmen fastgøres til ruden eller forruden.
    sun_shade_style:
      name: Solskærmstil
      description: Produktets konstruktion eller format til udfoldning og opbevaring
        af solskærmen.
    sunchoke_variety:
      name: Jordskokkevariant
      description: Angiver den specifikke kultivar eller variant af jordskok, hvilket
        giver detaljerede oplysninger til gartnere, kokke og kræsne kunder.
    sunflower_oil_variety:
      name: Variant af solsikkeolie
      description: Klassificerer solsikkeoliens fedtsyreprofil eller kultivar (f.eks.
        High Oleic, Mid-Oleic eller Linoleic).
    sunflower_variety:
      name: Solsikkevariant
      description: Kultivar eller variant af solsikke (almindelige markedsvarianter
        til brug som afskårne blomster).
    support_brace_features:
      name: Funktioner for håndledsstøtte
      description: Angiver bemærkelsesværdige funktionelle egenskaber ved håndledsstøtten,
        f.eks. åndbart stof, aftagelig skinne eller justerbar metalplade.
    support_leg_count:
      name: Antal støtteben
      description: Antal ben, der har kontakt med jorden, når skydestokken er i brug
        (f.eks. monopod, bipod eller tripod).
    support_padding:
      name: Støttepolstring
      description: Angiver, om remmen eller støtten har integreret polstring ved kontaktpunkter
        (nakke, skulder eller tommelfinger).
    support_structure_type:
      name: Type af støttestruktur
      description: Angiver den konstruktionsmetode, der bruges til at holde læskærmen
        oprejst.
    supported_bowling_delivery_types:
      name: Understøttede bowlingtyper
      description: Specificerer de bowlingvariationer i cricket, som maskinen kan
        simulere, f.eks. inswing, outswing og spintyper.
    supported_dive_modes:
      name: Understøttede dykketilstande
      description: Specificerer de driftstilstande for dykning, som dykkercomputeren
        understøtter, f.eks. Air, Nitrox eller Gauge.
    supported_equipment_type:
      name: Understøttet udstyrstype
      description: Identificerer det vintersportsudstyr, som stativet er designet
        til at holde (f.eks. ski, snowboards eller skistave).
    supported_spin_types:
      name: Understøttede spintyper
      description: Specificerer de boldspinvariationer, som affyringsmaskinen kan
        anvende.
    supported_spool_bobbin_types:
      name: Understøttede spole- eller bobintyper
      description: Specificerer, hvilke spole- eller bobinformater den elektriske
        opruller er designet til at acceptere.
    surf_wax_temperature_rating:
      name: Temperaturvurdering for surfvoks
      description: Specificerer det vandtemperaturområde, som voksen er formuleret
        til, for at sikre optimalt greb i forskellige klimaer.
    surface_coating_or_finish:
      name: Overfladebelægning eller -finish
      description: Specificerer enhver beskyttende eller præstationsforbedrende overfladebehandling,
        der er påført tangen.
    surface_coating_or_wrap:
      name: Overfladebelægning eller -omvikling
      description: Den ydre overfladebehandling, der bruges til greb og kontrol på
        centerpinden (og nogle gange håndpinde).
    surface_finish:
      name: Overfladefinish
      description: Beskriver boldoverfladens følelse eller tekstur, som påvirker greb
        og bevægelse under kontaktjonglering.
    surface_finish_prep:
      name: Overfladefinish eller -forberedelse
      description: Angiver friktionsoverfladens tilstand ved salg (f.eks. genoverfladebehandlet,
        bearbejdet eller som støbt).
    surface_types_included:
      name: Inkluderede overfladetyper
      description: Specificerer, hvilken overflade sættet indeholder til tegning eller
        maling (hvis relevant), f.eks. lærred, papirblok, træpaneler eller ingen.
    surfboard_construction:
      name: Konstruktion af surfboard
      description: Specificerer surfboardets primære konstruktionsteknologi eller
        laminering.
    surfboard_tail_shape:
      name: Halefacon for surfboard
      description: Definerer omridset af boardets hale, hvilket påvirker manøvredygtighed
        og greb.
    suspension_bushing_type:
      name: Type af affjedringsbøsning
      description: Specificerer affjedringsbøsningens funktionelle eller installationsmæssige
        stil.
    suspension_configuration:
      name: Affjedringskonfiguration
      description: Beskriver, om trehjulet har affjedring, og hvor den er placeret.
    suspension_material:
      name: Materiale til ophæng
      description: Specificerer materialet i de kæder, reb eller kabler, der bruges
        til at hænge gyngen op.
    suspension_trainer_accessories_included:
      name: Medfølgende tilbehør til suspension trainer
      description: Angiver yderligere dele, der følger med trænersættet (f.eks. døranker,
        forlængerstrop eller opbevaringstaske), så kunderne forstår, hvad der er i
        æsken, og kan sammenligne sampakkens værdi.
    suspension_trainer_anchor_type:
      name: Ankertype for suspension trainer
      description: Definerer monteringsstilen eller ankerpunktet, som stropperne er
        designet til (f.eks. dør, loft eller træ), hvilket informerer om kompatibilitet
        med brugerens omgivelser.
    suspension_type:
      name: Affjedringstype
      description: Specificerer, om forgaflen er stiv eller bruger et bestemt affjedringssystem
        (luft, spiralfjeder, hybrid, elastomer osv.), så ryttere kan matche forgaflen
        til deres kørestil.
    sustain_pedal_form_factor:
      name: Formfaktor for sustainpedal
      description: Beskriver sustainpedalens fysiske stil (f.eks. fodpedal i pianostil
        kontra kompakt fodkontakt), hvilket påvirker følelse og tilsigtet brug.
    sustain_pedal_switch_type:
      name: Kontakttype for sustainpedal
      description: Angiver, om pedalen sender et kortvarigt signal (sustain, mens
        den holdes nede) eller et låsende signal (skiftefunktion).
    sustainability_certification:
      name: Bæredygtighedscertificering
      description: Miljø- eller sourcingcertificering for træmaterialet.
    swab_intended_bassoon_section:
      name: Tilsigtet fagotsektion for swab
      description: Identificerer, hvilken del af en fagot fagotswabben er designet
        til at rengøre (forskellige boringer/dele kræver forskellige swabformer og
        -størrelser).
    swab_style:
      name: Swabstil
      description: Beskriver swabbens fysiske design eller format, som bruges til
        at passere gennem eller nå områder af saxofonen.
    swab_weight_material:
      name: Vægtmateriale for swab
      description: Materiale i gennemtræksvægten eller lederen (hvis relevant), hvilket
        påvirker risikoen for ridser og holdbarhed.
    swab_weight_style:
      name: Vægtningstype for swab
      description: Specificerer, hvordan swabben er vægtet for at kunne passere gennem
        fagottens boring.
    sway_bar_adjustability:
      name: Justerbarhed for krængningsstabilisator
      description: Om og hvordan krængningsstabilisatorens stivhed kan justeres (typisk
        via flere monteringshuller til end links).
    sway_bar_coating:
      name: Belægning for krængningsstabilisator
      description: Overfladebehandling eller belægning på krængningsstabilisatoren
        for korrosionsbestandighed og udseende.
    sway_bar_fitment_front_rear_kit:
      name: Pasform for krængningsstabilisator (foran, bagpå eller sæt)
      description: Angiver, om krængningsstabilisatoren er beregnet til forakslen,
        bagakslen eller sælges som et sæt til både for og bag.
    sweatshirt_pocket_type:
      name: Lommetype for sweatshirt
      description: Beskriver typen af lommer på sweatshirten.
    sweet_potato_variety:
      name: Sødkartoffelvariant
      description: Identificerer den specifikke kultivar eller markedsvariant af sød
        kartoffel.
    sweet_spot_position:
      name: Sweet spot-position
      description: Identificerer, hvor battets sweet spot er placeret langs bladet,
        hvilket påvirker spillestil og baneforhold.
    sweetener_presence:
      name: Sødemiddeltilsætning
      description: Specificerer, om der er tilsat sødemidler i nøddesmørret, og på
        hvilket niveau.
    sweetening_type:
      name: Sødetype
      description: Beskriver, hvordan produktet er sødet, eller dets sødmeniveau.
    swim_armband_construction_type:
      name: Konstruktionstype for svømmevinger
      description: Definerer armbåndenes strukturelle stil eller flydemekanisme (oppustelig
        kontra massiv skum, hybrid osv.).
    swim_belt_purpose:
      name: Formål med svømmebælte
      description: Funktionel klassificering af svømmebæltet (f.eks. flydestøtte,
        aquajogging, modstandstræning, statisk tøjring, fastgørelse af drag parachute,
        vægtballast eller sikkerhed ved vadning).
    swim_board_features:
      name: Funktioner for svømmebræt
      description: Fremhæver særlige egenskaber eller forbedringer ved svømmebrættet,
        der øger brugervenlighed eller sikkerhed.
    swim_bottom_length:
      name: Længde på svømmeunderdel
      description: Klassificerer den samlede benlængde på badebukser (f.eks. korte
        trunks kontra knælængde).
    swim_buoy_features:
      name: Funktioner for svømmebøje
      description: Indfanger yderligere bemærkelsesværdige egenskaber eller tilføjelser,
        der forbedrer svømmebøjens synlighed, sikkerhed eller anvendelighed.
    swim_cap_style:
      name: Badehættestil
      description: Definerer badehættens konstruktion eller designstil (f.eks. til
        langt hår, dome/racing, boble/turban).
    swim_diaper_feature:
      name: Svømmeblefunktion
      description: Angiver, om svømmebriefen har en integreret lækagesikker blefunktion
        eller kræver eller udelader en separat svømmeble.
    swim_trainer_features:
      name: Funktioner for svømmetræner
      description: Fremhæver yderligere funktionelle egenskaber eller komfortfunktioner
        ved svømmetræneren.
    swim_trainer_type:
      name: Svømmetræner-type
      description: Definerer svømmetrænerens strukturelle stil eller format for at
        hjælpe med filtrering efter design og træningsformål.
    swim_training_focus:
      name: Svømmetræningsfokus
      description: Identificerer det primære træningsmål, som håndpladen retter sig
        mod (f.eks. teknik, styrke eller muskelisolering).
    swim_weight_style:
      name: Type af svømmevægt
      description: Klassificerer formfaktoren for svømmevægten, så kunder kan skelne
        mellem grundlæggende forskellige produkttyper inden for samme kategori.
    swimbait_buoyancy:
      name: Opdrift for swimbait
      description: Angiver, hvordan swimbaitet opfører sig i vandsøjlen (flydende,
        suspenderende, synkende osv.), så lystfiskere kan vælge den rette agn til
        deres måldybde og indspinningsstil.
    swimbait_style:
      name: Swimbait-stil
      description: Klassificerer swimbaitets konstruktion eller aktionsdesign, f.eks.
        paddle-tail eller glide bait.
    swimwear_pieces_included:
      name: Medfølgende dele i badetøj
      description: Angiver de enkelte beklædningsdele, der følger med burkinisættet,
        så kunderne ved præcis, hvad der er i pakken.
    swimwear_set_pieces_included:
      name: Medfølgende dele i badetøjssæt
      description: Angiver de beklædningsdele, der følger med burkinisættet, så kunderne
        ved præcis, hvad de modtager (f.eks. top, leggings eller hijab eller hætte).
    swing_attachment_connection_type:
      name: Fastgørelses- eller forbindelsestype for gynge
      description: Den type forbindelse, der bruges til at hænge gyngen op fra dens
        støtte (f.eks. reb, kæde eller stropper).
    swing_trainer_type:
      name: Swingtrainer-type
      description: Klassificerer swingtrainerens stil eller mekanisme, så kunder hurtigt
        kan finde enheder, der matcher deres træningsmål.
    swing_training_objective:
      name: Træningsmål for swingtrainer
      description: Klassificerer swingtrainerens primære træningsfokus, mekanisme
        eller mål (f.eks. tempo, hastighed eller greb).
    switch_electrical_positions:
      name: Elektriske positioner for kontakt
      description: Specificerer antallet og funktionen af elektriske positioner på
        kontakten (f.eks. 3-position eller kortvarigt tændt).
    swivel_type:
      name: Swiveltype
      description: Specificerer swivelkonfigurationen, der bruges til at reducere
        sammenfiltring af snoren.
    sword_scabbard_material:
      name: Materiale til sværdskede
      description: Specificerer det primære materiale i den medfølgende skede/hylster,
        hvis relevant.
    synthesizer_form_factor:
      name: Formfaktor for synthesizer
      description: Beskriver synthesizerens fysiske eller spillemæssige grænsefladeformat.
    synthetic_feather_style:
      name: Stil for syntetisk fjer
      description: Stil eller snit på den syntetiske fjer, der bruges til forskellige
        looks og håndværksteknikker.
    synthetic_formulation_type:
      name: Syntetisk formuleringstype
      description: Specificerer den syntetiske basisolie- eller formuleringstype (f.eks.
        PAO, ester eller hydrokrakket Group III).
    syrup_base_ingredient:
      name: Basisingrediens i sirup
      description: Identificerer den primære plante- eller sukkerkilde, som siruppen
        eller nektaren stammer fra (f.eks. ahorn, agave eller rørsukker).
    syrup_variety:
      name: Sirupvariant
      description: Definerer siruppens generelle stil eller kategori baseret på formulering
        eller traditionel brug (f.eks. ahorn, kaffearoma, frugt eller medicinsk).
    t_shirt_fit:
      name: Pasform for T-shirt
      description: Beskriver T-shirtens tilsigtede overordnede pasform eller snit.
    tabla_included_components:
      name: Medfølgende komponenter til tabla
      description: Angiver, hvilke centrale dele der følger med tabla-produktopslaget
        (enkelt tromme kontra sæt, covers eller etuier, stemmehammer osv.).
    tabla_set_pieces_included:
      name: Medfølgende dele i tablasæt
      description: Angiver, hvilke komponenter der følger med tablasættet (f.eks.
        dayan, bayan, ringe, covers, stemmeværktøj eller taske).
    tabla_tonal_pitch_range_bayan:
      name: Tonalt interval eller pitch-interval for tabla (bayan)
      description: Beskriver den typiske pitch- eller tonalområdekategori for bayan-trommer
        (bas) baseret på størrelse og konstruktion.
    table_base_material:
      name: Materiale i bordbase
      description: Identificerer det primære materiale i bordets base eller sokkel
        (adskilt fra ben eller bordplade), hvilket hjælper med materialespecifik filtrering.
    table_base_type:
      name: Bordbasetype
      description: Identificerer det strukturelle design, der understøtter bordpladen
        (f.eks. sokkel, buk eller X-base).
    table_coverage_position:
      name: Dækningsposition for bordtennisbord
      description: 'Angiver, hvilke bordtennisbordpositioner overtrækket er designet
        til at passe til: sammenklappet, spilleklart eller begge dele.'
    table_hockey_part_type:
      name: Reservedelstype for bordhockey
      description: Identificerer den specifikke komponenttype inden for bordhockey-,
        airhockey-, stanghockey- eller bubblehockeysystemer.
    table_leg_design:
      name: Design af bordben
      description: Identificerer benets strukturelle stil eller geometri, så kunder
        kan matche specifikke æstetiske og støttemæssige behov.
    table_size:
      name: Bordstørrelse
      description: Kommercielt angivet samlet billardbordstørrelse (i fod), så kunder
        hurtigt kan vælge almindelige muligheder som 7-fods barborde eller 9-fods
        turneringsborde.
    table_size_category:
      name: Størrelseskategori for bord
      description: Kategoriserer bordfodboldbordet efter samlet fodaftryk, så kunder
        kan matche den tilgængelige plads uden at beregne mål.
    table_tennis_certification:
      name: Bordtenniscertificering
      description: Angiver officielle standarder eller godkendelser fra officielle
        organer, som produktet opfylder (f.eks. ITTF eller EN 14468-2-klasser).
    tabletop_tilt_function:
      name: Vippefunktion for bordplade
      description: Specificerer, om bordpladen kan vippes, foldes eller drejes til
        forskellige vinkler.
    tackle_components_included:
      name: Medfølgende fiskegrejskomponenter
      description: Angiver de specifikke fiskegrejsdele, der følger med sættet, så
        kunderne ved præcis, hvad der medfølger.
    talking_drum_accessories_included:
      name: Medfølgende tilbehør til talking drum
      description: Angiver det tilbehør, der følger med talking drum’en (i æsken).
    talking_drum_cord_material:
      name: Snoremateriale til talking drum
      description: Materiale, der bruges til spændesnorene eller -rebene, som forbinder
        trommeskindene.
    talking_drum_tuning_mechanism:
      name: Stemmemekanisme for talking drum
      description: Hvordan trommens tonehøjde ændres, eller spændingen påføres under
        spil (eller ved opsætning).
    tam_tam_construction_style:
      name: Konstruktionstype for tam-tam
      description: Tam-tammens konstruktions- eller hamringsstil.
    tam_tam_items_included:
      name: Medfølgende dele til tam-tam
      description: Tilbehør, der følger med tam-tammen (f.eks. kølle, stativ eller
        cover).
    tamarillo_variety:
      name: Tamarillovariant
      description: Identificerer den specifikke kultivar eller farvevariant af tamarillofrugten.
    tamarind_variety:
      name: Tamarindvariant
      description: Specificerer den botaniske eller kommercielle variant af tamarind,
        som kan påvirke smag, tekstur og kulinarisk brug.
    tambourine_frame_style:
      name: Rammestil for tamburin
      description: Beskriver den fysiske håndholdte rammekonfiguration, der bruges
        til at holde eller spille på tamburinen.
    tambourine_head_material:
      name: Materiale i tamburinskind
      description: Specificerer materialet i spillehovedet (membranen) på tamburiner
        med skind.
    tambourine_jingle_configuration:
      name: Jinglekonfiguration for tamburin
      description: Hvordan jinglerne er arrangeret eller konstrueret på tamburinen.
    tambourine_jingle_material:
      name: Jinglemateriale for tamburin
      description: Specificerer materialet i tamburinens jingler (metalskiverne),
        hvilket påvirker tone og holdbarhed.
    tambourine_mounting_type:
      name: Monteringstype for tamburin
      description: Hvordan tamburinen er beregnet til at blive holdt eller monteret
        under spil.
    tambourine_tuning_mechanism:
      name: Stemmemekanisme for tamburin
      description: Specificerer det stemmesystem, der bruges på stemmebare håndholdte
        tamburiner (hvis relevant).
    tank_model_scale:
      name: Skala for tankmodel
      description: Specificerer skalaforholdet for tankmodellen (f.eks. 1:35 eller
        1:72).
    tank_top_back_style:
      name: Rygstil for tanktop
      description: Specificerer formen eller snittet på tanktoppens ryg, hvilket påvirker
        støtte, bevægelighed og æstetik.
    tape_application_area:
      name: Påføringsområde for tape
      description: Specificerer den del af udstyret eller spilleren, hvor tapen er
        beregnet til at blive påført, så kunderne kan vælge den korrekte stil.
    tape_finish:
      name: Tapefinish
      description: Tapens overflade- eller visuelle finish (glans eller tekstur).
    tape_purpose:
      name: Formål med tape
      description: Specificerer tapens primære funktionelle anvendelse inden for vedligeholdelse
        eller tilpasning af ketsjere.
    tape_type:
      name: Tapetype
      description: Klassificerer hockeystapens funktionelle stil eller konstruktion,
        f.eks. stof, klar polyethylen, greb, elastisk selvhæftende, benskinne eller
        vaskeskind.
    tapenade_main_ingredients:
      name: Hovedingredienser i tapenade
      description: Specificerer den primære basisingrediens, der definerer tapenaden
        (oliven, tomat, aubergine, peberfrugt osv.), nyttigt for kunder med ingrediensbaserede
        præferencer eller begrænsninger.
    tapestry_loom_loom_format:
      name: Vævformat for gobelinvæv
      description: Gobelinhåndvævens overordnede formfaktor eller stativstil.
    tapestry_loom_shedding_method:
      name: Skaftningsmetode for gobelinvæv
      description: Hvordan væven danner et skel (adskiller trendtråde), så islættet
        kan føres igennem.
    tapestry_loom_tensioning_system:
      name: Spændingssystem for gobelinvæv
      description: Metoden, der bruges til at spænde og fastgøre trenden på gobelinvæven.
    tar_head_material:
      name: Materiale i tar-skind
      description: Identificerer materialet i tar-trommeskindet (membranen), hvilket
        i høj grad påvirker følelse, holdbarhed og tone.
    tar_playing_style:
      name: Spillestil for tar-tromme
      description: Specificerer den primære spilleposition eller -teknik, som taren
        er designet til.
    tar_tuning_system:
      name: Stemmesystem for tar
      description: Specificerer, hvordan taren stemmes (hvordan skindspændingen justeres).
    target_components:
      name: Målkomponenter
      description: Specificerer, hvilke brændstof- eller luftindtagskomponenter produktet
        er beregnet til at rengøre.
    target_relative_humidity_rh:
      name: Relativ målfugtighed (RH)
      description: Den tilsigtede relative målfugtighed, som produktet er designet
        til at opretholde i instrument- eller etuimiljøet.
    target_resetting_mechanism:
      name: Nulstillingsmekanisme for mål
      description: Beskriver, hvordan eller om et mål vender tilbage til sin oprindelige
        position efter at være blevet ramt.
    target_trainer_type:
      name: Type af måltræner
      description: Klassificerer den overordnede stil eller det overordnede format
        for racquetball- eller squashmåltræneren.
    targeted_contaminants:
      name: Målkontaminanter
      description: Typer af mikrober eller parasitter, som produktet er certificeret
        til at eliminere.
    targeted_muscle_group:
      name: Målrettet muskelgruppe
      description: Primær muskelgruppe, som tilbehøret er beregnet til at træne eller
        støtte.
    taro_variety:
      name: Tarovariant
      description: Specificerer den kultivar, art eller det markedsnavn, som taroroden
        tilbydes under (f.eks. Purple Taro, Eddoe eller Dasheen).
    tassel_trim_header_type:
      name: Type af topkant for kvastbånd
      description: Specificerer konstruktionen af den øverste kant eller monteringsdel,
        der bruges til at fastgøre kvastbånd til en overflade (f.eks. tape, fletning
        eller snor).
    tassel_trim_use_case:
      name: Anvendelsesområde for kvastbånd
      description: Primært tilsigtet anvendelsesområde for kvastbåndet.
    taste_profile:
      name: Smagsprofil
      description: Beskriver de dominerende smagskarakteristika for æblesorten.
    tea_variety:
      name: Tevariant
      description: Klassificerer den specifikke type eller stil for te eller infusion
        (f.eks. sort, grøn, matcha eller rooibos), så kunder kan filtrere efter deres
        foretrukne varianter.
    teasing_tool_style:
      name: Stil for teasing tool
      description: Den fysiske stil eller formfaktor for teasing tool’et, der bruges
        til at åbne og blande fiber (f.eks. børste, rive eller kam).
    tee_base_style:
      name: Basestil for tee
      description: Identificerer det strukturelle design af basen på et rugby-kicking
        tee, som understøtter bolden.
    temper_hardness:
      name: Temperering eller hårdhed
      description: Angiver, hvor blød eller hård tråden er (hvor godt den holder formen).
    temperature_control_type:
      name: Temperaturstyringstype
      description: Hvordan værktøjets temperatur styres eller justeres.
    tenkara_action_ratio:
      name: Tenkara-aktionsforhold
      description: Angiver det traditionelle Tenkara-fleksforhold, der beskriver,
        hvor stangen bøjer under belastning (f.eks. 6:4).
    tennis_ball_court_surface:
      name: Baneoverflade for tennisbold
      description: Specificerer den eller de baneoverflader, som bolden er designet
        til, for at sikre optimal ydeevne og holdbarhed.
    tennis_ball_pressure_type:
      name: Tryktype for tennisbold
      description: Identificerer boldens indvendige tryk eller konstruktion (tryksat,
        trykløs, lav kompression eller skum), hvilket påvirker opspring og holdbarhed.
    tennis_racket_grip_size:
      name: Grebsstørrelse for tennisketsjer
      description: Specificerer den standardiserede omkreds af ketsjerhåndtaget (L0-L5
        eller tilsvarende i tommer) for at sikre korrekt pasform og komfort til hånden.
    tenor_flutophone_fingering_system:
      name: Fingersystem for tenorflutofon
      description: Specificerer det fingersystem, der bruges af tenorflutofonen (pensum-
        eller notationskonvention).
    tenor_recorder_joint_type:
      name: Samlingstype for tenorblokfløjte
      description: Specificerer samlings- eller forbindelsestypen mellem tenorblokfløjtens
        sektioner.
    tenor_saxophone_key_system:
      name: Klapmekanisme for tenorsaxofon
      description: Specificerer klapsystemet eller den standard, der bruges (ofte
        omtalt som fransk eller Boehm-stil for saxofoner).
    tenor_saxophone_pad_material:
      name: Pudemateriale for tenorsaxofon
      description: Specificerer det primære materiale, der bruges til instrumentets
        puder.
    tenor_trombone_slide_type:
      name: Trækstype for tenortrombone
      description: Den type træk, der bruges på tenortrombonen (f.eks. standard eller
        lige kontra trigger eller axial flow).
    tenor_trombone_valve_configuration:
      name: Ventilkonfiguration for tenortrombone
      description: Angiver, om tenortrombonen har en ventil- eller rotortilkobling,
        og hvilken konfiguration den bruger.
    tension_control_type:
      name: Spændingskontroltype
      description: Angiver, hvordan (eller om) skyttelen giver justerbar modstand
        eller spænding på spolen eller pirnen under fremføring.
    tension_mechanism:
      name: Spændingsmekanisme
      description: Den spændingsstil, der bruges til at styre islætstilførslen fra
        spolen eller pirnen under vævning.
    tension_pitch_modulation_system:
      name: Spændings- eller tonehøjdemodulationssystem
      description: Hvordan talking drum’en ændrer tonehøjde eller spænding under spil,
        f.eks. ved at klemme spændesnorene.
    tension_system:
      name: Spændingssystem
      description: Det optags- eller spændingssystem til spinderok, som flyersættet
        er beregnet til.
    tent_fabric_material:
      name: Teltstofmateriale
      description: Identificerer det primære stof, der bruges i teltets oversejl eller
        teltdug, hvilket påvirker vægt, åndbarhed og vejrbestandighed.
    tent_season_rating:
      name: Sæsonvurdering for telt
      description: Klassificerer teltet efter antallet af sæsoner eller vejrforhold,
        det er konstrueret til (f.eks. 3-sæson, 4-sæson eller ekspedition).
    tent_setup_type:
      name: Opsætningstype for telt
      description: Angiver teltets strukturelle opsætningsstil, f.eks. fritstående,
        semi-fritstående, ikke-fritstående, oppustelig eller airframe eller pop op.
    tent_style:
      name: Teltstil
      description: Beskriver teltets strukturelle design (f.eks. kuppel, tunnel eller
        A-frame).
    test_result_output_method:
      name: Outputmetode for testresultat
      description: Specificerer, hvordan bilbatteritesteren præsenterer eller leverer
        testresultater til brugeren (f.eks. indikator, skærm, udskrift, app eller
        softwarerapport).
    tether_strap_system:
      name: Tether- eller stropsystem
      description: Den type tether- eller stropsystem, der bruges til at forbinde
        nakkestøtten til hjelmen eller selen (hvis relevant).
    text_color:
      name: Tekstfarve
      description: Farven på den trykte eller broderede tekst på etiketten, adskilt
        fra etikettens baggrundsfarve.
    textile_craft_machine_operation_type:
      name: Betjeningstype for tekstilhåndværksmaskine
      description: Hvordan maskinen betjenes (hånddrevet, foddrevet eller motoriseret/elektrisk).
    textile_finish_treatment:
      name: Tekstilfinish eller -behandling
      description: Specificerer bemærkelsesværdige overfladebehandlinger, der er påført
        tekstilmaterialet.
    texture_inclusions:
      name: Teksturindeslutninger
      description: Specificerer tilføjede teksturkomponenter, f.eks. aloe-pulp, basilikumfrø,
        nata de coco, popping boba eller frugtstykker.
    therapeutic_technology:
      name: Terapeutisk teknologi
      description: Specificerer en eventuel integreret terapeutisk funktion, f.eks.
        kølende gel, magnetstrimler eller infrarød keramik.
    thermal_set_components:
      name: Komponenter i termosæt
      description: Identificerer, om produktet kun indeholder en underdel, kun en
        overdel eller begge dele som et sæt.
    thermal_weight:
      name: Varmevægt
      description: Angiver varmekategorien for balaclavastoffet.
    thermostat_type:
      name: Termostattype
      description: Det funktionelle design eller den styringsstil, der bruges i en
        termostat til et motorkøretøjs kølesystem.
    thimble_guide_size:
      name: Størrelse på fingerbølsguide
      description: Størrelsesbetegnelse for fingerbølsguiden (pasforms- eller dækningsstørrelse),
        der typisk sælges som small, medium eller large snarere end i målte dimensioner.
    thread_connection_size:
      name: Gevindtilslutningsstørrelse
      description: Definerer gevindspecifikationen, der forbinder skafter, spidser
        og adaptere (f.eks. 6 mm eller 5/16"-24).
    thread_construction:
      name: Trådkonstruktion
      description: Hvordan tråden er konstrueret eller behandlet (f.eks. delt broderigarn
        kontra bonded thread).
    thread_cord_type_beading_pattern:
      name: Tråd- eller snortype (perlemønster)
      description: Anbefalet tråd- eller snortype, der bruges til at færdiggøre mønstret.
    thread_cutter_form_factor:
      name: Formfaktor for trådklipper
      description: Identificerer trådklipperens fysiske stil, f.eks. håndholdt saks,
        vedhængsformet eller ringformet.
    thread_cutter_mechanism:
      name: Trådklippermekanisme
      description: Beskriver den skærehandling eller mekanisme, der bruges af trådklipperen.
    thread_cutter_safety_features:
      name: Sikkerhedsfunktioner for trådklipper
      description: Angiver indbyggede sikkerhedsfunktioner, der reducerer risikoen
        for utilsigtede snit eller beskytter bladene under opbevaring.
    thread_cutter_usage_application:
      name: Brug eller anvendelse af trådklipper
      description: Angiver trådklipperens primære tilsigtede håndværksbrug.
    thread_finish_treatment:
      name: Trådfinish eller -behandling
      description: Overfladefinish eller -behandling påført tråden, som påvirker håndtering
        og ydeevne (f.eks. vokset, bonded eller merceriseret).
    thread_material:
      name: Trådmateriale
      description: Primært fiber- eller materialeindhold i tråden eller broderigarnet
        (ikke stoffet).
    thread_material_fiber:
      name: Trådmateriale (fiber)
      description: Specificerer den primære fiber eller det primære materiale i selve
        tråden (ikke stoffet).
    thread_package_format:
      name: Trådemballageformat
      description: Emballageformfaktor for sytråd (f.eks. spole, kone eller undertrådsspole).
    thread_rack_compatible_spool_type:
      name: Kompatibel spoletype for trådstativ
      description: Den type trådemballage, som stativet er designet til at rumme (spoler
        kontra koner osv.).
    thread_standard_size:
      name: Standardstørrelse for tråd
      description: Identificerer den trådstørrelses- eller vægtstandard, der bruges
        på produktets etiket (f.eks. wt, Tex eller denier).
    thread_type:
      name: Trådtype
      description: Specificerer konstruktionen eller typen af korsstingstråd eller
        -broderigarn.
    thread_weight_system:
      name: Trådvægtssystem
      description: Den standard, der bruges til at udtrykke trådens tykkelse/vægt.
    thread_yarn_guide_mounting_attachment_style:
      name: Monterings- eller fastgørelsesstil for tråd- og garnguide
      description: Beskriver, hvordan guiden bæres eller monteres under brug.
    thread_yarn_guide_tension_control:
      name: Spændingskontrol for tråd- og garnguide
      description: Angiver, om og hvordan guiden giver justerbar spænding eller modstand
        på tråden eller garnet.
    thread_yarn_organizer_features:
      name: Funktioner for tråd- og garnorganizer
      description: Fremhæver funktionelle organiserings- og bærbarhedsfunktioner,
        der er specifikke for opbevaring af tråd eller garn.
    threader_intended_use:
      name: Tilsigtet brug af tråder
      description: Angiver den primære håndværkskontekst, som den håndholdte nåletråder
        er designet til.
    threading_system:
      name: Trådningssystem
      description: Angiver den metode og de hjælpemidler, der bruges til at tråde
        overlockmaskinen (f.eks. manuel, farvekodet, guidet eller lufttrådning).
    threading_type:
      name: Trådningstype
      description: Angiver, om smykket bruger indvendige gevind, udvendige gevind,
        er gevindløst eller ikke relevant.
    throttle_type_scooter_conversion:
      name: Gastype (scooterkonvertering)
      description: Specificerer den gasformfaktor eller -grænseflade, der følger med
        eller kræves af konverteringssættet.
    throw_rope_end_attachment:
      name: Endefastgørelse for kasteline
      description: Den afslutnings- eller fastgørelsesbeslag eller løkke, der findes
        i kastelinens arbejdsende(r).
    throw_rope_storage_packaging_type:
      name: Opbevarings- eller emballagetype for kasteline
      description: Hvordan kastelinen opbevares eller udrulles (f.eks. taske eller
        hjul).
    throw_rope_visibility_features:
      name: Synlighedsfunktioner for kasteline
      description: Synligheds- og identifikationsfunktioner, der er beregnet til at
        gøre linen lettere at se i vand eller svagt lys.
    thrower_operation_type:
      name: Betjeningstype for kaster
      description: Klassificerer kasterens mekaniske eller betjeningsmæssige stil
        for hurtig filtrering af manuelle kontra automatiske mekanismer.
    thumb_design:
      name: Tommeldesign
      description: Beskriver, hvordan tommelfingeren er integreret i handsken, hvilket
        påvirker sikkerhed og greb.
    tiara_design:
      name: Tiaradesign
      description: Specificerer tiaraens overordnede strukturelle stil eller silhuet.
    tie_down_points_straps_included:
      name: Fastgørelsespunkter eller stropper inkluderet
      description: Specificerer, om stativet har integrerede fastgørelsespunkter og/eller
        stropper, der medfølger, til at sikre motorcyklen eller scooteren.
    tiling_format:
      name: Fliseformat
      description: Specificerer PDF-layoutstilen til samling af udskrevne sider.
    time_current_characteristic:
      name: Tid-strøm-karakteristik
      description: Angiver sikringens tid-strøm-adfærd (f.eks. hurtigtvirkende kontra
        tidsforsinket), hvilket påvirker egnetheden til kredsløb med startstrøm.
    timer_count_mode:
      name: Tællefunktion for timeren
      description: Specificerer timerens tællefunktion, f.eks. nedtælling, optælling
        (stopur), begge eller interval/gentagelse.
    timer_display_type:
      name: Displaytype for timeren
      description: Angiver, hvordan spiltimeren viser den resterende tid (f.eks. digital
        skærm, analog urskive, timeglas eller ingen visuel visning).
    timer_operating_modes:
      name: Driftstilstande for timer
      description: Understøttet timeradfærd til udløsning af effekter.
    timing_belt_construction_material_rubber_compound:
      name: Konstruktionsmateriale i tandrem (gummiblanding)
      description: Primær gummiblanding i remmen (f.eks. HNBR), hvilket påvirker varme-
        og oliebestandighed og levetid.
    timing_belt_profile:
      name: Tandremprofil
      description: Tandprofil- eller formstandard for tandremmen (f.eks. trapezformet
        kontra kurvelineær).
    timing_belt_reinforcement_cord_material:
      name: Materiale i tandremmens forstærkningssnor
      description: Specificerer det indvendige forstærkningssnormateriale i tandremmen
        (f.eks. glasfiber eller aramid), hvilket påvirker styrke og stræk.
    timing_component_material:
      name: Materiale i timingkomponent
      description: Primært materiale i timingkomponenten (remblanding, kæde- eller
        gearmetal eller dækselmateriale).
    tin_whistle_body_material:
      name: Kropsmateriale for tin whistle
      description: Indfanger almindelige kropsmaterialer for tin whistle mere specifikt
        end den brede liste over instrumentmaterialer, når det er nødvendigt.
    tin_whistle_bore_type:
      name: Boringstype for tin whistle
      description: Specificerer boringens design i tin whistle’en.
    tin_whistle_included_accessories:
      name: Medfølgende tilbehør til tin whistle
      description: Tilbehør, der følger med tin whistle’en (f.eks. etui eller rensestang).
    tip_finish_coating:
      name: Finish eller belægning på spids
      description: Specificerer overfladebehandlingen på værktøjets arbejdsende (f.eks.
        forkromet eller pulverlakeret), hvilket påvirker korrosionsbestandighed og
        risikoen for at beskadige fælgen.
    tip_shape:
      name: Spidsform
      description: Beskriver formen eller skarpheden af guitarplekterets spids, hvilket
        påvirker artikulation og plekterfølelse.
    tippet_rating:
      name: Tippet-vurdering
      description: Maksimal anbefalet tippet-styrke udtrykt i fluefiskeriens X-betegnelser
        (f.eks. 4X).
    tire_changer_operation_type:
      name: Betjeningstype for dækskifter
      description: Specificerer, hvordan en dækskifter aktiveres eller betjenes (f.eks.
        manuelt, pneumatisk eller hydraulisk). Adskilt fra den generelle attribut
        “Power source”; bruges ved beskrivelse af maskinens betjenings- eller aktiveringsmetode.
    tire_changer_type:
      name: Dækskiftertype
      description: Dækskifterens generelle betjeningsstil, design eller automatiseringsniveau.
    tire_compound_type:
      name: Type af dækgummiblanding
      description: Specificerer klassificeringen af gummiblandingen i dækkene (f.eks.
        soft, rain eller slick), hvilket påvirker vejgreb og holdbarhed under forskellige
        forhold.
    tire_load_range:
      name: Dækkets belastningsområde
      description: Angiver dækkets ply rating- eller load range-betegnelse (almindeligt
        for LT-dæk), som afspejler bæreevne.
    tire_position:
      name: Dækposition
      description: Anbefalet monteringsposition på køretøjet
    tire_repair_kit_components:
      name: Komponenter i dækreparationssæt
      description: Specificerer de dele, der følger med sættet, så kunderne kan sammenligne
        sampakkens fuldstændighed.
    tire_sidewall_type:
      name: Type af dæksidevæg
      description: Specificerer sidevæggens styling- eller konstruktionsegenskaber.
    tire_speed_rating:
      name: Hastighedskode for dæk
      description: Dækkets hastighedskode (f.eks. H, V eller W), der angiver maksimal
        vedvarende hastighedskapacitet.
    tire_spoon_type:
      name: Dækjernstype
      description: Kategoriserer dækjernet efter endefacon og tilsigtet brug.
    tire_system_compatibility:
      name: Kompatibilitet med dæksystemet
      description: Angiver, om tætningsmidlet er beregnet til tubeless-opsætninger,
        dæk med slange eller begge dele.
    tire_temperature_rating_utqg:
      name: Dæktemperaturvurdering (UTQG)
      description: UTQG-temperaturbestandighedsgrad for bildæk (f.eks. A, B eller
        C).
    tire_traction_rating_utqg:
      name: Dæktraktionsvurdering (UTQG)
      description: UTQG-traktionsgrad for bremseevne på vådt underlag.
    tire_tread_style:
      name: Slidbanestil for dæk
      description: Beskriver det generelle slidbanemønster på tubulardækket, hvilket
        afspejler tilsigtet terræn og grebsegenskaber.
    tire_tube_type:
      name: Dækslangetype
      description: Om dækket er designet til tubeless-brug eller brug med slange.
    title_status:
      name: Titelstatus
      description: Juridisk eller registreringsmæssig titelstatus for køretøjet.
    tobacco_application:
      name: Tobaksanvendelse
      description: Angiver den tilsigtede brugsmetode eller rygeanordning, som den
        løse tobak er designet til.
    tobacco_cut_type:
      name: Type af tobaksskæring
      description: Specificerer den fysiske skæring eller forberedelsesstil af den
        løse tobak, hvilket påvirker forbrændingshastighed, pakningsmetode og den
        samlede rygeoplevelse.
    tobacco_strength:
      name: Tobaksstyrke
      description: Angiver tobakkens oplevede fylde eller nikotinstyrke ved forbrug,
        så kunder kan vælge en intensitet, der matcher deres præference.
    toe_construction:
      name: Tåkonstruktion
      description: Specificerer konfigurationen af tåområdet på våddragtsstøvler,
        hvilket påvirker balance, boardfølelse og varme.
    toe_coverage:
      name: Tådækning
      description: Angiver den type tåafdækning, som sokken giver.
    toe_pick_style:
      name: Tåtakkestil
      description: Beskriver designet af tåtakken på kunstskøjteklinger.
    toe_protection_type:
      name: Type af tåbeskyttelse
      description: Angiver, om og hvordan tåområdet er forstærket af sikkerhedshensyn
        (f.eks. ståltå eller blød tå).
    toe_reinforcement_type:
      name: Type af tåforstærkning
      description: Detaljerer konstruktionen af tåområdet, hvilket påvirker holdbarhed
        og skokompatibilitet.
    toe_stop_stem_thread_size:
      name: Gevindstørrelse for toe stop-stamme
      description: Specificerer gevindstørrelsen på toe stop-stammer for at sikre
        kompatibilitet med pladen.
    tofu_preparation_style:
      name: Tilberedningsform for tofu
      description: Kategoriserer den traditionelle stil eller undertype af tofu ud
        over fasthed (f.eks. silken, block, puff, skin, knot eller fermenteret).
    tom_mount_adjustment_features:
      name: Justeringsfunktioner for tom-holder
      description: Specificerer, hvilke justeringer tom-holderen giver til placering
        af trommen (f.eks. hældning, rotation eller højde).
    tom_mount_components_included:
      name: Medfølgende komponenter til tom-holder
      description: Specificerer, hvilke dele der følger med tom-holderen (receiver,
        arm, kugle, klemmer, memory locks osv.).
    tom_mount_mounting_position:
      name: Monteringsposition for tom-holder
      description: Specificerer, hvor tom-holderen er beregnet til at blive fastgjort
        (f.eks. stortromme, bækkenstativ eller rack).
    tonneau_cover_mounting_style:
      name: Monteringsstil for tonneau-cover
      description: Angiver, hvordan tonneau-coveret installeres eller fastgøres til
        pickupens ladskinner.
    tool_case_form_factor:
      name: Formfaktor for værktøjskasse
      description: Identificerer værktøjskassens fysiske stil, hvilket påvirker bærbarhed
        og opbevaring (f.eks. dokumentmappe eller hård skal).
    tool_functions_included:
      name: Inkluderede værktøjsfunktioner
      description: Angiver de specifikke reparations- eller vedligeholdelsesfunktioner,
        som et multiværktøj eller værktøjssæt kan udføre.
    top_bunk_access_method:
      name: Adgangsmetode til overkøje
      description: Angiver, hvordan brugere når op til sengens overkøje, hvilket understøtter
        sikkerhed og pladsforhold.
    top_fit:
      name: Pasform for overdel
      description: Specificerer overdelens overordnede silhuet eller pasform på kroppen
        (f.eks. slim eller oversized).
    top_hat_style:
      name: Cylinderhatstil
      description: Identificerer den specifikke stilvariant af en cylinderhat.
    top_soundboard_material:
      name: Topmateriale (klangbund)
      description: Specificerer materialet i guitarens top eller klangbund (den primære
        toneproducerende plade).
    topping_form:
      name: Toppingform
      description: Definerer desserttoppingens fysiske form eller konsistens, så kunder
        hurtigt kan indsnævre den ønskede anvendelse.
    topping_type:
      name: Toppingtype
      description: Angiver den primære udvendige topping eller belægning på donuten.
    tow_hook_type:
      name: Type af trækkrog
      description: Angiver, om kneeboardet har en integreret trækkrog, og specificerer
        mekanismens stil.
    tow_point_configuration:
      name: Konfiguration af trækpunkt
      description: Specificerer den trækpunktskonfiguration (enkelt, dobbelt eller
        flere), som den towable tube tilbyder til forskellige kørepositioner.
    tow_strap_protective_features:
      name: Beskyttende funktioner for trækstrop
      description: Bemærkelsesværdige sikkerheds- og holdbarhedskonstruktionsfunktioner
        indbygget i trækstroppen.
    tow_strap_type:
      name: Type af trækstrop
      description: Angiver den funktionelle konstruktion af trækstroppen, f.eks. statisk
        trækstrop kontra kinetisk recovery-strop.
    towable_tube_style:
      name: Stil for towable tube
      description: Identificerer towable tubens generelle design eller formfaktor,
        som bestemmer køreposition og oplevelse.
    towed_water_sport_discipline:
      name: Disciplin for trukket vandsport
      description: Specificerer den primære trukne vandaktivitet, som handsken er
        designet til.
    towel_features:
      name: Håndklædefunktioner
      description: Angiver særlige egenskaber eller ekstra dele, der følger med et
        håndklæde.
    towel_style:
      name: Håndklædestil
      description: Klassificerer golfhåndklædets funktionelle design eller format.
    toy_airplane_control_type:
      name: Betjeningstype for legetøjsfly
      description: Specificerer, hvordan legetøjsflyet styres af brugeren.
    toy_airplane_features:
      name: Funktioner for legetøjsfly
      description: Fremhæver bemærkelsesværdige legefunktioner i legetøjsflyet.
    toy_airplane_flight_capability:
      name: Flyveegenskab for legetøjsfly
      description: Angiver, om legetøjsflyet er designet til faktisk at flyve eller
        svæve eller primært er til leg på jorden eller udstilling.
    toy_audio_features:
      name: Lydfunktioner for legetøj
      description: Angiver de lydfunktioner og lydeffekter, der er indbygget i legetøjet.
    toy_boat_play_features:
      name: Legefunktioner for legetøjsbåd
      description: Fremhæver bemærkelsesværdige interaktive funktioner ved legetøjsbåde
        til opdagelse og filtrering.
    toy_boat_recommended_play_environment:
      name: Anbefalet legemiljø for legetøjsbåd
      description: Specificerer det tilsigtede legemiljø for legetøjsbåden for at
        understøtte kundernes forventninger og sikkerhed (f.eks. badekar kontra åbent
        vand).
    toy_bowling_equipment_included:
      name: Medfølgende legetøjsbowlingudstyr
      description: Specificerer, hvilke bowlingkomponenter der følger med legetøjsbowlingsættet
        (f.eks. kegler, kugle, bane eller måtte eller bæretaske).
    toy_car_features:
      name: Funktioner for legetøjsbil
      description: Fremhæver legefunktioner, der er integreret i legetøjsbilen (adskilt
        fra fremdrift), f.eks. lys, lyde eller dele, der kan åbnes.
    toy_drawing_tablet_accessories_included:
      name: Medfølgende tilbehør til legetøjstegnetablet
      description: Angiver yderligere tilbehør, der følger med ud over selve tabletten
        (f.eks. ekstra stylus eller stempler).
    toy_drawing_tablet_erase_method:
      name: Slettemetode for legetøjstegnetablet
      description: Hvordan tegnefladen ryddes eller slettes.
    toy_drawing_tablet_screen_type:
      name: Skærmtype for legetøjstegnetablet
      description: Den type tegne- eller displayflade, der bruges (f.eks. LCD-skrivetablet
        kontra magnetisk).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Skrive-/tegneinstrument til legetøjstegnetablet
      description: Primært værktøj, der bruges til at tegne på tabletten (stylustype).
    toy_figure_sound_feature:
      name: Lydfunktion for legetøjsdyrefigur
      description: Angiver, om dyrefiguren laver lyde, og hvilken type (f.eks. brøl
        eller realistisk dyrelyd).
    toy_game_features:
      name: Funktioner i legetøj/spil
      description: Fremhæver bemærkelsesværdige lege- eller designfunktioner, der
        er relevante for strand- og sandlegetøj.
    toy_gift_basket_items_included:
      name: Medfølgende dele i legetøjsgavekurv
      description: Angiver de primære typer legetøjsdele, der følger med gavekurven
        (f.eks. tøjdyr, byggesæt eller puslespil).
    toy_glider_launch_method:
      name: Startmetode for legetøjssvævefly
      description: Specificerer, hvordan legetøjssvæveflyet sendes afsted, hvilket
        påvirker legestil og kundernes forventninger.
    toy_helicopter_control_type:
      name: Betjeningstype for legetøjshelikopter
      description: Hvordan legetøjshelikopteren styres eller betjenes (uafhængigt
        af fremdrift), f.eks. håndholdt fjernbetjening, appstyring eller ingen styring
        (fri flyvning).
    toy_helicopter_features:
      name: Funktioner for legetøjshelikopter
      description: Centrale funktionelle egenskaber ved en legetøjshelikopter (især
        RC-modeller), som påvirker brugervenlighed og legeværdi.
    toy_jacks_set_items_included:
      name: Medfølgende dele i jacks-legetøjssæt
      description: Specificerer, hvilke centrale dele der følger med jacks-legetøjssættet
        (f.eks. jacks, bold eller pose).
    toy_keyboard_learning_mode:
      name: Læringstilstand for legetøjsklaver
      description: Angiver den uddannelses- eller læringstilgang, som legetøjsklaveret
        understøtter (f.eks. oplyste tangenter, følg-med-sange, guidede lektioner
        eller appunderstøttet læring).
    toy_keyboard_sound_theme:
      name: Lydtema for legetøjsklaver
      description: Typer af indbyggede instrumentstemmer eller lydtemaer, der tilbydes
        (ud over almindeligt klaver).
    toy_kitchen_appliances_included:
      name: Medfølgende legetøjskøkkenapparater
      description: Specificerer det eller de køkkenapparater, der er repræsenteret
        i legesættet, når produktet er et apparat eller apparatfokuseret sæt.
    toy_kitchen_assembly_requirement:
      name: Samlekrav for legetøjskøkken
      description: Angiver, om samling er nødvendig, og den omtrentlige kompleksitet
        af samlingen.
    toy_kitchen_interactive_features:
      name: Interaktive funktioner for legetøjskøkken
      description: Fremhæver interaktive elementer, der ofte findes i legetøjskøkkener
        og relateret tilbehør.
    toy_motorcycle_feature_set:
      name: Funktionssæt for legetøjsmotorcykel
      description: Centrale legefunktioner ved legetøjsmotorcyklen (vælg alle relevante).
    toy_motorcycle_scale:
      name: Skala for legetøjsmotorcykel
      description: Skalaforhold for legetøjs- eller samlermotorcykler (f.eks. 1:12).
    toy_parachute_launch_method:
      name: Startmetode for legetøjsfaldskærm
      description: Hvordan legetøjet er beregnet til at blive startet eller foldet
        ud til flyvning.
    toy_piano_and_keyboard_accessories_included:
      name: Medfølgende tilbehør til legetøjspiano eller -keyboard
      description: Tilbehør, der følger med legetøjspianoet eller legetøjskeyboardet.
    toy_playset_assembly_required:
      name: Samling kræves for legesæt
      description: Angiver, om samling af en voksen er påkrævet før leg (ud over enkel
        sammenklikning).
    toy_playset_items_included:
      name: Medfølgende dele i legesæt
      description: Angiver de væsentlige medfølgende komponenter i legesættet (hvad
        der er i æsken).
    toy_safety_certification:
      name: Sikkerhedscertificering for legetøj
      description: Sikkerheds- og overholdelsesstandarder eller -mærker, der gælder
        for legetøj på kundens marked (f.eks. EN 71, ASTM F963 eller UKCA).
    toy_spaceship_features:
      name: Funktioner for legetøjsrumskib
      description: Angiver almindelige interaktive funktioner og legefunktioner, der
        er indbygget i legetøjsrumskibet.
    toy_spaceship_size_class:
      name: Størrelsesklasse for legetøjsrumskib
      description: Angiver en grov størrelsesklasse for legetøjsrumskibet til hurtig
        filtrering, adskilt fra nøjagtige mål (længde, bredde og højde) og ikke et
        numerisk modelskalaforhold (f.eks. 1:72).
    toy_tableware_pieces_included:
      name: Medfølgende dele i legetøjsservice
      description: Specificerer, hvilke legetøjsservicegenstande der følger med (tallerkener,
        kopper, bestik eller serveringsdele).
    toy_tool_electronic_features:
      name: Elektroniske funktioner for legetøjsværktøj
      description: Beskriver interaktive eller elektroniske funktioner i legetøjsværktøjet
        (lys, lyde, roterende bevægelse osv.).
    toy_tool_set_components_included:
      name: Medfølgende komponenter i legetøjsværktøjssæt
      description: Angiver de specifikke værktøjsdele til rolleleg, der følger med
        pakken (især for værktøjssæt).
    toy_train_scale:
      name: Skala for legetøjstog
      description: Specificerer skala- eller standardsystemet for legetøjs- eller
        modeltog (eller skinnesystemstørrelse) for at sikre kompatibilitet med eksisterende
        tog og skinner.
    toy_train_track_layout_type:
      name: Sporlayouttype for legetøjstog
      description: Beskriver det medfølgende sporlayout eller -form for et togsæt
        eller en udvidelsesskinnepakke.
    toy_weapon_gadget_features:
      name: Funktioner for legetøjsvåben og gadgets
      description: Fremhæver almindelige interaktive og funktionelle egenskaber, der
        er specifikke for legetøjsvåben og spiongadgets.
    tpms_sensor_frequency_band:
      name: Frekvensbånd for TPMS-sensor
      description: Radiofrekvensbånd, der understøttes af TPMS-relateret tilbehør
        (hvor relevant).
    track_and_field_discipline:
      name: Atletikdisciplin
      description: Identificerer den specifikke atletikbegivenhed eller -disciplin,
        som produktet er beregnet til (f.eks. kuglestød, stangspring eller sprint).
    track_event_specialization:
      name: Specialisering for banedisciplin
      description: Angiver den disciplinstype, som spikeskoen er optimeret til.
    track_field_event_suitability:
      name: Egnethed til atletikdisciplin
      description: Identificerer den eller de specifikke atletikdiscipliner, som træningshjælpen
        er beregnet til.
    track_set_special_features:
      name: Særlige funktioner for banesæt
      description: Fremhæver bemærkelsesværdige legefunktioner, der følger med banesættet
        ud over grundlæggende bane og biler.
    track_surface_compatibility:
      name: Kompatibilitet med baneunderlag
      description: Angiver de løbeunderlag, som piggen eller skoen er designet til.
    tracking_aid_type:
      name: Type af sporingshjælp
      description: Angiver, om kajakken har enheder, der forbedrer retningsstabiliteten.
    traction_pattern_type:
      name: Type af grebsmønster
      description: Beskriver det primære rille- eller slidbanemønster, der giver greb
        på puden.
    trading_card_league:
      name: Liga for samlekort
      description: Identificerer den sportsliga, der er knyttet til kortsættet eller
        emnet, hvor relevant.
    trailer_construction:
      name: Trailerkonstruktion
      description: Identificerer trailerens primære konstruktion for stel eller karosseri
        (f.eks. aluminium, stål eller blandet konstruktion).
    trailer_coupler_size:
      name: Koblingsstørrelse for trailer
      description: Specificerer størrelsen på trailerkoblingens kugle, der kræves
        til bugsering.
    trailer_hitch_mounting_location_method:
      name: Monteringsplacering eller -metode for anhængertræk
      description: Specificerer, hvor og hvordan anhængertrækket monteres på køretøjet
        (f.eks. bageste receiver, forreste receiver, stelmonteret, kofangermonteret
        eller ladmonteret).
    trailer_light_function:
      name: Trailerlygtefunktion
      description: Primær funktion eller position for trailerlygten.
    trailer_suspension_type:
      name: Affjedringstype for trailer
      description: Specificerer den type affjedringssystem, der bruges i cykeltraileren,
        f.eks. skruefjeder eller bladfjeder, for at forbedre kørekomfort og lastbeskyttelse.
    trailer_wiring_circuit:
      name: Trailertilslutningskredsløb
      description: Angiver de lys-, bremse- og hjælpekredsløb eller -signaler, der
        føres af trailertilslutningen (dvs. hvilke strøm-, jord- og signalledninger
        der er til stede).
    trailer_wiring_connector_type:
      name: Stiktype for trailertilslutning
      description: Specificerer stikstandarden på trailer- eller køretøjssiden, der
        bruges til ledninger til trailertilslutning og adaptere.
    train_whistle_intended_use:
      name: Tilsigtet brug af togfløjte
      description: Primær tilsigtet brugssammenhæng for fløjten.
    train_whistle_sound_character:
      name: Lydkarakter for togfløjte
      description: Beskriver fløjtens oplevede klangkarakter eller klangfarve.
    trainer_mounting_type:
      name: Monteringstype for hometrainer
      description: Beskriver, hvordan cyklen kobles til hometraineren (f.eks. Wheel-on
        eller Direct Drive).
    training_dummy_shape:
      name: Form på træningsdummy
      description: Specificerer dummyens overordnede design eller silhuet, hvilket
        påvirker hundens greb og træningens realisme.
    training_focus:
      name: Træningsfokus
      description: Beskriver det primære færdighedsområde, som hjælpemidlet er målrettet
        mod (f.eks. reflekser, fodarbejde eller hånd-øje-koordination).Træningsfokusområde
    training_focus_area:
      name: Fokusområde for træning
      description: Specificerer den primære lacrossefærdighed, som hjælpemidlet er
        designet til at udvikle.
    training_objective:
      name: Træningsmål
      description: Specificerer den primære færdighed eller teknik, som produktet
        er designet til at forbedre.
    training_surface_suitability:
      name: Egnethed til træningsunderlag
      description: Specificerer, hvilke overflader træneren kan bruges på.
    training_surface_usage:
      name: Brug af træningsunderlag
      description: Specificerer de primære aktiviteter, som træningsunderlaget understøtter,
        og skelner mellem skøjteegnede syntetiske ispaneler og underlag til tørtræning
        eller multisport.
    training_usage_type:
      name: Type af træningsbrug
      description: Specificerer den primære tilsigtede brugsperiode eller kontekst
        for træningsbukserne, f.eks. træning om dagen eller natten.
    trampoline_enclosure_type:
      name: Type af trampolinindhegning
      description: Specificerer den indhegningstype, der bruges på trampolinen, herunder
        hvordan og hvor nettet er monteret.
    trampoline_safety_certifications:
      name: Sikkerhedscertificeringer for trampolin
      description: Angiver, hvilke trampolinrelevante sikkerhedsstandarder eller -certificeringer
        produktet angiver at overholde.
    transfer_application_method:
      name: Påføringsmetode for transfer
      description: Specificerer, hvordan transferen påføres stoffet (f.eks. stryges
        på eller varmepresses).
    transfer_method:
      name: Transfermetode
      description: Specificerer, hvordan designet er beregnet til at blive overført
        til stoffet.
    transfer_peel_temperature:
      name: Fjernelsestemperatur for transferfilm
      description: Specificerer den anbefalede temperaturtilstand (varm, lun eller
        kold), hvor bærearket skal fjernes efter presning.
    transmission_cooler_construction:
      name: Konstruktion af transmissionskøler
      description: Specificerer konstruktionsdesignet for en transmissionskølerkerne.
    transmission_fluid_specification:
      name: Specifikation for transmissionsvæske
      description: OEM- eller specifikationsstandard, som transmissionsvæsken opfylder
        (f.eks. Dexron/Mercon-familier, ATF+4 eller JWS 3309).
    transmission_mount_bushing_material:
      name: Bøsningsmateriale til transmissionsophæng
      description: Specificerer det elastomer- eller isolatormateriale, der bruges
        i ophængets bøsning eller isolator (det vibrationsdæmpende element).
    transmission_mount_type:
      name: Type af transmissionsophæng
      description: Specificerer transmissionsophængets konstruktion eller design (f.eks.
        hydraulisk kontra massivt) for at hjælpe med at afgøre pasform, NVH-egenskaber
        og tilsigtet brug.
    transparency_level:
      name: Gennemsigtighedsniveau
      description: Beskriver, hvor gennemsigtige beholderens vægge er, så kunderne
        kan vælge mellem tydeligt indsyn og skjult opbevaring.
    transport_case_type:
      name: Type af transportetui
      description: Klassificerer transportløsningens strukturelle stil eller stivhed,
        hvilket afspejler beskyttelsesniveau og pakkemetode.
    transposition_modes:
      name: Transponeringstilstande
      description: Specificerer de transponerings- eller koncertpitch-tilstande, som
        stemmeapparatet understøtter (f.eks. koncertpitch og transponerende tonearter
        som B♭ eller E♭).
    trap_design:
      name: Fældedesign
      description: Identificerer fældens strukturelle stil eller mekanisme, som bestemmer
        opsætningsmetode og hvilke arter eller miljøer den egner sig bedst til.
    trap_spring_configuration:
      name: Fjederkonfiguration for fælde
      description: Angiver antallet eller placeringen af fjedre, der driver fælden,
        hvilket påvirker styrke og lovlighed.
    travel_bassinet_accessories_included:
      name: Medfølgende tilbehør til rejselift
      description: Angiver ekstra dele, der følger med rejseliften.
    travel_spinning_wheel_assembly_required:
      name: Samling påkrævet for rejsespinderok
      description: Angiver, om rokken kræver samling eller opsætning ud over udfoldning
        (f.eks. montering af flyer, spænding eller træder), før den kan bruges.
    travel_spinning_wheel_portability_features:
      name: Bærbarhedsfunktioner for rejsespinderok
      description: Designfunktioner, der er relateret til bærbarhed for rejsespinderokke,
        f.eks. sammenklappelig konstruktion og medfølgende transportløsninger.
    travel_trailer_appliances_fuel_type:
      name: Brændstoftype for apparater i rejsetrailer
      description: Primært brændstof, der bruges til indbyggede apparater, opvarmning
        eller madlavning (ikke trækkøretøjet).
    travel_trailer_holding_tank_type:
      name: Type af holdingtank i rejsetrailer
      description: Angiver, hvilke holdingtanke der findes i rejsetraileren (vælg
        alle relevante).
    travel_trailer_power_hookup_shore_power:
      name: Strømtilslutning for rejsetrailer (shore power)
      description: Elektriske tilslutningsstandarder, der understøttes til shore power-tilslutninger.
    tread_pattern_type:
      name: Type af slidbanemønster
      description: Klassificerer dækkets overordnede slidbanedesign, f.eks. slick,
        semi-slick eller knobby, hvilket påvirker vejgreb, rullemodstand og tilsigtet
        underlag.
    treadmill_key_type:
      name: Type af løbebåndsnøgle
      description: Beskriver sikkerhedsnøglens fysiske udformning eller betjenings-
        eller tilslutningsmekanisme (f.eks. rund magnetisk, plastindsats eller clip-on).
    treadmill_part_type:
      name: Reservedelstype til løbebånd
      description: Identificerer den specifikke løbebåndskomponent, som produktet
        er beregnet til at erstatte, så kunder hurtigt kan bekræfte pasform (f.eks.
        bånd kontra motor).
    treadmill_position:
      name: Position på løbebånd
      description: Angiver delens installationsposition på løbebåndet (foran, bagpå,
        øverst, nederst eller i midten).
    triangle_striker_material:
      name: Materiale i triangelanslager
      description: Materiale i den medfølgende anslager eller kølle.
    trigger_input_connector:
      name: Stik til triggerinput
      description: Specificerer den fysiske stikstandard, der bruges til triggerinput.
    trigger_input_connector_type:
      name: Stiktype for triggerinput
      description: Specificerer den fysiske stiktype, der bruges til triggerinput.
    trigger_input_zone_support:
      name: Zoneunderstøttelse for triggerinput
      description: Angiver, om triggerinput understøtter enkeltzone- og/eller dobbeltzonetriggere
        (f.eks. skind eller kant) og lignende multizoneimplementeringer.
    trim_application_method:
      name: Påføringsmetode for trim
      description: Angiver, hvordan trimmen er beregnet til at blive fastgjort til
        et projekt (f.eks. påsyning, påstrygning eller klæbemiddel).
    trim_detail:
      name: Trimdetaljer
      description: Identificerer fremtrædende dekorative kanter eller finish på beklædningsdelen
        (f.eks. kvastbånd, frynser eller blondekant).
    trim_elasticity:
      name: Elasticitet i trim
      description: Angiver, om ric-rac-trimmen har stræk til brug på strik- eller
        activewear-projekter.
    trim_finish:
      name: Finish på trim
      description: Overfladefinishbehandling påført trimmen (f.eks. metallisk, glitter
        eller reflekterende).
    trim_tilt_type:
      name: Trim- og tilttype
      description: Om og hvordan motoren understøtter trim- eller tiltjustering.
    trolleybus_power_supply_type:
      name: Strømforsyningstype for trolleybus
      description: Specificerer, hvordan trolleybussen modtager trækkraft fra elnettet.
    truck_bed_body_type:
      name: Lad- eller karosseritype for pickup
      description: Konfiguration af ladet eller karosseriet bag førerhuset.
    truck_bed_length_class:
      name: Længdeklasse for pickup-lad
      description: Angiver den længdeklasse for pickup-lad, som lastnettet er designet
        til at passe til (ofte angivet som kort, standard eller langt lad).
    truck_mounting_hole_pattern:
      name: Monteringshulmønster for trucks
      description: Specificerer det hulmønster, der bruges til at montere trucks på
        decket (f.eks. Old School, New School eller Universal).
    truck_mounting_style:
      name: Monteringsstil for trucks
      description: Hvordan trucks fastgøres til decket (top mount, drop-through osv.),
        hvilket påvirker kørehøjde og stabilitet.
    truck_profile:
      name: Truckprofil
      description: Angiver skateboardtruckens kørehøjdeklassificering i forhold til
        decket, hvilket påvirker hjulfrigang og boardfølelse.
    trumpet_bell_material:
      name: Materiale i trompetklokke
      description: Materiale, der bruges til klokkestykket (som nogle gange adskiller
        sig fra resten af instrumentet).
    trumpet_leadpipe_material:
      name: Materiale i trompetens leadpipe
      description: Materiale eller behandling, der bruges til leadpipe (hovedrøret
        fra mundstykke til ventiler).
    trundle_mechanism:
      name: Udtræksmekanisme for gæsteseng
      description: Beskriver, hvordan den sekundære sengekomponent trækkes ud fra
        hovedrammen.
    trunk_part_type:
      name: Reservedelstype for bagagerum
      description: Specificerer, hvilken bagagerumsrelateret karosserikomponent der
        sælges (f.eks. bagklap, hængsel eller lås).
    tuba_leadpipe_material:
      name: Materiale i tuba-leadpipe
      description: Identificerer det materiale, der bruges i tubaens leadpipe- eller
        mundrørssektion.
    tube_base_type:
      name: Type af rørbase
      description: Specificerer rørets base- eller sokkelfamilie, der bruges til fysisk
        eller elektrisk pasform (f.eks. Octal eller Noval/9-pin).
    tube_matching_grade:
      name: Matchningsgrad for rør
      description: Angiver, om rør er testet eller matchet som et sæt, og hvilken
        type matchning der er udført.
    tube_weight_category:
      name: Vægtkategori for rør
      description: Klassificerer røret efter konstruktion eller vægt (f.eks. Ultralight,
        Standard eller Heavy Duty) for hurtig sammenligning af holdbarhed kontra ydeevne.
    tubeless_compatible:
      name: Tubeless-kompatibel
      description: Angiver, om hjulet er designet til at blive brugt uden slange,
        når det kombineres med tubeless-dæk.
    tubing_shape:
      name: Rørform
      description: Specificerer tværsnitsformen på stativets støtterør.
    tubular_construction_type:
      name: Konstruktionstype for tubulardæk
      description: Specificerer konstruktionstypen for tubulære cykeldæk og skelner
        mellem traditionelle limede tubulardæk og nyere variationer.
    tulip_type_flower_form:
      name: Tulipantype (blomsterform)
      description: Specificerer tulipanernes havebrugstype eller blomsterform i buketten
        (f.eks. enkelt, dobbelt eller papegøje).
    tuner_input_method:
      name: Inputmetode for stemmeapparat
      description: Specificerer, hvordan stemmeapparatet registrerer tonehøjde (mikrofon,
        vibrations- eller clipsensor, instrumentkabelinput eller kontaktpickup).
    tuning_mechanism:
      name: Stemmemekanisme
      description: Hvordan bongoskindene spændes eller stemmes.
    tuning_system:
      name: Stemningssystem
      description: Angiver, hvordan bægertrommen stemmes, eller om den er stembar.
    turn_signal_lens_color:
      name: Farve på blinklygteglas
      description: Farven på det synlige glas eller dæksel på blinklygtehuset (ikke
        farven på det udsendte lys).
    turn_signal_lighting_style:
      name: Lysstil for blinklys
      description: Den visuelle signalstil eller -animation, som blinklyset bruger.
    turnip_and_rutabaga_variety:
      name: Majroe- og kålroevariant
      description: Identificerer den specifikke kultivar eller variant af majroe eller
        kålroe.
    tweeter_crossover_type:
      name: Crossovertype for tweeter
      description: Angiver den type high-pass-crossover og/eller beskyttelseskomponent,
        der følger med tweeteren, hvis relevant.
    tweeter_material:
      name: Tweetermateriale
      description: Primært membran- eller domemateriale i tweeteren.
    tweeter_mount_type:
      name: Monteringstype for tweeter
      description: Specificerer, hvordan tweeteren er beregnet til at blive installeret
        i køretøjet (monteringsmetode eller -beslag).
    twill_direction:
      name: Twillretning
      description: Angiver twill-linjens retning i en denimvævning.
    twist_direction:
      name: Snoningsretning
      description: Retning for tvindingen i garnet/tråden (S-twist eller Z-twist).
    u_joint_series_size:
      name: U-joint-serie eller -størrelse
      description: Specificerer den U-joint-serie eller størrelsesstandard, der bruges
        (f.eks. 1310-serien).
    uilleann_pipes_bag_material:
      name: Materiale i luftsæk til uilleann pipes
      description: Materiale i luftsækskomponenten (hvis inkluderet), hvilket påvirker
        følelse, holdbarhed og vedligeholdelse.
    uilleann_pipes_handedness:
      name: Håndethed for uilleann pipes
      description: Angiver, om sættet er konfigureret til højre- eller venstrehåndet
        spillelayout.
    uilleann_pipes_set_configuration:
      name: Sætkonfiguration for uilleann pipes
      description: Specificerer, hvilken konfiguration af uilleann pipes der følger
        med, baseret på tilstedeværelsen af regulatorer og droner.
    uk_childrens_shoe_size:
      name: Britisk skostørrelse for børn
      description: Angiver britisk størrelse for børnesko, f.eks. 4 eller 4 bred
    uk_clothing_size:
      name: Britisk tøjstørrelse
      description: Angiver britisk tøjstørrelse, f.eks. 12 eller 18
    uk_cup_size:
      name: Britisk skålstørrelse
      description: Angiver britisk skålstørrelse, f.eks. C eller FF
    uk_mens_shoe_size:
      name: Britisk skostørrelse for kvinder
      description: Angiver britisk størrelse for herresko, f.eks. 9 eller 9 bred
    uk_womens_shoe_size:
      name: Britisk skostørrelse for kvinder
      description: Specificerer den britiske skostørrelse for kvinder, såsom 6 eller
        6 Wide
    ukulele_back_and_sides_wood:
      name: Træ til ukulelens bagside og sider
      description: Identificerer det træ eller materiale, der bruges til ukulelens
        bagside og sider.
    ukulele_body_cutaway:
      name: Cutaway på ukulelekrop
      description: Angiver, om koncertukulelens krop har cutaway for lettere adgang
        til de øverste bånd.
    ukulele_body_shape:
      name: Kropsform for ukulele
      description: Ukulelens generelle kropsstil eller -form.
    ukulele_bridge_material:
      name: Bromateriale for ukulele
      description: Specificerer det materiale, der bruges til ukulelens bro.
    ukulele_construction_type:
      name: Konstruktionstype for ukulele
      description: Hvordan instrumentets top, bagside og sider er konstrueret (massivt
        kontra laminat).
    ukulele_electronics_configuration:
      name: Elektronikkonfiguration for ukulele
      description: Angiver, om ukulelen kun er akustisk eller har indbygget elektronik
        (pickup og/eller preamp) til forstærkning.
    ukulele_string_re_entrant_tuning:
      name: Re-entrant tuning for ukulelestreng
      description: Om ukulelen er sat op med re-entrant tuning (high-G) kontra lineær/low-G;
        en almindelig køberpræference, der påvirker lyden.
    ukulele_top_wood:
      name: Træ til ukuleletop
      description: Identificerer det træ eller materiale, der bruges til ukulelens
        top eller klangbund.
    ukulele_tuner_mechanism:
      name: Stemmemekanisme for ukulele
      description: Specificerer stemmeskruernes stil eller mekanisme på ukulelen.
    ukulele_tuner_type:
      name: Stemmeskruetype for ukulele
      description: Stil for stemmeskruer på ukulelens hoved.
    ukulele_tuning:
      name: Ukulelestemning
      description: Specificerer den tilsigtede standardstemning for pocket-ukulelen.
    ultralight_aircraft_wing_configuration:
      name: Vingekonfiguration for ultralet fly
      description: Placering og konfiguration af hovedvingen i forhold til fuselagen
        eller strukturen.
    under_bed_features:
      name: Funktioner under sengen
      description: Identificerer det primære funktionelle element, der er placeret
        under sengeplatformen.
    underfoot_strap_type:
      name: Type af rem under foden
      description: Identificerer materialet eller designet på remmen, der løber under
        fodtøjet.
    underwear_fit:
      name: Pasform for undertøj
      description: Angiver den overordnede pasform for boxershortsene (f.eks. slim,
        løs eller kompression).
    underwear_pieces_included:
      name: Medfølgende dele i undertøj
      description: Identificerer, hvilke beklædningsdele der følger med (overdel,
        underdel, begge eller union suit i ét stykke), så kunderne ved, om de køber
        et komplet sæt eller en enkelt del.
    uniform_pieces_included:
      name: Medfølgende dele til uniform
      description: Identificerer, hvilke beklædningsdele der medfølger (f.eks. skjorte,
        bukser eller vest), hvilket tydeliggør sampakkens indhold ved bulkkøb eller
        køb af sæt.
    uniform_role:
      name: Uniformsrolle
      description: Specificerer den professionelle rolle eller myndighed, som uniformen
        er beregnet til (f.eks. Police, Sheriff eller EMS).
    update_method:
      name: Opdateringsmetode
      description: Hvordan firmware- eller softwareopdateringer leveres til scanneren.
    upholstery_fabric_backing_type:
      name: Bagsidetype for møbelstof
      description: Specificerer bagsiden eller lamineringen på møbelstoffet, hvilket
        påvirker installation og følelse.
    upholstery_fabric_water_resistance:
      name: Vandbestandighed for møbelstof
      description: Angiver modstandsdygtighed over for vand og spild på møbelstoffets
        overflade.
    upper_material:
      name: Overdelmateriale
      description: Specificerer det primære materiale, der bruges på sneakerens overdel,
        hvilket påvirker åndbarhed, holdbarhed og æstetik.
    upright_bass_pickup_system:
      name: Pickupsystem for kontrabas
      description: Angiver, om kontrabassen har et installeret pickup- eller preamp-system
        til forstærkning.
    upright_piano_power_source:
      name: Strømkilde for opretstående klaver
      description: Hvordan det opretstående klaver får strøm, relevant for både akustiske
        opretstående klaverer uden strøm og opretstående klaverer med silent- eller
        hybridsystemer, der kræver elektricitet.
    urination_device_features:
      name: Funktioner for urineringsenhed
      description: Fremhæver særlige designegenskaber, der forbedrer funktionalitet
        eller bekvemmelighed.
    us_childrens_shoe_size:
      name: Britisk skostørrelse for børn
      description: Angiver amerikansk størrelse for børnesko, f.eks. 5 eller 5 bred
    us_clothing_size:
      name: Amerikansk tøjstørrelse
      description: Angiver amerikansk tøjstørrelse, f.eks. 8 eller 14
    us_cup_size:
      name: Amerikansk skålstørrelse
      description: Angiver amerikansk skålstørrelse, f.eks. C eller DDD
    us_mens_shoe_size:
      name: Britisk skostørrelse for kvinder
      description: Angiver amerikansk størrelse for herresko, f.eks. 10 eller 10 bred
    us_ring_size:
      name: Amerikansk ringstørrelse
      description: Angiver amerikansk ringstørrelse, f.eks. 7 eller 9,5
    us_womens_shoe_size:
      name: Britisk skostørrelse for kvinder
      description: Angiver britisk størrelse for damesko, f.eks. 8 eller 8 bred
    usage:
      name: Brug
      description: Beskriver knastakslens tilsigtede anvendelse eller tuning.
    usda_honey_grade:
      name: USDA-honningkvalitet
      description: Angiver den officielle honningkvalitet, der er tildelt af U.S.
        Department of Agriculture (USDA).
    user_control_method:
      name: Betjeningsmetode for bruger
      description: Angiver, hvordan brugeren interagerer med maskinen (f.eks. via
        indbygget kontrolpanel, fjernbetjening, app eller stemme), hvilket informerer
        om brugervenlighed.
    vacuum_boost_reference_port:
      name: Vakuum- eller boost-referenceport
      description: Angiver, om regulatoren har en manifold-referenceport til vakuum
        eller boost, og hvilken stil den har.
    valve_base_shape:
      name: Ventilbaseform
      description: Identificerer grænsefladegeometrien mellem ventilbasen og fælgen
        (rund, konisk, sideport, T-formet osv.), hvilket påvirker tætning og kompatibilitet
        med skumindsatser.
    valve_core_type:
      name: Type af ventilkerne
      description: Angiver, om ventilens kerne er aftagelig, fast eller kerneløs –
        oplysninger, der påvirker vedligeholdelsesprocedurer og kompatibilitet med
        injektion af tætningsmiddel.
    valve_cover_gasket_material:
      name: Pakningsmateriale til ventildæksel
      description: Specificerer materialet i ventildækselpakningen, der følger med
        ventildækslet, eller det anbefalede pakningsmateriale, når det sælges uden
        pakning (hvis relevant).
    valve_cover_material:
      name: Materiale i ventildæksel
      description: Primært konstruktionsmateriale i ventildækslet.
    valve_design:
      name: Ventildesign
      description: Identificerer motorventilens konstruktion eller design.
    valve_guard_coverage_area:
      name: Dækningsområde for ventilbeskyttelse
      description: Angiver, hvilke dele af ventilsektionen beskyttelsen beskytter.
    valvetrain_configuration:
      name: Ventilstyringskonfiguration
      description: Specificerer knast- eller ventilstyringslayoutet.
    varnish_formulation_base:
      name: Formuleringsbase for lak
      description: Specificerer den primære formulering eller kemi i lakken til strengeinstrumenter,
        hvilket påvirker udseende, reversibilitet og kompatibilitet med eksisterende
        finish.
    varnish_transparency_tint:
      name: Gennemsigtighed eller farvetone for lak
      description: Beskriver, om lakken er klar eller tonet, og hvis den er tonet,
        den generelle farvefamilie.
    vegetable_matter_vm_content:
      name: Indhold af vegetabilsk materiale (VM)
      description: Mængden af plantedele eller urenheder i fiberen.
    vegetable_preparation_style:
      name: Tilberedningsform for grøntsag
      description: Beskriver, hvordan grøntsagen præsenteres, skæres eller på anden
        måde forberedes før salg (f.eks. hel, i tern eller i buketter).
    vehicle_audio_dsp_form_factor:
      name: Formfaktor for DSP-enhed til billyd
      description: Specificerer DSP-enhedens fysiske format eller monteringsformat.
    vehicle_battery_charger_features:
      name: Funktioner for batterioplader til køretøj
      description: Angiver driftstilstande og indbyggede funktioner i batteriopladeren
        til køretøjer, f.eks. float-tilstand og desulfatering.
    vehicle_body_filler_form:
      name: Form for karosserispartel
      description: Karosserispartlens fysiske form eller emballagetype.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominel størrelse for koaksialhøjttaler til køretøj
      description: Nominel højttalerstørrelse, der bruges til pasform, f.eks. 6,5"
        eller 6x9".
    vehicle_cover_size_class:
      name: Størrelsesklasse for køretøjscover
      description: Overordnet størrelsesgruppe, der angiver, hvilken køretøjsstørrelse
        coveret er designet til at passe til.
    vehicle_decor_set_items_included:
      name: Medfølgende dele i pyntesæt til køretøj
      description: Angiver de typer pyntedele, der følger med tilbehørssættet, så
        kunder kan se indholdet på komponentniveau.
    vehicle_door_lock_actuation_method:
      name: Aktiveringsmetode for bildørlås
      description: Angiver, hvordan bildørlåsen aktiveres eller styres.
    vehicle_door_lock_actuator_kit_contents:
      name: Indhold i aktuatorsæt til bildørlås
      description: Angiver, hvad der følger med aktuatoren, f.eks. kun aktuator eller
        monteringsdele, stænger, beslag og ledningsnet.
    vehicle_door_lock_actuator_wiring_configuration:
      name: Ledningskonfiguration for aktuator til bildørlås
      description: Specificerer den ledningsføring, der kræves til installationen,
        herunder antal ledninger og deres funktion.
    vehicle_door_lock_included_components:
      name: Medfølgende komponenter til bildørlås
      description: Angiver, hvilke komponenter der følger med i pakken, hvilket især
        er nyttigt ved sæt og samlinger.
    vehicle_electrical_connector_type:
      name: Type af elektrisk stik til køretøj
      description: Specificerer generatorens regulator- eller feltstik eller stiktype,
        eksklusive B+-hovedudgangsbolten.
    vehicle_equipment_fit_out_level:
      name: Udstyrsniveau for køretøj
      description: Angiver niveauet af politiudstyr, som varevognen er udstyret med.
    vehicle_glass_cleaner_form:
      name: Form for bilruderens
      description: Bilruderensens fysiske produktformat, f.eks. spray, skum, servietter,
        gel eller koncentrat.
    vehicle_hitch_cover_illumination_type:
      name: Belysningstype for cover til anhængertræk
      description: Specificerer, om coveret til anhængertrækket har belysning, og
        hvilken type belysning der er tale om.
    vehicle_hitch_cover_mounting_type:
      name: Monteringstype for cover til anhængertræk
      description: Angiver den metode, der bruges til at fastholde eller fastgøre
        coveret i anhængertrækkets receiver.
    vehicle_license_plate_finish:
      name: Finish på nummerplade til køretøj
      description: Pladens overfladefinish.
    vehicle_license_plate_frame_anti_theft_design:
      name: Tyverisikringsdesign for nummerpladeramme
      description: Sikkerhedsrelaterede designelementer, der skal modvirke afmontering
        eller manipulation.
    vehicle_license_plate_frame_plate_standard:
      name: Pladestandard for nummerpladeramme
      description: Den nummerpladestandard eller region, som rammen er dimensioneret
        til.
    vehicle_license_plate_frame_profile:
      name: Profil for nummerpladeramme
      description: Hvordan rammen omslutter nummerpladen, herunder dækning og form,
        hvilket påvirker læsbarhed og overholdelse af regler.
    vehicle_license_plate_mounting_hole_count:
      name: Antal monteringshuller i nummerplade
      description: Antal monteringshuller i pladen.
    vehicle_license_plate_mounting_hole_pattern:
      name: Monteringshulmønster for nummerplade
      description: Placeringen af monteringshullerne på pladen.
    vehicle_license_plate_reflectivity:
      name: Refleksionsevne for nummerplade
      description: Om og hvordan pladens overflade reflekterer lys, hvilket kan være
        vigtigt for synlighed og overholdelse af regler for visse dekorative plader.
    vehicle_license_plate_size_standard:
      name: Størrelsesstandard for nummerplade
      description: Angiver den regionale standard eller køretøjsstandard, som pladen
        er dimensioneret til, herunder afstand mellem monteringshuller og samlede
        mål.
    vehicle_license_plate_text_style:
      name: Tekststil på nummerplade
      description: Stil for tegnene på pladen, hvis relevant, f.eks. hævede kontra
        trykte tegn.
    vehicle_license_plate_theme:
      name: Tema for nummerplade
      description: Overordnet designtema for pladens grafik.
    vehicle_lift_actuation_method:
      name: Aktiveringsmetode for køretøjslift
      description: Hvordan liften eller donkraften drives eller aktiveres for at løfte
        køretøjet.
    vehicle_lift_mounting_type:
      name: Monteringstype for køretøjslift
      description: Angiver, hvordan liften installeres eller forankres i arbejdsområdet.
    vehicle_lift_type:
      name: Type af køretøjslift
      description: Specificerer den strukturelle type køretøjslift, der bruges til
        service eller opbevaring, f.eks. 2-søjlet, 4-søjlet eller sakselift.
    vehicle_magnet_attachment_type:
      name: Fastgørelsestype for køretøjsmagnet
      description: Specificerer den primære fastgørelses- eller monteringsmetode for
        produkter, der sælges som køretøjsmagneter, f.eks. kun magnetisk eller magnetisk
        med selvklæbende bagside.
    vehicle_magnet_intended_use:
      name: Tilsigtet brug af køretøjsmagnet
      description: Angiver det primære tilsigtede anvendelsesområde for køretøjsmagneten.
    vehicle_mirror_adjustment_type:
      name: Justeringstype for køretøjsspejl
      description: Specificerer, hvordan spejlet justeres eller styres.
    vehicle_mirror_glass_type:
      name: Type af spejlglas til køretøj
      description: Specificerer spejlglassets optiske type eller form.
    vehicle_organizer_features:
      name: Funktioner for opbevaringsløsning til køretøj
      description: Centrale funktionelle egenskaber ved opbevaringsløsninger til køretøjer,
        f.eks. sammenklappelighed, vandtæt foring, isolerede lommer eller skridsikker
        bund.
    vehicle_paint_chemistry_base:
      name: Kemi eller base for køretøjslak
      description: Angiver den formulering eller kemi, der bruges i køretøjslakken.
    vehicle_polish_application_method:
      name: Påføringsmetode for bilpolish
      description: Specificerer den anbefalede metode eller det anbefalede værktøj
        til påføring af bilpolish.
    vehicle_pursuit_package:
      name: Pursuit-pakke til køretøj
      description: Angiver, om køretøjet er udstyret med en performancepakke til politibrug,
        f.eks. opgraderet køling, bremser, affjedring og kalibrering.
    vehicle_safety_equipment_position:
      name: Placering af sikkerhedsudstyr i køretøj
      description: Specificerer, hvor på eller i køretøjet sikkerhedsudstyret er beregnet
        til at blive brugt eller installeret.
    vehicle_safety_equipment_visibility_features:
      name: Synlighedsfunktioner for sikkerhedsudstyr til køretøj
      description: Angiver synlighedsforbedrende funktioner, der er designet til at
        gøre udstyret lettere at se.
    vehicle_seat_row:
      name: Sæderække i køretøj
      description: Angiver, hvilken bagerste sæderække sædet er til, f.eks. anden
        eller tredje række, herunder anvendelse som bagerste klapsæde.
    vehicle_steering_assist_type:
      name: Type af styreassistance i køretøj
      description: Specificerer det styreassistancesystem, som komponenten er designet
        til.
    vehicle_steering_wheel_lock_form_factor:
      name: Formfaktor for ratlås
      description: Beskriver låsens fysiske udformning, og hvordan den kobles til
        rattet og eventuelt andre betjeningsdele.
    vehicle_wax_polish_product_form:
      name: Produktform for bilvoks eller -polish
      description: Den fysiske form eller dispenseringsform for voks, polish, beskyttelsesmiddel
        eller forsegler.
    vehicle_wheel_valve_stem_type:
      name: Type af ventilstamme til køretøjshjul
      description: Specificerer den ventilstammetype, der understøttes eller medfølger.
    vehicle_windshield_fluid_formula:
      name: Formulering for sprinklervæske
      description: Det primære rengørings- eller fjernelsesfokus i sprinklervæskens
        formulering.
    veil_length_type:
      name: Længdetype for slør
      description: Klassificerer et slør ved hjælp af standardbetegnelser for længde
        frem for numeriske mål.
    vellum_opacity_level:
      name: Opacitetsniveau for vellum
      description: Angiver, hvor transparent eller uigennemsigtigt vellumarket er.
    ventilation_configuration:
      name: Ventilationskonfiguration
      description: Hjelmens primære ventilationskonfiguration for luftindtag og luftudtag.
    ventilation_control_type:
      name: Type af ventilationsstyring
      description: Specificerer den type luftstrømsstyring, der er indbygget i hjelmen.
    ventilation_level:
      name: Ventilationsniveau
      description: Angiver rustningens relative luftgennemstrømning eller ventilationsdesign.
    venting_design:
      name: Ventilationsdesign
      description: Specificerer, om og hvordan coveret er ventileret for at reducere
        kondens og mug under opbevaring.
    vestibule_type:
      name: Type af apsis
      description: Klassificerer apsidens layout i forhold til teltet.
    vibraphone_bar_material:
      name: Materiale i vibrafonstave
      description: Materiale i vibrafonens tonestave eller tangenter, dvs. de lydproducerende
        stave.
    vibraphone_motor_type:
      name: Motortype for vibrafon
      description: Den type motor, der driver de roterende resonatorvifter til vibrato,
        hvis instrumentet er udstyret med dem.
    vibraphone_range_octaves:
      name: Omfang for vibrafon (oktaver)
      description: Vibrafonens toneomfang angivet i oktaver, f.eks. 3 oktaver eller
        3,5 oktaver.
    vibraphone_resonator_tube_material:
      name: Materiale i resonatorrør til vibrafon
      description: Materiale i vibrafonens resonatorrør under stavene.
    vibraphone_tuning_standard:
      name: Stemningsstandard for vibrafon
      description: Referencetonehøjde, der bruges til stemning, f.eks. A = 440 Hz.
    viewing_sides:
      name: Visningssider
      description: Specificerer, hvor mange sider af resultattavlen der viser oplysninger,
        f.eks. enkeltsidet, dobbeltsidet eller firesidet.
    vintage_advertisement_decade:
      name: Årti for vintageannonce
      description: Specificerer det årti, hvor annoncen oprindeligt blev trykt eller
        produceret, omtrentligt hvis det præcise år er ukendt.
    vintage_advertisement_format:
      name: Format for vintageannonce
      description: Specificerer vintageannoncens fysiske format eller medie som samlerobjekt.
    vintage_advertisement_subject_category:
      name: Emnekategori for vintageannonce
      description: Identificerer den produkt- eller servicekategori, der annonceres
        for.
    vintage_classic_truck_cab_type:
      name: Kabinetype for vintage- og klassisk lastbil
      description: Kabinekonfiguration eller karosseristil for lastbilens passagerkabine.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech-stjernebedømmelse for hjelm
      description: Sikkerhedsvurdering tildelt af Virginia Tech Helmet Lab med 0-5
        stjerner.
    virtual_analog_synthesizer_form_factor:
      name: Formfaktor for virtuel analog synthesizer
      description: Specificerer synthesizerens fysiske chassisformat, f.eks. keyboard
        eller modul eller rack.
    viscosity_thickness:
      name: Viskositet eller tykkelse
      description: Beskriver, hvor tyk eller flydende slippen er ved salg eller ved
        den anbefalede arbejdskonsistens.
    vise_configuration:
      name: Konfiguration af skruestik
      description: Specificerer den strukturelle opbygning eller antallet af dele
        i skruestikssættet, hvilket påvirker bærbarhed og kompleksitet ved opsætning.
    visibility_features:
      name: Synlighedsfunktioner
      description: Fremhæver designelementer, der gør rytteren mere synlig i trafikken.
    visor_brim_type:
      name: Type af visir eller skygge
      description: Angiver, om hjelmen har visir eller skygge, og hvilken type det
        er.
    visor_configuration:
      name: Visirkonfiguration
      description: Beskriver, om der er indbygget visir eller ansigtsskærm, og hvilken
        type det er.
    visor_lens_finish:
      name: Finish på visirlinse
      description: Specificerer den toning, optiske finish eller grafiske stil, der
        er påført visirlinsen.
    visor_style:
      name: Visirstil
      description: Angiver, om hætten har skygge eller visir, og hvordan den er konfigureret.
    voc_compliance_standard:
      name: VOC-overholdelsesstandard
      description: Lovgivningsmæssigt VOC-overholdelseskrav for produktet, hvor relevant.
    voc_regulatory_class:
      name: VOC-regulerings- eller overholdelsesklasse
      description: Angivet VOC-regulerings- eller overholdelsesklasse for produktet
        i henhold til etiket eller SDS, brugt til regionale lovgivnings- og miljørestriktioner.
    vodka_base_ingredient:
      name: Basisingrediens i vodka
      description: Primær råvare, som vodkaen er destilleret af, f.eks. hvede, kartoffel
        eller majs.
    voice_coil_configuration:
      name: Konfiguration af svingspole
      description: Antal og placering af svingspoler, som giver fleksibilitet ved
        ledningsføring og impedansindstillinger.
    voice_effects:
      name: Stemmeeffekter
      description: Indbyggede vokaleffekttyper, som karaokesættet understøtter.
    voltage_rating_type:
      name: Type af spændingsklassificering
      description: Specificerer, om sikringens spændingsklassificering gælder for
        AC, DC eller begge dele.
    voltage_regulator_connector_type:
      name: Stiktype for spændingsregulator
      description: Specificerer den forbindelses- eller terminaltype, der bruges til
        at forbinde regulatoren med køretøjets ledningsnet, generator eller dynamo.
    wader_foot_type:
      name: Fodtype for waders
      description: Specificerer, om waders har integrerede støvler eller separate
        strømpefødder.
    wader_sole_type:
      name: Såltype til waders
      description: Specificerer ydersålens materiale eller grebstype på vadestøvler
        eller waders med støvler.
    waistband_style:
      name: Linningstype
      description: Beskriver linningens konstruktion, og hvordan den fastgøres eller
        justeres for pasform og komfort.
    wakeboard_binding_mounting_pattern:
      name: Monteringsmønster for wakeboardbinding
      description: Specificerer det indsats- eller plademønster på wakeboardet, som
        bindingerne er kompatible med.
    wakeboard_riding_style:
      name: Kørestil for wakeboard
      description: Klassificerer wakeboardets tilsigtede miljø eller brugstype.
    wall_decal_style:
      name: Stil for wall decal
      description: Specificerer, hvordan wall decal’en er produceret eller påført,
        f.eks. udstanset, transfer eller stickerark.
    wallyball_equipment_included:
      name: Medfølgende wallyballudstyr
      description: Angiver de specifikke dele, der følger med wallyball-sættet, så
        kunderne ved præcis, hvad de køber, og kan sammenligne sampakker.
    warp_beam_type:
      name: Type af trendbom
      description: Specificerer vævens medfølgende eller installerede trendbomkonfiguration,
        dvs. den bomopsætning, der følger med væven.
    washability:
      name: Vaskbarhed
      description: Angiver, om limen kan rengøres med vand og/eller vaskes af efter
        påføring.
    watch_band_design:
      name: Design af urrem
      description: Beskriver urremmens konstruktion eller designmønster, f.eks. NATO,
        Milanese eller link.
    watch_movement:
      name: Urværk
      description: Specificerer den mekanisme, der driver uret, hvilket er en vigtig
        faktor, kunder bruger til at skelne mellem modeller.
    water_activation:
      name: Vandaktivering
      description: Angiver, om beaconen kan aktiveres automatisk ved nedsænkning i
        vand, hvilket er almindeligt for kategori I/II-EPIRB’er.
    water_chamber_configuration:
      name: Konfiguration af vandkammer
      description: Beskriver madrassens indvendige blæreopbygning, f.eks. enkelt-
        eller dobbeltkammer, hvilket påvirker støtte, temperaturstyring og forstyrrelser
        mellem partnere.
    water_dispensing_mechanism:
      name: Vanddispenseringsmekanisme
      description: Definerer, hvordan vand frigives fra enheden, f.eks. via haner,
        spraydyser eller tyngdekraftsudløb.
    water_exposure_protection_level:
      name: Beskyttelsesniveau ved vandeksponering
      description: Angiver produktets beskyttelsesniveau ved eksponering for vand,
        f.eks. stænk kontra midlertidig nedsænkning. Brug Ingress Protection (IP)-klassificering,
        når en officiel IP-kode er tilgængelig.
    water_fed_design:
      name: Vandførende design
      description: Angiver, om børsten er designet til brug med rindende vand via
        et gennemstrømningshåndtag eller en slangetilslutning.
    water_gun_features:
      name: Funktioner i vandpistol
      description: Bemærkelsesværdige funktionelle egenskaber og medfølgende egenskaber
        ved vandpistolen.
    water_gun_operating_mechanism:
      name: Betjeningsmekanisme for vandpistol
      description: Hvordan vandpistolen opbygger tryk og skyder vand ud under brug.
    water_gun_spray_pattern:
      name: Sprøjtemønster for vandpistol
      description: Den type vandstråle, som dysen producerer ved affyring.
    water_heating_method:
      name: Metode til vandopvarmning
      description: Beskriver, hvordan eller om vandet opvarmes før brug, f.eks. via
        solabsorbering, propanbrændere, elektriske elementer, batteridrevet opvarmning,
        varmebevarende isolering eller uden opvarmning.
    water_mattress_construction:
      name: Konstruktion af vandmadras
      description: Specificerer vandmadrassens konstruktionstype, f.eks. hardside
        eller softside, hvilket bestemmer rammekompatibilitet og generel liggefølelse.
    water_play_features:
      name: Funktioner for vandleg
      description: Komponenter til vandaktiviteter, der følger med vandpark-/rutsjebanesættet.
    water_polo_competition_approval:
      name: Konkurrencegodkendelse for vandpolobold
      description: Identificerer det officielle organ eller konkurrenceniveau, som
        bolden er officielt godkendt eller certificeret til.
    water_polo_goal_type:
      name: Type af vandpolomål
      description: Klassificerer målets strukturelle eller monteringsmæssige konfiguration,
        f.eks. flydende, dækmonteret eller transportabelt.
    water_pump_drive_type:
      name: Drivtype for vandpumpe
      description: Specificerer, hvordan vandpumpen drives eller aktiveres i køretøjets
        kølesystem.
    water_pump_housing_material:
      name: Materiale i vandpumpehus
      description: Materiale i vandpumpens hus eller krop.
    water_pump_impeller_material:
      name: Materiale i vandpumpehjul
      description: Specificerer materialet i vandpumpens impeller, dvs. den indvendige
        rotor eller vinge, der flytter kølevæsken.
    water_pump_mounting_type:
      name: Monteringstype for vandpumpe
      description: Specificerer vandpumpens monterings- eller formfaktorstil med henblik
        på motorpasform, f.eks. bolt-on-hus kontra patron eller indsats.
    water_purification_method:
      name: Metode til vandrensning
      description: Identificerer den primære mekanisme, som produktet bruger til at
        gøre vand sikkert at drikke i felten, f.eks. pumpe, tyngdekraftsfodring eller
        UV-lys.
    water_resistance:
      name: Vandresistens
      description: Angiver graden af vejrbeskyttelse, f.eks. vandtæt eller vandafvisende.
    water_resistance_level:
      name: Vandafvisningsniveau
      description: Angiver, om tekstilet afviser vand, og i hvilket omfang.
    water_resistance_rating_case_protection_level:
      name: Vandafvisningsklassificering (beskyttelsesniveau for etui)
      description: Angiver det beskyttelsesniveau mod vand, som rulleetuiet giver.
        Dette er en markedsføringsklassificering og ikke en IP-tætning til elektronik,
        f.eks. vandafvisende kontra vandtæt.
    water_rocket_kit_items_included:
      name: Medfølgende dele i vandraketsæt
      description: Vigtige komponenter, der følger med i produktpakken.
    water_rocket_propulsion_type:
      name: Fremdriftstype for vandraket
      description: Primær fremdrifts- eller energikilde, der bruges til at affyre
        raketten.
    water_rocket_recovery_system:
      name: Gendannelsessystem for vandraket
      description: Metoden, der bruges til at få raketten tilbage efter affyring.
    water_ski_base_design:
      name: Bunddesign for vandski
      description: Specificerer vandskiens bund- eller skrogprofil, hvilket påvirker
        håndteringsegenskaberne.
    water_ski_fin_type:
      name: Finnetype for vandski
      description: Specificerer vandskiens finnekonfiguration, hvilket påvirker retningsstabilitet
        og manøvredygtighed.
    water_source:
      name: Vandkilde
      description: Identificerer vandets oprindelse før karbonering.
    water_sports_safety_standard:
      name: Sikkerhedsstandard for vandsport
      description: Angiver de formelle sikkerheds- eller opdriftsstandarder, som produktet
        opfylder, f.eks. CE EN 1385 for hjelme, ISO 12402-5 for opdriftshjælpemidler
        eller USCG Type III.
    water_table_feature_set:
      name: Funktioner i vandbord
      description: Fremhæver indbyggede legefunktioner i vandbordet, f.eks. vandfald,
        sprøjtedyser, pumper eller bassiner i flere niveauer.
    water_table_items_included:
      name: Medfølgende dele til vandbord
      description: Specificerer, hvilket tilbehør der følger med vandbordssættet,
        f.eks. både, kopper, tragte eller figurer.
    water_table_water_source_type:
      name: Vandkilde til vandbord
      description: Specificerer, hvordan vandbordet fyldes eller forsynes med vand.
    waterbed_stabilization_level:
      name: Stabiliseringsniveau for vandseng
      description: Angiver graden af bølgereduktion eller bevægelseskontrol i vandsengsmadrassen.
    watercolor_ink_water_resistance_after_drying:
      name: Vandbestandighed for akvarelblæk efter tørring
      description: Angiver, om akvarelblækket bliver vandbestandigt eller vandtæt
        efter tørring, baseret på producentens angivelse.
    watercraft_care_application_area:
      name: Anvendelsesområde for bådpleje
      description: Angiver det primære område eller den primære komponent på et fartøj,
        som produktet er beregnet til.
    watercraft_drive_mechanism:
      name: Drivmekanisme for fartøj
      description: Beskriver den specifikke indbyggede fremdriftsmekanisme, der er
        installeret eller understøttes.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Monteringsmønster for tankmålergiver til fartøj
      description: Specificerer monteringsmønsteret eller standarden for tankmålergivere
        og kompatible målere, f.eks. almindelige marineboltmønstre.
    watercraft_fuel_tank_shape:
      name: Form på brændstoftank til fartøj
      description: Beskriver brændstoftankens overordnede fysiske formfaktor for at
        understøtte planlægning af plads og pasform.
    watercraft_hull_material:
      name: Skrogmateriale for fartøj
      description: Specificerer det primære materiale i skrogkonstruktionen.
    watercraft_ignition_part_voltage:
      name: Spænding for tændingsdel til fartøj
      description: Nominel spændingsklassificering eller spændingskrav for tændingsdelen,
        hvor relevant, f.eks. 12 V-systemer.
    watercraft_impeller_material_grade:
      name: Materialekvalitet for impeller til fartøj
      description: Specificerer materialet i fartøjets impeller, f.eks. neopren, nitril
        eller bronze.
    watercraft_lighting_certification_compliance:
      name: Certificering eller overholdelse for fartøjsbelysning
      description: Angiver overholdelse af regler eller standarder, som lygten er
        certificeret til ved maritim brug, f.eks. i overensstemmelse med USCG, ABYC
        eller COLREGs.
    watercraft_motor_mount_adjustment_features:
      name: Justeringsfunktioner for motorbeslag til fartøj
      description: Beslagets justeringsmuligheder, f.eks. tilt, løft eller glidning,
        som påvirker brugervenlighed og pasform.
    watercraft_piston_part_type:
      name: Stempelkomponent til fartøj
      description: Identificerer, hvilken stempelrelateret komponent produktopslaget
        omfatter.
    watercraft_propeller_blade_rake:
      name: Bladrake for bådpropel
      description: Specificerer bladrake, dvs. bladets vinkel i forhold til navet,
        hvilket påvirker bovløft og ydeevne.
    watercraft_propeller_rotation_direction:
      name: Rotationsretning for bådpropel
      description: Angiver den krævede rotationsretning eller håndethed for propellen
        med henblik på kompatibilitet med drivlinjen, f.eks. højreroterende/standard
        kontra venstreroterende/kontraroterende.
    watercraft_pump_stage_impeller_role:
      name: Pumpetrin eller impellerrolle for fartøj
      description: Identificerer, om impelleren er beregnet til en bestemt pumperolle,
        f.eks. råvands- eller søvandspumpe, kølevæskecirkulation eller jetpumpe.
    watercraft_registration_status:
      name: Registreringsstatus for fartøj
      description: Angiver, om sejlbåden leveres med titel- og/eller registreringsdokumentation.
    watercraft_safety_equipment_activation_type:
      name: Aktiveringstype for sikkerhedsudstyr til fartøj
      description: Den primære metode til aktivering af sikkerhedsanordningen, f.eks.
        beacons, MOB-alarmer eller PLB’er, adskilt fra oppustning.
    watercraft_steering_cable_core_material:
      name: Kernemateriale i styrekabel til fartøj
      description: Specificerer materialet i det indvendige kabel eller den indvendige
        kerne, der overfører kraft.
    watercraft_steering_cable_hardware_included:
      name: Medfølgende monteringsdele til styrekabel til fartøj
      description: Specificerer, hvilke monteringsdele og hvilket tilbehør der følger
        med styrekablet.
    watercraft_steering_cable_system_type:
      name: Systemtype for styrekabel til fartøj
      description: Specificerer den styresystemarkitektur, som kablet er designet
        til, f.eks. roterende styring eller tandstangsstyring.
    watercraft_steering_wheel_hub_bore_type:
      name: Nav- eller boringstype for rat til fartøj
      description: Specificerer den centrale monterings- eller boringsgrænseflade,
        f.eks. konisk eller splinet, hvor hjulet kobles til et nav eller en adapter.
    watercress_variety:
      name: Brøndkarsevariant
      description: Identificerer den specifikke variant eller type karse, der sælges.
    waterproof_level:
      name: Vandtæthedsniveau
      description: Angiver fodtøjets vandbeskyttelsesniveau, herunder eventuelle garantidækkede
        vandtæthedskrav.
    wax_blend_composition:
      name: Sammensætning af voksblanding
      description: Angiver de voksmaterialer, der er blandet i produktet, og/eller
        den markedsførte blandingstype.
    wax_coat_type:
      name: Type af vokslag
      description: Angiver, om voksen er beregnet som grundvoks, topvoks eller en
        allround- eller enkeltlagsformel.
    wax_hardness:
      name: Vokshårdhed
      description: Angiver voksens relative hårdhed, hvilket påvirker holdbarhed og
        glideevne på forskellige snetyper.
    wax_physical_form:
      name: Fysisk form for voks
      description: Angiver den fysiske form eller facon, som rå stearinvoks leveres
        i.
    wax_recommended_candle_application:
      name: Anbefalet anvendelse for stearinvoks
      description: Angiver den eller de primære lystyper, som voksen er formuleret
        til.
    wax_tackiness_level:
      name: Klæbrighedsniveau for voks
      description: Beskriver det niveau af klæbrighed eller greb, som voksen giver
        på bladet.
    weapon_system_integration:
      name: Integration af våbensystem
      description: Angiver, om køretøjet har integrerede våbensystemer eller våbenbeslag.
    weather_suitability:
      name: Egnethed til vejrforhold
      description: Angiver de miljøforhold, som handskerne er designet til, f.eks.
        spil i koldt eller vådt vejr.
    weave_finish:
      name: Vævning eller finish
      description: Beskriver den primære stofvævning eller overfladefinish, der påvirker
        slipsets tekstur og glans.
    weave_style:
      name: Vævestil
      description: Specificerer det traditionelle vævemønster, der bruges ved fremstilling
        af panamahatten, hvilket påvirker åndbarhed, fleksibilitet, udseende og pris.
    weave_type:
      name: Vævningstype
      description: Identificerer stoffets vævning eller konstruktionstype (handelsbetegnelse
        for vævningen), som påvirker tekstur, glans og fald.
    weaving_beater_edge_type:
      name: Kanttype for vævekam
      description: Beskriver arbejdsprofilen på den flade vævekam, der er i kontakt
        med islættet, f.eks. lige kontra takket.
    weaving_beater_style:
      name: Stil for vævekam
      description: Identificerer den flade vævekams funktionelle stil eller format.
    weaving_shuttle_tip_style:
      name: Spidsform på væveskytte
      description: Specificerer skyttelens forreste spids- eller næsedesign, hvilket
        påvirker, hvordan den passerer gennem skellet, og hvor let den hænger fast
        i trendtrådene.
    weaving_shuttle_use_case:
      name: Anvendelse for væveskytte
      description: Specificerer den væveanvendelse, som skyttelen er designet eller
        optimeret til.
    webbing_construction_type:
      name: Konstruktionstype for webbing
      description: Beskriver webbingens fysiske væve- eller flettestil, hvilket påvirker
        håndtering, styrke og tilsigtet brug.
    webbing_design:
      name: Webbingdesign
      description: Beskriver typen af webbing mellem fingrene, hvilket påvirker modstandstræning
        og fremdrift.
    weight_adjustability:
      name: Vægtjusterbarhed
      description: Beskriver, om produktets modstand kan ændres af brugeren, f.eks.
        selektoriseret eller kan belastes med vægtskiver, eller om den er fast på
        én vægt.
    weight_integration_system:
      name: System til integrering af vægt
      description: Beskriver, om og hvordan blyvægte er integreret i BCD’en, f.eks.
        aftagelige vægtlommer, ingen eller valgfrit tilkøb.
    weight_plate_compatibility:
      name: Kompatibilitet med vægtskiver
      description: Definerer, hvilken diameter vægtskiver maskinen accepterer, f.eks.
        olympisk, standard eller begge dele.
    weight_plate_style:
      name: Vægtskivetype
      description: Klassificerer vægtskivens design eller type, f.eks. olympisk, bumper
        eller selektoriseret, så kompatibilitet hurtigt kan filtreres.
    weightlifting_belt_style:
      name: Stil for vægtløftningsbælte
      description: Kategoriserer bæltets overordnede design eller formålsbestemte
        konfiguration, f.eks. lever belt, dip belt eller tapered belt.
    weightlifting_federation_certification:
      name: Certificering fra vægtløftningsforbund
      description: Officiel godkendelse eller overholdelse fra styrkesportsforbund,
        f.eks. IPF eller IWF.
    wetsuit_boot_height:
      name: Højde på våddragtsstøvle
      description: Klassificerer støvlens højde eller snit på benet, hvilket påvirker
        dækning, bevægelighed og vandindtrængning.
    wetsuit_entry_system:
      name: Indgangssystem for våddragt
      description: Beskriver typen og placeringen af åbningen eller lynlåssystemet,
        der bruges til at tage våddragten på.
    wetsuit_seam_construction:
      name: Sømkonstruktion for våddragt
      description: Specificerer, hvordan sømmene er konstrueret og forseglet, hvilket
        påvirker varme, fleksibilitet og holdbarhed.
    wheat_product_form:
      name: Form for hvedeprodukt
      description: Specificerer hvedeproduktets fysiske eller forarbejdede form.
    wheel_arrangement:
      name: Hjulopstilling
      description: Specificerer damplokomotivets hjulopstilling i Whyte-notation,
        som er et definerende kendetegn og et almindeligt samler- og søgeterm.
    wheel_brake_type:
      name: Bremsetype for hjul
      description: Beskriver bremsekonfigurationen på vognens hjul eller hjul med
        drejeled.
    wheel_chock_grip_features:
      name: Grebsegenskaber for hjulklods
      description: Traktions- og grebsdesign, der forbedrer holdekraften på overflader
        og mod dæk.
    wheel_cleaner_acidity_ph_category:
      name: Surhedsgrad eller pH-kategori for fælgrens
      description: Angiver, om fælgrensen er sur, neutral eller alkalisk, og eventuelt
        om den markedsføres som pH-balanceret.
    wheel_cleaner_formula_type:
      name: Formeltype for fælgrens
      description: For fælgrens og relaterede vaskeløsninger angiver dette produktets
        primære formelkategori, f.eks. syrebaseret, syrefri, pH-neutral eller pH-balanceret
        eller jernreaktiv.
    wheel_construction_type:
      name: Konstruktionstype for hjul
      description: Specificerer hjulets fremstillings- eller konstruktionsmetode.
    wheel_contaminant_target:
      name: Målforurening for fælgrens
      description: Specificerer de primære typer snavs eller forurening, som rengøringsmidlet
        er designet til at fjerne.
    wheel_core_type:
      name: Type af hjulkerne
      description: Beskriver hjulkernens konstruktionstype, som påvirker vægt, stivhed
        og energioverførsel.
    wheel_cylinder_inlet_port_thread_standard:
      name: Gevindstandard for indløbsport på hjulcylinder
      description: Specificerer gevindstandarden for bremserørets indløbsport på hjulcylinderen,
        f.eks. metrisk bubble flare kontra SAE inverted flare.
    wheel_fastener_seat_type:
      name: Sædetype for hjulfastgørelse
      description: Specificerer sædestilen for hjulmøtrik eller -bolt, der passer
        mod hjulet, f.eks. konisk eller tilspidset, kugle eller radius, flad eller
        mag/shank.
    wheel_illumination:
      name: Hjullys
      description: Angiver, om hjulet har indbygget lys eller glow-funktioner.
    wheel_material:
      name: Hjulmateriale
      description: Identificerer hjulenes primære materialesammensætning, som påvirker
        holdbarhed, greb og vibrationsdæmpning.
    wheel_profile:
      name: Hjulprofil
      description: Beskriver hjulets tværsnitsform, som påvirker hastighed, greb og
        manøvredygtighed.
    wheel_setup_type:
      name: Hjulopsætning
      description: Definerer den hjulkonfiguration, der bruges på skøjterne.
    wheel_system_finish:
      name: Finish på hjulsystem
      description: Overfladefinish eller belægning på fælge eller hjul og visse hjuldele
        eller tilbehør.
    whip_style:
      name: Piskestil
      description: Klassificerer produktet efter dets specifikke type ridepisk eller
        crop samt tilsigtede disciplin.
    whipped_cream_base:
      name: Basisingrediens i flødeskum
      description: Identificerer den primære basisingrediens, der bruges til at fremstille
        flødeskummet, f.eks. mejerifløde eller kokos.
    whipped_cream_form:
      name: Flødeskumsform
      description: Angiver det fysiske format, som flødeskummet sælges i.
    whistle_head_material:
      name: Materiale i fløjtehoved
      description: Specificerer materialet i fløjtens hoved eller mundstykke (fipple
        block/head).
    whistle_light_features:
      name: Lysfunktioner i fløjte
      description: Angiver, om fløjten har integrerede lyseffekter til fester, f.eks.
        LED.
    whistle_purpose:
      name: Formål med fløjte
      description: Identificerer fløjtens primære tilsigtede anvendelse, f.eks. sportstræning,
        maritim sikkerhed eller hundetræning.
    whistle_sound_style:
      name: Lydstil for fløjte
      description: Beskriver fløjtelydens stil eller karakter, f.eks. enkelt tone
        kontra flere toner.
    white_glue_finish_appearance_when_dry:
      name: Finish eller udseende for hvid lim efter tørring
      description: Specificerer, hvordan limen ser ud efter tørring ved hobby- eller
        kontorbrug, f.eks. klar kontra uigennemsigtig.
    white_glue_washability:
      name: Vaskbarhed for hvid lim
      description: Angiver, om tørret lim kan vaskes ud eller rengøres fra tekstiler
        eller hud.
    whitewater_kayak_style:
      name: Stil for whitewater-kajak
      description: Primært designformål inden for whitewater-segmentet, f.eks. Creekboat,
        River Runner eller Playboat.
    whitewater_rating_class:
      name: Whitewater-klassificering
      description: Den højeste klasse på International Scale of River Difficulty,
        som flåden er vurderet til at kunne håndtere.
    whorl_mounting_interface:
      name: Monteringsgrænseflade for ten
      description: Hvordan drivhjulet fastgøres til spinderokken, herunder akselstil
        eller forbindelse.
    wick_construction_type:
      name: Konstruktionstype for væge
      description: VægekonstruktionVægens konstruktion eller stil, f.eks. flettet,
        flad, firkantflettet, med kerne eller træ.
    wick_core_type:
      name: Kernetype for væge
      description: Angiver, om vægen er kerneløs eller har et kernemateriale, f.eks.
        papirkerne eller zinkkerne, hvilket påvirker stivhed og brændeegenskaber.
    wick_tab_crimp_type:
      name: Krympetype for vægefod
      description: Hvordan vægefoden fastholder vægen, dvs. konstruktion eller krympestil.
    wick_tab_material:
      name: Materiale i vægefod
      description: Materiale i den påsatte vægefod eller holder, ofte blikplade, hvilket
        er relevant for korrosionsbestandighed og lovgivningsmæssige præferencer,
        f.eks. at undgå bly.
    wick_tab_shape:
      name: Form på vægefod
      description: Vægefodens pladeform eller formfaktor.
    wick_type_included:
      name: Medfølgende vægetype
      description: Specificerer den type væge eller det vægemateriale, der følger
        med sættet.
    wig_fiber_material:
      name: Fibermateriale i paryk
      description: Identificerer den primære fiber, der bruges til parykhåret, så
        kunder nemt kan vælge mellem typer af ægte hår og syntetiske muligheder med
        forskellige stylingegenskaber og levetid.
    wildlife_attractant_scent:
      name: Duftstof til vildtlokning
      description: Identificerer den primære duft, der bruges til at lokke vildt,
        herunder naturlige fødedufte og feromonlignende dufte.
    willow_grade:
      name: Pilekvalitet
      description: Specificerer kvalitetsgraden af det piletræ, der bruges, og angiver
        årestruktur og samlet ydeevneniveau.
    willow_type:
      name: Piletype
      description: Identificerer den type pil eller det alternative materiale, der
        bruges til batbladet, hvilket i høj grad påvirker ydeevne, holdbarhed og pris.
    wind_up_mechanism_type:
      name: Type af optræksmekanisme
      description: Specificerer, hvordan legetøjet trækkes op eller aktiveres.
    wind_up_toy_movement_pattern:
      name: Bevægelsesmønster for optrækslegetøj
      description: Beskriver den primære bevægelse, der opstår, når legetøjet er trukket
        op.
    windbreak_purpose:
      name: Formål med læskærm
      description: Definerer læskærmens primære tilsigtede anvendelse.
    windfoil_board_mounting_system:
      name: Monteringssystem for windfoil-board
      description: Specificerer den foilbox eller monteringsgrænseflade, der er indbygget
        i windfoil-boardet.
    windfoil_sail_style:
      name: Sejlstil for windfoil
      description: Klassificerer sejlet efter tilsigtet kørestil eller disciplin.
    winding_direction:
      name: Optræksretning
      description: 'Angiver det rotationsmønster, som urbevægeren understøtter: med
        uret, mod uret eller begge retninger.'
    winding_method:
      name: Opvindingsmetode
      description: Hvordan islættet er beregnet til at blive viklet eller klargjort
        til brug i skyttelen.
    winding_speed_control_type:
      name: Type af hastighedskontrol ved opvinding
      description: Angiver den metode, der bruges til at styre opvindingshastigheden
        under brug.
    winding_type:
      name: Beviklingstype
      description: Specificerer beviklingskonstruktionen på basstrengene, dvs. profilen
        på den ydre omvikling.
    windlass_control_station_type:
      name: Type af kontrolstation til ankerspil
      description: Den type betjeningsgrænseflade, der medfølger eller understøttes
        til betjening af ankerspillet.
    windlass_mount_type:
      name: Monteringstype for ankerspil
      description: Hvor og hvordan ankerspillet er beregnet til at blive monteret
        på båden.
    window_component_location:
      name: Placering af vindueskomponent
      description: Specificerer, hvilket vindue eller hvilken åbning delen gælder
        for på køretøjet, f.eks. forrude, dørrude, bagrude eller siderude.
    window_configuration:
      name: Vindueskonfiguration
      description: Angiver tilstedeværelsen og den relative størrelse af gennemsigtige
        udsigtsvinduer på wingfoil-vingen.
    window_glass_construction:
      name: Konstruktion af bilrude
      description: Specificerer sikkerheds- eller lamineringskonstruktionen af vinduesglasset
        til motorkøretøjer.
    window_glass_features:
      name: Funktioner i bilrude
      description: Angiver, om glasset understøtter integrerede køretøjsteknologier,
        f.eks. regnsensorfelt eller kamerabeslag.
    window_glass_finish:
      name: Finish på bilrude
      description: Specificerer finish, toning eller privacy-behandling af vinduesglas
        til motorkøretøjer.
    window_glass_tint_color:
      name: Toningsfarve i vinduesglas
      description: Specificerer farvetonen i glasset, ikke den generelle produktfarve.
    window_glass_tint_level:
      name: Toningniveau for bilrude
      description: Angiver den omtrentlige fabriks- eller privacy-toningens mørkhed
        i vinduesglasset, ikke eftermonteret film. Brug beskrivende niveauer, når
        den nøjagtige VLT ikke kendes.
    window_net_latch_mechanism:
      name: Låsemekanisme for vinduesnet
      description: Specificerer den låse- eller udløsermekanisme, der bruges til vinduesnettet,
        f.eks. trykknap, håndtag eller sikkerhedsseleagtigt spænde.
    window_net_mounting_hardware:
      name: Monteringsdele til vinduesnet
      description: Identificerer den type monteringsdele eller fastgørelsesmetode,
        der bruges til at installere vinduesnettet, f.eks. clip-on, skruer eller krog-
        eller stangtype, eller om monteringsdele medfølger.
    window_net_opening_direction:
      name: Åbningsretning for vinduesnet
      description: Specificerer, hvordan vinduesnettet åbnes eller frigøres i forhold
        til føreren eller passageren med henblik på udstigning og overholdelse af
        regler.
    window_regulator_operation:
      name: Betjening af vinduesregulator
      description: Specificerer, hvordan vinduesregulatoren betjenes, enten med manuelt
        håndsving eller elektrisk.
    windshield_coverage_area:
      name: Dækningsområde for forrude
      description: Specificerer, hvilke dele af køretøjets forreste udvendige område
        forrudeovertrækket er designet til at beskytte, f.eks. kun forruden eller
        også viskere, spejle, sideruder og motorhjelmens kant.
    windshield_mount_attachment_method:
      name: Fastgørelsesmetode for forrudemontering
      description: Specificerer, hvordan beslaget hæfter på eller griber fat i forrudens
        overflade.
    windshield_washer_fluid_seasonality:
      name: Sæsonbestemt brug af sprinklervæske
      description: Angiver den tilsigtede sæson, det tilsigtede klima eller den primære
        anvendelse for sprinklervæskens formulering, f.eks. vinterafisning, sommerinsektfjerner
        eller helårsbrug.
    windsurf_fin_style:
      name: Finnestil til windsurfing
      description: Klassificerer finnen efter den tilsigtede sejldisciplin eller brugstype,
        f.eks. wave, slalom eller weed.
    windsurfing_connection_standard:
      name: Tilslutningsstandard for windsurfing
      description: Mekanisk grænseflade eller boxtype, der bruges til at fastgøre
        delen til boardet eller riggen.
    windsurfing_sail_style:
      name: Sejlstil for windsurfing
      description: Klassificerer sejlets tilsigtede disciplin eller anvendelse, f.eks.
        wave, freeride eller foil.
    wine_additive_type:
      name: Type af tilsætning til vin
      description: Specificerer, hvilken type produkt til vinfremstilling der er tale
        om, f.eks. ingrediens, tilsætning, gær, klaringsmiddel eller sæt.
    wine_body:
      name: Vinens fylde
      description: Beskriver vinens oplevede vægt og mundfølelse.
    wine_carbonation:
      name: Kulsyreindhold i vin
      description: Angiver, om vinen er stille, let perlende eller mousserende, og
        hvor relevant intensiteten af boblerne.
    wine_making_ingredient_type:
      name: Ingredienstype til vinfremstilling
      description: Specificerer den funktionelle ingredienskategori for spiselige
        tilsætninger og ingredienser til vinfremstilling.
    wine_making_stage:
      name: Fase i vinfremstilling
      description: Identificerer det trin i vinfremstillingsprocessen, som produktet
        er beregnet til.
    wine_style:
      name: Vinstil
      description: Klassificerer vinens overordnede produktionsstil ud over farve,
        f.eks. stille, mousserende eller forstærket.
    winemaking_process_stage:
      name: Procesfase i vinfremstilling
      description: Angiver den primære fase i vinfremstillingsprocessen, som udstyret
        eller forbrugsvaren er beregnet til.
    wing_count:
      name: Vingeantal
      description: Antal vinger eller arme på boomerangen.
    wing_handle_type:
      name: Håndtagstype for vinge
      description: Specificerer typen af håndgrebssystem på wingfoil-vingen.
    wing_part_type:
      name: Komponenttype til wingfoil-vinge
      description: Identificerer den specifikke komponent eller reservedel til en
        wingfoil-vinge.
    wingfoiling_style:
      name: Wingfoiling-stil
      description: Angiver den specifikke wingfoiling-disciplin eller kørestil, som
        produktet er rettet mod.
    wiper_arm_finish:
      name: Finish på viskerarm
      description: Overfladefinish eller beskyttende belægning på viskerarmen, som
        påvirker korrosionsbestandighed og udseende.
    wiper_arm_pivot_mount_type:
      name: Type af drejemontering for viskerarm
      description: Specificerer, hvordan viskerarmen monteres på køretøjets viskerforbindelse
        eller drejepunkt.
    wiper_blade_attachment_type:
      name: Fastgørelsestype for viskerblad
      description: Specificerer den konnektor- eller fastgørelsestype, der bruges
        til at montere viskerbladet på viskerarmen.
    wiper_blade_rubber_material:
      name: Gummimateriale i viskerblad
      description: Materiale i viskerelementet, dvs. indsatsen eller refillen, der
        er i kontakt med glasset.
    wiper_system_position:
      name: Placering af viskersystem
      description: Angiver viskersystemets monteringsposition på køretøjet.
    wire_coating_material:
      name: Ledningens belægningsmateriale
      description: Specificerer materialet i den udvendige belægning eller kappe på
        wiren, ikke selve kernetråden, hvilket kan påvirke slidstyrke og hvor let
        den passerer gennem perlehuller.
    wire_coating_type:
      name: Belægningstype for wire
      description: Specificerer, om og hvordan wiren er belagt eller dækket, f.eks.
        af hensyn til farve, beskyttelse og tekstur.
    wire_construction_type:
      name: Konstruktionstype for wire
      description: Specificerer perlewirens fysiske konstruktion, f.eks. snoet kontra
        massiv, og om den er belagt.
    wire_finish:
      name: Wirefinish
      description: Specificerer den overfladefinish, belægning eller plettering, der
        er påført wiren, f.eks. poleret, emaljeret, galvaniseret eller pletteret,
        hvilket påvirker udseende og modstandsdygtighed over for anløbning og korrosion.
    wire_gauge_awg:
      name: Wiretykkelse (AWG)
      description: American Wire Gauge-størrelse (AWG) for lederne i ledningsnettet.
    wire_insulation_material:
      name: Isoleringsmateriale for wire
      description: Materiale i wirens isolering eller kappe i ledningsnettet, hvilket
        påvirker temperatur- og kemikaliebestandighed.
    wire_packaging_type:
      name: Emballagetype for wire
      description: Specificerer, hvordan wiren sælges eller pakkes.
    wire_shape_profile:
      name: Wireform eller -profil
      description: Beskriver wirens tværsnitsform.
    wiring_configuration:
      name: Ledningskonfiguration
      description: Angiver, om fægtningsepéen leveres fortrådet til elektrisk pointregistrering,
        uden ledning, trådløs eller beregnet til ikke-elektrisk træning.
    wobbler_style:
      name: Wobblerstil
      description: Definerer wobblerens specifikke design- eller actionstil, f.eks.
        crankbait eller jerkbait.
    wood_block_surface_preparation:
      name: Overfladeforberedelse af træblok
      description: Angiver træblokkens klar-til-brug-overfladetilstand til finish
        og hobbybrug.
    wood_grain_direction:
      name: Retning på træårer
      description: Træårernes retning i forhold til produktets længste dimension,
        hvilket er vigtigt for styrke, skæreegenskaber og udseende.
    wood_slice_edge_style:
      name: Kantstil på træskive
      description: Skivens kanttilstand, f.eks. naturlig barkkant kontra glat eller
        slebet kant.
    wooden_block_special_features:
      name: Særlige funktioner i træklodser
      description: Bemærkelsesværdige funktionelle egenskaber, der følger med træklodssættet.
    woodwind_body_construction:
      name: Konstruktion af træblæserinstrument
      description: Angiver, om instrumentet er fremstillet i ét stykke eller flere
        sektioner, f.eks. 2-delt eller 3-delt, hvilket påvirker rengøring, opbevaring
        og bærbarhed.
    woodwind_polishing_cloth_intended_use:
      name: Tilsigtet brug af pudseklud til træblæserinstrument
      description: Specificerer, hvad kluden primært er designet til at rengøre eller
        polere på et træblæserinstrument.
    woodwind_small_part_type:
      name: Type af lille reservedel til træblæserinstrument
      description: Specificerer, hvilken type lille klarinetreservedel varen er, f.eks.
        klapmekanik, puder, kork eller filt eller ringe.
    woofer_mounting_type:
      name: Monteringstype for woofer
      description: Hvordan wooferen er beregnet til at blive monteret eller brugt,
        f.eks. free-air kontra kabinet, samt almindelige monteringsformer i biler.
    woofer_surround_material:
      name: Materiale i wooferophæng
      description: Materiale, der bruges til wooferens ophængskant, dvs. den ydre
        affjedringsring.
    worn_on_finger:
      name: Bæres på finger
      description: Specificerer, hvilken finger fingerbølsguiden er beregnet til at
        blive båret på.
    wrap_style:
      name: Viklestil
      description: Angiver, hvor mange gange bæltet er beregnet til at blive viklet
        rundt om taljen.
    wrapping_occasion:
      name: Anledning for gaveindpakning
      description: Den primære gave- eller fejringsanledning, som gavepapiret er beregnet
        til.
    wrapping_paper_features:
      name: Funktioner for gavepapir
      description: Funktionelle og bæredygtighedsrelaterede egenskaber ved gavepapir,
        f.eks. rivebestandighed, genanvendt indhold eller forudskårne ark.
    wrestling_dummy_design:
      name: Design af brydedummy
      description: Dummyens overordnede kropsform eller kropsholdning, f.eks. stående
        menneskeform eller kastesæk, hvilket afgør, hvilke træningsøvelser den egner
        sig til.
    wrestling_mat_safety_certifications:
      name: Sikkerhedscertificeringer for brydemåtte
      description: Angiver eventuelle sikkerhedscertificeringer eller standarder fra
        branchen eller sportsforbund, som måtten opfylder.
    wrist_strap_style:
      name: Stil for håndledsrem
      description: Beskriver typen af håndledsrem, eller fraværet af en sådan, hvilket
        påvirker støtte og pasform.
    wrist_support_style:
      name: Stil for håndledsstøtte
      description: Identificerer håndledsstøttens konstruktion eller stil, f.eks.
        skinne, handske, tape eller wrap, for at understøtte brugerens præferencer
        og valg i forhold til ydeevne.
    xylophone_range_octaves:
      name: Omfang for xylofon (oktaver)
      description: Xylofonens samlede toneomfang angivet i oktaver, f.eks. 2,5 oktaver,
        3 oktaver eller 4 oktaver.
    xylophone_resonator_type:
      name: Resonatortype for xylofon
      description: Den type resonatorsystem, der bruges til at forstærke tonen, hvis
        relevant.
    yam_variety:
      name: Yamvariant
      description: Specificerer den kultivar eller almindelige variant af yam, der
        sælges, f.eks. lilla, gul eller elefantfod.
    yarn_cutter_physical_style:
      name: Fysisk stil for garnskærer
      description: Identificerer garnskærerens fysiske stil, f.eks. vedhæng, ring
        eller lille saks, for at understøtte browsing og filtrering i kategorien.
    yarn_finish_or_effect:
      name: Garnfinish eller -effekt
      description: Fremhæver særlige visuelle eller funktionelle behandlinger, der
        er påført garnet, f.eks. fluorescens eller metallisk glimmer.
    yarn_guide_style:
      name: Stil for garnguide
      description: Den fysiske udformning af den komponent, der guider garnet.
    yarn_swift_adjustability:
      name: Justerbarhed for garnvinde
      description: Angiver, om og hvordan garnvinden kan justeres, f.eks. om den kan
        udvides, klappes sammen eller foldes, hvilket påvirker opbevaring og hvilke
        fedstørrelser den kan håndtere.
    yarn_swift_bearing_type:
      name: Lejetype for garnvinde
      description: Beskriver rotationsstøttemekanismen, f.eks. kugleleje, der påvirker
        jævnhed og opvindingshastighed.
    yeast_application:
      name: Anvendelse for gær
      description: Angiver den primære tilsigtede kulinariske anvendelse eller fermenteringsanvendelse
        for gærproduktet.
    yo_yo_accessory_part_type:
      name: Type af yo-yo-tilbehør eller -del
      description: Identificerer, hvilken type reservedel eller tilbehør yo-yo-produktet
        er, f.eks. snor, leje eller response pads.
    yo_yo_axle_system_type:
      name: Akselsystemtype for yo-yo
      description: Konstruktionsmetode for yo-yoens aksel, f.eks. fast aksel kontra
        transaksel, hvilket påvirker spillefølelse og vedligeholdelse.
    yo_yo_bearing_size_class:
      name: Størrelsesklasse for yo-yo-leje
      description: Standardiseret lejestørrelsesklasse, der bruges af yo-yoen, hvor
        relevant.
    yo_yo_bearing_type:
      name: Lejetype for yo-yo
      description: Lejekonfiguration, der påvirker respons og spin-egenskaber.
    yo_yo_play_style:
      name: Spillestil for yo-yo
      description: Yo-yoens primære tilsigtede spillestil, som afspejler den snor-
        eller trickdisciplin, produktet er designet til.
    yo_yo_response_system:
      name: Response-system for yo-yo
      description: Specificerer yo-yoens response-mekanisme, som delen er designet
        til, med henblik på kompatibilitet.
    yo_yo_responsiveness:
      name: Respons for yo-yo
      description: Om yo-yoen vender tilbage til hånden med et ryk (responsive), eller
        om den kræver et bind (unresponsive).
    yo_yo_string_material:
      name: Snormateriale til yo-yo
      description: Materialesammensætning i yo-yo-snoren.
    yogurt_base_ingredient:
      name: Basisingrediens i yoghurt
      description: Identificerer den primære mælke- eller plantebaserede kilde, der
        bruges til at fremstille yoghurten, hvilket er afgørende for kostpræferencer
        og allergenhensyn.
    yoke_type:
      name: Gaffeltype
      description: Identificerer den type vugge eller gaffel, der støtter skydevåbnet
        på monopoden.
    zill_playing_style:
      name: Spillestil for zills
      description: Tilsigtet spillekontekst eller -stil, typisk mavedans kontra orkestrale
        eller kulturelle varianter.
    zill_strap_material:
      name: Stropmateriale til zills
      description: Materiale i fingerstrop eller elastik, der bruges til at holde
        zills, hvis inkluderet, hvilket påvirker komfort, holdbarhed og greb.
    zills_strap_adjustability:
      name: Justerbarhed for zills-strop
      description: Angiver, om og hvordan den medfølgende strop eller elastik kan
        justeres for pasform.
    zipper_application:
      name: Anvendelse for lynlås
      description: Specificerer det projekt eller den anvendelse, lynlåsen er designet
        til.
    zipper_chain_type:
      name: Kædetype for lynlås
      description: Specificerer lynlåskædens eller -tændernes konstruktion eller type.
    zipper_end_type:
      name: Endetype for lynlås
      description: Angiver, hvordan lynlåsen afsluttes, og om den kan adskilles (åben
        ende) eller har lukket ende (ikke-delbar), herunder almindelige beslag til
        delbare ender, der bruges i hobbylynlåse.
    zipper_gauge:
      name: Lynlåsmål
      description: 'Angiver lynlåskædens mål- eller størrelsesbetegnelse, typisk angivet
        som et tal med #, f.eks. #3 eller #5, hvilket svarer til tand- eller spiralbredden
        og den tilsigtede anvendelse.'
    zipper_opening_length:
      name: Åbningslængde for lynlås
      description: Definerer, hvor stor en del af frontåbningen der har lynlås, og
        skelner mellem fuld lynlås, halv lynlås og kvart lynlås.
    zipper_pull_material:
      name: Materiale i lynlåstrækker
      description: Specificerer materialet i lynlåstrækkeren eller træktappen, dvs.
        den del man griber fat i, adskilt fra lynlåstænder eller -kæde og lynlåsbånd.
    zipper_pull_side:
      name: Lynlåstrækkerside
      description: Specificerer, fra hvilken side eller hvilke sider af lynlåsen træktappen
        er tilgængelig.
    zipper_pull_strap_cord_tab_material:
      name: Materiale i strop, snor, tap eller kvast til lynlåstrækker
      description: Materiale i stroppen, snoren, tappen eller kvasten, der er fastgjort
        til lynlåstrækkeren, hvis relevant, eksklusive selve lynlåstrækkerens beslag
        eller krop.
    zipper_reversibility_mechanism:
      name: Vendbarhedsmekanisme for lynlås
      description: Specificerer, hvordan lynlåsen er vendbar, f.eks. dobbeltsidet
        skyder kontra flip- eller auto-lock-skyder designet til vendbare beklædningsdele.
    zipper_separating_type:
      name: Adskillelsestype for lynlås
      description: Angiver, om lynlåsen adskilles i bunden eller toppen eller har
        lukket ende, med henblik på pasform til jakker, soveposer, tasker osv.
    zipper_side:
      name: Lynlåsside
      description: Specificerer, hvilken side hovedlynlåsen sidder i, når soveposen
        ligger med forsiden opad.
    zipper_slider_material:
      name: Materiale i lynlåsskyder
      description: Specificerer materialet i lynlåsskyderen, dvs. den bevægelige mekanisme,
        hvilket kan påvirke styrke og korrosionsbestandighed.
    zipper_slider_pull_configuration:
      name: Konfiguration af lynlåsskyder eller -trækker
      description: Angiver, om lynlåsen har én eller to skydere eller trækkere, og
        om trækkerne sidder på én eller begge sider af skyderen.
    zipper_style:
      name: Lynlåsstil
      description: Angiver lynlåsens længde eller tilstedeværelse på beklædningsdelen,
        f.eks. uden lynlås, kvart lynlås, halv lynlås eller fuld lynlås.
    zipper_tape_material:
      name: Materiale i lynlåsbånd
      description: Specificerer det primære materiale i lynlåsbåndet, dvs. stofsiderne,
        der sys ind i projektet.
    zipper_teeth_type:
      name: Type af lynlåstænder
      description: Specificerer konstruktionstypen for lynlåskæden eller -tænderne,
        f.eks. spiral, støbt plast, metal eller usynlig lynlås, hvilket påvirker fleksibilitet,
        styrke og typiske anvendelser.
