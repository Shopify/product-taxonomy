    zill_playing_style:
      name: Zill playing style
      description: Intended playing context/style (commonly belly dance vs orchestral/cultural variants).
    zill_strap_material:
      name: Zill strap material
      description: Material of the finger strap/elastic used to hold the zills (if included), impacting comfort, durability, and grip.
    zills_strap_adjustability:
      name: Zills strap adjustability
      description: Whether and how the included strap/elastic can be adjusted for fit.
    zipper_application:
      name: Zipper application
      description: Specifies the intended project or application the zipper is designed for.
    zipper_chain_type:
      name: Zipper chain type
      description: Specifies the construction/type of the zipper chain/teeth.
    zipper_end_type:
      name: Zipper end type
      description: Indicates how the zipper terminates and whether it separates (open-end) or is closed-end (non-separating), including common separating-end hardware used in craft zippers.
    zipper_gauge:
      name: Zipper gauge
      description: 'Indicates the zipper chain gauge/size designation, typically expressed as a number with a # (for example, #3 or #5), which correlates to tooth/coil width and intended use.'
    zipper_opening_length:
      name: Zipper opening length
      description: Defines how much of the front opening is zippered, distinguishing full-zip from half-zip or quarter-zip styles.
    zipper_pull_material:
      name: Zipper pull material
      description: Specifies the material of the zipper pull or pull tab (the part you grip), distinct from the zipper teeth/chain and tape.
    zipper_pull_side:
      name: Zipper pull side
      description: Specifies which side(s) of the zipper the pull tab is accessible from.
    zipper_pull_strap_cord_tab_material:
      name: Zipper pull strap/cord/tab material
      description: Material of the strap/cord/tab/tassel component attached to the zipper pull (if present), excluding the main zipper pull hardware/body.
    zipper_pull_style:
      name: Zipper pull style
      description: Describes the design or finish on a zipper pull, such as textured or embossed
    zipper_reversibility_mechanism:
      name: Zipper reversibility mechanism
      description: Specifies how the zipper is reversible (e.g., double-sided slider vs flip/auto-lock slider designed for reversible garments).
    zipper_separating_type:
      name: Zipper separating type
      description: Indicates whether the zipper separates at the bottom/top or is closed-end, for fit with jackets, sleeping bags, bags, etc.
    zipper_side:
      name: Zipper side
      description: Specifies the side on which the main zipper is located when the sleeping bag is lying face-up.
    zipper_slider_material:
      name: Zipper slider material
      description: Specifies the material of the zipper slider (the moving mechanism), which can impact strength and corrosion resistance.
    zipper_slider_pull_configuration:
      name: Zipper slider/pull configuration
      description: Indicates whether the zipper has one slider/pull or two, and whether pulls are on one or both sides of the slider.
    zipper_style:
      name: Zipper style
      description: Indicates the zipper length or presence on the garment (e.g., zipless, quarter-zip, half-zip, full-zip).
    zipper_tape_material:
      name: Zipper tape material
      description: Specifies the primary material of the zipper tape (fabric sides) that is sewn into the project.
    zipper_teeth_type:
      name: Zipper teeth type
      description: Specifies the construction style of the zipper chain/teeth (e.g., coil, molded plastic, metal, invisible), which affects flexibility, strength, and typical applications.
    zoom_type:
      name: Zoom type
      description: Specifies the type of zoom function in document cameras, such as digital or optical
