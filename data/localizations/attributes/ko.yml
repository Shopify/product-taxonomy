    toy_figure_sound_feature:
      name: 장난감 피규어 소리 기능
      description: '동물 피규어가 소리를 내는지 여부와 소리의 종류를 나타냅니다(예: 포효, 사실적인 동물 소리).'
    toy_game_features:
      name: 장난감/게임 기능
      description: 해변 및 모래 장난감과 관련된 주목할 만한 놀이 또는 구조적 특징을 강조합니다.
    toy_gift_basket_items_included:
      name: 장난감 선물 바구니 품목 포함
      description: '선물 바구니에 포함된 주요 장난감 품목 유형을 나열합니다(예: 봉제 인형, 블록 세트, 퍼즐).'
    toy_glider_launch_method:
      name: 장난감 글라이더 발사 방식
      description: 장난감 글라이더의 발사 방식을 명시하며, 이는 놀이 방식과 구매자의 기대에 영향을 미칩니다.
    toy_helicopter_control_type:
      name: 장난감 헬리콥터 조종 방식
      description: 장난감 헬리콥터의 조종/작동 방식(추진 방식과 무관)은 휴대용 리모컨, 앱 제어 또는 제어 없이 자유 비행하는 방식
        등이 있습니다.
    toy_helicopter_features:
      name: 장난감 헬리콥터 특징
      description: 장난감 헬리콥터, 특히 RC 모델의 사용성과 놀이 가치에 영향을 미치는 주요 기능적 특징을 나타냅니다.
    toy_jacks_set_items_included:
      name: 장난감 잭스 세트 구성품
      description: '장난감 잭스 세트에 포함된 핵심 구성품(예: 잭스, 공, 가방)을 명시합니다.'
    toy_keyboard_learning_mode:
      name: 장난감 키보드 학습 방식
      description: '장난감 키보드가 지원하는 교육/학습 방식을 나타냅니다(예: 불이 들어오는 키, 따라 부르기 노래, 맞춤형 수업,
        앱 지원 학습).'
    toy_keyboard_sound_theme:
      name: 장난감 키보드 음향 테마
