    toy_motorcycle_feature_set:
      name: 장난감 오토바이 기능 구성
      description: 장난감 오토바이의 주요 놀이 기능을 나타냅니다(해당하는 항목 모두 선택).
    toy_motorcycle_scale:
      name: 장난감 오토바이 축척
