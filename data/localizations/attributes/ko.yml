      description: '단추의 표면 마감/외관을 설명합니다(예: 무광, 유광).'
    buttonhole_elastic_application:
      name: 단추 구멍 밴드 용도
      description: 접이식 장식 밴드의 주요 용도/적용 분야.
    cab_type:
      name: 캡 유형
      description: 트럭의 캡 구성을 나타냅니다.
    cabasa_construction_type:
      name: 카바사 구조 유형
      description: 카바사 본체와 체인/비드 결합부의 물리적 구조/스타일을 지정합니다.
    cabbage_variety:
      name: 양배추 품종
      description: '소비자가 맛, 식감, 요리 용도별로 필터링할 수 있도록 양배추의 품종이나 종류(예: 일반 양배추, 배추/일반 배추,
        사보이 양배추)를 식별합니다.'
    cabinet_door_style:
      name: 캐비닛 도어 스타일
      description: '캐비닛 도어 패널의 디자인 스타일을 식별하며(예: 셰이커 스타일, 돌출 패널), 주방 인테리어와 어울리는 제품을
        선택할 수 있습니다.'
    cabinet_overlay_type:
      name: 캐비닛 오버레이 유형
      description: 도어가 캐비닛 프레임을 덮는 방식 또는 프레임에 설치되는 방식을 나타냅니다.
    cable_end_type:
      name: 케이블 엔드 유형
      description: 브레이크 레버나 변속 레버와 연결되는 케이블 끝단 니플 또는 피팅의 모양이나 스타일을 설명합니다.
    cable_housing_construction:
      name: 케이블 하우징 구조
      description: '케이블 하우징의 구조적 설계를 설명합니다(예: 코일 권선형, 비압축형, 분절 링크형). 이는 압축 저항성, 유연성
        및 주행감에 영향을 미칩니다.'
    cable_housing_liner_type:
      name: 케이블 하우징 라이너 유형
      description: 하우징에 내부 라이너 및/또는 윤활 처리가 포함되어 있는지 여부와 사용된 재질/기술을 나타내며, 이는 마찰 감소와
        내후성에 영향을 미칩니다.
    cable_management_type:
      name: 케이블 정리 방식
      description: 회의용 테이블에 내장된 케이블 또는 전원 관리 기능의 유형을 나타냅니다.
    cable_surface_treatment:
      name: 케이블 표면 처리
      description: 마찰 감소 또는 부식 방지를 위해 케이블에 적용된 특수 코팅이나 마감 처리를 식별합니다.
    cabochon_back_type:
      name: 카보숑 뒷면 유형
      description: 카보숑의 뒷면 프로필/마감을 나타내며, 이는 세팅/접착 방법 및 호환성에 영향을 미칩니다.
    cacao_bean_variety:
      name: 카카오 콩 품종
      description: 사용된 카카오 콩의 품종 또는 재배종을 나타냅니다.
    cacao_roast_level:
      name: 카카오 로스팅 강도
      description: 카카오를 분쇄하기 전에 어느 정도 로스팅했는지를 설명합니다.
    cage_package_type:
      name: 케이지 패키지 유형
      description: '구매에 포함되는 구성품을 정의합니다(예: 그물망만, 프레임 키트, 전체 패키지).'
    cajon_body_shell_material:
      name: 카혼 본체/쉘 재질
      description: 카혼 본체 또는 쉘(타파 제외)의 재질을 식별합니다.
    cajon_corner_control_system:
      name: 카혼 코너 제어 시스템
      description: '카혼이 모서리 음색 조절 기능(예: 모서리 조절 나사)을 지원하는지 여부를 나타내며, 이를 통해 슬랩 반응을 조절할
        수 있습니다.'
    cajon_corner_edge_design:
      name: 카혼 코너/엣지 디자인
      description: 연주 편의성과 연주성에 영향을 미치는 코너/엣지 구조를 설명합니다.
    cajon_feet_type:
      name: 카혼 받침 유형
      description: 카혼 받침의 유형을 나타내며, 이는 안정성과 공명 특성에 영향을 미칩니다.
    cajon_snare_adjustability:
      name: 카혼 스네어 조절 기능
      description: 스네어 효과(장력, 접촉 여부 또는 둘 다)를 조절할 수 있는지 여부와 조절 방식을 나타냅니다.
    cajon_snare_system_type:
      name: 카혼 스네어 시스템 유형
      description: 스네어 효과를 생성하는 내부 스네어 메커니즘의 유형을 나타냅니다.
    cake_shape:
      name: 케이크 모양
      description: 커피 케이크가 구워지는 물리적 형태를 설명합니다.
    cake_topping:
      name: 케이크 토핑
      description: 커피 케이크에 사용된 주요 토핑 또는 마감 재료를 식별합니다.
    cake_type:
      name: 케이크 종류
      description: '케이크의 종류를 설명합니다(예: 파운드케이크, 스펀지케이크, 치즈케이크).'
    caliper_mount_type:
      name: 캘리퍼 장착 방식
      description: '브레이크 캘리퍼가 사용하는 프레임 또는 포크 인터페이스 표준을 정의합니다(예: 포스트 마운트, 플랫 마운트).'
    caliper_mounting_standard:
      name: 캘리퍼 장착 표준
      description: '브레이크 캘리퍼를 자전거 프레임 또는 포크에 장착하는 데 사용되는 장착 규격을 나타냅니다(예: 플랫 마운트, 포스트
        마운트, IS).'
    camera_mounting_location_vehicle_exterior:
      name: 카메라 장착 위치(차량 외부)
      description: '카메라가 차량의 어느 위치에 장착되도록 설계되었는지를 나타냅니다(예: 전면 그릴, 후면, 사이드 미러).'
    camouflage_environment_type:
      name: 위장 환경 유형
      description: '위장 패턴이 설계된 주요 환경을 나타냅니다(예: 삼림, 사막 또는 습지).'
    camping_oil_application:
      name: 헤어 오일 적용
      description: '캠핑 환경에서 오일의 주요 용도를 지정합니다(예: 랜턴 연료, 버너 연료).'
    camshaft_construction:
      name: 캠축 구조
      description: 캠축의 제조/블랭크 스타일.
    camshaft_material:
      name: 캠축 재질
      description: 캠축 코어/샤프트의 주요 재질(베이스 소재).
    camshaft_position:
      name: 캠축 위치
      description: '엔진 내부에서 캠축의 위치/유형을 지정합니다(예: 흡기 또는 배기, 또는 특정 엔진 뱅크/위치).'
    candle_container_type_included:
      name: 포함된 양초 용기 유형
      description: 키트에 포함된 양초 용기의 유형을 나타냅니다(해당하는 경우).
    candle_dye_form:
      name: 양초 염료 형태
      description: 양초 제작에 사용되는 염료 또는 착색제의 물리적 형태를 나타냅니다.
    candle_fragrance_form:
      name: 양초 향료 형태
      description: 양초 제작에 사용되는 향료 성분의 유형 또는 형태를 나타냅니다.
    candle_making_tool_type:
      name: 양초 제작 도구 유형
      description: '제품이 어떤 종류의 양초 제작 도구인지를 식별합니다(예: 붓기용 포트, 심지 중심 고정 도구, 온도계).'
    candy_texture:
      name: 캔디 식감
      description: 맛이나 형태와 관계없이 캔디의 식감 또는 질감을 설명합니다.
    candying_method:
      name: 설탕 절임 방법
      description: '과일을 설탕에 절이거나 보존하는 방법을 설명합니다(예: 결정화, 글레이즈, 시럽 절임).'
    canned_meat_form:
      name: 통조림 육류 형태
      description: 포장 내부 육류의 가공 형태 또는 포장 방식을 분류합니다.
    canoe_construction_type:
      name: 카누 구조 유형
      description: '카누 선체의 제작 방식을 구분합니다(예: 하드쉘, 팽창식, 접이식).'
    canoe_hull_shape:
      name: 카누 선체 형상
      description: 선체의 주요 단면 형상 또는 바닥 프로파일을 정의하며, 이는 안정성과 조종성에 영향을 미칩니다.
    canoe_stern_design:
      name: 카누 선미 디자인
      description: 선체의 선미 스타일을 정의하며, 이는 모터 호환성과 조종성에 영향을 미칩니다.
    canopy_type:
      name: 캐노피 유형
      description: 카바나 침대에 포함된 캐노피 또는 상부 덮개의 유형을 설명합니다.
    canvas_compatible_media:
      name: 캔버스 호환 매체
      description: 캔버스가 사용되도록 설계된 미술 또는 공예 재료의 유형을 나타냅니다.
    canvas_format:
      name: 캔버스 형태
      description: 인쇄용 캔버스가 시트, 롤 또는 재단 패널 형태로 판매되는지를 나타냅니다.
    canvas_mounting_format:
      name: 캔버스 장착 방식/형태
      description: 그림용 캔버스 제품의 형태 또는 장착 방식을 나타냅니다.
    canvas_stretcher_assembly_type:
      name: 캔버스 틀 조립형
      description: 스트레처가 조립된 프레임 형태로 판매되는지, 아니면 조립이 필요한 바/키트 형태로 판매되는지 여부.
    canvas_stretcher_corner_joint_type:
      name: 캔버스 틀 모서리 접합 방식
      description: '캔버스 틀 모서리의 접합 방식을 나타냅니다(예: 장부맞춤, 핑거 조인트, 스테이플 고정, 키 방식).'
    canvas_surface_tone:
      name: 캔버스 표면 색조
      description: '프라이밍된 캔버스 바탕면의 기본 색상을 나타내며, 인쇄된 디자인이나 패턴은 포함하지 않습니다(예: 흰색, 검정색,
        톤 처리 색상).'
    canvas_weave_type:
      name: 캔버스 직조 유형
      description: 캔버스 표면의 직조 구조를 설명하며, 이는 질감과 물감의 표현 특성에 영향을 미칩니다.
    cap_attachment_style:
      name: 캡 부착 방식
      description: 색소폰 마우스피스 캡의 구조 또는 장착 방식을 나타내며, 이는 보호 성능과 케이스 수납 적합성에 영향을 미칠 수
        있습니다.
    cap_construction:
      name: 캡 구조
      description: '가발 캡의 제작 방식을 나타내며(예: 레이스 프론트, 풀 레이스, 핸드타이드), 이는 자연스러움, 착용감 및 스타일링의
        다양성에 영향을 미칩니다.'
    cap_crown_structure:
      name: 모자 크라운 구조
      description: 모자 크라운이 형태가 잡힌 구조인지(보강형) 또는 형태가 잡히지 않은 구조인지(소프트형)를 나타냅니다.
    cap_fit_type:
      name: 캡 핏 유형
      description: '모자가 착용자의 머리에 어떻게 맞는지 또는 조절되는지를 정의합니다(예: 맞춤형, 조절형).'
    cap_seal_type:
      name: 캡 씰 유형
      description: '오일 누출 및 증기 유출을 방지하는 데 사용되는 밀봉 부품을 나타냅니다(예: O링, 개스킷).'
    cap_size:
      name: 캡 크기
      description: 가발 캡이 맞는 전체적인 머리 크기를 나타내는 표준 사이즈 표기.
    cap_type:
      name: 캡 유형
      description: 오버플로우 탱크에 사용되는 캡/마개 인터페이스 유형.
    caper_size_grade:
      name: 케이퍼 크기 등급
      description: 케이퍼를 꽃봉오리의 직경에 따른 업계 표준 등급명으로 분류합니다.
    capo_clamping_mechanism:
      name: 카포 클램핑 메커니즘
      description: 현에 압력을 가하는 카포의 클램프 또는 작동 방식을 나타냅니다.
    capo_finish:
      name: 카포 마감
      description: '색상(예: 무광, 유광)과 무관한 카포 본체의 표면 마감(시각적/촉감적).'
    capo_fit_type:
      name: 카포 호환 넥 유형
      description: 카포가 장착되도록 설계된 넥 프로파일을 나타내며(곡률 및 평탄도 포함), 이는 잡음 없는 고정과 음정에 영향을 미칩니다.
    capo_pad_material:
      name: 카포 패드 소재
      description: 기타줄/지판과 닿는 접촉 패드의 재질을 지정합니다(그립감, 튜닝 안정성 및 마감재 손상 가능성에 영향을 미침).
    capo_tension_mechanism:
      name: 카포 장력 조절 방식
      description: 슬라이딩 카포의 현에 압력/장력을 가하고 조절하는 방법을 지정합니다.
    capture_method:
      name: 포획 방식
      description: 덫이 생포용인지 또는 살상용인지를 나타냅니다.
    car_ev_conversion_kit_motor_type:
      name: 자동차 EV 전환 키트 모터 유형
      description: '전환 키트에 포함되거나 필요한 구동 모터 기술을 나타냅니다(예: AC 유도 모터, 영구 자석 모터).'
    car_playset_items_included:
      name: 자동차 플레이 세트 품목 포함
      description: '기본 구조물 외에 자동차 플레이 세트에 포함된 주요 구성품을 나열합니다(예: 자동차, 피규어, 표지판).'
    car_shampoo_application_method:
      name: 세차용 샴푸 사용 방법
      description: 세차 시 샴푸를 적용하는 방식.
    car_wash_solution_form:
      name: 세차 세제 형태
      description: '세차 용액의 물리적 형태를 지정합니다(예: 액체, 거품, 물티슈).'
    car_wash_solution_scent:
      name: 세차 용액 향
      description: 세차 용액의 향을 나타냅니다(향이 첨가된 경우).
    carbonated_water_variety:
      name: 탄산수 종류
      description: '탄산수를 일반적인 제품 종류와 제조 방식에 따라 분류합니다(예: 토닉워터, 셀처, 기능성 탄산수).'
    carbonation:
      name: 탄산
      description: '음료의 탄산 정도 또는 유형을 설명합니다(예: 무탄산, 약탄산, 탄산, 니트로).'
    carburetor_barrel_count:
      name: 기화기 배럴 수
