      description: 칵테일을 마무리하는 데 사용되는 가니쉬가 무엇인지 식별합니다(재료 또는 가니쉬 유형).
    gas_lift_class:
      name: 가스 리프트 클래스
      description: 좌석 높이 조절에 사용되는 가스 리프트 실린더의 안전 및 강도 등급을 나타냅니다.
    gas_propellant_type:
      name: 가스 추진제 유형
      description: 블래스터가 가스 동력식인 경우 권장되거나 호환되는 가스 추진제 유형을 나타냅니다.
    gatta_tabla_tuning_block_material:
