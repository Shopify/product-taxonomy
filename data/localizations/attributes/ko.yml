    fuel_cap_type:
      name: 연료 캡 유형
      description: 차량 연료 주입구에 사용되는 연료 캡의 기능적 유형 또는 설계를 나타냅니다.
    fuel_cap_venting:
      name: 연료 캡 통기 방식
