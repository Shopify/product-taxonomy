    beading_wire_strand_count:
      name: 비즈 와이어 가닥 수
      description: '다중 가닥 비즈 와이어의 가닥 수를 나타냅니다(예: 7가닥, 19가닥, 49가닥). 이는 유연성과 늘어지는 특성에
        영향을 미칩니다.'
    beadlock_type:
      name: 비드락 유형
      description: 휠이 비드락 방식인지 여부와 그 유형을 나타냅니다(오프로드/UTV 사용자에게 유용한 정보).
    beam_material:
      name: 빔 소재
      description: 빔/로드의 주요 재질(헤드/부착물의 재질과 다른 경우가 많음).
    beam_pattern:
      name: 빔 패턴
      description: 주행 또는 오프로드 조명에 사용되는 광분포 패턴을 나타냅니다.
    bean_bag_fabric_material:
      name: 빈백 원단 소재
      description: 세트에 포함된 빈백의 겉감 재질을 식별합니다.
    bean_paste_variety:
      name: 장류 종류
      description: 제조 방식 또는 주원료에 따라 팥앙금의 유형을 분류합니다.
    bean_preparation:
      name: 콩 가공/준비
      description: '판매 전 콩의 준비 또는 가공 방식을 나타냅니다(예: 꼬투리째, 껍질 벗긴 것, 다진 것, 싹튼 것).'
    bean_variety:
      name: 콩 품종
      description: '콩의 식물학적 또는 시장 품종을 지정합니다(예: 녹색콩, 에다마메, 긴꼬투리콩).'
    beanie_style:
      name: 비니 유형
      description: 소비자가 흔한 스타일 중에서 빠르게 선택할 수 있도록 비니의 전반적인 디자인, 구조 또는 실루엣을 지정합니다.
    bearing_clearance:
      name: 베어링 클리어런스
      description: 베어링의 내부 반경 방향 클리어런스 등급(내부 유격량)을 나타냅니다. C0 등급은 CN 또는 일반 클리어런스라고도
        합니다.
    bearing_construction_type:
      name: 베어링 구조 유형
      description: '허브에 사용된 베어링의 설계 또는 구조 방식을 식별합니다(예: 카트리지, 루즈볼).'
    bearing_edge_type:
      name: 베어링 엣지 유형
      description: 쉘의 베어링 엣지 형태를 나타내며, 이는 어택감과 서스테인에 영향을 미칩니다.
    bearing_lubrication:
      name: 베어링 윤활
      description: '제조 과정에서 베어링에 적용된 윤활제의 유형을 나타냅니다(예: 그리스, 오일).'
    bearing_material:
      name: 베어링 소재
      description: '베어링의 구조 재질을 식별합니다(예: 강철, 세라믹 하이브리드). 이를 통해 내구성, 가격 및 성능을 고려해 선택할
        수 있습니다.'
    bearing_rating:
      name: 베어링 정격
      description: '스케이트에 사용된 베어링의 공차 등급 또는 성능 등급을 나타냅니다(예: ABEC 7, ILQ 9, Swiss).'
    bearing_seal_code:
      name: 베어링 씰 코드
      description: 베어링에 사용된 밀봉 방식을 나타내며, 이는 내구성과 구름 저항에 영향을 미칩니다.
    bearing_seal_type:
      name: 베어링 씰 유형
      description: '베어링 내부를 오염 물질로부터 보호하고 마찰에 영향을 미치는 씰 또는 실드 디자인을 지정합니다(예: 2RS, ZZ,
        LLU, 오픈형).'
    bearing_shield_type:
      name: 베어링 실드 유형
      description: 베어링 내부를 보호하는 실드 또는 밀봉 방식의 유형입니다.
    bearing_size_code:
      name: 베어링 규격 코드
      description: '내경, 외경 및 폭을 조합하여 표시하는 표준 베어링 규격 코드입니다(예: 608, 688).'
    bearing_type:
      name: 베어링 유형
      description: 헤드셋에 사용되는 베어링의 구조적 스타일을 지정합니다.
    beater_head_material:
      name: 비터 헤드 소재
      description: '베이스 드럼 비터의 타격면 또는 헤드 재질을 나타냅니다(예: 펠트, 목재, 고무).'
    beaters_included:
      name: 포함된 비터
      description: '드럼 페달에 포함되거나 장착된 비터의 수를 나타냅니다(예: 싱글, 듀얼). 비터가 포함되지 않은 경우도 포함합니다.'
    bed_base_type:
      name: 침대 바닥판 형태
      description: '침대 또는 디반 베이스의 구조적 유형을 정의합니다(예: 플랫폼형, 스프링 슬랫형, 조절식).'
    bed_storage_type:
      name: 침대 수납 유형
      description: 침대 프레임에 통합된 수납 방식을 정의합니다.
    bedroom_furniture_items_included:
      name: 침실 가구 품목 포함
      description: '소비자가 긴 설명을 읽지 않고도 포함된 구성을 빠르게 확인할 수 있도록 침실 가구 세트에 포함된 개별 가구 품목(예:
        침대, 화장대, 협탁)을 지정합니다.'
    bedroom_vanity_items_included:
      name: 포함된 침실 화장대 구성품
      description: '고객이 배송 품목을 정확히 알 수 있도록 침실 화장대 세트와 함께 제공되는 개별 품목(예: 거울, 스툴, 조명
        키트)을 나열합니다.'
    beer_based_cocktail_variety:
      name: 맥주 칵테일 종류
      description: '맥주를 베이스로 한 칵테일을 종류별로 분류합니다(예: 라들러, 샨디, 미첼라).'
    beet_variety:
      name: 비트 품종
      description: '소비자가 맛, 색상, 요리 용도를 식별할 수 있도록 비트의 품종 또는 종류를 지정합니다(예: 레드, 골든, 키오자).'
    bell_actuation_mechanism:
      name: 벨 작동 방식
      description: 벨을 울리기 위해 필요한 작동 방식을 나타내며, 소비자가 선호하는 사용성을 기준으로 선택할 수 있도록 돕습니다.
    bell_guard_coverage_area:
      name: 벨 가드 커버 범위
      description: 보호대가 벨의 어느 부분을 보호하도록 설계되었는지를 나타냅니다.
    bell_material:
      name: 벨 소재
      description: 벨 구성품 소재(악기 전체 소재와 별도로 명시된 경우).
    bellhousing_bolt_pattern:
      name: 벨 하우징 볼트 패턴
      description: 변속기 케이스에 사용되는 벨하우징/엔진 측 볼트 패턴 표준 또는 패턴 제품군을 지정합니다.
    bellows_material:
      name: 풀무 재질
      description: 풀무 본체 또는 외피의 재질입니다(해당하는 경우).
    bellows_orientation:
      name: 풀무 방향
      description: 파이프에 공기를 공급하는 데 사용되는 풀무의 구성을 나타냅니다.
    belly_panel_style:
      name: 복부 패널 유형
      description: 배가 불러오는 것을 고려하여 허리띠 또는 복부 패널의 구조를 설명합니다.
    belt_buckle_type:
      name: 벨트 버클 유형
      description: 벨트에 사용된 버클 메커니즘 또는 디자인을 구체적으로 설명합니다.
    beret_style:
      name: 베레모 유형
      description: 베레모의 특정 디자인 또는 문화적 변형 유형을 식별합니다.
    berry_species:
      name: 베리 종류
      description: 제품에 포함된 베리의 종류를 나타내며, 소비자가 원하는 베리를 빠르게 찾을 수 있도록 합니다.
    beta_casein_variant:
      name: 베타카세인 이형 상품
      description: '우유에 함유된 베타카제인 단백질의 유형(예: A2)을 나타냅니다. 이는 소화 관련 고려 사항이 있는 소비자에게
        유용한 정보입니다.'
    beverage_sweetness_level:
      name: 음료의 당도
      description: 음료를 첨가된 단맛 또는 당분의 정도에 따라 분류합니다.
    bezel_graduation_units:
      name: 베젤 눈금 단위
      description: 회전 베젤에 표시된 단위 체계를 나타냅니다(도, 밀 또는 이중 눈금).
    bicycle_brake_set_components_included:
      name: 자전거 브레이크 세트 포함 구성품
      description: 키트에 포함된 개별 부품 목록을 제공하여 소비자가 구성품을 정확히 확인하고 다양한 번들 구성을 비교할 수 있도록
        합니다.
    bicycle_cage_mounting_position:
      name: 자전거 케이지 장착 위치
      description: 자전거의 어느 부분에 케이지를 설치하도록 설계되었는지 지정합니다.
    bicycle_computer_mount_placement:
      name: 자전거 컴퓨터 장착 위치
      description: 핸들바 앞쪽 또는 스템 탑캡 등 자전거 컴퓨터가 장착되는 위치를 식별합니다.
    bicycle_folding_mechanism:
      name: 자전거 접이식 메커니즘
      description: '자전거 프레임에 사용된 접이식 메커니즘의 유형을 나타냅니다(예: 반접이식, 수직 접이식).'
    bicycle_frame_design:
      name: 자전거 프레임 디자인
      description: 자전거 프레임의 전반적인 유형을 나타내며, 이는 승하차 편의성, 적재 용량 및 보관성에 영향을 미칩니다.
    bicycle_frame_style:
      name: 자전거 프레임 유형
      description: 라이더의 자세와 외관에 영향을 미치는 자전거 프레임의 구조적 스타일(스텝스루, 로우라이더, 초퍼 스트레치 등)을
        설명합니다.
    bicycle_handlebar_type:
      name: 자전거 핸들바 유형
      description: 핸들바의 유형 또는 형상을 식별하며, 라이더가 자신의 주행 자세와 용도에 적합한 핸들바를 선택할 수 있도록 돕습니다.
    bicycle_headset_configuration:
      name: 자전거 헤드셋 구성
      description: '헤드셋 컵의 장착 방식에 따른 자전거 헤드셋의 구조적 유형 또는 규격을 나타냅니다(예: 외장 컵 방식, 반내장
        방식, 일체형, 나사식).'
    bicycle_hub_type:
      name: 자전거 허브 유형
      description: 휠에 적용된 허브 메커니즘을 설명하며, 이는 구동계 호환성과 주행 스타일에 영향을 미칩니다.
    bicycle_lock_security_certification:
      name: 자전거 자물쇠 보안 인증
      description: '도난 방지 성능을 검증하는 제3자 기관 인증(예: Sold Secure, ART, Varefakta).'
    bicycle_pedal_type:
      name: 자전거 페달 유형
      description: '페달의 전반적인 작동 방식 또는 설계 유형을 나타냅니다(예: 플랫폼, 클립리스, 하이브리드). 이를 통해 라이더가
        자신의 주행 스타일에 적합한 페달을 선택할 수 있습니다.'
    bicycle_propulsion_type:
      name: 자전거 추진 타입
      description: '자전거의 추진 방식을 나타냅니다(예: 수동 페달링, 전동 보조, 내연기관 동력).'
    bicycle_pump_type:
      name: 자전거 펌프 유형
      description: 펌프의 구조적 유형을 식별하며, 소비자가 주행, 보관 또는 비상 상황에 적합한 제품을 선택할 수 있도록 돕습니다.
    bicycle_rack_mounting_type:
      name: 자전거 랙 장착 방식
      description: 랙을 자전거에 부착하는 데 사용되는 주요 방법이나 위치를 설명하여 사용자가 Frame 및 하드웨어와의 호환성을 확인하는
        데 도움을 줍니다.
    bicycle_suspension_type:
      name: 자전거 서스펜션 유형
      description: 자전거에 서스펜션이 있는지 여부와 구성 방식을 식별합니다.
    bicycle_tire_tread_pattern:
      name: 자전거 타이어 트레드 패턴
      description: 타이어의 트레드 유형을 나타내며, 다양한 노면에서의 접지력과 구름 저항에 영향을 미칩니다.
    bidirectional_charging_capability:
      name: 양방향 충전 기능
      description: 전기차가 V2G 및/또는 V2H와 같은 양방향 충전 기능을 지원하는지 여부를 나타냅니다.
    bike_rack_mounting_style:
      name: 자전거 랙 장착 스타일
      description: 랙이 자전거를 지지하거나 고정하는 방식을 나타냅니다.
    bike_rack_tilt_function:
      name: 자전거 랙 틸트 기능
      description: 랙이 설치된 상태에서 후방 적재 공간에 접근할 수 있도록 하는 틸트 기능의 유무와 유형을 나타냅니다.
    bikini_top_style:
      name: 비키니 탑 유형
      description: 소비자가 선호하는 핏과 실루엣을 찾을 수 있도록 비키니 상의의 디자인 또는 재단 방식을 지정합니다.
    billiard_brush_type:
      name: 당구 브러시 유형
      description: '당구대 청소 도구의 구체적인 유형을 정의합니다(예: 테이블 브러시, 레일 브러시, 냅핑 블록).'
    billiard_glove_finger_coverage:
      name: 당구 장갑 손가락 커버 범위
      description: 당구 전용 장갑 스타일을 정밀하게 필터링할 수 있도록 장갑 디자인이 어떤 손가락들을 감싸는지 식별합니다.
    billiard_pocket_style:
      name: 당구대 포켓 스타일
      description: 호환성과 당구대 외관에 영향을 미치는 포켓의 구조적 또는 미적 스타일을 합니다.
    billiard_rack_style:
      name: 당구 랙 유형
      description: '랙의 물리적 스타일이나 메커니즘을 설명합니다(예: 전통적인 프레임형, 템플릿 시트형, 접이식).'
    billiard_table_type:
      name: 당구대 유형
      description: '당구대가 설계된 종목 또는 사용 유형을 나타냅니다(예: 풀, 스누커, 캐롬).'
    billiards_discipline:
      name: 당구 종목
      description: 제품이 대상으로 하거나 호환되는 특정 당구 종목(게임 유형)을 나타냅니다.
    binding_compatibility_standard:
      name: 바인딩 호환 규격
      description: 스키 부츠가 인증받은 바인딩 인터페이스(솔 규격)를 식별하며, 스키 바인딩과의 안전하고 올바른 결합을 보장합니다.
    binding_inclusion:
      name: 바인딩 포함 여부
      description: 스키가 바인딩 없이 판매되는지, 일체형 시스템으로 판매되는지, 또는 별도 바인딩이 포함되어 판매되는지를 나타냅니다.
    binding_interface:
      name: 바인딩 인터페이스
      description: 부츠와 바인딩의 호환성을 보장하기 위해, 스키에 미리 장착되어 있거나 호환되는 바인딩 플레이트 또는 인터페이스 표준을
        나타냅니다.
    binding_liner_type:
      name: 바인딩 라이너 유형
      description: '바인딩 또는 부츠에 사용된 내부 라이너의 유형을 설명합니다(예: 탈착식, 보행 가능, 열 성형 가능).'
    binding_mounting_system:
      name: 바인딩 장착 시스템
      description: 바인딩을 스키에 장착하는 데 사용되는 인터페이스를 식별합니다(플랫 마운트, 레일/트랙, 플레이트 등).
    binding_position:
      name: 바인딩 위치
      description: '바인딩의 장착 위치 또는 구성을 나타냅니다(예: 전면 부츠, 후면 부츠, ARTP).'
    binding_strap_position:
      name: 바인딩 스트랩 위치
      description: 스트랩을 바인딩의 어느 부위에 장착해야 하는지 지정합니다.
    bingo_components_included:
      name: 빙고 포함 구성품
      description: '빙고 세트에 포함된 구성품 목록을 제공합니다(예: 빙고 공, 카드, 마커).'
    bingo_number_range:
      name: 빙고 숫자 범위
      description: 해당 세트가 지원하는 빙고 번호의 범위 또는 변형 타입을 식별합니다.
    bingo_set_features:
      name: 빙고 세트 기능
      description: 빙고 세트의 주요 제품 형식을 식별합니다(실물/수동식 또는 전자식/인터랙티브).
    bipod_mounting_interface:
      name: 바이포드 장착 인터페이스
      description: 양각대를 총기 또는 레일 시스템에 연결하는 데 사용되는 장착 인터페이스를 나타냅니다.
    bit_attachment_type:
      name: 비트 부착 유형
      description: '고삐가 재갈에 연결되는 방식을 나타냅니다(예: 끈 묶음형, 버클형, 시카고 스크루형).'
    bit_mouthpiece_design:
      name: 재갈 마우스피스 디자인
      description: 압력 전달, 구개 정리 및 전반적인 강도를 결정하는 마우스피스의 구조적 스타일 또는 연결부 구성을 식별합니다.
    bit_ring_style:
      name: 재갈 링 유형
      description: 재갈의 볼이나 고리 부분이 고삐에 연결되는 형태를 정의하며, 이는 작용력, 측면 유도 및 고삐의 감각에 영향을 미칩니다.
    bladder_material:
      name: 블래더 소재
      description: 공기를 담는 내부 블래더의 재질을 식별합니다.
    blade_attachment_type:
      name: 블레이드 부착 유형
      description: 스케이트가 클랩(힌지) 메커니즘을 사용하는지 또는 고정식 블레이드 마운트를 사용하는지를 식별합니다.
    blade_finish_coating:
      name: 블레이드 마감/코팅
      description: 미관 개선이나 부식 방지를 위해 블레이드 표면에 적용된 표면 처리 방식입니다.
    blade_hosel_type:
      name: 블레이드 호젤 유형
      description: '샤프트에 결합되는 블레이드 호젤의 연결 방식을 나타냅니다(예: 표준형, 테이퍼형).'
    blade_length_type:
      name: 블레이드 길이 유형
      description: 핀의 블레이드 길이를 짧음, 중간, 김으로 분류하며, 이는 킥 빈도와 훈련 목표에 영향을 미칩니다.
    blade_lie:
      name: 블레이드 라이
      description: 하키 스틱 블레이드의 라이 넘버를 지정하며, 이는 샤프트 대비 블레이드가 빙판에 닿는 각도를 나타냅니다.
    blade_sharpness:
      name: 블레이드 날카로움 수준
      description: 훈련용으로 무기의 날이 날카로운지 아니면 무딘지를 나타냅니다.
    blade_size_category:
      name: 블레이드 크기 범주
      description: 청소년용과 성인용 블레이드를 구분하기 위해 사용되는 표준화된 국제 사브르 블레이드 크기 코드(0~5)입니다.
    blade_size_class:
      name: 블레이드 크기 등급
      description: 블레이드를 선수용 규격에 따라 유소년, 주니어, 중급, 고급 등의 샤프트 사이즈에 맞춰 분류합니다.
    blade_size_number:
      name: 블레이드 크기 번호
      description: 펜싱 규정에 정의된 표준 숫자 크기 코드(0~5)로, 블레이드 길이와 연령대별 참가 자격을 결정합니다.
    blaster_mechanism:
      name: 블래스터 메커니즘
      description: '젤 블래스터의 내부 작동 메커니즘을 정의합니다(예: GBB, AEG, 스프링).'
    block_edge_style:
      name: 블록 엣지 스타일
      description: 나무 블록의 모서리와 가장자리가 촉감과 안전성을 위해 어떻게 마감되었는지 설명합니다.
    blocking_mat_features:
      name: 블로킹 매트 기능
      description: 블로킹 매트의 기능적 특징을 나타냅니다(보관성, 휴대성, 사용성 등).
    blocking_mat_grid_unit:
      name: 블로킹 매트 눈금 단위
      description: 인쇄된 그리드에 사용된 단위 시스템으로, 사용자가 패턴과 치수를 맞추는 데 도움이 됩니다.
    blocking_mat_surface_markings:
      name: 블로킹 매트 표면 표시
      description: 매트 표면에 인쇄되거나 성형된 측정 또는 안내 표시의 유형을 나타냅니다.
    blocking_wire_coating:
      name: 블로킹 와이어 코팅
      description: 블로킹 와이어에 적용된 표면 처리 또는 코팅을 나타내며, 녹 방지 성능, 표면의 매끄러움 및 걸림 위험에 영향을
        미칩니다.
    blocking_wire_end_cap_type:
      name: 블로킹 와이어 엔드 캡 유형
      description: 안전성과 원단 보호를 위해 블로킹 와이어 끝단에 적용된 보호 또는 마감 유형을 나타냅니다.
    blocking_wire_set_includes:
      name: 블로킹 와이어 세트 구성품
      description: '블로킹 와이어 제품에 포함된 구성품을 나타냅니다(예: T핀, 보관 튜브).'
    blocking_wire_usage:
      name: 블로킹 와이어 용도
      description: 유연한 블로킹 와이어의 주요 용도를 나타냅니다.
    bloom_stage:
      name: 개화 단계
      description: 배송 또는 출고 시 데이지 꽃이 얼마나 개화한 상태인지를 나타냅니다.
    blower_motor_bearing_type:
      name: 송풍기 모터 베어링 유형
      description: 송풍기 모터에 사용된 베어링 설계를 나타냅니다.
    blower_motor_mounting_position:
      name: 블로워모터 장착 위치
      description: 'HVAC 모듈 또는 차량 내부에서 블로워 모터가 설치되는 위치를 나타냅니다(예: 전방, 후방).'
    blowpipe_valve_type:
      name: 블로우파이프 밸브 유형
      description: 포함된 블로우파이프 밸브의 스타일을 지정합니다(있는 경우).
    bo_staff_style:
      name: 보 스태프 스타일
      description: '스태프의 구조적 형태를 정의합니다(예: 직선형, 테이퍼형, 폼 패딩형, 접이식).'
    board_game_theme:
      name: 보드게임 테마
      description: 보드게임의 스토리 또는 배경 설정 테마를 나타냅니다(검색 및 탐색용).
    board_rail_shape:
      name: 보드 레일 형태
      description: '파도 위에서 보드의 고정력과 추진력에 영향을 미치는 레일의 윤곽을 지정합니다(예: 소프트, 하드, 50/50).'
    board_size_classification:
      name: 보드 크기 분류
      description: 콘홀 보드 또는 세트를 일반적인 표준 크기로 분류합니다.
    board_type_compatibility:
      name: 보드 유형 호환성
      description: 리쉬가 어떤 종류의 보드에 사용하도록 설계되었는지 지정합니다.
    boat_construction_type:
      name: 보트 구조 유형
      description: '로 보트의 구조적 스타일 또는 형식을 설명합니다(예: 공기주입식, 고정식).'
    boat_hook_flotation:
      name: 보트 후크 부력
      description: 보트 훅이 물에 빠졌을 때 뜨도록 설계되었는지 여부를 나타냅니다.
    boat_ladder_stowage_style:
      name: 보트 사다리 보관 방식
      description: '사다리를 사용하지 않을 때 보관하는 방법을 설명합니다(예: 접이식, 개폐식, 분리형).'
    boat_trailer_construction_type:
      name: 보트 트레일러 구조 유형
      description: 트레일러가 받침대, 롤러 또는 혼합 방식으로 보트를 지지하는지를 나타냅니다.
    boat_weaving_shuttle_weft_exit_type:
      name: 보트형 셔틀 씨실 배출 방식
      description: 직조 과정에서 씨실이 북에서 빠져나오는 방식.
    bobbin_loading_type:
      name: 보빈 장착 방식
      description: 북실이 재봉틀에 삽입/장착되는 방식을 지정합니다.
    bobbin_system:
      name: 보빈 시스템
      description: 재봉틀에 사용되는 보빈 장착 방식 또는 유형입니다.
    bobbin_type:
      name: 보빈 유형
      description: '셔틀이 사용하도록 설계된(또는 포함된) 실 공급 장치의 유형을 나타냅니다. 이는 호환성과 일반적인 용도를 결정합니다(예:
        보트형 셔틀은 보빈을 사용하는 경우가 많으며, 러그 셔틀은 천 조각을 넣을 수 있도록 개방형일 수 있음).'
    bobbin_winder_winding_direction:
      name: 보빈 와인더 감기 방향
      description: 보빈 와인더가 지원하는 감기 또는 회전 방향을 나타냅니다.
    bobble_mechanism:
      name: 버블 메커니즘
      description: 움직임과 내구성에 영향을 미치는 버블 메커니즘 스타일을 지정합니다.
    bocal_material:
      name: 보칼 소재
      description: 포함된 보칼의 재질을 지정합니다.
    bodhr_n_head_material:
      name: 보드란 헤드 재질
      description: 연주면(막)의 재질을 나타내며, 이는 음색과 유지 관리에 큰 영향을 미칩니다.
    bodhr_n_tuning_system_type:
      name: 보란 튜닝 시스템 유형
      description: 헤드 장력을 조절하기 위해 사용되는 내장 튜닝 메커니즘의 유형을 나타냅니다(조율 가능한 경우).
    body_armor_coverage_area:
      name: 방탄복 커버 범위
      description: 제품이 보호하는 신체 부위를 나타냅니다.
    body_armor_intended_use:
      name: 보호구 용도
      description: ATV/UTV 보호구의 주요 주행 환경 또는 사용 목적을 나타냅니다.
    body_cord_connector_style:
      name: 바디 코드 커넥터 유형
      description: '무기 및 점수판과의 호환성을 결정하는 코드 끝단의 커넥터 구성(예: 핀 개수 또는 총검형)을 설명합니다.'
    body_panel_finish_state:
      name: 차체 패널 마감 상태
      description: 쿼터 패널의 판매 시점 기준 표면 처리 및 마감 상태를 설명합니다(도장 또는 설치 전 상태).
    body_shape:
      name: 바디 형태
      description: 일렉트릭 기타의 전반적인 바디 형태 또는 스타일을 나타냅니다.
    bodysuit_bottom_coverage:
      name: 바디수트 하의 커버리지
      description: 바디수트 하단부의 컷과 커버 범위를 정의하며, 이는 착용감과 의상과의 조화에 영향을 미칩니다.
    boilie_shape:
      name: 보일리 모양
      description: 롤링 테이블로 제작되는 보일리의 모양을 식별하여, 낚시꾼이 다양한 미끼 형태 중에서 선택할 수 있도록 합니다.
    boilie_stop_buoyancy:
      name: 보일리 스톱 부력
      description: 보일리 스톱이 뜨도록, 가라앉도록 또는 중성 부력을 유지하도록 설계되었는지를 나타내며, 이는 수중에서 미끼가 위치하는
        방식에 영향을 미칩니다.
    bok_choy_variety:
      name: 청경채 품종
      description: '청경채의 품종 또는 유통 명칭을 나타내며(예: Baby, Shanghai, Nai Bai, Tatsoi, Purple
        Lady), 소비자가 원하는 맛, 크기 및 외관을 기준으로 선택할 수 있도록 합니다.'
    bolt_drive_style:
      name: 볼트 구동 방식
      description: 스케이트보드 장착 볼트의 구동 방식을 나타내며, 육각 렌치형(Allen)과 십자형(Phillips) 등의 헤드 유형을
        구분합니다.
    bone_content:
      name: 뼈 포함 여부
      description: 고기에 뼈가 포함되어 있는지 여부를 나타냅니다.
    bongo_center_block_material:
      name: 봉고 센터 블록 재질
      description: 두 개의 봉고 쉘을 연결하는 중앙 블록의 재질입니다(해당하는 경우).
    bongo_shell_material:
      name: 봉고 쉘 소재
      description: 드럼 헤드와 하드웨어를 제외한 봉고 쉘(드럼 몸통)의 재질.
    bongo_tuning_system:
      name: 봉고 튜닝 시스템
      description: '봉고의 조율 방식 또는 조율 구조를 설명합니다(예: 러그 조율 방식, 로프 조율 방식). 이는 유지 관리와 전통성에
        영향을 미칩니다.'
    boning_type:
      name: 보닝 유형
      description: 코르셋 내부의 구조적 지지 시스템을 식별합니다. 사용된 보닝의 재질과 형태를 함께 나타내며, 이는 지지력, 유연성
        및 내구성에 직접적인 영향을 미칩니다.
    boot_liner_type:
      name: 부츠 라이너 유형
      description: '스노보드 부츠 내부 라이너의 구조나 맞춤형 조절 기능을 설명합니다(예: 열성형 가능, 탈착 가능).'
    boot_sole_compatibility:
      name: 부츠 아웃솔 호환성
      description: 바인딩이 지원하는 부츠 밑창 규격 또는 인터페이스 시스템을 나열합니다.
    boot_support_level:
      name: 부트 지지 수준
      description: 스케이트가 제공하는 전반적인 발목 또는 부츠의 강성 및 지지력 수준을 설명합니다.
    boot_width_code:
      name: 부트 발볼 넓이 코드
      description: '피겨 스케이트 사이즈에 사용되는 제조사 기준의 문자형 너비 규격을 나타냅니다(예: AAA, AA, B, C, D).'
    booth_configuration:
      name: 부스 구성
      description: '부스의 전체 좌석 배치 유형을 식별합니다(예: 단면형, 코너형, 모듈러형).'
    bootie_toe_design:
      name: 부티 토 디자인
      description: 서핑 부티와 리프 부티의 발가락 부분 구조 스타일을 식별합니다.
    border_type:
      name: 테두리 유형
      description: 자수 패치의 가장자리 마감 또는 테두리 유형을 나타냅니다. 이는 외관, 올 풀림 방지 성능 및 품질 인식에 영향을
        미칩니다.
    bore_cleaner_format:
      name: 보어 클리너 형태
      description: 총열 세척 제품의 물리적 형태를 나타냅니다(도구형 또는 소모품형).
    bore_cleaner_safe_for_finish:
      name: 보어 클리너 표면 마감 호환성
      description: 보어 클리너를 안전하게 사용할 수 있는 일반적인 금관악기 표면 마감 종류를 나타냅니다.
    bottle_cage_loading_direction:
      name: 물통 케이지 장착 방향
      description: 병을 케이지에 넣거나 꺼내는 방향을 설명합니다.
    bottle_neck_finish_closure_size:
      name: 병 입구 규격 / 마개 크기
      description: '병뚜껑, 코르크 마개 및 병마개 기계와의 호환성을 보장하기 위해 표준화된 병 입구/마감 크기(예: 26mm 크라운
        마개).'
    bottle_style:
      name: 병 스타일
      description: 가정용 맥주 양조 및 와인 제조에 일반적으로 사용되는 병 형태를 나타냅니다.
    bottom_bracket_interface:
      name: 바텀 브래킷 인터페이스
      description: 크랭크가 호환되도록 설계된 스핀들 또는 바텀 브래킷 규격을 식별하며, 프레임 및 바텀 브래킷과의 호환성을 보장합니다.
    bottom_bracket_standard:
      name: 바텀 브래킷 표준
      description: 프레임이 지원하는 바텀 브래킷 쉘 또는 인터페이스를 나타내며, 이는 크랭크셋 호환성을 결정합니다.
    bottom_type_suitability:
      name: 바닥 유형 적합성
      description: 닻이 가장 잘 고정되도록 설계된 해저/바닥 상태를 지정합니다.
    bounce_level:
      name: 바운스 수준
      description: 공을 떨어뜨리거나 던졌을 때 얼마나 튕겨 오르는지 나타내며, 사용자가 벽 던지기나 슬램 같은 운동에 적합한 공을
        선택하는 데 도움을 줍니다.
    bouncy_ball_surface_finish:
      name: 탱탱볼 표면 마감
      description: '탱탱볼의 촉각적 및/또는 시각적 표면 마감을 지정합니다(예: 매끄러운 형태, 돌기형, 글리터).'
    boundary_marker_type:
      name: 경계 표시 유형
      description: '경기장이나 코트의 라인 마커 또는 마킹 제품의 물리적 형태를 정의합니다(예: 콘, 테이프, 페인트, 스텐실, 마킹기).'
    bouquet_size_tier:
      name: 부케 크기 등급
      description: 줄기 수와 관계없이 꽃다발의 크기를 구분하는 표준 등급입니다(여러 종류의 꽃이 섞인 경우 유용).
    bow_and_yo_yo_edge_finish:
      name: 활 및 요요 가장자리 마감
      description: 리본 장식 또는 패브릭 요요에 적용된 가장자리 마감 방식을 설명합니다(특히 리본 장식의 경우).
    bow_case_shell_type:
      name: 활 케이스 쉘 유형
      description: '활 케이스 외부의 구조적 형태를 설명합니다(예: 하드 케이스, 소프트 케이스).'
    bow_compatibility:
      name: 활 호환성
      description: 브로드헤드가 사용되도록 설계되었거나 사용이 권장되는 활의 유형을 나타냅니다.
    bow_hair_color:
      name: 활털 색상
      description: '관현악 현악기 활에 사용된 활털의 색상 또는 외관을 식별합니다(예: 표백 흰색, 천연 흰색, 검정색).'
    bow_stick_material:
      name: 활대 소재
      description: 무게, 타감, 가격에 큰 영향을 미치는 활대(메인 샤프트)의 재질을 식별합니다.
    bow_type:
      name: 활 유형
      description: '청소년용 활의 구조적 유형을 나타냅니다(예: 컴파운드, 리커브, 롱보우). 이는 사격 방식, 필요한 액세서리 및
        훈련 프로그램에 큰 영향을 미칩니다.'
    bow_winding_material:
      name: 활 윈딩 소재
      description: 그립과 밸런스에 영향을 미치는 활 윈딩/랩의 소재를 지정합니다.
    bow_yo_yo_embellishment_style:
      name: 활/요요 장식 스타일
      description: 장식 요소의 제작 방식을 식별합니다(리본 장식 또는 패브릭 요요 형태 등).
    bowling_ball_core_type:
      name: 볼링공 코어 유형
      description: 볼의 움직임과 후크 잠재력에 영향을 미치는 볼링공 내부 코어의 디자인 또는 대칭성을 식별합니다.
    bowling_ball_coverstock_type:
      name: 볼링공 커버스톡 유형
      description: 볼링공 외피의 재질 또는 기술을 나타내며, 이는 마찰력과 훅 성능에 영향을 미칩니다.
    bowling_set_style:
      name: 볼링 세트 유형
      description: 볼링 세트의 전반적인 유형 또는 용도를 정의합니다.
    box_lid_type:
      name: 상자 뚜껑 유형
      description: 선물 상자 또는 금속 케이스에 사용된 뚜껑 또는 개폐 방식의 유형입니다.
    box_spring_profile:
      name: 박스 스프링 높이 유형
      description: 박스 스프링의 전체 높이를 로우 프로파일, 일반형, 하이 프로파일 등의 등급으로 분류하여 고객이 정확한 치수를 몰라도
        쉽게 선택할 수 있도록 합니다.
    box_spring_requirement:
      name: 박스 스프링 요구 사항
      description: 매트리스 사용 시 추가 박스 스프링 또는 받침대가 필요한지 여부를 나타냅니다.
    boxing_ring_style:
      name: 권투 링 유형
      description: '링의 구조적 유형 또는 용도를 분류합니다(예: 경기용, 훈련용, 설치형, 바닥형).'
    bra_length_type:
      name: 브라 길이 유형
      description: '브래지어를 세로 길이 기준으로 분류합니다(예: 일반형, 롱라인, 미디, 크롭).'
    bra_padding_type:
      name: 브래지어 패드 유형
      description: 컵 내부 패딩의 유무나 두께 수준을 설명합니다.
    braces_compatibility:
      name: 치아 교정기 호환성
      description: 마우스가드가 치아 교정기와 함께 착용 가능한지 여부와 그 범위를 나타냅니다.
    brake_band_form:
      name: 브레이크 밴드 형태
      description: 브레이크 밴드가 연속된 루프 형태(엔들리스)로 제공되는지, 아니면 고정해야 하는 절단된 길이로 제공되는지 나타냅니다.
    brake_band_material_type:
      name: 브레이크 밴드 소재 유형
      description: '내구성, 그립력, 신축성 및 소음에 영향을 미치는 브레이크 밴드의 기능성 재질을 지정합니다(예: 면사, 나일론
        줄, 스프링 강철).'
    brake_band_style:
      name: 브레이크 밴드 유형
      description: 플라이어/보빈에 장력을 가하기 위해 물레에 사용되는 브레이크 밴드 장력 시스템/스타일을 지정합니다.
    brake_bleeding_method:
      name: 브레이크 에어 제거 방식
      description: 키트가 지원하는 브레이크 에어 제거 방식을 나타냅니다.
    brake_booster_assist_type:
      name: 브레이크 부스터 보조 장치 유형
      description: 브레이크 부스터에 사용되는 보조 메커니즘을 나타냅니다.
    brake_booster_diaphragm_configuration:
      name: 브레이크 부스터 다이어프램 구성
      description: 부스터에 사용된 다이어프램의 수와 유형을 나타냅니다.
    brake_caliper_bleeder_screw_position:
      name: 브레이크 캘리퍼 블리더 스크루 위치
      description: 캘리퍼 장착 시 블리더 나사의 위치를 지정합니다(적절한 블리딩을 위해 블리더가 가장 높은 위치에 있는지 확인하는
        데 사용됨).
    brake_caliper_finish:
      name: 브레이크 캘리퍼 마감
      description: '브레이크 캘리퍼 본체에 적용된 표면 마감 또는 보호 코팅을 나타냅니다(예: 도장, 도금, 아노다이징).'
    brake_caliper_included_hardware:
      name: 브레이크 캘리퍼 포함 하드웨어
      description: 캘리퍼 조립품에 포함된 구성품을 나타냅니다.
    brake_caliper_mount_type:
      name: 브레이크 캘리퍼 장착 방식
      description: 캘리퍼를 너클/브래킷에 부착하는 데 사용되는 장착 인터페이스 스타일.
    brake_caliper_paint_base_chemistry:
      name: 브레이크 캘리퍼 페인트 기본 조성
      description: 사용된 페인트/레진 시스템 또는 화학 계열.
    brake_caliper_paint_kit_contents:
      name: 브레이크 캘리퍼 페인트 키트 구성품
      description: 페인트 외에 패키지에 포함된 구성품을 나타냅니다.
    brake_circuit_type:
      name: 브레이크 회로 유형
      description: 마스터 실린더가 지원하는 유압 회로 구성을 나타냅니다.
    brake_clutch_fluid_base_chemistry:
      name: 브레이크/클러치액 기유 화학 성분
      description: 브레이크 또는 클러치 유압액의 주요 화학적 기반을 나타내며, 이는 호환성과 혼합 가능성에 영향을 미칩니다.
    brake_clutch_fluid_dot_specification:
      name: 브레이크/클러치액 DOT 규격
      description: '유압 브레이크 또는 클러치액의 DOT 성능 등급을 나타냅니다(예: DOT 3, DOT 4).'
    brake_drum_finish_coating:
      name: 브레이크 드럼 마감/코팅
      description: '브레이크 드럼에 적용된 표면 마감 또는 보호 코팅을 나타냅니다(예: 전착 코팅, 도장, 아연 코팅).'
    brake_drum_type:
      name: 브레이크 드럼 유형
      description: 브레이크 드럼의 설계 유형을 나타냅니다(허브 또는 베어링 일체형 여부 포함).
    brake_fluid_base:
      name: 브레이크액 기유
      description: 필요하거나 포함된 유압 브레이크액의 조성을 나타냅니다.
    brake_fluid_base_chemistry:
      name: 브레이크액 기본 조성
      description: 호환성과 혼합 규칙을 결정하는 브레이크액의 화학적 기유를 정의합니다.
    brake_fluid_dot_specification:
      name: 브레이크액 DOT 규격
      description: '브레이크액 제품의 DOT 등급/사양을 나타냅니다(예: DOT 3, DOT 4).'
    brake_fluid_standards_compliance:
      name: 브레이크액 표준 규격 준수
      description: 해당 브레이크액이 충족한다고 명시한 업계 규격을 나타냅니다(DOT 등급 제외).
    brake_fluid_type:
      name: 브레이크액 유형
      description: 유압식 자전거 브레이크 캘리퍼에 필요한 브레이크액을 지정합니다.
    brake_hose_end_fitting_type:
      name: 브레이크 호스 끝단 피팅 유형
      description: '브레이크 호스 양 끝단의 연결 방식을 나타냅니다(예: 밴조, 플레어, 암나사, 수나사). 이는 캘리퍼 및 브레이크
        라인과의 호환성을 확인하는 데 사용됩니다.'
    brake_lever_pull_type:
      name: 브레이크 레버 당김식
      description: '특정 브레이크 캘리퍼와의 호환성을 보장하기 위해 레버가 설계된 케이블 당김 비율/메커니즘을 정의합니다(예: 숏풀
        림 브레이크 대 롱풀 V-브레이크).'
    brake_light_switch_actuation_type:
      name: 브레이크등 스위치 작동 방식
      description: '스위치를 작동시키는 물리적 작동 방식을 식별합니다(예: 페달/플런저, 유압 등).'
    brake_light_switch_connector_type:
      name: 브레이크등 스위치 커넥터 유형
      description: 브레이크등 스위치가 차량 하네스에 연결될 때 사용하는 전기 커넥터의 유형을 나타냅니다.
    brake_light_switch_contact_type:
      name: 브레이크등 스위치 접점 유형
      description: '브레이크등 스위치의 전기 접점 구성/동작 방식(예: 상시 개방/폐쇄, 전환식 또는 다중 회로).'
    brake_light_switch_mounting_style:
      name: 브레이크등 스위치 장착 방식
      description: '브레이크등 스위치가 차량 또는 브레이크 시스템에 장착되는 방식을 나타냅니다(예: 나사식, 클립식, 브래킷 장착식,
        밴조 볼트식).'
    brake_master_cylinder_mounting_type:
      name: 브레이크 마스터 실린더 장착 방식
      description: 마스터 실린더가 차량/브레이크 부스터에 장착되는 방식(볼트 패턴/플랜지 스타일).
    brake_master_cylinder_reservoir_type:
      name: 브레이크 마스터 실린더 리저버 유형
      description: 마스터 실린더에 장착되어 제공되거나 마스터 실린더에 필요한 브레이크액 리저버의 유형/구조.
    brake_mount_type:
      name: 브레이크 장착 유형
      description: 포크에 내장된 브레이크 인터페이스를 식별하여 라이더가 브레이크 시스템 호환성을 확인할 수 있도록 합니다.
    brake_mounting_flange_bolt_pattern:
      name: 브레이크 마운팅 플랜지 볼트 패턴
