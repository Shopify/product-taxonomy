    grip_tackiness_level:
      name: 그립 점착성 수준
      description: 그립 표면의 끈적임 정도를 평가하여 플레이어가 건조한 느낌과 매우 끈적이는 컨트롤 중에서 선택할 수 있도록 도와줍니다.
    grip_tape_form:
      name: 그립 테이프 형태
      description: '그립 테이프 제품의 제공 형태를 나타냅니다(예: 시트형, 롤형, 스프레이 키트형).'
    grip_wax_form:
      name: 그립 왁스 형태
      description: 그립 왁스가 판매되는 물리적 형태를 분류합니다.
    gripper_coverage:
