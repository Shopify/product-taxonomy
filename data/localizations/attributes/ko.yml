    toy_parachute_launch_method:
      name: 장난감 낙하산 발사/전개 방법
      description: 장난감을 비행시키기 위해 발사하거나 전개하는 방법을 나타냅니다.
    toy_piano_and_keyboard_accessories_included:
      name: 장난감 피아노 및 키보드 액세서리 구성품
      description: 장난감 피아노 또는 장난감 키보드에 포함된 액세서리를 나타냅니다.
    toy_playset_assembly_required:
      name: 장난감 놀이 세트 조립 필요 여부
      description: 놀이 전에 단순 끼워 맞추는 수준을 넘어 성인의 조립이 필요한지 여부를 나타냅니다.
    toy_playset_items_included:
      name: 장난감 플레이세트 품목 포함
      description: 놀이 세트에 포함된 주요 구성품을 나열합니다.
    toy_safety_certification:
