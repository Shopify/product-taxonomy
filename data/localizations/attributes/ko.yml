    toy_car_features:
      name: 장난감 자동차 특징
      description: 장난감 자동차에 통합된 놀이 기능(추진 장치 제외)을 강조합니다. 예를 들어 조명, 소리, 개폐식 부품 등이 있습니다.
    toy_drawing_tablet_accessories_included:
      name: 어린이 드로잉 패드 액세서리 포함
      description: '태블릿 본체 외에 추가로 포함된 액세서리(예: 추가 스타일러스, 스탬프)를 나타냅니다.'
    toy_drawing_tablet_erase_method:
      name: 장난감 드로잉 태블릿 지우기 방법
      description: 그림 표면을 지우거나 초기화하는 방법을 나타냅니다.
    toy_drawing_tablet_screen_type:
      name: 장난감 드로잉 태블릿 화면 유형
      description: '사용되는 드로잉/디스플레이 표면의 유형을 나타냅니다(예: LCD 필기 태블릿, 자석식 태블릿).'
    toy_drawing_tablet_writing_drawing_instrument:
      name: 장난감 드로잉 태블릿 필기/그리기 도구
