      name: 보온 수준
      description: 이불 또는 이불솜의 전반적인 보온 수준 또는 계절 적합성을 분류합니다.
    warmth_rating:
      name: 보온 등급
      description: 담요의 보온 등급을 나타내며, 침구의 TOG 등급과 유사합니다.
    waste_container_lid_features:
      name: 쓰레기통 뚜껑 특징
      description: 뚜껑에 내장된 특별 기능 또는 향상 요소를 강조합니다.
    waste_container_sign_message:
      name: 쓰레기통 표지 문구
      description: 레이블 또는 표지에 인쇄된 특정 분리수거 종류 또는 경고 문구를 정의합니다.
    water_filtration_technology:
      name: 정수 기술
      description: 물을 정화하는 데 사용되는 핵심 기술 또는 메커니즘을 설명합니다.
    water_heater_element_connection_type:
      name: 온수기 히터 요소 연결 유형
      description: 히터 요소의 장착 방식을 식별하여 나사식과 다양한 플랜지 방식 등을 구분합니다.
    water_sensor_design:
      name: 수위 센서 디자인
      description: 수위 감지 요소의 물리적 스타일을 지정합니다.
    water_supply_type:
      name: 급수 방식
      description: 기기가 물을 공급받는 방식을 식별하여 수동 급수 탱크와 배관 연결 방식을 구분합니다.
    watering_needs:
      name: 물주기 요구 수준
      description: 식물의 일반적인 물 요구량을 설명합니다.
    wax_paper_form:
      name: 왁스지 형태
      description: 왁스지가 연속 롤 형태로 판매되는지 또는 재단된 시트 형태로 판매되는지를 지정합니다.
    weather_guard_mounting_method:
      name: 웨더 가드 장착 방식
      description: 가드가 급식기 또는 지지 구조물에 어떻게 부착되는지를 지정합니다.
    wheel_bearing_type:
      name: 휠 베어링 유형
      description: 휠의 내부 베어링 또는 부싱 구조를 식별하며, 이는 구름 성능 및 유지관리 요구 사항에 영향을 줍니다.
    wheel_tread_style:
      name: 휠 트레드 스타일
      description: 휠의 트레드 디자인을 지정하며, 이는 접지력, 소음 수준 및 바닥 자국 발생 가능성에 영향을 줍니다.
    whistling:
      name: 휘슬 기능 여부
      description: 물이 끓는점에 도달했을 때 주전자가 휘슬 소리를 내는지를 지정합니다.
    wick_material:
      name: 심지 재질
      description: '사용된 심지의 구성 재질(예: 면, 유리섬유 등)을 식별합니다.'
    window_film_installation_surface:
      name: 창문 필름 시공 면
      description: 필름이 실내, 실외 또는 양면 시공용으로 설계되었는지를 지정합니다.
    window_film_type:
      name: 창문 필름 유형
      description: '필름의 기능적 유형(예: 사생활 보호용, 보안용 등)을 분류합니다.'
    window_rod_type:
      name: 커튼 봉 유형
      description: 커튼 봉의 기능적 스타일을 분류합니다.
    window_screen_type:
      name: 방충망 유형
      description: 방충망의 구조적 스타일 또는 작동 방식을 정의합니다.
    window_treatment_lining_type:
      name: 창문 장식 안감 유형
      description: 커튼 상단 장식 또는 박스형 가리개에 안감이 있는지 여부와 사용된 안감 종류를 나타냅니다.
    wine_aerator_type:
      name: 와인 에어레이터 유형
      description: 와인 에어레이터의 형태 또는 작동 방식을 지정합니다.
    wine_glass_style:
      name: 와인 잔 스타일
      description: 향과 풍미를 최적화하기 위해 설계된 대상 와인 유형 또는 잔 디자인을 지정합니다.
    wok_bottom_type:
      name: 웍 바닥 유형
      description: 웍 바닥의 형태를 정의하여 다양한 조리대 및 웍 링과의 호환성을 결정합니다.
    wood_grain_orientation:
      name: 목재 결 방향
      description: '제품에서 목재 결의 방향(예: 엔드 그레인, 엣지 그레인, 페이스 그레인 등)을 지정합니다. 결 방향은 내구성과
        칼날 친화성에 영향을 줍니다.'
    wood_seasoning_method:
      name: 목재 건조 방식
      description: 목재 연료가 어떻게 건조 또는 숙성되었는지를 나타내며, 이는 수분 함량 및 연소 품질에 영향을 줍니다.
    wrap_format:
      name: 랩 형태
      description: 식품 랩이 롤 형태 또는 재단된 시트 형태 등 어떤 물리적 형태로 제공되는지를 지정합니다.
    abacus_bead_material:
      name: 주판알 재질
      description: 주판 알의 주요 재료를 나타냅니다.
    abec_rating:
      name: ABEC 등급
      description: ABEC 등급을 기준으로 한 베어링의 정밀 등급을 의미하며, 작동의 원활함과 허용 오차 수준을 나타냅니다.
    abrasive_level:
      name: 연마 강도
      description: 자동차 도장면에 사용되는 광택제/컴파운드의 상대적인 연마력을 의미합니다.
    absinthe_accessories_included:
      name: 압생트 액세서리 포함
      description: 숟가락, 유리잔, 각설탕 등 제품에 포함된 액세서리의 세부 정보를 제공합니다.
    ac_compressor_mounting_style:
      name: AC 컴프레서 장착 방식
      description: 컴프레서를 엔진/액세서리 구동 시스템에 기계적으로 장착/부착하는 방식이나 브래킷 인터페이스를 설명합니다.
    ac_compressor_oil_type:
      name: AC 컴프레서 오일 종류
      description: AC 컴프레서에 필요하거나 사용되는 윤활유의 화학적 성분을 지정합니다(일반적인 유형으로는 PAG 및 POE가 있음).
    accent_modes:
      name: 악센트 모드
      description: 메트로놈이 마디 내에서 박자를 강조하는 방식을 나타냅니다(기본 클릭음 외 추가 강조 방식 포함).
    access_mechanism:
      name: 접근 메커니즘
      description: 사용자가 로프트형 침상에 오르는 방법을 설명합니다.
    accessibility_features:
      name: 접근성 기능
      description: 미니버스에 탑재된 이동 편의 장비 및 구성을 나타냅니다.
    accessories_included:
      name: 액세서리 포함
      description: '의자와 함께 제공되는 묶음으로 제공되는 추가 품목(예: 오토만, 요추 베개)을 나열하여 소비자에게 부가적인 가치를
        명확히 보여줍니다.'
    accessory_pieces_included:
      name: 액세서리 부품 포함
      description: 멀티피스 의류 액세서리 제품 제공 세트 또는 번들에 포함된 액세서리 품목을 나열합니다.
    acoustic_amplifier_feedback_control_features:
      name: 어쿠스틱 앰프 피드백 제어 기능
      description: '어쿠스틱 악기용 내장 피드백 방지 기능(예: 노치 필터, 위상 스위치, 자동 피드백 억제)을 나타냅니다.'
    acoustic_drum_kit_components_included:
      name: 포함된 어쿠스틱 드럼 키트 구성품
      description: 키트에 포함된 주요 구성품을 나타냅니다(쉘 팩만 포함된 키트와 심벌즈/하드웨어가 포함된 전체 키트 비교).
    acoustic_guitar_body_shape:
      name: 어쿠스틱 기타 바디 형태
      description: 음색, 연주 편의성 및 일반적인 용도에 영향을 미치는 어쿠스틱 기타 바디의 형태와 외형을 설명합니다.
    acoustic_guitar_string_core_design:
      name: 어쿠스틱 기타 줄 코어 디자인
      description: 감긴 현의 핵심 구조를 나타냅니다.
    acoustic_piano_key_material:
      name: 어쿠스틱 피아노 건반 소재
      description: 피아노 건반 표면(상아 부위)에 사용된 주요 소재를 지정합니다.
    acoustic_piano_lid_type:
      name: 어쿠스틱 피아노 덮개 유형
      description: 어쿠스틱 피아노에 사용되는 덮개 메커니즘의 유형을 나타냅니다(그랜드 피아노와 업라이트 피아노의 건반 덮개 및 상판
        구분 포함).
    acoustic_piano_plate_frame_material:
      name: 어쿠스틱 피아노 상판/프레임 재질
      description: 피아노 플레이트/프레임(하프)에 사용된 주요 소재를 나타내며, 일반적으로 주철이 사용됩니다.
    acoustic_piano_soundboard_material:
      name: 어쿠스틱 피아노 향판 재질
      description: 피아노 공명판에 사용된 주요 소재를 나타냅니다.
    action_figure_scale:
      name: 액션 피규어 스케일
      description: '해당 액세서리가 장착되도록 설계된 수집가용 스케일 비율(예: 1:12)을 나타냅니다.'
    action_type:
      name: 작동 유형
      description: '총기의 발사 또는 장전 메커니즘을 설명합니다(예: 볼트 액션, 브레이크 배럴, 레버 액션).'
    actuation_mechanism:
      name: 작동 메커니즘
      description: 레버가 브레이크 시스템을 작동시키는 방식을 나타냅니다(순수 기계식 케이블, 완전 유압식, 케이블 작동형 유압식,
        전자식/무선식 등).
    actuation_method:
      name: 작동 방식
      description: 억제 시스템이 활성화되거나 분사되는 방식을 나타냅니다.
    adapter_orientation:
      name: 어댑터 방향
      description: '자전거 타이어 밸브 어댑터의 각도 또는 형태를 나타내며, 펌프 연결 편의성에 영향을 미칩니다(예: 직선형, 90°형).'
    additive_application_stage:
      name: 첨가제 적용 단계
      description: 제품이 공정의 어느 단계에서 사용되도록 설계되었는지를 나타냅니다.
    adhesive_backing:
      name: 접착식 뒷면
      description: 인쇄 가능한 실크에 떼어 붙일 수 있는 접착식 뒷면이 있는지 여부를 나타냅니다.
    adhesive_formulation:
      name: 접착제 조성
      description: '접착제의 화학적 기반 또는 조성을 나타냅니다(예: 시아노아크릴레이트, 에폭시).'
    adhesive_sides:
      name: 접착면
      description: 열접착제가 테이프 또는 웹의 한쪽 면에 있는지, 양면에 있는지를 나타냅니다.
    adjunct_grain_processing_form:
      name: 부원료 곡물 가공 형태
      description: '양조용 부재료 곡물의 판매 형태 또는 가공 상태를 나타냅니다(예: 압편, 팽화, 맥아, 생곡물).'
    adjustability_type:
      name: 조절 방식
      description: 스트럿이 지원하는 조절 기능(있는 경우)의 종류를 지정합니다.
    adjustable_cup_mutes:
      name: 조절식 컵 약음기
      description: 컵의 조절 가능 여부 또는 탈착 가능 여부와 조절 방식을 나타냅니다.
    adjustable_zones:
      name: 조절 가능한 영역
      description: 받침대의 어느 부분을 독립적으로 조절할 수 있는지 식별합니다.
    adjustment_type:
      name: 조정 유형
      description: 레귤레이터의 조절 가능 여부 및 조절 방식을 나타냅니다.
    administration_method:
      name: 투여 방법
      description: '말에게 구충제를 투여하는 방법(예: 경구 투여, 주사)을 나타내며, 소비자가 수의사의 지침을 따르고 적절한 투여
        방식을 선택하는 데 도움을 줍니다.'
    advice_card_prompt_type:
      name: 조언 카드 프롬프트 유형
      description: 카드에 인쇄된 프롬프트의 유형 또는 유무를 나타냅니다.
    aeration_method:
      name: 통기 방식
      description: 용기가 제공하거나 지원하는 통기 방식을 설명하며, 살아있는 미끼에 충분한 산소를 공급할 수 있도록 합니다.
    aero_package_components:
      name: 에어로 패키지 구성품
      description: 차량에 장착된 주요 에어로파츠 부품을 나타냅니다(해당 항목 모두 선택).
    aerodynamic_elements_included:
      name: 에어로파츠 요소 포함
      description: 포뮬러 카에 포함된 공기역학 구성 요소를 나타냅니다(지원되는 경우 해당하는 항목 모두 선택).
    aftertouch_support:
      name: 애프터터치 지원
      description: 컨트롤러가 키 또는 패드에서 애프터터치(채널 또는 폴리포닉)를 지원하는지 여부를 나타냅니다.
    agave_content_classification:
      name: 아가베 함량 분류
      description: 데킬라가 100% 블루 웨버 아가베로 제조되었는지, 또는 최소 51%의 아가베 당분을 함유한 혼합형 데킬라인지를
        나타냅니다.
    aida_cloth_count:
      name: 아이다 원단 카운트
      description: 스티치 크기와 디자인 스케일을 결정하는 아이다 원단의 카운트(인치당 칸/스티치 수)를 지정합니다.
    aida_cloth_pre_cut_format:
      name: 아이다 원단 재단 형태
      description: 아이다 원단이 미리 재단된 형태로 판매되는지, 원단 롤에서 연속으로 재단된 형태로 판매되는지, 또는 롤 형태로 판매되는지를
        나타냅니다.
    air_bag_material:
      name: 에어백 소재
      description: 아이리시 워파이프에 사용되는 공기주머니 또는 저장소의 재질을 나타냅니다.
    air_bed_internal_construction:
      name: 에어베드 내부 구조
      description: 편안함과 안정성을 제공하기 위해 에어베드 내부에 사용된 지지 구조 또는 기술을 설명합니다.
    air_dry_clay_color_form:
      name: 자연 건조 점토 색상 형태
      description: 점토가 착색된 상태로 판매되는지, 채색용 흰색 또는 중성색으로 판매되는지, 또는 혼합 구성으로 판매되는지를 나타냅니다.
    air_hockey_items_included:
      name: 포함된 에어하키 구성품
      description: '고객이 구성품을 정확히 알 수 있도록 세트에 포함된 액세서리 목록을 제공합니다(예: 푸셔 2개, 퍽 4개, 펠트
        패드 2개).'
    air_intake_temperature_sensor_mounting_style:
      name: 흡기 온도 센서 장착 방식
      description: 흡기 시스템 내 IAT 센서의 물리적 장착 방식을 나타냅니다.
    air_integration_capability:
      name: 에어 통합 기능
      description: 다이브 컴퓨터가 무선 탱크 압력 트랜스미터를 지원하는지 여부와 지원 방식을 나타냅니다.
    air_mattress_valve_type:
      name: 에어매트리스 밸브 유형
      description: 액세서리가 호환되거나 포함하는 밸브 스타일을 지정하여 펌프, 밸브 및 수리 부품 간의 호환성을 보장합니다.
    air_water_rocket_kit_items_included:
      name: 포함된 에어 로켓 및 물 로켓 키트 구성품
      description: 로켓 세트에 포함된 주요 구성품을 나타냅니다(발사대, 펌프, 날개, 보충 부품 등).
    air_water_rocket_launch_method:
      name: 에어 로켓 및 물 로켓 발사 방식
      description: 로켓의 가압 및 발사 방식을 설명합니다(사용자 조작 방식 및 장비 유형 포함).
    airbag_position:
      name: 에어백 위치
      description: 에어백 부품이 지원하는 탑승자 보호 위치 또는 영역을 나타냅니다.
    aircraft_ads_b_capability:
      name: 항공기 ADS-B 기능
      description: 항공기가 ADS-B Out 규정을 준수할 수 있도록 장비가 갖춰져 있는지 여부를 나타냅니다.
    aircraft_airframe_material:
      name: 항공기 기체 재료
      description: 항공기 기체 제작에 사용되는 주요 재료를 나타냅니다.
    aircraft_cabin_configuration:
      name: 항공기 객실 구성
      description: '항공기의 객실 레이아웃을 지정합니다(예: 회의용 좌석 구조, 디반 소파 구조, 4구역 객실).'
    aircraft_documentation_included:
      name: 포함된 항공기 관련 서류
      description: '해당 부품과 함께 제공되는 문서 목록을 나타냅니다(예: 8130-3).'
    aircraft_galley_configuration:
      name: 항공기 주방 구성
      description: 객실 내 갤리 또는 기내식 설비의 유무와 유형을 나타냅니다.
    aircraft_installation_location:
      name: 항공기 내 설치 위치
      description: 해당 부품 또는 액세서리가 항공기의 어느 위치에 설치되거나 사용되는지를 나타냅니다.
    aircraft_internet_connection:
      name: 항공기 인터넷 연결
      description: 기내 인터넷 연결 가능 여부 및 유형을 나타냅니다.
    aircraft_landing_gear_type:
      name: 항공기 착륙 장치 유형
      description: 오토자이로의 착륙 장치 구성을 지정합니다.
    aircraft_lavatory_configuration:
      name: 항공기 화장실 구성
      description: 기내 화장실 구성 유형을 나타냅니다.
    aircraft_maintenance_program_enrollment:
      name: 항공기 정비 프로그램 등록
      description: 항공기가 엔진 및/또는 기체 유지보수 프로그램에 등록되어 있는지 여부와 적용되는 보장 범위(엔진, 기체 또는 둘
        다)를 나타냅니다.
    aircraft_operational_certification:
      name: 항공기 운항 인증
      description: '항공기가 어떤 규제 또는 운영 인증 기준에 따라 운항되는지를 나타냅니다(관할권에 따라 다름, 예: FAA Part
        91/135/121, EASA AOC).'
    aircraft_protective_gear_certification:
      name: 항공기 보호 장비 인증
      description: 보호 장구가 충족하도록 인증받은 항공/규제 또는 산업 표준을 지정합니다.
    aircraft_system_application:
      name: 항공기 시스템 적용 분야
      description: 해당 부품 또는 액세서리가 속한 항공기 시스템 또는 영역을 식별합니다(다양한 항공기 부품의 검색 및 필터링에 사용).
    airflow_resistance_level:
      name: 공기 흐름 저항 수준
      description: 배압/공기 저항 측면에서 뮤트가 얼마나 답답하게 느껴지는지를 나타냅니다.
    airship_envelope_material:
      name: 비행선 외피 재질
      description: 비행선 외피의 주요 재료를 나타냅니다.
    airsoft_part_type:
      name: 에어소프트 부품 유형
      description: '에어소프트건의 기능 부품 또는 액세서리 유형을 식별합니다(예: 탄창, 총열, 핸드가드).'
    airworthiness_approval_basis:
      name: 감항성 승인 기준
      description: '해당 부품에 적용 가능한 승인 및 인증 기준을 지정합니다(예: PMA, TSO, STC).'
    alarm_volume_adjustability:
      name: 알람 음량 조절 기능
      description: 사용자가 알람 음량을 조절할 수 있는지 여부와 조절 방식을 나타냅니다.
    alcohol_ink_finish_effect:
      name: 알코올 잉크 마감 효과
      description: 알코올 잉크 조성으로 구현되는 시각적 효과 또는 마감을 설명합니다(단순한 색상 외에도 금속성, 진주 광택 등 포함).
    alignment_aid_style:
      name: 정렬 보조 스타일
      description: '매트 표면에 인쇄되거나 표시된 정렬 가이드의 유형을 설명합니다(예: 직선, 거리 표시).'
    alternator_cooling_type:
      name: 교류 발전기 냉각 방식
      description: 교류 발전기의 냉각 및 환기 방식을 설명합니다.
    alternator_marine_ignition_protection_rating:
      name: 교류 발전기 선박용 점화 보호 등급
      description: '교류 발전기가 선박 엔진실용 점화 방지 규격을 충족하는지 여부를 나타냅니다(예: SAE J1171 / ISO 8846
        준수).'
    alternator_mounting_configuration:
      name: 교류 발전기 장착 구성
      description: 교류 발전기를 엔진 브래킷에 부착하는 데 사용되는 장착 구성을 나타냅니다.
    alternator_pulley_type:
      name: 교류 발전기 풀리 유형
      description: 교류 발전기의 풀리/클러치 디자인을 지정합니다(또는 풀리가 포함되지 않음을 나타냄).
    alternator_regulator_type:
      name: 교류 발전기 조절기 유형
      description: 전압 조정기가 발전기 내부형인지 외부형인지, 그리고 OEM 제어 방식(컴퓨터/PCM 제어)인지 여부를 나타냅니다.
    alternator_terminal_connection_type:
      name: 교류 발전기 단자 연결 방식
      description: 와이어링 하네스 호환성을 보장하는 데 도움이 되도록 교류 발전기 출력/여자 단자의 주요 전기 연결 방식을 나타냅니다.
    altitude_suitability:
      name: 고도 적합성
      description: 공이 특정 고도 환경에 맞게 설계되었는지 여부를 나타내며, 이는 속도와 반발력에 영향을 미칩니다.
    ambulance_stretcher_mount_type:
      name: 구급차 들것 장착 방식
      description: 구급차가 지원하는 들것의 적재/장착 시스템 유형을 나타냅니다.
    american_football_safety_certification:
      name: 미식축구 안전 인증
      description: 제품이 충족하는 미식축구 관련 안전 인증 또는 규격을 나타냅니다.
    amplifier_tube_function:
      name: 앰프 튜브 기능
      description: '앰프 회로에서 진공관이 수행하는 기능적 역할을 나타냅니다(예: 프리앰프, 파워앰프).'
    analog_synthesizer_cv_gate_i_o:
      name: 아날로그 신디사이저 CV/게이트 입출력
      description: 모듈러/아날로그 장비와의 통합을 위해 지원되는 제어 전압 및 게이트 연결 유형을 나타냅니다.
    analog_synthesizer_keybed_configuration:
      name: 아날로그 신디사이저 건반 구성
      description: 신디사이저에 내장 건반이 포함되어 있는지 여부와, 포함된 경우 건반의 개수를 설명합니다.
    anchor_configuration:
      name: 앵커 구성
      description: 서스펜션 시스템이 단일 중앙 고정점을 사용하는지 또는 여러 개의 독립적인 고정점을 사용하는지를 나타내며, 이는 운동의
        다양성과 설치 복잡성에 영향을 미칩니다.
    animal_raising_method:
      name: 동물 사육 방법
      description: 원료가 된 동물의 사육 방식을 설명합니다.
    animal_species:
      name: 동물 종
      description: '봉제인형이 표현하는 동물 또는 생물의 종류를 나타냅니다(예: 곰, 토끼, 공룡).'
    animal_trap_jaw_style:
      name: 동물 덫 턱 유형
      description: 덫의 집게 구성 방식이며, 이는 포획력과 동물 복지에 영향을 미칩니다.
    animal_trap_type:
      name: 동물 덫 유형
      description: 덫의 기계적 스타일/디자인을 분류하여 소비자가 필요한 포획 방식이나 법적 규제에 맞는 제품을 빠르게 찾을 수 있도록
        합니다.
    ankle_collar_style:
      name: 발목 카라 유형
      description: 신발 발목 카라의 형태 또는 구조를 설명합니다. 예를 들어 로우컷, 미드컷, 하이컷, 삭스 카라, 레이스리스 등이
        있으며, 이는 지지력, 착화감 및 외관에 영향을 미칩니다.
    ankle_guard_protection_level:
      name: 발목 보호대 보호 수준
      description: 발목 보호대가 제공하는 전반적인 충격 보호 수준을 나타냅니다.
    ankle_strap_padding_type:
      name: 발목 스트랩 패딩 유형
      description: 스트랩 내부에 사용되어 착용감에 영향을 주는 쿠션 소재나 패딩 처리 방식을 설명합니다.
    ankle_strap_type:
      name: 앵클 스트랩 유형
      description: 스노보드 바인딩 발목 스트랩의 구조 또는 디자인을 분류합니다.
    ant_farm_habitat_medium_type:
      name: 개미 농장 서식 매체 유형
      description: 개미 농장에서 제공되거나 사용되는 주요 굴 형성/관찰 매체를 나타냅니다.
    ant_farm_kit_contents:
      name: 개미 농장 키트 구성품
      description: '개미 사육 키트에 포함된 구성품(예: 사육통, 모래/젤, 개미 표본, 먹이 도구)을 식별합니다.'
    ant_farm_lighting_type:
      name: 개미 농장 조명 유형
      description: 관찰에 사용되는 내장 조명 유형(있는 경우)을 나타냅니다.
    antenna_fit_type:
      name: 안테나 장착 유형
      description: 안테나 볼이 장착되도록 설계된 안테나의 외형 규격을 나타냅니다.
    anti_caking_agent:
      name: 고결방지제
      description: 응고를 방지하기 위해 첨가된 고결방지제의 종류를 나타냅니다. 이는 알레르기 정보 확인 및 레시피의 정확성에 중요한
        정보입니다.
    anti_g_suit_bladder_material:
      name: 항중력복 블래더 소재
      description: 항중력복 내부의 팽창식 블래더에 사용된 소재입니다. 여러 소재가 사용된 경우 해당 항목이 모두 나열됩니다.
    anti_g_suit_connector_type:
      name: 항중력복 커넥터 유형
      description: 항공기 또는 조절기와 연결하는 데 사용되는 공기/압력 호스 커넥터의 스타일/표준을 지정합니다.
    anti_g_suit_inflation_method:
      name: 항중력복 팽창 방식
      description: 항중력복 블래더에 압력을 가해 신체 보호 기능을 제공하는 방식을 나타냅니다.
    anti_g_suit_size_system:
      name: 항중력복 사이즈 시스템
      description: 정장의 사이즈 및 핏 체계를 나타내는 데 사용되는 사이즈 기준입니다.
    anti_reverse_type:
      name: 역회전 방지 방식
      description: 적용된 역회전 방지 메커니즘의 유형을 나타내며, 이는 훅 세팅 성능과 백플레이에 영향을 미칩니다.
    anti_theft_feature:
      name: 도난 방지 기능
      description: 거치대/홀더에 잠금 장치 또는 변조 방지 설계와 같은 도난 방지 기능이 있는지 여부를 나타냅니다.
    antique_gun_ignition_system:
      name: 골동품 총기 점화 시스템
      description: 해당 골동품 총기에 사용된 역사적인 발사/점화 시스템을 명시합니다.
    apple_variety:
      name: 사과 품종
      description: '사과의 품종 또는 변종(예: 갈라, 후지, 그래니 스미스)을 명시하여 고객이 Taste, 식감 및 요리 용도에
        따라 선택할 수 있도록 도와줍니다.'
    applique_edge_finish:
      name: 아플리케 가장자리 마감
      description: 가장자리 마감 방식을 설명하며, 이는 외관과 올 풀림 방지 성능에 영향을 미칩니다.
    arbor_type:
      name: 아버 유형
      description: 줄 회수 속도, 밑줄 권사량, 낚싯줄 꼬임에 영향을 주는 스풀 아버 디자인에 따라 릴을 분류합니다.
    archery_accessory_type:
      name: 양궁 액세서리 유형
      description: 양궁 장비용 액세서리의 유형을 나타내며, 소비자가 제품을 빠르게 필터링할 수 있도록 합니다.
    archery_part_type:
      name: 양궁 부품 유형
      description: '판매되는 특정 하드웨어 또는 교체 부품(예: 라이저, 림, 활시위)을 식별하여 카테고리를 과도하게 세분화하지 않고도
        정확하게 필터링할 수 있도록 합니다.'
    archery_range_accessory_type:
      name: 양궁장 부대용품 유형
      description: 양궁장에서 사용되는 특정 액세서리 유형을 분류하여 소비자가 필요한 품목을 빠르게 찾을 수 있도록 합니다.
    archery_target_features:
      name: 양궁 표적 기능
      description: '다른 특성에 포함되지 않은 특수 성능이나 편의 기능을 나열합니다(예: 자가 복원 폼, 운반용 손잡이).'
    archery_tool_type:
      name: 양궁 도구 유형
      description: 양궁 도구 또는 장비의 구체적인 종류를 분류합니다.
    armband_features:
      name: 암밴드 기능
      description: 암밴드의 성능을 향상시키는 기능적 또는 시각적 기능을 나열합니다.
    armguard_style:
      name: 팔 보호대 스타일
      description: 팔 보호대의 구조 스타일이나 외형 규격을 정의하여, 보호 범위 및 전통적/현대적 외관에 대한 정보를 제공합니다.
    armor_protection_type:
      name: 장갑 보호 유형
      description: 차량 장갑 시스템이 제공하는 보호 유형입니다.
    armrest_adjustability:
      name: 팔걸이 조절 기능
      description: '의자 팔걸이의 조절 범위와 구성을 정의합니다(예: 고정형, 2D, 3D, 접이식).'
    armrest_type:
      name: 팔걸이 유형
      description: '의자에 팔걸이가 있는지 여부와 조절 가능 여부를 설명합니다(예: 팔걸이 없음, 고정형, 조절형, 탈착형).'
    arrow_bolt_point_type:
      name: 화살촉/볼트촉 유형
      description: 화살이나 볼트에 장착되는 뾰족한 끝부분의 형태를 정의합니다.
    arrow_component_type:
      name: 화살 부품 유형
      description: 화살용 부품 또는 액세서리(인서트, 랩, 부싱, 접착제 등)를 분류하여 수십 개의 추가 하위 카테고리 없이도 품목을
        필터링할 수 있도록 합니다.
    arrow_containment_level:
      name: 화살 고정 수준
      description: 애로우 레스트가 화살을 완전히 지지하는지, 부분적으로 지지하는지 또는 지지하지 않는지를 설명합니다.
    arrow_fletching_orientation:
      name: 화살깃 방향
      description: '화살의 회전 방향을 결정하는 화살깃의 방향 또는 오프셋 방향을 나타냅니다(예: 좌측형, 우측형, 나선형).'
    arrow_nock_groove_size:
      name: 화살 노크 홈 크기
      description: 다양한 활시위 지름과의 호환성을 결정하는 노크의 현 홈/목 부분의 사이즈 분류를 지정합니다.
    arrow_nock_type:
      name: 화살 노크 유형
      description: 활시위와 맞닿는 노크의 디자인 또는 형태를 나타냅니다.
    arrow_rest_style:
      name: 애로우 레스트 유형
      description: '애로우 레스트의 기능적 유형 또는 메커니즘을 나타냅니다(예: 드롭어웨이, 블레이드, 위스커 비스킷). 이 유형은
        애로우 레스트가 화살을 지지하고 유지하며 발사 시 놓아주는 방식을 결정하며, 이는 소비자가 제품을 구분하는 주요 기준이 됩니다.'
    arrow_shaft_compatibility:
      name: 화살 샤프트 호환성
      description: '조명식 노크와 호환되는 화살대/부싱 규격을 나타냅니다(예: X, H, S, GT).'
    art_crafting_tool_tip_style:
      name: 미술/공예 도구 촉 스타일
      description: '작업 팁의 형태를 설명하며(예: 뾰족형, 둥근 볼형), 생성되는 엠보싱 자국의 유형을 나타냅니다.'
    art_ink_lightfastness_rating:
      name: 미술용 잉크 내광성 등급
      description: 빛에 노출되었을 때 잉크의 변색 저항성을 나타내며, 일반적으로 표준 등급으로 표시됩니다.
    art_ink_opacity:
      name: 미술용 잉크 불투명도
      description: 잉크를 도포했을 때의 피복력을 나타냅니다.
    art_security_rating:
      name: ART 보안 등급
      description: 잠금장치가 획득한 네덜란드 ART 별점 등급(1~5성)을 지정합니다.
    artichoke_cut:
      name: 아티초크 손질 형태
      description: '아티초크의 어느 부위 또는 어떤 손질 형태로 제공되는지를 나타냅니다(예: 통아티초크, 아티초크 하트, 바닥 부분).
        이를 통해 고객은 수율과 용도를 파악할 수 있습니다.'
    artichoke_variety:
      name: 아티초크 종류
      description: 소비자가 크기, 색상, 맛, 요리 용도를 구분할 수 있도록 아티초크의 재배 품종이나 식물학적 품종을 지정합니다.
    articulation_features:
      name: 가동 기능
      description: 공룡 모형에 움직일 수 있는 부분(턱, 다리, 꼬리 등)이 있는지 여부와 전반적인 포즈 연출 가능성을 나타냅니다.
    artificial_bait_form:
      name: 인공 미끼 형태
      description: 낚시용 미끼 또는 루어의 물리적 형태 또는 제공 스타일을 나타냅니다.
    asa_mounting_type:
      name: ASA 장착 유형
      description: '드롭 포워드에 사용되는 에어 소스 어댑터(ASA) 인터페이스 또는 장착 규격 유형을 나타냅니다(예: 도브테일,
        레일, 직접 장착).'
    ascender_descender_type:
      name: 어센더/디센더 유형
      description: 등반용 등강기 또는 하강기의 종류를 분류하여 더욱 정확한 필터링을 제공합니다.
    aspiration_type:
      name: 흡기 방식
      description: 엔진의 흡기 방식 또는 과급 방식을 나타냅니다.
    assembly_state:
      name: 조립 상태
      description: 캐비닛이 조립식, 완제품 조립형, 기타 형태 중 어느 형태로 배송되는지를 나타냅니다.
    assistance_mechanism:
      name: 보조 메커니즘
      description: 파워 타워에 내장된 보조 또는 저항 시스템의 유형을 나타냅니다(풀업, 딥스 및 기타 운동용).
    atemoya_cultivar:
      name: 아테모야 품종
      description: 아테모야의 품종을 나타내며, 소비자가 선호하는 맛, 크기 또는 씨 특성을 가진 과일을 선택할 수 있도록 합니다.
    athletic_cup_size:
      name: 운동용 보호컵 사이즈
      description: 운동선수에게 적절한 착용감을 제공하기 위해 제조사가 지정한 보호컵의 사이즈를 나타냅니다.
    attachment_position:
      name: 부착 위치
      description: 가방이 안장이나 라이더의 어느 부위에 장착되도록 설계되었는지 지정합니다.
    attractant_scent_profile:
      name: 유인제 향 프로필
      description: 야생동물을 유인하거나 사람의 체취를 감추기 위해 사용되는 특정 향 또는 냄새를 설명합니다.
    atv_utv_intended_use:
      name: ATV/UTV 용도
      description: ATV/UTV의 주된 용도 또는 스타일을 나타냅니다.
    audio_channel_configuration:
      name: 오디오 채널 구성
      description: '이퀄라이저/DSP가 지원하는 개별 오디오 채널 수를 나타냅니다(예: 2채널 스테레오, 4채널 전/후방, 6채널).'
    audio_inputs:
      name: 오디오 입력
      description: '샘플링 또는 녹음에 사용할 수 있는 오디오 입력 연결 유형을 나타냅니다(예: 1/4인치 라인 입력, XLR, 3.5mm,
        마이크 프리앰프, 포노).'
    audio_output:
      name: 오디오 출력
      description: 장난감에서 소리가 나는지 여부와 소리가 제공되는 방식을 나타냅니다.
    audio_outputs:
      name: 오디오 출력
      description: 메인 출력 및 할당 가능 출력/보조 출력을 포함한 오디오 출력 연결 유형을 나타냅니다.
    audio_playback_source:
      name: 오디오 재생 소스
      description: 노래방 기기가 음악을 재생할 수 있는 주요 미디어 소스를 나타냅니다.
    autograph_authentication:
      name: 친필 인증
      description: 카드에 있는 서명의 인증 상태 또는 인증 유형을 나타냅니다.
    autograph_format:
      name: 자필 서명 형식
      description: 서명이 원래의 친필 서명인지, 스탬프/인쇄된 복제본인지, 아니면 헌사/추가 문구가 포함된 것인지를 설명합니다.
    autogyro_cockpit_enclosure:
      name: 오토자이로 조종석 덮개
      description: 조종석이 개방형인지 밀폐형인지를 나타냅니다.
    available_firing_modes:
      name: 사용 가능한 발사 모드
      description: 이 목록은 마커가 별도 개조 없이 지원하는 선택 가능한 발사 모드를 나열합니다.
    avocado_variety:
      name: 아보카도 품종
      description: 아보카도의 품종을 나타내며, 소비자가 맛, 식감, 크기 및 유지 함량의 차이를 구별할 수 있도록 합니다.
    award_customization_included:
      name: 포함된 상장/상패 맞춤 설정
      description: 상장 또는 상패 구매 시 포함되는 개인화 또는 맞춤 설정 항목을 나타냅니다.
    award_material:
      name: 상장/상패 재질
      description: 상장 또는 상패 품목(트로피, 명판, 메달, 핀, 리본 부자재)의 주요 재질을 식별합니다.
    award_mounting_display_type:
      name: 상장/상패 전시 방식
      description: 상장 또는 상패를 전시하거나 착용하는 방식을 나타냅니다(벽걸이형, 탁상형, 착용형).
    award_plaque_plate_material:
      name: 상패 명판 재질
      description: 상패에 부착된 명판 또는 각인판의 재질을 나타냅니다(받침 재질과 구별됨).
    award_ribbon_attachment_type:
      name: 상장 리본 부착 유형
      description: 리본을 부착하거나 착용하는 방식을 나타냅니다.
    award_ribbon_imprint_method:
      name: 수상리본 각인 방식
      description: 리본에 텍스트 또는 그래픽을 적용하는 방식을 나타냅니다.
    award_ribbon_material:
      name: 상장/상패 리본 재질
      description: '리본 원단의 주요 소재(예: 새틴, 폴리에스테르)를 나타냅니다.'
    award_ribbon_placement_title:
      name: 상장 리본 배치 위치/타이틀
      description: '리본에 표시되는 순위 또는 명칭을 나타냅니다(예: 1등, 참가상).'
    axle_compatibility:
      name: 차축 호환성
      description: 휠이 장착 가능한 액슬 규격을 나타내어 자전거 Frame 및 포크와의 호환성을 보장합니다.
    back_beam_type:
      name: 백빔 유형
      description: '백 빔의 종류/조절 가능 여부(예: 일반형 또는 높이 조절형).'
    back_design:
      name: 후면 디자인
      description: 의류의 스타일과 지지력에 영향을 미치는 주요 후면 구조를 나타냅니다.
    back_panel_type:
      name: 후면 패널 유형
      description: 진열장의 후면 패널 유형 또는 재질을 나타내며, 이는 진열 가시성과 인테리어 조화에 영향을 미칩니다.
    back_sides_material:
      name: 후판 및 측판 재질
      description: 클래식 기타 바디의 후판 및 측판에 사용된 재질을 나타냅니다.
    backing_type:
      name: 뒷면 유형
      description: 판매되는 큐빅 장식의 후면 가공 및 부착 방식을 설명합니다(점착식 제품의 경우).
    backup_camera_mounting_location:
      name: 후방 카메라 장착 위치
      description: 후방 카메라가 차량의 어느 위치에 설치되도록 설계되었는지를 나타냅니다.
    backup_camera_video_interface:
      name: 후방 카메라 비디오 인터페이스
      description: '후방 카메라를 모니터, DVR 또는 헤드 유닛에 연결할 때 사용하는 비디오 출력, 인터페이스 또는 커넥터 유형을
        나타냅니다(예: 컴포지트 RCA, OEM LVDS, Ethernet 기반 IP).'
    badminton_set_components_included:
      name: 배드민턴 세트 포함 구성품
      description: 배드민턴 세트에 포함된 구성품을 나열합니다.
    bag_attachment_method:
      name: 가방 부착 방식
      description: '수분 보충용 가방 또는 홀더를 다른 장비에 부착하는 주요 방식을 나타냅니다(예: MOLLE 웨빙, 벨트 루프,
        카라비너).'
    bag_case_carrying_style:
      name: 가방/케이스 휴대 방식
      description: 케이스 또는 긱백의 기본 휴대 형태를 나타냅니다.
    bag_cover_material:
      name: 가방 커버 소재
      description: 내구성, 그립감, 외관에 영향을 미치는 가방 커버(겉감)의 재질을 지정합니다.
    bag_embellishment:
      name: 가방 장식
      description: 태슬, 스터드, 퀼팅 등 가방 외부에 적용된 주요 장식 요소를 설명합니다.
    bag_fill_medium:
      name: 백 충전 물질
      description: '백을 채우거나 가압하는 데 사용되는 물질을 식별합니다(예: 공기, 물, 모래).'
    bag_material:
      name: 백 재질
      description: 에어백 또는 블래더의 재질입니다.
    bag_padding_level:
      name: 가방 패딩 수준
      description: 가방이나 커버에 적용된 패딩의 두께 등급 또는 스타일을 지정합니다.
    bag_size_descriptor:
      name: 백 크기 구분
      description: '정확한 치수를 보완하는 버킷백의 마케팅용 사이즈 분류(예: 미니, 라지).'
    bagel_size:
      name: 베이글 크기
      description: '베이글의 일반적인 크기를 나타냅니다(예: 미니, 씬, 스탠다드, 라지, 엑스트라 라지, 점보).'
    bagpipe_accessories_included:
      name: 백파이프 액세서리 포함
      description: '백파이프에 포함된 주요 구성품 또는 액세서리를 나열합니다(본체 외 구성품, 예: 케이스, 연습용 챈터, 커버,
        코드, 습도 조절 장치).'
    bagpipes_playing_mode:
      name: 백파이프 연주 모드
      description: 연주 중 악기에 공기를 공급하는 방식을 나타냅니다.
    bait_compatibility:
      name: 미끼 호환성
      description: 펠릿 액세서리와 호환되도록 설계된 미끼 종류를 나열하여, 낚시꾼이 선호하는 미끼와 선택한 도구가 잘 맞는지 확인할
        수 있도록 도와줍니다.
    bait_species:
      name: 미끼 종
      description: 미끼로 사용되는 주요 생물을 식별하여 낚시꾼이 법규를 준수하고 목표 어종을 효과적으로 낚을 수 있도록 도와줍니다.
    baking_chip_form:
      name: 베이킹 칩 형태
      description: 녹는 성질과 레시피의 외관에 영향을 미치는 베이킹용 칩의 실제 크기나 형태를 설명합니다.
    balance_board_style:
      name: 밸런스 보드 유형
      description: 밸런스 보드를 작동 방식 또는 구조 유형에 따라 분류하여 보드의 움직임과 훈련 난이도를 나타냅니다.
    balance_cushion_accessories_included:
      name: 포함된 밸런스 쿠션 액세서리
