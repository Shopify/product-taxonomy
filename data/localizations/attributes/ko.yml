      description: 그로밋의 용도/사용 등급을 나타냅니다.
    grommet_style:
      name: 그로밋 유형
      description: 그로밋 세트의 구조 유형을 나타냅니다(조립 또는 사용 방식).
    grooming_glove_texture_type:
      name: 애완동물 미용 장갑 질감 유형
      description: 그루밍에 사용되는 주요 표면 질감을 식별하며, 문지르기, 광택 내기 또는 세척과 같은 용도를 나타냅니다.
    groove_orientation:
      name: 홈 방향
      description: 악기 표면의 홈이나 능선의 방향/레이아웃을 설명합니다.
    groove_sampler_onboard_effects:
      name: 그루브 샘플러 내장 이펙트
      description: '그루브 샘플러(인서트/마스터)에서 사용할 수 있는 내장 이펙트 처리 범주를 나타냅니다(예: 리버브, 딜레이, 컴프레서,
        디스토션, EQ, 필터링).'
    groove_sampler_storage_expansion_type:
