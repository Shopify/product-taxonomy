      description: 기타 상판/사운드보드(주요 음색 생성 부분)의 재질을 지정합니다.
    topping_form:
      name: 토핑 형태
      description: 디저트 토핑의 물리적 형태 또는 질감을 정의하여 소비자가 원하는 토핑을 빠르게 선택할 수 있도록 돕습니다.
    topping_type:
      name: 토핑 종류
      description: 도넛에 적용되는 주요 외부 토핑 또는 코팅을 나타냅니다.
    tow_hook_type:
      name: 견인 고리 유형
      description: 니보드에 통합형 견인 고리가 포함되어 있는지 여부와 작동 방식을 명시합니다.
    tow_point_configuration:
      name: 토우 포인트 구성
      description: 견인식 튜브가 다양한 탑승 위치에 맞게 제공하는 견인 지점 구성(단일, 이중, 다중)을 지정합니다.
    tow_strap_protective_features:
      name: 견인 스트랩 보호 기능
      description: 견인 스트랩에는 주목할 만한 안전 및 내구성 설계 특징이 내장되어 있습니다.
    tow_strap_type:
      name: 견인 스트랩 유형
      description: '견인 스트랩의 기능적 구조(예: 고정식 견인 스트랩, 키네틱 리커버리 스트랩)를 나타냅니다.'
