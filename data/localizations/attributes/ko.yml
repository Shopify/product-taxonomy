    training_surface_usage:
      name: 훈련 표면 사용
      description: 훈련 표면이 지원하는 주요 활동을 명시하고, 스케이팅 가능한 합성 아이스 패널과 드라이랜드 또는 다목적 스포츠 매트를
        구분합니다.
    training_usage_type:
      name: 훈련 사용 유형
      description: '훈련용 바지의 주요 사용 시간대 또는 맥락(예: 주간 훈련 또는 야간 훈련)을 지정합니다.'
    trampoline_enclosure_type:
      name: 트램폴린 안전망 유형
      description: 트램폴린에 사용되는 안전망 구성(안전망 설치 방법 및 위치 포함)을 지정합니다.
    trampoline_safety_certifications:
      name: 트램펄린 안전 인증
      description: 해당 제품이 준수한다고 주장하는 트램폴린 관련 안전 표준/인증을 나타냅니다.
    transfer_application_method:
      name: 전사지 부착 방식
      description: '전사가 원단에 적용되는 방식을 지정합니다(예: 다리미 부착 방식 또는 열 프레스 방식).'
    transfer_method:
      name: 전사 방법
      description: 디자인을 원단에 어떻게 전사할지 명시합니다.
    transfer_peel_temperature:
      name: 전사 시트 박리 온도
      description: 압착 후 캐리어 시트를 제거해야 하는 권장 온도 상태(뜨거움, 따뜻함 또는 차가움)를 지정합니다.
    transmission_cooler_construction:
      name: 변속기 냉각기 구조
      description: 변속기 냉각기 코어의 구조 설계를 명시합니다.
    transmission_fluid_specification:
      name: 변속기 오일 사양
      description: '변속기 오일이 충족하는 OEM/사양 표준을 나타냅니다(예: Dexron/Mercon 제품군, ATF+4, JWS
        3309).'
    transmission_mount_bushing_material:
      name: 변속기 마운트 부싱 소재
      description: 마운트 부싱/아이솔레이터에 사용되는 엘라스토머 또는 진동 감쇠 소재를 지정합니다.
    transmission_mount_type:
      name: 변속기 마운트 유형
      description: '변속기 마운트의 구조/설계(예: 유압식 또는 솔리드식)를 명시하여 적합성, NVH 특성 및 용도를 판단하는 데
        도움을 줍니다.'
    transparency_level:
      name: 투명성 수준
      description: 수납함 벽면의 투명도를 설명하여 소비자가 내용물이 잘 보이는 수납 방식과 가려지는 수납 방식 중에서 선택할 수 있도록
        돕습니다.
    transport_case_type:
      name: 운송 케이스 유형
      description: 운송 케이스의 구조 방식/강성을 분류하여 보호 수준 및 포장 방식을 반영합니다.
    transposition_modes:
      name: 조옮김 모드
      description: '튜너가 지원하는 조옮김/콘서트 피치 모드를 지정합니다(예: 콘서트 피치 및 B♭ 또는 E♭ 같은 조옮김 키).'
    trap_design:
      name: 트랩 디자인
      description: 덫의 구조 방식 또는 작동 방식을 식별하여 설치 방법과 가장 적합한 종 또는 환경을 결정합니다.
    trap_spring_configuration:
      name: 덫 스프링 구성
      description: 덫을 작동시키는 스프링의 개수 또는 배열을 나타내며, 이는 강도와 합법성에 영향을 미칩니다.
    travel_bassinet_accessories_included:
      name: 여행용 아기침대 액세서리 포함 여부
      description: 여행용 아기침대와 함께 제공되는 추가 품목을 나열합니다.
    travel_spinning_wheel_assembly_required:
      name: 여행용 물레 조립 필요 여부
      description: '물레를 사용하기 전에 펼치는 것 외에 조립/설정(예: 플라이어 부착, 장력 조절, 발판 조정)이 필요한지 여부를
        나타냅니다.'
    travel_spinning_wheel_portability_features:
      name: 여행용 물레 휴대 기능
      description: 접이식 구조 및 포함된 운반 수단 등 여행용 물레의 휴대성 관련 설계 요소를 설명합니다.
    travel_trailer_appliances_fuel_type:
      name: 캠핑 트레일러 기기 연료 유형
      description: 견인 차량이 아닌 트레일러 내 기기/난방/조리에 사용되는 주요 연료를 나타냅니다.
    travel_trailer_holding_tank_type:
      name: 캠핑 트레일러 오수 탱크 유형
      description: 여행용 트레일러에 어떤 저장 탱크가 있는지 나타냅니다(해당 항목 모두 선택).
    travel_trailer_power_hookup_shore_power:
      name: 여행용 트레일러 전원 연결(외부 전원)
      description: 외부 전원 연결에서 지원되는 전기 연결 표준을 지정합니다.
    tread_pattern_type:
      name: 트레드 패턴 유형
      description: 타이어의 전체적인 트레드 디자인을 슬릭, 세미슬릭, 노브형 등으로 분류하며, 이는 접지력, 구름 저항, 사용 대상
        노면에 영향을 미칩니다.
    treadmill_key_type:
      name: 런닝머신 키 유형
      description: '안전 키의 물리적 형태 또는 작동/연결 메커니즘을 설명합니다(예: 자석식 원형, 플라스틱 삽입형, 클립형).'
    treadmill_part_type:
      name: 트레드밀 부품 유형
      description: '해당 제품이 대체하도록 설계된 러닝머신의 특정 부품을 식별하여 소비자가 호환성을 신속하게 확인할 수 있도록 합니다(예:
        벨트 또는 모터).'
    treadmill_position:
      name: 러닝머신 부품 장착 위치
      description: 러닝머신에서 해당 부품이 장착되는 위치(앞쪽, 뒤쪽, 위쪽, 아래쪽, 중앙)를 나타냅니다.
    triangle_striker_material:
      name: 트라이앵글 타격봉 소재
      description: 포함된 타격봉/비터의 소재를 나타냅니다.
    trigger_input_connector:
      name: 트리거 입력 커넥터
      description: 트리거 입력에 사용되는 물리적 커넥터 표준을 지정합니다.
    trigger_input_connector_type:
      name: 트리거 입력 커넥터 유형
      description: 트리거 입력에 사용되는 물리적 커넥터 유형을 지정합니다.
    trigger_input_zone_support:
      name: 트리거 입력 영역 지원
      description: '트리거 입력이 단일 영역 및/또는 이중 영역 트리거(예: 헤드/림) 및 유사한 다중 영역 구현을 지원하는지 여부를
        나타냅니다.'
    trim_application_method:
      name: 트림 부착 방식
      description: '트림을 작업물에 부착하는 방법(예: 바느질 부착, 다림질 부착, 접착식)을 나타냅니다.'
    trim_detail:
      name: 트림 세부 장식
      description: '의류의 눈에 띄는 가장자리 장식이나 마감 장식(예: 술 장식, 프린지, 레이스 장식)을 식별합니다.'
    trim_elasticity:
      name: 트림 신축성
      description: 니트/액티브웨어용으로 사용할 수 있도록 릭랙 트림에 신축성이 있는지 여부를 나타냅니다.
    trim_finish:
      name: 트림 마감
      description: '트림에 적용되는 표면 마감 처리(예: 금속성, 반짝이, 반사)를 나타냅니다.'
    trim_tilt_type:
      name: 트림/틸트 유형
      description: 모터가 트림/틸트 조정을 지원하는지 여부와 지원 방식을 나타냅니다.
    trolleybus_power_supply_type:
      name: 트롤리버스 전원 공급 유형
      description: 트롤리버스가 전력망에서 구동 전력을 공급받는 방식을 명시합니다.
    truck_bed_body_type:
      name: 트럭 적재함/차체 유형
      description: 운전석 뒤쪽의 적재함 또는 차체 구성을 나타냅니다.
    truck_bed_length_class:
      name: 트럭 적재함 길이 등급
      description: 화물망이 맞도록 설계된 트럭 적재함 길이 등급(일반적으로 숏 베드/스탠다드 베드/롱 베드로 표기됨)을 나타냅니다.
    truck_mounting_hole_pattern:
      name: 트럭 장착 홀 패턴
      description: '데크에 트럭을 장착하는 데 사용되는 홀 레이아웃을 지정합니다(예: 올드 스쿨, 뉴 스쿨, 유니버설).'
    truck_mounting_style:
      name: 트럭 장착 스타일
      description: 트럭이 데크에 장착되는 방식(탑 마운트, 드롭스루 등)을 나타내며, 승차 높이와 안정성에 영향을 미칩니다.
    truck_profile:
      name: 트럭 높이 유형
      description: 스케이트보드 트럭의 데크 대비 승차 높이 분류를 나타내며, 휠 간섭 여유와 보드 주행감에 영향을 미칩니다.
    trumpet_bell_material:
      name: 트럼펫 벨 소재
      description: 벨 부분에 사용되는 소재를 나타냅니다(악기의 나머지 부분과 다를 수 있음).
    trumpet_leadpipe_material:
      name: 트럼펫 리드파이프 소재
      description: 리드파이프(마우스피스에서 밸브까지 이어지는 주요 파이프)에 사용된 소재 또는 처리 방식을 나타냅니다.
    trundle_mechanism:
      name: 트런들 방식
      description: 메인 프레임에서 보조 침대 구성 요소가 펼쳐지는 방식을 설명합니다.
    trunk_part_type:
      name: 트렁크 부품 유형
      description: '판매되는 트렁크 관련 차체 부품(예: 트렁크 리드, 힌지, 래치)을 명시합니다.'
    tuba_leadpipe_material:
      name: 튜바 리드파이프 소재
      description: 튜바의 리드파이프(마우스파이프) 부분에 사용된 소재를 나타냅니다.
    tube_base_type:
      name: 튜브 베이스 유형
      description: '물리적/전기적 호환성을 위해 사용되는 진공관의 베이스/소켓 제품군을 지정합니다(예: 옥탈, 노발/9핀).'
    tube_matching_grade:
      name: 진공관 매칭 등급
      description: 진공관이 세트로 테스트/매칭되었는지 여부와 제공되는 매칭 유형을 나타냅니다.
    tube_weight_category:
      name: 튜브 중량 범주
      description: '튜브를 구조/무게(예: 초경량, 표준, 고강도)별로 분류하여 내구성과 성능을 빠르게 비교할 수 있도록 합니다.'
    tubeless_compatible:
      name: 튜브리스 호환 가능
      description: 튜브리스 타이어와 함께 사용할 경우 휠이 튜브 없이 작동하도록 설계되었는지 여부를 나타냅니다.
    tubing_shape:
      name: 튜빙 모양
      description: 스탠드 지지 튜빙의 단면 모양을 지정합니다.
    tubular_construction_type:
      name: 튜블러 구조 유형
      description: 튜브형 자전거 타이어의 구조 방식을 지정하며, 전통적인 접착식 튜브형 타이어와 최신 변형 방식을 구분합니다.
    tulip_type_flower_form:
      name: 튤립 유형(꽃 형태)
      description: '한 다발에 포함된 튤립의 원예학적 유형/꽃 형태를 지정합니다(예: 홑꽃, 겹꽃, 파롯형).'
    tuner_input_method:
      name: 튜너 입력 방식
      description: 튜너가 음높이를 감지하는 방식(마이크, 진동/클립 센서, 악기 케이블 입력, 컨택트 픽업)을 지정합니다.
    tuning_mechanism:
      name: 조율 방식
      description: 봉고 헤드의 장력을 조절/튜닝하는 방식을 나타냅니다.
    tuning_system:
      name: 튜닝 시스템
      description: 고블렛 드럼의 튜닝 방식 또는 튜닝 가능 여부를 나타냅니다.
    turn_signal_lens_color:
      name: 방향지시등 렌즈 색상
      description: 방향지시등 하우징의 보이는 렌즈/커버 색상(발광되는 빛의 색상 제외).
    turn_signal_lighting_style:
      name: 방향지시등 조명 방식
      description: 방향지시등이 제공하는 시각적 신호 방식/애니메이션을 나타냅니다.
    turnip_and_rutabaga_variety:
      name: 순무와 루타바가 품종
      description: 순무 또는 루타바가의 특정 품종을 식별합니다.
    tweeter_crossover_type:
      name: 트위터 크로스오버 유형
      description: 트위터에 포함된 고역 통과 크로스오버 및/또는 보호 구성 요소의 유형을 나타냅니다(있는 경우).
    tweeter_material:
      name: 트위터 소재
      description: 트위터의 주 진동판/돔 소재를 나타냅니다.
    tweeter_mount_type:
      name: 트위터 장착 유형
      description: 트위터를 차량에 장착하는 방법(장착 방식/하드웨어)을 명시합니다.
    twill_direction:
      name: 트윌 방향
      description: 데님 직조의 능직 방향을 나타냅니다.
    twist_direction:
      name: 꼬임 방향
      description: 실의 합사 꼬임 방향(S 꼬임 또는 Z 꼬임)을 나타냅니다.
    u_joint_series_size:
      name: 유니버설 조인트 시리즈/사이즈
      description: '사용된 유니버설 조인트 시리즈 또는 사이즈 표준을 지정합니다(예: 1310 시리즈).'
    uilleann_pipes_bag_material:
      name: 일리언 파이프 백 소재
      description: 공기주머니 구성 요소(포함된 경우)의 소재를 나타내며, 연주감, 내구성 및 유지보수에 영향을 미칩니다.
    uilleann_pipes_handedness:
      name: 일리언 파이프 좌우 구성
      description: 해당 세트가 오른손잡이용 또는 왼손잡이용 연주 배치로 구성되어 있는지 여부를 나타냅니다.
    uilleann_pipes_set_configuration:
      name: 일리언 파이프 세트 구성
      description: 레귤레이터와 드론 포함 여부에 따라 어떤 일리언 파이프 구성이 포함되는지 지정합니다.
    uk_childrens_shoe_size:
      name: 영국 아동 신발 사이즈
      description: '영국 아동화 사이즈(예: 4 또는 4 와이드)를 지정합니다.'
    uk_clothing_size:
      name: 영국 옷 사이즈
      description: '영국 옷 사이즈(예: 12 또는 18)를 지정합니다.'
    uk_cup_size:
      name: 영국 컵 사이즈
      description: '영국 브래지어 컵 사이즈(예: C 또는 FF)를 지정합니다.'
    uk_mens_shoe_size:
