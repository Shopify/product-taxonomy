    gelatin_form:
      name: 젤라틴 형태
      description: 젤라틴의 물리적 형태를 설명하여 사용자가 레시피 및 산업용 용도에 적합한 형태를 선택할 수 있도록 합니다.
    gelatin_or_gelling_agent_source:
      name: 젤라틴 또는 겔화제 공급원
      description: 제품에 사용된 겔화제의 원산 또는 유형을 나타내며, 이는 식이 및 종교적 기준을 고려할 때 중요합니다.
    gelatin_source:
      name: 젤라틴 원료
      description: 젤라틴의 동물성, 식물성 또는 합성 원산을 나타내어 소비자가 식이, 윤리적 또는 종교적 요구 사항과의 적합성을 확인할
        수 있도록 합니다.
    gelling_agent:
      name: 겔화제
      description: 디저트를 굳히거나 걸쭉하게 만드는 데 사용되는 주요 물질을 식별하며, 이는 식단 적합성과 식감에 중요합니다.
    gemstone_clarity_grade:
      name: 보석 투명도 등급
      description: 보석의 투명도 등급(등급이 매겨진 경우)
    gemstone_creation_method:
      name: 보석 제작 방법
      description: 보석이 천연인지, 실험실에서 제작된 것인지 또는 모조품인지 나타냅니다.
    gemstone_cut_style:
      name: 보석 커팅 유형
      description: 보석 표본의 커팅 유형 또는 마감 방식을 설명합니다.
    gemstone_treatment_status:
      name: 보석 처리 상태
      description: 보석에 처리나 가공이 적용되었는지 여부와 해당 방식을 나타냅니다.
    geological_period:
      name: 지질 시대
      description: '알려진 경우 화석의 지질 시대(필요시 세부 기/세 포함)를 나타냅니다(예: 쥐라기, 백악기, 에오세).'
    gift_box_tin_insert_type:
      name: 기프트 박스/틴 내부 인서트 유형
      description: 박스 또는 틴 내부의 제품을 정리하거나 보호하기 위한 인서트 구성을 나타냅니다.
    gift_box_tin_sustainability_features:
      name: 기프트 박스/틴 지속 가능성 기능
      description: 선물 상자/틴케이스 패키지의 지속 가능성 관련 특성.
    gift_box_tin_window_type:
      name: 선물 상자/틴케이스 창 유형
      description: 선물 상자에 내부를 볼 수 있는 투명 창이 있는지 여부와 해당 스타일.
    gift_message_option:
      name: 선물 메시지 옵션
      description: 기프트 메시지 또는 메모를 포함할 수 있는지 여부와 그 방식을 나타냅니다(없음, 포함, 사용자 지정 가능).
    ginger_maturity:
      name: 생강 숙성도
      description: 생강의 수확 단계(햇생강 또는 숙성 생강)를 나타내며, 이는 풍미의 강도와 선호하는 요리 방식에 영향을 미칩니다.
    ginger_variety:
      name: 생강 품종
      description: 풍미와 요리 용도를 구분하기 위해 생강과에 속하는 특정 재배 품종, 종류 또는 관련 뿌리줄기 식물을 지정합니다.
    glass_kiln_controller_type:
      name: 유리 가마 컨트롤러 유형
      description: 가마에 포함된 온도 또는 소성 컨트롤러 유형을 나타냅니다.
    glass_kiln_firing_application:
      name: 유리 가마 소성 앱
      description: 가마가 어떤 주요 유리 공예 용도로 설계되었는지 나타냅니다.
    glass_stone_application_method:
      name: 글라스 스톤 부착 방식
      description: '유리 장식을 프로젝트에 부착하거나 적용하는 방식을 나타냅니다(예: 접착식, 열접착식, 봉제식).'
    glass_tint:
      name: 유리 착색
      description: 빛 노출을 조절하기 위해 병에 사용되는 유리 또는 플라스틱의 착색 유형을 나타냅니다(맥주 및 와인 제조에서 일반적으로
        사용됨).
    glaze_firing_atmosphere:
      name: 유약 소성 분위기
      description: 유약이 사용되도록 설계된 소성 분위기를 나타냅니다.
    glaze_opacity:
      name: 유약 불투명도
      description: 소성 후 유약이 나타내는 투명도입니다.
    glaze_product_form:
      name: 글레이즈 제품 형태
      description: '유약 제품이 제공되는 물리적 형태를 나타냅니다(예: 액체, 건조 분말, 농축액, 스프레이).'
    glider_avionics_package:
      name: 글라이더 항공전자 장비 패키지
      description: 글라이더에 장착된 내비게이션 및 비행 계기판의 전반적인 수준을 나타냅니다.
    glider_certification_rating:
      name: 글라이더 인증 등급
      description: '글라이더의 안전성과 성능 수준을 나타내는 공식 인증 등급을 나타냅니다(예: EN-A, EN-B).'
    glider_landing_gear_configuration:
      name: 글라이더 착륙 장치 구성
      description: 글라이더에 사용되는 착륙 장치 구성을 나타냅니다.
    glider_launch_method:
      name: 글라이더 이륙 방법
      description: 글라이더가 일반적으로 이륙하거나 자체 이륙하는 방식을 지정합니다.
    glider_performance_class:
      name: 글라이더 성능 클래스
      description: 활공기에 일반적으로 사용되는 경기/성능 등급 또는 범주를 나타냅니다.
    glitter_application_method:
      name: 글리터 도포 방식
      description: '공예용 글리터를 도포하거나 사용하는 권장 기법을 나타냅니다(예: 뿌리기/셰이커형, 혼합형, 문지르기형, 접착제
        위에 도포, 브러시형, 스프레이형, 열처리/엠보싱).'
    glitter_eco_friendly_claim:
      name: 글리터 친환경 인증 표기
      description: 루스 글리터 제형에 적용되는 환경 또는 친환경 관련 특성을 나타냅니다.
    glitter_effect_type:
      name: 글리터 효과 유형
      description: '기본 색상 외에 글리터/시퀸이 나타내는 시각적 효과를 설명합니다(예: 홀로그램, 오로라/홍채색 효과).'
    glitter_glue_base_solvent_type:
      name: 글리터 접착제 베이스/용제 타입
      description: 글리터 접착제의 주요 기반 성분을 설명합니다(세척 편의성과 재질 호환성에 대한 소비자의 일반적인 관심 사항).
    glitter_opacity_coverage:
      name: 글리터 불투명도/커버리지
      description: 글리터 효과가 적용되었을 때 어느 정도 불투명하게 보이는지를 나타냅니다.
    glitter_use_suitability:
      name: 글리터 사용 적합성
      description: '글리터 분말의 주요 권장 용도 또는 승인된 사용 환경을 나타냅니다(예: 공예 전용, 화장품 등급/인체 안전성,
        식품 안전성).'
    glove_armor_placement:
      name: 장갑 보호대 위치
      description: 장갑의 어느 부위에 보호 아머가 장착되어 있는지 식별합니다.
    glove_cuff_length:
      name: 장갑 커프 길이
      description: 레이싱 장갑이 손목이나 팔뚝을 덮는 커프/곤틀릿의 길이 스타일을 나타냅니다.
    glove_finger_coverage:
      name: 장갑 손가락 커버리지
      description: 장갑이 손가락을 어느 정도까지 덮는지를 설명하며, 손가락 전체를 덮는 형태부터 손가락이 드러나는 형태까지 포함합니다.
    glove_finger_design:
      name: 장갑 손가락 디자인
      description: '장갑의 손가락 구성을 나타냅니다(예: 오지형, 손모아장갑형).'
    glove_fit_profile:
      name: 장갑 핏 프로필
      description: 선수들이 선호하는 착용감을 선택할 수 있도록 장갑의 내부 형태와 전체적인 실루엣을 설명합니다.
    glove_insulation:
      name: 장갑 보온재
      description: '장갑의 방한/보온 구조 또는 발열 방식을 지정합니다(예: 보온 등급, 안감/단열 기술, 발열 유무 및 유형).'
    glove_palm_material:
      name: 장갑 손바닥 재질
      description: 장갑 손바닥(주요 접촉면 또는 그립면)에 사용된 주요 재질을 나타내며, 이는 손등 부분의 재질과 다를 수 있습니다.
    glove_size:
      name: 장갑 사이즈
      description: 배그 미트가 맞도록 설계된 일반적인 손 크기를 나타내며, 이는 의류 스타일의 사이즈 코드 또는 유소년용 사이즈로
        표시되는 경우가 많습니다.
    glove_webbing_style:
      name: 글러브 웨빙 유형
      description: 글러브의 웨빙 또는 포켓 디자인을 정의하며, 이는 볼 컨트롤, 포지션 적합성 및 선수 선호도에 영향을 미칩니다.
    glow_effect:
      name: 야광 효과
      description: 저조도 게임을 위해 젤 볼에 야광 또는 추적 특성이 포함되어 있는지 여부를 나타냅니다.
    glow_plug_connector_type:
      name: 글로우 플러그 커넥터 유형
      description: 차량 와이어링 하네스에 연결하는 데 사용되는 글로우 플러그의 전기 단자/커넥터 스타일.
    glow_plug_heating_element_type:
      name: 글로우 플러그 발열체 유형
      description: 글로우 플러그에 사용되는 발열체의 종류/기술.
    glue_application_format:
      name: 접착제 도포 형태
      description: 학교용 접착제를 바르는 데 사용되는 유포기/도포 형태를 지정합니다.
    glue_applicator_type:
      name: 접착제 도포기 유형
      description: 액체 접착제를 도포하는 데 사용되는 내장형 도포기 또는 분사 팁의 유형을 나타냅니다.
    glue_base_formulation:
      name: 접착제 기본 제형
      description: 접착 성능, 안전성, 세척 편의성을 확인하기 위해 공예용 액체 접착제의 주요 화학 성분 및 베이스 성분을 식별합니다.
    glue_gun_nozzle_style:
      name: 글루건 노즐 유형
      description: 도포 정밀도와 글루 도포 면적에 영향을 미치는 글루건의 물리적 노즐 팁 형태를 지정합니다.
    glue_safety_standard:
      name: 접착제 안전 표준
      description: 레이블 및 일반 표준에 따라 해당 접착제가 무독성인지 또는 어린이에게 안전한 제품인지 여부를 나타냅니다.
    goal_frame_material:
      name: 골대 프레임 소재
      description: 골대 또는 프레임의 재질을 식별하며, 이는 무게, 휴대성 및 내후성에 영향을 미칩니다.
    goal_size:
      name: 골대 크기
      description: 치수 정보만으로 선택하는 것보다 빠르게 제품을 고를 수 있도록, 축구 골대를 일반적인 공식 경기용 또는 훈련용 크기
        그룹으로 분류합니다.
    goal_size_classification:
      name: 골대 크기 분류
      description: '골대의 표준 크기 등급을 나타내어 사용자가 자신의 경기 수준에 적합한 장비를 빠르게 선택할 수 있도록 합니다(예:
        정규 규격, 유소년용, 미니).'
    goal_size_standard:
      name: 골대 크기 기준
      description: '골대가 충족하는 공식 또는 연령대 기준을 나타냅니다(예: World Aquatics 규정, 12세 이하).'
    goalie_configuration:
      name: 골키퍼 라인업 구성
      description: 테이블 양측에 배치된 골키퍼 인형의 수를 나타냅니다(미국식 3인 골키퍼 스타일, 유럽식 1인 골키퍼 스타일).
    goalie_playing_surface:
      name: 골키퍼 호환 경기장 표면
      description: 하키 골리 장비 세트가 사용되도록 설계된 주요 경기 표면 또는 환경을 나타냅니다.
    goalkeeper_glove_cut:
      name: 골키퍼 장갑 재단 방식
      description: 골키퍼 장갑의 손바닥 및 손가락 구조 유형(컷)을 나타내며, 이는 착용감, 볼 감각 및 컨트롤에 영향을 미칩니다.
    goalkeeper_training_aid_type:
      name: 골키퍼 훈련 장비 유형
      description: 골키퍼 훈련 보조 도구의 유형을 식별하여 정확한 필터링이 가능하도록 합니다.
    goblet_drum_playing_style:
      name: 고블릿 드럼 연주 방식
      description: 악기가 주로 손 연주용으로 설계되었는지 또는 스틱이나 말렛 사용용으로 설계되었는지를 나타냅니다.
    gobo_format:
      name: 고보 규격
      description: 프로젝터가 지원하는 고보 크기 또는 규격을 나타내며(직경 및 두께 계열), 이는 교체용 또는 맞춤형 고보와의 호환성을
        보장합니다.
    gobo_root_variety:
      name: 우엉 품종
      description: 우엉의 구체적인 품종 또는 재배종을 식별합니다.
    gobo_rotation:
      name: 고보 회전
      description: 고보의 회전 가능 여부와 지원되는 회전 방향을 나타냅니다.
    goggle_accessory_type:
      name: 고글 액세서리 유형
      description: '이 상위 카테고리 내의 다양한 제품군을 소비자가 필터링할 수 있도록 액세서리의 종류를 분류합니다(예: 커버, 케이스,
        스트랩).'
    goggle_features:
      name: 고글 기능
      description: 고글이 제공하는 특수 기능 또는 디자인 특징을 나열합니다.
    goggle_fit_design:
      name: 고글 핏 디자인
      description: 고글의 착용 방식 또는 착용 적합성을 설명하며, OTG(안경 위 착용) 호환성도 포함합니다.
    goggle_gasket_material:
      name: 고글 개스킷 재질
      description: 얼굴에 밀착되는 씰의 재질을 나타내며, 이는 착용감, 알레르기 관련 고려 사항 및 누수 방지에 영향을 미칩니다.
    goggle_integration:
      name: 구글 일체형
      description: 헬멧이 고글과 함께 사용되도록 설계되었는지 여부 및/또는 고글 고정을 위한 일체형 구조를 포함하는지 나타냅니다.
    goggle_lens_shape:
      name: 고글 렌즈 형태
      description: '교체 렌즈의 곡률 프로파일을 정의하여 왜곡 및 시야각에 영향을 미칩니다(예: 원통형, 구형, 토릭).'
    goggle_lens_tint:
      name: 고글 렌즈 색조
      description: 렌즈의 색조 또는 마감을 정의하며, 이는 빛 투과율, 색상 인식 및 미적 외관에 영향을 미칩니다.
    goggle_strap_material:
      name: 고글 스트랩 재질
      description: 헤드 스트랩에 사용된 주요 재질을 나타내며, 이는 내구성과 착용감에 영향을 미칩니다.
    golf_accessory_set_purpose:
      name: 골프 액세서리 세트 용도
      description: 골프 액세서리 세트의 주요 용도 또는 테마를 식별합니다.
    golf_bag_style:
      name: 골프백 유형
      description: '골프백의 주요 디자인 또는 사용 유형을 나타냅니다(예: 스탠드형, 카트형, 스태프형).'
    golf_ball_alignment_design:
      name: 골프공 정렬 디자인
      description: 공 표면에 인쇄되거나 성형된 내장형 시각 정렬 보조 장치가 있는지를 나타냅니다.
    golf_ball_construction:
      name: 골프공 구조
      description: 골프공 제작에 사용된 층 또는 조각 수를 나타내며, 이는 스핀, 타구감 및 비거리에 영향을 미칩니다.
    golf_ball_cover_material:
      name: 골프공 커버 소재
      description: 골프공의 외피 재질을 나타내며, 이는 스핀, 내구성 및 타구감에 영향을 미칩니다.
    golf_cart_cover_climate_use:
      name: 골프 카트 커버 사용 기후
      description: 보관용 커버가 견디도록 설계된 주요 기후 또는 계절 조건을 나타냅니다.
    golf_cart_enclosure_fit_type:
      name: 골프 카트 인클로저 적합 유형
      description: 인클로저가 특정 좌석 수/구조에 맞춰 설계되었는지, 아니면 범용/조절형 핏을 제공하는지 지정합니다.
    golf_cart_intended_use:
      name: 골프 카트 용도
      description: 골프 카트가 설계되거나 구성된 주된 사용 목적을 나타냅니다.
    golf_club_number:
      name: 골프 클럽 번호
      description: '클럽에 인쇄된 특정 번호 또는 웨지 명칭을 식별합니다(예: 5, PW, GW).'
    golf_club_part_type:
      name: 골프 클럽 부품 유형
      description: '골프 클럽 액세서리 또는 부품을 일반적인 하위 유형으로 분류합니다(예: 어댑터 슬리브, 페룰, 무게추).'
    golf_grip_size:
      name: 골프 그립 크기
      description: 골프 그립의 전체적인 외부 크기 범주를 나타내며, 손에 쥐었을 때 그립이 얼마나 두껍게 느껴지는지를 나타냅니다.
    golf_shoe_spike_type:
      name: 골프화 스파이크 유형
      description: '골프화 밑창에 사용된 접지 시스템 유형을 식별합니다(예: 스파이크형 또는 스파이크리스형).'
    golf_tee_style:
      name: 골프 티 스타일
      description: 골프 티의 구조적 또는 기능적 유형/설계를 설명하며, 이는 공의 높이, 내구성 또는 스핀 감소에 영향을 미칩니다.
    golf_training_focus:
      name: 골프 훈련 중점 분야
      description: 제품이 개선하고자 하는 주요 기술 또는 측면을 분류합니다.
    golf_training_objective:
      name: 골프 훈련 목표
      description: 해당 훈련 보조 도구가 개선하기 위해 설계된 핵심 골프 기술이나 영역을 나타냅니다.
    gong_profile_type:
      name: 공 프로필 유형
      description: '오페라 징의 물리적 형태를 설명하며(예: 평평한 중심부, 볼록한 중심부), 이는 음색과 연주 방식에 큰 영향을
        미칩니다.'
    grading_scale:
      name: 등급 표기 체계
      description: '등급이 매겨진 불리온 주화에 사용되는 등급 체계를 나타냅니다(예: Sheldon 1~70).'
    grading_service:
      name: 등급 감정 서비스
      description: '동전 또는 지폐에 대한 제3자 등급 평가 또는 인증 서비스를 나타냅니다(예: PCGS, NGC).'
    graduation_increment:
      name: 눈금 단위
      description: 재봉선 게이지 눈금에 표시되거나 각인된 최소 눈금 단위를 나타냅니다(눈금 표시의 해상도).
    grain_processing_method:
      name: 곡물 가공 방식
      description: '곡물에 적용된 주요 가공 방식을 식별하며(예: 반숙 처리, 압착, 발아), 이는 조리 시간, 식감 및 영양에 영향을
        미칩니다.'
    grand_piano_soundboard_material:
      name: 그랜드 피아노 향판 소재
      description: 음색과 내구성에 영향을 미치는 피아노 공명판의 주요 재질입니다.
    grappling_dummy_pose:
      name: 그래플링 더미 포즈
      description: 더미의 기본 자세를 설명하며, 이를 통해 어떤 훈련과 기술을 수행할 수 있는지가 결정됩니다.
    grease_application:
      name: 그리스 용도
      description: 그리스를 주로 사용하는 차량 부품이나 사용 사례를 지정합니다.
    grease_consistency_grade_nlgi:
      name: 그리스 점도 등급(NLGI)
      description: '그리스의 경도를 나타내는 NLGI 점도 번호를 나타냅니다(예: NLGI 2는 일반적인 다목적용).'
    grease_thickener_type:
      name: 그리스 증점제 유형
      description: 그리스 제형에 사용된 증점제 또는 비누계 시스템을 식별합니다.
    great_highland_bagpipes_blowpipe_valve_type:
      name: 그레이트 하이랜드 백파이프 블로우파이프 밸브 유형
      description: 블로우파이프에 사용되는 역류 방지 밸브 시스템을 지정합니다.
    great_highland_bagpipes_drone_configuration:
      name: 그레이트 하이랜드 백파이프 드론 구성
