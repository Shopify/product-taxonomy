      name: 견인 가능한 튜브 형태
      description: 견인식 튜브의 일반적인 디자인 또는 형태를 식별하며, 이는 탑승자의 자세와 탑승 경험을 결정합니다.
    towed_water_sport_discipline:
      name: 견인 수상 스포츠 종목
      description: 장갑이 설계된 주요 견인식 수상 스포츠 종목을 명시합니다.
    towel_features:
      name: 타월 특징
      description: 수건에 포함된 특별한 특징이나 추가 사항을 나열합니다.
    towel_style:
      name: 타월 형태
      description: 골프 타월의 기능적 구조 또는 형태를 분류합니다.
    toy_airplane_control_type:
      name: 장난감 비행기 조종 방식
      description: 사용자가 장난감 비행기를 조종하는 방법을 명시합니다.
    toy_airplane_features:
      name: 장난감 비행기 특징
      description: 장난감 비행기의 주목할 만한 놀이 기능을 강조합니다.
    toy_airplane_flight_capability:
      name: 장난감 비행기 비행 기능 여부
      description: 장난감 비행기가 실제로 날거나 활공할 수 있도록 설계되었는지, 아니면 주로 지상에서 가지고 놀거나 전시하기 위한
        것인지를 나타냅니다.
    toy_audio_features:
      name: 장난감 오디오 기능
      description: 장난감에 내장된 오디오 기능 및 음향 효과를 나열합니다.
    toy_boat_play_features:
      name: 장난감 배 놀이 기능
      description: 상품 탐색 및 필터링을 위해 장난감 보트의 주목할 만한 상호작용 기능을 강조합니다.
    toy_boat_recommended_play_environment:
      name: 장난감 배는 권장 놀이 환경
      description: '구매자의 기대와 안전을 고려할 수 있도록 장난감 보트의 권장 놀이 환경을 지정합니다(예: 욕조, 개방 수역).'
    toy_bowling_equipment_included:
      name: 장난감 볼링 세트 구성품
