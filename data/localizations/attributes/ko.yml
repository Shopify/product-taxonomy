    great_highland_bagpipes_mounting_material:
      name: 그레이트 하이랜드 백파이프 마운트 재질
      description: '백파이프의 장식용 마운트에 사용된 재질을 나타냅니다(예: 니켈 실버, 인조 상아).'
    greens_maturity_stage:
      name: 채소 숙성 단계
      description: 잎채소가 수확되었을 때의 생육 단계를 나타냅니다.
    greens_preparation_state:
      name: 잎채소 손질 상태
      description: '잎채소가 어떻게 가공되거나 포장되었는지를 설명합니다(예: 세척 완료, 절단됨, 바로 섭취 가능).'
    grenade_effect_type:
      name: 수류탄 효과 유형
      description: '페인트볼 수류탄이 작동했을 때 발생하는 주요 기능적 효과를 나타냅니다(예: 연막, 페인트 분사, 섬광 효과).'
    grid_unit:
      name: 격자 단위
      description: 매트에 인쇄된 기본 측정 시스템(격자나 눈금이 있는 경우).
