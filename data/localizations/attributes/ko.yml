    commercial_vehicle_class:
      name: 상업용 차량 등급
      description: 차량 검색 및 필터링을 위해 상용차의 중량 등급을 나타내는 GVWR(총 차량 중량) 기준 규격/업계 등급.
    compass_damping_medium:
      name: 나침반 감쇠 매체
      description: 나침반 캡슐 내부에서 바늘의 움직임을 안정화하는 데 사용되는 매체를 지정합니다.
    compass_illumination_type:
