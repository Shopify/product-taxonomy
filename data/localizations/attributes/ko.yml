    grip_chalk_form:
      name: 그립 초크 형태
      description: 가방과 함께 제공되거나 사용하는 초크의 물리적 형태를 식별합니다.
    grip_coverage:
      name: 그립 적용 범위
      description: 양말에 실리콘 또는 고무 재질의 그립 요소가 있는지 여부와 그 위치를 식별합니다.
    grip_design:
      name: 그립 디자인
      description: 휴대가 용이하고 운동 활용도를 높이기 위해 플레이트의 핸들 또는 구멍 배열을 지정합니다.
    grip_enhancer_effect:
      name: 그립력 향상 효과
      description: '제품이 제공하는 주요 실적 특성을 설명합니다(예: 수분 흡수 또는 끈적이는 수지 마감).'
    grip_enhancer_form:
      name: 그립 강화제 형태
      description: 그립력 향상 제품의 물리적 형태 또는 형식을 식별하여 운동선수가 적절한 사용 방식을 선택할 수 있도록 합니다.
    grip_features:
      name: 그립 기능
      description: 그립/핸들 기능이 내장되어 있어 게임 중 그립감, 편안함 또는 제어력을 향상시키도록 설계되었습니다.
