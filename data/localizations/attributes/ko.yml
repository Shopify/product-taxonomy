    tom_mount_mounting_position:
      name: 톰 마운트 장착 위치
      description: '톰 마운트를 장착할 위치를 지정합니다(예: 베이스 드럼, 심벌 스탠드, 랙).'
    tonneau_cover_mounting_style:
