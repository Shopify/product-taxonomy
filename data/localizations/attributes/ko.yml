    ground_attachment_method:
      name: 접지 방식
      description: 패싱 아크가 경기 표면에 고정되는 방식을 설명하며, 이는 안정성과 표면 호환성에 영향을 미칩니다.
    groupset_components_included:
      name: 그룹 세트 구성품 포함
      description: 그룹셋에 포함된 특정 구동계 구성 요소를 나열하여 고객이 해당 번들 콘텐츠를 이해할 수 있도록 합니다.
    gt_racing_class:
      name: GT 레이싱 클래스
      description: 차량이 제작되었거나 인증받은 GT 카테고리 또는 클래스를 나타냅니다.
    guard_construction_type:
      name: 가드 구조 유형
      description: 보호대가 하드셸 보호대인지, 연질 보호 패드인지 또는 슬리브형/스트랩형 설계인지를 나타냅니다.
    guard_size_measurement_basis:
      name: 보호대 크기 측정 기준
      description: '사이즈 측정의 기준이 되는 치수는 무엇입니까? (예: 팔꿈치 둘레, 손목 둘레, 팔뚝 둘레)'
    guard_style:
      name: 가드 스타일
      description: 스케이트 날 보호대의 구조 또는 유형을 분류하여 소비자가 단단한 보행용 보호대, 부드러운 흡수식 보호대, 스프링식
        보호대 및 기타 디자인을 빠르게 구분할 수 있도록 합니다.
    guava_flesh_color:
      name: 구아바 과육 색상
      description: 구아바 열매의 내부 과육 색상을 나타냅니다.
    guava_variety:
      name: 구아바 품종
      description: '판매 중인 구아바의 구체적인 품종 또는 재배종을 식별합니다(예: 애플 구아바, 멕시칸 크림, 타이, 핑크, 씨
        없는 품종, 화이트).'
    guide_material:
      name: 가이드  소재
      description: 낚싯대의 라인 가이드 또는 인서트에 사용된 재질을 나타냅니다.
    guide_type:
      name: 가이드 유형
      description: '낚싯대에 장착되는 가이드의 종류(예: 싱글 풋, 롤러, 스네이크)를 지정합니다.'
    guideline_markings:
      name: 가이드라인 표시
      description: 투구 훈련을 돕기 위해 투구 매트 표면에 인쇄되거나 새겨진 시각적 정렬 표시의 유형
    guiro_scraper_material:
      name: 구이로 스크레이퍼 재료
      description: 구이로와 함께 사용되는 포함되거나 권장되는 스크레이퍼/스트라이커의 재질
    guiro_surface_style:
      name: 구이로 표면 스타일
      description: 소리를 내기 위해 긁어내는 연주면의 패턴/기하학적 구조를 설명합니다.
    guitar_body_finish_type:
      name: 기타 바디 마감 유형
      description: 기타 바디에 사용된 마감재를 지정합니다.
    guitar_bridge_system_type:
      name: 기타 브리지 시스템 유형
      description: 호환성 및 검색을 위한 Bridge/테일피스 시스템 설계 제품군입니다.
    guitar_case_style:
      name: 기타 케이스 스타일
      description: 기타 케이스 또는 기그백의 전체적인 보호/구조 스타일을 명시합니다.
    guitar_humidifier_placement:
