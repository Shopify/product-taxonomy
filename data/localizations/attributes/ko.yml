      description: 번호판 문자에 적용된 방식(있는 경우)을 나타내며, 양각 또는 인쇄 여부를 포함합니다.
    vehicle_license_plate_theme:
      name: 차량 번호판 테마
      description: 번호판 아트워크의 전반적인 디자인 테마를 나타냅니다.
    vehicle_lift_actuation_method:
      name: 차량용 리프트 구동 방식
      description: 차량을 들어 올리기 위해 리프트/잭에 동력이 공급되거나 작동되는 방식을 나타냅니다.
    vehicle_lift_mounting_type:
      name: 차량 리프트 장착 유형
      description: 작업 공간에 리프트가 설치되거나 고정되는 방식을 나타냅니다.
    vehicle_lift_type:
      name: 차량용 리프트 유형
      description: '정비 또는 보관에 사용되는 차량 리프트의 구조 유형(예: 2주식, 4주식, 가위식)을 지정합니다.'
    vehicle_magnet_attachment_type:
      name: 차량용 자석 부착 유형
      description: '차량용 자석 제품의 주요 부착/장착 방식을 지정합니다(예: 자석식 단독 부착 vs. 접착 보조 자석 부착).'
    vehicle_magnet_intended_use:
      name: 차량용 자석의 용도
      description: 차량용 자석의 주요 용도를 나타냅니다.
    vehicle_mirror_adjustment_type:
      name: 차량용 미러 조절 방식
      description: 미러의 조절/제어 방법을 지정합니다.
    vehicle_mirror_glass_type:
      name: 차량용 미러 유리 유형
      description: 미러 유리 표면의 광학적 특성/모양 유형을 지정합니다.
    vehicle_organizer_features:
      name: 차량용 정리함 기능
      description: '차량용 정리함의 주요 기능 특징을 나타냅니다(예: 접이식 구조, 방수 안감, 단열 포켓, 미끄럼 방지 바닥면).'
    vehicle_paint_chemistry_base:
      name: 차량용 페인트의 화학 성분/베이스
      description: 차량용 페인트에 사용된 배합/화학 성분을 나타냅니다.
    vehicle_polish_application_method:
      name: 차량 광택제 도포 방법
      description: 차량 광택제를 도포하는 데 권장되는 방법 또는 도구를 명시합니다.
    vehicle_pursuit_package:
      name: 차량 추격 임무 패키지
      description: '해당 차량이 경찰용 추격 임무 성능 패키지(예: 냉각 시스템, 브레이크, 서스펜션 및 캘리브레이션 업그레이드)를
        장착했는지 여부를 나타냅니다.'
    vehicle_safety_equipment_position:
      name: 차량 안전 장비 위치
      description: 차량 내 안전 장비의 사용 또는 설치 위치를 지정합니다.
    vehicle_safety_equipment_visibility_features:
      name: 차량 안전 장비의 시인성 기능
      description: 눈에 잘 띄도록 설계된 시인성 향상 기능을 나타냅니다.
    vehicle_seat_row:
      name: 차량 좌석 열
      description: 시트가 어느 후열용인지(2열 또는 3열), 후방 점프 시트 적용 사례를 포함하여 나타냅니다.
    vehicle_steering_assist_type:
      name: 차량 조향 보조 장치 유형
      description: 해당 부품이 설계된 조향 보조 시스템을 지정합니다.
    vehicle_steering_wheel_lock_form_factor:
      name: 차량 스티어링 휠 잠금 장치 형태
      description: 잠금 장치의 물리적 형태와 스티어링 휠(및 선택적으로 기타 제어 장치)과의 상호 작용 방식을 설명합니다.
    vehicle_wax_polish_product_form:
      name: 차량용 왁스/광택제 제품 형태
      description: 왁스, 광택제, 보호제 또는 실란트의 물리적 형태나 토출 형식을 나타냅니다.
    vehicle_wheel_valve_stem_type:
      name: 차량 휠 밸브 스템 유형
      description: 지원되거나 포함된 밸브 스템 유형을 지정합니다.
    vehicle_windshield_fluid_formula:
      name: 차량용 앞유리 세척액 배합
      description: 앞유리 세척액 배합의 주요 세척/제거 대상을 나타냅니다.
    veil_length_type:
      name: 베일 길이 유형
      description: 베일을 수치적 측정이 아닌 표준 길이 용어를 사용하여 분류합니다.
    vellum_opacity_level:
      name: 벨럼지 불투명도 수준
      description: 벨럼지 시트의 반투명도 또는 불투명도를 나타냅니다.
    ventilation_configuration:
      name: 환기 구성
      description: 헬멧의 주요 환기, 흡기 및 배기 구성을 나타냅니다.
    ventilation_control_type:
      name: 환기 제어 유형
      description: 헬멧에 내장된 공기 흐름 관리 방식을 지정합니다.
    ventilation_level:
      name: 환기 수준
      description: 아머의 상대적인 공기 흐름/통풍 설계를 나타냅니다.
    venting_design:
      name: 환기 설계
      description: 보관 중 결로 및 곰팡이 발생을 줄이기 위해 덮개에 통풍구가 있는지 여부와 통풍 방법을 명시합니다.
    vestibule_type:
      name: 전정 유형
      description: 텐트를 기준으로 전실의 배치를 분류합니다.
    vibraphone_bar_material:
      name: 비브라폰 음판 소재
      description: 비브라폰 음판/키의 소재를 나타냅니다.
    vibraphone_motor_type:
      name: 비브라폰 모터 유형
      description: 비브라토를 위한 회전식 공명 팬을 구동하는 데 사용되는 모터 유형을 나타냅니다(장착된 경우).
    vibraphone_range_octaves:
      name: 비브라폰 음역(옥타브)
      description: '비브라폰의 음역은 옥타브로 표시됩니다(예: 3옥타브, 3.5옥타브).'
    vibraphone_resonator_tube_material:
      name: 비브라폰 공명관 소재
      description: 음판 아래에 있는 비브라폰 공명관의 소재를 나타냅니다.
    vibraphone_tuning_standard:
      name: 비브라폰 조율 기준
      description: 조율에 사용되는 기준 음높이를 나타냅니다(A=440Hz 등).
    viewing_sides:
      name: 보는 측면
      description: 점수판에 정보를 표시할 면의 개수(단면, 양면, 사면 등)를 지정합니다.
    vintage_advertisement_decade:
      name: 빈티지 광고 연대
      description: 광고가 처음 인쇄되거나 제작된 연대를 명시합니다(정확한 연도를 모르는 경우 대략적인 연대 기재).
    vintage_advertisement_format:
      name: 빈티지 광고 포맷
      description: 빈티지 광고 수집품의 물리적 형식 또는 매체를 명시합니다.
    vintage_advertisement_subject_category:
      name: 빈티지 광고 주제 범주
      description: 광고되는 제품/서비스의 범주를 식별합니다(광고 대상).
    vintage_classic_truck_cab_type:
      name: 빈티지 및 클래식 트럭 캡 유형
      description: 트럭 탑승 공간의 캡 구성/차체 형태를 나타냅니다.
    virginia_tech_helmet_star_rating:
      name: 버지니아텍 헬멧 별 등급
      description: 버지니아텍 헬멧 연구소에서 부여한 안전 등급을 나타냅니다(별 0~5개).
    virtual_analog_synthesizer_form_factor:
      name: 가상 아날로그 신디사이저 폼 팩터
      description: 신디사이저 본체의 물리적 형식을 지정합니다(키보드형, 모듈형/랙형).
    viscosity_thickness:
      name: 점도/점도
      description: 판매 상태 또는 권장 작업 농도에서 슬립이 얼마나 되직하거나 묽은지를 설명합니다.
    vise_configuration:
      name: 바이스 구성
      description: 바이스 세트의 구조적 배치 또는 부품 수를 지정하며, 이는 휴대성과 설치 복잡성에 영향을 미칩니다.
    visibility_features:
      name: 시인성 기능
      description: 교통 환경에서 탑승자의 시인성을 높이는 디자인 요소를 강조합니다.
    visor_brim_type:
      name: 바이저/챙 유형
      description: 헬멧에 바이저나 모자챙의 유무 및 스타일을 나타냅니다.
    visor_configuration:
      name: 바이저 구성
      description: 내장형 바이저 또는 페이스 쉴드의 유무와 형태를 설명합니다.
    visor_lens_finish:
      name: 바이저 렌즈 마감
      description: 바이저 렌즈에 적용되는 색조, 광학적 마감 또는 그래픽 스타일을 지정합니다.
    visor_style:
      name: 바이저 형태
      description: 후드에 챙/바이저가 포함되어 있는지 여부와 그 형태를 나타냅니다.
    voc_compliance_standard:
      name: VOC 준수 기준
      description: 해당 제품의 규제상 VOC 준수 표기를 나타냅니다(해당되는 경우).
    voc_regulatory_class:
      name: VOC 규제 등급
      description: 제품에 대해 명시된 VOC 규제/준수 등급을 나타내며, 지역 규제 및 환경 제한 사항에 사용됩니다(라벨/안전보건자료
        기준).
    vodka_base_ingredient:
      name: '보드카 베이스 원료 '
      description: '보드카를 증류하는 데 사용되는 주요 농산물 원료(예: 밀, 감자, 옥수수).'
    voice_coil_configuration:
      name: 보이스 코일 구성
      description: 배선 유연성과 임피던스 옵션을 위한 보이스 코일의 수/배치를 나타냅니다.
    voice_effects:
      name: 보컬 효과
      description: 노래방 세트에서 지원하는 내장 보컬 효과 유형을 나타냅니다.
    voltage_rating_type:
      name: 전압 정격 유형
      description: 퓨즈의 전압 정격이 교류(AC), 직류(DC) 또는 둘 다에 적용되는지 여부를 명시합니다.
    voltage_regulator_connector_type:
      name: 전압 레귤레이터 커넥터 유형
      description: 전압 레귤레이터를 차량 배선/알터네이터/발전기에 연결하는 데 사용되는 연결/단자 유형을 지정합니다.
    wader_foot_type:
      name: 방수바지 발 유형
      description: 웨이더가 부츠 일체형인지, 별도의 웨이딩 부츠와 함께 신는 스타킹 풋형인지 명시합니다.
    wader_sole_type:
      name: 웨이더 밑창 유형
      description: 웨이딩 부츠 또는 부츠 일체형 웨이더에 사용되는 겉창 소재 또는 접지 유형을 지정합니다.
    waistband_style:
      name: 허리밴드 형태
      description: 허리밴드의 구조와 착용감 및 편안함을 위해 어떻게 고정하거나 조절하는지 설명합니다.
    wakeboard_binding_mounting_pattern:
      name: 웨이크보드 바인딩 장착 패턴
      description: 바인딩과 호환되는 웨이크보드의 인서트/플레이트 패턴을 지정합니다.
    wakeboard_riding_style:
      name: 웨이크보드 라이딩 방식
      description: 웨이크보드의 사용 환경 또는 사용 방식을 분류합니다.
    wall_decal_style:
      name: 벽면 데칼 방식
      description: '데칼의 제작/부착 방식을 지정합니다(예: 다이컷, 전사, 스티커 시트).'
    wallyball_equipment_included:
      name: 월리볼 장비 포함
      description: 월리볼 세트에 제공되는 구체적인 구성품 목록을 나열하여 소비자가 구매 제품을 정확히 파악하고 번들 구성을 비교할
        수 있도록 합니다.
    warp_beam_type:
      name: 경사빔 유형
      description: 직기에 포함되거나 장착된 날실 빔 구성을 지정합니다(직기와 함께 제공되는 빔 구성).
    washability:
      name: 세탁 용이성
      description: 접착제가 물로 세척 가능한지 및/또는 도포 후 씻어낼 수 있는지 여부를 나타냅니다.
    watch_band_design:
      name: 시계줄 디자인
      description: '시계줄의 제작 방식 또는 디자인 패턴을 설명합니다(예: NATO, 밀라네즈, 링크).'
    watch_movement:
      name: 시계 무브먼트
      description: 시계를 구동하는 메커니즘을 명시하며, 이는 소비자가 모델을 구분하는 데 사용하는 핵심 요소입니다.
    water_activation:
      name: 수중 활성화
      description: 비상 신호기가 물에 잠겼을 때 자동으로 작동하는지 여부를 나타냅니다(카테고리 I/II EPIRB에서 일반적임).
    water_chamber_configuration:
      name: 워터 챔버 구성
      description: '매트리스 내부 워터 블래더의 배치(예: 단일 또는 이중 챔버)를 설명하며, 이는 지지력, 온도 조절 및 함께 자는
        사람에게 전달되는 흔들림에 영향을 미칩니다.'
    water_dispensing_mechanism:
      name: 물 배출 방식
      description: 수도꼭지, 스프레이 노즐, 중력식 따르기 등 장치에서 물이 배출되는 방식을 정의합니다.
    water_exposure_protection_level:
      name: 수분 노출 보호 수준
      description: '제품이 물에 노출되었을 때의 보호 수준을 나타냅니다(예: 물 튐과 일시적 침수). 공식 IP 코드가 있는 경우
        방수/방진 등급을 사용합니다.'
    water_fed_design:
      name: 물 공급식 설계
      description: 이 브러시가 물 통과형 손잡이나 호스 연결부를 통해 흐르는 물과 함께 사용하도록 설계되었는지 여부를 나타냅니다.
    water_gun_features:
      name: 물총 기능
      description: 물총의 주요 기능적 특징과 포함된 기능을 나타냅니다.
    water_gun_operating_mechanism:
      name: 물총 작동 방식
      description: 물총이 사용 중에 물을 가압하고 분사하는 방식을 나타냅니다.
    water_gun_spray_pattern:
      name: 물총 분사 패턴
      description: 분사 시 노즐에서 나오는 물줄기의 유형을 나타냅니다.
    water_heating_method:
      name: 물 가열 방식
      description: 물을 사용하기 전에 가열하는지 여부와 가열 방식을 설명합니다. 예를 들어 태양열 흡수, 프로판 버너, 전기 발열체,
        배터리 구동식 가열, 보온 단열 또는 비가열 방식 등이 있습니다.
    water_mattress_construction:
      name: 워터 매트리스 구조
      description: '프레임 호환성과 전반적인 사용감을 결정하는 워터 매트리스의 구조 방식(예: 하드사이드 또는 소프트사이드)을 지정합니다.'
    water_play_features:
      name: 물놀이 기능
      description: 워터파크/슬라이드에 포함된 물놀이 구성품을 나타냅니다.
    water_polo_competition_approval:
      name: 수구 경기 승인
      description: 해당 공이 공식적으로 승인 또는 인증된 관리 기관 또는 대회 수준을 식별합니다.
    water_polo_goal_type:
      name: 수구 골 유형
      description: '골대의 구조 또는 장착 구성을 분류합니다(예: 부유식, 데크 장착식, 이동식).'
    water_pump_drive_type:
      name: 워터 펌프 구동 유형
      description: 차량 냉각 시스템에서 워터 펌프가 구동 또는 작동되는 방식을 명시합니다.
    water_pump_housing_material:
      name: 워터 펌프 하우징 소재
      description: 워터 펌프 하우징/본체의 소재를 나타냅니다.
    water_pump_impeller_material:
      name: 워터 펌프 임펠러 소재
      description: 워터 펌프 임펠러(냉각수를 이동시키는 내부 회전자/날개)의 소재를 지정합니다.
    water_pump_mounting_type:
      name: 워터 펌프 장착 유형
      description: '엔진 장착 적합성을 위한 워터 펌프의 장착 방식/폼 팩터를 지정합니다(예: 볼트온 하우징 또는 카트리지/인서트).'
    water_purification_method:
      name: 정수 방식
      description: '제품이 야외에서 물을 안전하게 마실 수 있는 상태로 만드는 주요 방식을 식별합니다(예: 펌프, 중력식 공급, 자외선
        살균).'
    water_resistance:
      name: 방수 기능
      description: 방수 또는 내수와 같이 제공되는 기상 조건 보호 수준을 나타냅니다.
    water_resistance_level:
      name: 방수 수준
      description: 해당 직물의 발수 여부와 발수 수준을 나타냅니다.
    water_resistance_rating_case_protection_level:
      name: 방수 등급(케이스 보호 수준)
      description: 롤링 케이스가 제공하는 방수/보호 수준을 나타냅니다. 이는 전자제품의 IP 씰링 등급이 아닌 마케팅 수준입니다.
        예를 들어 생활 방수와 완전 방수가 있습니다.
    water_rocket_kit_items_included:
      name: 물 로켓 키트 포함 품목
      description: 제품 패키지에 포함된 주요 구성품을 나타냅니다.
    water_rocket_propulsion_type:
      name: 물로켓 추진 타입
      description: 로켓 발사에 사용되는 주요 추진원/에너지원을 나타냅니다.
    water_rocket_recovery_system:
      name: 물 로켓 회수 장치
      description: 발사 후 로켓을 회수하는 데 사용되는 방법을 나타냅니다.
    water_ski_base_design:
      name: 수상스키 하부 형상
      description: 수상스키의 하부 형상을 지정하며, 이는 조작성에 영향을 미칩니다.
    water_ski_fin_type:
      name: 수상스키 핀 유형
      description: 수상스키의 핀 구성을 지정하며, 이는 방향 유지 및 조종성에 영향을 미칩니다.
    water_source:
      name: 급수원
      description: 탄산화 전 물의 산지/출처를 식별합니다.
    water_sports_safety_standard:
      name: 수상 스포츠 안전 기준
      description: '제품이 충족하는 공식 안전 또는 부력 표준을 나열합니다(예: 헬멧의 경우 CE EN 1385, 부력 보조 장치의
        경우 ISO 12402-5, USCG Type III).'
    water_table_feature_set:
      name: 물놀이 테이블 기능 구성
      description: 폭포, 분사기, 펌프, 다단 수조 등 물놀이 테이블에 내장된 놀이 기능을 나타냅니다.
    water_table_items_included:
      name: 물놀이 테이블 포함 품목
      description: '물놀이 테이블 세트에 포함된 액세서리(예: 보트, 컵, 깔때기, 피규어)를 명시합니다.'
    water_table_water_source_type:
      name: 물놀이 테이블 물 공급원 유형
      description: 물놀이 테이블을 채우거나 물을 공급하는 방법을 명시합니다.
    waterbed_stabilization_level:
      name: 워터베드 안정화 수준
      description: 워터베드 매트리스가 제공하는 물결 감소 또는 움직임 제어 정도를 나타냅니다.
    watercolor_ink_water_resistance_after_drying:
      name: 수채화 잉크 내수성(건조 후)
      description: 수채화 잉크가 건조 후 방수/내수성을 갖게 되는지 여부를 나타냅니다(제조업체 주장 기준).
    watercraft_care_application_area:
      name: 선박 관리 제품 적용 영역
      description: 해당 제품이 사용될 선박의 주요 부위 또는 구성 요소를 나타냅니다.
    watercraft_drive_mechanism:
      name: 선박 구동 방식
      description: 탑재되거나 지원되는 특정 선내 추진 방식을 설명합니다.
    watercraft_fuel_tank_sending_unit_pattern:
      name: 선박 연료 탱크 센더 유닛 패턴
      description: '연료 탱크 센더 유닛과 호환 게이지의 장착 패턴/표준을 지정합니다(예: 일반적인 해양용 볼트 패턴).'
    watercraft_fuel_tank_shape:
      name: 선박 연료 탱크 모양
      description: 공간 및 장착 적합성 계획을 지원하기 위해 연료 탱크의 전체적인 물리적 형태를 설명합니다.
    watercraft_hull_material:
      name: 선박 선체 소재
      description: 선체 구조의 주요 소재를 명시합니다.
    watercraft_ignition_part_voltage:
      name: 선박 점화 부품 전압
      description: '점화 부품의 정격 전압/요구 전압(해당되는 경우), 예: 12V 시스템.'
    watercraft_impeller_material_grade:
      name: 선박용 임펠러 소재 등급
      description: '선박 임펠러의 재질을 지정합니다(예: 네오프렌 고무, 니트릴, 고무색).'
    watercraft_lighting_certification_compliance:
      name: 선박 조명 인증/규정 준수
      description: '해당 조명이 해양용으로 인증받았거나 준수하는 규정/표준을 나타냅니다(예: USCG/ABYC/COLREGs 준수).'
    watercraft_motor_mount_adjustment_features:
      name: 선박용 모터 마운트 조정 기능
      description: '마운트의 조정 기능(예: 기울기, 높이, 슬라이드)을 설명하며, 이는 사용성과 장착 적합성에 영향을 미칩니다.'
    watercraft_piston_part_type:
      name: 선박용 피스톤 부품 유형
      description: 등록 정보가 어떤 피스톤 관련 부품을 나타내는지 식별합니다.
    watercraft_propeller_blade_rake:
      name: 선박 프로펠러 블레이드 레이크
      description: 블레이드 레이크를 지정하며, 이는 보우 리프트와 성능에 영향을 미칩니다.
    watercraft_propeller_rotation_direction:
      name: 선박 프로펠러 회전 방향
      description: '구동계 호환성을 위해 필요한 프로펠러 회전 방향/방향성을 나타냅니다(예: 우회전/표준 또는 좌회전/역회전).'
    watercraft_pump_stage_impeller_role:
      name: 선박 펌프 단계/임펠러 역할
      description: '임펠러가 특정 펌프 역할에 사용되는지 여부를 식별합니다(예: 원수/해수 펌프, 냉각수 순환, 제트 펌프).'
    watercraft_registration_status:
      name: 선박 등록 현황
      description: 세일보트에 소유권 증서 및/또는 등록 서류가 포함되어 있는지 여부를 나타냅니다.
    watercraft_safety_equipment_activation_type:
      name: 선박 안전 장비 작동 유형
      description: 안전 장치(비콘, MOB 경보, PLB)를 활성화하는 주요 방법을 나타내며, 팽창 방식과는 구분됩니다.
    watercraft_steering_cable_core_material:
      name: 선박 조향 케이블 코어 소재
      description: 힘을 전달하는 내부 케이블/코어의 소재를 지정합니다.
    watercraft_steering_cable_hardware_included:
      name: 수상 차량 조향 케이블 하드웨어 포함
      description: 조향 케이블에 포함되는 설치 하드웨어 및 액세서리를 명시합니다.
    watercraft_steering_cable_system_type:
      name: 선박 조향 케이블 체계 유형
      description: '케이블이 설계된 조향 체계 구조(예: 로터리식, 랙식)를 지정합니다.'
    watercraft_steering_wheel_hub_bore_type:
      name: 선박 조타기 허브/보어 유형
      description: '스티어링 휠이 허브 또는 어댑터에 결합되는 중앙 장착부/보어 인터페이스 방식(예: 테이퍼형, 스플라인형)을 지정합니다.'
    watercress_variety:
      name: 물냉이 품종
      description: 판매되는 물냉이의 특정 품종 또는 유형을 식별합니다.
    waterproof_level:
      name: 방수 등급
      description: 보증이 뒷받침되는 방수 성능 표시를 포함해 신발의 방수 보호 수준을 나타냅니다.
    wax_blend_composition:
      name: 왁스 혼합 구성
      description: 제품에 혼합된 왁스 소재 및/또는 판매되는 혼합 유형을 나열합니다.
    wax_coat_type:
      name: 왁스 코트 유형
      description: 해당 왁스가 베이스 코트, 탑 코트 또는 다목적/단일 코트 제형으로 사용되는지를 나타냅니다.
    wax_hardness:
      name: 왁스 경도
      description: 왁스의 상대적인 경도를 나타내며, 이는 다양한 설질에서의 내구성과 활주성에 영향을 미칩니다.
    wax_physical_form:
      name: 왁스의 물리적 형태
      description: '제공되는 양초 원료 왁스의 물리적 형태/모양을 나타냅니다. '
    wax_recommended_candle_application:
      name: 왁스 권장 양초 용도
      description: 해당 왁스가 주로 사용되는 양초 종류를 나타냅니다.
    wax_tackiness_level:
      name: 왁스 끈적임 수준
      description: 왁스가 블레이드에 제공하는 점착력/그립 수준을 설명합니다.
    weapon_system_integration:
      name: 무기 시스템 통합
      description: 차량에 통합 무기 시스템 또는 장착 장치가 포함되어 있는지 여부를 나타냅니다.
    weather_suitability:
      name: 기상 조건 적합성
      description: '장갑이 사용되도록 설계된 기상 조건(예: 추운 날씨 또는 습한 날씨)을 나타냅니다.'
    weave_finish:
      name: 직조/마감
      description: 넥타이의 질감과 광택에 영향을 미치는 주요 원단 직조 방식 또는 표면 마감을 설명합니다.
    weave_style:
      name: 직조 스타일
      description: 파나마 모자 제작에 사용되는 전통적인 직조 패턴을 명시하며, 이는 통기성, 유연성, 외관 및 가격에 영향을 미칩니다.
    weave_type:
      name: 직조 방식
      description: 원단의 질감, 광택 및 드레이프성에 영향을 미치는 직조 방식/구조 방식(직조 명칭)을 식별합니다.
    weaving_beater_edge_type:
      name: 직조 비터 가장자리 유형
      description: '씨실과 접촉하는 평면 비터의 작업 가장자리 형태를 설명합니다(예: 직선형, 톱니형).'
    weaving_beater_style:
      name: 위빙 비터 스타일
      description: 평면 직조 비터의 기능적 방식/형식을 식별합니다.
    weaving_shuttle_tip_style:
      name: 직조 셔틀 끝 모양
      description: 셔틀의 앞쪽 끝/코 부분 디자인을 지정하며, 이는 셔틀이 개구부를 통과하는 방식과 날실에 걸릴 가능성에 영향을 미칩니다.
    weaving_shuttle_use_case:
      name: 직조 셔틀 용도
      description: 셔틀이 설계되거나 최적화된 직조 용도를 지정합니다.
    webbing_construction_type:
      name: 웨빙 구조 유형
      description: 웨빙의 물리적 직조 방식 또는 브레이드 방식을 설명하며, 이는 취급 용이성, 강도 및 용도에 영향을 미칩니다.
    webbing_design:
      name: 웨빙 디자인
      description: 손가락 사이의 물갈퀴 모양에 대한 설명으로, 이는 저항 훈련과 추진력에 영향을 미칩니다.
    weight_adjustability:
      name: 무게 조절 기능
      description: '제품의 저항을 사용자가 변경할 수 있는지(예: 선택식 또는 하중 조절식) 아니면 단일 무게로 고정되어 있는지를
        설명합니다.'
    weight_integration_system:
      name: 웨이트 통합 체계
      description: 'BCD에 밸러스트 웨이트가 통합되는지 여부와 통합 방식(예: 탈착식 웨이트 포켓, 없음, 선택형 추가 장착)을
        설명합니다.'
    weight_plate_compatibility:
      name: 웨이트 플레이트 호환성
      description: 기계에 장착 가능한 웨이트 플레이트의 직경 규격(올림픽 규격, 표준 규격 또는 둘 다)을 지정합니다.
    weight_plate_style:
      name: 웨이트 플레이트 유형
      description: '웨이트 플레이트의 디자인/유형(예: 올림픽형, 범퍼형, 선택식)을 분류하여 호환성을 빠르게 필터링할 수 있습니다.'
    weightlifting_belt_style:
      name: 역도 벨트 유형
      description: '벨트의 전체적인 설계 또는 목적에 따른 구성을 분류합니다(예: 레버 벨트, 딥 벨트, 테이퍼 벨트).'
    weightlifting_federation_certification:
      name: 역도 연맹 인증
      description: IPF 또는 IWF와 같은 근력 스포츠 연맹의 공식 승인 또는 제품 규정 준수 여부를 나타냅니다.
    wetsuit_boot_height:
      name: 웨트슈트 부츠 높이
      description: 다리에서 부츠가 올라오는 높이/컷을 분류하며, 이는 커버 범위, 활동성 및 물 유입에 영향을 미칩니다.
    wetsuit_entry_system:
      name: 웨트슈트 착용 방식
      description: 웨트슈트를 입을 때 사용하는 개구부/지퍼 방식의 유형과 위치를 설명합니다.
    wetsuit_seam_construction:
      name: 웨트슈트 이음매 구조
      description: 이음매의 제작 및 씰링 방식을 명시하며, 이는 보온성, 유연성 및 내구성에 영향을 미칩니다.
    wheat_product_form:
      name: 밀 제품 형태
      description: 밀 제품의 물리적 또는 가공된 형태를 명시합니다.
    wheel_arrangement:
      name: 차륜 배열
      description: 증기 기관차의 차륜 배열(화이트식 표기법)을 명시하며, 이는 수집가들 사이에서 중요한 식별 특징이자 흔히 검색되는
        용어입니다.
    wheel_brake_type:
      name: 휠 브레이크 유형
      description: 카트 바퀴 또는 캐스터에 적용된 제동 구성을 자세히 설명합니다.
    wheel_chock_grip_features:
      name: 바퀴 고임목 그립 특징
      description: 표면과 타이어에 대한 고정력을 높이는 견인/그립 설계 특징을 나타냅니다.
    wheel_cleaner_acidity_ph_category:
      name: 휠 클리너 산도/pH 범주
      description: 휠 클리너가 산성, 중성 또는 알칼리성인지 여부를 나타냅니다. 선택적으로 pH 균형 제품으로 판매되는지 여부도 표시합니다.
    wheel_cleaner_formula_type:
      name: 휠 클리너 제형 유형
      description: '휠 클리너 및 관련 세척액의 주요 제형 범주(예: 산성, 비산성, pH 중성/균형 또는 철분 반응성)를 나타냅니다.'
    wheel_construction_type:
      name: 휠 구조 유형
      description: 휠의 제조/구조 방법을 명시합니다.
    wheel_contaminant_target:
      name: 휠 오염물질 제거 대상
      description: 세척제가 제거하도록 설계된 주요 오염물질 유형을 지정합니다.
    wheel_core_type:
      name: 휠 코어 유형
      description: 휠 코어의 구조 방식을 설명하며, 이는 무게, 강성 및 에너지 전달에 영향을 미칩니다.
    wheel_cylinder_inlet_port_thread_standard:
      name: 휠 실린더 입구 포트 나사산 규격
      description: '휠 실린더의 브레이크 라인 입구 포트 나사산 규격을 지정합니다(예: 미터식 버블 플레어, SAE 인버티드 플레어).'
    wheel_fastener_seat_type:
      name: 휠 패스너 시트 유형
      description: '휠에 맞물리는 러그 너트/볼트 시트 유형(예: 원뿔형/테이퍼형, 볼형/반경형, 평면형, 매그/섕크형)을 지정합니다.'
    wheel_illumination:
      name: 휠 조명
      description: 휠에 내장 조명이나 발광 기능이 있는지 여부를 나타냅니다.
    wheel_material:
      name: 휠 소재
      description: 휠의 주요 구성 소재를 식별하며, 이는 내구성, 접지력 및 진동 감쇠에 영향을 미칩니다.
    wheel_profile:
      name: 휠 프로파일
      description: 속도, 접지력 및 민첩성에 영향을 미치는 휠의 단면 모양을 설명합니다.
    wheel_setup_type:
      name: 휠 설치 유형
      description: 스케이트에 사용되는 휠 구성 방식을 정의합니다.
    wheel_system_finish:
      name: 휠 구성품 마감
      description: 림/휠과 특정 휠 부품/액세서리의 표면 마감/코팅을 나타냅니다.
    whip_style:
      name: 채찍 유형
      description: 특정 승마용 채찍 또는 크롭의 유형이나 사용 종목에 따라 제품을 분류합니다.
    whipped_cream_base:
      name: 휘핑크림 베이스
      description: '휘핑크림을 만드는 데 사용되는 주요 기본 원료(예: 유크림 또는 코코넛)를 식별합니다.'
    whipped_cream_form:
      name: 휘핑크림 형태
      description: 휘핑크림이 판매되는 물리적 형태를 나타냅니다.
    whistle_head_material:
      name: 휘슬 헤드 소재
      description: 호루라기 헤드/마우스피스(피플 블록/헤드)의 소재를 지정합니다.
    whistle_light_features:
      name: 호루라기 조명 기능
      description: '호루라기에 파티용 조명 효과(예: LED)가 내장되어 있는지 여부를 나타냅니다.'
    whistle_purpose:
      name: 호루라기의 용도
      description: 호루라기의 주요 용도(스포츠 코칭, 해양 안전, 반려견 훈련 등)를 식별합니다.
    whistle_sound_style:
      name: 호루라기 소리 유형
      description: '호루라기 소리 출력의 유형/특징을 설명합니다(예: 단음, 다중음).'
    white_glue_finish_appearance_when_dry:
      name: 건조 후 흰색 접착제 마감/외관
      description: '공예/사무용 접착제가 건조된 후 어떻게 보이는지 지정합니다(예: 투명, 불투명).'
    white_glue_washability:
      name: 흰색 풀 세척 가능 여부
      description: 건조된 접착제를 원단이나 피부에서 씻어내거나 닦아낼 수 있는지 여부를 나타냅니다.
    whitewater_kayak_style:
      name: 급류 카약 유형
      description: '급류 카약 분야의 주요 설계 용도(예: 크리크보트, 리버 러너, 플레이보트)를 나타냅니다.'
    whitewater_rating_class:
      name: 급류 난이도 등급
      description: 해당 래프트가 감당할 수 있는 국제 하천 난이도 등급의 최고 등급을 나타냅니다.
    whorl_mounting_interface:
      name: 휘를 장착 인터페이스
      description: 가락바퀴가 물레 축에 연결되는 방식(축 방식/연결 방식)을 나타냅니다.
    wick_construction_type:
      name: 심지 구조 유형
      description: 심지의 구조/방식(편조형, 평면형, 사각 편조형, 코어형, 목재형 등)을 나타냅니다.
    wick_core_type:
      name: 심지 코어 유형
      description: '심지에 코어가 없는지, 아니면 코어 소재(예: 종이 코어, 아연 코어)가 포함되어 있는지를 나타내며, 이에 따라
        심지의 강도와 연소 특성이 달라집니다.'
    wick_tab_crimp_type:
      name: 심지 탭 압착 유형
      description: 심지 탭이 심지를 고정하는 방식(구조/압착 방식)을 나타냅니다.
    wick_tab_material:
      name: 심지 탭 소재
      description: '부착된 탭/서스테이너(일반적으로 주석 도금 강판)의 소재를 나타내며, 내식성 및 규제상 선호 사항(예: 납 사용
        회피)과 관련됩니다.'
    wick_tab_shape:
      name: 심지 탭 모양
      description: 심지 탭 플레이트의 모양/형태를 나타냅니다.
    wick_type_included:
      name: 포함된 심지 유형
      description: 키트에 포함된 심지 소재/유형을 명시합니다.
    wig_fiber_material:
      name: 가발 섬유 소재
      description: 가발 모발에 사용된 주요 섬유를 식별하여 소비자가 스타일링 및 수명 특성이 다른 인모 또는 합성모 옵션 중에서 쉽게
        선택할 수 있도록 합니다.
    wildlife_attractant_scent:
      name: 야생동물 유인제향
      description: 야생동물을 유인하는 데 사용되는 주요 향을 식별하며, 여기에는 천연 먹이 향과 페로몬 유형의 향이 포함됩니다.
    willow_grade:
      name: 버드나무 등급
      description: 사용된 버드나무의 품질 등급을 명시하며, 나뭇결 구조와 전반적인 성능 수준을 나타냅니다.
    willow_type:
      name: 버드나무 유형
      description: 배트 블레이드에 사용된 버드나무 또는 대체 소재의 유형을 식별하며, 이는 성능, 내구성 및 가격에 큰 영향을 미칩니다.
    wind_up_mechanism_type:
      name: 태엽 메커니즘 유형
      description: 장난감을 감거나 작동시키는 방법을 명시합니다.
    wind_up_toy_movement_pattern:
      name: 태엽 장난감의 움직임 패턴
      description: 태엽을 감았을 때 발생하는 주요 움직임을 설명합니다.
    windbreak_purpose:
      name: 바람막이 용도
      description: 바람 막이의 주요 사용 목적을 정의합니다.
    windfoil_board_mounting_system:
      name: 윈드포일 보드 장착 체계
      description: 윈드포일 보드에 내장된 포일 박스 또는 장착 인터페이스를 지정합니다.
    windfoil_sail_style:
      name: 윈드포일 세일 방식
      description: 라이딩 방식 또는 종목에 따라 세일을 분류합니다.
    winding_direction:
      name: 와인딩 방향
      description: 시계 와인더에서 지원하는 회전 방향(시계 방향, 반시계 방향 또는 양방향)을 나타냅니다.
    winding_method:
      name: 씨실 권취 방법
      description: 씨실을 셔틀에 사용하기 위해 감거나 장착하는 방법을 나타냅니다.
    winding_speed_control_type:
      name: 권취 속도 제어 유형
      description: 사용 중 권취 속도를 제어하는 방법을 나타냅니다.
    winding_type:
      name: 권선 유형
      description: 베이스 현의 권선 구조(외부 감김 형태)를 지정합니다.
    windlass_control_station_type:
      name: 윈들러스 제어 스테이션 유형
      description: 윈들러스 작동을 위해 포함되거나 지원되는 제어 인터페이스 유형을 나타냅니다.
    windlass_mount_type:
      name: 윈들러스 장착 유형
      description: 윈들러스가 보트의 어느 위치에, 어떤 방식으로 장착되도록 설계되었는지를 나타냅니다.
    window_component_location:
      name: 창 부품 위치
      description: '차량 내 어느 창/개구부에 해당 부품이 적용되는지 지정합니다(예: 앞유리, 도어 유리, 뒷유리, 쿼터 글라스).'
    window_configuration:
      name: 윈도우 구성
      description: 윙포일 윙에 투명 시야창이 있는지 여부와 상대적인 크기를 나타냅니다.
    window_glass_construction:
      name: 창유리 구조
      description: 자동차 창유리의 안전/적층 구조를 명시합니다.
    window_glass_features:
      name: 창유리 특징
      description: '유리가 통합 차량 기술(예: 레인 센서 패드, 카메라 브래킷)을 지원하는지 여부를 나타냅니다.'
    window_glass_finish:
      name: 창유리 마감
      description: 자동차 창유리의 마감/착색/프라이버시 보호 처리를 지정합니다.
    window_glass_tint_color:
      name: 창유리 틴팅 색상
      description: 유리에 적용된 착색의 색조를 지정합니다(제품 전체 색상이 아님).
    window_glass_tint_level:
      name: 창유리 착색 수준
      description: 창유리의 출고 시/프라이버시 보호용 착색 농도(애프터마켓 필름 제외)를 대략적으로 나타냅니다. 정확한 VLT 값을
        알 수 없는 경우 설명형 수준을 사용합니다.
    window_net_latch_mechanism:
      name: 창문 방충망 잠금 장치
      description: '창문 방충망에 사용되는 잠금/해제 장치를 지정합니다(예: 푸시 버튼, 레버, 안전벨트형 버클).'
    window_net_mounting_hardware:
      name: 창문 방충망 장착 하드웨어
      description: '창문 안전망 장착에 사용되는 하드웨어 유형 또는 부착 방식(예: 클립형, 나사형, 후크/로드형)을 명시하거나,
        하드웨어 포함 여부를 나타냅니다.'
    window_net_opening_direction:
      name: 창문 안전망 열림 방향
      description: 비상 탈출 및 규정 준수를 위해 창문 안전망이 탑승자를 기준으로 어느 방향으로 열리거나 해제되는지를 지정합니다.
    window_regulator_operation:
      name: 창문 조절 장치 작동 방식
      description: 창문 조절 장치의 작동 방식(수동 크랭크 또는 전기식)을 지정합니다.
    windshield_coverage_area:
      name: 앞유리 커버 보호 범위
      description: '앞유리 커버가 차량 전면 외부의 어느 부분을 보호하도록 설계되었는지 명시합니다(예: 앞유리만 보호, 또는 와이퍼,
        사이드미러, 측면 유리, 보닛 가장자리 포함).'
    windshield_mount_attachment_method:
      name: 앞유리 거울/거치대 부착 방식
      description: 마운트가 앞유리 표면에 어떻게 부착되거나 고정되는지를 명시합니다.
    windshield_washer_fluid_seasonality:
      name: 앞유리 워셔액 계절별 용도
      description: '앞유리 워셔액 배합의 사용 계절/기후 또는 주요 용도를 나타냅니다(예: 겨울철 성에 제거용, 여름철 벌레 제거용,
        사계절용).'
    windsurf_fin_style:
      name: 윈드서핑 핀 방식
      description: '세일링 종목 또는 사용 방식에 따라 핀을 분류합니다(예: 웨이브, 슬라롬, 위드).'
    windsurfing_connection_standard:
      name: 윈드서핑 연결 표준
      description: 부품을 보드나 리그에 부착하는 데 사용되는 기계적 인터페이스 또는 박스 유형을 나타냅니다.
    windsurfing_sail_style:
      name: 윈드서핑 세일 스타일
      description: 세일의 용도 또는 사용 분야를 분류합니다. 예를 들어 웨이브, 프리라이드, 포일 등이 있습니다.
    wine_additive_type:
      name: 와인 첨가제 유형
      description: 이 제품이 어떤 유형의 와인 제조용 제품인지 지정합니다(재료, 첨가제, 효모, 청징제, 키트 등).
    wine_body:
      name: 와인 바디
      description: 와인의 무게감과 입안에서 느껴지는 질감을 묘사합니다.
    wine_carbonation:
      name: 와인 탄산감
      description: 와인이 스틸 와인, 세미 스파클링 와인, 스파클링 와인 중 어느 유형인지와 해당하는 경우 기포감의 강도를 나타냅니다.
    wine_making_ingredient_type:
      name: 와인 제조 재료 유형
      description: 와인 제조에 사용되는 소비용 첨가제 및 재료의 기능성 성분 범주를 지정합니다.
    wine_making_stage:
      name: 와인 제조 단계
      description: 해당 제품이 와인 제조 과정의 어느 단계에 사용될 예정인지 나타냅니다.
    wine_style:
      name: 와인 스타일
      description: 색상 외에 스틸 와인, 스파클링 와인, 주정 강화 와인 등 와인의 광범위한 생산 방식을 분류합니다.
    winemaking_process_stage:
      name: 와인 제조 과정 단계
      description: 해당 제품이 사용되는 와인 제조 과정의 주요 단계를 나타냅니다.
    wing_count:
      name: 날개 수
      description: 부메랑의 날개/암 수를 나타냅니다.
    wing_handle_type:
      name: 윙 핸들 유형
      description: 윙포일 윙에 적용된 핸드 그립 체계의 방식을 지정합니다.
    wing_part_type:
      name: 윙포일 윙 부품 유형
      description: 윙포일 윙의 특정 부품 또는 교체 부품을 식별합니다.
    wingfoiling_style:
      name: 윙포일링 방식
      description: 해당 제품이 대상으로 하는 특정 윙포일링 종목 또는 라이딩 방식을 나타냅니다.
    wiper_arm_finish:
      name: 와이퍼 암 마감
      description: 와이퍼 암에 적용되는 표면 마감 또는 보호 코팅을 나타내며, 내식성과 외관에 영향을 미칩니다.
    wiper_arm_pivot_mount_type:
      name: 와이퍼 암 피벗 장착 유형
      description: 와이퍼 암이 차량의 와이퍼 링크 또는 피벗에 장착되는 방식을 지정합니다.
    wiper_blade_attachment_type:
      name: 와이퍼 블레이드 부착 유형
      description: 와이퍼 블레이드를 와이퍼 암에 장착하는 데 사용되는 커넥터/부착 방식을 지정합니다.
    wiper_blade_rubber_material:
      name: 와이퍼 블레이드 고무 소재
      description: 유리에 닿아 닦는 요소(인서트/리필)의 소재를 나타냅니다.
    wiper_system_position:
      name: 와이퍼 장치 위치
      description: 차량에서 와이퍼 시스템의 장착 위치를 나타냅니다.
    wire_coating_material:
      name: 와이어 코팅 소재
      description: 와이어에 적용되는 외부 코팅/재킷 소재를 지정하며, 이는 심선 소재가 아닙니다. 내마모성과 비드 구멍을 통과하는
        매끄러움에 영향을 미칠 수 있습니다.
    wire_coating_type:
      name: 와이어 코팅 유형
      description: 와이어가 코팅/피복 처리되었는지 여부와 처리 방식(색상, 보호 기능 및 질감)을 명시합니다.
    wire_construction_type:
      name: 와이어 구조 유형
      description: 비즈 공예용 와이어의 물리적 구조(연선인지 단선인지, 코팅 여부 등)를 명시합니다.
    wire_finish:
      name: 와이어 마감
      description: '와이어에 적용되는 표면 마감, 코팅 또는 도금 처리(예: 광택 처리, 에나멜 처리, 아연 도금, 도금 처리)를
        지정하며, 이는 외관 및 변색/부식 저항성에 영향을 미칩니다.'
    wire_gauge_awg:
      name: 전선 굵기(AWG)
      description: 배선 하네스에 사용되는 도체의 미국 전선 규격(AWG) 사이즈를 나타냅니다.
    wire_insulation_material:
      name: 전선 절연재 소재
      description: 배선 하네스에 사용되는 전선 절연체/재킷 소재를 나타내며, 온도 및 화학 물질 저항성에 영향을 미칩니다.
    wire_packaging_type:
      name: 와이어 포장 유형
      description: 전선의 판매/포장 방식을 명시합니다.
    wire_shape_profile:
      name: 와이어 모양/프로파일
      description: 전선의 단면 모양을 설명합니다.
    wiring_configuration:
      name: 배선 구성
      description: 펜싱 에페가 전자 채점용으로 사전 배선되어 제공되는지, 배선되지 않았는지, 무선인지, 또는 비전자식 연습용인지를
        나타냅니다.
    wobbler_style:
      name: 워블러 스타일
      description: 크랭크베이트 또는 저크베이트와 같이 워블러의 특정 디자인/액션 방식을 정의합니다.
    wood_block_surface_preparation:
      name: 목재 블록 표면 준비 상태
      description: 목재 블록의 표면이 마감 및 공예 작업에 바로 사용할 수 있는 상태인지를 나타냅니다.
    wood_grain_direction:
      name: 나무결 방향
      description: 제품의 가장 긴 치수를 기준으로 한 목재 결의 방향을 나타내며, 이는 강도, 절단 특성 및 외관에 중요합니다.
    wood_slice_edge_style:
      name: 목재 슬라이스 가장자리 형태
      description: 슬라이스 가장자리의 상태를 나타냅니다. 예를 들어 자연 수피 가장자리인지 또는 매끄럽게 사포질된 가장자리인지를 나타냅니다.
    wooden_block_special_features:
      name: 목재 블록 특수 기능
      description: 목재 블록 세트에 포함된 주목할 만한 기능적 특징을 나타냅니다.
    woodwind_body_construction:
      name: 목관악기 본체 구조
      description: '악기가 일체형으로 제작되었는지 또는 여러 부분(예: 2피스/3피스)으로 제작되었는지를 나타내며, 이는 세척, 보관
        및 휴대성에 영향을 미칩니다.'
    woodwind_polishing_cloth_intended_use:
      name: 목관악기 광택용 천의 용도
      description: 이 천이 목관악기에서 주로 어떤 부분을 닦거나 광택 내는 용도로 설계되었는지 명시합니다.
    woodwind_small_part_type:
      name: 목관악기 소형 부품 유형
      description: '해당 품목이 어떤 종류의 클라리넷 소형 교체 부품인지 명시합니다(예: 키워크 하드웨어, 패드/코르크/펠트, 링).'
    woofer_mounting_type:
      name: 우퍼 장착 유형
      description: 우퍼의 의도된 장착/사용 방식(프리 에어형 또는 인클로저형)과 일반적인 자동차 장착 형태를 나타냅니다.
    woofer_surround_material:
      name: 우퍼 서라운드 소재
      description: 우퍼 서라운드(외부 서스펜션 링)에 사용되는 소재를 나타냅니다.
    worn_on_finger:
      name: 착용 손가락
      description: 골무 가이드를 어느 손가락에 착용해야 하는지 지정합니다.
    wrap_style:
      name: 랩 방식
      description: 벨트가 허리에 몇 바퀴 감기도록 설계되었는지를 나타냅니다.
    wrapping_occasion:
      name: 포장지 사용 행사
      description: 포장지가 주로 어떤 선물/기념 행사에 사용되도록 제작되었는지 나타냅니다.
    wrapping_paper_features:
      name: 포장지 특징
      description: 찢김 저항성, 재활용 소재 사용 여부, 미리 재단된 시트 형식 등 포장지의 기능 및 지속가능성 관련 속성을 나타냅니다.
    wrestling_dummy_design:
      name: 레슬링 더미 디자인
      description: '더미의 전체적인 신체 모양이나 자세(예: 서 있는 사람 형태 또는 던지기용 백)에 따라 적합한 훈련 방법이 결정됩니다.'
    wrestling_mat_safety_certifications:
      name: 레슬링 매트 안전 인증
      description: 매트가 충족하는 업계 또는 스포츠 단체의 안전 인증이나 표준을 나열합니다.
    wrist_strap_style:
      name: 손목 스트랩 스타일
      description: 손목 스트랩의 방식(또는 스트랩이 없는 경우)이 지지력과 착용감에 미치는 영향을 설명합니다.
    wrist_support_style:
      name: 손목 보호대 방식
      description: '손목 보호대의 구조 또는 방식(예: 브레이스, 장갑, 테이프, 랩)을 식별하여 사용자의 선호도 및 성능에 따른
        선택을 돕습니다.'
    xylophone_range_octaves:
      name: 실로폰 음역대(옥타브)
      description: '실로폰의 전체 음역을 옥타브로 나타낸 것 (예: 2.5 옥타브, 3 옥타브, 4 옥타브).'
    xylophone_resonator_type:
      name: 실로폰 공명기 유형
      description: 음을 증폭하는 데 사용되는 공명기 체계의 유형을 나타냅니다(있는 경우).
    yam_variety:
      name: 마 품종
      description: '판매되는 참마의 재배 품종 또는 일반 품종을 지정합니다(예: 보라색, 노란색, 코끼리발참마).'
    yarn_cutter_physical_style:
      name: 실 절단기 물리적 형태
      description: '이 카테고리 내에서 검색 및 필터링을 지원하기 위해 실 절단기의 물리적 형태(예: 펜던트, 링, 가위)를 식별합니다.'
    yarn_finish_or_effect:
      name: 실 마감 또는 효과
      description: 형광이나 금속성 반짝임과 같이 실에 적용된 특수한 시각적 또는 기능적 처리를 나타냅니다.
    yarn_guide_style:
      name: 실 가이드 형태
      description: 실 가이드 부품의 물리적 형태를 나타냅니다.
    yarn_swift_adjustability:
      name: 얀 스위프트 조절 기능
      description: 얀 스위프트를 조절할 수 있는지 여부와 조절 방식(확장 가능, 접이식)을 나타내며, 이는 보관 및 수용 가능한 실타래
        사이즈 범위에 영향을 미칩니다.
    yarn_swift_bearing_type:
      name: 얀 스위프트 베어링 유형
      description: '회전을 지지하는 메커니즘(예: 볼 베어링)을 설명하며, 이는 회전의 부드러움과 감기 속도에 영향을 미칩니다.'
    yeast_application:
      name: 이스트 용도
      description: 해당 효모 제품의 주된 용도(요리 또는 발효)를 나타냅니다.
    yo_yo_accessory_part_type:
      name: 요요 액세서리/부품 유형
      description: '제품이 어떤 요요 교체 부품 또는 액세서리인지 식별합니다(예: 요요 줄, 베어링, 반응 패드).'
    yo_yo_axle_system_type:
      name: 요요 축 체계 유형
      description: '요요 축의 구조 방식(예: 고정 축 또는 트랜스액슬)을 나타내며, 플레이 감각과 유지보수에 영향을 미칩니다.'
    yo_yo_bearing_size_class:
      name: 요요 베어링 사이즈 등급
      description: 해당되는 경우 요요에 사용되는 표준화된 베어링 사이즈 등급을 나타냅니다.
    yo_yo_bearing_type:
      name: 요요 베어링 타입
      description: 베어링 구성이 반응성 및 회전 특성에 미치는 영향을 나타냅니다.
    yo_yo_play_style:
      name: 요요 플레이 방식
      description: 요요의 주된 플레이 방식을 나타내며, 제품이 설계된 스트링/트릭 분야를 반영합니다.
    yo_yo_response_system:
      name: 요요 반응 체계
      description: 이 부품과 호환되도록 설계된 요요 반응 메커니즘을 명시합니다.
    yo_yo_responsiveness:
      name: 요요 반응성
      description: 요요가 당기면 손으로 돌아오는 반응형인지, 바인드 동작이 필요한 무반응형인지를 나타냅니다.
    yo_yo_string_material:
      name: 요요 줄 소재
      description: 요요 줄의 소재 구성을 나타냅니다.
    yogurt_base_ingredient:
      name: 요거트 베이스 원료
      description: 요구르트 제조에 사용되는 주요 우유 또는 식물성 원료를 식별합니다. 이는 식단 선호도와 알레르기 유발 물질을 고려하는
        데 매우 중요합니다.
    yoke_type:
      name: 요크 유형
      description: 모노포드에서 총기를 지지하는 거치대 또는 요크의 유형을 식별합니다.
    zill_playing_style:
      name: 질 연주 방식
      description: 의도된 연주 맥락/방식을 나타냅니다(일반적으로 벨리댄스용 또는 오케스트라/문화 음악 변형).
    zill_strap_material:
      name: 질 스트랩 소재
      description: 질스를 고정하는 데 사용되는 손가락 스트랩/고무 밴드의 소재를 나타내며, 포함된 경우 착용감, 내구성 및 그립감에
        영향을 미칩니다.
    zills_strap_adjustability:
      name: 질스 스트랩 조절 기능
      description: 동봉된 스트랩/고무줄을 착용감에 맞게 조절할 수 있는지 여부와 조절 방법을 나타냅니다.
    zipper_application:
      name: 지퍼 용도
      description: 해당 지퍼가 사용되도록 설계된 프로젝트 또는 용도를 지정합니다.
    zipper_chain_type:
      name: 지퍼 체인 유형
      description: 지퍼 체인/톱니의 구조 또는 유형을 명시합니다.
    zipper_end_type:
      name: 지퍼 끝 유형
      description: 지퍼 끝부분이 어떻게 마감되는지, 즉 분리형인지 폐쇄형인지 나타냅니다. 공예용 지퍼에 일반적으로 사용되는 분리형
        끝 부속품도 포함됩니다.
    zipper_gauge:
      name: 지퍼 규격
      description: '지퍼 체인의 굵기/사이즈 표기를 나타내며, 일반적으로 # 기호가 붙은 숫자(예: #3 또는 #5)로 표시됩니다.
        이 숫자는 톱니/코일 너비 및 용도와 관련이 있습니다.'
    zipper_opening_length:
      name: 지퍼 여밈 길이
      description: 전면 개구부에서 지퍼가 적용된 길이를 정의하여 풀 지퍼, 하프 지퍼, 쿼터 지퍼 방식을 구분합니다.
    zipper_pull_material:
      name: 지퍼 손잡이 소재
      description: 지퍼 손잡이 또는 손잡이 탭의 소재를 지정하며, 지퍼 톱니/체인 및 테이프와는 구분됩니다.
    zipper_pull_side:
      name: 지퍼 손슬라이더 위치
      description: 지퍼 손잡이를 어느 쪽에서 잡을 수 있는지 지정합니다.
    zipper_pull_strap_cord_tab_material:
      name: 지퍼 손잡이 스트랩/끈/탭 소재
      description: 지퍼 손잡이에 부착된 스트랩/끈/탭/태슬 구성품의 소재를 지정합니다(있는 경우, 주 지퍼 손잡이 하드웨어/본체 제외).
    zipper_reversibility_mechanism:
      name: 지퍼 양면 사용 메커니즘
      description: '지퍼가 양면으로 사용되는 방식을 명시합니다(예: 양면 슬라이더 또는 양면 의류용으로 설계된 플립/자동 잠금 슬라이더).'
    zipper_separating_type:
      name: 지퍼 분리 유형
      description: 지퍼가 아래쪽/위쪽에서 분리되는지 또는 끝이 막힌 형태인지 나타내어 재킷, 침낭, 가방 등과의 호환성을 확인할 수
        있습니다.
    zipper_side:
      name: 지퍼 위치
      description: 침낭을 윗면이 보이게 놓았을 때 주 지퍼가 어느 쪽에 있는지 지정합니다.
    zipper_slider_material:
      name: 지퍼 슬라이더 소재
      description: 지퍼 슬라이더(움직이는 메커니즘)의 소재를 명시하며, 이는 강도와 내식성에 영향을 미칠 수 있습니다.
    zipper_slider_pull_configuration:
      name: 지퍼 슬라이더/당김 손잡이 구성
      description: 지퍼에 슬라이더/손잡이가 하나인지 두 개인지, 그리고 손잡이가 슬라이더의 한쪽 또는 양쪽에 있는지를 나타냅니다.
    zipper_style:
      name: 지퍼 스타일
      description: '의류에 지퍼가 있는지와 지퍼 길이를 나타냅니다(예: 지퍼 없음, 쿼터 지퍼, 하프 지퍼, 풀 지퍼).'
    zipper_tape_material:
      name: 지퍼 테이프 소재
      description: 작업물에 봉제되는 지퍼 테이프(원단 부분)의 주 소재를 지정합니다.
    zipper_teeth_type:
      name: 지퍼 이빨 유형
      description: '지퍼 체인/톱니의 구조 방식(예: 코일형, 성형 플라스틱형, 금속형, 숨김형)을 지정하며, 이는 유연성, 강도
        및 일반적인 용도에 영향을 미칩니다.'
