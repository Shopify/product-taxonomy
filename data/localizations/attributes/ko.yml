    timing_belt_profile:
      name: 타이밍 벨트 프로파일
      description: '타이밍 벨트의 톱니 프로파일/모양 표준을 나타냅니다(예: 사다리꼴, 곡선형).'
    timing_belt_reinforcement_cord_material:
      name: 타이밍 벨트 보강 코드 소재
