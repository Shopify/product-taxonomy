    sugar_dispenser_mechanism:
      name: 설탕 디스펜서 메커니즘
      description: 설탕이 용기에서 배출되는 방식을 상세히 설명하여 소비자가 선호하는 분배 방식을 선택할 수 있도록 돕습니다.
    suitable_for_pool_shape:
