    compatible_crossbar:
      name: 호환 크로스바
      description: 랙의 차량 루프랙 크로스바와의 호환성을 나타내며(루프 장착형인 경우), 여기에는 크로스바의 형상 및 프로파일 규격이
        포함됩니다.
    compatible_cycling_cleat:
      name: 호환 사이클링 클릿
      description: 사이클링 슈즈가 호환되도록 설계된 클릿 또는 페달 시스템을 나타냅니다.
    compatible_cymbal_size:
      name: 호환 심벌즈 크기
      description: 케이스가 호환되도록 설계된 심벌의 직경(또는 최대 직경)을 나타냅니다. 이는 심벌 크기와의 호환성을 의미하며, 케이스의
        외경을 의미하지는 않습니다.
    compatible_device_type:
      name: 호환 장치 유형
      description: '거치대가 어떤 종류의 기기를 고정하도록 설계되었는지 나타냅니다(예: 모니터/TV, 태블릿, 스마트폰, 휴대용 DVD
        플레이어).'
    compatible_dock_structure_type:
      name: 호환 도크 구조 유형
      description: 계단은 도크 구조물에 설치되도록 설계되었습니다.
    compatible_dough_type:
      name: 호환 반죽 유형
      description: '도구가 함께 사용되도록 설계된 점토 또는 반죽의 종류나 브랜드를 나타냅니다(예: 일반 플레이도, 모델링 클레이).'
    compatible_drawing_ink_surface:
      name: 호환되는 드로잉 잉크 표면
      description: 최적의 성능을 위해 권장되는 표면 또는 기재를 나타냅니다.
    compatible_drivetrain_brand:
      name: 호환 구동계 브랜드
      description: 이 케이블이 호환되는 구동계 또는 제동 시스템 브랜드를 나열합니다.
    compatible_drivetrain_speeds:
      name: 호환 구동계 단수
      description: '크랭크 또는 체인링이 지원하는 구동계 단수를 나타냅니다(예: 10단).'
    compatible_equipment:
      name: 호환 장비
      description: 바이스가 고정하도록 설계된 동계 스포츠 장비의 유형을 나타냅니다.
    compatible_evap_system:
      name: 호환 EVAP 시스템
      description: '연료 캡이 EVAP 시스템 요구 사항(예: OEM 규격 밀봉)을 충족하고 엔진 경고등 점등 가능성을 줄이도록 설계되었는지를
        나타냅니다.'
    compatible_exercise_bike_style:
      name: 호환 운동용 자전거 유형
      description: 해당 액세서리 또는 교체 부품이 어떤 스타일의 운동용 자전거에 맞도록 설계되었는지 나타냅니다.
    compatible_fencing_weapon:
      name: 호환 펜싱 종목
      description: 재킷이나 라메가 어떤 펜싱 무기 또는 종목에 사용되는지 명시합니다.
    compatible_fiber_type:
      name: 호환 섬유 종류
      description: 드럼 카더가 효과적으로 처리하도록 설계된 주요 섬유 유형을 나타냅니다.
    compatible_fin_box_system:
      name: 호환 핀 박스 시스템
      description: '핀이 호환되도록 설계된 핀 박스 또는 장착 시스템을 식별하며, 이를 통해 서퍼는 자신의 서핑보드와 호환되는 핀을
        선택할 수 있습니다(예: FCS II, Futures, US Box).'
    compatible_fingerboard_radius:
      name: 호환 핑거보드 반경
      description: '카포가 균일한 압력을 제공하고 잡음을 줄일 수 있도록 호환되게 설계된 지판 곡률을 나타냅니다(예: 평면형, 곡면형,
        복합형).'
    compatible_finish_type:
      name: 호환 마감 유형
      description: 해당 스프레이가 안전하게 사용할 수 있는 악기 마감 유형을 나타냅니다.
    compatible_fishing_reel_type:
      name: 호환되는 낚시 릴 종류
      description: '액세서리가 호환되도록 설계된 낚시 릴의 종류(예: 스피닝, 베이트캐스팅, 플라이)를 지정합니다.'
    compatible_fly_line_weight:
      name: 호환되는 플라이 라인 무게
      description: 스풀에 감을 수 있도록 설계된 AFTMA 플라이 라인 무게를 나타냅니다.
    compatible_flywheel_type:
      name: 호환 플라이휠 유형
      description: 클러치 압력판이 함께 사용되도록 설계된 플라이휠 유형을 나타냅니다.
    compatible_football_kick_type:
      name: 호환 축구 킥 유형
      description: '제품이 사용되도록 설계된 킥 상황을 식별하며(예: 킥오프, 필드골), 이를 통해 선수는 적합한 장비를 빠르게 찾을
        수 있습니다.'
    compatible_fuel_system_type:
      name: 호환 연료 시스템 유형
      description: 세정제가 사용되도록 설계된 연료 공급 시스템을 나타냅니다.
    compatible_gas_type:
      name: 호환 가스 유형
      description: 페인트볼 공기 탱크에 저장하도록 설계된 압축 가스의 종류를 나타냅니다.
    compatible_gel_wax_additives:
      name: 호환 젤 왁스 첨가제
      description: '이 젤 왁스와 호환되는 첨가제 유형을 나타냅니다(예: 염료, 장식 삽입물).'
    compatible_glaze_layering:
      name: 호환 유약 레이어링
      description: 유약이 효과를 내기 위해 다른 유약과 겹쳐 바르도록 의도된 것인지 여부.
    compatible_golf_bag_type:
      name: 호환 골프백 유형
      description: 커버 또는 케이스가 어떤 골프백 규격에 맞는지 나타냅니다.
    compatible_ground_polarity:
      name: 호환 접지 극성
      description: 전압 조정기가 네거티브 접지 또는 포지티브 접지 차량 전기 시스템용으로 설계되었는지 (또는 극성에 민감하지 않은지)를
        나타냅니다.
    compatible_guitar_body_shape:
      name: 호환 기타 바디 형상
      description: 이 케이스가 어떤 기타 바디/형태에 맞도록 설계되었는지 나타냅니다.
    compatible_guitar_case:
      name: 호환 기타 케이스
      description: 가습기가 호환되도록 설계된 기타 케이스 유형을 나타내며, 해당 케이스 내에서 정상적으로 작동할 수 있도록 합니다.
    compatible_guitar_scale_length:
      name: 호환 기타 스케일 길이
      description: 현 세트가 호환되도록 설계된 기타 스케일 길이를 나타냅니다(권선 길이 및 전체 길이 기준).
    compatible_gun_platform:
      name: 호환 총기 플랫폼
      description: '제품이 호환되는 작동 플랫폼 또는 동력 방식을 나타냅니다(예: AEG, GBB, HPA).'
    compatible_hair_length:
      name: 적합한 모발 길이
      description: 모자가 편안하게 착용할 수 있는 최대 모발 길이 또는 볼륨을 명시합니다.
    compatible_head_and_neck_restraint_system:
      name: 호환되는 머리 및 목 보호 시스템
      description: '헬멧에 앵커 포인트가 포함되어 있는지 여부 및 머리·목 보호 시스템(예: HANS)과의 호환성을 나타내며, 앵커
        포스트의 포함 또는 장착 상태도 포함됩니다.'
    compatible_helmet_certification_standard:
      name: 호환 헬멧 인증 표준
      description: '액세서리가 지원하도록 설계된 헬멧 안전 규격 또는 인증 기준을 나타냅니다(예: 레이싱용 티어오프는 특정 경기 규정을
        참조하는 경우가 많음).'
    compatible_helmet_shell_size:
      name: 호환 헬멧 쉘 크기
      description: 교체용 내장 부품이 호환되는 헬멧 쉘 크기를 나타냅니다(쉘 크기는 보통 XS~S, M, L~XL 등의 범위로 구분됨).
    compatible_helmet_size:
      name: 호환 헬멧 크기
      description: 안면 보호대가 호환되는 헬멧 크기를 나타냅니다.
    compatible_helmet_type:
      name: 호환 헬멧 유형
      description: 목 보호대가 함께 사용되도록 설계된 헬멧 유형을 나타냅니다.
    compatible_hitch_receiver_size:
      name: 호환 히치 리시버 크기
      description: 액세서리가 호환되도록 설계된 히치 리시버 개구부의 크기를 나타냅니다(히치 장착형 랙 액세서리용).
    compatible_hook_size:
      name: 호환 후크 크기
      description: '정리함이 호환되도록 설계된 코바늘 크기 체계 및/또는 크기 범위를 나타냅니다(예: 미국 문자/숫자 규격, 미터법
        mm 규격).'
    compatible_horse_coat_type:
      name: 호환되는 말 털 종류
      description: '털 제거기가 사용되기에 가장 적합한 말 털의 특성을 나타냅니다(예: 두꺼운 겨울 털, 민감한 털).'
    compatible_host_platform:
      name: 호환 호스트 플랫폼
      description: '패드 컨트롤러가 호환되는 플랫폼 또는 장치 유형(예: Windows, macOS, iOS, Android)이나
        컴퓨터 없이 독립적으로 작동할 수 있는지 여부를 나타냅니다.'
    compatible_inflation_gas:
      name: 호환 주입 가스
      description: 풍선을 무엇으로 부풀릴지 지정합니다(공기, 헬륨 또는 둘 다).
    compatible_injection_type:
      name: 호환 주사 유형
      description: 해당 제품이 어떤 연료 분사 시스템을 세척하도록 설계되었는지 나타냅니다.
    compatible_instrument_surface_material:
      name: 호환 악기 표면/소재
      description: 광택제가 사용되도록 설계된 악기의 표면 또는 재질을 나타냅니다.
    compatible_intercom_system:
      name: 호환 인터컴 시스템
      description: 헬멧 인터콤 또는 통신 시스템의 장착 또는 설치를 위한 헬멧의 준비 상태 및 호환성을 나타냅니다.
    compatible_interior_material:
      name: 호환 내장재 소재
      description: '해당 얼룩 제거제가 차량 내부 어떤 재질에 안전하고 효과적인지 나타냅니다(예: 카펫, 직물 시트, 가죽, 비닐).'
    compatible_kayak_type:
      name: 호환 카약 유형
      description: 세일 키트가 장착되도록 설계된 일반적인 카약 스타일을 나열합니다.
    compatible_license_plate_hole_pattern:
      name: 호환 번호판 장착 구멍 패턴
      description: 마운트 또는 홀더가 지원하는 장착 구멍 구성을 나타냅니다(차량 측면 및/또는 번호판 측면).
    compatible_license_plate_size:
      name: 호환 번호판 크기
      description: 마운트/홀더가 호환되도록 설계된 지역 또는 규격 번호판 사이즈를 나타냅니다.
    compatible_loom:
      name: 호환 가능한 직기
      description: 평직용 북을 사용할 수 있는 직기 유형을 지정합니다.
    compatible_loom_type:
      name: 호환 직조기 유형
      description: '북을 어떤 직조 설정(예: 경직 헤들 직기 vs 태피스트리 직기)에서 사용하도록 설계되었는지 나타냅니다.'
    compatible_machine_type:
      name: 호환 머신 유형
      description: 이 프레임은 어떤 종류의 퀼팅 장비와 함께 사용하도록 설계되었는지 나타냅니다(손 퀼팅 전용, 가정용 재봉틀, 롱암
        퀼팅 기계).
    compatible_mast_type:
      name: 호환 마스트 유형
      description: '세일이 설계된 마스트 직경을 지정합니다: 축소 직경(RDM), 표준 직경(SDM) 또는 둘 다.'
    compatible_model_system_train_scale:
      name: 호환 모형 시스템(철도 축척)
      description: '해당되는 경우, 액세서리가 호환되는 모형 기차 확장/시스템을 지정합니다(예: HO, N, O).'
    compatible_mounting_surface:
      name: 호환 가능한 장착 표면
      description: 클립이 고정되도록 설계된 표면 또는 물체.
    compatible_mouthpiece_patch:
      name: 호환 마우스피스 패치
      description: 마우스피스가 마우스피스 쿠션/패치와 함께 사용하도록 설계되었는지 여부와 권장 패치 두께 범위를 나타냅니다.
    compatible_mouthpiece_type:
      name: 호환 마우스피스 유형
      description: 멜로폰이 사용하도록 설계된 마우스피스 유형 또는 섕크 규격을 나타냅니다(모델에 따라 일반적으로 프렌치 호른형 또는
        트럼펫형 리시버 사용).
    compatible_neck_profile_width:
      name: 호환되는 목 프로필/너비
      description: '카포가 어떤 기타 넥 프로필/폭에 맞도록 설계되었는지 나타냅니다(예: 좁은 일렉트릭 기타 vs 넓은 클래식 기타).'
    compatible_needle_size:
      name: 호환 바늘 크기
      description: '케이스가 어떤 바늘 크기/유형에 적합한지 나타냅니다(예: 자수, 태피스트리, 손바느질용 바늘 길이).'
    compatible_needle_system:
      name: 호환 바늘 시스템
      description: '해당 기계와 호환되는 바늘 시스템(예: 130/705H).'
    compatible_parking_brake_mechanism:
      name: 호환 주차 브레이크 메커니즘
      description: 캘리퍼가 통합형 주차 브레이크 메커니즘과 함께 작동하도록 설계되었는지 여부를 나타냅니다.
    compatible_pedal_instrument_type:
      name: 호환 페달 악기 유형
      description: '페달이 함께 사용되도록 설계된 악기를 나타냅니다(예: 디지털 피아노, 키보드/신디사이저, MIDI 컨트롤러).'
    compatible_pedal_type:
      name: 호환 페달 유형
      description: '스트랩 또는 클립이 호환되도록 설계된 페달 유형 또는 시스템을 나타냅니다(예: 플랫폼, SPD, Look Keo).'
    compatible_pin_type:
      name: 호환 핀 유형
      description: 매트가 어떤 유형의 핀과 함께 사용되도록 설계되었는지(또는 핀을 꽂을 수 있는 재질인지) 나타냅니다.
    compatible_pipe_filter_size:
      name: 호환 파이프 필터 크기
      description: 파이프가 수용하도록 설계된 필터의 크기 또는 유형을 나타냅니다(또는 필터가 필요 없음을 나타냄).
    compatible_plate_size:
      name: 호환 플레이트 크기
      description: 방탄복이 수용할 수 있는 방탄판의 크기 또는 표준화된 크기.
    compatible_play_vehicle_scale:
      name: 호환 장난감 차 스케일
      description: '액세서리가 호환되도록 설계된 장난감 축척을 나타내며(예: 1:64), 이를 통해 수집품 및 트랙 시스템과의 호환성을
        높일 수 있습니다.'
    compatible_playing_surface:
      name: 호환 경기장 표면
      description: 미식축구화가 사용되도록 설계된 경기장 또는 표면의 유형을 나타냅니다.
    compatible_pole_dimensions:
      name: 호환 폴 크기
      description: 액세서리가 맞는 기둥 단면적을 지정합니다.
    compatible_pole_shape:
      name: 호환 폴 형상
      description: 패딩이 호환되도록 설계된 폴 또는 기둥의 단면 형상을 나타냅니다.
    compatible_power_steering_system:
      name: 호환 파워 스티어링 시스템
      description: 해당 오일이 사용되도록 설계된 조향 시스템 유형을 나타냅니다.
    compatible_powerplant_type:
      name: 호환되는 발전소 유형
      description: '해당 부품이 사용될 BB탄 총의 추진 시스템(예: 스프링 피스톤, CO2, PCP)을 나타냅니다.'
    compatible_presser_foot:
      name: 호환 노루발
      description: '재봉틀에서 지원하는 노루발 장착/호환 시스템(예: 스냅온 방식 대 스크류온 방식, 로우/하이/슬랜트 생크)을 지정합니다.
        여러 시스템을 지원하거나 어댑터가 포함된 경우 ''범용/다중''을 사용하십시오.'
    compatible_protective_gear:
      name: 호환 보호 장비
      description: 목 보호대가 함께 사용되도록 설계된 다른 보호 장비를 나타냅니다.
    compatible_protective_gear_integration:
      name: 호환 보호 장비 연동 방식
      description: '보호대를 착용하거나 다른 장비와 연동하는 방식을 설명합니다(예: 삽입 포켓형, 독립형 스트랩 부착식).'
    compatible_punching_bag_type:
      name: 호환 샌드백 유형
      description: 제품이 호환되는 펀칭 백 또는 트레이닝 백의 유형을 나타냅니다.
    compatible_racing_discipline:
      name: 호환 레이싱 종목
      description: 해당 헬멧이 사용 목적/인증된 모터스포츠 종목.
    compatible_rc_scale:
      name: 호환 RC 축척
      description: '액세서리 또는 부품이 호환되도록 설계된 RC 축척 비율을 나타냅니다(예: 1:10).'
    compatible_recorder_size:
      name: 호환 리코더 크기
      description: 해당 케이스가 어떤 크기의 레코더에 맞도록 설계되었는지 명시합니다.
    compatible_recorder_type:
      name: 호환 리코더 유형
      description: '해당 액세서리가 호환되는 리코더 유형(패밀리/사이즈)을 지정합니다(예: 소프라노, 알토).'
    compatible_reed_cut:
      name: 호환 리드 컷
      description: '해당 리가처가 호환되도록 설계된 리드 커팅 스타일을 지정합니다(예: 파일/프렌치 컷 대 파일 미처리/아메리칸 컷).'
    compatible_reed_type:
      name: 호환 리드 유형
      description: 마우스피스가 설계된 리드의 절단 방식/유형을 지정합니다.
    compatible_reel_type:
      name: 호환 릴 유형
      description: 가방, 케이스 또는 커버가 호환되도록 설계된 낚시 릴의 유형을 나타냅니다.
    compatible_refrigerant_type:
      name: 호환 냉매 유형
      description: 에어컨 증발기가 사용되도록 설계된 냉매 유형을 나타냅니다.
    compatible_ride_equipment:
      name: 호환 승용 장비
      description: 경사로가 사용되는 바퀴 달린 스포츠 장비의 종류.
    compatible_roof_height:
      name: 호환 지붕 높이
      description: 커버가 호환되도록 설계된 지붕 형상을 나타냅니다(표준형 또는 확장형/하이루프형).
    compatible_roof_rail_type:
      name: 호환 루프레일 유형
      description: 기본 루프랙 시스템이 장착되도록 설계된 지붕 구성을 나타냅니다.
    compatible_rope_count:
      name: 호환 로프 수
      description: '해당 부품이 설계된 권투 링 로프 구성을 지정합니다(예: 3줄 링, 4줄 링 또는 범용).'
    compatible_rope_type:
      name: 호환 로프 유형
      description: 해당 장치와 함께 사용할 수 있는 로프 구조를 지정합니다.
    compatible_saddle_type:
      name: 호환 안장 유형
      description: 액세서리가 어떤 안장 스타일이나 승마 종목에 맞도록 설계되었는지 명시하여, 영국식, 서부식 및 기타 안장과의 정확한
        호환성을 보장합니다.
    compatible_saxophone_size:
      name: 호환 색소폰 크기
      description: '제품이 호환되는 색소폰 종류를 나타냅니다(예: 소프라노, 알토, 테너).'
    compatible_saxophone_type:
      name: 호환 색소폰 유형
      description: 리가처 또는 캡이 호환되도록 설계된 색소폰 종류를 나타냅니다.
    compatible_scale_length:
      name: 호환 스케일 길이
      description: '현이 사용되도록 설계된 기타 스케일 길이 범위를 식별합니다(예: 쇼트 스케일, 표준, 바리톤).'
    compatible_seat_airbag:
      name: 호환 시트 에어백
      description: 해당 시트가 측면 에어백을 지원/포함하는지 또는 시트 장착형 에어백이 장착된 차량과 호환되는지 여부를 나타냅니다.
    compatible_seating_capacity:
      name: 호환 좌석 수
      description: 액세서리가 호환되도록 설계된 좌석 수 또는 좌석 구성을 나타냅니다.
    compatible_sensor_port_type:
      name: 호환 센서 포트 유형
      description: 오일 팬이 오일 레벨 및/또는 오일 온도 센서를 지원하는지 여부와 해당되는 경우 포트 스타일을 지정합니다.
    compatible_shifter_type:
      name: 호환 시프터 유형
      description: 변속 부츠가 맞도록 설계된 변속 레버 유형 또는 구성을 식별합니다.
    compatible_shis:
      name: 호환 SHIS
      description: '부품이 호환되는 표준 헤드셋 식별 시스템(SHIS) 코드를 나열합니다(예: IS42, EC34, ZS44/28.6).'
    compatible_skating_discipline:
      name: 호환 스케이팅 종목
      description: 해당 부품 또는 액세서리가 호환되도록 설계된 스케이팅 종목을 나타냅니다.
    compatible_snowshoe_deck_type:
      name: 호환 스노슈 데크 유형
      description: 바인딩이 호환되는 스노슈 프레임 또는 데크 유형을 나타냅니다.
    compatible_special_effects_lighting_features:
      name: 호환 특수 효과 조명 기능
      description: 유닛 연결이나 오디오 반응과 같이 색상이나 패턴 외에 특수 효과 조명 구매 결정에 영향을 주는 주요 기능을 나타냅니다.
    compatible_spinning_wheel_drive_system:
      name: 호환 물레 구동 방식
      description: 해당 액세서리가 지원하는 회전 휠 구동 시스템을 지정합니다.
    compatible_spoke_gauge:
      name: 호환 가능한 스포크 게이지
      description: 스포크 와이어 게이지 크기가 니플 스레드에 맞는 것을 표시하여, 스포크와 니플을 올바르게 일치시킬 수 있습니다.
    compatible_steering_wheel_airbag:
      name: 호환되는 스티어링 휠 에어백
      description: 스티어링 휠이 순정(OEM) 에어백 모듈을 유지할 수 있도록 설계되었는지 또는 에어백이 없는 용도로 설계되었는지를
        나타냅니다.
    compatible_steering_wheel_control_button:
      name: 호환 스티어링 휠 제어 버튼
      description: 순정 스티어링 휠 장착 컨트롤(오디오/크루즈/전화) 및 관련 배선과의 호환성을 나타냅니다.
    compatible_stencil_material:
      name: 호환 스텐실 소재
      description: '이 기계로 스텐실을 제작하거나 가공할 수 있는 재료(예: 종이, 플라스틱 필름, 마일라).'
    compatible_stencil_media_format:
      name: 호환 가능한 스텐실 미디어 형식
      description: 기계가 지원하는 스텐실 매체 형식(시트형, 롤형 또는 둘 다)을 나타냅니다.
    compatible_strap_retractor:
      name: 호환 스트랩 리트랙터
      description: 스트랩이 자동 권취 시스템과 호환되는지 또는 비권취식(고정식) 벨트용으로 설계되었는지를 나타냅니다.
    compatible_string_instrument_finish:
      name: 호환 현악기 마감
      description: 광택제를 안전하게 사용할 수 있는 악기의 표면 마감 유형을 나타냅니다.
    compatible_substrate_material:
      name: 호환 기판 소재
      description: 페인트가 접착되도록 제조된 표면 재질을 나타냅니다.
    compatible_surface:
      name: 호환 표면
      description: 후크 앤 루프 접착제가 부착되도록 설계된 표면 또는 재질을 나타냅니다.
    compatible_surface_material:
      name: 호환 표면 소재
      description: 제품이 사용되도록 설계된 차량 표면 재질을 나타냅니다.
    compatible_tear_off_system:
      name: 호환 티어오프 시스템
      description: 고글에 티어오프 및/또는 롤오프 필름을 지원하는지 여부와 티어오프 필름 장착용 포스트가 있는지 여부를 나타냅니다.
    compatible_thermostat_type:
      name: 호환 온도조절기 유형
      description: 워터 넥 또는 하우징이 서모스탯을 장착하도록 설계되었는지 여부와, 장착 가능한 경우 해당 서모스탯의 유형 또는 크기를
        나타냅니다.
    compatible_thread:
      name: 호환 실
      description: 실꿰기가 어떤 종류의 실/섬유(두께/종류)를 처리하도록 설계되었는지 나타냅니다.
    compatible_thread_spool_format:
      name: 호환 실/스풀 형식
      description: 상자가 보관하도록 설계된 실 형식(스풀, 보빈, 치실 보빈/카드, 콘 등)을 나타냅니다.
    compatible_thread_yarn_tool:
      name: 호환 실 및 원사 공구
      description: '다른 장비에 장착하거나 함께 사용하는 공구의 기계 또는 시스템 호환성을 나타냅니다(예: 재봉틀, 오버로크 재봉기,
        직기, 물레).'
    compatible_tire_application:
      name: 호환 타이어 앱
      description: 비드 브레이커가 사용되도록 설계된 타이어 또는 휠의 적용 분야를 나타냅니다(차량 모델이 아니라 작업 대상인 타이어
        또는 휠 기준).
    compatible_tom_pad_mounting:
      name: 호환 탐 패드 장착 방식
      description: '전자 탐탐이 어떤 방식으로 장착되는지를 나타냅니다(예: 클램프/로드 마운트, L로드, 스탠드 마운트). 이는 기존
        랙 시스템과의 호환성에 영향을 미칩니다.'
    compatible_toy_vehicle_scale:
      name: 호환 완구 차 스케일
      description: 플레이세트와 호환되는 장난감 차량 확장 모델 또는 대략적인 차량 크기를 나타냅니다.
    compatible_tpms_sensor_type:
      name: 호환 가능한 TPMS 센서 유형
      description: 휠이 TPMS 센서 및/또는 필요한 밸브/센서 유형을 지원하는지 여부를 지정합니다.
    compatible_training_equipment:
      name: 호환 훈련 장비
      description: 거치대에 부착할 수 있는 훈련 또는 피트니스 장비의 종류를 나열합니다.
    compatible_treadmill_design:
      name: 호환 러닝머신 유형
      description: 액세서리가 호환되는 런닝머신 디자인(접이식 또는 비접이식 모델 등)을 명시합니다.
    compatible_tube:
      name: 호환 튜브
      description: '패치가 설계된 튜브 또는 타이어 구조를 나타냅니다(예: 부틸, 라텍스, TPU 또는 튜브리스).'
    compatible_valve_type:
      name: 호환 밸브 유형
      description: 윤활유가 호환되는 금관악기 밸브 유형을 나타냅니다.
    compatible_vaporizing_material:
      name: 호환 기화 물질
      description: 장치가 기화하도록 설계된 재료 유형을 나타냅니다.
    compatible_vehicle_windshield_fluid:
      name: 호환 차량 워셔액
      description: '차량 장비 또는 유리 표면 처리와 관련된 호환성 정보를 나타냅니다(예: 발수 코팅 사용 가능, 헤드라이트 워셔
        사용 가능).'
    compatible_visor_system:
      name: 호환 바이저 시스템
      description: 오토바이 헬멧이 호환되는 바이저 또는 인서트 시스템 유형을 나타냅니다.
    compatible_water_board_type:
      name: 호환 워터 보드 유형
      description: 랙이 운반하도록 설계된 수상 스포츠 보드의 유형을 나타냅니다.
    compatible_water_sport_board_type:
      name: 호환 수상 스포츠 보드 유형
      description: 랙이 운반하도록 설계된 보드 유형을 나열합니다.
    compatible_watercraft_communication_standard:
      name: 호환 가능한 선박 통신 표준
      description: 선박 내 전자 장비와의 상호 운용성을 위해 지원되는 해양 통신·네트워크 표준 또는 통합 프로토콜을 나타냅니다.
    compatible_watercraft_engine_type:
      name: 호환되는 선박 엔진 유형
      description: 부품이 호환되는 추진 장치 구성을 나타냅니다(선외기, 선내기, 스턴드라이브, 제트 드라이브).
    compatible_weight_plate_diameter:
      name: 호환 중량판 직경
      description: 기계가 사용할 수 있는 무게판 직경을 지정합니다.
    compatible_wheel_finish:
      name: 호환 휠 마감
      description: 세정제를 안전하게 사용할 수 있는 휠의 마감 또는 재질을 나타냅니다(제조사 기준).
    compatible_whorl_drive_band_type:
      name: 호환 플라이어 바퀴 드라이브 밴드 유형
      description: 해당 휠이 어떤 드라이브 밴드 스타일과 함께 작동하도록 설계되었는지 지정합니다.
    compatible_wick_series:
      name: 호환 심지 시리즈
      description: 판매자가 지정한 경우, 해당 탭이 호환되는 일반적인 심지 시리즈/유형(업계 명칭)을 나타냅니다.
    compatible_winder_head_bit:
      name: 호환되는 와인더 헤드/비트
      description: '와인더가 지원하는 튜너 키 또는 헤드 인터페이스 유형을 나타냅니다(예: 슬롯형 헤드, 교체형 비트, 범용 헤드).'
    compatible_windlass_rode:
      name: 호환 윈들러스 로드
      description: 윈들러스가 처리하도록 설계된 앵커 로드의 유형을 나타냅니다.
    compatible_windshield_type:
      name: 호환되는 앞유리 유형
      description: 해당 인클로저가 어떤 앞유리 구성과 함께 사용되도록 설계되었는지 지정합니다.
    compatible_wood:
      name: 호환 목재
      description: 광택제가 사용하기에 권장되거나 안전한 지판 목재 유형을 나타냅니다.
    compatible_writing_surface:
      name: 호환 필기면 유형
      description: 잉크가 최상의 성능을 발휘하도록 설계된 표면/Paper 지정합니다.
    compatible_zipper_size:
      name: 호환 지퍼 크기
      description: '지퍼 크기(일반적으로 #3, #5, #8, #10 등으로 표시됨)에 맞는 손잡이를 나타내어 호환성 필터링을 향상시킵니다.'
    compliance_certification:
      name: 규정 준수 인증
      description: 라이트바가 충족하는 도로 주행 및 전자파 적합성 관련 규정 또는 인증 기준을 나타냅니다.
    component_position:
      name: 구성품 위치
      description: '엔진 타이밍 어셈블리 내에서 해당 부품의 상대적 위치를 지정합니다(예: 전면 커버/후면 커버, 상단/하단). 차량의
        전방/후방 배치가 아닙니다.'
    concentration_level:
      name: 농도 수준
      description: 토마토 페이스트의 농축 정도를 나타냅니다(싱글, 더블, 트리플). 이는 레시피 요구 사항에 맞는 제품을 선택하는
        데 유용합니다.
    concentration_type:
      name: 농도 유형
      description: 제품이 바로 사용할 수 있는 형태인지 농축형인지, 그리고 농축형인 경우 일반적인 희석 지침을 나타냅니다.
    concert_bass_drum_mounting_stand_type:
      name: 콘서트 베이스드럼 장착 스탠드 유형
      description: 콘서트 베이스드럼을 연주 시 지지하거나 장착하는 방식을 설명합니다.
    concert_pitch_standard:
      name: 콘서트 피치 표준
      description: '할인 시점의 피아노 조율 기준음정(A4)을 지정합니다(예: A440, A442, A444).'
    condiment_form:
      name: 양념 형태
      description: '고추냉이 제품의 물리적 형태 또는 질감을 나타냅니다(예: 페이스트, 분말, 크림).'
    condiment_texture:
      name: 조미 식품 질감
      description: '렐리시 또는 처트니의 질감을 설명합니다(예: 덩어리가 있는 형태, 부드러운 형태).'
    confetti_format:
      name: 컨페티 형태
      description: '콘페티의 포장 방식이나 발사 방식(예: 흩뿌리는 형태 대 팝퍼/캐논)에 따라 콘페티 제품의 형식을 지정합니다.'
    conga_head_tensioning_system:
      name: 콩가 헤드 장력 조절 방식
      description: '콩가 헤드의 장력 조절/튜닝에 사용되는 하드웨어 유형(예: 전통적인 러그 튜닝 방식 대 현대적인 퀵 튜닝 메커니즘).'
    conga_set_included_drum_types:
      name: 콩가 세트에는 다양한 드럼 종류가 포함되어 있습니다.
      description: '콩가 세트에 포함된 콩가의 유형을 나타냅니다(예: 퀸토 + 콩가 + 툼바).'
    connector_case_style:
      name: 커넥터 케이스 스타일
      description: '커넥터 케이스의 전반적인 구조 유형을 분류합니다(예: 하드 케이스, 소프트 파우치). 이는 보호 수준과 휴대성을
        반영합니다.'
    console_cover_installation_method:
      name: 콘솔 커버 설치 방식
      description: '콘솔 커버가 콘솔/팔걸이에 부착되는 방식(예: 끼우는 방식, 탄성 스트랩, 벨크로, 접착식, 클립형)을 명시합니다.'
    console_display_type:
      name: 콘솔 디스플레이 유형
      description: '기기에 제공되는 사용자 디스플레이 유형을 식별합니다(예: LCD, LED, 터치스크린).'
    construction_design:
      name: 구조 설계
      description: '패드가 몇 개의 분리형 부품으로 구성되어 있는지 나타내며, 이는 움직임의 유연성에 영향을 미칩니다(예: 1피스
        대 3피스).'
    contact_angle:
      name: 접촉각
      description: '베어링 레이스의 접촉각을 나타내며, 단일 각도 또는 각도 조합(예: 36°/45°)으로 표시됩니다.'
    contact_juggling_ball_fill_type:
      name: 콘택트 저글링 볼 충전재 유형
      description: 공이 속이 꽉 차 있는지 아니면 내부가 비어 있는지(내부가 채워진 경우 어떤 종류의 충전재인지)를 파악합니다. 이는
        무게 배분과 내구성에 영향을 미칩니다.
    contact_juggling_ball_transparency:
      name: 콘택트 저글링 볼 투명도
      description: 볼의 투명도 또는 광학적 외관을 나타냅니다.
    contact_surface_material:
      name: 접촉면 소재
      description: '악기와 접촉하는 부분에 사용된 재질(예: 코르크/고무)을 식별하여 긁힘을 방지하고 그립감을 향상시킵니다.'
    container_material:
      name: 컨테이너 재질
      description: '제품의 소매유통업 용기의 주 재질을 명시합니다(예: 유리, PET 플라스틱, 알루미늄).'
    contaminant_removal:
      name: 오염물질 제거
      description: 제품이 제거하거나 감소시키는 것으로 인증된 오염물질의 종류를 나열합니다.
    contra_alto_clarinet_body_configuration:
      name: 콘트라알토 클라리넷 본체 구조
      description: '콘트라알토 클라리넷의 물리적 구조 형태를 설명합니다(예: 직선형, 접이식 구조).'
    contra_alto_clarinet_lowest_note_extension:
      name: 콘트라알토 클라리넷 최저음 확장
      description: 악기의 최저 연주 가능 음역(키워크가 허용하는 가장 낮은 음)을 지정하며, 일반적으로 저음 E♭, 저음 D, 저음
        C 모델을 구분하는 데 사용됩니다.
    contra_bass_clarinet_bell_type:
      name: 콘트라베이스 클라리넷 벨 유형
      description: 콘트라베이스 클라리넷에 사용되는 벨 구조.
    contra_bass_clarinet_bore_type:
      name: 콘트라베이스 클라리넷 보어 유형
      description: 악기의 보어 설계를 나타냅니다.
    contra_bass_clarinet_lowest_written_note:
      name: 콘트라베이스 클라리넷 최저음
      description: 이 악기가 연주할 수 있는 가장 낮은 음(대개 낮은 C와 낮은 Eb의 음역 범위에 따라 달라짐).
    control_arm_bushing_material:
      name: 컨트롤 암 부싱 재질
      description: 포함된/설치된 부싱이 있는 경우, 해당 부싱의 재질을 명시합니다.
    control_arm_bushings_included:
      name: 컨트롤 암 부싱 포함 여부
      description: 컨트롤 암에 부싱이 설치되어 있는지 여부를 나타냅니다.
    control_arm_finish:
      name: 컨트롤 암 마감
      description: 컨트롤 암에 적용된 보호 마감을 나타내며, 이는 부식 방지와 외관에 영향을 미칩니다.
    control_arm_grease_fitting_type:
      name: 컨트롤 암 그리스 주입구 유형
      description: 컨트롤 암 또는 볼 조인트 어셈블리에 그리스 주입구(저크)가 포함되어 있는지 여부와 정비 가능한 구조인지를 나타냅니다.
    control_arm_material:
      name: 컨트롤 암 재질
      description: 컨트롤 암 본체의 주요 재질과 제조 구조를 나타냅니다.
    control_arm_position:
      name: 컨트롤 암 위치
      description: '컨트롤 암이 사용되도록 설계된 서스펜션 위치를 나타냅니다(예: 상부/하부, 전방/후방, 좌측/우측).'
    control_arm_style:
      name: 컨트롤 암 스타일
      description: 서스펜션 구성에 사용된 컨트롤 암의 형상 또는 설계 유형을 식별합니다.
    control_cable_connector_type:
      name: 제어 케이블 커넥터 유형
      description: '제어 케이블이 제어 장치 및 엔진과 연결되는 데 사용하는 끝단 또는 커넥터 유형을 나타냅니다(예: OEM 전용
        엔드 피팅).'
    control_voltage_or_gate_connectivity:
      name: 제어 전압 또는 게이트 연결 방식
      description: 모듈러/아날로그 장비와의 연동을 위한 제어 전압/게이트 연결 지원 여부를 지정합니다.
    controller_function:
      name: 컨트롤러 기능
      description: '러닝머신 제어 보드의 주요 기능(예: 모터 제어, 전원 공급, 인버터 구동 등)을 정의합니다.'
    controller_type:
      name: 컨트롤러 유형
      description: 호환성 및 성능과 관련된 컨트롤러 특성에 초점을 맞춰 스쿠터 EV 전환 키트에 포함된(또는 사용에 필요한) 모터
        컨트롤러/제어 시스템을 지정합니다.
    conversion_kit_cooling_method:
      name: 전환 키트 냉각 방식
      description: 모터, 인버터 및 배터리 통합 시스템에 사용되는 주요 열 관리 방식을 나타냅니다.
    conversion_kit_installation_complexity:
      name: 전환 키트 설치 복잡성
      description: 일반적인 사용자의 기술 수준과 필요한 공구를 기준으로 예상되는 설치 난이도를 나타냅니다.
    converted_bed_size:
      name: 변환 후 침대 크기
      description: 이 키트를 설치할 때 유아용 침대가 전환될 침대 크기 또는 구성을 나타냅니다.
    convertible_configuration:
      name: 변환 가능한 구성
      description: '제품이 변환될 수 있는 침대 구성의 수를 나타냅니다(예: 3-in-1 유아용 침대 → 유아 침대 → 데이베드).'
    convertible_high_chair_modes:
      name: 컨버터블 유아용 식탁 의자 모드
      description: 의자가 변환될 수 있는 좌석 구성을 나타냅니다.
    cookie_decorating_kit_items_included:
      name: 쿠키 장식 키트 품목 포함
      description: '상자에 어떤 재료가 들어 있는지 고객이 정확히 알 수 있도록 제공되는 개별 장식용 부자재를 나열합니다(예: 아이싱
        튜브, 스프링클, 쿠키 커터).'
    cookie_variety:
      name: 쿠키 종류
      description: 소비자가 원하는 유형을 빠르게 찾을 수 있도록 쿠키의 구체적인 종류를 식별합니다.
    cooking_state:
      name: 조리 상태
      description: '판매 중인 닭고기 제품의 조리 상태를 나타냅니다(예: 생고기, 완전 조리, 양념 처리).'
    coolant_additive_purpose:
      name: 냉각수 첨가제 용도
      description: 냉각수 첨가제의 주된 용도(라디에이터 세정제나 전용 밀봉제는 제외).
    coolant_base_fluid:
      name: 냉각수 기본액
      description: 부동액 또는 냉각수 제형에 사용된 주요 글리콜 기반 성분을 식별합니다.
    coolant_outlet_connection_style:
      name: 냉각수 배출구 연결 방식
      description: 라디에이터 호스 또는 냉각수 라인을 연결하는 데 사용되는 배출구 연결 방식의 유형을 나타냅니다.
    coolant_outlet_neck_angle:
      name: 냉각수 배출구 넥 각도
      description: 워터 넥 배출구의 각도 또는 방향을 장착 플랜지 또는 엔진을 기준으로 나타내며, 이는 상부 라디에이터 호스 배치에
        유용합니다.
    coolant_technology:
      name: 냉각 기술
      description: 부동액 또는 냉각수에 사용된 냉각수 화학·기술 계열을 나타냅니다(일반적으로 포장에 표시되는 기준).
    coolant_temperature_sensor_port:
      name: 냉각수 온도 센서 포트
      description: 워터 넥에 냉각수 온도 센서 또는 스위치용 포트가 포함되어 있는지 여부와, 포함된 경우 사용되는 인터페이스 유형을
        나타냅니다.
    coolant_temperature_sensor_seal_type:
      name: 냉각수 온도 센서 밀폐 유형
      description: 센서와 엔진 또는 냉각수 통로 사이에 사용되는 밀봉 방식의 유형을 나타냅니다.
    cooling_system_component_included:
      name: 냉각 시스템 구성 요소 포함
      description: 워터 펌프에 포함된 추가 냉각 시스템 구성 요소를 나열합니다.
    cooling_system_flush_application_step:
      name: 냉각 시스템 세척제 사용 단계
      description: '제품이 정비 과정의 어느 단계에서 사용되는지를 나타냅니다(예: 세척 전 클리너, 최종 헹굼제/중화제).'
    cooling_system_type:
      name: 냉각 시스템 유형
      description: '선내 엔진에 사용되는 냉각 시스템 구성을 나타냅니다(예: 해수 개방형, 열교환기를 사용하는 담수 폐쇄형, 킬 냉각식).'
    cord_material:
      name: 코드 소재
      description: 색소폰 내부를 통해 면봉을 당기는 데 사용되는 끈의 재질을 지정합니다.
    core_type_bass_strings:
      name: 코어 유형(베이스 기타 줄)
      description: 현의 코어 형상을 나타내며, 이는 연주감과 유연성에 영향을 미칩니다.
    cork_grease_base_material:
      name: 코르크 그리스 기본 성분
      description: '코르크 그리스 제형의 주요 기반 성분을 나타냅니다(예: 라놀린 기반).'
    cork_grease_form:
      name: 코르크 그리스 형태
      description: 코르크 그리스 제품의 물리적 형태를 나타냅니다.
    corn_presentation:
      name: 옥수수 프레젠테이션
      description: '옥수수 제품의 물리적 형태 또는 모양을 명시합니다(예: 껍질째, 알갱이, 분말).'
    corn_syrup_variety:
      name: 옥수수 시럽 종류
      description: 시럽의 종류 또는 가공 방식을 나타냅니다.
    corn_variety:
      name: 옥수수 품종
      description: 판매 중인 옥수수의 구체적인 식물학적 품종 또는 유통 품종을 식별하며, 이를 통해 소비자는 맛, 질감, 색상 및
        용도가 다른 품종을 구별할 수 있습니다.
    corner_compatibility:
      name: 코너 호환성
      description: 표지의 모서리 모양(사각형 또는 둥근형)을 지정합니다.
    corner_flag_features:
      name: 코너 플래그 특징
      description: '코너 플래그의 특별한 기능 또는 향상된 특징을 나타냅니다(예: 접이식 깃대, 반사 소재).'
    cornet_mouthpiece_shank_type:
      name: 코넷 마우스피스 샹크 타입
      description: 호환성을 위해 코넷에서 지원하는 마우스피스 리시버/섕크 표준을 지정합니다.
    cornhole_league_certification:
      name: 콘홀 리그 인증
      description: 제품이 충족하는 공식 인증 또는 리그 승인 기준을 나타냅니다.
    corrosion_resistance:
      name: 부식 내성
      description: 실외 노출 시 마운트/홀더의 부식 방지 처리 또는 등급을 지정합니다.
    corrosion_resistance_level:
      name: 부식 내성 레벨
      description: 담수/해수 환경에 적합한 부식 방지 기능을 나타냅니다.
    costume_components_included:
      name: 의상 구성품 포함
      description: 의상에 포함된 의복 및 액세서리 목록을 제공하며, 세트에 포함되는 항목을 명확히 설명합니다.
    cotton_weave_type:
      name: 면직물 종류
      description: 인쇄 가능한 면 표면의 직조/편직 구조에 대해 설명하며, 이는 질감과 인쇄 선명도에 영향을 미칩니다.
    counter_type:
      name: 카운터 유형
      description: 내장된 반복 횟수 추적 또는 힘 추적 기능의 유무와 방식을 나타냅니다.
    counterweight_fill_material:
      name: 카운터웨이트 충전재
      description: 카운터웨이트에 밸러스트를 추가하거나 미리 채우는 데 사용할 수 있는 물질을 나타냅니다.
    counterweight_type:
      name: 카운터웨이트 유형
      description: 호환성 및 설치를 돕기 위해 모래주머니 또는 강판과 같은 균형추의 디자인 또는 제작 방식을 지정합니다.
    coupler_system:
      name: 커플러 시스템
      description: 철도 모형 차량과의 호환성을 위해 모형 기관차에 장착된 커플러 유형 또는 시스템을 나타냅니다.
    court_surface_suitability:
      name: 코트 표면 적합성
      description: 신발 밑창이 어떤 농구 코트 표면에 적합하게 설계되었는지 표시하여 소비자가 실내 나무 코트, 야외 아스팔트/콘크리트
        코트 또는 둘 다에 적합한 접지력과 내구성을 선택할 수 있도록 도와줍니다.
    cover_fit_style:
      name: 커버 핏
      description: 테이블보가 테이블에 어떻게 씌워지는지, 그리고 그것이 외관과 보호 수준에 어떤 영향을 미치는지 설명합니다.
    cover_fit_type:
      name: 커버 핏 유형
      description: 이 표시는 커버가 맞춤 제작(커스텀/세미 커스텀)인지 범용인지, 그리고 수중 계류용인지 보관/트레일러용인지 여부를
        나타냅니다.
    cowbell_beater_type:
      name: 카우벨 비터 유형
      description: 카우벨의 음색 또는 연주 특성에 적합한 타격 도구 유형을 나타냅니다(제품에 명시된 경우).
    cowbell_mounting_method:
      name: 카우벨 장착 방식
      description: 카우벨을 사용하는 방식을 나타냅니다(손으로 들고 사용하는 방식 또는 하드웨어에 장착하는 방식).
    cowbell_sound_character:
      name: 카우벨 사운드 특징
      description: 제품 정보에 사용되는 전반적인 음색 특성을 나타내며, 이는 크기 외의 기준으로 제품을 찾는 데 도움이 됩니다.
    cradle_capacity:
      name: 크래들 수용 용량
      description: 아기 요람이 한 명의 아기를 위한 것인지, 아니면 쌍둥이를 위한 것인지를 나타냅니다.
    craft_cutter_embosser_machine_operation:
      name: 수공예 커터/엠보싱 기계 작동 방법
      description: '사용자 관점에서 절단기 또는 엠보서의 작동 방식을 나타냅니다(예: 수동 크랭크, 전동 버튼식, 앱 제어식).'
    craft_decoration_maker_accessories_included:
      name: 공예 장식 제작기 포함 액세서리
      description: '공예 장식 제작기에 포함된 주요 액세서리를 나열합니다(예: 스타터 테이프/필름, 스티커 리필, 글리터 카트리지,
        청소 도구).'
    craft_foil_application_method:
      name: 수공예용 호일 부착 방법
      description: '공예용 포일의 적용 또는 활성화 방식을 식별합니다(예: 접착식, 열전사식, 토너 반응식).'
    craft_foil_format:
      name: 공예용 포일 형태
      description: '판매 중인 공예용 포일의 물리적 형태를 나타냅니다(예: 롤형, 시트형).'
    craft_glue_finish:
      name: 수공예용 접착제 마감
      description: '건조 후 접착제의 외관을 설명합니다(예: 투명, 흰색/불투명, 반투명, 광택/무광).'
    craft_magnet_application:
      name: 공예용 자석 용도
      description: 자석 제품의 주요 공예 용도 또는 장착 표면을 나타냅니다.
    craft_magnet_holding_strength_level:
      name: 공예용 자석 고정력 수준
      description: 수공예용 자석의 상대적 강도 등급으로, 구매자가 자신의 프로젝트에 적합한 유지력을 선택할 수 있도록 돕습니다.
    craft_organizer_storage_features:
      name: 수공예품 정리함의 특징
      description: '공예용 정리함의 정리 기능과 내부 수납 요소를 설명합니다(예: 조절식 칸막이, 서랍, 투명 포켓).'
    craft_scoring_board_included_accessories:
      name: 수공예 점수판 및 부속품
      description: '채점판에 포함된 액세서리(예: 채점용 스타일러스/본폴더, 삼각대, 봉투 도구).'
    craft_scoring_board_measurement_system:
      name: 수공예 점수판 측정 시스템
      description: 채점판에 표시된 측정 단위 체계를 나타냅니다(야드·파운드법, 미터법, 이중 표기 또는 표시 없음).
    craft_wire_finish_coating:
      name: 수공예용 와이어 마감/코팅
      description: 색상, 변색 방지 또는 보호를 위해 전선에 적용되는 표면 마감 또는 코팅을 지정합니다.
    craft_wood_surface_preparation:
      name: 수공예 목재 표면 처리
      description: '목재 표면이 마감 또는 도색 준비가 되어 있는지, 또는 사전 작업(예: 샌딩, 프라이밍)이 필요한지를 나타냅니다.'
    crank_spindle_interface:
      name: 크랭크 스핀들 인터페이스
      description: '바텀 브래킷이 지원하는 크랭크 스핀들 시스템(예: SRAM DUB, 스퀘어 테이퍼)을 명시하여, 크랭크셋과 바텀
        브래킷 간의 호환성을 보장합니다.'
    crankshaft_balance_type:
      name: 크랭크샤프트 잔액 유형
      description: 크랭크축이 내부 밸런스 방식(중립형)인지 또는 외부 밸런스 방식(하모닉 밸런서 또는 플라이휠 웨이트 필요)인지를
        나타냅니다.
    crankshaft_bolt_pattern:
      name: 크랭크축 볼트 패턴
      description: 플라이휠 또는 플렉스플레이트 장착용 후면 플랜지의 볼트 패턴을 나타냅니다.
    crankshaft_sensor_reluctor_type:
      name: 크랭크축 센서 릴럭터 타입
      description: 사용되는 크랭크축 위치 센서 트리거 또는 릴럭터 휠 구성을 나타냅니다(해당하는 경우).
    craps_accessories_included:
      name: 크랩스 액세서리 포함
      description: 주사위, 칩, 레이아웃 외에도 크랩스 게임에 특화된 추가 액세서리를 안내합니다.
    crash_cymbal_profile:
      name: 크래시 심벌 프로파일
      description: 심벌의 전체적인 곡률 또는 형상을 나타내며(아치형 곡면이 얼마나 두드러지는지), 이는 음높이와 반응성에 영향을 미칩니다.
    crash_cymbal_sound_character:
      name: 크래시 심벌 사운드 특징
      description: 크래시 심벌즈 소리의 주요 음색 특성.
    crash_pad_size_class:
      name: 크래시 패드 크기 등급
      description: 등반용 크래시 패드의 일반적인 크기 범주를 나타내며, 소비자가 정확한 치수를 확인하지 않아도 대략적인 커버 범위를
        파악할 수 있도록 합니다.
    crate_engine_assembly_level:
      name: 크레이트 엔진 조립 수준
      description: 크레이트 엔진이 배송되었다면 어떤 주요 구성품이 포함되어 있습니까?
    cream_base_ingredient:
      name: 크림 베이스 성분
      description: 크림의 주요 원료를 식별하며, 유제품 원료와 식물성 대체 원료를 모두 포함합니다.
    cream_cheese_base:
      name: 크림치즈 베이스
      description: 크림 치즈 제조에 사용된 주원료(유제품 또는 식물성 원료)를 명시하여, 식단, 알레르기 유발 물질 및 맛에 대한
        고려 사항이 있는 소비자들이 선택하기 쉽도록 돕습니다.
    cream_cheese_form:
      name: 크림치즈 형태
      description: '크림치즈의 물리적 형태 또는 질감 유형을 설명합니다(예: 블록형, 휘핑형, 딥형). 이는 발림성과 용도에 영향을
        미칩니다.'
    cream_variety:
      name: 크림 종류
      description: '지방 함량, 가공 방식 또는 용도에 따라 크림의 구체적인 종류를 식별합니다(예: 하프 앤 하프, 더블 크림, 쿠킹
        크림).'
    crib_accessory_features:
      name: 아기침대 액세서리 기능
      description: 통기성이나 신축성 있는 가장자리와 같이 유아용 침대 및 아기 침대 액세서리에 특화된 기능적 또는 편안함 관련 특징을
        나열합니다.
    crib_bumper_features:
      name: 유아용 침대 범퍼 특징
      description: 아기침대 범퍼의 주요 기능적 특징을 강조합니다.
    crib_conversion_kit_components:
      name: 아기침대 변환 키트 구성품
      description: 키트에 포함된 주요 구성품을 나열하여 소비자가 설치에 필요한 구성품이 모두 포함되어 있는지 확인할 수 있도록 합니다.
    cricket_ball_grade:
      name: 크리켓 공 등급
      description: 공의 품질 수준 또는 사용 목적에 따른 경기 등급을 나타냅니다.
    cricket_ball_piece_construction:
      name: 크리켓 공 패널 구성
      description: 공 외피를 구성하는 외부 패널 또는 성형 부품의 수를 나타내며, 이는 품질과 가격을 판단하는 중요한 지표입니다.
    cricket_ball_type:
      name: 크리켓 공 유형
      description: 제품에 포함된 크리켓 공의 유형을 나타내거나, 공이 포함되지 않았음을 나타냅니다.
    cricket_bat_accessory_type:
      name: 크리켓 배트 액세서리 유형
      description: 크리켓 배트 액세서리 또는 관리용품의 유형을 나타내며, 소비자가 필요한 제품을 빠르게 찾을 수 있도록 합니다.
    cricket_bat_size:
      name: 크리켓 배트 크기
      description: 일반적으로 선수의 연령과 신장에 따라 선택되는 표준 크리켓 배트 크기 분류(0~6, Harrow, SH, LH)를
        나타냅니다.
    cricket_bat_size_compatibility:
      name: 크리켓 배트 사이즈 호환성
      description: 액세서리가 호환되도록 설계된 배트 사이즈를 나열하여 적절한 호환성을 보장합니다.
    cricket_helmet_role:
      name: 크리켓 헬멧 용도
      description: '헬멧이 사용되도록 설계된 경기 역할을 나타냅니다(예: 타자용, 위켓키퍼용).'
    cricket_leg_guard_type:
      name: 크리켓 레그가드 유형
      description: 크리켓 선수용 다리 보호대의 특정 스타일을 나타냅니다.
    cricket_player_role:
      name: 크리켓 선수 역할
      description: 신발이 사용되도록 설계된 주요 경기 역할을 나타냅니다.
    cricket_protection_grade:
      name: 크리켓 보호 등급
      description: 크리켓 장비 제조업체가 부여한 보호 등급 분류를 나타냅니다.
    cricket_stump_base_type:
      name: 크리켓 스텀프 베이스 유형
      description: 스텀프에 함께 제공되는 받침대의 유형 또는 재질을 나타내며, 이는 안정성과 경기 표면 적합성에 영향을 미칩니다.
    cricket_stump_target_features:
      name: 크리켓 스텀프 타깃 특징
      description: 훈련의 활용도, 가시성, 내구성 또는 안정성을 높여주는 주요 기능적 특징을 강조합니다.
    cricket_stump_type:
      name: 크리켓 스텀프 유형
      description: 소비자가 전통적인 경기용 스텀프, 훈련용 스텀프, 또는 현대적인 조명 모델 중에서 선택할 수 있도록 스텀프의 스타일이나
        구조를 분류합니다.
    cricket_training_focus:
      name: 크리켓 훈련 핵심 영역
      description: 이 보조 도구는 크리켓의 주요 기술 또는 기량을 향상시키도록 설계되었습니다.
    croquet_set_components_included:
      name: 크로케 세트 구성품 포함
      description: '세트에 포함된 주요 구성품(예: 골대, 말뚝, 휴대용 가방 등)을 모두 나열하여 고객이 구매하는 제품이 정확히
        무엇인지 알 수 있도록 합니다.'
    cross_country_binding_system:
      name: 국가 간 바인딩 시스템
      description: 제품이 가공되었거나 호환되는 크로스컨트리 스키 바인딩 규격을 나타냅니다.
    cross_stitch_chart_symbol_type:
      name: 십자수 도안 기호 유형
      description: 도안이 표현되는 방식을 나타냅니다(기호, 색상 또는 둘 다).
    cross_stitch_finishing_type:
      name: 십자수 마감 유형
      description: 완성된 작품의 마감 또는 전시 방식을 나타냅니다.
    cross_stitch_frame_fabric_holding_mechanism:
      name: 크로스 스티치 프레임의 천 고정 장치
      description: '프레임에 원단을 고정하거나 장력을 유지하는 방식을 나타냅니다(예: 클립, 클램프, 압정). 이는 사용 편의성과
        원단 호환성에 영향을 미칩니다.'
    cross_stitch_frame_included_components:
      name: 십자수 프레임 구성품
      description: '상자에 포함된 구성품을 나열합니다(예: 프레임만 포함, 프레임 + 클램프 + 스탠드 포함). 이를 통해 혼동과
        반품을 줄일 수 있습니다.'
    cross_stitch_frame_type:
      name: 십자수 프레임 유형
      description: 크로스 스티치 틀의 구조/유형(천을 고정하는 방식)을 명시하며, 이는 사용 편의성과 프로젝트 호환성에 영향을 미칩니다.
    cross_stitch_pattern_technique:
      name: 십자수 패턴 기법
      description: 도안에 필요한 십자수 기법/스타일.
    crossbar_shape_profile:
      name: 크로스바 형상/단면
      description: 크로스바의 공기역학적 형상/프로파일 모양을 지정합니다.
    crossbar_style:
      name: 크로스바 스타일
      description: 크로스바의 구조 유형을 식별하며, 견고한 경기용 바와 유연한 또는 하이브리드 훈련용 바를 구분합니다.
    crossbow_type:
      name: 석궁 유형
      description: 컴파운드, 리커브 또는 피스톨과 같은 석궁의 기본적인 설계 스타일을 식별합니다. 건설 스타일은 성능, 크기 및 케이스를
        사용하므로 소비자는 이를 기준으로 필터링하는 경우가 많습니다.
    crossover_component_type:
      name: 크로스오버 구성 요소 유형
      description: 수동 크로스오버 네트워크에 사용되는 주요 구성 요소 토폴로지를 식별합니다.
    crossover_configuration:
      name: 크로스오버 구성
      description: '교차 회로가 단일 교차점을 사용하는지 또는 여러 교차점을 사용하는지(예: 2방향 대 3방향 설계)를 나타냅니다.'
    crossover_type:
      name: 크로스오버 유형
      description: 구성품 세트에 포함된 크로스오버 네트워크의 유형을 나타냅니다.
    crown_profile:
      name: 크라운 프로필
      description: 챙 위에 위치한 모자 크라운의 높이 또는 형태를 나타냅니다.
    crown_style:
      name: 크라운 스타일
      description: 볼러햇 크라운의 전체적인 실루엣 또는 형태를 정의합니다.
    crust_taste_profile:
      name: 크러스트 맛 특성
      description: 크러스트의 기본적인 맛 특성이 단맛, 짭짤한 맛 또는 중립적인 맛인지를 나타냅니다.
    crystal_finish:
      name: 크리스털 마감
      description: '낱개 결정의 표면 마감, 코팅 또는 가공 상태를 설명합니다(예: 원석, 연마, 텀블링, 무광택, 아우라 코팅,
        염색, 열처리).'
    crystal_material:
      name: 크리스털 재질
      description: 시계 다이얼을 보호하는 시계 유리에 사용된 재질을 명시합니다.
    crystalline_finish_style:
      name: 크리스탈 마감 스타일
      description: 완성된 양초에서 팜왁스에 의해 나타나는 특유의 결정질/깃털 모양의 외관.
    cucumber_variety:
      name: 오이 품종
      description: '오이의 구체적인 품종 또는 유통 품종을 나타냅니다(예: English, Persian, Kirby).'
    cue_compatibility:
      name: 큐대 호환성
      description: '케이스가 수납하도록 설계된 큐의 조인트 구성을 나타냅니다(예: 일체형 또는 3/4 조인트 큐).'
    cue_construction:
      name: 큐대 구조
      description: 큐의 구성 방식을 나타냅니다(분할 수 또는 버트만 포함된 형태인지, 샤프트만 포함된 형태인지 등). 이는 휴대성과
        호환성에 영향을 미칩니다.
    cue_head_material:
      name: 큐 헤드 소재
      description: 큐 헤드(퍽과 접촉하는 부분)의 재질을 식별하며, 이는 내구성과 표면 보호 성능에 영향을 미칩니다.
    cue_sport_compatibility:
      name: 호환 큐 스포츠
      description: 해당 액세서리가 사용되도록 설계된 큐 스포츠 종목을 식별합니다.
    cue_thread_size:
      name: 큐 나사산 규격
      description: 연장대, 조인트 보호대, 웨이트 볼트 및 기타 큐 액세서리에 사용되는 나사산 규격을 나타내며, 올바른 장착을 보장합니다.
    cue_tip_hardness:
      name: 큐팁 경도
      description: 큐 팁의 경도를 평가하며, 이는 큐볼의 제어력과 타구감을 좌우합니다.
    cuff_height:
      name: 커프 높이
      description: 지지력과 유연성에 영향을 미치는 부츠 커프의 높이(로우, 미디엄, 하이, 탈착/조절식)를 나타냅니다.
    cuff_position:
      name: 커프 위치
      description: 라이더의 신체 어느 부위에 리쉬 커프를 부착하도록 설계되었는지 나타냅니다.
    cultivation_method:
      name: 재배 방법
      description: 채소가 어떻게 재배되었는지를 나타내며, 재배 기술과 농업 관행을 포함합니다.
    cup_type:
      name: 컵 유형
      description: 스팽글의 표면 형상(평면형 또는 오목형)과 오목부의 깊이를 나타내며, 이는 반짝임, 질감 및 봉제 또는 접착 후의
        형태에 영향을 미칠 수 있습니다.
    cupcake_size:
      name: 컵케이크 사이즈
      description: '판매 중인 컵케이크의 크기 범주를 나타냅니다(예: 미니, 스탠다드, 점보).'
    curd_size:
      name: 커드 크기
      description: 코티지 치즈 커드의 크기 또는 질감을 나타냅니다.
    cure_method:
      name: 경화 방식
      description: '접착제가 굳거나 경화되기 위해 필요한 조건 또는 과정을 설명합니다(예: 자외선, 공기 중 습도, 열).'
    curing_or_preparation_method:
      name: 숙성 또는 제조 방식
      description: '올리브가 어떤 방식으로 숙성되거나 가공되었는지를 나타냅니다(예: 염수 숙성, 오일 숙성, 구이).'
    curling_broom_head_material:
      name: 컬링 브룸 헤드 재질
      description: 브룸 헤드 또는 패드의 주요 재질 구성을 식별합니다.
    curling_broom_head_type:
      name: 컬링 브룸 헤드 유형
      description: 브룸 헤드 또는 패드의 유형이나 구조를 나타냅니다.
    curling_shoe_slider_material:
      name: 컬링화 슬라이더 재질
      description: 컬링화에 사용되는 슬라이딩 솔의 주요 소재를 식별합니다.
    curling_training_aid_type:
      name: 컬링 훈련 보조 도구 유형
      description: 컬링 훈련 보조 도구의 유형을 식별합니다.
    curry_variety:
      name: 카레 종류
      description: '특정 카레 스타일이나 레시피(예: 티카 마살라, 마사만, 타이 카레 등)에 맞춰 카레 소스 제품을 분류하여 정확한
        맛/스타일 필터링이 가능하도록 합니다.'
    cushion_rubber_profile:
      name: 쿠션 고무 프로파일
      description: 레일 쿠션 고무 부품의 형상 또는 프로파일 코드.
    cushioning_level:
      name: 쿠셔닝 수준
      description: 양말이 충격 보호와 착용감을 위해 제공하는 발바닥 쿠션의 정도를 나타냅니다.
    custom_label_content_type:
      name: 사용자 정의 레이블 콘텐츠 유형
      description: '봉제 라벨에 어떤 정보를 맞춤 제작할지 지정합니다(예: 이름, 로고, 문구, 사이즈, 세탁 기호, 연락처 정보).'
    customization_type:
      name: 맞춤 설정 유형
      description: 유니폼이 무지인지, 선수 지급용인지, 아니면 개인 이름/번호가 새겨진 맞춤 제작인지 지정합니다.
    cut_or_preparation_style:
      name: 절단 또는 손질 방식
      description: '캔이나 유리병 내부의 채소 조각이 어떻게 잘리거나 손질되었는지 지정합니다(예: 통째로, 깍둑썰기, 길쭉하게).'
    cut_resistance_rating:
      name: 절단 저항 등급
      description: 해당 제품의 공식 시험을 통해 확인된 절단 저항 등급을 나타냅니다.
    cut_type:
      name: 절단 유형
      description: 원단이 야드/미터 단위로 판매되는지, 재단된 형태인지, 아니면 롤/볼트 형태인지를 나타냅니다.
    cutting_application:
      name: 절단 용도
      description: 가위의 주된 절단 용도를 나타냅니다.
    cutting_mat_grid_style:
      name: 커팅 매트 격자 무늬
      description: 매트 표면에 인쇄된 가이드 유형을 나타냅니다.
    cutting_mat_intended_use:
      name: 커팅 매트의 용도
      description: 이 커팅 매트가 주로 사용되도록 설계된 주된 작업대 용도입니다.
    cv_boot_clamp_type:
      name: CV 부트 클램프 유형
      description: CV 부트를 고정하는 데 사용되는 클램프/밴드 스타일을 지정합니다.
    cv_boot_kit_contents:
      name: CV 부트 키트 구성품
      description: 'CV 부트에 포함된 구성품 목록입니다(예: 클램프, 그리스 패킷, 고정 밴드).'
    cv_boot_material:
      name: CV 부트 소재
      description: CV 부트의 주요 재질 구성을 나타냅니다.
    cv_boot_position:
      name: CV 부트 위치
      description: CV 부트가 차축의 내측(인보드) 또는 외측(아웃보드) CV 조인트 위치에 맞도록 설계되었는지를 나타냅니다.
    cycling_apparel_fit:
      name: 사이클링 의류 핏
      description: '의류의 재단 방식을 설명하며, 의도된 핏의 정도와 공기역학적 특성을 나타냅니다(예: 레이스 핏, 릴랙스 핏).'
    cylinder_head_assembly:
      name: 실린더 헤드 어셈블리
      description: '판매 시 실린더 헤드의 완성도 수준을 명시합니다(예: 밸브 트레인 구성 요소가 설치된 완전 조립품 대 미조립/미조립
        주조품).'
    cylinder_head_material_grade:
      name: 실린더 헤드 재질 등급
      description: 실린더 헤드 주조에 사용된 재질과 등급을 나타냅니다.
    cylinder_head_position:
      name: 실린더 헤드 위치
      description: '다중 뱅크 엔진에서 실린더 헤드가 장착되는 뱅크, 측면 또는 방향을 식별합니다(예: 좌측/우측, 뱅크 1/뱅크
        2).'
    cymbal_alloy:
      name: 심벌즈 합금
      description: 키트에 포함된 심벌의 합금 또는 재질 구성을 나타냅니다.
    cymbal_application:
      name: 심벌즈 앱
      description: 심벌이 사용되도록 설계되거나 판매되는 주요 연주 용도를 나타냅니다.
    cymbal_arm_mounting_interface:
      name: 심벌 암 장착 인터페이스
      description: '심벌 암이 다른 드럼 하드웨어에 연결되는 방식을 나타냅니다(예: 클램프, 랙, 스탠드 리시버).'
    cymbal_arm_rotation_positioning_features:
      name: 심벌 암 회전 및 위치 조절 기능
      description: 팔의 각도/회전 및 고정 방식에 영향을 미치는 위치 지정 기능을 지정합니다.
    cymbal_arm_style:
      name: 심벌 암 유형
      description: 심벌 암이 스트레이트형인지 붐형인지를 나타내며, 이는 도달 범위와 위치 조절에 영향을 미칩니다.
    cymbal_drum_case_wheel_configuration:
      name: 심벌 및 드럼 케이스 휠 구성
      description: 케이스에 바퀴가 있는지 여부와 (해당되는 경우) 이동을 위한 바퀴 구성 방식을 나타냅니다.
    cymbal_hammering_style:
      name: 심벌 해머링 방식
      description: 해머링 공정 또는 외관을 나타내며, 이는 음색의 복잡성과 연주감에 영향을 미칩니다.
    cymbal_kit_components_included:
      name: 심벌즈 키트 구성품 포함
      description: 라이드 심벌 키트/팩에 라이드 심벌 자체 외에 어떤 종류의 심벌이 포함되는지 명시합니다.
    cymbal_kit_items_included:
      name: 심벌즈 키트 품목 포함
      description: 키트 또는 팩에 포함된 심벌의 종류를 식별합니다.
    cymbal_lathing:
      name: 심벌즈 선반 가공
      description: 심벌 표면 중 선반 가공(홈 가공)된 부분과 무가공 부분의 범위를 나타냅니다.
    cymbal_playing_style_genre:
      name: 심벌즈 연주 스타일/장르
      description: '심벌이 사용되도록 설계된 일반적인 연주 환경을 식별합니다(예: 벨리댄스 질, 행진용 또는 오케스트라용 핸드 심벌).'
    cymbal_set_configuration:
      name: 심벌즈 세트 구성
      description: '제품이 단일 심벌, 매치드 페어 또는 다중 페어 세트(예: 단체 교육용)로 판매되는지를 나타냅니다.'
    cymbal_sound_character:
      name: 심벌 사운드 특성
      description: '탐색에 사용된 심벌의 전반적인 음색/보이스 특성(예: 밝은 음색 vs 어두운 음색)을 설명합니다.'
    cymbal_sustain:
      name: 심벌 서스테인
      description: 심벌즈를 친 후 소리가 얼마나 오래 지속되는지를 나타냅니다.
    cymbal_type:
      name: 심벌 유형
      description: 전자 심벌 패드가 재현하도록 설계된 심벌의 기능적 역할을 나타냅니다.
    cymbal_volume_level:
      name: 심벌 음량 수준
      description: 심벌의 체감 음량 또는 출력 수준을 나타냅니다.
    cymbal_weight_class:
      name: 심벌즈 무게 등급
      description: 심벌즈의 무게 등급을 나타내며, 음색, 음량 및 반응에 영향을 미칩니다.
    dairy_heat_treatment:
      name: 유제품 열처리.
      description: '크림에 적용된 가공 또는 살균 수준을 식별하며(예: 생크림, 저온 살균, UHT), 이는 보관 기간, 풍미 및
        휘핑 성능에 영향을 미칩니다.'
    damage_type:
      name: 피해 유형
      description: 키트가 수리하도록 설계된 전면 유리의 손상 유형을 지정합니다.
    damper_pedal_style:
      name: 댐퍼 페달 유형
      description: 키보드 또는 디지털 피아노에 사용되는 댐퍼 페달의 물리적 형태를 설명합니다.
    damping_adjustability:
      name: 댐핑 조절 기능
      description: 쇼크 업소버에서 조정 가능한 댐핑 및/또는 차고 매개변수를 나타냅니다.
    damping_level:
      name: 댐핑 수준
      description: 뮤트가 제공하는 음량 감소 및 서스테인 감소 정도를 상대적으로 나타냅니다.
    dance_occasion:
      name: 댄스 행사
      description: 이 의상이 무용 연습이나 공연에서 어떤 용도로 사용될 예정인지를 나타냅니다.
    darbuka_accessories_included:
      name: 다르부카 액세서리 포함
      description: 다르부카에 일반적으로 포함되는 액세서리를 나열합니다.
    darbuka_body_finish_type:
      name: 다르부카 차체 마감 유형
      description: 다르부카 본체의 외부 마감, 코팅 또는 장식 처리를 설명합니다.
    darbuka_head_material:
      name: 다르부카 헤드 재질
      description: 다르부카 드럼헤드 막의 재질을 나타냅니다.
    dart_barrel_material:
      name: 다트 배럴 재질
      description: 다트 배럴의 주요 재질을 나타내며, 이는 무게 배분, 내구성 및 가격에 영향을 미칩니다.
    dart_shaft_design:
      name: 다트 샤프트 설계
      description: 샤프트의 기계적 설계를 고정식, 회전식, 텔레스코픽식 또는 플라이트 통합식 등으로 분류하며, 이는 크기와 가격에
        영향을 미칩니다.
    dart_shaft_thread_type:
      name: 다트 샤프트 나사산 유형
      description: 샤프트를 다트 배럴에 나사로 고정하는 데 사용되는 나사 크기/유형을 나타내며, 샤프트와 배럴 간의 호환성을 보장합니다.
    dart_thread_size:
      name: 다트 나사 크기
      description: 부품이 호환되는 나사산 규격을 나타내며, 샤프트, 팁 및 배럴 간의 올바른 결합을 보장합니다.
    dart_tip_compatibility:
      name: 다트 팁 호환성
      description: 다트 부품이 스틸 팁용, 소프트 팁용 또는 두 유형 모두에 사용되도록 설계되었는지를 나타냅니다.
    dart_tip_connection_type:
      name: 다트 팁 연결 방식
      description: 팁이 다트 배럴 또는 샤프트에 연결되는 데 사용하는 나사산 규격 또는 장착 방식을 설명하며, 이를 통해 호환성을
        보장합니다.
    dartboard_tournament_approval:
      name: 다트보드 대회 승인
      description: 해당 다트판이 특정 다트 연맹이나 리그의 공식 승인을 받았는지 여부를 나타냅니다.
    dartboard_type:
      name: 다트보드 유형
      description: '다트판을 제작 기술과 다트 호환성(예: 브리스틀, 전자식, 자석식)에 따라 분류합니다.'
    dash_cover_construction_type:
      name: 대시보드 커버 구조 유형
      description: '대시보드 커버의 제작 또는 구조 방식을 설명합니다(예: 성형식, 봉제식). 이는 장착 정밀도와 외관에 영향을 미칩니다.'
    dash_cover_cutout_configuration:
      name: 대시보드 커버 절단 구성
      description: 커버가 어떤 OEM 대시보드 개구부 또는 센서에 맞도록 미리 절단되거나 성형되었는지를 나타냅니다.
    dashboard_accessory_position:
      name: 대시보드 액세서리 위치
      description: 액세서리가 대시보드의 어느 위치에 배치되거나 장착되도록 설계되었는지를 나타냅니다.
    date_variety:
      name: 대추야자 품종
      description: '대추야자의 구체적인 품종 또는 재배종을 나타냅니다(예: 메드줄, 데글렛 누르, 아즈와). 품종은 맛, 크기 및
        질감에 큰 영향을 미치며 대부분의 제품명과 설명에서 강조되므로, 이를 구분하면 필터링과 제품 탐색이 향상됩니다.'
    dayan_head_material:
      name: 다얀 헤드 소재
      description: '연주면(pudi)의 재질을 나타냅니다(예: 천연 가죽, 합성 소재).'
    dayan_strap_material:
      name: 다얀 스트랩 소재
      description: 다얀을 묶는 데 사용되는 조임끈(바디)의 재질.
    dayan_syahi_type:
      name: 다얀 샤히 유형
      description: 다얀 헤드에 적용된 샤히(검은색 조율용 페이스트)의 유형을 나타냅니다.
    decaffeination_method:
      name: 카페인 제거 방법
      description: 디카페인 커피에서 카페인을 제거하는 데 사용된 공정을 식별합니다.
    decal_installation_method:
      name: 데칼 부착 방식
      description: '데칼을 차량 표면에 부착하는 방식을 설명합니다(예: 건식 부착, 습식 부착). 도구 또는 요구 사항 관련 정보(예:
        전사 테이프, 열풍기)는 해당하는 경우 사용 설명 또는 관련 속성에 포함되어야 합니다.'
    decal_orientation:
      name: 데칼 방향
      description: 스티커가 유리 안쪽에 붙일 용도인지, 아니면 유리 바깥쪽에 붙일 용도인지 여부.
    decal_placement_type:
      name: 데칼 부착 위치 유형
      description: '차량의 어느 부분에 데칼을 부착해야 하는지를 나타냅니다(예: 차체 패널, 범퍼, 보닛).'
    decal_visibility_property:
      name: 데칼 가시성 속성
      description: '시인성이나 빛에 대한 반응을 높이기 위한 데칼의 광학적/시각적 특성(예: 반사, 형광, 야광 또는 투명성).'
    deck_concave_level:
      name: 데크 오목면 레벨
      description: '데크의 오목한 곡면의 깊이 또는 강도를 나타냅니다(예: 완만함, 중간, 깊음).'
    deck_flex_rating:
      name: 갑판 굴곡 등급
      description: 데크의 유연성 또는 강성에 대한 정성적 평가를 나타냅니다.
    deck_material:
      name: 데크  소재
      description: 스케이트보드 데크의 주요 구성 재료를 식별합니다.
    decoder_interface_socket_type:
      name: 디코더 인터페이스/소켓 유형
      description: 기관차 모형에 사용되는 디지털 디코더 인터페이스 유형 또는 내장 디코더 구성을 나타냅니다.
    decoration_technique:
      name: 장식 기법
      description: 티셔츠에 그래픽 또는 장식을 적용하는 데 사용된 주요 기법을 식별합니다.
    decorative_stamp_form_factor:
      name: 장식용 스탬프 형태
      description: '스탬프의 물리적 형태와 디자인을 인쇄하는 방식을 식별합니다(예: 단일 스탬프, 세트, 롤러형, 배경용).'
    decorative_tape_application:
      name: 장식용 테이프 용도
      description: 장식용 테이프가 주로 제작되거나 판매되는 주된 용도.
    decorative_tape_format:
      name: 장식용 테이프 형식
      description: 장식용 테이프가 사용을 위해 어떤 형태로 제공되거나 포장되는지를 나타냅니다.
    decoy_buoyancy:
      name: 유인 모형 부력
      description: 유인 모형이 물속에서 어떤 부력 특성을 보이는지를 설명합니다(부상형, 서스펜드형 또는 침강형).
    decoy_joint_type:
      name: 유인 모형 관절 유형
      description: 미끼의 몸체가 고정되어 있는지 관절형인지를 나타내며, 이는 수영 동작에 영향을 미칩니다.
    decoy_motion_mechanism:
      name: 미끼 동작 메커니즘
      description: 유인 모형이 움직임이나 물의 교란을 통해 사냥감을 유인하는 방식을 설명합니다.
    decoy_posture:
      name: 미끼 자세
      description: '유인 모형이 묘사하는 동물의 자세 또는 행동을 나타냅니다(예: 먹이 활동, 휴식, 경계 상태).'
    decoy_size_class:
      name: 미끼 크기 등급
      description: '실제 동물과 비교한 유인 모형의 상대적 크기를 분류합니다(예: 표준, 대형, 초대형).'
    decoy_style:
      name: 유인 모형 유형
      description: 사냥꾼이 올바른 설치 형태를 선택할 수 있도록 미끼의 물리적 형태 또는 디자인 등급을 정의합니다.
    deli_meat_variety:
      name: 델리 육류 종류
      description: '델리 육류의 특정 종류를 분류합니다(예: 살라미, 볼로냐, 프로슈토, 로스트 비프).'
    delivery_form:
      name: 공급 형태
      description: 인젝터 클리너의 물리적 제형을 나타냅니다.
    denim_composition:
      name: 데님 소재
      description: 데님의 주요 섬유 구성(염료/마감재를 제외한 기본 섬유).
    denim_finish:
      name: 데님 마감
      description: 데님 원단에 적용되는 표면/가공 마감 처리.
    denim_intended_use:
      name: 데님 소재 용도
      description: 이 데님 제품이 주로 사용되는 프로젝트/용도.
    denim_stretch_type:
      name: 데님 신축성 유형
      description: 데님에 기계적 신축성이 있는지, 엘라스테인/스판덱스가 포함되어 있는지 또는 신축성이 없는지를 나타냅니다.
    denim_wash:
      name: 데님 워싱
      description: '데님 원단에 적용된 색상 또는 워싱 처리 방식을 나타냅니다(예: 밝은색, 어두운색, 생지, 산성).'
    derailleur_cage_length:
      name: 변속기 케이지 길이
      description: 체인 용량을 결정하는 변속기 케이지 길이를 나타냅니다(주로 뒷변속기의 경우).
    derailleur_mounting_style:
      name: 변속기 장착 방식
      description: '변속기가 자전거 프레임이나 행어에 장착되는 방식을 지정합니다(예: 브레이즈온, 클램프, 다이렉트 마운트, UDH).'
    derailleur_type:
      name: 변속기 유형
      description: 해당 제품이 앞 변속기인지 뒤 변속기인지를 나타냅니다.
    deshedder_tool_type:
      name: 털 제거 도구 유형
      description: '소비자가 선호하는 그루밍 방식을 선택할 수 있도록 털갈이 도구의 구조적 스타일을 분류합니다(예: 블레이드형, 블록형,
        커리 브러시형 또는 장갑형).'
    diabolo_axle_system:
      name: 디아볼로 액슬 시스템
      description: 그라인드 기술, 안정성 및 줄 마모에 영향을 미치는 디아볼로 액슬 시스템 또는 구성을 나타냅니다.
    diagnostic_functions_supported:
      name: 지원되는 진단 기능
      description: 스캐너가 수행할 수 있는 진단/정비 기능을 지정합니다.
    diagnostic_interface_type:
      name: 진단 인터페이스 유형
      description: '차량 또는 장치와 통신하는 데 사용되는 연결/인터페이스(예: OBD-II, 블루투스, Wi-Fi, USB).'
    diamond_color_grade:
      name: 다이아몬드 색상 등급
      description: D(무색)부터 Z(옅은 색)에 이르는 다이아몬드의 색상 등급을 나타내거나, 팬시 컬러 다이아몬드를 의미하기도 합니다.
    diaper_cover_style:
      name: 기저귀 커버 스타일
      description: 기저귀 커버의 디자인 실루엣 또는 장식 스타일을 정의하여 스타일 기반의 검색 및 필터링을 지원합니다.
    diastatic_power_unit:
      name: 당화력 단위
      description: '제품의 디아스타틱 파워 값을 표시하는 데 사용되는 단위 체계를 나타냅니다(예: °Lintner, Windisch-Kolbach).'
    diatonic_harmonica_tuning_system:
      name: 다이아토닉 하모니카 튜닝 시스템
      description: 다이아토닉 하모니카에 사용되는 음 배열 또는 튜닝 시스템을 나타냅니다.
    dice_sides:
      name: 주사위 면 수
      description: '제품에 포함된 주사위의 면 수(예: d6, d20). 혼합 세트의 경우, 가장 주된 면 수를 사용하거나 지원되는
        경우 여러 값을 함께 나열합니다.'
    didgeridoo_construction_type:
      name: 디저리두 구조 유형
      description: 디저리두의 제작 방식 또는 구조를 설명합니다(전통식 또는 현대식 제작 방식).
    dietary_formulation_claim:
      name: 영양 성분/배합 강조 표시
      description: '말 사료의 주요 제형 특성 또는 제외 사항을 나타냅니다(예: 곡물 무첨가, 저전분, 유기농).'
    dinosaur_playset_scale_figure_size_class:
      name: 공룡 놀이 세트 축척/피규어 크기 등급
      description: 다른 세트와의 호환성을 돕기 위해 포함된 공룡/피규어의 전반적인 스케일을 설명합니다.
    dinosaur_species_included:
      name: 포함된 공룡 종
      description: 플레이세트에 포함된 공룡의 종류(피규어 또는 공룡 모형)를 식별합니다.
    dipsy_diver_size_designation:
      name: 딥시 다이버 크기 표기
      description: 낚시용 딥시 다이버의 제조사 지정 크기 코드를 나타내며, 이는 무게 및 잠수 깊이와 관련이 있습니다.
    disc_brake_rotor_mount_type:
      name: 디스크 브레이크 로터 장착 유형
      description: '디스크 브레이크 로터를 허브에 장착하는 방식을 식별합니다(예: 6볼트, 센터락).'
    disc_lock_accessories_included:
      name: 디스크 잠금 장치 포함 액세서리
      description: '자전거 디스크 잠금장치와 함께 제공되는 추가 구성품을 나타냅니다(예: 알림 케이블, 휴대용 파우치, 장착 브래킷,
        배터리).'
    disco_ball_mirror_tile_material:
      name: 미러볼 거울 타일 소재
      description: 디스코볼에 사용된 반사 타일의 재질을 나타냅니다(해당하는 경우).
    disco_ball_mirror_tile_size:
      name: 디스코볼 거울 타일 크기
      description: 디스코 볼을 구성하는 개별 미러 타일/사각 조각의 대략적인 크기입니다.
    display_backlight_color:
      name: 디스플레이 백라이트 색상
      description: 계기판 디스플레이/다이얼의 백라이트 및 조명 색상.
    disposable_compostable_claim:
      name: 일회용/퇴비화 가능 제품이라는 주장
      description: 제품이 퇴비화 가능, 생분해 가능, 재활용 가능 또는 해당 없음에 해당하는지를 나타냅니다(해당하는 경우).
    distillation_method:
      name: 증류 방식
      description: 주류를 생산하는 데 사용된 증류 방식 또는 증류기의 유형을 식별합니다.
    distilled_water_intended_use:
      name: 증류수 용도
      description: '증류수의 주요 용도를 정의합니다(예: 음용수, CPAP 기기, 가습기, 스팀 다리미).'
    distress_transmission_frequency:
      name: 조난 신호 송신 주파수
      description: 조난 경보에 사용되는 주요 무선 주파수를 나타냅니다.
    distressing_level:
      name: 디스트레싱 수준
      description: 원단에 의도적으로 가해진 마모, 찢김 또는 올 풀림의 정도를 지정합니다.
    distressing_style:
      name: 디스트레싱 스타일
      description: '청바지의 워싱 정도 또는 손상 유형을 나타냅니다(예: 찢김 또는 워싱 효과).'
    distributor_advance_mechanism:
      name: 배전기 진각 메커니즘
      description: 배전기에 사용되는 점화 시기 진각 메커니즘의 유형을 지정합니다.
    distributor_cap_terminal_type:
      name: 배전기 캡 단자 유형
      description: 배전기 캡 단자의 형태를 지정합니다.
    distributor_gear_material:
      name: 배전기 기어 재질
      description: 배전기 구동 기어의 재질을 나타냅니다.
    distributor_ignition_type:
      name: 배전기 점화 방식
      description: 배전기가 접점식, 전자식 점화 또는 HEI 방식 시스템용으로 설계되었는지를 나타냅니다.
    distributor_kit_contents:
      name: 배전기 키트 구성품
      description: '배전기에 포함된 구성품을 나타냅니다(예: 배전기 캡, 로터, 점화 모듈, 개스킷/O링, 구동 기어, 배선/커넥터).'
    dive_computer_form_factor:
      name: 다이브 컴퓨터 폼 팩터
      description: 콘솔 장착형 또는 시계형과 같이 다이브 컴퓨터의 물리적 디자인 또는 장착 방식을 지정합니다.
    diving_mask_design:
      name: 다이빙 마스크 디자인
      description: 다이빙 마스크의 전반적인 구조 유형을 정의하며, 이는 착용감, 시야 및 용도에 영향을 미칩니다.
    divot_tool_prong_configuration:
      name: 디봇 툴 갈퀴 구성
      description: 잔디 손상을 복구하는 데 사용되는 디봇 툴의 갈퀴 수와 배열을 나타냅니다.
    divot_tool_style:
      name: 디봇 도구 스타일
      description: '디봇 툴의 전반적인 구조 또는 사용 방식을 정의합니다(예: 고정형, 접이식, 멀티툴형, 모자나 골프채에 부착하는
        액세서리형).'
    djembe_shell_construction:
      name: 젬베 쉘 구조
      description: 젬베 몸체의 제작 방식을 설명합니다.
    djembe_tuning_system:
      name: 젬베 튜닝 시스템
      description: 젬베의 장력을 조절하거나 튜닝하는 방식을 지정합니다.
    dmx_output_connector_type:
      name: DMX 출력 커넥터 유형
      description: 컨트롤러의 DMX 출력 포트에 사용되는 물리적 커넥터 규격입니다.
    doctor_playset_items_included:
      name: 의사 놀이 세트 품목 포함
      description: '병원 놀이세트에 포함된 장난감 의료 도구 및 역할 놀이용 액세서리를 지정합니다(예: 청진기, 주사기, 타진기).'
    doctor_playset_role_play_setting:
      name: 의사 놀이 세트 역할놀이 환경
      description: 병원 놀이세트가 나타내는 주요 역할 놀이 상황을 식별합니다.
    doctor_playset_wearable_items_included:
      name: 의사 놀이 세트 착용 소품 포함
      description: 놀이 세트에 포함된 착용 가능한 의상 구성품을 나타냅니다.
    doll_accessory_type:
      name: 인형 액세서리 유형
      description: '제품이 어떤 종류의 인형 또는 액션 피규어 액세서리인지를 정의합니다(예: 의류, 신발, 가구, 디스플레이 스탠드).
        이를 통해 소비자는 해당 액세서리 카테고리 내에서 제품을 검색하고 필터링할 수 있습니다.'
    doll_eye_type:
      name: 인형 눈 유형
      description: '인형 눈의 제작 형태를 지정합니다(예: 삽입형 아크릴 눈, 페인팅 눈, LED 조명 눈).'
    doll_hair_fiber_type:
      name: 인형 머리카락 섬유 유형
      description: 인형에 사용된 머리카락 또는 섬유의 유형(또는 사용되지 않음)을 나타내며, 이는 사실감, 스타일링 및 관리에 영향을
        미칩니다.
    doll_making_kit_components_included:
      name: 인형 만들기 키트 구성품 포함
      description: 인형 제작 키트에 포함된 주요 재료와 도구를 나열하여 소비자가 구성품을 비교하고 직접 준비해야 하는 항목을 확인할
        수 있도록 합니다.
    dollhouse_installation_placement_type:
      name: 인형의 집 설치/배치 유형
      description: '인형의 집을 어떻게 사용하거나 배치하도록 설계했는지 나타냅니다(예: 탁상형, 바닥 거치형, 벽걸이형).'
    dollhouse_items_included:
      name: 인형의 집 구성품
      description: '인형의 집과 함께 상자에 포함된 구성품을 식별합니다(예: 가구, 인형, 액세서리).'
    dollhouse_lighting_type:
      name: 인형의 집 조명 유형
      description: 인형의 집에 포함되거나 호환되는 조명의 유형을 나타냅니다.
    dollhouse_room_type:
      name: 인형의 집 방 유형
      description: 해당 액세서리가 일반적으로 사용되는 인형의 집 내부의 방/공간을 지정합니다.
    dollhouse_scale:
      name: 인형의 집 스케일
      description: '집, 가구, 피규어 간의 호환성을 보장하기 위한 인형의 집 또는 인형의 집 액세서리의 축적 비율(예: 1:12).'
    dollhouse_style_theme:
      name: 인형의 집 스타일/테마
      description: '인형의 집의 전반적인 스타일 또는 테마를 나타냅니다(예: 모던, 빅토리아풍). 이는 제품 탐색 및 선물 선택에
        도움이 됩니다.'
    donnos_playing_technique:
      name: 도노 연주 기법
      description: 구매자의 기대치 및 포함된 액세서리와 맞추기 위해 도노를 연주/타격하는 방식을 나타냅니다(손만 사용, 스틱/스트라이커
        사용).
    donnos_tuning_system:
      name: 돈노스 튜닝 시스템
      description: '음정을 조절하거나 튜닝하는 데 사용되는 주요 방법(예: 장력 조절 코드/조이기 메커니즘).'
    door_assembly_type:
      name: 문 어셈블리 유형
      description: 포함된 구성품이 도어 셸만인지, 도어 스킨인지 또는 완전한 도어 어셈블리인지를 나타냅니다.
    door_closure_mechanism:
      name: 도어 닫힘 메커니즘
      description: '문의 닫힘 동작을 제어하는 메커니즘을 정의합니다(예: 소프트 클로즈, 마그네틱 래치).'
    door_handle_components_included:
      name: 도어 핸들 구성품
      description: '도어 핸들에 어떤 주요 부품이 포함되어 있는지 나타냅니다(예: 잠금 실린더, 개스킷/씰, 트림 커버, 장착 하드웨어,
        와이어링 피그테일, 래치/액추에이터).'
    door_handle_operation:
      name: 도어 핸들 작동 방식
      description: '차량 도어 핸들 어셈블리의 주요 작동 방식을 나타냅니다(예: 기계식 링크, 키 실린더, 키리스 터치/버튼, 전동
        팝아웃 방식).'
    door_lock_knob_attachment_method:
      name: 도어 잠금 노브 부착 방식
      description: '도어 잠금 노브가 잠금 로드에 연결되는 방식을 나타냅니다(예: 나사식, 밀어 끼우는 방식).'
    door_lock_position:
      name: 도어 잠금 위치
      description: 차량에서 도어 잠금 장치 또는 도어 잠금 장치 부품이 장착되도록 설계된 도어/개폐 공간의 위치를 지정합니다.
    door_seal_feature_set:
      name: 도어 씰 기능 세트
      description: 도어 씰의 기능적 특징을 나타냅니다.
    door_seal_material_type:
      name: 도어 씰 재질 유형
      description: 도어 씰에 사용되는 주요 엘라스토머/소재 계열(일반적인 재질 분류 기준 이상).
    door_seal_product_form:
      name: 도어 씰 제품 형태
      description: 도어 씰의 판매 또는 포장 형태를 나타냅니다.
    door_window_operation:
      name: 문/창문 작동
      description: 도어의 창 시스템이 수동식인지 전동식인지, 또는 도어에 창이 없는지 여부를 지정합니다.
    double_decker_bus_deck_configuration:
      name: 이층 버스 데크 구성
      description: 이층 버스의 데크 접근 방식 또는 지붕 구성을 나타냅니다.
    double_drum_pedal_linkage_medium:
      name: 더블 드럼 페달 연결 방식
      description: '보조 페달을 메인 페달에 연결하는 데 사용되는 매체를 지정합니다(예: 드라이브 샤프트, 체인, 벨트).'
    double_end_bag_core_type:
      name: 더블엔드 백 코어 유형
      description: 내부 타격 코어의 구조를 식별하며, 이는 반발 속도, 타격감 및 유지보수 요구 사항을 결정합니다.
    double_pointed_needle_point_style:
      name: 양면 바늘 끝 스타일
      description: 다양한 털실 및 뜨개질 기술에 맞춰 설계된 바늘 끝의 날카로운 정도나 모양을 설명합니다.
    dough_extruder_accessories_included:
      name: 도우 압출기 포함 액세서리
      description: 반죽 압출기에 포함된 추가 구성품을 나타냅니다.
    dough_extruder_operation_type:
      name: 반죽 압출기 작동 방식
      description: 반죽이 압출기를 통과하여 모양을 만드는 방식을 설명합니다.
    dough_extruder_shape_disc_included:
      name: 반죽 압출기 모양 디스크 포함 여부
      description: 포함된 디스크/노즐을 통해 압출기가 만들어낼 수 있는 모양.
    dough_format:
      name: 반죽 형태
      description: 패키지 내부 도우(반죽)의 물리적 형태나 모양을 식별합니다(볼형, 시트형, 디스크형, 잘게 채 썬 형태).
    doumbek_accessories_included:
      name: 둠벡 액세서리 포함
      description: '둠벡에 포함된 액세서리(예: 튜닝 키, 케이스).'
    doumbek_head_material:
      name: 둠벡 헤드 소재
      description: 둠벡의 드럼 헤드(막) 재질을 나타냅니다.
    doumbek_head_type:
      name: 둠벡 헤드 유형
      description: 둠벡 헤드의 구조/유형(막을 만들거나 장착하는 방법).
    doumbek_playing_style_technique:
      name: 둠벡 연주 스타일/기법
      description: 둠벡과 일반적으로 연관된 권장 연주 상황이나 스타일.
    doumbek_tuning_system:
      name: 둠벡 튜닝 시스템
      description: 둠벡의 장력을 조절하거나 튜닝하는 방식(또는 튜닝 불가 여부).
    dowel_end_style:
      name: 다웰 엔드 스타일
      description: 나무못 끝부분의 절단 형태를 설명하며, 이는 삽입 편의성, 안전성 및 공예용 활용에 영향을 미칩니다.
    dowel_surface_texture:
      name: 다보 표면 질감
      description: '나무못의 표면 상태를 설명합니다(예: 매끄러운 형태, 홈이 있는 형태). 이는 외관과 접착력에 영향을 미칩니다.'
    drafting_compass_adjustment_mechanism:
      name: 제도용 컴퍼스 조정 메커니즘
      description: 반지름을 정밀하게 설정하는 데 사용되는 주요 미세 조정 메커니즘을 나타냅니다.
    drafting_compass_fine_adjustment_mechanism:
      name: 제도용 컴퍼스 미세 조정 메커니즘
      description: 반경을 정밀하게 설정하는 데 사용되는 미세 조정 유형(있는 경우).
    drafting_compass_lead_holder_type:
      name: 제도용 컴퍼스 심 홀더 유형
      description: 컴퍼스에 포함되거나 호환되는 드로잉 삽입물 또는 홀더의 유형을 나타냅니다.
    drag_system_material:
      name: 드래그 시스템 재질
      description: 드래그 스택에 사용된 재질 또는 기술을 식별하며, 이는 내열성과 부드러운 작동감에 영향을 미칩니다.
    drag_system_type:
      name: 드래그 시스템 유형
      description: '릴에 사용된 드래그 메커니즘의 유형을 식별합니다(예: 전면형, 후면형, 레버형, 스타형, 마그네틱형, 디스크형).'
    drag_type:
      name: 드래그 유형
      description: 릴에 사용되는 드래그 메커니즘의 스타일을 지정합니다(위치 또는 작동 방식).
    drawer_features:
      name: 서랍 특징
      description: '서랍 구조의 특수 요소 또는 기능을 상세히 설명합니다(예: 부드럽게 닫히는 기능, 펠트 안감).'
    drawer_slide_type:
      name: 서랍 슬라이드 유형
      description: '서랍 슬라이드의 장착 및 확장 방식을 지정합니다(예: 언더마운트, 풀 익스텐션).'
    drawing_ink_compatible_tools:
      name: 드로잉 잉크 호환 도구
      description: '잉크가 사용되도록 설계된 도구를 나타냅니다(예: 딥펜, 붓).'
    drawing_ink_permanence:
      name: 드로잉 잉크의 영구성
      description: 완성된 작품과 복제물에 중요한 내구성 또는 보존 특성을 나타냅니다.
    dress_embellishment:
      name: 드레스 장식
      description: 드레스 디자인에 포함된 주요 장식 요소를 나타냅니다.
    dress_train_type:
      name: 드레스 트레인 유형
      description: 드레스 자락의 유무와 길이/스타일을 나타내어, 행사 격식 및 장소와의 적합성을 안내합니다.
    dried_surface_finish:
      name: 건조 후 표면 마감
      description: 건조 후 나타나는 일반적인 표면 상태를 설명합니다(광택, 질감).
    drink_tube_insulation:
      name: 음용 튜브 단열
      description: 음용 튜브에 액체가 데워지거나 얼지 않도록 단열재 또는 보온/보냉 슬리브가 포함되어 있는지 여부를 나타냅니다.
    drive_band_cross_section_shape:
      name: 구동 밴드 단면 형상
      description: '구동 밴드의 단면 형상을 나타냅니다(예: 원형, 평면형).'
    drive_band_join_type:
      name: 드라이브 밴드 조인 유형
      description: 드라이브 밴드의 조인/구조 방식(무한형 vs. 결속 필요형 등).
    drive_band_material_type:
      name: 드라이브 밴드 소재 유형
      description: 물레에 사용되는 구동 밴드의 재질 또는 유형을 나타냅니다.
    drive_location:
      name: 드라이브 위치
      description: 타원형 운동기구에서 플라이휠/구동 메커니즘의 위치, Influence 공간 및 Motion 감에 미치는 영향을 파악합니다.
    drive_mechanism:
      name: 구동 메커니즘
      description: 페달에서 플라이휠로 동력을 전달하는 데 사용되는 구동계의 유형을 식별합니다.
    drive_shaft_material:
      name: 드라이브 샤프트 재질
      description: 드라이브 샤프트 튜브 또는 전체 조립체의 주요 구성 소재를 지정합니다.
    drive_system:
      name: 구동 시스템
      description: 페달 힘을 저항 시스템으로 전달하는 메커니즘을 지정합니다.
    drivetrain_configuration:
      name: 구동계 구성
      description: 자전거의 구동계 구성을 나타내며, 후륜 허브가 고정 기어 방식인지, 프리 휠 싱글 스피드 방식인지 또는 플립 플롭
        방식인지를 나타냅니다.
    drivetrain_speed_compatibility:
      name: 구동계 단수 호환성
      description: 올바른 톱니 모양과 간격을 보장할 수 있도록, 체인링이 함께 작동하도록 설계된 카세트 기어 단수를 나열합니다.
    drone_positioning_system:
      name: 드론 위치 추적 시스템
      description: 드론이 탐색 및 안정적인 호버링을 위해 지원하는 위치 파악 및 위치 유지 기술을 나타냅니다.
    drone_transmission_type:
      name: 드론 전송 유형
      description: 드론과 컨트롤러 또는 장치 간의 제어 및 영상 전송에 사용되는 주요 연결 방식을 나타냅니다.
    drop_spindle_whorl_position:
      name: 드롭 스핀들 휠 위치
      description: 축에 있는 소용돌이 무늬의 위치를 나타냅니다.
    drum_carder_accessories_included:
      name: 드럼 카더 액세서리 포함
      description: 드럼 카더 키트에 일반적으로 포함되는 품목.
    drum_clamp_locking_mechanism:
      name: 드럼 클램프 잠금 메커니즘
      description: '클램프가 튜브 또는 후프에 고정되거나 조여지는 방식을 나타냅니다(예: 윙 볼트, 드럼 키 볼트, 퀵 릴리스).'
    drum_clamp_mount_interface:
      name: 드럼 클램프 마운트 인터페이스
      description: '클램프가 액세서리 장착을 위해 제공하는 연결 부위를 나타냅니다(예: L로드 리시버, 볼 조인트, 심벌 틸터).'
    drum_clamp_type:
      name: 드럼 클램프 유형
      description: '드럼 키트 장착 하드웨어에 사용되는 기능적 클램프 유형을 나타냅니다(예: 후프 클램프, 랙/튜브 클램프).'
    drum_head_application_batter_resonant:
      name: 드럼 헤드 용도(타격면/공명면)
      description: 드럼 헤드가 드럼의 어느 면에 사용되도록 설계되었는지를 나타냅니다(상단 타격면 또는 하단 공명면/스네어면).
    drum_head_collar_type:
      name: 드럼 헤드 칼라 유형
      description: 헤드의 칼라가 표준형, 로우 칼라형 또는 특정 베어링 엣지나 쉘에 맞는 특수 칼라형인지를 나타냅니다.
    drum_head_damping_control:
      name: 드럼 헤드 댐핑 제어
      description: 헤드 설계에 포함된 내장형 배음 제어 기능 또는 댐핑 방식을 나타냅니다.
    drum_head_film_material:
      name: 드럼 헤드 필름 재질
      description: 헤드 필름의 주요 소재(일반적으로 PET/마일라, 특수 소재도 포함될 수 있음).
    drum_head_hoop_collar_type:
      name: 드럼 헤드 후프/칼라 유형
      description: '드럼 헤드의 후프와 칼라 구조를 식별합니다(예: 칼라 프로필 및 후프 재질). 이는 특정 쉘과 림에서 장착 및
        튜닝 안정성에 영향을 미칠 수 있습니다.'
    drum_head_hoop_rim_material:
      name: 드럼 헤드 후프/림 재질
      description: 플레시 후프 또는 림(헤드 내부에 내장된 후프)의 재질을 나타내며, 이는 내구성과 튜닝 안정성에 영향을 미칠 수
        있습니다.
    drum_head_included:
      name: 드럼 헤드 포함
      description: 드럼에 배터 헤드 및/또는 레조넌트 헤드가 포함되어 있는지를 나타냅니다.
    drum_head_muffling_feature:
      name: 드럼 헤드 뮤트 기능
      description: 드럼 헤드에 통합된 내장형 배음 제어 기능을 나타냅니다.
    drum_head_muffling_type:
      name: 드럼 헤드 뮤트 유형
      description: 드럼 헤드에 내장형 배음 제어 또는 뮤트 요소가 포함되어 있는지를 나타냅니다.
    drum_head_ply_count:
      name: 드럼 헤드 플라이 수
      description: '드럼 헤드 구조에 사용된 필름 겹 수(예: 1겹, 2겹).'
    drum_head_position:
      name: 드럼 헤드 위치
      description: 드럼 헤드가 배터(상단/타격면) 헤드, 레조넌트(하단/공명면) 헤드, 스네어사이드(하단) 헤드용인지 또는 양쪽 모두에
        사용할 수 있는지를 나타냅니다.
    drum_head_reinforcement_type:
      name: 드럼 헤드 보강 유형
      description: 내구성을 높이고 톤을 모아주기 위해 중앙 도트 또는 컨트롤 링과 같은 보강 기능이 포함되어 있는지 여부를 지정합니다.
    drum_head_surface_finish:
      name: 드럼 헤드 표면 마감
      description: 어택감과 브러시 반응성에 영향을 미치는 헤드의 표면 질감/마감.
    drum_head_type:
      name: 드럼 헤드 유형
      description: 드럼에 사용된 헤드의 구조 또는 유형을 나타냅니다(주로 기본 제공되는 배터 헤드 또는 레조넌트 헤드 기준).
    drum_key_design_type:
      name: 드럼 키 디자인 유형
      description: '텐션 드럼 키의 기능적 설계를 설명합니다(예: 표준형, 래칫형, T자형 핸들).'
    drum_key_drive_type:
      name: 드럼 키 구동 방식
      description: 텐션 로드 또는 장착 하드웨어를 조작하는 데 사용되는 드럼 키의 구동 방식 또는 인터페이스 유형을 나타냅니다.
    drum_key_handle_style:
      name: 드럼 키 핸들 유형
      description: 드럼 키의 핸들 또는 인체공학적 형태를 설명하며, 이는 튜닝 시 편안함과 지렛대 효과에 영향을 미칩니다.
    drum_kit_included_items:
      name: 드럼 키트 포함 품목
      description: '드럼 키트 번들에 쉘 및 패드 외에 포함된 주요 구성품을 나열합니다(예: 하드웨어, 심벌, 드럼 의자).'
    drum_kit_portability:
      name: 드럼 키트 휴대성
      description: '키트가 컴팩트한 보관 및 운반이 가능하도록 설계되었는지 여부를 나타냅니다(예: 여행용/컴팩트/접이식).'
    drum_kit_shell_construction_features:
      name: 드럼 키트 쉘 구조 기능
      description: 쉘의 구조(플라이 수 및 유형)를 설명하며, 이는 음색과 내구성에 영향을 미칩니다.
    drum_mount_clamp_type:
      name: 드럼 마운트 클램프 유형
      description: 드럼 장착 하드웨어에 사용되는 클램프의 형태를 설명합니다.
    drum_multi_clamp_clamp_type:
      name: 드럼 멀티 클램프 클램프 유형
      description: 멀티 클램프의 기능적 유형 또는 구성을 설명합니다(고정 방식 및 연결 대상).
    drum_mute_material:
      name: 드럼 뮤트 재질
      description: 드럼 헤드와 접촉하거나 진동을 흡수하는 드럼 뮤트의 주요 재질을 지정합니다.
    drum_pad_triggering_zones:
      name: 드럼 패드 트리거 영역
      description: '탐 패드가 지원하는 트리거 존의 수/유형(예: 헤드 전용, 헤드+림)을 나타내며, 이는 표현력과 모듈 호환성에
        영향을 미칩니다.'
    drum_pedal_accessories_included:
      name: 드럼 페달 액세서리 포함
      description: 드럼 페달에 포함된 주요 액세서리 및 구성품을 나열합니다.
    drum_pedal_baseplate_type:
      name: 드럼 페달 베이스플레이트 유형
      description: 페달이 베이스플레이트를 사용하는지 아니면 플로팅/프레임리스 디자인을 사용하는지를 나타냅니다.
    drum_pedal_bearing_type:
      name: 드럼 페달 베어링 유형
      description: '주요 회전축에 사용되는 베어링 메커니즘을 나타냅니다(예: 로커, 힐, 캠).'
    drum_pedal_cam_type:
      name: 드럼 페달 캠 유형
      description: '드럼 페달의 캠 형상 또는 기하학적 구조를 나타내며, 이는 페달의 느낌과 반응성에 영향을 미칩니다(예: 리니어형,
        액셀러레이터형).'
    drum_pedal_chain_configuration:
      name: 드럼 페달 체인 구성
      description: '체인 구동식 드럼 페달에 사용되는 체인 구성을 나타냅니다(예: 싱글 체인, 더블 체인, 오프셋 체인).'
    drum_pedal_chain_type:
      name: 드럼 페달 체인 유형
      description: '구동 장치에 사용되는 체인 유형을 나타냅니다(예: 롤러 체인, 자전거 체인). 이는 작동의 부드러움과 내구성에
        영향을 미칠 수 있습니다.'
    drum_pedal_clamp_type:
      name: 드럼 페달 클램프 유형
      description: 페달이 베이스 드럼 후프에 어떻게 부착되는지 지정합니다.
    drum_pedal_intended_use:
      name: 드럼 페달 용도
      description: 벨트 구동 페달이 사용되도록 설계되거나 판매되는 주요 연주 환경을 나타냅니다.
    drum_pedal_spring_adjustment_method:
      name: 드럼 페달 스프링 조정 방식
      description: 페달의 스프링 장력을 조정하는 방식을 나타냅니다.
    drum_pedal_spring_type:
      name: 드럼 페달 스프링 유형
      description: 페달 복귀 동작에 사용되는 스프링 메커니즘을 나타냅니다.
    drum_shell_material:
      name: 드럼 쉘 소재
      description: '어쿠스틱 드럼의 주요 쉘 구조 재질을 지정합니다(예: 단풍나무, 자작나무, 아크릴).'
    drum_shell_wood_species:
      name: 드럼 쉘 목재 종류
      description: 드럼 쉘에 사용된 목재 종류를 식별하며, 이는 음색과 공명에 영향을 미칩니다.
    drumhead_type:
      name: 드럼헤드 유형
      description: 옥토반에 사용된 헤드 구성/유형.
    drumstick_model:
      name: 드럼 스틱 모델
      description: '여러 브랜드에서 사용되는 표준 드럼스틱 모델/크기(예: 5A, 7A).'
    drumstick_taper:
      name: 드럼스틱 테이퍼
      description: 샤프트에서 팁까지의 테이퍼 프로파일을 설명하며, 이는 리바운드와 밸런스에 영향을 미칩니다.
    drysuit_footwear_style:
      name: 드라이슈트 풋웨어 스타일
      description: '드라이슈트의 일체형 하단 마감 방식을 설명합니다(예: 내장형 부츠, 네오프렌 양말, 스타킹풋형, 맨발목 씰).'
    dumbbell_style:
      name: 덤벨 스타일
      description: '구매 결정과 운동 활용 방식에 큰 영향을 미치는 덤벨의 핵심 디자인을 식별합니다(예: 고정형, 조절식/무게 조절
        덤벨, 원판 조립식 핸들 형태).'
    dundun_playing_position:
      name: 던던 연주 위치
      description: 드럼의 권장 연주 또는 휴대 위치.
    dye_status:
      name: 염색 상태
      description: 배트가 염색된 상태인지, 무염색/천연 상태인지 또는 여러 색상이나 혼합 색상을 포함하는지를 나타냅니다.
    dye_style:
      name: 염색 스타일
      description: 실의 색상이 단색인지, 여러 색상이 섞인 것인지, 또는 특수 염색된 것인지를 지정합니다.
    dye_technique:
      name: 염색 기법
      description: '섬유에 색을 입히는 데 사용된 방식을 나타냅니다(예: 손염색, 케틀 염색, 스페이스 염색).'
    dye_type_needlecraft_fabric:
      name: 염색 유형(수예용 원단)
      description: 린넨 원단이 단색인지, 손염색되었는지 또는 특수 염색되었는지를 나타냅니다.
    dyeing_color_processing:
      name: 염색/색상 처리
      description: '섬유가 염색되었는지 여부와 염색 방식을 설명합니다(예: 염색되지 않음, 표백/흰색, 특정 염색 기법).'
    e_bike_certification_class:
      name: 전기자전거 인증 과정
      description: '전기자전거용 타이어의 공식 속도 등급을 나타냅니다(예: E-25, E-50).'
    e_bike_speed_rating:
      name: 전기자전거 속도 등급
      description: '타이어의 공식 전기자전거 인증 등급을 나타냅니다(예: E25는 시속 25km 이하, E50은 시속 50km 이하).'
    e_scooter_connector_type:
      name: 전동 스쿠터 커넥터 유형
      description: 전원 또는 신호 연결을 위해 부품에 사용되는 전기 커넥터나 플러그의 형태를 식별합니다.
    e_scooter_throttle_type:
      name: 전동 스쿠터 스로틀 유형
      description: 전동 스쿠터의 가속을 제어하는 데 사용되는 스로틀 유형을 나타냅니다.
    ear_coverage:
      name: 귀 덮개 범위
      description: 헬멧에 귀 보호대가 포함되어 있는지, 그리고 탈착 가능한지 지정합니다.
    ear_coverage_style:
      name: 귀 커버 스타일
      description: 플라이 마스크가 귀를 덮는지 여부와 덮는 방식을 설명합니다.
    ear_coverage_type:
      name: 귀 덮개 유형
      description: 이어 플랩의 유무와 형태를 포함하여 모자가 귀를 어떻게 덮거나 보호하는지 지정합니다.
    ear_guard_type:
      name: 귀 보호대 유형
      description: '모자에 내장된 귀 보호대의 형태를 설명합니다(예: 단단한 플라스틱형, 패드형 또는 탈착식 보호대).'
    earmuff_style:
      name: 귀마개 유형
      description: '귀마개를 착용하는 방법 또는 구조적 디자인 스타일을 나타냅니다(예: 머리 위로 쓰는 방식 또는 머리 뒤로 감싸는
        방식).'
    earring_closure_type:
      name: 귀걸이 잠금 유형
      description: '귀걸이를 귀에 고정하는 방식을 나타냅니다(예: 푸시백, 레버백, 클립형).'
    easel_art_desk_features:
      name: 이젤 및 미술 책상 특징
      description: 이젤이나 미술용 책상에 포함되는 기능적 특징을 강조하여 나타냅니다.
    easel_art_desk_surface_type:
      name: 이젤 및 미술용 책상 표면 유형
      description: '사용 가능한 드로잉/필기 표면을 식별합니다(예: 칠판, 화이트보드, 롤페이퍼, 자석 보드).'
    eb_clarinet_body_type:
      name: Eb 클라리넷 바디 유형
      description: Eb 클라리넷이 소프라노인지 알토인지를 지정합니다.
    eco_material_type:
      name: 친환경 소재 유형
      description: 패드에 사용된 친환경 폼 또는 소재 기술을 나타냅니다.
    edge_construction:
      name: 에지 구조
      description: 스키에 금속 엣지가 전혀 없는지, 일부 구간에만 있는지 또는 전체 길이에 걸쳐 있는지를 나타냅니다.
    edge_tuner_type:
      name: 엣지 튜너 유형
      description: 파일 가이드 또는 전동기 등 스키 또는 스노보드 엣지 튜너의 형태를 분류합니다.
    edible_plant_part:
      name: 식용 가능한 식물 부위
      description: 식물의 어느 부위가 식용으로 판매 중인지를 나타냅니다.
    educational_guide_included:
      name: 교육용 가이드 포함
      description: 모형에 포함된 학습 자료를 나타냅니다.
    educational_topic:
      name: 교육 주제
      description: 개미 사육 세트의 교육 콘텐츠가 지원하는 주요 학습 주제.
    egg_component:
      name: 계란 성분
      description: 제품에 계란의 어떤 부분이 포함되어 있는지 명시합니다. 예를 들어, 전란, 흰색, 노른자, 또는 혼합/대체품 등이
        있습니다.
    egg_component_replaced:
      name: 대체된 계란 성분
      description: '제품이 달걀의 어느 부분을 대체하도록 설계되었는지를 나타냅니다(예: 전란, 난백).'
    egg_enrichment:
      name: 계란 영양 강화
      description: 오메가-3나 비타민 D 강화 등 계란에 추가된 영양 강화 성분을 나타냅니다.
    egg_farming_method:
      name: 계란 양계 방식
      description: '달걀의 생산 또는 사육 방식을 나타냅니다(예: 케이지 프리, 방목, 유기농).'
    egg_grade:
      name: 계란 등급
      description: 규제 기관 또는 업계 단체에서 부여한 품질 등급을 나타냅니다.
    egg_processing_state:
      name: 달걀 가공 상태
      description: '달걀이 판매되기 전에 거친 가공 상태를 나타냅니다(예: 신선란, 염장란, 삭힌 달걀).'
    egg_production_method:
      name: 계란 생산 방법
      description: '계란 생산에 사용된 사육 또는 사육 시스템을 지정합니다(예: 방사 사육, 방목, 유기농).'
    egg_replacer_main_ingredient:
      name: 계란 대체재의 주요 성분
      description: 계란 대체제의 주원료를 표시하여 사용자가 식이요법이나 원하는 베이킹 특성에 맞게 선택할 수 있도록 도움을 줍니다.
    egg_size:
      name: 달걀 크기
      description: 달걀을 업계 표준 크기 등급에 따라 분류합니다.
    egg_source_animal:
      name: 산란 동물
      description: 알을 생산한 동물의 종을 식별합니다.
    egg_white_processing_method:
      name: 계란 흰자 처리 방식
      description: '수집 후 계란 흰자가 어떻게 처리되었는지 나타내며(예: 살균 액상형, 분무 건조 분말형 등), 이는 식품 안전성,
        유통기한 및 활용 목적에 영향을 미칩니다.'
    eggplant_variety:
      name: 가지 품종
      description: 가지의 구체적인 품종 또는 유통 품종을 나타내며, 소비자가 크기, 맛, 색상 및 용도에 따라 원하는 종류를 선택할
        수 있도록 합니다.
    eggshell_color:
      name: 계란 껍질 색상
      description: 계란 껍질의 주된 색상을 지정합니다.
    elastic_edge_finish_type:
      name: 고무줄 엣지 마감/유형
      description: 착용감과 용도에 영향을 미치는 직조 고무줄의 엣지 마감 구조를 지정합니다.
    elastic_intended_use:
      name: 고무줄 용도
      description: 고무줄이 설계된 주요 용도(검색을 지원하고 불일치를 줄여줌).
    elastic_recovery_performance:
      name: 탄성 회복 성능
      description: 직조형 고무줄이 늘어난 후 원래 길이로 얼마나 잘 돌아오는지를 설명합니다.
    elastic_recovery_quality:
      name: 탄성 회복 품질
      description: 고무줄의 탄성 회복력을 나타내며, 이는 늘어난 후 원래 길이로 얼마나 잘 돌아오는지를 의미합니다.
    elastic_stretch_level:
      name: 신축성 수준
      description: 고무줄이 장력을 받을 때 얼마나 늘어날 수 있는지를 나타냅니다(정확한 백분율이 제공되지 않는 경우 상대적 수준으로
        표시되는 경우가 많음).
    elastic_structure:
      name: 고무줄 구조
      description: '단추구멍 고무줄의 구조를 나타냅니다(예: 편직형, 직조형, 편조형). 이는 신축성, 복원력 및 봉제 성능에 영향을
        미칠 수 있습니다.'
    elastic_type:
      name: 엘라스틱 유형
      description: '고무줄의 구조 유형을 나타냅니다(예: 접이식 고무줄(FOE), 편조형, 편직형, 직조형).'
    electric_assist_type:
      name: 전기 보조 유형
      description: 자전거에 모터 보조 장치가 있는지 여부와 제공되는 보조 장치의 종류를 나타냅니다.
    electric_bicycle_motor_position:
      name: 전기자전거 모터 위치
      description: '전기 자전거의 구동 모터 위치(예: 미드 드라이브, 전륜 허브, 후륜 허브 또는 듀얼 허브).'
    electric_bike_class:
      name: 전기자전거 등급
      description: 전기자전거를 속도 제한 및 스로틀 보조 기준을 정의하는 규제 등급에 따라 분류합니다.
    electric_guitar_bridge_type:
      name: 일렉트릭 기타 브리지 유형
      description: 일렉트릭 기타의 브리지 또는 비브라토 시스템 유형을 나타냅니다.
    electric_instrument_output_connection_type:
      name: 전자 악기 출력 연결 방식
      description: 일렉트릭 첼로에 제공되는 물리적 오디오 출력 단자를 나타냅니다.
    electric_riding_vehicle_control_options:
      name: 전동 승용 완구 제어 옵션
      description: '탑승자/보호자가 사용할 수 있는 제어/조작 옵션(예: 페달, 핸들, 원격 조작).'
    electric_spinning_wheel_speed_control_type:
      name: 전기 물레 속도 조절형
      description: 사용자가 전동 물레의 회전 속도를 조절하는 방식을 설명합니다.
    electric_ukulele_output_jack_type:
      name: 일렉트릭 우쿨렐레 출력 잭 유형
      description: 일렉트릭 우쿨렐레에 사용되는 물리적 출력 커넥터를 지정합니다.
    electric_van_body_length_class:
      name: 전기 밴 차체 길이 등급
      description: 제품 정보에 사용되는 일반적인 휠베이스 및 길이 기준 밴 크기 등급을 나타냅니다.
    electric_van_roof_height_class:
      name: 전기 밴 지붕 높이 등급
      description: 밴(특히 화물 밴)에 일반적으로 사용되는 루프 높이 분류.
    electric_vehicle_drivetrain_layout:
      name: 전기차 구동계 구성
      description: 모터와 차축의 구성을 나타내며, 모터의 개수와 위치를 설명합니다(AWD/FWD/RWD와 같은 단순 구분 이상의 정보).
    electric_winder_accessories_included:
      name: 전동 와인더 포함 액세서리
      description: '전동 와인더에 포함된 액세서리를 나열합니다(예: 클램프, 어댑터).'
    electrical_connector_type:
      name: 전기 커넥터 유형
      description: 도어 잠금 시스템이 전기적으로 연결되는 데 사용하는 커넥터 유형을 나타냅니다(해당하는 경우).
    electrical_system_voltage:
      name: 전기 시스템 전압
      description: 조절기가 사용되도록 설계된 차량 전기 시스템의 공칭 전압을 나타냅니다.
    electronic_cymbal_trigger_zones:
      name: 전자 심벌 트리거 영역
      description: '심벌 패드가 제공하는 독립적인 트리거 영역의 개수를 지정합니다(예: 보우/엣지/벨).'
    electronic_drum_module_audio_interface_functionality:
      name: 전자 드럼 모듈 오디오 인터페이스 기능
      description: 해당 모듈이 MIDI 기능 외에 녹음 및 재생을 위한 USB 오디오 인터페이스로도 작동할 수 있는지를 나타냅니다.
    electronic_drum_module_metronome_features:
      name: 전자 드럼 모듈 메트로놈 기능
      description: 내장된 연습 또는 메트로놈 기능을 나타냅니다.
    electronic_drum_module_power_source:
      name: 전자 드럼 모듈 전원 공급 방식
      description: 제어 모듈에 필요하거나 지원되는 전원을 지정합니다.
    electronic_drum_module_sample_import_support:
      name: 전자 드럼 모듈 샘플 가져오기 지원
      description: 모듈이 사용자 샘플을 가져올 수 있는지 여부와 가져올 수 있는 해당 방법을 나타냅니다.
    electronic_drum_pad_playing_surface_type:
      name: 전자 드럼 패드 연주면 유형
      description: '탐 패드의 연주면 구조(예: 메쉬 헤드 vs 고무)가 반발력, 소음 및 타격감에 미치는 영향을 설명합니다.'
    electronic_features:
      name: 전자 기능
      description: 놀이용 은행 장난감에 포함된 전자 또는 상호작용 기능을 나타냅니다(해당하는 경우).
    electronic_lights_and_sound:
      name: 전자식 조명 및 음향
      description: '인형의 집 놀이 세트에 전자식 조명 및/또는 음향 기능이 포함되어 있는지를 나타냅니다(예: 조명, 초인종 소리,
        음악, 음향 효과).'
    electronics_power_source:
      name: 전자 제품 전원 공급 방식
      description: 활성 전자 제품에 전원이 공급되는 방식을 지정합니다(해당되는 경우).
    eligible_race_series:
      name: 참가 자격이 있는 레이스 시리즈
      description: 해당 차량이 참가 자격을 갖춘 레이스 시리즈 또는 공인 경기 운영 단체를 나타냅니다.
    elliptical_trainer_part_type:
      name: 일립티컬 트레이너 부품 유형
      description: '일립티컬 트레이너용 액세서리 또는 교체 부품 종류(예: 벨트, 콘솔, 페달)를 구체적으로 분류하여, 소비자가 여러
        세부 카테고리를 거치지 않고도 필요한 품목을 빠르게 찾을 수 있도록 합니다.'
    embellishment_technique:
      name: 장식 기법
      description: 자수, 프린트, 비즈 장식 등 의류에 적용된 주요 장식 또는 표면 처리 작업을 상세히 설명합니다.
    embellishment_type:
      name: 장식 유형
      description: 레이스, 리본, 진주 등 가터벨트에 사용된 장식 요소의 종류를 식별합니다.
    embossing_pen_ink_color:
      name: 엠보싱 펜 잉크 색상
      description: 엠보싱 펜으로 찍어내는 잉크의 색상을 지정합니다(투명/점착성 또는 유색). 펜/본체 색상과는 다릅니다.
    embossing_stylus_tip_shape:
      name: 엠보싱 스타일러스 팁 형태
      description: '다양한 효과를 내기 위해 사용되는 엠보싱 팁의 형상을 설명합니다(예: 볼형, 뾰족형).'
    embroidered_coverage_level:
      name: 자수 커버 범위 수준
      description: 패치 앞면에 자수된 부분의 대략적인 면적 비율.
    embroidered_patch_backing_type:
      name: 자수 패치 뒷면 유형
      description: 자수 패치의 뒷면에 있는 지지층으로, 내구성과 부착 방식에 영향을 미칩니다.
    embroidery_hoop_type:
      name: 자수틀 유형
      description: 자수틀의 구조 유형과 주요 장력 조절 방식을 식별합니다.
    embroidery_machine_bobbin_type:
      name: 자수기 보빈 유형
      description: 보빈 시스템의 유형/장착 방식.
    emergency_lighting_configuration:
      name: 비상 조명 구성
      description: '차량에 설치된 주요 비상 경고등 구성을 지정합니다(예: 루프 경광등, 그릴 라이트).'
    emergency_lighting_package:
      name: 비상 조명 패키지
      description: 설치된 비상 경고등의 유형을 나타냅니다.
    emissions_compliance_standard:
      name: 배출가스 규제 기준
      description: 해당되는 경우 엔진의 배출가스 인증/규정 준수 여부를 나타냅니다.
    emissions_standard:
      name: 배출 기준
      description: 차량이 충족하는 배출가스 규제 기준을 나타냅니다(지역 및 연도에 따라 다름).
    enclosure_panel_configuration:
      name: 인클로저 패널 구성
      description: 전체 밀폐형, 측면 커튼형 또는 3면형(전면 또는 후면 개방) 등 포함된 외장 패널 또는 측면 구성을 나타냅니다.
    enclosure_window_material:
      name: 외장 창 패널 재질
      description: 외장의 투명 창 패널에 사용된 재질을 식별합니다.
    end_fitting_type:
      name: 끝단 피팅 유형
      description: 스트럿 양쪽 끝(차량측 및 덮개측)에 사용되는 커넥터 유형을 나타내며, 이는 장착 호환성을 결정합니다.
    end_type:
      name: 엔드 유형
      description: 복구 지점에 연결하기 위한 견인 스트랩 끝부분의 연결 방식(탈착 방식)을 지정ㅌ합니다.
    ends_style_blocking_wires:
      name: 끝단 마감 방식(블로킹 와이어)
      description: 블로킹 와이어 끝부분이 안전성과 레이스 가장자리를 통과시키기 쉬운 정도를 고려해 어떻게 마감되었는지를 설명합니다.
    enduro_bike_suspension_adjustability:
      name: 엔듀로 바이크 서스펜션 조절 기능
      description: 조정 가능한 서스펜션 기능을 나타냅니다(일반적으로 프런트 포크 및 리어 쇼크 기준).
    engine_bay_mounting_location:
      name: 엔진 베이 장착 위치
      description: 오버플로 탱크가 엔진룸 내 어느 위치에 장착되도록 설계되었는지를 나타냅니다.
    engine_bearing_coating:
      name: 엔진 베어링 코팅
      description: 내마모성, 이물질 매입성, 마찰 감소 등을 위해 베어링에 적용된 표면 코팅을 지정합니다.
    engine_bearing_position:
      name: 엔진 베어링 위치
      description: 엔진 내부에서 베어링의 장착 위치나 기능을 지정합니다.
    engine_bearing_size:
      name: 엔진 베어링 규격
      description: 베어링이 표준 규격인지 또는 언더사이즈/오버사이즈 규격인지를 나타내며, 이는 일반적으로 크랭크샤프트 연삭 및 간극과
        관련됩니다.
    engine_configuration:
      name: 엔진 구성
      description: '엔진의 실린더 배열 및 구성 방식을 설명합니다(예: 직렬형, V형, 수평대향형/박서).'
    engine_cooling_type:
      name: 엔진 냉각 방식
      description: 엔진의 냉각 방식을 지정합니다.
    engine_degreaser_form:
      name: 엔진 탈지제 형태
      description: 엔진 기름때 제거제의 물리적 형태/제공 방식.
    engine_degreaser_rinse_requirement:
      name: 엔진 기름때 제거제 헹굼 요구 사항
      description: 탈지제를 사용한 후 물로 헹구도록 설계되었는지를 나타냅니다.
    engine_mount_type:
      name: 엔진 마운트 유형
      description: '엔진 마운트의 기능적 설계를 나타냅니다(예: 유압식, 솔리드형, 토크 스트럿형).'
    engine_oil_formulation:
      name: 엔진 오일 배합
      description: '엔진 오일의 주요 용도를 나타냅니다(예: 일반용, 고주행거리 차량용, 장기 교환 주기용, 차량 대량 운영 또는
        중장비용).'
    engine_oil_specification:
      name: 엔진 오일 규격
      description: '오일이 충족하는 규격/표준(예: API SP, API SN Shopify Plus, API CK-4, ACEA
        C3, ILSAC GF-6A).'
    engine_rebuild_kit_contents:
      name: 엔진 재조립 키트 구성품
      description: 엔진 재조립 키트에 포함된 주요 구성품을 식별합니다.
    engine_rotation_direction:
      name: 엔진 회전 방향
      description: 선박용 엔진에 사용되는 회전 방향을 나타냅니다.
    engine_timing_system_drive_type:
      name: 엔진 타이밍 시스템 구동 방식
      description: 호환성 확인을 위해 엔진 타이밍 시스템이 벨트 구동식인지, 체인 구동식인지, 기어 구동식인지를 나타냅니다.
    engine_valve_coating:
      name: 엔진 밸브 코팅
      description: 밸브에 적용된 내마모성 또는 내열성 표면 처리나 코팅을 식별합니다.
    engine_valve_position:
      name: 엔진 밸브 위치
      description: 엔진 밸브가 흡기측용인지 배기측용인지를 나타냅니다.
    engine_valve_stem_tip_type:
      name: 엔진 밸브 스템 팁 타유형입
      description: 로커암 또는 조절기와 접촉하는 밸브 스템 끝단의 형태 또는 구조를 나타냅니다.
    engine_valvetrain_type:
      name: 엔진 밸브 트레인 유형
      description: 밸브트레인 또는 캠샤프트 구성을 나타냅니다.
    enhancement_level:
      name: 강화 레벨
      description: 삽입물로 인해 증가하는 대략적인 볼륨을 미미함(최대 1컵), 보통(1~2컵), 큼(2컵 이상) 등 컵 크기 기준으로
        나타냅니다.
    entry_zipper_location:
      name: 착용 지퍼 위치
      description: '슈트의 주요 출입 지퍼 또는 개구부 위치를 나타냅니다(예: 앞면, 뒷면, 어깨, 대각선).'
    epee_point_type:
      name: 에페 포인트 유형
      description: 블레이드에 장착된 포인트의 제조사 또는 규격을 나타내며, 이는 호환성과 유지보수에 영향을 미칩니다.
    equestrian_discipline:
      name: 승마 종목
      description: 박차가 사용되도록 설계되었거나 가장 적합한 승마 종목을 나타냅니다.
    equestrian_helmet_safety_certification:
      name: 승마 헬멧 안전 인증
      description: 헬멧이 준수하는 안전 기준 또는 인증을 나타냅니다.
    equine_application_area:
      name: 말 적용 지역
      description: '제품이 사용될 신체 지역 또는 재질을 지정합니다(예: 발굽, 갈기, 마구).'
    equipment_contact_material_brew_wine:
      name: 장비 접촉 재질(양조/와인 제조용)
      description: '액체와 접촉하는 부분의 주요 재질을 나타냅니다(예: 유리, 스테인리스강, 플라스틱).'
    eu_children_clothing_size:
      name: EU 아동복 사이즈
      description: 'EU 아동복 사이즈를 신장 기준으로 나타냅니다(예: 104, 140).'
    eu_clothing_size:
      name: 유럽 옷 사이즈
      description: '영국 옷 사이즈(예: 38 또는 46)를 지정합니다.'
    eu_cup_size:
      name: EU 컵 사이즈
      description: 'EU 브래지어 컵 사이즈를 나타냅니다(예: C, E).'
    eu_ring_size:
      name: EU 반지 사이즈
      description: 'EU 반지 사이즈를 둘레 기준으로 나타냅니다(예: 52, 63).'
    eu_shoe_size:
      name: EU 신발 사이즈
      description: '유럽 신발 사이즈를 지정합니다(예: 42 또는 42 와이드).'
    euphonium_included_accessories:
      name: 유포니엄 포함 액세서리
      description: '유포늄과 함께 일반적으로 제공되는 구성품을 나열합니다(예: 마우스피스, 케이스).'
    euphonium_valve_configuration:
      name: 유포늄 밸브 구성
      description: 밸브의 개수를 지정하고, 4번째 밸브가 수동식인지 측면 작동식인지 여부를 지정합니다.
    european_sword_historical_period:
      name: 유럽 검의 역사적 시대 구분
      description: 해당 검의 형태 또는 복제품이 기반으로 한 주요 역사 시대(또는 원본이 제작된 시대)를 나타냅니다.
    european_sword_pattern_type:
      name: 유럽 검의 양식/유형
      description: 수집용 검이 나타내는 특정 유럽 검의 양식 또는 유형(분류 체계).
    ev_connector_adapter_direction:
      name: EV 커넥터/어댑터 변환 방향
      description: 정확한 호환성 필터링이 가능하도록 어댑터가 변환하는 FROM과 TO를 지정합니다(차량 인렛단, 충전기/케이블단).
    ev_conversion_kit_completeness_level:
      name: EV 전환 키트 완성도 수준
      description: '제품이 전체 전환 키트인지 부분 키트/번들인지를 나타냅니다(예: 모터+컨트롤러 전용).'
    ev_conversion_kit_drivetrain_configuration:
      name: EV 전환 키트 구동계 구성
      description: 모터의 배치/구동 레이아웃 및 기존 변속기 유지 여부를 포함하여 EV 전환 키트의 구동계 아키텍처를 지정합니다.
    ev_conversion_kit_voltage_class:
      name: EV 전환 키트 전압 등급
      description: EV 전환 키트가 기준으로 설계된 공칭 시스템 전압 등급을 나타냅니다. 정확한 전압 값 외에도 일반적인 시스템 전압
        등급으로 필터링하는 데 사용됩니다.
    evaporator_core_type:
      name: 에바포레이터 코어 유형
      description: 차량용 에어컨 에바포레이터 코어의 구조적 디자인을 지정합니다.
    evenweave_fabric_finish_treatment:
      name: 균일직 원단 마감/처리
      description: 취급감이나 외관에 영향을 미치는 원단의 사전 마감 처리 또는 가공 방식을 나타냅니다.
    evenweave_fabric_package_format:
      name: 균일직 원단 포장 형태
      description: 원단이 판매되는 방식(컷팅된 조각 형태, 야드/미터 단위로 판매).
    exercise_bike_accessory_part_type:
      name: 운동용 자전거 액세서리/부품 유형
      description: '해당 품목의 주요 기능이나 구성품 유형을 설명합니다(예: 페달, 구동 벨트, 물통 홀더, 화면 커버, 크랭크 암).'
    exercise_bike_cushion_component:
      name: 실내 자전거 쿠션 구성품
      description: '제공되는 좌석 관련 구성품을 나타냅니다(예: 시트 패드, 안장, 시트 커버).'
    exercise_bike_metrics_tracked:
      name: 운동용 자전거 측정 지표
      description: 컴퓨터가 실시간으로 측정하고 표시할 수 있는 운동 데이터 필드를 나열합니다.
    exercise_mat_accessories_included:
      name: 운동용 매트 포함 액세서리
      description: 스트랩이나 무릎 패드 등 매트와 함께 제공되는 추가 구성품을 나열합니다.
    exhaust_cooling_type:
      name: 배기 냉각 방식
      description: 배기 부품이 습식 배기(수랭식/수분 분사식) 시스템용인지 건식 배기 시스템용인지를 나타냅니다.
    exhaust_installation_position:
      name: 배기 장치 설치 위치
      description: 해당 부품이 차량의 어느 위치에 설치되는지를 나타냅니다.
    exhaust_outlet_configuration:
      name: 배기구 구성
      description: 차량 후면의 배기구 배출 레이아웃을 지정합니다.
    expansion_tank_cap_connection_type:
      name: 팽창 탱크 캡 연결 방식
      description: 캡을 팽창 탱크 주입구에 연결하고 밀봉하는 데 사용되는 기계적 결합 방식을 나타냅니다.
    expansion_tank_cap_pressure_relief_feature:
      name: 팽창 탱크 캡 압력 해제 기능
      description: 캡이 압력 또는 진공 해제 기능을 제공하는지 여부와 그 방식을 나타냅니다.
    expansion_tank_cap_seal_material:
      name: 팽창탱크 캡 씰 재질
      description: 확장 탱크 넥 부위와 접촉하는 개스킷/씰.
    extension_attachment_method:
      name: 연장 부품 장착 방식
      description: 연장 부품이 자전거 콕핏 또는 핸들바에 고정되는 방식을 나타내며, 사용자가 기존 구성과의 호환성을 확인하는 데 도움이
        됩니다.
    extension_bend_type:
      name: 연장 부품 굴곡 유형
      description: 핸들바 연장 부품의 형상 또는 굴곡 형태를 설명하며, 이는 라이더의 인체공학적 자세와 공기역학 성능에 영향을 미칩니다.
    extension_mechanism:
      name: 확장 메커니즘
      description: 테이블이 길이 또는 표면적을 확장하는 데 사용하는 방법을 설명합니다(해당되는 경우).
    extension_table_features:
      name: 확장 테이블 기능
      description: 재봉틀 확장 테이블의 주요 기능적 특징을 나타냅니다.
    eyelet_grommet_installation_method:
      name: 아일렛 및 그로밋 설치 방식
      description: 아일렛 또는 그로밋을 재질에 설치하거나 고정하는 방식을 나타냅니다.
    eyewear_lens_shape:
      name: 안경 렌즈 형태
      description: '렌즈의 기하학적 형태를 나타냅니다(예: 원통형, 구면형). 이는 시야, 왜곡 및 스타일에 영향을 미칩니다.'
    eyewear_strap_material:
      name: 안경 스트랩 소재
      description: 고글 또는 안경을 사용자의 머리에 고정하는 조절식 스트랩의 재질을 나타냅니다.
    fabric_backing_type:
      name: 패브릭 뒷면 유형
      description: 인쇄용 면 원단에 안정화용 종이 뒷면이 포함되어 있는지 여부와 그 종류를 나타내며, 이는 표준 프린터에 급지할 수
        있는지 여부를 결정합니다.
    fabric_cut_format:
      name: 원단 재단 형식
      description: 수예용 캔버스의 재단 형태 또는 규격을 나타냅니다.
    fabric_end_use:
      name: 원단 용도
      description: 원단의 주된 용도(가장 적합한 사용 목적)를 식별합니다.
    fabric_finish:
      name: 원단 마감
      description: 실크 원단의 광택, 촉감, 질감에 영향을 미치는 표면 마감/처리 방식입니다.
    fabric_intended_use:
      name: 패브릭 권장 용도
      description: 린넨 원단에 권장되는 주요 용도 또는 프로젝트를 나타냅니다.
    fabric_opacity_level:
      name: 원단 불투명도 수준
      description: 원단의 비침 정도를 나타내며, 이는 레이어드나 안감의 필요 여부에 영향을 미칩니다.
    fabric_patch_shape:
      name: 패브릭 패치 모양
      description: 키트에 포함된 패치의 모양을 설명합니다.
    fabric_repair_kit_application_method:
      name: 패브릭 수선 키트 사용 방식
      description: '수선 부자재를 원단에 적용하는 방식을 나타냅니다(예: 다림질 부착형, 봉제형, 접착형).'
    fabric_repair_kit_components_included:
      name: 원단 수선 키트 구성품
      description: '키트에 포함된 구체적인 구성품을 나열합니다(예: 패치, 실, 바늘, 접착제).'
    fabric_repair_kit_intended_use:
      name: 패브릭 수선 키트 용도
      description: '키트가 해결하도록 설계된 일반적인 수선 작업 유형을 지정합니다(예: 찢어짐, 구멍, 밑단 수선).'
    fabric_selling_format:
      name: 패브릭 판매 형식
      description: 원단의 판매 형태(연속 길이, 재단된 조각, 롤/볼트 또는 샘플)를 나타냅니다.
    fabric_stretch_level:
      name: 패브릭 스트레치 레벨
      description: 원단의 신축성 또는 탄성 정도를 설명하며, 소비자가 몸에 밀착되는 의류나 형태가 중요한 프로젝트에 적합한 원단을
        선택하는 데 도움이 됩니다.
    fabric_stretch_type:
      name: 패브릭 스트레치 유형
      description: 서핑이나 수영 시 활동성에 중요한 보드쇼츠 원단의 신축성을 나타냅니다.
    fabric_texture:
      name: 원단 질감
      description: 라운지웨어 상의에 사용된 원단의 표면 감촉 또는 편직 구조를 설명합니다.
    fabric_use_case:
      name: 원단 용도
      description: 새틴 원단 조각/롤의 주요 권장 용도.
    fabric_weight_class:
      name: 패브릭 중량 등급
      description: 소비자가 정확한 GSM/oz 값을 몰라도 쉽게 검색할 수 있도록, 플란넬 원단을 일반적인 사용 중량 구간별로 분류했습니다.
    face_mask_material:
      name: 페이스 마스크 소재
      description: 헬멧에 포함되어 있거나 호환되는 페이스 마스크의 재질 구성.
    face_mask_style:
      name: 페이스 마스크 스타일
      description: 패션 마스크의 전체적인 형태 또는 구조 유형을 정의하며, 소비자가 선호하는 착용감과 디자인을 찾는 데 도움이 됩니다.
    face_mask_style_code:
      name: 안면 보호대 스타일 코드
      description: '안면 보호대의 구조용 바 유형 또는 업계 코드 체계를 정의합니다(예: ROPO, OPO, RJOP).'
    face_protection_type:
      name: 페이스 보호대 유형
      description: '헬멧에 기본 제공되거나 내장된 안면 보호 장치의 유형을 나타냅니다(예: 케이지, 바이저).'
    faceplate_security_features:
      name: 페이스플레이트 보안 기능
      description: 기본 디자인 외에 전면 패널과 관련된 도난 방지 및 접근 기능을 나타냅니다.
    facing_length:
      name: 페이싱 길이
      description: 마우스피스의 페이싱 길이(곡선 길이)를 나타내며, 이는 반응성과 리드 선택에 영향을 미칩니다.
    fan_shroud_type:
      name: 팬 슈라우드 유형
      description: '팬 슈라우드의 적용 범위 또는 형상 유형을 나타냅니다(예: 전체형, 반형, 링형).'
    farming_method:
      name: 재배 방식
      description: 방사 사육이나 유기농 등 동물을 사육할 때 적용된 동물 복지 또는 축산 방식을 강조하여 나타냅니다.
    farming_practice:
      name: 사육 방식
      description: '해당 제품에 사용된 주요 재배 방식을 식별합니다(예: 일반 재배, 유기농 재배, 수경 재배).'
    fascinator_style:
      name: 페시네이터 스타일
      description: 소비자가 인기 있는 모자 스타일별로 빠르게 필터링할 수 있도록 패시네이터의 구조적 디자인이나 모양을 설명합니다.
    fastener_grade:
      name: 패스너 등급
      description: 8등급 또는 10.9등급과 같이 허용 하중을 결정하는 볼트의 강도 등급/클래스를 나타냅니다.
    fat_rendering_state:
      name: 지방 정제 상태
      description: 지방이 정제되었는지, 정제되지 않은 상태(생지방)인지 또는 부분적으로 정제되었는지를 나타내며, 이는 보관 기간과
        요리 용도에 영향을 미칩니다.
    fat_source:
      name: 지방 원료
      description: 버터, 기(ghee) 또는 마가린 생산에 사용된 주요 지방 원료를 식별하며(동물성 또는 식물성), 이는 알레르기
        및 식이 기준에 따른 필터링에 도움이 됩니다.
    faucet_hole_configuration:
      name: 수전 구멍 구성
      description: 세면대 상판에 미리 뚫려 있는 수전 구멍의 개수와 배치 형태를 나타냅니다.
    feather_application:
      name: 깃털 용도
      description: 공예나 제작을 위한 칠면조 깃털의 주요 권장 용도 또는 활용 분야.
    feather_attachment_format:
      name: 깃털 부착/형식
      description: 인조 깃털이 사용 목적으로 어떻게 준비되어 판매되는지 나타냅니다(낱개 형태, 실로 붙어 있는 형태, 테이프에 감겨
        있는 형태 등).
    feather_coloration_style:
      name: 깃털 색상 유형
      description: '기본 색상 값과 관계없이 깃털에 색상이 어떻게 적용되었거나 표현되는지 설명합니다(예: 단색, 끝부분 염색, 그라데이션).'
    feather_component:
      name: 깃털 부위
      description: '판매 중인 공작 깃털의 부위 또는 유형을 나타냅니다(예: 눈무늬 깃털, 헤를).'
    feather_curvature:
      name: 깃털 곡률
      description: 깃털의 전체적인 형태 또는 곡률을 나타냅니다.
    feather_finish:
      name: 깃털 마감
      description: '타조 깃털이 천연 상태인지 또는 장식용으로 가공되었는지(예: 염색, 표백)를 나타냅니다.'
    feather_form:
      name: 깃털 형태
      description: 판매되는 거위 깃털 조각의 물리적 형태를 지정합니다.
    feather_grade:
      name: 깃털 등급
      description: 공예용 또는 전시용으로 사용되는 깃털의 전반적인 품질 또는 선별 등급을 나타냅니다.
    feather_part:
      name: 깃털 부위
      description: 판매되는 칠면조 깃털의 부위/구조(공예 및 낚시용 플라이 타잉 재료 목록에서 흔히 사용됨).
    feather_processing_type:
      name: 깃털 가공 유형
      description: '공예용으로 깃털이 어떻게 가공 또는 처리되었는지를 나타냅니다(예: 염색, 표백, 천연/무염색).'
    feather_product_form:
      name: 깃털 제품 형태
      description: '판매 중인 깃털 제품의 물리적 형태를 나타냅니다(예: 낱개 깃털, 보아, 프린지).'
    feather_quantity_unit:
      name: 깃털 수량 단위
      description: 상품 목록 간의 정확한 비교가 가능하도록 제품이 판매되는 방식을 정의합니다(개별, 중량별, 묶음별).
    feather_source:
      name: 깃털 원산 동물
      description: 깃털 셔틀콕에 사용된 깃털의 동물성 출처를 지정합니다.
    feather_stiffness:
      name: 깃털 강성
      description: 깃털 가지/구조의 상대적인 강성/강직도.
    feed_mechanism:
      name: 공급메커니즘
      description: 투구 연습기에 공이 공급되는 방식을 나타냅니다.
    feed_purpose:
      name: 사료 용도
      description: 사료 또는 보충제의 주요 영양학적 또는 기능적 목적을 설명합니다.
    feeder_mechanism_type:
      name: 피더 메커니즘 유형
      description: 급이기가 사료를 배출하는 데 사용하는 공급 메커니즘을 식별합니다.
    feijoa_cultivar:
      name: 페이조아 품종
      description: 판매 중인 페이조아의 구체적인 품종 또는 재배종을 식별합니다. 품종에 따라 맛, 크기 및 수확 시기가 다릅니다.
    felt_duty:
      name: 펠트 등급
      description: '테니스공의 펠트 등급을 나타내며(예: 내마모형, 일반형), 이는 다양한 코트 표면에서의 내구성에 영향을 미칩니다.'
    felting_mold_intended_use:
      name: 펠팅 몰드 권장 용도
      description: 펠팅 프로젝트에서 해당 몰드가 무엇을 제작하거나 어떤 용도로 사용되는지 나타냅니다.
    felting_pad_surface_material:
      name: 펠팅 패드 표면 소재
      description: 펠팅 패드 또는 매트의 작업면 중 섬유 또는 바늘과 접촉하는 부분에 사용된 재질을 나타냅니다.
    fencing_certification:
      name: 펜싱 인증
      description: '펜싱 무기가 충족하는 공식 관리 기구의 승인 또는 인증을 나열하며(예: FIE, USFA), 이는 경기 사용 적합
        여부와 품질 기준을 나타냅니다.'
    fencing_connector_type:
      name: 펜싱 커넥터 유형
      description: '펜싱 코드, 소켓 또는 릴을 연결하는 데 사용되는 커넥터 구성을 나타내며(예: 2핀, 3핀, 베요넷형), 이는
        구성품 간 호환성을 보장합니다.'
    fencing_discipline:
      name: 펜싱 세부 종목
      description: 제품이 사용되도록 설계되었거나 호환되는 펜싱 무기 또는 종목을 나타냅니다.
    fencing_weapon_type:
      name: 펜싱 무기 유형
      description: 훈련 보조 도구가 호환되거나 재현하는 펜싱 또는 연습용 무기 유형을 나타내며, 이를 통해 사용자가 적합한 장비를
        찾을 수 있습니다.
    fender_finish_state:
      name: 펜더 마감 상태
      description: 도색 및 즉시 장착이 가능하도록 제공되는 펜더의 표면/마감 상태를 나타냅니다.
    fender_pieces_included:
      name: 펜더 구성품 포함
      description: 펜더가 단품인지 액세서리가 포함된 전체 세트인지 명확히 알 수 있도록 제품과 함께 제공되는 구성품을 나열합니다.
    fender_type:
      name: 펜더 유형
      description: 펜더의 전체적인 디자인 또는 스타일을 분류합니다.
    fennel_trimming:
      name: 회향 손질 상태
      description: '회향 구근에 어떤 식물 부위가 포함되어 있는지를 나타냅니다(예: 잎 포함, 윗부분 및 뿌리 제거).'
    fennel_variety:
      name: 회향 품종
      description: 판매되는 회향 구근의 품종 또는 시장 품종을 지정합니다.
    fermentation_application:
      name: 발효 용도
      description: '해당 배양균이 발효시키도록 설계된 주요 식품 또는 음료를 식별합니다(예: 치즈, 요거트, 밀크 케피어, 사워도우).'
    fermentation_method:
      name: 발효 방식
      description: '간장이 어떤 방식으로 생산되거나 발효되었는지를 나타냅니다(예: 자연 양조, 화학적 가수분해).'
    fermentation_vessel_material:
      name: 발효 용기 재료
      description: 키트에 포함된 발효 용기의 주요 재질(있는 경우).
    ferrule_material:
      name: 페룰 재질
      description: '샤프트 페룰에 사용된 재질을 나타내며(예: Juma, 페놀릭, 폴리카보네이트, XTC 또는 없음), 이는 내구성과
        타구감에 영향을 미칩니다.'
    fia_homologation_certification:
      name: FIA 인증
      description: 차량(또는 안전 장치)이 인증/형식을 받았는지 여부와 어떤 기준에 따라 받았는지 나타냅니다.
    fiber_animal_source_type:
      name: 섬유 원료 동물/원산 유형
      description: '로빙을 얻은 동물이나 주요 출처(또는 합성 섬유)(예: 메리노 울, 알파카, 식물성 섬유).'
    fiber_luster_level:
      name: 섬유 광택 수준
      description: 무광부터 고광택까지 섬유의 시각적 광택을 나타냅니다.
    fiber_preparation_processing_stage:
      name: 섬유 준비/가공 단계
      description: '원사 슬리버가 사용 전에 어떻게 준비/가공되었는지(예: 카드 가공 vs 코밍 가공, 블렌딩, 슈퍼워시)를 나타냅니다.'
    fiber_preparation_type:
      name: 섬유 가공 형태
      description: '공예용으로 섬유가 어떻게 가공되었는지를 식별합니다(예: 카드 배트, 드럼 카딩, 프리펠트 시트).'
    field_hockey_ball_playing_surface:
      name: 필드하키 공 경기 표면
      description: 공이 사용되도록 설계된 경기장 표면이나 환경을 식별합니다.
    field_hockey_ball_type:
      name: 필드하키 공 유형
      description: 필드하키 공을 용도 또는 특수 기능에 따라 분류합니다.
    field_hockey_goal_size_standard:
      name: 필드하키 골대 크기 표준
      description: '골대를 일반적인 필드하키 규격 또는 훈련용 크기에 따라 분류합니다(예: FIH 공식 경기용, 유소년용, 미니형).'
    field_hockey_training_objective:
      name: 필드하키 훈련 목표
      description: 훈련 보조 도구가 향상시키도록 설계된 주요 기술 또는 중점 영역을 정의합니다.
    field_point_attachment_method:
      name: 필드 포인트 부착 방식
      description: '필드 포인트가 화살 샤프트 또는 삽입물에 고정되는 방식을 나타냅니다(예: 나사식, 접착식).'
    field_point_tip_style:
      name: 필드 포인트 팁 유형
      description: 관통력, 화살 수거 시 드는 힘, 규정 적합 여부에 영향을 미치는 필드 포인트 팁의 기하학적 형태나 기능적 프로필을
        정의합니다.
    fielding_glove_position:
      name: 수비 글러브 포지션
      description: 야구 또는 소프트볼 경기에서 해당 글러브가 설계된 수비 포지션 또는 용도를 나타냅니다.
    fielding_training_focus:
      name: 수비 훈련 중점 분야
      description: 해당 보조 도구가 연습 중 주로 향상하도록 설계된 기술 영역을 나타냅니다.
    fig_variety:
      name: 무화과 품종
      description: 판매 중인 무화과의 구체적인 재배종 또는 품종을 나타냅니다.
    figure_8_device_design:
      name: 8자 하강기 설계
      description: 조작 특성과 권장 용도에 영향을 미치는 8자형 장치의 구체적인 구성을 식별합니다.
    figure_finish_type:
      name: 피규어 마감 유형
      description: 말 모형 피규어의 표면/도색 마감(수집품으로서의 외관/촉감)을 나타냅니다.
    figurine_scale:
      name: 피규어 스케일
      description: '실제 대상 대비 피규어의 축적 비율(해당되는 경우)(예: 1:6).'
    fill_status:
      name: 충전 상태
      description: 그래플링 더미가 충전된 상태, 미충전 상태 또는 부분 충전 상태로 판매되는지를 나타내며, 이는 배송비와 구매자가
        들여야 하는 준비 작업에 영향을 미칩니다.
    filling_consistency:
      name: 필링 농도
      description: '제공되는 충전물의 질감이나 점도를 설명합니다(예: 부드러운 크림, 덩어리진 과일, 페이스트).'
    filling_type:
      name: 필링 유형
      description: 쿠키 안에 들어있는 주요 필링이나 크림을 지정합니다(있는 경우).
    filtration_and_mother_status:
      name: 여과 방식 및 모체 상태
      description: 식초가 여과되었는지, 비여과 상태인지, 생식초인지 또는 초모(mother)를 포함하는지를 나타내며, 이는 프로바이오틱스
        또는 생식초 제품을 찾는 소비자에게 도움이 됩니다.
    filtration_method:
      name: 여과 방식
      description: 증류 후 보드카를 여과하고 정제하는 데 사용된 여과재 또는 기술.
    fin_box_system:
      name: 핀 박스 시스템
      description: 보드에 사용되는 핀 박스 또는 장착 인터페이스를 나타내며, 이는 애프터마켓 핀과의 호환성을 결정합니다.
    fin_buoyancy:
      name: 핀 부력
      description: 물속에서 핀이 양성, 중성, 음성 부력 중 어떤 것을 갖는지 나타내며, 이는 다이버의 트림과 장비 밸런스에 영향을
        미칩니다.
    fin_flex_rating:
      name: 핀 유연성 등급
      description: 핀의 상대적인 강성 또는 플렉스 수준을 나타내며, 이는 전반적인 성능에 영향을 미칩니다.
    fin_mounting_system:
      name: 핀 장착 시스템
      description: '핀과 보드 간의 호환성을 보장하기 위해, 핀을 카이트보드에 고정하는 데 사용되는 부착 인터페이스 또는 표준을 정의합니다(예:
        FCS II, 나사식, 4홀).'
    fin_position:
      name: 핀 위치
      description: 보드 위에서 핀의 권장 장착 위치를 지정합니다.
    fin_strap_type:
      name: 핀 스트랩 유형
      description: 핀을 발 또는 발뒤꿈치에 고정하는 데 사용되는 스트랩 또는 고정 시스템의 유형을 나타냅니다.
    fin_template:
      name: 핀 템플릿
      description: 서핑보드 핀의 유체역학적 형상 또는 윤곽을 분류하며, 이는 회전 특성, 속도 및 전반적인 보드의 주행감에 영향을
        미칩니다.
    finger_count:
      name: 손가락 수
      description: 장갑, 탭 또는 릴리스 핸들이 지원하도록 설계된 손가락 수를 나타냅니다.
    finger_coverage:
      name: 손가락 덮개
      description: 손가락이 어느 정도까지 덮이는지를 나타냅니다.
    finger_grip_adjustability:
      name: 손가락 그립 조절 기능
      description: 손가락 그립이 다양한 손 크기에 맞도록 어떻게 부착되거나 조절되는지를 나타냅니다.
    finger_hole_configuration:
      name: 핑거 홀 구성
      description: 손가락 구멍의 방향을 나타냅니다(오른손용, 왼손용 또는 양손용).
    finger_hole_count:
      name: 손가락 구멍 개수
      description: 그립 가죽에 있는 손가락 구멍의 개수를 나타내며, 이는 손가락 구멍이 없는 모델, 2홀 모델, 3홀 모델, 4홀
        모델 간의 주요 차이점입니다.
    finger_pick_band_style:
      name: 핑거픽 밴드 유형
      description: 착용감과 조절 성능에 영향을 미치는 손가락 부착용 밴드/루프의 형태.
    finger_pick_blade_length:
      name: 핑거 픽 날 길이
      description: 밴드에서 돌출된 피킹 블레이드의 길이를 나타냅니다.
    finger_pick_blade_shape:
      name: 핑거 픽 날 모양
      description: 현과 접촉하는 피킹면(블레이드)의 형태를 나타냅니다.
    finger_pick_size:
      name: 핑거 픽 사이즈
      description: 핑거픽의 밴드 또는 루프 크기를 나타내며, 이는 악기 크기가 아니라 손가락 또는 엄지 둘레에 맞추기 위한 것입니다.
    finger_pick_wear_location:
      name: 핑거픽 착용 위치
      description: 핑거픽을 어느 손가락에 착용하도록 설계했는지 또는 엄지와 손가락 세트 제품인지를 나타냅니다.
    finger_protection:
      name: 손가락 보호
      description: 장갑에 손가락 등 보호대가 포함되어 있는지, 그리고 해당 보호대가 탈착 가능한지를 나타냅니다.
    fingerboard_bearing_type:
      name: 핑거보드 베어링 유형
      description: 핑거보드 휠에 사용되는 베어링 유형을 지정합니다.
    fingerboard_grip_type:
      name: 지판 그립 유형
      description: 핑거보드 데크에 사용된 그립 표면 재질/유형을 지정합니다.
    fining_agent_active_ingredient:
      name: 정제제 활성 성분
      description: 제품에 사용된 주요 정제 또는 청징 성분을 나타냅니다.
    fining_agent_type:
      name: 정제제 유형
      description: 레드 와인을 정제(청징)하는 제품의 화학 성분이나 정제제 재질을 지정합니다.
    finish_after_baking:
      name: 구운 후 마감 상태
      description: 경화되거나 구운 후 나타나는 일반적인 표면 외관을 설명합니다.
    finish_effect:
      name: 마감 효과
      description: 큐빅에 적용된 특수 표면 효과 또는 광학적 효과를 설명합니다.
    finish_type:
      name: 마감 유형
      description: 우쿨렐레 바디에 적용된 표면 마감 처리.
    finished_product_format:
      name: 완제품 형식
      description: 키트로 제작할 수 있는 향 제품의 유형을 나타냅니다.
    fire_pit_accessories_included:
      name: 화로대 액세서리 포함
      description: 상자 안에 무엇이 들어있는지 명확히 알 수 있도록 불멍 화로와 함께 제공되는 불꽃 방지망, 화산석 등 주요 액세서리를
        나열합니다.
    firework_assortment_launch_type:
      name: 불꽃놀이 세트 발사 방식
      description: 포함된 불꽃놀이가 일반적으로 어떻게 점화되거나 발사되는지 설명합니다.
    firework_assortment_types_included:
      name: 불꽃놀이 세트 포함 유형
      description: '구성 상품에 포함된 주요 불꽃놀이 제품 유형을 식별하며(예: 분수형 불꽃놀이, 로만 캔들, 폭죽), 이를 통해
        소비자가 세트 구성품을 비교할 수 있습니다.'
    firework_effect_types:
      name: 불꽃놀이 효과 유형
      description: 구성 상품이 만들어내는 주요 시각적 및/또는 감각적 효과 유형을 나타냅니다(해당하는 항목 모두 선택).
    firework_ignition_method:
      name: 불꽃놀이 점화 방법
      description: '폭죽이 어떻게 점화되거나 작동되는지 지정합니다(예: 도화선 또는 전기 점화 장치).'
    firework_visual_intensity_level:
      name: 불꽃놀이 시각 효과 강도 수준
      description: 분수형 불꽃놀이에서 발생하는 불꽃의 전반적인 시각적 강도 또는 규모를 나타냅니다.
    firing_mode:
      name: 발사 모드
      description: 에어소프트건이 지원하는 선택 가능한 발사 모드 또는 기본 발사 모드를 나열합니다.
    first_day_cover_cachet_type:
      name: 초일봉투 캐시 유형
      description: '초일봉투에 날인된 소인의 종류(예: 인쇄형, 핸드페인팅형).'
    first_day_cover_cancellation_type:
      name: 초일봉투 소인 유형
      description: '초일봉투에 적용된 소인의 유형을 나타냅니다(예: 기계 소인, 수기 소인).'
    first_day_cover_set_type:
      name: 초일봉투 세트 구성 유형
      description: 해당 봉투가 단일 발행본인지, 전체 세트인지, 아니면 부분 세트/조합인지 나타냅니다.
    fishing_hook_size:
      name: 낚시바늘 크기
      description: '낚시바늘의 표준 사이즈 표기(예: #4, 1/0, 10/0)를 지정하여 낚시꾼이 대상 어종과 미끼에 맞는 바늘
        사이즈를 선택할 수 있도록 도와줍니다.'
    fishing_hook_style:
      name: 낚시 후크 스타일
      description: 미끼의 연출, 후킹(바늘걸이) 효율 및 권장 용도에 영향을 미치는 외바늘의 구체적인 디자인이나 구부러진 패턴을 식별합니다.
    fishing_hook_type:
      name: 낚시 후크 유형
      description: 낚시용 스푼에 함께 제공되는 바늘의 구성을 설명합니다(해당하는 경우).
    fishing_line_application:
      name: 낚싯줄 용도
      description: '낚싯줄 또는 목줄 소재의 권장 용도를 식별합니다(예: 목줄, 원줄, 티펫).'
    fishing_line_buoyancy_type:
      name: 낚싯줄 부력 유형
      description: '낚싯줄이 물속에서 어떻게 작동하는지를 분류하며(예: 부상형, 중간층형, 침강형), 이를 통해 낚시꾼이 적절한 수심
        공략 방식을 선택할 수 있도록 합니다.'
    fishing_needle_purpose:
      name: 낚시바늘 용도
      description: 낚시 장비 설치 작업에서 바늘의 주요 용도를 식별합니다.
    fishing_needle_types_included:
      name: 낚시바늘 포함 유형
      description: 세트에 포함된 구체적인 바늘 또는 리깅 도구 유형을 나열하여 고객이 구성품을 빠르게 확인할 수 있도록 합니다.
    fit_profile:
      name: 핏 프로필
      description: 활동성과 보호 면적에 영향을 미치는 패드의 전체적인 컷팅 형태와 실루엣을 설명합니다.
    fit_volume_classification:
      name: 핏 볼륨 분류
      description: '브랜드에서 사용하는 기준에 따라 부츠의 전체 내부 볼륨을 분류합니다(예: LV는 로우 볼륨).'
    fitting_angle:
      name: 피팅 각도
      description: '피팅 본체의 굴곡 각도를 나타냅니다(예: 직선형, 45°, 90°). 각도 조절이 가능한 피팅에는 ''조절 가능/회전식''을
        사용하고, 일반적이지 않은 각도에는 ''기타''를 사용합니다.'
    flag_base_type:
      name: 깃발 베이스 유형
      description: 다양한 경기 표면에서 코너 플래그를 고정하는 데 사용되는 앵커 또는 베이스 유형을 정의합니다.
    flag_design_theme:
      name: 깃발 디자인 테마
      description: '목적에 맞는 상품 검색과 필터링을 돕기 위해 깃발에 표현된 주요 디자인 테마를 설명합니다(예: 국가/국가적 상징,
        스포츠 팀, 휴일).'
    flag_mounting_method:
      name: 깃발 장착 방식
      description: '깃발이 차량에 부착되는 방식을 나타냅니다(예: 안테나 장착식, 히치 장착식, 자석식).'
    flag_type:
      name: 깃발 유형
      description: '골프 깃발의 구체적인 용도 또는 유형을 분류합니다(예: 핀 플래그, 카트 플래그, 연습용 플래그).'
    flame_resistance_standard:
      name: 방염 기준
      description: 해당 의류가 충족하는 방염 또는 아크 플래시 관련 기준 또는 인증을 나타냅니다.
    flamenco_cajon_snare_system:
      name: 플라멩코 카혼 스네어 시스템
      description: 플라멩코 특유의 버즈음을 생성하는 데 사용되는 내부 스네어 메커니즘을 지정합니다(또는 없음).
    flammability_compliance:
      name: 가연성 규정 준수
      description: 차량 내부용으로 사용되는 직물이 충족해야 하는 난연성 기준을 명시합니다.
    flannel_brushing_finish:
      name: 플란넬 브러싱 마감
      description: 플란넬이 브러싱 처리되었는지 여부와 어느 면에 적용되었는지를 나타내며, 이는 부드러움, 보온성 및 외관에 영향을
        미칩니다.
    flannel_use_type:
      name: 플란넬 용도 유형
      description: 플라넬 원단 조각 또는 롤의 주요 권장 용도.
    flap_configuration:
      name: 플랩 구성
      description: 모노플랩 또는 트윈플랩 등 안장의 플랩 스타일을 지정합니다.
    flare_color:
      name: 신호탄 색상
      description: 방출되는 빛/불꽃의 색상(또는 LED 플레어의 경우 렌즈 색상).
    flash_card_included_features:
      name: 플래시 카드에 포함된 기능
      description: 플래시 카드에 포함된 주요 학습 또는 활용 기능을 나타냅니다.
    flavor_intensity:
      name: 풍미 강도
      description: '향료 제품의 농도를 나타내며, 사용자가 적절한 사용량을 결정하는 데 도움이 됩니다(예: 표준 농도, 고농축).'
    flavor_solvent_base:
      name: 향료 용매 기반
      description: '향료에 사용된 주요 캐리어 또는 용매를 식별합니다(예: 알코올, 프로필렌 글리콜, 글리세린).'
    fleece_fiber_animal_type:
      name: 플리스 섬유 원료 동물 종류
      description: 플리스 섬유를 얻은 동물성 출처(종류).
    fleece_finish_surface:
      name: 플리스 마감/표면
      description: '보풀 발생 빈도, 부드러움, 외관에 영향을 미치는 플리스의 표면 가공/마감 상태를 설명합니다(예: 보풀 방지,
        브러싱).'
    fleece_preparation_method:
      name: 플리스 가공 방식
      description: 플리스가 공예 및 방적용으로 어떻게 준비되거나 가공되었는지를 나타냅니다(섬유의 상태).
    flesh_color:
      name: 과육 색상
      description: 멜론의 내부 과육 색상을 나타냅니다.
    fletching_orientation:
      name: 깃 부착 방향
      description: '화살깃이 화살대에 부착되는 방식을 나타내며(예: 직선형, 오프셋형, 나선형), 이는 화살의 회전과 비행에 영향을
        미칩니다.'
    fletching_profile:
      name: 화살깃 형태
      description: 화살깃의 기하학적 형태 또는 절단 방식을 정의하며, 이는 항력, 간섭 여유, 소음 및 전반적인 화살 비행 특성에
        영향을 미칩니다.
    flight_system_type:
      name: 플라이트 시스템 유형
      description: 플라이트의 제작 방식을 식별하며, 접이식, 성형식 및 플라이트-샤프트 일체형 시스템을 구분합니다.
    float_attachment_method:
      name: 부표 부착 방식
      description: '찌가 낚싯줄에 어떻게 부착되는지(예: 슬립형 또는 고정형)를 설명하여 낚시꾼이 채비 방식별로 필터링할 수 있도록
        합니다.'
    float_design:
      name: 낚시찌 유형
      description: '낚시찌의 전반적인 유형을 분류하며(예: 보버형, 웨글러형, 펜슬형), 이를 통해 낚시꾼이 자신의 기법과 환경에
        적합한 모델을 빠르게 선택할 수 있습니다.'
    float_raft_use_environment:
      name: 튜브/보트 사용 환경
      description: '해당 튜브 또는 수상용 제품이 주로 사용되도록 설계된 수상 환경을 나타내며(예: 수영장, 잔잔한 개방 수역, 파도
        구간), 이는 내구성과 설계 특성을 반영합니다.'
    floatation:
      name: 부력
      description: 비콘이 물에 뜨도록 설계되었는지를 나타냅니다.
    floor_construction_type:
      name: 바닥 구조 유형
      description: '배수, 강성 및 실적 요소에 영향을 미치는 뗏목 바닥의 설계(예: 자체 배수, Drop스티치)를 지정합니다.'
    floor_design:
      name: 바닥 디자인
      description: 외장 구조물과 함께 제공되는 바닥 덮개의 유형을 나타냅니다.
    floor_inclusion:
      name: 바닥 포함 여부
      description: 텐트 전실에 바닥 매트가 포함되어 있는지, 그리고 그 바닥을 분리할 수 있는지 나타냅니다.
    floor_mat_cleaning_method:
      name: 바닥 매트 청소 방법
      description: 제조업체에서 권장하는 바닥 매트의 주요 세척 방식을 나타냅니다.
    floor_mat_edge_style:
      name: 바닥 매트 가장자리 유형
      description: 매트에 액체 유출물이나 이물질을 가두기 위한 턱 또는 높게 올라온 가장자리가 있는지를 설명합니다.
    floor_mat_format:
      name: 바닥 매트 형태
      description: '바닥 보호 제품의 물리적 형태 또는 유형을 정의합니다(예: 단일 매트, 인터록 타일, 롤형).'
    floor_mat_retention_system:
      name: 바닥 매트 고정 장치 시스템
      description: 매트를 제자리에 고정하는 방식을 나타냅니다.
    floor_mat_set_configuration:
      name: 바닥 매트 세트 구성
      description: '패키지에 포함된 위치를 나타냅니다(예: 전열 한 쌍만, 전체 세트).'
    floss_sugar_granulation_grade:
      name: 치실용 설탕 입자 크기 등급
      description: '설탕 혼합물의 결정 크기를 설명하며(예: 미세, 중간, 굵은), 이는 기계 성능과 최종 질감에 영향을 미칠 수
        있습니다.'
    floss_sugar_product_form:
      name: 솜사탕 설탕 제품 형태
      description: 치실용 설탕이 즉시 사용 가능한 제품인지, 일반 설탕과 섞어야 하는 향료 농축액인지, 아니면 무색의 기본 설탕인지를
        나타냅니다.
    flour_grind_texture:
      name: 밀가루 분쇄 질감
      description: '밀가루의 분쇄 정도 또는 질감을 나타내며(예: 초미세, 중간, 굵은 입자, 석분), 이는 조리 결과에 영향을 미칠
        수 있습니다.'
    flour_processing_method:
      name: 밀가루 가공 방식
      description: '밀가루에 적용된 주요 가공 또는 처리 방식을 나타내며(예: 석분, 표백, 발아, 강화), 이는 풍미, 색상 또는
        영양 성분에 영향을 미칩니다.'
    flower_care_instructions:
      name: 꽃 관리 방법
      description: '생화 절화의 관리에 권장되는 방법을 안내합니다(예: 줄기 다듬기, 물 교체 주기 조절).'
    flugelhorn_leadpipe_material:
      name: 플루겔호른 리드파이프 재질
      description: 리드파이프 구성품 소재(악기 전체 소재와 별도로 명시된 경우).
    flugelhorn_trigger_type:
      name: 플루겔호른 트리거 유형
      description: 플루겔혼에 튜닝 트리거가 있는지 여부와, 있을 경우 어떤 슬라이드 또는 밸브를 작동시키는지를 나타냅니다.
    fluorescence_grade:
      name: 형광 등급
      description: 자외선에 노출되었을 때 다이아몬드의 형광 강도를 나타냅니다.
    fluorescence_under_uv:
      name: 자외선 하에서의 형광 반응 여부
      description: 시료가 자외선 아래에서 형광을 나타내는지 여부와, 나타낸다면 어떤 종류의 형광인지를 나타냅니다.
    fluorocarbon_content:
      name: 불소카본 함량
      description: 왁스에 불소화탄소 첨가제가 포함되어 있는지 여부와 그 함량 수준을 나타냅니다.
    flute_case_capacity:
      name: 플루트 케이스 수납 용량
      description: '플루트 본체 외에 케이스가 추가로 수납할 수 있도록 설계된 품목을 나타냅니다(예: 플루트+피콜로, 추가 헤드조인트).'
    flute_cleaning_rod_tip_type:
      name: 플루트 청소봉 끝 유형
      description: '청소용 천/소각을 고정하거나 악기와 접촉하는 청소봉 끝단의 디자인을 설명합니다(예: 슬롯형, 나사형, 아일릿형).'
    flute_footjoint_type:
      name: 플루트 풋조인트 유형
      description: 플루트의 풋조인트 구성을 나타냅니다.
    flute_headjoint_cork_type:
      name: 플루트 헤드조인트 코르크 유형
      description: 헤드조인트와 함께 제공되는 헤드조인트 코르크 또는 마개 조립체의 재질 또는 유형을 나타냅니다.
    flute_key_system:
      name: 플루트 키 시스템
      description: '해당되는 경우 플루트에 사용된 기계식/키 시스템(예: 보엠 시스템)을 식별합니다.'
    flute_keywork_material:
      name: 플루트 키워크 소재
      description: 본체 재질과 별도로 지정되는 경우 키(키워크)의 재질 및/또는 도금 종류를 나타냅니다.
    flute_offset_g:
      name: 플루트 오프셋 G
      description: 플루트에 오프셋 G 키 배열이 적용되어 있는지를 나타냅니다.
    flute_wall_thickness:
      name: 플루트 관벽 두께
      description: 플루트 튜브의 관 두께 범주(얇은 관, 표준 관, 두꺼운 관).
    fly_pattern_type:
      name: 플라이 패턴 유형
      description: 인공 플라이를 낚시 기법 또는 곤충/먹이 모방 유형에 따라 분류하여 낚시꾼이 적절한 플라이 유형을 빠르게 찾을 수
        있도록 합니다.
    fly_rod_style:
      name: 플라이 낚싯대 스타일
      description: '의도된 캐스팅 기법이나 용도별로 낚싯대를 분류합니다(예: 싱글핸드, 스위치, 스페이).'
    fly_style:
      name: 플라이 스타일
      description: 롱존 하의의 앞트임 유형을 나타냅니다.
    fly_tying_tools_included:
      name: 포함된 플라이 타잉 도구
      description: 세트에 포함된 구체적인 플라이 타잉 도구를 나열하여 소비자가 포함된 구성품을 정확히 확인하고 세트 구성을 비교할
        수 있도록 합니다.
    fly_type:
      name: 앞트임 유형
      description: 롱존 하의에 기능성 앞트임이 포함되어 있는지 여부와 그 앞트임의 유형을 나타냅니다.
    flyer_hook_mounting_method:
      name: 플라이어 후크 장착 방식
      description: '후크가 플라이어에 부착되는 방식을 나타내며(예: 나사식, 압입식), 이는 설치 편의성과 호환성에 영향을 미칩니다.'
    flyer_hook_orientation:
      name: 플라이어 후크 방향
      description: 후크가 플라이어의 왼쪽용인지 오른쪽용인지 또는 양방향/범용인지를 나타냅니다.
    flyer_kit_finish_coating:
      name: 플라이어 키트 마감/코팅
      description: 플라이어 키트 구성품에 적용된 표면 마감 또는 코팅을 나타냅니다.
    flyer_kit_included_components:
      name: 플라이어 키트 구성품
      description: 키트에 포함된 부품을 식별합니다.
    flyer_orifice_type:
      name: 플라이어 실 통과구 유형
      description: 플라이어에 사용된 구멍의 형태를 지정합니다.
    flying_disc_feature_set:
      name: 플라잉 디스크 기능 세트
      description: 비행 디스크의 주요 기능적 특징을 나타냅니다.
    flysheet_material:
      name: 플라이시트 재질
      description: 무게, 내구성, 내후성에 영향을 미치는 텐트 외창/플라이시트의 주요 원단을 식별합니다.
    flywheel_balance_type:
      name: 플라이휠 밸런스 유형
      description: 플라이휠이 중립 잔액 방식인지 또는 외부 불균형 추를 사용하는지 여부를 나타냅니다.
    foam_blocks_size_class:
      name: 폼 블록 크기 등급
      description: 세트에 포함된 블록의 일반적인 크기 등급을 나타냅니다.
    foam_blocks_surface_texture:
      name: 폼 블록 표면 질감
      description: 폼 블록의 외부 표면 질감/마감 상태를 설명합니다.
    foam_surface_effect:
      name: 폼 표면 효과
      description: 공예용 폼이나 스티로폼에 적용되는 글리터, 메탈릭, 홀로그램 마감 등 일반적인 장식용 표면 효과를 설명합니다.
    foil_color:
      name: 포일 색상
      description: 인증서에 사용된 포일 강조 색상을 나타냅니다(해당하는 경우).
    foil_curtain_mounting_method:
      name: 호일 커튼 설치 방법
      description: '포일 커튼을 설치하거나 걸도록 설계된 방식을 나타냅니다(예: 접착 스트립, 아일렛).'
    foil_discipline:
      name: 플뢰레 종목
      description: 해당 포일이 설계된 주요 라이딩 스타일 또는 종목을 나타냅니다.
    foil_mast_board_mounting_type:
      name: 포일 마스트 보드 장착 방식
      description: 보드나 포일에 연결되는 마스트 상단의 인터페이스를 정의합니다.
    foil_mast_fuselage_connection_type:
      name: 포일 마스트 동체 연결 방식
      description: 마스트가 동체 또는 앞날개 조립체에 어떻게 연결되는지를 지정합니다.
    foil_mounting_interface:
      name: 포일 장착 인터페이스
      description: 해당 부품이 보드 또는 다른 포일 구성품에 연결될 때 사용하는 연결 규격을 식별합니다.
    foil_mounting_system:
      name: 포일 장착 시스템
      description: 보드의 포일 또는 핀 장착 인터페이스를 나타내며, 이는 사용자의 기존 장비와의 호환성을 보장합니다.
    foil_mounting_type:
      name: 포일 장착 유형
      description: 구성품 간의 호환성을 보장하기 위해 포일을 기판에 부착하는 데 사용되는 인터페이스 시스템을 식별합니다.
    fold_over_elastic_application:
      name: 접이식 고무줄 용도
      description: 단추구멍용 고무줄의 주된 용도를 나타냅니다.
    foldability:
      name: 접이식 여부
      description: 칸막이가 보관 또는 재구성을 위해 접히거나 접어 보관될 수 있는지 여부와 그 방식을 설명합니다.
    foldability_stow:
      name: 접이식(보관성)
      description: '랙이 사용하지 않을 때 접히거나 수납될 수 있는지를 나타냅니다(예: 차량 쪽으로 접힘).'
    folding_style:
      name: 접이식 스타일
      description: 크래시 패드가 운반 및 보관을 위해 어떻게 접히는지를 나타내며, 이는 착지면의 균일성과 휴대성에 영향을 미칩니다.
    food_basket_items_included:
      name: 식료품 바구니 포함 품목
      description: 바구니에 포함된 주요 식품 유형을 나열하여 소비자가 수령인의 취향이나 식단 요구에 맞는 바구니를 선택할 수 있도록
        합니다.
    food_coloring_form:
      name: 식용 색소 형태
      description: '식용 색소의 물리적 형태 또는 제공 형식을 지정합니다(예: 젤, 액체, 분말, 스프레이).'
    food_contact_material:
      name: 식품 접촉 재료
      description: 포도즙 또는 와인과 함께 사용하는 양조 장비(발효조, 사이펀, 깔때기 등)의 주요 재질을 나타냅니다.
    food_packing_medium:
      name: 식품 포장 매체
      description: '과일이나 채소가 어떤 액체에 담겨 포장되었는지 지정합니다(예: 물, 소금물, 시럽, 오일).'
    foosball_rod_type:
      name: 푸스볼 로드 유형
      description: 게임의 타감과 안전성에 영향을 미치는 로드의 기계적 구조를 나타냅니다.
    foot_arch_type_compatibility:
      name: 발 아치 유형 호환성
      description: 깔창이 사용되도록 설계된 발 아치 형태를 식별합니다.
    foot_arch_type_suitability:
      name: 아치형 발 형태 적합성
      description: 깔창이 어떤 발 아치 형태를 지지하도록 설계되었는지 나타냅니다.
    foot_coverage:
      name: 발 커버리지
      description: 해당 레그웨어가 발 덮개형, 발 없는 형태, 스터럽형 또는 오픈 힐형인지를 나타냅니다.
    foot_guard_type:
      name: 발 보호대 유형
      description: 레그가드에 발가락 또는 발 덮개가 포함되어 있는지 여부와, 포함된 경우 해당 덮개가 고정식인지 탈착식인지를 나타냅니다.
    foot_support_level:
      name: 발 지지 수준
      description: '신발 깔창이 제공하는 구조적 지지력 또는 견고함의 정도를 나타냅니다(예: 낮음, 보통, 높음 또는 매우 높음).'
    footbag_play_style:
      name: 풋백 플레이 스타일
      description: 풋백의 주요 권장 플레이 스타일.
    football_ball_type:
      name: 축구공 유형
      description: '축구공의 주된 용도 또는 사용 환경을 나타냅니다(예: 경기용, 연습용, 수집품 전시용).'
    football_dummy_type:
      name: 축구 훈련용 더미 유형
      description: 훈련용 더미의 유형 또는 기능적 설계를 분류하여 구체적인 훈련 목적을 나타냅니다.
    football_glove_certification:
      name: 미국 축구 글러브 인증
      description: '공식 경기 출전에 필요한 인증 또는 표준 규격 준수 여부를 나타냅니다(예: SFIA, NFHS, NCAA).'
    footboard_mounting_type:
      name: 발판 장착형
      description: 구매자가 호환되는 부품과 설치 방법을 선택할 수 있도록 발판이 침대 프레임이나 바닥에 어떻게 부착되는지 지정합니다.
    footboard_style:
      name: 풋보드 스타일
      description: 발판의 구조적 또는 미적 디자인 스타일을 정의합니다.
    footrest_adjustability:
      name: 발 받침대 조절 기능
      description: 발받침을 아이의 다리 길이에 맞게 조절할 수 있는지 여부와 조절 방식을 나타냅니다.
    footrest_type:
      name: 발받침대 유형
      description: 스툴에 발받침이 있는지 여부와 그 디자인을 식별합니다.
    footstrap_configuration:
      name: 발걸이 구성
      description: 보드 데크의 풋스트랩 삽입 패턴을 지정합니다.
    footswitch_action_style:
      name: 풋스위치 작동 방식
      description: 스위치의 동작 방식이 순간 작동인지 래칭인지, 혹은 둘 다 지원하는지 나타냅니다.
    footswitch_power_source:
      name: 풋스위치 전원 공급 장치
      description: 해당되는 경우 풋스위치의 전원 공급 방식을 지정합니다(앰프 잭을 통한 패시브 전원, 배터리, 외부 어댑터, USB
        등).
    footwear_construction_method:
      name: 신발 제작 방식
      description: 갑피를 밑창에 부착하는 방식을 정의하며, 이는 내구성, 밑창 교체 가능성 및 가격에 영향을 미칩니다.
    footwear_cut:
      name: 신발 컷
      description: 발목 칼라의 높이를 나타내며(로우컷, 미드컷, 하이컷), 이는 활동성과 지지력의 균형에 영향을 미칩니다.
    footwear_size_system:
      name: 신발 사이즈 시스템
      description: '표시된 신발 사이즈에 사용되는 지역별 사이즈 기준을 식별합니다(예: US, EU, UK).'
    footwear_support_type:
      name: 신발 지지 유형
      description: '신발이 제공하는 생체역학적 지원 또는 회내 제어 수준을 지정합니다(예: 중립, 안정성, 모션 제어).'
    fork_material:
      name: 포크 재질
      description: 자전거 앞 포크에 사용된 재질을 나타내며, 이는 강성, 무게 및 승차감에 영향을 미칩니다.
    form_factor:
      name: 폼 팩터
      description: DMX 컨트롤러의 주요 하드웨어 형태를 나타냅니다.
    formula_car_series_class:
      name: 포뮬러카 시리즈/클래스
      description: 해당 포뮬러카가 출전하도록 제작된 레이싱 시리즈 또는 클래스를 나타냅니다.
    formulation_style:
      name: 제형 스타일
      description: '특정 용도 또는 선호도에 맞게 설계된 특수 제형을 나타냅니다(예: 바리스타용, 엑스트라 크리미).'
    formulation_type:
      name: 제형 유형
      description: 소독 스프레이의 제형 유형을 나타냅니다.
    fossil_preparation_level:
      name: 화석 준비 수준
      description: '표본에 적용된 정제 및 세척의 정도를 나타냅니다 (예: 암석에 묻혀 있는 상태, 완전히 가공된 상태).'
    fossil_preservation_type:
      name: 화석 보존 유형
      description: '화석의 보존 유형을 나타냅니다(예: 광물화, 주형, 몰드, 압흔).'
    fossil_restoration_status:
      name: 화석 복원 상태
      description: '표본이 수리되거나 복원되었는지 여부 및 방법(예: 접착, 재구성, 합성).'
    foundation_configuration:
      name: 매트리스 받침대 구성
      description: 대형 매트리스 사이즈의 경우 매트리스 받침대가 일체형으로 제작되었는지, 아니면 분할형(2피스 세트)으로 제작되었는지
        지정합니다.
    foundation_profile:
      name: 파운데이션 프로필
      description: '소비자가 선호하는 매트리스 높이와 시트 치수를 빠르게 맞출 수 있도록 매트리스 받침대의 전체적인 높이 범주를 분류합니다(예:
        초저형, 저형, 표준형, 고형).'
    frame_adjustability:
      name: 프레임 조절 기능
      description: '프레임을 조정할 수 있는지 여부와 조정 방식을 나타내며(예: 너비/높이 조절, 회전/기울기), 이는 인체공학성과
        프로젝트 적합성에 영향을 미칩니다.'
    frame_drum_jingle_configuration:
      name: 프레임 드럼 징글 구성
      description: 프레임 드럼에 징글이 포함되어 있는지 여부와, 포함된 경우 그 일반적인 구성을 나타냅니다.
    frame_drum_tuning_system:
      name: 프레임 드럼 튜닝 시스템
      description: 프레임 드럼의 조율 방식 또는 조율 가능 여부를 나타냅니다.
    frame_finish:
      name: 프레임 마감
      description: 내구성과 미관에 영향을 미치는 프레임의 보호 코팅이나 재질 마감을 지정합니다.
    frame_mounting_standard:
      name: 프레임 장착 규격
      description: '부트와 프레임 간 인터페이스 규격을 정의합니다(예: 195mm 2점식, Trinity 3점식). 이는 프레임 호환성에
        중요합니다.'
    frame_steel_gauge:
      name: 프레임 강재 두께 등급
      description: 랙의 기둥에 사용된 강관의 두께(게이지)를 식별하며, 이는 강도와 안정성을 나타내는 핵심 지표입니다.
    frame_suspension_type:
      name: 프레임 서스펜션 유형
      description: 구매자가 의도한 조립 목적에 맞는 프레임을 선택할 수 있도록 리지드, 하드테일, 풀 서스펜션 등 자전거 프레임의
        서스펜션 디자인을 나타냅니다.
    free_reed_instrument_orientation:
      name: 프리리드 악기 방향
      description: '인체공학적 특징 및 용도별 필터링을 위해 악기를 쥐거나 연주하는 방식을 지정합니다(예: 바람통을 쥐고 연주하는
        형태, 어깨 스트랩 방식 등).'
    free_weight_rack_type:
      name: 프리웨이트 랙 타입
      description: '벤치프레스의 구조적 형태나 기능을 분류합니다(예: 바벨 벤치프레스, 케틀벨 벤치프레스, 플레이트 트리).'
    freehub_body_type:
      name: 프리허브 바디 유형
      description: 후륜 허브가 지원하는 프리허브 바디 또는 카세트 드라이버 규격을 나타냅니다.
    freehub_driver_standard:
      name: 프리허브 드라이버 규격
      description: '허브 부품이 지원하는 카세트/드라이버 인터페이스를 식별합니다(예: Shimano HG, SRAM XD).'
    freewheel_thread_standard:
      name: 프리휠 나사산 규격
      description: 프리휠과 호환되는 허브의 나사산 규격 또는 크기를 나타냅니다.
    french_horn_bell_construction:
      name: 프렌치 호른 벨 구조
      description: 벨의 구조와 운반 또는 정비를 위해 분리할 수 있는지 여부를 나타냅니다.
    french_horn_bell_material:
      name: 프렌치 호른 벨 소재
      description: 프렌치 호른의 벨(및 벨 플레어 부분)에 사용되는 재질/합금을 지정합니다.
    french_horn_bell_type:
      name: 프렌치 호른 벨 유형
      description: 벨의 구조 유형을 나타냅니다.
    french_horn_finish:
      name: 프렌치 호른 마감
      description: 악기의 외부 마감/도금.
    french_horn_included_accessories:
      name: 프렌치 호른 포함 액세서리
      description: '프렌치 호른에 포함된 액세서리를 나열합니다(예: 케이스, 마우스피스).'
    french_horn_leadpipe_material:
      name: 프렌치 호른 리드파이프 소재
      description: 리드파이프의 재질/합금을 지정합니다.
    french_horn_wrap_type:
      name: 호른 랩 유형
      description: 프렌치 호른의 전체적인 권선 구조 또는 형태 구성을 나타냅니다.
    fretboard_radius_fit:
      name: 지판 곡률 호환성
      description: 카포 패드의 곡률이 평평한 지판 또는 곡선형 지판에 맞춰 설계되었는지, 아니면 여러 지판 곡률에 맞게 조절 가능한지
        여부를 나타냅니다.
    friction_surface_included:
      name: 마찰면 포함
      description: '플라이휠에 교체 가능하거나 미리 장착된 마찰면(예: 인서트, 링)이 포함되어 있는지 또는 일체형 마찰면인지 나타냅니다.'
    fringe_curtain_finish:
      name: 프린지 커튼 마감
      description: 가장자리 표면의 시각적 마감(광택/질감)을 설명합니다.
    fringe_curtain_material:
      name: 프린지 커튼 소재
      description: '커튼 스트립의 기본 재질을 지정합니다(예: PET 포일, 플라스틱, 종이, 원단).'
    fringe_curtain_use_location:
      name: 프린지 커튼 사용 위치
      description: 프린지 커튼이 실내용인지, 실외용인지, 아니면 둘 다인지를 나타냅니다.
    fringe_trim_style:
      name: 프린지 장식 유형
      description: 프린지 장식의 구조 또는 유형을 나타냅니다(가닥이나 고리가 형성되고 표현되는 방식).
    front_axle_standard:
      name: 전륜 액슬 규격
      description: '포크가 수용하도록 설계된 액슬 직경과 간격을 나타내며(예: 15 × 110mm Boost), 이는 허브 호환성을
        보장합니다.'
    front_button_configuration:
      name: 전면 버튼 구성
      description: 재킷 앞 단추 스타일을 나타내며, 싱글 브레스트인지 더블 브레스트인지, 그리고 앞 단추의 개수를 지정합니다.
    front_closure_style:
      name: 앞여밈 스타일
      description: 싱글 브레스트, 더블 브레스트, 오픈형, 랩형, 지퍼형 등 트렌치코트의 앞면 구조 스타일을 나타냅니다.
    front_decoration_type:
      name: 전면 장식 유형
      description: '모자 앞면에 부착된 장식이나 패치의 종류를 식별합니다(예: 자수 패치, 가죽 패치).'
    front_point_configuration:
      name: 프런트 포인트 구성
      description: 전면 지점(mono-point, dual-point, modular, 교체 가능)의 설계를 지정하여 얼음과 혼합
        지형에서의 침투 정밀도에 influence을 미칩니다.
    front_seat_position:
      name: 앞좌석 위치
      description: 좌석이 앞줄의 어느 위치 또는 어느 쪽에 사용되도록 설계되었는지를 나타냅니다.
    front_style:
      name: 전면 스타일
      description: 치노 팬츠의 앞면 구조를 설명하며, 플랫 프런트형인지, 플리츠형인지 또는 기타 디테일이 있는지를 나타냅니다.
    frosting_or_icing_type:
      name: 프로스팅 또는 아이싱 유형
      description: 케이크 또는 디저트 바에 사용된 프로스팅 또는 아이싱의 유형을 나타냅니다.
    fruit_cultivar_or_variety:
      name: 과일 재배종 또는 종류
      description: '과일의 구체적인 품종 또는 재배종명을 나타냅니다(예: 갈라, 그래니 스미스, 몬통, 캐번디시).'
    fruit_cut_style:
      name: 과일 손질 방식
      description: '과일이 어떻게 손질되거나 절단되었는지를 설명합니다(예: 통째, 슬라이스, 깍둑썰기).'
    fruit_mix_variety:
      name: 과일 믹스 종류
      description: '테마별 과일 믹스 또는 일반적인 과일 종류의 이름을 지정합니다(예: 트로피컬 믹스, 베리 메들리).'
    fruit_piece_form:
      name: 과일 조각 형태
      description: '건과일의 물리적 형태 또는 제공 방식을 설명합니다(예: 통째, 슬라이스, 분말형).'
    fruit_snack_form:
      name: 과일 스낵 형태
      description: 과일 스낵이 제공되는 물리적 형태 또는 유형을 분류합니다.
    fruit_topping_format:
      name: 과일 토핑 형태
      description: 토핑의 물리적 형태, 질감 또는 유형을 설명하여 소비자가 소스, 시럽, 큼직한 과일 조각, 팝핑 펄 등을 선택할
        수 있도록 합니다.
    fruit_variety:
      name: 과일 품종
