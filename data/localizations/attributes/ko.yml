      description: 트럭 적재함 레일에 토노 커버를 설치/부착하는 방식을 나타냅니다.
    tool_case_form_factor:
      name: 공구 케이스 형태
      description: '공구 케이스의 물리적 형태를 식별하며, 이는 휴대성과 보관 용이성에 영향을 미칩니다(예: 브리프케이스형, 하드쉘형).'
    tool_functions_included:
      name: 포함된 공구 기능
      description: 다용도 공구 또는 공구 세트가 수행할 수 있는 특정 수리 또는 유지보수 기능을 나열합니다.
    top_bunk_access_method:
      name: 상단 침대 접근 방법
      description: 사용자가 침대의 상단 침대에 접근하는 방법을 나타내며, 안전성과 공간 활용을 고려하는 데 도움이 됩니다.
    top_fit:
      name: 상의 핏
      description: '상의 착용 시 전체 실루엣 또는 핏을 지정합니다(예: 슬림핏 또는 오버사이즈).'
    top_hat_style:
      name: 탑햇 스타일
      description: 탑햇의 특정 스타일 변형을 식별합니다.
    top_soundboard_material:
