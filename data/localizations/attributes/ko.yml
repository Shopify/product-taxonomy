      description: 키트에서 지원하는 연료 시스템 연결 표준 또는 어댑터 인터페이스를 지정합니다.
    fuel_system_type:
      name: 연료 시스템 유형
      description: '엔진의 연료 공급 방식을 나타냅니다(예: 기화기 방식, 연료 분사 방식).'
    fuel_tank_installation_position:
