      description: 금속성 또는 네온과 같이 착색에 의해 표현되는 시각적 마감이나 특수 효과를 지정합니다.
    comb_material:
      name: 콤 소재
      description: 하모니카 콤(공기실을 형성하는 본체)의 재질입니다.
    comb_type:
      name: 빗 유형
      description: '말 손질용 빗을 주요 기능 유형에 따라 분류하며(예: 커리 콤, 갈기용 빗, 털 뽑기용 빗), 이를 통해 소비자는
        원하는 용도에 맞는 도구를 빠르게 찾을 수 있습니다.'
    combat_shorts_cut_style:
      name: 격투기 반바지 재단 유형
      description: '격투기용 반바지의 재단 또는 핏 유형을 나타냅니다(예: 하이컷, 레트로컷, 컴프레션).'
    comic_creator_role:
      name: 만화 작가 역할
      description: '등록 정보에 표시되는 창작자 역할을 나타냅니다(예: 작가, 아티스트).'
    commemorative_coin_finish:
      name: 기념주화 마감
      description: 기념 주화의 주조 방식 또는 마감 유형을 설명합니다.
    commemorative_coin_mint_mark:
      name: 기념 주화 민트 마크
      description: 동전에 표시된 민트 마크(또는 민트 마크 없음)를 나타냅니다.
    commemorative_subject:
      name: 기념 대상
