    hardtop_window_configuration:
      name: 하드탑 창 구성
      description: 하드탑에 포함된 창문의 종류와 구성에 대해 설명합니다.
    harmonica_comb_material:
      name: 하모니카 콤 소재
      description: 하모니카의 공기실(공기 챔버 본체)에 사용되는 재료
    harmonica_cover_plate_finish:
      name: 하모니카 커버 플레이트 마감
      description: 하모니카 커버 플레이트의 마감 또는 코팅을 지정합니다.
    harmonica_cover_plate_material:
      name: 하모니카 커버 플레이트 소재
      description: 외부 덮개판에 사용된 재료
    harmonica_finish:
      name: 하모니카 마감
      description: 하모니카 커버 플레이트/본체의 표면 마감
    harmonica_included_accessories:
      name: 하모니카 액세서리 포함
      description: 하모니카에 포함된 액세서리를 나타냅니다.
    harmonica_note_range:
      name: 하모니카 음역
      description: 'Context 에서 사용되는 악기 음역 분류(예: 베이스, 바리톤, 테너)'
    harmonica_reed_plate_material:
      name: 하모니카 리드 플레이트 재질
      description: '리드 플레이트에 사용된 재료(예: 황동, 스테인리스강, 알루미늄)'
    harmonica_system_type:
      name: 하모니카 시스템/유형
      description: '오케스트라 하모니카 시스템 또는 형태(예: Chord, 베이스, 바리톤, 폴리포니아)를 식별합니다.'
    harmonica_tuning_system:
      name: 하모니카 튜닝 시스템
      description: '하모니카에 사용되는 튜닝 레이아웃/시스템을 지정합니다(예: 리히터, 솔로, 오케스트라 튜닝).'
    harness_shell_type:
      name: 하네스 쉘 타입
      description: '하네스의 외피 구조의 강성을 설명합니다(예: 소프트쉘, 하드쉘, 하이브리드).'
    harness_style:
      name: 하네스 스타일
      description: 하네스의 구조적 스타일/디자인을 정의합니다. 예를 들어 허리형, 좌석형, 가슴/조끼형, 윙 벨트형, 보드숏형 또는
        하이브리드형 등이 있습니다.
    harness_type:
      name: 하네스 유형
      description: '등반용 하네스의 구조적 스타일(예: 좌식, 전신식, 가슴식)을 분류합니다.'
    harp_action_type:
      name: 하프 작동 유형
      description: 하프의 피치/임시표를 변경하는 데 사용되는 주요 메커니즘
    harp_finish:
      name: 하프 마감
      description: '하프 본체의 표면 마감(예: 천연, 착색, 도색, 래커칠)'
    harp_included_accessories:
      name: 하프 액세서리 포함
      description: 페달 하프 구매 시 포함되는 액세서리 목록입니다.
    harvest_method:
      name: 수확 방법
      description: 해산물이 자연산인지, 양식인지, 또는 다른 방법으로 얻은 것인지를 나타냅니다.
    harvest_stage:
      name: 수확 단계
      description: 루꼴라를 수확한 성장 단계를 명시합니다. 예를 들어, 새싹, 어린잎 또는 다 자란 송이 등이 있습니다.
    hat_style:
      name: 모자 스타일
      description: '파티 모자의 구조/스타일(예: 원뿔형 모자, 왕관, 중절모, 바이저)은 해당 품목의 기본적인 외모를 반영해야 합니다.'
    hazard_signal_mode:
      name: 비상 신호 Mode
      description: LED/전자식 도로 조명탄의 조명 패턴/Mode를 선택할 수 있습니다.
    head_configuration:
      name: 헤드 구성
      description: 도끼날에 자귀 모양 날, 망치 모양 날, 둘 다 또는 아무것도 없는지 여부를 지정하며, 이는 얼음 및 혼합 지형에서의
        기능에 직접적인 영향을 미칩니다.
    head_material:
      name: 헤드 소재
      description: 퀸토와 함께 제공되는 연주 헤드의 재질
    head_movement_type:
      name: 머리 움직임 유형
      description: '양각대 또는 스틱 헤드의 방향 이동 기능(예: 좌우 회전, 상하 회전, 기울기 조절)'
    head_side:
      name: 헤드 사이드
      description: 드럼 헤드가 타격면(비터면), 공명면(프론트면) 또는 양쪽 모두에 사용되는지 여부를 지정합니다.
    head_weight_style:
      name: 헤드 웨이트 스타일
      description: 플라이의 머리 부분에 있는 무게 중심을 파악하여 침강 속도와 플라이의 움직임에 미치는 영향을 분석합니다.
    headband_embellishment:
      name: 헤어밴드 장식
      description: '머리띠에 부착된 장식 요소(예: 리본, 진주, 크리스털, 동물 귀)를 식별합니다.'
    headboard_style:
      name: 헤드보드 스타일
      description: 침대와 함께 제공되는 헤드보드의 디자인 또는 구성 스타일을 설명합니다.
    headgear_strap_configuration:
      name: 머리 보호대 스트랩 구성
      description: 레슬링 헤드기어를 고정하는 데 사용되는 스트랩의 개수를 나타냅니다.
    headjoint_crown_style:
      name: 헤드조인트 크라운 스타일
      description: 플루트 헤드조인트 크라운(엔드캡)의 스타일 또는 디자인을 지정하며, 이는 미관 및 무게/균형에 영향을 미칠 수 있습니다.
    headjoint_pitch_standard:
      name: 헤드조인트 피치 표준
      description: '헤드조인트의 설계 튜닝 표준을 나타냅니다(예: A=440 대 A=442).'
    headliner_product_form:
      name: 헤드라이너 제품 형태
      description: 제품이 완전한 성형 헤드라이너 어셈블리인지, 교체용 직물인지, 아니면 수리/트림 구성 요소인지 명시합니다.
    headrest_mount_attachment_method:
      name: 헤드레스트 마운트 부착 방법
      description: 헤드레스트/시트 포스트에 마운트를 부착하는 방법을 명시합니다.
    headrest_provision:
      name: 머리 받침대 제공
      description: 헤드레스트 포함 여부 및/또는 헤드레스트 장착 지점 유무를 나타냅니다.
    headset_standard:
      name: 헤드셋 표준
      description: Frame에서 사용되는 헤드튜브/헤드셋 인터페이스 유형
    headstall_style:
      name: 헤드스톨 스타일
      description: 고삐의 구조적 설계 또는 귀/눈썹 모양을 분류합니다.
    headwear_intended_use:
      name: 모자의 용도
      description: '터번을 착용하는 주된 목적 또는 Context(예: 항암 치료로 인한 탈모, 수영, 종교적 이유)을 나타냅니다.'
    hearing_enhancer_style:
      name: 보청기 스타일
      description: 사용자가 귀에 거는 형태, 귀에 넣는 형태, 머리 뒤에 거는 형태 등 다양한 디자인 중에서 선택할 수 있도록 장치의
        물리적 형태를 설명합니다.
    heart_rate_monitoring_method:
      name: 심박수 모니터링 방법
      description: 운동 중 심박수 데이터를 기기가 어떻게 수집하는지 설명합니다.
    heart_rate_sensing_technology:
      name: 심박수 감지 기술
      description: '모니터가 심박수를 감지하는 데 사용하는 생리학적 측정 방법을 지정합니다(예: 전기 ECG 대 광학 PPG).'
    heart_rate_sensor_placement:
      name: 심박수 센서 배치
      description: 센서를 착용하거나 배치하는 위치(신체 또는 자전거)를 나타내며, 이는 착용감과 측정 정확도에 영향을 미칩니다.
    heat_retention_technology:
      name: 보온 유지 기술
      description: '운동용 코르셋의 땀 배출이나 열 활동을 향상시키는 모든 기술, 코팅 또는 소재를 설명합니다(예: 네오프렌의 사우나
        효과).'
    heated_glass_feature:
      name: 열선 유리 기능
      description: 창유리에 후면 그리드 및/또는 안테나와 같은 통합 전기 요소가 포함되어 있는지 여부를 나타냅니다.
    heater_control_actuation_method:
      name: 히터 제어 작동 방식
      description: '히터/HVAC 제어 장치가 차량의 HVAC 박스를 작동시키는 방식(예: 케이블 작동식, 진공 작동식 또는 전자
        신호 방식)을 지정합니다.'
    heater_control_electrical_connector_type:
      name: 히터 제어용 전기 커넥터 유형
      description: '히터 제어 어셈블리에 사용되는 전기 커넥터 스타일/인터페이스를 지정합니다(예: 피그테일형 대 플러그형).'
    heating_technology:
      name: 난방 기술
      description: 기화기가 물질을 증기로 전환하는 데 사용하는 주요 가열 메커니즘을 식별합니다.
    heel_shape:
      name: 힐 Shapes
      description: '굽 자체의 기하학적 스타일 또는 실루엣을 지정하여 소비자가 구조적 외관 및 안정성 기본 설정(예: 스틸레토 vs.
        블록)에 따라 필터링할 수 있도록 도와줍니다.'
    helicopter_mission_type:
      name: 헬리콥터 임무 유형
      description: 헬리콥터의 주된 용도/역할
    helicopter_rotor_configuration:
      name: 헬리콥터 로터 구성
      description: 헬리콥터 로터 시스템 레이아웃(메인 로터/테일 로터 배열)을 지정합니다. 예를 들어 단일 메인 로터 + 테일 로터,
        동축 로터, 탠덤 로터 또는 인터메싱 로터 등이 있습니다.
    helmet_accessory_type:
      name: 헬멧 액세서리 유형
      description: 소비자가 즉시 적합한 품목을 찾을 수 있도록 자전거 헬멧 부품 또는 액세서리의 특정 종류를 식별합니다.
    helmet_audio_connector_type:
      name: 헬멧 오디오 커넥터 유형
      description: 헬멧 통신 리드가 있는 경우, 해당 리드에서 사용하는 항공기 오디오 커넥터 유형을 지정합니다.
    helmet_communication_system_readiness:
      name: 헬멧 통신 시스템 준비 상태
      description: 헬멧이 인터콤/블루투스 통신 시스템을 지원하도록 설계되었는지 여부
    helmet_construction_type:
      name: 헬멧 구조 유형
      description: '헬멧 쉘과 라이너의 제작 방식을 설명합니다(예: 폼, 하드쉘, 하이브리드).'
    helmet_fit_head_shape:
      name: 헬멧 착용감(머리 Shapes)
      description: 내부 착용감은 다양한 머리 Shapes에 맞춰 설계되었습니다.
    helmet_interior_liner_type:
      name: 헬멧 내부 라이너 종류
      description: 컴포트 라이너의 종류와 탈부착/세탁 가능 여부
    helmet_liner_material:
      name: 헬멧 라이너 소재
      description: 편안함과 Impact 흡수를 제공하는 내부 안감 또는 패딩의 재질을 명시합니다.
    helmet_retention_closure_type:
      name: 헬멧 유지 폐쇄형
      description: '헬멧 턱끈 잠금/유지 메커니즘(예: 더블 D링, 마이크로미터식 래칫)을 명시합니다.'
    helmet_safety_certification:
      name: 헬멧 안전 인증
      description: 헬멧이 준수하는 안전 기준 또는 인증 목록을 제공합니다.
    helmet_safety_certification_standard:
      name: 헬멧 안전 인증 표준
      description: 오토바이 헬멧은 안전/인증 기준을 충족하도록 인증되었습니다.
    helmet_shell_material:
      name: 헬멧 쉘 소재
      description: 헬멧에 사용되는 주요 외피 재질 또는 구조
    helmet_size_system:
      name: 헬멧 사이즈 시스템
      description: 헬멧 사이즈를 나타내는 데 사용되는 사이즈 표기법
    helmet_sun_visor_type:
      name: 헬멧 햇빛 가리개 종류
      description: 헬멧에 내장형 드롭다운 선바이저, 착색된 외부 쉴드, 둘 다 또는 둘 다 없는지 여부를 명시합니다.
    helmet_vehicle_fit:
      name: 헬멧 차량 적합성
      description: 헬멧의 권장 주행 용도 또는 대상 차량 종류.
    helmet_ventilation_adjustability:
      name: 헬멧 통풍 조절 기능
      description: 헬멧 통풍을 라이더가 어떻게 조절할 수 있는지 명시합니다.
    helmet_ventilation_configuration:
      name: 헬멧 통풍 구성
      description: '헬멧의 통풍 레이아웃 및 조절 기능(예: 턱 통풍구, 이마/흡입구, 닫을 수 있는 통풍구)에 대해 설명합니다.'
    helmet_visor_peak_adjustability:
      name: 헬멧 바이저/챙 조절 기능
      description: 헬멧의 오프로드용 바이저/챙이 조절 가능한지 또는 탈착 가능한지 여부
    helmet_visor_shield_optical_features:
      name: 헬멧 바이저(쉴드) 광학적 특징
      description: 메인 페이스 쉴드/바이저의 광학적 특징 및 호환성
    helmet_visor_shield_type:
      name: 헬멧 바이저/쉴드 종류
      description: 헬멧에는 기본 안면 보호대/바이저 구성이 포함되어 있습니다.
    hem_style:
      name: 밑단 스타일
      description: 옷의 외관에 큰 영향을 미치는 깨끗한, 말린, 날것과 같은 다리 개구부 마감 스타일을 식별합니다.
    hemisphere_compatibility:
      name: 반구 호환성
      description: 관측 가능한 별자리를 기준으로 별자리 지도가 어느 반구를 위해 제작되었는지 지정합니다.
    hemline_style:
      name: 밑단 스타일
      description: 드레스 밑단의 재단 또는 디자인을 정의합니다.
    herbal_infusion_function:
      name: 허브 인퓨전 Functions
      description: 해당 주입액이 시장에 출시되는 주된 건강 증진 또는 기능적 이점을 나타냅니다.
    hex_size:
      name: 육각형 사이즈
      description: 예열 플러그를 설치/제거하려면 육각 사이즈가 필요합니다.
    hi_hat_pair_type:
      name: 하이햇 페어 타입
      description: 목록이 일치하는 상단/하단 쌍에 해당하는지 아니면 개별 심벌 구성 요소에 해당하는지 나타냅니다.
    hi_hat_sound_character:
      name: 하이햇 사운드 특성
      description: 소비자가 원하는 사운드를 기준으로 필터링할 수 있도록 전반적인 음색 프로필을 설명합니다.
    high_visibility_class:
      name: 고시인성 등급
      description: 해당 의류의 ANSI/ISEA 107 가시성 분류 수준을 명시합니다.
    highback_style:
      name: 하이백 스타일
      description: 주행 특성에 영향을 미치는 하이백의 구조적 스타일이나 디자인을 설명합니다.
    hitch_ball_diameter:
      name: 히치볼 직경
      description: '트레일러 커플러와 결합되는 히치 볼 헤드(구형)의 직경(예: 1 7/8인치, 2인치, 2 5/16인치, 50mm)'
    hitch_ball_mounting_style:
      name: 히치볼 장착 방식
      description: 히치볼이 표준 너트 장착형 볼인지, 특정 히치 헤드용 고정/압착형인지, 또는 통합 하드웨어가 포함된 형태인지 여부
    hobby_horse_handle_type:
      name: 목마 핸들 유형
      description: 목마를 잡거나 조종하는 데 사용되는 손잡이/핸들 구조를 명시합니다.
    hobby_horse_sound_features:
      name: 목마 소리 특징
      description: 목마 장난감에 음향 효과가 포함되어 있는지, 있다면 어떤 종류의 음향 효과가 있는지를 나타냅니다.
    hockey_goal_type:
      name: 하키 골 유형
      description: '하키 골대의 스타일 또는 유즈 케이스를 지정합니다(예: 규격 아이스, 스트리트, mini).'
    hockey_size_category:
      name: 하키 크기 범주
      description: 해당 부품에 맞는 표준화된 장비 사이즈 세그먼트(청소년, 주니어, 중급, 시니어)를 나타냅니다.
    hockey_size_segment:
      name: 하키 사이즈 세그먼트
      description: 전체 패드 차원과 핏을 결정하는 표준화된 하키 장비의 사이즈 세그먼트를 지정합니다.
    hold_surface_texture:
      name: 홀드 표면 질감
      description: 그립면의 거칠기 또는 촉감을 설명합니다.
    home_decor_sewing_pattern_project_type:
      name: 홈 데코 재봉 패턴 프로젝트 유형
      description: '재봉 패턴으로 만들 수 있는 홈 데코 품목의 종류를 명시합니다(예: 베개 커버, 커튼, 테이블 러너).'
    homologation_rule_set:
      name: 승인/규칙 세트
      description: "(해당되는 경우) 차량이 준수하는 승인 기관 또는 규정 세트를 명시합니다."
    honey_form:
      name: Honey 형태
      description: Honey 제품의 물리적 형태 또는 포장을 명시합니다.
    honey_processing_method:
      name: 꿀 가공 방식
      description: Honey가 패키지로 포장되기 전에 어떻게 처리 또는 가공되었는지를 나타냅니다.
    honey_variety:
      name: Honey 종류
      description: Honey의 식물학적 또는 꽃의 원산지(단일 꽃꿀인지 여러 꽃꿀인지)를 식별하는데, 이는 맛, 색상 및 가격에 직접적인
        영향을 미칩니다.
    hood_configuration:
      name: 후드 구성
      description: 후드 디자인 및 조절 기능에 대해 설명합니다.
    hood_design:
      name: 후드 디자인
      description: 의류에 후드가 있는지 여부와 후드의 스타일을 나타냅니다.
    hood_style:
      name: 후드 스타일
      description: 해당 의류에 후드가 있는지 여부와 후드의 형태를 나타냅니다.
    hood_type:
      name: 후드 타입
      description: 이 의복의 후드 부분에 특별한 디자인 특징이 있음을 나타냅니다.
    hook_and_eye_size_hook_number:
      name: 훅앤아이 사이즈(훅 개수)
      description: 패키지에 사용된 표준화된 후크앤아이 사이즈/번호(해당되는 경우)는 전체 후크앤아이 사이즈를 나타냅니다.
    hook_and_loop_fastener_duty_rating:
      name: 벨크로 잠금장치 관세 등급
      description: 벨크로 잠금장치의 의도된 강도/관세 수준을 나타냅니다.
    hook_and_loop_fastener_format:
      name: 벨크로 잠금장치 형식
      description: '벨크로 제품의 물리적 형태 또는 패키지 형식을 지정합니다(예: 롤/테이프, 도트, 스트립).'
    hook_and_loop_fastener_side:
      name: 벨크로(찍찍이) 테이프면
      description: 제품에 고리 부분만 포함되는지, 루프 부분만 포함되는지, 아니면 양쪽 모두 포함된 세트인지 지정합니다.
    hook_coating_finish:
      name: 후크 코팅/마감
      description: '내식성, 스텔스 또는 색상(예: 검정색 니켈, 밝은 납세자 인증 번호)을 위해 후크에 표면 처리 또는 도금 적용'
    hook_configuration:
      name: 후크 구성
      description: 미끼와 함께 제공되는 후크의 존재와 스타일을 설명합니다.
    hook_eye_style:
      name: 후크 아이 스타일
      description: 낚싯바늘 고리의 Shapes 또는 방향을 지정하며, 이는 낚싯바늘을 묶거나 부착하는 방식에 영향을 미칩니다.
    hook_eye_type:
      name: 후크 아이 유형
      description: 낚싯바늘 고리의 디자인을 지정하며, 이는 매듭 선택 및 채비에 영향을 미칩니다.
    hook_loop_format:
      name: 벨크로 방식
      description: 바느질로 부착하는 벨크로 잠금장치의 물리적 형태를 지정합니다.
    hook_loop_side:
      name: 벨크로(찍찍이) 부착면
      description: 제품이 후크형인지, 루프형인지, 아니면 후크와 루프가 결합된 세트인지 지정합니다.
    hook_material:
      name: 후크 재질
      description: 갈고리/머리 부분에 사용된 재질을 구체적으로 명시하며, 이는 염수 환경에서의 강도 및 내식성에 중요한 요소입니다.
    hook_organizer_style:
      name: 후크 정리함 스타일
      description: '정리함 유형별로 검색 및 필터링을 지원하기 위해 사용되는 고리형 정리함의 물리적 스타일 또는 형태(예: 케이스,
        롤 또는 파우치)'
    hook_point_configuration:
      name: 후크 포인트 구성
      description: 갈고리의 끝이 두 개인지(더블) 아니면 세 개인지(트리플)를 명시합니다.
    hook_point_type:
      name: 후크 유형
      description: 관통력과 고정력에 영향을 미치는 낚싯바늘 포인트의 갈림길이나 모양을 설명합니다.
    hook_shank_length:
      name: 낚싯바늘 길이
      description: '빠른 시각적 및 기능적 비교를 위해 낚싯바늘 자루의 상대적인 길이 분류(예: 짧음, 김)를 나타냅니다.'
    hooks_eyes_attachment_method:
      name: 고리 및 고리 부착 방식
      description: 옷이나 작품에 고리와 걸이를 부착하는 방법
    hop_up_type:
      name: 홉업 타입
      description: 사거리와 정확도를 향상시키기 위해 비비탄에 역회전을 부여하는 데 사용되는 홉업 시스템을 정의합니다.
    horse_blanket_type:
      name: 말 담요 종류
      description: 말 담요 또는 덮개의 주된 스타일 또는 용도를 명시합니다.
    horse_brush_type:
      name: 말 브러시 유형
      description: 브러시를 특정 손질 스타일이나 용도별로 분류하여 고객이 카테고리 계층 구조를 분할하지 않고 필터링할 수 있도록 합니다.
    horse_care_purpose:
      name: 말 관리 목적
      description: 이 제품의 주요 기능적 목적은 말 관리, 건강 관리 및 미용에 필요한 모든 사항을 포괄하는 것입니다.
    horse_feed_stage:
      name: 말 사료 단계
      description: 사료가 제조된 말의 생애 단계 또는 생리적 상태를 나타냅니다.
    horse_groomer_type:
      name: 말 관리사 유형
      description: 애완동물 미용 도구의 종류를 분류하여 소비자가 필요한 특정 도구를 빠르게 찾을 수 있도록 합니다.
    horse_leg_protection_type:
      name: 말 다리 보호대 종류
      description: 말 부츠, 붕대 또는 밴디지의 특정 스타일 또는 Functions 분류합니다.
    horse_model_breed:
      name: 말 모델 품종
      description: 확장 모델에 묘사된 말 품종을 지정합니다(해당되는 경우).
    hosiery_toe_style:
      name: 스타킹 발가락 스타일
      description: 스타킹 발가락 부분의 구조를 정의하며, 이는 내구성과 오픈토 슈즈와의 호환성에 중요합니다.
    hot_air_balloon_basket_type:
      name: 열기구 바구니 종류
      description: '탑승 및 운영에 사용되는 주요 바구니 구성/스타일(예: 표준 스포츠형, 상업용 대용량, 칸막이형, 접근 가능/도어형)을
        지정합니다.'
    hot_air_balloon_burner_type:
      name: 열기구 버너 유형
      description: 기구에 설치된 버너 시스템의 종류/구성
    hot_air_balloon_envelope_material:
      name: 열기구 외피 소재
      description: 풍선 외피(Canopy)에 사용되는 주요 원단/소재
    hotfix_application_tool:
      name: 핫픽스 앱 도구
      description: 핫픽스 큐빅을 부착할 때 권장되는 도구 또는 열원
    hub_axle_type:
      name: 허브 액슬 타입
      description: 허브가 설계된 액슬 인터페이스/고객 유지 시스템(퀵 릴리스, 쓰루 액슬 등)을 식별합니다.
    hub_motor_type:
      name: 허브 모터 타입
      description: 허브 모터의 구조 방식(기어식, 직접 구동식, 브러시식, 브러시리스식)을 설명하여 토크, 무게 및 효율 특성에 대한
        정보를 소비자에게 제공합니다.
    hula_hoop_construction_type:
      name: 훌라후프 구조 유형
      description: 후프의 제작/조립 방법을 설명합니다.
    hula_hoop_features:
      name: 훌라후프 특징
      description: 훌라후프의 주목할 만한 기능적 특징이나 디자인적 특징을 강조합니다.
    hull_design:
      name: 선체 설계
      description: 관통력과 고정력에 영향을 미치는 낚싯바늘 포인트의 갈림길이나 모양을 설명합니다.
    hull_type:
      name: 선체 유형
      description: 관통력과 고정력에 영향을 미치는 낚싯바늘 포인트의 갈림길이나 모양을 설명합니다.
    humidifier_refill_medium_type:
      name: 가습기 리필용 중간 사이즈
      description: 케이스 가습기에 사용되는 수분 유지/보충 매체(무엇이 젖거나 교체되는지)를 식별합니다.
    humidifier_refill_method:
      name: 가습기 물 보충 방법
      description: 가습기에 수분을 재충전하거나 교체하는 방법을 설명합니다.
    humidifying_medium:
      name: 가습 매체
      description: 제품에 사용되는 가습 요소/매체(무엇이 젖거나 활성화되는지)를 식별합니다.
    hummus_base_ingredient:
      name: 후무스 기본 재료
      description: 후무스를 만드는 데 사용된 주된 콩류 또는 채소를 식별합니다.
    hunting_call_type:
      name: 사냥용 호출 유형
      description: '사냥꾼들이 자신의 필요와 기술 수준에 가장 적합한 형식을 빠르게 선택할 수 있도록 호출기의 주요 작동 방식 또는
        메커니즘(예: 입으로 불기, 전자식, 박스형)을 분류합니다.'
    hunting_dog_collar_function:
      name: 사냥개 목걸이의 Functions
      description: 목걸이의 주요 기능 스타일 또는 용도를 분류하여 소비자가 추적, 훈련, 가시성 확보 또는 일반 용도와 같은 Functions에
        따라 제품을 필터링할 수 있도록 도와줍니다.
    hvac_control_functions:
      name: HVAC 제어 기능
      description: 이 장치는 (기계식 또는 전자식으로) 어떤 HVAC/제상/공기 흐름 Functions 제어하는지 나타냅니다.
    hybrid_drivetrain_configuration:
      name: 하이브리드 구동계 구성
      description: 전기 모터와 내연 기관이 어떻게 추진력을 제공하는지 설명하는 PHEV 시스템 아키텍처를 나타냅니다.
    hybrid_system_type:
      name: 하이브리드 시스템 유형
      description: 차량에 사용된 하이브리드화 아키텍처를 분류합니다.
    hybrid_truck_cab_type:
      name: 하이브리드 트럭 캡 타입
      description: 트럭의 운전석 구성을 지정하며, 이는 좌석 수와 내부 공간에 영향을 미칩니다.
    hydration_bag_features:
      name: 수분 보충용 가방의 특징
      description: 주목할 만한 디자인이나 수분 공급 가방에 특화된 기능적 특징을 강조합니다.
    hydration_belt_features:
      name: 수분공급용 벨트 기능
      description: 수분 보충 벨트의 사용성, 안전성 또는 편의성을 향상시키는 주요 내장 기능을 나열합니다.
    hydration_bladder_compatibility:
      name: 수분 공급용 물통 호환성
      description: 조끼에 수분 보충용 물통 시스템이 포함되어 있는지 또는 이를 지원하는지 여부를 나타냅니다.
    hydration_mouthpiece_style:
      name: 수분 공급용 마우스피스 스타일
      description: 수분 공급 시스템의 마우스피스 또는 밸브의 디자인이나 기능적 스타일을 명시하여 소비자가 선호하는 음용 인터페이스를
        선택하고 호환성을 보장할 수 있도록 합니다.
    hydration_pack_style:
      name: 수분 보충 팩 스타일
      description: 배낭형 또는 조끼형과 같은 수분 보충 팩의 구조적 스타일을 명시하여 착용감 및 유즈 케이스 필터링에 도움을 줍니다.
    hydration_system_insulation:
      name: 수분 공급 시스템 단열
      description: 물통 및/또는 음용관이 단열 처리되어 있어 뜨거운 액체나 차가운 액체의 상태를 유지하는 데 도움이 되는지 여부를
        나타냅니다.
    hydration_valve_type:
      name: 수분 공급 밸브 유형
      description: 시스템 또는 병과 함께 제공되는 음용 밸브 또는 마우스피스의 스타일을 식별하며, 일반적인 바이트 밸브 및 고유량
        노즐 디자인을 다룹니다.
    hydraulic_fluid_type:
      name: 유압유 종류
      description: 유압식 자전거 브레이크 레버에 사용하도록 설계된 브레이크액의 종류를 지정합니다. 이 정보는 유지보수 및 안전에 매우
        중요합니다.
    hydrogenation_level:
      name: 수소화 수준
      description: 지방이 수소화되지 않았는지, 부분적으로 수소화되었는지, 또는 완전히 수소화되었는지를 나타내며, 이는 트랜스지방 함량과
        베이킹 성능에 영향을 미칩니다.
    hydrophobicity_level:
      name: 소수성 수준
      description: 제품이 판매하는 물 비딩/시트 성능의 정도를 나타냅니다.
    ice_cream_format:
      name: 아이스크림 형태
      description: '아이스크림 제품의 물리적 형태 또는 모양을 설명합니다(예: 파인트, 바, 모찌).'
    ice_skate_sharpener_type:
      name: 아이스 스케이트 날카롭게 가는 도구 종류
      description: 연마기의 전체적인 디자인 또는 형태(수동식 숫돌, 전동식 연마기, 고정 장치 등)를 분류합니다.
    ice_temperature_suitability:
      name: 얼음 온도 적합성
      description: 하키 스틱 왁스가 제조된 얼음 온도 범위를 나타내며, 이는 실적 및 발설 특성에 영향을 미칩니다.
    icing_sugar_variety:
      name: 아이싱용 설탕 종류
      description: '슈가파우더의 제형 또는 기능 유형(예: 폰단트, 녹지 않는 스노우 파우더, 색소 첨가, 향료 첨가)을 분류합니다.'
    ignition_coil_configuration:
      name: 점화 코일 구성
      description: 점화 코일의 형태(단일 코일/코일 온 플러그, 실린더 수에 따른 멀티 타워 코일 팩, 코일 레일/카세트 또는 배전기
        방식)를 지정합니다.
    ignition_lead_compliance_standard:
      name: 점화 리드 준수 표준
      description: '제조업체가 주장하는 바와 같이 점화 리드가 충족하는 공식 산업 표준 또는 인증(예: SAE J2031, ISO
        3808)'
    ignition_lead_insulation_material:
      name: 점화 리드 단열재
      description: 점화 리드(외부 케이블 절연체)에 사용되는 주요 절연/재킷 재질
    ignition_lead_set_type:
      name: 점화 리드 세트 유형
      description: 해당 제품이 단일 점화 리드인지 아니면 완전한 세트인지, 그리고 세트의 용도가 무엇인지에 대한 정보도 필요합니다.
    ignition_lead_terminal_type:
      name: 점화 리드 단말기 형식
      description: '점화 리드 끝에 사용되는 단말기/커넥터 스타일(예: 점화 플러그 단말기 및 코일/분배기 단말기 스타일)'
    illumination_type:
      name: 조명 유형
      description: '공이 야간 플레이(예: 인광 발광, 충격 활성화 LED)를 위해 조명되는지 여부와 방식을 지정합니다.'
    immobilizer_installation_type:
      name: 도난 방지 장치 설치 유형
      description: 차량에 이모빌라이저가 설치 또는 연결되는 방식을 나타냅니다.
    immobilizer_unlock_method:
      name: 이모빌라이저 잠금 해제 방법
      description: 차량 도난 방지 장치의 작동/해제 또는 잠금 해제 방법을 지정합니다.
    impact_protection_certifications:
      name: Impact 보호 인증
      description: 보호 패드가 충족하거나 초과하는 특정 안전 표준을 명시하십시오.
    impact_protection_level:
      name: 충격 흡수 수준
      description: 보호대가 제공하는 Impact 보호 수준 또는 기술을 명시합니다.
    impact_protection_rating:
      name: Impact 보호 등급
      description: '표준(예: EN 1621-1 레벨 1, EN 14120 레벨 2)에 따라 인증된 Impact 보호 수준을 명시하여
        라이더가 더 높은 등급의 보호 기능을 갖춘 제품을 선택할 수 있도록 도와줍니다.'
    impact_surface_material:
      name: 타격면 소재
      description: '안전성과 촉감을 위한 주요 Impact/타격면 재질(예: 폼, 플라스틱)을 설명합니다.'
    incense_base_material:
      name: 향의 기본 재료
      description: 키트에 포함된 향(분말 형태)을 만드는 데 사용되는 주요 베이스/결합제 재료입니다.
    incense_making_method:
      name: 향 제조 방법
      description: 의도된 Craft 공정은 키트에 의해 지원됩니다.
    incense_tool_type:
      name: 향 도구 종류
      description: 이 제품이 향을 만드는 데 사용되는 도구의 종류를 명시합니다(향 Shapes 만들거나, 측정하거나, 누르거나, 섞거나,
        말리는 데 사용됨).
    incline_adjustment_type:
      name: 경사 조절 유형
      description: 운동 중 경사도를 변경할 수 있는지 여부와 변경 방법을 설명합니다.
    included_accessories:
      name: 포함 액세서리
      description: 목록에는 예비 헤드/비트, 보관 케이스, Charge 케이블 또는 AC 어댑터와 같은 추가 액세서리가 포함되었습니다.
    included_case_type:
      name: 포함 케이스 유형
      description: 베이스 색소폰에 포함된 운반/보관 케이스의 종류(있는 경우)
    included_components:
      name: 포함된 구성 요소
      description: 패키지에 포함된 항목을 나열합니다(도구 세트 및 번들 상품에 유용).
    included_fastener_components:
      name: 포함된 체결 구성 요소
      description: 제품이 후크앤아이 세트인지, 후크만 있는지, 아이만 있는지, 또는 이와 관련된 의류 잠금 제품인지 명시합니다.
    included_hydration_vessel_type:
      name: 포함된 수분 공급 용기 유형
      description: 벨트에 의해 공급되거나 지지되는 수화 용기의 스타일을 식별합니다.
    included_items_woodwind_instrument:
      name: 포함된 품목(목관악기)
      description: 일반적으로 포함되는 번들 품목 목록은 베이스 색소폰 패키지에 포함되어 있습니다.
    included_materials:
      name: 포함된 재료
      description: 패턴 구매 시 포함되는 구성 요소를 나타냅니다(패턴만 vs 패턴 + 재료).
    included_mounting_accessories:
      name: 장착 액세서리 포함
      description: 스피커폰에 포함된 장착/부착 액세서리 목록을 제공합니다.
    included_pump_type:
      name: 포함된 펌프 유형
      description: 에어 베드에 공급되거나 통합된 펌프의 유형을 식별합니다.
    included_scraper_implement_type:
      name: 포함된 스크래퍼 구현 유형
      description: '악기용 스크레이퍼에 포함된 연주 도구(예: 스크레이퍼 스틱/막대, 철솔)를 나타냅니다.'
    indicator_design:
      name: 지표 설계
      description: 낚시 입질 표시기의 물리적 형태 또는 스타일을 분류합니다.
    indicator_functions_tracked:
      name: 추적된 지표 Functions
      description: 지표가 추적하는 구체적인 게임 지표를 나열합니다. 예를 들어, 공, 스트라이크, 아웃, 이닝, 투구 수, 오버,
        위켓, 점수 또는 다운 등이 있습니다.
    indoor_outdoor_use:
      name: 실내/실외 사용 가능
      description: 볼링 장난감의 실내용, 실외용 또는 실내외 겸용 여부를 나타냅니다.
    inflatable_decoration_items_included:
      name: 풍선 장식 품목 포함
      description: '풍선 장식에 포함된 주요 부속품 목록(예: 송풍기, 말뚝, 고정 로프)'
    inflatable_decoration_type:
      name: 풍선 장식 유형
      description: 검색 및 필터링을 지원하기 위해 풍선 파티 장식의 종류(Shapes/형태)를 지정합니다.
    inflatable_raft_float_features:
      name: 공기주입식 뗏목/플로트 특징
      description: 공기주입식 보트/부력물에 있는 기능적 특징
    inflation_method_included:
      name: 팽창 방식 포함
      description: 수리 키트에 포함된 타이어 인플레이션 솔루션의 유형을 지정합니다(있는 경우).
    infused_scent:
      name: 향이 스며든
      description: 미끼 재료에 함침된 향 또는 맛 첨가제를 식별합니다.
    ingredient_base_type:
      name: 성분 기본 유형
      description: '발효에 사용되는 주요 원료를 식별합니다(예: 포도 주스 농축액, Fresh 주스, 과일 농축액).'
    ingredient_physical_form:
      name: 성분의 물리적 형태
      description: 향료 성분이 공급되는 물리적 형태를 지정합니다(취급, 측정 및 조제에 사용됨).
    ingredient_processing_method:
      name: 원료 가공 방식
      description: '재료에 적용된 주요 가공 기술을 명시합니다(예: 동결 건조, 볶기, 발효).'
    ink_colors_included:
      name: 잉크 색상 포함
      description: 세트에 포함된 스탬프 패드의 잉크 색상을 명시합니다.
    ink_pad_application_method:
      name: 잉크 패드 도포 방식
      description: 잉크가 패드에서 나오거나 사용되는 방식(전통적인 스탬프 패드, 도버, 브러시 팁 패드).
    ink_pad_permanence:
      name: 잉크 패드 지속성
      description: 스탬프에 사용된 잉크가 영구 잉크인지, 그리고 (건조 후 변색 및 방수에 강한) 보존성 잉크인지 여부.
    ink_pad_size:
      name: 잉크 패드 사이즈
      description: 잉크 패드 표면/케이스의 표준화된 사이즈/폼 팩터.
    ink_pad_special_effects:
      name: 잉크 패드 특수 효과
      description: '스탬프를 찍을 때 잉크의 특수한 시각적/기능적 효과(예: 금속성, 반짝이).'
    ink_permanence:
      name: 잉크 영구성
      description: 건조된 먹물이 영구적/보존용인지, 아니면 세척 가능/일시적인지를 나타냅니다.
    ink_preparation_required:
      name: 잉크 준비 필요
      description: 먹물이 바로 사용 가능한 상태인지, 아니면 사용 전에 물로 희석하거나 갈아야 하는지를 나타냅니다.
    inline_skate_brake_type:
      name: 인라인 스케이트 브레이크 타입
      description: 인라인 스케이트에 포함된 브레이크 구성(탈착식 힐 브레이크 또는 브레이크 없음 등)을 명시합니다.
    inner_tent_configuration:
      name: 내부 텐트 구성
      description: 내부 텐트의 구성 또는 스타일을 지정합니다. 예를 들어 전체 삽입형, 메쉬 삽입형 또는 보온 라이너 등이 있습니다.
    innerspring_coil_type:
      name: 내부 스프링 코일 타입
      description: 매트리스 내부의 스프링 코일 시스템의 구조 방식을 명시하며, 이는 지지력, 움직임 차단 및 가격에 영향을 미칩니다.
    input_connector_type:
      name: 입력 커넥터 유형
      description: 페달에서 사용하는 오디오 입력 커넥터 유형을 지정합니다(일반적으로 1/4인치 TS).
    input_valve_type:
      name: 입력 밸브 유형
      description: 어댑터가 FROM에 연결하는 자전거 튜브/휠에 있는 밸브 표준을 나타냅니다.
    insecticide_treatment:
      name: 살충제 처리
      description: 해당 그물이 공장에서 살충제로 처리되었는지 여부와, 처리되었다면 추가적인 보호를 위해 사용된 처리 유형을 나타냅니다.
    insert_coverage_area:
      name: 깔창 커버 범위
      description: '깔창이 발의 어느 부분을 덮도록 설계되었는지 지정합니다(예: 전체 길이, 뒤꿈치만).'
    insert_length_type:
      name: 인서트 길이 유형
      description: 발바닥 아치 지지대가 발바닥의 어느 정도를 덮는지 나타냅니다.
    inside_message_type:
      name: 내부 메시지 유형
      description: 카드 안쪽에 미리 인쇄된 메시지가 있는지, 그리고 메시지를 사용자 지정할 수 있는지 여부를 나타냅니다.
    insole_attachment_method:
      name: 인솔 부착 방식
      description: 아치 지지대가 신발 안에서 어떻게 고정되는지 명시합니다 (느슨한 드롭인 방식, 접착식, 벨크로 등).
    insole_material:
      name: 깔창 소재
      description: 풋베드 또는 풋레스트 위 깔창의 소재, 충격 흡수 및 지지 기능에 대해 설명합니다.
    installation_fabrication_level:
      name: 설치 제작 수준
      description: 키트를 설치하는 데 필요한 일반적인 맞춤 제작 또는 수정 작업량을 나타냅니다.
    installation_location:
      name: 설치 위치
      description: '엔진 오일 시스템에서 오일 압력 센서의 일반적인 설치 위치를 지정합니다(예: 블록 오일 갤러리 포트, 필터 하우징,
        샌드위치 플레이트 또는 원격 라인 마운트).'
    installation_method:
      name: 설치 방식
      description: 매트 또는 타일을 바닥에 고정하거나 설치하는 방법을 명시합니다.
    instant_coffee_form:
      name: 인스턴트 커피 형태
      description: 인스턴트 커피가 공급되는 곳의 물리적 형태를 설명하며, 준비 방법 및 유통기한에 영향을 줍니다.
    instep_coverage:
      name: 발등 커버리지
      description: 제품이 정강이만 보호하는지, 아니면 정강이와 발등/발 전체를 보호하는지 명시합니다.
    instruction_format:
      name: 설명서 형식
      description: 키트에 포함된 설명서의 형식입니다.
    instrument_cleaning_swab_form_factor:
      name: 기기 세척 스왑 폼 팩터
      description: '연주자의 선호 및 악기 제약 조건에 맞춰 스왑의 물리적 스타일(예: 잡아당기는 천 방식, 막대/브러시 시스템)을
        명시합니다.'
    instrument_dimensions_unit_context:
      name: 악기 치수 단위 컨텍스트
      description: '제공된 높이/너비/길이 측정값이 무엇을 의미하는지 명확히 합니다(예: 악기 전체, 단일 튜브 길이, 스탠드 높이).'
    instrument_electronics_type:
      name: 악기 전자 제품 유형
      description: 악기의 픽업/프리앰프 시스템이 액티브 방식인지 패시브 방식인지를 나타냅니다.
    instrument_key:
      name: 악기 키
      description: 카탈로그에 사용되는 리코더의 악기 키 표기법을 지정합니다(일반적으로 대형 리코더의 경우 C 또는 F).
    instrument_level:
      name: 악기 레벨
      description: 해당 악기의 대상 연주자 수준을 지정합니다.
    instrument_part_mounting_method:
      name: 악기 부품 장착 방법
      description: '부품이 부착되거나 설치되는 방식을 지정합니다(예: 클램프 방식, 접착 방식, 나사 방식).'
    instrument_parts_included:
      name: 악기 부품 포함
      description: A 클라리넷 상자에 포함된 주요 구성 요소/부품 목록입니다.
    instrument_playing_technique:
      name: 악기 연주 기법
      description: '악기를 연주/작동시키는 일반적인 방법(예: 흔들기, 두드리기, 탁탁 치기).'
    instrument_size_class:
      name: 악기 크기 등급
      description: 정확한 명칭이 아닌 소비자 친화적인 등급으로 표현된 악기의 일반적인 사이즈.
    insulation_fill_material:
      name: 단열 충전재
      description: 재킷이나 조끼를 단열하는 데 사용된 주요 소재를 나타냅니다.
    integrated_bottom_type:
      name: 일체형 바닥 유형
      description: 해당 의류에 움직임 중 몸을 가릴 수 있는 내장형 반바지, 레오타드 또는 이와 유사한 속옷이 포함되어 있는지 여부를
        나타냅니다.
    integrated_charging_options:
      name: 일체형 충전 옵션
      description: 침실용 탁자에서 사용 가능한 전원 또는 충전 인터페이스 목록을 보여줍니다.
    integrated_furniture_function:
      name: 가구 내장 기능
      description: '벽침대 또는 프레임에 포함된 추가 내장 가구 요소(예: 책상, 소파, 선반)를 식별합니다.'
    integrated_locking:
      name: 통합 잠금 장치
      description: 랙에 차량과 랙 사이 또는 자전거와 랙 사이를 고정하는 통합 잠금 장치가 포함되어 있는지 여부.
    integrated_power_options:
      name: 통합 전원 옵션
      description: 세면대에 내장된 전원 또는 충전 기능의 유형을 나타냅니다.
    integrated_storage_features:
      name: 통합 스토리지 기능
      description: 추가 큐대 슬롯을 포함한 당구 큐대 랙의 추가 스토리지 또는 액세서리 기능을 식별합니다.
    integrated_tool_functions:
      name: 통합 도구 기능
      description: '레버에 추가 도구 기능이 통합되어 있습니다(예: 스포크 후크, 밸브 코어 제거기, 비드 드롭퍼).'
    intended_board_type:
      name: 의도된 보드 유형
      description: '핀이 설계된 카이트보드의 종류를 명시합니다(예: 트윈팁, 서프 디렉셔널, 하이드로포일).'
    intended_consumption:
      name: 소비 용도
      description: 제품의 섭취 방법을 명시하며, 생식해도 안전한지, 구워야 하는지, 또는 부분적으로 구워야 하는지를 나타냅니다.
    intended_craft:
      name: 제작 용도
      description: 이 실 가이드가 만들어진 주된 제작 컨텍스트.
    intended_culinary_use:
      name: 조리 용도
      description: 소스의 주된 요리 용도(찍어 먹는 용도, 요리용, 글레이징용 등)를 나타냅니다.
    intended_handlebar_style:
      name: 의도된 핸들바 스타일
      description: '레버의 용도 또는 사용 사례 스타일(예: 플랫바, 드롭바, 에어로)을 설명합니다. 이렇게 하면 추가적인 하위 범주를
        만들 필요 없이 호환성 범위를 빠르게 좁힐 수 있습니다.'
    intended_player_role:
      name: 선수 역할 용도
      description: '해당 헤드기어가 경기장에서 어떤 역할을 위해 제작되었는지 명시합니다(예: 포수, 심판).'
    intended_playing_surface:
      name: 경기장 지면 용도
      description: '퍽, 공 또는 링을 사용하도록 지정된 지면(예: 얼음, 아스팔트, 체육관 바닥 또는 인공 얼음).'
    intended_repair_location:
      name: 수리 위치 용도
      description: 키트를 사용해 타이어를 수리할 위치.
    intended_seating_position:
      name: 좌석 위치 용도
      description: 안전벨트 스트랩을 설치하거나 사용하도록 설계된 차량 좌석 위치를 지정합니다.
    intended_sewing_application:
      name: 재봉 용도
      description: '실이 제작된 재봉 용도(예: 다용도 의류 재봉, 퀼팅, 실내 장식).'
    intended_technique:
      name: 기술 용도
      description: 패드/매트의 주요 펠팅 기술 용도.
    intended_use:
      name: 용도
      description: 악기의 주 사용 컨텍스트.
    intended_use_fleece_fabric:
      name: 용도(플리스 원단)
      description: 플리스 원단이 사용되는 주요 프로젝트/앱.
    intended_user:
      name: 대상 사용자
      description: 항공기 보호 장비가 누구를 위해 설계되었는지 나타냅니다.
    intended_yarn_form:
      name: 실 형태 용도
      description: 실 보관 용기에 가장 적합한 실 진열 방식을 지정합니다.
    interaction_mode:
      name: 상호 작용 모드
      description: 소리나 활동을 전달하는 데 사용되는 주요 상호 작용 방식입니다.
    interactive_effects:
      name: 상호 작용 효과
      description: 주방 놀이세트에 포함된 전자식 또는 기계적 상호 작용 효과를 설명합니다.
    interfacing_application_area:
      name: 심지 사용 영역
      description: 심지가 주로 사용되는 일반적인 재봉/제작 영역을 식별합니다.
    interfacing_color_family:
      name: 심지 색상 계열
      description: 밝은 색상이나 어두운 색상 원단 아래에 사용하는 일반적인 심지 바탕색을 나타냅니다.
    interfacing_selling_format:
      name: 심지 판매 형식
      description: '심지 판매 형식(예: 연속 절단 길이, 미리 절단된 조각, 롤 또는 절단된 조각)을 설명합니다.'
    interfacing_stiffness_level:
      name: 심지 강도 수준
      description: 심지가 제공하는 강도/견고성의 정도를 설명합니다.
    interior_padding_type:
      name: 내부 패딩 유형
      description: 내용물을 보호하고 정리하기 위해 케이스 내부에 사용되는 내부 패딩 또는 삽입 시스템의 유형입니다.
    interior_stall_configuration:
      name: 내부 칸막이 구성
      description: 동물을 운송하기 위한 내부 레이아웃/구성(칸막이 방향 및 구획 스타일)을 명시합니다.
    invitation_printing_coverage:
      name: 초대장 인쇄 커버리지
      description: 초대장의 인쇄 면을을 명시합니다(단면 또는 양면).
    iodization:
      name: 아이오딘화
      description: 소금에 아이오딘이 첨가되었는지 여부와 첨가된 정도를 나타냅니다.
    iridescence_level:
      name: 무지갯빛 수준
      description: 공작 깃털에서 흔히 볼 수 있는 자연적 또는 처리된 무지갯빛 광택의 강도를 설명합니다.
    irish_warpipe_set_configuration:
      name: 아이리시 워파이프 세트 구성
      description: 아이리시 워파이프가 구체적으로 어떤 구성으로(악기 전체, 부품/부분 세트) 판매되는지 나타냅니다.
    iron_on_applique_application_method:
      name: 열접착 아플리케 사용 방법
      description: 열접착 아플리케를 바탕면에 어떻게 부착해야 하는지 명시합니다.
    ironing_center_features:
      name: 다리미 센터 기능
      description: 다리미 센터의 사용 편의성과 특수 기능을 나열합니다.
    jacket_breast_style:
      name: 재킷 가슴 스타일
      description: 정장 재킷이 싱글 브레스트인지 더블 브레스트인지 명시합니다.
    jacket_vent_style:
      name: 재킷 트임 스타일
      description: 정장 재킷 뒷면의 벤트(트임) 유형을 나타냅니다.
    jam_and_jelly_consistency:
      name: 잼과 젤리의 농도
      description: 과일 조각이나 씨앗이 들어 있는지 여부를 나타내어 스프레드의 질감을 설명합니다.
    jaw_shape:
      name: 턱 모양
      description: '턱이나 끝부분의 기하학적 형태(예: 직선형, 굽은형, 긴 코)는 정밀도와 도달 범위에 영향을 미칩니다.'
    jerky_form:
      name: 육포 형태
      description: '육포 조각의 물리적 형태 또는 절단 방식을 설명합니다(예: 길쭉한 모양, 막대 모양, 한입 크기).'
    jersey_style:
      name: 저지 스타일
      description: 저지 폼 팩터 또는 팬 저지의 착용 스타일을 명시합니다.
    jew_harp_accessories_included:
      name: 주즈하프 액세서리 포함
      description: '구금과 함께 포장된 포함 품목(예: 케이스, 파우치, 설명서)을 나열합니다.'
    jew_s_harp_frame_style:
      name: 구금 프레임 스타일
      description: 느낌, 내구성, 연주 인체공학에 영향을 주는 구금 프레임/바디의 구조 스타일을 설명합니다.
    jew_s_harp_tongue_profile:
      name: 구금 혀 모양
      description: 구금의 리드(혀) 단면/기하학적 구조를 설명하며, 이는 반응성과 음색에 영향을 미칩니다.
    jewelry_pieces_included:
      name: 쥬얼리 구성품 포함
      description: 세트에 포함된 구체적인 보석 품목을 나열하여 소비자가 어떤 제품을 구매하는지 정확히 알 수 있도록 합니다.
    jigsaw_puzzle_piece_shape:
      name: 직소 퍼즐 조각 모양
      description: 조각들의 전반적인 컷/모양 스타일과 가장자리 프로필.
    jockstrap_design_features:
      name: 남성용 국부 보호대 디자인 특징
      description: 기능이나 미관에 영향을 미치는 조크 스트랩 특유의 특별한 디자인 요소를 반영합니다.
    juggling_club_construction_type:
      name: 저글링 클럽 구조 유형
      description: '저글링 클럽의 전체적인 구조 유형(예: 일체형 성형 vs. 조립식 다중 부품)을 명시하며, 이는 내구성, 감촉
        및 유지 관리에 영향을 미칠 수 있습니다.'
    juggling_club_core_material:
      name: 저글링 클럽 핵심 재료
      description: 클럽 내부에 사용되는 주요 핵심 재료(외부 랩/테이프와는 별개).
    juggling_prop_set_size:
      name: 저글링 소품 세트 사이즈
      description: '세트에 포함된 기본 소품의 수(예: 3볼 세트, POI 페어).'
    juggling_ring_edge_style:
      name: 저글링 링 가장자리 스타일
      description: 편안함과 잡기에 영향을 주는 링의 가장자리 프로필.
    juice_form:
      name: 주스 형태
      description: '제품의 물리적 형태 또는 가공 단계를 명시합니다(예: 단일 농도 액상, 농축액, 분말).'
    juice_processing_method:
      name: 주스 가공 방식
      description: 주스 또는 음료에 적용된 주요 가공 기술, 맛 영향, 영양소 유지 및 유통기한을 명시합니다.
    jump_rope_style:
      name: 줄넘기 스타일
      description: '로프/케이블의 구조 스타일(예: 구슬형, 천형, 스피드 케이블)을 분류하며, 이는 용도와 성능에 큰 영향을 미칩니다.'
    kale_variety:
      name: 케일 품종
      description: '특정 케일 품종 또는 변종을 식별합니다(예: 컬리, 라시나토/다이노소어, 레드 러시안). 이는 소비자들이 맛,
        식감, 요리 용도 등을 기준으로 선택하는 데 도움이 됩니다.'
    kaleidoscope_viewing_type:
      name: 만화경 보기 방식
      description: '만화경의 보기 방식 또는 작동 방식을 식별합니다(예: 고전적인 접안 튜브 방식, 텔레스코프 렌즈 방식, 휠 작동
        방식, 투영 방식).'
    kayak_construction_type:
      name: 카약 구조 유형
      description: '카약의 주요 제작 방식(예: 하드쉘 또는 팽창식)을 명시합니다.'
    kayak_design_type:
      name: 카약 디자인 유형
      description: '카약의 주요 설계 목적을 분류합니다(예: 서프스키, 플레이보트, 투어링).'
    kayak_hull_design:
      name: 카약 선체 디자인
      description: 파도 조건에서의 안정성, 이동성 등 취급 특성에 영향을 주는 주요 선체 모양을 식별합니다.
    kayak_storage_bag_type:
      name: 카약 보관용 가방 유형
      description: 카약 보관 가방의 스타일 또는 형식을 나타냅니다. 예를 들어 드라이 백이나 패들 백 등이 있습니다.
    kayak_style:
      name: 카약 스타일
      description: '카약의 주요 디자인 또는 사용 스타일(예: 레크리에이션용, 투어링용, 팽창식)을 명시합니다.'
    keel_type:
      name: 킬 유형
      description: 범선의 용골 형상을 식별합니다.
    kettlebell_style:
      name: 케틀벨 스타일
      description: '케틀벨의 구조 또는 스타일(예: 경기용, 조절식, 소프트)을 파악하여 소비자가 자신의 훈련 요구에 맞는 케틀벨을
        선택할 수 있도록 도와줍니다.'
    key_attachment_mechanism:
      name: 키 부착 메커니즘
      description: 열쇠를 케이스 안에 고정하는 데 사용되는 고리, 클립 또는 나사 기둥과 같은 하드웨어를 명시합니다.
    key_retention_when_unlocked:
      name: 잠금 해제 시 키 유지
      description: 잠금 해제 상태에서 키를 자물쇠에서 뺄 수 있는지 여부를 나타냅니다.
    keyboard_amplifier_inputs:
      name: 키보드 앰프 입력
      description: '키보드 앰프에서 지원하는 입력 연결 단자 목록입니다(예: 1/4인치 TRS 단자, MIDI 입력, Bluetooth).'
    keyboard_amplifier_output_types:
      name: 키보드 앰프 출력 유형
      description: 키보드 앰프에서 다른 시스템으로 오디오를 출력하기 위해 지원하는 주요 출력 커넥터 유형을 명시합니다.
    keyboard_case_handle_type:
      name: 키보드 케이스 핸들 유형
      description: 키보드 케이스를 이동/운반하는 데 사용되는 주요 핸들 시스템(스트랩 외).
    keyboard_case_interior_padding_type:
      name: 키보드 케이스 내부 패딩 유형
      description: 하드 케이스 내부에 사용되는 주요 내부 쿠션/라이닝.
    keyboard_case_protection_level:
      name: 키보드 케이스 보호 수준
      description: 하드 케이스의 전반적인 보호/강성 등급으로 성형 하드 쉘 케이스와 무거운 관세 비행/ATA 스타일 케이스를 구분합니다.
    keyboard_case_wheel_type:
      name: 키보드 케이스 휠 유형
      description: 바퀴가 포함된 하드 케이스의 바퀴 구성.
    keyboard_pedal_connector_type:
      name: 키보드 페달 커넥터 유형
      description: 서스테인 페달을 키보드 또는 디지털 피아노에 연결하는 데 사용되는 커넥터/플러그 유형을 지정합니다.
    keyboard_power_supply_type:
      name: 키보드 전원 공급 유형
      description: 키보드의 기본 전원 공급 방식(배터리, AC 어댑터, USB 전원).
    keyboard_stand_tier_type:
      name: 키보드 스탠드 단계 유형
      description: 스탠드가 기본 스탠드만으로 판매되는지, 아니면 2단 부착물이 포함/추가되는지를 나타냅니다.
    keyboard_stand_tiers:
      name: 키보드 스탠드 단수
      description: 'Z형 스탠드에서 지원하는 연주 단계 수(예: 1단 또는 2단).'
    keychain_attachment_type:
      name: 열쇠고리 부착 유형
      description: 열쇠고리를 열쇠, 가방 또는 벨트에 고정하는 데 사용되는 주요 부착 하드웨어를 명시합니다.
    keychain_style:
      name: 열쇠고리 스타일
      description: 열쇠고리의 전체적인 형태(물리적으로 어떤 모양인지)를 설명합니다.
    keywork_finish:
      name: 키워크 마감
      description: 본체 마감과는 별도로, 키워크(키)의 마감/도금에 대해 구체적으로 설명합니다.
    kick_point:
      name: 킥 포인트
      description: 하키 스틱 샤프트의 플렉스 킥 포인트 위치를 지정하여 샷 릴리스 속도와 감각에 영향을 미칩니다.
    kick_zone_grip_system:
      name: 킥존 그립 시스템
      description: 스키의 킥존에 사용된 접지력 향상 기술을 식별합니다.
    kickboard_features:
      name: 킥보드 기능
      description: 훈련이나 편안함을 향상시키는 킥보드의 특별한 특징(표면 질감 및 손잡이 옵션 포함)을 강조합니다.
    kickboard_handle_style:
      name: 킥보드 핸들 스타일
      description: 킥보드가 취급 및 편안함에 영향을 주는 핸드그립 또는 표면 처리를 제공하는지, 어떻게 제공하는지를 식별합니다.
    kickstand_mounting_position:
      name: 킥스탠드 장착 위치
      description: '자전거 프레임의 어느 부분에 킥스탠드가 부착되는지(예: 중앙 장착, 체인스테이 장착, 뒷바퀴 축 장착)를 나타냅니다.'
    kickstand_type:
      name: 킥스탠드 유형
      description: '킥스탠드의 구조적 스타일 또는 작동 방식을 설명합니다(예: 외발 측면 스탠드, 양발 중앙 스탠드, 텔레스코픽 방식).'
    kidney_belt_support_level:
      name: 신장 벨트 지원 수준
      description: 등허리 및 복부 안정화를 위해 신장 벨트가 제공하는 제조업체 지정 전반적 지원 수준.
    kiln_firing_atmosphere:
      name: 가마 소성 분위기
      description: '가마 작동 중 지원 가능한 소성 분위기(예: 산화 또는 환원)를 명시합니다.'
    kiln_heating_element_type:
      name: 가마 가열 요소 유형
      description: 가마에 사용되는 발열체의 종류/재질.
    kingpin_design:
      name: 킹핀 디자인
      description: 무게 및 그라인드 정리에 영향을 주는 킹핀 카트리지 자체의 제작 스타일을 설명합니다.
    kingpin_orientation:
      name: 킹핀 방향
      description: 트럭 킹핀의 방향을 식별합니다. 이는 주행 특성과 데크 호환성에 영향을 미칩니다.
    kit_components_included:
      name: 키트 구성품 포함
      description: '키트에 공급되는 개별 하드웨어 부품(예: 접지형 말뚝, 볼트, 스트랩, 설치 도구)를 나열하여 소비자가 정확히
        무엇을 구매하는지 알 수 있게 합니다.'
    kit_format:
      name: 키트 형식
      description: '키트의 포장 및 휴대 방법(예: 파우치, 케이스, 상자)을 명시합니다.'
    kit_items_included:
      name: 키트 항목 포함
      description: 와인 제조 키트에 포함된 주요 부품 및 공급품을 나열하영 소비자가 재료 리필과 스타터 키트를 구별할 수 있게 합니다.
    kit_pouch_case_type:
      name: 키트 파우치/케이스 유형
      description: 케어 키트에 포함된 보관 솔루션의 유형을 명시합니다(있는 경우).
    kit_tools_included:
      name: 포함된 키트 도구
      description: 키트에 포함된 주요 도구(있는 경우)를 나열하여 프로젝트를 완료하는 데 필요한 도구를 설명합니다.
    kite_inflation_system:
      name: 연 부풀림 시스템
      description: 연의 앞쪽 가장자리와 지지대가 어떻게 부풀려지는지를 나타냅니다.
    kite_line_configuration:
      name: 연줄 구성
      description: 연날개에 사용되는 비행/조종 라인의 개수를 나타내며, 이는 바와 줄을을 올바르게 연결하기 위한 일반적인 사양입니다.
    kite_type:
      name: 연 유형
      description: 연의 구조적 설계 범주(모양 및 굴레 스타일)을 정의합니다.
    kiteboard_bag_style:
      name: 카이트보드 가방 스타일
      description: '카이트보드 케이스의 특정 스타일 또는 하위 유형(예: 보드백, 골프백, 여행 가방, 포일백).'
    kiwifruit_variety:
      name: 키위 품종
      description: 키위의 특정 품종 또는 색상(녹색, 금색, 빨간색 등)을 식별합니다.
    knee_pad_pocket_type:
      name: 무릎 보호대 포켓 유형
      description: 해당 의류에 무릎 보호대를 착용할 수 있는지 여부와 착용 방법을 나타냅니다.
    knee_pad_style:
      name: 무릎 보호대 스타일
      description: '무릎 보호대의 제작 방식 또는 형태(예: 슬리브, 브레이스, 가드)를 설명합니다.'
    knee_protection_design:
      name: 무릎 보호대 디자인
      description: 다리 보호대에 내장된 경첩식 무릎 부분의 개수를 나타냅니다.
    kneeboard_construction:
      name: 니보드 제작
      description: '보드의 주요 제작 기술 또는 복합 재료 구성(예: 회전 성형 플라스틱, 압축 성형, 탄소 섬유)을 식별합니다.'
    kneeboard_strap_type:
      name: 니보드 스트랩 유형
      description: 라이더를 보드에 고정하는 데 사용되는 무릎 스트랩 시스템의 스타일을 설명합니다.
    knife_lock_mechanism:
      name: 나이프 잠금 메커니즘
      description: 접이식 칼날을 펼쳐진 상태로 고정하는 데 사용되는 메커니즘을 명시하거나, 잠금 장치가 없는 설계를 나타냅니다.
    knife_locking_mechanism:
      name: 나이프 잠금 메커니즘 유형
      description: 칼날을 펼쳐진 상태로 고정하는 메커니즘의 유형을 명시하며, 이는 잠금식 칼의 안전성, 강도 및 사용 편의성을 직접적으로
        결정합니다.
    knife_opening_mechanism:
      name: '나이프 오픈 메커니즘 '
      description: 칼날이 손잡이에서 어떻게 펼쳐지는지 설명하고, 수동, 보조, 자동 및 특수 개방 방식을 구분합니다.
    knife_system:
      name: 나이프 시스템
      description: 오버록 재봉틀의 절단 칼날이 작동하는 방식과 작동 여부.
    knit_elastic_application:
      name: 니트 탄성 적용
      description: 니트 엘라스틱 트림의 제봉/제작 사용 사례 용도를 명시합니다.
    knit_pattern:
      name: 니트 패턴
      description: 케이블, 립, 와플 등 가디건 원단에 사용된 주요 니트 기법이나 질감을 식별하여 소비자가 특정 질감과 보온성을 찾을
        수 있도록 합니다.
    knit_style:
      name: 니트 스타일
      description: 스웨터 원단의 주요 편직 구조, 질감 또는 장식 패턴을 지정합니다.
    knitting_marker_counter_type:
      name: 뜨개질 표시기/카운터 유형
      description: 뜨개질 표시기 및 카운터 내의 기능적 제품 유형을 지정합니다.
    knitting_needle_tip_style:
      name: 뜨개바늘 끝 모양
      description: 다양한 실 및 기술에 맞춰 최적화된 끝의 날카로움/모양.
    knock_sensor_technology:
      name: 노크 센서 기술
      description: 노크 센서에 사용되는 감지 기술.
    knurl_aggressiveness:
      name: 널링 자극성
      description: 그립감과 안정성에 영향을 주는 바 샤프트의 널링 패턴의 날카로움 또는 질감을 설명합니다.
    knurl_marking_standard:
      name: 널링 마킹 표준
      description: '수동 배치에 사용되는 널링 기준 링의 위치를 지정합니다(예: IPF 또는 IWF 표시).'
    kohlrabi_variety:
      name: 콜라비 품종
      description: 콜라비 구근의 품종 또는 시장 품종을 지정하여 고객이 다양한 맛, 크기 및 색상 중에서 선택할 수 있도록 합니다.
    koji_mold_type:
      name: 누룩곰팡이 종류
      description: 발효 과정에서 사용된 누룩곰팡이의 종류 또는 균주를 나타내며, 이는 향과 맛에 영향을 미칩니다.
    kumquat_variety:
      name: 금귤 품종
      description: 제공되는 금귤의 품종을 식별하여 소비자가 맛 프로필, 크기 또는 요리 앱을 기반으로 과일을 선택할 수 있도록 합니다.
    label_edge_type:
      name: 레이블 가장자리 유형
      description: 올풀림을 방지하고 미관을 결정하기 위해 사용되는 가장자리 마감 스타일을 지정합니다.
    label_finish:
      name: 레이블 마감
      description: 레이블에 적용된 표면 마감, 질감 또는 보호 코팅/처리 방법을 지정합니다.
    label_finish_edge_style:
      name: 레이블 마감/가장자리 스타일
      description: '가장자리 마감 방식이 어떻게 착용감과 내구성에 영향을 미치는지를 설명합니다(예: 직조 방식, 레이저 커팅 방식).'
    label_fold_type:
      name: 레이블 접기 유형
      description: '봉제 레이블을 품목에 봉제하는 방식(예: 끝부분 접기 vs. 중앙 접기)을 지정하여 레이블의 부착 방식과 위치에
        영향을 미칩니다.'
    label_text_type:
      name: 레이블 텍스트 유형
      description: 레이블이 공백인지, 미리 인쇄된 것인지, 아니면 사용자 지정형인지 여부를 나타냅니다.
    lace_area_size:
      name: 레이스 부분 사이즈
      description: '레이스 부분의 사이즈 또는 구성을 정의합니다(예: 4×4 폐쇄, 13×6 전면). 이는 사용 가능한 나눔 공간을
        결정합니다.'
    lace_tightener_style:
      name: 레이스 조임 스타일
      description: 레이스 조임 장치의 기계적 설계 또는 형태를 식별합니다.
    lace_type:
      name: 레이스 타입
      description: 현실감과 피부 톤 매치에 영향을 주는 헤어라인/모자의 레이스 소재 또는 마감을 설명합니다.
    lacrosse_ball_certification:
      name: 라크로스 공 인증
      description: 라크로스 공이 충족하는 스포츠 관리 기구의 승인 또는 표준을 명시합니다.
    lacrosse_goal_regulation_certification:
      name: 라크로스 골대 규정 인증
      description: '라크로스 골대 또는 네트가 특정 경기 운영 기관(예: NCAA 또는 NFHS)의 규격을 충족하는지 여부를 나타냅니다.'
    lacrosse_pocket_type:
      name: 라크로스 포켓 유형
      description: 볼 컨트롤과 릴리즈에 영향을 주는 헤드에 엮인 포켓 또는 메쉬의 일반적 스타일을 식별합니다.
    lacrosse_string_type:
      name: 라크로스 스트링 유형
      description: 그물 또는 메쉬 품목의 정확한 형태 또는 용도를 분류하여 소비자가 메쉬 조각, 키트 및 주머니 내의 특정 문자열
        역할을 구별할 수 있습니다.
    ladder_position:
      name: 사다리 위치
      description: 유아용 로프트 침대에서 사다리 또는 계단으로 올라갈 수 있는 위치를 표시합니다.
    lanyard_attachment_hardware:
      name: 끈 부착 하드웨어
      description: 열쇠, 배지, 휴대폰 또는 기타 액세서리에 연결되는 끈 끝 부분의 하드웨어 스타일을 나타냅니다.
    lanyard_style:
      name: 끈 스타일
      description: 끈을 착용하거나 휴대하는 방법을 명시합니다.
    lanyard_type:
      name: 끈 유형
      description: 호루라기와 함께 공급되거나 호환되는 끈 스타일을 설명합니다.
    lap_hand_loom_accessories_included:
      name: 수동식 직기 액세서리 포함
      description: 수동식 직기 패키지에 포함된 액세서리입니다.
    lapel_style:
      name: 라펠 스타일
      description: '정장 재킷 라펠의 디자인(예: 노치, 피크, 숄)을 명시합니다.'
    laser_safety_class:
      name: 레이저 안전 등급
      description: '장치 설명서/레이블에 표시되어 있는 제품의 레이저 안전 등급(예: 2등급, 3R등급, 3B등급, 4등급).'
    latex_processing_method:
      name: 라텍스 가공 방식
      description: 라텍스 폼 생산에 사용되는 제조 공정(일반적으로 Dunlop 또는 Talalay)을 명시하며, 이는 촉감, 반응성
        및 가격에 영향을 미칩니다.
    latex_type:
      name: 라텍스 유형
      description: 매트리스에 사용된 라텍스의 원산지 및 구성(천연, 유기농, 합성 또는 혼합)을 표시하여 내구성, 친환경성 및 잠재적
        알레르기 유발 물질에 대한 정보를 소비자에게 제공합니다.
    launch_profile:
      name: 런치 프로필
      description: 골프 클럽 샤프트가 만들어내도록 설계된 일반적인 런치 궤적(낮음, 중간, 높음)을 나타냅니다.
    launcher_mounting_configuration:
      name: 런처 장착 구성
      description: 런처의 장착 또는 구성 방식을 파악하여 독립형, 언더배럴형 또는 레일 장착형 옵션이 필요한 구매자에게 도움을 줍니다.
    layer_construction:
      name: 레이어 구조
      description: '원단 적층 구조(예: 2겹, 2.5겹, 3겹)를 명시하며, 이는 무게, 휴대성 및 내구성에 영향을 미칩니다.'
    layer_design:
      name: 레이어 디자인
      description: 머리망의 구조를 층 구조 또는 양면 사용 가능성 측면에서 설명합니다.
    lazy_kate_tension_control_type:
      name: 레이지 케이트 장력 제어 유형
      description: 레이지 케이트가 실을 꼬거나 감을 때 실패에 마찰력/장력을 가하는 방법.
    lead_hardware_type:
      name: 리드 하드웨어 유형
      description: 리드 끝부분의 부착 방식 또는 고정 장치 스타일(스냅, 클립, 고리, 체인 등)을 정의하며, 이는 사용 편의성,
        안전성 및 훈련 적합성에 영향을 줍니다.
    leaf_gelatin_grade:
      name: 판젤라틴 등급
      description: 판젤라틴에 사용되는 표준 강도 등급을 명시합니다.
    leaf_preparation:
      name: 잎채소 손질 형태
      description: 포장 전 판의 손질 방법(다진 것, 채 썬 것, 잘게 썬 것 등)을 설명합니다.
    leaf_spring_material:
      name: 리프 스프링 소재
      description: 판스프링 팩의 주요 구성 재료.
    leak_protection_layer:
      name: 누출 방지 레이어
      description: 수영복 하의에 내장된 기저귀 시스템이 누출 방지를 위해 단일 레이어 또는 이중 레이어 디자인을 사용하는지 여부를
        나타냅니다.
    leash_clip_type:
      name: 리드 클립 타입
      description: '리드를 목걸이 또는 하네스에 연결하는 데 사용되는 클립 또는 하드웨어 스타일을 지정합니다(예: 볼트 스냅, 카라비너,
        회전 클립).'
    leash_style:
      name: 리드 스타일
      description: 리드의 코드 구성 또는 감는 방식을 설명합니다.
    leash_type:
      name: 리드 유형
      description: 리드의 전체적인 스타일이나 용도에 따른 구성을 분류하여 용도별로 빠르게 필터링할 수 있습니다.
    leavening_action_type:
      name: 팽창 작용 유형
      description: '베이킹파우더의 화학적 조성 또는 팽창 방식(예: 단일 작용, 이중 작용, 무알루미늄)을 식별합니다. 이는 제빵
        성능과 레시피 적합성에 직접적인 영향을 미칩니다.'
    leavening_agent:
      name: 팽창제
      description: 반죽에 사용되는 주요 팽창 메커니즘을 명시합니다.
    led_color_options:
      name: LED 색상 옵션
      description: 입질을 시각적으로 확인하기 위해 알람에서 선택 가능한 LED 색상 목록입니다.
    led_indicator_color:
      name: LED 표시등 색상
      description: 제품의 LED 표시등 색상을 식별하여 낚시꾼이 여러 알람을 일치시키거나 개인 선호에 적합하도록 돕습니다.
    led_light_color:
      name: LED 조명 색상
      description: 내장된 LED 조명의 색상을 명시합니다.
    leek_variety:
      name: 리크 품종
      description: 리크의 품종을 명시하여 맛, 크기 및 재배 시기에 따라 구분할 수 있습니다.
    leg_coverage:
      name: 레그 커버 수준
      description: '잠수복의 다리 부분이 얼마나 덮는지 지정합니다(예: 반바지, 전체 길이).'
    leg_cuff_style:
      name: 다리 커프 스타일
      description: 바지 밑단 마감 스타일을 명시합니다.
    leg_cut_height:
      name: 다리 절단 높이
      description: 비키니 하의의 다리통 높이를 나타냅니다.
    leg_cut_style:
      name: 레그 컷 스타일
      description: 다리통의 모양 에 대해 설명하며, 이는 외관, 착용감 및 태닝 라인에 영향을 미칩니다.
    leg_length:
      name: 다리 길이
      description: 다리 길이(짧음, 중간, 긺)에 따라 수영복 하의를 분류하여 소비자가 카테고리를 나누지 않고 원하는 커버리지를 선택할
        수 있도록 합니다.
    leg_loop_type:
      name: 레그 루프 유형
      description: 다리 고리의 디자인에 대해 설명합니다.
    leg_opening_style:
      name: 다리통 스타일
      description: 조거 팬츠의 밑단 마감 방식을 명시합니다. 예를 들어 신축성 있는 커프스, 지퍼 밑단, 또는 트임 밑단 등이 있습니다.
    leg_style:
      name: 다리 스타일
      description: 벤치 다리 또는 받침대의 디자인이나 제작 스타일을 정의합니다.
    legging_foot_design:
      name: 레깅스 발 디자인
      description: 레깅스가 발목 부분이 없는 형태인지, 발목 부분이 있는 형태인지, 또는 두 가지 스타일 모두로 변환 가능한 형태인지
        지정합니다.
    leggings_waistband_style:
      name: 레깅스 허리밴드 스타일
      description: 편안함, 지지력, 미감에 영향을 주는 레깅스 허리밴드의 구조적 디자인을 명시합니다.
    lei_closure_style:
      name: 레이 클로저 스타일
      description: 레이가 연속된 고리 형태인지, 아니면 양쪽 끝이 열려 있어 묶거나 리본으로 고정할 수 있는지 설명합니다.
    lemon_variety:
      name: 레몬 품종
      description: '레몬의 특정 품종을 식별합니다(예: 유레카, 마이어, 아말피).'
    length_adjustment_method:
      name: 길이 조절 방법
      description: 줄넘기 길이를 사용자에게 맞게 조절할 수 있는지 여부와 조절 방법을 나타냅니다.
    lens_color_tint:
      name: 렌즈 색상/색조
      description: 제품과 함께 공급되는 보호 안경 렌즈의 색상 또는 색조.
    lens_construction:
      name: 렌즈 구성
      description: '렌즈의 구조적 특징(예: 단일 유리, 이중 유리, 열선)을 명시하여 김 서림 방지 및 광학적 특성을 나타냅니다.'
    lens_tint_category:
      name: 렌즈 틴트 범주
      description: 국제적인 렌즈 색상 분류 기준에 따라 렌즈의 암도를 분류하여 고객이 다양한 조명 조건에 맞는 렌즈를 선택할 수 있도록
        도와줍니다.
    lettuce_variety:
      name: 양상추 품종
      description: '양상추의 특정 품종(예: 아이스버그, 로메인, 버터헤드)을 식별하여 정확한 필터링 및 비교를 가능하게 합니다.'
    level_of_play:
      name: 플레이 레벨
      description: 플레이어 경쟁력과 예산에 맞춰 제조사가 명시한 퍼포먼스 티어입니다.
    lever_configuration:
      name: 레버 구성
      description: '수상 차량 엔진 제어 장치의 레버/핸들 구성(예: 단일 레버 대 이중 레버)을 나타냅니다.'
    lever_type:
      name: 레버 유형
      description: 하프 줄에 설치된 음정 조절 레버의 종류/메커니즘.
    license_plate_cover_style:
      name: 번호판 커버 스타일
      description: '번호판 커버의 제작 방식을 명시합니다(예: 풀 커버 vs 나사식 캡).'
    license_plate_personalization_type:
      name: 번호판 개인화 유형
      description: 번호판이 공백인지, 미리 인쇄되어 있는지 또는 구매자 제공 맞춤 설정을 지원하는지(텍스트 및/또는 그래픽)를 명시합니다.
    license_usage_terms:
      name: 라이선스/사용 약관
      description: '패턴 사용 권한(예: 개인 사용 전용 vs. 제한적 상업적 사용).'
    licensed_sports_property:
      name: 라이선스 보유 스포츠 자산
      description: 제품이 리그/팀/조직으로부터 공식 라이선스를 받았는지 여부를 나타냅니다.
    lid_hinge_mechanism:
      name: 뚜껑 경첩 메커니즘
      description: 안전 및 사용 편의성에 영향을 주는 리드의 경첩 메커니즘을 명시합니다.
    lid_support_positions:
      name: 뚜껑 지지 위치
      description: 그랜드 피아노의 뚜껑을 열 수 있는 최대 위치(뚜껑을 열 수 있는 최대 거리)를 명시합니다.
    lie_angle_color_code:
      name: 라이각 색상 코드
      description: '일부 클럽에서 사용되는 제조업체의 색상으로 구분된 라이각 시스템을 나타냅니다(예: 검정색 점, 녹색 점).'
    life_jacket_certification_standard:
      name: 구명조끼 인증 표준
      description: '제품이 충족하는 공식 안전 분류 또는 표준(예: USCG 유형 또는 ISO/AS 등급 등).'
    life_raft_certification_standard:
      name: 구명뗏목 인증 표준
      description: 뗏목이 제작되고 관리되는 데 필요한 안전 기준/인증.
    life_raft_container_type:
      name: 구명뗏목 컨테이너 유형
      description: 구명뗏목을 보관 및 전개를 위해 포장하는 방법.
    life_vest_approval_standard:
      name: 구명조끼 승인 표준
      description: 구명조끼가 준수하는 인증/승인 기준을 명시합니다.
    life_vest_intended_user:
      name: 구명조끼 사용 대상
      description: 착용감 및 제공을 위한 대상 착용자 범주를 나타냅니다.
    lifebuoy_approval_standard:
      name: 구명부표 승인 기준
      description: '구명부표가 준수하는 안전 승인 또는 표준(예: USCG/SOLAS).'
    lifebuoy_features:
      name: 구명부표 특징
      description: 구명부표의 기능적 안전성, 장착/취급 편의성 및 포함된 액세서리 기능.
    lift_mechanism_type:
      name: 리프트 메커니즘 유형
      description: 벽침대를 올리고 내리거나 열고 닫는 데 도움을 주는 메커니즘을 명시합니다.
    lift_stand_support_point:
      name: 리프트/스탠드 지지 포인트
      description: 리프트/스탠드가 차량과 접촉하거나 차량을 지지하는 부분.
    lifting_gas_type:
      name: 리프팅 가스 유형
      description: 비행선에 사용되는 주요 부력 가스 또는 부력 매체를 명시합니다.
    lifting_support_type:
      name: 리프팅 지지 유형
      description: 리프트가 활주로를 통해 진입하는지, 아니면 프레임/리프트 지점에 닿는 암/패드를 통해 상승하는지 여부를 나타냅니다.
    ligature_and_cap_component_type:
      name: 리가처 및 캡 구성 요소 유형
      description: 해당 제품이 리가처인지, 캡인지, 아니면 둘 다 포함된 세트인지를 나타냅니다.
    ligature_material:
      name: 리가처 소재
      description: '리드를 고정하는 리가처 본체의 주요 재질(예: 금속, 가죽, 천).'
    ligature_plating_or_finish:
      name: 리가처 도금 또는 마감
      description: 금속 클라리넷 리가처 및/또는 캡에 적용되는 도금 및/또는 표면 마감을 명시합니다.
    ligature_reed_contact_style:
      name: 리가처 리드 접촉 방식
      description: '리가처가 리드와 접촉하는 방식을 지정합니다(예: 최소 접촉, 다중 접촉, 랩어라운드).'
    ligature_screw_position_relative_to_reed:
      name: 리가처 나사 위치(리드에 대한 상대적 위치)
      description: 마우스피스에 장착했을 때 리드/연주자 방향을 기준으로 리가처 조임 나사의 위치를 나타냅니다.
    ligature_tension_adjustment_mechanism:
      name: 리가처 장력 조절 메커니즘
      description: 리가처가 리드에 적용/조절하는 압력의 방식(고정 방식)을 설명합니다.
    ligature_tightening_mechanism_type:
      name: 리가처 조임 메커니즘 유형
      description: '마우스피스와 리드를 감싸는 리가처의 조임 방식을 지정합니다(예: 단일 나사, 이중 나사, 레버/퀵 릴리스).'
    light_bar_housing_material:
      name: 라이트바 하우징 재질
      description: 내구성 및 열 방출 성능에 영향을 미치는 라이트바 하우징/본체의 주요 소재.
    light_bar_lens_material:
      name: 라이트 바 렌즈 소재
      description: 저항 및 광학적 선명함에 영향을 줄 수 있는 라이트바 렌즈/커버의 주요 재질.
    light_bar_mounting_location:
      name: 라이트바 장착 위치
      description: 차량의 주요 장착 예정 위치.
    light_stand_style:
      name: 조명 스탠드 스타일
      description: '특수 효과 조명을 지지하는 데 사용되는 스탠드의 구조적 스타일 또는 형태(예: 삼각대, T-바, 크랭크업)를 명시하며,
        이는 장착 유형에 의해 결정되는 설치 표면(벽/천장)을 의미하는 것이 아닙니다.'
    light_switch_function:
      name: 조명 스위치 기능
      description: 해당 스위치가 제어하는 조명 회로 또는 기능을 식별합니다.
    lighting_control_protocols_supported:
      name: 지원되는 조명 제어 프로토콜
      description: 컨트롤러가 DMX512 외에 또는 대신 지원하는 제어/네트워크 프로토콜.
    lighting_effects:
      name: 조명 효과
      description: 게임 플레이 또는 심미성을 향상시키는 통합 조명 기능을 지정합니다.
    lighting_mode:
      name: 조명 모드
      description: 지속 점등, 점멸, 스트로보 또는 SOS와 같은 사용 가능한 작동 조명 패턴을 나열합니다.
    lily_variety:
      name: 백합 품종
      description: '생화로 판매되는 백합의 상업적/식물학적 품종을 명시합니다(예: 아시아 백합, 동양 백합).'
    limb_articulation:
      name: 사지 관절
      description: 더미의 사지 유연성 또는 관절 가동 범위(없음, 고정, 반유연, 완전 관절)를 나타냅니다.
    limb_material:
      name: 사지 재료
      description: 활이나 석궁의 림에 사용되는 주요 재질로, 무게, 내구성, 진동, 전반적 성능에 영향을 줍니다.
    lime_variety:
      name: 라임 품종
      description: 판매되는 라임의 특정 식물학적 또는 상업적 품종을 식별합니다.
    line_buoyancy:
      name: 낚싯줄 부력
      description: 브레이드가 자연적으로 뜨는지 가라앉는지, 그리고 어떤 속도로 가라앉는지 설명하며, 이는 루어 운용과 라인 관리에
        영향을 미칩니다.
    line_purpose:
      name: 낚싯줄 용도
      description: '연 시스템 내에서 라인의 의도된 기능을 정의합니다(예: 앞쪽 비행 라인, 감속 라인, 브라이들 라인).'
    linen_finish_treatment:
      name: 린넨 마감/처리
      description: 촉감, 외관 또는 성능을 변화시키는 린넨 원단에 적용되는 모든 마감 공정.
    linen_weave_type:
      name: 린넨 직조 유형
      description: 린넨 원단의 직조 구조를 명시하며, 이는 질감, 통기성 및 드레이프에 영향을 미칩니다.
    liner_padding_type:
      name: 라이너 패딩 유형
      description: '안감의 구조 또는 쿠션 스타일(예: 메쉬, 가벼운 패딩 처리, 누빔 처리)을 나타냅니다.'
    liner_shape:
      name: 라이너 Shape
      description: 침낭 라이너의 전체적인 모양을 설명하여 고객이 자신의 침낭과 편안한 기본 설정에 맞춰볼 수 있도록 합니다.
    liner_type:
      name: 라이너 유형
      description: 반바지에 안감이 있는지 여부와, 있다면 어떤 스타일인지를 나타냅니다.
    lining:
      name: 안감
      description: 수영복 반바지에 안감이 있는지 여부와 안감의 종류 및 범위(안감의 깊이 포함)를 나타냅니다.
    lining_material:
      name: 안감 소재
      description: 신발 안감에 사용되는 소재를 명시하며, 이는 착용감, 통기성 및 보온성에 영향을 미칩니다.
    lining_type:
      name: 안감 유형
      description: 수영복에 안감이 있는지 여부와 안감의 정도를 명시합니다.
    link_connection_style:
      name: 링크 연결 스타일
      description: '링크가 체인에 연결되는 방식(예: 퀵 링크, 연결 핀)을 분류하여 라이더가 올바른 설치 방법이나 교체 부품을 선택할
        수 있도록 합니다.'
    live_bait_form:
      name: 생 미끼 형태
      description: '미끼의 물리적 형태 또는 보존 상태(예: 생, 냉동, 건조)를 명시합니다.'
    living_room_furniture_items_included:
      name: 거실 가구 품목 포함
      description: '거실 세트에 포함된 개인 가구 품목을 구체적으로 명시하여 소비자가 어떤 구성 요소(예: 소파, 2인용 소파, 커피
        테이블)가 포함되어 있는지 빠르게 파악할 수 있도록 도와줍니다.'
    load_mechanism:
      name: 하중 메커니즘
      description: '기계에 저항을 생성하거나 추가하는 주요 방법을 지정합니다(예: 선택식 무게 스택, 플레이트 로드, 밴드 로드).'
    lock_cylinder_type:
      name: 잠금 실린더 유형
      description: 사용된 키 실린더/코어의 유형을 명시합니다(피킹 저항 및 교체 키 관련).
    lock_security_level:
      name: 잠금 보안 수준
      description: 자물쇠/실린더의 피킹 및 드릴링에 대한 보안 저항 기능을 설명합니다.
    lock_system:
      name: 잠금 시스템
      description: 엘리베이터를 높은 곳에 고정하는 데 사용되는 안전 잠금 시스템의 종류.
    locker_bench_configuration:
      name: 탈의실용 벤치 구성
      description: '탈의실용 벤치의 방향 또는 구조적 구성을 설명합니다(예: 단면형, 양면형 아일랜드형, 벽걸이형).'
    locomotive_prototype_power_type:
      name: 기관차 시제품 동력 유형
      description: 모델이 나타내는 실제 기관차 추진 방식을 명시합니다.
    locomotive_wheel_arrangement_whyte_notation:
      name: 기관차 바퀴 배열(와이트 표기법)
      description: '기관차 원형의 차륜 배열(예: 4-6-2 Pacific).'
    loft_bed_height_classification:
      name: 로프트 침대 높이 분류
      description: 로프트 침대의 전체 높이 유형(낮음, 중간, 높음, 매우 높음)을 나타내어 소비자가 천장 높이 및 침대 아래 공간
        요구 사항에 맞춰 선택할 수 있도록 도와줍니다.
    logo_application_method:
      name: 로고 부착 방식
      description: '학교 문장이나 로고가 의류에 어떻게 적용되는지 설명합니다(예: 자수 또는 인쇄).'
    logo_label_compatible_fabric_weight:
      name: 로고 레이블 부착 가능 원단 무게
      description: 레이블이 변형되거나 두꺼워지지 않도록 부착하기에 적합한 원단 무게 범주입니다.
    logo_label_edge_finish:
      name: 로고 레이블 가장자리 마감
      description: 레이블의 가장자리 마감/구조를 명시하며, 이는 마모 저항성과 피부에 닿는 느낌에 영향을 줍니다.
    logo_label_print_production_method:
      name: 로고 레이블 인쇄/제작 방법
      description: 레이블 표면에 로고가 적용되는/형성되는 방식.
    long_block_completeness:
      name: 롱 블록 완전성
      description: 롱 블록 어셈블리에 포함되는 주요 구성 요소를 명시합니다.
    long_john_pieces_included:
      name: 긴 내의 부분 포함
      description: 제품에 속옷 세트(하의만, 상의만, 또는 상하의 모두)가 포함되는지 여부를 명확히 합니다.
    longan_variety:
      name: 용안 품종
      description: '소비자가 원하는 맛, 크기, 당도 특성을 확인할 수 있도록 용안의 특정 재배 품종이나 시중 유통 품종을 지정합니다(예:
        코할라, 비우 키우).'
    loom_accessories_included:
      name: 직조기 액세서리 포함
      description: 직기와 함께 상자/패키지에 포함된 주요 액세서리.
    loom_finish:
      name: 직조기 마감
      description: 직기의 표면 마감(주로 나무 직기의 경우).
    loom_folding_portability_design_type:
      name: 접이식/휴대용 직기 디자인 유형
      description: 직기를 운반이나 보관을 위해 접을 수 있는지 여부 및 방법.
    loom_frame_folding_design:
      name: 직기 프레임 접이식 디자인
      description: 테이블 직기 프레임 보관이나 운송을 위해 접거나 분해할 수 있는지 여부와 방법을 지정합니다.
    loom_tension_adjustment_method:
      name: 직기 장력 조절 방법
      description: 직기에서 날실 장력을 조절하는 데 사용되는 주요 방법.
    loom_tie_up_system:
      name: 직기 연결 시스템
      description: '페달/램/샤프트 사이에 사용되는 결속/연결 시스템 유형(예: Texsolv 또는 금속 체인).'
    loquat_variety:
      name: 비파 품종
      description: 비파의 품종을 명시하며, 이는 크기, 맛, 익는 시기 및 외형의 차이를 반영합니다.
    lubricant_features:
      name: 윤활제 특징
      description: 윤활제의 특수한 성능 특징, 첨가제, 효능을 강조합니다.
    lubrication_requirement:
      name: 윤활 요구 사항
      description: 러닝머신 벨트가 사전 처리되어 유지보수가 필요 없는 제품인지, 아니면 지속적인 윤활이나 왁싱이 필요한 제품인지를
        나타냅니다.
    lubrication_type:
      name: 윤활 유형
      description: '부싱의 윤활/그리스 주입 가능 여부와 그리스 주입을 위한 설계 여부(예: 그리스 홈 또는 그리스 주입구)를 명시합니다.'
    lug_nut_seat_profile:
      name: 러그 너트 시트 프로파일
      description: 휠에 필요한 러그 너트 시트 프로파일을 지정하여 올바른 러그 너트 호환성과 안전한 설치를 보장합니다.
    lumbar_support_type:
      name: 요추 지지대 유형
      description: '의자에 제공되는 요추 지지대의 종류를 설명합니다(예: 탈착식 베개, 조절 메커니즘, 마사지).'
    lunge_trainer_style:
      name: 런지 트레이너 스타일
      description: 런지 트레이너의 구조적 디자인을 정의합니다.
    lure_buoyancy:
      name: 루어 부력
      description: '루어가 휴식 상태이거나 탐색 중일 때 물속에서 어떻게 움직이는지 명시합니다(예: 수면에 떠 있거나, 중간 수심에
        떠 있거나, 가라앉는 등).'
    luster:
      name: 광택
      description: '빛이 시료 표면(예: 유리, 금속)과 상호 작용하는 방식을 설명합니다.'
    lychee_cultivar:
      name: 리치 품종
      description: '맛, 씨앗 크기, 수확 시기 및 가격이 다를 수 있는 특정 리치 품종(예: 브루스터, 학입, 모리셔스)을 식별합니다.'
    lyre_flip_folder_mounting_location:
      name: 리라/플립 폴더 장착 위치
      description: '리라 또는 플립 폴더가 악기 또는 액세서리(예: 벨, 리드파이프, 스탠드)에 장착되도록 의도된 위치.'
    lyrics_display_type:
      name: 가사 표시 유형
      description: 노래방 이용 시 가사가 표시되는 방식(지원되는 경우).
    magazine_compatibility:
      name: 탄창 호환성
      description: 조끼에 내장된 파우치가 수납하도록 설계된 주요 탄창 구경 또는 탄창 유형을 식별합니다.
    magnet_requirement:
      name: 자석 요구 사항
      description: 센서 작동에 외부 자석이 필요한지 여부를 나타냅니다.
    magnet_toy_storage_included:
      name: 자석 장난감 보관함 포함
      description: 책상 정리 및 여행용으로 자석 장난감과 함께 제공되는 보관함/케이스 유형입니다.
    malanga_variety:
      name: 말랑가 품종
      description: 소비자가 원하는 맛, 색상, 요리 용도를 선택할 수 있도록 판매되는 말랑가/토란의 구체적인 종류를 식별합니다.
    malt_color_rating_system:
      name: 맥아 색도 등급 시스템
      description: 표기된 색상이 어떤 색도 규격을 기준으로 하는지 지정합니다(로비본드, SRM, 또는 EBC).
    malt_crush:
      name: 맥아 분쇄
      description: 기본 맥아가 분쇄되지 않은 통맥아로 판매되는지, 아니면 미리 분쇄된 상태로 판매되는지, 그리고 미리 분쇄된 경우
        분쇄 방식을 나타냅니다.
    malt_form:
      name: 맥아 형태
      description: 제품이 통곡물 형태로 판매되는지 아니면 으깨서 사용하는 등 가공 처리되어 판매되는지를 나타냅니다.
    malt_intended_use:
      name: 몰트 권장 용도
      description: 맥아의 주된 용도(양조, 증류 또는 양조/증류 겸용).
    malt_treatment:
      name: 맥아 처리
      description: 곡물/맥아가 일반적인 가마 건조 외에 어떻게 추가 가공되었는지 설명합니다(일반적인 특수 가공 공정).
    malt_usage_purpose:
      name: 맥아 사용 목적
      description: 특수 맥아가 맥주 제조법에 미치는 주요 기능적 역할을 설명합니다.
    man_overboard_system_type:
      name: 해상 조난자 구조 시스템 유형
      description: 제품이 제공하는 주요 해상 조난자 구조(MOB) 솔루션 범주를 지정합니다.
    mandolin_back_sides_wood:
      name: 만돌린 후판 및 측판 목재
      description: 만돌린 후판과 측판에 사용된 목재 종류를 지정합니다.
    mandolin_body_top_wood:
      name: 만돌린 바디 상판 목재
      description: 만돌린 사운드보드(상판)에 주로 사용되는 목재/재료.
    mandolin_bridge_type:
      name: 만돌린 브릿지 타입
      description: 만돌린에 사용되는 브리지의 스타일을 지정합니다.
    mandolin_pickup_configuration:
      name: 만돌린 픽업 구성
      description: 만돌린에 전자 장치가 포함되어 있는지 여부와 설치된 픽업 시스템의 종류를 나타냅니다.
    mandolin_string_configuration:
      name: 만돌린 현 구성
      description: '총 줄 수와 복현 수를 기준으로 만돌린의 현 구성을 지정합니다(예: 8현/4코스).'
    mangosteen_variety:
      name: 망고스틴 품종
      description: 판매되는 망고스틴 또는 이와 밀접하게 연관된 가르시니아 과일의 특정 종이나 품종을 식별합니다.
    mannequin_style:
      name: 마네킹 스타일
      description: 훈련용 마네킹의 구조적 디자인 또는 제작 방식을 설명합니다.
    manufacturing_process:
      name: 제조 공정
      description: '릴 본체 또는 스풀의 주요 생산 방식(예: CNC 가공, 다이캐스팅).'
    map_coverage_sky_planet_body:
      name: 지도 표기 범위(천체/행성체)
      description: 지도가 무엇을 묘사하는지 나타냅니다(밤하늘(별자리) 또는 특정 행성체).
    map_format:
      name: 지도 형태
      description: 사냥 지도 및 안내서의 물리적 또는 디지털 제공 형태를 정의합니다.
    map_sensor_output_signal_type:
      name: MAP 센서 출력 신호 유형
      description: MAP 센서가 엔진 제어 장치(ECU)에 제공하는 출력 신호 유형을 지정합니다.
    map_size_sheet:
      name: 지도 크기(시트)
      description: 전시 및 호환성(액자 크기, 벽면 공간 등)을 돕기 위해 지도 시트, 포스터 또는 별자리판의 완제품 크기를 지정합니다.
    marabou_feather_form:
      name: 마라부 깃털 형태
      description: 판매되는 마라부 깃털 제품의 형태.
    marabou_feather_treatment:
      name: 마라부 깃털 처리
      description: 공예용으로 사용할 수 있도록 마라부 깃털이 어떻게 가공되거나 마감되었는지 나타냅니다.
    marble_track_set_feature_modules:
      name: 구슬 굴리기 트랙 세트 기능 모듈
      description: '세트에 포함된 특별한 기능적 모듈(예: 리프트, 발사대, 회전 갈림길/스위치)을 강조하여 나타냅니다.'
    marine_flare_certification_standard:
      name: 선박용 조명탄 인증/표준
      description: 해당 신호탄이 충족하는 선박 안전 인증이나 표준 규격을 나타냅니다.
    marine_safety_standard_compliance:
      name: 해양 안전 표준 준수
      description: 해당 액세서리가 충족하는 공식 수상 안전 표준이나 승인 규격을 나타냅니다.
    marine_transmission_type:
      name: 선박용 변속기 유형
      description: '내장 엔진과 결합되는 선박용 변속기 유형을 지정합니다(예: 직결식, V-드라이브).'
    marker_action_type:
      name: 마커 작동 유형
      description: 마커의 기본적인 발사/작동 메커니즘을 설명합니다.
    marker_caliber:
      name: 마커 구경
      description: 마커가 발사하도록 설계된 페인트볼의 직경을 지정합니다.
    marking_durability:
      name: 마킹 내구성
      description: '도색된 선이 일반적인 조건에서 얼마나 오래 보일 것으로 예상되는지 나타냅니다(예: 임시형(최대 3주), 준영구형(최대
        6개월), 영구형(6개월 이상)).'
    marking_tip_type:
      name: 마킹 팁 유형
      description: '나침반에 그림을 그릴 때 사용하는 마킹 인서트 유형(예: 샤프식 홀더, 잉크, 스크라이빙 포인트).'
    marshmallow_processing_method:
      name: 마시멜로 가공 방식
      description: 식감, 유통기한 또는 맛에 영향을 미치는 마시멜로의 특수 가공 방식을 설명합니다.
    marshmallow_size:
      name: 마시멜로 크기
      description: 개별 마시멜로 조각의 상대적인 크기를 분류합니다.
    martial_arts_belt_rank:
      name: 무술 벨트 등급
      description: 벨트의 색상 또는 특수 색상 조합은 해당 실력/등급 수준을 나타냅니다.
    mask_bib_type:
      name: 마스크 턱받이 유형
      description: 펜싱 마스크의 턱받이 유형을 지정합니다(일반 천, 전도성, 탈착식 또는 없음 등).
    mask_cage_material:
      name: 마스크 케이지 소재
      description: 얼굴 보호대 또는 마스크 프레임에 특별히 사용된 소재.
    mask_goggle_design:
      name: 마스크/고글 디자인
      description: 보호 장비의 전반적인 구조적 디자인이나 커버리지 형태를 정의합니다.
    mask_skirt_material:
      name: 마스크 스커트 소재
      description: 마스크와 얼굴 사이를 밀착시켜 방수 기능을 제공하는 소프트 스커트의 재질을 식별합니다.
    mask_strap_material:
      name: 마스크 스트랩 소재
      description: 마스크를 머리에 고정하는 끈의 재질을 명시합니다.
    mass_air_flow_sensor_measurement_type:
      name: MAF(질량 공기 흐름) 센서 측정 방식
      description: MAF 센서에서 사용되는 감지 기술/출력 방식을 지정합니다.
    mass_air_flow_sensor_mounting_type:
      name: 질량 공기 유량 센서 장착 유형
      description: MAF 센서 또는 센서 어셈블리가 흡기 시스템에 장착/설치되는 방식.
    massage_feature:
      name: 마사지 기능
      description: 조절식 베이스에 마사지 기능이 내장되어 있는지 여부와, 내장되어 있다면 제공하는 마사지 존의 개수를 나타냅니다.
    mast_attachment_interface:
      name: 마스트 부착 인터페이스
      description: 동체와 마스트 간의 연결 표준을 지정하여 소비자가 부품의 적합성을 확인할 수 있도록 도와줍니다.
    mast_base_type:
      name: 마스트 베이스 유형
      description: 마스트를 보드 또는 어댑터에 연결하는 장착 인터페이스를 식별합니다.
    mast_bend_curve:
      name: 마스트 벤드 커브
      description: 돛의 호환성과 조종성을 결정하는 마스트의 휨 패턴.
    mast_diameter_type:
      name: 마스트 직경 유형
      description: '호환성 검사에 사용되는 윈드서핑 마스트의 표준 직경 분류(예: RDM, SDM, MDM).'
    mat_backing_type:
      name: 매트 뒷면 유형
      description: 다양한 바닥 표면에서 매트가 밀리지 않고 고정되도록 돕는 매트 밑면 재질의 종류를 지정합니다.
    mat_installation_method:
      name: 매트 설치 방식
      description: 매트를 설치하거나 고정하는 방법을 나타냅니다.
    mat_style:
      name: 매트 스타일
      description: '매트의 구조적 스타일 또는 형태를 정의합니다(예: 접이식 매트, 조립식 타일, 충격 흡수 매트).'
    maternity_panel_type:
      name: 임산부용 패널 유형
      description: 임신 중 신체 변화에 맞춰 신축성 있는 패널 또는 허리밴드가 적용된 스타일을 나타냅니다.
    maternity_waistband_style:
      name: 임산부용 허리밴드 스타일
      description: 임산부용 바지에 특화된 허리밴드나 배 덮개의 디자인 및 배치 상태를 나타내며, 옷이 만삭인 배를 어떻게 받쳐주는지
        설명합니다.
    mattress_top_type:
      name: 매트리스 상단 유형
      description: 필로우탑, 타이트탑 등 매트리스 최상단 레이어의 형태나 표면 구조 스타일을 지정합니다.
    maturation_vessel_material:
      name: 숙성 용기 소재
      description: 소주를 숙성시키는 데 사용되는 용기 또는 오크통의 주요 재질을 지정합니다.
    maximum_quilt_size_supported:
      name: 최대 이불 크기 지원
      description: 프레임이 수용할 수 있는 최대 퀼트/프로젝트 사이즈(일반적으로 침대 사이즈 또는 최대 너비로 표시됨).
    meal_course:
      name: 식사 코스
      description: 해당 제품의 일반적인 식사 상황을 식별합니다.
    meal_preparation_state:
      name: 조리 준비 상태
      description: '섭취 전 준비 과정이 얼마나 필요한지를 나타냅니다(예: 즉석 섭취 식품, 밀키트).'
    meat_processing_state:
      name: 고기 가공 상태
      description: 판매 전 육류 제품에 적용된 조리 또는 염지 정도를 나타냅니다.
    meat_quality_grade:
      name: 육질 등급
      description: '공인된 등급 판정 기관(예: USDA, MSA, Wagyu)에서 해당 육류에 부여한 품질 등급 또는 분류를 나타냅니다.'
    meat_raising_claim:
      name: 육류 사육 방식 인증 표기
      description: '해당 육류와 관련된 일반적인 동물 복지 또는 농가 사육 방식(예: 목초 사육, 방사 사육)을 강조하여 나타냅니다.'
    mechanical_loom_assembly_status:
      name: 기계식 직기 조립 상태
      description: 직기 배송 또는 조립 필요 여부에 따른 배송 방법.
    mechanical_loom_weaving_type:
      name: 기계식 직기 직조 방식
      description: 직기에서 사용하는 주요 직조 메커니즘/유형.
    mechanical_puzzle_primary_mechanism:
      name: 기계식 퍼즐 기본 메커니즘
      description: 기계식 퍼즐을 푸는 데 사용되는 주요 상호 작용/메커니즘.
    mechanical_puzzle_solution_format:
      name: 기계식 퍼즐 해결 형태
      description: 힌트/해법이 포함된 경우, 제공되는 형식.
    medal_attachment_style:
      name: 메달 부착 방식
      description: '메달을 착용하거나 전시하는 방법을 지정합니다(예: 목걸이 리본, 핀).'
    medal_award_level:
      name: 메달 수상 등급
      description: '메달이 나타내는 수상 등급을 지정합니다(예: 1등, 참가).'
    medal_finish:
      name: 메달 마감
      description: 재질과 무관하게 메달 표면의 마감(시각적 광택/질감)을 지정합니다.
    medal_packaging:
      name: 메달 패키징
      description: 메달과 함께 제공되는 전시용 패키징 형태를 나타냅니다.
    melodica_accessory_set_included:
      name: 멜로디카 포함 액세서리 세트
      description: 멜로디카 패키지에 일반적으로 어떤 액세서리들이 포함되어 있는지 나타냅니다.
    melodica_air_chamber_material:
      name: 멜로디카 공기실 재질
      description: '판매자가 다른 부품과 구분하여 표기하는 멜로디카의 공기실 및 본체의 재질(예: ABS, 목재 등).'
    melodica_included_accessories:
      name: 멜로디카 포함 액세서리
      description: 상자 안에 멜로디카와 함께 포함된 액세서리입니다.
    melodica_key_color_scheme:
      name: 멜로디카 키 색상 구성표
      description: 시인성(특히 어린이/초보자)에 영향을 미치는 키의 색상 구성표(본체 색상 제외).
    melodica_mouthpiece_configuration:
      name: 멜로디카 마우스피스 구성
      description: 멜로디카 연주를 위해 어떤 부속(바람을 불어넣는 인터페이스)이 포함되거나 사용되는지 나타냅니다.
    melodica_mouthpiece_type:
      name: 멜로디카 마우스피스 유형
      description: 멜로디카에 포함된 부속(바람을 불어넣는 인테페이스)의 형태(마우스피스 및/또는 유연한 튜브).
    melodica_reed_plate_material:
      name: 멜로디카 리드 플레이트 소재
      description: 내구성과 음색에 영향을 미칠 수 있는 리드 플레이트의 재질(악기 본체 전체 재질과는 별개).
    melodica_size_class:
      name: 멜로디카 크기 등급
      description: '일반적으로 키 수 그룹과 외형 구조를 기준으로 한 멜로디카의 전반적인 크기/휴대성 등급(예: 미니/학생용 vs
        표준형 vs 확장형 모델).'
    melon_variety:
      name: 멜론 품종
      description: 제품에 사용된 멜론의 특정 품종을 지정하여 소비자가 선호하는 품종을 빠르게 찾을 수 있도록 돕습니다.
    memory_foam_infusion_material:
      name: 메모리폼 함유 소재
      description: 냉각, 냄새 제거 또는 항균 목적으로 메모리폼에 첨가된 특수 성분을 식별합니다.
    memory_wire_gauge:
      name: 메모리 와이어 게이지
      description: 메모리 와이어의 AWG(미국 전선 게이지) 크기를 지정합니다.
    memory_wire_project_size:
      name: 메모리 와이어 프로젝트 크기
      description: '메모리 와이어를 성형할 주얼리 형태/코일 사이즈를 지정합니다(예: 팔찌, 목걸이, 반지).'
    metal_purity:
      name: 금속 순도
      description: 보석에 사용된 금속의 순도 또는 순도 등급을 나타내며, 일반적으로 캐럿(K) 또는 천분율로 표시됩니다.
    metrics_counted:
      name: 측정 지표
      description: 카운터가 추적하도록 설계된 개인 통계 또는 이벤트를 나열합니다.
    metronome_display_style:
      name: 메트로놈 표시 스타일
      description: 템포를 사용자에게 표시하는 방식을 지정합니다(바늘/추, 숫자 LED/LCD, 깜빡이는 불빛).
    metronome_output_method:
      name: 메트로놈 출력 방식
      description: 메트로놈 소리/박자 신호에 사용할 수 있는 출력 방법을 지정합니다.
    microphone_toy_feature_set:
      name: 장난감 마이크 기능 세트
      description: 장난감 마이크에 필요한 주요 놀이용 기능(음성 효과, 증폭, 녹음 등).
    midi_output_type:
      name: MIDI 출력 유형
      description: 트리거 모듈에서 제공하는 MIDI 출력의 유형을 지정합니다.
    military_branch:
      name: 군종
      description: 해당 제복이 지급되는 대상이거나 디자인 영감을 얻은 군종을 식별합니다.
    milk_base_type:
      name: 우유 베이스 유형
      description: 음료에 사용된 주된 우유 성분 또는 대체유(있는 경우)를 지정합니다(있는 경우).
    milk_feeding_method:
      name: 수유 방식
      description: '풍미와 영양 성분에 영향을 미칠 수 있는 원유 집유 대상 동물의 사육 방식(예: 목초 사육 또는 곡물 사육)을
        나타냅니다.'
    milk_processing_method:
      name: 우유 가공 방식
      description: 안전성, 유통 기한, 영양적 특성에 영향을 미치는 원유의 처리 방식이나 가공 기술을 지정합니다.
    milk_source_animal:
      name: 원유 집유 동물
      description: 소비자가 젖소, 염소, 버팔로 등 원하는 동물의 유제품을 선택할 수 있도록 원유를 얻은 동물 종류를 식별합니다.
    millet_processing_method:
      name: 기장 가공 방식
      description: '기장 곡물의 주요 가공 방법 또는 상태를 나타냅니다(예: 도정되지 않은 상태, 껍질을 벗긴 상태, 발아 상태).'
    millet_variety:
      name: 기장 품종
      description: '제품에 포함된 특정 기장의 종류(예: 진주기장, 강아지기장, 손가락기장)를 식별합니다.'
    milling_process:
      name: 제분 공정
      description: 풍미, 열 노출도, 영양 성분에 영향을 미칠 수 있는 곡물 제분 공정의 방식을 나타냅니다.
    mint_mark:
      name: 조판창 기호
      description: 동전에 표시된 조판창 기호(해당되는 경우).
    mirror_configuration:
      name: 미러 구성
      description: 세면대 세트에 포함된 거울의 스타일 또는 구조를 지정합니다.
    mirror_coverage:
      name: 거울 부착 범위
      description: 슬라이딩 도어에서 거울 패널이 차지하는 면적이나 범위를 설명합니다.
    mirror_curvature_type:
      name: 거울 곡률 유형
      description: 시야각에 영향을 미치는 거울 표면의 형태가 볼록, 평면, 오목 중 어느 것인지 지정합니다.
    mirror_mounting_location:
      name: 거울 장착 위치
      description: 자전거 또는 라이더의 어느 부위에 거울을 장착할 것인지 지정합니다.
    mirror_shape:
      name: 거울 모양
      description: 화장대 세트에 포함된 메인 거울의 기하학적 모양 또는 스타일을 나타냅니다.
    mix_ratio:
      name: 혼합 비율
      description: 농축액의 경우 냉각수 대 물의 권장 희석 비율을 지정하거나, 미리 희석된 제품의 경우 고정된 혼합 비율을 확인합니다.
    mma_glove_type:
      name: MMA 글러브 유형
      description: MMA 훈련 또는 경기에서 해당 글러브의 주요 용도 또는 스타일을 나타냅니다.
    mobility_features:
      name: 이동 편의 기능
      description: 바퀴나 접이식 다리와 같은 이동 또는 휴대용 요소가 내장되어 있음을 나타냅니다.
    model_aircraft_assembly_level:
      name: 모형 항공기 조립 수준
      description: 항공기를 사용하기 전에 얼마나 많은 건설 작업이 필요한지를 나타냅니다.
    model_making_kit_items_included:
      name: 모델 제작 키트 포함 품목
      description: '모형 제작 키트나 번들에 포함된 구성품을 나열합니다(예: 페인트, 접착제, 브러시).'
    model_making_product_type:
      name: 모형 제작 제품 유형
      description: 모델 제작 분야에서 품목의 본질적인 분류(키트, 액세서리, 도구 또는 소모품)를 식별하여 모델 제작 내 다양한 제품
        유형 간의 검색 및 필터링 기능을 개선합니다.
    model_rocket_kit_contents:
      name: 모형 로켓 키트 구성품
      description: '제품이 완전한 다단식 모형 로켓 키트인지, 아니면 추가 장치/모듈/부품 키트(예: 부스터 또는 주 추진 단계 부품)인지
        나타냅니다.'
    model_rocket_kit_format:
      name: 모델 로켓 키트 형태
      description: 로켓이 키트 형태로 판매되는지 여부와 조립 준비 수준을 지정합니다.
    model_rocket_motor_impulse_class:
      name: 모형 로켓 모터 임펄스 등급
      description: '모형 로켓 모터의 표준 총임펄스 등급을 나타냅니다(예: A, B, C 등).'
    model_rocket_motor_mount_size:
      name: 모형 로켓 모터 마운트 크기
      description: 로켓의 모터 마운트가 수용하도록 설계된 모터 케이스의 직경을 지정합니다.
    model_rocket_power_source_required:
      name: 모형 로켓 필요 전원
      description: 제품에 배터리나 외부 전원이 필요한지 여부와 그 종류를 나타냅니다.
    model_rocket_propellant_type:
      name: 모형 로켓 추진제 유형
      description: 모형 로켓 제품의 추진력으로 사용되는 추진제/엔진 시스템을 식별합니다.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: 모형 로켓 Launch 또는 레일 추천
      description: '로켓이 사용할 수 있도록 설계된 런칭 로드의 직경이나 레일의 크기를 지정합니다(예: 1/8인치 로드, 1010
        런칭 레일).'
    model_rocket_recovery_method:
      name: 모형 로켓 회수 방법
      description: 비행 후 로켓을 안전하게 회수하기 위해 사용되는 주 회수 시스템을 나타냅니다.
    model_rocket_recovery_system_type:
      name: 모형 로켓 회수 시스템 유형
      description: 비행 후 로켓을 안전하게 회수하는 데 사용되는 주요 회수 방법을 지정합니다.
    model_rocket_staging:
      name: 모형 로켓 단
      description: 모델 로켓이 몇 개의 추진 단계를 거쳐 비행하도록 설계되었는지를 나타냅니다.
    model_train_accessory_electrical_connection_type:
      name: 모형 기차 액세서리 전기 연결 유형
      description: "(해당되는 경우) 동력 모형 기차 액세서리를 레이아웃에 연결하는 데 사용되는 커넥터 또는 좌석 스타일을 지정합니다."
    model_train_coupler_type:
      name: 모형 기차 연결기 유형
      description: 모형 기차 차량 또는 기관차에 설치된 연결기 표준을 지정합니다.
    model_train_gauge:
      name: 모형 기차 게이지
      description: "(해당되는 경우) 액세서리가 사용될 모형 철도 게이지 시스템을 지정하여 사용자의 트랙 및 레이아웃과의 물리적 호환성을
        보장하도록 돕습니다."
    model_train_lighting_features:
      name: 모형 기차 조명 기능
      description: 모형 기차/기관차에 포함된 조명 기능을 지정합니다.
    model_train_power_pickup_method:
      name: 모형 기차 전원 집전 방법
      description: 모형이 작동에 필요한 전원을 공급받는 방식을 지정합니다.
    model_train_scale:
      name: 모형 기차 스케일
      description: 모형 기차의 스케일/크기 표준(모형과 실제 기차 간의 축적 비율)을 지정합니다.
    model_train_sound_features:
      name: 모형 기차 사운드 기능
      description: 모형에 음향 효과음이 포함되어 있는지, 그리고 어떤 종류의 효과음을 제공하는지 나타냅니다.
    model_train_track_gauge:
      name: 모형 기차 트랙 게이지
      description: '모형이 주행하도록 설계된 트랙 게이지/트랙 시스템 표준을 지정합니다(예: 표준 게이지, 좁은 게이지 이형 상품
        또는 해당되는 경우 특정 브랜드/시스템 전용 게이지).'
    modeling_dough_base_material:
      name: 점토 반죽 베이스 성분
      description: '점토 반죽의 주요 베이스 성분 및 조성(예: 밀가루/곡물 베이스, 폴리머 베이스).'
    modeling_dough_features:
      name: 점토 반죽 기능
      description: 소비자들이 일반적으로 필터링하는 점토 반죽의 주요 기능적 특징.
    modification_level:
      name: 수정 수준
      description: 맥아의 용해 상태(보리의 배유 및 단백질이 얼마나 완전히 분해되었는지)의 정도를 나타내며, 대개 미용해/용해/과용해로
        요약됩니다.
    molasses_base_ingredient:
      name: 당밀 베이스 원료
      description: 당밀이 생산되는 주된 식물 또는 과일 원료를 식별합니다.
    molasses_grade:
      name: 당밀 등급
      description: 풍미의 진한 정도, 색상 및 영양 성분에 직접적인 영향을 미치는 추출/정제 단계별로 당밀을 분류합니다.
    mold_material:
      name: 몰드 소재
      description: '몰드 자체의 주요 재료 구성(예: 실리콘, 플라스틱, 금속).'
    molle_compatibility:
      name: MOLLE 호환성
      description: 조끼에 모듈형 파우치 및 액세서리를 부착할 수 있는 MOLLE/PALS 웨빙이 제공되는지 여부를 나타냅니다.
    motor_belt_type:
      name: 모터 벨트 유형
      description: 런닝머신 구동 시스템에 사용되는 벨트의 디자인/프로필을 정의합니다.
    motor_configuration:
      name: 모터 구성
      description: 스쿠터에 사용되는 독립 구동 모터의 개수를 나타냅니다.
    motor_mounting_configuration:
      name: 모터 장착 구성
      description: 스쿠터용 전환 키트에서 모터가 어떻게 장착/구현되는지 설명합니다.
    motor_mounting_position:
      name: 모터 장착 위치
      description: '전동 스쿠터에서 모터가 장착되는 위치를 나타냅니다(예: 앞바퀴 허브, 뒷바퀴 허브, 이중 바퀴 허브 또는 미드
        드라이브).'
    motor_position:
      name: 모터 위치
      description: 조종성과 유지 보수에 영향을 미치는 전기 자전거의 모터 장착 위치를 나타냅니다.
    motor_vehicle_a_v_integration_features:
      name: 차량용 A/V 통합 기능
      description: '헤드 유닛에서 지원하는 스마트폰 및 차량 내 통합 기능(예: Apple CarPlay, Android Auto,
        MirrorLink).'
    motor_vehicle_bulb_application_position:
      name: 차량용 전구 장착 부위/위치
      description: '전구가 사용되도록 설계된 차량 조명의 위치나 기능을 지정합니다(예: 하향등, 브레이크등).'
    motor_vehicle_bulb_approval_standard:
      name: 자동차 전구 승인 기준
      description: 대상 시장에서 도로 주행용으로 허가된 법적 규제 준수 여부 및 인증 마킹을 나타냅니다.
    motor_vehicle_oxygen_sensor_bank:
      name: 차량용 산소 센서 뱅크
      description: 'V형/복서 엔진의 경우 산소 센서가 어느 실린더 뱅크에 장착되는지를 나타냅니다(예: 뱅크 1 vs 뱅크 2).
        직렬 엔진에는 적용되지 않습니다.'
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: 차량용 산소 센서 배선 개수
      description: 산소 센서 하네스의 배선 개수.
    motor_vehicle_oxygen_sensor_position:
      name: 자동차 산소 센서 위치
      description: 촉매 변환기를 기준으로 배기 시스템 내 산소(O2) 센서의 설치 위치를 지정합니다.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: 자동차 산소 센서 센서 번호
      description: '지정된 뱅크/위치 내에서 센서 번호(예: 센서 1 또는 센서 2)를 나타냅니다.'
    motor_vehicle_oxygen_sensor_type:
      name: 차량용 산소 센서 유형
      description: 산소 센서의 디자인/기술을 지정합니다.
    motor_vehicle_paint_application_method:
      name: 차량용 페인트 도포 방법
      description: 차량 표면에 페인트를 어떻게 도포해야 하는지를 나타냅니다.
    motor_vehicle_paint_system_step:
      name: 차량용 도장 시스템 단계
      description: '제품이 자동차 재도장 페인트 시스템의 어느 단계 또는 구성 요소에 사용되는지를 나타냅니다(예: 프라이머, 베이스코트,
        클리어코트).'
    motor_vehicle_speaker_mounting_type:
      name: 차량용 스피커 장착 유형
      description: 스피커가 차량 내부에 어떻게 설치되는지(장착 형태)를 나타냅니다.
    motor_vehicle_subwoofer_size:
      name: 자동차 서브우퍼 크기
      description: '차량 내부 공간 및 인클로저 호환성을 맞추기 위해 사용되는 서브우퍼 드라이버의 공칭 직경(예: 8인치, 10인치,
        12인치).'
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: 자동차 서브우퍼 보이스 코일 구성
      description: '앰프 배선 옵션(예: SVC 대 DVC)에 맞춰 사용되는 보이스 코일 개수/구성.'
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: 자동차 서브우퍼 보이스 코일 임피던스(코일당)
      description: 최종 배선 부하가 아닌 개별 보이스 코일의 임피던스 정격 규격이며, 배선 계산에 사용됩니다.
    motor_vehicle_voltage_regulator_type:
      name: 차량용 전압 조정기 유형
      description: 자동차에 사용되는 조정기 기술/형태를 나타냅니다.
    motorcycle_armor_certification_standard:
      name: 오토바이 보호대 인증 표준
      description: '보호 장비가 충족하도록 인증된 공식 안전 표준을 나타냅니다(예: 척추/등 보호대의 경우 EN 1621-2, 가슴
        보호대의 경우 EN 1621-3).'
    motorcycle_cover_size_class:
      name: 오토바이 커버 크기  등급
      description: 일반적인 오토바이 차종/길이 범위에 맞춰 제작된 표준 사이즈의 오토바이 커버 보관용 버킷.
    motorcycle_glove_certification_standard:
      name: 오토바이 장갑 인증 표준
      description: '장갑이 준수하는 보호 인증/표준(예: EN 13594 등급)을 지정합니다.'
    motorcycle_glove_waterproof_construction:
      name: 방수 기능이 있는 오토바이 장갑
      description: 장갑에 사용된 방수 방법의 종류(있는 경우)를 지정합니다.
    motorcycle_guard_coverage_area:
      name: 오토바이 가드 커버 범위
      description: 제품이 주로 커버하는 부위(팔꿈치, 손목, 팔뚝, 혼합형).
    motorcycle_kidney_belt_construction_type:
      name: 오토바이 허리 보호대 구조 유형
      description: 강성, 통기성 및 보호 성능에 영향을 미치는 허리 보호대의 구조적 형태.
    motorcycle_kidney_belt_purpose:
      name: 오토바이 허리 보호대 용도
      description: 오토바이 허리 보호대가 설계된 주요 주행 스타일 또는 시나리오를 식별합니다.
    motorcycle_luggage_capacity_class:
      name: 오토바이 수하물 적재 용량 등급
      description: 오토바이 수하물의 용량을 리터 단위로 나타냅니다.
    motorcycle_luggage_mounting_system:
      name: 오토바이 수하물 장착 시스템
      description: '가방/패니어를 오토바이에 고정하는 데 사용되는 부착/장착 시스템(예: 걸이형 스트랩, 랙 장착형 퀵 릴리스).'
    motorcycle_luggage_side:
      name: 오토바이 수하물 장착 방향
      description: 패니어/새들백의 경우, 품목이 좌측용인지, 우측용인지, 아니면 한 쌍(세트)인지를 나타냅니다.
    motorcycle_protective_gear_size_system:
      name: 오토바이 보호 장비 사이즈 체계
      description: '제품에 사용된 사이즈 체계를 나타냅니다(예: 알파벳 사이즈, 숫자 사이즈, 원 사이즈).'
    motorcycle_rack_carrier_style:
      name: 오토바이 장착업체 스타일
      description: 오토바이 또는 스쿠터를 운송하는 데 사용되는 기능적인 운송업체 방식을 설명합니다(플랫폼, 레일, 리프트 보조 방식
        등).
    motorcycle_riding_discipline:
      name: 오토바이 주행 종목
      description: 해당 넥 브레이스가 어떤 주행/사용 목적에 맞추어 설계되었는지 나타냅니다.
    motorcycle_tire_speed_rating:
      name: 오토바이 타이어 속도 등급
      description: '표준 문자 코드(예: H, V, W)를 사용하여 타이어가 견딜 수 있는 최고 지속 속도를 식별합니다.'
    motorsport_window_net_certification:
      name: 모터스포츠 윈도우 네트 인증
      description: '해당하는 경우 규격 번호를 포함하여 윈도우 네트가 충족하는 레이싱 안전 인증 또는 호몰로게이션을 나타냅니다(예:
        SFI, FIA).'
    mound_usage_type:
      name: 마운드 사용 유형
      description: 연습용, 경기용, 불펜용, 다목적용 등 마운드의 사용 목적을 식별합니다.
    mount_attachment_method:
      name: 마운트 부착 방식
      description: 마운트가 차량 표면/구조물에 부착되는 방식을 지정합니다.
    mountainboard_truck_type:
      name: 마운틴보드 트럭 유형
      description: 회전 반응성과 내구성에 영향을 미치는 보드 포함 트럭의 스타일을 분류합니다.
    mounting_attachment_method:
      name: 장착/부착 방식
      description: 홀더/가방이 드럼, 스탠드, 벨트 또는 기타 표면에 부착되도록 설계된 방식입니다.
    mounting_attachment_type:
      name: 장착/부착 유형
      description: 비율 조절 장치가 물레에 어떻게 부착되거나 연결되는지 나타냅니다.
    mounting_hardware_included_for_installation:
      name: 장착 하드웨어 포함(설치용 )
      description: '뒷좌석 설치에 필요한 장착 하드웨어(예: 브래킷, 볼트, 레일)가 제품에 포함되어 있는지 여부를 나타냅니다.'
    mounting_location:
      name: 장착 위치
      description: '조명/반사판을 장비나 신체의 어느 부위에 장착하도록 설계했는지 지정합니다(예: 프론트 포크, 헬멧, 휠 스포크).'
    mounting_method:
      name: 장착 방식
      description: '스틱/브러시 홀더를 장착하거나 부착하는 방법(예: 클램프형, 스트랩형, 접착식).'
    mounting_position:
      name: 장착 위치
      description: 차량 내부에서 핸드브레이크 제어 장치가 장착/설치될 위치를 지정합니다.
    mounting_rail_type:
      name: 장착 레일 유형
      description: '액세서리가 부착되는 레일 또는 인터페이스 표준을 지정합니다(예: 피카티니 또는 M-LOK).'
    mounting_receiver_size:
      name: 장착 수신기 크기
      description: 히치 장착형 카고 랙에 필요한 리시버 히치 크기.
    mounting_storage_type:
      name: 장착/보관 유형
      description: 장비가 선박이나 신체에 어떻게 장착되거나 보관되도록 설계되었는지 나타냅니다.
    mouth_grip_type:
      name: 마우스 그립 유형
      description: 착용감과 위생을 고려한 휘슬 마우스 그립 또는 보호 가드의 형태를 설명합니다.
    mouthguard_mold_type:
      name: 마우스가드 몰드 유형
      description: '마우스가드를 운동선수의 치아에 맞추는 방법을 설명합니다(예: 뜨거운 물에 데워 성형하는 방식, 치과용 맞춤 성형
        방식).'
    mouthpiece_facing_length:
      name: 마우스피스 페이싱 길이
      description: 반응성, 저항감, 리드 호환성에 영향을 미치는 마우스피스 페이싱(곡면 부위)의 길이 범주를 나타냅니다(마우스피스의
        전체 길이 제외).
    mouthpiece_material:
      name: 마우스피스 재질
      description: 본체 재질과 다를 수 있는 파티 멜로디 파이프의 마우스피스/팁 부분 재질을 지정합니다.
    mouthpiece_shank_receiver_size:
      name: 마우스피스 섕크/리시버 크기
      description: 플루겔혼과 호환되는 마우스피스 리시버/섕크 표준을 지정합니다.
    mouthpiece_shank_size:
      name: 마우스피스 섕크 크기
      description: 해당 금관악기와의 호환성을 보장하기 위해 마우스피스 섕크/리시버의 장착 표준을 지정합니다.
    mouthpiece_shank_type:
      name: 마우스피스 섕크 유형
      description: 해당하는 경우, 호환성을 위해 마우스피스 리시버/섕크 표준을 지정합니다.
    mouthpiece_style:
      name: 마우스피스 스타일
      description: 압박 점, 자극 강도, 말의 선호도에 영향을 미치는 연갈기 마우스피스 부분의 디자인/모양을 분류합니다.
    mouthpiece_type:
      name: 마우스피스 유형
      description: 바람을 불어넣는 끝단 부분의 마우스피스 유형(일체형, 분리형 또는 추가 장착형 스타일).
    movement_mechanism:
      name: 유동 메커니즘
      description: 사용 중 벤치의 움직임 방식을 정의합니다(스윙형, 글라이딩형, 흔들형 등).
    muffin_size:
      name: 머핀 크기
      description: '머핀 제품의 물리적 크기 형식을 분류합니다(예: 미니, 표준, 점보).'
    mushroom_variety:
      name: 버섯 품종
      description: '제품에 포함된 버섯 또는 트러플의 특정 종이나 품종을 식별합니다(예: 표고버섯, 새송이버섯, 블랙 트러플).'
    music_stand_desk_tilt_adjustment:
      name: 악보대 책상 각도 조절
      description: 책상 각도 조절 가능 여부 및 조절 방식을 나타냅니다.
    music_stand_intended_use:
      name: 악보대 권장 용도
      description: 스탠드의 주요 권장 설정/사용 사례를 나타냅니다.
    musical_block_pitch_type:
      name: 음악 블록 피치 유형
      description: 해당 악기 블록이 일정한 음높이(조율된)를 내는지 아니면 불확실한 음높이를 내는지 설명합니다.
    musical_box_mechanism_type:
      name: 뮤직박스 메커니즘 유형
      description: '뮤직박스가 소리를 내거나 연주하는 방식(예: 태엽식 vs 전자식 재생).'
    musical_keyboard_case_fit_type:
      name: 악기 키보드 케이스 핏 유형
      description: '케이스가 악기 크기에 어떻게 맞춰져 있는지 설명합니다(예: 범용/일반 사이즈 범위 vs. 모델별/맞춤형 핏).'
    musical_ratchet_sound_character:
      name: 뮤지컬 래칫 사운드 특성
      description: 래칫의 음색/음량 특성에 대한 일반적인 설명.
    musical_scraper_groove_surface_material:
      name: 뮤지컬 스크레이퍼 홈 표면 재질
      description: 홈이 파인 스크래핑 표면의 재질을 지정합니다(본체 재질과 다를 수 있음).
    musical_scraper_type:
      name: 뮤지컬 스크레이퍼 유형
      description: '소리와 연주 기법에 영향을 미치는 악기 스크레이퍼의 스타일/디자인(예: 귀로 vs 레코레코)을 지정합니다.'
    mute_attachment_method:
      name: 뮤트 부착 방식
      description: '심벌즈 뮤트를 심벌즈에 부착하거나 고정하는 방법(예: 젤, 정전기 부착식, 자석식, 클립형)을 지정합니다.'
    mute_attenuation_level:
      name: 뮤트 감쇠 레벨
      description: 뮤트 기능이 체감 음량을 얼마나 줄이는지를 나타내며, 특히 연습용 뮤트 장치에 유용합니다.
    mute_cork_padding_material:
      name: 뮤트 코르크/패딩 소재
      description: '그립감/착용감 및 벨 보호에 사용되는 뮤트의 접촉면 패딩(예: 코르크 스트립/패드)의 재질을 지정합니다.'
    mute_coverage_type:
      name: 뮤트 커버리지 유형
      description: 작은 부분 소음기부터 전체 표면을 덮는 연습용 뮤트까지, 연주면에서 뮤트를 사용하는 형태/범위를 나타냅니다.
    mute_finish:
      name: 뮤트 마감
      description: '내구성과 미관에 영향을 미칠 수 있는 뮤트의 표면 마감 상태(예: 유광 vs 새틴).'
    name_label_text_template:
      name: 이름 레이블 텍스트 템플릿
      description: '이름 레이블에 인쇄될 사전 설정 텍스트 또는 템플릿을 지정합니다(예: ''소유자'', ''제작자'').'
    napkin_ply:
      name: 냅킨 겹 수
      description: 칵테일 냅킨의 두께를 겹 수(플라이)로 나타냅니다.
    neck_brace_fit_system:
      name: 목 보호대 착용 시스템
      description: 라이더에게 목 보호대를 조절하고 고정하는 데 사용되는 주요 방법을 나타냅니다.
    neck_brace_size_basis:
      name: 목 보호대 크기 기준
      description: 목 보호대 사이즈를 선택하는 데 사용되는 사이즈 기준을 나타냅니다.
    neck_configuration:
      name: 네크라인 구성
      description: 색소폰과 함께 제공되는 넥 스타일/구성을 명시하며, 이는 인체공학적 설계와 연주성에 영향을 미칩니다.
    neck_coverage_type:
      name: 목 가림막 유형
      description: 담요와 함께 제공되는 목 부분 커버 스타일을 지정합니다.
    neck_support_size_system:
      name: 목 보호대 사이즈 체계
      description: '레이싱용 목 지지대/보호대에 사용되는 사이즈 체계(예: 성인용, 청소년용 또는 원사이즈)를 나타냅니다.'
    necklace_length_type:
      name: 목걸이 길이 타입
      description: 스타일별 쇼핑을 돕기 위해 초커 또는 오페라 목걸이와 같은 일반적인 목걸이 길이 범주를 명시합니다.
    needle_balance_zone:
      name: 나침반 바늘 밸런스 구역
      description: 나침반 바늘이 조정된 자기 균형 구역 또는 반구를 나타내며, 전 세계 어디에서나 정확한 측정값을 보장합니다.
    needle_case_format:
      name: 바늘 케이스 형식
      description: 바늘 케이스의 전반적인 구성 형태를 나타냅니다.
    needle_damping_type:
      name: 바늘 감쇠 방식
      description: '나침반 바늘의 안정화 방식(예: 액체 충전식, 건식 또는 전자식 안정화)에 대해 설명하며, 이는 안정화 시간 및
        내구성에 영향을 미칩니다.'
    needle_felting_needle_profile:
      name: 니들펠팅 바늘 프로필
      description: 펠팅 바늘의 단면/프로필은 섬유의 이동 방식과 완성된 마감에 영향을 미칩니다.
    needle_holder_features:
      name: 바늘꽂이 특징
      description: 바늘 홀더의 주요 기능적 특징을 나타냅니다.
    needle_holder_mounting_attachment_method:
      name: 바늘꽂이 장착/부착 방법
      description: '보관 시 바늘꽂이를 부착하거나 사용하는 방법을 나타냅니다(예: 자석, 클립, 끈).'
    needle_holder_style:
      name: 바늘 홀더 스타일
      description: 바늘꽂이의 보관 또는 휴대 방식/디자인을 나타냅니다.
    needle_pushing_surface_type:
      name: 바늘 밀기 표면 유형
      description: '재봉용 손바닥 보호대의 바늘 밀기 표면 종류/디자인을 나타냅니다(예: 금속 홈, 동전 모양 또는 보강 패치).'
    needle_requirement_beading_pattern:
      name: 바늘 필요량 (구슬 장식 패턴)
      description: 도안에서 권장하는 바늘 종류/사이즈.
    needle_size_system:
      name: 바늘 크기 시스템
      description: 바늘 크기 표기에 사용되는 사이즈 표준을 나타냅니다.
    needle_threader_compatible_needle_type:
      name: 바늘귀 실 끼우개 호환 바늘 종류
      description: 실 끼우개와 호환되는 바늘 종류(바늘 종류/용도별)를 지정합니다.
    needle_threader_mechanism_type:
      name: 실 끼우개 메커니즘 유형
      description: 바늘귀에 실을 끼우는 방법을 설명합니다.
    needle_threader_packaging_type:
      name: 바늘귀 실 끼우개 포장 유형
      description: 제품의 판매/포장 방식을 나타냅니다(단품, 멀티팩, 세트 등).
    needlecraft_fabric_color_family:
      name: 자수용 원단 색상 계열
      description: 이븐위브 원단의 정규화된 색상 계열을 나타냅니다(패싯 처리용 색상과 함께 사용됩니다).
    needlecraft_fabric_composition:
      name: 자수용 원단 구성
      description: '자수용 원단의 섬유 구성/혼합 비율을 명시합니다(예: 100% 면, 린넨/면 혼방).'
    needlecraft_fabric_weave_type:
      name: 자수용 원단 직조 유형
      description: '바느질용 리넨의 직조 방식/구조(예: 이븐위브, 전통 리넨)를 지정하며, 바느질 특성과 외관에 영향을 미칩니다.'
    needlecraft_kit_items_included:
      name: 바느질 키트 포함 품목
      description: 바느질 키트에 포함된 주요 구성품(도구 및 소모품)을 나열합니다.
    needlecraft_kit_project_type:
      name: 바느질 키트 프로젝트 유형
      description: 키트로 만들 수 있는 완성품, 즉 프로젝트 결과물을 식별합니다.
    needlecraft_stitching_coverage:
      name: 바느질 스티치 범위
      description: 원단이 1칸당 1가닥 또는 2가닥 기준으로 박음질되었는지 여부를 나타냅니다.
    needlepoint_canvas_mesh_count:
      name: 니들포인트 캔버스 메시 수
      description: 도안에 맞춰 의도된 캔버스 메시/카운트, 즉 인치당 실 수를 나타냅니다. 일반적으로 캔버스 카운트라고 합니다.
    needlepoint_frame_canvas_attachment_method:
      name: 니들포인트 프레임 캔버스 부착 방법
      description: 니들포인트 캔버스를 니들포인트 프레임에 고정하는 방법을 설명합니다.
    needlepoint_frame_compatible_stand_type:
      name: 니들포인트 프레임 호환 스탠드 유형
      description: 프레임이 스탠드에 장착되도록 설계된 경우, 호환되는 스탠드 유형을 명시합니다.
    needlepoint_frame_contents:
      name: 니들포인트 프레임 구성품
      description: '니들포인트 프레임에 포함된 구성품 및 액세서리를 명시합니다(예: 프레임, 추가 막대/봉, 압정/핀, 미끄럼 방지
        스트립, 휴대용 가방).'
    needlepoint_frame_tension_adjustment_type:
      name: 니들포인트 프레임 장력 조절 유형
      description: 사용 중 프레임의 장력을 조절할 수 있는지 여부 또는 조절 방식을 나타냅니다.
    needlepoint_pattern_chart_format:
      name: 니들포인트 패턴 차트 형식
      description: 니들포인트 디자인이 스티칭용으로 표현되는 방식을 나타냅니다(도표형 또는 인쇄/채색 가이드).
    needlepoint_project_type:
      name: 니들포인트 프로젝트 유형
      description: 니들포인트 디자인이 사용될 완성품/카테고리를 나타냅니다.
    net_design:
      name: 넷 디자인
      description: 네트의 구조 방식을 나타내며, 휴대성을 위해 접거나 펼칠 수 있는지 여부를 표시합니다.
    net_mesh_pattern:
      name: 그물망 패턴
      description: 그물망 개구부의 기하학적 형태를 지정하며, 이는 가시성과 강도에 영향을 미칠 수 있습니다.
    net_twine_gauge:
      name: 그물끈 게이지
      description: '그물끈의 굵기 또는 강도를 나타내며, 전통적으로 게이지 번호(예: 18, 36)로 표시됩니다.'
    nicotine_source:
      name: 니코틴 추출원
      description: 제품에 함유된 니코틴이 담배 유래인지, 합성 니코틴인지, 또는 니코틴이 함유되어 있지 않은지를 나타냅니다.
    nipple_drive_interface:
      name: 니플 드라이브 인터페이스
      description: 니플의 드라이브 인터페이스 또는 헤드 스타일/표준(외부 또는 내부)을 식별하여, 필요한 공구와 휠 조립 방식을 결정합니다.
    nock_activation_method:
      name: 노크 활성화 방법
      description: '조명이 들어오는 화살 노크의 LED가 켜지거나 꺼지는 메커니즘을 명시합니다(예: 활시위 압력, 모션 센서, 수동
        스위치).'
    nock_fitment_code:
      name: 노크 장착 코드
      description: 노크가 속한 제품군/시리즈를 식별하는 제조업체 또는 업계 코드를 나타냅니다.
    nock_throat_size:
      name: 노크 홈 크기
      description: 활시위에 끼워지는 노크 홈의 크기를 지정합니다.
    nock_transparency_level:
      name: 노크 투명도 수준
      description: 노크 소재가 얼마나 비쳐 보이는지(투명, 반투명, 불투명, 야광 등)를 설명하며, 이는 가시성과 미관에 영향을 미칩니다.
    nock_type:
      name: 노크 유형
      description: '화살이나 볼트에 사용되는 노크 디자인을 지정합니다(예: 핀형, 반달형, 발광형).'
    noise_reduction_type:
      name: 소음 감소 유형
      description: 해당되는 경우, 헬멧 내장형 헤드셋에 사용된 또는 사용되지 않은 소음 감소 기술을 명시합니다.
    noise_suppression_technology:
      name: 소음 억제 기술
      description: 제품이 큰 소리를 줄이는 수동 감쇠 기능 또는 큰 소리를 압축하거나 주변 소리를 증폭하는 능동 전자 회로를 사용하는지
        여부를 명시합니다.
    non_slip_base_features:
      name: 미끄럼 방지 베이스 특징
      description: 연주 중 페달이 움직이지 않도록 하는 미끄럼 방지 기능이 포함되어 있는지 나타냅니다.
    nose_bridge_type:
      name: 코받침 유형
      description: 코받침의 디자인을 나타내며, 다양한 얼굴 크기에 따른 착용감에 영향을 미칩니다.
    nose_clip_accessories_included:
      name: 코 클립 액세서리 포함
      description: '수영용 코마개와 함께 제공되는 추가 액세서리(예: 귀마개, 보관 케이스) 목록을 나열합니다.'
    nose_clip_features:
      name: 코 클립 특징
      description: 코 클립의 일반적인 기능 또는 편의성 특징을 강조합니다.
    nose_coverage_style:
      name: 코 커버 스타일
      description: 플라이 마스크에 코 또는 주둥이 보호 패널이 있는지 여부와 그 유형을 나타냅니다.
    noseband_type:
      name: 코밴드형
      description: 굴레와 함께 제공되는 코밴드가 있는 경우, 그 디자인을 명시합니다.
    number_of_canvas_meshes:
      name: 캔버스 메시 수
      description: 플라스틱 캔버스 시트의 메시 크기를 나타냅니다. 이는 인치당 구멍 수 또는 카운트로 표시되며, 스티치 크기와 프로젝트
        세부 표현을 결정합니다.
    number_of_chainrings:
      name: 체인링 개수
      description: 크랭크에 장착하도록 설계되었거나 함께 제공되는 체인링 개수를 나타냅니다.
    number_of_control_stations:
      name: 제어 스테이션 수
      description: '제어 세트에서 지원하는 조타/제어 스테이션 수를 나타냅니다(예: 단일 스테이션, 이중 스테이션).'
    number_of_digits:
      name: 자릿수
      description: '카운터에 표시되는 자릿수를 나타냅니다(예: 1자리, 2자리, 3자리).'
    number_of_guitar_slots:
      name: 기타 수납 슬롯 수
      description: 케이스/긱백이 수납하도록 설계된 기타 대수를 나타냅니다.
    number_of_needlecraft_fabrics:
      name: 바느질용 원단 수
      description: '바느질용 캔버스/원단의 원단 카운트를 나타내며, 일반적으로 인치당 칸/실 수로 표시됩니다(예: 14카운트).'
    number_of_plastic_canvas_meshes:
      name: 플라스틱 캔버스 메시 수
      description: 플라스틱 캔버스의 메시 수, 즉 인치당 구멍 수를 지정하며, 이는 스티치 크기와 프로젝트 세부 표현 수준을 결정합니다.
    number_of_quilting_frame_rails:
      name: 퀼팅 프레임 레일 수
      description: '퀼팅 프레임에 포함된 레일/롤러 수를 나타냅니다(예: 2레일 시스템, 3레일 시스템).'
    number_of_rope_slots:
      name: 로프 슬롯 개수
      description: 확보 장치가 싱글 로프용 또는 더블 로프용으로 설계되었는지 여부를 나타냅니다.
    number_of_switch_poles:
      name: 스위치 폴 수
      description: '스위치로 제어되는 개별 회로, 즉 극의 수를 나타냅니다(예: SPST, DPST).'
    number_of_switch_throws:
      name: 스위치 스로 수
      description: '극당 출력 경로, 즉 스로 수를 나타냅니다(예: SPDT).'
    number_of_timing_chain_rows:
      name: 타이밍 체인 열 수
      description: 타이밍 체인이 단열인지 다열인지 나타냅니다.
    number_of_trailer_axles:
      name: 트레일러 차축 수
      description: 트레일러의 차축 수를 나타냅니다.
    number_of_wheel_pieces:
      name: 휠 피스 수
      description: 휠이 1피스, 2피스 또는 3피스 구조인지 명시합니다.
    numbering_style:
      name: 번호 표시 방식
      description: '팀 식별을 위해 배번표에 사전 번호가 표시되어 있는지 여부와 그 방식을 나타냅니다(예: 번호 없음, 1~10,
        사용자 지정).'
    nunchuck_connector_type:
      name: 쌍절곤 커넥터 유형
      description: '두 쌍절곤 손잡이를 연결하는 방식입니다(예: 로프, 체인, 회전 체인).'
    nursing_access:
      name: 수유 접근성
      description: 의류가 수유 또는 유축을 위해 가슴 부분에 접근할 수 있도록 하는 방식을 명시합니다.
    nursing_access_type:
      name: 수유 접근 유형
      description: 수유 또는 유축을 위해 유방에 접근할 수 있는 방법을 명시합니다.
    nut_butter_texture:
      name: 견과류 버터 질감
      description: 견과류 버터의 물리적 질감을 설명하여 소비자가 부드러운 질감, 크런치한 질감 등을 쉽게 선택할 수 있도록 합니다.
    nutrient_fortification:
      name: 영양소 강화
      description: 강화된 주요 영양소를 식별합니다.
    oak_product_form:
      name: 오크 제품 형태
      description: 제품의 숙성/향미 부여에 사용되는 오크의 물리적 형태를 식별합니다.
    oak_toast_level:
      name: 오크 토스팅 정도
      description: 오크 제품의 토스팅 정도를 지정합니다.
    oboe_case_capacity:
      name: 오보에 케이스 수납 용량
      description: 케이스가 어떤 악기 및 주요 구성품을 수납하도록 설계되었는지 나타냅니다.
    oboe_case_carry_configuration:
      name: 오보에 케이스 휴대 방식
      description: 케이스/긱백의 주요 휴대 방식을 나타냅니다.
    oboe_case_design:
      name: 오보에 케이스 디자인
      description: '오보에 케이스 또는 기그백의 구조/강성(예: 하드, 세미 하드, 소프트)을 분류하여 보호 수준을 나타냅니다.'
    oboe_case_internal_fit_type:
      name: 오보에 케이스 내부 맞춤 유형
      description: 내부가 특정 악기 구성에 맞게 성형되어 있는지 또는 조절 가능한 칸막이를 사용하는지 여부를 나타냅니다.
    oboe_keywork_plating:
      name: 오보에 키워크 도금
      description: 오보에 본체 재질과 별도로, 오보에 키워크의 도금/마감 처리를 지정합니다.
    oboe_strap_padding:
      name: 오보에 스트랩 패딩
      description: '착용감을 위해 스트랩/지지대가 닿는 부위에 패딩이 있는지 여부와 패딩 유형을 설명합니다(예: 패딩 처리된 어깨/목
        부분).'
    oboe_swab_style:
      name: 오보에 스왑 스타일
      description: '오보에 청소용 스왑의 기능적 스타일/구조를 명시합니다(예: 당겨 쓰는 방식, 무게추가 달린 실크).'
    observation_window_material:
      name: 관찰창 재질
      description: 관찰 패널/창의 재질을 지정합니다. 이는 주로 선명도와 내구성에 영향을 미칩니다.
    ocarina_accessories_included:
      name: 오카리나 액세서리 포함
      description: '오카리나와 함께 제공되는 액세서리를 나열합니다(예: 케이스, 목걸이 스트랩, 운지표).'
    ocarina_chamber_count:
      name: 오카리나 챔버 수
      description: '인라인 오카리나의 챔버 수를 나타내며, 이는 음역과 연주 난이도에 영향을 미칩니다(예: 싱글, 더블, 트리플).'
    ocarina_fingering_system:
      name: 오카리나 운지법 시스템
      description: 해당되는 경우, 펜던트 오카리나가 따르는 운지법/표준을 지정합니다.
    ocarina_finish_type:
      name: 오카리나 마감 유형
      description: 오카리나 몸체의 표면 마감으로, 촉감과 미관에 영향을 미칩니다.
    occupant_classification_sensor_support:
      name: 탑승자 분류 센서 지원
      description: 시트에 탑승자 분류/중량 센서가 포함되어 있는지, 또는 OEM 센서를 이식/설치할 수 있도록 되어 있는지 여부를
        나타냅니다. 일반적으로 앞좌석 승객용입니다.
    octave_harmonica_cover_plate_material:
      name: 옥타브 하모니카 커버 플레이트 소재
      description: 옥타브 하모니카 외부 커버 플레이트의 재질을 나타냅니다.
    octave_harmonica_tuning_system:
      name: 옥타브 하모니카 튜닝 시스템
      description: 옥타브 하모니카에 사용되는 조율/음률을 나타냅니다.
    octoban_mounting_system_type:
      name: 옥토반 장착 시스템 유형
      description: 연주 중 옥토반을 장착하거나 배치하는 방식을 나타냅니다(마운트/브래킷/스탠드 구성).
    odor_control_features:
      name: 냄새 제어 기능
      description: 해당 제품이 냄새 중화/탈취 기능을 제공하는지 여부와 그 방식을 나타냅니다.
    office_furniture_items_included:
      name: 사무용 가구 품목 포함
      description: 책상이나 서류함 등 세트에 포함된 특정 사무용 가구 품목을 식별합니다.
    oil_cooler_core_type:
      name: 오일 쿨러 코어 유형
      description: 오일 쿨러의 내부 코어 구조를 명시하며, 이는 냉각 효율, 압력 강하 및 내구성에 영향을 미칩니다.
    oil_cooler_mounting_style:
      name: 오일 쿨러 장착 방식
      description: 차량에 오일 쿨러를 장착/설치하는 방법에 대해 설명합니다.
    oil_dipstick_component_type:
      name: 오일 딥스틱 구성품 유형
      description: '판매되는 오일 레벨 측정 구성품의 종류를 명시합니다(예: 딥스틱 날/막대만, 핸들만, 완전 조립품, 딥스틱 튜브
        등).'
    oil_dipstick_measurement_markings:
      name: 오일 딥스틱의 측정 눈금
      description: 오일 레벨을 읽기 위해 딥스틱에 표시된 눈금/스케일을 명시합니다.
    oil_dipstick_tube_mounting_type:
      name: 오일 딥스틱 튜브 장착 유형
      description: 오일 딥스틱 튜브가 엔진 또는 엔진 블록에 고정되거나 장착되는 방식을 명시합니다.
    oil_drain_plug_head_drive_type:
      name: 오일 배출 플러그 헤드 드라이브 유형
      description: 오일 드레인 플러그 헤드의 설치 및 제거에 사용되는 공구 결합 인터페이스를 지정합니다.
    oil_drain_plug_magnet_type:
      name: 오일 배출 플러그 자석 유형
      description: 드레인 플러그가 자석식인지 여부와, 자석식인 경우 그 스타일을 명시합니다.
    oil_fill_cap_type:
      name: 오일 주입 캡 유형
      description: 해당되는 경우, 밸브 커버에 사용되는 오일 주입 캡 인터페이스의 스타일/유형을 나타냅니다.
    oil_filler_cap_attachment_type:
      name: 오일 주입구 캡 부착 유형
      description: '오일 주입 캡이 엔진/오일 주입구에 고정되는 방식을 지정합니다(예: 나사식, 베이오넷/쿼터턴, 프레스핏).'
    oil_filler_cap_installation_position:
      name: 오일 주입구 캡 설치 위치
      description: '오일 주입구가 여러 개인 경우, 캡이 사용되는 위치를 지정합니다(예: 밸브 커버, 원격 주입 튜브).'
    oil_filler_cap_locking_type:
      name: 오일 필러 캡 잠금 유형
      description: '오일 주입구 캡이 비잠금식인지 또는 잠금/보안 제거 방식(예: 키 방식 또는 공구 필요)을 사용하는지 명시하여
        변조, 도난 또는 우발적인 열림을 방지합니다.'
    oil_filler_cap_tether_type:
      name: 오일 필러 캡 연결 끈 유형
      description: 오일 주입구 캡이 분실 방지를 위해 끈이나 고정 장치로 연결되어 있는지 여부와 사용된 고정 방식의 유형을 명시합니다.
    oil_filler_cap_venting_type:
      name: 오일 주입구 캡 통풍 유형
      description: 해당되는 경우, 캡에 통풍 기능이 있는지 여부와 통풍 메커니즘을 명시합니다.
    oil_filter_style:
      name: 오일 필터 방식
      description: 엔진의 필터 마운트와 호환되도록 오일 필터의 형태와 장착/설치 방식을 지정합니다.
    oil_pan_baffle_windage_features:
      name: 오일 팬 배플/윈디지 기능
      description: 오일 팬에 포함된 내부 오일 제어 기능을 나타냅니다.
    oil_pan_finish_coating:
      name: 오일팬 마감/코팅
      description: '오일 팬의 표면 마감 또는 코팅을 설명합니다(예: 도장, 분체 도장, 도금, 무도장 등).'
    oil_pressure_sensor_function_type:
      name: 오일 압력 센서 기능 유형
      description: 해당 부품이 게이지/ECU용 가변 출력 오일 압력 송신기인지, 또는 경고등을 작동시키는 온/오프식 오일 압력 스위치인지
        나타냅니다.
    oil_pressure_sensor_signal_output_type:
      name: 오일 압력 센서 신호 출력 유형
      description: 오일 압력 센서/송신기에서 생성되는 전기 출력/신호 방식을 지정합니다.
    oil_processing_method:
      name: 오일 가공 방식
      description: '오일의 생산 또는 정제 방식(예: 냉압착, 엑스트라 버진, 정제유)을 명시하며, 이는 맛, 영양 및 적합한 조리
        용도에 영향을 미칩니다.'
    oil_pump_drive_method:
      name: 오일 펌프 구동 방법
      description: 엔진 내부의 오일 펌프를 구동하는 요소를 나타냅니다.
    oil_pump_mounting_style:
      name: 오일 펌프 장착 방식
      description: '오일 펌프가 엔진 내 어디에, 어떤 방식으로 장착되는지 지정합니다(예: 내부 장착, 외부/원격 장착, 커버 장착,
        오일 팬 장착).'
    oil_system_connection_thread_standard:
      name: 오일 시스템 연결 나사산 표준
      description: '설치/호환성을 위해 부품의 오일 시스템 인터페이스에 사용되는 나사산/연결 표준을 지정합니다(예: M12×1.5,
        1/8-27 NPT, BSPP).'
    oil_viscosity_grade:
      name: 오일 점도 등급
      description: 공예 장비용 스피닝 오일의 상대적인 점도를 설명합니다. 자동차용 SAE 등급은 아닙니다.
    okra_variety:
      name: 오크라 품종
      description: '제공되는 오크라의 특정 재배 품종 또는 시장 품종을 식별합니다(예: Clemson Spineless, Red Burgundy,
        Baby Okra).'
    olfactory_arts_material_form:
      name: 후각 예술 소재 형태
      description: 판매되는 제품의 물리적 형태를 명시합니다.
    olfactory_arts_tool_kit_content:
      name: 후각 예술 도구 콘텐츠 키트 구성품
      description: 제품이 양초/인센스/향수 제작용 키트 또는 세트로 판매될 때 포함되는 구성품을 나열합니다.
    olive_variety:
      name: 올리브 품종
      description: 사용된 올리브 품종을 명시하며, 이는 맛, 질감, 색상 및 지역적 고유성에 영향을 미칩니다.
    onion_variety:
      name: 양파 품종
      description: 소비자가 선호하는 색상, 맛, 용도에 맞는 양파를 빠르게 찾을 수 있도록 특정 양파 유형을 명시하는 동시에, 판매자가
        제품을 정확하게 등록할 수 있도록 합니다.
    opacity_level:
      name: 불투명도 수준
      description: 원단이 얼마나 비치는지 또는 불투명한지를 나타냅니다.
    operating_modes:
      name: 작동 모드
      description: 레이저 조명이 지원하는 기본 내장 효과/동작 모드를 나타냅니다.
    operating_voltage:
      name: 작동 전압
      description: 인젝터가 사용하도록 설계된 공칭 시스템 전압을 지정합니다.
    optical_toy_features:
      name: 광학 장난감 특징
      description: 장난감이 만들어내는 주요 시각적/광학적 효과를 강조합니다.
    orchestral_string_core_material:
      name: 오케스트라 현 코어 소재
      description: 현 코어의 구성 재료를 명시하며, 이는 감촉, 반응성 및 음색에 큰 영향을 미칩니다.
    orchestral_string_end_type:
      name: 오케스트라 현 끝부분 유형
      description: 현의 테일피스 쪽 끝부분 부착 방식을 지정합니다.
    orchestral_string_included_strings:
      name: 오케스트라 현악기 포함 현
      description: 팩에 포함된 특정 현을 나열합니다. 악기별로 다를 수 있습니다.
    orchestral_string_instrument_fitting_part_type:
      name: 관현악 현악기 부속품/부품 유형
      description: '제품이 어떤 종류의 부속품/부품인지 명시합니다(예: 브리지, 테일피스, 턱받침).'
    orchestral_string_instrument_mute_type:
      name: 오케스트라 현악기 뮤트 유형
      description: '관현악 현악기 뮤트의 기능 유형(예: 연습/호텔용, 연주/콘서트용) 및/또는 일반적인 디자인 방식을 지정합니다.'
    orchestral_string_instrument_part_position:
      name: 관현악 현악기 부품 위치
      description: 해당 부품이 악기의 어느 위치에 속하는지 나타냅니다. 부품이 상단/하단 또는 좌측/우측 변형으로 제공될 때 유용합니다.
    orchestral_string_winding_material:
      name: 오케스트라 현 권선 소재
      description: 현에 사용된 외부 권선/랩 재료를 지정합니다.
    organza_finish_sheen:
      name: 오간자 마감/광택
      description: 오간자의 표면 외관을 설명합니다(무광, 유광, 무지갯빛 효과 등).
    organza_ribbon_transparency_level:
      name: 오간자 리본의 투명도 수준
      description: 오간자 리본이 얼마나 비쳐 보이는지 설명합니다.
    organza_transparency_level:
      name: 오간자 투명도 수준
      description: 오간자 원단을 한 겹으로 놓았을 때 얼마나 비치는지 설명합니다.
    origami_paper_shape:
      name: 종이접기 용지 모양
      description: 접기에 사용되는 용지 모양을 지정합니다.
    origami_paper_sidedness:
      name: 종이접기 용지 양면성
      description: 종이접기 용지의 양면 색상/무늬가 동일한지 또는 서로 다른지 나타냅니다.
    ostrich_feather_part:
      name: 타조 깃털 부위
      description: '타조 깃털의 종류/부위(예: 장식 깃털, 일반 깃털)를 식별하며, 이는 부드러움, 밀도 및 일반적인 공예 용도에
        영향을 미칩니다.'
    outboard_motor_shaft_type:
      name: 선외 모터 샤프트 유형
      description: 선외기에 사용되는 표준 샤프트 길이 등급을 나타냅니다. 해양 산업에서 사용되는 라벨 형식입니다.
    outboard_motor_steering_type:
      name: 선외 모터 조향 유형
      description: '선외 모터에 사용되는 조향 인터페이스/메커니즘을 지정합니다(예: 틸러 또는 원격 조향 시스템).'
    outdoor_table_functionality:
      name: 야외 테이블 기능
      description: '단순한 테이블 상판을 넘어서는 특수 내장 기능을 식별합니다(예: 쿨러 수납칸, 수납 선반, 가스통 덮개, 파라솔
        받침대, 의자 연결부, 접이식 디자인, 수영장 내 안전 장치, 높이 조절, 통합 바퀴, LED 조명).'
    outerwear_length_type:
      name: 아우터 길이 유형
      description: 아우터 의류의 전체 길이를 표준 설명 범위로 분류합니다.
    outerwear_pieces_included:
      name: 아우터 구성품 포함
      description: 제품이 세트로 판매될 때 제공되는 의류 구성품을 나열합니다.
    outfit_attachment_mechanism:
      name: 의상 부착 방식
      description: '의상 또는 액세서리 부품을 인형에 부착하는 방법을 지정합니다(예: 탭, 접착제, 자석).'
    outfit_items_included:
      name: 의상 품목 포함
      description: '세트에 포함된 구체적인 의류 품목을 나열합니다(예: 바디수트, 반바지, 헤어밴드).'
    outlet_thread_type:
      name: 출구 나사산 유형
      description: '마스터 실린더 브레이크 라인 출구 포트에 사용되는 나사산 표준을 나타냅니다(예: 미터식 버블 플레어, SAE 역플레어).'
    output_jack_type_instrument:
      name: 출력 잭 유형(악기)
      description: 일렉트릭 만돌린의 오디오 출력 잭 유형을 지정합니다.
    output_signal_type:
      name: 출력 신호 유형
      description: '센서에서 생성되는 전기 출력 동작/유형을 나타냅니다(예: NTC 서미스터 아날로그 저항).'
    outsole_marking_type:
      name: 밑창 표시 유형
      description: 신발 밑창이 코트 표면에 자국을 남기는지 여부를 나타냅니다. 이는 실내 라켓 스포츠에서 중요한 고려 사항입니다.
    outsole_material:
      name: 밑창 소재
      description: 신발 밑창에서 지면과 접촉하는 부분의 소재를 나타내며, 접지력, 유연성 및 내구성에 영향을 미칩니다.
    outsole_stud_type:
      name: 밑창 스터드 유형
      description: '선택한 경기 표면에서 접지력을 제공하는 밑창/클리트 구성을 설명합니다(예: 몰드형 클리트, 고무 러그, 잔디 돌기).'
    oven_bake_clay_formulation:
      name: 오븐 소성 점토 배합
      description: '오븐 소성 점토의 배합 계열을 식별합니다(예: 폴리머 점토, 레진 점토). 이는 취급성, 경화 거동 및 완성 후
        특성에 영향을 미칩니다.'
    oven_housing_configuration:
      name: 오븐 하우징 구성
      description: '캐비닛이 수용하도록 설계된 가전제품 배치를 정의합니다(예: 단일 오븐, 이중 오븐, 오븐·전자레인지 복합 제품).'
    overhead_mount_installation_method:
      name: 오버헤드 마운트 설치 방법
      description: 오버헤드 마운트가 차량에 고정되는 방식을 설명합니다(하드웨어/부착 방식).
    oversize_or_undersize_grade:
      name: 오버사이즈 또는 언더사이즈 등급
      description: 키트의 사이즈 등급을 OEM 표준 사이즈와 비교해 명시합니다(오버사이즈 피스톤/링 및/또는 언더사이즈 베어링).
    p_tex_application_method:
      name: 피텍스 도포 방식
      description: 스키 또는 스노보드 베이스에 P-Tex 소재를 적용하는 방법을 설명합니다.
    p_tex_form:
      name: P-Tex 형태
      description: 수리 재료가 제공되는 물리적 형태를 식별합니다.
    packability:
      name: 휴대성
      description: 사용하지 않을 때 조끼를 포장하거나 보관할 수 있는지 여부와 그 방식을 나타냅니다.
    packaging_format:
      name: 포장 형식
      description: 현을 포장/판매하는 방식을 나타냅니다(개별 봉투, 대량 포장 등).
    packaging_material:
      name: 포장 소재
      description: 물을 담는 병 또는 용기의 주요 소재를 명시합니다.
    packaging_type:
      name: 패키지 유형
      description: 소매 진열, 전시 또는 수집가용 보관을 위해 보블헤드가 포장되는 방식을 설명합니다.
    packing_medium:
      name: 포장 매체
      description: '용기 안의 과일을 보존하는 데 사용되는 액체 또는 매체를 나타냅니다(예: 물, 다양한 시럽, 주스, 소금물).'
    pad_components_included:
      name: 패드 구성품 포함
      description: '제품이 세트로 판매될 때 포함되는 구성품을 명시합니다(예: 무릎 보호대와 팔꿈치 보호대, 손목 보호대만).'
    pad_controller_additional_control:
      name: 패드 컨트롤러 추가 컨트롤
      description: '패드 외에 본체에 있는 추가 물리적 컨트롤의 유형을 나타냅니다(예: 노브, 페이더, 버튼).'
    pad_controller_performance_features:
      name: 패드 컨트롤러 연주 기능
      description: 연주와 표현적 제어를 위한 주요 패드 기능을 나타냅니다.
    pad_coverage_area:
      name: 패드 보호 영역
      description: 거들에 내장된 패드가 보호하는 신체 부위를 명시합니다.
    pad_material_or_technology:
      name: 패드 소재 또는 기술
      description: 패드에 사용된 독점 충격 흡수 기술 또는 브랜드 소재를 명시합니다.
    pad_mounting_or_holding_style:
      name: 패드 장착 또는 고정 방식
      description: 사용 중 패드가 어떻게 고정, 착용 또는 설치되는지 나타냅니다.
    pad_saver_style:
      name: 패드 세이버 스타일
      description: 패드와 내경을 건조하는 데 사용되는 패드 세이버의 물리적 방식/디자인을 나타냅니다.
    pad_shape:
      name: 패드 모양
      description: '패드의 타격면 또는 전체 본체의 기하학적 형태나 곡률을 정의합니다(예: 원형, 곡선형, 직사각형, 평면). 이를
        통해 사용자가 훈련 목표와 타격 유형에 맞는 패드를 선택할 수 있습니다.'
    pad_shell_type:
      name: 패드 쉘 유형
      description: '패드 외부 표면의 구조 방식을 분류합니다(예: 하드 쉘, 소프트 쉘, 내부 삽입물).'
    pad_style:
      name: 패드 방식
      description: 썰매와 함께 제공되는 패드의 유형 또는 디자인을 명시합니다.
    padding_layers:
      name: 패딩 레이어
      description: 충격 흡수를 위해 사용된 폼 레이어 수를 나타냅니다.
    padding_level:
      name: 패딩 수준
      description: 스트랩/지지대 접촉 부위(목/어깨/등)에 통합된 패딩의 양을 나타냅니다.
    padding_material:
      name: 패딩 소재
      description: 가방, 보호대, 장갑 및 더미 내부에서 충격을 흡수하는 내부 충전재 또는 패딩 물질을 지정합니다.
    paddle_ball_attachment_type:
      name: 패들볼 부착 유형
      description: 공이 패들에 어떻게 연결되는지 또는 연결되어 있지 않은지 지정합니다.
    paddle_leash_style:
      name: 패들 리쉬 방식
      description: 패들 리쉬 코드의 방식 또는 디자인을 나타냅니다.
    paddle_shape:
      name: 패들 모양
      description: '패들 헤드/바디의 전체적인 실루엣을 정의하며(예: 표준형, 길쭉한 형태, 넓은 바디), 이는 리치, 스위트 스폿
        크기 및 조작성에 영향을 미칩니다.'
    paddleboard_intended_use:
      name: 패들보드 용도
      description: '보드가 제작된 주된 설계 목적 또는 활동을 분류합니다(예: 투어링, 요가, 레이싱).'
    paint_application_method:
      name: 페인트 도장 방식
      description: 제품을 캘리퍼에 적용하도록 의도된 주된 방식을 나타냅니다.
    paint_by_number_surface_type:
      name: 숫자 색칠 표면 유형
      description: '번호가 매겨진 디자인이 인쇄되는 표면을 나타냅니다(예: 캔버스, 종이, 나무 패널).'
    paint_medium_application_method:
      name: 페인트 미디엄 적용 방법
      description: 해당 미디엄을 적용하는 권장 방법을 나타냅니다.
    paint_medium_intended_effect:
      name: 페인트 미디엄의 의도된 효과
      description: '미디엄이 만들어내도록 의도된 주요 결과를 포착합니다(예: 질감, 광택, 글레이징, 흐름성).'
    paint_safe_bristles:
      name: 도장면에 안전한 브러시 모
      description: 브러시 모가 자동차 도장면/클리어 코트에 사용해도 안전한 것으로 판매되는지 여부를 나타냅니다(스크래치 방지).
    paintable_surface:
      name: 도색 가능한 표면
      description: 종이 반죽 모양물이 프라이머/실링 처리 등 별도 준비 작업 없이 바로 도색 가능한 상태인지, 또는 추가 준비 작업이
        필요한지 나타냅니다.
    paintball_caliber:
      name: 페인트볼 구경
      description: 페인트볼 또는 호환 장비의 직경/구경을 지정합니다.
    paintball_feed_system:
      name: 페인트볼 공급 시스템
      description: 페인트볼이 마커에 공급되는 방식을 정의합니다.
    paintball_fill_color:
      name: 페인트볼 충전재 색상
      description: 내부 마킹 충전재의 색상을 나타냅니다. 이 색상은 외피 색상과 다를 수 있으며, 충돌 후 남는 색상을 결정합니다.
    paintball_fill_type:
      name: 페인트볼 충전재 유형
      description: '충전재의 특수 배합 또는 특성을 설명합니다(예: 세척 가능, 야광, 파우더 등).'
    paintball_grade:
      name: 페인트볼 등급
      description: '성능 등급 또는 의도된 사용 수준을 설명합니다(예: 입문용, 필드용, 경기용, 겨울용).'
    paintball_mask_coverage_level:
      name: 페인트볼 마스크 커버리지 수준
      description: 페인트볼 고글 또는 마스크가 얼굴이나 머리의 어느 부위를 보호하는지 나타냅니다(고글만, 반안면, 전안면, 전두부).
    paintball_tank_valve_type:
      name: 페인트볼 탱크 밸브 유형
      description: 탱크에 있는 밸브 또는 레귤레이터 인터페이스를 설명합니다.
    painting_surface_priming_type:
      name: 도장면 프라이밍 유형
      description: 도장 표면의 프라이밍/코팅 유형을 지정합니다. 단순한 프라이밍/미프라이밍 여부를 넘어서는 분류로, 페인트 접착력과
        기법 호환성에 영향을 미칩니다.
    palette_knife_blade_edge_profile:
      name: 팔레트 나이프 날 가장자리 프로필
      description: 팔레트 나이프 날의 작업 가장자리 프로필을 설명합니다. 날카로움이 아니라 표시 형성과 혼합에 영향을 미치는 요소입니다.
    palette_knife_flexibility:
      name: 팔레트 나이프 유연성
      description: 팔레트 나이프 날의 강성/유연성을 설명합니다.
    palette_surface_finish:
      name: 팔레트 표면 마감
      description: 얼룩 방지와 세척 용이성에 영향을 미치는 혼합 표면의 마감/코팅을 설명합니다.
    palm_padding_level:
      name: 손바닥 패딩 수준
      description: 장갑 또는 그립 패드의 손바닥 부분에 있는 쿠션의 양을 설명합니다.
    palm_padding_type:
      name: 손바닥 패딩 유형
      description: '손바닥 쿠션에 사용된 소재 또는 구조를 나타냅니다(예: 젤, 폼, 이중층).'
    palm_wax_blend_readiness:
      name: 팜 왁스 블렌드 준비 상태
      description: 제품이 순수 팜 왁스인지, 아니면 특정 성능 특성을 위해 미리 혼합된 제형인지 여부를 나타냅니다.
    palm_wax_form:
      name: 팜 왁스 형태
      description: 판매되는 팜 왁스의 물리적 형태를 나타내며, 이는 계량 용이성, 용융 속도 및 취급성에 영향을 미칩니다.
    pan_flute_tuning_standard:
      name: 팬플루트 조율 표준
      description: '다른 악기와 함께 연주할 때 중요한 조율 기준 주파수를 나타냅니다(예: A4=440Hz).'
    pannier_configuration:
      name: 패니어 구성
      description: 제품이 단일 가방, 연결된 이중 가방 또는 한 쌍/3개 세트의 패니어로 판매되는지 여부를 나타냅니다.
    pannier_mounting_system:
      name: 패니어 장착 시스템
      description: 패니어를 자전거 랙 또는 프레임에 부착하는 데 사용되는 메커니즘을 정의하여 다양한 설정과의 호환성을 보장합니다.
    pant_cuff_style:
      name: 바지 밑단 방식
      description: '바지 발목 부분의 마감 또는 조정 방식을 나타냅니다(예: 신축성 있는 소맷단, 발목 지퍼, 트임 밑단).'
    pant_leg_conversion_type:
      name: 바지 다리 전환 유형
      description: 바지 다리를 다양한 길이로 전환하거나 조절할 수 있는지 여부와 그 방식을 나타냅니다.
    pantyhose_crotch_style:
      name: 팬티스타킹 가랑이 방식
      description: 가랑이 부분의 디자인을 정의하며, 일반 폐쇄형 가랑이, 오픈 크로치, 보강 거싯 버전으로 구분합니다.
    papaya_variety:
      name: 파파야 품종
      description: '파파야의 재배 품종 또는 시장 품종을 지정합니다(예: Solo, Maradol).'
    paper_and_magnetic_doll_format:
      name: 종이 및 자석 인형 형식
      description: 제품이 전통적인 종이 인형 세트인지, 자석 인형 세트인지, 또는 두 가지 형식이 혼합된 형태인지 명시합니다.
    paper_color_family:
      name: 종이 색상 계열
      description: 팩이 단색인지, 여러 색상으로 구성되어 있는지, 또는 특수 혼합 색상인지 지정합니다. 색상은 품목별로 다르지만 팩
        단위로 혼합된 경우에 유용합니다.
    paper_magnetic_doll_set_contents:
      name: 종이 및 자석 인형 세트 구성품
      description: 세트에 포함된 주요 구성품을 나타냅니다.
    paper_opacity:
      name: 종이 불투명도
      description: 종이가 얼마나 비쳐 보이는지 나타냅니다. 매우 투명한 것부터 불투명한 것까지 다양하며, 따라 그리기에 유용합니다.
    paraglider_certification_rating:
      name: 패러글라이더 인증 등급
      description: '패러글라이더 날개에 부여된 공식 비행 적합성 등급을 나타냅니다(예: EN 또는 LTF 등급).'
    parasite_types_controlled:
      name: 방제 대상 기생충 유형
      description: 제품이 효과를 발휘하는 내부 기생충 목록을 제공하여, 구매자가 특정 감염에 맞게 구충 프로그램을 조정할 수 있도록
        합니다.
    parking_camera_mounting_location:
      name: 주차 카메라 장착 위치
      description: '차량에서 카메라가 설치되도록 의도된 위치를 나타냅니다(예: 번호판 주변, 후면 표면 장착, 매립형 장착).'
    parking_camera_night_vision_technology:
      name: 주차 카메라 야간 시야 기술
      description: 카메라가 사용하는 저조도 보조 방식을 나타냅니다.
    parking_camera_orientation:
      name: 주차 카메라 방향
      description: 카메라가 후방 보기, 전방 보기 또는 선택식/미러링 사용을 위해 설계되었는지 여부를 나타냅니다.
    parking_sensor_finish:
      name: 주차 센서 마감
      description: '범퍼 외관과 조화를 이루도록 주차 센서 전면/캡의 표면 마감을 나타냅니다(예: 도색 가능/프라이머 처리, 무광,
        유광).'
    parking_sensor_type:
      name: 주차 센서 유형
      description: '주차 센서에 사용되는 감지 기술을 명시합니다(예: 초음파, 전자기, 레이더, 광학).'
    parsley_root_variety:
      name: 파슬리 뿌리 품종
      description: 공급자가 제공하는 경우, 파슬리 뿌리의 재배 품종 또는 품종을 명시합니다.
    parsnip_variety:
      name: 파스닙 품종
      description: Hollow Crown, White Gem과 같은 파스닙의 특정 품종 또는 재배종을 식별하여, 구매자가 맛, 단맛
        또는 크기 차이에 따라 선택할 수 있도록 합니다.
    part_condition:
      name: 부품 상태
      description: 해당 부품이 신품, 중고품, 정비품 등인지 나타냅니다.
    part_placement:
      name: 부품 배치
      description: '기계에서 해당 부품이 설치되는 위치를 나타냅니다(예: 계단 오르기 운동기구 또는 스테퍼의 왼쪽, 오른쪽, 앞쪽
        또는 뒤쪽).'
    partial_capo_covered_strings:
      name: 부분 카포 적용 현
      description: 부분 카포가 커버하는 현 범위를 표준 6현 기타 번호 체계로 지정합니다(1 = 높은 E, 6 = 낮은 E).
    parting_style:
      name: 가르마 방식
      description: '가발의 가르마를 어떻게 탈 수 있는지 나타내며(예: 중앙, 측면, 자유 가르마), 이는 스타일링 유연성에 영향을
        미칩니다.'
    party_favor_type:
      name: 파티 답례품 유형
      description: '파티 답례품의 종류를 지정하여 파티 답례품 카테고리 내에서 검색/필터링할 수 있도록 합니다(예: 스티커, 미니
        장난감, 비눗방울).'
    party_game_format:
      name: 파티 게임 형식
      description: 파티 게임의 주요 물리적 형식을 나타냅니다.
    party_horn_mouthpiece_type:
      name: 파티 나팔 마우스피스 유형
      description: 마우스피스 구조를 명시하며, 이는 위생과 편안함에 영향을 미칩니다.
    party_horn_style:
      name: 파티 나팔 방식
      description: 파티 나팔의 구조/작동 방식을 설명합니다(어떻게 펼쳐지거나 소리가 나는지).
    passenger_car_type:
      name: 객차 유형
      description: '검색 및 세트 구성에 사용되는 모형의 특정 여객 객차 유형을 식별합니다(예: 객차, 침대차).'
    passion_fruit_variety:
      name: 패션프루트 품종
      description: '제공되는 패션프루트의 식물학적 또는 상업적 품종을 식별/명시합니다(예: Purple, Yellow, Granadilla).'
    pasta_sauce_texture:
      name: 파스타 소스 질감
      description: '소비자의 입안 질감 선호도에 맞도록 소스의 질감을 설명합니다(예: 부드러움, 덩어리짐, 크리미함).'
    pasta_sauce_variety:
      name: 파스타 소스 종류
      description: 레시피나 방식에 따라 파스타 소스를 분류하여, 소비자가 마리나라 같은 클래식 소스나 보드카, 페스토 같은 특수 소스를
        빠르게 찾을 수 있도록 합니다.
    pastry_crust_state:
      name: 페이스트리 크러스트 상태
      description: 구매 시점의 크러스트 준비 또는 굽기 상태를 설명합니다.
    pastry_crust_style:
      name: 페이스트리 크러스트 스타일
      description: 크러스트의 특정 페이스트리 방식 또는 반죽 유형을 식별합니다.
    pastry_filling_type:
      name: 페이스트리 필링 유형
      description: 페이스트리 또는 스콘의 주된 내부 필링을 지정합니다.
    patch_adhesion_method:
      name: 패치 접착 방법
      description: '패치가 튜브 또는 타이어에 접착되는 방식을 명시합니다(예: 자가 접착식, 시멘트를 사용한 가황식, 열 활성화식).'
    patch_backing_material:
      name: 패치 뒷면 소재
      description: '장식 대상과 접촉하는 패치의 뒷면/밑면에 사용되는 소재를 나타냅니다(예: 펠트, 트윌).'
    patch_backing_type:
      name: 패치 뒷면 유형
      description: '패치에 사용되는 뒷면 처리를 나타냅니다(예: 열접착/다리미 접착, 떼어 붙이는 접착식, 후크 앤 루프, 없음).'
    patch_base_material:
      name: 패치 베이스 소재
      description: 모티브 패치의 주된 바탕/지지 직물 소재를 나타냅니다. 장식용 부착물은 제외합니다.
    patch_border_edge_finish:
      name: 패치 테두리/가장자리 마감
      description: '패치의 가장자리 마감 방법을 나타내며(예: 메로우/오버록 가장자리, 레이저 컷 가장자리), 내구성과 외관에 영향을
        미칩니다.'
    patch_placement_area:
      name: 패치 부착 영역
      description: 의류/액세서리에 패치를 부착하도록 일반적으로 의도된 영역을 나타냅니다.
    pathogen_removal_capability:
      name: 병원체 제거 기능
      description: 펌프가 제거할 수 있도록 인증된 미생물 종류를 명시합니다(세균, 원생동물, 바이러스).
    pattern_sizing_system:
      name: 패턴 사이즈 체계
      description: '패턴의 사이즈 차트에 사용되는 지역별 사이즈 체계 또는 표준을 지정합니다(예: 미국, 영국, 유럽).'
    peak_style:
      name: 모자챙 스타일
      description: 헬멧의 바이저 또는 피크 방식을 지정하며, 이는 보호 범위, 미관 및 경기 규칙에 영향을 미칩니다.
    pear_variety:
      name: 배 품종
      description: '배의 재배 품종 또는 품종을 식별하여, 소비자가 선호하는 맛, 식감 및 요리 용도에 따라 선택할 수 있도록 합니다(예:
        Bartlett, Bosc, Conference).'
    pearl_luster_grade:
      name: 진주 광택 등급
      description: 진주 표면의 광택/윤기 정도를 정성적으로 평가한 등급입니다.
    pearl_matching_level:
      name: 진주 매칭 수준
      description: '진주가 한 배치 또는 한 줄 내에서 얼마나 잘 어울리는지 나타냅니다(예: 색상, 크기, 광택 기준).'
    pearl_shape:
      name: 진주 모양
      description: 진주의 전체적인 모양 범주를 나타냅니다.
    pearl_surface_condition:
      name: 진주 표면 상태
      description: 흠집이나 반점의 유무 및 심각도를 기준으로 진주의 눈에 보이는 표면 상태를 나타냅니다.
    pearl_treatment:
      name: 진주 처리
      description: 진주의 색상/외관에 영향을 미치는 처리 여부를 공개합니다.
    pearl_type:
      name: 진주형
      description: '나석 진주의 품종/산지를 명시합니다(예: 담수, 아코야, 타히티, 남양).'
    peat_level:
      name: 피트 수준
      description: 위스키에서 피트 연기의 영향 강도를 설명합니다. 피트 향이 없는 것부터 피트 향이 강한 것까지 포함됩니다.
    pedal_and_cleat_system_compatibility:
      name: 페달 및 클릿 시스템 호환성
      description: 심 또는 웨지가 어떤 페달 또는 클릿 표준과 호환되도록 설계되었는지 명시하여, 소비자가 자신의 페달과 신발에 맞는
        제품을 선택할 수 있도록 합니다.
    pedal_configuration:
      name: 페달 구성
      description: 의자에 단일 페달, 분할/독립형 페달 또는 변환형 디자인이 적용되어 있는지 나타냅니다.
    pedal_mounting_style:
      name: 페달 장착 스타일
      description: 페달 또는 페달 커버/패드가 차량에 장착되는 방식을 명시합니다(설치/부착 방법).
    pedal_set_components:
      name: 페달 세트 구성품
      description: 세트에 포함된 페달을 명시합니다.
    pedal_spindle_material:
      name: 페달 스핀들 소재
      description: 페달 축/스핀들에 사용되는 소재를 나타내며, 강도, 무게 및 내식성에 영향을 미칩니다.
    pedal_spindle_thread_size:
      name: 페달 스핀들 나사산 크기
      description: 크랭크 암에 나사로 고정되는 페달 스핀들의 나사산 표준을 지정합니다.
    pedal_type:
      name: 페달 유형
      description: 자전거와 함께 제공되는 페달의 방식을 설명하며, 신발 호환성과 라이딩 방식도 함께 나타냅니다.
    pellet_accessory_type:
      name: 펠릿 액세서리 유형
      description: 낚시꾼이 채비 구성 필요에 따라 드릴, 밴더 또는 스톱 같은 펠릿 액세서리의 특정 유형을 빠르게 찾을 수 있도록
        식별합니다.
    pellet_grade:
      name: 펠릿 등급
      description: 에어소프트탄의 제조 정밀도 또는 성능 등급을 나타냅니다.
    pen_ink_color:
      name: 펜 잉크 색상
      description: 펜에서 실제로 나오는 잉크 색상을 나타내며, 이는 펜 본체의 외부 색상과 다를 수 있습니다.
    penalty_card_accessories_included:
      name: 벌점 카드 부속품 포함
      description: '벌점 카드와 함께 제공되는 추가 심판 용품을 나열합니다(예: 디지털 지갑, 스코어패드, 연필, 동전, 호루라기,
        파우치).'
    penalty_card_colors_included:
      name: 페널티 카드 색상 포함
      description: 제품 세트에 포함된 벌점 카드의 색상 목록을 제공합니다.
    penalty_flag_throw_distance:
      name: 페널티 플래그 투척 거리
      description: 플래그의 의도된 투척 범위를 나타내는 디자인 분류입니다.
    pendant_cutter_safety_features:
      name: 펜던트 커터 안전 기능
      description: 휴대/착용 중 우발적인 베임을 줄여주는 통합 안전 요소를 식별합니다.
    pendant_cutter_wear_method:
      name: 펜던트 커터 착용 방법
      description: 펜던트 커터를 어떻게 휴대하거나 착용하도록 의도되었는지 명시합니다.
    pepper_variety:
      name: 고추 품종
      description: 제품에 사용된 고추의 품종 또는 종을 명시하여, 소비자가 다양한 풍미 특성과 매운맛 수준을 구분할 수 있도록 합니다.
    percussion_case_style:
      name: 타악기 케이스 방식
      description: 케이스의 전반적인 방식/구조를 분류합니다(소프트 백, 하드/견고한 케이스, 하이브리드).
    percussion_instruments_included:
      name: 타악기 포함
      description: 제품이 여러 악기로 구성된 장난감 세트인 경우, 포함된 타악기 유형을 나열합니다.
    percussion_mallet_handle_grip_style:
      name: 타악기 망치 손잡이 그립 방식
      description: 손잡이의 그립 처리 유형을 식별합니다. 질감 이외의 처리로, 맨 나무, 래커 처리, 고무 그립, 랩 등이 있습니다.
    percussion_mallet_head_construction:
      name: 타악기 말렛 헤드 구조
      description: '말렛 헤드의 구조/제작 방식을 설명하며(예: 실 감싼 것, 펠트 감싼 것, 고무, 원목), 이는 소리와 내구성에
        영향을 미칩니다.'
    perfumery_base_carrier_type:
      name: 향수 베이스 캐리어 유형
      description: 향수 베이스의 캐리어/용매 시스템을 명시합니다. 희석 및 성능을 위해 베이스가 주로 무엇으로 구성되는지를 나타냅니다.
    perfumery_base_intended_application:
      name: 향수 베이스 의도 용도
      description: '베이스가 어떤 최종 용도 형식에 맞게 설계되었는지 나타냅니다(예: 고급 향수 스프레이, 롤온).'
    perfumery_ingredient_carrier_solvent:
      name: 향수 원료 캐리어/용매
      description: '원료가 희석된 경우, 원료가 제공되는 캐리어/용매를 식별합니다(예: 에탄올, DPG, 호호바 오일).'
    perfumery_ingredient_form:
      name: 향수 성분 형태
      description: 제공되는 향수 원료의 물리적 형태/상태를 지정합니다.
    perfumery_ingredient_type:
      name: 향수 성분 유형
      description: '향수 제조 실무에서 해당 향수 원료가 무엇에 해당하는지에 따라 분류합니다(예: 에센셜 오일, 향료 화학물질).'
    perfumery_ingredient_usage_note:
      name: 향수 원료 사용 노트
      description: 향료 구조에서 해당 원료가 일반적으로 맡는 역할을 나타냅니다(탑, 미들/하트, 베이스). 원료가 여러 노트에 걸쳐
        사용될 수 있음을 고려합니다.
    perfumery_ingredients:
      name: 향수 성분
      description: '키트에 포함된 소모성 향료 재료의 유형을 나열합니다(예: 에센셜 오일, 향료 오일, 알코올 베이스).'
    perfumery_note_position:
      name: 향수 노트 위치
      description: 향료 구조에서 해당 성분의 일반적인 역할을 나타냅니다(탑/하트/베이스).
    persimmon_variety:
      name: 감 품종
      description: 감의 재배 품종 또는 품종을 식별합니다. 후유, 하치야와 같은 품종은 식감, 맛, 떫은맛 및 요리 용도에서 차이가
        있습니다.
    personalization_type:
      name: 맞춤 설정 유형
      description: '제품을 특정 이벤트에 맞게 맞춤 설정할 수 있는지 여부와 그 방법을 지정합니다(예: 모노그램, 이름/날짜, 사진
        삽입).'
    phonics_focus:
      name: 파닉스 중점 영역
      description: 읽기 장난감이 목표로 하는 파닉스 및 단어 읽기 기술을 명시합니다.
    physalis_variety:
      name: 피살리스 품종
      description: 판매되는 피살리스의 특정 식물 종, 재배 품종 또는 일반 품종을 식별합니다.
    pi_ata_filler_type_included:
      name: 피냐타 포함 필러 유형
      description: 필러가 포함된 경우, 제공되는 내용물의 유형을 나타냅니다.
    pi_ata_hanging_method:
      name: 피냐타 걸기 방법
      description: 피냐타를 걸거나 지지하도록 설계된 방식을 나타냅니다(고리, 후크, 끈 포함 등).
    pi_ata_opening_type:
      name: 피냐타 열기 유형
      description: 충전재 투입구를 열고 닫는 방식을 나타냅니다(덮개, 벨크로, 지퍼, 사전 밀봉 등).
    piccolo_key_system:
      name: 피콜로 키 체계
      description: 피콜로에 사용된 키 장치 체계/디자인을 식별합니다. 현대 피콜로는 일반적으로 보엠 체계를 사용합니다.
    piccolo_keywork_features:
      name: 피콜로 키워크 특징
      description: 피콜로의 주요 키워크 메커니즘 및 옵션을 명시합니다.
    pick_grip_aid:
      name: 픽 그립 보조 장치
      description: '일반적인 표면 감촉/질감 외에 픽에 내장된 주요 그립 보조 장치를 나타냅니다(예: 그립 구멍, 양각 로고, 고무
        인레이).'
    pickleball_construction_type:
      name: 피클볼 구조 유형
      description: 공의 제조 구조를 나타냅니다. 예를 들어 이음매 없는 일체형 또는 용접된 2피스 구조가 있으며, 이는 충격 내구성과
        비행 일관성에 영향을 미칩니다.
    pickling_method:
      name: 절임 방법
      description: 식초 염지액이나 젖산 발효 등 절임에 사용되는 보존 매체 또는 기술을 명시합니다.
    pickup_and_preamp_configuration:
      name: 픽업 및 프리앰프 구성
      description: 비올라에 증폭 연주 또는 녹음을 위한 온보드 픽업 및/또는 액티브 프리앰프가 포함되어 있는지 여부를 나타냅니다.
    pickup_configuration:
      name: 픽업 구성
      description: '일반적인 약어(예: SSS, HSS, HH)를 사용하여 일렉트릭 기타의 전체 픽업 레이아웃을 설명합니다.'
    pickup_cover_material:
      name: 픽업 커버 소재
      description: 픽업 커버가 있는 경우, 픽업 커버의 주요 소재를 명시합니다. 제조업체가 도금 마감으로 명시한 경우 일반적인 도금
        마감도 포함합니다.
    pickup_cover_type:
      name: 픽업 커버 유형
      description: '일렉트릭 기타 픽업에 커버가 있는지 여부와 커버의 소재/방식을 명시합니다(예: 금속, 플라스틱).'
    pickup_string_spacing:
      name: 픽업 현 간격
      description: '픽업이 제작된 폴피스/현 간격 표준을 나타내며(예: Fender/F-spaced, Gibson/standard),
        트레몰로 장착 기타의 정렬에 영향을 미칩니다.'
    pie_crust_type:
      name: 파이 크러스트 유형
      description: '파이 또는 타르트에 사용되는 크러스트 방식 또는 유형을 지정합니다(예: 바삭한 페이스트리, 그레이엄 크래커, 글루텐
        프리 크러스트).'
    piece_configuration:
      name: 피스 구성
      description: 큐, 샤프트 또는 브리지가 몇 개의 개별 피스로 구성되어 있는지 나타내며, 휴대성과 플레이 방식에 영향을 미칩니다.
    pillow_form_size:
      name: 베개 솜/속 사이즈
      description: '베개 솜/속의 표준화된 완성 사이즈 표기를 나타냅니다(예: 18" x 18").'
    pilot_helmet_communications_integration:
      name: 조종사 헬멧 통신 통합
      description: 헬멧에 항공 통신 구성품이 포함되어 있는지 또는 해당 구성품용으로 사전 구성되어 있는지 여부를 나타냅니다.
    pilot_helmet_visor_configuration:
      name: 조종사 헬멧 바이저 구성
      description: 조종사용 헬멧에 포함된 바이저/페이스 실드 구성을 지정합니다.
    pin_attachment_type:
      name: 핀 부착 유형
      description: '핀을 옷이나 표면에 부착하는 데 사용되는 핀 뒷면/지지 메커니즘(예: 버터플라이 클러치, 자석 뒷면)을 지정합니다.'
    pin_backing_type:
      name: 핀 뒷면 유형
      description: '핀을 옷이나 표면에 부착하는 데 사용되는 핀 뒷면/받침 메커니즘을 지정합니다(예: 버터플라이 클러치, 자석 뒷면).'
    pin_cushion_attachment_style:
      name: 핀쿠션 부착 방식
      description: 핀쿠션을 사용 중 착용, 부착 또는 배치하는 방법을 나타냅니다.
    pin_cushion_features:
      name: 핀쿠션 특징
      description: 기본적인 핀 고정 기능을 넘어서는 기능적 특징을 나타냅니다.
    pin_face_customization_method:
      name: 핀 전면 맞춤 설정 방법
      description: '전면 디자인을 제작하는 방법을 지정합니다(예: 하드 에나멜, 소프트 에나멜, 인쇄).'
    pin_type:
      name: 핀 유형
      description: 스포츠 팬덤 수집품에 사용되는 핀 제품의 방식 또는 형식을 지정합니다.
    ping_pong_certification:
      name: 탁구 인증
      description: 제품의 공식 표준 또는 관련 기관 승인 수준을 명시합니다.
    ping_pong_competition_certification:
      name: 탁구 대회 인증
      description: '공인 경기에서 사용할 수 있는 탁구공의 공식 인증 상태를 나타냅니다(예: ITTF 승인).'
    ping_pong_paddle_handle_style:
      name: 탁구 라켓 손잡이 방식
      description: 라켓 손잡이의 모양/방식을 정의하며, 이는 그립감과 경기 기술에 영향을 미칩니다.
    ping_pong_robot_accessory_type:
      name: 탁구 로봇 액세서리 유형
      description: '액세서리의 기능적 하위 유형을 식별하여 소비자가 검색 결과를 빠르게 좁힐 수 있도록 합니다(예: 그물망, 전원
        어댑터).'
    ping_pong_rubber_surface_type:
      name: 탁구 고무 표면 유형
      description: 라켓에 적용된 고무 표면의 방식/질감을 식별하며, 스핀 및 속도 특성에 영향을 미칩니다.
    ping_pong_rubber_type:
      name: 탁구 고무 유형
      description: 탁구 고무 시트의 표면 구조 방식을 지정하며, 이는 경기 특성에 영향을 미칩니다.
    ping_pong_table_type:
      name: 탁구대 유형
      description: '비교하기 쉽도록 테이블의 전반적인 방식 또는 형식을 분류합니다(예: 경기용, 전환 상판, 미니).'
    pipe_instrument_voicing_sound_production_method:
      name: 관악기 보이싱/소리 생성 방법
      description: 악기가 소리를 내는 방식, 즉 공기 흐름 메커니즘을 명시하여 필터에서 팬플루트, 리드 파이프, 오르간 파이프 계열을
        구분하는 데 도움이 됩니다.
    piston_application_type:
      name: 피스톤 적용 유형
      description: 피스톤의 의도된 용도/사용 사례를 나타냅니다(교체용, 성능/레이싱용, 헤비듀티용).
    piston_crown_dish_style:
      name: 피스톤 크라운/디시 방식
      description: '연소실 용적과 압축에 영향을 미치는 피스톤 크라운의 모양을 나타냅니다(예: 평평한 상단, 돔형, 디시형).'
    piston_pin_retention_type:
      name: 피스톤 핀 고정 유형
      description: 피스톤/커넥팅 로드 어셈블리에서 리스트 핀, 즉 피스톤 핀이 어떻게 고정되는지 명시합니다.
    pit_configuration:
      name: 피트 구성
      description: 착륙 구역의 구조적 형식(일체형 또는 다중 모듈)을 정의하고, 나아가 제공되는 섹션 또는 모듈 수를 정의합니다.
    pit_cover_type:
      name: 피트 커버 유형
      description: 스파이크 저항성, 날씨 보호 및 선수 선호도에 영향을 미치는 피트와 함께 제공되는 보호 표면 또는 시트를 지정합니다.
    pitahaya_flesh_color:
      name: 피타하야 과육 색상
      description: '피타하야, 즉 용과의 내부 과육 색상(예: 흰색, 빨간색, 마젠타색)을 지정합니다. 이는 맛, 외관 및 체감 영양감에
        영향을 미치는 주요 차별화 요소입니다.'
    pitch_mat_coverage_length:
      name: 피치 매트 커버리지 길이
      description: '크리켓 피치 매트를 덮는 위켓의 부분에 따라 분류합니다(예: 전체 피치, 하프 피치).'
    pitch_range:
      name: 피치 범위
      description: 셰이커 소리에서 인지되는 음역/밝기를 설명합니다.
    pitch_standard:
      name: 피치 표준
      description: '리코더가 제작된 기준 피치, 즉 참조 튜닝을 지정합니다(예: A=440, A=442, A=415).'
    pitching_rubber_size_designation:
      name: 피칭러버 사이즈 지정
      description: 투구용 고무판의 표준 필드 사이즈 분류를 나타내어, 소비자가 정확한 치수를 알지 않아도 쉽게 선택할 수 있도록 합니다.
    pitching_screen_style:
      name: 피칭 스크린 방식
      description: 소비자가 훈련 상황에 맞는 올바른 보호 레이아웃을 빠르게 선택할 수 있도록 스크린의 구조적 설계를 정의합니다.
    pitching_target_design:
      name: 피칭 타깃 디자인
      description: 피칭 타깃의 전반적인 방식 또는 구성을 분류합니다.
    pitching_wheel_count:
      name: 피칭 휠 수
      description: 피칭 머신이 사용하는 추진 휠 수를 나타냅니다.
    pivot_adjustability:
      name: 피벗 조절 가능 여부
      description: 가위에 절삭 장력을 조절할 수 있는 조절식 피벗 나사가 있는지 여부를 나타냅니다.
    pivot_piece_type:
      name: 피벗 피스 유형
      description: '제공되는 다양한 피벗 인터페이스 모양을 구분합니다(예: 전통적인 컵 모양, 튜브 방식).'
    place_card_holder_closure_mechanism:
      name: 플레이스 카드 홀더 잠금 장치
      description: 홀더가 카드를 어떻게 잡거나 고정하는지 지정합니다.
    place_card_orientation:
      name: 플레이스 카드 방향
      description: 플레이스 카드를 사용/표시할 때의 방향을 지정합니다.
    place_card_printing_status:
      name: 플레이스 카드 인쇄 상태
      description: 플레이스 카드가 손글씨/인쇄용으로 비어 있는지, 이름이 미리 인쇄되어 있는지(개인화되지 않음), 또는 개인화/맞춤
        인쇄되어 있는지 나타냅니다.
    placket_type:
      name: 플래킷 유형
      description: 폴로 셔츠 앞면 여밈 방식을 지정합니다. 단추 개수 또는 기타 여밈 방식 등을 포함합니다.
    planetarium_content_theme:
      name: 플라네타륨 콘텐츠 테마
      description: 플라네타륨 프로젝터에 표시되는 주요 콘텐츠를 나타냅니다.
    planetarium_projection_content_format:
      name: 플라네타륨 투영 콘텐츠 형식
      description: 플라네타륨에서 사용하는 투영 콘텐츠 메커니즘을 지정합니다(실물 디스크/슬라이드 또는 디지털/LED 효과).
    plant_fiber_type:
      name: 식물 섬유 유형
      description: 스테이플 섬유 공급원 유형이 식물인 경우, 특정 식물 유래 섬유 유형을 나타냅니다.
    plaster_gauze_finish:
      name: 석고 거즈 마감
      description: 적용 및 평탄화 후 나타나는 표면 마감 경향을 설명합니다.
    plaster_gauze_grade:
      name: 석고 거즈 등급
      description: '석고 거즈의 의도된 사용 등급을 나타냅니다(예: 공예/학생용, 전문가용).'
    plaster_gauze_weave_density:
      name: 석고 거즈 직조 밀도
      description: 거즈 직조의 상대적인 성김/촘촘함을 나타내며, 강도와 석고 흡착에 영향을 미칩니다.
    plastic_canvas_finish:
      name: 플라스틱 캔버스 마감
      description: 플라스틱 캔버스 롤의 표면/마감 처리를 나타냅니다.
    plastic_canvas_sheet_finish:
      name: 플라스틱 캔버스 시트 마감
      description: 플라스틱 캔버스 시트의 표면/테두리 처리 방식
    plastic_canvas_transparency:
      name: 플라스틱 캔버스 투명도
      description: 플라스틱 캔버스가 얼마나 투명하거나 불투명한지 나타냅니다.
    plate_bottom_design:
      name: 플레이트 바닥 디자인
      description: 다양한 경기 표면에서 접지력, 안정성 및 안전성에 영향을 미치는 플레이트 밑면의 구조를 설명합니다.
    plate_compatibility_standard:
      name: 플레이트 호환 규격
      description: '바가 맞도록 설계된 웨이트 플레이트 표준을 나타냅니다(예: 올림픽 50mm, 표준 25mm).'
    plate_installation_type:
      name: 플레이트 설치 유형
      description: '플레이트를 경기장에 고정하거나 배치하는 방법을 명시하여, 구매자가 고정식 옵션과 이동식 옵션 중에서 선택할 수
        있도록 합니다(예: 매립형, 스파이크형, 던져 놓는 방식)'
    plate_size_category:
      name: 플레이트 크기 범주
      description: 경기 수준 또는 규정 표준에 따라 플레이트를 분류하여, 구매자가 리그 규정에 맞는 장비를 빠르게 찾을 수 있도록
        합니다.
    play_dough_putty_kit_contents:
      name: 플레이 도우 및 퍼티 키트 구성품
      description: '컴파운드 자체 외에 포함되는 주요 구성품을 식별합니다(예: 도구, 금형, 압출기, 보관 용기).'
    play_dough_tool_set_items_included:
      name: 플레이도우 도구 세트 포함 품목
      description: '플레이도우 도구 세트에 포함된 도구 및 액세서리 유형을 식별합니다(예: 롤러, 커터, 틀).'
    play_environment_suitability:
      name: 놀이 환경 적합성
      description: '세트가 의도하는 놀이 환경을 식별합니다(예: 실내, 실외, 물놀이).'
    play_food_features:
      name: 장난감 음식 특징
      description: 장난감 음식의 특별한 기능적 특징 또는 사실적 특징을 나타냅니다.
    play_food_items_included:
      name: 장난감 음식 포함 품목
      description: 주방놀이 세트에 포함된 장난감 음식 유형을 나타냅니다.
    play_food_size_scale:
      name: 장난감 음식 크기 비율
      description: 놀이 주방, 인형 및 놀이 세트와의 호환성을 위해 장난감 음식 조각의 대략적인 크기 비율을 나타냅니다.
    play_money_set_components_included:
      name: 놀이용 돈 세트 구성품 포함
      description: 놀이용 돈/은행 세트에 포함되는 구성품 유형을 지정합니다.
    play_pattern:
      name: 놀이 패턴
      description: '장난감의 주된 사용 목적을 나타냅니다(예: 손장난/스트레스 해소, 책상 조각/미술, 조립/건축, 퍼즐).'
    play_sprinkler_mounting_type:
      name: 놀이용 스프링클러 장착 유형
      description: 놀이용 스프링클러가 사용 중 어떻게 배치되거나 고정되는지 나타냅니다.
    play_vehicle_lights_and_sounds:
      name: 장난감 차량 조명 및 소리
      description: 장난감 차량에 조명 및/또는 소리와 같은 전자식 놀이 효과가 포함되어 있는지 여부를 나타냅니다.
    play_vehicle_scale:
      name: 장난감 차량 축척
      description: 장난감 차량의 축척 비율을 나타냅니다. 일반적으로 다이캐스트 및 모형형 장난감 차량에 사용됩니다.
    player_size_category:
      name: 플레이어 사이즈 범주
      description: '포수 장비 세트가 맞도록 의도된 선수 사이즈/연령대를 정의합니다(예: 티볼, 유소년, 중급, 성인).'
    player_size_range:
      name: 선수 사이즈 범위
      description: '스트랩/지지대에 의도된 사용자 사이즈 범위를 지정합니다(예: 아동용, 성인용, 범용).'
    playing_environment:
      name: 경기 환경
      description: 하키공이 설계된 주요 경기 표면 또는 환경을 지정합니다.
    playing_method:
      name: 연주 방법
      description: 악기를 연주하거나 작동시키는 주된 방식을 나타냅니다.
    playing_surface_material:
      name: 연주면 소재
      description: 카혼의 전면 연주면, 즉 타파의 소재를 식별합니다. 이 소재는 음색과 연주감에 큰 영향을 미칩니다.
    playing_surface_type:
      name: 연주면 유형
      description: 연습용 패드의 연주면 구조/촉감을 설명합니다.
    playset_activities_included:
      name: 놀이 세트 포함 활동
      description: 그네/놀이 세트에 내장된 주요 놀이 활동/구성품을 식별하여, 소비자가 아이들이 해당 구조물에서 무엇을 할 수 있는지에
        따라 제품을 필터링할 수 있도록 합니다.
    playset_installation_type:
      name: 플레이세트 설치 유형
      description: 그네/놀이 세트가 설치되거나 고정되는 방법을 명시합니다.
    playset_items_included:
      name: 플레이세트 품목 포함
      description: '피크닉 놀이 세트에 포함된 역할놀이 품목 유형을 식별합니다(예: 음식, 식기, 담요, 바구니).'
    pliers_jaw_style:
      name: 펜치 턱 방식
      description: 펜치의 주요 턱 구성 또는 기능적 방식을 설명합니다.
    plum_variety:
      name: 자두 품종
      description: 특정 자두 재배 품종 또는 품종을 식별하여, 소비자가 맛, 색상 및 의도된 요리 용도에 따라 선택할 수 있도록 합니다.
    plumcot_variety:
      name: 살구자두 품종
      description: '플럼콧의 특정 재배 품종 또는 상업용 품종을 식별합니다(예: Flavor King, Dapple Dandy).
        이러한 품종은 맛, 색상 및 계절성에 영향을 미칠 수 있습니다.'
    plunger_mute_handle_type:
      name: 플런저 뮤트 핸들형
      description: 와와 효과를 위해 플런저 뮤트를 잡고 조작하는 데 사용되는 핸들 또는 그립 방식을 지정합니다.
    pocket_closure_type:
      name: 주머니 잠금 유형
      description: 각 주머니가 어떻게 잠기는지 정의하여, 사용자가 활동 중 물건을 안전하게 보관할 수 있는 바지를 쉽게 찾을 수 있도록
        합니다.
    pocket_knife_opening_mechanism:
      name: 포켓 나이프 개폐 메커니즘
      description: 칼날이 펼쳐지거나 열리는 방식을 나타냅니다(수동 네일 닉, 엄지 스터드, 플리퍼, 보조식, 자동식 등).
    pocket_style:
      name: 주머니 방식
      description: 바지에 적용된 주요 주머니 구조를 명시합니다.
    pocket_type:
      name: 포켓 유형
      description: 의류에 주머니가 있는지 여부 또는 주머니 방식을 나타냅니다.
    pod_retention_system:
      name: 페인트볼 포드 고정 체계
      description: 페인트볼 포드가 하네스 또는 팩에 어떻게 고정되고 분리되는지 설명합니다.
    pogo_stick_footrest_type:
      name: 포고 스틱 발받침대 유형
      description: 포고 스틱 위에 서기 위해 사용하는 발판/페그 디자인을 설명합니다.
    pogo_stick_suspension_type:
      name: 포고 스틱 서스펜션 유형
      description: 포고 스틱의 반동 메커니즘을 명시하며, 이는 사용감, 내구성 및 유지 관리에 영향을 미칩니다.
    poi_handle_type:
      name: 포이 핸들 유형
      description: 포이를 잡는 데 사용되는 핸들/그립/부착 방식의 스타일을 지정합니다.
    poi_light_source:
      name: 포이 광원
      description: 조명이 설치된 포이의 경우, 조명 기술을 명시합니다.
    poi_tether_type:
      name: 포이 테더 유형
      description: '포이 헤드를 핸들, 노브 또는 손목 고리에 연결하는 테더 유형을 나타냅니다(예: 코드, 로프, 체인).'
    poi_type:
      name: 포이 유형
      description: '포이의 주요 구성/사용 유형을 지정합니다(예: 연습용, LED, 화염용).'
    point_type:
      name: 포인트 유형
      description: 자수 바늘 끝의 모양/방식을 나타냅니다.
    pointe_shoe_shank_length:
      name: 토슈즈 지지대 길이
      description: '생크가 지지하는 신발 길이의 부분을 나타냅니다(예: 전체 길이, 3/4 길이).'
    pointe_shoe_shank_strength:
      name: 토슈즈 생크 강도
      description: 토슈즈 생크의 강성 수준을 나타내며, 지지력과 길들이는 데 걸리는 시간에 영향을 미칩니다.
    poker_accessory_storage_included:
      name: 포커 액세서리 보관 공간 포함
      description: 액세서리가 어떤 추가 포커 품목을 위한 전용 보관 공간을 제공하는지 나타냅니다.
    poker_chip_tray_rack_configuration:
      name: 포커칩 트레이/랙 구성
      description: 칩 트레이/랙의 내부 정리 방식을 설명합니다(행 수 및 행당 수용량).
    pole_anchoring_method:
      name: 폴대 고정 방식
      description: 폴을 지면이나 경기 표면에 고정하는 방법을 정의합니다.
    pole_basket_type:
      name: 폴 바스켓 유형
      description: 스키 폴 끝부분 근처에 장착되는 바스켓의 방식 또는 크기를 분류하여, 의도된 눈 상태를 나타냅니다.
    pole_connection_system:
      name: 폴 연결 체계
      description: 쇼크 코드, 나사식 또는 허브 시스템 등 폴 섹션을 서로 연결하는 메커니즘을 식별하여, 사용자가 설치 속도와 호환성을
        평가하는 데 도움이 됩니다.
    pole_system_type:
      name: 폴 시스템 유형
      description: '텐트의 구조적 지지 체계 또는 설치 방식을 설명합니다(예: 알루미늄 폴, 공기 주입식 튜브, 트레킹 폴 설치).'
    police_equipment_fitment:
      name: 경찰 장비 장착
      description: 차량이 어떤 법 집행 장비를 지원하도록 구성되었거나 사전 배선되어 있는지 명시합니다.
    police_vehicle_equipment_package:
      name: 경찰차 장비 패키지
      description: 판매되는 차량에 포함된 경찰 전용 개조 사양/장비를 나타냅니다.
    police_vehicle_light_siren_equipment:
      name: 경찰차용 경광등/사이렌 장비
      description: 경찰차에 설치된 비상 경고 장치를 명시합니다.
    police_vehicle_upfit_level:
      name: 경찰차 개조 수준
      description: 트럭에 설치된 경찰 전용 장비/개조 사항에 대해 설명합니다.
    polish_formulation:
      name: 광택제 제형
      description: 지판 광택제의 기본 배합/화학적 조성을 나타냅니다(도포 방법이 아님).
    polish_purpose:
      name: 광택제 목적
      description: 악기 표면에 사용하는 광택제의 주된 목적을 나타냅니다.
    pollen_level:
      name: 꽃가루 농도
      description: 백합 품종에 따른 꽃가루 착색 정도/가능성을 나타냅니다.
    polymer_clay_firmness_level:
      name: 폴리머 클레이의 경도 수준
      description: 소성 전 폴리머 클레이의 상대적인 단단함/부드러움, 즉 작업성을 나타냅니다.
    polymer_clay_translucency:
      name: 폴리머 클레이 반투명도
      description: 경화된 폴리머 클레이의 시각적 불투명도/투명도를 나타냅니다.
    pom_pom_handle_style:
      name: 응원 수술(폼폼) 손잡이 스타일
      description: 폼폼을 잡는 데 사용되는 손잡이/그립의 방식이나 구조를 설명합니다.
    pom_pom_trim_backing_tape_material:
      name: 폼폼 트림 뒷면/테이프 소재
      description: 폼폼이 부착되는 봉제 테이프 또는 브레이드의 소재를 식별합니다.
    pom_pom_type:
      name: 폼폼 유형
      description: 모자에 있는 폼폼 또는 보블의 존재 여부와 구체적인 유형을 나타냅니다.
    pomegranate_product_form:
      name: 석류 제품 형태
      description: 제공되는 형태(통과일, 껍질을 벗긴 석류 알맹이, 씨앗, 냉동 석류 알맹이)를 설명합니다.
    pomegranate_variety:
      name: 석류 품종
      description: '석류의 특정 품종 또는 변종을 식별합니다(예: Wonderful, Bhagwa, Kandhari).'
    ponytail_holder_style:
      name: 포니테일 홀더 방식
      description: 소비자가 선호하는 스타일을 선택할 수 있도록 머리끈의 구체적인 구조 또는 형태를 설명합니다.
    popcorn_form:
      name: 팝콘 모양
      description: 바로 먹을 수 있는 제품, 커널, 전자레인지 팩, 양념 키트 또는 제품 제공 노브세자 특성 번호 등 팝콘 제품의
        물리적 또는 준비 형태를 나타냅니다.
    pork_rind_form:
      name: 돼지껍데기 형태
      description: '돼지껍데기 스낵의 물리적 형태 또는 스타일을 분류합니다(예: 린드, 크래클링, 퍼프, 펠렛 등).'
    portability_features:
      name: 휴대성 기능
      description: 라운지 의자를 이동, 운반 또는 보관하는 데 도움이 되는 내장 요소를 나열합니다.
    portability_frame_type:
      name: 휴대성/프레임 유형
      description: 오케스트라 차임벨이 휴대용/야외용 프레임 방식인지 고정형/콘서트용 프레임 방식인지 여부를 나타냅니다.
    portable_electronic_game_features:
      name: 휴대용 전자 게임기 특징
      description: 기기가 지원하는 주요 게임플레이/하드웨어 기능을 나타냅니다.
    post_surgery_stage_suitability:
      name: 수술 후 단계 적합성
      description: 해당 바디수트가 어떤 회복 단계에 맞춰 설계되었는지 나타내며, 의료용 보정속옷을 찾는 소비자에게 중요합니다.
    postage_stamp_format:
      name: 우표 형식
      description: 보통우표의 제공/포장 형식(낱장, 쌍, 스트립, 블록, 시트, 소책자 판, 코일 등)을 설명합니다.
    postmark_type:
      name: 소인 유형
      description: 사용된 보통우표에 표시된 취소인/소인의 유형을 나타냅니다.
    potato_cut_style:
      name: 감자 절단 방식
      description: 감자를 통째로 판매하지 않을 경우, 감자의 물리적 절단 형태 또는 준비 방식을 나타냅니다.
    potato_intended_use:
      name: 감자의 용도
      description: 즉시 섭취용 감자와 씨감자 또는 냉동 가공 제품용 감자를 구분합니다.
    potato_variety:
      name: 감자 품종
      description: 감자의 재배 품종 또는 품종을 명시하여 소비자가 “Yukon Gold”, “Maris Piper”, “Purple
        Majesty”와 같은 특정 품종을 찾을 수 있도록 합니다.
    pottery_clay_firing_required:
      name: 도자기 점토 소성 필요
      description: 해당 소재가 원하는 최종 경도/마감 상태에 도달하기 위해 가마 소성이 필요한지 여부를 나타냅니다.
    pottery_slip_application_method:
      name: 도자기 슬립 앱 방법
      description: 슬립에 사용할 앱 기술을 지정합니다.
    pottery_slip_compatible_clay_body:
      name: 도자기용 유약과 호환되는 점토
      description: 이 슬립이 어떤 점토 종류와 잘 어울리도록 또는 어떤 점토와 함께 사용하도록 설계되었는지를 나타냅니다.
    pottery_slip_form:
      name: 도자기 슬립 형태
      description: 해당 제품이 바로 사용할 수 있는 액체 형태로 판매되는지, 아니면 혼합이 필요한 건조 혼합물/분말 형태로 판매되는지를
        나타냅니다.
    pouch_design:
      name: 파우치 디자인
      description: 앞쪽 파우치 부분의 구조 또는 개선 기능을 자세히 설명합니다.
    pouch_style:
      name: 파우치 방식
      description: 편안함, 지지력, 심미적 선호를 고려한 앞쪽 파우치 부분의 디자인을 구체적으로 명시합니다.
    powdered_beverage_variety:
      name: 분말형 음료 종류
      description: '제조하는 음료의 종류에 따라 제품을 분류합니다(예: 레모네이드, 스포츠 음료, 단백질 셰이크).'
    power_rack_style:
      name: 파워랙 방식
      description: 전반적인 랙 디자인/구성을 지정하여 소비자가 풀 케이지, 하프 랙, 공간 절약형 제품을 구별할 수 있도록 합니다.
    power_steering_fluid_formulation:
      name: 파워 스티어링 오일 배합
      description: 상위 수준의 호환성 필터링에 사용되는 오일의 일반적인 제형 계열(ATF 기반, 전용 유압/CHF, 범용)을 나타냅니다.
    practice_mute_audio_output:
      name: 연습용 뮤트 오디오 출력
      description: 연습용 뮤트 장치에서 모니터링 및/또는 녹음에 사용할 수 있는 오디오 출력 연결 유형을 지정합니다(무음/전자식 연습용
        음소거 장치에서 흔히 사용됨).
    practice_mute_intonation_impact:
      name: 연습용 뮤트 음정 영향
      description: 연습용 뮤트를 사용할 때 예상되는 음정/음정 변화에 대해 설명합니다.
    practice_mute_venting_valve_type:
      name: 소음이 적은 환기/밸브 유형 연습
      description: 연습용 소음기가 통풍구가 있는지, 또는 저항/음량을 조절할 수 있는 조절 밸브가 있는지 여부와 그 방법을 명시합니다.
    practice_pad_features:
      name: 연습 패드 기능
      description: 사이즈/소재 외에 연습용 패드의 기능적 특징을 강조합니다.
    practice_pad_mounting_style:
      name: 연습용 패드 장착 방식
      description: 연습용 패드를 사용 중에 어떻게 위치시키거나 부착해야 하는지를 나타냅니다.
    practice_pad_rebound_level:
      name: 연습용 패드 반발 수준
      description: 일반 드럼 헤드와 비교한 연습용 패드의 상대적인 반발력/반응성을 나타냅니다.
    practice_pad_surface_configuration:
      name: 연습용 패드 표면 구성
      description: 패드에 연주 표면이 하나인지 여러 개인지, 그리고 각 표면의 느낌이 다른지 설명합니다.
    pregnancy_stage_suitability:
      name: 임신 단계별 적합성
      description: 해당 의류가 임신 또는 산후 어느 단계에 맞춰 디자인되었는지 나타냅니다.
    preparation_state:
      name: 준비 상태
      description: 섭취 전 필요한 조리 또는 준비 정도를 나타냅니다.
    preparation_style:
      name: 조리 스타일
      description: '판매 시 물밤의 절단 또는 가공 상태(예: 통째로, 썰어서, 구운 것, 냉동된 것)를 정의합니다.'
    preservation_medium:
      name: 보존 매체
      description: '올리브나 케이퍼를 보존하는 주된 액체 또는 매체를 지정합니다(예: 소금물, 올리브유, 식초).'
    presser_foot_attachment_method:
      name: 노루발 부착 방법
      description: '재봉틀 노루발이 노루발 홀더/생크에 어떻게 부착되는지를 나타내며(예: 스냅온 방식, 나사식), 이는 호환성에 영향을
        미칩니다.'
    pressure_gauge_type:
      name: 압력계 유형
      description: 자전거 펌프에 포함된 압력 게이지의 종류를 나타냅니다(있는 경우).
    pressure_measurement_unit:
      name: 압력 측정 단위
      description: 압력 센서의 측정값 또는 교정에 사용되는 단위를 나타내며, 제품 비교 및 게이지/ECU 호환성 확인에 유용합니다.
    pressure_plate_balance_type:
      name: 압력판 밸런스 유형
      description: 압력판이 내부 밸런스 방식인지, 아니면 엔진/플라이휠 구성에 맞는 외부 밸런스가 필요한지를 나타냅니다.
    pressure_plate_components_included:
      name: 압력판 구성품 포함
      description: 압력판 목록에 포함된 항목을 나타냅니다.
    pressure_sensor_application:
      name: 압력 센서 적용 대상
      description: 압력 센서가 설계된 차량 시스템/측정 지점을 식별합니다.
    pressure_sensor_port_thread_standard:
      name: 압력 센서 포트/나사산 표준
      description: 차량 시스템에 센서를 설치하는 데 사용되는 기계식 포트/나사산 표준을 지정합니다.
    pressurization_method:
      name: 가압 방식
      description: 장치 내부에서 압력이 어떻게 생성되거나 유지되는지를 식별합니다.
    pretend_housekeeping_set_items_included:
      name: 가정생활 역할놀이 세트 구성품 포함
      description: '세트에 포함된 청소 소품을 나열합니다(예: 대걸레, 빗자루, 쓰레받기, 분무기).'
    pretend_play_electronic_features:
      name: 역할놀이용 전자 기기
      description: 역할놀이 제품에 포함된 전자/상호작용 기기를 나타냅니다.
    pretend_play_set_pieces_included:
      name: 역할놀이 세트 구성품 포함
      description: '역할놀이 세트에 포함된 주요 소품/구성품을 나타냅니다(예: 금전등록기, 장난감 음식, 도구).'
    pretend_play_set_theme:
      name: 역할놀이 세트 테마
      description: 제품으로 표현되는 주요 역할놀이 시나리오/테마를 나타냅니다. 모든 역할놀이 아동용 제품 전반의 검색/발견에 유용합니다.
    pretzel_coating:
      name: 프레첼 코팅
      description: 프레첼에 적용된 모든 외부 양념이나 코팅을 식별하며, 짭짤한 맛(소금, 양념)과 달콤한 맛(초콜릿, 요구르트, 캐러멜)
        모두를 포함합니다.
    pretzel_shape:
      name: 프레첼 모양
      description: '프레첼의 물리적 형태(예: 꼬인 형태, 막대 형태, 한입 크기 형태)를 지정합니다. 이는 고객이 검색 또는 필터링할
        때 사용하는 주요 차별화 요소입니다.'
    primary_component_material:
      name: 주요 구성품 소재
      description: 엔진 블록의 주요 소재를 나타냅니다.
    primary_dish_application:
      name: 주요 요리 용도
      description: 반죽이 사용될 주된 요리 또는 조리법을 나타냅니다.
    primary_plant_base:
      name: 주요 식물성 베이스
      description: 치즈 대체품을 만드는 데 사용된 주요 비유제품 성분을 나타냅니다.
    primary_plant_protein_source:
      name: 주요 식물성 단백질 공급원
      description: 제품에 단백질을 제공하는 주요 식물성 성분을 식별합니다.
    primary_sweetener_source:
      name: 주요 감미료 공급원
      description: 시럽이 추출된 식물 또는 원료를 식별합니다.
    print_placement:
      name: 인쇄 위치
      description: 티셔츠에서 주요 그래픽/로고가 배치되는 위치를 나타냅니다.
    print_technique:
      name: 인쇄 기법
      description: 티셔츠 그래픽에 사용된 장식/인쇄 방식을 지정합니다.
    printable_canvas_intended_use:
      name: 인쇄용 캔버스 용도
      description: 인쇄용 캔버스가 최적화된 주요 용도를 나타냅니다.
    printable_fabric_format:
      name: 인쇄용 원단 형식
      description: 인쇄용 면 원단이 제공되는 방식(낱장 또는 연속 롤)을 지정하며, 이는 프린터 급지 및 프로젝트 작업 흐름에 영향을
        미칩니다.
    prism_material:
      name: 프리즘 재료
      description: 광학 소자, 즉 프리즘 자체의 소재를 명시하며, 선명도, 내구성, 긁힘 저항성에 영향을 미칩니다.
    prisoner_transport_configuration:
      name: 수감자 수송 구성
      description: 차량이 구금자/수감자 수송용으로 구성되었는지 여부와 구성 방식을 지정합니다.
    prisoner_transport_partition_type:
      name: 수감자 수송 칸막이 유형
      description: 앞쪽과 뒤쪽 구획을 분리하는 내부 칸막이/격리 장치의 유형을 나타냅니다.
    privacy_or_acoustic_feature:
      name: 프라이버시 또는 방음 기능
      description: 칸막이 패널, 방음 스크린 또는 완전 밀폐형 구조물과 같은 내장형 프라이버시 또는 방음 요소를 명시합니다.
    processing_state:
      name: 가공 상태
      description: 깃털이 공예용으로 살균/세척되었거나 다른 방식으로 준비되었는지 여부를 나타냅니다.
    produce_grade:
      name: 농산물 등급
      description: 키위의 크기, 외관 및 상태를 기준으로 품질 등급을 분류합니다.
    produce_growth_stage:
      name: 농산물 생육 단계
      description: '판매되는 농산물의 생육 단계를 명시합니다(예: 새싹채소, 어린잎채소, 다 자란 잎채소, 살아있는 식물, 씨앗).'
    produce_washing_state:
      name: 농산물 세척 상태
      description: 잎채소가 세척되어 바로 먹을 수 있는 상태인지 여부를 나타냅니다.
    profile_shape:
      name: 프로파일/모양
      description: 심벌즈의 전체적인 곡률/프로파일을 설명합니다(가장자리에서 벨 부분으로 갈수록 얼마나 가파르게 올라가는지).
    projectile_ammunition_type:
      name: 발사체/탄약 유형
      description: 해당되는 경우, 장난감 무기가 사용하는 발사체 또는 소모품의 유형을 지정합니다.
    projectile_finish:
      name: 발사체 마감
      description: 'BB에 적용된 표면 코팅을 명시하며, 이는 부식 방지 또는 가시성을 향상시키는 데 도움이 됩니다(예: 구리 코팅,
        아연 도금, 도색).'
    projectile_type:
      name: 발사체 유형
      description: 제품이 사용하거나 사용 목적에 맞게 설계된 발사체의 유형을 식별합니다.
    pronation_support:
      name: 회내 지원
      description: 운동화가 어떤 보행 패턴 또는 발의 회내 패턴을 고려하여 설계되었는지 나타냅니다.
    propellant_type:
      name: 추진제 유형
      description: 해당 부품 또는 액세서리가 사용하도록 설계된 추진제를 지정합니다.
    propeller_blade_cup:
      name: 프로펠러 블레이드 컵
      description: 블레이드의 컵 정도, 즉 뒤쪽 가장자리의 말림 정도를 나타냅니다.
    propeller_hub_type:
      name: 프로펠러 허브 유형
      description: 프로펠러에 사용되는 허브/부싱 체계(교체형 허브 키트 또는 압입식)를 지정합니다.
    propeller_rotation:
      name: 프로펠러 회전
      description: 프로펠러의 회전 방향을 지정합니다.
    protectant_formula_base:
      name: 보호제 기본 제형
      description: '광택, 촉감 및 세척 용이성에 영향을 미치는 보호제의 기본 제형을 지정합니다(예: 수성 또는 용제성).'
    protection_coverage_area:
      name: 보호 적용 범위
      description: 보호 액세서리가 시계의 어느 부분을 덮는지 나타냅니다.
    protection_level:
      name: 보호 수준
      description: 악기 운반 및 보관을 위한 케이스의 의도된 보호 수준을 나타냅니다.
    protective_case_interior_protection_type:
      name: 보호 케이스 내부 보호 유형
      description: 구성품을 안전하게 고정하고 완충하기 위해 사용되는 주요 내부 보호 방법을 설명합니다.
    protective_case_shell_type:
      name: 보호 케이스 쉘 유형
      description: 충격 보호와 휴대성에 영향을 미치는 케이스 외부의 전반적인 구조 방식, 즉 강성을 식별합니다.
    protective_contact_padding_material:
      name: 보호 접촉 패딩 소재
      description: '악기 접촉 지점에 긁힘을 방지하기 위해 사용되는 소재를 나타냅니다(예: 펠트, 고무).'
    protective_cup_configuration:
      name: 보호컵 구성
      description: 보호컵이 포함되어 있는지, 탈착 가능한지, 아니면 컵을 넣을 수 있는 주머니만 있는지 명시합니다.
    protective_eyewear_standard_compliance:
      name: 보호 안경 표준 준수
      description: 스포츠 용도로 사용하기에 적합한 안전 또는 충격 저항 표준이나 인증을 충족하거나 초과하는지 명시합니다.
    protective_gear_certification_standard:
      name: 보호 장비 인증 표준
      description: '장비가 준수하는 안전/인증 표준을 나타냅니다(장비 유형에 따라 다름: 헬멧 표준, 보호복 표준, 충격 보호대 표준).'
    protective_gear_items_included:
      name: 보호 장비 구성품 포함
      description: 여러 구성품으로 이루어진 보호 장비 세트에 포함된 개별 구성품을 나열합니다.
    protective_gear_padding_type:
      name: 보호 장비 패딩 유형
      description: 충격 보호를 위해 보호 장비에 사용되는 패딩의 유형을 지정합니다.
    protective_gear_safety_certifications:
      name: 보호 장비 안전 인증
      description: '제품이 충족하는 공인된 스포츠별 안전 또는 성능 표준을 나열합니다(예: NOCSAE 또는 ASTM 필드하키 헬멧
        표준).'
    protective_pad_components_included:
      name: 보호 패드 구성품 포함
      description: 여러 구성품으로 이루어진 세트에 어떤 특정 보호 품목이 포함되어 있는지 명시하여 소비자가 어떤 신체 부위가 보호되는지
        정확히 알 수 있도록 합니다.
    protective_shorts_intended_use:
      name: 보호용 반바지의 용도
      description: 보호용 반바지가 주로 어떤 승마/경주 종목을 위해 설계되었는지 나타냅니다.
    protective_shorts_padding_type:
      name: 보호용 쇼츠 패딩 유형
      description: 반바지에 사용되는 보호 요소의 구조/형식을 명시합니다.
    protective_shorts_padding_zones:
      name: 보호용 쇼츠 패딩 부위
      description: 보호 반바지에 패딩/보호대가 내장된 신체 부위를 식별합니다.
    protective_treatment:
      name: 보호 처리
      description: '얼룩, 물 또는 자외선에 대한 저항성을 위해 적용된 보호 마감 또는 처리(예: Teflon)를 명시합니다.'
    protector_coverage_area:
      name: 보호대 커버 범위
      description: '보호대가 덮도록 설계된 신체 부위(예: 가슴, 등, 옆구리)를 명시합니다.'
    puck_bottom_style:
      name: 퍽 바닥 방식
      description: 셔플보드 표면 종류에 따라 속도와 컨트롤에 영향을 미치는 퍽의 아랫면 프로파일을 설명합니다.
    puck_type:
      name: 퍽 유형
      description: 하키 퍽의 기능적 방식 또는 용도를 공식 경기용부터 수집용 기념품까지 분류합니다.
    pull_buoy_style:
      name: 풀 부이 방식
      description: '풀 부이의 기능적 방식 또는 구성을 나타냅니다(예: 표준형, 발목형, 풀킥 콤보형).'
    pull_through_weight_material:
      name: 풀스루 웨이트 소재
      description: 풀스루 스왑의 경우, 스왑을 악기 안으로 통과시키는 데 사용되는 웨이트의 소재를 식별합니다.
    pulp_content:
      name: 펄프 함량
      description: 음료에 함유된 과일 또는 채소 펄프의 양을 나타냅니다.
    pump_accessories_included:
      name: 펌프 포함 액세서리
      description: 소비자가 번들 구성품을 이해할 수 있도록 볼 펌프와 함께 제공되는 추가 품목을 나열합니다.
    pumping_compatibility:
      name: 펌핑 호환성
      description: 수유 브라가 수유뿐 아니라 핸즈프리 유축에도 적합하게 디자인되었는지 여부를 나타냅니다.
    punch_pad_type:
      name: 펀치 패드 유형
      description: 소비자가 자신의 훈련 요구에 맞는 패드를 선택할 수 있도록 펀칭/트레이닝 패드의 디자인 또는 방식을 명시합니다.
    punching_training_bag_shape:
      name: 펀칭/트레이닝 백 모양
      description: '헤비백의 기하학적 모양을 명시하여 소비자가 특정 타격 훈련(예: 어퍼컷, 바디샷)에 적합한 모델을 선택할 수 있도록
        합니다.'
    puncture_protection_technology:
      name: 펑크 방지 기술
      description: '타이어에 적용된 특수 또는 일반 펑크 방지층이나 측면/케이싱 보강 기술(예: EXO, SnakeSkin, Kevlar
        벨트)을 모두 나열합니다.'
    puppet_features:
      name: 인형의 특징
      description: '인형의 기능적 또는 물리적 특징을 강조합니다(예: 움직이는 입, 음향 효과, 양면 사용 가능 여부).'
    puppet_puppet_theater_accessory_type:
      name: 인형 및 인형극 무대 액세서리 유형
      description: '제품이 어떤 종류의 액세서리인지 명시합니다(예: 무대 소품, 인형 의상, 조종 막대, 교체용 줄).'
    purity_unit:
      name: 순도 단위
      description: 동전의 순도를 나타내는 방식(순도 또는 캐럿)을 설명합니다.
    push_up_bar_design:
      name: 푸시업 바 디자인
      description: '푸시업 바의 기능적 디자인 방식(예: 고정형, 회전형, 평행봉)을 나타냅니다.'
    pushrod_end_type:
      name: 푸시로드 끝단 유형
      description: 페달 또는 마스터 실린더 연결부에 사용되는 푸시로드 끝단/부착 방식을 지정합니다.
    putty_glow_activation_method:
      name: 퍼티 발광 활성화 방법
      description: '퍼티가 빛을 내도록 충전/활성화되는 방법을 설명합니다(예: 햇빛, 자외선/블랙라이트).'
    putty_glow_color:
      name: 퍼티 발광 색상
      description: 퍼티가 어둠 속에서 빛날 때 발산하는 색상을 식별합니다.
    putty_inclusions:
      name: 퍼티 함유물
      description: '퍼티 안에 포함된 주요 혼합물을 나타냅니다(예: 반짝이, 색종이 조각, 폼 비즈).'
    putty_texture:
      name: 퍼티 질감
      description: '퍼티의 주요 취급 특성을 나타냅니다(예: 탄력 있음, 잘 늘어남, 액체 같은 성질).'
    puzzle_accessory_features:
      name: 퍼즐 액세서리 기능
      description: 직소 퍼즐 부속품의 기능적 특징 및 디자인 요소를 나타냅니다(부속품 유형에 따라 다름).
    pyrometric_cone_range:
      name: 파이로메트릭 콘 범위
      description: '유약이 소성되도록 제조된 권장 파이로메트릭 콘 범위를 나타냅니다(예: 콘 06–04, 콘 5–6).'
    quarter_panel_coverage_type:
      name: 쿼터 패널 적용 범위 유형
      description: 상품 목록에 포함된 쿼터 패널 번들 구성을 지정합니다(한쪽, 한 쌍 또는 추가 수리 섹션 포함).
    quarter_panel_set_contents:
      name: 분기 패널 세트 구성
      description: 등록 정보(단일 측면, 불쾌(하다) 또는 추가 복구 섹션 포함)에 포함된 분기 패널 번들 구성을 지정합니다.
    quilting_ruler_markings:
      name: 퀼팅 자 눈금
      description: 재단/정렬에 사용되는 퀼팅 자의 인쇄된 표시 유형을 지정합니다.
    quilting_ruler_non_slip_feature:
      name: 퀼팅 자의 미끄럼 방지 기능
      description: 자가 천 위에서 밀리는 것을 줄이기 위해 미끄럼 방지 뒷면/표면 처리가 되어 있는지 여부를 나타냅니다.
    quilting_ruler_transparency:
      name: 퀼팅 자 투명도
      description: 자의 소재가 얼마나 투명하고 잘 보이는지를 나타내며, 이를 통해 아래쪽의 천과 표시를 볼 수 있습니다.
    quilting_thread_usage:
      name: 퀼팅실 용도
      description: 해당 실의 의도된 퀼팅 용도를 나타냅니다.
    quilting_thread_weight_system:
      name: 퀼팅실 굵기 체계
      description: '실 굵기를 표현하는 데 사용되는 실 사이즈/굵기 등급 체계(예: wt, Tex, Denier)를 지정하여 숫자
        사이즈를 올바르게 해석할 수 있도록 합니다.'
    quince_variety:
      name: 모과 품종
      description: 모과의 특정 재배 품종 또는 품종을 식별합니다. 품종에 따라 맛, 향, 요리 적합성이 다를 수 있기 때문입니다.
    quinoa_variety:
      name: 퀴노아 품종
      description: 퀴노아의 특정 색상 또는 품종을 식별합니다. 품종에 따라 맛, 식감, 조리 시간이 다르기 때문입니다.
    quinto_tuning_system:
      name: 퀸토 튜닝 시스템
      description: 퀸토의 조율/장력 조절 방식을 나타냅니다.
    race_car_class:
      name: 레이싱카 클래스
      description: 차량이 제작된 경기 클래스/카테고리, 즉 규정/인증 그룹을 나타냅니다.
    racing_balaclava_face_opening_style:
      name: 레이싱 바라클라바 얼굴 개구부 방식
      description: 바라클라바의 얼굴 개구부 형태는 헬멧 착용감, 밀폐성 및 편안함에 영향을 미칩니다.
    racing_balaclava_neck_coverage_length:
      name: 레이싱 바라클라바 목 보호 길이
      description: 밀폐 및 보호를 위해 슈트/목 보호대 안에 넣도록 설계된 목 스커트/드레이프의 커버 길이를 나타냅니다.
    racing_balaclava_ventilation_zones:
      name: 레이싱 바라클라바 통풍 구역
      description: 헬멧 아래 공기 흐름을 개선하기 위해 지정된 통기성/메쉬 또는 통풍 구역의 배치를 나타냅니다.
    racing_chest_guard_intended_use:
      name: 레이싱용 가슴 보호대의 용도
      description: 가슴 보호대가 설계된 주요 모터스포츠 종목 또는 사용 맥락을 나타냅니다.
    racing_chest_guard_size_type:
      name: 레이싱용 가슴 보호대 사이즈 유형
      description: 해당 제품이 청소년용, 성인용 또는 범용/조절 가능한 사이즈인지 여부를 나타냅니다.
    racing_glove_certification_standard:
      name: 레이싱 장갑 인증 표준
      description: '레이싱 장갑이 준수하는 안전 인증/표준(예: FIA, SFI, CE) 및 해당되는 경우 등급/수준을 명시합니다.'
    racing_goggles_lens_system:
      name: 레이싱 고글 렌즈 체계
      description: 고글에서 지원하는 렌즈 교체/티어오프 준비 체계를 명시합니다.
    racing_helmet_certification_standard:
      name: 레이싱 헬멧 인증 표준
      description: 레이싱 헬멧이 충족하는 안전 인증을 나타냅니다.
    racing_kart_brake_type:
      name: 레이싱 카트 브레이크 유형
      description: 카트에 장착된 주요 제동 체계 유형을 나타냅니다.
    racing_kart_class:
      name: 레이싱 카트 클래스
      description: 카트가 준수하도록 제작된 경기 클래스 또는 규정 세트를 나타냅니다.
    racing_kart_frame_material:
      name: 레이싱 카트 프레임 소재
      description: 카트의 주요 프레임/섀시 소재를 나타냅니다.
    racing_kart_seat_size:
      name: 레이싱 카트 시트 사이즈
      description: 카트 시트 사이즈 표기는 장착 적합성을 판단하는 데 사용됩니다.
    racing_neck_support_style:
      name: 레이싱 목 보호대 방식
      description: 레이싱 목 보호대/브레이스의 구조적 방식과 운전자의 몸통/헬멧과의 결합 방식을 나타냅니다.
    racing_suit_certification_standard:
      name: 레이싱 슈트 인증 표준
      description: '레이싱 슈트가 충족하는 레이싱 안전 인증/승인(예: FIA 또는 SFI 표준)을 명시합니다.'
    racing_suit_cuff_design:
      name: 레이싱 슈트 소매 디자인
      description: 장갑/부츠와 맞물려 밀폐성과 착용감을 향상시키는 데 사용되는 발목/손목 커프 유형을 나타냅니다.
    racing_suit_size_system:
      name: 레이싱 슈트 사이즈 시스템
      description: '레이싱 슈트에 사용되는 사이즈 체계를 나타냅니다(예: 알파 S-XXL, 숫자 EU/US, 청소년용).'
    racing_truck_discipline:
      name: 레이싱 트럭 종목
      description: 트럭이 주로 참가하도록 제작된 주요 레이싱 종목/형식을 명시합니다.
    rack_side_configuration:
      name: 랙 사이드 구성
      description: 랙이 매트를 한쪽 또는 양쪽에 보관하는지 여부를 나타내며, 이는 공간 효율성과 접근성에 영향을 미칩니다.
    rack_system_configuration:
      name: 랙 체계 구성
      description: 드럼 랙 체계의 전체적인 랙 배치/모양을 설명합니다.
    racket_dampener_type:
      name: 라켓 댐퍼 유형
      description: 라켓 진동 감쇠기의 설치 메커니즘 또는 작동 방식을 명시합니다.
    racket_grip_size:
      name: 라켓 그립 사이즈
      description: '라켓 핸들의 둘레를 기준으로 사이즈를 분류합니다(예: G1~G6). 이를 통해 손에 잘 맞고 편안한 그립감을 제공합니다.'
    racket_sport_shoe_court_surface:
      name: 라켓 스포츠화 코트 표면
      description: 테니스화가 설계되거나 최적화된 테니스 코트 표면을 명시하여, 선수들이 자신이 주로 경기하는 코트 표면에 맞는 아웃솔
        패턴과 고무 소재의 신발을 선택할 수 있도록 돕습니다.
    racket_string_pattern:
      name: 라켓 줄 패턴
      description: '스트링 베드의 메인 및 크로스 현 개수를 지정합니다(예: 16 x 18). 이는 컨트롤, 스핀 및 내구성에 영향을
        미칩니다.'
    racket_stringing_status:
      name: 라켓 스트링 상태
      description: 라켓이 스트링 장착 상태, 미장착 상태 또는 사전 장착 상태로 판매되는지 여부를 나타냅니다.
    racket_weight_class:
      name: 라켓 무게 등급
      description: 표준 배드민턴 "U" 무게 범주를 제공하여 플레이어가 선호하는 무게 범위 내에서 라켓을 선택할 수 있도록 합니다.
    racquet_toy_set_equipment_included:
      name: 라켓 장난감 세트 구성품 포함
      description: '장난감이나 세트에 포함된 품목을 나열합니다(예: 네트, 공, 패들/라켓).'
    racquetball_squash_training_aid_type:
      name: 라켓볼/스쿼시 훈련 장비 유형
      description: 소비자가 필요한 품목을 빠르게 찾을 수 있도록 특정 유형의 훈련 보조 도구 또는 액세서리를 분류합니다.
    radiator_cap_gasket_material:
      name: 라디에이터 캡 가스켓 소재
      description: 라디에이터 캡에 사용된 밀봉 가스켓의 소재를 나타냅니다.
    radiator_cap_pressure_relief_style:
      name: 라디에이터 캡 압력 완화 방식
      description: 라디에이터 캡의 압력 완화/배기/작동 방식을 지정하며, 이는 취급성, 안전성 및 의도된 용도에 영향을 미칠 수 있습니다.
    radiator_expansion_tank_cap_application:
      name: 라디에이터/팽창 탱크 캡 용도
      description: 해당 캡이 라디에이터 주입구용인지 또는 냉각수 팽창/오버플로우 탱크용인지를 나타냅니다.
    radiator_fan_control_type:
      name: 라디에이터 팬 제어 방식
      description: 라디에이터 팬이 어떻게 제어되거나 작동되는지를 지정합니다.
    radiator_fan_mounting_pattern:
      name: 라디에이터 팬 장착 패턴
      description: 팬 또는 팬 어셈블리를 부착하는 데 사용되는 장착 방식/패턴을 지정합니다.
    radiator_fan_type:
      name: 라디에이터 팬 유형
      description: 라디에이터 팬 어셈블리의 기능 유형/구성을 지정합니다.
    radiator_hose_end_type:
      name: 라디에이터 호스 끝단 유형
      description: 라디에이터 호스 끝단이 라디에이터/엔진 포트와 연결될 때 사용되는 주요 연결/밀봉 방식을 지정합니다.
    radiator_hose_position:
      name: 라디에이터 호스 위치
      description: 냉각 체계 내에서 라디에이터 호스의 기능적 위치/유형을 나타냅니다.
    radiator_hose_shape:
      name: 라디에이터 호스 모양
      description: 설치 경로 및 장착에 사용되는 호스의 전체적인 형상/형태를 나타냅니다.
    radiator_overflow_tank_level_sensor_provision:
      name: 라디에이터 오버플로우 탱크 수위 센서 장착 가능
      description: 탱크에 냉각수 수위 센서가 포함되어 있는지 또는 이를 지원하는지 여부를 나타냅니다.
    radiator_overflow_tank_shape:
      name: 라디에이터 오버플로우 탱크 형상
      description: 오버플로우 탱크 본체의 전체적인 형태를 나타냅니다.
    radish_variety:
      name: 무 품종
      description: '무의 재배 품종 또는 유형을 명시하여 소비자가 특정 맛, 색상 또는 사이즈 특성을 선택할 수 있도록 합니다(예:
        다이콘, 워터멜론, 프렌치 브렉퍼스트).'
    radius_of_hollow:
      name: 할로우 반지름
      description: 연마기로 형성된 칼날의 할로우 프로파일을 지정하며, 일반적인 개별 사이즈 또는 플랫으로 표현됩니다.
    rail_coverage_configuration:
      name: 레일 커버 구성
      description: 커버 세트가 아기 침대의 어느 부분을 보호하는지 나타내며, 구매 품목이 단일 전면 패널인지 여러 조각으로 구성된
        둘레 세트인지 명확히 합니다.
    rail_mount_standard:
      name: 레일 마운트 표준
      description: 'BB탄 총에 액세서리(예: 조준경, 손전등)를 부착하는 데 사용되는 레일 또는 장착 인터페이스 표준을 식별합니다.'
    rail_side:
      name: 레일 측면
      description: 교체용 레일이 좌측용인지, 우측용인지, 또는 한 쌍으로 판매되는지를 나타냅니다.
    rail_style:
      name: 레일 방식
      description: '레일의 전체적인 디자인이나 구성(예: A-프레임, 레인보우형, 꺾인형)을 분류하여 가능한 트릭과 필요한 공간을
        결정합니다.'
    rail_system:
      name: 레일 체계
      description: '총기에 장착된 액세서리 장착 인터페이스(예: 피카티니 레일, M-LOK)를 식별합니다.'
    rain_sensor_technology:
      name: 우적 감지 센서 기술
      description: 앞유리에 맺힌 물을 감지하는 데 사용되는 감지 원리를 나타냅니다.
    rain_suit_configuration:
      name: 우비 구성
      description: 해당 제품이 일체형 커버올인지, 여러 부분으로 구성된 세트인지, 아니면 다른 구성인지 식별합니다.
    rainstick_construction_type:
      name: 레인스틱 구조 유형
      description: 레인스틱이 어떻게 제작되었는지를 설명합니다(전통적인 선인장/나무 튜브 방식 또는 현대적 대체 방식).
    rainstick_fill_material:
      name: 레인스틱 충전재
      description: '폭포처럼 이어지는 소리를 내는 데 사용되는 내부 충전재를 지정합니다(예: 씨앗, 구슬).'
    rainstick_playing_technique:
      name: 레인스틱 연주 기법
      description: 레인스틱에서 의도한 효과를 내기 위해 권장되는 연주 기법 또는 취급 방식을 나타냅니다.
    rainstick_sound_character:
      name: 레인스틱 소리 특성
      description: 레인스틱이 만들어내는 전반적인 음향 특성을 설명합니다.
    raising_method:
      name: 사육 방법
      description: '도축 전 동물의 사육 및 마무리 과정을 설명합니다(예: 풀을 먹여 키운, 방목하여 키운, 곡물로 마무리한).'
    rally_competition_class:
      name: 랠리 경기 클래스
      description: 규정 등급(알려진 경우).랠리카가 맞춰 제작된 경기 주관 단체 또는 규정 등급을 나타냅니다(알려진 경우).
    rally_surface_setup:
      name: 랠리 노면 세팅
      description: 랠리카의 세팅 또는 제작이 목표로 하는 주요 노면/지형을 나타냅니다.
    ramp_surface_texture:
      name: 램프 표면 질감
      description: 경사로 주행면의 마감 또는 접지력 수준을 설명합니다.
    ratchet_mounting_style:
      name: 라쳇 장착 스타일
      description: 음악 래칫이 연주 또는 세팅 중에 어떻게 잡히거나 장착되는지를 나타냅니다.
    rattle_element_material:
      name: 딸랑이 요소 소재
      description: '특유의 윙윙거림/딸랑거림을 내는 요소의 소재를 나타냅니다(예: 이빨, 징글, 구슬).'
    rattle_type:
      name: 딸랑이 유형
      description: 루어에 내부 딸랑이 또는 소리 챔버가 있는지 여부와, 있다면 사용된 딸랑이의 방식을 나타냅니다.
    rc_airship_lifting_gas_type:
      name: RC 비행선 부양 가스 유형
      description: 해당되는 경우, 비행선/블림프 외피에 채워질 가스의 유형을 나타냅니다.
    rc_helicopter_control_frequency:
      name: RC 헬리콥터 제어 주파수
      description: '컨트롤러와 헬리콥터 간에 사용되는 무선 주파수 대역을 나타내며, 이는 간섭 저항성 및 호환성에 영향을 미칩니다(예:
        2.4GHz).'
    rc_helicopter_stabilization_features:
      name: RC 헬리콥터 안정화 기능
      description: 비행을 더 쉽게 하거나 비행 능력을 향상시키는 안정성/제어 보조 기능을 나열합니다.
    rc_motorcycle_controller_type:
      name: RC 오토바이 조종기 유형
      description: 포함된 컨트롤러의 폼 팩터를 나타냅니다.
    rc_plane_takeoff_launch_method:
      name: RC 비행기 이륙/발사 방법
      description: 비행기가 일반적으로 어떻게 발사/이륙되는지를 나타내며, 이는 사용 가능한 장소와 방법에 영향을 미칩니다.
    rc_vehicle_controller_type:
      name: RC 차량 컨트롤러 유형
      description: RC 차량을 작동시키는 데 사용되는 컨트롤러의 폼 팩터를 지정합니다.
    rc_vehicle_scale:
      name: RC 차량 스케일
      description: '원격 조종 자동차/트럭의 축척 비율(사이즈 클래스)을 지정합니다(예: 1:10, 1:16).'
    rc_vehicle_terrain_type:
      name: RC 차량 지형 유형
      description: 원격 조종 자동차/트럭이 설계된 주요 지형을 나타냅니다.
    reach_adjustment_type:
      name: 리치 조절 유형
      description: 레버 블레이드와 핸들바 사이의 거리를 조절할 수 있는지 여부와, 조절 가능한 경우 공구 없이 조절 가능한지 또는
        공구가 필요한지를 나타냅니다.
    rear_axle_spacing:
      name: 후륜 액슬 간격
      description: 프레임 후면이 수용하도록 설계된 드롭아웃/액슬 사이즈를 나타내며, 이는 휠 호환성에 영향을 미칩니다.
    rear_axle_standard:
      name: 후륜 액슬 표준
      description: '뒷바퀴에 사용되는 액슬 인터페이스/형식을 정의합니다(예: 퀵 릴리스, 다양한 스루 액슬 규격).'
    rear_axle_type:
      name: 후륜 액슬 유형
      description: 프레임에 뒷바퀴를 고정하는 데 사용되는 체결 체계와 액슬 직경을 지정합니다.
    rear_coverage:
      name: 후면 커버 범위
      description: '비키니 하의가 엉덩이를 얼마나 덮는지 지정합니다(예: 치키, 풀).'
    rear_opening_type:
      name: 후면 개방 유형
      description: '화장실 사용 편의를 위한 후면 접근부 또는 ‘엉덩이 덮개’ 기능의 방식을 설명합니다(예: 드롭 시트, 전체 후면
        지퍼).'
    rear_seat_configuration:
      name: 뒷좌석 구성
      description: 장착 및 내부 레이아웃 선택을 지원하기 위해 뒷좌석 조립체의 구성을 지정합니다.
    rear_view_mirror_ornament_attachment_type:
      name: 백미러 장식 부착 유형
      description: '장식품이 백미러 스템 또는 하우징에 부착되는 방식을 지정합니다(예: 줄 고리, 클립, 후크).'
    rearview_mirror_mount_attachment_type:
      name: 후방 거울 부착 방식
      description: '마운트가 백미러 어셈블리(미러 본체 또는 스템)에 물리적으로 부착되는 방식을 정의합니다(예: 클램프, 클립, 스트랩,
        접착 패드, 볼트식 브래킷).'
    rebound_board_face_type:
      name: 리바운드 보드 표면 유형
      description: '반발 특성을 결정하는 표면 구성을 설명합니다(예: 평면, 경사면, 다면 디자인).'
    rebound_level:
      name: 반발 수준
      description: 벽에 부딪힌 뒤 공이 얼마나 튕겨 나오는지를 나타내어, 사용자가 무반발 디자인과 중간 반발 디자인 중에서 선택할
        수 있도록 돕습니다.
    rebound_surface_configuration:
      name: 반발면 구성
      description: 반발면의 배치와 반발의 예측 가능성을 지정합니다(단면, 양면 또는 다면, 예측 가능 또는 예측 불가).
    rebounder_design:
      name: 리바운더 디자인
      description: 제품의 구조적 방식 또는 반발 표면 구성을 정의합니다.
    rebounder_design_type:
      name: 리바운더 디자인 유형
      description: '훈련기의 주요 반발 메커니즘 또는 구조 방식을 지정합니다(예: 탄성 코드 베이스, 프레임 네트, 팝업 타깃).'
    rebounder_sides:
      name: 리바운더 측면
      description: 리바운더가 한쪽 방향에서 공을 되돌릴 수 있는지, 아니면 양쪽 방향에서 모두 되돌릴 수 있는지를 나타냅니다.
    rebounding_mechanism_type:
      name: 리바운딩 메커니즘 유형
      description: '퍽이나 공을 되돌려 보내는 데 사용되는 기술(예: 고무 범퍼, 탄성줄)을 명시합니다.'
    recipient_relationship:
      name: 수신자 관계
      description: '인사말 카드의 의도된 수신자 관계를 나타냅니다(예: 엄마, 아빠, 친구).'
    recliner_control_type:
      name: 등받이 조절 방식
      description: '등받이 조절 메커니즘의 작동 방식을 명시합니다(예: 수동 레버, 전기 버튼 패널, 리모컨).'
    recliner_motion_type:
      name: 리클라이너 구동 방식
      description: '리클라이너의 주요 움직임 기능을 정의합니다(예: 로커, 글라이더, 회전형, 벽면 밀착형, 리프트형).'
    reclining_mechanism:
      name: 리클라이닝 메커니즘
      description: 소파의 리클라이닝 기능을 작동시키는 데 사용되는 메커니즘을 명시합니다.
    recommended_candle_format:
      name: 추천 캔들 형식
      description: 이 접착식 심지 탭이 사용되도록 의도된 권장 양초 형식을 나타냅니다.
    recommended_container_type:
      name: 권장 용기 유형
      description: 젤 왁스 양초에 권장되며 안전한 용기 소재를 나타냅니다.
    recommended_fabric_type:
      name: 권장 패브릭 유형
      description: 이 재봉 패턴으로 최상의 결과를 얻기 위해 권장되는 원단을 나타냅니다.
    recommended_fabric_weight:
      name: 권장 원단 무게
      description: 패턴에 권장되는 원단 무게 범주를 나타냅니다.
    recommended_food_pairing:
      name: 추천 음식 조합
      description: '소스가 사용되도록 의도된 주요 단백질 재료 또는 요리를 식별합니다(예: 닭고기, 돼지고기, 소고기, 생선, 채소).'
    recommended_lane_condition:
      name: 권장 차선 상태
      description: 볼이 설계된 오일 패턴 또는 레인 상태를 나타냅니다.
    recommended_motor_impulse_class:
      name: 권장 모터 임펄스 등급
      description: 안전하고 최적의 비행을 위해 권장되는 모형 로켓 모터의 총 임펄스 등급을 명시합니다.
    recommended_reading_level:
      name: 권장 독서 수준
      description: 제품에 권장되는 읽기 단계/능력을 나타내어 구매자가 아동의 현재 읽기 발달 수준에 맞는 제품을 선택할 수 있도록
        돕습니다.
    recommended_sleep_position:
      name: 권장 수면 자세
      description: '매트리스가 어떤 수면 자세를 편안하게 지지하도록 설계되었는지 식별합니다(예: 옆으로 자는 자세, 바로 누워 자는
        자세).'
    recommended_storage:
      name: 권장 보관 방법
      description: 제품의 신선도를 유지하기 위해 어떻게 보관해야 하는지를 나타냅니다.
    recommended_surfaces:
      name: 권장 표면
      description: '접착제가 사용되도록 의도된 접착 표면/소재 범주를 지정합니다. 일반적인 공예용 호환성 외의 범주를 나타냅니다(예:
        종이 전용, 다중 표면용).'
    recommended_use_case:
      name: 권장 사용 사례
      description: 실란트의 주요 사용 상황을 나타냅니다(임시/긴급 수리, 장기 수리).
    recommended_use_location:
      name: 권장 사용 위치
      description: 시소가 사용되도록 의도된 환경을 나타냅니다(가정집 뒷마당, 상업용 놀이터 등).
    recommended_vehicle_surfaces:
      name: 권장 차량 표면
      description: '브러시를 안전하게 사용할 수 있도록 의도된 차량 표면/마감재를 지정합니다(예: 투명 코팅 페인트, 무광/새틴 페인트,
        비닐 랩/PPF, 유리, 휠).'
    recorder_accessories_included:
      name: 리코더 포함 액세서리
      description: 그레이트 베이스 리코더에 동봉된 액세서리 목록을 나타냅니다.
    recorder_bore_design:
      name: 레코더 보어 설계
      description: 리코더 본체의 내부 보어 프로파일 설계를 나타냅니다.
    recorder_bore_type:
      name: 리코더 보어 유형
      description: 리코더의 보어 방식을 지정합니다.
    recorder_case_shell_type:
      name: 리코더 케이스 셸 유형
      description: 케이스의 구조적 강성을 설명합니다.
    recorder_finish:
      name: 레코더 마무리
      description: 리코더 본체의 표면 마감/처리 (특히 나무 알토 리코더에 중요함).
    recorder_hole_type:
      name: 리코더 구멍 유형
      description: 톤홀이 단일 구멍인지, 아니면 향상된 반음계 운지를 위해 이중 구멍이 포함되어 있는지를 나타냅니다.
    recorder_joint_configuration:
      name: 레코더 연결부 구성
      description: 리코더 본체가 몇 개의 섹션으로 구성되어 있는지 설명하며, 이는 휴대성, 청소 및 부품 교체에 영향을 미칩니다.
    recorder_joint_style:
      name: 레코더 연결 방식
      description: 해당되는 경우, 리코더 섹션 간의 연결 방식을 나타냅니다.
    recorder_keywork:
      name: 레코더 키워크
      description: 리코더에 저음용 키(금속/플라스틱 메커니즘)가 포함되어 있는지 여부를 나타냅니다. 이는 테너/베이스/대형 리코더에서
        흔히 볼 수 있습니다.
    recorder_mouthpiece_type:
      name: 리코더 마우스피스 유형
      description: 리코더의 마우스피스/헤드조인트가 일체형인지, 아니면 분리/교체 가능한지를 설명합니다.
    recorder_pitch_standard_a4:
      name: 리코더 표준 음정(A4)
      description: '리코더가 어떤 기준 음높이에 맞춰 제작되었는지 나타냅니다(예: A=440Hz 현대 음높이, A=415Hz 바로크
        음높이).'
    recorder_thumb_hole_type:
      name: 리코더 엄지 구멍 유형
      description: 녹음기의 엄지손가락 구멍이 하나인지, 아니면 두 개인지 지정합니다.
    recreational_vehicle_holding_tank_type:
      name: 레크리에이션 차량용 오수 탱크 유형
      description: RV에 어떤 종류의 폐수 저장 탱크가 있는지 나타냅니다.
    recreational_vehicle_leveling_system:
      name: 레저용 차량 수평 조절 체계
      description: 설치된 수평 조절/안정화 체계의 유형을 나타냅니다.
    recycled_material_content:
      name: 재활용 소재 함량
      description: 의류에 포함된 재활용 섬유 또는 원사의 비율을 나타냅니다.
    reed_dent_material:
      name: 리드 덴트 소재
      description: 날실 끝을 분리하는 요소인 리드 덴트/이빨의 소재를 나타내며, 이는 내구성과 원사 마모에 영향을 미칩니다.
    reed_type:
      name: 리드 유형
      description: 백파이프 챈터와 드론에 사용되는 리드 구조 유형을 지정합니다.
    reeds_included:
      name: 리드 포함
      description: 그레이트 하이랜드 백파이프 세트에 포함된 리드의 종류와 소재를 명시합니다(챈터 및/또는 드론용, 케인 또는 합성
        소재).
    reefing_method:
      name: 리핑 방식
      description: 물 위에서 돛을 줄이거나 보관하는 장치가 있는 경우 이를 나타냅니다.
    reel_profile:
      name: 릴 프로필
      description: 베이트캐스팅 릴 본체의 구조적 방식/프로필을 분류합니다.
    reel_seat_material:
      name: 릴 시트 소재
      description: 릴 시트의 소재를 지정하며, 이는 무게, 감도 및 내식성에 영향을 미칩니다.
    reel_seat_type:
      name: 릴 시트 유형
      description: 플라이 릴을 낚싯대에 고정하는 잠금 장치의 방식을 지정합니다.
    reel_size_class:
      name: 릴 크기 등급
      description: '스풀 용량과 전체 릴 구성을 나타내는 제조업체 지정 사이즈 등급입니다(예: 1000, 3000, 5000).'
    referee_wallet_accessories_included:
      name: 심판 디지털 지갑 액세서리 포함
      description: 빨간색/노란색 카드, 점수표, 필기구 등 심판 지갑에 포함된 추가 품목 번들을 나열하여, 해당 지갑이 완전한 키트로
        판매되는지 구매자가 알 수 있도록 합니다.
    refinement_level:
      name: 정제 수준
      description: 오일의 정제 정도를 나타내며, 맛, 색상, 영양 성분 및 발연점에 영향을 미칩니다.
    reflective_finish:
      name: 반사 마감
      description: '디스코볼의 반사 표면 처리 방식을 지정합니다(예: 거울 타일, 홀로그램/무지갯빛 효과).'
    reflective_or_glow_effect:
      name: 반사 또는 발광 효과
      description: 안테나 볼에 반사 소재, 야광, 발광/LED 요소 등 시인성 효과가 있는지 여부를 나타냅니다.
    reflective_tape_pattern:
      name: 반사 테이프 무늬
      description: 의류에 부착된 반사 테이프의 구성을 설명하며, 이는 가시성 요건을 충족하는 데 사용됩니다.
    regulation_standard:
      name: 규제 기준
      description: 해당 네트워크가 충족하는 공식 표준 또는 관리 기관의 규격/인증을 명시합니다.
    regulator_diaphragm_material:
      name: 조절기 다이어프램 재질
      description: '다이어프램 재질을 지정하며, 이는 연료/에탄올 호환성(예: E85) 및 내구성에 영향을 미칩니다.'
    regulator_port_thread_standard:
      name: 레귤레이터 포트 나사산 표준
      description: 레귤레이터 본체의 입구/출구/리턴 포트에 사용되는 포트 나사산/연결 표준을 지정합니다.
    rein_features:
      name: 고삐 기능
      description: 고삐에 있는 특별한 기능 또는 안전 장치를 강조합니다.
    rein_style:
      name: 고삐 방식
      description: 고삐의 구조적 설계 또는 구성을 식별하여 기수가 자신의 종목과 개인 선호도에 맞는 유형을 선택할 수 있도록 합니다.
    reinforced_areas:
      name: 강화된 영역
      description: 의류의 어느 부분이 마모에 대한 내구성을 위해 보강되었는지 식별합니다.
    reinforcement_type:
      name: 보강 유형
      description: 라디에이터 호스에 사용되는 구조 보강재를 나타내며, 이는 강도 및 온도/압력 저항성을 높입니다.
    release_activation_method:
      name: 릴리스 활성화 방법
      description: 궁수가 활시위 릴리스 보조 장치를 어떻게 조작하는지 명시합니다.
    release_bearing_material:
      name: 릴리스 베어링 소재
      description: 베어링/페이스 구성품의 주요 소재를 나타냅니다(제조업체에서 지정한 경우).
    release_jaw_style:
      name: 릴리스 조 방식
      description: 릴리스 헤드의 조 또는 후크 설계를 설명합니다.
    release_strap_type:
      name: 릴리스 스트랩 유형
      description: 양궁 릴리스 보조 장치와 함께 제공되는 스트랩 또는 연결 체계를 식별합니다.
    remote_control_airship_envelope_material:
      name: 원격 조종 비행선 외피 소재
      description: 전체 장난감 소재와는 별개로, 소형 비행선/비행선 외피의 주요 소재를 명시합니다.
    remote_control_motorcycle_scale:
      name: RC 오토바이 스케일
      description: 실제 오토바이를 기준으로 한 RC 오토바이의 축척 비율을 나타냅니다(축척 차량으로 모델링된 경우).
    remote_control_motorcycle_terrain_suitability:
      name: 원격 조종 오토바이 적합 지형
      description: RC 오토바이가 작동하도록 설계된 주요 지형을 나타냅니다.
    remote_control_motorcycle_water_resistance:
      name: 원격 조종 오토바이 방수 수준
      description: RC 오토바이 전자 부품의 방수 수준을 나타냅니다.
    remote_control_plane_kit_completion_level:
      name: 원격 조종 비행기 키트 완성 수준
      description: '포함된 구성품과 세트의 완성 수준을 나타냅니다(예: 바로 비행 가능, 송수신기/배터리 별도 필요).'
    remote_control_plane_landing_gear_type:
      name: 원격 조종 비행기 착륙 장치 유형
      description: 착륙 장치 구성을 나타내며, 이는 내구성과 이착륙 가능 표면에 영향을 미칩니다.
    remote_control_plane_power_type:
      name: 원격 제어 비행기 전원 유형
      description: '비행기의 동력/추진 유형을 명시하며, 이는 유지보수, 소음 및 비행 가능 장소에 영향을 미칩니다(예: 전기식,
        글로우/가솔린/니트로).'
    remote_control_watercraft_features:
      name: 원격 조종 수상 차량 특징
      description: RC 수상기의 사용성과 내구성에 영향을 미치는 주요 특징을 강조합니다.
    remote_control_watercraft_propulsion_drive_type:
      name: 원격 조종 수상 차량 추진/구동 유형
      description: 원격 조종 수상 차량이 물에서 구동되는 방식을 명시합니다.
    remote_control_watercraft_water_environment:
      name: 원격 조종 수상 차량 수면 환경
      description: RC 수상 차량이 최상의 성능을 발휘하는 의도된 수면 조건을 나타냅니다.
    remote_keyless_system_programming_method:
      name: 원격 키리스 시스템 프로그래밍 방법
      description: '리모컨/시스템을 차량에 프로그래밍하거나 페어링하는 방법을 나타냅니다(예: 차량 내 절차, 전문 도구 사용).'
    repair_compound_type:
      name: 수리용 화합물 유형
      description: '포함된 소모성 수리 소재의 유형/제형을 나타냅니다(예: 차체 필러, 앞유리 레진, 타이어 플러그 시멘트/실란트).'
    repair_kit_components:
      name: 수리 키트 구성품
      description: 수리 키트에 포함된 특정 품목을 나열하여 구매자가 구성품을 이해하고 번들을 비교할 수 있도록 합니다.
    repair_method:
      name: 수리 방법
      description: '키트에서 사용하는 주요 수리 방법(예: 접착식 패치 부착 또는 밸브 교체)을 명시합니다.'
    replacement_part_purpose:
      name: 교체 부품 용도
      description: 품목이 OEM 교체 부품, 업그레이드/성능 부품 또는 추가 액세서리인지 여부를 나타냅니다.
    replacement_part_type:
      name: 교체 부품 유형
      description: 일립티컬 트레이너 부품의 기능 범주를 식별하여 구매자가 필요한 부품을 필터링할 수 있도록 합니다.
    replacement_parts_availability:
      name: 교체 부품 제공 여부
      description: '실꿰기 도구에 소모품/교체 부품이 지원되는지 여부를 나타냅니다(예: 교체용 후크/와이어).'
    replica_gun_action_type:
      name: 모형 총기 작동 방식
      description: '모형 총기의 작동 방식(예: 볼트액션 또는 레버액션)을 명시합니다.'
    replica_gun_firing_mechanism:
      name: 모형 총 발사 방식
      description: '모형이 발사/작동 기능을 모방하는지 여부와 그 방식을 나타냅니다(비살상 기능, 예: 캡 발사 또는 비발사).'
    replica_gun_moving_parts:
      name: 모형 총의 움직이는 부품
      description: 모형에서 기능적이거나 움직일 수 있는 부분을 나타냅니다.
    reservoir_orientation:
      name: 리저버 방향
      description: 팩 내부 블래더의 의도된 방향 또는 프로필을 지정합니다.
    reservoir_type:
      name: 리저버 유형
      description: 클러치 마스터 실린더 리저버의 구성 유형을 나타냅니다.
    resin_suitability:
      name: 수지 적합성
      description: 핸드볼이 레진 사용에 적합하도록 설계되었는지, 아니면 레진 프리 제품인지 명시합니다.
    resistance_adjustability:
      name: 저항 조절 가능 여부
      description: 사용자가 호흡 저항을 변경할 수 있는지 여부를 지정합니다.
    resistance_band_design:
      name: 저항 밴드 형태
      description: '저항 밴드의 물리적 형태 또는 방식(예: 루프형, 손잡이가 달린 튜브형, 8자형)을 설명하여 구매자가 자신의 운동
        루틴에 맞는 형태를 선택할 수 있도록 돕습니다.'
    resistance_loading_type:
      name: 저항 부하 유형
      description: '스미스 머신에 저항/중량이 제공되거나 장착되는 방식을 나타냅니다(예: 플레이트 로드 방식, 선택식 중량 스택 방식).'
    response_fields_included:
      name: 포함된 응답 필드
      description: '응답 카드에 포함된 표준 응답 필드/옵션을 지정합니다(예: 수락/거절, 식사 선택).'
    restoration_status:
      name: 복원 상태
      description: 해당 밴이 원형 상태인지, 복원된 상태인지, 레스토모드 상태인지, 아니면 프로젝트 상태인지를 나타냅니다.
    rhinestone_base_color_family:
      name: 라인스톤 기본 색상 계열
      description: '라인스톤 베이스의 색상 계열을 식별합니다(예: 투명색/크리스탈, 금색/노란색, 파란색).'
    rhinestone_facet_style:
      name: 라인스톤 패싯 방식
      description: '라인스톤의 반짝임과 외관에 영향을 미치는 면/패싯 무늬를 나타냅니다(예: 자일리온 로즈, 브릴리언트 컷, 패싯
        처리, 매끄러운 표면).'
    rhinestone_hole_reinforcement_material:
      name: 라인스톤 구멍 보강 소재
      description: '구멍 주변/구멍 부위의 소재를 나타내며, 이는 봉제 시 내구성에 영향을 미칩니다(예: 금속 그로밋, 성형 플라스틱).'
    rhinestone_setting_type:
      name: 라인스톤 세팅 유형
      description: '재봉을 위해 스톤을 장착하거나 가장자리를 처리하는 방식을 나타냅니다(예: 프롱 세팅, 베젤 세팅, 림 세팅).'
    rhubarb_product_cut_type:
      name: 루바브 제품 절단 유형
      description: 루바브 제품의 물리적 준비 또는 절단 방식을 설명합니다.
    ribbon_construction:
      name: 리본 구조
      description: '와이어가 들어있거나 신축성이 있는 등 그로그랭 리본의 주요 구조적 특징을 설명하고, 이러한 특징에 따라 용도가
        달라지는 점(예: 리본 매듭 vs. 바느질)을 설명합니다.'
    ribbon_packaging_type:
      name: 리본 포장 유형
      description: 리본이 제공/판매되는 방식을 나타냅니다.
    ribbon_pattern_style:
      name: 리본 패턴 스타일
      description: 그로그랭 리본에 일반적으로 사용되는 패턴 적용 방식을 분류합니다.
    ribbon_sheen_level:
      name: 리본 광택 수준
      description: 새틴 리본 표면의 시각적 광택/윤기를 나타냅니다.
    ribbon_style:
      name: 리본 스타일
      description: '리본의 시각적 무늬/스타일을 지정합니다(예: 단색, 줄무늬, 삼색).'
    ribbon_trim_backing_type:
      name: 리본/트림 뒷면 유형
      description: 리본/트림에 뒷면 처리가 있는지, 있다면 어떤 유형인지 나타냅니다(쉽게 부착할 수 있도록).
    ribbon_trim_edge_finish:
      name: 리본/트림 가장자리 마감
      description: 리본/트림의 가장자리 구조/마감 처리를 설명합니다. 이는 올 풀림 양상과 의도된 용도를 파악하는 데 유용합니다.
    ric_rac_wave_size:
      name: 리크랙 웨이브 사이즈
      description: 리크랙의 물결 진폭/축척을 설명합니다(지그재그/물결의 크기).
    rice_grain_length:
      name: 쌀알 길이
      description: 쌀 제품을 쌀알 길이에 따라 단립종, 중립종, 장립종으로 분류하며, 이는 조리 특성과 요리 용도에 영향을 미칩니다.
    rice_processing_method:
      name: 쌀 가공 방식
      description: '쌀의 가공 또는 준비 방식과 이것이 조리 시간, 영양 및 활용에 미치는 영향을 설명합니다(예: 반숙, 발아, 플레이크).'
    rice_variety:
      name: 쌀 품종
      description: 특정 품종이나 재배종을 명시하여 구매자가 선호하는 맛, 향, 식감 및 용도에 맞는 쌀을 선택할 수 있도록 합니다.
    riding_toy_features:
      name: 승용 장난감 특징
      description: 승용 장난감에 특화된 일반적인 기능/안전 특징을 강조합니다.
    rifle_action_type:
      name: 소총 작동 유형
      description: 소총의 작동 장치를 설명합니다. 이는 소총이 장전/발사/탄피 배출되는 방식으로, 식별 및 수집가 관심도에 중요한
        요소입니다.
    rifle_finish:
      name: 소총 마감
      description: 금속 표면의 주요 외부 마감/코팅.
    rifle_magazine_type:
      name: 소총 탄창 유형
      description: 소총의 급탄 체계 유형을 나타냅니다.
    rifle_stock_material:
      name: 소총 개머리판 소재
      description: '소총 개머리판/부속 외장에 사용되는 주요 소재를 나타냅니다(예: 호두나무, 폴리머).'
    rim_clamping_method:
      name: 림 클램핑 방식
      description: 휠/림을 장착 및 탈착하는 동안 기계가 어떻게 고정하는지.
    rim_strip_type:
      name: 림 스트립 유형
      description: '방식, 구조 또는 특정 용도에 따라 스트립/테이프를 분류합니다(예: 튜블리스 림 테이프, 보호 고무 스트립).'
    rim_tubeless_compatibility:
      name: 림 튜브리스 호환성
      description: 림, 테이프 또는 휠이 튜블리스 타이어 구성에 맞게 설계되었는지 여부를 나타냅니다.
    ripeness_stage:
      name: 숙성 단계
      description: '판매 시점의 과일 숙성 수준을 나타냅니다(예: 덜 익은, 익은, 바로 먹을 수 있는).'
    riser_pad_type:
      name: 라이저 패드 유형
      description: '패드의 기능적 방식을 분류합니다(예: 표준 스페이서, 충격 흡수형, 각진 웨지형).'
    roasted_malt_processing_type:
      name: 볶은 맥아 가공 유형
      description: '볶은 맥아 또는 볶은 곡물을 만드는 데 사용되는 특정 가공 방법 또는 변형을 나타냅니다(예: 비맥아 볶은 보리,
        블랙 몰트, 쓴맛을 줄이거나 껍질을 제거한 변형).'
    robotic_toy_interaction_mode:
      name: 로봇 장난감 상호작용 모드
      description: 게임 중 로봇의 주요 상호 작용 방식 또는 이동 방식을 설명합니다.
    robotic_toy_light_features:
      name: 로봇 장난감 조명 기능
      description: '해당 장난감이 놀이의 일부로 조명을 사용하는지 여부와 사용 방식을 나타냅니다(예: LED, 프로젝션).'
    robotic_toy_programming_supported:
      name: 로봇 장난감 프로그래밍 지원
      description: 해당 장난감이 지원하는 프로그래밍 방식(있는 경우)을 명시합니다.
    robotic_toy_skill_level:
      name: 로봇 장난감 기술 수준
      description: 사용자가 수행해야 하는 작업/프로그래밍의 복잡성 수준을 나타냅니다.
    robotic_toy_sound_features:
      name: 로봇 장난감 소리 기능
      description: 로봇 장난감의 소리 기능을 나타냅니다.
    rod_butt_style:
      name: 낚싯대 버트 방식
      description: 트롤링 용도에 사용되는 낚싯대 버트 끝부분의 구성을 정의합니다.
    rod_construction_type:
      name: 로드 구조 유형
      description: 낚싯대의 전체적인 제작 방식, 즉 섹션 수와 접이 가능 여부를 나타냅니다.
    rod_guide_material:
      name: 낚싯대 가이드 소재
      description: 낚싯대의 라인 가이드 또는 인서트에 사용되는 소재를 명시하며, 이는 내구성, 무게 및 라인 마찰에 영향을 미칩니다.
    rod_guide_type:
      name: 낚싯대 가이드 유형
      description: 낚싯대에 설치된 라인 가이드의 주요 방식을 지정합니다.
    rod_handle_type:
      name: 낚싯대 손잡이 유형
      description: 낚싯대의 그립 형태를 지정하여 편안함과 낚시 기법 선택에 도움을 줍니다.
    roll_cage_tubing_material:
      name: 롤 케이지 튜브 소재
      description: '롤 케이지/롤 바에 사용된 튜브 소재/합금을 명시합니다(예: DOM 강, 4130 크롬몰리).'
    roller_skate_brake_shape:
      name: 롤러스케이트 브레이크 모양
      description: 성능 또는 미적 선호도에 따른 브레이크 헤드의 기하학적 모양/프로필을 설명합니다.
    roller_skate_brake_type:
      name: 롤러스케이트 브레이크 유형
      description: 롤러스케이트에 사용되는 제동 체계를 명시합니다.
    roller_ski_technique:
      name: 롤러스키 기술
      description: 롤러스키가 설계된 용도에 맞는 크로스컨트리 스키 기술을 설명합니다.
    roller_technology:
      name: 롤러 기술
      description: 진동이나 열과 같이 마사지 효과를 향상시키는 통합 기술을 나타냅니다.
    rolling_case_wheel_configuration:
      name: 롤링 케이스 휠 구성
      description: 롤링형 건반 케이스에 사용되는 바퀴 구성을 지정합니다.
    rolling_paper_format:
      name: 롤링 페이퍼 형식
      description: '제품의 물리적 형태(예: 평평한 시트, 미리 말아놓은 콘, 포장재)를 식별합니다.'
    rolling_paper_gum_type:
      name: 롤링 페이퍼 접착제 유형
      description: 롤링 페이퍼 가장자리를 밀봉하는 데 사용되는 접착제(검)를 명시합니다. 이는 맛과 품질에 영향을 미칠 수 있습니다.
    rolling_paper_size:
      name: 롤링페이퍼 사이즈
      description: 롤링 페이퍼 또는 콘의 표준 사이즈 분류를 나타내며, 구매자가 필요에 맞는 너비/길이를 빠르게 선택할 수 있도록
        합니다.
    rolling_stock_type:
      name: 철도 차량 유형
      description: 모델이 어떤 종류의 열차/철도 차량인지 지정합니다(기관차, 객차/화차 및 일반 차량 하위 유형).
    roof_cargo_net_hook_fastener_style:
      name: 루프 화물망 후크/고정 장치 방식
      description: '그물을 고정 지점에 연결하는 데 사용되는 끝단 하드웨어의 방식을 지정합니다(예: S자 고리, 카라비너, J자 고리).'
    roof_height_class:
      name: 루프 높이 등급
      description: 밴에 일반적으로 사용되는 지붕 높이를 분류합니다(특히 컨버전/캠퍼 제작에 관련성이 높음).
    roof_type:
      name: 지붕 유형
      description: 인클로저의 지붕 또는 천장 부분의 구성을 나타냅니다.
    root_variety:
      name: 뿌리 품종
      description: '뿌리의 품종 또는 일반적인 유형을 식별합니다(예: 서양고추냉이, 진짜 와사비 품종).'
    rope_buoyancy:
      name: 로프 부력
      description: 로프가 수면에 뜨도록 설계되어 라이더의 얽힘을 방지하고 회수를 쉽게 하는지 여부를 명시합니다.
    rope_construction:
      name: 로프 구조
      description: 편조 방식 외의 섬유 구조 세부 정보를 명시합니다. 예를 들어 코어/외피가 꼬임 또는 편조 구조인지, 로프가 케른맨틀
        방식인지 여부를 나타냅니다.
    rope_material:
      name: 로프 소재
      description: 튜닝 로프/코드의 소재를 식별합니다.
    rope_strand_compatibility:
      name: 로프 가닥 호환성
      description: 빌레이 장치가 처리할 수 있는 로프 가닥 구성(싱글, 하프/더블, 트윈 또는 조합)을 나타냅니다.
    rope_stretch_type:
      name: 로프 신축 유형
      description: 로프의 신축 특성을 설명하고, 무신축, 저신축, 표준 또는 번지 방식으로 구분합니다.
    rose_bloom_stage:
      name: 장미꽃 개화 단계
      description: 배송/도착 시 장미꽃이 얼마나 활짝 피었는지(봉오리 상태에서 완전히 핀 상태까지)를 나타냅니다.
    rose_grade:
      name: 장미 등급
      description: 절화 장미의 상업적 품질 등급을 나타냅니다.
    rosette_center_type:
      name: 로제트 중앙 장식 유형
      description: 로제트 앞면의 중앙 장식 또는 삽입물 유형을 지정합니다.
    rosin_dust_level:
      name: 송진 가루 수준
      description: 정상적인 사용 중에 생성될 것으로 예상되는 송진 분진의 양을 나타냅니다.
    rosin_formula_additives:
      name: 송진 배합/첨가제
      description: 저자극성, 저분진 또는 금속 함유 혼합물 등 주목할 만한 배합 특징을 식별합니다.
    rosin_hardness:
      name: 송진 경도
      description: 활에 사용하는 송진의 상대적인 경도/부드러움을 나타내며, 이는 기후 및 연주 방식에 따라 활의 그립감과 송진 가루
        발생에 영향을 미칠 수 있습니다.
    rotation_mechanism_type:
      name: 회전 메커니즘 유형
      description: '로프가 회전할 수 있게 하는 장치를 명시하며, 이는 부드러움과 도달 가능한 속도에 영향을 미칩니다(예: 볼 베어링,
        부싱).'
    rotation_motion_features:
      name: 회전/동작 기능
      description: 행성/궤도가 자전하는지 또는 움직이는지, 그리고 어떻게 움직이는지를 나타냅니다.
    rotor_configuration_type:
      name: 로터 구성 유형
      description: 'RC 헬리콥터의 로터 구성 및 제어 방식을 식별합니다(예: 동축 로터, 단일 로터 고정 피치, 콜렉티브 피치,
        멀티로터). 이는 비행 특성과 다양한 기술 수준에 대한 적합성에 상당한 영향을 미칩니다.'
    rotor_construction_type:
      name: 로터 구조 유형
      description: 로터 제작 방식을 지정하며, 이는 무게, 강성 및 열 관리에 영향을 미칩니다.
    rotor_mounting_interface:
      name: 로터 장착 인터페이스
      description: 로터를 휠에 장착하는 데 사용되는 허브 인터페이스 표준을 정의합니다.
    rotor_mounting_standard:
      name: 로터 장착 규격
      description: '로터를 허브에 고정하는 데 사용되는 인터페이스 표준을 지정합니다(예: 6볼트, 센터락).'
    roulette_set_components_included:
      name: 룰렛 세트 구성품 포함
      description: 룰렛 휠/세트에 포함된 주요 룰렛 관련 구성품을 나타냅니다.
    roulette_wheel_ball_track_type:
      name: 룰렛 휠 볼 트랙 유형
      description: 휠에 사용되는 볼 트랙 방식을 설명하며, 이는 사실감과 플레이 감각에 영향을 미칩니다.
    roulette_wheel_numbering_system:
      name: 룰렛 휠 번호 체계
      description: 게임 플레이/배당률 호환성을 위한 룰렛 휠의 번호 체계와 제로 구성을 나타냅니다.
    rounders_equipment_included:
      name: 라운더스 장비 포함
      description: 훈련 보조 도구 세트 또는 팩에 제공되는 특정 라운더스 품목 또는 액세서리 목록을 나열하여, 구매자가 상자 안에
        무엇이 들어 있는지 정확히 알 수 있도록 합니다.
    rounders_governing_body_approval:
      name: 라운더스 관리 기관 승인
      description: 공식 라운더스 또는 기타 스포츠 관리 기관의 인증 또는 승인을 나타냅니다.
    row_counter_format:
      name: 행 카운터 형식
      description: '뜨개질 단수 카운터의 형식/방식을 지정합니다(예: 링, 체인, 클릭커, 디지털).'
    row_counter_mechanism:
      name: 행 카운터 메커니즘
      description: 도구에서 단수 카운트가 넘어가거나 기록되는 방식을 지정합니다.
    row_counter_mounting_method:
      name: 행 카운터 장착 방법
      description: 카운터/마커가 사용 중에 어떻게 부착되는지 (바늘, 손가락, 작업물 등에).
    rowel_type:
      name: 로웰 유형
      description: 기승자의 선호도와 말의 민감도에 따라 로웰의 모양 또는 가장자리 프로필을 설명합니다.
    rowing_machine_part_type:
      name: 로잉 머신 부품 유형
      description: 구매자가 세부 카테고리를 과도하게 늘리지 않고도 필요한 정확한 부품을 빠르게 찾을 수 있도록, 제품이 로잉 머신에서
        교체하도록 설계된 특정 부품을 식별합니다.
    rubber_ducky_character_theme:
      name: 고무 오리 캐릭터/테마
      description: 고무 오리의 테마 또는 캐릭터 방식을 나타냅니다(노벨티/수집용 오리에 유용).
    rubber_ducky_features:
      name: 고무 오리 특징
      description: 고무 오리 목욕 장난감에 특화된 기능/디자인 특징을 나타냅니다.
    rubber_ducky_size_class:
      name: 고무 오리 사이즈 등급
      description: '일반적인 용도를 기준으로 고무 오리를 구매자가 이해하기 쉬운 사이즈 그룹으로 분류합니다(예: 욕조 장난감, 케이크
        토퍼, 점보).'
    ruffle_style:
      name: 러플 방식
      description: 의자 새시에 달린 러플의 구조 또는 시각적 방식을 설명합니다.
    rugby_headgear_safety_certification:
      name: 럭비 헬멧 안전 인증
      description: 해당 머리 보호구가 공식 럭비 또는 일반 스포츠 안전 기준을 충족하는지 여부를 나타냅니다.
    rugby_size:
      name: 럭비 사이즈
      description: 제품명에 사용되는 일반적인 럭비 전용 사이즈 라벨을 기준으로 장비를 분류합니다.
    rugby_variant:
      name: 럭비 유형
      description: 제품의 용도에 맞는 럭비 유형(코드 또는 형식)을 지정합니다.
    ruler_edge_type:
      name: 자 모서리 유형
      description: '측정 또는 표시용 자 모서리의 프로필/기능을 식별합니다(예: 직선 모서리, 경사 모서리, 립).'
    ruler_marking_style:
      name: 자 표시 방식
      description: 기본 눈금 외에 자에 인쇄된 표시/안내 레이아웃을 설명합니다.
    runner_configuration:
      name: 러너 구성
      description: 썰매 날의 개수와 배열을 설명합니다.
    runner_material:
      name: 러너 소재
      description: 썰매의 러너 또는 글라이드 스트립에 사용되는 소재를 명시합니다.
    saddle_cover_style:
      name: 안장 커버 방식
      description: '제품의 전체적인 디자인 또는 사용 방식을 분류합니다(예: 보관 커버, 승차용 커버, 휴대용 가방).'
    saddle_design:
      name: 안장 디자인
      description: '안장의 전체적인 인체공학적 또는 압박 완화 디자인/방식을 분류합니다(예: 컷아웃, 노즈리스, 스플릿 노즈, 스프링식).'
    saddle_discipline:
      name: 안장 승마 종목
      description: 안장의 주된 승마 종목 또는 용도/방식을 명시합니다.
    saddle_mounting_type:
      name: 안장 장착 유형
      description: '호환성을 위한 안장과 시트포스트 간 결합 방식을 지정합니다(예: 레일형, 피벗형, I-빔형).'
    saddle_pad_shape:
      name: 안장 패드 모양
      description: 패드의 물리적 재단/윤곽을 설명하며, 이는 안장 호환성과 미적 선호도에 영향을 미칩니다.
    saddle_pad_style:
      name: 새들 패드 스타일
      description: 패드의 기능적 방식 또는 용도 종목을 식별하여, 라이더가 자신의 활동이나 안장 유형에 맞는 디자인을 선택할 수 있도록
        합니다.
    saddle_padding_material:
      name: 안장 패딩 소재
      description: 안장 내부의 주요 쿠션 소재 또는 기술을 나타내며, 이는 편안함과 승차감에 영향을 미칩니다.
    saddle_rail_material:
      name: 안장 레일 소재
      description: 자전거 안장 아래쪽 레일에 사용되는 소재를 명시하며, 이는 강도, 편안함, 무게 및 가격에 영향을 미칩니다.
    saddle_tree_material:
      name: 안장 트리 소재
      description: 안장틀, 즉 안장의 내부 프레임에 사용되는 소재를 명시합니다.
    saddle_tree_width:
      name: 안장틀 너비
      description: 말의 어깨 부분에 얼마나 잘 맞는지를 결정하는 안장틀의 너비 분류에 대해 설명합니다.
    safety_documentation_available:
      name: 안전 문서 제공 여부
      description: '해당 성분에 대해 제공되는 규정 준수/안전 문서를 나타냅니다(예: 안전 데이터 시트, IFRA 인증서/진술서,
        알레르겐 진술서/선언서).'
    safety_equipment_included:
      name: 안전 장비 포함
      description: 키트에 포함된 안전/보호 품목을 나타냅니다.
    safety_features:
      name: 안전 기능
      description: 우발적인 베임을 줄이거나 보관 중 칼날을 보호하기 위한 내장 안전 기능을 나타냅니다.
    safety_harness_type:
      name: 안전 하네스 유형
      description: 시트와 함께 제공되는 어린이 고정용 하네스의 방식과 구성을 나타냅니다.
    safety_mechanism_type:
      name: 안전 메커니즘 유형
      description: 리프트 실패 시 바벨을 잡아주는 내장 안전 체계의 방식을 설명합니다.
    safety_restraint_type:
      name: 안전 고정 장치 유형
      description: 그네 의자에 내장된 유아용 안전 고정 장치의 유형을 나타냅니다(있는 경우).
    safety_warning:
      name: 안전 경고
      description: '해당 제품에 구슬과 관련된 일반적인 장난감 안전 경고(예: 질식 위험)가 표시되어 있는지 여부를 나타냅니다.'
    sail_shape:
      name: 돛 모양
      description: 카약 돛의 기하학적 방식을 설명하며, 이는 효율성, 조작감, 장착에 영향을 미칩니다.
    salad_dressing_type:
      name: 샐러드 드레싱 종류
      description: '드레싱의 기본적인 방식이나 질감(예: 크리미, 비네그레트, 요거트 베이스)을 식별하여 구매자가 다양한 베이스와
        질감을 구별할 수 있도록 합니다.'
    salad_topping_base_ingredient:
      name: 샐러드 토핑 기본 재료
      description: 토핑을 구성하는 주요 성분 그룹을 지정하여 구매자가 영양 관련 선호도, 알레르기 유발 물질 우려 또는 원하는 질감에
        따라 필터링할 수 있도록 합니다.
    salt_level:
      name: 염도 수준
      description: 견과류나 씨앗에 첨가된 소금 또는 나트륨의 양을 나타냅니다.
    sand_cup_features:
      name: 모래컵 기능
      description: 놀이와 사용에 영향을 미치는 모래컵의 기능적/물리적 특징을 나타냅니다.
    sand_shovel_handle_style:
      name: 모래삽 손잡이 방식
      description: 삽/스페이드 손잡이 끝부분의 손잡이/그립 모양을 설명합니다.
    sand_toy_set_pieces_included:
      name: 모래놀이 세트 구성품 포함
      description: '구매자가 구성품을 비교할 수 있도록 세트에 포함된 모래놀이 구성품의 유형(예: 양동이, 삽, 틀)을 나열합니다.'
    sand_water_mill_items_included:
      name: 모래·물레방아 장난감 구성품 포함
      description: 모래·물레방아 장난감에 포함된 주요 부속 구성품(양동이, 스쿠프, 틀 등)을 나열합니다.
    sandbag_style:
      name: 샌드백 방식
      description: '샌드백의 구체적인 디자인과 훈련 용도(예: 불가리안, 스트롱맨, 파워)를 식별하여 구매자가 다양한 운동 방식 중에서
        선택할 수 있도록 합니다.'
    sandbox_bottom_type:
      name: 샌드박스 바닥 유형
      description: 모래 아래에 사용되는 베이스/바닥 구조의 유형을 나타냅니다.
    sandbox_drainage_type:
      name: 모래놀이터 배수 유형
      description: '모래놀이통의 배수 방식(해당되는 경우)을 나타냅니다(예: 배수구멍, 분리형 마개).'
    sandbox_seating_type:
      name: 샌드박스 좌석 형태
      description: 모래놀이통에 일체형 좌석이 포함되어 있는지, 포함된 경우 어떤 유형인지 나타냅니다.
    sapodillo_variety:
      name: 사포딜로 품종
      description: '특정 사포딜라/치쿠 재배 품종 또는 품종(예: “알라노”, “프로리픽”)을 식별하여 애호가들이 선호하는 풍미 프로필과
        특징을 선택할 수 있도록 합니다.'
    sapote_variety:
      name: 사포테 품종
      description: '구매자가 다양한 종류를 구별할 수 있도록 제공되는 사포테의 특정 종/유형(예: 블랙, 화이트, 마메이)을 지정합니다.'
    satin_ribbon_face_type:
      name: 새틴 리본 면 유형
      description: 리본의 한쪽 면 또는 양쪽 면에 새틴 마감 처리가 되어 있는지 여부를 지정합니다.
    sauce_consistency:
      name: 소스 점도
      description: 피자 소스의 질감 또는 점도를 설명합니다.
    sauce_product_form:
      name: 소스 제품 형태
      description: '소스 제품의 물리적 형태를 나타냅니다(예: 액체, 오일, 페이스트, 분말, 플레이크, 시럽).'
    sauce_variety:
      name: 소스 유형
      description: '화이트소스 또는 크림소스의 특정 방식이나 레시피 계열을 식별합니다(예: 알프레도, 베샤멜, 홀랜다이즈).'
    saxophone_body_finish:
      name: 색소폰 본체 마감
      description: 색소폰 본체의 주요 마감/도금을 설명합니다(키 장치와는 별개).
    saxophone_body_type:
      name: 색소폰 바디 유형
      description: 베이스 색소폰 본체와 벨의 방향을 포함한 전체적인 물리적 구성을 설명합니다.
    saxophone_construction_style:
      name: 색소폰 제작 방식
      description: 내구성, 공명, 유지보수에 영향을 미치는 일반적인 색소폰 제작 구조 특징을 나타냅니다.
    saxophone_included_accessories:
      name: 색소폰에 포함된 액세서리
      description: 알토 색소폰 번들과 함께 제공되는 일반적인 액세서리를 나열합니다.
    saxophone_key_system:
      name: 색소폰 키 체계
      description: 해당 악기에 사용된 색소폰 키 장치 체계(레이아웃/메커니즘 표준)를 식별합니다.
    saxophone_key_touch_material:
      name: 색소폰 키 터치 소재
      description: '색소폰 키 터치에 사용되는 소재를 지정합니다(예: 진주 키 터치).'
    saxophone_mouthpiece_baffle_type:
      name: 색소폰 마우스피스 배플 유형
      description: 공기 흐름과 음색의 밝기를 결정하는 배플 디자인을 설명합니다.
    saxophone_neck_type:
      name: 색소폰 넥 유형
      description: 베이스 색소폰과 함께 제공되는 넥 구성 사양을 명시합니다.
    saxophone_package_contents:
      name: 색소폰 패키지 구성품
      description: '색소폰에 포함된 주요 액세서리를 나열합니다(예: 케이스, 마우스피스, 리가처, 넥 스트랩, 청소 키트).'
    saxophone_reed_cut:
      name: 색소폰 리드 절단
      description: 색소폰 리드의 절단/방식을 지정하며, 이는 반응, 음색 및 연주감에 영향을 미칩니다.
    saxophone_reed_material_type:
      name: 색소폰 리드 소재 유형
      description: '리드 소재 범주(예: 케인, 합성)를 지정합니다.'
    saxophone_reed_strength_scale:
      name: 색소폰 리드 강도 척도
      description: 리드에 사용되는 강도 번호 체계/척도(브랜드에 따라 다른 경우가 많음)를 지정하여 목록 간 정보를 더 명확하게 비교할
        수 있도록 합니다.
    saxophone_small_part_thread_size:
      name: 색소폰 소형 부품 나사산 사이즈
      description: 나사산이 있는 색소폰 소형 부품(주로 나사)의 나사산 사이즈/표준을 지정하여 올바른 맞춤 선택이 가능하게 합니다.
    saxophone_swab_application_area:
      name: 색소폰 스왑 적용 부위
      description: 색소폰의 어느 부분을 닦거나 말리는 데 사용하는 스왑인지 나타냅니다.
    scabbard_material:
      name: 칼집 소재
      description: 포함된 스캐버드/쉬스의 주요 소재를 지정합니다(있는 경우).
    scale_model_assembly_status:
      name: 스케일 모델 조립 상태
      description: 스케일 모델이 바로 전시 가능한 상태인지, 아니면 조립/도색이 필요한지 여부를 나타냅니다.
    scale_model_car_features:
      name: 스케일 모델 자동차 기능
      description: '스케일 모델 자동차의 주요 특징을 나타냅니다(예: 문/후드 개폐, 조향 가능한 바퀴, 서스펜션).'
    scale_model_kit_assembly_requirements:
      name: 축척 모델 키트 조립 요구 사항
      description: 기본 스냅핏 조립 외에 일반적으로 필요한 추가 조립 단계/제공 물품을 명시합니다.
    scale_model_kit_components_included:
      name: 축척 모델 키트 포함 구성품
      description: '탱크 축척 모델/키트에 포함된 구성품 목록입니다(예: 데칼, 피규어, 포토에칭 부품).'
    scale_model_paint_status:
      name: 축척 모델 도색 상태
      description: 헬리콥터 모델이 사전 도색/마감 처리되어 있는지, 아니면 도색이 필요한지를 나타냅니다.
    scale_model_pose:
      name: 축소 모형 포즈
      description: 전시/디오라마 구성에 맞춰 말 모델의 묘사된 자세를 지정합니다.
    scale_model_rotor_configuration:
      name: 축척 모델 로터 구성
      description: 모델에 묘사된 헬리콥터 로터 구성을 명시합니다.
    scale_model_truck_era:
      name: 축척 모델 트럭 시대
      description: 모델이 나타내는 실제 트럭의 시대/시기를 나타냅니다. 빈티지 트럭과 현대 트럭을 구분해 수집하는 사람들에게 유용합니다.
    scale_model_truck_propulsion_type:
      name: 축척 모델 트럭 추진 유형
      description: 묘사된 트럭이 디젤, 가솔린, 전기, 하이브리드 또는 기타 추진 방식인지 여부를 명시합니다. 모델에 표시/마케팅된
        내용을 기준으로 합니다.
    scale_units:
      name: 축척 단위
      description: 반지름/지름 설정용 빔에 인쇄/각인된 측정 단위를 나타냅니다.
    scent_function:
      name: 향기 제품 기능
      description: '사냥꾼이 적합한 도구(예: 유인제, 냄새 제거제)를 빠르게 좁혀 선택할 수 있도록 향기 제품의 주요 기능을 정의합니다.'
    scent_source:
      name: 향기 원료
      description: 제품 배합에 사용된 주요 생물학적 원료 또는 방향성 원료를 나열합니다. 소변 유형, 식품 기반 향, 식물 향 등을
        포함합니다.
    school_bus_body_type:
      name: 스쿨버스 차체 유형
      description: '시장에서 일반적으로 사용되는 차체/등급 형식(예: A~D형)에 따라 스쿨버스를 분류합니다.'
    school_bus_safety_feature:
      name: 스쿨버스 안전 기능
      description: 스쿨버스에 설치된 주요 안전 장비를 나타냅니다.
    school_glue_washability:
      name: 학교용 접착제 세척 용이성
      description: 건조되었거나 젖은 접착제가 피부/의류/표면에서 얼마나 쉽게 제거되는지를 나타냅니다.
    scissors_application:
      name: 가위 용도
      description: 가위의 주요 절단 용도/소재를 나타냅니다.
    scooter_brake_pad_material:
      name: 스쿠터 브레이크 패드 소재
      description: 브레이크 패드에 사용되는 소재를 지정하며, 마찰력, 소음, 수명에 영향을 미칩니다.
    scoring_method:
      name: 채점 방식
      description: 푸스볼 테이블에서 점수를 기록하는 방법을 지정합니다. 예를 들어 수동 구슬 계수기나 전자 점수판 등이 있습니다.
    scoring_pattern:
      name: 득점 패턴
      description: 경기장에 인쇄된 득점 구역의 배치를 나타냅니다.
    scoring_system_type:
      name: 점수 기록 시스템 유형
      description: '테이블에 포함된 점수 기록 장치의 방식(예: 수동 슬라이더, 다양한 전자식 디스플레이)을 설명합니다.'
    scottish_smallpipes_bag_material:
      name: 스코틀랜드 스몰파이프 백 소재
      description: 스몰파이프와 함께 제공되는 백의 소재를 명시합니다. 이 백은 공기 저장부 역할을 합니다.
    scottish_smallpipes_drone_tuning_configuration:
      name: 스코틀랜드 스몰파이프 드론 튜닝 구성
      description: 악기와 함께 제공되는 드론 튜닝 설정을 지정합니다. 으뜸음을 기준으로 한 드론의 음높이/역할을 나타냅니다.
    scottish_smallpipes_reed_type:
      name: 스코틀랜드 스몰파이프 리드 유형
      description: 찬터에 사용된 리드 유형을 식별합니다. 리드가 합성 소재인지 갈대 소재인지 여부도 포함합니다.
    scraping_surface_type:
      name: 스크레이핑 표면 유형
      description: 소리를 내는 긁는 표면의 구조/기하학적 형태를 지정합니다. 예를 들어 홈이 있는 형태, 빗살/이빨 모양, 골이 있는
        형태 등이 있습니다.
    screw_drive_type:
      name: 나사 드라이브 유형
      description: 나사 또는 볼트 머리의 드라이브 홈 유형을 지정하여 조이거나 풀 때 필요한 공구를 나타냅니다. 예를 들어 육각/앨런,
        토르크스 등이 있습니다.
    screw_thread_size:
      name: 나사산 크기
      description: '포함된 나사 또는 호환 나사의 나사산 사이즈 표준(예: M4, M5, M6)을 지정합니다.'
    sculpting_clay_base_type:
      name: 조형용 점토 베이스 유형
      description: 조형용 점토의 기본 배합/베이스를 설명합니다.
    seafood_cut:
      name: 해산물 절단 형태
      description: 해산물 제품의 물리적 절단 형태 또는 제공 방식을 설명합니다. 예를 들어 통째로, 필레, 스테이크 등이 있습니다.
    seafood_processing_method:
      name: 해산물 가공 방식
      description: 해산물에 적용된 주요 보존 또는 가공 방법을 명시합니다. 예를 들어 훈제, 염장, 동결 건조 등이 있습니다.
    seafood_source:
      name: 해산물 원산/출처
      description: 해산물이 자연산인지, 양식인지, 식물성인지 또는 기타 출처인지 나타내며, 소비자가 지속가능성과 품질을 평가하는 데
        도움을 줍니다.
    seal_material:
      name: 씰 소재
      description: 슈트의 방수 기능을 유지하는 목, 손목, 발목 부분의 씰 또는 개스킷에 사용되는 소재를 나타냅니다.
    seal_type:
      name: 씰 유형
      description: 냉각수 누출을 방지하기 위해 피팅에 사용되는 씰링 방법을 명시합니다.
    sealant_formulation:
      name: 실란트 배합
      description: 자전거 타이어 실란트의 주요 화학 배합 또는 첨가제 기술을 나타냅니다. 예를 들어 라텍스 기반, 섬유 강화, 아크릴
        등이 있습니다.
    seals_leak_type:
      name: 밀봉 누출 유형
      description: 제품이 밀봉하도록 설계된 냉각 시스템 누출의 유형/위치를 나타냅니다.
    seam_construction:
      name: 이음매 구조
      description: 공의 이음매가 어떻게 만들어지는지, 그리고 이것이 스윙, 내구성, 타구감에 어떤 영향을 미치는지 설명합니다.
    seam_design:
      name: 솔기 디자인
      description: 스타킹류의 이음매 구조 또는 장식용 이음매 특징을 명시합니다.
    seam_gauge_scale_type:
      name: 심 게이지 눈금 유형
      description: 기본 자 눈금 외에 심 게이지에 포함된 눈금/표시를 나타냅니다.
    seam_gauge_slider_material:
      name: 심 게이지 슬라이더 소재
      description: 조절 가능한 슬라이더/포인터 구성품이 있는 경우 해당 구성품의 소재를 식별합니다.
    seam_ripper_tip_style:
      name: 솔기 뜯개 끝 모양
      description: 바느질 땀 아래로 미끄러져 들어가 실을 안전하게 자를 수 있도록 설계된 기능성 끝부분을 설명합니다.
    seam_sealing_type:
      name: 이음매 밀봉 유형
      description: 레인슈트의 이음매 부분으로 물이 스며드는 것을 방지하는 데 사용되는 방법을 설명합니다. 예를 들어 전체 테이핑,
        용접 등이 있습니다.
    seam_type:
      name: 이음매 유형
      description: 야구공의 이음매/스티칭 방식을 설명하며, 이는 그립감, 공기역학적 성능 및 의도된 경기 수준에 영향을 미칩니다.
    season_condition_protection:
      name: 계절/기상 조건 보호
      description: 앞유리 커버가 주로 어떤 날씨/기상 조건으로부터 보호하도록 설계되었는지를 나타냅니다.
    season_rating:
      name: 계절 등급
      description: 텐트의 계절 등급을 명시하여 다양한 기상 조건에 대한 적합성을 나타냅니다. 예를 들어 3계절용, 4계절용, 5계절용/원정용
        등이 있습니다.
    seasoning_variety:
      name: 양념 종류
      description: 양념을 조리 방식이나 전통적인 요리 용도에 따라 분류합니다.
    seat_adjustment_power_type:
      name: 시트 조절 동력 유형
      description: 시트 조절 메커니즘이 어떻게 작동하는지 명시합니다. 예를 들어 수동 레버, 전기 모터 등이 있으며, 배선/호환성에
        영향을 미칠 수 있습니다.
    seat_belt_attachment_type:
      name: 안전벨트 부착 유형
      description: 스트랩이 차량/벨트 하드웨어에 어떻게 부착되는지 명시합니다.
    seat_belt_buckle_electrical_connector_type:
      name: 안전벨트 버클 전기 커넥터 유형
      description: 해당되는 경우, 버클 스위치/프리텐셔너 배선에 사용되는 커넥터/인터페이스를 지정합니다.
    seat_belt_buckle_mounting_type:
      name: 안전벨트 버클 장착 유형
      description: 버클/리시버가 차량, 시트 또는 벨트 스토크에 어떻게 부착되는지 설명합니다. 예를 들어 볼트 고정식, 클립 고정식
        등이 있습니다.
    seat_belt_buckle_release_button_color:
      name: 안전벨트 버클 해제 버튼 색상
      description: 버클 해제 버튼의 색상을 지정합니다.
    seat_belt_cover_placement:
      name: 안전벨트 커버 장착 위치
      description: 안전벨트 커버를 장착할 권장 위치를 지정합니다.
    seat_belt_integration:
      name: 안전벨트 일체화 방식
      description: 시트에 통합형 안전벨트 및/또는 버클 리셉터클이 포함되어 있는지, 아니면 설치를 위해 차량의 OEM 버클 리셉터클을
        옮겨 장착해야 하는지를 명시합니다.
    seat_belt_provision:
      name: 안전벨트 포함 여부
      description: '뒷좌석 어셈블리에 안전벨트 및/또는 관련 벨트 하드웨어(예: 버클)가 포함되어 있는지, 아니면 기존 시트에서 옮겨
        장착해야 하는지를 나타냅니다.'
    seat_belt_strap_installation_location:
      name: 안전벨트 스트랩 설치 위치
      description: 벨트 체계 내에서 스트랩이 설치되는 위치를 나타냅니다.
    seat_cover_placement:
      name: 시트 커버 장착 위치
      description: 차량 내 어느 좌석 위치에 커버를 사용하도록 설계되었는지를 나타냅니다.
    seat_cover_securement_method:
      name: 시트커버 고정 방법
      description: 시트 커버를 시트에 고정하는 주요 방법을 나타냅니다. 여러 가지 방법을 사용하는 경우, 기본/주요 방법을 선택하십시오.
    seat_cover_set_contents:
      name: 시트 커버 세트 구성품
      description: 패키지에 포함된 구성품을 설명합니다. 예를 들어 시트 하단부만 포함되거나 전체 시트와 헤드레스트가 포함될 수 있습니다.
    seat_fabric:
      name: 시트 원단
      description: 의자의 좌석과 등받이 슬링에 주로 사용되는 원단입니다.
    seat_height_category:
      name: 좌석 높이 유형
      description: '스툴을 일반적인 좌석 높이 범위(예: 카운터 높이 또는 바 높이)별로 분류하여 선택을 간소화합니다.'
    seat_material:
      name: 좌석 소재
      description: 벤치 좌석 표면의 주요 재질을 식별합니다.
    seat_mounting_type:
      name: 시트 장착 유형
      description: 차량 바닥에 시트를 고정하는 데 사용되는 장착/트랙 구성
    seating_surface_material:
      name: 시트 표면 소재
      description: '사람이 기대는 부분의 소재를 지정합니다(예: 텍스틸렌 메시, 슬링 원단, 라탄, 쿠션형 커버).'
    seatpost_clamp_mechanism:
      name: 시트 포스트 클램프 메커니즘
      description: 시트 포스트를 고정하는 클램핑/잠금 체계의 유형.
    section_orientation_compatibility:
      name: 단면 방향 호환성
      description: 해당 액세서리가 좌측 팔걸이형, 우측 팔걸이형 또는 범용 방향 섹셔널 유닛에 맞는지 여부를 나타냅니다.
    sectional_configuration:
      name: 단면 구성
      description: '쇼핑객이 원하는 레이아웃으로 조립할 수 있도록 섹셔널 유닛의 특정 모듈 또는 방향(예: 코너, 좌측 팔걸이 엔드,
        셰즈)을 정의합니다.'
    sectional_shape:
      name: 단면 모양
      description: 모듈형 소파의 전체적인 기하학적 구성/레이아웃을 정의합니다.
    secured_components:
      name: 고정 구성품
      description: '잠금 스큐어 또는 보안 너트가 보호하는 특정 자전거 부품(예: 앞바퀴, 뒷바퀴, 시트포스트)을 나열합니다.'
    seed_content:
      name: 씨 포함 여부
      description: 감귤류 과일에 씨가 없는지, 씨가 적은지, 씨가 많은지를 나타냅니다.
    seed_size_classification:
      name: 종자 크기 분류
      description: 리치 안에 있는 먹을 수 없는 씨앗의 상대적인 크기를 나타내며, 먹을 수 있는 과육의 양에 영향을 미칩니다.
    self_adhesive_backing_format:
      name: 자가접착식 뒷면 형태
      description: 심지 탭과 함께 제공되는 접착식 뒷면의 물리적 형식(미리 부착된 패드와 별도 스티커 등)을 나타냅니다.
    self_adhesive_hook_loop_backing_type:
      name: 접착식 후크 앤 루프 뒷면 유형
      description: 접착면에 사용된 뒷면/라이너 구조 및 접착 체계를 명시합니다.
    self_adhesive_hook_loop_fastener_shape:
      name: 점착식 찍찍이 테이프 모양
      description: 제공되는 고정 부품의 절단 형태/모양을 지정합니다.
    self_hardening_clay_finish:
      name: 자연 경화 점토 마감
      description: 완전히 건조된 후 표면의 외관/광택을 설명합니다 (자연스러운 무광, 새틴 등 중에서 선택하는 데 유용합니다).
    self_hardening_clay_water_resistance_after_curing:
      name: 경화 후 자연 경화 점토의 내수성
      description: 완전히 경화된 후 추가 실란트 없이 물에 노출되었을 때의 저항성을 나타냅니다.
    sensor_functions:
      name: 센서 기능
      description: 센서가 측정하는 자전거 주행 관련 지표를 나타냅니다.
    sensor_measurement_mode:
      name: 센서 측정 모드
      description: '센서가 측정할 수 있는 지표를 나타냅니다(예: 케이던스 전용, 속도 전용, 속도 및 케이던스 겸용).'
    sensor_mounting_position:
      name: 센서 장착 위치
      description: '센서가 설치되는 자전거 또는 라이더의 위치(예: 크랭크 암, 휠 허브, 신발)를 지정합니다. 이는 다양한 자전거
        설정과의 호환성에 영향을 미칩니다.'
    sensor_mounting_type:
      name: 센서 장착 유형
      description: 'MAP 센서가 흡기 매니폴드/엔진에 장착되는 방식(예: 볼트식 플랜지 또는 푸시인 그로밋)을 지정합니다.'
    sensor_or_gauge_mounting_location:
      name: 센서 또는 게이지 장착 위치
      description: 센서 또는 게이지를 차량의 어느 위치에 설치할 것인지 지정합니다(체계/위치 수준이며, 좌우 방향 수준이 아닙니다).
    sensory_modality:
      name: 감각 유형
      description: 장난감이 제공하도록 설계된 주요 감각 경험을 나타냅니다(여러 감각에 해당할 수 있음).
    sensory_toy_fidget_mechanism:
      name: 감각 장난감 피젯 메커니즘
      description: 피젯 행동과 자기 조절에 사용되는 주요 상호작용/메커니즘을 나타냅니다.
    sensory_toy_light_features:
      name: 감각 장난감 조명 기능
      description: 장난감이 제공하는 조명 동작/효과를 나타냅니다.
    sensory_toy_texture_type:
      name: 감각 장난감 질감 유형
      description: 촉각 자극에 주로 사용되는 표면 감촉/질감 요소를 나타냅니다.
    sequin_application_method:
      name: 시퀸 부착 방식
      description: 스팽글을 어떤 방식으로 부착/사용할 것인지 나타냅니다(바느질, 접착, 열고정 등).
    sequin_finish:
      name: 스팽글 마감
      description: '패치에 사용된 스팽글의 표면/시각적 마감 및 반사 효과(예: 무광, 금속성, 홀로그램)를 설명하며, 패치의 뒷면이나
        부착 방법을 설명하는 것은 아닙니다.'
    serger_stitch_functions:
      name: 오버록 스티치 기능
      description: 오버록 재봉틀이 지원하는 스티치 기능을 나타냅니다(오버록/오버엣지 변형 및 특수 오버록 스티치 포함).
    serger_thread_count:
      name: 오버록 재봉틀 실 수
      description: '오버록 재봉틀이 스티칭에 사용할 수 있는 실 수를 나타냅니다(예: 2/3/4/5실 기능).'
    service_interval:
      name: 서비스 간격
      description: 공인 서비스 센터에서 필수 점검/정비를 받기까지의 권장 최대 시간 간격을 나타냅니다.
    serving_temperature:
      name: 서빙 온도
      description: 제품을 섭취할 때 권장되는 온도 또는 상태를 나타냅니다.
    sesame_seed_hull_status:
      name: 참깨 껍질 상태
      description: 타히니가 껍질을 벗긴 참깨로 만들었는지, 껍질을 벗기지 않은 참깨로 만들었는지 명시합니다. 이는 색상, 맛, 영양에
        영향을 미칩니다.
    sesame_seed_roast_level:
      name: 참깨 볶음 정도
      description: 참깨를 갈기 전에 얼마나 볶았는지 나타내어 쇼핑객이 선호하는 풍미 강도를 선택할 수 있도록 도와줍니다.
    sesame_seed_variety:
      name: 참깨 품종
      description: 참깨 기름을 만드는 데 사용된 참깨의 품종 또는 색상을 나타냅니다.
    set_classification:
      name: 집합 분류
      description: '크로케 세트의 사용 수준 또는 방식(예: 토너먼트, 레크리에이션, 여행용)을 정의합니다.'
    set_components:
      name: 세트 구성품
      description: '제품에 포함된 품목을 나타냅니다(예: 센터 스틱만 또는 풀 세트).'
    set_items_included:
      name: 세트 품목 포함
      description: 사리 원단, 두파타(숄), 벨트 등 세트에 포함된 의류 또는 액세서리를 명시합니다.
    setup_mechanism:
      name: 설치 메커니즘
      description: '텐트의 주요 설치 방식(예: 팝업식, 공기 주입식/에어빔식, 루프탑 클램쉘식)을 설명합니다.'
    setup_type:
      name: 설치 유형
      description: 놀이 텐트/터널을 조립하거나 펼치는 방법을 나타냅니다.
    sew_in_interfacing_elasticity:
      name: 봉제용 접착심 탄성
      description: 봉제용 심지가 신축성이 있는지 여부와, 있다면 니트 또는 직물 프로젝트에 맞춰 어느 방향으로 신축성이 있는지를 나타냅니다.
    sew_in_label_placement:
      name: 봉제 라벨 배치
      description: 완성된 품목에 의도된 배치 위치를 나타냅니다.
    sew_on_edge_finish:
      name: 바느질 부착 가장자리 마감
      description: 후크 앤 루프 가장자리가 재단 상태인지, 올풀림 방지 마감 처리가 되어 있는지를 나타냅니다.
    sew_on_rhinestone_hole_orientation:
      name: 바느질 부착 라인스톤 구멍 방향
      description: '다양한 스티치 방식을 지원하기 위해 스톤을 기준으로 한 구멍의 배열/방향(예: 나란히, 마주 보기, 십자형)을
        나타냅니다.'
    sewing_kit_components_included:
      name: 바느질 키트 구성품 포함
      description: 재봉 키트에 포함된 재봉 부자재/도구를 나열하여 쇼핑객이 각 키트에 무엇이 들어 있는지 비교할 수 있도록 합니다.
    sewing_machine_bobbin_class:
      name: 재봉틀 보빈 등급
      description: 재봉틀의 보빈 및 보빈 케이스와 호환되는 보빈 등급/체계를 지정합니다.
    sewing_machine_buttonhole_type:
      name: 재봉틀 단추구멍 유형
      description: 재봉틀에서 지원하는 단추구멍 제작 방법을 나타냅니다.
    sewing_machine_display_type:
      name: 재봉틀 디스플레이 유형
      description: 재봉틀의 제어/표시 인터페이스 유형을 나타냅니다.
    sewing_machine_needle_point_type:
      name: 재봉틀 바늘 끝 유형
      description: '바늘 끝의 기하학적 형태/끝 모양 종류를 정의하여 다양한 직물에 바늘이 어떻게 관통하는지 결정합니다(예: 날카로운
        끝, 볼포인트 끝, 쐐기형 끝).'
    sewing_machine_needle_system:
      name: 재봉틀 바늘 시스템
      description: 기계 호환성을 결정하는 표준화된 바늘 체계/모델 번호를 나타냅니다(일반적으로 130/705 H, HAx1, DBx1,
        15×1 등으로 표기됨).
    sewing_machine_needle_type:
      name: 재봉틀 바늘 유형
      description: '바늘의 용도/방식(예: 범용, 볼포인트, 청바지/데님)을 지정하며, 이는 스티치 품질과 원단 적합성에 영향을 미칩니다.'
    sewing_machine_shank_type:
      name: 재봉틀 노루발대 유형
      description: '노루발이 호환되도록 설계된 노루발 생크/앵클 인터페이스 표준을 지정하여 재봉틀과의 호환성을 보장합니다(예: 로우
        생크, 하이 생크, 슬랜트 생크).'
    sewing_pattern_accessory_type:
      name: 재봉 패턴 액세서리 유형
      description: 재봉 패턴으로 만들 수 있는 액세서리를 명시합니다.
    sewing_pattern_notions_required:
      name: 재봉 패턴에 필요한 재료
      description: 프로젝트 완성에 필요한 주요 추가 재료/하드웨어를 나열합니다(원단과 실 외에 필요한 항목).
    sewing_pattern_recommended_fabric:
      name: 재봉 패턴에 추천하는 원단
      description: 패턴 디자이너가 제공한 재봉 패턴에 권장되는 원단 유형/두께를 나열합니다.
    sewing_pattern_size_range:
      name: 재봉 패턴 사이즈 범위
      description: '패턴이 적용되는 사이즈 범위를 지정합니다(예: 유아부터 성인까지, 플러스 사이즈).'
    sewing_thread_size_system:
      name: 재봉실 사이즈 체계
      description: '실의 크기를 표현하는 데 사용되는 크기 기준입니다(예: Tex, Denier, Ticket, 중량 번호, V 크기).'
    shaft_curvature:
      name: 샤프트 곡률
      description: 샤프트의 전체적인 모양을 설명하며, 클리어런스, 스윙 및 인체공학에 영향을 미칩니다.
    shaft_kick_point:
      name: 샤프트 킥 포인트
      description: 스윙 중 샤프트가 가장 많이 휘어지는 위치를 식별하며, 볼 비행 궤적에 영향을 미칩니다.
    shaft_length_type:
      name: 샤프트 길이 유형
      description: '정확한 밀리미터 단위 치수가 제공되지 않을 때 사용하는 다트 샤프트의 업계 표준 범주형 사이즈 명칭(예: 짧음,
        중간)입니다.'
    shaft_shape:
      name: 샤프트 모양
      description: '톤파 자루의 단면 형상(예: 원형, 사각형, 팔각형)을 정의합니다.'
    shaker_fill_material:
      name: 셰이커 충전재
      description: '해당되는 경우 셰이커 소리를 내는 데 사용되는 주요 내부 충전재(예: 구슬, 씨앗, 산탄)를 지정합니다.'
    shaker_shell_material:
      name: 셰이커 쉘 소재
      description: 에그 셰이커 본체/껍질(외부 하우징)의 주요 소재를 지정합니다.
    shallot_variety:
      name: 샬롯 품종
      description: 해당 샬롯 제품의 특정 품종, 시장 유형 또는 변종을 식별합니다.
    shank_style:
      name: 섕크 방식
      description: '커브 비트 섕크의 전체적인 모양/구성(예: 직선형, 곡선형, 그래징형)을 설명합니다.'
    shapewear_enhancement_feature:
      name: 보정속옷 보정 기능
      description: '해당 의류가 제공하는 주요 기능 개선 요소(예: 복부 보정, 힙업, 샘 방지 안감)를 설명합니다.'
    sheath_type:
      name: 칼집 유형
      description: 수집용 칼에 포함된 칼집/시스의 유형을 나타냅니다.
    sheet_music_clip_padding_material:
      name: 악보 클립 패딩 소재
      description: 종이나 스탠드 가장자리에 닿아 찢어짐과 미끄러짐을 방지하는 집게/그립 패딩의 소재를 나타냅니다.
    sheet_music_clip_spring_tension_level:
      name: 악보 클립 스프링 장력 수준
      description: 클립 스프링/클램핑 힘의 상대적 강도를 나타냅니다.
    sheet_music_clip_use_environment:
      name: 악보 클립 사용 환경
      description: 클립이 최상의 성능을 발휘하도록 설계된 주요 사용 환경을 나타냅니다.
    shell_construction:
      name: 쉘 구조
      description: 베이스 드럼 쉘의 제작 방식을 명시하며, 이는 음색과 무게에 큰 영향을 미칩니다.
    shell_finish:
      name: 쉘 마감
      description: 둠벡 쉘의 외부 마감 처리를 나타냅니다.
    shell_hull_status:
      name: 선체/껍질 상태
      description: 견과류나 씨앗이 껍질 또는 외피가 있는 상태로 판매되는지, 제거된 상태로 판매되는지를 명시합니다.
    shift_boot_attachment_method:
      name: 시프트 부트 부착 방식
      description: '시프트 부트가 차량 콘솔/변속기 트림에 부착되는 방식을 지정합니다(예: 클립인 트림 베젤, 리테이너 링, 접착제).'
    shift_boot_installation_hardware_included:
      name: 시프트 부트 설치 하드웨어 포함 여부
      description: 시프트 부트에 포함된 설치 하드웨어 및 구성 요소를 나열합니다.
    shift_knob_illumination:
      name: 기어 변속 노브 조명
      description: '기어 변속 노브에 조명이 포함되어 있는지 여부와 조명 방법/유형(예: 축광식, LED, 광섬유, 백라이트 패턴)을
        명시합니다.'
    shift_knob_installation_method:
      name: 기어 변속 손잡이 설치 방법
      description: 변속 레버에 변속 손잡이가 어떻게 부착되는지를 명시합니다.
    shift_knob_shape:
      name: 기어 변속 노브 모양
      description: 기어 변속 노브의 전반적인 인체공학적 형태를 설명합니다.
    shift_pattern_type:
      name: 변속 패턴 유형
      description: 기어 변속 노브에 표시되는 기어 표시 방식을 지정합니다(표시가 있는 경우).
    shifter_compatibility:
      name: 시프터 호환성
      description: 핸들바 확장 장치가 전자식 변속기, 기계식 변속기, 둘 다 또는 변속기와 호환되지 않는지를 나타냅니다.
    shifter_mounting_interface:
      name: 시프터 장착 인터페이스
      description: '변속기가 자전거에 장착되는 방식을 설명합니다(예: 개별 클램프 사이즈, I-Spec, MatchMaker, 바엔드,
        다운튜브, 무선).'
    shifting_actuation_type:
      name: 변속 작동 유형
      description: 그룹셋에서 기어를 변속하는 데 사용되는 메커니즘(기계식, 유선 전자식, 무선 전자식, 유압식)을 식별합니다.
    shifting_mechanism:
      name: 변속 메커니즘
      description: 변속기가 기계식인지 전자식인지, 인덱스 방식인지 마찰 방식인지를 식별합니다.
    shim_purpose:
      name: 심 용도
      description: '제품의 기능 유형(예: 심, 웨지, 스페이서)을 정의하여 자전거 이용자가 별도의 하위 분류 없이도 적합한 조정
        솔루션을 빠르게 찾을 수 있도록 합니다.'
    shin_guard_attachment_method:
      name: 정강이 보호대 착용/부착 방법
      description: 발목 보호대 일체형 또는 양말형 구조를 포함하여 정강이 보호대의 전체적인 디자인 형식을 분류합니다.
    shirt_cuff_style:
      name: 셔츠 커프스 스타일
      description: 소매 커프의 구조를 식별하며, 이는 격식, 커프링크스와의 조화, 착용감에 영향을 미칩니다.
    shochu_base_ingredient:
      name: 소주 베이스 원료
      description: 소주 생산에 사용되는 주요 전분 또는 당류 원료를 식별합니다.
    shochu_soju_variety:
      name: 쇼추 및 소주 유형
      description: 제품을 인정된 방식 또는 생산 유형에 따라 분류합니다.
    shock_absorber_bushing_material:
      name: 쇼크 업소버 부싱 소재
      description: 쇼크 업소버에 제공되거나 내장된 장착 부싱/아이솔레이터의 소재를 나타냅니다.
    shock_absorber_charge_type:
      name: 쇼크 업소버 충전 유형
      description: '해당되는 경우 쇼크 업소버의 충전/댐핑 기술(예: 유압/오일, 가스 충전식, 공기 충전식) 및/또는 관련 튜브
        설계를 명시합니다.'
    shock_absorber_mount_type_lower:
      name: 충격 흡수 장치 장착 유형(하부)
      description: 쇼크 업소버의 하단 장착 인터페이스 방식을 나타내며, 장착 적합성을 확인하는 데 사용됩니다.
    shock_absorber_mount_type_upper:
      name: 쇼크 업소버 장착 유형(상단)
      description: 차량용 쇼크 업소버의 상단 장착 인터페이스 방식을 지정하여 장착 적합성/호환성을 확인합니다.
    shock_absorber_position:
      name: 쇼크 업소버 위치
      description: 쇼크 업소버가 차량의 전면, 후면, 좌측 또는 우측 위치용인지 지정합니다(차축 단위 배치보다 더 세분화됨).
    shock_absorption_system:
      name: 충격 흡수 체계
      description: 리바운드 시 진동과 소음을 줄이는 데 사용되는 메커니즘을 정의합니다.
    shoe_collar_height:
      name: 신발 칼라 높이
      description: 발목을 덮는 정도와 지지력을 나타내기 위해 신발의 칼라/컷 높이(로우탑, 미드탑, 하이탑)로 분류합니다.
    shoe_cover_height:
      name: 신발 커버 높이
      description: 자전거 신발 커버의 커버 범위를 명시하며, 발가락 부분만 덮는 커버와 발 전체를 덮는 오버슈즈를 구분합니다.
    shoe_sizing_system:
      name: 신발 사이즈 체계
      description: 명시된 신발 사이즈에 사용된 사이즈 체계(미국, 영국, 유럽, 일본, 몬도포인트 등)를 식별합니다.
    shoelace_aglet_material:
      name: 신발끈 끝 부분 소재
      description: 신발끈 끝부분(애글릿)에 사용된 소재를 식별하며, 이는 내구성과 방식에 영향을 미칩니다.
    shooting_rest_design:
      name: 슈팅 레스트 디자인
      description: '레스트의 구조적 유형(예: 백 레스트, 슬레드형 레스트, 삼각대 레스트, 건 바이스)을 분류합니다.'
    shooting_stick_yoke_design:
      name: 슈팅 스틱 요크 디자인
      description: 총기 또는 광학 장비와 맞물리는 받침부 또는 요크 방식을 지정합니다.
    shooting_target_style:
      name: 사격 표적 방식
      description: 피겨스케이팅 및 하키 슈팅 표적의 방식 또는 디자인을 분류하여 고객이 필요한 훈련 초점을 선택할 수 있도록 합니다.
    shooting_target_type:
      name: 사격 표적지 유형
      description: '사격 표적을 구조적 방식, 소재 또는 디자인(예: 공, 실루엣, 종이 불스아이, 스피너)별로 분류하여 사격수가
        자신의 종목과 총기 유형에 맞는 표적을 신속하게 찾을 수 있도록 합니다.'
    short_block_assembly_balance_type:
      name: 쇼트 블록 어셈블리 밸런스 유형
      description: 회전 어셈블리가 내부 밸런스형인지 외부 밸런스형인지 나타냅니다.
    short_block_intended_use:
      name: 쇼트 블록 용도
      description: 쇼트 블록의 주요 사용 용도를 나타냅니다.
    short_block_rotating_assembly_included:
      name: 쇼트 블록 회전 어셈블리 포함 여부
      description: 쇼트 블록에 포함되는 주요 회전 어셈블리 구성품을 명시합니다.
    shot_size:
      name: 산탄 사이즈
      description: 나석 산탄 또는 탄약 구성품에 대한 산탄 사이즈 명칭을 지정합니다.
    shotgun_action_type:
      name: 산탄총 작동 유형
      description: 산탄총의 작동 메커니즘/작동 유형을 명시합니다.
    shotgun_choke_type:
      name: 산탄총 초크 유형
      description: 산탄총 총열의 초크 구성을 지정합니다.
    shotgun_gauge:
      name: 산탄총 구경
      description: 수집품 목록에서 식별 및 필터링을 위해 산탄총의 보어 게이지(해당되는 경우 .410 보어 포함)를 지정합니다.
    shotgun_stock_material:
      name: 산탄총 개머리판 소재
      description: 개머리판/전방 손잡이의 주요 소재를 지정합니다.
    shuffleboard_speed_rating:
      name: 셔플보드 속도 등급
      description: 셔플보드 파우더 또는 기타 관리 제품이 테이블 위에서 제공하는 상대적인 활주 속도를 나타내며, 플레이어가 자신의
        실력 수준과 테이블 길이에 맞는 적절한 속도를 선택할 수 있도록 합니다.
    shuffleboard_table_length_compatibility:
      name: 셔플보드 테이블 길이 호환성
      description: 제품이 맞거나 보완하도록 설계된 표준 셔플보드 테이블 길이를 나타냅니다.
    shuttlecock_base_material:
      name: 셔틀콕 베이스 소재
      description: 셔틀콕의 앞부분/밑부분에 사용된 재질을 식별합니다. 이 재질은 내구성, 타구감 및 반발력에 영향을 미칩니다.
    shuttlecock_feather_material:
      name: 셔틀콕 깃털 소재
      description: 셔틀콕 스커트에 사용된 주요 깃털 원료 또는 제작 유형을 식별합니다. 이는 내구성, 일관성 및 가격에 영향을 미칩니다.
    shuttlecock_grade:
      name: 셔틀콕 등급
      description: '의도한 경기 수준 또는 품질 분류(예: 연습, 클럽, 대회)를 명시합니다.'
    shuttlecock_speed_rating:
      name: 셔틀콕 속도 등급
      description: 셔틀콕의 제조사 지정 속도 또는 등급을 명시하여 플레이어가 경기 조건, 온도 및 고도에 맞는 적절한 비행 속도를
        선택할 수 있도록 합니다.
    side_panel_installation_state:
      name: 측면 패널 설치 상태
      description: 측면 패널이 무도장 상태로 제공되는지, 프라이머 처리되었는지, 도장되었는지, 또는 설치를 위해 다른 코팅/준비 처리가
        되었는지를 지정합니다.
    side_wall_mechanism:
      name: 측벽 작동 방식
      description: 아기 침대의 측면 벽이 어떻게 열리거나 내려가서 아기에게 접근할 수 있는지 설명합니다.
    signal_source:
      name: 신호 출처
      description: 주행거리계가 거리 또는 시간 정보를 수신하거나 산출하는 방식을 나타냅니다.
    silk_fiber_type:
      name: 실크 섬유 유형
      description: '원단 제작에 사용된 실크 섬유의 유형/출처(예: 뽕나무 또는 투사)를 식별합니다. 이는 질감, 균일성 및 가격에
        영향을 미칩니다.'
    simulated_game_species:
      name: 모의 사냥감 종
      description: 훈련용 모형이 사실적인 훈련을 위해 모방하는 특정 사냥용 조류 또는 동물을 나타냅니다.
    singlet_cut_style:
      name: 싱글렛 컷 방식
      description: 스트랩 높이, 등 부분 스타일, 성별/연령대별 차이를 고려하여 레슬링 싱글렛의 컷/스타일을 지정합니다.
    sink_material:
      name: 싱크대 소재
      description: 세면대장에 포함된 일체형 세면대의 소재를 명시합니다.
    sinker_attachment_style:
      name: 싱커 부착 방식
      description: 낚싯줄이나 채비에 부착하기 위해 뱅크 싱커에 제공된 방식을 설명합니다.
    sinker_finish:
      name: 싱커 마감
      description: 싱커의 외부 코팅 또는 표면 처리를 명시합니다.
    sinker_shape:
      name: 싱커 모양
      description: '싱커의 기하학적 형태(예: 총알형, 원통형, 물방울형)를 정의하여 낚시꾼이 최적의 프레젠테이션과 걸림 방지 성능을
        선택할 수 있도록 합니다.'
    siren_system_included:
      name: 사이렌 체계 포함 여부
      description: 사이렌/PA 체계의 설치 여부와 유형을 나타냅니다.
    siren_system_type:
      name: 사이렌 시스템 유형
      description: 경찰차에 설치된 사이렌/PA 체계의 구성을 명시합니다.
    size_designation:
      name: 사이즈 표기
      description: 트라이앵글 악기의 표준화된 사이즈 라벨입니다.
    size_system:
      name: 사이즈 체계
      description: '사이즈 라벨이 대응하는 사이즈 체계 또는 지역 표준을 지정합니다(예: 미국, 영국, EU, 국제 문자).'
    sizzle_mechanism:
      name: 지글 효과 방식
      description: '심벌즈가 지글 효과를 내는 방식을 명시합니다(예: 심벌즈에 리벳 설치, 체인/지글러 부착, 또는 하드웨어 미포함).'
    skate_blade_discipline:
      name: 스케이트 날 종목
      description: '해당 블레이드가 설계된 스케이팅 종목 또는 용도(예: 하키 또는 피겨 스케이팅)를 식별하여 소비자가 관련 블레이드를
        필터링할 수 있도록 합니다.'
    skate_brake_type:
      name: 스케이트 브레이크 유형
      description: 스케이트에 포함된 정지 장치의 유형을 나타냅니다.
    skateboard_nut_thread_size:
      name: 스케이트보드 너트 나사산 사이즈
      description: 스케이트보드 액슬, 킹핀 또는 장착 하드웨어와의 호환성을 보장하기 위해 너트의 나사산 사이즈(직경 및 피치)를 지정합니다.
    skein_winder_bearing_bushing_type:
      name: 실타래 감개 베어링/부싱 유형
      description: 실타래 감개의 회전 조립체에 사용되는 베어링 또는 부싱의 유형을 지정합니다.
    skein_winder_drive_type:
      name: 실타래 감개 구동 유형
      description: 사용 중 실타래 감개가 구동/회전되는 방식을 나타냅니다.
    ski_binding_mechanism:
      name: 스키 바인딩 방식
      description: '바인딩의 기본적인 기계 설계 또는 종목을 정의합니다(예: 알파인, 테크/핀, 텔레마크).'
    ski_binding_part_type:
      name: 스키 바인딩 부품 유형
      description: 스키 바인딩의 특정 구성 요소 또는 액세서리를 식별하여 다양한 부품 유형을 빠르게 필터링할 수 있도록 합니다.
    ski_boot_sole_standard:
      name: 스키 부츠 밑창 표준
      description: 스키 부츠가 인증받은 밑창 규격 또는 바인딩 호환성 표준을 나타냅니다.
    skill_focus:
      name: 기술 중점
      description: 해당 훈련 보조 도구가 개발하도록 설계된 주요 농구 기술을 명시합니다.
    skimboard_construction:
      name: 스킴보드 구조
      description: '보드의 주요 구조를 설명하며, 특히 코어 및 적층 기법(예: 폼 코어, 목재 코어)에 초점을 둡니다.'
