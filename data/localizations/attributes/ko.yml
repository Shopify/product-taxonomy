      name: 껍질 포함 여부
      description: 닭고기가 껍질 포함, 껍질 제거 또는 부분 제거 상태로 판매되는지를 명시합니다.
    slapstick_handle_type:
      name: 슬랩스틱 핸들 유형
      description: 슬랩스틱에 통합된 그립/핸들의 방식을 설명하며, 이는 인체공학 및 연주 편의성에 영향을 미칩니다.
    slapstick_playing_surface_material:
      name: 슬랩스틱 연주면 소재
      description: 소리를 내기 위해 서로 접촉하는 타격 요소의 소재를 지정합니다.
    sled_brake_type:
      name: 썰매 브레이크 유형
      description: 썰매에 포함된 제동 방식(있는 경우)을 명시합니다.
    sled_towing_method:
      name: 썰매 견인 방식
      description: 썰매를 끌거나 견인하는 주요 방식을 나타냅니다.
    sleep_position_suitability:
      name: 수면 자세 적합성
      description: 매트리스가 어떤 수면 자세를 가장 효과적으로 지지하도록 설계되었는지 나타냅니다.
    sleeping_bag_shape:
      name: 침낭 모양
      description: 보온성, 무게, 여유 공간에 영향을 미치는 침낭의 전체적인 재단 형태를 나타냅니다.
    sleeping_pad_type:
      name: 슬리핑 패드 유형
      description: '슬리핑 패드의 구조 방식(예: 폐쇄 셀 폼 또는 공기 주입식)을 식별합니다. 이는 편안함, 무게 및 단열성에 직접적인
        영향을 미칩니다.'
    sleepwear_set_pieces_included:
      name: 잠옷 세트 구성품 포함
      description: 여러 벌로 구성된 잠옷 또는 라운지웨어 세트에 포함된 개별 구성품 목록을 제공합니다.
    sleeve_bearing_type:
      name: 슬리브 베어링 유형
      description: 올림픽 리프팅 동작 시 회전 품질에 영향을 미치는 슬리브 회전을 가능하게 하는 기술을 식별합니다.
    sleeve_style:
      name: 슬리브 스타일
      description: '소매 길이 외에 소매 방식을 지정합니다(예: 래글런 소매).'
    slide_board_accessories_included:
      name: 슬라이드 보드 액세서리 포함 여부
      description: 슬라이드 보드와 함께 포장된 추가 품목 목록을 제공하여 소비자가 포함 품목을 정확히 알고 번들을 비교할 수 있도록
        합니다.
    slide_installation_type:
      name: 슬라이드 설치 유형
      description: '미끄럼틀을 설치 또는 장착하는 방법을 나타냅니다(예: 독립형, 놀이 세트 부착형).'
    slide_intended_finger:
      name: 슬라이드 착용 손가락
      description: '슬라이드를 어느 손가락에 착용하도록 설계되었는지 또는 해당 사항이 없는지(예: 톤 바)를 나타냅니다.'
    slide_safety_features:
      name: 슬라이드 안전 기능
      description: 슬라이드에 포함된 안전 관련 설계 요소를 나타냅니다.
    slide_type:
      name: 슬라이드 유형
      description: 본 제품이 세척하도록 설계된 금관악기 슬라이드 장치 유형을 지정합니다.
    slide_water_use_capability:
      name: 슬라이드 물 사용 가능 여부
      description: '미끄럼틀이 물과 함께 사용되도록 설계되었는지(예: 호스 연결) 여부와 사용 방법을 나타냅니다.'
    slime_putty_kit_components_included:
      name: 슬라임 및 퍼티 키트 구성품 포함 여부
      description: 슬라임/퍼티 제품(특히 키트/번들)에 포함된 도구 및 추가 구성품 목록을 제공합니다.
    sling_material:
      name: 슬링 소재
      description: 퀵드로우 슬링(도그본)에 사용된 섬유/직물 소재를 지정합니다.
    smith_machine_bar_path:
      name: 스미스 머신 바 이동 경로
      description: 바의 고정된 이동 경로를 설명하여 사용자에게 생체역학 및 공간 요구 사항에 대한 정보를 제공합니다.
    smoke_color:
      name: 연기 색상
      description: 조명탄/연기 신호에서 발생하는 연기 색상입니다(제품 본체 색상과 구별됨).
    smoked_malt_smoking_material:
      name: 훈제 맥아 훈연 재료
      description: '훈제 맥아의 경우, 훈제 과정에서 사용된 재료(예: 특정 목재 종 또는 피트)를 식별합니다.'
    snack_mix_variety:
      name: 스낵 믹스 유형
      description: '믹스 방식(예: 트레일 믹스, 견과류 믹스, 남킨, 세브)에 따라 제품을 분류합니다.'
    snack_processing_method:
      name: 스낵 가공 방식
      description: '스낵을 만드는 데 사용된 주요 가공 또는 보존 기법(예: 동결 건조, 베이킹, 로스팅)을 나타냅니다.'
    snack_texture:
      name: 스낵 질감
      description: 참깨 스틱의 물리적인 씹힘 또는 식감을 나타냅니다.
    snap_installation_method:
      name: 스냅 설치 방식
      description: 스냅 단추를 작업 소재에 설치/부착하는 방법을 나타냅니다.
    snare_drum_bearing_edge_profile:
      name: 스네어 드럼 베어링 엣지 형태
      description: 스네어 쉘의 베어링 엣지 절단면/형태를 나타냅니다.
    snare_drum_finish_type:
      name: 스네어 드럼 마감 유형
      description: 스네어 쉘에 사용된 상위 수준의 마감 구조/유형을 나타냅니다.
    snare_drum_hoop_type:
      name: 스네어 드럼 후프 유형
      description: 스네어 드럼에 사용되는 후프/림 유형입니다.
    snare_drum_mounting_type:
      name: 스네어 드럼 장착 유형
      description: 스네어 드럼을 설치/사용하는 방법을 나타냅니다.
    snare_drum_shell_material:
      name: 스네어 드럼 쉘 소재
      description: 스네어 드럼 쉘에 사용되는 금속/합금을 명시합니다. 이는 음색, 무게 및 내구성에 큰 영향을 미칩니다.
    snare_drum_strainer_mechanism:
      name: 스네어 드럼 스트레이너 방식
      description: 스네어 와이어를 조이거나 풀어주는 스트레이너/스로오프 메커니즘 유형입니다.
    snare_drum_strainer_type:
      name: 스네어 드럼 스트레이너 타입
      description: 스네어 와이어를 조이거나 풀어주는 스트레이너/스로오프 메커니즘 유형입니다.
    snare_hoop_type:
      name: 스네어 후프 타입
      description: 스네어 드럼의 테두리/림 종류.
    snare_throw_off_type:
      name: 스네어 던지기 유형
      description: 올가미줄을 걸거나 푸는 데 사용되는 여과기/분리 장치의 종류.
    snip_cutter_spring_mechanism:
      name: 가위 절단기 스프링 메커니즘
      description: 가위 절단기에 스프링/복원 메커니즘이 사용되는지 여부와 그 방식을 나타냅니다.
    snorkel_mount_position:
      name: 스노클 마운트 위치
      description: 사용 중 스노클이 사용자의 머리 어느 위치에 놓이는지 설명합니다.
    snorkel_top_type:
      name: 스노클 탑 타입
      description: 세트에 포함된 스노클 상단의 입수 방지 장치에 대한 설명입니다.
    snow_condition_suitability:
      name: 눈 상태 적합성
      description: 이 왁스가 사용하도록 설계된 주요 눈 상태를 설명합니다.
    snow_sports_helmet_safety_certification:
      name: 스노우 스포츠 헬멧 안전 인증
      description: 스키 및 스노보드 사용 시 헬멧이 충족하는 안전 기준을 명시합니다.
    snowboard_base_material:
      name: 스노보드 베이스 소재
      description: '속도, 내구성 및 유지 관리에 영향을 미치는 베이스 구성 또는 마감 처리를 식별합니다(예: 압출, 소결 등급,
        독자 배합).'
    snowboard_width_class:
      name: 스노보드 너비 등급
      description: '부츠 사이즈에 따른 보드 전체 너비를 분류합니다(예: 보통, 넓음).'
    soccer_ball_compartment_type:
      name: 축구공 수납함 유형
      description: 축구공을 배낭에 넣을 수 있는지 여부와 방법을 명시합니다.
    soccer_ball_type:
      name: 축구공 유형
      description: '축구공의 용도 또는 스타일(예: 경기용, 훈련용, 풋살용)을 명시하여 소비자가 여러 하위 카테고리를 거치지 않고도
        적합한 이형 상품을 빠르게 찾을 수 있도록 합니다.'
    soccer_dummy_base_type:
      name: 축구 더미 베이스 유형
      description: 마네킹에 사용되는 받침대 또는 고정 장치의 종류를 설명합니다.
    soccer_dummy_design:
      name: 축구 더미 디자인
      description: '축구 골대 더미의 제작 방식(예: 고정형 또는 공기 주입식)을 지정합니다.'
    soccer_goal_target_style:
      name: 축구 골대 타겟 스타일
      description: 훈련 대상의 물리적 형태 또는 디자인을 정의하여 소비자가 자신의 훈련에 가장 적합한 스타일을 선택할 수 있도록 합니다.
    soccer_goal_type:
      name: 축구 골대 유형
      description: '골대의 구조적 스타일 또는 용도를 나타냅니다(예: 팝업, 리바운더, 스트리트).'
    sock_cushioning:
      name: 양말 쿠션감
      description: 양말에 포함된 발바닥 쿠션 또는 패딩의 양과 스타일을 나타냅니다.
    sock_cushioning_level:
      name: 양말 쿠션 수준
      description: 양말에 내장된 발바닥 쿠션의 양을 지정합니다.
    sock_grip_type:
      name: 양말 그립 유형
      description: 양말 밑창에 적용된 접지력 또는 미끄럼 방지 기능에 대해 설명합니다.
    sock_toe_style:
      name: 양말 발가락 스타일
      description: 양말 발가락 부분의 제작 방식을 설명합니다.
    soft_bait_style:
      name: 소프트베이트 스타일
      description: '연질 플라스틱 미끼(예: 웜, 스윔베이트, 그럽)의 몸체 디자인 또는 형태를 분류합니다.'
    soft_top_attachment_type:
      name: 소프트탑 부착 유형
      description: 소프트탑이 차량에 어떻게 부착되는지(채널, 스냅, 벨크로 등)를 설명합니다.
    soft_top_includes_frame_hardware:
      name: 소프트탑 프레임/하드웨어 포함 여부
      description: 제품에 소프트탑 프레임/활대 및/또는 장착 하드웨어가 포함되어 있는지 여부를 나타냅니다.
    soft_top_installation_type:
      name: 소프트탑 설치 유형
      description: 차량 소프트탑의 설치/부착 방법을 명시하며, 예상 설치 방법과 필요한 노력 정도를 나타냅니다.
    soft_top_window_configuration:
      name: 소프트탑 윈도우 구성
      description: 소프트탑에 창문이 몇 개 있고 어떤 위치에 있는지를 나타냅니다.
    softball_certification:
      name: 소프트볼 인증
      description: 리그/경기 적격성을 결정하는, 공에 인쇄된 관할 기관의 스탬프 또는 승인 목록을 나타냅니다.
    softness_level:
      name: 부드러움 수준
      description: 루프면이 얼마나 부드럽고 낮은 프로파일인지를 나타내며, 피부에 닿을 때의 편안함과 부피를 줄여야 하는 용도에 중요합니다.
    solar_system_model_included_bodies:
      name: 태양계 모형 포함 천체
      description: 모델 세트에 어떤 천체가 포함되어 있는지를 나타냅니다.
    solar_system_model_scaling:
      name: 태양계 모델 축척
      description: 태양계 모형이 행성 크기, 거리/궤도 또는 둘 다를 축척에 맞춘 모형인지, 아니면 개략적/비축척 표현인지를 나타냅니다.
    sold_secure_certification_level:
      name: Sold Secure 인증 등급
      description: '영국 독립 시험 기관이 해당 잠금 장치에 부여한 Sold Secure 등급을 명시합니다(예: 브론즈, 실버, 골드,
        다이아몬드).'
    sold_secure_rating:
      name: Sold Secure 등급
      description: 해당 잠금 장치에 부여된 Sold Secure 인증 등급을 나타냅니다.
    sole_construction:
      name: 밑창 구조
      description: '신발 밑창의 구조를 나타내며, 유연성, 바닥 접촉면, 특정 댄스 기술에 대한 적합성에 직접적인 영향을 미칩니다(예:
        전체, 분할형, 투피스).'
    sole_type:
      name: 밑창 유형
      description: 밑창의 구조적 특징을 설명하며, 유연성과 용도를 나타냅니다.
    soprano_saxophone_body_style:
      name: 소프라노 색소폰 바디 방식
      description: 소프라노 색소폰 본체의 물리적 구조를 설명합니다.
    soprano_saxophone_mouthpiece_baffle_type:
      name: 소프라노 색소폰 마우스피스 배플 유형
      description: 마우스피스의 배플/루프 디자인(팁 뒤쪽의 윤곽)에 대해 설명하며, 이는 음색의 밝기, 음량, 반응성에 영향을 미칩니다.
    soprano_saxophone_mouthpiece_chamber_size:
      name: 소프라노 색소폰 마우스피스 체임버 크기
      description: 소프라노 색소폰 마우스피스의 내부 챔버 사이즈를 설명하며, 이는 저항감과 음색에 영향을 미칩니다.
    soprano_saxophone_mouthpiece_finish:
      name: 소프라노 색소폰 마우스피스 마감
      description: 마우스피스에 적용된 표면 마감/도금을 설명합니다(해당되는 경우).
    soprano_saxophone_mouthpiece_included_accessories:
      name: 소프라노 색소폰 마우스피스가 포함된 액세서리
      description: 마우스피스에 함께 제공되는 액세서리를 식별합니다.
    soprano_saxophone_mouthpiece_tonal_character:
      name: 소프라노 색소폰 마우스피스의 음색 특성
      description: 마우스피스 설계에서 흔히 나타나는 전반적인 음색 프로필을 설명합니다.
    sound_character:
      name: 소리 특성
      description: 슬랩스틱이 만들어내는 전반적인 음색을 설명합니다.
    sound_expansion_method:
      name: 음향 확장 방법
      description: '모듈이 공장 기본 사운드 외에 내부 사운드 라이브러리를 추가하거나 확장할 수 있는 방법을 지정합니다(예: 콘텐츠
        팩, 샘플 가져오기, 확장 카드).'
    sound_module_sound_library_focus:
      name: 사운드 모듈 사운드 라이브러리 초점
      description: 공장 기본 사운드 세트의 주요 초점을 설명하여 구매자가 자신의 방식/사용 사례에 맞는 모듈을 찾을 수 있도록 합니다.
    sound_port_type:
      name: 사운드 포트 유형
      description: 카혼 뒷면의 사운드 홀/포트 설계를 설명하며, 이는 소리의 투사력과 저음역 응답에 영향을 미칩니다.
    sound_sensitivity_control:
      name: 소리 감도 조절
      description: 소리 감도를 조절할 수 있는지 여부와 조절 방법을 나타냅니다.
    sound_synthesizer_patch_memory:
      name: 음향 신디사이저 패치 메모리
      description: 신디사이저가 프리셋(패치)을 저장하고 불러올 수 있는지 여부를 나타냅니다.
    sound_type:
      name: 소리 유형
      description: '매트가 생성하는 주요 사운드 유형 또는 오디오 출력(예: 악기, 노래, 음성)은 플레이를 안내합니다.'
    soundboard_material:
      name: 사운드보드 재질
      description: 하프의 사운드보드(상판)에 사용되는 재료로, 공명과 음색을 좌우합니다.
    soup_or_broth_variety:
      name: 수프 또는 국물 종류
      description: 소비자가 선호하는 종류를 빠르게 찾을 수 있도록 수프나 육수의 스타일, 레시피 또는 조리 방법을 명시합니다.
    sour_cream_variety:
      name: 사워크림 종류
      description: 크렘 프레슈나 멕시칸 크레마처럼 특정 품종이나 문화적 스타일에 따라 사워크림 제품을 분류합니다.
    soy_sauce_variety:
      name: 간장 종류
      description: '간장의 종류 또는 제조법(예: 연한 간장, 진한 간장, 타마리, 폰즈 간장)을 특정하여 소비자가 맛과 요리 용도별로
        빠르게 필터링할 수 있도록 합니다.'
    spark_plug_electrode_material:
      name: 스파크 플러그 전극 소재
      description: '스파크 플러그의 발화단 전극 팁에 사용된 소재/기술을 나타냅니다(예: 구리, 백금, 이리듐).'
    spark_plug_seat_type:
      name: 스파크 플러그 시트 유형
      description: 실린더 헤드 접합부에서 스파크 플러그에 사용되는 밀봉/시트 방식을 나타냅니다.
    spark_plug_terminal_type:
      name: 점화 플러그 단자 유형
      description: 점화 리드/부트를 연결하는 데 사용되는 상단 단자 방식을 나타냅니다.
    sparkler_shape:
      name: 스파클러 모양
      description: 스파클러의 전반적인 장식적 모양/형태를 나타냅니다.
    speaker_cone_material:
      name: 스피커 콘 소재
      description: '스피커 콘의 주요 소재를 나타냅니다(예: 우퍼 콘, 미드 콘).'
    speaker_size:
      name: 스피커 크기
      description: '공장 장착 위치 및 스피커 어댑터와 맞추는 데 사용되는 컴포넌트 스피커의 공칭 드라이버 사이즈/장착 사이즈를 나타냅니다(예:
        6.5인치, 6x9인치).'
    special_effects_output_interface:
      name: 특수 효과 출력 인터페이스
      description: 특수 효과 장치를 제어하는 데 사용되는 출력 커넥터/인터페이스를 지정합니다.
    special_effects_stand_stability_features:
      name: 특수 효과 스탠드 안정성 기능
      description: 이벤트 중 넘어지거나 미끄러지는 것을 방지하기 위한 내장형 안정성 및 안전 기능을 명시합니다.
    specialty_malt_name_type:
      name: 특수 맥아 이름/종류
      description: 특정 특수 맥아 종류(종종 상업적 스타일 이름으로 사용됨)를 명시합니다.
    specimen_presentation:
      name: 표본 제시 방식
      description: '수집용 표본이 어떻게 준비되거나 제시되는지를 나타냅니다(예: 원상태/미가공, 연마, 절단 또는 마운팅).'
    speed_bag_accessories_included:
      name: 포함된 스피드백 액세서리
      description: '스피드백과 함께 제공되는 추가 품목을 나열합니다(예: 장갑, 공기 펌프, 스위블, 체인, 스탠드).'
    speed_rating:
      name: 속도 등급
      description: '당구대 천이 제공하는 경기 표면 속도를 나타냅니다(예: 느림, 중간, 빠름).'
    speedometer_backlight_type:
      name: 속도계 백라이트 유형
      description: 야간 시인성을 위해 속도계에 백라이트가 있는지와 백라이트 방식을 지정합니다.
    speedometer_display_type:
      name: 속도계 표시 유형
      description: 속도계의 속도 표시 방식을 나타냅니다. 아날로그 바늘/다이얼, 디지털 숫자 표시 또는 아날로그와 디지털 요소 조합을
        지정합니다.
    speedometer_unit_of_measure:
      name: 속도계 측정 단위
      description: 다이얼/디스플레이에 표시되는 속도 단위를 지정합니다.
    spike_replaceability:
      name: 스파이크 교체 가능성
      description: 신발의 스파이크가 교체 가능한지, 고정되어 있는지, 아니면 스파이크가 없는지 여부를 나타냅니다.
    spike_shape:
      name: 스파이크 모양
      description: 스파이크 핀 끝의 기하학적 모양을 식별합니다. 이는 그립력과 다양한 트랙 표면에 대한 적합성에 영향을 미칩니다.
    spike_thread_size:
      name: 스파이크 나사 크기
      description: '신발에 나사로 고정되는 나사산 베이스의 사이즈 또는 규격을 지정합니다(예: 1/4-20).'
    spin_classification:
      name: 회전 등급
      description: 원반이 구현하도록 설계된 스핀 프로필을 나타냅니다(낮음, 중간, 높음, 하이퍼 스핀).
    spin_profile:
      name: 스핀 프로파일
      description: 샤프트가 제공하는 상대적인 회전 특성을 명시합니다.
    spin_types_supported:
      name: 지원 스핀 유형
      description: 기계가 공에 부여할 수 있는 스핀 종류를 나열하여 플레이어가 다양한 샷 방식에 맞춰 연습할 수 있도록 합니다.
    spinach_preparation_style:
      name: 시금치 준비 형태
      description: '시금치 잎의 물리적 준비 형태 또는 제품 형식을 설명합니다(예: 통잎, 다진 것, 큐브).'
    spinach_variety:
      name: 시금치 품종
      description: '식물학적 품종 또는 시장에서 구분되는 시금치 품종을 식별하여 소비자가 원하는 정확한 유형을 선택할 수 있도록 합니다(예:
        베이비, 사보이, 워터, 레드).'
    spindle_bearing_surface_material:
      name: 스핀들 베어링 표면 소재
      description: 지지 스핀들에 사용되는 포인트/베어링 표면의 소재를 나타냅니다. 이는 매끄러움과 마모에 영향을 미칩니다.
    spindle_bearing_type:
      name: 스핀들 베어링 유형
      description: 지지 보울/컵과의 마찰을 줄이는 스핀들 팁/베어링 인터페이스 유형.
    spindle_finish:
      name: 스핀들 마감
      description: 스핀들의 표면 마감/코팅을 나타냅니다. 이는 촉감, 내구성 및 미관에 영향을 미칩니다.
    spindle_hook_type:
      name: 스핀들 후크 유형
      description: 스핀들 상단의 실 걸이 장치는 리더/실을 고정하는 데 사용됩니다.
    spindle_support_method:
      name: 스핀들 지지 방식
      description: 방적 중 스핀들이 어떻게 지지되도록 설계되었는지를 나타냅니다.
    spindle_tip_style:
      name: 스핀들 팁 모양
      description: 보울/컵에 닿는 포인트, 즉 베어링 표면의 모양/디자인을 나타냅니다. 이는 마찰과 회전의 매끄러움에 영향을 미칩니다.
    spindle_whorl_position:
      name: 가락바퀴 위치
      description: 회전추가 스핀들 축에 위치하는 지점을 나타냅니다.
    spinner_blade_shape:
      name: 스피너 블레이드 모양
      description: 스피너에 사용되는 주요 블레이드 모양을 식별합니다. 이는 진동, 플래시, 작동 깊이에 영향을 미칩니다.
    spinner_control_card_design_type:
      name: 스피너 제어 카드 디자인/유형
      description: '제어 정보를 표시하는 방식에 따라 스피너 제어 카드의 유형을 설명합니다(예: 비율 참조, 장력 참조, 변환 차트).'
    spinner_subtype:
      name: 스피너 세부 유형
      description: '스피너의 전반적인 디자인 또는 계열을 분류합니다(예: 인라인 스피너, 스피너베이트).'
    spinning_oil_application_area:
      name: 스피닝 오일 적용 영역
      description: 스피닝 휠에서 오일을 도포하도록 의도된 적용 지점을 지정합니다.
    spinning_oil_application_tool:
      name: 방적유 도포 도구
      description: 스피닝 휠 부품에 오일을 정밀하게 도포하기 위해 사용되는 어플리케이터/패키징 팁 방식을 나타냅니다.
    spinning_oil_features:
      name: 방적유의 특징
      description: '스피닝 휠 오일과 관련된 기능적 특성을 강조합니다(예: 잔류물, 얼룩, 산화, 세척성).'
    spinning_top_features:
      name: 팽이 기능
      description: 기본 회전 외에 팽이에 포함된 특별한 놀이 기능을 나타냅니다.
    spinning_top_launch_mechanism:
      name: 팽이 발사 장치
      description: 팽이를 회전시키기 위해 시작하거나 추진하는 방법을 나타냅니다.
    spinning_wheel_brake_tension_system_type:
      name: 회전 휠 브레이크/장력 시스템 유형
      description: 실 감기를 제어하는 데 사용되는 제동/감기 장력 시스템을 지정합니다.
    spinning_wheel_drive_system:
      name: 물레 구동 시스템
      description: 보빈이 사용될 구동 시스템을 나타냅니다.
    spinning_wheel_hook_system:
      name: 스피닝 휠 후크 체계
      description: 플라이어 암을 따라 실이 어떻게 안내되는지 지정합니다.
    spinning_wheel_part_application:
      name: 스피닝 휠 부품 적용 대상
      description: 오일이 어떤 스피닝 휠 부품에 사용되도록 설계되었는지 명시합니다.
    spinning_wheel_portability_foldability:
      name: 물레 휴대성/접이식
      description: 스피닝 휠이 운반을 위해 접거나 접어 넣을 수 있도록 설계되었는지 여부를 나타냅니다.
    spinning_wheel_tension_adjustment_type:
      name: 스피닝 휠 장력 조절 유형
      description: 실 감기 제어를 위해 스피닝 휠의 장력을 어떻게 조절하는지 설명합니다.
    splice_termination_type:
      name: 접합/끝마감 유형
      description: '앵커 라인에 제공되는 끝단(예: 스플라이스 아이, 썸블, 체인 후크)을 지정합니다.'
    split_shot_cut_type:
      name: 스플릿 샷 절단 유형
      description: 라인에 부착할 수 있게 하는 홈 또는 개구부 방식을 지정합니다.
    split_shot_shape:
      name: 조니 싱커 모양
      description: 스플릿 샷 추의 물리적 형태를 설명합니다. 이는 유체역학 및 걸림 저항에 영향을 미칩니다.
    split_shot_size:
      name: 스플릿 샷 사이즈
      description: '표준화된 영숫자 크기 코드(예: 제조업체와 낚시인이 스플릿 샷 싱커를 분류하는 데 사용하는 표준화된 영숫자 사이즈
        코드입니다(예: SSG, AAA, BB, 1). 정확한 무게 측정값을 보완합니다.'
    spoiler_adjustability:
      name: 스포일러 조절 기능
      description: 스포일러의 각도/높이 조절 가능 여부를 나타냅니다.
    spoke_accessory_function:
      name: 스포크 액세서리 기능
      description: '휠에 장착되는 액세서리의 주요 기능을 분류합니다(예: 장식용, 반사용, 조명용).'
    spoke_butting_profile:
      name: 스포크 버팅 프로필
      description: 스포크 직경이 길이를 따라 어떻게 변하는지(일반, 싱글 버티드, 더블 버티드, 트리플 버티드 또는 쿼드 버티드)
        설명하며, 이는 무게와 강도에 영향을 미칩니다.
    spoke_gauge:
      name: 스포크 게이지
      description: 니플이 호환되는 스포크의 게이지(와이어 두께 등급)를 지정합니다.
    spoke_interface_type:
      name: 스포크 인터페이스 유형
      description: '허브가 지원하도록 설계된 스포크 헤드 방식/유형을 나타냅니다(예: J벤드, 스트레이트 풀, T헤드).'
    spoke_shape:
      name: 스포크 모양
      description: 스포크 와이어의 외부 단면 형태를 지정합니다. 이는 공기역학 및 미관에 영향을 미칩니다.
    spool_form_factor:
      name: 스풀 폼 팩터
      description: '스풀 본체의 물리적 형태와 실/원사가 고정되는 방식을 나타냅니다(예: 플랜지형, 콘형).'
    spoon_style:
      name: 스푼 방식
      description: '스푼의 기능적 하위 유형 또는 방식을 나타냅니다(예: 캐스팅, 플러터, 트롤링).'
    sports_bra_padding_type:
      name: 스포츠 브라 패딩 유형
      description: 스포츠 브라에 사용된 패딩의 종류를 명시합니다.
    sports_cap_style:
      name: 스포츠 캡 방식
      description: '팀 브랜딩과 관계없이 모자의 전반적인 구조/방식을 식별합니다(예: 야구 모자, 스냅백).'
    sports_governing_body_certification:
      name: 스포츠 관리 기관 인증
      description: 해당 제품이 경기 기준을 충족함을 확인하는 공인 스포츠 관리 기관의 공식 인증 또는 승인을 나타냅니다.
    sports_surface_compatibility:
      name: 스포츠 표면 호환성
      description: 페인트를 안전하게 도포할 수 있는 경기장/표면 유형을 나열합니다.
    sports_toy_set_contents:
      name: 스포츠 장난감 세트 구성품
      description: '스포츠 장난감 세트에 포함된 구성품(예: 공, 배트, 네트, 과녁)을 명시합니다.'
    spray_string_cleanup_method:
      name: 스프레이 스트링 청소 방법
      description: 스프레이 스트링 잔여물을 제거/청소할 때 권장하는 방법을 나타냅니다.
    spray_string_finish_effect:
      name: 스프레이 스트링 마감/효과
      description: '분사된 스트링이 도포된 후의 시각적 효과를 나타냅니다(예: 광택, 반사율, 특수 효과).'
    spray_string_formulation_type:
      name: 스프레이 스트링 배합 유형
      description: '분사 중 및 분사 후 제품의 특성을 나타냅니다(예: 세척 가능, 영구형).'
    spray_string_recommended_surface:
      name: 스프레이 스트링 권장 표면
      description: 스프레이 스트링을 사용할 수 있는 표면 유형과 쉽게 닦아낼 수 있는 표면 유형을 나타냅니다.
    spray_string_scent:
      name: 스프레이 스트링 향
      description: 스프레이 스트링의 향 또는 냄새 프로필을 나타냅니다(해당하는 경우).
    spray_string_suitable_age_group:
      name: 스프레이 스트링 적정 연령대
      description: 안전한 사용을 위한 권장 최소 사용자 연령/연령대를 나타냅니다.
    spread_consistency:
      name: 스프레드 농도
      description: '딥 또는 스프레드의 질감/농도를 설명하여 식감과 사용 방식에 대한 기대치를 설정합니다(예: 부드러움, 덩어리짐,
        휘핑).'
    spread_variety:
      name: 스프레드 종류
      description: '과일 스프레드의 종류(예: 잼, 젤리, 마멀레이드, 커드)를 분류하여 쇼핑객이 다양한 제조 방식과 질감을 구분할
        수 있도록 합니다.'
    spreader_bar_type:
      name: 스프레더 바 유형
      description: 하네스와 함께 제공되거나 호환되는 스프레더 바 또는 후크 체계의 유형을 나타냅니다.
    sprint_canoe_class:
      name: 스프린트 카누 등급
      description: 스프린트 카누 경주 종목의 공식 명칭을 명시합니다.
    sprout_presentation:
      name: 새싹 제공 형태
      description: '제품의 물리적 형태(예: 신선한 새싹, 마이크로그린, 생장 포트, 분말)를 식별합니다.'
    squash_and_gourd_variety:
      name: 호박과 박 종류
      description: 호박이나 조롱박의 특정 품종 또는 시장 품종을 식별하여 소비자가 원하는 종류를 빠르게 찾을 수 있도록 도와줍니다.
    stability_class:
      name: 안정성 등급
      description: 비행 등급 또는 마케팅 문구를 기반으로 한 일반적인 안정성 분류를 나타냅니다.
    stabilizer_thread_size:
      name: 안정기 나사산 사이즈
      description: 활이나 석궁에 안정기 또는 액세서리를 부착하는 데 사용되는 나사산 규격을 나타냅니다.
    stabilizer_type:
      name: 안정기 유형
      description: 활이나 석궁 안정기의 방식 또는 위치 분류를 식별합니다.
    stages_supported:
      name: 지원되는 단계
      description: 로켓이나 키트가 비행 시 몇 단계로 작동하도록 설계되었는지를 나타냅니다.
    stain_remover_format:
      name: 얼룩 제거제 형식
      description: 차량 얼룩 제거에 사용되는 제품 제공 형태/형식(스프레이 병, 에어로졸, 폼, 젤, 파우더, 티슈, 펜/마커)을
        명시합니다.
    stake_shape:
      name: 말뚝 모양
      description: 텐트 말뚝의 단면 또는 디자인 방식을 정의하며, 이는 다양한 지면 유형에서 고정력에 영향을 미칩니다.
    stamp_block_features:
      name: 스탬프 블록 특징
      description: 측정 격자, 손잡이 또는 미끄럼 방지 표면과 같은 스탬프 블록의 기능적 특징을 강조합니다.
    stamp_block_type:
      name: 스탬프 블록 유형
      description: '스탬프 작업 시 스탬프를 장착하는 데 사용되는 스탬프 블록의 구조/방식을 지정합니다(예: 투명 아크릴 블록, 목재
        장착 블록, 위치 지정 블록).'
    stamp_set_pieces_included:
      name: 스탬프 세트 구성품 포함
      description: '스탬프 및 스탬프 패드 세트에 포함된 구성품(예: 스탬프, 잉크 패드, 마커)을 나타냅니다.'
    stand_padding_material:
      name: 스탠드 패딩 소재
      description: '악기 마감면을 보호하기 위해 접촉 부위에 사용되는 소재를 나타냅니다(예: 폼, 고무, 실리콘).'
    staple_fiber_animal_fiber_type:
      name: 스테이플 섬유 동물성 섬유 유형
      description: 단섬유 원료 공급원 유형이 동물인 경우의 구체적인 동물성 섬유 종류를 나타냅니다.
    staple_fiber_crimp_level:
      name: 스테이플 섬유 크림프 수준
      description: 섬유의 자연적인 크림프/물결 정도를 나타냅니다.
    staple_fiber_preparation_type:
      name: 스테이플 섬유 준비 유형
      description: 판매되는 섬유의 준비/가공 상태(정렬/취급 방식)를 나타내며, 방적 방법, 연신 용이성 및 최종 결과에 큰 영향을
        미칩니다.
    staple_fiber_source_type:
      name: 스테이플 섬유 원산 유형
      description: 섬유 구성의 광범위한 원산 범주를 나타냅니다.
    starch_processing_type:
      name: 전분 가공 유형
      description: '전분이 천연 전분인지, 또는 점도 증가 속도나 온도 내성과 같은 특정 기능적 특성을 제공하기 위해 물리적 또는
        화학적으로 변형된 전분(예: 인스턴트 전분, 예비젤라틴화 전분)인지를 나타냅니다.'
    starch_source:
      name: 전분 원료
      description: '조리용 전분 또는 증점제의 식물성 원료를 명시합니다(예: 옥수수, 감자, 타피오카). 전분 원료는 조리용 전분의
        주요 차별화 요소이며, 레시피 적합성, 알레르기 유발 가능성, 소비자 검색 행동에 직접적인 영향을 미칩니다.'
    starfruit_variety:
      name: 스타프루트 품종
      description: '스타프루트의 특정 품종 또는 변종을 식별합니다(예: 아킨, 푸앙퉁).'
    starter_drive_type:
      name: 스타터 드라이브 유형
      description: 피니언을 링 기어와 맞물리게 하는 데 사용되는 스타터 구동/맞물림 메커니즘 유형을 나타냅니다.
    starter_pistol_action_type:
      name: 스타터 권총 작동 유형
      description: '스타터 권총의 발사/작동 메커니즘을 식별합니다(예: 싱글 액션, 더블 액션, 반자동).'
    starter_pistol_caliber:
      name: 스타터 권총 구경
      description: 스타터 권총에 장전되는 공포탄 또는 카트리지 구경을 지정합니다.
    starter_terminal_type:
      name: 스타터 단자 유형
      description: '스타터 또는 스타터 솔레노이드의 전기 연결에 사용되는 단자/커넥터 방식을 지정합니다(예: 스터드, 스페이드, 플러그
        커넥터).'
    starting_block_anchoring_method:
      name: 스타팅 블록 고정 방법
      description: '블록이 트랙 표면에 어떻게 고정되는지 설명합니다(예: 스파이크, 흡착판, 고무 패드).'
    steerer_tube_design:
      name: 스티어러 튜브 설계
      description: 헤드셋 및 프레임 호환성을 결정하는 스티어러 튜브의 구조적 설계(직선형, 테이퍼형, 나사산형 등)를 설명합니다.
    steering_cable_end_fitting_type:
      name: 스티어링 케이블 끝단 피팅 유형
      description: 선박 조향 케이블 끝단의 마감/부착 방식(조타 장치 쪽 및 엔진/틸러 쪽)을 식별하여 조타 장치 및 엔진 연결 지점과의
        호환성을 확인합니다. 해당되는 경우 표준 또는 제조업체 지정을 사용하십시오.
    steering_column_adjustability_features:
      name: 스티어링 열 조절 기능
      description: 스티어링 칼럼에 내장된 조정 기능을 나타냅니다.
    steering_column_ignition_provision:
      name: 스티어링 칼럼 점화 장치 포함 여부
      description: 스티어링 칼럼이 점화 잠금 실린더/스위치 및/또는 스티어링 잠금 장치를 수용하도록 설계되었는지 여부를 나타냅니다.
    steering_column_shaft_end_interface_type:
      name: 스티어링 칼럼 샤프트 끝단 인터페이스 유형
      description: '스티어링 칼럼 샤프트 끝단 인터페이스 방식(예: 스플라인형, 더블 D형, 키형)을 식별합니다.'
    steering_column_shift_type:
      name: 스티어링 칼럼 변속 유형
      description: 스티어링 칼럼 장착 변속 메커니즘의 포함 여부와 변속기 유형을 명시합니다.
    steering_component_drive_type:
      name: 조향 부품 구동 방식
      description: 조향 부품(특히 펌프 및 구동 폴리스티렌 시스템)과 관련된 구동/보조 메커니즘을 명시합니다.
    steering_position:
      name: 스티어링 위치
      description: 차량이 좌측 핸들인지 우측 핸들인지를 명시합니다.
    steering_pump_pulley_type:
      name: 스티어링 펌프 풀리 유형
      description: 스티어링 펌프에 사용되는 풀리 구동 방식/인터페이스를 지정합니다.
    steering_rack_finish_coating:
      name: 스티어링 랙 마감/코팅
      description: 부식 방지를 위한 외부 마감/코팅을 지정합니다.
    steering_rack_position:
      name: 스티어링 랙 위치
      description: 차량 조향 시스템에서 랙이 장착/사용되는 위치를 지정합니다.
    steering_wheel_cover_installation_type:
      name: 스티어링 휠 커버 장착 유형
      description: 스티어링 휠 커버를 스티어링 휠에 장착/고정하는 방법을 나타냅니다.
    steering_wheel_grip_material:
      name: 스티어링 휠 그립 소재
      description: 스티어링 휠 림/그립 부분의 소재를 명시하며, 이는 휠의 중심부/스포크 소재와 다를 수 있습니다.
    steering_wheel_mounting_pattern:
      name: 스티어링 휠 장착 패턴
      description: '스티어링 휠을 허브 또는 어댑터에 고정하는 데 사용되는 볼트/구멍 장착 패턴을 지정합니다(예: 3볼트, 5볼트).'
    steering_wheel_rim_material_grip_surface:
      name: 스티어링 휠 림 소재(그립 표면)
      description: 주요 그립/림 커버 소재를 지정합니다(전체 구조 소재와는 별개).
    stem_material:
      name: 스템 재료
      description: '파이프 스템 또는 마우스피스에 사용되는 소재를 구체적으로 명시합니다(예: 아크릴, 에보나이트, 루사이트).'
    stencil_machine_consumable_type:
      name: 스텐실 기계 소모품 유형
      description: 작동에 필요한 소모품(있는 경우)을 명시합니다.
    step_surface_texture:
      name: 발판 표면 질감
      description: 젖은 상태에서 접지력과 편안함을 높이도록 설계된 스텝 발판 또는 표면 디자인/소재를 지정합니다.
    stepper_motion_type:
      name: 스테퍼 동작 타입
      description: 기계가 제공하는 주요 스텝 동작을 정의합니다.
    stick_bow_profile:
      name: 스틱 보우 프로필
      description: 필드하키 스틱 샤프트의 곡률 프로필(또는 “보우 유형”)을 지정하며, 이는 볼 컨트롤, 드래그 플릭 성능, 플레이
        방식 등에 영향을 미치는 중요한 요소입니다.
    stick_construction:
      name: 스틱 구조
      description: 일체형 복합재, 2피스 복합재 또는 목재와 같은 하키 스틱의 제작 방식을 지정합니다.
    stick_curvature_type:
      name: 스틱 곡률 유형
      description: 투척봉의 곡률 프로필을 설명하며, 이는 투척 거리와 정확도에 영향을 미칩니다.
    stick_head_shape:
      name: 스틱 헤드 모양
      description: 스틱 헤드의 모양을 정의하며, 이는 트래핑, 타격 방식 및 근거리 볼 컨트롤에 영향을 미칩니다.
    stick_size_compatibility:
      name: 스틱 크기 호환성
      description: '제품이 호환되는 하키 스틱 사이즈 그룹을 식별합니다(예: 유소년, 주니어, 중급, 시니어, 골리, 범용).'
    sticker_decal_features:
      name: 스티커/데칼 특징
      description: '스티커/데칼에 특화된 용도 및 성능 특성(예: 기포 없음, 재부착 가능)을 포착합니다.'
    sticker_finish:
      name: 스티커 마감
      description: 스티커의 표면 마감/시각적 효과에 대해 설명합니다.
    sticker_format:
      name: 스티커 형식
      description: '장식 스티커의 소매 판매 형태(예: 시트, 롤, 개별 포장, 책자)를 지정합니다.'
    sticker_material_type:
      name: 스티커 재질 종류
      description: 장식 스티커의 주요 기재/소재를 지정합니다(장식 요소는 제외).
    stilt_foot_attachment_type:
      name: 스틸트 발 부착 유형
      description: '사용자의 발이 죽마에 어떻게 부착되는지 지정합니다(예: 버클 스트랩, 후크 앤 루프, 끈).'
    stirrup_style:
      name: 등자 방식
      description: 안전, 종목 및 구조상 차이를 포함하여 설계 또는 종목별 등자 방식을 분류합니다.
    stirrup_tread_material:
      name: 등자 발판 소재
      description: 등자의 발판 또는 트레드에 사용되는 소재를 명시하며, 이는 접지력, 편안함 및 착용감에 영향을 미칩니다.
    stitch_marker_and_counter_style:
      name: 스티치 마커 및 카운터 방식
      description: '스티치 마커 또는 스티치/단 카운터의 방식 또는 형태를 지정합니다(예: 잠금 마커, 분할 링 마커, 링 카운터,
        디지털 카운터).'
    stitch_types:
      name: 스티치 유형
      description: 재봉틀로 만들 수 있는 스티치 유형(기능성 스티치 및 장식용 스티치)을 나타냅니다.
    stitching_method:
      name: 바느질 방법
      description: 볼 패널들이 어떻게 서로 연결되는지를 나타냅니다.
    stitching_state:
      name: 스티칭 상태
      description: 의류 조각이 미봉제, 반봉제, 봉제 완료 또는 기성복 상태로 제공되는지 여부를 나타냅니다.
    stock_car_race_series:
      name: 스톡카 레이스 시리즈
      description: 해당 스톡카가 참가하도록 제작된 경기 승인 단체 또는 레이스 시리즈/클래스를 명시합니다.
    stone_adhesion:
      name: 씨앗 분리 정도
      description: 복숭아 또는 천도복숭아의 씨가 과육에서 쉽게 분리되는지, 붙어 있는지, 일부 분리되는지를 나타냅니다.
    stone_creation_method:
      name: 보석 생성 방식
      description: 해당 보석이 천연, 랩그로운, 모조 또는 재활용인지 명시합니다.
    stone_cut_grade:
      name: 보석 컷 등급
      description: 해당 보석의 전반적인 컷 품질 평가를 나타냅니다.
    stone_cut_style:
      name: 보석 컷 스타일
      description: '유리석의 컷/패싯 방식(예: 패싯 컷, 캐보숑)을 나타냅니다.'
    stone_fruit_cultivar:
      name: 핵과류 품종
      description: 복숭아 또는 천도복숭아의 특정 품종을 식별합니다.
    stone_fruit_variety:
      name: 핵과류 품종
      description: '해당 범주 내의 하위 유형을 구분합니다(예: 복숭아, 천도복숭아, 도넛/납작 복숭아).'
    stone_setting_type:
      name: 보석 세팅 유형
      description: 보석이 제품에 고정되는 방식(베젤, 프롱, 파베 등)을 명시합니다.
    stone_transparency:
      name: 보석 투명도
      description: 유리석의 광학적 투명도/불투명도를 나타냅니다.
    storage_case_type:
      name: 보관 케이스 유형
      description: '보관 및 운송을 위해 세트와 함께 제공되는 용기 유형을 나타냅니다(예: 상자, 케이스, 가방).'
    storage_compartment_type:
      name: 수납 공간 유형
      description: 수영용 부표에 개인 소지품을 보관할 수 있도록 제공되는 수납 공간 유형을 명시합니다.
    storage_media_and_transfer_methods_supported:
      name: 지원되는 저장 매체 및 전송 방법
      description: 샘플 가져오기/내보내기 및 프로젝트 저장/불러오기에 지원되는 매체 또는 연결 방법을 나타냅니다.
    storage_requirements:
      name: 보관 요구 사항
      description: 제품의 품질과 안전을 유지하기 위해 개봉 전 및/또는 개봉 후 제품을 어떻게 보관해야 하는지 명시합니다.
    stove_jack_compatibility:
      name: 스토브 잭 호환성
      description: 텐트에 난로 연통용 내화 개구부가 있는지 여부를 나타냅니다.
    straight_pin_application:
      name: 스트레이트 핀 용도
      description: 스트레이트 핀의 용도를 지정합니다.
    straight_pin_finish:
      name: 스트레이트 핀 마감
      description: '핀의 표면 마감 또는 코팅(예: 니켈 도금)을 설명하며, 이는 내식성 및 미끄러짐 성능에 영향을 미칩니다.'
    straight_pin_head_material:
      name: 스트레이트 핀 헤드 소재
      description: '핀 헤드가 있는 경우 해당 소재를 명시합니다(예: 플라스틱, 유리).'
    straight_pin_head_shape:
      name: 스트레이트 핀 헤드 모양
      description: 사용성과 가시성을 고려하여 핀 헤드의 모양/방식을 설명합니다.
    strand_configuration:
      name: 스트랜드 구성
      description: 디지털 지갑 체인을 구성하는 개별 행 또는 가닥의 수(싱글, 더블, 트리플)를 나타냅니다.
    strand_material:
      name: 스트랜드 소재
      description: 개별 가닥/스트리머에 사용되는 소재를 명시합니다.
    strap_attachment_hardware:
      name: 스트랩 연결 하드웨어
      description: 스트랩을 악기/지지 지점에 부착하는 데 사용되는 하드웨어의 유형/디자인을 지정합니다.
    strap_configuration:
      name: 스트랩 구성
      description: '스트랩에 있는 헬멧 부착 지점의 수(예: 2점식, 4점식)를 나타냅니다. 이는 착용감, 안전 및 리그 규정에 매우
        중요합니다.'
    strap_functionality:
      name: 스트랩 기능
      description: 요가 매트 스트랩의 주된 용도 또는 디자인을 명시합니다.
    strap_padding:
      name: 스트랩 패딩
      description: 스트랩의 패딩 처리 수준을 나타내며, 이는 착용감을 개선하고 무게를 분산하기 위한 것입니다.
    strap_side:
      name: 스트랩 쪽
      description: 스트랩이 왼쪽 바인딩용인지, 오른쪽 바인딩용인지, 또는 한 쌍으로 판매되는지를 나타냅니다.
    strap_width:
      name: 스트랩 너비
      description: 어깨끈의 상대적인 너비(얇음, 중간, 넓음)를 표시하여 특정 커버력이나 지지력을 원하는 소비자에게 안내합니다.
    strength_classification:
      name: 강도 분류
      description: '브랜드에서 일반적으로 사용하는 마케팅용 강도 표시를 나타냅니다(예: 약함, 강함, 매우 강함).'
    strength_grade:
      name: 강도 등급
      description: 후크 앤 루프 잠금장치의 의도된 고정 강도/내구 수준을 설명합니다.
    stretch_level:
      name: 신축 수준
      description: 사용 중에 직물이 얼마나 신축되는지를 나타냅니다.
    stretch_type:
      name: 신축 유형
      description: 원단이 기계적 신축 또는 탄성 신축을 가지는지, 그리고 어느 방향으로 신축되는지를 나타냅니다.
    stretcher_bar_material:
      name: 스트레처 바 소재
      description: '스트레처 바/프레임에 사용된 소재(예: 소나무, 전나무, 포플러, 자작나무, MDF/엔지니어링 목재)를 나타냅니다.'
    strike_shield_shape:
      name: 스트라이크 쉴드 모양
      description: 스트라이크 실드의 타격면의 전체적인 형태를 지정합니다.
    string_core_shape:
      name: 현 코어 모양
      description: 권선현에 사용되는 코어 와이어의 모양을 지정하며, 이는 연주감과 안정성에 영향을 미칩니다.
    string_coverage:
      name: 현 커버 범위
      description: 부분 카포가 어떤 현을 누르거나 덮도록 설계되었는지 지정합니다(개수 또는 일반적인 세트 기준).
    string_end_type:
      name: 현 끝 유형
      description: 브리지/테일피스에서 현 끝이 어떻게 처리되는지 지정하여 호환성을 확보합니다(특히 어쿠스틱/일렉트릭 기타 및 일부
        베이스 기타에서 중요).
    string_set_type:
      name: 스트링 세트 유형
      description: 제품이 풀세트인지 개별 교체용 현인지를 지정합니다.
    strung_status:
      name: 스트링 상태
      description: 라크로스 헤드에 포켓이 미리 스트링 처리되어 있는지, 아니면 스트링이 없는 상태로 판매되는지를 나타냅니다.
    strut_placement:
      name: 스트럿 장착 위치
      description: 차량에서 스트럿의 설치 위치(전면/후면 및 좌측/우측)를 지정합니다.
    stud_attachment_type:
      name: 스터드 부착 유형
      description: 밑창에 스터드/클리트가 어떻게 부착되거나 구성되는지 명시하며, 이는 접지력, 유지 관리 및 리그 규정 준수에 영향을
        미칩니다.
    stud_configuration:
      name: 스터드 구성
      description: 밑창 스터드/클리트의 모양과 배열을 정의하며, 이는 다양한 표면에서의 접지력과 성능에 영향을 미칩니다.
    stud_material:
      name: 스터드  소재
      description: 스터드/클리트의 주요 소재를 파악하여 내구성, 무게 및 안전 규정 준수 여부를 알려줍니다.
    stuffed_animal_features:
      name: 봉제인형 특징
      description: 봉제인형에 내장된 놀이 및 편안함 기능을 강조합니다.
    stump_base_type:
      name: 스텀프 받침대 유형
      description: 크리켓 스텀프에 사용되는 받침대 또는 장착 체계의 방식(스파이크, 스프링 복귀식, 무게추가 달린 고무 등)을 정의합니다.
    stump_mechanism:
      name: 스텀프 메커니즘
      description: '크리켓 스텀프의 복귀 또는 장착 구조(예: 스프링 복귀식, 고정식)를 지정합니다.'
    stump_size:
      name: 스텀프 사이즈
      description: 크리켓 스텀프에 사용되는 범주형 사이즈 표시로, 일반적인 높이와 적합한 선수 연령대를 나타냅니다.
    subwoofer_installation_type:
      name: 서브우퍼 설치 유형
      description: 차량용 오디오 시스템에서 서브우퍼를 설치하는 방식을 나타냅니다.
    sugar_cane_variety:
      name: 사탕수수 품종
      description: 색상, 단맛, 섬유질 함량에 영향을 미칠 수 있는 사탕수수의 특정 재배 품종 또는 유통 품종을 식별합니다.
    sugar_content_level:
      name: 당 함량 수준
      description: 음료 농축액의 전체 당 함량 또는 배합을 분류하여 소비자가 일반, 저당 또는 무설탕 옵션을 빠르게 찾을 수 있도록
        합니다.
    sugar_refinement_level:
      name: 설탕 정제 수준
      description: 정제 정도 또는 방식을 나타냅니다(색상, 당밀 함량 또는 가공 수준).
    sugar_source:
      name: 설탕 원료
      description: 설탕이 유래한 식물학적 또는 소재 원산/출처를 식별합니다.
    suit_fit:
      name: 정장 핏
      description: 정장의 전체적인 핏을 나타내며, 몸에 얼마나 밀착되는지를 설명합니다.
    suit_pieces:
      name: 정장 구성품 수
      description: '정장 세트에 포함된 조화로운 의류 구성품 수를 지정합니다(예: 투피스, 쓰리피스, 포피스).'
    suitable_for_anchoring_use:
      name: 고정 용도 적합 여부
      description: 해당 줄/로프의 고정 관련 용도를 나타냅니다.
    suitable_for_craft_type:
      name: 적합한 공예 유형
      description: 블로킹 와이어의 주요 바느질용 용도를 나타냅니다.
    suitable_for_paint_type:
      name: 적합한 페인트 유형
      description: 캔버스에 사용하기에 적합하거나 안전한 페인트 유형을 나타냅니다.
    suitable_for_swim_stroke:
      name: 적합한 수영 영법
      description: 핸드 패들이 어떤 수영 영법에 맞게 설계되었거나 최적화되었는지를 나타냅니다.
    suitable_mounting_surface_material:
      name: 적합한 장착 표면 소재
      description: 접착식 뒷면이 접착되도록 설계된 장착 표면/소재를 지정합니다.
    suitable_play_location:
      name: 적합한 놀이 장소
      description: 모래 및 물레방아 장난감의 주요 놀이 환경을 나타냅니다.
    suitable_riding_conditions:
      name: 적합한 주행 조건
      description: '자전거 윤활유 또는 세척제가 어떤 주행 조건(예: 건조, 습윤, 겨울)에 맞게 배합되었는지를 나타냅니다.'
    suitable_snow_conditions:
      name: 적합한 설질 조건
      description: 그립 왁스가 어떤 주요 설질 조건에 맞게 배합되었는지를 나타냅니다.
    suitable_surface_type:
      name: 적합한 지면 유형
      description: 그립이 사용되도록 설계된 보행 지면을 명시합니다.
    suitable_table_size:
      name: 적합한 당구대 사이즈
      description: 조명이 비추도록 설계된 풀/스누커 당구대의 길이를 명시합니다.
    sun_protection_rating_upf:
      name: 자외선 차단 지수(UPF)
      description: 해당 의류의 인증된 UPF 자외선 차단 수준을 제공합니다.
    sun_shade_attachment_method:
      name: 햇빛 가림막 부착 방식
      description: 햇빛 가리개를 창문/앞유리에 고정하는 방법을 나타냅니다.
    sun_shade_style:
      name: 햇빛 가리개 방식
      description: 햇빛 가리개를 펼치고 보관하기 위한 제품의 구조/형식을 나타냅니다.
    sunchoke_variety:
      name: 돼지감자 품종
      description: 돼지감자의 특정 재배 품종 또는 품종을 나타내며, 정원사, 요리사 및 안목 있는 소비자에게 자세한 정보를 제공합니다.
    sunflower_oil_variety:
      name: 해바라기씨유 종류
      description: '해바라기유의 지방산 프로필 또는 품종을 분류합니다(예: 고올레산, 중올레산, 리놀레산).'
    sunflower_variety:
      name: 해바라기 품종
      description: 해바라기의 재배 품종/품종을 나타냅니다(절화용으로 흔히 유통되는 품종).
    support_brace_features:
      name: 보호대 기능
      description: 통기성 원단, 탈착식 부목 또는 조절 가능한 금속 플레이트와 같은 손목 보호대의 주요 기능적 특징을 나열합니다.
    support_leg_count:
      name: 지지대 다리 수
      description: '촬영용 스틱 사용 시 지면에 닿는 지지대 다리 수를 나타냅니다(예: 모노포드, 바이포드, 삼각대).'
    support_padding:
      name: 지지 패딩
      description: 스트랩/지지대에 목/어깨/엄지손가락 접촉 지점의 일체형 패딩이 포함되어 있는지 여부를 나타냅니다.
    support_structure_type:
      name: 지지 구조 유형
      description: 방풍막을 똑바로 세우는 데 사용되는 지지 구조 방식을 나타냅니다.
    supported_bowling_delivery_types:
      name: 지원되는 크리켓 투구 유형
      description: '기계가 시뮬레이션할 수 있는 크리켓 투구 유형을 지정합니다(예: 인스윙, 아웃스윙, 스핀 유형).'
    supported_dive_modes:
      name: 지원하는 다이브 모드
      description: '다이브 컴퓨터가 지원하는 작동 다이브 모드를 지정합니다(예: 에어, 나이트록스, 게이지).'
    supported_equipment_type:
      name: 지원 장비 유형
      description: '랙이 보관하도록 설계된 동계 스포츠 장비를 식별합니다(예: 스키, 스노보드, 스키 폴).'
    supported_spin_types:
      name: 지원 스핀 유형
      description: 런처가 적용할 수 있는 공의 스핀 유형을 지정합니다.
    supported_spool_bobbin_types:
      name: 지원 스풀/보빈 유형
      description: 전동 와인더가 사용할 수 있도록 설계된 스풀/보빈 형식을 지정합니다.
    surf_wax_temperature_rating:
      name: 서프 왁스 온도 등급
      description: 왁스가 배합된 수온 범위를 명시하여 다양한 기후 조건에서 최적의 그립감을 보장합니다.
    surface_coating_or_finish:
      name: 표면 코팅 또는 마감
      description: 플라이어에 적용된 보호 또는 성능 향상 표면 처리 방식을 명시합니다.
    surface_coating_or_wrap:
      name: 표면 코팅 또는 래핑
      description: 중앙 스틱 및 경우에 따라 핸드 스틱의 그립감과 조작성을 높이는 데 사용되는 외부 표면 처리입니다.
    surface_finish:
      name: 표면 마감
      description: 컨택트 저글링 중 그립감과 움직임에 영향을 미치는 공 표면의 감촉/질감을 설명합니다.
    surface_finish_prep:
      name: 표면 마감/준비
      description: '판매 시점의 마찰 표면 상태를 나타냅니다(예: 재처리, 기계 가공, 주조 상태).'
    surface_types_included:
      name: 포함된 표면 유형
      description: '키트에 그림을 그리거나 채색할 수 있는 표면이 포함되어 있는지 여부를 명시합니다(예: 캔버스, 종이 패드, 나무
        패널 또는 없음).'
    surfboard_construction:
      name: 서프보드 구조
      description: 서프보드의 주요 제작 기술 또는 적층 방식을 명시합니다.
    surfboard_tail_shape:
      name: 서프보드 테일 모양
      description: 보드 테일의 윤곽을 정의하며, 이는 기동성과 홀드감에 영향을 미칩니다.
    suspension_bushing_type:
      name: 서스펜션 부싱 유형
      description: 서스펜션 부싱의 기능/설치 방식을 지정합니다.
    suspension_configuration:
      name: 서스펜션 구성
      description: 삼륜차에 서스펜션이 있는지 여부와 있다면 어디에 위치해 있는지 설명합니다.
    suspension_material:
      name: 서스펜션 소재
      description: 그네를 매달기 위해 사용되는 체인, 로프 또는 케이블의 소재를 명시합니다.
    suspension_trainer_accessories_included:
      name: 포함된 서스펜션 트레이너 액세서리
      description: '트레이너 키트와 함께 제공되는 추가 품목을 나열하여 소비자가 박스 구성품을 이해하고 번들 가치를 비교할 수 있도록
        돕습니다(예: 도어 앵커, 연장 스트랩, 보관 가방).'
    suspension_trainer_anchor_type:
      name: 서스펜션 트레이너 앵커 유형
      description: '스트랩이 사용되도록 설계된 장착 방식 또는 앵커 지점을 정의하여 사용자 환경과의 호환성을 알려줍니다(예: 문,
        천장, 나무).'
    suspension_type:
      name: 서스펜션 유형
      description: 포크가 리지드형인지 또는 특정 서스펜션 시스템(에어, 코일, 하이브리드, 엘라스토머 등)을 사용하는지 명시하여 라이더가
        자신의 라이딩 방식에 맞는 포크를 선택할 수 있도록 돕습니다.
    sustain_pedal_form_factor:
      name: 서스테인 페달 형태 요소
      description: '서스테인 페달의 물리적 형태를 설명하며, 이는 감각과 용도에 영향을 미칩니다(예: 피아노식 풋 페달, 소형 풋스위치).'
    sustain_pedal_switch_type:
      name: 서스테인 페달 스위치 유형
      description: 페달이 모멘터리 신호를 보내는지, 또는 래칭 신호를 보내는지를 나타냅니다.
    sustainability_certification:
      name: 지속가능성 인증
      description: 목재 소재에 대한 환경 또는 조달 관련 인증을 나타냅니다.
    swab_intended_bassoon_section:
      name: 스왑 사용 대상 바순 섹션
      description: 바순의 어느 부분을 청소하도록 스왑이 설계되었는지 식별합니다(내경/부분에 따라 다른 스왑 모양과 사이즈가 필요합니다).
    swab_style:
      name: 스왑 방식
      description: 색소폰의 특정 부위를 통과하거나 닿도록 설계된 스왑의 물리적 디자인/형식을 설명합니다.
    swab_weight_material:
      name: 스왑 추 소재
      description: 풀스루 추/리더가 있는 경우 그 소재를 나타내며, 이는 긁힘 위험과 내구성에 영향을 미칩니다.
    swab_weight_style:
      name: 무게추 스타일
      description: 스왑이 바순 내경을 통과하도록 어떻게 추를 달았는지를 지정합니다.
    sway_bar_adjustability:
      name: 스웨이 바 조절 가능 여부
      description: 스웨이 바 강성 조절 가능 여부와 조절 방식을 나타냅니다(일반적으로 여러 개의 엔드 링크 장착 구멍을 통해 조절
        가능).
    sway_bar_coating:
      name: 스웨이 바 코팅
      description: 부식 방지 및 외관 개선을 위한 스웨이 바의 표면 처리 또는 코팅을 나타냅니다.
    sway_bar_fitment_front_rear_kit:
      name: 스웨이 바 장착 위치(전륜/후륜/키트)
      description: 스웨이 바가 전륜용인지, 후륜용인지, 또는 전후륜 키트로 판매되는지를 나타냅니다.
    sweatshirt_pocket_type:
      name: 스웨트셔츠 주머니 유형
      description: 스웨트셔츠에 적용된 주머니의 형태를 설명합니다.
    sweet_potato_variety:
      name: 고구마 품종
      description: 고구마의 특정 품종 또는 시장 품종을 식별합니다.
    sweet_spot_position:
      name: 스위트 스폿 위치
      description: 배트 블레이드에서 스위트 스폿이 위치한 지점을 식별하며, 경기 방식과 피치 조건에 영향을 미칩니다.
    sweetener_presence:
      name: 감미료 함유 여부
      description: 견과류 버터에 감미료가 첨가되었는지 여부와 첨가 수준을 명시합니다.
    sweetening_type:
      name: 감미료 유형
      description: 제품의 단맛을 내는 방법 또는 단맛의 정도를 설명합니다.
    swim_armband_construction_type:
      name: 수영용 팔밴드 구조 유형
      description: 수영용 팔밴드의 구조 방식 또는 부력 방식(공기 주입식, 고체 폼, 하이브리드 등)을 정의합니다.
    swim_belt_purpose:
      name: 수영 벨트 용도
      description: '수영 벨트의 기능적 분류를 나타냅니다(예: 부력 보조, 아쿠아 조깅, 저항 훈련, 고정식 테더, 저항 낙하산 부착,
        중량 밸러스트, 안전 보행).'
    swim_board_features:
      name: 수영 보드 기능
      description: 사용성이나 안전성을 높이는 수영 보드의 특별한 특징이나 개선 사항을 강조합니다.
    swim_bottom_length:
      name: 수영복 하의 기장
      description: '수영복 사각 하의가 다리를 덮는 전체 길이를 분류합니다(예: 짧은 트렁크 또는 무릎 기장).'
    swim_buoy_features:
      name: 수영 부표 특징
      description: 수영용 부표의 가시성, 안전성 또는 활용성을 높이는 추가 특징이나 부가 기능을 설명합니다.
    swim_cap_style:
      name: 수영모 형태
      description: '수영모의 구조 또는 디자인 형태를 정의합니다(예: 긴 머리용, 돔형/레이싱형, 버블형/터번형).'
    swim_diaper_feature:
      name: 방수 기저귀 기능
      description: 수영 브리프에 누수 방지 기저귀 기능이 내장되어 있는지, 또는 별도의 수영 기저귀가 필요한지/필요하지 않은지를 나타냅니다.
    swim_trainer_features:
      name: 수영 훈련기 특징
      description: 수영 훈련기의 추가 기능 또는 편의 기능을 강조합니다.
    swim_trainer_type:
      name: 수영 트레이너 유형
      description: 수영 훈련기의 구조 방식 또는 형식을 정의해 디자인 및 훈련 목적에 따라 필터링할 수 있도록 합니다.
    swim_training_focus:
      name: 수영 훈련 핵심 영역
      description: '패들이 목표로 하는 주요 훈련 목표를 식별합니다(예: 기술, 근력, 특정 근육 단련).'
    swim_weight_style:
      name: 수영용 무게추 스타일
      description: 수영용 웨이트의 형태적 특성을 분류하여, 소비자가 동일 카테고리 내에서 근본적으로 다른 제품 유형을 구분할 수 있도록
        돕습니다.
    swimbait_buoyancy:
      name: 스윔베이트의 부력
      description: 스윔베이트가 수층에서 어떻게 거동하는지(부상, 서스펜딩, 침강 등)를 나타내어 낚시인이 목표 수심과 리트리브 방식에
        맞는 루어를 선택할 수 있도록 합니다.
    swimbait_style:
      name: 스윔베이트 형태
      description: 스윔베이트의 구조 또는 액션 디자인을 패들테일, 글라이드 베이트 등으로 분류합니다.
    swimwear_pieces_included:
      name: 수영복 구성품 포함
      description: 부르키니 세트에 제공되는 개별 의류 구성품 목록을 제시하여 소비자가 패키지에 무엇이 포함되어 있는지 정확히 알 수
        있도록 합니다.
    swimwear_set_pieces_included:
      name: 수영복 세트 구성품 포함
      description: '부르키니 세트에 포함된 의류 구성품을 나열하여 소비자가 수령할 항목을 정확히 알 수 있도록 합니다(예: 상의,
        레깅스, 히잡/모자).'
    swing_attachment_connection_type:
      name: 그네 부착/연결 유형
      description: '그네를 지지대에 매달기 위해 사용되는 연결 방식을 나타냅니다(예: 밧줄, 사슬, 스트랩).'
    swing_trainer_type:
      name: 스윙 트레이너 유형
      description: 스윙 트레이너의 유형이나 작동 방식을 분류하여 소비자가 자신의 훈련 목표에 맞는 기기를 빠르게 찾을 수 있도록 합니다.
    swing_training_objective:
      name: 스윙 훈련 목적
      description: '스윙 트레이너의 주요 훈련 중점, 방식 또는 목표를 분류합니다(예: 템포, 속도, 그립).'
    switch_electrical_positions:
      name: 스위치 전기적 위치
      description: '스위치의 전기적 위치 개수와 동작 방식을 지정합니다(예: 3위치, 순간 켜짐).'
    swivel_type:
      name: 스위블 유형
      description: 리드줄 꼬임을 줄이기 위해 사용되는 스위블 구성을 지정합니다.
    sword_scabbard_material:
      name: 검집 소재
      description: 포함된 스캐버드/쉬스의 주요 소재를 지정합니다(있는 경우).
    synthesizer_form_factor:
      name: 신디사이저 폼 팩터
      description: 신디사이저의 물리적/연주 인터페이스 형식을 설명합니다.
    synthetic_feather_style:
      name: 합성 깃털 형태
      description: 다양한 외관과 공예 기법에 사용되는 합성 깃털의 형태/컷을 설명합니다.
    synthetic_formulation_type:
      name: 합성 배합 유형
      description: '합성 기유/배합 유형(예: PAO, 에스테르, 수소화분해 처리된 그룹 III)을 지정합니다.'
    syrup_base_ingredient:
      name: 시럽 베이스 원료
      description: '시럽이나 넥타의 주요 원료 식물 또는 당분 공급원을 명시합니다(예: 단풍나무, 용설란, 사탕수수).'
    syrup_variety:
      name: 시럽 유형
      description: '시럽의 일반적인 유형 또는 범주를 배합이나 전통적 용도(예: 메이플 시럽, 커피 향 시럽, 과일 시럽, 약용 시럽)를
        기준으로 정의합니다.'
    t_shirt_fit:
      name: 티셔츠 핏
      description: 티셔츠의 의도된 전체 핏/재단을 설명합니다.
    tabla_included_components:
      name: 타블라 포함 구성품
      description: '타블라 제품 등록 정보에 포함된 주요 항목을 나타냅니다(예: 단일 드럼 또는 세트, 커버/케이스, 조율 해머 등).'
    tabla_set_pieces_included:
      name: 타블라 세트 구성품 포함
      description: '타블라 세트에 포함된 구성품을 나타냅니다(예: 다얀, 바얀, 링, 커버, 조율 도구, 가방).'
    tabla_tonal_pitch_range_bayan:
      name: 타블라 음역/피치 범위(바얀)
      description: 크기와 구조를 기준으로 바얀 드럼(저음)의 일반적인 음역/피치 범주를 설명합니다.
    table_base_material:
      name: 테이블 베이스 소재
      description: 테이블 다리나 상판과 구별되는 테이블 받침부 또는 받침대의 주요 소재를 식별하여 소재별 필터링에 도움을 줍니다.
    table_base_type:
      name: 테이블 받침대 유형
      description: '테이블 상판을 지지하는 구조 디자인을 식별합니다(예: 받침대, 트러스, X형 받침대).'
    table_coverage_position:
      name: 탁구대 커버 적용 위치
      description: 커버가 접힌 상태, 사용 중인 상태 또는 둘 다의 탁구대에 맞도록 설계되었는지를 나타냅니다.
    table_hockey_part_type:
      name: 테이블 하키 부품 유형
      description: 테이블 하키/에어 하키/로드 하키/버블 하키 시스템 내의 특정 구성품 유형을 식별합니다.
    table_leg_design:
      name: 테이블 다리 디자인
      description: 다리의 구조 방식 또는 기하학적 형태를 식별하여 소비자가 원하는 외관과 지지력 요구 사항에 맞는 제품을 선택할 수
        있도록 합니다.
    table_size:
      name: 당구대 사이즈
      description: 상업적으로 표시되는 당구대의 전체 사이즈(피트)를 나타내어 소비자가 7피트 바 테이블이나 9피트 토너먼트 테이블
        같은 일반적인 옵션을 빠르게 선택할 수 있도록 합니다.
    table_size_category:
      name: 테이블 크기 범주
      description: 소비자가 치수를 계산하지 않고도 사용 가능한 공간에 맞는 푸스볼 테이블을 찾을 수 있도록 전체 설치 면적별로 분류합니다.
    table_tennis_certification:
      name: 탁구대 인증
      description: '제품이 충족하는 공식 표준 또는 관리 기관의 인증/승인 사항을 나열합니다(예: ITTF, EN 14468-2 등급).'
    tabletop_tilt_function:
      name: 테이블 상판 기울임 기능
      description: 테이블 상판을 다양한 각도로 기울이거나, 뒤집거나, 회전시킬 수 있는지 여부를 지정합니다.
    tackle_components_included:
      name: 낚시 채비 구성품 포함
      description: 키트에 포함된 구체적인 낚시 도구 구성품을 나열하여 소비자가 제공되는 항목을 정확히 알 수 있도록 합니다.
    talking_drum_accessories_included:
      name: 토킹 드럼 포함 액세서리
      description: 토킹 드럼과 함께 박스에 포함된 액세서리를 나열합니다.
    talking_drum_cord_material:
      name: 토킹 드럼 장력 끈 소재
      description: 드럼 헤드를 연결하는 장력 끈/로프에 사용되는 소재를 설명합니다.
    talking_drum_tuning_mechanism:
      name: 토킹 드럼 조율 방식
      description: 연주 중 또는 세팅 시 드럼의 음높이를 바꾸거나 장력을 적용하는 방식을 설명합니다.
    tam_tam_construction_style:
      name: 탐탐 제작 방식
      description: 탐탐의 제작/해머링 방식을 설명합니다.
    tam_tam_items_included:
      name: 탐탐 포함 품목
      description: '탐탐과 함께 제공되는 액세서리를 나열합니다(예: 말렛, 스탠드, 커버).'
    tamarillo_variety:
      name: 타마릴로 품종
      description: 타마릴로 과일의 특정 재배 품종 또는 색상 변이를 식별합니다.
    tamarind_variety:
      name: 타마린드 품종
      description: 타마린드의 식물학적 또는 상업적 품종을 명시하며, 이는 맛, 식감 및 요리 용도에 영향을 미칠 수 있습니다.
    tambourine_frame_style:
      name: 탬버린 프레임 형태
      description: 탬버린을 잡고 연주하는 데 사용되는 물리적 휴대용 프레임 구성을 설명합니다.
    tambourine_head_material:
      name: 탬버린 헤드 소재
      description: 헤드가 있는 탬버린의 연주 헤드(막) 소재를 지정합니다.
    tambourine_jingle_configuration:
      name: 탬버린 징글 구성
      description: 탬버린에서 징글이 배열되거나 구성되는 방식을 설명합니다.
    tambourine_jingle_material:
      name: 탬버린 징글 소재
      description: 탬버린의 징글(금속 원반) 소재를 명시하며, 이는 음색과 내구성에 영향을 미칩니다.
    tambourine_mounting_type:
      name: 탬버린 장착 유형
      description: 연주 중 탬버린을 잡거나 장착하는 방식을 설명합니다.
    tambourine_tuning_mechanism:
      name: 탬버린 조율 방식
      description: 조율 가능한 휴대용 탬버린에 사용되는 조율 체계를 지정합니다(해당되는 경우).
    tank_model_scale:
      name: 탱크 모델 축척
      description: '탱크 축척 모델의 축척 비율을 지정합니다(예: 1:35, 1:72).'
    tank_top_back_style:
      name: 탱크탑 등판 형태
      description: 탱크탑 등 부분의 모양 또는 재단 방식을 명시하며, 지지력, 활동성, 미적 측면에 영향을 미칩니다.
    tape_application_area:
      name: 테이프 부착 부위
      description: 테이프를 적용할 장비 또는 선수의 부위를 명시하여 구매자가 올바른 유형을 선택할 수 있도록 돕습니다.
    tape_finish:
      name: 테이프 유형
      description: 테이프의 표면/시각적 마감(광택 또는 질감).
    tape_purpose:
      name: 테이프 용도
      description: 라켓 관리 또는 맞춤 설정에서 테이프의 주요 기능적 용도를 지정합니다.
    tape_type:
      name: 테이프 종류
      description: 천, 투명 폴리에틸렌, 그립, 신축성 자가 접착, 정강이 보호대용, 샤무아 등 하키 테이프의 기능 방식 또는 구조를
        분류합니다.
    tapenade_main_ingredients:
      name: 타페나드의 주요 재료
      description: 타페나드의 기본이 되는 주요 재료(올리브, 토마토, 가지, 고추 등)를 지정하며, 재료별 선호나 제한이 있는 구매자에게
        유용합니다.
    tapestry_loom_loom_format:
      name: 태피스트리 직기 형식
      description: 태피스트리 수동 직기의 전체 형태 또는 받침대 방식을 나타냅니다.
    tapestry_loom_shedding_method:
      name: 태피스트리 직기 개구부 가공 방법
      description: 직기가 위사를 통과시키기 위해 헛간(날실을 분리함)을 만드는 방법.
    tapestry_loom_tensioning_system:
      name: 태피스트리 직기 장력 조절 체계
      description: 태피스트리 직기에서 날실을 팽팽하게 당겨 고정하는 방법을 설명합니다.
    tar_head_material:
      name: 타르 헤드 소재
      description: 타르 드럼헤드(막)의 소재를 식별하며, 이는 연주감, 내구성, 음색에 큰 영향을 미칩니다.
    tar_playing_style:
      name: 타르 연주 방식
      description: 타르가 주로 어떤 연주 자세/기법에 맞게 설계되었는지 명시합니다.
    tar_tuning_system:
      name: 타르 조율 체계
      description: 타르를 조율하는 방식(헤드 장력을 조절하는 방식)을 지정합니다.
    target_components:
      name: 대상 부품
      description: 제품이 청소하도록 설계된 연료/흡기 부품을 명시합니다.
    target_relative_humidity_rh:
      name: 목표 상대 습도(RH)
      description: 제품이 악기/케이스 내부 환경에서 유지하도록 설계된 목표 상대 습도를 나타냅니다.
    target_resetting_mechanism:
      name: 표적 복귀 메커니즘
      description: 표적이 맞은 후 원래 위치로 돌아가는 방식 또는 복귀 여부를 설명합니다.
    target_trainer_type:
      name: 타겟 트레이너 유형
      description: 라켓볼 또는 스쿼시 표적 트레이너의 전체 형태나 형식을 분류합니다.
    targeted_contaminants:
      name: 제거 대상 오염물질
      description: 해당 제품이 제거하도록 인증받은 미생물 또는 기생충의 유형을 나타냅니다.
    targeted_muscle_group:
      name: 목표 근육군
      description: 액세서리가 훈련하거나 지지하도록 설계된 주요 근육군을 나타냅니다.
    taro_variety:
      name: 토란 품종
      description: '제공되는 토란의 품종, 종 또는 유통명을 지정합니다(예: 퍼플 타로, 에도, 대쉰).'
    tassel_trim_header_type:
      name: 태슬 트림 상단부 유형
      description: 태슬 트림을 표면에 부착하는 데 사용되는 상단부/장착부의 구조를 명시합니다.
    tassel_trim_use_case:
      name: 태슬 트림 용도
      description: 태슬 트림의 주요 적용 영역을 나타냅니다.
    taste_profile:
      name: 맛 특성
      description: 해당 사과 품종의 주된 맛 특성을 설명합니다.
    tea_variety:
      name: 차 품종
      description: '구매자가 선호하는 품종을 필터링할 수 있도록 차 또는 침출차의 특정 유형이나 방식(예: 홍차, 녹차, 말차, 루이보스)을
        분류합니다.'
    teasing_tool_style:
      name: 섬유 풀기 도구 방식
      description: '섬유를 풀고 혼합하는 데 사용되는 섬유 풀기 도구의 물리적 형태 또는 모양을 나타냅니다(예: 브러시, 갈퀴, 빗).'
    tee_base_style:
      name: 킥 티 받침대 방식
      description: 럭비 킥 티에서 공을 지지하는 받침대의 구조적 설계를 식별합니다.
    temper_hardness:
      name: 경도/강성
      description: 와이어의 부드러운 정도 또는 단단한 정도, 즉 모양을 얼마나 잘 유지하는지를 나타냅니다.
    temperature_control_type:
      name: 온도 제어 유형
      description: 공구의 온도를 제어하거나 조정하는 방식을 설명합니다.
    tenkara_action_ratio:
      name: 텐카라 액션 비율
      description: '하중이 가해졌을 때 낚싯대가 휘어지는 위치를 설명하는 전통적인 텐카라 휨 비율을 나타냅니다(예: 6:4).'
    tennis_ball_court_surface:
      name: 테니스공용 코트 표면
      description: 최적의 성능과 내구성을 보장하기 위해 공이 사용되도록 설계된 코트 표면을 명시합니다.
    tennis_ball_pressure_type:
      name: 테니스공 압력 유형
      description: 반발력과 내구성에 영향을 미치는 공의 내부 압력 또는 구조(가압식, 무압식, 저압축, 폼)를 식별합니다.
    tennis_racket_grip_size:
      name: 테니스 라켓 그립 사이즈
      description: 라켓 핸들의 표준화된 둘레(L0~L5 또는 인치 환산)를 지정하여 손에 잘 맞고 편안한 그립감을 보장합니다.
    tenor_flutophone_fingering_system:
      name: 테너 플루트폰 운지법 체계
      description: 테너 플루토폰에서 사용되는 운지법 체계(교육과정/기보 표기법)를 명시합니다.
    tenor_recorder_joint_type:
      name: 테너 리코더 연결부 유형
      description: 테너 리코더 각 부분 사이의 연결부 유형을 지정합니다.
    tenor_saxophone_key_system:
      name: 테너 색소폰 키 체계
      description: 사용되는 키워크 체계/표준을 지정합니다(색소폰에서는 흔히 프랑스식/뵘식으로 지칭됩니다).
    tenor_saxophone_pad_material:
      name: 테너 색소폰 패드 소재
      description: 악기 패드에 사용된 주요 소재를 지정합니다.
    tenor_trombone_slide_type:
      name: 테너 트롬본 슬라이드 유형
      description: '테너 트롬본에 사용되는 슬라이드 유형을 나타냅니다(예: 표준/직선형 또는 트리거/축류식).'
    tenor_trombone_valve_configuration:
      name: 테너 트롬본 밸브 구성
      description: 테너 트롬본에 밸브/로터 부착부가 있는지와 어떤 구성을 사용하는지를 나타냅니다.
    tension_control_type:
      name: 장력 조절 방식
      description: 셔틀이 실을 공급하는 동안 보빈/퀼에 조절 가능한 저항/장력을 제공하는 방식 또는 제공 여부를 나타냅니다.
    tension_mechanism:
      name: 장력 조절 메커니즘
      description: 직조 중 보빈/피른에서 씨실이 공급되는 방식을 제어하는 데 사용되는 장력 조절 방식을 나타냅니다.
    tension_pitch_modulation_system:
      name: 장력/피치 변조 체계
      description: '토킹 드럼이 연주 중에 음높이/장력을 변화시키는 방식을 설명합니다(예: 장력 끈을 조이는 방식).'
    tension_system:
      name: 장력 시스템
      description: 플라이어 키트가 사용되도록 설계된 물레의 권취/장력 조절 체계를 나타냅니다.
    tent_fabric_material:
      name: 텐트 원단 소재
      description: 텐트 플라이 또는 본체에 사용된 주요 원단을 식별하며, 이는 무게, 통기성 및 내후성에 영향을 미칩니다.
    tent_season_rating:
      name: 텐트 계절 등급
      description: '텐트를 사용하도록 설계된 계절 수 또는 기상 조건에 따라 분류합니다(예: 3계절용, 4계절용, 원정용).'
    tent_setup_type:
      name: 텐트 설치 유형
      description: '텐트의 구조적 설치 방식(예: 자립형, 반자립형, 비자립형, 공기주입식/에어프레임형, 팝업형)을 나타냅니다.'
    tent_style:
      name: 텐트 형태
      description: '텐트의 구조적 형태를 설명합니다(예: 돔형, 터널형, A-프레임형).'
    test_result_output_method:
      name: 테스트 결과 출력 방법
      description: '차량 배터리 테스터가 테스트 결과를 사용자에게 표시하거나 전달하는 방식(예: 표시등, 화면, 인쇄물, 앱 또는
        소프트웨어 보고서)을 지정합니다.'
    tether_strap_system:
      name: 테더/스트랩 체계
      description: 목 지지대를 헬멧/하네스에 연결하는 데 사용되는 테더 또는 스트랩 체계의 유형을 나타냅니다(해당되는 경우).
    text_color:
      name: 텍스트 색상
      description: 라벨에 인쇄되거나 자수된 텍스트의 색상을 나타내며, 라벨 배경 색상과 구분됩니다.
    textile_craft_machine_operation_type:
      name: 섬유 공예 기계 작동 유형
      description: 기계의 작동 방식을 나타냅니다(수동식, 발 구동식, 모터식/전기식).
    textile_finish_treatment:
      name: 섬유 마감/가공
      description: 섬유 소재에 적용된 주요 표면 가공을 명시합니다.
    texture_inclusions:
      name: 식감 포함 재료
      description: 알로에 과육, 바질 씨앗, 나타드코코, 팝핑 보바, 과일 조각 등 식감을 더하는 재료를 지정합니다.
    therapeutic_technology:
      name: 치료 기술
      description: 냉각 젤, 자석 스트립, 적외선 세라믹 등 통합 치료 기능을 명시합니다.
    thermal_set_components:
      name: 발열 내의 세트 구성품
      description: 상품이 하의 단품, 상의 단품 또는 상하의 세트 상품인지 여부를 나타냅니다.
    thermal_weight:
      name: 보온 등급
      description: 바라클라바 원단의 보온성 등급을 나타냅니다.
    thermostat_type:
      name: 온도 조절기 유형
      description: 자동차 냉각 시스템 온도 조절기의 기능적 설계 또는 제어 방식을 나타냅니다.
    thimble_guide_size:
      name: 골무 가이드 사이즈
      description: 골무 가이드의 사이즈 명칭을 나타내며, 일반적으로 측정 치수가 아닌 소형/중형/대형으로 판매됩니다.
    thread_connection_size:
      name: 나사산 연결 사이즈
      description: '샤프트, 팁, 어댑터를 연결하는 나사산 규격을 정의합니다(예: 6mm, 5/16"-24).'
    thread_construction:
      name: 나사산 구조
      description: '실의 구조 또는 처리 방식을 나타냅니다(예: 여러 가닥으로 된 자수실, 본딩 처리된 실).'
    thread_cord_type_beading_pattern:
      name: 실/끈 유형(비즈 패턴)
      description: 패턴을 완성하는 데 권장되는 실 또는 끈 유형을 지정합니다.
    thread_cutter_form_factor:
      name: 실 커터 폼 팩터
      description: 휴대형 실가위, 펜던트형, 링형 등 실 절단기의 물리적 형태를 식별합니다.
    thread_cutter_mechanism:
      name: 실 절단기 작동 방식
      description: 실 절단기의 절단 동작 또는 작동 방식을 설명합니다.
    thread_cutter_safety_features:
      name: 실 커터 안전 기능
      description: 오작동으로 인한 베임 사고 위험을 줄이거나 보관 중 날을 보호하는 내장형 안전 기능을 나타냅니다.
    thread_cutter_usage_application:
      name: 실 절단기 용도
      description: 실 절단기의 주된 공예 용도를 나타냅니다.
    thread_finish_treatment:
      name: 스레드 마감/처리
      description: '취급성과 성능에 영향을 미치는, 실에 적용된 표면 마감 또는 처리 방식을 나타냅니다(예: 왁스 처리, 본딩 처리,
        머서화 처리).'
    thread_material:
      name: 실 소재
      description: 원단이 아닌 실/자수실의 주요 섬유/소재 구성을 나타냅니다.
    thread_material_fiber:
      name: 실소재(섬유)
      description: 원단이 아닌 실 자체의 주요 섬유/소재를 명시합니다.
    thread_package_format:
      name: 실 포장 형식
      description: '재봉용 실의 포장 형태를 나타냅니다(예: 스풀, 콘, 보빈).'
    thread_rack_compatible_spool_type:
      name: 실 보관대 호환 스풀 유형
      description: '실 보관대가 수용하도록 설계된 실 포장 유형을 나타냅니다(예: 스풀, 콘).'
    thread_standard_size:
      name: 나사산 표준 크기
      description: '제품 라벨에 사용된 실 굵기/무게 표준을 식별합니다(예: wt, Tex, 데니어).'
    thread_type:
      name: 실 유형
      description: 십자수 실/자수실의 구조/유형을 명시합니다.
    thread_weight_system:
      name: 실 무게 체계
      description: 실의 굵기/무게를 나타내는 데 사용되는 표준입니다.
    thread_yarn_guide_mounting_attachment_style:
      name: 실 및 원사 가이드 장착/부착 방식
      description: 사용 중 가이드의 착용 또는 장착 방식을 설명합니다.
    thread_yarn_guide_tension_control:
      name: 실 및 원사 가이드 장력 조절
      description: 가이드가 실 또는 원사에 조절 가능한 장력/저항을 제공하는지 여부와 그 방식을 나타냅니다.
    thread_yarn_organizer_features:
      name: 실 및 원사 정리함 기능
      description: 실/원사 보관에 특화된 정리 기능과 휴대 기능을 나타냅니다.
    threader_intended_use:
