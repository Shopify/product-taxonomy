---
ko:
  attributes:
    3d_glasses_fit_design:
      name: 3D 안경 착용 디자인
      description: '안경을 착용하거나 부착하는 방법을 나타냅니다(예: 클립온, 랩어라운드, 오버핏)'
    3d_glasses_material:
      name: 3D 안경 소재
      description: 대나무나 스테인레스 스틸 등 3D 안경에 사용되는 소재를 명시합니다
    3d_glasses_technology:
      name: 3D 안경 기술
      description: 안경이 설계된 3D 이미지/동기화 기술을 지정하여 특정 디스플레이 또는 프로젝터와의 호환성을 결정합니다
    3d_printer_case_style:
      name: 3D 프린터 케이스 스타일
      description: 쇼핑객이 소프트 캐리백, 하드쉘 케이스, 고정형 인클로저, 단순 먼지 커버를 구별할 수 있도록 전체 제품 유형을
        분류합니다
    3d_printer_cleaning_kit_components_included:
      name: 3D 프린터 청소 키트 포함 구성품
      description: 쇼핑객이 정확히 무엇을 구매하는지 알 수 있도록 키트에 제공되는 개별 도구와 소모품을 나열합니다
    3d_printing_resin_type:
      name: 3D 프린팅 레진 유형
      description: 쇼핑객이 레진이 표준, 엔지니어링 등급, 주조 가능 또는 기타 특수 유형인지 빠르게 식별할 수 있도록 레진의 제형
        또는 의도된 용도를 지정합니다
    80_plus_efficiency_rating:
      name: 80 Plus 효율 등급
      description: PSU가 달성한 공식 80 Plus 에너지 효율 인증 레벨을 나타냅니다
    abrasive_material:
      name: 연마 재료
      description: 다이아몬드나 탄화규소 등 샌딩 도구에 사용되는 연마재 유형을 식별합니다
    absinthe_style:
      name: 압생트 스타일
      description: '압생트의 스타일(예: 혼합, 증류)을 정의합니다'
    absinthe_variety:
      name: 압생트 종류
      description: '압생트 제품을 고유한 품종(예: 루즈, 베르테)으로 구별합니다'
    absorbency_level:
      name: 흡수성 수준
      description: '일반적으로 개인 미용/위생 용품의 흡수 용량(예: 오버나이트, 라이트)을 정의합니다'
    absorbent_hygiene_product_features:
      name: 흡수성 위생 제품 기능
      description: '위생 제품의 특별한 특성(예: 누출 방지 또는 저자극성)을 식별합니다'
    academic_level:
      name: 학력
      description: 대학생이나 박사 학위 등 미디어 콘텐츠의 학술 수준을 명시합니다
    accessibility_design_features:
      name: 접근성 디자인 기능
      description: 청각, 시각 또는 손재주에 문제가 있는 사용자를 돕기 위한 특별한 디자인 요소를 나열합니다
    accessory_material:
      name: 액세서리 소재
      description: '일반적으로 배송 용품을 위한 액세서리의 소재 유형(예: 플라스틱, 판지)을 지정합니다'
    accessory_size:
      name: 액세서리 크기
      description: '액세서리 제품의 사이즈(예: 원 사이즈 또는 콤팩트)를 정의합니다'
    accordion_tuning:
      name: 아코디언 튜닝
      description: 건식 또는 콘서트 피치 등 아코디언에 사용되는 튜닝 유형을 명시합니다
    activation_mechanism:
      name: 작동 메커니즘
      description: 알람을 작동시키는 주요 방법을 지정합니다
    activation_method:
      name: 활성화 방법
      description: 사용자가 선불 크레딧이나 SIM을 활성화하는 방법을 설명합니다
    active_ingredient:
      name: 활성 성분
      description: '개인 위생 용품의 주요 물질(예: 비타민 A, 레티놀)을 식별합니다'
    activewear_clothing_features:
      name: 액티브웨어 의류 기능
      description: 4방향 스트레칭, 통기성 좋은 디자인 등 운동복의 고유한 특성을 식별합니다
    activity:
      name: 활동
      description: '제품 설계 목적이 되는 스포츠 또는 활동(예: 테니스, 필라테스)을 명시합니다'
    activity_tracker_design:
      name: 활동 추적기 디자인
      description: '활동 추적기 착용 방법(예: 클립 온, 완장)을 명시합니다'
    acupuncture_model_format:
      name: 침술 인체모형 형태
      description: '침술 모델의 사이즈와 척도(예: 실물 사이즈, 미니어처)를 정의합니다'
    acupuncture_model_type:
      name: 침술 인체모형 유형
      description: '침술 모델이 나타내는 신체 부위 또는 종(예: 머리, 손, 동물)을 명시합니다 '
    adapter_directionality:
      name: 어댑터 방향성
      description: 어댑터가 양방향으로 신호 흐름을 지원하는지 또는 한 방향으로만 지원하는지를 나타냅니다
    adapter_operating_modes:
      name: 어댑터 작동 모드
      description: 어댑터가 블루투스 수신기, 송신기 또는 둘 다로 기능하는지 지정합니다
    adaptive_sync_technology:
      name: 적응형 동기화 기술
      description: 찢김 없는 화면을 위해 모니터가 지원하는 가변 주사율(VRR) 기술을 지정합니다
    adc_resolution:
      name: ADC 해상도
      description: 측정 정밀도를 정의하는 통합 아날로그-디지털 변환기의 해상도(비트)를 지정합니다
    additional_animation_software_features:
      name: 추가 애니메이션 소프트웨어 기능
      description: 캐릭터 애니메이션이나 시각 효과와 같은 애니메이션 편집 소프트웨어의 고유한 기능을 지정합니다
    additional_cleaning_technology:
      name: 추가 청소 기술
      description: '스팀 외에 포함된 청소 기술을 나열합니다(예: 초음파, UV, 오존)'
    additional_design_software_type:
      name: 추가 설계 소프트웨어 기능
      description: 가상 투어 또는 조경 설계와 같은 설계 소프트웨어의 추가 기능을 지정합니다
    additional_financial_software_features:
      name: 추가 재무 소프트웨어 기능
      description: 자산 관리, 감사 및 규정 준수와 같은 금융 소프트웨어의 추가 기능을 식별합니다
    additional_graphic_software_features:
      name: 추가 그래픽 소프트웨어 기능
      description: 디지털 일러스트레이션이나 레이아웃 디자인과 같은 그래픽 소프트웨어의 추가 기능을 강조합니다
    additional_publishing_software_features:
      name: 추가 출판 소프트웨어 기능
      description: 인쇄 디자인이나 디지털 출판과 같은 출판 소프트웨어의 추가 기능을 강조합니다
    additional_security_software_features:
      name: 추가 보안 소프트웨어 기능
      description: 디스크 암호화, 침입 탐지 등 보안 소프트웨어의 추가 기능을 식별합니다
    adhesive_application_type:
      name: 접착제 적용 유형
      description: 접착제의 의도된 속눈썹 서비스나 사용 사례를 정의합니다
    adhesive_features:
      name: 접착제 특징
      description: 패치나 테이프에 사용되는 접착제의 특수한 특성을 강조합니다
    adhesive_format:
      name: 접착제 형식
      description: 수리 용도로 공급되는 접착제의 물리적 형태를 나타냅니다
    adhesive_strength:
      name: 접착 강도
      description: '코 스트립 접착제의 접착 또는 리프팅 강도 수준을 지정합니다(예: 일반, 특강)'
    adhesive_type:
      name: 접착 유형
      description: 제거 가능하거나 영구적인 접착제 등 제품에 사용되는 접착제 유형을 식별합니다
    aftershave_product_form:
      name: 프터쉐이브 제품 형태
      description: 밤이나 크림과 같은 애프터쉐이브 제품의 일관성을 식별합니다
    age_group:
      name: 연령대
      description: '제품의 대상 연령대(예: 성인, 아동)를 정의합니다'
    age_restrictions:
      name: 연령 제한
      description: 18세 이상과 같이 제품이나 이벤트에 대한 최소 연령 요구 사항을 나타냅니다
    ai_application:
      name: AI 적용
      description: 예측 분석이나 음성 인식과 같은 소프트웨어에서 AI의 기능을 명시합니다
    air_freshener_form:
      name: 방향제 형태
      description: '자동차 공기 청정제의 유형(예: 오일, 벤트 클립)을 정의합니다'
    air_fryer_functions:
      name: 에어 프라이어 기능
      description: '에어 프라이어 또는 유사한 기기에서 사용 가능한 다양한 조리 모드(예: 에어 프라이, 빵 굽기)를 나열합니다'
    air_mattress_features:
      name: 에어매트리스의 특징
      description: 쉽게 팽창할 수 있거나 펑크에 내성이 있다는 등 에어 매트리스의 고유한 특성을 설명합니다
    air_tube_configuration:
      name: 공기 튜브 구성
      description: 커프와 통합된 공기 팽창 튜브의 수나 스타일을 나타냅니다
    airbrush_feed_type:
      name: 에어브러시 피드 타입
      description: '에어브러시의 페인트 이송 방법(예: 중력식 또는 사이펀식)을 식별합니다'
    airbrush_operation_method:
      name: 에어브러시 작동 방식
      description: 더블 액션, 싱글 액션 등 에어브러시의 작동 스타일을 지정합니다
    aircraft_engine_configuration:
      name: 항공기 엔진 구성
      description: 단일 또는 쌍발과 같이 항공기에 동력을 공급하는 엔진의 수를 지정합니다
    aircraft_engine_type:
      name: 항공기 엔진 유형
      description: 제트 또는 터보프롭과 같이 항공기에 동력을 공급하는 엔진의 유형을 지정합니다
    airflow_opening_design:
      name: 공기 흐름 개구부 설계
      description: 마우스피스에 내장된 호흡 또는 환기 구성을 설명합니다
    airsoft_equipment_included:
      name: 에어소프트 장비 포함
      description: 보안경이나 전술 조끼 등 에어소프트 제품과 함께 제공되는 추가 장비를 명시합니다
    album_type:
      name: 앨범 유형
      description: 스프링 제본, 스크랩북 등 스크랩북 또는 스탬핑 키트의 바인딩 스타일을 설명합니다
    alcohol/solvent_content:
      name: 알코올/용매 함량
      description: '배송 및 규제 요건에 따라 알코올 또는 용매 함량을 기준으로 제품을 분류합니다(예: 알코올 ≤24%, 알코올 >24%,
        용매 소형 용기).'
    alcohol_content:
      name: 알코올 함량
      description: 토너가 무알코올인지 또는 존재하는 경우 포뮬러에 대략 얼마나 많은 알코올이 포함되어 있는지를 나타냅니다
    alert_type:
      name: 경고 유형
      description: '제품에서 제공하는 경고 종류(예: 가청 경보, 스마트폰 알림)를 명시합니다'
    allergen_information:
      name: 알레르기 유발물질 정보
      description: '음식 또는 음료에 존재하는 잠재적인 알레르기 유발 물질(예: 밀 또는 땅콩)을 나타냅니다'
    allergen_test_type:
      name: 알레르기 유발물질 테스트 유형
      description: '테스트 키트가 감지하도록 설계된 알레르기 항원 유형(예: 음식 또는 환경)을 명시합니다'
    allergens:
      name: 알레르기 유발물질
      description: '건강 및 미용 제품에 함유된 잠재적 알레르기 유발 물질(예: 리날로올 또는 리모넨)을 나타냅니다'
    allergy_friendly_features:
      name: 알레르기 방지 기능
      description: 제품에 라텍스 프리, 곰팡이 내성 등 알레르기에 친화적인 특성이 있는지 식별합니다
    amino_acid_subtype:
      name: 아미노산 하위 유형
      description: 보충제에 포함된 아미노산의 주요 유형이나 프로파일을 지정합니다
    amplifier/booster_suitable_location:
      name: 증폭기/부스터 적합한 위치
      description: '증폭기 또는 신호 부스터를 위한 최적의 위치(예: 차량 또는 대규모 장소)를 명시합니다'
    amplifier_class:
      name: 앰프 등급
      description: '증폭기 유형(예: AB 또는 D)을 정의합니다'
    amplifier_configuration:
      name: 앰프 구성
      description: 2채널 또는 4채널과 같은 자동차 앰프의 설정을 명시합니다
    amputation_level:
      name: 절단 수준
      description: 수축기가 설계된 절단 수준을 나타냅니다
    analyte_measured:
      name: 측정된 분석물
      description: 대조 용액이 보정을 제공하는 바이오마커를 식별합니다
    anamorphic_squeeze_ratio:
      name: 아나모픽 스퀴즈 비율
      description: 아나모픽 렌즈의 수평 압축률을 나타내며, 사용자가 원하는 압축 해제 출력에 맞는 렌즈를 선택할 수 있도록 해줍니다
    anatomical_detail_displayed:
      name: 표시된 해부학적 세부사항
      description: 모델에서 강조 표시되는 해부학적 또는 경락 특징을 나타냅니다
    anchor_type:
      name: 앵커 유형
      description: '견인식 수상 스포츠 장비에 사용되는 앵커(예: 플루크 또는 플라우)를 정의합니다'
    anemometer_application:
      name: 풍속계 적용
      description: 산업용 또는 기상용 등 풍속계의 용도를 식별합니다
    angles_supported:
      name: 지원되는 각도
      description: '일반적으로 전자 제품의 경우 제품이 수용할 수 있는 각도 범위(예: 조정 가능, 0°~180°)를 명시합니다'
    angling_style:
      name: 낚시 스타일
      description: '제품 설계 목적에 적합한 낚시 기술(예: 서핑캐스팅 또는 플라이 낚시)을 정의합니다'
    animal_feed_form:
      name: 동물 사료 형태
      description: 액상 또는 과립과 같은 동물 사료의 형태를 명시합니다
    animal_type:
      name: 동물 종류
      description: '제품 용도에 맞는 동물 유형(예: 오리, 사슴, 개)을 명시합니다'
    answering_machine_type:
      name: 자동 응답기 유형
      description: 통합 자동 응답기의 존재 및 기술을 지정합니다
    antenna_connector_type:
      name: 안테나 커넥터 유형
      description: 외부 안테나를 부착하는 데 사용되는 RF 커넥터를 지정합니다
