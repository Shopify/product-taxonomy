    fusible_tape_backing_type:
      name: 접착 테이프 뒷면 유형
      description: 테이프에 이형지 또는 라이너가 있는지 여부와 그 형태를 나타내며, 이는 취급 및 적용 방식에 영향을 미칩니다.
    futon_frame_conversion_mechanism:
