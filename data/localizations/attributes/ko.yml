      description: 연료 압력 조절기의 장착 또는 설치 방식을 나타내며, 이는 장착 적합성과 호환성에 영향을 미칩니다.
    fuel_pump_inlet_type:
      name: 연료 펌프 흡입구 유형
      description: 펌프 흡입구의 연결 방식을 나타냅니다.
    fuel_pump_mounting_location:
      name: 연료 펌프 장착 위치
      description: 연료 펌프가 차량 연료 시스템에 설치된 위치.
    fuel_pump_outlet_connection_type:
      name: 연료 펌프 배출구 연결 유형
      description: 장착 및 설치 호환성을 위해 연료 펌프 배출구의 물리적 연결 방식을 나타냅니다.
    fuel_system_application:
      name: 연료 시스템 적용 분야
      description: '연료 펌프가 지원하도록 설계된 연료 공급 시스템 구조를 나타냅니다(예: 기화식, EFI, GDI, 디젤 리프트/이송).'
