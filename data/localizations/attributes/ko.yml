    timer_count_mode:
      name: 타이머 카운트 방식
      description: '타이머의 카운트 방식(예: 카운트다운, 카운트업(스톱워치), 둘 다, 간격/반복)을 지정합니다.'
    timer_display_type:
      name: 타이머 표시 유형
      description: '게임 타이머가 남은 시간을 표시하는 방식(예: 디지털 화면, 아날로그 다이얼, 모래시계 또는 시각적 표시 없음)을
