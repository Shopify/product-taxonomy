    timer_operating_modes:
      name: 타이머 작동 모드
      description: 효과 트리거를 위해 지원되는 타이머 동작을 나타냅니다.
    timing_belt_construction_material_rubber_compound:
      name: 타이밍 벨트 구성 소재(고무 배합물)
