    timing_component_material:
      name: 타이밍 구성품 소재
      description: '타이밍 구성품의 주요 소재를 나타냅니다(예: 벨트 배합물, 체인/기어 금속, 커버 소재).'
    tin_whistle_body_material:
      name: 틴 휘슬 본체 소재
      description: 필요한 경우 광범위한 악기 소재 목록보다 틴 휘슬 본체 소재를 더 구체적으로 나타냅니다.
    tin_whistle_bore_type:
