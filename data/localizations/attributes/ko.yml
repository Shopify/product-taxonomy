      description: 타이어 교환기의 일반적인 작동 방식, 설계 또는 자동화 수준을 나타냅니다.
    tire_compound_type:
      name: 타이어 컴파운드 유형
      description: '타이어에 사용되는 고무 배합물의 분류를 명시하며(예: 연질, 레인, 슬릭), 이는 다양한 조건에서 접지력과 내구성에
