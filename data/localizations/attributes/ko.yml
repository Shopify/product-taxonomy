    toy_kitchen_appliances_included:
      name: 장난감 주방 가전제품 구성품
      description: 제품이 가전제품 또는 가전제품에 초점을 맞춘 플레이세트인 경우, 플레이세트에 표현된 주방 가전제품을 명시합니다.
    toy_kitchen_assembly_requirement:
      name: 장난감 주방 조립 필요 여부
      description: 조립이 필요한지 여부와 대략적인 조립 난이도를 나타냅니다.
    toy_kitchen_interactive_features:
      name: 장난감 주방의 상호작용 기능
