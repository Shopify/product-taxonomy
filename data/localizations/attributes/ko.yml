    throw_rope_end_attachment:
      name: 투척용 로프 끝 부착물
      description: 투척용 로프의 사용부 끝에 제공되는 마감/부착 부속품 또는 고리를 나타냅니다.
    throw_rope_storage_packaging_type:
      name: 투척용 로프 보관/포장 유형
      description: '투척용 로프를 보관하거나 펼쳐 사용하는 방식을 나타냅니다(예: 가방, 릴).'
    throw_rope_visibility_features:
      name: 투척용 로프 가시성 기능
      description: 물속이나 어두운 환경에서 로프를 더 쉽게 볼 수 있도록 하는 가시성 및 식별 기능을 나타냅니다.
    thrower_operation_type:
      name: 투척기 작동 유형
      description: 투척기의 기계적/작동 방식을 분류하여 수동식과 자동식 작동 방식을 빠르게 구분할 수 있도록 합니다.
    thumb_design:
      name: 엄지 부분 디자인
      description: 엄지 부분이 장갑에 어떻게 적용되는지를 설명하며, 이는 안전성과 그립감에 영향을 미칩니다.
    tiara_design:
      name: 티아라 디자인
      description: 티아라의 전체적인 구조 형태 또는 실루엣을 지정합니다.
    tie_down_points_straps_included:
      name: 고정 지점/스트랩 포함 여부
      description: 랙에 오토바이/스쿠터를 고정하기 위한 통합 고정 지점 및/또는 스트랩이 포함되어 있는지 여부를 명시합니다.
    tiling_format:
      name: 타일링 형식
      description: 인쇄된 페이지를 조립하는 데 사용할 PDF 레이아웃 방식을 지정합니다.
