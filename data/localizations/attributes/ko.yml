      description: 나침반 본체에 표시된 측정 단위(도, 밀 또는 둘 다)를 확인합니다.
    compatible_abs_system:
      name: 호환 ABS 시스템
      description: 마스터 실린더가 아크릴로니트릴 부타디엔 스티렌이 장착된 차량용인지 여부를 나타냅니다.
    compatible_adapter_brand:
      name: 호환 어댑터 브랜드
      description: 샤프트가 호환되도록 사전 구성된 어댑터가 장착된 골프 클럽 헤드 브랜드를 식별합니다.
    compatible_airbag_system_type:
      name: 호환되는 에어백 시스템 유형
