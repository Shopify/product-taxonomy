    screen_protector_features:
      name: Recursos do protetor de tela
      description: Destaca características funcionais especiais oferecidas pelo protetor
        além da prevenção básica de arranhões.
    screen_protector_finish:
      name: Acabamento do protetor de tela
      description: Identifica o acabamento ótico da superfície do protetor (p. ex.,
        brilhante, fosco, privacidade, antirreflexo).
    screen_specialized_features:
      name: Recursos especializados da tela
      description: Identifica capacidades únicas de uma tela de computador, como antirreflexo
