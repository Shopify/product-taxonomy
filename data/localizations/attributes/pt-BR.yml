---
pt-BR:
  attributes:
    3d_glasses_fit_design:
      name: Design de encaixe dos óculos 3D
      description: Indica como os óculos são usados ou fixados (p. ex., tipo clip-on,
        envolvente ou sobreposição).
    3d_glasses_material:
      name: Material de óculos 3D
      description: Especifica o material usado para óculos 3D, como bambu ou aço inoxidável
    3d_glasses_technology:
      name: Tecnologia de óculos 3D
      description: Especifica a tecnologia de imagem/sincronização 3D para a qual
        os óculos são projetados, determinando a compatibilidade com displays ou projetores
        específicos.
    3d_printer_case_style:
      name: Estilo de estojo para impressora 3D
      description: Classifica o tipo geral de produto para que a clientela possa diferenciar
        entre bolsas de transporte macias, estojos rígidos, gabinetes estacionários
        e capas simples contra poeira.
    3d_printer_cleaning_kit_components_included:
      name: Componentes incluídos no kit de limpeza para impressora 3D
      description: Lista as ferramentas individuais e consumíveis fornecidos no kit
        para que a clientela saiba exatamente o que está comprando.
    3d_printing_resin_type:
      name: Tipo de resina para impressão 3D
      description: Especifica a formulação ou aplicação pretendida da resina, ajudando
        quem compra a identificar rapidamente se a resina é padrão, de grau de engenharia,
        fundível ou outros tipos especializados.
    80_plus_efficiency_rating:
      name: Classificação de eficiência 80 Plus
      description: Denota o nível oficial de certificação de eficiência energética
        80 Plus que a PSU alcançou.
    abrasive_material:
      name: Material abrasivo
      description: Identifica o tipo de abrasivo usado em ferramentas de lixa, como
        diamante ou carboneto de silício
    absinthe_style:
      name: Estilo do absinto
      description: Define o estilo do absinto, por exemplo, misto, destilado
    absinthe_variety:
      name: Variedade de absinto
      description: Diferencia os absintos por suas variedades únicas, por exemplo,
        rouge, verte
    absorbency_level:
      name: Nível de absorção
      description: Define a capacidade de absorção, normalmente para itens de cuidados
        pessoais; por exemplo, uso noturno, leve
    absorbent_hygiene_product_features:
      name: Características do produto de higiene absorvente
      description: Identifica as características especiais de produtos de higiene,
        por exemplo, antivazamentos ou hipoalergênicos
    academic_level:
      name: Nível acadêmico
      description: Especifica o nível acadêmico do conteúdo de mídia, como graduação
        ou doutorado
    accessibility_design_features:
      name: Recursos de design de acessibilidade
      description: Inclui elementos de design pensados para apoiar usuários com deficiência
        auditiva, visual ou motora
    accessory_material:
      name: Material do acessório
      description: Especifica o tipo de material em acessórios, normalmente para suprimentos
        para remessas, por exemplo, plástico, papelão
    accessory_size:
      name: Tamanho do acessório
      description: Define o tamanho de um produto acessório, como tamanho único ou
        compacto
    accordion_tuning:
      name: Afinação do acordeão
      description: Especifica o tipo de afinação usada em um acordeão, como tom seco
        ou de concerto
    activation_mechanism:
      name: Mecanismo de ativação
      description: Especifica o método primário que aciona o alarme.
    activation_method:
      name: Método de ativação
      description: Descreve como o crédito pré-pago ou chip é ativado pelo usuário.
    active_ingredient:
      name: Ingrediente ativo
      description: Identifica substâncias primárias em itens de cuidados pessoais,
        por exemplo, vitamina A, retinol
    activewear_clothing_features:
      name: Características de roupas esportivas
      description: Identifica as características únicas das roupas esportivas, como
        elasticidade em quatro direções ou design respirável
    activity:
      name: Atividade
      description: Especifica o esporte ou atividade para o qual o produto foi projetado,
        como tênis ou pilates
    activity_tracker_design:
      name: Formato do monitorador de atividade física
      description: Especifica como o monitor de atividade é usado, por exemplo, clipe,
        braçadeira
    acupuncture_model_format:
      name: Formato do modelo de acupuntura
      description: Define o tamanho e a escala dos modelos de acupuntura, por exemplo,
        tamanho real, miniatura
    acupuncture_model_type:
      name: Tipo de modelo de acupuntura
      description: 'Especifica a parte do corpo ou espécie que o modelo de acupuntura
        representa, por exemplo, cabeça, mão, animal '
    adapter_directionality:
      name: Direcionalidade do adaptador
      description: Indica se o adaptador suporta fluxo de sinal em ambas as direções
        ou apenas em uma direção especificada.
    adapter_operating_modes:
      name: Modos de operação do adaptador
      description: Especifica se o adaptador funciona como receptor Bluetooth, transmissor
        ou ambos.
    adaptive_sync_technology:
      name: Tecnologia de sincronização adaptativa
      description: Especifica a tecnologia de taxa de atualização variável (VRR) suportada
        pelo monitor para visuais sem rasgo.
    adc_resolution:
      name: Resolução ADC
      description: Especifica a resolução (em bits) do conversor analógico-digital
        integrado, definindo a precisão da medição.
    additional_animation_software_features:
      name: Recursos adicionais de software de animação
      description: Especifica recursos exclusivos em software de edição de animação,
        como animação de personagens ou efeitos visuais
    additional_cleaning_technology:
      name: Tecnologia de limpeza adicional
      description: Lista quaisquer tecnologias de limpeza incluídas além do vapor
        (p. ex., ultrassônico, UV, ozônio).
    additional_design_software_type:
      name: Tipo de software de design adicional
      description: Especifica recursos adicionais de software de design, como tour
        virtual ou projeto paisagístico
    additional_financial_software_features:
      name: Recursos adicionais de software financeiro
      description: Identifica recursos extras de software financeiro, como gerenciamento
        de ativos ou auditoria e conformidade
    additional_graphic_software_features:
      name: Recursos adicionais de software gráfico
      description: Destaca recursos extras de software gráfico, como ilustração digital
        ou design de layout
    additional_publishing_software_features:
      name: Recursos adicionais de software de publicação
      description: Destaca funcionalidades extras em software de publicação, como
        design de impressão ou publicação digital
    additional_security_software_features:
      name: Recursos adicionais de software de segurança
      description: Identifica recursos extras de software de segurança, como criptografia
        de disco, detecção de intrusão
    adhesive_application_type:
      name: Tipo de aplicação do adesivo
      description: Define o serviço de cílios ou caso de uso pretendido para o adesivo.
    adhesive_features:
      name: Características adesivas
      description: Destaca propriedades especiais do adesivo usado em adesivos ou
        fitas.
    adhesive_format:
      name: Formato do adesivo
      description: Indica a forma física em que o adesivo é fornecido para uso em
        reparos.
    adhesive_strength:
      name: Força do adesivo
      description: Especifica o nível de aderência ou fixação da tira nasal (p. ex.,
        original, extra forte).
    adhesive_type:
      name: Tipo de adesivo
      description: Identifica o tipo de adesivo utilizado em um produto, como removível
        ou permanente
    aftershave_product_form:
      name: Formato de produto pós-barba
      description: Identifica a consistência de um produto pós-barba, como bálsamo
        ou creme
    age_group:
      name: Grupo de idade
      description: Define a faixa etária alvo de um produto, como adultos ou crianças
    age_restrictions:
      name: Restrições de idade
      description: Indica o requisito de idade mínima para um produto ou evento, como
        18 anos ou mais
    ai_application:
      name: Aplicativo de IA
      description: Especifica a função de IA do software, como análise preditiva ou
        reconhecimento de fala
    air_freshener_form:
      name: Formulação do aromatizador
      description: Define o tipo de aromatizador de ambiente para veículos; por exemplo,
        óleo, clipe para estrutura de ventilação
    air_fryer_functions:
      name: Funções da Air Fryer
      description: Lista os vários modos de cozimento disponíveis em uma air fryer
        ou similar, por exemplo, fritar sem óleo, assar
    air_mattress_features:
      name: Características do colchão de ar
      description: Descreve as características únicas de um colchão de ar, como fácil
        de inflar ou resistente a furos
    air_tube_configuration:
      name: Configuração do tubo de ar
      description: Indica o número ou estilo de tubos de inflação de ar integrados
        com o manguito.
    airbrush_feed_type:
      name: Tipo de alimentação do aerógrafo
      description: Identifica o método de distribuição de tinta em aerógrafos, por
        exemplo, gravidade ou sifão
    airbrush_operation_method:
      name: Método de operação do aerógrafo
      description: Especifica o estilo de operação da escova secadora, como ação única
        ou dupla
    aircraft_engine_configuration:
      name: Configuração do motor da aeronave
      description: Especifica o número de motores que impulsionam a aeronave, como
        monomotor ou bimotor
    aircraft_engine_type:
      name: Tipo de motor de aeronave
      description: Especifica o tipo de motor que impulsiona a aeronave, como jato
        ou turboélice
    airflow_opening_design:
      name: Design das aberturas de fluxo de ar
      description: Descreve a configuração de respiração ou ventilação incorporada
        ao protetor bucal.
    airsoft_equipment_included:
      name: Equipamento de airsoft incluído
      description: Especifica o equipamento extra fornecido com produtos para airsoft,
        como óculos de proteção ou colete tático
    album_type:
      name: Tipo de álbum
      description: Descreve o estilo de encadernação de para álbuns de recortes ou
        kits de selos, por exemplo, em espiral, em costura
    alcohol/solvent_content:
      name: Teor de álcool/solvente
      description: 'Classifica o produto com base no teor de álcool ou solvente para
        fins de transporte e regulamentação (ex.: álcool ≤24%, álcool >24%, solvente
        em recipiente pequeno)'
    alcohol_content:
      name: Teor de álcool
      description: Indica se o tônico é livre de álcool ou, se presente, aproximadamente
        quanto álcool a fórmula contém.
    alert_type:
      name: Tipo de alerta
      description: Especifica o tipo de alerta que um produto fornece, como alarmes
        sonoros ou notificações de smartphones
    allergen_information:
      name: Informações sobre alérgenos
      description: Indica possíveis alérgenos presentes em alimentos ou bebidas, como
        trigo ou amendoim
    allergen_test_type:
      name: Tipo de teste de alérgeno
      description: Especifica o tipo de alérgeno que o kit de teste foi projetado
        para detectar, como alimentício ou ambiental
    allergens:
      name: Alérgenos
      description: Indica possíveis alérgenos em produtos de saúde e beleza, por exemplo,
        linalol ou limoneno
    allergy_friendly_features:
      name: Recursos antialérgicos
      description: Identifica se um produto tem propriedades antialérgicas, como sem
        látex ou resistente a mofo
    amino_acid_subtype:
      name: Subtipo de aminoácido
      description: Especifica o tipo ou perfil primário de aminoácidos contidos no
        suplemento.
    amplifier/booster_suitable_location:
      name: Localização adequado para amplificador/booster
      description: Especifica os melhores lugares para um amplificador ou amplificador
        de sinal, como veículos ou locais grandes
    amplifier_class:
      name: Classe de amplificador
      description: Define o tipo de amplificador, como AB ou D
    amplifier_configuration:
      name: Configuração do amplificador
      description: Especifica a configuração de amplificadores para veículos motorizados,
        como amplificadores de dois ou quatro canais
    amputation_level:
      name: Nível de amputação
      description: Denota o nível de amputação para o qual a meia/manga compressiva
        foi projetada.
    analyte_measured:
      name: Analito medido
      description: Identifica os analitos específicos de sangue, para os quais a solução
        de controle fornece calibração.
    anamorphic_squeeze_ratio:
      name: Taxa de compressão anamórfica
      description: Indica o fator de compressão horizontal de uma lente anamórfica,
        permitindo combinar lentes com o desqueeze desejado na saída.
    anatomical_detail_displayed:
      name: Detalhe anatômico exibido
      description: Indica quais características anatômicas ou meridianas são destacadas
        no modelo.
    anchor_type:
      name: Tipo de âncora
      description: Define a âncora usada em equipamentos para esportes aquáticos rebocados,
        como fluke ou plow
    anemometer_application:
      name: Aplicação de anemômetro
      description: Identifica o uso pretendido de um anemômetro, como industrial ou
        meteorológico
    angles_supported:
      name: Ângulos com suporte
      description: Especifica a faixa de ângulos que um produto pode acomodar, normalmente
        para eletrônicos; por exemplo, ajustável, 0° a 180°
    angling_style:
      name: Estilo de pesca
      description: Define a técnica de pesca para a qual o produto foi projetado,
        como surfcasting ou pesca com mosca
    animal_feed_form:
      name: Formulação do alimento animal
      description: Especifica a forma de alimento animal, como líquida ou granulada
    animal_type:
      name: Tipo de animal
      description: Especifica o tipo de animal ao qual um produto se destina, como
        patos, cervos ou cães
    answering_machine_type:
      name: Tipo de secretária eletrônica
      description: Especifica a presença e tecnologia de uma secretária eletrônica
        integrada.
    antenna_connector_type:
      name: Tipo de conector de antena
      description: Especifica o conector RF usado para fixar antenas externas.
    antenna_rf_connector_type:
      name: Tipo de conector RF da antena
      description: Identifica o conector RF usado pela antena.
    antenna_type:
      name: Tipo de antena
      description: Especifica o tipo de antena para dispositivos eletrônicos, por
        exemplo, omnidirecional, grade
    anti_agin_skin_care_type:
      name: Tipo de cuidado anti-age para a pele
      description: Classifica o tipo de item antienvelhecimento para a pele, como
        máscara ou tonificante
    anti_perspirant_strength_level:
      name: Nível de força do antitranspirante
      description: Denota a classificação de eficácia do antitranspirante (p. ex.,
        força clínica, força esportiva).
    antibody_class_tested:
      name: Classe de anticorpo testada
      description: Especifica a imunoglobulina ou biomarcador que o kit detecta (p.
        ex., IgE, IgG4).
    antifreeze_type:
      name: Tipo de anticongelante
      description: Especifica o tipo de anticongelante para manutenção de veículos,
        por exemplo, concentrado, pré-diluído
    antique_car_design:
      name: Design de carro antigo
      description: Descreve o estilo de design principal de um carro antigo, como
        um t-bucket ou um grand tourer
    antique_vehicle_era:
      name: Era dos veículos antigos
      description: Descreve o período histórico de um veículo antigo, como era do
        latão ou vintage
    appliance_board_function:
      name: Função da placa do aparelho
      description: Especifica a função funcional da placa dentro do aparelho.
    appliance_unit_location:
      name: Localização da unidade do aparelho
      description: Indica a seção física do aparelho para a qual a placa é destinada
        (p. ex., unidade interna ou externa).
    application_area:
      name: Área de aplicação
      description: Especifica a parte ou área do corpo onde o produto é aplicado,
        por exemplo, lábios, corpo inteiro
    application_method:
      name: Método de aplicação
      description: Define como um produto é aplicado ou usado, por exemplo, gel, líquido,
        spray
    application_type:
      name: Tipo de aplicação
      description: Indica se o tratamento é deixado ou enxaguado e qualquer modo de
        uso especial.
    applicator_format:
      name: Formato do aplicador
      description: Descreve a forma física ou estilo do aplicador de loção ou protetor
        solar.
    applicator_material:
      name: Material aplicador
      description: Especifica o material utilizado no aplicador, normalmente para
        absorventes internos; por exemplo, plástico, papelão
    applicator_type:
      name: Tipo de aplicador
      description: Identifica o tipo de aplicador incluído nos absorventes internos,
        como com ou sem aplicador
    applique/patch_shape:
      name: Forma do aplique/adorno
      description: Descreve a forma de apliques ou remendos, como estilo animal ou
        geométrico
    applique_shape:
      name: Forma do adorno
      description: Descreve a forma dos itens de aplique, como estilo floral ou animal
    aquarium_filter_features:
      name: Recursos do filtro de aquário
      description: Descreve os recursos especiais de filtros de aquário, por exemplo,
        troca rápida de cartucho, filtração em várias etapas
    aquarium_light_spectrum:
      name: Espectro de luz do aquário
      description: Especifica o tipo de espectro de luz para a iluminação do aquário,
        por exemplo, azul, luz do dia
    aquarium_overflow_box_design:
      name: Design da caixa de overflow para aquários
      description: Descreve o estilo de configuração de uma caixa de transbordamento
        de aquário, como externa ou suspensa
    archery_activity:
      name: Atividade de tiro com arco
      description: Especifica o tipo de atividade de tiro com arco, por exemplo, caça
        ao ar livre, prática de tiro ao alvo
    archery_equipment_included:
      name: Equipamento de tiro com arco incluído
      description: Especifica os acessórios de tiro com arco incluídos, por exemplo,
        suporte estabilizador, flechas com vidro de segurança
    archery_style:
      name: Estilo de tiro com arco
      description: Define o tipo específico de tiro com arco para o qual o produto
        foi projetado, por exemplo, tiro com arco 3D, caça com arco
    archery_target_type:
      name: Tipo de alvo para tiro com arco
      description: Especifica o tipo de alvo para tiro com arco projetado para diferentes
        práticas de tiro, como alvo 3D, alvo de saco
    aromatherapy:
      name: Aromaterapia
      description: Especifica o perfume ou óleo essencial usado, por exemplo, eucalipto,
        lavanda
    arrangement:
      name: Arranjo
      description: Especifica como as flores são organizadas ou apresentadas, por
        exemplo, vaso, cesta
    arrow/bolt_material:
      name: Material de flecha/virote
      description: Identifica o material de que são feitas flechas ou dardos, por
        exemplo, alumínio ou bambu
    arrow_fletching_material:
      name: Material para flechas
      description: Identifica o material usado nos rêmiges das flechas, como sintético
        ou plástico
    arrow_material:
      name: Material de flecha
      description: Identifica a composição das flechas, como bambu ou fibra de vidro
    art/crafting_tool_material:
      name: Material de ferramenta de arte/artesanato
      description: Identifica o principal material das ferramentas para trabalhos
        artísticos ou artesanato, como madeira ou metal
    art_fixative_application_method:
      name: Método de aplicação do fixador artístico
      description: Descreve o modo de aplicação do fixador para trabalhos de artesanato,
        como aerossol ou pincel
    art_movement:
      name: Movimento artístico
      description: Define o estilo ou movimento artístico de uma pintura, por exemplo,
        Impressionismo, Expressionismo
    art_style:
      name: Estilo de arte
      description: Descreve o estilo estético de um produto, como art nouveau ou tipografia
    artwork_authenticity:
      name: Autenticidade da obra de arte
      description: Indica a autenticidade da obra de arte, especificando se é uma
        criação original ou uma reprodução
    artwork_frame_material:
      name: Material da moldura da arte
      description: Identifica o material usado em molduras para quadros, como madeira
        ou banhada a ouro
    artwork_type:
      name: Tipo de arte
      description: Especifica o estilo da arte digital, como tipografia ou pintura
        digital
    assisted_braking_technology:
      name: Tecnologia de frenagem assistida
      description: Indica o tipo de frenagem assistida em dispositivos de segurança,
        por exemplo, ativa, passiva
    attachment_method:
      name: Método de anexação
      description: Define o método usado para anexar ou fixar o produto, por exemplo,
        velcro, clip-on
    attachment_options:
      name: Opções de anexação
      description: Especifica os métodos para fixar ou prender um produto, por exemplo,
        cordão
    attachment_type:
      name: Tipo de anexação
      description: Define o método de fixação ou conexão do produto, como desencaixe
        ou fecho gancho e laço
    atv/off_road_tire_type:
      name: Tipo de pneu para quadriciclo/off-road
      description: Identifica o uso específico de pneus ATV ou off-road, como areia
        ou lama
    audio/scan_converter_features:
      name: Recursos do conversor de áudio/leitura
      description: Descreve os recursos de um conversor de áudio/digitalização, como
        conversão automática ou controle remoto
    audio/video_cable_connector_type_end_a:
      name: Tipo de conector de cabo áudio/vídeo (extremidade A)
      description: Especifica o conector ou interface exato presente na primeira extremidade
        (Extremidade A) do cabo.
    audio/video_cable_connector_type_end_b:
      name: Tipo de conector de cabo áudio/vídeo (extremidade B)
      description: Especifica o conector ou interface exato presente na segunda extremidade
        (Extremidade B) do cabo.
    audio_bypass_type:
      name: Tipo de bypass de áudio
      description: Especifica como o sinal de áudio é roteado quando o efeito está
        desativado (p. ex., true bypass, buffer, relé).
    audio_cassette_tape_type:
      name: Tipo de fita cassete de áudio
      description: Especifica a formulação de fita IEC (bias) para cassetes de áudio.
    audio_codecs/formats_supported:
      name: Codecs/formatos de áudio com suporte
      description: Especifica os tipos de arquivos de áudio que um produto pode reproduzir,
        como WAVE ou MP3
    audio_component_form_factor:
      name: Formato do componente de áudio
      description: Define o estilo físico ou formato de instalação do componente.
    audio_connectivity:
      name: Conectividade de áudio
      description: Define os tipos de conexão de áudio que um produto suporta, como
        HDMI ou USB
    audio_conversion_direction:
      name: Direção da conversão de áudio
      description: Especifica o fluxo de sinal que o conversor suporta (p. ex., analógico
        para digital, digital para analógico, bidirecional).
    audio_converter_features:
      name: Recursos do conversor de áudio
      description: Descreve os principais recursos de um conversor de áudio, como
        suporte analógico ou com IA
    audio_d/a_converter_dac:
      name: Conversor de áudio D/A (Dac)
      description: Especifica o tipo de conversor de digital para analógico (DAC)
        em dispositivos de áudio, por exemplo, USB, óptico
    audio_duplex_capability:
      name: Capacidade duplex de áudio
      description: Especifica se o dispositivo suporta comunicação de áudio full-duplex
        (bidirecional simultânea) ou half-duplex.
    audio_mixer_type:
      name: Tipo de mixer de áudio
      description: Identifica o tipo de mixer de áudio, como analógico ou streaming
    audio_output_channel:
      name: Canal de saída de áudio
      description: Indica o número de canais ou a configuração de alto-falantes para
        os quais um sistema de som pode emitir, como 2 ou 5.1
    audio_output_format:
      name: Formato de saída de áudio
      description: Define a qualidade e o tipo de som produzido pelo dispositivo de
        áudio, como digital ou analógico
    audio_player/recorder_features:
      name: Recursos de reprodutor/gravador de áudio
      description: Identifica os recursos exclusivos de reprodutores ou gravadores
