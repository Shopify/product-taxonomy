    saddle_seat_pattern:
      name: Padrão de assento do selim
      description: Descreve o desenho ou impressão em um selim de bicicleta, como
        floral ou geométrico
    safety_certifications:
      name: Certificações de segurança
      description: Indica a conformidade do produto com padrões de segurança, normalmente
