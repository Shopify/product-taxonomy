    route_of_administration:
      name: Via de administração
      description: Identifica como o produto é aplicado ou consumido, influenciando
        eficácia e segurança (p. ex., oral, tópica, adesivo transdérmico, sublingual,
        injeção intramuscular).
    rug/mat_features:
      name: Recursos do tapete
      description: Descreve características especiais de tapetes/capachos, como base
        antiderrapante ou secagem rápida
    rug/mat_material:
      name: Material do tapete
      description: Especifica o tipo de material usado em tapetes ou capachos, como
        borracha ou microfibra
    rug/mat_shape:
      name: Formato de tapete
      description: Especifica o formato de esteiras e tapetes, por exemplo, passadeira,
