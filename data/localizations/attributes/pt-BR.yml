    eye_shadow_effect:
      name: Efeito sombra para os olhos
      description: Define o impacto visual da sombra, por exemplo, esfumaçado, glitter
    eye_shadow_palette_size:
      name: Tamanho da paleta de sombras
      description: Classifica produtos por formatos comuns de paleta para navegação
        rápida.
    eyebrow_applicator_type:
      name: Tipo de aplicador de sobrancelha
      description: Descreve o aplicador ou ponta usada para aplicar o produto de sobrancelha.
    eyebrow_enhancer_color:
      name: Cor intensificadora de sobrancelha
      description: Especifica a cor dos produtos para realçar as sobrancelhas, como
        preto ou loiro claro
    eyebrow_stencil_shape:
      name: Formato do molde de sobrancelha
      description: Descreve o formato ou estilo de arco de sobrancelha primário que
        o molde pretende criar.
    eyelash_applicator_design:
      name: Formato do aplicador de cílios
      description: Define o estilo dos aplicadores de cílios postiços, por exemplo,
