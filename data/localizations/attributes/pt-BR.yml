    eyelash_curler_type:
      name: Tipo de curvador de cílios
      description: Especifica o design ou mecanismo do curvador de cílios.
    eyelash_material:
      name: Material dos cílios
      description: Identifica o tipo de material de cílios postiços, como seda ou
