    electronic_game_genre:
      name: Gênero de jogo eletrônico
      description: Identifica a categoria de um jogo eletrônico, como fitness ou quebra-cabeça
    electrotherapy_modality:
      name: Modalidade de eletroterapia
      description: Especifica os tipos de tecnologias de estimulação que o dispositivo
