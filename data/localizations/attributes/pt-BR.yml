    screen/display_design:
      name: Design de tela/exibição
      description: Especifica os recursos de design da tela de um produto, normalmente
        para câmeras; por exemplo, visor
    screen_assembly_components_included:
      name: Componentes do conjunto de tela incluídos
      description: Esclarece quais peças vêm pré-montadas com a tela.
    screen_curvature_rating:
      name: Classificação de curvatura da tela
      description: Especifica o raio de curvatura de monitores curvos (p. ex., 1000R),
        indicando quão pronunciada é a curva.
    screen_material:
      name: Material da tela
      description: Define o tipo de material utilizado na tela de um produto, por
        exemplo, vidro, policarbonato
    screen_operation_type:
      name: Tipo de operação da tela
      description: Descreve o estilo estrutural ou de implantação da tela (p. ex.,
        quadro fixo, puxar manual, motorizado, tripé, inflável).
    screen_protection_features:
      name: Recursos de proteção de tela
      description: Detalha como o estojo protege a tela do telefone além da cobertura
        básica.
    screen_protector_adhesion_type:
      name: Tipo de adesão do protetor de tela
      description: Especifica o método adesivo ou de fixação usado para afixar o protetor
        à tela do telefone.
    screen_protector_coverage_style:
      name: Estilo de cobertura do protetor de tela
      description: Define o design de cobertura física ou fator de forma do protetor
