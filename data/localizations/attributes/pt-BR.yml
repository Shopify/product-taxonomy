    era:
      name: Era
      description: Usado para categorizar itens colecionáveis ou antiguidades pela
        sua cronologia, como Velho Oeste ou Segunda Guerra Mundial
    error_correction_type:
      name: Tipo de correção de erro
      description: Indica se o módulo de memória inclui capacidade de correção de
        erro e, em caso afirmativo, a tecnologia ECC específica ou estilo de buffer
        usado.
    esrb_rating:
      name: Classificação ESRB
      description: Identifica a adequação dos videogames de acordo com a faixa etária,
        como E (Todos) ou T (Adolescentes)
    ethernet_cable_category:
      name: Categoria de cabo Ethernet
      description: Indica a classificação de categoria TIA/EIA de cabos Ethernet de
        par trançado, definindo largura de banda e desempenho.
    ethernet_lan_interface_type:
      name: Tipo de interface LAN Ethernet
      description: Especifica o tipo de conexão Ethernet que um produto suporta, como
        LAN ou fast
    ev_battery_features:
      name: Características da bateria EV
      description: Destaca os recursos de baterias de VE, como ciclo de vida longo
        ou sistema inteligente de gerenciamento de bateria
    ev_battery_type:
      name: Tipo da bateria EV
      description: Identifica o tipo de bateria usada em veículos elétricos, como
        íon-lítio ou chumbo-ácido
    ev_connector/adapter_type:
      name: Tipo de conector/adaptador EV
      description: Identifica o tipo de conector ou adaptador para veículos elétricos,
