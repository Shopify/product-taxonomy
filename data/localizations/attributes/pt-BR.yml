    shower_curtain_mounting_type:
      name: Tipo de montagem de cortina de chuveiro
      description: Identifica como uma cortina de chuveiro é fixada, como ilhós ou
        anel
    shower_design:
      name: Formato do chuveiro
      description: Identifica a configuração de boxes e kits de chuveiro, como reto
        ou de canto
    shower_features:
      name: Recursos do chuveiro
      description: Descreve os elementos exclusivos de um chuveiro, como assento embutido
        ou chuveiro de mão
    shower_opening_type:
      name: Tipo de abertura do chuveiro
      description: Identifica o estilo de abertura da porta do chuveiro, como articulada
