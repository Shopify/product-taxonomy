        conjuntos de rolos, lenços e soluções de limpeza.
    scanner_sensor_type:
      name: Tipo de sensor do scanner
      description: Especifica o tipo de sensor em leitores, como gerador de imagem
        2D ou laser
    scarf/shawl_style:
      name: Estilo de lenço/xale
      description: Identifica o estilo de lenços e xales, por exemplo, cobertor, manta
    scene_modes:
      name: Modos de cena
      description: Define o modo da câmera para capturar diferentes cenários, como
        noturno ou subaquático
    scent:
      name: Aroma
      description: Especifica a fragrância ou aroma de um produto, como baunilha ou
        frutas cítricas
    scissor_blade_type:
      name: Tipo de lâmina da tesoura
      description: Descreve o formato e o estilo das lâminas da tesoura, como curvas
        ou serrilhadas
    scooter_brake_type:
      name: Tipo de freio de scooter
      description: Especifica o mecanismo e o design dos freios da scooter, como a
        disco ou tambor
    scope/sight_design:
      name: Formato de escopo/visão
      description: Descreve o tipo de design para miras ou lunetas de armas, por exemplo,
