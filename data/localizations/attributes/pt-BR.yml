    emergency/safety_sign_design:
      name: Formato da sinalização de emergência/segurança
      description: Identifica o tipo de mensagem de segurança ou emergência em uma
        placa, como saída de incêndio ou cão de guarda
    emergency_items_included:
      name: Itens de emergência incluídos
      description: Especifica itens incluídos em kits de emergência, como rádio ou
        baterias
    enclosure_type:
