    eyewear_compatibility:
      name: Compatibilidade de óculos
      description: Indica o tipo de óculos para o qual o cordão é destinado.
    eyewear_frame_color:
      name: Cor da armação dos óculos
      description: Identifica a cor da armação de óculos, como preto ou dourado
    eyewear_frame_design:
      name: Design de armação dos óculos
      description: Descreve o estilo dos óculos de sol, como aviador ou olho de gato
    eyewear_frame_material:
      name: Material da armação dos óculos
      description: Especifica o tipo de material de armações de óculos, como bambu
