    eyewear_frame_shape:
      name: Formato da armação dos óculos
      description: Descreve o formato dos óculos, como redondo ou quadrado
    eyewear_hinge_type:
      name: Tipo de dobradiça dos óculos
      description: Descreve o mecanismo de dobradiça usado nas hastes, influenciando
