    ev_conversion_kit_components:
      name: Componentes do kit de conversão EV
      description: Identifica as peças incluídas em um kit de conversão de VE, como
        motor ou bateria
    evaporation_technology:
      name: Tecnologia de evaporação
      description: Define o sistema de evaporação em dispositivos de controle climático,
