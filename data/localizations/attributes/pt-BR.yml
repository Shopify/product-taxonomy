    film_type:
      name: Tipo de filme
      description: Identifica o tamanho e formato do filme usado em câmeras, como
        35 mm ou 120 mm
    filter_form_factor:
      name: Formato do filtro
      description: Descreve o estilo físico da unidade de filtro para verificações
        de compatibilidade (p. ex., cartucho, filtro de ventilador, cápsula, disco,
        conjunto de filtros).
    filter_installation_type:
      name: Tipo de instalação do filtro
      description: Especifica o estilo físico e método de instalação do filtro DSL.
    filter_material:
      name: Material de filtro
      description: Especifica o tipo de material de filtros, normalmente para café;
        por exemplo, papel, cânhamo
    filter_slope:
      name: Inclinação do filtro
      description: Especifica a taxa de atenuação dos filtros do crossover, expressa
        em dB por oitava.
    filter_topology:
      name: Topologia do filtro
      description: Especifica a família de resposta do filtro, que determina a forma
        de resposta de frequência e características de fase.
    filter_type:
      name: Tipo de filtro
      description: Distingue entre filtros, normalmente para aquários; por exemplo,
        mecânico, químico
    filtering_modes:
      name: Modos de filtragem
      description: Define os modos operacionais de radar ou detectores de velocidade,
        por exemplo, modo rodovia, bloqueios de GPS
    filtration_class:
      name: Classe de filtragem
      description: Classifica o nível de filtragem dos acessórios do respirador, como
        FFP1 ou B3
    filtration_technology:
      name: Tecnologia de filtração
      description: Identifica a tecnologia ou estágio usado pelo filtro para remover
        contaminantes aéreos produzidos durante a impressão.
    fin_material:
      name: Material da barbatana
      description: Especifica o tipo de materiais em pés de pato de mergulho ou snorkeling,
        como plástico ou borracha
    fin_pocket_type:
      name: Tipo de bolsa de nadadeira
      description: Especifica o design do encaixe dos pés nos pés de pato; por exemplo,
        pé completo, calcanhar aberto
    fin_profile:
      name: Perfil da nadadeira
      description: Classifica a prancha de surf com base na configuração das quilhas,
        por exemplo, cinco quilhas, twin
    fingerboard_color:
      name: Cor da escala
      description: Especifica a cor do braço em instrumentos de corda, por exemplo,
        prata, branco
    fingerboard_material:
