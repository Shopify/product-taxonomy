    shooting_modes:
      name: Modos de disparo
      description: Especifica as configurações operacionais da câmera, como modo de
        cena ou de filme
    shopping_bag_material:
      name: Material da sacola de compras
      description: Especifica o tipo de material utilizado em sacolas de compras,
        por exemplo, papel, materiais biodegradáveis
    shower_base_design:
      name: Formato da base de chuveiro
      description: Especifica o design das bases de chuveiro, como angular ou quadrante
    shower_cap_lining_material:
      name: Material do forro da touca de banho
      description: Identifica o material usado no forro interno que entra em contato
