    suitable_for_precious_material:
      name: Adequado para materiais preciosos
      description: Identifica se um produto é apropriado para uso com materiais preciosos,
        como ouro ou prata
    suitable_for_printer_type:
      name: Adequado para tipo de impressora
      description: Especifica o tipo de impressora com a qual o produto é compatível,
        por exemplo, impressora de etiquetas, aparelho de fax
    suitable_for_skin_tone:
      name: Adequado para tom de pele
      description: Faz a correspondência entre os produtos e tons de pele específicos,
        como pele clara ou escura
    suitable_for_skin_type:
      name: Adequado para tipo de pele
      description: Especifica produtos para condições específicas de pele, como seca,
        envelhecida ou sensível
    suitable_for_snowshoeing_activity:
      name: Adequado para atividades com raquetes de neve
      description: Especifica a compatibilidade com diferentes tipos de raquetes de
        neve, como corrida ou trabalho
    suitable_for_storage_type:
      name: Adequado para tipo de armazenamento
      description: Especifica quais itens o produto pode armazenar, por exemplo, lixo,
        ferramentas de jardim
    suitable_for_toothbrush:
      name: Adequado para escova de dentes
      description: Especifica com quais tipos de escova de dentes o produto é compatível,
        como cabeças de escovas de dente elétricas
    suitable_for_user_sensitivity_level:
      name: Adequado para dentes sensíveis
      description: Indica se a fórmula é destinada a usuários com dentes sensíveis.
    suitable_for_vehicle_type:
      name: Adequado para tipo de veículo
      description: Identifica o tipo de veículo com o qual um produto é compatível,
        como carro ou caminhão
    suitable_for_water_feature_type:
      name: Adequado para tipo de recurso hídrico
      description: Identifica o tipo de elemento aquático para o qual o produto é
        adequado, como um lago ou uma fonte
    suitable_for_water_type:
      name: Adequado para tipo de água
      description: Especifica se um produto é adequado para água doce, salgada ou
        ambas
    suitable_for_weapon_type:
      name: Adequado para tipo de arma
      description: Identifica o tipo de arma para a qual uma mira ou luneta foi projetada,
        por exemplo, pistola, espingarda
    suitable_installation:
      name: Instalação adequada
      description: Identifica o método de instalação apropriado para um produto, como
        acima do solo ou abaixo do solo
    suitable_location:
      name: Localização adequada
      description: 'Indica o posicionamento ideal do produto na casa, por exemplo,
        quarto, pátio '
    suitable_space:
      name: Espaço adequado
      description: Define o local ideal para uso do produto, por exemplo, dentro de
        casa, acima do solo
    suitcase_handle_type:
      name: Tipo de puxador da mala
      description: Especifica o estilo da alça da mala, por exemplo, transporte lateral
        ou superior
    sulfur_content:
      name: Teor de enxofre
      description: Especifica a concentração de enxofre no óleo de aquecimento para
        uso doméstico, por exemplo, ultrabaixo ou alto
    sunlight:
      name: Luz solar
      description: Especifica a quantidade de luz solar necessária para as plantas,
        como sombra ou sol pleno
    sunscreen_filter_type:
      name: Tipo de filtro de protetor solar
      description: Identifica o tipo de filtros UV usados na fórmula (químico, mineral
        ou híbrido).
    supplement_health_focus:
      name: Foco de saúde do suplemento
      description: Define a área primária de bem-estar que o suplemento pretende apoiar.
    support/brace_material:
      name: Material de suporte/apoio
      description: Identifica o material utilizado em suportes ou cintas, como neoprene
        ou espuma
    support_cushion_features:
      name: Características da almofada de suporte
      description: Destaca extras funcionais especiais ou melhorias oferecidas pela
        almofada.
    support_level:
      name: Nível de suporte
      description: Declara a classificação geral de estabilidade ou suporte oferecida
        pela órtese para diferentes gravidades de lesão ou níveis de atividade.
    support_rigidity_level:
      name: Nível de rigidez do suporte
      description: Descreve a firmeza geral ou suporte estrutural fornecido pela palmilha,
        desde amortecimento suave até suporte ortótico rígido.
    supported_audio_sources:
      name: Fontes de áudio suportadas
      description: Lista as fontes de reprodução ou entrada que a unidade pode processar.
    supported_countries:
      name: Países suportados
      description: Lista os países ou territórios específicos onde o chip/eSIM ou
        plano pré-pago oferece serviço.
    supported_display_technologies:
      name: Tecnologias de display suportadas
      description: Lista os tipos de displays ou tecnologias de tela que o calibrador
        pode perfilar ou medir.
    supported_dvi_link_type:
      name: Tipo de link DVI suportado
      description: Declara se o dispositivo processa single-link, dual-link, ou ambos
        os padrões de sinal DVI.
    supported_erase_modes:
      name: Modos de apagamento suportados
      description: Lista os padrões de apagamento seguro que o duplicador pode executar
        nas unidades de destino.
    supported_input_types:
      name: Tipos de entrada compatíveis
      description: Lista os tipos de entradas de áudio que o channel strip aceita
        (p. ex., Mic, Line, Instrument Hi-Z).
    supported_language:
      name: Idioma suportado
      description: Especifica os idiomas disponíveis em um produto de software, como
        inglês ou espanhol
    supported_media_sources:
      name: Fontes de mídia suportadas
      description: Define as entradas de mídia física ou digital a partir das quais
        a unidade consegue reproduzir música.
    supported_raid_levels:
      name: Níveis RAID suportados
      description: Lista as configurações de matriz de disco que o controlador de
        armazenamento integrado pode utilizar.
    supported_scan_media_type:
      name: Tipo de mídia de digitalização suportada
      description: Lista os tipos de originais que o scanner pode processar (p. ex.,
        vários tipos de filme, impressões reflexivas).
    supported_sdi_standards:
      name: Padrões SDI suportados
      description: Indica as taxas de dados/padrões SDI (SD-SDI, HD-SDI, 3G-SDI, etc.)
        que o dispositivo suporta para transmissão de sinal.
    supported_usb_device_types:
      name: Tipos de dispositivos USB suportados
      description: Especifica os tipos de dispositivos de armazenamento USB que o
        duplicador pode processar.
    surface_sides:
      name: Lados da superfície
      description: Indica se a mesa de impressão pode ser usada em um ou ambos os
        lados.
    surface_texture:
      name: Textura da superfície
      description: Descreve a textura ou padrão na superfície de um produto, normalmente
        para preservativos; por exemplo, liso, com nervuras
    surfboard_features:
      name: Recursos da prancha de surfe
      description: Especifica características únicas de uma prancha de surfe, como
        inflável ou capota rígida
    surveillance_camera_design:
      name: Formato da câmera de vigilância
      description: Identifica o tipo de design das câmeras de segurança, por exemplo,
        térmica ou panorâmica
    surveillance_camera_mounting_type:
      name: Tipo de montagem de câmera de vigilância
      description: Identifica como uma câmera de vigilância pode ser instalada, por
        exemplo, parede, teto
    surverying_accessories_included:
      name: Acessórios de vigilância incluídos
      description: Especifica componentes extras embalados com ferramentas de topografia,
        como uma braçadeira ou haste de nivelamento
    suspender_style:
      name: Estilo do suspensor
      description: 'Define o estilo do suspensor, por exemplo, costas em X ou em Y '
    sustainability:
      name: Sustentabilidade
      description: Destaca produtos que apoiam práticas sustentáveis, por exemplo,
        comércio justo, de origem responsável
    swab_end_configuration:
      name: Configuração da ponta do cotonete
      description: Indica se o cotonete tem uma ponta utilizável ou duas, e se as
        pontas diferem.
    swab_material:
      name: Material do cotonete
      description: Especifica o tecido de um limpador de instrumento musical, por
        exemplo, seda, feltro
    swimwear_features:
      name: Características de trajes de banho
      description: Identifica características especiais de trajes de banho, como secagem
        rápida ou proteção solar UPF
    swing_style:
      name: Estilo em movimento
      description: Classifica com base na técnica de swing, normalmente para raquetes
        de tênis; por exemplo, golpes longos
    swing_weighting:
      name: Peso em movimento
      description: Indica a distribuição de peso de um taco de beisebol ou softbol,
        por exemplo, balanceado, forte
    switch_control_type:
      name: Tipo de controle de interruptor
      description: Descreve como um interruptor de luz é controlado, como botão ou
        sensor
    switch_management_type:
      name: Tipo de gerenciamento do switch
      description: Classifica o nível ou estilo de gerenciamento e configuração que
        o switch suporta (p. ex., não gerenciado, inteligente, gerenciado por web,
        totalmente gerenciado).
    switch_mechanism:
      name: Mecanismo do interruptor
      description: Identifica a tecnologia de atuação interna do botão (p. ex., microinterruptor,
        ótico), que impacta sensação, vida útil e capacidade de resposta.
    switch_stem_compatibility:
      name: Compatibilidade com haste de switch
      description: Identifica os estilos de haste mecânica ou outros switches que
        a tecla ou conjunto de teclas se encaixa.
    switching_layer:
      name: Camada de comutação
      description: Indica a camada OSI mais alta na qual o switch opera nativamente
        (p. ex., Camada 2, Camada 3, híbridos).
    switching_method:
      name: Método de troca
      description: Define o método utilizado para alternar entre diferentes entradas
        em produtos eletrônicos; por exemplo, controle remoto
    synthesis_method:
      name: Método de síntese
      description: Especifica o método de síntese sonora em instrumentos eletrônicos,
        como analógico virtual ou modular
    system/power_cable_connector_type_end_a:
      name: Tipo de conector de cabo de sistema/energia (extremidade A)
      description: Identifica o padrão exato do conector presente na primeira extremidade
        do cabo (p. ex., IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: Tipo de conector de cabo de sistema/energia (extremidade B)
      description: Identifica o padrão exato do conector presente na segunda extremidade
        do cabo (p. ex., IEC C13, DC 5.5 × 2.1 mm, plugue banana).
    system_components_included:
      name: Componentes do sistema incluídos
      description: Lista as principais peças de hardware enviadas com o sistema para
        que a clientela entenda o que está ou não incluído no pacote.
    system_of_measurement:
      name: Sistema de medição
      description: Identifica a unidade de medida usada em um produto, como imperial
        ou métrica
    system_range:
      name: Faixa do sistema
      description: Define a área operacional dos sistemas de alarme hospitalar, por
        exemplo, residenciais, GPS
    systems_supported:
      name: Sistemas com suporte
      description: Especifica as plataformas de jogos com as quais um produto é compatível;
        por exemplo, Xbox, Nintendo Switch
    tab_style:
      name: Estilo de guia
      description: Especifica o estilo das abas nos acessórios do fichário, por exemplo,
        pré-impressas, numeradas
    tablet_case_functional_features:
      name: Recursos funcionais da capa do tablet
      description: Destaca os principais complementos funcionais incluídos com a capa
        do tablet.
    tabletop_color:
      name: Cor do tampo da mesa
      description: Especifica a cor do tampo da mesa, como preta ou branca
    tabletop_material:
      name: Material do tampo da mesa
      description: Identifica a composição do tampo da mesa, por exemplo, madeira
        compensada, concreto
    tabletop_pattern:
      name: Padrão do tampo da mesa
      description: Define o design ou a estampa em um tampo de mesa, como Natal ou
        sólida
    tabletop_shape:
      name: Formato do tampo da mesa
      description: Descreve a forma geométrica do tampo de uma mesa, por exemplo,
        quadrado, em forma de rim
    tableware_material:
      name: Material de talheres
      description: Especifica a composição de utensílios de mesa, como porcelana ou
        cerâmica
    tack/pushpin_head_design:
      name: Formato da cabeça de contrapino/alfinete
      description: Descreve o formato da cabeça de uma tachinha ou alfinete, como
        redondo ou decorativo
    tag_fastening:
      name: Fixação de etiqueta
      description: Descreve o método usado para prender uma etiqueta na bagagem, como
        fivelas ou presilhas
    talc_content:
      name: Conteúdo de talco
      description: Declara se a formulação contém talco, é livre de talco ou usa níveis
        reduzidos de talco.
    tampon_absorbency_level:
      name: Nível de absorção do absorvente interno
      description: Identifica a capacidade de absorção dos absorventes internos, como
        leves ou pesados
    tampon_features:
      name: Características do absorvente interno
      description: Descreve as características específicas de absorventes internos,
        como design confortável ou à prova de vazamentos
    tan_type:
      name: Tipo de bronzeado
      description: Define a intensidade da cor e o processo de aplicação de produtos
        de bronzeamento, por exemplo, escuro, instantâneo
    tank_color:
      name: Cor do tanque
      description: Identifica a cor de um produto, normalmente caixas de descarga;
        por exemplo, preto, branco
    tank_material:
      name: Material do tanque
      description: Especifica o material do tanque de um produto, normalmente para
        ferramentas de jardinagem; por exemplo, metal, plástico
    tank_pattern:
      name: Padrão do tanque
      description: Identifica o motivo visual em cubas sanitárias, como cor sólida
        ou abstrato
    tape_cartridge_format:
      name: Formato do cartucho de fita
      description: Especifica as tecnologias de cartucho de fita (p. ex., LTO, DAT,
        DLT) que a unidade pode ler ou gravar.
    tape_cartridge_generation:
      name: Geração do cartucho de fita
      description: Indica a geração ou versão específica dentro de uma família de
        tecnologia de fita (mais comum gerações LTO) que a unidade suporta.
    tape_material:
      name: Material da fita
      description: Especifica o tipo de material usado em produtos de fita, como vinil
        ou plástico
    tape_speed_supported:
      name: Velocidade de fita suportada
      description: Lista as velocidades de reprodução e gravação de fita (polegadas
        por segundo) nas quais a unidade bobina a bobina pode operar.
    target_audience:
      name: Público-alvo
      description: Especifica para quem um produto é adequado, como crianças ou todas
        as idades
    target_facial_zone:
      name: Zona facial alvo
      description: Especifica a zona facial que a fita de poros é projetada para tratar
        (p. ex., nariz, queixo, zona T).
    target_gender:
      name: Gênero alvo
      description: Identifica o gênero a que um produto se destina, como feminino,
        masculino ou unissex
    targeted_pests:
      name: Pragas direcionadas
      description: Identifica o tipo de pragas contra as quais um produto é eficaz,
        por exemplo, mofo, algas
    targeted_skin_concern:
      name: Preocupação de pele alvo
      description: Indica a lesão específica ou condição de pele que o produto é formulado
        para tratar.
    targeted_stains:
      name: Manchas direcionadas
      description: Identifica os tipos de manchas que um produto foi projetado para
        tratar, como alimentos ou lama
    tea_input_type:
      name: Tipo de entrada de chá
      description: Especifica o estilo de preparação do chá, por exemplo, saquinhos,
        cápsulas
    technology_level:
      name: Nível de tecnologia
      description: Indica a complexidade da tecnologia de um produto, por exemplo,
        básica, avançada
    teeth_material:
      name: Material do garfo
      description: Identifica o material utilizado nos dentes, geralmente para ferramentas
        de jardinagem; por exemplo, plástico, metal
    telephone_cable_interface:
      name: Interface de cabo telefônico
      description: Define o tipo de plugue usado em cabos telefônicos, como RJ-10
    telephone_cable_second_interface:
      name: Segunda interface do cabo telefônico
      description: Define o tipo de conector na extremidade oposta do cabo quando
        este difere da interface primária (p. ex., RJ45 para RJ11).
    telephone_cord_style:
      name: Estilo de cabo telefônico
      description: especifica a forma do cabo telefônico, ajudando o cliente a escolher
        entre cabo reto, espiralado ou especial para aparelhos de substituição e fixação
        em parede
    telephone_style:
      name: Estilo de telefone
      description: Define o design ou a estética de um telefone, por exemplo, vintage,
        moderna
    telescope_level:
      name: Nível do telescópio
      description: Indica a complexidade ou o nível de habilidade necessário para
        um telescópio, como iniciante ou avançado
    telescope_tracking_system:
      name: Sistema de rastreamento do telescópio
      description: Identifica o tipo de sistema de rastreamento em telescópios, por
        exemplo, manual, motorizado
    television_circuit_board_type:
      name: Tipo de placa de circuito da televisão
      description: Identifica a função da placa de circuito dentro de um aparelho
        de televisão (p. ex., placa principal, placa de fonte de alimentação, placa
        T-Con).
    television_shape:
      name: Formato da televisão
      description: Define o contorno físico da tela da televisão, como curvo ou plano
    television_speaker_position:
      name: Posição do alto-falante da televisão
      description: Identifica a localização física ou função do alto-falante dentro
        da montagem da TV (p. ex., esquerda, direita, centro, subwoofer).
    television_specialized_features:
      name: Recursos especializados da televisão
      description: Identifica recursos exclusivos de uma TV, como controle de voz
        ou barra de som integrada
    temperature:
      name: Temperatura
      description: Especifica as configurações de calor para dispositivos como pistolas
        de cola, por exemplo, dupla, alta
    temperature_control:
      name: Controladores de temperatura
      description: 'Define a possibilidade de ajuste de temperatura do produto, geralmente
        para aquecedores de mamadeiras; por exemplo, ajustável, predefinido '
    temperature_measurement:
      name: Medição de temperatura
      description: Indica se o produto mede em Fahrenheit ou Celsius
    template_type:
      name: Tipo de documento
      description: Especifica a categoria dos modelos de documentos, por exemplo,
        cartão de visita, folheto
    temple_color:
      name: Cor da têmpora
      description: Especifica a cor da haste dos óculos, como vermelho ou transparente
    temple_pattern:
      name: Padrão de templo
      description: Descreve o desenho ou motivo da lateral dos óculos, como logotipo
        ou xadrez
    tension:
      name: Tensão
      description: Descreve o nível de tensão das cordas para instrumentos musicais,
        por exemplo, extrapesada
    tensioning_system:
      name: Sistema de tensionamento
      description: Detalha o mecanismo usado para manter a superfície da tela plana
        e sem rugas.
    tent_setup_style:
      name: Estilo de montagem da barraca
      description: Indica como a barraca é montada ou instalada.
    tequila_variety:
      name: Variedade de tequila
      description: Especifica o tipo de tequila, por exemplo, dourada, envelhecida
    terminal_operation:
      name: Operação terminal
      description: Especifica o tipo de operação das caixas registradoras, como manual
        ou eletrônica
    termination_method:
      name: Método de terminação
      description: Especifica a técnica usada para conectar condutores aos contatos
        do conector (p. ex., crimpagem, solda, IDC).
    terrain:
      name: Terreno
      description: Especifica o tipo de piso para o qual um produto foi projetado,
        normalmente para equipamentos externos; por exemplo, montanha, rolamento
    test_format:
      name: Formato do teste
      description: Define o tipo de teste para produtos de saúde e beleza, por exemplo,
        digital, tira de teste
    test_method:
      name: Método de teste
      description: Define o procedimento para a realização de um exame médico, por
        exemplo, teste em casa, análise de laboratório
    test_sample:
      name: Amostra de teste
      description: Especifica o tipo de amostra necessária para exames médicos e de
        saúde, por exemplo, cotonete, saliva
    tetherball_equipment_included:
      name: Equipamento de espirobol incluído
      description: Indica a inclusão de itens essenciais em um conjunto de espirobol,
        como corda ou bola de espirobol
    tethering_policy:
      name: Política de compartilhamento
      description: Esclarece se o ponto de acesso móvel ou compartilhamento é permitido
        nos termos do plano eSIM.
    text_plate_material:
      name: Material da placa de texto
      description: Identifica o material da placa de texto em carimbos de escritório,
        como metal ou borracha
    textile_craft_machine_features:
      name: Características da máquina têxtil para artesanato
      description: Descreve características especiais de máquinas têxteis artesanais,
        como tensão ajustável ou portátil
    textile_craft_project_type:
      name: Tipo de projeto de artesanato têxtil
      description: Identifica o tipo de projeto de artesanato têxtil, como tricô ou
        patchwork
    texture:
      name: Textura
      description: Define a sensação ou consistência de um produto, como cremoso,
        fosco ou absorvente
    texture_level:
      name: Nível de textura
      description: Indica a suavidade ou aspereza de um produto, normalmente para
        papinhas; por exemplo, Nível 1 (purê), Nível 2 (picado)
    theme:
      name: Tema
      description: Descreve o tema ou motivo principal do produto, como esporte, espaço
        ou feriados
    therapeutic_features:
      name: Características terapêuticas
      description: Lista modalidades terapêuticas adicionais integradas à órtese cervical.
    therapeutic_swing_accessories_included:
      name: Acessórios de balanço terapêutico incluídos
      description: Lista equipamentos ou acessórios adicionais fornecidos com o balanço.
    therapy_mode_supported:
      name: Modo de terapia suportado
      description: Lista os algoritmos de terapia respiratória em que o dispositivo
        pode operar, além do APAP padrão.
    therapy_temperature_type:
      name: Tipo de temperatura de terapia
      description: Indica se o produto fornece terapia de calor, terapia de frio,
        ou ambos.
    thermal_detector_type:
      name: Tipo de detector térmico
      description: Indica a tecnologia utilizada para detecção térmica em dispositivos,
        como o detector de silício amorfo (a Si)
    thermal_sensation:
      name: Sensação térmica
      description: Descreve o efeito de temperatura percebido na pele após a aplicação.
    thermocouple_type:
      name: Tipo de termopar
      description: Indica a categoria de termopar em sensores, por exemplo, Tipo J,
        Tipo S
    thickness_type:
      name: Tipo de espessura
      description: Indica o nível de espessura de itens, como fino, médio ou grosso
    thinner_application:
      name: Aplicação do diluidor
      description: Descreve o tipo de substância para a qual um diluente é usado,
        como tinta ou epóxi
    thread_direction:
      name: Direção da rosca
      description: Identifica a direção da rosca em itens de ferragens, como lado
        esquerdo ou direito
    threaded_rod_size:
      name: Tamanho da haste roscada
      description: Especifica o diâmetro de uma haste roscada, por exemplo, M10, M20
    throw_pillow_shape:
      name: Formato da almofada
      description: Identifica a forma de almofadas decorativas, como rolo ou retangular
    thumb_grip_profile:
      name: Perfil da empunhadura
      description: Descreve o estilo de superfície ou forma do topo da empunhadura
        (p. ex., côncavo, abaulado), que afeta a aderência e sensação de controle.
    ticket_additional_features:
      name: Características adicionais do tíquete
      description: Destaca benefícios extras oferecidos com ingressos, como recepção
        ou atividades pós-evento
    ticket_class:
      name: Classe do bilhete
      description: Especifica o nível de serviço ou classe de assento fornecido com
        o bilhete.
    ticket_type:
      name: Tipo de bilhete
      description: Identifica a categoria dos ingressos do evento, como admissão geral
        ou assentos reservados
    tile_design:
      name: Formato do ladrilho
      description: Descreve o padrão ou estilo de um ladrilho, como geométrico ou
        espinha de peixe
    tile_game_type:
      name: Tipo de jogo de peças
      description: Identifica o tipo específico de jogo de peças, como dominó ou mahjong
    tile_installation_method:
      name: Método de instalação do bloco
      description: Descreve o modo de instalação do produto, normalmente azulejos
        de parede ou de teto; por exemplo, instalação de sobreposição
    tile_look:
      name: Aparência do ladrilho
      description: Descreve a aparência ou estilo de um ladrilho, como mármore ou
        3D
    tile_material:
      name: Material do bloco
      description: Identifica a composição de ladrilhos, como cerâmica ou pedra
    tile_texture:
      name: Textura do ladrilho
      description: Descreve a textura da superfície de um ladrilho, como liso ou texturizado
    time_period:
      name: Período de tempo
      description: Especifica o período relacionado a trabalhos ou estudos acadêmicos,
        como a revolução medieval ou industrial
    time_signatures:
      name: Tempo rítmico
      description: Define a estrutura rítmica, geralmente para metrônomos; por exemplo,
        4/4, 3/4
    time_weighting:
      name: Ponderação de tempo
      description: Usado para especificar a rapidez com que um medidor de som responde
        às flutuações do som, por exemplo, lento, rápido
    timepiece_features:
      name: Características do relógio
      description: Identifica características especiais de um relógio, por exemplo,
        duração ajustável ou iluminação
    timer_design:
      name: Formato do temporizador
      description: Descreve o tipo de temporizador usado em equipamentos de câmara
        escura, como digital ou analógico
    timer_features:
      name: Recursos do temporizador
      description: Descreve as funções especiais de um temporizador, como duração
        ajustável ou visor integrado
    timer_type:
      name: Tipo de temporizador
      description: Especifica a configuração de frequência para temporizadores, por
        exemplo, diariamente, semanalmente
    tingle_intensity:
      name: Intensidade do formigamento
      description: Descreve o nível de sensação de calor ou formigamento produzido
        pelo produto quando aplicado.
    tip_design:
      name: Design da ponta
      description: Especifica o tipo de ponta em agulhas e seringas médicas, como
        luer lock ou ponta deslizante
    tip_material:
      name: Material da ponta
      description: Especifica o material utilizado na ponta do produto, por exemplo,
        algodão, silicone
    tip_opening:
      name: Abertura da ponta
      description: Descreve a largura da abertura do bocal em instrumentos de sopro,
        como médio ou grande
    tip_style:
      name: Estilo de ponta
      description: Descreve o design da ponta do produto, por exemplo, angular, curva
    tip_type:
      name: Tipo de ponta
      description: Define o tipo de ponta das lanças para pesca, como formão ou abertura
        dupla
    tire_bead_type:
      name: Tipo de talão de pneu
      description: Especifica o tipo de talão em pneus de bicicleta, como dobrável
        ou rígido
    tobacco_type:
      name: Tipo de tabaco
      description: Especifica a variedade de tabaco, por exemplo, Turco, Virgínia
    toddler_bed_features:
      name: Características da cama infantil
      description: Descreve características especiais de camas infantis, como altura
        ajustável ou luz noturna embutida
    toe_spacer_design:
      name: Formato do separador de dedos
      description: Descreve o design dos separadores de dedos usados no cuidado com
        os pés, por exemplo, contornado, design de loop
    toe_strap_type:
      name: Tipo de correia firma pé
      description: Especifica o design da biqueira, normalmente para fixações de snowboard
        ou raquetes de neve; por exemplo, biqueira ou tradicional
    toe_style:
      name: Estilo de biqueira
      description: Define o formato ou desenho da biqueira de um sapato, como aberta
        ou pontiaguda
    toilet/bidet_mounting_type:
      name: Tipo de montagem no vaso sanitário/bidê
      description: Identifica como um vaso sanitário ou bidê é instalado, por exemplo,
        montado na parede ou no chão
    toilet_cover_design:
      name: Formato da capa de banheiro
      description: Descreve o formato das tampas dos vasos sanitários, como redondo
        ou alongado
    toilet_cover_features:
      name: Recursos da tampa do vaso sanitário
      description: Descreve as características especiais de uma tampa de vaso sanitário,
        como liberação rápida ou fechamento suave
    toilet_mounting_type:
      name: Tipo de montagem no vaso sanitário
      description: Especifica o método de instalação do vaso sanitário, por exemplo,
        montagem na parede, no chão
    toilet_shape:
      name: Formato do banheiro
      description: Descreve a forma de um vaso sanitário, como redondo ou retangular
    tom_tom_design:
      name: Formato do tom-tom
      description: Descreve o tipo de tom-tom, como de chão ou de suporte
    tonearm_type:
      name: Tipo de braço de leitura
      description: Descreve a geometria do braço de leitura, que influencia o desempenho
        de rastreamento e a usabilidade para DJs.
    tool/utensil_material:
      name: Material de ferramenta/utensílio
      description: Identifica o principal material utilizado em uma ferramenta ou
        utensílio, como aço inoxidável ou madeira de teca
    tool_key_tip:
      name: Ponta da chave de ferramenta
      description: Especifica o tipo de ponta da chave da ferramenta, como Phillips
        ou chave inglesa
    tool_mobility:
      name: Mobilidade de ferramentas
      description: Descreve se uma ferramenta tem fio ou não, normalmente para produtos
        odontológicos
    tool_operation:
      name: Operação da ferramenta
      description: Descreve como uma ferramenta é operada, como manualmente ou com
        energia
    toothbrush_head_size:
      name: Tamanho da cabeça da escova de dentes
      description: Define o tamanho relativo da cabeça de escovação para atender diferentes
        tamanhos de boca e necessidades de limpeza.
    toothbrush_head_type:
      name: Tipo de cabeça de escova de dentes
      description: Classifica o estilo funcional da cabeça (p. ex., clareamento, cuidado
        gengival, infantil).
    toothpaste_type:
      name: Tipo de pasta de dente
      description: Define a função específica da pasta de dente, como anticárie ou
        branqueamento
    toothpick_design:
      name: Formato do palito de dente
      description: Especifica o formato dos palitos de dente, como redondo ou plano
    top_color:
      name: Cor do tampo
      description: Define a cor primária da superfície de um produto, por exemplo,
        transparente, bronze
    top_length_type:
      name: Tipo de comprimento do top
      description: Define o comprimento de tops ou camisas, como cropped ou longo
    top_material:
      name: Material do tampo
      description: Define o material da superfície de um produto, por exemplo, madeira,
        vidro
    top_pattern:
      name: Padrão superior
      description: Descreve o desenho ou impressão na superfície de um produto, como
        floral ou listrado
    top_surface_material:
      name: Material da superfície de cima
      description: Especifica o material utilizado na superfície do produto, como
        aço inoxidável ou vidro cerâmico
    top_up_method:
      name: Método de recarga
      description: Especifica as formas pelas quais o cliente pode adicionar crédito
        ou renovar o plano no cartão pré-pago ou chip.
    tote_handle_type:
      name: Tipo de alça da sacola
      description: Identifica o estilo das alças de uma sacola, como curta ou longa
    totem_design:
      name: Design de totem
      description: Especifica o design dos totens de feiras comerciais, como unilaterais
        ou bilaterais
    touch_capabilities:
      name: Recursos de toque
      description: Indica o tipo de interação de toque que um eletrônico suporta,
        como simples ou duplo
    touchpad_form_factor:
      name: Formato do touchpad
      description: Define o estilo de instalação ou uso pretendido do touchpad.
    touchscreen_technology:
      name: Tecnologia de tela sensível ao toque
      description: Identifica a tecnologia de tela sensível ao toque para dispositivos
        interativos, como capacitivas ou resistivas
    touchscreen_wire_configuration:
      name: Configuração de fios da tela sensível ao toque
      description: Indica o número de fios ou linhas usados por digitalizadores resistivos,
        influenciando a compatibilidade com controladores.
    toy/game_material:
      name: Material de brinquedo/jogo
      description: Identifica o principal material utilizado em um brinquedo ou jogo,
        como plástico ou madeira
    toy_figure_features:
      name: Características do boneco
      description: Destaca características especiais de figuras de brinquedo, como
        articulações articuladas ou detalhes realistas
    toy_figure_theme:
      name: Tema do boneco
      description: Identifica o tema ou categoria de uma figura de brinquedo, como
        animal ou esporte
    toy_tool_type:
      name: Tipo de ferramenta de brinquedo
      description: Identifica o tipo de ferramenta de brinquedo em um conjunto, como
        uma furadeira ou um martelo
    track_configuration:
      name: Configuração de faixas
      description: Indica o formato de faixa de fita e canais que a máquina pode gravar
        ou reproduzir (p. ex., estéreo vs mono, número de faixas).
    tracker_form_factor:
      name: Fator de forma do rastreador
      description: Define o estilo físico e forma do hardware do rastreador.
    tracking_metrics:
      name: Métricas de rastreamento
      description: Especifica os dados de saúde e fitness monitorados pelo produto,
        por exemplo, sono, passos
    tracking_purpose:
      name: Objetivo de rastreamento
      description: Especifica o uso pretendido de rastreadores com GPS, como monitoramento
        de ativos ou monitoramento de animais de estimação
    tractor_accessories_included:
      name: Acessórios para trator incluídos
      description: Especifica recursos extras fornecidos com o trator, como kit de
        fertilização ou lâmina de neve
    trade_show_display_features:
      name: Recursos de exibição em feira de negócios
      description: Identifica características especiais de expositores de feiras comerciais,
        como tela sensível ao toque ou iluminação
    trading_card_packaging:
      name: Embalagem de cartão colecionável
      description: Identifica como os cartões colecionáveis são embalados, como em
        blister ou booster pack
    traffic_control_device_features:
      name: Recursos do dispositivo de controle de tráfego
      description: Identifica características únicas de itens de controle de tráfego,
        como empilháveis ou base ponderada
    trail_camera_design:
      name: Formato da câmera de trilha
      description: Descreve o tipo de câmera de monitoramento, como padrão ou celular
    trailer_type:
      name: Tipo de trailer
      description: Identifica o design ou estilo de um reboque de veículo motorizado,
        como aberto ou fechado
    training_data_requirements:
      name: Requisitos de dados de treinamento
      description: Identifica o tipo e a qualidade dos dados necessários para um treinamento
        eficaz em software de IA ou aprendizado de máquina, por exemplo, dados rotulados
    trampoline_design:
      name: Formato do trampolim
      description: Descreve a construção do trampolim, como sem molas ou com molas
        helicoidais
    transceiver_form_factor:
      name: Fator de forma do transceptor
      description: Define o padrão físico do módulo do transceptor de rede (p. ex.,
        SFP, QSFP28).
    transcriber/dictation_system_features:
      name: Recursos do sistema de transcrição/ditado
      description: Identifica características especiais de transcritores ou sistemas
        de ditado, como alimentado por IA ou redução de ruído
    transfer_aid_type:
      name: Tipo de auxílio de transferência
      description: Classifica o estilo de auxílio, distinguindo pranchas rígidas de
        lençóis flexíveis e colchões assistidos por ar.
    transfer_board_shape:
      name: Formato da prancha de transferência
      description: Define o perfil geométrico da prancha ou lençol, que influencia
        o caminho de transferência e compatibilidade com diferentes alturas de assento
        ou cama.
    transfer_boards_surface_type:
      name: Tipo de superfície de placas de transferência
      description: Especifica a textura da superfície das placas de transferência
        de mobilidade, por exemplo, acolchoadas, lisas
    transfer_paper_technique:
      name: Técnica de papel de transferência
      description: Identifica o método usado com para transferência de desenho no
        papel, como jato de tinta ou transferência a ferro
    transmission_type:
      name: Tipo de transmissão
      description: Identifica o tipo de transmissão em veículos ou peças, como manual
        ou automática
    transmitter_form_factor:
      name: Formato do transmissor
      description: Classifica o estilo físico ou habitação da unidade transmissora
        para ajudar quem compra a encontrar rapidamente a forma que se adequa à aplicação.
    transport_type:
      name: Tipo de transporte
      description: Especifica o modo de transporte público para o qual o bilhete ou
        passe é válido.
    trash_can_features:
      name: Recursos da lata de lixo
      description: Descreve características especiais de latas de lixo, como controle
        de odor ou pedal
    travel_pillow_features:
      name: Recursos do travesseiro de viagem
      description: Lista características funcionais especiais, acessórios ou melhorias
        de design do travesseiro de viagem.
    travel_pillow_shape:
      name: Formato do travesseiro de viagem
      description: 'Descreve o contorno físico dos travesseiros de viagem, como em
        forma de J '
    tray_compatibility:
      name: Compatibilidade da moldeira
      description: Identifica o estilo de moldeira clareadora ou protetor bucal para
        clareamento que o estojo é projetado para acomodar.
    treatment_area:
      name: Área de tratamento
      description: Especifica a parte do corpo à qual um produto se destina, normalmente
        para produtos de massagem; por exemplo, costas, pescoço
    treatment_method:
      name: Método de tratamento
      description: Descreve o mecanismo ou tecnologia de entrega que o produto usa
        para eliminar a lesão (p. ex., crioterapia, ácido químico, adesivo de microagulhas).
    treatment_modes:
      name: Modos de tratamento
      description: Lista os modos funcionais suportados pelo dispositivo (p. ex.,
        HR, SHR, SR).
    treatment_objective:
      name: Objetivo do tratamento
      description: Define o problema que o produto aborda, normalmente para itens
        de higiene pessoal; por exemplo, ronco, febre
    treatment_target_area:
      name: Área alvo do tratamento
      description: Indica se o produto é formulado para cílios, sobrancelhas, ou ambos.
    treatment_texture:
      name: Textura do tratamento
      description: Define a consistência de produtos de tratamento, como creme para
        assaduras; por exemplo, grosso, em pó
    treatment_type:
      name: Tipo de tratamento
      description: Especifica o método de tratamento, normalmente para tratamentos
        de queda de cabelo; por exemplo, laser, tópico
    tree_stand_material:
      name: Material de plataforma em árvore
      description: Especifica do que é feito um suporte de árvore, como plástico ou
        metal
    trellis_design:
      name: Formato da treliça
      description: Identifica o desenho da treliça em cercas ou barreiras, por exemplo,
        quadrada, diamante
    tricycle_design:
      name: Design de triciclo
      description: Descreve o estilo de um triciclo, como vertical ou reclinado
    tricycle_propulsion_type:
      name: Tipo de propulsão de triciclo
      description: Especifica como um triciclo é impulsionado, como empurrado ou dirigido
        pela frente
    trip_type:
      name: Tipo de mecanismo
      description: Especifica o tipo de disparo em um disjuntor, por exemplo, não
        intercambiável
    tripod/monopod_attachment_type:
      name: Tipo de acessório para tripé/monopé
      description: Especifica o tipo de conexão para acessórios de tripé ou monopé,
        como 3/8 ou universal
    tripod/monopod_head_type:
      name: Tipo de cabeça tripé/monopé
      description: Especifica o mecanismo das cabeças de tripé/monopé, como engrenadas
        ou gimbal
    tripod_handle_type:
      name: Tipo de alça de tripé
      description: Especifica a funcionalidade das alças de tripé, por exemplo, multifunção,
        empunhadura pistola
    trophy_design:
      name: Design do troféu
      description: Descreve o estilo ou formato específico de um troféu, como uma
        taça ou estrela
    truck_type:
      name: Tipo de caminhão
      description: Classifica o tipo de caminhão, como caminhão basculante ou caminhão
        plataforma
    tube_component:
      name: Componente do tubo
      description: Especifica o tipo de válvula em amplificadores de música, por exemplo,
        caixa, suporte
    tube_configuration:
      name: Configuração do tubo
      description: Descreve a disposição das válvulas em um amplificador de instrumento
        musical, como válvula única ou par combinado
    tuner_design:
      name: Design do afinador
      description: Descreve o estilo de afinadores eletrônicos para instrumentos musicais,
        como clip-on ou pedal
    tuner_type:
      name: Tipo de sintonizador
      description: Define o tipo de frequência de rádio recebida, como AM/FM ou rádio
        via satélite
    tuning_fork_design:
      name: Formato do diapasão
      description: Descreve o design específico de um diapasão, como ponderado ou
        não ponderado
    tuning_fork_frequency:
      name: Frequência do diapasão
      description: Especifica a frequência de um diapasão, como 128 Hz ou 256 Hz
    tuning_modes:
      name: Modos de sintonia
      description: Identifica as configurações específicas do instrumento para afinadores
        eletrônicos, como violão ou violino
    tuning_pitch:
      name: Afinação do tom
      description: Especifica a afinação de um instrumento, como C# ou Ab
    tuning_range:
      name: Faixa de sintonia
      description: Especifica a gama de opções de ajuste disponíveis, como padrão
        ou aberto
    tv_broadcast_standards_supported:
      name: Padrões de transmissão de TV suportados
      description: Lista os padrões específicos de transmissão de televisão ou cabo/satélite
        que a placa ou adaptador pode decodificar ou receber.
    uc_platform_certification:
      name: Certificação de plataforma UC
      description: Identifica as plataformas de comunicações unificadas ou de reuniões
        para as quais o dispositivo possui certificação oficial.
    ultrasound_probe_type:
      name: Tipo de sonda de ultrassom
      description: Identifica características de design da sonda fornecida com o monitor
        (p. ex., à prova d'água, interna).
    undershirt_style:
      name: Estilo de camiseta
      description: Descreve o design ou corte de uma camiseta, como gola redonda ou
        decote em V
    underwear_style:
      name: Estilo de roupa íntima
      description: Define o design e o corte de roupas íntimas, como tanga ou calcinha
        modeladora
    units_of_measurement:
      name: Unidades de medida
      description: Especifica o sistema de medição usado para o produto, por exemplo,
        milímetros (mm), Fahrenheit (°F)
    update_frequency:
      name: Frequência de atualização
      description: Indica a regularidade das atualizações de software ou dados, por
        exemplo, em tempo real, anualmente
    upholstery_color:
      name: Cor do estofamento
      description: Identifica a cor do estofamento de um produto, como vermelho ou
        bege
    upholstery_material:
      name: Material de estofamento
      description: Identifica o tecido utilizado para estofamento, como couro ou veludo
    upholstery_pattern:
      name: Padrão de estofamento
      description: Descreve o design visual do tecido dos móveis, por exemplo, listrado
        ou xadrez
    uplink_port_type:
      name: Tipo de porta de uplink
      description: Define o conector de uplink de velocidade mais alta presente no
        switch (p. ex., SFP+, QSFP28, 10GBase-T).
    ups_topology:
      name: Topologia do UPS
      description: Indica a abordagem de design interno que o UPS usa para condicionar
        e fornecer energia (p. ex., standby, line-interactive, online).
    urinal_mounting_type:
      name: Tipo de montagem de urinol
      description: Especifica como um mictório é instalado, como montado na parede
        ou no chão
    usage_conditions:
      name: Condições de uso
      description: Especifica se o produto é adequado para uso em condições secas
        ou úmidas, normalmente para aparelhos de barbear
    usage_environment:
      name: Ambiente de uso
      description: Especifica onde o produto de bronzeamento deve ser usado.
    usage_frequency:
      name: Frequência de uso
      description: Especifica a frequência recomendada de uso do produto, como diária
        ou semanal
    usage_type:
      name: Tipo de uso
      description: Especifica o ciclo de uso pretendido do produto, por exemplo, reutilizável,
        recarregável
    usb_connector_type:
      name: Tipo de conector USB
      description: Identifica os conectores USB físicos fornecidos no dispositivo
        para dados e/ou energia.
    usb_standard:
      name: Padrão USB
      description: Especifica a versão USB para dispositivos eletrônicos, como USB
        2.0 ou USB 3.1 geração 1
    user_type:
      name: Tipo de usuário
      description: Identifica o usuário pretendido de um produto de software, como
        um indivíduo ou uma pequena empresa
    utility/maintenance_task_type:
      name: Tipo de tarefa de utilidade/manutenção
      description: Categoriza a tarefa executada por um software, como limpeza de
        disco ou otimizador de sistema
    uv_blocking_class:
      name: Classe de bloqueio UV
      description: Indica o nível de proteção UV incorporado na lente de contato conforme
        definido por padrões ISO.
    uv_protection:
      name: Proteção UV
      description: Especifica a capacidade do produto de bloquear os raios UV, normalmente
        para óculos de sol; por exemplo, UV400
    uva_protection_grade:
      name: Grau de proteção UVA
      description: Indica a classificação de proteção UVA do produto, geralmente expressa
        em graus PA.
    vacuum_air_filtering_technology:
      name: Tecnologia de filtragem de ar a vácuo
      description: Especifica o tipo de filtragem de ar usado em aspiradores de pó,
        como HEPA ou PET
    valve_type:
      name: Tipo de válvula
      description: Especifica o tipo de válvula em peças de bicicleta, por exemplo,
        Presta, Schrader
    van_type:
      name: Tipo de van
      description: Distingue entre diferentes tipos de vans, como van de passageiros
        ou van de conversão
    vaping_style:
      name: Estilo de vaporizador
      description: 'Especifica a técnica de vaporização para cigarros eletrônicos,
        por exemplo, direto ao pulmão, boca a pulmão '
    varnish/finish_application:
      name: Aplicação de verniz/acabamento
      description: Especifica as áreas de aplicação adequadas para um verniz ou acabamento,
        como paredes ou portas
    vase_shape:
      name: Formato do vaso
      description: Descreve a forma geométrica ou orgânica de um vaso, como redondo
        ou garrafa
    vcr_configuration:
      name: Configuração do videocassete
      description: Identifica se a unidade é um videocassete independente ou um dispositivo
        combo com unidades ou sintonizadores adicionais.
    vdi_protocol_support:
      name: Suporte ao protocolo VDI
      description: Especifica os protocolos de infraestrutura de Desktop Virtual (VDI)
        suportados, por exemplo, PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Recursos de alarme/trava do veículo
      description: Especifica as características exclusivas dos sistemas de segurança
        do veículo, por exemplo, partida remota ou resistência às intempéries
    vehicle_application_area:
      name: Área de aplicação do veículo
      description: Especifica a parte de um veículo à qual o produto se aplica, como
        estofamento ou exterior
    vehicle_audio_system_features:
      name: Recursos do sistema de áudio do veículo
      description: Identifica recursos especiais do sistema de áudio de um veículo,
        como reforço de graves ou visor LED
    vehicle_braking_features:
      name: Recursos de frenagem do veículo
      description: Descreve as características específicas das peças de freio do veículo,
        como resistentes à corrosão ou perfuradas
    vehicle_cleaning_item_features:
      name: Recursos do item de limpeza de veículos
      description: Destaca os benefícios dos itens de limpeza de veículos, como maior
        eficiência de combustível ou alto brilho
    vehicle_decor_features:
      name: Recursos de decoração de veículos
      description: Descreve as características dos itens de decoração do veículo,
        como resistente a UV ou à prova d’água
    vehicle_drive/handling_features:
      name: Recursos de direção/manuseio do veículo
      description: Descreve as características das peças de veículos automotores,
        geralmente em transmissão, trem de transmissão, sistemas de reboque e rodas;
        por exemplo, alto desempenho, resistente ao calor
    vehicle_engine/part_features:
      name: Características do motor/peça do veículo
      description: Indica as características exclusivas das peças do motor de veículos
        motorizados, como economia de combustível ou melhoria de desempenho
    vehicle_engine_features:
      name: Características do motor do veículo
      description: Descreve características específicas do motor de um veículo, como
        alto desempenho ou economia de combustível
    vehicle_exhaust_type:
      name: Tipo de escapamento do veículo
      description: Identifica o tipo de sistema de escapamento de um veículo, como
        eixo traseiro ou turbo traseiro
    vehicle_features:
      name: Características do veículo
      description: Descreve características ou equipamentos especiais de um veículo,
        como bancos aquecidos ou sistema de navegação
    vehicle_floor_configuration:
      name: Configuração do piso do veículo
      description: Especifica o design e o layout do piso de um veículo de transporte
        urbano, como piso baixo ou semibaixo
    vehicle_fluid_features:
      name: Recursos de fluido do veículo
      description: Descreve propriedades especiais de fluidos veiculares, como anticongelante
        ou biodegradável
    vehicle_fluid_type:
      name: Tipo de fluido do veículo
      description: Identifica o tipo de fluido utilizado na manutenção do veículo,
        como concentrado ou pré-diluído
    vehicle_frame/body_features:
      name: Características da estrutura/carroceria do veículo
      description: Descreve características especiais de peças da carroceria do veículo,
        como acabamento pintado ou cromado
    vehicle_mirror_design:
      name: Design de espelho de veículo
      description: Especifica as características de design dos espelhos retrovisores
        de veículos motorizados, como extensíveis ou dobráveis
    vehicle_mirror_features:
      name: Recursos do espelho do veículo
      description: Descreve recursos especiais de espelhos de veículos, como escurecimento
        automático ou aquecimento
    vehicle_mirror_type:
      name: Tipo de espelho do veículo
      description: Identifica o tipo específico de espelho em um veículo, como retrovisor
        ou retrovisor lateral
    vehicle_mounting_location:
      name: Localização de montagem no veículo
      description: Especifica a área em um veículo onde o suporte deve ser instalado.
    vehicle_oil_features:
      name: Características do óleo veicular
      description: Descreve propriedades exclusivas do óleo de motor, como proteção
        contra desgaste ou alta eficiência de filtragem
    vehicle_paint_type:
      name: Tipo de pintura do veículo
      description: Especifica a categoria de pintura do veículo, como kit de pintura
        ou pintura para carroceria de veículo motorizado
    vehicle_placement:
      name: Colocação de veículo
      description: Especifica onde o produto pode ser colocado na bicicleta, por exemplo,
        quadro, dianteira
    vehicle_seating_features:
      name: Características dos assentos do veículo
      description: Descreve as características especiais dos assentos de veículos,
        como aquecimento ou reclinação
    vehicle_suspension_features:
      name: Recursos de suspensão do veículo
      description: Especifica os recursos exclusivos das peças da suspensão do veículo,
        como ajustável ou hidráulica
    vehicle_tire_type:
      name: Tipo de pneu do veículo
      description: Especifica a adequação sazonal ou ao terreno dos pneus dos veículos,
        como inverno ou todo-terreno
    vehicle_type:
      name: Tipo de veículo
      description: Classifica o tipo de veículo, por exemplo, SUV ou veleiro
    ventilation_type:
      name: Tipo de ventilação
      description: Descreve o estilo primário de ventilação ou recursos de fluxo de
        ar do gabinete que gerenciam a temperatura interna.
    verification_technology:
      name: Tecnologia de verificação
      description: Identifica a tecnologia usada em verificadores de cédulas, como
        magnética ou infravermelha
    vesa_mounting_pattern:
      name: Padrão de montagem VESA
      description: Define o espaçamento dos furos VESA na parte traseira do monitor,
        garantindo compatibilidade com suportes, braços e bases.
    vg/pg_ratio:
      name: Relação VG/PG
      description: Indica a proporção de glicerina vegetal para propilenoglicol em
        e-liquids, por exemplo, 30:70
    video_codecs/formats_supported:
      name: Codecs/formatos de vídeo com suporte
      description: Define os codecs e formatos de vídeo com os quais um dispositivo
        é compatível, como MP4 ou H.264
    video_game_content_features:
      name: Recursos de conteúdo de videogame
      description: Identifica recursos especiais de software de videogame, por exemplo,
        conteúdo para download (DLC), acesso antecipado
    video_game_format:
      name: Formato do videogame
      description: Especifica o método de entrega e o tipo de mídia para videogames,
        como digital ou físico.
    video_game_genre:
      name: Gênero do videogame
      description: Classifica o tipo de videogame, como familiar ou de sobrevivência
    video_game_platform:
      name: Plataforma de videogame
      description: Especifica a plataforma com a qual um videogame é compatível, como
        PC ou PlayStation 5
    video_game_sub_genre:
      name: Subgênero do videogame
      description: Identifica a subcategoria específica de um videogame, como MMORPG
        ou batalha real
    video_port_type:
      name: Tipo de porta de vídeo
      description: Especifica o tipo de porta de vídeo que um produto suporta, por
        exemplo, HDMI, display port
    video_recorder_type:
      name: Tipo de gravador de vídeo
      description: Especifica a tecnologia de gravação fundamental do dispositivo
        (p. ex., DVR, NVR, XVR).
    video_region_code:
      name: Código de região do vídeo
      description: Define a compatibilidade regional de reprodutores de DVD e Blu-ray,
        como sem região ou região 1
    video_resolution_supported:
      name: Resolução de vídeo suportada
      description: Define a clareza ou qualidade de vídeo compatível com um dispositivo,
        como 1080p ou ultra HD
    video_signal_standard:
      name: Padrão de sinal de vídeo
      description: Especifica o(s) padrão(ões) de transmissão de vídeo analógico suportado(s)
        pelo dispositivo (p. ex., NTSC, PAL, SECAM).
    viewing_area_height:
      name: Altura da área de visualização
      description: Especifica a altura da área de visualização em produtos como capacetes
        de soldagem, por exemplo, médio, grande
    viewing_area_width:
      name: Largura da área de visualização
      description: Especifica a largura da área de visualização em produtos como capacetes
        de soldagem, por exemplo, médio, grande
    vinegar_drink_variety:
      name: Variedade de bebida de vinagre
      description: Especifica o tipo de bebida à base de vinagre, por exemplo, kombucha,
        shrub
    vinegar_variety:
      name: Variedade de vinagre
      description: Distingue entre diferentes tipos de vinagre, por exemplo, fruta,
        balsâmico
    viscosity:
      name: Viscosidade
      description: Especifica a resistência ao fluxo de óleos de motor, como 10W-40
        ou 15W-50
    vision_correction_type:
      name: Tipo de correção visual
      description: Indica o design ótico destinado a corrigir condições específicas
        de visão.
    visual_effect:
      name: Efeito visual
      description: Define as características visuais de um produto, normalmente para
        esmaltes artísticos; por exemplo, salpicado, texturizado
    voice_recorder_form_factor:
      name: Formato do gravador de voz
      description: Descreve o estilo físico ou disfarce do gravador para que a clientela
        possa escolher o design que se adapta a cada caso de uso.
    voip_protocol_support:
      name: Suporte ao protocolo VoIP
      description: Especifica os protocolos Voice over Internet Protocol (VoIP) que
        um dispositivo pode suportar, como SIP ou IAX
    wader_type:
      name: Tipo de pernalta
      description: Define o estilo específico de botas para caça, como até a cintura
        ou o quadril
    waist_rise:
      name: Altura da cintura
      description: Indica a altura da cintura da peça, como baixa, média ou alta
    walker_brake_type:
      name: Tipo de freio do andador
      description: Descreve o mecanismo de frenagem incorporado no andador.
    walker_seat_type:
      name: Tipo de assento do andador
      description: Identifica se o andador inclui um assento e qual seu estilo.
    walker_type:
      name: Tipo de andador
      description: Classifica o estilo estrutural e uso pretendido do andador.
    walking_aid_tip_type:
      name: Tipo de ponteira de auxílio de caminhada
      description: Descreve o design e os recursos da ponteira da bengala.
    wall_material:
      name: Materiais de parede
      description: Identifica o material utilizado na parede do produto, normalmente
        em saunas; por exemplo, cedro
    wall_patching_application:
      name: Aplicação de remendo de parede
      description: Identifica a superfície adequada para um composto de remendo, como
        madeira ou gesso
    wall_plate_style:
      name: Estilo de tomada
      description: Descreve o design de placas ou tampas de parede, convencionais
        ou sem parafusos
    wallet_features:
      name: Recursos da carteira
      description: Descreve características especiais de carteiras, como proteção
        RFID ou design compacto
    wallpaper_application_method:
      name: Método de aplicação do papel de parede
      description: Define o método de aplicação do papel de parede, por exemplo, descascar
        e colar ou exige cola
    wallpaper_theme:
      name: Tema do papel de parede
      description: Identifica o tema ou estilo principal de um papel de parede de
        área de trabalho, como natureza ou abstrato
    wan_interface_type:
      name: Tipo de interface WAN
      description: Especifica o tipo de conexão física usada para o uplink WAN/Internet
        do roteador (p. ex., Ethernet, fibra, DSL, celular).
    warning_category:
      name: Categoria de aviso
      description: Classifica a categoria de sinais de segurança, como proibição,
        advertência
    washer/dryer_features:
      name: Características da lavadora/secadora
      description: Destaca características exclusivas de aparelhos de lavanderia,
        por exemplo, trava de segurança para crianças e autolimpante
    washer_form:
      name: Formato da arruela
      description: Descreve o tipo específico de arruela em acessórios de ferragens,
        como plana ou de mola
    washing_machine_features:
      name: Características da máquina de lavar
      description: Identifica funções especiais de uma máquina de lavar, como bloqueio
        para crianças ou temporizador de início adiado
    washing_method:
      name: Método de lavagem
      description: 'Especifica o processo de limpeza recomendado para um produto,
        por exemplo, lavagem à mão, lavagem à máquina '
    washing_programs:
      name: Programas de lavagem
      description: Define os diferentes ciclos de lavagem que uma máquina de lavar
        oferece, como lavagem a frio ou delicada
    waste_bag_features:
      name: Características do saco de lixo
      description: Descreve características especiais de sacos para resíduos de animais
        de estimação, como biodegradáveis ou à prova de vazamentos
    waste_bag_material:
      name: Material do saco de lixo
      description: Identifica o material dos sacos de lixo, como plástico ou materiais
        biodegradáveis
    watch/band_material:
      name: Material do relógio/pulseira
      description: Especifica o tipo de material de pulseiras de relógio, por exemplo,
        nylon ou silicone
    watch_accessory_style:
      name: Estilo de acessório de relógio
      description: Define o estilo dos acessórios do relógio, por exemplo, esportivo,
        moderno
    watch_display:
      name: Visor do relógio
      description: Distingue entre mostradores de relógio, como digitais ou analógicos
    watch_features:
      name: Características do relógio
      description: Identifica características especiais de um relógio, como movimento
        automático ou ponteiros luminosos
    watch_material:
      name: Material do relógio
      description: Especifica o tipo de material usado no relógio, como titânio ou
        silicone
    water_filter_application:
      name: Aplicação de filtro de água
      description: Identifica o uso pretendido de um filtro de água, normalmente para
        eletrodomésticos; por exemplo, máquina de café, máquina de gelo
    water_flosser_modes:
