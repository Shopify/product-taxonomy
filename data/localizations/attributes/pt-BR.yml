    file_format_type:
      name: Tipo de formato de arquivo
      description: Especifica o formato dos arquivos digitais, por exemplo, GIF, PDF
    file_shape:
      name: Formato do arquivo
      description: Descreve o formato de lixas para pés, como contornadas ou ovais
    filler_material:
      name: Material de enchimento
      description: Identifica o tipo de material utilizado no enchimento de um produto,
        normalmente travesseiros ou almofadas; por exemplo, espuma viscoelástica,
        penas
    filler_support:
      name: Suporte de funil
      description: Especifica o nível de firmeza ou estilo da parte interna de um
        travesseiro, como espuma macia ou viscoelástica
    filler_type:
      name: Tipo de funil
      description: Especifica o tipo de massa usada na manutenção do veículo, como
        fibra de vidro ou massa leve
    filling/padding_project_type:
      name: Tipo de projeto de preenchimento/estofamento
      description: Especifica o uso pretendido do material de enchimento, por exemplo,
        fabricação de brinquedos de pelúcia
    film_application_method:
      name: Método de aplicação de filme
      description: Especifica como as películas para janelas são aplicadas, por exemplo,
        aderência estática, autoadesiva
    film_format:
      name: Formato de filme
      description: Especifica o tipo de filme usado em câmeras, como 35 mm ou Instax
