    strap_wearing_style:
      name: Estilo de uso da alça
      description: Identifica como a alça deve ser usada ou transportada.
    straw/stirrer_design:
      name: Formato do canudo/agitador
      description: Descreve o design ou estilo de um canudo ou mexedor, como reto
        ou flexível
    stretcher/gurney_intended_use:
      name: Uso pretendido da maca/alongador
      description: Identifica a finalidade específica de macas ou macas médicas, como
        ambulância ou ressonância magnética
    string_color:
      name: Cor da corda
      description: Identifica a cor das cordas em arcos e arco e flechas, como transparente
    string_instrument_size:
      name: Tamanho do instrumento de corda
      description: Indica o tamanho de um instrumento de cordas, como 3/4 ou tamanho
        inteiro
    string_material:
      name: Material da corda
      description: Identifica o material usado na corda de tiro com arco, como Dacron
        ou fastflight
    string_pattern:
      name: Padrão da corda
      description: Descreve o design da corda de tiro com arco, como listrada
    strip/patch_technology:
      name: Tecnologia de fita/adesivo
      description: Descreve o material ou tecnologia primária usada para a fita ou
        adesivo de poros.
    stripper_application:
      name: Aplicação do decapante
      description: Especifica o revestimento ou material adesivo que um produto foi
        projetado para remover ou dissolver, por exemplo, epóxi, tinta
    stroller_features:
      name: Recursos do carrinho
      description: Identifica características específicas de um carrinho, como design
        dobrável ou rodas traváveis
    stroller_wheel_type:
      name: Tipo de roda do carrinho de bebê
      description: Define o tipo de rodas de um carrinho, como todo-terreno ou giratórias
    style:
      name: Estilo
      description: Descreve o estilo de um produto, normalmente para cortinas; por
        exemplo, cortinas verticais, persianas plissadas
    stylus_holder_type:
      name: Tipo de suporte para stylus
      description: Indica se a capa fornece armazenamento para uma stylus e qual é
        sua forma armazenamento.
    stylus_support:
      name: Suporte para caneta stylus
      description: Indica se o leitor eletrônico é compatível com caneta stylus digital
        para anotações e se ela está incluída.
    stylus_support_type:
      name: Tipo de suporte para stylus
      description: Descreve se e como o tablet suporta canetas de entrada (p. ex.,
        digitalizador ativo, capacitivo passivo).
    stylus_technology:
      name: Tecnologia da caneta stylus
      description: Define a tecnologia subjacente ou método de alimentação usado pela
        caneta stylus.
    stylus_type:
      name: Tipo Stylus
      description: Especifica o formato da agulha em acessórios para toca-discos,
        como cônico ou elíptico
    subject_area:
      name: Área da matéria
      description: Identifica a área temática de trabalhos ou estudos acadêmicos,
        como ciências ou artea
    subscription_type:
      name: Tipo de assinatura
      description: Especifica o tipo de assinatura, normalmente para dispositivos
        móveis; por exemplo, pagamento conforme o uso, pré-pago
    subsonic_filter:
      name: Filtro subsônico
      description: Especifica se a unidade inclui um filtro subsônico ou de distorção
        para remover ruídos de baixa frequência causados por discos deformados.
    substrate_features:
      name: Recursos do substrato
      description: Descreve as características dos substratos do aquário, como crescimento
        de bactérias benéficas ou pré-lavados
    subwoofer_configuration:
      name: Configuração do subwoofer
      description: Indica se um subwoofer está incluído e se é integrado, com fio
        ou sem fio.
    suction_cup_color:
      name: Cor da ventosa
      description: Identifica a cor da ventosa, como preto ou azul
    suction_cup_material:
      name: Material da ventosa
      description: Identifica o material utilizado na ventosa, como borracha ou silicone
    suction_cup_pattern:
      name: Padrão da ventosa
      description: Descreve o desenho ou motivo na ventosa de desentupidores, como
        florais, geométricos
    suction_levels:
      name: Níveis de sucção
      description: Indica a força de sucção de bombas tira leite, como ajustável ou
        fixa
    suitable_for_angling_type:
      name: Adequado para tipo de pesca
      description: Especifica o tipo de pesca para a qual o produto foi projetado,
        como alto mar ou com mosca
    suitable_for_animal_type:
      name: Adequado para tipo de animal
      description: Identifica o tipo de animal para o qual o produto foi desenvolvido,
        como cavalo ou cabra
    suitable_for_art_technique:
      name: Adequado para técnica artística
      description: Especifica os métodos artísticos para os quais um produto de papel
        é adequado, como pintura em aquarela
    suitable_for_bird_type:
      name: Adequado para tipo de pássaro
      description: Faz a correspondência entre os produtos e espécies específicas
        de aves, por exemplo, canário, papagaio
    suitable_for_boat_type:
      name: Adequado para o tipo de barco
      description: Identifica o tipo de recipiente para o qual o produto foi projetado,
        como garrafa ou lata
    suitable_for_body/facial_hair:
      name: Adequado para pelos corporais/faciais
      description: Identifica se um produto é adequado para pelos corporais ou faciais
    suitable_for_breed_size:
      name: Adequado para o tamanho da raça
      description: Identifica o tamanho de raça apropriado para produtos para animais
        de estimação, como grandes ou médios
    suitable_for_bug_type:
      name: Adequado para o tipo de inseto
      description: Especifica quais insetos o produto repele, por exemplo, mosquitos,
        carrapatos
    suitable_for_camera/optics_device:
      name: Adequado para câmera/dispositivo óptico
      description: Identifica a câmera ou dispositivo óptico específico com o qual
        o produto é compatível, por exemplo, câmera digital, bastão de selfie
    suitable_for_camera_type:
      name: Adequado para tipo de câmera
      description: Identifica os modelos de câmera com os quais o produto é compatível,
        como SLR ou filmadora
    suitable_for_camping_activity:
      name: Adequado para atividades de acampamento
      description: Especifica a compatibilidade com atividades específicas de acampamento,
        normalmente para barracas; por exemplo, praia, mochila
    suitable_for_chair_type:
      name: Adequado para tipo de cadeira
      description: Especifica os tipos de cadeira para os quais o produto foi projetado,
        como banco ou banquinho
    suitable_for_container_type:
      name: Adequado para o tipo de contêiner
      description: Identifica o tipo de recipiente para o qual o produto foi projetado,
        como garrafa ou lata
    suitable_for_crafting_material:
      name: Adequado para confecção de materiais
      description: Especifica os materiais de artesanato compatíveis com um produto,
        como metal ou vidro
    suitable_for_door_type:
      name: Adequado para tipo porta
      description: Identifica o tipo de porta para a qual o produto foi projetado,
        por exemplo, folha dupla, folha simples
    suitable_for_egg_type:
      name: Adequado para o tipo de ovo
      description: Identifica o tipo de ovos que uma incubadora pode acomodar, como
        galinha ou pato
    suitable_for_fabric_type:
      name: Adequado para tipo tecido
      description: Identifica o tipo de tecido para o qual um produto é adequado,
        como tecido sintético ou natural
    suitable_for_fire_class:
      name: Adequada para classe de incêndio
      description: Indica quais classes de incêndio o produto pode extinguir, por
        exemplo, A, D
    suitable_for_fish_type:
      name: Adequado para tipo de peixe
      description: Especifica o tipo de peixe ao qual um produto se destina, por exemplo,
        peixes de lagoa, peixes tropicais
    suitable_for_food_processor_type:
      name: Adequado para tipo de processador de alimentos
      description: Identifica o tipo de processador de alimentos para o qual o produto
        foi projetado, como mixer
    suitable_for_furniture_type:
      name: Adequado para tipo de mobiliário
      description: Identifica o tipo de móvel para o qual o produto foi projetado,
        normalmente para capas de sofás; por exemplo, universal, chaise longue
    suitable_for_gas_type:
      name: Adequado para tipo de gás
      description: Identifica o tipo de gás com o qual um produto é compatível, como
        propano ou etanol
    suitable_for_hair_type:
      name: Adequado para tipo de cabelo
      description: Especifica as necessidades do cabelo para as quais um produto foi
        criado, por exemplo, cacheado, fino
    suitable_for_material_type:
      name: Adequado para tipo de material
      description: Identifica o material para o qual um produto é adequado, normalmente
        para ferramentas; por exemplo, cerâmica, pedra
    suitable_for_pest_type:
      name: Adequado para tipo de praga
      description: Identifica as espécies de pragas que o produto ataca, por exemplo,
        ratos, vírus
    suitable_for_pipe_type:
      name: Adequado para tipo de tubo
      description: Identifica o tipo de tubo com o qual uma ferramenta pode ser usada,
        como PVC ou cobre
    suitable_for_pool_type:
      name: Adequado para tipo de piscina
      description: Especifica o tipo de piscina para a qual o produto foi projetado,
        por exemplo, inflável, acima do solo
    suitable_for_power_equipment_type:
      name: Adequado para o tipo de equipamento de energia
      description: Identifica o tipo de equipamento elétrico externo para o qual o
