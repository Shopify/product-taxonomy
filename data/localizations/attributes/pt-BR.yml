    end_design:
      name: Design da ponta
      description: Especifica o número de pontas funcionais e se são substituíveis
        ou intercambiáveis.
    enema_device_type:
      name: Tipo de dispositivo de enema
      description: Classifica o design primário ou sistema de entrega do produto.
    enema_nozzle_type:
      name: Tipo de bico do enema
      description: Especifica o estilo ou material do bico ou ponta fornecido com
        o kit (p. ex., ponta fina, ponta pediátrica, bico de aço inoxidável).
    energy_efficiency_class:
      name: Classe de eficiência energética
      description: Define a classificação de eficiência energética de um produto,
        por exemplo, A+++
    energy_efficiency_class_hdr:
      name: Classe de eficiência energética (Hdr)
      description: Especifica a eficiência energética de dispositivos habilitados
        para HDR, normalmente televisores; por exemplo, A+++
    energy_efficiency_class_sdr:
      name: Classe de eficiência energética (Sdr)
      description: Especifica a eficiência energética de dispositivos habilitados
        para SDR, normalmente televisores; por exemplo, A+++
    engine_design:
      name: Formato do motor
      description: Descreve a configuração do motor de um veículo, por exemplo, 2
        tempos
    engine_purpose:
      name: Finalidade do motor
      description: Identifica o uso pretendido de um motor pequeno, como cortador
        de grama ou motosserra
    engine_type:
      name: Tipo de motor
      description: Identifica o tipo de motor em um veículo ou peça, como elétrico
        ou a diesel
    engraving:
      name: Gravação
      description: Detalha o tipo de gravação em um produto, como texto personalizado
        ou gravação de logotipo
    entry_orientation:
      name: Orientação de entrada
      description: Descreve a direção em que as moedas são inseridas no mecanismo
        (p. ex., frente, topo, lado, fundo).
    envelope_features:
      name: Características do envelope
      description: Descreve as características especiais de envelopes, como fecho
