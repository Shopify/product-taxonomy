    exercise_equipment_included:
      name: Equipamento de exercício incluído
      description: Identifica os itens específicos para exercício físico incluídos
        em um conjunto, como tapete de ioga ou halteres
    exercise_equipment_material:
      name: Material de equipamento de exercício
      description: Identifica o principal material utilizado em equipamentos de fitness,
