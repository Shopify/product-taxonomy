    eyewear_lens_color:
      name: Cor das lentes dos óculos
      description: Identifica a cor da lente dos óculos, como transparente ou laranja
    eyewear_lens_material:
      name: Material das lentes dos óculos
      description: Especifica o tipo de material de lentes de óculos, por exemplo,
        plástico de alto índice ou vidro
    eyewear_lens_pattern:
      name: Padrão das lentes dos óculos
      description: Descreve o design ou impressão nas lentes dos óculos, como corações
        ou paisley
    eyewear_strap_features:
      name: Recursos do cordão de óculos
      description: Destaca características funcionais notáveis do cordão ou corrente
