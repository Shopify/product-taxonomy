    gray_coverage_level:
      name: Nível de cobertura dos fios brancos
      description: Indica a porcentagem ou o grau de fios brancos/grisalhos que o
        produto pode cobrir ou disfarçar.
    grease_filter_material:
      name: Material do filtro de gordura
      description: Especifica o material utilizado no filtro de gordura de um produto,
        por exemplo, metal, aço inoxidável
    grind_size:
      name: Tamanho da moagem
      description: Indica a espessura do pó de café, como extragrosso ou fino
    grip_or_holder_style:
      name: Estilo de empunhadura ou suporte
      description: Identifica a forma física principal do produto, ajudando os clientes
        a filtrar rapidamente por seu design preferido.
    grip_texture:
      name: Textura de aderência
      description: Descreve a sensação de toque na superfície da empunhadura de um
        produto, como liso ou texturizado
    grip_type:
      name: Tipo de aperto
      description: Define o estilo de gancho do equipamento de esgrima, por exemplo,
        francês, pistola
    grit_type:
      name: Tipo de grade
      description: Especifica o nível de granulação de ferramentas ou produtos odontológicos,
        como grosso ou ultrafino
    grooming_kit_format:
      name: Formato do kit de higiene
      description: Especifica o tipo de embalagem dos kits de higiene, por exemplo,
        saco ou caixa de kit
    guitar_fitting/part_type:
      name: Montagem/tipo de peça de guitarra
      description: Especifica o tipo de peça ou acessório da guitarra, como um protetor
        ou afinador
    guitar_size:
      name: Tamanho da guitarra
      description: Especifica o tamanho do violão, como tamanho completo ou tamanho
        3/4
    gutter_fitting_type:
      name: Tipo de encaixe de calha
      description: Identifica o tipo de acessório usado em sistemas de calhas, como
        um conector de calha ou tampa final
    gutter_style:
      name: Estilo da calha
      description: Especifica o tipo de calha, como profunda ou industrial
    habitat_material:
      name: Material do habitat
      description: Identifica o principal material de ambientes para animais de estimação,
        como acrílico ou madeira
    hair_care_effect:
      name: Efeito de cuidados capilares
      description: Define os benefícios ou resultados primários que o shampoo é formulado
        para entregar.
    hair_care_finish:
      name: Acabamento para cuidados com os cabelos
      description: Define a aparência ou textura final do cabelo após o uso, por exemplo,
        brilhante, fosco
    hair_care_items_included:
      name: Itens de cuidados com os cabelos incluídos
      description: Especifica os tipos de itens de cuidado capilar incluídos em um
        conjunto, como sérum capilar ou máscara capilar
    hair_care_technology:
      name: Tecnologia de cuidado com os cabelos
      description: Define a tecnologia usada em produtos de cuidados com os cabelos,
        por exemplo, vapor, termólise
    hair_color:
      name: Tom do cabelo
      description: Identifica a cor ou tonalidade de produtos para os cabelos, como
        loiro ou castanho-escuro
    hair_color_formulation:
      name: Formulação de cor de cabelo
      description: Indica a longevidade ou tipo funcional do efeito de cor do produto
        (p. ex., tintura permanente, tonalizante, retoque de raiz).
    hair_concealer_fiber_material:
      name: Material de fibra do corretivo capilar
      description: Especifica o material primário das fibras ou pós de construção
        do produto.
    hair_dryer_motor_type:
      name: Tipo de motor do secador de cabelo
      description: Especifica o tipo de motor usado no secador de cabelo, impactando
        durabilidade, nível de ruído e potência do fluxo de ar.
    hair_dye_type_removed:
      name: Tipo de tintura capilar removida
      description: Especifica quais tipos de tintura capilar que o produto foi projetado
        para remover (p. ex., permanente, henna).
    hair_loss_type:
      name: Tipo de perda de cabelo
      description: Organiza os produtos com base no tipo de queda de cabelo, por exemplo,
        alopecia areata, calvície masculina
    hair_oil_application:
      name: Aplicação de óleo capilar
      description: Especifica como o óleo capilar deve ser usado ou aplicado.
    hair_oil_effect:
      name: Efeito do óleo capilar
      description: Indica os benefícios ou resultados primários proporcionados pelo
        óleo capilar.
    hair_shear_type:
      name: Tipo de tesoura de cabelo
      description: Define o estilo da tesoura usada nos cuidados com os cabelos, por
        exemplo, texturização, desbaste
    hair_styling_benefits:
      name: Benefícios de estilização do cabelo
      description: Destaca os principais benefícios de desempenho ou efeitos que o
        produto proporciona ao cabelo.
    hair_styling_items_included:
      name: Itens de penteado incluídos
      description: Identifica as ferramentas de modelagem de cabelo incluídas em um
        conjunto, como um modelador de cabelo ou uma escova de cabelo
    hair_styling_tool_features:
      name: Características de utensílios de penteado
      description: Identifica as características especiais de ferramentas de modelagem
        de cabelo, como termostato ajustável ou desligamento automático
    hair_treatment_effect:
      name: Efeito do tratamento capilar
      description: Especifica o(s) benefício(s) primário(s) entregue(s) pelo sérum
        capilar.
    hair_type:
      name: Tipo de cabelo
      description: Classifica produtos com base em tipos ou condições específicas
        de cabelo, como cacheado ou seco
    hammer_head_material:
      name: Material da cabeça do martelo
      description: Identifica a composição da cabeça de um martelo, como aço ou fibra
        de vidro
    hand_side:
      name: Lado da mão
      description: Especifica o tipo de lateralidade para o qual um produto foi projetado,
        por exemplo, canhoto, ambos os lados
    hand_soap_features:
      name: Recursos do sabonete para mãos
      description: Destaca características ou benefícios especiais do sabonete em
        pó para mãos.
    hand_warmer_type:
      name: Tipo de aquecedor de mãos
      description: Identifica o tipo de aquecedor para mãos, como ativado por ar ou
        alimentado por bateria
    handcuff_lock_type:
      name: Tipo de trava da algema
      description: Identifica o mecanismo de travamento de algemas, como chave ou
        trava dupla
    handle_color:
      name: Cor da maçaneta
      description: Especifica a cor da alça de um produto, como preta ou azul
    handle_design:
      name: Formato da alça
      description: Descreve o estilo do cabo de uma ferramenta, como reto ou pistola
    handle_grip_texture:
      name: Textura da alça
      description: Define a sensação da superfície do cabo de um produto, como com
        nervuras ou lisa
    handle_material:
      name: Material do cabo
      description: Especifica o material utilizado no cabo do produto, como bambu
        ou plástico
    handle_pattern:
      name: Padrão de alça
      description: Descreve o desenho ou motivo na alça de um produto, como floral
        ou geométrico
    handle_style:
      name: Estilo de empunhadura
      description: Define o design ou forma da empunhadura da bengala, influenciando
        conforto da pegada, ergonomia e estética.
    handle_type:
      name: Tipo de puxador
      description: Especifica o comprimento ou a presença de uma alça em um produto,
        por exemplo, curta, sem alça
    handset_type:
      name: Tipo de aparelho
      description: Define o fone de telefones, como com ou sem fio
    handwear_features:
      name: Características de luvas
      description: Descreve as características especiais de luvas ou mitenes, como
        fecho ajustável ou aderência aprimorada
    handwear_material:
      name: Material de luvas
      description: Descreve o tipo de material de luvas ou mitenes, como pele sintética
        ou lã
    handwear_type:
      name: Tipo de luvas
      description: Classifica o tipo de proteção para as mãos, por exemplo, luvas
        sem dedos, luvas para neve
    hanging_chair_design:
      name: Design de cadeira suspensa
      description: Especifica se uma cadeira suspensa vem com suporte ou não
    haptic_feedback_type:
      name: Tipo de feedback háptico
      description: Descreve o tipo de feedback tátil ou de movimento que o controle
        fornece.
    hard_cider_variety:
      name: Variedade de cidra com álcool
      description: Especifica o perfil de sabor da sidra com álcool, por exemplo,
        forte, doce
    hard_drive_features:
      name: Recursos do disco rígido
      description: Identifica os recursos especiais de um disco rígido, como alimentado
        por IA ou à prova de choque
    hard_drive_form_factor:
      name: Formato do disco rígido
      description: Especifica o tamanho físico de um disco rígido, por exemplo, 2,5
        polegadas, 3,5 polegadas
    hard_drive_installation:
      name: Instalação do disco rígido
      description: Identifica a localização de um disco rígido em componentes eletrônicos,
        como interno ou externo
    hardhat_class:
      name: Classe de capacete
      description: Identifica a classificação de segurança de capacetes, por exemplo,
        C (condutor), E (elétrico);
    hardness:
      name: Dureza
      description: Indica a firmeza de um produto, por exemplo, macio, médio, rígido
    hardness_rating_pencil_scale:
      name: Classificação de dureza (escala de lápis)
      description: Especifica a dureza do vidro temperado com base na escala de dureza
        de lápis.
    hardware_finish:
      name: Acabamento de ferragens
      description: Descreve o tratamento da superfície ou revestimento de equipamentos,
        como latão ou cromo
    hardware_material:
      name: Materiais de hardware
      description: Especifica a composição de equipamentos, como metal ou aço inoxidável
    hardware_mounting_type:
      name: Tipo de montagem de hardware
      description: Identifica o modo de instalação ou posicionamento de um equipamento,
        por exemplo, montado na parede, sem suporte
    hardwood_lumber_grade:
      name: Classe de madeira de lei
      description: Classifica a qualidade da madeira serrada, por exemplo, N.º 2A
        comum
    harness_closure_type:
      name: Tipo de fecho do arnês
      description: Especifica o tipo de fecho usado nos arneses, como fivela de liberação
        lateral ou zíper
    harp_size:
      name: Tamanho da harpa
      description: Especifica a categoria de tamanho de uma harpa, por exemplo, petite,
        concert grand
    hatch_suitable_location:
      name: Local adequado para escotilha
      description: Identifica o posicionamento ideal de alçapões, como piso ou parede
    hazmat_suit_design:
      name: Formato do traje antiperigo
      description: Descreve o estilo de vestimentas de proteção contra materiais perigosos,
        como macacão ou encapsulado
    hdmi_version_supported:
      name: Versão HDMI suportada
      description: Especifica a versão mais alta da especificação HDMI que o dispositivo
        suporta totalmente (p. ex., HDMI 2.1 para 4K @ 120 Hz).
    hdr_format:
      name: Formato HDR
      description: Especifica o High Dynamic Range (HDR) para televisores, por exemplo,
        HDR10, Dolby Vision
    headjoint_cut:
      name: Corte da embocadura
      description: Especifica o orifício na cabeça de flautas, por exemplo, onda,
        em Z
    headphone_cushion_shape:
      name: Formato da almofada do fone de ouvido
      description: Descreve o contorno físico da almofada para ajudar os clientes
        a combinar a geometria do fone de ouvido.
    headphone_driver_technology:
      name: Tecnologia de driver de fone de ouvido
      description: Define o tipo de transdutor usado para criar som nos fones de ouvido.
    headphone_jack_type:
      name: Tipo de entrada para fone de ouvido
      description: Especifica o tipo e o tamanho da entrada para fone de ouvido, como
        3,5 mm, USB tipo C
    headphone_style:
      name: Estilo de fone de ouvido
      description: Define o design dos fones de ouvido, por exemplo, atrás do pescoço,
        fones de ouvido
    headset_connection_type:
      name: Tipo de conexão do fone de ouvido
      description: Especifica as interfaces disponíveis para conectar fones de ouvido
        externos ao telefone.
    headwear_features:
      name: Características do chapéu
      description: Destaca as características exclusivas de chapéus e acessórios para
        a cabeça, por exemplo, dobráveis, versáteis
    hearing_aid_compatibility:
      name: Compatibilidade com aparelho auditivo
      description: Especifica se o telefone atende aos requisitos de compatibilidade
        com aparelho auditivo (HAC) e, se aplicável, o nível de classificação.
    hearing_aid_ear_side:
      name: Lado da orelha do aparelho auditivo
      description: Especifica se o aparelho auditivo é projetado para a orelha esquerda,
        orelha direita, ou ambas as orelhas.
    hearing_aid_features:
      name: Características do aparelho auditivo
      description: Destaca as características especiais dos aparelhos auditivos, como
        bateria recarregável ou digital
    hearing_aid_material:
      name: Materiais de aparelhos auditivos
      description: Identifica o principal material da fabricação de aparelhos auditivos,
        como plástico ou silicone
    hearing_loss_level:
      name: Nível de perda auditiva
      description: Especifica o grau de perda auditiva que o aparelho auditivo é projetado
        para tratar.
    hearing_protection_class:
      name: Classe de proteção auditiva
      description: Especifica a classe de certificação local que indica desempenho
        de atenuação de acordo com padrões regionais.
    heat_function:
      name: Função de aquecimento
      description: Indica se um produto tem recurso de aquecimento, normalmente para
        itens de cuidados pessoais
    heat_level:
      name: Nível de aquecimento
      description: Indica o nível de picante de alimentos e bebidas, como leve ou
        forte
    heat_settings:
      name: Configurações do aquecimento
      description: Especifica os níveis de controle de temperatura de um produto,
        por exemplo, baixo, médio, alto
    heat_source:
      name: Fonte de calor
      description: Especifica o tipo de fonte de calor em almofadas de aquecimento,
        por exemplo, micro-ondas, gel térmico
    heat_therapy_type:
      name: Tipo de terapia de calor
      description: Indica se o produto fornece calor úmido, calor seco, ou ambos.
    heating_instructions:
      name: Instruções de aquecimento
      description: Especifica como aquecer adequadamente o produto, por exemplo, forno,
        fogão
    heating_method:
      name: Método de aquecimento
      description: Especifica a técnica usada para aquecer, normalmente para aquecedores
        de mamadeiras; por exemplo, vapor, banho-maria
    heating_pad_design:
      name: Design da almofada térmica
      description: Especifica o estilo físico ou formato da almofada térmica.
    heating_pad_features:
      name: Características da almofada térmica
      description: Destaca características funcionais ou de conveniência especiais
        incorporadas à almofada térmica.
    heating_speed:
      name: Velocidade de aquecimento
      description: Indica a velocidade de aquecimento de um produto, por exemplo,
        rápida, lenta
    heel_height_type:
      name: Tipo de altura do salto
      description: Define a altura do salto de um sapato, como baixo ou alto
    heel_shoe_type:
      name: Tipo de sapato de salto
      description: Identifica o estilo do salto de um sapato, como salto plataforma
        ou salto cunha
    height_adjustment:
      name: Ajuste de altura
      description: Especifica se é possível alterar a altura de um produto, por exemplo,
        altura fixa, altura ajustável
    helicobacter_pylori_detection_method:
      name: Método de detecção de Helicobacter pylori
      description: Identifica o princípio biológico ou abordagem que o kit usa para
        detectar infecção por Helicobacter pylori.
    helmet_shade_design:
      name: Design formato capacete
      description: Descreve o tipo de mecanismo de sombra em capacetes para soldagem,
        como escurecimento fixo ou automático
    herbal_supplement_health_goal:
      name: Objetivo de saúde do suplemento herbal
      description: Indica o objetivo primário de bem-estar, sistema corporal ou área
        fisiológica que o suplemento herbal pretende apoiar (p. ex., suporte imunológico,
        alívio do estresse, suporte hepático e desintoxicação).
    hitch_class:
      name: Aula de reboque
      description: Identifica a capacidade de reboque do engate de um veículo, como
        Classe I ou Classe II
    hitch_type:
      name: Tipo de engate
      description: Especifica o método de montagem de trailers para bicicletas, como
        fixados no eixo ou no tubo do selim
    hiv_test_generation:
      name: Geração do teste de HIV
      description: Indica a geração do teste diagnóstico de HIV, refletindo melhorias
        na sensibilidade e janela de detecção.
    hockey_equipment_included:
      name: Equipamento de hóquei incluído
      description: Especifica os itens em um conjunto de equipamentos de lacrosse,
        como taco de lacrosse ou ombreiras
    hold_level:
      name: Manter nível
      description: Define a potência dos produtos de penteado, por exemplo, leves,
        fortes
    hole_plating_type:
      name: Tipo de metalização de furos
      description: Indica se os furos da placa são não metalizados, metalizados ou
        apresentam barris de via, o que impacta a soldagem e a conectividade entre
        camadas.
    hook_design:
      name: Formato do gancho
      description: Identifica o design de ganchos, fivelas e fechos, por exemplo,
        mola, extremidade dupla
    hook_grip_design:
      name: Formato do punho do gancho
      description: Descreve o estilo de aderência de agulhas de crochê, como antideslizante
        ou ergonômico
    hook_size:
      name: Tamanho do gancho
      description: Identifica o tamanho das agulhas de crochê, como B, G ou I
    hook_type:
      name: Tipo de gancho
      description: Identifica o estilo de ganchos para barco, como fixo ou telescópico
    hoop_shape:
      name: Tamanho do gancho
      description: Descreve o formato de um item com argola, normalmente redes de
        pesca; por exemplo, em forma de D
    horse_category:
      name: Categoria do cavalo
      description: Classifica os equipamentos para cavalos com base no tamanho e na
        raça do cavalo, por exemplo, pônei, padrão
    horse_grooming_accessories_included:
      name: Acessórios para cuidar de cavalos incluídos
      description: Identifica os itens adicionais incluídos nos produtos de cuidados
        com cavalos, como lâminas ou estojo de transporte
    hose_material:
      name: Material da mangueira
      description: Especifica o tipo de material de mangueiras, como PVC ou alumínio
    host_interface:
      name: Interface de host
      description: Especifica o método usado para conectar discos rígidos, como Thunderbolt
        3 ou SATA
    housing_color:
      name: Cor da caixa
      description: Identifica a cor do invólucro externo de um produto, como bege
        ou transparente
    housing_material:
      name: Material de construção
      description: Especifica o material utilizado na camada externa do produto, por
        exemplo, aço inoxidável, madeira
    housing_pattern:
      name: Padrão do gabinete
      description: Descreve o design ou motivo no exterior de um produto, como abstrato
        ou logotipo
    hub/switch_storage_options:
      name: Opções de armazenamento de hub/switch
      description: Identifica os recursos de armazenamento de hubs ou switches, como
        empilháveis ou não empilháveis
    humidification_system:
      name: Sistema de umidificação
      description: Descreve o tipo de opção de umidificação incluída ou compatível
        com o aparelho de PAP.
    humidifier_design:
      name: Design do umidificador
      description: Descreve o estilo de um umidificador, por exemplo, acoplável ou
        portátil
    humidity_control:
      name: Controle de umidade
      description: Indica a capacidade do produto de regular os níveis de umidade,
        normalmente para umidificadores de charuto; por exemplo, 0,65
    humidity_control_method:
      name: Método de controle de umidade
      description: Especifica o tipo de regulação de umidade em dispositivos, por
        exemplo, semiautomático, manual
    hunting/survival_knife_design:
      name: Design de faca de caça/sobrevivência
      description: Identifica o design de uma faca de caça/sobrevivência, como ponta
        de lança ou ponta tanto
    hunting_blind_design:
      name: Design de cabana de caça
      description: Especifica o tipo de design da persiana de caça, por exemplo, sem
        tela, transparente unidirecional
    hvac_control_type:
      name: Tipo de controle HVAC
      description: Identifica o tipo de controle de HVAC, como digital ou manual
    ice_pack_type:
      name: Tipo de bolsa de gelo
      description: Especifica o material ou a tecnologia usada em uma bolsa de gelo,
        por exemplo, pacote de gel, pacote de espuma
    icon_type:
      name: Tipo de ícone
      description: Especifica o tipo de ícone do computador, como pasta ou redes sociais
    identity_verification_requirement:
      name: Requisito de verificação de identidade
      description: Especifica se o registro com nome real ou verificação de identidade
        eKYC é necessária antes que o SIM ou eSIM possa ser usado.
    ignition_system:
      name: Sistema de ignição
      description: Identifica o tipo de sistema de ignição de geradores, como manual
        ou eletrônico
    illumination_technique:
      name: Técnica de iluminação
      description: Identifica o método de iluminação de microscópios, como campo claro
        ou campo escuro
    image_formats_supported:
      name: Formatos de imagem com suporte
      description: Identifica os tipos de arquivos de imagem que uma câmera pode gerar,
        como JPEG ou RAW
    image_sensor_size:
      name: Tamanho do sensor de imagem
      description: Indica o tamanho do sensor de imagem em câmeras, como 1/1,7 ou
        quadro completo
    immobilizer_type:
      name: Tipo de imobilizador
      description: Especifica o tipo de dispositivo para evitar roubo de veículos,
        por exemplo, trava de pneu ou trava de volante
    incense_fragrance:
      name: Fragrância do incenso
      description: Identifica o aroma de um produto de incenso, como lavanda ou sândalo
    incense_kit_items_included:
      name: Itens incluídos no kit de incenso
      description: Identifica os elementos de um kit de fabricação de incenso, por
        exemplo, varetas de bambu, moldes
    incense_type:
      name: Tipo de incenso
      description: Identifica a forma do incenso, como cone ou vareta
    incontinence_aid_features:
      name: Recursos de auxílio à incontinência
      description: Descreve as características especiais de produtos para incontinência,
        como antivazamentos ou hipoalergênicos
    incontinence_pad_type:
      name: Tipo de absorvente para incontinência
      description: Define o estilo ou forma específica do absorvente (p. ex., protetor,
        guarda, absorvente auxiliar).
    inductance_tolerance:
      name: Tolerância de indutância
      description: Define o desvio percentual permitido do valor nominal de indutância.
    industry_focus:
      name: Foco na indústria
      description: Destaca os setores-alvo de um produto, como educação ou fabricação
    infant_age_group:
      name: Faixa etária da criança
      description: Classifica produtos adequados para faixas etárias específicas de
        bebês, por exemplo, recém-nascidos, 0-6 meses
    inflation_method:
      name: Método de insuflação
      description: Identifica como um produto é inflado, como automático ou hidrostático
    ingredient_category:
      name: Categoria de ingrediente
      description: Classifica o tipo de ingredientes em vitaminas e suplementos, por
        exemplo, fibras, ervas
    ingredient_origin:
      name: Origem do ingrediente
      description: Especifica a origem dos ingredientes do produto, por exemplo, natural,
        sintético
    ingredient_pathway:
      name: Caminho do ingrediente
      description: Indica se os ingredientes de perfumaria são obtidos naturalmente
        por separação física da biomassa, sem alteração química, ou sintetizados por
        outros métodos
    ingredients:
      name: Ingredientes
      description: Especifica os componentes utilizados na formulação de um produto,
        por exemplo, óxido de zinco, aloe vera
    ingress_protection_ip_rating:
      name: Classificação de proteção (IP)
      description: 'Indica o nível oficial de resistência à água e poeira da capa,
        conforme o padrão IP (ex.: IP68).'
    ink_application_technique:
      name: Técnica de aplicação de tinta
      description: Descreve o método para aplicar tinta em obras de artesanato, como
        serigrafia
    ink_color:
      name: Cor da tinta
      description: Identifica a cor da tinta, normalmente para material de escritório;
        por exemplo, preto, prata
    ink_form:
      name: Formulação da tinta
      description: Descreve a embalagem ou o meio de fornecimento da tinta, como caneta
        ou frasco
    ink_pattern:
      name: Padrão de pintura
      description: Identifica o tema visual de canetas ou carimbos, por exemplo, geométrico,
        natalino
    ink_type:
      name: Tipo de tinta
      description: Identifica o tipo de tinta usada no produto, como à base de solvente
        ou corante
    inline_skating_style:
      name: Estilo de patins inline
      description: Define o estilo específico de patinação inline para o qual o produto
        foi projetado, como patinação inline recreativa ou de velocidade
    input/output_ports:
      name: Portas de entrada/saída
      description: Identifica os tipos de portas disponíveis no dispositivo, como
        USB ou conector de saída
    input_connection:
      name: Conexão de entrada
      description: Especifica o tipo de conexão de entrada para cabos de áudio, como
        3,5 mm ou RCA
    input_connection_type:
      name: Tipo de conexão de entrada
      description: Especifica o conector ou padrão de interface aceito no lado de
        entrada do conversor.
    input_signal_interface:
      name: Interface do sinal de entrada
      description: Especifica o(s) tipo(s) de conexão(ões) de entrada que o conversor
        de áudio aceita.
    input_video_interface:
      name: Interface de vídeo de entrada
      description: Especifica o(s) tipo(s) de conector de vídeo aceito(s) como entrada
        pelo conversor de varredura
    insole_length_type:
      name: Tipo de comprimento da palmilha
      description: Define a cobertura ou estilo de comprimento da palmilha.
    installation_accessories_included:
      name: Acessórios de instalação incluídos
      description: Identifica quaisquer ferramentas ou materiais instrucionais incluídos
        com a bateria para auxiliar na instalação
    installation_tools_included:
      name: Ferramentas de instalação incluídas
      description: Lista quaisquer ferramentas ou consumíveis incluídos com a peça
        para auxiliar na instalação.
    instruction_set_architecture:
      name: Arquitetura do conjunto de instruções
      description: Define a arquitetura do computador que um processador pode entender,
        por exemplo, 32 bits
    instrument/accessory_finish:
      name: Acabamento do instrumento/acessório
      description: Descreve o tratamento da superfície ou a cor de um instrumento
        musical ou acessório, como folheado a ouro ou laqueado
    instrument_accessory_material:
      name: Material dos acessórios do instrumento
      description: Identifica o material de acessórios de instrumentos musicais, como
        madeira ou latão
    instrument_bow_material:
      name: Material do arco do instrumento
      description: Identifica o material de fabricação do arco de um instrumento musical,
        como fibra de carbono ou pau-brasil
    instrument_color:
      name: Cor do instrumento
      description: Identifica a cor de um instrumento musical, como preto ou prata
    instrument_controller_type:
      name: Tipo de controlador de instrumento
      description: Identifica o instrumento musical simulado por um controlador de
        jogo, como guitarra ou microfone
    instrument_material:
      name: Material do instrumento
      description: Identifica o principal material de fabricação de um instrumento
        musical, como madeira maple ou latão
    instrument_part_material:
      name: Material das peças do instrumento
      description: Especifica o tipo de material de peças de instrumentos, como madeira
        de ébano ou folheado a ouro
    instrument_pattern:
      name: Padrão do instrumento
      description: Descreve o design visual ou motivo de um instrumento musical, como
        sólido ou textura
    instrument_string_color:
      name: Cor das cordas do instrumento
      description: Identifica a cor das cordas de instrumentos musicais, como dourado
        ou prateado
    instrument_string_material:
      name: Material das cordas do instrumento
      description: Especifica a composição das cordas de instrumentos musicais, como
        bronze ou fluorcarbono
    instrument_string_pattern:
      name: Padrão de cordas do instrumento
      description: Indica o padrão nas cordas da guitarra, como sólido ou geométrico
    instrument_support_type:
      name: Tipo de suporte do instrumento
      description: Identifica o tipo de suporte usado para um instrumento musical,
        como uma alça de pescoço ou suporte para partitura
    insulation_material:
      name: Material isolante
      description: Especifica a composição do isolamento, como lã mineral ou poliuretano
        (PU)
    integrated_led_lighting:
      name: Iluminação LED integrada
      description: Indica se o alto-falante incorpora iluminação LED ou RGB integrada
        e seu tipo.
    integrated_power/charging_options:
      name: Opções integradas de energia/carregamento
      description: Especifica se o suporte inclui tomadas elétricas embutidas e/ou
        portas de carregamento USB, aumentando a utilidade para dispositivos conectados.
    integrated_stand_type:
      name: Tipo de suporte integrado
      description: Descreve o estilo do suporte ou mecanismo de apoio embutido na
        capa.
    intended_application:
      name: Aplicação pretendida
      description: Identifica o uso específico de tintas e corantes, por exemplo,
        portas, deques/cercas
    intended_effect:
      name: Efeito pretendido
      description: Descreve o benefício primário de bem-estar que o suplemento de
        CBD é comercializado para oferecer.
    intended_jewelry_type:
      name: Tipo de joia pretendida
      description: Indica quais tipos de joias o suporte é projetado para segurar
        ou exibir.
    intended_surface:
      name: Superfície pretendida
      description: Identifica a superfície primária que o absorvente é projetado para
        proteger.
    intercom_communication_type:
      name: Tipo de comunicação do interfone
      description: Classifica o formato fundamental de comunicação que a unidade suporta.
    intercom_wiring_type:
      name: Tipo de fiação do interfone
      description: Especifica o esquema de fiação ou comunicação para o qual uma unidade
        de alto-falante de interfone é projetada.
    interface_type:
      name: Tipo de interface
      description: Identifica o tipo de conexão do produto, como Bluetooth ou USB
    interior_lining_material:
      name: Material do forro interno
      description: Identifica o material primário que reveste o interior da caixa
        de joias, protegendo-as de arranhões e desgaste.
    interior_texture:
      name: Textura interna
      description: Define o padrão de superfície interno que ajuda a criar espuma
        dentro da tigela ou caneca.
    internal_drive_form_factor_supported:
      name: Fator de forma de unidade interna com suporte
      description: Indica os tamanhos de disco rígido compatíveis com um dispositivo,
        por exemplo, 2,5 polegadas
    internet_radio_form_factor:
      name: Fator de forma do rádio de internet
      description: Define o estilo físico ou orientação de montagem do rádio de internet.
    intimate_apparel_features:
      name: Características de roupas íntimas
      description: Descreve as características especiais de roupas íntimas, como design
        respirável ou ajuste confortável
    inverter_type:
      name: Tipo de inversor
      description: Identifica o tipo de inversor em peças de VE, como onda senoidal
        pura ou onda quadrada
    invitation_personalization_design:
      name: Formato da personalização de convite
      description: Define as características de um convite, por exemplo, confirmação
        de presença incluída, personalizável
    ironing_features:
      name: Recursos para passar a ferro
      description: Especifica os recursos especiais de um ferro ou sistema de passar
        roupa, por exemplo, desligamento automático, jato de vapor
    item_condition:
      name: Condição do item
      description: Indica a qualidade de um item, normalmente veículos ou peças de
        veículos; por exemplo, usado certificado, remodelado
    item_material:
      name: Material do item
      description: Especifica a substância primária de um item, normalmente para peças
        e acessórios de veículos; por exemplo, cobre, fibra de vidro
    item_style:
      name: Estilo do item
      description: Descreve o tema estético ou de design de um produto, como moderno
        ou rústico
    j_cup_type:
      name: Suporte em formato de J
      description: Define o estilo dos J-cups em equipamentos de levantamento de peso,
        por exemplo, planos, sanduíches
    jaw_advancement_adjustability:
      name: Ajustabilidade do avanço mandibular
      description: Indica se e como a posição da mandíbula inferior fornecida pelo
        dispositivo pode ser ajustada pelo usuário.
    jaw_material:
      name: Material da mandíbula
      description: Identifica o material usado na mandíbula de uma ferramenta, como
        aço ou titânio
    jewelry_cleaning_accessories_included:
      name: Acessórios de limpeza de joias incluídos
      description: Lista quaisquer ferramentas ou acessórios extras fornecidos com
        o limpador (p. ex., escovas, bandejas, panos de polimento).
    jewelry_cleaning_purpose:
      name: Propósito de limpeza de joias
      description: Identifica a função principal do produto de limpeza (p. ex., remoção
        de oxidação, polimento, revestimento protetor).
    jewelry_finding_type:
      name: Tipo de elo para joias
      description: Identifica o componente específico usado na fabricação de joias,
        como uma tampa de conta ou um anel de salto
    jewelry_material:
      name: Material de joias
      description: Identifica o principal material de joias, como ouro ou esmalte
    jewelry_project_type:
      name: Tipo de projeto de joias
      description: Especifica o tipo de projeto de joias, como colar ou fios
    jewelry_set_type:
      name: Tipo de conjunto de joias
      description: Identifica o tipo de joia em um kit de fabricação de joias, como
        anel ou colar
    jewelry_steam_cleaner_features:
      name: Características do limpador a vapor de joias
      description: Lista características ou funções de segurança de destaque incorporadas
        que diferenciam modelos.
    jewelry_type:
      name: Tipos de joias
      description: Distingue entre tipos de joias, como joias finas ou de imitação
    joint_connection:
      name: Conexão por junta
      description: Especifica a conexão de juntas em tacos de bilhar, por exemplo,
        composto, sem junta
    joint_face_type:
      name: Tipo de superfície da junta
      description: Especifica o tipo de face de junta em tacos de bilhar, como completo
        ou pilotado
    joint_style:
      name: Estilo conjunto
      description: Define o tipo de junta usada nos tacos de bilhar, como uni-loc
        ou radial
    journey_type:
      name: Tipo de viagem
      description: Especifica o tipo de viagem coberta pela passagem, com base na
        quantidade de trechos e no sentido do deslocamento.
    joystick_mounting_style:
      name: Estilo de montagem do joystick
      description: Indica como o conjunto do joystick é fixado a um painel de controle
        ou gabinete.
    joystick_sensor_technology:
      name: Tecnologia de sensor do joystick
      description: Identifica a tecnologia de sensor primária usada para detectar
        movimento ou posição.
    jump_rope_design:
      name: Design de corda de pular
      description: Descreve o tipo de corda de pular, como normal ou inteligente
    jumping_surface_color:
      name: Cor da superfície de salto
      description: Identifica a cor da superfície de salto do trampolim, como azul
        ou preto
    jumping_surface_material:
      name: Material da superfície de salto
      description: Especifica o tecido da área de salto do trampolim, por exemplo,
        sintético, polipropileno
    jumping_surface_pattern:
      name: Padrão da superfície de salto
      description: Identifica o desenho ou impressão na superfície de salto de um
        trampolim, como estrelas ou listras
    karaoke_modes:
      name: Modos de karaokê
      description: Especifica o tipo de apresentação de karaokê, como solo ou dueto
    kerosene_application:
      name: Aplicação de querosene
      description: Identifica o uso específico de querosene, como para aquecedores
        ou combustível de aviação
    key_purpose:
      name: Objetivo principal
      description: Especifica a finalidade de uso de uma chave ou chave em branco,
        por exemplo, porta, cadeado
    keyboard_action:
      name: Ação do teclado
      description: Especifica a sensação de toque das teclas do piano, como teclas
        ponderadas ou ação de martelo
    keyboard_assembly_type:
      name: Tipo de montagem do teclado
      description: Define a montagem física fornecida (p. ex., teclado independente,
        apoio de pulso com teclado, conjunto de teclas individuais).
    keyboard_backlight_type:
      name: Tipo de iluminação do teclado
      description: Detalha a tecnologia ou estilo de iluminação usado para as teclas
        ou gabinete do teclado.
    keyboard_format:
      name: Formato do teclado
      description: Define o tamanho e o layout de um teclado, como tamanho normal
        ou compacto
    keyboard_key_type:
      name: Tipo de tecla do teclado
      description: Descreve a resposta ou sensação de toque das teclas em teclados
        musicais, como ponderado ou semiponderado
    keyboard_language:
      name: Idioma do teclado
      description: Especifica o layout do idioma de um teclado, como ENG (Inglês)
        ou DEU (Alemão)
    keyboard_layout:
      name: Layout do teclado
      description: Especifica a disposição das teclas de um teclado, por exemplo,
        QWERTY, Workman
    keyboard_mounting_style:
      name: Estilo de montagem do teclado
      description: Define o método de montagem interna da placa que afeta o som e
        a sensação de teclados mecânicos.
    keyboard_port_type:
      name: Tipo de porta do teclado
      description: Especifica o tipo de porta para conectividade do teclado, como
        USB tipo C
    keyboard_specialized_features:
      name: Recursos especializados do teclado
      description: Identifica as características exclusivas de um teclado, como ângulo
        ajustável ou retroiluminação
    keyboard_switch_type:
      name: Tipo de chave de teclado
      description: Especifica o estilo de resposta do teclado, como tátil ou clicável
    keyboard_type:
      name: Tipo de teclado
      description: Especifica o design e a funcionalidade de um teclado, por exemplo,
        padrão, retroiluminado
    keycap_legend_printing_method:
      name: Método de impressão das legendas das teclas
      description: Descreve como as legendas são aplicadas às teclas, impactando longevidade
        e aparência.
    keycap_material:
      name: Material das teclas
      description: Indica o material primário ou processo de fabricação das teclas,
        impactando durabilidade, textura e legendas.
    keycap_profile:
      name: Perfil das teclas
      description: Especifica o perfil ou a família de formato das teclas, que influencia
        a sensação de digitação e a estética do teclado.
    keypad_style:
      name: Estilo do teclado
      description: Define o método de entrada de teclados, como digital ou alfanumérico
    keystone_correction_type:
      name: Tipo de correção keystone
      description: Descreve o tipo de correção keystone ou geométrica que o projetor
        suporta para eliminar distorção trapezoidal (p. ex., vertical manual, automático
        de quatro pontos).
    kiln_features:
      name: Características do forno
      description: Especifica as capacidades funcionais e características de design
        do forno.
    kiln_loading_style:
      name: Estilo de carregamento do forno
      description: Especifica o método pelo qual os itens são colocados e removidos
        da câmara do forno.
    kit_construction_type:
      name: Tipo de kit de construção
      description: Especifica o tecido da área de salto de um trampolim, por exemplo,
        sintético, polipropileno
    kitchen/dining_furniture_items_included:
      name: Móveis de cozinha/jantar incluídos
      description: Identifica as peças de mobiliário específicas incluídas num conjunto,
        como cadeiras de jantar ou ilha de cozinha
    kitchen_utensil_items_included:
      name: Utensílios de cozinha incluídos
      description: Identifica as ferramentas incluídas em um conjunto de utensílios
        de cozinha, como batedeira ou pinça
    kitesurfing_style:
      name: Estilo de kitesurf
      description: Define o estilo específico de kitesurf para o qual o produto foi
        projetado, como wave riding
    knee_brace_style:
      name: Estilo de joelheira
      description: Define o design estrutural da órtese, refletindo como é usada e
        o nível de suporte fornecido.
    kneeboard_features:
      name: Características do kneeboard
      description: Descreve as características específicas de uma joelheira, como
        alça ajustável ou antiderrapante
    knife_type:
      name: Tipo de faca
      description: Classifica facas com base no uso ou design pretendido, como multiferramentas
        ou EDC
    knitting/padding_project_type:
      name: Tipo de projeto de costura/acolchoamento
      description: Identifica o uso pretendido de materiais de tricô ou enchimento,
        por exemplo, quilting ou confecção de travesseiros
    knitting_project_type:
      name: Tipo de projeto de tricô
      description: Especifica o tipo de projeto de tricô, como almofadas ou brinquedos
        de pelúcia
    knob/handle_design:
      name: Formato da alça/botão
      description: Descreve o estilo do gabinete, como botão redondo ou puxador de
        barra
    knob_function:
      name: Função da maçaneta
      description: Especifica a função dos botões do amplificador, como ganho ou presença
    knob_style:
      name: Estilo do puxador
      description: Descreve o design dos botões em amplificadores de instrumentos
        musicais, como padrão ou retrô/vintage
    knot_shape:
      name: Formato do nó
      description: Define o formato ou perfil geral do nó ou da cabeça do pincel.
    labeling_project_type:
      name: Tipo de projeto de etiquetagem
      description: Especifica a finalidade de etiquetas costuráveis, como confecção
        de têxteis para o lar ou presentes personalizados
    laboratory_freezer_design:
      name: Formato de refrigeradores para laboratório
      description: Descreve a configuração de um freezer de laboratório, como vertical
        ou baú
    lacrosse_equipment_included:
      name: Equipamento de lacrosse incluído
      description: Especifica os itens no conjunto de equipamentos de lacrosse, como
        taco de lacrosse ou ombreiras
    ladder_type:
      name: Tipo de escada
      description: Identifica o estilo da escada para barco, como fixa ou telescópica
    lamination_mode:
      name: Modo de laminação
      description: Identifica o tipo de processo de laminação utilizado, como laminação
        a frio ou laminação a quente
    lamination_type:
      name: Tipo de laminação
      description: Identifica se a superfície do mapa ou modelo é laminada e, se sim,
        se é de face simples ou dupla.
    lamp_assembly_type:
      name: Tipo de montagem da lâmpada
      description: Especifica se o produto é uma lâmpada avulsa, uma lâmpada com carcaça,
        um conjunto duplo ou outra configuração de montagem.
    lamp_quality_grade:
      name: Grau de qualidade da lâmpada
      description: Indica se a lâmpada é original de fábrica (OEM), se utiliza um
        bulbo OEM em uma carcaça compatível ou se é totalmente paralela/compatível
        (aftermarket).
    lamp_type:
      name: Tipo de lâmpada
      description: Especifica a fonte de luz em ampliadores fotográficos, por exemplo,
        luz fria, dicroica
    lancet_mechanism_type:
      name: Tipo de mecanismo de lanceta
      description: Define o mecanismo operacional ou design de segurança das lancetas
        (p. ex., retrátil de segurança, ativado por pressão).
    language:
      name: Idioma
      description: Especifica o idioma usado ou idioma compatível, por exemplo, inglês,
        multilíngue
    language_version:
      name: Versão do idioma
      description: Especifica a versão do idioma do produto de mídia, como ENG-US
        ou ARA-Árabe
    laptop_cable_type:
      name: Tipo de cabo do laptop
      description: Identifica a finalidade funcional do cabo no laptop.
    laptop_housing_part_type:
      name: Tipo de componente do gabinete do laptop
      description: Especifica qual componente externo é fornecido (p. ex., base inferior,
        apoio de pulso, moldura).
    laser_color:
      name: Cor do laser
      description: Identifica a cor de um ponteiro laser, como vermelho ou verde
    laser_light_source:
      name: Fonte de luz a laser
      description: Especifica a tecnologia de luz utilizada em ponteiros laser, como
        LED
    laser_pattern:
      name: Padrão laser
      description: Identifica o desenho ou motivo produzido por um laser, como estrelas
        ou animais
    lathe_application:
      name: Aplicação de torno
      description: Especifica o tipo de trabalho para o qual um torno foi projetado,
        como fiação de acrílico ou trabalho em vidro
    laundry_detergent_features:
      name: Características do sabão em pó
      description: Descreve características especiais do sabão em pó, como proteção
        de cor ou remoção de manchas
    lead_grade:
      name: Grau de chumbo
      description: Especifica o grau de chumbo em instrumentos de escrita, por exemplo,
        H, 9B
    leash_design:
      name: Design da correia
      description: Descreve a funcionalidade das coleiras para animais de estimação,
        como coleiras removíveis ou retráteis
    leather/vinyl_texture:
      name: Textura do couro/vinil
      description: Descreve a sensação superficial de produtos de couro ou vinil,
        como macio ou granuloso
    leather_type:
      name: Tipo de couro
      description: 'Especifica a origem animal ou o tipo de couro utilizado no produto
        (ex.: couro bovino, couro de bezerro, couro de crocodilo, couro de píton,
        couro sintético)'
    lectern_mounting_type:
      name: Tipo de montagem em púlpito
      description: Especifica o estilo de configuração de um púlpito, como de mesa
        ou de chão
    led_light_mode:
      name: Modo de luz LED
      description: Lista os modos de operação selecionáveis que combinam diferentes
        espectros ou intensidades (p. ex., azul, vermelho, azul e vermelho).
    leg_color:
      name: Cor da perna
      description: Define a tonalidade das pernas de um produto, por exemplo, branco,
        marrom
    leg_lock_type:
      name: Tipo de trava de perna
      description: Identifica o tipo de trava de pernas usado em acessórios eletrônicos,
        normalmente bastões de selfie; por exemplo, fecho twist lock
    leg_material:
      name: Material da perna
      description: Especifica o material utilizado nas pernas de um produto, como
        cerejeira ou bambu
    leg_pattern:
      name: Padrão de perna
      description: 'Define o desenho ou estampa nas pernas do produto, como animais
        ou geométrico '
    leg_sections:
      name: Seções de perna
      description: Indica o número de seções de pernas em acessórios eletrônicos,
        normalmente bastões de selfie; por exemplo, 5+
    legend_type:
      name: Tipo de legenda
      description: Indica se o marcador é liso (sem impressão) ou pré-impresso com
        números, letras, símbolos ou outras marcações.
    length_adjustability:
      name: Ajustabilidade do comprimento
      description: Indica se o comprimento da corrente ou cordão pode ser alterado
        pelo usuário ou é fixo.
    lens/slide_material:
      name: Material da lente/lâmina
      description: Especifica o material utilizado na fabricação de lentes ou slides,
        por exemplo, plástico ou vidro
    lens_cap_compatible_device:
      name: Dispositivo compatível com tampa de lente
      description: Especifica o equipamento compatível com tampas de lentes, como
        monocular ou câmera digital
    lens_case_accessories_included:
      name: Acessórios do estojo de lentes incluídos
      description: Lista itens adicionais embalados com o estojo (p. ex., pinças,
        frasco de solução).
    lens_characteristic:
      name: Característica da lente
      description: Lista características funcionais especiais aplicadas às lentes
        (p. ex., bloqueio de luz azul, UV400).
    lens_coating:
      name: Revestimento de lentes
      description: Especifica o tipo de revestimento nas lentes dos óculos, por exemplo,
        antirreflexo, resistente a riscos
    lens_color:
      name: Cor da lente
      description: Especifica a cor das lentes dos óculos, como amarela ou preta
    lens_color_combination:
      name: Combinação de cores das lentes
      description: Especifica o emparelhamento de cores das lentes usado para óculos
        3D anáglifos.
    lens_configuration:
      name: Configuração da lente
      description: Especifica a configuração da lente em itens como lupas, como simples
        ou múltiplas
    lens_filter_category:
      name: Categoria do filtro de lente
      description: Especifica a categoria de filtro do padrão europeu (0-4) que classifica
        lentes de acordo com a densidade da tonalidade e as condições de luminosidade
        para as quais são indicadas.
    lens_filter_effects:
      name: Efeitos de filtro de lente
      description: Descreve os efeitos específicos que um filtro de lente fornece,
        como correção de cores ou macro
    lens_filter_type:
      name: Tipo de filtro de lente
      description: Especifica a categoria de filtro para lentes de câmera, por exemplo,
        gradiente, densidade neutra
    lens_kit_accessories_included:
      name: Acessórios incluídos no kit de lentes
      description: Lista os itens adicionais fornecidos com o kit de lentes ou filtros
        do telefone, para que a clientela saiba exatamente o que está recebendo e
        possa comparar os pacotes.
    lens_material:
      name: Material da lente
      description: Indica o material principal utilizado nos elementos ópticos ou
        na carcaça da lente, como vidro óptico, plástico ou liga de alumínio.
    lens_pattern:
      name: Padrão da lente
      description: Descreve o design ou a aparência visual das lentes dos óculos,
        como sólida ou texturizada
    lens_polarization:
      name: Polarização da lente
      description: Indica o tipo de polarização da lente em óculos, por exemplo, fotopolarizada
    lens_protector_coverage_style:
      name: Estilo de cobertura do protetor de lente
      description: Define o formato ou o design de cobertura do protetor de lente
        da câmera do celular.
    lens_protector_features:
      name: Características do protetor de lente
      description: Lista recursos funcionais especiais oferecidos pelo protetor.
    lens_refractive_index:
      name: Índice de refração da lente
      description: Especifica o índice de refração numérico (p. ex., 1.50, 1.60, 1.67),
        que se correlaciona diretamente com a espessura e o peso da lente.
    lens_storage_type:
      name: Tipo de armazenamento de lentes
      description: Descreve o tipo de armazenamento para lentes de câmera, como estojo
        ou bolsa para lentes
    lens_tint_type:
      name: Tipo de coloração da lente
      description: Descreve a coloração aplicada à lente para visibilidade de manuseio
        ou fins cosméticos.
    lens_type:
      name: Tipo de lente
      description: Especifica o tipo de lente em óculos, como polarizada ou progressiva
    license_type:
      name: Tipo de licença
      description: Especifica o tipo de licença de software, como de código aberto
        ou de compra única
    lid_material:
      name: Material da tampa
      description: Identifica o tipo de material utilizado na tampa do produto, como
        vidro ou aço inoxidável
    lid_type:
      name: Tipo de tampa
      description: Especifica o tipo de tampa usada, como flip-top ou encaixe
    life_jacket_features:
      name: Características do colete salva-vidas
      description: Destaca as características únicas dos coletes salva-vidas, como
        reflexivos ou flutuantes
    light_attachment_type:
      name: Tipo de fixação de luz
      description: Descreve como uma luz para leitura de livro é fixada, como flexível
        ou fixa
    light_color:
      name: Cor clara
      description: Define a cor ou o tom da luz, como branca ou multicolorida
    light_control:
      name: Controle de luz
      description: Define o nível de bloqueio de luz para cortinas, por exemplo, blackout,
        transparente
    light_design:
      name: Design leve
      description: Descreve o tipo de design de luz em acessórios de câmera, como
        LED ou anel
    light_exposure_modes:
      name: Modos de exposição à luz
      description: Especifica as opções de ajuste de luz em câmeras, como prioridade
        de obturador AE ou prioridade de abertura AE
    light_filtering:
      name: Filtro de luz
      description: Especifica as capacidades de filtragem de luz de um produto, como
        difusão ou blackout
    light_options:
      name: Opções de luz
      description: Especifica os recursos de iluminação de um produto, como brilho
        suave ou mudança de cor
    light_pattern:
      name: Padrão de iluminação
      description: Define o tema visual dos produtos de iluminação, por exemplo, geométrico
        ou arco-íris
    light_rejection_type:
      name: Tipo de rejeição de luz
      description: Indica se e como a tela rejeita luz ambiente ou do teto, melhorando
        o contraste da imagem em ambientes claros.
    light_source:
      name: Fonte de luz
      description: Identifica o tipo de lâmpada usada em um produto, como LED ou fluorescente
    light_spectrum:
      name: Espectro de Luz
      description: Define a faixa de comprimentos de onda de luz que um produto pode
        produzir, por exemplo, luz azul, luz infravermelha
    light_temperature:
      name: Temperatura da luz
      description: Define as características de cor das fontes de luz, como branco
        quente ou luz natural
    light_therapy_device_form_factor:
      name: Formato do dispositivo de fototerapia
      description: Descreve o estilo físico ou configuração do dispositivo (p. ex.,
        painel, máscara, portátil).
    light_type:
      name: Tipo de luz
      description: Identifica o tipo específico de luz usada em embarcações, por exemplo,
        navegação, subaquática
    lighting_features:
      name: Recursos de iluminação
      description: Descreve características especiais de iluminação, como brilho ajustável
        ou iluminação LED
    lighting_options:
      name: Opções de iluminação
      description: Especifica o tipo de iluminação para sinalização, como iluminada
        ou não iluminada
    lighting_type:
      name: Tipo de iluminação
      description: Descreve quaisquer recursos de iluminação integrados do headset.
    line/rope_type:
      name: Tipo de linha/corda
      description: Identifica o estilo de construção de linhas ou cordas de ancoragem,
        como três fios ou trança dupla
    line_spacing_options:
      name: Opções de espaçamento entre linhas
      description: Identifica opções de espaçamento entre linhas, normalmente para
        máquinas de escrever; por exemplo, duplo, ajustável
    liner_features:
      name: Recursos do forro
      description: Descreve características específicas dos revestimentos, como à
        prova de vazamentos ou biodegradáveis
    lip_balm_tint_level:
      name: Nível de coloração do protetor labial
      description: Classifica o nível de coloração ou intensidade de cor que o protetor
        fornece.
    lip_gloss_applicator_type:
      name: Tipo de aplicador de gloss labial
      description: Identifica o estilo de aplicador incluído com o gloss labial, que
        afeta a facilidade de aplicação e preferência do usuário.
    lip_gloss_effect:
      name: Efeito de brilho labial
      description: Descreve o efeito ou acabamento que um brilho labial proporciona,
        por exemplo, suavização, volume
    lip_gloss_formulation:
      name: Formulação do gloss labial
      description: Define a textura ou formato primário do gloss labial.
    lip_liner_design:
      name: Design de delineador labial
      description: Identifica o tipo de delineador labial, como retrátil ou fixo
    lip_makeup_opacity:
      name: Opacidade da maquiagem labial
      description: Indica o nível de cobertura ou opacidade do produto uma vez aplicado.
    lip_plate_material:
      name: Material do bocal
      description: Identifica o material usado para a placa do bocal de uma flauta,
        como prata ou madeira
    lipstick_coverage:
      name: Cobertura do batom
      description: Descreve o nível de opacidade da cor fornecida pelo batom (p. ex.,
        transparente, média, completa).
    lipstick_effect:
      name: Efeito batom
      description: Descreve o efeito ou acabamento que um batom proporciona, por exemplo,
        suavização, volume
    liqueur_variety:
      name: Variedade de licor
      description: Classifica licores por seus perfis de sabor primários, por exemplo,
        nozes, creme
    livestock_food_ingredients:
      name: Ingredientes alimentares para gado
      description: Especifica os ingredientes primários na ração animal, como cevada
        ou farelo de soja
    lnb_output:
      name: Saída LNB
      description: Especifica o número de conexões de receptor de satélite, como simples
        ou quádruplas
    lnb_technology:
      name: Tecnologia LNB
      description: Classifica o tipo de tecnologia em LNBs de satélite, como universal
        ou de baixo ruído
    load_capacity:
      name: Capacidade de carregamento
      description: Especifica o limite de peso que um produto pode suportar, como
        leve ou resistente
    loading_ramp_type:
      name: Tipo de rampa de carregamento
      description: Identifica o estilo da rampa de carregamento para veículos, como
        simples ou tripla dobrável
    loading_type:
      name: Tipo de carregamento
      description: Especifica como os eletrodomésticos para lavanderia são carregados,
        como frontal ou superior
    lock_placement:
      name: Colocação de trava
      description: Identifica onde a trava está posicionada nas peças do motor da
        embarcação, como lado externo ou lado interno
    lock_type:
      name: Tipo de bloqueio
      description: Especifica o mecanismo de bloqueio usado por um produto, como chave
        ou código
    locking_mechanism:
      name: Mecanismos de bloqueio
      description: Especifica o tipo de fechadura utilizada, normalmente para produtos
        de segurança; por exemplo, fechamento automático, deslizamento
    logic_family:
      name: Família lógica
      description: Identifica a família lógica de semicondutores ou tecnologia do
        CI.
    lovibond:
      name: Lovibond
      description: Indica a intensidade da cor dos grãos e maltes de brassagem, como
        claro ou escuro
    lubricant_application:
      name: Aplicação do lubrificante
      description: Define as áreas de aplicação adequadas para lubrificante pessoal,
        como massagem ou vaginal
    lubricant_composition:
      name: Composição do lubrificante
      description: Define o ingrediente base de lubrificantes pessoais, como à base
        de água ou à base de silicone
    lubricant_dispenser_type:
      name: Tipo de dispensador de lubrificante
      description: Identifica a embalagem ou o tipo de recipiente para lubrificantes,
        como um tambor ou uma garrafa
    lubricant_effect:
      name: Efeito do lubrificante
      description: Indica qualquer efeito funcional ou estilo fornecido pela lubrificação
        do preservativo.
    lubricant_form:
      name: Formulação do lubrificante
      description: Descreve a consistência de um lubrificante, como gel ou pasta
    luggage/bag_closure:
      name: Fechamento da bagagem/bolsa
      description: Identifica o tipo de fechamento usado em bagagens ou bolsas, como
        zíper ou fecho de pressão
    lumber/wood_type:
      name: Tipo madeira/lenha
      description: Identifica o tipo específico de madeira usada em um produto, como
        carvalho ou pinho
    lyre/flip_folder_attachment_type:
      name: Tipo de anexação da pasta par partitura
      description: Especifica o tipo de fixação para liras musicais e pastas de partitura,
        como correia ou grampo de lira
    m_2_drive_length_supported:
      name: Comprimento de unidade M.2 suportado
      description: Especifica quais comprimentos de cartão M.2 o gabinete ou adaptador
        pode aceitar.
    magnet_type:
      name: Tipo de ímã
      description: Identifica o tipo de ímã usado em um produto, por exemplo, cerâmica,
        titânio
    magnification:
      name: Ampliação
      description: Especifica o poder de ampliação de um produto, como 1x ou 100x
    magsafe_compatibility:
      name: Compatibilidade com MagSafe
      description: Indica se o acessório é compatível com o sistema de fixação ou
        carregamento magnético da Apple.
    makeup_brush_application:
      name: Aplicação do pincel de maquiagem
      description: Especifica o uso cosmético primário ou área para a qual o pincel
        é projetado (p. ex., base, sombra, contorno).
    makeup_features:
      name: Características da maquiagem
      description: Destaca as principais características dos cosméticos, como alta
        pigmentação ou ausência de fragrância
    makeup_shade:
      name: Tonalidade da maquiagem
      description: Descreve a tonalidade dos cosméticos, como rosa médio ou marrom
        profundo
    mallet_material:
      name: Material do martelo
      description: Identifica o tipo de material usado em baquetas de percussão, como
        latão ou borracha
    management_type:
      name: Tipo de gerenciamento
      description: Descreve o nível de gerenciabilidade do dispositivo (p. ex., totalmente
        gerenciado, gerenciado inteligente, não gerenciado), para que a clientela
        possa combinar as capacidades do produto com requisitos de rede.
    mandibular_device_fitting_method:
      name: Método de adaptação do dispositivo mandibular
      description: Descreve como o dispositivo é ajustado ou moldado aos dentes do
        usuário.
    mandolin_back_shape:
      name: Formato do fundo do bandolim
      description: Especifica a curvatura e o design do fundo do bandolim, como fundo
        plano ou arqueado
    manufacturer_type:
      name: Tipo de fabricante
      description: Especifica a origem das peças ou acessórios de veículos, como originais
        ou de terceiros
    map_update_policy:
      name: Política de atualização de mapas
      description: Declara como as atualizações de mapas são fornecidas ou precificadas
        para o dispositivo.
    marine_navigator_features:
      name: Recursos do navegador marítimo
      description: Especifica os recursos das ferramentas de navegação marítima, como
        tela sensível ao toque ou à prova d’água
    marker_format:
      name: Formato do marcador
      description: Define o estilo físico ou construção do marcador.
    marker_text_color:
      name: Cor do texto do marcador
      description: Especifica a cor da legenda impressa ou texto na superfície do
        marcador (distinta da cor do corpo do marcador).
    marker_tip_design:
      name: Formato da ponta do marcador
      description: Descreve o formato da ponta de uma caneta marcadora, como ponta
        de bala ou ponta chanfrada
    marquee_substrate:
      name: Substrato do letreiro
      description: Especifica o meio físico em que a arte é impressa ou fornecida
        (p. ex., filme translúcido, acrílico impresso no verso, adesivo de vinil).
    mascara_brush_shape:
      name: Formato do aplicador de rímel
      description: Especifica o formato ou design do aplicador ou escova integrado,
        que influencia diretamente a forma de aplicação e o resultado final
    mascara_effect:
      name: Efeito rímel
      description: Descreve o resultado pretendido ou a característica da máscara,
        por exemplo, curvatura, alongamento
    mascara_formulation:
      name: Formulação do rímel
      description: Indica a composição base do produto ou tecnologia especial (p.
        ex., líquida, infundida com fibras, tubo) que afeta textura, uso e remoção.
    mask_cushion_material:
      name: Material da almofada da máscara
      description: Detalha o material específico usado para a almofada ou vedação
        da máscara.
    mask_size:
      name: Tamanho da máscara
      description: Especifica a designação de tamanho fornecida pelo fabricante.
    mask_type:
      name: Tipo de rímel
      description: Especifica o design de máscaras, normalmente para cuidados respiratórios;
        por exemplo, oral, nasal
    masonry_material:
      name: Material de alvenaria
      description: Especifica a composição de itens de alvenaria, como cimento ou
        calcário
    masonry_product_form:
      name: Ficha técnica de produto de alvenaria
      description: Especifica a forma dos produtos de alvenaria, como pasta ou pó
    massage_area:
      name: Área de massagem
      description: Especifica a parte do corpo que o produto foi projetado para massagear,
        como pés ou pescoço
    massage_mechanism_dimensionality:
      name: Dimensionalidade do mecanismo de massagem
      description: Especifica o número de eixos de movimento em que os rolos de massagem
        operam (p. ex., 2D, 3D, 4D, 5D).
    massage_stone_texture:
      name: Textura de pedra de massagem
      description: Descreve a textura superficial das pedras de massagem, como lisa
        ou áspera
    massage_technique:
      name: Técnica de massagem
      description: Define os métodos de massagem oferecidos por um produto, por exemplo,
        percussivo, tecidos profundos
    mat/rug_shape:
      name: Formato de tapete/capacho
      description: Descreve a forma de tapetes ou capachos, como redondo ou quadrado
    mat_base_material:
      name: Material base do tapete
      description: Especifica o tipo de material utilizado na base de tapetes, por
        exemplo, cortiça, espuma viscoelástica
    mat_features:
      name: Características do tapete
      description: Descreve características específicas de tapetes para casa ou escritório,
        como base antiderrapante ou à prova d’água
    material:
      name: Material
      description: Define o material primário de um produto, como algodão ou lã
    material_firmness:
      name: Firmeza dos materiais
      description: Descreve a dureza ou maciez de um produto, por exemplo, rígido,
        flexível
    material_hardness:
      name: Dureza do material
      description: Define a firmeza do produto, normalmente para equipamentos esportivos
        ou fitness; por exemplo, extra macio, alta resistência
    material_origin:
      name: Origem do material
      description: Indica a forma ou o estado em que os materiais preciosos são fornecidos
        (por exemplo, soltos/sem montagem, joias acabadas, cartão-presente impresso/digital)
    material_treatment:
      name: Tratamento dos materiais
      description: Especifica os tratamentos químicos ou físicos aplicados aos materiais
        para fins de preservação ou segurança (por exemplo, tratamento térmico, fumigação,
        tratamento químico)
    maternity_clothing_features:
      name: Características das roupas de maternidade
      description: Descreve características únicas de roupas de maternidade, por exemplo,
        espaço para crescimento da barriga, bojos para suporte
    maternity_sleepwear_style:
      name: Estilo de pijamas de maternidade
      description: Especifica o estilo dos itens de dormir de maternidade, como macacão
        ou camisa de dormir
    mattress_features:
      name: Características do colchão
      description: Destaca características especiais de um colchão, como função hipoalergênica
        ou de resfriamento
    maximum_bit_depth:
      name: Profundidade máxima de bits
      description: Define o comprimento máximo da palavra digital (em bits) que o
        conversor suporta, afetando a faixa dinâmica e resolução.
    maximum_magnification:
      name: Ampliação máxima
      description: Indica o maior fator de ampliação que um microscópio pode atingir,
        como 10x ou 100x
    maximum_reel_diameter_supported:
      name: Diâmetro máximo de bobina suportado
      description: Especifica o maior diâmetro de bobina que o deck pode acomodar.
    measured_parameters:
      name: Parâmetros medidos
      description: Lista as métricas elétricas ou de bateria que o dispositivo pode
        medir ou exibir.
    measuring_method:
      name: Método de medição
      description: Define a técnica usada para quantificar a gordura corporal, por
        exemplo, óptica, calibradores
    measuring_tool_features:
      name: Características da ferramenta de medição
      description: Descreve características especiais de ferramentas de medição, como
        uma câmera embutida ou portátil
    measuring_type:
      name: Tipo de medição
      description: Especifica o método de medição para dispositivos de saúde, por
        exemplo, testa, dedo
    meat_cut:
      name: Corte de carne
      description: Ajuda a identificar o corte ou estilo específico de carne, por
        exemplo, hambúrguer, asas
    meat_type:
      name: Tipo de carne
      description: Identifica a origem da carne, por exemplo, à base de plantas, frango
    media_access:
      name: Acesso à mídia
      description: Define como os clientes podem acessar mídia, por exemplo, assinatura
        digital, impressa e online
    media_content_type:
      name: Tipo de conteúdo de mídia
      description: Identifica o gênero ou categoria de conteúdo de mídia, como reality
        show ou comédia stand-up
    media_format:
      name: Formato de mídia
      description: Define os formatos de mídia compatíveis com um dispositivo, como
        vinil ou VHS
    media_physical_size:
      name: Tamanho físico da mídia
      description: Especifica o tamanho físico padronizado ou fator de forma da mídia
        virgem.
    media_player_form_factor:
      name: Formato do reprodutor de mídia
      description: Descreve o estilo físico do dispositivo, ajudando quem compra a
        escolher entre sticks compactos e aparelhos maiores do tipo set-top box.
    media_section:
      name: Seção de mídia
      description: Identifica a categoria específica de um jornal ou revista, como
        esporte ou política
    media_theme:
      name: Tema de mídia
      description: Categoriza o conteúdo de mídia por seu foco principal, como viagens
        ou jogos
    medical_alarm_features:
      name: Recursos do alarme hospitalar
      description: Descreve os recursos de um sistema de alarme médico, como bateria
        de longa duração ou comunicação bidirecional
    medical_device_certification:
      name: Certificação de dispositivo médico
      description: Lista aprovações regulatórias ou normas com as quais o monitor
        biométrico está em conformidade (p. ex., CE, FDA 510(k)).
    medical_identification_type:
      name: Tipo de identificação médica
      description: Identifica a forma de identificação médica, como uma pulseira ou
        colar
    medical_symbol:
      name: Símbolo médico
      description: Especifica o símbolo exibido na joia ou etiqueta, auxiliando o
        reconhecimento rápido por socorristas.
    medical_syringe_purpose:
      name: Finalidade da seringa médica
      description: Identifica o uso pretendido de uma seringa médica, como para injeção
        ou irrigação
    medical_tape_material:
      name: Material de fita médica
      description: Identifica a composição da fita cirúrgica, como plástico ou látex
    medicine/drug_form:
      name: Formato de medicamento
      description: Identifica a forma física de um medicamento ou fármaco, como comprimido
        ou líquido
    medicine/supplement_form:
      name: Formato de medicamento/suplemento
      description: Identifica a forma física de um medicamento ou suplemento, como
        cápsulas ou líquido
    medium:
      name: Médio
      description: Identifica o tipo de item colecionável, como recordações ou cartões
        colecionáveis
    melodica_style:
      name: Estilo melódico
      description: Especifica o estilo de layout de um instrumento melódico, como
        estilo piano ou estilo teclado
    memory_channels:
      name: Canais de memória
      description: Define a capacidade de transmissão de dados dos processadores de
        computador, como dual ou quad
    memory_form_factor:
      name: Fator de forma de memória
      description: Especifica o layout físico dos módulos de memória, como DIMM ou
        micro-DIMM
    memory_rank:
      name: Classificação de memória
      description: Indica o layout de classificação do módulo (como os chips são organizados),
        afetando a compatibilidade e ajuste de desempenho.
    memory_storage_type:
      name: Tipo de armazenamento de memória
      description: Identifica o tipo de armazenamento de memória usado nas câmeras,
        como cartão Micro SD ou memória interna
    memory_technology:
      name: Tecnologia da memória
      description: Especifica o tipo de memória usada em dispositivos eletrônicos,
        como DDR ou SDRAM
    menstrual_cup_shape:
      name: Formato do coletor menstrual
      description: Descreve o formato dos coletores menstruais, por exemplo, sino,
        em forma de V
    menstrual_cup_size:
      name: Tamanho do copo menstrual
      description: Indica a categoria de tamanho rotulada pelo fabricante (p. ex.,
        pequeno, Tamanho 1).
    menstrual_cup_stem_type:
      name: Tipo de haste do copo menstrual
      description: Especifica o design da haste ou alça de remoção do copo.
    mesh_networking_technology:
      name: Tecnologia de rede mesh
      description: Especifica se o ponto de acesso suporta capacidade mesh e o padrão
        ou protocolo usado.
    mesh_type:
      name: Tipo de malha
      description: Especifica o estilo ou construção do tecido de malha, indicando
        seu uso pretendido ou características, por exemplo, atlético, escovado
    metal_detector_features:
      name: Recursos do detector de metais
      description: Destaca recursos exclusivos de detectores de metal, por exemplo,
        coldre, à prova d’água
    metal_molding_application:
      name: Aplicação da moldagem de metal
      description: Identifica o uso pretendido de moldes de fundição de metal, como
        joias ou estatuetas
    meter_type:
      name: Tipo de métrica
      description: Identifica o tipo de medidor usado em sistemas de combustível de
        embarcações, como digital ou analógico
    metrics_supported:
      name: Métricas com suporte
      description: Especifica os tipos de medidas biométricas que um produto fornece,
        por exemplo, massa óssea, massa muscular
    micrometer_type:
      name: Tipo de micrômetro
      description: Identifica a aplicação ou design específico de um micrômetro, como
        lâmina ou furo
    microphone_design:
      name: Design do microfone
      description: Define a categoria de design para microfones, por exemplo, condensador,
        dinâmico
    microphone_preamp_form_factor:
      name: Formato do pré-amplificador de microfone
      description: Identifica o estilo físico ou formato de gabinete do pré-amplificador
        de microfone para instalação ou uso.
    microphone_thread:
      name: Fio de microfone
      description: Especifica o tamanho da rosca para microfones, por exemplo, 1/4"-20,
        M6
    microphone_type:
      name: Tipo de microfone
      description: Define a tecnologia de microfone usada, como condensador ou dinâmico
    microphone_windshield_type:
      name: Tipo de proteção de vento do microfone
      description: Especifica o estilo de construção da proteção de vento (p. ex.,
        espuma deslizante, capa felpuda deadcat, blimp, cesto), para que os usuários
        escolham rapidamente a solução adequada para redução do ruído do vento.
    microscope_features:
      name: Recursos do microscópio
      description: Destaca aspectos exclusivos dos microscópios, como portabilidade
        ou função de memória
    microscope_slide_material:
      name: Material de lâmina de microscópio
      description: Especifica o tipo de material usado em lâminas de microscópio,
        como vidro ou plástico
    midi_connectivity:
      name: Conectividade MIDI
      description: Identifica o tipo de conexão MIDI em instrumentos musicais, como
        entrada MIDI ou MIDI para USB
    mimo_technology:
      name: Tecnologia MIMO
      description: Indica a tecnologia sem fio de múltiplas entradas e múltiplas saídas
        suportada pelo roteador.
    mineral_class:
      name: Classe mineral
      description: Identifica a categoria específica de um mineral, como óxidos ou
        silicatos
    mineral_compound_form:
      name: Forma do composto mineral
      description: Especifica a forma química ou quelato do mineral (p. ex., citrato,
        glicinato) que afeta a absorção.
    minimum_magnification:
      name: Ampliação mínima
      description: Indica o nível de ampliação mais baixo de uma lente de microscópio,
        como 1x ou 0,5x
    mirror_handle_design:
      name: Formato do cabo do espelho bucal
      description: Descreve o estilo de cabo em espelhos bucais, como em uma extremidade
        ou nas duas extremidades
    mirror_sides:
      name: Lados do espelho
      description: Indica o número ou configuração de superfícies refletivas que um
        espelho tem (p. ex., um lado, dois lados, tridobrável).
    mist_application_area:
      name: Área de aplicação da névoa
      description: Indica a(s) área(s) de uso pretendidas para a névoa (p. ex., corpo,
        cabelo, ambiente, roupa de cama).
    mixer_type:
      name: Tipo de misturador
      description: Classifica mixers de DJ com base no design, como digital ou scratch
    mobile_mounting_type:
      name: Tipo de suporte móvel
      description: Especifica onde um móbile de bebê pode ser fixado, por exemplo,
        berço, carrinho
    mobile_movement:
      name: Movimento celular
      description: Descreve o mecanismo dos móbiles para bebês, como os operados por
        bateria ou de corda
    mobile_phone_accessories_included:
      name: Acessórios de celular incluídos
      description: Lista os itens suplementares fornecidos no conjunto de acessórios
        para celular para que a clientela saiba exatamente quais componentes estão
        incluídos.
    mobile_phone_case_features:
      name: Características da capa de celular
      description: Descreve as características exclusivas de uma capa de celular,
        como à prova de choque ou ajuste firme
    mobile_phone_connector_type:
      name: Tipo de conector para celular
      description: Identifica o padrão da interface do módulo de substituição da porta
        de carregamento ou dados.
    mobile_phone_form_factor:
      name: Formato do celular
      description: Estilo de design físico do aparelho.
    mobility/accessibility_equipment_features:
      name: Características do equipamento de mobilidade/acessibilidade
      description: Descreve características exclusivas de recursos de acessibilidade,
        como bateria de longa duração ou parada de emergência
    mobility_scooter_type:
      name: Tipo de scooter elétrico
      description: Distingue entre diferentes tipos de scooters elétricos, por exemplo,
        portáteis, de 3 rodas
    mobility_type:
      name: Tipo de mobilidade
      description: Indica o estilo da base que afeta a mobilidade, distinguindo entre
        pés estacionários, rodízios ou opções intercambiáveis.
    model_control_technology:
      name: Tecnologia de controle de modelo
      description: Especifica o tipo de sistema de controle para trens modelo, como
        sem fio ou digital
    model_gender_representation:
      name: Representação de gênero do modelo
      description: Especifica se o modelo humano representa anatomia masculina, feminina
        ou unissex.
    model_train_accessory_type:
      name: Tipo de acessórios de modelo de trem
      description: Categoriza acessórios de trem modelo, como iluminação ou materiais
        de cenário
    model_train_theme:
      name: Tema do trem de brinquedo
      description: Identifica o cenário ou a época de um trem modelo, como moderno
        ou de ficção científica
    modem_form_factor:
      name: Fator de forma do modem
      description: Descreve o estilo de design físico do modem (p. ex., dongle USB,
        unidade de mesa, módulo M.2).
    modem_technology:
      name: Tecnologia do modem
      description: Especifica o meio de transmissão primário ou tecnologia de rede
        que o modem usa para acessar a rede do provedor de serviços (p. ex., cabo/DOCSIS,
        DSL, celular).
    modulation_method:
      name: Método de modulação
      description: Especifica a técnica usada para modificar um sinal em dispositivos
        eletrônicos, como AM ou PCM
    moisturizer_type:
      name: Tipo de hidratante
      description: Identifica o tempo de uso do hidratante, como cuidado diurno ou
        noturno
    mold/cut_shape:
      name: Formato de molde/forma
      description: Descreve a forma ou design de um molde para artesanato, por exemplo,
        estrela ou animal
    mold_shape:
      name: Forma do molde
      description: Descreve a forma ou padrão de um molde de artesanato, como redondo
        ou em forma de letra
    molding_application:
      name: Aplicação de moldagem
      description: Especifica o tipo de moldura usado na construção, como revestimento
        ou protetor de parede
    molding_shape:
      name: Forma da moldura
      description: Descreve a forma ou padrão de um molde de concreto, como bloco
        ou coluna
    monitor/screen_specialized_features:
      name: Recursos especializados de monitor/tela
      description: Detalha recursos específicos de um monitor, por exemplo, alto-falantes
        integrados ou adequado para jogos
    monitor_mounting_type:
      name: Tipo de montagem do monitor
      description: Identifica como um monitor de segurança é instalado, como na parede
        ou autônomo
    monitor_shape:
      name: Formato do monitor
      description: Especifica o contorno da tela de um monitor, como plano ou curvo
    monitor_specialized_features:
      name: Recursos especializados do monitor
      description: Destaca recursos exclusivos de um monitor de computador, como suporte
        3D ou ângulo de visão ajustável
    monitor_type:
      name: Tipo de monitor
      description: Especifica o tipo de monitor na câmera, por exemplo, tela sensível
        ao toque, HDR
    monitoring_method:
      name: Método de monitoramento
      description: Identifica a técnica fisiológica que o dispositivo usa para obter
        leituras de glicose.
    monitoring_service_type:
      name: Tipo de serviço de monitoramento
      description: Indica se o sistema é monitorado profissionalmente 24/7, automonitorado
        ou não monitorado.
    monocular_design:
      name: Formato monocular
      description: Identifica a funcionalidade de um monóculo, como zoom ou visão
        noturna
    motherboard_chipset_family:
      name: Família de chipsets da placa-mãe
      description: Especifica o tipo de chipset em uma placa-mãe, como Intel ou NVIDIA
    motherboard_form_factor:
      name: Fator de forma da placa-mãe
      description: Especifica as dimensões físicas e padrões da placa-mãe, por exemplo,
        ATX, Mini-ITX
    motherboard_memory_features:
      name: Recursos de memória da placa-mãe
      description: Descreve as características de memória de uma placa-mãe, como ECC
        ou sem buffer
    motion:
      name: Movimento
      description: Define o tipo de movimento do equipamento para bebês, como vibração
        ou salto
    motion_sensor_type:
      name: Tipo de sensor de movimento
      description: Identifica a tecnologia usada em sensores de movimento, como infravermelho
        ou laser
    motor_starting_method:
      name: Método de partida do motor
      description: Identifica o método usado para dar partida em um motor, como DOL
        (partida direta em linha) ou autotransformador
    motor_type:
      name: Tipo de motor
      description: Especifica se a lixa usa motor com escovas ou sem escovas, impactando
        ruído, longevidade e preço.
    motor_vehicle_placement:
      name: Alocação de veículo motorizado
      description: Identifica em que parte do veículo uma peça foi projetada para
        se encaixar, como dianteira ou traseira
    motor_vehicle_type:
      name: Tipo de veículo motorizado
      description: Especifica a categoria do veículo motorizado, como carro ou SUV
    motorcycle/scooter_type:
      name: Tipo de motocicleta/scooter
      description: Classifica o tipo de motocicleta ou scooter, como off-road ou ciclomotor
    motorcycle_drive_type:
      name: Tipo de direção da motocicleta
      description: Especifica o mecanismo de transmissão da motocicleta, como eixo
        ou corrente
    motorcycle_glove_purpose:
      name: Finalidade da luva para motocicleta
      description: Identifica o uso pretendido de luvas para motocicletas, como off-road
        ou viagem
    motorcycle_tire_type:
      name: Tipo de pneu de motocicleta
      description: Classifica o pneu da motocicleta com base no uso pretendido, como
        corrida ou viagem
    mount/stand_features:
      name: Recursos de montagem/suporte
      description: Detalha as características específicas da montagem ou suporte de
        um produto, como ângulo ajustável ou dobrável
    mount_installation_point:
      name: Ponto de instalação do suporte
      description: Indica onde no veículo ou equipamento o suporte é instalado.
    mount_interface_system:
      name: Sistema de interface de montagem
      description: Identifica a plataforma de conexão proprietária ou padrão da indústria
        integrada no suporte (p. ex., padrão RAM AMPS, Quad Lock).
    mount_material:
      name: Material de montagem
      description: Especifica a composição da montagem de um produto, como aço inoxidável
        ou plástico
    mounting_hardware:
      name: Hardware de montagem
      description: Identifica o tipo de ferragem usado para instalar ou montar um
        produto, como parafusos ou ventosas
    mounting_interface_pattern:
      name: Padrão de interface de montagem
      description: Identifica a interface mecânica ou padrão de furos usado para conectar
        o suporte a um berço de rádio, suporte ou sistema de esfera.
    mounting_interface_standard:
      name: Padrão de interface de montagem
      description: Especifica o padrão ou interface de montagem que o suporte suporta
        (p. ex., AMPS, VESA 75, RAM B ball).
    mounting_mechanism:
      name: Mecanismo de fixação
      description: Define como o celular ou câmera é preso ao bastão ou suporte.
    mounting_style:
      name: Estilo de montagem
      description: Especifica como o botão de pressão é fixado a um painel de controle,
        afetando método de instalação e compatibilidade de espessura do painel.
    mounting_technology:
      name: Tecnologia de montagem
      description: Indica se o CI é projetado para montagem por furo ou em superfície.
    mounting_thread_size:
      name: Tamanho da rosca de montagem
      description: Indica o tamanho padrão da rosca do tripé ou acessório fornecido
        no produto (p. ex., 1/4"-20).
    mounting_type:
      name: Tipo de suporte
      description: Especifica como um produto é instalado ou conectado, como clipe
        ou ventosa
    mouse/trackball_features:
      name: Recursos de mouse/trackball
      description: Descreve características especiais de mouses/rodas de rolagem,
        como design ergonômico ou peso ajustável
    mouse_pad_features:
      name: Recursos do mouse pad
      description: Descreve características exclusivas de um mouse pad, como iluminação
        ou bordas costuradas
    mouse_port_type:
      name: Tipo de porta do mouse
      description: Especifica o tipo de conexão de um mouse de computador, por exemplo,
        UBS sem fio, Bluetooth
    mouse_technology:
      name: Tecnologia do mouse
      description: Especifica a funcionalidade ou o design de um mouse de computador,
        como sem fio ou para jogos
    mouthgard_design:
      name: Design de protetor bucal
      description: Identifica o design de protetores bucais esportivos, por exemplo,
        simples ou duplos
    mouthpiece:
      name: Bocal
      description: Identifica o tipo de bocal para instrumentos musicais, como A ou
        Baixo
    moving/shipping_box_material:
      name: Material da caixa de movimentação/transporte
      description: Identifica o material usado na movimentação ou envio de caixas,
        como papelão ou plástico
    mp3_player_accessories_included:
      name: Acessórios para leitor de MP3 incluídos
      description: Identifica os acessórios extras que vêm com o reprodutor de MP3,
        como capa ou carregador de carro
    mpaa_rating:
      name: Classificação de MPAA
      description: Identifica a classificação da Motion Picture Association of America
        (MPAA) para mídias, como G ou PG-13
    multi_gpu_technology:
      name: Tecnologia Multi-GPU
      description: 'Indica a capacidade de uma placa-mãe suportar múltiplas GPUs,
        por exemplo, não compatível, CrossFireX '
    multiplexer_technology:
      name: Tecnologia do multiplexador
      description: Especifica a tecnologia de sinal ou comprimento de onda subjacente
        usada pelo multiplexador (p. ex., CWDM, DWDM).
    muscle_stimulator_design:
      name: Design de estimulador muscular
      description: Identifica o tipo de estimulador muscular, como faixa para pernas
        ou placa adesiva
    music_genre:
      name: Gênero musical
      description: Classifica os produtos por gênero musical específico, como Natal
        ou pop rock
    music_stand_design:
      name: Formato da estante de partitura
      description: Descreve o tipo de suporte de partitura, como de chão ou de parede
    musical_key:
      name: Nota musical
      description: Especifica a tonalidade musical de um instrumento, por exemplo,
        Dó maior, Fá sustenido
    nail_art_items_included:
      name: Itens de nail art incluídos
      description: Identifica os acessórios específicos para Nail Art em um kit, como
        decalques ou ferramentas de pontilhamento
    nail_art_medium_type:
      name: Tipo de meio de arte de unhas
      description: Especifica o meio ou formato de material primário do suprimento
        de arte de unhas.
    nail_care_features:
      name: Recursos para cuidar das unhas
      description: Descreve qualidades específicas de produtos para cuidados com as
        unhas, como resistência a lascas ou secagem rápida
    nail_design:
      name: Design de unhas
      description: Define o padrão estético ou acabamento de produtos para unhas,
        por exemplo, francesinha, ombre
    nail_polish_drying_form:
      name: Forma de secagem de esmalte
      description: Identifica o método de aplicação dos auxiliares de secagem do esmalte,
        como gotas ou spray
    nail_shape:
      name: Formato da unha
      description: Descreve o estilo das pontas das unhas para produtos cosméticos,
        por exemplo, amêndoa, quadrada
    national/regional_rating:
      name: Classificação Nacional/Regional
      description: Especifica a classificação nacional ou regional de um videogame,
        por exemplo, MA 15+, todas as idades
    native_aspect_ratio:
      name: Proporção nativa
      description: Especifica a proporção original de uma tela, normalmente para projetores;
        por exemplo, 16:8
    nebulizer_design:
      name: Design do nebulizador
      description: Define o design e a portabilidade de um nebulizador, por exemplo,
        portátil, de mesa
    nebulizer_technology:
      name: Tecnologia do nebulizador
      description: Especifica a tecnologia usada em nebulizadores, por exemplo, malha,
        jato
    neck_color:
      name: Cor do pescoço
      description: Identifica a cor da área do braço de uma guitarra, como branco
        ou multicolorido
    neck_material:
      name: Material do pescoço
      description: Identifica o material utilizado no braço de instrumentos de corda,
        como madeira de bordo ou jacarandá
    neck_pattern:
      name: Padrão da gola
      description: Identifica o desenho ou estampa no braço de uma guitarra, como
        floral ou listrado
    necklace_design:
      name: Design de colar
      description: Descreve o estilo de um colar, como pingente ou gargantilha
    neckline:
      name: Decote
      description: Usado para descrever a forma da gola de uma peça de roupa, como
        decote em V ou canoa
    needle_coating_type:
      name: Tipo de revestimento da agulha
      description: Especifica qualquer revestimento de superfície aplicado ao eixo
        da agulha para melhorar o deslizamento ou propriedades terapêuticas.
    needle_eye_type:
      name: Tipo de olho da agulha
      description: Descreve o tamanho e o estilo do buraco da agulha, como grande
        ou dividido
    needle_gauge:
      name: Medidor de agulha
      description: Indica a espessura das agulhas utilizadas em práticas médicas ou
        de tatuagem, como 18 ou 22
    needle_housing_material:
      name: Material da caixa da agulha
      description: Identifica o material do estojo da agulha, como plástico ou aço
        inoxidável
    needle_material:
      name: Material da agulha
      description: Especifica a composição das agulhas, normalmente na acupuntura;
        por exemplo, aço inoxidável, banhada a ouro
    needle_size:
      name: Tamanho da agulha
      description: Descreve o tamanho das agulhas de artesanato, por exemplo, 14,
        100/16
    needlecraft_kit_type:
      name: Tipo de kit de agulha
      description: Identifica o tipo de kit de bordado, como crochê ou ponto cruz
    negative/slide_storage_type:
      name: Tipo de armazenamento de negativo/slide
      description: Especifica o método de armazenamento de negativos fotográficos
        ou slides, por exemplo, caixa de armazenamento de arquivo, carrossel de slides
    nema_enclosure_rating:
      name: Classificação de gabinete NEMA
      description: Especifica a classificação de tipo NEMA que define proteção contra
        riscos ambientais (p. ex., Tipo 4X, Tipo 12).
    net_material:
      name: Material da rede
      description: Identifica o tipo de material utilizado em produtos à base de rede,
        como náilon ou poliéster
    net_mounting_type:
      name: Tipo de estrutura de rede
      description: Identifica como uma rede de tênis é montada, como um suporte de
        encaixe ou tripé
    network_cable_interface:
      name: Interface de cabo de rede
      description: Especifica o tipo de conector em um cabo de rede, por exemplo,
        BNC, MPO/MTP
    network_layer_support:
      name: Suporte de camada de rede
      description: Indica os recursos de comutação ou roteamento da camada OSI mais
        alta fornecidos pelo switch.
    network_protocols_supported:
      name: Protocolos de rede com suporte
      description: Define os padrões de rede que um dispositivo suporta, por exemplo,
        TCP/IP, DNS
    networking_standards:
      name: Padrões de rede
      description: 'Especifica os protocolos que um dispositivo de rede suporta, por
        exemplo, IEEE 802.3 '
    neutral_density_rating:
      name: Classificação de densidade neutra
      description: Define a densidade óptica ou força de um filtro ND, expressa por
        fatores ND comuns ou reduções de parada.
    nightgown_style:
      name: Estilo de camisola
      description: Especifica o estilo de camisola, por exemplo, babydoll, chemise
    nipple_material:
      name: Material do bico
      description: Especifica o material utilizado para o bico da mamadeira, por exemplo,
        látex, borracha
    nipple_shape:
      name: Formato do bico
      description: Define o formato dos bicos da mamadeira, como planos ou angulares
    nipple_type:
      name: Tipo de mamilo
      description: Especifica o tipo de bico nas mamadeiras, como gargalo largo ou
        padrão
    nock_material:
      name: Material do entalhe
      description: Especifica o tipo de material usado para pontas de flechas, como
        alumínio ou plástico
    noise_cancellation_technology:
      name: Tecnologia de cancelamento de ruído
      description: Especifica o tipo de sistema de redução de ruído usado nos fones
        de ouvido, ajudando quem compra a identificar modelos com controle de ruído
        ativo, passivo ou adaptativo.
    noise_intensity:
      name: Intensidade de ruído
      description: Descreve o nível de som produzido por um produto, normalmente fogos
        de artifício; por exemplo, baixo, alto
    noise_reduction_system:
      name: Sistema de redução de ruído
      description: Especifica o(s) padrão(ões) de redução de ruído analógico integrado(s)
        suportado(s) pelo deck.
    notepad_cover_type:
      name: Tipo de capa de bloco de notas
      description: Identifica o tipo de capa em um bloco de notas, como capa dura
        ou brochura
    notepad_design:
      name: Design do bloco de notas
      description: Descreve a encadernação ou o layout de um bloco de notas, como
        encadernação em espiral ou encadernação em disco
    nozzle_coating:
      name: Revestimento do bico
      description: Especifica qualquer tratamento de superfície aplicado ao bico para
        melhorar a resistência ao desgaste ou reduzir a aderência do filamento.
    nozzle_thread_type:
      name: Tipo de rosca do bico
      description: Define a rosca mecânica ou padrão de montagem usado para fixar
        o bico (p. ex., M6, MK8, E3D V6, Volcano).
    nozzle_type:
      name: Tipo de bocal
      description: Especifica o tipo de bocal para jatos de água para limpeza bucal,
        por exemplo, ortodônticos, limpadores de língua
    nursery_theme:
      name: Tema do berçário
      description: Define o design ou a estampa de produtos para quartos de bebês,
        como selva ou dinossauro
    nursing_cover_coverage:
      name: Cobertura da manta para amamentar
      description: Define a cobertura fornecida por uma capa de amamentação, como
        total ou parcial
    nursing_pad_design:
      name: Formato do absorvente para amamentação
      description: Descreve as características físicas dos absorventes para seios,
        como grossos ou redondos
    nursing_pillow_shape:
      name: Formato da almofada de amamentação
      description: Identifica o contorno das almofadas de amamentação, como em forma
        de C ou em U
    nut/seed_type:
      name: Tipo de noz/semente
      description: Identifica o tipo específico de noz ou semente em um produto, como
        amêndoas ou sementes de chia
    nut_butter_variety:
      name: Variedade de manteiga de frutos secos
      description: Identifica a variedade de frutas secas em pastas, por exemplo,
        amendoim, amêndoa
    nut_form:
      name: Formato da porca
      description: Descreve o formato das porcas de ferragem, por exemplo, quadradas,
        asa
    nut_processing_method:
      name: Método de processamento de nozes
      description: Define como as frutas secas ou sementes são preparadas, por exemplo,
        cristalizadas, cruas
    nutrient_content:
      name: Conteúdo nutricional
      description: Especifica os elementos nutricionais presentes, normalmente para
        fertilizantes; por exemplo, nitrogênio, fósforo
    oboe_key_system:
      name: Sistema de notas do oboé
      description: Identifica o sistema de chaves de um oboé, como francês ou conservatório
    ocarina_style:
      name: Estilo ocarina
      description: Descreve o estilo das ocarinas, por exemplo, transversal ou pendente
    occasion:
      name: Ocasião
      description: Especifica o evento ou ambiente adequado para um produto, por exemplo,
        casual, formal
    occasion_style:
      name: Estilo de ocasião
      description: Ajuda a categorizar produtos com base na ocasião, por exemplo,
        casual, formal
    odor_remover_application_area:
      name: Área de aplicação do removedor de odor
      description: Especifica o local de aplicação do produto para remoção de odores.
    office_cart_features:
      name: Recursos do carrinho de escritório
      description: Descreve as características específicas de um carrinho de escritório,
        como prateleiras ajustáveis ou rodas traváveis
    office_instrument_material:
      name: Material de instrumento de escritório
      description: Especifica a composição de ferramentas de escritório, por exemplo,
        madeira ou acrílico
    office_supply_material:
      name: Material de suprimentos para escritório
      description: Identifica o principal material dos artigos de escritório, como
        couro ou papelão
    oil_extraction_method:
      name: Método de extração do óleo
      description: Especifica como o óleo principal foi processado ou extraído (p.
        ex., prensado a frio, refinado).
    oil_type:
      name: Tipo de óleo
      description: Especifica o tipo de óleo utilizado em um produto, por exemplo,
        parafina, querosene
    olfactory_family:
      name: Família olfativa
      description: Define a categoria olfativa geral à qual uma fragrância pertence;
        por exemplo, aldeídica ou animal
    one_piece_style:
      name: Estilo de peça única
      description: Identifica o estilo específico de uma peça de roupa, como um macacão
        ou macaquinho
    open/closed_sign_design:
      name: Formato do letreiro de aberto e fechado
      description: Especifica o estilo de uma placa aberto/fechado, por exemplo, horário
        de funcionamento, personalizado
    opening_direction:
      name: Direção de abertura
      description: Especifica a direção na qual um produto abre, normalmente para
        portões; por exemplo, balanço unilateral
    opening_mechanism:
      name: Mecanismos de abertura
      description: Especifica como um produto é aberto, normalmente para portões de
        bebês ou animais de estimação; por exemplo, alavanca, pedal
    operating_mode:
      name: Modo operacional
      description: Define o método de operação, normalmente para equipamentos médicos;
        por exemplo, semiautomático
    operating_system:
      name: Sistemas operacionais
      description: Define o software do sistema que um dispositivo usa, como iOS ou
        ChromeOS
    operating_system_compatibility:
      name: Compatibilidade com sistema operacional
      description: Indica os sistemas operacionais que o controle remoto suporta nativamente.
    operation_mechanism:
      name: Mecanismo de operação
      description: Descreve como a ferramenta aplica tensão e corta a abraçadeira
        (p. ex., manual, pneumática, automática).
    operation_method:
      name: Método operacional
      description: Define como um produto é operado, normalmente para abridores de
        portas de garagem; por exemplo, correia de transmissão, hidráulico
    optical_disc_recordability:
      name: Capacidade de gravação de disco ótico
      description: Define se um disco ótico é de gravação única ou regravável e se
        é de camada única ou dupla.
    optical_drive_form_factor:
      name: Formato da unidade ótica
      description: Define o tamanho físico e estilo de instalação da unidade.
    optical_drive_loading_mechanism:
      name: Mecanismo de carregamento da unidade ótica
      description: Indica como os discos são inseridos na unidade (p. ex., carregamento
        por bandeja, carregamento por slot, carregamento superior).
    optical_drive_type:
      name: Tipo de unidade óptica
      description: Identifica os formatos de mídia que a unidade óptica de um dispositivo
        pode ler e gravar, por exemplo, CD-ROM, DVD-ROM
    optical_frame_design:
      name: Formato da armação do óculos
      description: Define se os óculos têm armação ou não, por exemplo, sem aro, full
        frame
    optical_zoom:
      name: Zoom ótico
      description: Indica a capacidade de zoom de uma câmera, por exemplo, sem zoom,
        mais de 30x
    oral_care_function:
      name: Função de cuidados orais
      description: Destaca o benefício primário de saúde dental ou oral que o produto
        aborda (p. ex., clareamento, alívio de sensibilidade, saúde gengival).
    oral_care_items_included:
      name: Itens de cuidados orais incluídos
      description: Lista os tipos de produtos de cuidados orais contidos no conjunto.
    organizer_type:
      name: Tipo de organizador
      description: Especifica a categoria de armazenamento de veículos, como porta-copos
        ou porta-luvas
    orientation:
      name: Orientação
      description: Especifica o posicionamento pretendido do produto, por exemplo,
        horizontal, vertical
    orthotic_coverage_length:
      name: Comprimento de cobertura ortótica
      description: Define quanto da palmilha é coberta pelo suporte de arco (p. ex.,
        comprimento total, 3/4 de comprimento, copo de calcanhar).
    outdoor_equipment_features:
      name: Recursos de equipamentos externos
      description: Identifica características únicas de equipamentos para atividades
        ao ar livre, como resistência às intempéries ou portátil
    outdoor_furniture_items_included:
      name: Itens de mobiliário de exterior incluídos
      description: Identifica os itens específicos incluídos em um conjunto de móveis
        externos, como cadeiras ou mesas
    outdoor_power_accessories_included:
      name: Acessórios de energia externos incluídos
      description: Especifica itens adicionais fornecidos com equipamentos elétricos
        para ambientes externos, por exemplo, motosserra, protetores de ouvido
    outdoor_walking_activity:
      name: Atividade de caminhada ao ar livre
      description: Classifica os produtos com base na atividade de caminhada ao ar
        livre pretendida, por exemplo, trekking, corrida em trilha
    outerwear_clothing_features:
      name: Características do vestuário exterior
      description: Identifica características especiais de vestuário para atividades
        ao ar livre, como isolado ou impermeável
    outlet_type:
      name: Tipo de saída elétrica
      description: Especifica o tipo de plugue para dispositivos eletrônicos, por
        exemplo, tipo A, tipo L
    output_connection:
      name: Conexão de saída
      description: Especifica o tipo de conexão de saída para cabos de áudio, como
        3,5 mm ou RCA
    output_connection_type:
      name: Tipo de conexão de saída
      description: Especifica o conector ou padrão de interface fornecido pelo conversor
        no seu lado de saída.
    output_level:
      name: Nível de saída
      description: Descreve o nível de saída dos acessórios de instrumentos musicais,
        como baixo ou alto
    output_signal_interface:
      name: Interface do sinal de saída
      description: Especifica o(s) tipo(s) de conexão(ões) de saída fornecida(s) pelo
        conversor.
    output_video_interface:
      name: Interface de vídeo de saída
      description: Especifica o(s) tipo(s) de conector de vídeo fornecido(s) como
        saída pelo conversor de varredura.
    output_waveform:
      name: Formato de onda de saída
      description: Especifica o tipo de sinal que um oscilador eletrônico gera, como
        sawtooth ou senoidal
    oven_accessories_included:
      name: Acessórios de forno incluídos
      description: Detalha os componentes extras do forno incluídos, como assadeira
        ou grelha
    overclock_profile_support:
      name: Suporte a perfil de overclock
      description: Identifica perfis de overclocking padronizados armazenados no módulo
        (p. ex., Intel XMP, AMD EXPO).
    oxygen_cylinder_outlet_standard:
      name: Padrão de saída do cilindro de oxigênio
      description: Especifica o padrão de conexão de saída CGA da válvula do cilindro.
    oxygen_tank_valve_type:
      name: Tipo de válvula do tanque de oxigênio
      description: Especifica a válvula usada em tanques de oxigênio, por exemplo,
        alternada, pós-válvula
    pa_rating:
      name: Classificação PA
      description: Especifica o grau de proteção UVA do protetor solar (p. ex., PA+,
        PA+++, PA++++) baseado no método de Escurecimento Pigmentar Persistente (PPD).
    pacifier/teether_design:
      name: Formato da chupeta/mordedor
      description: Descreve o design de chupetas e mordedores para bebês, por exemplo,
        em forma de anel, ortodônticos
    package_type:
      name: Tipo de pacote
      description: Define o tipo de embalagem de um produto, por exemplo, vidro, com
        bomba
    packing_materials_included:
      name: Materiais de embalagem incluídos
      description: Identifica o tipo de material de embalagem fornecido, como almofadas
        de ar ou plástico bolha
    pad_display_profile:
      name: Perfil de exibição do bloco
      description: Descreve a tela colorida dos coletores de assinaturas, como monocromática
        ou colorida
    pad_thickness:
      name: Espessura do absorvente
      description: Classifica o perfil geral de espessura do absorvente (p. ex., ultrafino,
        maxi).
    pad_type:
      name: Tipo de almofada
      description: Especifica o tipo de almofada do produto, por exemplo, lavável
        na máquina, substituível
    pad_wing_style:
      name: Estilo de aba do absorvente
      description: Indica se o absorvente menstrual inclui abas laterais para fixação
        e proteção contra vazamentos.
    paddle/oar_material:
      name: Material de remo
      description: Identifica o material utilizado na construção de remos ou remos,
        como alumínio ou madeira
    paddle_equipment_included:
      name: Equipamento de remo incluído
      description: Especifica os equipamentos suplementares nos conjuntos de raquete,
        como postes ou bolas de raquete
    paddleboard_features:
      name: Características do paddleboard
      description: Descreve características específicas de uma prancha de stand up
        paddle, como inflável ou com tampa rígida
    page_layout:
      name: Layout da página
      description: Define o layout das páginas, normalmente em catálogos de endereços;
        por exemplo, em branco, com separadores
    page_size:
      name: Tamanho da página
      description: Determina as dimensões de um produto, como 11" x 17" ou A4
    pager_application:
      name: Aplicação do pager
      description: Identifica o caso de uso principal ou ambiente para o qual o pager
        é destinado.
    pain_reduction_technology:
      name: Tecnologia de redução de dor
      description: Identifica recursos voltados ao conforto que reduzem o desconforto
        durante a depilação (p. ex., resfriamento, roletes de massagem).
    paint/dye_form:
      name: Forma da tinta/tintura
      description: Descreve a consistência ou tipo de tinta ou corante, por exemplo,
        gel ou spray
    paint_brush_design:
      name: Formato do pincel
      description: Descreve a forma ou estilo de um pincel, como redondo ou plano
    paint_finish:
      name: Acabamento de pintura
      description: Indica o tipo de acabamento da pintura, normalmente para veículos;
        por exemplo, metálico, brilhante
    paint_form:
      name: Formulação da pintura
      description: Identifica a forma da tinta para artesanato, por exemplo, gel ou
        pó
    paint_medium_type:
      name: Tipo do agente de pintura
      description: Especifica o tipo de tinta em itens de artesanato, como verniz
        ou aquarela
    paint_type:
      name: Tipo de pintura
      description: Especifica a variedade de tintas em itens de artes e ofícios, como
        esmalte ou aquarela
    paintball/airsoft_equipment_included:
      name: Equipamento de paintball/airsoft incluído
      description: Especifica o equipamento de paintball ou airsoft incluído, como
        óculos de proteção ou colete tático
    paintball_equipment_included:
      name: Equipamento de paintball incluído
      description: Especifica os itens adicionais incluídos em um produto de paintball,
        como baterias ou carregador
    painting_canvas_material:
      name: Material de tela de pintura
      description: Identifica o tipo de material utilizado em uma tela de pintura,
        como algodão ou linho
    painting_medium:
      name: Meio de pintura
      description: Indica o material primário ou técnica usada em uma pintura, por
        exemplo, acrílico, óleo
    pairing_method:
      name: Método de emparelhamento
      description: 'Define como o produto se conecta ou se vincula a outros dispositivos,
        por exemplo, Bluetooth, Wi-Fi '
    palette_design:
      name: Formato da paleta
      description: Descreve o layout ou estilo da paleta de um artista, como dobrável
        ou com abertura para polegar
    palette_knife_shape:
      name: Formato da espátula
      description: Descreve o formato de uma espátula usada em artes e ofícios, como
        reta ou redonda
    panel_specification:
      name: Especificação do painel
      description: Define o tipo de patch panel para gerenciamento de cabos, como
        fibra óptica ou Cat6
    panel_termination:
      name: Mufla do painel
      description: Define o método de terminação de painéis de conexão, por exemplo,
        RJ-45 ou 110 punch down
    panel_transparency:
      name: Transparência do painel
      description: Descreve se a barraca inclui painéis transparentes ou janelas no
        teto ou laterais para permitir entrada de luz durante o bronzeamento.
    pants_length_type:
      name: Tipo de comprimento da calça
      description: Utilizado para definir o comprimento da calça, como cropped ou
        longa
    panty_liner_style:
      name: Estilo do protetor diário
      description: Define a forma ou estilo do protetor diário (p. ex., fio dental,
        curvo, longo).
    pantyhose_style:
      name: Estilo da meia-calça
      description: Descreve o design ou funcionalidade da meia-calça, por exemplo,
        sem pés, maternidade
    paper_finish:
      name: Acabamento de papel
      description: Descreve a textura ou o brilho dos produtos de papel, como acetinado
        ou fosco
    paper_format:
      name: Formato de papel
      description: Identifica o tipo de formato de papel para artes e ofícios, como
        blocos ou folhas soltas
    paper_size:
      name: Tamanho do papel
      description: Especifica as dimensões de um produto de papel, como A4 ou carta
    paper_texture:
      name: Textura de papel
      description: Descreve a textura e o acabamento do papel de arte, como liso ou
        áspero
    paper_type:
      name: Tipo de papel
      description: Especifica o estilo de suprimentos de papel para escritório, como
        grade ou flip-chart
    paperweight_design:
      name: Formato do peso de papel
      description: Descreve o aspecto estético ou estilo de um peso de papel, como
        decorativo ou simples
    papier_mache_shape:
      name: Forma de papel machê
      description: Especifica o design de produtos de papel machê, como caixa ou estatueta
    parachuting_activity:
      name: Atividade de paraquedismo
      description: Define a disciplina de paraquedismo para a qual o produto foi projetado,
        como paraquedismo ou parapente
    parallel_processing_technology_support:
      name: Tecnologia de processamento paralelo com suporte
      description: Especifica as capacidades de processamento paralelo das placas-mãe,
        por exemplo, multi-GPU, multi-núcleo
    parking_camera_features:
      name: Recursos da câmera de estacionamento
      description: Descreve os recursos da câmera de estacionamento de um veículo,
        como suporte para GPS ou vídeo HD
    parking_sign_design:
      name: Formato da placa de estacionamento
      description: Identifica a finalidade de uma placa de estacionamento, por exemplo,
        zona de carga, estacionamento reservado
    pass_duration:
      name: Duração do passe
      description: Especifica o período de validade ou vida útil do passe ou bilhete
        de viagem.
    passband:
      name: Banda passante
      description: Especifica a faixa de frequência que um filtro eletrônico permite
        passar, por exemplo, passa-altas
    pasta_shape_type:
      name: Tipo de formato de macarrão
      description: Classifica massas com base no formato, por exemplo, espaguete,
        tortellini
    pasta_type:
      name: Tipo de massa
      description: Classifica massas por sua forma ou formato específico, por exemplo,
        macarrão, penne
    patch_shape:
      name: Formato do retalho
      description: Descreve a forma ou desenho de um remendo, como animal ou geométrico
    patella_opening_design:
      name: Design de abertura patelar
      description: Especifica se a órtese tem área patelar aberta ou fechada ou um
        anel estabilizador.
    pattern:
      name: Padrão
      description: Excluir? Já tem?
    pattern_distribution_format:
      name: Formato de distribuição de padrão
      description: Identifica como um padrão é entregue, como PDF ou tutoriais online
    payment_mechanism_type:
      name: Tipo de mecanismo de pagamento
      description: Identifica como os jogadores ativam a máquina (p. ex., operado
        por moeda, passar cartão).
    pbx_system_type:
      name: Tipo de sistema PBX
      description: Define a arquitetura geral do produto PBX.
    pcb_surface_finish:
      name: Acabamento de superfície da PCB
      description: Especifica o revestimento protetor aplicado às áreas de cobre expostas.
    pcb_type:
      name: Tipo de PCB
      description: Identifica o tipo de placa de circuito impresso (PCB), como rígida
        ou flexível
    pcie_lane_configuration:
      name: Configuração de pistas PCIe
      description: Especifica a largura física de pistas que o riser suporta (p. ex.,
        x1, x4, x8, x16), indicando o tamanho do slot e largura de banda elétrica.
    pedal_polarity:
      name: Polaridade do pedal
      description: Especifica como o mecanismo de comutação do pedal do teclado funciona
        em um estado padrão não pressionado; por exemplo, NC (normalmente fechado)
    pegi_rating:
      name: Classificação PEGI
      description: Especifica a classificação do sistema Pan European Game Information
        (PEGI) para jogos de vídeo, por exemplo, 3, 12
    pen/felt_tip_design:
      name: Design de caneta/ponta de feltro
      description: Descreve a espessura e o estilo da ponta de uma caneta, por exemplo,
        traços grossos ou traços finos
    pen/pencil_features:
      name: Recursos de caneta/lápis
      description: Identifica características especiais de instrumentos de escrita,
        como borracha ou recarregável
    pen_color:
      name: Cor da caneta
      description: Identifica a cor da tinta da caneta, por exemplo, vermelha, azul
    pen_features:
      name: Recursos da caneta
      description: Descreve características únicas de canetas, como retrátil ou perfumada
    pen_pattern:
      name: Padrão de caneta
      description: Identifica o tema visual nas canetas, como camuflagem ou xadrez
    pen_tip_design:
      name: Formato da ponta da caneta
      description: Descreve o estilo da ponta de uma caneta, como média ou fina
    pen_type:
      name: Tipo de caneta
      description: Identifica o tipo de caneta ou instrumento de escrita, como gel
        ou tinteiro
    pencil_features:
      name: Recursos de lápis
      description: Identifica características específicas dos lápis, como borracha
        ou retrátil
    pencil_sharpener_design:
      name: Design de apontador de lápis
      description: Especifica as características de design de um apontador de lápis,
        por exemplo, com recipiente para aparas, liso
    pencil_type:
      name: Tipo de lápis
      description: Especifica o tipo de lápis, como lapiseira ou de madeira
    percussion_stand_design:
      name: Formato do suporte para percussão
      description: Descreve o estilo de um suporte de percussão, como rack ou suporte
    percussion_tip_shape:
      name: Formato da ponta da baqueta
      description: Identifica o formato das pontas da baqueta ou das baquetas com
        feltro, como oval e cilíndrica
    performance_metrics:
      name: Métrica de desempenho
      description: Destaca as principais áreas de eficiência e eficácia do software
        de IA e de aprendizado de máquina, como tempo de treinamento e velocidade
        de inferência
    perfumery_instruments_included:
      name: Instrumentos de perfumaria incluídos
      description: Especifica os instrumentos fornecidos em um kit de fabricação de
        perfumes, como fita olfativa ou pipetas
    peroxide_content:
      name: Teor de peróxido
      description: Indica o tipo de peróxido utilizado em produtos de cuidados pessoais,
        como carbamida ou sem peróxido
    personal_watercraft_type:
      name: Tipo de embarcação pessoal
      description: Identifica o estilo de embarcação pessoal, como em pé ou sentado
    personalization_design:
      name: Formato da personalização
      description: Descreve as opções de personalização de um produto, normalmente
        cartões de nota; por exemplo, em branco, impresso
    personalization_options:
      name: Opções de personalização
      description: Especifica as opções de personalização disponíveis, como um monograma
        ou uma mensagem personalizada
    pest_control_method:
      name: Método de controle de pragas
      description: Especifica a forma do veneno de pragas, por exemplo, pó, grânulos
    pet_apparel/bedding_features:
