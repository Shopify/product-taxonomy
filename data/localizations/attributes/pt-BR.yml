    face_powder_type:
      name: Tipo de pó facial
      description: Identifica o tipo de pó facial, como acabamento ou solto
    faceplate_design:
      name: Design do painel frontal
      description: Identifica o tipo de painel frontal na eletrônica do veículo, como
