      description: Lista as principais características funcionais da chaminé de carvão.
    charcoal_ignition_type:
      name: Tipo de ignição por carvão
      description: Indica se o carvão foi tratado ou projetado para facilitar o acendimento
        ou proporcionar uma queima mais limpa.
    chopstick_style:
      name: Estilo do hashi
      description: Especifica o estilo regional ou cultural dos hashis, o que pode
        afetar o comprimento, o formato e a decoração.
    chopstick_trainer_design:
      name: Design do hashi de treino
      description: Descreve o design mecânico ou o método de assistência usado pelo
        hashi de treino.
    cigar_cutter_type:
      name: Tipo de cortador de charuto
      description: Especifica o mecanismo ou estilo de corte usado para remover a
        capa do charuto.
    cigar_punch_type:
      name: Tipo de furador de charuto
      description: Identifica o mecanismo ou estilo do furador de charutos.
    clay_pot_material:
      name: Material do vaso de barro
      description: Identifica a composição ou o estilo da argila usado no vaso, como
        barro ou grés.
    cleaner_concentration:
      name: Concentração do limpador
      description: Indica se o produto de limpeza é vendido pronto para uso ou como
        um concentrado que deve ser diluído antes do uso.
    cleaning_cloth_features:
      name: Características do pano de limpeza
      description: Destaca as características especiais de desempenho dos panos.
    cleaning_solution_concentration:
      name: Concentração da solução de limpeza
      description: Indica se o produto é vendido pronto para uso, concentrado ou em
        outros formatos de diluição.
    clock_chime_melody:
      name: Melodia do sino do relógio
      description: Especifica a melodia ou o padrão de batidas reproduzido pelo relógio
        na hora ou no quarto de hora.
    clock_display_type:
      name: Tipo de exibição do relógio
      description: Especifica como a hora é apresentada. Isso é útil para clientes
        que preferem formatos digitais, analógicos, flip etc.
    clock_hand_mounting_type:
      name: Tipo de montagem do ponteiro do relógio
      description: Define o estilo de interface usado para conectar os ponteiros do
        relógio ao mecanismo interno.
    clock_hand_style:
      name: Estilo de ponteiro do relógio
      description: Especifica o design visual dos ponteiros, permitindo à clientela
        encontrar ponteiros que combinem com a estética do relógio.
    clock_movement_type:
      name: Tipo de mecanismo do relógio
      description: Identifica o mecanismo interno de medição do tempo do relógio.
    clothespin_type:
      name: Tipo de prendedor de roupa
      description: Identifica o design/estilo estrutural do prendedor de roupa.
    co2_cylinder_compatibility:
      name: Compatibilidade com cilindros de CO2
      description: Define o tipo ou tamanho do cilindro de CO2 que a máquina de fazer
        refrigerantes aceita, garantindo que a clientela possa encontrar cartuchos
        de recarga compatíveis.
    co2_supplementation_requirement:
      name: Requisito de suplementação de CO2
      description: Indica o nível de suplementação de dióxido de carbono necessário
        para a saúde ideal das plantas em aquários.
    coaster_features:
      name: Característica do porta-copos
      description: Identifica as características únicas dos porta-copos, como uma
        base absorvente ou antiderrapante.
    cocktail_strainer_type:
      name: Tipo de coador de coquetel
      description: Especifica o design do coador de coquetel, o que afeta a compatibilidade
        com coqueteleiras e o estilo de uso.
    code_technology:
      name: Tecnologia de código
      description: Identifica o código ou a tecnologia de segurança que o controle
        remoto usa para se comunicar com o abridor da porta da garagem.
    coffee_decanter_warmer_features:
      name: Características do aquecedor para decantador de café
      description: Destaca as características funcionais ou de segurança relevantes
        e específicas dos aquecedores de decantadores de café.
    coffee_filter_basket_size:
      name: Tamanho da cesta para filtros de café
      description: Especifica a designação de tamanho padronizada compatível com a
        cesta, garantindo compatibilidade com filtros e máquinas.
    coffee_filter_shape:
      name: Formato do filtro de café
      description: Especifica a forma geométrica do filtro de café para garantir a
        compatibilidade com diferentes máquinas de café.
    coffee_filter_type:
      name: Tipo de filtro de café
      description: Especifica o tipo de filtro que uma cafeteira de gotejamento aceita
        ou inclui, o que pode afetar o sabor e o consumo contínuo.
    coffee_grinder_accessory_type:
      name: Tipo de acessório para moedor de café
      description: Classifica o tipo específico de acessório para auxiliar na filtragem
        e na busca.
    colander_style:
      name: Estilo do escorredor
      description: Classifica o design estrutural do escorredor, como com base ou
        para colocar sobre a pia.
    compatible_air_conditioner_type:
      name: Tipo de ar-condicionado compatível
      description: Identifica o modelo de ar-condicionado com o qual o acessório foi
        projetado para funcionar.
    compatible_awning_rail_type:
      name: Tipo de trilho de toldo compatível
      description: Especifica o trilho ou sistema de tubulação do toldo para o qual
        o clipe de fixação foi projetado.
    compatible_beverage_type:
      name: Tipo de bebida compatível
      description: Especifica o tipo de bebida que a rolha ou o protetor foi projetado
        para conservar.
    compatible_can_size:
      name: Tamanho de lata compatível
      description: Indica o tamanho das latas de bebida que o triturador pode acomodar.
    compatible_cigarette_size:
      name: Tamanho de cigarro compatível
      description: Lista os comprimentos ou formatos padrão de cigarros que se encaixam
        no suporte.
    compatible_coffee_capsule_system:
      name: Sistema de cápsulas de café compatível
      description: Especifica o sistema de cápsulas ou sachês que o adaptador foi
        projetado para acomodar, garantindo que a clientela escolha um adaptador adequado
        ao seu formato de café preferido.
    compatible_coffee_maker_type:
      name: Tipo de cafeteira compatível
      description: Indica o modelo de cafeteira ou máquina de expresso para a qual
        o acessório foi projetado.
    compatible_cooking_thermometer_type:
      name: Tipo de termômetro de cozinha compatível
      description: Especifica os tipos de termômetros de cozinha que esta ferramenta
        de calibração foi projetada para ajustar ou verificar.
    compatible_coupler_size:
      name: Tamanho de acoplador compatível
      description: Especifica o tamanho do conector que permite que o saco de confeitar
        se encaixe sem precisar ser cortado.
    compatible_dehumidifier_technology:
      name: Tecnologia de desumidificador compatível
      description: Indica a tecnologia de desumidificação com a qual o filtro é compatível,
        como compressor ou dessecante.
    compatible_feeder_type:
      name: Tipo de alimentador compatível
      description: Identifica os tipos de comedouros para os quais a bandeja foi projetada.
    compatible_footwear_material:
      name: Material de calçado compatível
      description: Lista os tipos de materiais de calçados para os quais a graxa ou
        cera é adequada.
    compatible_fuel_type:
      name: Tipo de combustível compatível
      description: Especifica o tipo de combustível com o qual o acessório foi projetado
        para ser compatível, garantindo a compatibilidade adequada com aquecedores
        de ambiente externo movidos a propano, gás natural, eletricidade ou outros
        combustíveis.
    compatible_garment_steamer_design:
      name: Design compatível do vaporizador de roupas
      description: Especifica os modelos de vaporizadores de roupa com os quais o
        suporte do cabo foi projetado para funcionar.
    compatible_grill_type:
      name: Tipo de grelha compatível
      description: Especifica os tipos de grelhas com os quais o acessório foi projetado
        para funcionar.
    compatible_hazardous_waste_type:
      name: Tipo de resíduo perigoso compatível
      description: Especifica o tipo de resíduo perigoso que o recipiente foi projetado
        para armazenar.
    compatible_ironing_board_type:
      name: Tipo de mesa de passar roupa compatível
      description: Indica o modelo de tábua de passar roupa para a qual a peça é adequada,
        auxiliando a clientela a determinar a compatibilidade.
    compatible_lawn_mower_type:
      name: Tipo de cortador de grama compatível
      description: Indica o modelo de cortador de grama para o qual o kit para fazer
        listras foi projetado.
    compatible_leaf_blower_style:
      name: Estilo de soprador de folhas compatível
      description: Especifica o formato do soprador de folhas com o qual o acessório
        é compatível.
    compatible_mailbox_size:
      name: Tamanho de caixa de correio compatível
      description: Indica os tamanhos de caixa de correio para os quais o acessório
        foi projetado, seguindo as classificações comuns da USPS/setor.
    compatible_mailbox_type:
      name: Tipo de caixa de correio compatível
      description: Especifica o estilo de caixa de correio que se encaixa dentro ou
        com o compartimento, ajudando a clientela a confirmar o encaixe correto.
    compatible_napkin_size:
      name: Tamanho de guardanapo compatível
      description: Especifica a dimensão ou o formato do guardanapo para o qual o
        suporte/dispensador foi projetado.
    compatible_outdoor_grill_style:
      name: Estilo de churrasqueira externa compatível
      description: Especifica o estilo ou a configuração da churrasqueira externa
        para a qual a capa foi projetada.
    compatible_radiator_style:
      name: Estilo de radiador compatível
      description: Lista os estilos de radiador para os quais o acessório foi projetado,
        como radiador de painel, de coluna, toalheiro ou de rodapé.
    compatible_refrigerator_compartment:
      name: Compartimento de geladeira compatível
      description: Especifica em que parte da geladeira o acessório deve ser usado.
    compatible_stove_fuel_type:
      name: Tipo de combustível de fogão compatível
      description: Identifica os tipos de combustível com os quais um acessório para
        fogão portátil é compatível, ajudando a clientela a encontrar o item adequado
        para o seu fogão (por exemplo, gás de cartucho ou álcool).
    compatible_stove_type:
      name: Tipo de fogão compatível
      description: Identifica os tipos de fogões portáteis com os quais esta base
        foi projetada para ser compatível.
    compatible_tissue_box_type:
      name: Tipo de caixa de lenços de papel compatível
      description: Identifica o modelo/tamanho da caixa de lenços de papel para a
        qual o suporte foi projetado.
    compatible_tractor_type:
      name: Tipo de trator compatível
      description: Especifica a categoria de trator para a qual a peça/acessório foi
        projetado.
    compatible_umbrella_type:
      name: Tipo de guarda-chuva compatível
      description: Especifica o estilo de guarda-sol para o qual a capa foi projetada.
    compatible_washing_machine_type:
      name: Tipo de máquina de lavar compatível
      description: Especifica para quais modelos de lavadoras o produto de limpeza
        é adequado (por exemplo, lavadoras com carregamento frontal, carregamento
        superior ou de alta eficiência).
    compatible_waste_container_type:
      name: Tipo de recipiente de resíduos compatível
      description: Especifica o tipo de recipiente para resíduos com o qual o acessório
        foi projetado para funcionar ou se encaixar.
    compatible_water_cooler_type:
      name: Tipo de refrigerador de água compatível
      description: Indica com quais estilos de bebedouros o acessório é compatível,
        ajudando a clientela a escolher as peças corretas para seu aparelho.
    compatible_water_heater_type:
      name: Tipo de aquecedor de água compatível
      description: Especifica o tipo de aquecedor de água com o qual o produto é compatível.
    compatible_wrap_material:
      name: Material de embalagem compatível
      description: Lista os tipos de embalagem para alimentos que o dispensador foi
        projetado para armazenar.
    compost_aerator_design:
      name: Design do aerador de compostagem
      description: Identifica o design mecânico ou o estilo do aerador, descrevendo
        como ele agita o composto.
    compost_form:
      name: Forma de compostagem
      description: Descreve a apresentação física ou o estilo da embalagem do produto
        de compostagem.
    compost_source_material:
      name: Material de origem do adubo
      description: Identifica os principais materiais orgânicos a partir dos quais
        o composto é derivado.
    compression_method:
      name: Método de compressão
      description: Indica a técnica usada para expelir o ar ou economizar espaço na
        bolsa.
    cooking_gel_fuel_base:
      name: Base de combustível em gel para cozinhar
      description: Identifica a base química primária do combustível em gel, permitindo
        aos usuários escolher entre formulações à base de etanol, metanol, glicol
        e outras, que diferem em odor, poder calorífico e adequação para uso interno/externo.
    cooking_surface_texture:
      name: Textura da superfície de cozimento
      description: Especifica a textura da superfície de cozimento, como plana, com
        ranhuras ou de dupla função.
    cooking_thermometer_design:
      name: Design de termômetro de cozinha
      description: Identifica o estilo de funcionamento de um termômetro de cozinha,
        como analógico ou digital.
    cookware_coating_material:
      name: Material de revestimento da panela
      description: Identifica o tipo de revestimento interno ou externo aplicado à
        panela, oferecendo insights sobre o desempenho antiaderente, a durabilidade
        e os requisitos de cuidado.
    cookware_coating_type:
      name: Tipo de revestimento da panela
      description: Especifica o revestimento interno ou superficial das panelas.
    cookware_lid_style:
      name: Estilo de tampa de panela
      description: Descreve o estilo geral ou a construção funcional da tampa.
    cooler_style:
      name: Estilo da caixa/bolsa térmica
      description: Identifica o design estrutural da caixa/bolsa térmica portátil
        para alimentos/bebidas, ajudando a clientela a escolher entre caixas rígidas,
        bolsas flexíveis, mochilas etc.
    corkscrew_accessories_included:
      name: Acessórios para saca-rolhas incluídos
      description: Especifica os componentes adicionais incluídos na embalagem do
        saca-rolhas.
    corkscrew_hinge_type:
      name: Tipo de dobradiça do saca-rolhas
      description: Especifica se o saca-rolhas usa um mecanismo de alavanca com dobradiça
        simples ou com dobradiça dupla.
    corkscrew_tools_included:
      name: Ferramentas para saca-rolhas incluídas
      description: Lista as ferramentas e os acessórios incluídos com o saca-rolhas
        (por exemplo, cortador de lacre, abridor de garrafas, lâmina de faca) para
        que a clientela possa ver o que está incluído.
    crushing_method:
      name: Método de trituração
      description: Descreve o mecanismo usado para compactar a lata.
    crust_browning_level:
      name: Nível de douramento da crosta
      description: Identifica as opções de cor/intensidade da crosta que a máquina
        de fazer pão oferece.
    cultivar_type:
      name: Tipo de cultivar
      description: Especifica o tipo de cultivo do cultivar, indicando se é tradicional,
        híbrido, de polinização aberta ou geneticamente modificado.
    cultivator_type:
      name: Tipo de cultivador
      description: Classifica o projeto estrutural do cultivador. Por exemplo, com
        dentes frontais ou com dentes traseiros.
    cup_warmer_features:
      name: Características do aquecedor de copos
      description: Destaca as características especiais de design ou praticidade específicas
        dos aquecedores de copos.
    curtain_heading_style:
      name: Estilo de cabeçalho de cortina
      description: Especifica o estilo da borda superior/cabeçalho usado para pendurar
        a cortina ou a persiana, o que determina os equipamentos necessários e a aparência
        geral.
    curtain_lining_type:
      name: Tipo de forro de cortina
      description: Indica se a cortina possui forro e o tipo de forro usado, o que
        afeta o isolamento, a privacidade e o caimento.
    curtain_rod_type:
      name: Tipo de varão de cortina
      description: Classifica o estilo estrutural do varão, ajudando a clientela a
        localizar de forma rápida os varões adequados às necessidades de instalação.
    cutting_disc_function:
      name: Função do disco de corte
      description: Define a ação específica de processamento de alimentos que o disco
        executa.
    cutting_head_type:
      name: Tipo de cabeça de corte
      description: Especifica o tipo de elemento de corte usado pelo acessório.
    cutting_mechanism_type:
      name: Tipo de mecanismo de corte
      description: Descreve o tipo de cortador integrado ao dispensador.
    cylinder_connector_type:
      name: Tipo de conector do cilindro
      description: Especifica a conexão ou a interface da rosca do cilindro, determinando
        a compatibilidade com modelos específicos de máquinas de refrigerante.
    decorating_bag_features:
      name: Características do saco para decoração
      description: Destaca as características especiais de design ou funcionais do
        saco para decoração.
    dehumidifier_refill_form:
      name: Forma de recarga do desumidificador
      description: Define o formato físico da recarga para que a clientela possa selecionar
        os estilos compatíveis.
    desiccant_material:
      name: Material dessecante
      description: Especifica a substância absorvente de umidade usada. Isso é importante
        para o desempenho, a reutilização e as considerações de segurança.
    dial_finish:
      name: Acabamento do mostrador
      description: Descreve o acabamento da superfície do mostrador, o que influencia
        o brilho e o estilo.
    dinnerware_features:
      name: Características do item do aparelho de jantar
      description: Destaca as características funcionais especiais do item do aparelho
        de jantar.
    dish_detergent_features:
      name: Características do detergente para louça
      description: Lista as propriedades notáveis de formulação ou ecológicas que
        ajudam a clientela a filtrar e comparar os produtos.
    dishwasher_accessory_type:
      name: Tipo de acessório para lava-louças
      description: Classifica o tipo específico de acessório, permitindo à clientela
        filtrar as opções de forma rápida.
    dishwasher_wash_programs:
      name: Programas de lavagem da lava-louças
      description: Lista os ciclos de lavagem predefinidos disponíveis na máquina
        de lavar louça, permitindo que a clientela filtre por versatilidade do programa.
    dispensing_mechanism:
      name: Mecanismo de distribuição
      description: Descreve como a bebida é servida pela garrafa térmica, o que influencia
        a usabilidade em diferentes configurações.
    dispensing_temperature_options:
      name: Opções de temperatura de distribuição
      description: Indica as opções de temperatura que o bebedouro pode fornecer.
    displayed_character:
      name: Caractere exibido
      description: Identifica o caractere alfanumérico representado pela peça individual.
    diving_board_surface_texture:
      name: Textura da superfície do trampolim
      description: Descreve a textura da superfície superior do trampolim, o que afeta
        a aderência e a resistência ao deslizamento.
    door_configuration:
      name: Configuração da porta
      description: Indica quantas portas de acesso a armadilha tem.
    door_hinge_orientation:
      name: Orientação da dobradiça da porta
      description: Especifica a posição da dobradiça ou a direção de abertura da porta
        ou da tampa do congelador.
    door_hinge_position:
      name: Posição da dobradiça da porta
      description: Especifica o lado da porta em que a dobradiça está localizada ou,
        se é reversível, o que afeta a instalação e o espaço.
    draft_gas_type:
      name: Tipo de gás alimentício
      description: Especifica o tipo de sistema de gás usado para a distribuição,
        importante para a carbonatação e o tipo de bebida.
    drainage_design:
      name: Design de drenagem
      description: Indica como a saboneteira controla o escoamento da água para manter
        o sabonete seco.
    drainage_method:
      name: Método de drenagem
      description: Descreve como a água coletada é expelida, indicando se é necessário
        esvaziá-la manualmente.
    drawer_organizer_features:
      name: Características do organizador de gavetas
      description: Destaca as principais características funcionais de um organizador
        de gaveta.
    drinkware_crystal_composition:
      name: Composição do cristal dos utensílios para bebidas
      description: Identifica a formulação específica de vidro/cristal usada, destacando
        o teor de chumbo e as características de transparência.
    drinkware_holder_style:
      name: Estilo do suporte dos utensílios para bebidas
      description: Classifica o design ou a configuração geral de um suporte de utensílios
        para bebidas.
    drinkware_insulation:
      name: Isolamento de utensílios para bebidas
      description: Identifica a construção do isolamento do utensílio para bebidas,
        o que afeta a retenção de temperatura.
    dripper_design:
      name: Design do gotejador
      description: Especifica o formato geral do gotejador ou o estilo de drenagem,
        o que afeta as características de infusão.
    drum_grating_styles_included:
      name: Estilos de ralador cilíndrico incluídos
      description: Lista os diferentes estilos de cilindros de ralar ou fatiar incluídos
        no conjunto, de modo que os usuários possam saber de forma rápida quais são
        as funções oferecidas.
    dryer_drum_material:
      name: Material do tambor da secadora
      description: Indica o material de construção do interior do tambor, o que afeta
        a durabilidade, o acúmulo de estática e o ruído.
    dryer_sheet_features:
      name: Características da folha para secadora
      description: Destaca os benefícios e as características especiais de lençóis
        mais secos.
    dryer_venting_type:
      name: Tipo de ventilação da secadora
      description: Classifica o método de ventilação usado por uma secadora, o que
        afeta os requisitos de instalação e a eficiência energética.
    drying_system:
      name: Sistema de secagem
      description: Indica a tecnologia que a lava-louças usa para secar a louça no
        final do ciclo.
    duster_head_material:
      name: Material da cabeça do espanador
      description: Especifica o material do cabeçote coletor de pó para considerações
        de desempenho e alergias.
    dustpan_type:
      name: Tipo de pá de lixo
      description: Classifica o estilo/formato geral da pá de lixo.
    edge_finish:
      name: Acabamento da borda
      description: Descreve a técnica de acabamento usada nas bordas do tênis, o que
        afeta a estética e durabilidade.
    egg_cooker_functions:
      name: Funções do cozinhador de ovos
      description: Lista os modos de cozimento disponíveis do cozedor de ovos.
    egg_cup_design:
      name: Design de copo para ovos
      description: Especifica o estilo estrutural do copo para ovos, (por exemplo,
        com pé ou com pedestal).
    electric_kettle_features:
      name: Características da chaleira elétrica
      description: Lista as principais características de conveniência ou segurança
        incluídas na chaleira.
    emergency_blanket_features:
      name: Características do cobertor de emergência
      description: Destaca as características funcionais especiais do cobertor.
    emergency_lighting_operating_mode:
      name: Modo de operação da iluminação de emergência
      description: Especifica como a iluminação de emergência se comporta durante
        o estado normal de funcionamento e em caso de falta de energia.
    entrance_slot_design:
      name: Design da ranhura de entrada
      description: Descreve o tipo de abertura que permite a entrada de borboletas
        na casa.
    espresso_boiler_type:
      name: Tipo de caldeira para café expresso
      description: Descreve a configuração do sistema de aquecimento usado para produzir
        café e vapor.
    fabric_care_product_form:
      name: Formato do produto para cuidados com tecidos
      description: Especifica a forma física de um produto para cuidados com tecidos,
        como um amaciante de roupas ou um aditivo para secadora.
    fabric_softener_features:
      name: Características do amaciante de roupas
      description: Destaca os benefícios ou as características especiais dos amaciantes
        de roupas.
    fabric_stiffness_level:
      name: Nível de rigidez do tecido
      description: Indica o nível de rigidez ou firmeza conferido ao tecido pela goma
        após ser passado a ferro.
    fabric_weave:
      name: Trama do tecido
      description: Indica a construção específica da trama do tecido, o que afeta
        o toque e a aparência.
    feeder_design:
      name: Design do alimentador
      description: Especifica o estilo estrutural do alimentador.
    fermentation_crock_type:
      name: Tipo de panela de fermentação
      description: Identifica o design fundamental da panela.
    filament_style:
      name: Estilo do filamento
      description: Define a configuração interna de filamentos que influencia a estética
        e a distribuição da luz.
    film_reusability:
      name: Reutilização do filme
      description: Indica se a película foi projetada para uso único ou se pode ser
        removida, armazenada e reaplicada.
    filter_bleaching_method:
      name: Método de branqueamento por filtro
      description: Identifica o estado de branqueamento e o processo usado para o
        filtro, informando as preferências de gosto e sustentabilidade.
    filter_technology:
      name: Tecnologia do filtro
      description: Identifica a tecnologia de controle de odores ou de filtragem usada.
    fire_alarm_panel_type:
      name: Tipo de painel de alarme de incêndio
      description: Identifica a arquitetura do sistema do painel.
    fire_protection_class:
      name: Classe de proteção anti-incêndio
      description: Indica a classe de certificação que define a temperatura interna
        máxima permitida durante os testes de resistência ao fogo (por exemplo, UL
        Classe 350).
    fire_starter_type:
      name: Tipo de acendedor de fogo
      description: Especifica a forma ou o mecanismo principal do produto de ignição,
        ajudando a clientela a encontrar o tipo de ignição exato de que precisa.
    fireplace_fuel_form:
      name: Forma de combustível para lareira
      description: Especifica a apresentação ou forma física do combustível, permitindo
        à clientela escolher entre toras, pellets, briquetes, latas de gel e outras
        opções adequadas ao seu aparelho.
    fireplace_tool_items_included:
      name: Ferramentas para lareira incluídas
      description: Lista as ferramentas ou acessórios específicos para lareira fornecidos
        com o produto, de modo que os compradores saibam exatamente o que estão adquirindo
        e possam comparar os pacotes com facilidade.
    firewood_seasoning:
      name: Secagem de lenha
      description: Indica o estado de secagem da lenha, que afeta o teor de umidade,
        a facilidade de ignição e a eficiência térmica.
    flag_attachment_style:
      name: Estilo de fixação da bandeira
      description: Descreve como a bandeira ou biruta é fixada a um mastro ou ponto
        de montagem.
    flame_adjustment:
      name: Ajuste da chama
      description: Indica se e como a intensidade da chama pode ser ajustada.
    flask_insulation_type:
      name: Tipo de isolamento do frasco
      description: Indica a construção de isolamento térmico do frasco, afetando a
        fidelidade da temperatura dos clientes.
    flatware_finish:
      name: Acabamento do talher
      description: Descreve o tratamento da superfície ou brilho do item, o que afeta
        a estética e a visibilidade de arranhões.
    floor_protection_transparency_level:
      name: Nível de transparência da proteção do piso
      description: Indica o grau de transparência da película ou do canal de transmissão,
        variando de transparente a opaco.
    floor_scrubber_brush_type:
      name: Tipo de escova do esfregão de chão
      description: Define a configuração principal da escova ou almofada usada pelo
        esfregão.
    floor_surface_compatibility:
      name: Compatibilidade com a superfície do piso
      description: Especifica os materiais da superfície do piso para os quais o protetor
        é seguro e que foi projetado para proteger.
    flow_control_type:
      name: Tipo de controle de fluxo
      description: Descreve se o dispositivo inclui um mecanismo ajustável para variar
        a vazão de água.
    flue_outlet_position:
      name: Posição da saída da chaminé
      description: Especifica o local em que a chaminé sai do corpo do fogão, o que
        afeta o layout da instalação e a conexão da chaminé.
    flue_pipe_connection_type:
      name: Tipo de conexão do tubo da chaminé
      description: Descreve o mecanismo de junção usado para conectar a extensão a
        outros componentes de gerenciamento de plumas.
    fluorescent_tube_output_type:
      name: Tipo de saída do tubo fluorescente
      description: Especifica o subtipo de saída do tubo fluorescente, o que é importante
        para a compatibilidade com o reator e o brilho.
    fly_swatter_type:
      name: Tipo de mata-moscas
      description: Indica o estilo ou mecanismo de funcionamento do mata-moscas.
    foil_duty_rating:
      name: Classificação de resistência da folha
      description: Classifica a resistência ou a qualidade da folha para o uso pretendido.
    foliage_color:
      name: Cor da folhagem
      description: Especifica o núcleo dominante das folhas da planta, o que auxilia
        na seleção ornamental além da cor da flor.
    fondue_pot_type:
      name: Tipo de panela de fondue
      description: Classifica o estilo de aquecimento ou a finalidade de uso do conjunto
        de fondue.
    fondue_set_pieces_included:
      name: Conjunto de fondue com todos os acessórios incluídos
      description: Identifica os componentes incluídos em um conjunto de fondue, como
        uma panela de fondue ou garfos.
    food_carrier_insulation_type:
      name: Tipo de isolamento do recipiente para alimentos
      description: Identifica se o produto é isolado e qual a tecnologia de isolamento
        usada.
    food_dehydrator_surface_type:
      name: Tipo de superfície do desidratador de alimentos
      description: Descreve o tipo de superfície das folhas/bandejas, o que afeta
        o fluxo de ar e a liberação dos alimentos.
    food_dehydrator_tray_type:
      name: Tipo de bandeja para desidratar alimentos
      description: Identifica o estilo específico ou o design funcional da bandeja.
    food_grater_type:
      name: Tipo de ralador de alimentos
      description: Identifica o estilo estrutural do ralador.
    food_processor_attachments_included:
      name: Acessórios para processador de alimentos incluídos
      description: Lista os tipos específicos de acessórios incluídos no conjunto
        para que a clientela saiba exatamente quais funções terão com a compra.
    food_storage_bag_features:
      name: Características da bolsa para armazenamento de alimentos
      description: Destaque as características funcionais notáveis do saco.
    food_storage_bag_type:
      name: Tipo de saco para armazenamento de alimentos
      description: Especifica o estilo principal ou a classificação de uso pretendido
        da bolsa para armazenamento de alimentos.
    food_storage_features:
      name: Características do armazenamento de alimentos
      description: Destaca as características especiais que agregam funcionalidade
        ou praticidade ao produto para armazenamento de alimentos.
    food_wrap_features:
      name: Características da embalagem para alimentos
      description: Destaca as características especiais que influenciam o uso e a
        sustentabilidade.
    footwear_type_compatibility:
      name: Compatibilidade com tipos de calçados
      description: Identifica o tipo de calçado para o qual o modelador foi projetado.
    formulation_concentration:
      name: Concentração da formulação
      description: Identifica se o produto é um concentrado ou uma formulação pronta
        para uso.
    fountain_design:
      name: Design da fonte
      description: Classifica o estilo estrutural ou o formato da fonte.
    fragrance_oil_application:
      name: Aplicação do óleo de fragrância
      description: Especifica o uso recomendado ou comum do óleo, auxiliando a clientela
        que faz o seu próprio óleo e entusiastas na seleção da formulação correta.
    fragrance_oil_composition:
      name: Composição do óleo de fragrância
      description: Indica se a formulação é composta exclusivamente por óleo essencial
        natural, óleo de fragrância sintético ou uma mistura de ambos.
    fragrance_refill_type:
      name: Tipo de refil da fragrância
      description: Define o formato dos refis de fragrância que o difusor aceita.
    freezer_configuration:
      name: Configuração do congelador
      description: Identifica a orientação física/estilo de design da unidade do congelador.
    freezing_method:
      name: Método de congelamento
      description: Especifica a tecnologia usada para congelar a mistura em uma máquina
        de sorvete, ajudando a clientela a distinguir entre modelos com compressor,
        unidades com tigela de pré-congelamento, tipos com manivela manual para sal
        e gelo e outros designs.
    fuel_compatibility:
      name: Compatibilidade de combustível
      description: Especifica os tipos de combustível que a grelha foi projetada para
        armazenar com segurança.
    funnel_type:
      name: Tipo de funil
      description: Classifica o funil com base em seu design ou uso pretendido.
    furnace_configuration:
      name: Configuração da fornalha
      description: Especifica a orientação física do fluxo de ar do gabinete do forno
        para instalação.
    furniture_anchor_type:
      name: Tipo de âncora para móveis
      description: Especifica o estilo estrutural de um kit de ancoragem para móveis,
        indicando o mecanismo de ação.
    garage_floor_mat_style:
      name: Estilo do tapete para piso de garagem
      description: Identifica o formato ou estilo do tapete para piso de garagem.
    garbage_disposal_feed_type:
      name: Tipo de alimentação para triturador de lixo
      description: Identifica como os resíduos alimentares são encaminhados para o
        triturador, seja de forma contínua durante o funcionamento ou em grupos discretos.
    garbage_disposal_stopper_style:
      name: Estilo do tampão para triturador de lixo
      description: Indica o estilo funcional do tampão.
    garden_hose_design:
      name: Design da mangueira de jardim
      description: Identifica o estilo estrutural da mangueira, que determina o uso
        pretendido e as características de manuseio.
    garden_hose_fitting_type:
      name: Tipo de encaixe para mangueira de jardim
      description: Identifica o estilo ou as funções de uma conexão de mangueira de
        jardim, como adaptador ou divisor em Y, para facilitar a busca e a filtragem.
    gardening_fork_type:
      name: Tipo de garfo de jardinagem
      description: Classifica o estilo específico ou o uso pretendido do garfo.
    garland_style:
      name: Estilo da guirlanda
      description: Classifica o estilo de construção ou decoração da guirlanda.
    gas_type:
      name: Tipo de gás
      description: Identifica o tipo de gás comprimido contido no cilindro do carregador.
    gasket_profile_type:
      name: Tipo de perfil da junta
      description: Especifica o perfil ou estilo de seção transversal da junta, conforme
        o padrão do setor.
    gazebo_roof_material:
      name: Material para telhado de gazebo
      description: Especifica o material dos painéis do telhado do gazebo ou da cobertura
        rígida.
    glass_and_surface_cleaner_features:
      name: Recursos de limpeza de vidro e superfícies
      description: Destaca as características ou benefícios especiais do produto de
        limpeza para vidros e superfícies.
    glass_cleaner_features:
      name: Características do limpador de vidros
      description: Destaca as características especiais de desempenho ou formulação
        específicas dos limpadores de vidro.
    glazing_material:
      name: Material de envidraçamento
      description: Identifica o material que cobre a área da foto (por exemplo, vidro,
        acrílico ou nenhum).
    globe_map_content:
      name: Conteúdo do mapa-múndi
      description: Descreve o conteúdo cartográfico principal exibido no mapa.
    glue_trap_design:
      name: Design de armadilha adesiva
      description: Identifica o estilo ou formato físico da armadilha, auxiliando
        na compatibilidade com as áreas de posicionamento e o tipo de praga.
    grab_bar_shape:
      name: Formato da barra de apoio
      description: Define o design estrutural da barra de apoio, o que influencia
        o posicionamento da instalação e o estilo de suporte para o usuário.
    grass_discharge_type:
      name: Tipo de descarga de grama
      description: Especifica como o cortador de grama expulsa os resíduos de grama
        (por exemplo, descarga lateral, ensacamento traseiro etc.).
    grate_design:
      name: Design da grelha
      description: Identifica o estilo estrutural do ralador.
    grater_design:
      name: Design do ralador
      description: Classifica o design físico ou o mecanismo de um ralador ou raspador.
    grating_surface_coarseness:
      name: Rugosidade da superfície da grelha
      description: Indica o tamanho/textura dos orifícios ou ranhuras de corte na
        superfície da grelha.
    grill_grate_material:
      name: Material da grelha
      description: Especifica o material ou revestimento da grelha principal de cozimento.
    grill_thermometer_type:
      name: Tipo de termômetro de grelha
      description: Indica o design ou a tecnologia principal do termômetro para grelha,
        ajudando a clientela a encontrar de forma rápida o modelo que melhor se adapta
        à configuração de sua grelha.
    grinding_mechanism_material:
      name: Material do mecanismo de moagem
      description: Especifica o material do mecanismo/rebarbas de moagem internas
        que trituram os temperos de forma eficaz.
    grinding_mechanism_type:
      name: Tipo de mecanismo de moagem
      description: Especifica o mecanismo interno responsável pela moagem ou trituração.
    growing_media_buffering:
      name: Tampão do meio de cultura
      description: Indica se a fibra de coco foi tamponada para remover o excesso
        de sais, o que afeta o manejo de nutrientes.
    growing_media_form:
      name: Forma de meio de cultura
      description: Especifica a apresentação física da fibra de coco, o que ajuda
        os produtores a compreender as necessidades de manuseio e hidratação.
    growing_medium_type:
      name: Tipo de meio de cultura
      description: Identifica o substrato necessário para a germinação e o crescimento
        das sementes.
    growth_habit:
      name: Hábito de crescimento
      description: Descreve a forma geral da planta, o que auxilia a clientela nas
        decisões sobre espaçamento e recipientes.
    hand_dryer_accessory_type:
      name: Tipo de acessório para secador de cabelo
      description: Identifica o tipo específico de acessório para secador de mãos,
        de modo que o comprador possa entender de forma rápida do que se trata o produto.
    handle_connection_type:
      name: Tipo de conexão da alça
      description: Especifica o mecanismo usado para fixar o cabo à vassoura, ao esfregão
        ou a outros acessórios de limpeza, garantindo a compatibilidade.
    handle_grip_style:
      name: Estilo de aderência do cabo
      description: Define a forma ou a ergonomia do cabo do garfo.
    handle_length_adjustability:
      name: Ajuste do comprimento do cabo
      description: Descreve se e como o comprimento do cabo pode ser ajustado, permitindo
        à clientela filtrar as opções fixas e telescópicas.
    handle_position:
      name: Posição da alça
      description: Descreve o posicionamento ou estilo da alça no regador, o que influencia
        a ergonomia ao servir e o armazenamento.
    handrail_configuration:
      name: Configuração do corrimão
      description: Indica se o produto inclui corrimãos e a disposição deles.
    hanging_attachment_type:
      name: Tipo de fixação suspensa
      description: Especifica os equipamentos ou o método de fornecimento para pendurar
        o apanhador de sol.
    hardiness_zone:
      name: Zona de resistência
      description: Especifica a zona climática do USDA (ou equivalente) na qual a
        planta pode sobreviver ao ar livre.
    hazards_detected:
      name: Perigos detectados
      description: Lista os perigos específicos que esta unidade foi projetada para
        detectar.
    heating_stages:
      name: Estágios de aquecimento
      description: Especifica o número de estágios de aquecimento ou o nível de modulação
        que a unidade aceita.
    home_alarm_features:
      name: Recursos do alarme
      description: Identifica as funções especiais de um sistema de alarme doméstico,
        como reserva de bateria ou monitoramento profissional.
    hook_style:
      name: Estilo do gancho
      description: Classifica o design/funções do gancho para facilitar a correspondência
        visual e funcional.
    humidifier_features:
      name: Características do umidificador
      description: Destaca as funções ou opções adicionais relevantes que diferenciam
        os modelos de umidificadores e auxiliam na filtragem.
    humidifier_filter_type:
      name: Tipo de filtro do umidificador
      description: Identifica o estilo ou a construção do filtro para que a clientela
        possa encontrar a peça de reposição correta para seu umidificador.
    humidor_accessory_type:
      name: Tipo de acessório para umidificador
      description: Classifica o tipo específico de acessório, permitindo à clientela
        aplicar filtros de forma rápida dentro da categoria principal.
    hydroponic_nutrient_system:
      name: Sistema de nutrientes hidropônicos
      description: Indica o número de partes no sistema de nutrientes hidropônicos
        (por exemplo, uma parte, duas partes etc.) que devem ser combinados antes
        do uso.
    hygrometer_type:
      name: Tipo de higrômetro
      description: Identifica o tipo de higrômetro incluído com o umidificador, se
        houver.
    ice_bucket_accessories_included:
      name: Acessórios para balde de gelo incluídos
      description: Lista os utensílios de bar suplementares fornecidos com o balde
        de gelo.
    ice_bucket_insulation:
      name: Isolamento do balde de gelo
      description: Indica o tipo de parede ou o nível de isolamento do balde de gelo,
        o que afeta o tempo que o gelo permanece congelado.
    ice_cream_maker_accessories_included:
      name: Acessórios incluídos com a máquina de sorvete
      description: Identifica o pacote de itens adicionais em um conjunto de acessórios
        com várias peças, de modo que a clientela saiba exatamente o que receberá.
    ice_shape:
      name: Formato do gelo
      description: Descreve o formato do gelo produzido pela máquina, ajudando os
        usuários a selecionar máquinas que criem o estilo de gelo de sua preferência.
    incense_holder_style:
      name: Estilo do porta-incensos
      description: Identifica o design estrutural do suporte, ajudando a clientela
        a escolher entre diferentes formatos funcionais e estéticos.
    infuser_type:
      name: Tipo de infusor
      description: Indica se está incluído um infusor de frutas ou de chá e qual o
        modelo.
    inner_pot_coating:
      name: Revestimento interno da panela
      description: Identifica o tipo de revestimento da superfície interna da panela,
        indicando as propriedades antiaderentes e a facilidade de limpeza.
    insulation_capability:
      name: Funcionalidade de isolamento
      description: Indica se e como a capa isola bebidas, distinguindo capas puramente
        decorativas daquelas que controlam a temperatura.
    insulation_status:
      name: Status de isolamento
      description: Indica se o cantil é térmico para ajudar a manter a temperatura
        da bebida.
    insulation_technology:
      name: Tecnologia de isolamento
      description: Identifica o tipo de isolamento usado para manter a temperatura.
    insulation_type:
      name: Tipo de isolamento
      description: Especifica se e como o balde para bebidas ou o resfriador é isolado,
        afetando o desempenho de retenção de gelo e o controle da condensação.
    intended_beverage_type:
      name: Tipo de bebida pretendida
      description: Indica a bebida principal para a qual o decantador foi projetado
        ou com a qual é mais comumente usado.
    internal_membrane_type:
      name: Tipo de membrana interna
      description: Identifica o sistema de separação interna que mantém a água e o
        ar separados dentro do tanque.
    iron_cleaner_purpose:
      name: Finalidade do limpador de ferro
      description: Especifica a aplicação principal para o qual o produto de limpeza
        foi projetado.
    ironing_board_form_factor:
      name: Formato da tábua de passar roupa
      description: Classifica o estilo/instalação geral da tábua para auxiliar a clientela
        a encontrar o tipo correto.
    ironing_board_pad_shape:
      name: Formato almofada para tábuas de passar roupa
      description: Indica o formato/perfil geral da almofada para garantir que ela
        se adapte a diferentes modelos de tábua de passar roupas.
    jar_shape:
      name: Formato do vaso
      description: Descreve a forma geométrica ou tradicional geral do vaso decorativo.
    juicer_type:
      name: Tipo de espremedor
      description: Classifica o mecanismo que o espremedor usa para extrair o suco.
    key_blade_type:
      name: Tipo de lâmina de chave
      description: Classifica o estilo físico da lâmina da chave, como plana/com ranhuras,
        tubular ou com reentrâncias.
    kitchen_layout:
      name: Layout da cozinha
      description: Define a configuração geral da cozinha pré-fabricada (por exemplo,
        parede única ou em forma de L) para ajudar a clientela a encontrar conjuntos
        que correspondam às suas preferências de formato e de fluxo de trabalho.
    kitchen_linen_items_included:
      name: Itens de roupa de mesa incluídos
      description: Lista os componentes específicos de roupa de mesa incluídos no
        conjunto, ajudando a clientela a entender exatamente quais itens está adquirindo.
    label_content_type:
      name: Tipo de conteúdo da etiqueta
      description: Descreve se a superfície da etiqueta está em branco, foi pré-impressa
        com o modelo ou formatada de outro modo.
    lamp_arm_style:
      name: Estilo de braço de luminária
      description: Descreve o design do braço/pescoço da luminária, o que afeta a
        capacidade de ajuste e o posicionamento (por exemplo, pescoço de ganso versus
        braço articulado).
    lamp_post_base_mounting_type:
      name: Tipo de montagem da base do poste de iluminação
      description: Especifica como a base é instalada ou fixada ao solo ou à superfície.
    lamp_shade_fitter_type:
      name: Tipo de encaixe para cúpula de luminária
      description: Define o mecanismo de fixação entre a cúpula e a lâmpada, garantindo
        a compatibilidade sem precisar ter que adivinhar.
    lamp_shade_shape:
      name: Formato da cúpula luminária
      description: Especifica a forma geométrica da cúpula, o que permite que a clientela
        localizem de forma rápida as silhuetas desejadas.
    lamp_shade_translucency:
      name: Translucidez da cúpula da luminária
      description: Descreve a quantidade de luz que passa pela cúpula, o que ajuda
        os usuários a escolher o ambiente desejado.
    lampshade_shape:
      name: Formato da cúpula da luminária
      description: Descreve o formato geométrico ou forma da cúpula da luminária.
    laundry_ball_texture:
      name: Textura da bola de lavar roupa
      description: Descreve o estilo da superfície da bola, o que influencia a agitação
        do tecido e a remoção de fiapos.
    laundry_wash_accessory_type:
      name: Tipo de acessório para lavagem de roupa
      description: Identifica o tipo específico de saco ou estrutura para lavagem
        de roupa.
    lawn_aerator_type:
      name: Tipo de aerador de gramado
      description: Classifica os aeradores de gramado de acordo com o design de funcionamento
        principal ou o formato.
    lawn_mower_belt_type:
      name: Tipo de cinto para cortador de grama
      description: Classifica o desenho estrutural ou o perfil da correia.
    lawn_mower_blade_type:
      name: Tipo de lâmina de cortador de grama
      description: Especifica o design de corte ou elevação e o uso pretendido da
        lâmina do cortador de grama.
    lawn_spreader_type:
      name: Tipo de espalhador de grama
      description: Especifica o estilo mecânico ou de configuração de um espalhador
        para grama/jardins, como difusão ou queda.
    lawn_tractor_tread_type:
      name: Tipo de esteira para trator de cortar grama
      description: Descreve o padrão da esteira projetada para superfícies específicas
        ou necessidades de tração.
    lid_features:
      name: Características da tampa
      description: Destaca os elementos funcionais especiais da tampa que facilitam
        o preparo ou a limpeza.
    lid_vent_type:
      name: Tipo de ventilação da tampa
      description: Indica se a tampa permite a saída do vapor e, em caso afirmativo,
        como isso ocorre.
    lift_mechanism:
      name: Mecanismo de elevação
      description: Indica o mecanismo de acionamento usado para levantar, abaixar
        ou inclinar a persiana ou cortina.
    light_exposure_requirement:
      name: Requisito de exposição à luz
      description: Especifica o nível de luz que a ecosfera precisa para se manter
        saudável, sem superaquecer ou estressar os organismos.
    liner_installation_method:
      name: Método de instalação do revestimento
      description: Descreve como o revestimento permanece no lugar na superfície.
    lint_roller_type:
      name: Tipo de papa-bolinhas
      description: Classifica o mecanismo ou design de limpeza do papa-bolinhas para
        remover pelos.
    live_trap_design:
      name: Design de armadilha de captura viva
      description: Classifica o estilo estrutural geral da armadilha
    lock_keying_option:
      name: Opção de chaveamento de fechadura
      description: Especifica como a fechadura é chaveada, auxiliando a clientela
        que precisa de várias fechaduras operadas por uma única chave ou chaves exclusivas
        para cada fechadura.
    lubricant_requirement:
      name: Requisito de lubrificante
      description: Especifica o tipo de lubrificante recomendado ou necessário durante
        a afiação.
    lunch_set_items_included:
      name: Itens incluídos no conjunto para almoço
      description: Lista os componentes individuais que vêm no conjunto de lancheira.
    machete_blade_style:
      name: Estilo da lâmina do facão
      description: Especifica o estilo regional ou funcional tradicional da lâmina
        do facão.
    map_style:
      name: Estilo de mapa
      description: Define o estilo cartográfico ou o foco temático exibido no mapa.
    masher_head_design:
      name: Design da cabeça do espremedor
      description: Classifica o desenho da superfície de moagem, que afeta a textura
        e o esforço necessário.
    mattress_protector_features:
      name: Características do protetor de colchão
      description: Destaca as características funcionais ou de proteção específicas
        dos protetores de colchão, permitindo à clientela filtrar por qualidades como
        impermeabilização ou materiais hipoalergênicos.
    measuring_spoon_features:
      name: Características da colher de medida
      description: Destaca as características especiais de design ou os recursos funcionais
        das colheres de medida.
    meat_tenderizer_face_type:
      name: Tipo de face do amaciador de carne
      description: Descreve a textura da superfície de trabalho da cabeça do amaciador
        de carne.
    meat_tenderizer_mechanism:
      name: Mecanismo do amaciador de carne
      description: Classifica o mecanismo de funcionamento principal do amaciador
        de carne.
    medical_specialty:
      name: Especialidade médica
      description: Especifica a especialidade médica ou área da saúde para a qual
        o equipamento foi projetado
    merv_rating:
      name: Classificação MERV
      description: Define o Valor Mínimo de Eficiência de Relatório (MERV, na sigla
        em inglês), que indica a capacidade do filtro de reter partículas de vários
        tamanhos.
    microwave_compatibility:
      name: Compatibilidade com micro-ondas
      description: Especifica se o item pode ser usado com segurança em um forno de
        micro-ondas.
    microwave_oven_functions:
      name: Funções do forno de micro-ondas
      description: Listas os modos de cozimento predefinidos ou avançados disponíveis,
        permitindo que a clientela encontre modelos de convecção, grelha, cozimento
        por sensor etc.
    milk_frother_type:
      name: Tipo de espumador de leite
      description: Classifica o produto pelo mecanismo de formação de espuma ou formato.
    milk_frothing_method:
      name: Método de formação de espuma de leite
      description: Especifica a tecnologia ou o mecanismo usado para espumar o leite.
    milk_frothing_system:
      name: Sistema de formação de espuma de leite
      description: Especifica o tipo de mecanismo de vaporização ou formação de espuma
        de leite fornecido pela máquina.
    mirror_curvature:
      name: Curvatura do espelho
      description: Especifica a curvatura da superfície refletora, o que afeta o ângulo
        de visão e a distorção.
    mirror_type:
      name: Tipo de espelho
      description: Classifica o estilo geral ou a categoria funcional do espelho.
    mist_output_mode:
      name: Modo de saída de névoa
      description: Indica os padrões de névoa ou configurações de intensidade selecionáveis
        disponíveis no difusor.
    mixing_bowl_features:
      name: Características da tigela para preparo de alimentos
      description: Destaca as características funcionais especiais da tigela que influenciam
        a usabilidade e a manutenção.
    mixing_mechanism:
      name: Mecanismo de mistura
      description: Descreve o mecanismo interno usado para misturar os ingredientes
        do molho.
    mochi_maker_functions:
      name: Funções da máquina de bolinho de arroz (moti)
      description: Lista os modos de operação integrados ou os programas disponibilizados
        pelo aparelho.
    mode_of_action:
      name: Mode de ação
      description: Indica como o fungicida funciona, diferenciando os fungicidas de
        contato dos fungicidas sistêmicos ou translaminares.
    moisture_absorber_form:
      name: Forma do absorvedor de umidade
      description: Descreve o formato físico do produto, permitindo à clientela selecionar
        sacos, recipientes, pacotes etc.
    money_retrieval_method:
      name: Método de remoção de dinheiro
      description: Descreve como o dinheiro guardado é retirado do cofrinho.
    mop_head_type:
      name: Tipo de cabeça do esfregão
      description: Indica o design estrutural do esfregão ou do refil, ajudando a
        clientela a encontrar o modelo correto para suas necessidades de limpeza.
    mop_wringing_mechanism:
      name: Mecanismo de torção do esfregão
      description: Indica como o excesso de líquido é removido do esfregão, ajudando
        a clientela a escolher o estilo de torção que preferir.
    mounting_bolt_pattern:
      name: Padrão de furação de montagem
      description: Especifica o número e o layout dos furos de montagem dos parafusos
        na carcaça do eixo (por exemplo, triangular com três parafusos, quadrado com
        quatro parafusos).
    mouthpiece_shape:
      name: Formato do bocal
      description: Especifica o formato da extremidade da piteira.
    mower_deck_material:
      name: Material da plataforma do cortador
      description: Indica o material de construção da plataforma de corte do cortador,
        o que afeta a durabilidade e o peso.
    mulch_form:
      name: Forma de cobertura vegetal morta
      description: Descreve a forma física ou a consistência da cobertura vegetal
        morta.
    nap_mat_items_included:
      name: Itens incluídos com o colchonete
      description: Informações sobre os componentes ou acessórios específicos que
        acompanham o colchonete.
    napkin_edge_finish:
      name: Acabamento da borda do guardanapo
      description: Especifica a costura ou o acabamento decorativo ao longo da borda
        ou bainha do guardanapo.
    noodle_core_design:
      name: Design do núcleo do macarrão
      description: Indica se o macarrão tem um núcleo sólido ou oco.
    nozzle_adjustability:
      name: Ajuste do bico
      description: Indica se o bico pode ser ajustado para alterar o padrão de pulverização
        ou o fluxo.
    nozzle_material:
      name: Material do bico
      description: Especifica o material dos bicos de pulverização, para considerações
        sobre a durabilidade e a resistência a entupimentos.
    nozzle_style:
      name: Estilo de bocal
      description: Especifica o formato ou o estilo funcional da extremidade do bico
        do tubo.
    nozzle_types_included:
      name: Tipos de bico incluídos
      description: Lista os formatos/estilos de bicos fornecidos com a pistola de
        carne seca, ajudando a clientela a saber quais formatos de produto ele pode
        criar.
    number_of_compartments:
      name: Número de compartimentos
      description: Indica quantas seções separadas a lixeira tem para a separação
        de resíduos ou materiais recicláveis.
    numeral_style:
      name: Estilo numérico
      description: Define o estilo visual ou a presença de numerais no mostrador do
        relógio.
    oil_dispenser_spout_design:
      name: Design do bico do dispensador de óleo
      description: Descreve o estilo do bico ou da saída, o que afeta o controle do
        fluxo e a prevenção de gotejamento.
    organizer_application:
      name: Aplicação do organizador
      description: Especifica o tipo principal de item para o qual o organizador foi
        projetado para armazenar.
    ornament_hook_style:
      name: Estilo de gancho ornamental
      description: Identifica o estilo ou o formato do gancho usado para pendurar
        decorações.
    oscillation_mode:
      name: Mode de oscilação
      description: Descreve se e como o ventilador oscila para distribuir o ar.
    oscillation_type:
      name: Tipo de oscilação
      description: Especifica se e como o ventilador oscila, auxiliando a clientela
        que precisa de ampla circulação de ar.
    outdoor_grill_rack_type:
      name: Tipo de prateleira de grelha para churrasqueira externa
      description: Especifica o estilo funcional da prateleira para esclarecer o uso
        pretendido na cozinha.
    oxygen_indicator_type:
      name: Tipo de indicador de oxigênio
      description: Especifica se um indicador visual está incluído para mostrar se
        o pacote do absorvedor ainda está ativo e qual o seu formato.
    pad_cleaning_action:
      name: Ação de limpeza da almofada
      description: Descreve as principais funções de limpeza da almofada ou o resultado
        final da limpeza.
    pan_bottom_type:
      name: Tipo de fundo da panela
      description: Indica se a panela tem fundo removível ou fundo fixo e sólido.
    pan_perforation_type:
      name: Tipo de perfuração da panela
      description: Indica se o fundo/laterais da panela são sólidos ou perfurados
        para permitir a drenagem de líquidos.
    parasol_opening_mechanism:
      name: Mecanismo de abertura do guarda-sol
      description: Descreve como a cobertura do guarda-sol é aberta/fechada.
    parchment_paper_coating:
      name: Revestimento do papel-manteiga
      description: Identifica o tratamento de superfície aplicado ao papel-manteiga
        para proporcionar propriedades antiaderentes.
    particle_size_grade:
      name: Grau de tamanho das partículas
      description: Descreve a classificação do tamanho dos grânulos da vermiculita,
        o que afeta as características de aeração e a retenção de água.
    patio_heater_safety_features:
      name: Características de segurança para aquecedores de ambiente externo
      description: Destaca os mecanismos de segurança integrados, projetados para
        prevenir acidentes e garantir uma operação segura.
    pattern_match_type:
      name: Tipo de correspondência de padrão
      description: Especifica como o padrão deve ser alinhado entre as tiras durante
        a instalação.
    pendulum_compatibility:
      name: Compatibilidade do pêndulo
      description: Indica se o mecanismo pode acionar um pêndulo e se um pêndulo estiver
        incluído.
    perch_design:
      name: Design de poleiro
      description: Descreve o estilo estrutural ou a forma do poleiro.
    perch_surface_texture:
      name: Textura da superfície do poleiro
      description: Define a textura/acabamento da superfície do poleiro que afeta
        aderência e resistência ao desgaste das unhas.
    pet_safety:
      name: Segurança para animais de estimação
      description: Indica se a planta é tóxica ou não tóxica para animais de estimação
        domésticos comuns.
    pet_toxicity:
      name: Toxicidade para animais de estimação
      description: Indica se a planta é tóxica para animais de estimação domésticos
        comuns, garantindo a segurança dos clientes que têm animais.
    ph_adjustment_direction:
      name: Direção de ajuste de pH
      description: Indica se o produto foi formulado para aumentar (pH para cima)
        ou diminuir (pH para baixo) o nível de pH da solução.
    pie_pan_edge_style:
      name: Estilo da borda de forma para tortas
      description: Descreve o desenho da borda, que afeta a aparência da crosta e
        a facilidade com que ela se solta.
    pin_shape:
      name: Formato do fixador
      description: Descreve a forma geral do fixador que ancora o tecido.
    pipe_connection_method:
      name: Método de conexão de tubos
      description: Especifica o tipo de conexão nas extremidades da curva do tubo
        (por exemplo, macho, fêmea, encaixe por pressão, rosqueado) para garantir
        a compatibilidade da instalação.
    piping_tip_shape:
      name: Formato da ponta do bico
      description: Define o formato ou o desenho de um bico de confeitar/decorar.
    pitcher_spout_style:
      name: Estilo de bico de jarro
      description: Define o design do bico, que afeta a precisão da latte art e o
        controle do despejo.
    pizza_cutter_design:
      name: Design do cortador de pizza
      description: Identifica o estilo estrutural do cortador de pizza, ajudando a
        clientela a escolher entre diferentes mecanismos de corte.
    pizza_pan_style:
      name: Estilo da forma de pizza
      description: Identifica o estilo de construção/design da forma de pizza, indicando
        como ela assa a massa e o tipo de pizza para o qual é indicada.
    plant_care_difficulty:
      name: Dificuldade no cuidado com as plantas
      description: Indica o nível de cuidado necessário para manter a planta, ajudando
        iniciantes e especialistas a fazerem uma escolha adequada.
    plant_container_type:
      name: Tipo de recipiente para plantas
      description: Identifica o tipo de recipiente incluído com o arbusto artificial,
        se houver.
    plant_life_cycle:
      name: Ciclo de vida da planta
      description: Indica se a planta é anual, bienal ou perene.
    planter_material:
      name: Material da floreira
      description: Indica o material do vaso/floreira incluído, se fornecido.
    plate_coupling_pattern:
      name: Padrão de acoplamento do prato
      description: Especifica a configuração do cubo inferior que se encaixa no acoplador
        do motor do prato giratório do micro-ondas, garantindo a rotação correta.
    plate_purpose:
      name: Finalidade da placa
      description: Define a função da placa dentro do sistema de corte da grama.
    plate_style:
      name: Estilo de prato
      description: Identifica o estilo específico ou o uso pretendido do prato de
        jantar.
    pole_construction_type:
      name: Tipo de construção da haste
      description: Define o estilo estrutural do poste, o que afeta a configuração
        e a portabilidade.
    pool_chemical_type:
      name: Tipo de produto químico para piscina
      description: Classifica as funções principal ou a química do produto de tratamento
        de piscina.
    pool_filter_type:
      name: Tipo de filtro de piscina
      description: Identifica a tecnologia de filtragem ou o estilo de construção
        usado pelo filtro da piscina ou spa.
    pool_game_type:
      name: Tipo de jogo de piscina
      description: Identifica o tipo específico de jogo ou esporte que o produto permite
        praticar na piscina.
    pool_ladder_design:
      name: Design da escada para piscina
      description: Classifica o projeto estrutural geral da escada para piscina.
    pool_liner_installation_style:
      name: Estilo de instalação do revestimento da piscina
      description: Identifica o método de fixação usado para prender o revestimento
        à parede da piscina.
    pool_lounge_style:
      name: Estilo da espreguiçadeira de piscina
      description: Classifica o estilo estrutural da espreguiçadeira da piscina para
        filtragem visual ou funcional.
    pool_lounger_features:
      name: Características da espreguiçadeira de piscina
      description: Destaca as características integradas especial que adicionam funcionalidade
        ou conforto à espreguiçadeira.
    pool_skimmer_type:
      name: Tipo de peneira para limpeza de piscina
      description: Classifica o design da escumadeira, ajudando a clientela a comparar
        as escumadeiras manuais para fritura com as automáticas ou flutuantes.
    pool_toy_features:
      name: Características do brinquedo de piscina
      description: Destaca as características funcionais ou de design notáveis específicas
        dos brinquedos de piscina.
    pool_type:
      name: Tipo de piscina
      description: Classifica o estilo estrutural da piscina.
    pool_vacuum_type:
      name: Tipo de aspirador de piscina
      description: Indica o estilo de funcionamento ou mecanismo de acionamento de
        um aspirador de piscina.
    popcorn_kernel_variety:
      name: Variedade do grão de pipoca
      description: Especifica o formato ou a variedade natural do grão de pipoca.
    portafilter_type:
      name: Tipo de porta-filtro
      description: Identifica o estilo estrutural do porta-filtro, que afeta o método
        de extração e o fluxo de trabalho.
    post_installation_method:
      name: Método de instalação do poste
      description: Define como o poste da caixa de correio é instalado ou fixado no
        lugar.
    pour_spout_design:
      name: Design do bico direcionador
      description: Especifica as características especiais ou o estilo do bico direcionador
        que influenciam o controle de fluxo.
    pour_spout_style:
      name: Estilo de bico direcionador
      description: Descreve o design do bico direcionador do dispensador, o que afeta
        o controle do fluxo e a resistência ao gotejamento.
    power_equipment_hitch_type:
      name: Tipo de engate para equipamentos elétricos
      description: Identifica a interface de conexão que o acessório usa para ser
        montado em tratores ou unidades de potência.
    predator_guard_style:
      name: Estilo de guarda contra predadores
      description: Classifica o projeto estrutural da proteção, ajudando a clientela
        a encontrar rapidamente soluções em forma de cone, disco, gaiola ou placa
        perfurada.
    preferred_soil_type:
      name: Tipo de solo preferido
      description: Indica a composição do solo em que a planta se desenvolve melhor.
    preparation_type:
      name: Tipo de preparação
      description: Descreve o método necessário para preparar o alimento para o consumo.
    preservation_method:
      name: Método de preservação
      description: Informação sobre a técnica usada para secar ou preservar as flores.
    pressure_cooker_handle_type:
      name: Tipo de alça da panela de pressão
      description: Indica o modelo ou a localização da alça da panela de pressão que
        está sendo substituído.
    pressure_cooker_safety_features:
      name: Recursos de segurança da panela de pressão
      description: Lista os mecanismos de segurança integrados que previnem acidentes,
        como tampas com trava ou válvulas de alívio de pressão.
    pressure_settings:
      name: Configurações de pressão
      description: Especifica quantos níveis de pressão distintos a panela de pressão
        oferece ao usuário.
    pressure_washer_outlet_connector_type:
      name: Tipo de conector de saída para lavadora de alta pressão
      description: Identifica a especificação do conector na parte frontal da cabeça
        da pistola, usado para conectar lanças ou bicos.
    pressure_washer_spray_pattern:
      name: Padrão de pulverização da lavadora de alta pressão
      description: Especifica o ângulo ou padrão de pulverização produzido pelo bico
        da lavadora de alta pressão.
    print_edition_type:
      name: Tipo de edição impressa
      description: Classifica o tipo de edição da gravura, indicando sua raridade
        e valor.
    printed_sides:
      name: Laterais impressas
      description: Indica se o produto é impresso em um lado ou em ambos os lados.
    procedure:
      name: Procedimento
      description: Especifica o procedimento médico ou tipo de treinamento para o
        qual o equipamento foi projetado
    protected_item_type:
      name: Tipo de item protegido
      description: Especifica o tipo de documento ou objeto que o protetor RFID foi
        projetado para proteger.
    pulley_groove_profile:
      name: Perfil da ranhura da polia
      description: Define o estilo da interface da correia da polia guia.
    pulp_ejection_type:
      name: Tipo de ejeção de polpa
      description: Indica como a polpa é expelida da máquina.
    pump_type:
      name: Tipo de bomba
      description: Especifica o design do mecanismo da bomba da lavadora de alta pressão.
    punch_bowl_components_included:
      name: Componentes incluídos da tigela para ponche
      description: Lista os itens complementares que acompanham a tigela para ponche,
        permitindo à clientela entender o conteúdo do conjunto de forma rápida.
    quilt_construction_type:
      name: Tipo de construção do acolchoado
      description: Descreve o método de costura interna ou de deflexão usado em um
        acolchoado, o que afeta a distribuição de calor e a durabilidade.
    radiator_design_type:
      name: Tipo de design do radiador
      description: Identifica o estilo estrutura do radiador.
    rain_barrel_design:
      name: Design do tanque de chuva
      description: Classifica o estilo estrutural do tanque de chuva.
    rain_chain_style:
      name: Estilo de corrente de chuva
      description: Especifica o design estrutural da corrente de chuva para que os
        clientes possam filtrar por preferências visuais e desempenho do fluxo de
        água.
    range_hood_filter_type:
      name: Tipo de filtro para exaustor
      description: Classifica o tipo de filtro de substituição para garantir o encaixe
        e o desempenho corretos.
    range_installation_type:
      name: Tipo de instalação do fogão
      description: Descreve a configuração de como o fogão é instalado na cozinha.
    recorder_type:
      name: Tipo de gravador
      description: Identifica a tecnologia de gravação usada (por exemplo, DVR, NVR)
        para ajudar na comparação entre soluções as analógicas e IP.
    refrigerator_configuration:
      name: Configuração da geladeira
      description: Identifica o estilo geral do layout das portas e compartimentos
        da geladeira.
    release_type:
      name: Tipo de liberação
      description: Indica a rapidez com que os nutrientes são liberados do fertilizante.
    relief_style:
      name: Estilo de relevo
      description: Indica se as elevações da superfície do mapa são altas, rebaixadas
        ou planas.
    repellent_mechanism:
      name: Mecanismo repelente
      description: Especifica o principal mecanismo de dissuasão empregado pelo produto,
        como aroma químico, som ultrassônico ou luz intermitente.
    replaceable_brush_head:
      name: Cabeça de escova substituível
      description: Especifica se a cabeça da escova pode ser destacada e substituída
        quando estiver gasta.
    rib_material:
      name: Material da costela
      description: Especifica o material usado para as varetas ou raios do guarda-chuva,
        como fibra de vidro ou alumínio.
    rice_cooker_functions:
      name: Funções da panela elétrica de arroz
      description: Lista os programas de cozimento predefinidos ou modos disponíveis
        na panela de arroz, permitindo à clientela comparar a versatilidade.
    roaster_oven_functions:
      name: Funções do forno com grelha
      description: Lista as funções de cozimento predefinidas ou suportadas disponíveis
        em um forno com grelha.
    roasting_rack_shape:
      name: Formato da prateleira de grelhar
      description: Especifica o formato estrutural ou o design da prateleira, o que
        afeta o encaixe e o desempenho no cozimento.
    rockwool_form:
      name: Forma de lã de rocha
      description: Especifica a forma física ou configuração do produto de lã de rocha.
    roof_style:
      name: Estilo do telhado
      description: Define o estilo arquitetônico ou o formato do telhado.
    rose_attachment:
      name: Acessório de borrifador
      description: Indica se a lata inclui um bocal de pulverização/borrifador removível,
        se é fixo ou se não possui bocal algum.
    safety_mirror_features:
      name: Recursos do espelho de segurança
      description: Destaca as características especiais de desempenho que melhoram
        a durabilidade ou a visibilidade.
    salad_spinner_mechanism:
      name: Mecanismo da centrífuga de salada
      description: Especifica o mecanismo de centrifugação usado para secar as verduras,
        ajudando a clientela a escolher o estilo de operação de sua preferência.
    sand_color:
      name: Cor da areia
      description: Indica a cor da areia ou do enchimento granular dentro da ampulheta,
        independentemente da cor da estrutura externa.
    sand_type:
      name: Tipo de areia
      description: Especifica o tipo de areia com base em sua composição ou aplicação
        comum.
    saucer_functionality:
      name: Funcionalidade do pires
      description: Especifica o estilo funcional do pires ou da bandeja, como designs
        com autoirrigação ou reservatório.
    sauna_form_factor:
      name: Formato da sauna
      description: Define o estilo estrutural geral da unidade de sauna.
    sauna_heater_type:
      name: Tipo de aquecedor de sauna
      description: Indica o tipo de aquecedor incluído ou compatível com o kit de
        sauna.
    scoop_release_mechanism:
      name: Mecanismo de liberação da concha
      description: Descreve o tipo de mecanismo de liberação do produto integrado
        à concha.
    scoop_surface_design:
      name: Design da superfície da concha
      description: Descreve se a superfície da pá é sólida ou perfurada, para permitir
        a drenagem do óleo.
    scoop_wall_design:
      name: Design da parede da concha
      description: Descreve se a superfície da concha é sólida ou perfurada/ranhurada
        para permitir a passagem de pequenos pedaços ou óleo.
    scrubber_head_type:
      name: Tipo de cabeça do escovão
      description: Descreve a ação mecânica ou o projeto da cabeça do escovão.
    scrubbing_strength:
      name: Força de escovação
      description: Indica o nível relativo de escovação/abrasividade proporcionado
        pelo produto.
    seafood_utensil_items_included:
      name: Utensílios incluídos para frutos do mar
      description: Lista ferramentas adicionais para marisco incluídas com o quebrador,
        permitindo aos compradores comparar quebradores individuais com kits completos.
    sealing_modes:
      name: Mode de vedação
      description: Lista os programas de vedação operacionais disponíveis no aparelho.
    security_sensor_subtype:
      name: Subtipo de sensor de segurança
      description: Define as funções/tipo específicos do sensor de segurança.
    seed_treatment:
      name: Tratamento de sementes
      description: Especifica o processamento especial aplicado às sementes.
    self_cleaning_method:
      name: Método autolimpante
      description: Especifica o tipo de tecnologia de autolimpeza que o forno u.
    serveware_pieces_included:
      name: Peças incluídas de utensílios para servir
      description: Lista os diferentes componentes de utensílios de servir contidos
        em um conjunto de várias peças.
    shaker_set_pieces_included:
      name: Peças incluídos do conjunto de saleiro e pimenteiro
      description: Lista os componentes individuais que acompanham o conjunto, além
        dos saleiros e pimenteiros básicos.
    sheath_material:
      name: Material da bainha
      description: Material da bainha da sonda termopar, o que afeta a resistência
        à corrosão e a temperatura máxima de serviço.
    shelf_location_in_appliance:
      name: Local da gôndola no aparelho
      description: Indica o local onde a gôndola deve ser instalada dentro do aparelho.
    shoe_brush_type:
      name: Tipo de escova para sapatos
      description: Classifica o estilo funcional da escova para sapatos, permitindo
        `clientela localizar escovas projetadas para tarefas específicas.
    shoe_dryer_technology:
      name: Tecnologia do secador de sapatos
      description: Especifica a principal tecnologia de secagem usada pelo secador
        de calçados.
    shoe_organizer_design:
      name: Design do organizador de sapatos
      description: Identifica o estilo ou formato geral do organizador de sapatos
        para ajudar a clientela a filtrar os itens.
    shoe_polish_form:
      name: Forma da graxa para sapatos
      description: Identifica a forma física ou de entrega do produto de graxa para
        sapatos.
    shoe_treatment_purpose:
      name: Finalidade do tratamento para calçados
      description: Identifica a principal função ou benefício do produto de tratamento
        para sapatos.
    shoe_tree_design:
      name: Design do modelador de sapatos
      description: Identifica o estilo ou mecanismo estrutural do modelador de sapatos,
        o que afeta a capacidade de ajuste, o tipo de calçado pretendido e a usabilidade.
    shot_glass_style:
      name: Estilo do copo de dose
      description: Classifica o estilo ou formato específico do copo de dose.
    shovel_handle_grip_type:
      name: Tipo de empunhadura do cabo da pá
      description: Especifica o estilo de empunhadura no final do cabo.
    shovel_head_type:
      name: Tipo de cabeça de pá
      description: Classifica o formato/estilo funcional da cabeça da pá ou da enxada.
    shower_curtain_ring_type:
      name: Tipo de anel para cortina de chuveiro
      description: Identifica o estilo funcional do anel da cortina de chuveiro.
    shrub_shape:
      name: Formato do arbusto
      description: Descreve a forma geral esculpida/topiária do arbusto artificial.
    signature_presence:
      name: Presença de assinatura
      description: Especifica se e como a pintura está assinada pelo artista.
    sink_caddy_features:
      name: Características do suporte para pia
      description: Destaca os elementos funcionais especiais de um suporte para pia.
    size_adjustability:
      name: Ajustabilidade do tamanho
      description: Indica se o comprimento/largura do produto pode ser ajustada para
        se adequar a vários tamanhos de sapato.
    skewer_tip_type:
      name: Tipo de ponta do espeto
      description: Define o tipo de ponta de um espeto, o que afeta a facilidade de
        perfurar o alimento e a apresentação geral.
    sleeping_position_suitability:
      name: Adequação da posição para dormir
      description: Indica para quais posições de dormir o travesseiro foi projetado.
    sleeve_insulation:
      name: Isolamento da manga
      description: Indica se a manga oferece isolamento térmico para manter as bebidas
        frias ou quentes.
    slice_style:
      name: Estilo de fatia
      description: Especifica o estilo de corte principal produzido pela fatiadora
        de cozinha, como juliana ou waffle.
    slipcover_stretch_type:
      name: Tipo de elasticidade da capa protetora
      description: Especifica o grau e a direção da elasticidade do tecido usado na
        capa.
    smoker_type:
      name: Tipo de defumador
      description: Classifica o defumador de acordo com o design estrutural ou método
        de defumação.
    smoking_chip_size:
      name: Tamanho da lasca para defumação
      description: Indica o corte/tamanho físico das lascas de madeira para defumação,
        o que afeta a taxa de queima e a adequação para diferentes grelhas ou defumadores.
    snow_blower_stage_type:
      name: Tipo de estágios do limpador de neve
      description: Indica o número de estágios da rosca/impulsor usados para mover
        e descarregar a neve, uma especificação primária usada para diferenciar máquinas
        de um, dois e três estágios.
    soap_dispenser_operation_type:
      name: Tipo de operação do dispensador de sabão
      description: Especifica o mecanismo de ativação usado para dispensar sabonete
        ou loção.
    soil_texture:
      name: Textura do solo
      description: Descreve o tamanho/composição predominante das partículas do solo
        que afetam a drenagem e a aeração.
    spa_installation_type:
      name: Tipo de instalação do spa
      description: Classifica o spa com base em como ele é instalado ou configurado
        no local.
    space_heater_safety_features:
      name: Características de segurança do aquecedor
      description: Destaca os mecanismos de segurança integrados que protegem os usuários
        e a propriedade.
    spice_organizer_features:
      name: Características do organizador de temperos
      description: Destaca as características funcionais especiais dos organizadores
        de temperos.
    spray_pattern:
      name: Padrão de spray
      description: Define o tipo de dispersão de óleo produzida pelo bico pulverizador.
    sprayer_operation_mechanism:
      name: Mecanismo de operação do pulverizador
      description: Especifica como a pressão é gerada para distribuir o óleo do pulverizador.
    spring_type:
      name: Tipo de mola
      description: Identifica o tipo de mola usada no mecanismo da biseladora.
    sprinkle_opening_style:
      name: Estilo de abertura de aspersão
      description: Define a grossura ou o estilo das perfurações/malha usadas para
        dispensar o cacau (malha fina ou orifícios grandes etc.).
    sprinkler_orientation:
      name: Orientação do aspersor
      description: Indica a orientação e o estilo de instalação da cabeça do aspersor
        contra incêndio.
    sprinkler_response_type:
      name: Tipo de resposta do aspersor
      description: Especifica a característica de resposta térmica do aspersor.
    sprinkler_type:
      name: Tipo de aspersor
      description: Classifica a ação mecânica ou o estilo de distribuição do aspersor
        para facilitar a comparação e a filtragem.
    sprinkler_valve_type:
      name: Tipo de válvula do aspersor
      description: Define o tipo funcional ou de acionamento da válvula do aspersor.
    squirrel_feed_type:
      name: Tipo de ração para esquilos
      description: Identifica os tipos de ração que o comedouro foi projetado para
        dispensar, garantindo a compatibilidade com os alimentos preferidos dos esquilos.
    squirrel_resistance:
      name: Resistência a esquilos
      description: Indica se a cesta de sebo incorpora características projetadas
        para impedir que os esquilos acessem o sebo.
    stackability:
      name: Capacidade de empilhar
      description: Indica se várias unidades podem ser empilhadas com segurança para
        armazenamento com otimização de espaço.
    stackable_design:
      name: Design empilhável
      description: Indica se o recipiente foi projetado para ser empilhado com segurança,
        esteja ele cheio ou vazio.
    stacking_capability:
      name: Funcionalidade de empilhamento
      description: Especifica se o recipiente pode ser empilhado, encaixado, removido
        ou não pode ser empilhado com outros recipientes.
    stainless_steel_cleaner_features:
      name: Características do limpador de aço inoxidável
      description: Especifica as características de desempenho especiais do produto
        que são exclusivas ou especialmente relevantes para o cuidado com o aço inoxidável.
    staple/pin_shape:
      name: Formato do grampo/pino
      description: Define o formato geral do fixador, ajudando a clientela a escolher
        entre grampos em forma de U, pinos com a parte superior arredondada etc.
    staple_coating:
      name: Revestimento do grampo
      description: Descreve o revestimento protetor aplicado ao grampo ou pino para
        evitar ferrugem ou aumentar sua durabilidade.
    steam_nozzle_type:
      name: Tipo de bico de vapor
      description: Identifica o estilo funcional do bocal de encaixe do limpador a
        vapor.
    steam_table_pan_cover_features:
      name: Características da tampa da panela de mesa térmica
      description: Destaca as características funcionais especiais das tampas para
        panela de mesa térmica que auxiliam nas operações de serviço de alimentação.
    steam_table_pan_size:
      name: Tamanho da panela da mesa térmica
      description: Indica a fração padronizada Gastronorm/caçarolas de linhas de hotel
        (por exemplo, cheia, 1/2, 1/3) para a qual a bandeja ou tampa foi projetada.
    steam_table_pan_size_compatibility:
      name: Compatibilidade de tamanho da panela de mesa térmica
      description: Indica o tamanho padrão ou Gastronorm das panelas que a unidade
        pode acomodar.
    steam_table_pan_type:
      name: Tipo de panela de mesa térmica
      description: Especifica o estilo de construção da panela, o que afeta o desempenho
        de drenagem e aquecimento.
    stemware_design:
      name: Design da taça
      description: Especifica se a taça tem uma haste tradicional ou se não tem haste.
    stick_tip_style:
      name: Estilo da ponta do palito
      description: Define o desenho da ponta do palito, o que influencia a forma como
        ele perfura ou segura os alimentos.
    stocking_toe_orientation:
      name: Orientação da ponta da meia
      description: Especifica a direção para a qual a ponta da meia aponta quando
        pendurada, o que afeta a simetria visual ao exibir várias meias.
    stopper_type:
      name: Tipo de rolha
      description: Especifica o tipo de tampa que acompanha o decantador, se houver.
    strainer_style:
      name: Estilo do coador
      description: Classifica o design do coador ou escorredor.
    strainer_type:
      name: Tipo de coador
      description: Especifica o estilo ou design do coador, indicando o uso culinário
        pretendido e a construção da malha.
    strap_end_fitting_type:
      name: Tipo de encaixe da extremidade da alça
      description: Especifica o equipamento ou acessório localizado na extremidade
        da correia de tração que facilita a conexão, a ancoragem ou o ajuste.
    straw_dispensing_mechanism:
      name: Mecanismo de distribuição de canudos
      description: Descreve o método de distribuição de canudos, auxiliando a clientela
        que busca características específicas de higiene ou conveniência.
    sugar_dispenser_mechanism:
      name: Mecanismo de distribuição de açúcar
      description: informações sobre como o açúcar é dispensado do recipiente, auxiliando
        a clientela a selecionar o estilo de servir que preferir.
    suitable_for_pool_shape:
      name: Adequado para o formato de piscina
      description: Indica com quais formatos de piscina o acessório pode ser usado,
        ajudando os usuários a garantir o encaixe correto.
    suitable_pool_surface_type:
      name: Tipo de superfície de piscina adequado
      description: Identifica os materiais da superfície da piscina para os quais
        a escova/vassoura foi projetada, evitando danos à superfície e garantindo
        uma limpeza ideal.
    suitable_spread_material:
      name: Material adequado para espalhar
      description: Identifica os tipos de materiais que o espalhador foi projetado
        para distribuir.
    sundial_type:
      name: Tipo relógio de sol
      description: Identifica o estilo de design ou a configuração científica do relógio
        de sol.
    supplement_function:
      name: Funções suplementares
      description: Classifica os suplementos de acordo com sua finalidade principal,
        ajudando os produtores a escolher o aditivo certo para as necessidades específicas
        das plantas.
    surface_reflectivity:
      name: Refletividade da superfície
      description: Indica se a superfície da placa foi projetada para refletir a luz,
        melhorando a visibilidade noturna.
    sweetener_type:
      name: Tipo de adoçante
      description: Identifica o principal agente adoçante usado no xarope.
    table_skirt_pleat_style:
      name: Saia de mesa estilo plissado
      description: Define o estilo de pregas ou franzidos decorativos da saia, o que
        auxilia a clientela na combinação estética dos temas.
    tablecloth_clip_design:
      name: Design do prendedor de toalha de mesa
      description: Descreve o mecanismo ou estilo do prendedor de toalha de mesa.
    tablecloth_features:
      name: Características da toalha de mesa
      description: Destaca as características especiais de desempenho ou design da
        toalha de mesa.
    tamper_evident_feature:
      name: Características à prova de violação
      description: Indica a presença e o tipo de funcionalidade inviolável incorporada
        na tampa.
    tang_type:
      name: Tipo de espiga
      description: Indica o desenho da espiga de uma faca, especificando até que ponto
        o metal da lâmina se estende para dentro do cabo.
    teapot_spout_style:
      name: Estilo de bico do bule
      description: Descreve o design do bico do bule, o que afeta o controle do fluxo
        de chá e a estética.
    temperature_zones:
      name: Zonas de temperatura
      description: Identifica quantas zonas de temperatura controláveis independentemente
        a adega oferece.
    thermocouple_junction_type:
      name: Tipo de junção de termopar
      description: Indica a construção da junção sensora, o que afeta o tempo de resposta
        e o isolamento elétrico.
    thermometer_design:
      name: Design de termômetro
      description: Especifica o estilo ou a tecnologia de funcionamento fundamental
        do termômetro doméstico.
    thermos_handle_type:
      name: Tipo de alça de garrafa térmica
      description: Descreve o estilo do cabo ou auxílio de transporte integrado à
        garrafa térmica.
    thread_standard:
      name: Padrão de rosca
      description: Identifica a especificação da rosca usada nas conexões do acessório
        para garantir a compatibilidade cruzada com componentes hidráulicos.
    tilt_mechanism:
      name: Mecanismo de inclinação
      description: Especifica o mecanismo que permite que o dossel se incline para
        um posicionamento ideal da sombra.
    time_format:
      name: Formato de tempo
      description: Indica se o relógio pode exibir a hora no formato de 12 horas,
        24 horas ou em ambos os formatos.
    timer_mechanism:
      name: Mecanismo do cronômetro
      description: Identifica o mecanismo subjacente usado para medir o tempo.
    tine_position:
      name: Posição dos dentes
      description: Descreve a configuração dos dentes em relação às rodas/motor, o
        que afeta a manobrabilidade e a penetração no solo.
    tire_construction:
      name: Construção do pneu
      description: Identifica o método de construção interna da carcaça do pneu.
    tire_construction_type:
      name: Tipo de construção do pneu
      description: Identifica se o pneu é de construção diagonal ou radial, o que
        afeta a flexibilidade, a capacidade de carga e a qualidade de deslocamento.
    tire_tread_pattern:
      name: Padrão da banda de rodagem do pneu
      description: Descreve o estilo da banda de rodagem do pneu, indicando sua adequação
        para diferentes tipos de terreno e necessidades de tração.
    tissue_lotion_content:
      name: Conteúdo da loção para tecidos
      description: Indica se os lenços de papel contêm loção ou outros aditivos suavizantes.
    toaster_features:
      name: Características da torradeira
      description: Lista as funções especiais e os elementos de design disponíveis
        na torradeira.
    tong_type:
      name: Tipo de pinça
      description: Especifica o estilo principal ou o uso pretendido da pinça.
    toothbrush_holder_features:
      name: Características do porta-escova de dentes
      description: Destaca as funções especiais ou os elementos de design que diferenciam
        o suporte.
    toothpick_dispensing_mechanism:
      name: Mecanismo dispensador de palitos de dente
      description: Identifica o mecanismo pelo qual os palitos de dente são dispensados.
    topographical_relief:
      name: Relevo topográfico
      description: Indica se a superfície do mapa apresenta topografia elevada.
    towel_holder_design:
      name: Design do suporte para toalhas
      description: Descreve o estilo estrutural de um suporte para toalhas, como em
        barra ou em anel.
    towel_weave:
      name: Tecido da toalha
      description: Descreve a construção ou o estilo de tecelagem do tecido da toalha,
        o que afeta a textura, a absorção e o tempo de secagem.
    track_lighting_rail_type:
      name: Tipo de trilho de iluminação de pista
      description: Define o padrão mecânico/elétrico do trilho, determinando quais
        acessórios e conectores são compatíveis.
    track_lighting_system_compatibility:
      name: Compatibilidade do sistema de iluminação de pista
      description: Especifica o padrão elétrico e mecânico do dispositivo ou acessório
        para o qual o dispositivo foi projetado.
    track_rail_circuit_configuration:
      name: Configuração do circuito do trilho de pista
      description: Indica o número ou estilo de circuitos elétricos do trilho de pista,
        o que afeta o controle independente do grupo de luminárias.
    track_system_standard:
      name: Padrão do sistema de pistas
      description: Identifica o padrão físico da pista ao qual a fonte de alimentação
        se adapta, permitindo que a clientela combine os componentes com sua pista
        (por exemplo, H, J ou L).
    tractor_tire_application:
      name: Aplicação do pneu para trator
      description: Indica o aplicação ou o ambiente principal para o qual o pneu foi
        projetado.
    tractor_tire_tread_classification:
      name: Classificação dos padrões de banda de rodagem dos pneus de tratores
      description: Classifica o padrão da banda de rodagem dos pneus do trator de
        acordo com as normas agrícolas e industriais.
    tree_shape:
      name: Formato da árvore
      description: Descreve a silhueta ou o perfil geral de uma árvore artificial.
    trigger_type:
      name: Tipo de acionador
      description: Especifica o mecanismo acionador usado para controlar o fluxo de
        água no bocal.
    trimmer_line_feed_system:
      name: Sistema de alimentação de fio de corte
      description: Identifica como a linha de corte é avançada a partir da cabeça
        durante a operação.
    trimmer_line_shape:
      name: Formato da linha de corte
      description: Descreve o formato da seção transversal do fio de corte, o que
        influencia o desempenho do corte e o ruído.
    turntable_type:
      name: Tipo de plataforma giratória
      description: Identifica o estilo da superfície de cozimento, distinguindo entre
        os tradicionais pratos giratórios de vidro e os modelos planos ou não giratórios.
    ultrasonic_cleaner_accessories_included:
      name: Acessórios para limpador ultrassônico incluídos
      description: Lista os componentes adicionais que acompanham o produto de limpeza,
        de modo que a clientela saiba exatamente o que está na caixa.
    umbrella_base_type:
      name: Tipo de base do guarda-chuva
      description: Define o estilo estrutural ou o design de montagem da base.
    umbrella_opening_mechanism:
      name: Mecanismo de abertura do guarda-chuva
      description: Define como a cobertura do guarda-chuva é aberta e fechada.
    umbrella_type:
      name: Tipo de guarda-chuva
      description: Especifica o design geral ou formato do guarda-chuva.
    upf_rating:
      name: Classificação UPF
      description: Indica o fator de proteção ultravioleta (UPF) do tecido da cobertura
        do guarda-sol, quantificando a eficácia no bloqueio dos raios UV prejudiciais.
    utensil_flexibility:
      name: Flexibilidade dos utensílios
      description: Indica a rigidez ou flexibilidade do corpo do raspador, o que afeta
        adequação para tigelas curvas ou massas firmes.
    utensil_holder_features:
      name: Características do porta-utensílios
      description: Descreve as características funcionais especiais de um porta-utensílios
        de cozinha.
    utensil_tray_features:
      name: Características da bandeja para utensílios
      description: Destaca as características especiais que melhoram a funcionalidade
        da bandeja.
    vacuum_hose_connection_type:
      name: Tipo de conexão da mangueira de vácuo
      description: Descreve o tipo de conector nas extremidades da mangueira, garantindo
        o encaixe mecânico correto com aspiradores ou acessórios.
    valance_style:
      name: Estilo do cortinado
      description: Identifica o desenho decorativo do cortinado, ajudando a clientela
        a escolher um estilo que combine com a sua decoração.
    valet_organizer_features:
      name: Características do organizador de cabideiros
      description: Destaca as funcionalidades organizacionais específicas integradas
        à mesinha com carregador.
    valve_configuration:
      name: Configuração da válvula
      description: Define o estilo funcional da válvula da mangueira de jardim, ajudando
        a clientela a selecionar de forma rápida a solução correta para sua configuração
        de irrigação.
    valve_stem_angle:
      name: Ângulo da haste da válvula
      description: Especifica a orientação/ângulo da haste da válvula em relação à
        câmara de ar, o que afeta a facilidade de inserção e o encaixe no aro.
    vase_filler_type:
      name: Tipo de enchimento do vaso
      description: Classifica o produto de acordo com o tipo específico de material
        de enchimento ou a forma.
    vent_pipe_type:
      name: Tipo de tubo de ventilação
      description: Classifica o estilo de construção da chaminé ou do tubo de ventilação.
    vent_style:
      name: Estilo de ventilação
      description: Classifica o estilo estrutural ou a finalidade do componente de
        ventilação.
    waffle_style:
      name: Estilo de waffle
      description: Identifica a grade ou o padrão de waffle produzido pelas placas.
    wallpaper_removal_type:
      name: Tipo de remoção do papel de parede
      description: Indica a facilidade de remoção em caso de redecoração.
    wallpaper_washability_rating:
      name: Classificação de lavabilidade do papel de parede
      description: Define como a superfície do papel de parede pode ser limpa após
        a instalação.
    warmer_type:
      name: Tipo de aquecedor
      description: Especifica o mecanismo principal de aquecimento ou o uso pretendido
        do aquecedor de velas ou de óleo.
    warmth_level:
      name: Nível de aquecimento
      description: Classifica o nível geral de aquecimento ou a adequação sazonal
        da colcha ou do edredom.
    warmth_rating:
      name: Classificação de calor
      description: Indica o nível de isolamento térmico de um cobertor, semelhante
        à classificação TOG em roupas de cama.
    waste_container_lid_features:
      name: Características da tampa da lixeira
      description: Destaca as funcionalidades especiais ou melhorias incorporadas
        na tampa.
    waste_container_sign_message:
      name: Mensagem do sinal da lixeira
      description: Define o fluxo de resíduos específico ou o texto de advertência
        impresso no rótulo ou na placa.
    water_filtration_technology:
      name: Tecnologia de filtragem de água
      description: Descreve a tecnologia ou o mecanismo principal usado para purificar
        a água.
    water_heater_element_connection_type:
      name: Tipo de conexão do elemento do aquecedor de água
      description: Identifica o estilo de montagem do elemento, diferenciando entre
        os estilos de rosca e os vários estilos de flange.
    water_sensor_design:
      name: Design de sensor de água
      description: Especifica o estilo físico do elemento do sensor de água.
    water_supply_type:
      name: Tipo de abastecimento de água
      description: Identifica como o aparelho recebe água, distinguindo entre reservatórios
        de enchimento manual e tubulações de água encanada.
    watering_needs:
      name: Necessidades de rega
      description: Descreve as necessidades hídricas típicas da planta.
    wax_paper_form:
      name: Forma do papel encerado
      description: Especifica se o papel encerado é vendido em rolo contínuo ou em
        folhas pré-cortadas.
    weather_guard_mounting_method:
      name: Método de montagem da proteção contra intempéries
      description: Especifica como a proteção se fixa ao comedouro ou à estrutura
        de suporte.
    wheel_bearing_type:
      name: Tipo de rolamento da roda
      description: Identifica a construção interna dos rolamentos ou buchas da roda,
        o que afeta a suavidade do rolamento e os requisitos de manutenção.
    wheel_tread_style:
      name: Estilo de banda de rodagem da roda
      description: Especifica o desenho da banda de rodagem do pneu, o que afeta a
        tração, o nível de ruído e o potencial de marcas no piso.
    whistling:
      name: Assobio
      description: Especifica se a chaleira emite um som de apito quando a água atinge
        o ponto de ebulição.
    wick_material:
      name: Material do pavio
      description: Identifica a composição do pavio usado (por exemplo, algodão, fibra
        de vidro etc.).
    window_film_installation_surface:
      name: Superfície de instalação de película para janelas
      description: Especifica se a película foi projetada para uso interno, externo
        ou em superfícies duplas.
    window_film_type:
      name: Tipo de película para janelas
      description: Classifica o estilo funcional da película (por exemplo, privacidade
        ou segurança).
    window_rod_type:
      name: Tipo de haste de janela
      description: Classifica o estilo funcional da haste da janela.
    window_screen_type:
      name: Tipo de tela da janela
      description: Define o estilo estrutural ou o método de operação da tela.
    window_treatment_lining_type:
      name: Tipo de forro de janela
      description: Indica se o cortinado ou a cornija tem forro e qual o tipo de forro
        usado.
    wine_aerator_type:
      name: Tipo de arejador de vinho
      description: Especifica o formato ou estilo de funcionamento do aerador de vinho.
    wine_glass_style:
      name: Estilo de taça de vinho
      description: Especifica o tipo de vinho ou o formato da taça a ser usada para
        otimizar o aroma e o sabor.
    wok_bottom_type:
      name: Tipo de fundo da wok
      description: Define o formato da base da wok, o que determina a compatibilidade
        com diferentes tipos de fogão e suportes para wok.
    wood_grain_orientation:
      name: Orientação dos veios da madeira
      description: Especifica a orientação dos veios da madeira no produto, como veios
        de topo, laterais ou da face. A orientação das fibras da madeira influencia
        a durabilidade e a facilidade de corte.
    wood_seasoning_method:
      name: Método de secagem da madeira
      description: Indica como a lenha foi seca ou curada, o que influencia o teor
        de umidade e a qualidade da queima.
    wrap_format:
      name: Formato do embrulho
      description: Especifica o formato físico em que o material para embrulhar alimentos
        é fornecido, como rolos ou folhas pré-cortadas.
    abacus_bead_material:
      name: Material para contas de ábaco
      description: Material principal das contas de ábaco.
    abec_rating:
      name: Classificação ABEC
      description: Especifica o grau de precisão dos rolamentos com base nas classificações
        ABEC, que indicam os níveis de suavidade e tolerância.
    abrasive_level:
      name: Nível abrasivo
      description: Poder de corte relativo de um polidor/composto em acabamentos automotivos.
    absinthe_accessories_included:
      name: Acessórios para absinto incluídos
      description: Informações sobre os acessórios que acompanham o produto, como
        colheres, copos ou cubos de açúcar.
    ac_compressor_mounting_style:
      name: Estilo de montagem do compressor de ar-condicionado
      description: Descreve o estilo de montagem/fixação mecânica ou a interface do
        suporte do compressor ao sistema de acionamento do motor/acessórios.
    ac_compressor_oil_type:
      name: Tipo de óleo do compressor de ar-condicionado
      description: Especifica a composição química do óleo lubrificante exigida/usada
        pelo compressor do ar-condicionado (os tipos comuns incluem PAG e POE).
    accent_modes:
      name: Modos de acentuação
      description: Especifica como o metrônomo pode acentuar as batidas dentro de
        um compasso (além do clique básico).
    access_mechanism:
      name: Mecanismo de acesso
      description: Descreve como o usuário chega à plataforma elevada de dormir.
    accessibility_features:
      name: Recursos de acessibilidade
      description: Especifica os equipamentos e as configurações relacionados à acessibilidade
        no micro-ônibus.
    accessories_included:
      name: Acessórios incluídos
      description: 'Lista os itens complementares que acompanham a cadeira (p. ex.:
        pufe, almofada lombar), oferecendo aos compradores uma visão clara do valor
        agregado.'
    accessory_pieces_included:
      name: Peças acessório incluídas
      description: Lista os acessórios incluídos em um conjunto ou pacote de acessórios
        de vestuário com várias peças.
    acoustic_amplifier_feedback_control_features:
      name: Recursos de controle de feedback do amplificador acústico
      description: 'Indica as ferramentas antifeedback integradas para instrumentos
        acústicos (p. ex.: filtro notch/rejeita-faixa, inversão de fase, supressão
        automática de feedback).'
    acoustic_drum_kit_components_included:
      name: Componentes acústicos do kit de tambores incluídos
      description: Indica quais componentes principais estão incluídos no kit (apenas
        o casco ou kit completo; pratos/equipamentos incluídos).
    acoustic_guitar_body_shape:
      name: Forma do corpo de violão
      description: Descreve a forma/contorno do corpo do violão, que afeta o timbre,
        o conforto e o uso normal.
    acoustic_guitar_string_core_design:
      name: Design do núcleo das cordas do violão
      description: A estrutura central das cordas enroladas.
    acoustic_piano_key_material:
      name: Material das teclas do piano acústico
      description: Especifica o material principal usado para as teclas/marfim do
        piano.
    acoustic_piano_lid_type:
      name: Tipo de tampa do piano acústico
      description: Especifica o estilo do mecanismo de tampa/cobertura usado no piano
        acústico (para distinção entre a tampa superior e a tampa inferior de pianos
        de cauda/verticais).
    acoustic_piano_plate_frame_material:
      name: Material da armação/estrutura do piano acústico
      description: Especifica o material principal da placa/armação do piano (harpa),
        geralmente de ferro fundido.
    acoustic_piano_soundboard_material:
      name: Material da tábua harmônica de um piano acústico
      description: Especifica o material principal usado na tábua harmônica do piano.
    action_figure_scale:
      name: Escala do boneco de ação
      description: 'Indica a proporção de escala do colecionador (ex.: 1:12) para
        a qual o acessório foi projetado.'
    action_type:
      name: Tipo de ação
      description: 'Descreve o mecanismo de disparo ou engatilhamento da arma (p.
        e.: ação por ferrolho, ação basculante, ação por alavanca).'
    actuation_mechanism:
      name: Mecanismo de acionamento
      description: 'Indica como a alavanca aciona o sistema de freio: puramente mecânico
        por cabo, totalmente hidráulico, hidráulico acionado por cabo ou eletrônico/sem
        fio.'
    actuation_method:
      name: Método de atuação
      description: Como o sistema de supressão é ativado ou desativado.
    adapter_orientation:
      name: Orientação do adaptador
      description: 'Especifica o ângulo ou a configuração de um adaptador de válvula
        de pneu de bicicleta, o que afeta a acessibilidade da bomba (p. ex.: reto,
        90°).'
    additive_application_stage:
      name: Estágio de aplicação do aditivo
      description: Indica em que fase do processo o produto deve ser usado.
    adhesive_backing:
      name: Suporte adesivo
      description: Se a seda imprimível possui uma camada adesiva para aplicação do
        tipo "descolar e colar".
    adhesive_formulation:
      name: Formulação do adesivo
      description: Indica a base química ou a formulação do adesivo, como cianoacrilato
        ou epóxi.
    adhesive_sides:
      name: Lados do adesivo
      description: Indica se o adesivo termocolante está em um lado ou em ambos os
        lados da fita/rede.
    adjunct_grain_processing_form:
      name: Forma de processamento de grãos adjuntos
      description: 'Indica a forma física/de processamento do grão adjunto conforme
        vendido para fabricação de cerveja (p. e.x: em flocos, torrificado, maltado,
        cru).'
    adjustability_type:
      name: Tipo de ajustabilidade
      description: Especifica que tipo de ajuste foi feito nos suportes de suspensão,
        se houver.
    adjustable_cup_mutes:
      name: Silenciadores ajustáveis para copos
      description: Indica se o copo é ajustável/removível e o tipo de ajuste.
    adjustable_zones:
      name: Zonas ajustáveis
      description: Identifica quais seções da base podem ser ajustadas de forma independente.
    adjustment_type:
      name: Tipo de ajuste
      description: Indica se o regulador é ajustável e como o ajuste é feito.
    administration_method:
      name: Método de administração
      description: 'Indica como o vermífugo é administrado ao cavalo (p. ex.: por
        via oral ou por injeção), ajudando os compradores a seguir as instruções veterinárias
        e a escolher um método de aplicação viável.'
    advice_card_prompt_type:
      name: Tipo de mensagem do cartão de orientação
      description: Tipo de mensagem impressa no cartão (ou ausência de mensagem).
    aeration_method:
      name: Método de aeração
      description: Descreve o tipo de aeração fornecida ou suportada pelo recipiente,
        garantindo o oxigênio adequado para a isca viva.
    aero_package_components:
      name: Componentes do pacote aerodinâmico
      description: Indica quais componentes aerodinâmicos principais estão instalados
        no veículo (selecionar todos os que se aplicam).
    aerodynamic_elements_included:
      name: Elementos aerodinâmicos incluídos
      description: Especifica quais componentes aerodinâmicos estão incluídos no carro
        de fórmula (selecionar todos os que se aplicam, se compatíveis).
    aftertouch_support:
      name: Aftertouch
      description: Indica se o controlador é compatível com aftertouch (canal ou polifônico)
        em teclas/pads.
    agave_content_classification:
      name: Classificação do teor de agave
      description: Especifica se a tequila é produzida com 100% de agave azul Weber
        ou se é uma mixto que contém no mínimo 51% de açúcares de agave.
    aida_cloth_count:
      name: Contagem de tecido Aida
      description: Especifica a contagem de fios do tecido Aida (número de quadrados/pontos
        por polegada), o que determina o tamanho do ponto e a escala do desenho.
    aida_cloth_pre_cut_format:
      name: Formato pré-cortado do tecido Aida
      description: Indica se o tecido Aida é vendido como uma peça pré-cortada, uma
        peça contínua cortada de um rolo ou em um cilindro.
    air_bag_material:
      name: Material do airbag
      description: Especifica o material da bolsa de ar/reservatório usado com a gaita
        de guerra irlandesa.
    air_bed_internal_construction:
      name: Construção interna do colchão de ar
      description: Descreve a estrutura ou tecnologia interna de suporte usada dentro
        do colchão de ar para proporcionar conforto e estabilidade.
    air_dry_clay_color_form:
      name: Forma da cor da argila de secagem ao ar
      description: Se a argila é vendida pré-colorida, branca/neutra para pintura
        ou em uma mistura/variedade.
    air_hockey_items_included:
      name: Itens de hóquei de ar incluídos
      description: 'Lista os acessórios específicos contidos em um conjunto para que
        os clientes saibam exatamente o que receberão (p. ex.: 2 empurradores, 4 discos,
        2 almofadas de feltro).'
    air_intake_temperature_sensor_mounting_style:
      name: Estilo de montagem do sensor de temperatura de entrada de ar
      description: O método de montagem física do sensor IAT no sistema de admissão.
    air_integration_capability:
      name: Funcionalidade de integração aérea
      description: Indica se e como o computador de mergulho é compatível com transmissores
        sem fio de pressão do tanque.
    air_mattress_valve_type:
      name: Tipo de válvula para colchão de ar
      description: Especifica o tipo de válvula que um acessório usa ou contém, garantindo
        a compatibilidade entre bombas, válvulas e peças de reposição.
    air_water_rocket_kit_items_included:
      name: Itens do kit de foguete de ar e água incluídos
      description: Componentes principais incluídos no kit de foguete (lançador, bomba,
        aletas, peças de recarga).
    air_water_rocket_launch_method:
      name: Método de lançamento do foguete de ar e água
      description: Como o foguete é pressurizado/lançado (interação do usuário e estilo
        do equipamento).
    airbag_position:
      name: Posição do airbag
      description: Especifica a posição/zona de retenção pretendida para a peça do
        airbag.
    aircraft_ads_b_capability:
      name: Funcionalidade ADS-B da aeronave
      description: Especifica se a aeronave está equipada para conformidade com o
        conformidade do ADS-B Out.
    aircraft_airframe_material:
      name: Material da estrutura da aeronave
      description: Materiais principais usados na construção da estrutura da aeronave.
    aircraft_cabin_configuration:
      name: Configuração da cabine da aeronave
      description: 'Especifica o layout da cabine da aeronave (p. ex.: grupo de conferência,
        divã, cabine de quatro zonas).'
    aircraft_documentation_included:
      name: Documentação da aeronave incluída
      description: 'Lista os documentos que acompanham a peça (p. ex.: 8130-3).'
    aircraft_galley_configuration:
      name: Configuração da cozinha de bordo da aeronave
      description: Presença e tipo de instalações de cozinha/serviços de alimentação
        na cabine.
    aircraft_installation_location:
      name: Local de instalação da aeronave
      description: Local onde a peça ou acessório é instalado ou utilizado na aeronave.
    aircraft_internet_connection:
      name: Conexão com a internet da aeronave
      description: Indica a presença/tipo de conectividade à internet na cabine.
    aircraft_landing_gear_type:
      name: Tipo de trem de pouso da aeronave
      description: Especifica a configuração do trem de pouso do autogiro.
    aircraft_lavatory_configuration:
      name: Configuração do banheiro da aeronave
      description: Tipo de configuração do banheiro de bordo.
    aircraft_maintenance_program_enrollment:
      name: Inscrição no programa de manutenção de aeronave
      description: Indica se a aeronave está inscrita em um programa de manutenção
        de motor e/ou estrutura, e, em caso afirmativo, qual tipo de cobertura se
        aplica (motor, estrutura ou ambos).
    aircraft_operational_certification:
      name: Certificação operacional da aeronave
      description: Especifica a base de certificação regulamentar ou operacional sob
        a qual a aeronave é operada (dependendo da jurisdição, como FAA Part 91/135/121,
        EASA AOC).
    aircraft_protective_gear_certification:
      name: Certificação de equipamentos de proteção para aeronaves
      description: Especifica a norma aeronáutica/regulamentar ou da indústria que
        o equipamento de proteção está certificado a cumprir.
    aircraft_system_application:
      name: Aplicação do sistema da aeronave
      description: Identifica a qual sistema ou área da aeronave a peça/acessório
        pertence (utilizado para navegar e filtrar entre diversas peças de aeronaves).
    airflow_resistance_level:
      name: Nível de resistência ao fluxo de ar
      description: Indica o quão restritivo o abafador se sente em termos de contrapressão/resistência
        do ar.
    airship_envelope_material:
      name: Material de envelope de dirigível
      description: Material principal do envelope (revestimento) do dirigível.
    airsoft_part_type:
      name: Tipo de peça de airsoft
      description: 'Identifica o componente funcional ou tipo de acessório para armas
        de airsoft (p. ex.: carregador, cano, guarda-mão).'
    airworthiness_approval_basis:
      name: Base de aprovação de aeronavegabilidade
      description: 'Especifica a base de aprovação/certificação da peça, quando aplicável
        (p. ex.: PMA, TSO, STC).'
    alarm_volume_adjustability:
      name: Ajuste do volume do alarme
      description: Indica se e como o usuário pode ajustar o volume do alarme.
    alcohol_ink_finish_effect:
      name: Efeito de acabamento com tinta à base de álcool
      description: Descreve o efeito visual/acabamento produzido pela formulação da
        tinta à base de álcool (além da cor apenas), como metálico ou perolado.
    alignment_aid_style:
      name: Estilo de auxílio de alinhamento
      description: 'Descreve o tipo de guias de alinhamento impressas ou incorporadas
        na superfície do tapete (p. ex.: linhas retas, marcadores de distância).'
    alternator_cooling_type:
      name: Tipo de refrigeração do alternador
      description: Descreve como o alternador é resfriado e ventilado.
    alternator_marine_ignition_protection_rating:
      name: Classificação de proteção contra ignição marítima do alternador
      description: Indica se o alternador possui proteção contra ignição para compartimentos
        de motores marítimos (por exemplo, em conformidade com as normas SAE J1171/ISO
        8846).
    alternator_mounting_configuration:
      name: Configuração de montagem do alternador
      description: Especifica a configuração física de montagem usada para fixar o
        alternador ao suporte do motor.
    alternator_pulley_type:
      name: Tipo de polia do alternador
      description: Especifica o projeto da polia/embreagem do alternador (ou indica
        se nenhuma polia está incluída).
    alternator_regulator_type:
      name: Tipo de regulador do alternador
      description: Indica se o regulador de voltagem é interno ou externo ao alternador,
        e se é controlado pelo OEM (controlado por computador/PCM).
    alternator_terminal_connection_type:
      name: Tipo de conexão do terminal do alternador
      description: Estilo de conexão elétrica primária para saída do alternador/terminal
        excitador para ajudar a garantir a compatibilidade do chicote elétrico.
    altitude_suitability:
      name: Adequação à altitude
      description: Indica se a bola foi projetada para condições específicas de altitude,
        que afetam a velocidade e o quique.
    ambulance_stretcher_mount_type:
      name: Tipo de suporte para maca de ambulância
      description: Especifica o tipo de sistema de carregamento/montagem de maca compatível
        com a ambulância.
    american_football_safety_certification:
      name: Certificação de segurança para futebol americano
      description: Indica as certificações ou normas de segurança específicas para
        futebol americano que o produto atende.
    amplifier_tube_function:
      name: Funções da válvula de amplificador
      description: Especifica a função da válvula dentro de um circuito amplificador
        de instrumentos (por exemplo, pré-amplificador vs. amplificador de potência).
    analog_synthesizer_cv_gate_i_o:
      name: Entrada/saída CV/Gate de sintetizador analógico
      description: Indica os tipos de tensão de controle e conexão de porta compatíveis
        para integração com equipamentos modulares/analógicos.
    analog_synthesizer_keybed_configuration:
      name: Configuração do teclado do sintetizador analógico
      description: Descreve se o sintetizador inclui um teclado embutido e, em caso
        afirmativo, o número de teclas.
    anchor_configuration:
      name: Configuração da âncora
      description: Indica se o sistema de suspensão utiliza um único ponto de ancoragem
        centralizado ou vários pontos de ancoragem independentes, o que afeta a variedade
        de exercícios e a complexidade da configuração.
    animal_raising_method:
      name: Método de criação de animais
      description: Descreve as práticas agrícolas ou de criação de animais usadas
        para o animal de origem.
    animal_species:
      name: Espécies animais
      description: Especifica o animal ou criatura representada pelo bicho de pelúcia
        (por exemplo, urso, coelho, dinossauro).
    animal_trap_jaw_style:
      name: Estilo de mandíbula da armadilha para animais
      description: Configuração das mandíbulas da armadilha, o que influencia a capacidade
        de retenção e o bem-estar do animal.
    animal_trap_type:
      name: Tipo de armadilha para animais
      description: Classifica o estilo/projeto mecânico da armadilha, permitindo que
        o comprador localize de forma rápida o método de captura exato de que precisa
        ou que os regulamentos permitem.
    ankle_collar_style:
      name: Estilo de cano/gola do tornozelo
      description: Descreve o estilo ou a construção da gola do tornozelo de um sapato,
        como cano baixo, cano médio, cano alto, gola tipo meia ou sem cadarço, que
        influencia o suporte, o ajuste e a estética.
    ankle_guard_protection_level:
      name: Nível de proteção da tornozeleira
      description: Classifica o nível geral de proteção contra impacto que a tornozeleira
        oferece.
    ankle_strap_padding_type:
      name: Tipo preenchimento/acolchoamento da tira do tornozelo
      description: Descreve o material de amortecimento ou a abordagem de preenchimento
        usada no interior da tira que afeta o conforto.
    ankle_strap_type:
      name: Tipo de correia do tornozelo
      description: Classifica a construção ou o design da tira de tornozelo de uma
        fixação de snowboard.
    ant_farm_habitat_medium_type:
      name: Tipo de meio do habitat do formigueiro
      description: Especifica o principal meio de escavação/observação fornecido ou
        exigido pelo formigueiro.
    ant_farm_kit_contents:
      name: Conteúdo do kit para formigueiro
      description: Identifica quais componentes estão incluídos no kit para formigueiro
        (por exemplo, recipiente do habitat, areia/gel, amostra de formigas, ferramentas
        de alimentação).
    ant_farm_lighting_type:
      name: Tipo de iluminação para formigueiro
      description: Especifica o tipo de iluminação integrada (se houver) usada para
        observação.
    antenna_fit_type:
      name: Tipo de ajuste de antena
      description: Qual o formato de antena para o qual a esfera da antena foi projetada.
    anti_caking_agent:
      name: Agente antiaglomerante
      description: Especifica o tipo de agente antiaglomerante adicionado para evitar
        a formação de grumos, informação importante para considerações sobre alergias
        e precisão da receita.
    anti_g_suit_bladder_material:
      name: Material da câmara de pressão do traje anti-G
      description: Material utilizado para as câmara de ar internas infláveis dentro
        do traje anti-G. Indica todos os que se aplicam, caso sejam usados vários
        materiais.
    anti_g_suit_connector_type:
      name: Tipo de conector para traje anti-G
      description: Especifica o estilo/padrão do conector da mangueira de ar/pressão
        usado para a interface com a aeronave ou o regulador.
    anti_g_suit_inflation_method:
      name: Método de insuflação do traje anti-G
      description: Indica como as câmaras de ar do traje são pressurizadas para fornecer
        proteção contra as forças G.
    anti_g_suit_size_system:
      name: Sistema de traje anti-G
      description: Padrão de dimensionamento usado para especificar o sistema de tamanho/ajuste
        do traje.
    anti_reverse_type:
      name: Tipo antirreverso
      description: Especifica o tipo de mecanismo antirreverso incorporado, o que
        influencia a fixação do anzol e a folga do carretel.
    anti_theft_feature:
      name: Recurso antirroubo
      description: Indica se o suporte/fixador oferece recursos de segurança contra
        roubo, como fechos de segurança ou design resistente a violação.
    antique_gun_ignition_system:
      name: Sistema de ignição de armas antigas
      description: Especifica o sistema histórico de disparo/ignição usado pela arma
        de fogo antiga.
    apple_variety:
      name: Variedade de maçã
      description: Especifica o cultivar ou a variedade de maçã (por exemplo, Gala,
        Fuji, Granny Smith), o que ajuda os clientes a fazer a escolha com base no
        sabor, na textura e no uso culinário.
    applique_edge_finish:
      name: Acabamento da borda do aplique
      description: Descreve o acabamento das bordas, o que influencia a aparência
        e a resistência ao desgaste.
    arbor_type:
      name: Tipo de eixo da bobina
      description: Classifica o carretel de acordo com o design do eixo da bobina,
        o que influencia a velocidade de recuperação da linha, a capacidade de apoio
        e a memória da linha.
    archery_accessory_type:
      name: Tipo de acessório de arco e flecha
      description: Especifica o tipo de acessório destinado a ferramentas de arco
        e flecha para que os compradores possam filtrar rapidamente os produtos.
    archery_part_type:
      name: Tipo de peça para tiro com arco
      description: Identifica o equipamento específico ou a peça de reposição que
        está sendo vendida (por exemplo, riser, lâmina, corda do arco), permitindo
        uma filtragem precisa sem expandir a árvore de categorias.
    archery_range_accessory_type:
      name: Tipo de acessório para campo de tiro com arco
      description: Classifica o tipo específico de acessório usado em um campo de
        tiro com arco. Isso permite que os compradores filtrem rapidamente o item
        exato de que precisam.
    archery_target_features:
      name: Características do alvo de arco e flecha
      description: Lista as funcionalidades especializadas de desempenho ou conveniência
        não abrangidas por outros atributos (por exemplo, espuma autorregenerativa,
        alça de transporte).
    archery_tool_type:
      name: Tipo de ferramenta para arco e flecha
      description: Classifica o tipo específico de ferramenta ou equipamento de arco
        e flecha.
    armband_features:
      name: Características da braçadeira
      description: Lista características funcionais ou visuais especiais que aprimoram
        a braçadeira.
    armguard_style:
      name: Estilo de protetor de braço
      description: Define o estilo de construção ou formato do protetor de braço,
        fornecendo informações sobre a abrangência do design e os visuais tradicionais
        em comparação com as modernas.
    armor_protection_type:
      name: Tipo de proteção da blindagem
      description: Tipo de proteção oferecida pelo sistema de blindagem do veículo.
    armrest_adjustability:
      name: Ajuste do apoio de braço
      description: Define a capacidade de ajuste dimensional e a configuração dos
        apoios de braço da cadeira (por exemplo, fixos, 2D, 3D, rebatíveis).
    armrest_type:
      name: Tipo de apoio de braço
      description: Descreve a presença e a possibilidade de ajuste dos apoios de braço
        na cadeira (por exemplo, sem apoios de braço, fixos, ajustáveis, removíveis).
    arrow_bolt_point_type:
      name: Tipo de ponta de flecha/dardo
      description: Define o estilo da ponta ou extremidade instalada em uma flecha
        ou dardo.
    arrow_component_type:
      name: Tipo de componente da flecha
      description: Classifica a peça ou acessório específico para uma flecha (inserto,
        revestimento, bucha, cola etc.) para que os clientes possam filtrar o item
        sem precisar de dezenas de subcategorias adicionais.
    arrow_containment_level:
      name: Nível de contenção da flecha
      description: Indica se o apoio contém totalmente, parcialmente ou não contém
        a flecha.
    arrow_fletching_orientation:
      name: Orientação da plumagem da flecha
      description: Especifica a orientação da asa ou do deslocamento da pena (por
        exemplo, asa esquerda, asa direita, helicoidal) que determina a direção de
        rotação da flecha.
    arrow_nock_groove_size:
      name: Tamanho da ranhura da ponta da flecha
      description: Especifica a classificação de tamanho do sulco/garganta da corda
        na ponta do arco. Isso determina a compatibilidade com diferentes diâmetros
        de corda.
    arrow_nock_type:
      name: Tipo de encaixe da flecha
      description: Design/estilo da ranhura da flecha que se encaixa na corda do arco.
    arrow_rest_style:
      name: Estilo de apoio da flecha
      description: Especifica o estilo/mecanismo funcional do apoio da flecha (por
        exemplo, Drop-away, lâmina, whisker biscuit). O estilo determina como o apoio
        do produto sustenta, envolve e libera a flecha, e é um dos principais critérios
        que os consumidores utilizam para diferenciar os produtos.
    arrow_shaft_compatibility:
      name: Compatibilidade da haste da flecha
      description: 'Indica o padrão da haste/bucha da flecha em que a ponta iluminada
        se encaixa (ex.: X, H, S, GT).'
    art_crafting_tool_tip_style:
      name: Estilo de ponta de ferramenta para artes/artesanato
      description: Descreve a forma/perfil da ponta de trabalho (por exemplo, ponta
        fina vs. esfera arredondada) para indicar o tipo de marcas de relevo que ela
        produz.
    art_ink_lightfastness_rating:
      name: Classificação de resistência à luz da tinta artística
      description: Indica a resistência da tinta ao desbotamento quando exposta à
        luz, normalmente expressa por meio de classificações padrão.
    art_ink_opacity:
      name: Opacidade da tinta artística
      description: Especifica o nível de cobertura da tinta após a aplicação.
    art_security_rating:
      name: Classificação de segurança ART
      description: Especifica a avaliação por estrelas da classificação ART holandesa
        (1-5 estrelas) recebida pela fechadura.
    artichoke_cut:
      name: Corte da alcachofra
      description: Indica qual parte ou preparação da alcachofra é oferecida (por
        exemplo, inteira, coração, base), para que os clientes saibam qual é o rendimento
        e o uso culinário pretendido.
    artichoke_variety:
      name: Variedade de alcachofra
      description: Especifica a cultivar ou variedade botânica da alcachofra para
        ajudar os compradores a distinguir entre tamanho, as cores, os sabores e os
        usos culinários.
    articulation_features:
      name: Características de articulação
      description: Indica se o modelo de dinossauro possui partes móveis (mandíbula,
        membros e cauda articuláveis) e se é possível posicioná-lo de diversas maneiras.
    artificial_bait_form:
      name: Forma da isca artificial
      description: Indica a forma física ou o estilo de apresentação da isca ou do
        chamariz de pesca.
    asa_mounting_type:
      name: Tipo de montagem em ASA
      description: Indica o tipo de interface do adaptador de fonte de ar (ASA) ou
        o padrão de montagem utilizado pelo drop forward (por exemplo, encaixe em
        cauda de andorinha, trilho, montagem direta).
    ascender_descender_type:
      name: Tipo de dispositivo de subida ou descida
      description: Classifica o tipo de dispositivo de subida ou descida em escalada
        para uma filtragem mais precisa.
    aspiration_type:
      name: Tipo de aspiração
      description: Indica se o motor é atmosférico ou turboalimentado.
    assembly_state:
      name: Estado do conjunto
      description: Indica se o gabinete é enviado pronto para montar, pré-montado
        ou em outra forma.
    assistance_mechanism:
      name: Mecanismo de assistência
      description: Especifica os sistemas de assistência ou resistência integrados
        que a torre de exercícios ofereça para flexões na barra fixa, paralelas ou
        outros exercícios.
    atemoya_cultivar:
      name: Cultivar de atemoia
      description: Especifica a cultivar/variedade nomeada da fruta atemoia, permitindo
        aos compradores escolher frutas com o sabor, o tamanho ou as características
        da semente que preferirem.
    athletic_cup_size:
      name: Tamanho da coquilha esportiva
      description: Indica o tamanho da proteção genital designado pelo fabricante
        para garantir o ajuste adequado ao atleta.
    attachment_position:
      name: Posição de fixação
      description: Especifica em que parte da sela ou do cavaleiro a bolsa deve ser
        fixada.
    attractant_scent_profile:
      name: Perfil de aroma atrativo
      description: Descreve o odor ou sabor específico usado para atrair animais selvagens
        ou mascarar o cheiro humano.
    atv_utv_intended_use:
      name: Uso pretendido do veículo ATV/UTV
      description: Uso/estilo principal pretendido para o ATV/UTV.
    audio_channel_configuration:
      name: Configuração do canal de áudio
      description: O número de canais de áudio discretos compatíveis com o equalizador/DSP
        (por exemplo, 2 canais estéreos, 4 canais dianteiros/traseiros, 6 canais).
    audio_inputs:
      name: Entradas de áudio
      description: Especifica os tipos de conexão de entrada de áudio disponíveis
        para amostragem/gravação (por exemplo, 1/4" em linha, XLR, 3,5 mm, pré-amplificador
        de microfone, phono).
    audio_output:
      name: Saída de áudio
      description: Indica se o brinquedo emite som e como o áudio é reproduzido.
    audio_outputs:
      name: Saídas de áudio
      description: Especifica as conexões de saída de áudio disponíveis, incluindo
        as saídas principais e quaisquer saídas atribuíveis/auxiliares.
    audio_playback_source:
      name: Fonte de reprodução de áudio
      description: Principais fontes de mídia das quais o aparelho de karaokê pode
        reproduzir músicas.
    autograph_authentication:
      name: Autenticação de autógrafo
      description: Indica o tipo/status de autenticação de um autógrafo no cartão.
    autograph_format:
      name: Formato de autógrafo
      description: Descreve se a assinatura é um autógrafo original feito à mão, um
        fac-símile carimbado/impresso ou uma inscrição/comemoração.
    autogyro_cockpit_enclosure:
      name: Envólucro da cabine do autogiro
      description: Especifica se a cabine de pilotagem é aberta ou fechada.
    available_firing_modes:
      name: Modo de disparo disponível
      description: Lista os modos de disparo selecionáveis do marcador, disponíveis
        de fábrica.
    avocado_variety:
      name: Variedade de abacate
      description: Especifica a cultivar ou variedade do abacate, ajudando os compradores
        a distinguir as diferenças de gosto, textura, tamanho e teor de óleo.
    award_customization_included:
      name: Personalização do prêmio incluída
      description: Indica qual personalização está incluída na compra do prêmio.
    award_material:
      name: Material do prêmio
      description: Identifica os materiais principais do item de premiação (troféu,
        placa, medalha, broche, fita etc.).
    award_mounting_display_type:
      name: Tipo de montagem/exibição do prêmio
      description: Especifica como o prêmio deve ser exibido ou montado (na parede,
        em uma mesa em um artigo vestível).
    award_plaque_plate_material:
      name: Material da placa de premiação
      description: Especifica o material da chapa de identificação/gravação fixada
        à placa (diferente do material de suporte).
    award_ribbon_attachment_type:
      name: Tipo de fixação da fita de premiação
      description: Especifica como a fita deve ser fixada ou usada.
    award_ribbon_imprint_method:
      name: Método de impressão da fita de premiação
      description: Especifica como o texto e os elementos gráficos são aplicados à
        faixa.
    award_ribbon_material:
      name: Material da fita de premiação
      description: 'Material principal do tecido da fita (p. ex.: cetim, poliéster).'
    award_ribbon_placement_title:
      name: Posicionamento/título da fita de premiação
      description: 'O posicionamento ou título padrão indicado pela fita (p. ex.:
        1º lugar, participante).'
    axle_compatibility:
      name: Compatibilidade do eixo
      description: Indica o padrão do eixo que a roda utiliza, garantindo a compatibilidade
        com o quadro e o garfo da bicicleta.
    back_beam_type:
      name: Tipo de viga traseira
      description: 'Tipo/ajustabilidade da viga traseira (p. ex.: fixa ou com altura
        ajustável).'
    back_design:
      name: Design das costas
      description: Especifica construções traseiras notáveis em peças de vestuário
        que afetam o estilo e o suporte.
    back_panel_type:
      name: Tipo de painel traseiro
      description: Especifica o estilo ou material do painel traseiro do gabinete,
        o que afeta a visibilidade da tela e a combinação com a decoração.
    back_sides_material:
      name: Material das partes traseiras e laterais
      description: Especifica o material utilizado para a parte traseira e para as
        laterais do corpo do violão clássico.
    backing_type:
      name: Tipo de suporte
      description: Descreve o tipo de fixação/suporte da peça de strass que está sendo
        vendida (para produtos autoadesivos).
    backup_camera_mounting_location:
      name: Local de montagem da câmera de ré
      description: Indica o local de instalação pretendido no veículo para a câmera
        de ré.
    backup_camera_video_interface:
      name: Interface de vídeo da câmera de ré
      description: Especifica a saída/interface/conector de vídeo usado pela câmera
        de ré para se conectar a um monitor, DVR ou unidade principal (por exemplo,
        RCA composto, LVDS OEM, IP sobre Ethernet).
    badminton_set_components_included:
      name: Componentes do conjunto de badminton incluídos
      description: Lista os itens individuais fornecidos em um conjunto de badminton.
    bag_attachment_method:
      name: Método de fixação da bolsa
      description: Indica o método principal utilizado para fixar a bolsa/suporte
        de hidratação a outros equipamentos (por exemplo, sistema MOLLE, presilha
        para cinto, mosquetão).
    bag_case_carrying_style:
      name: Estilo de transporte interno da bolsa/estojo
      description: Especifica o formato geral principal de transporte do estojo interno/bolsa
        (como ele foi projetado para ser transportado).
    bag_cover_material:
      name: Material de capa da bolsa
      description: Especifica o material da capa da bolsa (revestimento externo),
        que afeta a durabilidade, a aderência e a aparência.
    bag_embellishment:
      name: Enfeite da bolsa
      description: Descreve elementos decorativos de destaque aplicados ao exterior
        da bolsa, como borlas, tachas ou acolchoados.
    bag_fill_medium:
      name: Enchimento médio da bolsa
      description: 'Identifica a substância utilizada para encher ou pressurizar o
        a bolsa (p. ex.: ar, água, areia).'
    bag_material:
      name: Material da bolsa
      description: Material da bolsa/câmara de ar.
    bag_padding_level:
      name: Nível de preenchimento da bolsa
      description: Especifica o grau ou estilo de fixação incorporado na bolsa ou
        capa.
    bag_size_descriptor:
      name: Descritor do tamanho da bolsa
      description: Categoria de tamanho comercial para a bolsa tipo saco (por exemplo,
        mini, grande) que complementa as dimensões exatas.
    bagel_size:
      name: Tamanho do bagel
      description: Especifica o tamanho geral do bagel, por exemplo. mini, fino, padrão,
        grande, extragrande ou jumbo.
    bagpipe_accessories_included:
      name: Acessórios para gaita de foles incluídos
      description: Lista os principais componentes/acessórios incluídos com a gaita-de-foles
        (além dos tubos principais), como estojo, palheta de treino, capa, cordas,
        controle de umidade.
    bagpipes_playing_mode:
      name: Modo de execução da gaita-de-foles
      description: Como o instrumento é abastecido com ar durante a execução musical.
    bait_compatibility:
      name: Compatibilidade da isca
      description: Indica os tipos de isca com os quais o acessório para pellets foi
        projetado para funcionar. Isso ajuda os pescadores a garantir que a ferramenta
        escolhida seja compatível com a isca de preferência deles.
    bait_species:
      name: Espécies de isca
      description: Identifica o principal organismo oferecido como isca. Isso ajuda
        os pescadores a garantir a legalidade e a eficácia na captura da espécie-alvo.
    baking_chip_form:
      name: Formato dos chips para assar
      description: Descreve o tamanho físico ou ou a forma das gotas de chocolate
        para confeitaria. Isso influencia o comportamento de derretimento e a aparência
        da receita.
    balance_board_style:
      name: Estilo de prancha de equilíbrio
      description: Classifica as pranchas de equilíbrio de acordo com o mecanismo
        ou o estilo de construção para indicar como a prancha se move e o desafio
        de treinamento oferecido.
    balance_cushion_accessories_included:
      name: Acessórios para almofada de equilíbrio incluídos
      description: Lista todos os acessórios incluídos com a almofada, permitindo
        aos compradores comparar o valor do pacote.
    balance_type:
      name: Tipo de equilíbrio
      description: Indica o estado/classificação do balanceamento do eixo de transmissão
        no momento da venda (por exemplo, balanceamento de fábrica, balanceamento
        para alta velocidade, desbalanceado).
    ball_bladder_material:
      name: Material da câmara de ar da bola
      description: Identifica o material utilizado na câmara de ar interna da bola
        de handebol. Isso influencia a retenção de ar, o rebote e a durabilidade geral.
    ball_certification:
      name: Certificação da bola
      description: Indica as certificações oficiais de desempenho ou aprovação que
        a bola recebeu.
    ball_construction:
      name: Construção da bola
      description: Indica o método de fabricação usado para unir os painéis da bola.
        Isso afeta a durabilidade, o toque, a absorção de água e o preço.
    ball_core_construction:
      name: Estrutura do núcleo da bola
      description: Informações sobre a estrutura interna da bola, que influencia o
        rebote e a sensação de toque.
    ball_core_type:
      name: Tipo de núcleo da bola
      description: Indica a estrutura interna da bola, que afeta o rebote e a distribuição
        do peso.
    ball_cup_game_included_pieces:
      name: Peças incluídos no jogo de bilboquê
      description: Identifica quais componentes estão incluídos na embalagem do produto
        de um jogo de bilboquê.
    ball_drilling_state:
      name: Estado de perfuração da bola
      description: Indica se a bola tem furos para os dedos e, em caso afirmativo,
        em que medida.
    ball_holder_type:
      name: Tipo de suporte da bola
      description: Identifica o estilo estrutural ou formato do suporte da bola.
    ball_pit_ball_surface_finish:
      name: Acabamento da superfície da bola da piscina de bolinhas
      description: Descreve o acabamento tátil/visual da superfície da bola. Isso
        afeta a aderência, a sensação de jogo e a limpeza.
    ball_pit_safety_features:
      name: Recursos de segurança para piscina de bolinhas
      description: Características de projeto relacionadas à segurança que são relevantes
        para piscinas de bolinhas.
    ball_pump_accessory_type:
      name: Tipo de acessório para bomba de ar
      description: Define o tipo específico de acessório para bomba de ar para bolas
        para que os lojistas possam identificar manômetros, mangueiras, lubrificantes
        e outros acessórios em uma única categoria principal.
    ball_return_mechanism:
      name: Mecanismo de retorno da bola
      description: Especifica o tipo de sistema de retorno da bola incorporado no
        tapete, se houver.
    ball_return_type:
      name: Tipo de retorno da bola
      description: Tipo de sistema de buracos/retorno que recolhe as bolas durante
        o jogo.
    ball_speed_rating:
      name: Classificação de velocidade da bola
      description: Categoria de velocidade designada pelo fabricante, indicando a
        rapidez com que a bola se move em condições normais de jogo.
    ball_surface_texture:
      name: Textura da superfície da bola
      description: Descreve a textura externa ou o padrão de estrias das bolas. Isso
        pode afetar a aderência e a estética.
    ball_surface_type:
      name: Tipo de superfície da bola
      description: Descreve o acabamento externo ou amortecimento da bola para indicar
        a sensação de impacto e a aderência.
    ballonet_configuration:
      name: Configuração do balonete
      description: Tipo/configuração do sistema de balonetes utilizado para ajuste
        e controle de pressão (em dirigíveis não rígidos/semirrígidos).
    balloon_closure_valve_type:
      name: Tipo de fechamento/válvula do balão
      description: Identifica como o balão é selado após o enchimento (por exemplo,
        amarração, válvula autovedante).
    balloon_kit_finish:
      name: Acabamento do kit de balões
      description: Descreve o acabamento superficial/visual dos balões incluídos no
        kit.
    balloon_kit_material:
      name: Material do kit de balões
      description: Especifica o material principal dos balões incluídos no kit.
    banana_variety:
      name: Variedade de banana
      description: Especifica o cultivar ou o tipo de banana oferecida.
    banjo_head_type:
      name: Tipo de cabeça do banjo
      description: Tipo/material da cabeça do banjo. Isso influencia o brilho, o volume
        e a sensação ao tocar.
    banjo_neck_material:
      name: Material do pescoço do banjo
      description: Material do braço, que afeta a sensação ao tocar, a estabilidade
        e o timbre.
    banjo_pickup_configuration:
      name: Configuração do captador do banjo
      description: Indica se o banjo tem um captador embutido e qual é a tecnologia
        de captador utilizada.
    banjo_rim_material:
      name: Material do aro do banjo
      description: Material do aro/corpo (a parte circular), que influencia significativamente
        o timbre e o peso.
    banjo_tone_ring_type:
      name: Tipo de anel de ressonância do banjo
      description: Especifica o design/família de materiais do anel de ressonância
        do banjo que forma o timbre e o volume.
    banjo_tuning_machine_type:
      name: Tipo de afinador de banjo
      description: Tipos de afinadores usados no banjo.
    banknote_authentication_grading:
      name: Autenticação/classificação de cédulas bancárias
      description: Serviço de terceiros (se houver) que autenticou/classificou a cédula.
    banknote_grade:
      name: Grau de qualidade das cédulas bancárias
      description: Classificação padronizada de cédulas bancárias em uma escala de
        colecionadores.
    banknote_holder_type:
      name: Tipo de porta-notas
      description: Indica o estado físico e o contexto da cédula (por exemplo, solta
        vs. em estojo classificado).
    banknote_material:
      name: Material da cédula bancária
      description: Substrato/material principal da cédula bancária.
    banknote_security_features:
      name: Recursos de segurança das notas
      description: Características de segurança/design notáveis presentes na cédula.
    banknote_serial_number_type:
      name: Tipo de número de série da cédula
      description: Indica se o número de série está presente e/ou possui características
        especiais de colecionabilidade (não o número em si).
    banner_display_location:
      name: Local de exibição do banner
      description: Especifica o contexto de posicionamento pretendido para o banner
        (por exemplo, porta, parede, fundo de mesa).
    banner_hanging_hardware_type:
      name: Tipo de equipamento para pendurar banners
      description: Especifica os principais equipamentos para fixar/pendurar integrados
        ou incluídos com o banner (por exemplo, ilhós, manga para mastro, corda).
    banner_message_type:
      name: Tipo de mensagem do banner
      description: Indica se a mensagem de texto do banner é pré-impressa (fixa) ou
        em branco/personalizável.
    banner_shape:
      name: Forma do banner
      description: Especifica a forma/corte geral do banner para fãs de esportes.
    banquette_configuration:
      name: Configuração do banco estofado
      description: Forma geral ou orientação do banco estofado.
    bar_coating:
      name: Revestimento da barra
      description: Identifica o revestimento exterior comestível aplicado à barra,
        se houver.
    bar_pad_style:
      name: Estilo de almofada de bar
      description: Estilo de design da construção da almofada e da cobertura da barra.
    bar_texture:
      name: Textura da barra
      description: Descreve a textura geral ou a consistência da barra.
    barb_type:
      name: Tipo de farpa
      description: Indica se o anzol possui farpa e qual o seu estilo.
    barbell_finish:
      name: Acabamento da barra
      description: Descreve o tratamento ou revestimento da superfície, de proteção
        ou estético, aplicado à barra e/ou às mangas, que influencia a resistência
        à corrosão, a sensação ao toque e o preço.
    barbell_knurling_pattern:
      name: Padrão de serrilhado da barra
      description: Descreve o estilo e o grau de rugosidade da seção serrilhada do
        punho de uma barra, incluindo marcações específicas para levantamento de peso
        ou halterofilismo/powerlifting.
    barista_suitability:
      name: Adequação para barista
      description: Indica se o produto foi formulado para a preparação de café e para
        a formação de espuma.
    barre_rail_configuration:
      name: Configuração do trilho da barra (de balé)
      description: Indica o número de barras horizontais fornecidas com a barra de
        balé.
    barrel_or_cask_type:
      name: Tipo de barril ou tonel
      description: Especifica o tipo de barril ou tonel utilizado para o envelhecimento
        ou o acabamento da tequila (por exemplo, carvalho americano, barril ex-bourbon,
        barril de xerez).
    barrel_profile:
      name: Perfil do barril
      description: Descreve a forma geral ou o equilíbrio do corpo do dardo.
    barrel_thread_standard:
      name: Padrão de rosca do cano
      description: Identifica o tipo de rosca do cano utilizado no marcador para verificar
        a compatibilidade com canos de reposição.
    base_anchoring_method:
      name: Método de ancoragem da base
      description: Identifica como a base é fixada ao solo, indicando sua adequação
        para diferentes superfícies e condições de jogo.
    base_ballast_method:
      name: Método de lastro da base
      description: Indica como (ou se) a base do aparelho de treino é lastrada para
        garantir estabilidade (por exemplo, com água ou areia).
    base_configuration:
      name: Configuração da base
      description: Indica a configuração estrutural da base do painel.
    base_fill_material:
      name: Material de enchimento da base
      description: Especifica a substância utilizada para preencher ou dar peso à
        base do manequim de basquetebol, o que afeta a estabilidade e o esforço de
        configuração.
    base_ingredient:
      name: Ingrediente base
      description: Identifica o principal ingrediente agrícola a partir do qual o
        shochu ou soju é destilado.
    base_oil_type:
      name: Tipo de óleo base
      description: Especifica a formulação do óleo base do fluido de transmissão (por
        exemplo, totalmente sintético, semissintético ou convencional).
    base_storage_type:
      name: Tipo de armazenamento da base
      description: Especifica se a base oferece armazenamento integrado e o mecanismo
        utilizado.
    baseball_glove_type:
      name: Tipo de luva de beisebol
      description: Classifica a luva ou a manopla de acordo com a posição do jogador
        ou a finalidade funcional.
    baseball_softball_league_certification:
      name: Certificação para ligas de beisebol e softebol
      description: Especifica os padrões do órgão regulador ou da liga que o produto
        atende.
    baseball_softball_usage_role:
      name: Função de uso para beisebol/softebol
      description: Especifica a função em campo ou o tipo de participante para o qual
        a caneleira se destina (por exemplo, apanhador, rebatedor, árbitro, jogador
        de campo).
    baseball_toy_set_components_included:
      name: Componentes do conjunto de brinquedos de beisebol incluídos
      description: Especifica quais componentes para jogar beisebol estão incluídos
        no produto (por exemplo, taco, bola, suporte, bases).
    baseplate_construction:
      name: Construção da placa de base
      description: Indica o método de fabricação da placa de base do caminhão, que
        influencia a resistência e o peso.
    basketball_hoop_accessory_type:
      name: Tipo de acessório para cesta de basquete
      description: Classifica o tipo específico de peça ou acessório da cesta de basquete
        para fins de filtragem e comparação.
    basketball_padding_location:
      name: Local do acolchoamento da bola de basquete
      description: Identifica a parte do sistema da bola de basquete que a proteção
        deve cobrir.
    basketball_rim_type:
      name: Tipo de aro de basquete
      description: Especifica o estilo estrutural ou de desempenho do aro de basquete
        para que os compradores possam escolher o design que melhor se adapta ao seu
        nível de jogo e às suas necessidades de instalação.
    basketball_toy_features:
      name: Características do brinquedo de basquete
      description: Destaca as características lúdicas/funcionais notáveis dos brinquedos
        de basquete além das dimensões básicas.
    bass_clarinet_body_material:
      name: Material do corpo do clarinete baixo
      description: Material principal do corpo do clarinete baixo (excluindo chaves,
        hastes e outros componentes metálicos).
    bass_clarinet_lowest_written_note:
      name: Nota mais grave escrita para clarinete baixo
      description: A nota mais grave que o clarinete baixo consegue tocar (com frequência
        descrita pelos músicos como Mi bemol grave, Ré grave, Dó grave ou extensão
        de Si grave).
    bass_drum_beater_head_shape:
      name: Forma da baqueta do bumbo
      description: Descreve o perfil/forma geométrica da superfície de impacto da
        cabeça da baqueta do bumbo (a face que entra em contato com a pele do tambor).
    bass_drum_beater_shaft_material:
      name: Material da haste da baqueta do bumbo
      description: Especifica o material do eixo/haste da baqueta (não da cabeça da
        baqueta).
    bass_drum_head_built_in_muffling:
      name: Pele do bumbo com abafador embutido
      description: Tipo de amortecimento/abafamento integrado incluído no design da
        cabeça.
    bass_drum_head_configuration:
      name: Configuração da pele do bumbo
      description: Descreve quais peles estão incluídas/instaladas no bumbo no momento
        da compra.
    bass_drum_head_surface_finish:
      name: Acabamento da superfície da pele do bumbo
      description: Textura/acabamento da superfície da pele do bumbo.
    bass_drum_head_type:
      name: Tipo de pele de bumbo
      description: Tipo de design ou construção especial da pele do bumbo.
    bass_drum_hoop_material:
      name: Material para aro de bumbo
      description: Identifica o material dos aros do bumbo (contra-aros), o que afeta
        a durabilidade, a estética e o peso.
    bass_drum_mounting_style:
      name: Estilo de montagem do bumbo
      description: Indica como o bumbo foi projetado para ser apoiado/utilizado (suportes
        do kit, suporte/pedestal, suporte de marcha, etc.).
    bass_harmonica_comb_material:
      name: Material do pente da gaita de baixo
      description: Material do corpo/pente (bloco da câmara de ar) da gaita de boca/harmônica.
    bass_harmonica_mouthpiece_style:
      name: Estilo de bocal para gaita de baixo/harmônica
      description: Indica a configuração do bocal da gaita de boca.
    bass_harmonica_reed_material:
      name: Material de palheta para gaita de boca
      description: Material das palhetas utilizadas na gaita de boca.
    bass_harmonica_tuning_system:
      name: Sistema de afinação da gaita de boca
      description: Especifica o sistema de afinação/temperamento usado para a gaita
        de boca.
    bass_recorder_bocal_type:
      name: Tipo de bocal para flauta doce baixo
      description: Especifica o tipo de bocal/canal de ar usado para alcançar o bocal
        em uma flauta doce baixo.
    bass_recorder_included_accessories:
      name: Acessórios incluídos da flauta doce baixo
      description: Lista os acessórios incluídos na embalagem da flauta doce baixo.
    bass_recorder_keywork_material:
      name: Material da chave da flauta doce baixo
      description: Especifica o material da chave da flauta doce (se presente).
    bass_trombone_slide_material:
      name: Material da vara do trombone baixo
      description: Especifica o material/revestimento principal dos tubos externos
        da vara(e/ou conjunto da vara) do trombone baixo.
    bass_trombone_valve_wrap_style:
      name: Estilo de revestimento das válvulas do trombone baixo
      description: Especifica o desenho do revestimento da válvula utilizado no instrumento.
    bass_ukulele_string_type:
      name: Tipo de corda para ukulele baixo
      description: Indica o tipo geral de corda usada no ukulele baixo.
    bassinet_cradle_accessory_features:
      name: Características dos acessórios para berços e moisés
      description: Destaca as características funcionais ou qualidades notáveis dos
        acessórios para berço e moisés (por exemplo, à prova d'água, com certificação
        orgânica, hipoalergênico).
    bassoon_bell_material:
      name: Material da campana do fagote
      description: Especifica o material da campana do fagote.
    bassoon_bocal_system:
      name: Sistema de bocal do fagote
      description: A variantes/tipo de bocal utilizado nos diferentes sistemas de
        fagote e em diferentes contextos de uso.
    bassoon_case_shell_type:
      name: Tipo de revestimento do estojo para fagote
      description: Indica a estrutura de proteção do estojo (macio, rígido ou híbrido).
    bassoon_keywork_material:
      name: Material das chaves do fagote
      description: Material e/ou revestimento utilizado para o mecanismo de chaves
        do fagote (chaves e componentes mecânicos).
    bassoon_model_level:
      name: Nível do modelo de fagote
      description: Indica o nível de dificuldade recomendado para o fagote.
    bassoon_performance_level:
      name: Nível de desempenho do fagote
      description: Indica o nível de domínio pretendido para o modelo de fagote.
    bassoon_reed_scrape_style:
      name: Estilo de raspagem da palheta do fagote
      description: Indica o estilo de raspagem/perfil da palheta do fagote.
    bassoon_reed_thread_color:
      name: Cor do fio da palheta do fagote
      description: Cor do fio de amarração utilizado na palheta.
    bassoon_reed_type:
      name: Tipo de palheta de fagote
      description: Especifica o subtipo de palheta de fagote para o qual o produto
        é adequado (quando aplicável).
    bassoon_system:
      name: Sistema do fagote
      description: Identifica o sistema de chaves/tradição de design do fagote utilizado
        pelo instrumento.
    bat_construction:
      name: Construção do taco
      description: Indica quantas peças distintas ou seções unidas compõem o corpo
        do taco (por exemplo, peça única, duas peças, híbrido). Isso afeta a flexibilidade,
        o controle de vibração e o desempenho geral.
    bat_handle_size_compatibility:
      name: Compatibilidade do tamanho do cabo do taco
      description: Indica os tamanhos do cabo do taco de críquete para o qual o punho
        foi projetado.
    bath_book_interactive_features:
      name: Recursos interativos do livro para hora do banho
      description: Funcionalidades de brincadeira/aprendizagem integradas ao livro
        para hora do banho.
    bath_bubble_machine_features:
      name: Características da máquina de bolhas para banho
      description: Principais características funcionais da máquina de bolhas para
        banho, além da produção básica de bolhas.
    bath_crayon_features:
      name: Características do giz de cera para banho
      description: Principais características funcionais/de segurança dos gizes de
        cera de banho.
    bath_squirter_spray_pattern:
      name: Padrão de pulverização do esguicho de banheira
      description: Descreve como o esguicho de banheira libera água (o padrão de saída)
        quando pressionado ou ativado.
    bath_toy_molded_drain_design:
      name: Brinquedo de banho com design de drenagem moldada
      description: Indica se o brinquedo foi projetado para drenar/secar a fim de
        reduzir a retenção da água.
    bath_toy_water_play_function:
      name: Função de brincar com água do brinquedo de banho
      description: Identifica o principal mecanismo de interação/brincadeira com água
        do brinquedo.
    baton_size_standard:
      name: Padrão de tamanho do bastão
      description: Classificação do tamanho do bastão de revezamento na competição
        (júnior ou sênior).
    battery_case_certification_standard:
      name: Certificação/padrão da caixa para bateria
      description: Indica as certificações ou normas de teste relevantes de transporte/segurança
        que a caixa cumpre para o transporte/armazenamento de baterias.
    battery_case_interior_padding_material:
      name: Material de preenchimento interno da caixa para bateria
      description: Especifica o material principal de amortecimento/revestimento utilizado
        no interior da caixa (se aplicável).
    battery_configuration:
      name: Configuração da bateria
      description: Indica o layout físico da bateria (fator de forma) para que os
        usuários possam escolher a bateria que melhor se adapte ao espaço limitado
        do compartimento em réplicas específicas de airsoft.
    battery_group_size:
      name: Tamanho do grupo de bateria
      description: Tamanho padronizado da caixa da bateria (por exemplo, BCI Grupo
        24F, H6) utilizado para instalação em muitos veículos.
    battery_polarity:
      name: Polaridade da bateria
      description: Especifica a polaridade/orientação do terminal (posição positiva
        da máquina). Isso constitui uma restrição fundamental para a compatibilidade
        de muitas baterias automotivas e de veículos de esportes motorizados.
    battery_standards_supported:
      name: Padrões de bateria compatíveis
      description: Especifica os padrões de classificação da bateria que o testador
        atende ao testar o desempenho ou a integridade da bateria durante a partida.
    battery_voltage_class:
      name: Classe de tensão da bateria
      description: Classe de tensão comum para o conjunto de baterias de veículos
        elétricos, usada para filtragem rápida (por exemplo, sistemas de 400 V vs.
        sistemas de 800 V).
    batting_cage_components_included:
      name: Componentes da gaiola de rebatidas incluídos
      description: Indica as peças físicas fornecidas com o produto para que os compradores
        possam confirmar se um sistema completo ou as peças de reposição específicas
        estão incluídas.
    batting_helmet_accessories_included:
      name: Acessórios para capacete de batedor incluídos
      description: Indica os acessórios de proteção ou cosméticos incluídos no pacote
        do capacete para batedor.
    batting_stuffing_form_factor:
      name: Fator de forma do enchimento e do acolchoamento
      description: Identifica se o produto é vendido como enchimento solto, folhas,
        rolos, peças pré-cortadas ou formatos predefinidos.
    batting_stuffing_loft_level:
      name: Nível de elevação do enchimento e do acolchoamento
      description: Indica a elevação/altura do enchimento (volume/altura relativa),
        normalmente utilizada para acolchoamento e seleção de enchimento.
    batting_stuffing_thermal_insulation_level:
      name: Nível de isolamento térmico do enchimento e da acolchoamento
      description: Desempenho relativo de aquecimento/isolamento do enchimento utilizado
        em colchas, jaquetas e cobertores.
    batting_tee_base_design:
      name: Design da base do suporte para rebatida
      description: Descreve o estilo ou a construção da base do suporte para rebatida.
        Isso influencia a estabilidade e os tipos de superfícies de jogo para os quais
        é adequado.
    battle_top_arena_stadium_compatibility:
      name: Compatibilidade com arenas/estádios de pião de batalha
      description: Indica com qual sistema de arena/estádio o produto foi projetado
        para ser usado (especialmente para conjuntos ou formas especiais de arena).
    battle_top_items_included:
      name: Principais itens incluídos com o pião de batalha
      description: 'Especifica quais itens do pião de batalha estão incluídos na embalagem
        (ex.: pião, lançador, estádio/arena, corda de lançamento, peças de reposição).'
    battle_top_performance_type:
      name: Tipo de desempenho do pião de batalha
      description: Descreve o estilo geral de desempenho do pião de batalha. Normalmente,
        isso reflete seu comportamento na arena (agressivo ou focado em resistência
        etc.).
    bayan_included_accessories:
      name: Acessórios do bayan incluídos
      description: Acessórios incluídos com o bayan (na caixa).
    bayan_tuning_system_type:
      name: Tipo de sistema de afinação do bayan
      description: Como o bayan é tensionado/afinado (estilo de construção). Isso
        afeta a portabilidade e a facilidade de afinação.
    bb_gun_action_type:
      name: Tipo de ação da arma de pressão
      description: Indica o mecanismo mecânico de carregamento ou recarga da arma
        de pressão (por exemplo, alavanca, bomba, cano basculante).
    bb_gun_caliber:
      name: Calibre da arma de pressão
      description: Define o diâmetro das esferas de aço que a arma foi projetada para
        disparar, garantindo a compatibilidade da munição.
    bb_gun_part_type:
      name: Tipo de peça da arma de pressão
      description: Classifica o componente ou acessório específico projetado para
        armas de pressão. Isso permite que os compradores localizem de forma rápida
        as peças de reposição, upgrade ou complemento exatas (por exemplo, cano, vedação
        do pistão, carregador rápido).
    beach_ball_features:
      name: Características da bola de praia
      description: Características funcionais notáveis específicas das bolas de praia.
    beach_bucket_features:
      name: Características do balde de praia
      description: Características funcionais do balde de praia que afetam o uso,
        a durabilidade e a praticidade.
    beach_sand_toy_items_included:
      name: Itens do brinquedo de praia e areia incluídos
      description: Peças adicionais para brincar na praia/areia incluídas com o balde
        (se vendidos como um conjunto).
    bead_breaker_type:
      name: Tipo de quebra-contas/quebrador de contas
      description: Tipo/design do mecanismo do quebrador de contas.
    bead_hole_style:
      name: Estilo de furo das contas
      description: Especifica o estilo ou configuração do furo/ranhura na conta, o
        que afeta a forma como ela se encaixa no anzol ou na linha.
    bead_type:
      name: Tipo de conta
      description: Principais tipos de contas exigidos pelo padrão.
    bead_type_patch_embellishment:
      name: Tipo de conta (enfeite de aplique)
      description: Tipo principal de contas utilizadas na superfície do adesivo.
    beaded_accessory_project_type:
      name: Tipo de projeto do acessório com contas/miçangas
      description: O acessório que o padrão cria.
    beading_needle_flexibility:
      name: Flexibilidade da agulha para bordado com miçangas
      description: Flexibilidade relativa da haste da agulha para percorrer caminhos
        estreitos em trabalhos com miçangas.
    beading_pattern_bead_size:
      name: Tamanho do miçanga padrão
      description: Tamanhos de miçangas recomendados e especificado pelo padrão (normalmente
        tamanhos de miçangas pequenas, por exemplo, 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formato do gráfico de padrões de bordado com miçangas
      description: Como o padrão é representado visualmente (por exemplo, gráfico
        vs. fotos passo a passo).
    beading_pattern_stitch_technique:
      name: Ponto/técnica do padrão de miçangas
      description: Ponto ou técnica principal de tecelagem com miçangas utilizada
        no padrão.
    beading_technique_stitch:
      name: Técnica/ponto de bordado com miçangas
      description: Identifica a principal técnica de bordado ou ponto utilizado no
        padrão (por exemplo, ponto peiote, ponto tijolo).
    beading_thread_fiber_type:
      name: Tipo de fibra do fio para bordado com miçangas
      description: Especifica o subtipo de fibra/material do fio para bordado (mais
        específico do que o material genérico) relevante para o desempenho.
    beading_thread_size:
      name: Tamanho do fio de miçangas
      description: Indica a classificação de tamanho do fabricante/setor utilizada
        para fios de bordado (específica da marca/linha), como tamanho D ou 00.
    beading_thread_use_case:
      name: Uso pretendido do fio para bordado
      description: Identifica o principal uso recomendado para o fio de bordado, ajudando
        os clientes a escolher o produto certo para o seu projeto.
    beading_wire_coating_material:
      name: Material de revestimento de arame para bijuteria
      description: Especifica o material de revestimento externo do fio de miçangas
        (se houver), que afeta o toque, a durabilidade e a resistência a dobras.
    beading_wire_strand_count:
      name: Número de fios do arame para bijuterias
      description: Indica o número de fios em um arame de miçangas multifilamento
        (por exemplo, 7 fios, 19 fios, 49 fios), o que afeta a flexibilidade e o caimento.
    beadlock_type:
      name: Tipo de beadlock
      description: Indica se a roda é do tipo beadlock e qual o estilo (útil para
        compradores de veículos off-road/UTV).
    beam_material:
      name: Material da viga
      description: Material principal da viga/haste (com frequência diferente das
        cabeças/acessórios).
    beam_pattern:
      name: Padrão de feixe
      description: Padrão de distribuição da luz emitida para iluminação de condução/fora
        de estrada.
    bean_bag_fabric_material:
      name: Material do tecido doo pufe
      description: Identifica o tecido exterior utilizado nos pufes que foi fornecido
        com o conjunto.
    bean_paste_variety:
      name: Variedade de pasta de feijão
      description: Classifica o tipo específico de pasta de feijão com base no método
        de produção ou no ingrediente principal.
    bean_preparation:
      name: Preparação do feijão
      description: Indica como os grãos são preparados ou processados antes da venda
        (por exemplo, vagens inteiras, descascados, picados, germinados).
    bean_variety:
      name: Variedade de feijão
      description: Especifica a variedade botânica ou de mercado dos feijões (por
        exemplo, feijão verde, edamame, feijão-de-metro).
    beanie_style:
      name: Estilo do gorro
      description: Especifica o design geral, a construção ou a silhueta do gorro
        para que os compradores possam escolher rapidamente entre as variações mais
        comuns.
    bearing_clearance:
      name: Folga do rolamento
      description: Indica a classe de folga radial interna do rolamento (quantidade
        de folga interna); a classe C0 também é conhecida como CN ou folga normal.
    bearing_construction_type:
      name: Tipo de construção do rolamento
      description: Identifica o tipo de rolamento ou o estilo de construção utilizado
        no cubo (por exemplo, cartucho, esferas soltas).
    bearing_edge_type:
      name: Tipo de borda de apoio
      description: Tipo/perfil da borda do tambor, que influencia o ataque e a sustentação.
    bearing_lubrication:
      name: Lubrificação de rolamentos
      description: Indica o tipo de lubrificante aplicado ao rolamento durante a fabricação,
        como graxa ou óleo.
    bearing_material:
      name: Material do rolamento
      description: Identifica o material de construção do rolamento (por exemplo,
        aço, híbrido de cerâmica), ajudando os ciclistas a escolher entre opções de
        durabilidade, custo e desempenho.
    bearing_rating:
      name: Classificação do rolamento
      description: Especifica a tolerância do rolamento ou a classe de desempenho
        usada nos patins (por exemplo, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Código da vedação do rolamento
      description: Indica o tipo de vedação utilizado no rolamento, o que afeta a
        durabilidade e a resistência ao rolamento.
    bearing_seal_type:
      name: Tipo de vedação do rolamento
      description: Especifica o projeto de vedação ou blindagem que protege os componentes
        internos do rolamento contra contaminantes e afeta o arrasto (por exemplo,
        2RS, ZZ, LLU, aberto).
    bearing_shield_type:
      name: Tipo de proteção do rolamento
      description: Tipo de blindagem ou vedação que protege os componentes internos
        do rolamento.
    bearing_size_code:
      name: Código de tamanho do rolamento
      description: 'Designação padronizada de rolamentos (ex.: 608, 688) que combina
        diâmetro interno, diâmetro externo e largura.'
    bearing_type:
      name: Tipo de rolamento
      description: Especifica o estilo de construção dos rolamentos utilizados no
        conjunto de direção.
    beater_head_material:
      name: Material da cabeça do batedor
      description: Especifica o material de contato/cabeça de uma baqueta de bumbo
        (por exemplo, feltro, madeira, borracha).
    beaters_included:
      name: Batedores incluídos
      description: Especifica quantas baquetas estão incluídas/instaladas com o pedal
        de bateria (por exemplo, baqueta simples ou dupla), ou se nenhuma baqueta
        está incluída.
    bed_base_type:
      name: Tipo de base da cama
      description: 'Define o estilo estrutural da base da cama ou do divã (ex.: plataforma,
        ripas flexíveis, ajustável).'
    bed_storage_type:
      name: Tipo de armazenamento da cama
      description: Define o mecanismo de armazenamento integrado da estrutura da cama.
    bedroom_furniture_items_included:
      name: Iten de móveis de banheiro incluídos
      description: 'Especifica as peças de mobiliário que compõem o conjunto de quarto
        (ex.: cama, cômoda, mesas de cabeceira), permitindo aos compradores ver rapidamente
        o que está incluído sem precisar ler longas descrições.'
    bedroom_vanity_items_included:
      name: Itens de toucador para quarto incluídos
      description: Lista os itens individuais incluídos em um conjunto de penteadeira
        para quarto, para que os clientes saibam exatamente o que será entregue (por
        exemplo, espelho, banqueta, kit de iluminação).
    beer_based_cocktail_variety:
      name: Variedade de coquetel à base de cerveja
      description: Classifica coquetéis à base de cerveja pela variedade específica,
        por exemplo, Radler, Shandy, Michelada.
    beet_variety:
      name: Variedade de beterraba
      description: 'Especifica a cultivar ou variedade de beterraba, ajudando os compradores
        a identificar o sabor, a cor e os usos culinários (ex.: vermelha, dourada,
        Chioggia).'
    bell_actuation_mechanism:
      name: Mecanismo de acionamento do sino
      description: Especifica a ação do usuário necessária para tocar a campainha,
        ajudando os compradores a escolher a ergonomia preferida.
    bell_guard_coverage_area:
      name: Área de cobertura do protetor de sino
      description: Indica qual parte do sino o protetor foi projetado para proteger.
    bell_material:
      name: Material do sino
      description: Material do componente da campânula (se especificado separadamente
        do material geral do instrumento).
    bellhousing_bolt_pattern:
      name: Padrão de parafusos da carcaça da embreagem
      description: Especifica o padrão ou família de padrões de parafusos da carcaça
        da embreagem/lado do motor que a caixa da transmissão utiliza.
    bellows_material:
      name: Material do fole
      description: Material do corpo do fole/revestimento (se incluído).
    bellows_orientation:
      name: Orientação do fole
      description: Indica a configuração do fole utilizada para fornecer ar aos tubos.
    belly_panel_style:
      name: Estilo de painel abdominal
      description: Descreve a construção do cós ou painel abdominal que acomoda uma
        barriga em crescimento.
    belt_buckle_type:
      name: Tipo fivela de cinto
      description: Descreve o mecanismo ou design específico da fivela utilizada no
        cinto.
    beret_style:
      name: Estilo de boina
      description: Identifica o modelo específico da boina ou sua variante cultural.
    berry_species:
      name: Espécie de baga
      description: Indica a espécie de baga contida no produto para que os compradores
        possam filtrar rapidamente a baga desejada.
    beta_casein_variant:
      name: Variante de beta-caseína
      description: Especifica qual variante da proteína beta-caseína (por exemplo,
        A2) está presente no leite para os consumidores que se preocupam com a digestibilidade.
    beverage_sweetness_level:
      name: Nível de doçura da bebida
      description: Classifica a bebida de acordo com o grau de doçura ou açúcar adicionado.
    bezel_graduation_units:
      name: Unidades de graduação do aro
      description: Especifica as marcações de unidade no aro rotativo (graus, mils
        ou escala dupla).
    bicycle_brake_set_components_included:
      name: Componentes incluídos no conjunto de freio de bicicleta
      description: Lista as peças físicas individuais fornecidas no kit para que os
        compradores saibam exatamente o que está incluído e possam comparar diferentes
        configurações de pacotes.
    bicycle_cage_mounting_position:
      name: Posição de montagem do suporte para garrafa da bicicleta
      description: Especifica em que parte da bicicleta o suporte para garrafa foi
        projetado para ser instalado.
    bicycle_computer_mount_placement:
      name: Posicionamento do suporte para computador de bicicleta (ciclocomputador)
      description: Identifica o local de instalação do suporte do ciclocomputador
        na bicicleta, como na parte frontal do guidão ou na tampa superior da mesa.
    bicycle_folding_mechanism:
      name: Mecanismo de dobragem de bicicleta
      description: Especifica o sistema de dobragem mecânica utilizado no quadro da
        bicicleta (por exemplo, dobragem ao meio, dobragem vertical).
    bicycle_frame_design:
      name: Design do quadro da bicicleta
      description: Especifica o estilo geral do quadro de uma bicicleta, o que afeta
        a acessibilidade, a capacidade de carga e o armazenamento.
    bicycle_frame_style:
      name: Estilo do quadro da bicicleta
      description: Descreve o estilo estrutural do quadro da bicicleta (com barra
        baixa, lowrider, chopper alongado etc.), que influencia a postura do ciclista
        e a estética.
    bicycle_handlebar_type:
      name: Tipo de guidão para bicicleta
      description: Identifica o estilo ou geometria específica do guidão, ajudando
        os ciclistas a selecionar guidões adequados à posição de pilotagem e à modalidade.
    bicycle_headset_configuration:
      name: Configuração da caixa de direção da bicicleta
      description: 'Indica o estilo estrutural ou padrão do conjunto de direção da
        bicicleta de acordo com a disposição das esferas da caixa de direção (p. ex:
        externa, ZeroStack, integrada, roscada).'
    bicycle_hub_type:
      name: Tipo de quadro de bicicleta
      description: Descreve o mecanismo do cubo fornecido com a roda, que influencia
        a compatibilidade do sistema de transmissão e o estilo de pedalada.
    bicycle_lock_security_certification:
      name: Certificação de segurança do cadeado para bicicleta
      description: 'Certificação independente de terceiros que valida o desempenho
        antifurto (ex.: Sold Secure, ART, Varefakta).'
    bicycle_pedal_type:
      name: Tipo de pedal de bicicleta
      description: Especifica o estilo geral de funcionamento ou o design do pedal,
        como modelos de plataforma, variantes clipless ou híbridos, ajudando os ciclistas
        a escolher a interface mais adequada ao seu estilo de pedalada.
    bicycle_propulsion_type:
      name: Tipo de propulsão de bicicleta
      description: Especifica como a bicicleta é movida, seja por pedalada manual,
        assistência elétrica ou motor de combustão interna.
    bicycle_pump_type:
      name: Tipo de bomba de bicicleta
      description: Identifica o estilo estrutural da bomba, ajudando os compradores
        a escolher o modelo mais adequado às suas necessidades de pedalada, armazenamento
        ou emergência.
    bicycle_rack_mounting_type:
      name: Tipo de montagem do suporte para bicicleta
      description: Descreve o método principal ou local utilizado para fixar o rack
        à bicicleta, auxiliando os usuários a confirmar a compatibilidade com o quadro
        e os equipamentos.
    bicycle_suspension_type:
      name: Tipo de suspensão de bicicleta
      description: Identifica a presença e a configuração da suspensão na bicicleta.
    bicycle_tire_tread_pattern:
      name: padrão da banda de rodagem do pneu para bicicleta
      description: Especifica o estilo da banda de rodagem do pneu. Isso influencia
        a tração e a resistência ao rolamento em diferentes superfícies.
    bidirectional_charging_capability:
      name: Capacidade de carregamento bidirecional
      description: Indica se o veículo elétrico é compatível com modos de carregamento
        bidirecionais, como V2G e/ou V2H.
    bike_rack_mounting_style:
      name: Estilo de montagem em rack para bicicleta
      description: Como a bicicleta é apoiada/fixada pelo rack/suporte.
    bike_rack_tilt_function:
      name: Função de inclinação do suporte para bicicletas
      description: Indica se existe alguma função de inclinação que permita o acesso
        ao compartimento de carga traseiro com o suporte instalado.
    bikini_top_style:
      name: Modelo da parte de cima do biquíni
      description: Especifica o design ou corte da parte superior do biquíni, ajudando
        os compradores a encontrar os modelos e silhuetas preferidos.
    billiard_brush_type:
      name: Tipo de escova para bilhar
      description: 'Define o tipo específico de ferramenta de limpeza de mesa de bilhar
        (p. ex.: escova de mesa, escova de borda, bloco de polimento).'
    billiard_glove_finger_coverage:
      name: Cobertura dos dedos da luva de bilhar
      description: Identifica quais dedos estão cobertos pelo design da luva, proporcionando
        uma filtragem precisa dos estilos de luvas específicos para bilhar.
    billiard_pocket_style:
      name: Estilo de caçapa de bilhar
      description: Especifica o estilo estrutural ou estético do bolso, que afeta
        a compatibilidade e a decoração da mesa.
    billiard_rack_style:
      name: Estilo de armação de bilhar
      description: 'Descreve o estilo físico ou mecanismo da armação (p. ex.: estrutura
        tradicional, folha de modelo, dobrável).'
    billiard_table_type:
      name: Tipo de mesa de bilhar
      description: Especifica a modalidade de jogo de bilhar ou o estilo de utilização
        para o qual a mesa foi projetada (por exemplo, bilhar, sinuca, carambola).
    billiards_discipline:
      name: Modalidade de bilhar
      description: Indica a variação específica do jogo de bilhar (tipo de jogo) para
        a qual o produto foi projetado ou com a qual é compatível.
    binding_compatibility_standard:
      name: Padrão de compatibilidade da fixação
      description: Identifica a interface de fixação (norma da sola) para a qual a
        bota de esqui está certificada. Isso garante o emparelhamento seguro e correto
        com as fixações de esqui.
    binding_inclusion:
      name: Inclusão de fixação
      description: Especifica se os esquis são vendidos desmontados, com sistema integrado
        ou com fixações separadas incluídas.
    binding_interface:
      name: Interface de fixação
      description: Indica o padrão da placa de fixação ou interface com a qual os
        esquis vêm pré-montados ou com a qual são compatíveis. Isso garante a compatibilidade
        entre bota a e a fixação.
    binding_liner_type:
      name: Tipo de revestimento da fixação
      description: Descreve o tipo de forro interno utilizado na fixação/bota (por
        exemplo, removível, adequado para caminhar, moldável a quente).
    binding_mounting_system:
      name: Sistema de montagem da fixação
      description: Identifica a interface utilizada para instalar a fixação no esqui
        (montagem plana, trilho/encaixe, placa etc.).
    binding_position:
      name: Posição da encadernação
      description: 'Indica a posição ou configuração de montagem pretendida para a
        fixação (p. ex.: bota dianteira, bota traseira, ARTP).'
    binding_strap_position:
      name: Posição da alça de fixação
      description: Especifica o local na fixação em que a alça deve ser instalada.
    bingo_components_included:
      name: Componentes de bingo incluídos
      description: Lista os componentes incluídos no conjunto de bingo, como bolas
        de bingo, cartela e marcadores.
    bingo_number_range:
      name: Intervalo de números do bingo
      description: Identifica o intervalo/variante de números de bingo compatíveis
        com o conjunto.
    bingo_set_features:
      name: Características do conjunto de bingo
      description: Identifica o formato principal do conjunto de bingo (físico/manual
        ou eletrônico/interativo).
    bipod_mounting_interface:
      name: Interface de montagem para bipé
      description: Especifica a interface de fixação utilizada para conectar o bipé
        à arma de fogo ou ao sistema de trilhos.
    bit_attachment_type:
      name: Tipo de fixação da broca
      description: Especifica como a cabeçada se conecta ao freio (por exemplo, com
        pontas de cordão, pontas com fivela ou pontas com parafuso Chicago).
    bit_mouthpiece_design:
      name: Design do bocal do bit
      description: Identifica o estilo estrutural ou a configuração das juntas do
        bocal, que determina a distribuição da pressão, a distância em relação ao
        palato e a intensidade geral.
    bit_ring_style:
      name: Estilo de anel do bit
      description: Define o estilo da argola ou da haste do freio que se prende à
        cabeçada. Isso influencia a ação, a orientação lateral e a sensibilidade das
        rédeas.
    bladder_material:
      name: Material da bolsa/reservatório
      description: Identifica o material utilizado na câmara de ar interna.
    blade_attachment_type:
      name: Tipo de fixação da lâmina
      description: Identifica se o patim utiliza um mecanismo de encaixe (articulado)
        ou uma montagem de lâmina fixa.
    blade_finish_coating:
      name: Acabamento/revestimento da lâmina
      description: Tratamento de superfície aplicado à lâmina para fins estéticos
        ou de proteção contra corrosão.
    blade_hosel_type:
      name: Tipo de encaixe da lâmina
      description: Especifica o estilo de conexão do encaixe da lâmina no eixo, o
        que afeta a compatibilidade (por exemplo, padrão ou cônico).
    blade_length_type:
      name: Tipo de comprimento da lâmina
      description: Classifica o comprimento da lâmina da nadadeira como curto, médio
        ou longo. Cada um deles influenciando a cadência da batida de pés e os objetivos
        de treinamento.
    blade_lie:
      name: Ângulo da lâmina
      description: Especifica o número de ângulo da lâmina do taco de hóquei, indicando
        como a lâmina se posiciona no gelo em relação ao cabo.
    blade_sharpness:
      name: Afiação da lâmina
      description: Indica se a lâmina da arma está afiada ou cega para fins de treinamento.
    blade_size_category:
      name: Categoria do tamanho da lâmina
      description: Código internacional padronizado para o tamanho das lâminas de
        sabre (0–5), utilizado para distinguir as lâminas para jovens das lâminas
        para adultos.
    blade_size_class:
      name: Classe de tamanho da lâmina
      description: Classifica a lâmina de acordo com as convenções de tamanho do jogador,
        combinando tamanhos de haste como juvenil, júnior, intermediário ou sênior.
    blade_size_number:
      name: Número da tamanho da lâmina
      description: Código numérico padrão de tamanho (0–5) definido pelos regulamentos
        de esgrima que determina o comprimento da lâmina e a elegibilidade por idade.
    blaster_mechanism:
      name: Mecanismo de disparo
      description: Define o mecanismo de funcionamento interno da pistola de gel (por
        exemplo, GBB, AEG, mola).
    block_edge_style:
      name: Estilo de borda em bloco
      description: Descreve como as bordas/cantos dos blocos de madeira são acabados
        para proporcionar uma sensação agradável ao toque e maior segurança.
    blocking_mat_features:
      name: Recursos do tapete de bloqueio
      description: Características funcionais específicas dos tapetes de bloqueio
        (armazenamento, portabilidade, facilidade de uso).
    blocking_mat_grid_unit:
      name: Unidade de grade para tapete de bloqueio
      description: O sistema de unidades usado na grade impressa ajuda os usuários
        a combinar padrões e medidas.
    blocking_mat_surface_markings:
      name: Marcações na superfície do tapete de bloqueio
      description: Tipo de marcações de medição/guia impressas ou moldadas na superfície
        do tapete.
    blocking_wire_coating:
      name: Revestimento de fio de bloqueio/blocagem
      description: Tratamento/revestimento superficial no fio de bloqueio que afeta
        a resistência à ferrugem, a suavidade e o risco de enroscamento.
    blocking_wire_end_cap_type:
      name: Tipo de tampa para extremidade de fio de bloqueio/blocagem
      description: Especifica o tipo de proteção/acabamento utilizado nas extremidades
        dos fios de bloqueio para segurança e proteção do tecido.
    blocking_wire_set_includes:
      name: O conjunto de fios de bloqueio/blocagem inclui
      description: 'Especifica quais componentes estão incluídos nos fios de bloqueio
        (ex.: pinos em T, tubo de armazenamento).'
    blocking_wire_usage:
      name: Uso dos fios de bloqueio/blocagem
      description: Principal aplicação para a qual o fio de bloqueio flexível foi
        projetado.
    bloom_stage:
      name: Fase de floração
      description: Indica o grau de abertura das margaridas no momento da entrega/envio.
    blower_motor_bearing_type:
      name: Tipo de rolamento do motor do ventilador
      description: Especifica o projeto do rolamento utilizado no motor do ventilador.
    blower_motor_mounting_position:
      name: Posição de montagem do motor do ventilador
      description: 'Localização do motor do ventilador no veículo/módulo HVAC (p.
        ex.: dianteiro, traseiro).'
    blowpipe_valve_type:
      name: Tipo de válvula de sopro
      description: Especifica o tipo de válvula de sopro incluída (se houver).
    bo_staff_style:
      name: Estilo do bastão Bô
      description: Define o estilo estrutural ou a construção do bastão (por exemplo,
        reto, cônico, acolchoado com espuma, dobrável).
    board_game_theme:
      name: Tema do jogo de tabuleiro
      description: Tema narrativo/cenário do jogo de tabuleiro (utilizado para exploração
        e navegação).
    board_rail_shape:
      name: Formato da borda da prancha
      description: Especifica o contorno das bordas da prancha (por exemplo, suaves,
        rígidas, 50/50) que influenciam a aderência e a propulsão na onda.
    board_size_classification:
      name: Classificação do tamanho da placa
      description: Classifica a placa ou conjunto de cornhole em tamanhos padronizados
        comuns.
    board_type_compatibility:
      name: Compatibilidade do tipo da prancha
      description: Especifica o tipo de prancha para a qual a guia foi projetada.
    boat_construction_type:
      name: Tipo de construção do barco
      description: Descreve o estilo ou formato estrutural do barco a remo (por exemplo,
        inflável, rígido).
    boat_hook_flotation:
      name: Flutuação do gancho do barco
      description: Indica se o gancho do barco foi projetado para flutuar caso caia
        na água.
    boat_ladder_stowage_style:
      name: Estilo de armazenamento da escada do barco
      description: Descreve como a escada pode ser armazenada quando não estiver em
        uso (por exemplo, dobrável, retrátil, removível).
    boat_trailer_construction_type:
      name: Tipo de construção de reboque para barco
      description: Indica se o reboque suporta o barco com berços, roletes ou um sistema
        híbrido.
    boat_weaving_shuttle_weft_exit_type:
      name: Tipo de saída da trama em teares de lançadeira tipo barco
      description: Indica como o fio da trama sai da lançadeira durante a tecelagem.
    bobbin_loading_type:
      name: Tipo de carregamento da bobina
      description: Especifica como a bobina é inserida/carregada na máquina de costura.
    bobbin_system:
      name: Sistema de bobina
      description: Sistema/tipo de carregamento da bobina utilizado pela máquina de
        costura.
    bobbin_type:
      name: Tipo de bobina
      description: Especifica o formato do suporte de fio para o qual a lançadeira
        foi projetada (ou que ela inclui). Isso determina a compatibilidade e o uso
        típico (por exemplo, as lançadeiras tipo barco costumam usar bobinas; as lançadeiras
        tipo trapo podem ser abertas para tiras).
    bobbin_winder_winding_direction:
      name: Direção de enrolamento do enrolador de bobinas
      description: Especifica o sentido de enrolamento/rotação oferecido pelo enrolador
        de bobina.
    bobble_mechanism:
      name: Mecanismo de oscilação
      description: Especifica o estilo do mecanismo de oscilação, que influencia o
        movimento e a durabilidade.
    bocal_material:
      name: Material do bocal
      description: Especifica o material dos bocais incluídos.
    bodhr_n_head_material:
      name: Material da cabeça do bodhrán
      description: O material da pele de reprodução (membrana), que influencia fortemente
        o timbre e os requisitos de manutenção.
    bodhr_n_tuning_system_type:
      name: Tipo de sistema de afinação do bodhrán
      description: O tipo de mecanismo de afinação integrado que é usado para ajustar
        a tensão da pele (se for ajustável).
    body_armor_coverage_area:
      name: Área de cobertura da armadura corporal
      description: Indica quais zonas do corpo o produto protege.
    body_armor_intended_use:
      name: Uso pretendido da armadura corporal
      description: Especifica o principal cenário de pilotagem ou uso para o qual
        a armadura corporal para quadriciclos/UTVs foi projetada.
    body_cord_connector_style:
      name: Estilo do conector do cabo do corpo
      description: Descreve a configuração do conector nas extremidades do cabo (por
        exemplo, número de pinos ou tipo baioneta) que determina a compatibilidade
        com armas e caixas de pontuação.
    body_panel_finish_state:
      name: Estado de acabamento do painel da carroceria
      description: Descreve o estado de preparação/acabamento da superfície do painel
        lateral, tal como vendido, para pintura/instalação.
    body_shape:
      name: Formato do corpo
      description: Especifica o formato/estilo geral do corpo da guitarra elétrica.
    bodysuit_bottom_coverage:
      name: Cobertura da parte inferior do corpo
      description: Define o corte e a cobertura da parte inferior do corpo, o que
        afeta o conforto e a compatibilidade com o resto da roupa.
    boilie_shape:
      name: Formato da boilie
      description: Identifica a forma das boilies produzidas pela mesa de rolamento,
        permitindo que os pescadores escolham entre diferentes perfis de isca.
    boilie_stop_buoyancy:
      name: Flutuabilidade da trava da boilie
      description: Especifica se a trava da boilie foi projetada para flutuar, afundar
        ou manter a flutuabilidade neutra, o que afeta a apresentação da isca na coluna
        d'água.
    bok_choy_variety:
      name: Variedade de bok choy
      description: Especifica o cultivar, o nome de mercado ou a variedade do bok
        choy (por exemplo, Baby, Shanghai, Nai Bai, Tatsoi, roxo Lady), permitindo
        aos compradores selecionar o sabor, o tamanho e a aparência desejados.
    bolt_drive_style:
      name: Estilo de encaixe do parafuso
      description: Especifica o tipo de encaixe dos parafusos de montagem do skate,
        distinguindo entre os tipos comuns de cabeça/chave, como Allen ou Phillips.
    bone_content:
      name: Conteúdo ósseo
      description: Especifica se a carne contém ossos.
    bongo_center_block_material:
      name: Material do bloco central do bongô
      description: Material do bloco central que conecta as duas conchas do bongô
        (se aplicável).
    bongo_shell_material:
      name: Material da concha do bongô
      description: Material dos cascos dos bongôs (corpos dos tambores), excluindo
        peles e acessórios.
    bongo_tuning_system:
      name: Sistema de afinação do bongô
      description: 'Indica como os bongôs são afinados/construídos para afinação (ex.:
        afinação tradicional com parafusos de afinação vs. afinação com corda). Isso
        afeta a manutenção e a autenticidade.'
    boning_type:
      name: Tipo de barbatana
      description: Identifica o sistema de suporte estrutural dentro da cinta modeladora,
        combinando o material e o estilo/formato das barbatanas utilizadas. Isso influencia
        diretamente o nível de suporte, a flexibilidade e a durabilidade.
    boot_liner_type:
      name: Tipo de forro de bota
      description: Descreve as características de construção ou personalização da
        palmilha interna da bota de snowboard (por exemplo, moldável a quente, removível).
    boot_sole_compatibility:
      name: Compatibilidade da sola da bota
      description: Lista as normas de sola de bota ou sistemas de interface que a
        fixação aceita.
    boot_support_level:
      name: Nível de suporte da bota
      description: Descreve a rigidez/tendência geral do tornozelo ou da bota proporcionada
        pelo patim.
    boot_width_code:
      name: Código de largura da bota
      description: 'Designação de largura baseada em letras e usada pelo fabricante,
        especificamente para dimensionamento de patins de patinação artística (ex.:
        AAA, AA, B, C, D).'
    booth_configuration:
      name: Configuração do estande
      description: Identifica a configuração geral dos assentos da cabine (por exemplo,
        de um lado só, de canto, modular).
    bootie_toe_design:
      name: Design do bico de botinha
      description: Identifica o estilo de construção da ponta das sapatilhas de surf
        e das botas de recife.
    border_type:
      name: Tipo de borda
      description: Acabamento das bordas/estilo da borda do remendo bordado (afeta
        a aparência, a resistência ao desgaste e a percepção de qualidade).
    bore_cleaner_format:
      name: Formato de limpador de cano
      description: Indica o formato físico do produto de limpeza de canos (ferramenta
        ou consumível).
    bore_cleaner_safe_for_finish:
      name: Limpador de cano seguro para acabamento
      description: Indica com quais acabamentos comuns de instrumentos de metal o
        limpador de cano pode ser usado com segurança.
    bottle_cage_loading_direction:
      name: Direção de carregamento do suporte para garrafas
      description: Descreve a direção a partir da qual uma garrafa é inserida ou removida
        do suporte.
    bottle_neck_finish_closure_size:
      name: Acabamento/fechamento do gargalo da garrafa
      description: O tamanho padronizado da abertura/acabamento da garrafa garante
        a compatibilidade com tampas, rolhas e arrolhadores (por exemplo, acabamento
        de coroa de 26 mm).
    bottle_style:
      name: Estilo de garrafa
      description: Formatos comuns de garrafas utilizadas na fabricação caseira de
        cerveja e vinho.
    bottom_bracket_interface:
      name: Interface do movimento central
      description: Identifica o padrão do eixo/movimento central para o qual o pedivela
        foi projetado, garantindo a compatibilidade do quadro e do movimento central.
    bottom_bracket_standard:
      name: Padrão do movimento central
      description: A caixa/interface do movimento central suportada pelo quadro, determinando
        a compatibilidade do pedivela.
    bottom_type_suitability:
      name: Adequação do tipo de fundo
      description: Especifica as condições do leito marinho/fundo do mar para as quais
        a âncora foi projetada para oferecer a melhor fixação.
    bounce_level:
      name: Nível de rebote
      description: Indica o grau de rebote da bola quando a deixam cair ou ela é lançada,
        ajudando os usuários a escolher a bola certa para exercícios como arremessos
        contra a parede ou batidas.
    bouncy_ball_surface_finish:
      name: Acabamento da superfície da bola saltitante
      description: Especifica o acabamento tátil e/ou visual da superfície de uma
        bola saltitante (por exemplo, lisa, áspera, com brilho).
    boundary_marker_type:
      name: Tipo de marcador de limite
      description: 'Define a forma física do marcador ou produto de marcação do limite
        do campo ou da quadra (ex.: cone, fita, tinta, estêncil, máquina).'
    bouquet_size_tier:
      name: Faixa de tamanho do buquê
      description: Tamanho padronizado para o buquê/ramalhete, independente da quantidade
        de hastes (útil quando se utilizam hastes mistas).
    bow_and_yo_yo_edge_finish:
      name: Acabamento com laço e borda em ioiô
      description: Descreve o acabamento/recorte usado no laço/iô-iô (especialmente
        para laços feitos com fita).
    bow_case_shell_type:
      name: Tipo de caixa do arco
      description: 'Descreve a construção estrutural do exterior do estojo do arco
        (ex.: capa rígida vs. estojo flexível).'
    bow_compatibility:
      name: Compatibilidade do arco
      description: Especifica o tipo de arco para o qual a ponta de flecha é destinada
        ou classificada.
    bow_hair_color:
      name: Cor do cabelo do arco
      description: 'Identifica a cor/aparência do pelo/fibra usado no arco de um instrumento
        de cordas orquestral (ex.: branco/descolorido, branco natural, preto).'
    bow_stick_material:
      name: Material da haste da proa
      description: Identifica o material utilizado na vareta do arco (a haste principal),
        que influencia fortemente o peso, a sensação ao tocar e o preço.
    bow_type:
      name: Tipo de arco
      description: Especifica o projeto estrutural do arco juvenil (por exemplo, composto,
        recurvo, arco longo). Isso influencia fortemente o estilo de tiro, os acessórios
        necessários e os programas de treinamento.
    bow_winding_material:
      name: Material para enrolamento de arco
      description: Especifica o material utilizado para o enrolamento/envoltório do
        arco, o que afeta a empunhadura e o equilíbrio.
    bow_yo_yo_embellishment_style:
      name: Estilo com enfeite do laço/ioiô
      description: Identifica o estilo de construção do enfeite (laço ou estrutura
        em ioiô de tecido).
    bowling_ball_core_type:
      name: Tipo de núcleo da bola de boliche
      description: Identifica o design interno do núcleo ou a simetria da bola de
        boliche. Isso influencia o movimento da bola e o potencial de curva.
    bowling_ball_coverstock_type:
      name: Tipo de revestimento da bola de boliche
      description: Especifica o material ou a tecnologia da camada externa da bola
        de boliche, que determina a tração e o potencial de curva.
    bowling_set_style:
      name: Estilo do conjunto de boliche
      description: Define o estilo geral ou o tipo de uso do conjunto de boliche.
    box_lid_type:
      name: Tipo de tampa da caixa
      description: Tipo de tampa/mecanismo de abertura utilizado pela lata ou caixa
        de presente.
    box_spring_profile:
      name: Perfil do estrado de molas
      description: Classifica a altura total do estrado em categorias de perfil fáceis
        de usar para os compradores (por exemplo, perfil baixo, padrão, perfil alto),
        para que os clientes possam filtrar rapidamente sem precisar saber as medidas
        exatas.
    box_spring_requirement:
      name: Requisitos do estrado de molas
      description: Indica se é necessário um estrado de molas ou uma base adicional
        para o colchão.
    boxing_ring_style:
      name: Estilo de ringue de boxe
      description: Classifica o estilo geral de construção ou o cenário de uso pretendido
        do ringue (por exemplo, competição ou treinamento, elevado ou no chão).
    bra_length_type:
      name: Tipo de comprimento do sutiã
      description: Define a classificação do comprimento dos sutiãs com base na cobertura
        vertical, como padrão, longo, médio ou curto.
    bra_padding_type:
      name: Tipo de sutiã
      description: Descreve o nível ou presença de preenchimento nos bojos.
    braces_compatibility:
      name: Compatibilidade dos suportes
      description: Especifica se o protetor bucal pode ser usado com aparelhos ortodônticos
        e em que medida.
    brake_band_form:
      name: Forma da banda de freio
      description: Indica se a banda de freio é fornecida como um laço contínuo (sem
        fim) ou como um comprimento cortado que deve ser fixado.
    brake_band_material_type:
      name: Tipo de material da banda de freio
      description: Especifica o material funcional da banda de freio (por exemplo,
        corda de algodão, linha de nylon ou aço mola). Isso afeta a durabilidade,
        a aderência, a elasticidade e o ruído.
    brake_band_style:
      name: Estilo da banda de freio
      description: Especifica o sistema/estilo de tensão da banda de freio utilizado
        em uma roda de fiar para aplicar tensão ao disco giratório e à bobina.
    brake_bleeding_method:
      name: Método de sangria do freio
      description: Abordagem de sangria compatível com o kit.
    brake_booster_assist_type:
      name: Tipo de assistência do servofreio
      description: Indica o mecanismo de assistência utilizado pelo servofreio.
    brake_booster_diaphragm_configuration:
      name: Configuração do diafragma do servofreio
      description: Indica o número/tipo de diafragmas utilizados no servofreio.
    brake_caliper_bleeder_screw_position:
      name: Posição do parafuso de sangria da pinça de freio
      description: Especifica a posição do parafuso de sangria na pinça de freio quando
        instalado (utilizado para verificar se o parafuso de sangria está orientado
        no ponto mais alto para uma sangria adequada).
    brake_caliper_finish:
      name: Acabamento da pinça de freio
      description: Especifica o acabamento superficial ou revestimento de proteção
        aplicado ao corpo da pinça de freio (por exemplo, pintura, galvanização, anodização).
    brake_caliper_included_hardware:
      name: Equipamentos incluídos com a pinça de freio
      description: Especifica o que está incluído no conjunto da pinça de freio.
    brake_caliper_mount_type:
      name: Tipo de montagem da pinça de freio
      description: Tipo de interface de montagem utilizada para fixar a pinça ao pivô/suporte.
    brake_caliper_paint_base_chemistry:
      name: Química da base da tinta para pinças de freio
      description: O sistema de tinta/resina ou família química utilizada.
    brake_caliper_paint_kit_contents:
      name: Conteúdo do kit de pintura para pinças de freio
      description: Indica o que está incluído na embalagem além da própria tinta.
    brake_circuit_type:
      name: Tipo de circuito de freio
      description: Configuração do circuito hidráulico compatível com o cilindro mestre.
    brake_clutch_fluid_base_chemistry:
      name: Composição química do fluido de freio/embreagem
      description: Base química primária do fluido hidráulico de freio/embreagem.
        Isso afeta a compatibilidade e a miscibilidade.
    brake_clutch_fluid_dot_specification:
      name: Especificação DOT do fluido de freio/embreagem
      description: 'Classificação de desempenho DOT para fluidos hidráulicos de freio/embreagem
        (p. ex.: DOT 3, DOT 4).'
    brake_drum_finish_coating:
      name: Acabamento/revestimento do tambor de freio
      description: 'Acabamento superficial ou revestimento de proteção aplicado ao
        tambor de freio (p. ex.: eletroforese, pintura, revestimento de zinco).'
    brake_drum_type:
      name: Tipo de tambor de freio
      description: Tipo de projeto do tambor de freio (com ou sem cubo/rolamento integrado).
    brake_fluid_base:
      name: Base do fluido de freio
      description: Especifica a formulação do fluido de freio hidráulico necessário
        ou incluído.
    brake_fluid_base_chemistry:
      name: Química básica do fluido de freio
      description: Define a base química do fluido de freio, que determina a compatibilidade
        e as regras de mistura.
    brake_fluid_dot_specification:
      name: Especificação DOT do fluido de freio
      description: 'Indica a classificação/especificação DOT do fluido de freio (p.
        ex.: DOT 3, DOT 4) para produtos de fluido de freio.'
    brake_fluid_standards_compliance:
      name: Conformidade com as normas de fluido de freio
      description: Padrões da indústria que o fluido de freio alega atender (além
        da classificação DOT).
    brake_fluid_type:
      name: Tipo de fluido de freio
      description: Especifica o fluido de freio necessário para pinças de freio hidráulicas
        de bicicletas.
    brake_hose_end_fitting_type:
      name: Tipo de conexão da extremidade da mangueira de freio
      description: Tipo de conexão em cada extremidade da mangueira de freio (por
        exemplo, banjo, abaixado, rosca fêmea/macho), utilizado para garantir a compatibilidade
        com pinças/mangueiras.
    brake_lever_pull_type:
      name: Tipo de alavanca de freio
      description: Define a relação de tração/mecânica do cabo para a qual a alavanca
        foi projetada. Isso garante a compatibilidade com pinças de freio específicas
        (por exemplo, freios de aro de tração curta vs. freios V-brake de tração longa).
    brake_light_switch_actuation_type:
      name: Tipo de acionamento do interruptor da luz de freio
      description: Identifica quais eventos físicos acionam o interruptor (pedal/êmbolo
        vs. pressão hidráulica etc.).
    brake_light_switch_connector_type:
      name: Tipo de conector do interruptor da luz de freio
      description: Especifica o estilo/formato do conector elétrico utilizado pelo
        interruptor da luz de freio para se conectar ao chicote do veículo.
    brake_light_switch_contact_type:
      name: Tipo de contato do interruptor da luz de freio
      description: Configuração/comportamento do contato elétrico do interruptor da
        luz de freio (por exemplo, normalmente aberto/fechado, reversível ou multicircuito).
    brake_light_switch_mounting_style:
      name: Estilo de montagem do interruptor da luz de freio
      description: Como o interruptor da luz de freio é montado/instalado no veículo
        ou no sistema de freios (por exemplo, com rosca, encaixe, suporte de fixação,
        parafuso banjo).
    brake_master_cylinder_mounting_type:
      name: Tipo de montagem do cilindro mestre do freio
      description: Como o cilindro mestre é montado no veículo/servofreio (padrão
        de parafusos/tipo de flange).
    brake_master_cylinder_reservoir_type:
      name: Tipo de reservatório do cilindro mestre do freio
      description: Tipo/configuração do reservatório de fluido de freio fornecido
        ou exigido pelo cilindro mestre.
    brake_mount_type:
      name: Tipo de montagem do freio
      description: Identifica a interface de frenagem integrada no garfo para que
        os ciclistas possam confirmar a compatibilidade do sistema de freios.
    brake_mounting_flange_bolt_pattern:
      name: Padrão de fixação dos parafusos do flange de montagem do freio
      description: Especifica o padrão de furos e parafusos da flange de montagem
        utilizado para fixar a placa de apoio do freio ou o suporte da pinça ao eixo
        do reboque (por exemplo, 4 parafusos).
    brake_pad_backing_plate_material:
      name: Material da placa de suporte da pastilha de freio
      description: Especifica o material da placa de suporte da pastilha de freio,
        que afeta a dissipação de calor e o peso.
    brake_pad_compatible_rotor_type:
      name: Tipo de rotor compatível com a pastilha de freio
      description: Especifica o tipo de superfície do rotor/disco para o qual a pastilha
        foi projetada.
    brake_pad_compound:
      name: Composto da pastilha de freio
      description: Identifica a fórmula do material de fricção de uma pastilha de
        freio.
    brake_pad_form_factor:
      name: Fator de forma da pastilha de freio
      description: Especifica o sistema de freio/fator de forma para o qual a pastilha
        foi projetada (por exemplo, disco, tambor, freio de estacionamento).
    brake_pad_material:
      name: Material da pastilha de freio
      description: Especifica a família de compostos/materiais de fricção utilizados
        no revestimento das pastilhas de freio.
    brake_pad_shim_included:
      name: Calço para pastilha de freio incluído
      description: Indica se as placas de redução de ruído estão incluídas ou são
        pré-instaladas.
    brake_pad_wear_indicator_type:
      name: Tipo de indicador de desgaste das pastilhas de freio
      description: Indica o tipo de indicador de desgaste incluído com as pastilhas
        de freio (por exemplo, apito mecânico ou sensor eletrônico).
    brake_position:
      name: Posição do freio
      description: Indica o local no veículo onde o componente de frenagem deve ser
        instalado.
    brake_rotor_mount_type:
      name: Tipo de montagem do disco de freio
      description: Define a interface utilizada para fixar um rotor de freio ao cubo
        (se aplicável).
    brake_service_kit_components_included:
      name: Componentes incluídos no kit de manutenção de freio
      description: Lista das ferramentas/adaptadores/consumíveis incluídos no kit
        de manutenção de freios.
    brake_shoe_friction_material:
      name: Material de fricção da sapata de freio
      description: O composto de fricção/revestimento usado na sapata de freio (o
        material que entra em contato com o tambor).
    brake_shoe_set_contents:
      name: Conteúdo do conjunto de sapatas de freio
      description: 'Indica o que está incluído no pacote (ex.: apenas sapatos ou sapatos
        mais equipamentos e molas).'
    brake_system_type:
      name: Tipo de sistema de freio
      description: Especifica a tecnologia do mecanismo de frenagem utilizada para
        controlar a rotação do carretel durante o arremesso.
    brake_type:
      name: Tipo de freio
      description: Tipo de mecanismo de freio/tensionamento do rolo de urdidura.
    brandy_age_classification:
      name: Classificação etária do conhaque
      description: Classifica o conhaque/brandy utilizando as designações de qualidade
        e idade padrão do setor (por exemplo, VS, VSOP, XO) que refletem os requisitos
        mínimos de envelhecimento.
    brass_cleaning_tool_type:
      name: Ferramenta de limpeza para latão
      description: Especifica o tipo de ferramenta utilizada para limpar ou fazer
        manutenção de instrumentos de sopro de metal.
    brass_instrument_application_area:
      name: Área de aplicação do instrumentos de sopro
      description: As partes do instrumento de metal em que o spray desinfetante deve
        ser usado.
    brass_instrument_care_kit_purpose:
      name: Finalidade do kit de cuidados para instrumentos de sopro de metal
      description: Descreve o cenário de uso pretendido para o kit (manutenção de
        rotina, limpeza profunda, viagens/emergências, kit básico para estudantes
        etc.).
    brass_instrument_case_shell_material:
      name: Material da estrutura da caixa/estopo para instrumentos de sopro
      description: Material principal da estrutura rígida (quando aplicável), separado
        do material geral da bolsa/estojo interno.
    brass_instrument_lubricant_additives_features:
      name: Aditivos/características de lubrificantes para instrumentos de sopro de
        metal
      description: Características funcionais notáveis da formulação do lubrificante.
    brass_instrument_lubricant_base_composition:
      name: Composição base do lubrificante para instrumentos de sopro de metal
      description: Base/composição química principal de lubrificantes utilizada em
        instrumentos de sopro de metal.
    brass_instrument_lubricant_viscosity_grade:
      name: Grau de viscosidade do lubrificante para instrumentos de sopro de metal
      description: Espessura relativa/fluxo do lubrificante destinado a instrumentos
        de sopro de metal.
    brass_instrument_replacement_part_type:
      name: Tipo de peça de reposição para instrumentos de sopro de metal
      description: Especifica de que tipo de peça de reposição se trata para instrumentos
        de sopro de latão (componentes de válvulas/corrediças/chaves de drenagem,
        rolhas/feltros, proteções etc.).
    brass_instrument_valve_configuration:
      name: Configuração de válvula para instrumento de sopro de metal
      description: Indica como o instrumento altera a altura tonal (mecanismo de válvulas/corrediças).
    brass_lubricant_application_area:
      name: Área de aplicação do lubrificante para metal
      description: O mecanismo dos instrumentos de sopro para o qual o lubrificante
        é destinado.
    brass_mouthpiece_backbore:
      name: Abertura posterior do bocal para instrumentos de sopro de metal
      description: Perfil/categoria da abertura posterior do bocal (formato/tamanho
        do bocal), o que influencia no timbre e na entonação.
    brass_mouthpiece_cup_depth:
      name: Profundidade da copa do bocal de metal
      description: Classificação da profundidade da copa do bocal, que afeta o timbre
        e a resposta.
    brass_polishing_cloth_abrasiveness_level:
      name: Nível de abrasividade do pano de polimento de metal
      description: Indica o nível de agressividade/abrasão do pano na remoção de manchas
        em comparação como brilho suave que proporciona.
    bread_crumb_base_ingredient:
      name: Ingrediente base da farinha de rosca
      description: Indica o ingrediente principal a partir do qual as migalhas são
        feitas, como trigo, arroz, pele de porco ou amêndoa.
    bread_variety:
      name: Variedade de pão
      description: Especifica o estilo ou a variedade de pão ou pãezinhos, ajudando
        os compradores a localizar tipos específicos (por exemplo, brioche, baguete,
        naan).
    breadstick_style:
      name: Estilo do gressino
      description: Identifica o estilo ou formato tradicional específico do gressino.
    bridge_head_material:
      name: Material da cabeça da ponte
      description: Material utilizado exclusivamente na cabeça da ponte, influenciando
        o peso, a sensação e a durabilidade.
    bridge_head_type:
      name: Tipo de cabeça da ponte
      description: Identifica o estilo da cabeça/ponta da ponte, ajudando os compradores
        a escolherem os formatos de apoio de taco de sua preferência.
    bridle_part_type:
      name: Tipo de parte da rédea
      description: Identifica o componente específico da rédea que o item de reposição
        representa, ajudando os clientes a encontrar a peça exata de que precisam.
    bridle_style:
      name: Estilo de rédea
      description: Classifica o estilo geral ou a construção da rédea para que os
        cavaleiros possam localizar de forma rápida o equipamento adequado às suas
        necessidades ou modalidade.
    broadhead_field_point_attachment_style:
      name: Estilo de fixação da ponta de caça/ponta de campo
      description: Especifica como a ponta de caça ou ponta de campo se fixa à haste
        da flecha.
    broadhead_thread_size:
      name: Tamanho da rosca da ponta de caça
      description: Lista as especificações da rosca usada para fixar a ponta de caça
        ou a ponta de campo à haste ou ao inserto da flecha.
    broadhead_tip_type:
      name: Tipo de ponta de caça
      description: Define o estilo da extremidade/bainha da ponta de caça que inicia
        a penetração, influenciando o desempenho em diferentes tipos de caça.
    broccoli_cut:
      name: Corte de brócolis
      description: Especifica como o brócolis foi cortado ou preparado antes de ser
        embalado (por exemplo, cabeça inteira, floretes, picado).
    broccoli_variety:
      name: Variedade de brócolis
      description: 'Identifica a cultivar ou a variedade de mercado específica do
        brócolis (ex.: Tenderstem, Romanesco).'
    broom_head_material:
      name: Material da cabeça da vassoura
      description: Especifica a composição do material da cabeça da vassoura, o que
        influencia a durabilidade e as características de jogo.
    brush_format:
      name: Formato da escova
      description: Indica o formato físico de uma escova para esquis ou snowboards,
        distinguindo entre blocos manuais e formatos rotativos acionados por furadeira,
        como cilindros de lã rotativa ou feltro rotativo.
    brush_shape:
      name: Forma da escova
      description: Especifica a forma física ou o perfil do corpo ou da cabeça da
        escova, que afeta a área de contato e o manuseio.
    brussel_sprout_preparation:
      name: Preparo da couve-de-bruxelas
      description: Descreve o preparo físico ou o estilo de corte da couve-de-bruxelas
        fornecida.
    brussels_sprout_variety:
      name: Variedade de couve-de-bruxelas
      description: Especifica a cultivar ou a variedade da couve-de-bruxelas, abrangendo
        variedades atuais e futuras.
    bubble_blower_features:
      name: Características do soprador de bolhas
      description: Lista as características funcionais comuns dos sopradores de bolhas
        de sabão.
    bubble_gun_bubble_output_modes:
      name: Modos de saída de bolhas da pistola de bolhas
      description: Especifica os modos de operação da pistola de bolhas, como as configurações
        de bolha única, contínua ou de várias velocidades.
    bubble_machine_features:
      name: Características da máquina de bolhas
      description: Destaca as funcionalidades comuns das máquinas de bolhas, além
        da operação básica.
    bubble_machine_items_included:
      name: Itens incluídos com a máquina de bolhas
      description: 'Lista os principais itens incluídos na caixa (ex.: solução para
        bolhas de sabão, varinhas extras, alça de transporte, controle remoto).'
    bubble_output_rate:
      name: Taxa de produção de bolhas
      description: Indica a taxa aproximada/qualitativa de produção de bolhas para
        um soprador de bolhas (por exemplo, baixa/média/alta), incluindo se a produção
        é variável.
    bubble_solution_container_type:
      name: Tipo de recipiente para solução de bolhas
      description: Especifica como a solução para bolhas de sabão é fornecida/utilizada
        com a pistola de bolhas (por exemplo, reservatório interno, frasco acoplado,
        bandeja/recipiente separado).
    bubble_toy_included_accessories:
      name: Acessórios incluídos com o brinquedo de bolhas
      description: 'Lista os itens comuns incluídos com o brinquedo de bolhas de sabão
        (ex.: frasco de solução, bandeja, varetas de reposição).'
    buckwheat_processing_method:
      name: Método de processamento do trigo sarraceno
      description: Descreve o processamento aplicado ao trigo sarraceno antes da venda
        (por exemplo, torrado, germinado, tufado).
    buckwheat_product_form:
      name: Forma do produto de trigo sarraceno
      description: 'Apresentação física específica do trigo sarraceno, abrangendo
        formas não contempladas na lista genérica (ex.: flocos, tufos, sachês instantâneos).'
    bug_collecting_kit_items_included:
      name: Itens incluídos no kit para coleta de insetos
      description: Ferramentas e materiais educativos incluídos em um kit de coleta
        de insetos.
    built_in_storage_type:
      name: Tipo de armazenamento integrado
      description: Identifica os tipos de espaço de armazenamento incorporados à estrutura
        da cama beliche (por exemplo, gavetas, prateleiras, espaço de armazenamento
        na escada).
    bumper_finish:
      name: Acabamento de para-choque
      description: Especifica o revestimento ou acabamento de superfície aplicado
        ao para-choque.
    bumper_sensor_cutouts:
      name: Recortes para sensores de para-choque
      description: Indica quais aberturas/recortes de assistência OEM o para-choque
        inclui ou quais serviços estão incluídos.
    bunk_bed_configuration:
      name: Configuração de beliche
      description: Indica o layout estrutural e a combinação do tamanho do colchão
        do beliche.
    buoyancy:
      name: Flutuabilidade
      description: Indica o comportamento de flutuabilidade da isca ou do chamariz
        na coluna de água, como flutuar, afundar ou ficar em suspensão.
    burkini_pieces_included:
      name: Peças do biquíni incluídas
      description: Lista os componentes de vestuário fornecidos no conjunto de burkini
        para que os clientes saibam exatamente o que estão comprando.
    burn_rate:
      name: Taxa de queima
      description: Descreve a rapidez com que o papel de enrolar queima depois de
        aceso.
    bus_model_type:
      name: Tipo de modelo de ônibus
      description: Identifica a configuração/tipo de ônibus real representado pelo
        modelo em escala (carroceria/classe de uso).
    bust_design:
      name: Design de busto
      description: Descreve a configuração da área do busto e a cobertura do decote
        do body (por exemplo, busto aberto, sutiã embutido, decote profundo).
    butter_variety:
      name: Variedade de manteiga
      description: Especifica o estilo de produção ou tipo distinto da manteiga, como
        manteiga de cultura/cultivada, manteiga de creme doce, manteiga ao estilo
        europeu, manteiga clarificada (ghee) ou manteiga de soro de leite.
    buttermilk_variety:
      name: Variedade de leitelho
      description: Identifica o estilo ou formato específico do leitelho que está
        sendo vendido (por exemplo, cultivado, tradicional, em pó).
    button_application:
      name: Aplicação do botão
      description: 'Indica a aplicação ou o tipo de projeto pretendido para o botão
        (ex.: vestuário, estofamento).'
    button_attachment_type:
      name: Tipo de fixação do botão
      description: Especifica a construção do botão para fixá-lo ao tecido (por exemplo,
        furos para costura vs. haste), não o estilo de fecho.
    button_finish:
      name: Acabamento do botão
      description: Descreve o acabamento/aparência da superfície do botão (por exemplo,
        fosco ou brilhante).
    buttonhole_elastic_application:
      name: Aplicação do elástico para casa de botão
      description: Uso/aplicação principal pretendida para o elástico decorativo dobrável.
    cab_type:
      name: Tipo de cabine
      description: Especifica a configuração da cabine do caminhão.
    cabasa_construction_type:
      name: Tipo de construção de cabasa
      description: Especifica a construção física/estilo do corpo da cabasa e do conjunto
        de corrente/contas.
    cabbage_variety:
      name: Variedade de repolho
      description: Identifica o cultivar ou tipo de repolho (por exemplo, verde, napa,
        savoy) para que os compradores possam filtrar por sabor, textura e uso culinário.
    cabinet_door_style:
      name: Estilo da porta do armário
      description: Identifica o design visual do painel da porta do armário, como
        o estilo Shaker ou com painéis em relevo, para ajudar a harmonizar com a estética
        da cozinha.
    cabinet_overlay_type:
      name: Tipo de sobreposição de gabinete
      description: Especifica como as portas se sobrepõem ou se posicionam em relação
        ao estrutura do armário.
    cable_end_type:
      name: Tipo de extremidade do cabo
      description: Descreve a forma ou o estilo do terminal ou encaixe do cabo que
        se conecta às alavancas de freio ou de câmbio.
    cable_housing_construction:
      name: Construção da armação do cabo
      description: Descreve o projeto estrutural da armação (como enrolamento em espiral,
        sem compressão ou ligação segmentada) que influencia a resistência à compressão,
        a flexibilidade e a sensação de condução.
    cable_housing_liner_type:
      name: Tipo de revestimento da armação do cabo
      description: Indica se a armação inclui um revestimento interno e/ou tratamento
        de lubrificação, bem como o material ou a tecnologia utilizada. Esses elementos
        afetam a redução do atrito e a resistência às intempéries.
    cable_management_type:
      name: Tipo de gerenciamento de cabos
      description: Especifica o tipo de recursos integrados de gerenciamento de cabos
        ou energia que a mesa de conferência oferece.
    cable_surface_treatment:
      name: Tratamento da superfície do cabo
      description: Identifica os revestimentos ou acabamentos especiais aplicados
        ao cabo para reduzir o atrito ou protegê-lo contra corrosão.
    cabochon_back_type:
      name: Tipo de parte traseira do cabochão
      description: Indica o perfil/acabamento da parte traseira do cabochão, o que
        afeta as configurações/métodos de colagem e a compatibilidade.
    cacao_bean_variety:
      name: Variedade de grãos de cacau
      description: Especifica a variedade botânica ou cultivar do grão de cacau utilizado.
    cacao_roast_level:
      name: Nível de torra do cacau
      description: Descreve o grau de torrefação do cacau antes da moagem.
    cage_package_type:
      name: Tipo de pacote da gaiola
      description: Define quais componentes estão incluídos na compra (por exemplo,
        apenas a rede, kit de estrutura, pacote completo).
    cajon_body_shell_material:
      name: Material do corpo/revestimento do cajon
      description: Identifica o material do corpo/revestimento do cajon (excluindo
        a tapa).
    cajon_corner_control_system:
      name: Sistema de controle de cantos do cajon
      description: Especifica se o cajon permite o ajuste do som nos cantos (por exemplo,
        parafusos nos cantos) para alterar a resposta ao bater nele.
    cajon_corner_edge_design:
      name: Sistema de controle de cantos do cajon
      description: Descreve a construção dos cantos/bordas que afeta o conforto e
        a utilização.
    cajon_feet_type:
      name: Tipo de pés do cajon
      description: Especifica o tipo de pés do cajon, o que afeta a estabilidade e
        a ressonância.
    cajon_snare_adjustability:
      name: Ajuste da caixa do cajon
      description: Indica se e como o efeito da caixa pode ser ajustado (tensão, acionamento
        ou ambos).
    cajon_snare_system_type:
      name: Tipo de sistema da caixa do cajon
      description: Especifica o mecanismo de caixa interno usado para criar o efeito
        de caixa.
    cake_shape:
      name: Forma do bolo
      description: Descreve a forma física em que o bolo de café é assado.
    cake_topping:
      name: Cobertura do bolo
      description: Identifica a cobertura ou acabamento principal aplicado ao bolo
        de café.
    cake_type:
      name: Tipo de bolo
      description: Descreve o estilo ou tipo de bolo (por exemplo, bolo inglês, bolo
        esponja, cheesecake).
    caliper_mount_type:
      name: Tipo de montagem da pinça
      description: Define o padrão de interface do quadro ou do garfo utilizado pela
        pinça de freio (por exemplo, Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Padrão de montagem da pinça de freio
      description: Especifica a interface/padrão de montagem (por exemplo, Flat Mount,
        Post Mount, IS, etc.) utilizada para fixar a pinça de freio ao quadro ou ao
        garfo da bicicleta.
    camera_mounting_location_vehicle_exterior:
      name: Local de montagem da câmera (exterior do veículo)
      description: Local onde as câmeras serão instaladas no veículo (por exemplo,
        grade dianteira, traseira, espelhos retrovisores laterais).
    camouflage_environment_type:
      name: Tipo de ambiente de camuflagem
      description: Indica o ambiente principal para o qual o padrão de camuflagem
        foi projetado, como floresta, deserto ou pântano.
    camping_oil_application:
      name: Aplicação de óleo para acampamento
      description: Especifica o uso principal pretendido do óleo no contexto de acampamento
        (por exemplo, combustível para lanterna vs. combustível para fogão).
    camshaft_construction:
      name: Construção do eixo de comando
      description: Fabricação/modelo em bruto do eixo de comando.
    camshaft_material:
      name: Material do eixo de comando
      description: Material principal do núcleo/haste do eixo do comando (material
        de base).
    camshaft_position:
      name: Posição do eixo de comando
      description: Especifica o tipo/localização pretendida do eixo de comando dentro
        do motor (por exemplo, admissão ou escape, ou um berço/posição específica
        do motor).
    candle_container_type_included:
      name: Tipo de recipiente para vela incluído
      description: Especifica o tipo de recipiente para vela incluído no kit, se houver.
    candle_dye_form:
      name: Forma de corante de vela
      description: Especifica a forma física do corante/ingrediente para velas utilizado
        na fabricação da vela.
    candle_fragrance_form:
      name: Forma da fragrância da vela
      description: Especifica o tipo/forma do ingrediente de fragrância destinado
        à fabricação de velas.
    candle_making_tool_type:
      name: Tipo de ferramenta para fabricação de velas
      description: Identifica o tipo de utensílio para fabricação de velas que o produto
        é (por exemplo, panela para cera, ferramenta para centralizar o pavio, termômetro).
    candy_texture:
      name: Textura da bala
      description: Descreve a sensação na boca ou a consistência da bala, independentemente
        do sabor ou da forma.
    candying_method:
      name: Método de cristalização
      description: Descreve como a fruta foi cristalizada ou conservada com açúcar
        (por exemplo, cristalizada, glaceada, em calda).
    canned_meat_form:
      name: Carne enlatada
      description: Classifica a forma processada ou a apresentação da carne dentro
        da embalagem.
    canoe_construction_type:
      name: Tipo de construção da canoa
      description: Diferencia os estilos de construção de cascos de canoas, como casco
        rígido, inflável e dobrável.
    canoe_hull_shape:
      name: Forma do casco da canoa
      description: Define a seção transversal principal do casco ou o perfil do fundo,
        o que afeta a estabilidade e a manobrabilidade.
    canoe_stern_design:
      name: Design da popa da canoa
      description: Define o estilo da popa do casco, o que afeta a compatibilidade
        e a manobrabilidade do motor.
    canopy_type:
      name: Tipo de dossel
      description: Descreve o estilo do dossel ou cobertura superior incluída na cama
        cabana.
    canvas_compatible_media:
      name: Mídias compatíveis com a tela
      description: Indica qual técnica artística/ofício a tela deve utilizar.
    canvas_format:
      name: Formato da tela
      description: Indica se a tela imprimível é vendida em folhas, rolos ou painéis
        pré-cortados.
    canvas_mounting_format:
      name: Montagem/formato da tela
      description: Formato físico/estilo de montagem da tela de pintura.
    canvas_stretcher_assembly_type:
      name: Tipo de montagem do bastidor de tela
      description: Indica se o bastidor é vendido montado como uma moldura ou em barras/kit
        que requerem montagem.
    canvas_stretcher_corner_joint_type:
      name: Tipo de junta de canto do bastidor de tela
      description: Indica como os cantos do bastidor são unidos/construídos (por exemplo,
        encaixe de encaixe e espiga, encaixe em zigue-zague, grampeados, com chaveta).
    canvas_surface_tone:
      name: Tom da superfície da tela
      description: Tom/cor de base da superfície da tela preparada (base), não um
        desenho ou padrão impresso (por exemplo, branco, preto, tonalizado).
    canvas_weave_type:
      name: Tipo de trama da tela
      description: Descreve a estrutura da trama da superfície da tela, que afeta
        a textura e o manuseio da tinta.
    cap_attachment_style:
      name: Tipo de fixação da tampa
      description: Especifica o estilo de construção/fixação da tampa do bocal do
        saxofone, o que pode afetar a proteção e o encaixe interno.
    cap_construction:
      name: Construção da tampa
      description: Especifica como a touca da peruca é construída (por exemplo, com
        frente de renda, renda completa, amarrada à mão). Isso afeta o realismo, o
        conforto e a versatilidade de penteados.
    cap_crown_structure:
      name: Estrutura da coroa da touca
      description: Indica se a coroa da touca é estruturada (rígida) ou não estruturada
        (macia).
    cap_fit_type:
      name: Tipo de ajuste da tampa
      description: 'Define como o boné se ajusta ou se encaixa na cabeça do usuário
        (ex.: ajustado vs. regulável).'
    cap_seal_type:
      name: Tipo de vedação da tampa
      description: Especifica o componente de vedação usado para evitar vazamento
        de óleo e escape de vapor (por exemplo, anel de vedação, junta).
    cap_size:
      name: Tamanho da touca da peruca
      description: Label de tamanho padrão que indica o tamanho total da cabeça para
        o qual a touca da peruca é adequada.
    cap_type:
      name: Tipo de tampa
      description: Tipo de tampa/fecho utilizado no tanque de transbordamento.
    caper_size_grade:
      name: Grau de tamanho da alcaparra
      description: Classifica as alcaparras de acordo com nomes de qualidade padrão
        do setor que correspondem ao diâmetro do botão.
    capo_clamping_mechanism:
      name: Mecanismo de fixação do capotraste
      description: Especifica o tipo de mecanismo de fixação/acionamento usado para
        aplicar pressão na corda (como o capotraste é operado).
    capo_finish:
      name: Acabamento do capotraste
      description: 'Acabamento da superfície do corpo do capotraste (visual/tátil),
        independente da cor (ex.: fosco ou brilhante).'
    capo_fit_type:
      name: Tipo de ajuste do capotraste
      description: Especifica o perfil do braço para o qual o capotraste foi projetado
        (incluindo raio/planicidade), o que influencia a fixação sem ruídos e a afinação.
    capo_pad_material:
      name: Material da almofada do capotraste
      description: Especifica o material da almofada de contato que toca as cordas/escala
        (afeta a aderência, a estabilidade da afinação e possíveis marcas no acabamento).
    capo_tension_mechanism:
      name: Mecanismo de tensão do capotraste
      description: Especifica como a pressão/tensão é aplicada e ajustada na corda
        para o capotraste deslizante.
    capture_method:
      name: Método de captura
      description: Indica se a armadilha se destina à captura de animais vivos ou
        ao abate letal.
    car_ev_conversion_kit_motor_type:
      name: Tipo de motor do kit de conversão para veículo elétrico
      description: Especifica a tecnologia do motor de tração incluída ou exigida
        pelo kit de conversão (por exemplo, indução CA vs. ímã permanente).
    car_playset_items_included:
      name: Itens incluídos no conjunto de brinquedos de carros
      description: 'Lista os principais componentes incluídos no conjunto de carros
        de brinquedo, além da estrutura básica (ex.: carrinhos, bonecos, placas).'
    car_shampoo_application_method:
      name: Método de aplicação do xampu para carros
      description: Modo de usar o xampu durante a lavagem.
    car_wash_solution_form:
      name: Forma de solução para lavagem de carros
      description: 'Especifica a forma física da solução de lavagem de carros (ex.:
        líquida, espuma, lenços umedecidos).'
    car_wash_solution_scent:
      name: Fragrância da solução de lavagem de carros
      description: Especifica a fragrância/aroma da solução de lavagem de carros (se
        houver fragrância).
    carbonated_water_variety:
      name: Variedade de água com gás
      description: Classifica a água gaseificada com base nas variedades comuns no
        mercado e na composição (por exemplo, água tônica, água com gás, água gaseificada
        funcional).
    carbonation:
      name: Carbonatação
      description: Descreve o nível ou estilo de carbonatação da bebida (por exemplo,
        sem gás, levemente gaseificada, gaseificada, nitro).
    carburetor_barrel_count:
      name: Contagem de cilindros do carburador
      description: Indica o número de orifícios/cilindros limitados (estrangulados)
        no carburador.
    carburetor_choke_type:
      name: Tipo de afogador do carburador
      description: Indica o tipo de acionamento do afogador utilizado pelo carburador.
    carburetor_mounting_flange_type:
      name: Tipo de flange de montagem do carburador
      description: Especifica o estilo da interface de montagem do carburador para
        garantir a compatibilidade com o coletor de admissão (por exemplo, encaixe
        tipo espigão vs. flange/padrões de parafusos).
    card_binder_page_type:
      name: Tipo de página do fichário
      description: 'Para fichários/portfólios: o estilo de páginas utilizado para
        armazenar cartões.'
    card_box_holder_type:
      name: Tipo de caixa/suporte para cartões
      description: Especifica o formato funcional do produto destinado à coleta ou
        ao armazenamento de cartões em um evento (por exemplo, caixa, caixa tipo caixa
        de correio, cesta, suporte).
    card_game_accessory_features:
      name: Características de acessório de jogo de cartas
      description: Características funcionais notáveis dos acessórios para jogos de
        cartas.
    card_lot_type:
      name: Tipo de lote de cartas
      description: Indica se o produto é uma carta única ou um lote/conjunto com várias
        cartas.
    card_sleeve_size_format_compatibility:
      name: Compatibilidade de tamanho/formato das capas para cartas
      description: Especifica os tamanhos de carta para os quais as capas protetoras/páginas/caixas
        para baralhos foram projetadas.
    carding_surface_pin_material:
      name: Material dos pinos da superfície de cardagem
      description: Material dos pinos/dentes utilizados para desfiar e abrir a fibra.
    care_durability:
      name: Durabilidade da etiqueta de cuidados
      description: Indica as expectativas quanto à resistência da etiqueta à lavagem
        e ao calor após a aplicação.
    care_label_attachment_type:
      name: Tipo de fixação da etiqueta de cuidados
      description: Como a etiqueta de cuidados foi projetada para ser aplicada na
        peça (por exemplo, costurada, termocolada/por transferência térmica, adesivo).
    care_label_format:
      name: Formato da etiqueta de cuidados
      description: O formato físico/impresso da etiqueta de cuidados do produto.
    care_label_symbol_system:
      name: Sistema de símbolos da etiqueta de cuidados com o produto
      description: 'O conjunto de normas/símbolos utilizado na etiqueta (ex.: símbolos
        de cuidado ISO, símbolos ASTM/EUA).'
    cargo_area_configuration:
      name: Configuração da área de carga
      description: Especifica o estilo estrutural ou a localização da área de carga
        em uma bicicleta de carga (por exemplo, modelo longtail, com compartimento
        dianteiro, triciclo).
    cargo_net_adjustability:
      name: Ajuste da rede de carga
      description: Indica se e como a rede de carga pode ser ajustada em termos de
        tensão/encaixe.
    cargo_net_position:
      name: Posição da rede de carga
      description: Indica onde exatamente na área do porta-malas/carga a rede deve
        ser instalada ou quais são suas funções.
    cargo_net_stretch_type:
      name: Tipo de elasticidade da rede de carga
      description: Indica se a rede de carga do porta-malas é elástica/extensível
        ou fixa/não elástica.
    cargo_net_style:
      name: Estilo da rede de carga
      description: Especifica o estilo de construção ou formato da rede de carga (por
        exemplo, corda elástica, fita, barreira, rede etc.).
    cargo_rack_finish:
      name: Acabamento do suporte de carga/porta-bagagem
      description: Acabamento/revestimento da superfície externa do suporte de carga/porta-bagagem.
    carpet_cleaner_application_method:
      name: Método de aplicação do limpador de carpetes
      description: Especifica a forma pretendida de aplicação e integração do produto
        no carpete (além da forma geral).
    carrier_style:
      name: Estilo do transportador
      description: Mecanismo/estilo de transporte utilizado para transportar o barco
        no veículo.
    carrot_size:
      name: Tamanho da cenoura
      description: Classifica o tamanho geral do produto de cenoura.
    carrot_variety:
      name: Variedade de cenoura
      description: Identifica a variedade ou cultivar específica da cenoura.
    carrying_capacity_pairs_boards:
      name: Capacidade de carga (pares/pranchas)
      description: 'Indica quantos esquis (pares) ou pranchas de snowboard um acessório
        permite ou se destina a suportar quando usado com o suporte (ex.: kit de extensão).'
    cartridge_thread_compatibility:
      name: Compatibilidade da rosca do cartucho
      description: Indica o padrão de rosca compatível com um vaporizador ou bateria.
        Isso garante que os cartuchos e as baterias sejam fisicamente compatíveis.
    case_capacity_butts_shafts:
      name: Capacidade da caixa/estojo (pontas × hastes)
      description: Define quantas pontas e hastes de taco a caixa/estojo pode acomodar.
        O número é expresso no formato “pontas por hastes” (por exemplo, 2x4 = 2 pontas
        e 4 hastes).
    case_features:
      name: Característicos do estojo
      description: Destaca as características funcionais da caixa para conjunto de
        címbalos/pratos ou tambores/bateria relacionadas à proteção e ao transporte.
    case_humidifier_refill_type:
      name: Tipo de recarga para umidificador de caixa
      description: Indica se o umidificador utiliza meios filtrantes reutilizáveis
        (reumedecíveis/regeneráveis) ou refis descartáveis substituíveis.
    case_lining_material:
      name: Material de revestimento da estojo/caixa
      description: Identifica o material principal que reveste o interior de um estojo
        ou bolsa de transporte e que entra em contato com o instrumento ou o conteúdo,
        protegendo-os.
    case_material:
      name: Material do estojo/caixa
      description: Identifica o material principal da caixa do relógio, influenciando
        a durabilidade, o peso e a estética.
    case_mounting_method:
      name: Método de montagem da caixa/estojo
      description: Indica como o umidificador deve ser posicionado ou fixado dentro
        da caixa/estojo do instrumento.
    case_structure:
      name: Estrutura da caixa/estojo
      description: Indica a rigidez da construção da caixa/estojo.
    case_style_cymbal_drum:
      name: Estilo da caixa/estojo (pratos/bateria)
      description: Especifica se o produto é uma bolsa macia, um estojo rígido ou
        um modelo híbrido para transportar pratos/címbalos ou conjuntos de tambores/bateria.
    casing_material:
      name: Material de revestimento
      description: Identifica o tecido principal utilizado na carcaça do pneu, o que
        influencia o peso, a sensação de condução e a proteção contra furos.
    casino_set_chip_material:
      name: Material das fichas de cassino
      description: Material principal das fichas incluídas (se aplicável).
    casino_set_layout_included:
      name: Layout do conjunto para cassino incluído
      description: Especifica o tipo de superfície/layout de jogo incluído no conjunto.
    cask_finish:
      name: Acabamento do barril
      description: Especifica o barril ou tonel usado para o acabamento ou maturação
        da bebida, como um barril de bourbon ou um barril de xerez.
    cassava_variety:
      name: Variedade de mandioca
      description: Identifica a cultivar ou variedade específica de mandioca oferecida,
        que afeta o sabor, a textura e as propriedades culinárias.
    cassette_body_type:
      name: Tipo de corpo de cassete
      description: Padrão de cubo livre ou de engrenagem que o cubo traseiro ou a
        roda aceita (por exemplo, HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Conjunto de recursos do cassete
      description: Indica as funcionalidades de transporte e reprodução de cassetes
        comuns aos leitores de cassetes para painel de carro.
    cassette_speed_compatibility:
      name: Compatibilidade de velocidade do cassete
      description: Indica o número de velocidades (por exemplo, 7 velocidades, 12
        velocidades) para as quais a cassete ou roda livre foi projetada. Isso garante
        a compatibilidade com corrente, câmbio e desviador.
    castanet_shell_size_class:
      name: Classe de tamanho da concha da castanhola
      description: Classificação de tamanho padronizada para cascos de castanholas,
        comumente utilizada por músicos/professores para selecionar o ajuste e o timbre.
    castanets_included_pieces:
      name: Peças incluídas com as castanholas
      description: Indica o que está incluído na oferta do produto (par ou única,
        mais extras).
    castanets_pitch:
      name: Afinação das castanholas
      description: Indica a classificação comum de afinação/tamanho usada pelos fabricantes
        para descrever a extensão sonora.
    castanets_type:
      name: Tipo de castanholas
      description: Especifica o estilo das castanholas ou a categoria de uso pretendida.
    caster_type:
      name: Tipo de rodízio
      description: Identifica o tipo de rodízios ou rodas instalados no carrinho (por
        exemplo, giratórios, com trava), informando sobre a manobrabilidade e a estabilidade.
    castle_playset_included_items:
      name: Itens incluídos no conjunto de brinquedos de castelo
      description: 'Captura os principais componentes incluídos no conjunto de brinquedos
        de castelo para que os compradores possam comparar os conjuntos (ex.: figuras,
        móveis, veículos, acessórios).'
    catcher_equipment_included:
      name: Equipamento de apanhador incluído
      description: Especifica os componentes incluídos em um conjunto de equipamentos
        para apanhador, como um capacete ou protetor de peito.
    catcher_helmet_style:
      name: Estilo de capacete para apanhador
      description: Indica o estilo geral do design do capacete de proteção do apanhador.
    cattle_breed:
      name: Raça bovina
      description: Identifica a raça bovina da qual a carne foi obtida (por exemplo,
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Variedade de couve-flor
      description: Identifica a cultivar, a cor ou a variedade especial da couve-flor
        que está sendo vendida.
    celery_form:
      name: Forma do aipo
      description: Especifica a forma física ou o estilo de corte em que o aipo é
        vendido.
    celery_variety:
      name: Variedade de aipo
      description: Registra a cultivar ou variedade específica do aipo, permitindo
        aos compradores selecionar por perfil de sabor, cor ou uso culinário.
    cereal_bar_texture:
      name: Textura da barra de cereal
      description: Descreve a sensação na boca e a consistência da barra de cereal
        (por exemplo, macia, crocante etc.).
    cereal_type:
      name: Tipo de cereal
      description: Classifica a forma ou o formato dos cereais ou da granola (flocos,
        bolinhas, pedaços de granola, muesli, etc.) para ajudar os compradores a encontrar
        a textura ou o método de preparo de sua preferência.
    certificate_border_style:
      name: Estilo de borda do certificado
      description: Descreve o tratamento decorativo da borda utilizado no certificado.
    certificate_personalization_type:
      name: Tipo de personalização do certificado
      description: Especifica como o certificado pode ser personalizado (em branco
        para escrita à mão, modelo imprimível, pré-impresso com campos variáveis etc.).
    certification_service:
      name: Serviço de certificação
      description: Empresa de classificação/certificação de terceiros (se aplicável).
    certification_standard:
      name: Padrão de certificação
      description: Especifica a certificação de segurança e resistência ao fogo ou
        o padrão de conformidade que a balaclava deve atender.
    chain_coating_finish:
      name: Revestimento/acabamento da corrente
      description: Especifica os tratamentos ou acabamentos da superfície aplicados
        à corrente para melhorar a durabilidade, reduzir o atrito, prevenir a corrosão
        ou alterar a aparência (por exemplo, nitreto de titânio, DLC, níquel, EPT
        antiferrugem).
    chain_connection_type:
      name: Tipo de conexão da corrente
      description: Especifica o método de fechamento fornecido ou necessário para
        unir as extremidades da corrente.
    chain_tier_configuration:
      name: Configuração de camadas da corrente
      description: Especifica o número/arranjo de camadas da corrente no conjunto
        de captura (camada simples, dupla ou tripla).
    chain_tool_type:
      name: Tipo de ferramenta de corrente
      description: Classifica o tipo específico de ferramenta para corrente de bicicleta
        para que o comprador possa encontrar rapidamente o dispositivo correto.
    chainring_shape:
      name: Forma da coroa
      description: Indica a forma da coroa, como redonda ou oval/elíptica.
    chair_accessories_included:
      name: Acessórios de cadeira incluídos
      description: Indica os acessórios integrados ou incluídos que melhoram a funcionalidade
        de uma cadeira.
    chair_sash_care_instructions:
      name: Instruções de cuidados com a faixa da cadeira
      description: Descreve o método recomendado de limpeza/manutenção para a faixa
        da cadeira.
    chair_sash_finish:
      name: Acabamento da faixa da cadeira
      description: Descreve o brilho/acabamento da superfície do tecido da faixa.
    chair_storage_design:
      name: Design de armazenamento da cadeira
      description: Indica como a cadeira de balanço deve ser armazenada (por exemplo,
        dobrável, empilhável, não retrátil) para ajudar os clientes a avaliar o armazenamento
        e a portabilidade.
    chaise_or_sectional_orientation:
      name: Disposição em chaise ou seccional
      description: Especifica o lado em que se encontra uma chaise integrada ou uma
        seção extensível quando se está de frente para o sofá.
    chamber_size:
      name: Tamanho da câmara
      description: Indica o tamanho/volume da câmara do bocal, o que afeta a resistência
        e a cor tonal.
    chanter_finger_spacing:
      name: Espaçamento dos dedos da gaita-de-foles
      description: Indica o espaçamento entre os dedos e o perfil do tamanho da ponteira
        (frequentemente descrito como padrão, para mãos pequenas ou para mãos grandes).
    chanter_type:
      name: Tipo de ponteira
      description: O estilo/configuração da ponteira incluído com o instrumento (ou
        utilizada pelo instrumento), como aberta, fechada, de prática ou com chaves.
    chard_variety:
      name: Variedade de acelga
      description: Identifica a cultivar específica ou a variedade de cor da acelga
        que está sendo vendida.
    charging_port_location:
      name: Localização da porta de carregamento
      description: Localização física da entrada de carregamento externa principal
        do veículo (porta de carregamento).
    chassis_construction_type:
      name: Tipo de construção do chassi
      description: Descreve o principal método de construção do chassi utilizado no
        veículo.
    checkbook_loading_orientation:
      name: Orientação de carregamento do talão de cheques
      description: Indica se a capa do talão de cheques é compatível com os formatos
        de carregamento superior, lateral ou universal.
    cheekpiece_style:
      name: Estilo das tiras da cabeçada/testeiras
      description: Define o tipo de configuração de argola/bocal no freio bridão,
        que determina a ação das rédeas e a estabilidade lateral.
    cheese_alternative_form:
      name: Forma alternativa de queijo
      description: Especifica a forma física ou o corte em que a alternativa ao queijo
        é vendida.
    cheese_form:
      name: Forma de queijo
      description: Descreve a apresentação física do produto de queijo (por exemplo,
        roda, bloco, fatiado, ralado).
    cheese_texture:
      name: Textura do queijo
      description: Classifica o queijo pela textura ou firmeza geral.
    cheese_variety:
      name: Variedade de queijo
      description: Identifica o tipo de queijo utilizado como principal aromatizante
        no salgadinho.
    cherimoya_variety:
      name: Variedade de cherimoia
      description: Identifica a cultivar/variedade específica de cherimoia (por exemplo,
        Fino de Jete, El Bumpo).
    cherry_variety:
      name: Variedade de cereja
      description: Especifica a cultivar ou variedade das cerejas, ajudando os compradores
        a escolher tipos específicos conhecidos pelo sabor, cor, tamanho ou uso culinário
        pretendido.
    chest_pocket_style:
      name: Estilo de bolso no peito
      description: Especifica a presença e a configuração dos bolsos no peito da camisa.
    chewing_tobacco_form:
      name: Forma do tabaco de mascar
      description: Identifica a forma física, o tipo de corte ou o tamanho da embalagem
        do produto de tabaco para mascar (por exemplo, folhas soltas, corte longo,
        embalagem fina).
    chicory_variety:
      name: Variedade de chicória
      description: Identifica a variedade ou cultivar específica de chicória que está
        sendo vendida (por exemplo, Radicchio, Endívia Belga, Escarola).
    chiffon_recommended_use:
      name: Uso recomendado de chiffon
      description: Principais aplicações recomendadas para costura e artesanato com
        o tecido de chiffon.
    child_seat_accessory_type:
      name: Tipo de acessório para cadeirinha infantil
      description: Define o tipo específico de acessório ou peça de reposição para
        cadeirinha infantil (por exemplo, almofada do assento, apoio para os pés,
        adaptador de montagem). Isso permite que os compradores encontrem rapidamente
        o item que precisam sem criar muitas microcategorias.
    child_seat_mounting_type:
      name: Tipo de montagem da cadeirinha infantil
      description: Especifica como a cadeirinha infantil se fixa ao quadro da bicicleta,
        ao bagageiro ou à área do guidão.
    chime_sound_character:
      name: Característica do som do sino
      description: Descreve o caráter sonoro/timbre pretendido para os sinos.
    chin_cup_type:
      name: Tipo com apoio para o queixo/queixeira
      description: Especifica o estilo ou a construção da queixeira, o que afeta o
        conforto e a proteção contra impacto.
    chin_strap_type:
      name: Tipo de tira de queixo
      description: Especifica o tipo de tira de queixo de um chapéu (sem tira, fixa,
        ajustável ou removível) para ajudar os clientes a escolher modelos que permaneçam
        bem presos em ambientes com vento ou durante atividades físicas.
    china_cymbal_edge_shape:
      name: Formato da borda dos címbalos chineses
      description: Descreve o perfil da borda/flange típico dos címbalos chineses
        (a curvatura da borda), o que afeta o som e a sensação ao tocar.
    china_cymbal_sound_character:
      name: Caráter sonoro do címbalo chinês
      description: 'Descritor do timbre/característica tonal principal de um címbalo
        chinês, usado para descoberta e filtragem (ex.: áspero, escuro, brilhante).
        É possível aplicar vários valores.'
    chinstrap_type:
      name: Tipo de jugular/cinta de queixo
      description: Modelo da jugular/cinta de queixo fornecida com o capacete.
    chip_cut_style:
      name: Estilo de corte de lascas
      description: Especifica o corte físico ou o estilo de textura das batatas fritas
        (por exemplo, onduladas, fritas na frigideira, estouradas).
    chip_denomination:
      name: Denominação da ficha
      description: Indica quais são as denominações (valores) das fichas incluídas
        no conjunto (impressas ou atribuídas).
    chocolate_form:
      name: Forma do chocolate
      description: Descreve a forma física em que o chocolate para culinária é vendido.
    choy_sum_variety:
      name: Variedade de choy sum
      description: Identifica a variedade específica, botânica ou de mercado do choy
        sum que está sendo vendido.
    cigar_wrapper_color:
      name: Cor do invólucro do charuto
      description: Classificação padrão da cor da folha de capa do charuto.
    cigarette_filter_type:
      name: Tipo de filtro de cigarro
      description: Especifica se o cigarro possui filtro e, em caso afirmativo, a
        construção ou característica especial desse filtro.
    cigarette_size:
      name: Tamanho do cigarro
      description: Classifica os cigarros de acordo com a terminologia padrão do setor
        em termos de comprimento ou formato (por exemplo, tamanho king, 100s, slim).
    cigarette_strength_descriptor:
      name: Descritor de intensidade do cigarro
      description: Rótulo de intensidade de nicotina tradicionalmente utilizado pelas
        marcas para indicar o teor de alcatrão e nicotina (por exemplo, Light, Bold,
        Silver).
    cinch_liner_material:
      name: Material do forro da cilha
      description: Identifica o material utilizado no forro ou revestimento que fica
        em contato com o corpo do cavalo.
    circular_knitting_needle_cable_type:
      name: Tipo de cabo da agulha de tricô circular
      description: 'Material/comportamento e construção do cabo (ex.: aço revestido,
        nylon), o que afeta a memória/torção e o comportamento rotativo.'
    circular_knitting_needles_tip_material:
      name: Material da ponta da agulha agulhas de tricô circular
      description: Material das duas pontas da agulha (diferente do material do cabo).
    circumference_adjustment_mechanism:
      name: Mecanismo de ajuste de circunferência
      description: Mecanismo utilizado para ajustar ou travar a circunferência do
        novelo.
    clamp_design:
      name: Design da braçadeira
      description: Descreve o estilo estrutural ou o mecanismo da braçadeira.
    clamp_sheet_music_clip_features:
      name: Características do grampo para partituras
      description: 'Características funcionais e de proteção dos grampos de partitura
        (ex.: preenchimento, antiderrapantes, giratórios).'
    clamping_closure_type:
      name: Tipo de fixação/fechamento
      description: Especifica o mecanismo utilizado para apertar ou fixar o bastidor
        de bordado ao redor do tecido.
    clarinet_bell_acoustic_design:
      name: Projeto acústico da campana do clarinete
      description: Descreve o projeto de som/ventilação do sino, concebido para influenciar
        a resposta e a entonação.
    clarinet_bell_adjustment_mechanism:
      name: Mecanismo de ajuste da campana do clarinete
      description: Descreve como o comprimento/geometria da campana é ajustado.
    clarinet_bell_ring_material:
      name: Material do anel da campana do clarinete
      description: Especifica o material do anel/faixa protetora na borda da campana
        do clarinete, se houver.
    clarinet_bell_tuning_effect:
      name: Efeito de afinação da campana do clarinete
      description: Indica como o sino foi projetado para afetar a afinação/entonação
        (especialmente os tons da garganta e o registro grave) em comparação com um
        sino padrão.
    clarinet_body_type:
      name: Tipo de corpo do clarinete
      description: Indica o tipo principal de construção do corpo do clarinete em
        Lá.
    clarinet_bore_type:
      name: Tipo de canal interno do clarinete
      description: Descreve o desenho do canal interno do clarinete alto.
    clarinet_cap_style:
      name: Estilo de tampa de clarinete
      description: Estilo de design da tampa incluída com uma ligadura de clarinete
        e/ou tampa de boquilha (por exemplo, invertida ou ventilada).
    clarinet_care_kit_intended_use:
      name: Uso pretendido do kit de cuidados para clarinete
      description: Contexto de uso principal para o qual o kit foi projetado (por
        exemplo, secagem rápida diária vs. limpeza profunda/manutenção).
    clarinet_included_accessories:
      name: Acessórios do clarinete incluídos
      description: Identifica o conteúdo da caixa que acompanha o clarinete em Si
        bemol.
    clarinet_keywork_material:
      name: Material das chaves do clarinete
      description: Especifica o material do mecanismo das chaves do clarinete (por
        exemplo, latão, níquel-prata, banhado a prata).
    clarinet_keywork_plating:
      name: Revestimento das chaves do clarinete
      description: Especifica o acabamento/material do mecanismo das chaves do clarinete.
    clarinet_mouthpiece_baffle_profile:
      name: Perfil do defletor da boquilha do clarinete
      description: Descreve o perfil interno do defletor/teto da boquilha do clarinete
        que influencia o brilho e a projeção.
    clarinet_mouthpiece_beak_shape:
      name: Formato do bico da boquilha de clarinete
      description: Especifica o perfil/ângulo externo do bico para proporcionar conforto
        ao músico e uma boa sensação na embocadura.
    clarinet_mouthpiece_chamber_size:
      name: Tamanho da câmara do bocal do clarinete
      description: Descreve o tamanho relativo da câmara da boquilha do clarinete
        (conforme especificado pelo fabricante). Isso pode influenciar o timbre e
        a resistência ao sopro.
    clarinet_mouthpiece_intended_tone:
      name: Tom pretendido para a boquilha do clarinete
      description: Descreve o objetivo tonal geral para o qual a boquilha foi projetada.
    clarinet_mouthpiece_player_level:
      name: Nível de tocador da boquilha do clarinete
      description: Indica o nível típico do usuário a que se destina a boquila.
    clarinet_reed_cut:
      name: Corte da palheta do clarinete
      description: Especifica o corte/perfil da palheta (por exemplo, limada ou não
        limada e outros estilos de corte disponíveis no mercado), o que influencia
        a resposta e o timbre.
    clarinet_reed_material_type:
      name: Tipo de material da palheta do clarinete
      description: Indica o material de que a palheta é feita (cana, sintética ou
        subtipos sintéticos comuns).
    clarinet_thumb_rest_type:
      name: Tipo de apoio para o polegar do clarinete
      description: Tipo/característica do apoio para o polegar da mão direita.
    classical_guitar_string_3rd_string_type:
      name: Tipo de corda da 3ª corda do violão clássico
      description: Indica se a corda G (3ª) é lisa (monofilamento) ou enrolada.
    classical_guitar_string_bass_winding_material:
      name: Material de enrolamento das cordas do contrabaixo de violão clássico
      description: O material de enrolamento/revestimento usado nas cordas do baixo
        (normalmente as cordas 4 a 6).
    classical_guitar_string_set_configuration:
      name: Configuração do conjunto de cordas para violão clássico
      description: Especifica se o produto é um conjunto completo ou um conjunto específico
        de cordas (normalmente o lado agudo ou o lado grave) para violão clássico.
    clay_modeling_dough_base_material:
      name: Material de base de argila e massa de modelar
      description: Formulação primária/tipo base do material de modelagem.
    clay_modeling_dough_curing_method:
      name: Método de cura de argila e massa de modelar
      description: Como o material endurece (ou permanece reutilizável), o que determina
        as ferramentas necessárias e os casos de uso típicos.
    clay_paintability:
      name: Capacidade de pintura da argila
      description: Indica se a superfície da argila curada pode ser pintada e os tipos
        de tinta recomendados.
    clay_primary_composition:
      name: Composição primária da argila
      description: 'Material base/aglutinante primário da argila de secagem ao ar
        (ex.: à base de papel, à base de minerais).'
    clay_shooting_discipline:
      name: Modalidade de tiro ao prato
      description: Identifica a modalidade ou evento de tiro ao prato para o qual
        o produto se destina.
    cleaner_format:
      name: Formato do produto de limpeza
      description: A embalagem/formato do produto de limpeza para varas de trombone.
    cleaner_sanitizer_intended_area:
      name: Área de aplicação do produto de limpeza/desinfetante
      description: A parte principal do instrumento de sopro que o produto se destina
        a limpar/desinfetar.
    cleaning_formula:
      name: Fórmula de limpeza
      description: Especifica a família química primária de limpeza/desinfecção do
        produto (não a marca) para garantir a segurança, a compatibilidade e a filtragem
        de uso.
    cleaning_task_focus:
      name: Foco da tarefa de limpeza
      description: Identifica os principais problemas de limpeza que a lavagem sem
        água visa solucionar.
    cleanup_method:
      name: Método de limpeza
      description: Especifica como a cola deve ser limpa (enquanto ainda estiver úmida)
        das mãos/ferramentas/superfícies.
    clear_glue_application_method:
      name: Método de aplicação da cola transparente
      description: Especifica o tipo de dispensador/aplicador incluído na embalagem
        da cola transparente.
    clear_glue_finish_after_drying:
      name: Acabamento da cola transparente (após a secagem)
      description: Descreve a aparência da cola depois de seca/curada (por exemplo,
        transparente e cristalina vs. translúcida; brilhante vs. fosca).
    cleat_bolt_pattern:
      name: Padrão de parafusos da presilha
      description: Especifica a configuração dos parafusos da sapata utilizada para
        fixar a presilha, o que determina a compatibilidade entre o pedal e a sapata
        (por exemplo, MTB de 2 parafusos vs. estrada de 3 parafusos).
    cleat_compatibility:
      name: Compatibilidade da presilha/trava
      description: Especifica com quais sistemas de pedais ou travas a capa para sapato
        é compatível.
    cleat_finish:
      name: Acabamento da presilha
      description: Especifica o acabamento/revestimento da superfície da base da presilha,
        afetando a resistência à corrosão e a aparência.
    cleat_receptacle_system:
      name: Sistema de receptáculo da trava
      description: Identifica a interface de encaixe de cravos/pontas compatível usada
        em sapatos de golfe com cravos.
    cleat_release_mechanism:
      name: Mecanismo de liberação da presilha/trava
      description: Especifica como a presilha da bicicleta se solta do pedal (por
        exemplo, liberação única ou liberação multidirecional).
    cleat_stud_type:
      name: Tipo de trava
      description: Especifica o estilo de construção ou fixação das travas/cravos
        na sola das chuteiras de futebol americano.
    climate_control_module_function:
      name: Função do módulo de controle de temperatura
      description: Especifica a função principal do módulo no sistema de climatização
        do veículo.
    climbing_hold_mounting_type:
      name: Tipo de montagem do suporte para escalada
      description: Especifica como o suporte é fixado na parede ou na prancha de treinamento.
    climbing_hold_type:
      name: Tipo de apoio para escalada
      description: Classifica a forma ou o estilo da pegada que define como ela é
        realizada.
    climbing_protection_device_type:
      name: Tipo de dispositivo de proteção para escalada
      description: Especifica o tipo de dispositivo de proteção (por exemplo, came,
        porca, piton). Isso ajuda os escaladores a identificar de forma rápida o equipamento
        adequado para uma determinada formação rochosa ou estilo de escalada.
    climbing_rope_middle_marking:
      name: Marcação do meio da corda de escalada
      description: Descreve como o ponto médio (e/ou as extremidades) da corda são
        identificados para auxiliar na descida e no rapel seguros.
    climbing_rope_treatment:
      name: Tratamento da corda de escalada
      description: Indica os acabamentos repelentes à água, secos ou de proteção aplicados
        à bainha e/ou ao núcleo da corda.
    climbing_rope_type:
      name: Tipo de corda de escalada
      description: Classifica a corda pela certificação UIAA e pelo uso pretendido
        (por exemplo, corda simples dinâmica, corda dupla, corda gêmea, corda estática,
        corda acessória). Isso permite que os compradores localizem de forma rápida
        a corda correta para sua atividade.
    climbing_safety_certifications:
      name: Certificações de segurança em escalada
      description: Indica as normas de segurança para escalada e segurança do setor
        cumpridas pelo dispositivo.
    clip_color:
      name: Cor do clipe
      description: Cor principal do clipe para partitura.
    clip_mechanism_type:
      name: Tipo de mecanismo do clipe
      description: Define o mecanismo de fecho utilizado por um porta-cartões digital
        ou carteira digital com clipe para dinheiro. Isso ajuda os compradores a escolher
        entre os estilos magnético, de mola, de alavanca, entre outros.
    clip_style:
      name: Estilo de clipe
      description: Identifica o mecanismo de encaixe específico usado para fixar o
        suporte, fornecendo informações de compatibilidade (por exemplo, clipe tipo
        jacaré, mosquetão).
    clipper_motor_technology:
      name: Tecnologia do motor da máquina de cortar cabelo
      description: Identifica o design do motor utilizado na máquina de cortar cabelo.
        Isso afeta a potência, o nível de ruído, a durabilidade e a necessidade de
        manutenção.
    closet_configuration:
      name: Configuração do closet
      description: Define a forma geral ou o layout do sistema de closet (por exemplo,
        em L, em U, em ilha).
    closing_mechanism:
      name: Mecanismo de fechamento
      description: Especifica a ação de fechamento da gaveta, como fechamento padrão,
        suave, automático ou abertura por pressão.
    cloth_construction:
      name: Construção do tecido
      description: Indica o tipo de trama ou acabamento do tecido. Isso afeta a velocidade
        e a durabilidade (por exemplo, lã penteada vs. lã cardada).
    cloth_thickness:
      name: Espessura do tecido
      description: Indica a classe de espessura/peso do pano de polimento.
    club_head_material:
      name: Material da cabeça do taco
      description: Especifica o material principal utilizado na construção da cabeça
        do taco.
    clutch_hydraulic_system_type:
      name: Tipo de sistema hidráulico de embreagem
      description: Indica a compatibilidade do sistema de acionamento da embreagem/sistema
        hidráulico (por exemplo, embreagem hidráulica vs. aplicações de conversão
        por cabo).
    clutch_line_connection_type:
      name: Tipo de conexão da linha da embreagem
      description: Especifica a interface de conexão/encaixe final utilizada pela
        linha da embreagem (importante para a compatibilidade com cilindros mestre/auxiliar
        e tubulações rígidas).
    clutch_pressure_plate_actuation_type:
      name: Tipo de acionamento da placa de pressão da embreagem
      description: Indica se a embreagem é desengatada por um mecanismo de liberação
        do tipo empurrar ou puxar (acionamento por mola de diafragma).
    clutch_pressure_plate_release_mechanism_type:
      name: Tipo de mecanismo de liberação da placa de pressão da embreagem
      description: O tipo de interface de liberação/acionamento utilizada pela placa
        de pressão.
    clutch_pressure_plate_surface_type:
      name: Tipo de superfície da placa de pressão da embreagem
      description: Tipo de superfície de contato por fricção da placa de pressão.
    clutch_slave_cylinder_connection_type:
      name: Tipo de conexão do cilindro auxiliar da embreagem
      description: Interface de conexão da linha hidráulica no cilindro auxiliar (roscada,
        rápida, banjo etc.).
    clutch_slave_cylinder_mounting_type:
      name: Tipo de montagem do cilindro auxiliar da embreagem
      description: Como o cilindro auxiliar é fixado à transmissão/caixa de embreagem
        (por exemplo, aparafusado, encaixado, concêntrico integrado).
    coating_type:
      name: Tipo de revestimento
      description: Identifica os revestimentos externos, coberturas ou glacês aplicados
        à barra de cereal (por exemplo, chocolate, iogurte etc.).
    cocking_mechanism:
      name: Mecanismo de engatilhamento
      description: Especifica o método ou dispositivo principal utilizado para armar
        ou desarmar a corda da besta/balestra.
    cocktail_garnish_form:
      name: Forma da guarnição de coquetel
      description: Descreve como a guarnição é apresentada/preparada para uso (por
        exemplo, fresca ou desidratada).
    cocktail_mix_variety:
      name: Variedade de mistura para coquetéis
      description: Indica o coquetel específico para a qual a mistura é destinada
        (por exemplo, Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Características do guardanapo para coquetel
      description: Destaca as características funcionais, práticas e ecológicas dos
        guardanapos para coquetel.
    cocktail_pick_tip_style:
      name: Estilo da ponta do palito para coquetel
      description: Descreve a forma e as características da ponta usada para perfurar
        ou segurar guarnições.
    cocktail_pick_top_handle_style:
      name: Estilo da haste/cabeça do palito para coquetel
      description: Descreve a parte superior decorativa ou o formato da alça utilizada
        para segurar ou para fins de apresentação.
    cocktail_type:
      name: Tipo de coquetel
      description: Indica a receita ou o estilo específico do coquetel representado
        pelo produto pré-misturado (por exemplo, Margarita, Negroni, Piña Colada etc.).
    cocktail_umbrella_handle_pick_material:
      name: Material das haste/ponta do guarda-chuva de coquetel
      description: Material da haste/ponta (excluindo a cobertura/dossel) do guarda-chuva
        para coquetel.
    cocoa_processing_method:
      name: Método de processamento de cacau
      description: Especifica como o cacau em pó foi processado (por exemplo, natural,
        processado com álcali, cacau preto etc.).
    cocoa_product_form:
      name: Forma do produto de cacau
      description: Define a forma física em que o produto de cacau é vendido.
    coconut_husk_status:
      name: Estado da casca de coco
      description: Indica o grau de remoção da casca externa do coco, o que afeta
        a facilidade de uso, o armazenamento e o descarte.
    coconut_maturity_stage:
      name: Estágio de maturação do coco
      description: Identifica o estágio de desenvolvimento do coco no momento da colheita,
        o que influencia fortemente o sabor, o teor de água e o uso culinário (por
        exemplo, para beber ou cozinhar).
    coconut_oil_refinement_type:
      name: Tipo de refinação do óleo de coco
      description: Especifica o grau de refinamento ou a qualidade do óleo de coco
        (por exemplo, virgem, refinado, TCM, fracionado.
    coconut_preparation_form:
      name: Forma de preparo do coco
      description: Especifica como o coco é fisicamente preparado ou cortado (inteiro,
        fatiado, ralado, em purê etc.). Isso ajuda os compradores a encontrar de forma
        rápida o formato necessário para receitas ou para consumo como lanche.
    coffee_bean_species:
      name: Espécie dos grãos de café
      description: Especifica a espécie de grãos de café utilizada no produto.
    coffee_beverage_variety:
      name: Variedade de bebidas de café
      description: Classifica as bebidas de café prontas para consumo ou misturadas
        por estilo.
    coffee_processing_method:
      name: Método de processamento de café
      description: Indica a técnica de processamento pós-colheita utilizada nos grãos
        de café.
    coil_material:
      name: Material da bobina
      description: Especifica o material principal ou o tipo de malha utilizado na
        bobina de aquecimento. Isso influencia o sabor, a durabilidade e a compatibilidade
        com o controle de temperatura.
    coil_spring_design:
      name: Projeto da mola helicoidal
      description: Especifica o projeto taxa de rigidez/formata da mola helicoidal
        que afeta as características de condução.
    coil_spring_finish_coating:
      name: Acabamento/revestimento da mola helicoidal
      description: Acabamento superficial ou revestimento aplicado para proteção contra
        corrosão.
    coil_spring_material:
      name: Material da mola helicoidal
      description: Material/composição principal da mola helicoidal.
    coil_system_type:
      name: Tipo de sistema da bobina
      description: Informações sobre o sistema específico de molas ou bobinas utilizado
        nos colchões aplicáveis, como molas ensacadas ou molas Bonnell.
    coil_type:
      name: Tipo de bobina
      description: Descreve a construção ou tecnologia da bobina utilizada, o que
        afeta a produção de vapor e o sabor.
    coin_grade_numismatic:
      name: Grau de qualidade da moeda (numismática)
      description: Classificação padronizada da moeda (por exemplo, escala de Sheldon
        ou classificação adjetiva).
    coin_strike_or_finish:
      name: Cunhagem ou acabamento da moeda
      description: O tipo de cunhagem ou acabamento da moeda (por exemplo, cunhagem
        comercial, cunhagem proof/fundo espelhado).
    coin_strike_type:
      name: Tipo de cunhagem
      description: 'Descreve o tipo de cunhagem/acabamento da moeda (ex.: proof, cunhagem
        comercial).'
    collar_style:
      name: Estilo da gola
      description: Define o desenho da gola ou do decote da peça de roupa.
    collectible_gun_accessories_included:
      name: Acessórios incluídos com a arma colecionável
      description: 'Lista os acessórios e a documentação incluídos com a arma de colecionável
        (ex.: coldre, estojo, baioneta, documentação).'
    collectible_gun_firing_mechanism:
      name: Mecanismo de disparo de arma colecionável
      description: Especifica o tipo de mecanismo de disparo/ignição da arma de fogo
        de coleção (especialmente peças antigas e históricas).
    collectible_knife_blade_finish:
      name: Acabamento da lâmina da faca colecionável
      description: Descreve o acabamento/tratamento da superfície da lâmina em termos
        de aparência (e, às vezes, resistência à corrosão).
    color_code_system:
      name: Sistema de código de cores
      description: Identifica o sistema de código de cores utilizado para a referência
        numérica da cor da linha (por exemplo, DMC, Anchor), se for o caso.
    color_coding_standard:
      name: Padrão de codificação de cores
      description: Indica se a placa segue um código de cores internacional (por exemplo,
        IWF ou IPF) ou outro esquema.
    color_effect:
      name: Efeito da cor
      description: Especifica técnicas ou efeitos especiais aplicados a extensões
        de cabelo.
    color_family:
      name: Família de cores
      description: Família de cores de alto nível para tinta sumi (útil quando a cor
        é muito granular, como preto quente vs. azul-preto).
    color_finish:
      name: Acabamento da cor
      description: Especifica o acabamento dos componentes visíveis do protetor de
        mãos (por exemplo, fosco ou brilhante) quando a cor por si só não é suficiente.
    coloring_finish:
      name: Acabamento da coloração
      description: Especifica o acabamento visual ou efeito especial produzido pela
        coloração, como metálico ou neon.
    comb_material:
      name: Material do pente
      description: Material do pente da gaita (o corpo que forma as câmaras de ar).
    comb_type:
      name: Tipo de pente
      description: Classifica os pentes para cuidados com cavalos de acordo com sua
        função principal (por exemplo, pente de escovagem, pente de crina, pente de
        puxar). Isso ajuda os compradores a localizar de forma rápida a ferramenta
        certa para necessidades específicas de escovação.
    combat_shorts_cut_style:
      name: Estilo de corte de shorts/calções de combate
      description: Indica o corte ou estilo de ajuste específico para shorts/calções
        de esportes de combate (por exemplo, corte alto, corte retro, compressão).
    comic_creator_role:
      name: Função do criador de quadrinhos
      description: Especifica a função do criador creditado relevante para a listagem
        (por exemplo, escritor/roteirista, artista).
    commemorative_coin_finish:
      name: Acabamento de moeda comemorativa
      description: Descreve o tipo de cunhagem/acabamento de uma moeda comemorativa.
    commemorative_coin_mint_mark:
      name: Marca da casa da moeda comemorativa
      description: Indica a marca da casa da moeda (ou a ausência dela) na moeda.
    commemorative_subject:
      name: Tema comemorativo
      description: Tema comemorativo principal (eventos, pessoa, lugar, aniversário,
        organização etc.).
    commercial_vehicle_class:
      name: Classe de veículo comercial
      description: Categoria regulatória/setorial baseada no PBT (Peso bruto do veículo)
        utilizada para descrever a classe de peso de um veículo comercial para fins
        de navegação e filtragem.
    compass_damping_medium:
      name: Meio de amortecimento da bússola
      description: Especifica o meio utilizado para estabilizar o movimento da agulha
        dentro da cápsula da bússola.
    compass_illumination_type:
      name: Tipo de iluminação da bússola
      description: Especifica como as marcações da bússola se tornam visíveis em condições
        de baixa luminosidade (por exemplo, tinta luminescente, trítio, retroiluminação
        LED).
    compass_mounting_style:
      name: Tipo de montagem da bússola
      description: Descreve como a bússola é transportada, usada ou instalada.
    compass_scale_units:
      name: Unidades de escala da bússola
      description: Identifica as unidades de medida (graus, milésimos/milirradianos
        ou ambos) marcadas na caixa da bússola.
    compatible_abs_system:
      name: Sistema ABS compatível
      description: Indica se o cilindro mestre é destinado a veículos equipados com
        ABS.
    compatible_adapter_brand:
      name: Marca de adaptador compatível
      description: Identifica a marca da cabeça do taco de golfe para a qual o adaptador
        da haste foi pré-configurado.
    compatible_airbag_system_type:
      name: Tipo de sistema de airbag compatível
      description: Indica a geração/conjunto de recursos do sistema de airbag com
        o qual a peça é compatível (por exemplo, estágio único vs. estágio duplo).
    compatible_amplifier_fit_method:
      name: Método de encaixe do amplificador compatível
      description: Indica como a compatibilidade é definida para a capa/estojo (encaixe
        universal vs. específico do modelo vs. por dimensões).
    compatible_apparatus:
      name: Aparelho compatível
      description: Especifica o aparelho ou atividade de ginástica para a qual as
        alças/pegas foram projetadas.
    compatible_archery_tool:
      name: Ferramenta de arco e flecha compatível
      description: Indica a ferramenta ou equipamento de arco e flecha principal com
        o qual o acessório foi projetado para funcionar.
    compatible_axle_size:
      name: Tamanho de eixo compatível
      description: 'Especifica o diâmetro do cubo/eixo ou o padrão de rosca para o
        qual a pedaleira foi projetada (ex: 10 mm/3⁄8 pol., 14 mm, 3/8 pol. 26 TPI).'
    compatible_axle_type:
      name: Tipo de eixo compatível
      description: Identifica os padrões de fixação do eixo traseiro que o rolo de
        treino suporta, como blocagem rápida ou tamanhos de eixo passante.
    compatible_axle_weight_rating:
      name: Classificação de peso de eixo compatível
      description: Especifica a capacidade de carga por eixo do reboque (capacidade
        por eixo) para a qual o conjunto de freio do reboque foi projetado.
    compatible_bait_type:
      name: Tipo de isca compatível
      description: Identifica os tipos de isca de pesca com os quais a furadeira de
        isca é compatível. Dessa, forma os pescadores podem escolher uma ferramenta
        que corresponda à sua isca de preferência.
    compatible_bass_scale_length:
      name: Comprimento de escala de baixo compatível
      description: Indica os comprimentos de escala de baixo para o qual o jogo/conjunto
        de cordas é destinado (importante para o comprimento correto do enrolamento
        e encaixe).
    compatible_battle_top_system:
      name: Sistema de pião de batalha compatível
      description: Identifica o ecossistema ou série de produtos de pião de batalha
        para o qual o pião foi projetado (usado para garantir a compatibilidade de
        peças e arenas).
    compatible_bb_size:
      name: Tamanho compatível do suporte do pedivela
      description: Indica o diâmetro das esferas de airsoft compatíveis com o produto.
    compatible_bed_frame_style:
      name: Estilo da armação da cama compatível
      description: Especifica o estilo de cama ou armação para a qual o acessório
        foi projetado.
    compatible_bicycle_tire_type:
      name: Tipo de pneu de bicicleta compatível
      description: Especifica quais tipos de pneus de bicicleta o produto pode reparar
        ou selar.
    compatible_bike_component:
      name: Componente de bicicleta compatível
      description: Especifica qual componente da bicicleta a ferramenta ou produto
        foi projetado para reparar.
    compatible_billiard_game:
      name: Jogo de bilhar compatível
      description: Identifica os formatos de jogo de bilhar para os quais o triângulo
        foi projetada. Isso garante que os clientes selecionem um triângulo que corresponda
        ao seu jogo.
    compatible_billiard_table_size:
      name: Tamanho de mesa de bilhar compatível
      description: Especifica os comprimentos padrão da mesa para os quais a capa
        foi projetada. Isso garante que os compradores escolham uma capa do tamanho
        adequado para a mesa de bilhar.
    compatible_bit_type:
      name: Tipo de broca compatível
      description: Tipos de pontas com as quais a proteção pode ser usada.
    compatible_blade_hosel:
      name: Hosel de lâmina compatível
      description: Indica o estilo de encaixe/conicidade da lâmina que o cabo aceita,
        garantindo que o cabo e a lâmina se encaixem corretamente.
    compatible_blade_system:
      name: Sistema de lâmina compatível
      description: 'Indica o sistema/formato de lâmina de substituição que a faca
        aceita (ex.: lâmina padrão para hobby nº 11, lâminas de segmentos destacáveis).'
    compatible_boat_weaving_shuttle_loom:
      name: Tear com lançadeira tipo barco compatível
      description: Com quais tipos de tear a lançadeira barco deve ser utilizada.
    compatible_bobbin_type:
      name: Tipo de bobina compatível
      description: Indica qual estilo de bobina/canilha a lançadeira barco foi projetada
        para usar.
    compatible_bottle_mouth:
      name: Bocal de garrafa compatível
      description: Tipo ou diâmetro do bocal da garrafa para o qual o canudo ou a
        tampa foi projetado.
    compatible_bow_attachment_system:
      name: Sistema de fixação de arco compatível
      description: 'Indica a interface de lâmina ou acessório para a qual a peça foi
        projetada (ex: ILF, encaixe de parafuso, engate rápido).'
    compatible_bow_crossbow_type:
      name: Tipo de arco/besta compatível
      description: Indica o estilo de arco ou besta para o qual o acessório foi projetado.
    compatible_brake_fluid:
      name: Fluido de freio compatível
      description: Especificações DOT do fluido de freio com as quais as vedações/materiais
        do cilindro mestre são projetados para serem compatíveis.
    compatible_brake_pad:
      name: Pastilha de freio compatível
      description: Indica para quais compostos de pastilhas de freio o rotor é aprovado,
        garantindo segurança e desgaste ideal.
    compatible_brake_service_system:
      name: Sistema de serviço de freio compatível
      description: Especifica se a peça se destina a freios a disco, freios a tambor
        ou ambos.
    compatible_brake_system:
      name: Sistema de freio compatível
      description: Especifica as principais observações sobre a compatibilidade do
        sistema para o uso do fluido de freio.
    compatible_brake_type:
      name: Tipo de freio compatível
      description: Especifica o tipo de freio com o qual a mesa/suporte é compatível,
        como freio a disco ou freio de aro.
    compatible_brass_instrument_finish:
      name: Acabamento do instrumento de metal compatível
      description: Especifica em quais acabamentos de instrumentos de sopro de metal
        o produto de limpeza pode ser usado com segurança sem danificar o acabamento.
    compatible_building_toy_system:
      name: Sistema de brinquedos de montagem compatível
      description: Indica com qual sistema ou padrão de construção o brinquedo é compatível
        (ou possui dimensões equivalentes), como compatível com LEGO ou de marca própria/proprietária.
    compatible_capo_fretboard_radius:
      name: Raio de escala compatível para capotraste
      description: Especifica o raio/perfil da escala para o qual o capotraste foi
        projetado, visando contato e estabilidade de afinação ideais.
    compatible_capo_number_of_strings:
      name: Número de cordas compatível para capotraste
      description: Indica quantas cordas o capotraste foi projetado para prender (útil
        para instrumentos de 6, 7, 8, 12 cordas e instrumentos especiais).
    compatible_cardio_machine_type:
      name: Tipo de máquina de cardio compatível
      description: Identifica o tipo de aparelho cardiovascular com o qual o acessório
        ou a peça foi projetada para funcionar.
    compatible_chain_link_type:
      name: Tipo de elo de corrente compatível
      description: Identifica o estilo de elo da corrente compatível com a ferramenta
        (padrão, meio elo, elo rápido etc.).
    compatible_chain_size:
      name: Tamanho de corrente compatível
      description: Especifica a largura da corrente ou os padrões de passo (por exemplo,
        1/8 de polegada, 3/32 de polegada) compatível com a ferramenta.
    compatible_chain_width:
      name: Largura compatível da corrente
      description: Indica o tamanho da corrente com a qual a roda livre foi projetada
        para funcionar.
    compatible_chip_denomination:
      name: Denominação de chip compatível
      description: Indica para quais denominações de chip a bandeja/caixa possui posições
        identificadas ou específicas (ou se destina a organizar).
    compatible_clarinet_mouthpiece_ligature:
      name: Braçadeira compatível para boquilha de clarinete
      description: Identifica o padrão de ajuste da braçadeira ou as notas de compatibilidade
        para o bocal.
    compatible_classical_guitar_string_scale_length:
      name: Comprimento da escala das cordas de violão clássico
      description: A compatibilidade pretendida entre o comprimento da escala do violão
        e o comprimento da corda para o conjunto.
    compatible_clay_target_size:
      name: Tamanho do alvo de argila compatível
      description: Indica os tamanhos ou as formas de alvos de argila que o lançador
        pode aceitar para o encaixe e desempenho adequados.
    compatible_cleat_system:
      name: Sistema de trava compatível
      description: Especifica o tipo de presilha ou o padrão de parafusos compatível
        com o pedal, para que os ciclistas possam escolher os sapatos adequados ao
        sistema correto.
    compatible_clipless_pedal_system:
      name: Sistema de pedais de encaixe compatível
      description: Identifica o padrão específico de pedal/presilha de encaixe com
        o qual o produto foi projetado para ser compatível.
    compatible_clutch_type:
      name: Tipo de embreagem compatível
      description: Compatibilidade da interface da embreagem com o volante (quando
        aplicável).
    compatible_coffee_pod_system:
      name: Sistema de cápsulas de café compatível
      description: Especifica a máquina de café ou o sistema de preparo para o qual
        as cápsulas ou sachês foram projetados.
    compatible_construction_set_system:
      name: Sistema de conjunto de construção compatível
      description: Indica com qual sistema de construção/ecossistema de marca o conjunto
        é compatível (por exemplo, compatível com LEGO, compatível com DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Suporte/cravelha compatível para clarinete contrabaixo
      description: Indica o tipo de interface de suporte/cravelha ou estilo de serviço
        necessário.
    compatible_coolant_chemistry:
      name: Química do líquido de arrefecimento compatível
      description: Especifica com quais famílias químicas do líquido de arrefecimento
        o aditivo foi formulado para ser compatível.
    compatible_cooling_system_material:
      name: Material compatível com o sistema de refrigeração
      description: Especifica para quais sistemas/materiais de refrigeração a limpeza
        do radiador é segura (por exemplo, radiadores de alumínio, sistemas com metais
        mistos).
    compatible_crib_format:
      name: Formato de berço compatível
      description: Define o tamanho geral ou a categoria da forma do colchão ou lençol
        para o qual o acessório foi projetado.
    compatible_cross_stitch_fabric_count:
      name: Número de pontos do tecido para ponto cruz compatível
      description: Contagem de gramas de tecido recomendada para bordar o desenho.
    compatible_cross_stitch_frame:
      name: Moldura compatível para bordado ponto cruz
      description: Indica para que a moldura foi projetada para ser usado (uso manual,
        suporte de mesa, suporte de chão ou universal).
    compatible_crossbar:
      name: Barra transversal compatível
      description: Compatibilidade do suporte com as barras transversais do suporte
        do teto do veículo (se montado no teto), incluindo os padrões de perfil/forma
        das barras transversais.
    compatible_cycling_cleat:
      name: Taco de ciclismo compatível
      description: Especifica o sistema de encaixe ou pedal com o qual as sapatilhas
        de ciclismo foram projetadas para funcionar.
    compatible_cymbal_size:
      name: Tamanho de címbalo compatível
      description: Especifica o diâmetro pretendido (ou máximo) do prato para o qual
        o estojo foi projetado. Trata-se da compatibilidade com o tamanho do prato,
        e não do diâmetro externo do estojo.
    compatible_device_type:
      name: Tipo de dispositivo compatível
      description: Indica o tipo de dispositivo que o suporte se destina a segurar
        (por exemplo, monitor/TV, tablet, smartphone, leitor de DVD portátil).
    compatible_dock_structure_type:
      name: Tipo de estrutura de base compatível
      description: A estrutura de base na qual os degraus são projetados para serem
        montados.
    compatible_dough_type:
      name: Tipo de massa compatível
      description: Especifica com quais tipos/marcas de massa as ferramentas foram
        projetadas para funcionar (por exemplo, massa de modelar comum, argila de
        modelagem).
    compatible_drawing_ink_surface:
      name: Superfície compatível com tinta de desenho
      description: Indica as superfícies/substratos recomendados para melhor desempenho.
    compatible_drivetrain_brand:
      name: Marca de transmissão compatível
      description: Lista a marca do sistema de transmissão ou freio com o qual o cabo
        foi projetado para funcionar.
    compatible_drivetrain_speeds:
      name: Velocidades de transmissão compatíveis
      description: Especifica o número de velocidades da transmissão (por exemplo,
        10 velocidades) compartíveis com o pedivela ou a coroa.
    compatible_equipment:
      name: Equipamento compatível
      description: Especifica o tipo de equipamento para esportes de inverno que a
        morsa foi projetada para suportar.
    compatible_evap_system:
      name: Sistema EVAP compatível
      description: Indica se a tampa do tanque de combustível foi projetada para atender
        aos requisitos do sistema EVAP (por exemplo, vedação de acordo com as especificações
        do fabricante) e reduzir o acendimento da luz de verificação do motor.
    compatible_exercise_bike_style:
      name: Estilo de bicicleta ergométrica compatível
      description: Indica para quais modelos de bicicletas ergométricas o acessório
        ou peça de reposição foi projetado.
    compatible_fencing_weapon:
      name: Arma de esgrima compatível
      description: Especifica para qual arma ou modalidade de esgrima o casaco ou
        lamê é destinado.
    compatible_fiber_type:
      name: Tipo de fibra compatível
      description: Tipos principais de fibra que a cardadora de tambor foi projetada
        para processar com eficiência.
    compatible_fin_box_system:
      name: Sistema de encaixe de quilha compatível
      description: 'Identifica o encaixe ou sistema de montagem para o qual a quilha
        foi projetada, ajudando os surfistas a comprar quilhas compatíveis com sua
        prancha (ex.: FCS II, Futures, US Box).'
    compatible_fingerboard_radius:
      name: Raio de escala compatível
      description: Especifica o raio do braço do violão (reto, curvo ou composto)
        para o qual o capotraste foi projetado, a fim de garantir uma pressão uniforme
        e reduzir o ruído.
    compatible_finish_type:
      name: Tipo de acabamento compatível
      description: Indica para quais tipos de acabamento de instrumentos o spray é
        considerado seguro.
    compatible_fishing_reel_type:
      name: Tipo de carretel de pesca compatível
      description: Especifica o tipo de carretel de pesca para o qual o acessório
        foi projetado para ser compatível (por exemplo, pesca com molinete com isca
        artificial, pesca de arremesso, pesca com mosca).
    compatible_fly_line_weight:
      name: Peso da linha de pesca compatível
      description: Indica o peso máximo da linha de pesca com mosca AFTMA que o carretel
        foi projetado para acomodar.
    compatible_flywheel_type:
      name: Tipo de volante compatível
      description: Especifica o tipo de volante com o qual a placa de pressão da embreagem
        deve ser usada.
    compatible_football_kick_type:
      name: Tipo de chute de futebol compatível
      description: Identifica as situações de chute para as quais o produto foi projetado
        (por exemplo, pontapé inicial, chute a gol). Isso ajuda os atletas a localizar
        de forma rápida o equipamento adequado.
    compatible_fuel_system_type:
      name: Tipo de sistema de combustível compatível
      description: Especifica o sistema de distribuição de combustível para o qual
        o limpador foi projetado.
    compatible_gas_type:
      name: Tipo de gás compatível
      description: Identifica o tipo de gás comprimido para o qual o cilindro de ar
        comprimido de paintball foi projetado.
    compatible_gel_wax_additives:
      name: Aditivos compatíveis para cera em gel
      description: Especifica quais tipos de aditivos são compatíveis com esta cera
        em gel (por exemplo, corantes, materiais de inclusão).
    compatible_glaze_layering:
      name: Aplicação de camadas de esmalte compatíveis
      description: Indica se o esmalte se destina a ser sobreposto com outros esmaltes
        para criar efeitos.
    compatible_golf_bag_type:
      name: Tipo de bolsa de golfe compatível
      description: Indica para quais formatos de saco de golfe a capa ou estojo serve.
    compatible_ground_polarity:
      name: Polaridade de aterramento compatível
      description: Indica se o regulador de tensão é destinado a sistemas elétricos
        de veículos com aterramento negativo ou positivo (ou se não é sensível à polaridade).
    compatible_guitar_body_shape:
      name: Formato do corpo da guitarra compatível
      description: Indica para qual formato/corpo de guitarra o estojo foi projetado.
    compatible_guitar_case:
      name: Estojo de guitarra compatível
      description: Especifica em quais estilos de estojos para guitarra o umidificador
        foi projetado para caber e funcionar corretamente.
    compatible_guitar_scale_length:
      name: Comprimento do braço da guitarra compatível
      description: Indica para quais comprimentos de escala de guitarra o conjunto
        de cordas foi projetado (com base no comprimento da bobina/comprimento total).
    compatible_gun_platform:
      name: Plataforma de armas compatível
      description: Especifica a plataforma operacional ou fonte de alimentação com
        a qual o produto é compatível (por exemplo, AEG, GBB, HPA etc.).
    compatible_hair_length:
      name: Comprimento de cabelo compatível
      description: Especifica o comprimento ou volume máximo de cabelo que o acessório
        acomoda de maneira confortável.
    compatible_head_and_neck_restraint_system:
      name: Sistema de retenção de cabeça e pescoço compatível
      description: Indica se o capacete inclui pontos de ancoragem e/ou é compatível
        com sistemas de proteção para cabeça e pescoço (por exemplo, HANS), incluindo
        o status de inclusão/instalação dos pinos de ancoragem.
    compatible_helmet_certification_standard:
      name: Padrão de certificação de capacete compatível
      description: Indica os contextos das normas ou certificações de segurança para
        capacetes para os quais o acessório foi projetado (por exemplo, películas
        descartáveis para uso em corridas geralmente fazem referência a regras específicas
        de homologação).
    compatible_helmet_shell_size:
      name: Tamanho do casco de capacete compatível
      description: Indica para quais tamanhos de casco de capacete uma peça interna
        de reposição serve (o tamanho do casco geralmente corresponde a faixas de
        tamanho como XP–P, M, G–XG).
    compatible_helmet_size:
      name: Tamanho de capacete compatível
      description: Indica o tamanho do capacete com o qual a máscara facial é compatível.
    compatible_helmet_type:
      name: Tipo de capacete compatível
      description: A categoria de capacete para a qual o suporte para o pescoço foi
        projetado.
    compatible_hitch_receiver_size:
      name: Tamanho do receptor de engate compatível
      description: O tamanho da abertura do engate para o qual o acessório foi projetado
        (para acessórios de suporte montados no engate).
    compatible_hook_size:
      name: Tamanho do gancho compatível
      description: Sistemas de tamanhos de agulhas de crochê e/ou faixa de tamanhos
        para os quais o organizador foi projetado (por exemplo, tamanhos em letras/números
        dos EUA, faixa métrica em mm).
    compatible_horse_coat_type:
      name: Tipo de pelagem de cavalo compatível
      description: Especifica as características da pelagem do cavalo para as quais
        o removedor de pelos mortos é mais adequado (por exemplo, pelagem espessa
        de inverno ou pelagem sensível).
    compatible_host_platform:
      name: Plataforma de host compatível
      description: Especifica com quais plataformas de host ou tipos de dispositivos
        o controlador de tablet é compatível (por exemplo, Windows, macOS, iOS, Android)
        ou se ele pode funcionar de forma autônoma, sem um computador.
    compatible_inflation_gas:
      name: Gás de enchimento compatível
      description: Especifica com o que o balão deve ser inflado (ar, hélio ou ambos).
    compatible_injection_type:
      name: Tipo de injeção compatível
      description: Indica para qual sistema de injeção de combustível o produto foi
        projetado para limpar.
    compatible_instrument_surface_material:
      name: Superfície/material do instrumento compatível
      description: Indica em quais superfícies/materiais de instrumentos o polidor
        deve ser usado.
    compatible_intercom_system:
      name: Sistema de intercomunicação compatível
      description: Indica se o capacete está pronto ou é compatível para a montagem
        ou instalação de um sistema de intercomunicação/comunicação.
    compatible_interior_material:
      name: Material de interior compatível
      description: 'Indica para quais materiais do interior do veículo o removedor
        de manchas é seguro/eficaz (ex.: carpete, estofamento de tecido, couro, vinil).'
    compatible_kayak_type:
      name: Tipo de caiaque compatível
      description: Lista os estilos gerais de caiaque nos quais o kit de vela foi
        projetado para ser montado.
    compatible_license_plate_hole_pattern:
      name: Padrão de furos da placa de licença compatível
      description: Especifica a configuração dos orifícios de fixação disponíveis
        no suporte (lado do veículo e/ou lado da placa).
    compatible_license_plate_size:
      name: Tamanho de placa de licença compatível
      description: Indica os tamanhos regionais ou dimensionais da placa de licença
        para as quais o suporte foi projetado.
    compatible_loom:
      name: Tear compatível
      description: Especifica os tipos de tear com os quais o batedor de tecelagem
        plana deve ser usado.
    compatible_loom_type:
      name: Tipo de chicote compatível
      description: Indica a configuração de tecelagem com a qual o batedor deve ser
        usado (por exemplo, teares de pente rígido vs. teares de tapeçaria).
    compatible_machine_type:
      name: Tipo de máquina compatível
      description: Indica com que tipo de estrutura de quilting a armação foi projetada
        para funcionar (apenas quilting à mão, máquina de costura doméstica, máquina
        de quilting longarm).
    compatible_mast_type:
      name: Tipo de mastro compatível
      description: 'Especifica para quais diâmetros de mastro a vela foi projetada:
        diâmetro reduzido (RDM), diâmetro padrão (SDM) ou ambos.'
    compatible_model_system_train_scale:
      name: Sistema de modelo compatível (escala de trem)
      description: 'Especifica a escala/sistema de modelismo ferroviário ao qual o
        acessório é compatível, quando aplicável (ex.: HO, N, O).'
    compatible_mounting_surface:
      name: Superfície de montagem compatível
      description: A superfície ou objeto para o qual o clipe foi projetado para fixar-se.
    compatible_mouthpiece_patch:
      name: Protetor de boquilha compatível
      description: Indica se a boquilha foi projetada para uso com protetores/adesivos
        de boquilha e a faixa de espessura recomendada para o protetor.
    compatible_mouthpiece_type:
      name: Tipo de bocal compatível
      description: Indica o tipo/encaixe da boquilha para a qual o melofone foi projetado
        (normalmente, boquilha de trompa ou trompete, dependendo do modelo).
    compatible_neck_profile_width:
      name: Perfil/largura de pescoço compatível
      description: 'Indica a classe de largura/perfil do braço da guitarra para a
        qual o capotraste foi projetado (ex: guitarra elétrica estreita vs. violão
        clássico largo).'
    compatible_needle_size:
      name: Tamanho da agulha compatível
      description: 'Indica os tamanhos/tipos de agulha com os quais o estojo é compatível
        (ex: comprimentos de agulha para bordado, tapeçaria, costura à mão).'
    compatible_needle_system:
      name: Sistema de agulha compatível
      description: Sistemas de agulha com os quais a máquina é compatível (por exemplo,
        130/705H).
    compatible_parking_brake_mechanism:
      name: Mecanismo de freio de estacionamento compatível
      description: Indica se a pinça de freio foi projetada para funcionar com um
        mecanismo de freio de estacionamento integrado.
    compatible_pedal_instrument_type:
      name: Tipo de instrumento de pedal compatível
      description: Especifica com o que o pedal deve ser usado (por exemplo, piano
        digital, teclado/sintetizador, controlador MIDI).
    compatible_pedal_type:
      name: Tupo de pedal compatível
      description: 'Indica o estilo ou sistema de pedal para o qual a firma-pé ou
        o clip foi projetado (ex: plataforma, SPD, Look Keo).'
    compatible_pin_type:
      name: Tipo de pino compatível
      description: Com que tipo de alfinetes a base foi projetada para ser usada (ou
        se ela permite o uso de alfinetes).
    compatible_pipe_filter_size:
      name: Tamanho de filtro de tubo compatível
      description: Indica o tamanho ou estilo do filtro que o tubo foi projetado para
        aceitar (ou se nenhum filtro é necessário).
    compatible_plate_size:
      name: Tamanho de placa compatível
      description: Dimensões ou tamanhos padronizados de placas balísticas que o colete
        pode acomodar.
    compatible_play_vehicle_scale:
      name: Escala de veículos de brinquedo compatíveis
      description: 'Indica a escala do brinquedo com a qual o acessório é compatível
        (ex: 1:64), garantindo melhor encaixe/compatibilidade para colecionadores
        e sistemas de pistas.'
    compatible_playing_surface:
      name: Superfície de jogo compatível
      description: Indica o tipo de campo ou superfície para a qual as chuteiras de
        futebol americano foram projetadas.
    compatible_pole_dimensions:
      name: Dimensões de poste/mastro compatíveis
      description: Especifica o tamanho da seção transversal do poste no qual o acessório
        se encaixa.
    compatible_pole_shape:
      name: Forma de poste compatível
      description: Especifica a forma da seção transversal do poste ou coluna para
        a qual o equipamento foi projetado.
    compatible_power_steering_system:
      name: Sistema de direção hidráulica compatível
      description: Indica os tipos de sistema de direção para os quais o fluido se
        destina.
    compatible_powerplant_type:
      name: Tipo de sistema de propulsão compatível
      description: 'Indica o sistema de propulsão/mecanismo de ação da arma de pressão
        para a qual a peça se destina (ex.: mola-pistão, CO2, PCP).'
    compatible_presser_foot:
      name: Calcador compatível
      description: Especifica o sistema de montagem/compatibilidade do calcador/sapatilha
        compatível com a máquina de costura (por exemplo, encaixe por pressão vs.
        encaixe por rosca; haste baixa/alta/inclinada). Use "Universal/Vários" se
        vários sistemas forem compatíveis ou se estiver incluídos adaptadores.
    compatible_protective_gear:
      name: Equipamento de proteção compatível
      description: Especifica com quais outros equipamentos de proteção o protetor
        de pescoço foi projetado para funcionar.
    compatible_protective_gear_integration:
      name: Integração de equipamentos de proteção compatível
      description: Descreve como o protetor deve ser usado ou integrado a outros equipamentos
        (por exemplo, bolso interno, fixação independente por alça).
    compatible_punching_bag_type:
      name: Tipo de saco de pancadas compatível
      description: Especifica com quais estilos de sacos de pancada ou de treino o
        produto é compatível.
    compatible_racing_discipline:
      name: Modalidade de corrida compatível
      description: As modalidades de automobilismo para as quais o capacete foi projetado/certificado.
    compatible_rc_scale:
      name: Escala RC compatível
      description: 'Indica a escala RC (ex.: 1:10) para a qual o acessório ou a peça
        foi projetada.'
    compatible_recorder_size:
      name: Tamanho de flauta baixo compatível
      description: Especifica para quais tamanhos de flauta doce a maleta/estojo foi
        projetado.
    compatible_recorder_type:
      name: Tipo de flauta baixo compatível
      description: 'Especifica o tipo de flauta doce (família/tamanho) com a qual
        o acessório é compatível (ex.: soprano, contralto).'
    compatible_reed_cut:
      name: Corte de palheta compatível
      description: 'Especifica com qual estilo de corte de palheta a abraçadeira é
        compatível (ex: corte com talão/corte francês vs. corte sem talão/corte americano).'
    compatible_reed_type:
      name: Tipo palheta compatível
      description: Especifica o corte/tipo de palheta para o qual a boquilha foi projetada.
    compatible_reel_type:
      name: Tipo de carretel compatível
      description: Especifica o estilo de carretel de pesca para o qual a bolsa,estojo
        ou capa foi projetada.
    compatible_refrigerant_type:
      name: Tipo de refrigerante compatível
      description: Indica qual o fluido refrigerante para o qual o evaporador do ar-condicionado
        foi projetado.
    compatible_ride_equipment:
      name: Equipamentos de prática compatível
      description: Tipos de equipamentos esportivos com rodas para os quais a rampa
        foi projetada.
    compatible_roof_height:
      name: Altura de telhado compatível
      description: Indica para qual perfil de telhado a cobertura foi projetada (padrão
        ou telhado estendido/alto).
    compatible_roof_rail_type:
      name: Tipo de longarina de teto compatível
      description: Especifica a configuração de teto com a qual o sistema de suporte/rack
        básico foi projetado para ser fixado.
    compatible_rope_count:
      name: Número de cordas compatíveis
      description: Especifica a configuração de cordas do ringue de boxe para a qual
        a peça foi projetada, como ringues de 3 cordas, de 4 cordas ou encaixe universal.
    compatible_rope_type:
      name: Tipo de corda compatível
      description: Especifica quais tipos de corda podem ser usados com o dispositivo.
    compatible_saddle_type:
      name: Tipo de sela compatível
      description: Especifica o estilo de sela ou modalidade de montaria para a qual
        o acessório foi projetado, garantindo a compatibilidade correta entre selas
        inglesas, ocidentais (Western) e outros modelos.
    compatible_saxophone_size:
      name: Tamanho de saxofone compatível
      description: 'Indica com qual tamanho de saxofone o produto é compatível (ex.:
        soprano, alto, tenor).'
    compatible_saxophone_type:
      name: Tipo de saxofone compatível
      description: Especifica para qual saxofone a abraçadeira/cobre-boquilha foi
        projetado.
    compatible_scale_length:
      name: Comprimento de escala compatível
      description: 'Identifica a gama de comprimentos de escala da guitarra para a
        qual as cordas são destinadas (ex.: escala curta, padrão, barítono).'
    compatible_seat_airbag:
      name: Airbag de assento compatível
      description: Indica se o banco possui airbags laterais ou é compatível com veículos
        equipados com airbags integrados nos bancos.
    compatible_seating_capacity:
      name: Capacidade de assentos compatível
      description: Especifica o número de assentos ou a configuração para a qual o
        acessório foi projetado.
    compatible_sensor_port_type:
      name: Tipo de porta de sensor compatível
      description: Especifica se o cárter de óleo possui sensores de nível de óleo
        e/ou temperatura do óleo e o tipo de porta, se aplicável.
    compatible_shifter_type:
      name: Tipo de câmbio compatível
      description: Identifica o tipo ou configuração da alavanca de câmbio para a
        qual a coifa do câmbio foi projetada.
    compatible_shis:
      name: SHIS compatível
      description: 'Lista os códigos do Sistema Padronizado de Identificação de Caixa
        de Direção (SHIS) com os quais a peça é compatível (ex: IS42, EC34, ZS44/28.6).'
    compatible_skating_discipline:
      name: Modalidade de patinação compatível
      description: Indica as modalidades de patinação para as quais a peça ou o acessório
        foi projetado.
    compatible_snowshoe_deck_type:
      name: Tipo de plataforma de raquete de neve compatível
      description: Especifica o estilo de estrutura ou plataforma da raquete de neve
        com o qual a fixação é compatível.
    compatible_special_effects_lighting_features:
      name: Recursos de iluminação de efeitos especiais compatíveis
      description: Destaca as funcionalidades comuns que influenciam as decisões de
        compra de luzes de efeito (além da cor/padrão), como a interconexão de unidades
        ou a reação ao áudio.
    compatible_spinning_wheel_drive_system:
      name: Sistema de acionamento de roda de fiar compatível
      description: Especifica com quais sistemas de tração de roda de fiar o acessório
        é compatível.
    compatible_spoke_gauge:
      name: Calibre de raio compatível
      description: Indica os tamanhos de calibre do fio do raio com o qual as roscas
        do niple são compatíveis, permitindo que os compradores combinem raios e niples
        de forma correta.
    compatible_steering_wheel_airbag:
      name: Airbag de volante compatível
      description: Indica se o volante permite a retenção do módulo de airbag original
        (OEM) ou se é destinado a aplicações sem airbag.
    compatible_steering_wheel_control_button:
      name: Botão de controle do volante compatível
      description: Indica compatibilidade com os controles de fábrica montados no
        volante (áudio/piloto automático/telefone) e a fiação relacionada.
    compatible_stencil_material:
      name: Material de estêncil compatível
      description: 'Materiais a partir dos quais a máquina pode criar estênceis ou
        processar (ex: papel, filme plástico, acetato/mylar).'
    compatible_stencil_media_format:
      name: Formato de mídia de estêncil compatível
      description: 'Indica o formato de mídia para estêncil que é compatível com a
        máquina atende: folhas, rolos ou ambos.'
    compatible_strap_retractor:
      name: Retrator de correia compatível
      description: Indica se a correia é compatível com sistemas retráteis ou se foi
        projetada para cintos não retráteis (estáticos).
    compatible_string_instrument_finish:
      name: Acabamento de instrumento de cordas compatível
      description: Especifica em quais tipos de acabamento de instrumentos o polidor
        pode ser usado com segurança.
    compatible_substrate_material:
      name: Material de substrato compatível
      description: Os materiais de superfície aos quais a tinta foi formulada para
        aderir.
    compatible_surface:
      name: Superfície compatível
      description: Especifica a superfície/material ao qual o adesivo de velcro deve
        aderir.
    compatible_surface_material:
      name: Material de superfície compatível
      description: Materiais da superfície do veículo nos quais o produto foi projetado
        para ser usado.
    compatible_tear_off_system:
      name: Sistema de remoção compatível
      description: Indica se os óculos de proteção são compatíveis com lentes descartáveis
        e/ou lentes removíveis, incluindo se possuem suportes para a fixação de lentes
        descartáveis.
    compatible_thermostat_type:
      name: Tipo de termostato compatível
      description: Indica o bocal/compartimento de foi projetado para acomodar um
        termostato e, em caso afirmativo, de que tipo/tamanho.
    compatible_thread:
      name: Linha compatível
      description: Indica os tipos de linha/fio para os quais o passador de linha
        foi projetado (por espessura/tipo).
    compatible_thread_spool_format:
      name: Formato compatível de linha/carretel
      description: Indica quais formatos de linha a caixa foi projetada para armazenar
        (carretéis, bobinas, bobinas/cartões de linha de bordado, cones, etc.).
    compatible_thread_yarn_tool:
      name: Ferramenta compatível para fios e linhas
      description: Compatibilidade de máquinas/sistemas para ferramentas que se acoplam
        ou são utilizadas com outros equipamentos (por exemplo, máquina de costura,
        overloque, tear, roda de fiar).
    compatible_tire_application:
      name: Aplicação de pneu compatível
      description: Indica o segmento de aplicação de pneus/rodas para o qual o desmontador
        de pneus foi projetado (com base no pneu/roda que está sendo usado, e não
        no modelo do veículo).
    compatible_tom_pad_mounting:
      name: Suporte compatível para tom pad
      description: Especifica onde o tom-tom eletrônico é fixado (por exemplo, suporte
        com braçadeira/haste, haste em L, suporte de pedestal), o que determina se
        ele será compatível com os sistemas de rack/suporte existentes.
    compatible_toy_vehicle_scale:
      name: Escala de veículo de brinquedo compatível
      description: Indica a escala ou o tamanho aproximado do veículo de brinquedo
        com o qual o conjunto é compatível.
    compatible_tpms_sensor_type:
      name: Tipo de sensor TPMS compatível
      description: Especifica se os sensores TPMS da roda e/ou qualquer tipo de válvula/sensor
        necessário estão incluídos.
    compatible_training_equipment:
      name: Equipamento de treinamento compatível
      description: Indica os tipos de equipamentos de treino ou fitness que podem
        ser fixados ao suporte.
    compatible_treadmill_design:
      name: Design de esteira compatível
      description: Especifica o modelo de esteira com o qual o acessório é compatível,
        como modelos dobráveis ou não dobráveis.
    compatible_tube:
      name: Tubo compatível
      description: Indica o tipo de câmara de ar ou construção do pneu para o qual
        o remendo foi projetado, como butil, látex, TPU ou sem câmara.
    compatible_valve_type:
      name: Tipo de válvula compatível
      description: Especifica com qual tipo de válvula de latão o lubrificante é compatível.
    compatible_vaporizing_material:
      name: Material de vaporização compatível
      description: Indica os tipos de materiais que o dispositivo foi projetado para
        vaporizar.
    compatible_vehicle_windshield_fluid:
      name: Fluido para limpeza de para-brisa compatível com o veículo
      description: Alegações de compatibilidade relacionadas a equipamentos do veículo
        ou tratamento de vidros (por exemplo, seguro para revestimentos repelentes
        de chuva, seguro para lavadores de faróis).
    compatible_visor_system:
      name: Sistema de visor compatível
      description: Indica com quais tipos de sistema de inserção/viseira o capacete
        de motocicleta é compatível.
    compatible_water_board_type:
      name: Tipo de prancha de água compatível
      description: Quais pranchas para esportes aquáticos o suporte foi projetado
        para transportar.
    compatible_water_sport_board_type:
      name: Tipo de prancha compatível para esportes aquáticos
      description: Lista os tipos de pranchas que o suporte foi projetado para transportar.
    compatible_watercraft_communication_standard:
      name: Padrão de comunicação compatível para embarcações
      description: Especifica os padrões de comunicação/rede marítima ou protocolos
        de integração compatíveis para garantir a interoperabilidade com os sistemas
        eletrônicos de bordo.
    compatible_watercraft_engine_type:
      name: Tipo de motor de embarcação compatível
      description: Indica a configuração do trem de força para a qual a peça é adequada
        (motor de popa/motor interno/motor de popa com transmissão interna/motor a
        jato).
    compatible_weight_plate_diameter:
      name: Diâmetro da placa de peso/anilha compatível
      description: Especifica quais diâmetros de anilha/placa de peso a máquina aceita.
    compatible_wheel_finish:
      name: Acabamento de roda compatível
      description: Especifica os acabamentos/materiais das rodas nos quais o produto
        de limpeza pode ser usado com segurança (conforme declarado pelo fabricante).
    compatible_whorl_drive_band_type:
      name: Tipo de correia de acionamento da polia compatível
      description: Especifica com qual estilo de correia de acionamento a polia deve
        funcionar.
    compatible_wick_series:
      name: Série de pavios compatíveis
      description: Indica as séries/tipos comuns de pavio para os quais a aba foi
        projetada (nomenclatura do setor), se especificado pelo vendedor.
    compatible_winder_head_bit:
      name: Cabeça/ponta de enrolador compatível
      description: Especifica o tipo de interface entre a cabela e a chave do afinador
        com a qual o enrolador é compatível (por exemplo, cabeça com ranhura, pontas
        intercambiáveis, cabeça universal).
    compatible_windlass_rode:
      name: Cabo de guincho compatível
      description: Especifica o tipo de cabo de âncora para o qual o guincho foi projetado.
    compatible_windshield_type:
      name: Tipo de para-brisa compatível
      description: Especifica com qual configuração de para-brisa o compartimento
        foi projetado para funcionar.
    compatible_wood:
      name: Madeira compatível
      description: Especifica para quais tipos de madeira de escala o polidor é recomendado/seguro.
    compatible_writing_surface:
      name: Superfície de escrita compatível
      description: Especifica as superfícies/papéis em que a tinta deve funcionar
        melhor.
    compatible_zipper_size:
      name: Tamanho de zíper compatível
      description: 'Indica o tamanho do zíper para o qual o puxador foi projetado
        (geralmente expresso como #3, #5, #8, #10), melhorando a filtragem de compatibilidade.'
    compliance_certification:
      name: Certificação de conformidade
      description: A barra de luz atende aos padrões de conformidade/aprovação para
        uso em vias públicas e à compatibilidade eletromagnética.
    component_position:
      name: Posição do componente
      description: Especifica a posição relativa da peça dentro do conjunto de distribuição
        do motor (por exemplo, tampa dianteira vs. traseira, superior vs. inferior).
        Não se trata do posicionamento dianteiro/traseiro do veículo.
    concentration_level:
      name: Nível de concentração
      description: Indicação qualitativa da concentração do extrato de tomate (simples,
        dupla, tripla), uma informação útil para atender aos requisitos da receita.
    concentration_type:
      name: Tipo de concentração
      description: Indica se o produto está pronto para uso ou se é concentrado e
        (se for concentrado) fornece orientações típicas de diluição.
    concert_bass_drum_mounting_stand_type:
      name: Tipos de suporte de montagem para bumbo de concerto
      description: Indica como o bumbo de concerto é apoiado ou montado para a execução.
    concert_pitch_standard:
      name: Padrão de altura tonal de concerto
      description: Especifica a referência de altura tonal do concerto (A4) em que
        o piano está afinado no momento da venda (por exemplo, A440, A442, A444).
    condiment_form:
      name: Forma de condimento
      description: Indica a forma física ou consistência do produto de raiz-forte
        (por exemplo, pasta, pó, creme etc.).
    condiment_texture:
      name: Textura do condimento
      description: Descreve a consistência física do molho ou chutney (por exemplo,
        com pedaços, suave etc.).
    confetti_format:
      name: Formato de confete
      description: Especifica o formato do produto com base na forma como o confete
        é embalado ou lançado (por exemplo, confete solto vs. lançadores/canhões).
    conga_head_tensioning_system:
      name: Sistema de tensionamento da cabeça da conga
      description: Tipo de equipamento utilizado para tensionar/afinar a pele da conga
        (por exemplo, afinação tradicional com parafusos de afinação vs. mecanismos
        modernos de afinação rápida).
    conga_set_included_drum_types:
      name: Tipos de tambores incluídos no conjunto de congas
      description: Indica quais tipos de conga estão incluídos em um conjunto de conga
        (por exemplo, quinto + conga + tumba).
    connector_case_style:
      name: Estilo estojo para conector
      description: Classifica o estilo geral de construção do estojo para conector
        (por exemplo, estojo rígido vs. bolsa macia) para refletir o nível de proteção
        e portabilidade.
    console_cover_installation_method:
      name: Método de instalação da tampa do console
      description: Especifica como a capa do console se fixa ao console/apoio de braço
        (por exemplo, encaixe, tiras elásticas, velcro, adesivo, encaixe por pressão
        etc.).
    console_display_type:
      name: Tipo de exibição do console
      description: Identifica o tipo de visor do usuário fornecido na máquina (por
        exemplo, LCD, LED, tela sensível ao toque etc.).
    construction_design:
      name: Projeto de construção
      description: Indica quantas peças articuladas compõem a almofada, o que afeta
        a mobilidade (por exemplo, 1 peça vs. 3 peças).
    contact_angle:
      name: Ângulo de contato
      description: Especifica o ângulo de contato das pistas do rolamento, expresso
        como um único ângulo ou um conjunto de ângulos (por exemplo, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Tipo de enchimento de bola de malabarismo de contato
      description: Identifica se a bola é maciça ou preenchida (e, se preenchida,
        qual o tipo de enchimento). Isso afeta a distribuição do peso e a durabilidade.
    contact_juggling_ball_transparency:
      name: Transparência da bola de malabarismo de contato
      description: Especifica a transparência/aparência óptica da bola.
    contact_surface_material:
      name: Material da superfície de contato
      description: Identifica o material utilizado nos pontos de contato que tocam
        o instrumento (por exemplo, cortiça/borracha) para evitar arranhões e melhorar
        a aderência.
    container_material:
      name: Material do recipiente
      description: 'Especifica o material principal do recipiente para varejo do produto
        (ex.: vidro, plástico polietileno tereftalato, alumínio etc.).'
    contaminant_removal:
      name: Remoção de contaminantes
      description: Indica as classes de contaminantes que o produto está certificado
        para remover ou reduzir.
    contra_alto_clarinet_body_configuration:
      name: Configuração do corpo do clarinete contra-alto
      description: Descreve o formato físico da construção do clarinete contra-alto
        (por exemplo, designs retos vs. dobrados).
    contra_alto_clarinet_lowest_note_extension:
      name: Extensão da nota mais grave do clarinete contra-alto
      description: Especifica a extensão da nota mais grave que o instrumento pode
        tocar (a nota mais grave que o mecanismo permite), comumente utilizada para
        distinguir modelos com Mi bemol grave, Ré grave e Dó grave.
    contra_bass_clarinet_bell_type:
      name: Tipo de sino do clarinete contrabaixo
      description: Configuração da campânula utilizada no clarinete contrabaixo.
    contra_bass_clarinet_bore_type:
      name: Tipo de diâmetro interno do clarinete contrabaixo
      description: Desenho do furo do instrumento.
    contra_bass_clarinet_lowest_written_note:
      name: Nota mais grave escrita para clarinete contrabaixo
      description: A nota escrita mais grave que o instrumento consegue tocar (em
        geral, depende da extensão do Dó grave em comparação com a extensão do Mi
        bemol grave).
    control_arm_bushing_material:
      name: Material da bucha do braço de controle
      description: Especifica o material das buchas incluídas/instaladas, se houver.
    control_arm_bushings_included:
      name: Buchas do braço de controle incluídas
      description: Indica se o braço de controle está com as buchas instaladas.
    control_arm_finish:
      name: Acabamento do braço de controle
      description: Especifica o acabamento protetor aplicado ao braço de controle
        (proteção contra corrosão e aparência).
    control_arm_grease_fitting_type:
      name: Tipo de graxeira do braço de controle
      description: Especifica se o conjunto do braço de controle/junta esférica inclui
        uma graxeira/bico de lubrificação (zerk) e se este pode ser reparado.
    control_arm_material:
      name: Material do braço de controle
      description: Especifica o material principal e o processo de fabricação do corpo
        do braço de controle.
    control_arm_position:
      name: Posição do braço de controle
      description: Especifica a posição da suspensão para a qual o braço de controle
        foi projetado dentro do contexto do canto/lado do eixo (por exemplo, superior/inferior,
        dianteiro/traseiro, esquerdo/direito).
    control_arm_style:
      name: Estilo do braço de controle
      description: Identifica o estilo geométrico/de design do braço de controle utilizado
        no layout da suspensão.
    control_cable_connector_type:
      name: Tipo de conector do cabo de controle
      description: Especifica o tipo de terminal/conector usado pelos cabos de controle
        para interfacear com o controle e o motor (por exemplo, terminais específicos
        do fabricante original).
    control_voltage_or_gate_connectivity:
      name: Conectividade de tensão de controle ou gate
      description: Especifica o suporte para conexão de tensão de controle/gate para
        integração com equipamentos modulares/analógicos.
    controller_function:
      name: Função do controlador
      description: Define a função principal da placa de controle da esteira, como
        controle do motor, fonte de alimentação ou inversor de frequência.
    controller_type:
      name: Tipo de controlador
      description: Especifica o controlador/sistema de controle do motor incluído
        no kit de conversão para veículos elétricos da scooter (ou necessário para
        uso), com foco nas características do controlador relevantes para compatibilidade
        e desempenho.
    conversion_kit_cooling_method:
      name: Método de resfriamento do kit de conversão
      description: Abordagem principal de gerenciamento térmico utilizada para a integração
        do motor/inversor/bateria.
    conversion_kit_installation_complexity:
      name: Complexidade de instalação do kit de conversão
      description: Nível de esforço de instalação previsto com base nas habilidades/ferramentas
        típicas necessárias ao cliente.
    converted_bed_size:
      name: Tamanho da cama convertida
      description: Indica o tamanho ou a configuração da cama em que o berço será
        convertido quando este kit for instalado.
    convertible_configuration:
      name: Configuração conversível
      description: 'Indica quantas configurações diferentes de cama o produto pode
        assumir (ex.: berço 3 em 1 → cama infantil → sofá-cama).'
    convertible_high_chair_modes:
      name: Modos de uso de cadeira alta conversível
      description: Especifica as configurações de assento em que a cadeira pode ser
        convertida.
    cookie_decorating_kit_items_included:
      name: Itens incluídos com o kit de decoração de biscoitos
      description: 'Lista os componentes de decoração individuais inclusos, para que
        os clientes saibam exatamente quais suprimentos estão na caixa (ex: tubos
        de glacê, confeitos, cortadores de biscoito).'
    cookie_variety:
      name: Variedade de biscoito
      description: Identifica o estilo ou a variedade específica de biscoito, ajudando
        os compradores a encontrar de forma rápida o tipo de preferência.
    cooking_state:
      name: Estado de cozimento
      description: Indica o nível de preparo do produto de frango no momento da venda
        (cru, totalmente cozido, marinado etc.).
    coolant_additive_purpose:
      name: Finalidade do aditivo para líquido de arrefecimento
      description: Principais funções pretendidas do aditivo para líquido de arrefecimento
        (não se trata de um produto de limpeza para radiadores ou de um selante específico).
    coolant_base_fluid:
      name: Fluido base do líquido de arrefecimento
      description: Identifica a base glicólica primária utilizada na formulação do
        anticongelante/líquido de arrefecimento.
    coolant_outlet_connection_style:
      name: Estilo de conexão da saída do líquido de arrefecimento
      description: Tipo de interface de conexão de saída usada para conectar uma mangueira
        do radiador ou um tubo de líquido de arrefecimento.
    coolant_outlet_neck_angle:
      name: Ângulo do bocal de saída do líquido de arrefecimento
      description: O ângulo/orientação da saída do bocal de água em relação ao flange
        de montagem/motor (útil para o direcionamento da mangueira superior do radiador).
    coolant_technology:
      name: Tecnologia do líquido de arrefecimento
      description: Especifica a família de tecnologia/química do líquido de arrefecimento
        utilizada pelo anticongelante/líquido de arrefecimento (conforme comumente
        indicado no rótulo da embalagem).
    coolant_temperature_sensor_port:
      name: Tipo de base do sensor de temperatura do líquido de arrefecimento
      description: Indica se o bocal de água inclui uma entrada para sensor ou interruptor
        de temperatura do líquido de arrefecimento e qual interface ele utiliza.
    coolant_temperature_sensor_seal_type:
      name: Tipo de vedação do sensor de temperatura do líquido de arrefecimento
      description: Tipo de método de vedação utilizado entre o sensor e o motor/passagem
        do líquido de arrefecimento.
    cooling_system_component_included:
      name: Componente do sistema de arrefecimento incluído
      description: Lista os componentes adicionais do sistema de arrefecimento incluídos
        com a bomba de água.
    cooling_system_flush_application_step:
      name: Etapa da aplicação da limpeza do sistema de arrefecimento
      description: 'Indica a etapa em que o produto se aplica no processo de manutenção
        (ex: limpador pré-lavagem vs. enxágue final/neutralizador).'
    cooling_system_type:
      name: Tipo de sistema de arrefecimento
      description: 'Especifica a configuração do sistema de arrefecimento utilizada
        por um motor de centro marítimo (ex: água bruta/circuito aberto, circuito
        fechado/água doce com trocador de calor, refrigeração por quilha).'
    cord_material:
      name: Material do cabo
      description: Especifica o material do cordão/fio usado para puxar o lenço de
        limpeza pelo interior do saxofone.
    core_type_bass_strings:
      name: Tipo de núcleo (cordas de baixo)
      description: Especifica a forma principal da corda, que influencia a sensação
        e a flexibilidade.
    cork_grease_base_material:
      name: Material de base da graxa para cortiça
      description: 'Base primária da formulação da graxa para cortiça (ex.: à base
        de lanolina).'
    cork_grease_form:
      name: Forma da graxa para cortiça
      description: O formato físico do produto de graxa de cortiça.
    corn_presentation:
      name: Apresentação do milho
      description: Especifica a apresentação física ou forma do produto de milho (por
        exemplo, inteiro com casca, grãos, em pó).
    corn_syrup_variety:
      name: Variedade de xarope de milho
      description: Especifica o estilo ou a variante de processamento específica do
        xarope.
    corn_variety:
      name: Variedade de milho
      description: Identifica a variedade botânica ou de mercado específica do milho
        que está sendo vendido. Isso permite aos compradores distinguir entre os tipos
        que diferem em sabor, textura, cor e uso culinário.
    corner_compatibility:
      name: Compatibilidade de canto
      description: Especifica a forma dos cantos da mesa (quadrados ou redondos) para
        os quais a capa foi projetada.
    corner_flag_features:
      name: Bandeirinhas de escanteio
      description: Destaca as características funcionais especiais ou melhorias das
        bandeirinhas de escanteio (por exemplo, mastro dobrável, material refletor).
    cornet_mouthpiece_shank_type:
      name: Tipo de haste do bocal de cornetim
      description: Especifica o padrão de encaixe/haste do bocal compatível com o
        cornetim.
    cornhole_league_certification:
      name: Certificação da liga de cornhole
      description: Indica as certificações ou aprovações oficiais de ligas que o produto
        possui.
    corrosion_resistance:
      name: Resistência à corrosão
      description: Especifica o tratamento ou classificação de resistência à corrosão
        do suporte/fixador para exposição ao ar livre.
    corrosion_resistance_level:
      name: Nível de resistência à corrosão
      description: Indica proteção contra corrosão adequada para ambientes de água
        doce/salgada.
    costume_components_included:
      name: Componentes da fantasia incluídos
      description: Lista as peças de vestuário e acessórios incluídos no traje, esclarecendo
        o que faz parte do conjunto.
    cotton_weave_type:
      name: Tipo de tecido de algodão
      description: Descreve a construção da trama/malha da superfície de algodão imprimível
        que afeta a textura e a nitidez da impressão.
    counter_type:
      name: Tipo de contador
      description: Indica a presença e o estilo de repetição integrada ou rastreamento
        de força.
    counterweight_fill_material:
      name: Material de enchimento do contrapeso
      description: Indica a substância que pode ser usada para adicionar lastro ou
        pré-encher o contrapeso.
    counterweight_type:
      name: Tipo de contrapeso
      description: Especifica o estilo de projeto ou construção do contrapeso, como
        saco de areia ou placa de aço, para auxiliar na compatibilidade e instalação.
    coupler_system:
      name: Sistema de acoplamento
      description: Tipo/sistema de engate instalado na locomotiva miniatura para compatibilidade
        com os vagões.
    court_surface_suitability:
      name: Adequação da superfície da quadra
      description: Indica o tipo de superfície da quadra de basquete para a qual o
        solado do tênis foi projetado. Isso ajuda os compradores a escolher a tração
        e a durabilidade adequadas para quadras de madeira internas, asfalto/concreto
        externas ou ambas.
    cover_fit_style:
      name: Estilo de encaixe da capa/cobertura
      description: Descreve como a capa se encaixa na mesa, afetando a aparência e
        o nível de proteção.
    cover_fit_type:
      name: Tipo de ajuste da capa
      description: Indica se a capa é sob medida (personalizada/semipersonalizada)
        ou universal, e se é destinada a fundeio em água ou para uso em armazenamento/reboque.
    cowbell_beater_type:
      name: Tipo de batedor de campana
      description: Tipo de instrumento de percussão recomendado para o som/acabamento
        da campana (se especificado pelo produto).
    cowbell_mounting_method:
      name: Método de montagem do sino
      description: Indica como a campana deve ser montada/usada (manual ou montada
        em equipamentos).
    cowbell_sound_character:
      name: Característica sonora do sino
      description: Caráter tonal geral utilizado na listagem (apoia a descoberta além
        do tamanho).
    cradle_capacity:
      name: Capacidade do berço
      description: Indica se o berço foi projetado para acomodar um único bebê ou
        gêmeos.
    craft_cutter_embosser_machine_operation:
      name: Operação de máquina de corte/relevo artesanal
      description: Especifica como a cortadora/gravadora opera a partir da perspectiva
        do fluxo de trabalho do usuário (por exemplo, manivela manual, botão elétrico,
        controlada por app ).
    craft_decoration_maker_accessories_included:
      name: Acessórios incluídos com o aparelho para decoração artesanal
      description: Enumera os principais acessórios incluídos no aparelho de decoração
        artesanal (por exemplo, fita/filme inicial, recargas de adesivos, cartuchos
        de glitter, ferramentas de limpeza).
    craft_foil_application_method:
      name: Método de aplicação de foil artesanal
      description: Identifica como o foil artesanal deve ser aplicado/ativado (adesivo,
        calor, toner/reativo etc.).
    craft_foil_format:
      name: Formato do foil artesanal
      description: 'Indica o formato físico do foil artesanal conforme vendido (ex.:
        rolo ou folhas).'
    craft_glue_finish:
      name: Acabamento da cola para artesanato
      description: Descreve a aparência da cola após a secagem (por exemplo, transparente,
        branca/opaca, translúcida, brilhante/fosca).
    craft_magnet_application:
      name: Aplicação do ímã para artesanato
      description: Principal aplicação pretendida para o produto magnético ou superfície
        de fixação.
    craft_magnet_holding_strength_level:
      name: Nível de força de retenção do ímã para artesanato
      description: Categoria de força relativa dos ímãs de artesanato para ajudar
        os compradores a escolher a força de fixação adequada para seu projeto.
    craft_organizer_storage_features:
      name: Características de armazenamento do organizador para artesanato
      description: Descreve as características de organização e os elementos de armazenamento
        interno dos organizadores para artesanato (por exemplo, divisórias ajustáveis,
        gavetas, bolsos transparentes).
    craft_scoring_board_included_accessories:
      name: Acessórios incluídos na prancheta de marcação para artesanato
      description: Acessórios incluídos com a placa de marcação (por exemplo, caneta
        de marcação/dobrador de papel, triângulo, ferramenta para envelopes).
    craft_scoring_board_measurement_system:
      name: Sistema de medição de prancheta de marcação para artesanato
      description: Especifica o sistema de medidas marcado na régua de marcação (imperial,
        métrico, dual ou sem marcação).
    craft_wire_finish_coating:
      name: Acabamento/revestimento de arame para artesanato
      description: Especifica o acabamento superficial ou revestimento aplicado ao
        fio para fins de cor, resistência à oxidação ou proteção.
    craft_wood_surface_preparation:
      name: Preparação da superfície de madeira para artesanato
      description: Indica se a superfície da madeira está pronta para acabamento/pintura
        ou se necessita de preparação (por exemplo, lixamento/aplicação de primário).
    crank_spindle_interface:
      name: Interface do eixo do virabrequim
      description: Especifica o sistema de eixo do virabrequim compatível com o suporte
        do pedaleiro (por exemplo, SRAM DUB, Square Taper), garantindo a compatibilidade
        entre o conjunto de virabrequins e o suporte do pedaleiro.
    crankshaft_balance_type:
      name: Tipo de equilíbrio do virabrequim
      description: Indica se o virabrequim é balanceado internamente (neutro) ou balanceado
        externamente (requer contrapesos no balanceador harmônico/volante).
    crankshaft_bolt_pattern:
      name: Padrão de parafusos do virabrequim
      description: Padrão de furação na flange traseira para fixação do volante/placa
        flexível.
    crankshaft_sensor_reluctor_type:
      name: Tipo de relutor do sensor virabrequim
      description: Configuração do sensor de posição da cambota/roda relutora utilizada
        (quando aplicável).
    craps_accessories_included:
      name: Acessórios do jogo de dados incluídos
      description: Identifica acessórios adicionais específicos para jogos de dados
        incluídos além dos dados/fichas/layout.
    crash_cymbal_profile:
      name: Perfil do címbalo de ataque
      description: Curvatura geral/perfil do címbalo (o grau de curvatura), que influencia
        o tom e a resposta.
    crash_cymbal_sound_character:
      name: Características sonoras do címbalo de ataque
      description: Principais descritores do caráter tonal do som do címbalo de ataque.
    crash_pad_size_class:
      name: Classe de tamanho do colchão de proteção
      description: Indica a categoria geral de tamanho de um colchão de proteção para
        escalada, permitindo que os compradores tenham uma ideia rápida da área coberta
        sem precisar das dimensões exatas.
    crate_engine_assembly_level:
      name: Nível de montagem do motor em caixa
      description: O grau de completude do motor em caixa no momento do envio (quais
        componentes principais estão incluídos).
    cream_base_ingredient:
      name: Ingrediente base do creme
      description: Identifica a principal fonte do creme, abrangendo tanto produtos
        lácteos quanto alternativas de origem vegetal.
    cream_cheese_base:
      name: Base do cream cheese
      description: Identifica a principal fonte láctea ou vegetal utilizada na fabricação
        do cream cheese, auxiliando os compradores em considerações dietéticas, de
        alergias e de sabor.
    cream_cheese_form:
      name: Forma de cream cheese
      description: Descreve a forma física ou a textura do cream cheese (por exemplo,
        em bloco, batido, para molho), o que influencia a capacidade de ser espalhado
        e o uso pretendido.
    cream_variety:
      name: Variedade de creme
      description: Identifica o tipo específico de creme com base no teor de gordura,
        no método de processamento ou na finalidade culinária (por exemplo, creme
        meio a meio, creme de leite, creme para cozinhar).
    crib_accessory_features:
      name: Características dos acessórios de berço
      description: Lista as características funcionais ou voltadas para o conforto
        específicas de acessórios para berços e camas infantis, como respirabilidade
        ou bordas elásticas.
    crib_bumper_features:
      name: Características do protetor de berço
      description: Destaca as características funcionais específicas de um protetor
        de berço.
    crib_conversion_kit_components:
      name: Componentes do kit de conversão para berço
      description: Lista as principais peças incluídas no kit para que os compradores
        possam verificar se têm tudo o que é necessário para a instalação.
    cricket_ball_grade:
      name: Qualidade da bola de críquete
      description: Especifica o nível de qualidade ou o padrão de jogo pretendido
        para a bola.
    cricket_ball_piece_construction:
      name: Construção de peças da bola de críquete
      description: Indica o número de peças externas ou seções moldadas usadas para
        construir a carcaça da bola, o que é um indicador-chave de qualidade e preço.
    cricket_ball_type:
      name: Tipo de bola de críquete
      description: Especifica o tipo de bola de críquete fornecido com o produto ou
        indica se nenhuma bola está incluída.
    cricket_bat_accessory_type:
      name: Tipo de acessório para taco de críquete
      description: Especifica o tipo de acessório ou item de manutenção para taco
        de críquete, para que os compradores possam filtrar de forma rápida o produto
        que precisam.
    cricket_bat_size:
      name: Tamanho do taco de críquete
      description: Indica a classificação padronizada do tamanho do taco de críquete
        (0–6, Harrow, SH, LH), normalmente escolhida com base na idade e na altura
        do jogador.
    cricket_bat_size_compatibility:
      name: Compatibilidade de tamanho do taco de críquete
      description: Indica o tamanho do taco para o qual o acessório foi projetado,
        garantindo a compatibilidade adequada.
    cricket_helmet_role:
      name: Função do capacete de críquete
      description: Indica a função para a qual o capacete foi projetado, como rebatedor
        ou goleiro.
    cricket_leg_guard_type:
      name: Tipo de caneleira de críquete
      description: Indica o estilo específico de proteção para as pernas usada no
        críquete.
    cricket_player_role:
      name: Função do jogador de críquete
      description: Especifica a função principal para a qual o calçado foi projetado.
    cricket_protection_grade:
      name: Grau de proteção para críquete
      description: Especifica a classificação do grau de proteção atribuída pelo fabricante
        do equipamento de críquete.
    cricket_stump_base_type:
      name: Tipo de base do poste de críquete
      description: Indica o estilo ou material base fornecido com os tocos, o que
        afeta a estabilidade e a adequação da superfície de jogo.
    cricket_stump_target_features:
      name: Características do alvo em forma de estaca do críquete
      description: Destaca as características funcionais distintas que melhoram a
        usabilidade, a visibilidade, a durabilidade ou a estabilidade do treinamento.
    cricket_stump_type:
      name: Tipo de alvo em forma de estaca do críquete
      description: Classifica o estilo ou a construção das estacas para ajudar os
        compradores a escolher entre estacas tradicionais para partidas, variantes
        de treino ou modelos modernos iluminados.
    cricket_training_focus:
      name: Foco de treinamento de críquete
      description: Habilidade ou disciplina fundamental do críquete que o material
        foi concebido para aprimorar.
    croquet_set_components_included:
      name: Componentes incluídos no conjunto de críquete
      description: Lista todos os componentes principais fornecidos com o conjunto
        (por exemplo, wickets, estacas, bolsa de transporte) para que os clientes
        entendam exatamente o que estão comprando.
    cross_country_binding_system:
      name: Sistema de fixação para esqui cross-country
      description: Especifica o padrão de fixação de esqui cross-country para o qual
        o produto foi perfurado ou com o qual é compatível.
    cross_stitch_chart_symbol_type:
      name: Tipo de símbolo do gráfico de ponto cruz
      description: Como o gráfico é representado (símbolos, cores ou ambos).
    cross_stitch_finishing_type:
      name: Tipo de acabamento de ponto cruz
      description: Tipo de acabamento/exibição pretendido para o projeto bordado.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mecanismo de fixação do tecido na moldura para ponto cruz
      description: Indica como o tecido é fixado/tensionado na moldura (por exemplo,
        clipes, grampos, tachas), o que influencia a facilidade de uso e a compatibilidade
        do tecido.
    cross_stitch_frame_included_components:
      name: Componentes incluídos com a moldura de ponto cruz
      description: Indica o que vem na embalagem (por exemplo, apenas a moldura ou
        a moldura + grampos + suporte), reduzindo ambiguidades e devoluções.
    cross_stitch_frame_type:
      name: Tipo de moldura para ponto cruz
      description: Especifica a construção/tipo da moldura de ponto cruz (como o tecido
        é segurado), o que afeta a usabilidade e a compatibilidade do projeto.
    cross_stitch_pattern_technique:
      name: Técnica de ponto cruz
      description: A técnica/estilo de ponto cruz exigido pelo gráfico.
    crossbar_shape_profile:
      name: Formato/perfil da barra transversal
      description: Especifica a forma aerodinâmica/de perfil da barra transversal.
    crossbar_style:
      name: Estilo da barra transversal
      description: Identifica o estilo de construção da barra transversal, distinguindo
        as barras rígidas de competição das barras flexíveis ou híbridas de treino.
    crossbow_type:
      name: Tipo de besta
      description: Identifica o estilo de design fundamental da besta, como composta,
        recurva ou pistola. O estilo de construção influencia o desempenho, o tamanho
        e os casos de uso, por isso os compradores costumam filtrar os produtos por
        esse critério.
    crossover_component_type:
      name: Tipo de componente de crossover
      description: Identifica a topologia do componente principal utilizada na rede
        de crossover passivo.
    crossover_configuration:
      name: Configuração de crossover
      description: Indica se o crossover utiliza um único ponto de cruzamento ou vários
        pontos (por exemplo, projetos de 2 vias vs. projetos de 3 vias).
    crossover_type:
      name: Tipo de crossover
      description: Tipo de rede de crossover incluída no conjunto de componentes.
    crown_profile:
      name: Perfil da coroa
      description: Especifica a altura/perfil da coroa do boné acima da aba.
    crown_style:
      name: Estilo de coroa
      description: Define a silhueta ou o perfil geral da coroa de um chapéu coco.
    crust_taste_profile:
      name: Perfil de sabor da crosta
      description: Indica se o sabor inerente da crosta é doce, salgado ou neutro.
    crystal_finish:
      name: Acabamento do cristal
      description: 'Descreve o acabamento superficial, revestimento ou estado de processamento
        do cristal solto (ex: bruto, polido, rolado, lapidado/facetado, fosco, revestido
        de aura, tingido, tratado termicamente).'
    crystal_material:
      name: Material do cristal
      description: Especifica o material utilizado no cristal do relógio que protege
        o mostrador.
    crystalline_finish_style:
      name: Estilo do acabamento cristalino
      description: O aspecto característico cristalino/plumoso produzido pela cera
        de palma em velas prontas.
    cucumber_variety:
      name: Variedade de pepino
      description: 'Especifica a cultivar ou variedade de mercado do pepino (ex.:
        inglês, persa, Kirby).'
    cue_compatibility:
      name: Compatibilidade do taco
      description: Indica a configuração da junta do taco que o estojo foi projetado
        para acomodar, como tacos de uma peça ou tacos com junta de 3/4.
    cue_construction:
      name: Construção do taco
      description: Indica como o taco é construído (número de peças ou se é um componente
        parcial, como apenas a base ou a haste). Isso afeta a portabilidade e a compatibilidade.
    cue_head_material:
      name: Material da cabeça do taco
      description: Identifica o material da cabeça/ponta do taco (a parte que entra
        em contato com o disco), o que afeta a durabilidade e a proteção da superfície.
    cue_sport_compatibility:
      name: Compatibilidade com o esporte de bilhar
      description: Identifica para qual modalidade de bilhar o acessório foi projetado.
    cue_thread_size:
      name: Tamanho da rosca do taco
      description: Apresenta a especificação da rosca usada em extensões, protetores
        de juntas, parafusos de peso e outros acessórios de taco para garantir o encaixe
        adequado.
    cue_tip_hardness:
      name: Dureza da ponta do taco
      description: Avalia a firmeza da ponta do taco, que influencia o controle e
        o feedback da bola branca.
    cuff_height:
      name: Altura do cano
      description: Indica a altura do cano da bota (baixo, médio, alto, removível/ajustável),
        o que afeta o suporte e a flexibilidade.
    cuff_position:
      name: Posição da tornozeleira
      description: Indica em qual parte do corpo do praticante a tornozeleira da guia/leash
        foi projetada para ser fixada.
    cultivation_method:
      name: Método de cultivo
      description: Especifica como as verduras foram cultivadas, abrangendo técnicas
        de cultivo e práticas agrícolas.
    cup_type:
      name: Tipo de concavidade
      description: Indica o perfil de superfície do lantejoula/paetê (plano vs. côncavo)
        e a profundidade da concavidade. Isso pode afetar o brilho, a textura e o
        caimento da peça ao ser costurada ou colada.
    cupcake_size:
      name: Tamanho do cupcake
      description: 'Especifica a categoria de tamanho físico dos cupcakes vendidos
        (ex.: mini, padrão, jumbo).'
    curd_size:
      name: Tamanho dos grãos coalhados
      description: Especifica o tamanho ou a textura dos grãos do queijo cottage.
    cure_method:
      name: Método de cura
      description: Descreve o processo necessário para que o adesivo endureça ou cure
        (por exemplo, luz UV, umidade do ar, calor).
    curing_or_preparation_method:
      name: Método de cura ou preparação
      description: Especifica como as azeitonas foram curadas/curtidas ou preparadas
        de outra forma (por exemplo, curadas em salmoura, curadas em azeite, grelhadas).
    curling_broom_head_material:
      name: Material da cabeça de vassoura de curling
      description: Identifica a composição principal do material da cabeça ou almofada
        da vassoura.
    curling_broom_head_type:
      name: Tipo de cabeça para vassoura de curling
      description: Especifica o estilo ou a construção da cabeça/almofada de varredura.
    curling_shoe_slider_material:
      name: Material do slider (deslizador) do tênis de curling
      description: Identifica o material principal da sola deslizante usada em sapatos
        de curling.
    curling_training_aid_type:
      name: Tipo de auxílio para treinamento de curling
      description: Identifica o tipo de acessório de treino de curling.
    curry_variety:
      name: Variedade de curry
      description: Classifica os molhos de curry de acordo com o estilo ou a receita
        específica de curry a que são destinados a criar, como Tikka Masala, Massaman
        ou Thai Verde. Isso permite uma filtragem precisa por sabor/estilo.
    cushion_rubber_profile:
      name: Perfil de borracha de amortecimento
      description: Código de forma ou perfil das peças de borracha de amortecimento
        dos trilhos.
    cushioning_level:
      name: Nível de amortecimento
      description: Indica a quantidade de material sob os pés que a meia oferece para
        proporcionar conforto e proteção contra impacto.
    custom_label_content_type:
      name: Tipo de conteúdo da etiqueta personalizada
      description: Especifica quais informações serão personalizadas na etiqueta costurada
        (por exemplo, nome, logo, mensagem, tamanho, símbolos de cuidados, informações
        de contato).
    customization_type:
      name: Tipo de personalização
      description: Especifica se a camisa é lisa, oficial de jogador ou personalizada
        com nome/número.
    cut_or_preparation_style:
      name: Corte ou estilo de preparação
      description: Especifica como os pedaços de vegetais são cortados ou preparados
        dentro da lata ou do frasco (por exemplo, inteiros, em cubos, em tiras).
    cut_resistance_rating:
      name: Classificação de resistência ao corte
      description: Especifica o nível de resistência ao corte do item, comprovado
        formalmente por testes.
    cut_type:
      name: Tipo de corte
      description: Indica se o tecido é vendido por jarda/metro, pré-cortado ou em
        rolo.
    cutting_application:
      name: Aplicação de corte
      description: Caso de uso principal de corte pretendido para a tesoura.
    cutting_mat_grid_style:
      name: Estilo de grade da base de corte
      description: O estilo de guia impresso na superfície da base.
    cutting_mat_intended_use:
      name: Uso pretendido da base de corte
      description: O caso de uso principal de superfície de trabalho/artesanato para
        o qual a base de corte foi projetada.
    cv_boot_clamp_type:
      name: Tipo de abraçadeira da coifa da homocinética
      description: Especifica o estilo da abraçadeira/fita utilizado para fixar a
        coifa da homocinética.
    cv_boot_kit_contents:
      name: Conteúdo do kit da coifa da junta homocinética
      description: 'Lista o que está incluído com a coifa da junta homocinética (ex.:
        braçadeiras, sachê de graxa, anéis de retenção).'
    cv_boot_material:
      name: Material da coifa da junta homocinética
      description: Especifica o material de construção principal da coifa da junta
        homocinética.
    cv_boot_position:
      name: Posição da coifa da junta homocinética
      description: Especifica se a coifa da junta homocinética se encaixa na posição
        interna (de dentro) ou externa (de fora) da junta homocinética no eixo.
    cycling_apparel_fit:
      name: Ajuste de vestuário de ciclismo
      description: 'Descreve o corte da peça, indicando o nível de ajuste e a aerodinâmica
        pretendidos (ex.: para corrida/competição, casual).'
    cylinder_head_assembly:
      name: Conjunto do cabeçote do cilindro
      description: Especifica o nível de completude do cabeçote do cilindro conforme
        vendido (por exemplo, totalmente montado com componentes do trem de válvulas
        instalados vs. peça fundida nua/desmontada).
    cylinder_head_material_grade:
      name: Grau do material do cabeçote do cilindro
      description: Especifica o material e a classe utilizados na fundição do cabeçote
        do cilindro.
    cylinder_head_position:
      name: Posição do cabeçote do cilindro
      description: 'Identifica em qual bancada/lado ou orientação o cabeçote do cilindro
        se encaixa em motores com várias bancadas (ex: lado esquerdo/direito ou bancada
        1/bancada 2).'
    cymbal_alloy:
      name: Liga do címbalo/prato
      description: Liga/composição dos címbalos/pratos no kit.
    cymbal_application:
      name: Aplicação do címbalo/prato
      description: Aplicação principal para a qual o címbalo foi projetado ou comercializado.
    cymbal_arm_mounting_interface:
      name: Interface de montagem do braço do címbalo/prato
      description: 'Especifica como o braço do címbalo/prato se conecta ao resto dos
        equipamentos da bateria (ex.: grampo, prateleira, receptor do suporte).'
    cymbal_arm_rotation_positioning_features:
      name: Recursos de rotação/posicionamento do braço do címbalo/prato
      description: Especifica as características de posicionamento que afetam a forma
        como o braço pode ser inclinado/girado e travado.
    cymbal_arm_style:
      name: Estilo do braço do címbalo/prato
      description: Especifica se o braço do címbalo/prato é reto ou articulado, para
        preferências de alcance e posicionamento.
    cymbal_drum_case_wheel_configuration:
      name: Configuração de rodas do estojo de bateria e címbalos/pratos
      description: Indica se o estojo possui rodas e (se aplicável) a configuração
        das rodas para transporte rolante.
    cymbal_hammering_style:
      name: Estilo de martelamento do címbalo/prato
      description: Processo de martelagem/aparência, o que afeta a complexidade e
        a sensação.
    cymbal_kit_components_included:
      name: Componentes incluídos no kit de címbalo
      description: Especifica quais tipos de címbalo/prato estão incluídos no kit/pacote
        (além do próprio prato de condução).
    cymbal_kit_items_included:
      name: Itens incluídos no kit de címbalo
      description: Identifica quais pratos estão incluídos no kit/pacote (por tipo
        de prato).
    cymbal_lathing:
      name: Torneamento do címbalo/prato
      description: Especifica se/quanto da superfície do címbalo/prato é torneada
        (ranhurada) em comparação com a superfície não torneada/bruta.
    cymbal_playing_style_genre:
      name: Estilo/gênero de execução do címbalo/prato
      description: Identifica o contexto típico de performance para o qual os címbalos/pratos
        são projetados (por exemplo, pratos para dança do ventre vs. pratos de mão
        para marcha/orquestra).
    cymbal_set_configuration:
      name: Configuração do conjunto de címbalos/pratos
      description: Indica se o produto é vendido como címbalo/prato único, par combinado
        ou conjunto de vários pares (por exemplo, para instrução em grupo).
    cymbal_sound_character:
      name: Característica sonora do címbalo
      description: 'Descreve o perfil tonal/timbre geral do címbalo/prato, usado para
        a descoberta (ex.: brilhante vs. escuro).'
    cymbal_sustain:
      name: Sustentação do címbalo/prato
      description: Indica por quanto tempo o címbalo/prato ressoa após ser tocado.
    cymbal_type:
      name: Tipo de címbalo
      description: Especifica a função do címbalo que o pad de címbalo eletrônico
        se destina a emular.
    cymbal_volume_level:
      name: Nível de volume do címbalo
      description: Categoria de volume/saída sonora percebida do címbalo.
    cymbal_weight_class:
      name: Classe de peso do címbalo
      description: Indica a classe de peso do címbalo, que afeta o timbre, o volume
        e a resposta.
    dairy_heat_treatment:
      name: Tratamento térmico de laticínios.
      description: Identifica o nível de processamento ou pasteurização aplicado ao
        creme (por exemplo, cru, pasteurizado, UHT), o que afeta a vida útil na prateleira,
        o sabor e o desempenho ao bater.
    damage_type:
      name: Tipo de dano
      description: Especifica os tipos de danos no para-brisa que o kit se destina
        a reparar.
    damper_pedal_style:
      name: Estilo de pedal amortecedor
      description: Descreve o estilo físico do pedal de sustentação usado em teclados/pianos
        digitais.
    damping_adjustability:
      name: Ajuste de amortecimento
      description: Indica quais parâmetros de amortecimento e/ou altura do veículo
        são ajustáveis no amortecedor.
    damping_level:
      name: Nível de amortecimento
      description: Indica a quantidade relativa de redução de volume e sustentação
        que o abafador proporciona.
    dance_occasion:
      name: Ocasião de dança
      description: Indica o uso pretendido da peça de roupa no contexto da prática
        ou apresentação de dança.
    darbuka_accessories_included:
      name: Acessórios de darbuka incluídos
      description: Lista os acessórios comuns que acompanham a darbuka.
    darbuka_body_finish_type:
      name: Tipo de acabamento do corpo da darbuka
      description: Descreve o acabamento exterior, revestimento ou tratamento decorativo
        do corpo da darbuka.
    darbuka_head_material:
      name: Material da pele da darbuka
      description: Especifica o material da membrana da pele de uma darbuka.
    dart_barrel_material:
      name: Material do corpo do dardo
      description: Especifica o material principal do corpo do dardo, o que afeta
        a distribuição de peso, a durabilidade e o preço.
    dart_shaft_design:
      name: Design da haste do dardo
      description: Classifica o projeto mecânico do eixo, por exemplo, se é fixo,
        giratório, telescópico ou se integra à hélice. Isso afeta o desempenho e o
        preço.
    dart_shaft_thread_type:
      name: Tipo de rosca da haste do dardo
      description: Indica o tamanho/tipo de rosca utilizado para aparafusar a haste
        no corpo do dardo, garantindo a compatibilidade entre hastes e corpos.
    dart_thread_size:
      name: Tamanho da rosca do dardo
      description: Especifica o tamanho/padrão de encaixe com o qual a peça é compatível,
        garantindo o encaixe entre eixos, pontas e cilindros.
    dart_tip_compatibility:
      name: Compatibilidade com pontas de dardos
      description: Indica se a parte do dardo é destinada a dardos com ponta de aço,
        ponta macia ou ambos os tipos.
    dart_tip_connection_type:
      name: Tipo de conexão da ponta do dardo
      description: Descreve a especificação ou sistema de montagem que a ponta utiliza
        para se fixar ao corpo ou à haste do dardo, garantindo a compatibilidade.
    dartboard_tournament_approval:
      name: Aprovação para torneio de dardos
      description: Indica se o alvo de dardos é oficialmente aprovado por federações
        ou ligas de dardos específicas.
    dartboard_type:
      name: Tipo de alvo de dardos
      description: Classifica o alvo de dardos de acordo com a tecnologia de construção
        e a compatibilidade com os dardos (por exemplo, de cerdas, eletrônicos, magnéticos).
    dash_cover_construction_type:
      name: Tipo de construção da cobertura do painel
      description: Descreve como a capa do painel é formada/estruturada (por exemplo,
        moldada vs. costurada), o que afeta a precisão do encaixe e a aparência.
    dash_cover_cutout_configuration:
      name: Configuração do recorte da cobertura do painel
      description: Indica para quais aberturas/sensores do painel de controle do fabricante
        original (OEM) a tampa foi pré-cortada ou moldada.
    dashboard_accessory_position:
      name: Posição do acessório do painel de controle
      description: Especifica onde, no painel de controle ou em suas proximidades,
        o acessório deve ser colocado ou montado.
    date_variety:
      name: Variedade de tâmara
      description: Especifica a cultivar/variedade das tâmaras (por exemplo, Medjool,
        Deglet Noor, Ajwa). A variedade influencia profundamente o sabor, o tamanho
        e a textura, sendo destacada na maioria dos títulos e descrições de produtos.
        Portanto, capturá-la melhora a filtragem e a descoberta.
    dayan_head_material:
      name: Material da cabeça do dayan
      description: Material da superfície de jogo (pudi), como couro natural ou sintético.
    dayan_strap_material:
      name: Material da tira do dayan
      description: Material das correias de tensão (baddhi) usadas para amarrar o
        dayan.
    dayan_syahi_type:
      name: Tipo de syahi para dayan
      description: Tipo de aplicação de syahi (pasta de afinação preta) na cabeça
        do dayan.
    decaffeination_method:
      name: Método de descafeinação
      description: Identifica o processo utilizado para remover a cafeína do café
        descafeinado.
    decal_installation_method:
      name: Método de instalação de decalques
      description: Indica como o decalque é aplicado na superfície do veículo (por
        exemplo, aplicação a seco, aplicação com água). Os detalhes das ferramentas/requisitos
        (por exemplo, fita de transferência ou pistola de ar quente) devem ser indicados
        nas instruções ou nos atributos das ferramentas, quando aplicável.
    decal_orientation:
      name: Orientação do decalque
      description: Indica se o decalque se destina à aplicação em vidro interno ou
        em superfície externa.
    decal_placement_type:
      name: Tipo de posicionamento do decalque
      description: Indica o local no veículo onde o decalque deve ser aplicado (por
        exemplo, painel da carroceria, para-choque, capô).
    decal_visibility_property:
      name: Propriedade de visibilidade do decalque
      description: Propriedades ópticas/de visibilidade de um decalque destinado a
        melhorar a visibilidade ou a resposta à luz (por exemplo, características
        refletoras, fluorescentes, luminescentes ou de transparência).
    deck_concave_level:
      name: Nível côncavo do shape
      description: Indica a profundidade ou intensidade da concavidade do shape (por
        exemplo, suave, média, profunda).
    deck_flex_rating:
      name: Classificação de flexibilidade do shape
      description: Avaliação qualitativa da flexibilidade/rigidez do shape.
    deck_material:
      name: Material do deck
      description: Identifica o principal material de construção do shape do skate.
    decoder_interface_socket_type:
      name: Interface do decodificador/tipo de soquete
      description: Tipo de interface do decodificador digital ou configuração do decodificador
        de bordo para o modelo da locomotiva.
    decoration_technique:
      name: Técnica de decoração
      description: Identifica o método principal usado para aplicar gráficos ou enfeites
        à camiseta.
    decorative_stamp_form_factor:
      name: Fator de forma do carimbo decorativo
      description: Identifica o formato físico do carimbo e como ele imprime um desenho
        (carimbo único, conjunto, rolo, fundo etc.).
    decorative_tape_application:
      name: Aplicação de fita decorativa
      description: O principal uso para o qual a fita decorativa foi projetada ou
        é comercializada.
    decorative_tape_format:
      name: Formato de fita decorativa
      description: Especifica como a fita decorativa é fornecida/embalada para uso.
    decoy_buoyancy:
      name: Flutuabilidade da isca
      description: Descreve como a isca se comporta na coluna d'água (flutuando, suspensa
        ou afundando).
    decoy_joint_type:
      name: Tipo de junta de isca
      description: Indica se o corpo da isca é sólido ou articulado, afetando o movimento
        de natação.
    decoy_motion_mechanism:
      name: Mecanismo de movimento da isca
      description: Descreve como, e se, a isca produz movimento ou perturbação na
        água para atrair o animal.
    decoy_posture:
      name: Postura da isca
      description: Indica a postura ou atividade representada pelo animal modelado
        pela isca (por exemplo, alimentando-se, em descanso, alerta).
    decoy_size_class:
      name: Classe de tamanho da isca
      description: Classifica a escala relativa da réplica em comparação com o animal
        real (por exemplo, padrão, magnum, grande).
    decoy_style:
      name: Estilo da isca
      description: Define o formato físico ou a classe de design da isca para ajudar
        os caçadores a escolherem a configuração correta.
    deli_meat_variety:
      name: Variedade de frios
      description: Classifica o tipo específico de frios (por exemplo, salame, mortadela,
        presunto, rosbife).
    delivery_form:
      name: Forma de entrega
      description: Forma de entrega física do limpador de injetores.
    denim_composition:
      name: Composição do jeans/denim
      description: Composição das fibras primárias do jeans (fibras de base, excluindo
        corantes/acabamentos).
    denim_finish:
      name: Acabamento do jeans/denim
      description: Acabamento de superfície/processamento aplicado ao tecido do jeans/denim.
    denim_intended_use:
      name: Uso pretendido do jeans/denim
      description: Projeto/uso típico para o qual o jeans é comercializado.
    denim_stretch_type:
      name: Tipo de elástico do jeans/denim
      description: Indica se o tecido jeans possui elasticidade mecânica, elastano/spandex
        adicionado ou nenhuma elasticidade.
    denim_wash:
      name: Lavagem do jeans/denim
      description: Indica a tonalidade ou o tratamento de lavagem aplicado ao tecido
        jeans/denim (por exemplo, claro, escuro, cru, ácido).
    derailleur_cage_length:
      name: Comprimento da gaiola do desviador/câmbio
      description: Indica o comprimento da gaiola do desviador/câmbio, que determina
        a capacidade da corrente (principalmente para desviadores traseiros).
    derailleur_mounting_style:
      name: Estilo de montagem do câmbio
      description: Especifica como o câmbio é fixado ao quadro ou gancho da bicicleta
        (por exemplo, braçadeira, montagem direta, UDH).
    derailleur_type:
      name: Tipo de câmbio
      description: Indica se o produto é um câmbio dianteiro ou traseiro.
    deshedder_tool_type:
      name: Tipo de ferramenta de remoção de pelos
      description: Classifica o estilo estrutural do da ferramenta de remoção pelos/escova
        de muda, para que os compradores possam escolher o método de escovação de
        preferência (por exemplo, lâmina, bloco, escova rotativa ou luva).
    diabolo_axle_system:
      name: Sistema de eixo do diabolô
      description: Especifica o sistema/configuração do eixo do diabolô, que afeta
        as manobras de deslize, a estabilidade e o desgaste do cordão.
    diagnostic_functions_supported:
      name: Funções de diagnóstico disponíveis
      description: Especifica as funções de diagnóstico/manutenção que o scanner pode
        executar.
    diagnostic_interface_type:
      name: Tipo de interface de diagnóstico
      description: 'Conexão/interface utilizada para comunicação com o veículo ou
        dispositivo (ex.: OBD-II, Bluetooth, Wi-Fi, USB).'
    diamond_color_grade:
      name: Classificação de cor do diamante
      description: Indica a classificação de cor para diamantes, de D (incolor) a
        Z (cor clara), ou denota diamantes de cor extravagante.
    diaper_cover_style:
      name: Estilo de capa de fralda
      description: Define a silhueta do design ou o estilo decorativo da capa de fralda
        para auxiliar na navegação e filtragem do produto com base no estilo.
    diastatic_power_unit:
      name: Unidade de potência diastática
      description: 'Especifica o sistema de unidades utilizado para informar o valor
        do potência diastática de um produto (ex.: °Lintner vs. Windisch-Kolbach).'
    diatonic_harmonica_tuning_system:
      name: Sistema de afinação da gaita diatônica
      description: Especifica o sistema de layout/disposição das notas utilizado pela
        gaita diatônica.
    dice_sides:
      name: Faces do dado
      description: 'Número de lados (faces) por dado para os dados incluídos no produto
        (ex.: d6, d20). Para conjuntos mistos, use o valor predominante ou liste-os
        como vários valores quando houver suporte para isso.'
    didgeridoo_construction_type:
      name: Tipo de construção do didgeridoo
      description: Como o didgeridoo é construído ou formado (abordagem de construção
        tradicional ou moderna).
    dietary_formulation_claim:
      name: Alegação de formulação dietária
      description: 'Destaca as principais características ou exclusões da formulação
        relevantes para a nutrição equina (ex.: sem grãos, baixo teor de amido, orgânico).'
    dinosaur_playset_scale_figure_size_class:
      name: Conjunto de dinossauros em escala/classe de tamanho dos bonecos
      description: Descreve a escala geral dos dinossauros/bonecos incluídos, para
        facilitar a compatibilidade com outros conjuntos.
    dinosaur_species_included:
      name: Espécies de dinossauros incluídas
      description: Identifica quais espécies de dinossauros estão representadas no
        conjunto (bonecos ou dinossauros moldados).
    dipsy_diver_size_designation:
      name: Designação de tamanho do Dipsy Diver
      description: Indica o código de tamanho do Dipsy de pesca definido pelo fabricante,
        que se correlaciona com o peso e a profundidade de mergulho.
    disc_brake_rotor_mount_type:
      name: Tipo de fixação do disco de freio
      description: 'Identifica como um rotor de freio a disco se fixa ao cubo (ex.:
        6 parafusos, Center Lock).'
    disc_lock_accessories_included:
      name: Acessórios para trava de disco incluídos
      description: Especifica os itens adicionais incluídos na embalagem de uma trava
        de disco para bicicleta, como um cabo de lembrete, bolsa de transporte, suporte
        de montagem ou baterias.
    disco_ball_mirror_tile_material:
      name: Material do ladrilho espelhado tipo bola de discoteca
      description: O material do bloco refletor na bola de discoteca/globo espelhado
        (se aplicável).
    disco_ball_mirror_tile_size:
      name: Tamanho do bloco de espelho da bola de discoteca
      description: Tamanho aproximado dos blocos/quadrados dos espelho individuais
        da bola de discoteca.
    display_backlight_color:
      name: Cor de luz de fundo do visor
      description: Luz de fundo/iluminação do visor/mostrador do medidor.
    disposable_compostable_claim:
      name: Declaração de produto descartável/compostável
      description: Indica se o produto é compostável, biodegradável, reciclável ou
        nenhum dos dois (se aplicável).
    distillation_method:
      name: Método de destilação
      description: Identifica o método de destilação ou o tipo de alambique utilizado
        para produzir a bebida.
    distilled_water_intended_use:
      name: Uso pretendido da água destilada
      description: 'Define a aplicação principal para a água destilada (ex.: beber,
        aparelho CPAP, umidificador, ferro a vapor).'
    distress_transmission_frequency:
      name: Frequência de transmissão de emergência
      description: Frequência/frequências de rádio principais utilizadas para alerta
        de emergência.
    distressing_level:
      name: Nível de desgaste
      description: Especifica a quantidade de desgaste intencional, rasgos ou desfiados
        aplicados ao tecido.
    distressing_style:
      name: Estilo de desgaste
      description: Indica o tipo ou nível de desgaste nas calças jeans, como rasgos
        ou amassados.
    distributor_advance_mechanism:
      name: Mecanismo de avanço do distribuidor
      description: Especifica o tipo de mecanismo de avanço da ignição utilizado pelo
        distribuidor.
    distributor_cap_terminal_type:
      name: Tipo de terminal da tampa do distribuidor
      description: Especifica o estilo dos terminais da tampa do distribuidor.
    distributor_gear_material:
      name: Material da engrenagem do distribuidor
      description: Especifica o material da engrenagem de acionamento do distribuidor.
    distributor_ignition_type:
      name: Tipo de ignição do distribuidor
      description: Especifica se o distribuidor é projetado para sistemas de platinado,
        ignição eletrônica ou do estilo HEI.
    distributor_kit_contents:
      name: Conteúdo do kit do distribuidor
      description: 'Indica quais componentes estão incluídos com o distribuidor (ex.:
        tampa, rotor, módulos de ignição, junta/anel de vedação, engrenagem de acionamento,
        fiação/conector).'
    dive_computer_form_factor:
      name: Fator de forma do computador de mergulho
      description: Especifica o design físico ou o método de montagem do computador
        de mergulho, como montagem em console ou estilo relógio.
    diving_mask_design:
      name: Design da máscara de mergulho
      description: Define o estilo estrutural geral da máscara de mergulho, o que
        influencia o ajuste, o campo de visão e o uso pretendido.
    divot_tool_prong_configuration:
      name: Configuração dos dentes do reparador de gramado
      description: Especifica o número e a disposição dos dentes da ferramenta de
        reparo de marcas no gramado que são usadas para consertar danos na grama.
    divot_tool_style:
      name: Estilo das ferramentas de reparo de gramado
      description: Define o estilo estrutural ou de implantação geral da ferramenta
        para reparar marcas de no gramado, como fixa, dobrável/tipo canivete, multifuncional
        ou acessórios que se prendem a um boné ou taco.
    djembe_shell_construction:
      name: Construção da concha do djembê
      description: Descreve o método de construção da estrutura/corpo do djembe.
    djembe_tuning_system:
      name: Sistema de afinação do djembê
      description: Especifica como o djembê é tensionado/afinado.
    dmx_output_connector_type:
      name: Tipo de conector de saída DMX
      description: Formato físico do conector usado para as portas de saída DMX do
        controlador.
    doctor_playset_items_included:
      name: Itens incluídos no conjunto de brinquedos de médico
      description: Especifica os instrumentos médicos de brinquedo e os acessórios
        para brincadeiras de faz de conta incluídos no conjunto de médico (por exemplo,
        estetoscópio, seringa, martelo de reflexos).
    doctor_playset_role_play_setting:
      name: Cenário de brincadeira do conjunto de médico
      description: Identifica o contexto lúdico principal que o conjunto de brinquedos
        de médico representa.
    doctor_playset_wearable_items_included:
      name: Acessórios incluídos com o conjunto de brinquedos de médico
      description: Indica os componentes de fantasia vestíveis incluídos no conjunto.
    doll_accessory_type:
      name: Tipo de acessório para boneca
      description: Define o tipo de acessório para boneca ou boneco de ação do produto
        (por exemplo, roupas, sapatos, móveis, expositores). Isso permite aos compradores
        navegar e filtrar a categoria de acessórios.
    doll_eye_type:
      name: Tipo de olho de boneca
      description: Especifica o estilo de construção dos olhos da boneca (por exemplo,
        acrílico embutido, pintado, com iluminação LED etc.).
    doll_hair_fiber_type:
      name: Tipo de fibra capilar da boneca
      description: Tipo de cabelo/fibra usado na boneca (ou nenhum), o que afeta o
        realismo, o penteado e os cuidados necessários.
    doll_making_kit_components_included:
      name: Componentes incluídos no kit para confecção de bonecas
      description: Lista os principais materiais e ferramentas incluídos no kit para
        fabricação de bonecas, para que os compradores possam comparar os itens e
        saber o que precisam providenciar por conta própria.
    dollhouse_installation_placement_type:
      name: Tipo de instalação/posicionamento da casa de bonecas
      description: Indica como a casa de bonecas deve ser usada ou posicionada (por
        exemplo, sobre a mesa, no chão ou fixada na parede).
    dollhouse_items_included:
      name: Itens incluídos com a casa de bonecas
      description: Identifica o conteúdo da caixa da casa de bonecas (móveis, bonecas,
        acessórios).
    dollhouse_lighting_type:
      name: Tipo de iluminação da casa de bonecas
      description: Tipo de iluminação incluída ou compatível com a casa de bonecas.
    dollhouse_room_type:
      name: Tipo de quarto da casa de bonecas
      description: Especifica o espaço/área dentro de uma casa de bonecas onde o acessório
        normalmente é usado.
    dollhouse_scale:
      name: Escala da casa de bonecas
      description: 'Proporção de escala de uma casa de bonecas ou dos acessórios incluídos/usados
        (ex.: 1:12), para garantir a compatibilidade entre casas, móveis e bonecos.'
    dollhouse_style_theme:
      name: Estilo/tema da casa de bonecas
      description: 'Estilo ou tema geral da casa de bonecas para visualização e apresentação
        (ex.: moderno vs. vitoriano).'
    donnos_playing_technique:
      name: Técnica de tocar donnos
      description: Indica como é possível tocar/acionar o donnos (somente com as mãos
        ou com bastão/baqueta), para atender às expectativas dos compradores e aos
        acessórios incluídos.
    donnos_tuning_system:
      name: Sistema de afinação de donnos
      description: Método principal utilizado para afinar ou alterar a afinação (por
        exemplo, cordas de tensão/mecanismo de compressão).
    door_assembly_type:
      name: Tipo de montagem da porta
      description: 'Indica o que está incluído: apenas a estrutura da porta, o revestimento
        da porta ou o conjunto completo da porta.'
    door_closure_mechanism:
      name: Mecanismo de fechamento da porta
      description: Define o mecanismo que controla o fechamento da porta (por exemplo,
        fechamento suave, trava magnética).
    door_handle_components_included:
      name: Componentes incluídos com a maçaneta da porta
      description: Indica quais peças principais estão incluídas com o maçanete da
        porta (por exemplo, cilindro da fechadura, junta/vedação, tampa de acabamento,
        acessórios de montagem, cabo de fiação, trinco/atuador).
    door_handle_operation:
      name: Operação da maçaneta da porta
      description: Especifica o estilo principal de acionamento/operação do conjunto
        da maçaneta da porta do veículo (por exemplo, ligação mecânica, cilindro da
        chave, botão/chave sem chave, abertura automática).
    door_lock_knob_attachment_method:
      name: Método de fixação da maçaneta da fechadura da porta
      description: Especifica como o puxador da fechadura se encaixa na haste da fechadura
        (por exemplo, rosqueado, encaixe).
    door_lock_position:
      name: Posição da fechadura da porta
      description: Especifica em qual posição da porta/abertura a fechadura ou componente
        da fechadura foi projetada para se encaixar em um veículo.
    door_seal_feature_set:
      name: Conjunto de vedação da porta
      description: Características funcionais da vedação da porta.
    door_seal_material_type:
      name: Tipo de material de vedação da porta
      description: Principal família de elastômeros/materiais utilizada para a vedação
        da porta (além dos materiais genéricos).
    door_seal_product_form:
      name: Formato do produto de vedação de porta
      description: Indica a forma de venda/embalagem da vedação da porta.
    door_window_operation:
      name: Operação da janela da porta
      description: Especifica se o sistema de janelas da porta se destina a operação
        manual ou motorizada, ou se a porta não possui janela.
    double_decker_bus_deck_configuration:
      name: Configuração de piso de ônibus de dois andares
      description: Especifica a configuração do acesso ao andar superior e ao teto
        de um ônibus de dois andares.
    double_drum_pedal_linkage_medium:
      name: Ligação de pedal de tambor duplo médio
      description: Especifica o meio utilizado para conectar o pedal secundário ao
        pedal primário (por exemplo, eixo de transmissão, corrente, correia).
    double_end_bag_core_type:
      name: Tipo de núcleo de saco de extremidade dupla
      description: Identifica a estrutura interna do núcleo de impacto, que determina
        a velocidade de rebote, a sensação e os requisitos de manutenção.
    double_pointed_needle_point_style:
      name: Estilo de ponta de agulha dupla
      description: Descreve a afiação da ponta/forma adequada para diferentes fios
        e estilos de tricô.
    dough_extruder_accessories_included:
      name: Acessórios para extrusora de massa incluídos
      description: Componentes adicionais incluídos com a extrusora de massa.
    dough_extruder_operation_type:
      name: Tipo de operação da extrusora de massa
      description: Como a massa é empurrada através da extrusora para tomar forma.
    dough_extruder_shape_disc_included:
      name: Disco modelador incluído para extrusora de massa
      description: As formas que a extrusora pode produzir por meio dos discos/bicos
        incluídos.
    dough_format:
      name: Formato da massa
      description: Identifica a apresentação física/forma da massa dentro da embalagem
        (por exemplo, esférica, folha, disco, fios ralados).
    doumbek_accessories_included:
      name: Acessórios de doumbek incluídos
      description: Acessórios incluídos com o doumbek (por exemplo, chave de afinação,
        estojo).
    doumbek_head_material:
      name: Material da cabeça do doumbek
      description: Material da pele do tambor (membrana) do doumbek.
    doumbek_head_type:
      name: Tipo de cabeça do doumbek
      description: Construção/tipo da cabeça do doumbek (como a membrana é feita ou
        montada).
    doumbek_playing_style_technique:
      name: Estilo/técnica de execução do doumbek
      description: Contexto/estilo de execução pretendido geralmente associado ao
        doumbek.
    doumbek_tuning_system:
      name: Sistema de afinação do doumbek
      description: Como o doumbek é tensionado/afinado (ou se não é afinável).
    dowel_end_style:
      name: Estilo de extremidade do pino
      description: Descreve o corte/formadas extremidades dos pinos, o que afeta a
        facilidade de inserção, a segurança e o uso pretendido para artesanato.
    dowel_surface_texture:
      name: Textura da superfície do pino
      description: Descreve o condição da superfície do pino, como lisa ou canelada,
        o que afeta a aparência e a adesão da cola.
    drafting_compass_adjustment_mechanism:
      name: Mecanismo de ajuste do compasso de desenho
      description: Mecanismo principal de ajuste fino usado para definir o raio com
        precisão.
    drafting_compass_fine_adjustment_mechanism:
      name: Mecanismo de ajuste fino do compasso de desenho
      description: Tipo de ajuste fino usado para definir o raio com precisão (se
        houver).
    drafting_compass_lead_holder_type:
      name: Tipo de porta-minas para compasso de desenho
      description: Tipo de suporte/inserção para desenho incluído ou compatível com
        o compasso.
    drag_system_material:
      name: Material do sistema de arrasto
      description: Identifica o material ou a tecnologia utilizada no conjunto de
        discos de fricção , influenciando a resistência ao calor e a suavidade.
    drag_system_type:
      name: Tipo de sistema de arrasto
      description: Identifica o tipo de mecanismo de arrasto é utilizado no molinete,
        como arrasto frontal, traseiro, de alavanca, em estrela, magnético ou a disco.
    drag_type:
      name: Tipo de arrasto
      description: Especifica o tipo de mecanismo de arrasto utilizado pelo molinete
        (método local ou de acionamento).
    drawer_features:
      name: Características da gaveta
      description: Informações sobre elementos ou funcionalidades especiais de construção
        de gavetas (por exemplo, fechamento suave, forro de feltro).
    drawer_slide_type:
      name: Tipo de corrediça de gaveta
      description: Especifica o estilo de montagem e extensão das corrediças da gaveta
        (por exemplo, montagem inferior, extensão total).
    drawing_ink_compatible_tools:
      name: Ferramentas compatíveis com tinta de desenho
      description: Especifica as ferramentas da aplicação para as quais a tinta se
        destina (por exemplo, caneta tinteiro ou pincel).
    drawing_ink_permanence:
      name: Permanência da tinta de desenho
      description: Indica as características de permanência importantes para a obra
        de arte final e sua reprodução.
    dress_embellishment:
      name: Enfeite de vestido
      description: Destaca os elementos decorativos mais marcantes incorporados ao
        design do vestido.
    dress_train_type:
      name: Tipo de cauda do vestido
      description: Indica a presença e o comprimento/estilo da cauda do vestido, informando
        sobre o nível de formalidade e a adequação do evento.
    dried_surface_finish:
      name: Acabamento da superfície seca
      description: Descreve a aparência típica da superfície após a secagem (brilho/textura).
    drink_tube_insulation:
      name: Isolamento do tubo para bebidas
      description: Indica se o tubo para bebidas inclui isolamento ou uma capa térmica
        para evitar que os líquidos aqueçam ou congelem.
    drive_band_cross_section_shape:
      name: Forma seção transversal da correia de transmissão
      description: A forma do perfil da correia de transmissão (redonda, plana etc.).
    drive_band_join_type:
      name: Tipo de junção da correia de transmissão
      description: Indica como a correia de transmissão é unida/construída (sem fim
        ou com necessidade de amarração etc.).
    drive_band_material_type:
      name: Tipo de material da correia de transmissão
      description: Especifica o material/tipo da correia de transmissão usada em rodas
        de fiar.
    drive_location:
      name: Local de acionamento
      description: Identifica onde o volante/mecanismo de acionamento está posicionado
        na elíptica, influenciando o espaço ocupado e a sensação do movimento.
    drive_mechanism:
      name: Mecanismo de acionamento
      description: Identifica o tipo de transmissão utilizada para transferir a potência
        dos pedais para o volante.
    drive_shaft_material:
      name: Material do eixo de transmissão
      description: Especifica o material principal de construção do tubo do eixo de
        transmissão ou do conjunto completo.
    drive_system:
      name: Sistema de acionamento
      description: Especifica o mecanismo que transfere a força do pedal para o sistema
        de resistência.
    drivetrain_configuration:
      name: Configuração do sistema de transmissão
      description: Especifica a configuração do sistema de transmissão da bicicleta,
        indicando se o cubo traseiro é fixo, de roda livre de uma velocidade ou flip-flop.
    drivetrain_speed_compatibility:
      name: Compatibilidade de velocidade da transmissão
      description: Indica as velocidades do cassete para as quais a coroa foi projetada,
        garantindo perfis e espaçamentos adequados dos dentes.
    drone_positioning_system:
      name: Sistema de posicionamento de drones
      description: Tecnologia de posicionamento e estabilização compatível com o drone
        para navegação e voo estacionário estável.
    drone_transmission_type:
      name: Tipo de transmissão de drone
      description: Método principal utilizado para o controle e/ou conexão de vídeo
        entre o drone e o controlador/dispositivo.
    drop_spindle_whorl_position:
      name: Posição do disco do fuso
      description: Localização do volute no eixo.
    drum_carder_accessories_included:
      name: Acessórios para cardadora de tambor incluídos
      description: Item geralmente incluído em um kit de cardadora de tambor.
    drum_clamp_locking_mechanism:
      name: Mecanismo de travamento da braçadeira do tambor
      description: Especifica como a braçadeira é travada/apertada no tubo/aro (por
        exemplo, parafuso borboleta, parafuso com chave de tambor, engate rápido).
    drum_clamp_mount_interface:
      name: Interface de montagem do grampo de tambor
      description: Especifica o que a braçadeira oferece para fixação de acessórios
        (por exemplo, receptor de haste em L, junta esférica, inclinador de prato).
    drum_clamp_type:
      name: Tipo de braçadeira de tambor
      description: Especifica o tipo de fixação funcional usado em equipamentos de
        montagem de kit de tambores (por exemplo, fixação de aro vs. fixação de rack/tubo).
    drum_head_application_batter_resonant:
      name: Aplicação para cabeça/pele do tambor (bateria/ressonância)
      description: Especifica para qual lado/função a cabeça foi projetada em um tambor
        (superfície de toque superior vs. lado de ressonância/caixa inferior).
    drum_head_collar_type:
      name: Tipo de gola da pele de tambor
      description: Especifica se a pele tem um perfil de gola padrão, gola baixa ou
        gola especial para se adaptar a determinadas bordas/cascos.
    drum_head_damping_control:
      name: Controle de amortecimento da pele do tambor
      description: Recursos de controle de harmônicos integrados ou estilo de amortecimento
        incluídos no design da pele.
    drum_head_film_material:
      name: Material da película para pele de tambor
      description: Material principal da película/filme da pele (geralmente polietileno
        tereftalato/Mylar, mas pode incluir materiais especiais).
    drum_head_hoop_collar_type:
      name: Tipo de aro/colar de pele de tambor
      description: Identifica a construção do aro e da borda da pele do tambor (por
        exemplo, perfil da borda e material do aro), que pode afetar o encaixe e a
        estabilidade da afinação em determinados cascos e aros.
    drum_head_hoop_rim_material:
      name: Material do aro do tambor
      description: O material do aro interno (o aro embutido na pele do instrumento),
        que pode afetar a durabilidade e a estabilidade da afinação.
    drum_head_included:
      name: Pele de tambor incluída
      description: Indica se as peles batedeiras e/ou de resposta estão incluídas
        com o tambor.
    drum_head_muffling_feature:
      name: Recurso de amortecimento da pele do tambor
      description: Recursos de controle de harmônicos integrados na pele do tambor.
    drum_head_muffling_type:
      name: Tipo de abafamento da pele de tambor
      description: Indica se a pele do tambor inclui elementos de controle/abafamento
        de harmônicos integrados.
    drum_head_ply_count:
      name: Contagem de camadas da pele do tambor
      description: 'Número de camadas/folhas de película utilizadas na construção
        da pele do tambor (ex.: 1 camada, 2 camadas).'
    drum_head_position:
      name: Posição da pele do tambor
      description: Indica se a pele do tambor se destina a ser usada como pele batedeira
        (superior/de impacto), pele de ressonância (inferior), pele de caixa (inferior)
        ou se pode ser usada de ambas as maneiras.
    drum_head_reinforcement_type:
      name: Tipo de reforço da pele do tambor
      description: Especifica se a pele da caixa inclui recursos de reforço, como
        um ponto central ou um anel de controle, de modo a aumentar a durabilidade
        e focar o timbre.
    drum_head_surface_finish:
      name: Acabamento de superfície da pele do tambor
      description: Textura/acabamento da superfície da pele que influencia o ataque
        e a resposta das vassourinhas.
    drum_head_type:
      name: Tipo de pele de tambor
      description: Especifica a construção/tipo de pele utilizada no tambor (principalmente
        para peles batedeiras/de ressonância, conforme fornecidas).
    drum_key_design_type:
      name: Tipo de design da chave de tambor
      description: 'Descreve o design funcional da chave de afinação (ex: padrão,
        com catraca, cabo em T).'
    drum_key_drive_type:
      name: Tipo de acionamento da chave do tambor
      description: Especifica o tipo de acionamento/interface da chave do tambor usada
        para engatar a haste de tensão ou os equipamentos de montagem.
    drum_key_handle_style:
      name: Estilo do cabo da chave do tambor
      description: Descreve o estilo ergonômico/do cabo da chave de afinação do tambor,
        o que afeta o conforto e a alavanca durante a afinação.
    drum_kit_included_items:
      name: Itens incluídos no kit de tambores/bateria
      description: 'Lista os principais itens incluídos no kit de tambores/bateria,
        além dos cascos/pads (ex.: acessórios, pratos, banco).'
    drum_kit_portability:
      name: Portabilidade do kit de bateria
      description: Indica se o kit foi projetado para armazenamento/transporte compacto
        (por exemplo, para viagem/compacto/dobrável).
    drum_kit_shell_construction_features:
      name: Características da construção do kit de bateria
      description: A forma como os cascos são construídos (número/tipo de camadas),
        o que influencia o timbre e a durabilidade.
    drum_mount_clamp_type:
      name: Tipo de braçadeira para montagem de tambor
      description: Descreve o formato da braçadeira utilizada em equipamentos de montagem
        de tambores.
    drum_multi_clamp_clamp_type:
      name: Tipo de fixação com várias braçadeiras para tambores de bateria
      description: O estilo/configuração funcional das várias braçadeiras (como a
        fixação é feita e o que é conectado).
    drum_mute_material:
      name: Material do abafador de bateria
      description: Especifica o material principal do abafador de som da bateria que
        entra em contato com a pele do tambor e/ou amortece a vibração.
    drum_pad_triggering_zones:
      name: Zonas de sensibilidade dos pads da bateria
      description: Indica o número/tipo de zonas de acionamento suportadas pelo pad
        de tom (por exemplo, apenas pele vs. pele + aro), o que afeta a expressividade
        e a compatibilidade dos módulos.
    drum_pedal_accessories_included:
      name: Acessórios para o pedal do tambor incluídos
      description: Lista os principais acessórios e componentes incluídos com o pedal
        de bateria.
    drum_pedal_baseplate_type:
      name: Tipo de placa de base do pedal de bateria
      description: Indica se o pedal utiliza uma base fixa ou um design flutuante/sem
        moldura.
    drum_pedal_bearing_type:
      name: Tipo de rolamento do pedal do tambor/bateria
      description: Especifica o mecanismo de rolamento utilizado nos pontos de articulação
        principais (por exemplo, balancim, calcanhar, came).
    drum_pedal_cam_type:
      name: Tipo de came do pedal de tambor
      description: Especifica as formas/geometria da came de um pedal de bateria,
        o que influencia a sensação e a resposta (por exemplo, linear vs. acelerador).
    drum_pedal_chain_configuration:
      name: Configuração da corrente do pedal da bateria
      description: Especifica o tipo de corrente utilizada por um pedal de bateria
        com acionamento por corrente (por exemplo, corrente simples, dupla ou deslocada).
    drum_pedal_chain_type:
      name: Tipo de corrente do pedal de tambor de bateria
      description: Indica o tipo de corrente utilizada na transmissão (por exemplo,
        corrente de rolos ou corrente tipo bicicleta), o que pode afetar a suavidade
        e a durabilidade.
    drum_pedal_clamp_type:
      name: Tipo de fixação do pedal de bateria
      description: Especifica como o pedal se fixa ao aro do bumbo.
    drum_pedal_intended_use:
      name: Uso pretendido do pedal de bateria
      description: Indica o contexto principal de execução para o qual o pedal de
        acionamento por correia foi projetado ou é comercializado.
    drum_pedal_spring_adjustment_method:
      name: Método de ajuste da mola do pedal de bateria
      description: Indica como a tensão da mola é ajustada no pedal.
    drum_pedal_spring_type:
      name: Tipo de mola do pedal de tambor de bateria
      description: Especifica o mecanismo de mola utilizado para o retorno do pedal.
    drum_shell_material:
      name: Material do casco do tambor de bateria
      description: Especifica o principal material de construção do casco para baterias
        acústicas (por exemplo, bordo, bétula, acrílico).
    drum_shell_wood_species:
      name: Espécies de madeira para casco de tambor de bateria
      description: Identifica a espécie de madeira utilizada no casco do tambor, o
        que influencia o timbre e a ressonância.
    drumhead_type:
      name: Tipo de pele de tambor
      description: Configuração/tipo de pele usada no octoban.
    drumstick_model:
      name: Modelo de baqueta
      description: 'Designação padronizada de modelo/tamanho de baqueta usada por
        muitas marcas (ex.: 5A, 7A).'
    drumstick_taper:
      name: Afunilamento de baqueta
      description: Descreve o perfil cônico da haste até a ponta, o que afeta o rebote
        e o equilíbrio.
    drysuit_footwear_style:
      name: Estilo de calçado para macacão estanque/traje seco
      description: Descreve o acabamento integrado da parte inferior da perna do macacão
        estanque (por exemplo, botas embutidas, meias de neoprene, meias sem fecho
        ou vedação nos tornozelos).
    dumbbell_style:
      name: Estilo de haltere
      description: Identifica o design fundamental do haltere (seja de uma unidade
        fixa, um sistema ajustável ou um modelo com carga ajustável), que influencia
        fortemente as decisões de compra e o uso nos treinos.
    dundun_playing_position:
      name: Posição de execução do dundun
      description: Posição pretendida para tocar/posicionar o tambor.
    dye_status:
      name: Estado de tingimento
      description: Indica se a manta é tingida, não tingida/natural ou inclui várias
        cores/misturas.
    dye_style:
      name: Estilo de tingimento
      description: Especifica se a cor do fio é sólida, variegada ou tingida de alguma
        outra forma especial.
    dye_technique:
      name: Técnica de tingimento
      description: 'Método utilizado para tingir a fibra (ex.: tingimento manual,
        em caldeirão, espacial etc.).'
    dye_type_needlecraft_fabric:
      name: Tipo de tingimento (tecido para bordado)
      description: Indica se o tecido de linho é liso, tingido à mão ou tingido de
        forma especial.
    dyeing_color_processing:
      name: Tingimento/processamento de cor
      description: Descreve se e como a fibra foi tingida (por exemplo, sem tingimento,
        branqueada/branca ou técnicas específicas de tingimento).
    e_bike_certification_class:
      name: Classe de certificação para bicicletas elétricas
      description: Especifica a classificação de velocidade oficial do pneu para bicicletas
        elétricas (por exemplo, E-25, E-50).
    e_bike_speed_rating:
      name: Classificação de velocidade da bicicleta elétrica
      description: Indica o nível oficial de certificação do pneu para bicicletas
        elétricas (por exemplo, E25 para ≤25 km/h, E50 para ≤50 km/h).
    e_scooter_connector_type:
      name: Tipo de conector para patinete elétrico
      description: Identifica o tipo de conector ou plugue elétrico usado pelo componente
        para conexões de energia ou sinal.
    e_scooter_throttle_type:
      name: Tipo de acelerador de patinete elétrico
      description: Especifica o tipo de limitador (acelerador) usado para controlar
        a aceleração em patinete elétrico.
    ear_coverage:
      name: Cobertura para orelha
      description: Especifica se o capacete inclui proteção para a orelha e se esta
        é removível.
    ear_coverage_style:
      name: Estilo de cobertura das orelhas
      description: Descreve como, ou se, as orelhas são cobertas pela máscara contra
        moscas.
    ear_coverage_type:
      name: Tipo de cobertura para orelha
      description: Especifica como o chapéu cobre ou protege as orelhas, incluindo
        a presença e o estilo das abas de proteção para as orelhas.
    ear_guard_type:
      name: Tipo de protetor para orelha
      description: Descreve o estilo de proteção para orelhas integrada ao boné, como
        protetores de plástico rígido, acolchoados ou removíveis.
    earmuff_style:
      name: Estilo de protetor para orelha
      description: Identifica como o protetor para orelhas é usado ou seu estilo de
        design estrutural (por exemplo, sobre a cabeça ou envolvendo a parte de trás
        da cabeça).
    earring_closure_type:
      name: Tipo de fecho do brinco
      description: Especifica o mecanismo utilizado para fixar o brinco na orelha
        (por exemplo, fecho de pressão, fecho de alavanca, fecho de encaixe).
    easel_art_desk_features:
      name: Características do cavalete e da mesa de arte
      description: Destaca as características funcionais comuns incluídas no cavalete
        ou na mesa de arte.
    easel_art_desk_surface_type:
      name: Tipo de superfície de cavalete e mesa de arte
      description: Identifica as superfícies utilizáveis para desenho/escrita (por
        exemplo, quadro-negro, quadro branco, rolo de papel, quadro magnético).
    eb_clarinet_body_type:
      name: Tipo de corpo do clarinete em Mi bemol
      description: Especifica se o clarinete em Mi bemol é uma variante soprano ou
        alto.
    eco_material_type:
      name: Tipo de material ecológico
      description: Destaca a tecnologia de espuma ou do material ecologicamente correto
        utilizado na almofada.
    edge_construction:
      name: Construção da borda
      description: Indica se o esqui possui borda metálica em nenhuma, em parte ou
        em toda a sua extensão.
    edge_tuner_type:
      name: Tipo de aparelho para afiar bordas
      description: Classifica o tipo de aparelho para afiar as bordas de esquis ou
        pranchas de snowboard, como uma guia de lixa ou uma máquina elétrica.
    edible_plant_part:
      name: Parte comestível da planta
      description: Indica qual parte da planta está sendo vendida para consumo.
    educational_guide_included:
      name: Guia educativo incluído
      description: Indica quais materiais de aprendizagem estão incluídos no modelo.
    educational_topic:
      name: Tema educacional
      description: Tema principal de aprendizagem apoiado pelo conteúdo educativo
        do formigueiro.
    egg_component:
      name: Componente de ovo
      description: Identifica qual parte do ovo o produto contém, como ovo inteiro,
        apenas a clara, gemas ou misturas/substitutos.
    egg_component_replaced:
      name: Componente de ovo substituído
      description: Indica qual parte do ovo o produto se destina a substituir (por
        exemplo, ovo inteiro, clara de ovo).
    egg_enrichment:
      name: Enriquecimento de ovos
      description: Indica a fortificação nutricional adicionada aos ovos, como enriquecimento
        com ômega-3 ou vitamina D.
    egg_farming_method:
      name: Método de criação de galinhas poedeiras
      description: Indica o método de produção ou criação utilizado para os ovos (por
        exemplo, sem gaiolas, caipira, orgânico etc.).
    egg_grade:
      name: Grau do ovo
      description: Indica o nível de qualidade atribuído por órgãos reguladores ou
        do setor.
    egg_processing_state:
      name: Estado de processamento dos ovos
      description: Indica o processamento aplicado aos ovos antes da venda (por exemplo,
        ovo fresco, salgado, ovo centenário/preservado).
    egg_production_method:
      name: Método de produção de ovos
      description: Especifica o sistema de criação ou alojamento utilizado para produzir
        os ovos (por exemplo, sem gaiolas, criados em pasto, orgânicos).
    egg_replacer_main_ingredient:
      name: Ingrediente principal do substituto de ovo
      description: Indica o ingrediente base principal a partir do qual o substituto
        de ovo é feito. Isso auxilia os usuários com necessidades dietéticas ou propriedades
        desejadas no preparo de alimentos.
    egg_size:
      name: Tamanho do ovo
      description: Classifica os ovos pelas designações de tamanho padrão do mercado.
    egg_source_animal:
      name: O animal que fornece os ovos
      description: Identifica a espécie animal que produziu os ovos.
    egg_white_processing_method:
      name: Método de processamento da clara de ovo
      description: Indica como a clara de ovo foi processada após a coleta (por exemplo,
        pasteurizada, atomizada etc.), o que afeta a segurança alimentar, a valida
        e o uso pretendido.
    eggplant_variety:
      name: Variedade de berinjela
      description: Especifica a cultivar ou variedade de berinjela, permitindo aos
        compradores escolher tipos que diferem em tamanho, sabor, textura e uso culinário.
    eggshell_color:
      name: Casca de ovo
      description: Especifica a cor predominante da casca dos ovos.
    elastic_edge_finish_type:
      name: Acabamento/tipo de borda do elástico
      description: Especifica a construção das bordas do elástico tecido, que influencia
        o conforto e a aplicação.
    elastic_intended_use:
      name: Uso pretendido do elástico
      description: Aplicação principal para a qual o elástico foi projetado (auxilia
        na descoberta e reduz incompatibilidades).
    elastic_recovery_performance:
      name: Desempenho de recuperação do elástico
      description: Descreve a capacidade do elástico tecido de retornar ao seu comprimento
        original após ser esticado.
    elastic_recovery_quality:
      name: Qualidade de recuperação do elástico
      description: Indica a capacidade de recuperação do elástico, ou seja, como ele
        retorna ao seu comprimento original depois de ser esticado.
    elastic_stretch_level:
      name: Nível de elasticidade do elástico
      description: O quanto o elástico pode se estender sob tensão (geralmente expresso
        em níveis relativos quando a porcentagem exata não é fornecida).
    elastic_structure:
      name: Estrutura do elástico
      description: Especifica a construção estrutural do elástico para casas de botão
        (por exemplo, tricotado, tecido, trançado). Isso pode afetar a elasticidade,
        a recuperação e o desempenho da costura.
    elastic_type:
      name: Tipo de elástico
      description: Especifica o tipo de construção do elástico, por exemplo, elástico
        dobrável (FOE), trançado, tricotado, tecido.
    electric_assist_type:
      name: Tipo de assistência elétrica
      description: Indica se a bicicleta possui assistência motorizada e o tipo de
        assistência fornecida.
    electric_bicycle_motor_position:
      name: Posição do motor da bicicleta elétrica
      description: Local do motor de acionamento na bicicleta elétrica, como motor
        central, motor de cubo dianteiro, motor de cubo traseiro ou motor de cubo
        duplo.
    electric_bike_class:
      name: Classe de bicicleta elétrica
      description: Classifica as bicicletas elétricas de acordo com as classes regulamentares
        que definem os limites de velocidade e a assistência de acelerador.
    electric_guitar_bridge_type:
      name: Tipo de ponte para guitarra elétrica
      description: Especifica o tipo de sistema de ponte/vibrato na guitarra elétrica.
    electric_instrument_output_connection_type:
      name: Tipo de conexão de saída do instrumento elétrico
      description: Especifica as conexões físicas de saída de áudio fornecidas no
        violoncelo elétrico.
    electric_riding_vehicle_control_options:
      name: Opções de controle de veículos elétricos de condução
      description: Opções de controle/operação disponíveis para o piloto/responsável
        (por exemplo, pedal, volante, controle remoto).
    electric_spinning_wheel_speed_control_type:
      name: Tipo de controle de velocidade da roda de fiar elétrica
      description: Descreve como o usuário ajusta a velocidade de rotação na roda
        elétrica.
    electric_ukulele_output_jack_type:
      name: Tipo de conector de saída para ukulele elétrico
      description: Especifica o conector de saída física usado pelo ukulele elétrico.
    electric_van_body_length_class:
      name: Classe de comprimento da carroceria de vans elétricas
      description: Classe de dimensionamento de vans comum, baseada na distância entre
        os eixos e no comprimento, utilizada em listagens.
    electric_van_roof_height_class:
      name: Classe de altura do teto da van elétrica
      description: Classificação comum de altura do teto usada para vans (especialmente
        vans de carga).
    electric_vehicle_drivetrain_layout:
      name: Layout do sistema de transmissão de veículos elétricos
      description: Configuração de motor/eixo que descreve quantos motores existem
        e onde estão localizados (além da simples tração nas quatro rodas/tração dianteira/tração
        traseira).
    electric_winder_accessories_included:
      name: Acessórios para bobinadeira elétrica incluídos
      description: Lista os acessórios incluídos com a bobinadeira elétrica (por exemplo,
        grampos, adaptadores etc.).
    electrical_connector_type:
      name: Tipo de conector elétrico
      description: Especifica o tipo de conector usado pela fechadura/sistema de travamento
        da porta para integração elétrica (se aplicável).
    electrical_system_voltage:
      name: Tensão do sistema elétrico
      description: Indica a tensão nominal do sistema elétrico do veículo para a qual
        o regulador foi projetado.
    electronic_cymbal_trigger_zones:
      name: Zonas de acionador de címbalos/pratos eletrônicos
      description: Especifica quantas zonas de acionamento independentes o pad de
        címbalo/prato oferece (por exemplo, corpo/borda/cúpula).
    electronic_drum_module_audio_interface_functionality:
      name: Funcionalidade de interface de áudio para módulos de bateria eletrônica
      description: Indica se os módulos podem funcionar como uma interface de áudio
        USB para gravação/reprodução (além de MIDI).
    electronic_drum_module_metronome_features:
      name: Modules de bateria eletrônica com metrônomo integrado
      description: Especifica a funcionalidade integrada de prática/metrônomo.
    electronic_drum_module_power_source:
      name: Fonte de alimentação para módulos de bateria eletrônica
      description: Especifica a fonte de alimentação necessária ou compatível com
        os módulos de controle.
    electronic_drum_module_sample_import_support:
      name: Suporte à importação de samples para módulos de bateria eletrônica
      description: Indica se os módulos podem importar samples de usuários e por qual
        método.
    electronic_drum_pad_playing_surface_type:
      name: Tipo de superfície de toque do pad de bateria eletrônica
      description: Descreve a construção da superfície de toque do pad do tom (por
        exemplo, pele de malha vs. borracha). Isso afeta o rebote, o ruído e a sensação
        ao tocar.
    electronic_features:
      name: Características eletrônicas
      description: Indica as funcionalidades eletrônicas/interativas incluídas no
        item de jogo bancário (se existirem).
    electronic_lights_and_sound:
      name: Luzes e sons eletrônicos
      description: Indica se a casa de bonecas inclui luzes eletrônicas e/ou recursos
        sonoros (por exemplo, luzes, campainha, música, efeitos sonoros etc.).
    electronics_power_source:
      name: Fonte de alimentação para aparelhos eletrônicos
      description: Especifica como os componentes eletrônicos ativos são alimentados
        (quando aplicável).
    eligible_race_series:
      name: Séries de corridas elegíveis
      description: Série de corridas ou entidade reguladora na qual o carro está habilitado
        a competir.
    elliptical_trainer_part_type:
      name: Tipo de peça para elíptico
      description: Classifica o tipo específico de acessório ou peça de reposição
        para um aparelho elíptico (por exemplo, correia, console, pedal). Isso permite
        que os compradores encontrem de forma rápida o item desejado sem precisar
        navegar por diversas microcategorias.
    embellishment_technique:
      name: Técnica de enfeite/adorno
      description: Descreve os principais elementos decorativos ou acabamentos aplicados
        à peça de roupa, como bordados, estampas ou trabalhos com miçangas.
    embellishment_type:
      name: Tipo de enfeite
      description: Identifica o tipo de elemento decorativo aplicado à liga, como
        renda, laços ou pérolas.
    embossing_pen_ink_color:
      name: Cor da tinta da caneta para escrita/gravação em relevo
      description: Especifica a cor da tinta depositada pela caneta de escrita em
        relevo (pode ser transparente/pegajosa ou pigmentada). Diferente da cor da
        caneta/corpo.
    embossing_stylus_tip_shape:
      name: Forma da ponta do boleador de relevo
      description: Descreve a geometria da ponta de relevo usada para criar diferentes
        efeitos (por exemplo, esférica vs. pontiaguda).
    embroidered_coverage_level:
      name: Nível de cobertura do bordado
      description: Quantidade aproximada da cobertura dos fios bordados na face do
        remendo.
    embroidered_patch_backing_type:
      name: Tipo de fixação do patch bordado
      description: A camada de fixação/suporte no verso do patch bordado que afeta
        a durabilidade e a forma como ele pode ser aplicado.
    embroidery_hoop_type:
      name: Tipo de bastidor de bordado
      description: Identifica o estilo de construção do bastidor de bordado e seu
        principal mecanismo de tensionamento.
    embroidery_machine_bobbin_type:
      name: Tipo de bobina para máquina de bordar
      description: Tipo/estilo de carregamento do sistema de bobina.
    emergency_lighting_configuration:
      name: Configuração de iluminação de emergência
      description: Especifica a configuração principal de iluminação de aviso de emergência
        instalada no veículo (por exemplo, barra de luz no teto, luzes na grade).
    emergency_lighting_package:
      name: Pacote de iluminação de emergência
      description: Especifica os tipos de luzes de aviso de emergência instaladas.
    emissions_compliance_standard:
      name: Padrão de conformidade de emissões
      description: Indica a certificação/conformidade de emissões do motor, se aplicável.
    emissions_standard:
      name: Padrão de emissões
      description: Norma de conformidade de emissões para o veículo (varia conforme
        a região e o ano).
    enclosure_panel_configuration:
      name: Configuração do painel da capa de fechamento
      description: Especifica quais painéis ou lados da capa estão incluídos (configuração
        de cobertura), como fechamento total, apenas cortinas laterais ou 3 lados
        (frente/traseira aberta).
    enclosure_window_material:
      name: Material da janela da capa de fechamento
      description: Identifica o material utilizado nos painéis transparentes das janelas
        da capa de fechamento.
    end_fitting_type:
      name: Tipo de encaixe da extremidade
      description: O tipo de conector usado em cada extremidade da haste (lado do
        veículo e lado da tampa) determina a compatibilidade da montagem.
    end_type:
      name: Tipo de extremidade
      description: Especifica o estilo de fechamento/fixação nas extremidades da cinta
        de reboque para conexão aos pontos de ancoragem.
    ends_style_blocking_wires:
      name: Estilo de extremidades (bloqueio de fios)
      description: Indica como as extremidades do fio de bloqueio são finalizadas
        para segurança e facilidade de passagem pelas bordas da renda.
    enduro_bike_suspension_adjustability:
      name: Capacidade de ajuste da suspensão da bicicleta de enduro
      description: Indica quais ajustes de suspensão estão disponíveis (normalmente
        para o garfo dianteiro e o amortecedor traseiro).
    engine_bay_mounting_location:
      name: Montagem local do compartimento do motor
      description: Localização aproximada onde o reservatório de expansão/transbordamento
        será montado no compartimento do motor (posição relativa).
    engine_bearing_coating:
      name: Revestimento de mancal do motor
      description: Especifica os revestimentos superficiais no rolamento (para resistência
        ao desgaste, incrustabilidade, redução de atrito).
    engine_bearing_position:
      name: Posição do rolamento do motor
      description: Especifica a localização/funções do rolamento dentro do motor.
    engine_bearing_size:
      name: Tamanho do rolamento do motor
      description: Especifica se o rolamento é de tamanho padrão ou uma variante subdimensionada/sobredimensionada
        (comumente relacionada à retificação do virabrequim e à folga).
    engine_configuration:
      name: Configuração do motor
      description: 'Descreve o layout/configuração dos cilindros do motor (ex.: em
        linha, em V, boxer).'
    engine_cooling_type:
      name: Tipo de refrigeração do motor
      description: Especifica o método de refrigeração do motor.
    engine_degreaser_form:
      name: Forma do desengraxante de motor
      description: Formato físico/forma de entrega do desengraxante de motor.
    engine_degreaser_rinse_requirement:
      name: Requisito de enxágue para desengraxante de motor
      description: Indica se o desengraxante deve ser enxaguado com água após a aplicação.
    engine_mount_type:
      name: Tipo de suporte do motor
      description: Especifica o projeto funcional do suporte do motor (por exemplo,
        hidráulico, rígido, com amortecedor de torque).
    engine_oil_formulation:
      name: Formulação de óleo do motor
      description: Indica o foco da formulação do óleo de motor, como uso padrão,
        condicionamento para alta quilometragem, intervalos de troca estendidos ou
        aplicação para frotas/veículos pesados.
    engine_oil_specification:
      name: Especificação do óleo do motor
      description: 'A especificação/norma que o óleo atende (ex.: API SP, API SN Shopify
        Plus, API CK-4, ACEA C3, ILSAC GF-6A etc.).'
    engine_rebuild_kit_contents:
      name: Conteúdo do kit de reconstrução do motor
      description: Identifica quais componentes principais estão incluídos no kit
        de reconstrução do motor.
    engine_rotation_direction:
      name: Sentido de rotação do motor
      description: Especifica o sentido de rotação do motor utilizado em aplicações
        marítimas.
    engine_timing_system_drive_type:
      name: Tipo de acionamento/propulsão do sistema de sincronização do motor
      description: Indica se o sistema de distribuição do motor é acionado por correia,
        corrente ou engrenagem, para fins de compatibilidade.
    engine_valve_coating:
      name: Revestimento de válvula do motor
      description: Identifica os tratamentos de superfície ou revestimentos aplicados
        à válvula para resistência ao desgaste/calor.
    engine_valve_position:
      name: Posição da válvula do motor
      description: Especifica se a válvula do motor se destina ao lado de admissão
        ou ao lado de escape do motor.
    engine_valve_stem_tip_type:
      name: Tipo de ponta da haste da válvula do motor
      description: Especifica o estilo ou a construção da ponta da haste da válvula
        no ponto de contato com o balancim ou o ajustador.
    engine_valvetrain_type:
      name: Tipo de trem de válvulas do motor
      description: Configuração do trem de válvulas/eixo de comando.
    enhancement_level:
      name: Nível de aprimoramento
      description: 'Aumento aproximado de volume proporcionado pelo inserto, expresso
        em tamanho da taça: sutil (até 1 xícara), moderado (1 a 2 xícaras), significativo
        (+ de 2 xícaras).'
    entry_zipper_location:
      name: Local do zíper de entrada
      description: Especifica onde está localizado o zíper ou a abertura principal
        do traje (por exemplo, frente, costas, ombro, diagonal).
    epee_point_type:
      name: Tipo de ponta de espada
      description: Especifica a marca ou o padrão da ponta instalada na lâmina, o
        que afeta a compatibilidade e a manutenção.
    equestrian_discipline:
      name: Modalidade de equitação
      description: Especifica a modalidade de equitação para a qual a espora é destinada
        ou mais adequada.
    equestrian_helmet_safety_certification:
      name: Certificação de segurança para capacetes de equitação
      description: Especifica as normas de segurança ou certificações com as quais
        o capacete está em conformidade.
    equine_application_area:
      name: Área de aplicação equina
      description: Especifica a região do corpo ou o material para o qual o produto
        se destina (por exemplo, casco, crina, arreios).
    equipment_contact_material_brew_wine:
      name: Material em contato com o equipamento (cerveja/vinho)
      description: 'Material principal do item que entra em contato com o líquido
        (ex.: vidro, aço inoxidável, plástico).'
    eu_children_clothing_size:
      name: Tamanho da roupa infantil da UE
      description: Especifica o tamanho de roupa infantil da UE por altura, como 104
        ou 140
    eu_clothing_size:
      name: Tamanho da roupa na UE
      description: Especifica o tamanho de roupa da UE, como 38 ou 46
    eu_cup_size:
      name: Tamanho do bojo do sutiã na UE
      description: Especifica o tamanho de bojo do sutiã no padrão da UE, como C ou
        E.
    eu_ring_size:
      name: Tamanho do anel na UE
      description: Especifica o tamanho do anel na UE pela circunferência, como 52
        ou 63.
    eu_shoe_size:
      name: Tamanho do sapato na UE
      description: Especifica o tamanho do sapato da UE, como 42 ou 42 Largo.
    euphonium_included_accessories:
      name: Acessórios do eufônio incluídos
      description: 'Indica os itens que geralmente são incluídos com um eufônio (ex.:
        boquilha, estojo etc.).'
    euphonium_valve_configuration:
      name: Configuração de válvulas do eufônio
      description: Especifica o número de válvulas e se a quarta válvula é operada
        manualmente ou por um mecanismo de acionamento lateral.
    european_sword_historical_period:
      name: Período histórico da espada europeia
      description: Período histórico principal em que o modelo/réplica da espada se
        baseia (ou a era da original).
    european_sword_pattern_type:
      name: Padrão/tipo de espada europeia
      description: Padrão/tipo (tipologia) específico de espada europeia representado
        pela espada colecionável.
    ev_connector_adapter_direction:
      name: Direção do conector/adaptador EV
      description: Especifica o ponto de ORIGEM e de DESTINO da conversão do adaptador
        (lado da entrada no veículo e o lado do carregador/cabo). Essa informação
        permite que os clientes façam uma filtragem para fins de compatibilidade.
    ev_conversion_kit_completeness_level:
      name: Nível de completude do kit de conversão para veículo elétrico
      description: Indica se o produto é um kit de conversão completo ou um kit/pacote
        parcial (por exemplo, apenas motor + controlador).
    ev_conversion_kit_drivetrain_configuration:
      name: Configuração do trem de força do kit de conversão para veículos elétricos
      description: Especifica a arquitetura do trem de força de um kit de conversão
        para veículo elétrico, incluindo o posicionamento do motor/layout da transmissão
        e se ele mantém a transmissão existente.
    ev_conversion_kit_voltage_class:
      name: Classe de tensão do kit de conversão para veículo elétrico
      description: Classe de tensão nominal do sistema (categoria) em torno da qual
        o kit de conversão para veículos elétricos foi projetado. Use esta opção para
        filtrar por classes de tensão de sistemas comuns, além da medição exata da
        tensão.
    evaporator_core_type:
      name: Tipo de núcleo do evaporador
      description: Especifica o projeto de construção do núcleo do evaporador de um
        sistema de ar condicionado automotivo.
    evenweave_fabric_finish_treatment:
      name: Acabamento/tratamento do tecido de trama uniforme
      description: Indica os acabamentos prévios ou tratamentos aplicados ao tecido
        que afetam o manuseio ou a aparência.
    evenweave_fabric_package_format:
      name: Formato da embalagem do tecido de trama uniforme
      description: Indica como o tecido é vendido (pedaço cortado ou peça contínua
        por metro/jarda).
    exercise_bike_accessory_part_type:
      name: Tipo de acessório/peça para bicicleta ergométrica
      description: Descreve as funções principais ou o tipo de componente do item
        (por exemplo, pedal, correia de transmissão, suporte para garrafa, tampa da
        tela, braço da manivela).
    exercise_bike_cushion_component:
      name: Componente de almofada para bicicleta ergométrica
      description: Especifica o componente relacionado ao assento fornecido, como
        uma almofada, um selim ou uma capa de assento.
    exercise_bike_metrics_tracked:
      name: Métricas monitoradas na bicicleta ergométrica
      description: Lista os campos de dados do treino que o computador pode medir
        e exibir em tempo real.
    exercise_mat_accessories_included:
      name: Acessórios para colchonete de exercícios incluídos
      description: Lista os componentes adicionais fornecidos com o colchonete, como
        alças ou joelheiras.
    exhaust_cooling_type:
      name: Tipo de resfriamento por exaustão
      description: Indica se o componente de escape se destina a sistemas de escape
        úmido (refrigerados a água/com injeção de água) ou a sistemas de escape a
        seco.
    exhaust_installation_position:
      name: Posição de instalação do escapamento
      description: Indica em que parte do veículo a peça está instalada.
    exhaust_outlet_configuration:
      name: Configuração da saída de exaustão
      description: Especifica o layout da saída de escape na parte traseira do veículo.
    expansion_tank_cap_connection_type:
      name: Tipo de conexão da tampa do tanque de expansão
      description: O tipo de conexão mecânica usado para fixar e vedar a tampa ao
        gargalo do reservatório de expansão.
    expansion_tank_cap_pressure_relief_feature:
      name: Recurso de alívio de pressão da tampa do tanque de expansão
      description: Indica se e como a tampa proporciona alívio de pressão/vácuo.
    expansion_tank_cap_seal_material:
      name: Material de vedação da tampa do tanque de expansão
      description: Material da junta/vedação que entra em contato com o gargalo do
        tanque de expansão.
    extension_attachment_method:
      name: Método de fixação de extensão
      description: Indica como a extensão se fixa ao conjunto frontal/guidão da bicicleta,
        ajudando os ciclistas a confirmar a compatibilidade com sua configuração atual.
    extension_bend_type:
      name: Tipo de dobra de extensão
      description: Descreve o estilo geométrico ou a curvatura da extensão do guidão,
        que afeta a ergonomia e a aerodinâmica do ciclista.
    extension_mechanism:
      name: Mecanismo de extensão
      description: Descreve o método que uma mesa utiliza para expandir seu comprimento
        ou área de superfície, se aplicável.
    extension_table_features:
      name: Características da mesa extensora
      description: Destaca as características funcionais específicas das mesas extensoras
        para máquinas de costura.
    eyelet_grommet_installation_method:
      name: Método de instalação de ilhós
      description: Especifica como o ilhó é instalado/fixado no material.
    eyewear_lens_shape:
      name: Forma da lente para óculos
      description: Indica as formas geométricas da lente, como cilíndrica ou esférica,
        que afetam o campo de visão, a distorção e o estilo.
    eyewear_strap_material:
      name: Material da tira dos óculos
      description: Especifica o material da tira ajustável que prende os óculos de
        proteção ou os óculos de grau à cabeça do usuário.
    fabric_backing_type:
      name: Tipo de suporte de tecido
      description: Especifica se o tecido de algodão para impressão inclui um revestimento
        de papel estabilizador (e de que tipo), o que determina se ele pode ser utilizado
        em impressoras comuns.
    fabric_cut_format:
      name: Formato de corte de tecido
      description: Especifica o corte/formato da tela para bordado.
    fabric_end_use:
      name: Uso final do tecido
      description: Identifica a principal aplicação pretendida do tecido (para que
        ele é mais indicado).
    fabric_finish:
      name: Acabamento do tecido
      description: Acabamento/tratamento de superfície aplicado ao tecido de seda
        que afeta o brilho, o toque e o desempenho.
    fabric_intended_use:
      name: Uso pretendido do tecido
      description: Aplicações/projetos principais recomendados para o tecido de linho.
    fabric_opacity_level:
      name: Nível de opacidade do tecido
      description: Indica o grau de transparência do tecido, o que afeta as necessidades
        de sobreposição de camadas e de forro.
    fabric_patch_shape:
      name: Forma dos retalhos de tecido
      description: Descreve as formas dos retalhos incluídos no kit.
    fabric_repair_kit_application_method:
      name: Método de aplicação do kit de reparo de tecido
      description: Especifica como o reparo é aplicado ao tecido (por exemplo, com
        ferro de passar, costurado ou adesivo).
    fabric_repair_kit_components_included:
      name: Componentes incluídos no kit de reparo de tecido
      description: Lista os componentes específicos fornecidos no kit (por exemplo,
        retalhos, fios, agulha, adesivo).
    fabric_repair_kit_intended_use:
      name: Uso pretendido do kit de reparo de tecido
      description: Especifica a tarefa de reparo comum para a qual o kit foi projetado
        (por exemplo, rasgos, furos, bainhas).
    fabric_selling_format:
      name: Formato de venda do tecido
      description: Especifica como o tecido é vendido (comprimento contínuo, peça
        pré-cortada, rolo/bobina ou amostra).
    fabric_stretch_level:
      name: Nível de elasticidade do tecido
      description: Descreve o grau de elasticidade do tecido, auxiliando os compradores
        na escolha de tecidos adequados para peças de vestuário ajustadas ou projetos
        estruturados.
    fabric_stretch_type:
      name: Tipo de elasticidade do tecido
      description: Indica o desempenho elástico do tecido do calção de banho, importante
        para a mobilidade ao surfar ou nadar.
    fabric_texture:
      name: Textura do tecido
      description: Descreve a textura ou a estrutura da malha do tecido usado na blusa
        de roupa de descanso.
    fabric_use_case:
      name: Uso pretendido do tecido
      description: Uso pretendido principal para o pedaço/rolo de tecido de cetim.
    fabric_weight_class:
      name: Classe de peso do tecido
      description: Classifica a flanela por faixas de peso de uso típico para ajudar
        os compradores a fazer a filtragem sem saber o gramatura exata em g/m² ou
        oz.
    face_mask_material:
      name: Material da máscara facial
      description: Composição do material da máscara facial incluída com o capacete
        ou compatível com ele.
    face_mask_style:
      name: Estilo de máscara facial
      description: Define a forma geral ou o estilo de construção da máscara facial.
        Isso ajuda os compradores a encontrar o ajuste e a estética que preferem.
    face_mask_style_code:
      name: Código de estilo da máscara facial
      description: Define o estilo de barra estrutural ou a família de código do seto
        da máscara facial (por exemplo, ROPO, OPO, RJOP).
    face_protection_type:
      name: Tipo de proteção facial
      description: Indica o tipo de proteção facial fornecido com o capacete ou integrado
        a ele, como grades ou viseiras.
    faceplate_security_features:
      name: Recursos de segurança do painel frontal
      description: Reúne recursos de prevenção de roubo e de acesso relacionados à
        placa frontal, indo além do design básico.
    facing_length:
      name: Comprimento frontal
      description: Especifica o comprimento da abertura (comprimento da curva) do
        bocal, afetando a resposta e a escolha da palheta.
    fan_shroud_type:
      name: Tipo de proteção do ventilador
      description: Especifica o estilo de cobertura/geometria da proteção do ventilador
        (por exemplo, completa, parcial ou em anel).
    farming_method:
      name: Método de cultivo
      description: Destaca as práticas de bem-estar animal ou de criação utilizadas
        para criar os animais, como criação ao ar livre ou orgânica.
    farming_practice:
      name: Prática de cultivo
      description: Identifica o principal método de cultivo utilizado para o produto
        (por exemplo, convencional, orgânico, hidropônico).
    fascinator_style:
      name: Estilo do fascinator
      description: Descreve o design estrutural ou a forma do fascinator para que
        os compradores possa filtrar de forma rápida por estilos populares de chapelaria.
    fastener_grade:
      name: Grau de fixação
      description: Indica o grau/classe de resistência do parafuso, como Grau 8 ou
        Classe 10.9, que determina a capacidade de carga.
    fat_rendering_state:
      name: Estado de derretimento da gordura
      description: Especifica se a gordura está derretida, não derretida (crua) ou
        parcialmente derretida. Isso afeta a validade e as aplicações culinárias.
    fat_source:
      name: Fonte de gordura
      description: Identifica a principal fonte de gordura utilizada na produção da
        manteiga, ghee ou margarina (animal ou vegetal), auxiliando na identificação
        de alergias e na filtragem alimentar.
    faucet_hole_configuration:
      name: Configuração dos orifícios da torneira
      description: Indica o número e a posição dos orifícios pré-perfurados para torneira
        de bancada.
    feather_application:
      name: Aplicação da pena
      description: Uso ou aplicação principal pretendida das penas de peru para artesanato
        ou fabricação.
    feather_attachment_format:
      name: Fixação/formato das penas
      description: Indica como as penas sintéticas são preparadas/vendidas para uso
        (soltas, em corda, em fita etc.).
    feather_coloration_style:
      name: Estilo de coloração as penas
      description: 'Descreve como a cor é aplicada/aparece nas penas (ex.: sólida,
        com a ponta tingida, em degradê), independentemente do valor da cor de base.'
    feather_component:
      name: Componente da pena
      description: 'Especifica qual parte/estilo de pena de pavão está sendo vendido
        (ex.: pena do olho vs. pena da plumagem).'
    feather_curvature:
      name: Curvatura da pena
      description: Formato/perfil geral da curvatura da pena.
    feather_finish:
      name: Acabamento das penas
      description: Indica se as penas de avestruz são naturais ou se foram processadas
        (por exemplo, tingidas ou branqueadas) para uso decorativo.
    feather_form:
      name: Forma da pena
      description: Especifica a forma física das peças de penas de ganso que estão
        sendo vendidas.
    feather_grade:
      name: Classificação da pena
      description: Classificação geral de qualidade/seleção da pena para uso artesanal
        ou decorativo.
    feather_part:
      name: Parte de pena
      description: A parte/estrutura da pena de peru que está sendo vendida (comum
        em listagens de suprimentos para artesanato e atado de iscas).
    feather_processing_type:
      name: Tipo de processamento da pena
      description: 'Indica como as penas foram processadas/tratadas para uso artesanal
        (ex.: tingidas, branqueadas, naturais/sem tingimento).'
    feather_product_form:
      name: Forma do produto de penas
      description: 'O formato físico/corte do produto de penas tal como é vendido
        (ex.: penas soltas vs. estolas vs. franjas).'
    feather_quantity_unit:
      name: Unidade de quantidade de penas
      description: 'Define como o produto é vendido (ex.: por unidade, por peso, por
        maço) para facilitar a comparação entre as listagens.'
    feather_source:
      name: Origem da pena
      description: Especifica a origem animal das penas utilizadas nas petecas de
        penas.
    feather_stiffness:
      name: Rigidez da pena
      description: Rigidez relativa das barbas/estruturas das penas.
    feed_mechanism:
      name: Mecanismo de alimentação
      description: Indica como as bolas são alimentadas na máquina de arremesso.
    feed_purpose:
      name: Objetivo da alimentação
      description: Descreve o principal objetivo nutricional ou funcional do alimento
        ou suplemento.
    feeder_mechanism_type:
      name: Tipo de mecanismo de alimentação
      description: Identifica o mecanismo de distribuição que o alimentador utiliza
        para liberar a ração.
    feijoa_cultivar:
      name: Cultivar de feijoa
      description: Identifica a cultivar ou variedade específica de feijoa, pois diferentes
        cultivares oferecem sabores, tamanhos e épocas de colheita distintos.
    felt_duty:
      name: Resistência do feltro
      description: 'Especifica a classificação do tipo de feltro da bola de tênis
        (ex: alta resistência, regular), o que afeta a durabilidade em diferentes
        superfícies.'
    felting_mold_intended_use:
      name: Uso pretendido do molde para feltragem
      description: O que o molde se destina a criar ou para o que deve ser usado em
        projetos de feltragem.
    felting_pad_surface_material:
      name: Material da superfície da base de feltro
      description: Material utilizado na superfície de trabalho da almofada/base de
        feltragem que entra em contato com a fibra/agulha.
    fencing_certification:
      name: Certificação de esgrima
      description: Lista as aprovações oficiais do órgão regulador que a arma de esgrima
        atende (por exemplo, FIE, USFA), indicando a legalidade da competição e os
        padrões de qualidade.
    fencing_connector_type:
      name: Tipo de conector de cerca
      description: Especifica a configuração do conector usada para fixar cordas,
        soquetes ou carretéis de cercas (por exemplo, 2 pinos, 3 pinos, baioneta),
        o que garante a compatibilidade dos componentes.
    fencing_discipline:
      name: Modalidade de esgrima
      description: Especifica a arma ou modalidade de esgrima para a qual o produto
        foi projetado ou com a qual é compatível.
    fencing_weapon_type:
      name: Tipo de arma de esgrima
      description: Especifica o estilo de arma de esgrima ou de treino com o qual
        o acessório de treinamento é compatível ou que representa. Isso ajuda os usuários
        a encontrar o equipamento adequado.
    fender_finish_state:
      name: Estado do acabamento do para-lama
      description: Indica a condição de acabamento/superfície fornecida do para-lama
        quanto à prontidão para pintura e instalação.
    fender_pieces_included:
      name: Peças de proteção incluídas
      description: A lista de componentes fornecidos com o produto para esclarecer
        se é um para-lama individual ou um conjunto completo com acessórios.
    fender_type:
      name: Tipo de para-lama
      description: Classifica o design ou estilo geral do para-lama.
    fennel_trimming:
      name: Limpeza e corte do funcho/erva-doce
      description: Indica quais partes da planta estão incluídas com o bulbo de funcho
        (por exemplo, com as folhas, a parte superior aparada e a raiz).
    fennel_variety:
      name: Variedade de funcho
      description: Especifica a cultivar ou a variedade de mercado dos bulbos de funcho
        que estão sendo vendidos.
    fermentation_application:
      name: Aplicação de fermentação
      description: 'Identifica o principal alimento ou bebida que a cultura foi projetada
        para fermentar (ex.: queijo, iogurte, kefir de leite, fermento natural etc.).'
    fermentation_method:
      name: Método de fermentação
      description: Especifica como o molho de soja foi produzido ou fermentado (por
        exemplo, fermentado naturalmente, hidrolisado quimicamente).
    fermentation_vessel_material:
      name: Material do recipiente de fermentação
      description: Material principal do recipiente de fermentação incluído no kit
        (se houver).
    ferrule_material:
      name: Material da virola
      description: 'Especifica o material usado na virola da vara/cabo (ex: Juma,
        fenólico, policarbonato, XTC ou nenhum), o que afeta a durabilidade e a sensação
        da tacada.'
    fia_homologation_certification:
      name: Homologação/certificação FIA
      description: Indica se o carro (ou célula de segurança) é certificado/homologado
        e segundo qual norma.
    fiber_animal_source_type:
      name: Tipo de origem/animal da fibra
      description: A fibra é de origem animal ou primária (ou sintética), como lã
        merino, alpaca ou fibras vegetais.
    fiber_luster_level:
      name: Nível de brilho da fibra
      description: Brilho visual da fibra, variando de fosco a alto brilho.
    fiber_preparation_processing_stage:
      name: Etapa de preparação/processamento da fibra
      description: 'Indica como a mecha foi preparada/processada para uso (ex.: cartão
        vs. penteada, misturada, superlavada).'
    fiber_preparation_type:
      name: Tipo de preparação de fibra
      description: 'Identifica como a fibra foi preparada para o artesanato (ex: manta
        cardada, cardada em tambor, folha de pré-feltro).'
    field_hockey_ball_playing_surface:
      name: Superfície de jogo da bola de hóquei em campo
      description: Identifica a superfície ou o ambiente de jogo para o qual a bola
        foi projetada.
    field_hockey_ball_type:
      name: Tipo de bola de hóquei em campo
      description: Classifica a bola de hóquei em campo de acordo com seu uso pretendido
        ou característica especial.
    field_hockey_goal_size_standard:
      name: Tamanho padrão do gol de hóquei em campo
      description: Classifica o gol de acordo com os padrões comuns do hóquei em campo
        ou tamanhos de treinamento (por exemplo, regulamento FIH para jogos ao ar
        livre, juvenil, mini).
    field_hockey_training_objective:
      name: Objetivo do treino de hóquei em campo
      description: Define a principal habilidade ou área de foco que o auxílio de
        treinamento visa aprimorar.
    field_point_attachment_method:
      name: Método de fixação de ponto de campo
      description: 'Indica como a ponta de treino é fixada à haste ou ao inserto da
        flecha (ex.: rosqueada, colada).'
    field_point_tip_style:
      name: Estilo de ponta de campo
      description: Define o estilo geométrico ou perfil funcional da ponta da arma
        de fogo, o que afeta a penetração, o esforço de remoção e a legalidade.
    fielding_glove_position:
      name: Posição da luva de campo
      description: Identifica a posição defensiva ou o uso para o qual a luva foi
        projetada no beisebol ou no softebol.
    fielding_training_focus:
      name: Foco do treinamento em campo
      description: Especifica a principal área de habilidade que o equipamento visa
        aprimorar durante os treinos.
    fig_variety:
      name: Variedade de figo
      description: Identifica a cultivar ou variedade específica do figo que está
        sendo vendido.
    figure_8_device_design:
      name: Design do freio oito
      description: Identifica a configuração específica do freio oito, o que afeta
        as características de manuseio e o uso pretendido.
    figure_finish_type:
      name: Tipo de acabamento da miniatura
      description: Indica o acabamento da superfície/pintura da miniatura do modelo
        do cavalo (como ela se apresenta/é considerada como item de colecionador).
    figurine_scale:
      name: Escala da estatueta
      description: Escala/proporção da estatueta em relação à entidade real (quando
        aplicável), por exemplo, 1:6.
    fill_status:
      name: Status de enchimento
      description: Indica se o boneco de treino de luta é vendido pré-enchido, vazio
        ou parcialmente cheio, o que determina o custo de frete e o esforço do comprador.
    filling_consistency:
      name: Consistência de recheio
      description: Descreve a textura ou viscosidade do recheio fornecido (por exemplo,
        creme liso, pedaços de fruta, pasta).
    filling_type:
      name: Tipo de recheio
      description: Especifica o recheio principal ou creme dentro dos biscoitos, se
        houver.
    filtration_and_mother_status:
      name: Filtragem e estado da mãe
      description: Indica se o vinagre é filtrado, não filtrado, cru ou contém a “mãe“,
        atendendo aos consumidores que buscam opções probióticas ou cruas.
    filtration_method:
      name: Método de filtragem
      description: Material ou técnica utilizada para filtrar e purificar a vodka
        após a destilação.
    fin_box_system:
      name: Sistema de caixa de quilhas
      description: Especifica a caixa de quilhas ou a interface de montagem que a
        prancha utiliza, determinando a compatibilidade com quilhas de reposição.
    fin_buoyancy:
      name: Flutuabilidade das barbatanas
      description: Indica se a barbatana apresenta flutuabilidade positiva, neutra
        ou negativa na água, o que afeta o equilíbrio do mergulhador e o equilíbrio
        do equipamento.
    fin_flex_rating:
      name: Índice de flexibilidade da quilha
      description: Indica o nível relativo de rigidez ou flexibilidade da quilha,
        o que afeta o desempenho geral.
    fin_mounting_system:
      name: Sistema de montagem da quilha
      description: Define a interface ou padrão de fixação usado para prender a quilha
        à prancha de kitesurf (por exemplo, FCS II, rosca, 4 furos), garantindo a
        compatibilidade entre quilhas e pranchas.
    fin_position:
      name: Posição da quilha
      description: Especifica a posição de montagem pretendida da quilha na prancha.
    fin_strap_type:
      name: Tipo de tira da quilha
      description: Especifica o estilo de tira ou sistema de retenção usado para fixar
        a quilha ao calcanhar/pé.
    fin_template:
      name: Modelo da quilha
      description: Classifica o modelo hidrodinâmico ou o formato da quilha da prancha
        de surf, influenciado o estilo de curva, a velocidade e a sensação geral na
        prancha.
    finger_count:
      name: Contagem de dedos
      description: Indica o número de dedos para os quais a luva, a aba ou a alça
        de liberação foi projetada.
    finger_coverage:
      name: Cobertura dos dedos
      description: Indica a área dos dedos que está coberta.
    finger_grip_adjustability:
      name: Ajuste de aderência dos dedos
      description: Indica como o apoio para os dedos se fixa ou se ajusta para se
        adaptar a diferentes tamanhos de mão.
    finger_hole_configuration:
      name: Configuração dos orifícios para os dedos
      description: Especifica a orientação da mão em relação aos orifícios para os
        dedos (destro, canhoto ou ambidestro).
    finger_hole_count:
      name: Contagem de orifícios para os dedos
      description: Indica o número de orifícios para os dedos no couro da empunhadura,
        uma diferença fundamental entre os modelos sem dedos, com 2, 3 e 4 orifícios.
    finger_pick_band_style:
      name: Estilo de banda com palhetas de dedo
      description: O estilo da faixa/laço que se prende ao dedo influencia o conforto
        e o ajuste.
    finger_pick_blade_length:
      name: Comprimento da lâmina da palheta de dedo
      description: Comprimento da lâmina de palheta a partir da banda.
    finger_pick_blade_shape:
      name: Formato da lâmina do dedal
      description: Forma/perfil da superfície de contato (lâmina) da palheta que toca
        a corda.
    finger_pick_size:
      name: Tamanho da palheta
      description: Ajuste do tamanho da alça/laço da palheta para se adaptar a diferentes
        circunferências do dedo ou do polegar (não ao tamanho do instrumento).
    finger_pick_wear_location:
      name: Local de uso da palheta
      description: Indica em qual dedo a palheta deve ser usada, ou se o produto é
        um conjunto para polegar e indicador.
    finger_protection:
      name: Proteção de dedo
      description: Indica se a luva possui proteção nos dedos e se essas proteções
        são removíveis.
    fingerboard_bearing_type:
      name: Tipo de rolamento para fingerboard
      description: Especifica o tipo de rolamento usado nas rodas do fingerboard.
    fingerboard_grip_type:
      name: Tipo de aderência da escala do violão
      description: Especifica o material/tipo da superfície de aderência utilizada
        no shape do fingerboard.
    fining_agent_active_ingredient:
      name: Ingrediente ativo do agente clarificante
      description: Agente clarificante primário utilizado no produto.
    fining_agent_type:
      name: Tipo de agente clarificante
      description: Especifica a composição química ou o material do agente clarificante
        para produtos que clarificam vinho vermelho.
    finish_after_baking:
      name: Acabamento após o cozimento
      description: Descreve a aparência típica da superfície após a cura/cozimento.
    finish_effect:
      name: Efeito final
      description: Descreve efeitos especiais de superfície/ópticos aplicados ao strass.
    finish_type:
      name: Tipo de acabamento
      description: Acabamento superficial aplicado ao corpo do ukulele.
    finished_product_format:
      name: Formato do produto final
      description: Especifica o tipo de produto de fragrância que o kit se destina
        a fabricar.
    fire_pit_accessories_included:
      name: Acessórios para fogueira incluídos
      description: Enumera os acessórios mais importantes fornecidos com a fogueira,
        como telas protetoras contra faíscas ou pedras de lava, esclarecendo o que
        vem na embalagem.
    firework_assortment_launch_type:
      name: Tipo de lançamento de conjuntos de fogos de artifício
      description: Descreve como os fogos de artifício incluídos normalmente são acesos/lançados.
    firework_assortment_types_included:
      name: Tipos de conjuntos de fogos de artifício incluídos
      description: Identifica os principais tipos de fogos de artifício incluídos
        no conjunto para ajudar os compradores a comparar o conteúdo do pacote (por
        exemplo, fontes, velas romanas, bombinhas).
    firework_effect_types:
      name: Tipos de efeitos dos fogos de artifício
      description: Principais famílias de efeitos visuais e/ou sensoriais produzidos
        pelo conjunto (selecionar todas as que se aplicam).
    firework_ignition_method:
      name: Método de ignição de fogos de artifício
      description: Especifica como o fogo de artifício é aceso ou iniciado (por exemplo,
        pavio ou fósforo elétrico).
    firework_visual_intensity_level:
      name: Nível de intensidade visual dos fogos de artifício
      description: Intensidade/volume visual geral da faísca para o efeito de fonte.
    firing_mode:
      name: Modo de disparo
      description: Lista os modos de disparo selecionáveis ou primários da pistola
        de airsoft.
    first_day_cover_cachet_type:
      name: Tipo de carimbo de envelope de primeiro dia
      description: Tipo de carimbo no envelope de primeiro dia (por exemplo, impresso,
        pintado à mão).
    first_day_cover_cancellation_type:
      name: Tipo de carimbo do envelope de primeiro dia
      description: 'Tipo/estilo de cancelamento postal aplicado no envelope de primeiro
        dia (ex.: cancelamento mecânico, cancelamento manual).'
    first_day_cover_set_type:
      name: Tipo de conjunto de capa de primeiro dia
      description: Indica se a capa representa uma única edição, uma coleção completa
        ou uma seleção/combinação de edições.
    fishing_hook_size:
      name: Tamanho do anzol
      description: Especifica a designação padronizada do tamanho do anzol (por exemplo,
        nº 4, 1/0, 10/0), ajudando os pescadores a combinar a dimensão do anzol com
        a espécie-alvo e a isca.
    fishing_hook_style:
      name: Estilo de anzol
      description: Identifica o design específico ou o padrão de curvatura do anzol
        individual, o que afeta a apresentação, a eficiência do encaixe e a aplicação
        pretendida.
    fishing_hook_type:
      name: Tipo de anzol
      description: Descreve a configuração do anzol fornecida com a colher de pesca
        (se houver).
    fishing_line_application:
      name: Aplicação da linha de pesca
      description: Identifica a finalidade de uso da linha de pesca ou do material
        do líder (por exemplo, líder, linha principal, tippet).
    fishing_line_buoyancy_type:
      name: Tipo de flutuabilidade da linha de pesca
      description: Classifica o comportamento da linha na coluna de água (por exemplo,
        flutuante, intermediária, afundante), ajudando os pescadores a escolher a
        apresentação adequada em termos de profundidade.
    fishing_needle_purpose:
      name: Finalidade da agulha de pesca
      description: Identifica a principal aplicação da agulha em tarefas de montagem
        de equipamentos de pesca.
    fishing_needle_types_included:
      name: Tipos de agulhas de pesca incluídos
      description: Lista os tipos específicos de agulhas ou ferramentas de montagem
        incluídos no conjunto, para que os clientes possam verificar de forma rápida
        o conteúdo do kit.
    fit_profile:
      name: Perfil de ajuste
      description: Descreve o corte e a silhueta geral da almofada, o que afeta a
        mobilidade e a cobertura.
    fit_volume_classification:
      name: Classificação de volume de ajuste
      description: Classifica o volume interno total da bota por mercado e marca (por
        exemplo, BV para baixo volume).
    fitting_angle:
      name: Ângulo de encaixe
      description: Especifica o ângulo de curvatura do corpo da conexão (por exemplo,
        reto, 45°, 90°). Use “Ajustável/giratório” para conexões com ângulo variável
        e “Outro” para ângulos incomuns.
    flag_base_type:
      name: Tipo base da bandeira
      description: Define o tipo de ancoragem ou base utilizada para fixar a bandeira
        de escanteio em diferentes superfícies de jogo.
    flag_design_theme:
      name: Tema do design da bandeira
      description: Descreve o tema principal do design representado na bandeira (por
        exemplo, país/nacionalidade, equipe esportiva, feriado), auxiliando na descoberta
        e filtragem para compras baseadas em intenção.
    flag_mounting_method:
      name: Método de montagem da bandeira
      description: Especifica como a bandeira é fixada ao veículo (por exemplo, suporte
        de antena, suporte de engate, magnética).
    flag_type:
      name: Tipo de bandeira
      description: Classifica o propósito ou estilo específico da bandeira de golfe,
        como bandeira fixa, bandeira de carrinho ou bandeira de treino.
    flame_resistance_standard:
      name: Padrão de resistência a chamas
      description: Indica a norma ou certificação específica de resistência ao fogo
        ou à descarga elétrica que a peça de vestuário cumpre.
    flamenco_cajon_snare_system:
      name: Sistema de caixa de cajón flamenco
      description: Especifica o mecanismo interno da caixa usado para criar o zumbido
        característico do flamenco (ou nenhum).
    flammability_compliance:
      name: Conformidade com os requisitos de inflamabilidade
      description: Especifica as normas de inflamabilidade aplicáveis que o tecido
        atende para interiores de veículos.
    flannel_brushing_finish:
      name: Acabamento escovado da flanela
      description: Indica se a flanela é escovada e em quais) lados, o que afeta a
        maciez, o calor e a aparência.
    flannel_use_type:
      name: Tipo de uso da flanela
      description: Aplicação principal pretendida para o corte/rolo de flanela.
    flap_configuration:
      name: Configuração da aba
      description: Especifica o estilo da aba da sela, como aba única ou aba dupla.
    flare_color:
      name: Cor do sinalizador
      description: Cor da luz/chama emitida pelo sinalizador (ou cor da lente para
        sinalizadores de LED).
    flash_card_included_features:
      name: Recursos incluídos nos cartões de memorização
      description: Destaca os recursos funcionais de aprendizado/uso incluídos nos
        cartões de memorização.
    flavor_intensity:
      name: Intensidade do sabor
      description: Indica a concentração do produto aromatizante, ajudando os usuários
        a determinar a dosagem adequada (por exemplo, concentração padrão, extra etc.).
    flavor_solvent_base:
      name: Base de solvente de sabor
      description: 'Identifica o transportador ou solvente primário utilizado no aromatizante
        (ex.: álcool, propilenoglicol, glicerina).'
    fleece_fiber_animal_type:
      name: Tipo de animal da fibra de lã
      description: A espécie animal que fornece a fibra da lã.
    fleece_finish_surface:
      name: Acabamento/superfície da lã
      description: 'Descreve a superfície/acabamento da lã (ex: anti-pilling, escovada),
        o que afeta a formação de bolinhas, a maciez e a aparência.'
    fleece_preparation_method:
      name: Método de preparação da lã
      description: Como a lã é preparada/processada para artesanato e fiação (estado
        da fibra).
    flesh_color:
      name: Cor da polpa
      description: Especifica a cor da polpa interna do melão.
    fletching_orientation:
      name: Orientação da plumagem/flechamento
      description: Especifica como as penas são fixadas na haste (por exemplo, retas,
        deslocadas, helicoidais), o que afeta a rotação e o voo da flecha.
    fletching_profile:
      name: Perfil de flechamento
      description: Define o formato geométrico ou corte das penas, o que afeta o arrasto,
        a folga de passagem, o ruído e as características gerais de voo da flecha.
    flight_system_type:
      name: Tipo de sistema de voo
      description: Identifica o estilo de construção da rabiola, distinguindo entre
        sistemas dobráveis, moldados e de rabiola e haste integradas.
    float_attachment_method:
      name: Método de fixação de flutuação
      description: Descreve como a boia é fixada à linha (por exemplo, deslizante
        ou fixa), permitindo que os pescadores filtrem por estilo de montagem.
    float_design:
      name: Design da boia
      description: Classifica o estilo ou tipo geral da boia de pesca (por exemplo,
        boia de arremesso, boia waggler, boia tipo lápis) para que os pescadores possam
        escolher de forma rápida um modelo adequado à técnica e condição física deles.
    float_raft_use_environment:
      name: Ambiente de uso da boia/balsa
      description: Configurações principais para uso do inflável na água (piscina
        vs. águas calmas em mar aberto vs. ondas), o que reflete as expectativas de
        durabilidade e design.
    floatation:
      name: Flutuação
      description: Indica se o farol foi projetado para flutuar na água.
    floor_construction_type:
      name: Tipo de construção do piso
      description: 'Especifica o design do piso da balsa (ex: com drenagem automática,
        costura rebaixada/drop-stitch), o que afeta o escoamento, a rigidez e o desempenho.'
    floor_design:
      name: Design do piso
      description: Estilo de aterramento/isolamento fornecido com a carcaça.
    floor_inclusion:
      name: Inclusão de piso
      description: Indica se o vestíbulo inclui um piso e se esse piso é removível.
    floor_mat_cleaning_method:
      name: Método de limpeza de tapetes
      description: Indica o método de limpeza principal recomendado pelo fabricante
        para o tapete.
    floor_mat_edge_style:
      name: Estilo de borda do tapete
      description: Descreve se o tapete possui bordas elevadas/abas para conter derramamentos
        e detritos.
    floor_mat_format:
      name: Formato do tapete
      description: 'Define o formato físico ou estilo do produto de proteção de piso
        (ex.: tapete individual, bloco de encaixe, rolo).'
    floor_mat_retention_system:
      name: Sistema de retenção do tapete
      description: Especifica o método utilizado para manter o tapete fixo no lugar.
    floor_mat_set_configuration:
      name: Configuração do conjunto do tapete
      description: 'Indica quais posições estão incluídas no pacote (ex.: pare apenas
        para frente, conjunto completo).'
    floss_sugar_granulation_grade:
      name: Grau de granulação do açúcar para algodão-doce
      description: Descreve o tamanho dos cristais da mistura de açúcar (fino, médio,
        grosso), o que pode afetar o desempenho da máquina e a textura final.
    floss_sugar_product_form:
      name: Forma do produto de açúcar do algodão-açúcar
      description: Indica se o açúcar para algodão-doce está pronto para uso, se é
        um concentrado de sabor que deve ser misturado com açúcar de base ou se é
        um açúcar de base incolor.
    flour_grind_texture:
      name: Textura da moagem da farinha
      description: Indica o tamanho da moagem ou a textura da farinha, como superfina,
        média, grossa ou moída em pedra, o que pode afetar o desempenho da receita.
    flour_processing_method:
      name: Método de processamento da farinha
      description: Identifica os principais métodos de processamento ou tratamento
        aplicados à farinha (por exemplo, moída em pedra, branqueada, germinada, enriquecida),
        o que influencia o sabor, a cor ou os valores nutricionais.
    flower_care_instructions:
      name: Instruções de cuidado com as flores
      description: 'Fornece instruções de cuidado específicas para flores frescas
        cortadas (ex.: aparar os caules, alterar a frequência da rega).'
    flugelhorn_leadpipe_material:
      name: Material do tubo de entrada do flugelhorn
      description: Material do componente do tubo de sopro (se especificado separadamente
        do material geral do instrumento).
    flugelhorn_trigger_type:
      name: Tipo de gatilho do flugelhorn
      description: Indica se o flugelhorn inclui um gatilho de afinação e qual pompa/válvula
        ele opera.
    fluorescence_grade:
      name: Grau de fluorescência
      description: Indica a intensidade da fluorescência do diamante quando exposto
        à luz ultravioleta.
    fluorescence_under_uv:
      name: Fluorescência sob luz UV
      description: Indica se a amostra apresenta fluorescência e qual o seu tipo sob
        luz ultravioleta.
    fluorocarbon_content:
      name: Conteúdo de fluorocarbono
      description: Indica se a cera contém aditivos de fluorocarbono e em que nível.
    flute_case_capacity:
      name: Capacidade do estojo para flauta
      description: 'Indica o que o estojo foi projetado para conter, além do corpo
        principal da flauta (ex.: flauta + piccolo, boquilha extra).'
    flute_cleaning_rod_tip_type:
      name: Tipo de ponta da vareta de limpeza da flauta
      description: 'Descreve o desenho da extremidade da haste que segura o pano/cotonete
        ou entra em contato com o instrumento (ex.: ranhurada, rosqueada, ilhós).'
    flute_footjoint_type:
      name: Tipo de pé de flauta
      description: Especifica a configuração do pé da flauta.
    flute_headjoint_cork_type:
      name: Tipo de cortiça para a cabeça da flauta
      description: Especifica o material/tipo do conjunto de cortiça e boquilha de
        afinamento fornecido com a boquilha.
    flute_key_system:
      name: Sistema de chaves da flauta
      description: 'Identifica o sistema mecânico/de chaves utilizado pela flauta
        (ex.: sistema Boehm), se aplicável.'
    flute_keywork_material:
      name: Material das chaves da flauta
      description: Material e/ou banho das chaves (mecanismo), quando especificado
        separadamente do material do corpo.
    flute_offset_g:
      name: Flauta com chave de Sol deslocada
      description: Especifica se a flauta possui um layout de chaves G deslocado.
    flute_wall_thickness:
      name: Espessura da parede da flauta
      description: Categoria de espessura da parede do tubo da flauta (parede fina,
        padrão, parede grossa).
    fly_pattern_type:
      name: Tipo de isca artificial
      description: Classifica a mosca artificial de acordo com seu estilo de pesca
        ou imitação de inseto/forragem para ajudar os pescadores a filtrar de forma
        rápida o estilo de mosca/isca correto.
    fly_rod_style:
      name: Estilo da vara de pesca com mosca
      description: 'Classifica a vara por sua modalidade de arremesso ou aplicação
        pretendida (ex: Mão única/Single-hand, Switch, Spey).'
    fly_style:
      name: Estilo da abertura na frente
      description: Especifica o tipo de abertura frontal ou de braguilha na parte
        inferior do Long John.
    fly_tying_tools_included:
      name: Ferramentas para confecção de moscas/iscas artificiais incluídas
      description: Lista as ferramentas específicas para confecção de moscas artificiais
        fornecidas no conjunto, para que os compradores saibam exatamente o que está
        incluído e possam comparar os pacotes.
    fly_type:
      name: Tipo de braguilha/abertura frontal
      description: Especifica se a parte de baixo do macacão inclui uma abertura frontal
        funcional e o estilo dessa abertura.
    flyer_hook_mounting_method:
      name: Método de montagem do gancho na asa
      description: 'Como o gancho se fixa à asa (ex: rosqueado vs. encaixe por pressão),
        o que afeta a facilidade de instalação e a compatibilidade.'
    flyer_hook_orientation:
      name: Orientação do gancho da sala
      description: Indica se o gancho se destina ao lado esquerdo ou direito da asa,
        ou se é reversível/universal.
    flyer_kit_finish_coating:
      name: Acabamento/revestimento do kit da asa
      description: Acabamento superficial aplicado aos componentes do kit da asa.
    flyer_kit_included_components:
      name: Componentes incluídos no kit da asa
      description: Identifica as peças incluídas no kit.
    flyer_orifice_type:
      name: Tipo de orifício da asa
      description: Especifica o tipo de orifício usado na asa.
    flying_disc_feature_set:
      name: Conjunto de recursos do disco voador
      description: Características funcionais notáveis do disco voador.
    flysheet_material:
      name: Material da folha de proteção
      description: Identifica o tecido principal utilizado na barraca externa/cobertura,
        o que influencia o peso, a durabilidade e a resistência às intempéries.
    flywheel_balance_type:
      name: Tipo de equilíbrio do volante
      description: Indica se o volante é neutro ou utiliza um contrapeso externo.
    foam_blocks_size_class:
      name: Classe de tamanho de blocos de espuma
      description: Indica a classe geral de tamanho dos blocos no conjunto.
    foam_blocks_surface_texture:
      name: Textura da superfície dos blocos de espuma
      description: Descreve a textura/acabamento da superfície externa dos blocos
        de espuma.
    foam_surface_effect:
      name: Efeito da superfície de espuma
      description: Descreve efeitos decorativos comuns aplicados à superfície de espuma
        artesanal ou isopor, como acabamentos com glitter, metálicos ou holográficos.
    foil_color:
      name: Cor da folha metálica
      description: Especifica a cor de destaque da folha metálica usada no certificado
        (se aplicável).
    foil_curtain_mounting_method:
      name: Método de montagem de cortina de folha metálica
      description: 'Como a cortina metálica deve ser instalada ou pendurada (ex.:
        fita adesiva, ilhós).'
    foil_discipline:
      name: Modalidade de foil
      description: Identifica o estilo principal de navegação ou a modalidade para
        a qual o foil foi projetado.
    foil_mast_board_mounting_type:
      name: Tipo de montagem da prancha com mastro de foil
      description: Define a interface no topo do mastro que se conecta à prancha ou
        ao foil.
    foil_mast_fuselage_connection_type:
      name: Tipo de conexão da fuselagem do mastro do foil
      description: Especifica como o mastro se conecta à fuselagem ou ao conjunto
        da asa dianteira.
    foil_mounting_interface:
      name: Interface de montagem de folha metálica
      description: Identifica o padrão de conexão que o componente utiliza para se
        fixar à placa ou a outros componentes do foil.
    foil_mounting_system:
      name: Sistema de montagem da de folha metálica
      description: Especifica a interface de montagem para foils ou quilhas na prancha,
        garantindo a compatibilidade com os equipamentos já existentes do praticante.
    foil_mounting_type:
      name: Tipo de montagem de folha metálica
      description: Identifica o sistema de interface usado para fixar o foil à prancha,
        garantindo a compatibilidade entre os componentes.
    fold_over_elastic_application:
      name: Aplicação do elástico dobrável
      description: Uso/aplicação principal pretendida para o elástico de casa de botão.
    foldability:
      name: Capacidade de dobrar
      description: Descreve se e como o divisor se dobra ou se recolhe para armazenamento
        ou reconfiguração.
    foldability_stow:
      name: Capacidade de dobrar (acondicionamento)
      description: Indica se o suporte se dobra ou se retrai quando não está em uso
        (por exemplo, se dobra contra o veículo).
    folding_style:
      name: Estilo de dobra
      description: Indica como o colchão de impacto se dobra para transporte e armazenamento,
        afetando a uniformidade da superfície de aterrissagem e a facilidade de empacotamento.
    food_basket_items_included:
      name: Itens incluídos com a cesta de alimentos
      description: Lista os principais tipos de itens alimentares incluídos na cesta
        para ajudar os compradores a escolher cestas que correspondam ao gosto ou
        às necessidades alimentares dos destinatários.
    food_coloring_form:
      name: Forma do corante alimentar
      description: Especifica a forma física ou formato de entrega em que o corante
        alimentar é fornecido (por exemplo, gel, líquido, pó, spray).
    food_contact_material:
      name: Material para contato com alimentos
      description: Material principal dos equipamentos de vinificação (fermentadores,
        sifões, funis) utilizados com mosto/vinho.
    food_packing_medium:
      name: Meio de embalagem de alimentos
      description: Especifica o meio em que as frutas ou vegetais são embalados (por
        exemplo, água, salmoura, xarope, óleo).
    foosball_rod_type:
      name: Tipo de haste de pebolim
      description: Indica a configuração mecânica da haste que afeta a sensação de
        jogo e a segurança.
    foot_arch_type_compatibility:
      name: Compatibilidade com o tipo de arco do pé
      description: Identifica o perfil do arco do pé para o qual a palmilha foi projetada.
    foot_arch_type_suitability:
      name: Adequação ao tipo de arco do pé
      description: Identifica a qual perfil de arco plantar a palmilha se destina.
    foot_coverage:
      name: Cobertura para os pés
      description: Indica se o artigo para as pernas tem pé, não tem pé, possui estribo
        ou calcanhar aberto.
    foot_guard_type:
      name: Tipo de proteção para o pé
      description: Indica se a caneleira inclui proteção para os dedos/pé e especifica
        se a proteção é fixa ou removível.
    foot_support_level:
      name: Nível de apoio para o pé
      description: Indica o nível de suporte estrutural ou firmeza que uma palmilha
        proporciona, como baixo, médio, alto ou extra-alto.
    footbag_play_style:
      name: Estilo de jogo de footbag
      description: Principal estilo de jogo pretendido para o footbag.
    football_ball_type:
      name: Tipo de bola de futebol americano
      description: Especifica o uso principal pretendido ou contexto para a bola de
        futebol, como jogo, treino ou exibição como item de coleção.
    football_dummy_type:
      name: Tipo de boneco de futebol americano
      description: Classifica o estilo ou design funcional do boneco para refletir
        sua finalidade específica de treinamento.
    football_glove_certification:
      name: Certificação de luvas de futebol americano
      description: Indica a certificação ou o cumprimento das normas exigidas para
        a prática competitiva (por exemplo, SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Tipo de montagem com estribo
      description: Especifica como a peseira se fixa à estrutura da cama ou ao chão,
        auxiliando os compradores na seleção de equipamentos e métodos de instalação
        compatíveis.
    footboard_style:
      name: Estilo de estribo
      description: Define o estilo de design estrutural ou estético da peseira da
        cama.
    footrest_adjustability:
      name: Ajuste do apoio para os pés
      description: Especifica se e como os apoios para os pés podem ser ajustados
        para acomodar diferentes comprimentos de perna da criança.
    footrest_type:
      name: Tipo de apoio para os pés
      description: Identifica a presença e o design de um apoio para os pés no banco.
    footstrap_configuration:
      name: Configuração da alça para os pés
      description: Especifica o padrão de inserção da alça de pé na plataforma da
        prancha.
    footswitch_action_style:
      name: Estilo de ação do pedal
      description: Indica se a ação do interruptor é momentânea ou de travamento,
        e se ele atende a ambas.
    footswitch_power_source:
      name: Fonte de alimentação do pedal
      description: Especifica como o pedal é alimentado, se aplicável (passivamente
        via entrada do amplificador, bateria, adaptador externo, USB etc.).
    footwear_construction_method:
      name: Método de construção de calçados
      description: Define a técnica utilizada para fixar a parte superior à sola,
        o que influencia a durabilidade, as possibilidades de ressolagem e o preço.
    footwear_cut:
      name: Corte do calçado
      description: Indica a altura da gola do tornozelo (corte baixo, corte médio,
        corte alto), equilíbrio de mobilidade e suporte.
    footwear_size_system:
      name: Sistema de tamanho de calçados
      description: Identifica o padrão de tamanho regional utilizado para o tamanho
        do sapato indicado (por exemplo, EUA, UE, Reino Unido).
    footwear_support_type:
      name: Tipo de suporte de calçado
      description: Especifica o nível de suporte biomecânico ou controle de pronação
        que o calçado proporciona (por exemplo, neutro, estabilidade, motion control/controle
        de movimento).
    fork_material:
      name: Material do garfo
      description: Especifica o material utilizado na suspensão dianteira de uma bicicleta,
        o que influencia a rigidez, o peso e a qualidade da pedalada.
    form_factor:
      name: Fator de forma
      description: Fator de forma dos equipamentos principais do controlador DMX.
    formula_car_series_class:
      name: Série/classe de carros de fórmula
      description: Especifica a série ou classe de corrida na qual o carro de fórmula
        foi construído para competir.
    formulation_style:
      name: Estilo de formulação
      description: Destaca as formulações especializadas, concebidas para usos específicos
        ou preferências (por exemplo, barista, extra cremoso).
    formulation_type:
      name: Tipo de formulação
      description: O estilo de formulação do spray desinfetante.
    fossil_preparation_level:
      name: Nível de preparação de fósseis
      description: Grau de preparação/limpeza realizado na amostra (por exemplo, não
        preparada na matriz vs. totalmente preparada).
    fossil_preservation_type:
      name: Tipo de preservação de fósseis
      description: Tipo de preservação do fóssil (por exemplo, permineralizado, molde,
        impressão).
    fossil_restoration_status:
      name: Status de restauração de fósseis
      description: Indica se e como o espécime foi reparado/restaurado (por exemplo,
        colado, reconstruído, composto).
    foundation_configuration:
      name: Configuração da base
      description: Especifica se a base é fabricada em peça única ou em conjunto dividido/de
        dudas peças para colchões maiores.
    foundation_profile:
      name: Perfil da base
      description: Classifica a categoria de altura geral da base (por exemplo, ultrabaixa,
        baixa, padrão ou alta) para que os compradores possam combinar rapidamente
        a altura do colchão com as preferências e o tamanho do lençol.
    frame_adjustability:
      name: Ajuste da moldura
      description: Indica se e como a estrutura pode ser ajustada (por exemplo, ajuste
        de largura/altura, rotação/inclinação), o que afeta a ergonomia e a adequação
        ao projeto.
    frame_drum_jingle_configuration:
      name: Configuração dos guizos do tambor de aro
      description: Indica se o tambor de aro inclui guizos e, em caso afirmativo,
        qual é a sua configuração geral.
    frame_drum_tuning_system:
      name: Sistema de afinação do tambor de aro
      description: Como o tambor de moldura é afinado ou se ele é afinável.
    frame_finish:
      name: Acabamento da estrutura
      description: Especifica o revestimento de proteção ou o acabamento do material
        aplicado à estrutura, o que influencia a durabilidade e a estética.
    frame_mounting_standard:
      name: Padrão de montagem da moldura
      description: 'Define a especificação da interface entre a bota e a base (ex:
        2 pontos de 195 mm, Trinity de 3 pontos), fundamental para a compatibilidade
        da base.'
    frame_steel_gauge:
      name: Espessura do aço da estrutura
      description: Identifica a espessura (bitola) do tubo de aço usado nas colunas
        da gaiola, um indicador crítico de resistência e estabilidade.
    frame_suspension_type:
      name: Tipo de suspensão do quadro
      description: Indica o tipo de suspensão do quadro da bicicleta, como rígido,
        hardtail ou suspensão total. Isso ajuda os compradores a escolher o quadro
        que melhor se adapta à sua configuração desejada.
    free_reed_instrument_orientation:
      name: Orientação do instrumento de palheta livre
      description: Especifica como o instrumento é segurado/tocado (portátil com fole,
        com alça de ombro, etc.) para fins de ergonomia e filtragem de uso.
    free_weight_rack_type:
      name: Tipo de suporte de peso livre
      description: 'Classifica o estilo estrutural ou a função do suporte (ex: suporte
        para barra, suporte para kettlebell, organizador de anilhas).'
    freehub_body_type:
      name: Tipo de corpo do freehub
      description: Especifica o padrão do corpo do freehub ou do driver do cassete
        compatível com o cubo traseiro da bicicleta.
    freehub_driver_standard:
      name: Padrão do driver do freehub
      description: 'Identifica a interface cassete/driver compatível com a peça do
        cubo atende (ex.: Shimano HG, SRAM XD).'
    freewheel_thread_standard:
      name: Padrão de rosca da catraca
      description: Especifica o padrão ou tamanho do cubo com o qual a catraca é compatível.
    french_horn_bell_construction:
      name: Construção da campana da trompa
      description: Especifica como a campana é construída e se ela pode ser removida
        para transporte/manutenção.
    french_horn_bell_material:
      name: Material da campana da trompa
      description: Especifica o material/liga da campana (e, com frequência, da abertura
        da campana) usada na trompa.
    french_horn_bell_type:
      name: Tipo de campana da trompa
      description: Estilo de construção da campana.
    french_horn_finish:
      name: Acabamento da trompa
      description: Acabamento/revestimento exterior do instrumento.
    french_horn_included_accessories:
      name: Acessórios incluídos com a trompa
      description: Acessórios incluídos com a trompa (estojo, boquilha etc.).
    french_horn_leadpipe_material:
      name: Material do tubo de entrada da trompa
      description: Especifica o material/liga do tubo de chumbo.
    french_horn_wrap_type:
      name: Tipo de capa para trompa
      description: Configuração geral da forma da trompa.
    fretboard_radius_fit:
      name: Ajuste do raio da escala
      description: Indica se a curvatura da almofada do capotraste foi projetada para
        escalas planas ou curvas, ou se é ajustável para acomodar vários raios de
        escala.
    friction_surface_included:
      name: Superfície de fricção incluída
      description: Indica se o volante inclui uma superfície de fricção substituível/instalada
        (por exemplo, inserto, anel) ou se é uma superfície de fricção de peça única.
    fringe_curtain_finish:
      name: Acabamento da cortina de franja
      description: Descreve o acabamento visual da superfície da franja (brilho/textura).
    fringe_curtain_material:
      name: Material para cortina de franja
      description: Especifica o material principal das faixas da cortina (por exemplo,
        película de polietileno tereftalato, plástico, papel, tecido).
    fringe_curtain_use_location:
      name: Local de uso da cortina de franja
      description: Indica se a cortina de franja se destina ao uso em espaços internos,
        externos ou ambos.
    fringe_trim_style:
      name: Estilo da franja
      description: Especifica a construção/estilo da franja (como os fios ou laços
        são formados e apresentados).
    front_axle_standard:
      name: Padrão do eixo dianteiro
      description: Indica o diâmetro e o espaçamento do eixo que o garfo foi projetado
        para aceitar (por exemplo, Boost 15 x 110 mm), o que garante a compatibilidade
        com o cubo.
    front_button_configuration:
      name: Configuração do botão frontal
      description: Indica o estilo dos botões frontais de um paletó, especificando
        se é de abotoamento simples ou duplo e o número de botões frontais.
    front_closure_style:
      name: Estilo de fecho frontal
      description: Indica o estilo da construção frontal do sobretudo, como o abotoamento
        simples ou duplo, aberto, transpassado ou zíper.
    front_decoration_type:
      name: Tipo de decoração frontal
      description: 'Identifica o tipo de enfeite ou aplique presente na parte frontal
        do chapéu (ex.: aplique bordado, aplique de couro).'
    front_point_configuration:
      name: Configuração do ponto frontal
      description: Especifica o design das pontas frontais (monoponta, ponta dupla,
        modular, substituível), o que influencia a precisão de penetração no gelo
        e em terreno misto.
    front_seat_position:
      name: Posição do assento dianteiro
      description: Para qual lado/posição na fileira da frente o assento é destinado.
    front_style:
      name: Estilo frontal
      description: Descreve a construção da parte frontal das calças chino, indicando
        se a calça tem a frente lisa, pregas ou outros detalhes.
    frosting_or_icing_type:
      name: Tipo de cobertura ou glacê
      description: Especifica o tipo de cobertura ou glacê aplicado ao bolo ou à sobremesa.
    fruit_cultivar_or_variety:
      name: Cultivar ou variedade da fruta
      description: Especifica o nome da cultivar ou variedade específica da fruta
        (por exemplo, Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Estilo de corte da frutas
      description: Descreve como a fruta é preparada ou cortada (por exemplo, inteira,
        fatiada, em cubos).
    fruit_mix_variety:
      name: Variedade da mistura de frutas
      description: 'Nomeia a mistura temática ou a variedade geral do mix de frutas
        (ex: mix tropical, frutas vermelhas etc.).'
    fruit_piece_form:
      name: Formato dos pedaço das frutas
      description: Descreve o corte físico ou a apresentação dos pedaços de frutas
        secas, por exemplo, inteiras, fatiadas ou em pó.
    fruit_snack_form:
      name: Formato de lanche de frutas
      description: Classifica a forma física ou o estilo em que o lanche de frutas
        é apresentado.
    fruit_topping_format:
      name: Formato da cobertura das frutas
      description: Descreve a forma física, a textura ou o estilo da cobertura para
        que os compradores possa escolher entre molhos, caldas, pedaços de fruta,
        pérolas de tapioca, etc.
    fruit_variety:
      name: Variedade de fruta
      description: 'Identifica a fruta principal utilizada em uma receita/kit/insumo
        de vinho de fruta (ex: maçã, cereja, amora).'
    fuel_cap_gasket_seal_material:
      name: Material da junta/vedação da tampa do tanque de combustível
      description: Especifica o material utilizado para a junta de vedação/anel O
        da tampa do tanque de combustível.
    fuel_cap_locking_mechanism:
      name: Mecanismo de travamento da tampa do tanque de combustível
      description: Indica o método de travamento utilizado por uma tampa de combustível
        com trava.
    fuel_cap_type:
      name: Tipo de tampa do tanque de combustível
      description: Especifica o tipo/design funcional da tampa de combustível utilizada
        no bocal de enchimento de combustível de um veículo.
    fuel_cap_venting:
      name: Ventilação da tampa do tanque de combustível
      description: Indica se a tampa do tanque de combustível possui respiro e, se
        aplicável, o tipo de respiro.
    fuel_filter_features:
      name: Características do filtro de combustível
      description: Lista as principais características funcionais do filtro de combustível
        (separação de água, válvula de drenagem, porta do sensor etc.).
    fuel_filter_media_material:
      name: Material filtrante do filtro de combustível
      description: Especifica o meio filtrante principal utilizado dentro do elemento
        do filtro de combustível.
    fuel_filter_mounting_connection_type:
      name: Tipo de montagem/conexão do filtro de combustível
      description: Especifica como o filtro de combustível se conecta/é instalado
        (encaixe de rosca, conexão rápida, espigão para mangueira, banjo, etc.).
    fuel_injection_cleaning_method:
      name: Método de limpeza do sistema de injeção de combustível
      description: Indica como o kit é utilizado para limpar o sistema de injeção
        de combustível.
    fuel_injector_electrical_connector_type:
      name: Tipo de conector elétrico do injetor de combustível
      description: Especifica o padrão/forma do conector elétrico do injetor.
    fuel_injector_seat_type:
      name: Tipo de sede do injetor de combustível
      description: Especifica o estilo da interface ponta/sede do injetor usada para
        vedação no coletor de admissão/trilho de combustível.
    fuel_injector_spray_pattern:
      name: Padrão de pulverização do injetor de combustível
      description: Identifica o padrão de pulverização/distribuição de combustível
        do injetor usando a terminologia do fabricante ou do setor (por exemplo, cone,
        leque, jato concentrado, vários orifícios).
    fuel_level_sensor_mounting_type:
      name: Tipo de montagem do sensor de nível de combustível
      description: Especifica a interface de montagem física usada para fixar o sensor/transmissor
        de nível de combustível ao tanque de combustível ou às módulos da bomba.
    fuel_level_sensor_sensing_mechanism:
      name: Mecanismo de detecção do sensor de nível de combustível
      description: Especifica o mecanismo/tecnologia de detecção usado para medir
        o nível de combustível em um sensor ou medidor de nível de combustível.
    fuel_line_compliance_standard:
      name: Norma de conformidade da linha de combustível
      description: Identifica a norma regulamentar ou do setor que a linha de combustível
        atende (comum em aplicações marítimas).
    fuel_line_connector_interface_type:
      name: Tipo de interface do conector da linha de combustível
      description: Especifica o tipo de conexão/interface nas extremidades da linha
        de combustível ou da conexão.
    fuel_pressure_regulator_body_material:
      name: Material do corpo do regulador de pressão de combustível
      description: Especifica o material da carcaça/corpo do regulador em termos de
        durabilidade e resistência à corrosão.
    fuel_pressure_regulator_mounting_type:
      name: Tipo de montagem do regulador de pressão de combustível
      description: Especifica como o regulador de pressão de combustível é montado
        ou instalado, o que afeta a montagem e a compatibilidade.
    fuel_pump_inlet_type:
      name: Tipo de entrada da bomba de combustível
      description: Tipo de conexão na entrada da bomba.
    fuel_pump_mounting_location:
      name: Local de montagem da bomba de combustível
      description: Localização da bomba de combustível no sistema de combustível do
        veículo.
    fuel_pump_outlet_connection_type:
      name: Tipo de conexão da saída da bomba de combustível
      description: Especifica o tipo de conexão física na saída da bomba de combustível
        para compatibilidade de encaixe/instalação.
    fuel_system_application:
      name: Aplicação do sistema de combustível
      description: Arquitetura do sistema de abastecimento de combustível para a qual
        a bomba de combustível foi projetada (por exemplo, carburador, injeção eletrônica,
        injeção direta, sistema de elevação/transferência para motores a diesel).
    fuel_system_connection_type:
      name: Tipo de conexão do sistema de combustível
      description: Especifica os padrões de conexão do sistema de combustível ou as
        interfaces do adaptador compatíveis com o kit.
    fuel_system_type:
      name: Tipo de sistema de combustível
      description: Especifica o sistema de abastecimento de combustível do motor (por
        exemplo, arquitetura de carburador ou injeção de combustível).
    fuel_tank_installation_position:
      name: Posição de instalação do tanque de combustível
      description: Especifica a posição típica de instalação do tanque de combustível
        no veículo.
    fuel_tank_orientation:
      name: Orientação do tanque de combustível
      description: Especifica se o tanque de combustível deve ser instalado na horizontal
        ou na vertical.
    fuel_tank_shape:
      name: Forma do tanque de combustível
      description: Descreve a fator forma/forma geral do tanque de combustível para
        garantir a compatibilidade física e a substituição adequada.
    fur_type:
      name: Tipo de pelo
      description: Identifica a espécie ou o material sintético de qualquer pele presente
        na parte externa da carteira ou bolsa.
    furniture_finish:
      name: Acabamento do móvel
      description: Descreve o tratamento ou acabamento de superfície aplicado ao item.
        Isso afeta sua aparência e os requisitos de manutenção.
    fuse_form_factor:
      name: Fator de forma do fusível
      description: Especifica o estilo/formato físico do fusível para garantir que
        ele se encaixe no porta-fusível ou bloco de fusíveis pretendido (por exemplo,
        lâmina vs. cartucho).
    fuse_terminal_or_mount_style:
      name: Terminal do fusível ou estilo de montagem
      description: Especifica como o fusível se conecta mecanicamente/eletricamente
        (encaixe, fixação com parafusos ou em linha).
    fusible_application_method:
      name: Método de aplicação por fusão
      description: Especifica como um adesivo termocolante é ativado/aplicado (por
        exemplo, calor com ferro de passar, prensa, reforço com costura).
    fusible_hem_tape_application_method:
      name: Método de aplicação de fita adesiva termocolante para bainhas
      description: Descreve como a fita é ativada/aplicada (por exemplo, ferro de
        passar, prensa térmica).
    fusible_seam_tape_activation_method:
      name: Método de ativação da fita de costura fusível
      description: Indica como o adesivo é ativado durante a aplicação.
    fusible_seam_tape_application:
      name: Aplicação da fita de costura termocolante
      description: Especifica o uso principal pretendido para a fita de costura termocolante.
    fusible_seam_tape_material:
      name: Material da fita de costura termocolante
      description: Material ou composição da fita/banda/suporte (não do tecido ao
        qual ela se fixa).
    fusible_seam_tape_washability:
      name: Lavabilidade da fita de costura termocolante
      description: Indica se a costura termocolante permanece intacta após a lavagem
        ou limpeza.
    fusible_seam_tape_waterproof_rating:
      name: Classificação de impermeabilidade da fita de costura termocolante
      description: Indica se a fita de costura é destinada a criar uma costura impermeável
        ou resistente à água após a aplicação.
    fusible_tape_backing_type:
      name: Tipo de suporte de fita termocolante
      description: Especifica se a fita possui um revestimento/ papel de proteção
        e qual o seu formato, o que afeta o manuseio e a aplicação.
    futon_frame_conversion_mechanism:
      name: Mecanismo de conversão da estrutura do futon
      description: Define o mecanismo ou estilo estrutural utilizado para converter
        a estrutura entre as posições de sofá, chaise longue e cama.
    gaiter_height_type:
      name: Tipo de altura da polaina
      description: Classifica as polainas de acordo com a altura da cobertura que
        oferecem na perna, como tornozelo, meio da panturrilha, joelho ou coxa.
    game_variation:
      name: Variação do jogo
      description: Especifica o estilo de jogo para o qual o conjunto foi projetado
        (por exemplo, tetherball clássico, tênis preso, speedball).
    garlic_preparation_style:
      name: Estilo de preparo do alho
      description: Especifica como o alho é preparado ou processado antes da venda
        (por exemplo, inteiro, picado, em pó).
    garlic_variety:
      name: Variedade de alho
      description: Identifica a variedade botânica ou comercial do alho oferecido.
    garment_back_style:
      name: Estilo das costas da peça
      description: 'Identifica o desenho ou a construção da parte de trás da peça
        de roupa (ex.: costas abertas, costas nadador, costas cruzadas).'
    garment_pattern_type:
      name: Tipo de molde de vestuário
      description: Especifica o tipo de item de roupa que o molde de costura se destina
        a produzir.
    garnish_type:
      name: Tipo de guarnição
      description: Identifica qual é a guarnição (ingrediente ou estilo de guarnição)
        usada para finalizar um coquetel.
    gas_lift_class:
      name: Classe de elevação a gás
      description: Especifica a classificação de segurança e resistência do cilindro
        a gás utilizado para o ajuste da altura do assento.
    gas_propellant_type:
      name: Tipo de propelente gasoso
      description: Especifica o tipo de propelente gasoso recomendado ou compatível
        quando o lançador é movido a gás.
    gatta_tabla_tuning_block_material:
      name: Material dos gattas (blocos de afinação da tabla)
      description: Material dos blocos de afinação (gattas) utilizados entre a correia
        de afinação e o casco.
    gauge_mounting_type:
      name: Tipo de montagem do medidor
      description: Como o medidor de combustível é montado/instalado na embarcação.
    gauge_style:
      name: Estilo do medidor
      description: Especifica o tipo de manômetro que a bomba utiliza, como um manômetro
        analógico, um visor digital ou nenhum.
    gear_oil_api_classification:
      name: Classificação API do óleo de engrenagem
      description: Classificação API GL para óleos de engrenagem utilizados em diferenciais/transmissões
        manuais.
    gel_wax_density_grade:
      name: Grau de densidade da cera em gel
      description: Indica o grau de densidade da cera em gel, o que afeta a transparência,
        a capacidade de carga de fragrância e a adequação para inclusões.
    gel_wax_transparency_level:
      name: Nível de transparência da cera em gel
      description: Descreve a transparência/opacidade da cera em gel quando usada
        conforme as instruções.
    gelatin_form:
      name: Forma da gelatina
      description: Informações sobre a apresentação física da gelatina para que os
        usuários possam escolher o formato correto para receitas e aplicações industriais.
    gelatin_or_gelling_agent_source:
      name: Fonte da gelatina ou do agente gelificante
      description: Indica a origem ou o tipo de agente gelificante utilizado no produto,
        informação importante para considerações dietéticas e religiosas.
    gelatin_source:
      name: Fonte da gelatina
      description: Indica a origem animal, vegetal ou sintética da gelatina para que
        os compradores possam verificar a compatibilidade com requisitos dietéticos,
        éticos ou religiosos.
    gelling_agent:
      name: Agente gelificante
      description: Identifica a principal substância utilizada para dar consistência
        ou espessamento à sobremesa, importante para a adequação dietética e para
        a textura.
    gemstone_clarity_grade:
      name: Grau de pureza da gema
      description: Grau de pureza da gema (quando classificado).
    gemstone_creation_method:
      name: Método de criação de gemas
      description: Indica se a gema é natural, criada em laboratório ou uma imitação/simulante.
    gemstone_cut_style:
      name: Estilo de corte da gema
      description: Descreve o estilo de lapidação/acabamento da gema.
    gemstone_treatment_status:
      name: Estado do tratamento da gema
      description: Indica se e como a gema foi tratada/aprimorada.
    geological_period:
      name: Período geológico
      description: 'Período geológico (e, opcionalmente, época) do fóssil, se for
        conhecido (ex.: Jurássico, Cretáceo, Eoceno).'
    gift_box_tin_insert_type:
      name: Tipo de berço para caixa/lata de presente
      description: Configuração do berço para organização/proteção do item dentro
        da caixa/lata.
    gift_box_tin_sustainability_features:
      name: Características de sustentabilidade da caixa/lata de presente
      description: Características relacionadas com a sustentabilidade da embalagem
        do tipo caixa/lata de presente.
    gift_box_tin_window_type:
      name: Caixa de presente/lata com abertura
      description: Indica se a caixa de presente possui visor transparente e qual
        é o seu estilo.
    gift_message_option:
      name: Opção de mensagem de presente
      description: Especifica se uma mensagem/nota de presente pode ser incluída e
        como (nenhuma, incluída, personalizável).
    ginger_maturity:
      name: Maturidade do gengibre
      description: Indica o estágio de colheita do gengibre, como jovem ou maduro,
        o que afeta a intensidade do sabor e as aplicações culinárias de preferência.
    ginger_variety:
      name: Variedade de gengibre
      description: Especifica a cultivar, o tipo ou o rizoma relacionado dentro da
        família do gengibre, para diferenciar os perfis de sabor e os usos culinários.
    glass_kiln_controller_type:
      name: Tipo de controlador para forno de vidro
      description: Tipo de controlador de temperatura/queima incluído com o forno.
    glass_kiln_firing_application:
      name: Aplicação de queima do forno de vidro
      description: Aplicações principais de trabalho com vidro para as quais o forno
        foi projetado.
    glass_stone_application_method:
      name: Método de aplicação da pedra de vidro
      description: 'Especifica como as pedras de vidro devem ser fixadas/aplicadas
        nos projetos (ex: colagem, termofixação, costura)'
    glass_tint:
      name: Tonalidade do vidro
      description: A tonalidade do vidro/plástico utilizada na garrafa para controlar
        a exposição à luz (comum na produção de cerveja/vinho).
    glaze_firing_atmosphere:
      name: Atmosfera de queima do esmalte
      description: A atmosfera de queima para a qual o esmalte foi concebido.
    glaze_opacity:
      name: Opacidade do esmalte
      description: O nível de transparência que o esmalte apresenta após a queima.
    glaze_product_form:
      name: Forma do produto de esmalte
      description: 'Forma física em que o produto de esmalte é fornecido (ex.: líquido,
        pó seco, concentrado, spray).'
    glider_avionics_package:
      name: Pacote de aviônica para parapente
      description: Indica o nível geral de instrumentação de navegação e voo instalada
        no parapente.
    glider_certification_rating:
      name: Classificação de certificação do parapente
      description: 'Classificação oficial de certificação que indica o nível de segurança
        e desempenho do parapente (ex.: EN-A, EN-B).'
    glider_landing_gear_configuration:
      name: Configuração do trem de pouso do parapente
      description: Especifica a configuração do trem de pouso utilizada pelo parapente.
    glider_launch_method:
      name: Método de lançamento do parapente
      description: Especifica como o parapente normalmente é lançado ou autolançado.
    glider_performance_class:
      name: Classe de desempenho do parapente
      description: Classe ou categoria de competição/desempenho comumente usada para
        parapentes.
    glitter_application_method:
      name: Método de aplicação de glitter
      description: 'Indica a técnica pretendida para aplicar/usar o glitter artesanal
        (ex.: polvilhar/agitar, misturar, esfregar, aplicar sobre adesivo, pincelar,
        pulverizar, fixar com calor/gravar em relevo).'
    glitter_eco_friendly_claim:
      name: Declaração ecológica do glitter
      description: Declarações ambientais/ecológicas específicas para formulações
        de glitter solto.
    glitter_effect_type:
      name: Tipo de efeito do glitter
      description: 'Descreve o efeito visual do glitter/lantejoulas além da base (ex.:
        holográfico, iridescente).'
    glitter_glue_base_solvent_type:
      name: Tipo de base/solvente da cola com glitter
      description: Descreve a base principal da cola com glitter (preocupação comum
        dos compradores em relação à limpeza e à compatibilidade do material).
    glitter_opacity_coverage:
      name: Opacidade/cobertura do glitter
      description: Indica o grau de opacidade do efeito do glitter quando aplicado.
    glitter_use_suitability:
      name: Adequação de uso do glitter
      description: Indica o principal contexto pretendido ou aprovado do pó de glitter
        (por exemplo, apenas para uso artesanal, grau cosmético/seguro para o corpo
        ou para contato com alimentos).
    glove_armor_placement:
      name: Posicionamento da proteção da luva
      description: Identifica a localização da armadura protetora na luva.
    glove_cuff_length:
      name: Comprimento do punho da luva
      description: Indica o comprimento da cobertura do punho/manopla de uma luva
        de corrida no pulso/antebraço.
    glove_finger_coverage:
      name: Cobertura dos dedos da luva
      description: Descreve o nível de cobertura dos dedos oferecido pela luva, variando
        de modelos com todos os dedos a modelos sem dedos.
    glove_finger_design:
      name: Design dos dedos da luva
      description: Especifica a configuração dos dedos da luva, como luva de cinco
        dedos ou luva tipo manopla/luva de bico.
    glove_fit_profile:
      name: Perfil de ajuste da luva
      description: Descreve a forma interno e a silhueta geral da luva para que os
        jogadores possam escolher a sensação que preferem.
    glove_insulation:
      name: Isolamento da luva
      description: Especifica o isolamento/construção térmica ou aquecimento da luva
        (por exemplo, nível de isolamento, tecnologia de forro/isolamento ou tipo
        de aquecimento).
    glove_palm_material:
      name: Material da palma da luva
      description: Especifica o material principal usado na palma da luva (a superfície
        principal de contato/aderência), que pode ser diferente do dorso da luva.
    glove_size:
      name: Tamanho da luva
      description: Indica o tamanho geral da mão para o qual as luvas de boxe foram
        projetadas, geralmente expresso com códigos de tamanho semelhantes aos de
        vestuário ou tamanhos infantis.
    glove_webbing_style:
      name: Estilo de teia de luva
      description: Define o design da teia ou bolso da luva, o que afeta o controle
        da bola, a adequação à posição e as preferências do jogador.
    glow_effect:
      name: Efeito de brilho
      description: Indica se as bolas de gel possuem propriedades que brilham no escuro
        ou que emitem um marcador para jogos em condições de pouca luz.
    glow_plug_connector_type:
      name: Tipo de conector da vela incandescente
      description: Estilo do terminal/conector elétrico na vela incandescente utilizado
        para a conexão com o chicote elétrico do veículo.
    glow_plug_heating_element_type:
      name: Tipo de elemento de aquecimento da vela incandescente
      description: Tipo/tecnologia do elemento de aquecimento utilizado pela vela
        incandescente.
    glue_application_format:
      name: Formato da aplicação da cola
      description: Especifica o formato do aplicador/dispensador usado para aplicar
        cola escolar.
    glue_applicator_type:
      name: Tipo de aplicador de cola
      description: Especifica o tipo de aplicador/ponta dispensadora integrada que
        é usada para aplicar a cola líquida.
    glue_base_formulation:
      name: Formulação de base da cola
      description: Identifica a formulação química/base principal da cola líquida
        artesanal (para expectativas de desempenho, segurança e limpeza).
    glue_gun_nozzle_style:
      name: Estilo do bico da pistola de cola
      description: Especifica o estilo físico da ponta do bico de uma pistola de cola
        quente, o que afeta a precisão da aplicação e a cobertura da cola.
    glue_safety_standard:
      name: Norma de segurança para colas
      description: Indica se a cola é atóxica/segura para crianças, de acordo com
        a rotulagem e as normas comuns.
    goal_frame_material:
      name: Material da estrutura do gol/trave
      description: Identifica o material da estrutura/traves do gol, o que afeta o
        peso, a portabilidade e a resistência às intempéries.
    goal_size:
      name: Tamanho do gol
      description: Classifica o gol/traves de futebol em grupos de tamanhos regulamentares
        ou de treino comuns, permitindo uma seleção mais rápida do que apenas por
        dimensões brutas.
    goal_size_classification:
      name: Classificação do tamanho do gol
      description: Indica a classe de tamanho padronizada do gol/traves (por exemplo,
        tamanho padrão, juvenil, mini), para que os usuários possam selecionar de
        forma rápido o equipamento adequado ao seu nível de jogo.
    goal_size_standard:
      name: Padrão de tamanho do gol/traves
      description: 'Indica qual norma oficial ou padrão de idade o gol atende (ex.:
        regulamento da World Aquatics, 12U).'
    goalie_configuration:
      name: Configuração do goleiro
      description: Indica o número de goleiros por equipe configurados na mesa (estilo
        americano com 3 goleiros vs. estilo europeu com 1 goleiro).
    goalie_playing_surface:
      name: Área de jogo do goleiro
      description: Especifica a superfície ou o ambiente de jogo principal para o
        qual o conjunto de equipamentos de goleiro de hóquei foi projetado.
    goalkeeper_glove_cut:
      name: Corte na luva do goleiro
      description: Indica o estilo de construção (corte) da palma/dedos das luvas
        de goleiro, o que influencia o ajuste, a sensibilidade à bola e o controle.
    goalkeeper_training_aid_type:
      name: Tipo de equipamento de treino para goleiros
      description: Identifica o estilo do acessório de treino para goleiros, permitindo
        uma filtragem precisa.
    goblet_drum_playing_style:
      name: Estilo de execução do tambor de taça
      description: Indica se o instrumento foi projetado principalmente para ser tocado
        com as mãos ou para uso com baquetas/marretas.
    gobo_format:
      name: Formato do gobo
      description: Especifica o tamanho/padrão de gobo que o projetor aceita (família
        de diâmetro e espessura), garantindo a compatibilidade com gobos de reposição
        ou personalizados.
    gobo_root_variety:
      name: Variedade de gobo (raiz de bardana)
      description: Identifica a cultivar ou variedade específica do gobo (raiz de
        bardana).
    gobo_rotation:
      name: Rotação do gobo
      description: Especifica se o gobo pode girar e qual a direção disponível.
    goggle_accessory_type:
      name: Tipo de acessório para óculos de proteção
      description: 'Classifica o tipo de acessório (ex.: capa, estojo/caixa, alça)
        para que o comprador possa filtrar o conjunto diversificado de produtos dentro
        desta categoria de guarda-chuvas.'
    goggle_features:
      name: Recursos dos óculos de proteção
      description: Lista as características funcionais ou de design especiais oferecidas
        pelos óculos de proteção.
    goggle_fit_design:
      name: Design de ajuste dos óculos
      description: Descreve como os óculos devem se ajustar ou ser usados, incluindo
        a compatibilidade OTG (para uso sobre óculos de grau).
    goggle_gasket_material:
      name: Material da junta dos óculos
      description: Material da vedação que fica em contato com o rosto, o que afeta
        o conforto, preocupações com alergias e a prevenção de vazamentos.
    goggle_integration:
      name: Integração dos óculos de proteção
      description: Indica se o capacete foi projetado para ser usado com óculos de
        proteção e/ou inclui recursos integrados para fixação de óculos de proteção.
    goggle_lens_shape:
      name: Formato das lentes dos óculos de proteção
      description: Define o perfil de curvatura das lentes de substituição, o que
        afeta a distorção e o campo de visão (por exemplo, cilíndrico, esférico, tórico).
    goggle_lens_tint:
      name: Tonalidade das lentes dos óculos de proteção
      description: Define a tonalidade ou o acabamento das lentes, o que afeta a transmissão
        de luz, a percepção das cores e a aparência estética.
    goggle_strap_material:
      name: Material da faixa dos óculos
      description: Material principal utilizado na faixa da cabeça, o que influencia
        a durabilidade e o conforto.
    golf_accessory_set_purpose:
      name: Finalidade do conjunto de acessórios de golfe
      description: Identifica o uso principal ou tema pretendido do conjunto de acessórios
        de golfe.
    golf_bag_style:
      name: Estilo da bolsa de golfe
      description: Indica o design principal ou estilo de aplicação da bolsa de golfe
        (por exemplo, suporte, de carrinho, profissional).
    golf_ball_alignment_design:
      name: Design de alinhamento da bola de golfe
      description: Especifica os auxílios visuais de alinhamento integrado, impressos
        ou moldados, na superfície da bola.
    golf_ball_construction:
      name: Bola de golfe construção
      description: Especifica o número de camadas/peças usadas na construção da bola
        de golfe, o que afeta a rotação, a sensação ao toque e a distância.
    golf_ball_cover_material:
      name: Bola de golfe material da cobertura
      description: Identifica o material da cobertura externa da bola de golfe, o
        que afeta a rotação, a durabilidade e a sensação ao toque.
    golf_cart_cover_climate_use:
      name: Capa de carrinho de golfe uso por clima
      description: Indica as principais condições climáticas/sazonais que a capa de
        armazenamento foi projetada para suportar.
    golf_cart_enclosure_fit_type:
      name: Cabine de carrinho de golfe tipo de encaixe
      description: Especifica se a cabine foi projetada para uma contagem de assentos/fator
        de forma específico ou se oferece um encaixe universal/ajustável.
    golf_cart_intended_use:
      name: Carrinho de golfe uso pretendido
      description: Principal caso de uso pretendido para o qual o carrinho de golfe
        foi projetado ou configurado.
    golf_club_number:
      name: Taco de golfe número
      description: 'Identifica o número específico ou a designação de wedge impressa
        no taco (ex.: 5, PW, GW).'
    golf_club_part_type:
      name: Taco de golfe tipo de peça
      description: Classifica o acessório ou componente de taco de golfe em subtipos
        comuns (por exemplo, luva adaptadora, ferrule, peso).
    golf_grip_size:
      name: Grip de golfe tamanho
      description: Especifica a categoria geral de tamanho externo do grip de golfe,
        indicando a espessura que o grip parece ter na mão.
    golf_shoe_spike_type:
      name: Sapato de golfe cravo tipo
      description: Identifica o tipo de sistema de tração usado no solado dos sapatos
        de golfe (por exemplo, modelos com cravos ou sem cravos).
    golf_tee_style:
      name: Estilo de tee de golfe
      description: Descreve o estilo/design estrutural ou funcional do tee de golfe,
        que afeta a altura da bola, a durabilidade ou a redução do spin.
    golf_training_focus:
      name: Treinamento de golfe foco
      description: Classifica a principal habilidade ou aspecto que o produto se destina
        a aprimorar.
    golf_training_objective:
      name: Treinamento de golfe objetivo
      description: Identifica a habilidade ou aspecto principal do golfe que o equipamento
        de treinamento foi projetado para aprimorar.
    gong_profile_type:
      name: Gongo tipo de perfil
      description: Descreve o perfil físico do gongo de ópera (por exemplo, plano
        versus centro elevado), que afeta fortemente o timbre e o estilo de execução.
    grading_scale:
      name: Escala de classificação
      description: A escala de classificação usada em uma moeda bullion classificada
        (por exemplo, Sheldon 1–70).
    grading_service:
      name: Serviço de classificação
      description: Serviço de classificação/certificação de terceiros para a moeda
        ou cédula (por exemplo, PCGS, NGC).
    graduation_increment:
      name: Incremento de graduação
      description: Especifica a menor divisão impressa/gravada na escala do medidor
        de costura (a resolução das marcações).
    grain_processing_method:
      name: Método de processamento de grãos
      description: Identifica o principal método de processamento aplicado ao grão
        (por exemplo, parboilizado, laminado, germinado), que afeta o tempo de cozimento,
        a textura e os valores nutricionais.
    grand_piano_soundboard_material:
      name: Material da caixa de ressonância do piano de cauda
      description: Material principal usado na tábua harmônica do piano (a placa de
        ressonância), impactando o timbre e a durabilidade.
    grappling_dummy_pose:
      name: Boneco de grappling pose
      description: Descreve a posição/postura corporal padrão do boneco, determinando
        quais exercícios e técnicas ele suporta.
    grease_application:
      name: Graxa aplicação
      description: Especifica o principal componente do veículo ou caso de uso ao
        qual a graxa se destina.
    grease_consistency_grade_nlgi:
      name: Graxa grau de consistência (NLGI)
      description: Especifica o número de consistência NLGI que indica a firmeza da
        graxa (por exemplo, NLGI 2 é comum para uso múltiplo).
    grease_thickener_type:
      name: Graxa tipo de espessante
      description: Identifica o sistema de espessante/sabão usado na formulação da
        graxa.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Gaita de foles Great Highland tipo de válvula do sopro
      description: Especifica o sistema de válvula de retenção usado no tubo de sopro.
    great_highland_bagpipes_drone_configuration:
      name: Gaita de foles Great Highland configuração dos bordões
      description: Especifica os tipos de bordões incluídos no conjunto.
    great_highland_bagpipes_mounting_material:
      name: Gaita de foles Great Highland material dos ornamentos
      description: Especifica o material dos ornamentos decorativos da gaita de foles
        (por exemplo, alpaca, imitação de marfim).
    greens_maturity_stage:
      name: Verduras estágio de maturação
      description: Indica o estágio de desenvolvimento das verduras no momento da
        colheita.
    greens_preparation_state:
      name: Verduras estado de preparo
      description: Descreve como as verduras folhosas são processadas ou embaladas
        (por exemplo, pré-lavadas, picadas, prontas para consumo).
    grenade_effect_type:
      name: Granada tipo de efeito
      description: 'Indica o principal efeito funcional produzido pela granada de
        paintball após ser ativada (ex.: fumaça, tinta, flashbang).'
    grid_unit:
      name: Grid unidade
      description: O principal sistema de medição impresso no tapete (caso haja uma
        grade/escala).
    grille_emblem_provision:
      name: Grade provisão para emblema
      description: Especifica se a grade é compatível com um emblema/distintivo OEM
        e como.
    grille_mounting_method:
      name: Método de montagem da grade
      description: Especifica como a grade é instalada no veículo (por exemplo, substituição
        direta versus inserto/sobreposição; aparafusada versus clipe/encaixe por pressão;
        com necessidade de furação versus sem necessidade de furação).
    grille_style:
      name: Estilo da grade
      description: Especifica o estilo visual/de design da grade do veículo.
    grip_chalk_form:
      name: Giz de aderência forma
      description: Identifica a forma física do giz fornecido ou usado com o saco.
    grip_coverage:
      name: Aderência cobertura
      description: Identifica a presença e a localização de elementos de aderência
        de silicone ou emborrachados na meia.
    grip_design:
      name: Pegada design
      description: Especifica a configuração de alça ou furo da anilha para facilitar
        o transporte e aumentar a versatilidade nos exercícios.
    grip_enhancer_effect:
      name: Melhorador de aderência efeito
      description: Descreve a principal característica de desempenho que o produto
        oferece (por exemplo, absorção de umidade ou acabamento pegajoso em resina).
    grip_enhancer_form:
      name: Forma de reforço de aderência
      description: Identifica a forma física ou o formato do produto para melhorar
        a aderência, para que os atletas possam selecionar o método de aplicação apropriado.
    grip_features:
      name: Características de empunhadura
      description: Indica características integradas de pegada/alça destinadas a melhorar
        a firmeza, o conforto ou o controle durante o jogo.
    grip_material:
      name: Aderência material
      description: Identifica o material usado na superfície aderente da calça.
    grip_shape:
      name: Empunhadura formato
      description: Descreve o formato ou estilo da seção transversal da empunhadura,
        especialmente relevante para empunhaduras de putter.
    grip_surface_type:
      name: Tipo de superfície de empunhadura
      description: Descreve o design da banda/superfície de tração da face do pedal
        que afeta a aderência e a sensação.
    grip_tackiness_level:
      name: Grip nível de aderência
      description: Avalia o quão aderente ou pegajosa é a superfície do grip, ajudando
        os jogadores a escolher entre uma sensação seca e um controle ultraaderente.
    grip_tape_form:
      name: Forma da fita antiderrapante
      description: 'Indica a forma de fornecimento do produto de fita para grip (ex.:
        folha, rolo, kit spray-on).'
    grip_wax_form:
      name: Cera para grip forma
      description: Classifica a forma física em que a cera para grip é vendida.
    gripper_coverage:
      name: Amplitude do gripper
      description: Especifica o estilo do gripper no calçado antiderrapante, indicando
        a cobertura da superfície e a possibilidade de remoção.
    grommet_application_material:
      name: Ilhós material de aplicação
      description: 'Material(is) principal(is) em que os ilhoses devem ser instalados
        (ex.: tecido, couro, vinil, lona/tela).'
    grommet_duty_rating:
      name: Ilhós classificação de resistência
      description: Indica a classe de resistência/uso pretendida para o ilhós.
    grommet_style:
      name: Ilhós estilo
      description: Estilo de construção do conjunto de ilhoses (como é montado/usado).
    grooming_glove_texture_type:
      name: Luva de grooming tipo de textura
      description: Identifica a textura principal da superfície usada para grooming,
        indicando a finalidade pretendida, como esfregar, polir ou lavar.
    groove_orientation:
      name: Sulco orientação
      description: Descreve a direção/layout dos sulcos ou saliências no instrumento.
    groove_sampler_onboard_effects:
      name: Sampler de groove efeitos integrados
      description: Indica as categorias de processamento de efeitos integrados disponíveis
        no sampler de groove (insert/master), como reverb, delay, compressão, distorção,
        EQ e filtragem.
    groove_sampler_storage_expansion_type:
      name: Sampler de groove tipo de expansão de armazenamento
      description: Especifica as opções de armazenamento removível/expansível compatíveis
        com o sampler de groove.
    ground_attachment_method:
      name: Método de fixação ao solo
      description: Descreve como o arco de passagem é fixado à superfície de jogo,
        afetando a estabilidade e a compatibilidade da superfície.
    groupset_components_included:
      name: Componentes do conjunto incluídos
      description: Lista os componentes específicos da transmissão incluídos no groupset
        para que os clientes entendam o conteúdo do pacote.
    gt_racing_class:
      name: Corrida GT classe
      description: Especifica a categoria/classe GT para a qual o carro foi construído
        ou homologado.
    guard_construction_type:
      name: Tipo de construção da proteção
      description: Se a proteção é um protetor de estrutura rígida, um inserto de
        proteção flexível ou um modelo estilo manga/tira.
    guard_size_measurement_basis:
      name: Proteção base de medição do tamanho
      description: 'Em qual medida o dimensionamento é baseado (ex.: circunferência
        do cotovelo, circunferência do pulso, circunferência do antebraço).'
    guard_style:
      name: Protetor estilo
      description: Classifica a construção ou o tipo de protetor de lâmina de patins
        para ajudar os compradores a diferenciar rapidamente entre protetores rígidos
        para caminhar, protetores macios, protetores com mola e outros designs.
    guava_flesh_color:
      name: Goiaba cor da polpa
      description: Indica a cor interna da polpa da goiaba.
    guava_variety:
      name: Modalidade de goiaba
      description: Identifica o cultivar específico ou a variedade comercial de goiaba
        à venda (por exemplo, goiaba maçã, Mexican Cream, Thai, Pink, sem sementes,
        White).
    guide_material:
      name: Material do guia
      description: Material usado nos passadores de linha ou insertos da vara.
    guide_type:
      name: Passador tipo
      description: Especifica o estilo dos passadores instalados em uma vara de pesca,
        como passador de pé simples, de roldana ou snake.
    guideline_markings:
      name: Marcações de orientação
      description: Tipo de marcações visuais de alinhamento impressas ou embutidas
        na superfície do tapete de arremesso para auxiliar em exercícios de arremesso.
    guiro_scraper_material:
      name: Guiro raspador material
      description: Material do raspador/percutor incluído ou recomendado usado com
        o guiro.
    guiro_surface_style:
      name: Guiro superfície estilo
      description: Descreve o padrão/geometria da superfície de execução que é raspada
        para produzir som.
    guitar_body_finish_type:
      name: Guitarra corpo acabamento tipo
      description: Especifica o acabamento usado no corpo da guitarra.
    guitar_bridge_system_type:
      name: Guitarra ponte sistema tipo
      description: Família de design do sistema de ponte/cordal para compatibilidade
        e navegação.
    guitar_case_style:
      name: Guitarra estojo estilo
      description: Especifica o estilo geral de proteção/estrutura do estojo de guitarra
        ou gig bag.
    guitar_humidifier_placement:
      name: Guitarra umidificador posicionamento
      description: Especifica onde o umidificador deve ser usado/posicionado em relação
        ao instrumento ou ao ambiente.
    guitar_pedal_i_o_configuration:
      name: Guitarra pedal configuração de E/S
      description: Indica se o pedal comporta roteamento de entrada/saída mono ou
        estéreo.
    guitar_pedal_output_connector_type:
      name: Guitarra pedal conector de saída tipo
      description: Especifica o tipo de conector de saída de áudio usado pelo pedal.
    guitar_slide_finish:
      name: Guitarra slide acabamento
      description: Acabamento da superfície do slide que afeta a sensação ao toque
        e o atrito contra as cordas.
    guitar_slide_style:
      name: Estilo de slide da guitarra
      description: Especifica o fator de forma do slide de guitarra ou tone bar e
        como ele é vestido/usado.
    guitar_stand_type:
      name: Guitarra suporte tipo
      description: Especifica o principal fator de forma do suporte de guitarra (como
        ele apoia/armazena a guitarra).
    guitar_strap_attachment_type:
      name: Guitarra correia fixação tipo
      description: Especifica como a correia se fixa à guitarra (ou aos botões da
        correia), incluindo se usa pontas tradicionais ou sistemas de liberação rápida.
    guitar_strap_end_material:
      name: Guitarra correia ponta material
      description: Material usado nas pontas/abas da correia (as partes que se fixam
        aos botões da correia ou aos sistemas de trava da correia).
    guitar_strap_features:
      name: Funcionalidades da correia da guitarra
      description: Recursos funcionais notáveis da correia de guitarra além de tamanho/material
        básicos (seleção múltipla).
    guitar_string_coating:
      name: Guitarra corda revestimento
      description: Indica se as cordas têm um revestimento protetor e, se aplicável,
        o estilo do revestimento.
    guitar_string_gauge_type:
      name: Guitarra corda calibre tipo
      description: Categoria de calibre comercializada de um conjunto de cordas para
        violão (por exemplo, extra light, light, medium). Muitas vezes aproximada
        pela espessura da corda Mi aguda; as faixas exatas de calibre podem variar
        conforme o fabricante.
    guitar_string_set_gauge_category:
      name: Guitarra jogo de cordas categoria de calibre
      description: Famílias comuns de calibre comercial para um jogo de cordas de
        guitarra (normalmente derivadas da corda Mi aguda/1ª corda).
    guitar_string_winding_type:
      name: Guitarra corda enrolamento tipo
      description: Especifica o estilo do enrolamento externo das cordas enroladas
        no conjunto.
    guitar_tuning_peg_button_shape:
      name: Guitarra tarraxa botão formato
      description: O formato/estilo da chave/botão da tarraxa.
    guitar_tuning_peg_configuration:
      name: Guitarra tarraxa configuração
      description: O layout do conjunto de tarraxas no headstock.
    guitar_tuning_peg_mounting_style:
      name: Tipo de montagem das tarraxas de guitarra
      description: Como uma tarraxa é montada no headstock (tipo de bucha e método
        antirrotação).
    guitar_tuning_peg_shaft_type:
      name: Guitarra tarraxa haste tipo
      description: Indica se o pino da corda é sólido ou dividido, e como a corda
        é fixada.
    guitar_tuning_peg_style:
      name: Tipo das tarraxas de guitarra
      description: O estilo físico da tarraxa/máquina de afinação e o formato de montagem
        usados no headstock de um instrumento (por exemplo, engrenagem selada vs.
        engrenagem aberta, com trava, pino dividido).
    gum_condition:
      name: Goma condição
      description: Condição/status da goma do selo no verso (por exemplo, nunca hinged,
        hinged, sem goma).
    gun_action_type:
      name: Tipo de ação da arma
      description: Tipo de ação mecânica usado para carregar/disparar (por exemplo,
        ação por ferrolho, ação por alavanca).
    gun_operational_status:
      name: Arma status operacional
      description: Indica se a arma colecionável está desativada/não dispara (e como
        ela é apresentada).
    gun_type:
      name: Arma tipo
      description: Identifica o fator de forma geral da arma de fogo antiga.
    gusset_material:
      name: Material do reforço
      description: Especifica o material usado no forro do reforço entrepernas, que
        afeta a respirabilidade, a higiene e o conforto.
    gymnastics_discipline:
      name: Ginástica modalidade
      description: Especifica a área da ginástica para a qual o produto é destinado
        (por exemplo, artística, rítmica, acrobática).
    hair_extension_texture:
      name: Extensão de cabelo textura
      description: Descreve o padrão de cachos, ondas ou textura dos fios da extensão.
    hair_net_style:
      name: Rede de cabelo estilo
      description: Identifica o design ou estilo de construção da rede de cabelo (por
        exemplo, bouffant, snood, para coque).
    hair_quality_grade:
      name: Grau de qualidade do cabelo
      description: Indica designações de qualidade/origem do cabelo usadas pelo setor.
    halter_style:
      name: Cabresto estilo
      description: Identifica o estilo funcional ou de design do cabresto (por exemplo,
        corda, breakaway, show), ajudando os compradores a escolher um cabresto adequado
        ao uso pretendido.
    hammock_style:
      name: Rede de descanso estilo
      description: Descreve o estilo estrutural ou a construção da rede de descanso.
    hand_and_foot_coverage:
      name: Mãos e pés cobertura
      description: Descreve luvas e botinhas integradas ou removíveis que cobrem as
        mãos e/ou os pés.
    hand_cymbal_set_configuration:
      name: Configuração do conjunto de pratos de mão
      description: Indica se o produto é vendido como par combinado, prato avulso
        ou conjunto maior.
    hand_drum_head_material:
      name: Tambor de mão pele material
      description: Material da pele do tambor (membrana) usada no tambor cálice.
    hand_exerciser_style:
      name: Exercitador de mão estilo
      description: Classifica o estilo geral ou mecanismo do exercitador de mão.
    hand_guard_backbone_material:
      name: Protetor de mão estrutura material
      description: Material da estrutura/espinha estrutural (se presente), que determina
        resistência e proteção.
    hand_guard_coverage_style:
      name: Protetor de mão cobertura estilo
      description: Descreve a cobertura/perfil do protetor de mão, afetando a proteção
        contra vento/impacto.
    hand_guard_mounting_type:
      name: Protetor de mão montagem tipo
      description: Especifica como os protetores de mão se fixam à motocicleta (por
        exemplo, extremidade do guidão com braçadeira interna vs. somente braçadeira).
    hand_guard_set_configuration:
      name: Configuração do conjunto de protetores de mão
      description: Indica se o produto é vendido como par esquerdo/direito ou lado
        único.
    hand_guard_style:
      name: Protetor de mão estilo
      description: Descreve o design ou estilo de cobertura do protetor (por exemplo,
        Closed, Open, Full, Lite, Standard).
    hand_guard_weather_protection:
      name: Protetor de mão proteção contra intempéries
      description: Indica a proteção contra intempéries pretendida proporcionada pelos
        protetores de mão.
    hand_paddle_strap_type:
      name: Remo de mão tira tipo
      description: Especifica o tipo de tira, ou a ausência de tira, usada para prender
        o remo de mão à mão do usuário.
    hand_percussion_mount_attachment_mechanism:
      name: Percussão de mão suporte mecanismo de fixação
      description: Especifica como o suporte se fixa a um pedestal, rack ou outro
        hardware (por exemplo, fixação por braçadeira vs. suporte por haste).
    hand_percussion_mounting_handling:
      name: Percussão de mão montagem/manuseio
      description: Indica se o instrumento é segurado na mão, vestido, montado ou
        colocado sobre mesa/chão durante o uso típico.
    hand_percussion_pitch_type:
      name: Percussão de mão afinação tipo
      description: Indica se o instrumento produz uma afinação definida (afinável/notas)
        ou uma afinação indefinida.
    hand_percussion_playing_method:
      name: Percussão de mão método de execução
      description: Como o instrumento é normalmente tocado para produzir som (por
        exemplo, sacudido vs. raspado).
    hand_percussion_set_configuration:
      name: Percussão de mão conjunto configuração
      description: Indica se o produto é um instrumento individual, um par combinado
        ou um conjunto de várias peças.
    hand_percussion_size_class:
      name: Classe de tamanho de percussão manual
      description: Categoria geral de tamanho do instrumento quando uma medição precisa
        não é fornecida ou para facilitar a filtragem.
    hand_sewing_needle_point_type:
      name: Tipo de agulha para costura manual
      description: 'Formato/estilo da ponta da agulha de costura manual utilizada
        para penetrar diferentes materiais (ex.: tecido plano, malha, couro) ou fios.'
    hand_support_level:
      name: Nível de suporte para mãos
      description: Especifica o grau de suporte ou compressão proporcionado pela luva,
        bandagem ou tira.
    hand_support_size:
      name: Tamanho de suporte para mãos
      description: Tamanho da luva, pulseira ou envoltório declarado pelo fabricante
        (PP-GGG ou tamanho único).
    handball_ball_type:
      name: Tipo de bola para handebol
      description: Indica a categoria de uso pretendida da bola de handebol, como
        jogo, treino ou praia.
    handball_playing_surface:
      name: Superfície de jogo de handebol
      description: Indica as superfícies de jogo para as quais a bola de handebol
        está otimizada.
    handball_target_type:
      name: Tipo de alvo de handebol
      description: Especifica o estilo ou design do alvo de tiro destinado à prática
        de handebol em equipe.
    handbrake_actuation_type:
      name: Tipo de acionamento do freio de mão
      description: Especifica como o freio de estacionamento é acionado.
    handbrake_orientation:
      name: Orientação do freio de mão
      description: Especifica se o freio de mão foi projetado para veículos com volante
        à esquerda, à direita ou se é universal.
    handgun_grip_material:
      name: Material da empunhadura da pistola
      description: Material principal dos cabos/telas das pistolas.
    handle_configuration:
      name: Configuração da alça
      description: 'Descreve o estilo estrutural do manete de wakeboard (ex: simples,
        duplo, Deep-V, T-wrap) para que os compradores possam combiná-lo com suas
        habilidades, manobras ou tipo de prancha.'
    handle_ergonomics:
      name: Ergonomia do cabo
      description: Descreve as características ergonômicas do cabo destinadas a melhorar
        o conforto e o controle.
    handle_grip_material:
      name: Material da empunhadura
      description: Especifica o material utilizado na superfície de aderência do cabo,
        o que afeta o conforto e a tração, principalmente quando molhado.
    handle_grip_type:
      name: Tipo da empunhadura
      description: Especifica o material/revestimento do cabo ou o estilo da superfície,
        destinados a melhorar o conforto e o controle.
    handle_shape:
      name: Formato da empunhadura
      description: Formato ou perfil transversal da empunhadura.
    handlebar_design:
      name: Design do apoio para as mãos
      description: 'Especifica o tipo de apoio para as mãos do simulador de escada,
        como: nenhum, fixo, com altura ajustável, dobrável ou manetes com faixas de
        resistência.'
    handlebar_type:
      name: Tipo de guidão
      description: Identifica o estilo do guidão instalado na bicicleta, o que influencia
        a postura ao pedalar, o controle e o conforto.
    handslide_bore_type:
      name: Tipo de calibre da vara
      description: Especifica se o trombone de baixo utiliza uma vara de calibre simples
        ou calibre duplo.
    handwear_cuff_style:
      name: Estilo do punho das luvas
      description: Descreve o estilo de construção do punho ou do pulso de luvas comuns
        ou luvas sem dedos/mitenes, o que afeta a cobertura e o ajuste.
    handwear_insulation_material:
      name: Material isolante das luvas
      description: Identifica o material isolante ou de forro usado no interior de
        luvas ou mitenes.
    handwear_size:
      name: Tamanho de luvas
      description: Especifica o tamanho das luvas ou outros acessórios para as mãos
        para garantir o ajuste adequado.
    hang_glider_design:
      name: Design de asa-delta
      description: 'Classifica o estilo estrutural do planador (ex.: asa flexível,
        asa rígida, motorizado).'
    hanger_thread_size:
      name: Tamanho da rosca do hanger
      description: Indica o tamanho/padrão da rosca do parafuso usado para fixar o
        hanger em suportes de vara (bank sticks) ou alarmes de mordida, garantindo
        a compatibilidade.
    hanging_suspension_method:
      name: Método de suspensão
      description: 'Define o equipamento ou sistema principal utilizado para pendurar
        o balanço (ex: corda, corrente, estrutura de suporte).'
    hardtop_finish_type:
      name: Tipo de acabamento da capota rígida
      description: 'Especifica o estado do acabamento externo da capota rígida (ex:
        com primer vs. pintada), o que afeta a prontidão para a instalação e a aparência.'
    hardtop_shell_material:
      name: Material da estrutura externa da capota rígida
      description: Especifica o material principal da estrutura da capota rígida de
        um veículo (não o tecido de cobertura), como fibra de vidro ou alumínio.
    hardtop_window_configuration:
      name: Configuração da janela da capota rígida
      description: Descreve quais janelas estão incluídas com a capota rígida e sua
        configuração.
    harmonica_comb_material:
      name: Material do pente da gaita
      description: Material utilizado no corpo da gaita (bloco de câmaras de ar).
    harmonica_cover_plate_finish:
      name: Acabamento das tampas de cobertura da gaita
      description: Especifica o acabamento ou revestimento das tampas de cobertura
        da gaita.
    harmonica_cover_plate_material:
      name: Material das placas de cobertura da gaita
      description: Material utilizado para as placas de cobertura externas.
    harmonica_finish:
      name: Acabamento da gaita
      description: Acabamento da superfície das placas de cobertura/corpo da gaita.
    harmonica_included_accessories:
      name: Acessórios inclusos da gaita
      description: Indica quais acessórios estão incluídos com a gaita.
    harmonica_note_range:
      name: Extensão das notas da gaita
      description: 'Classificação da extensão do instrumento utilizada em contextos
        orquestrais (ex: baixo, barítono, tenor).'
    harmonica_reed_plate_material:
      name: Material da placa das palhetas da gaita
      description: 'Material utilizado para as placas de palheta (ex.: latão, aço
        inoxidável, alumínio).'
    harmonica_system_type:
      name: Tipo/sistema da gaita
      description: 'Identifica o sistema ou formato da gaita orquestral (ex: de acordes,
        baixo, barítono, polifônica).'
    harmonica_tuning_system:
      name: Sistema de afinação da gaita
      description: 'Especifica o sistema/ layout de afinação utilizado pela gaita
        (ex.: Richter, Solo, afinação de orquestra).'
    harness_shell_type:
      name: Tipo de estrutura externa do trapézio
      description: 'Descreve a rigidez da estrutura externa do trapézio (ex: Softshell,
        Hardshell, híbrido).'
    harness_style:
      name: Estilo do trapézio
      description: Define o estilo/design estrutural do trapézio, por exemplo, cintura,
        assento, peito/colete, cinto de asa, calção de banho ou híbrido.
    harness_type:
      name: Tipo de arnês
      description: 'Classifica o tipo de estrutura do suporte/cadeirinha de escalada,
        como: cadeirinha de cintura (sit), bouldrier integral/completo (full body)
        ou peitoral (chest).'
    harp_action_type:
      name: Tipo de mecanismo da harpa
      description: Mecanismo principal utilizado para alterar a altura/acidentes na
        harpa.
    harp_finish:
      name: Acabamento da harpa
      description: 'Acabamento da superfície do corpo da harpa (ex.: natural, tingido,
        pintado, laqueado).'
    harp_included_accessories:
      name: Acessórios inclusos da harpa
      description: Lista os acessórios incluídos na compra da harpa de pedal.
    harvest_method:
      name: Método de colheita
      description: Indica se o fruto do mar foi pescado na natureza, criado em cativeiro
        ou obtido por outro método.
    harvest_stage:
      name: Fase de colheita
      description: Especifica o estágio de crescimento em que a rúcula foi colhida,
        como microvegetal, folha jovem ou maço maduro.
    hat_style:
      name: Estilo do chapéu
      description: 'A construção/estilo do chapéu de festa (ex.: chapéu de cone, coroa,
        cartola, viseira) para refletir a aparência fundamental do item.'
    hazard_signal_mode:
      name: Modo de sinal de perigo
      description: Modos/padrões de iluminação selecionáveis para sinalizadores rodoviários
        LED/eletrônicos.
    head_configuration:
      name: Configuração da cabeça
      description: Especifica se a cabeça do machado possui uma enxó, um martelo,
        ambos ou nenhum. Isso afeta diretamente a funcionalidade no gelo e em terrenos
        mistos.
    head_material:
      name: Material da pele
      description: Material da pele instalada no quinto.
    head_movement_type:
      name: Tipo de movimento da cabeça
      description: 'Capacidade de movimentação direcional da cabeça do bipé ou tripé
        (ex: pan, tilt, cant).'
    head_side:
      name: Lado da pele
      description: Especifica se a pele do tambor se destina ao lado da batida (baqueta),
        ao lado de ressonância (frontal) ou a ambos.
    head_weight_style:
      name: Estilo de peso da cabeça
      description: Identifica a configuração do peso na cabeça da isca, que afeta
        a taxa de afundamento e a apresentação.
    headband_embellishment:
      name: Enfeite de tiara
      description: 'Identifica os elementos decorativos presos à tiara (ex.: laços,
        pérolas, cristais, orelhas de animais).'
    headboard_style:
      name: Estilo de cabeceira
      description: Descreve o design ou estilo de construção da cabeceira fornecida
        com a cama.
    headgear_strap_configuration:
      name: Configuração das tiras do protetor de cabeça
      description: Indica o número de tiras utilizadas para fixar o protetor de cabeça
        de luta livre.
    headjoint_crown_style:
      name: Estilo de coroa do bocal
      description: Especifica o estilo ou design da coroa (tampa) do bocal da flauta,
        o que pode afetar a estética e o peso/som.
    headjoint_pitch_standard:
      name: Padrão de afinação do bocal
      description: 'Indica o padrão de afinação do bocal (ex.: A=440 vs A=442).'
    headliner_product_form:
      name: Formato do revestimento do teto
      description: Especifica se o produto é um conjunto completo de forro de teto
        moldado, um tecido de substituição ou um componente de reparo/acabamento.
    headrest_mount_attachment_method:
      name: Método de fixação do suporte ao encosto de cabeça
      description: Especifica como o suporte se fixa às hastes do encosto de cabeça/assento.
    headrest_provision:
      name: Provisão para encosto de cabeça
      description: Indica se os encostos de cabeça estão inclusos e/ou se os pontos
        de fixação do encosto estão presentes.
    headset_standard:
      name: Padrão da caixa de direção
      description: Tipo de interface entre o tubo frontal (head-tube) e o jogo de
        direção utilizado pelo quadro.
    headstall_style:
      name: Estilo de cabeçada
      description: Classifica o design estrutural ou a configuração de orelha/testeira
        da cabeçada.
    headwear_intended_use:
      name: Uso pretendido do acessório para cabeça
      description: 'Indica a finalidade ou o contexto principal para o uso do turbante
        (ex.: queda de cabelo devido à quimioterapia, natação, motivos religiosos).'
    hearing_enhancer_style:
      name: Estilo do amplificador de audição
      description: Descreve o formato físico do dispositivo para que os usuários possam
        escolher entre fones de ouvido supra-auriculares, intra-auriculares, retroauriculares
        e outros designs.
    heart_rate_monitoring_method:
      name: Método de monitoramento da frequência cardíaca
      description: Identifica como o aparelho captura os dados da frequência cardíaca
        durante os exercícios.
    heart_rate_sensing_technology:
      name: Tecnologia do sensor de frequência cardíaca
      description: Especifica o método de medição fisiológica que o monitor utiliza
        para detectar a frequência cardíaca (por exemplo, ECG elétrico vs. PPG óptico).
    heart_rate_sensor_placement:
      name: Posicionamento do sensor de frequência cardíaca
      description: Indica onde o sensor é usado ou posicionado (no corpo ou na bicicleta),
        o que afeta o conforto e a precisão da medição.
    heat_retention_technology:
      name: Tecnologia de retenção de calor
      description: Descreve as tecnologias, revestimentos ou materiais que aumentam
        a transpiração ou a atividade térmica em cintas modeladoras voltadas para
        exercícios físicos (por exemplo, o efeito sauna do neoprene).
    heated_glass_feature:
      name: Recurso de aquecimento de vidro
      description: Indica se o vidro da janela inclui elementos elétricos integrados,
        como grade de desembaçamento traseiro e/ou uma antena embutida no vidro.
    heater_control_actuation_method:
      name: Método de acionamento do controle do aquecedor
      description: 'Especifica como o controle do aquecedor/HVAC aciona a caixa de
        ar (HVAC) do veículo (ex: acionamento por cabo, acionamento por vácuo ou sinalização
        eletrônica).'
    heater_control_electrical_connector_type:
      name: Tipo de conector elétrico para controle do aquecedor
      description: Especifica o tipo/interface do conector elétrico usado pelo conjunto
        do controle do aquecedor (por exemplo, cabo com rabicho versus conector macho).
    heating_technology:
      name: Tecnologia de aquecimento
      description: Identifica o principal mecanismo de aquecimento que o vaporizador
        utiliza para converter o material em vapor.
    heel_shape:
      name: Formato do salto
      description: 'Especifica o estilo geométrico ou a silhueta do próprio salto,
        ajudando os compradores a filtrar por aparência estrutural e preferências
        de estabilidade (ex.: agulha vs. bloco).'
    helicopter_mission_type:
      name: Tipo de missão do helicóptero
      description: Uso/função principal pretendida para o helicóptero.
    helicopter_rotor_configuration:
      name: Configuração dos rotores do helicóptero
      description: Especifica o layout do sistema de rotores do helicóptero (arranjo
        de rotor principal/rotor de cauda), como rotor principal único + rotor de
        cauda, coaxial, em tandem ou interligado.
    helmet_accessory_type:
      name: Tipo de acessório de capacete
      description: Identifica o tipo específico de peça ou acessório para capacete
        de bicicleta. Isso permite que os compradores localizem imediatamente o item
        correto.
    helmet_audio_connector_type:
      name: Tipo de conector de áudio para capacete
      description: Especifica o tipo de conector de áudio da aeronave usado pelo lead
        de comunicação do capacete, se houver.
    helmet_communication_system_readiness:
      name: Compatibilidade do capacete com sistemas de comunicação
      description: Se o capacete foi projetado para aceitar um sistema de comunicação
        por intercomunicador/Bluetooth.
    helmet_construction_type:
      name: Tipo de construção do capacete
      description: Descreve o estilo de estrutura e do forro do capacete (por exemplo,
        espuma, casco rígido, híbrido).
    helmet_fit_head_shape:
      name: Ajuste do capacete (forma da cabeça)
      description: Perfil de ajuste interno projetado para diferentes formas de cabeça.
    helmet_interior_liner_type:
      name: Tipo de forro interno do capacete
      description: Tipo de forro de conforto e se ele é removível/lavável.
    helmet_liner_material:
      name: Material do forro do capacete
      description: Especifica o material do forro ou preenchimento interno ou que
        proporciona conforto e absorção de impacto.
    helmet_retention_closure_type:
      name: Tipo de fechamento de retenção do capacete
      description: 'Especifica o mecanismo de fecho da cinta jugular do capacete (ex.:
        anel duplo em D, catraca micrométrica).'
    helmet_safety_certification:
      name: Certificação de segurança do capacete
      description: Lista as normas ou certificações de segurança que o capacete cumpre.
    helmet_safety_certification_standard:
      name: Norma de certificação de segurança do capacete
      description: Normas de segurança/homologação que o capacete de motociclista
        é certificado para atender.
    helmet_shell_material:
      name: Material da estrutura externa do capacete
      description: Material ou construção principal da camada externa do capacete.
    helmet_size_system:
      name: Sistema de tamanho do capacete
      description: Sistema de numeração utilizado para indicar o tamanho do capacete.
    helmet_sun_visor_type:
      name: Tipo de viseira solar do capacete
      description: Especifica se o capacete inclui uma viseira solar interna suspensa,
        uma viseira externa fumê, ambas ou nenhuma.
    helmet_vehicle_fit:
      name: Ajuste do capacete ao veículo
      description: Tipo de veículo/uso de pilotagem para o qual o capacete foi projetado.
    helmet_ventilation_adjustability:
      name: Ajuste da ventilação do capacete
      description: Especifica como a ventilação do capacete pode ser controlada pelo
        motociclista.
    helmet_ventilation_configuration:
      name: Configuração de ventilação do capacete
      description: Descreve o layout de ventilação e as opções de ajuste do capacete
        (por exemplo, entrada de ar no queixo, entradas de ar na testa/frontais, aberturas
        de ventilação que podem ser fechadas).
    helmet_visor_peak_adjustability:
      name: Ajuste da viseira/pala do capacete
      description: Se a pala/viseira off-road do capacete é ajustável e/ou removível.
    helmet_visor_shield_optical_features:
      name: Características óticas da viseira do capacete
      description: Características óticas e de compatibilidade da viseira/protetor
        facial principal.
    helmet_visor_shield_type:
      name: Tipo de viseira do capacete
      description: Configuração principal da viseira/protetor facial incluída com
        o capacete.
    hem_style:
      name: Estilo da bainha/barra
      description: Identifica o estilo de acabamento da abertura da perna (como limpo,
        enrolado ou sem acabamento) que influencia fortemente a aparência da peça.
    hemisphere_compatibility:
      name: Compatibilidade hemisférica
      description: Especifica para qual hemisfério o mapa estelar foi projetado, com
        base nas constelações visíveis.
    hemline_style:
      name: Estilo da barra
      description: Define o corte ou design da barra do vestido.
    herbal_infusion_function:
      name: Funções da infusão de ervas
      description: Indica o principal benefício funcional ou de bem-estar para o qual
        a infusão é destinada.
    hex_size:
      name: Tamanho da sextavada
      description: Tamanho da chave sextavada necessária para instalar/remover a vela
        de aquecimento/incandescente.
    hi_hat_pair_type:
      name: Tipo de par de chimbal
      description: Indica se a listagem é para um par superior/inferior correspondente
        ou um componente de prato de chimbal individual.
    hi_hat_sound_character:
      name: Características sonoras do chimbal
      description: Descreve o perfil tonal geral para ajudar o comprador a filtrar
        pelo som que deseja.
    high_visibility_class:
      name: Classe de alta visibilidade
      description: Especifica o nível de classificação de visibilidade ANSI/ISEA 107
        da vestimenta.
    highback_style:
      name: Estilo do highback
      description: Descreve o estilo/design estrutural do highback, o que influencia
        as características de execução da modalidade esportiva.
    hitch_ball_diameter:
      name: Diâmetro da esfera de engate
      description: 'Diâmetro da cabeça esférica do engate que se conecta ao acoplador
        do reboque (ex: 1 7/8 pol., 2 pol., 2 5/16 pol., 50 mm).'
    hitch_ball_mounting_style:
      name: Estilo de montagem da esfera de engate
      description: Indica se a esfera de engate é do tipo padrão com porca de fixação,
        do tipo fixa/prensada para cabeças de engate específicas ou inclui equipamentos
        integrados.
    hobby_horse_handle_type:
      name: Tipo de cabo do cavalo de pau
      description: Especifica a construção do cabo/haste usado para segurar ou guiar
        o cavalo de pau.
    hobby_horse_sound_features:
      name: Características sonoras do cavalo de pau
      description: Indica se o cavalo de pau inclui efeitos sonoros e de que tipo.
    hockey_goal_type:
      name: Tipo de gol/trave de hóquei
      description: Especifica o estilo ou uso pretendido do pacote do gol/traves de
        hóquei (por exemplo, gelo regulamentar, rua,mini).
    hockey_size_category:
      name: Categoria do tamanho do hóquei
      description: Indica o segmento de tamanho de equipamento padronizado em que
        a peça se encaixa (juvenil, júnior, intermediário, sênior etc.)
    hockey_size_segment:
      name: Segmento de tamanho para hóquei
      description: Especifica o segmento padronizado de tamanho de equipamento de
        hóquei que determina as dimensões gerais das proteções e o ajuste.
    hold_surface_texture:
      name: Textura da superfície de apoio
      description: Descreve a aspereza ou o acabamento tátil da superfície de aderência
        do objeto.
    home_decor_sewing_pattern_project_type:
      name: Tipo de projeto de molde/padrão de costura de decoração para casa
      description: 'Identifica o tipo de item de decoração para casa que o padrão/molde
        de costura permite criar (ex.: capa de almofada, cortina, caminho de mesa).'
    homologation_rule_set:
      name: Homologação/conjunto de regras
      description: Especifica o órgão regulador ou conjunto de regras que o carro
        cumpre (se aplicável).
    honey_form:
      name: Mel forma
      description: Especifica a forma física ou apresentação do produto de mel.
    honey_processing_method:
      name: Método de processamento do mel
      description: Indica como o mel foi tratado ou processado antes da embalagem.
    honey_variety:
      name: Mel variedade
      description: Identifica a origem botânica ou floral do mel—seja monofloral ou
        polifloral—o que afeta diretamente o sabor, a cor e o preço.
    hood_configuration:
      name: Configuração do capuz
      description: Descreve o design do capuz e os recursos de ajuste.
    hood_design:
      name: Design do capuz
      description: Identifica a existência e o estilo do capuz na roupa.
    hood_style:
      name: Estilo do capuz
      description: Indica a presença e o estilo de um capuz na peça de roupa.
    hood_type:
      name: Capuz tipo
      description: Indica características especiais de design da parte do capuz da
        peça de roupa.
    hook_and_eye_size_hook_number:
      name: Colchete tamanho (número do gancho)
      description: Tamanhos/numeração padronizados de colchetes (quando aplicável)
        usados na embalagem para indicar o tamanho geral do colchete.
    hook_and_loop_fastener_duty_rating:
      name: Fecho de contato classificação de resistência
      description: Indica o nível de resistência pretendido do fecho de contato.
    hook_and_loop_fastener_format:
      name: Fecho de contato formato
      description: Especifica a forma física ou o formato de embalagem do produto
        de fecho de contato (por exemplo, rolo/fita, pontos, tiras).
    hook_and_loop_fastener_side:
      name: Lado do fecho de contato (gancho ou argola)
      description: Especifica se o produto inclui apenas o lado com ganchos, apenas
        o lado com laços ou um conjunto com ambos os lados.
    hook_coating_finish:
      name: Revestimento/acabamento do gancho
      description: Tratamento de superfície ou revestimento aplicado ao anzol para
        resistência à corrosão, camuflagem ou cor (por exemplo, níquel preto, estanho
        brilhante).
    hook_configuration:
      name: Anzol configuração
      description: Descreve a presença e o estilo dos anzóis fornecidos com a isca
        artificial.
    hook_eye_style:
      name: Estilo do gancho e olhal
      description: Especifica o formato ou a orientação do olho do anzol, o que afeta
        como o anzol é amarrado ou fixado.
    hook_eye_type:
      name: Tipo do gancho e olhal
      description: Especifica o design do olho do anzol, afetando a escolha do nó
        e a montagem.
    hook_loop_format:
      name: Fecho de contato formato
      description: Especifica a forma física do fecho de contato para costura.
    hook_loop_side:
      name: Lado do fecho de contato (gancho ou argola)
      description: Especifica se o produto é o lado com ganchos, o lado com laços
        ou um conjunto combinado de fecho de contato.
    hook_material:
      name: Gancho material
      description: Identifica o material usado especificamente no gancho/cabeça do
        gancho de arpéu, um fator essencial para a resistência e a resistência à corrosão
        em uso em água salgada.
    hook_organizer_style:
      name: Organizador de ganchos estilo
      description: O estilo físico ou formato do organizador de ganchos (por exemplo,
        estojo, rolo ou bolsa), usado para facilitar a navegação e a filtragem por
        tipo de organizador.
    hook_point_configuration:
      name: Configuração da ponta do gancho
      description: Indica se o anzol tem duas pontas (duplo) ou três pontas (triplo).
    hook_point_type:
      name: Anzol tipo de ponta
      description: Descreve o desbaste ou formato da ponta de um anzol de pesca, que
        afeta a penetração e a capacidade de retenção.
    hook_shank_length:
      name: Anzol comprimento da haste
      description: Indica a classificação do comprimento relativo da haste do anzol
        (por exemplo, curta, longa) para comparação visual e funcional rápida.
    hooks_eyes_attachment_method:
      name: Colchetes de gancho & olhal método de fixação
      description: Como os colchetes de gancho & olhal são fixados à peça de roupa
        ou ao projeto.
    hop_up_type:
      name: Hop-up tipo
      description: Define o sistema hop-up usado para imprimir rotação reversa às
        BBs, aumentando o alcance e a precisão.
    horse_blanket_type:
      name: Manta para cavalo tipo
      description: Especifica o estilo principal ou o uso pretendido da manta ou do
        cobertor para cavalo.
    horse_brush_type:
      name: Tipo de escova para pelagem
      description: Classifica a escova por seu estilo de cuidado específico ou finalidade,
        permitindo que os clientes filtrem sem fragmentar a hierarquia da categoria.
    horse_care_purpose:
      name: Cuidado com cavalos finalidade
      description: Função principal do produto no cuidado com cavalos, abrangendo
        necessidades de saúde, higiene e manejo.
    horse_feed_stage:
      name: Ração para cavalo fase
      description: Indica a fase da vida ou o estado fisiológico do cavalo para o
        qual a ração foi formulada.
    horse_groomer_type:
      name: Ferramenta de cuidado para cavalos tipo
      description: Classifica o estilo da ferramenta de cuidado para que os clientes
        possam localizar rapidamente a ferramenta específica de que precisam.
    horse_leg_protection_type:
      name: Proteção para perna de cavalo tipo
      description: Classifica o estilo ou a função específica da bota, envoltório
        ou bandagem para equinos.
    horse_model_breed:
      name: Modelo de cavalo raça
      description: Especifica a raça de cavalo representada pelo modelo em escala
        (se aplicável).
    hosiery_toe_style:
      name: Meia estilo da ponta
      description: Define a construção da área dos dedos da meia, importante para
        durabilidade e compatibilidade com calçados de bico aberto.
    hot_air_balloon_basket_type:
      name: Cesta de balão de ar quente tipo
      description: Especifica a configuração/estilo principal da cesta (por exemplo,
        standard sport, comercial de alta capacidade, com divisórias, acessível/com
        porta) usada para embarque e operação pretendida.
    hot_air_balloon_burner_type:
      name: Tipo de queimador do balão de ar quente
      description: Tipo/configuração do sistema de queimador instalado no balão.
    hot_air_balloon_envelope_material:
      name: Envelope de balão de ar quente material
      description: Tecido/material principal usado para o envelope do balão (canopy).
    hotfix_application_tool:
      name: Ferramenta de aplicação Hotfix
      description: Ferramenta ou fonte de calor recomendada usada para aplicar strass
        hotfix.
    hub_axle_type:
      name: Cubo tipo de eixo
      description: Identifica o sistema de interface/retenção do eixo para o qual
        o cubo foi projetado (blocagem rápida, eixo passante, etc.).
    hub_motor_type:
      name: Motor de cubo tipo
      description: Descreve o estilo de construção do motor de cubo (com engrenagens,
        acionamento direto, com escovas, sem escovas) para informar os compradores
        sobre características de torque, peso e eficiência.
    hula_hoop_construction_type:
      name: Bambolê tipo de construção
      description: Descreve como o bambolê é construído/montado.
    hula_hoop_features:
      name: Bambolê características
      description: Destaca características funcionais ou de design notáveis do bambolê.
    hull_design:
      name: Casco design
      description: Descreve o formato do casco que influencia o desempenho e as características
        de manuseio.
    hull_type:
      name: Casco tipo
      description: Descreve a forma do casco que impacta o desempenho e a estabilidade.
    humidifier_refill_medium_type:
      name: Umidificador meio de refil tipo
      description: Identifica o meio de retenção de umidade/refil usado pelo umidificador
        de estojo (o que é umedecido ou substituído).
    humidifier_refill_method:
      name: Umidificador método de recarga
      description: Descreve como o umidificador é recarregado com umidade ou substituído.
    humidifying_medium:
      name: Umidificação meio
      description: Identifica o elemento/meio de umidificação usado pelo produto (o
        que é umedecido/ativado).
    hummus_base_ingredient:
      name: Hummus ingrediente base
      description: Identifica a principal leguminosa ou base vegetal usada para fazer
        o hummus.
    hunting_call_type:
      name: Chamada de caça tipo
      description: Classifica o principal estilo ou mecanismo de operação da chamada
        (por exemplo, soprado pela boca, eletrônico, caixa), para que os caçadores
        possam escolher rapidamente o formato mais adequado às suas necessidades e
        ao seu nível de habilidade.
    hunting_dog_collar_function:
      name: Coleira para cão de caça função
      description: Classifica o principal estilo funcional ou finalidade da coleira,
        ajudando os compradores a filtrar produtos por funções como rastreamento,
        treinamento, visibilidade ou uso padrão.
    hvac_control_functions:
      name: Funções de controle do HVAC
      description: Indica quais funções de HVAC/desembaçamento/fluxo de ar são controladas
        pela unidade (mecânica ou eletrônica).
    hybrid_drivetrain_configuration:
      name: Configuração do trem de força híbrido
      description: Indica a arquitetura do sistema PHEV, descrevendo como o(s) motor(es)
        elétrico(s) e o motor a combustão fornecem propulsão.
    hybrid_system_type:
      name: Tipo de sistema híbrido
      description: Classifica a arquitetura de hibridização usada pelo veículo.
    hybrid_truck_cab_type:
      name: Tipo de cabine de caminhão híbrido
      description: Especifica a configuração da cabine do caminhão, que afeta a capacidade
        de assentos e o espaço interno.
    hydration_bag_features:
      name: Características da bolsa de hidratação
      description: Destaca características notáveis de design ou funcionalidade específicas
        das bolsas de hidratação.
    hydration_belt_features:
      name: Características do cinto de hidratação
      description: Lista recursos integrados notáveis que melhoram a usabilidade,
        a segurança ou a conveniência do cinto de hidratação.
    hydration_bladder_compatibility:
      name: Compatibilidade com reservatório de hidratação
      description: Indica se o colete inclui ou é compatível com um sistema de reservatório
        de hidratação.
    hydration_mouthpiece_style:
      name: Estilo do bocal de hidratação
      description: Especifica o design ou estilo funcional do bocal ou da válvula
        de um sistema de hidratação, ajudando os compradores a escolher sua interface
        de consumo preferida e garantir a compatibilidade.
    hydration_pack_style:
      name: Estilo da mochila de hidratação
      description: Especifica o estilo estrutural da mochila de hidratação, como mochila
        ou colete, para auxiliar na filtragem por ajuste e caso de uso.
    hydration_system_insulation:
      name: Isolamento do sistema de hidratação
      description: Indica se o reservatório e/ou o tubo de hidratação são isolados
        para ajudar a manter a temperatura do líquido em condições quentes ou frias.
    hydration_valve_type:
      name: Válvula de hidratação tipo
      description: Identifica o estilo da válvula para beber ou do bocal fornecido
        com o sistema ou a garrafa, abrangendo designs comuns de válvula de mordida
        e bico de alto fluxo.
    hydraulic_fluid_type:
      name: Fluido hidráulico tipo
      description: Especifica o tipo de fluido de freio que uma manete de freio hidráulico
        de bicicleta foi projetada para usar. Essa informação é fundamental para a
        manutenção e a segurança.
    hydrogenation_level:
      name: Hidrogenação nível
      description: Indica se a gordura é não hidrogenada, parcialmente hidrogenada
        ou totalmente hidrogenada, o que impacta o teor de gordura trans e o desempenho
        em assados.
    hydrophobicity_level:
      name: Hidrofobicidade nível
      description: Indica o grau de desempenho de formação de gotas e escoamento de
        água anunciado pelo produto.
    ice_cream_format:
      name: Sorvete formato
      description: 'Descreve a forma física ou apresentação do produto de sorvete
        (ex.: pote, barra, mochi).'
    ice_skate_sharpener_type:
      name: Apontador de patins de gelo tipo
      description: Classifica o design ou formato geral do apontador (pedra manual,
        máquina elétrica, gabarito etc.).
    ice_temperature_suitability:
      name: Temperatura do gelo adequação
      description: Indica a faixa de temperatura do gelo para a qual a cera para taco
        de hóquei é formulada, afetando o desempenho e as propriedades repelentes
        de neve.
    icing_sugar_variety:
      name: Açúcar de confeiteiro variedade
      description: 'Classifica a formulação ou o tipo funcional do açúcar de confeiteiro
        (ex.: fondant, pó para neve que não derrete, colorido, aromatizado).'
    ignition_coil_configuration:
      name: Bobina de ignição configuração
      description: Especifica o fator de forma da bobina de ignição (bobina simples/bobina
        sobre vela, pacote de bobinas multiterminal por contagem de cilindros, régua/cassete
        de bobinas ou tipo com distribuidor).
    ignition_lead_compliance_standard:
      name: Cabo de ignição norma de conformidade
      description: 'Norma formal do setor ou certificação que o(s) cabo(s) de ignição
        atende(m), conforme declarado pelo fabricante (ex.: SAE J2031, ISO 3808).'
    ignition_lead_insulation_material:
      name: Cabo de ignição material de isolamento
      description: Material primário de isolamento/revestimento usado no cabo de ignição
        (isolamento externo do cabo).
    ignition_lead_set_type:
      name: Cabo de vela tipo de conjunto
      description: Indica se o produto é um único cabo de vela ou um conjunto completo,
        e qual é a finalidade do conjunto.
    ignition_lead_terminal_type:
      name: Cabo de vela tipo de terminal
      description: 'Estilo de terminal/conector usado nas extremidades do cabo de
        vela (ex.: terminal da vela de ignição e estilo de terminal da bobina/distribuidor).'
    illumination_type:
      name: Iluminação tipo
      description: 'Especifica se e como a bola é iluminada para jogos noturnos (ex.:
        brilho fosforescente, LED ativado por impacto).'
    immobilizer_installation_type:
      name: Tipo de instalação do imobilizador
      description: Indica como o imobilizador é instalado ou conectado ao veículo.
    immobilizer_unlock_method:
      name: Imobilizador método de desbloqueio
      description: Especifica como o imobilizador é armado/desarmado ou desbloqueado.
    impact_protection_certifications:
      name: Proteção contra impacto certificações
      description: Nomeia a(s) norma(s) de segurança específica(s) que a almofada
        de proteção atende ou excede.
    impact_protection_level:
      name: Nível de proteção contra impactos
      description: Especifica o nível ou a tecnologia de proteção contra impacto oferecido
        pela coquilha esportiva.
    impact_protection_rating:
      name: Proteção contra impacto classificação
      description: 'Especifica o nível certificado de proteção contra impacto de acordo
        com normas (ex.: EN 1621-1 Nível 1, EN 14120 Nível 2), ajudando motociclistas
        a filtrar por proteção de grau superior.'
    impact_surface_material:
      name: Material da superfície de impacto
      description: 'Descreve o material principal da superfície de impacto/contato
        para segurança e sensação (ex.: espuma, plástico).'
    incense_base_material:
      name: Incenso material da base
      description: Material principal da base/aglutinante usado para fazer o incenso
        (base em pó) no kit.
    incense_making_method:
      name: Incenso método de fabricação
      description: O processo artesanal previsto compatível com o kit.
    incense_tool_type:
      name: Incenso tipo de ferramenta
      description: Especifica que tipo de ferramenta para fabricação de incenso este
        produto é (usada para modelar, medir, prensar, misturar ou secar incenso).
    incline_adjustment_type:
      name: Inclinação tipo de ajuste
      description: Descreve como (ou se) a inclinação pode ser alterada durante os
        treinos.
    included_accessories:
      name: Acessórios inclusos
      description: Lista acessórios incluídos, como cabeças/bits extras, estojo de
        armazenamento, cabo de carregamento ou adaptador CA.
    included_case_type:
      name: Tipo de caso incluso
      description: Tipo de estojo de transporte/armazenamento incluído com o saxofone
        baixo (se houver).
    included_components:
      name: Componentes incluídos
      description: Lista o que está incluído no pacote (útil para conjuntos de ferramentas
        e kits).
    included_fastener_components:
      name: Componentes de fecho incluídos
      description: Especifica se o produto é um conjunto de colchetes, apenas colchetes
        macho, apenas colchetes fêmea ou uma variante relacionada de fecho para vestuário.
    included_hydration_vessel_type:
      name: Recipiente de hidratação incluído tipo
      description: Identifica o estilo de recipiente de hidratação fornecido ou compatível
        com o cinto.
    included_items_woodwind_instrument:
      name: Itens incluídos (instrumento de sopro)
      description: Lista quais itens comumente agrupados estão incluídos no pacote
        do saxofone baixo.
    included_materials:
      name: Materiais incluídos
      description: Indica quais componentes estão incluídos com a compra do molde
        (somente molde vs. molde + materiais).
    included_mounting_accessories:
      name: Acessórios de montagem incluídos
      description: Lista quais acessórios de montagem/fixação estão incluídos com
        o viva-voz.
    included_pump_type:
      name: Bomba incluída tipo
      description: Identifica o tipo de bomba fornecida ou integrada ao colchão inflável.
    included_scraper_implement_type:
      name: Implemento de reco-reco incluído tipo
      description: 'Indica quais implementos de execução estão incluídos com o reco-reco
        musical (ex.: baqueta/vareta para reco-reco, escova de arame).'
    indicator_design:
      name: Indicador design
      description: Classifica a forma física ou o estilo do indicador de fisgada de
        pesca.
    indicator_functions_tracked:
      name: Indicador funções monitoradas
      description: Lista as métricas específicas do jogo que o indicador monitora,
        como bolas, strikes, eliminações, entradas, contagem de arremessos, overs,
        wickets, placar ou downs.
    indoor_outdoor_use:
      name: Uso interno/externo
      description: Indica se o brinquedo de boliche foi projetado para uso interno,
        uso externo ou ambos.
    inflatable_decoration_items_included:
      name: Decoração inflável itens incluídos
      description: 'Lista os principais acessórios incluídos com a decoração inflável
        (ex.: soprador, estacas, cordas de fixação).'
    inflatable_decoration_type:
      name: Decoração inflável tipo
      description: Especifica o tipo de decoração inflável para festas (formato/fator
        de forma) para facilitar a navegação e a filtragem.
    inflatable_raft_float_features:
      name: Bote/boia inflável recursos
      description: Recursos funcionais presentes no bote/boia inflável.
    inflation_method_included:
      name: Enchimento método incluído
      description: Especifica o tipo de solução de enchimento de pneus incluída com
        o kit de reparo, se houver.
    infused_scent:
      name: Aroma infundido
      description: Identifica aditivos de aroma ou sabor impregnados no material da
        isca.
    ingredient_base_type:
      name: Ingrediente base tipo
      description: 'Identifica a base principal fornecida para fermentação (ex.: concentrado
        de suco de uva vs. suco fresco vs. concentrado de fruta).'
    ingredient_physical_form:
      name: Ingrediente forma física
      description: Especifica a forma física em que o ingrediente de fragrância é
        fornecido (usada para manuseio, medição e formulação).
    ingredient_processing_method:
      name: Método de processamento de ingredientes
      description: 'Especifica a principal técnica de processamento aplicada ao ingrediente
        (ex.: liofilizado, torrado, fermentado).'
    ink_colors_included:
      name: Cores de tinta incluídas
      description: Especifica as cores de tinta incluídas na(s) carimbeira(s) do conjunto.
    ink_pad_application_method:
      name: Carimbeira método de aplicação
      description: Como a tinta é dispensada/usada a partir da carimbeira (carimbeira
        tradicional vs. aplicador tipo esponja vs. carimbeira com ponta pincel).
    ink_pad_permanence:
      name: Permanência da tinta da almofada para carimbo
      description: Se a tinta carimbada é permanente e/ou arquivística (resistência
        ao desbotamento e à água depois de seca).
    ink_pad_size:
      name: Carimbeira tamanho
      description: Tamanho/fator de forma padronizado da superfície/estojo da carimbeira.
    ink_pad_special_effects:
      name: Carimbeira efeitos especiais
      description: 'Efeitos visuais/funcionais especiais da tinta ao ser carimbada
        (ex.: metálica, glitter).'
    ink_permanence:
      name: Tinta permanência
      description: Indica se a tinta sumi seca foi projetada para ser permanente/arquivística
        vs. lavável/não permanente.
    ink_preparation_required:
      name: Tinta preparação necessária
      description: Indica se a tinta sumi está pronta para uso ou requer diluição
        com água ou moagem antes do uso.
    inline_skate_brake_type:
      name: Patins inline tipo de freio
      description: Especifica a configuração de freio incluída com os patins inline,
        como freio de calcanhar removível ou sem freio.
    inner_tent_configuration:
      name: Barraca interna configuração
      description: Especifica a configuração ou o estilo da barraca interna, por exemplo,
        insert completo, insert de tela ou forro térmico.
    innerspring_coil_type:
      name: Tipo de mola interna
      description: Especifica o estilo de construção do sistema de molas internas
        do colchão, o que afeta a sustentação, o isolamento de movimento e o preço.
    input_connector_type:
      name: Tipo de conector de entrada
      description: Especifica o tipo de conector de entrada de áudio usado pelo pedal
        (normalmente TS de 1/4 de polegada).
    input_valve_type:
      name: Tipo de válvula de entrada
      description: Indica o padrão de válvula presente na câmara de ar/roda da bicicleta
        à qual o adaptador se conecta.
    insecticide_treatment:
      name: Tratamento com inseticida
      description: Indica se a tela foi tratada com inseticida em fábrica e, em caso
        afirmativo, o tipo de tratamento usado para proteção adicional.
    insert_coverage_area:
      name: Área de cobertura da palmilha
      description: Especifica qual parte do pé a palmilha foi projetada para cobrir
        (por exemplo, comprimento total, apenas calcanhar).
    insert_length_type:
      name: Tipo de comprimento do inserto
      description: Indica quanto da palmilha o suporte do arco plantar cobre.
    inside_message_type:
      name: Mensagem interna tipo
      description: Indica se o cartão inclui uma mensagem pré-impressa na parte interna
        e se ela é personalizável.
    insole_attachment_method:
      name: Método de fixação da palmilha
      description: Especifica como o suporte de arco permanece no lugar dentro do
        calçado (de encaixe solto, com verso adesivo, com fecho de contato etc.).
    insole_material:
      name: Palmilha material
      description: Descreve o material da base de apoio do pé ou da palmilha sobre
        a qual o pé repousa, afetando o amortecimento e a sustentação.
    installation_fabrication_level:
      name: Instalação nível de fabricação
      description: Indica a quantidade típica de fabricação personalizada ou modificação
        necessária para instalar o kit.
    installation_location:
      name: Instalação local
      description: Especifica o ponto de instalação típico do sensor de pressão de
        óleo no sistema de óleo do motor (por exemplo, porta da galeria de óleo do
        bloco, carcaça do filtro, placa sanduíche ou suporte remoto na linha).
    installation_method:
      name: Método de instalação
      description: Especifica como o tapete ou piso é fixado ou instalado no chão.
    instant_coffee_form:
      name: Café instantâneo forma
      description: Descreve a forma física em que o café instantâneo é fornecido,
        afetando o método de preparo e a vida útil.
    instep_coverage:
      name: Cobertura do peito do pé
      description: Especifica se o produto protege apenas a canela ou tanto a canela
        quanto o peito do pé/pé.
    instruction_format:
      name: Formato das instruções
      description: Formato das instruções incluídas no kit.
    instrument_cleaning_swab_form_factor:
      name: Swab de limpeza de instrumento formato físico
      description: Especifica o estilo físico do swab (por exemplo, pano de passagem
        versus sistema de haste/escova) para corresponder à preferência do músico
        e às limitações do instrumento.
    instrument_dimensions_unit_context:
      name: Instrumento dimensões contexto de medida
      description: Esclarece a que se referem as medidas de altura/largura/comprimento
        fornecidas (por exemplo, instrumento completo, comprimento de um único tubo,
        altura do suporte).
    instrument_electronics_type:
      name: Instrumento tipo de eletrônica
      description: Indica se o sistema de captador/pré-amplificador do instrumento
        é ativo ou passivo.
    instrument_key:
      name: Tonalidade do instrumento
      description: Especifica a designação da tonalidade do instrumento da flauta
        doce usada em catálogos (normalmente Dó ou Fá para flautas doces maiores).
    instrument_level:
      name: Instrumento nível
      description: Nível de habilidade do músico para o qual o instrumento é oferecido.
    instrument_part_mounting_method:
      name: Peça de instrumento método de montagem
      description: Especifica como a peça é fixada ou instalada (por exemplo, com
        grampo vs adesivo vs parafuso).
    instrument_parts_included:
      name: Peças de instrumento incluídas
      description: Lista os principais componentes/peças incluídos na caixa de um
        clarinete em Lá.
    instrument_playing_technique:
      name: Instrumento técnica de execução
      description: Modo como o instrumento normalmente é tocado/acionado (por exemplo,
        agitado, percutido, clacked).
    instrument_size_class:
      name: Instrumento classe de tamanho
      description: Tamanho geral do instrumento expresso como uma classe favorável
        ao comprador, em vez de dimensões exatas.
    insulation_fill_material:
      name: Material de preenchimento isolante
      description: Identifica o principal material utilizado para isolar a jaqueta
        ou o colete.
    integrated_bottom_type:
      name: Tipo de base integrada
      description: Indica se a peça inclui briefs, shorts, collant ou camadas internas
        semelhantes integradas para cobertura durante o movimento.
    integrated_charging_options:
      name: Opções integradas e carregamento
      description: Lista as interfaces integradas de energia ou carregamento disponíveis
        na mesa de cabeceira.
    integrated_furniture_function:
      name: Funções de mobiliário integrado
      description: 'Identifica elementos adicionais de mobiliário embutido incluídos
        com a cama de parede ou estrutura (ex.: escrivaninha, sofá, prateleiras).'
    integrated_locking:
      name: Trava integrada
      description: Indica se o suporte inclui uma trava integrada para fixação do
        suporte ao veículo e/ou da bicicleta ao suporte.
    integrated_power_options:
      name: Opções de energia integradas
      description: Indica o tipo de recursos integrados de energia ou carregamento
        que a penteadeira oferece.
    integrated_storage_features:
      name: Recursos de armazenamento integrados
      description: Identifica recursos adicionais de armazenamento ou acessórios que
        o suporte para tacos de bilhar inclui além dos compartimentos para tacos.
    integrated_tool_functions:
      name: Funções integradas da ferramenta
      description: 'Recursos adicionais da ferramenta integrados à alavanca (ex.:
        gancho para raios, extrator de núcleo de válvula, extrator de talão).'
    intended_board_type:
      name: Prancha tipo pretendido
      description: Especifica o estilo de prancha de kitesurf para o qual a quilha
        foi projetada (por exemplo, twin tip, direcional de surf, hydrofoil).
    intended_consumption:
      name: Consumo pretendido
      description: Especifica como o produto deve ser consumido, indicando se é seguro
        consumi-lo cru, se requer assamento ou se está parcialmente assado.
    intended_craft:
      name: Artesanato pretendido
      description: Contexto principal de artesanato para o qual o guia de fios foi
        desenvolvido.
    intended_culinary_use:
      name: Uso culinário pretendido
      description: Indica a principal aplicação culinária do molho, como mergulhar,
        cozinhar ou glacear.
    intended_handlebar_style:
      name: Estilo de guidão pretendido
      description: Descreve o estilo de guidão ou o estilo de uso pretendido da alavanca
        (por exemplo, guidão reto, drop-bar, aero). Isso restringe rapidamente a compatibilidade
        sem forçar subcategorias adicionais.
    intended_player_role:
      name: Função de jogador pretendida
      description: Especifica a função em campo à qual o capacete se destina (por
        exemplo, catcher, árbitro).
    intended_playing_surface:
      name: Superfície de jogo pretendida
      description: Superfície para a qual o disco, a bola ou o anel foi projetado,
        como gelo, asfalto, pisos de ginásio ou gelo sintético.
    intended_repair_location:
      name: Local de reparo pretendido
      description: Em que parte do pneu o kit deve realizar o reparo.
    intended_seating_position:
      name: Posição de assento pretendida
      description: Especifica a posição de assento do veículo em que a tira do cinto
        de segurança deve ser instalada ou usada.
    intended_sewing_application:
      name: Aplicação de costura pretendida
      description: Aplicação de costura pretendida para a qual a linha foi projetada
        (por exemplo, costura geral de roupas, quilting, estofamento).
    intended_technique:
      name: Técnica pretendida
      description: Principal técnica de feltragem para a qual a almofada/tapete foi
        projetada.
    intended_use:
      name: Uso pretendido
      description: Principal contexto de uso do instrumento.
    intended_use_fleece_fabric:
      name: Uso pretendido (tecido fleece)
      description: Principal projeto/aplicação para o qual o tecido fleece é comercializado.
    intended_user:
      name: Usuário pretendido
      description: Indica por quem o equipamento de proteção para aeronave foi projetado
        para ser usado.
    intended_yarn_form:
      name: Forma pretendida do fio
      description: Especifica a apresentação do fio mais adequada para a tigela para
        fios.
    interaction_mode:
      name: Modo de interação
      description: Método de interação primário usado para acionar sons ou atividades.
    interactive_effects:
      name: Efeitos interativos
      description: Identifica os efeitos eletrônicos ou mecânicos interativos incluídos
        em um conjunto de cozinha de brinquedo.
    interfacing_application_area:
      name: Entretela área de aplicação
      description: Identifica as áreas comuns de costura/artesanato às quais a entretela
        se destina.
    interfacing_color_family:
      name: Entretela família de cores
      description: Indica a cor base típica da entretela usada sob tecidos claros
        ou escuros.
    interfacing_selling_format:
      name: Entretela formato de venda
      description: Descreve o formato de venda da entretela (por exemplo, corte contínuo
        vendido por comprimento, peças pré-cortadas, rolos ou amostras).
    interfacing_stiffness_level:
      name: Nível de rigidez da entretela
      description: Descreve o grau de rigidez/firmeza proporcionado pela entretela.
    interior_padding_type:
      name: Tipo de acolchoamento interno
      description: Tipo de acolchoamento interno ou sistema de inserção usado dentro
        da embalagem para proteger e organizar o conteúdo.
    interior_stall_configuration:
      name: Baia interna configuração
      description: Especifica o layout/configuração interna para o transporte de animais
        (orientação da baia e estilo do compartimento).
    invitation_printing_coverage:
      name: Convite cobertura de impressão
      description: Quais lado(s) do convite são impressos (somente frente vs frente
        e verso).
    iodization:
      name: Iodização
      description: Indica se e em que medida iodo foi adicionado ao sal.
    iridescence_level:
      name: Nível de iridescência
      description: Descreve a intensidade do brilho iridescente natural/tratado típico
        das penas de pavão.
    irish_warpipe_set_configuration:
      name: Conjunto de gaita de foles irlandesa configuração
      description: Indica qual configuração está sendo vendida (instrumento completo
        vs peças/conjunto parcial), especificamente para gaitas de foles irlandesas.
    iron_on_applique_application_method:
      name: Aplique termocolante método de aplicação
      description: Especifica como o aplique termocolante deve ser aplicado ao substrato.
    ironing_center_features:
      name: Centro de passar roupa recursos
      description: Lista recursos especializados de centros de passar roupa que melhoram
        a usabilidade e a conveniência.
    jacket_breast_style:
      name: Paletó estilo de abotoamento
      description: Especifica se o paletó do terno é de abotoamento simples ou duplo.
    jacket_vent_style:
      name: Estilo da abertura traseira do paletó
      description: Indica o tipo de abertura na parte de trás do paletó do terno.
    jam_and_jelly_consistency:
      name: Geleia consistência
      description: Descreve a textura da geleia, indicando presença de pedaços de
        fruta ou sementes.
    jaw_shape:
      name: Mandíbula formato
      description: Geometria das mandíbulas ou da ponta (por exemplo, reta, curvada,
        de bico longo), afetando a precisão e o alcance.
    jerky_form:
      name: Jerky formato
      description: Descreve a forma física ou o corte dos pedaços de jerky (por exemplo,
        tiras, palitos, pedaços pequenos).
    jersey_style:
      name: Estilo do paletó
      description: Camisa jersey formato
    jew_harp_accessories_included:
      name: Acessórios inclusos na harpa de boca
      description: Especifica o formato ou estilo de uso da camisa jersey para torcedores.
    jew_s_harp_frame_style:
      name: Berimbau de boca itens inclusos
      description: Lista os itens incluídos na embalagem do berimbau de boca (por
        exemplo, estojo, bolsa, instruções).
    jew_s_harp_tongue_profile:
      name: Berimbau de boca estilo da armação
      description: Descreve o estilo de construção da armação/corpo do berimbau de
        boca, que influencia a sensação ao tocar, a durabilidade e a ergonomia de
        uso.
    jewelry_pieces_included:
      name: Peças de joia inclusas
      description: Lista os itens específicos de joalheria incluídos no conjunto para
        que os compradores saibam exatamente quais peças estão comprando.
    jigsaw_puzzle_piece_shape:
      name: Quebra-cabeça formato da peça
      description: O estilo geral de corte/formato das peças e do perfil das bordas.
    jockstrap_design_features:
      name: Jockstrap recursos de design
      description: Captura elementos especiais de design exclusivos de jockstraps
        que influenciam a função ou a estética.
    juggling_club_construction_type:
      name: Clava de malabares tipo de construção
      description: Especifica o tipo geral de construção de uma clava de malabares
        (por exemplo, peça única moldada vs várias peças montadas), que pode afetar
        a durabilidade, a sensação de uso e a manutenção.
    juggling_club_core_material:
      name: Clava de malabares material do núcleo
      description: O principal material do núcleo usado dentro da clava (distinto
        do revestimento/fita externa).
    juggling_prop_set_size:
      name: Conjunto de malabares tamanho
      description: Número de acessórios principais incluídos no conjunto (por exemplo,
        conjunto de 3 bolas, par de poi).
    juggling_ring_edge_style:
      name: Anel de malabares estilo da borda
      description: O perfil da borda do anel, que influencia o conforto e a pegada.
    juice_form:
      name: Suco formato
      description: Especifica a forma física ou o estágio de processamento do produto
        (por exemplo, líquido pronto para beber, concentrado, pó).
    juice_processing_method:
      name: Método de processamento de suco
      description: Especifica a principal técnica de processamento aplicada ao suco
        ou à bebida, impactando o sabor, a retenção de nutrientes e a vida útil.
    jump_rope_style:
      name: Corda de pular estilo
      description: Classifica o estilo de construção da corda/cabo (por exemplo, com
        contas, de tecido, cabo de velocidade), que afeta fortemente o uso pretendido
        e o desempenho.
    kale_variety:
      name: Modalidade de couve
      description: Identifica o cultivar ou a variedade específica de couve kale (por
        exemplo, Curly, Lacinato/Dinosaur, Red Russian). Isso ajuda o comprador a
        escolher com base no sabor, na textura e no uso culinário.
    kaleidoscope_viewing_type:
      name: Caleidoscópio tipo de visualização
      description: Identifica o formato de visualização ou o estilo de operação do
        caleidoscópio (por exemplo, tubo ocular clássico, baseado em lente de teleidoscópio,
        operado por roda, projeção).
    kayak_construction_type:
      name: Tipo de construção do caiaque
      description: Especifica o estilo principal de construção do caiaque, como casco
        rígido ou inflável.
    kayak_design_type:
      name: Caiaque tipo de design
      description: Classifica a principal intenção de design do caiaque (por exemplo,
        surfski, playboat, touring).
    kayak_hull_design:
      name: Caiaque design do casco
      description: Identifica o formato principal do casco, que influencia características
        de condução, como estabilidade e manobrabilidade em condições de surfe.
    kayak_storage_bag_type:
      name: Tipo de bolsa para armazenamento em caiaque
      description: Identifica o estilo ou formato de uma bolsa de armazenamento para
        caiaque, como bolsa estanque ou bolsa para remo.
    kayak_style:
      name: Caiaque estilo
      description: Especifica o design principal ou estilo de uso do caiaque (por
        exemplo, recreativo, touring, inflável).
    keel_type:
      name: Quilha tipo
      description: Identifica a configuração da quilha do veleiro.
    kettlebell_style:
      name: Kettlebell estilo
      description: Identifica a construção ou variante de estilo do kettlebell (por
        exemplo, competição, ajustável, macio), ajudando os compradores a escolher
        o peso certo para suas necessidades de treino.
    key_attachment_mechanism:
      name: Chaveiro mecanismo de fixação
      description: Especifica as ferragens usadas para prender chaves dentro do estojo,
        como argolas, clipes ou pinos rosqueados.
    key_retention_when_unlocked:
      name: Retenção da chave quando destravada
      description: Indica se a chave pode ser removida da fechadura quando está na
        posição destravada.
    keyboard_amplifier_inputs:
      name: Amplificador de teclado entradas
      description: Lista as conexões de entrada compatíveis com o amplificador de
        teclado (por exemplo, TRS de 1/4 pol., entrada MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Amplificador de teclado tipos de saída
      description: Especifica os principais tipos de conectores de saída compatíveis
        com o amplificador de teclado para direcionar o áudio a outros sistemas.
    keyboard_case_handle_type:
      name: Case para teclado tipo de alça
      description: Sistema principal de alça usado para mover/carregar o case para
        teclado (além das tiras).
    keyboard_case_interior_padding_type:
      name: Case para teclado tipo de acolchoamento interno
      description: Principal abordagem de amortecimento/revestimento interno usada
        dentro do case rígido.
    keyboard_case_protection_level:
      name: Case para teclado nível de proteção
      description: Classe geral de proteção/rigidez do case rígido, diferenciando
        cases rígidos moldados de cases reforçados estilo flight case/ATA.
    keyboard_case_wheel_type:
      name: Tipo de roda do case para teclado
      description: Configuração das rodas para cases rígidos que incluem rodas.
    keyboard_pedal_connector_type:
      name: Pedal de teclado tipo de conector
      description: Especifica o tipo de conector/plugue usado para conectar o pedal
        de sustain a um teclado ou piano digital.
    keyboard_power_supply_type:
      name: Teclado tipo de alimentação
      description: Principal método de alimentação do teclado (bateria, adaptador
        AC, alimentado por USB).
    keyboard_stand_tier_type:
      name: Suporte para teclado tipo de nível
      description: Indica se o suporte é vendido apenas como suporte base ou se inclui/adiciona
        um acessório de segundo nível.
    keyboard_stand_tiers:
      name: Níveis do suporte para teclado
      description: Número de níveis de uso compatíveis com o suporte em estilo Z (por
        exemplo, nível único ou dois níveis).
    keychain_attachment_type:
      name: Chaveiro tipo de fixação
      description: Especifica a principal ferragem de fixação usada para prender o
        chaveiro a chaves, bolsas ou cintos.
    keychain_style:
      name: Chaveiro estilo
      description: Descreve o formato geral do item de chaveiro (o que ele é fisicamente).
    keywork_finish:
      name: Acabamento das chaves
      description: Descreve o acabamento/banho especificamente nas chaves, separado
        do acabamento do corpo.
    kick_point:
      name: Ponto de flexão
      description: Especifica a localização do ponto de flexão no cabo de um taco
        de hóquei, afetando a velocidade de liberação do arremesso e a sensação.
    kick_zone_grip_system:
      name: Sistema de aderência da zona de impulso
      description: Identifica a tecnologia usada na zona de impulso do esqui para
        tração.
    kickboard_features:
      name: Prancha de natação recursos
      description: Destaca características especiais da prancha de natação que melhoram
        o treino ou o conforto, incluindo textura da superfície e opções de pegada
        manual.
    kickboard_handle_style:
      name: Prancha de natação estilo da pegada
      description: Identifica se e como a prancha de natação oferece pegadas manuais
        ou tratamentos de superfície que influenciam o manuseio e o conforto.
    kickstand_mounting_position:
      name: Descanso de bicicleta posição de montagem
      description: Identifica onde o descanso é fixado no quadro da bicicleta (por
        exemplo, montagem central, montagem na escora inferior, montagem no eixo traseiro).
    kickstand_type:
      name: Tipo de descanso
      description: Descreve o estilo estrutural ou mecanismo do descanso (por exemplo,
        descanso lateral de uma perna, descanso central de duas pernas, telescópico).
    kidney_belt_support_level:
      name: Nível de suporte da cinta lombar
      description: Nível geral de suporte fornecido por uma cinta lombar, conforme
        designado pelo fabricante, para estabilização da região lombar e abdominal.
    kiln_firing_atmosphere:
      name: Atmosfera de queima do forno klin
      description: Especifica a(s) atmosfera(s) de queima que o forno pode suportar
        durante a operação (por exemplo, oxidação ou redução).
    kiln_heating_element_type:
      name: Tipo de elemento de aquecimento do forno
      description: Tipo/material dos elementos de aquecimento usados no forno.
    kingpin_design:
      name: Design do pino mestre
      description: Descreve o estilo de construção das ferragens do pino mestre em
        si, impactando o peso e a folga para grind.
    kingpin_orientation:
      name: Orientação do pino mestre
      description: Identifica a orientação do pino mestre do truck, que afeta as características
        de ride e a compatibilidade com o deck.
    kit_components_included:
      name: Componentes do kit inclusos
      description: Lista as peças individuais de ferragens fornecidas no kit (por
        exemplo, estacas de fixação no solo, parafusos, cintas, ferramenta de instalação)
        para que os compradores saibam exatamente o que estão comprando.
    kit_format:
      name: Formato do kit
      description: Especifica como o kit é embalado e transportado (por exemplo, bolsa,
        estojo, caixa).
    kit_items_included:
      name: Itens do kit inclusos
      description: Lista os principais equipamentos e suprimentos incluídos no kit
        de fabricação de vinho para que os compradores possam distinguir kits iniciais
        de refis somente com ingredientes.
    kit_pouch_case_type:
      name: Tipo de bolsa/estojo do kit
      description: Especifica o tipo de solução de armazenamento incluída no kit de
        cuidados (se houver).
    kit_tools_included:
      name: Ferramentas incluídas no kit
      description: Lista as principais ferramentas fornecidas no kit (se houver) para
        concluir o projeto.
    kite_inflation_system:
      name: Sistema de inflação do kite
      description: Indica como o bordo de ataque e as talas do kite são inflados.
    kite_line_configuration:
      name: Configuração das linhas do kite
      description: Indica o número de linhas de voo/controle que a vela do kite foi
        projetada para usar, uma especificação comum para parear barras e linhas corretamente.
    kite_type:
      name: Tipo de kite
      description: Define a categoria de design estrutural do kite (formato e estilo
        da brida).
    kiteboard_bag_style:
      name: Estilo de bolsa para prancha de kiteboard
      description: Estilo específico ou subtipo de bolsa para prancha de kiteboard
        (por exemplo, Boardbag, Golf bag, Travel bag, Foil bag).
    kiwifruit_variety:
      name: Variedade de kiwi
      description: Identifica a cultivar específica ou a variedade de cor do kiwi
        (verde, dourado, vermelho, etc.).
    knee_pad_pocket_type:
      name: Tipo de bolso para joelheira
      description: Indica se e como a peça de vestuário acomoda joelheiras de proteção.
    knee_pad_style:
      name: Estilo de joelheira
      description: Descreve o estilo de construção ou formato da proteção para joelho
        (por exemplo, manga, órtese, protetor).
    knee_protection_design:
      name: Design da proteção para joelhos
      description: Indica o número de seções articuladas para joelhos integradas ao
        protetor de perna.
    kneeboard_construction:
      name: Construção do kneeboard
      description: Identifica a principal técnica de construção ou composição da prancha
        (por exemplo, plástico rotomoldado, moldagem por compressão, fibra de carbono).
    kneeboard_strap_type:
      name: Tipo de alça do kneeboard
      description: Descreve o estilo do sistema de alças para joelhos usado para prender
        o praticante à prancha.
    knife_lock_mechanism:
      name: Mecanismo de trava da faca
      description: Especifica o mecanismo usado para fixar a lâmina de uma faca dobrável
        na posição aberta, ou indica modelos sem trava.
    knife_locking_mechanism:
      name: Mecanismo para travar a faca
      description: Especifica o tipo de mecanismo que fixa a lâmina na posição aberta,
        definindo diretamente a segurança, a resistência e a facilidade de uso de
        facas com trava.
    knife_opening_mechanism:
      name: Mecanismo para abrir a faca
      description: Descreve como a lâmina é acionada a partir do cabo, distinguindo
        estilos de abertura manual, assistida, automática e especial.
    knife_system:
      name: Sistema de faca
      description: Se e como a lâmina de corte funciona na máquina de overloque.
    knit_elastic_application:
      name: Aplicação do elástico de malha
      description: Especifica o uso pretendido para costura/artesanato do acabamento
        em elástico de malha.
    knit_pattern:
      name: Padrão de tricô
      description: Identifica o ponto de tricô ou a textura principal usada no tecido
        do cardigã, como trança, canelado ou waffle, permitindo que o comprador encontre
        texturas e propriedades térmicas específicas.
    knit_style:
      name: Estilo de tricô
      description: Especifica a construção principal da malha, a textura ou o padrão
        decorativo presente no tecido do suéter.
    knitting_marker_counter_type:
      name: Tipo de marcador/contador de tricô
      description: Especifica o tipo de produto funcional dentro de marcadores e contadores
        de tricô.
    knitting_needle_tip_style:
      name: Estilo da ponta da agulha de tricô
      description: Afiamento/formato da ponta otimizado para diferentes fios e técnicas.
    knock_sensor_technology:
      name: Tecnologia do sensor de detonação
      description: A tecnologia de detecção usada no sensor de detonação.
    knurl_aggressiveness:
      name: Agressividade do recartilhamento
      description: Descreve a aspereza ou textura do padrão recartilhado na haste
        da barra, influenciando o conforto e a segurança da pegada.
    knurl_marking_standard:
      name: Recartilhado padrão de marcação
      description: Especifica a posição dos anéis de referência do recartilhado usados
        para o posicionamento das mãos (por exemplo, marcações IPF ou IWF).
    kohlrabi_variety:
      name: Couve-rábano variedade
      description: Especifica a cultivar ou variedade de mercado do bulbo de couve-rábano,
        permitindo que os clientes escolham entre diferentes perfis de sabor, tamanhos
        e cores.
    koji_mold_type:
      name: Fungo koji tipo
      description: Indica o tipo ou cepa de fungo koji utilizado durante a fermentação,
        o que afeta o aroma e o sabor.
    kumquat_variety:
      name: Kumquat variedade
      description: Identifica a cultivar ou variedade de kumquats oferecida, permitindo
        que os compradores selecionem a fruta com base no perfil de sabor, tamanho
        ou aplicação culinária.
    label_edge_type:
      name: Etiqueta tipo de borda
      description: Especifica o estilo de acabamento da borda usado para evitar desfiamento
        e definir a estética.
    label_finish:
      name: Etiqueta acabamento
      description: Especifica o acabamento da superfície, a textura ou o revestimento/tratamento
        protetor aplicado à etiqueta.
    label_finish_edge_style:
      name: Etiqueta acabamento/estilo de borda
      description: Como as bordas são acabadas, o que afeta o conforto e a durabilidade
        (por exemplo, borda tecida versus corte a laser).
    label_fold_type:
      name: Etiqueta tipo de dobra
      description: Especifica como a etiqueta para costurar é construída para ser
        costurada em um item (por exemplo, dobra na extremidade versus dobra central),
        afetando como ela é aplicada e onde fica posicionada.
    label_text_type:
      name: Tipo de texto da etiqueta
      description: Indica se a etiqueta está em branco, pré-impressa ou destinada
        a ser personalizada.
    lace_area_size:
      name: Renda área tamanho
      description: Define o tamanho ou a configuração da seção de renda (por exemplo,
        Fechamento 4×4, frontal 13×6), o que determina o espaço disponível para repartição.
    lace_tightener_style:
      name: Cadarço ajustador estilo
      description: Identifica o projeto mecânico ou o formato do dispositivo de aperto
        de cadarços.
    lace_type:
      name: Renda tipo
      description: Descreve o material ou acabamento da renda na linha do cabelo/touca,
        o que influencia o realismo e a correspondência com o tom de pele.
    lacrosse_ball_certification:
      name: Bola de lacrosse certificação
      description: Especifica as aprovações ou normas de órgãos reguladores do esporte
        que a bola de lacrosse atende.
    lacrosse_goal_regulation_certification:
      name: Gol de lacrosse regulamentação certificação
      description: Indica se o gol ou a rede de lacrosse atende a uma especificação
        específica de órgão regulador (por exemplo, NCAA ou NFHS).
    lacrosse_pocket_type:
      name: Lacrosse bolso tipo
      description: Identifica o estilo geral do bolso ou da malha encordoada na cabeça,
        influenciando o controle e a liberação da bola.
    lacrosse_string_type:
      name: Lacrosse cordão tipo
      description: Classifica a forma exata ou o uso pretendido do cordão ou item
        de malha para que os clientes possam diferenciar entre peças de malha, kits
        e funções específicas de cordões dentro de um bolso.
    ladder_position:
      name: Escada posição
      description: Identifica onde a escada ou o acesso por degraus está localizado
        na cama infantil elevada.
    lanyard_attachment_hardware:
      name: Cordão ferragem de fixação
      description: Indica o estilo da ferragem na extremidade do cordão que se conecta
        a chaves, crachás, telefones ou outros acessórios.
    lanyard_style:
      name: Estilo do cordão
      description: Especifica como o cordão é usado ou carregado.
    lanyard_type:
      name: Cordão tipo
      description: Descreve o estilo de cordão fornecido com ou compatível com o apito.
    lap_hand_loom_accessories_included:
      name: Tear manual de colo acessórios incluídos
      description: Acessórios incluídos com o pacote do tear manual de colo.
    lapel_style:
      name: Lapela estilo
      description: Especifica o design da lapela do paletó (por exemplo, notch, peak,
        shawl).
    laser_safety_class:
      name: Laser classe de segurança
      description: Classificação de segurança do laser do produto (por exemplo, Classe
        2, 3R, 3B, 4) conforme indicado na documentação/rotulagem do dispositivo.
    latex_processing_method:
      name: Método de processamento de látex
      description: Especifica o processo de fabricação usado para produzir a espuma
        de látex—normalmente Dunlop ou Talalay —o que afeta a sensação, a resposta
        e o preço.
    latex_type:
      name: Látex tipo
      description: Indica a origem e a composição do látex usado no colchão (natural,
        orgânico, sintético ou misto), informando os compradores sobre durabilidade,
        sustentabilidade e possíveis alérgenos.
    launch_profile:
      name: Perfil de lançamento
      description: Indica a trajetória de lançamento típica (baixa, média, alta) que
        a haste de um taco de golfe foi projetada para produzir.
    launcher_mounting_configuration:
      name: Configuração de montagem do lançador
      description: Identifica como o lançador é montado ou configurado para uso, ajudando
        compradores que precisam de opções independentes, sob o cano ou montadas em
        trilho.
    layer_construction:
      name: Construção da camada
      description: Especifica a construção laminada do tecido (por exemplo, 2 camadas,
        2,5 camadas, 3 camadas), que afeta o peso, a compactabilidade e a durabilidade.
    layer_design:
      name: Design de camadas
      description: Descreve a construção da rede para cabelo em termos de camadas
        ou reversibilidade.
    lazy_kate_tension_control_type:
      name: Lazy kate tipo de controle de tensão
      description: Como o lazy kate aplica arrasto/tensão às bobinas durante o retorcimento
        ou enrolamento.
    lead_hardware_type:
      name: Guia tipo de ferragem
      description: Define o estilo de fixação ou fecho na extremidade da guia (mosquetão,
        clipe, laço, corrente etc.), impactando a facilidade de uso, a segurança e
        a adequação à disciplina.
    leaf_gelatin_grade:
      name: Gelatina em folhas grau
      description: Especifica o grau de resistência padronizado usado para folhas
        de gelatina.
    leaf_preparation:
      name: Preparação das folhas
      description: Descreve como as folhas são preparadas antes da embalagem, como
        picadas, desfiadas ou em julienne.
    leaf_spring_material:
      name: Material da mola de lâminas
      description: Principal material de construção do feixe de molas.
    leak_protection_layer:
      name: Camada de proteção contra vazamentos
      description: Indica se o sistema de fralda integrado da jammer de natação usa
        um design de camada simples ou dupla para proteção contra vazamentos.
    leash_clip_type:
      name: Guia tipo de clipe
      description: Especifica o estilo de clipe ou ferragem usado para prender a guia
        a uma coleira ou peitoral (por exemplo, mosquetão de engate rápido, mosquetão,
        clipe giratório).
    leash_style:
      name: Guia estilo
      description: Descreve a configuração da corda ou o estilo retrátil/enrolável
        da guia.
    leash_type:
      name: Tipo de coleira
      description: Classifica o estilo geral ou a configuração orientada por finalidade
        da guia para filtragem rápida por uso pretendido.
    leavening_action_type:
      name: Fermentação tipo de ação
      description: Identifica a formulação química ou o estilo de fermentação do fermento
        químico (por exemplo, ação simples, ação dupla, sem alumínio). Isso afeta
        diretamente o desempenho no preparo de receitas e a adequação à receita.
    leavening_agent:
      name: Agente de fermentação
      description: Especifica o principal mecanismo de fermentação usado na massa.
    led_color_options:
      name: LED opções de cor
      description: Lista as cores de LED selecionáveis disponíveis no alarme para
        indicação visual de fisgada.
    led_indicator_color:
      name: Indicador LED cor
      description: Identifica a cor do indicador LED do produto, ajudando pescadores
        a combinar vários alarmes ou atender a preferências pessoais.
    led_light_color:
      name: Luz LED cor
      description: Especifica a cor de qualquer iluminação LED integrada.
    leek_variety:
      name: Alho-poró variedade
      description: Especifica a cultivar ou variedade do alho-poró, permitindo a diferenciação
        por sabor, tamanho e época de cultivo.
    leg_coverage:
      name: Cobertura das pernas
      description: Especifica quanto da perna a peça de roupa de neoprene cobre (por
        exemplo, shorty, comprimento total).
    leg_cuff_style:
      name: Perna punho estilo
      description: Especifica o estilo de acabamento na abertura do tornozelo da calça.
    leg_cut_height:
      name: Perna corte altura
      description: Indica a altura do corte da abertura da perna na parte de baixo
        do biquíni.
    leg_cut_style:
      name: Estilo de corte da perna
      description: Descreve o formato da abertura da perna, que afeta a aparência,
        o conforto e as marcas de bronzeado.
    leg_length:
      name: Perna comprimento
      description: Categoriza sungas pelo comprimento relativo da perna (curto, médio,
        longo) para permitir que os compradores escolham sua cobertura preferida sem
        dividir a categoria.
    leg_loop_type:
      name: Tipo de alça de perna
      description: Descreve o design das alças das pernas.
    leg_opening_style:
      name: Perna abertura estilo
      description: Especifica como as aberturas das pernas são acabadas nos joggers,
        como punhos elásticos, barras com zíper ou barras abertas.
    leg_style:
      name: Perna estilo
      description: Define o design ou estilo de construção das pernas ou da base do
        banco.
    legging_foot_design:
      name: Legging pé design
      description: Especifica se a legging é sem pé, com pé ou conversível entre os
        dois estilos.
    leggings_waistband_style:
      name: Legging cós estilo
      description: Especifica o design estrutural do cós da legging, influenciando
        conforto, sustentação e estética.
    lei_closure_style:
      name: Colar havaiano fechamento estilo
      description: Descreve se o colar havaiano é um laço contínuo ou tem pontas abertas
        que amarram ou fecham com fita.
    lemon_variety:
      name: Limão variedade
      description: Identifica a cultivar ou variedade específica dos limões (por exemplo,
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Comprimento ajuste método
      description: Indica se e como o comprimento da corda de pular pode ser ajustado
        para se adequar ao usuário.
    lens_color_tint:
      name: Lente cor/tonalidade
      description: Cor ou tonalidade das lentes de óculos de proteção fornecidas com
        o produto.
    lens_construction:
      name: Construção da lente
      description: Especifica a construção estrutural da lente (por exemplo, lente
        única, lente dupla térmica) para indicar resistência ao embaçamento e desempenho
        óptico.
    lens_tint_category:
      name: Categoria de tonalidade da lente
      description: Classifica a escuridão da lente com base em categorias internacionais
        de tonalidade, ajudando os clientes a escolher lentes adequadas a diferentes
        condições de luz.
    lettuce_variety:
      name: Alface variedade
      description: Identifica a variedade hortícola específica da alface (por exemplo,
        americana, romana, lisa), permitindo filtragem e comparação precisas.
    level_of_play:
      name: Nível de jogo
      description: Nível de desempenho declarado pelo fabricante que se alinha à competitividade
        e ao orçamento do jogador.
    lever_configuration:
      name: Configuração da alavanca
      description: Indica a configuração da alavanca/manete do controle do motor da
        embarcação (por exemplo, alavanca única vs. alavanca dupla).
    lever_type:
      name: Alavanca tipo
      description: Tipo/mecanismo das alavancas de mudança de tom instaladas nas cordas
        da harpa.
    license_plate_cover_style:
      name: Capa de placa estilo
      description: Especifica o estilo de construção da capa de placa (por exemplo,
        capa completa vs. tampas de parafuso).
    license_plate_personalization_type:
      name: Placa de veículo personalização tipo
      description: Especifica se a placa de veículo é em branco, pré-impressa ou permite
        personalização fornecida pelo comprador (texto e/ou gráficos).
    license_usage_terms:
      name: Licença/uso termos
      description: Direitos de uso do molde (por exemplo, apenas uso pessoal vs. uso
        comercial limitado).
    licensed_sports_property:
      name: Propriedade esportiva licenciada
      description: Indica se o produto é oficialmente licenciado por uma liga/equipe/organização.
    lid_hinge_mechanism:
      name: Tampa dobradiça mecanismo
      description: Especifica o mecanismo de dobradiça usado para a tampa, impactando
        a segurança e a facilidade de uso.
    lid_support_positions:
      name: Tampa suporte posições
      description: Especifica as posições de suporte da tampa compatíveis com o piano
        de cauda (até que ponto a tampa pode ser aberta).
    lie_angle_color_code:
      name: Lie angle código de cor
      description: Indica o sistema de lie angle codificado por cores do fabricante
        usado em alguns tacos (por exemplo, ponto preto, ponto verde).
    life_jacket_certification_standard:
      name: Norma de certificação do colete salva-vidas
      description: Classificação de segurança oficial ou norma que o produto atende,
        como níveis USCG Type ou ISO/AS.
    life_raft_certification_standard:
      name: Norma de certificação da balsa salva-vidas
      description: A norma/certificação de segurança à qual o bote salva-vidas é fabricado
        e submetido à manutenção.
    life_raft_container_type:
      name: Bote salva-vidas recipiente tipo
      description: Como o bote salva-vidas é embalado para armazenamento e implantação.
    life_vest_approval_standard:
      name: Norma de homologação do colete salva-vidas
      description: Especifica a norma de certificação/aprovação que o colete salva-vidas
        cumpre.
    life_vest_intended_user:
      name: Colete salva-vidas usuário pretendido
      description: Indica a categoria de usuário pretendida para ajuste e provisionamento.
    lifebuoy_approval_standard:
      name: Boia salva-vidas aprovação norma
      description: Aprovação ou norma de segurança que a boia salva-vidas cumpre (por
        exemplo, USCG/SOLAS).
    lifebuoy_features:
      name: Boia salva-vidas recursos
      description: Recursos funcionais de segurança, montagem/manuseio e acessórios
        incluídos para boias salva-vidas.
    lift_mechanism_type:
      name: Tipo de mecanismo de elevação
      description: Especifica o mecanismo que auxilia ao levantar/abaixar ou abrir/fechar
        a cama retrátil.
    lift_stand_support_point:
      name: Elevador/suporte ponto de apoio
      description: Onde o elevador/suporte entra em contato com o veículo ou o apoia.
    lifting_gas_type:
      name: Gás de sustentação tipo
      description: Especifica o principal gás de sustentação ou meio de flutuação
        usado pelo dirigível.
    lifting_support_type:
      name: Suporte de elevação tipo
      description: Indica se o elevador é acionado por meio de trilhos ou se eleva
        por braços/almofadas em contato com a estrutura/pontos de elevação.
    ligature_and_cap_component_type:
      name: Braçadeira e tampa tipo de componente
      description: Indica se o produto é uma braçadeira, uma tampa ou um conjunto
        que inclui ambos.
    ligature_material:
      name: Braçadeira material
      description: Material principal do corpo da braçadeira que entra em contato
        com a palheta e a fixa (por exemplo, metal, couro, tecido).
    ligature_plating_or_finish:
      name: Braçadeira revestimento ou acabamento
      description: Especifica o revestimento e/ou acabamento superficial aplicado
        a uma braçadeira e/ou tampa de metal para clarinete.
    ligature_reed_contact_style:
      name: Braçadeira contato com a palheta estilo
      description: Especifica como a braçadeira entra em contato com a palheta (por
        exemplo, contato mínimo, multiponto, envolvente).
    ligature_screw_position_relative_to_reed:
      name: Braçadeira parafuso posição (em relação à palheta)
      description: Indica a posição do(s) parafuso(s) de aperto da braçadeira em relação
        à palheta/ao lado voltado para o músico quando instalado(s) na boquilha.
    ligature_tension_adjustment_mechanism:
      name: Braçadeira mecanismo de ajuste de tensão
      description: Descreve como a braçadeira aplica/ajusta a pressão na palheta (design
        de fixação).
    ligature_tightening_mechanism_type:
      name: Braçadeira tipo de mecanismo de aperto
      description: Especifica o mecanismo pelo qual a braçadeira aperta em torno da
        boquilha e da palheta (por exemplo, parafuso simples, parafuso duplo, alavanca/liberação
        rápida).
    light_bar_housing_material:
      name: Barra de luz material da carcaça
      description: Material principal da carcaça/corpo da barra de luz, afetando a
        durabilidade e a dissipação de calor.
    light_bar_lens_material:
      name: Material da lente da barra de luz
      description: Material principal da lente/cobertura da barra de luz, que pode
        afetar a resistência a impactos e a nitidez óptica.
    light_bar_mounting_location:
      name: Local de montagem da barra de luz
      description: Posição principal de montagem prevista no veículo.
    light_stand_style:
      name: Suporte de luz estilo
      description: Especifica o estilo estrutural ou formato do suporte usado para
        sustentar luzes de efeitos especiais (por exemplo, tripé, barra em T, manivela),
        e não a superfície de instalação (parede/teto), que é capturada pelo tipo
        de montagem.
    light_switch_function:
      name: Interruptor de luz função
      description: Identifica qual(is) circuito(s) de iluminação ou função(ões) o
        interruptor controla.
    lighting_control_protocols_supported:
      name: Iluminação protocolos de controle suportados
      description: Protocolos de controle/rede que o controlador suporta além do DMX512
        ou no lugar dele.
    lighting_effects:
      name: Iluminação efeitos
      description: Especifica quaisquer recursos de iluminação integrados que aprimoram
        a jogabilidade ou a estética.
    lighting_mode:
      name: Iluminação modo
      description: Lista os padrões operacionais de luz disponíveis, como contínuo,
        piscante, estroboscópico ou SOS.
    lily_variety:
      name: Lírio variedade
      description: Especifica a variedade comercial/botânica de lírio vendida como
        flor de corte fresca (por exemplo, asiático, oriental).
    limb_articulation:
      name: Membro articulação
      description: Indica o grau de flexibilidade ou articulação dos membros do manequim
        (nenhuma, fixa, semiflexível, totalmente articulada).
    limb_material:
      name: Lâmina material
      description: Material principal usado nas lâminas de um arco ou de uma besta,
        influenciando peso, durabilidade, vibração e desempenho geral.
    lime_variety:
      name: Modalidade de limão
      description: Identifica a variedade botânica ou comercial específica do limão
        vendido.
    line_buoyancy:
      name: Flutuabilidade da linha
      description: Descreve se a linha trançada flutua ou afunda naturalmente e em
        que ritmo, afetando a apresentação da isca e o gerenciamento da linha.
    line_purpose:
      name: Finalidade da linha
      description: Define a função prevista da linha dentro do sistema da pipa (por
        exemplo, linha de voo dianteira, linha de depower, linha de bridão).
    linen_finish_treatment:
      name: Linho acabamento/tratamento
      description: Qualquer processo de acabamento aplicado ao tecido de linho que
        altera o toque, a aparência ou o desempenho.
    linen_weave_type:
      name: Linho tipo de trama
      description: Especifica a construção da trama do tecido de linho, que afeta
        textura, respirabilidade e caimento.
    liner_padding_type:
      name: Forro tipo de enchimento
      description: Indica a construção ou o estilo de amortecimento do forro (por
        exemplo, malha, levemente acolchoado, matelassado).
    liner_shape:
      name: Forro formato
      description: Descreve o formato geral do forro do saco de dormir para que os
        clientes possam combiná-lo com seu saco de dormir e suas preferências de conforto.
    liner_type:
      name: Forro tipo
      description: Indica se o shorts inclui forro interno e, em caso afirmativo,
        qual é o estilo.
    lining:
      name: Forro
      description: Indica se e como a sunga é forrada, incluindo a extensão da cobertura
        do forro dentro da peça.
    lining_material:
      name: Forro material
      description: Especifica o material usado no forro interno do calçado, afetando
        conforto, respirabilidade e aquecimento.
    lining_type:
      name: Forro tipo
      description: Especifica se a peça de banho é forrada e em que extensão.
    link_connection_style:
      name: Elo estilo de conexão
      description: Classifica como o elo se une à corrente (por exemplo, elo rápido,
        pino de conexão), permitindo que ciclistas escolham o método de instalação
        ou a peça de reposição correta.
    live_bait_form:
      name: Isca viva forma
      description: Especifica a forma física ou o estado de preservação da isca, como
        viva, congelada ou seca.
    living_room_furniture_items_included:
      name: Itens de mobiliário para sala de estar inclusos
      description: Especifica as peças individuais de mobiliário que fazem parte do
        conjunto de sala de estar, ajudando os compradores a entender rapidamente
        quais componentes exatos (por exemplo, sofá, loveseat, mesa de centro) estão
        incluídos.
    load_mechanism:
      name: Mecanismo de carregamento
      description: Especifica o método principal pelo qual a resistência é gerada
        ou adicionada à máquina (por exemplo, coluna de pesos com seleção, carga por
        anilhas, carga por elásticos).
    lock_cylinder_type:
      name: Cilindro de fechadura tipo
      description: Especifica o tipo de cilindro/miolo de chave usado (relevante para
        resistência a arrombamento e chaves de reposição).
    lock_security_level:
      name: Fechadura nível de segurança
      description: Descreve os recursos de resistência de segurança da fechadura/do
        cilindro contra arrombamento e perfuração.
    lock_system:
      name: Trava sistema
      description: Tipo de sistema de travamento de segurança usado para manter o
        elevador na altura.
    locker_bench_configuration:
      name: Banco de vestiário configuração
      description: Descreve a orientação ou a configuração estrutural do banco de
        vestiário (por exemplo, unilateral, ilha dupla-face, fixado na parede).
    locomotive_prototype_power_type:
      name: Locomotiva protótipo tipo de alimentação
      description: Especifica o tipo de propulsão da locomotiva real representada
        pelo modelo.
    locomotive_wheel_arrangement_whyte_notation:
      name: Locomotiva disposição das rodas (notação Whyte)
      description: Disposição das rodas do protótipo de locomotiva (por exemplo, 4-6-2
        Pacific).
    loft_bed_height_classification:
      name: Cama loft classificação de altura
      description: Indica o estilo geral de altura da cama loft (baixa, média, alta,
        extra-alta), ajudando os compradores a combinar a altura do teto e os requisitos
        de espaço sob a cama.
    logo_application_method:
      name: Método de aplicação do logo
      description: Descreve como o brasão ou logotipo escolar é aplicado à peça de
        roupa (por exemplo, bordado ou estampado).
    logo_label_compatible_fabric_weight:
      name: Etiqueta de logotipo peso de tecido compatível
      description: Categoria de peso de tecido recomendada para fixar a etiqueta sem
        distorção ou volume.
    logo_label_edge_finish:
      name: Etiqueta de logotipo acabamento da borda
      description: Especifica a construção/acabamento da borda da etiqueta, o que
        afeta a resistência ao desfiamento e o conforto em contato com a pele.
    logo_label_print_production_method:
      name: Etiqueta de logotipo método de impressão/produção
      description: Como o logotipo é aplicado/formado na superfície da etiqueta.
    long_block_completeness:
      name: Bloco longo completude
      description: Especifica quais componentes principais estão incluídos no conjunto
        do bloco longo.
    long_john_pieces_included:
      name: Long john peças incluídas
      description: Esclarece se o produto inclui apenas a parte de baixo, apenas a
        parte de cima ou ambas as peças do conjunto long john.
    longan_variety:
      name: Longan variedade
      description: Especifica a cultivar ou variedade comercial da fruta longan (por
        exemplo, Kohala, Biew Kiew), ajudando os compradores a identificar as características
        desejadas de sabor, tamanho e doçura.
    loom_accessories_included:
      name: Acessórios inclusos com o tear
      description: Acessórios principais incluídos com o tear na caixa/embalagem.
    loom_finish:
      name: Acabamento do tear
      description: O acabamento da superfície do tear (principalmente para teares
        de madeira).
    loom_folding_portability_design_type:
      name: Tear design dobrável/portátil tipo
      description: Indica se e como o tear dobra/recolhe para transporte ou armazenamento
        compacto.
    loom_frame_folding_design:
      name: Tear estrutura design dobrável
      description: Especifica se e como a estrutura do tear de mesa dobra, recolhe
        ou desmonta para armazenamento ou transporte.
    loom_tension_adjustment_method:
      name: Tear método de ajuste de tensão
      description: Método principal usado para ajustar a tensão do urdume no tear.
    loom_tie_up_system:
      name: Tear sistema de tie-up
      description: Tipo de sistema de tie-up/conexão usado entre pedais/liços/eixos
        (por exemplo, Texsolv ou corrente de metal).
    loquat_variety:
      name: Nêspera variedade
      description: Especifica a cultivar ou variedade da nêspera, refletindo diferenças
        em tamanho, sabor, época de maturação e aparência.
    lubricant_features:
      name: Lubrificante características
      description: Destaca características especiais de desempenho, aditivos ou benefícios
        do lubrificante.
    lubrication_requirement:
      name: Lubrificação requisito
      description: Indica se a esteira da esteira ergométrica é pré-tratada/livre
        de manutenção ou requer lubrificação ou aplicação de cera contínua.
    lubrication_type:
      name: Lubrificação tipo
      description: Especifica a lubrificação/capacidade de engraxamento da bucha e
        se ela foi projetada para receber manutenção com graxa (por exemplo, ranhuras
        ou graxeira).
    lug_nut_seat_profile:
      name: Porca de roda perfil de assento
      description: Especifica o perfil de assento da porca de roda exigido pela roda
        para garantir compatibilidade correta da porca de roda e instalação segura.
    lumbar_support_type:
      name: Suporte lombar tipo
      description: Descreve o estilo de suporte lombar fornecido com a cadeira (por
        exemplo, almofada removível, mecanismo ajustável, massagem).
    lunge_trainer_style:
      name: Lunge trainer estilo
      description: Define o design estrutural de um lunge.
    lure_buoyancy:
      name: Flutuabilidade da isca
      description: Especifica como a isca se comporta na coluna d'água quando em repouso
        ou durante o recolhimento (por exemplo, flutuando na superfície, suspensa
        no meio da água ou afundando).
    luster:
      name: Brilho
      description: Descreve como a luz interage com a superfície do espécime (por
        exemplo, vítrea, metálica).
    lychee_cultivar:
      name: Lichia cultivar
      description: Identifica a variedade ou cultivar específica da lichia—como Brewster,
        Hak Ip ou Mauritius— que pode diferir em sabor, tamanho da semente, época
        de colheita e preço.
    lyre_flip_folder_mounting_location:
      name: Lira/suporte de partitura local de montagem
      description: Onde a lira ou o suporte de partitura deve ser montado no instrumento
        ou acessório (por exemplo, campana, tudel, estante).
    lyrics_display_type:
      name: Letras de música exibição tipo
      description: Como as letras de música são exibidas (se houver suporte) durante
        o karaokê.
    magazine_compatibility:
      name: Carregador compatibilidade
      description: Identifica os principais calibres ou tipos de carregadores que
        os bolsos integrados do colete foram projetados para acomodar.
    magnet_requirement:
      name: Ímã requisito
      description: Indica se o sensor precisa de um ímã externo para funcionar.
    magnet_toy_storage_included:
      name: Brinquedo magnético armazenamento incluído
      description: Tipo de armazenamento/estojo incluído com o brinquedo magnético
        para organização de mesa e viagem.
    malanga_variety:
      name: Malanga variedade
      description: Identifica a variedade específica de malanga/taro vendida para
        ajudar os compradores a escolher o sabor, a cor ou a aplicação culinária desejados.
    malt_color_rating_system:
      name: Malte sistema de classificação de cor
      description: Especifica a escala de cor à qual a cor declarada se refere (Lovibond,
        SRM ou EBC).
    malt_crush:
      name: Malte moagem
      description: Indica se o malte base é vendido inteiro/não moído ou pré-moído
        e, em caso afirmativo, o estilo de moagem.
    malt_form:
      name: Forma do malte
      description: Indica se o produto é vendido como grãos inteiros ou processado
        para brassagem (por exemplo, moído).
    malt_intended_use:
      name: Uso pretendido do malte
      description: Uso primário pretendido para o malte (cerveja, destilação ou dupla
        finalidade).
    malt_treatment:
      name: Malte tratamento
      description: Descreve como o grão/malte foi processado além da secagem padrão
        em forno (processos especiais comuns).
    malt_usage_purpose:
      name: Malte finalidade de uso
      description: Descreve a principal contribuição funcional de um malte especial
        para uma receita de cerveja.
    man_overboard_system_type:
      name: Homem ao mar sistema tipo
      description: Especifica a principal categoria de solução de homem ao mar (MOB)
        fornecida pelo produto.
    mandolin_back_sides_wood:
      name: Bandolim fundo & laterais madeira
      description: Especifica a espécie de madeira usada no fundo e nas laterais do
        bandolim.
    mandolin_body_top_wood:
      name: Bandolim tampo madeira
      description: Madeira/material principal usado no tampo harmônico do bandolim.
    mandolin_bridge_type:
      name: Bandolim ponte tipo
      description: Especifica o estilo de cavalete utilizado no bandolim.
    mandolin_pickup_configuration:
      name: Configuração dos captadores do bandolim
      description: Indica se o bandolim inclui componentes eletrônicos e que tipo
        de sistema de captação está instalado.
    mandolin_string_configuration:
      name: Configuração das cordas do bandolim
      description: Especifica a configuração de cordas do bandolim pelo total de cordas
        e número de cursos (por exemplo, 8 cordas / 4 cursos).
    mangosteen_variety:
      name: Mangostão variedade
      description: Identifica a espécie ou cultivar específica de mangostão ou fruta
        Garcinia estreitamente relacionada que está sendo vendida.
    mannequin_style:
      name: Manequim estilo
      description: Descreve o design estrutural ou estilo de construção do manequim
        de treino.
    manufacturing_process:
      name: Produção processo
      description: Método principal de produção do corpo ou carretel do molinete/carretilha
        (por exemplo, usinado em CNC, fundido em molde).
    map_coverage_sky_planet_body:
      name: Mapa cobertura (céu/corpo planetário)
      description: 'Indica o que o mapa representa: o céu noturno (constelações) ou
        um corpo planetário específico.'
    map_format:
      name: Mapa formato
      description: Define a apresentação física ou digital de mapas e guias de caça.
    map_sensor_output_signal_type:
      name: Sensor MAP sinal de saída tipo
      description: Especifica o tipo de sinal de saída que o sensor MAP fornece à
        unidade de controle do motor (ECU).
    map_size_sheet:
      name: Mapa tamanho (folha)
      description: Especifica o tamanho acabado da folha de mapa/pôster/planisfério
        para ajudar na exposição e compatibilidade (tamanho da moldura, espaço na
        parede).
    marabou_feather_form:
      name: Pena de marabu forma
      description: O formato do produto de pena de marabu conforme vendido.
    marabou_feather_treatment:
      name: Pena de marabu tratamento
      description: Como a pena de marabu foi processada ou acabada para uso em artesanato.
    marble_track_set_feature_modules:
      name: Conjunto de pista de bolinhas módulos de recursos
      description: Destaca módulos funcionais especiais incluídos no conjunto (por
        exemplo, elevador, lançador, interruptores).
    marine_flare_certification_standard:
      name: Sinalizador marítimo certificação/norma
      description: Indica quais certificações ou normas de segurança marítima o sinalizador
        declara atender.
    marine_safety_standard_compliance:
      name: Segurança marítima conformidade com norma
      description: Indica quais normas formais ou aprovações de segurança aquática
        o acessório atende.
    marine_transmission_type:
      name: Tipo de transmissão marinha
      description: Especifica o tipo de transmissão marítima pareada com o motor de
        centro (por exemplo, transmissão direta vs. V-drive).
    marker_action_type:
      name: Tipo de acionamento do marcador
      description: Descreve o mecanismo fundamental de disparo/operação do marcador.
    marker_caliber:
      name: Marcador calibre
      description: Especifica o diâmetro das bolas de paintball que o marcador foi
        projetado para disparar.
    marking_durability:
      name: Marcação durabilidade
      description: Indica por quanto tempo se espera que a linha pintada permaneça
        visível em condições normais, como temporária (até 3 semanas), semipermanente
        (até 6 meses) ou permanente (mais de 6 meses).
    marking_tip_type:
      name: Marcação ponta tipo
      description: Tipo de inserto de marcação que o compasso usa para desenhar (por
        exemplo, porta-minas vs. tinta vs. ponta de riscagem).
    marshmallow_processing_method:
      name: Marshmallow processamento método
      description: Descreve qualquer processamento especial aplicado aos marshmallows
        que afete textura, validade ou sabor.
    marshmallow_size:
      name: Tamanho do marshmallow
      description: Classifica o tamanho relativo de unidades individuais de marshmallow.
    martial_arts_belt_rank:
      name: Artes marciais faixa graduação
      description: Indica o nível de habilidade/graduação representado pela cor da
        faixa ou combinação especial de cores.
    mask_bib_type:
      name: Máscara babador tipo
      description: Especifica o tipo de babador em uma máscara de esgrima, como tecido
        padrão, condutivo, removível ou nenhum.
    mask_cage_material:
      name: Máscara grade material
      description: Material usado especificamente para a grade facial ou armação da
        máscara.
    mask_goggle_design:
      name: Máscara/óculos design
      description: Define o design estrutural geral ou estilo de cobertura do equipamento
        de proteção.
    mask_skirt_material:
      name: Material da saia da máscara
      description: Identifica o material da saia macia que fornece a vedação estanque
        entre a máscara e o rosto.
    mask_strap_material:
      name: Material da tira da máscara
      description: Especifica o material da tira que prende a máscara à cabeça.
    mass_air_flow_sensor_measurement_type:
      name: Tipo de medição do sensor de fluxo de massa de ar
      description: Especifica a tecnologia de detecção/estilo de saída usado pelo
        sensor MAF.
    mass_air_flow_sensor_mounting_type:
      name: Sensor de fluxo de ar em massa montagem tipo
      description: Como o sensor MAF ou conjunto do sensor é montado/instalado no
        sistema de admissão.
    massage_feature:
      name: Massagem recurso
      description: Indica se a base ajustável inclui uma função de massagem integrada
        e, em caso afirmativo, quantas zonas de massagem ela oferece.
    mast_attachment_interface:
      name: Mastro interface de fixação
      description: Especifica o padrão de conexão entre a fuselagem e o mastro, ajudando
        os compradores a garantir o encaixe dos componentes.
    mast_base_type:
      name: Mastro base tipo
      description: Identifica a interface de montagem que conecta o mastro à prancha
        ou ao adaptador.
    mast_bend_curve:
      name: Mastro curva de flexão
      description: Padrão de flexão do mastro que determina a compatibilidade com
        a vela e a manobrabilidade.
    mast_diameter_type:
      name: Mastro tipo de diâmetro
      description: Classificação padronizada do diâmetro do mastro de windsurf (por
        exemplo, RDM, SDM, MDM) usada para verificações de compatibilidade.
    mat_backing_type:
      name: Tapete tipo de base
      description: Especifica o tipo de base na parte inferior do tapete que ajuda
        a mantê-lo no lugar em várias superfícies.
    mat_installation_method:
      name: Método de instalação do tapete
      description: Indica como o tapete é instalado ou fixado no lugar.
    mat_style:
      name: Tapete estilo
      description: Define o estilo estrutural ou fator de forma do tapete (por exemplo,
        tapete dobrável, placa encaixável, crash pad).
    maternity_panel_type:
      name: Painel de maternidade tipo
      description: Indica o estilo do painel elástico ou cós projetado para acomodar
        o crescimento durante a gravidez.
    maternity_waistband_style:
      name: Cós de maternidade estilo
      description: Indica o design e o posicionamento do cós ou painel abdominal específico
        para calças de maternidade, descrevendo como a peça oferece suporte à barriga
        em crescimento.
    mattress_top_type:
      name: Colchão tipo de superfície
      description: Especifica o estilo da camada superior ou da construção da superfície
        do colchão, como pillow top ou tight top.
    maturation_vessel_material:
      name: Material do recipiente de maturação
      description: Especifica o material principal do recipiente ou barril usado para
        envelhecer o shochu.
    maximum_quilt_size_supported:
      name: Tamanho máximo de colcha suportado
      description: O tamanho máximo de colcha/projeto que a estrutura pode acomodar
        (comumente descrito por tamanhos de cama ou largura máxima).
    meal_course:
      name: Refeição momento de consumo
      description: Identifica a ocasião típica de refeição para o produto.
    meal_preparation_state:
      name: Estado de preparação da refeição
      description: Indica quanto preparo é necessário antes do consumo (por exemplo,
        pronto para comer, kit de refeição).
    meat_processing_state:
      name: Estado de processamento da carne
      description: Indica o grau de cozimento ou cura aplicado ao produto cárneo antes
        da venda.
    meat_quality_grade:
      name: Grau de qualidade da carne
      description: Indica a classificação ou o grau de qualidade atribuído à carne
        por uma autoridade de classificação reconhecida (por exemplo, USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Carne alegação de criação
      description: Destaca alegações comuns de bem-estar animal ou práticas de criação
        associadas à carne (por exemplo, alimentado com capim, criado ao ar livre).
    mechanical_loom_assembly_status:
      name: Tear mecânico status de montagem
      description: Como o tear é enviado ou entregue em termos de montagem necessária.
    mechanical_loom_weaving_type:
      name: Tear mecânico tipo de tecelagem
      description: Principal mecanismo/tipo de tecelagem suportado pelo tear.
    mechanical_puzzle_primary_mechanism:
      name: Quebra-cabeça mecânico mecanismo principal
      description: Principal interação/mecanismo usado para resolver o quebra-cabeça
        mecânico.
    mechanical_puzzle_solution_format:
      name: Quebra-cabeça mecânico formato da solução
      description: Formato em que as dicas/soluções são fornecidas quando incluídas.
    medal_attachment_style:
      name: Estilo de fixação da medalha
      description: Especifica como a medalha deve ser usada ou exibida (por exemplo,
        fita de pescoço, broche).
    medal_award_level:
      name: Medalha nível de premiação
      description: Especifica o nível de premiação representado pela medalha (por
        exemplo, 1º lugar, participante).
    medal_finish:
      name: Medalha acabamento
      description: Especifica o acabamento da superfície da medalha (brilho/textura
        visual), independentemente do material.
    medal_packaging:
      name: Medalha embalagem
      description: Indica o tipo de embalagem de apresentação incluída com a medalha.
    melodica_accessory_set_included:
      name: Melódica conjunto de acessórios incluído
      description: Quais acessórios comuns estão incluídos no pacote da melódica.
    melodica_air_chamber_material:
      name: Melódica material da câmara de ar
      description: O material da câmara de ar/corpo da melódica (ABS, madeira, etc.)
        quando os vendedores o distinguem de outras partes.
    melodica_included_accessories:
      name: Acessórios incluídos com a melódica
      description: Acessórios que acompanham a melódica na embalagem.
    melodica_key_color_scheme:
      name: Melódica esquema de cores das teclas
      description: Esquema de cores das teclas (não do corpo), que afeta a legibilidade
        (especialmente para crianças/iniciantes).
    melodica_mouthpiece_configuration:
      name: Melódica configuração do bocal
      description: Indica quais interfaces de sopro estão incluídas/usadas para tocar
        a melódica.
    melodica_mouthpiece_type:
      name: Melódica tipo de bocal
      description: Estilo de interface de sopro incluído com a melódica (bocal e/ou
        tubo flexível).
    melodica_reed_plate_material:
      name: Material da placa de palhetas da melódica
      description: O material da placa de palhetas (distinto do material do corpo
        geral do instrumento), que pode afetar a durabilidade e o timbre.
    melodica_size_class:
      name: Melódica classe de tamanho
      description: Classe geral de tamanho/portabilidade de uma melódica, normalmente
        baseada em agrupamentos por número de teclas e fator de forma (por exemplo,
        mini/estudantil vs. padrão vs. modelos de alcance estendido).
    melon_variety:
      name: Modalidade de melão
      description: Especifica o tipo específico de melão no produto para ajudar os
        compradores a identificar rapidamente sua variedade preferida.
    memory_foam_infusion_material:
      name: Espuma viscoelástica material de infusão
      description: Identifica substâncias especiais infundidas na espuma viscoelástica
        para fins de resfriamento, controle de odores ou ação antimicrobiana.
    memory_wire_gauge:
      name: Arame de memória calibre
      description: Especifica o tamanho American Wire Gauge (AWG) do arame de memória.
    memory_wire_project_size:
      name: Arame de memória tamanho do projeto
      description: Especifica a forma de joia/tamanho de espiral pretendido para o
        qual o arame de memória é moldado (por exemplo, pulseira, colar, anel).
    metal_purity:
      name: Metal pureza
      description: Indica a finura ou o grau de pureza do metal usado na joia, normalmente
        expresso em quilates (K) ou partes por mil.
    metrics_counted:
      name: Métricas contabilizadas
      description: Lista as estatísticas ou eventos individuais que o contador foi
        projetado para monitorar.
    metronome_display_style:
      name: Metrônomo estilo de exibição
      description: Especifica como o andamento é exibido/indicado ao usuário (ponteiro/pêndulo
        vs. LED/LCD numérico vs. luz intermitente).
    metronome_output_method:
      name: Metrônomo método de saída
      description: Especifica os métodos de saída disponíveis para o som/sinal de
        batida do metrônomo.
    microphone_toy_feature_set:
      name: Microfone de brinquedo conjunto de recursos
      description: Principais capacidades focadas em brincadeira para microfones de
        brinquedo (efeitos de voz, amplificação, gravação etc.).
    midi_output_type:
      name: MIDI tipo de saída
      description: Especifica o(s) tipo(s) de saída MIDI fornecido(s) pelo módulo
        de trigger.
    military_branch:
      name: Ramo militar
      description: Identifica o ramo militar para o qual o uniforme é emitido ou no
        qual é inspirado.
    milk_base_type:
      name: Tipo de base láctea
      description: Especifica o leite ou alternativa ao leite principal usado na bebida,
        se houver.
    milk_feeding_method:
      name: Método de alimentação com leite
      description: Indica como os animais de origem foram alimentados (por exemplo,
        alimentados com capim ou com grãos), o que pode influenciar o sabor e o perfil
        nutricional.
    milk_processing_method:
      name: Método de processamento do leite
      description: Especifica o tratamento ou a técnica de processamento pelo qual
        o leite passou, o que afeta a segurança, a vida útil e as propriedades nutricionais.
    milk_source_animal:
      name: Animal que originou o leite
      description: Identifica o animal do qual o leite foi obtido, ajudando os consumidores
        a selecionar leite de vaca, cabra, búfala ou outros laticínios de origem animal.
    millet_processing_method:
      name: Método de processamento do milheto
      description: Indica o principal método de processamento ou estado do grão de
        painço (por exemplo, não polido, descascado, germinado).
    millet_variety:
      name: Painço variedade
      description: Identifica o tipo específico de grão de painço contido no produto
        (por exemplo, pérola, rabo-de-raposa, dedo).
    milling_process:
      name: Processo de moagem
      description: Indica o método de produção usado para moer a farinha, o que pode
        influenciar o sabor, a exposição ao calor e o perfil nutricional.
    mint_mark:
      name: Marca da casa da moeda
      description: Marca da casa da moeda conforme exibida na moeda (se aplicável).
    mirror_configuration:
      name: Configuração do espelho
      description: Especifica o estilo ou a estrutura do espelho incluído com o conjunto
        de penteadeira.
    mirror_coverage:
      name: Espelho cobertura
      description: Descreve a extensão dos painéis espelhados nas portas de correr.
    mirror_curvature_type:
      name: Espelho tipo de curvatura
      description: Especifica se a superfície do espelho é convexa, plana ou côncava,
        impactando o campo de visão.
    mirror_mounting_location:
      name: Espelho local de montagem
      description: Especifica onde, na bicicleta ou no ciclista, o espelho deve ser
        montado.
    mirror_shape:
      name: Espelho formato
      description: Indica o formato geométrico ou estilo do espelho principal incluído
        com o conjunto de penteadeira.
    mix_ratio:
      name: Proporção de mistura
      description: Especifica a proporção recomendada de diluição de fluido de arrefecimento
        para água (para concentrados) ou confirma a proporção fixa de pré-mistura
        para produtos pré-diluídos.
    mma_glove_type:
      name: Luva de MMA tipo
      description: Indica o principal uso pretendido ou estilo da luva dentro do treinamento
        ou competição de MMA.
    mobility_features:
      name: Recursos de mobilidade
      description: Indica elementos integrados de movimentação ou portabilidade, como
        rodízios ou pernas dobráveis.
    model_aircraft_assembly_level:
      name: Aeromodelo nível de montagem
      description: Indica quanto de montagem é necessário antes que a aeronave possa
        ser usada.
    model_making_kit_items_included:
      name: Kit de modelismo itens incluídos
      description: 'Lista o que está incluído em um kit ou conjunto de modelismo (ex.:
        tinta, cola, pincel).'
    model_making_product_type:
      name: Modelismo tipo de produto
      description: Identifica o que o item é fundamentalmente dentro do modelismo
        (kit, acessório, ferramenta ou suprimento) para melhorar a navegação e a filtragem
        entre tipos de produto mistos dentro de Modelismo.
    model_rocket_kit_contents:
      name: Foguete de modelismo kit conteúdo
      description: 'Indica se o produto é um kit completo de foguete de modelismo
        de múltiplos estágios ou um kit complementar/de módulo/de peças (ex.: componentes
        de estágio booster ou sustainer).'
    model_rocket_kit_format:
      name: Formato do kit de foguete de modelismo
      description: Especifica se o foguete é vendido como kit e o nível de prontidão
        para montagem.
    model_rocket_motor_impulse_class:
      name: Motor de foguete de modelismo classe de impulso
      description: 'Indica a classe padronizada de impulso total do motor de foguete
        de modelismo (ex.: A, B, C...).'
    model_rocket_motor_mount_size:
      name: Foguete de modelismo tamanho do suporte do motor
      description: Especifica o diâmetro da carcaça do motor que o suporte do motor
        do foguete foi projetado para aceitar.
    model_rocket_power_source_required:
      name: Foguete de modelismo fonte de alimentação necessária
      description: Indica se o produto requer pilhas/baterias ou alimentação externa,
        e de que tipo.
    model_rocket_propellant_type:
      name: Foguete de modelismo tipo de propelente
      description: Identifica o propelente/sistema de motor usado para propulsão em
        produtos de foguete de modelismo.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Foguete de modelismo tamanho recomendado da haste ou trilho de lançamento
      description: 'Especifica o diâmetro da haste de lançamento ou o tamanho do trilho
        para o qual o foguete foi projetado (ex.: haste de 1/8 pol., trilho de lançamento
        1010).'
    model_rocket_recovery_method:
      name: Foguete de modelismo método de recuperação
      description: Sistema principal de recuperação utilizado para trazer o foguete
        de volta com segurança após o voo.
    model_rocket_recovery_system_type:
      name: Foguete de modelismo tipo de sistema de recuperação
      description: Especifica o principal método de recuperação usado para retornar
        o foguete em segurança após o voo.
    model_rocket_staging:
      name: Foguete de modelismo estagiamento
      description: Indica com quantos estágios motorizados o foguete de modelismo
        foi projetado para voar.
    model_train_accessory_electrical_connection_type:
      name: Acessório de trem de modelismo tipo de conexão elétrica
      description: Especifica o estilo de conector ou terminal usado para conectar
        acessórios elétricos de trem de modelismo a um layout (quando aplicável).
    model_train_coupler_type:
      name: Trem de modelismo tipo de engate
      description: Especifica o padrão de engate instalado no material rodante ou
        na locomotiva do trem de modelismo.
    model_train_gauge:
      name: Bitola do trem de modelismo
      description: Especifica o sistema de bitola ferroviária do modelo para o qual
        o acessório se destina (quando aplicável), ajudando a garantir compatibilidade
        física com a via e o layout do usuário.
    model_train_lighting_features:
      name: Recursos de iluminação do trem de modelismo
      description: Especifica a funcionalidade de iluminação incluída no trem/locomotiva
        de modelismo.
    model_train_power_pickup_method:
      name: Trem de modelismo método de captação de energia
      description: Especifica como o modelo recebe energia para operação (energia
        da via, bateria etc.).
    model_train_scale:
      name: Escala do trem de modelismo
      description: Especifica o padrão de escala/tamanho do trem de modelismo (relação
        entre o modelo e o trem real).
    model_train_sound_features:
      name: Trem de modelismo recursos sonoros
      description: Indica se o modelo inclui efeitos sonoros integrados e qual tipo
        de oferta sonora ele tem.
    model_train_track_gauge:
      name: Trem de modelismo bitola da via
      description: 'Especifica a bitola da via/o padrão do sistema de trilhos para
        o qual o modelo foi projetado para circular (ex.: bitola padrão, variantes
        de bitola estreita ou bitolas específicas de marca/sistema quando aplicável).'
    modeling_dough_base_material:
      name: Massa de modelar material de base
      description: 'Base/composição principal da massa de modelar (ex.: à base de
        trigo/farinha vs. à base de polímero).'
    modeling_dough_features:
      name: Massa de modelar características
      description: Principais características funcionais da massa de modelar que os
        compradores costumam usar como filtro.
    modification_level:
      name: Malte nível de modificação
      description: Indica o grau de modificação do malte (o quanto o endosperma/as
        proteínas da cevada foram degradados), geralmente resumido como submodificado/modificado/sobremodificado.
    molasses_base_ingredient:
      name: Melaço ingrediente de base
      description: Identifica a principal fonte vegetal ou frutífera da qual o melaço
        é produzido.
    molasses_grade:
      name: Melaço classificação
      description: Classifica o melaço por etapa de extração/refino, o que afeta diretamente
        a intensidade do sabor, a cor e o perfil nutricional.
    mold_material:
      name: Material do molde
      description: 'Composição principal do material do molde em si (ex.: silicone,
        plástico, metal).'
    molle_compatibility:
      name: Compatibilidade MOLLE
      description: Indica se o colete oferece fitas MOLLE/PALS para prender bolsos
        e acessórios modulares.
    motor_belt_type:
      name: Correia do motor tipo
      description: Define o design/perfil da correia usada no sistema de acionamento
        da esteira.
    motor_configuration:
      name: Motor configuração
      description: Indica quantos motores de acionamento independentes o patinete
        usa.
    motor_mounting_configuration:
      name: Configuração de montagem do motor
      description: Descreve como o motor é montado/implementado no kit de conversão
        para patinete.
    motor_mounting_position:
      name: Posição de montagem do motor
      description: Indica onde o motor é montado no patinete elétrico, como cubo da
        roda dianteira, cubo da roda traseira, cubo de roda duplo ou mid-drive.
    motor_position:
      name: Motor posição
      description: Indica onde o motor está localizado na bicicleta elétrica, influenciando
        a dirigibilidade e a manutenção.
    motor_vehicle_a_v_integration_features:
      name: Veículo automotor recursos de integração A/V
      description: 'Recursos de integração com smartphone e veículo compatíveis com
        a central multimídia (ex.: Apple CarPlay, Android Auto, MirrorLink).'
    motor_vehicle_bulb_application_position:
      name: Veículo automotor lâmpada aplicação/posição
      description: 'Especifica a posição ou função de iluminação veicular pretendida
        para a qual a lâmpada foi projetada (ex.: farol baixo, luz de freio).'
    motor_vehicle_bulb_approval_standard:
      name: Veículo automotor lâmpada norma de aprovação
      description: Indica a conformidade regulamentar/marcação de aprovação para uso
        em vias públicas no mercado-alvo.
    motor_vehicle_oxygen_sensor_bank:
      name: Banco do sensor de oxigênio do motor
      description: 'Indica em qual bancada de cilindros do motor o sensor de oxigênio
        se encaixa (ex.: Banco 1 vs. Banco 2) para motores em V/boxer; usar Não aplicável
        para motores em linha.'
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Veículo automotor sensor de oxigênio número de fios
      description: Número de fios no chicote do sensor de oxigênio.
    motor_vehicle_oxygen_sensor_position:
      name: Veículo automotor sensor de oxigênio posição
      description: Especifica onde o sensor de oxigênio (O2) é instalado no sistema
        de escapamento em relação ao conversor catalítico.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Veículo automotor sensor de oxigênio número do sensor
      description: 'Indica o número do sensor (ex.: Sensor 1 ou Sensor 2) dentro de
        uma determinada designação de bancada/posição.'
    motor_vehicle_oxygen_sensor_type:
      name: Tipo de sonda lambda do motor
      description: Especifica o design/a tecnologia do sensor de oxigênio.
    motor_vehicle_paint_application_method:
      name: Veículo automotor pintura método de aplicação
      description: Como a tinta deve ser aplicada à superfície do veículo.
    motor_vehicle_paint_system_step:
      name: Veículo automotor pintura etapa do sistema
      description: 'Indica para qual etapa ou componente de um sistema de repintura
        automotiva o produto é destinado (ex.: primer, basecoat, verniz).'
    motor_vehicle_speaker_mounting_type:
      name: Veículo automotor alto-falante tipo de instalação
      description: Como o alto-falante deve ser instalado no veículo (fator de forma
        de instalação).
    motor_vehicle_subwoofer_size:
      name: Tamanho do subwoofer automotivo
      description: 'Diâmetro nominal do driver do subwoofer (ex.: 8 pol., 10 pol.,
        12 pol.), usado para corresponder ao espaço do veículo e à compatibilidade
        com a caixa acústica.'
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Veículo automotor subwoofer configuração da bobina de voz
      description: 'Quantidade/configuração de bobinas de voz usada para corresponder
        às opções de fiação do amplificador (ex.: SVC vs DVC).'
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Veículo automotor subwoofer impedância da bobina de voz (por bobina)
      description: Classificação de impedância de cada bobina de voz (não da carga
        final cabeada), usada para cálculos de fiação.
    motor_vehicle_voltage_regulator_type:
      name: Veículo automotor regulador de tensão tipo
      description: Indica a tecnologia/forma do regulador usada em veículos automotores.
    motorcycle_armor_certification_standard:
      name: Norma de certificação da proteção para motociclistas
      description: 'Indica a(s) norma(s) formal(is) de segurança que o protetor é
        certificado para atender (ex.: EN 1621-2 para protetores de costas, EN 1621-3
        para peito).'
    motorcycle_cover_size_class:
      name: Capa para motocicleta classe de tamanho
      description: Faixa de tamanho padronizada para capas de armazenamento de motocicleta
        com base na categoria/faixa de comprimento típica da motocicleta em que se
        encaixa.
    motorcycle_glove_certification_standard:
      name: Luva de motocicleta norma de certificação
      description: 'Especifica a certificação/norma de proteção que as luvas cumprem
        (ex.: níveis EN 13594).'
    motorcycle_glove_waterproof_construction:
      name: Luva de motocicleta construção impermeável
      description: Especifica o tipo de método de impermeabilização usado na luva
        (se houver).
    motorcycle_guard_coverage_area:
      name: Protetor de motocicleta área de cobertura
      description: A principal área de cobertura fornecida pelo produto (cotovelo,
        punho, antebraço, combo).
    motorcycle_kidney_belt_construction_type:
      name: Cinta lombar para motocicleta tipo de construção
      description: Estilo de construção da cinta lombar que afeta a rigidez, a circulação
        de ar e a proteção.
    motorcycle_kidney_belt_purpose:
      name: Cinta lombar para motocicleta finalidade
      description: Identifica o principal estilo ou cenário de pilotagem para o qual
        a cinta lombar para motocicleta foi projetada.
    motorcycle_luggage_capacity_class:
      name: Bagagem de motocicleta classe de capacidade
      description: Indica a capacidade volumétrica da bagagem de motocicleta, expressa
        em uma faixa de litros.
    motorcycle_luggage_mounting_system:
      name: Bagagem para motocicleta sistema de fixação
      description: Sistema de fixação/montagem usado para prender a bolsa/alforge
        à motocicleta (por exemplo, tiras de passagem por cima, engate rápido montado
        em bagageiro).
    motorcycle_luggage_side:
      name: Bagagem para motocicleta lado
      description: Para baús laterais/alforjes, indica se o item é para o lado esquerdo,
        lado direito ou um par/conjunto.
    motorcycle_protective_gear_size_system:
      name: Equipamento de proteção para motociclistas sistema de tamanhos
      description: Indica o sistema de tamanhos usado no produto (por exemplo, tamanho
        por letras, numérico, tamanho único).
    motorcycle_rack_carrier_style:
      name: Suporte para motocicleta estilo de transportador
      description: Descreve o estilo funcional do transportador para transportar uma
        motocicleta ou scooter (plataforma vs trilho vs com auxílio de elevação, etc.).
    motorcycle_riding_discipline:
      name: Motocicleta disciplina de pilotagem
      description: Identifica a principal modalidade de pilotagem ou uso para a qual
        o colar cervical foi projetado.
    motorcycle_tire_speed_rating:
      name: Pneu de motocicleta índice de velocidade
      description: Identifica a velocidade máxima sustentada para a qual o pneu é
        classificado, usando o código padrão por letras (por exemplo, H, V, W).
    motorsport_window_net_certification:
      name: Rede de janela para automobilismo certificação
      description: Certificação de segurança para corridas ou homologação atendida
        pela rede de janela (por exemplo, SFI ou FIA), incluindo o número da especificação
        quando aplicável.
    mound_usage_type:
      name: Montinho de arremesso tipo de uso
      description: Identifica o ambiente de aplicação previsto para o montinho de
        arremesso, como treino, jogo, bullpen ou multiuso.
    mount_attachment_method:
      name: Método de fixação do suporte
      description: Especifica como o suporte se fixa à superfície/estrutura do veículo.
    mountainboard_truck_type:
      name: Mountainboard tipo de truck
      description: Classifica o estilo dos trucks incluídos com a prancha, afetando
        a resposta nas curvas e a durabilidade.
    mounting_attachment_method:
      name: Método de montagem/fixação
      description: Como o suporte/bolsa é projetado para se fixar a um tambor, pedestal,
        cinto ou outra superfície.
    mounting_attachment_type:
      name: Tipo de montagem/fixação
      description: Como o acessório de relação se fixa ou faz interface com a roda
        de fiar.
    mounting_hardware_included_for_installation:
      name: Ferragens de fixação incluídas (para instalação)
      description: Indica se as ferragens de fixação necessárias para instalar o banco
        traseiro (por exemplo, suportes, parafusos, trilhos) estão incluídas com o
        produto.
    mounting_location:
      name: Local de montagem
      description: Especifica a área de instalação prevista no equipamento ou no corpo
        para a luz/refletor (por exemplo, garfo dianteiro, capacete, raios da roda).
    mounting_method:
      name: Método de montagem
      description: Como um suporte para baqueta/vassourinha é montado ou fixado (por
        exemplo, por presilha, por cinta, adesivo).
    mounting_position:
      name: Posição de montagem
      description: Especifica onde o comando do freio de mão deve ser montado/instalado
        na cabine do veículo.
    mounting_rail_type:
      name: Tipo de trilho de montagem
      description: Especifica o trilho ou padrão de interface ao qual o acessório
        se fixa, como Picatinny ou M-LOK.
    mounting_receiver_size:
      name: Tamanho do receptor de engate
      description: Tamanho do receptor de engate necessário para racks de carga montados
        no engate.
    mounting_storage_type:
      name: Tipo de montagem/armazenamento
      description: Como o dispositivo deve ser montado ou armazenado na embarcação/pessoa.
    mouth_grip_type:
      name: Tipo de bocal
      description: Descreve o tipo de bocal ou protetor no apito para conforto e higiene.
    mouthguard_mold_type:
      name: Protetor bucal tipo de moldagem
      description: Descreve como o protetor bucal se ajusta aos dentes do atleta (por
        exemplo, ferve e morde, ajuste odontológico personalizado).
    mouthpiece_facing_length:
      name: Boquilha comprimento da curva
      description: Indica a categoria de comprimento da curva da boquilha (lay), não
        o comprimento total da boquilha, que afeta a resposta, a resistência e a compatibilidade
        com a palheta.
    mouthpiece_material:
      name: Bocal material
      description: Especifica o material da parte do bocal/ponta que entra em contato
        com a boca em uma língua de sogra, que pode ser diferente do material do corpo
        principal.
    mouthpiece_shank_receiver_size:
      name: Boquilha haste/receptor tamanho
      description: Especifica o padrão de receptor/haste da boquilha compatível com
        o flugelhorn.
    mouthpiece_shank_size:
      name: Boquilha haste tamanho
      description: Especifica o padrão de encaixe entre haste/receptor da boquilha
        para garantir compatibilidade com o instrumento de metal previsto.
    mouthpiece_shank_type:
      name: Tipo de haste do bocal
      description: Especifica o padrão de receptor/haste da boquilha para compatibilidade
        (quando aplicável).
    mouthpiece_style:
      name: Estilo do bocal
      description: Classifica o design/formato da parte da embocadura do freio curb
        bit, que influencia os pontos de pressão, a severidade e a preferência do
        cavalo.
    mouthpiece_type:
      name: Tipo do bocal
      description: Tipo de bocal na extremidade de sopro (integrado, removível ou
        modelos adicionais).
    movement_mechanism:
      name: Mecanismo de movimento
      description: Define como o banco se move durante o uso (balanço, deslizamento,
        movimento de balanço, etc.).
    muffin_size:
      name: Tamanho do muffin
      description: Classifica o formato de tamanho físico do muffin (por exemplo,
        mini, padrão, jumbo).
    mushroom_variety:
      name: Variedade de cogumelo
      description: Identifica a espécie ou variedade específica de cogumelo ou trufa
        contida no produto (por exemplo, shiitake, cogumelo ostra rei, trufa negra).
    music_stand_desk_tilt_adjustment:
      name: Estante de partitura ajuste de inclinação da bandeja
      description: Indica se e como o ângulo da bandeja pode ser ajustado.
    music_stand_intended_use:
      name: Estante de partitura uso previsto
      description: Indica o principal ambiente/caso de uso previsto para a estante.
    musical_block_pitch_type:
      name: Bloco musical tipo de altura
      description: Descreve se o bloco musical produz uma altura definida (afinado)
        ou uma altura indefinida.
    musical_box_mechanism_type:
      name: Caixa de música tipo de mecanismo
      description: Como a caixa de música produz/toca o som (por exemplo, mecanismo
        de corda vs reprodução eletrônica).
    musical_keyboard_case_fit_type:
      name: Capa para teclado musical tipo de ajuste
      description: Descreve como a capa é dimensionada para o instrumento (por exemplo,
        faixa de tamanho universal/genérico vs ajuste específico para o modelo/personalizado).
    musical_ratchet_sound_character:
      name: Reco-reco caráter sonoro
      description: Descrição geral do timbre/volume do som do reco-reco.
    musical_scraper_groove_surface_material:
      name: Reco-reco material da superfície ranhurada
      description: Especifica o material da superfície estriada/ranhurada de raspagem
        (pode diferir do material do corpo).
    musical_scraper_type:
      name: Reco-reco tipo
      description: Especifica o estilo/design do instrumento de raspagem musical (por
        exemplo, güiro vs reco-reco), o que afeta o som e a técnica de execução.
    mute_attachment_method:
      name: Método de fixação da surdina
      description: Especifica como um abafador de prato é fixado ou mantido no lugar
        no prato (por exemplo, gel, aderência estática, ímã, clipe).
    mute_attenuation_level:
      name: Mudo nível de atenuação
      description: Indica o quanto o mudo reduz o volume percebido, especialmente
        relevante para mudos de estudo.
    mute_cork_padding_material:
      name: Mudo material da cortiça/acolchoamento
      description: Especifica o material do acolchoamento de contato do mudo (por
        exemplo, tira/almofadas de cortiça) usado para aderência/ajuste e proteção
        da campana.
    mute_coverage_type:
      name: Tipo de cobertura da surdina
      description: Indica o estilo/cobertura do mudo na superfície de execução, desde
        pequenos abafadores pontuais até mudos de estudo de superfície inteira.
    mute_finish:
      name: Mudo acabamento
      description: Acabamento da superfície do mudo que pode afetar a durabilidade
        e a estética (por exemplo, polido vs acetinado).
    name_label_text_template:
      name: Etiqueta de identificação modelo de texto
      description: Especifica o texto predefinido ou modelo impresso na etiqueta de
        identificação (por exemplo, "Pertence a", "Feito por").
    napkin_ply:
      name: Guardanapo número de folhas
      description: Indica a espessura do guardanapo de coquetel pelo número de camadas
        (folhas).
    neck_brace_fit_system:
      name: Protetor cervical sistema de ajuste
      description: Indica o principal método usado para ajustar e prender o protetor
        cervical ao piloto.
    neck_brace_size_basis:
      name: Protetor cervical base de tamanho
      description: Indica a base de tamanho usada para escolher o tamanho correto
        do protetor cervical.
    neck_configuration:
      name: Configuração do pescoço
      description: Especifica o estilo/configuração do tudel fornecido com o saxofone,
        o que afeta a ergonomia e a tocabilidade.
    neck_coverage_type:
      name: Tipo de cobertura do pescoço
      description: Especifica o estilo de cobertura do pescoço fornecido com a manta.
    neck_support_size_system:
      name: Suporte cervical sistema de tamanhos
      description: Indica o sistema de tamanhos usado para o suporte/protetor cervical
        de corrida (por exemplo, adulto, juvenil ou tamanho único).
    necklace_length_type:
      name: Tipo de comprimento do colar
      description: Especifica a categoria convencional de comprimento do colar, como
        choker ou opera, para facilitar a compra por estilo.
    needle_balance_zone:
      name: Agulha zona de equilíbrio
      description: Indica a zona ou hemisfério de equilíbrio magnético para o qual
        a agulha da bússola é ajustada, garantindo leituras precisas no mundo todo.
    needle_case_format:
      name: Estojo para agulhas formato
      description: Formato geral do organizador do estojo para agulhas.
    needle_damping_type:
      name: Tipo de amortecimento da agulha
      description: Descreve como a agulha da bússola é estabilizada (por exemplo,
        com líquido, seca ou estabilizada eletronicamente), afetando o tempo de estabilização
        e a durabilidade.
    needle_felting_needle_profile:
      name: Agulha de feltragem perfil da agulha
      description: Seção transversal/perfil de uma agulha de feltragem, que afeta
        como as fibras são movidas e o acabamento produzido.
    needle_holder_features:
      name: Suporte para agulhas recursos
      description: Principais características funcionais do porta-agulhas.
    needle_holder_mounting_attachment_method:
      name: Suporte para agulhas método de montagem/fixação
      description: Como o suporte para agulhas deve ser fixado ou usado durante o
        armazenamento (por exemplo, magnético, clipe, tira).
    needle_holder_style:
      name: Estilo do porta-agulhas
      description: O estilo/design físico de armazenamento ou transporte do suporte
        para agulhas.
    needle_pushing_surface_type:
      name: Dedeira de costura tipo de superfície para empurrar agulha
      description: O tipo/design da superfície para empurrar agulha na dedeira de
        costura (por exemplo, concavidade de metal, moeda ou reforço).
    needle_requirement_beading_pattern:
      name: Agulha requisito (padrão de miçangas)
      description: Tipo/tamanho de agulha recomendado pelo padrão.
    needle_size_system:
      name: Agulha sistema de tamanhos
      description: Padrão de tamanhos usado para a identificação do tamanho da agulha.
    needle_threader_compatible_needle_type:
      name: Passador de linha tipo de agulha compatível
      description: Especifica com quais tipos de agulha o passador de linha foi projetado
        para funcionar (por categoria/uso da agulha).
    needle_threader_mechanism_type:
      name: Tipo de mecanismo do passador de linha
      description: Descreve como o passador captura/puxa a linha através do olho da
        agulha.
    needle_threader_packaging_type:
      name: Passador de linha tipo de embalagem
      description: Como o produto é vendido/embalado (avulso vs multipack vs conjunto).
    needlecraft_fabric_color_family:
      name: Tecido para artesanato com agulha família de cor
      description: Família de cor normalizada para tecido evenweave (usada junto com
        Cor para segmentação).
    needlecraft_fabric_composition:
      name: Tecido para artesanato com agulha composição
      description: Especifica a composição/mistura de fibras do tecido para artesanato
        com agulha (por exemplo, 100% algodão, mistura de linho/algodão).
    needlecraft_fabric_weave_type:
      name: Tecido para artesanato com agulha tipo de trama
      description: Especifica a trama/construção do linho para artesanato com agulha
        (por exemplo, evenweave vs linho tradicional), afetando o comportamento dos
        pontos e a aparência.
    needlecraft_kit_items_included:
      name: Kit de artesanato com agulha itens incluídos
      description: Lista os principais componentes incluídos no kit de artesanato
        com agulha (ferramentas e consumíveis).
    needlecraft_kit_project_type:
      name: Kit de artesanato com agulha tipo de projeto
      description: Identifica qual item acabado o kit produz (o resultado do projeto).
    needlecraft_stitching_coverage:
      name: Artesanato com agulha cobertura dos pontos
      description: Indica se o tecido é bordado sobre 1 fio/quadrado ou sobre 2 fios
        (comum em evenweave e linho).
    needlepoint_canvas_mesh_count:
      name: Tela para tapeçaria contagem da malha
      description: A malha/contagem da tela prevista (fios por polegada) para a qual
        o desenho foi diagramado (comumente chamada de contagem da tela).
    needlepoint_frame_canvas_attachment_method:
      name: Bastidor para tapeçaria método de fixação da tela
      description: Descreve como a tela para tapeçaria é presa ao bastidor para tapeçaria.
    needlepoint_frame_compatible_stand_type:
      name: Bastidor para tapeçaria tipo de suporte compatível
      description: Se o bastidor for projetado para ser montado em um suporte, especifica
        o(s) tipo(s) de suporte com que é compatível.
    needlepoint_frame_contents:
      name: Bastidor para tapeçaria conteúdo
      description: Especifica quais componentes e acessórios estão incluídos com o
        bastidor para tapeçaria (por exemplo, bastidor, barras/varetas extras, tachinhas/alfinetes,
        tiras de aderência, bolsa de transporte).
    needlepoint_frame_tension_adjustment_type:
      name: Bastidor para tapeçaria tipo de ajuste de tensão
      description: Indica como (ou se) a tensão do bastidor pode ser ajustada durante
        o uso.
    needlepoint_pattern_chart_format:
      name: Formato do gráfico do padrão de tapeçaria
      description: Como o desenho de tapeçaria é representado para bordar (diagrama
        vs guia impresso/pintado).
    needlepoint_project_type:
      name: Tapeçaria tipo de projeto
      description: O item/categoria acabada prevista para o desenho de tapeçaria.
    net_design:
      name: Rede design
      description: Identifica o estilo de construção da rede, indicando se ela pode
        retrair ou dobrar para portabilidade.
    net_mesh_pattern:
      name: Rede padrão da malha
      description: Especifica o formato geométrico das aberturas da rede, o que pode
        influenciar a visibilidade e a resistência.
    net_twine_gauge:
      name: Rede calibre do cordão
      description: Indica a espessura ou resistência do cordão da rede, tradicionalmente
        expressa como número de calibre (por exemplo, 18, 36).
    nicotine_source:
      name: Origem da nicotina
      description: Indica se a nicotina no produto é derivada do tabaco, sintética
        ou se o produto não contém nicotina.
    nipple_drive_interface:
      name: Niple interface de aperto
      description: Identifica o estilo/padrão da interface de aperto ou cabeça do
        niple (externa ou interna), determinando a ferramenta necessária e o método
        de montagem da roda.
    nock_activation_method:
      name: Nock método de ativação
      description: Especifica o mecanismo pelo qual o LED do nock iluminado da flecha
        é ligado ou desligado (por exemplo, pressão da corda do arco, sensor de movimento,
        interruptor manual).
    nock_fitment_code:
      name: Nock código de encaixe
      description: Código do fabricante ou do setor que identifica a família/série
        à qual o nock pertence.
    nock_throat_size:
      name: Nock tamanho da garganta
      description: Especifica o tamanho da garganta (ranhura) do nock que se encaixa
        na corda do arco.
    nock_transparency_level:
      name: Nível de transparência do nock
      description: Descreve o grau de transparência do material do nock, se é transparente,
        translúcido, opaco ou brilha no escuro, afetando a visibilidade e a estética.
    nock_type:
      name: Nock tipo
      description: Especifica o design do nock usado em uma flecha ou virote, como
        pin, meia-lua ou iluminado.
    noise_reduction_type:
      name: Tipo de redução de ruído
      description: Especifica a tecnologia de redução de ruído usada (ou não usada)
        no headset integrado do capacete, quando aplicável.
    noise_suppression_technology:
      name: Tecnologia de supressão de ruído
      description: Especifica se o produto usa amortecimento passivo ou circuito eletrônico
        ativo que comprime sons altos e/ou amplifica o som ambiente.
    non_slip_base_features:
      name: Base antiderrapante recursos
      description: Indica os recursos antiderrapantes incluídos para impedir que o
        pedal se mova durante a apresentação.
    nose_bridge_type:
      name: Ponte nasal tipo
      description: Indica o design da ponte nasal, afetando o ajuste em diferentes
        tamanhos de rosto.
    nose_clip_accessories_included:
      name: Clipe nasal acessórios incluídos
      description: Lista quaisquer acessórios adicionais fornecidos com o clipe nasal
        de natação (por exemplo, tampões de ouvido, estojo de armazenamento).
    nose_clip_features:
      name: Clipe nasal recursos
      description: Destaca recursos gerais funcionais ou de conforto do clipe nasal.
    nose_coverage_style:
      name: Estilo de cobertura contra ruído
      description: Indica a presença e o tipo de painel de proteção do nariz ou focinho
        na máscara contra moscas.
    noseband_type:
      name: Focinheira tipo
      description: Especifica o design da focinheira (se houver) fornecida com a cabeçada.
    number_of_canvas_meshes:
      name: Tela número de malhas
      description: O tamanho da malha da folha de tela plástica, expresso como furos
        por polegada (HPI) ou contagem, que determina o tamanho dos pontos e os detalhes
        do projeto.
    number_of_chainrings:
      name: Coroas número
      description: Indica quantas coroas o pedivela foi projetado para montar ou com
        quantas é fornecido.
    number_of_control_stations:
      name: Estações de controle número
      description: Indica o número de estações de leme/controle compatíveis com o
        conjunto de controle (estação única vs estação dupla, etc.).
    number_of_digits:
      name: Dígitos número
      description: Quantos dígitos o contador exibe (por exemplo, 1 dígito, 2 dígitos,
        3 dígitos).
    number_of_guitar_slots:
      name: Compartimentos para guitarra número
      description: Indica quantas guitarras o estojo/bag foi projetado para comportar.
    number_of_needlecraft_fabrics:
      name: Tecidos para artesanato com agulha número
      description: Especifica a contagem do tecido para tela/tecido de artesanato
        com agulha, normalmente expressa como quadrados/fios por polegada (por exemplo,
        contagem 14).
    number_of_plastic_canvas_meshes:
      name: Malhas de tela plástica número
      description: Especifica a contagem da malha da tela plástica (furos por polegada),
        que determina o tamanho dos pontos e o nível de detalhe do projeto.
    number_of_quilting_frame_rails:
      name: Trilhos de bastidor de quilt número
      description: Número de trilhos/rolos incluídos no bastidor de quilt (por exemplo,
        sistemas de 2 trilhos vs 3 trilhos).
    number_of_rope_slots:
      name: Ranhuras para corda número
      description: Indica se o dispositivo de segurança foi projetado para uso com
        corda simples ou dupla.
    number_of_switch_poles:
      name: Número de polos do interruptor
      description: O número de circuitos separados (polos) controlados pelo interruptor
        (por exemplo, SPST, DPST).
    number_of_switch_throws:
      name: Lançamentos do interruptor número
      description: O número de caminhos de saída (throws) por polo (por exemplo, SPDT).
    number_of_timing_chain_rows:
      name: Fileiras da corrente de distribuição número
      description: Indica se a corrente de distribuição é de fileira única ou múltiplas
        fileiras.
    number_of_trailer_axles:
      name: Eixos do reboque número
      description: Número de eixos no reboque.
    number_of_wheel_pieces:
      name: Peças da roda número
      description: Especifica se a roda tem construção de 1 peça, 2 peças ou 3 peças.
    numbering_style:
      name: Numeração estilo
      description: Indica se e como os coletes são pré-numerados para identificação
        da equipe (por exemplo, sem numeração, 1-10, personalizado).
    nunchuck_connector_type:
      name: Nunchaku conector tipo
      description: Estilo de ligação entre os dois cabos do nunchaku (por exemplo,
        corda, corrente, corrente giratória).
    nursing_access:
      name: Acesso para amamentação
      description: Identifica o método de acesso para amamentação integrado ao vestido
        de banho, quando aplicável.
    nursing_access_type:
      name: Acesso para amamentação tipo
      description: Especifica como a peça oferece acesso ao seio para amamentação
        ou extração de leite.
    nut_butter_texture:
      name: Pasta de oleaginosas textura
      description: Descreve a consistência física da pasta de oleaginosas para que
        os compradores possam escolher facilmente entre lisa, crocante, etc.
    nutrient_fortification:
      name: Fortificação de nutrientes
      description: Identifica os principais nutrientes com os quais a bebida ou produto
        alimentício é fortificado.
    oak_product_form:
      name: Forma do produto em carvalho
      description: Identifica a forma física do carvalho usado para envelhecimento/aromatização
        de produtos.
    oak_toast_level:
      name: Carvalho nível de tosta
      description: Especifica o nível de tosta dos produtos de carvalho.
    oboe_case_capacity:
      name: Capacidade do estojo para oboé
      description: Indica quais instrumentos e componentes principais o estojo foi
        projetado para transportar.
    oboe_case_carry_configuration:
      name: Estojo para oboé configuração de transporte
      description: Indica a principal configuração de transporte oferecida pelo estojo/bag.
    oboe_case_design:
      name: Estojo para oboé design
      description: Classifica a construção/rigidez de um estojo ou bag para oboé (por
        exemplo, rígido, semirrígido, macio) para indicar o nível de proteção.
    oboe_case_internal_fit_type:
      name: Estojo para oboé tipo de ajuste interno
      description: Indica se o interior é moldado para uma configuração específica
        do instrumento ou usa compartimentos ajustáveis.
    oboe_keywork_plating:
      name: Oboé banho das chaves
      description: Especifica o banho/acabamento das chaves do oboé, separado do material
        do corpo.
    oboe_strap_padding:
      name: Oboé acolchoamento da correia
      description: Descreve a presença/tipo de acolchoamento na área de contato da
        correia/suporte para conforto (por exemplo, área acolchoada no ombro/pescoço).
    oboe_swab_style:
      name: Swab para oboé estilo
      description: Especifica o estilo/construção funcional de um swab de limpeza
        para oboé (por exemplo, passante, seda com peso).
    observation_window_material:
      name: Janela de observação material
      description: Especifica o material dos painéis/janela de visualização (muitas
        vezes afeta a transparência e a durabilidade).
    ocarina_accessories_included:
      name: Acessórios inclusos com a ocarina
      description: Acessórios incluídos com a ocarina, como estojo, cordão de pescoço
        ou tabela de digitação.
    ocarina_chamber_count:
      name: Ocarina contagem de câmaras
      description: Indica quantas câmaras a ocarina inline possui, o que afeta a extensão
        e a complexidade de execução (simples/dupla/tripla, etc.).
    ocarina_fingering_system:
      name: Sistema de digitação da ocarina
      description: Especifica o sistema/padrão de digitação seguido pela ocarina pingente
        (quando aplicável).
    ocarina_finish_type:
      name: Ocarina tipo de acabamento
      description: Acabamento da superfície do corpo da ocarina que afeta o toque
        e a estética.
    occupant_classification_sensor_support:
      name: Sensor de classificação de ocupante suporte
      description: Indica se o banco inclui um sensor de classificação/peso do ocupante
        ou tem provisão para transferir/instalar o sensor OEM (comum em bancos dianteiros
        de passageiro).
    octave_harmonica_cover_plate_material:
      name: Material das placas de cobertura da gaita de oitavas
      description: Material das placas externas de cobertura da harmônica de oitava.
    octave_harmonica_tuning_system:
      name: Sistema de afinação da gaita de oitavas
      description: A afinação/temperamento usado para a harmônica de oitava.
    octoban_mounting_system_type:
      name: Octoban sistema de montagem tipo
      description: Como o octoban é montado/posicionado durante a execução (configuração
        de suporte/presilha/pedestal).
    odor_control_features:
      name: Controle de odor recursos
      description: Indica se o produto oferece funcionalidade de neutralização/desodorização
        de odores e por qual abordagem.
    office_furniture_items_included:
      name: Itens de mobiliário de escritório incluídos
      description: Identifica os itens específicos de mobiliário de escritório incluídos
        no conjunto, como mesa ou arquivo.
    oil_cooler_core_type:
      name: Radiador de óleo núcleo tipo
      description: Especifica a construção interna do núcleo do radiador de óleo,
        afetando a eficiência de resfriamento, a queda de pressão e a durabilidade.
    oil_cooler_mounting_style:
      name: Radiador de óleo montagem estilo
      description: Descreve como o radiador de óleo deve ser montado/instalado no
        veículo.
    oil_dipstick_component_type:
      name: Vareta de óleo componente tipo
      description: Especifica qual componente de medição do nível de óleo está sendo
        vendido (por exemplo, apenas lâmina/haste da vareta, apenas alça, conjunto
        completo, tubo da vareta, etc.).
    oil_dipstick_measurement_markings:
      name: Vareta de óleo marcações de medição
      description: Especifica quais marcações/escala estão presentes na vareta para
        leitura do nível de óleo.
    oil_dipstick_tube_mounting_type:
      name: Tubo da vareta de óleo montagem tipo
      description: Especifica como o tubo da vareta de óleo é retido ou montado no
        motor ou bloco do motor.
    oil_drain_plug_head_drive_type:
      name: Bujão de drenagem de óleo cabeça tipo de encaixe
      description: Especifica a interface de encaixe da ferramenta na cabeça do bujão
        de drenagem de óleo usada para instalação e remoção.
    oil_drain_plug_magnet_type:
      name: Bujão de drenagem de óleo ímã tipo
      description: Especifica se o bujão de drenagem é magnético e, em caso afirmativo,
        qual é o estilo.
    oil_fill_cap_type:
      name: Tampa de abastecimento de óleo tipo
      description: Estilo/tipo de interface da tampa de abastecimento de óleo usada
        pela tampa de válvulas (quando aplicável).
    oil_filler_cap_attachment_type:
      name: Tampa de abastecimento de óleo fixação tipo
      description: Especifica como a tampa de abastecimento de óleo é retida no motor/bocal
        de abastecimento de óleo (por exemplo, rosqueada, baioneta/quarto de volta,
        encaixe por pressão).
    oil_filler_cap_installation_position:
      name: Tampa de abastecimento de óleo posição de instalação
      description: Especifica onde a tampa é usada quando existem vários pontos de
        abastecimento de óleo (por exemplo, tampa de válvulas, tubo de abastecimento
        remoto).
    oil_filler_cap_locking_type:
      name: Tipo de travamento da tampa de abastecimento de óleo
      description: Especifica se a tampa de abastecimento de óleo não tem trava ou
        usa um método de remoção com trava/seguro (por exemplo, com chave ou com ferramenta)
        para ajudar a evitar violação/roubo ou abertura acidental.
    oil_filler_cap_tether_type:
      name: Tipo de retenção da tampa de abastecimento de óleo
      description: Especifica se a tampa de abastecimento de óleo é presa/retida para
        evitar perda e qual estilo de retenção é usado.
    oil_filler_cap_venting_type:
      name: Tampa de abastecimento de óleo tipo de ventilação
      description: Especifica se a tampa é ventilada e o mecanismo de ventilação (quando
        aplicável).
    oil_filter_style:
      name: Filtro de óleo estilo
      description: Especifica o formato e o estilo de montagem/instalação do filtro
        de óleo para compatibilidade com o suporte do filtro do motor.
    oil_pan_baffle_windage_features:
      name: Cárter de óleo recursos de defletor/controle de agitação
      description: Indica os recursos internos de controle de óleo incluídos no cárter.
    oil_pan_finish_coating:
      name: Acabamento/revestimento do cárter de óleo
      description: Descreve o acabamento ou revestimento da superfície do cárter de
        óleo (pintado, com pintura eletrostática, banhado, bruto, etc.).
    oil_pressure_sensor_function_type:
      name: Sensor de pressão do óleo tipo de função
      description: Indica se a peça é um transmissor de pressão do óleo de saída variável
        para um manômetro/ECU ou um interruptor liga/desliga de pressão do óleo que
        aciona uma luz de advertência.
    oil_pressure_sensor_signal_output_type:
      name: Sensor de pressão do óleo tipo de saída de sinal
      description: Especifica o estilo de saída/sinal elétrico produzido pelo sensor/transmissor
        de pressão do óleo.
    oil_processing_method:
      name: Método de processamento do óleo
      description: Especifica como o óleo foi produzido ou refinado (por exemplo,
        prensado a frio, virgem, refinado), o que influencia o sabor, a nutrição e
        as aplicações culinárias adequadas.
    oil_pump_drive_method:
      name: Bomba de óleo método de acionamento
      description: Indica o que aciona a bomba de óleo no motor.
    oil_pump_mounting_style:
      name: Tipo de montagem da bomba de óleo
      description: Especifica onde e como a bomba de óleo é montada no motor (por
        exemplo, interna vs externa/remota, montagem na tampa, montagem no cárter).
    oil_system_connection_thread_standard:
      name: Sistema de óleo padrão de rosca/conexão
      description: Especifica o padrão de rosca/conexão usado pela interface do sistema
        de óleo da peça para instalação/compatibilidade (por exemplo, M12x1,5, 1/8-27
        NPT, BSPP).
    oil_viscosity_grade:
      name: Óleo grau de viscosidade
      description: Descreve a espessura relativa do óleo de fiação para equipamentos
        de artesanato (não graus SAE automotivos).
    okra_variety:
      name: Quiabo variedade
      description: Identifica a cultivar ou variedade comercial específica de quiabo
        oferecida, como Clemson Spineless, Red Burgundy ou quiabo baby.
    olfactory_arts_material_form:
      name: Forma do material para perfumaria
      description: Especifica a forma física do material conforme vendido.
    olfactory_arts_tool_kit_content:
      name: Kit de ferramentas para artes olfativas conteúdo
      description: Lista quais componentes estão incluídos quando o produto é vendido
        como kit ou conjunto para fabricação de velas/incensos/perfumes.
    olive_variety:
      name: Azeitona variedade
      description: Especifica a cultivar de azeitona usada, o que afeta sabor, textura,
        cor e autenticidade regional.
    onion_variety:
      name: Modalidade da cebola
      description: Especifica o tipo específico de cebola para que os compradores
        possam localizar rapidamente a cor, o sabor e os perfis de uso preferidos,
        permitindo que os vendedores listem os produtos com precisão.
    opacity_level:
      name: Opacidade nível
      description: Indica o quanto o tecido é transparente ou opaco.
    operating_modes:
      name: Modos de operação
      description: Modos principais de efeito/movimento integrados compatíveis com
        a luz laser.
    operating_voltage:
      name: Tensão de operação
      description: Especifica a tensão nominal do sistema para a qual o injetor foi
        projetado.
    optical_toy_features:
      name: Brinquedo óptico recursos
      description: Destaca o principal efeito visual/óptico produzido pelo brinquedo.
    orchestral_string_core_material:
      name: Corda orquestral material do núcleo
      description: Especifica o material de construção do núcleo da corda, que afeta
        fortemente a sensação, a resposta e o timbre.
    orchestral_string_end_type:
      name: Corda orquestral extremidade tipo
      description: Especifica o estilo de fixação na extremidade da corda que fica
        no estandarte.
    orchestral_string_included_strings:
      name: Cordas incluídas no conjunto
      description: Lista quais cordas específicas estão incluídas no pacote (varia
        conforme o instrumento).
    orchestral_string_instrument_fitting_part_type:
      name: Instrumento de cordas orquestral acessório/peça tipo
      description: Especifica que tipo de acessório/peça é o produto (por exemplo,
        cavalete, estandarte, queixeira).
    orchestral_string_instrument_mute_type:
      name: Tipo de surdina para instrumento de cordas orquestral
      description: Especifica o tipo funcional de mudo para instrumento de cordas
        orquestral (por exemplo, estudo/hotel vs apresentação/concerto) e/ou estilo
        de design comum.
    orchestral_string_instrument_part_position:
      name: Instrumento de cordas orquestral peça posição
      description: Indica onde a peça pertence no instrumento (útil quando as peças
        têm variantes superiores/inferiores ou esquerdas/direitas).
    orchestral_string_winding_material:
      name: Corda orquestral, material do enrolamento
      description: Especifica o material do enrolamento/revestimento externo usado
        na corda.
    organza_finish_sheen:
      name: Organza acabamento/brilho
      description: Descreve o aspecto da superfície da organza (fosco vs brilhante/efeitos
        iridescentes).
    organza_ribbon_transparency_level:
      name: Fita de organza nível de transparência
      description: Descreve o quanto a fita de organza é transparente.
    organza_transparency_level:
      name: Organza, nível de transparência
      description: Descreve o quanto o tecido de organza é transparente quando sobreposto
        uma vez.
    origami_paper_shape:
      name: Papel de origami formato
      description: Especifica o formato da folha usada para dobradura.
    origami_paper_sidedness:
      name: Papel de origami lados
      description: Indica se o papel de origami tem a mesma cor/estampa nos dois lados
        ou lados contrastantes.
    ostrich_feather_part:
      name: Pena de avestruz parte
      description: Identifica o estilo/parte da pena de avestruz usada (por exemplo,
        pluma vs drab), o que afeta a maciez, a densidade e as aplicações típicas
        em artesanato.
    outboard_motor_shaft_type:
      name: Motor de popa, tipo de eixo
      description: Classe de comprimento do eixo do motor de popa padrão usada por
        motores de popa (forma de identificação usada no setor náutico).
    outboard_motor_steering_type:
      name: Motor de popa tipo de direção
      description: Especifica a interface/mecanismo de direção usado pelo motor de
        popa (por exemplo, leme ou sistema de direção remoto).
    outdoor_table_functionality:
      name: Mesa externa funcionalidade
      description: Identifica funções integradas especializadas que vão além de uma
        simples superfície de mesa (por exemplo, compartimento térmico, prateleira
        de armazenamento, cobertura para botijão de gás, base para guarda-sol, conector
        para cadeira, design dobrável, cofre para piscina, altura ajustável, rodas
        integradas, iluminação LED).
    outerwear_length_type:
      name: Agasalho comprimento tipo
      description: Classifica o comprimento total de uma peça de agasalho em faixas
        descritivas padrão.
    outerwear_pieces_included:
      name: Sobreposição, peças já incluídas
      description: Lista as peças de vestuário fornecidas quando o produto é vendido
        como conjunto.
    outfit_attachment_mechanism:
      name: Roupa, mecanismo de fixação
      description: Especifica como as peças de roupa ou acessórios se fixam à boneca
        (por exemplo, abas, adesivo, ímãs).
    outfit_items_included:
      name: Roupa, itens incluídos
      description: Lista os itens de vestuário específicos incluídos no conjunto (por
        exemplo, body, shorts, faixa de cabeça).
    outlet_thread_type:
      name: Saída tipo de rosca
      description: Padrão de rosca usado nas portas de saída da linha de freio do
        cilindro mestre (por exemplo, flange bolha métrico vs flange invertido SAE).
    output_jack_type_instrument:
      name: Jack de saída tipo (instrumento)
      description: Especifica o tipo de jack de saída de áudio no bandolim elétrico.
    output_signal_type:
      name: Sinal de saída tipo
      description: Comportamento/tipo de saída elétrica produzido pelo sensor (por
        exemplo, resistência analógica de termistor NTC).
    outsole_marking_type:
      name: Solado marcação tipo
      description: Indica se o solado do calçado deixa marcas nas superfícies da quadra,
        uma consideração essencial para esportes indoor com raquete.
    outsole_material:
      name: Solado material
      description: Indica o material do solado do calçado que entra em contato com
        o chão, afetando a aderência, a flexibilidade e a durabilidade.
    outsole_stud_type:
      name: Solado tipo de travas
      description: Descreve a configuração do solado/travas (por exemplo, travas moldadas,
        cravos de borracha, travas para grama sintética) que proporciona tração na
        superfície de jogo escolhida.
    oven_bake_clay_formulation:
      name: Argila de forno formulação
      description: Identifica a família de formulação da argila de forno (por exemplo,
        argila polimérica vs argila de resina), o que afeta o manuseio, o comportamento
        de cura e as propriedades finais.
    oven_housing_configuration:
      name: Gabinete para forno configuração
      description: Define o layout previsto do eletrodoméstico acomodado pelo gabinete
        (por exemplo, forno simples, forno duplo ou combinação de forno e micro-ondas).
    overhead_mount_installation_method:
      name: Suporte superior método de instalação
      description: Como o suporte superior é fixado ao veículo (ferragens/estilo de
        fixação).
    oversize_or_undersize_grade:
      name: Grau sobremedida ou submedida
      description: Especifica o grau de tamanho do kit (pistões/anéis sobremedida
        e/ou bronzinas submedida) em relação ao tamanho padrão OEM.
    p_tex_application_method:
      name: P-Tex, método de aplicação
      description: Descreve como o material P-Tex é aplicado à base do ski ou snowboard.
    p_tex_form:
      name: P-Tex forma
      description: Identifica a forma física na qual o material de reparo é fornecido.
    packability:
      name: Compactabilidade
      description: Indica se e como o colete pode ser compactado ou guardado quando
        não estiver em uso.
    packaging_format:
      name: Embalagem formato
      description: Como as cordas são embaladas/vendidas (envelopes individuais, a
        granel, etc.).
    packaging_material:
      name: Embalagem material
      description: Especifica o material principal da garrafa ou recipiente que contém
        a água.
    packaging_type:
      name: Embalagem, tipo
      description: Descreve como o bobblehead é embalado para varejo/exposição/armazenamento
        de colecionador.
    packing_medium:
      name: Meio de conservação
      description: Indica o líquido ou meio (como água, várias caldas, suco ou salmoura)
        usado para conservar a fruta dentro do recipiente.
    pad_components_included:
      name: Almofada, componentes já incluídos
      description: Especifica quais peças estão incluídas quando o produto é vendido
        como conjunto (por exemplo, joelheiras e cotoveleiras, apenas protetores de
        punho).
    pad_controller_additional_control:
      name: Controlador de pads controle adicional
      description: Tipos de controles físicos adicionais além dos pads (knobs, faders,
        botões) presentes na unidade.
    pad_controller_performance_features:
      name: Controlador de pads recursos de performance
      description: Principais recursos dos pads relacionados à performance para execução
        e controle expressivo.
    pad_coverage_area:
      name: Área de cobertura das proteções
      description: Especifica as áreas do corpo que as proteções integradas da cinta
        protegem.
    pad_material_or_technology:
      name: Pad material ou tecnologia
      description: Especifica a tecnologia proprietária de absorção de impacto ou
        o material de marca usado no pad.
    pad_mounting_or_holding_style:
      name: Pad estilo de montagem ou fixação
      description: Indica como o pad é fixado, usado ou instalado durante o uso.
    pad_saver_style:
      name: Pad saver estilo
      description: Indica o estilo/design físico do pad saver usado para secar as
        sapatilhas e o interior do instrumento.
    pad_shape:
      name: Almofada, formato
      description: Define a forma geométrica ou curvatura da superfície de impacto
        do pad ou do corpo geral (por exemplo, redondo, curvo, retangular, plano),
        ajudando os usuários a combinar os pads com objetivos de treino e tipos de
        golpe.
    pad_shell_type:
      name: Pad tipo de carcaça
      description: Classifica o estilo de construção da superfície externa do pad
        (por exemplo, carcaça rígida, carcaça macia, inserto interno).
    pad_style:
      name: Pad estilo
      description: Especifica o tipo ou design do pad fornecido com o trenó.
    padding_layers:
      name: Camadas de acolchoamento
      description: Indica o número de camadas de espuma usadas para absorção de impacto.
    padding_level:
      name: Nível de acolchoamento
      description: Indica a quantidade de acolchoamento integrada às áreas de contato
        da correia/suporte (pescoço/ombro/costas).
    padding_material:
      name: Material do acolchoamento
      description: Especifica a substância interna de enchimento ou acolchoamento
        que absorve impacto dentro de sacos, escudos, manoplas e bonecos de treino.
    paddle_ball_attachment_type:
      name: Bola com raquete tipo de fixação
      description: Especifica como a bola é conectada à raquete (ou se não possui
        cordão).
    paddle_leash_style:
      name: Leash para remo estilo
      description: Identifica o estilo ou design do cordão leash do remo.
    paddle_shape:
      name: Remo, formato
      description: Define a silhueta geral da cabeça/corpo da raquete (por exemplo,
        padrão, alongada, corpo largo), o que impacta o alcance, o tamanho do sweet
        spot e a manobrabilidade.
    paddleboard_intended_use:
      name: Prancha de stand up paddle uso previsto
      description: Classifica a finalidade principal de design ou atividade para a
        qual a prancha foi construída (por exemplo, Touring, Yoga, Racing).
    paint_application_method:
      name: Tinta, método de aplicação
      description: Principal forma como o produto deve ser aplicado à pinça.
    paint_by_number_surface_type:
      name: Pintura por números tipo de superfície
      description: A superfície em que o desenho numerado é impresso (por exemplo,
        tela, papel, painel de madeira).
    paint_medium_application_method:
      name: Medium de pintura método de aplicação
      description: Indica a forma recomendada de aplicar o medium.
    paint_medium_intended_effect:
      name: Medium de pintura efeito previsto
      description: Captura o principal resultado que o médium deve criar (textura,
        brilho, veladura, fluidez etc.).
    paint_safe_bristles:
      name: Cerdas seguras para pintura
      description: Indica se as cerdas do pincel são comercializadas como seguras
        para uso em pintura automotiva/verniz, sem riscar.
    paintable_surface:
      name: Superfície pintável
      description: Indica se a peça de papel machê está pronta para pintura como está,
        por exemplo, com primer/selada, ou se requer preparação.
    paintball_caliber:
      name: Calibre de paintball
      description: Especifica o diâmetro/calibre das bolas de paintball ou dos equipamentos
        compatíveis.
    paintball_feed_system:
      name: Sistema de alimentação de paintballs
      description: Define como as bolas de paintball são alimentadas no marcador.
    paintball_fill_color:
      name: Cor do enchimento da bola de paintball
      description: Indica a cor do enchimento interno de marcação, que pode ser diferente
        do invólucro externo e determina a cor deixada no impacto.
    paintball_fill_type:
      name: Paintball, tipo de enchimento
      description: Descreve qualquer formulação especial ou propriedade do enchimento,
        por exemplo, lavável, que brilha no escuro, em pó.).
    paintball_grade:
      name: Paintball, categoria
      description: Descreve a classe de desempenho ou o nível de uso pretendido (por
        exemplo, iniciante, campo, competição, inverno).
    paintball_mask_coverage_level:
      name: Nível de cobertura da máscara de paintball
      description: Indica quais partes do rosto ou da cabeça os óculos ou a máscara
        de paintball protegem (somente óculos, meia-face, rosto inteiro ou cabeça
        inteira).
    paintball_tank_valve_type:
      name: Tipo de válvula do cilindro de paintball
      description: Descreve a válvula ou a interface do regulador presente no cilindro.
    painting_surface_priming_type:
      name: Tipo de primer da superfície de pintura
      description: Especifica o primer/revestimento na superfície de pintura (além
        de apenas com ou sem primer), o que afeta a aderência da tinta e a compatibilidade
        com a técnica.
    palette_knife_blade_edge_profile:
      name: Perfil da borda da lâmina da espátula
      description: Descreve o perfil da borda de trabalho da lâmina da espátula (não
        a afiação), que afeta a criação de marcas e a mistura.
    palette_knife_flexibility:
      name: Flexibilidade da espátula
      description: Descreve a rigidez/flexibilidade da lâmina da espátula.
    palette_surface_finish:
      name: Acabamento da superfície da paleta
      description: Descreve o acabamento/revestimento da superfície de mistura que
        afeta a resistência a manchas e a facilidade de limpeza.
    palm_padding_level:
      name: Palma, nível de acolchoamento
      description: Descreve a quantidade de acolchoamento na região da palma da luva
        ou da almofada de pegada.
    palm_padding_type:
      name: Palma, tipo de acolchoamento
      description: Indica o material ou a construção usados no acolchoamento da palma
        (por exemplo, gel, espuma, dupla camada).
    palm_wax_blend_readiness:
      name: Prontidão da mistura de cera de palma
      description: Indica se o produto é cera de palma pura ou uma formulação pré-misturada
        destinada a características específicas de desempenho.
    palm_wax_form:
      name: Forma da cera de palma
      description: Forma física da cera de palma conforme vendida, que afeta a facilidade
        de medição, a velocidade de derretimento e o manuseio.
    pan_flute_tuning_standard:
      name: Padrão de afinação do handpan
      description: Frequência de referência usada para afinação (por exemplo, A4=440
        Hz), importante para tocar com outros instrumentos.
    pannier_configuration:
      name: Alforjes, configuração
      description: Indica se o produto é vendido como uma bolsa única, dupla conectada
        ou conjunto duplo/triplo de alforjes.
    pannier_mounting_system:
      name: Alforjes, sistema de montagem
      description: Define o mecanismo usado para prender o alforje ao bagageiro ou
        quadro da bicicleta, garantindo compatibilidade com diferentes configurações.
    pant_cuff_style:
      name: Estilo da barra da calça
      description: Indica o acabamento ou ajuste no tornozelo da calça (por exemplo,
        barra elástica, zíper no tornozelo, barra aberta).
    pant_leg_conversion_type:
      name: Tipo de conversão da perna da calça
      description: Indica se e como as pernas da calça podem ser convertidas ou ajustadas
        para diferentes comprimentos.
    pantyhose_crotch_style:
      name: Estilo do entrepernas da meia-calça
      description: Define o design da área do entrepernas, distinguindo versões padrão
        com entrepernas fechado, sem entrepernas ou com reforço no fundilho.
    papaya_variety:
      name: Variedade de mamão
      description: Especifica o cultivar ou a variedade comercial de um mamão (por
        exemplo, Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Formato de boneca de papel e magnética
      description: Especifica se o produto é um conjunto tradicional de bonecas de
        papel, um conjunto de bonecas magnéticas ou um formato híbrido.
    paper_color_family:
      name: Família de cores do papel
      description: Especifica se o pacote é de uma única cor, cores sortidas ou misturas
        especiais (útil quando a cor é por item, mas os pacotes são mistos).
    paper_magnetic_doll_set_contents:
      name: Conteúdo do conjunto de bonecas de papel & magnéticas
      description: Indica quais componentes principais estão incluídos no conjunto.
    paper_opacity:
      name: Opacidade do papel
      description: Indica o quão transparente é o papel, de muito transparente a opaco
        (útil para decalcar).
    paraglider_certification_rating:
      name: Parapente, categoria de certificação
      description: Indica a classificação oficial de aeronavegabilidade atribuída
        a uma asa de parapente (por exemplo, classes EN ou LTF).
    parasite_types_controlled:
      name: Tipos de parasitas controlados
      description: Lista os parasitas internos contra os quais o produto é eficaz,
        para que os compradores possam adaptar programas de vermifugação a infestações
        específicas.
    parking_camera_mounting_location:
      name: Câmera de estacionamento, local de instalação
      description: Indica em que parte do veículo a câmera deve ser instalada (por
        exemplo, área da placa, montagem superficial na traseira, montagem embutida).
    parking_camera_night_vision_technology:
      name: Tecnologia de visão noturna da câmera de estacionamento
      description: O método de assistência em baixa luminosidade usado pela câmera.
    parking_camera_orientation:
      name: Orientação da câmera de estacionamento
      description: Indica se a câmera foi projetada para visualização traseira (ré),
        visualização dianteira ou uso selecionável/espelhado.
    parking_sensor_finish:
      name: Acabamento do sensor de estacionamento
      description: Indica o acabamento da superfície da face/tampa do sensor de estacionamento
        (por exemplo, pintável/com primer, fosco, brilhante) para ajudar a combinar
        com a estética do para-choque.
    parking_sensor_type:
      name: Tipo de sensor de estacionamento
      description: Especifica a tecnologia de detecção usada pelo sensor de estacionamento
        (por exemplo, ultrassônico, eletromagnético, radar, óptico).
    parsley_root_variety:
      name: Variedade de salsa-raiz
      description: Especifica o cultivar ou a variedade da salsa-raiz quando fornecido
        pelo fornecedor.
    parsnip_variety:
      name: Variedade de pastinaca
      description: Identifica a variedade ou cultivar específico da pastinaca, como
        Hollow Crown ou White Gem, permitindo que os compradores escolham com base
        em diferenças de sabor, doçura ou tamanho.
    part_condition:
      name: Condição da peça
      description: Indica se a peça é nova, usada, recondicionada etc.
    part_placement:
      name: Posicionamento da peça
      description: Indica onde na máquina (por exemplo, simulador de escada ou stepper)
        a peça é instalada, como esquerda, direita, dianteira ou traseira.
    partial_capo_covered_strings:
      name: Cordas cobertas pelo capotraste parcial
      description: Especifica o intervalo de cordas que o capotraste parcial cobre
        usando a numeração padrão de violão/guitarra de 6 cordas (1 = mi agudo, 6
        = mi grave).
    parting_style:
      name: Estilo de repartição
      description: Indica como a peruca é ou pode ser repartida (por exemplo, no meio,
        de lado, repartição livre), afetando a flexibilidade do penteado.
    party_favor_type:
      name: Tipo de lembrancinha de festa
      description: Especifica que tipo de item de lembrancinha de festa é (por exemplo,
        adesivos, brinquedos pequenos, bolhas de sabão), para permitir navegação/filtragem
        dentro de Lembrancinhas de Festa.
    party_game_format:
      name: Formato do jogo de festa
      description: Formato físico principal do jogo de festa.
    party_horn_mouthpiece_type:
      name: Tipo de bocal da corneta de festa
      description: Especifica a construção do bocal, que afeta a higiene e o conforto.
    party_horn_style:
      name: Estilo da corneta de festa
      description: Descreve o estilo de construção/comportamento da corneta de festa
        (como ela se estende ou produz som).
    passenger_car_type:
      name: Tipo de carro de passageiros
      description: Identifica o tipo específico de material rodante de passageiros
        (carro de passageiros) do modelo (por exemplo, vagão, carro-leito), usado
        para navegação e montagem de conjuntos.
    passion_fruit_variety:
      name: Variedade de maracujá
      description: Identifica/especifica a variedade botânica ou comercial de maracujá
        oferecida (por exemplo, roxo, amarelo, granadilha).
    pasta_sauce_texture:
      name: Textura do molho para massa
      description: Descreve a consistência do molho (por exemplo, liso, com pedaços,
        cremoso) para corresponder às preferências de sensação na boca dos consumidores.
    pasta_sauce_variety:
      name: Variedade de molho para massa
      description: Classifica molhos para massa por receita ou estilo para que os
        compradores possam localizar rapidamente clássicos como marinara ou molhos
        especiais como vodka ou pesto.
    pastry_crust_state:
      name: Estado da crosta de massa folhada
      description: Descreve o estado de preparo ou cozimento da crosta no momento
        da compra.
    pastry_crust_style:
      name: Crosta de massa folhada, estilo
      description: Identifica o estilo específico de massa folhada ou o tipo de massa
        da crosta.
    pastry_filling_type:
      name: Tipo de recheio de produto de confeitaria
      description: Especifica o recheio interno principal do produto de confeitaria
        ou scone.
    patch_adhesion_method:
      name: Método de adesão do remendo
      description: Especifica como o remendo adere à câmara de ar ou ao pneu (por
        exemplo, autoadesivo, vulcanizado com cola ou ativado por calor).
    patch_backing_material:
      name: Patch, material protetor
      description: Material usado na parte traseira/base do aplique (por exemplo,
        feltro, sarja) que entra em contato com o item que está sendo decorado.
    patch_backing_type:
      name: Patch, tipo de suporte
      description: O suporte usado no aplique (por exemplo, termocolante/de passar
        a ferro, adesivo destacável, velcro, nenhum).
    patch_base_material:
      name: Patch, material de base
      description: Material têxtil principal da base/suporte do patch decorativo (não
        os enfeites decorativos).
    patch_border_edge_finish:
      name: Patch acabamento de borda/extremidade
      description: Método de acabamento da borda do patch (por exemplo, borda merrow/overloque,
        borda cortada a laser), que afeta a durabilidade e a aparência.
    patch_placement_area:
      name: Patch área de colocação
      description: Área comum prevista para colocação do patch em roupas/acessórios.
    pathogen_removal_capability:
      name: Patógeno capacidade de remoção
      description: Especifica quais classes de microrganismos (bactérias, protozoários,
        vírus) a bomba é certificada para remover.
    pattern_sizing_system:
      name: Molde sistema de tamanhos
      description: Especifica o sistema ou padrão regional de tamanhos usado na tabela
        de tamanhos do molde (por exemplo, EUA, Reino Unido, UE).
    peak_style:
      name: Aba, estilo
      description: Especifica o estilo da viseira ou aba do capacete, afetando a cobertura,
        a estética e as regras da modalidade.
    pear_variety:
      name: Pera variedade
      description: Identifica o cultivar ou a variedade de pera (por exemplo, Bartlett,
        Bosc, Conference), permitindo que os compradores escolham conforme suas preferências
        de sabor, textura e uso culinário.
    pearl_luster_grade:
      name: Pérola grau de lustre
      description: Grau qualitativo de lustre/brilho da superfície da pérola.
    pearl_matching_level:
      name: Pérola nível de correspondência
      description: Indica o quanto as pérolas combinam dentro de um lote ou fio (por
        exemplo, por cor, tamanho e lustre).
    pearl_shape:
      name: Pérola formato
      description: Categoria geral de formato da pérola.
    pearl_surface_condition:
      name: Pérola condição da superfície
      description: Indica a condição visível da superfície de uma pérola, com base
        na presença e gravidade de imperfeições ou manchas.
    pearl_treatment:
      name: Pérola tratamento
      description: Informa qualquer tratamento aplicado à pérola que afete a cor/aparência.
    pearl_type:
      name: Pérola tipo
      description: Especifica a variedade/origem da pérola (por exemplo, água doce,
        Akoya, taitiana, Mares do Sul) para pérolas soltas.
    peat_level:
      name: Turfa nível
      description: Descreve a intensidade da influência da fumaça de turfa no uísque,
        de sem turfa a intensamente turfado.
    pedal_and_cleat_system_compatibility:
      name: Pedal e taco sistema compatibilidade
      description: Especifica com quais padrões de pedal ou taco o calço ou a cunha
        foi projetado para funcionar, garantindo que os compradores escolham um produto
        compatível com seus pedais e sapatilhas.
    pedal_configuration:
      name: Pedal configuração
      description: Indica se a cadeira possui um único pedal, pedais divididos/independentes
        ou um design conversível.
    pedal_mounting_style:
      name: Pedal, estilo de montagem
      description: Especifica como o pedal ou a capa/almofada do pedal se fixa ao
        veículo (método de instalação/fixação).
    pedal_set_components:
      name: Pedal conjunto componentes
      description: Especifica quais pedais estão incluídos no conjunto.
    pedal_spindle_material:
      name: Pedal eixo material
      description: Material usado no eixo/fuso do pedal, influenciando a resistência,
        o peso e a resistência à corrosão.
    pedal_spindle_thread_size:
      name: Pedal eixo tamanho da rosca
      description: Especifica o padrão de rosca do eixo do pedal que é parafusado
        no braço da pedivela.
    pedal_type:
      name: Pedal tipo
      description: Descreve o estilo dos pedais fornecidos com a bicicleta, indicando
        a compatibilidade com as sapatilhas e o estilo de pedalada.
    pellet_accessory_type:
      name: Pelota, tipo de acessório
      description: Identifica o tipo específico de acessório para pellet, para que
        pescadores possam localizar rapidamente brocas, banders ou stops de acordo
        com suas necessidades de montagem de rigs.
    pellet_grade:
      name: Pellet grau
      description: Indica a precisão de fabricação ou o grau de desempenho dos pellets
        de airsoft.
    pen_ink_color:
      name: Caneta cor da tinta
      description: Indica a cor real da tinta liberada pela caneta, que pode ser diferente
        da cor externa do corpo.
    penalty_card_accessories_included:
      name: Cartão de punição acessórios incluídos
      description: Lista os acessórios adicionais de arbitragem incluídos com os cartões
        de punição, como carteira, placar, lápis, moeda, apito ou bolsa.
    penalty_card_colors_included:
      name: Cartão de punição, cores incluídas
      description: Lista as cores dos cartões de punição contidos no conjunto do produto.
    penalty_flag_throw_distance:
      name: Flag de penalidade distância de arremesso
      description: Classificação de design que indica o alcance de arremesso pretendido
        da flag.
    pendant_cutter_safety_features:
      name: Cortador pingente recursos de segurança
      description: Identifica elementos de segurança integrados que reduzem cortes
        acidentais durante o transporte/uso.
    pendant_cutter_wear_method:
      name: Cortador pingente método de uso
      description: Especifica como o cortador pingente deve ser carregado ou usado.
    pepper_variety:
      name: Pimenta variedade
      description: Especifica a variedade ou espécie de pimenta usada no produto,
        permitindo que os compradores diferenciem entre diferentes perfis de sabor
        e níveis de ardência.
    percussion_case_style:
      name: Percussão estojo estilo
      description: Classifica o estilo/construção geral do estojo (bolsa flexível
        vs. estojo rígido vs. híbrido).
    percussion_instruments_included:
      name: Percussão, instrumentos incluídos
      description: Lista os tipos de instrumentos de percussão incluídos quando o
        produto é um conjunto de brinquedo com vários instrumentos.
    percussion_mallet_handle_grip_style:
      name: Percussão baqueta cabo estilo de empunhadura
      description: Identifica o tipo de tratamento de empunhadura no cabo (além da
        textura), como madeira sem acabamento, laqueado, empunhadura emborrachada
        ou revestimento.Cortador pingente recursos de segurança
    percussion_mallet_head_construction:
      name: Identifica elementos de segurança integrados que reduzem cortes acidentais
        durante o transporte/uso.
      description: Cortador pingente método de uso
    perfumery_base_carrier_type:
      name: Especifica como o cortador pingente deve ser carregado ou usado.
      description: Pimenta variedade
    perfumery_base_intended_application:
      name: Especifica a variedade ou espécie de pimenta usada no produto, permitindo
        que os compradores diferenciem entre diferentes perfis de sabor e níveis de
        ardência.
      description: Percussão estojo estilo
    perfumery_ingredient_carrier_solvent:
      name: Classifica o estilo/construção geral do estojo (bolsa flexível vs. estojo
        rígido vs. híbrido).
      description: Lista os tipos de instrumentos de percussão incluídos quando o
        produto é um conjunto de brinquedo com vários instrumentos.
    perfumery_ingredient_form:
      name: Perfumaria, forma do ingrediente
      description: Percussão baqueta cabo estilo de empunhadura
    perfumery_ingredient_type:
      name: Perfumaria, tipo de ingrediente
      description: Identifica o tipo de tratamento de empunhadura no cabo (além da
        textura), como madeira sem acabamento, laqueado, empunhadura emborrachada
        ou revestimento.
    perfumery_ingredient_usage_note:
      name: Perfumaria ingrediente nota de uso
      description: Indica a função típica em uma estrutura de fragrância (topo, meio/coração,
        base), reconhecendo que os materiais podem abranger diferentes notas.
    perfumery_ingredients:
      name: Perfumaria, ingredientes
      description: Lista os tipos de materiais consumíveis para fragrância incluídos
        no kit (por exemplo, óleos essenciais, óleos de fragrância, base alcoólica).
    perfumery_note_position:
      name: Perfumaria nota posição
      description: Indica a função típica do ingrediente em uma estrutura de fragrância
        (topo/coração/base).
    persimmon_variety:
      name: Caqui variedade
      description: Identifica o cultivar ou a variedade do caqui, pois diferentes
        variedades como Fuyu ou Hachiya diferem em textura, sabor, adstringência e
        uso culinário.
    personalization_type:
      name: Personalização tipo
      description: Especifica se e como o produto pode ser personalizado para um evento
        (por exemplo, monograma, nome/data, inserção de foto).
    phonics_focus:
      name: Fônica foco
      description: Especifica quais habilidades de fônica e leitura de palavras o
        brinquedo de leitura trabalha.Perfumaria ingrediente nota de uso
    physalis_variety:
      name: Physalis variedade
      description: Identifica a espécie botânica, cultivar ou variedade comum específica
        de physalis que está sendo vendida.
    pi_ata_filler_type_included:
      name: Piñata tipo de enchimento incluído
      description: Se houver enchimento incluído, indica o tipo de conteúdo fornecido.
    pi_ata_hanging_method:
      name: Piñata método de pendurar
      description: Como a piñata foi projetada para ser pendurada ou apoiada (alça,
        gancho, cordão incluído etc.).
    pi_ata_opening_type:
      name: Piñata tipo de abertura
      description: Como a abertura para enchimento é acessada/fechada (aba, velcro,
        zíper, pré-selada etc.).
    piccolo_key_system:
      name: Piccolo sistema de chaves
      description: Identifica o sistema/design de mecanismo de chaves usado no piccolo
        (normalmente sistema Boehm para piccolos modernos).
    piccolo_keywork_features:
      name: Piccolo recursos do mecanismo de chaves
      description: Especifica mecanismos e opções notáveis do mecanismo de chaves
        do piccolo.
    pick_grip_aid:
      name: Palheta auxílio de pegada
      description: Indica o principal auxílio de pegada integrado à palheta além da
        sensação/textura geral da superfície (por exemplo, orifícios de aderência,
        logotipo em relevo, inserto de borracha).
    pickleball_construction_type:
      name: Pickleball, tipo de construção
      description: Construção de fabricação da bola, como peça única sem costura ou
        duas peças soldadas, que impacta a durabilidade e a consistência de voo.
    pickling_method:
      name: Conserva, método
      description: Especifica o meio ou a técnica de conserva usada para pickling,
        como salmoura com vinagre ou lactofermentação.
    pickup_and_preamp_configuration:
      name: Captador e pré-amplificador configuração
      description: Indica se a viola inclui captador integrado e/ou pré-amplificador
        ativo para performance amplificada ou gravação.
    pickup_configuration:
      name: Captador, configuração
      description: Descreve o layout geral dos captadores de uma guitarra elétrica
        usando abreviações comuns (por exemplo, SSS, HSS, HH).
    pickup_cover_material:
      name: Captador, material da capa
      description: Especifica o material principal da capa do captador (se presente),
        incluindo acabamentos banhados comuns quando é assim que o fabricante especifica.
    pickup_cover_type:
      name: Captador tipo de capa
      description: Especifica se um captador de guitarra elétrica tem capa e o material/estilo
        da capa (por exemplo, metal vs. plástico).
    pickup_string_spacing:
      name: Captador espaçamento das cordas
      description: O padrão de espaçamento entre polos/cordas para o qual o captador
        é feito (por exemplo, Fender/F-spaced vs. Gibson/padrão), afetando o alinhamento
        em guitarras com tremolo.
    pie_crust_type:
      name: Torta tipo de crosta
      description: Especifica o estilo ou tipo de crosta usada para a torta ou tarte,
        como massa folhada, biscoito graham ou crosta sem glúten.
    piece_configuration:
      name: Peça configuração
      description: Indica de quantas peças separadas o taco, a haste ou a ponte consiste,
        afetando a portabilidade e o estilo de jogo.
    pillow_form_size:
      name: Travesseiro forma tamanho
      description: Designação padronizada de tamanho final para formas/enchimentos
        de travesseiro (por exemplo, 18" x 18").
    pilot_helmet_communications_integration:
      name: Piloto capacete integração de comunicação
      description: Indica se o capacete inclui ou vem pré-configurado para componentes
        de comunicação de aviação.
    pilot_helmet_visor_configuration:
      name: Piloto capacete configuração da viseira
      description: Especifica a configuração da viseira/protetor facial incluída com
        o capacete de piloto.
    pin_attachment_type:
      name: Pino, tipo de fixação
      description: Especifica o mecanismo de traseira/suporte do pin usado para prender
        o pin à roupa ou a uma superfície (por exemplo, fecho borboleta, suporte magnético).
    pin_backing_type:
      name: Pino, tipo de suporte
      description: Especifica o mecanismo de fixação/suporte usado para prender o
        pin à roupa ou a acessórios.
    pin_cushion_attachment_style:
      name: Pin cushion estilo de fixação
      description: Como o pin cushion é usado, preso ou posicionado durante o uso.
    pin_cushion_features:
      name: Pin cushion recursos
      description: Recursos funcionais além do suporte básico de pins.
    pin_face_customization_method:
      name: Pin método de personalização da face
      description: Especifica como o design frontal é produzido (por exemplo, esmalte
        duro, esmalte macio, impresso).
    pin_type:
      name: Pin tipo
      description: Especifica o estilo ou formato do produto pin usado para colecionáveis
        de fãs de esportes.
    ping_pong_certification:
      name: Pingue-pongue certificação
      description: Declara o padrão oficial ou o nível de aprovação do órgão regulador
        do produto.
    ping_pong_competition_certification:
      name: Pingue-pongue competição certificação
      description: Indica o status de certificação oficial da bola de pingue-pongue
        para jogos sancionados (por exemplo, aprovada pela ITTF).
    ping_pong_paddle_handle_style:
      name: Pingue-pongue raquete cabo estilo
      description: Define o formato/estilo do cabo da raquete, que influencia o conforto
        da pegada e a técnica de jogo.
    ping_pong_robot_accessory_type:
      name: Pingue-pongue robô acessório tipo
      description: Identifica o subtipo funcional do acessório para que os compradores
        possam restringir rapidamente os resultados (por exemplo, redes vs. adaptadores
        de energia).
    ping_pong_rubber_surface_type:
      name: Pingue-pongue borracha superfície tipo
      description: Identifica o estilo/textura da superfície de borracha aplicada
        à raquete, afetando as características de efeito e velocidade.
    ping_pong_rubber_type:
      name: Pingue-pongue borracha tipo
      description: Especifica o estilo de construção da superfície de uma folha de
        borracha de pingue-pongue, que influencia as características de jogo.
    ping_pong_table_type:
      name: Pingue-pongue, tipo de mesa
      description: Classifica o estilo ou formato geral da mesa para facilitar a comparação
        (por exemplo, competição, tampo de conversão, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Instrumento de sopro método de sonorização/produção de som
      description: Especifica como o instrumento produz som (mecanismo de fluxo de
        ar), ajudando a distinguir flautas de pã, tubos com palheta e famílias de
        tubos de órgão nos filtros.
    piston_application_type:
      name: Pistão aplicação tipo
      description: Uso previsto/caso de uso do pistão (substituição vs. performance/corrida
        vs. serviço pesado).
    piston_crown_dish_style:
      name: Pistão coroa/cavidade estilo
      description: Formato da coroa do pistão que influencia o volume da câmara de
        combustão e a compressão (por exemplo, topo plano, dome, cavity).
    piston_pin_retention_type:
      name: Pistão pino tipo de retenção
      description: Especifica como o pino de pulso (pistão) é retido no conjunto pistão/biela.
    pit_configuration:
      name: Colchão, configuração
      description: Define o formato estrutural da área de pouso (peça única vs. multimódulo)
        e, por extensão, o número de seções ou módulos fornecidos.
    pit_cover_type:
      name: Colchão, tipo de cobertura
      description: Especifica a superfície ou lona protetora fornecida com o pit,
        afetando a resistência a spikes, a proteção contra intempéries e a preferência
        do atleta.
    pitahaya_flesh_color:
      name: Pitaia polpa cor
      description: Especifica a cor da polpa interna da pitaia (fruta-do-dragão) (por
        exemplo, branca, vermelha, magenta), um diferencial importante que afeta o
        sabor, a aparência e a nutrição percebida.
    pitch_mat_coverage_length:
      name: Tapete da área de arremesso comprimento de cobertura
      description: Classifica o tapete da área de arremesso de críquete pela parte
        do wicket que ele cobre (por exemplo, área inteira ou meia área de arremesso).
    pitch_range:
      name: Altura tonal faixa
      description: Descreve a faixa/brilho de altura tonal percebida do som do chocalho.
    pitch_standard:
      name: Altura tonal padrão
      description: Especifica o padrão de altura tonal (afinação de referência) para
        o qual a flauta doce foi construída (por exemplo, A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Placa do arremessador designação de tamanho
      description: Indica a classificação padrão de tamanho de campo para a placa
        do arremessador, simplificando a seleção sem exigir que os compradores saibam
        as medidas exatas.
    pitching_screen_style:
      name: Tela de arremesso estilo
      description: Define o design estrutural da tela, para que os compradores possam
        selecionar rapidamente o layout de proteção correto para seu cenário de treino.
    pitching_target_design:
      name: Alvo de arremesso design
      description: Classifica o estilo ou a configuração geral do alvo de arremesso.
    pitching_wheel_count:
      name: Máquina de arremesso número de rodas
      description: Indica o número de rodas de propulsão que uma máquina de arremesso
        usa.
    pivot_adjustability:
      name: Pivô ajuste
      description: Indica se a tesoura possui um parafuso de pivô ajustável para regular
        a tensão de corte.
    pivot_piece_type:
      name: Peça de pivô tipo
      description: Distingue entre diferentes formatos de interface de pivô fornecidos,
        como copos tradicionais ou estilo tubo.
    place_card_holder_closure_mechanism:
      name: Marcador de lugar mecanismo de fechamento do suporte
      description: Especifica como o suporte segura ou prende o marcador de lugar.
    place_card_orientation:
      name: Marcador de lugar orientação
      description: Especifica a orientação do marcador de lugar quando usado/exibido.
    place_card_printing_status:
      name: Marcador de lugar status de impressão
      description: Indica se o marcador de lugar está em branco para preenchimento/impressão
        manual, pré-impresso (nomes não personalizados) ou personalizado/impresso
        sob medida.
    placket_type:
      name: Carcela tipo
      description: Especifica o estilo da abertura frontal da polo, incluindo número
        de botões ou fechamentos alternativos.
    planetarium_content_theme:
      name: Planetário conteúdo tema
      description: Conteúdo principal exibido pelo projetor de planetário.
    planetarium_projection_content_format:
      name: Planetário projeção conteúdo formato
      description: Especifica o mecanismo de conteúdo de projeção usado pelo planetário
        (discos/slides físicos vs. efeito digital/LED).
    plant_fiber_type:
      name: Fibra vegetal tipo
      description: Tipo específico de fibra de origem vegetal quando o tipo de fonte
        da fibra básica é vegetal.
    plaster_gauze_finish:
      name: Gaze gessada acabamento
      description: Tendência de acabamento da superfície resultante após a aplicação
        e alisamento.
    plaster_gauze_grade:
      name: Gaze gessada grau
      description: Grau de uso previsto da gaze gessada (por exemplo, artesanato/estudante
        vs. profissional).
    plaster_gauze_weave_density:
      name: Gaze gessada densidade da trama
      description: Abertura/fechamento relativo da trama da gaze, afetando a resistência
        e a absorção do gesso.
    plastic_canvas_finish:
      name: Tela plástica acabamento
      description: Tratamento de superfície/acabamento do rolo de tela plástica.
    plastic_canvas_sheet_finish:
      name: Tela plástica, acabamento
      description: Tratamento da superfície/bordas da tela plástica.
    plastic_canvas_transparency:
      name: Tela plástica transparência
      description: O quanto a tela plástica é transparente/opaca.
    plate_bottom_design:
      name: Placa design inferior
      description: Descreve a construção da parte inferior da placa, que afeta a tração,
        a estabilidade e a segurança em diferentes superfícies de jogo.
    plate_compatibility_standard:
      name: Anilha, padrão de compatibilidade
      description: Indica o padrão de anilha para o qual a barra foi projetada (por
        exemplo, olímpica 50 mm, padrão 25 mm).
    plate_installation_type:
      name: Placa instalação tipo
      description: Especifica como a placa é fixada ou posicionada no campo (por exemplo,
        enterrada, com estacas, solta), permitindo que os compradores escolham entre
        opções permanentes e portáteis.
    plate_size_category:
      name: Anilha, categoria de tamanho
      description: Classifica a placa por nível de jogo ou padrão regulamentar, para
        que os compradores possam localizar rapidamente equipamentos em conformidade
        com a liga.
    play_dough_putty_kit_contents:
      name: Massinha de modelar & putty kit conteúdo
      description: Identifica os principais componentes incluídos além da própria
        massa (por exemplo, ferramentas, moldes, extrusora, armazenamento).
    play_dough_tool_set_items_included:
      name: Massinha de modelar conjunto de ferramentas itens incluídos
      description: Identifica os tipos de ferramentas e acessórios incluídos em um
        conjunto de ferramentas para massinha de modelar (por exemplo, rolos, cortadores,
        moldes).
    play_environment_suitability:
      name: Brincadeira ambiente adequação
      description: Identifica o ambiente de brincadeira previsto para o conjunto (por
        exemplo, interno, externo, água).
    play_food_features:
      name: Comidinha de brinquedo recursos
      description: Recursos especiais funcionais ou de realismo dos itens de comidinha
        de brinquedo.
    play_food_items_included:
      name: Comidinha de brinquedo itens incluídos
      description: Indica os tipos de comidinha de brinquedo incluídos no kit de cozinha
        de brinquedo.
    play_food_size_scale:
      name: Comidinha de brinquedo escala de tamanho
      description: Indica a escala aproximada de tamanho das peças de comida de brinquedo
        para compatibilidade com cozinhas de brinquedo, bonecas e kits.
    play_money_set_components_included:
      name: Conjunto de dinheiro de brinquedo, componentes incluídos
      description: Especifica quais tipos de componentes estão incluídos no conjunto
        de dinheiro de brinquedo/banco.
    play_pattern:
      name: Brincadeira, tipo
      description: A principal forma como o brinquedo deve ser usado (por exemplo,
        alívio de inquietação/estresse, escultura/arte de mesa, construção/montagem
        ou quebra-cabeças).
    play_sprinkler_mounting_type:
      name: Aspersor de brinquedo tipo de montagem
      description: Como o aspersor de brinquedo é posicionado/fixado durante o uso.
    play_vehicle_lights_and_sounds:
      name: Veículo de brinquedo luzes e sons
      description: Indica se o veículo de brinquedo inclui efeitos eletrônicos de
        brincadeira, como luzes e/ou sons.
    play_vehicle_scale:
      name: Veículo de brinquedo escala
      description: Indica a proporção de escala do veículo de brinquedo (comumente
        usada para veículos de brinquedo die-cast e semelhantes a modelos).
    player_size_category:
      name: Jogador, categoria de tamanho
      description: Define a faixa de tamanho/idade pretendida do jogador para a qual
        o conjunto de equipamento de catcher serve (por exemplo, Tee Ball, Youth,
        Intermediate, Adult).
    player_size_range:
      name: Jogador faixa de tamanho
      description: Especifica a faixa de tamanho pretendida do usuário para a tira/suporte
        (por exemplo, criança, adulto, universal).
    playing_environment:
      name: Ambiente de jogo
      description: Especifica a principal superfície ou contexto de jogo para o qual
        a bola de hóquei foi projetada.
    playing_method:
      name: Método de tocar
      description: Forma principal como o instrumento deve ser tocado/acionado.
    playing_surface_material:
      name: Percussão, material da superfície
      description: Identifica o material da superfície frontal de toque do cajón (tapa),
        que influencia muito o timbre e a sensação ao tocar.
    playing_surface_type:
      name: Superfície de toque tipo
      description: Descreve a construção/sensação da superfície de toque do pad de
        prática.
    playset_activities_included:
      name: Playset atividades incluídas
      description: Identifica as principais atividades/componentes de brincadeira
        incorporados ao conjunto de balanço/playset para ajudar os compradores a filtrar
        pelo que as crianças podem fazer na estrutura.
    playset_installation_type:
      name: Playground, tipo de instalação
      description: Especifica como o conjunto de balanço/playset é instalado ou fixado.
    playset_items_included:
      name: Playground, itens incluídos
      description: Identifica os tipos de itens de faz de conta incluídos no playset
        de piquenique (comidinhas, utensílios de mesa, toalha, cesta etc.).
    pliers_jaw_style:
      name: Alicate estilo da mandíbula
      description: Descreve a configuração principal da mandíbula ou o estilo funcional
        do alicate.
    plum_variety:
      name: Ameixa variedade
      description: Identifica a cultivar ou variedade específica de ameixa, permitindo
        que os compradores escolham com base em sabor, cor e uso culinário pretendido.
    plumcot_variety:
      name: Plumcot, variedade
      description: Identifica a cultivar ou variedade comercial específica do plumcot
        (por exemplo, Flavor King, Dapple Dandy), que pode influenciar sabor, cor
        e sazonalidade.
    plunger_mute_handle_type:
      name: Surdina plunger tipo de alça
      description: Especifica o tipo de alça ou empunhadura usado para segurar e manipular
        uma surdina plunger para efeitos wa-wa.
    pocket_closure_type:
      name: Bolso tipo de fechamento
      description: Define como cada bolso é fechado, ajudando os usuários a encontrar
        calças com armazenamento seguro durante a atividade.
    pocket_knife_opening_mechanism:
      name: Canivete mecanismo de abertura
      description: Como a lâmina é acionada/aberta (entalhe para unha manual, pino
        de polegar, flipper, assistido, automático etc.).
    pocket_style:
      name: Bolso estilo
      description: Especifica a principal construção do bolso presente nas calças.
    pocket_type:
      name: Bolso, tipo
      description: Identifica o estilo ou a presença de bolsos na peça de roupa.
    pod_retention_system:
      name: Sistema de retenção de pods
      description: Descreve como os pods de paintball são mantidos no lugar e liberados
        do harness ou pack.
    pogo_stick_footrest_type:
      name: Pula-pula tipo de apoio para os pés
      description: Descreve o design da plataforma/pino para os pés usado para ficar
        em pé no pula-pula.
    pogo_stick_suspension_type:
      name: Pula-pula tipo de suspensão
      description: Especifica o mecanismo de rebote do pula-pula, que afeta a sensação
        de uso, a durabilidade e a manutenção.
    poi_handle_type:
      name: Poi, tipo de empunhadura
      description: Especifica o tipo de alça/empunhadura/acessório usado para segurar
        o poi.
    poi_light_source:
      name: Poi fonte de luz
      description: Para poi iluminado, especifica a tecnologia de iluminação.
    poi_tether_type:
      name: Poi tipo de cordão
      description: Indica o tipo de cordão que conecta a cabeça do poi à alça, ao
        knob ou à alça de pulso (por exemplo, cordão, corda, corrente).
    poi_type:
      name: Poi tipo
      description: Especifica o principal tipo de construção/uso do poi (por exemplo,
        treino, LED, fogo).
    point_type:
      name: Ponta tipo
      description: Formato/estilo da ponta usada na agulha de bordado.
    pointe_shoe_shank_length:
      name: Sapatilha de ponta, comprimento da alma
      description: Parte do comprimento da sapatilha que a alma sustenta, como comprimento
        total ou 3/4.
    pointe_shoe_shank_strength:
      name: Sapatilha de ponta rigidez da alma
      description: Nível de rigidez da alma da sapatilha de ponta, afetando o suporte
        e o tempo de amaciamento.
    poker_accessory_storage_included:
      name: Acessório de pôquer armazenamento incluído
      description: Indica para quais itens adicionais de pôquer o acessório oferece
        armazenamento dedicado.
    poker_chip_tray_rack_configuration:
      name: Bandeja/suporte para fichas de pôquer configuração
      description: Descreve o estilo de organização interna de uma bandeja/suporte
        para fichas (fileiras e capacidade por fileira).
    pole_anchoring_method:
      name: Poste, método de ancoragem
      description: Define como a haste é fixada ao solo ou à superfície de jogo.
    pole_basket_type:
      name: Bastão, tipo de roseta
      description: Classifica o estilo ou tamanho da cesta instalada perto da ponta
        do bastão de esqui, indicando as condições de neve pretendidas.
    pole_connection_system:
      name: Haste sistema de conexão
      description: Identifica o mecanismo que une as seções da haste, como sistemas
        com cordão elástico, rosqueados ou por cubo, ajudando os usuários a avaliar
        a rapidez de montagem e a compatibilidade.
    pole_system_type:
      name: Vareta, tipo de sistema
      description: Descreve o sistema de suporte estrutural ou o estilo de montagem
        usado pela barraca (por exemplo, varetas de alumínio, tubos de ar infláveis,
        montagem com bastão de trekking).
    police_equipment_fitment:
      name: Equipamento policial preparação
      description: Especifica quais equipamentos de aplicação da lei o veículo está
        configurado ou pré-cabeado para suportar.
    police_vehicle_equipment_package:
      name: Veículo policial pacote de equipamentos
      description: Indica a preparação/equipamento específico para polícia incluído
        com o veículo conforme vendido.
    police_vehicle_light_siren_equipment:
      name: Veículo policial equipamento de luz/sirene
      description: Especifica quais dispositivos de alerta de emergência estão instalados
        no carro de polícia.
    police_vehicle_upfit_level:
      name: Veículo policial nível de adaptação
      description: Descreve qual equipamento/adaptação específica para polícia está
        instalado na caminhonete.
    polish_formulation:
      name: Polidor formulação
      description: Indica a base/formulação química do polidor para escala do instrumento
        (não o método de aplicação).
    polish_purpose:
      name: Polidor finalidade
      description: Principal resultado pretendido do polidor na superfície do instrumento.
    pollen_level:
      name: Pólen nível
      description: Indica a quantidade/probabilidade de manchas de pólen da variedade
        de lírio.
    polymer_clay_firmness_level:
      name: Argila polimérica nível de firmeza
      description: Firmeza/macieza relativa da argila polimérica antes do cozimento
        (trabalhabilidade).
    polymer_clay_translucency:
      name: Argila polimérica translucidez
      description: Opacidade/transparência visual da argila polimérica após a cura.
    pom_pom_handle_style:
      name: Pompom, tipo de empunhadura
      description: Descreve o estilo ou a construção da alça/empunhadura usada para
        segurar o pompom.
    pom_pom_trim_backing_tape_material:
      name: Galão de pompons material da base/fita
      description: Identifica o material da fita costurada ou trança à qual os pompons
        são fixados (a base do galão).
    pom_pom_type:
      name: Pompom tipo
      description: Indica a presença e o tipo específico de pompom ou bolinha no gorro.
    pomegranate_product_form:
      name: Romã forma do produto
      description: Descreve a forma física oferecida (fruta inteira, arilos descascados,
        sementes, arilos congelados).
    pomegranate_variety:
      name: Romã variedade
      description: Identifica a cultivar ou variedade específica da romã (por exemplo,
        Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Prendedor de rabo de cavalo estilo
      description: Descreve a construção específica ou o formato do prendedor de rabo
        de cavalo para que os compradores possam escolher o estilo de sua preferência.
    popcorn_form:
      name: Pipoca forma
      description: Indica a forma física ou de preparo do produto de pipoca, como
        pronta para consumo, grãos, pacote para micro-ondas, kit de temperos ou lata
        para presente.
    pork_rind_form:
      name: Torresmo forma
      description: Categoriza a forma física ou o estilo dos snacks de torresmo (por
        exemplo, pele, pururuca, puff, pellet etc.).
    portability_features:
      name: Portabilidade, recursos
      description: Lista elementos integrados que ajudam a mover, carregar ou armazenar
        a espreguiçadeira.
    portability_frame_type:
      name: Portabilidade/tipo de estrutura
      description: Indica se os sinos orquestrais são portáteis/com estrutura de campo
        ou fixos/com estrutura de concerto.
    portable_electronic_game_features:
      name: Jogo eletrônico portátil recursos
      description: Principais recursos de jogabilidade/hardware compatíveis com o
        dispositivo.
    post_surgery_stage_suitability:
      name: Pós-cirurgia estágio adequado
      description: Indica para qual estágio de recuperação (se houver) o body modelador
        foi desenvolvido, importante para compradores de shapewear médico.
    postage_stamp_format:
      name: Selo postal formato
      description: Como o selo definitivo é oferecido/embalado (avulso, par, tira,
        bloco, folha, painel de livreto, rolo etc.).
    postmark_type:
      name: Carimbo postal tipo
      description: Tipo de cancelamento/carimbo postal presente em selos definitivos
        usados.
    potato_cut_style:
      name: Batata tipo de corte
      description: Indica o corte físico ou estilo de preparo das batatas quando não
        são vendidas inteiras.
    potato_intended_use:
      name: Batata uso pretendido
      description: Diferencia batatas destinadas ao consumo imediato daquelas destinadas
        ao plantio ou a produtos processados congelados.
    potato_variety:
      name: Batata variedade
      description: Especifica a cultivar/variedade das batatas, permitindo que os
        compradores encontrem tipos específicos como “Yukon Gold”, “Maris Piper” ou
        “Purple Majesty”.
    pottery_clay_firing_required:
      name: Argila cerâmica queima necessária
      description: Indica se o material exige queima em forno cerâmico para atingir
        a dureza/acabamento final pretendido.
    pottery_slip_application_method:
      name: Barbotina cerâmica método de aplicação
      description: Especifica a técnica de aplicação pretendida para a barbotina.
    pottery_slip_compatible_clay_body:
      name: Barbotina cerâmica massa cerâmica compatível
      description: Indica o(s) tipo(s) de massa cerâmica com que a barbotina foi desenvolvida
        para combinar ou funcionar.
    pottery_slip_form:
      name: Barbotina cerâmica forma
      description: Indica se a barbotina é vendida como líquido pronto para uso ou
        como mistura seca/pó que exige mistura.
    pouch_design:
      name: Bolsa frontal design
      description: Detalha a construção ou os recursos de aprimoramento da área da
        bolsa frontal.
    pouch_style:
      name: Bolsa frontal estilo
      description: Especifica o design da área da bolsa frontal, contemplando conforto,
        suporte e preferências estéticas.
    powdered_beverage_variety:
      name: Bebida em pó, variedade
      description: Classifica o produto pelo tipo de bebida que ele prepara (por exemplo,
        limonada, isotônico, shake de proteína).
    power_rack_style:
      name: Power rack estilo
      description: Especifica o design/configuração geral do rack, ajudando os compradores
        a distinguir entre gaiolas completas, half racks e variantes compactas.
    power_steering_fluid_formulation:
      name: Fluido da direção hidráulica formulação
      description: A família geral de formulação do fluido (à base de ATF vs. hidráulico/CHF
        dedicado vs. universal), usada para filtragem de compatibilidade em alto nível.
    practice_mute_audio_output:
      name: Surdina de estudo saída de áudio
      description: Especifica o tipo de conexão de saída de áudio disponível na surdina
        de estudo para monitoramento e/ou gravação (comum em surdinas de estudo silenciosas/eletrônicas).
    practice_mute_intonation_impact:
      name: Surdina de estudo impacto na afinação
      description: Descreve o efeito esperado na afinação/entonação ao usar a surdina
        de estudo.
    practice_mute_venting_valve_type:
      name: Surdina de estudo tipo de ventilação/válvula
      description: Especifica se e como a surdina de estudo é ventilada ou inclui
        uma válvula ajustável para alterar a resistência/volume.
    practice_pad_features:
      name: Pad de treino, recursos
      description: Destaca recursos funcionais do pad de estudo além do tamanho/material.
    practice_pad_mounting_style:
      name: Pad de estudo estilo de montagem
      description: Indica como o pad de estudo deve ser posicionado ou fixado durante
        o uso.
    practice_pad_rebound_level:
      name: Pad de estudo nível de rebote
      description: Indica o rebote/resposta relativa do pad de estudo em comparação
        com peles de tambor típicas.
    practice_pad_surface_configuration:
      name: Pad de estudo configuração da superfície
      description: Descreve se o pad tem uma ou várias superfícies de toque e se elas
        diferem na sensação.
    pregnancy_stage_suitability:
      name: Gravidez estágio adequado
      description: Indica para qual(is) estágio(s) da gravidez ou pós-parto a peça
        de roupa foi desenvolvida.
    preparation_state:
      name: Estado de preparo
      description: Indica o nível de preparo ou cozimento necessário antes do consumo.
    preparation_style:
      name: Preparo, estilo
      description: Define o corte ou estado de processamento das castanhas-d'água
        quando vendidas (por exemplo, inteiras, fatiadas, assadas, congeladas).
    preservation_medium:
      name: Meio de conservação
      description: Especifica o principal líquido ou meio em que as azeitonas ou alcaparras
        são conservadas (por exemplo, salmoura, azeite de oliva, vinagre).
    presser_foot_attachment_method:
      name: Calcador método de fixação
      description: Indica como o calcador da máquina de costura se fixa ao suporte/haste
        do calcador (por exemplo, encaixe de pressão vs. parafusado), o que afeta
        a compatibilidade.
    pressure_gauge_type:
      name: Medidor de pressão tipo
      description: Indica o tipo de medidor de pressão incluído com a bomba de bicicleta,
        se houver.
    pressure_measurement_unit:
      name: Unidade de medição de pressão
      description: Indica a unidade usada para a leitura ou calibração do sensor de
        pressão, útil para comparar produtos e garantir compatibilidade com o medidor/ECU.
    pressure_plate_balance_type:
      name: Platô tipo de balanceamento
      description: Indica se o platô é balanceado internamente ou requer/pressupõe
        balanceamento externo compatível com a configuração do motor/volante do motor.
    pressure_plate_components_included:
      name: Platô componentes incluídos
      description: O que está incluído no anúncio do platô.
    pressure_sensor_application:
      name: Sensor de pressão aplicação
      description: Identifica o sistema do veículo/ponto de medição para o qual o
        sensor de pressão foi desenvolvido.
    pressure_sensor_port_thread_standard:
      name: Sensor de pressão padrão de porta/rosca
      description: Especifica o padrão mecânico de porta/rosca usado para instalar
        o sensor no sistema do veículo.
    pressurization_method:
      name: Método de pressurização
      description: Identifica como a pressão é gerada ou mantida dentro do dispositivo.
    pretend_housekeeping_set_items_included:
      name: Conjunto de limpeza doméstica de faz de conta itens incluídos
      description: Lista quais acessórios de limpeza doméstica estão incluídos no
        conjunto (por exemplo, esfregão, vassoura, pá de lixo, borrifador).
    pretend_play_electronic_features:
      name: Brinquedo de faz de conta recursos eletrônicos
      description: Recursos eletrônicos/interativos incluídos no produto de faz de
        conta.
    pretend_play_set_pieces_included:
      name: Conjunto de faz de conta peças incluídas
      description: Principais acessórios/componentes incluídos no conjunto de faz
        de conta (por exemplo, caixa registradora, comida de brinquedo, ferramentas).
    pretend_play_set_theme:
      name: Conjunto de faz de conta tema
      description: Principal cenário/tema de faz de conta representado pelo produto
        (útil para descoberta transversal em todas as subcategorias de Faz de conta).
    pretzel_coating:
      name: Pretzel cobertura
      description: Identifica qualquer tempero ou cobertura externa aplicada ao pretzel,
        abrangendo opções salgadas (salgado, temperado) e doces (chocolate, iogurte,
        caramelo).
    pretzel_shape:
      name: Pretzel formato
      description: Especifica a forma física do pretzel (por exemplo, torcido, palito,
        mordida), um diferencial importante que os clientes usam ao pesquisar ou filtrar.
    primary_component_material:
      name: Material principal do componente
      description: Material principal do bloco do motor.
    primary_dish_application:
      name: Aplicação principal do prato
      description: Identifica o prato ou preparo principal ao qual a massa se destina.
    primary_plant_base:
      name: Base vegetal principal
      description: Indica o(s) principal(is) ingrediente(s) não lácteo(s) usado(s)
        para criar a alternativa ao queijo.
    primary_plant_protein_source:
      name: Fonte principal de proteína vegetal
      description: Identifica o principal ingrediente vegetal que fornece proteína
        ao produto.
    primary_sweetener_source:
      name: Fonte principal de adoçante
      description: Identifica a planta ou matéria-prima da qual o xarope é derivado.
    print_placement:
      name: Impressão, posicionamento
      description: Indica onde o gráfico/logo principal é posicionado na camiseta.
    print_technique:
      name: Técnica de estampa
      description: Especifica o método de decoração/impressão usado no gráfico da
        camiseta.
    printable_canvas_intended_use:
      name: Tela imprimível uso pretendido
      description: Principal aplicação para a qual a tela imprimível é otimizada.
    printable_fabric_format:
      name: Tecido imprimível formato
      description: Especifica como o algodão imprimível é fornecido (folhas avulsas
        vs. rolo contínuo), o que afeta a alimentação da impressora e o fluxo de trabalho
        do projeto.
    prism_material:
      name: Prisma material
      description: Especifica o material do próprio elemento óptico (o prisma), o
        que afeta a nitidez, a durabilidade e a resistência a arranhões.
    prisoner_transport_configuration:
      name: Transporte de presos configuração
      description: Especifica se e como a van é configurada para transporte de detidos/presos.
    prisoner_transport_partition_type:
      name: Transporte de presos tipo de divisória
      description: Tipo de divisória/gaiola interna que separa os compartimentos dianteiro
        e traseiro.
    privacy_or_acoustic_feature:
      name: Privacidade ou acústica recurso
      description: Especifica elementos integrados de privacidade ou acústica, como
        painéis divisórios, biombos acústicos ou estruturas totalmente fechadas.
    processing_state:
      name: Processamento, estado
      description: Se as penas são esterilizadas/lavadas ou preparadas de outra forma
        para uso em artesanato.
    produce_grade:
      name: Hortifrúti classificação
      description: Classifica o grau de qualidade atribuído ao kiwi com base no tamanho,
        na aparência e na condição.
    produce_growth_stage:
      name: Hortifrúti estágio de crescimento
      description: Especifica o estágio de crescimento em que o hortifrúti é vendido
        (por exemplo, microgreen, folha baby, folha madura, planta viva, semente).
    produce_washing_state:
      name: Hortifrúti estado de lavagem
      description: Indica se as folhas verdes foram lavadas e estão prontas para consumo.
    profile_shape:
      name: Perfil/formato
      description: Curvatura/perfil geral do prato de bateria (o quão acentuadamente
        ele sobe da borda até a cúpula).
    projectile_ammunition_type:
      name: Projétil/munição tipo
      description: Especifica o tipo de projéteis ou consumíveis usados pela arma
        de brinquedo, se aplicável.
    projectile_finish:
      name: Projétil acabamento
      description: Especifica qualquer revestimento de superfície aplicado à BB, ajudando
        na resistência à corrosão ou na visibilidade (por exemplo, revestida de cobre,
        zincada, pintada).
    projectile_type:
      name: Projétil tipo
      description: Identifica o tipo de projétil que o produto usa ou para o qual
        é destinado.
    pronation_support:
      name: Pronação suporte
      description: Indica o tipo de pisada ou padrão de pronação que o tênis foi desenvolvido
        para acomodar.
    propellant_type:
      name: Propelente tipo
      description: Especifica o propelente que a peça ou acessório foi desenvolvido
        para usar.
    propeller_blade_cup:
      name: Hélice pá cup
      description: Indica a quantidade de cup (curvatura da borda de fuga) nas pás.
    propeller_hub_type:
      name: Hélice cubo tipo
      description: Especifica o sistema de cubo/bucha usado pela hélice (kits de cubo
        substituíveis vs. prensado).
    propeller_rotation:
      name: Hélice rotação
      description: Especifica a direção de rotação de uma hélice.
    protectant_formula_base:
      name: Protetor base da fórmula
      description: Especifica a formulação base do protetor, que afeta o brilho, a
        sensação ao toque e a limpeza (por exemplo, à base de água vs. à base de solvente).
    protection_coverage_area:
      name: Proteção área de cobertura
      description: Identifica quais partes do relógio o acessório de proteção cobre.
    protection_level:
      name: Proteção nível
      description: Indica o nível de proteção pretendido do estojo para transportar
        e armazenar o instrumento.
    protective_case_interior_protection_type:
      name: Estojo de proteção tipo de proteção interna
      description: Descreve o principal método de proteção interna usado para prender
        e amortecer o conteúdo.
    protective_case_shell_type:
      name: Estojo de proteção tipo de estrutura externa
      description: Identifica o estilo geral de construção do exterior do estojo (rigidez),
        que afeta a proteção contra esmagamento e a portabilidade.
    protective_contact_padding_material:
      name: Acolchoamento de contato protetor material
      description: Material usado nos pontos de contato com o instrumento (apoio/encaixe
        da campana) para evitar arranhões (por exemplo, feltro, borracha).
    protective_cup_configuration:
      name: Coquilha de proteção configuração
      description: Especifica se uma coquilha de proteção está incluída, é removível
        ou se a peça de roupa apresenta apenas um bolso para acomodar uma coquilha.
    protective_eyewear_standard_compliance:
      name: Óculos de proteção conformidade com norma
      description: Especifica as normas ou certificações de segurança ou resistência
        a impactos que os óculos atendem ou excedem para uso esportivo.
    protective_gear_certification_standard:
      name: Equipamento de proteção norma de certificação
      description: 'Indica a norma de segurança/certificação que o equipamento atende
        (varia por tipo de item: normas para capacetes, normas para trajes, normas
        para armaduras de impacto).'
    protective_gear_items_included:
      name: Equipamento de proteção itens incluídos
      description: Lista as peças individuais contidas em um conjunto de equipamento
        de proteção com várias peças.
    protective_gear_padding_type:
      name: Equipamento de proteção tipo de acolchoamento
      description: Especifica o tipo de acolchoamento usado no equipamento de proteção
        contra impactos.
    protective_gear_safety_certifications:
      name: Equipamento de proteção certificações de segurança
      description: Lista normas reconhecidas de segurança ou desempenho específicas
        para esportes atendidas pelo produto, como NOCSAE ou normas ASTM para capacetes
        de hóquei em campo.
    protective_pad_components_included:
      name: Almofada de proteção componentes incluídos
      description: Especifica quais itens de proteção específicos estão incluídos
        em um conjunto com várias peças, para que os compradores saibam exatamente
        quais partes do corpo são cobertas.
    protective_shorts_intended_use:
      name: Shorts de proteção uso pretendido
      description: Principal disciplina de pilotagem/corrida para a qual os shorts
        de proteção foram desenvolvidos.
    protective_shorts_padding_type:
      name: Short de proteção, tipo de acolchoamento
      description: Especifica a construção/formato dos elementos de proteção usados
        nos shorts.
    protective_shorts_padding_zones:
      name: Short de proteção, zonas de acolchoamento
      description: Identifica quais áreas do corpo têm acolchoamento/armadura integrados
        nos shorts de proteção.
    protective_treatment:
      name: Tratamento protetor
      description: Especifica qualquer acabamento ou tratamento protetor aplicado
        para resistência a manchas, água ou UV (por exemplo, Teflon).
    protector_coverage_area:
      name: Protetor, área de cobertura
      description: Especifica quais áreas do torso o protetor foi desenvolvido para
        cobrir (por exemplo, peito, costas, laterais).
    puck_bottom_style:
      name: Disco estilo da base
      description: Descreve o perfil inferior do disco, que influencia a velocidade
        e o controle em diferentes superfícies de shuffleboard.
    puck_type:
      name: Disco tipo
      description: Classifica o estilo funcional ou o uso pretendido do disco de hóquei,
        desde jogo oficial até souvenirs colecionáveis.
    pull_buoy_style:
      name: Pull buoy estilo
      description: Indica o estilo funcional ou configuração do pull buoy, como padrão,
        de tornozelo ou combo pullkick.
    pull_through_weight_material:
      name: Peso passa-pano material
      description: Para passa-panos do tipo pull-through, identifica o material do
        peso usado para guiar o pano pelo instrumento.
    pulp_content:
      name: Polpa, conteúdo
      description: Indica a quantidade de polpa de fruta ou vegetal presente na bebida.
    pump_accessories_included:
      name: Bomba, acessórios incluídos
      description: Lista itens adicionais fornecidos com a bomba de bola para que
        os compradores entendam o conteúdo do kit.
    pumping_compatibility:
      name: Extração de leite compatibilidade
      description: Indica se o sutiã de amamentação foi desenvolvido para extração
        de leite hands-free, além da amamentação.
    punch_pad_type:
      name: Pad de soco tipo
      description: Especifica o design ou estilo de um pad de soco/treino para que
        os compradores possam escolher o pad correto para suas necessidades de treino.
    punching_training_bag_shape:
      name: Saco de pancada/treino formato
      description: Especifica o estilo geométrico do saco pesado, ajudando os compradores
        a escolher modelos adequados para exercícios de golpe específicos (por exemplo,
        uppercuts, golpes no corpo).
    puncture_protection_technology:
      name: Tecnologia de proteção contra furos
      description: Lista camadas antifuro proprietárias ou genéricas, ou tecnologias
        de reforço da lateral/carcaça incorporadas ao pneu (por exemplo, EXO, SnakeSkin,
        cinta de Kevlar).
    puppet_features:
      name: Fantoche características
      description: Destaca características funcionais ou de desempenho do fantoche
        (por exemplo, boca móvel, efeitos sonoros, reversível).
    puppet_puppet_theater_accessory_type:
      name: Marionetes e teatro de marionetes, tipo de acessório
      description: Especifica que tipo de acessório o produto é (por exemplo, adereço
        de palco, fantasia de fantoche, barra de controle, corda de reposição).
    purity_unit:
      name: Pureza unidade
      description: Como a pureza é expressa para a moeda (teor de pureza vs. quilates).
    push_up_bar_design:
      name: Barra de flexão design
      description: Indica o estilo de design funcional das barras de flexão (por exemplo,
        fixas, giratórias, paralelas).
    pushrod_end_type:
      name: Haste de acionamento tipo de extremidade
      description: Especifica o estilo da extremidade/fixação da haste de acionamento
        usada na interface do pedal ou cilindro mestre.
    putty_glow_activation_method:
      name: Massa brilho método de ativação
      description: Como a massa é carregada/ativada para brilhar (por exemplo, luz
        solar, UV/luz negra).
    putty_glow_color:
      name: Massa cor do brilho
      description: Identifica a cor que a massa emite ao brilhar no escuro.
    putty_inclusions:
      name: Massa inclusões
      description: Misturas notáveis incluídas dentro da massa (por exemplo, glitter,
        confete, bolinhas de espuma).
    putty_texture:
      name: Massa textura
      description: Comportamento principal de manuseio da massa (por exemplo, saltitante,
        elástica, semelhante a líquido).
    puzzle_accessory_features:
      name: Quebra-cabeça, características de acessórios
      description: Recursos funcionais e elementos de design de acessórios para quebra-cabeça
        (varia por tipo de acessório).
    pyrometric_cone_range:
      name: Cone pirométrico faixa
      description: O(s) cone(s) pirométrico(s) recomendado(s) para o(s) qual(is) o
        esmalte foi formulado para queima (por exemplo, Cone 06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Painel lateral traseiro tipo de cobertura
      description: Especifica quanto da área do painel lateral traseiro o produto
        substitui/repara.
    quarter_panel_set_contents:
      name: Painel lateral traseiro conteúdo do conjunto
      description: Especifica a configuração do kit de painel lateral traseiro incluída
        no anúncio (lado único, par ou com seções adicionais de reparo).
    quilting_ruler_markings:
      name: Régua para quilting marcações
      description: Especifica os tipos de marcações impressas na régua para quilting
        usadas para corte/alinhamento.
    quilting_ruler_non_slip_feature:
      name: Régua para quilting recurso antiderrapante
      description: Indica se a régua inclui uma base/superfície antiderrapante ou
        tratamento para reduzir o deslocamento no tecido.
    quilting_ruler_transparency:
      name: Régua para quilting transparência
      description: Indica a transparência/visibilidade do material da régua para ver
        o tecido e as marcações por baixo.
    quilting_thread_usage:
      name: Linha para quilting uso
      description: Indica a aplicação pretendida de quilting para a linha (como deve
        ser usada).
    quilting_thread_weight_system:
      name: Linha para quilting sistema de peso
      description: Especifica o sistema de classificação de tamanho/peso da linha
        usado para expressar a espessura da linha (por exemplo, wt, Tex, Denier),
        para que o tamanho numérico possa ser interpretado corretamente.
    quince_variety:
      name: Marmelo, variedade
      description: Identifica a cultivar ou variedade específica de marmelo, já que
        o sabor, o aroma e a adequação culinária podem diferir conforme a variedade.
    quinoa_variety:
      name: Quinoa variedade
      description: Identifica a cor ou variedade específica da quinoa, já que diferentes
        variedades têm sabores, texturas e tempos de cozimento distintos.
    quinto_tuning_system:
      name: Quinto, sistema de afinação
      description: Como o quinto é afinado/tensionado.
    race_car_class:
      name: Carro de corrida classe
      description: Classe/categoria de competição para a qual o carro foi construído
        (agrupamento por regulamento/homologação).
    racing_balaclava_face_opening_style:
      name: Balaclava de corrida estilo de abertura facial
      description: A configuração da abertura facial da balaclava, que afeta o ajuste
        do capacete, a vedação e o conforto.
    racing_balaclava_neck_coverage_length:
      name: Balaclava de corrida comprimento de cobertura do pescoço
      description: O comprimento de cobertura da saia/capa do pescoço, projetado para
        ficar por dentro do macacão/suporte de pescoço para vedação e proteção.
    racing_balaclava_ventilation_zones:
      name: Balaclava de corrida zonas de ventilação
      description: Posicionamento das zonas respiráveis/de tela ou ventiladas designadas
        para melhorar o fluxo de ar sob o capacete.
    racing_chest_guard_intended_use:
      name: Protetor peitoral de corrida uso pretendido
      description: Principal disciplina ou contexto do automobilismo para o qual o
        protetor peitoral foi desenvolvido.
    racing_chest_guard_size_type:
      name: Protetor peitoral de corrida tipo de tamanho
      description: Indica se o produto tem tamanho para jovens, adultos ou se é universal/ajustável.
    racing_glove_certification_standard:
      name: Luva de competição, norma de homologação
      description: Especifica a certificação/norma de segurança que as luvas de corrida
        cumprem (por exemplo, FIA, SFI, CE) e, opcionalmente, a classificação/nível
        quando aplicável.
    racing_goggles_lens_system:
      name: Óculos de corrida sistema de lente
      description: Especifica o sistema de troca de lente/preparação para tear-off
        compatível com os óculos.
    racing_helmet_certification_standard:
      name: Capacete de competição, norma de homologação
      description: A(s) certificação(ões) de segurança que o capacete de corrida atende.
    racing_kart_brake_type:
      name: Kart de corrida tipo de freio
      description: Principal tipo de sistema de freio instalado no kart.
    racing_kart_class:
      name: Kart de corrida classe
      description: Classe de competição ou regulamento que o kart foi construído para
        cumprir.
    racing_kart_frame_material:
      name: Kart de corrida material do quadro
      description: Material principal do quadro/chassi do kart.
    racing_kart_seat_size:
      name: Kart de corrida tamanho do banco
      description: Designação de tamanho do banco do kart usada para ajuste.
    racing_neck_support_style:
      name: Suporte de pescoço de corrida estilo
      description: Estilo estrutural do suporte/colar de pescoço de corrida e como
        ele interage com o torso/capacete do piloto.
    racing_suit_certification_standard:
      name: Macacão de competição, norma de homologação
      description: Especifica a certificação/homologação de segurança de corrida que
        o macacão atende (por exemplo, normas FIA ou SFI).
    racing_suit_cuff_design:
      name: Macacão de corrida design do punho
      description: Tipo de punho de tornozelo/pulso usado para interagir com luvas/botas
        e melhorar a vedação/conforto.
    racing_suit_size_system:
      name: Macacão de competição, sistema de tamanhos
      description: Sistema de tamanhos usado para o macacão (por exemplo, alfa P-XXG,
        numérico EU/US, juvenil).
    racing_truck_discipline:
      name: Caminhão de corrida disciplina
      description: Especifica a principal disciplina/formato de corrida em que o caminhão
        foi construído para competir.
    rack_side_configuration:
      name: Suporte, configuração lateral
      description: Indica se o rack armazena colchonetes em um lado ou em ambos os
        lados, afetando a eficiência de espaço e o acesso.
    rack_system_configuration:
      name: Sistema de rack configuração
      description: Descreve o layout/formato geral do rack do sistema de rack para
        bateria.
    racket_dampener_type:
      name: Amortecedor de raquete tipo
      description: Especifica o mecanismo de instalação ou estilo funcional do amortecedor
        de vibração da raquete.
    racket_grip_size:
      name: Raquete tamanho da empunhadura
      description: Especifica a classificação de tamanho baseada na circunferência
        do cabo da raquete (por exemplo, G1–G6) para garantir ajuste adequado à mão
        e conforto.
    racket_sport_shoe_court_surface:
      name: Tênis para esporte de raquete superfície da quadra
      description: Especifica a superfície da quadra de tênis para a qual o tênis
        foi desenvolvido ou otimizado, ajudando os jogadores a selecionar calçados
        com o padrão de solado e o composto de borracha adequados para sua superfície
        de jogo típica.
    racket_string_pattern:
      name: Raquete, padrão do encordoamento
      description: Especifica o número de cordas principais e cruzadas no encordoamento
        (por exemplo, 16 × 18), o que influencia controle, spin e durabilidade.
    racket_stringing_status:
      name: Raquete status de encordoamento
      description: Indica se a raquete é vendida encordoada, sem cordas ou pré-encordoada.
    racket_weight_class:
      name: Raquete classe de peso
      description: Fornece as categorias padrão de peso “U” do badminton, permitindo
        que os jogadores selecionem raquetes dentro de sua faixa de massa preferida.
    racquet_toy_set_equipment_included:
      name: Conjunto de brinquedo de raquete equipamento incluído
      description: Lista quais itens estão incluídos no brinquedo ou conjunto (por
        exemplo, rede, bolas, pás/raquetes).
    racquetball_squash_training_aid_type:
      name: Raquetebol e squash, tipo de auxílio de treinamento
      description: Classifica o tipo específico de acessório ou auxílio de treino
        para que os compradores possam localizar rapidamente o item de que precisam.
    radiator_cap_gasket_material:
      name: Radiador, material da vedação da tampa
      description: Material da(s) junta(s) de vedação usadas na tampa do radiador.
    radiator_cap_pressure_relief_style:
      name: Tampa do radiador estilo de alívio de pressão
      description: Especifica o estilo de alívio de pressão/ventilação/acionamento
        da tampa do radiador, que pode afetar o manuseio, a segurança e a aplicação
        pretendida.
    radiator_expansion_tank_cap_application:
      name: Radiador/tanque de expansão aplicação da tampa
      description: Identifica se a tampa é destinada ao bocal de enchimento do radiador
        ou a um tanque de expansão/ladrão do líquido de arrefecimento.
    radiator_fan_control_type:
      name: Ventoinha do radiador tipo de controle
      description: Especifica como a ventoinha do radiador é controlada/acionada.
    radiator_fan_mounting_pattern:
      name: Ventoinha do radiador padrão de montagem
      description: Especifica o estilo/padrão de montagem usado para fixar a ventoinha
        ou o conjunto da ventoinha.
    radiator_fan_type:
      name: Ventoinha do radiador tipo
      description: Especifica o tipo/configuração funcional do conjunto da ventoinha
        do radiador.
    radiator_hose_end_type:
      name: Mangueira do radiador tipo de extremidade
      description: Especifica o principal estilo de conexão/vedação usado na(s) extremidade(s)
        da mangueira do radiador para interface com as portas do radiador/motor.
    radiator_hose_position:
      name: Mangueira do radiador posição
      description: Posição/tipo funcional da mangueira do radiador dentro do sistema
        de arrefecimento.
    radiator_hose_shape:
      name: Mangueira do radiador formato
      description: Geometria/formato geral da mangueira usado para roteamento de instalação
        e ajuste.
    radiator_overflow_tank_level_sensor_provision:
      name: Reservatório de expansão do radiador provisão para sensor de nível
      description: Indica se o reservatório inclui ou aceita um sensor de nível do
        líquido de arrefecimento.
    radiator_overflow_tank_shape:
      name: Radiador, formato do reservatório de expansão
      description: Formato geral do corpo do reservatório de expansão.
    radish_variety:
      name: Rabanete variedade
      description: Especifica a cultivar ou tipo de rabanete para que os compradores
        possam escolher características específicas de sabor, cor ou tamanho (por
        exemplo, Daikon, Watermelon, French Breakfast).
    radius_of_hollow:
      name: Raio de hollow
      description: Especifica o perfil de hollow da lâmina produzido pelo afiador,
        expresso como tamanhos discretos comuns ou plano.
    rail_coverage_configuration:
      name: Grade configuração de cobertura
      description: Indica qual(is) parte(s) do berço o conjunto de capas protege,
        esclarecendo se a compra é de um painel frontal único ou de um conjunto perimetral
        com várias peças.
    rail_mount_standard:
      name: Trilho padrão de montagem
      description: Identifica o padrão do trilho ou da interface de montagem usado
        para fixar um acessório (por exemplo, mira, lanterna) a uma arma de pressão
        BB.
    rail_side:
      name: Trilho lado
      description: Indica se o trilho de reposição é para o lado esquerdo, lado direito
        ou vendido como par.
    rail_style:
      name: Rail estilo
      description: Categoriza o design ou a configuração geral do rail (por exemplo,
        A-frame, rainbow, kinked), que determina as possibilidades de manobras e o
        espaço necessário.
    rail_system:
      name: Trilho sistema
      description: Identifica a interface de montagem de acessórios presente na arma
        (por exemplo, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Sensor de chuva, tecnologia
      description: O princípio de detecção usado para detectar água no para-brisa.
    rain_suit_configuration:
      name: Capa de chuva configuração
      description: Identifica se o produto é uma peça única, um conjunto com várias
        peças ou outra configuração.
    rainstick_construction_type:
      name: Tipo de construção do pau de chuva
      description: Descreve como o pau de chuva é construído (tubo tradicional de
        cacto/madeira vs. alternativas modernas).
    rainstick_fill_material:
      name: Material de enchimento do pau de chuva
      description: Especifica o enchimento interno usado para criar o som em cascata
        (por exemplo, sementes, contas).
    rainstick_playing_technique:
      name: Técnica de execução do pau de chuva
      description: Indica a(s) técnica(s) de execução recomendada(s) ou o estilo de
        manuseio usado para produzir o efeito desejado em um pau de chuva.
    rainstick_sound_character:
      name: Característica sonora do pau de chuva
      description: Descreve a característica sonora geral produzida pelo pau de chuva.
    raising_method:
      name: Método de criação
      description: Descreve como os animais foram criados e finalizados antes do processamento
        (por exemplo, alimentados com pasto, criados a pasto, finalizados com grãos).
    rally_competition_class:
      name: Rally competição classe
      description: Classe da entidade sancionadora ou do regulamento para a qual o
        carro de rally foi construído (quando conhecida).
    rally_surface_setup:
      name: Rally superfície configuração
      description: Superfície/terreno principal para o qual a configuração ou construção
        do carro de rally é voltada.
    ramp_surface_texture:
      name: Rampa, textura da superfície
      description: Descreve o acabamento ou o nível de aderência da superfície de
        rodagem da rampa.
    ratchet_mounting_style:
      name: Matraca, estilo de montagem
      description: Como a catraca musical é segurada ou montada durante a execução
        ou configuração.
    rattle_element_material:
      name: Rattle elemento material
      description: Material dos elementos de chocalho (por exemplo, dentes/guizos/contas)
        que criam o zumbido/chocalho característico.
    rattle_type:
      name: Rattle tipo
      description: Indica se a isca contém um rattle interno ou uma câmara sonora
        e, em caso afirmativo, o estilo de rattle usado.
    rc_airship_lifting_gas_type:
      name: RC dirigível sustentação gás tipo
      description: Indica com qual gás o envelope do dirigível/blimp deve ser preenchido
        (se aplicável).
    rc_helicopter_control_frequency:
      name: RC helicóptero controle frequência
      description: A faixa de radiofrequência usada entre o controle e o helicóptero,
        que afeta a resistência a interferências e a compatibilidade (por exemplo,
        2,4 GHz).
    rc_helicopter_stabilization_features:
      name: RC helicóptero estabilização recursos
      description: Lista recursos de assistência de estabilidade/controle que facilitam
        o voo ou adicionam capacidade.
    rc_motorcycle_controller_type:
      name: Motocicleta com controle remoto, tipo de controlador
      description: Fator de forma do controle incluído.
    rc_plane_takeoff_launch_method:
      name: RC avião decolagem/lançamento método
      description: Como o avião normalmente é lançado/decola, impactando onde e como
        ele pode ser usado.
    rc_vehicle_controller_type:
      name: RC veículo controlador tipo
      description: Especifica o fator de forma do controle usado para operar o veículo
        RC.
    rc_vehicle_scale:
      name: Veículo com controle remoto, escala
      description: Especifica a proporção de escala (classe de tamanho) do carro/caminhão
        de controle remoto (por exemplo, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: RC veículo terreno tipo
      description: Indica o terreno principal para o qual o carro/caminhão de controle
        remoto foi projetado.
    reach_adjustment_type:
      name: Alcance ajuste tipo
      description: Indica se a distância entre a lâmina da alavanca e o guidão pode
        ser ajustada e, se ajustável, se o ajuste é sem ferramentas ou exige uma ferramenta.
    rear_axle_spacing:
      name: Traseiro eixo espaçamento
      description: Tamanho do dropout/eixo que a parte traseira do quadro foi projetada
        para aceitar, afetando a compatibilidade da roda.
    rear_axle_standard:
      name: Traseiro eixo padrão
      description: Define a interface/formato do eixo usado pela roda traseira (por
        exemplo, blocagem rápida, vários tamanhos de eixo passante).
    rear_axle_type:
      name: Traseiro eixo tipo
      description: Especifica o sistema de fixação e o diâmetro do eixo usados para
        prender a roda traseira ao quadro.
    rear_coverage:
      name: Cobertura traseira
      description: Especifica quanto das nádegas a parte de baixo do biquíni cobre
        (por exemplo, cavada, cobertura total).
    rear_opening_type:
      name: Traseira abertura tipo
      description: Descreve o estilo do acesso traseiro ou do recurso de “butt flap”
        para uso conveniente no banheiro, como abertura traseira rebatível ou zíper
        traseiro completo.
    rear_seat_configuration:
      name: Traseiro assento configuração
      description: Especifica a configuração do conjunto do assento traseiro para
        auxiliar no ajuste e na seleção do layout interno.
    rear_view_mirror_ornament_attachment_type:
      name: Espelho retrovisor ornamento fixação tipo
      description: Especifica como o ornamento se prende à haste ou carcaça do espelho
        retrovisor (por exemplo, laço de cordão, clipe, gancho).
    rearview_mirror_mount_attachment_type:
      name: Retrovisor, tipo de fixação do suporte
      description: Define como o suporte se fixa fisicamente ao conjunto do espelho
        retrovisor (corpo ou haste do espelho), como braçadeira, clipe, tira, almofada
        adesiva ou suporte parafusado.
    rebound_board_face_type:
      name: Rebote prancha face tipo
      description: Descreve a configuração da superfície que determina o comportamento
        de rebote, como designs planos, angulados ou multifacetados.
    rebound_level:
      name: Rebote nível
      description: Indica o quanto a bola de parede rebate após o impacto, ajudando
        os usuários a escolher entre designs sem rebote e com rebote moderado.
    rebound_surface_configuration:
      name: Rebote superfície configuração
      description: Especifica o layout das superfícies de rebote e a previsibilidade
        dos rebotes (simples, dupla ou com vários lados; previsível vs. imprevisível).
    rebounder_design:
      name: Rebote, configuração
      description: Define o estilo estrutural ou a configuração da superfície de rebote
        do produto.
    rebounder_design_type:
      name: Rebatedor design tipo
      description: Especifica o mecanismo principal de rebote ou o estilo de construção
        do treinador (por exemplo, base com corda elástica, rede emoldurada, alvo
        pop-up).
    rebounder_sides:
      name: Rebatedor lados
      description: Indica se o rebatedor pode devolver bolas de um lado ou dos dois
        lados.
    rebounding_mechanism_type:
      name: Rebote, tipo de mecanismo
      description: Especifica a tecnologia usada para devolver o disco ou a bola (por
        exemplo, batente de borracha, corda elástica).
    recipient_relationship:
      name: Destinatário relação
      description: Relação pretendida com o destinatário (por exemplo, mãe, pai, amigo)
        para o cartão comemorativo.
    recliner_control_type:
      name: Reclinável controle tipo
      description: Especifica como o mecanismo reclinável é operado (por exemplo,
        alavanca manual, painel de botões elétricos, controle remoto).
    recliner_motion_type:
      name: Reclinação, tipo
      description: Define a principal capacidade de movimento da poltrona reclinável
        (por exemplo, balanço, deslizamento, giro, encosto rente à parede, elevação).
    reclining_mechanism:
      name: Reclinação mecanismo
      description: Especifica o mecanismo usado para operar a função reclinável do
        sofá.
    recommended_candle_format:
      name: Recomendado vela formato
      description: Indica o(s) formato(s) de vela recomendado(s) para os quais estas
        abas adesivas de pavio são destinadas.
    recommended_container_type:
      name: Recomendado recipiente tipo
      description: Materiais de recipiente recomendados/seguros para velas de cera
        em gel.
    recommended_fabric_type:
      name: Tecido, tipo recomendado
      description: Tecido(s) recomendado(s) para obter melhores resultados com o molde
        de costura.
    recommended_fabric_weight:
      name: Recomendado tecido gramatura
      description: Indica a categoria de gramatura de tecido recomendada para o molde.
    recommended_food_pairing:
      name: Recomendado alimento harmonização
      description: Identifica as principais proteínas ou pratos aos quais o molho
        se destina (por exemplo, frango, porco, carne bovina, peixe, legumes).
    recommended_lane_condition:
      name: Recomendado pista condição
      description: Indica o padrão de óleo ou a condição da pista para a qual a bola
        foi projetada.
    recommended_motor_impulse_class:
      name: Recomendado motor impulso classe
      description: Especifica a classe de impulso total recomendada do motor de foguete
        modelo para um voo seguro/ideal.
    recommended_reading_level:
      name: Leitura, nível recomendado
      description: Indica o estágio/nível de leitura recomendado para o produto, para
        ajudar os compradores a combiná-lo ao desenvolvimento de leitura atual da
        criança.
    recommended_sleep_position:
      name: Recomendado sono posição
      description: Identifica quais posições de sono o colchão foi projetado para
        apoiar com conforto (por exemplo, pessoas que dormem de lado ou de costas).
    recommended_storage:
      name: Recomendado armazenamento
      description: Indica como o produto deve ser armazenado para manter o frescor.
    recommended_surfaces:
      name: Superfícies, recomendadas
      description: Especifica as superfícies/categorias de materiais de colagem pretendidas
        para a cola, além da compatibilidade geral com artesanato (por exemplo, somente
        papel vs. multissuperfície).
    recommended_use_case:
      name: Aplicação recomendada
      description: Cenário principal de uso pretendido para o selante (temporário/emergencial
        vs. reparo de longo prazo).
    recommended_use_location:
      name: Recomendado uso localização
      description: Ambiente pretendido para a gangorra (quintal doméstico vs. playground
        comercial etc.).
    recommended_vehicle_surfaces:
      name: Recomendado veículo superfícies
      description: Especifica as superfícies/acabamentos do veículo para os quais
        a escova deve ser segura (por exemplo, pintura com verniz, pintura fosca/acetinada,
        envelopamento vinílico/PPF, vidro, rodas).
    recorder_accessories_included:
      name: Gravador, acessórios incluídos
      description: Lista os acessórios incluídos embalados com a flauta doce baixo
        grande.
    recorder_bore_design:
      name: Flauta doce furo design
      description: O design do perfil interno do furo do corpo da flauta doce.
    recorder_bore_type:
      name: Flauta doce, tipo de furo
      description: Especifica o estilo de furo da flauta doce.
    recorder_case_shell_type:
      name: Flauta doce estojo estrutura tipo
      description: Descreve a rigidez estrutural do estojo.
    recorder_finish:
      name: Flauta doce acabamento
      description: Acabamento/tratamento da superfície do corpo da flauta doce (especialmente
        relevante para flautas doces contralto de madeira).
    recorder_hole_type:
      name: Flauta doce orifício tipo
      description: Indica se os orifícios de tom são simples (sem orifícios duplos)
        ou incluem orifícios duplos para melhorar os dedilhados cromáticos.
    recorder_joint_configuration:
      name: Flauta doce junção configuração
      description: Descreve quantas seções o corpo da flauta doce tem, o que afeta
        a portabilidade, a limpeza e a substituição de peças.
    recorder_joint_style:
      name: Flauta doce junção estilo
      description: O estilo de junção/conexão entre as seções da flauta doce, se aplicável.
    recorder_keywork:
      name: Flauta doce chaves
      description: Indica se a flauta doce inclui chave(s) (mecanismos de metal/plástico)
        para notas graves, típicas em flautas doces tenor/baixo/grandes.
    recorder_mouthpiece_type:
      name: Flauta doce, tipo de bocal
      description: Descreve se a boquilha/cabeça da flauta doce é integrada (peça
        única) ou removível/intercambiável.
    recorder_pitch_standard_a4:
      name: Flauta doce afinação padrão (A4)
      description: Indica a referência de afinação para a qual a flauta doce foi construída
        (por exemplo, Lá = 440 Hz, afinação moderna vs. Lá = 415 Hz, afinação barroca).
    recorder_thumb_hole_type:
      name: Flauta doce, tipo de orifício do polegar
      description: Especifica se a flauta doce tem um único orifício para polegar
        ou design com orifício duplo para polegar.
    recreational_vehicle_holding_tank_type:
      name: Veículo recreativo reservatório de retenção tipo
      description: Indica quais reservatórios de retenção de resíduos o RV possui.
    recreational_vehicle_leveling_system:
      name: Veículo recreativo nivelamento sistema
      description: Tipo de sistema de nivelamento/estabilização instalado.
    recycled_material_content:
      name: Reciclado material conteúdo
      description: Indica a proporção da peça feita com fibras ou fios reciclados.
    reed_dent_material:
      name: Pente dente material
      description: Material dos dentes do pente (os elementos que separam os fios
        de urdidura), o que afeta a durabilidade e a abrasão do fio.
    reed_type:
      name: Palheta tipo
      description: Especifica o tipo de construção da palheta usada pelo chanter e
        pelos bordões da gaita de foles.
    reeds_included:
      name: Palhetas incluídas
      description: Especifica quais palhetas estão incluídas no conjunto de gaita
        de foles Great Highland (chanter e/ou bordão) e se são de cana ou sintéticas.
    reefing_method:
      name: Redução da vela, método
      description: Indica o mecanismo (se houver) para reduzir ou guardar a vela enquanto
        estiver na água.
    reel_profile:
      name: Carretilha perfil
      description: Classifica o estilo/perfil estrutural do corpo da carretilha de
        baitcasting.
    reel_seat_material:
      name: Porta-carretilha, material
      description: Especifica o material de construção do assento da carretilha, afetando
        peso, sensibilidade e resistência à corrosão.
    reel_seat_type:
      name: Carretilha assento tipo
      description: Especifica o estilo do mecanismo de travamento que prende a carretilha
        de fly à vara.
    reel_size_class:
      name: Molinete/carretilha, classe de tamanho
      description: Classificação de tamanho designada pelo fabricante (por exemplo,
        1000, 3000, 5000) que indica a capacidade do carretel e a construção geral
        da carretilha.
    referee_wallet_accessories_included:
      name: Árbitro carteira acessórios incluídos
      description: Lista os itens extras incluídos com uma carteira de árbitro, como
        cartões vermelho/amarelo, folhas de pontuação ou instrumentos de escrita,
        para que os compradores saibam se a carteira é vendida como um kit completo.
    refinement_level:
      name: Refinamento nível
      description: Indica o grau de refinamento pelo qual o óleo passou, afetando
        sabor, cor, nutrição e ponto de fumaça.
    reflective_finish:
      name: Refletivo acabamento
      description: Especifica o tratamento refletivo da superfície de uma bola de
        discoteca (por exemplo, pastilhas espelhadas vs. efeitos holográficos/iridescentes).
    reflective_or_glow_effect:
      name: Refletivo ou brilho efeito
      description: Indica se a bola de antena tem efeitos de visibilidade, como material
        refletivo, brilho no escuro ou elementos luminosos/de LED.
    reflective_tape_pattern:
      name: Refletivo fita padrão
      description: Descreve a configuração da fita refletiva na peça, usada para atender
        aos requisitos de visibilidade.
    regulation_standard:
      name: Regulamento padrão
      description: Especifica o padrão oficial ou as dimensões/certificação da entidade
        reguladora que a rede atende.
    regulator_diaphragm_material:
      name: Regulador diafragma material
      description: Especifica o material do diafragma, que afeta a compatibilidade
        com combustível/etanol (por exemplo, E85) e a durabilidade.
    regulator_port_thread_standard:
      name: Regulador porta rosca padrão
      description: Especifica o padrão da rosca/conexão da porta usado no corpo do
        regulador para portas de entrada/saída/retorno.
    rein_features:
      name: Rédeas, características
      description: Destaca recursos funcionais ou de segurança especiais presentes
        nas rédeas.
    rein_style:
      name: Rédea estilo
      description: Identifica o design estrutural ou a configuração das rédeas, permitindo
        que os cavaleiros escolham o tipo correto para sua modalidade e preferência
        pessoal.
    reinforced_areas:
      name: Reforçadas áreas
      description: Identifica quais partes da peça são reforçadas para durabilidade
        contra abrasão.
    reinforcement_type:
      name: Reforço tipo
      description: Reforço de construção usado na mangueira do radiador para resistência
        e resistência a temperatura/pressão.
    release_activation_method:
      name: Liberação ativação método
      description: Especifica como um disparador de arco é acionado pelo arqueiro.
    release_bearing_material:
      name: Liberação rolamento material
      description: Material principal dos componentes do rolamento/face (quando especificado
        pelo fabricante).
    release_jaw_style:
      name: Liberação garra estilo
      description: Descreve o design das garras ou do gancho da cabeça do disparador.
    release_strap_type:
      name: Liberação tira tipo
      description: Identifica a tira ou o sistema de conexão fornecido com o disparador
        de arco.
    remote_control_airship_envelope_material:
      name: Controle remoto dirigível envelope material
      description: Especifica o material principal do envelope do blimp/dirigível
        (bolsa de gás), distinto do material geral do brinquedo.
    remote_control_motorcycle_scale:
      name: Motocicleta com controle remoto, escala
      description: Escala da motocicleta RC em relação a uma motocicleta real (se
        modelada como veículo em escala).
    remote_control_motorcycle_terrain_suitability:
      name: Controle remoto motocicleta terreno adequação
      description: Terreno principal no qual a motocicleta RC foi projetada para operar.
    remote_control_motorcycle_water_resistance:
      name: Controle remoto motocicleta água resistência
      description: Nível de proteção contra água para os componentes eletrônicos da
        motocicleta RC.
    remote_control_plane_kit_completion_level:
      name: Controle remoto avião kit conclusão nível
      description: Indica o que está incluído e o quanto o conjunto é completo (por
        exemplo, pronto para voar vs. requer transmissor/receptor/bateria separados).
    remote_control_plane_landing_gear_type:
      name: Controle remoto avião trem de pouso tipo
      description: Indica a configuração do trem de pouso, afetando a durabilidade
        e as superfícies de decolagem/pouso.
    remote_control_plane_power_type:
      name: Controle remoto avião propulsão tipo
      description: Especifica como o avião é alimentado/propulsionado (elétrico vs.
        glow/gás/nitro), o que afeta a manutenção, o ruído e onde ele pode voar.
    remote_control_watercraft_features:
      name: Controle remoto embarcação recursos
      description: Destaca os principais recursos específicos de embarcações RC que
        afetam a usabilidade e a durabilidade.
    remote_control_watercraft_propulsion_drive_type:
      name: Controle remoto embarcação propulsão/acionamento tipo
      description: Especifica como a embarcação de controle remoto é acionada na água.
    remote_control_watercraft_water_environment:
      name: Controle remoto embarcação água ambiente
      description: Indica as condições de água pretendidas em que a embarcação RC
        tem melhor desempenho.
    remote_keyless_system_programming_method:
      name: Sistema remoto sem chave programação método
      description: Como o controle/sistema é programado ou pareado com o veículo (por
        exemplo, procedimento a bordo vs. ferramenta profissional).
    repair_compound_type:
      name: Reparo composto tipo
      description: Tipo/formulação do material consumível de reparo incluído (por
        exemplo, tipo de massa para carroceria, tipo de resina para para-brisa, tipo
        de cimento/selante para plugue de pneu).
    repair_kit_components:
      name: Reparo kit componentes
      description: Lista os itens específicos incluídos no kit de reparo, permitindo
        que os compradores entendam o conteúdo e comparem pacotes.
    repair_method:
      name: Reparo método
      description: Especifica a principal abordagem de reparo usada pelo kit, como
        adesivos peel-and-stick ou substituição de válvula.
    replacement_part_purpose:
      name: Peça de reposição, finalidade
      description: Indica se o item é uma peça de reposição OEM, uma peça de upgrade/performance
        ou um acessório complementar.
    replacement_part_type:
      name: Reposição peça tipo
      description: Identifica a categoria funcional da peça do aparelho elíptico,
        permitindo que os compradores filtrem pelo componente de que precisam.
    replacement_parts_availability:
      name: Reposição peças disponibilidade
      description: Indica se há suporte para peças consumíveis/substituíveis para
        o passa-fios (por exemplo, ganchos/fios de reposição).
    replica_gun_action_type:
      name: Réplica arma ação tipo
      description: Especifica o tipo de operação/ação da arma de réplica (conforme
        representada), como ação por ferrolho ou ação por alavanca.
    replica_gun_firing_mechanism:
      name: Réplica arma disparo mecanismo
      description: Indica se e como a réplica simula a função de disparo (não letal),
        como disparo com espoleta ou sem disparo.
    replica_gun_moving_parts:
      name: Réplica arma peças móveis
      description: Indica quais peças são funcionais/móveis na réplica.
    reservoir_orientation:
      name: Reservatório orientação
      description: Especifica a orientação ou o perfil pretendido do reservatório
        dentro da mochila.
    reservoir_type:
      name: Reservatório tipo
      description: Tipo de configuração do reservatório para o cilindro mestre da
        embreagem.
    resin_suitability:
      name: Resina adequação
      description: Especifica se a bola de handebol foi projetada para uso com resina
        (cola) ou se é livre de resina.
    resistance_adjustability:
      name: Resistência ajuste
      description: Especifica se a resistência respiratória pode ser alterada pelo
        usuário.
    resistance_band_design:
      name: Resistência faixa design
      description: Descreve a forma física ou o estilo de uma faixa de resistência
        (por exemplo, loop, tubo com alças, figure-8), ajudando os compradores a escolher
        o design certo para sua rotina de exercícios.
    resistance_loading_type:
      name: Resistência carregamento tipo
      description: Indica como a resistência/peso é fornecida ou carregada na máquina
        Smith (por exemplo, máquina com pesos livres ou com pesos fixos).
    response_fields_included:
      name: Campos de resposta incluídos
      description: 'Especifica quais campos/opções de resposta padrão estão presentes
        no cartão de resposta (ex.: aceitar/recusar, escolha de refeição).'
    restoration_status:
      name: Restauração status
      description: Indica se a van é original, restaurada, restomod ou em condição
        de projeto.
    rhinestone_base_color_family:
      name: Strass família de cor da base
      description: 'Identifica a família de cor da base do strass (ex.: transparente/cristal,
        dourado/amarelo, azul).'
    rhinestone_facet_style:
      name: Strass estilo de faceta
      description: 'O padrão de faces/facetas do strass que afeta o brilho e a aparência
        (ex.: Xilion rose, lapidação brilhante, facetado vs liso).'
    rhinestone_hole_reinforcement_material:
      name: Strass material de reforço dos furos
      description: 'Material ao redor/nos furos (ex.: ilhós de metal, plástico moldado)
        que influencia a durabilidade durante a costura.'
    rhinestone_setting_type:
      name: Strass tipo de engaste
      description: 'Como a pedra é montada/contornada para costura (ex.: engaste com
        garras, engaste bezel, engaste com borda).'
    rhubarb_product_cut_type:
      name: Ruibarbo produto tipo de corte
      description: Descreve o preparo físico ou corte do produto de ruibarbo.
    ribbon_construction:
      name: Fita construção
      description: 'Descreve os principais recursos de construção da fita de gorgorão,
        como ter arame ou elástico, o que altera seu uso (ex.: laços vs costura).'
    ribbon_packaging_type:
      name: Fita tipo de embalagem
      description: Indica como a fita é fornecida/vendida.
    ribbon_pattern_style:
      name: Fita estilo de padrão
      description: Classifica o método de aplicação do padrão comumente usado em fita
        de gorgorão.
    ribbon_sheen_level:
      name: Fita nível de brilho
      description: Indica o brilho/gloss visual da superfície da fita de cetim.
    ribbon_style:
      name: Fita estilo
      description: 'Especifica o padrão/estilo visual da fita (ex.: lisa, listrada,
        tricolor).'
    ribbon_trim_backing_type:
      name: Fita/aviamento tipo de base
      description: Indica se a fita/aviamento tem uma base e de que tipo (para facilitar
        a aplicação).
    ribbon_trim_edge_finish:
      name: Fita/aviamento acabamento da borda
      description: Descreve a construção/acabamento da borda da fita/aviamento (útil
        para comportamento de desfiamento e uso pretendido).
    ric_rac_wave_size:
      name: Sianinha tamanho da onda
      description: Descreve a amplitude/escala da onda da sianinha (quão grandes são
        os zigue-zagues/ondas).
    rice_grain_length:
      name: Arroz comprimento do grão
      description: Classifica produtos de arroz pelo comprimento do grão, como grão
        curto, médio ou longo, o que influencia as características de cozimento e
        o uso culinário.
    rice_processing_method:
      name: Arroz, método de processamento
      description: 'Descreve como o arroz foi processado ou preparado (ex.: parboilizado,
        germinado, em flocos), impactando o tempo de cozimento, a nutrição e o uso.'
    rice_variety:
      name: Arroz, variedade
      description: Especifica a variedade ou cultivar específica de arroz, permitindo
        que os compradores escolham grãos com sabor, aroma, textura e culinária pretendida
        preferidos.
    riding_toy_features:
      name: Brinquedo de montar recursos
      description: Destaca recursos funcionais/de segurança comuns específicos de
        brinquedos de montar.
    rifle_action_type:
      name: Fuzil tipo de ação
      description: O mecanismo de operação do fuzil (como carrega/dispara/ejeta),
        importante para identificação e interesse de colecionadores.
    rifle_finish:
      name: Fuzil acabamento
      description: Acabamento/revestimento externo principal da parte metálica.
    rifle_magazine_type:
      name: Fuzil tipo de carregador
      description: Tipo de sistema de alimentação do fuzil.
    rifle_stock_material:
      name: Fuzil material da coronha
      description: 'Material principal usado na coronha/guarnições do fuzil (ex.:
        nogueira, polímero).'
    rim_clamping_method:
      name: Aro método de fixação
      description: Como a máquina prende a roda/o aro durante a montagem e desmontagem.
    rim_strip_type:
      name: Fita de aro tipo
      description: 'Classifica a fita/tira por estilo, construção ou aplicação específica
        (ex.: fita de aro sem câmara vs tira protetora de borracha).'
    rim_tubeless_compatibility:
      name: Aro compatibilidade sem câmara
      description: Indica se o aro, a fita ou a roda foi projetado para configurações
        de pneus sem câmara.
    ripeness_stage:
      name: Estágio de maturação
      description: 'Indica o nível de maturação da fruta no momento da venda (ex.:
        verde, madura, pronta para comer).'
    riser_pad_type:
      name: Calço elevador tipo
      description: 'Classifica o estilo funcional do calço (ex.: espaçador padrão,
        com absorção de impacto, calço inclinado).'
    roasted_malt_processing_type:
      name: Malte torrado tipo de processamento
      description: 'A abordagem ou variante específica de processamento usada para
        criar o malte torrado ou grão torrado (ex.: cevada torrada não maltada, malte
        preto, variantes desamargadas ou descascadas).'
    robotic_toy_interaction_mode:
      name: Brinquedo robótico modo de interação
      description: Descreve a principal forma como o robô interage ou se movimenta
        durante a brincadeira.
    robotic_toy_light_features:
      name: Brinquedo robótico, recursos de iluminação
      description: 'Indica se e como o brinquedo usa luzes como parte da brincadeira
        (ex.: LEDs, projeção).'
    robotic_toy_programming_supported:
      name: Brinquedo robótico programação compatível
      description: Especifica qual abordagem de programação, se houver, o brinquedo
        oferece.
    robotic_toy_skill_level:
      name: Brinquedo robótico nível de habilidade
      description: Indica o nível de complexidade de operação/programação esperado
        do usuário.
    robotic_toy_sound_features:
      name: Brinquedo robótico recursos sonoros
      description: Indica os recursos sonoros do brinquedo robótico.
    rod_butt_style:
      name: Vara de pesca estilo do cabo
      description: Define a configuração da extremidade do cabo da vara usada em aplicações
        de pesca de corrico.
    rod_construction_type:
      name: Vara, tipo de construção
      description: Indica o estilo geral de construção da vara em termos de partes
        e recolhibilidade.
    rod_guide_material:
      name: Vara de pesca material do passador
      description: Especifica o material usado nos passadores de linha ou inserções
        da vara de pesca, afetando a durabilidade, o peso e o atrito da linha.
    rod_guide_type:
      name: Vara de pesca tipo de passador
      description: Especifica o estilo principal dos passadores de linha instalados
        na vara.
    rod_handle_type:
      name: Vara, tipo de empunhadura
      description: Especifica a configuração da empunhadura de uma vara de pesca,
        auxiliando na escolha por conforto e técnica.
    roll_cage_tubing_material:
      name: Gaiola de proteção material dos tubos
      description: 'Especifica o material/liga dos tubos usados na gaiola de proteção/santo-antônio
        (ex.: aço DOM vs aço cromo-molibdênio 4130).'
    roller_skate_brake_shape:
      name: Patins formato do freio
      description: Descreve o formato/perfil geométrico da cabeça do freio para desempenho
        ou preferência estética.
    roller_skate_brake_type:
      name: Patins, tipo de freio
      description: Especifica o sistema de freio usado em patins.
    roller_ski_technique:
      name: Esqui sobre rodas técnica
      description: Identifica a técnica de esqui cross-country para a qual os esquis
        sobre rodas foram projetados.
    roller_technology:
      name: Rolo massageador tecnologia
      description: Indica a tecnologia integrada que melhora o desempenho da massagem,
        como vibração ou calor.
    rolling_case_wheel_configuration:
      name: Case com rodinhas configuração das rodas
      description: Especifica a configuração das rodas usada em cases com rodinhas
        para teclado musical.
    rolling_paper_format:
      name: Papel para enrolar formato
      description: 'Identifica a apresentação física do produto (ex.: folhas avulsas,
        cones pré-enrolados, wraps).'
    rolling_paper_gum_type:
      name: Papel para enrolar tipo de goma
      description: Especifica o adesivo (goma) usado na borda do papel para vedação,
        o que pode afetar o sabor e o desempenho.
    rolling_paper_size:
      name: Papel para enrolar tamanho
      description: Indica a classificação de tamanho padrão do papel para enrolar
        ou cone, permitindo que os compradores selecionem rapidamente a largura/comprimento
        correto para suas necessidades.
    rolling_stock_type:
      name: Material rodante tipo
      description: Especifica que tipo de veículo ferroviário/trem é o modelo (locomotiva
        vs carros de passageiros/carga e subtipos comuns de carros).
    roof_cargo_net_hook_fastener_style:
      name: Rede de carga para teto estilo do gancho/fecho
      description: 'Especifica o estilo das ferragens de extremidade usadas para conectar
        a rede aos pontos de ancoragem (ex.: gancho em S, mosquetão, gancho em J).'
    roof_height_class:
      name: Teto, categoria de altura
      description: Categoriza a altura do teto comumente usada para vans (especialmente
        relevante para conversões/camperizações).
    roof_type:
      name: Teto tipo
      description: Configuração do teto ou da seção superior da estrutura.
    root_variety:
      name: Raiz variedade
      description: 'Identifica a variedade ou tipo comum da raiz (ex.: raiz-forte
        versus variedades de wasabi verdadeiro).'
    rope_buoyancy:
      name: Corda, flutuabilidade
      description: Indica se a corda foi projetada para flutuar na superfície da água,
        ajudando os usuários a evitar enroscos e simplificando a recuperação.
    rope_construction:
      name: Corda, construção
      description: Especifica detalhes de construção das fibras além do estilo de
        trançado, como núcleo/capa torcidos vs trançados e se a corda tem construção
        com alma e capa.
    rope_material:
      name: Corda material
      description: Identifica o material da corda/cabo de ajuste.
    rope_strand_compatibility:
      name: Corda compatibilidade de filamentos
      description: Indica quais configurações de corda o dispositivo de asseguramento
        comporta (simples, meia/dupla, gêmea ou combinações).
    rope_stretch_type:
      name: Corda tipo de elasticidade
      description: Descreve as características de elasticidade da corda, distinguindo
        entre estilos sem elasticidade, baixa elasticidade, padrão ou elástico.
    rose_bloom_stage:
      name: Rosa estágio de abertura
      description: Indica o quanto as rosas estão abertas na entrega/chegada (de botão
        a totalmente aberta).
    rose_grade:
      name: Rosa classificação
      description: Classificação comercial de qualidade de rosas cortadas.
    rosette_center_type:
      name: Roseta tipo de centro
      description: Especifica o tipo de detalhe central ou inserção na parte frontal
        da roseta.
    rosin_dust_level:
      name: Breu nível de pó
      description: Indica a quantidade esperada de pó de breu produzido durante o
        uso normal.
    rosin_formula_additives:
      name: Breu fórmula/aditivos
      description: Identifica características notáveis da formulação, como misturas
        hipoalergênicas, com baixo nível de pó ou com infusão de metal.
    rosin_hardness:
      name: Breu dureza
      description: Indica a dureza/maciosidade relativa do breu para arco, o que pode
        afetar a aderência e a produção de pó em diferentes climas e estilos de execução.
    rotation_mechanism_type:
      name: Mecanismo de rotação tipo
      description: 'Especifica o mecanismo que permite que a corda gire, impactando
        a suavidade e a velocidade alcançável (ex.: rolamentos de esferas vs buchas).'
    rotation_motion_features:
      name: Recursos de rotação/movimento
      description: Indica se planetas/órbitas giram ou se movem e como.
    rotor_configuration_type:
      name: Rotor, tipo de configuração
      description: 'Identifica a configuração do rotor do helicóptero RC e o estilo
        de controle (ex.: coaxial, rotor único de passo fixo vs passo coletivo, multirrotor),
        o que afeta significativamente as características de voo e a adequação a diferentes
        níveis de habilidade.'
    rotor_construction_type:
      name: Rotor, tipo de construção
      description: Especifica o estilo de construção do rotor, que influencia o peso,
        a rigidez e o gerenciamento de calor.
    rotor_mounting_interface:
      name: Disco de freio, interface de fixação
      description: Define o padrão de interface do cubo usado para fixar o rotor à
        roda.
    rotor_mounting_standard:
      name: Disco de freio, padrão de fixação
      description: 'Especifica o padrão de interface usado para fixar o rotor ao cubo
        (ex.: 6 parafusos ou Center Lock).'
    roulette_set_components_included:
      name: Roleta, componentes incluídos no conjunto
      description: Principais componentes relacionados à roleta incluídos com a roda/conjunto.
    roulette_wheel_ball_track_type:
      name: Roleta tipo de trilho da bola
      description: Descreve o estilo de trilho da bola usado na roda, o que afeta
        o realismo e a sensação de jogo.
    roulette_wheel_numbering_system:
      name: Roleta sistema de numeração da roda
      description: Indica a numeração da roda de roleta e a configuração do zero para
        compatibilidade de jogo/probabilidades.
    rounders_equipment_included:
      name: Rounders, equipamentos incluídos
      description: Lista os itens ou acessórios específicos de rounders fornecidos
        com o conjunto ou kit de auxílio de treino, para que os compradores saibam
        exatamente o que vem na caixa.
    rounders_governing_body_approval:
      name: Rounders aprovação por órgão regulador
      description: Indica certificação ou aprovação por um órgão oficial de rounders
        ou outro órgão regulador esportivo.
    row_counter_format:
      name: Contador de carreiras formato
      description: 'Especifica o formato/estilo de um contador de carreiras para tricô
        (ex.: anel, corrente, clicker, digital).'
    row_counter_mechanism:
      name: Contador de carreiras mecanismo
      description: Especifica como a contagem de carreiras é avançada/registrada na
        ferramenta.
    row_counter_mounting_method:
      name: Contador de carreiras método de fixação
      description: Como o contador/marcador é fixado durante o uso (na agulha, no
        dedo, no projeto etc.).
    rowel_type:
      name: Roseta, tipo
      description: Descreve o formato ou perfil da borda da espora para preferência
        do cavaleiro e sensibilidade do cavalo.
    rowing_machine_part_type:
      name: Máquina de remo tipo de peça
      description: Identifica o componente específico que o produto deve substituir
        em uma máquina de remo, para que os compradores encontrem rapidamente a peça
        exata de que precisam sem criar uma explosão de microcategorias.
    rubber_ducky_character_theme:
      name: Patinho de borracha personagem/tema
      description: Tema ou estilo de personagem do patinho de borracha (útil para
        patinhos decorativos/colecionáveis).
    rubber_ducky_features:
      name: Patinho de borracha recursos
      description: Recursos funcionais/de design específicos de brinquedos de banho
        em formato de patinho de borracha.
    rubber_ducky_size_class:
      name: Patinho de borracha classe de tamanho
      description: Agrupamento de tamanho amigável ao comprador para patinhos de borracha
        com base no uso típico (brinquedo de banheira vs topo de bolo vs jumbo).
    ruffle_style:
      name: Babado estilo
      description: Descreve a construção ou o estilo visual do babado em uma faixa
        de cadeira.
    rugby_headgear_safety_certification:
      name: Protetor de cabeça de rúgbi certificação de segurança
      description: Indica se o protetor de cabeça atende aos padrões oficiais de segurança
        de rúgbi ou de esportes em geral.
    rugby_size:
      name: Rúgbi tamanho
      description: Categoriza equipamentos por etiquetas de tamanho comuns específicas
        de rúgbi usadas em títulos de produtos.
    rugby_variant:
      name: Rúgbi variante
      description: Especifica a variante de rúgbi (código ou formato) à qual o produto
        se destina.
    ruler_edge_type:
      name: Régua tipo de borda
      description: 'Identifica o perfil/função da borda usada para medir ou marcar
        (ex.: borda reta, chanfrada, com ressalto).'
    ruler_marking_style:
      name: Régua estilo de marcação
      description: Descreve o layout de marcação/guia impresso na régua além das marcas
        básicas de graduação.
    runner_configuration:
      name: Trenó, configuração das lâminas
      description: Descreve o número e a disposição dos trilhos deslizantes no trenó.
    runner_material:
      name: Trenó material dos trilhos deslizantes
      description: Especifica o material usado nos trilhos deslizantes ou tiras deslizantes
        do trenó.
    saddle_cover_style:
      name: Capa de selim estilo
      description: 'Classifica o design geral ou o estilo de uso do produto (ex.:
        capa para armazenamento, capa para pedalar, bolsa de transporte).'
    saddle_design:
      name: Selim design
      description: 'Classifica o design/estilo ergonômico geral ou de alívio do selim
        (ex.: vazado, sem ponta, ponta dividida, com molas).'
    saddle_discipline:
      name: Sela modalidade
      description: Especifica a principal modalidade de montaria ou uso/estilo pretendido
        da sela.
    saddle_mounting_type:
      name: Selim, tipo de fixação
      description: 'Especifica a interface entre o selim e o canote do selim para
        compatibilidade (ex.: com trilhos, pivotal, I-Beam).'
    saddle_pad_shape:
      name: Manta de sela formato
      description: Descreve o corte/contorno físico da manta, o que afeta a compatibilidade
        com a sela e a preferência estética.
    saddle_pad_style:
      name: Sela, estilo da manta
      description: Identifica o estilo funcional da manta ou a modalidade pretendida,
        permitindo que os cavaleiros escolham o design certo para sua atividade ou
        tipo de sela.
    saddle_padding_material:
      name: Selim material do acolchoamento
      description: Indica o principal material ou tecnologia de amortecimento dentro
        do selim que influencia o conforto e a sensação ao pedalar.
    saddle_rail_material:
      name: Selim, material dos trilhos
      description: Especifica o material usado nos trilhos sob um selim de bicicleta,
        o que afeta resistência, conforto, peso e preço.
    saddle_tree_material:
      name: Sela, material da armação
      description: Especifica o material usado na armação da sela, a estrutura interna
        da sela.
    saddle_tree_width:
      name: Sela largura da armação
      description: Descreve a classificação de largura da armação da sela, determinando
        o ajuste na cernelha do cavalo.
    safety_documentation_available:
      name: Documentação de segurança disponível
      description: 'Indica quais documentos de conformidade/segurança são fornecidos
        para o ingrediente (ex.: ficha de dados de segurança, certificado/declaração
        IFRA, declaração de alérgenos).'
    safety_equipment_included:
      name: Segurança, equipamento incluído
      description: Itens de segurança/proteção incluídos no kit.
    safety_features:
      name: Segurança, recursos
      description: Indica recursos de segurança integrados destinados a reduzir cortes
        acidentais ou proteger a lâmina durante o armazenamento.
    safety_harness_type:
      name: Cinto de segurança tipo
      description: Indica o estilo e a configuração do cinto de retenção infantil
        fornecido com o assento.
    safety_mechanism_type:
      name: Segurança, tipo de mecanismo
      description: Descreve o estilo do sistema de segurança integrado usado para
        segurar a barra durante levantamentos malsucedidos.
    safety_restraint_type:
      name: Retenção de segurança tipo
      description: Tipo de retenção infantil integrada no assento do balanço, se houver.
    safety_warning:
      name: Aviso de segurança
      description: 'Indica se o produto apresenta avisos comuns de segurança de brinquedos
        relevantes para bolinhas de gude (ex.: risco de engasgo).'
    sail_shape:
      name: Vela formato
      description: Descreve o formato geométrico da vela de caiaque, que influencia
        a eficiência, o manejo e a montagem.
    salad_dressing_type:
      name: Molho para salada tipo
      description: 'Identifica o estilo ou a textura fundamental do molho (ex.: cremoso,
        vinagrete, à base de iogurte), ajudando os compradores a distinguir entre
        diferentes bases e consistências.'
    salad_topping_base_ingredient:
      name: Cobertura para salada ingrediente base
      description: Especifica o grupo principal de ingredientes que compõe a cobertura,
        ajudando os clientes a filtrar por preferências nutricionais, preocupações
        com alérgenos ou textura desejada.
    salt_level:
      name: Nível de sal
      description: Indica a quantidade de sal ou sódio adicionada às castanhas ou
        sementes.
    sand_cup_features:
      name: Baldinho de areia recursos
      description: Recursos funcionais/físicos do(s) baldinho(s) de areia que afetam
        a brincadeira e o uso.
    sand_shovel_handle_style:
      name: Pá de areia estilo do cabo
      description: Descreve o formato do cabo/empunhadura na extremidade do cabo da
        pá.
    sand_toy_set_pieces_included:
      name: Brinquedo de areia, peças incluídas no conjunto
      description: 'Lista os tipos de componentes de brinquedo de areia incluídos
        no conjunto (ex.: balde, pá, moldes), para ajudar os compradores a comparar
        kits pelo conteúdo.'
    sand_water_mill_items_included:
      name: Moinho de areia e água itens incluídos
      description: Lista os principais acessórios/componentes incluídos com o brinquedo
        de moinho (baldes, pazinhas, moldes etc.).
    sandbag_style:
      name: Saco de areia, estilo
      description: 'Identifica o design específico e o uso de treino pretendido do
        saco de areia (ex.: búlgaro, Strongman, Power), ajudando os compradores a
        escolher entre diferentes modalidades de treino.'
    sandbox_bottom_type:
      name: Caixa de areia tipo de fundo
      description: O tipo de construção da base/fundo usado sob a areia.
    sandbox_drainage_type:
      name: Caixa de areia tipo de drenagem
      description: Como a caixa de areia drena a água (se aplicável), como furos de
        drenagem ou tampão removível.
    sandbox_seating_type:
      name: Caixa de areia, tipo de assento
      description: Se a caixa de areia inclui assento integrado e de que tipo.
    sapodillo_variety:
      name: Sapoti variedade
      description: 'Identifica o cultivar ou variedade específica de sapoti/chikoo
        (ex.: "Alano", "Prolific"), permitindo que entusiastas selecionem perfis de
        sabor e características preferidos.'
    sapote_variety:
      name: Sapota, variedade
      description: 'Especifica a espécie/tipo específico de sapote oferecido (ex.:
        preto, branco, mamey), permitindo que os compradores distingam entre diferentes
        tipos.'
    satin_ribbon_face_type:
      name: Fita de cetim tipo de face
      description: Especifica se a fita tem acabamento de cetim em um lado ou em ambos
        os lados.
    sauce_consistency:
      name: Molho consistência
      description: Descreve a textura ou espessura do molho de pizza.
    sauce_product_form:
      name: Molho, forma
      description: Indica a forma física do produto de molho, como líquido, óleo,
        pasta, pó, flocos ou xarope.
    sauce_variety:
      name: Molho variedade
      description: 'Identifica o estilo específico ou família de receita do molho
        branco ou molho cremoso (ex.: Alfredo, béchamel, holandês).'
    saxophone_body_finish:
      name: Saxofone acabamento do corpo
      description: Descreve o acabamento/revestimento principal no corpo do saxofone
        (separado do mecanismo de chaves).
    saxophone_body_type:
      name: Saxofone, tipo de corpo
      description: Descreve a configuração física geral do corpo do saxofone baixo
        e a orientação da campana.
    saxophone_construction_style:
      name: Saxofone estilo de construção
      description: Indica recursos comuns de construção do saxofone que afetam durabilidade,
        ressonância e manutenção.
    saxophone_included_accessories:
      name: Saxofone acessórios incluídos
      description: Lista os acessórios incluídos que normalmente acompanham um kit
        de saxofone alto.
    saxophone_key_system:
      name: Saxofone sistema de chaves
      description: Identifica o sistema de chaves do saxofone (layout/padrão do mecanismo)
        usado no instrumento.
    saxophone_key_touch_material:
      name: Saxofone material dos botões das chaves
      description: 'Especifica o material usado nos botões das chaves do saxofone
        (ex.: botões de madrepérola).'
    saxophone_mouthpiece_baffle_type:
      name: Saxofone boquilha tipo de defletor
      description: Descreve o design do defletor que molda o fluxo de ar e o brilho
        do som.
    saxophone_neck_type:
      name: Saxofone tipo de tudel
      description: Especifica a configuração do tudel fornecido com o saxofone baixo.
    saxophone_package_contents:
      name: Saxofone conteúdo da embalagem
      description: 'Lista quais acessórios principais estão incluídos com o saxofone
        (ex.: estojo, boquilha, abraçadeira, correia de pescoço, kit de limpeza).'
    saxophone_reed_cut:
      name: Saxofone palheta corte
      description: Especifica o corte/estilo da palheta do saxofone, que influencia
        a resposta, o timbre e a sensação ao tocar.
    saxophone_reed_material_type:
      name: Saxofone palheta tipo de material
      description: 'Especifica a categoria de material da palheta (ex.: cana vs sintética).'
    saxophone_reed_strength_scale:
      name: Saxofone palheta escala de dureza
      description: Especifica o sistema/escala de numeração de dureza usado para a
        palheta (muitas vezes dependente da marca), permitindo uma comparação mais
        clara entre anúncios.
    saxophone_small_part_thread_size:
      name: Saxofone peça pequena tamanho da rosca
      description: Especifica o tamanho/padrão da rosca para pequenas peças rosqueadas
        de saxofone (principalmente parafusos), permitindo selecionar o encaixe correto.
    saxophone_swab_application_area:
      name: Saxofone área de aplicação do pano de limpeza
      description: Indica qual parte do saxofone o pano de limpeza deve limpar/secar.
    scabbard_material:
      name: Bainha material
      description: Especifica os principais materiais da bainha/funda incluída (se
        houver).
    scale_model_assembly_status:
      name: Modelo em escala status de montagem
      description: Indica se o modelo em escala está pronto para exibição ou requer
        montagem/pintura.
    scale_model_car_features:
      name: Carro de modelo em escala recursos
      description: Recursos notáveis do carro de modelo em escala, como portas/capô
        que abrem, rodas esterçáveis, suspensão etc.
    scale_model_kit_assembly_requirements:
      name: Kit de modelo em escala requisitos de montagem
      description: Especifica quais etapas/suprimentos adicionais de montagem são
        normalmente necessários além da montagem básica por encaixe.
    scale_model_kit_components_included:
      name: Kit de modelo em escala componentes incluídos
      description: 'Lista o que está incluído no modelo/kit de tanque em escala (ex.:
        decalques, figuras, peças fotogravadas).'
    scale_model_paint_status:
      name: Modelo em escala status da pintura
      description: Indica se o modelo de helicóptero vem pré-pintado/finalizado ou
        requer pintura.
    scale_model_pose:
      name: Maquete, pose da miniatura
      description: Especifica a pose representada do modelo de cavalo para combinação
        com exposição/diorama.
    scale_model_rotor_configuration:
      name: Modelo em escala configuração do rotor
      description: Especifica a configuração do rotor do helicóptero representada
        pelo modelo.
    scale_model_truck_era:
      name: Modelo em escala de caminhão época
      description: Indica a época/período do caminhão real que o modelo representa
        (útil para colecionadores que buscam caminhões antigos vs modernos).
    scale_model_truck_propulsion_type:
      name: Modelo em escala de caminhão tipo de propulsão
      description: Especifica se o caminhão representado é a diesel, gasolina, elétrico,
        híbrido ou outro tipo de propulsão (conforme representado/comercializado pelo
        modelo).
    scale_units:
      name: Escala unidades
      description: As unidades de medida impressas/gravadas na régua para definir
        raio/diâmetro.
    scent_function:
      name: Aroma função
      description: 'Define a função principal de um produto aromático para que caçadores
        possam encontrar rapidamente a ferramenta certa (ex.: atrativo vs eliminador
        de odor).'
    scent_source:
      name: Aroma fonte
      description: Lista a principal fonte biológica ou aromática usada na formulação
        do produto, abrangendo tipos de urina, aromas à base de alimentos, aromas
        vegetais etc.
    school_bus_body_type:
      name: Ônibus escolar tipo de carroceria
      description: 'Classifica um ônibus escolar por formatos comuns de carroceria/classe
        usados no mercado (ex.: Tipo A–D).'
    school_bus_safety_feature:
      name: Ônibus escolar recurso de segurança
      description: Equipamento de segurança notável instalado no ônibus escolar.
    school_glue_washability:
      name: Cola escolar lavabilidade
      description: Indica com que facilidade a cola seca/úmida pode ser limpa da pele/roupas/superfícies.
    scissors_application:
      name: Tesoura aplicação
      description: Principal aplicação/material de corte pretendido para a tesoura.
    scooter_brake_pad_material:
      name: Patinete material da pastilha de freio
      description: Especifica o composto usado nas pastilhas de freio, afetando desempenho,
        ruído e vida útil.
    scoring_method:
      name: Método de pontuação
      description: Especifica como os pontos são registrados na mesa de pebolim, como
        contadores manuais de contas ou placares eletrônicos.
    scoring_pattern:
      name: Padrão de pontuação
      description: Layout das zonas de pontuação impressas no campo de jogo.
    scoring_system_type:
      name: Pontuação, tipo de sistema
      description: Descreve o estilo do mecanismo de marcação de pontos incluído na
        mesa, como marcadores manuais deslizantes ou diversos visores eletrônicos.
    scottish_smallpipes_bag_material:
      name: Smallpipes escocesas material do saco
      description: Especifica o material do saco (reservatório de ar) fornecido com
        as smallpipes.
    scottish_smallpipes_drone_tuning_configuration:
      name: Smallpipes escocesas configuração de afinação dos bordões
      description: Especifica a configuração de afinação dos bordões fornecida com
        o instrumento (as alturas/funções dos bordões em relação à tônica).
    scottish_smallpipes_reed_type:
      name: Smallpipes escocesas tipo de palheta
      description: Identifica o tipo de palheta usado no ponteiro melódico (e/ou se
        as palhetas são sintéticas vs de cana).
    scraping_surface_type:
      name: Raspagem, tipo de superfície
      description: 'Especifica a construção/geometria da superfície de raspagem que
        produz o som (ex.: ranhurada, pente/dentes, corrugada).'
    screw_drive_type:
      name: Parafuso tipo de encaixe da cabeça
      description: 'Especifica o tipo de encaixe na cabeça do parafuso ou do pino,
        indicando a ferramenta necessária para apertar ou remover (ex.: sextavado/Allen,
        Torx).'
    screw_thread_size:
      name: Parafuso, tamanho da rosca
      description: 'Especifica o padrão de tamanho da rosca dos parafusos incluídos
        ou compatíveis (ex.: M4, M5, M6).'
    sculpting_clay_base_type:
      name: Argila para escultura tipo de base
      description: Descreve a formulação/base subjacente da argila para escultura.
    seafood_cut:
      name: Frutos do mar corte
      description: 'Descreve o corte físico ou a apresentação do produto de frutos
        do mar (ex.: inteiro, filé, posta).'
    seafood_processing_method:
      name: Frutos do mar, método de processamento
      description: Especifica a principal técnica de conservação ou processamento
        aplicada aos frutos do mar, como defumado, salgado ou liofilizado.
    seafood_source:
      name: Frutos do mar origem
      description: Indica se os frutos do mar são selvagens, de cultivo, à base de
        plantas ou de outra origem, ajudando os compradores a avaliar sustentabilidade
        e qualidade.
    seal_material:
      name: Vedação material
      description: Material usado nas vedações ou juntas do pescoço, punhos e tornozelos
        que mantêm a roupa impermeável.
    seal_type:
      name: Vedação tipo
      description: Especifica o método de vedação usado pela conexão para evitar vazamentos
        de fluido de arrefecimento.
    sealant_formulation:
      name: Selante formulação
      description: 'Indica a principal formulação química ou tecnologia de aditivo
        do selante para pneu de bicicleta (ex.: à base de látex, reforçado com fibras,
        acrílico).'
    seals_leak_type:
      name: Veda-vazamento tipo de vazamento
      description: Tipo/local do vazamento no sistema de arrefecimento que o produto
        se destina a vedar.
    seam_construction:
      name: Costura construção
      description: Descreve como a costura da bola é criada, afetando o efeito, a
        durabilidade e a sensação.
    seam_design:
      name: Tipo de costura
      description: Especifica a construção da costura ou recursos decorativos de costura
        da meia-calça.
    seam_gauge_scale_type:
      name: Medidor de costura tipo de escala
      description: Indica quais escalas/marcações estão incluídas no medidor de costura
        além da escala básica da régua.
    seam_gauge_slider_material:
      name: Medidor de costura material do cursor
      description: Identifica o material do componente ajustável de cursor/ponteiro,
        quando presente.
    seam_ripper_tip_style:
      name: Descosturador estilo da ponta
      description: Descreve o design funcional da ponta usado para deslizar sob os
        pontos e cortar a linha com segurança.
    seam_sealing_type:
      name: Costura tipo de selagem
      description: 'Descreve o método usado para impedir a entrada de água nas costuras
        da capa de chuva (ex.: totalmente selada com fita, soldada).'
    seam_type:
      name: Costura tipo
      description: Descreve o estilo de costura da bola de beisebol, que afeta a aderência,
        a aerodinâmica e o nível de jogo pretendido.
    season_condition_protection:
      name: Proteção contra estação/condição
      description: Indica a principal condição climática/ambiental contra a qual a
        capa de para-brisa deve proteger.
    season_rating:
      name: Classificação de estação
      description: 'Especifica a classificação de estação da barraca, indicando sua
        adequação a diferentes condições climáticas (ex.: 3 estações, 4 estações,
        5 estações/expedição).'
    seasoning_variety:
      name: Tempero variedade
      description: Classifica o tempero por seu estilo de preparo ou uso culinário
        tradicional.
    seat_adjustment_power_type:
      name: Banco tipo de acionamento do ajuste
      description: Especifica como os mecanismos de ajuste do banco são acionados
        (alavancas manuais vs motores elétricos), o que pode afetar a fiação/compatibilidade.
    seat_belt_attachment_type:
      name: Cinto de segurança tipo de fixação
      description: Especifica como a tira se fixa ao veículo/às ferragens do cinto.
    seat_belt_buckle_electrical_connector_type:
      name: Cinto de segurança tipo de conector elétrico da fivela
      description: Especifica o conector/interface usado para a fiação do interruptor/pretensionador
        da fivela, quando aplicável.
    seat_belt_buckle_mounting_type:
      name: Cinto de segurança tipo de montagem da fivela
      description: 'Descreve como a fivela/receptor se fixa ao veículo, ao banco ou
        à haste do cinto (ex.: parafusado, por encaixe).'
    seat_belt_buckle_release_button_color:
      name: Cinto de segurança cor do botão de liberação da fivela
      description: Especifica a cor do botão de liberação da fivela.
    seat_belt_cover_placement:
      name: Cinto de segurança posicionamento da capa
      description: Especifica o ponto do cinto de segurança em que a capa deve ser
        usada.
    seat_belt_integration:
      name: Cinto de segurança, integração
      description: Especifica se o banco inclui cinto de segurança integrado e/ou
        receptáculo da fivela, ou se o receptáculo da fivela original do veículo deve
        ser transferido para a instalação.
    seat_belt_provision:
      name: Cinto de segurança provisão
      description: Indica se cintos de segurança e/ou ferragens relacionadas ao cinto
        (por exemplo, fivelas) estão incluídos no conjunto do banco traseiro ou devem
        ser transferidos do banco original.
    seat_belt_strap_installation_location:
      name: Cinto de segurança local de instalação da tira
      description: Indica onde a tira é instalada dentro do sistema do cinto.
    seat_cover_placement:
      name: Capa do assento, posicionamento
      description: Indica a quais posições de assento do veículo a capa se destina.
    seat_cover_securement_method:
      name: Capa de banco método de fixação
      description: Indica a principal forma como a capa de banco é fixada ao banco.
        Se forem utilizados vários métodos, selecione o principal/primário.
    seat_cover_set_contents:
      name: Se vários métodos forem usados, selecione o principal.
      description: Conjunto de capas de banco conteúdo
    seat_fabric:
      name: 'Descreve quais peças estão incluídas na embalagem (ex.: somente assentos
        vs assento completo + encostos de cabeça).'
      description: Banco tecido
    seat_height_category:
      name: Tecido principal usado no assento e no encosto da cadeira de diretor.
      description: Banco categoria de altura
    seat_material:
      name: 'Classifica o banco pelo intervalo típico de altura do assento (ex.: altura
        de bancada ou de bar) para simplificar a seleção.'
      description: Identifica o material principal da superfície do assento do banco.
    seat_mounting_type:
      name: Assento, tipo de montagem
      description: Configuração de montagem/trilho usada para fixar o banco ao assoalho
        do veículo.
    seating_surface_material:
      name: Assento, material da superfície
      description: 'Especifica o material da área onde a pessoa reclina (ex.: tela
        Textilene, tecido sling, vime, estofamento acolchoado).'
    seatpost_clamp_mechanism:
      name: Canote do selim mecanismo de abraçadeira
      description: Tipo de sistema de fixação/fechamento que prende o canote do selim.
    section_orientation_compatibility:
      name: Compatibilidade de orientação do módulo
      description: Indica se o acessório se encaixa em módulo com braço esquerdo,
        módulo com braço direito ou orientação universal.
    sectional_configuration:
      name: Sofá modular configuração
      description: 'Define o módulo ou a orientação específica da unidade modular
        (ex.: canto, ponta com braço esquerdo, chaise), para que os compradores possam
        montar os layouts desejados.'
    sectional_shape:
      name: Sofá modular formato
      description: Define a configuração/layout geométrico geral do sofá modular.
    secured_components:
      name: Componentes protegidos
      description: 'Lista as peças específicas da bicicleta que o eixo de blocagem
        com trava ou as porcas antifurto protegem (ex.: roda dianteira, roda traseira,
        canote do selim).'
    seed_content:
      name: Sementes conteúdo
      description: Indica se a fruta cítrica não tem sementes, tem poucas sementes
        ou tem muitas sementes.
    seed_size_classification:
      name: Semente, classificação do tamanho
      description: Indica o tamanho relativo da semente não comestível dentro da lichia,
        o que afeta a quantidade de polpa comestível.
    self_adhesive_backing_format:
      name: Suporte autoadesivo, formato
      description: Formato físico da base adesiva fornecida com o suporte de pavio
        (almofada pré-aplicada vs adesivos separados etc.).
    self_adhesive_hook_loop_backing_type:
      name: Fecho autoadesivo de contato tipo de base
      description: Especifica a construção da base/liner e o sistema adesivo usado
        no lado autoadesivo.
    self_adhesive_hook_loop_fastener_shape:
      name: Formato do fecho de contato autoadesivo
      description: Especifica o corte/formato das peças de fixação fornecidas.
    self_hardening_clay_finish:
      name: Argila autoendurecível acabamento
      description: Descreve a aparência/brilho da superfície depois de totalmente
        curada (útil para escolher entre fosco natural, acetinado etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Argila autoendurecível resistência à água após cura
      description: Indica a resistência à exposição à água depois de totalmente curada
        (sem selante adicional).
    sensor_functions:
      name: Sensor funções
      description: Indica quais métricas de ciclismo o sensor mede.
    sensor_measurement_mode:
      name: Sensor modo de medição
      description: 'Indica quais métricas o sensor consegue capturar (ex.: apenas
        cadência, apenas velocidade, velocidade & cadência duplas).'
    sensor_mounting_position:
      name: Sensor, posição de instalação
      description: Especifica o local na bicicleta ou no ciclista onde o sensor é
        instalado, como pedivela, cubo da roda ou sapato. Isso afeta a compatibilidade
        com diferentes configurações de bicicleta.
    sensor_mounting_type:
      name: Sensor, tipo de instalação
      description: 'Especifica como o sensor MAP é montado no coletor de admissão/motor
        (ex.: flange parafusada vs bucha de encaixe por pressão).'
    sensor_or_gauge_mounting_location:
      name: Sensor ou medidor local de montagem
      description: Especifica onde no veículo o sensor ou medidor deve ser instalado
        (em nível de sistema/local, não esquerda/direita).
    sensory_modality:
      name: Modalidade sensorial
      description: Experiência(s) sensorial(is) principal(is) que o brinquedo foi
        projetado para proporcionar (pode ser multissensorial).
    sensory_toy_fidget_mechanism:
      name: Brinquedo sensorial mecanismo de manipulação
      description: Principal interação/mecanismo usado para manipulação e autorregulação.
    sensory_toy_light_features:
      name: Brinquedo sensorial recursos de luz
      description: Comportamentos/efeitos de iluminação fornecidos pelo brinquedo.
    sensory_toy_texture_type:
      name: Brinquedo sensorial tipo de textura
      description: Sensação dominante da superfície/elementos de textura usados para
        estimulação tátil.
    sequin_application_method:
      name: Lantejoula, método de aplicação
      description: Como a lantejoula deve ser aplicada/usada (costurada vs colada
        vs termocolante etc.).
    sequin_finish:
      name: Lantejoula acabamento
      description: Descreve o acabamento superficial/visual e o efeito refletivo das
        lantejoulas usadas no aplique, por exemplo, fosco, metalizado, holográfico,
        não o forro do aplique nem o método de fixação.
    serger_stitch_functions:
      name: Overloque funções de ponto
      description: As funções de ponto compatíveis com a overloque, como variações
        de overloque/chuleado e pontos especiais de overloque.
    serger_thread_count:
      name: Overloque número de fios
      description: Número de fios que a overloque pode usar para costura, por exemplo,
        capacidade para 2/3/4/5 fios.
    service_interval:
      name: Intervalo de serviço
      description: Tempo máximo recomendado entre inspeções/manutenções obrigatórias
        por um posto de serviço aprovado.
    serving_temperature:
      name: Temperatura de consumo
      description: Indica a temperatura ou o estado previsto para servir o produto
        quando consumido.
    sesame_seed_hull_status:
      name: Semente de gergelim status da casca
      description: Especifica se o tahine é feito com sementes de gergelim descascadas
        ou com casca, o que afeta cor, sabor e nutrição.
    sesame_seed_roast_level:
      name: Semente de gergelim nível de torra
      description: Indica o quanto as sementes de gergelim foram torradas antes da
        moagem, ajudando os consumidores a escolher sua intensidade de sabor preferida.
    sesame_seed_variety:
      name: Semente de gergelim variedade
      description: Identifica a cor ou a variedade das sementes de gergelim usadas
        para fazer o óleo.
    set_classification:
      name: Conjunto classificação
      description: Define o nível ou estilo de uso previsto do conjunto de croqué,
        por exemplo, torneio, recreativo, viagem.
    set_components:
      name: Conjunto componentes
      description: Indica quais itens estão incluídos com o produto, por exemplo,
        apenas o taco central ou o conjunto completo.
    set_items_included:
      name: Itens incluídos no conjunto
      description: Especifica as peças de roupa ou acessórios incluídos no conjunto,
        como tecido de sari, dupatta ou cinto.
    setup_mechanism:
      name: Mecanismo de montagem
      description: Descreve o principal método de montagem da barraca, por exemplo,
        automática, inflável/com vigas de ar, concha para teto.
    setup_type:
      name: Tipo de montagem
      description: Como a barraca/túnel de brincar é montada ou aberta.
    sew_in_interfacing_elasticity:
      name: Entretela costurável elasticidade
      description: Indica se a entretela costurável tem elasticidade e, em caso afirmativo,
        em qual/quais direção(ões), para combinar com projetos em malha ou tecido
        plano.
    sew_in_label_placement:
      name: Etiqueta costurável posicionamento
      description: Indica o local previsto para posicionamento no item acabado.
    sew_on_edge_finish:
      name: Costurável acabamento da borda
      description: Indica se as bordas do fecho de contato estão brutas/cortadas ou
        acabadas para resistir ao desfiamento.
    sew_on_rhinestone_hole_orientation:
      name: Strass costurável orientação dos furos
      description: Disposição/orientação dos furos em relação à pedra, por exemplo,
        lado a lado, opostos, em cruz, para permitir diferentes estilos de ponto.
    sewing_kit_components_included:
      name: Componentes incluídos no kit de costura
      description: Lista os aviamentos/ferramentas de costura incluídos em um kit
        de costura para que os consumidores possam comparar o que vem em cada kit.
    sewing_machine_bobbin_class:
      name: Máquina de costura classe da bobina
      description: Especifica a classe/sistema da bobina compatível com a máquina
        de costura para bobinas e caixas de bobina.
    sewing_machine_buttonhole_type:
      name: Máquina de costura tipo de casa de botão
      description: Método de criação de casa de botão compatível com a máquina.
    sewing_machine_display_type:
      name: Máquina de costura tipo de tela
      description: Tipo de interface de controle/tela na máquina de costura.
    sewing_machine_needle_point_type:
      name: Máquina de costura tipo de ponta da agulha
      description: Define a geometria da ponta/família de ponta da agulha que determina
        como ela penetra diferentes tecidos, por exemplo, ponta afiada vs. ponta bola
        vs. ponta cunha.
    sewing_machine_needle_system:
      name: Máquina de costura, sistema de agulhas
      description: O sistema/número do modelo padronizado da agulha que determina
        a compatibilidade com a máquina, frequentemente escrito como 130/705 H, HAx1,
        DBx1, 15x1 etc.
    sewing_machine_needle_type:
      name: Máquina de costura, tipo de agulha
      description: Especifica a aplicação/estilo previsto da agulha, por exemplo,
        universal, ponta bola, jeans/brim, o que afeta a qualidade do ponto e a adequação
        ao tecido.
    sewing_machine_shank_type:
      name: Máquina de costura, tipo de haste
      description: Especifica o padrão de interface da haste/encaixe do calcador para
        o qual o pé foi projetado, garantindo compatibilidade com a máquina de costura,
        por exemplo, haste baixa, haste alta, haste inclinada.
    sewing_pattern_accessory_type:
      name: Molde de costura tipo de acessório
      description: Especifica qual acessório o molde de costura cria.
    sewing_pattern_notions_required:
      name: Molde de costura aviamentos necessários
      description: Lista materiais/ferragens adicionais importantes necessários para
        concluir o projeto, além de tecido e linha.
    sewing_pattern_recommended_fabric:
      name: Molde de costura tecido recomendado
      description: Lista os tipos/gramaturas de tecido recomendados para o molde de
        costura, conforme fornecido pelo designer do molde.
    sewing_pattern_size_range:
      name: Molde de costura faixa de tamanhos
      description: Especifica a faixa de tamanhos prevista coberta pelo molde, por
        exemplo, de bebê a adulto, tamanhos plus size.
    sewing_thread_size_system:
      name: Linha de costura sistema de tamanho
      description: O padrão de dimensionamento usado para expressar o tamanho da linha,
        por exemplo, Tex, Denier, Ticket, número de peso, tamanho V.
    shaft_curvature:
      name: Haste curvatura
      description: Descreve o formato geral da haste, que influencia a folga, o balanço
        e a ergonomia.
    shaft_kick_point:
      name: Haste ponto de flexão
      description: Identifica a posição ao longo da haste onde ela se dobra mais durante
        um balanço, influenciando a trajetória de voo da bola.
    shaft_length_type:
      name: Tipo de comprimento da haste
      description: Designação categórica de tamanho padrão do setor para hastes de
        dardo, por exemplo, Curta, Média, usada quando as medidas exatas em milímetros
        não são fornecidas.
    shaft_shape:
      name: Haste formato
      description: Define o perfil transversal da haste da tonfa, por exemplo, redonda,
        quadrada, octogonal.
    shaker_fill_material:
      name: Chocalho, material de enchimento
      description: Especifica o principal enchimento interno usado para criar o som
        do chocalho, quando aplicável, como contas, sementes ou esferas.
    shaker_shell_material:
      name: Chocalho, material do corpo
      description: Especifica o material principal do corpo/casca do chocalho em formato
        de ovo, a estrutura externa.
    shallot_variety:
      name: Chalota variedade
      description: Identifica a cultivar, o tipo comercial ou a variedade específica
        do produto de chalota.
    shank_style:
      name: Haste estilo
      description: Descreve o formato/configuração geral das hastes do freio, por
        exemplo, retas, curvas, grazing.
    shapewear_enhancement_feature:
      name: Modelador recurso de melhoria
      description: Destaca a principal melhoria funcional oferecida pela peça, por
        exemplo, controle abdominal, efeito levanta-bumbum, forro à prova de vazamentos.
    sheath_type:
      name: Bainha tipo
      description: Tipo de bainha incluída com a faca colecionável.
    sheet_music_clip_padding_material:
      name: Clipe para partitura material do acolchoamento
      description: Material de qualquer acolchoamento da garra/pegador que entra em
        contato com o papel ou com a borda do suporte para evitar rasgos e deslizamento.
    sheet_music_clip_spring_tension_level:
      name: Clipe para partitura nível de tensão da mola
      description: Força relativa da mola do clipe / força de fixação.
    sheet_music_clip_use_environment:
      name: Clipe para partitura ambiente de uso
      description: Principal ambiente previsto em que o clipe foi projetado para funcionar
        melhor.
    shell_construction:
      name: Casco construção
      description: Especifica como o casco do bumbo é construído, o que afeta fortemente
        o timbre e o peso.
    shell_finish:
      name: Casco acabamento
      description: Tratamento de acabamento externo do casco do doumbek.
    shell_hull_status:
      name: Casca status
      description: Especifica se as nozes ou sementes são vendidas com cascas intactas
        ou removidas.
    shift_boot_attachment_method:
      name: Coifa de câmbio método de fixação
      description: Especifica como a coifa de câmbio é fixada ao console/moldura do
        câmbio do veículo, por exemplo, moldura de encaixe, anel de retenção, adesivo.
    shift_boot_installation_hardware_included:
      name: Coifa de câmbio ferragens de instalação incluídas
      description: Lista as ferragens e componentes de instalação incluídos com a
        coifa de câmbio.
    shift_knob_illumination:
      name: Manopla de câmbio iluminação
      description: Especifica se a manopla de câmbio inclui iluminação e o método/tipo
        de iluminação, por exemplo, fotoluminescente, LED, fibra óptica, padrão retroiluminado.
    shift_knob_installation_method:
      name: Manopla de câmbio método de instalação
      description: Especifica como a manopla de câmbio se fixa ao câmbio/alavanca.
    shift_knob_shape:
      name: Manopla de câmbio formato
      description: Descreve o formato ergonômico geral da manopla de câmbio.
    shift_pattern_type:
      name: Padrão de câmbio tipo
      description: Especifica o estilo de marcação das marchas na manopla de câmbio,
        se houver.
    shifter_compatibility:
      name: Trocador de marcha, compatibilidade
      description: Indica se a extensão do guidão é compatível com passadores eletrônicos,
        passadores mecânicos, ambos, ou não é compatível com passadores.
    shifter_mounting_interface:
      name: Trocador de marcha, padrão de fixação
      description: Descreve como o passador se fixa à bicicleta, por exemplo, tamanho
        de abraçadeira discreto, I-Spec, MatchMaker, ponta do guidão, tubo inferior,
        sem fio.
    shifting_actuation_type:
      name: Acionamento da troca de marchas tipo
      description: Identifica o mecanismo usado para trocar marchas no grupo, mecânico,
        eletrônico com fio, eletrônico sem fio, hidráulico.
    shifting_mechanism:
      name: Troca de marchas mecanismo
      description: Identifica se o passador funciona mecanicamente ou eletronicamente,
        e se é indexado ou baseado em fricção.
    shim_purpose:
      name: Calço finalidade
      description: Define o tipo funcional do produto, por exemplo, calço, cunha,
        espaçador, para que ciclistas possam encontrar rapidamente a solução de ajuste
        certa sem precisar de subcategorias separadas.
    shin_guard_attachment_method:
      name: Caneleira método de fixação
      description: Classifica o formato geral de design da caneleira, incluindo integração
        com proteção de tornozelo ou construção tipo meia.
    shirt_cuff_style:
      name: Camisa, tipo de punho
      description: Identifica a construção do punho da manga, que afeta formalidade,
        combinação com abotoaduras e conforto.
    shochu_base_ingredient:
      name: Shochu ingrediente base
      description: Identifica a principal fonte de amido ou açúcar usada para produzir
        o shochu.
    shochu_soju_variety:
      name: Shochu & soju variedade
      description: Classifica o produto por seu estilo reconhecido ou tipo de produção.
    shock_absorber_bushing_material:
      name: Amortecedor material da bucha
      description: Material das buchas/isoladores de montagem fornecidos com ou incorporados
        ao amortecedor.
    shock_absorber_charge_type:
      name: Amortecedor tipo de carga
      description: Especifica a tecnologia de carga/amortecimento do amortecedor,
        por exemplo, hidráulico/óleo, carregado a gás, ar, e/ou o design relacionado
        do tubo quando aplicável.
    shock_absorber_mount_type_lower:
      name: Amortecedor tipo de montagem (inferior)
      description: Estilo da interface de montagem inferior do amortecedor para correspondência
        de encaixe.
    shock_absorber_mount_type_upper:
      name: Amortecedor tipo de montagem (superior)
      description: Especifica o estilo da interface de montagem superior do amortecedor
        de veículo motorizado para correspondência de encaixe/compatibilidade.
    shock_absorber_position:
      name: Amortecedor posição
      description: Especifica se o amortecedor é destinado à posição dianteira, traseira,
        esquerda ou direita do veículo, mais granular do que a aplicação apenas por
        eixo.
    shock_absorption_system:
      name: Absorção de choque sistema
      description: Define o mecanismo usado para reduzir vibração e ruído no retorno.
    shoe_collar_height:
      name: Calçado altura do colarinho
      description: Classifica calçados pela altura do colarinho/corte, cano baixo,
        cano médio, cano alto, para indicar cobertura e suporte do tornozelo.
    shoe_cover_height:
      name: Cobre-sapatilha, altura
      description: Especifica o nível de cobertura da capa para calçado de ciclismo,
        distinguindo capas para dedos de cobre-sapatos completos de cano alto.
    shoe_sizing_system:
      name: Calçado sistema de tamanho
      description: Identifica o padrão de tamanho, US, UK, EU, JP, Mondopoint etc.,
        usado para o tamanho de calçado informado.
    shoelace_aglet_material:
      name: Cadarço material da ponteira
      description: Identifica o material usado nas ponteiras nas extremidades dos
        cadarços, o que influencia a durabilidade e o estilo.
    shooting_rest_design:
      name: Apoio de tiro design
      description: Classifica o estilo estrutural do apoio, apoio de saco, trenó,
        tripé, morsa para arma etc.
    shooting_stick_yoke_design:
      name: Forquilha de bastão de tiro design
      description: Especifica o estilo do suporte ou forquilha que faz interface com
        a arma de fogo ou a mira.
    shooting_target_style:
      name: Alvo de tiro estilo
      description: Classifica o estilo ou design de alvos de tiro para patinação artística
        e hóquei, para que os clientes possam selecionar o foco de treinamento de
        que precisam.
    shooting_target_type:
      name: Alvo de tiro, tipo
      description: Classifica alvos de tiro por estilo estrutural, material ou design,
        por exemplo, gongo, silhueta, alvo circular de papel, giratório, permitindo
        que atiradores localizem rapidamente o alvo correto para sua disciplina e
        tipo de arma de fogo.
    short_block_assembly_balance_type:
      name: Bloco parcial do motor tipo de balanceamento do conjunto
      description: Indica se o conjunto rotativo é balanceado interna ou externamente.
    short_block_intended_use:
      name: Bloco parcial do motor uso previsto
      description: Principal caso de uso previsto para o short block.
    short_block_rotating_assembly_included:
      name: Bloco parcial do motor conjunto rotativo incluído
      description: Especifica quais componentes principais do conjunto rotativo estão
        incluídos com o short block.
    shot_size:
      name: Chumbo tamanho
      description: Especifica a designação do tamanho do chumbo para chumbo solto
        ou componentes de munição.
    shotgun_action_type:
      name: Espingarda ação tipo
      description: Especifica o mecanismo operacional/ação da espingarda.
    shotgun_choke_type:
      name: Espingarda choke tipo
      description: Especifica a configuração do choke do(s) cano(s) da espingarda.
    shotgun_gauge:
      name: Espingarda calibre
      description: Especifica o calibre do cano de uma espingarda, (e calibre .410  quando
        aplicável), para identificação e filtragem em anúncios de colecionáveis.
    shotgun_stock_material:
      name: Espingarda material da coronha
      description: Especifica o material principal da coronha/telha.
    shuffleboard_speed_rating:
      name: Shuffleboard classificação de velocidade
      description: Indica a velocidade relativa de deslizamento que o pó de shuffleboard
        ou outro produto de manutenção proporciona na mesa, permitindo que os jogadores
        escolham a velocidade adequada para seu nível de habilidade e comprimento
        da mesa.
    shuffleboard_table_length_compatibility:
      name: Mesa de shuffleboard compatibilidade de comprimento
      description: Comprimento padrão de mesa de shuffleboard para o qual um produto
        foi projetado para se ajustar ou complementar.
    shuttlecock_base_material:
      name: Peteca, material da base
      description: Identifica o material usado no nariz/base da peteca, que afeta
        durabilidade, sensação e rebote.
    shuttlecock_feather_material:
      name: Peteca material das penas
      description: Identifica a principal fonte das penas ou o tipo de construção
        usado na saia da peteca, influenciando durabilidade, consistência e preço.
    shuttlecock_grade:
      name: Peteca grau
      description: Especifica o nível de jogo ou classificação de qualidade previsto,
        por exemplo, treino, clube, competição.
    shuttlecock_speed_rating:
      name: Peteca, classificação de velocidade
      description: Especifica a velocidade ou classificação designada pelo fabricante
        da peteca, permitindo que os jogadores selecionem a velocidade de voo correta
        para suas condições de jogo, temperatura e altitude.
    side_panel_installation_state:
      name: Painel lateral estado de instalação
      description: Especifica se o painel lateral é fornecido sem acabamento, com
        primer, pintado ou revestido/preparado de outra forma para instalação.
    side_wall_mechanism:
      name: Parede lateral mecanismo
      description: Descreve como a parede lateral do berço acoplável abre ou abaixa
        para acessar o bebê.
    signal_source:
      name: Fonte do sinal
      description: Indica como o odômetro recebe/deriva informações de distância ou
        tempo.
    silk_fiber_type:
      name: Fibra de seda tipo
      description: Tipo/fonte da fibra de seda usada para fazer o tecido, por exemplo,
        amoreira ou tussar, impactando textura, uniformidade e preço.
    simulated_game_species:
      name: Espécie de caça simulada
      description: Indica a ave ou animal de caça específico que o dummy replica para
        treinamento realista.
    singlet_cut_style:
      name: Singlet estilo de corte
      description: Especifica o corte/estilo do singlet de luta, considerando altura
        das alças, estilo das costas e variações por gênero/jovem.
    sink_material:
      name: Pia, material
      description: Especifica o material da(s) cuba(s) integrada(s) incluída(s) no
        gabinete.
    sinker_attachment_style:
      name: Chumbada estilo de fixação
      description: Descreve o mecanismo fornecido na chumbada de espera para prendê-la
        à linha ou ao conjunto de pesca.
    sinker_finish:
      name: Chumbada acabamento
      description: Especifica o revestimento externo ou tratamento de superfície da
        chumbada.
    sinker_shape:
      name: Peso de pesca, formato
      description: Define a forma geométrica da chumbada, por exemplo, projétil, cilindro,
        gota, para que pescadores possam selecionar a apresentação ideal e a resistência
        a enroscos.
    siren_system_included:
      name: Sistema de sirene incluído
      description: Indica se um sistema de sirene/alto-falante está instalado e qual
        é o tipo.
    siren_system_type:
      name: Sirene, tipo de sistema
      description: Especifica a configuração de sirene/alto-falante instalada no caminhão
        de polícia.
    size_designation:
      name: Designação de tamanho
      description: Rótulo de tamanho padronizado para o instrumento triângulo.
    size_system:
      name: Sistema de tamanho
      description: Especifica o sistema de tamanho ou padrão regional ao qual o rótulo
        de tamanho corresponde, por exemplo, US, UK, EU, letra internacional.
    sizzle_mechanism:
      name: Mecanismo de chiado
      description: Especifica como o prato produz o efeito de chiado, por exemplo,
        rebites instalados no prato, corrente/acessório de chiado acoplável ou nenhum
        acessório incluído.
    skate_blade_discipline:
      name: Lâmina de patim disciplina
      description: Identifica a disciplina ou aplicação de patinação para a qual a
        lâmina foi projetada, como hóquei ou patinação artística, permitindo que os
        compradores filtrem lâminas relevantes.
    skate_brake_type:
      name: Patins, tipo de freio
      description: Identifica o estilo do mecanismo de parada incluído com os patins.
    skateboard_nut_thread_size:
      name: Porca de skate tamanho da rosca
      description: Especifica o tamanho da rosca, diâmetro e passo, da porca para
        garantir compatibilidade com eixos de skate, pinos centrais ou ferragens de
        montagem.
    skein_winder_bearing_bushing_type:
      name: Enrolador de meadas tipo de rolamento/bucha
      description: Especifica o tipo de rolamento ou bucha usado no conjunto rotativo
        do enrolador de meadas.
    skein_winder_drive_type:
      name: Enrolador de meadas tipo de acionamento
      description: Como o enrolador de meadas é acionado/girado durante o uso.
    ski_binding_mechanism:
      name: Fixação de esqui mecanismo
      description: Define o design mecânico fundamental ou a disciplina da fixação
        (por exemplo, alpino, técnico/pino, telemark).
    ski_binding_part_type:
      name: Fixação de esqui tipo de peça
      description: Identifica o componente ou acessório específico para fixações de
        esqui, permitindo filtragem rápida entre muitos tipos de peças.
    ski_boot_sole_standard:
      name: Bota de esqui padrão da sola
      description: Identifica a norma da sola ou o padrão de compatibilidade com fixações
        para o qual a bota de esqui é certificada.
    skill_focus:
      name: Habilidade foco
      description: Identifica a principal habilidade de basquete que o auxílio de
        treinamento pretende desenvolver.
    skimboard_construction:
      name: Prancha de skinboarding, construção
      description: Descreve a construção principal da prancha, com foco no núcleo
        e na técnica de laminação, por exemplo, núcleo de espuma, núcleo de madeira.
    skin_presence:
      name: Pele presença
      description: Especifica se o frango é vendido com pele, sem pele ou parcialmente
        sem pele.
    slapstick_handle_type:
      name: Slapstick tipo de cabo
      description: Descreve o estilo da empunhadura/cabo integrado ao slapstick, afetando
        a ergonomia e o conforto ao tocar.
    slapstick_playing_surface_material:
      name: Slapstick material da superfície de toque
      description: Especifica o material dos elementos de impacto/toque que entram
        em contato entre si para produzir o som.
    sled_brake_type:
      name: Trenó, tipo de freio
      description: Especifica o mecanismo de freio incluído no trenó, se houver.
    sled_towing_method:
      name: Trenó reboque método
      description: Indica a principal forma como o trenó é puxado ou rebocado.
    sleep_position_suitability:
      name: Dormir posição adequada
      description: Indica qual ou quais posições de dormir o colchão foi projetado
        para oferecer suporte com mais eficácia.
    sleeping_bag_shape:
      name: Saco de dormir formato
      description: Corte geral do saco de dormir, que afeta o aquecimento, o peso
        e o espaço interno.
    sleeping_pad_type:
      name: Isolante térmico tipo
      description: Identifica o estilo de construção do isolante, como espuma de célula
        fechada ou ar inflável, que impacta diretamente o conforto, o peso e o isolamento.
    sleepwear_set_pieces_included:
      name: Pijama, peças incluídas no conjunto
      description: Lista os componentes individuais fornecidos em um conjunto de várias
        peças de sleepwear ou loungewear.
    sleeve_bearing_type:
      name: Manga da barra, tipo de rolamento
      description: Identifica a tecnologia que permite a rotação da manga, afetando
        a qualidade do giro em levantamentos olímpicos.
    sleeve_style:
      name: Tipo de manga
      description: Especifica o estilo da manga além do comprimento (por exemplo,
        raglan).
    slide_board_accessories_included:
      name: Prancha de deslizamento acessórios incluídos
      description: Lista os itens suplementares embalados com a prancha de deslizamento
        para que os compradores saibam exatamente o que está incluído e possam comparar
        kits.
    slide_installation_type:
      name: Escorregador, tipo de instalação
      description: Como o escorregador deve ser instalado ou montado, por exemplo,
        independente ou acoplado a um playground.
    slide_intended_finger:
      name: Slide dedo indicado
      description: Indica em qual dedo o slide deve ser usado ou se não se aplica,
        por exemplo, uma tone bar.
    slide_safety_features:
      name: Escorregador recursos de segurança
      description: Elementos de design relacionados à segurança incluídos no escorregador.
    slide_type:
      name: Slide tipo
      description: Especifica qual ou quais tipos de mecanismo de slide para instrumentos
        de metal o produto deve limpar.
    slide_water_use_capability:
      name: Escorregador uso com água capacidade
      description: Se o escorregador foi projetado para ser usado com água, por exemplo,
        conexão para mangueira, e de que forma.
    slime_putty_kit_components_included:
      name: Slime & massa de modelar kit componentes incluídos
      description: Lista as ferramentas e complementos incluídos com o produto de
        slime/massa de modelar, especialmente para kits/conjuntos.
    sling_material:
      name: Fita, material
      description: Especifica a fibra/têxtil usado na fita costurada do costura expressa
        (em formato dog-bone).
    smith_machine_bar_path:
      name: Máquina Smith barra trajetória
      description: Descreve a trajetória fixa de movimento da barra, informando os
        usuários sobre biomecânica e requisitos de espaço.
    smoke_color:
      name: Fumaça cor
      description: Cor da fumaça produzida pelo sinalizador/sinal de fumaça, distinta
        da cor do corpo do produto.
    smoked_malt_smoking_material:
      name: Malte defumado defumação material
      description: Para maltes defumados, identifica o material usado durante a defumação,
        por exemplo, espécies específicas de madeira ou turfa.
    snack_mix_variety:
      name: Mix de snacks variedade
      description: Classifica o produto pelo estilo de mix, por exemplo, trail mix,
        mix de castanhas, namkeen, sev.
    snack_processing_method:
      name: Snack, método de processamento
      description: Indica a principal técnica de processamento ou conservação usada
        para criar o snack, por exemplo, liofilizado, assado, torrado.
    snack_texture:
      name: Snack textura
      description: Indica a mordida física ou a sensação na boca dos palitos de gergelim.
    snap_installation_method:
      name: Botão de pressão, método de instalação
      description: Como o botão de pressão é instalado/fixado ao material do projeto.
    snare_drum_bearing_edge_profile:
      name: Caixa borda de contato perfil
      description: Corte/perfil da borda de contato do casco da caixa.
    snare_drum_finish_type:
      name: Caixa, tipo de acabamento
      description: Construção/tipo de acabamento de alto nível usado no casco da caixa.
    snare_drum_hoop_type:
      name: Caixa, tipo de aro
      description: Tipo de aros usados na caixa.
    snare_drum_mounting_type:
      name: Caixa, tipo de instalação
      description: Como a caixa deve ser montada/usada.
    snare_drum_shell_material:
      name: Caixa, material do casco
      description: Especifica o metal/liga usado no casco da caixa, o corpo principal,
        o que afeta fortemente o timbre, o peso e a durabilidade.
    snare_drum_strainer_mechanism:
      name: Caixa mecanismo do automático da esteira
      description: Tipo de mecanismo de acionador/automático da esteira usado para
        ativar/desativar a esteira da caixa.
    snare_drum_strainer_type:
      name: Caixa tipo de automático da esteira
      description: Tipo de mecanismo de acionador/automático da esteira usado para
        ativar/desativar esteiras da caixa.
    snare_hoop_type:
      name: Caixa tipo de aro
      description: Tipo de aros da caixa.
    snare_throw_off_type:
      name: Caixa tipo de acionador da esteira
      description: Tipo de mecanismo de acionador/automático da esteira usado para
        acionar/desacionar a esteira da caixa.
    snip_cutter_spring_mechanism:
      name: Alicate de corte mecanismo de mola
      description: Indica se o alicate de corte usa um mecanismo de mola/retorno e
        seu estilo.
    snorkel_mount_position:
      name: Snorkel posição de fixação
      description: Descreve onde o snorkel fica posicionado na cabeça do usuário durante
        o uso.
    snorkel_top_type:
      name: Snorkel tipo de topo
      description: Descreve o estilo de proteção contra entrada de água na parte superior
        do snorkel incluído no conjunto.
    snow_condition_suitability:
      name: Neve condição adequação
      description: Descreve as principais condições de neve para as quais a cera é
        indicada.
    snow_sports_helmet_safety_certification:
      name: Capacete para esportes de neve certificação de segurança
      description: Identifica o(s) padrão(ões) de segurança que o capacete atende
        para uso em esqui e snowboard.
    snowboard_base_material:
      name: Snowboard base material
      description: Identifica a composição ou o acabamento da base, como extrudada,
        sinterizada, graus e fórmulas proprietárias, que afetam a velocidade, a durabilidade
        e a manutenção.
    snowboard_width_class:
      name: Snowboard largura classe
      description: Categoriza a largura geral da prancha em relação ao tamanho da
        bota (por exemplo, regular, larga).
    soccer_ball_compartment_type:
      name: Bola de futebol compartimento tipo
      description: Especifica como, ou se, a mochila acomoda uma bola de futebol.
    soccer_ball_type:
      name: Futebol, tipo de bola
      description: Especifica o uso pretendido ou o estilo da bola de futebol (por
        exemplo, jogo, treino, futsal, para que os compradores encontrem rapidamente
        a variante certa sem precisar de muitas subcategorias).
    soccer_dummy_base_type:
      name: Barreira de treino para futebol base tipo
      description: Descreve o estilo da base ou o mecanismo de ancoragem usado pela
        barreira de treino.
    soccer_dummy_design:
      name: Barreira de treino para futebol design
      description: Especifica o estilo de construção de uma barreira de treino para
        gol de futebol, como rígida ou inflável.
    soccer_goal_target_style:
      name: Alvo para gol de futebol estilo
      description: Define o formato físico ou o design do alvo de treino para que
        os compradores possam escolher o estilo mais adequado aos seus exercícios.
    soccer_goal_type:
      name: Futebol, tipo de gol
      description: Indica o estilo estrutural ou o uso pretendido do gol (por exemplo,
        pop-up, rebatedor, street).
    sock_cushioning:
      name: Meia amortecimento
      description: Indica a quantidade e o estilo de amortecimento ou acolchoamento
        sob o pé incorporado à meia.
    sock_cushioning_level:
      name: Meia nível de amortecimento
      description: Especifica a quantidade de amortecimento sob o pé integrada à meia.
    sock_grip_type:
      name: Meia tipo de aderência
      description: Descreve quaisquer recursos de tração ou antiderrapantes aplicados
        à sola da meia.
    sock_toe_style:
      name: Meia estilo dos dedos
      description: Descreve o estilo de construção da área dos dedos da meia.
    soft_bait_style:
      name: Isca macia estilo
      description: Classifica o design ou o perfil do corpo da isca macia de plástico
        (por exemplo, minhoca, shad macio, grub).
    soft_top_attachment_type:
      name: Capota de lona, tipo de fixação
      description: Capota flexível tipo de fixação Identifica como a capota flexível
        é fixada ao veículo (por exemplo, canaletas, botões de pressão, fecho de contato,
        etc).
    soft_top_includes_frame_hardware:
      name: Capota flexível inclui estrutura/ferragens
      description: Indica se o produto inclui a estrutura/arcos da capota flexível
        e/ou as ferragens de montagem.
    soft_top_installation_type:
      name: Capota flexível tipo de instalação
      description: Especifica como a capota flexível do veículo é instalada/fixada,
        indicando o método de instalação esperado e os requisitos necessários.
    soft_top_window_configuration:
      name: Capota de lona, configuração da janela
      description: Indica quantas janelas a capota flexível possui e quais posições
        estão presentes.
    softball_certification:
      name: Softbol, certificação da bola
      description: Lista os selos ou aprovações de órgãos reguladores impressos na
        bola que determinam a elegibilidade para liga/jogo.
    softness_level:
      name: Maciez nível
      description: Indica o quanto o lado do laço é macio/de perfil baixo, relevante
        para conforto em contato com a pele e aplicações de baixo volume.
    solar_system_model_included_bodies:
      name: Modelo de sistema solar corpos incluídos
      description: Indica quais corpos celestes estão representados no conjunto do
        modelo.
    solar_system_model_scaling:
      name: Modelo de sistema solar escala
      description: Indica se o modelo de sistema solar está em escala para tamanhos
        dos planetas, distâncias/órbitas, ambos, ou se é uma representação esquemática/sem
        escala.
    sold_secure_certification_level:
      name: Sold Secure certificação nível
      description: Informa a classificação Sold Secure atribuída ao cadeado pelo órgão
        independente de testes do Reino Unido, Bronze, Silver, Gold, Diamond.
    sold_secure_rating:
      name: Sold Secure classificação
      description: Indica o nível de certificação Sold Secure atribuído ao cadeado.
    sole_construction:
      name: Sola, construção
      description: Indica como a sola do calçado é construída, inteira, dividida,
        em duas partes, etc., afetando diretamente a flexibilidade, o contato com
        o piso e a adequação a técnicas específicas de dança.
    sole_type:
      name: Sola tipo
      description: Descreve o estilo estrutural da sola, indicando flexibilidade e
        uso pretendido.
    soprano_saxophone_body_style:
      name: Saxofone soprano corpo estilo
      description: Descreve a configuração física do corpo do saxofone soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Saxofone soprano, tipo de defletor da boquilha
      description: Descreve o design do defletor/teto da boquilha, o contorno atrás
        da ponta, afetando brilho, projeção e resposta.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Saxofone soprano, tamanho da câmara da boquilha
      description: Descreve o tamanho da câmara interna da boquilha do saxofone soprano,
        que influencia a resistência e a cor tonal.
    soprano_saxophone_mouthpiece_finish:
      name: Acabamento das boquilhas para saxofone soprano
      description: Acabamento/revestimento aplicado à boquilha, se aplicável.
    soprano_saxophone_mouthpiece_included_accessories:
      name: Saxofone soprano boquilha acessórios incluídos
      description: Identifica quais acessórios estão incluídos com a boquilha.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Saxofone soprano boquilha caráter tonal
      description: Perfil tonal geral comumente associado ao design da boquilha.
    sound_character:
      name: Som caráter
      description: Descreve o timbre geral produzido pelo slapstick.
    sound_expansion_method:
      name: Som expansão método
      description: Especifica como o módulo pode adicionar ou expandir sua biblioteca
        interna de sons além dos sons de fábrica, por exemplo, pacotes de conteúdo,
        importação de samples, placas de expansão.
    sound_module_sound_library_focus:
      name: Módulo de som biblioteca de sons foco
      description: Ênfase principal do conjunto de sons de fábrica para ajudar os
        compradores a encontrar o módulo certo para seu estilo/caso de uso.
    sound_port_type:
      name: Tipo de porta de som
      description: Descreve o design do orifício/abertura sonora na parte traseira
        do cajón, que influencia a projeção e a resposta de graves.
    sound_sensitivity_control:
      name: Som controle de sensibilidade
      description: Indica se e como a sensibilidade sonora pode ser ajustada.
    sound_synthesizer_patch_memory:
      name: Sintetizador memória de patches
      description: Indica se o sintetizador pode armazenar e recuperar presets (patches).
    sound_type:
      name: Som tipo
      description: Tipo(s) principal(is) de som ou saídas de áudio que o tapete produz,
        por exemplo, instrumentos, músicas, comandos de voz, para orientar a brincadeira.
    soundboard_material:
      name: Tampo harmônico material
      description: Material usado no tampo harmônico da harpa, que impulsiona a ressonância
        e o timbre.
    soup_or_broth_variety:
      name: Sopa ou caldo variedade
      description: Especifica o estilo, a receita ou o preparo culinário da sopa ou
        do caldo para que os compradores encontrem rapidamente seu tipo preferido.
    sour_cream_variety:
      name: Creme de leite azedo variedade
      description: Classifica os produtos de creme de leite azedo por sua variedade
        específica ou estilo cultural, como crème fraîche ou crema mexicana.
    soy_sauce_variety:
      name: Variedade de molho de soja
      description: Identifica o estilo ou a formulação específica do molho de soja,
        por exemplo, claro, escuro, tamari, ponzu, permitindo que os compradores filtrem
        rapidamente por perfil de sabor e uso culinário.
    spark_plug_electrode_material:
      name: Vela de ignição eletrodo material
      description: Material/tecnologia da(s) ponta(s) do eletrodo de ignição da vela,
        central e/ou terra, conforme anunciado, por exemplo, cobre, platina, irídio.
    spark_plug_seat_type:
      name: Vela de ignição assento tipo
      description: Estilo de vedação/assento usado pela vela de ignição na interface
        com o cabeçote do cilindro.
    spark_plug_terminal_type:
      name: Tipo de terminal do plug do Spark
      description: Estilo do terminal superior usado para conectar o cabo/cachimbo
        de ignição.
    sparkler_shape:
      name: Estrelinha formato
      description: Formato geral de novidade da estrelinha.
    speaker_cone_material:
      name: Alto-falante cone material
      description: Material principal do cone do alto-falante, woofer/cone médio.
    speaker_size:
      name: Tamanho do alto-falante
      description: Tamanho nominal do driver/tamanho de encaixe do alto-falante componente,
        por exemplo, 6,5 pol., 6×9 pol., usado para corresponder aos locais de fábrica
        e adaptadores de alto-falante.
    special_effects_output_interface:
      name: Efeitos especiais interface de saída
      description: Especifica o conector/interface de saída usado para controlar dispositivos
        de efeitos especiais.
    special_effects_stand_stability_features:
      name: Suporte para efeitos especiais recursos de estabilidade
      description: Especifica recursos integrados de estabilidade e segurança destinados
        a evitar tombamento ou deslizamento durante eventos.
    specialty_malt_name_type:
      name: Malte especial nome/tipo
      description: Identifica o tipo específico de malte especial nomeado, muitas
        vezes usado como nome do estilo comercial.
    specimen_presentation:
      name: Espécime apresentação
      description: Indica como o espécime colecionável é preparado ou apresentado,
        por exemplo, bruto/não preparado, polido, cortado ou montado.
    speed_bag_accessories_included:
      name: Acessórios da bolsa Speed incluídos
      description: Lista os itens adicionais fornecidos com a pera rápida, como luvas,
        bombas de ar, swivels, correntes ou suportes.
    speed_rating:
      name: Velocidade classificação
      description: Indica a velocidade da superfície de jogo proporcionada pelo tecido
        da mesa de bilhar, por exemplo, lenta, média ou rápida.
    speedometer_backlight_type:
      name: Velocímetro retroiluminação tipo
      description: Especifica se e como o velocímetro é retroiluminado para visibilidade
        noturna.
    speedometer_display_type:
      name: Velocímetro display tipo
      description: 'Indica o estilo de leitura de velocidade do velocímetro: ponteiro/mostrador
        analógico, leitura numérica digital ou uma combinação de elementos analógicos
        e digitais.'
    speedometer_unit_of_measure:
      name: Velocímetro unidade de medida
      description: Especifica as unidades de velocidade exibidas no mostrador/visor.
    spike_replaceability:
      name: Cravo substituibilidade
      description: Indica se os cravos da chuteira são substituíveis, fixos ou se
        a chuteira não possui cravos.
    spike_shape:
      name: Cravo formato
      description: Identifica o estilo geométrico da ponta do pino do cravo, que influencia
        a aderência e a adequação a diferentes superfícies de pista.
    spike_thread_size:
      name: Tamanho dos cabos do Spike
      description: Especifica o tamanho ou padrão da base rosqueada que é parafusada
        no calçado, por exemplo, 1/4-20.
    spin_classification:
      name: Classificação da rotação
      description: Indica o perfil de rotação para o qual o disco foi projetado, baixo,
        médio, alto, hiper spin.
    spin_profile:
      name: Perfil de rotação
      description: Especifica as características relativas de spin que o eixo promove.
    spin_types_supported:
      name: Tipos de spin compatíveis
      description: Lista os tipos de spin que a máquina pode aplicar às bolas para
        que os jogadores possam praticar contra diferentes estilos de jogada.
    spinach_preparation_style:
      name: Estilo de preparação do espinafre
      description: Descreve o preparo físico das folhas de espinafre ou o formato
        do produto, por exemplo, folhas inteiras, picado, cubos.
    spinach_variety:
      name: Espinafre variedade
      description: Identifica a variedade botânica ou comercial do espinafre, por
        exemplo, baby, savoy, d’água, vermelho, permitindo que os compradores selecionem
        exatamente o tipo desejado.
    spindle_bearing_surface_material:
      name: Fuso superfície de apoio material
      description: Material da ponta/superfície de apoio usada em fusos de suporte,
        ponta/base, afetando a suavidade e o desgaste.
    spindle_bearing_type:
      name: Tipo de rolamento do eixo
      description: Tipo de ponta/interface de apoio do fuso que reduz o atrito contra
        a tigela/copo de suporte.
    spindle_finish:
      name: Fuso acabamento
      description: Acabamento/revestimento da superfície do fuso que afeta a sensação
        ao toque, a durabilidade e a estética.
    spindle_hook_type:
      name: Fuso gancho tipo
      description: Mecanismo de retenção do fio na parte superior do fuso usado para
        prender o fio-guia/fio.
    spindle_support_method:
      name: Fuso suporte método
      description: Como o fuso deve ser apoiado durante a fiação.
    spindle_tip_style:
      name: Fuso ponta estilo
      description: Formato/design da ponta que repousa na tigela/copo (a superfície
        de apoio, afetando o atrito e a suavidade da fiação).
    spindle_whorl_position:
      name: Posição do espiral do eixo
      description: Onde o volante fica posicionado na haste do fuso.
    spinner_blade_shape:
      name: Spinner lâmina formato
      description: Identifica o formato principal da lâmina usada no spinner, influenciando
        vibração, brilho e profundidade de trabalho.
    spinner_control_card_design_type:
      name: Spinner cartão de controle design/tipo
      description: Descreve o tipo de cartão de controle de spinner em termos de como
        apresenta informações de controle (por exemplo, referência de proporção, referência
        de tensão, tabela de conversão).
    spinner_subtype:
      name: Subtipo do ícone de carregamento
      description: Classifica o design geral ou a família do spinner (por exemplo,
        spinner inline, spinnerbait).
    spinning_oil_application_area:
      name: Óleo para roda de fiar área de aplicação
      description: Especifica o(s) ponto(s) de aplicação pretendido(s) em uma roda
        de fiar para o óleo.
    spinning_oil_application_tool:
      name: Ferramenta de aplicação de óleo na rotação
      description: Indica o estilo da ponta do aplicador/embalagem usado para aplicar
        óleo às peças da roda de fiar com dosagem controlada.
    spinning_oil_features:
      name: Óleo para roda de fiar recursos
      description: Destaca propriedades funcionais relevantes para óleos de roda de
        fiar (resíduos, manchas, oxidação e lavabilidade).
    spinning_top_features:
      name: Principais recursos de rotação
      description: Recursos especiais de brincadeira incluídos no pião além do giro
        básico.
    spinning_top_launch_mechanism:
      name: Pião mecanismo de lançamento
      description: Como o pião é iniciado/impulsionado para girar.
    spinning_wheel_brake_tension_system_type:
      name: Roda de fiar freio/tensão sistema tipo
      description: Especifica o sistema de freio/tensão de recolhimento usado para
        controlar a entrada do fio.
    spinning_wheel_drive_system:
      name: Sistema de acionamento de rotação da roda
      description: Indica o sistema de acionamento para o qual a bobina é destinada.
    spinning_wheel_hook_system:
      name: Roda de fiar sistema de ganchos
      description: Especifica como o fio é guiado ao longo dos braços da aleta.
    spinning_wheel_part_application:
      name: Roda de fiar peça aplicação
      description: Especifica a quais componentes da roda de fiar o óleo é destinado.
    spinning_wheel_portability_foldability:
      name: Roda de fiar portabilidade/dobrabilidade
      description: Indica se a roda foi projetada para dobrar/recolher para transporte.
    spinning_wheel_tension_adjustment_type:
      name: Roda de fiar ajuste de tensão tipo
      description: Como a tensão é ajustada na roda para controle de recolhimento.
    splice_termination_type:
      name: Emenda/terminação tipo
      description: Especifica a terminação de ponta fornecida na linha de âncora (por
        exemplo, olhal emendado, sapatilha, gancho de corrente).
    split_shot_cut_type:
      name: Chumbinho bipartido corte tipo
      description: Especifica o estilo de ranhura ou abertura que permite a fixação
        à linha.
    split_shot_shape:
      name: Formato de chumbada dividido
      description: Descreve a forma física do chumbinho bipartido, afetando a hidrodinâmica
        e a resistência a enroscos.
    split_shot_size:
      name: Chumbinho bipartido tamanho
      description: Código de tamanho alfanumérico padronizado (por exemplo, SSG, AAA,
        BB, 1) usado por fabricantes e pescadores para classificar chumbinhos bipartidos.
        Complementa medições de peso exatas.
    spoiler_adjustability:
      name: Spoiler ajustabilidade
      description: Indica se o ângulo/altura do spoiler é ajustável.
    spoke_accessory_function:
      name: Raio acessório função
      description: Classifica a função principal do acessório na roda, como decorativa,
        refletiva ou iluminada.
    spoke_butting_profile:
      name: Raio perfil de espessura
      description: Descreve como o diâmetro do raio muda ao longo de seu comprimento
        (liso, com redução simples, com redução dupla, com redução tripla ou com redução
        quádrupla), afetando o peso e a resistência.
    spoke_gauge:
      name: Raio calibre
      description: Especifica o calibre (classificação de espessura do fio) dos raios
        com os quais o nipple é compatível.
    spoke_interface_type:
      name: Tipo de interface Spoke
      description: Indica o estilo de cabeça do raio para o qual o cubo foi projetado
        (curvado em J, reto, cabeça em T).
    spoke_shape:
      name: Formato do raio
      description: Especifica a seção transversal externa do fio do raio, que influencia
        a aerodinâmica e a estética.
    spool_form_factor:
      name: Formato da bobina
      description: O estilo físico do corpo do carretel e como a linha/fio é retido,
        por exemplo, com flange ou cônico.
    spoon_style:
      name: Estilo da isca colher
      description: Indica o subtipo funcional ou estilo da isca colher, como arremesso,
        flutter ou corrico.
    sports_bra_padding_type:
      name: Tipo de bojo do top esportivo
      description: Especifica o tipo de bojo presente no top esportivo.
    sports_cap_style:
      name: Estilo do boné esportivo
      description: Identifica a construção/estilo geral do boné, por exemplo, boné
        de beisebol ou snapback, independentemente da marca do time.
    sports_governing_body_certification:
      name: Certificação do órgão regulador esportivo
      description: Indica as certificações ou aprovações oficiais de órgãos reguladores
        esportivos reconhecidos, confirmando que o produto atende aos padrões de competição.
    sports_surface_compatibility:
      name: Compatibilidade com superfície esportiva
      description: Compatibilidade com superfície esportivaLista os tipos de quadra,
        campo ou superfície em que a tinta pode ser aplicada com segurança.
    sports_toy_set_contents:
      name: Conteúdo do conjunto de brinquedos esportivos
      description: Identifica quais componentes estão incluídos no conjunto de brinquedos
        esportivos, por exemplo, bola, taco, rede, alvos.
    spray_string_cleanup_method:
      name: Serpentina em spray método de limpeza
      description: Forma recomendada de remover/limpar resíduos de serpentina em spray.
    spray_string_finish_effect:
      name: Serpentina em spray acabamento/efeito
      description: Efeito visual da serpentina em spray após a aplicação, como brilho/refletividade
        e efeitos especiais.
    spray_string_formulation_type:
      name: Serpentina em spray tipo de formulação
      description: Como o produto se comporta durante e após a pulverização, por exemplo,
        lavável ou estilo permanente.
    spray_string_recommended_surface:
      name: Serpentina em spray superfície recomendada
      description: Tipos de superfície em que a serpentina em spray deve ser usada
        e provavelmente removida com facilidade.
    spray_string_scent:
      name: Serpentina em spray aroma
      description: Fragrância ou perfil de odor, se houver, da serpentina em spray.
    spray_string_suitable_age_group:
      name: Serpentina em spray faixa etária adequada
      description: Idade mínima recomendada do usuário/faixa etária recomendada para
        uso seguro.
    spread_consistency:
      name: Pasta consistência
      description: Descreve a textura/consistência do molho ou pasta para definir
        expectativas sobre a sensação na boca e o uso, por exemplo, lisa, com pedaços,
        batida.
    spread_variety:
      name: Pasta variedade
      description: Classifica o tipo específico de pasta de frutas, por exemplo, geleia,
        jelly, marmelada, curd, para que os compradores possam distinguir entre diferentes
        estilos de preparo e texturas.
    spreader_bar_type:
      name: Tipo de barra extensora
      description: Indica o tipo de barra espaçadora ou sistema de gancho fornecido
        ou compatível com o arnês.
    sprint_canoe_class:
      name: Canoa de velocidade classe
      description: Especifica a designação oficial da classe de corrida de canoa de
        velocidade.
    sprout_presentation:
      name: Broto apresentação
      description: Identifica a apresentação física do produto, por exemplo, brotos
        frescos, microgreens, vaso de cultivo vivo, pó.
    squash_and_gourd_variety:
      name: Abóbora e cabaça variedade
      description: Identifica o cultivar ou a variedade comercial específica da abóbora
        ou cabaça, ajudando os compradores a localizar rapidamente o tipo desejado.
    stability_class:
      name: Estabilidade classe
      description: Classificação geral de estabilidade derivada das classificações
        de voo ou alegações de marketing.
    stabilizer_thread_size:
      name: Estabilizador tamanho da rosca
      description: Especificação da rosca usada para prender um estabilizador ou acessório
        a um arco ou besta.
    stabilizer_type:
      name: Estabilizador tipo
      description: Identifica o estilo ou a classificação posicional do estabilizador
        de arco ou besta.
    stages_supported:
      name: Estágios compatíveis
      description: Indica com quantos estágios um foguete ou kit foi projetado para
        voar.
    stain_remover_format:
      name: Removedor de manchas formato
      description: Especifica a forma/formato de aplicação do produto usado para tratar
        manchas em veículos, como frasco spray, aerossol, espuma, gel, pó, lenços
        umedecidos, caneta/marcador.
    stake_shape:
      name: Estaca formato
      description: Define a seção transversal ou o estilo de design de uma estaca
        de barraca, o que afeta a fixação em diferentes tipos de solo.
    stamp_block_features:
      name: Bloco para carimbo recursos
      description: Destaca os recursos funcionais de blocos para carimbo, como grades
        de medição, alças ou superfícies antiderrapantes.
    stamp_block_type:
      name: Bloco para carimbo tipo
      description: Especifica a construção/estilo do bloco para carimbo usado para
        montar carimbos para carimbar, por exemplo, bloco acrílico transparente, bloco
        com base de madeira ou bloco de posicionamento.
    stamp_set_pieces_included:
      name: Peças do conjunto de tampões já incluídas
      description: Indica quais componentes estão incluídos no conjunto de carimbos
        e almofadas para carimbo, por exemplo, carimbos, almofadas de tinta, marcadores.
    stand_padding_material:
      name: Material de acolchoamento para o suporte
      description: Material usado nos pontos de contato para proteger o acabamento
        do instrumento, por exemplo, espuma, borracha, silicone.
    staple_fiber_animal_fiber_type:
      name: Fibra descontínua tipo de fibra animal
      description: Tipo específico de fibra de origem animal, caso o tipo de fonte
        da fibra em fio curto seja de origem animal.
    staple_fiber_crimp_level:
      name: Fibra descontínua nível de crimpagem
      description: Grau de crimpagem/ondulação natural da fibra.
    staple_fiber_preparation_type:
      name: Fibra descontínua tipo de preparação
      description: O estado de preparação/processamento da fibra como vendida, como
        ela é alinhada/manuseada, o que impacta fortemente o método de fiação, a facilidade
        de estiragem e o resultado final.
    staple_fiber_source_type:
      name: Fibra descontínua tipo de origem
      description: Categoria ampla de origem do conteúdo da fibra.
    starch_processing_type:
      name: Amido tipo de processamento
      description: Indica se o amido é nativo ou foi modificado física ou quimicamente,
        por exemplo, instantâneo, pré-gelatinizado, para fornecer propriedades funcionais
        específicas, como velocidade de espessamento ou tolerância à temperatura.
    starch_source:
      name: Amido fonte
      description: Especifica a fonte botânica da qual o amido culinário ou espessante
        é derivado, por exemplo, milho, batata, tapioca. A fonte é o principal diferencial
        dos amidos culinários e impacta diretamente a adequação para receitas, considerações
        sobre alérgenos e o comportamento de busca do consumidor.
    starfruit_variety:
      name: Carambola variedade
      description: Identifica o cultivar ou a variedade específica da carambola, por
        exemplo, Arkin, Fwang Tung.
    starter_drive_type:
      name: Tipo de acionamento do motor de arranque
      description: O tipo de mecanismo de acionamento/engate do motor de partida usado
        para engatar o pinhão à cremalheira.
    starter_pistol_action_type:
      name: Pistola de largada tipo de ação
      description: Identifica o mecanismo de disparo/ação da pistola de largada, por
        exemplo, ação simples, ação dupla, semiautomática.
    starter_pistol_caliber:
      name: Pistola de largada calibre
      description: Especifica o calibre da munição de festim ou do cartucho para o
        qual a pistola de largada é calibrada.
    starter_terminal_type:
      name: Tipo do terminal de ignição
      description: Especifica o estilo de terminal/conector usado para conexões elétricas
        no motor de partida ou solenoide do motor de partida, por exemplo, pino, terminal
        tipo espada, conector plugue.
    starting_block_anchoring_method:
      name: Bloco de partida método de ancoragem
      description: Descreve como os blocos se fixam à superfície da pista (por exemplo,
        cravos, ventosas, bases de borracha).
    steerer_tube_design:
      name: Tubo da espiga design
      description: Descreve o design estrutural do tubo da espiga—reto, cônico, rosqueado,
        etc.—que determina a compatibilidade com a caixa de direção e o quadro.
    steering_cable_end_fitting_type:
      name: Cabo de direção tipo de encaixe da extremidade
      description: Identifica o estilo de terminação/fixação nas extremidades de um
        cabo de direção de embarcação (extremidade do leme e extremidade do motor/tiller)
        para garantir compatibilidade com o comando de direção e os pontos de conexão
        do motor. Utilize a designação padrão ou do fabricante, quando aplicável.
    steering_column_adjustability_features:
      name: Coluna de direção recursos de ajuste
      description: Indica quais funções de ajuste estão integradas à coluna de direção.
    steering_column_ignition_provision:
      name: Coluna de direção provisão de ignição
      description: Indica se a coluna de direção foi projetada para aceitar um cilindro/interruptor
        de trava de ignição e/ou trava de direção.
    steering_column_shaft_end_interface_type:
      name: Coluna de direção extremidade do eixo tipo de interface
      description: Identifica o estilo de interface da extremidade do eixo da coluna
        de direção (por exemplo, estriado, double D, com chaveta).
    steering_column_shift_type:
      name: Coluna de direção tipo de câmbio
      description: Especifica se a coluna de direção inclui um mecanismo de câmbio
        montado na coluna e seu tipo de transmissão.
    steering_component_drive_type:
      name: Componente de direção tipo de acionamento
      description: Especifica o mecanismo de acionamento/assistência relevante para
        componentes de direção (particularmente bombas e sistemas EPS).
    steering_position:
      name: Direção posição
      description: Especifica se a van tem direção à esquerda ou direção à direita.
    steering_pump_pulley_type:
      name: Bomba de direção polia tipo
      description: Especifica o tipo/interface de acionamento da polia usado com a
        bomba de direção.
    steering_rack_finish_coating:
      name: Cremalheira de direção acabamento/revestimento
      description: Especifica o acabamento/revestimento externo para proteção contra
        corrosão.
    steering_rack_position:
      name: Posicionamento da barra de direção
      description: Especifica onde a cremalheira é montada/usada no sistema de direção
        do veículo.
    steering_wheel_cover_installation_type:
      name: Capa de volante tipo de instalação
      description: Como a capa de volante é instalada/fixada no volante.
    steering_wheel_grip_material:
      name: Volante material da empunhadura
      description: Especifica o material no aro/empunhadura do volante (onde as mãos
        entram em contato), que pode diferir do núcleo/raios do volante.
    steering_wheel_mounting_pattern:
      name: Volante padrão de montagem
      description: Especifica o padrão de montagem de parafusos/furos usado para fixar
        o volante a um cubo ou adaptador (por exemplo, 3 parafusos, 5 parafusos).
    steering_wheel_rim_material_grip_surface:
      name: Volante material do aro (superfície de empunhadura)
      description: Especifica o material principal de revestimento da empunhadura/aro
        (distinto do material geral de construção).
    stem_material:
      name: Piteira material
      description: Especifica o material usado especificamente para a piteira ou boquilha
        do cachimbo (por exemplo, acrílico, ebonite, lucite).
    stencil_machine_consumable_type:
      name: Máquina de estêncil tipo de consumível
      description: Especifica os consumíveis necessários para operar (se houver).
    step_surface_texture:
      name: Textura da superfície do degrau
      description: Especifica o piso do degrau ou o design/material da superfície
        destinado a melhorar a aderência e o conforto quando molhado.
    stepper_motion_type:
      name: Aparelho de step tipo de movimento
      description: Define o movimento de passada principal oferecido pela máquina.
    stick_bow_profile:
      name: Taco perfil de curvatura
      description: Especifica o perfil de curvatura (ou “tipo de curvatura”) da haste
        do taco de hóquei sobre grama, um fator crítico que influencia o controle
        da bola, o desempenho no drag-flick e o estilo de jogo.
    stick_construction:
      name: Montagem em bastão
      description: Especifica o estilo de construção do taco de hóquei, como composto
        de peça única, composto de duas peças ou madeira.
    stick_curvature_type:
      name: Bastão tipo de curvatura
      description: Descreve o perfil de curvatura do bastão de arremesso, que afeta
        a distância e a precisão do lançamento.
    stick_head_shape:
      name: Taco cabeça formato
      description: Define o formato da cabeça do taco, afetando o domínio da bola,
        o estilo de batida e o controle de bola em curta distância.
    stick_size_compatibility:
      name: Compatibilidade de dimensões do bastão
      description: Identifica o grupo de tamanho de taco de hóquei com o qual o produto
        é compatível (por exemplo, Youth, Junior, Intermediate, Senior, Goleiro, Universal).
    sticker_decal_features:
      name: Adesivo/decalque características
      description: Capta características de aplicação e desempenho específicas de
        adesivos/decalques (por exemplo, sem bolhas, reposicionável).
    sticker_finish:
      name: Acabamento em adesivo
      description: Descreve o acabamento da superfície/efeito visual dos adesivos.
    sticker_format:
      name: Adesivo formato
      description: Especifica o formato de varejo dos adesivos decorativos (por exemplo,
        folha, rolo, individual, livro).
    sticker_material_type:
      name: Adesivo tipo de material
      description: Especifica o substrato/material principal do adesivo decorativo
        (não os enfeites).
    stilt_foot_attachment_type:
      name: Perna de pau tipo de fixação do pé
      description: Especifica como o pé do usuário se fixa à perna de pau (por exemplo,
        tira com fivela, gancho & laço, com cadarço).
    stirrup_style:
      name: Estribo estilo
      description: Classifica o estilo específico de design ou disciplina dos estribos,
        abrangendo variações de segurança, disciplina e construção.
    stirrup_tread_material:
      name: Estribo material da pisada
      description: Especifica o material usado para a base de apoio do pé ou pisada
        do estribo, que afeta a aderência, o conforto e o desgaste.
    stitch_marker_and_counter_style:
      name: Marcador de ponto e contador estilo
      description: Especifica o estilo ou formato de um marcador de ponto ou contador
        de pontos/carreiras (por exemplo, marcador com trava, marcador de argola aberta,
        contador em anel, contador digital).
    stitch_types:
      name: Ponto tipos
      description: Tipos de pontos (funcionais e decorativos) que a máquina pode produzir.
    stitching_method:
      name: Costura método
      description: Indica como os painéis da bola são unidos.
    stitching_state:
      name: Costura estado
      description: Indica se as partes da peça de vestuário são fornecidas sem costura,
        semiprontas, costuradas ou prontas para usar.
    stock_car_race_series:
      name: Stock car série de corrida
      description: Especifica o órgão sancionador ou a série/classe de corrida para
        a qual o stock car foi construído para competir.
    stone_adhesion:
      name: Caroço aderência
      description: Indica se o caroço do pêssego ou da nectarina é solto, aderente
        ou semi-solto.
    stone_creation_method:
      name: Método de formação das pedras
      description: Especifica se a pedra é natural, cultivada em laboratório, simulada
        ou reciclada.
    stone_cut_grade:
      name: Pedra grau de lapidação
      description: Indica a avaliação geral da qualidade da lapidação da pedra.
    stone_cut_style:
      name: Estilo de corte das pedras
      description: Estilo de lapidação/faceta da pedra de vidro (por exemplo, facetada
        vs cabochão).
    stone_fruit_cultivar:
      name: Fruta de caroço cultivar
      description: Identifica o cultivar/variedade específico do pêssego ou da nectarina.
    stone_fruit_variety:
      name: Fruta de caroço variedade
      description: Distingue o subtipo dentro da categoria (por exemplo, pêssego,
        nectarina, pêssego donut/achatado).
    stone_setting_type:
      name: Pedra tipo de cravação
      description: Especifica como qualquer pedra é fixada na peça (aro, garra, pavê,
        etc.).
    stone_transparency:
      name: Pedra transparência
      description: Transparência/opacidade óptica da pedra de vidro.
    storage_case_type:
      name: Estojo de armazenamento tipo
      description: Indica o tipo de recipiente em que o conjunto vem para armazenamento
        e transporte (por exemplo, caixa, estojo, bolsa).
    storage_compartment_type:
      name: Compartimento de armazenamento tipo
      description: Especifica o tipo de compartimento de armazenamento que a boia
        de natação oferece para pertences pessoais.
    storage_media_and_transfer_methods_supported:
      name: Mídia de armazenamento e métodos de transferência compatíveis
      description: Mídia ou métodos de conexão compatíveis para importar/exportar
        samples e salvar/carregar projetos.
    storage_requirements:
      name: Armazenamento requisitos
      description: Especifica como o produto deve ser armazenado antes e/ou depois
        de aberto para manter a qualidade e a segurança.
    stove_jack_compatibility:
      name: Fogão compatibilidade com abertura para chaminé
      description: Indica se a barraca inclui uma abertura resistente ao fogo para
        um tubo de fogão.
    straight_pin_application:
      name: Alfinete reto aplicação
      description: Especifica o uso previsto para alfinetes retos.
    straight_pin_finish:
      name: Alfinete reto acabamento
      description: Descreve o acabamento da superfície ou revestimento do alfinete
        (por exemplo, niquelado), afetando a resistência à corrosão e o deslizamento.
    straight_pin_head_material:
      name: Alfinete reto material da cabeça
      description: Especifica o material da cabeça do alfinete (se presente), como
        plástico ou vidro.
    straight_pin_head_shape:
      name: Alfinete reto formato da cabeça
      description: Descreve o formato/estilo da cabeça do alfinete para usabilidade
        e visibilidade.
    strand_configuration:
      name: Configuração das cordas
      description: Indica quantas fileiras ou fios separados compõem a corrente de
        carteira (simples, dupla, tripla).
    strand_material:
      name: Fio material
      description: Especifica o material usado para os fios/fitas individuais.
    strap_attachment_hardware:
      name: Equipamentos de fixação das correias
      description: Especifica o tipo/design da ferragem usada para fixar a alça ao
        instrumento/ponto de suporte.
    strap_configuration:
      name: Tira configuração
      description: Indica o número de pontos de fixação ao capacete na tira (por exemplo,
        2 pontos, 4 pontos), o que é essencial para ajuste, segurança e requisitos
        da liga.
    strap_functionality:
      name: Tira funcionalidade
      description: Especifica o uso principal previsto ou o design da tira para tapete
        de yoga.
    strap_padding:
      name: Tira acolchoamento
      description: Indica o nível de construção acolchoada na tira, destinada a melhorar
        o conforto e distribuir o peso.
    strap_side:
      name: Tira lado
      description: Indica se a tira é projetada para a fixação esquerda, fixação direita
        ou vendida em par.
    strap_width:
      name: Tira largura
      description: Indica a largura relativa das alças de ombro (fina, média, larga)
        para orientar compradores que buscam cobertura ou suporte específicos.
    strength_classification:
      name: Classificação da tensão
      description: Rótulo de resistência de marketing comumente usado pelas marcas
        (por exemplo, Light, Strong, Extra Strong).
    strength_grade:
      name: Resistência grau
      description: Descreve a força de fixação/nível de resistência previsto do fecho
        de gancho e laço.
    stretch_level:
      name: Elasticidade nível
      description: Indica o quanto o tecido estica durante o uso.
    stretch_type:
      name: Elasticidade tipo
      description: Indica se o tecido tem elasticidade mecânica ou elástica e em qual(is)
        direção(ões).
    stretcher_bar_material:
      name: Barra de chassi material
      description: Material usado para as barras de chassi/estrutura (por exemplo,
        pinho, abeto, álamo, bétula, MDF/madeira engenheirada).
    strike_shield_shape:
      name: Escudo de impacto formato
      description: Especifica o formato geral da superfície de golpe de um escudo
        de impacto.
    string_core_shape:
      name: Corda núcleo formato
      description: Especifica o formato do fio do núcleo usado em cordas encapadas,
        afetando a sensação e a estabilidade.
    string_coverage:
      name: Corda cobertura
      description: Especifica quais cordas o capotraste parcial foi projetado para
        pressionar/cobrir (por contagem ou conjunto comum).
    string_end_type:
      name: Corda tipo de extremidade
      description: Especifica como a corda termina na ponte/arremate para compatibilidade
        (especialmente importante para violão/guitarra e alguns baixos).
    string_set_type:
      name: Tipo do conjunto de cordas
      description: Especifica se o produto é um conjunto completo ou corda(s) de reposição
        individual(is).
    strung_status:
      name: Encordoamento status
      description: Indica se a cabeça de lacrosse vem pré-encordoada com bolsa ou
        é vendida sem encordoamento.
    strut_placement:
      name: Posicionamento do amortecedor
      description: Especifica a posição de instalação prevista no veículo (dianteira/traseira
        e esquerda/direita) para o amortecedor.
    stud_attachment_type:
      name: Tipo de fixação dos pinos
      description: Especifica como os cravos/travas são fixados ou configurados no
        solado, impactando a tração, a manutenção e a conformidade com os regulamentos
        da liga.
    stud_configuration:
      name: Configuração dos pinos
      description: Define o formato e a disposição dos cravos/travas no solado, afetando
        a tração e o desempenho em várias superfícies.
    stud_material:
      name: Material dos pinos
      description: Identifica o material principal dos cravos/travas, informando durabilidade,
        peso e conformidade com regulamentos de segurança.
    stuffed_animal_features:
      name: Bicho de pelúcia características
      description: Destaca recursos integrados de brincadeira e conforto do bicho
        de pelúcia.
    stump_base_type:
      name: Estaca de críquete tipo de base
      description: Define o estilo da base ou sistema de montagem usado pela estaca
        de críquete (espeto, retorno por mola, borracha com peso, etc.).
    stump_mechanism:
      name: Mecanismo dos pinos
      description: Especifica o mecanismo de retorno ou montagem das estacas de críquete
        (por exemplo, retorno por mola, fixo).
    stump_size:
      name: Estaca de críquete tamanho
      description: Etiqueta categórica de tamanho usada para estacas de críquete,
        indicando a altura típica e a faixa etária adequada do jogador.
    subwoofer_installation_type:
      name: Alto-falante de graves tipo de instalação
      description: Como o alto-falante de graves deve ser instalado em um sistema
        de áudio veicular.
    sugar_cane_variety:
      name: Cana-de-açúcar variedade
      description: Identifica o cultivar específico ou a variedade de mercado da cana-de-açúcar,
        que pode afetar a cor, a doçura e o teor de fibras.
    sugar_content_level:
      name: Teor de açúcar nível
      description: Classifica o nível geral de açúcar ou a formulação do concentrado
        de bebida, permitindo que os compradores encontrem rapidamente opções regulares,
        reduzidas ou sem açúcar.
    sugar_refinement_level:
      name: Açúcar nível de refino
      description: Indica o grau ou estilo de refino (cor, teor de melaço ou nível
        de processamento).
    sugar_source:
      name: Origem do açúcar
      description: Identifica a origem botânica ou material da qual o açúcar é derivado.
    suit_fit:
      name: Terno ajuste
      description: Corte geral do terno, indicando o quão ajustado ele fica ao corpo.
    suit_pieces:
      name: Terno peças
      description: Especifica quantas peças coordenadas estão incluídas no conjunto
        de terno (por exemplo, 2 peças, 3 peças, 4 peças).
    suitable_for_anchoring_use:
      name: Adequado para uso em ancoragem
      description: Indica o uso previsto relacionado à ancoragem para a linha/corda.
    suitable_for_craft_type:
      name: Adequado para o tipo de artesanato
      description: Uso principal em trabalhos com agulha para o qual o fio de bloqueio
        é destinado.
    suitable_for_paint_type:
      name: Adequado para o tipo de tinta
      description: Indica com quais tipos de tinta a tela é destinada/segura para
        uso.
    suitable_for_swim_stroke:
      name: Adequado para estilo de natação
      description: Indica para qual(is) estilo(s) de natação a palmar é projetada
        ou otimizada.
    suitable_mounting_surface_material:
      name: Material da superfície de montagem adequado
      description: Especifica a superfície/material de montagem previsto ao qual o
        verso adesivo foi projetado para aderir.
    suitable_play_location:
      name: Local adequado para a atividade
      description: Ambiente(s) de brincadeira principal(is) previsto(s) para o brinquedo
        de moinho de areia & água.
    suitable_riding_conditions:
      name: Condições adequadas de direção
      description: Indica as condições de pedalada (por exemplo, seco, molhado, inverno)
        para as quais o lubrificante ou limpador de bicicleta é formulado.
    suitable_snow_conditions:
      name: Condições de neve adequadas
      description: Indica a(s) condição(ões) de neve principal(is) para a(s) qual(is)
        a cera de aderência é formulada.
    suitable_surface_type:
      name: Tipo de superfície adequado
      description: Especifica as superfícies de caminhada para as quais a aderência
        é projetada.
    suitable_table_size:
      name: Tamanho de mesa adequado
      description: Indica o(s) comprimento(s) da mesa de bilhar/sinuca que a luminária
        foi projetada para iluminar.
    sun_protection_rating_upf:
      name: Classificação de proteção solar (UPF)
      description: Fornece o nível certificado de proteção solar UPF da peça de vestuário.
    sun_shade_attachment_method:
      name: Método de fixação do para-sol
      description: Como o protetor solar é fixado à janela/para-brisa.
    sun_shade_style:
      name: Protetor solar estilo
      description: Construção/formato do produto para abrir e armazenar o protetor
        solar.
    sunchoke_variety:
      name: Alcachofra-de-jerusalém variedade
      description: Indica o cultivar ou variedade específico de alcachofra-de-jerusalém
        (topinambo), fornecendo informações detalhadas para jardineiros, chefs e compradores
        exigentes.
    sunflower_oil_variety:
      name: Variedade de óleo de girassol
      description: Classifica o perfil de ácidos graxos ou cultivar do óleo de girassol
        (por exemplo, alto oleico, médio oleico, linoleico).
    sunflower_variety:
      name: Girassol variedade
      description: Cultivar/variedade de girassol (variedades comuns de mercado para
        uso como flor de corte).
    support_brace_features:
      name: Munhequeira de suporte características
      description: Lista características funcionais notáveis da munhequeira de suporte,
        como tecido respirável, tala removível ou placa metálica ajustável.
    support_leg_count:
      name: Apoio número de pernas
      description: Número de pernas que fazem contato com o solo quando o bastão de
        tiro é usado (por exemplo, monopé, bipé, tripé).
    support_padding:
      name: Apoio acolchoamento
      description: Indica se a alça/suporte inclui acolchoamento integrado nos pontos
        de contato (pescoço/ombro/polegar).
    support_structure_type:
      name: Estrutura de suporte tipo
      description: Indica o método de construção usado para manter o quebra-vento
        em pé.
    supported_bowling_delivery_types:
      name: Tipos de lançamento de boliche compatíveis
      description: Especifica as variações de arremesso de críquete que a máquina
        pode simular, como inswing, outswing e tipos de spin.
    supported_dive_modes:
      name: Modos de imersão compatíveis
      description: Especifica os modos operacionais de mergulho compatíveis com o
        computador de mergulho, como Air, Nitrox ou Gauge.
    supported_equipment_type:
      name: Equipamento compatível tipo
      description: Identifica o equipamento de esportes de inverno que o suporte foi
        projetado para acomodar (por exemplo, esquis, snowboards, bastões de esqui).
    supported_spin_types:
      name: Tipos de spin compatíveis
      description: Especifica as variações de spin da bola que o lançador pode aplicar.
    supported_spool_bobbin_types:
      name: Tipos de carretel/bobina compatíveis
      description: Especifica quais formatos de carretel/bobina o enrolador elétrico
        foi projetado para aceitar.
    surf_wax_temperature_rating:
      name: Cera de surfe classificação de temperatura
      description: Especifica a faixa de temperatura da água para a qual a cera é
        formulada, garantindo aderência ideal em diferentes climas.
    surface_coating_or_finish:
      name: Revestimento ou acabamento da superfície
      description: Especifica qualquer tratamento de superfície protetor ou de melhoria
        de desempenho aplicado ao alicate.
    surface_coating_or_wrap:
      name: Superfície revestimento ou envoltório
      description: O tratamento da superfície externa usado para aderência/controle
        no bastão central (e, às vezes, nos bastões de mão).
    surface_finish:
      name: Superfície acabamento
      description: Descreve a sensação/textura da superfície da bola que impacta a
        aderência e o movimento durante o malabarismo de contato.
    surface_finish_prep:
      name: Superfície acabamento/preparação
      description: Indica a condição da superfície de atrito (por exemplo, retificada,
        usinada, bruta de fundição) no momento da venda.
    surface_types_included:
      name: Tipos de superfície incluídos
      description: Especifica qual superfície o kit inclui para desenho/pintura (se
        houver), como tela, bloco de papel, painéis de madeira ou nenhuma.
    surfboard_construction:
      name: Montagem da prancha de surfe
      description: Especifica a tecnologia principal de construção ou laminação da
        prancha de surfe.
    surfboard_tail_shape:
      name: Prancha de surfe formato da rabeta
      description: Define o contorno da rabeta da prancha, que influencia a manobrabilidade
        e a sustentação.
    suspension_bushing_type:
      name: Bucha de suspensão tipo
      description: Especifica o estilo funcional/de instalação da bucha de suspensão.
    suspension_configuration:
      name: Suspensão configuração
      description: Descreve se o triciclo tem suspensão e onde ela está localizada.
    suspension_material:
      name: Suspensão material
      description: Especifica o material das correntes, cordas ou cabos usados para
        pendurar o balanço.
    suspension_trainer_accessories_included:
      name: Treinador de suspensão acessórios incluídos
      description: Lista itens adicionais fornecidos com o kit de treinador de suspensão
        (por exemplo, âncora de porta, tira de extensão, bolsa de armazenamento),
        ajudando os compradores a entender o que vem na caixa e comparar o valor do
        conjunto.
    suspension_trainer_anchor_type:
      name: Treinador de suspensão tipo de ancoragem
      description: Define o estilo de montagem ou ponto de ancoragem para o qual as
        tiras são projetadas (por exemplo, porta, teto, árvore), informando a compatibilidade
        com o ambiente do usuário.
    suspension_type:
      name: Tipo de suspensão
      description: Especifica se o garfo é rígido ou usa um sistema de suspensão específico
        (ar, mola helicoidal, híbrido, elastômero, etc.), ajudando ciclistas a combinar
        o garfo ao seu estilo de pedalada.
    sustain_pedal_form_factor:
      name: Pedal de sustain formato
      description: Descreve o estilo físico do pedal de sustain (por exemplo, pedal
        de pé estilo piano vs pedal compacto), o que impacta a sensação e o uso previsto.
    sustain_pedal_switch_type:
      name: Pedal de sustain tipo de interruptor
      description: Indica se o pedal envia um sinal momentâneo (sustain enquanto pressionado)
        ou com trava (alternância).
    sustainability_certification:
      name: Sustentabilidade certificação
      description: Certificação ambiental ou de origem para o material de madeira.
    swab_intended_bassoon_section:
      name: Swab seção de fagote prevista
      description: Identifica qual parte do fagote o swab foi projetado para limpar
        (diferentes furos/partes exigem formatos e tamanhos diferentes de swab).
    swab_style:
      name: Swab estilo
      description: Descreve o design/formato físico do swab usado para passar por
        ou alcançar áreas do saxofone.
    swab_weight_material:
      name: Swab material do peso
      description: Material do peso/guia de passagem (se presente), que afeta o risco
        de arranhões e a durabilidade.
    swab_weight_style:
      name: Estilo de peso do bastão
      description: Especifica como o swab é pesado para passar pelo tubo do fagote.
    sway_bar_adjustability:
      name: Barra estabilizadora ajuste
      description: Se e como a rigidez da barra estabilizadora é ajustável (normalmente
        por meio de vários furos de montagem nas bieletas).
    sway_bar_coating:
      name: Barra estabilizadora revestimento
      description: Tratamento de superfície ou revestimento na barra estabilizadora
        para resistência à corrosão e aparência.
    sway_bar_fitment_front_rear_kit:
      name: Barra estabilizadora aplicação (dianteira/traseira/kit)
      description: Indica se a barra estabilizadora é destinada ao eixo dianteiro,
        eixo traseiro ou vendida como kit dianteiro e traseiro.
    sweatshirt_pocket_type:
      name: Moletom tipo de bolso
      description: Descreve o estilo dos bolsos presentes no moletom.
    sweet_potato_variety:
      name: Batata-doce variedade
      description: Identifica o cultivar específico ou a variedade de mercado da batata-doce.
    sweet_spot_position:
      name: Sweet spot posição
      description: Identifica onde o sweet spot do taco está localizado ao longo da
        lâmina, afetando o estilo de jogo e as condições do campo.
    sweetener_presence:
      name: Adoçante presença
      description: Especifica se há adoçantes adicionados na pasta de oleaginosas
        e em que nível.
    sweetening_type:
      name: Adoçamento tipo
      description: Descreve como o produto é adoçado ou seu nível de doçura.
    swim_armband_construction_type:
      name: Boia de braço para natação tipo de construção
      description: Define o estilo estrutural ou mecanismo de flutuação das boias
        de braço (inflável vs espuma sólida, híbrido, etc.).
    swim_belt_purpose:
      name: Cinto de natação finalidade
      description: Classificação funcional do cinto de natação (por exemplo, suporte
        de flutuação, hidroginástica, treino de resistência, cabo estático, fixação
        para paraquedas de arrasto, lastro de peso, caminhada segura na água).
    swim_board_features:
      name: Funcionalidades da prancha para natação
      description: Destaca características especiais ou melhorias da prancha de natação
        que aumentam a usabilidade ou a segurança.
    swim_bottom_length:
      name: Parte de baixo de roupa de banho comprimento
      description: Classifica a cobertura geral das pernas da sunga boxer (por exemplo,
        sungas curtas vs comprimento até o joelho).
    swim_buoy_features:
      name: Boia de natação características
      description: Captura características adicionais notáveis ou acessórios que aumentam
        a visibilidade, a segurança ou a utilidade da boia de natação.
    swim_cap_style:
      name: Touca de natação estilo
      description: Define a construção ou estilo de design da touca de natação (por
        exemplo, para cabelo comprido, dome/racing, bubble/turban).
    swim_diaper_feature:
      name: Características da roupa de banho
      description: Indica se a sunga tem um recurso integrado de fralda à prova de
        vazamentos ou exige/dispensa uma fralda de natação separada.
    swim_trainer_features:
      name: Colete de natação infantil características
      description: Destaca recursos funcionais ou de conforto adicionais do colete
        de natação infantil.
    swim_trainer_type:
      name: Tipo de simulador de natação
      description: Define o estilo estrutural ou formato do colete de natação infantil
        para facilitar a filtragem por design e finalidade de treinamento.
    swim_training_focus:
      name: Foco no treinamento de natação
      description: Identifica o principal objetivo de treinamento que a palmar atende
        (por exemplo, técnica, força, isolamento muscular).
    swim_weight_style:
      name: Estilo de natação com pesos
      description: Classifica o formato do peso de natação, ajudando os compradores
        a diferenciar tipos de produto fundamentalmente diferentes dentro da mesma
        categoria.
    swimbait_buoyancy:
      name: Swimbait flutuabilidade
      description: Indica como a swimbait se comporta na coluna d'água (flutuante,
        suspensa, afundante, etc.), permitindo que pescadores selecionem a isca correta
        para a profundidade-alvo e o estilo de recolhimento.
    swimbait_style:
      name: Swimbait estilo
      description: Classifica a construção ou o design de ação da swimbait, como paddle-tail
        ou glide bait.
    swimwear_pieces_included:
      name: Roupas de banho para natação já incluídas
      description: Lista os componentes individuais da peça de vestuário fornecidos
        no conjunto de burkini para que os compradores saibam exatamente o que vem
        na embalagem.
    swimwear_set_pieces_included:
      name: Peças do conjunto de moda praia já incluídas
      description: Lista os componentes da peça de vestuário fornecidos no conjunto
        de burkini para que os compradores saibam exatamente o que receberão (por
        exemplo, top, leggings, hijab/touca).
    swing_attachment_connection_type:
      name: Balanço tipo de fixação/conexão
      description: O tipo de conexão usado para pendurar o balanço em seu suporte
        (por exemplo, corda, corrente, tiras).
    swing_trainer_type:
      name: Tipo de simulador de rebatidas
      description: Classifica o estilo ou mecanismo do treinador de swing para que
        os compradores possam localizar rapidamente dispositivos que correspondam
        aos seus objetivos de treino.
    swing_training_objective:
      name: Objetivo do treinamento de rebatidas
      description: Classifica o foco, mecanismo ou objetivo principal de treino do
        treinador de swing (por exemplo, ritmo, velocidade, pegada).
    switch_electrical_positions:
      name: Interruptor posições elétricas
      description: Especifica o número e o comportamento das posições elétricas no
        interruptor (por exemplo, 3 posições, momentâneo ligado).
    swivel_type:
      name: Destorcedor tipo
      description: Especifica a configuração do destorcedor usada para reduzir o emaranhamento
        da guia.
    sword_scabbard_material:
      name: Bainha de espada material
      description: Especifica os principais materiais da bainha/funda incluída (se
        houver).
    synthesizer_form_factor:
      name: Sintetizador formato
      description: Descreve o formato físico/interface de execução do sintetizador.
    synthetic_feather_style:
      name: Pena sintética estilo
      description: Estilo/corte da pena sintética usada para diferentes visuais e
        técnicas de artesanato.
    synthetic_formulation_type:
      name: Formulação sintética tipo
      description: Especifica o tipo de formulação/base sintética (por exemplo, PAO,
        éster, Grupo III hidrocraqueado).
    syrup_base_ingredient:
      name: Ingrediente base da calda
      description: Identifica a planta principal ou fonte de açúcar da qual o xarope
        ou néctar é derivado (por exemplo, bordo, agave, açúcar de cana).
    syrup_variety:
      name: Xarope variedade
      description: Define o estilo geral ou categoria do xarope com base em sua formulação
        ou uso tradicional (por exemplo, bordo, saborizante de café, fruta, medicinal).
    t_shirt_fit:
      name: Camiseta ajuste
      description: Descreve o ajuste/corte geral previsto da camiseta.
    tabla_included_components:
      name: Tabla componentes incluídos
      description: Indica quais itens principais estão incluídos no anúncio do produto
        de tabla (tambor único vs conjunto, capas/estojos, martelo de afinação, etc.).
    tabla_set_pieces_included:
      name: Peças de jogo americano incluídas
      description: Indica quais componentes estão incluídos no conjunto de tabla (por
        exemplo, dayan, bayan, anéis, capas, ferramentas de afinação, bolsa).
    tabla_tonal_pitch_range_bayan:
      name: Tabla faixa tonal/de afinação (bayan)
      description: Descreve a categoria típica de faixa tonal/afinação para tambores
        bayan (graves) com base no tamanho e na construção.
    table_base_material:
      name: Materiais de base da mesa
      description: Identifica o material principal da base ou pedestal da mesa (distinto
        das pernas ou do tampo), auxiliando na filtragem específica por material.
    table_base_type:
      name: Mesa tipo de base
      description: Identifica o design estrutural que sustenta o tampo da mesa (por
        exemplo, pedestal, cavalete, base em X).
    table_coverage_position:
      name: Mesa posição de cobertura
      description: 'Indica para qual(is) posição(ões) da mesa de pingue-pongue a capa
        foi projetada: dobrada, em uso ou ambas.'
    table_hockey_part_type:
      name: Hóquei de mesa tipo de peça
      description: Identifica o tipo específico de componente dentro de sistemas de
        hóquei de mesa/ar/haste/bolha.
    table_leg_design:
      name: Mesa design da perna
      description: Identifica o estilo estrutural ou a geometria da perna, permitindo
        que os compradores encontrem estéticas e necessidades de suporte específicas.
    table_size:
      name: Mesa tamanho
      description: Tamanho geral comercialmente declarado da mesa de bilhar (em pés),
        permitindo que os compradores escolham rapidamente opções comuns, como mesas
        de bar de 7 pés ou mesas de torneio de 9 pés.
    table_size_category:
      name: Categoria de tamanho da mesa
      description: Classifica a mesa de pebolim pelo tamanho geral ocupado, ajudando
        os compradores a adequá-la ao espaço disponível sem calcular medidas.
    table_tennis_certification:
      name: Tênis de mesa certificação
      description: Lista normas oficiais ou aprovações de órgãos reguladores que o
        produto atende (por exemplo, ITTF, classes EN 14468-2).
    tabletop_tilt_function:
      name: Tampo de mesa função de inclinação
      description: Especifica se o tampo de mesa pode inclinar, virar ou girar em
        diferentes ângulos.
    tackle_components_included:
      name: Componentes dos equipamentos incluídos
      description: Lista os componentes específicos de pesca incluídos no kit para
        que os compradores saibam exatamente o que é fornecido.
    talking_drum_accessories_included:
      name: Tambor falante acessórios incluídos
      description: Lista os acessórios incluídos com o tambor falante (na caixa).
    talking_drum_cord_material:
      name: Tambor falante material dos cordões
      description: Material usado para os cordões/cordas de tensão que conectam as
        peles do tambor.
    talking_drum_tuning_mechanism:
      name: Tambor falante mecanismo de afinação
      description: Como a afinação do tambor é alterada/a tensão é aplicada durante
        a execução (ou ao configurar).
    tam_tam_construction_style:
      name: Tam-tam estilo de construção
      description: Estilo de construção/martelamento do tam-tam.
    tam_tam_items_included:
      name: Tam-tam itens incluídos
      description: Acessórios incluídos com o tam-tam (por exemplo, baqueta, suporte,
        capa).
    tamarillo_variety:
      name: Variedade Tamarillo
      description: Identifica o cultivar específico ou a variante de cor do fruto
        tamarilho.
    tamarind_variety:
      name: Tamarindo variedade
      description: Especifica a variedade botânica ou comercial do tamarindo, que
        pode influenciar sabor, textura e uso culinário.
    tambourine_frame_style:
      name: Pandeiro estilo da armação
      description: Descreve a configuração física da armação portátil usada para segurar/tocar
        o pandeiro.
    tambourine_head_material:
      name: Material da membrana do pandeiro
      description: Especifica o material da pele de toque (membrana) em pandeiros
        com pele.
    tambourine_jingle_configuration:
      name: Pandeiro configuração das platinelas
      description: Como as platinelas são organizadas ou construídas no pandeiro.
    tambourine_jingle_material:
      name: Pandeiro material das platinelas
      description: Especifica o material das platinelas do pandeiro (os discos de
        metal), o que afeta o timbre e a durabilidade.
    tambourine_mounting_type:
      name: Pandeiro tipo de montagem
      description: Como o pandeiro deve ser segurado ou montado durante a execução.
    tambourine_tuning_mechanism:
      name: Pandeiro mecanismo de afinação
      description: Especifica o sistema de afinação usado em pandeiros de mão afináveis
        (se aplicável).
    tank_model_scale:
      name: Modelo de tanque escala
      description: Especifica a proporção de escala do modelo de tanque (por exemplo,
        1:35, 1:72).
    tank_top_back_style:
      name: Regata estilo das costas
      description: Especifica o formato ou corte das costas da regata, que influencia
        o suporte, a mobilidade e a estética.
    tape_application_area:
      name: Região de aplicação da fita
      description: Especifica a parte do equipamento ou do jogador onde a fita deve
        ser aplicada, ajudando os compradores a escolher o estilo correto.
    tape_finish:
      name: Fita acabamento
      description: Acabamento superficial/visual (brilho ou textura) da fita.
    tape_purpose:
      name: Finalidade da fita
      description: Especifica o uso funcional principal da fita na manutenção ou personalização
        da raquete.
    tape_type:
      name: Fita tipo
      description: Classifica o estilo funcional ou construção da fita de hóquei,
        como tecido, polietileno transparente, grip, coesiva elástica, shin pad ou
        camurça.
    tapenade_main_ingredients:
      name: Tapenade ingredientes principais
      description: Especifica o ingrediente-base principal que define a tapenade (azeitona,
        tomate, berinjela, pimentão, etc.), útil para compradores com preferências
        ou restrições baseadas em ingredientes.
    tapestry_loom_loom_format:
      name: Tear de tapeçaria formato
      description: Formato geral/estilo de suporte do tear manual de tapeçaria.
    tapestry_loom_shedding_method:
      name: Tear de tapeçaria método de abertura da cala
      description: Como o tear cria uma cala (separa os fios da urdidura) para a passagem
        da trama.
    tapestry_loom_tensioning_system:
      name: Tear de tapeçaria sistema de tensionamento
      description: O método usado para tensionar e prender a urdidura no tear de tapeçaria.
    tar_head_material:
      name: Material do cabeçote em piche
      description: Identifica o material da pele do tar (membrana), que influencia
        fortemente a sensação, a durabilidade e o timbre.
    tar_playing_style:
      name: Tar estilo de execução
      description: Especifica a posição/técnica principal de execução para a qual
        o tar foi projetado.
    tar_tuning_system:
      name: Tar sistema de afinação
      description: Especifica como o tar é afinado (como a tensão da pele é ajustada).
    target_components:
      name: Componentes-alvo
      description: Especifica quais componentes de combustível/admissão de ar o produto
        se destina a limpar.
    target_relative_humidity_rh:
      name: Umidade relativa (UR) alvo
      description: A umidade relativa alvo pretendida que o produto foi projetado
        para manter dentro do ambiente do instrumento/estojo.
    target_resetting_mechanism:
      name: Alvo mecanismo de retorno
      description: Descreve como, ou se, um alvo retorna à sua posição original após
        ser atingido.
    target_trainer_type:
      name: Tipo de simulador de alvos
      description: Classifica o estilo ou formato geral do treinador de alvo para
        racquetball ou squash.
    targeted_contaminants:
      name: Contaminantes-alvo
      description: Tipos de micróbios ou parasitas que o produto é certificado para
        eliminar.
    targeted_muscle_group:
      name: Grupo muscular-alvo
      description: Grupo muscular principal que o acessório se destina a treinar ou
        oferecer suporte.
    taro_variety:
      name: Variedade de tapioca
      description: Especifica o cultivar, a espécie ou o nome comercial da raiz de
        taro oferecida (por exemplo, Purple Taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Guarnição de tassel tipo de cabeçalho
      description: Especifica a construção da parte superior de cabeçalho/montagem
        usada para fixar a guarnição de tassel a uma superfície (por exemplo, fita,
        trança, cordão).
    tassel_trim_use_case:
      name: Guarnição de tassel caso de uso
      description: Área principal de aplicação pretendida para a guarnição de tassel.
    taste_profile:
      name: Perfil de sabor
      description: Descreve as características dominantes de sabor da variedade de
        maçã.
    tea_variety:
      name: Variedade de chá
      description: Classifica o tipo ou estilo específico de chá ou infusão (por exemplo,
        preto, verde, matcha, rooibos) para que os compradores possam filtrar suas
        variedades preferidas.
    teasing_tool_style:
      name: Ferramenta de cardagem estilo
      description: O estilo físico ou formato da ferramenta de cardagem usada para
        abrir e misturar fibras (por exemplo, escova, ancinho, pente).
    tee_base_style:
      name: Tee base estilo
      description: Identifica o design estrutural da base de um tee de chute de rugby
        que dá suporte à bola.
    temper_hardness:
      name: Têmpera/dureza
      description: Indica o quão macio ou duro é o arame (o quanto ele mantém a forma).
    temperature_control_type:
      name: Tipo de controle de temperatura
      description: Como a temperatura da ferramenta é controlada/ajustada.
    tenkara_action_ratio:
      name: Tenkara proporção de ação
      description: Indica a proporção tradicional de flexão Tenkara que descreve onde
        a vara se curva sob carga (por exemplo, 6:4).
    tennis_ball_court_surface:
      name: Bola de tênis superfície da quadra
      description: Especifica a(s) superfície(s) de quadra para a(s) qual(is) a bola
        foi projetada para garantir desempenho e durabilidade ideais.
    tennis_ball_pressure_type:
      name: Bola de tênis tipo de pressão
      description: Identifica a pressão interna ou construção da bola (pressurizada,
        sem pressão, baixa compressão, espuma) que afeta o quique e a durabilidade.
    tennis_racket_grip_size:
      name: Raquete de tênis tamanho da empunhadura
      description: Especifica a circunferência padronizada do cabo da raquete (L0-L5
        ou equivalentes em polegadas) para garantir ajuste adequado à mão e conforto.
    tenor_flutophone_fingering_system:
      name: Flautofone tenor sistema de digitação
      description: Especifica o sistema de digitação usado pelo flautofone tenor (convenção
        de currículo/notação).
    tenor_recorder_joint_type:
      name: Flauta doce tenor tipo de junção
      description: Especifica o tipo de junção/conexão entre as seções da flauta doce
        tenor.
    tenor_saxophone_key_system:
      name: Saxofone tenor sistema de chaves
      description: Especifica o sistema/padrão de mecanismo de chaves usado (frequentemente
        referido como estilo francês/Boehm para saxofones).
    tenor_saxophone_pad_material:
      name: Saxofone tenor material das sapatilhas
      description: Especifica o material principal usado no acolchoamentos dos instrumentos.
    tenor_trombone_slide_type:
      name: Trombone tenor tipo de vara
      description: Tipo de vara usada no trombone tenor (por exemplo, padrão/reta
        vs gatilho/fluxo axial).
    tenor_trombone_valve_configuration:
      name: Trombone tenor configuração de válvula
      description: Indica se o trombone tenor tem uma válvula/acessório de rotor e
        qual configuração utiliza.
    tension_control_type:
      name: Tipo de controle de tensão
      description: Indica como (ou se) a lançadeira fornece arrasto/tensão ajustável
        na bobina/canela durante a alimentação.
    tension_mechanism:
      name: Mecanismo de tensão
      description: O estilo de tensionamento usado para controlar a alimentação da
        trama a partir da bobina/pirn durante a tecelagem.
    tension_pitch_modulation_system:
      name: Sistema de modulação de tensão/afinação
      description: Como o tambor falante altera a afinação/tensão durante a execução
        (por exemplo, ao apertar cordas de tensão).
    tension_system:
      name: Sistema de tensão
      description: O sistema de tensão/recolhimento da roda de fiar para o qual o
        kit de flyer se destina.
    tent_fabric_material:
      name: Material do tecido da tenda
      description: Identifica o tecido principal usado no sobreteto ou corpo da barraca,
        afetando o peso, a respirabilidade e a resistência às intempéries.
    tent_season_rating:
      name: Barraca classificação de estação
      description: Classifica a barraca pelo número de estações ou condições climáticas
        para as quais foi projetada (por exemplo, 3 estações, 4 estações, expedição).
    tent_setup_type:
      name: Tipo de montagem da tenda
      description: Indica o estilo estrutural de montagem da barraca, como autoportante,
        semiautoportante, não autoportante, inflável/airframe ou pop-up.
    tent_style:
      name: Barraca estilo
      description: Descreve o design estrutural da barraca (por exemplo, cúpula, túnel,
        estrutura em A).
    test_result_output_method:
      name: Resultado do teste método de saída
      description: Especifica como o testador de bateria veicular apresenta ou entrega
        os resultados do teste ao usuário (por exemplo, indicador, tela, impressão,
        app ou relatório de software).
    tether_strap_system:
      name: Sistema de tether/correia
      description: Tipo de sistema de tether ou correia usado para conectar o suporte
        de pescoço ao capacete/arnês (se aplicável).
    text_color:
      name: Texto cor
      description: Cor do texto impresso ou bordado na etiqueta, distinta da cor de
        fundo da etiqueta.
    textile_craft_machine_operation_type:
      name: Máquina de artesanato têxtil tipo de operação
      description: Como a máquina é operada (manual vs acionada por pedal vs motorizada/elétrica).
    textile_finish_treatment:
      name: Têxtil acabamento/tratamento
      description: Especifica tratamentos de superfície notáveis aplicados ao material
        têxtil.
    texture_inclusions:
      name: Inclusões de textura
      description: Especifica componentes texturais adicionados, como polpa de aloe,
        sementes de manjericão, nata de coco, popping boba ou pedaços de fruta.
    therapeutic_technology:
      name: Tecnologia terapêutica
      description: Especifica qualquer função terapêutica integrada, como gel refrescante,
        tiras magnéticas ou cerâmica infravermelha.
    thermal_set_components:
      name: Componentes do conjunto térmico
      description: Identifica se o produto inclui apenas a parte inferior, superior,
        ou ambas as peças em conjunto.
    thermal_weight:
      name: Peso térmico
      description: Indica a categoria de aquecimento do tecido da balaclava.
    thermostat_type:
      name: Termostato tipo
      description: O design funcional ou estilo de controle de um termostato do sistema
        de arrefecimento de veículo motorizado.
    thimble_guide_size:
      name: Guia de dedal tamanho
      description: Designação de tamanho do guia de dedal (tamanho de ajuste/cobertura),
        normalmente vendido como pequeno/médio/grande em vez de dimensões medidas.
    thread_connection_size:
      name: Rosca de conexão tamanho
      description: Define a especificação da rosca que conecta hastes, ponteiras e
        adaptadores (por exemplo, 6 mm, 5/16"-24).
    thread_construction:
      name: Linha construção
      description: Como a linha é construída ou tratada (por exemplo, linha mouliné
        trançada vs linha resinada).
    thread_cord_type_beading_pattern:
      name: Linha/cordão tipo (padrão de miçangas)
      description: Tipo de linha ou cordão recomendado usado para completar o padrão.
    thread_cutter_form_factor:
      name: Formato do cortador de cabos
      description: Identifica o estilo físico do cortador de linha, como tesoura manual,
        estilo pingente ou estilo anel.
    thread_cutter_mechanism:
      name: Cortador de linha mecanismo
      description: Descreve a ação ou o mecanismo de corte usado pelo cortador de
        linha.
    thread_cutter_safety_features:
      name: Características de segurança do cortador de cabos
      description: Indica recursos integrados de segurança, que reduzem o risco de
        cortes acidentais ou a proteção das lâminas durante o armazenamento.
    thread_cutter_usage_application:
      name: Cortador de linha uso/aplicação
      description: Indica o principal uso artesanal pretendido para o cortador de
        linha.
    thread_finish_treatment:
      name: Acabamento/tratamento dos cabos
      description: Acabamento ou tratamento de superfície aplicado à linha, afetando
        o manuseio e o desempenho (por exemplo, encerada, resinada, mercerizada).
    thread_material:
      name: Linha material
      description: Conteúdo principal de fibra/material da linha/fio de bordado (não
        tecido).
    thread_material_fiber:
      name: Linha material (fibra)
      description: Especifica a fibra/material principal da própria linha (não tecido).
    thread_package_format:
      name: Linha formato da embalagem
      description: Formato de embalagem da linha de costura (por exemplo, carretel,
        cone, bobina).
    thread_rack_compatible_spool_type:
      name: Suporte de linhas tipo de carretel compatível
      description: Tipo de pacote de linha que o suporte foi projetado para acomodar
        (carretéis vs cones, etc.).
    thread_standard_size:
      name: Tamanho padrão dos cabos
      description: Identifica o padrão de tamanho/peso da linha usado no rótulo do
        produto (por exemplo, wt, Tex, denier).
    thread_type:
      name: Linha tipo
      description: Especifica a construção/tipo de linha/fio de bordado para ponto
        cruz.
    thread_weight_system:
      name: Linha sistema de peso
      description: O padrão usado para expressar a espessura/peso da linha.
    thread_yarn_guide_mounting_attachment_style:
      name: Guia de linha e fio estilo de montagem/fixação
      description: Descreve como o guia é usado ou montado durante o uso.
    thread_yarn_guide_tension_control:
      name: Guia de linha e fio controle de tensão
      description: Indica se e como o guia fornece tensão/arrasto ajustável na linha
        ou fio.
    thread_yarn_organizer_features:
      name: Organizador de linha e fio recursos
      description: Destaca recursos funcionais de organização e portabilidade específicos
        para armazenamento de linha/fio.
    threader_intended_use:
      name: Uso pretendido do aplicador de cabos
      description: Indica o principal contexto artesanal para o qual o passador de
        linha manual foi projetado.
    threading_system:
      name: Sistema de passagem de linha
      description: Indica o método e os auxílios usados para passar a linha na overloque
        (por exemplo, manual, codificado por cores, guiado, passagem de linha por
        ar).
    threading_type:
      name: Tipo de cabeamento
      description: Indica se a joia usa roscas internas, roscas externas, não tem
        rosca ou não se aplica.
    throttle_type_scooter_conversion:
      name: Acelerador tipo (conversão de scooter)
      description: Especifica o formato/interface do acelerador incluído ou exigido
        pelo kit de conversão.
    throw_rope_end_attachment:
      name: Corda de arremesso fixação da extremidade
      description: O hardware de terminação/fixação ou laço fornecido na(s) extremidade(s)
        de trabalho da corda de arremesso.
    throw_rope_storage_packaging_type:
      name: Corda de arremesso tipo de armazenamento/embalagem
      description: Como a corda de arremesso é armazenada ou lançada (por exemplo,
        bolsa ou carretel).
    throw_rope_visibility_features:
      name: Corda de arremesso recursos de visibilidade
      description: Recursos de visibilidade e identificação destinados a tornar a
        corda mais fácil de ver na água/com pouca luz.
    thrower_operation_type:
      name: Tipo de funcionamento do lançador
      description: Classifica o estilo mecânico/de operação do lançador para filtragem
        rápida entre mecanismos manuais e automáticos.
    thumb_design:
      name: Polegar design
      description: Descreve como o polegar é incorporado à luva, afetando a segurança
        e a aderência.
    tiara_design:
      name: Design da tiara
      description: Especifica o estilo estrutural geral ou a silhueta da tiara.
    tie_down_points_straps_included:
      name: Pontos/correias de amarração incluídos
      description: Especifica se o suporte inclui pontos de amarração integrados e/ou
        correias incluídas para prender a motocicleta/scooter.
    tiling_format:
      name: Formato de mosaico
      description: Especifica o estilo de layout do PDF para montar páginas impressas.
    time_current_characteristic:
      name: Característica tempo-corrente
      description: Indica o comportamento tempo-corrente do fusível (por exemplo,
        ação rápida vs retardo de tempo), afetando a adequação para circuitos com
        corrente de partida.
    timer_count_mode:
      name: Temporizador modo de contagem
      description: Especifica o modo de contagem do temporizador, como contagem regressiva,
        contagem progressiva (cronômetro), ambos ou intervalo/repetição.
    timer_display_type:
      name: Temporizador tipo de exibição
      description: Indica como o temporizador de jogo apresenta o tempo restante (por
        exemplo, tela digital, mostrador analógico, ampulheta de areia ou sem exibição
        visual).
    timer_operating_modes:
      name: Modos de operação do temporizador
      description: Comportamentos do temporizador suportados para acionar efeitos.
    timing_belt_construction_material_rubber_compound:
      name: Correia dentada material de construção (composto de borracha)
      description: Composto de borracha principal da correia usado (por exemplo, HNBR),
        que impacta a resistência ao calor/óleo e a vida útil.
    timing_belt_profile:
      name: Correia dentada perfil
      description: Padrão de perfil/formato dos dentes da correia dentada (por exemplo,
        trapezoidal vs curvilíneo).
    timing_belt_reinforcement_cord_material:
      name: Correia dentada material do cordonel de reforço
      description: Especifica o material do cordonel de reforço interno dentro da
        correia dentada (por exemplo, fibra de vidro, aramida), afetando a resistência
        e o alongamento.
    timing_component_material:
      name: Materiais dos componentes do temporizador
      description: Material principal do componente de sincronismo (composto da correia,
        metal da corrente/engrenagem, material da tampa).
    tin_whistle_body_material:
      name: Apito irlandês material do corpo
      description: Captura materiais comuns do corpo do apito irlandês de forma mais
        específica do que a lista ampla de material do instrumento quando necessário.
    tin_whistle_bore_type:
      name: Apito irlandês tipo de furo
      description: Especifica o design do furo do apito irlandês.
    tin_whistle_included_accessories:
      name: Apito irlandês acessórios incluídos
      description: Acessórios incluídos com o apito irlandês (por exemplo, estojo,
        vareta de limpeza).
    tip_finish_coating:
      name: Acabamento/revestimento da extremidade
      description: Especifica o tratamento de superfície na extremidade de trabalho
        (por exemplo, cromado, revestido a pó) que afeta a resistência à corrosão
        e marcas no aro.
    tip_shape:
      name: Ponta formato
      description: Descreve o formato ou a nitidez da ponta da palheta de guitarra,
        que afeta a articulação e a sensação ao palhetar.
    tippet_rating:
      name: Tippet classificação
      description: Resistência máxima recomendada do tippet expressa em designações
        X de pesca com mosca (por exemplo, 4X).
    tire_changer_operation_type:
      name: Máquina de trocar pneus tipo de operação
      description: Especifica como uma máquina de trocar pneus é acionada/operada
        (por exemplo, manual, pneumática, hidráulica). Diferente do atributo geral
        "Fonte de energia"; use ao descrever o método de acionamento operacional da
        máquina.
    tire_changer_type:
      name: Máquina de trocar pneus tipo
      description: O estilo geral de operação, design ou nível de automação de uma
        máquina de trocar pneus.
    tire_compound_type:
      name: Tipo de composto do pneu
      description: Especifica a classificação do composto de borracha usado nos pneus
        (por exemplo, macio, chuva, slick), que influencia a tração e a durabilidade
        em diferentes condições.
    tire_load_range:
      name: Pneu faixa de carga
      description: Indica a classificação de lonas/faixa de carga do pneu (comumente
        para pneus LT), refletindo a capacidade de carga.
    tire_position:
      name: Pneu posição
      description: Posição de montagem recomendada no veículo.
    tire_repair_kit_components:
      name: Componentes do kit de reparo dos pneus
      description: Especifica os itens incluídos no kit, permitindo que os clientes
        comparem a completude do conjunto.
    tire_sidewall_type:
      name: Pneu tipo de lateral
      description: Especifica o estilo da lateral ou os recursos de construção.
    tire_speed_rating:
      name: Taxa de velocidade dos pneus
      description: Letra de classificação de velocidade do pneu (por exemplo, H, V,
        W) indicando a capacidade máxima de velocidade sustentada.
    tire_spoon_type:
      name: Espátula para pneu tipo
      description: Categoriza a espátula para pneu pelo formato da extremidade e pelo
        uso pretendido.
    tire_system_compatibility:
      name: Pneu compatibilidade do sistema
      description: Indica se o selante é destinado a configurações sem câmara, pneus
        com câmara ou ambos.
    tire_temperature_rating_utqg:
      name: Pneu classificação de temperatura (UTQG)
      description: Grau de resistência à temperatura UTQG para pneus automotivos (por
        exemplo, A, B, C).
    tire_traction_rating_utqg:
      name: Pneu classificação de tração (UTQG)
      description: Grau de tração UTQG para desempenho de frenagem em piso molhado.
    tire_tread_style:
      name: Padrão do sulco do pneu
      description: Descreve o padrão geral da banda de rodagem do pneu tubular, refletindo
        as características de terreno e tração pretendidas.
    tire_tube_type:
      name: Pneu tipo de câmara
      description: Se o pneu é projetado para uso sem câmara ou com câmara.
    title_status:
      name: Status do título
      description: Status legal/de registro do título do veículo.
    tobacco_application:
      name: Tabaco aplicação
      description: Indica o método de consumo ou aparelho de fumo pretendido para
        o qual o tabaco solto foi projetado.
    tobacco_cut_type:
      name: Tipo de corte do tabaco
      description: Especifica o corte físico ou estilo de preparo do tabaco solto,
        afetando a taxa de queima, o método de enchimento e a experiência geral de
        fumar.
    tobacco_strength:
      name: Tabaco intensidade
      description: Indica o corpo percebido ou o impacto de nicotina do tabaco quando
        consumido, ajudando os compradores a selecionar uma intensidade que corresponda
        à sua preferência.
    toe_construction:
      name: Composição da ponta
      description: Especifica a configuração da área dos dedos das botas de neoprene,
        que afeta o equilíbrio, a sensação na prancha e o aquecimento.
    toe_coverage:
      name: Proteção dos dedos
      description: Indica o tipo de cobertura dos dedos fornecida pela meia.
    toe_pick_style:
      name: Denteira estilo
      description: Descreve o design da denteira nas lâminas de patins artísticos.
    toe_protection_type:
      name: Tipo de proteção para os dedos
      description: Indica se e como a área dos dedos é reforçada para fins de segurança
        (por exemplo, biqueira de aço, biqueira macia).
    toe_reinforcement_type:
      name: Tipo de reforçador da ponta
      description: Detalha a construção da área dos dedos, influenciando a durabilidade
        e a compatibilidade com o calçado.
    toe_stop_stem_thread_size:
      name: Haste de freio dianteiro tamanho da rosca
      description: Especifica o tamanho da rosca das hastes de freio dianteiro para
        garantir compatibilidade com a base.
    tofu_preparation_style:
      name: Estilo de preparo do tofu
      description: Categoriza o estilo tradicional ou subtipo de tofu além da firmeza
        (por exemplo, silken, bloco, puff, pele, nó, fermentado).
    tom_mount_adjustment_features:
      name: Recursos de ajuste do suporte Tom
      description: " Especifica quais ajustes o suporte de tom oferece para posicionar
        o tambor (por exemplo, inclinação, rotação, altura)."
    tom_mount_components_included:
      name: Componentes da fixação superior incluídos
      description: Especifica quais peças estão incluídas com o suporte de tom (receptor,
        braço, esfera, braçadeiras, travas de memória, etc.).
    tom_mount_mounting_position:
      name: Suporte de tom posição de montagem
      description: Especifica onde o suporte de tom se destina a ser fixado (por exemplo,
        bumbo, suporte de prato, rack).
    tonneau_cover_mounting_style:
      name: Tipo de fixação da tampa tipo tonneau
      description: Indica como a capota marítima é instalada/fixada aos trilhos da
        caçamba da caminhonete.
    tool_case_form_factor:
      name: Estojo de ferramentas formato
      description: Identifica o estilo físico do estojo de ferramentas, impactando
        a portabilidade e o armazenamento (por exemplo, maleta, casco rígido).
    tool_functions_included:
      name: Ferramenta funções incluídas
      description: Lista as funções específicas de reparo ou manutenção que uma multiferramenta
        ou conjunto de ferramentas pode executar.
    top_bunk_access_method:
      name: Beliche superior método de acesso
      description: Indica como os ocupantes acessam o beliche superior da cama, auxiliando
        em considerações de segurança e espaço.
    top_fit:
      name: Top caimento
      description: Especifica a silhueta geral ou o caimento do top no corpo (por
        exemplo, justo ou oversized).
    top_hat_style:
      name: Cartola estilo
      description: Identifica a variação de estilo específica de uma cartola.
    top_soundboard_material:
      name: Tampo (tábua harmônica) material
      description: Especifica o material do tampo/tábua harmônica do violão/guitarra
        (a placa principal de produção do som).
    topping_form:
      name: Cobertura forma
      description: Define a forma física ou consistência da cobertura de sobremesa
        para ajudar os compradores a restringir rapidamente à aplicação desejada.
    topping_type:
      name: Cobertura tipo
      description: Indica a cobertura externa principal ou revestimento aplicado ao
        donut.
    tow_hook_type:
      name: Gancho de reboque tipo
      description: Indica se o kneeboard inclui um gancho de reboque integrado e especifica
        seu estilo de mecanismo.
    tow_point_configuration:
      name: Configuração do guincho
      description: Especifica a configuração do ponto de reboque (único, duplo, múltiplo)
        oferecida pela boia rebocável para diferentes posições de uso.
    tow_strap_protective_features:
      name: Cinta de reboque recursos de proteção
      description: Recursos notáveis de segurança e durabilidade incorporados à construção
        da cinta de reboque.
    tow_strap_type:
      name: Tipo de correia do guincho
      description: Indica a construção funcional da cinta de reboque, como cinta de
        reboque estática vs cinta de recuperação cinética.
    towable_tube_style:
      name: Boia rebocável estilo
      description: Identifica o design geral ou formato da boia rebocável, que determina
        a posição do usuário e a experiência de uso.
    towed_water_sport_discipline:
      name: Esporte aquático rebocado disciplina
      description: Especifica a principal atividade aquática rebocada para a qual
        a luva foi projetada.
    towel_features:
      name: Toalha recursos
      description: Lista características especiais ou extras incluídos com uma toalha.
    towel_style:
      name: Toalha estilo
      description: Classifica o design funcional ou formato da toalha de golfe.
    toy_airplane_control_type:
      name: Avião de brinquedo tipo de controle
      description: Especifica como o avião de brinquedo é controlado pelo usuário.
    toy_airplane_features:
      name: Avião de brinquedo recursos
      description: Destaca recursos notáveis de brincadeira presentes no avião de
        brinquedo.
    toy_airplane_flight_capability:
      name: Avião de brinquedo capacidade de voo
      description: Indica se o avião de brinquedo é projetado para realmente voar/planar
        ou se é principalmente para brincadeira/exposição no chão.
    toy_audio_features:
      name: Brinquedo recursos de áudio
      description: Lista as capacidades de áudio e efeitos sonoros integrados ao brinquedo.
    toy_boat_play_features:
      name: Barco de brinquedo recursos de brincadeira
      description: Destaca recursos interativos notáveis de barcos de brinquedo para
        descoberta e filtragem.
    toy_boat_recommended_play_environment:
      name: Barco de brinquedo ambiente de brincadeira recomendado
      description: Especifica o ambiente de brincadeira pretendido para o barco de
        brinquedo para apoiar as expectativas e a segurança dos compradores (por exemplo,
        banheira vs água aberta).
    toy_bowling_equipment_included:
      name: Boliche de brinquedo equipamento incluído
      description: Especifica quais componentes de boliche estão incluídos no conjunto
        de boliche de brinquedo (por exemplo, pinos, bola, pista/tapete, bolsa de
        transporte).
    toy_car_features:
      name: Carrinho de brinquedo recursos
      description: Destaca recursos de brincadeira integrados ao carrinho de brinquedo
        (separados da propulsão), como luzes, sons ou partes que abrem.
    toy_drawing_tablet_accessories_included:
      name: Acessórios para a mesa digitalizadora incluídos
      description: Acessórios adicionais incluídos além do próprio tablet (por exemplo,
        caneta extra, carimbos).
    toy_drawing_tablet_erase_method:
      name: Tablet de desenho de brinquedo método de apagar
      description: Como a superfície de desenho é limpa/apagada.
    toy_drawing_tablet_screen_type:
      name: Tablet de desenho de brinquedo tipo de tela
      description: O tipo de superfície de desenho/exibição usado (por exemplo, tablet
        LCD para escrita vs magnético).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Tablet de desenho de brinquedo instrumento de escrita/desenho
      description: Ferramenta principal usada para desenhar no tablet (tipo de caneta).
    toy_figure_sound_feature:
      name: Figura de brinquedo recurso sonoro
      description: Indica se a figura de animal produz sons e de que tipo (por exemplo,
        rugido, som realista de animal).
    toy_game_features:
      name: Recursos do brinquedo/jogo
      description: Destaca recursos notáveis de brincadeira ou construção relevantes
        para brinquedos de praia e areia.
    toy_gift_basket_items_included:
      name: Itens incluídos na cesta de presente contendo brinquedos
      description: 'Lista os principais tipos de itens de brinquedo incluídos na cesta
        de presente (por exemplo: brinquedo de pelúcia, conjunto de construção, quebra-cabeça).'
    toy_glider_launch_method:
      name: Método de lançamento de um modelo de planador
      description: Especifica como o planador de brinquedo é lançado, o que afeta
        o estilo de brincadeira e as expectativas dos compradores.
    toy_helicopter_control_type:
      name: Helicóptero de brinquedo tipo de controle
      description: Como o helicóptero de brinquedo é controlado/operado (independentemente
        da propulsão), como controle remoto manual, controle por app ou sem controle
        (voo livre).
    toy_helicopter_features:
      name: Helicóptero de brinquedo recursos
      description: Principais recursos funcionais de um helicóptero de brinquedo (especialmente
        modelos RC) que impactam a usabilidade e o valor de brincadeira.
    toy_jacks_set_items_included:
      name: Jogo de cinco-marias itens incluídos
      description: Especifica quais itens principais estão incluídos no jogo de cinco-marias
        de brinquedo (por exemplo, peças de cinco-marias, bola, bolsa).
    toy_keyboard_learning_mode:
      name: Teclado de brinquedo modo de aprendizagem
      description: Indica a abordagem educacional/de aprendizagem suportada pelo teclado
        de brinquedo (por exemplo, teclas iluminadas, músicas para acompanhar, aulas
        guiadas, aprendizagem assistida por app).
    toy_keyboard_sound_theme:
      name: Teclado de brinquedo tema sonoro
      description: Tipos de vozes de instrumentos/temas sonoros integrados oferecidos
        (além do piano simples).
    toy_kitchen_appliances_included:
      name: Cozinha de brinquedo eletrodomésticos incluídos
      description: Especifica o(s) eletrodoméstico(s) de cozinha representado(s) no
        conjunto de brincadeira quando o produto é um eletrodoméstico ou conjunto
        focado em eletrodomésticos.
    toy_kitchen_assembly_requirement:
      name: Cozinha de brinquedo requisito de montagem
      description: Indica se é necessária montagem e a complexidade aproximada da
        montagem.
    toy_kitchen_interactive_features:
      name: Cozinha de brinquedo recursos interativos
      description: Destaca elementos interativos comumente encontrados em cozinhas
        de brinquedo e acessórios relacionados.
    toy_motorcycle_feature_set:
      name: Motocicleta de brinquedo conjunto de recursos
      description: Principais recursos de brincadeira da motocicleta de brinquedo
        (selecione todos os aplicáveis).
    toy_motorcycle_scale:
      name: Motocicleta de brinquedo escala
      description: Proporção de escala para motocicletas de brinquedo/colecionáveis
        (por exemplo, 1:12).
    toy_parachute_launch_method:
      name: Paraquedas de brinquedo método de lançamento
      description: Como o brinquedo se destina a ser lançado/acionado para voo.
    toy_piano_and_keyboard_accessories_included:
      name: Piano e teclado de brinquedo acessórios incluídos
      description: Acessórios incluídos com o piano de brinquedo ou teclado de brinquedo.
    toy_playset_assembly_required:
      name: Playset de brinquedo montagem necessária
      description: Indica se é necessária montagem por adulto antes da brincadeira
        (além de simples encaixe).
    toy_playset_items_included:
      name: Itens do conjunto de brinquedos incluídos
      description: Lista os principais componentes incluídos no playset (o que vem
        na caixa).
    toy_safety_certification:
      name: Certificado de segurança do brinquedo
      description: Normas/marcas de segurança e conformidade aplicáveis a brinquedos
        no mercado do comprador (por exemplo, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Nave espacial de brinquedo recursos
      description: Indica recursos interativos/de brincadeira comuns integrados à
        nave espacial de brinquedo.
    toy_spaceship_size_class:
      name: Nave espacial de brinquedo classe de tamanho
      description: Indica uma classe aproximada de tamanho para a nave espacial de
        brinquedo para dar suporte à filtragem rápida, separada das dimensões exatas
        (comprimento/largura/altura) e não uma proporção numérica de escala do modelo
        (por exemplo, 1:72).
    toy_tableware_pieces_included:
      name: Inclui utensílios de cozinha de brinquedo
      description: Especifica quais itens de mesa de brinquedo estão incluídos (pratos,
        copos, talheres, peças de servir).
    toy_tool_electronic_features:
      name: Ferramenta de brinquedo recursos eletrônicos
      description: Descreve funções interativas/eletrônicas da ferramenta de brinquedo
        (luzes, sons, ação giratória, etc.).
    toy_tool_set_components_included:
      name: Componentes do conjunto de ferramentas de brinquedo incluídos
      description: Lista os itens específicos de ferramentas de faz de conta incluídos
        na embalagem (especialmente para conjuntos de ferramentas).
    toy_train_scale:
      name: Escala do trem de brinquedo
      description: Especifica o padrão de escala do trem de brinquedo/modelo (ou tamanho
        do sistema de trilhos) para garantir compatibilidade com trens e trilhos existentes.
    toy_train_track_layout_type:
      name: Trem de brinquedo tipo de layout dos trilhos
      description: Descreve o layout/formato dos trilhos incluídos para um conjunto
        de trem ou pacote de trilhos de expansão.
    toy_weapon_gadget_features:
      name: Arma e gadget de brinquedo recursos
      description: Destaca recursos interativos e funcionais comuns específicos de
        armas de brinquedo e gadgets de espião.
    tpms_sensor_frequency_band:
      name: Sensor TPMS banda de frequência
      description: Banda de radiofrequência suportada por acessórios relacionados
        a TPMS (quando aplicável).
    track_and_field_discipline:
      name: Atletismo disciplina
      description: Identifica o evento ou disciplina específica de atletismo para
        o qual o produto se destina (por exemplo, arremesso de peso, salto com vara,
        corridas de velocidade).
    track_event_specialization:
      name: Evento de pista especialização
      description: Indica o tipo de evento para o qual a sapatilha de spikes é otimizada.
    track_field_event_suitability:
      name: Atletismo adequação a eventos
      description: Identifica o(s) evento(s) específico(s) de atletismo para o(s)
        qual(is) o acessório de treinamento se destina.
    track_set_special_features:
      name: Conjunto de pista recursos especiais
      description: Destaca recursos notáveis de brincadeira incluídos com o conjunto
        de pista além da pista e dos carrinhos básicos.
    track_surface_compatibility:
      name: Rastrear a compatibilidade de superfície
      description: Indica a(s) superfície(s) de corrida para a(s) qual(is) o spike
        ou tênis foi projetado.
    tracking_aid_type:
      name: Acessório de rastreamento tipo
      description: Indica se o caiaque inclui dispositivos que melhoram o rastreamento
        em linha reta.
    traction_pattern_type:
      name: Padrão de tração tipo
      description: Descreve o sulco de superfície ou padrão de banda de rodagem principal
        que oferece aderência na almofada.
    trading_card_league:
      name: Cartas colecionáveis liga
      description: Identifica a liga esportiva associada ao conjunto de cartas ou
        ao tema (quando aplicável).
    trailer_construction:
      name: Reboque construção
      description: Identifica a construção principal do reboque para o chassi/carroceria
        (por exemplo, alumínio, aço ou construção mista).
    trailer_coupler_size:
      name: Reboque tamanho do acoplador
      description: Especifica o tamanho da esfera do acoplador do reboque necessário
        para reboque.
    trailer_hitch_mounting_location_method:
      name: Engate de reboque local/método de montagem
      description: Especifica onde e como o engate de reboque é montado no veículo
        (por exemplo, receptor traseiro, receptor dianteiro, montado no chassi, montado
        no para-choque, montado na caçamba).
    trailer_light_function:
      name: Luz de reboque função
      description: Função/posição principal da luz de reboque.
    trailer_suspension_type:
      name: Tipo de suspensão do reboque
      description: Especifica o tipo de sistema de suspensão usado no reboque para
        bicicleta, como mola helicoidal ou feixe de molas, para melhorar o conforto
        de rodagem e a proteção da carga.
    trailer_wiring_circuit:
      name: Circuito da fiação de reboque
      description: Lista os circuitos/sinais de iluminação, freio e auxiliares transportados
        pela fiação de reboque (ou seja, quais linhas de alimentação/terra e sinal
        estão presentes).
    trailer_wiring_connector_type:
      name: Fiação de reboque tipo de conector
      description: Especifica o padrão de plugue do lado do reboque/lado do veículo
        usado para chicotes e adaptadores de fiação de reboque.
    train_whistle_intended_use:
      name: Apito de trem uso pretendido
      description: Contexto principal de uso pretendido para o apito.
    train_whistle_sound_character:
      name: Apito de trem caráter sonoro
      description: Descreve o caráter tonal percebido do som do apito (timbre).
    trainer_mounting_type:
      name: Tipo de montagem do simulador
      description: Descreve como a bicicleta faz interface com o rolo de treino (por
        exemplo, roda apoiada ou transmissão direta).
    training_dummy_shape:
      name: Boneco de treino formato
      description: Especifica o design geral ou a silhueta do boneco, o que afeta
        a mordida do cão e o realismo do treinamento.
    training_focus:
      name: Treinamento foco
      description: Descreve a principal área de habilidade que o acessório visa trabalhar
        (por exemplo, reflexos, trabalho de pés, coordenação mão-olho).
    training_focus_area:
      name: Treinamento área de foco
      description: Especifica a principal habilidade de lacrosse que o acessório foi
        projetado para desenvolver.
    training_objective:
      name: Treinamento objetivo
      description: Especifica a principal habilidade ou técnica que o produto foi
        projetado para melhorar.
    training_surface_suitability:
      name: Superfície de treinamento adequação
      description: Especifica em quais superfícies o treinador pode ser usado.
    training_surface_usage:
      name: Superfície de treinamento uso
      description: Especifica as principais atividades que a superfície de treinamento
        suporta, distinguindo painéis de gelo sintético patináveis de tapetes para
        treino seco ou multiesporte.
    training_usage_type:
      name: Treinamento tipo de uso
      description: Especifica o principal período ou contexto de uso pretendido para
        as calças de desfralde, como treinamento diurno ou noturno.
    trampoline_enclosure_type:
      name: Trampolim tipo de fechamento
      description: Especifica a configuração de fechamento usada no trampolim, incluindo
        como/onde a rede é montada.
    trampoline_safety_certifications:
      name: Certificações de segurança para colchões
      description: Indica quais normas/certificações de segurança relevantes para
        trampolim o produto declara cumprir.
    transfer_application_method:
      name: Método de aplicação de transferência
      description: Especifica como o transfer é aplicado ao tecido (por exemplo, com
        ferro de passar vs prensa térmica).
    transfer_method:
      name: Transfer método
      description: Especifica como o design deve ser transferido para o tecido.
    transfer_peel_temperature:
      name: Transfer temperatura de remoção
      description: Especifica o estado de temperatura recomendado (quente, morno ou
        frio) no qual a folha transportadora deve ser removida após a prensagem.
    transmission_cooler_construction:
      name: Radiador de transmissão construção
      description: Especifica o design de construção do núcleo de um radiador de transmissão.
    transmission_fluid_specification:
      name: Fluido de transmissão especificação
      description: Padrão OEM/especificação que o fluido de transmissão atende (por
        exemplo, famílias Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Bucha do coxim de transmissão material
      description: Especifica o material elastomérico ou isolante usado na bucha/isolador
        do coxim (o elemento de amortecimento de vibração).
    transmission_mount_type:
      name: Coxim de transmissão tipo
      description: Especifica a construção/design de um coxim de transmissão (por
        exemplo, hidráulico vs sólido) para ajudar a determinar o encaixe, as características
        de NVH e o uso pretendido.
    transparency_level:
      name: Nível de transparência
      description: Descreve o quanto as paredes da caixa organizadora são transparentes,
        ajudando os compradores a decidir entre visibilidade clara e armazenamento
        oculto.
    transport_case_type:
      name: Estojo de transporte tipo
      description: Classifica o estilo estrutural/rigidez da solução de transporte,
        refletindo o nível de proteção e o método de embalagem.
    transposition_modes:
      name: Modos de transposição
      description: Especifica os modos de transposição/afinação de concerto que o
        afinador suporta (por exemplo, afinação de concerto e tonalidades transpositoras
        como B♭ ou E♭).
    trap_design:
      name: Projeto do sifão
      description: Identifica o estilo estrutural ou mecanismo da armadilha, que determina
        o método de implantação e as espécies ou ambientes para os quais é mais adequada.
    trap_spring_configuration:
      name: Armadilha configuração da mola
      description: Indica o número ou arranjo de molas que acionam a armadilha, o
        que afeta a força e a legalidade.
    travel_bassinet_accessories_included:
      name: Berço portátil acessórios incluídos
      description: Lista itens complementares fornecidos com o berço portátil.
    travel_spinning_wheel_assembly_required:
      name: Roda de fiar portátil montagem necessária
      description: Se a roda exige montagem/configuração além de desdobrar (por exemplo,
        fixação do flyer, tensão, pedais) antes do uso.
    travel_spinning_wheel_portability_features:
      name: Roda de fiar portátil recursos de portabilidade
      description: Elementos de design relacionados à portabilidade para rodas de
        fiar portáteis, como construção dobrável e soluções de transporte incluídas.
    travel_trailer_appliances_fuel_type:
      name: Trailer de viagem eletrodomésticos tipo de combustível
      description: Combustível principal usado para eletrodomésticos/aquecimento/cozimento
        a bordo (não o veículo de reboque).
    travel_trailer_holding_tank_type:
      name: Trailer de viagem tipo de tanque de retenção
      description: Indica quais tanques de retenção estão presentes no trailer de
        viagem (selecione todos os aplicáveis).
    travel_trailer_power_hookup_shore_power:
      name: Trailer de viagem conexão elétrica (energia de shore)
      description: Padrão(ões) de conexão elétrica suportado(s) para conexões de energia
        de shore.
    tread_pattern_type:
      name: Tipo de desenho do sulco
      description: Classifica o design geral da banda de rodagem do pneu, como slick,
        semi-slick ou cravado, que afeta a tração, a resistência ao rolamento e a
        superfície pretendida.
    treadmill_key_type:
      name: Esteira tipo de chave
      description: Descreve o estilo físico ou mecanismo de operação/conexão da chave
        de segurança (por exemplo, magnética redonda, inserto plástico, clip-on).
    treadmill_part_type:
      name: Tipo de peça da esteira
      description: Identifica o componente específico da esteira que o produto se
        destina a substituir para que os compradores possam confirmar rapidamente
        o encaixe (por exemplo, correia vs motor).
    treadmill_position:
      name: Esteira posição
      description: Indica a posição de instalação da peça na esteira (frontal, traseira,
        superior, inferior, central).
    triangle_striker_material:
      name: Triângulo material da baqueta
      description: Material da baqueta/percussor incluído.
    trigger_input_connector:
      name: Entrada de disparo conector
      description: Especifica o padrão de conector físico utilizado nos sinais de
        entrada do acionador.
    trigger_input_connector_type:
      name: Tipo de conector de entrada do acionador
      description: Especifica o tipo de conector físico usado para entradas de disparo.
    trigger_input_zone_support:
      name: Entrada de disparo suporte a zonas
      description: Indica se as entradas de disparo suportam disparos de zona única
        e/ou zona dupla (por exemplo, pele/aro) e implementações multizona semelhantes.
    trim_application_method:
      name: Método de aplicação do corte
      description: Indica como o aviamento deve ser fixado a um projeto (por exemplo,
        costurado, aplicado com ferro de passar, adesivo).
    trim_detail:
      name: Aviamento detalhe
      description: Identifica bordas ou acabamentos decorativos proeminentes na peça
        de roupa (por exemplo, aviamento com tassel, franja, aviamento de renda).
    trim_elasticity:
      name: Aviamento elasticidade
      description: Indica se o aviamento de sianinha tem elasticidade para uso em
        aplicações de malha/activewear.
    trim_finish:
      name: Aviamento acabamento
      description: Tratamento de acabamento de superfície aplicado ao aviamento (por
        exemplo, metálico, glitter, refletivo).
    trim_tilt_type:
      name: Trim & tilt tipo
      description: Se e como o motor suporta ajuste de trim/tilt.
    trolleybus_power_supply_type:
      name: Trólebus tipo de alimentação elétrica
      description: Especifica como o trólebus recebe energia de tração da rede elétrica.
    truck_bed_body_type:
      name: Caçamba/carroceria de caminhonete tipo
      description: Configuração da caçamba de carga ou carroceria atrás da cabine.
    truck_bed_length_class:
      name: Caçamba de caminhonete classe de comprimento
      description: Indica a classe de comprimento da caçamba de caminhonete para a
        qual a rede de carga foi projetada para se ajustar (comumente referida como
        caçamba curta/padrão/longa).
    truck_mounting_hole_pattern:
      name: Truck padrão de furos de montagem
      description: Especifica o layout dos furos usado para montar os trucks no deck
        (por exemplo, Old school, New school, Universal).
    truck_mounting_style:
      name: Tipo de montagem em reboque
      description: Como os trucks são fixados ao deck (top mount, drop-through, etc.),
        influenciando a altura de rodagem e a estabilidade.
    truck_profile:
      name: Truck perfil
      description: Indica a classificação de altura de rodagem do truck de skate em
        relação ao deck, afetando a folga das rodas e a sensação da prancha.
    trumpet_bell_material:
      name: Trompete material da campânula
      description: Material usado para a seção da campânula (às vezes difere do restante
        do instrumento).
    trumpet_leadpipe_material:
      name: Material do tubo de entrada da buzina
      description: Material ou tratamento usado para o tudel (tubo principal do bocal
        às válvulas).
    trundle_mechanism:
      name: Cama auxiliar mecanismo
      description: Descreve como o componente secundário da cama é desdobrado a partir
        da estrutura principal.
    trunk_part_type:
      name: Porta-malas tipo de peça
      description: Especifica qual componente da carroceria relacionado ao porta-malas
        está sendo vendido (por exemplo, tampa do porta-malas, dobradiça, trinco).
    tuba_leadpipe_material:
      name: Tuba material do tudel
      description: Identifica o material usado na seção do tudel (tubo de embocadura)
        da tuba.
    tube_base_type:
      name: Tipo de base do tubo
      description: Especifica a família de base/soquete da válvula usada para encaixe
        físico/elétrico (por exemplo, Octal, Noval/9 pinos).
    tube_matching_grade:
      name: Válvula grau de correspondência
      description: Indica se as válvulas são testadas/correspondidas como um conjunto
        e o tipo de correspondência fornecido.
    tube_weight_category:
      name: Categoria de peso do tubo
      description: Classifica a câmara pelo tipo de construção/peso (por exemplo,
        ultraleve, padrão, reforçada) para comparação rápida de durabilidade vs desempenho.
    tubeless_compatible:
      name: Compatível com tubeless
      description: Indica se a roda foi projetada para ser usada sem câmara de ar
        quando combinada com pneus tubeless.
    tubing_shape:
      name: Tubo formato
      description: Especifica o formato transversal do tubo de suporte do suporte.
    tubular_construction_type:
      name: Tipo de estrutura tubular
      description: Especifica o estilo de construção de pneus tubulares de bicicleta,
        distinguindo entre tubulares tradicionais colados e variações mais recentes.
    tulip_type_flower_form:
      name: Tulipa tipo (forma da flor)
      description: Especifica o tipo hortícola/forma da flor das tulipas no buquê
        (por exemplo, simples, dupla, papagaio).
    tuner_input_method:
      name: Afinador método de entrada
      description: Especifica como o afinador detecta a afinação (microfone, sensor
        de vibração/clipe, entrada por cabo do instrumento, captador de contato).
    tuning_mechanism:
      name: Mecanismo de afinação
      description: Como as peles do bongô são tensionadas/afinadas.
    tuning_system:
      name: Sistema de ajuste
      description: O modo de ajuste do tambor em formato de cálice ou se ele é regulável.
    turn_signal_lens_color:
      name: Lente de seta cor
      description: Cor da lente/cobertura visível na carcaça da seta (não a cor da
        luz emitida).
    turn_signal_lighting_style:
      name: Seta estilo de iluminação
      description: O estilo/animação de sinalização visual fornecido pela seta.
    turnip_and_rutabaga_variety:
      name: Nabo e rutabaga variedade
      description: Identifica o cultivar ou variedade específica do nabo ou da rutabaga.
    tweeter_crossover_type:
      name: Tweeter tipo de crossover
      description: Indica o tipo de crossover passa-altas e/ou componente de proteção
        incluído com o tweeter, se houver.
    tweeter_material:
      name: Tweeter material
      description: Material principal do diafragma/domo do tweeter.
    tweeter_mount_type:
      name: Tweeter tipo de montagem
      description: Especifica como o tweeter deve ser instalado no veículo (método/ferragens
        de montagem).
    twill_direction:
      name: Sarja direção
      description: Indica a direção da linha de sarja de uma trama de denim.
    twist_direction:
      name: Sentido da torção
      description: Direção da torção dos cabos usada no fio/linha (torção S ou torção
        Z).
    u_joint_series_size:
      name: Junta universal série/tamanho
      description: Especifica a série ou padrão de tamanho da junta universal usado
        (por exemplo, série 1310).
    uilleann_pipes_bag_material:
      name: Uilleann pipes material da bolsa
      description: Material do componente da bolsa de ar (se incluído), que impacta
        a sensação, a durabilidade e a manutenção.
    uilleann_pipes_handedness:
      name: Uilleann pipes lateralidade
      description: Indica se o conjunto é configurado para layout de execução destro
        ou canhoto.
    uilleann_pipes_set_configuration:
      name: Uilleann pipes configuração do conjunto
      description: Especifica qual configuração de uilleann pipes está incluída, com
        base na presença de reguladores e bordões.
    uk_childrens_shoe_size:
      name: Calçado infantil UK tamanho
      description: 'Especifica o tamanho de calçados infantis do Reino Unido, por
        exemplo: 4 ou 4 Wide (forma mais larga)'
    uk_clothing_size:
      name: Tamanho da roupa no Reino Unido
      description: 'Especifica o tamanho de roupa do Reino Unido, por exemplo: 12
        ou 18'
    uk_cup_size:
      name: Tamanho da taça no Reino Unido
      description: 'Especifica o tamanho da taça do sutiã no Reino Unido, por exemplo:
        C ou FF'
    uk_mens_shoe_size:
      name: Tamanho do sapato masculino no Reino Unido
      description: 'Especifica o tamanho do sapato masculino no Reino Unido, por exemplo:
        9 ou 9 Wide (forma mais larga)'
    uk_womens_shoe_size:
      name: Calçado feminino UK tamanho
      description: Especifica o tamanho UK do calçado feminino, como 6 ou 6 Wide.
    ukulele_back_and_sides_wood:
      name: Ukulele madeira do fundo e laterais
      description: Identifica a madeira/material usado no fundo e nas laterais do
        ukulele.
    ukulele_body_cutaway:
      name: Ukulele corpo cutaway
      description: Indica se o corpo do ukulele concert tem cutaway para facilitar
        o acesso aos trastes superiores.
    ukulele_body_shape:
      name: Ukulele corpo formato
      description: Estilo/formato geral do corpo usado para o ukulele.
    ukulele_bridge_material:
      name: Ukulele cavalete material
      description: Especifica o material usado para o cavalete do ukulele.
    ukulele_construction_type:
      name: Tipo de montagem do ukulele
      description: Como o tampo/fundo/laterais do instrumento são construídos (maciço
        vs laminado).
    ukulele_electronics_configuration:
      name: Ukulele configuração eletrônica
      description: Indica se o ukulele é apenas acústico ou inclui eletrônica integrada
        (captador e/ou pré-amplificador) para amplificação.
    ukulele_string_re_entrant_tuning:
      name: Ukulele encordoamento com afinação reentrante
      description: Se o ukulele está configurado com afinação reentrante (sol agudo)
        versus linear/sol grave; preferência comum do comprador e afeta o som.
    ukulele_top_wood:
      name: Ukulele madeira do tampo
      description: Identifica a madeira/material usado no tampo/tábua harmônica do
        ukulele.
    ukulele_tuner_mechanism:
      name: Ukulele mecanismo das tarraxas
      description: Especifica o estilo/mecanismo das tarraxas usado no ukulele.
    ukulele_tuner_type:
      name: Ukulele tipo de tarraxa
      description: Estilo de tarraxa usado no headstock do ukulele.
    ukulele_tuning:
      name: Ukulele afinação
      description: Especifica a afinação padrão pretendida para o ukulele de bolso.
    ultralight_aircraft_wing_configuration:
      name: Aeronave ultraleve configuração da asa
      description: Posicionamento e configuração da asa principal em relação à fuselagem/estrutura.
    under_bed_features:
      name: Características dos pijamas
      description: Identifica o principal elemento funcional localizado sob a plataforma
        da cama.
    underfoot_strap_type:
      name: Correia sob o pé tipo
      description: Identifica o material ou design usado para a correia que passa
        por baixo do calçado.
    underwear_fit:
      name: Roupa íntima caimento
      description: Indica o perfil geral de caimento da cueca boxer (por exemplo,
        justa, solta, compressão).
    underwear_pieces_included:
      name: Roupas íntimas incluídas
      description: Identifica quais peças de vestuário são fornecidas (parte superior,
        parte inferior, ambas ou union suit de peça única) para que os clientes saibam
        se estão comprando um conjunto completo ou um item individual.
    uniform_pieces_included:
      name: Uniforme peças incluídas
      description: Identifica quais componentes de vestuário são fornecidos (por exemplo,
        camisa, calça, colete), esclarecendo o conteúdo do conjunto para compras em
        lote ou kit.
    uniform_role:
      name: Uniforme função
      description: Especifica a função profissional ou agência para a qual o item
        de uniforme se destina (por exemplo, Polícia, Xerife, EMS).
    update_method:
      name: Scanner método de atualização
      description: Como as atualizações de firmware/software são entregues para o
        scanner.
    upholstery_fabric_backing_type:
      name: Tecido de estofamento tipo de base
      description: Especifica a base/laminação no tecido de estofamento que afeta
        a instalação e a sensação.
    upholstery_fabric_water_resistance:
      name: Tecido de estofamento resistência à água
      description: Indica resistência à água e derramamentos para a superfície do
        tecido de estofamento.
    upper_material:
      name: Cabedal material
      description: Especifica o material principal usado na parte do cabedal do tênis,
        que afeta a respirabilidade, a durabilidade e a estética.
    upright_bass_pickup_system:
      name: Contrabaixo acústico sistema de captador
      description: Indica se o contrabaixo acústico inclui um sistema de captador/pré-amplificador
        instalado destinado à amplificação.
    upright_piano_power_source:
      name: Piano vertical fonte de energia
      description: Como o piano vertical é alimentado, aplicável a pianos verticais
        acústicos sem energia, bem como a pianos verticais com sistemas silent/híbridos
        que requerem eletricidade.
    urination_device_features:
      name: Dispositivo urinário recursos
      description: Destaca características especiais de design que melhoram a funcionalidade
        ou a conveniência.
    us_childrens_shoe_size:
      name: Tamanho do sapato infantil nos EUA
      description: 'Especifica o tamanho de calçados infantis dos EUA, por exemplo:
        5 ou 5 Wide (forma mais larga)'
    us_clothing_size:
      name: Tamanho da roupa nos EUA
      description: 'Especifica o tamanho da roupa nos EUA, por exemplo: 8 ou 14'
    us_cup_size:
      name: Tamanho da taça nos EUA
      description: 'Especifica o tamanho da taça do sutiã no Reino Unido, por exemplo:
        C ou DDD'
    us_mens_shoe_size:
      name: Tamanho do sapato masculino nos EUA
      description: 'Especifica o tamanho do sapato masculino nos EUA, por exemplo:
        10 ou 10 Wide (forma mais larga)'
    us_ring_size:
      name: Tamanho do anel nos EUA
      description: 'Especifica o tamanho do anel nos EUA, por exemplo: 7 ou 9,5'
    us_womens_shoe_size:
      name: Tamanho do sapato feminino nos EUA
      description: Especifica o tamanho do sapato feminino, como 8 ou 8 Wide (forma
        mais larga)
    usage:
      name: Uso
      description: Descreve o caso de uso/ajuste pretendido do comando de válvulas.
    usda_honey_grade:
      name: Mel USDA classificação
      description: Indica a classificação oficial do Departamento de Agricultura dos
        EUA (USDA) atribuída ao mel.
    user_control_method:
      name: Método de controle de usuários
      description: Indica como o usuário interage com a máquina (por exemplo, painel
        de controle integrado, controle remoto, app, voz), informando considerações
        de facilidade de uso.
    vacuum_boost_reference_port:
      name: Porta de referência de vácuo/boost
      description: Indica se o regulador inclui uma porta de referência de coletor
        para vácuo/boost e qual é seu estilo.
    valve_base_shape:
      name: Válvula formato da base
      description: Identifica a geometria de interface entre a base da válvula e o
        aro (redonda, cônica, porta lateral, em T, etc.) que afeta a vedação e a compatibilidade
        com inserto de espuma.
    valve_core_type:
      name: Tipo do núcleo da válvula
      description: Indica se o núcleo da válvula é removível, fixo ou sem núcleo,
        informação que afeta os procedimentos de manutenção e a compatibilidade com
        ferramentas de injeção de selante.
    valve_cover_gasket_material:
      name: Tampa de válvulas material da junta
      description: Especifica o material da junta da tampa de válvulas incluída com
        a tampa de válvulas, ou o material de junta recomendado quando vendida sem
        junta (se aplicável).
    valve_cover_material:
      name: Material de revestimento da válvula
      description: Material principal de construção da tampa de válvulas.
    valve_design:
      name: Válvula design
      description: Identifica a construção/design da válvula do motor.
    valve_guard_coverage_area:
      name: Área do revestimento da proteção da válvula
      description: Indica quais partes da seção da válvula a proteção protege.
    valvetrain_configuration:
      name: Trem de válvulas configuração
      description: Especifica o layout do comando/trem de válvulas.
    varnish_formulation_base:
      name: Verniz base da formulação
      description: Especifica a formulação/química principal do verniz para instrumento
        de cordas, que afeta a aparência, a reversibilidade e a compatibilidade com
        acabamentos existentes.
    varnish_transparency_tint:
      name: Verniz transparência/tonalidade
      description: Descreve se o verniz é transparente ou tingido e, se tingido, a
        família geral da tonalidade.
    vegetable_matter_vm_content:
      name: Matéria vegetal (VM) teor
      description: Quantidade de detritos/impurezas vegetais presentes na fibra.
    vegetable_preparation_style:
      name: Vegetal estilo de preparo
      description: Descreve como o vegetal é apresentado, cortado ou preparado de
        outra forma antes da venda (por exemplo, inteiro, em cubos, floretes).
    vehicle_audio_dsp_form_factor:
      name: Áudio veicular DSP formato
      description: Especifica o formato físico/de instalação da unidade DSP.
    vehicle_battery_charger_features:
      name: Carregador de bateria veicular recursos
      description: Lista os modos de operação e recursos integrados do carregador
        de bateria veicular (por exemplo, modo flutuação, dessulfatação).
    vehicle_body_filler_form:
      name: Massa de reparo automotivo forma
      description: A forma física/estilo de embalagem do produto de massa de reparo
        automotivo.
    vehicle_coaxial_speaker_nominal_size:
      name: Alto-falante coaxial veicular tamanho nominal
      description: Tamanho nominal do alto-falante usado no encaixe (por exemplo,
        6.5 in, 6×9 in).
    vehicle_cover_size_class:
      name: Capa para veículo classe de tamanho
      description: Agrupamento geral de tamanho que indica em qual tamanho de veículo
        a capa foi projetada para caber.
    vehicle_decor_set_items_included:
      name: Conjunto de decoração veicular itens incluídos
      description: Lista os tipos de itens decorativos incluídos no conjunto de acessórios
        (visibilidade em nível de componente para compradores).
    vehicle_door_lock_actuation_method:
      name: Fechadura da porta do veículo método de acionamento
      description: Indica como a fechadura da porta do veículo é acionada ou controlada.
    vehicle_door_lock_actuator_kit_contents:
      name: Kit de atuador da fechadura da porta do veículo conteúdo
      description: Indica o que está incluído com o atuador (somente atuador vs ferragens/hastes/suportes/chicote).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Atuador da fechadura da porta do veículo configuração da fiação
      description: Especifica o estilo de fiação necessário para a instalação (número
        de fios e função).
    vehicle_door_lock_included_components:
      name: Fechadura da porta do veículo componentes incluídos
      description: Lista quais componentes estão incluídos na embalagem (útil para
        kits/conjuntos).
    vehicle_electrical_connector_type:
      name: Veículo conector elétrico tipo
      description: Especifica o conector elétrico do regulador/campo do alternador
        ou estilo de plugue (excluindo o pino principal de saída B+).
    vehicle_equipment_fit_out_level:
      name: Veículo nível de equipagem
      description: Indica o nível de adaptação policial incluído com a van.
    vehicle_glass_cleaner_form:
      name: Limpa-vidros automotivo forma
      description: Formato físico do produto limpa-vidros automotivo (por exemplo,
        spray, espuma, lenços, gel, concentrado).
    vehicle_hitch_cover_illumination_type:
      name: Capa de engate veicular tipo de iluminação
      description: Especifica se a capa de engate tem iluminação e de que tipo.
    vehicle_hitch_cover_mounting_type:
      name: Tipo de montagem da tampa do engate do veículo
      description: Indica o método usado para reter/fixar a capa de engate no receptor
        do engate.
    vehicle_license_plate_finish:
      name: Placa veicular acabamento
      description: Acabamento de superfície da placa.
    vehicle_license_plate_frame_anti_theft_design:
      name: Moldura de placa veicular design antifurto
      description: Elementos de design relacionados à segurança destinados a impedir
        remoção ou adulteração.
    vehicle_license_plate_frame_plate_standard:
      name: Moldura de placa veicular padrão da placa
      description: Padrão/região da placa veicular para o qual a moldura é dimensionada.
    vehicle_license_plate_frame_profile:
      name: Moldura de placa veicular perfil
      description: Como a moldura contorna a placa (cobertura/formato), o que impacta
        a legibilidade e a conformidade.
    vehicle_license_plate_mounting_hole_count:
      name: Placa veicular contagem de furos de montagem
      description: Número de furos de montagem na placa.
    vehicle_license_plate_mounting_hole_pattern:
      name: Padrão dos orifícios de fixação da placa de licença do veículo
      description: Padrão de posicionamento dos furos de montagem na placa.
    vehicle_license_plate_reflectivity:
      name: Placa veicular refletividade
      description: Se e como a superfície da placa reflete a luz (importante para
        visibilidade e conformidade em algumas placas decorativas).
    vehicle_license_plate_size_standard:
      name: Norma relativa ao tamanho das placas de licença de veículos
      description: Indica o padrão regional/veicular para o qual a placa é dimensionada
        para se ajustar (espaçamento dos furos de montagem e dimensões gerais).
    vehicle_license_plate_text_style:
      name: Estilo da fonte da placa de licença do veículo
      description: Estilo dos caracteres da placa (se houver), incluindo em relevo
        vs impressos.
    vehicle_license_plate_theme:
      name: Tema das placas de licença dos veículos
      description: Tema de design de alto nível para a arte da placa.
    vehicle_lift_actuation_method:
      name: Método de acionamento do elevador de veículos
      description: Como o elevador/macaco é alimentado/acionado para levantar o veículo.
    vehicle_lift_mounting_type:
      name: Elevador veicular tipo de montagem
      description: Indica como o elevador é instalado ou ancorado no espaço de trabalho.
    vehicle_lift_type:
      name: Tipo do elevador de veículos
      description: Especifica o estilo estrutural do elevador veicular usado para
        serviço ou armazenamento (por exemplo, 2 colunas, 4 colunas, tesoura).
    vehicle_magnet_attachment_type:
      name: Ímã veicular tipo de fixação
      description: Especifica o principal método de fixação/montagem para produtos
        vendidos como ímãs veiculares (por exemplo, somente magnético vs magnético
        com auxílio adesivo).
    vehicle_magnet_intended_use:
      name: Ímã veicular uso pretendido
      description: Indica o principal caso de uso pretendido do ímã veicular.
    vehicle_mirror_adjustment_type:
      name: Retrovisor veicular tipo de ajuste
      description: Especifica como o retrovisor é ajustado/controlado.
    vehicle_mirror_glass_type:
      name: Tipo do vidro do retrovisor do veículo
      description: Especifica o tipo óptico/de formato da superfície do espelho do
        retrovisor.
    vehicle_organizer_features:
      name: Recursos do organizador do veículo
      description: Principais recursos funcionais de organizadores veiculares, como
        dobrabilidade, forro impermeável, bolsos térmicos ou base antiderrapante.
    vehicle_paint_chemistry_base:
      name: Pintura veicular química/base
      description: Indica a formulação/química da tinta usada em pintura veicular.
    vehicle_polish_application_method:
      name: Polidor veicular método de aplicação
      description: Especifica o método ou ferramenta recomendado para aplicar o polidor
        veicular.
    vehicle_pursuit_package:
      name: Veículo pacote de perseguição
      description: Indica se o veículo está equipado com um pacote de desempenho para
        perseguição destinado ao uso policial (por exemplo, arrefecimento, freios,
        suspensão e calibração aprimorados).
    vehicle_safety_equipment_position:
      name: Equipamento de segurança veicular posição
      description: Especifica onde no veículo o equipamento de segurança deve ser
        usado ou instalado.
    vehicle_safety_equipment_visibility_features:
      name: Equipamento de segurança veicular recursos de visibilidade
      description: Indica recursos de aumento de visibilidade projetados para aumentar
        a conspicuidade.
    vehicle_seat_row:
      name: Assento veicular fileira
      description: Indica para qual fileira traseira o assento se destina (segunda
        fileira vs terceira fileira), incluindo aplicações de assento auxiliar traseiro.
    vehicle_steering_assist_type:
      name: Direção veicular tipo de assistência
      description: Especifica o sistema de assistência de direção para o qual o componente
        foi projetado.
    vehicle_steering_wheel_lock_form_factor:
      name: Trava de volante veicular fator de forma
      description: Descreve o estilo físico da trava e como ela faz interface com
        o volante (e opcionalmente outros controles).
    vehicle_wax_polish_product_form:
      name: Cera/polidor veicular forma do produto
      description: A forma física/formato de dispensação da cera, polidor, protetor
        ou selante.
    vehicle_wheel_valve_stem_type:
      name: Veículo tipo de haste de válvula da roda
      description: Especifica o tipo de haste de válvula suportado ou incluído.
    vehicle_windshield_fluid_formula:
      name: Fluido para para-brisa veicular fórmula
      description: Foco principal de limpeza/remoção da formulação do fluido para
        para-brisa.
    veil_length_type:
      name: Tipo de comprimento do véu
      description: Classifica um véu usando terminologia padrão de comprimento em
        vez de medida numérica.
    vellum_opacity_level:
      name: Papel vegetal nível de opacidade
      description: Indica o quão translúcida ou opaca é a folha de papel vegetal.
    ventilation_configuration:
      name: Configuração da ventilação
      description: Configuração principal de ventilação/entrada de ar e exaustão do
        capacete.
    ventilation_control_type:
      name: Tipo de controle da ventilação
      description: Especifica o estilo de gerenciamento de fluxo de ar integrado ao
        capacete.
    ventilation_level:
      name: Nível de ventilação
      description: Indica o design relativo de fluxo de ar/ventilação da armadura.
    venting_design:
      name: Design de ventilação
      description: Especifica se e como a capa é ventilada para reduzir condensação
        e mofo durante o armazenamento.
    vestibule_type:
      name: Avanço tipo
      description: Classifica o layout do avanço em relação à barraca.
    vibraphone_bar_material:
      name: Vibrafone material das barras
      description: Material das barras/teclas tonais do vibrafone (as barras que produzem
        som).
    vibraphone_motor_type:
      name: Vibrafone tipo de motor
      description: Tipo de motor usado para acionar as ventoinhas rotativas dos ressonadores
        para vibrato (se equipado).
    vibraphone_range_octaves:
      name: Vibrafone extensão (oitavas)
      description: A extensão de afinação do vibrafone expressa em oitavas (por exemplo,
        3 oitavas, 3,5 oitavas).
    vibraphone_resonator_tube_material:
      name: Vibrafone material dos tubos ressonadores
      description: Material dos tubos ressonadores do vibrafone sob as barras.
    vibraphone_tuning_standard:
      name: Vibrafone padrão de afinação
      description: Afinação de referência usada para afinar (A=440 Hz, etc.).
    viewing_sides:
      name: Lados de visualização
      description: Especifica quantas faces do placar exibem informações (face única,
        face dupla, quatro faces, etc.).
    vintage_advertisement_decade:
      name: Anúncio vintage década
      description: Especifica a década em que o anúncio foi originalmente impresso
        ou produzido (aproximada se o ano exato for desconhecido).
    vintage_advertisement_format:
      name: Formato de anúncio vintage
      description: Especifica o formato físico ou meio do anúncio vintage colecionável.
    vintage_advertisement_subject_category:
      name: Anúncio vintage categoria de tema
      description: Identifica a categoria de produto/serviço anunciada (para que é
        o anúncio).
    vintage_classic_truck_cab_type:
      name: Caminhão vintage e clássico tipo de cabine
      description: Configuração da cabine/estilo de carroceria do compartimento de
        passageiros do caminhão.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech Helmet classificação por estrelas
      description: Classificação de segurança atribuída pelo Virginia Tech Helmet
        Lab (0–5 estrelas).
    virtual_analog_synthesizer_form_factor:
      name: Sintetizador analógico virtual fator de forma
      description: Especifica o formato físico do chassi do sintetizador (teclado
        vs módulo/rack).
    viscosity_thickness:
      name: Viscosidade/espessura
      description: Descreve o quão espessa ou fluida é a barbotina conforme vendida
        ou na consistência de trabalho recomendada.
    vise_configuration:
      name: Configuração do torno
      description: Especifica o layout estrutural ou número de peças no conjunto de
        morsa, o que afeta a portabilidade e a complexidade de montagem.
    visibility_features:
      name: Recursos de visibilidade
      description: Destaca elementos de design que aumentam a visibilidade do condutor
        no trânsito.
    visor_brim_type:
      name: Viseira/aba tipo
      description: Indica a presença e o estilo de um visor ou aba no capacete.
    visor_configuration:
      name: Configuração do visor
      description: Descreve a presença e o estilo de qualquer viseira ou proteção
        facial integrada.
    visor_lens_finish:
      name: Lente da viseira acabamento
      description: Especifica a tonalidade, o acabamento óptico ou o estilo gráfico
        aplicado à lente da viseira.
    visor_style:
      name: Viseira estilo
      description: Indica se o capuz inclui aba/viseira e sua configuração.
    voc_compliance_standard:
      name: COV padrão de conformidade
      description: Declaração de conformidade regulatória de COV para o produto (quando
        aplicável).
    voc_regulatory_class:
      name: COV classe regulatória
      description: Classe regulatória/de conformidade de COV declarada para o produto
        (conforme rótulo/SDS), usada para restrições regulatórias regionais e ambientais.
    vodka_base_ingredient:
      name: Ingrediente base da vodca
      description: Ingrediente agrícola principal do qual a vodka é destilada (por
        exemplo, trigo, batata, milho).
    voice_coil_configuration:
      name: Bobina de voz configuração
      description: Número/arranjo de bobinas de voz para flexibilidade de fiação e
        opções de impedância.
    voice_effects:
      name: Efeitos de voz
      description: Tipos de efeitos vocais integrados suportados pelo conjunto de
        karaokê.
    voltage_rating_type:
      name: Classificação de tensão tipo
      description: Especifica se a classificação de tensão do fusível se aplica a
        CA, CC ou ambos.
    voltage_regulator_connector_type:
      name: Regulador de tensão tipo de conector
      description: Especifica o estilo de conexão/terminal usado para conectar o regulador
        à fiação/alternador/gerador do veículo.
    wader_foot_type:
      name: Tipo de sola da bota de pesca
      description: Especifica se os waders têm botas integradas ou pés de meia separados.
    wader_sole_type:
      name: Wader tipo de sola
      description: Especifica o material da sola externa ou o tipo de tração usado
        em botas de wading ou waders com bota integrada.
    waistband_style:
      name: Cós estilo
      description: Descreve a construção do cós e como ele é preso ou ajustado para
        caimento e conforto.
    wakeboard_binding_mounting_pattern:
      name: Wakeboard padrão de montagem da fixação
      description: Especifica o padrão de insert/placa no wakeboard com o qual as
        fixações são compatíveis.
    wakeboard_riding_style:
      name: Wakeboard estilo de uso
      description: Classifica o ambiente pretendido ou estilo de uso do wakeboard.
    wall_decal_style:
      name: Adesivo de parede estilo
      description: Especifica como o adesivo é produzido/aplicado (por exemplo, recortado,
        transfer, folha de adesivos).
    wallyball_equipment_included:
      name: Equipamento de wallball incluído
      description: Lista as peças específicas fornecidas no conjunto de wallyball
        para que os compradores saibam exatamente o que estão comprando e possam comparar
        conjuntos.
    warp_beam_type:
      name: Tipo de viga de tração
      description: Especifica a configuração do rolo de urdume incluído ou instalado
        no tear (a configuração do rolo fornecida com o tear).
    washability:
      name: Lavável
      description: Indica se a cola pode ser limpa com água e/ou é lavável após a
        aplicação.
    watch_band_design:
      name: Pulseira de relógio design
      description: Descreve o estilo de construção ou padrão de design de uma pulseira
        de relógio (por exemplo, NATO, milanesa, elos).
    watch_movement:
      name: Relógio movimento
      description: Especifica o mecanismo que alimenta o relógio, um fator-chave que
        os compradores usam para diferenciar modelos.
    water_activation:
      name: Ativação por água
      description: Se o sinalizador pode ser ativado automaticamente ao ser imerso
        em água (comum para EPIRBs de Categoria I/II).
    water_chamber_configuration:
      name: Câmara de água configuração
      description: Descreve o layout interno da bolsa de água do colchão, como câmara
        única ou dupla, que afeta o suporte, o controle de temperatura e o incômodo
        ao parceiro.
    water_dispensing_mechanism:
      name: Mecanismo de distribuição de água
      description: Define como a água é liberada da unidade, como torneiras, bicos
        pulverizadores ou despejo por gravidade.
    water_exposure_protection_level:
      name: Exposição à água nível de proteção
      description: Indica o nível de proteção do produto quando exposto à água (por
        exemplo, respingos vs imersão temporária). Utilize a classificação de proteção
        contra ingresso (IP) quando um código IP oficial estiver disponível.
    water_fed_design:
      name: Use a classificação de proteção contra ingresso (IP) quando houver um
        código IP oficial disponível.
      description: Design com alimentação de água
    water_gun_features:
      name: Características da pistola d'água
      description: Indica se a escova foi projetada para ser usada com água corrente
        por meio de um cabo com passagem de fluxo ou conexão de mangueira.
    water_gun_operating_mechanism:
      name: Recursos funcionais notáveis e capacidades incluídas da pistola de água.
      description: Pistola de água mecanismo de operação
    water_gun_spray_pattern:
      name: Como a pistola de água pressuriza e expele água durante o uso.
      description: Pistola de água padrão de jato
    water_heating_method:
      name: O tipo de jato de água produzido pelo bico durante o disparo.
      description: Descreve como, ou se, a água é aquecida antes do uso—por exemplo,
        absorção solar, queimadores a propano, elementos elétricos, aquecimento por
        bateria, isolamento retentor de calor ou sem aquecimento.
    water_mattress_construction:
      name: Colchão de água construção
      description: Especifica o estilo de construção do colchão de água (por exemplo,
        com estrutura rígida ou macio), o que determina a compatibilidade com a estrutura
        e a sensação geral.
    water_play_features:
      name: Características dos brinquedos aquáticos
      description: Componentes de atividade aquática incluídos no parque aquático/tobogã.
    water_polo_competition_approval:
      name: Polo aquático aprovação para competição
      description: Identifica o órgão regulador ou nível de competição para o qual
        a bola é oficialmente aprovada ou certificada.
    water_polo_goal_type:
      name: Gol de polo aquático tipo
      description: Classifica a configuração estrutural ou de montagem do gol (por
        exemplo, flutuante, montado no deque, portátil).
    water_pump_drive_type:
      name: Bomba d’água tipo de acionamento
      description: Especifica como a bomba d’água é acionada/atuada no sistema de
        arrefecimento do veículo.
    water_pump_housing_material:
      name: Bomba d’água material da carcaça
      description: Material da carcaça/corpo da bomba d’água.
    water_pump_impeller_material:
      name: Bomba d’água material do rotor
      description: Especifica o material do rotor da bomba d’água (rotor/palheta interno
        que movimenta o líquido de arrefecimento).
    water_pump_mounting_type:
      name: Bomba d’água tipo de montagem
      description: Especifica o estilo de montagem/formato da bomba d’água para encaixe
        no motor (por exemplo, carcaça aparafusada vs cartucho/inserto).
    water_purification_method:
      name: Método de purificação de água
      description: Identifica o mecanismo principal pelo qual o produto torna a água
        segura para beber em campo (por exemplo, bomba vs alimentação por gravidade
        vs luz UV).
    water_resistance:
      name: Resistência à água
      description: Comunica o grau de proteção contra intempéries fornecido, como
        impermeável ou resistente à água.
    water_resistance_level:
      name: Resistência à água nível
      description: Indica se o tecido repele água e em que nível.
    water_resistance_rating_case_protection_level:
      name: Resistência à água classificação (nível de proteção do estojo)
      description: Indica o nível de resistência/proteção contra água fornecido pelo
        estojo com rodinhas (em nível de marketing, não vedação IP de eletrônicos),
        por exemplo, resistente à água vs impermeável.
    water_rocket_kit_items_included:
      name: Kit de foguete de água itens incluídos
      description: Principais componentes incluídos na embalagem do produto.
    water_rocket_propulsion_type:
      name: Tipo de propulsão do foguete hidráulico
      description: Fonte principal de propulsão/energia usada para lançar o foguete.
    water_rocket_recovery_system:
      name: Foguete de água sistema de recuperação
      description: Método usado para recuperar o foguete após o lançamento.
    water_ski_base_design:
      name: Esqui aquático design da base
      description: Especifica o perfil inferior do casco dos esquis aquáticos, que
        influencia as características de manobrabilidade.
    water_ski_fin_type:
      name: Esqui aquático tipo de quilha
      description: Especifica a configuração da quilha de um esqui aquático, que afeta
        o rastreamento e a manobrabilidade.
    water_source:
      name: Fonte de água
      description: Identifica a origem da água antes da carbonatação.
    water_sports_safety_standard:
      name: Esportes aquáticos padrão de segurança
      description: Lista normas formais de segurança ou flutuabilidade que o produto
        atende (por exemplo, CE EN 1385 para capacetes, ISO 12402-5 para auxiliares
        de flutuação, USCG Tipo III).
    water_table_feature_set:
      name: Mesa de água conjunto de recursos
      description: Destaca recursos de brincadeira integrados da mesa de água, como
        cascatas, borrifadores, bombas ou bacias em vários níveis.
    water_table_items_included:
      name: Mesa de água itens incluídos
      description: Especifica quais acessórios vêm com o conjunto de mesa de água
        (por exemplo, barcos, copos, funis, figuras).
    water_table_water_source_type:
      name: Mesa de água tipo de fonte de água
      description: Especifica como a mesa de água é preenchida ou abastecida com água.
    waterbed_stabilization_level:
      name: Cama de água nível de estabilização
      description: Indica o grau de redução de ondas ou controle de movimento fornecido
        pelo colchão de água.
    watercolor_ink_water_resistance_after_drying:
      name: Tinta aquarela resistência à água (após secagem)
      description: Indica se a tinta aquarela se torna resistente à água/impermeável
        após a secagem (conforme declaração do fabricante).
    watercraft_care_application_area:
      name: Embarcação área de aplicação de cuidados
      description: Indica a principal área ou componente de uma embarcação em que
        o produto deve ser usado.
    watercraft_drive_mechanism:
      name: Embarcação mecanismo de propulsão
      description: Descreve o mecanismo específico de propulsão a bordo instalado
        ou suportado.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Embarcação padrão da unidade de envio do tanque de combustível
      description: Especifica o padrão/norma de montagem para unidades de envio do
        tanque de combustível e medidores compatíveis (por exemplo, padrões comuns
        de parafusos marítimos).
    watercraft_fuel_tank_shape:
      name: Embarcação formato do tanque de combustível
      description: Descreve o formato físico geral do tanque de combustível para apoiar
        o planejamento de espaço/encaixe.
    watercraft_hull_material:
      name: Embarcação material do casco
      description: Especifica o material principal da construção do casco.
    watercraft_ignition_part_voltage:
      name: Embarcação tensão da peça de ignição
      description: Classificação/requisito de tensão nominal para a peça de ignição
        (quando aplicável), como sistemas de 12 V.
    watercraft_impeller_material_grade:
      name: Embarcação grau do material do rotor
      description: Especifica o material do rotor da embarcação (por exemplo, borracha
        de neoprene, nitrila, bronze).
    watercraft_lighting_certification_compliance:
      name: Iluminação de embarcação certificação/conformidade
      description: Indica a conformidade regulatória/com normas para a qual a luz
        é certificada para uso marítimo (por exemplo, em conformidade com USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Suporte de motor de embarcação recursos de ajuste
      description: Capacidades de ajuste do suporte (por exemplo, inclinação, elevação,
        deslizamento) que afetam a usabilidade e o encaixe.
    watercraft_piston_part_type:
      name: Embarcação pistão tipo de peça
      description: Identifica qual componente relacionado ao pistão o anúncio representa.
    watercraft_propeller_blade_rake:
      name: Hélice de embarcação inclinação das pás
      description: Especifica a inclinação das pás (ângulo da pá em relação ao cubo),
        que afeta a elevação da proa e o desempenho.
    watercraft_propeller_rotation_direction:
      name: Hélice de embarcação direção de rotação
      description: Indica a direção de rotação/lateralidade necessária da hélice para
        compatibilidade com o sistema de transmissão (por exemplo, mão direita/padrão
        vs mão esquerda/contrarrotativa).
    watercraft_pump_stage_impeller_role:
      name: Embarcação estágio da bomba/função do rotor
      description: Identifica se o rotor se destina a uma função específica da bomba
        (por exemplo, bomba de água bruta/do mar, circulação de líquido de arrefecimento,
        bomba de jato).
    watercraft_registration_status:
      name: Embarcação status de registro
      description: Indica se o veleiro inclui documentação de título e/ou registro.
    watercraft_safety_equipment_activation_type:
      name: Equipamento de segurança de embarcação tipo de ativação
      description: Método principal de ativação do dispositivo de segurança (para
        sinalizadores/alarmes MOB/PLBs), distinto de inflação.
    watercraft_steering_cable_core_material:
      name: Cabo de direção de embarcação material do núcleo
      description: Especifica o material do cabo interno/núcleo que transmite força.
    watercraft_steering_cable_hardware_included:
      name: Cabo de direção de embarcação ferragens incluídas
      description: Especifica quais ferragens e acessórios de instalação estão incluídos
        com o cabo de direção.
    watercraft_steering_cable_system_type:
      name: Cabo de direção de embarcação tipo de sistema
      description: Especifica a arquitetura do sistema de direção para a qual o cabo
        foi projetado (por exemplo, rotativo, cremalheira).
    watercraft_steering_wheel_hub_bore_type:
      name: Tipo de cubo/furo do volante de embarcações
      description: Especifica o estilo da interface central de montagem/furo (por
        exemplo, cônica, estriada) onde o volante se acopla a um cubo ou adaptador.
    watercress_variety:
      name: Agrião variedade
      description: Identifica a variedade ou tipo específico de agrião vendido.
    waterproof_level:
      name: Impermeabilidade nível
      description: Indica o nível de proteção contra água do calçado, incluindo quaisquer
        declarações de impermeabilidade respaldadas por garantia.
    wax_blend_composition:
      name: Mistura de ceras composição
      description: Lista os materiais de cera misturados no produto e/ou o tipo de
        mistura comercializada.
    wax_coat_type:
      name: Cera tipo de camada
      description: Indica se a cera se destina a ser usada como camada de base, camada
        final ou fórmula multiuso/de camada única.
    wax_hardness:
      name: Cera dureza
      description: Indica a dureza relativa da cera, afetando a durabilidade e o deslizamento
        em diferentes tipos de neve.
    wax_physical_form:
      name: Cera forma física
      description: Indica a forma/formato físico em que a cera bruta para velas é
        fornecida.
    wax_recommended_candle_application:
      name: Cera aplicação recomendada para velas
      description: Indica o(s) principal(is) estilo(s) de vela para os quais a cera
        é formulada.
    wax_tackiness_level:
      name: Nível de viscosidade da cera
      description: Descreve o nível de pegajosidade/aderência que a cera proporciona
        na lâmina.
    weapon_system_integration:
      name: Integração dos sistemas de armas
      description: Indica se o veículo inclui sistemas de armas ou suportes integrados.
    weather_suitability:
      name: Adequação ao clima
      description: Indica as condições ambientais para as quais as luvas são projetadas,
        como uso em clima frio ou clima úmido.
    weave_finish:
      name: Trama/acabamento
      description: Descreve a trama principal do tecido ou acabamento de superfície
        que afeta a textura e o brilho da gravata.
    weave_style:
      name: Estilo de trama
      description: Especifica o padrão tradicional de tecelagem usado na confecção
        do chapéu Panamá, que influencia a respirabilidade, a flexibilidade, a aparência
        e o preço.
    weave_type:
      name: Trama tipo
      description: Identifica a trama do tecido/estilo de construção (nome comercial
        da trama) que influencia a textura, o brilho e o caimento.
    weaving_beater_edge_type:
      name: Batedor de tecelagem tipo de borda
      description: Descreve o perfil da borda de trabalho do batedor plano que entra
        em contato com a trama (por exemplo, reta vs serrilhada).
    weaving_beater_style:
      name: Estilo de tecelagem com batente
      description: Identifica o estilo/formato funcional do batedor plano de tecelagem.
    weaving_shuttle_tip_style:
      name: Lançadeira de tecelagem estilo da ponta
      description: Especifica o design da ponta/nariz frontal da lançadeira, que afeta
        como ela passa pela cala e a probabilidade de prender nos fios de urdume.
    weaving_shuttle_use_case:
      name: Lançadeira de tecelagem caso de uso
      description: Especifica a aplicação de tecelagem pretendida para a qual a lançadeira
        é projetada ou otimizada.
    webbing_construction_type:
      name: Tipo de estrutura em tela
      description: Descreve o estilo físico de trama ou trançado da fita, que afeta
        o manuseio, a resistência e o uso pretendido.
    webbing_design:
      name: Webbing design
      description: Descreve o estilo de membrana entre os dedos, que afeta o treinamento
        de resistência e a propulsão.
    weight_adjustability:
      name: Ajuste de peso
      description: Descreve se a resistência do produto pode ser alterada pelo usuário
        (por exemplo, seletorizada ou carregável) ou se é fixa em um único peso.
    weight_integration_system:
      name: Sistema de integração de peso
      description: Descreve se e como pesos de lastro são integrados ao BCD (por exemplo,
        bolsos de peso removíveis, nenhum, complemento opcional).
    weight_plate_compatibility:
      name: Anilha compatibilidade
      description: Define quais diâmetros de anilhas a máquina aceita (olímpica, padrão
        ou ambas).
    weight_plate_style:
      name: Anilha estilo
      description: Classifica o design/tipo da anilha (por exemplo, olímpica, bumper,
        seletorizada) para filtragem rápida de compatibilidade.
    weightlifting_belt_style:
      name: Cinto de levantamento de peso estilo
      description: Categoriza o design geral ou configuração orientada à finalidade
        do cinto (por exemplo, cinto com alavanca, cinto para mergulho, cinto afunilado).
    weightlifting_federation_certification:
      name: Levantamento de peso certificação de federação
      description: Aprovação oficial ou conformidade do produto por federações de
        esportes de força, como IPF ou IWF.
    wetsuit_boot_height:
      name: Bota de roupa de neoprene altura
      description: Classifica a altura/corte da bota na perna, influenciando cobertura,
        mobilidade e entrada de água.
    wetsuit_entry_system:
      name: Roupa de neoprene sistema de entrada
      description: Descreve o tipo e a localização do sistema de abertura/zíper usado
        para vestir a roupa de neoprene.
    wetsuit_seam_construction:
      name: Roupa de neoprene construção da costura
      description: Especifica como as costuras são construídas e seladas, afetando
        o aquecimento, a flexibilidade e a durabilidade.
    wheat_product_form:
      name: Produto à base de trigo
      description: Especifica a forma física ou processada do produto de trigo.
    wheel_arrangement:
      name: Rodas arranjo
      description: Especifica o arranjo de rodas da locomotiva a vapor (notação Whyte),
        que é uma característica definidora e um termo comum para colecionadores/busca.
    wheel_brake_type:
      name: Tipo de freio de roda
      description: Detalha a configuração de frenagem fornecida nas rodas ou rodízios
        do carrinho.
    wheel_chock_grip_features:
      name: Calço de roda recursos de aderência
      description: Recursos de design de tração e aderência que melhoram o poder de
        fixação em superfícies e contra pneus.
    wheel_cleaner_acidity_ph_category:
      name: Limpa-rodas categoria de acidez / pH
      description: Indica se o limpa-rodas é ácido, neutro ou alcalino (e, opcionalmente,
        se é comercializado como pH balanceado).
    wheel_cleaner_formula_type:
      name: Limpa-rodas tipo de fórmula
      description: Para limpa-rodas e soluções de lavagem relacionadas, indica a principal
        categoria de fórmula do produto (por exemplo, à base de ácido, sem ácido,
        pH neutro/balanceado ou reativa a ferro).
    wheel_construction_type:
      name: Tipo de estrutura da roda
      description: Especifica o método de fabricação/construção da roda.
    wheel_contaminant_target:
      name: Roda contaminante alvo
      description: Especifica os principais tipos de contaminação que o limpador foi
        projetado para remover.
    wheel_core_type:
      name: Tipo de núcleo da roda
      description: Descreve o estilo de construção do núcleo da roda, que influencia
        o peso, a rigidez e a transferência de energia.
    wheel_cylinder_inlet_port_thread_standard:
      name: Cilindro de roda padrão de rosca da porta de entrada
      description: Especifica o padrão de rosca da porta de entrada da linha de freio
        no cilindro de roda (por exemplo, flange bolha métrico vs flange invertida
        SAE).
    wheel_fastener_seat_type:
      name: Fixador de roda tipo de assento
      description: Especifica o estilo de assento da porca/parafuso de roda que se
        encaixa na roda (por exemplo, cônico/afunilado, esférico/raio, plano, mag/shank).
    wheel_illumination:
      name: Roda iluminação
      description: Indica se a roda tem iluminação integrada ou recursos luminosos.
    wheel_material:
      name: Roda material
      description: Identifica a composição principal das rodas, que afeta a durabilidade,
        a aderência e o amortecimento de vibrações.
    wheel_profile:
      name: Perfil da roda
      description: Descreve o formato transversal da roda que afeta a velocidade,
        a aderência e a agilidade.
    wheel_setup_type:
      name: Tipo de configuração da roda
      description: Define o estilo de configuração das rodas usado nos patins.
    wheel_system_finish:
      name: Sistema de rodas acabamento
      description: Acabamento/revestimento de superfície de aros/rodas e certas peças/acessórios
        de roda.
    whip_style:
      name: Chicote estilo
      description: Classifica o produto por seu estilo específico de chicote equestre
        ou vareta, ou pela disciplina pretendida.
    whipped_cream_base:
      name: Base do creme chantilly
      description: Identifica o ingrediente base principal usado para fazer o chantilly,
        como creme de leite ou coco.
    whipped_cream_form:
      name: Chantilly forma
      description: Indica o formato físico em que o chantilly é vendido.
    whistle_head_material:
      name: Material da ponta do apito
      description: Especifica o material da cabeça/bocal do apito (bloco/cabeça do
        canal de ar).
    whistle_light_features:
      name: Apito recursos de luz
      description: Indica se o apito inclui efeitos de luz integrados para festas
        (por exemplo, LED).
    whistle_purpose:
      name: Apito finalidade
      description: Identifica a principal aplicação pretendida do apito (treinamento
        esportivo, segurança marítima, adestramento de cães, etc.).
    whistle_sound_style:
      name: Apito estilo de som
      description: Descreve o estilo/característica da saída sonora do apito (por
        exemplo, tom único vs multitom).
    white_glue_finish_appearance_when_dry:
      name: Cola branca acabamento/aparência quando seca
      description: Especifica a aparência da cola após a secagem para uso artesanal/de
        escritório (por exemplo, transparente vs opaca).
    white_glue_washability:
      name: Cola branca lavável
      description: Indica se a cola seca pode ser removida/lavada de tecidos ou da
        pele.
    whitewater_kayak_style:
      name: Caiaque de águas bravas estilo
      description: Intenção principal de design dentro do segmento de águas bravas
        (por exemplo, creekboat, River Runner, Playboat).
    whitewater_rating_class:
      name: Águas bravas classificação (classe)
      description: Classe mais alta da Escala Internacional de Dificuldade de Rios
        que o bote é classificado para suportar.
    whorl_mounting_interface:
      name: Interface da montagem em espiral
      description: Como a polia se fixa à roda de fiar (estilo/conexão do eixo).
    wick_construction_type:
      name: Tipo de estrutura do pavio
      description: A construção/estilo do pavio (trançado, plano, trançado quadrado,
        com núcleo, de madeira, etc.).
    wick_core_type:
      name: Pavio tipo de núcleo
      description: Se o pavio não tem núcleo ou inclui um material de núcleo (por
        exemplo, com núcleo de papel ou com núcleo de zinco), afetando a rigidez e
        as características de queima.
    wick_tab_crimp_type:
      name: Presilha de pavio tipo de crimpagem
      description: Como a presilha de pavio prende o pavio (estilo de construção/crimpagem).
    wick_tab_material:
      name: Material da aba do pavio
      description: Material da presilha/sustentador fixado (comumente folha de flandres),
        relevante para resistência à corrosão e preferências regulatórias (por exemplo,
        evitar chumbo).
    wick_tab_shape:
      name: Presilha de pavio formato
      description: Formato/fator de forma da placa da presilha de pavio.
    wick_type_included:
      name: Pavio tipo incluído
      description: Especifica o material/tipo de pavio incluído no kit.
    wig_fiber_material:
      name: Peruca material da fibra
      description: Identifica a fibra principal usada no cabelo da peruca para que
        os compradores possam escolher facilmente entre variedades de cabelo humano
        e opções sintéticas com diferentes características de estilização e durabilidade.
    wildlife_attractant_scent:
      name: Feromônio selvagem
      description: Identifica o aroma principal usado para atrair animais silvestres,
        abrangendo aromas naturais de alimentos e aromas do tipo feromônio.
    willow_grade:
      name: Salgueiro classificação
      description: Especifica a classificação de qualidade do salgueiro usado, indicando
        a estrutura dos veios e o nível geral de desempenho.
    willow_type:
      name: Salgueiro tipo
      description: Identifica o tipo de salgueiro ou material alternativo usado na
        lâmina do taco, o que afeta muito o desempenho, a durabilidade e o preço.
    wind_up_mechanism_type:
      name: Tipo do mecanismo de corda
      description: Especifica como o brinquedo é acionado por corda ou ativado.
    wind_up_toy_movement_pattern:
      name: Brinquedo de corda padrão de movimento
      description: Descreve o movimento principal produzido quando acionado por corda.
    windbreak_purpose:
      name: Quebra-vento finalidade
      description: Define o principal caso de uso pretendido do quebra-vento.
    windfoil_board_mounting_system:
      name: Prancha de windfoil sistema de montagem
      description: Especifica a caixa do foil ou interface de montagem integrada à
        prancha de windfoil.
    windfoil_sail_style:
      name: Vela de windfoil estilo
      description: Classifica a vela pelo estilo de uso ou disciplina pretendida.
    winding_direction:
      name: Direção de corda
      description: Indica o padrão de rotação suportado pelo movimentador de relógio
        (sentido horário, anti-horário ou bidirecional).
    winding_method:
      name: Método de enrolamento
      description: Como a trama deve ser enrolada/carregada para uso na lançadeira.
    winding_speed_control_type:
      name: Enrolamento tipo de controle de velocidade
      description: Indica o método usado para controlar a velocidade de enrolamento
        durante o uso.
    winding_type:
      name: Enrolamento tipo
      description: Especifica a construção do enrolamento das cordas de baixo (perfil
        do revestimento externo).
    windlass_control_station_type:
      name: Guincho de âncora tipo de estação de controle
      description: Tipo de interface de controle incluída ou suportada para operar
        o guincho de âncora.
    windlass_mount_type:
      name: Guincho de âncora tipo de montagem
      description: Onde/como o guincho de âncora deve ser montado no barco.
    window_component_location:
      name: Janela localização do componente
      description: Especifica a qual janela/abertura a peça se aplica dentro do veículo
        (por exemplo, para-brisa vs vidro da porta vs vidro traseiro vs vidro lateral
        traseiro).
    window_configuration:
      name: Configuração da janela
      description: Indica a presença e o tamanho relativo de janelas transparentes
        de visibilidade na asa de wingfoil.
    window_glass_construction:
      name: Vidro de janela construção
      description: Especifica a construção de segurança/laminação do vidro da janela
        de veículo motorizado.
    window_glass_features:
      name: Vidro de janela recursos
      description: Indica se o vidro suporta tecnologias veiculares integradas (por
        exemplo, base para sensor de chuva, suporte de câmera).
    window_glass_finish:
      name: Vidro de janela acabamento
      description: Especifica o acabamento/tonalidade/tratamento de privacidade do
        vidro da janela de veículo motorizado.
    window_glass_tint_color:
      name: Cor da película do vidro da janela
      description: Especifica o tom de cor da película presente no vidro (não a cor
        geral do produto).
    window_glass_tint_level:
      name: Vidro de janela nível de tonalidade
      description: Indica a escuridão aproximada da tonalidade de fábrica/privacidade
        do vidro da janela (não película aftermarket). Utilize níveis descritivos
        quando o VLT exato não for conhecido.
    window_net_latch_mechanism:
      name: Rede de janela mecanismo de trava
      description: Especifica o mecanismo de trava/liberação usado para a rede de
        janela (por exemplo, botão de pressão, alavanca, fivela estilo cinto de segurança).
    window_net_mounting_hardware:
      name: Rede de janela ferragens de montagem
      description: Identifica o tipo de ferragens de montagem ou método de fixação
        usado para instalar a rede de janela (por exemplo, clip-on, parafusos, estilo
        gancho/haste), ou se as ferragens estão incluídas.
    window_net_opening_direction:
      name: Rede de janela direção de abertura
      description: Especifica como a rede de janela abre/se libera em relação ao ocupante
        para saída e conformidade com regras.
    window_regulator_operation:
      name: Regulador de janela operação
      description: Especifica como o regulador de janela é operado (manivela manual
        ou elétrico).
    windshield_coverage_area:
      name: Para-brisa área de cobertura
      description: Especifica quais partes da parte externa dianteira do veículo a
        capa de para-brisa foi projetada para proteger (por exemplo, somente para-brisa
        vs inclui limpadores, retrovisores, janelas laterais ou borda do capô).
    windshield_mount_attachment_method:
      name: Método de fixação no para-brisa
      description: Especifica como o suporte adere ou se prende à superfície do para-brisa.
    windshield_washer_fluid_seasonality:
      name: Fluido lavador de para-brisa sazonalidade
      description: Indica a estação/clima ou principal caso de uso pretendido da formulação
        do fluido lavador de para-brisa (por exemplo, descongelante de inverno, lavagem
        de insetos de verão, todas as estações).
    windsurf_fin_style:
      name: Quilha de windsurf estilo
      description: Classifica a quilha pela disciplina de navegação ou estilo de uso
        pretendido (por exemplo, wave, slalom, weed).
    windsurfing_connection_standard:
      name: Windsurf padrão de conexão
      description: Interface mecânica ou tipo de caixa usado para fixar a peça à prancha
        ou ao rig.
    windsurfing_sail_style:
      name: Estilo de navegação do windsurf
      description: Classifica a disciplina ou caso de uso pretendido da vela, como
        wave, freeride ou foil.
    wine_additive_type:
      name: Aditivo para vinho tipo
      description: Especifica que tipo de produto para produção de vinho tinto é este
        (ingrediente, aditivo, levedura, agente clarificante, kit, etc.).
    wine_body:
      name: Vinho corpo
      description: Descreve o peso percebido e a sensação na boca do vinho.
    wine_carbonation:
      name: Vinho carbonatação
      description: Indica se o vinho é tranquilo, frisante ou espumante e, quando
        relevante, a intensidade da efervescência.
    wine_making_ingredient_type:
      name: Ingrediente para vinificação tipo
      description: Especifica a categoria funcional do ingrediente para aditivos e
        ingredientes consumíveis de vinificação.
    wine_making_stage:
      name: Produção de vinho etapa
      description: Identifica para qual etapa do processo de produção de vinho o produto
        se destina.
    wine_style:
      name: Vinho estilo
      description: Classifica o estilo amplo de produção do vinho além da cor, como
        tranquilo, espumante ou fortificado.
    winemaking_process_stage:
      name: Vinificação etapa do processo
      description: Indica a etapa principal do processo de vinificação para a qual
        o suprimento se destina.
    wing_count:
      name: Contagem de abas
      description: Número de asas/braços no bumerangue.
    wing_handle_type:
      name: Tipo de alça da aba
      description: Especifica o estilo do sistema de pegada manual na asa de wingfoil.
    wing_part_type:
      name: Asa tipo de peça
      description: Identifica o componente específico ou peça de reposição para uma
        asa de wingfoil.
    wingfoiling_style:
      name: Wingfoiling estilo
      description: Indica a disciplina específica de wingfoiling ou estilo de uso
        que o produto atende.
    wiper_arm_finish:
      name: Braço do limpador acabamento
      description: Acabamento de superfície ou revestimento protetor aplicado ao braço
        do limpador, impactando a resistência à corrosão e a aparência.
    wiper_arm_pivot_mount_type:
      name: Braço do limpador tipo de montagem no pivô
      description: Especifica como o braço do limpador é montado na articulação ou
        pivô do limpador do veículo.
    wiper_blade_attachment_type:
      name: Palheta do limpador tipo de fixação
      description: Especifica o estilo de conector/fixação usado para montar a palheta
        do limpador no braço do limpador.
    wiper_blade_rubber_material:
      name: Palheta do limpador material da borracha
      description: Material do elemento de limpeza (inserto/refil) que entra em contato
        com o vidro.
    wiper_system_position:
      name: Sistema de limpador posição
      description: Indica a posição de montagem no veículo para o sistema de limpador.
    wire_coating_material:
      name: Material de revestimento da fiação
      description: Especifica o material do revestimento/capa externa aplicado ao
        fio (não o material do fio central), que pode afetar a resistência à abrasão
        e a suavidade com que ele passa pelos furos das contas.
    wire_coating_type:
      name: Fio tipo de revestimento
      description: Especifica se e como o fio é revestido/coberto (para cor, proteção
        e textura).
    wire_construction_type:
      name: Tipo de estrutura da fiação
      description: Especifica a construção física do fio para miçangas, como torcido
        vs sólido e se é revestido.
    wire_finish:
      name: Fio acabamento
      description: Especifica o acabamento de superfície, revestimento ou banho aplicado
        ao fio (por exemplo, polido, esmaltado, galvanizado, banhado), que afeta a
        aparência e a resistência a manchas/corrosão.
    wire_gauge_awg:
      name: Fio calibre (AWG)
      description: Tamanho American Wire Gauge (AWG) dos condutores usados no chicote
        elétrico.
    wire_insulation_material:
      name: Material de isolamento da fiação
      description: Material do isolamento/capa do fio usado no chicote (impacta a
        resistência à temperatura/química).
    wire_packaging_type:
      name: Tempo de embalagem da fiação
      description: Especifica a forma como o fio é vendido/embalado.
    wire_shape_profile:
      name: Fio formato/perfil
      description: Descreve o formato transversal do fio.
    wiring_configuration:
      name: Configuração da fiação
      description: Indica se a espada de esgrima é fornecida pré-cabeada para pontuação
        elétrica, sem fiação, sem fio ou destinada à prática não elétrica.
    wobbler_style:
      name: Wobbler estilo
      description: Define o design/estilo de ação específico do wobbler, como crankbait
        ou jerkbait.
    wood_block_surface_preparation:
      name: Bloco de madeira preparação da superfície
      description: Indica o estado da superfície pronta para uso do bloco de madeira
        para acabamento e artesanato.
    wood_grain_direction:
      name: Madeira direção dos veios
      description: Direção dos veios da madeira em relação à dimensão mais longa do
        produto (importante para resistência, comportamento de corte e aparência).
    wood_slice_edge_style:
      name: Fatia de madeira estilo da borda
      description: Condição da borda da fatia, como borda natural com casca vs borda
        lisa/lixada.
    wooden_block_special_features:
      name: Bloco de madeira recursos especiais
      description: Recursos funcionais notáveis incluídos no conjunto de blocos de
        madeira.
    woodwind_body_construction:
      name: Madeira de sopro construção do corpo
      description: Indica se o instrumento é feito em uma peça ou várias seções (por
        exemplo, 2 peças/3 peças), afetando limpeza, armazenamento e portabilidade.
    woodwind_polishing_cloth_intended_use:
      name: Pano de polimento para madeira de sopro uso pretendido
      description: Especifica o que o pano foi projetado principalmente para limpar/polir
        em um instrumento de madeira de sopro.
    woodwind_small_part_type:
      name: Madeira de sopro tipo de peça pequena
      description: Especifica que tipo de pequena peça de reposição para clarinete
        é o item (por exemplo, ferragens do mecanismo de chaves, sapatilhas/cortiças/feltros,
        anéis).
    woofer_mounting_type:
      name: Tipo de montagem do alto-falante
      description: Como o woofer deve ser montado/usado (free-air vs caixa acústica)
        e formas comuns de montagem automotiva.
    woofer_surround_material:
      name: Woofer material da borda
      description: Material usado na borda do woofer (anel de suspensão externo).
    worn_on_finger:
      name: Dedo de uso
      description: Especifica em qual dedo o guia de dedal deve ser usado.
    wrap_style:
      name: Envoltório estilo
      description: Indica quantas vezes o cinto deve envolver a cintura.
    wrapping_occasion:
      name: Papel de presente ocasião
      description: Principal ocasião de presente/comemoração para a qual o papel de
        presente se destina.
    wrapping_paper_features:
      name: Papel de presente recursos
      description: Propriedades funcionais e relacionadas à sustentabilidade do papel
        de presente, como resistência a rasgos, conteúdo reciclado ou formatos de
        folhas pré-cortadas.
    wrestling_dummy_design:
      name: Boneco de treino de luta design
      description: Formato geral do corpo ou postura do boneco, como formato humano
        em pé ou saco de arremesso, que determina os exercícios de treino aplicáveis.
    wrestling_mat_safety_certifications:
      name: Tatame de luta certificações de segurança
      description: Lista quaisquer certificações ou normas de segurança da indústria
        ou de entidades esportivas que o tatame atende.
    wrist_strap_style:
      name: Modelo com alça para pulso
      description: Descreve o estilo da tira de punho (ou ausência dela) que afeta
        o suporte e o ajuste.
    wrist_support_style:
      name: Suporte de punho estilo
      description: Identifica a construção ou o estilo do suporte de punho, como munhequeira,
        luva, fita ou wrap, para auxiliar a preferência do usuário e a seleção de
        desempenho.
    xylophone_range_octaves:
      name: Alcance do xilofone (oitavas)
      description: A extensão total do xilofone expressa em oitavas (por exemplo,
        2,5 oitavas, 3 oitavas, 4 oitavas).
    xylophone_resonator_type:
      name: Xilofone tipo de ressonador
      description: Tipo de sistema de ressonador usado para amplificar o tom (se houver).
    yam_variety:
      name: Variedade de inhame
      description: Especifica o cultivar ou variedade comum de inhame vendido (por
        exemplo, roxo, amarelo, inhame-elefante).
    yarn_cutter_physical_style:
      name: Cortador de fio físico estilo
      description: Identifica o estilo físico de um cortador de fio (por exemplo,
        pingente, anel, tesoura pequena) para apoiar a navegação e filtragem nesta
        categoria.
    yarn_finish_or_effect:
      name: Fio acabamento ou efeito
      description: Destaca tratamentos visuais ou funcionais especiais aplicados ao
        fio, como fluorescência ou brilho metálico.
    yarn_guide_style:
      name: Guia de fio estilo
      description: O estilo físico do componente guia de fio.
    yarn_swift_adjustability:
      name: Dobadeira de fio ajustabilidade
      description: Indica se e como a dobadeira pode ser ajustada (expansível, retrátil/dobrável),
        afetando o armazenamento e a variedade de tamanhos de meadas que ela comporta.
    yarn_swift_bearing_type:
      name: Dobadeira de fio tipo de rolamento
      description: Descreve o mecanismo de suporte de rotação (por exemplo, rolamento
        de esferas) que afeta a suavidade e a velocidade de enrolamento.
    yeast_application:
      name: Aplicação do fermento
      description: Indica o principal uso culinário ou de fermentação pretendido do
        produto de levedura.
    yo_yo_accessory_part_type:
      name: Ioiô acessório/tipo de peça
      description: Identifica que tipo de peça de reposição ou acessório de ioiô é
        o produto (por exemplo, corda, rolamento, pads de resposta).
    yo_yo_axle_system_type:
      name: Ioiô tipo de sistema de eixo
      description: Abordagem de construção do eixo do ioiô (por exemplo, eixo fixo
        vs transaxle), impactando a sensação de uso e a manutenção.
    yo_yo_bearing_size_class:
      name: Ioiô classe de tamanho do rolamento
      description: Classe de tamanho padronizada do rolamento usado pelo ioiô, quando
        aplicável.
    yo_yo_bearing_type:
      name: Ioiô tipo de rolamento
      description: Configuração do rolamento que influencia a responsividade e as
        características de rotação.
    yo_yo_play_style:
      name: Ioiô estilo de uso
      description: Estilo principal de uso pretendido do ioiô, refletindo a disciplina
        de corda/truque para a qual o produto foi projetado.
    yo_yo_response_system:
      name: Ioiô sistema de resposta
      description: Especifica o mecanismo de resposta do ioiô para o qual esta peça
        foi projetada (compatibilidade).
    yo_yo_responsiveness:
      name: Ioiô responsividade
      description: Se o ioiô retorna à mão com um puxão (responsivo) ou exige um bind
        (não responsivo).
    yo_yo_string_material:
      name: Ioiô material da corda
      description: Composição do material da corda do ioiô.
    yogurt_base_ingredient:
      name: Ingrediente base do iogurte
      description: Identifica a principal fonte láctea ou vegetal usada para fazer
        o iogurte, essencial para preferências alimentares e considerações sobre alérgenos.
    yoke_type:
      name: Tipo de apoio
      description: Identifica o estilo de berço ou apoio que sustenta a arma de fogo
        no monopé.
    zill_playing_style:
      name: Estilo de tocar zill
      description: Contexto/estilo de uso pretendido (comumente dança do ventre vs
        variantes orquestrais/culturais).
    zill_strap_material:
      name: Material da alça do zill
      description: Material da tira/elástico usado para prender os zills aos dedos
        (se incluído), impactando conforto, durabilidade e aderência.
    zills_strap_adjustability:
      name: Zills ajuste da tira
      description: Se e como a tira/elástico incluído pode ser ajustado para melhor
        encaixe.
    zipper_application:
      name: Zíper aplicação
      description: Especifica o projeto ou aplicação pretendida para a qual o zíper
        foi projetado.
    zipper_chain_type:
      name: Zíper tipo de corrente
      description: Especifica a construção/tipo da corrente/dos dentes do zíper.
    zipper_end_type:
      name: Zíper tipo de extremidade
      description: Indica como o zíper termina e se ele se separa (extremidade aberta)
        ou é fechado (não separável), incluindo ferragens comuns de extremidade separável
        usadas em zíperes para artesanato.
    zipper_gauge:
      name: Zíper calibre
      description: 'Indica a designação de calibre/tamanho da corrente do zíper, geralmente
        expressa como um número com # (por exemplo, #3 ou #5), que corresponde à largura
        dos dentes/espiral e ao uso pretendido.'
    zipper_opening_length:
      name: Zíper comprimento de abertura
      description: Define quanto da abertura frontal é fechada por zíper, distinguindo
        estilos com zíper inteiro de meio zíper ou zíper de um quarto.
    zipper_pull_material:
      name: Zíper material do puxador
      description: Especifica o material do puxador do zíper ou aba do puxador (a
        parte que se segura), distinto dos dentes/corrente e da fita do zíper.
    zipper_pull_side:
      name: Puxador lateral do zíper
      description: Especifica de qual(is) lado(s) do zíper a aba do puxador fica acessível.
    zipper_pull_strap_cord_tab_material:
      name: Zíper material da tira/cordão/aba do puxador
      description: Material do componente de tira/cordão/aba/pingente preso ao puxador
        do zíper (se presente), excluindo a ferragem/corpo principal do puxador do
        zíper.
    zipper_reversibility_mechanism:
      name: Zíper mecanismo de reversibilidade
      description: Especifica como o zíper é reversível (por exemplo, cursor de dupla
        face vs cursor flip/auto-lock projetado para peças reversíveis).
    zipper_separating_type:
      name: Zíper tipo separável
      description: Indica se o zíper se separa na parte inferior/superior ou tem extremidade
        fechada, para encaixe em jaquetas, sacos de dormir, bolsas, etc.
    zipper_side:
      name: Zíper lado
      description: Especifica o lado em que o zíper principal fica localizado quando
        o saco de dormir está deitado com a parte frontal voltada para cima.
    zipper_slider_material:
      name: Zíper material do cursor
      description: Especifica o material do cursor do zíper (o mecanismo móvel), que
        pode impactar a resistência e a resistência à corrosão.
    zipper_slider_pull_configuration:
      name: Zíper configuração do cursor/puxador
      description: Indica se o zíper tem um cursor/puxador ou dois, e se os puxadores
        ficam em um ou ambos os lados do cursor.
    zipper_style:
      name: Estilo do zíper
      description: Indica o comprimento ou a presença do zíper na peça de vestuário
        (por exemplo, sem zíper, zíper de um quarto, meio zíper, zíper inteiro).
    zipper_tape_material:
      name: Material da fita do zíper
      description: Especifica o material principal da fita do zíper (laterais de tecido)
        costurada no projeto.
    zipper_teeth_type:
      name: Tipo de fecho do zíper
      description: Especifica o estilo de construção da corrente/dos dentes do zíper
        (por exemplo, espiral, plástico moldado, metal, invisível), que afeta a flexibilidade,
        a resistência e as aplicações típicas.
    assembly_required:
      name: Requer montagem
      description: Indica se o produto requer montagem antes do uso
    organic_certification:
      name: Certificação orgânica
      description: Identifica qual certificação orgânica ou de sustentabilidade o
        produto possui
