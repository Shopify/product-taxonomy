    fader_type:
      name: Tipo de fader
      description: Identifica o estilo físico dos faders de canal no mixer.
    false_eyelash_adhesive_formulation:
      name: Formulação do adesivo de cílios postiços
      description: Especifica a formulação química primária da cola.
    false_nail_adhesive_type:
      name: Tipo de adesivo para unhas postiças
      description: Identifica o tipo de opção adesiva fornecida ou necessária para
