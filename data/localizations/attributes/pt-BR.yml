    rug_shape:
      name: Formato do tapete
      description: Identifica o desenho geométrico dos tapetes, como quadrado ou corredor
    rum_grade:
      name: Grau de rum
      description: Classifica o rum com base em características ou qualidade, por
        exemplo, premium, condimentado
    saddle_base_color:
      name: Cor base do selim
      description: Identifica a cor primária da base do selim de uma bicicleta, como
        preto ou azul
    saddle_base_material:
      name: Material base do selim
      description: Identifica o material utilizado na base do selim da bicicleta,
