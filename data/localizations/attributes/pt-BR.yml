    processor_family:
      name: Família de processadores
      description: Identifica a série ou marca da CPU do dispositivo eletrônico, por
        exemplo, Intel Core i7
    processor_socket:
      name: Soquete do processador
      description: Especifica o tipo de soquete de processador compatível em eletrônicos,
        como LGA 1151 (soquete H4) ou soquete AM4
    processor_technology:
      name: Tecnologia de processador
      description: Define a tecnologia de processador, normalmente para equipamentos
        de áudio; por exemplo, baseado em software, tubo/válvula
    product_benefits:
      name: Benefícios do produto
      description: Descreve os benefícios que um produto oferece, normalmente para
        saúde e beleza; por exemplo, suavização, firmeza
    product_certifications_standards:
      name: Certificações e padrões de produtos
      description: Indica as certificações ou padrões que um produto atende, como
        orgânico ou livre de crueldade
    product_classification:
      name: Classificação do produto
      description: 'Classifica o tipo de material precioso, moeda ou item valioso
        (ex.: moeda, barras de ouro, pedras preciosas, cartão-presente, NFT)'
    product_form:
      name: Ficha técnica do produto
      description: Define o formato ou apresentação de um produto, normalmente de
        saúde e beleza; por exemplo, loção, sérum
    product_format:
      name: Formato do produto
      description: Indica se o item é entregue como produto físico ou download digital.
    product_formulation:
      name: Formulação do produto
      description: Identifica a composição dos consumíveis de construção, por exemplo,
        substância base, mistura pronta para uso
    product_manual_area:
      name: Área do manual do produto
      description: Especifica o tópico de um manual de produto, por exemplo, câmera
        e óptica, material de escritório
    product_sterility:
      name: Esterilidade do produto
      description: Indica se um produto é estéril para saúde e segurança
    product_use:
      name: Uso do produto
      description: 'Identifica o principal uso ou finalidade previsto para materiais
        preciosos ou itens colecionáveis (ex.: moeda/dinheiro de curso legal, artigo
        colecionável, joia, cartão-presente).'
    program_format:
      name: Formato do programa
      description: Descreve o layout de programas de eventos, como livreto ou folha
        única
    projection_design:
      name: Formato do projetor
      description: Descreve o padrão ou imagem projetada por um filtro de iluminação
        ou gobo, como texto ou logotipo
    projector_light_source:
      name: Fonte de luz do projetor
      description: Identifica o tipo de fonte de luz em um projetor, como LED ou laser
    prop_theme:
      name: Tema dos adereços
      description: Identifica o estilo ou gênero de acessórios de filmes e televisão,
        como histórico ou ficção científica
    propane_application:
      name: Aplicação de propano
      description: Especifica a finalidade do propano, como aquecimento ou grelha
    propeller_blade_design:
      name: Formato da pá da hélice
      description: Descreve a configuração das pás em uma hélice de embarcação, como
        3 pás ou 4 pás
    prophy_cup_design:
      name: Formato do copo profilático
      description: Descreve o design dos copos de profilaxia usados em odontologia,
        como escova ou estriado
    propulsion_type:
      name: Tipo de propulsão
      description: Especifica o método de movimento para equipamentos externos, por
        exemplo, empurrar, rebocar
    protected_component:
      name: Componente protegido
      description: Identifica a parte da máquina de pinball que a cobertura protege.
    protection_type:
      name: Tipo de proteção
      description: Identifica o nível de proteção oferecido pelos equipamentos de
        segurança, como Tipo I ou Tipo II
    protective_gear_features:
      name: Recursos de equipamento de proteção
      description: Identifica as características únicas dos equipamentos de proteção,
        como à prova de choque ou antiembaçante
    protective_mask_design:
      name: Design de máscara protetora
      description: Especifica o design de máscaras de proteção, como máscara facial
        inteira ou meia máscara
    protective_mask_features:
      name: Características da máscara protetora
      description: Detalha as características exclusivas das máscaras de proteção,
        como alça ajustável ou válvula
    protein_processing_type:
      name: Tipo de processamento de proteína
      description: Especifica como a proteína é refinada ou processada (p. ex., isolado
        vs. concentrado), afetando pureza, taxa de digestão e preferência do consumidor.
    protein_source:
      name: Fonte de proteína
      description: Identifica a origem primária de proteína usada no suplemento.
    pstn_connectivity_options:
      name: Opções de conectividade PSTN
      description: Especifica as interfaces de rede telefônica pública comutada (PSTN)
        que um produto suporta, por exemplo, FXO, POTS
    publication_frequency:
      name: Frequência de publicação
      description: Indica a frequência com que uma revista ou jornal é publicado,
        como diariamente ou mensalmente
    publication_type:
      name: Tipo de publicação
      description: Identifica o tipo de publicação acadêmica ou de pesquisa, como
        um artigo de periódico ou tese
    pull_up_bar:
      name: Barra de flexão de braços
      description: Especifica o tipo de gancho em equipamentos de fitness, como padrão
        ou natural
    pump_accessories:
      name: Acessórios da bomba
      description: Identifica itens incluídos nas bombas tira leite, como estojo de
        transporte ou mamadeiras
    pump_speed_settings:
      name: Configurações de velocidade da bomba
      description: Especifica os recursos de controle de velocidade, normalmente para
        bombas tira leite; por exemplo, velocidade ajustável
    punching/training_bag_material:
      name: Material do saco de pancadas/treinamento
      description: Identifica o principal material usado em um saco de pancadas/treinamento,
        como couro ou lona
    puppet_theme:
      name: Tema do fantoche
      description: Categoriza fantoches com base no tema do design, como humano ou
        fantástico
    puppet_type:
      name: Tipo de fantoche
      description: Identifica o estilo do fantoche, como fantoche de mão ou marionete
    push_button_terminal_type:
      name: Tipo de terminal do botão de pressão
      description: Especifica o estilo de conexão elétrica no botão, garantindo compatibilidade
        com chicotes elétricos e terminais de engate rápido durante a instalação.
    puzzle_theme:
      name: Tema de quebra-cabeça
      description: Descreve o assunto principal ou motivo de um quebra-cabeça, como
        animais ou espaço
    puzzle_type:
      name: Tipo de quebra-cabeça
      description: Identifica o tipo específico de quebra-cabeça, como 3D ou desafio
    quiver_style:
      name: Tipo de aljava
      description: Especifica o estilo da aljava no tiro com arco, por exemplo, quadril,
        costas
    rack_design:
      name: Projeto de prateleira
      description: Descreve o layout ou estrutura de um suporte para copos, como aberto
        ou com compartimentos
    rack_format:
      name: Formato do rack
      description: Define o padrão físico de gabinete ou tamanho do channel strip,
        indicando se ele é projetado para instalação em rack ou para uso sobre a mesa.
    rack_mounting_style:
      name: Estilo de montagem em rack
      description: Descreve o estilo estrutural da montagem em rack (p. ex., prateleira
        fixa, prateleira deslizante, trilhos, painel cego).
    rack_type:
      name: Tipo de prateleira
      description: Identifica o estilo de um suporte de armazenamento de veículo,
        como porta-malas ou teto
    rack_width_standard:
      name: Padrão de largura do rack
      description: Define o padrão da indústria de largura de montagem horizontal
        seguido pelo produto.
    racket_balance:
      name: Equilíbrio da raquete
      description: Indica a distribuição de peso de uma raquete, por exemplo, cabeça
        pesada, equilíbrio uniforme
    racket_gauge:
      name: Extensômetro de raquete
      description: Especifica a espessura das cordas das raquetes de tênis, por exemplo,
        16
    racket_head_shape:
      name: Formato da cabeça da raquete
      description: Define o formato da cabeça da raquete, por exemplo, oval, isométrico
    racket_material:
      name: Material da raquete
      description: Especifica o tipo de material do qual uma raquete esportiva é feita,
        como madeira ou fibra de carbono
    racket_string_design:
      name: Design de corda de raquete
      description: Identifica a construção das cordas em raquetes de tênis, como monofilamento
        e multifilamento
    racket_string_material:
      name: Material de corda de raquete
      description: Especifica a composição das cordas da raquete de tênis, como Kevlar
        ou Poliuretano (PU)
    radar_bands:
      name: Bandas de sistema de radar
      description: Especifica as faixas de frequência que um dispositivo de radar
        pode detectar, por exemplo, X, K
    radar_technology:
      name: Tecnologia de radar
      description: Especifica a tecnologia de radar usada em um produto, por exemplo,
        pulso, estado sólido
    radio_case_design:
      name: Formato da caixa do rádio
      description: Define o estilo ou a funcionalidade dos estojos de transporte de
        rádio, como fixos ou giratórios
    radio_features:
      name: Recursos de rádio
      description: Especifica os recursos exclusivos de um rádio, como suporte a GPS
        ou reprodução de MP3
    radio_form_factor:
      name: Formato do rádio
      description: Identifica a classe física do transceptor amador, influenciando
        opções de montagem, requisitos de energia e cenários de uso típicos.
    radio_scanner_form_factor:
      name: Formato do scanner de rádio
      description: Indica a configuração física ou estilo de montagem do scanner de
        rádio (p. ex., portátil, base, desktop, montado em veículo).
    radiology_compatibility:
      name: Compatibilidade radiológica
      description: Indica se a órtese pode permanecer no paciente durante procedimentos
        de imagem (p. ex., RM, TC, raio-X).
    raid_levels_supported:
      name: Níveis RAID suportados
      description: Lista todas as configurações RAID que a matriz de discos rígidos
        pode criar ou gerenciar.
    ramp_type:
      name: Tipo de rampa
      description: Especifica o design ou estilo das rampas de skate, como half-pipe
        ou fun box
    range_type:
      name: Tipo de alcance
      description: Define a área de cobertura de monitores de bebês, como longo alcance
    rarity:
      name: Raridade
      description: Especifica a exclusividade dos itens, normalmente para itens colecionáveis;
        por exemplo, edição limitada, ultrarraro
    razor_flexibility:
      name: Flexibilidade da lâmina
      description: Indica a flexibilidade de aparelhos de barbear e aparadores, por
        exemplo, flexíveis ou fixas
    razor_head_design:
      name: Formato da cabeça da lâmina
      description: Define o número de lâminas em um aparelho de barbear, por exemplo,
        simples, tripla
    razor_type:
      name: Tipo de lâmina de barbear
      description: 'Especifica o design do aparelho de barbear, por exemplo, reto
        ou sintético '
    read/write_speed:
      name: Velocidade de leitura/gravação
      description: Indica a taxa ou velocidade de transferência de dados, normalmente
        para duplicadores de disco; por exemplo, 4x, 52x
    reading_toy_type:
      name: Tipo de brinquedo de leitura
      description: Especifica o tipo de brinquedo educativo de leitura, por exemplo,
        jogo de ortografia, tablet de leitura
    receipt_paper_features:
      name: Recursos do papel de recibo
      description: Identifica características únicas do papel de recibo, como indicador
        de fim de rolo ou logotipo pré-impresso
    reclining_function:
      name: Função reclinável
      description: Descreve recursos reclináveis específicos, como reclinação total
        ou gravidade zero
    recommended_age_group:
      name: Faixa etária recomendada
      description: Identifica a faixa etária adequada para um produto, normalmente
        brinquedos e jogos; por exemplo, bebês, adolescentes
    recommended_skill_level:
      name: Nível de habilidade recomendado
      description: Especifica o nível de habilidade, por exemplo, principiante, especialista
    recommended_use:
      name: Uso recomendado
      description: Identifica o uso ou domínio principal para o qual um produto de
        hardware foi projetado, por exemplo, industrial, residencial
    record_cleaning_components_included:
      name: Componentes de limpeza de discos incluídos
      description: Lista os itens específicos fornecidos no kit para que os clientes
        possam comparar pacotes rapidamente (p. ex., escova, fluido, pano).
    recorder_fingering_system:
      name: Sistema de dedilhado no gravador
      description: Especifica o tipo de sistema de dedilhado para flauta doce, por
        exemplo, alemão, barroco
    recorder_specialized_features:
      name: Recursos especializados do gravador
      description: Identifica recursos avançados em gravadores de vídeo, por exemplo,
        inteligente, suporte para Dolby Atmos
    recording_accessories_included:
      name: Acessórios de gravação incluídos
      description: Detalha os componentes extras incluídos nos pacotes de gravação,
        como fones de ouvido ou microfone
    recording_capability_type:
      name: Tipo de capacidade de gravação
      description: Indica se o receptor pode gravar conteúdo de TV e o método usado
        (p. ex., USB PVR, HDD interno, nuvem).
    recording_functionality:
      name: Funcionalidade de gravação
      description: Indica se e como o receptor pode gravar conteúdo de TV (p. ex.,
        DVR para HDD interno, USB externo).
    recording_mode:
      name: Modo de gravação
      description: Lista os modos operacionais que o gravador suporta (p. ex., contínuo,
        gravação cronometrada).
    recording_quality:
      name: Qualidade de gravação
      description: Descreve a clareza de áudio dos transcritores e sistemas de ditado,
        como baixa ou alta
    recording_speed_modes_supported:
      name: Modos de velocidade de gravação suportados
      description: Lista os modos de velocidade de fita que o videocassete pode gravar
        ou reproduzir, afetando o tempo de gravação e a qualidade da imagem.
    recreational_vehicle_type:
      name: Tipo de veículo recreacional
      description: Identifica a categoria de um veículo recreativo, como Classe A
        ou trailer de viagem
    reed_strength:
      name: Resistência da palheta
      description: Indica a flexibilidade das palhetas de instrumentos de sopro, como
        macia, média ou dura
    reel_capacity:
      name: Capacidade do carretel
      description: Especifica a capacidade de um carretel em um tanque de revelação,
        como único ou quádruplo
    reflector_design:
      name: Formato do refletor
      description: Descreve o design de um refletor de flash, como colmeia ou guarda-chuva
    regenerative_braking_features:
      name: Recursos de frenagem regenerativa
      description: Descreve as características dos módulos de frenagem regenerativa
        de veículos elétricos, por exemplo, resistência às condições climáticas, fácil
        de instalar
    region:
      name: Região
      description: Identifica o local de origem específico do produto, normalmente
        para vinhos e bebidas espirituosas; por exemplo, Califórnia, Bordeaux
    region_code:
      name: Código da região
      description: Especifica a região onde um software de videogame está licenciado
        para uso, como Ásia (AS) ou Global (GL)
    release_mechanism:
      name: Mecanismo de liberação
      description: Indica a tecnologia de entrega ou absorção da vitamina (p. ex.,
        liberação sustentada, lipossomal, mastigável).
    release_schedule:
      name: Cronograma de lançamento
      description: Especifica a frequência com que novos episódios ou atualizações
        são lançados, por exemplo, semanalmente, quinzenalmente
    remote_control_functions:
      name: Funções do controle remoto
      description: Lista as ações específicas que o obturador remoto pode acionar
        além de tirar fotos.
    remote_shutter_form_factor:
      name: Formato do obturador remoto
      description: Indica o estilo físico ou carcaça do obturador remoto, como chaveiro/botão,
        controlador em anel ou bastão de selfie com obturador integrado
    remote_technology:
      name: Tecnologia remota
      description: Identifica a tecnologia usada nos controles remotos de câmera,
        como Bluetooth ou com fio
    removable_storage_formats_supported:
      name: Formatos de armazenamento removíveis com suporte
      description: Define os formatos de armazenamento removíveis com os quais um
        dispositivo é compatível, por exemplo, SD, microUSB
    removal_target:
      name: Alvo de remoção
      description: Especifica quais produtos de unhas o removedor é projetado para
        dissolver (p. ex., esmalte em gel, unhas acrílicas, pó de imersão).
    replacement_lamp_type:
      name: Tipo de lâmpada de substituição
      description: Classifica o estilo da peça de reposição fornecida (p. ex., módulo
        de lâmpada e habitação, tira de retroiluminação LED, montagem CCFL).
    reptile/amphibian_food_form:
      name: Forma alimentar de répteis/anfíbios
      description: Especifica a forma de alimento para répteis/anfíbios, por exemplo,
        liofilizado ou peletizado
    reptile/amphibian_habitat_supply_type:
      name: Tipo de habitat para répteis/anfíbios
      description: Identifica o tipo de aquecimento ou fornecimento de iluminação
        para habitats de répteis/anfíbios, como uma lâmpada de calor ou lâmpada UVB
    research_focus:
      name: Foco da pesquisa
      description: Identifica a principal área de estudo em trabalhos acadêmicos,
        como biologia ou economia
    research_methodology:
      name: Metodologia de pesquisa
      description: Identifica o tipo de métodos de pesquisa utilizados em trabalhos
        acadêmicos, como pesquisa ou qualitativo
    resistance_level:
      name: Nível de resistência
      description: Indica o nível de resistência do produto, normalmente para faixas
        elásticas; por exemplo, muito pesado
    resistance_system:
      name: Sistema de resistência
      description: Define o mecanismo usado para criar resistência em equipamentos
        de fitness, por exemplo, água, ar
    resistance_tolerance:
      name: Tolerância de resistência
      description: Define o desvio permitido da resistência real de seu valor nominal,
        expresso como uma porcentagem (p. ex., ±1%).
    restrictor_gate_shape:
      name: Formato da placa restritora
      description: Define o formato geométrico da placa restritora incluída ou exigida
        pelo joystick.
    result_display:
      name: Tela de resultados
      description: Especifica o formato do teste de gravidez, por exemplo, baseado
        em linha, digital
    retail/sale_sign_design:
      name: Formato de letreiro de varejo e vendas
      description: Indica o tipo de mensagem em cartazes de varejo ou de venda, por
        exemplo, liquidação, oferta especial
    reticle_plane:
      name: Plano retícula
      description: Especifica o plano focal do retículo em armas, por exemplo, primeiro
        ou segundo
    reticle_type:
      name: Tipo de retículo
      description: Identifica o tipo de retículo em miras de arma, como Duplex ou
        Mildot
    rewinder_operation_mode:
      name: Modo de operação do rebobinador
      description: Define os modos funcionais que o rebobinador suporta (p. ex., apenas
        rebobinar, rebobinar e avanço rápido).
    rf_output_standard:
      name: Padrão de saída RF
      description: Especifica o padrão de transmissão de televisão ou rádio que o
        modulador produz.
    rfid_frequency:
      name: Frequência RFID
      description: Especifica a frequência operacional de produtos RFID, por exemplo,
        baixa, ultra-alta
    riding_style:
      name: Estilo de equitação
      description: Especifica o uso pretendido ou estilo de pilotagem para equipamentos
        de esportes de inverno, por exemplo, slalom, freestyle
    riding_toy_propulsion_type:
      name: Tipo de propulsão de brinquedo de passeio
      description: Identifica como um brinquedo de passeio é impulsionado, como elétrico
        ou pedal
    rim/wheel_design:
      name: Design do aro/roda
      description: Descreve o estilo ou construção das rodas/aros de veículos, como
        de liga leve ou raiadas
    ring_design:
      name: Design de anel
      description: Descreve o estilo de um anel, como aliança ou solitário
    ring_size:
      name: Tamanho do anel
      description: Especifica o tamanho de um anel, como G ou 6,5
    rinse_requirement:
      name: Requisito de enxágue
      description: Esclarece se o limpador deve ser enxaguado, pode ser deixado ou
        não requer enxágue (p. ex., água micelar).
    rise_height_class:
      name: Classe de altura do extensor de controle
      description: Classifica o quanto de altura adicional o extensor adiciona em
        relação ao analógico original (p. ex., baixo, médio ou alto).
    riser_color:
      name: Cor do riser
      description: Identifica a cor do riser em arcos de tiro com arco, como preto
        ou azul
    riser_material:
      name: Material do suporte
      description: Especifica o material de um arco ou arco de besta, como fibra de
        carbono ou madeira
    riser_pattern:
      name: Padrão de riser
      description: Descreve o desenho ou motivo no suporte de arcos e arco e flecha,
        como camuflagem ou textura
    rivet_form:
      name: Formato do rebite
      description: Descreve a forma dos rebites de ferragens, por exemplo, sólidos,
        divididos
    road_sign_design:
      name: Formato da placa de rodovia
      description: Identifica o tipo de informação exibida em uma placa de trânsito,
        por exemplo, pare, limite de velocidade
    robe_style:
      name: Estilo de roupão
      description: Especifica o tipo de design geral ou estilo de fabricação do roupão,
        como roupão de spa ou capa.
    rock_composition:
      name: Composição rochosa
      description: Especifica a composição geológica de uma rocha, como mármore ou
        calcário
    rock_formation:
      name: Formação rochosa
      description: Especifica a classificação geológica de rochas, como ígneas ou
        sedimentares
    rocker_type:
      name: Tipo rochoso
      description: Especifica o estilo de curvatura de pranchas de snowboard ou esquis,
        por exemplo, plano, balancim
    rod_color:
      name: Cor da haste
      description: Identifica a cor de uma vara de pescar, por exemplo, preta ou azul
    rod_material:
      name: Material da vara
      description: Identifica o material usado em artigos esportivos com hastes, como
        grafite ou fibra de vidro
    rod_pattern:
      name: Padrão da haste
      description: Descreve o desenho ou impressão em uma vara de pescar, como camuflagem
        ou listrada
    rod_shape:
      name: Forma da haste
      description: Define a forma ou configuração das barras para chuveiros, por exemplo,
        retas, em forma de U
    roller_head:
      name: Cabeça do rolo
      description: Define o número de cabeças nos rollers, normalmente para ferramentas
        de cuidados com a pele; por exemplo, simples, dupla
    roller_material:
      name: Material do massageador
      description: Especifica o material usado em um roller, normalmente para ferramentas
        de cuidados com a pele; por exemplo, jade, silicone
    roller_type:
      name: Tipo de roldana
      description: Identifica o tipo de roller, normalmente para ferramentas de cuidados
        com a pele; por exemplo, gelo, microagulha
    roof_decor_shape:
      name: Forma de decoração do telhado
      description: Define o design ou forma das decorações de telhado, como cavalo
        ou veleiro
    room_correction_technology:
      name: Tecnologia de correção de sala
      description: Especifica o sistema de calibração acústica automática ou correção
        de sala integrado no receptor.
    rosin_form:
      name: Formulação da resina
      description: Descreve a forma do breu para arcos de instrumentos de corda, como
        bloco ou bolo
    rosin_grade:
      name: Grau de breu
      description: Especifica o tipo de breu usado para instrumentos de corda, por
        exemplo, escuro, médio
    rotating_direction:
      name: Direção de rotação
      description: Especifica a direção de rotação das brocas e pontas de parafusos,
        como esquerda ou direita
    rotation_direction:
      name: Direção de rotação
      description: Indica se a broca de unha oferece rotação para frente, reversa
        ou ambas.
    rotator_control_technology:
      name: Tecnologia de controle do rotador
      description: Define o mecanismo de controle dos rotores de antena, como manual
