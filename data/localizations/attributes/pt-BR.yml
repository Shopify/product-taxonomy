    bird_treat_type:
      name: Tipo de guloseima para pássaros
      description: Identifica a categoria dos petiscos para pássaros, como biscoitos
        ou frutas
    birthday_candle_design:
      name: Formato da vela de aniversário
      description: Descreve o tema visual das velas de aniversário, como formato de
        animal ou personagem de desenho animado
    birthday_candle_type:
      name: Tipo de vela de aniversário
      description: Identifica as características únicas das velas de aniversário,
        como perfumadas ou brilhantes
    bitter_variety:
      name: Variedade amarga
      description: Classifica os bitters com base em seus perfis de sabor, por exemplo,
        floral, picante
    blade_coating:
      name: Revestimento da lâmina
      description: Especifica qualquer revestimento de desempenho aplicado à lâmina
        para melhorar corte ou deslizamento (p. ex., platina, PTFE, titânio).
    blade_curve:
      name: Curva da lâmina
      description: Especifica a curva da lâmina em um taco de hóquei, por exemplo,
        aberto, ponta
    blade_design:
      name: Formato da lâmina
      description: Especifica o estilo de lâmina em facas utilitárias, como navalha
        ou removível
    blade_edge_configuration:
      name: Configuração do fio da lâmina
      description: Define o formato do fio de uma lâmina individual (p. ex., fio simples,
        fio duplo, sistema com cartucho, meia lâmina).
    blade_material:
      name: Material da lâmina
      description: Especifica o material usado na fabricação da lâmina, como aço ou
        alumínio
    blade_type:
      name: Tipo de lâmina
      description: Define o formato e o estilo da lâmina de um produto, como reta
        ou punhal
    blanket_color:
      name: Cor do cobertor
      description: Identifica a cor primária de uma manta, como marinho ou multicor
    blanket_pattern:
      name: Padrão de cobertor
      description: Descreve o desenho ou motivo de uma manta, como floral ou geométrico
    blending_type:
      name: Tipo de combinação
      description: Identifica o método de mistura utilizado em equipamentos de laboratório,
        como contínuo ou em lote
    blind/shade_style:
      name: Estilo da cortina/persiana
      description: Identifica o design ou tipo de persiana ou veneziana, como horizontal
        ou vertical
    blocked_signal_types:
      name: Tipos de sinal bloqueados
      description: Especifica categorias de sinais sem fio que o bloqueador pode bloquear.
    blood_group_systems_detected:
      name: Sistemas de grupos sanguíneos detectados
      description: Identifica quais sistemas de grupos sanguíneos o kit pode determinar.
    blood_test_kit_components:
      name: Componentes do kit de exame de sangue
      description: Especifica os itens incluídos em um kit de exame de sangue, por
        exemplo, gaze, ataduras adesivas
    bluetooth_functionality:
      name: Funcionalidade Bluetooth
      description: Indica se o dispositivo atua como transmissor, receptor ou ambos
        (transceptor).
    board_concave_shape:
      name: Forma côncava da prancha
      description: Define a curva côncava das pranchas de surf ou paddleboard; por
        exemplo, V côncavo, plano
    board_game_features:
      name: Características do jogo de tabuleiro
      description: Destaca as características únicas de um jogo de tabuleiro, por
        exemplo, configuração rápida, expansão disponível
    board_game_mechanics:
      name: Mecânica do jogo de tabuleiro
      description: Descreve a estrutura de jogo de um jogo de tabuleiro, como estratégia
        ou cooperação
    board_material:
      name: Material da placa
      description: Especifica o tipo de material dos painéis de apresentação, como
        acrílico ou porcelana
    board_mounting_type:
      name: Tipo de montagem de quadro
      description: Especifica o estilo de configuração dos painéis de apresentação,
        como portáteis ou com suporte de cavalete
    board_profile:
      name: Perfil de prancha
      description: Define o perfil de uma prancha de surf, por exemplo, plana, balancim
    board_surface:
      name: Superfície do quadro
      description: Descreve o tipo de superfície em um painel de exibição, como tecido
        ou cortiça
    board_type:
      name: Tipo de skate
      description: Classifica os skates com base no design e na finalidade, como clássico
        ou cruiser
    boat_type:
      name: Tipo de barco
      description: Identifica o design específico ou modelo de uma embarcação, como
        pontoon ou barco com convés
    body/facial_hair_type:
      name: Tipo de pelo facial/corporal
      description: Ajuda a fazer a correspondência de produtos de higiene com tipos
        de cabelo, como fino ou grosso, normalmente para descoloração de cabelo
    body_area:
      name: Área do corpo
      description: Especifica a parte do corpo para a qual o produto foi projetado,
        por exemplo, rosto, virilha
    body_color:
      name: Cor do corpo
      description: Especifica a cor primária dos veículos ou peças, por exemplo, branco
        ou prata
    body_jewelry_type:
      name: Tipo de joia corporal
      description: Identifica o tipo específico de joia corporal, por exemplo, piercing
        para barriga, orelha
    body_material:
      name: Material do corpo
      description: Especifica o material primário de um produto, normalmente varas
        de pesca; por exemplo, compósito, alumínio
    body_paint/foundation_type:
      name: Tipo de pintura corporal/base
      description: Especifica a categoria do produto de maquiagem corporal, como base
        ou sangue falso
    body_paint_formula_base:
      name: Base da fórmula da tinta corporal
      description: Identifica a base de formulação primária, que afeta durabilidade,
        acabamento e método de remoção.
    body_pattern:
      name: Padrão corporal
      description: Descreve o design visual ou motivo na superfície primária de um
        produto, por exemplo, floral, geométrico
    body_side:
      name: Lado do corpo
      description: Define se o produto é projetado para o lado esquerdo, lado direito,
        ou é adequado para uso bilateral.
    bodyboard_features:
      name: Características do bodyboard
      description: Descreve as características únicas de uma prancha de bodyboard,
        como superfície rígida ou inflável
    boiler_system:
      name: Sistema de caldeira
      description: Especifica o sistema de caldeira para aparelhos de aquecimento,
        por exemplo, combinado, individual
    bolt_form:
      name: Formato do parafuso
      description: Descreve o formato dos parafusos de equipamentos, por exemplo,
        sextavados, máquina
    bolt_material:
      name: Material do parafuso
      description: Identifica a composição das flechas de tiro com arco, como bambu
        ou fibra de vidro
    bone_anchored_interface_type:
      name: Tipo de interface ancorada no osso
      description: Define como o processador se conecta ao implante, diferenciando
        entre pilar percutâneo e sistemas magnéticos transcutâneos.
    book/file_cover_material:
      name: Material de capa de livro/arquivo
      description: Identifica o material utilizado nas capas de livros ou pastas,
        como papelão ou couro
    book_cover_material:
      name: Material da capa do livro
      description: Identifica o material usado nas capas de livros, como couro ou
        papel
    book_cover_type:
      name: Tipo de capa de livro
      description: Identifica o tipo de capa de um livro, como capa dura ou brochura
    bookmark_design:
      name: Formato do marcador
      description: Descreve o estilo ou tipo de marcador, como magnético ou de clipe
    bookmark_shape:
      name: Forma do marcador
      description: Descreve o formato ou contorno de um marcador, como redondo ou
        quadrado
    boombox_lighting_effects:
      name: Efeitos de iluminação do boombox
      description: Descreve a presença e estilo de shows de luz LED ou RGB integrados
        ao alto-falante.
    boot_style:
      name: Estilo da bota
      description: Especifica o estilo das botas, por exemplo, botas de cano curto
    boot_type:
      name: Tipo de bota
      description: Classifica o estilo da bota, por exemplo, bota macia, bota rígida
    borescope_design:
      name: Formato do boroscópio
      description: Descreve o tipo de boroscópio, como flexível, rígido ou fibroscópio
    bottle/container_closure:
      name: Fechamento de garrafa/recipiente
      description: Identifica o tipo de tampa em garrafas ou recipientes, como com
        bomba ou tipo flip-top
    bottle_closure_type:
      name: Tipo de fecho da garrafa
      description: Identifica o tipo de tampa usada em uma garrafa, como rolha ou
        tampa de coroa
    bottle_design:
      name: Formato da garrafa
      description: Descreve as características de uma mamadeira, normalmente para
        produtos para bebês; por exemplo, fácil de segurar
    bottle_material:
      name: Material da garrafa
      description: Identifica o material utilizado na fabricação de uma garrafa, como
        vidro ou plástico
    bottle_sterilizer_features:
      name: Características do esterilizador de mamadeiras
      description: Destaca as funções específicas de esterilizadores de mamadeiras,
        como desligamento automático ou função de descongelamento
    bottle_type:
      name: Tipo de garrafa
      description: Especifica o tipo de fechamento de uma garrafa, como squeeze ou
        spray
    bottle_warmer/sterilizer_features:
      name: Características do aquecedor/esterilizador de mamadeiras
      description: Destaca recursos especiais de aquecedores ou esterilizadores de
        mamadeiras, como desligamento automático ou temporizador
    bottle_warmer_features:
      name: Características do aquecedor de mamadeiras
      description: Destaca os recursos exclusivos de aquecedores de mamadeiras, como
        visor LCD ou temporizador
    bottom_surface_material:
      name: Material da superfície inferior
      description: Identifica o material da superfície inferior do produto, como metal
        ou vidro
    bow/crossbow_features:
      name: Características do arco/besta
      description: Descreve os recursos especiais de arcos/bestas, como tração ajustável
        ou mira iluminada
    bow_features:
      name: Características do arco
      description: Identifica as características únicas dos arcos de tiro com arco,
        por exemplo, tração ajustável, mira iluminada
    bow_hair_material:
      name: Material da fibra para arco
      description: Especifica a composição dos fios do arco em instrumentos de corda,
        por exemplo, sintético, crina de cavalo
    bow_material:
      name: Material do arco
      description: Especifica o tipo de material utilizado nos arcos de tiro com arco,
        por exemplo, alumínio, fibra de vidro
    box_type:
      name: Tipo de caixa
      description: Identifica o estilo de caixas de armazenamento ou organizadores
        para veículos, como baú ou para bancos
    bra_closure_type:
      name: Tipo de fechamento do sutiã
      description: Identifica como os sutiãs são fechados ou abertos, por exemplo,
        abertura frontal, com elástico (sem fechamento)
    bra_coverage:
      name: Cobertura do sutiã
      description: Especifica o nível de cobertura fornecido por um sutiã, como completo
        ou meio
    bra_features:
      name: Características do sutiã
      description: Detalha as características exclusivas dos sutiãs, por exemplo,
        enchimento removível e tecido que absorve o suor
    bra_strap_type:
      name: Tipo de alça de sutiã
      description: Especifica o estilo e a funcionalidade das alças do sutiã, como
        nadador
    bra_style:
      name: Estilo do sutiã
      description: Identifica o design ou estilo de um sutiã, como push-up ou tomara
        que caia
    bra_support_level:
      name: Nível de suporte do sutiã
      description: Indica o nível de suporte fornecido por um sutiã, por exemplo,
        baixo, médio, alto
    brace_support_level:
      name: Nível de suporte da órtese
      description: Indica o nível geral de suporte ou proteção designado pelo fabricante
        oferecido pela órtese.
    bracelet_design:
      name: Design de pulseira
      description: Especifica o design de uma pulseira, como pingente ou bracelete
    bracket/brace_design:
      name: Formato do suporte/braçadeira
      description: Descreve o estilo dos brackets de aparelho dentário, por exemplo,
        angulares, de canto
    bracket_profile:
      name: Perfil do suporte
      description: Indica o estilo físico do suporte fornecido com a placa, determinando
        a compatibilidade com o gabinete.
    brandy_variety:
      name: Variedade de conhaque
      description: Distingue entre diferentes estilos de brandy, por exemplo, conhaque,
        grapa
    breadboard_type:
      name: Tipo de protoboard
      description: Classifica o protoboard por construção fundamental ou estilo de
        tamanho.
    breath_spray_benefit:
      name: Benefício do spray para hálito
      description: Identifica o benefício primário de cuidados orais que o spray para
        hálito afirma entregar.
    breath_sprays_certifications:
      name: Certificações de borrifadores bucais
      description: Especifica os padrões que um spray bucal atende, como comércio
        justo ou sem glúten
    bridge/router_advanced_features:
      name: Recursos avançados de bridge/roteador
      description: Destaca as funcionalidades avançadas de bridges/roteadores, como
        suporte VPN ou IA
    brightness_levels:
      name: Níveis de brilho
      description: Especifica a faixa de saída de luz para os produtos, como média
        ou alta
    bristle_grade:
      name: Grau das cerdas
      description: Identifica a qualidade ou classificação das cerdas animais ou sintéticas
        (p. ex., texugo "silvertip", fibra sintética "silvertip").
    bristle_hardness:
      name: Dureza das cerdas
      description: Indica a firmeza das cerdas da escova de dentes.
    bristle_material:
      name: Material das cerdas
      description: Identifica a composição das cerdas da escova, como náilon ou crina
        de cavalo
    bristle_shape:
      name: Formato das cerdas
      description: Define a forma das cerdas da escova, por exemplo, planas, angulares
    broadcast_video_standard:
      name: Padrão de vídeo de transmissão
      description: Indica o(s) padrão(ões) de transmissão analógica com o(s) qual(is)
        o videocassete é compatível.
    broadcasting_standard_supported:
      name: Padrão de transmissão suportado
      description: Especifica os padrões de transmissão de televisão ou modulação
        (satélite, cabo, terrestre) que o produto pode decodificar ou processar.
    broadhead/field_point_material:
      name: Material de ponta larga/campo
      description: Identifica o material usado em pontas de caça e broadheads de flechas
        de tiro com arco, como aço inoxidável ou aço-carbono
    broadhead_design:
      name: Design da ponta da flecha
      description: Indica o tipo de design da ponta da flecha usada no tiro com arco,
        por exemplo, lâmina fixa, mecânica
    brush_application:
      name: Aplicação do pincel
      description: Descreve o uso pretendido de pincéis artísticos, como pintura acrílica
        ou aquarela
    brush_end_type:
      name: Tipo de ponta do pincel
      description: Descreve o formato estrutural das pontas do pincel (p. ex., ponta
        única, ponta dupla, retrátil).
    brush_head_shape:
      name: Formato da cabeça da escova
      description: Define o formato geral da cabeça da escova, que afeta alcance e
        adequação para diferentes usuários.
    brush_head_usage:
      name: Uso da cabeça da escova
      description: Especifica o uso pretendido das cabeças de escova, normalmente
        para cosméticos; por exemplo, limpeza profunda, esfoliação
    brush_material:
      name: Material do pincel
      description: Especifica o tipo de material usado na fabricação do pincel, como
        silicone ou plástico
    brush_size:
      name: Tamanho da escova
      description: Especifica o tamanho de um pincel artístico, por exemplo, 0, 12
    brush_type:
      name: Tipo da escova
      description: Especifica o material usado em um pincel de barbear, como pelo
        sintético ou de texugo
    brushing_mode:
      name: Modo de escovação
      description: Lista os programas de limpeza predefinidos pelos quais a escova
        de dentes pode alternar (p. ex., limpar, sensível, clareamento).
    bug_type:
      name: Tipo de defeito
      description: Especifica as espécies de insetos que o produto ataca, como formigas
        ou vespas
    building_board_material:
      name: Material de placa de construção
      description: Especifica o tipo de material de placas de construção, como compensado
        ou cimento
    building_consumable_form:
      name: Formulação de consumível para construção
      description: Especifica a forma dos compostos de conserto de parede, como líquido
        ou pó
    building_toy_type:
      name: Tipo de brinquedo de construção
      description: Especifica a categoria do brinquedo de construção, por exemplo,
        conjuntos de construção STEM, peças magnéticas
    bulb_cap_type:
      name: Tipo de bulbo da lâmpada
      description: Especifica o tipo de tampa ou base que uma lâmpada ou acessório
        possui, por exemplo, E12, GU10
    bulb_shape:
      name: Formato da lâmpada
      description: Descreve o formato dos produtos de iluminação, por exemplo, tubo,
        espiral
    bulb_size:
      name: Tamanho da lâmpada
      description: Especifica o tamanho das lâmpadas, por exemplo, A19, C7
    bulb_type:
      name: Tipo de lâmpada
      description: Especifica o tipo de lâmpada usada em produtos de iluminação, por
        exemplo, LED, halógena
    bulldozer_blade_type:
      name: Tipo de lâmina de escavadeira
      description: Identifica o estilo de lâmina em um trator de esteira, como angular
        ou reta (lâmina em S)
    bullet_protection_level:
      name: Nível de proteção contra balas
      description: Indica o nível de proteção contra balas dos coletes, por exemplo,
        IIA, IV
    bullhorn_features:
      name: Recursos do megafone
      description: Destaca as funcionalidades exclusivas de um megafone, como gravação
        de voz ou função de sirene
    bullion_form:
      name: Forma de barra de ouro ou prata
      description: Especifica o tipo de metal precioso, como redondo ou em barra
    bungee_arm_mechanism:
      name: Mecanismo do braço bungee
      description: Define a tecnologia usada para suspender e guiar o cabo do mouse
        (p. ex., braço com mola, cordão elástico, suspensão magnética).
    burner_material:
      name: Material do maçarico
      description: Identifica o material utilizado na construção do fogão ou grelha,
        como ferro fundido ou aço inoxidável
    butt_cap_color:
      name: Cor do protetor de ponta
      description: Especifica a cor da tampa das varas de pesca, como preto ou azul
    butt_cap_material:
      name: Material do gimbal
      description: Define a composição da extremidade inferior do cabo em artigos
        esportivos, por exemplo, EVA (Etileno Vinil Acetato), cortiça
    butt_cap_pattern:
      name: Padrão do protetor de tampa
      description: Descreve o desenho ou motivo na tampa de uma vara de pescar, como
        camuflagem ou floral
    button/snap_closure_type:
      name: Tipo de fecho de botão/pressão
      description: Descreve o estilo do mecanismo de fixação, como magnético ou invisível
    button_surface_profile:
      name: Perfil da superfície do botão
      description: Descreve o contorno físico da superfície do êmbolo do botão, afetando
        ergonomia e estilo visual.
    cabinet_type:
      name: Tipo de gabinete
      description: Especifica o design e o formato dos jogos de arcade, como bartop
        ou mini arcade
    cable_form_factor:
      name: Fator de forma do cabo
      description: Descreve o estilo de design físico ou forma do cabo.
    cable_housing_material:
      name: Material da armação do cabo
      description: Identifica o material do invólucro do cabo, como náilon ou PVC
    cable_jacket_rating:
      name: Classificação da capa do cabo
      description: Especifica a classificação ambiental ou de segurança da capa externa
        do cabo (p. ex., plenum, enterramento direto, resistente a UV).
    cable_shielding:
      name: Blindagem do cabo
      description: Especifica o tipo de proteção usada em cabos, por exemplo, trançado
        (STP), revestido (FTP)
    cable_style:
      name: Estilo do cabo
      description: Descreve o design físico do cabo (p. ex., trançado, plano, enrolado,
        retrátil).
    cable_tie_type:
      name: Tipo de abraçadeira
      description: Especifica o estilo de construção ou mecanismo de fixação da abraçadeira.
    cable_tray_style:
      name: Estilo de bandeja de cabos
      description: Descreve o estilo estrutural da seção da bandeja de cabos que determina
        a ventilação e o método de suporte de cabos.
    cable_type:
      name: Tipo de cabo
      description: Classifica a variedade de cabos, normalmente em equipamentos de
        ciclismo; por exemplo, freio, engrenagem
    cache_level:
      name: Nível de cache
      description: Indica a posição de hierarquia do cache (p. ex., L1, L2, L3), que
        afeta tamanho, latência e proximidade aos núcleos do processador.
    caffeine_content:
      name: Teor de cafeína
      description: Indica a quantidade de cafeína presente em um produto, por exemplo,
        descafeinado, baixo teor de cafeína
    cage_type:
      name: Tipo de gaiola
      description: Identifica o estilo da grade de segurança para veículos, como grade
        completa ou meia grade
    calculator_accessory_type:
      name: Tipo de acessório da calculadora
      description: Especifica o tipo de acessório da calculadora, como rolo de papel
        ou adaptador de impressora
    calculator_features:
      name: Características da calculadora
      description: Descreve as funções que uma calculadora pode executar, como cálculo
        de empréstimos ou análise estatística
    calendar/organizer_features:
      name: Recursos de calendário/organizador
      description: Descreve os recursos especiais de calendários ou organizadores,
        como horários disponíveis ou feriados marcados
    calendar_format:
      name: Formato de calendário
      description: Especifica a frequência de um produto, como diária ou mensal
    calibration_sensor_type:
      name: Tipo de sensor de calibração
      description: Especifica a tecnologia de hardware subjacente ou formato do calibrador.
    call_blocking_method:
      name: Método de bloqueio de chamadas
      description: Especifica como o dispositivo identifica e bloqueia chamadas indesejadas.
    caller_id_compatibility:
      name: Compatibilidade com identificador de chamadas
      description: Declara se o telefone suporta serviços de identificação de chamadas
        fornecidos pela rede telefônica.
    caller_id_standard_compatibility:
      name: Compatibilidade com padrão de identificador de chamadas
      description: Indica quais formatos de sinalização de identificador de chamadas
        o dispositivo pode decodificar.
    cam_system:
      name: Sistema de câmeras
      description: Especifica o sistema de câmeras usado em equipamentos de tiro com
        arco, por exemplo, híbrido, simples
    camera_attachment:
      name: Acessório de câmera
      description: Especifica a peça ou acessório da câmera, como visor angular ou
        adaptador ocular
    camera_button/knob_type:
      name: Tipo de botão/acionador da câmera
      description: Identifica o botão de uma câmera, por exemplo, botão de liberação
        do obturador, botão de seleção de modo
    camera_control_type:
      name: Tipo de controle da câmera
      description: Especifica o tipo de controle remoto da câmera, por exemplo, interruptor
        remoto, liberação do obturador
    camera_display_technology:
      name: Tecnologia de exibição da câmera
      description: Especifica a tecnologia da tela de uma câmera, por exemplo, OLED,
        Super AMOLED
    camera_features:
      name: Recursos da câmera
      description: Identifica os recursos especiais de uma câmera, como estabilização
        de imagem ou detecção de rosto
    camera_gear_type:
