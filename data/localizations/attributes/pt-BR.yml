    feed_system:
      name: Sistema de alimentação
      description: Descreve o modo de alimentação do papel no dispositivo, como automático
        ou manual
    feet_type:
      name: Tipo de pés
      description: Especifica o tipo de pés em acessórios eletrônicos, normalmente
        bastões de selfie; por exemplo, retrátil
    felt_tip_design:
      name: Formato da ponta de feltro
      description: Descreve a espessura da ponta de feltro da caneta, como média ou
        fina
    feminine_sanitary_supply_features:
      name: Características de suprimentos para a higiene feminina
      description: Descreve as características específicas de produtos de higiene
        feminina, por exemplo, design respirável, absorção rápida
    fencing_components:
      name: Componentes de cerca
      description: Identifica partes de um sistema de cerca, como um trilho ou painel
    fertility_metrics_measured:
      name: Métricas de fertilidade medidas
      description: Lista as métricas ou parâmetros biológicos que o produto fornece
        ao usuário.
    fiber_art_project_type:
      name: Tipo de projeto de arte em fibra
      description: Categoriza o artesanato em fibra, como bordado ou macramê
    fiber_optic_mode:
      name: Modo de fibra óptica
      description: Especifica se o acessório de fibra é projetado para fibra óptica
        monomodo ou multimodo.
    field_flatness:
      name: Planura do campo
      description: Indica a planicidade do campo em lentes de microscópio, por exemplo,
        superplano, semiplano
    filament_type:
      name: Tipo de filamento
      description: Identifica o tipo de filamento usado na impressão 3D, como resina
