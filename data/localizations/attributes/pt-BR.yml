    sailboat_type:
      name: Tipo de veleiro
      description: Identifica o design ou modelo específico de um veleiro, como eslupe
        ou cúter
    sandal_style:
      name: Estilo sandália
      description: Especifica o estilo das sandálias, como tira no tornozelo ou amarração
    sandblaster_application:
      name: Aplicação de jato de areia
      description: Define a função pretendida das ferramentas de jateamento de areia,
