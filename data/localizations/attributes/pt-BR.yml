    fastener_type:
      name: Tipo de parafuso
      description: Identifica o tipo de mecanismo de fixação utilizado, como magnético
    fat_content:
      name: Teor de gordura
      description: Especifica a quantidade de gordura em alimentos e bebidas, por
        exemplo, integral, baixo teor de gordura
    faucet_thread:
      name: Rosca da torneira
      description: Especifica o tipo de conexão de rosca da torneira, como dupla ou
        fêmea
    features:
      name: Características
      description: Descreve qualidades ou características adicionais de um produto,
