    envelope_seal_design:
      name: Formato do selo de envelope
      description: Descreve a estética ou o estilo de lacres para envelopes, como
        floral ou monograma
    equalizer_type:
      name: Tipo de equalizador
      description: Classifica a topologia de equalização ou estilo de processamento
