    exercise_machine_features:
      name: Recursos da máquina de exercícios
      description: Descreve os recursos especiais do equipamento de exercício físico,
        como velocidade ajustável ou visor integrado
    exercise_mat_material:
      name: Material do tapete de exercícios
      description: Especifica o tipo de material de tapetes para exercício físico,
