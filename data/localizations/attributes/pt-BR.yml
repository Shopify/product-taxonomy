    exfoliating_agent_type:
      name: Tipo de agente esfoliante
      description: Identifica o principal abrasivo ou esfoliante químico usado.
    exfoliation_level:
      name: Nível de esfoliação
      description: Indica quão suave ou firme é a ação esfoliante da esponja.
    exfoliation_method:
      name: Método de esfoliação
      description: Indica se e como o limpador esfolia a pele (p. ex., físico, químico,
        enzimático).
    expansion_slots:
      name: Slots de expansão
      description: Especifica slots para adicionar hardware em computadores ou servidores,
        por exemplo, PCIe, M.2
    exposure_control:
      name: Controle de exposição
      description: Define o método de ajuste da quantidade de luz em uma foto, por
        exemplo, prioridade do obturador, prioridade de abertura
    extended_saxophone_range:
      name: Gama de extensão do saxofone
      description: Especifica a faixa estendida de notas de um saxofone, como a tecla
        Fá sustenido maior ou a tecla Lá menor
    external_antenna_connector_type:
      name: Tipo de conector de antena externa
      description: Define o conector físico usado para fixar antenas externas.
    external_defibrillator_features:
      name: Recursos do desfibrilador externo
      description: Destaca os principais recursos dos desfibriladores médicos, como
        função pediátrica ou ECG na tela
    extinguisher_rating:
      name: Classificação do extintor
      description: Indica a classificação dos extintores de incêndio, por exemplo,
        Classe A, Classe B
    extinguishing_agent_type:
      name: Tipo de agente do extintor
      description: Especifica o tipo de substância extintora em produtos de segurança
        contra incêndio, como água ou espuma
    extraction_method:
      name: Método de extração
      description: Identifica a técnica usada para extrair canabinoides do material
        da planta de cânhamo.
    extraction_technology:
      name: Tecnologia de extração
      description: Descreve o mecanismo primário que o produto usa para extrair impurezas.
    extraction_type:
      name: Tipo de extração
      description: Especifica o método de remoção de ar em exaustores, como sem dutos
        ou conversíveis
    extractor_items_included:
      name: Itens extratores incluídos
      description: Lista as diferentes ferramentas extratoras ou acessórios incluídos
        em um conjunto.
    extractor_tip_style:
      name: Estilo de ponta extratora
      description: Define o design da ponta nas ferramentas de extração, por exemplo,
        concha, agulha
    eye_care_applicator_type:
      name: Tipo de aplicador de cuidados com os olhos
      description: Define o estilo do aplicador incorporado ou ponta dispensadora
        fornecida com o produto de tratamento para os olhos.
    eye_condition_treated:
      name: Condição ocular tratada
      description: Indica o problema ocular primário que o produto é formulado para
        aliviar ou tratar.
    eye_pillow_shape:
      name: Formato da almofada para os olhos
      description: Define a forma física de uma almofada para olhos, como contornada
