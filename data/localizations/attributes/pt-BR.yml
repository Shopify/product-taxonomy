    sander_type:
      name: Tipo de lixadeira
      description: Classifica o tipo de ferramenta de lixamento, por exemplo, de correia,
        orbital aleatório
    sanding_application:
      name: Aplicação de assoreamento
      description: Especifica a finalidade dos acessórios de lixamento, como acabamento
        ou remoção de tinta
    satellite_coverage_area:
      name: Área de cobertura de satélite
      description: Define as regiões geográficas que um telefone via satélite pode
        acessar, como Austrália ou África
    satellite_messaging_capability:
      name: Capacidade de mensagem via satélite
      description: Indica se o produto suporta mensagens via satélite unidirecionais
        (apenas saída) ou bidirecionais (enviar e receber).
    satellite_navigation_systems_supported:
      name: Sistemas de navegação por satélite suportados
      description: Especifica quais sistemas globais de navegação por satélite (GNSS)
        o celular consegue receber para posicionamento e rastreamento.
    satellite_network_type:
      name: Tipo de rede via satélite
      description: Identifica o provedor de serviços para telefones via satélite,
        por exemplo, Inmarsat, Iridium
    sauna_accessories_included:
      name: Acessórios de sauna incluídos
      description: Identifica os itens adicionais incluídos na sauna, como uma concha
        ou pedras de sauna
    scaffolding_mounting_type:
      name: Tipo de montagem de andaime
      description: Especifica o estilo de montagem do andaime, por exemplo, em estrutura
        ou móvel
    scale_material:
      name: Material da escala
      description: Identifica o material usado em uma escala, tipicamente paquímetros
        de árvore; por exemplo, aço inoxidável, plástico
    scale_model_accessory_type:
      name: Tipo de acessório de maquete
      description: Identifica o tipo de acessório para maquetes em escala, como edifícios
        ou figuras
    scale_model_kit_type:
      name: Tipo de kit de miniatura
      description: Especifica a categoria do kit de modelo em escala, como tanque
        ou nave espacial
    scale_model_material:
      name: Material de miniatura
      description: Identifica o principal material utilizado em maquetes em escala,
        como madeira ou cartolina
    scale_model_theme:
      name: Tema da maquete
      description: Identifica o tema de uma maquete em escala, como fantasia ou história
    scalp_concern:
      name: Preocupação com o couro cabeludo
      description: Especifica o problema primário do couro cabeludo ou cabelo que
