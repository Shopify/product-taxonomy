      name: Tipo dielétrico
      description: Especifica o material dielétrico ou isolante usado em capacitores,
        como cerâmica ou eletrolítico
    dietary_preferences:
      name: Preferências dietéticas
      description: Ajuda a identificar produtos adequados para dietas específicas,
        por exemplo, vegano, sem frutas secas
    dietary_supplements:
      name: Suplementos dietéticos
      description: Identifica os nutrientes adicionados a um produto, como cálcio
        ou probióticos
    dietary_use:
      name: Uso dietético
      description: Classifica os produtos com base nos benefícios dietéticos, por
        exemplo, aumento de massa magra, baixo teor de carboidratos
    difficulty_level:
      name: Nível de dificuldade
      description: Indica a complexidade ou o nível de desafio de um quebra-cabeça
        ou jogo, como fácil ou avançado
    diffuser_design:
      name: Formato do difusor
      description: Descreve a estrutura de um difusor de flash, como anel ou cúpula
    digestive_supplement_type:
      name: Tipo de suplemento digestivo
      description: Classifica o tipo específico de suplemento digestivo (p. ex., probiótico,
        enzima, fibra).
    digital_sound_processing:
      name: Processamento de som digital
      description: Especifica as técnicas de modificação de som em componentes para
        equipamentos de áudio, como delay ou reverb
    digitizer_surface_finish:
      name: Acabamento da superfície do digitalizador
      description: Descreve o revestimento ou acabamento da superfície do vidro do
        digitalizador.
    din_size:
      name: Tamanho DIN
      description: Especifica o tamanho padronizado de abertura do painel em que o
        receptor se encaixa (p. ex., DIN simples, DIN duplo).
    dinnerware_pieces_included:
      name: Peças de louça incluídas
      description: Define os componentes de um aparelho de jantar, como pratos ou
        tigelas
    direct_box_type:
      name: Tipo de direct box
      description: Especifica a configuração do circuito da direct box (DI), que afeta
        os requisitos de energia, caráter sonoro e aplicação pretendida.
    direction_detection_capability:
      name: Capacidade de detecção de direção
      description: Declara se o radar pode relatar a direção do objeto (p. ex., aproximando-se,
        afastando-se ou ambos).
    dirt_separating_method:
      name: Método de separação de sujeira
      description: Descreve a técnica que um aspirador utiliza para separação de sujeira,
        por exemplo, ciclônica, filtragem
    discharge_type:
      name: Tipo de descarga
      description: Especifica o tipo de descarga de caminhões basculantes, como despejo
        lateral ou transferência
    disk_format_type:
      name: Tipo de formato de disco
      description: Identifica o tipo de formato de disco para produtos de software,
        como Blu-ray ou CD
    dispenser_type:
      name: Tipo de dispensador
      description: Especifica o formato de distribuição do produto, normalmente em
        saúde e beleza; por exemplo, bastão, pote
    dispensing_operation_type:
      name: Tipo de operação de dispensação
      description: Descreve se a pasta de dente é dispensada manualmente, semiautomaticamente,
        ou automaticamente.
    display_board_features:
      name: Características do painel de exibição
      description: Descreve os recursos exclusivos de painéis de exibição, como verso
        com autocolante ou resistente
    display_color_mode:
      name: Modo de exibição de cores
      description: Especifica a cor de exibição do produto, por exemplo, colorido,
        preto e branco
    display_features:
      name: Características da tela
      description: Descreve o tipo de exibição disponível no produto, como tela sensível
        ao toque ou controles de botão
    display_interface:
      name: Interface do display
      description: Especifica a interface de vídeo ou dados usada pelo módulo de tela.
    display_mode:
      name: Modo de exibição
      description: Descreve o método de exibição do produto, como digital ou analógica
    display_recommended_use:
      name: Exibir uso recomendado
      description: Sugere o uso ideal para apresentações em feiras de negócios com
        base no formato e design, como comercial ou educacional
    display_resolution:
      name: Resolução de tela
      description: Define a resolução de uma tela digital, por exemplo, 1280 x 1024,
        Full HD
    display_sign_design:
      name: Formato do letreiro
      description: Identifica o tipo de informação transmitida em uma placa, como
        banheiro, venda ou saída
    display_technology:
      name: Tecnologia da tela
      description: Define o tipo de tecnologia de tela usada em um produto, por exemplo,
        LED, E-ink
    disposable/reusable_bag_features:
      name: Características da sacola descartável/reutilizável
      description: Descreve as principais características de sacos para resíduos de
        animais de estimação, como biodegradáveis ou antivazamentos
    disposable/reusable_item_material:
      name: Material de item descartável/reutilizável
      description: Identifica se o material de um produto é descartável ou reutilizável,
        por exemplo, materiais biodegradáveis, papel
    disposable_bag_features:
      name: Características da sacola descartável
      description: Destaca os recursos exclusivos de sacos de recargas para fraldas,
        como controle de odor ou perfume
    disposable_bag_material:
      name: Material da sacola descartável
      description: Especifica a composição de sacos descartáveis, por exemplo, plástico,
        materiais biodegradáveis
    disposable_glove_features:
      name: Características de luvas descartáveis
      description: Identifica as características especiais de luvas descartáveis,
        como punho longo ou sem pó
    disposable_tableware_material:
      name: Material de talheres descartáveis
      description: Identifica o material de pratos e talheres descartáveis, como plástico
        ou papel
    dive_computer_items_included:
      name: Itens de medidor de descompressão incluídos
      description: Especifica quais itens estão incluídos em um computador de mergulho,
        como um transmissor ou fios
    diving/snorkeling_equipment_included:
      name: Equipamento de mergulho/snorkeling incluído
      description: Especifica os acessórios de mergulho/snorkeling incluídos, como
        roupa de mergulho ou snorkel
    diving_regulator_style:
      name: Estilo regulador de mergulho
      description: Especifica o estilo do regulador de mergulho, como diafragma ou
        pistão desbalanceado
    dj_equipment_features:
      name: Recursos do equipamento de DJ
      description: Especifica os recursos exclusivos do equipamento de DJ, como controle
        MIDI ou operação autônoma
    dj_software_compatibility:
      name: Compatibilidade de software de DJ
      description: Identifica o software de DJ com o qual o produto é compatível,
        por exemplo, Rekordbox, Serato DJ
    docking_compatibility:
      name: Compatibilidade de acoplamento
      description: Indica se o console pode ser acoplado ou carregado sem remover
        o estojo.
    docsis_standard:
      name: Padrão DOCSIS
      description: Especifica a versão DOCSIS suportada por modems a cabo.
    dog_age_group:
      name: Faixa etária do cachorro
      description: Ajuda a classificar os suprimentos para cães de acordo com o estágio
        de vida do cão, por exemplo, filhote, idoso
    dog_diaper_size:
      name: Tamanho da fralda para cachorro
      description: Especifica o tamanho das fraldas para cães, por exemplo, Extra
        grande (XL), Pequeno (S)
    dog_diaper_type:
      name: Tipo de fralda para cachorro
      description: Identifica o tipo específico de fralda para cachorro, por exemplo,
        fêmea adulta, filhote
    dog_house_features:
      name: Características da casinha de cachorro
      description: Descreve as características especiais de uma casinha de cachorro,
        como dimensões ajustáveis ou proteção UV
    dog_kennel/run_features:
      name: Características do canil/pista para cães
      description: Destaca as características únicas de um canil/pista de corrida,
        por exemplo, resistente a intempéries, portátil
    dog_kennel_features:
      name: Características do canil
      description: Descreve as características específicas de um canil, como trancável
        ou dobrável
    dog_pen_features:
      name: Características do cercado para cães
      description: Descreve as características especiais dos cercados para cachorros,
        como proteção UV ou resistente a intempéries
    dog_toy_type:
      name: Tipo de brinquedo para cães
      description: Classifica o tipo de brinquedo para cachorro, como pelúcia ou que
        faz barulho
    doll/playset_features:
      name: Características dos bonecos/brinquedos
      description: Descreve as características especiais de bonecas ou kits de bonecas,
        como juntas articuladas ou colecionáveis
    doll_features:
      name: Recursos do boneco
      description: Descreve as características especiais de bonecas, como juntas articuladas
        ou detalhes realistas
    doll_type:
      name: Tipo de boneco
      description: Identifica a categoria de uma boneca, como bebê ou colecionável
    door/frame_application:
      name: Aplicação de porta/moldura
      description: Identifica onde o caixilho de porta deve ser usado, por exemplo,
        parte interna, externa
    door_application:
      name: Aplicação de porta
      description: Especifica a aplicação de portas ou dobradiças, como internas ou
        externas
    door_closer_application:
      name: Aplicação de mola de porta
      description: Especifica a aplicação de molas de portas, como internas ou externas
    door_closer_design:
      name: Formato da mola de porta
      description: Identifica o estilo de design das molas de porta, como no piso
        ou suspensa oculta
    door_color:
      name: Cor da porta
      description: Especifica a cor da porta de um produto, como vermelho ou preto
    door_frame_finish:
      name: Acabamento da moldura da porta
      description: Especifica o acabamento de superfície do caixilho de porta, como
        pré-acabado ou pronto para acabamento
    door_glass_finish:
      name: Acabamento em vidro da porta
      description: Especifica o tipo de acabamento de vidro nas portas, como chumbo
        ou padrão
    door_insulation:
      name: Isolamento de porta
      description: Especifica o estado de isolamento das portas, por exemplo, isoladas,
        não isoladas
    door_knob_function:
      name: Função da maçaneta de porta
      description: Especifica a função de maçanetas, como passagem ou privacidade
    door_mat_base_color:
      name: Cor base do tapete de porta
      description: Identifica a cor primária da base de um tapete de porta, como bege
        ou preto
    door_mat_base_material:
      name: Material base do tapete de porta
      description: Especifica o material na parte inferior de um capacho, como juta
        ou látex
    door_mat_base_pattern:
      name: Padrão base do tapete de porta
      description: Descreve o desenho ou motivo de capacho, como floral ou geométrico
    door_mat_surface_material:
      name: Material da superfície do tapete da porta
      description: Especifica o material na superfície de um capacho, como ervas marinhas
        ou borracha
    door_material:
      name: Material da porta
      description: Especifica o material de uma porta, como vidro temperado ou painel
        de fibra de média densidade (MDF)
    door_pattern:
      name: Padrão da porta
      description: Descreve o desenho ou motivo de uma porta, normalmente para buffets
        e aparadores
    door_stop_placement:
      name: Colocação do batente da porta
      description: Identifica onde um batente de porta está instalado, como no chão
        ou na parede
    door_stopper_design:
      name: Formato do aparador de porta
      description: Especifica o estilo de um batente de porta, como em forma de gancho
        ou em forma de cunha
    door_suitable_location:
      name: Localização adequada da porta
      description: Identifica o posicionamento ideal para uma porta, como frontal
        ou terraço
    door_surface_finish:
      name: Acabamento da superfície da porta
      description: Especifica o acabamento de superfície de portas residenciais, como
        envidraçadas ou não envidraçadas
    door_type:
      name: Tipo de porta
      description: Especifica o mecanismo de abertura de portas, por exemplo, com
        dobradiça, deslizantes
    double_stroller_configuration:
      name: Configuração do carrinho de bebê duplo
      description: Define a disposição dos assentos em carrinhos duplos, como tandem
        ou lado a lado
    download_format:
      name: Baixar formato
      description: Especifica o formato de arquivo para fazer download de música digital,
        como MP3 ou WAV
    downstream_port_types:
      name: Tipos de portas downstream
      description: Lista os tipos de portas de saída que o hub oferece para conectar
        periféricos (p. ex., USB-A, USB-C, HDMI, Ethernet).
    drain_location:
      name: Local de drenagem
      description: Especifica a colocação do ralo em banheiras ou chuveiros, como
        central ou à esquerda
    drainage_feature:
      name: Recurso de drenagem
      description: Especifica qualquer design que permita drenagem de líquido ou secagem
        dentro do estojo.
    drawing/painting_kit_items_included:
      name: Itens do kit de desenho/pintura incluídos
      description: Identifica os itens em um kit de materiais artísticos ou de artesanato,
        por exemplo, caderno para colorir, copo para tintas
    dress_form_features:
      name: Características do manequim
      description: Destaca as principais características de um manequim de costura,
        como superfície para fixação ou base giratória
    dress_occasion:
      name: Ocasião do vestido
      description: Especifica a ocasião pretendida para um vestido, como ocasião especial,
        dia a dia
    dress_style:
      name: Estilo de vestido
      description: Identifica o desenho de um vestido, como transpassado ou cintura
        alta
    drill_features:
      name: Recursos de perfuração
      description: Identifica as características especiais de uma furadeira, como
        velocidade ajustável ou iluminação embutida
    drilling_method:
      name: Método de perfuração
      description: Identifica a técnica utilizada em máquinas de perfuração, como
        rotativa ou de percussão
    drilling_rig_orientation:
      name: Orientação da plataforma de perfuração
      description: Identifica a direção de perfuração por uma sonda, como horizontal
        ou vertical
    drinkware_material:
      name: Material para bebidas
      description: Especifica a composição de copos, como vidro ou plástico
    drinkware_pieces_included:
      name: Peças para bebidas incluídas
      description: Identifica a variedade de utensílios para bebidas incluídos em
        um conjunto, como jarras ou taças de vinho
    drinkware_shape:
      name: Formato de utensílios para bebidas
      description: Define o contorno ou a silhueta de um item de bebida, por exemplo,
        curvo ou cônico
    drive_form_factor:
      name: Formato da unidade
      description: Especifica a altura ou classe de tamanho do mecanismo da unidade
        (p. ex., altura total, meia altura, slimline).
    drive_size:
      name: Tamanho da unidade
      description: Descreve o tamanho da unidade de chaves de caixa e torquímetro,
        por exemplo, 1 polegada
    drive_type:
      name: Tipo de unidade
      description: Identifica o tipo de sistema de tração em veículos ou máquinas
        pesadas, como 2 WD ou 4 WD
    driver_configuration:
      name: Configuração do driver
      description: Especifica o número de vias de driver discretas no sistema de alto-falantes
        (p. ex., 2 vias, 3 vias).
    driver_technology:
      name: Tecnologia de driver
      description: Especifica o tipo de transdutor usado para produzir som (p. ex.,
        dinâmico, armadura balanceada, magnético planar, híbrido).
    drone_board_function:
      name: Função da placa do drone
      description: Descreve o propósito principal da placa de circuito dentro do sistema
        do drone.
    drone_features:
      name: Características do drone
      description: Especifica as diversas funcionalidades e características de design
        disponíveis em um drone, como navegação por GPS ou desvio de obstáculos
    drum_configuration:
      name: Configuração do tambor
      description: Usado para indicar a configuração de um kit de bateria, como 7
        peças ou conjunto básico
    drum_hardware_adjustability:
      name: Ajustabilidade de equipamentos da bateria
      description: Detalha os recursos ajustáveis dos acessórios de bateria e percussão;
        por exemplo, ângulo de batedor ajustável
    drum_hardware_material:
      name: Material de equipamentos de bateria
      description: Identifica o material de equipamentos de bateria, como aço ou alumínio
    dry/wet_cleaning:
      name: Lavagem úmida/a seco
      description: Especifica se os produtos são adequados para limpeza a seco ou
        úmida
    dry_bean_variety:
      name: Variedade de feijão seco
      description: Identifica a variedade de feijão seco utilizado, por exemplo, grão
        de bico, feijão preto
    dryer_features:
      name: Recursos do secador
      description: Especifica as características exclusivas de uma secadora de roupas,
        como autolimpeza ou tecnologia inverter
    dryer_technology:
      name: Tecnologia do secador
      description: Especifica a tecnologia de secagem em sistemas HVAC, por exemplo,
        dessecante, refrigerado
    drying_method:
      name: Método de secagem
      description: Especifica como o dispositivo seca escovas de dentes após a esterilização,
        se aplicável.
    drying_speed:
      name: Velocidade de secagem
      description: Define a taxa de secagem ou endurecimento de um produto, como secagem
        rápida ou regular.
    dsl_standard_compatibility:
      name: Compatibilidade com padrão DSL
      description: Identifica quais padrões DSL um filtro ou acessório suporta, garantindo
        supressão de ruído adequada e qualidade de conexão.
    duct_design:
      name: Design do tubo
      description: Identifica a forma dos dutos de ar em sistemas HVAC, por exemplo,
        sólidos, flexíveis
    duct_shape:
      name: Formato do duto
      description: Descreve a forma dos dutos de ar em sistemas HVAC, como redondos
        ou planos
    duplex_component_type:
      name: Tipo de componente duplex
      description: Define a forma específica da peça duplex fornecida (p. ex., montagem,
        bandeja, engrenagem).
    duplexer_installation_type:
      name: Tipo de instalação do duplexador
      description: Esclarece como o duplexador se fixa à impressora (p. ex., slot
        interno, fixação externa traseira).
    duplexing_technology:
      name: Tecnologia Duplex
      description: Especifica se uma impressora suporta impressão frente e verso,
        por exemplo, não suportada, dupla face automática
    duplication_operation_mode:
      name: Modo de operação de duplicação
      description: Indica se o duplicador funciona independentemente, requer conexão
        a um computador ou suporta ambos os modos.
    durability_features:
      name: Recursos de durabilidade
      description: Destaca a capacidade de resistência de um produto a diversas condições,
        por exemplo, à prova de ferrugem, à prova de choque
    dust_container_type:
      name: Tipo de recipiente de pó
      description: Especifica o tipo de sistema de coleta de pó em aspiradores e eletrodomésticos,
        por exemplo, sem sacola, sacola de pó
    dust_mask_type:
      name: Tipo de máscara contra poeira
      description: Especifica o formato das máscaras protetoras contra poeira, como
        copo ou dobra plana
    dvi_connection_type:
      name: Tipo de conexão DVI
      description: Identifica o conector DVI específico e formato de link suportado
        (p. ex., DVI-D single-link, DVI-I dual-link, Mini-DVI).
    dye_form:
      name: Formulação do corante
      description: Descreve o estado físico de tinturas para artesanato, como gel
        ou pó
    dynamic_level:
      name: Nível dinâmico
      description: Categoriza bolas de raquetebol e squash com base na velocidade
        e no ricochete, por exemplo, ponto verde, ponto vermelho
    dynamics_processing_function:
      name: Função de processamento de dinâmica
      description: Identifica as principais tarefas de dinâmica que a unidade executa
        (p. ex., compressor, limitador, noise gate, de-esser).
    e_book_formats_supported:
      name: Formatos de e-book compatíveis
      description: Identifica a variedade de formatos de e-books compatíveis com o
        dispositivo, como PDF ou EPUB
    e_book_reader_part_location:
      name: Localização da peça do leitor de e-books
      description: Especifica onde no dispositivo a peça é instalada ou localizada.
    e_cigarette/vaporizer_style:
      name: Estilo de cigarro eletrônico/vaporizador
      description: Classifica cigarros eletrônicos e vaporizadores por seu formato,
        por exemplo, descartáveis, caneta
    e_liquid_flavor:
      name: Sabor E-Liquid
      description: Especifica o sabor dos e-liquids para vaporizadores e cigarros
        eletrônicos, por exemplo, café, morango
    e_liquid_variety:
      name: Variedade E-Liquid
      description: Distingue entre diferentes opções de e-liquid, por exemplo, recipiente
        parcialmente cheio, injeção de nicotina
    e_reader_display_technology:
      name: Tecnologia de exibição do e-reader
      description: Identifica o tipo de tecnologia de tela usada em leitores eletrônicos,
        como LCD ou e-ink
    ear_care_application_method:
      name: Método de aplicação de cuidados com os ouvidos
      description: Especifica o método de aplicação de itens para cuidados auriculares,
        como bico ou conta-gotas
    ear_dryer_technology:
      name: Tecnologia do secador de ouvido
      description: Identifica o mecanismo de secagem primário usado pelo produto.
    ear_orientation:
      name: Orientação auricular
      description: Especifica se o fone é projetado para o ouvido esquerdo, ouvido
        direito ou pode ser usado em qualquer um.
    ear_pick_tip_style:
      name: Estilo da ponta do extrator de cera
      description: Define a forma ou design da ponta de trabalho que remove a cera
        de ouvido.
    ear_side:
      name: Lado da orelha
      description: Especifica se o aparelho é destinado à orelha esquerda, orelha
        direita, ou para uso como par bilateral.
    ear_tip_size:
      name: Tamanho da ponta auricular
      description: Fornece o rótulo de tamanho genérico comumente usado para pontas
        intra-auriculares quando tamanhos exatos em milímetros não são fornecidos.
    ear_tip_style:
      name: Estilo da ponta auricular
      description: Define a forma geométrica da ponta auricular que influencia o ajuste
        e a vedação acústica.
    earphone_features:
      name: Características do fone de ouvido
      description: Destaca os recursos exclusivos de fones de ouvido, como microfone
        integrado ou controle de volume
    earplug_cord_style:
      name: Estilo do cordão do protetor auricular
      description: Indica se os protetores auriculares estão conectados com um cordão,
        o que ajuda a prevenir perda e facilita a remoção.
    earplug_shape:
      name: Formato do protetor auricular
      description: Descreve o perfil físico do protetor auricular, afetando conforto
        e ajuste dentro de diferentes canais auditivos.
    earplug_type:
      name: Tipo de protetor auricular
      description: Classifica o estilo de construção dos protetores dispensados (p.
        ex., espuma, moldado, filtrado).
    earplug_use:
      name: Uso do protetor de ouvido
      description: Define a atividade ou finalidade específica dos tampões de ouvido,
        como nadar ou dormir
    earring_design:
      name: Design do brinco
      description: Descreve o estilo ou estrutura dos brincos, como argola ou pino
    edge_style:
      name: Estilo de borda
      description: Especifica o formato das bordas em itens como bancadas, por exemplo,
        arredondada, com quinas arredondadas
    edge_type:
      name: Tipo de borda
      description: Identifica o estilo da borda de ferramentas ou utensílios, como
        microsserrilhada ou entalhada
    education_level:
      name: Nível de educação
      description: Especifica o nível educacional para o qual o software foi projetado,
        como ensino fundamental ou universitário
    effects_processor_form_factor:
      name: Formato do processador de efeitos
      description: Descreve o formato físico ou de entrega do processador.
    egg_decorating_items_included:
      name: Itens de decoração de ovos incluídos
      description: Especifica os acessórios fornecidos nos kits de decoração de ovos,
        por exemplo, pastilhas de corantes, suportes de ovo
    egg_turning:
      name: Viragem de ovo
      description: Descreve o método de rotação dos ovos em incubadoras, como automático
        ou manual
    electric_scooter_motor_type:
      name: Tipo de motor de scooter elétrica
      description: Especifica o tipo e a configuração dos motores da scooter, como
        motor CC com escovas ou sem escovas
    electrode_connector_type:
      name: Tipo de conector de eletrodo
      description: Descreve a interface física usada para conectar eletrodos ou almofadas.
    electronic_drum_components:
      name: Componentes de bateria eletrônica
      description: Especifica os elementos de uma bateria eletrônica, como módulo
