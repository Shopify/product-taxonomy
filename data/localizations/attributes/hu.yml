    mute_attachment_method:
      name: Szordínó rögzítési módja
      description: Meghatározza, hogyan rögzül a cintányértompító a cintányérra (pl.
        gél, elektrosztatikus tapadás, mágnes, csipesz).
    mute_attenuation_level:
      name: Hangtompítási szint
      description: Azt jelzi, hogy a tompító mennyire csökkenti az érzékelt hangerőt;
