    motor_vehicle_oxygen_sensor_type:
      name: Gépjármű oxigénérzékelő szenzor típusa
      description: Meghatározza az oxigénérzékelő kialakítását/technológiáját.
    motor_vehicle_paint_application_method:
      name: Gépjárműfesték felviteli módszere
      description: A festék járműfelületre történő felvitelének tervezett módja.
