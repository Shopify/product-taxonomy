      description: Jelzi, hogyan fújható fel a sárkány elülső éle és a rugóstagok.
    kite_line_configuration:
      name: Sárkányzsinór konfigurációja
      description: Azt jelzi, hogy hány repítő-/irányítózsinór használatára tervezték
        a sárkányt, ami egy általános adat a rudak és kötél helyes párosításához.
    kite_type:
