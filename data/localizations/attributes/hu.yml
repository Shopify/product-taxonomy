      description: Megadja a léghajó burkolatának (gáztasakjának) elsődleges anyagát,
        a játék tényleges anyagától függetlenül.
    remote_control_motorcycle_scale:
      name: Távirányítós motorkerékpár léptéke
      description: A távirányítású motorkerékpár méretaránya a valós motorkerékpárhoz
        viszonyítva (amennyiben méretarányos modellről van szó).
    remote_control_motorcycle_terrain_suitability:
      name: Távirányítós motorkerékpár terepalkalmassága
      description: A távirányítású motorkerékpár elsődleges tereptípusa.
    remote_control_motorcycle_water_resistance:
      name: Távirányítós motorkerékpár vízállósága
      description: A távirányítású motorkerékpár elektronikájának vízvédelmi szintje.
    remote_control_plane_kit_completion_level:
      name: Távirányítású repülőgépkészlet összeállítottsági szintje
      description: Azt jelzi, hogy mi tartozik a készlethez, és mennyire komplett
        a csomag (pl. repülésre kész vagy külön adó/vevő/akkumulátor szükséges).
    remote_control_plane_landing_gear_type:
      name: Távirányítós repülőgép futóműtípusa
      description: A futómű konfigurációját jelzi, amely befolyásolja a tartósságot
        és a fel-/leszálláshoz alkalmas felületeket.
    remote_control_plane_power_type:
      name: Távirányítású repülőgép hajtástípusa
      description: Meghatározza, hogyan működik a repülőgép és milyen hajtással rendelkezik
        (elektromos vagy izzítógyertyás/benzines/nitrós), ami befolyásolja a karbantartást,
        a zajszintet és azt, hogy hol használható.
    remote_control_watercraft_features:
      name: Távirányítós vízi jármű jellemzői
      description: Kiemeli azokat a fő, távirányítós vízi járművekre jellemző tulajdonságokat,
        amelyek befolyásolják a használhatóságot és a tartósságot.
    remote_control_watercraft_propulsion_drive_type:
      name: Távirányítós vízi jármű meghajtásának, illetve hajtásrendszerének típusa
      description: Meghatározza, miként történik a távirányítós vízi jármű hajtása
        a vízben.
    remote_control_watercraft_water_environment:
      name: Távirányítós vízi jármű vízi környezete
      description: Jelzi azokat a vízviszonyokat, amelyek között a távirányítású vízi
        jármű a legjobb teljesítményt nyújtja.
    remote_keyless_system_programming_method:
      name: Távoli kulcs nélküli rendszer programozási módja
      description: Bemutatja, hogyan programozzák vagy párosítják a távirányítót/rendszert
        a járműhöz (pl. fedélzeti eljárás, ill. professzionális eszköz).
    repair_compound_type:
      name: Javítóanyag típusa
      description: Meghatározza a mellékelt javítóanyag típusát/összetételét (pl.
        karosszériatapasz típusa, szélvédőgyanta típusa, gumiabroncs-javító ragasztó-/tömítőanyag
        típusa).
    repair_kit_components:
      name: Javítókészlet komponensei
      description: Felsorolja a javítókészletben található konkrét elemeket, hogy
        a vásárlók tisztában legyenek a tartalmával és össze tudják hasonlítani a
        csomagokat.
    repair_method:
      name: Javítási módszer
      description: Megadja a készlet által alkalmazott elsődleges javítási módszert,
        például lehúzható és felragasztható öntapadó foltokat vagy szelepcserét.
    replacement_part_purpose:
      name: Cserealkatrész rendeltetése
      description: Jelzi, hogy a termék OEM cserealkatrész, teljesítménynövelő alkatrész
        vagy kiegészítő tartozék-e.
    replacement_part_type:
      name: Cserealkatrész típusa
      description: Azonosítja az ellipszistréner alkatrészének funkcionális kategóriáját,
        lehetővé téve a vásárló számára a szükséges komponens szerinti szűrést.
    replacement_parts_availability:
      name: Cserealkatrészek rendelkezésre állása
      description: Azt jelzi, hogy rendelkezésre állnak-e fogyó/cserélhető alkatrészek
        a befűzőhöz (pl. cserehorgok/-drótok).
    replica_gun_action_type:
      name: Replikafegyver működési típusa
      description: Meghatározza a replika lőfegyver működésének/zárszerkezetének típusát
        (az ábra szerint), például forgó-tolózáras vagy kengyelkaros működésű.
    replica_gun_firing_mechanism:
      name: Replikafegyver elsütési mechanizmusa
      description: Jelzi, hogy a replika utánozza-e a lövést vagy működést, és ha
        igen, milyen módon (nem halálos kivitelben), például patronos vagy lövést
        nem imitáló változatként.
    replica_gun_moving_parts:
      name: Replika fegyver mozgó alkatrészei
      description: Megadja, hogy a replika mely részei működőképesek/mozgathatók.
    reservoir_orientation:
      name: Tartály tájolása
      description: Meghatározza a tartályzsák csomagon belüli tervezett tájolását
        vagy kialakítását.
    reservoir_type:
      name: Tartály típusa
      description: A tengelykapcsoló főhengeréhez tartozó tartály konfigurációjának
        típusa.
    resin_suitability:
      name: Gyanta megfelelősége
      description: Meghatározza, hogy a kézilabdát gyantával (ragasztóval) való használatra
        tervezték-e, vagy gyantamentes.
    resistance_adjustability:
      name: Ellenállás állíthatósága
      description: Meghatározza, hogy a felhasználó módosíthatja-e a légzési ellenállást.
    resistance_band_design:
      name: Ellenállásszalag kialakítása
      description: Meghatározza az ellenállási szalag fizikai formáját vagy stílusát
        (pl. hurok, fogantyús cső, nyolcas alakú), segítve a vásárlókat abban, hogy
        az edzésprogramjukhoz megfelelő kialakítást válasszanak.
    resistance_loading_type:
      name: Ellenállási terhelés típusa
      description: Jelzi, hogyan biztosítja vagy tölti a terhelést/súlyt a Smith-gép
        (pl. tárcsasúlyos vagy beépített súlyblokkal rendelkező kivitel).
    response_fields_included:
      name: Válaszkártyán szereplő mezők
      description: Meghatározza, hogy a válaszkártya mely szabványos válaszmezőket
        vagy válaszlehetőségeket tartalmazza (pl. elfogadás/elutasítás, ételválasztás).
    restoration_status:
      name: Restauráltsági állapot
      description: Jelzi, hogy a furgon eredeti, restaurált, restomod vagy projekt
        állapotú-e.
    rhinestone_base_color_family:
      name: Strasszkő alapszíncsaládja
      description: Azonosítja a strasszkő alapanyagának színcsaládját (pl. átlátszó/kristály,
        arany/sárga vagy kék).
    rhinestone_facet_style:
      name: Strasszkő fazettastílusa
      description: A strasszkő felületének/fazettáinak mintázata, amely hatással van
        a csillogásra és a megjelenésre (pl. Xilion Rose, briliáns csiszolás, fazettált
        vagy sima).
    rhinestone_hole_reinforcement_material:
      name: Strasszkő furaterősítő anyaga
      description: A furatok körüli vagy azoknál alkalmazott anyag (pl. fém fűzőkarika
        vagy fröccsöntött műanyag), amely a varrás közbeni tartósságot befolyásolja.
    rhinestone_setting_type:
      name: Strasszkő foglalattípusa
      description: A kő varráshoz való rögzítésének/szegélyezésének módja (pl. karmos
        foglalat, peremes foglalat, keretes foglalat).
    rhubarb_product_cut_type:
      name: Rebarbaratermék darabolási típusa
      description: Leírja a rebarbaratermék fizikai előkészítését vagy vágási formáját.
    ribbon_construction:
      name: Szalag felépítése
      description: Leírja a félselyem szalag fő szerkezeti jellemzőit, például hogy
        drótozott vagy rugalmas-e, ami megváltoztatja a felhasználási módját (pl.
        masnikhoz vagy varráshoz).
    ribbon_packaging_type:
      name: Szalag csomagolási típusa
      description: Meghatározza, hogy a szalagot milyen formában szállítják/értékesítik.
    ribbon_pattern_style:
      name: Szalag mintázatának stílusa
      description: Osztályozza a félselyem szalagon általánosan használt mintafelviteli
        módszert.
    ribbon_sheen_level:
      name: Szalag fényességi szintje
      description: Meghatározza a szaténszalag felületének fényességét/csillogását.
    ribbon_style:
      name: Szalagtípus
      description: Meghatározza a szalag vizuális mintáját/stílusát (pl. egyszínű,
        csíkos, háromszínű).
    ribbon_trim_backing_type:
      name: Szalag/díszítőszegély hátoldalának típusa
      description: Jelzi, hogy a szalag/paszomány rendelkezik-e hátoldali réteggel,
        és ha igen, milyen típussal, a könnyebb felhasználás érdekében.
    ribbon_trim_edge_finish:
      name: Szalag/paszomány szegélykialakítása
      description: Leírja a szalag/paszomány szegélykialakítását, amely a foszlási
        tulajdonságokat és a tervezett felhasználást befolyásolja.
    ric_rac_wave_size:
      name: Cikcakk szalag hullámmérete
      description: Leírja a cikcakszalag hullámainak méretét/amplitúdóját.
    rice_grain_length:
      name: Rizsszem hossza
      description: A rizstermékek osztályozása szemhosszúság szerint történik (pl.
        rövid, közepes vagy hosszú szemű rizs), ami befolyásolja a főzési tulajdonságokat
        és a konyhai felhasználást.
    rice_processing_method:
      name: Rizsfeldolgozás módja
      description: Meghatározza, miként dolgozták fel vagy készítették elő a rizst
        (pl. előfőzött, csíráztatott, pelyhesített), ami befolyásolja a főzési időt,
        a tápértéket és a felhasználást.
    rice_variety:
      name: Rizs fajtája
      description: Meghatározza a rizs konkrét fajtáját vagy változatát, lehetővé
        téve a vásárló számára, hogy a kívánt íz, aroma, állag és felhasználási terület
        alapján válasszon.
    riding_toy_features:
      name: Lovagló játék jellemzői
      description: Kiemeli a lovagló játékokra jellemző általános funkcionális/biztonsági
        jellemzőket.
    rifle_action_type:
      name: Puskaműködés típusa
      description: A puska működési mechanizmusa (hogyan tölt, tüzel és ürít), amely
        fontos az azonosítás és a gyűjtők érdeklődése szempontjából.
    rifle_finish:
      name: Puska felületkezelése
      description: A fémszerkezet elsődleges külső felületkezelése/bevonata.
    rifle_magazine_type:
      name: Puskatár típusa
      description: A puska adogatórendszerének típusa.
    rifle_stock_material:
      name: Puskaagy anyaga
      description: A puskaagy/szerelvény elsődleges anyaga (pl. diófa, polimer).
    rim_clamping_method:
      name: Felni rögzítési módja
      description: A kerék- vagy felnirögzítés módja szerelés és leszerelés közben.
    rim_strip_type:
      name: Felniszalag típusa
      description: A szalagot/csíkot típusa, kialakítása vagy konkrét felhasználási
        módja szerint osztályozza (pl. belső nélküli rendszerhez való felniszalag
        vagy védő gumicsík).
    rim_tubeless_compatibility:
      name: Felni belső nélküli kompatibilitása
      description: Meghatározza, hogy a felni, a szalag vagy a kerék belső nélküli
        gumiabroncsos kialakításhoz készült-e.
    ripeness_stage:
      name: Érettségi fok
      description: Jelzi a gyümölcs érettségi szintjét az értékesítés időpontjában
        (pl. éretlen, érett, fogyasztásra kész).
    riser_pad_type:
      name: Emelőbetét típusa
      description: A betét funkcionális stílusát határozza meg (pl. standard távtartó,
        ütéscsillapító, döntött ék).
    roasted_malt_processing_type:
      name: Pörkölt maláta feldolgozási típusa
      description: A pörkölt maláta vagy pörkölt gabona előállításához alkalmazott
        konkrét feldolgozási eljárás vagy változat (pl. malátázatlan pörkölt árpa,
        fekete maláta, keserűségcsökkentett vagy héjtalanított változatok).
    robotic_toy_interaction_mode:
      name: Robotjáték interakciós módja
      description: Meghatározza, hogy a robot játék közben elsősorban hogyan lép interakcióba
        vagy hogyan mozog.
    robotic_toy_light_features:
      name: Robotjáték fényfunkciói
      description: Meghatározza, hogy a játék használ-e fényeket a játék részeként,
        és ha igen, hogyan (pl. LED-ek, vetítés).
    robotic_toy_programming_supported:
      name: Robotjáték programozhatósági támogatása
      description: Meghatározza, hogy a játék milyen programozási megközelítést támogat,
        ha támogat ilyet.
    robotic_toy_skill_level:
      name: Robotjáték készségszintje
      description: Jelzi a felhasználótól elvárt tudásszintet a működtetéshez/programozáshoz.
    robotic_toy_sound_features:
      name: Robotjáték hangfunkciói
      description: Megadja a robotjáték hangfunkcióit.
    rod_butt_style:
      name: Botvég stílusa
      description: Meghatározza a trollinghoz használt bot végének kialakítását.
    rod_construction_type:
      name: Botkialakítás típusa
      description: Meghatározza a bot általános kialakítását a részek száma és az
        összecsukhatóság szempontjából.
    rod_guide_material:
      name: Botvezető anyaga
      description: Meghatározza a horgászbot zsinórvezetőinek vagy betétjeinek anyagát,
        amely a tartósságot, a súlyt és a zsinór súrlódását befolyásolja.
    rod_guide_type:
      name: Botvezető típusa
      description: Meghatározza a boton található zsinórvezetők elsődleges stílusát.
    rod_handle_type:
      name: Botfogantyú típusa
      description: Meghatározza a horgászbot markolatkialakítását, elősegítve a kényelmes
        használatot és a megfelelő horgásztechnika kiválasztását.
    roll_cage_tubing_material:
      name: Bukókeret csőanyaga
      description: Meghatározza a bukókeret/bukócső gyártásához használt csőanyag
        vagy ötvözet típusát (pl. DOM acél vagy 4130 króm-molibdén acél).
    roller_skate_brake_shape:
      name: Görkorcsolya fékjének alakja
      description: Leírja a fékfej geometriai alakját vagy profilját, amely a teljesítményt
        vagy a megjelenést befolyásolhatja.
    roller_skate_brake_type:
      name: Görkorcsolya féktípusa
      description: Meghatározza a görkorcsolyán használt fékrendszert.
    roller_ski_technique:
      name: Görsítechnika
      description: Meghatározza, milyen sífutótechnikához tervezték a sírollert.
    roller_technology:
      name: Görgőtechnológia
      description: Jelzi az integrált technológiát, amely fokozza a masszázsteljesítményt,
        például a rezgést vagy a hőt.
    rolling_case_wheel_configuration:
      name: Gurulós tok kerékelrendezése
      description: Meghatározza a billentyűs hangszer gurulós tokján használt kerékelrendezést.
    rolling_paper_format:
      name: Sodrópapír formátuma
      description: Azonosítja a termék fizikai kiszerelési formáját (pl. lap, előre
        sodort kúp vagy wrap).
    rolling_paper_gum_type:
      name: Sodrópapír ragasztóanyaga
      description: Meghatározza a papírszélen alkalmazott ragasztóanyag (gumiarábikum)
        típusát, amely az ízélményt és a használati jellemzőket befolyásolhatja.
    rolling_paper_size:
      name: Sodrópapír mérete
      description: Meghatározza a cigarettapapír vagy tölcsér szabványos méretbesorolását,
        lehetővé téve a vásárlók számára, hogy gyorsan kiválasszák az igényeiknek
        megfelelő szélességet/hosszúságot.
    rolling_stock_type:
      name: Vasúti gördülőállomány típusa
      description: Meghatározza, hogy a modell milyen típusú vonat/vasúti jármű (mozdony
        vagy személy-/tehervagon, valamint gyakori vagontípusok).
    roof_cargo_net_hook_fastener_style:
      name: Tetőcsomagtartó-rögzítő háló kampó-/rögzítőtípusa
      description: Meghatározza a háló rögzítési pontokhoz való csatlakoztatására
        használt végszerelvény stílusát (pl. S-kampó, karabiner, J-kampó).
    roof_height_class:
      name: Tetőmagasság kategóriája
      description: A furgonoknál általánosan használt tetőmagasságot kategorizálja
        (különösen átalakítások/lakóautós kialakítások esetén lényeges).
    roof_type:
      name: Tetőtípus
      description: A burkolat tető- vagy mennyezeti részének kialakítása.
    root_variety:
      name: Tormafajta
      description: Azonosítja a torma fajtáját vagy általánosan ismert típusát (pl.
        torma vagy valódi wasabi különböző fajtái).
    rope_buoyancy:
      name: Kötél felhajtóereje
      description: Megadja, hogy a kötél úgy van-e kialakítva, hogy a víz felszínén
        lebegjen, ami segít a használóknak elkerülni a belegabalyodást, és egyszerűsíti
        a visszahúzást.
    rope_construction:
      name: Kötél szerkezete
      description: A fonási stíluson túlmenő szálszerkezeti részleteket határozza
        meg, például hogy a mag/köpeny sodrott vagy fonott-e, illetve hogy a kötél
        kernmantle típusú-e.
    rope_material:
      name: Kötél anyaga
      description: Meghatározza a hangoló kötél/zsinór anyagát.
    rope_strand_compatibility:
      name: Kötélszál-kompatibilitás
      description: Jelzi, hogy a biztosítóeszköz milyen kötélkonfigurációval használható
        (egyes kötél, félkötél/dupla kötél, ikerkötél vagy ezek kombinációi).
    rope_stretch_type:
      name: Kötél nyúlási típusa
      description: Leírja a kötél nyúlási jellemzőit, megkülönböztetve a nem nyúló,
        kis nyúlású, standard vagy bungee típusú kialakításokat.
    rose_bloom_stage:
      name: Rózsavirágzási szakasz
      description: Azt jelzi, hogy a rózsavirágok mennyire vannak kinyílva a kiszállításkor/érkezéskor
        (a bimbótól a teljesen kinyílt állapotig).
    rose_grade:
      name: Rózsa minőségi osztálya
      description: Kereskedelmi minőségű vágott rózsák.
    rosette_center_type:
      name: Rozetta középpontjának típusa
      description: Meghatározza a rozetta elején található középső díszítőelem vagy
        betét típusát.
    rosin_dust_level:
      name: Gyantapor-szint
      description: Jelzi a normál használat során várhatóan keletkező gyantapor mennyiségét.
    rosin_formula_additives:
      name: Gyantaösszetétel / adalékanyagok
      description: Olyan kiemelkedő összetételi jellemzőket azonosít, mint például
        a hipoallergén, alacsony portartalmú vagy fémporral kevert formulák.
    rosin_hardness:
      name: Gyanta keménysége
      description: A vonógyanta relatív keménységét/lágyságát jelzi, ami különböző
        éghajlatokon és játékstílusoknál befolyásolhatja a tapadást és a porzást.
    rotation_mechanism_type:
      name: Forgatómechanizmus típusa
      description: Meghatározza azt a mechanizmust, amely lehetővé teszi a kötél forgását,
        és hatással van a gördülékenységre és az elérhető sebességre (pl. golyóscsapágyak,
        ill. perselyek).
    rotation_motion_features:
      name: Forgási/mozgási jellemzők
      description: Azt jelzi, hogy a bolygók/pályák forognak vagy mozognak-e, és hogyan.
    rotor_configuration_type:
      name: Rotor konfiguráció típusa
