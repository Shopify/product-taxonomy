    bit_attachment_type:
      name: Bit rögzítési típusa
      description: Meghatározza, hogyan csatlakozik a kantár fejrésze a zablához (pl.
        kötős végek, csatos végek, Chicago-csavaros végek).
    bit_mouthpiece_design:
      name: Zablaszájrész kialakítása
      description: Azonosítja a fúvóka szerkezeti kialakítását vagy illesztési konfigurációját,
        amely meghatározza a nyomáseloszlást, a szájpadlás szabad helyét, valamint
        az általános keménységét.
    bit_ring_style:
      name: Zablagyűrű stílusa
      description: Meghatározza a zabla pofaszárának vagy gyűrűjének stílusát, amely
        a kantárhoz csatlakozik, és befolyásolja a ráhatást, az oldalirányú vezetést
        és a szárérzetet.
    bladder_material:
      name: Labdabelső anyaga
      description: Meghatározza a levegőtároló belső gumikamra anyagát.
    blade_attachment_type:
      name: Penge rögzítési típusa
      description: Azonosítja, hogy a korcsolya csuklós „klaffogó” mechanizmust vagy
        fix pengerögzítést használ-e.
    blade_finish_coating:
      name: Penge felületkezelése/bevonata
      description: A pengére esztétikai vagy korrózióvédelmi célból alkalmazott alkalmazott
        felületkezelés.
    blade_hosel_type:
      name: Penge nyaktípusa
      description: Meghatározza a penge nyakrészének csatlakozási stílusát, amely
        a nyélbe illeszkedik, és befolyásolja a kompatibilitást (pl. standard vagy
        kúpos).
    blade_length_type:
      name: Pengehossz típusa
      description: A békatalp lapáthosszát rövid, közepes vagy hosszú kategóriába
        sorolja; mindegyik befolyásolja a rúgás ritmusát és az edzési célokat.
    blade_lie:
      name: Talaj-nyél szög
      description: Meghatározza a hokiütő ütőlapjának talaj-nyél szögét (lie), amely
        jelzi, hogyan fekszik a penge a jégen a nyélhez viszonyítva.
    blade_sharpness:
      name: Pengeélesség
      description: Meghatározza, hogy a fegyver éle élesített vagy tompa, edzéshez
        használható kivitelű-e.
    blade_size_category:
