    wick_tab_shape:
      name: Kanóctalp alakja
      description: A kanóctalp lemezének alakja/formátuma.
    wick_type_included:
      name: Mellékelt kanóc típusa
      description: Megadja a készletben/csomagban szereplő kanóc anyagát/típusát.
    wig_fiber_material:
      name: Paróka szálasanyaga
      description: Azonosítja a parókához használt elsődleges szálanyagot, hogy a
