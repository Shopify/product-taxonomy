    bidirectional_charging_capability:
      name: Kétirányú töltési képesség
      description: Jelzi, hogy az elektromos jármű támogatja-e az olyan kétirányú
        töltési módokat, mint a V2G és/vagy a V2H.
    bike_rack_mounting_style:
      name: Kerékpárállvány rögzítési típusa
      description: Hogyan rögzíti/támasztja az állvány a kerékpárt.
    bike_rack_tilt_function:
      name: Kerékpárszállító döntési funkciója
      description: Megadja, hogy van-e, és ha igen, milyen döntési funkció áll rendelkezésre
