        nyomtávok, ha alkalmazható).
    modeling_dough_base_material:
      name: Formázógyurma alapanyaga
      description: A formázógyurma elsődleges alapja/összetétele (pl. búza-/lisztalapú
        vagy polimeralapú).
    modeling_dough_features:
      name: Formázógyurma jellemzői
      description: A formázógyurma fő funkcionális jellemzői, amelyekre a vásárlók
        gyakran rászűrnek.
    modification_level:
      name: Módosítottsági szint
      description: Meghatározza a maláta módosítottsági fokát (mennyire bomlott le
        az árpa endospermiuma/fehérjéi), általában alulmódosított/módosított/túlmódosított
        kifejezésekkel.
    molasses_base_ingredient:
      name: Melasz alapösszetevője
      description: Azonosítja azt az elsődleges növényi vagy gyümölcsforrást, amelyből
