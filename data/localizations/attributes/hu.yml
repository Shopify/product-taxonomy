    bearing_construction_type:
      name: Csapágy szerkezeti típusa
      description: Azonosítja az agyban használt csapágy kialakítását vagy konstrukciós
        stílusát (pl. patronos, laza golyós).
    bearing_edge_type:
      name: Csapágyél típusa
      description: A héjcsapágy élének típusa/profilja, amely befolyásolja a támadást
        és a kitartást.
    bearing_lubrication:
      name: Csapágykenés
      description: A csapágy gyártása során a csapágyra felvitt kenőanyag típusát
        jelzi, például zsírt vagy olajat.
    bearing_material:
      name: Csapágy anyaga
      description: Azonosítja a csapágy anyagát (pl. acél, kerámia hibrid), segítve
        a versenyzőket a tartósság, az ár/költség és a teljesítmény lehetőségek közötti
