    willow_type:
      name: Fűzfa típusa
      description: Azonosítja az ütőlaphoz használt fűzfa fajtáját vagy az alternatív
        anyagot, ami nagyban befolyásolja a teljesítményt, a tartósságot és az árat.
    wind_up_mechanism_type:
      name: Felhúzható mechanizmus típusa
      description: Meghatározza, hogyan kell a játékot felhúzni vagy aktiválni.
    wind_up_toy_movement_pattern:
      name: Felhúzható játék mozgásmintája
      description: A feltekeréskor létrejövő fő mozgást írja le.
    windbreak_purpose:
      name: Szélfogó célja
      description: Meghatározza a szélfogó elsődleges tervezett felhasználási módját.
    windfoil_board_mounting_system:
      name: Szörfdeszka-rögzítési rendszer (Windfoil)
      description: Meghatározza a windfoil deszkába épített szárnydobozt vagy rögzítőfelületet.
    windfoil_sail_style:
      name: Windfoil-vitorla stílusa
      description: Vitorla osztályozása a tervezett stílus vagy szakág alapján.
    winding_direction:
