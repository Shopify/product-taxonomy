    knee_pad_style:
      name: Térdvédő stílusa
      description: Leírja a térdvédő szerkezeti kialakítását vagy típusát (pl. kompressziós
        térdvédő, merevítő vagy protektor).
    knee_protection_design:
      name: Térdvédelmi kialakítás
      description: Meghatározza a lábvédőbe épített csuklós térdrészek számát.
    kneeboard_construction:
