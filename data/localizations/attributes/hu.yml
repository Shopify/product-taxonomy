    whorl_mounting_interface:
      name: Karika rögzítési felülete
      description: Hogyan rögzül a fonókorong a rokkához (tengely stílusa/csatlakozása).
    wick_construction_type:
      name: Kanóc kialakítás típusa
      description: A kanóc szerkezete/stílusa (fonott, lapos, négyszögletes fonású,
