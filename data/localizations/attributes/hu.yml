    wine_body:
      name: Bor testessége
      description: A bor testességét és ízérzetét írja le.
    wine_carbonation:
      name: Bor szénsavassága
      description: Jelzi, hogy a bor csendes, gyöngyöző vagy habzó, és, ahol releváns,
        a pezsgés intenzitását.
    wine_making_ingredient_type:
      name: Borkészítési összetevő típusa
      description: Meghatározza a borkészítési adalékanyagok és fogyóeszközök funkcionális
        kategóriáját.
    wine_making_stage:
      name: Borkészítési szakasz
      description: Azonosítja, hogy a termék a borkészítési folyamat melyik szakaszához
        készült.
    wine_style:
      name: Borstílus
      description: A színen túlmenően osztályozza a bor általános típusát. Lehet például
        csendes, pezsgő vagy szeszezett.
    winemaking_process_stage:
      name: Borkészítési folyamat szakasza
      description: Jelzi a borkészítési folyamat azon elsődleges szakaszát, amelyhez
        a kellék készült.
    wing_count:
      name: Szárnyak száma
      description: Bumeráng szárnyainak/ágainak száma.
    wing_handle_type:
      name: Szárnyfogantyú típusa
      description: Meghatározza a wingfoil-szárny kézi fogantyúrendszerének stílusát.
    wing_part_type:
      name: Szárnyalkatrész típusa
      description: A szárnyprofil szárnyának konkrét alkatrészét vagy cserealkatrészét
        azonosítja.
    wingfoiling_style:
      name: Wingfoiling stílus
      description: Jelzi azt a konkrét wingfoil szakágat vagy használati stílust,
        amelyet a termék megcéloz.
    wiper_arm_finish:
      name: Ablaktörlő kar felületkezelése
      description: Az ablaktörlő karra felvitt felületkezelési anyagot vagy védőbevonat,
