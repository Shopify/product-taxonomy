    wiper_blade_attachment_type:
      name: Ablaktörlő lapát rögzítési típusa
      description: Meghatározza az ablaktörlő lapát ablaktörlőkarra történő rögzítésére
        használt összekötő modult/rögzítési stílust.
    wiper_blade_rubber_material:
      name: Ablaktörlő gumi anyaga
      description: Az üveggel érintkező törlőelem (betét/utántöltő) anyaga.
    wiper_system_position:
      name: Ablaktörlő-rendszer pozíciója
      description: Az ablaktörlő rendszer járművön való beszerelési helyét jelzi.
    wire_coating_material:
      name: Huzalbevonat anyaga
      description: Meghatározza a huzalra felvitt külső bevonat/köpeny anyagát (nem
        a huzalmag anyagát), ami befolyásolhatja a kopásállóságot és azt, hogy milyen
        simán halad át a furatokon.
    wire_coating_type:
      name: Huzalbevonat típusa
      description: Meghatározza, hogy a vezeték bevonattal/borítással rendelkezik-e,
        és ha igen, hogyan (szín, védelem és textúra szempontjából).
    wire_construction_type:
      name: Huzal szerkezeti típusa
      description: Meghatározza a gyöngyfűző huzal felépítését, például sodrott vagy
