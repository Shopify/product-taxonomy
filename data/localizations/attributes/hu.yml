        lehetőségeihez való illesztésre szolgál (pl. SVC vagy DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Gépjármű mélynyomóhangtekercsének impedanciája (tekercsenként)
      description: Az egyes lengőtekercsek impedanciaértéke (nem a végső bekötött
        terhelés), amely a bekötési számításokhoz használatos.
    motor_vehicle_voltage_regulator_type:
      name: Gépjármű feszültségszabályozójának típusa
      description: A gépjárművekben használt szabályozó technológiát/formát jelzi.
    motorcycle_armor_certification_standard:
      name: Motoros protektor tanúsítási szabványa
      description: Meghatározza azokat a hivatalos biztonsági szabvány(oka)t, amelyeknek
