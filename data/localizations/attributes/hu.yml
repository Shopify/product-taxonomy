    feather_processing_type:
      name: Tollfeldolgozás típusa
      description: Hogyan dolgozták fel/kezelték a tollakat kézműves célokra (pl.
        festett, fehérített, természetes/festetlen)?
    feather_product_form:
      name: Tolltermék formája
      description: A tolltermék fizikai formája/vágása eladáskor (pl. szála tollak,
        boa, rojt).
    feather_quantity_unit:
      name: Toll mennyiségi egysége
      description: Meghatározza, hogy a terméket hogyan értékesítik (pl. darabonként,
