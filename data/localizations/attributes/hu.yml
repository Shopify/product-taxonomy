    winding_method:
      name: Tekercselési mód
      description: Hogyan kell a vetülékfonalat felcsévélni/betölteni a vetélőben
        való használathoz.
    winding_speed_control_type:
      name: Tekercselési sebesség szabályozási típusa
      description: Jelzi a használat közbeni tekercselési/felhúzási sebesség szabályozására
        szolgáló módszert.
    winding_type:
      name: Tekercselés típusa
      description: Meghatározza a basszushúrok tekercselési szerkezetét (a külső tekercselés
