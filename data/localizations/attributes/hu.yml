        vagy speciális tömítőanyagként szolgál).
    coolant_base_fluid:
      name: Hűtőfolyadék alapfolyadéka
      description: Meghatározza a fagyálló/hűtőfolyadék keverékben használt fő glikolalapanyagot.
    coolant_outlet_connection_style:
      name: Hűtőfolyadék leeresztőcsapjának típusa
      description: A hűtőcső vagy hűtőfolyadék-vezeték csatlakoztatásához használt
        leeresztőcsap kialakítása.
    coolant_outlet_neck_angle:
      name: Hűtőfolyadék-leeresztő cső dőlésszöge
      description: A vízleeresztő cső dőlésszöge/tájolása a rögzítőperemhez/motorhoz
        képest (hasznos a felső hűtőcső elvezetéséhez).
    coolant_technology:
      name: Hűtőfolyadék-technológia
      description: Meghatározza a fagyállóban/hűtőfolyadékban alkalmazott hűtőfolyadék-összetételt/technológiát
        (általában fel van tüntetve a csomagoláson).
    coolant_temperature_sensor_port:
      name: Hűtőfolyadék-hőmérséklet érzékelő csatlakozó
      description: Van-e a vízcsőben csatlakozó a hűtőfolyadék hőmérséklet-érzékelője
        vagy kapcsolója számára, és milyen csatlakozási módot használ.
    coolant_temperature_sensor_seal_type:
      name: Hűtőfolyadék-hőmérséklet érzékelő tömítési típusa
      description: Az érzékelő és a motor/hűtőfolyadék csatornája között használt
        tömítési mód típusa.
    cooling_system_component_included:
      name: Hűtőrendszer-alkatrész mellékelve
      description: Felsorolja a vízszivattyúhoz tartozó további hűtőrendszer-alkatrészeket.
    cooling_system_flush_application_step:
      name: Hűtőrendszer-átmosási lépés
      description: Jelzi, hogy a termék hová illeszkedik be a szervizelési folyamatban
        (pl. előöblítő tisztítószer vagy végső öblítő/semlegesítő).
    cooling_system_type:
      name: Hűtőrendszer típusa
      description: Meghatározza a beépített hajómotor által használt hűtőrendszer-konfigurációt
        (pl. nyersvíz/nyílt hurkú, zárt hurkú/édesvíz hőcserélővel, gerinchűtéses).
    cord_material:
      name: Zsinór anyaga
      description: Meghatározza a zsinór/fonal anyagát, amellyel a tisztítópálcát
        át lehet húzni a szaxofonon.
    core_type_bass_strings:
      name: Húrmag típusa (basszusgitár-húrok)
      description: Meghatározza a húrmag formáját, amely befolyásolja a tapintást
        és a rugalmasságot.
    cork_grease_base_material:
      name: Parafazsír alapanyaga
      description: A parafazsír készítmény fő alapanyaga (pl. lanolin-alapú).
    cork_grease_form:
      name: Parafazsír formátuma
      description: A parafazsír termék fizikai formátuma.
    corn_presentation:
      name: Kukorica megjelenési formája
      description: Meghatározza a kukoricatermék fizikai megjelenését vagy formáját
        (pl. héjas egész, szem, por).
    corn_syrup_variety:
      name: Kukoricaszirup fajtája
      description: Meghatározza a szirup konkrét típusát vagy feldolgozási változatát.
    corn_variety:
      name: Kukorica fajtája
      description: Meghatározza az értékesített kukorica konkrét botanikai vagy kereskedelmi
        fajtáját, lehetővé téve a vásárló számára, hogy különbséget tehessen az ízben,
        állagban, színben és kulináris felhasználási módban eltérő típusok között.
    corner_compatibility:
      name: Sarokkompatibilitás
      description: Meghatározza az asztal sarkának formáját (négyzet vagy kerek),
        amelyhez a terítő készült.
    corner_flag_features:
      name: Sarokzászló jellemzői
      description: Leírja a sarokzászló különleges műszaki jellemzőit vagy fejlesztéseit
        (pl. összecsukható rúd, fényvisszaverő anyag).
    cornet_mouthpiece_shank_type:
      name: Kornettfúvóka/-szár típusa
      description: Meghatározza, hogy a kornett milyen fúvókacsatlakozóra/-szárra
        vonatkozó szabványt támogat a kompatibilitás érdekében.
    cornhole_league_certification:
      name: Cornhole liga tanúsítványa
      description: Azt jelzi, hogy a termék megfelel a hivatalos tanúsítványoknak
        vagy liga általi jóváhagyásoknak.
    corrosion_resistance:
      name: Korrózióálló
      description: Meghatározza a tartó/rögzítő korrózióvédelmi kezelését vagy besorolását
        kültéri használathoz.
    corrosion_resistance_level:
      name: Korrózióállósági szint
      description: Azt jelzi, hogy a korrózióvédelem alkalmas édesvízi/sósvízi környezetre.
    costume_components_included:
      name: Öltözethez mellékelt kiegészítők
      description: Felsorolja az öltözethez tartozó ruhadarabokat és kiegészítőket,
        amelyek megtalálhatók a szettben.
    cotton_weave_type:
      name: Pamut szövéstípusa
      description: A nyomtatható pamutfelület szövési/kötési szerkezetét írja le,
        amely befolyásolja a textúrát és a nyomtatás minőségét.
    counter_type:
      name: Pult típusa
      description: A beépített ismétlés vagy erőkövetés meglétét és stílusát jelzi.
    counterweight_fill_material:
      name: Ellensúly töltőanyaga
      description: Azt az anyagot jelöli, amely az ellensúly ballasztjának hozzáadására
        vagy az ellensúly előtöltésére használható.
    counterweight_type:
      name: Ellensúly típusa
      description: Meghatározza az ellensúly kialakításának vagy szerkezetének típusát,
        például homokzsák vagy acéllemez, a kompatibilitás és a telepítés elősegítése
        érdekében.
    coupler_system:
      name: Kapcsolóberendezés
      description: A mozdonymodellre szerelt kapcsolóberendezés típusa/rendszere a
        járművek közötti kompatibilitás érdekében.
    court_surface_suitability:
      name: Pályafelületnek való megfelelőség
      description: Azt a kosárlabdapálya-felületet jelöli, amelyre a külső cipőtalpat
        tervezték, segítve a vásárlót a megfelelő tapadás és tartósság kiválasztásában
        beltéri fapályákon, kültéri aszfalt-/betonpályákon vagy mindkettőn való használat
        esetén.
    cover_fit_style:
      name: Fedél illeszkedési stílusa
      description: Leírja, hogyan illeszkedik a huzat az asztalra, ami befolyásolja
        a megjelenést és a védelmi szintet.
    cover_fit_type:
      name: Védőponyva illeszkedési típusa
      description: Jelzi, hogy a védőponyva testreszabott (egyedi/félig egyedi) vagy
        univerzális-e, és hogy alkalmas-e vízen való kikötésre vagy tárolóban/utánfutón
        való használatra.
    cowbell_beater_type:
      name: Kolompütő típusa
      description: Ajánlott ütőeszköztípus a kolomphanghoz/-felülethez (ha a termék
        előírja).
    cowbell_mounting_method:
      name: Kolomp rögzítési módja
      description: Hogyan kell felszerelni/használni a kolompot (kézben tartva vagy
        eszközre szerelve).
    cowbell_sound_character:
      name: Kolomp hangjának karaktere
      description: Az ismertetőben használatos általános hangszín (lehetővé teszi,
        hogy ne csak méret alapján lehessen keresni).
    cradle_capacity:
