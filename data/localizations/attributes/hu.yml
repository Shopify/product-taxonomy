    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Gépjármű oxigénérzékelőjének vezetékszáma
      description: Az oxigénérzékelő kábelkötegében található vezetékek száma.
    motor_vehicle_oxygen_sensor_position:
      name: Gépjármű oxigénérzékelőjének elhelyezkedése
