    molasses_grade:
      name: Melasz minősége
      description: A melaszt a kinyerés/finomítás szakasza szerint osztályozza, ami
        közvetlenül befolyásolja az íz intenzitását, a színt és a tápértéket.
    mold_material:
      name: Öntőforma anyaga
      description: Az öntőforma elsődleges anyagösszetétele (pl. szilikon, műanyag,
        fém).
