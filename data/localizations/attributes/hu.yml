      name: Oldaltáska konfiguráció
      description: Jelzi, hogy a terméket egyetlen táska, összekapcsolt dupla táska
        vagy párban/hármas oldaltáskaszett formájában értékesítik-e.
    pannier_mounting_system:
      name: Oldaltáska rögzítési rendszere
      description: Meghatározza az oldaltáska kerékpárcsomagtartóhoz vagy vázhoz való
        rögzítésére használt mechanizmust, biztosítva a kompatibilitást különböző
        kialakításokkal.
    pant_cuff_style:
      name: Nadrágszár mandzsettastílusa
      description: Jelzi a nadrágszár boka körüli kialakítását vagy állítási lehetőségét
        (pl. gumírozott szegély, bokacipzár vagy nyitott szegély).
    pant_leg_conversion_type:
      name: Nadrágszár-konverzió típusa
      description: Jelzi, hogy a nadrágszár hossza állítható vagy átalakítható-e,
        és ha igen, milyen módon.
    pantyhose_crotch_style:
      name: Harisnyanadrág üleprészének stílusa
      description: Meghatározza az üleprész kialakítását, ennek során megkülönböztetve
        a standard zárt üleprészt, a nyitott üleprészt, illetve a megerősített betétes
        változatokat.
    papaya_variety:
      name: Papaya fajta
      description: Meghatározza a papaya kultivárját vagy piaci fajtáját (pl. Solo,
        Maradol).
    paper_and_magnetic_doll_format:
      name: Papír- és mágneses baba formátuma
      description: Meghatározza, hogy a termék hagyományos papírbaba-készlet, mágneses
        babakészlet vagy hibrid kialakítású-e.
    paper_color_family:
      name: Papír színcsaládja
      description: Meghatározza, hogy a csomag egyszínű, vegyes színű vagy speciális
        keverék-e (hasznos, ha a színek tételenként értendők, de a csomag vegyes).
    paper_magnetic_doll_set_contents:
      name: Papír- és mágneses babakészlet tartalma
      description: Azt jelzi, hogy a készlet mely fő alkotóelemekből áll.
    paper_opacity:
      name: Papír átlátszatlansága
      description: Meghatározza, hogy mennyire átlátszó a papír, a nagyon átlátszótól
        az átlátszatlanig (hasznos az átkövetéshez).
    paraglider_certification_rating:
      name: Siklóernyő tanúsítási besorolása
      description: Megadja a siklóernyő kupolájának hivatalos légialkalmassági besorolását
        (pl. EN- vagy LTF-osztály).
    parasite_types_controlled:
      name: Kezelt paraziták típusai
      description: Felsorolja azokat a belső parazitákat, amelyek ellen a termék hatékony,
        hogy a vásárlók az adott fertőzésekhez igazíthassák a féregtelenítési programokat.
    parking_camera_mounting_location:
      name: Parkolókamera rögzítési helye
      description: A kamera járművön belüli tervezett beépítési helye (pl. rendszámtábla
        környéke, hátsó felületre szerelhető vagy süllyesztett kivitel).
    parking_camera_night_vision_technology:
      name: Parkolókamera éjjellátó technológiája
      description: Meghatározza a kamera gyenge fényviszonyok melletti segédtechnológiáját.
    parking_camera_orientation:
      name: Parkolókamera tájolása
      description: Jelzi, hogy a kamera hátsó (tolatási) nézetre, első nézetre vagy
        választható/tükrözött használatra készült-e.
    parking_sensor_finish:
      name: Parkolószenzor felületkialakítása
      description: Megadja a parkolóradar előlapjának/fedelének felületi kialakítását
        (pl. fényezhető/alapozott, matt, fényes), segítve a lökhárító megjelenéséhez
        illeszkedő kivitel kiválasztását.
    parking_sensor_type:
      name: Parkolóérzékelő típusa
      description: Meghatározza a parkolásérzékelő által alkalmazott érzékelési technológiát
        (pl. ultrahangos, elektromágneses, radaros vagy optikai).
    parsley_root_variety:
      name: Petrezselyemgyökér fajtája
      description: Meghatározza a petrezselyemgyökér kultivárját vagy fajtáját, ha
        a beszállító megadja.
    parsnip_variety:
      name: Paszternákfajta
      description: Meghatározza a pasztinák konkrét fajtáját vagy kultivárját, például
        Hollow Crown vagy White Gem, lehetővé téve a vásárlók számára, hogy íz, édesség
        vagy méretbeli különbségek alapján válasszanak.
    part_condition:
      name: Alkatrész állapota
      description: Jelzi, hogy az alkatrész új, használt, felújított stb.
    part_placement:
      name: Alkatrész elhelyezkedése
      description: Jelzi, hogy az alkatrész a gép mely részére (pl. lépcsőzőgépen
        vagy stepperen) kerül felszerelésre, például bal oldalra, jobb oldalra, előre
        vagy hátra.
    partial_capo_covered_strings:
      name: Részleges capo által lefedett húrok
      description: Meghatározza azt a húrtartományt, amelyet a részleges kápó lefog,
        a standard 6 húros gitár számozásával (1 = magas E, 6 = mély E).
    parting_style:
      name: Választéktípus
      description: Jelzi, hogy a paróka hogyan van vagy hogyan lehet elválasztva (pl.
        középen, oldalt, szabadon választható), ami befolyásolja a formázás rugalmasságát.
    party_favor_type:
      name: Partiajándék típusa
      description: Meghatározza a partiajándék típusát (pl. matrica, mini játék, buborékfújó),
        lehetővé téve a partiajándékok kategórián belüli böngészést/szűrést.
    party_game_format:
      name: Partijáték formája
      description: A partijáték elsődleges fizikai formátuma.
    party_horn_mouthpiece_type:
      name: Partikürt fúvókájának típusa
      description: Meghatározza a fúvóka kialakítását, amely befolyásolja a higiéniát
        és a kényelmet.
    party_horn_style:
      name: Partikürt stílusa
      description: Leírja a partikürt kialakítását vagy működési módját (hogyan nyúlik
        ki, illetve hogyan hoz létre hangot).
    passenger_car_type:
      name: Személygépkocsi típusa
      description: Azonosítja a modellhez tartozó konkrét személykocsi-típust (pl.
        ülőkocsi, hálókocsi), amely böngészéshez és szerelvény-összeállításhoz használható.
    passion_fruit_variety:
      name: Marakujafajta
      description: Azonosítja vagy meghatározza a kínált maracuja botanikai vagy kereskedelmi
        fajtáját (pl. lila, sárga, granadilla).
    pasta_sauce_texture:
      name: Tésztaszósz textúrája
      description: Meghatározza a szósz állagát (pl. sima, darabos, krémes), hogy
        illeszkedjen a fogyasztók szájban való érzetére vonatkozó preferenciáihoz.
    pasta_sauce_variety:
      name: Tésztaszósz-fajta
      description: A tésztaszószokat recept vagy stílus szerint sorolja be, hogy a
        vásárlók gyorsan megtalálhassák a klasszikusokat, például a marinara szószt,
        vagy a különleges, például vodkás vagy pesztós szószokat.
    pastry_crust_state:
      name: Süteménytészta állapota
      description: Meghatározza a tészta vásárláskori előkészítési vagy sütési állapotát.
    pastry_crust_style:
      name: Tésztakéreg stílusa
      description: Meghatározza a tészta konkrét süteménystílusát vagy tésztatípusát.
    pastry_filling_type:
      name: Süteménytöltelék típusa
      description: Meghatározza a sütemény vagy pogácsa elsődleges belső töltelékét.
    patch_adhesion_method:
      name: Javítótapasz rögzítési módja
      description: Meghatározza, hogyan tapad a folt a belsőhöz vagy gumiabroncshoz
        (pl. öntapadós, ragasztóval vulkanizálható vagy hőre aktiválódó).
    patch_backing_material:
      name: Felvarró hátlap anyaga
      description: A folt hátoldalán/alapján használt anyag (pl. filc, sávoly), amely
        érintkezik a díszítendő tárggyal.
    patch_backing_type:
      name: Felvarró hátlap típusa
      description: A folt hátoldali rögzítőrétegének típusa (pl. vasalható, öntapadó,
        tépőzáras vagy hátoldal nélküli).
    patch_base_material:
      name: Felvarró alap anyaga
      description: A díszfolt alap- vagy hordozóanyagának elsődleges textilanyaga
        (nem díszítőelem).
    patch_border_edge_finish:
      name: Folt szegélyének/élének eldolgozása
      description: A folt szegélyének eldolgozási módja (pl. merrow/overlock szegély,
        lézervágott él), amely befolyásolja a tartósságot és a megjelenést.
    patch_placement_area:
      name: Felvarró felhelyezési területe
      description: A felvarró ruházaton/kiegészítőn való tipikus elhelyezési területe.
    pathogen_removal_capability:
      name: Kórokozó-eltávolítási képesség
      description: Meghatározza, hogy a szivattyú mely mikroorganizmus-osztályok (baktériumok,
        protozoonok, vírusok) eltávolítására tanúsított.
    pattern_sizing_system:
      name: Szabásminta méretezési rendszere
      description: Meghatározza a szabásminta mérettáblázatához használt regionális
        méretezési rendszert vagy szabványt (pl. USA, UK, EU).
    peak_style:
      name: Ellenző stílusa
      description: Meghatározza a sisakon található szemellenző vagy napellenző stílusát,
        amely befolyásolja a fedettséget, az esztétikát és a használati szabályokat.
    pear_variety:
      name: Körte fajtája
      description: Azonosítja a körte kultivárját vagy fajtáját (pl. Bartlett, Bosc,
        Conference), lehetővé téve a vásárlók számára, hogy a kívánt íz, textúra és
        konyhai felhasználás alapján válasszanak.
    pearl_luster_grade:
      name: Gyöngy fényének minősége
      description: A gyöngy felületének kvalitatív fényességi/ragyogási fokozata.
    pearl_matching_level:
      name: Gyöngyillesztés szintje
      description: Meghatározza, hogy a gyöngyök mennyire illeszkednek egymáshoz egy
        adott tételen vagy füzéren belül (pl. szín, méret és fényesség alapján).
    pearl_shape:
      name: Gyöngyforma
      description: A gyöngy általános alakkategóriája.
    pearl_surface_condition:
      name: Gyöngy felületi állapota
      description: Meghatározza a gyöngy szemmel látható felületi állapotát, a hibák
        vagy foltok jelenléte és súlyossága alapján.
    pearl_treatment:
      name: Gyöngy kezelése
      description: Feltünteti a gyöngyön alkalmazott minden olyan kezelést, amely
        befolyásolja a színt/megjelenést.
    pearl_type:
      name: Gyöngytípus
      description: Meghatározza a gyöngy változatát/eredetét (pl. édesvízi, Akoya,
        tahiti, déltengeri) fűzetlen gyöngyök esetén.
    peat_level:
      name: Tőzegesség mértéke
      description: Leírja a tőzegfüst hatásának intenzitását a whiskeyben, a tőzegmentestől
        az erősen tőzegesig.
    pedal_and_cleat_system_compatibility:
      name: Pedál- és stoplirendszer-kompatibilitás
      description: Meghatározza, hogy az alátét vagy ék mely pedál- vagy stoplirendszerekkel
        kompatibilis, biztosítva, hogy a vásárló a pedáljához és cipőjéhez megfelelő
        terméket válassza.
    pedal_configuration:
      name: Pedál konfigurációja
      description: Jelzi, hogy a szék egyetlen pedállal, osztott/független pedálokkal
        vagy átalakítható kialakítással rendelkezik-e.
    pedal_mounting_style:
      name: Pedál rögzítése stílusa
      description: Meghatározza, hogyan rögzül a pedál vagy pedálborítás/-betét a
        járműhöz (beszerelési/rögzítési módszer).
    pedal_set_components:
      name: Pedálkészlet elemei
      description: Meghatározza, hogy a készlet mely pedálokat tartalmazza.
    pedal_spindle_material:
      name: Pedáltengely anyaga
      description: A pedáltengelyhez/-orsóhoz használt anyag, amely befolyásolja a
        szilárdságot, a tömeget és a korrózióállóságot.
    pedal_spindle_thread_size:
      name: Pedáltengely menetmérete
      description: Meghatározza a hajtókarba csavart pedálorsó menetszabványát.
    pedal_type:
      name: Pedál típusa
      description: Leírja a kerékpárhoz mellékelt pedál típusát, jelezve a cipőkompatibilitást
        és a tervezett használati módot.
    pellet_accessory_type:
      name: Pellet tartozék típusa
      description: Meghatározza a pelletkiegészítő konkrét típusát, hogy a horgászok
        gyorsan megtalálhassák a szereléképítéshez szükséges fúrókat, gyűrűfelhelyezőket
        vagy ütközőket.
    pellet_grade:
      name: Lövedékminőség
      description: Jelzi az airsoftlövedék gyártáspontossági vagy teljesítményosztályát.
    pen_ink_color:
      name: Toll tinta színe
      description: Meghatározza a tollból származó tinta tényleges színét, amely eltérhet
        a külső test színétől.
    penalty_card_accessories_included:
      name: Büntetőkártyák mellékelt tartozékai
      description: Felsorolja a büntetőkártyákhoz mellékelt további játékvezetői tartozékokat,
        például tokot, pontozófüzetet, ceruzát, érmét, sípot vagy tasakot.
    penalty_card_colors_included:
      name: Büntetőlapok színei
      description: Felsorolja a termékkészletben található büntetőkártyák színeit.
    penalty_flag_throw_distance:
      name: Büntetőzászló dobási távolsága
      description: Tervezési besorolás, amely a zászló rendeltetésszerű dobási tartományát
        jelzi.
    pendant_cutter_safety_features:
      name: Medálos cérnavágó biztonsági funkciói
      description: Meghatározza azokat a beépített biztonsági elemeket, amelyek csökkentik
        a véletlen vágásokat hordozás/viselés közben.
    pendant_cutter_wear_method:
      name: Fonalvágó medál
      description: Meghatározza, hogyan kell a fonalvágó medált hordozni vagy viselni.
    pepper_variety:
      name: Paprikafajta
      description: Meghatározza a termékben használt paprika fajtáját vagy faját,
        lehetővé téve a vásárlók számára a különböző ízprofilok és csípősségi szintek
        megkülönböztetését.
    percussion_case_style:
      name: Ütőhangszer-tok típusa
      description: Meghatározza a tok átfogó stílusát/szerkezetét (puha táska vagy
        kemény/merev tok vagy hibrid).
    percussion_instruments_included:
      name: Ütőhangszerek a csomagban
      description: Felsorolja a mellékelt ütőhangszerek típusait, ha a termék egy
        több hangszerből álló játékkészlet.
    percussion_mallet_handle_grip_style:
      name: Ütőhangszeres verő nyélmarkolatának típusa
      description: Azonosítja a nyél található markolatkidolgozásának típusát (a textúrán
        túlmenően), például natúr fa, lakkozott, gumírozott markolat vagy bandázs.
    percussion_mallet_head_construction:
      name: Ütőhangszeres verő fejkialakítása
      description: Leírja az ütőfej kialakítását vagy szerkezeti típusát (pl. fonallal
        bevont, filcbevonatú, gumi, natúr fa), amely a hangzást és a tartósságot befolyásolja.
    perfumery_base_carrier_type:
      name: Parfümalap hordozótípusa
      description: Meghatározza a parfümbázis hordozó-/oldószerrendszerét (vagyis
        hogy az alap főként milyen összetevőből áll a hígítás és a teljesítmény biztosítása
        érdekében).
    perfumery_base_intended_application:
      name: Parfümbázis tervezett felhasználása
      description: Meghatározza azt a végfelhasználási formátumot, amelyhez az alap
        készült (pl. finomparfüm-spray vagy roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Parfümkészítési összetevő hordozója/oldószere
      description: Meghatározza azt a hordozót/oldószert, amelyben az összetevőt szállítják,
        ha hígított formában van biztosítva (pl. etanol, DPG, jojobaolaj).
    perfumery_ingredient_form:
      name: Parfümipari összetevő formája
      description: Meghatározza a parfümkészítési összetevő szállításkori fizikai
        formáját/állapotát.
    perfumery_ingredient_type:
      name: Parfümipari összetevő típusa
      description: A parfümkészítési gyakorlat szerinti típus alapján sorolja be az
        összetevőt (pl. illóolaj, aromaanyag).
    perfumery_ingredient_usage_note:
      name: Megjegyzés a parfümkészítési összetevő használatára vonatkozóan
      description: Jelzi az illatkompozícióban betöltött tipikus szerepet (fej-, szív-
        vagy alapjegy), figyelembe véve, hogy egyes összetevők több illatjegy-kategóriába
        is tartozhatnak.
    perfumery_ingredients:
      name: Illatszer-összetevők
      description: Felsorolja a készletben található fogyó illatanyagok típusait (pl.
        illóolajok, illatolajok, alkoholos alap).
    perfumery_note_position:
      name: Illatjegy elhelyezkedése
      description: Az összetevő tipikus szerepét jelszi az illatszerkezetben (felső-/középső-/alapjegy).
    persimmon_variety:
      name: Datolyaszilva fajta
      description: Meghatározza a datolyaszilva kultivárját vagy fajtáját, mivel a
        különböző fajták, például a Fuyu vagy Hachiya textúrában, ízben, fanyarságban
        és konyhai felhasználásban is eltérőek.
    personalization_type:
      name: Személyre szabás típusa
      description: Meghatározza, hogy a termék személyre szabható-e rendezvényhez
        kapcsolódóan, és ha igen, milyen módon (pl. monogram, név/dátum vagy fényképbetét).
    phonics_focus:
      name: Fonetikai fókusz
      description: Meghatározza, milyen fonetikai és szóolvasási készségeket fejleszt
        az olvasójáték.
    physalis_variety:
      name: Földicseresznye-fajta
      description: Meghatározza az értékesített physalis konkrét botanikai faját,
        kultivárját vagy közismert változatát.
    pi_ata_filler_type_included:
      name: Piñata töltelékének típusa
      description: Ha van töltőanyag, ez a biztosított tartalom típusa.
    pi_ata_hanging_method:
      name: Piñata-akasztási módszer
      description: A piñata felakasztásának vagy megtámasztásának rendeltetésszerű
        módja (hurok, kampó, mellékelt zsinór stb.).
    pi_ata_opening_type:
      name: Piñata nyílástípusa
      description: A töltőnyílás hozzáférési és zárási módja (pl. fedél, tépőzár,
        cipzár vagy gyárilag lezárt kivitel).
    piccolo_key_system:
      name: Pikoló billentyűrendszere
      description: Azonosítja a pikolófuvolán alkalmazott billentyűrendszert vagy
        kialakítást (a modern hangszereken jellemzően Boehm-rendszer).
    piccolo_keywork_features:
      name: Pikoló billentyűzetének jellemzői
      description: Meghatározza a pikolón található lényeges billentyűmechanizmusokat
        és opciókat.
    pick_grip_aid:
      name: Pengető fogást segítő része
      description: Meghatározza a pengető elsődleges és beépített fogást segítő elemét
        az általános felületi érzeten/textúrán túlmenően (pl. fogólyukak, dombornyomott
        logó, gumibetét).
    pickleball_construction_type:
      name: Pickleball kialakítás típusa
      description: Meghatározza a labda gyártási/szerkezeti kialakítását, például
        az egy darabból készült varrat nélküli vagy a hegesztett kétrészes kialakítást,
        amely a tartósságot és a röppálya egyenletességét befolyásolja.
    pickling_method:
      name: Pácolási módszer
      description: Meghatározza a pácoláshoz használt tartósítóanyagot vagy technikát,
        például ecetes felöntőlevet vagy laktofermentációt.
    pickup_and_preamp_configuration:
