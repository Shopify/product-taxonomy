        (pl. polírozott, zománcozott, horganyzott, bevonatos), amely befolyásolja
        a megjelenést és az elszíneződés-/korrózióállóságot.
    wire_gauge_awg:
      name: Huzalvastagság (AWG)
      description: A kábelkötegben használt vezetők amerikai méretszabványa (AWG).
    wire_insulation_material:
      name: Huzal szigetelőanyaga
      description: A kábelkötegben használt vezeték szigetelésének/köpenyének anyaga
        (befolyásolja a hő- és vegyszerállóságot).
    wire_packaging_type:
      name: Drótcsomagolás típusa
      description: Meghatározza a huzal értékesítési/csomagolási módját.
    wire_shape_profile:
      name: Huzal alakja/profilja
      description: Leírja a huzal keresztmetszeti alakját.
    wiring_configuration:
      name: Kábelezési konfiguráció
      description: Jelzi, hogy a vívó párbajtőr elektromos találatjelzéshez előre
        behuzalozva, huzal nélkül, vezeték nélkül, vagy nem elektromos gyakorláshoz
        való kivitelben kerül-e szállításra.
    wobbler_style:
      name: Wobbler stílusa
      description: Meghatározza a wobbler konkrét kialakítását/mozgásstílusát. Lehet
        például crankbait vagy jerkbait.
    wood_block_surface_preparation:
      name: Fatömb felületének előkészítése
      description: A fablokk felhasználásra kész felületi állapotát jelzi a kikészítéshez
        és Craft.
    wood_grain_direction:
      name: Fa száliránya
      description: A fa erezetének iránya a termék leghosszabb dimenziójához képest
        (fontos a szilárdság, a vágási viselkedés és a megjelenés szempontjából).
    wood_slice_edge_style:
      name: Fadarab élének stílusa
      description: A fadarab élének állapota. Lehet például természetes kéreg, vagy
        sima/csiszolt él.
    wooden_block_special_features:
      name: Fatömb különleges tulajdonságai
      description: A fa építőkocka-készlet figyelemre méltó funkcionális jellemzői.
    woodwind_body_construction:
      name: Fafúvós hangszer felépítése
      description: Azt jelzi, hogy a hangszer egy vagy több részből áll-e (pl. 2 vagy
        3 részes), ami befolyásolja a tisztítást, tárolást és hordozhatóságot.
    woodwind_polishing_cloth_intended_use:
      name: Fafúvós hangszerhez való polírozókendő rendeltetésszerű használata
      description: Meghatározza, hogy a kendő elsősorban minek a tisztítására/polírozására
        szolgál egy fafúvós hangszeren.
    woodwind_small_part_type:
      name: Fafúvós hangszer kis alkatrészének típusa
      description: Meghatározza, hogy az elem milyen típusú klarinét-cserealkatrész
        (pl. billentyűs alkatrész, párna/parafa/filc, gyűrű).
    woofer_mounting_type:
      name: Mélynyomó rögzítési típusa
      description: A mélynyomó tervezett felszerelési/használati módja (szabadon elhelyezett
        vs. dobozos/beépített) és az autóiparban elterjedt rögzítési módok.
    woofer_surround_material:
      name: Mélysugárzó peremének anyaga
      description: A mélynyomó pereméhez (külső felfüggesztő gyűrű) használt anyag.
    worn_on_finger:
      name: Ujj, amelyen viselik
      description: Meghatározza, hogy a fonalvezető gyűszűt melyik ujjra tervezték.
    wrap_style:
      name: Körbefutó stílus
      description: Jelzi, hogy az övet hányszor kell a derék köré tekerni.
    wrapping_occasion:
      name: Csomagolási alkalom
      description: Az az elsődleges ajándékozási/ünnepi alkalom, amelyre a csomagolópapír
        készült.
    wrapping_paper_features:
      name: Csomagolópapír jellemzői
      description: A csomagolópapír funkcionális és fenntarthatósággal kapcsolatos
        tulajdonságai. Ilyen például a szakítószilárdság, az újrahasznosított anyag
        tartalom vagy az előre kivágott formák.
    wrestling_dummy_design:
      name: Birkózóbábu kialakítása
      description: A bábu általános alakja vagy tartása (pl. álló emberi alak vagy
        a dobózsák). Ez meghatározza a megfelelő edzésgyakorlatokat.
    wrestling_mat_safety_certifications:
      name: Birkózószőnyeg biztonsági tanúsítványai
      description: Felsorolja azokat az iparági vagy sportszervezeti biztonsági tanúsítványokat
        vagy szabványokat, amelyeknek a szőnyeg megfelel.
    wrist_strap_style:
      name: Csuklópánt stílusa
      description: A csuklópánt stílusát (vagy annak hiányát) írja le, amely befolyásolja
        a támogatást és az illeszkedést.
    wrist_support_style:
      name: Csuklótámasz stílus
      description: A csuklótámasz felépítését vagy stílusát azonosítja, például fűző,
        kesztyű, ragtapasz vagy pólya, hogy segítse a felhasználót a preferenciák
        és a teljesítés kiválasztásában.
    xylophone_range_octaves:
      name: Xilofon hangtartomány (oktáv)
      description: A xilofon teljes hangterjedelme oktávokban kifejezve (pl. 2,5 oktáv,
        3 oktáv, 4 oktáv).
    xylophone_resonator_type:
      name: Xilofonrezonátor típusa
      description: Hang felerősítésére szolgáló rezonátorrendszer típusa (ha van ilyen).
    yam_variety:
      name: Yam fajtája
      description: Meghatározza az értékesített jamgyökér kultivárját vagy alapváltozatát
        (pl. lila, sárga, elefántláb).
    yarn_cutter_physical_style:
      name: Fonalvágó fizikai típusa
      description: Azonosítja a fonalvágó fizikai stílusát (pl. medál, gyűrű, kisolló),
        segítve ezzel a kategórián belüli böngészést és szűrést.
    yarn_finish_or_effect:
      name: Fonal kidolgozása vagy hatása
      description: Highlight a fonalra alkalmazott különleges vizuális vagy funkcionális
        kezeléseket, például a fluoreszkálást vagy a fémes csillogást.
    yarn_guide_style:
      name: fonal útmutató stílus
      description: A fonalvezető alkatrész fizikai típusa.
    yarn_swift_adjustability:
      name: Fonalgombolyító állíthatósága
      description: Azt jelzi, hogy a Swift állítható-e, és ha igen, hogyan (bővíthető,
        összecsukható/hajtogatható), ami befolyásolja a tárolást és a gombolyagméret
        tartományát, amelyet azonosíthat.
    yarn_swift_bearing_type:
      name: Fonalgombolyító csapágyának típusa
      description: Leírja a forgástámogató mechanizmust (pl. golyóscsapágy), amely
        befolyásolja a futás simaságát és a felcsévélési sebességet.
    yeast_application:
      name: Élesztő alkalmazása
      description: Az élesztőtermék elsődlegesen tervezett kulináris vagy fermentációs
        felhasználását jelzi.
    yo_yo_accessory_part_type:
      name: Jojó kiegészítő/alkatrész típusa
      description: Meghatározza, hogy a termék a jojó milyen cserealkatrészeként vagy
        tartozékaként szolgál (pl. zsinór, csapágy, fékbetét).
    yo_yo_axle_system_type:
      name: Jojó tengelyrendszer típusa
      description: A jojó tengelyének szerkezeti felépítése (pl. fix vagy szabadonfutó).
        Ez befolyásolja a játékérzetet és a karbantartást.
    yo_yo_bearing_size_class:
      name: Jojó csapágyméretének besorolása
      description: A jojóhoz használt szabványosított csapágyméret-osztály, ha alkalmazható.
    yo_yo_bearing_type:
      name: Jojó csapágyának típusa
      description: A csapágy konfigurációja befolyásolja a válaszreakciót és a pörgési
        jellemzőket.
    yo_yo_play_style:
      name: Jojó játékstílusa
      description: A jojó elsődlegesen tervezett játékstílusa, mely tükrözi azt a
        zsinór-/trükkformát, amelyre a terméket tervezték.
    yo_yo_response_system:
      name: Jojó válaszrendszere
      description: Meghatározza azt a jojó-válaszmechanizmust, amelyhez ezt az alkatrészt
        tervezték (kompatibilitás).
    yo_yo_responsiveness:
      name: Jojó válaszkészsége
      description: Azt jelöli, hogy a jojó rántásra visszatér-e a kézbe (reszponzív),
        vagy felcsavarást igényel-e (nem reszponzív).
    yo_yo_string_material:
      name: Jojó karakterlánc anyag
      description: Jojó zsinórjának anyagösszetétele.
    yogurt_base_ingredient:
      name: Joghurtalap összetevője
      description: Azonosítja a joghurt készítéséhez használt elsődleges tej- vagy
        növényi alapú forrást, ami kulcsfontosságú az étrendi preferenciák és az allergének
        szempontjából.
    yoke_type:
      name: Fegyvertartó típusa
      description: Azonosítja a lőfegyvert az egylábú állványon megtámasztó bölcső
        vagy villa típusát.
    zill_playing_style:
      name: Zill (ujjcintányér) játékstílusa
      description: Tervezett játékstílus Context/stílus (általában hastánc vs. zenekari/kulturális
        változat).
    zill_strap_material:
      name: Zill (ujjcintányér) pántjának anyaga
      description: A zill (ha mellékelve van) megtartására szolgáló csat/gumipánt
        anyaga. Ez befolyásolja a kényelmet, a tartósságot és a tapadást.
    zills_strap_adjustability:
      name: Ujjcin pántjának állíthatósága
      description: Azt jelzi, hogy a mellékelt pánt/gumiszalag állítható-e, és hogyan
        illeszkedik.
    zipper_application:
      name: Zipper alkalmazás
      description: Meghatározza a projektet vagy alkalmazást, amelyhez a cipzárt tervezték.
    zipper_chain_type:
      name: Cipzárlánc típusa
      description: Meghatározza a cipzárlánc vagy a fogak szerkezetét/típusát.
    zipper_end_type:
      name: Cipzárvég típusa
      description: Jelzi, hogyan végződik a cipzár, és hogy elválasztható-e (nyitott)
        vagy zárt (nem elválasztható) végű-e, beleértve Craft cipzárakban használt
        általános elválasztó végű hardvert is.
    zipper_gauge:
      name: Cipzár mérete
      description: 'Jelzi a cipzárlánc méretét/vastagsági jelölését. Ez általában
        egy # jellel ellátott szám (pl. #3 vagy #5), ami a fogak/spirál szélességére
        és a tervezett felhasználásra utal.'
    zipper_opening_length:
      name: Cipzárnyílás hossza
      description: Meghatározza, hogy az elülső nyílás mekkora része cipzáras, megkülönböztetve
        a teljes cipzáras, félcipzáras és negyedcipzáras stílusokat.
    zipper_pull_material:
      name: Cipzárhúzó anyag
      description: Meghatározza a cipzár húzójának vagy húzófülének (a megfogandó
        résznek) az anyagát, elkülönítve a cipzár fogaitól/láncától és a ragasztószalagtól.
    zipper_pull_side:
      name: Cipzár húzási oldala
      description: Meghatározza, hogy a cipzár melyik oldala (vagy oldalai) felől
        érhető el a cipzárhúzó.
    zipper_pull_strap_cord_tab_material:
      name: Cipzárhúzó pánt/zsinór/fül anyaga
      description: A cipzárhúzóhoz rögzített pánt/zsinór/fül/bojt anyaga (ha van),
        amelyhez nem tartozik hozzá a cipzárhúzó fő része/teste.
    zipper_reversibility_mechanism:
      name: Kétoldalas cipzár mechanizmusa
      description: Meghatározza, hogyan működik a kétoldalas/kifordítható cipzár (pl.
        kétoldalas kocsi vs. átfordítható/automatikus záródású kocsi, amelyet kifordítható
        ruhákhoz terveztek).
    zipper_separating_type:
      name: Cipzár szétválási típusa
      description: Jelzi, hogy a cipzár alul/felül bontható-e, vagy zárt végű-e, hogy
        illeszkedjen kabátokhoz, hálózsákokhoz, táskákhoz stb.
    zipper_side:
      name: Cipzár oldala
      description: Meghatározza, hogy a hálózsák melyik oldalán található a fő cipzár,
        amikor a hálózsák felfelé nézve fekszik.
    zipper_slider_material:
      name: Cipzárkocsi anyaga
      description: Meghatározza a cipzárkocsi (a mozgó mechanizmus) anyagát, ami befolyásolhatja
        a szilárdságot és a korrózióállóságot.
    zipper_slider_pull_configuration:
      name: Cipzárkocsi/-húzó konfigurációja
      description: Jelzi, hogy a cipzár egy vagy két kocsival/húzóval rendelkezik-e,
        valamint hogy a húzók a kocsi egyik vagy mindkét oldalán találhatók-e.
    zipper_style:
      name: Cipzár stílusa
      description: Jelzi a cipzár hosszát vagy jelenlétét a ruhadarabon (pl. cipzár
        nélküli, negyedirányítószám, félirányítószám, full-irányítószám).
    zipper_tape_material:
      name: Cipzárpánt anyaga
      description: Meghatározza a bevarrható cipzárszalag (szövetoldalak) elsődleges
        anyagát.
    zipper_teeth_type:
      name: Cipzárfog típusa
      description: Jelzi a cipzárlánc/fogak szerkezeti stílusát (pl. spirál, öntött
        műanyag, fém, rejtett). Ez meghatározza a rugalmasságot, a szilárdságot és
        a jellemző felhasználási területeket.
