      description: Jelzi a gyöngyfűző cérnához használt gyártói/iparági méretjelölést
        (márka-/termékcsoport-specifikus), például D vagy 00-ás méret.
    beading_thread_use_case:
      name: Gyöngyfűző cérna felhasználási esete
      description: Meghatározza a gyöngyfűzési szál elsődleges ajánlott felhasználási
        módját, segítve a vásárlót a projekthez megfelelő termék kiválasztásában.
    beading_wire_coating_material:
      name: Gyöngyfűző drót bevonóanyaga
      description: Megadja a gyöngyfűző drót külső bevonatának anyagát (ha van), amely
        befolyásolja a tapintást, a tartósságot és a töréssel szembeni ellenállást.
    beading_wire_strand_count:
      name: Gyöngyfűző drót szálak száma
      description: A többszálú gyöngyfűző drót szálainak számát jelzi (pl. 7 szálas,
        19 szálas, 49 szálas), ami befolyásolja a rugalmasságot és a redőződést.
    beadlock_type:
      name: Beadlock típusa
      description: Jelzi, hogy a kerék gyöngyreteszeléses-e, és ha igen, milyen stílusú
        (segít a terepjáró-/UTV-vásárlóknál).
    beam_material:
      name: Tartóelem anyaga
      description: A gerenda/rúd elsődleges anyaga (gyakran eltér a fejek/tartozékok
        anyagától).
    beam_pattern:
      name: Fénynyalábminta
      description: A közúti/terepvilágításhoz használt fénykibocsátás eloszlási mintázata.
    bean_bag_fabric_material:
      name: Babzsákszövet anyaga
      description: A készlethez tartozó babzsákokhoz használt külső anyagot azonosítja.
    bean_paste_variety:
      name: Babpaszta-változat
      description: A babpüré típusát a gyártási stílus vagy a fő összetevő alapján
        osztályozza.
    bean_preparation:
      name: Bab előkészítése
      description: Jelzi, hogyan készítik elő vagy dolgozzák fel értékesítés előtt
        a babot (pl. egész hüvellyel, kifejtve, aprítva, csíráztatva).
    bean_variety:
      name: Bab változat
      description: Megadja a bab botanikai vagy piaci változatát (pl. zöldbab, edamame,
        spárgabab).
    beanie_style:
      name: Sapkastílus
      description: Meghatározza a beanie sapka általános kialakítását, felépítését
        vagy sziluettjét, így a vásárló gyorsan választhat a gyakori változatok közül.
    bearing_clearance:
      name: Csapágyhézag
      description: A csapágy belső radiális hézagának osztályát (a belső holtjáték
