    whipped_cream_form:
      name: Tejszínhab kiszerelése
      description: A tejszínhab értékesítési kiszerelését jelzi
    whistle_head_material:
      name: Síphangkeltő fej anyaga
      description: Meghatározza a sípfej/fúvóka (sípdugó/fej) anyagát.
    whistle_light_features:
      name: Síp világítási jellemzői
      description: Jelzi, hogy a síp tartalmaz-e integrált fényeffektusokat bulikhoz
