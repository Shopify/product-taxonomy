        illeszkedik.
    motorcycle_glove_certification_standard:
      name: Motoros kesztyű tanúsítási szabványa
      description: Meghatározza azt a védelemről szóló tanúsítást/szabványt, amelynek
        a kesztyű megfelel (pl. EN 13594 szintek).
    motorcycle_glove_waterproof_construction:
      name: Motoros kesztyű vízállósága
      description: Meghatározza a kesztyűhöz használt vízállósági módszert (ha van
