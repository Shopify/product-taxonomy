    window_configuration:
      name: Ablakkonfiguráció
      description: Az átlátszó ablakok jelenlétét és relatív méretét jelzi a wingfoil
        szárnyon.
    window_glass_construction:
      name: Ablaküveg szerkezete
      description: Meghatározza a gépjármű ablaküvegének biztonsági/laminálási szerkezetét.
    window_glass_features:
      name: Ablaküveg jellemzői
      description: Jelzi, hogy az üveg támogatja-e az integrált járműtechnológiákat
        (pl. esőérzékelő, kamerakonzol).
    window_glass_finish:
      name: Ablaküveg felületkezelése
      description: Meghatározza a gépjármű ablaküvegének felületkezelését, sötétítését
        vagy belátásgátlását.
    window_glass_tint_color:
      name: Ablaküveg festék színe
      description: Meghatározza az üvegben lévő sötétítés színárnyalatát (nem a termék
        általános színét).
    window_glass_tint_level:
      name: Ablaküveg sötétítési szintje
      description: Az ablaküveg hozzávetőleges gyári/sötétítési fokát jelzi (nem utángyártott
        fólia). Használjon leíró szinteket, ha a pontos VLT nem ismert.
    window_net_latch_mechanism:
      name: Ablakháló zárómechanizmusa
      description: Megadja az ablakháló reteszelő/kioldó mechanizmusát (pl. nyomógomb,
