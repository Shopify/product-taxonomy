      description: Meghatározza az asztalhoz tartozó pontszámvezető mechanizmus típusát,
        például a kézi csúszkákat vagy a különféle elektronikus kijelzőket.
    scottish_smallpipes_bag_material:
      name: Skót kisduda légzsákjának anyaga
      description: Meghatározza a kis méretű skótdudához mellékelt zsák (légtartály)
        anyagát.
    scottish_smallpipes_drone_tuning_configuration:
      name: Skót kisduda burdoncsöveinek hangolási konfigurációja
      description: Meghatározza a hangszerhez mellékelt burdonhangolási beállítást
        (a burdoncsövek hangmagasságát/szerepét az alaphanghoz képest).
    scottish_smallpipes_reed_type:
      name: Skót kisduda nádjának típusa
      description: Azonosítja a dallamsípban használt nád típusát (és/vagy azt, hogy
        a nádak szintetikusak vagy valódi nádból készültek-e).
    scraping_surface_type:
      name: Kaparófelület típusa
      description: Meghatározza a hangot kiadó kaparófelület szerkezetét/geometriáját
        (pl. barázdált, fésűs/fogazott, hullámos).
    screw_drive_type:
      name: Csavarhajtás típusa
      description: Meghatározza a csavar- vagy fejescsavar-fej behajtóprofiljának
        típusát, jelezve a meghúzáshoz vagy eltávolításhoz szükséges szerszámot (pl.
        imbusz, Torx).
    screw_thread_size:
      name: Csavar menetmérete
      description: Meghatározza a mellékelt vagy kompatibilis csavarok menetszabványát
        (pl. M4, M5, M6).
    sculpting_clay_base_type:
      name: Szobrászagyag alapjának típusa
      description: Leírja a szobrászagyag alapját/összetételét.
    seafood_cut:
      name: Tengeri herkenytű/hal kiszerelési formája
      description: A tengeri herkenytű- vagy haltermék fizikai feldarabolását, illetve
        kiszerelési formáját írja le (pl. egész, filé, steak).
    seafood_processing_method:
      name: Tenger gyümölcsei feldolgozási módja
      description: Meghatározza a tengeri élelmiszeren alkalmazott elsődleges tartósítási
        vagy feldolgozási technikát, például a füstölést, sózást vagy fagyasztva szárítást.
    seafood_source:
      name: Tengeri élelmiszer eredete
      description: Jelzi, hogy a tengeri élelmiszer vadon fogott, tenyésztett, növényi
        alapú vagy más forrásból származik-e, ezzel segítve a vásárlókat a fenntarthatóság
        és a minőség mérlegelésében.
    seal_material:
      name: Tömítőanyag
      description: A ruha vízzárását biztosító nyak-, csukló- és bokatömítések vagy
        tömítőmandzsetták anyaga.
    seal_type:
      name: Tömítés típusa
      description: Meghatározza a szerelvény által használt tömítési módszert a hűtőfolyadék-szivárgás
        megelőzésére.
    sealant_formulation:
      name: Tömítőanyag-összetét
      description: Meghatározza a kerékpár-gumiabroncs tömítőanyagának elsődleges
        kémiai összetételét vagy adaléktechnológiáját (pl. latexalapú, szálerősítésű,
        akril).
    seals_leak_type:
      name: Tömítés szivárgásának típusa
      description: A hűtőrendszer-szivárgás típusa/helye, amelynek a lezárására a
        termék szolgál.
    seam_construction:
      name: Varrat kialakítása
      description: Leírja a labda varrásának kialakítását, amely befolyásolja a kanyarodást,
        a tartósságot és a tapintást.
    seam_design:
      name: Öltésdizájn
      description: Meghatározza a harisnyaáru varratszerkezetét vagy díszítő varratjellemzőit.
    seam_gauge_scale_type:
      name: Varrásmérő skálatípusa
      description: Azt jelzi, hogy milyen skálák/jelölések szerepelnek a varratmérőn
        az alapvonalzó beosztásán felül.
    seam_gauge_slider_material:
      name: Varrásmérő csúszkájának anyaga
      description: Meghatározza az állítható csúszka/mutató elem anyagát, ha van ilyen.
    seam_ripper_tip_style:
      name: Varrásbontó hegyének kialakítása
      description: Leírja a funkcionális hegykialakítást, amely az öltések alá csúsztatható
        a szál biztonságos elvágásához.
    seam_sealing_type:
      name: Varrattömítés típusa
      description: Meghatározza az esőruha varratainál a víz bejutásának megakadályozására
        használt módszert (pl. teljesen leragasztott, hegesztett).
    seam_type:
      name: Varrattípus
      description: Meghatározza a baseball-labda varrásának stílusát, amely befolyásolja
        a fogást, az aerodinamikát és a tervezett játékszintet.
    season_condition_protection:
      name: Szezonális/állapotvédelem
      description: Azt az elsődleges időjárási körülményt/állapotot jelzi, amely ellen
        a szélvédőtakaró védelmet nyújt.
    season_rating:
      name: Évszak szerinti besorolás
      description: Meghatározza a sátor évszak szerinti besorolását, jelezve ezzel,
        hogy milyen időjárási körülményekhez alkalmas (pl. 3 évszakos, 4 évszakos,
        5 évszakos/expedíciós).
    seasoning_variety:
      name: Fűszerezési fajtája
      description: A fűszert az elkészítési stílusa vagy hagyományos konyhai felhasználása
        szerint osztályozza.
    seat_adjustment_power_type:
      name: Ülésállítás működtetési típusa
      description: Meghatározza, hogyan működnek az ülésállító mechanizmusok (kézi
        karok vagy elektromos motorok), ami befolyásolhatja a vezetékezést/kompatibilitást.
    seat_belt_attachment_type:
      name: Biztonsági öv rögzítési típusa
      description: Meghatározza, hogyan csatlakozik a heveder a járműhöz/öv szerkezetéhez.
    seat_belt_buckle_electrical_connector_type:
      name: Biztonsági öv csatjának elektromos csatlakozótípusa
      description: Meghatározza a csatkapcsoló/övfeszítő vezetékezéséhez használt
        csatlakozót/interfészt, ha van ilyen.
    seat_belt_buckle_mounting_type:
      name: Biztonsági öv csatjának rögzítési típusa
      description: Leírja, hogyan rögzül a csat vagy a csatlakozóaljzat a járműhöz,
        az üléshez vagy az övszárhoz (pl. csavarozható, bepattintható).
    seat_belt_buckle_release_button_color:
      name: Biztonsági övcsatkioldó gombjának színe
      description: Meghatározza a csatkioldó gomb színét.
    seat_belt_cover_placement:
      name: Biztonságiöv-borítás elhelyezkedése
      description: Meghatározza a huzat elhelyezkedését vagy rendeltetési helyét a
        biztonsági övön.
    seat_belt_integration:
      name: Biztonsági öv integrációja
      description: Meghatározza, hogy az ülés tartalmaz-e integrált biztonsági övet
        és/vagy övcsat-aljzatot, vagy a jármű eredeti (OEM) övcsat-aljzatát kell-e
        átszerelni a beépítéshez.
    seat_belt_provision:
      name: Biztonsági öv megléte
      description: Meghatározza, hogy a biztonsági övek és/vagy a kapcsolódó övszerelvények
        (pl. csatok) a hátsó ülés egységének részét képezik-e, vagy az eredeti ülésről
        kell-e őket áthelyezni.
    seat_belt_strap_installation_location:
      name: Biztonságiöv-heveder beszerelési helye
      description: Azt jelzi, hogy a heveder hol van felszerelve az övrendszeren belül.
    seat_cover_placement:
      name: Üléshuzat elhelyezése
      description: Meghatározza, hogy a huzat a jármű mely ülőhelyéhez vagy ülőhelyeihez
        készült.
    seat_cover_securement_method:
      name: Üléshuzat rögzítési módja
      description: Jelzi az üléshuzat üléshez való elsődleges rögzítési módját. Ha
        több módszert használnak, válassza a fő/elsődleges módszert.
    seat_cover_set_contents:
      name: Üléshuzat-szett tartalma
      description: Meghatározza, milyen elemeket tartalmaz a csomag (pl. csak ülőlapok
        vagy teljes ülés + fejtámlák).
    seat_fabric:
      name: Üléskárpit anyaga
      description: A szék ülő- és háttámlarészéhez használt elsődleges szövet.
    seat_height_category:
      name: Ülésmagasság-kategória
      description: Az ülőkét tipikus ülésmagasság-tartomány szerint osztályozza (pl.
        pult vagy bár magassága) a kiválasztás egyszerűsítése érdekében.
    seat_material:
      name: Ülés anyaga
      description: Meghatározza a pad ülőfelületének elsődleges anyagát.
    seat_mounting_type:
      name: Ülés beszerelési típusa
      description: Az ülés járműpadlóhoz való rögzítésére szolgáló sín- vagy rögzítőszerkezet
        kialakítása.
    seating_surface_material:
      name: Ülés felületének anyaga
      description: Meghatározza annak a felületnek az anyagát, amelyen a használó
        hátradől vagy fekszik (pl. Textilene háló, sling szövet, vesszőfonat, párnázott
        kárpit).
    seatpost_clamp_mechanism:
      name: Nyeregcsőbilincs rögzítőmechanizmusa
      description: A nyeregcsövet rögzítő szorító-/zárórendszer típusa.
    section_orientation_compatibility:
      name: Sarokelemek kompatibilitása
      description: Jelzi, hogy a tartozék bal karfás, jobb karfás vagy univerzális
        tájolású elemhez illeszkedik-e.
    sectional_configuration:
      name: Szekcionált kialakítás
      description: Meghatározza a szekcionált egység konkrét modulját vagy tájolását
        (pl. sarokelem, bal karfás végelem, sezlon), hogy a vásárlók összeállíthassák
        a kívánt elrendezést.
    sectional_shape:
      name: Ülőgarnitúra alakja
      description: Meghatározza a sarokkanapé általános formáját és elrendezését.
    secured_components:
      name: Rögzített komponensek
      description: Felsorolja azokat a konkrét kerékpáralkatrészeket, amelyeket a
        zárható gyorszár vagy a biztonsági anyák védenek (pl. első kerék, hátsó kerék,
        nyeregcső).
    seed_content:
      name: Magtartalom
      description: Azt jelzi, hogy a citrusféle mag nélküli, kevés magot tartalmaz,
        vagy teljes egészében magvas.
    seed_size_classification:
      name: Magméret besorolása
      description: A licsi nem ehető magjának aránylagos méretét jelzi, ami befolyásolja
        a gyümölcshús mennyiségét.
    self_adhesive_backing_format:
      name: Öntapadó hátlap formátuma
      description: A kanóctalppal szállított öntapadós hátlap fizikai formája (előre
        felhelyezett párna vagy külön matricák stb.).
    self_adhesive_hook_loop_backing_type:
      name: Öntapadó tépőzáras hátoldal típusa
      description: 'Meghatározza az öntapadó oldal hátoldal-/védőfólia-kialakítását
        és ragasztórendszerét. '
    self_adhesive_hook_loop_fastener_shape:
      name: Öntapadós tépőzár alakja
      description: Meghatározza a mellékelt rögzítőelemek formáját és kialakítását.
    self_hardening_clay_finish:
      name: Levegőn száradó agyag felülete
      description: A felület megjelenését és fényét írja le a teljes száradás után
        (segítség matt, selyemfényű stb. hatások választásakor)
    self_hardening_clay_water_resistance_after_curing:
      name: Levegőn száradó agyag vízállósága száradás után
      description: A teljes száradás utáni (további lakk vagy tömítőanyag nélküli)
        vízállóságot jelzi.
    sensor_functions:
      name: Érzékelő funkciói
      description: Jelzi, hogy a szenzor melyik kerékpáros adatot méri (pl. sebesség,
        pedálfordulat).
    sensor_measurement_mode:
      name: Érzékelő mérési módja
      description: Azt jelzi, hogy az érzékelő milyen mérőszámokat képes rögzíteni
        (pl. csak pedálfordulat, csak sebesség, kombinált sebesség és pedálfordulat).
    sensor_mounting_position:
      name: Érzékelő rögzítési pozíciója
      description: Meghatározza a szenzor helyét a kerékpáron vagy a kerékpároson
        (például hajtókar, kerékagy vagy cipő). Ez befolyásolja a kompatibilitást
        a különböző kerékpár-kialakításokkal.
    sensor_mounting_type:
      name: Érzékelő rögzítési típusa
      description: Meghatározza, hogyan rögzül a MAP-érzékelő a szívócsonkhoz/motorhoz
        (pl. csavaros peremes rögzítés vagy benyomható gumipersely).
    sensor_or_gauge_mounting_location:
      name: Szenzor vagy műszer rögzítési helye
      description: Meghatározza, hogy a jármű melyik egységébe kell beépíteni a szenzort
        vagy a műszert (rendszerszinten, nem pedig a jobb/bal oldalt jelöli).
    sensory_modality:
      name: Érzékszervi modalitás
      description: Az elsődleges érzékszervi élmény(ek), amely(ek) nyújtására a játékot
        tervezték (lehet többszenzoros).
    sensory_toy_fidget_mechanism:
      name: Szenzoros játék matatómechanizmusa
      description: Matatás esetén, illetve önszabályozáshoz használt elsődleges interakció/mechanizmus.
    sensory_toy_light_features:
      name: Szenzoros játék fényfunkciói
      description: A játék által biztosított világítási viselkedések/effektek.
    sensory_toy_texture_type:
      name: Szenzoros játék felületi textúrája
      description: A tapintási stimulációhoz használt domináns felületérzet-/textúraelemek.
    sequin_application_method:
      name: Flitter felhelyezési módja
      description: A flitter tervezett felhelyezési/felhasználási módja (rávarrható,
        ragasztható, hővel rögzíthető stb.).
    sequin_finish:
      name: Flitterek típusa
      description: A felvarrón található flitterek felületi megjelenését és fényvisszaverő
        hatását írja le (pl. matt, metál, holografikus); nem vonatkozik a felvarró
        hátoldalára vagy a rögzítés módjára.
    serger_stitch_functions:
      name: Overlock öltésfunkciók
      description: Az overlock varrógép által támogatott öltésfunkciók (overlock és
        szegőöltés-változatok, valamint speciális overlock öltések).
    serger_thread_count:
      name: Overlock szálak száma
      description: Az öltéshez az overlock gép által használható szálak száma (pl.
        2/3/4/5 szálas képesség).
    service_interval:
      name: Szervizintervallum
      description: A hivatalos márkaszerviz által előírt kötelező ellenőrzések vagy
        szervizelések közötti ajánlott maximális időtartam.
    serving_temperature:
      name: Tálalási hőmérséklet
      description: Jelzi a termék fogyasztásakor ajánlott tálalási hőmérsékletet vagy
        állapotot.
    sesame_seed_hull_status:
      name: Szezámmaghéj állapota
      description: Meghatározza, hogy a tahini hántolt vagy hántolatlan szezámmagból
        készül-e, ami befolyásolja a színt, az ízt és a tápértéket.
    sesame_seed_roast_level:
      name: Szezámmag pörkölési szintje
      description: Jelzi, hogy a szezámmagot milyen mértékben pirították meg őrlés
        előtt, ezzel segítve a vásárlókat a kívánt ízintenzitás kiválasztásában.
    sesame_seed_variety:
      name: Szezámmagfajta
      description: Az olaj előállításához használt szezámmag színét vagy fajtáját
        azonosítja.
    set_classification:
      name: Készlet besorolása
      description: Meghatározza a krokettkészlet tervezett játékszintjét vagy stílusát
        (pl. verseny, szabadidős, utazó).
    set_components:
      name: Készlet komponensei
      description: Azt jelzi, hogy mely tételek tartoznak a termékhez (pl. csak a
        középső kar vagy a teljes készlet).
    set_items_included:
      name: Szett tartozék elemei
      description: Meghatározza a készletben található ruhadarabokat vagy kiegészítőket,
        például száríanyagot, dupattát vagy övet.
    setup_mechanism:
      name: Felállítási mechanizmus
      description: Leírja a sátor elsődleges felállítási módját (pl. gyorsfelállító/pop-up
        sátor, felfújható/légkamrás sátor, tetősátor).
    setup_type:
      name: Felállítás típusa
      description: A játszósátor/alagút összeszerelésének és felállításának módja.
    sew_in_interfacing_elasticity:
      name: Bevarrható közbélés rugalmassága
      description: Meghatározza, hogy a bevarrható közbélés rugalmas-e, és ha igen,
        mely irány(ok)ban, hogy illeszkedjen a kötött vagy szövött projektekhez.
    sew_in_label_placement:
      name: Bevarrható címke elhelyezése
      description: A kész terméken tervezett elhelyezési pontot jelzi.
    sew_on_edge_finish:
      name: Rávarrható széleldolgozás
      description: Jelzi, hogy a tépőzár szélei vágottak vagy a foszlás megakadályozása
        érdekében elszegtek-e.
    sew_on_rhinestone_hole_orientation:
      name: Felvarrható strasszkő furatainak iránya
      description: A furatok elrendezése és iránya a kőhöz képest (pl. egymás mellett,
        szemben, keresztben), amely különböző öltésstílusokat tesz lehetővé.
    sewing_kit_components_included:
      name: Tartozék varrókészlet komponensek
      description: Felsorolja a varrókészletben található varrási kellékeket/eszközöket,
        hogy a vásárlók összehasonlíthassák, mi található az egyes készletekben.
    sewing_machine_bobbin_class:
      name: Varrógéporsó típusa
      description: Meghatározza a orsókkal és orsótokokkal használt varrógéppel kompatibilis
        orsóosztályt/-rendszert.
    sewing_machine_buttonhole_type:
      name: Varrógép gomblyuktípusa
      description: A gép által támogatott gomblyukkészítési módszer.
    sewing_machine_display_type:
      name: Varrógép kijelzőtípusa
      description: A varrógép vezérlő-/kijelzőfelületének típusa.
    sewing_machine_needle_point_type:
      name: Varrógép tűhegytípusa
      description: Meghatározza a tű hegyének geometriáját és típusát, amely meghatározza,
        hogyan hatol be a különböző anyagokba (pl. hegyes, gömbhegyű vagy ék alakú).
    sewing_machine_needle_system:
      name: Varrógép tűrendszere
      description: A szabványos tűrendszer vagy modellszám, amely meghatározza a gép
        kompatibilitását (gyakran 130/705 H, HAx1, DBx1, 15x1 stb. formában megadva).
    sewing_machine_needle_type:
      name: Varrógép tű típusa
      description: Meghatározza a tű tervezett felhasználási területét és típusát
        (pl. univerzális, gömbhegyű, farmer), ami befolyásolja az öltés minőségét
        és az anyaghoz való alkalmasságot.
    sewing_machine_shank_type:
      name: Varrógép szár típusa
      description: Meghatározza azt a talpszár-/adaptercsatlakozási szabványt, amelyhez
        tervezték az adott talpat, így biztosítva a varrógéppel való kompatibilitást
        (pl. alacsony szárú, magas szárú, ferde szárú).
    sewing_pattern_accessory_type:
      name: Varrásminta-kiegészítő típusa
      description: Meghatározza, hogy a varrásminta alapján milyen kiegészítő készíthető.
    sewing_pattern_notions_required:
      name: Szükséges varrókellékek
      description: A projekt befejezéséhez szükséges további fontos anyagokat és kellékeket
        sorolja fel (a szöveten és cérnán kívül).
    sewing_pattern_recommended_fabric:
      name: Varrásminta ajánlott anyaga
      description: Felsorolja a varrásmintához ajánlott anyagtípusokat/-vastagságokat
        (a szabásminta tervezője által megadottak szerint).
    sewing_pattern_size_range:
      name: Varrásminta mérettartománya
