    fire_pit_accessories_included:
      name: Tűzrakóhely tartozékok a csomagban
      description: Felsorolja a tűzrakóhelyhez mellékelt fontosabb kiegészítőket,
        például a szikrafogókat vagy a lávaköveket, így egyértelművé téve, hogy mi
        található a csomagban.
    firework_assortment_launch_type:
      name: Tűzijáték-válogatás indítási típusa
      description: Leírja, hogyan szokás meggyújtani/elindítani a csomagban található
        tűzijátékokat.
    firework_assortment_types_included:
      name: Mellékelt tűzijáték választék típusai
      description: Meghatározza a választékban szereplő főbb tűzijáték-típusokat,
        hogy a vásárlók könnyebben összehasonlíthassák a csomagok tartalmát (pl. szökőkutak,
        római gyertyák, petárdák).
    firework_effect_types:
      name: Tűzijáték effektus típusok
      description: A termékválaszték által kiváltott főbb vizuális és/vagy érzékszervi
        hatások (jelölje be az összes megfelelőt).
    firework_ignition_method:
      name: Tűzijáték gyújtási módszer
      description: Meghatározza, hogyan gyújtják meg vagy indítják el a tűzijátékot
        (pl. kanóc vagy elektromos gyufa).
    firework_visual_intensity_level:
      name: Tűzijáték vizuális intenzitási szintje
      description: A szökőkút-hatás szikráinak általános vizuális intenzitása/mennyisége.
    firing_mode:
      name: Tüzelés módja
      description: Felsorolja az airsoft fegyver által támogatott választható vagy
        alapvető tüzelési módokat.
    first_day_cover_cachet_type:
      name: Első napi boríték (FDC) cachet típusa
      description: Az elsőnapi borítékon található alkalmi rajz/illusztráció típusa
        (pl. nyomtatott, kézzel festett)
    first_day_cover_cancellation_type:
      name: Elsőnapi bélyegzés típusa
      description: Az elsőnapi borítékon alkalmazott postai bélyegzés típusa/stílusa
        (pl. gépi bélyegző, kézi bélyegző).
    first_day_cover_set_type:
      name: Elsőnapi borítékszett típusa
      description: Jelzi, hogy a borító egyetlen számot, egy teljes sorozatot vagy
        egy részhalmazt/kombinációt képvisel.
    fishing_hook_size:
      name: Horgászhorog méret
      description: 'Meghatározza a horgok szabványos méretjelölését (pl. #4, 1/0,
        10/0), segítve ezzel a horgászokat abban, hogy a horog méretét a célfajhoz
        és a csalihoz igazítsák.'
    fishing_hook_style:
      name: Horgászhorog stílusa
      description: Meghatározza az egyhorogos horgok egyedi kialakítását vagy hajlítási
        mintázatát, amely befolyásolja a csalizást, a horogba akadás hatékonyságát
        és a tervezett felhasználási területeket.
    fishing_hook_type:
      name: Horgászhorog típusa
      description: Leírja a horgászkanálhoz mellékelt horog konfigurációját (ha van
        ilyen).
    fishing_line_application:
      name: Horgászzsinór alkalmazása
      description: Meghatározza a horgászzsinór vagy az előke anyagának rendeltetését
        (pl. előke, főzsinór, tippet).
    fishing_line_buoyancy_type:
      name: Horgászzsinór felhajtóerő típusa
      description: Meghatározza, hogy a zsinór hogyan viselkedik a vízben (pl. lebegő,
        közepes, süllyedő), segítve ezzel a horgászokat a megfelelő mélységű horgászat
        kiválasztásában.
    fishing_needle_purpose:
      name: Horgásztű célja
      description: Meghatározza a tű elsődleges felhasználási területét a horgászfelszerelések
        összeállításánál.
    fishing_needle_types_included:
      name: Mellékelt horgásztű típusok
      description: Felsorolja a készletben található konkrét tű- és kötélkészítő eszközöket,
        hogy a vásárlók gyorsan áttekinthetik a készlet tartalmát.
    fit_profile:
      name: Illesztési profil
      description: Leírja a betét általános kialakítását és sziluettjét, amelyek befolyásolják
        a mozgáskényelmet és a fedést.
    fit_volume_classification:
      name: Illesztési térfogat osztályozása
      description: A csomagtartó teljes belső térfogatát a márkák által használt besorolás
        szerint osztályozza (pl. LV = kis térfogat).
    fitting_angle:
      name: Illesztési szög
      description: Meghatározza a szerelvénytest hajlítási szögét (pl. egyenes, 45°,
        90°). Változtatható szögű szerelvényekhez használja az „Állítható / forgatható”
        opciót, a nem szokványos szögekhez pedig az „Egyéb” opciót.
    flag_base_type:
      name: Zászlóalap típusa
      description: Meghatározza a sarokzászló rögzítésére használt rögzítési vagy
        alapstílust a különböző játékfelületeken.
    flag_design_theme:
      name: Zászlóminta témája
      description: Leírja a zászlón megjelenő fő motívumot (pl. ország/nemzeti szimbólum,
        sportcsapat, ünnep), elősegítve ezzel a szándékon alapuló vásárláshoz kapcsolódó
        keresést és szűrést.
    flag_mounting_method:
      name: Zászlófelszerelés módja
      description: Meghatározza, hogy a zászló hogyan rögzíthető a járműhöz (pl. antennára
        rögzítés, vonóhorogra rögzítés, mágneses rögzítés).
    flag_type:
      name: Zászló típusa
      description: A golfzászló konkrét rendeltetését vagy típusát jelöli, például
        pályazászló, golfkocsi-zászló vagy gyakorló zászló.
    flame_resistance_standard:
      name: Lángállósági szabvány
      description: Azt a konkrét lángállósági vagy ívkisülés-védelmi szabványt/tanúsítványt
        jelzi, amelynek a ruhadarab megfelel.
    flamenco_cajon_snare_system:
      name: Flamenco cajon pergőrendszer
      description: Meghatározza a belső pergőmechanizmust, amely a jellegzetes flamenco
        zúgást (vagy annak hiányát) hozza létre.
    flammability_compliance:
      name: Gyúlékonysági megfelelőség
      description: Meghatározza azokat a járműbelső-kialakításra vonatkozó gyúlékonysági
        szabvány(oka)t, amelyeknek az anyag megfelel.
    flannel_brushing_finish:
      name: Flanel csiszolt felülete
      description: Jelzi, hogy a flanel csiszolt-e, és ha igen, melyik oldalán, ami
        befolyásolja a puhaságot, a melegséget és a megjelenést.
    flannel_use_type:
      name: Flanel felhasználási típusa
      description: A szabott darab/tekercs flanel elsődleges rendeltetése.
    flap_configuration:
      name: Fedél konfigurációja
      description: Meghatározza a nyereg szárnyának típusát, például egy- vagy kettős
        szárnyas.
    flare_color:
      name: Fénylő szín
      description: A kibocsátott fény/láng színe (vagy a lencse színe LED-es fáklyák
        esetén).
    flash_card_included_features:
      name: A flash kártya mellékelt jellemzői
      description: Kiemeli a flash kártya funkcionális tanulási/használati funkcióit.
    flavor_intensity:
      name: Ízintenzitás
      description: Jelzi az ízesítő termék koncentrációját, segítve a felhasználókat
        a megfelelő adagolás meghatározásában (pl. normál erősségű, extra erős).
    flavor_solvent_base:
      name: Aroma oldószer alap
      description: Meghatározza az aromaanyagban használt fő hordozóanyagot vagy oldószert
        (pl. alkohol, propilénglikol, glicerin).
    fleece_fiber_animal_type:
      name: A gyapjúszál állatfajtája
      description: A gyapjúszál állati eredete (faj).
    fleece_finish_surface:
      name: Fleece felülete
      description: A fleece felületét/kivitelét írja le (pl. bolyhosodásgátló, csiszolt),
        amely befolyásolja a bolyhosodás mértékét, a puhaságot és a megjelenést.
    fleece_preparation_method:
      name: Fleece előkészítési mód
      description: A fleece előkészítése és feldolgozása kézműves munkákhoz és fonáshoz
        (a szál állapota).
    flesh_color:
      name: Hús színe
      description: Meghatározza a dinnye belső húsának színét.
    fletching_orientation:
      name: A tollak tájolása
      description: Meghatározza, hogy a tollak hogyan vannak elhelyezve a nyílvesszőn
        (pl. egyenesen, eltolva, spirálisan), ami befolyásolja a nyíl forgását és
        repülését.
    fletching_profile:
      name: Nyílvessző profil
      description: Meghatározza a tollazat geometriai alakját vagy vágását, amely
        befolyásolja a légellenállást, a szabad magasságot, a zajt és a nyíl repülési
        jellemzőit.
    flight_system_type:
      name: Repülőrendszer típusa
      description: Azonosítja a repülőszárny szerkezeti stílusát, különbséget téve
        az összecsukható, öntött és az integrált repülőszárny-tengely rendszerek között.
    float_attachment_method:
      name: Úszó rögzítési módja
      description: Leírja, hogyan van a úszó a zsinórhoz rögzítve (pl. csúszó vagy
        rögzített), így a horgászok a szerelék típusa szerint szűrhetnek.
    float_design:
      name: Úszó kialakítása
      description: Osztályozza a horgászúszók általános stílusát vagy típusát (pl.
        bobber, waggler, pencil), hogy a horgászok gyorsan kiválaszthassák a technikájukhoz
        és a körülményekhez leginkább megfelelő modellt.
    float_raft_use_environment:
      name: Úszó/tutaj használati környezet
      description: A felfújható termék elsődleges használati környezete (medence,
        nyugodt nyílt víz vagy hullámzó víz), amely tükrözi a tartóssággal és a kialakítással
        kapcsolatos elvárásokat.
    floatation:
      name: Lebegés
      description: Annak megadása, hogy a jeladó úgy van-e kialakítva, hogy a vízben
        lebegjen.
    floor_construction_type:
      name: Padló kialakításának típusa
      description: Meghatározza a csónak aljának kialakítását (pl. önürítő, drop-stitch),
        amely befolyásolja a vízelvezetést, a merevséget és a teljesítményt.
    floor_design:
      name: Padló kialakítása
      description: A burkolathoz mellékelt talajtakaró típusa.
    floor_inclusion:
      name: Padlóburkolat
      description: Meghatározza, hogy az előtérben van-e padló, és ha igen, az eltávolítható-e.
    floor_mat_cleaning_method:
      name: Padlószőnyeg tisztítási mód
      description: A gyártó által a padlószőnyegre ajánlott elsődleges tisztítási
        módszert jelzi.
    floor_mat_edge_style:
      name: Padlószőnyeg szélének stílusa
      description: Meghatározza, hogy a szőnyegnek vannak-e emelt szélei/peremei a
        kiömlött folyadékok és a szennyeződések visszatartására.
    floor_mat_format:
      name: Padlószőnyeg formátuma
      description: Meghatározza a padlóvédő termék fizikai formáját vagy típusát (pl.
        egyrészes szőnyeg, egymásba illeszkedő lapok, tekercs).
    floor_mat_retention_system:
      name: Padlószőnyeg-rögzítő rendszer
      description: Meghatározza a szőnyeg rögzítésének módját.
    floor_mat_set_configuration:
      name: Padlószőnyeg-készlet konfigurációja
      description: Jelzi, hogy a csomag mely alkatrészeket tartalmazza (pl. csak az
        első pár, teljes szett).
    floss_sugar_granulation_grade:
      name: Floss cukor granulátum
      description: A cukorkeverék szemcseméretét (finom, közepes, durva) írja le,
        amely befolyásolhatja a gép teljesítményét és a végső állagot.
    floss_sugar_product_form:
      name: Floss cukor termék űrlap
      description: Jelzi, hogy a floss cukor használatra kész-e, alapcukorral keverendő
        ízkoncentrátum-e, vagy színtelen alapcukor-e.
    flour_grind_texture:
      name: Lisztőrlés textúra
      description: A liszt őrlési finomságát vagy textúráját jelzi, például szuperfinom,
        közepes, durva vagy kőmalommal őrölt, ami befolyásolhatja a recept eredményét.
    flour_processing_method:
      name: Liszt feldolgozási módja
      description: Felsorolja a lisztre alkalmazott, az ízre, a színre vagy a tápértékre
        hatással lévő jelentősebb feldolgozási vagy kezelési módszereket (pl. kőmalomban
        őrölt, fehérített, csíráztatott, dúsított).
    flower_care_instructions:
      name: Virágápolási utasítások
      description: A frissen vágott virágok gondozására vonatkozó ajánlott lépéseket
        ismerteti (pl. a szárak levágása, a víz cseréjének gyakorisága).
    flugelhorn_leadpipe_material:
      name: A szárnykürt szájrészének anyaga
      description: A fúvókacső anyaga (ha az a hangszer általános anyagától külön
        van megadva).
    flugelhorn_trigger_type:
      name: Szárnykürt ravasz típusa
      description: Azt jelzi, hogy a szárnykürt tartalmaz-e hangoló ravaszt, és hogy
        melyik tolózárat/szelepet működteti.
    fluorescence_grade:
      name: Fluoreszcencia fokozat
      description: A gyémánt fluoreszcencia intenzitását jelzi UV-fény hatására.
    fluorescence_under_uv:
      name: Fluoreszcencia UV alatt
      description: Azt jelzi, hogy a minta ultraibolya fényben mutat-e fluoreszcenciát,
        és ha igen, milyen típusú fluoreszcenciát.
    fluorocarbon_content:
      name: Fluorkarbon tartalom
      description: Azt jelzi, hogy a viasz tartalmaz-e fluorkarbon adalékanyagokat,
        és ha igen, milyen mennyiségben.
    flute_case_capacity:
      name: Fuvolatok kapacitása
      description: Jelzi, hogy a tok a fuvola főtestén kívül még mit tud befogadni
        (pl. fuvola + pikoló, tartalék fejrész).
    flute_cleaning_rod_tip_type:
      name: Fuvolatisztító rúd hegy típusa
      description: Leírja a szövetet/törlőpálcikát tartó vagy a műszerrel érintkező
        rúdvég kialakítását (pl. hornyolt, menetes, szemes).
    flute_footjoint_type:
      name: A fuvola alsócső típusa
      description: A fuvola alsócső konfigurációját határozza meg.
    flute_headjoint_cork_type:
      name: A fuvola fejrésze dugójának típusa
      description: Meghatározza a fejrészhez mellékelt dugó/zárószerelvény anyagát/típusát.
    flute_key_system:
      name: Fuvola billentyűrendszere
      description: Meghatározza a fuvola által használt mechanikus/billentyűzetes
        rendszert (pl. Boehm-rendszer), ahol alkalmazható.
    flute_keywork_material:
      name: Fuvola billentyűzetének anyaga
      description: A billentyűk (billentyűzet) anyaga és/vagy bevonata, ha a billentyűk
        anyagától külön van meghatározva.
    flute_offset_g:
      name: A fuvola G-billentyűjének eltolt elhelyezkedése
      description: Meghatározza, hogy a fuvolán van-e eltolt G-billentyű-elrendezés.
    flute_wall_thickness:
      name: Fuvolafal vastagsága
      description: A fuvolacső falvastagsági osztálya (vékonyfalú, standard, vastagfalú).
    fly_pattern_type:
      name: Legyezőminta típusa
      description: A műlegyeket horgászati stílusuk vagy a rovarok/zsákmányállatok
        utánzása szerint osztályozza, hogy a horgászok gyorsan kiválaszthassák a megfelelő
        legy típusát.
    fly_rod_style:
      name: Horgászbot stílus
      description: A botot a tervezett horgászati stílus vagy felhasználási terület
        szerint osztályozza (pl. egykezes, switch, spey).
    fly_style:
      name: Legyező stílusa
      description: Meghatározza a hosszú szárú alsó sliccének vagy elülső nyílásának
        típusát.
    fly_tying_tools_included:
      name: A mellékelt horgokészítő eszközök
      description: Felsorolja a készletben található konkrét horgászszerszámokat,
        hogy a vásárlók pontosan tudják, mi tartozik a csomaghoz, és összehasonlíthassák
        a különböző csomagokat.
    fly_type:
      name: Slicc típusa
      description: Meghatározza, hogy a hosszú szárú alsónadrág rendelkezik-e funkcionális
        sliccel, és ha igen, milyen stílusú sliccel.
    flyer_hook_mounting_method:
      name: Szárnyaskamó rögzítési módja
      description: Hogyan rögzíthető a horog a szárnyhoz (pl. becsavarható vagy bepattintható/bepréselhető),
        ami befolyásolja a felszerelhetőséget és a kompatibilitást.
    flyer_hook_orientation:
      name: Szárnyas kampó tájolása
      description: Annak meghatározása, hogy a kampó a szárny bal vagy jobb oldalára
        készült-e, vagy kétoldalas/univerzális.
    flyer_kit_finish_coating:
      name: Flyer készlet felülete/bevonata
      description: A flyer készlet összetevőire alkalmazott felületkezelés.
    flyer_kit_included_components:
      name: A flyer készletben foglalt komponensek
      description: Felsorolja, hogy a készlet milyen alkatrészeket tartalmaz.
    flyer_orifice_type:
      name: A fonalvezető lyukának típusa
      description: Meghatározza a fonalvezetőn használt nyílás stílusát.
    flying_disc_feature_set:
      name: Frizbi funkciókészlet
      description: A frizbi fő funkcionális jellemzői.
    flysheet_material:
      name: Ponyva anyaga
      description: Meghatározza a külső sátor/ponyva fő anyagát, amely befolyásolja
        a tartósságot és időjárásállóságot.
    flywheel_balance_type:
      name: A lendkerék kiegyensúlyozásának típusa
      description: Jelzi, hogy a lendkerék szimmetrikusan kiegyensúlyozott-e, vagy
        külső kiegyensúlyozó súlyt használ.
    foam_blocks_size_class:
      name: Habszivacs blokkok méretosztálya
      description: A készletben található blokkok általános méretosztályát jelzi.
    foam_blocks_surface_texture:
      name: Habszivacs blokkok felületi textúrája
      description: A habszivacs blokkok külső felületének tapintását és felületkezelését
        írja le.
    foam_surface_effect:
      name: Habfelület-hatás
      description: Ismerteti a kézműves habon vagy hungarocellen alkalmazott gyakori
        dekoratív felületi hatásokat, mint például a csillogó, fémes vagy holografikus
        felületek.
    foil_color:
      name: Fólia színe
      description: Meghatározza a tanúsítványon használt fólia hangsúlyos színét (ha
        alkalmazható).
    foil_curtain_mounting_method:
      name: Fóliafüggöny rögzítési módja
      description: A fóliafüggöny felszerelésének vagy felakasztásának módja (pl.
        ragasztócsík, fűzőlyukak).
    foil_discipline:
      name: Szörf-szárny szakág
      description: Azonosítja azt az elsődleges használati stílust vagy szakágat,
        amelyre a szörf-szárnyat (foil-t) tervezték.
    foil_mast_board_mounting_type:
      name: Foil árboc deszkához való rögzítésének típusa
      description: Meghatározza az árboc tetején található csatlakozófelületet, amely
        a deszkához vagy a foil rögzítősínhez kapcsolódik.
    foil_mast_fuselage_connection_type:
      name: Foil árboc törzs csatlakozás típusa
      description: Meghatározza, hogyan csatlakozik az árboc a törzshöz vagy az első
        szárny szerelvényhez.
    foil_mounting_interface:
      name: Fólia rögzítési felülete
      description: Meghatározza azt a csatlakozási szabványt, amelyet az alkatrész
        az alaplaphoz vagy más foil elemekhez való rögzítéséhez használ.
    foil_mounting_system:
      name: Fólia rögzítési rendszere
      description: Meghatározza a foilok vagy uszonyok rögzítési felületét a deszkán,
        biztosítva a kompatibilitást a sportoló meglévő hardverével.
    foil_mounting_type:
      name: Fólia rögzítési típusa
