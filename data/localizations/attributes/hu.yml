    bellows_material:
      name: Fújtató anyaga
      description: A fújtatótest/-burkolat anyaga (ha van).
    bellows_orientation:
      name: Fújtató tájolása
      description: A csövekbe levegőt biztosító harmonika konfigurációját jelzi.
    belly_panel_style:
