        menetszabványát (pl. metrikus domború peremezés vagy SAE süllyesztett peremezés).
    wheel_fastener_seat_type:
      name: Kerékrögzítő fészek típusa
      description: Meghatározza a kerékhez illeszkedő kerékanya vagy kerékcsavar ülék
