    billiard_glove_finger_coverage:
      name: Biliárdkesztyű ujjfedése
      description: Meghatározza, hogy a kesztyű kialakítása mely ujjakat fedi, így
        pontosan leszűrhet a biliárdhoz készült kesztyűstílusokra.
    billiard_pocket_style:
      name: Biliárdzseb stílusa
      description: Meghatározza a zseb szerkezeti vagy esztétikai stílusát, amely
        hatással van a kompatibilitásra és az asztal megjelenésére.
    billiard_rack_style:
      name: Biliárdgolyó-rendező háromszög stílusa
      description: Bemutatja a rendező háromszög fizikai stílusát vagy mechanizmusát
        (pl. hagyományos keret, sablonlap, összecsukható).
    billiard_table_type:
      name: Biliárdasztal típusa
      description: Meghatározza, hogy az asztalt mely dákós sportághoz vagy felhasználási
        módhoz tervezték (pl. pool, snooker, karambol).
    billiards_discipline:
      name: Biliárd sportág
      description: Jelzi azt a konkrét dákóssport-változatot (játéktípust), amelyhez
        a termék készült vagy amellyel kompatibilis.
    binding_compatibility_standard:
      name: Kötéskompatibilitási szabvány
      description: Beazonosítja azt a kötésfelületet (talpszabványt), amelyre a síbakancs
        tanúsítvánnyal rendelkezik, ezzel biztosítva a síkötésekkel való biztonságos
        és megfelelő párosítást.
    binding_inclusion:
      name: Kötés tartozékként való megléte
      description: Meghatározza, hogy a sílécek kötés nélkül, integrált rendszerrel
        vagy külön mellékelt kötéssel vannak-e árusítva.
    binding_interface:
      name: Kötésfelület
      description: Jelzi azt a kötéslemezt vagy felületi szabványt, amellyel a sílécek
        előre fel vannak szerelve, illetve amellyel kompatibilisek, biztosítva a bakancs/kötés
        kompatibilitását.
    binding_liner_type:
      name: Kötőbélés típusa
      description: Bemutatja a kötésben/bakancsban használt belső bélés típusát (pl.
        kivehető, járásra alkalmas, hőre formázható).
    binding_mounting_system:
      name: Kötésrögzítési rendszer
      description: Meghatározza azt a csatlakozóelemet, amellyel a kötést a síléchez
        rögzítik (lapos rögzítés, sín/pálya, lemez stb.).
    binding_position:
      name: Rögzítési pozíció
      description: Megadja a kötés tervezett rögzítési pozícióját vagy konfigurációját
        (pl. első bakancs, hátsó bakancs, ARTP (állítható hátsó lábujjlemez)).
    binding_strap_position:
      name: Kötéspánt elhelyezkedése
      description: Meghatározza, hogy a pántot a kötés mely részére kell felszerelni.
    bingo_components_included:
      name: A bingo játék tartozékai
      description: Felsorolja a bingókészlethez biztosított elemeket, például a bingógolyókat,
