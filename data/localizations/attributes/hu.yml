      name: Vízi jármű kompatibilis motortípusa
      description: Jelzi, hogy az alkatrész melyik hajtáslánc-konfigurációhoz használható
        (külső motor/belső motor/hátsó meghajtás/sugármeghajtás).
    compatible_weight_plate_diameter:
      name: Kompatibilis súlytárcsaátmérő
      description: Meghatározza, hogy a géphez milyen átmérőjű súlytárcsák használhatók.
    compatible_wheel_finish:
      name: Kompatibilis kerékfelület
      description: Meghatározza, hogy a tisztítószer mely kerékfelületeken/-anyagokon
        használható biztonságosan (a gyártó állítása szerint).
    compatible_whorl_drive_band_type:
      name: Csigával kompatibilis hajtószíjtípus
      description: Meghatározza, hogy a csiga melyik hajtószíjtípussal használható.
    compatible_wick_series:
      name: Kompatibilis kanócsorozat
      description: Meghatározza azokat az általános kanócsorozatokat/-típusokat, amelyekhez
        a tartó illik (ipari elnevezés szerint), amennyiben azt az eladó megadta.
    compatible_winder_head_bit:
      name: Kompatibilis tekercselőfej
      description: Meghatározza a hangolókulcs/-fej csatlakozótípusát, amelyhez a
        tekercselő használható (pl. hornyolt fej, cserélhető fejek, univerzális fej).
    compatible_windlass_rode:
      name: Kompatibilis csörlőkar
      description: Meghatározza, hogy a csörlő milyen típusú horgonyrúd kezelésére
        szolgál.
    compatible_windshield_type:
      name: Kompatibilis szélvédőtípus
      description: Meghatározza, hogy a ház milyen szélvédőtípussal használható.
    compatible_wood:
      name: Kompatibilis fa
      description: Meghatározza, hogy a polírozóanyagot milyen ujjdeszkatípusokhoz
        ajánlott/biztonságos használni.
    compatible_writing_surface:
      name: Kompatibilis írófelület
      description: Meghatározza azokat a felületeket/papírokat, amelyeken a tinta
        a legjobban használható.
    compatible_zipper_size:
      name: Kompatibilis cipzárméret
      description: Azt a cipzárméretet jelzi, amelyhez a húzó illik (gyakran 3-as,
        5-ös, 8-as és 10-es méretként kifejezve), megkönnyítve a kompatibilitási jelzők
        szűrését.
    compliance_certification:
      name: Megfelelőségi tanúsítványok
      description: Milyen közúti használatra és elektromágneses kompatibilitásra vonatkozó
        megfelelőségi/jóváhagyási szabványoknak felel meg a fénysáv.
    component_position:
      name: Alkatrész elhelyezkedése
      description: Meghatározza az alkatrész relatív helyzetét a motor vezérműszerelvényén
        belül (pl. elülső vagy hátsó burkolat, felső vagy alsó). Nem a jármű elülső/hátsó
        részében helyezkedik el.
    concentration_level:
      name: Koncentráció szintje
      description: A paradicsompüré sűrűségének minőségi jelölése (egyszeres, kétszeres,
        háromszoros), amely segít az ételrecepthez a megfelelő hozzávaló kiválasztásához.
    concentration_type:
      name: Koncentráció típusa
      description: Jelzi, hogy a termék használatra kész vagy koncentrátum, és (koncentrátum
        esetén) meghatározza a tipikus hígítási utasításokat.
    concert_bass_drum_mounting_stand_type:
      name: Zenekari nagydob rögzítési típusa
      description: Meghatározza, hogy a zenekari nagydob alá van támasztva, vagy rögzítve
        van a megfelelő teljesítményhez.
    concert_pitch_standard:
      name: Koncerthangmagasságra vonatkozó szabvány
      description: Meghatározza azt a hangolási referenciaértéket (A4), amelyre a
        zongorát az értékesítéskor hangolták (pl. A440, A442, A444).
    condiment_form:
      name: Fűszer formátuma
      description: Jelzi a tormatermék fizikai formáját vagy állagát (pl. paszta,
        por, krém).
    condiment_texture:
      name: Fűszer textúrája
      description: Leírja a fűszer vagy chutney fizikai állagát (pl. darabos, sima).
    confetti_format:
      name: Konfetti formátuma
      description: Meghatározza a konfettitermék formátumát a konfetti csomagolása
        vagy kilövési módja alapján (pl. lazán szórható, vagy kilövőágyúval kilőhető).
    conga_head_tensioning_system:
      name: Kongafej feszítő rendszere
      description: A kongafej feszítéséhez/hangolásához használt szerelvény típusa
        (pl. hagyományos rögzítőcsavaros hangolás vagy modern gyorshangoló mechanizmusok).
    conga_set_included_drum_types:
      name: Kongaszettben található dobtípusok
      description: Milyen kongatípusok találhatók a kongaszettben (pl. quinto + konga
        + tumba).
    connector_case_style:
      name: Csatlakozóaljzat-burkolat típusa
      description: A csatlakozóaljzat-burkolat általános szerkezeti felépítését osztályozza
        (pl. kemény burkolat vagy puha ház) a védelmi szint és a hordozhatóság meghatározása
        érdekében.
    console_cover_installation_method:
      name: Konzolburkolat szerelési módja
      description: Meghatározza, hogy a konzolburkolat hogyan rögzül a konzolhoz/kartámaszhoz
        (pl. ráhúzható, rugalmas pántokkal rögzíthető, tépőzáras, öntapadós, felcsíptethető).
    console_display_type:
      name: Konzol kijelzőtípusa
      description: Meghatározza a gépen található felhasználói kijelző típusát (pl.
        LCD, LED, érintőképernyő).
    construction_design:
      name: Építési kialakítás
      description: Azt jelzi, hogy hány csuklós darabból áll a védőeszköz a könnyebb
        mozgás érdekében (pl. 1 darabos vagy 3 darabos).
    contact_angle:
      name: Érintkezési szög
      description: Megadja a csapágygyűrűk érintkezési szögét, egyetlen szögként vagy
        szögpárként kifejezve (pl. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Kontakt zsonglőrlabda tölteléktípusa
      description: Meghatározza, hogy a labda tömör vagy töltött-e (és ha töltött,
        akkor mivel van töltve), ami befolyásolja a súlyeloszlást és a tartósságot.
    contact_juggling_ball_transparency:
      name: Kontakt zsonglőrlabda átlátszósága
      description: Meghatározza a labda átlátszóságát/optikai megjelenését.
    contact_surface_material:
      name: Érintkezési felület anyaga
      description: Meghatározza a műszerrel érintkező pontokon használt anyagot (pl.
        parafa/gumi), amely megakadályozza a karcolódást, és javítja a tapadást.
    container_material:
      name: Tárolóeszköz anyaga
      description: Meghatározza a termék kiskereskedelmi csomagolásának (tárolóeszközének)
        fő anyagát (pl. üveg, PET-műanyag, alumínium).
    contaminant_removal:
      name: Szennyezőanyag-eltávolítás
      description: Felsorolja azokat a szennyezőanyag-osztályokat, amelyek eltávolítására
        vagy csökkentésére a termék tanúsítvánnyal rendelkezik.
    contra_alto_clarinet_body_configuration:
      name: Kontraalt-klarinéttest konfigurációja
      description: Leírja a kontraalt-klarinét fizikai felépítési formáját (pl. egyenes
        vagy hajtogatott kivitel).
    contra_alto_clarinet_lowest_note_extension:
      name: Kontraalt-klarinét legkisebb hangterjedelme
      description: Meghatározza a hangszer legkisebb lejátszható hangterjedelmét (a
        billentyűk által megengedett legmélyebb hang), amelyet általában a mély E♭,
        mély D és mély C modellek megkülönböztetésére használnak.
    contra_bass_clarinet_bell_type:
      name: Kontrabasszus-klarinét harangtípusa
      description: A kontrabasszus-klarinéton használt harangkonfiguráció.
    contra_bass_clarinet_bore_type:
      name: Kontra basszusklarinét furattípusa
      description: A hangszer furatkialakítása.
    contra_bass_clarinet_lowest_written_note:
      name: Kontra basszusklarinét legalsó leírt hangja
      description: A hangszer által lejátszható legmélyebb hangjegy (ez gyakran attól
        függ, hogy a hangszer képes-e a mély C vagy a mély Eb hangok lejátszására).
    control_arm_bushing_material:
      name: Lengőkarpersely anyaga
      description: Meghatározza a mellékelt/beszerelt perselyek anyagát, ha vannak.
    control_arm_bushings_included:
      name: Lengőkarperselyek mellékelve
      description: Azt jelzi, hogy a lengőkart beépített perselyekkel szállítják-e.
    control_arm_finish:
      name: Lengőkar felülete
      description: Meghatározza a lengőkarra felvitt védőbevonatot (korrózióvédelem
        és megjelenés).
    control_arm_grease_fitting_type:
      name: Vezérlőkar zsírzógombjának típusa
      description: Meghatározza, hogy a lengőkar/gömbcsukló szerelvény tartalmaz-e
        zsírzógombot (Zerk), és hogy az szervizelhető-e.
    control_arm_material:
      name: Lengőkar anyaga
      description: Meghatározza a lengőkartest elsődleges anyagát és felépítését.
    control_arm_position:
      name: Lengőkar pozíciója
      description: Meghatározza, hogy a lengőkart milyen felfüggesztési pozícióra
        tervezték a tengely sarkában vagy oldalában (pl. felső/alsó, elöl/hátul, bal/jobb).
    control_arm_style:
      name: Lengőkar típusa
      description: A felfüggesztésben használt lengőkar geometriai/kialakítási stílusát
        határozza meg.
    control_cable_connector_type:
      name: Vezérlőkábel-csatlakozó típusa
      description: Meghatározza a vezérlőkábel(ek) végződésének/csatlakozójának típusát,
        amely a vezérlőegység és a motor közötti összeköttetést biztosítja (pl. eredeti
        gyártó által meghatározott zárószerelvények).
    control_voltage_or_gate_connectivity:
      name: Vezérlőfeszültség vagy kapukapcsolat
      description: Megadja a vezérlőfeszültség/kapcsolójel (CV/Gate) csatlakoztatási
        támogatást moduláris/analóg berendezésekkel való integrációhoz.
    controller_function:
      name: Vezérlő funkciója
      description: Meghatározza a futópad vezérlőpaneljének elsődleges funkcióit,
        például motorvezérlés, áramellátás vagy inverter meghajtás.
    controller_type:
      name: Vezérlő típusa
      description: Meghatározza a robogó elektromossá való átalakításához szükséges
        készlethez mellékelt (vagy a használathoz szükséges) motorvezérlőt/vezérlőrendszert,
        a kompatibilitás és a teljesítmény szempontjából lényeges vezérlőjellemzőkre
        összpontosítva.
    conversion_kit_cooling_method:
      name: Átalakító készlet – hűtési mód
      description: A motor/inverter/akkumulátor beépítéséhez használt elsődleges hőmérséklet-szabályozási
        megközelítés.
    conversion_kit_installation_complexity:
      name: Átalakító készlet – szerelés összetettsége
      description: A szerelés várható nehézségi szintje a jellemzően szükséges vásárlói
        szakképzettség/szerszámok alapján.
    converted_bed_size:
      name: Átalakított ágy mérete
      description: Az átalakított kiságy méretét vagy konfigurációját jelzi a készlet
        beszerelése után.
    convertible_configuration:
      name: Átalakítási lehetőségek
      description: Azt jelzi, hogy a termék hány különböző ágytípussá alakítható át
        (pl. 3 az 1-ben kiságy → kisgyermekágy → kinyitható kanapé).
    convertible_high_chair_modes:
      name: Átalakítható etetőszék üzemmódok
      description: Meghatározza, hogy milyen típusú üléssé alakítható át a szék.
    cookie_decorating_kit_items_included:
      name: Sütidíszítő készlet tartozékai
      description: Felsorolja a készletben található díszítőelemeket, hogy a vásárló
        pontosan tudja, milyen kellékek vannak a dobozban (pl. habzsák cukormázbevonathoz,
        szórófejek, sütiformák).
    cookie_variety:
      name: Süteményválaszték
      description: Meghatározza az adott süti stílusát vagy változatát, ami segít
        a vásárlónak a kívánt típus gyors megtalálásában.
    cooking_state:
      name: Főzési állapot
      description: A csirketermék eladáskori készültségi szintjét jelzi (nyers, teljesen
        megfőzve, pácolva stb.).
    coolant_additive_purpose:
      name: Hűtőfolyadék-adalékanyag célja
