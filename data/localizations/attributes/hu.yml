    windsurfing_sail_style:
      name: Szörfdeszka vitorla stílusa
      description: A vitorla tervezett szakágát vagy felhasználási módját adja meg.
        Lehet például wave, freeride vagy foil.
    wine_additive_type:
      name: Borászati adalékanyag típusa
