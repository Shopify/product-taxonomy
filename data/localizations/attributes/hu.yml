      description: Meghatározza a forgó lünetta mértékegység-jelöléseit (fok, mil
        vagy kettős skálázódás).
    bicycle_brake_set_components_included:
      name: Kerékpárfék-készlet mellékelt alkatrészei
      description: Felsorolja az egyéni alkatrészeket a készletben, hogy a vásárló
        pontosan tudja, mit tartalmaz, és összehasonlíthatja a különböző csomagkonfigurációkat.
    bicycle_cage_mounting_position:
      name: Kerékpártartó rögzítési helye
      description: Meghatározza, hogy a kerékpáron hová kell felszerelni a tartót.
    bicycle_computer_mount_placement:
      name: Kerékpárkomputer-tartó elhelyezése
      description: Meghatározza, hogy a kerékpáron hová szerelhető fel a komputer
        tartója, például a kormány elé vagy a kormányszár felső sapkájára.
    bicycle_folding_mechanism:
      name: Kerékpár összehajtási mechanizmusa
      description: Meghatározza a biciklikereten használt mechanikus összecsukási
        rendszert (pl. félbehajtás, függőleges hajtás).
    bicycle_frame_design:
      name: Kerékpárváz kialakítása
      description: Meghatározza a biciklikeret általános stílusát, befolyásolva az
        akadálymentességet, a rakománykapacitást és a tárolási lehetőségeket.
    bicycle_frame_style:
      name: Kerékpár keretstílusa
      description: Bemutatja a kerékpárváz szerkezeti stílusát (pl. alacsony átlépésű,
        lowrider, nyújtott chopper), amely befolyásolja a kerékpáros testtartását
        és a kerékpár megjelenését.
    bicycle_handlebar_type:
      name: Kerékpárkormány típusa
      description: Azonosítja a kormány stílusát vagy geometriáját, segítve a kerékpárosokat
        a vezetési pozíciójuknak és szakterületüknek megfelelő kormány kiválasztásában.
    bicycle_headset_configuration:
      name: Kerékpáros fejhallgató konfigurációja
      description: A kerékpár-fejhallgató szerkezeti stílusát vagy szabványát jelzi
        a fejhallgatócsészék elrendezése szerint (pl. External Cup, ZeroStack, Integrated,
