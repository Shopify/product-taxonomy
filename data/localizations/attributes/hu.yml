        formula autóban (kiválaszt minden alkalmazható, ha támogatott).
    aftertouch_support:
      name: Aftertouch-támogatás
      description: Legyen szó adatkezelő támogatás aftertouch (csatorna vagy többszólamú)
        billentyűkön/padokon.
    agave_content_classification:
      name: Agávétartalom szerinti besorolás
      description: Meghatározza, hogy a tequila 100%-ban Blue Weber agávéból készül-e,
        vagy legalább 51% agávécukrot tartalmazó keverék.
    aida_cloth_count:
      name: Aida szövet szálszáma
      description: Meghatározza az Aida szövet szálszámát (négyzetek/öltések száma
        hüvelykenként), amely meghatározza az öltésméretet és a minta méretarányát.
    aida_cloth_pre_cut_format:
      name: Aida-kendő előre vágott formátumban
      description: Azt jelzi, hogy az Aida-szövetet előre vágott darabként, folyamatosan
        vágott darabként vagy tekercsben értékesítik.
    air_bag_material:
      name: Légzsák anyaga
      description: Meghatározza az ír warpipe-hez használt légzsák/tartály anyagát.
    air_bed_internal_construction:
      name: Felfújható ágy belső felépítése
      description: Leírja a belső támogatási szerkezetet vagy technológiát, amelyet
        a felfújható ágyban használnak a kényelem és a stabilitás érdekében.
    air_dry_clay_color_form:
      name: Levegőn száradó agyag színformája
      description: Akár színezetten, fehéren/semlegesen festve, akár keverékként/válogatásként
        árulják az agyagot.
    air_hockey_items_included:
      name: Tartalmazza a léghokielemet
      description: Felsorolja a készletben található konkrét kiegészítőket, hogy a
        vásárló pontosan tudja, mit kap (pl. 2 lökhárító, 4 korong, 2 filcbetét).
    air_intake_temperature_sensor_mounting_style:
      name: Beszívott levegőhőmérséklet-érzékelő felszerelési stílusa
      description: Az IAT-érzékelő fizikai rögzítési módja a szívórendszerben.
    air_integration_capability:
      name: Levegőintegrációs képesség
      description: Jelzi, hogy a búvárkomputer támogat-e vezeték nélküli palacknyomásadókat,
        és ha igen, hogyan.
    air_mattress_valve_type:
      name: Felfújható matrac szeleptípusa
      description: Meghatározza, hogy a tartozék milyen szeleptípushoz illik, vagy
        milyet tartalmaz, ezáltal biztosítva a szivattyúk, szelepek és javítóalkatrészek
        közötti kompatibilitást.
    air_water_rocket_kit_items_included:
      name: Tartalmazza a levegő- és vízrakétakészlet-elemet
      description: A rakétakészlet főbb alkatrészei (indítóállvány, pumpa, uszonyok,
        utántöltő alkatrészek).
    air_water_rocket_launch_method:
      name: Levegő- és vízrakétakészlet indítási módja
      description: Hogyan helyezik nyomás alá/indítják a rakétát (a felhasználói interakció
        és a felszerelés stílusa).
    airbag_position:
      name: Légzsákpozíció
      description: Meghatározza a légzsák alkatrészének tervezett biztonsági helyzetét/zónáját.
    aircraft_ads_b_capability:
      name: Repülőgép ADS-B képessége
      description: Meghatározza, hogy a repülőgép fel van-e szerelve ADS-B Out megfelelőségre.
    aircraft_airframe_material:
      name: Repülőgép törzsének anyaga
      description: Repülőgép vázszerkezetének gyártásához használt alapanyag(ok).
    aircraft_cabin_configuration:
      name: Repülőgép-fülke konfigurációja
      description: Meghatározza a repülőgép utasterének elrendezését (pl. konferencia-elrendezés,
        kanapé, négyzónás utastér).
    aircraft_documentation_included:
      name: Repülőgép dokumentációja mellékelve
      description: Felsorolja, hogy mely dokumentumokat mellékelik az alkatrészhez
        (pl. 8130-3).
    aircraft_galley_configuration:
      name: Repülőgép konyhai konfigurációja
      description: Konyha/étkeztetési létesítmények megléte és típusa a kabinban.
    aircraft_installation_location:
      name: Repülőgép-szerelés helyszíne
      description: A repülőgépen hol szerelik fel vagy használják az alkatrészt vagy
        tartozékot.
    aircraft_internet_connection:
      name: Repülőgépes internet kapcsolat
      description: Jelzi a kabinon belüli internetkapcsolat meglétét/típusát.
    aircraft_landing_gear_type:
      name: Repülőgép-futómű típusa
      description: Meghatározza az autogiro futómű-konfigurációját.
    aircraft_lavatory_configuration:
      name: Repülőgép mosdójának konfigurációja
      description: Beillesztési mosdó konfigurációs típusa.
    aircraft_maintenance_program_enrollment:
      name: Jelentkezés a repülőgép-karbantartási programra
      description: Azt jelzi, hogy a repülőgép részt vesz-e motor- és/vagy repülőgéptörzs-karbantartási
        programban, és ha igen, melyik fedezeti típus vonatkozik rá (motor, repülőgéptörzs
        vagy mindkettő).
    aircraft_operational_certification:
      name: Repülőgép üzemeltetési tanúsítása
      description: Meghatározza a légi jármű üzemeltetésének szabályozási vagy üzemeltetési
        tanúsítási alapját (joghatóságtól függő, pl. FAA 91/135/121. rész, EASA AOC).
    aircraft_protective_gear_certification:
      name: Repülőgép védőfelszerelések tanúsítása
      description: Meghatározza azt a repülési/szabályozási vagy iparági szabványt,
        amelyre a védőfelszerelés tanúsítvánnyal rendelkezik.
    aircraft_system_application:
      name: Repülőgéprendszer-alkalmazás
      description: Azonosítja, hogy az alkatrész/tartozék melyik repülőgéprendszerhez
        vagy területhez tartozik (különböző repülőgép-alkatrészek böngészésére és
        szűrésére szolgál).
    airflow_resistance_level:
      name: Légáramlásellenállási szint
      description: Azt jelzi, hogy a szelep mennyire korlátozza az ellennyomást/légellenállást.
    airship_envelope_material:
      name: Léghajó burkolat anyaga
      description: Léghajó burkolatának (héjának) alapanyaga.
    airsoft_part_type:
      name: Airsoft-alkatrész típusa
      description: Az airsoft-fegyverek funkcionális alkatrészét vagy tartozéktípusát
        azonosítja (pl. tár, cső, kézvédő).
    airworthiness_approval_basis:
      name: Légialkalmassági jóváhagyás alapja
      description: Meghatározza az alkatrész jóváhagyásának/tanúsításának alapját,
        ha alkalmazható (pl. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Riasztási hangerő állíthatósága
      description: Azt jelzi, hogy a felhasználó beállíthatja-e a riasztás hangerejét,
        és ha igen, hogyan.
    alcohol_ink_finish_effect:
      name: Alkoholos tintával készült felület
      description: Az alkoholos tinta formulája által létrehozott vizuális hatást/felületet
        írja le (a színen túl), például metálfényű vagy gyöngyházfényű.
    alignment_aid_style:
      name: Igazítási segédeszköz stílusa
      description: Leírja a szőnyeg felületére nyomtatott vagy beágyazott igazítási
        útmutató típusát (pl. egyenes vonal, távolságjelző).
    alternator_cooling_type:
      name: Generátor hűtési típusa
      description: Leírja a generátor hűtésének és szellőztetésének módját.
    alternator_marine_ignition_protection_rating:
      name: Generátor tengeri gyulladásvédelmi besorolása
      description: Azt jelzi, hogy a generátor gyújtásvédelemmel rendelkezik-e hajómotorok
        motorterében (pl. SAE J1171 / ISO 8846 szabványnak megfelelő).
    alternator_mounting_configuration:
      name: Generátor felszerelési konfigurációja
      description: Meghatározza a generátor motortartóhoz való rögzítéséhez használt
        fizikai rögzítési konfigurációt.
    alternator_pulley_type:
      name: Generátor szíjtárcsatípusa
      description: Meghatározza a generátor szíjtárcsájának/tengelykapcsolójának kialakítását
        (vagy azt jelzi, hogy nincs szíjtárcsa).
    alternator_regulator_type:
      name: Generátor szabályozójának típusa
      description: Azt jelzi, hogy a feszültségszabályozó a generátoron belül vagy
        kívül található-e, és hogy az OEM által vezérelt (számítógép/PCM vezérelt).
    alternator_terminal_connection_type:
      name: Generátorterminál kapcsolatának típusa
      description: Generátor kimeneti/gerjesztő végpontjainak elsődleges elektromos
        csatlakozási típusa a kábelköteg kompatibilitásának biztosítása érdekében.
    altitude_suitability:
      name: Magassági alkalmasság
      description: Azt jelzi, hogy a labdát egy adott magassági pályára tervezték-e,
        ami befolyásolja a sebességet és a pattanást.
    ambulance_stretcher_mount_type:
      name: Mentőhordágyra szerelhető típus
      description: Meghatározza a mentőautó által támogatott hordágyrakodó/rögzítő
        rendszer típusát.
    american_football_safety_certification:
      name: Amerikai futball biztonsági tanúsítványa
      description: Az amerikai futballra vonatkozó biztonsági tanúsítványokat vagy
        szabványokat jelöli, amelyeknek a termék megfelel.
    amplifier_tube_function:
      name: Erősítőcső funkciója
      description: Meghatározza a cső funkcionális szerepkörét egy hangszererősítő
        áramkörön belül (pl. előerősítő vs. végfok).
    analog_synthesizer_cv_gate_i_o:
      name: Analóg szintetizátor CV/Gate I/O
      description: Jelzi a moduláris/analóg berendezésekkel való integrációhoz támogatott
        vezérlőfeszültség- és gate-csatlakozások típusait.
    analog_synthesizer_keybed_configuration:
      name: Analóg szintetizátor billentyűzetének konfigurációja
      description: Leírja, hogy a szintetizátor tartalmaz-e beépített billentyűzetet,
        és ha igen, hány billentyűt tartalmaz.
    anchor_configuration:
      name: Horgony konfigurációja
      description: Azt jelzi, hogy a felfüggesztési rendszer egyetlen központi rögzítési
        pontot vagy több független rögzítési pontot használ-e, ami befolyásolja a
        gyakorlatok változatosságát és a beállítás összetettségét.
    animal_raising_method:
      name: Állattenyésztési módszer
      description: Leírja a forrásállaton alkalmazott gazdálkodási vagy állattenyésztési
        gyakorlatokat.
    animal_species:
      name: Állatfajok
      description: Meghatározza a plüssállat által képviselt állatot vagy élőlényt
        (pl. medve, nyuszi, dinoszaurusz).
    animal_trap_jaw_style:
      name: Állatcsapda-állkapocs stílus
      description: A csapdapofák konfigurációja, amely befolyásolja a tartóerőt és
        az állatok jólétét.
    animal_trap_type:
      name: Állatcsapda típusa
      description: Osztályozza a csapda mechanikai stílusát/kialakítását, lehetővé
        téve a vásárlók számára, hogy gyorsan megtalálják azt a csapdázási módszert,
        amelyre szükségük van, vagy amelyet a szabályozás lehetővé tesz.
    ankle_collar_style:
      name: Bokagallérstílusú
      description: Leírja a cipő bokagallérjának stílusát vagy felépítését, például
        mély vágású, kereskedői azonosítószám-szabású, magas szabású, zoknigallér
        vagy fűző nélküli, amelyek hatással vannak a támogatásra, az illeszkedésre
        és az esztétikára.
    ankle_guard_protection_level:
      name: Bokavédő védelmi szintje
      description: Értékeli a bokavédő által nyújtott ütésvédelem teljes mértékét.
    ankle_strap_padding_type:
      name: Bokapánt margó típusú
      description: Leírja a pánt belsejében használt párnázóanyagot vagy bélést, amely
        befolyásolja a kényelmet.
    ankle_strap_type:
      name: Bokapánt típusa
      description: A snowboardkötés bokapántjának konstrukcióját vagy kialakítását
        osztályozza.
    ant_farm_habitat_medium_type:
      name: Hangyafarmélőhely közepes típusú
      description: Meghatározza a hangyafarm által biztosított vagy megkövetelt elsődleges
        alagútfúró/megfigyelő közeget.
    ant_farm_kit_contents:
      name: Hangyafarmkészlet tartalmai
      description: Meghatározza, hogy a hangyafarmkészlet milyen összetevőket tartalmaz
        (pl. élőhelytartály, homok/gél, hangya-utalvány, etetőeszközök).
    ant_farm_lighting_type:
      name: Hangyafarm-világítás típusa
      description: Meghatározza a megfigyeléshez használt beépített világítás/megvilágítás
        típusát (ha van ilyen).
    antenna_fit_type:
      name: Antennacsatlakozó típusa
      description: Milyen típusú antennához tervezték az antennagömböt.
    anti_caking_agent:
      name: Csomósodásgátló szer
      description: Meghatározza a csomósodás megakadályozására hozzáadott csomósodásgátló
        típusát, amely információ fontos az allergia szempontjából és a recept pontossága
        szempontjából.
    anti_g_suit_bladder_material:
      name: Anti-G ruha gumikamra anyaga
      description: A szkafander belsejében található felfújható kamrákhoz használt
        anyag; több anyag felhasználása esetén az összes megfelelőt felsorolja.
    anti_g_suit_connector_type:
      name: Szkafander csatlakozójának típusa
      description: Meghatározza a repülőgéphez vagy szabályozóhoz való csatlakozáshoz
        használt levegő-/nyomástömlő-csatlakozó stílusát/szabványát.
    anti_g_suit_inflation_method:
      name: Szkafander felfújási módja
      description: Azt jelzi, hogyan vannak nyomás alatt a ruha tömlői a G-védelem
        biztosítása érdekében.
    anti_g_suit_size_system:
      name: Szkafander méretrendszere
      description: Méretezési szabvány, amely az öltöny méretének/illeszkedési rendszerének
        meghatározására szolgál.
    anti_reverse_type:
      name: Visszaforgásgátló típus
      description: Meghatározza a visszaforgásgátló mechanizmus típusát, amely hatással
        van a horogbeállításokra és a visszarúgásra.
    anti_theft_feature:
      name: Lopásgátló funkció
      description: Azt jelzi, hogy a tartó biztosít-e lopásgátló funkciót, például
        zárható rögzítőelemeket vagy biztonsági övet.
    antique_gun_ignition_system:
      name: Antik lőfegyvergyújtó rendszer
      description: Meghatározza az antik lőfegyver által használt történelmi tüzelési/gyújtási
        rendszert.
    apple_variety:
      name: Almafajta
      description: Meghatározza az alma fajtáját vagy változatát (pl. Gala, Fuji,
        Granny Smith), így segít a vásárlóknak az íz, az állag és a felhasználási
        lehetőségek alapján választani.
    applique_edge_finish:
      name: Applikációval díszített szegély
      description: Leírja az élek kidolgozását, hatással van a kinézetre és a rojtosodásállóságra.
    arbor_type:
      name: Befogó típusa
      description: Az orsót az orsótengely kialakítása szerint osztályozza, ami befolyásolja
        a zsinórbehúzási sebességet, a behúzási kapacitást és a zsinórmemóriát.
    archery_accessory_type:
      name: Íjászati kiegészítő típusa
      description: Meghatározza az íjászeszközökhöz szánt kiegészítő típusát, így
        a vásárló gyorsan szűrheti a termékeket.
    archery_part_type:
      name: Íjászati tartozék típusa
      description: Azonosítja az értékesített hardvert vagy cserealkatrészt (pl. emelő,
        ág, ideg), lehetővé téve a pontos szűrést a kategóriafa felrobbantása nélkül.
    archery_range_accessory_type:
      name: Íjászpálya-kiegészítő típusa
      description: Osztályozza az íjászpályán használt kiegészítők típusát, lehetővé
        téve a vásárlók számára, hogy gyorsan szűrjék a kívánt kiegészítőket.
    archery_target_features:
      name: Íjászati célpontok jellemzői
      description: Olyan speciális teljesítmény- vagy kényelmi funkciókat sorol fel,
        amelyeket más jellemzők nem fednek le (pl. önjavító hab, hordozófogantyú).
    archery_tool_type:
      name: Íjászeszköz típusa
      description: Osztályozza az íjászeszköz vagy felszerelés egy adott típusát.
    armband_features:
      name: Karszalag jellemzői
      description: Listába szedi a karszalagot kiegészítő speciális funkcionális vagy
        vizuális jellemzőket.
    armguard_style:
      name: Karvédő stílusa
      description: Meghatározza a karvédő kialakítását vagy formáját, betekintést
        nyújtva a kialakítás jellemzőibe, valamint a hagyományos és a modern stílusok
        közötti különbségekbe.
    armor_protection_type:
      name: Páncélos védelem típusa
      description: A jármű páncélrendszere által nyújtott védelem típusa.
    armrest_adjustability:
      name: Kartámasz állíthatósága
      description: Meghatározza a szék karfáinak méretállíthatóságát és konfigurációját
        (pl. fix, 2D, 3D, felhajtható).
    armrest_type:
      name: Kartámasz típusa
      description: Leírja a karfák meglétét és állíthatóságát a széken (pl. nincs
        karfa, rögzített, állítható, levehető).
    arrow_bolt_point_type:
      name: Nyíl/csavarvég típusa
      description: Meghatározza a nyílvesszőre vagy számszeríj vesszőre szerelt hegy
        vagy csúcs stílusát.
    arrow_component_type:
      name: Nyíl alkotóelemének típusa
      description: Besorolja a nyílvessző konkrét alkatrészét vagy tartozékát (betét,
        burkolat, persely, ragasztó stb.), így a vásárló szűrni tudja a tételeket
        anélkül, hogy tucatnyi extra alkategóriára lenne szüksége.
    arrow_containment_level:
      name: Nyíl zártsági szintje
      description: Meghatározza, hogy a nyíl teljes egészében, részben vagy egyáltalán
        nem szerepel-e a párnában.
    arrow_fletching_orientation:
      name: Nyíl tollazatának iránya
      description: Meghatározza a tollazat szárny- vagy eltolt irányát (pl. bal szárny,
        jobb szárny, spirális), amely meghatározza a nyíl forgásirányát.
    arrow_nock_groove_size:
      name: Nyílvessző nockjának horonymérete
      description: Megadja a nock hornyának/torkának méretbesorolását, meghatározva
        a különböző íjhúr-átmérőkkel való kompatibilitást.
    arrow_nock_type:
      name: Nyílbevágás típusa
      description: A nyíl bevágásának/stílusának kialakítása, amely kapcsolódik az
        ideghez.
    arrow_rest_style:
      name: Nyílpárnastílus
      description: Meghatározza a nyílpárna funkcionális stílusát/mechanizmusát (pl.
        lecsúszó, penge, szőrszálas). A stílus határozza meg, hogy a párna hogyan
        támogatja, tartalmazza és engedi el a nyilat, és ez az elsődleges módja annak,
        hogy a vásárlók megkülönböztethessék a termékeket.
    arrow_shaft_compatibility:
      name: Nyíltengely kompatibilitása
      description: Azt a nyíltengely-/perselyszabványt jelzi, amelyhez a megvilágított
        bedugó illeszkedik (pl. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Művészeti/kézműves eszköz hegyének stílusa
      description: A munkahegy formáját/profilját írja le (pl. hegyes vagy lekerekített
        gömb), jelezve az általa létrehozott dombornyomási jelek típusát.
