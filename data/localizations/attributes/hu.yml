    warp_beam_type:
      name: Vetüléktartó tengely típusa
      description: Meghatározza a szövőszékhez mellékelt vagy arra felszerelt lánchenger
        konfigurációját (a szövőszékhez mellékelt henger beállítása).
    washability:
      name: Moshatóság
      description: Jelzi, hogy a ragasztó felvitel után vízzel letisztítható-e és/vagy
        kimosható-e.
    watch_band_design:
      name: Óraszíj kialakítása
      description: Leírja az óraszíj szerkezeti stílusát vagy kialakítását (pl. NATO,
        Milanese, Link).
    watch_movement:
      name: Óraszerkezet
      description: Meghatározza az órát működtető szerkezetet, amely kulcsfontosságú
        tényező az egyes modellek megkülönböztetésében.
    water_activation:
      name: Vízre aktiválódás
      description: A jeladó képes-e automatikusan aktiválódni vízbe merüléskor (gyakori
        az I/II. kategóriájú EPIRB-eknél).
    water_chamber_configuration:
      name: Vízkamra konfigurációja
      description: Leírja a matrac belső kamraelrendezését (pl. egy- vagy kétkamrás
        kialakítás), ami befolyásolja az alátámasztást, a hőmérséklet-szabályozást
        és a partner esetleges zavarását.
    water_dispensing_mechanism:
      name: Vízadagoló mechanizmus
      description: Meghatározza, hogyan távozik a víz az egységből, például csapokon,
        szórófejeken keresztül vagy a gravitáció hatására.
    water_exposure_protection_level:
      name: Vízbehatás elleni védelmi szint
      description: A termék víz elleni védelmi szintjét jelzi vízzel való érintkezés
        esetén (pl. fröccsenő víz vs. ideiglenes bemerítés). Használja a behatolás
        elleni védelem (IP) besorolást, ha rendelkezésre áll hivatalos IP-kód.
    water_fed_design:
      name: Vízzel való használat
      description: Jelzi, hogy a kefe használható-e folyóvízzel egy átfolyós nyélen
        vagy tömlőcsatlakozáson keresztül.
    water_gun_features:
      name: Vízipisztoly funkciói
      description: A vízipisztoly jelentősebb funkcionális jellemzői és beépített
        funkciói.
    water_gun_operating_mechanism:
      name: Vízipisztoly működési mechanizmusa
      description: Hogyan helyezi nyomás alá és fújja ki a vizet a vízpisztoly használat
        közben.
    water_gun_spray_pattern:
      name: Vízipisztoly szórásképe
      description: A fúvóka által a lövés során kibocsátott vízsugár típusa.
    water_heating_method:
      name: Vízmelegítés módja
      description: Leírja, hogy a víz fel van-e melegítve használat előtt, és ha igen,
        hogyan – például napenergia-abszorpció, propánégők, elektromos fűtőelemek,
        akkumulátoros fűtés, hőtartó szigetelés vagy fűtetlen.
    water_mattress_construction:
      name: Vízmatrac szerkezete
      description: Meghatározza a vízmatrac felépítését (pl. kemény- vagy puha oldalú),
        ami meghatározza az ágykeret-kompatibilitást és az általános érzetet.
    water_play_features:
      name: Vízi játék funkciói
      description: A víziparkhoz/vízicsúszdához mellékelt vízi tevékenységi elemek.
    water_polo_competition_approval:
      name: Vízilabdaverseny jóváhagyása
      description: Azt a szabályozó testületet vagy versenyszintet azonosítja, amelyre
        a labdát hivatalosan jóváhagyták vagy hitelesítették.
    water_polo_goal_type:
      name: Vízilabda-kapu típusa
      description: A kapu szerkezeti vagy rögzítési konfigurációjának besorolása (pl.
        úszó, medencepartra szerelt, hordozható).
    water_pump_drive_type:
      name: Vízszivattyú-hajtástípus
      description: Meghatározza, hogyan van meghajtva/működtetve a jármű hűtőrendszerének
        vízpumpája.
    water_pump_housing_material:
      name: Vízszivattyúház anyaga
      description: A vízszivattyú házának/testének anyaga.
    water_pump_impeller_material:
      name: Vízszivattyú járókerék anyaga
      description: Meghatározza a vízszivattyú járókerekének anyagát (belső rotor/lapát,
        amely a hűtőfolyadékot mozgatja).
    water_pump_mounting_type:
      name: Vízszivattyú-rögzítés típusa
      description: Meghatározza a vízpumpa rögzítési/kialakítási stílusát a motorhoz
        való illeszkedés érdekében (pl. csavarozható házas vagy patronos/betétes).
    water_purification_method:
      name: Víztisztítási mód
      description: Azonosítja azt az elsődleges mechanizmust, amellyel a termék ihatóvá
        teszi a vizet a terepen (pl. szivattyús adagolás, gravitációs adagolás vagy
        UV-fény).
    water_resistance:
      name: Vízállóság
      description: Jelzi a biztosított időjárás elleni védelem mértékét. Lehet például
        vízálló vagy vízlepergető.
    water_resistance_level:
      name: Vízállósági szint
      description: Azt jelzi, hogy a textil vízlepergető-e, és ha igen, milyen mértékben
    water_resistance_rating_case_protection_level:
      name: Vízállósági besorolás (doboz védelmi szint)
      description: Jelzi a gurulós koffer által biztosított vízállóság/védelem szintjét
        (marketingszinten, nem elektronikai IP-védettségként). Lehet például vízlepergető
        vagy vízálló.
    water_rocket_kit_items_included:
      name: Vízirakéta-készlet tartozékai
      description: A termékcsomagban található főbb komponensek.
    water_rocket_propulsion_type:
      name: Vízirakéta hajtástípusa
      description: A rakéta Launch használt elsődleges meghajtás/energiaforrás.
    water_rocket_recovery_system:
      name: Vízrakéta mentőrendszere
      description: A rakéta kilövés utáni visszaszerzésére szolgáló módszer.
    water_ski_base_design:
      name: Vízisí talpkialakítása
      description: Meghatározza a vízisí alsó profilját, ami befolyásolja az irányíthatósági
        jellemzőket.
    water_ski_fin_type:
      name: Vízisí-uszony típusa
      description: Meghatározza a vízisí uszonyának konfigurációját, ami befolyásolja
        az iránytartást és a manőverezhetőséget.
    water_source:
      name: Vízforrás
      description: Azonosítja a víz származási helyét a szénsavasítás előtt.
    water_sports_safety_standard:
      name: Vízi sportok biztonsági szabványa
      description: Felsorolja azokat a hivatalos biztonsági vagy felhajtóerő-szabványokat,
        amelyeknek a termék megfelel (pl. CE EN 1385 sisakokhoz, ISO 12402-5 felhajtást
        segítő eszközökhöz, USCG III. típus).
    water_table_feature_set:
      name: Vízi játszóasztal funkciói
      description: Kiemeli a vízi játszóasztal beépített játékfunkcióit. Ilyenek például
        a vízesések, spriccelők, pumpák és többszintes medencék.
    water_table_items_included:
      name: A talajvíz benne van az árban
      description: Meghatározza, hogy milyen tartozékok járnak a vízi játszóasztal-készlethez
        (pl. hajók, poharak, tölcsérek, figurák).
    water_table_water_source_type:
      name: Vízasztal vízforrásának típusa
      description: Meghatározza, hogyan kell feltölteni a vízi játszóasztalt, vagy
        hogyan történik annak vízellátása.
    waterbed_stabilization_level:
      name: Vízágy stabilizációs szintje
      description: Jelzi a vízágy matraca által biztosított hullám- vagy mozgáscsillapítás
        mértékét.
    watercolor_ink_water_resistance_after_drying:
      name: Akvarelltinta vízállósága (száradás után)
      description: Jelzi, hogy az akvarellfesték száradás után vízlepergetővé/vízállóvá
        válik-e (a gyártó állítása szerint).
    watercraft_care_application_area:
      name: Vízijármű-ápolási alkalmazási terület
      description: Jelzi a vízi jármű azon fő területét vagy alkatrészét, amelyen
        a terméket használni tervezik.
    watercraft_drive_mechanism:
      name: Vízi jármű hajtásmechanizmusa
      description: Leírja a konkrét beépített vagy támogatott fedélzeti hajtómű-mechanizmust.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Vízi jármű üzemanyagtartály-jeladó mintázata
      description: Meghatározza az üzemanyagtartály-jeladók és a kompatibilis mérőműszerek
        rögzítési mintázatát/szabványát (pl. gyakori tengeri csavarminták).
    watercraft_fuel_tank_shape:
      name: Vízi jármű üzemanyagtartályának alakja
      description: Leírja az üzemanyagtartály általános fizikai formáját a helyigény/beépítés
        tervezésének támogatásához.
    watercraft_hull_material:
      name: Vízijármű-hajótest anyaga
      description: Meghatározza a hajótest építésének elsődleges anyagát.
    watercraft_ignition_part_voltage:
      name: Vízi jármű gyújtóalkatrészének feszültsége
      description: A gyújtóegység névleges feszültsége/követelménye (ha alkalmazható),
        például 12 V-os rendszerek.
    watercraft_impeller_material_grade:
      name: Vízijármű-járókerék anyagminősége
      description: Meghatározza a vízijármű járókerekének anyagát (pl. neoprén, nitril,
        bronz).
    watercraft_lighting_certification_compliance:
      name: Vízi jármű világítási tanúsítványa/megfelelősége
      description: Jelzi azt a hatósági/szabványügyi megfelelőséget, amely szerint
        a lámpát tengeri használatra hitelesítették (pl. USCG/ABYC/COLREGs megfelelőség).
    watercraft_motor_mount_adjustment_features:
      name: Vízi jármű motortartójának beállítási funkciói
      description: A motortartó állítási lehetőségei (pl. döntés, emelés, csúsztatás),
        amelyek befolyásolják a használhatóságot és az illeszkedést.
    watercraft_piston_part_type:
      name: Vízi jármű dugattyúalkatrészének típusa
      description: Azonosítja, hogy az ismertető melyik dugattyúval kapcsolatos komponenst
        írja le.
    watercraft_propeller_blade_rake:
      name: Vízi jármű propellerének dőlésszöge
      description: Meghatározza a lapát dőlésszögét (a lapát agyhoz viszonyított szöge),
        amely befolyásolja az orrfelhajtást és a teljesítményt
    watercraft_propeller_rotation_direction:
      name: Vízi jármű propellerének forgásiránya
      description: Jelzi a hajtáslánc-kompatibilitáshoz szükséges hajócsavar-forgásirányt/irányultságot
        (pl. jobbos/standard vs. balos/ellentétes forgásirányú).
    watercraft_pump_stage_impeller_role:
      name: Vízi jármű szivattyúfokozat/vízpumpalapát szerepköre
      description: Azonosítja, hogy a vízpumpalapát egy adott szivattyúfunkcióra készült-e
        (pl. nyersvíz-/tengervíz-szivattyú, hűtőfolyadék keringtetése, sugárszivattyú).
    watercraft_registration_status:
      name: Vízi jármű regisztrációs állapota
      description: Jelzi, hogy a vitorlás rendelkezik-e tulajdonjogi és/vagy forgalmi
        dokumentációval.
    watercraft_safety_equipment_activation_type:
      name: Vízi jármű biztonsági berendezéseinek aktiválási típusa
      description: A biztonsági eszköz aktiválásának elsődleges módszere (vészjeladók/MOB-riasztók/PLB-k
        esetén). Ez nem a felfújást jelenti.
    watercraft_steering_cable_core_material:
      name: Vízi jármű kormánykábelének magjának anyaga
      description: Meghatározza az erőhatást továbbító belső kábel/mag anyagát.
    watercraft_steering_cable_hardware_included:
      name: Vízi jármű kormánykábeléhez mellékelt eszközök
      description: Meghatározza, hogy milyen rögzítőelemek és tartozékok járnak a
        kormánykábelhez.
    watercraft_steering_cable_system_type:
      name: Vízi jármű kormánykábeles rendszerének típusa
      description: Meghatározza a kormányrendszer architektúráját, amelyhez a kábelt
        tervezték (pl. forgó, állvány).
    watercraft_steering_wheel_hub_bore_type:
      name: Vízijármű kormánykerék agy/gyűrű típusa
      description: Meghatározza a középső rögzítési/furat-illesztési stílust (pl.
        kúpos, bordás), ahol a kerék az agyhoz vagy az adapterhez csatlakozik.
    watercress_variety:
      name: Vízitorma-fajta
      description: Azonosítja az értékesített zsázsa konkrét fajtáját vagy típusát.
    waterproof_level:
      name: Vízállósági szint
      description: A lábbeli vízvédelmi szintjét jelzi, beleértve a garanciával alátámasztott
        vízállósági igényeket is.
    wax_blend_composition:
      name: Viaszkeverék összetétele
      description: Felsorolja a termékben kevert viaszanyagokat és/vagy a forgalmazott
        keveréktípust.
    wax_coat_type:
      name: Viaszbevonat típusa
      description: Azt jelzi, hogy a viaszt alapozóként, fedőrétegként vagy univerzális/egyrétegű
        formulaként szánják-e.
    wax_hardness:
      name: Viasz keménysége
      description: Jelzi a viasz relatív keménységét, ami befolyásolja a tartósságot
        és a csúszást a különböző hótípusokon.
    wax_physical_form:
      name: Viasz fizikai formája
      description: A nyers gyertyaviasz fizikai formáját/Shapes jelzi. Supply hely.
    wax_recommended_candle_application:
      name: Viasz ajánlott gyertya alkalmazás
      description: Azt az whitespace-mentes elsődleges gyertyastílus(oka)t jelzi,
        amelyhez a viaszt kifejlesztették.
    wax_tackiness_level:
      name: Viasz ragadási szintje
      description: Leírja a viasz által a tollon (pengén) biztosított tapadás mértékét.
    weapon_system_integration:
      name: Fegyverrendszer-integráció
      description: Azt jelzi, hogy a jármű rendelkezik-e integrált fegyverrendszerekkel
        vagy rögzítésekkel.
    weather_suitability:
      name: Időjárásra való alkalmasság
      description: Azt a környezeti állapotot jelzi, amelyre a kesztyűt tervezték,
        például hideg vagy nedves időben való játékra.
    weave_finish:
      name: Szövés/felületkezelés
      description: Leírja az elsődleges szövetmintát vagy felületi kidolgozást, amely
        meghatározza a nyakkendő textúráját és megjelenését.
    weave_style:
      name: Szövet stílusa
      description: Meghatározza a panamakalap készítéséhez használt hagyományos szövésmintát,
        amely befolyásolja a légáteresztő képességet, a rugalmasságot, a megjelenést
        és az árat.
    weave_type:
      name: Szövés típusa
      description: Azonosítja a szövet szövési/szerkezeti stílusát (kereskedelmi szövésnevet),
        amely befolyásolja a textúrát, a megjelenést és az esést.
    weaving_beater_edge_type:
      name: Szövőszék-verőléc élének típusa
      description: Leírja a lapos ütő vetülékfonallal érintkező munkaél-profilját
        (pl. egyenes vagy fogazott).
    weaving_beater_style:
      name: Szövőütő stílusa
      description: Azonosítja a lapos szövőütő funkcionális stílusát vagy formátumát.
    weaving_shuttle_tip_style:
      name: Szövővetélő hegyének stílusa
      description: Meghatározza a vetélő elülső hegyének/orrának kialakítását, ami
        befolyásolja, hogyan halad át a szádon, és mekkora a valószínűsége a szálak
        beakadásának.
    weaving_shuttle_use_case:
      name: Szövővetélő felhasználási területe
      description: Meghatározza azt a tervezett szövési alkalmazást, amelyre a vetélőt
        tervezték vagy optimalizálták.
    webbing_construction_type:
      name: Heveder kialakítás típusa
      description: A heveder fizikai szövési vagy fonási stílusát írja le, amely befolyásolja
        a kezelhetőséget, a szakítószilárdságot és a rendeltetésszerű használatot.
    webbing_design:
      name: Heveder kialakítása
      description: Leírja az ujjak közötti úszóhártya stílusát, ami befolyásolja az
        ellenállásos edzést és a hajtóerőt.
    weight_adjustability:
      name: Súly állíthatósága
      description: Leírja, hogy a termék ellenállása változtatható-e a felhasználó
        által (pl. lapsúlyos vagy felpakolható), vagy egyetlen fix súlyra van korlátozva.
    weight_integration_system:
      name: Súlyintegrációs rendszer
      description: A ballasztsúlyok BCD-be integráltságát jelzi (pl. levehető súlyzsebek,
        nincs, opcionális kiegészítő).
    weight_plate_compatibility:
      name: Súlytárcsa-kompatibilitás
      description: Meghatározza, hogy a gép milyen átmérőjű súlytárcsákat fogad be
        (olimpiai, szabványos vagy mindkettő).
    weight_plate_style:
      name: Súlytárcsa stílusa
      description: Osztályozza a súlytárcsa kialakítását vagy típusát (pl. olimpiai,
        bumper, lapsúly) a gyors kompatibilitási szűrés érdekében.
    weightlifting_belt_style:
      name: Súlyemelő öv stílusa
      description: Kategorizálja az öv általános kialakítását vagy célvezérelt konfigurációját
        (pl. csatos öv, húzódzkodó öv, formázott öv).
    weightlifting_federation_certification:
      name: Súlyemelő szövetségi tanúsítvány
      description: A termék hivatalos jóváhagyása vagy megfelelősége az erőemelő-szövetségek,
        például az IPF vagy az IWF által.
    wetsuit_boot_height:
      name: Neopréncsizma magassága
      description: Besorolja a csizma magasságát/szabását a lábon, Influence a lefedettséget,
        a mobilitást és a vízbehatolást.
    wetsuit_entry_system:
      name: Búvárruha felvételére szolgáló rendszer
      description: Leírja a búvárruhába való belebújáshoz használt nyílás/cipzárrendszer
        típusát és elhelyezkedését.
    wetsuit_seam_construction:
      name: Búvárruha varrásszerkezete
      description: Meghatározza, hogyan készülnek és vannak lezárva a varrások, ami
        befolyásolja a hőtartást, a rugalmasságot és a tartósságot.
    wheat_product_form:
      name: Búza termék formája
      description: Meghatározza a búza kifejezés fizikai vagy feldolgozott formáját.
    wheel_arrangement:
      name: Kerékelrendezés
      description: Meghatározza a gőzmozdony kerékelrendezését (Whyte-jelölés), amely
        egy meghatározó jellemző és gyakori gyűjtői/keresési kifejezés.
    wheel_brake_type:
      name: Kerékfék típusa
      description: adat / részlet a kosár kerekein vagy görgőin biztosított fékezési
        konfiguráció.
    wheel_chock_grip_features:
      name: Kerék tapadási jellemzői
      description: Olyan tapadási és tapadásbiztosítási kialakítási jellemzők, amelyek
        javítják a tartóerőt a felületeken és a gumiabroncsokkal szemben.
    wheel_cleaner_acidity_ph_category:
      name: Keréktisztító savasság/pH-kategóriája
      description: Jelzi, hogy a keréktárcsa tisztító savas, semleges vagy lúgos (és
        opcionálisan, hogy piac, mint pH-egyenleg).
    wheel_cleaner_formula_type:
      name: Keréktisztító formula típusa
      description: Keréktisztítók és kapcsolódó mosóoldatok esetében jelzi a termék
        formulájának elsődleges kategóriáját (pl. savbázisú, savmentes, pH-semleges/kiegyensúlyozott,
        vagy vasreaktív).
    wheel_construction_type:
      name: Kerékkonstrukció típusa
      description: Meghatározza a kerék gyártási/felépítési módszerét.
    wheel_contaminant_target:
      name: Kerékszennyeződési célérték
      description: Meghatározza azokat az elsődleges szennyeződéstípusokat, amelyek
        eltávolítására a tisztítószert tervezték.
    wheel_core_type:
      name: Kerékmag típusa
      description: Leírja a kerékmag szerkezeti stílusát, ami befolyásolja a súlyt,
        a merevséget és az energiaátvitelt.
    wheel_cylinder_inlet_port_thread_standard:
      name: Kerékfékhenger bemeneti nyílásának menetszabványa
