      name: MOLLE-kompatibilitás
      description: Megadja, hogy a mellény rendelkezik-e MOLLE/PALS hevederzettel
        moduláris tasakok és kiegészítők rögzítéséhez.
    motor_belt_type:
      name: Motorszíj típusa
      description: Meghatározza a futópad hajtásrendszerében használt szíj kialakítását/profilját.
    motor_configuration:
      name: Motorkonfiguráció
      description: Jelzi, hogy a roller hány független hajtómotort használ.
    motor_mounting_configuration:
      name: Motor rögzítési konfiguráció
      description: Leírja a motor felszerelésének/kialakításának módját a robogókonverziós
