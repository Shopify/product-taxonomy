    belt_buckle_type:
      name: Övcsat típusa
      description: Bemutatja az öv csatmechanizmusát, vagy annak kialakítását.
    beret_style:
      name: Beretstílus
      description: Azonosítja a svájcisapka mintáját vagy kulturális változatát.
    berry_species:
      name: Bogyófajták
      description: A kifejezésben szereplő bogyófajtát jelzi, így a vásárló gyorsan
        szűrhet a kívánt bogyóra.
    beta_casein_variant:
