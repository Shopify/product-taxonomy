      name: Hibrid teherautó fülke típusa
      description: Meghatározza a teherautó fülkéjének konfigurációját, amely befolyásolja
        az ülőhelyek számát és a belső teret.
    hydration_bag_features:
      name: Hidratáló táska jellemzői
      description: Kiemeli a víztartályokra jellemző fő formatervezési vagy funkcionális
        jellemzőket.
    hydration_belt_features:
      name: Folyadékhordó öv jellemzői
      description: Felsorolja a fő beépített funkciókat, amelyek fokozzák a hidratáló
        öv használhatóságát, biztonságát vagy kényelmét.
    hydration_bladder_compatibility:
      name: Hidratáló tasak kompatibilitása
      description: Jelzi, hogy a mellény tartalmaz-e vagy támogat-e hidratálótasak-rendszert.
    hydration_mouthpiece_style:
      name: Hidratáló szájrész stílusa
      description: Meghatározza a hidratáló rendszer szájrészének vagy szelepének
        kialakítását vagy funkcionális stílusát, segítve a vásárlót a kívánt ivófelület
        kiválasztásában és a kompatibilitás biztosításában.
    hydration_pack_style:
      name: Hidratáló csomag stílusa
      description: Meghatározza a hidratáló csomag szerkezeti stílusát, például hátizsák
        vagy mellény, az illeszkedés és a használat-doboz szűrés elősegítése érdekében.
    hydration_system_insulation:
      name: Hidratáló rendszer szigetelése
      description: Jelzi, hogy a tartály és/vagy az ivócső szigetelt-e, ami segít
        fenntartani a folyadék hőmérsékletét meleg vagy hideg körülmények között.
    hydration_valve_type:
      name: Hidratáló szelep típusa
      description: Meghatározza a rendszerhez vagy a palackhoz mellékelt ivószelep
        vagy szájrész típusát, beleértve a szokásos harapószelepes és nagy áramlású
        fúvókás kiviteleket.
    hydraulic_fluid_type:
      name: Hidraulikafolyadék típusa
      description: Meghatározza, hogy milyen típusú fékfolyadékot kell használni a
        hidraulikus kerékpárfék karjához. Ez az információ kritikus fontosságú a karbantartás
        és a biztonság szempontjából.
    hydrogenation_level:
      name: Hidrogénezettségi szint
      description: Azt jelzi, hogy a zsír nem hidrogénezett, részlegesen hidrogénezett
        vagy teljesen hidrogénezett, ami hatással van a transzzsír-tartalomra és a
        sütési teljesítményre.
    hydrophobicity_level:
      name: Hidrofóbicitási szint
      description: A termék által biztosított víztaszító/vízlepergető tulajdonságok
        mértékét jelzi.
    ice_cream_format:
      name: Fagylalt formátuma
      description: A fagylalttermék fizikai formáját vagy megjelenését írja le (pl.
        pint, tábla, mochi).
    ice_skate_sharpener_type:
      name: Korcsolyaélező típusa
      description: Az élezőgép általános kialakítását vagy formátumát osztályozza
        (kézi kő, elektromos gép, sablon stb.).
    ice_temperature_suitability:
      name: Jéghőmérséklet-megfelelőség
      description: Jelzi azt a jéghőmérséklet-tartományt, amelyre a jégkorong-viaszot
        kifejlesztették, és amely befolyásolja a termék teljesítményét és hótaszító
        tulajdonságait.
    icing_sugar_variety:
      name: Porcukor fajta
      description: A porcukor összetételét vagy funkcionális típusát osztályozza (pl.
        fondant, nem olvadó hópor, színes, ízesített).
    ignition_coil_configuration:
      name: Gyújtótekercs konfiguráció
      description: Meghatározza a gyújtótekercs alakját (egy tekercs/gyújtógyertyára
        szerelt, több toronytekercs hengerszám szerint, tekercssín/kazetta vagy elosztó
        típusú).
    ignition_lead_compliance_standard:
      name: A gyújtáskábelekre vonatkozó előírások
      description: Az a hivatalos ipari szabvány vagy tanúsítás (pl. SAE J2031, ISO
        3808), amelynek a gyártó állítása szerint a gyújtáskábel(ek) megfelel(nek).
    ignition_lead_insulation_material:
      name: Gyújtáskábel szigetelőanyaga
      description: A gyújtáskábel elsődleges szigetelése/burkolata (a kábel külső
        szigetelése).
    ignition_lead_set_type:
      name: Gyújtáskábel készlet típusa
      description: Annak meghatározása, hogy a termék egy darab gyújtáskábel vagy
        egy teljes készlet, és mire szolgál a készlet.
    ignition_lead_terminal_type:
      name: A gyújtáskábel csatlakozójának típusa
      description: A gyújtáskábel végein alkalmazott csatlakozó típus (pl. gyújtógyertya-csatlakozó
        és tekercs/elosztó-csatlakozó típus).
    illumination_type:
      name: Megvilágítás típusa
      description: Meghatározza, hogy az éjszakai játék során a labda világít-e, és
        ha igen, milyen módon (pl. foszforeszkáló fény, ütközéskor kigyulladó LED).
    immobilizer_installation_type:
      name: Indításgátló beépítési típusa
      description: Jelzi, hogy az indításgátló hogyan van felszerelve vagy csatlakoztatva
        a járműhöz.
    immobilizer_unlock_method:
      name: Indításgátló feloldási módja
      description: Meghatározza az indításgátló élesítésének/hatástalanításának vagy
        feloldásának módját.
    impact_protection_certifications:
      name: Ütésállósági tanúsítványok
      description: Megnevezi azokat a konkrét biztonsági szabványokat, amelyeket a
        védőbetét teljesít vagy meghalad.
    impact_protection_level:
      name: Ütésvédelem szintje
      description: Meghatározza a sportvédő által biztosított ütésvédelmi szintet
        vagy technológiát.
    impact_protection_rating:
      name: Ütésvédelmi besorolás
      description: Meghatározza a szabványok (pl. EN 1621-1 1. szint, EN 14120 2.
        szint) szerinti tanúsított ütésvédelmi szintet, így segítve a kerékpárosokat
        a magasabb szintű védelmet nyújtó termékek kiválasztásában.
    impact_surface_material:
      name: Ütőfelület anyaga
      description: Leírja a biztonság és az érintésérzet szempontjából legfontosabb
        ütőfelület anyagát (pl. hab, műanyag).
    incense_base_material:
      name: Füstölő alapanyaga
      description: Elsődleges alapanyag/kötőanyag, amelyet a készletben lévő füstölő
        (poralap) készítéséhez használnak.
    incense_making_method:
      name: Füstölőkészítési módszer
      description: A készlet által támogatott tervezett készítési folyamat.
    incense_tool_type:
      name: Füstölőeszköz típusa
      description: Meghatározza, hogy milyen típusú füstölő-készítő eszközről van
        szó (a füstölő formázására, kimérésére, préselésére, keverésére vagy szárítására
        szolgál).
    incline_adjustment_type:
      name: Dőlésszög-beállítás típusa
      description: Leírja, hogyan változtatható (vagy változtatható-e) a dőlésszög
        edzés közben.
    included_accessories:
      name: Mellékelt tartozékok
      description: A csomag tartalma olyan kiegészítőket tartalmazott, mint pótfejek/bitek,
        tárolódoboz, töltőkábel vagy hálózati adapter.
    included_case_type:
      name: Mellékelt tok típusa
      description: A basszusszaxofonhoz mellékelt hordtáska/tároló doboz típusa (ha
        van).
    included_components:
      name: Mellékelt alkatrészek
      description: Felsorolja a csomag tartalmát (hasznos szerszámkészletek és csomagok
        esetén).
    included_fastener_components:
      name: Mellékelt rögzítőelemek
      description: Meghatározza, hogy a termék kapcsos-szemcsatos készlet, csak kapcsos,
        csak szemcsatos, vagy egy ehhez kapcsolódó ruhadarab-záróelem-változat.
    included_hydration_vessel_type:
      name: Mellékelt hidratáló edény típusa
      description: Meghatározza az övvel együtt szállított vagy az öv által rögzíthető
        folyadékpótló tartály típusát.
    included_items_woodwind_instrument:
      name: Mellékelt tételek (fafúvós hangszer)
      description: Felsorolja a basszus szaxofon csomagban általában megtalálható
        kiegészítőket.
    included_materials:
      name: Mellékelt anyagok
      description: Jelzi, hogy a szabásminta megvásárlásához milyen alkatrészek tartoznak
        (csak a szabásminta vagy a szabásminta + anyagok).
    included_mounting_accessories:
      name: Mellékelt szerelési tartozékok
      description: Felsorolja a kihangosítóhoz mellékelt szerelési/rögzítési tartozékokat.
    included_pump_type:
      name: Mellékelt szivattyú típusa
      description: Meghatározza a légágyhoz mellékelt vagy beépített szivattyú típusát.
    included_scraper_implement_type:
      name: Mellékelt kaparóeszköz típusa
      description: Jelzi, hogy milyen játékeszközök tartoznak a zenei kaparóhoz (pl.
        kaparópálca, drótkefe).
    indicator_design:
      name: Kapásjelző kialakítása
      description: A horgászati kapásjelző fizikai formáját vagy stílusát osztályozza.
    indicator_functions_tracked:
      name: Nyomon követett mutatók
      description: Felsorolja azokat a konkrét játékmutatókat, amelyeket a mutató
        nyomon követ, például a labdákat, a strike-okat, az outokat, az inningeket,
        a dobások számát, az overs-eket, a wicketeket, a pontszámot vagy a downokat.
    indoor_outdoor_use:
      name: Beltéri/kültéri használatra
      description: Jelzi, hogy a bowling játék beltéri, kültéri vagy mindkét használatra
        alkalmas.
    inflatable_decoration_items_included:
      name: Mellékelt felfújható dekorációs termékek
      description: Felsorolja a felfújható dekorációhoz mellékelt főbb tartozékokat
        (pl. ventilátor, cövekek, rögzítőkötelek).
    inflatable_decoration_type:
      name: Felfújható dekoráció típusa
      description: Meghatározza a felfújható party-díszek típusát (alak/formatényező),
        hogy megkönnyítse a böngészést és a szűrést.
    inflatable_raft_float_features:
      name: A felfújható tutaj/úszó jellemzői
      description: A felfújható tutaj/úszó funkcionális jellemzői.
    inflation_method_included:
      name: Felfújó módszer mellékelve
      description: Megadja a javítókészlethez mellékelt gumiabroncs-felfújási megoldás
        típusát, ha van ilyen.
    infused_scent:
      name: Átitatott illat
      description: Azonosítja a csalétekbe impregnált illat- vagy ízesítő adalékanyagokat.
    ingredient_base_type:
      name: Összetevő alaptípusa
      description: Meghatározza a fermentációhoz használt alapanyagot (pl. szőlőlé-koncentrátum,
        friss szőlőlé vagy gyümölcs-koncentrátum).
    ingredient_physical_form:
      name: Összetevő fizikai formája
      description: Meghatározza az illatanyag fizikai formáját (amelyet a kezelés,
        az adagolás és a készítmény előállítása során használnak).
    ingredient_processing_method:
      name: Összetevő feldolgozási módja
      description: Meghatározza az összetevőre alkalmazott elsődleges feldolgozási
        technikát (pl. liofilizált, pörkölt, fermentált).
    ink_colors_included:
      name: Mellékelt tinta színe
      description: Meghatározza a készletben található bélyegzőpárnában található
        tintaszíneket.
    ink_pad_application_method:
      name: Tintapárnás alkalmazási mód
      description: A tinta adagolásának/felvitelének módja a bélyegzőpárnából (hagyományos
        bélyegzőpárna, felhordó vagy ecsethegyű párna).
    ink_pad_permanence:
      name: Tintapárna tartóssága
      description: Annak megadása, hogy a bélyegzett tinta tartós-e és/vagy archiválható-e
        (fakulás- és vízálló száradás után).
    ink_pad_size:
      name: Tintapárna mérete
      description: A tintapárna felületének/dobozának szabványos mérete/formatényezője.
    ink_pad_special_effects:
      name: Tintapárna speciális effektusa
      description: A tinta különleges vizuális/funkcionális hatásai bélyegzéskor (pl.
        metál, csillám).
    ink_permanence:
      name: Tintatartósság
      description: Jelzi, hogy a megszáradt sumi tinta tartós/archív minőségű-e, vagy
        lemosható/nem tartós.
    ink_preparation_required:
      name: Tinta előkészítése szükséges
      description: Jelzi, hogy a sumi tinta használatra kész, vagy használat előtt
        vízzel hígítandó vagy őrölendő.
    inline_skate_brake_type:
      name: Egysoros görkorcsolya fék típusa
      description: Meghatározza a görkorcsolyák fékkonfigurációját, például levehető
        sarokfék vagy fék nélküli állapot.
    inner_tent_configuration:
      name: Belső sátor konfigurációja
      description: Meghatározza a belső sátor konfigurációját vagy stílusát, például
        teljes betét, hálós betét vagy hőszigetelő bélés.
    innerspring_coil_type:
      name: Belső rugós tekercs típusa
      description: Meghatározza a matrac belsejében található belső rugórendszer felépítési
        stílusát, amely befolyásolja a megtámasztást, mozgáselnyelő képességet és
        az árat.
    input_connector_type:
      name: Bemeneti csatlakozó típusa
      description: Meghatározza a pedál által használt audio bemeneti csatlakozó típusát
        (jellemzően 6,3 mm-es TS).
    input_valve_type:
      name: Bemeneti szelep típusa
      description: Jelzi, hogy milyen szabványú szelep található azon a kerékpárbelsőn/keréken,
        amelyről az adapter csatlakozik.
    insecticide_treatment:
      name: Rovarirtó kezelés
      description: Azt jelzi, hogy a hálót gyárilag kezelték-e rovarirtó szerrel,
        és ha igen, akkor milyen típusú kezelést használtak a kiegészítő védelem érdekében.
    insert_coverage_area:
      name: Betét általi fedés
      description: Meghatározza, hogy a betét a láb melyik részét fedi le (pl. teljes
        hosszában, csak a sarok).
    insert_length_type:
      name: Betéthossz típusa
      description: Azt jelzi, hogy a talpbetét mekkora részét fedi le a boltozati
        támasz.
    inside_message_type:
      name: Belső üzenet típusa
      description: Azt jelzi, hogy a kártya tartalmaz-e előre nyomtatott üzenetet
        belül, és hogy az testreszabható-e.
    insole_attachment_method:
      name: Talpbetét rögzítési módja
      description: Meghatározza, hogy a talpbetét hogyan rögzül a cipőben (szabadon
        behelyezhető, öntapadós, tépőzáras stb.).
    insole_material:
      name: Talpbetét anyaga
      description: Leírja a talpágy vagy a talpbetét anyagát, amelyen a láb nyugszik,
        és amely befolyásolja a párnázást és a tartást.
    installation_fabrication_level:
      name: Telepítési gyártási szint
      description: A készlet telepítéséhez szükséges egyedi gyártás vagy módosítás
        tipikus mennyiségét jelzi.
    installation_location:
      name: Telepítési helyszín
      description: Meghatározza az olajnyomás-érzékelő tipikus beszerelési pontját
        a motor olajrendszerében (pl. blokk olajelvezető nyílás, szűrőház, szendvicslemez
        vagy különálló csőszerelés).
    installation_method:
      name: Beszerelés módja
      description: Meghatározza, hogy a szőnyeg vagy a burkolólap hogyan van rögzítve
        vagy felszerelve a padlóra.
    instant_coffee_form:
      name: Instant kávé formája
      description: Leírja az instant kávé fizikai formáját, amely befolyásolja az
        elkészítési módot és az eltarthatóságot.
    instep_coverage:
      name: A lábszár fedése
      description: Meghatározza, hogy a termék csak a sípcsontot védi-e, vagy a sípcsontot
        és a lábfejet is.
    instruction_format:
      name: Útmutató formátuma
      description: A készlethez mellékelt útmutató formátuma.
    instrument_cleaning_swab_form_factor:
      name: Eszköztisztító pálcika formatényezője
      description: Meghatározza a pálcika fizikai stílusát (pl. áthúzható kendő vs.
        rúd/kefe rendszer), hogy illeszkedjen a játékos preferenciáihoz és a hangszer
        korlátozásaihoz.
    instrument_dimensions_unit_context:
      name: Hangszer méretei - mértékegységek
      description: Pontosítja, hogy mire vonatkoznak a megadott magasság/szélesség/hosszúság
        mérések (pl. a hangszer teljes hossza, egy cső hossza, állványmagasság).
    instrument_electronics_type:
      name: A hangszer elektronikai kialakítása
      description: Azt jelzi, hogy a hangszer átvételi/előerősítő rendszere aktív
        vagy passzív-e.
    instrument_key:
      name: Hangnem
      description: Meghatározza a furulyák hangolását, amelyet a katalógusokban használnak
        (a nagyobb furulyák esetében általában C vagy F).
    instrument_level:
      name: Hangszerszint
      description: A hangszerkínálat célközönségének szintje.
    instrument_part_mounting_method:
      name: Hangszeralkatrész-rögzítési mód
      description: Meghatározza, hogyan rögzítik vagy szerelik fel az alkatrészt (pl.
        szorítóval, ragasztóval vagy csavarral rögzítve).
    instrument_parts_included:
      name: A hangszer mellékelt alkatrészei
      description: Felsorolja az A-klarinét csomagjában található főbb alkatrészeket.
    instrument_playing_technique:
      name: Hangszeren való játék technikája
      description: Hogyan játsszák/működtetik a hangszert jellemzően (pl. rázzák,
        ütik, kattogtatják).
    instrument_size_class:
      name: Hangszerméret osztálya
      description: A hangszer általános méretei nem pontos méretekkel, hanem a vásárlók
        számára könnyen érthető kategóriákban megadva.
    insulation_fill_material:
      name: Szigetelés töltőanyaga
      description: Meghatározza a kabát vagy mellény szigeteléséhez használt elsődleges
        anyagot.
    integrated_bottom_type:
      name: Integrált alj típusa
      description: Jelzi, hogy a ruhadarab tartalmaz-e mozgás közben elfedést biztosító
        beépített alsóneműt, rövidnadrágot, tornadresszt vagy hasonló alsóruházatot.
    integrated_charging_options:
      name: Beépített töltési lehetőségek
      description: Felsorolja az éjjeliszekrényen elérhető beépített tápellátási vagy
        töltőcsatlakozókat.
    integrated_furniture_function:
      name: Beépített bútorfunkciók
      description: Felsorolja a fali ágyhoz vagy a kerethez tartozó további beépített
        bútorelemeket (pl. íróasztal, kanapé, polcok).
    integrated_locking:
      name: Integrált zár
      description: Annak meghatározása, hogy az állvány rendelkezik-e beépített zárral
        az állvány és a jármű, illetve a kerékpár és az állvány közötti rögzítéshez.
    integrated_power_options:
      name: Integrált tápellátási lehetőségek
      description: Jelzi, hogy a mosdószekrény milyen beépített áramellátási vagy
        töltési funkciókkal rendelkezik.
    integrated_storage_features:
      name: Integrált tárolási funkciók
      description: Felsorolja azokat a további tárolási vagy kiegészítő funkciókat,
        amelyekkel a biliárddákó-tartó a dákótartó rekeszeken kívül rendelkezik.
    integrated_tool_functions:
      name: Beépített szerszámfunkciók
      description: A karba beépített további szerszámfunkciók (pl. küllőhorgony, szelepmag-eltávolító,
        gumiabroncs-felhúzó).
    intended_board_type:
      name: Tervezett deszkatípus
      description: Meghatározza, hogy milyen típusú kiteboardhoz tervezték az uszonyt
        (pl. twin tip, szörfös irányított, hidrofoil).
    intended_consumption:
      name: Tervezett fogyasztás
      description: Meghatározza a termék rendeltetésszerű fogyasztási módját, jelezve,
