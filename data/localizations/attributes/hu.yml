    bearing_rating:
      name: Csapágybesorolás
      description: Meghatározza a korcsolyákban használt csapágytűrést vagy teljesítési
        osztályt (pl. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Csapágy tömítésének kódja
      description: A csapágyon használt tömítési stílust jelzi, amely befolyásolja
        a tartósságot és a gördülési ellenállást.
    bearing_seal_type:
      name: Csapágy tömítésének típusa
      description: Megadja a tömítés vagy árnyékolás kialakítását, amely védi a csapágy
        belsejét a szennyeződésektől, és befolyásolja az ellenállást (pl. 2RS, ZZ,
        LLU, nyitott).
    bearing_shield_type:
      name: Csapágypajzs típusa
      description: A csapágy belsejét védő árnyékolás vagy tömítés stílusa.
    bearing_size_code:
      name: Méretcsapágy kódja
      description: Szabványosított csapágyjelölés (pl. 608, 688), amely kombinálja
        a belső, külső átmérőt és szélességet.
    bearing_type:
      name: Csapágytípus
      description: Megadja a kormánycsapágyban használt csapágyak szerkezeti kialakítását.
    beater_head_material:
      name: Ütőfej anyaga
      description: Meghatározza a lábdob ütőfelületének érintkezőjét/bőranyagát (pl.
        filc, fa, gumi).
    beaters_included:
      name: Habverők mellékelve
      description: Meghatározza, hogy hány ütőfej van a dobpedállal együtt mellékelve/telepítve
        (pl. egy vagy két ütőfej), vagy hogy egyáltalán nincs-e ütőfej a pedálon.
    bed_base_type:
      name: Ágyrács típusa
      description: Meghatározza az ágy vagy a dívány alapjának szerkezeti stílusát
        (pl. dobogós tetejű, rugós léces, állítható).
    bed_storage_type:
      name: Ágytároló típusa
      description: Meghatározza az ágykeret integrált tárolómechanizmusát.
    bedroom_furniture_items_included:
      name: A mellékelt fürdőszobai bútordarabok
      description: Megadja a hálószoba-garnitúrában található egyes bútordarabokat
        (pl. ágy, komód, éjjeliszekrények), hogy a vásárlók hosszú leírások elolvasása
        nélkül is gyorsan megtekinthessék, mit tartalmaz a készlet.
    bedroom_vanity_items_included:
      name: Tartalmazza a hálószoba-mosdókagylóelemeket
      description: Felsorolja a hálószobai fésülködőasztal-szett részeként szállított
        különböző tételeket, hogy a vásárlók pontosan tudják, mit kapnak (pl. tükör,
        támlátlan szék, világítási készlet).
    beer_based_cocktail_variety:
      name: Sör alapú koktélváltozat
      description: A konkrét változatuk szerint osztályozza a söralapú koktélokat,
        pl. Radler, Shandy, Michelada.
    beet_variety:
      name: Cékla fajtája
      description: Meghatározza a cékla fajtáját vagy változatát, ezzel segítve a
        vásárlókat az íz, a szín és a konyhaművészeti felhasználás azonosításában
        (pl. vörös, sárga, Chioggia).
    bell_actuation_mechanism:
      name: Harang működtető mechanizmusa
      description: Meghatározza a csengő megnyomásához szükséges felhasználói műveletet,
        segítve a vásárlót a kívánt ergonómiai megoldás kiválasztásában.
    bell_guard_coverage_area:
      name: Korpuszvédő lefedettségi területe
      description: Azt jelzi, hogy a harang melyik részét hivatott védeni a védőburkolat.
    bell_material:
      name: Harang anyaga
      description: A korpusz anyaga (ha az a hangszer általános anyagától külön van
        megadva).
    bellhousing_bolt_pattern:
      name: Harangház csavarozási mintázata
      description: Meghatározza, hogy a sebességváltóház milyen kuplungház-/motoroldali
