    wick_tab_crimp_type:
      name: Kanóc fül krimpelő típus
      description: Hogyan rögzíti a kanóctalp a kanócot (szerkezeti/préselési stílus).
    wick_tab_material:
      name: Kanócfül anyaga
      description: A csatolt fül/tartó anyaga (általában bádog), a korrózióállóság
