    kiteboard_bag_style:
      name: Kiteboardtáska stílusa
      description: A kiteboardtáska konkrét stílusa vagy altípusa (pl. deszkatáska,
        golftáska, utazótáska, fóliatáska).
    kiwifruit_variety:
      name: Kivifajta
      description: A kivi konkrét fajtáját vagy színváltozatát azonosítja (zöld, arany,
