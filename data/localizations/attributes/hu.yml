        szempontjából véve, a kinyílás és a szabályoknak való megfelelés érdekében.
    window_regulator_operation:
      name: Ablakemelő működése
      description: Meghatározza az ablakemelő működtetésének módját (kézi tekerős
        vagy elektromos).
    windshield_coverage_area:
      name: Szélvédőtakaró fedési területe
      description: Meghatározza, hogy a gépjármű elülső külsejének mely részeit hivatott
