    motorcycle_luggage_side:
      name: Motorkerékpár-csomag oldala
      description: Nyeregtáskák/oldaltáskák esetében azt jelzi, hogy a tétel bal oldali,
        jobb oldali vagy pár/készlet.
    motorcycle_protective_gear_size_system:
      name: Motoros védőfelszerelés méretrendszere
      description: Jelzi a terméken használt méretezési rendszert (pl. betűjeles méretezés,
        numerikus, egy méret).
    motorcycle_rack_carrier_style:
      name: Motorszállító állvány stílusa
