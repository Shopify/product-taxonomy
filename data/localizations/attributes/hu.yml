        oldalablakokat vagy a motorháztető élét is).
    windshield_mount_attachment_method:
      name: Szélvédő rögzítési módja
      description: Meghatározza, hogyan tapad vagy rögzül a tartó a szélvédő felületéhez.
    windshield_washer_fluid_seasonality:
      name: Szélvédőmosó szezonalitása
      description: Jelzi a szélvédőmosó összetétele szerinti tervezett évszakot/időjárást,
