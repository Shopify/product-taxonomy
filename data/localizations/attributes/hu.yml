      name: Orsócsapágy felületének anyaga
      description: A támasztóorsókban használt csúcs/csapágyfelület (csúcs/alsó rész)
        anyaga, amely befolyásolja a simaságot és a kopást.
    spindle_bearing_type:
      name: Orsócsapágy típusa
      description: Az orsócsúcs/csapágy illeszkedési felületének típusa, amely csökkenti
        a súrlódást a támasztótállal/csészével szemben.
    spindle_finish:
      name: Orsó felületkezelése
      description: Az orsó felületkezelése/bevonata, amely befolyásolja a tapintást,
        a tartósságot és az esztétikát.
    spindle_hook_type:
      name: Orsóhorog típusa
      description: Az orsó tetején található fonalrögzítő mechanizmus a vezetőszál/fonal
        rögzítésére szolgál.
    spindle_support_method:
      name: Orsó támasztási módja
      description: Hogyan kell az orsót megtámasztani forgás közben.
    spindle_tip_style:
      name: Orsócsúcs stílusa
      description: A tálban/csészében felfekvő pont alakja/kialakítása (a csapágyfelület),
        amely befolyásolja a súrlódást és a forgás simaságát.
    spindle_whorl_position:
      name: Orsókarika pozíciója
      description: Jelzi, hogy a pörgetőkerék hol helyezkedik el az orsó tengelyén.
    spinner_blade_shape:
      name: Forgólapát alakja
      description: A villantó elsődleges szárnyának formáját jelzi. Ez határozza meg
        a vibrációt, a villanást és a merülési mélységet.
    spinner_control_card_design_type:
      name: Fonókerék-vezérlőkártya kialakítása/típusa
      description: Leírja a fonókerék-vezérlőkártya típusát a vezérlőinformációk megjelenítésének
        módja szempontjából (pl. arányreferencia, feszültségreferencia, konverziós
        táblázat).
    spinner_subtype:
      name: Pörgettyű altípusa
      description: A villantó általános kialakításának vagy a termékcsaládnak a besorolása
        (pl. klasszikus körforgó villantó, spinnerbait).
    spinning_oil_application_area:
      name: Fonalfolyadék felviteli terület
      description: A forgókeréken használt olaj tervezett felviteli pontját/pontjait
        határozza meg.
    spinning_oil_application_tool:
      name: Fonóolaj felviteli eszköz
      description: Jelzi az adagoló/csomagoló hegyének stílusát, amellyel az olajat
        a forgókerék alkatrészeire viszik fel a szabályozott adagolás érdekében.
    spinning_oil_features:
      name: A fonalfolyadék jellemzői
      description: Kiemeli a fonalfolyadékok funkcionális jellemzőit (maradvány, foltosodás,
        oxidáció és moshatóság).
    spinning_top_features:
      name: Pörgettyű jellemzői
      description: A pörgettyű alapvető pörgésen túli különleges játékfunkciói.
    spinning_top_launch_mechanism:
      name: Búgócsiga-indítómechanizmus
      description: Hogyan indítható be/hajtható meg a pörgettyű.
    spinning_wheel_brake_tension_system_type:
      name: Forgó kerék fék/feszítő rendszer típusa
      description: Meghatározza a fonalbehúzás szabályozására használt fék-/feszítőrendszert.
    spinning_wheel_drive_system:
      name: Fonókerék hajtásrendszere
      description: Jelzi, hogy milyen meghajtórendszerre tervezték az orsót.
    spinning_wheel_hook_system:
      name: Forgókerék kampórendszere
      description: Meghatározza, hogyan vezesse a fonalat a szórólap karjai mentén.
    spinning_wheel_part_application:
      name: Forgókerék alkatrész alkalmazása
      description: Meghatározza, hogy az olaj a rokka mely alkatrészeihez készült.
    spinning_wheel_portability_foldability:
      name: Forgókerék hordozhatósága/összecsukhatósága
      description: Azt jelzi, hogy a kerék összecsukható-e szállításhoz.
    spinning_wheel_tension_adjustment_type:
      name: Rokkafeszesség-beállítás típusa
      description: Hogyan állítható a feszesség a keréken a behúzás szabályozásához.
    splice_termination_type:
      name: Kötéscsatlakozás/végződés típusa
      description: Jelzi, hogy mi van a horgonykötél végén (pl. hurokszem, kötélszív,
        lánchorog).
    split_shot_cut_type:
      name: Hasított sörétólom vágási típusa
      description: Meghatározza a zsinórhoz/vonalhoz való csatlakozást lehetővé tevő
        barázda vagy nyílás stílusát.
    split_shot_shape:
      name: Hasított ólomsúly alakja
      description: Leírja a hasított sörétólom fizikai formáját. Ez befolyásolja a
        hidrodinamikát és az elakadással szembeni ellenállást.
    split_shot_size:
      name: Hasított sörétólom mérete
      description: Szabványosított alfanumerikus méretkód (pl. SSG, AAA, BB, 1), melyet
        a gyártók és a horgászok használnak sörétólmok osztályozására. A pontos súlymérések
        kiegészítésére szoglál.
    spoiler_adjustability:
      name: Légterelő állíthatósága
      description: Jelzi, hogy a légterelő szöge vagy magassága állítható-e.
    spoke_accessory_function:
      name: Küllőtartozék funkciója
      description: A tartozék keréken betöltött elsődleges funkcióját jelöli. Lehet
        például dekoratív, fényvisszaverő vagy világító.
    spoke_butting_profile:
      name: Küllőillesztési profil
      description: Leírja, hogyan változik a küllő átmérője a hossza mentén (sima,
        egyszeresen, kétszeresen, háromszorosan vagy négyszeresen vékonyított küllő),
        befolyásolva a súlyt és a szilárdságot.
    spoke_gauge:
      name: Küllővastagság
      description: Meghatározza, hogy milyen vastagságú küllőkkel (drótvastagság besorolása)
        kompatibilis a küllőanya.
    spoke_interface_type:
      name: Küllő csatlakozási típusa
      description: Jelzi, hogy a kerékpáragy milyen küllőfej-típushoz készült (J-alakú,
        egyenes, T-fejű).
    spoke_shape:
      name: Küllőforma
      description: Meghatározza a küllőhuzal külső keresztmetszetét. Ez befolyásolja
        az aerodinamikát és az esztétikát.
    spool_form_factor:
      name: Orsó formatényezője
      description: Az orsótest fizikai stílusa és a cérna/fonal rögzítésének módja
        (pl. peremes vagy kúpos).
    spoon_style:
      name: Kanálstílus
      description: Jelzi a villantó funkcionális altípusát vagy stílusát. Lehet például
        dobó, lebegő vagy vontatott kanál.
    sports_bra_padding_type:
      name: Sportmelltartó bélésének típusa
      description: Meghatározza a sportmelltartóban található bélés/párnázás típusát.
    sports_cap_style:
      name: Sportsapka stílusa
      description: Azonosítja a sapka általános felépítését/stílusát (pl. baseballsapka,
        snapback), függetlenül a csapatarculattól.
    sports_governing_body_certification:
      name: Sportszövetségi tanúsítvány
      description: Elismert sportszövetségektől vagy irányító testületektől származó
        hivatalos tanúsítványokat vagy jóváhagyásokat mutatja. Ezek bizonyítják, hogy
        a termék megfelel a versenyszabályzatoknak.
    sports_surface_compatibility:
      name: Sportfelület kompatibilitás
      description: Felsorolja azokat a játék- vagy felülettípusokat, amelyekre a festék
        biztonságosan felvihető.
    sports_toy_set_contents:
      name: Sportjáték-készlet tartalma
      description: Jelzi, hogy milyen elemek tartoznak a készlethez (pl. labda, ütő,
        háló, célpontok).
    spray_string_cleanup_method:
      name: Szerpentin spray tisztítási módszer
      description: A szerpentin spray maradványainak eltávolítására/tisztítására ajánlott
        módszer.
    spray_string_finish_effect:
      name: Szerpentinspray felület/hatás
      description: A kifújt szerpentinspray vizuális hatása a felvitelt követően (fény/fényvisszaverődés
        és speciális effektek).
    spray_string_formulation_type:
      name: Szerpentin spray összetételének típusa
      description: Hogyan viselkedik a termék fújás közben és után (pl. kimosható
        vagy tartós).
    spray_string_recommended_surface:
      name: Szerpentin spray javasolt felület
      description: Azok a felülettípusok, amelyeken a szerpentin spray használható
        (és amelyekről valószínűleg könnyen letisztítható).
    spray_string_scent:
      name: Szerpentinspray illata
      description: A szerpentin spray illat- vagy szagprofilja, ha van ilyen.
    spray_string_suitable_age_group:
      name: Szerpentin spray ajánlott korcsoport
      description: A biztonságos használat érdekében ajánlott minimális felhasználói
        életkor/korcsoport.
    spread_consistency:
      name: Kenési állag
      description: Leírja a mártás vagy szendvicskrém textúráját/konzisztenciáját,
        hogy körülírja a szájérzetre és a használatra vonatkozó elvárásokat (pl. sima,
        darabos, habosított).
    spread_variety:
      name: Szendvicskrém típusa
      description: Meghatározza a gyümölcsös szendvicskrém típusát (pl. lekvár, zselé,
        narancslekvár, túró), hogy a vásárló különbséget tudjon tenni a különböző
        elkészítési módok és textúrák között.
    spreader_bar_type:
      name: Széthúzó rúd típusa
      description: A hevederhez mellékelt, illetve azzal kompatibilis merevítő vagy
        a horogrendszer típusát jelzi.
    sprint_canoe_class:
      name: Gyorsasági kajak osztálya
      description: Meghatározza a hivatalos sprint kenu versenyosztály megnevezését.
    sprout_presentation:
      name: Csíra megjelenési formája
      description: A termék fizikai megjelenési formáját írja le (pl. friss csírák,
        mikrozöldek, ültetőcserép, por).
    squash_and_gourd_variety:
      name: Tök és tökfajta
      description: Azonosítja a tök vagy lopótök konkrét növényfajtáját vagy piaci
        változatát, segítve a vásárlókat a kívánt típus gyors megtalálásában.
    stability_class:
      name: Stabilitási osztály
      description: Általános stabilitási besorolás repülési jellemzők vagy gyártói
        adatok alapján.
    stabilizer_thread_size:
      name: Stabilizátor menetének mérete
      description: A stabilizátor vagy kiegészítő íjhoz vagy számszeríjhoz való rögzítésére
        használt menet specifikációja.
    stabilizer_type:
      name: Stabilizátor típusa
      description: Megadja az íj vagy számszeríj stabilizátorának stílusát vagy pozíció
        szerinti besorolását
    stages_supported:
      name: Támogatott szakaszok
      description: Jelzi, hogy a rakéta vagy készlet hány fokozattal történő repülésre
        készült.
    stain_remover_format:
      name: Folteltávolító típusa
      description: A járművek folttisztítására használt termék kiszerelését/formátumát
        mutatja (szórófejes flakon, aeroszol, hab, gél, por, törlőkendő, tisztító
        toll/marker).
    stake_shape:
      name: Cövek formája
      description: Leírja a sátorcövek keresztmetszetét vagy kialakítását. Ez meghatározza
        a különböző talajtípusokban való tartóerőt.
    stamp_block_features:
      name: Bélyegzőblokk jellemzői
      description: Kiemeli a bélyegzőblokk funkcionális jellemzőit, mint például a
        mérőrácsokat, fogantyúkat vagy a csúszásmentes felületeket.
    stamp_block_type:
      name: Bélyegzőblokk típusa
      description: Meghatározza a bélyegzők rögzítésére használt bélyegzőblokk felépítését/stílusát
        (pl. átlátszó akrilblokk, fakeretű blokk vagy pozicionáló blokk).
    stamp_set_pieces_included:
      name: Bélyegzőkészlet elemei a csomagban
      description: Azt jelzi, hogy mely elemek tartoznak a bélyegző- és bélyegzőpárna-készlethez
        (pl. bélyegzők, tintapárnák, filctollak).
    stand_padding_material:
      name: Állvány párnázó anyaga
      description: Az érintkezési pontokon használt anyag, amely a műszer bevonatát
        védi (pl. hab, gumi, szilikon).
    staple_fiber_animal_fiber_type:
      name: Állati eredetű vágott fonal
      description: Az adott állati eredetű rövidszálas rost típusa, ha a rost forrása
        állati.
    staple_fiber_crimp_level:
      name: Vágott fonal krimpelési szintje
      description: A szál természetes göndörségének/hullámosságának mértéke.
    staple_fiber_preparation_type:
      name: Vágott fonal előkészítésének típusa
      description: A szál előkészítési/feldolgozási állapota értékesítéskor (hogyan
        van igazítva/kezelve), ami erősen befolyásolja a fonási módszert, a szálhúzás
        egyszerűségét és a végeredményt.
    staple_fiber_source_type:
      name: Terjedelmesített szál forrástípusa
      description: A száltartalom általános származási kategóriája.
    starch_processing_type:
      name: Keményítő feldolgozásának típusa
      description: Azt jelzi, hogy a keményítő natív, vagy fizikailag vagy kémiailag
        módosított-e (pl. instant, előzselatinizált) specifikus funkcionális tulajdonságok
        elérése érdekében, mint például a sűrítési sebesség vagy a hőmérséklet-tolerancia.
    starch_source:
      name: Keményítő forrása
      description: Megadja azt a botanikai forrást, amelyből az étkezési keményítő
        vagy sűrítőanyag származik (pl. kukorica, burgonya, tápióka). A forrás a főzési
        keményítők elsődleges megkülönböztető tényezője. Közvetlen hatással van a
        receptekben való használhatóságra, az allergénekre, valamint a fogyasztói
        keresési szokásokra.
    starfruit_variety:
      name: Csillaggyümölcs fajtája
      description: Azonosítja a csillaggyümölcs konkrét fajtáját vagy változatát (pl.
        Arkin, Fwang Tung).
    starter_drive_type:
      name: Indítómotor hajtástípusa
      description: Az indítómotor fogaskerekének a gyűrűs fogaskerékbe való kapcsolódására
        szolgáló mechanizmus típusa.
    starter_pistol_action_type:
      name: Indítópisztoly működési típusa
      description: A riasztópisztoly elsütő-/működési mechanizmusát azonosítja (pl.
        egyszeres működésű, kettős működésű, félautomata).
    starter_pistol_caliber:
      name: Riasztópisztoly kalibere
      description: Meghatározza a vaklőszer vagy töltény kaliberét, amelyhez a riasztópisztoly
        készült.
    starter_terminal_type:
      name: Indítócsatlakozó típusa
      description: Meghatározza az önindítón vagy a szolenoidon lévő elektromos csatlakozások
        terminál-/csatlakozótípusát (pl. menetes, lpaos, dugós csatlakozó).
    starting_block_anchoring_method:
      name: Rajtgép rögzítési módszer
      description: Leírja, hogyan rögzítik a blokkokat a követés felületéhez (pl.
        tüskék, tapadókorongok, gumibetétek).
    steerer_tube_design:
      name: Kormánycső kialakítása
      description: Leírja a kormánycső szerkezeti kialakítását (egyenes, kúpos, menetes
        stb.). Ez határozza meg a kormánycsapágy és a váz kompatibilitását.
    steering_cable_end_fitting_type:
      name: Kormánykábel-végcsatlakozó típusa
      description: Megadja a vízi jármű kormánykábelének végein található végződés/rögzítőelem
        típusát (a kormány felőli és a motor/kormányrúd felőli végen), biztosítva
        a kompatibilitást a kormányművel és a motor csatlakozási pontjaival. Adott
        esetben használja a szabványos vagy a gyártó általi meghatározást.
    steering_column_adjustability_features:
      name: Kormányoszlop állíthatósági funkciói
      description: Jelzi, hogy a kormányoszlop milyen állíthatósági funkciókkal rendelkezik.
    steering_column_ignition_provision:
      name: Kormányoszlop gyújtáskapcsolójának felszereltsége
      description: Jelzi, hogy a kormányoszlop képes-e befogadni gyújtászár-hengert/-kapcsolót
        és/vagy a kormányzárat.
    steering_column_shaft_end_interface_type:
      name: Kormányoszlop tengelyvégének csatlakozási típusa
      description: Mutatja a kormányoszlop tengelyvégének csatlakozási típusát (pl.
        bordás, dupla D, reteszes).
    steering_column_shift_type:
      name: Kormánymű oszlop váltó típusa
      description: Meghatározza, hogy a kormánymű oszlop tartalmaz-e oszlopra szerelt
        váltómechanizmust, és ha igen, milyen típusú a sebességváltó.
    steering_component_drive_type:
      name: Kormánymű-alkatrész meghajtásának típusa
      description: Meghatározza a kormányalkatrészekhez (különösen a szivattyúkhoz
        és az EPS-rendszerekhez) kapcsolódó hajtás-/rásegítő mechanizmust.
    steering_position:
      name: Kormánykerék pozíciója
      description: Meghatározza, hogy a furgon balkormányos vagy jobbkormányos-e.
    steering_pump_pulley_type:
      name: Kormányrendszer-szivattyú szíjtárcsa típusa
      description: Meghatározza a kormányszivattyúval használt szíjtárcsa-hajtás típusát/interfészét.
    steering_rack_finish_coating:
      name: Kormányzás állvány kikészítés/bevonat
      description: Meghatározza a korrózióvédelem érdekében használt külső felületkezelést/bevonatot.
    steering_rack_position:
      name: Kormánymű elhelyezkedése
      description: Meghatározza, hogy az állvány hol van felszerelve/felhasználva
        a jármű kormányrendszerében.
    steering_wheel_cover_installation_type:
      name: Kormányvédő felszerelési típusa
      description: A kormányvédő kormánykerékre való felszerelésének/rögzítésének
        módja.
    steering_wheel_grip_material:
      name: Kormánykerék markolatának anyaga
      description: Megadja a borítás/markolat anyagát (ahol a kezekkel érintkezik).
        Ez eltérhet a kormánykerék alapanyagától/küllőitől.
    steering_wheel_mounting_pattern:
      name: Kormánykerék rögzítési formája
      description: Meghatározza a kormánykerék-agyhoz vagy -adapterhez való rögzítésére
        szolgáló csavar-/furatmintázatot (pl. 3-csavaros, 5-csavaros).
    steering_wheel_rim_material_grip_surface:
      name: Kormánykerék karimájának anyaga (fogófelület)
      description: Meghatározza az elsődleges fogófelület/karima burkolatának anyagát
        (eltér az általános szerkezeti anyagtól).
    stem_material:
      name: Pipaszár anyaga
      description: Kifejezetten a pipaszár vagy szájrész készítéséhez használt anyagot
        határozza meg (pl. akril, ebonit, lucit).
    stencil_machine_consumable_type:
      name: Sablongép fogyóanyagának típusa
      description: Meghatározza a működéshez szükséges fogyóanyagokat (ha vannak ilyenek).
    step_surface_texture:
      name: Lépőfelület textúrája
      description: Megadja a lépcsők járófelületének kialakítását vagy anyagát. Ez
        a tapadást és a kényelmet hivatott javítani nedvesség esetén.
    stepper_motion_type:
      name: Taposógép mozgástípusa
      description: Meghatározza a gép által kínált elsődleges taposó mozgásformát.
    stick_bow_profile:
      name: Ütőprofil
      description: Meghatározza a gyeplabdaütő nyelének görbületi profilját (vagy
        „íj típusát”), amely kritikus tényező, és Influence a labdavezetést, a drag-flick
        teljesítésmódot és a játékstílust.
    stick_construction:
