    windlass_mount_type:
      name: Horgonycsörlő rögzítési típusa
      description: Meghatározza, hogy a horgonycsörlőt hova/hogyan kell a hajóra szerelni.
    window_component_location:
      name: Ablakalkatrész elhelyezkedése
      description: Meghatározza, hogy az alkatrész melyik ablakra/nyílásra vonatkozik
