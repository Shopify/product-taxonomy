    bicycle_hub_type:
      name: Kerékpáragy típusa
      description: Leírja a központ mechanizmusát, amely a kerékhez van mellékelve,
        befolyásolja a hajtáslánc kompatibilitását és a vezetési stílust.
    bicycle_lock_security_certification:
      name: Kerékpárzár biztonsági tanúsítványa
      description: Független, harmadik fél általi tanúsítás, amely igazolja a lopásgátló
