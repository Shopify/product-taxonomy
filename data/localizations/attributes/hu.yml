        a katalizátorhoz képest.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Gépjármű oxigénérzékelőjének érzékelőszáma
      description: Meghatározza az érzékelő számát (pl. 1. érzékelő vagy 2. érzékelő)
