    fluorescent_tube_output_type:
      name: Тип изход за флуоресцентна тръба
      description: Определя изходния подтип на флуоресцентната тръба, важен за съвместимостта
        с баласта и яркостта.
    fly_swatter_type:
      name: Тип мухобойка
      description: Показва начина или механизма на работа на мухобойката.
    foil_duty_rating:
