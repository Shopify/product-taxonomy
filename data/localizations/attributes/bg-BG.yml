      description: Идентифицира състава на болтовете за стрелба с лък, напр. бамбук
        или фибростъкло
    bone_anchored_interface_type:
      name: Тип интерфейс с костна проводимост
      description: Определя как процесорът се прикрепя към импланта, разграничавайки
