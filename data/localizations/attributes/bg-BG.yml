        може да се отстрани, съхранява и постави отново.
    filter_bleaching_method:
      name: Метод за избелване на филтъра
      description: Идентифицира състоянието на избелване и процеса, използван за филтъра,
        като информира за предпочитанията по отношение на вкуса и устойчивостта.
    filter_technology:
      name: Технология на филтъра
      description: Идентифицира използваната технология за контрол на миризмите или
