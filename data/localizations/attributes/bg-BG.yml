    bristle_hardness:
      name: Твърдост на косъма
      description: Показва твърдостта на косъмчетата на четката за зъби
    bristle_material:
      name: Материал на косъма
      description: Идентифицира състава на косъмчетата на четките, напр. найлон или
        конски косми
    bristle_shape:
      name: Форма на косъма
      description: Определя формата на косъмчетата на четката, напр. плоски, под ъгъл
    broadcast_video_standard:
      name: Стандарт за излъчване на видео
      description: Показва аналоговите стандарти за излъчване, с които видеокасетофонът
