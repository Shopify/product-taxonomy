      description: Посочва елементите, включени в комплекта за кръвен тест, напр.
        марля, лейкопласт
    bluetooth_functionality:
      name: Bluetooth функционалност
      description: Показва дали устройството действа като предавател, приемник или
        и двете (приемопредавател)
    board_concave_shape:
      name: Форма на вдлъбнатата дъска
      description: Определя вдлъбнатата крива на дъски за сърф или падълборд; например
        V-образно, плоско
    board_game_features:
      name: Функции на настолната игра
      description: Подчертава уникални аспекти на настолна игра, напр. бърза настройка,
        налично допълнение
    board_game_mechanics:
      name: Механика на настолните игри
      description: Описва структурата на начина на игра на настолна игра, напр. стратегия
        или отборна
    board_material:
      name: Материал на дъската
      description: Указва вида на материала в презентационните дъски, напр. акрил
        или порцелан
    board_mounting_type:
      name: Тип монтаж на дъска
      description: Указва стила на настройка на презентационните дъски, напр. преносими
