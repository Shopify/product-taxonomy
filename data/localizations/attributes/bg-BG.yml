    floor_protection_transparency_level:
      name: Ниво на прозрачност на подовата настилка
      description: Показва колко прозрачно е фолиото или лентата, като варира от прозрачно
        до непрозрачно.
    floor_scrubber_brush_type:
      name: Тип четка за почистване на подове
      description: Определя основната конфигурация на четката или тампона, използвани
        от скрубера.
    floor_surface_compatibility:
      name: Съвместимост на подовите повърхности
      description: Посочва материалите на подовите повърхности, за които протекторът
