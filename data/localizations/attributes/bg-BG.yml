    candle_shape:
      name: Форма на свещ
      description: Описва формата на свещ, като например цилиндрична или квадратна
    candle_type:
      name: Тип свещ
      description: Указва дизайна на свещи, като конусовидни или чаени
    cane_base_design:
      name: Дизайн на основата на бастуна
