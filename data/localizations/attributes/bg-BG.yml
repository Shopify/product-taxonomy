    boot_style:
      name: Стил на ботуши
      description: Указва стила на ботушите, напр. боти
    boot_type:
      name: Тип стартиране
      description: Класифицира стила на стартиране, напр. студено и топло стартиране
    borescope_design:
      name: Дизайн на бороскоп
      description: Описва типа бороскоп, като гъвкав, твърд или фиброскоп
    bottle/container_closure:
      name: Затваряне на бутилка/контейнер
      description: Идентифицира вида на затваряне на бутилки или контейнери, напр.
