    mounting_interface_pattern:
      name: Модел на интерфейса за монтаж
      description: Идентифицира механичния интерфейс или модел на отвори, използван
        за свързване на поставката към стойка за радио, скоба или система със сфери
    mounting_interface_standard:
      name: Стандарт на интерфейса за монтаж
      description: Определя монтажната схема или интерфейса, който държачът или стойката
        поддържа (напр. AMPS, VESA 75, RAM B сфера)
    mounting_mechanism:
      name: Механизъм за монтаж
      description: Определя как телефонът или камерата се закрепват към джойстика
        или държача.
    mounting_style:
      name: Стил на монтиране
      description: Определя как бутонът за натискане е закрепен към контролния панел,
        влияещ върху метода на инсталация и съвместимостта с дебелината на панела
    mounting_technology:
      name: Технология на монтаж
      description: Показва дали интегралната схема е проектирана за монтаж през отвор,
        или за повърхностен монтаж
    mounting_thread_size:
      name: Размер на резбата за монтаж
      description: Показва стандартния размер на резбата за статив или аксесоар, предоставен
