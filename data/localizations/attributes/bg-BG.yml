    mold_shape:
      name: Форма на формоване
      description: Описва формата или шарката на занаятчийски калъп, като кръгла или
        буквена
    molding_application:
      name: Приложение за формоване
      description: Указва вида на формоването, използвано в конструкцията, като корпус
