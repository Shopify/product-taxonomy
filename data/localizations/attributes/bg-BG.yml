    monitor_shape:
      name: Форма на монитора
      description: Определя контура на екрана на монитора, например плосък или извит
    monitor_specialized_features:
      name: Специализирани функции на монитора
      description: Подчертава уникалните характеристики на компютърен монитор, като
        3D поддръжка или регулируем зрителен ъгъл
    monitor_type:
      name: Тип монитор
      description: Указва типа на монитора на камерата, напр. сензорен екран, HDR
    monitoring_method:
      name: Метод за мониторинг
      description: Идентифицира физиологичната техника, която устройството използва
        за получаване на показания за глюкоза
    monitoring_service_type:
      name: Тип услуга за наблюдение
      description: Показва дали системата е професионално наблюдавана 24/7, самонаблюдавана,
        или без наблюдение.
    monocular_design:
      name: Дизайн на монокъл
      description: Идентифицира функционалността на монокъл, като мащабиране или нощно
        виждане
    motherboard_chipset_family:
      name: Семейство чипсети на дънната платка
      description: Указва вида на чипсета в дънната платка, като например Intel или
