    minimum_magnification:
      name: Минимално увеличение
      description: Показва най-ниското ниво на увеличение на леща на микроскоп, като
        1x или 0,5x
    mirror_handle_design:
      name: Дизайн на огледална дръжка
      description: Описва стила на дръжката на денталните огледала, като двустранни
