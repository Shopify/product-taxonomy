    duster_head_material:
      name: Материал на четката за прах
      description: Указва материала на главата за събиране на прах за съображения
        за ефективност и алергии.
    dustpan_type:
      name: Тип лопатка
      description: Класифицира цялостния стил/формa на лопатката.
    edge_finish:
      name: Обработка на ръба
      description: Описва техниката на обработка на ръбовете на пътеката, която влияе
