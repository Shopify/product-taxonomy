    food_storage_bag_features:
      name: Характеристики на торбичките за съхранение на храна
      description: Подчертава забележителните функционални характеристики на чантата.
    food_storage_bag_type:
      name: Тип торбичка за съхранение на храни
      description: Определя основния стил или класификация на предназначението на
