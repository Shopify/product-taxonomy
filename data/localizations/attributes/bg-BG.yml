    emergency_blanket_features:
      name: Характеристики на одеялото за спешни случаи
      description: Подчертава специалните функционални характеристики на одеялото.
    emergency_lighting_operating_mode:
      name: Режим на работа на аварийно осветление
      description: Определя как се държи аварийното осветление при нормални условия
