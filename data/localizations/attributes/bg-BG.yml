    bulb_shape:
      name: Форма на крушка
      description: Описва формата на осветителни продукти, например тръба, спирала
    bulb_size:
      name: Размер на крушката
      description: Указва размера на електрическите крушки, напр. A19, C7
    bulb_type:
      name: Тип крушка
      description: Указва вида на крушката, използвана в продуктите за осветление,
        напр. LED, халогенна
    bulldozer_blade_type:
