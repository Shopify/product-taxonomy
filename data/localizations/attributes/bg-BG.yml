    fabric_weave:
      name: Вид тъкане
      description: Показва специфичната структура на тъканта, която влияе върху усещането
        и външния вид.
    feeder_design:
      name: Дизайн на подаващото устройство
      description: Определя структурния стил на подаващото устройство.
    fermentation_crock_type:
      name: Тип съд за фермантация
      description: Идентифицира основния дизайн на глинения съд.
    filament_style:
      name: Стил на филамента
      description: Определя вътрешната конфигурация на нажежаемата жичка, която влияе
