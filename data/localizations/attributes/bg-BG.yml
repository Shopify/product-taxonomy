    brush_material:
      name: Материал на четката
      description: Указва вида на материала, използван в конструкцията на четката,
        напр. силикон или пластмаса
    brush_size:
      name: Размер на четката
      description: Указва размера на художествена четка, напр. 0, 12
    brush_type:
      name: Тип четка
      description: Указва материала, използван в четката за бръснене, напр. синтетичен
