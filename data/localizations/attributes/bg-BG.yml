    camera_display_technology:
      name: Технология на дисплея на камерата
      description: Указва технологията на екрана на камерата, напр. OLED, Super AMOLED
    camera_features:
      name: Функции на камерата
      description: Идентифицира специалните възможности на камерата, като стабилизиране
