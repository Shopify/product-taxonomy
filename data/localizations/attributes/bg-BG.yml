    mobility_scooter_type:
      name: Тип мобилен скутер
      description: Прави разлика между различни видове скутери за придвижване, напр.
        преносими, 3-колесни
    mobility_type:
      name: Тип мобилност
      description: Показва стила на основата, който влияе на мобилността, разграничавайки
        между стационарни крачета, колелца или взаимозаменяеми опции
    model_control_technology:
      name: Технология за контрол на модела
      description: Указва вида на системата за управление за модели на влакове, като
        безжична или цифрова
    model_gender_representation:
      name: Полово представяне на модела
      description: Посочва дали човешкият модел изобразява мъжка, женска, или унисекс
        анатомия
    model_train_accessory_type:
      name: Тип аксесоар за макет на влак
      description: Категоризира аксесоари за макет на влак, като осветление или декорационни
        материали
    model_train_theme:
      name: Тема за макет на влак
      description: Идентифицира обстановката или епохата на макет на влак, като например
        модерен или научна фантастика
    modem_form_factor:
      name: Типоразмер на модема
      description: Описва физическия стил на дизайна на модема (напр. USB миниадаптер,
        настолно устройство, M.2 модул).
    modem_technology:
      name: Технология на модема
      description: Определя основния проводник за предаване или мрежова технология,
        която модемът използва за достъп до мрежата на доставчика на услуги (напр.
        кабел/DOCSIS, DSL, клетъчна)
    modulation_method:
      name: Метод на модулация
      description: Указва техниката, използвана за модифициране на сигнал в електронни
        устройства, като AM или PCM
    moisturizer_type:
      name: Тип овлажнител
      description: Идентифицира времето за използване на овлажнителя, като целодневен
