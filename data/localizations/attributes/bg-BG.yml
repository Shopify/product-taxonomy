        или двуфазен
    phone_camera_position:
      name: Позиция на камерата на телефона
      description: Показва физическата позиция или функция на модула на камерата в
        телефона
    phone_card_delivery_format:
      name: Формат за предоставяне на телефонна карта
      description: Показва дали предплатеният кредит се предоставя като физическа
        скреч карта или като цифров код/ваучер.
    phone_skin_coverage:
      name: Покритие на външния слой на телефон
      description: Указва кои части на телефона външният слой или обвивката е проектирана
        да покрива
    phone_strap_accessories_included:
      name: Включени са аксесоари за каишка за телефон
      description: Изброява допълнителните компоненти, доставени с комплекта висулка
        или каишка, като например адаптер, калъф за телефон, чантичка или гривна.
    photo_effects_type:
      name: Тип фото ефекти
      description: Идентифицира типа фотоефекти, които камерата може да произведе,
        напр. винтидж, сепия
    photographic_chemical_form:
      name: Форма на фотографски химикали
      description: Идентифицира формата на фотографски химикали, като прах или течност
    photographic_paper_size:
      name: Размер на фотографска хартия
      description: Указва размерите на фотографската хартия, като например 4" x 6"
        или A3
    photographic_paper_type:
      name: Тип фотографска хартия
      description: Указва типа на използваната фотографска хартия, като например сатенирана
        или метализирана
    piano_additional_features:
      name: Допълнителни функции на пиано
      description: Подчертава допълнителни функции на пиана, като вградени високоговорители
        или метроном
    piano_pedals:
      name: Педали за пиано
      description: Идентифицира типа педали на пиано, като състейн или состенуто
    piano_size:
      name: Размер на пиано
      description: Определя вида и размера на пианото, например детски роял или вертикално
        пиано
    pick_design:
      name: Дизайн на перце
      description: Идентифицира дизайна на перца за китара, напр. сълза, Jazz III
    pickup_design:
      name: Дизайн на пикап
      description: Идентифицира дизайна на пикапа в струнни инструменти, като постоянен
        или временен
    pickup_mounting_type:
      name: Тип монтаж на пикап
      description: Указва метода за монтиране на китарен пикап, като например залепване
        или закрепване
    pickup_position:
      name: Позиция на пикап
      description: Посочва къде е разположен пикапът на електрическата китара, напр.
        мост, гриф
    pickup_type:
      name: Тип пикап
      description: Указва стила на китарните пикапи, например магнитни или активни
    pig_feed_stage:
      name: Етап на хранене на свине
      description: Идентифицира жизнения етап на свинете, за които е предназначен
        фуражът, като производител или стартер
    pile_type:
      name: Тип влакно
      description: Определя текстурата и стила на килими, мокети и рогозки; напр.
        плюш, бербер
    pillbox_schedule:
      name: График на кутията за хапчета
      description: Описва времевия режим или схема за етикетиране, за която е предназначена
        кутията за хапчета (напр. дневна, седмична, сутрин/вечер)
    pillow_shape:
      name: Форма на възглавница
      description: Определя формата или контура на възглавница за кърмене, като U-образна
    pin_size:
      name: Размер на игла
      description: Указва размера на безопасните игли, като 0 или 00
    pin_tip_type:
      name: Тип връх на фиба
      description: Описва дизайна на върховете на фибата, което влияе върху комфорта,
        безопасността и задържането
    pinata_design:
      name: Дизайн на пинята
      description: Описва визуалната тема на пинята, като традиционна или животинска
    pinball_machine_edition:
      name: Версия на машината за флипер
      description: Идентифицира специфичното производствено или колекционерско ниво
        на версията на машината за флипер
    pinball_machine_format:
      name: Форма на машината за флипер
      description: Определя физическата или дигитална форма на продукта (напр. механичен,
        виртуален, настолен, комплект)
    ping_pong_equipment_included:
      name: Включено оборудване за пинг-понг
      description: Указва вида оборудване за пинг-понг, включено в комплекта, като
        мрежа или ракети за пинг-понг
    ping_pong_robot_features:
      name: Функции на робота за пинг-понг
      description: Описва функционалностите на робот за пинг-понг, като групиране
        на упражнения или дистанционно управление
    pipe_clamp_design:
      name: Дизайн на тръбна скоба
      description: Описва конструкцията на тръбна скоба, като щракаща или C-скоба
    pipe_shape:
      name: Форма на лула
      description: Определя формата на лулите за пушене, например кратунка, билярд
    placement_supported:
      name: Поддържано разположение
      description: Идентифицира къде продуктът може да бъде монтиран или използван,
        напр. стена, под
    plan_service_type:
      name: Тип услуга на плана
      description: Определя дали SIM планът е само за данни или включва гласови и/или
        SMS услуги.
    plant_characteristics:
      name: Характеристики на растения
      description: Определя специфични характеристики на растенията, напр. цъфтеж,
        ядливост
    plant_class:
      name: Клас растения
      description: Класифицира растенията в специфични таксономични групи, напр. liliopsida,
        brassicales
    plant_material:
      name: Растителен материал
      description: Указва дали растителните материали са живи, консервирани или изкуствени
    plant_name:
      name: Име на растение
      description: Идентифицира ботаническото или общоприетото име на растението,
        като роза, босилек или краставица
    plant_stage:
      name: Етап на растение
      description: Идентифицира специфичната фаза от цикъла на растеж на растението,
        която продуктът е предназначен да поддържа, напр. разсад, вегетация
    plant_support_material:
      name: Материал за поддържка на растения
      description: Указва материала, използван в клетките или подпорите за растения,
        като теракота или камък
    plate_type:
      name: Тип плоча
      description: Идентифицира вида на пластината в инструментите за оформяне на
        коса, напр. титан, керамика
    play_equipment_items_included:
      name: Включени артикули за игрално оборудване
      description: Изброява допълнителните елементи, включени в оборудването за игра,
        като висящи играчки или огледало
    play_slide_design:
      name: Дизайн на възпроизвеждане на слайд
      description: Описва дизайна на възпроизвеждане на слайд, като спирала или тръба
    play_vehicle_propulsion:
      name: Задвижване на превозно средство за игра
      description: Идентифицира как се захранва превозно средство за игра, като например
        чрез триене или дистанционно управление
    play_yard_design_features:
      name: Характеристики на дизайна на кошарата за игра
      description: Идентифицира специалните характеристики на кошарата за игра, като
        мрежести страни или джобове
    playback_disc_formats:
      name: Дискови формати за възпроизвеждане
      description: Определя дисковите формати, съвместими с DVD или Blu-Ray плейър;
        например CD аудио, JPEG
    playback_speed_supported:
      name: Поддържани скорости на възпроизвеждане
      description: Изброява скоростите на ротация на записите, с които грамофонът
        или касетофонът може да работи
    player/recorder_specialized_features:
      name: Специализирани функции за плейър/рекордер
      description: Подчертава специфични функции на видео плейъри или рекордери, като
        например захранван с AI или родителски контрол
    player_drive_type:
      name: Тип задвижване на плейъра
      description: Указва механизма, който върти плейъра, като например ремък или
        накрайник
    player_position:
      name: Позиция на играч
      description: Указва позицията на играча, за която е предназначен продуктът,
        напр. вратар, полузащитник
    player_specialized_features:
      name: Специализирани функции на плейъра
      description: Идентифицира уникалните възможности на видео плейърите, като поддръжка
        на 4K или поддръжка на HDR
    playhouse_design:
      name: Дизайн на къща за игра
      description: Указва типа къща за игра, като например къща на дърво или къща
        за игра на под
    playset_features:
      name: Характеристики на комплекта за игра
      description: Подчертава специални аспекти на комплект за игра, напр. ограничено
        издание, водоустойчивост
    plug_type:
      name: Тип щепсел
      description: Идентифицира регионалната съвместимост на щепсел, напр. САЩ, Франция
    plug_type_input:
      name: Тип щепсел (вход)
      description: Указва щепсела, който може да поеме захранващ адаптер или преобразувател,
        въз основа на кода на държавата или територията; например САЩ, ЕС
    plug_type_output:
      name: Тип щепсел (изход)
      description: Указва щепсела, който захранващ адаптер или преобразувател може
        да поеме като изход, въз основа на кода на държавата или територията; например
        САЩ, ЕС
    plumbing_primer_application:
      name: Нанасяне на водопроводен грунд
      description: Указва къде може да се използва водопроводен грунд, например върху
        тръби или фитинги
    plumbing_trap_design:
      name: Дизайн на водопроводен сифон
      description: Указва вида на водопроводния сифон, като барабан или бутилка
    plunger_shape:
      name: Форма на бутало
      description: Указва формата на главата на буталото, като чаша или акордеон
    plywood_grade:
      name: Клас шперплат
      description: Указва класификацията на шперплата за строителни материали, като
        клас C или D
    pneumatic_conveyor_operation:
      name: Работа с пневматичен конвейер
      description: Идентифицира режима на работа на пневматичните конвейери, като
        еко фаза или плътна фаза
    poe_standard:
      name: PoE стандарт
      description: Идентифицира протокола Power over Ethernet (PoE), към който се
        придържа продуктът; например пасивен, IEEE 802.3af
    point_design:
      name: Точков дизайн
      description: Описва стила на върха на офис консумативи като щифтове или игли,
        напр. остър, тъп
    pointing_device:
      name: Посочващо устройство
      description: Определя устройството, използвано за навигация на екрана на компютъра,
        например бутони на мишката, тъчпад
    polar_pattern:
      name: Модел на полярност
      description: Показва ориентацията за улавяне на звука на микрофон, като например
        многопосочен или кардиоиден
    polarity_configuration:
      name: Конфигурация на полярността
      description: Описва вътрешното подреждане на полярността, подходящо за LED,
        дисплейни модули и подобни устройства
    polarization:
      name: Поляризация
      description: Определя посоката на вълната на антените, напр. вертикална, кръгла
    pole/post_material:
      name: Материал за стълб/кол
      description: Указва конструктивния материал на коловете за чадъри, като фибростъкло
        или стомана
    pole_color:
      name: Цвят на прът
      description: Определя цвета на пръта в продукти като чадъри, напр. черен, бронзов.
    pole_material:
      name: Материал на стълба
      description: Указва материала, използван в конструкцията на стълба, напр. стомана,
        дърво
    pole_pattern:
      name: Модел на стълб
      description: Описва дизайна или мотива върху стълба на чадър, като например
        флорален или геометричен
    policy_sign_design:
      name: Дизайн на табела за политики
      description: Описва конкретното съобщение, което се показва на табела за политика,
        напр. забранено пушене, забранени мобилни телефони
    polish_dry_form:
      name: Форма сушене на лак
      description: Идентифицира формулата на продуктите за сушене на лак за нокти,
        напр. на основата на разтворители, на основата на силикон
    polish_remover_form:
      name: Форма на лакочистител
      description: Указва вида на продукта за премахване на лак за нокти, напр. течност,
        обвивки за премахване
    polish_remover_formulation:
      name: Формула на лакочистителя
      description: Показва химическия състав на лакочистителя, особено съдържанието
        на ацетон или алтернативни основи
    polish_type:
      name: Тип лак
      description: Идентифицира специфичния тип лак, използван за грижа за плавателни
        съдове, като метал или винил
    polyphony:
      name: Полифония
      description: Определя капацитета на синтезатора за едновременна употреба на
        ноти, напр. полифоничен, мултитимбрален
    portability:
      name: Преносимост
      description: Указва лекотата на преместване или носене на продукт, обикновено
        за помпи за кърма; например преносим, компактен размер
    post_material:
      name: Материал за стълб
      description: Указва вида на материала за стълбове в различни категории, напр.
        алуминий или фибростъкло
    postage_stamp_features:
      name: Характеристики на пощенската марка
      description: Идентифицира специални характеристики на пощенските марки, като
        надпечат или воден знак
    postpartum_stage:
      name: Следродилен етап
      description: Определя времевия период след раждането, за която е предназначена
        превръзката
    potential_extract:
      name: Потенциален екстракт
      description: Показва потенциалното ниво на екстракт в пивоварните зърна и малцове,
        като ниско или високо
    pottery/sculpting_project_type:
      name: Тип проект за керамика/скулптура
      description: Идентифицира конкретния тип проект за керамика или скулптура, като
        моделиране или правене на маска
    potty/toilet_seat_design:
      name: Дизайн на гърне/тоалетна седалка
      description: Определя стила или структурата на гърнето или тоалетната седалка,
        като сгъваема или стандартна
    potty_training_kit_components:
      name: Компоненти на комплект за проучаване към гърне
      description: Посочва артикули, включени в комплект за приучаване към гърне,
        напр. стикери, столче за стъпване
    power_connector_type:
      name: Тип захранващ конектор
      description: Определя помощните захранващи конектори, изисквани или предоставени
        от райзъра или адаптера
    power_conversion_semiconductor_type:
      name: Тип полупроводник за преобразуване на мощност
      description: Идентифицира основния полупроводников материал, използван в етапа
        на захранване на зарядното устройство, което влияе на размера, ефективността
        и генерирането на топлина
    power_source:
      name: Източник на захранване
      description: Указва източника на енергия, който продуктът използва за работа,
        като слънчева енергия или батерии
    power_supply_efficiency_rating:
      name: Оценка на ефективността на захранването
      description: Посочва нивото на сертификация за ефективност 80 Plus на захранващото
        устройство на настолния компютър
    power_supply_form_factor:
      name: Типоразмер на захранването
      description: Определя физическия размер и стандарта за свързване на захранващото
        устройство (напр. ATX, SFX)
    power_supply_modularity:
      name: Модулност на захранването
      description: Показва дали кабелите на захранващото устройство са неизваждаеми,
        частично изваждаеми, или напълно изваждаеми
    pregnancy_test_sensitivity:
      name: Чувствителност на теста за бременност
      description: Указва способността на теста да идентифицира бременност, напр.
        ранно откриване, стандартно откриване
    prescription_status:
      name: Статус, свързан с рецепта
      description: Показва дали ушните капки са налични без рецепта, или изискват
        рецепта от здравен специалист
    presentation_supply_features:
      name: Характеристики на доставката на презентация
      description: Описва уникалните характеристики на консумативите за презентации,
        като например регулируема височина или изтриваема повърхност
    preservation_type:
      name: Вид консервация
      description: Идентифицира метода, използван за запазване на лабораторни образци,
        като фиксирани или изсушени
    pretend_electronics_toy_type:
      name: Мнима електроника тип играчка
      description: Указва категорията на мнимата електроника, напр. камера, мобилен
        телефон
    pretend_housekeeping_toy_type:
      name: Мнима домакинска играчка
      description: Идентифицира вида играчка за домакинство, като комплект за почистване
        или кухненски уред
    primary_pcie_slot_version:
      name: Версия на основния PCIe слот
      description: Показва поколението PCI Express, поддържано от основния x16 слот,
        обикновено използван за графични карти
    primary_region:
      name: Основен регион
      description: Указва основния пазар или местоположение за софтуер или облачна
        услуга, напр. Северна Америка, Азиатско-тихоокеански регион
    primer_use:
      name: Използване на грунд
      description: Указва функцията на грунд, като основна боя или уплътнител
    print_orientation:
      name: Ориентация на печата
      description: Идентифицира от коя страна на материала е отпечатана графиката
    print_server_form_factor:
      name: Типоразмер на сървъра за отпечатване
      description: Показва физическия дизайн на сървъра за отпечатване (например външна
        кутия, вътрешна карта, USB миниадаптер)
    print_technology:
      name: Печатна технология
      description: Указва процеса, използван от принтер, като мастиленоструен или
        лазерен
    printer/copier_specialized_features:
      name: Специализирани функции за принтер/копирна машина
      description: Подчертава специфични функции на принтери/копирни машини, като
        поддръжка за мобилен печат или гласово управление
    printer_accessories_included:
      name: Включени аксесоари за принтер
      description: Подробности за допълнителните компоненти, включени в принтер, копирна
        машина или факс; напр. тава за хартия, фюзер
    printer_color_capability:
      name: Възможност за цветен печат на принтера
      description: Указва дали устройството печата само в монохромен режим, или поддържа
        пълноцветен печат и копиране
    printer_connection_interface:
      name: Интерфейс за връзка с принтера
      description: Определя вида на порта, който сървърът за отпечатване използва
        за свързване към принтера
    printer_form_factor:
      name: Типоразмер на принтера
      description: Класифицира физическия стил или преносимостта на устройството
    printer_functions:
      name: Функции на принтера
      description: Определя възможностите на принтери, копирни машини и факс машини;
        например сканиране, печат на снимки
    printing_color:
      name: Цветен печат
      description: Определя цветовия изход на тонер и мастиленоструйни касети, напр.
        черен, циан
    printing_method:
      name: Метод на печат
      description: Указва процеса на печат, като офсетов печат или гравиране
    privacy_filtering_direction:
      name: Посока на филтриране за поверителност
      description: Показва от кои посоки на гледане филтърът блокира видимостта (напр.
        двупосочен хоризонтален, четирипосочен)
    processor_cores:
      name: Процесорни ядра
      description: Показва броя на ядрата в процесора на компютъра, напр. двоен
    processor_family:
      name: Семейство процесори
      description: Идентифицира серията или марката на процесора на електронното устройство,
        напр. Intel Core i7
    processor_socket:
      name: Гнездо за процесор
      description: Указва съвместим тип гнездо за процесор в електрониката, като LGA
        1151 (гнездо H4) или Гнездо AM4
    processor_technology:
      name: Процесорна технология
      description: Определя процесорна технология, обикновено за аудио оборудване;
        напр. базиран на софтуер, тръба/клапан
    product_benefits:
      name: Ползи на продукта
      description: Описва ползите, които даден продукт предлага, обикновено за здравето
        и красотата; например изглаждане, стягане
    product_certifications_standards:
      name: Продуктови сертификати и стандарти
      description: Показва сертификатите или стандартите, на които отговаря даден
        продукт, като органичен или без жестокости над животни
    product_classification:
      name: Класификация на продукта
      description: Категоризира вида на ценния материал, валутата или ценния предмет
        (напр. валута, кюлчета, скъпоценни камъни, подаръчна карта, NFT)
    product_form:
      name: Форма на продукт
      description: Определя формата или представянето на продукт, обикновено за здраве
        и красота; например лосион, серум
    product_format:
      name: Форма на продукта
      description: Показва дали артикулът се доставя като физически продукт, или като
        дигитално изтегляне
    product_formulation:
      name: Формулировка на продукт
      description: Идентифицира състава на строителните консумативи, например основно
        вещество, готова смес
    product_manual_area:
      name: Област на ръководството на продукта
      description: Указва темата на ръководството за продукта, напр. камера и оптика,
        офис консумативи
    product_sterility:
      name: Стерилност на продукта
      description: Показва дали продуктът е стерилен за здравето и безопасността
    product_use:
      name: Употреба на продукта
      description: Идентифицира основното предназначение или употреба на ценни материали
        или колекционерски предмети (напр. валута/законно платежно средство, колекционерски
        предмет, бижута, подаръчна карта)
    program_format:
      name: Формат на програмата
      description: Описва оформлението на програмите за събития, като брошура или
        единичен лист
    projection_design:
      name: Прожекционен дизайн
      description: Описва шаблона или изображението, прожектирано от филтър за осветление
        или гобо, като текст или лого
    projector_light_source:
      name: Източник на светлина за проектор
      description: Идентифицира типа източник на светлина в проектор, като LED или
        лазер
    prop_theme:
      name: Тема на реквизит
      description: Идентифицира стила или жанра на филмовия и телевизионния реквизит,
        като исторически или научно-фантастичен
    propane_application:
      name: Приложение на пропан
      description: Указва предназначението на пропана, като отопление или скара
    propeller_blade_design:
      name: Дизайн на лопатките на витлото
      description: Описва конфигурацията на лопатките на витлото на плавателен съд,
        като 3-лопатков или 4-лопатков
    prophy_cup_design:
      name: Дизайн на чашки за полиране
      description: Описва дизайна на чашки за полиране, използвани в стоматологията,
        като четки или оребрени
    propulsion_type:
      name: Тип задвижване
      description: Указва метода на движение за външно оборудване, напр. бутане, теглене
    protected_component:
      name: Защитен компонент
      description: Идентифицира частта на машината за флипер, която покритието защитава
    protection_type:
      name: Тип защита
      description: Идентифицира нивото на защита, предлагано от предпазни средства,
        като тип I или тип II
    protective_gear_features:
      name: Характеристики на защитната екипировка
      description: Идентифицира уникалните характеристики на защитната екипировка,
        като например удароустойчивост или против запотяване
    protective_mask_design:
      name: Дизайн на защитна маска
      description: Определя дизайна на защитни маски, като цяло лице или полумаска
    protective_mask_features:
      name: Характеристики на защитната маска
      description: Подробности за уникалните характеристики на защитните маски, като
        регулируема презрамка или клапан
    protein_processing_type:
      name: Тип обработка на протеин
      description: Посочва как протеинът е рафиниран или обработен (напр. изолат спрямо
        концентрат), влияещ върху чистотата, скоростта на усвояване и предпочитанието
        на потребителя
    protein_source:
      name: Източник на протеин
      description: Идентифицира основния протеинов произход, използван в добавката
    pstn_connectivity_options:
      name: PSTN опции за свързване
      description: Указва интерфейсите на обществената комутируема телефонна мрежа
        (PSTN), които продуктът поддържа, напр. FXO, POTS
    publication_frequency:
      name: Честота на публикуване
      description: Показва колко често се публикува списание или вестник, като например
        ежедневно или месечно
    publication_type:
      name: Тип публикация
      description: Идентифицира вида на академична или изследователска публикация,
        като например статия в списание или дисертация
    pull_up_bar:
      name: Лост за набиране
      description: Указва вида на захвата на фитнес оборудването, като стандартен
        или необработен
    pump_accessories:
      name: Аксесоари за помпа
      description: Идентифицира артикули, включени в помпите за кърма, като чанта
        за носене или бутилки
    pump_speed_settings:
      name: Настройки на скоростта на помпата
      description: Указва функциите за контрол на скоростта, обикновено за помпи за
        кърма; например регулируема скорост
    punching/training_bag_material:
      name: Материал за боксов чувал/боксова круша
      description: Идентифицира основния материал, използван в боксов чувал или боксова
        круша, като например кожа или брезент
    puppet_theme:
      name: Тема на кукли
      description: Категоризира кукли въз основа на темата на дизайна им, като човешки
        или фантастични
    puppet_type:
      name: Тип кукли
      description: Идентифицира стила на куклата, като кукла за ръка или марионетка
    push_button_terminal_type:
      name: Тип клема на бутона за натискане
      description: Определя стила на електрическото свързване на бутона, осигурявайки
        съвместимост с кабелните снопове и клемите за бързо свързване по време на
        инсталация
    puzzle_theme:
      name: Тема на пъзел
      description: Описва основния предмет или мотив на пъзел, като животни или космос
    puzzle_type:
      name: Тип пъзел
      description: Идентифицира конкретния тип пъзел, като 3D или загадка за мозъка
    quiver_style:
      name: Стил на колчан
      description: Указва стила на колчана при стрелба с лък, например бедро, гръб
    rack_design:
      name: Дизайн на стойка
      description: Описва оформлението или структурата на стъклена стойка, като отворена
        или с отделение
    rack_format:
      name: Форма на стойката
      description: Определя физическия корпус или стандарт за размер на каналната
        лента за поставяне на стойка или работна повърхност
    rack_mounting_style:
      name: Стил на монтаж на стойката
      description: Описва структурния стил на монтаж на стойката (напр. фиксиран рафт,
        плъзгащ се рафт, релси, празен панел)
    rack_type:
      name: Тип багажник
      description: Идентифицира стила на багажника на автомобила, като за багажник
        или за покрив
    rack_width_standard:
      name: Стандарт за ширина на стойката
      description: Определя индустриалния стандарт за хоризонтална монтажна ширина,
        който продуктът следва
    racket_balance:
      name: Баланс на ракета
      description: Показва разпределението на теглото на ракета, напр. с тежка глава,
        равномерен баланс
    racket_gauge:
      name: Габарит на ракета
      description: Указва дебелината на кордата на тенис ракетата, напр. 16
    racket_head_shape:
      name: Форма на главата на ракета
      description: Определя формата на главата на ракетата, например овална, изометрична
    racket_material:
      name: Материал на ракета
      description: Указва вида на материала, от който е направена спортната ракета,
        като дърво или въглеродни влакна
    racket_string_design:
      name: Дизайн на корда за ракета
      description: Идентифицира конструкцията на кордата в тенис ракети, като моновлакна
        и мултивлакна
    racket_string_material:
      name: Материал на кордата на ракетата
      description: Указва състава на кордата за тенис ракети, като кевлар или полиуретан
        (PU)
    radar_bands:
      name: Радарни ленти
      description: Указва честотните ленти, които радарното устройство може да открие,
        напр. X, K
    radar_technology:
      name: Радарна технология
      description: Указва радарната технология, използвана в даден продукт, напр.
        импулсна, твърдотелна
    radio_case_design:
      name: Дизайн на калъф за радио
      description: Определя стила или функционалността на калъфите за носене на радиото,
        като фиксирани или въртящи се
    radio_features:
      name: Функции на радио
      description: Указва уникалните възможности на радиото, като поддръжка на GPS
        или възпроизвеждане на MP3
    radio_form_factor:
      name: Типоразмер на радиото
      description: Идентифицира физическия клас на любителския приемопредавател, влияещ
        върху опциите за монтиране, изискванията за захранване и типичните сценарии
        на използване
    radio_scanner_form_factor:
      name: Типоразмер на радиоскенера
      description: Показва физическата конфигурация или стил на монтиране на радиоскенера
        (например преносим, базов, настолен, монтиран на превозно средство)
    radiology_compatibility:
      name: Съвместимост с радиология
      description: Показва дали ортезата може да остане върху пациента по време на
        образни процедури (напр. ЯМР, компютърна томография, рентген)
    raid_levels_supported:
      name: Поддържани RAID нива
      description: Изброява всички RAID конфигурации, които масивът от твърди дискове
        може да създава или управлява
    ramp_type:
      name: Тип рампа
      description: Указва дизайна или стила на рампите за скейтборд, като халфпайп
        или fun box
    range_type:
      name: Тип диапазон
      description: Определя зоната на покритие на устройства като бебефони, като например
        с дълъг диапазон
    rarity:
      name: Рядкост
      description: Указва уникалността на артикули, обикновено за колекционерски предмети;
        например ограничено издание, изключително рядко
    razor_flexibility:
      name: Гъвкавост на бръснача
      description: Показва гъвкавостта на бръсначите и тримерите, например гъвкави
        или фиксирани
    razor_head_design:
      name: Дизайн на глава на самобръсначка
      description: Определя броя на ножчетата в една самобръсначка, например единична,
        тройна
    razor_type:
      name: Тип самобръсначка
      description: 'Указва дизайна на самобръсначката, напр. права или синтетична '
    read/write_speed:
      name: Скорост на четене/запис
      description: Показва скорост или скорост на трансфер на данни, обикновено за
        дискови дубликатори; например 4x, 52x
    reading_toy_type:
      name: Тип играчка за четене
      description: Указва вида на образователната играчка за четене, напр. игра за
        правопис, таблет за четене
    receipt_paper_features:
      name: Характеристики на хартията за разписки
      description: Идентифицира уникални характеристики на хартията за разписки като
        индикатор за край на ролката или предварително отпечатано лого
    reclining_function:
      name: Функция за легнало положение
      description: Описва специфични функции за легнало положение, като пълно легнало
        положение или нулева гравитация
    recommended_age_group:
      name: Препоръчителна възрастова група
      description: Идентифицира подходящата възрастова група за продукт, обикновено
        играчки и игри; например бебета, тийнейджъри
    recommended_skill_level:
      name: Препоръчително ниво на умения
      description: Указва ниво на умения, напр. начинаещи, експерти
    recommended_use:
      name: Препоръчителна употреба
      description: Идентифицира основната употреба или домейн, за който е проектиран
        хардуерен продукт, например индустриален, жилищен
    record_cleaning_components_included:
      name: Включени компоненти за почистване на плочи
      description: Изброява специфичните елементи, осигурени в комплекта, така че
        клиентите могат да сравняват пакетите с един поглед (например четка, течност,
        кърпа)
    recorder_fingering_system:
      name: Система за пръсти за блокфлейта
      description: Указва типа система за пръсти за блокфлейта, напр. немска, барок
    recorder_specialized_features:
      name: Специализирани функции на рекордер
      description: Идентифицира разширени функции във видеорекордерите, напр. интелигентни,
        поддръжка на Dolby Atmos
    recording_accessories_included:
      name: Включени аксесоари за запис
      description: Подробности за допълнителните компоненти, включени в пакетите за
        запис, като слушалки или микрофон
    recording_capability_type:
      name: Тип възможност за запис
      description: Показва дали приемникът може да записва телевизионно съдържание
        и използвания метод (напр. USB PVR, вътрешен твърд диск HDD, облак)
    recording_functionality:
      name: Функционалност за записа
      description: Показва дали и как приемникът може да записва телевизионно съдържание
        (например DVR към вътрешен твърд диск HDD, външен USB)
    recording_mode:
      name: Режим на запис
      description: Изброява оперативните режими, които рекордерът поддържа (напр.
        непрекъснат, планиран запис)
    recording_quality:
      name: Качество на записа
      description: Описва яснотата на звука на транскрибиращите устройства и системите
        за диктовка, като например ниска или висока
    recording_speed_modes_supported:
      name: Поддържани режими на скорост на запис
      description: Изброява режимите на скорост на лентата, които видеокасетофонът
        може да записва или възпроизвежда, влияещи върху времето за запис и качеството
        на картината
    recreational_vehicle_type:
      name: Тип кемпер
      description: Идентифицира категорията на кемпера, като клас А или ремарке за
        пътуване
    reed_strength:
      name: Сила на гъдулка
      description: Показва гъвкавостта на дървените духови гъдулки, като мека, средна
        или твърда
    reel_capacity:
      name: Капацитет на макара
      description: Указва капацитета на макара в резервоар за проявяване, като единична
        или четворна
    reflector_design:
      name: Дизайн на отразител
      description: Описва дизайна на светкавичен отразител, като пчелна пита или чадър
    regenerative_braking_features:
      name: Функции за регенеративно спиране
      description: Описва характеристиките на EV регенеративни спирачни модули, напр.
        устойчивост на атмосферни влияния, лесен за монтаж
    region:
      name: Регион
      description: Идентифицира конкретното местоположение, от което продуктът е първоначално,
        обикновено за вино и спиртни напитки; например Калифорния, Бордо
    region_code:
      name: Регионален код
      description: Указва региона, където софтуерът за видеоигри е лицензиран за използване,
        като например Азия (AS) или Глобално (GL)
    release_mechanism:
      name: Механизъм на освобождаване
      description: Показва технологията за доставка или усвояване на витамина (напр.
        забавено освобождаване, липозомно, дъвчащо)
    release_schedule:
      name: График на издаване
      description: Указва колко често се пускат нови епизоди или актуализации, напр.
        ежеседмично, на две седмици
    remote_control_functions:
      name: Функции за дистанционно управление
      description: Изброява конкретните действия, които дистанционният затвор може
        да задейства, освен правенето на снимки.
    remote_shutter_form_factor:
      name: Типоразмер на дистанционния затвор
      description: Идентифицира физическия стил или корпус на дистанционното управление,
        като например ключодържател/бутон, пръстен за управление или селфи стик с
        вграден затвор.
    remote_technology:
      name: Дистанционна технология
      description: Идентифицира технологията, използвана в дистанционните управления
        на камерата, като Bluetooth или с тетъринг
    removable_storage_formats_supported:
      name: Поддържани преносими формати за съхранение
      description: Определя преносими формати за съхранение, с които устройството
        е съвместимо, напр. SD, microUSB
    removal_target:
      name: Цел на средството за премахване
      description: Определя кои продукти за нокти средството за премахване е предназначено
        да разтваря (напр. гел лак, акрилни нокти, прохообразен лак)
    replacement_lamp_type:
      name: Тип резервна лампа
      description: Класифицира стила на осигурената резервна част (например модул
        лампа и корпус, LED лента за подсветка, CCFL сглобка)
    reptile/amphibian_food_form:
      name: Форма на храна за влечуги и земноводни
      description: Указва формата на храна за влечуги/земноводни, например сухо-замразени
        или пелети
    reptile/amphibian_habitat_supply_type:
      name: Тип захранване на местообитания на влечуги и земноводни
      description: Идентифицира типа захранване за отопление или осветление за местообитания
        на влечуги/земноводни, като нагревателна лампа или UVB лампа
    research_focus:
      name: Изследователски фокус
      description: Идентифицира основната област на обучение в академични статии,
        като биология или икономика
    research_methodology:
      name: Методология на изследване
      description: Идентифицира типа изследователски методи, използвани в академични
        статии, като проучване или качествен
    resistance_level:
      name: Ниво на съпротивление
      description: Показва нивото на съпротивление на продукта, обикновено за ластици
        за упражнения; например много тежък
    resistance_system:
      name: Система за съпротивление
      description: Определя механизма, използван за създаване на съпротивление във
        фитнес оборудване, напр. вода, въздух
    resistance_tolerance:
      name: Толеранс на съпротивлението
      description: Определя допустимото отклонение на действителното съпротивление
        от номиналната му стойност, изразено като процент (например ±1%)
    restrictor_gate_shape:
      name: Форма на ограничителната плоча
      description: Определя геометричната форма на ограничителната плоча, включена
        или изисквана от джойстика
    result_display:
      name: Показване на резултата
      description: Указва формата на теста за бременност, напр. линеен, цифров
    retail/sale_sign_design:
      name: Дизайн на табела за търговия на дребно/разпродажба
      description: Показва вида на съобщението върху знаци за продажба на дребно или
        разпродажба, напр. разпродажба, специална оферта
    reticle_plane:
      name: Равнина на мерника
      description: Указва фокалната равнина на мерника в оръжейни мерници и мерници,
        напр. първа или втора
    reticle_type:
      name: Тип мерник
      description: Идентифицира вида на мерника в оръжейни мерници, като Duplex или
        Mildot
    rewinder_operation_mode:
      name: Режим на работа на машината за пренамотка
      description: Определя функционалните режими, които машината за пренамотка поддържа
        (напр. само превъртане, превъртане и бързо напред).
    rf_output_standard:
      name: RF изходен стандарт
      description: Определя излъчвания телевизионен или радио стандарт, който модулаторът
        извежда
    rfid_frequency:
      name: RFID честота
      description: Указва работната честота на RFID продуктите, напр. ниска, свръхвисока
    riding_style:
      name: Стил на каране
      description: Уточнява предназначението или стила на каране за оборудване за
        зимни спортове, напр. слалом, свободен стил
    riding_toy_propulsion_type:
      name: Тип задвижване на играчка за яздене
      description: Идентифицира как се задвижва играчка за яздене, например електрическо
        или с педал
    rim/wheel_design:
      name: Дизайн на джанта/колело
      description: Описва стила или конструкцията на джанти/джанти на превозни средства,
        като алуминиеви или със спици
    ring_design:
      name: Дизайн на пръстен
      description: Описва стила на пръстен, като сватбен или единичен камък
    ring_size:
      name: Размер на пръстен
      description: Указва размера на пръстена, като L или 6,5
    rinse_requirement:
      name: Изискване за изплакване
      description: Изяснява дали почистващото средство трябва да се изплаква, може
        да се остави или е без изплакване (напр. мицеларна вода)
    rise_height_class:
      name: Класификация на височината на издигане
      description: Категоризира колко допълнителна височина добавя захвата за палец
        спрямо стандартния стик (напр. ниско издигане, средно издигане, високо издигане)
    riser_color:
      name: Цвят на тяло на лък
      description: Идентифицира цвета на тяло в лъкове за стрелба, като черен или
        син
    riser_material:
      name: Материал на тяло на лък
      description: Указва материала в лък или арбалет, като въглеродни влакна или
        дърво
    riser_pattern:
      name: Шарка на тяло на лък
      description: Описва дизайна или мотива върху тяло за лъкове и арбалети, като
        камуфлаж или текстура
    rivet_form:
      name: Форма на нит
      description: Описва формата на железарски нитове, напр. плътни, разделени
    road_sign_design:
      name: Дизайн на пътни знаци
      description: Идентифицира типа информация, показана на пътен знак, напр. стоп,
        ограничение на скоростта
    robe_style:
      name: Стил на халата
      description: Посочва общия вид дизайн или стил на изработка на халата, като
        халат за спа или за увиване
    rock_composition:
      name: Състав на скала
      description: Указва геоложкия състав на скала, като мрамор или варовик
    rock_formation:
      name: Скално образувание
      description: Уточнява геоложката класификация на скалите, като магмени или седиментни
    rocker_type:
      name: Тип извивка
      description: Определя стила на извиване на сноуборда или ските, например плосък,
        извит.
    rod_color:
      name: Цвят на въдица
      description: Идентифицира цвета на въдица, например черен или син
    rod_material:
      name: Материал на прът
      description: Идентифицира материала, използван в спортни стоки, базирани на
        пръти, като графит или фибростъкло
    rod_pattern:
      name: Шарка на въдица
      description: Описва дизайна или щампата върху въдица, като камуфлаж или райета
    rod_shape:
      name: Форма на прът
      description: Определя формата или конфигурацията на прътите за душ, напр. прави,
        U-образни
    roller_head:
      name: Ролкова глава
      description: Определя броя на главите на ролките, обикновено за инструменти
        за грижа за кожата; например единичен, двоен
    roller_material:
      name: Материал на ролер
      description: Указва материала, използван в ролер, обикновено за инструменти
        за грижа за кожата; например нефрит, силикон
    roller_type:
      name: Тип ролер
      description: Идентифицира типа ролер, обикновено за инструменти за грижа за
        кожата; напр. лед, микроигла
    roof_decor_shape:
      name: Форма на покривна декорация
      description: Определя дизайна или формата на покривните декорации, като кон
        или платноходка
    room_correction_technology:
      name: Технология за корекция на стаята
      description: Указва автоматичната акустична калибрация или системата за корекция
        на стаята, интегрирана в приемника
    rosin_form:
      name: Форма за колофон
      description: Описва формата или формата на колофон за лък за струнни инструменти,
        като блок или торта
    rosin_grade:
      name: Клас колофон
      description: Указва типа колофон, използван за струнни инструменти, напр. тъмен,
        среден
    rotating_direction:
      name: Посока на въртене
      description: Определя посоката на завъртане на свредлата и отвертките, като
        лява или дясна
    rotation_direction:
      name: Посока на въртене
      description: Показва дали пилата за нокти поддържа въртене напред, въртене назад
        или и двете
    rotator_control_technology:
      name: Технология за управление на ротатор
      description: Определя механизма за управление на ротаторите на антената, като
        ръчен или моторизиран
    route_of_administration:
      name: Път на приложение
      description: Идентифицира как продуктът се прилага или консумира, влияещ върху
        ефикасността и безопасността (напр. перорално, локално, трансдермален пластир,
        сублингвално, интрамускулна инжекция)
    rug/mat_features:
      name: Характеристики на килим/постелка
      description: Описва специални характеристики на килими/постелки, като противоплъзгаща
        основа или бързо съхнене
    rug/mat_material:
      name: Материал на килим/постелка
      description: Указва вида на материала, използван в постелките за упражнения,
        като PVC или корк
    rug/mat_shape:
      name: Форма на килим/постелка
      description: Указва формата на постелки и килими, напр. дълга, квадрат
    rug_features:
      name: Характеристики на килим
      description: Описва специфични характеристики на килими за дома или офиса, като
        противоплъзгаща основа или водоустойчив
    rug_material:
      name: Материал за килим
      description: Идентифицира материала, използван в конструкцията на килима, като
        вълна или юта
    rug_shape:
      name: Форма на килим
      description: Идентифицира геометричния дизайн на килими, като квадрат или дълъг
    rum_grade:
      name: Клас ром
      description: Класифицира рома въз основа на характеристики или клас, напр. премиум,
        с подправки
    saddle_base_color:
      name: Основен цвят на седалка
      description: Идентифицира основния цвят на основата на седалката на велосипед,
        като черен или син
    saddle_base_material:
      name: Материал за основата на седалка
      description: Идентифицира материала, използван в основата на велосипедно седло,
        като стомана или въглеродни влакна
    saddle_base_pattern:
      name: Шарка на основата на седалка
      description: Описва дизайна или отпечатъка върху основата на седалка на велосипед,
        като абстрактен или лого
    saddle_material:
      name: Материал на седалката
      description: Указва материала, използван в велосипедните седалки, като гума
        или кожа
    saddle_seat_color:
      name: Цвят на седалката
      description: Указва цвета на седалката на велосипед, като сребрист или червен
    saddle_seat_material:
      name: Материал на седалка
      description: Идентифицира материала, използван в конструкцията на седалка за
        велосипед, като кожа или найлон
    saddle_seat_pattern:
      name: Шарка на седалката
      description: Описва дизайна или щампа върху седалка на велосипед, като флорална
        или геометрична
    safety_certifications:
      name: Сертификати за безопасност
      description: Показва съответствието на продукта със стандартите за безопасност,
        обикновено за бебешки продукти; например без BPA
    safety_device_installation:
      name: Монтаж на предпазно устройство
      description: Определя как се монтират или закрепват продуктите за безопасност,
        напр. залепване, монтиране с винт
    safety_equipment_material:
      name: Материал за оборудване за безопасност
      description: Указва вида на материала в елементите за безопасност на превозното
        средство, като найлон или фибростъкло
    safety_rail_installation:
      name: Монтаж на предпазна релса
      description: Определя как се монтират предпазните релси, като регулируеми или
        постоянни
    sailboat_type:
      name: Тип платноходка
      description: Идентифицира специфичния дизайн или модел на платноходка, като
        шлюп или катер
    sandal_style:
      name: Стил сандал
      description: Определя стила на сандалите, като каишка на глезена или връзки
    sandblaster_application:
      name: Приложение на пясъкоструйка
      description: Определя предвидената функция на инструментите за пясъкоструене,
        като полиране или шлифоване
    sander_type:
      name: Тип шлайф
      description: Класифицира типа шлифовъчен инструмент, например лентов, орбитален
    sanding_application:
      name: Приложение за шлайфане
      description: Уточнява целта на аксесоарите за шлайфане, като довършителни работи
        или премахване на боя
    satellite_coverage_area:
      name: Зона на сателитно покритие
      description: Определя географските региони, до които сателитен телефон има достъп,
        като Австралия или Африка
    satellite_messaging_capability:
      name: Възможност за сателитни съобщения
      description: Показва дали продуктът поддържа едностранни (само изходящи) или
        двустранни (изпращане и получаване) сателитни съобщения
    satellite_navigation_systems_supported:
      name: Поддържани сателитни навигационни системи
      description: Указва кои глобални навигационни сателитни системи (GNSS) може
        да приема телефонът за позициониране и проследяване.
    satellite_network_type:
      name: Тип сателитна мрежа
      description: Идентифицира доставчика на услуги за сателитни телефони, напр.
        Inmarsat, Iridium
    sauna_accessories_included:
      name: Включени аксесоари за сауна
      description: Идентифицира допълнителните елементи, включени в сауната, като
        черпак или камъни за сауна
    scaffolding_mounting_type:
      name: Тип монтаж на скеле
      description: Указва стила на настройка на скелето, напр. рамка, подвижно
    scale_material:
      name: Материал на скала
      description: Идентифицира материала, използван в скала, обикновено шублер за
        дърво; например неръждаема стомана, пластмаса
    scale_model_accessory_type:
      name: Тип аксесоар за умален модел
      description: Идентифицира типа аксесоар за умалени модели, като сгради или фигури
    scale_model_kit_type:
      name: Тип комплект умален модел
      description: Указва категорията на комплекта умален модел, като танк или космически
        кораб
    scale_model_material:
      name: Материал за умален модел
      description: Идентифицира основния материал, използван в умалени модели, като
        дърво или картон
    scale_model_theme:
      name: Тема за умален модел
      description: Идентифицира темата на умален модел, като фентъзи или история
    scalp_concern:
      name: Проблем със скалпа
      description: Посочва основния проблем на скалпа или косата, за който третирането
        е формулирано
    scalpel_blade_material:
      name: Материал на острието на скалпела
      description: Идентифицира състава на остриетата на скалпел, като неръждаема
        стомана или титан
    scalpel_blade_number:
      name: Номер на острието на скалпела
      description: Идентифицира конкретния номер или тип острие на скалпела, като
        10 или 15A
    scalpel_blade_shape:
      name: Форма на острието на скалпела
      description: Описва формата на острието на скалпела, като извита или права
    scalpel_handle_number:
      name: Номер на дръжката на скалпела
      description: Идентифицира специфичния номер на дръжката за скалпели, като 4
        или 3L
    scan_converter_features:
      name: Функции на конвертора за сканиране
      description: Подчертава уникалните функции на конвертор за сканиране, като автоматично
        калибриране на изображението или дистанционно управление
    scanner_features:
      name: Функции на скенера
      description: Подчертава специални функции на скенер, като AI-задвижван или сканиране
        в облак
    scanner_grip_compatibility:
      name: Съвместимост на дръжката на скенера
      description: Показва дали калъфът пасва на скенери с дръжка тип пистолет/спусък,
        стандартна ръчна форма или и двете
    scanner_maintenance_kit_type:
      name: Тип комплект за поддръжка на скенер
      description: Класифицира естеството на продукта, така че купувачите да могат
        бързо да различават между почистващи карти, пълни комплекти, комплекти за
        калибриране, комплекти ролки, кърпички и разтвори
    scanner_sensor_type:
      name: Тип сензор на скенера
      description: Указва типа на сензора в скенери, като 2D изображение или лазер
    scarf/shawl_style:
      name: Стил шал
      description: Идентифицира стила на шалове и шалове, напр. одеяло, обвиващ
    scene_modes:
      name: Режими на сцена
      description: Определя режима на камерата за заснемане на различни сценарии,
        като нощ или под вода
    scent:
      name: Аромат
      description: Определя аромата или вкуса на продукта, например ванилия или цитрусови
        плодове
    scissor_blade_type:
      name: Тип острие на ножица
