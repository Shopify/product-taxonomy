    charging_level:
      name: Ниво на зареждане
      description: Указва нивото на мощност на станциите за зареждане на ЕПС, като
        Ниво 1 (120v) или Ниво 2 (240v)
    charging_method:
      name: Начин на зареждане
      description: Указва как се зарежда електронно устройство, напр. безжично, с
