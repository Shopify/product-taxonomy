    mirror_sides:
      name: Страни на огледалото
      description: Показва броя или конфигурацията на отразяващите повърхности, които
        огледалото има (напр. едностранно, двустранно, тройно сгъваемо)
    mist_application_area:
      name: Зона на нанасяне на миста
      description: Показва предназначените зони за използване на миста (напр. тяло,
        коса, стая, спално бельо)
    mixer_type:
      name: Тип миксер
      description: Класифицира DJ миксери въз основа на техния дизайн, като цифров
        или скреч
    mobile_mounting_type:
      name: Тип мобилен монтаж
      description: Указва къде може да се закачи бебешко мобилно устройство, напр.
        креватче, количка
    mobile_movement:
      name: Мобилно движение
      description: Описва механизма на бебешките мобилни телефони, като работещи с
        батерии или навиващи се
    mobile_phone_accessories_included:
      name: Включени аксесоари за мобилен телефон
      description: Изброява допълнителните елементи, предоставени в комплекта аксесоари
        за мобилен телефон, така че купувачите да знаят точно какви компоненти са
        включени
    mobile_phone_case_features:
      name: Характеристики на калъфа за мобилен телефон
      description: Описва уникалните характеристики на калъфа за мобилен телефон,
        като устойчивост на удар или плътно прилепване
    mobile_phone_connector_type:
      name: Тип конектор за мобилен телефон
      description: Идентифицира стандарта на интерфейса на резервен модул за зареждане
        или порт за данни.
    mobile_phone_form_factor:
      name: Форм-фактор на мобилен телефон
      description: Физически дизайн на телефона.
    mobility/accessibility_equipment_features:
      name: Характеристики на оборудването за мобилност/достъпност
      description: Описва уникалните характеристики на помощните средства за достъпност,
