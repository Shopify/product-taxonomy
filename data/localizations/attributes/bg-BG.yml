    garbage_disposal_stopper_style:
      name: Стил на запушалката на мелачката за отпадъци
      description: Показва функционалния стил на запушалката.
    garden_hose_design:
      name: Дизайн на градински маркуч
      description: Идентифицира структурния стил на маркуча, който определя предназначението
        му и характеристиките на обработка.
    garden_hose_fitting_type:
      name: Тип фитинг за градински маркуч
      description: Идентифицира стила или функцията на фитинга за градински маркуч,
        като адаптер или Y-разклонител, за да улесни търсенето и филтрирането.
    gardening_fork_type:
      name: Тип градинска вилица
      description: Класифицира конкретния стил или предназначението на вилицата.
    garland_style:
      name: Стил на гирлянда
      description: Класифицира конструкцията или декоративния стил на гирлянда.
    gas_type:
      name: Вид газ
      description: Идентифицира вида на сгъстения газ, съдържащ се в бутилката на
        зарядното устройство.
    gasket_profile_type:
      name: Тип профил на уплътнението
      description: Определя стандартния за индустрията профил или напречно сечение
        на уплътнението.
    gazebo_roof_material:
      name: Материал за покрив на беседка
      description: Определя материала на покривните панели на беседката или твърдия
        покрив.
    glass_and_surface_cleaner_features:
      name: Функции за почистване на стъкло и други повърхности
      description: Подчертава специалните характеристики или предимства на почистващия
        препарат за стъкла и повърхности.
    glass_cleaner_features:
      name: Характеристики на почистващия препарат за стъкло
      description: Подчертава специалните характеристики на действието или състава,
        специфични за почистващите препарати за стъкло.
    glazing_material:
      name: Гланциращ материал
      description: Идентифицира материала, покриващ фотографската зона (например стъкло,
        акрил или никакъв).
    globe_map_content:
      name: Съдържание на картата на глобуса
      description: Описва основното картографско съдържание, показано на глобуса.
    glue_trap_design:
      name: Дизайн на капана с лепило
      description: Определя физическия стил или формат на капана, като спомага за
        съвместимостта с местата за поставяне и вида на вредителите.
    grab_bar_shape:
      name: Форма на дръжката за хващане
      description: Определя структурния дизайн на дръжката, което влияе върху мястото
        на монтаж и стила на опора за потребителя.
    grass_discharge_type:
      name: Тип изхвърляне на трева
      description: Указва как косачката изхвърля окосената трева (напр. странично
        изхвърляне, задно събиране в коша).
    grate_design:
      name: Дизайн на решетката
      description: Определя структурния стил на решетката.
    grater_design:
      name: Дизайн на рендето
      description: Класифицира физическия дизайн или механизма на рендето или инструмента
        за фино настъргване
    grating_surface_coarseness:
      name: Степен на едрина на настъргване
      description: Посочва размера и текстурата на отворите или режещите ръбове върху
        повърхността на рендето, което определя колко фино или едро ще бъде настъргването.
    grill_grate_material:
      name: Материал на решетката на грила
      description: Определя материала или покритието на основната решетка за готвене.
    grill_thermometer_type:
      name: Тип термометър за грил
      description: Показва основния дизайн или технология на термометъра за грила,
        помагайки на купувачите бързо да намерят стила, който отговаря на тяхната
        настройка за печене на скара.
    grinding_mechanism_material:
      name: Материал на механизма за смилане
      description: Определя материала на вътрешния механизъм за смилане/зъбците, които
        действително смилат подправките.
    grinding_mechanism_type:
      name: Тип на механизма за смилане
      description: Определя вътрешния механизъм, отговорен за смилането или меленето.
    growing_media_buffering:
      name: Буфериране на растежна среда
      description: Показва дали кокосовите влакна са били буферирани за отстраняване
        на излишните соли, което влияе върху управлението на хранителните вещества.
    growing_media_form:
      name: Форма на растежната среда
      description: Определя физическото състояние на кокосовите влакна, помагайки
        на производителите да разберат нуждите от обработка и хидратация.
    growing_medium_type:
      name: Тип растежна среда
      description: Идентифицира субстрата, предоставен за покълване и растеж на семената.
    growth_habit:
      name: Характер на растежа
      description: Описва общата форма на растението, помагайки на клиентите при вземането
        на решения относно разстоянието между растенията и контейнерите.
    hand_dryer_accessory_type:
      name: Аксесоар за сушилня за ръце
      description: Идентифицира специфичния вид аксесоар за сушилня за ръце, така
        че купувачите да могат бързо да разберат какъв е продуктът.
    handle_connection_type:
      name: Тип на свързване на дръжката
      description: Указва механизма, използван за закрепване на потребителски идентификатор
        към метла, моп или други почистващи глави, за да се осигури съвместимост.
    handle_grip_style:
      name: Стил на дръжката за хващане
      description: Определя формата или ергономичността на дръжката на вилицата.
    handle_length_adjustability:
      name: Регулируема дължина на дръжката
      description: Описва дали и как може да се регулира дължината на дръжката, което
        позволява на купувачите да избират между фиксирани и телескопични варианти.
    handle_position:
      name: Позиция на дръжката
      description: Описва разположението или стила на дръжката на лейката, което влияе
        върху ергономичността при наливане и съхранение.
    handrail_configuration:
      name: Конфигурация на парапета
      description: Показва дали продуктът включва парапети и каква е тяхната подредба.
    hanging_attachment_type:
      name: Тип механизъм за окачване
      description: Посочва вида на включения монтажен елемент или начина на окачване
        на слънчевия орнамент, например кука, вендуза, верижка или връв.
    hardiness_zone:
      name: Зона на устойчивост
      description: Посочва климатичната зона по класификацията на USDA (или еквивалентна
        система), в която растението може да презимува и да се отглежда на открито.
    hazards_detected:
      name: Открити опасности
      description: Изброява конкретните опасности или рискове, които устройството
        е проектирано да открива.
    heating_stages:
      name: Етапи на нагряване
      description: Указва броя на степените на нагряване или нивото на модулация на
        устройството.
    home_alarm_features:
      name: Функции на домашната аларма
      description: Идентифицира специални функции на домашна алармена система, като
        резервно захранване с батерия или професионално наблюдение.
    hook_style:
      name: Стил на куката
      description: Класифицира дизайна/функцията на куката за по-лесно визуално и
        функционално съпоставяне.
    humidifier_features:
      name: Характеристики на овлажнителя
      description: Подчертава забележителни допълнителни функции или опции, които
        отличават моделите овлажнители и подпомагат филтрирането.
    humidifier_filter_type:
      name: Тип филтър за овлажнител
      description: Идентифицира стила или конструкцията на филтъра, така че клиентите
        да могат да изберат правилния заместител за своя овлажнител.
    humidor_accessory_type:
      name: Тип аксесоар за хумидор
      description: Класифицира специфичния вид аксесоар, което позволява на купувачите
        бързо да филтрират в рамките на общата категория.
    hydroponic_nutrient_system:
      name: Хидропонна хранителна система
      description: Показва броя на частите в хидропонната хранителна система (например,
        една част, две части), които трябва да бъдат комбинирани преди употреба.
    hygrometer_type:
      name: Тип хигрометър
      description: Идентифицира вида хигрометър, включен в комплекта на хумидора,
        ако има такъв.
    ice_bucket_accessories_included:
      name: Включени аксесоари за кофа за лед
      description: Изброява допълнителните аксесоари за бар, които се доставят заедно
        с кофата за лед.
    ice_bucket_insulation:
      name: Изолация на кофа за лед
      description: Показва конструкцията на стената или нивото на изолация на кофата
        за лед, което влияе върху това колко дълго ледът ще остане замръзнал.
    ice_cream_maker_accessories_included:
      name: Включени аксесоари за машина за сладолед
      description: Идентифицира допълнителните артикули, включени в комплект от няколко
        аксесоара, за да знаят клиентите точно какво ще получат.
    ice_shape:
      name: Форма за лед
      description: Описва вида лед, който машината произвежда, помагайки на потребителите
        да избират машини, които създават предпочитания от тях вид лед.
    incense_holder_style:
      name: Стил на държач за тамян
      description: Идентифицира структурния дизайн на държача, помагайки на купувачите
        да избират между различни функционални и естетически формати.
    infuser_type:
      name: Тип инфузер
      description: Показва дали е включен инфузер за плодове или чай и какъв е неговият
        вид.
    inner_pot_coating:
      name: Покритие на вътрешния съд
      description: Определя типа на покритието на вътрешната част на съда, като посочва
        неговите незалепващи свойства и лесното почистване.
    insulation_capability:
      name: Функционалност на изолацията
      description: Показва дали и как ръкавът изолира напитките, като разграничава
        чисто декоративните ръкави от тези, които регулират температурата.
    insulation_status:
      name: Състояние на изолацията
      description: Посочва дали манерката е изолирана, за да се поддържа температурата
        на напитките.
    insulation_technology:
      name: Технология за изолация
      description: Идентифицира изолационната конструкция, използвана за поддържане
        на температурата.
    insulation_type:
      name: Тип изолация
      description: Указва дали и как са изолирани ваната за напитки или охладителят,
        което влияе върху ефективността на леда и контрола на конденза.
    intended_beverage_type:
      name: Предвиден вид напитка
      description: Показва основната напитка, за която е предназначен декантерът или
        с която се използва най-често.
    internal_membrane_type:
      name: Тип вътрешна мембрана
      description: Идентифицира вътрешната конструкция за разделяне, която разделя
        водата и въздуха вътре в резервоара.
    iron_cleaner_purpose:
      name: Предназначение на почистващия препарат за ютия
      description: Указва основното предназначение на почистващото средство.
    ironing_board_form_factor:
      name: Форма на дъска за гладене
      description: Класифицира цялостния стил/инсталация на дъската, за да помогне
        на купувачите да намерят правилния тип.
    ironing_board_pad_shape:
      name: Форма на подложка за дъска за гладене
      description: Показва общата форма/профил на подложката, за да се гарантира,
        че тя съответства на различни дизайни на дъски за гладене.
    jar_shape:
      name: Форма на буркана
      description: Описва общата геометрична или традиционна форма на декоративния
        буркан.
    juicer_type:
      name: Тип сокоизстисквачка
      description: Класифицира механизма, който сокоизтисквачката използва за извличане
        на сок.
    key_blade_type:
      name: Тип перо на ключа
      description: Класифицира физическия тип перо на ключа, например плоско с нарези,
        тръбно или с вдлъбнатини.
    kitchen_layout:
      name: Оформление на кухнята
      description: Определя общата конфигурация на сглобяемата кухня (например, с
        една стена или L-образна), за да помогне на купувачите да намерят комплекти,
        които съответстват на формата на стаята им и предпочитанията им за работния
        процес.
    kitchen_linen_items_included:
      name: Включени са кухненски текстилни изделия
      description: Изброява конкретните компоненти на кухненското бельо, включени
        в комплекта, като помага на купувачите да разберат точно какви артикули купуват.
    label_content_type:
      name: Тип съдържание на етикета
      description: Описва дали повърхността на етикета е празна, предварително отпечатана
        с шаблони или форматирана по друг начин.
    lamp_arm_style:
      name: Стил на рамото на лампата
      description: Описва конструкцията на рамото или шийката на лампата, която влияе
        върху възможностите за регулиране и позициониране (напр. гъвкава „гъша шия“
        или люлеещо се рамо).
    lamp_post_base_mounting_type:
      name: Тип монтаж на основата на лампа
      description: Указва как основата е монтирана или закрепена към земята или повърхността.
    lamp_shade_fitter_type:
      name: Тип закрепване на абажура
      description: Определя механизма за закрепване между абажура и лампата, като
        гарантира съвместимост без догадки.
    lamp_shade_shape:
      name: Форма на абажура
      description: Определя геометричната форма на сенника, което позволява на клиентите
        бързо да намерят желаните силуети.
    lamp_shade_translucency:
      name: Прозрачност на абажура
      description: Описва колко светлина преминава през абажура, помагайки на потребителите
        да изберат желаната атмосфера.
    lampshade_shape:
      name: Форма на абажура
      description: Описва геометричната форма на абажура.
    laundry_ball_texture:
      name: Текстура на топката за пране
      description: Описва стила на повърхността на топката, който влияе върху размесването
        на тъканта и отстраняването на мъх.
    laundry_wash_accessory_type:
      name: Вид аксесоар за пране на дрехи
      description: Определя конкретния тип торба за пране или нейната конструкция.
    lawn_aerator_type:
      name: Тип аератор за морава
      description: Класифицира аераторите за тревни площи според основния им работен
        механизъм или конструктивен тип.
    lawn_mower_belt_type:
      name: Тип ремък за косачка за трева
      description: Класифицира структурния дизайн или профила на колана.
    lawn_mower_blade_type:
      name: Тип острие за косачка за трева
      description: Определя дизайна на режещото или повдигащото острие на косачката
        и предназначението ѝ.
    lawn_spreader_type:
      name: Тип разпръсквач за трева
      description: Определя механичния тип или конфигурацията на градинската разпръсквачка,
        например центробежна или лентова.
    lawn_tractor_tread_type:
      name: Тип грайфер на гуми за градински трактор
      description: Описва шарката на протектора, предназначена за определени настилки
        или специфични изисквания за сцепление.
    lid_features:
      name: Характеристики на капака
      description: Подчертава всички специални функционални елементи на капака, които
        улесняват готвенето или почистването.
    lid_vent_type:
      name: Тип вентилационен отвор на капака
      description: Показва дали и как капакът позволява излизането на пара.
    lift_mechanism:
      name: Повдигащ механизъм
      description: Показва работния механизъм, използван за повдигане, спускане или
        накланяне на щората или сенника.
    light_exposure_requirement:
      name: Изискване за излагане на светлина
      description: Определя нивото на осветеност, необходимо за поддържане на здравословна
        екосфера, без да се прегряват или стресират организмите.
    liner_installation_method:
      name: Метод за монтаж на облицовката
      description: Описва как облицовката остава на мястото си върху повърхността.
    lint_roller_type:
      name: Тип ролка за почистване на мъх
      description: Класифицира механизма или дизайна на ролката за почистване на мъх.
    live_trap_design:
      name: Дизайн на капани за живи животни
      description: Класифицира цялостния структурен стил на капана
    lock_keying_option:
      name: Опция за заключване с ключ
      description: Определя как се заключва ключалката, като помага на купувачите,
        които се нуждаят от няколко ключалки, задействани с един ключ, или от уникални
        ключове за всяка ключалка.
    lubricant_requirement:
      name: Изискване за смазка
      description: Определя типа смазка, препоръчван или необходим по време на заточване.
    lunch_set_items_included:
      name: Включени артикули в комплекта за обяд
      description: Изброява компонентите за физическо лице, които идват в комплекта
        кутия за обяд.
    machete_blade_style:
      name: Тип острие на мачете
      description: Определя традиционния регионален или функционален тип на острието
        на мачетето.
    map_style:
      name: Стил на картата
      description: Определя картографския стил или тематичния фокус, показан на глобуса.
    masher_head_design:
      name: Дизайн на главата на пасатора
      description: Класифицира дизайна на намачкващата повърхност, който влияе върху
        получената текстура и необходимото усилие при работа.
    mattress_protector_features:
      name: Характеристики на протектора за матрак
      description: Подчертава функционалните или защитните характеристики, специфични
        за протекторите за матраци, което позволява на купувачите да филтрират по
        качества като водоустойчивост или хипоалергенни материали.
    measuring_spoon_features:
      name: Характеристики на мерителната лъжица
      description: Подчертава специалните дизайнерски характеристики или функционални
        особености на мерителната(ите) лъжица(и).
    meat_tenderizer_face_type:
      name: Тип работна повърхност на чукче за месо
      description: Описва текстурата на работната повърхност на главата на чукчето
        за месо.
    meat_tenderizer_mechanism:
      name: Механизъм на чукчето за месо
      description: Класифицира основния механизъм на работа на чукчето за месо.
    medical_specialty:
      name: Медицинска специалност
      description: Указва медицинската специалност или здравната дисциплина, за които
        е предназначено оборудването
    merv_rating:
      name: MERV рейтинг
      description: Определя минималната ефективност на отчитане (MERV), която показва
        способността на филтъра да улавя частици с различни размери.
    microwave_compatibility:
      name: Съвместимост с микровълнова фурна
      description: Показва дали артикулът може безопасно да се използва в микровълнова
        фурна.
    microwave_oven_functions:
      name: Функции на микровълновата фурна
      description: Списъци с предварително зададени или разширени режими на готвене,
        позволяващи на клиентите да намерят модели с конвекция, грил, сензорно готвене
        и др.
    milk_frother_type:
      name: Тип уред за разпенване на мляко
      description: Класифицира продукта според механизма на разпенване или конструктивния
        му тип.
    milk_frothing_method:
      name: Метод за разпенване на мляко
      description: Указва технологията или механизма, използвани за разпенване на
        мляко.
    milk_frothing_system:
      name: Система за разпенване на мляко
      description: Указва вида на механизма за разпенване или запарване на мляко,
        предоставен от машината.
    mirror_curvature:
      name: Кривина на огледалото
      description: Определя кривината на отразяващата повърхност, която влияе върху
        ъгъла на гледане и изкривяването.
    mirror_type:
      name: Тип огледало
      description: Класифицира общия стил или функционална категория на огледалото.
    mist_output_mode:
      name: Режим на отделяне на мъгла
      description: Показва наличните на дифузьора модели на мъгла или настройки на
        интензивността, които могат да бъдат избрани.
    mixing_bowl_features:
      name: Характеристики на купата за смесване
      description: Подчертава специалните функционални характеристики на купата, които
        влияят върху използваемостта и грижата за нея.
    mixing_mechanism:
      name: Механизъм за смесване
      description: Описва вътрешния механизъм, използван за смесване на съставките
        на дресинга.
    mochi_maker_functions:
      name: Функции на машината за мочи
      description: Изброява вградените режими на работа или програми, които уредът
        поддържа.
    mode_of_action:
      name: Режим на действие
      description: Показва как действа фунгицидът, като разграничава контактните защитни
        средства от системните или трансламинарните продукти.
    moisture_absorber_form:
      name: Форма за абсорбиране на влага
      description: Описва физическия формат на продукта, позволяващ на купувача да
        избира висящи торби, вани, пакети и др.
    money_retrieval_method:
      name: Метод за изваждане на пари
      description: Описва как спестените пари се изваждат от касичката.
    mop_head_type:
      name: Тип глава за моп
      description: Показва структурния дизайн на главата на мопа или пълнителя, помагайки
        на купувачите да намерят подходящия модел за своите нужди при почистването.
    mop_wringing_mechanism:
      name: Механизъм за изстискване на моп
      description: Показва как излишната течност се отстранява от мопа, помагайки
        на купувачите да изберат предпочитан стил на изстискване.
    mounting_bolt_pattern:
      name: Модел на монтажни болтове
      description: Указва броя и формата на отворите за монтажни болтове на корпуса
        на шпиндела (например, триъгълни с 3 болта, квадратни с 4 болта).
    mouthpiece_shape:
      name: Форма на мундщука
      description: Определя формата на края на мундщука на държача за цигари.
    mower_deck_material:
      name: Материал на корпуса на косачката
      description: Показва материала, от който е изработена косачката, което влияе
        на нейната издръжливост и тегло.
    mulch_form:
      name: Форма на мулча
      description: Описва физическата форма или консистенция на мулча.
    nap_mat_items_included:
      name: Включени артикули в комплекта за постелка за сън
      description: Подробно описание на конкретните компоненти или аксесоари, които
        се доставят с постелката за сън.
    napkin_edge_finish:
      name: Обработка на ръба на салфетката
      description: Указва шева или декоративното покритие по ръба или подгъва на салфетката.
    noodle_core_design:
      name: Дизайн на сърцевината на водния нудъл
      description: Описва дали водния нудъл има плътна или куха сърцевина.
    nozzle_adjustability:
      name: Регулируемост на дюзата
      description: Показва дали дюзата може да се регулира, за да се промени формата
        на струята или дебита.
    nozzle_material:
      name: Материал на дюзата
      description: Определя материала на дюзите за мъгла по отношение на издръжливостта
        и устойчивостта на запушване.
    nozzle_style:
      name: Тип дюза
      description: Определя функционалната форма или стил на края на дюзата на тръбата.
    nozzle_types_included:
      name: Включени видове дюзи
      description: Изброява формите/стиловете на дюзите, доставяни с пистолета за
        сушено месо, като помага на купувачите да разберат какви форми на продукти
        могат да създават.
    number_of_compartments:
      name: Брой отделения
      description: Показва колко отделни секции има контейнерът за отпадъци за сортиране
        на отпадъци или рециклируеми материали.
    numeral_style:
      name: Стил на цифрите
      description: Определя визуалния стил или наличието на цифри на циферблата на
        часовника.
    oil_dispenser_spout_design:
      name: Дизайн на чучура на дозатора за масло
      description: Описва стила на чучура или дюзата, влияещ върху контрола на потока
        и предотвратяването на прокапване.
    organizer_application:
      name: Приложение за органайзер
      description: Посочва основния тип предмети, които вложката е предназначена да
        съхранява.
    ornament_hook_style:
      name: Стил на кука за украса
      description: Определя стила или формата на куката за украса, използвана за окачване
        на декорации.
    oscillation_mode:
      name: Режим на осцилация
      description: Описва дали и как вентилаторът осцилира, за да разпределя въздуха.
    oscillation_type:
      name: Тип осцилация
      description: Посочва дали и по какъв начин вентилаторът осцилира, което помага
        на клиентите да изберат модел за по-широко разпределение на въздуха.
    outdoor_grill_rack_type:
      name: Тип решетка за външно барбекю
      description: Определя функционалния стил на решетката, за да се изясни предназначението
        ѝ за готвене.
    oxygen_indicator_type:
      name: Тип индикатор за кислород
      description: Указва дали е включен визуален индикатор, който показва дали пакетът
        на абсорбатора все още е активен, и каква форма има той.
    pad_cleaning_action:
      name: Начин на почистване на подложката
      description: Описва основната функция на подложката или крайния резултат от
        почистването.
    pan_bottom_type:
      name: Тип дъно на тигана
      description: Показва дали тиганът има подвижно дъно или плътно, фиксирано дъно.
    pan_perforation_type:
      name: Тип перфорация на тигана
      description: Показва дали дъното/страните на тигана са плътни или перфорирани,
        за да се позволи оттичането на течността.
    parasol_opening_mechanism:
      name: Механизъм за отваряне на чадъра
      description: Описва механизма, чрез който сенникът на чадъра се отваря и затваря.
    parchment_paper_coating:
      name: Покритие от пергаментова хартия
      description: Идентифицира повърхностната обработка, приложена върху пергаментовата
        хартия, за да се осигурят антиприлепващи свойства.
    particle_size_grade:
      name: Размер на частиците
      description: Описва класификацията на размера на гранулите на вермикулита, която
        влияе върху характеристиките на аериране и задържане на вода.
    patio_heater_safety_features:
      name: Функции за безопасност на градинския отоплител
      description: Подчертава вградените механизми за безопасност, предназначени да
        предотвратяват инциденти и да гарантират безопасна работа.
    pattern_match_type:
      name: Тип съвпадение на шарката
      description: Определя как трябва да се подравни шарката между лентите по време
        на монтажа.
    pendulum_compatibility:
      name: Съвместимост с махалото
      description: Показва дали механизмът може да задвижва махало и дали има махало.
    perch_design:
      name: Тип конструкция на кацалка
      description: Описва структурния стил или формата на кацалката.
    perch_surface_texture:
      name: Текстура на повърхността на кацалката
      description: Определя усещането/финишното покритие на повърхността на кацалката,
        което влияе върху сцеплението и износването на ноктите.
    pet_safety:
      name: Безопасност на домашните любимци
      description: Показва дали растението е токсично или нетоксично за обикновените
        домашни любимци.
    pet_toxicity:
      name: Токсичност за домашни любимци
      description: Посочва дали растението е токсично за обикновените домашни любимци,
        като по този начин се гарантира безопасността на клиентите, притежаващи домашни
        любимци.
    ph_adjustment_direction:
      name: Посока на регулиране на pH
      description: Показва дали продуктът е формулиран да повишава (pH нагоре) или
        да понижава (pH надолу) нивото на pH на разтвора.
    pie_pan_edge_style:
      name: Тип ръб на форма за пай
      description: Описва дизайна на ръба, който влияе върху външния вид на коричката
        и лесното отделяне.
    pin_shape:
      name: Форма на щифта
      description: Описва общата форма на щифта, който закрепва плата.
    pipe_connection_method:
      name: Метод за свързване на тръби
      description: Определя стила на връзките на краищата на тръбната кривина (например,
        мъжки, женски, с натискане, резба), за да се гарантира съвместимост при монтажа.
    piping_tip_shape:
      name: Форма на накрайника на шприца
      description: Определя формата или дизайна на накрайника за шприцоване/декориране.
    pitcher_spout_style:
      name: Тип чучур на кана
      description: Определя дизайна на чучура, който влияе върху прецизността на лате
        арта и контрола при наливането.
    pizza_cutter_design:
      name: Дизайн на резачка за пица
      description: Идентифицира структурния стил на резачка за пица, помагайки на
        клиентите да избират между различни механизми за рязане.
    pizza_pan_style:
      name: Стил на тава за пица
      description: Определя конструкцията/дизайна на тавата за пица, като посочва
        как се пече кората и за какъв вид пица е предназначена.
    plant_care_difficulty:
      name: Трудност при грижите за растения
      description: Показва нивото на грижа, необходимо за поддържане на растението,
        помагайки на начинаещи и експерти да направят подходящ избор.
    plant_container_type:
      name: Тип контейнер за растения
      description: Идентифицира вида на контейнера, включен в изкуствения храст, ако
        има такъв.
    plant_life_cycle:
      name: Жизнен цикъл на растението
      description: Показва дали растението е едногодишно, двугодишно или многогодишно.
    planter_material:
      name: Материал за саксии
      description: Показва материала на включената саксия/кашпа, ако е предвидена.
    plate_coupling_pattern:
      name: Тип свързване на плочите
      description: Определя конфигурацията на долната главина, която се съчетава с
        куплунга на въртящия се мотор на микровълновата печка, осигурявайки правилно
        въртене.
    plate_purpose:
      name: Предназначение на плочата
      description: Определя функционалната роля на плочата в системата на косачката.
    plate_style:
      name: Стил на табелата
      description: Идентифицира специфичния стил или предназначението на чинията за
        хранене.
    pole_construction_type:
      name: Тип конструкция на стълба
      description: Определя структурния стил на стълба, което влияе на настройката
        и преносимостта.
    pool_chemical_type:
      name: Вид химикал за басейн
      description: Категоризира основната функция или химичния състав на продукта
        за третиране на басейни.
    pool_filter_type:
      name: Тип филтър за басейн
      description: Идентифицира технологията за филтриране или конструкцията, използвана
        от филтъра на басейна или спа центъра.
    pool_game_type:
      name: Вид игра в басейн
      description: Идентифицира специфичния вид игра или спорт, които продуктът позволява
        в басейна.
    pool_ladder_design:
      name: Дизайн на стълба за басейн
      description: Класифицира цялостния структурен дизайн на стълбата за басейн.
    pool_liner_installation_style:
      name: Тип монтаж на облицовка за басейн
      description: Идентифицира метода на закрепване, използван за закрепване на облицовката
        към стената на басейна.
    pool_lounge_style:
      name: Тип шезлонг за басейн
      description: Класифицира структурния тип на шезлонга за басейн за визуално или
        функционално филтриране.
    pool_lounger_features:
      name: Характеристики на шезлонга за басейн
      description: Подчертава специалните вградени функции, които добавят функционалност
        или комфорт към шезлонга.
    pool_skimmer_type:
      name: Тип скимер за басейн
      description: Класифицира дизайна на скимера, помагайки на купувачите да сравнят
        ръчните мрежи с автоматичните или плаващите скимери.
    pool_toy_features:
      name: Характеристики на играчката за басейн
      description: Подчертава забележителни функционални или дизайнерски характеристики,
        специфични за играчките за басейн.
    pool_type:
      name: Тип басейн
      description: Класифицира конструктивния тип на плувния басейн.
    pool_vacuum_type:
      name: Тип прахосмукачка за басейн
      description: Показва начина на работа или механизма на задвижване на прахосмукачката
        за басейн.
    popcorn_kernel_variety:
      name: Сорт зърна за пуканки
      description: Определя естествения сорт или форма на зърното за пуканки.
    portafilter_type:
      name: Тип портафилтър
      description: Идентифицира структурния стил на портафилтъра, засягащ метода на
        екстракция и работния процес.
    post_installation_method:
      name: Метод след инсталиране
      description: Определя как е монтиран или закрепен стълбът на пощенската кутия.
    pour_spout_design:
      name: Дизайн на чучура за вода
      description: Определя специалните характеристики или стила на чучура, които
        влияят върху контрола на потока.
    pour_spout_style:
      name: Тип на чучур за вода
      description: Описва дизайна на чучура на диспенсера, който влияе върху контрола
        на потока и устойчивостта на капене.
    power_equipment_hitch_type:
      name: Тип теглич за електрическо оборудване
      description: Идентифицира интерфейса за свързване, който прикачното устройство
        използва за монтиране на трактори или силови агрегати.
    predator_guard_style:
      name: Тип предпазител от хищници
      description: Категоризира конструктивния тип на предпазителя, като помага на
        клиентите бързо да открият решения тип конус, диск, клетка или плоча с отвор.
    preferred_soil_type:
      name: Предпочитан тип почва
      description: Показва състава на почвата, в която растението вирее.
    preparation_type:
      name: Вид на приготвяне
      description: Описва метода, необходим за приготвяне на храната за консумация.
    preservation_method:
      name: Метод на съхранение
      description: Подробно описание на техниката, използвана за сушене или консервиране
        на цветята.
    pressure_cooker_handle_type:
      name: Тип дръжка на тенджера под налягане
      description: Показва стила или местоположението на дръжката на тенджерата под
        налягане, която се подменя.
    pressure_cooker_safety_features:
      name: Безопасни характеристики на тенджерата под налягане
      description: Изброява вградените механизми за безопасност, които предотвратяват
        инциденти, като заключващи се капаци или клапани за освобождаване на налягането.
    pressure_settings:
      name: Настройки на налягането
      description: Указва колко различни нива на налягане предлага тенджерата под
        налягане на потребителя.
    pressure_washer_outlet_connector_type:
      name: Тип конектор за изход на водоструйка
      description: Идентифицира спецификацията на съединителя в предната част на пистолетната
        глава, използван за закрепване на шлангове или дюзи.
    pressure_washer_spray_pattern:
      name: Модел на пръскане на водоструйка
      description: Определя ъгъла или формата на пръскане, създадени от дюзата на
        водоструйката.
    print_edition_type:
      name: Тип печатно издание
      description: Класифицира типа на изданието за печат, като посочва неговата рядкост
        и стойност.
    printed_sides:
      name: Печатни страни
      description: Показва дали продуктът е отпечатан от едната или от двете страни.
    procedure:
      name: Процедура
      description: Указва медицинската процедура или вида обучение, за които е предназначено
        оборудването
    protected_item_type:
      name: Защитен тип артикул
      description: Указва типа документ или обект, който RFID капакът е предназначен
        да защити.
    pulley_groove_profile:
      name: Профил на канала на ролката
      description: Определя стила на интерфейса на ремъка на ролката.
    pulp_ejection_type:
      name: Тип изхвърляне на пулпа
      description: Показва как пулпата се изхвърля от машината.
    pump_type:
      name: Тип помпа
      description: Определя конструкцията на механизма на помпата за водоструйка.
    punch_bowl_components_included:
      name: Включени компоненти в купата за пунш
      description: Изброява допълнителните елементи, които се предлагат с купата за
        пунш, което позволява на купувачите да разберат съдържанието на комплекта
        с един поглед.
    quilt_construction_type:
      name: Тип конструкция на завивката
      description: Описва вътрешния шев или метода на прегради, използван в завивката,
        който влияе върху разпределението на топлината и издръжливостта.
    radiator_design_type:
      name: Тип дизайн на радиатора
      description: Идентифицира структурния стил на радиатора.
    rain_barrel_design:
      name: Дизайн на варел за дъждовна вода
      description: Класифицира структурния стил на резервоара за дъждовна вода.
    rain_chain_style:
      name: Стил на дъждовна верига
      description: Уточнява конструктивния дизайн на дъждовната верига, така че клиентите
        да могат да филтрират според визуалните си предпочитания и ефективността на
        водния поток.
    range_hood_filter_type:
      name: Тип филтър за абсорбатор
      description: Класифицира стила на резервния филтър, за да осигури правилното
        му прилягане и ефективност.
    range_installation_type:
      name: Тип монтаж на готварска печка
      description: Описва конфигурацията за монтиране на печката в кухнята.
    recorder_type:
      name: Тип рекордер
      description: Идентифицира използваната технология за запис (например DVR, NVR),
        за да улесни сравняването на аналогови и IP решения.
    refrigerator_configuration:
      name: Конфигурация на хладилника
      description: Идентифицира цялостния стил на оформление на вратата и отделенията
        на хладилника.
    release_type:
      name: Тип освобождаване
      description: Показва колко бързо хранителните вещества се освобождават от тора.
    relief_style:
      name: Стил на релефа
      description: Показва дали повърхностните коти са издигнати, вдлъбнати или равни
        на глобуса.
    repellent_mechanism:
      name: Отблъскващ механизъм
      description: Посочва основния възпиращ механизъм, използван от продукта, като
        например химически аромат, ултразвуков звук или мигаща светлина.
    replaceable_brush_head:
      name: Сменяема глава на четката
      description: Указва дали главата на четката може да се сваля и сменя, когато
        се износи.
    rib_material:
      name: Материал на ребрата
      description: Указва материала, използван за ребрата или спиците на чадъра, като
        например фибростъкло или алуминий.
    rice_cooker_functions:
      name: Функции на уреда за готвене на ориз
      description: Изброява предварително зададените програми или режими за готвене,
        налични в уреда за готвене на ориз, което позволява на купувачите да сравнят
        неговата гъвкавост.
    roaster_oven_functions:
      name: Функции на фурната за печене
      description: Изброява предварително зададените или поддържаните функции за готвене,
        налични във фурната за печене.
    roasting_rack_shape:
      name: Форма на решетката за печене
      description: Определя структурната форма или дизайна на решетката, което влияе
        върху прилягането и ефективността на готвенето.
    rockwool_form:
      name: Форма на каменната вата
      description: Определя физическата форма или конфигурация на продукта от каменна
        вата.
    roof_style:
      name: Стил на покрива
      description: Определя архитектурния стил или формата на покрива.
    rose_attachment:
      name: Приставка-роза
      description: Показва дали душът включва подвижна роза/спрей глава, дали е фиксиран
        или изобщо няма роза.
    safety_mirror_features:
      name: Характеристики на огледалото за безопасност
      description: Подчертава специални характеристики на работата, които подобряват
        издръжливостта или видимостта.
    salad_spinner_mechanism:
      name: Механизъм на центрофугата за салати
      description: Определя механизма на въртене, използван за сушене на зелени зеленчуци,
        помагайки на купувачите да изберат предпочитания от тях начин на работа.
    sand_color:
      name: Цвят на пясъка
      description: Показва цвета на пясъка или гранулирания пълнеж вътре в пясъчния
        часовник, независимо от цвета на външната рамка.
    sand_type:
      name: Вид пясък
      description: Определя вида на пясъка въз основа на неговия състав или общо приложение.
    saucer_functionality:
      name: Функционалност на подложката
      description: Посочва функционалния тип на подложката или тавичката, например
        със самополивна система или с резервоар за събиране на вода.
    sauna_form_factor:
      name: Форма на сауната
      description: Определя общия конструктивен стил на сауната.
    sauna_heater_type:
      name: Тип нагревател за сауна
      description: Показва типа на нагревателя, включен или поддържан от комплекта
        за сауна.
    scoop_release_mechanism:
      name: Механизъм за освобождаване на лъжицата
      description: Описва типа механизъм за освобождаване на съдържанието, вграден
        в лъжицата.
    scoop_surface_design:
      name: Дизайн на повърхността на лъжичката
      description: Описва дали повърхността на лъжичката е плътна или перфорирана,
        за да позволява оттичането на маслото.
    scoop_wall_design:
      name: Дизайн на стената на лъжичката
      description: Описва дали повърхността на лъжичката е плътна или перфорирана/нарязана,
        за да може малки парченца или масло да преминават през нея.
    scrubber_head_type:
      name: Тип глава на скрубер
      description: Описва механичното действие или конструкцията на главата на скрубера.
    scrubbing_strength:
      name: Сила на триене
      description: Показва относителното ниво на търкане/абразивност, осигурено от
        продукта.
    seafood_utensil_items_included:
      name: Включени прибори за морски дарове
      description: Изброява допълнителните инструменти за миди, включени в комплекта
        с чукалото, което позволява на купувачите да сравнят единични чукала с пълни
        комплекти.
    sealing_modes:
      name: Режими на запечатване
      description: Изброява оперативните програми за уплътняване, налични на уреда.
    security_sensor_subtype:
      name: Подтип на сензора за сигурност
      description: Определя конкретната функция/тип на сензора за сигурност.
    seed_treatment:
      name: Обработка на семена
      description: Уточнява всяка специална обработка, приложена върху семената.
    self_cleaning_method:
      name: Метод за самопочистване
      description: Указва вида на технологията за самопочистване, която фурната използва.
    serveware_pieces_included:
      name: Включени съдове за сервиране
      description: Изброява различните компоненти за сервиране, съдържащи се в комплект
        от няколко части.
    shaker_set_pieces_included:
      name: Включени части за шейкър
      description: Изброява отделните компоненти, които се включват в комплекта, освен
        основните солници и пиперници.
    sheath_material:
      name: Материал на обвивката
      description: Материал на обвивката на термодвойката, влияещ върху корозионната
        устойчивост и максималната работна температура.
    shelf_location_in_appliance:
      name: Местоположение на рафта в уреда
      description: Показва къде в уреда трябва да се монтира рафтът.
    shoe_brush_type:
      name: Тип четка за обувки
      description: Класифицира функционалния стил на четката за обувки, което позволява
        на купувачите да намерят четки, предназначени за конкретни задачи.
    shoe_dryer_technology:
      name: Технология за сушене на обувки
      description: Определя основната технология за сушене, използвана от сушилнята
        за обувки.
    shoe_organizer_design:
      name: Дизайн на органайзера за обувки
      description: Идентифицира цялостния стил или формат на органайзера за обувки,
        за да помогне на купувачите да филтрират артикулите.
    shoe_polish_form:
      name: Форма за боя за обувки
      description: Идентифицира физическата форма или начина на доставка на продукта
        за боя за обувки.
    shoe_treatment_purpose:
      name: Цел на обработката на обувки
      description: Определя основната функция или полза от продукта за третиране на
        обувки.
    shoe_tree_design:
      name: Тип конструкция на обтегач за обувки
      description: Определя конструктивния тип или механизма на обтегача за обувки,
        което влияе върху възможностите за регулиране, предназначения тип обувки и
        удобството при употреба.
    shot_glass_style:
      name: Стил на чаша за шотове
      description: Категоризира специфичния стил или формат на чашата за шотове.
    shovel_handle_grip_type:
      name: Дръжка за лопата тип ръкохватка
      description: Определя стила на захвата в края на дръжката.
    shovel_head_type:
      name: Тип глава на лопатата
      description: Класифицира функционалната форма/стил на лопатата или главата на
        мотиката.
    shower_curtain_ring_type:
      name: Тип пръстен за завеса за душ
      description: Определя функционалния стил на пръстена за завеса за душ.
    shrub_shape:
      name: Форма на храст
      description: Описва цялостната оформена (топиарна) форма на изкуствения храст.
    signature_presence:
      name: Наличие на подпис
      description: Указва дали и как картината е подписана от художника.
    sink_caddy_features:
      name: Характеристики на кутията за мивка
      description: Подчертава специалните функционални елементи на кутията за мивка.
    size_adjustability:
      name: Регулируемост на размера
      description: Показва дали дължината/ширината на продукта може да се регулира,
        за да пасне на множество размери обувки.
    skewer_tip_type:
      name: Тип на върха на шишчето
      description: Определя типа на върха на шишчето, което влияе върху лекотата на
        пробождане на храната и цялостното представяне.
    sleeping_position_suitability:
      name: Подходяща позиция за сън
      description: Показва за кои пози за сън е предназначена възглавницата.
    sleeve_insulation:
      name: Изолация на ръкава
      description: Показва дали ръкавът осигурява топлоизолация, за да поддържа напитките
        студени или топли.
    slice_style:
      name: Стил на среза
      description: Указва основния стил на среза, който кухненската машина за рязане
        извършва, например жулиен или гофрета.
    slipcover_stretch_type:
      name: Тип еластичен калъф
      description: Определя степента и посоката на еластичност на плата, използван
        в калъфа.
    smoker_type:
      name: Тип уред за опушване
      description: Класифицира уреда за опушване според конструктивния му тип или
        метода на опушване.
    smoking_chip_size:
      name: Размер на дървесните стърготини за опушване
      description: Посочва физическия размер или фракцията на дървесните стърготини
        за опушване, което влияе върху скоростта на изгаряне и съвместимостта с различни
        грилове или уреди за опушване.
    snow_blower_stage_type:
      name: Тип работна система на снегоринa
      description: Посочва броя на шнековете и/или турбинните етапи, използвани за
        придвижване и изхвърляне на снега – основна спецификация, по която се разграничават
        едно-, дву- и тристепенните машини.
    soap_dispenser_operation_type:
      name: Тип работа на диспенсъра за сапун
      description: Указва механизма за активиране, използван за дозиране на сапун
        или лосион.
    soil_texture:
      name: Текстура на почвата
      description: Описва преобладаващия размер/състав на частиците на почвата, влияещ
        върху дренажа и аерацията.
    spa_installation_type:
      name: Тип на инсталацията на спа центъра
      description: Класифицира спа центъра въз основа на това как е монтиран или конфигуриран
        на място.
    space_heater_safety_features:
      name: Безопасни характеристики на отоплителните уреди
      description: Подчертава вградените механизми за безопасност, които защитават
        потребителите и имуществото.
    spice_organizer_features:
      name: Характеристики на органайзера за подправки
      description: Подчертава специалните функционални характеристики на органайзерите
        за подправки.
    spray_pattern:
      name: Форма на струята
      description: Определя вида на маслената дисперсия, произведена от дюзата на
        пръскачката.
    sprayer_operation_mechanism:
      name: Механизъм за работа на пръскачката
      description: Указва как се генерира налягане за дозиране на масло от пръскачката.
    spring_type:
      name: Тип пружина
      description: Идентифицира типа пружина, използвана в механизма на кантиращата
        машина.
    sprinkle_opening_style:
      name: Тип отвор за поръсване
      description: Определя степента на финост или типа на перфорацията/мрежата, използвана
        за поръсване на какао (напр. фина мрежа или големи отвори).
    sprinkler_orientation:
      name: Ориентация на спринклерите
      description: Показва ориентацията на монтажа и стила на главата на пожарогасителната
        спринклерна система.
    sprinkler_response_type:
      name: Тип реакция на пръскачката
      description: Определя характеристиката на термичния отговор на главата на пръскачката.
    sprinkler_type:
      name: Тип пръскачка
      description: Класифицира механичното действие или стила на разпределение на
        пръскачката за по-лесно сравнение и филтриране.
    sprinkler_valve_type:
      name: Тип на клапан на пръскачката
      description: Определя функционалния тип или типа задействане на клапата на пръскачката.
    squirrel_feed_type:
      name: Вид храна за катерици
      description: Идентифицира видовете храна, които хранилката е предназначена да
        разпределя, като гарантира съвместимост с предпочитаните от катериците храни.
    squirrel_resistance:
      name: Устойчивост на катерици
      description: Посочва дали хранилката за мазнина включва функции, предназначени
        да възпрепятстват достъпа на катерици до храната.
    stackability:
      name: Възможност за подреждане едно върху друго
      description: Показва дали няколко уреда могат да се подреждат един върху друг,
        за да се спести място при съхранението.
    stackable_design:
      name: Може да се слага едно върху друго
      description: Показва дали контейнерът е проектиран да се подрежда безопасно,
        когато е пълен или празен.
    stacking_capability:
      name: Функционалност на подреждане
      description: Указва дали контейнерът може да бъде подреден, вложен, сгънат или
        не може да бъде подреден с други контейнери.
    stainless_steel_cleaner_features:
      name: Характеристики на почистващия препарат за неръждаема стомана
      description: Посочва специалните характеристики на ефективността на продукта,
        които са уникални или особено важни за грижата за неръждаема стомана.
    staple/pin_shape:
      name: Форма на скоба/щифт
      description: Определя общата форма на крепежния елемент, като помага на клиентите
        да избират между U-образни скоби, щифтове с кръгла горна част и др.
    staple_coating:
      name: Покритие на скобите
      description: Описва всяко защитно покритие, нанесено върху скобата или щифта,
        за да се предотврати ръжда или да се подобри дълготрайността.
    steam_nozzle_type:
      name: Тип дюза за пара
      description: Идентифицира функционалния стил на накрайника на парочистачката.
    steam_table_pan_cover_features:
      name: Характеристики на капак за съд за топла витрина
      description: Подчертава специалните функционални характеристики на капаците
        за съдове за топла витрина, които улесняват работата в професионалното хранене.
    steam_table_pan_size:
      name: Размер на съда за топла витрина
      description: Показва стандартизираната фракция Gastronorm/хотелска тава (например,
        пълна, 1/2, 1/3), за която е проектирана тавата или капакът.
    steam_table_pan_size_compatibility:
      name: Съвместимост на размерите на съдовете за топла витрина
      description: Изброява размерите по стандарт Gastronorm (GN) или други стандартни
        размери съдове, които уредът може да побере.
    steam_table_pan_type:
      name: Тип тава за парна маса
      description: Определя стила на конструкцията на тигана, влияейки върху дренажа
        и ефективността на нагряване.
    stemware_design:
      name: Дизайн на чаши със столче
      description: Уточнява дали чашата има традиционна дръжка или е без дръжка.
    stick_tip_style:
      name: Тип на върха на клечката
      description: Определя дизайна на върха на клечката, който влияе върху начина,
        по който тя пробожда или поддържа хранителни продукти.
    stocking_toe_orientation:
      name: Ориентация на пръстите на чорапа
      description: Определя посоката, в която сочи върхът на чорапа, когато е окачен,
        което влияе на визуалната симетрия при излагане на няколко чорапа.
    stopper_type:
      name: Тип стопер
      description: Уточнява вида на капачката, с която е снабден декантерът, ако има
        такава.
    strainer_style:
      name: Тип цедка
      description: Класифицира дизайна на цедката или гевгира.
    strainer_type:
      name: Тип цедка
      description: Определя типа или дизайна на цедката, като посочва предназначението
        ѝ за кулинарно приложение и мрежестата конструкция.
    strap_end_fitting_type:
      name: Тип накрайник на лента
      description: Посочва вида на хардуера или накрайника, разположен в края на дърпащата
        лента, който улеснява свързването, закрепването или регулирането.
    straw_dispensing_mechanism:
      name: Механизъм за подаване на сламки
      description: Описва метода, по който се раздават сламки, помагайки на купувачите,
        които търсят специфични характеристики за хигиена или удобство.
    sugar_dispenser_mechanism:
      name: Механизъм за дозиране на захар
      description: Подробно описание на начина, по който захарта се изсипва от контейнера,
        което помага на купувачите да изберат предпочитания от тях начин на изсипване.
    suitable_for_pool_shape:
      name: Подходящ за формата на басейна
      description: Показва с кои форми на басейни може да се използва аксесоарът,
        като помага на потребителите да гарантират правилното му прилягане.
    suitable_pool_surface_type:
      name: Подходящ тип повърхност на басейна
      description: Идентифицира материалите на повърхността на басейна, за които е
        предназначена четката/метлата, като предотвратява повреждане на повърхността
        и осигурява оптимално почистване.
    suitable_spread_material:
      name: Подходящ материал за разпръскване
      description: Идентифицира видовете материали, за които разпръсквачът е проектиран
        да разпръсква.
    sundial_type:
      name: Тип слънчев часовник
      description: Идентифицира стила на дизайн или научната конфигурация на слънчевия
        часовник.
    supplement_function:
      name: Допълнителни функции
      description: Класифицира добавките според основното им предназначение, помагайки
        на производителите да изберат подходящата добавка за конкретните нужди на
        растенията.
    surface_reflectivity:
      name: Отражателна способност на повърхността
      description: Показва дали повърхността на знака е проектирана да отразява светлината
        за подобрена видимост през нощта.
    sweetener_type:
      name: Вид подсладител
      description: Идентифицира основния подсладител, използван в сиропа.
    table_skirt_pleat_style:
      name: Тип набор на покривка за маса
      description: Определя декоративния стил на плисето или набора на покривката
        за маса, като помага на клиентите да съчетаят продукта с желаната естетика
        или тема на събитието.
    tablecloth_clip_design:
      name: Дизайн на щипка за покривка за маса
      description: Описва механизма или стила на щипката за покривка.
    tablecloth_features:
      name: Характеристики на покривката за маса
      description: Подчертава специалните функционални или дизайнерски характеристики
        на покривката за маса.
    tamper_evident_feature:
      name: Функция за защита срещу нерегламентиран достъп
      description: Посочва наличието и типа на предпазен механизъм срещу неоторизирано
        отваряне, вграден в капачката.
    tang_type:
      name: Тип монтаж на острието към дръжката
      description: Посочва типа конструкция на острието в дръжката на ножа, като уточнява
        доколко металът на острието навлиза в дръжката.
    teapot_spout_style:
      name: Тип чучур за чайник
      description: Описва дизайна на чучура за наливане на чайника, който влияе върху
        контрола на наливането и естетиката.
    temperature_zones:
      name: Температурни зони
      description: Определя колко независимо контролируеми температурни зони предлага
        хладилникът за вино.
    thermocouple_junction_type:
      name: Тип съединение на термодвойка
      description: Посочва конструкцията на измервателното съединение, която влияе
        върху времето за реакция и електрическата изолация.
    thermometer_design:
      name: Дизайн на термометър
      description: Определя основния начин на работа или технология на домакинския
        термометър.
    thermos_handle_type:
      name: Тип дръжка на термос
      description: Описва стила на дръжката или помощното средство за носене, интегрирано
        в термоса.
    thread_standard:
      name: Стандарт за резба
      description: Идентифицира спецификацията на резбата, използвана при връзките
        на аксесоара, за да се гарантира кръстосана съвместимост с водопроводните
        компоненти.
    tilt_mechanism:
      name: Механизъм за накланяне
      description: Определя механизма, който позволява навесът да се накланя за оптимално
        позициониране на сянката.
    time_format:
      name: Формат на часа
      description: Показва дали часовникът може да показва времето в 12-часов, 24-часов
        или и в двата формата.
    timer_mechanism:
      name: Механизъм на таймера
      description: Идентифицира основния механизъм, използван за измерване на времето.
    tine_position:
      name: Положение на зъбците
      description: Описва конфигурацията на зъбците спрямо колелата/двигателя, която
        влияе върху маневреността и проникването в почвата.
    tire_construction:
      name: Конструкция на гумата
      description: Идентифицира метода на вътрешна конструкция на каркаса на гумата.
    tire_construction_type:
      name: Тип конструкция на гумата
      description: Определя дали гумата е с диагонална или радиална конструкция, което
        влияе върху гъвкавостта, товароносимостта и качеството на возене.
    tire_tread_pattern:
      name: Модел на протектора на гумата
      description: Описва стила на протектора на гумата, като посочва пригодността
        за различни условия на трева и нужди от сцепление.
    tissue_lotion_content:
      name: Съдържание на лосиона за тъкани
      description: Показва дали кърпичките са напоени с лосион или други успокояващи
        добавки.
    toaster_features:
      name: Характеристики на тостера
      description: Изброява специалните функции и дизайнерски елементи, налични на
        тостера.
    tong_type:
      name: Тип щипки
      description: Определя основния стил или предназначение на щипките.
    toothbrush_holder_features:
      name: Характеристики на държача за четка за зъби
      description: Подчертава специални функции или дизайнерски елементи, които отличават
        държача.
    toothpick_dispensing_mechanism:
      name: Механизъм за дозиране на клечки за зъби
      description: Идентифицира механизма, чрез който се дозират клечки за зъби.
    topographical_relief:
      name: Топографски релеф
      description: Показва дали повърхността на глобуса е с релеф.
    towel_holder_design:
      name: Дизайн на държач за кърпи
      description: Описва конструкцията на поставката за кърпи, например пръчка или
        пръстен.
    towel_weave:
      name: Тип тъкане на кърпата
      description: Описва конструкцията или стила на тъкане на кърпата, който влияе
        върху текстурата, абсорбцията и времето за съхнене.
    track_lighting_rail_type:
      name: Тип релса за релсово осветление
      description: Определя механичния/електрически стандарт на релсата, като определя
        кои фиксиращи елементи и съединители са съвместими.
    track_lighting_system_compatibility:
      name: Съвместимост на системата за прожекторно осветление
      description: Определя електрическия и механичен стандарт на релсата, за която
        е проектирано приспособлението или аксесоарът.
    track_rail_circuit_configuration:
      name: Конфигурация на електрическата верига на релсата за релсово осветление
      description: Посочва броя или типа електрически вериги, които релсата поддържа,
        което влияе върху независимото управление на групи осветителни тела.
    track_system_standard:
      name: Стандарт на релсовата система
      description: Идентифицира стандарта на физическата релса, на която се монтира
        захранването, което позволява на купувачите да съчетаят компонентите с тяхната
        релса (например H, J или L-релса).
    tractor_tire_application:
      name: Приложение гума за трактор
      description: Показва основното приложение или среда, за която е проектирана
        гумата.
    tractor_tire_tread_classification:
      name: Класификация на протектора на гумите за трактор
      description: Класифицира шарката на протектора на гумите на трактора според
        селскостопанските и промишлените стандарти.
    tree_shape:
      name: Форма на дървото
      description: Описва цялостния силует или профил на изкуственото дърво.
    trigger_type:
      name: Тип задействане
      description: Определя механизма за задействане, използван за контрол на водния
        поток на дюзата.
    trimmer_line_feed_system:
      name: Система за подаване на кордата на тример
      description: Определя как режещата линия се придвижва от главата по време на
        работа.
    trimmer_line_shape:
      name: Форма на кордата на тримера
      description: Описва напречното сечение на кордата за тример, което влияе върху
        ефективността на рязане и нивото на шум.
    turntable_type:
      name: Тип въртяща се повръхност
      description: Определя типа готварска повърхност, като прави разлика между традиционна
        въртяща се стъклена чиния и плоска или невъртяща се конструкция.
    ultrasonic_cleaner_accessories_included:
      name: Включени аксесоари за ултразвуков почистващ уред
      description: Изброява допълнителните компоненти, които се доставят с почистващото
        средство, за да знаят купувачите точно какво има в кутията.
    umbrella_base_type:
      name: Тип основа за чадър
      description: Определя конструктивния стил или дизайна на монтаж на основата.
    umbrella_opening_mechanism:
      name: Механизъм за отваряне на чадър
      description: Определя как се разгръща и прибира чадърът.
    umbrella_type:
      name: Тип чадър
      description: Посочва общия дизайн или конструктивния тип на чадъра.
    upf_rating:
      name: UPF рейтинг
      description: Посочва фактора на ултравиолетова защита (UPF) на плата на сенника,
        който измерва ефективността му при блокиране на вредните UV лъчи.
    utensil_flexibility:
      name: Гъвкавост на прибора
      description: Показва колко твърдо или гъвкаво е тялото на шпатулата, което влияе
        върху пригодността ѝ за извита купа или твърдо тесто.
    utensil_holder_features:
      name: Характеристики на държача за прибори
      description: Описва специалните функционални характеристики на държача за кухненски
        прибори.
    utensil_tray_features:
      name: Характеристики на тавата за прибори
      description: Подчертава специалните характеристики, които подобряват функционалността
        на тавата.
    vacuum_hose_connection_type:
      name: Тип свързване на вакуумния маркуч
      description: Описва типа на съединителя на краищата на маркуча, осигуряващ правилното
        механично съединение с прахосмукачки или аксесоари.
    valance_style:
      name: Тип ламбрекен
      description: Идентифицира декоративния дизайн на ламбрекена, помагайки на клиентите
        да изберат стил, който съответства на техния декор.
    valet_organizer_features:
      name: Характеристики на органайзер за аксесоари
      description: Подчертава специфични организационни характеристики, интегрирани
        в системата за зареждане.
    valve_configuration:
      name: Конфигурация на органайзера
      description: Определя функционалния стил на клапата за градински маркуч, помагайки
        на купувачите бързо да изберат правилното решение за своята система за поливане.
    valve_stem_angle:
      name: Ъгъл на стеблото на вентила
      description: Определя ориентацията/ъгъла на стеблото на вентила спрямо гумата,
        което влияе върху лекотата на напомпване и прилягането на каплата.
    vase_filler_type:
      name: Тип пълнеж за ваза
      description: Категоризира продукта по специфичен вид пълнежен материал или форма.
    vent_pipe_type:
      name: Тип вентилационна тръба
      description: Класифицира стила на конструкцията на комина или вентилационната
        тръба.
    vent_style:
      name: Тип вентилация
      description: Класифицира структурния тип или предназначението на вентилационния
        компонент.
    waffle_style:
      name: Тип вафла
      description: Посочва формата или шарката на вафлата, оформена от плочите.
    wallpaper_removal_type:
      name: Вид премахване на тапети
      description: Показва лекотата на премахване при предекориране.
    wallpaper_washability_rating:
      name: Оценка на измиваемостта на тапетите
      description: Определя как повърхността на тапета може да се почиства след поставянето
        му.
    warmer_type:
      name: Тип нагревател
      description: Указва основния механизъм за затопляне или предназначението на
        нагревателя за свещи или масла.
    warmth_level:
      name: Ниво на топлина
      description: Класифицира общото ниво на топлина или сезонната пригодност на
        одеялото или завивката.
    warmth_rating:
      name: Рейтинг на топлина
      description: Показва нивото на изолация на одеялото, подобно на TOG рейтингите
        при спалното бельо.
    waste_container_lid_features:
      name: Характеристики на капака на контейнера за отпадъци
      description: Подчертава специалните функции или подобрения, вградени в капака.
    waste_container_sign_message:
      name: Съобщение на табелата на контейнера за отпадъци
      description: Определя конкретния поток от отпадъци или предупредителния текст,
        отпечатан върху етикета или знака.
    water_filtration_technology:
      name: Технология за филтриране на вода
      description: Описва основната технология или механизъм, използван за пречистване
        на вода.
    water_heater_element_connection_type:
      name: Тип свързване на нагревателния елемент на бойлера
      description: Идентифицира начина на монтаж на елемента, като прави разграничение
        между винтови и различни видове фланци.
    water_sensor_design:
      name: Дизайн на сензора за вода
      description: Определя физическия стил на сензорния елемент за вода.
    water_supply_type:
      name: Тип водоснабдяване
      description: Определя как уредът получава вода, като прави разграничение между
        резервоари с ръчно пълнене и водопроводни линии.
    watering_needs:
      name: Нужда от поливане
      description: Описва типичните изисквания на растението по отношение на водата.
    wax_paper_form:
      name: Форма на восъчна хартия
      description: Посочва дали восъчната хартия се продава на ролка или на предварително
        нарязани листове.
    weather_guard_mounting_method:
      name: Метод за монтаж на предпазител от атмосферни влияния
      description: Указва как предпазителят се закрепва към подаващото устройство
        или конструкцията на подпората.
    wheel_bearing_type:
      name: Тип лагер на колелото
      description: Определя вътрешната конструкция на лагера или втулката на колелото,
        което влияе върху гладкостта на въртене и изискванията за поддръжка.
    wheel_tread_style:
      name: Тип протектор на колелото
      description: Определя дизайна на протектора на колелото, който влияе върху сцеплението,
        нивото на шума и потенциалното оставяне на следи по пода.
    whistling:
      name: Свистене
      description: Указва дали каната издава свистящ звук, когато водата достигне
        точка на кипене.
    wick_material:
      name: Материал на фитила
      description: Идентифицира състава на използвания фитил (напр. памук, фибростъкло).
    window_film_installation_surface:
      name: Повърхност за монтаж на фолио за прозорци
      description: Указва дали фолиото е предназначено за вътрешно, външно или двуповърхностно
        приложение.
    window_film_type:
      name: Вид фолио за прозорци
      description: Категоризира функционалния стил на фолиото (например, поверителност
        спрямо сигурност).
    window_rod_type:
      name: Тип корниз за прозорец
      description: Класифицира функционалния стил на прозореца.
    window_screen_type:
      name: Тип мрежа за прозорец
      description: Определя структурния стил или метода на работа на мрежата.
    window_treatment_lining_type:
      name: Тип подплата на текстил за прозорец
      description: Посочва дали ламбрекенът или декоративният корниз има подплата
        и какъв тип е тя.
    wine_aerator_type:
      name: Тип аератор за вино
      description: Определя формата или начина на работа на аератора за вино.
    wine_glass_style:
      name: Стил на чаша за вино
      description: Указва желания вид вино или дизайн на чашата за оптимизиране на
        аромата и вкуса.
    wok_bottom_type:
      name: Тип дъно на уок
      description: Определя формата на дъното на уока, която определя съвместимостта
        с различни котлони и поставки за уок.
    wood_grain_orientation:
      name: Ориентация на дървесните влакна
      description: Посочва ориентацията на дървесните влакна в продукта, например
        челна, кантова или лицева структура. Ориентацията на зърното влияе върху издръжливостта
        и лекотата на рязане.
    wood_seasoning_method:
      name: Метод за изсушаване на дървесина
      description: Посочва начина на сушене или узряване на дървесното гориво, което
        влияе върху съдържанието на влага и качеството на горене.
    wrap_format:
      name: Формат на опаковката
      description: Уточнява физическата форма, в която се доставя фолиото за опаковане
        на храни, например на рула или на предварително нарязани листове.
    abacus_bead_material:
      name: Материал за мъниста за абак
      description: Основен материал на мънистата за абак.
    abec_rating:
      name: Рейтинг ABEC
      description: Определя степента на прецизност на лагерите въз основа на ABEC
        рейтингите, като посочва нивата на гладкост и толеранс.
    abrasive_level:
      name: Ниво на абразивност
      description: Относителна степен на абразивност на полирпаста/полиращата паста
        при обработка на автомобилни покрития.
    absinthe_accessories_included:
      name: С включени аксесоари за абсент
      description: Подробности за всички аксесоари, които са включени в опаковката
        на продукта, като лъжици, чаши или захарни кубчета.
    ac_compressor_mounting_style:
      name: Стил на монтаж на компресора на климатика
      description: Описва механичния начин на монтаж/закрепване или интерфейса на
        скобата на компресора към двигателя/системата за задвижване на аксесоарите.
    ac_compressor_oil_type:
      name: Вид масло за компресор на климатик
      description: Указва химичния състав на смазочното масло, необходим/използван
        от компресора на климатика (често срещаните видове включват PAG и POE).
    accent_modes:
      name: Режими на акцент
      description: Указва как метрономът може да акцентира ударите в рамките на такта
        (освен основното щракване).
    access_mechanism:
      name: Механизъм за достъп
      description: Описва начина, по който се достига до повдигнатата платформа за
        спане.
    accessibility_features:
      name: Функции за достъпност
      description: Посочва оборудването и конфигурациите на микробуса, свързани с
        достъпността.
    accessories_included:
      name: С включени аксесоари
      description: Изброява допълнителни артикули, които идват в комплект със стола
        (напр. табуретка, лумбална възглавница), давайки на купувача ясна представа
        за добавената стойност.
    accessory_pieces_included:
      name: С включени аксесоарни елементи
      description: Изброява аксесоарите, включени в комплект или подаръчен комплект
        от няколко модни аксесоара.
    acoustic_amplifier_feedback_control_features:
      name: Функции за контрол на обратната връзка при акустичен усилвател
      description: Показва вградени инструменти за предотвратяване на обратна връзка
        за акустични инструменти (напр. режекторен филтър, фазов превключвател, автоматично
        потискане на обратната връзка).
    acoustic_drum_kit_components_included:
      name: Включени компоненти за акустичен барабанен комплект
      description: Показва кои основни компоненти са включени в комплекта (само барабанен
        сет или пълен комплект, включително чинели и стойки).
    acoustic_guitar_body_shape:
      name: Форма на тялото на акустична китара
      description: Описва формата/контурите на тялото на акустичната китара, които
        влияят върху тона, комфорта и типичната употреба.
    acoustic_guitar_string_core_design:
      name: Дизайн на сърцевината на струните за акустична китара
      description: Конструкция на сърцевината на навитите струни.
    acoustic_piano_key_material:
      name: Материал за клавиши на акустично пиано
      description: Определя основния материал, използван за горните части на клавишите
        на пианото/слоновата кост.
    acoustic_piano_lid_type:
      name: Тип капак за акустично пиано
      description: Определя вида на механизма на капака/покритието на акустично пиано
        (напр. за разграничаване между капак на роял и паднал капак на изправено пиано).
    acoustic_piano_plate_frame_material:
      name: Материал на плочата/рамката на акустичното пиано
      description: Указва основния материал на плочата/рамката на пианото (арфата),
        обикновено чугун.
    acoustic_piano_soundboard_material:
      name: Материал за резонаторна плоча на акустично пиано
      description: Указва основния материал, използван за резонаторната плоча на пианото.
    action_figure_scale:
      name: Мащаб на екшън фигурата
      description: Показва мащаба за колекционери (напр. 1:12), за който е предназначен
        аксесоарът.
    action_type:
      name: Тип действие
      description: Описва механизма на зареждане или стрелба на оръжието (напр. болтова
        система, пречупваща се цев, лостова система).
    actuation_mechanism:
      name: Механизъм за задействане
      description: 'Показва как лостът задейства спирачната система: изцяло механичен
        с жило, изцяло хидравличен, хидравличен с жилно задвижване или електронен/безжичен.'
    actuation_method:
      name: Метод на задействане
      description: Как се активира или задейства системата за потискане.
    adapter_orientation:
      name: Ориентация на адаптера
      description: Определя ъгъла или конфигурацията на адаптера за вентил на велосипедна
        гума, която влияе на достъпа при помпане (напр. прав, 90°).
    additive_application_stage:
      name: Етап на прилагане на добавката
      description: Показва в коя част от процеса е предназначен продуктът за употреба.
    adhesive_backing:
      name: Лепяща подложка
      description: Дали копринената материя за печат има лепяща основа за самозалепващо
        се приложение.
    adhesive_formulation:
      name: Формула на лепилото
      description: Показва химичната основа или формулацията на лепилото, като например
        цианоакрилат или епоксидна смола.
    adhesive_sides:
      name: Лепящи страни
      description: Показва дали лепилото е от едната, или от двете страни на лентата/мрежата.
    adjunct_grain_processing_form:
      name: Форма на обработка на допълнителното зърно
      description: Показва физическата/обработваща форма на допълнителното зърно,
        както е продадено за пивоварство (напр. люспесто, торифицирано, малцово, сурово).
    adjustability_type:
      name: Тип регулируемост
      description: Показва какъв тип регулиране поддържа стойката.
    adjustable_cup_mutes:
      name: Регулируеми заглушители тип „чаша“
      description: Показва дали заглушителят тип „чаша“ е регулируем/сваляем и какъв
        е типът на регулиране.
    adjustable_zones:
      name: Регулируеми зони
      description: Определя кои секции на основата могат да се регулират независимо.
    adjustment_type:
      name: Тип корекция
      description: Показва дали регулаторът е регулируем и как се извършва регулирането.
    administration_method:
      name: Метод на приложение
      description: Показва как обезпаразитяващото средство се прилага на коня (напр.
        перорално или чрез инжектиране), което помага на купувачите да спазват ветеринарните
        указания и да изберат лесен за употреба метод на приложение.
    advice_card_prompt_type:
      name: Тип подкана за карта със съвети
      description: Тип на подканата, отпечатана на картата (или липса на подкана).
    aeration_method:
      name: Метод на аерация
      description: Описва вида аерация, осигурена или поддържана от контейнера, осигуряваща
        достатъчно кислород за живата стръв.
    aero_package_components:
      name: Компоненти на аеропакета
      description: Показва кои ключови аеродинамични компоненти са инсталирани на
        превозното средство (изберете всички, които са приложими).
    aerodynamic_elements_included:
      name: Включени аеродинамични елементи
      description: Показва кои аеродинамични компоненти са включени във формула автомобила
        (изберете всички приложими, ако се поддържат).
    aftertouch_support:
      name: Поддръжка на Aftertouch
      description: Показва дали контролерът поддържа aftertouch (канален или полифоничен)
        за клавиши/падове.
    agave_content_classification:
      name: Класификация на съдържанието на агаве
      description: Указва дали текилата е произведена от 100% агаве Blue Weber или
        е микс, съдържащ минимум 51% агаве захари.
    aida_cloth_count:
      name: Брой нишки на Aida плат
      description: Определя броя нишки на плата Aida (брой квадрати/бодове на инч),
        която определя размера на бода и мащаба на дизайна.
    aida_cloth_pre_cut_format:
      name: Предварително изрязан формат за плат Aida
      description: Показва дали платът Aida се продава като предварително изрязан
        плат, като отрязък от ролка, или на метър от ролка.
    air_bag_material:
      name: Материал на въздушната възглавница
      description: Определя материала на въздушния мех/резервоара, използван при ирландска
        гайда.
    air_bed_internal_construction:
      name: Вътрешна конструкция на надуваемото легло
      description: Описва вътрешната структура или технология, използвана във вътрешността
        на надуваемия легло за комфорт и стабилност.
    air_dry_clay_color_form:
      name: Цвят на въздушносъхнеща глина
      description: Дали глината се продава предварително оцветена, бяла/неутрална
        за рисуване, или като микс/асортимент.
    air_hockey_items_included:
      name: Включени са артикули за въздушен хокей
      description: Изброява конкретните аксесоари, включени в комплекта, за да знаят
        клиентите точно какво получават (напр. 2 тласкача, 4 шайби, 2 филцови подложки).
    air_intake_temperature_sensor_mounting_style:
      name: Начин на монтаж на сензора за температура на входящия въздух
      description: Физическият начин на монтаж на IAT сензора в системата за всмукване.
    air_integration_capability:
      name: Възможност за интеграция с въздушна система
      description: Показва дали и как компютърът за гмуркане поддържа безжични предаватели
        за налягане в бутилката.
    air_mattress_valve_type:
      name: Тип клапан за надуваемо легло
      description: Определя типа клапан, за който е съвместим аксесоарът или който
        съдържа, осигурявайки съвместимост между помпи, вентили и резервни части.
    air_water_rocket_kit_items_included:
      name: Включени елементи в комплект за въздушни и водни ракети
      description: Основни компоненти, включени в ракетния комплект (пусково устройство,
        помпа, стабилизатори, резервни части).
    air_water_rocket_launch_method:
      name: Начин на изстрелване на въздушни и водни ракети
      description: Начин на напомпване и изстрелване на ракетата (взаимодействие с
        потребителя и тип оборудване).
    airbag_position:
      name: Позиция на въздушната възглавница
      description: Определя предназначената зона/позиция на задържане, която въздушната
        възглавница поддържа.
    aircraft_ads_b_capability:
      name: Възможност на въздухоплавателното средство за ADS-B
      description: Указва дали въздухоплавателното средство е оборудвано за съответствие
        с ADS-B Out.
    aircraft_airframe_material:
      name: Материал на конструкцията на въздухоплавателното средство
      description: Основни материали, използвани в конструкцията на на въздухоплавателното
        средство.
    aircraft_cabin_configuration:
      name: Конфигурация на въздухоплавателното средство
      description: Определя конфигурацията на кабината на въздухоплавателното средство
        (напр. конферентна зона, диван, четиризонова кабина)..
    aircraft_documentation_included:
      name: Включена документация за самолета
      description: Изброява кои документи са предоставени с частта (напр. 8130-3).
    aircraft_galley_configuration:
      name: Конфигурация на кухнята на въздухоплавателното средство
      description: Наличие и тип на кухненския бокс/кетъринг съоръженията в кабината.
    aircraft_installation_location:
      name: Място на инсталация във въздухоплавателното средство
      description: Къде в самолета е инсталирана или използвана частта или аксесоарът.
    aircraft_internet_connection:
      name: Интернет връзка във въздухоплавателното средство
      description: Показва наличието/вида на интернет свързаност в кабината.
    aircraft_landing_gear_type:
      name: Тип колесник на въздухоплавателното средство
      description: Определя конфигурацията на колесника на автожира.
    aircraft_lavatory_configuration:
      name: Конфигурация на тоалетните в самолета
      description: Тип конфигурация на бордовата тоалетна.
    aircraft_maintenance_program_enrollment:
      name: Записване в програма за техническо обслужване на въздухоплавателни средства
      description: Показва дали въздухоплавателното средство е включено в програма
        за поддръжка на двигател и/или планер и какъв тип покритие се прилага (двигател,
        планер или и двете).
    aircraft_operational_certification:
      name: Оперативно сертифициране на въздухоплавателни средства
      description: Определя регулаторната или оперативната сертификационна основа,
        по която се експлоатира въздухоплавателното средство (в зависимост от юрисдикцията,
        напр. FAA Part 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Сертификация на защитното оборудване на въздухоплавателното средство
      description: Посочва авиационния/регулаторния или индустриалния стандарт, на
        който отговаря сертификацията на защитното оборудване.
    aircraft_system_application:
      name: Приложение на системата на въздухоплавателното средство
      description: Определя към коя система или зона на въздухоплавателното средство
        принадлежи частта/аксесоарът (използва се за преглед и филтриране на различни
        авиационни части).
    airflow_resistance_level:
      name: Ниво на съпротивление на въздушния поток
      description: Показва колко ограничаващ е заглушителят по отношение на обратното
        налягане/съпротивлението на въздушния поток.
    airship_envelope_material:
      name: Материал за обвивка на дирижабъла
      description: Основен материал на обвивката (кожата) на дирижабъла.
    airsoft_part_type:
      name: Вид част за еърсофт
      description: Идентифицира функционалния компонент или типа аксесоар за еърсофт
        оръжия (напр. пълнител, цев, предпазител за цев).
    airworthiness_approval_basis:
      name: Основание за одобрение на летателна годност
      description: Посочва основанието за одобрение/сертификация на частта, когато
        е приложимо (напр. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Регулиране на силата на звука на алармата
      description: Показва дали и как потребителят може да регулира силата на звука
        на алармата.
    alcohol_ink_finish_effect:
      name: Ефект на завършек при алкохолно мастило
      description: Описва визуалния ефект/финиш, създаван от формулата на алкохолното
        мастило (освен цвета), например металик или перлен ефект.
    alignment_aid_style:
      name: Стил на помощното средство за подравняване
      description: Описва типа водачи за подравняване, отпечатани или вградени в повърхността
        на подложката (напр. прави линии, маркери за разстояние).
    alternator_cooling_type:
      name: Тип охлаждане на алтернатора
      description: Описва как се охлажда и вентилира алтернаторът.
    alternator_marine_ignition_protection_rating:
      name: Клас на защита от запалване на морски алтернатор
      description: Показва дали алтернаторът е със защита от запалване за морски двигателни
        отделения (напр. съответствие със SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Конфигурация за монтаж на алтернатора
      description: Определя физическата монтажна конфигурация за закрепване на алтернатора
        към конзолата на двигателя.
    alternator_pulley_type:
      name: Тип шайба на алтернатора
      description: Определя конструкцията на шайбата/съединителя на алтернатора (или
        посочва, ако не е включена шайба).
    alternator_regulator_type:
      name: Тип регулатор на алтернатора
      description: Показва дали регулаторът на напрежение е вграден в алтернатора
        или външен, както и дали е управляван от OEM (компютър/PCM).
    alternator_terminal_connection_type:
      name: Тип на клемното свързване на алтернатора
      description: Основен тип електрическо свързване на изходните и възбудителните
        клеми на алтернатора за съвместимост с инсталацията.
    altitude_suitability:
      name: Пригодност за надморска височина
      description: Показва дали топката е проектирана за специфични надморски условия,
        които влияят на скоростта и отскока.
    ambulance_stretcher_mount_type:
      name: Тип закрепване на носилка в линейка
      description: Определя типа система за товарене и монтаж на носилка, поддържана
        от линейката.
    american_football_safety_certification:
      name: Сертификат за безопасност на американския футбол
      description: Показва стандартите за безопасност при американски футбол, на които
        отговаря продуктът.
    amplifier_tube_function:
      name: Функция на лампата в усилвателя
      description: Определя функционалната роля на лампата в схемата на инструментален
        усилвател (напр. предусилвателна или крайна).
    analog_synthesizer_cv_gate_i_o:
      name: CV/Gate входове и изходи на аналогов синтезатор
      description: Показва типовете управляващо напрежение и връзки на гейта, поддържани
        за интегриране с модулно/аналогово оборудване.
    analog_synthesizer_keybed_configuration:
      name: Конфигурация на клавиатурата на аналогов синтезатор
      description: дали синтезаторът има вграден клавиатурен механизъм и ако има,
        броя на клавишите.
    anchor_configuration:
      name: Конфигурация на закрепване
      description: Показва дали системата за окачване използва една централна точка
        на закрепване или множество независими точки, което влияе на разнообразието
        от упражнения и сложността на настройка.
    animal_raising_method:
      name: Метод за отглеждане на животни
      description: Описва практиките на отглеждане на животното-източник в земеделието
        или животновъдството.
    animal_species:
      name: Животински видове
      description: Указва животното или съществото, представено от плюшената играчка
        (напр. мечка, зайче, динозавър).
    animal_trap_jaw_style:
      name: Тип челюсти на животинския капан
      description: Конфигурация на челюстите на капана, влияеща върху задържащата
        сила и хуманното отношение към животните.
    animal_trap_type:
      name: Тип капан за животни
      description: Класифицира механичния тип/дизайн на капана, позволявайки на клиентите
        бързо да намерят необходимия метод за улавяне или съответстващия на регулациите.
    ankle_collar_style:
      name: Стил на яката в областта на глезена
      description: Описва стила или конструкцията на яката на обувката в областта
        на глезена (напр. ниска, средна, висока, тип чорап, без връзки), която влияе
        на поддръжката, прилягането и външния вид.
    ankle_guard_protection_level:
      name: Ниво на защита на глезена
      description: Оценява общото ниво на защита от удар, което осигурява протекторът
        за глезен.
    ankle_strap_padding_type:
      name: Тип подплънка на каишката за глезен
      description: Описва материала на омекотяване или вида подплънка, използвана
        в каишката, който влияе на комфорта.
    ankle_strap_type:
      name: Тип каишка за глезен
      description: Класифицира конструкцията или дизайна на глезенната каишка на сноуборд
        автомата.
    ant_farm_habitat_medium_type:
      name: Тип среда за обитание в мравеферма
      description: Определя основната среда за тунелиране/наблюдение, предоставена
        или изисквана от мравефермата.
    ant_farm_kit_contents:
      name: Съдържание на комплекта за мравеферма
      description: Посочва кои компоненти са включени в комплекта за мравеферма (напр.
        контейнер за хабитат, пясък/гел, ваучер за мравки, инструменти за хранене).
    ant_farm_lighting_type:
      name: Тип осветление за мравеферма
      description: Определя вида на вграденото осветление (ако има такова), използвано
        за наблюдение.
    antenna_fit_type:
      name: Тип закрепване на антената
      description: За какъв типоразмер на антената е предназначена антенната топка.
    anti_caking_agent:
      name: Противослепващ агент
      description: Посочва вида на противослепващия агент, използван за предотвратяване
        на слепване, важен за алергии и точност на рецептите.
    anti_g_suit_bladder_material:
      name: Материал на мехурите за антигравитационен костюм
      description: Материал, използван за вътрешните надуваеми мехури в антигравитационен
        костюм – посочват се всички приложими, ако се използват няколко материала.
    anti_g_suit_connector_type:
      name: Тип конектор за антигравитационен костюм
      description: Определя стила/стандарта на конектора за маркуч за въздух/налягане,
        използван за свързване с летателния апарат или регулатора.
    anti_g_suit_inflation_method:
      name: Метод за надуване на антигравитационен костюм
      description: Показва как мехурите на костюма са под налягане, за да осигурят
        гравитационна защита.
    anti_g_suit_size_system:
      name: Система за размери на антигравитационни костюми
      description: Стандарт за размер, използван за определяне на размера/системата
        за прилягане на костюма.
    anti_reverse_type:
      name: Тип на антиобратния механизъм
      description: Определя типа на антиобратния механизъм, който влияе на засичането
        на куката и обратното движение.
    anti_theft_feature:
      name: Функция против кражба
      description: Показва дали стойката/държачът осигурява защита срещу кражба, като
        заключващи елементи или дизайн, устойчив на манипулация.
    antique_gun_ignition_system:
      name: Система за възпламеняване на антични огнестрелни оръжия
      description: Определя историческата система за възпламеняване/стрелба, използвана
        при антични огнестрелни оръжия.
    apple_variety:
      name: Сорт ябълки
      description: Определя сорта на ябълката (напр. гала, фуджи, грени смит), което
        помага на клиентите да избират според вкус, текстура и кулинарно приложение.
    applique_edge_finish:
      name: Завършек на ръба на апликацията
      description: Описва начина на обработка на ръбовете, който влияе на външния
        вид и устойчивостта срещу разнищване.
    arbor_type:
      name: Тип шпула
      description: Класифицира макарата по дизайн на шпиндела на макарата, което влияе
        върху скоростта на навиване на кордата, капацитета на подмяна и паметта на
        кордата.
    archery_accessory_type:
      name: Вид аксесоар за стрелба с лък
      description: Показва типа аксесоар за стрелба с лък за по-лесно филтриране на
        продукти.
    archery_part_type:
      name: Тип част за стрелба с лък
      description: Определя конкретния компонент или резервна част (напр. ръкохватка,
        рамена, тетива), позволявайки прецизно филтриране без разширяване на категорийното
        дърво.
    archery_range_accessory_type:
      name: Тип аксесоар за стрелбище
      description: Класифицира конкретния вид аксесоар, използван на стрелбище за
        стрелба с лък, за бързо и прецизно филтриране на необходимия продукт.
    archery_target_features:
      name: Характеристики на мишените за стрелба с лък
      description: Изброява специализирани характеристики за ефективност или удобство,
        които не са обхванати от други атрибути (напр. самовъзстановяваща се пяна,
        дръжка за носене).
    archery_tool_type:
      name: Вид инструмент за стрелба с лък
      description: Класифицира конкретния вид инструмент или оборудване за стрелба
        с лък.
    armband_features:
      name: Характеристики на гривната
      description: Изброява специални функционални или визуални характеристики, които
        подобряват гривната.
    armguard_style:
      name: Стил на предпазителя за ръка
      description: Определя конструктивния стил или типоразмер на предпазителя за
        ръка, давайки информация за покритието и традиционния или модерен дизайн.
    armor_protection_type:
      name: Тип защитна броня
      description: Вид защита, осигурявана от броневата система на превозното средство.
    armrest_adjustability:
      name: Регулируемост на подлакътниците
      description: Определя регулируемостта и конфигурацията на подлакътниците на
        стола (напр. фиксирани, 2D, 3D, сгъваеми).
    armrest_type:
      name: Тип подлакътник
      description: Описва наличието и регулируемостта на подлакътниците на стола (напр.
        без подлакътници, фиксирани, регулируеми, сваляеми).
    arrow_bolt_point_type:
      name: Тип връх на стрела/стрела за арбалет
      description: Определя стила на върха или накрайника, монтиран на стрела или
        стрела за арбалет.
    arrow_component_type:
      name: Тип компонент със стрела
      description: Класифицира конкретната част или аксесоар за стрела (вложка, обвивка,
        втулка, лепило и др.), така че клиентите да могат да филтрират артикули, без
        да се нуждаят от десетки допълнителни подкатегории.
    arrow_containment_level:
      name: Ниво на задържане на стрелата
      description: Описва дали поставката напълно, частично или изобщо не задържа
        стрелата.
    arrow_fletching_orientation:
      name: Ориентация на оперението на стрелата
      description: Указва ориентацията на крилото или отместването на оперението (напр.
        ляво крило, дясно крило, спирална), която определя посоката на въртене на
        стрелката.
    arrow_nock_groove_size:
      name: Размер на жлеба на накрайника на стрелата
      description: Определя класификацията на размера на жлеба/гърлото на накрайника,
        който определя съвместимостта с различни диаметри на тетивата.
    arrow_nock_type:
      name: Тип накрайник за стрела
      description: Дизайн/стил на накрайника на стрелата, който взаимодейства с тетивата.
    arrow_rest_style:
      name: Стил поставката на стрелата
      description: Указва функционалния стил/механизъм на поставката за стрела (напр.
        падаща поставка, острие, бисквита тип „мустак“). Стилът определя как поставката
        поддържа, задържа и освобождава стрелата и е основен начин, по който клиентите
        разграничават продуктите.
    arrow_shaft_compatibility:
      name: Съвместимост с тялото на стрелата
      description: Показва стандарта на тялото на стрелата/втулката, за който е съвместим
        светещият накрайник (напр. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Стил на върха на инструмента за изкуство/занаяти
      description: Описва формата/профила на работния връх (напр. заострен или заоблен
        тип „топче“), за да се определи какъв вид релефни (ембосинг) отпечатъци създава.
    art_ink_lightfastness_rating:
      name: Оценка за светлоустойчивост на арт мастилото
      description: Показва устойчивостта на мастилото на избледняване при излагане
        на светлина, обикновено изразена чрез стандартни оценки.
    art_ink_opacity:
      name: Непрозрачност на арт мастилото
      description: Определя нивото на покритие на мастилото след нанасяне.
    art_security_rating:
      name: ART оценка за сигурност
      description: Определя нидерландската ART оценка със звезди (1 – 5 звезди), присъдена
        на ключалката.
    artichoke_cut:
      name: Разрез на артишока
      description: Показва коя част или каква обработка на артишока се предлага (напр.
        цял, сърце, долна част), за да се разбере порцията и предназначението в кулинарията.
    artichoke_variety:
      name: Сорт артишок
      description: Определя сорта или ботаническата разновидност на артишока, за да
        помогне на клиентите да разграничават размери, цветове, вкусове и кулинарни
        приложения.
    articulation_features:
      name: Характеристики на артикулацията
      description: Показва дали моделът на динозавъра има подвижни части (подвижна
        челюст, крайници, опашка) и обща подвижност.
    artificial_bait_form:
      name: Форма на изкуствена стръв
      description: Показва физическата форма или стила на представяне на риболовната
        стръв или примамка.
    asa_mounting_type:
      name: Тип монтаж на адаптер за въздушен източник
      description: Показва типа интерфейс или монтажен стандарт на Air Source Adapter
        (ASA), използван от понижаващия преден монтаж на бутилката (напр. лястовича
        опашка, шина, директен монтаж).
    ascender_descender_type:
      name: Тип повдигач/спускател
      description: Класифицира стила на катерене с възходящ или спускащ механизъм
        за по-прецизно филтриране.
    aspiration_type:
      name: Тип аспирация
      description: Показва начина, по който двигателят е пълнен с въздух или принудително
        пълнен (аспириран/турбо/компресор).
    assembly_state:
      name: Състояние на сглобяването
      description: Показва дали шкафът се доставя готов за сглобяване, предварително
        сглобен, или в друга форма.
    assistance_mechanism:
      name: Механизъм за подпомагане
      description: Определя наличието на вградена система за асистиране или съпротивление,
        която подпомага или утежнява упражнения като набирания, кофички или други.
    atemoya_cultivar:
      name: Сорт атемоя
      description: Определя наименувания сорт/разновидност на плода атемоя, позволявайки
        на клиентите да избират плодове според предпочитан вкус, размер или характеристики
        на семената.
    athletic_cup_size:
      name: Размер на защитната чашка
      description: Показва размера на защитната чашка, определен от производителя,
        за да се осигури правилно прилягане към спортиста.
    attachment_position:
      name: Позиция на закрепване
      description: Указва къде върху седлото или ездача е предназначена да се закрепи
        чантата.
    attractant_scent_profile:
      name: Ароматен профил на примамката
      description: Описва специфичната миризма или аромат, използван за привличане
        на диви животни или за прикриване на човешката миризма.
    atv_utv_intended_use:
      name: Предназначение за ATV/UTV
      description: Основно предназначение/стил на ATV/UTV.
    audio_channel_configuration:
      name: Конфигурация на аудиоканал
      description: Броят на отделните аудиоканали, които еквалайзерът/DSP поддържа
        (напр. 2-канално стерео, 4-канално предно/задно, 6-канално).
    audio_inputs:
      name: Аудиовходове
      description: видовете аудиовходни връзки, налични за семплиране/запис (напр.
        1/4 in line,, XLR, 3,5 mm, микрофонен предусилвател, фоно).
    audio_output:
      name: Аудиоизход
      description: Показва дали играчката издава звук и как се доставя звукът.
    audio_outputs:
      name: Аудиоизходи
      description: Указва наличните аудиоизходи, включително основните изходи и всички
        програмируеми/aux изходи.
    audio_playback_source:
      name: Източник на възпроизвеждане на аудио
      description: Основни мултимедийни източници, от които караоке комплектът може
        да възпроизвежда музика.
    autograph_authentication:
      name: Удостоверяване на автограф
      description: Показва състоянието/типа на удостоверяване за автограф върху картата.
    autograph_format:
      name: Формат за автографи
      description: Описва дали подписът е оригинален ръчно положен автограф, щампован/печатен
        факсимиле, или надпис/допълнение.
    autogyro_cockpit_enclosure:
      name: Затворена конструкция на кабината на автожиро
      description: Указва дали пилотската кабина е отворена, или затворена.
    available_firing_modes:
      name: Налични режими на стрелба
      description: Изброява избираемите режими на стрелба, които маркерът поддържа
        стандартно.
    avocado_variety:
      name: Сорт авокадо
      description: Определя сорта или разновидността на авокадото, като помага на
        клиентите да разграничават разликите във вкус, текстура, размер и съдържание
        на масло.
    award_customization_included:
      name: Включено е персонализиране на наградата
      description: Показва какво персонализиране е включено в покупката на наградата.
    award_material:
      name: Материал на наградата
      description: Определя основния материал на наградата (трофей, плоча, медал,
        значка, желязна панделка).
    award_mounting_display_type:
      name: Тип монтаж/излагане на наградата
      description: Определя начина, по който наградата е предназначена да бъде излагана
        или монтирана (на стена, върху бюро или като носим елемент).
    award_plaque_plate_material:
      name: Материал на плакета на наградната плоча
      description: Определя материала на табелката с име/гравиране, прикрепена към
        плакета (различен от материала на основата).
    award_ribbon_attachment_type:
      name: Вид закрепване на наградата във формата на панделка
      description: Указва как е предназначена да се закрепи или носи панделката.
    award_ribbon_imprint_method:
      name: Показва метода на отпечатване върху наградната панделка
      description: Указва как текстът/графиката се прилагат към панделката.
    award_ribbon_material:
      name: Материал за панделка за награди
      description: Основен материал на панделката (напр. сатен, полиестер).
    award_ribbon_placement_title:
      name: Позиция/титла на наградната панделка
      description: Стандартната позиция или титла, предавана от панделката (напр.
        1-во място, участник).
    axle_compatibility:
      name: Съвместимост на осите
      description: Показва стандарта на оста, за който е съвместимо колелото, осигурявайки
        съвместимост с рамката и вилката на велосипеда.
    back_beam_type:
      name: Тип задна греда
      description: Вид/регулируемост на задната греда (напр. обикновена или с регулируема
        височина).
    back_design:
      name: Дизайн на гърба
      description: Посочва забележителни конструкции на гърба на дрехите, които влияят
        на стила и поддръжката.
    back_panel_type:
      name: Тип заден панел
      description: Определя стила или материала на задния панел на шкафа, което влияе
        върху видимостта на дисплея и съчетаването на декора.
    back_sides_material:
      name: Материал на гърба и страните
      description: Указва материала, използван за гърба и страните на тялото на класическата
        китара.
    backing_type:
      name: Тип основа
      description: Описва стила на закрепване/подложка на продавания кристал (за самозалепващ
        се продукт).
    backup_camera_mounting_location:
      name: Място за монтаж на камерата за задно виждане
      description: Показва предвиденото място за монтаж на камерата за задно виждане
        на превозното средство.
    backup_camera_video_interface:
      name: Видеоинтерфейс на камерата за задно виждане
      description: Указва видеоизхода/интерфейса/конектора, използван от камерата
        за задно виждане за свързване към монитор, DVR или главно устройство (напр.
        композитен RCA, LVDS OEM, IP през Ethernet).
    badminton_set_components_included:
      name: Включени компоненти на комплекта за бадминтон
      description: Изброява отделните елементи, включени в комплекта за бадминтон.
    bag_attachment_method:
      name: Метод за закрепване на чантата
      description: оказва основния метод за закрепване на хидратиращия резервоар/държач
        към друго оборудване (напр. MOLLE система, гайка за колан, карабинер).
    bag_case_carrying_style:
      name: Стил на носене на чанта/калъф
      description: Указва основния общ типоразмер за носене на калъфа/гигбега (как
        е проектиран да бъде носен).
    bag_cover_material:
      name: Материал на покривалото на чантата
      description: Определя материала на външния калъф/покривало на чантата, който
        влияе на издръжливостта, сцеплението и външния вид.
    bag_embellishment:
      name: Украса на чанта
      description: Описва изпъкнали декоративни елементи, приложени към външната страна
        на чантата, като например пискюли, шипове или капитониране.
    bag_fill_medium:
      name: Материал за пълнене на въздушната камера
      description: Идентифицира веществото, използвано за пълнене или създаване на
        налягане във въздушната камера (напр. въздух, вода, пясък).
    bag_material:
      name: Материал на въздушната камера
      description: Материал на въздушната камера/мехур.
    bag_padding_level:
      name: Ниво на подплата на чантата
      description: Указва степента или стила на износване, включени в торбата или
        калъфа.
    bag_size_descriptor:
      name: Описание на размера на чантата
      description: Маркетингов размер клас за чантата тип „кофа“ (напр. малък, голям),
        който допълва точните размери.
    bagel_size:
      name: Размер на бейгъла
      description: Указва общия размер на бейгъла, напр. мини, тънки, стандартни,
        големи, екстра големи или изключително големи.
    bagpipe_accessories_included:
      name: Включени аксесоари за гайда
      description: Изброява основните компоненти и аксесоари, включени към гайдарските
        гайди (извън самите гайди), например калъф, тренировъчен мундщук, покривало,
        декоративни връзки и система за контрол на влагата.
    bagpipes_playing_mode:
      name: Режим на свирене на гайди
      description: Как инструментът се захранва с въздух по време на свирене.
    bait_compatibility:
      name: Съвместимост със стръв
      description: Изброява видовете стръв, с които е предназначен да работи аксесоарът
        тип пелети, като помага на рибарите да се уверят, че избраният от тях инструмент
        съвпада с предпочитаната стръв.
    bait_species:
      name: Видове стръв
      description: Идентифицира основния организъм, предлаган като стръв, помагайки
        на рибарите да гарантират законността и ефективността на целевите видове.
    baking_chip_form:
      name: Форма на шоколадовите капки
      description: Описва физическия размер или форма на шоколадовите капки, което
        влияе върху поведението при разтапяне и външния вид на рецептата.
    balance_board_style:
      name: Стил на баланс борда
      description: Класифицира баланс бордовете според механизма или конструкцията
        им, за да се определи как се движи дъската и какво ниво на тренировъчно предизвикателство
        предлага.
    balance_cushion_accessories_included:
      name: Включени аксесоари към балансиращата възглавница
      description: Изброява всички аксесоари, включени в комплекта с възглавницата,
        което позволява на купувачите да сравняват стойността на пакета.
    balance_type:
      name: Тип на балансиране
      description: Показва състоянието/степента на балансиране на карданния вал при
        продажба (напр. фабрично балансиран, високоскоростно балансиран, небалансиран).
    ball_bladder_material:
      name: Материал на вътрешната камера на топката
      description: Идентифицира материала, използван за вътрешната камера на хандбалната
        топка, който влияе върху задържането на въздух, отскока и цялостната издръжливост.
    ball_certification:
      name: Сертификация на топката
      description: Показва официални сертификати за ефективност или одобрение, които
        топката е спечелила.
    ball_construction:
      name: Конструкция на топката
      description: Показва метода на производство, използван за свързване на панелите
        на топката, който влияе върху издръжливостта, усещането при допир, поемането
        на вода и цената.
    ball_core_construction:
      name: Конструкция на ядрото на топката
      description: Описва вътрешната конструкция на топката, която влияе върху отскока
        и усещането при игра.
    ball_core_type:
      name: Тип ядро на топката
      description: Показва вътрешната конструкция на топката, която влияе върху отскока
        и разпространението на теглото.
    ball_cup_game_included_pieces:
      name: Включени части от играта топка и чашка
      description: Идентифицира кои компоненти са включени в продуктовия пакет за
        игра с топка и чашка.
    ball_drilling_state:
      name: Състояние на пробиване на топката
      description: Показва дали в топката са пробити отвори за пръсти и ако е така,
        до каква степен.
    ball_holder_type:
      name: Тип държач за топка
      description: Идентифицира структурния стил или типоразмер на държача на топката.
    ball_pit_ball_surface_finish:
      name: Повърхностна обработка на топките за сух басейн
      description: Описва тактилното/визуалното покритие на повърхността на топката,
        което влияе върху сцеплението, усещането при игра и почистването.
    ball_pit_safety_features:
      name: Функции за безопасност на сухия басейн
      description: Елементи на дизайна, свързани с безопасността на сухите басейни.
    ball_pump_accessory_type:
      name: Тип аксесоар за помпа за топки
      description: Определя конкретния вид аксесоар за помпа за топки, за да могат
        търговците да обозначават манометри, маркучи, смазки и други допълнения в
        рамките на една основна категория.
    ball_return_mechanism:
      name: Механизъм за връщане на топката
      description: Определя стила на връщане на топката, включен в постелката, ако
        има такъв.
    ball_return_type:
      name: Тип връщане на топката
      description: Вид система за джоб/връщане на топки, която събира топките по време
        на игра.
    ball_speed_rating:
      name: Оценка на скоростта на топката
      description: Категория на скоростта, определена от производителя, която показва
        колко бързо се движи топката при стандартни условия.
    ball_surface_texture:
      name: Текстура на покритието на топката
      description: Описва външната текстура или оребряването на топките, което може
        да влияе върху сцеплението и външния вид.
    ball_surface_type:
      name: Тип покритие на топката
      description: Описва външното покритие или омекотяването на топката, за да покаже
        усещането и сцеплението.
    ballonet_configuration:
      name: Конфигурация на балонетите
      description: Тип/конфигурация на балонетната система, използвана за управление
        на трима и налягането (при ненапрегнати/полутвърди дирижабли).
    balloon_closure_valve_type:
      name: Тип балонно затваряне/клапан
      description: Определя начина, по който балонът се затваря след надуване (напр.
        завързване, самозатварящ се клапан).
    balloon_kit_finish:
      name: Покритие на комплекта балони
      description: Описва повърхностното/визуалното покритие на балоните, включени
        в комплекта.
    balloon_kit_material:
      name: Материал за комплект балони
      description: Указва основния материал на балоните, включени в комплекта.
    banana_variety:
      name: Сорт банани
      description: Посочва предлагания сорт или вид банан.
    banjo_head_type:
      name: Тип мембрана на банджото
      description: Тип/материал на мембрана на банджото, който влияе върху яркостта
        на звука, силата и усещането при свирене.
    banjo_neck_material:
      name: Материал за грифа на банджо
      description: Материалът на грифа, влияещ върху усещането, стабилността и тона.
    banjo_pickup_configuration:
      name: Конфигурация на пикъпа на банджото
      description: Дали банджото има вграден пикъп и какъв тип технология на пикъп
        използва.
    banjo_rim_material:
      name: Материал на ринга на банджото
      description: Материал на ринга/корпуса (кръглата част на инструмента), който
        силно влияе върху тона и теглото.
    banjo_tone_ring_type:
      name: Тип тонален ринг на банджото
      description: Определя дизайна/материалната група на тоналния ринг на банджото,
        който оформя тембъра и силата на звука.
    banjo_tuning_machine_type:
      name: Тип механизъм за настройване на банджото
      description: Тип ключове за настройване, използвани на банджото.
    banknote_authentication_grading:
      name: Автентикация и оценка на банкноти
      description: Трета страна (ако има), която е удостоверила автентичността или
        е извършила оценка на банкнотата.
    banknote_grade:
      name: Степен на банкнотите
      description: Стандартизирана степен на състояние на банкнота по нумизматична
        скала.
    banknote_holder_type:
      name: Тип държач за банкноти
      description: Показва физическия контекст на съхранение на банкнотата (напр.
        свободна или в сертифициран държач).
    banknote_material:
      name: Материал за банкноти
      description: Основен субстрат/материал на банкнотата.
    banknote_security_features:
      name: Защитни елементи на банкнотата
      description: Забележителни защитни/дизайнерски елементи, присъстващи на банкнотата.
    banknote_serial_number_type:
      name: Вид сериен номер на банкнотата
      description: Показва дали серийният номер е наличен и/или има специални характеристики
        за колекционерство (не действителният номер).
    banner_display_location:
      name: Местоположение за показване на банера
      description: Уточнява предназначеното място за поставяне на банера (напр. врата,
        стена, фон за маса).
    banner_hanging_hardware_type:
      name: Тип елемент за окачване на банери
      description: Определя основния включен или вграден елемент за окачване/фиксиране
        на банера (напр. капси, джоб за рейка, въже).
    banner_message_type:
      name: Тип банерно съобщение
      description: Показва дали текстът/съобщението на банера е предварително отпечатан
        (фиксиран) или празен/може да се персонализира.
    banner_shape:
      name: Форма на банера
      description: Определя общата форма/кройка на банера за спортни фенове.
    banquette_configuration:
      name: Конфигурация на пейка тип банкет.
      description: Обща форма или ориентация на пейка тип банкет.
    bar_coating:
      name: Покритие на бара
      description: Идентифицира външното ядливо покритие, нанесено върху бара, ако
        има такова.
    bar_pad_style:
      name: Стил на защитната подложка за лост
      description: Стил на дизайна и конструкцията на защитната подложка за лост.
    bar_texture:
      name: Текстура на бара
      description: Описва цялостната текстура или захапка на бара.
    barb_type:
      name: Тип контра
      description: Показва дали куката има контра и какъв е нейният вид.
    barbell_finish:
      name: Покритие на щангата
      description: Описва защитното или естетическото повърхностно покритие/обработка
        на щангата и/или ръкавите, което влияе върху устойчивостта на корозия, усещането
        при захват и цената.
    barbell_knurling_pattern:
      name: Модел на накатката на щангата
      description: Описва стила и агресивността на накатката на зоната за захват на
        щангата, включително специфични маркировки за пауърлифтинг или вдигане на
        тежести.
    barista_suitability:
      name: Подходящост за бариста
      description: Описва дали продуктът е предназначен за приготвяне и разпенване
        на кафе.
    barre_rail_configuration:
      name: Конфигурация на балетния станок
      description: Показва броя на хоризонталните лостове, включени в балетния станок.
    barrel_or_cask_type:
      name: Вид бъчва или буре
      description: Определя вида на бъчвата или буре, използвана за отлежаване или
        финално узряване на текилата (напр. американски дъб, бъчва от бърбън, буре
        за шери).
    barrel_profile:
      name: Профил на стреличката
      description: Описва общата форма или баланса на тялото на стреличката.
    barrel_thread_standard:
      name: Стандарт на резбата на цевта
      description: Определя типа резба на тялото (цевта) на маркера за съвместимост
        с резервни цеви.
    base_anchoring_method:
      name: Метод за закрепване на основата
      description: Идентифицира как основата е закрепена към земята, като посочва
        нейната пригодност за различни повърхности и игрово състояние.
    base_ballast_method:
      name: Метод на баластиране на основата
      description: Показва как (или дали) основата на тренажора е претеглена за стабилност
        (напр. запълване с вода, запълване с пясък).
    base_configuration:
      name: Конфигурация на основата
      description: Показва структурната конфигурация на основата на панела.
    base_fill_material:
      name: Материал за запълване на основата
      description: Уточнява вида на материала или запълването, използвано за баластиране
        на основата на баскетболния манекен, което влияе върху стабилността и лекотата
        на монтаж.
    base_ingredient:
      name: Съставка на основата
      description: Определя основната земеделска суровина, от която се дестилира шочу
        или соджу.
    base_oil_type:
      name: Вид базово масло
      description: Определя базовата маслена формула на трансмисионната течност (напр.
        напълно синтетично, синтетична смес или минерално).
    base_storage_type:
      name: Тип базово съхранение
      description: Указва дали основата има вградено място за съхранение и какъв механизъм
        се използва.
    baseball_glove_type:
      name: Вид бейзболна ръкавица
      description: Категоризира ръкавицата или ръкавицата с един пръст според позицията
        на играча или функционалното предназначение.
    baseball_softball_league_certification:
      name: Сертификация за бейзболна и софтболна лига
      description: Посочва стандартите на управителния орган или лигата, на които
        продуктът отговаря.
    baseball_softball_usage_role:
      name: Роля за използване в бейзбол/софтбол
      description: Указва ролята на терена или типа участник, за който е предназначен
        предпазителят за крака (напр. кетчър, батер, арбитър, играч на полето).
    baseball_toy_set_components_included:
      name: С включени компоненти в бейзболния комплект за игра
      description: Указва кои компоненти за бейзбол са включени в продукта (напр.
        бухалка, топка, тий, основи).
    baseplate_construction:
      name: Конструкция на основната плоча
      description: Показва метода на производство на основната плоча на камиона, който
        влияе върху здравината и теглото.
    basketball_hoop_accessory_type:
      name: Вид аксесоар за баскетболен кош
      description: Класифицира специфичния вид част или аксесоар за баскетболен кош
        за филтриране и сравнение.
    basketball_padding_location:
      name: Място на омекотяване/падинг при баскетболна топка
      description: Указва към коя част от баскетболната система е предназначена защитната
        подложка да бъде поставена или да покрива.
    basketball_rim_type:
      name: Вид баскетболни обръчи
      description: Уточнява структурния или експлоатационния тип на баскетболния обръч,
        за да помогне на потребителите да изберат дизайн според нивото на игра и нуждите
        при монтаж.
    basketball_toy_features:
      name: Характеристики на баскетболната играчка
      description: Подчертава ключовите игрови или функционални характеристики на
        баскетболните играчки, извън основните им размери.
    bass_clarinet_body_material:
      name: Материал на корпуса на бас кларинет
      description: Основен материал на корпуса на бас кларинета (без механиката, колонките
        и другите метални елементи).
    bass_clarinet_lowest_written_note:
      name: Най-ниската нота на бас кларинет
      description: Най-ниската нота, която бас кларинетът може да изсвири (често описвана
        от музикантите като ниско Ми♭, ниско Ре, ниско До или ниско разширение Си).
    bass_drum_beater_head_shape:
      name: Форма на ударната глава на палката за бас барабан
      description: Описва геометричната форма/профил на ударната повърхност на палката
        за бас барабан (частта, която контактува с кожата на барабана).
    bass_drum_beater_shaft_material:
      name: Материал на дръжката на палката за бас барабан
      description: Определя материала на дръжката на палката за бас барабан, без да
        включва ударната глава.
    bass_drum_head_built_in_muffling:
      name: Вградено заглушаване на кожата на бас барабана
      description: Вид вградена система за демпфиране/заглушаване, включена в дизайна
        на кожата.
    bass_drum_head_configuration:
      name: Конфигурация на кожата на бас барабана
      description: Описва кои кожи са включени или фабрично монтирани на бас барабана
        при покупка.
    bass_drum_head_surface_finish:
      name: Повърхностно покритие на кожата на бас барабана
      description: Текстура/повърхностно покритие на кожата на бас барабана.
    bass_drum_head_type:
      name: Тип кожа за бас барабан
      description: Тип дизайн или специална конструкция на кожата на бас барабана.
    bass_drum_hoop_material:
      name: Материал за обръч на бас барабан
      description: Определя материала на обръчите (контраобръчи) на бас барабана,
        който влияе върху издръжливостта, външния вид и теглото.
    bass_drum_mounting_style:
      name: Стил на монтаж на бас барабан
      description: Указва начина, по който бас барабанът е проектиран да бъде поддържан
        или използван (начин на опора за барабанен комплект, стойка/люлка, маршов
        носач и др.).
    bass_harmonica_comb_material:
      name: Материал на гребена на басовата хармоника
      description: Материал на гребена/тялото (въздушната камера) на бас хармониката.
    bass_harmonica_mouthpiece_style:
      name: Стил на мундщука на бас хармониката
      description: Показва конфигурацията на мундщука на бас хармониката.
    bass_harmonica_reed_material:
      name: Материал на езичетата на бас хармониката
      description: Материал на езичетата, използвани в бас хармониката.
    bass_harmonica_tuning_system:
      name: Система за настройване на бас хармоника
      description: Уточнява системата за настройване (темперация), използвана при
        бас хармониката.
    bass_recorder_bocal_type:
      name: Тип на букалната тръбичка на бас блокфлейтата
      description: Указва типа на букала/въздушния канал, използван за достигане до
        мундщука на бас блокфлейтата.
    bass_recorder_included_accessories:
      name: Включени аксесоари към бас блокфлейтата
      description: Изброява аксесоарите, включени в комплекта на бас блокфлейтата.
    bass_recorder_keywork_material:
      name: Материал за клавиши на бас блокфлейта
      description: Указва материала на клавишите на блокфлейтата (ако има такива).
    bass_trombone_slide_material:
      name: Материал на плъзгача на бас тромбона
      description: Указва основния материал/покритие на външните тръби на плъзгача
        (и/или сглобката на плъзгача) на бас тромбона.
    bass_trombone_valve_wrap_style:
      name: Стил на разположение на клапанната система на бас тромбона
      description: Определя дизайна на обвивката на клапана, използван в инструмента.
    bass_ukulele_string_type:
      name: Тип струни за бас укулеле
      description: Указва общия тип струни, използвани на бас укулеле.
    bassinet_cradle_accessory_features:
      name: Характеристики на аксесоарите за кошара и люлка
      description: Подчертава важни функционални характеристики или качества на аксесоарите
        за бебешка люлка и кошара (напр. водоустойчиви, органично сертифицирани, хипоалергенни).
    bassoon_bell_material:
      name: Материал на камбаната на фагота
      description: Указва материала на фаготната камбана.
    bassoon_bocal_system:
      name: Фаготна бокална система
      description: Вариантът/типът на бокала, използван за различни системи и приложения
        на фагота.
    bassoon_case_shell_type:
      name: Тип на корпуса на кутията за фагот
      description: Указва защитната конструкция на калъфа (мек, твърд или хибриден).
    bassoon_keywork_material:
      name: Материал за ключовете на фагот
      description: Материал и/или покритие на механиката на фагота (клапи и механични
        елементи).
    bassoon_model_level:
      name: Ниво на модела на фагот
      description: Показва нивото на свирене, за което е предназначен моделът на фагота.
    bassoon_performance_level:
      name: Ниво на ефективност на фагота
      description: Показва нивото на свирене, за което е предназначен моделът фагот
    bassoon_reed_scrape_style:
      name: Стил на изстъргване на тръстиката на фагота
      description: Показва стила на изстъргване/профил на тръстиката на фагот.
    bassoon_reed_thread_color:
      name: Цвят на нишката на тръстиката на фагота
      description: Цвят на подвързващата нишка, използвана при тръстиката.
    bassoon_reed_type:
      name: Тип тръстика за фагот
      description: Указва подтипа тръстика за фагот, за който продуктът е подходящ
        (където е приложимо).
    bassoon_system:
      name: Фаготна система
      description: Идентифицира системата/традицията на дизайна на фагот, използвана
        от инструмента.
    bat_construction:
      name: Конструкция на бухалката
      description: Указва от колко отделни части или слепени секции е изработено тялото
        на бухалката (напр. еднокомпонентна, двукомпонентна, хибридна), което влияе
        върху гъвкавостта, контрола на вибрациите и цялостното представяне.
    bat_handle_size_compatibility:
      name: Съвместимост на размера на дръжката на бухалката
      description: Указва размерите на дръжката на крикет бухалката, за които е проектирана
        ръкохватката.
    bath_book_interactive_features:
      name: Интерактивни функции на книжки за баня
      description: Вградени функции за игра/обучение, интегрирани в книжките за баня.
    bath_bubble_machine_features:
      name: Характеристики на машината за балончета за вана
      description: Ключови функционални характеристики на машината за сапунени балони
        за вана извън базовото производство на балони.
    bath_crayon_features:
      name: Характеристики на пастели за баня
      description: Ключови функционални/характеристики за безопасност на пастелите
        за баня.
    bath_squirter_spray_pattern:
      name: Модел на струята на водната играчка за баня
      description: Описва как играчката за баня разпръсква вода (модел на струята),
        когато бъде стисната или активирана.
    bath_toy_molded_drain_design:
      name: Формован дизайн за оттичане на водата при играчки за баня
      description: Указва дали играчката е проектирана така, че да се отцежда и изсъхва,
        за да се намали задържането на вода.
    bath_toy_water_play_function:
      name: Функция за игра с вода при играчки за баня
      description: Определя основния механизъм за взаимодействие с вода/игра на играчката.
    baton_size_standard:
      name: Стандарт за размер на палката
      description: Класификация на щафетната палка по размер на състезанието (юноши
        или възрастни).
    battery_case_certification_standard:
      name: Сертификация/стандарт на корпуса на батерията
      description: Изброява приложимите транспортни/сертификати за транспорт или изпитвателни
        стандарти, на които отговаря корпусът за съхранение/транспорт на батерии.
    battery_case_interior_padding_material:
      name: Материал на вътрешната подложка на корпуса за батерии
      description: Указва основния материал за омекотяване/подплата, използван във
        вътрешността на корпуса (ако е приложимо).
    battery_configuration:
      name: Конфигурация на батерията
      description: Указва физическата конфигурация/форма на батерийния пакет (типоразмер),
        за да могат потребителите да съобразят батерията с ограниченото пространство
        в конкретни Airsoft реплики.
    battery_group_size:
      name: Размер на групата на батерията
      description: Стандартизиран размер на корпуса на батерията (напр. BCI Group
        24F, H6), използван за съвместимост с много превозни средства.
    battery_polarity:
      name: Полярност на батерията
      description: Определя полярността/ориентацията на клемите (положителна позиция
        на клемите), което е ключово ограничение за монтаж на много автомобилни и
        спортни батерии.
    battery_standards_supported:
      name: Поддържани стандарти за батерии
      description: Указва стандартите за оценка на батериите, които тестерът поддържа
        при проверка на стартовите характеристики или състоянието на батерията.
    battery_voltage_class:
      name: Клас на напрежение на батерията
      description: Стандартен клас на напрежение за батерийния пакет на ЕПС, използван
        за бързо филтриране (напр. 400 V спрямо 800 V системи).
    batting_cage_components_included:
      name: С включени компоненти за тренировъчни клетки
      description: Изброява отделните части, включени в продукта, за да могат купувачите
        да потвърдят дали е включена цялостна система или конкретни резервни части.
    batting_helmet_accessories_included:
      name: Включени аксесоари към каската за батиране
      description: Изброява защитните или козметичните аксесоари, включени с каската
        за батиране.
    batting_stuffing_form_factor:
      name: Типоразмер на ватиране и пълнеж
      description: Указва дали продуктът се продава като насипен пълнеж, листове,
        ролки, предварително изрязани части или оформени елементи.
    batting_stuffing_loft_level:
      name: Ниво на пухкавост/обем на пълнежа (ватирането)
      description: Указва степента на обемност/пухкавост на пълнежа (ватирането),
        използвана за избор при капитониране и подплънки.
    batting_stuffing_thermal_insulation_level:
      name: Ниво на топлоизолация на пълнежа (ватирането)
      description: Относителна топлина/изолационна ефективност на пълнежа, използван
        в юргани, якета и одеяла.
    batting_tee_base_design:
      name: Дизайн на основата на стойката за батиране
      description: Описва стила или конструкцията на основата на стойката за батиране,
        което влияе върху стабилността и видовете игрални повърхности, за които е
        подходяща.
    battle_top_arena_stadium_compatibility:
      name: Съвместимост на въртящите се пумпали с арена/стадион система
      description: Указва за коя арена/стадионна система е предназначен продуктът
        за използване (особено при комплекти или специални форми на арени).
    battle_top_items_included:
      name: Включени елементи за въртящи се пумпали в комплекта
      description: Указва кои елементи за въртящи се пумпали са включени в комплекта
        (напр. пумпал, пусков механизъм, арена/стадион, въже за стартиране, резервни
        части).
    battle_top_performance_type:
      name: Тип на ефективност на въртящия се пумпал
      description: Описва общия стил на ефективност на въртящия се пумпал, който отразява
        поведението му в арената (напр. агресивен или с издръжливост).
    bayan_included_accessories:
      name: Включени аксесоари към баяна
      description: Аксесоари, включени в баяна (в кутията).
    bayan_tuning_system_type:
      name: Тип система за настройка на баян
      description: Начин на опъване/настройване на баяна (конструктивен стил), който
        влияе върху преносимостта и леснотата на настройка.
    bb_gun_action_type:
      name: Тип действие на въздушния пистолет
      description: Указва механичния механизъм за зареждане или презареждане на въздушния
        пистолет (напр. лостов, помпен, чупещ се цевен механизъм).
    bb_gun_caliber:
      name: Калибър на въздушния пистолет
      description: Определя диаметъра на сачмите, с които оръжието е проектирано да
        стреля, осигурявайки съвместимост с боеприпасите.
    bb_gun_part_type:
      name: Тип част за въздушния пистолет
      description: Класифицира конкретния компонент или аксесоар, предназначен за
        въздушни пистолети, за да могат купувачите бързо да открият точната резервна
        част, подобрение или добавка (напр. цев, уплътнение на бутало, бързозареждач).
    beach_ball_features:
      name: Характеристики на плажната топка
      description: Забележителни функционални характеристики, специфични за плажните
        топки.
    beach_bucket_features:
      name: Функции на плажната кофа
      description: Функционални характеристики на плажната кофа, които влияят върху
        употребата, издръжливостта и удобството.
    beach_sand_toy_items_included:
      name: Включени елементи за плажни и пясъчни играчки
      description: Допълнителни елементи за игра на плаж/пясък, включени към кофичката
        (ако се продава като комплект).
    bead_breaker_type:
      name: Тип борд на гумата
      description: Тип/дизайн на механизма за освобождаване на борда на гумата.
    bead_hole_style:
      name: Тип на отвора за мъниста
      description: Указва стила или конфигурацията на отвора/слота в мънистото, който
        влияе върху начина, по който то се позиционира върху куката или кордата.
    bead_type:
      name: Вид мъниста
      description: Основните видове мъниста, изисквани от модела.
    bead_type_patch_embellishment:
      name: Вид мъниста (украса с лепенка)
      description: Основен тип мъниста, използвани върху повърхността на нашивката.
    beaded_accessory_project_type:
      name: Тип проект за аксесоари с мъниста
      description: Какъв аксесоар прави моделът.
    beading_needle_flexibility:
      name: Гъвкавост на иглата за мъниста
      description: Относителна гъвкавост на стеблото на иглата за преминаване през
        тесни участъци при работа с мъниста.
    beading_pattern_bead_size:
      name: Размер на мънистата в схемата за мънистоизработка.
      description: Препоръчителен размер на мънистата, посочен от схемата (обикновено
        размери на дребни стъклени мъниста, напр. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Формат на схемата за изработка с мъниста.
      description: Как схемата е представена визуално (напр. графично или снимки със
        стъпка по стъпка).
    beading_pattern_stitch_technique:
      name: Техника/бод за моделиране с мъниста
      description: Основен шев или техника на тъкане с мъниста, използвана в схемата.
    beading_technique_stitch:
      name: Техника/бод за мъниста
      description: Определя основната техника или бод за работа с мъниста, използван
        в схемата (напр. пейот бод, тухлен бод).
    beading_thread_fiber_type:
      name: Вид влакно на нишката за работа с мъниста
      description: Указва подтипа на влакното/материала на нишката за работа с мъниста
        (по-специфично от общия материал), свързан с ефективността.
    beading_thread_size:
      name: Размер на нишката за мъниста
      description: Указва размера на нишката за работа с мъниста според обозначението
        на производителя/индустрията (специфично за марка или серия), напр. размер
        D или 00.
    beading_thread_use_case:
      name: Предназначение на нишката за работа с мъниста
      description: Определя основното препоръчително предназначение на нишката за
        работа с мъниста, за да помогне на купувачите да изберат подходящия продукт
        за своя проект.
    beading_wire_coating_material:
      name: Материал на покритието на телта за мъниста
      description: Указва материала на външното покритие на телта за работа с мъниста
        (ако има такова), който влияе върху усещането, издръжливостта и устойчивостта
        на прегъване.
    beading_wire_strand_count:
      name: Брой нишки в телта за работа с мъниста
      description: Указва броя на нишките в многожилната тел за работа с мъниста (напр.
        7-жилна, 19-жилна, 49-жилна), което влияе върху гъвкавостта и начина на падане.
    beadlock_type:
      name: Тип заключване на борда (на гумата)
      description: Указва дали джантата е със заключване на борда и какъв е типът
        му (помага на купувачите на офроуд/UTV).
    beam_material:
      name: Материал на гредата
      description: Основен материал на гредата/пръта (често различен от главите/прикрепващите
        елементи).
    beam_pattern:
      name: Модел на лъча
      description: Разпределение на светлинния сноп, използван за осветление при шофиране/офроуд.
    bean_bag_fabric_material:
      name: Материал на плата на пуф/седяща торба
      description: Указва външния плат, използван за пуфовете (седящите торби), включени
        в комплекта.
    bean_paste_variety:
      name: Вид/сорт бобена паста
      description: Класифицира конкретния вид бобена паста според начина на производство
        или основната съставка.
    bean_preparation:
      name: Приготвяне на боб
      description: Показва как зърната са приготвени или обработени преди продажба
        (напр. цели шушулки, обелени, нарязани, покълнали).
    bean_variety:
      name: Сорт боб
      description: Указва ботаническия или пазарния сорт на зърната (напр. зелен фасул,
        едамаме, дълги бобови шушулки).
    beanie_style:
      name: Стил на шапката тип бини
      description: Указва общия дизайн, конструкция или силует на шапката тип бини,
        за да могат купувачите бързо да избират между различните варианти.
    bearing_clearance:
      name: Клас на вътрешна хлабина на лагера
      description: Указва вътрешния радиален клас на хлабина на лагера (вътрешния
        луфт); клас C0 се обозначава също като CN или нормална хлабина.
    bearing_construction_type:
      name: Тип конструкция на лагера
      description: Указва типа конструкция или изпълнение на лагера, използван в главината
        (напр. касетъчен лагер, насипни сачми).
    bearing_edge_type:
      name: Тип/профил на носещия ръб на корпуса
      description: Тип/профил на носещия ръб на корпуса, който влияе върху атаката
        и устойчивостта.
    bearing_lubrication:
      name: Смазване на лагери
      description: Указва типа смазка, приложена към лагера при производство, напр.
        грес или масло.
    bearing_material:
      name: Материал на лагера
      description: Указва материала на изработка на лагера (напр. стомана, керамичен
        хибрид), като помага при избор между издръжливост, цена и производителност.
    bearing_rating:
      name: Клас на лагерите
      description: Указва класа на точност/толеранс или производителност на лагерите,
        използвани в кънките (напр. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Код на уплътнението на лагера
      description: Указва типа уплътнение на лагера, което влияе върху издръжливостта
        и съпротивлението при въртене.
    bearing_seal_type:
      name: Тип уплътнение на лагера
      description: Указва типа уплътнение или защитен щит на лагера, който предпазва
        вътрешните елементи от замърсявания и влияе върху съпротивлението при въртене
        (напр. 2RS, ZZ, LLU, отворен).
    bearing_shield_type:
      name: Тип на защитния щит на лагера
      description: Стил на защита (уплътнение или щит), който предпазва вътрешността
        на лагера.
    bearing_size_code:
      name: Код за размера на лагера
      description: Стандартизирано обозначение на лагера (напр. 608, 688), което определя
        вътрешен диаметър, външен диаметър и ширина.
    bearing_type:
      name: Тип лагер
      description: Указва конструктивния тип на лагерите, използвани в кормилната
        тръба.
    beater_head_material:
      name: Материал на главата на палките
      description: Указва материала на контактната част (главата) на чукчето за бас
        барабан (напр. филц, дърво, гума).
    beaters_included:
      name: С включени палки
      description: Указва колко чукчета са включени или монтирани към педала за барабан
        (напр. единично или двойно чукче), или дали не е включено чукче.
    bed_base_type:
      name: Тип основа за легло
      description: Определя конструктивния стил на основата на леглото или дивана
        (напр. платформа, еластични ламели, регулируема).
    bed_storage_type:
      name: Тип съхранение за легло
      description: Определя вградения механизъм за съхранение в рамката на леглото.
    bedroom_furniture_items_included:
      name: Включени елементи за мебели за баня
      description: Указва отделните мебели, включени в спалния комплект (напр. легло,
        скрин, нощни шкафчета), за да могат купувачите бързо да видят какво е включено
        без да четат дълги описания.
    bedroom_vanity_items_included:
      name: Включени елементи към тоалетката за спалня
      description: Изброява отделните елементи, включени в комплекта за тоалетка в
        спалнята, за да знаят клиентите точно какво се доставя (напр. огледало, табуретка,
        комплект осветление).
    beer_based_cocktail_variety:
      name: Разнообразие от коктейли на бирена основа
      description: Класифицира коктейлите на бирена основа по техния специфичен вид,
        например Радлер, Шанди, Мичелада.
    beet_variety:
      name: Сорт цвекло
      description: Указва сорта или разновидността на цвеклото, което помага за идентифициране
        на вкуса, цвета и кулинарните му приложения (напр. червено, златисто, киоджа).
    bell_actuation_mechanism:
      name: Механизъм на задействане на звънеца
      description: Определя действието на потребителя, необходимо за позвъняване на
        звънеца, помагайки на купувачите да изберат предпочитана ергономичност.
    bell_guard_coverage_area:
      name: Площ на покритие на предпазителя на звънеца
      description: Указва каква част от звънеца предпазва защитният елемент.
    bell_material:
      name: Материал на камбаната
      description: Материал на звънеца (ако е посочен отделно от общия материал на
        инструмента).
    bellhousing_bolt_pattern:
      name: Схема на разположение на болтовете на камбанния корпус (между двигателя
        и трансмисията).
      description: Указва стандарта или типа на схемата на болтовете между камбанния
        корпус и двигателя, използвана от корпуса на трансмисията.
    bellows_material:
      name: Материал на маншона
      description: Материал на тялото/покритието на маншона (ако е включен).
    bellows_orientation:
      name: Ориентация на маншона
      description: Указва конфигурацията на маншона, използван за подаване на въздух
        към тръбите.
    belly_panel_style:
      name: Стил на коремния панел
      description: Описва конструкцията на колана или коремния панел, който се разширява,
        за да побира нарастващ корем.
    belt_buckle_type:
      name: Тип катарама за колан
      description: Описва специфичния механизъм или дизайн на катарамата, използван
        на колана.
    beret_style:
      name: Стил на барета
      description: Идентифицира специфичния дизайн или културния вариант на баретата.
    berry_species:
      name: Видове дребни плодове
      description: Указва вида на дребните плодове, съдържащи се в продукта, за да
        могат купувачите бързо да филтрират по желания плод.
    beta_casein_variant:
      name: Вариант на бета-казеина
      description: Указва кой вариант на бета-казеин протеин (напр. A2) се съдържа
        в млякото, за потребители с чувствителност при храносмилане.
    beverage_sweetness_level:
      name: Ниво на сладост на напитката
      description: Класифицира напитката по степен на добавена сладост или захар.
    bezel_graduation_units:
      name: Единици на деление на безела.
      description: Указва маркировките на мерните единици на въртящия се безел (градуси,
        мили или двойна мярка).
    bicycle_brake_set_components_included:
      name: Включени компоненти на комплект велосипедни спирачки.
      description: Изброява отделните части, включени в комплекта, за да знаят купувачите
        точно какво е включено и да могат да сравняват различни конфигурации на комплекти.
    bicycle_cage_mounting_position:
      name: Позиция за монтаж на стойката за бутилка за велосипед
      description: Указва къде върху велосипеда е предназначена да се монтира стойката
        за бутилка.
    bicycle_computer_mount_placement:
      name: Позиция на монтаж на стойката за велосипедния компютър
      description: Указва къде върху велосипеда се монтира стойката за велосипедния
        компютър, например отпред на кормилото или върху капачката на стемата.
    bicycle_folding_mechanism:
      name: Механизъм за сгъване на велосипед
      description: Указва механичната система за сгъване, използвана в рамката на
        велосипеда (напр. полусгъване, вертикално сгъване).
    bicycle_frame_design:
      name: Дизайн на рамката на велосипеда
      description: Указва общия стил на рамката на велосипеда, който влияе върху достъпа,
        товароносимостта и съхранението.
    bicycle_frame_style:
      name: Стил на рамката на велосипеда
      description: Описва конструктивния стил на рамката на велосипеда (напр. ниска
        рамка за лесно качване, лоурайдър, удължена чопър рамка и др.), който влияе
        върху позата на каране и външния вид.
    bicycle_handlebar_type:
      name: Тип кормило на велосипед
      description: Указва конкретния стил или геометрия на кормилото, като помага
        на колоездачите да изберат кормило, подходящо за тяхната позиция на каране
        и дисциплина.
    bicycle_headset_configuration:
      name: Конфигурация на кормилната система на велосипеда
      description: Указва конструктивния стил или стандарта на кормилната система
        на велосипеда според разположението на чашките (напр. външни чашки, вградена
        система, интегрирана система, резбована система).
    bicycle_hub_type:
      name: Тип главина за велосипед
      description: Описва механизма на главината, с който е оборудвано колелото, който
        влияе върху съвместимостта с задвижването и стила на каране.
    bicycle_lock_security_certification:
      name: Сертификация за сигурност на заключване на велосипеди
      description: Независима сертификация от трета страна, която валидира ефективността
        срещу кражба (напр. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Тип педал за велосипед
      description: Указва общия работен стил или дизайн на педала, като платформа,
        безклипсови варианти или хибридни, за да помогне на колоездачите да изберат
        подходящия интерфейс според стила си на каране.
    bicycle_propulsion_type:
      name: Тип задвижване на велосипед
      description: Указва начина на задвижване на велосипеда, например чрез педалиране,
        електрическа помощ или двигател с вътрешно горене.
    bicycle_pump_type:
      name: Тип помпа за велосипед
      description: Указва конструктивния стил на помпата, като помага на купувачите
        да изберат дизайн, подходящ за техните нужди при каране, съхранение или спешни
        ситуации.
    bicycle_rack_mounting_type:
      name: Тип на монтаж на багажника за велосипед
      description: Описва основния метод или място за закрепване на багажника към
        велосипеда, като помага на потребителите да потвърдят съвместимостта с рамката
        и крепежните елементи.
    bicycle_suspension_type:
      name: Тип окачване на велосипед
      description: Указва наличието и конфигурацията на окачването (амортизацията)
        на велосипеда.
    bicycle_tire_tread_pattern:
      name: Модел на грайфера на велосипедна гума
      description: Указва типа на грайфера на гумата, който влияе върху сцеплението
        и съпротивлението при търкаляне върху различни настилки.
    bidirectional_charging_capability:
      name: Възможност за двупосочно зареждане
      description: Указва дали електрическото превозно средство поддържа режими на
        двупосочно зареждане, като V2G (от превозно средство към мрежата) и/или V2H
        (от превозно средство към дома).
    bike_rack_mounting_style:
      name: Стил на монтаж на багажник за велосипед
      description: Начинът, по който велосипедът се поддържа/закрепва върху багажника.
    bike_rack_tilt_function:
      name: Функция за накланяне на багажника за велосипед
      description: Наличие и тип функция за накланяне, която позволява достъп до задния
        товарен отсек, докато багажникът е монтиран.
    bikini_top_style:
      name: Стил на горнището на бикини
      description: Указва дизайна или кройката на горната част на банския, като помага
        на купувачите да намерят предпочитаната форма и прилягане.
    billiard_brush_type:
      name: Тип четка за билярдна маса
      description: Определя конкретния вид инструмент за почистване на билярдна маса
        (напр. четка за сукно, четка за бордове, блок за повдигане на влакната на
        сукното).
    billiard_glove_finger_coverage:
      name: Покритие на пръстите при билярдната ръкавица
      description: Указва кои пръсти са покрити от дизайна на ръкавицата, като осигурява
        по-прецизно филтриране на различните видове билярдни ръкавици.
    billiard_pocket_style:
      name: Стил на билярдните джобове
      description: Указва конструктивния или декоративния стил на джоба, който влияе
        върху съвместимостта и външния вид на масата.
    billiard_rack_style:
      name: Стил на билярдния триъгълник
      description: Описва физическия стил или механизма на триъгълника (напр. традиционна
        рамка, шаблонна подложка, сгъваем модел).
    billiard_table_type:
      name: Вид билярдна маса
      description: Указва дисциплината или предназначението в билярдния спорт, за
        което е предназначена масата (напр. пул, снукър, карамбол).
    billiards_discipline:
      name: Дисциплина билярд
      description: Указва конкретния вариант на билярдната игра (вид игра), за който
        продуктът е предназначен или съвместим.
    binding_compatibility_standard:
      name: Стандарт за съвместимост на автомата (ски връзките)
      description: Указва стандарта на интерфейса за захващане (подметка), за който
        е сертифициран ски обувката, за да се гарантира безопасно и правилно съвместяване
        със ски автомати.
    binding_inclusion:
      name: Включени ски автомати
      description: Указва дали ските се продават без автомати (плоски), с интегрирана
        система или с включени отделни автомати.
    binding_interface:
      name: Интерфейс на ски автомата
      description: Указва стандарта на плочата или интерфейса на ски автомата, с който
        ските са предварително монтирани или съвместими, за да се осигури съвместимост
        между обувките и автоматите.
    binding_liner_type:
      name: Тип вътрешна облицовка на ски обувката
      description: Описва вида на вътрешната облицовка (лайнер) на ски обувката, например
        сваляем, подходящ за ходене или термоформируем.
    binding_mounting_system:
      name: Система за монтаж на ски автомата
      description: Указва интерфейса, използван за закрепване на автомата към ската
        (напр. плосък монтаж, релса/шина, плоча и др.).
    binding_position:
      name: Позиция на автомата
      description: Указва предназначената позиция или конфигурация за монтаж на автомата
        (напр. предна обувка, задна обувка, ARTP).
    binding_strap_position:
      name: Позиция на каишката на ски автомата
      description: Указва къде върху автомата е предназначено да бъде монтирана каишката.
    bingo_components_included:
      name: С включени компоненти за бинго
      description: Изброява компонентите, включени в комплекта за бинго, като бинго
        топки, карти и маркери.
    bingo_number_range:
      name: Диапазон от числа за бинго
      description: Идентифицира диапазона/варианта на числата за бинго, поддържан
        от комплекта.
    bingo_set_features:
      name: Характеристики на бинго комплекта
      description: Идентифицира основния продуктов формат на комплекта за бинго (физически/ръчен
        или електронен/интерактивен).
    bipod_mounting_interface:
      name: Интерфейс за монтаж на двунога опора
      description: Указва интерфейса за закрепване, използван за свързване на двуногата
        към огнестрелното оръжие или релсовата система.
    bit_attachment_type:
      name: Тип закрепване на битовете
      description: Указва начина, по който юздата се свързва с мундщука (напр. връзване,
        катарама, винтове тип „Чикаго“).
    bit_mouthpiece_design:
      name: Дизайн на мундщука
      description: Указва конструктивния стил или конфигурацията на съединенията на
        мундщука, които определят разпределението на натиска, разстоянието до небцето
        и общата „твърдост“ на въздействието.
    bit_ring_style:
      name: Стил на халките на мундщука
      description: Определя стила на халките (страничните елементи) на мундщука, към
        които се закрепва юздата, като влияе върху действието, страничното водене
        и усещането от поводите.
    bladder_material:
      name: Материал на вътрешната гума
      description: Указва материала на вътрешната камера, която задържа въздуха.
    blade_attachment_type:
      name: Тип на закрепване на острието
      description: Указва дали кънката използва клап механизъм (с панта) или фиксирано
        закрепване на острието.
    blade_finish_coating:
      name: Покритие на острието
      description: Повърхностна обработка, нанесена върху острието за естетика или
        защита от корозия.
    blade_hosel_type:
      name: Тип на шийката (свързващата част) на острието
      description: Указва начина на свързване на шийката на острието с дръжката, който
        влияе на съвместимостта (напр. стандартна или конусовидна).
    blade_length_type:
      name: Тип дължина на острието
      description: Класифицира дължината на перката като къса, средна или дълга, като
        всяка от тях влияе върху честотата на ритане и тренировъчните цели.
    blade_lie:
      name: Ъгъл на острието спрямо повърхността
      description: Указва номера на наклона на острието на хокейната пръчка, който
        показва как острието лежи върху леда спрямо дръжката.
    blade_sharpness:
      name: Острота на острието
      description: Показва дали острието на оръжието е заострено или притъпено за
        тренировка.
    blade_size_category:
      name: Категория на размера на острието
      description: Стандартизиран международен код за размер на острието на сабя (0–5),
        използван за разграничаване на младежки и възрастни остриета.
    blade_size_class:
      name: Клас на размера на острието
      description: Класифицира острието според размера на играча, съответстващ на
        размери на дръжката като детски, юношески, междинен или за възрастни.
    blade_size_number:
      name: Номер на размера на острието
      description: Стандартизиран числов размерен код (0 – 5), определен от фехтовалните
        правила, който определя дължината на острието и допустимостта според възрастовата
        група.
    blaster_mechanism:
      name: Механизъм на бластера
      description: Определя вътрешния работен механизъм на гел бластера (напр. газово-блоубек,
        електрически, пружинен).
    block_edge_style:
      name: Стил на блоковия ръб
      description: Описва как са обработени ръбовете/ъглите на дървените блокове за
        по-добро усещане и безопасност.
    blocking_mat_features:
      name: Функции на подложките за блокиране
      description: Функционални характеристики, специфични за блокиращи постелки (съхранение,
        преносимост, удобство при използване).
    blocking_mat_grid_unit:
      name: Единица на мрежата (решетката) на блокиращата постелка
      description: Системата от единици, използвана върху отпечатаната решетка, която
        помага на потребителите да съпоставят модели и измервания.
    blocking_mat_surface_markings:
      name: Маркировки върху повърхността на блокиращата постелка
      description: Вид измервателни/водещи маркировки, отпечатани или вградени в повърхността
        на постелката.
    blocking_wire_coating:
      name: Покритие на блокиращия проводник
      description: Повърхностна обработка или покритие на блокиращия проводник, което
        влияе върху устойчивостта на корозия, гладкостта и риска от закачане.
    blocking_wire_end_cap_type:
      name: Тип капачка за блокиращия проводник
      description: Указва вида на защитния накрайник или завършек, използван в краищата
        на блокиращия проводник, за безопасност и защита на тъканите.
    blocking_wire_set_includes:
      name: ключени елементи в комплекта блокиращи проводници
      description: Указва кои компоненти са включени в продукта с блокиращ проводник
        (напр. Т-игли, туби за съхранение).
    blocking_wire_usage:
      name: Предназначение на блокиращия проводник
      description: Основен случай на употреба, за който е предназначен гъвкавият блокиращ
        проводник.
    bloom_stage:
      name: Етап на цъфтеж
      description: Степен на разтвореност на цветовете на маргаритките при доставка/изпращане.
    blower_motor_bearing_type:
      name: Тип лагер на двигателя на вентилатора
      description: Указва конструкцията на лагерите, използвани в двигателя на вентилатора.
    blower_motor_mounting_position:
      name: Позиция на монтаж на двигателя на вентилатора
      description: Къде е монтиран двигателят на вентилатора в HVAC модула/превозното
        средство (напр. отпред, отзад).
    blowpipe_valve_type:
      name: Тип на клапана на духалката
      description: Указва типа на клапана на духалката (ако е включен такъв).
    bo_staff_style:
      name: Стил на бо тоягата
      description: Определя конструктивния стил или изработката на тоягата (напр.
        права, с конусовидна форма, с дунапренова облицовка, сгъваема).
    board_game_theme:
      name: Тема за настолна игра
      description: Тематична концепция или сюжетна обстановка на настолната игра (използва
        се за откриване и разглеждане).
    board_rail_shape:
      name: Форма на релсите на дъската
      description: Указва формата на релсите на дъската (напр. мека, твърда, 50/50),
        която влияе върху задържането и ускорението върху вълната.
    board_size_classification:
      name: Класификация на размера на дъската
      description: Класифицира корнхол дъската или комплекта според стандартни размери.
    board_type_compatibility:
      name: Съвместимост с типа на дъската
      description: Указва типа на дъската, за която е предназначен поводът.
    boat_construction_type:
      name: Тип конструкция на лодката
      description: Описва конструктивния стил или формата на гребната лодка (напр.
        надуваема, твърда).
    boat_hook_flotation:
      name: Плавателност на куката за лодка
      description: Указва дали куката за лодка е проектирана да плава при изпускане
        във вода.
    boat_ladder_stowage_style:
      name: Начин на съхранение на стълбата за лодка
      description: Описва как се прибира стълбата, когато не се използва (напр. сгъваема,
        прибираща се, сваляща се).
    boat_trailer_construction_type:
      name: Тип конструкция на ремаркето за лодка
      description: Указва дали ремаркето поддържа лодката чрез напречни греди, ролкови
        опори, или хибридна система.
    boat_weaving_shuttle_weft_exit_type:
      name: Начин на излизане на вътъка от совалката при лодков тъкачен стан
      description: Начинът, по който вътъчната нишка излиза от совалката по време
        на тъкане.
    bobbin_loading_type:
      name: Начин на зареждане на шпулата
      description: Указва начина, по който шпулата се поставя/зарежда в шевната машина.
    bobbin_system:
      name: Система за шпулата
      description: Тип система за зареждане на шпулата в шевната машина.
    bobbin_type:
      name: Тип шпула
      description: Указва формата на носача на прежда, за който е проектирана совалката
        (или който включва), като определя съвместимостта и типичното приложение (напр.
        лодковите совалки често използват шпули, а совалките за парцалена прежда могат
        да бъдат отворени за ленти).
    bobbin_winder_winding_direction:
      name: Посока на навиване на шпулата при навивачката
      description: Указва посоката на навиване (въртене), поддържана от навивача на
        шпули.
    bobble_mechanism:
      name: Указва стила на механизма за бомбета, който влияе върху движението и издръжливостта
      description: Указва стила на механизма за бомбета, който влияе върху движението
        и издръжливостта.
    bocal_material:
      name: Материал на бокала
      description: Указва материала на включените бочали.
    bodhr_n_head_material:
      name: Материал на мембраната (кожата) на бодран
      description: Материал на свирещата мембрана (кожа), който силно влияе върху
        тона и изискванията за поддръжка.
    bodhr_n_tuning_system_type:
      name: Тип система за настройка на бодран
      description: Стил на вградения механизъм за настройка на опъна на мембраната
        (ако е регулируем).
    body_armor_coverage_area:
      name: Зона на покритие на защитната екипировка
      description: Показва кои зони на тялото защитава продуктът.
    body_armor_intended_use:
      name: Предназначение на защитната екипировка
      description: Указва основния сценарий на каране или употреба, за който е предназначена
        защитната броня за ATV/UTV.
    body_cord_connector_style:
      name: Стил на конектора на свързващия кабел
      description: Описва конфигурацията на конектора в краищата на кабела (напр.
        брой щифтове или байонетен тип), която определя съвместимостта с оръжия и
        системи за отчитане на резултати.
    body_panel_finish_state:
      name: Състояние на покритието на панела на корпуса
      description: Описва състоянието на подготовката/финиша на четвърт панела при
        доставка, преди боядисване или монтаж.
    body_shape:
      name: Форма на корпуса
      description: Указва общата форма/стил на корпуса на електрическата китара.
    bodysuit_bottom_coverage:
      name: Степен на покритие на долната част на боди костюма.
      description: Определя кройката и покритието на долната част на боди костюма,
        което влияе върху комфорта и съвместимостта с облеклото.
    boilie_shape:
      name: Форма на бойлито
      description: Указва формата на бойлите, произведени от ролиращата дъска, като
        позволява на риболовците да избират различни профили на стръвта.
    boilie_stop_buoyancy:
      name: Плавателност на стопера за бойли
      description: Указва дали стоперът за бойли е плаващ, потъващ или неутрално плаващ,
        като влияе върху представянето на стръвта във водния стълб.
    bok_choy_variety:
      name: Сорт бок чой
      description: Указва сорта, търговското наименование или вариацията на бок чой
        (напр. бебе, шанхайски, най бай, татсой, пурпурен лейди), като позволява на
        купувачите да изберат желан вкус, размер и външен вид.
    bolt_drive_style:
      name: Стил на задвижване на болта
      description: Указва типа на задвижване (глава) на монтажните болтове за скейтборд,
        като разграничава често използвани видове като шестостен (Allen) или кръстата
        (Phillips).
    bone_content:
      name: Съдържание на кости
      description: Указва дали месото съдържа кости.
    bongo_center_block_material:
      name: Материал на централния блок на бонгото
      description: Материал на централния блок, свързващ двете черупки на бонго (ако
        е приложимо).
    bongo_shell_material:
      name: Материал на корпуса на бонго
      description: Материал на корпусите на бонго (барабаните), с изключение на мембраните
        и окова.
    bongo_tuning_system:
      name: Система за настройване на бонго
      description: Начин на настройване/конструкция на настройката на бонгото (напр.
        традиционно с обтегачи или с въжена система), което влияе върху поддръжката
        и автентичността.
    boning_type:
      name: Тип банели
      description: Указва вътрешната система за поддържане на корсета, включително
        материала и формата/типа на банелите, което пряко влияе върху нивото на поддръжка,
        гъвкавостта и издръжливостта.
    boot_liner_type:
      name: Тип на вътрешния чорап (лайнер) на обувката
      description: Описва конструкцията или възможността за персонализация на вътрешния
        чорап (лайнер) в сноуборд обувката (напр. термоформируем, подвижен).
    boot_sole_compatibility:
      name: Съвместимост на подметката на обувките
      description: Изброява стандартите за подметка на обувки или интерфейсните системи,
        които автоматите (сноуборд автомати) поддържат.
    boot_support_level:
      name: Ниво на поддръжка на обувката
      description: Описва общото ниво на твърдост или опора в областта на глезена,
        осигурено от кънката.
    boot_width_code:
      name: Код за ширината на обувката
      description: Буквен стандарт на производителя за ширина, използван специално
        при размери за фигурни кънки (напр. AAA, AA, B, C, D).
    booth_configuration:
      name: Конфигурация на кабината
      description: Указва общата конфигурация на местата в кабинката (напр. едностранна,
        ъглова, модулна
    bootie_toe_design:
      name: Дизайн на предната част за пръстите
      description: Указва конструкцията на предната част (пръстите) на сърф ботушите
        и рифовите обувки.
    border_type:
      name: Тип на бордюра
      description: Стил на завършване на ръба/бордюра на бродираната емблема (пач),
        който влияе върху външния вид, устойчивостта на разнищване и възприетото качество.
    bore_cleaner_format:
      name: Формат на почистващото средство за отвори
      description: Указва физическия формат на продукта за почистване на отвор (инструмент
        или консуматив).
    bore_cleaner_safe_for_finish:
      name: Безопасност на почистващото средство за отвори спрямо покритието
      description: Указва за кои често срещани покрития на медни духови инструменти
        е безопасно да се използва почистващото средство за отвори.
    bottle_cage_loading_direction:
      name: Посока на зареждане/поставяне на бутилката в стойката за бутилка
      description: Описва посоката, от която бутилката се поставя или изважда от стойката
        за бутилка.
    bottle_neck_finish_closure_size:
      name: Завършек на гърлото на бутилката/размер на затварящия механизъм
      description: Стандартизиран размер на отвора на гърлото на бутилката, който
        осигурява съвместимост с капачки, тапи и затварящи устройства (напр. 26 мм
        метална капачка тип „корона“).
    bottle_style:
      name: Стил на бутилка
      description: Често срещани типоразмери на бутилките, използвани в домашното
        пивоварство и винопроизводството.
    bottom_bracket_interface:
      name: Интерфейс на долната конзола
      description: Указва стандарта на оста/долната конзола, за който е проектиран
        курбелът, като осигурява съвместимост между рамката и долната конзола.
    bottom_bracket_standard:
      name: Стандартна долна конзола
      description: Тип на корпуса/интерфейса на долната конзола, поддържан от рамката,
        който определя съвместимостта с курбелите.
    bottom_type_suitability:
      name: Съвместимост на долната част
      description: Указва видовете дънен релеф/субстрат, при които котвата е най-ефективна
        за задържане.
    bounce_level:
      name: Ниво на отскок
      description: Указва колко силно отскача топката при изпускане или хвърляне,
        като помага на потребителите да изберат подходяща топка за упражнения като
        хвърляния в стена или удари с топка.
    bouncy_ball_surface_finish:
      name: Повърхностно покритие на подскачащата топка
      description: Указва тактилното и/или визуалното покритие на подскачаща топка
        (напр. гладка, с шипчета, с блясък).
    boundary_marker_type:
      name: Тип граничен маркер
      description: Определя физическата форма на граничния маркер за игрище или терен
        или на продукта за маркиране (напр. конус, лента, боя, шаблон, машина).
    bouquet_size_tier:
      name: Категория на размера на букета
      description: Стандартизирана размерна категория на букета/снопа, независима
        от броя стъбла (полезно при смесени видове цветя).
    bow_and_yo_yo_edge_finish:
      name: Завършек на ръба при лъкове и йо-йо елементи
      description: Описва завършека на кантовете/обшивката при лъкове и йо-йо елементи
        (особено при панделки и лентови материали).
    bow_case_shell_type:
      name: Тип външна обвивка на калъфа за лък
      description: Описва конструктивния тип на външната част на калъфа за лък (напр.
        твърд корпус или мек калъф).
    bow_compatibility:
      name: Съвместимост на лъка
      description: Указва типа лък, за който е предназначен или съвместим накрайникът.
    bow_hair_color:
      name: Цвят на косъма на лъка
      description: Указва цвета/външния вид на косъма, използван в лъка на оркестров
        струнен инструмент (напр. бял/избелен, естествено бял, черен).
    bow_stick_material:
      name: Материал на тялото на лъка
      description: Указва материала на пръта на лъка (основния носещ елемент), който
        силно влияе върху теглото, усещането и цената.
    bow_type:
      name: Тип лък
      description: Указва конструктивния тип на лъка за младежи (напр. компаунд, рекърв,
        дълъг лък), който силно влияе върху стила на стрелба, необходимите аксесоари
        и тренировъчните програми.
    bow_winding_material:
      name: Материал на обвивката (навивката) на лъка
      description: Указва материала, използван за навивката/обвивката на лъка, който
        влияе върху захвата и баланса.
    bow_yo_yo_embellishment_style:
      name: Стил на декоративните елементи при лъкове и йо-йо
      description: Указва конструктивния стил на декоративния елемент (лък или текстилен
        йо-йо).
    bowling_ball_core_type:
      name: Тип ядро на боулинг топка
      description: Указва вътрешния ядрен дизайн или симетрията на боулинг топката,
        която влияе върху движението и потенциала за завой.
    bowling_ball_coverstock_type:
      name: Тип на покритието на боулинг топката
      description: Тип на външното покритие на боулинг топката, което определя сцеплението
        и потенциала за завой.
    bowling_set_style:
      name: Стил на боулинг комплект
      description: Определя общия стил или предназначение на боулинг комплекта.
    box_lid_type:
      name: Тип капак на кутията
      description: Тип на капака или механизма за отваряне на подаръчната кутия или
        кутията от метал.
    box_spring_profile:
      name: Профил на подматрачната рамка
      description: Класифицира общата височина на подматрачната рамка в потребителски
        категории (напр. нископрофилна, стандартна, високопрофилна), за да улесни
        бързото филтриране без необходимост от точни размери.
    box_spring_requirement:
      name: Изискване за подматрачна рамка
      description: Указва дали е необходима допълнителна подматрачна рамка или основа
        за матрака.
    boxing_ring_style:
      name: Стил на боксовия ринг
      description: Класифицира общия конструктивен стил или предназначението на ринга
        (напр. състезателен или тренировъчен, повдигнат или подов).
    bra_length_type:
      name: Тип дължина на сутиена
      description: Определя класификацията на дължината на сутиена според вертикалното
        покритие (напр. стандартен, дълъг, миди или скъсен).
    bra_padding_type:
      name: Тип на подплънките на сутиена
      description: Описва наличието или степента на подплънка в чашките.
    braces_compatibility:
      name: Съвместимост с брекети
      description: Указва дали протекторът за уста може да се използва с ортодонтски
        брекети и в каква степен.
    brake_band_form:
      name: Форма на спирачната лента
      description: Указва дали спирачната лента се доставя като непрекъснат пръстен
        или като отрязана дължина, която трябва да бъде закрепена.
    brake_band_material_type:
      name: Вид материал на спирачната лента
      description: Указва функционалния материал на спирачната лента (напр. памучен
        шнур, найлоново въже или пружинна стомана), който влияе върху издръжливостта,
        сцеплението, разтегливостта и шума.
    brake_band_style:
      name: Стил на спирачната лента
      description: Указва системата/стила за опъване на спирачната лента, използвана
        при предачно колело за регулиране на напрежението на флаера/макарата.
    brake_bleeding_method:
      name: Метод за обезвъздушаване на спирачките
      description: Поддържан метод за обезвъздушаване от комплекта.
    brake_booster_assist_type:
      name: Тип усилване на спирачния сервоусилвател
      description: Указва механизма на подпомагане, използван от спирачния сервоусилвател.
    brake_booster_diaphragm_configuration:
      name: Конфигурация на мембраната на спирачния сервоусилвател
      description: Указва броя и типа на мембраните, използвани в сервоусилвателя
        на спирачките.
    brake_caliper_bleeder_screw_position:
      name: Позиция на винта за обезвъздушаване на спирачния апарат
      description: Указва позицията на винта за обезвъздушаване върху спирачния апарат
        при монтаж, за да се гарантира, че е ориентиран в най-високата точка за правилно
        обезвъздушаване.
    brake_caliper_finish:
      name: Покритие на спирачния апарат
      description: Указва повърхностното покритие или защитната обработка на корпуса
        на спирачния апарат (напр. боя, галванизация, анодиране).
    brake_caliper_included_hardware:
      name: Включени крепежни елементи за спирачния апарат
      description: Указва какво е включено в комплекта на спирачния апарат.
    brake_caliper_mount_type:
      name: Тип на монтаж на спирачния апарат
      description: Стил на монтажния интерфейс за закрепване на спирачния апарат към
        шенкела или конзолата.
    brake_caliper_paint_base_chemistry:
      name: Химичен състав на основата на боята на спирачния апарат
      description: Тип на боята или смолистата система, използвана в покритието.
    brake_caliper_paint_kit_contents:
      name: Съдържание на комплекта за боядисване на спирачния апарат
      description: Указва какво е включено в комплекта освен самата боя.
    brake_circuit_type:
      name: Тип на спирачната система
      description: Конфигурация на хидравличната система, поддържана от главния спирачен
        цилиндър.
    brake_clutch_fluid_base_chemistry:
      name: Химична основа на спирачна/съединителна течност
      description: Основна химична база на спирачната/съединителната хидравлична течност,
        която определя съвместимостта и смесимостта.
    brake_clutch_fluid_dot_specification:
      name: DOT спецификация на спирачна/съединителна течност
      description: DOT класификация на спирачната/съединителната хидравлична течност
        (напр. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Покритие на спирачния барабан
      description: Повърхностно покритие или защитна обработка на спирачния барабан
        (напр. електрофоретично покритие, боя, цинково покритие).
    brake_drum_type:
      name: Тип спирачен барабан
      description: Конструктивен тип на спирачния барабан (със или без интегрирана
        главина/лагер).
    brake_fluid_base:
      name: База на спирачна течност
      description: Посочва формулата на необходимата или включена хидравлична спирачна
        течност.
    brake_fluid_base_chemistry:
      name: Химия на основата на спирачната течност
      description: Определя химическата основа на спирачната течност, която определя
        съвместимостта и правилата за смесване.
    brake_fluid_dot_specification:
      name: DOT спецификация на спирачна течност
      description: Показва рейтинга/спецификацията на спирачната течност DOT (напр.
        DOT 3, DOT 4) за продуктите за такава течност.
    brake_fluid_standards_compliance:
      name: Съответствие със стандартите за спирачна течност
      description: Индустриални стандарти, на които спирачната течност отговаря (освен
        DOT класификацията).
    brake_fluid_type:
      name: Вид спирачна течност
      description: Указва необходимия тип спирачна течност за хидравличните спирачни
        апарати на велосипед.
    brake_hose_end_fitting_type:
      name: Тип накрайник за спирачен маркуч
      description: Стил на свързване в двата края на спирачния маркуч (напр. банжо,
        конусен, с вътрешна/външна резба), използван за осигуряване на съвместимост
        със спирачни апарати и тръбопроводи.
    brake_lever_pull_type:
      name: Тип на издърпване на спирачния лост
      description: Определя съотношението и механиката на издърпване на жилото, за
        което е проектиран спирачният лост, като осигурява съвместимост с конкретни
        спирачни апарати (напр. късо издърпване за капсулови спирачки срещу дълго
        издърпване за V-образни спирачки).
    brake_light_switch_actuation_type:
      name: Тип превключватели на спирачните светлини
      description: Указва кое физическо действие задейства превключвателя (напр. натиск
        върху педала/буталото или хидравлично налягане и др.).
    brake_light_switch_connector_type:
      name: Тип превключвател на спирачните светлини
      description: Указва типа електрически конектор, използван от превключвателя
        на стоп светлините за свързване към инсталацията на автомобила.
    brake_light_switch_contact_type:
      name: Тип контакт на превключвател на спирачните светлини
      description: Електрическа конфигурация и поведение на контактите на превключвателя
        на стоп светлините (напр. нормално отворен, нормално затворен, превключващ
        или с няколко независими вериги).
    brake_light_switch_mounting_style:
      name: Тип на монтаж на превключвателя на стоп светлините
      description: Начин на монтаж на превключвателя на стоп светлините върху автомобила
        или спирачната система (напр. с резба, щракващ, с конзола, чрез банжо болт).
    brake_master_cylinder_mounting_type:
      name: Тип на монтаж на главния спирачен цилиндър.
      description: Начин на монтаж на главния спирачен цилиндър към автомобила или
        спирачния сервоусилвател (болтов модел/фланцов тип).
    brake_master_cylinder_reservoir_type:
      name: Тип резервоар на главния спирачен цилиндър
      description: Тип/конфигурация на спирачния резервоар за течност, предоставен
        или изискван от главния спирачен цилиндър.
    brake_mount_type:
      name: Тип монтаж на спирачката
      description: Указва спирачния интерфейс, вграден във вилката, за да се гарантира
        съвместимост със спирачната система.
    brake_mounting_flange_bolt_pattern:
      name: Модел на разположението на болтовете на монтажния фланец за спирачки
      description: Указва разположението на отворите/болтовете на монтажния фланец
        за закрепване на спирачната плоча или конзолата към оста на ремаркето (напр.
        4 болта).
    brake_pad_backing_plate_material:
      name: Материал на носещата плоча на спирачните накладки
      description: Указва материала на носещата плоча на спирачните накладки, който
        влияе върху отвеждането на топлина и теглото.
    brake_pad_compatible_rotor_type:
      name: Съвместим тип ротор за спирачни накладки
      description: Указва типа повърхност на ротора/диска, за който са предназначени
        спирачните накладки.
    brake_pad_compound:
      name: Състав на спирачните накладки
      description: Указва формулата на фрикционния материал на спирачната накладка.
    brake_pad_form_factor:
      name: Типоразмер на спирачните накладки
      description: Указва типа спирачна система/типоразмер, за който е предназначена
        накладката (напр. дискова, барабанна, паркинг спирачка).
    brake_pad_material:
      name: Материал на спирачните накладки
      description: Указва семейството фрикционен материал, използван в накладката
        на спирачките.
    brake_pad_shim_included:
      name: Указва дали са включени подложки към спирачните накладки
      description: Показва дали са включени шумопотискащи подложки, или са предварително
        монтирани.
    brake_pad_wear_indicator_type:
      name: Тип индикатор за износване на спирачните накладки
      description: Показва какъв тип индикатор за износване е включен в комплекта
        на спирачните накладки (например механичен сензор за износване или електронен
        сензор).
    brake_position:
      name: Разположение на спирачката
      description: Показва къде в превозното средство е предвидено да бъде монтиран
        спирачният компонент.
    brake_rotor_mount_type:
      name: Тип монтаж на спирачния ротор
      description: Определя интерфейса, използван за закрепване на спирачен ротор
        към главината (ако е приложимо).
    brake_service_kit_components_included:
      name: Включени компоненти в сервизния комплект за спирачките
      description: Списък на инструментите, адаптерите и консумативите, включени в
        сервизния комплект за спирачките.
    brake_shoe_friction_material:
      name: Фрикционен материал на спирачните челюсти
      description: Фрикционният материал на спирачната челюст (накладката), който
        влиза в контакт със спирачния барабан.
    brake_shoe_set_contents:
      name: Съдържание на комплекта спирачни челюсти
      description: Какво е включено в комплекта (напр. само челюсти или челюсти заедно
        с крепежни елементи и пружини).
    brake_system_type:
      name: Тип спирачна система
      description: Указва технологията на спирачния механизъм, използвана за контрол
        на въртенето на шпулата по време на замятане.
    brake_type:
      name: Тип спирачка
      description: Тип на спирачния/опъващ механизъм на основния валяк.
    brandy_age_classification:
      name: Класификация по възраст на бренди
      description: Категоризира бренди според индустриални стандартизирани означения
        за качество и отлежаване (напр. VS, VSOP, XO), които показват минималния период
        на отлежаване.
    brass_cleaning_tool_type:
      name: Тип инструмент за почистване на месинг
      description: Указва вида на инструмента, използван за почистване или поддръжка
        на месингови инструменти.
    brass_instrument_application_area:
      name: Област на приложение на медни духови инструменти
      description: Частите от месинговия музикален инструмент, за които е предназначен
        дезинфекциращият спрей.
    brass_instrument_care_kit_purpose:
      name: Предназначение на комплекта за поддръжка на месингови музикални инструменти.
      description: Описва предназначението на комплекта (напр. рутинна поддръжка,
        дълбоко почистване, пътуване/спешни ситуации, стартов комплект за ученици
        и др.).
    brass_instrument_case_shell_material:
      name: Материал на корпуса на калъфа за месингов музикален инструмент
      description: Основен материал на твърдия корпус/рамка (ако е приложимо), отделно
        от общия материал на калъфа/чантата.
    brass_instrument_lubricant_additives_features:
      name: Добавки и характеристики на смазката за месингови музикални инструменти
      description: Забележителни функционални характеристики на формулата на смазочния
        материал.
    brass_instrument_lubricant_base_composition:
      name: Основен състав на смазката за месингови музикални инструменти
      description: Основна база/химичен състав на смазката за месингови музикални
        инструменти.
    brass_instrument_lubricant_viscosity_grade:
      name: Клас на вискозитет на смазката за месингови музикални инструменти
      description: Относителна гъстота/текливост на смазката за месингови музикални
        инструменти.
    brass_instrument_replacement_part_type:
      name: Тип резервна част за медни музикални инструменти
      description: Указва какъв тип резервна част е за месингови музикални инструменти
        (напр. части за клапани/тръби, водни клапи, коркови и филцови елементи, предпазители
        и др.).
    brass_instrument_valve_configuration:
      name: Конфигурация на клапаните при месингови музикални инструменти
      description: Как инструментът променя височината на тона (механизъм на клапан/плъзгач).
    brass_lubricant_application_area:
      name: Зона на приложение на смазка за медни музикални инструменти
      description: Механизмът на месинговия музикален инструмент, за който е предназначена
        смазката.
    brass_mouthpiece_backbore:
      name: Заден канал на мундщука за месингови музикални инструменти
      description: Профил/категория на задния канал на мундщука (форма/размер), който
        влияе върху тембъра и интонацията.
    brass_mouthpiece_cup_depth:
      name: Дълбочина на чашката на мундщука за месингови музикални инструменти
      description: Класификация на дълбочината на чашката на мундщука (колко дълбока
        е чашката), която влияе върху тембъра и реакцията.
    brass_polishing_cloth_abrasiveness_level:
      name: Ниво на абразивност на кърпата за полиране на месинг
      description: Показва колко агресивна е кърпата за премахване на петна в сравнение
        с осигуряването на нежен блясък.
    bread_crumb_base_ingredient:
      name: Съставка за основата на галета
      description: Показва основната съставка, от която са направени трохите, като
        например пшеница, ориз, свинска кожа или бадем.
    bread_variety:
      name: Разновидности хляб
      description: Указва стила или вида на хляба или хлебчетата, за да помогне на
        потребителите да открият конкретни разновидности (напр. бриош, багета, наан).
    breadstick_style:
      name: Стил на гризините
      description: Указва конкретния традиционен стил или форма на гризината.
    bridge_head_material:
      name: Материал на глави за билярден мост
      description: Материал, използван изключително за главата на моста, който влияе
        върху теглото, усещането и издръжливостта.
    bridge_head_type:
      name: Тип на главата на моста
      description: Указва стила на главата на моста, като помага на купувачите да
        изберат предпочитана форма на опората за щеката.
    bridle_part_type:
      name: Вид част на юздата
      description: Указва конкретния компонент от юздата, който представлява резервната
        част, за да помогне на клиентите да открият точно необходимия елемент.
    bridle_style:
      name: Стил на юзда
      description: Класифицира общия стил или конструкция на юздата, за да могат ездачите
        бързо да открият оборудване, подходящо за техните нужди или дисциплина.
    broadhead_field_point_attachment_style:
      name: Стил на закрепване на ловни/спортни върхове
      description: Указва начина, по който ловният или тренировъчният връх се закрепва
        към стрелата.
    broadhead_thread_size:
      name: Размер на резбата на ловния връх
      description: Указва спецификацията на резбата, използвана за закрепване на ловния
        или тренировъчния връх към вложката или тялото на стрелата.
    broadhead_tip_type:
      name: Тип на върха на ловния връх
      description: Определя стила на върха/ферулата на ловния връх, който започва
        проникването, и влияе върху ефективността при различен дивеч.
    broccoli_cut:
      name: Разрез на броколите
      description: Указва как броколите са нарязани или приготвени преди опаковане
        (напр. цяла глава, розички, настъргани/„ориз“).
    broccoli_variety:
      name: Сорт броколи
      description: Идентифицира специфичния сорт или пазарен сорт броколи (напр. Tenderstem,
        Romanesco).
    broom_head_material:
      name: Материал на главата на метлата
      description: Указва материала на главата на метлата, който влияе върху издръжливостта
        и характеристиките при използване.
    brush_format:
      name: Формат на четката
      description: Указва физическия формат на ски или сноуборд четката, като различава
        ръчни блокове от ротационни (за бормашина) типове, като например цилиндри
        от руно или филц.
    brush_shape:
      name: Форма на четката
      description: Указва физическата форма или профил на тялото или главата на четката,
        който влияе върху контактната площ и начина на работа.
    brussel_sprout_preparation:
      name: Приготвяне на брюкселско зеле
      description: Описва физическата подготовка или начина на нарязване на брюкселското
        зеле.
    brussels_sprout_variety:
      name: Сорт брюкселско зеле
      description: Посочва сорта или разновидността на брюкселското зеле, като се
        вземат предвид настоящите и бъдещите сортове.
    bubble_blower_features:
      name: Характеристики на играчката за сапунени мехури
      description: Изброява основните функционални характеристики на играчките за
        сапунени мехури.
    bubble_gun_bubble_output_modes:
      name: Режими на изпускане на мехурчета при пистолет за сапунени мехури
      description: Указва режимите на работа на пистолета за сапунени мехурчета, като
        единични мехурчета, непрекъснат режим или различни скорости.
    bubble_machine_features:
      name: Функции на машината за балончета
      description: Описва основни функционални характеристики на машини за сапунени
        мехурчета, надхвърлящи базовата работа.
    bubble_machine_items_included:
      name: Включени артикули за машина за балончета
      description: Изброява основните елементи, включени в комплекта (напр. разтвор
        за сапунени мехурчета, допълнителни пръчици, каишка за носене, дистанционно
        управление).
    bubble_output_rate:
      name: Скорост на изход на балончета
      description: Указва приблизителната/качествена скорост на производство на мехурчета
        от уреда за сапунени мехурчета (напр. ниска/средна/висока), включително дали
        изходът е регулируем.
    bubble_solution_container_type:
      name: Тип контейнер за разтвор с мехурчета
      description: Указва начина на подаване/използване на разтвора за сапунени мехурчета
        при пистолета (напр. вътрешен резервоар, прикрепена бутилка, отделна ваничка/потапяне).
    bubble_toy_included_accessories:
      name: Аксесоари с включени играчки с балончета
      description: Изброява обичайните елементи, включени към играчката за сапунени
        мехурчета (напр. бутилка с разтвор, ваничка, резервни пръчици).
    buckwheat_processing_method:
      name: Метод за обработка на елда
      description: Описва обработката, прилагана върху елдата преди продажба (напр.
        печене, покълнала, пукана).
    buckwheat_product_form:
      name: Продуктова форма на елда
      description: Специфична физическа форма на елдата, включваща варианти, които
        не са обхванати от общия списък (напр. люспи, пуканки, инстантни пакетчета).
    bug_collecting_kit_items_included:
      name: Включени елементи в комплекта за събиране на насекоми
      description: Инструменти и образователни материали, включени в комплект за събиране
        на насекоми.
    built_in_storage_type:
      name: Тип вградено съхранение
      description: Указва видовете вградени места за съхранение в рамката на двуетажно
        легло (напр. чекмеджета, рафтове, стълби със съхранение).
    bumper_finish:
      name: Покритие на бронята
      description: Указва повърхностното покритие или завършек, нанесен върху бронята.
    bumper_sensor_cutouts:
      name: Изрези за сензори в бронята
      description: Указва кои фабрични (OEM) отвори/изрези за асистиращи системи са
        включени или поддържани от бронята.
    bunk_bed_configuration:
      name: Конфигурация на двуетажно легло
      description: Указва конструктивното разположение и комбинацията от размери на
        матрака при двуетажно легло.
    buoyancy:
      name: Плаваемост
      description: Указва поведението на стръвта или примамката във водния стълб,
        като плаваща, потъваща или неутрално потъваща.
    burkini_pieces_included:
      name: С включени части на буркини
      description: Изброява компонентите на облеклото, включени в комплекта буркини,
        за да знаят клиентите точно какво получават.
    burn_rate:
      name: Скорост на изгаряне
      description: Описва колко бързо гори цигарената хартия след запалване.
    bus_model_type:
      name: Тип модел на автобуса
      description: Указва реалния тип/конфигурация на автобуса, който е представен
        от мащабния модел (категория на каросерията/предназначение).
    bust_design:
      name: Дизайн на бюста
      description: Описва конфигурацията на областта на бюста и покритието на деколтето
        при боди (напр. отворен бюст, вграден сутиен, дълбоко деколте).
    butter_variety:
      name: Разновидност на масло
      description: Указва производствения стил или отличителния вид на маслото, като
        например култивирано, сладкосметаново, европейски тип, избистрено (гхи) или
        суроватъчно масло.
    buttermilk_variety:
      name: Разновидности мътеница
      description: Указва конкретния стил или форма на мътеницата, която се продава
        (напр. ферментирала, традиционна, на прах).
    button_application:
      name: Приложение на копчето
      description: Указва предназначението или типа проект, за който е копчето (напр.
        облекло, тапицерия).
    button_attachment_type:
      name: Тип закрепване на копчето
      description: Указва конструкцията на копчето за закрепване към тъкан (напр.
        с отвори за пришиване или с халка/краче), а не начина на закопчаване.
    button_finish:
      name: Покритие на копчето
      description: Описва повърхностното покритие/визия на копчето (напр. матов или
        гланцов).
    buttonhole_elastic_application:
      name: Приложение на ластик с копчени отвори
      description: Основно предназначение/приложение на декоративния ластик с прегъване.
    cab_type:
      name: Тип на кабината
      description: Указва конфигурацията на кабината на камиона.
    cabasa_construction_type:
      name: Тип конструкция на кабаса
      description: Указва физическата конструкция/стил на тялото на кабасата и на
        веригата/перлената (топчестата) система.
    cabbage_variety:
      name: Сорт зеле
      description: Идентифицира сорта или вида зеле (напр. зелено, пекинско, савойско),
        така че купувачите да могат да филтрират по вкус, текстура и кулинарна употреба.
    cabinet_door_style:
      name: Стил на вратата на шкафа
      description: Указва визуалния дизайн на панела на кухненската врата, като например
        Shaker или релефен панел, за да подпомогне съчетаването с кухненската естетика.
    cabinet_overlay_type:
      name: Тип на припокриване на вратичките на шкафовете
      description: Указва как вратичките се припокриват или разполагат спрямо рамката
        на шкафа.
    cable_end_type:
      name: Тип накрайник на кабела
      description: Описва формата или типа на накрайника/фитинга на жилото, който
        се свързва със спирачни или скоростни лостове.
    cable_housing_construction:
      name: Конструкция на кожуха на жилото
      description: Описва конструктивния дизайн на кожуха (обвивката) на жилото –
        например спираловидно навит, безкомпресионен или сегментен – който влияе върху
        устойчивостта на компресия, гъвкавостта и усещането при работа.
    cable_housing_liner_type:
      name: Тип на вътрешната облицовка (лайнер) на кожуха на жилото
      description: Указва дали кожухът включва вътрешна облицовка и/или фабрична смазка,
        както и използвания материал или технология, които влияят на намаляването
        на триенето и устойчивостта на атмосферни условия.
    cable_management_type:
      name: Тип управление на кабелите
      description: Указва типа вградени функции за управление на кабели или захранване,
        които предлага конферентната маса.
    cable_surface_treatment:
      name: Повърхностна обработка на жилото
      description: Указва специалното покритие или финиш, нанесен върху жилото, за
        намаляване на триенето или защита от корозия.
    cabochon_back_type:
      name: Тип на гърба кабошон
      description: Указва профила/обработката на задната страна на кабошона, който
        влияе върху начина на закрепване (вграждане/лепене) и съвместимостта.
    cacao_bean_variety:
      name: Сорт какаови зърна
      description: Посочва ботаническия сорт или култивар на използваните какаови
        зърна.
    cacao_roast_level:
      name: Степен на изпичане на какао
      description: Описва степента, до която какаото е било изпечено преди смилане.
    cage_package_type:
      name: Тип на комплекта на клетката
      description: Определя какви компоненти са включени при покупката (напр. само
        мрежа, комплект с рамка, пълен пакет).
    cajon_body_shell_material:
      name: Материал на тялото/корпуса на кахона
      description: Идентифицира материала на тялото/корпуса на кахона (с изключение
        на тапата).
    cajon_corner_control_system:
      name: Система за контрол на ъглите на кахона
      description: Указва дали кахонът поддържа настройка на ъгловия звук (напр. чрез
        винтове в ъглите), която променя реакцията при удар с длан.
    cajon_corner_edge_design:
      name: Дизайн на ъгли/ръбове на кахона
      description: Описва конструкцията на ъглите/ръбовете, която влияе върху удобството
        и свиренето.
    cajon_feet_type:
      name: Тип крачета за кахон
      description: Указва типа на крачетата на кахона, които влияят върху стабилността
        и резонанса.
    cajon_snare_adjustability:
      name: Регулируемост на снър механизма на кахона
      description: Указва дали и как може да се регулира ефектът на снър механизма
        (напрежение, включване или и двете).
    cajon_snare_system_type:
      name: Тип на снър системата на кахона
      description: Указва вътрешния механизъм на снър системата, който създава ефекта
        на „снър“
    cake_shape:
      name: Форма на сладкиша
      description: Описва физическата форма, в която е изпечен сладкишът с кафе.
    cake_topping:
      name: Топинг за торта
      description: Идентифицира основния топинг или покритие, нанесено върху сладкиша
        с кафе.
    cake_type:
      name: Вид торта
      description: Описва стила или разновидността на тортата (напр. маслена торта,
        пандишпан, чийзкейк).
    caliper_mount_type:
      name: Тип монтаж на спирачен апарат
      description: Определя стандарта на интерфейса за закрепване към рамката или
        вилката, който използва спирачният апарат (напр. стандарт за директен монтаж
        към стойки, стандарт за плосък монтаж).
    caliper_mounting_standard:
      name: Стандарт за закрепване на спирачния апарат
      description: Посочва монтажния интерфейс/стандарт (напр. плосък монтаж, монтаж
        на стойка, международен стандарт и др.), използван за закрепване на спирачния
        апарат към рамката или вилката на велосипеда.
    camera_mounting_location_vehicle_exterior:
      name: Място за монтиране на камерата (външна част на превозното средство)
      description: Посочва къде камерите са предназначени за монтаж върху превозното
        средство (напр. предна решетка, странични огледала).
    camouflage_environment_type:
      name: Тип среда за камуфлаж
      description: Посочва основната среда, за която е предназначен камуфлажният десен,
        като гора, пустиня или блато.
    camping_oil_application:
      name: Приложение на маслото за къмпинг
      description: Посочва основното предназначение на маслото при къмпинг употреба
        (напр. гориво за фенери спрямо гориво за котлони).
    camshaft_construction:
      name: Конструкция на разпределителния вал
      description: Стил на производство/заготовка на разпределителния вал.
    camshaft_material:
      name: Материал на разпределителния вал
      description: Основен материал на сърцевината/вала на разпределителния вал.
    camshaft_position:
      name: Положение на разпределителния вал
      description: Посочва предназначеното местоположение/тип на разпределителния
        вал в двигателя (напр. всмукателен или изпускателен, или конкретен ред/позиция
        в двигателя).
    candle_container_type_included:
      name: Включен тип контейнер за свещи
      description: Посочва какъв тип съдове за свещи са включени в комплекта, ако
        има такива.
    candle_dye_form:
      name: Форма на боята за свещи
      description: Посочва физическата форма на боята/оцветителя за свещи, използван
        при изработката на свещи.
    candle_fragrance_form:
      name: Форма на аромата за свещи
      description: Посочва типа/формата на ароматната съставка, предназначена за изработка
        на свещи.
    candle_making_tool_type:
      name: Тип инструмент за изработка на свещи
      description: Определя какъв вид инструмент за изработка на свещи представлява
        продуктът (напр. съд за изливане, инструмент за центриране на фитил, термометър).
    candy_texture:
      name: Текстура на бонбоните
      description: Описва усещането в устата или консистенцията на бонбоните, независимо
        от вкуса или формата.
    candying_method:
      name: Метод на захаросване
      description: Описва как плодът е захаросан или консервиран със захар (напр.
        кристализиран, глазиран, в сироп).
    canned_meat_form:
      name: Форма на консервираното месо
      description: Класифицира обработената форма или представянето на месото в опаковката.
    canoe_construction_type:
      name: Вид конструкция на кануто
      description: Разграничава типовете конструкции на корпуса на кану, като твърд
        корпус, надуваем и сгъваем.
    canoe_hull_shape:
      name: Форма на корпуса на кану
      description: Определя основния профил или напречно сечение на корпуса, което
        влияе върху стабилността и управлението.
    canoe_stern_design:
      name: Дизайн на кърмата на кану
      description: Определя стила на кърмата на корпуса, който влияе върху съвместимостта
        с мотор и управляемостта.
    canopy_type:
      name: Вид сенници
      description: Описва стила на сенника или горното покритие, включено към леглото
        с навес.
    canvas_compatible_media:
      name: Съвместими материали за платно
      description: Посочва с кои художествени/творчески материали е предназначено
        да се използва платното.
    canvas_format:
      name: Формат на платното
      description: Посочва дали платното за печат се продава като листове, ролки или
        предварително изрязани панели.
    canvas_mounting_format:
      name: Монтаж/формат на платното
      description: Физически формат/стил на монтаж на платното за рисуване.
    canvas_stretcher_assembly_type:
      name: Тип конструкция на рамката за опъване на платното
      description: Дали рамката за опъване на платното се продава сглобена като готова
        рамка, или като лайсни/комплекти, които изискват сглобяване.
    canvas_stretcher_corner_joint_type:
      name: Тип сглобка на ъглите на подрамката на платното
      description: Описва как са съединени/конструирани ъглите на подрамката (напр.
        нут и перо, зъбчато съединение, с телбод, с клинове).
    canvas_surface_tone:
      name: Тон на повърхността на платното
      description: Основен тон/цвят на грундираната повърхност на платното, а не отпечатан
        дизайн или шарка (напр. бяло, черно, тонирано).
    canvas_weave_type:
      name: Тип тъкане на платното
      description: Описва структурата на тъкане на повърхността на платното, която
        влияе върху текстурата и нанасянето на боята.
    cap_attachment_style:
      name: Начин на закрепване на капачката
      description: Посочва конструкцията/стила на закрепване на капачката за мундщук
        на саксофон, което може да влияе върху защитата и прилягането в калъфа.
    cap_construction:
      name: Конструкция на шапката
      description: Посочва как е конструирана основата на перуката (напр. дантела
        отпред, изцяло дантелена, ръчно вързана), което влияе върху реалистичността,
        комфорта и възможностите за оформяне.
    cap_crown_structure:
      name: Структура на короната на шапката
      description: Посочва дали короната на шапката е структурирана (твърда) или неструктурирана
        (мека).
    cap_fit_type:
      name: Тип прилягане на шапката
      description: Определя как шапката приляга или се регулира върху главата на носещия
        (напр. фиксиран размер или регулируема).
    cap_seal_type:
      name: Тип уплътнение на капачката
      description: Посочва уплътняващия компонент, използван за предотвратяване на
        течове на масло и изпарения (напр. О-пръстен, гарнитура).
    cap_size:
      name: Размер на шапката
      description: Стандартни размерни обозначения, които указват общия размер за
        прилягане към обиколката на главата на основата на перуката.
    cap_type:
      name: Вид на шапката
      description: Тип на капачката/затварящия механизъм, използван за разширителния
        (преливния) съд.
    caper_size_grade:
      name: Размерен клас на каперсите
      description: Класифицира каперсите по стандартни за индустрията класове, съответстващи
        на размера на пъпките.
    capo_clamping_mechanism:
      name: Механизъм за пристягане на каподастъра
      description: Посочва стила на затягане/механизма, използван за прилагане на
        натиск върху струните (как се управлява каподастърът).
    capo_finish:
      name: Покритие на каподастъра
      description: Повърхностна обработка на тялото на каподастъра (визуален вид/усещане),
        независимо от цвета (напр. матова или гланцова).
    capo_fit_type:
      name: Тип прилягане на каподастъра
      description: Посочва профила на грифа, за който е предназначен каподастърът
        (включително радиус/плоскост), което влияе върху затягането без дрънчене и
        интонацията.
    capo_pad_material:
      name: Материал на подложката на каподастъра
      description: Посочва материала на контактната подложка, която докосва струните/грифа
        (влияе върху сцеплението, стабилността на настройката и възможното оставяне
        на следи по покритието).
    capo_tension_mechanism:
      name: Механизъм за натягане на каподастъра
      description: Определя как се прилага и регулира натискът/опъването върху струните
        при плъзгащия каподастър.
    capture_method:
      name: Метод на улавяне
      description: Посочва дали капанът е предназначен за жив улов или за умъртвяване.
    car_ev_conversion_kit_motor_type:
      name: Тип мотор за комплект за преобразуване на електрически автомобил
      description: Посочва технологията на тяговия мотор, включена или необходима
        за комплекта за преобразуване (напр. променливотоков индукционен мотор спрямо
        мотор с постоянни магнити).
    car_playset_items_included:
      name: Елементи, включени в комплекта за игра с автомобили
      description: Изброява основните компоненти, включени в комплекта за игра с автомобили
        извън основната конструкция (напр. коли, фигурки, знаци).
    car_shampoo_application_method:
      name: Метод за нанасяне на шампоан за автомобил
      description: Начинът, по който шампоанът е предназначен да се прилага по време
        на измиване.
    car_wash_solution_form:
      name: Форма на средства за миене на автомобили
      description: Определя физическата форма на разтвора за автомивка (напр. течност,
        пяна, мокри кърпички).
    car_wash_solution_scent:
      name: Аромат на препарата за миене на автомобил
      description: Посочва аромата/миризмата на препарата за миене на автомобил (ако
        е ароматизиран).
    carbonated_water_variety:
      name: Разновидност на газираната вода
      description: Класифицира газираната вода според разпространените пазарни разновидности
        и формулировки (напр. тоник, селцер, функционална газирана вода).
    carbonation:
      name: Газировка
      description: Описва нивото или стила на газираност на напитката (напр. негазирана,
        леко газирана, газирана, с азот).
    carburetor_barrel_count:
      name: Брой камери на карбуратора
      description: Посочва броя на дроселовите отвори/канали (барели) в карбуратора.
    carburetor_choke_type:
      name: Тип дросел на карбуратора
      description: Посочва типа на задействане на смукача, използван от карбуратора.
    carburetor_mounting_flange_type:
      name: Тип фланец за монтаж на карбуратора
      description: Определя типа на интерфейса за монтаж на карбуратора, за да се
        осигури съвместимост с всмукателния колектор (напр. щуцеров тип или фланцов/с
        болтово закрепване).
    card_binder_page_type:
      name: Тип страници за класьор с карти
      description: 'За класьори/портфолиа: стилът на страниците, използвани за съхранение
        на карти.'
    card_box_holder_type:
      name: Тип кутия/държач за карти
      description: Посочва функционалния формат на продукта за събиране или съхранение
        на карти на събитие (напр. кутия, кутия тип пощенска кутия, кошница, стойка).
    card_game_accessory_features:
      name: Характеристики на аксесоари за картова игра
      description: Забележителни функционални характеристики на аксесоарите за игри
        с карти.
    card_lot_type:
      name: Тип комплект карти
      description: Посочва дали продуктът представлява единична карта или комплект/асортимент
        от няколко карти.
    card_sleeve_size_format_compatibility:
      name: Съвместимост по размер/формат на протекторите за карти
      description: Посочва размерите на картите, за които са предназначени протекторите/албумните
        страници/кутиите за тесте.
    carding_surface_pin_material:
      name: Материал на иглите на кардиращата повърхност
      description: Материал на щифтовете/зъбците, използвани за разресване и разплитане
        на влакната.
    care_durability:
      name: Издръжливост при поддръжка
      description: Посочва очакваната устойчивост на етикета при пране/топлина след
        поставяне.
    care_label_attachment_type:
      name: Тип закрепване на етикета за поддръжка
      description: Описва как е предназначен етикетът за поддръжка да бъде прикрепен
        към артикула (напр. пришиване, термотрансферно залепване, лепилен).
    care_label_format:
      name: Формат на етикета за поддръжка
      description: Физическият/печатният формат на етикета за поддръжка.
    care_label_symbol_system:
      name: Система от символи за етикета за поддръжка
      description: Стандартите/наборът от символи, използвани върху етикета (напр.
        символи за поддръжка по ISO, символи по ASTM/САЩ).
    cargo_area_configuration:
      name: Конфигурация на товарното пространство
      description: Определя конструктивния тип или разположението на товарната зона
        при товарен велосипед (напр. удължен заден багажник, предно товарене, триколка).
    cargo_net_adjustability:
      name: Регулируемост на товарната мрежа
      description: Посочва дали и как товарната мрежа може да се регулира за натягане/прилягане.
    cargo_net_position:
      name: Позиция на товарната мрежа
      description: Посочва къде в багажника/товарното пространство е предназначена
        да се монтира или използва мрежата.
    cargo_net_stretch_type:
      name: Тип разтегливост на товарната мрежа
      description: Посочва дали товарната мрежа за багажник е еластична/разтеглива
        или фиксирана/неразтеглива.
    cargo_net_style:
      name: Стил на товарната мрежа
      description: Определя конструктивния тип или формата на мрежата за закрепване
        на товар (напр. еластичен шнур, лентово плетиво, предпазна преграда, хамак).
    cargo_rack_finish:
      name: Покритие на багажния носач
      description: Външно повърхностно покритие на товарния багажник.
    carpet_cleaner_application_method:
      name: Метод за нанасяне на препарат за почистване на килими
      description: Посочва предназначения начин, по който продуктът се нанася и втрива
        в килима (извън общата форма).
    carrier_style:
      name: Тип носещ механизъм
      description: Описва механизма/стила на закрепване, използван за поддържане на
        лодката върху превозното средство.
    carrot_size:
      name: Размер на морков
      description: Класифицира общия размер на продукта от моркови.
    carrot_variety:
      name: Сорт моркови
      description: Посочва конкретния сорт или култивар на моркова.
    carrying_capacity_pairs_boards:
      name: Товароносимост (двойка/бордове)
      description: Посочва колко чифта ски или сноубордове може да побере или поддържа
        аксесоарът, когато се използва с багажника (напр. разширителни комплекти).
    cartridge_thread_compatibility:
      name: Съвместимост на резбата на патрона
      description: Посочва стандарта на резбата, който поддържа изпарителят или батерията,
        като гарантира физическата съвместимост между патрони и батерии.
    case_capacity_butts_shafts:
      name: Капацитет на калъфа (долни части × шафтове).
      description: Определя колко долни части и върхове за щеки може да побере калъфът,
        изразено във формат „долни части по върхове“ (напр. 2 по 4 = 2 долни части
        и 4 върха).
    case_features:
      name: Характеристики на калъфа
      description: Подчертава функционалните характеристики на калъфа за чинели/барабани,
        свързани със защита и пренасяне.
    case_humidifier_refill_type:
      name: Тип пълнител за овлажнител за калъф
      description: Посочва дали овлажнителят използва многократен (повторно овлажняем/регенерируем)
        материал или сменяеми пълнители за еднократна употреба.
    case_lining_material:
      name: Материал на вътрешната подплата на калъфа
      description: Посочва основния материал, покриващ вътрешността на калъф или чанта,
        който влиза в контакт с инструмента или съдържанието и го защитава.
    case_material:
      name: Материал на калъфа
      description: Посочва основния материал на корпуса на часовника, който влияе
        върху издръжливостта, теглото и външния вид.
    case_mounting_method:
      name: Метод за монтаж на калъфа
      description: Начинът, по който овлажнителят е предназначен да бъде позициониран
        или закрепен в калъфа на инструмента.
    case_structure:
      name: Конструкция на калъфа
      description: Посочва степента на твърдост на конструкцията на калъфа.
    case_style_cymbal_drum:
      name: Тип калъф (за чинели/барабани)
      description: Посочва дали продуктът представлява мека чанта, твърд калъф или
        хибриден дизайн за пренасяне на чинели или барабани.
    casing_material:
      name: Материал на каркаса на гумата
      description: Определя основната тъкан, използвана в кордата на гумата, която
        влияе на теглото, усещането при каране и защитата от пробиви.
    casino_set_chip_material:
      name: Материал на чиповете за казино комплект
      description: Основен материал на включените чипове (ако е приложимо).
    casino_set_layout_included:
      name: Оформление, включено в казино комплекта
      description: Посочва какъв вид игрална повърхност/оформление е включено в комплекта.
    cask_finish:
      name: Бъчва за довършване
      description: Посочва бъчвата или кацата, използвана за завършване или отлежаване
        на спиртната напитка, като например бъчва от бърбън или шери каца.
    cassava_variety:
      name: Сорт касава
      description: Посочва конкретния култивар или сорт на предлаганата юка/касaва,
        който влияе върху вкуса, цвета и свойствата при готвене.
    cassette_body_type:
      name: Тип корпус на касетата
      description: Стандарт на свободния венец или задвижващ механизъм, който задната
        главина или колело поддържа (напр. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Набор от функции на касетния дек
      description: Посочва функциите за транспортиране и възпроизвеждане на касети,
        характерни за автомобилните касетофони.
    cassette_speed_compatibility:
      name: Съвместимост със скоростта на касетата
      description: Посочва броя на скоростите (напр. 7-скоростна, 12-скоростна), за
        които е предназначен касетата или свободното колело, с цел съвместимост с
        верига, командно устройство и задно дерайльор.
    castanet_shell_size_class:
      name: Размерен клас на черупките за кастанети
      description: Стандартизиран размерен клас за черупки на кастанети, често използван
        от изпълнители/учители за избор на подходящ размер.
    castanets_included_pieces:
      name: Включени части на кастанетите
      description: Посочва какво е включено в комплекта на продукта (напр. чифт или
        единичен брой, както и допълнителни елементи).
    castanets_pitch:
      name: Височина на звука на кастанетите
      description: Посочва обичайното обозначение за височина на звука/размер, използвано
        от производителите за описание на звуковия диапазон.
    castanets_type:
      name: Вид кастанети
      description: Посочва стила или предназначението на кастанетите.
    caster_type:
      name: Тип колелца
      description: Посочва типа колелца или колела, монтирани на количката (напр.
        въртящи се, със заключване), което влияе върху маневреността и стабилността.
    castle_playset_included_items:
      name: Включени елементи в комплекта за замък
      description: Посочва основните компоненти, включени в комплекта за замък, за
        да могат купувачите да сравняват комплектите (напр. фигурки, мебели, превозни
        средства, аксесоари).
    catcher_equipment_included:
      name: С включена екипировка за кетчър
      description: Посочва компонентите, включени в комплекта екипировка за кетчър,
        като например каска за кетчър или предпазител за гърди.
    catcher_helmet_style:
      name: Стил на каската за кетчър
      description: Посочва общия стил на защитната каска за кетчър.
    cattle_breed:
      name: Порода говеда
      description: Посочва породата говеда, от която произхожда телешкото месо (напр.
        Ангус, Уагю, Херефорд).
    cauliflower_variety:
      name: Сорт карфиол
      description: Идентифицира сорта, цвета или специалния сорт на продавания карфиол.
    celery_form:
      name: Форма на целина
      description: Посочва физическата форма или начина на нарязване, в който се продава
        целината.
    celery_variety:
      name: Сорт целина
      description: Посочва конкретния сорт целина, позволявайки на купувачите да избират
        според вкусов профил, цвят или кулинарна употреба.
    cereal_bar_texture:
      name: Текстура на зърнения бар
      description: Описва усещането в устата и консистенцията на зърнения бар (напр.
        мек, хрупкав).
    cereal_type:
      name: Вид зърнена култура
      description: Класифицира формата или вида на зърнената закуска или гранолата
        (люспи, топчета, гранола на клъстери, мюсли и др.), за да помогне на купувачите
        да намерят предпочитана текстура или начин на приготвяне.
    certificate_border_style:
      name: Стил на рамката на сертификата
      description: Описва декоративната обработка на рамката, използвана върху сертификата.
    certificate_personalization_type:
      name: Тип персонализация на сертификата
      description: Посочва как сертификатът може да бъде персонализиран (празен за
        ръчно попълване, шаблон за печат, предварително отпечатан с променливи полета
        и др.).
    certification_service:
      name: Сертификационна услуга
      description: Компания за външно оценяване/сертифициране (ако е приложимо).
    certification_standard:
      name: Стандарт за сертифициране
      description: Посочва сертификата или стандарта за безопасност и огнеустойчивост,
        на който отговаря балаклавата.
    chain_coating_finish:
      name: Покритие/финиш на веригата
      description: Посочва всякаква повърхностна обработка или покритие, нанесено
        върху веригата с цел повишаване на издръжливостта, намаляване на триенето,
        предотвратяване на корозия или промяна на външния вид (напр. титанов нитрид,
        DLC покритие, никелиране, антикорозионно EPT покритие).
    chain_connection_type:
      name: Тип верижна връзка
      description: Посочва метода за свързване/затваряне, използван за съединяване
        на краищата на веригата.
    chain_tier_configuration:
      name: Конфигурация на нивото (класа) на веригата
      description: Посочва броя/подредбата на нивата на веригата в улавящия механизъм
        (единично, двойно или тройно ниво).
    chain_tool_type:
      name: Тип верижен инструмент
      description: Класифицира конкретния вид инструмент за велосипедна верига, за
        да могат купувачите бързо да намерят правилния инструмент.
    chainring_shape:
      name: Форма на халката за окачване
      description: Посочва формата на венчелистника (предното зъбно колело), например
        кръгъл или овален/елипсовиден.
    chair_accessories_included:
      name: С включените аксесоари за стол
      description: Изброява вградените или включени аксесоари, които подобряват функционалността
        на стола.
    chair_sash_care_instructions:
      name: Инструкции за поддръжка на декоративната лента за стол.
      description: Описва препоръчителния метод за почистване/поддръжка на декоративната
        лента за стол.
    chair_sash_finish:
      name: Финиш на декоративната лента за стол
      description: Описва повърхностния блясък/финиш на плата на декоративната лента
    chair_storage_design:
      name: Дизайн за съхранение на столове
      description: Посочва как сгъваемият стол е предназначен да се съхранява (напр.
        сгъваем, подреждаем, несгъваем), за да помогне на клиентите да преценят удобството
        при съхранение и пренасяне.
    chaise_or_sectional_orientation:
      name: Ориентация на лежанката или секцията
      description: Посочва от коя страна се намира интегрираната лежанка или удължената
        секция, когато сте с лице към дивана.
    chamber_size:
      name: Размер на камерата
      description: Посочва размера/обема на вътрешната камера на мундщука, който влияе
        на съпротивлението при свирене и тембровия цвят.
    chanter_finger_spacing:
      name: Разстояние между отворите за пръстите на мелодичната тръба на гайдата
      description: Посочва разстоянието/размера на отворите за пръстите на мелодичната
        тръба на гайдата (често описвано като стандартно, за малки ръце или за големи
        ръце).
    chanter_type:
      name: Вид на ручилото
      description: Стил/конфигурация на свирката (чантер), включена към инструмента
        или използвана от него, например с отворен край, със затворен край, учебна
        или с клапи.
    chard_variety:
      name: Сорт манголд
      description: Посочва конкретния сорт или цветова разновидност на продавания
        манголд.
    charging_port_location:
      name: Местоположение на порта за зареждане
      description: Физическо местоположение на основния външен вход за зареждане на
        превозното средство (порт за зареждане).
    chassis_construction_type:
      name: Тип конструкция на шасито
      description: Описва основния метод за конструкция на шасито на превозното средство.
    checkbook_loading_orientation:
      name: Ориентация на поставяне на чековата книжка
      description: Посочва дали калъфът за чекова книжка е съвместим с чекове, поставяни
        отгоре, отстрани или универсално.
    cheekpiece_style:
      name: Тип бузник
      description: Определя типа конфигурация на бузника/халката на трензелата, която
        влияе върху действието на повода и страничната стабилност.
    cheese_alternative_form:
      name: Форма на заместителя на сирене
      description: Посочва физическата форма или разфасовката, в която се продава
        заместителят на сирене.
    cheese_form:
      name: Форма на сиренето
      description: Описва физическото представяне на сиренето (напр. колело, блок,
        нарязано, настъргано).
    cheese_texture:
      name: Текстура на сирене
      description: Класифицира сиренето според общата му текстура или твърдост.
    cheese_variety:
      name: Разнообразие от сирена
      description: Идентифицира вида сирене, използвано като основен ароматизатор
        в закуската.
    cherimoya_variety:
      name: Сорт черимойя
      description: Посочва конкретния сорт черимойя (напр. Fino de Jete, El Bumpo).
    cherry_variety:
      name: Сорт череши
      description: Посочва сорта на черешите, като помага на купувачите да изберат
        видове, известни с вкуса, цвета, размера или кулинарното им предназначение.
    chest_pocket_style:
      name: Стил на джоба на гърдите
      description: Посочва наличието и конфигурацията на джобовете на гърдите на ризата.
    chewing_tobacco_form:
      name: Форма на тютюна за дъвчене
      description: Посочва физическата форма, начина на нарязване или размера на пакетчето
        на продукта за дъвчене на тютюн (напр. насипен, дълго нарязан, тънко пакетче).
    chicory_variety:
      name: Сорт цикория
      description: Посочва конкретния сорт цикория, който се продава (напр. радичио,
        белгийска ендивия, ескарол).
    chiffon_recommended_use:
      name: Препоръчително предназначение на шифона
      description: Основни препоръчителни приложения за шиене/изработка на изделия
        от шифонен плат.
    child_seat_accessory_type:
      name: Тип аксесоар за детско столче
      description: Определя конкретния вид аксесоар или резервна част за детско столче
        (напр. възглавничка за седалка, поставка за крака, монтажен адаптер), помагайки
        на купувачите по-бързо да намерят нужния продукт без създаване на твърде много
        микрокатегории.
    child_seat_mounting_type:
      name: Тип монтаж на детска седалка
      description: Посочва как детското столче за велосипед се закрепва към рамката,
        багажника или зоната около кормилото.
    chime_sound_character:
      name: Звуков характер на камбанка
      description: Описва предназначения звуков характер/тембър на камбанките.
    chin_cup_type:
      name: Тип предпазител за брадичка
      description: Посочва стила или конструкцията на предпазителя за брадичка, което
        влияе върху комфорта и защитата при удар.
    chin_strap_type:
      name: Тип каишка за брадичката
      description: Посочва типа каишка под брадичката на шапката — без каишка, фиксирана,
        регулируема или сваляща се — за да помогне на купувачите да изберат модел,
        който стои стабилно при вятър или активни дейности.
    china_cymbal_edge_shape:
      name: Форма на ръба на China чинел
      description: Описва профила на ръба/фланеца, типичен за China чинелите (колко
        е извита периферията нагоре), което влияе върху усещането и звука.
    china_cymbal_sound_character:
      name: Звуков характер на China чинел
      description: Основни описания на звука/тона на China чинела, използвани за търсене
        и филтриране (напр. мръсен, тъмен, ярък). Възможни са няколко стойности.
    chinstrap_type:
      name: Тип каишка под брадичката
      description: Стил на каишката под брадичката, предоставена с каската.
    chip_cut_style:
      name: Стил на изрязване на чиповете
      description: Посочва физическата форма, нарязване или текстура на чипса (напр.
        оребрен, приготвен в котел, пукан).
    chip_denomination:
      name: Номинал на чиповете
      description: Посочва какви номинали (стойности) на чипове са включени в комплекта
        (отпечатани или зададени).
    chocolate_form:
      name: Форма на шоколада
      description: Описва физическата форма, в която се продава шоколадът за печене.
    choy_sum_variety:
      name: Сорт чой сум
      description: Посочва конкретния търговски или ботанически сорт китайско листно
        зеле, който се продава.
    cigar_wrapper_color:
      name: Цвят на обвивката на пурата
      description: Стандартна цветова класификация на обвивния лист на пурата.
    cigarette_filter_type:
      name: Тип филтър на цигарата
      description: Посочва дали цигарата има филтър и ако да — конструкцията или специалните
        характеристики на филтъра.
    cigarette_size:
      name: Размер на цигарата
      description: Класифицира цигарите според стандартната за индустрията терминология
        за дължина или формат (напр. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Дескриптор на силата на цигарата
      description: Маркетингова обозначителна категория, традиционно използвана от
        марки за интензивност на съдържанието на катран/никотин (напр. лек, плътен,
        сребърен).
    cinch_liner_material:
      name: Материал на вътрешната подплата със стягаща система
      description: Определя материала, използван за вътрешната подплата или омекотяването,
        което лежи върху коня.
    circular_knitting_needle_cable_type:
      name: Тип кабел за кръгли игли за плетене
      description: Материал/поведение и конструкция на кабела (напр. покрита стомана,
        найлон), които влияят върху запаметяването на формата/пречупването и въртенето.
    circular_knitting_needles_tip_material:
      name: Материал на върха на кръглите игли за плетене
      description: Материал на двата върха на иглите (различен от материала на свързващото
        въже).
    circumference_adjustment_mechanism:
      name: Механизъм за регулиране на обиколката
      description: Механизъм, използван за регулиране или фиксиране на обиколката
        на чилето.
    clamp_design:
      name: Дизайн на скобата
      description: Описва структурния стил или механизма на скобата.
    clamp_sheet_music_clip_features:
      name: Функции на щипките за нотни листове
      description: Функционални и защитни характеристики на щипките за нотни листове
        (напр. подплата, противоплъзгане, въртящ механизъм).
    clamping_closure_type:
      name: Тип затягане/закопчаване
      description: Посочва механизма, използван за затягане или фиксиране на обръча
        за бродиране около плата.
    clarinet_bell_acoustic_design:
      name: Акустичен дизайн на камбана за кларинет
      description: Описва звуковия/вентилационния дизайн на камбаната, предназначен
        да влияе върху реакцията и интонацията.
    clarinet_bell_adjustment_mechanism:
      name: Механизъм за регулиране на камбаната на кларинета
      description: Описва как се регулират дължината/геометрията на камбаната.
    clarinet_bell_ring_material:
      name: Материал на пръстена на камбаната на кларинета
      description: Посочва материала на защитния пръстен/лента на ръба на камбаната
        на кларинета, ако има такъв.
    clarinet_bell_tuning_effect:
      name: Ефект на камбаната на кларинета върху настройката
      description: Посочва как камбаната е проектирана да влияе върху настройката/интонацията
        (особено ниските тонове и ниския регистър) в сравнение със стандартна камбана.
    clarinet_body_type:
      name: Тип тяло на кларинета
      description: Посочва основния тип конструкция на корпуса на кларинет в Ла.
    clarinet_bore_type:
      name: Тип отвор на кларинета
      description: Описва конструкцията на звуковия канал на алт-кларинета.
    clarinet_cap_style:
      name: Стил на капачката на кларинета
      description: Стил на конструкция на капачката, включена към лигатура за кларинет
        и/или капачка за мундщук (напр. обърната конструкция или вентилирана).
    clarinet_care_kit_intended_use:
      name: Предназначение на комплекта за поддръжка на кларинет
      description: Основен контекст на употреба, за който е предназначен комплектът
        (напр. бързо ежедневно подсушаване или дълбоко почистване/поддръжка).
    clarinet_included_accessories:
      name: С включени аксесоари за кларинет
      description: Посочва какво е включено в кутията с кларинета в Си бемол.
    clarinet_keywork_material:
      name: Материал на клапния механизъм на кларинета
      description: Посочва материала на клапния механизъм на кларинета (напр. месинг,
        никелово сребро, посребрен).
    clarinet_keywork_plating:
      name: Покритие на клавишите на кларинета
      description: Посочва покритието/материала на механиката (клавишите) на кларинета.
    clarinet_mouthpiece_baffle_profile:
      name: Профил на вътрешната преграда (бафъл) на мундщука за кларинет
      description: Описва вътрешния профил/преграда на мундщука на кларинета, който
        влияе върху яркостта и проекцията на звука.
    clarinet_mouthpiece_beak_shape:
      name: Форма на върха (клюна) на мундщука за кларинет
      description: Посочва външния профил/ъгъл на човката за комфорт на изпълнителя
        и усещане при поставяне на устните.
    clarinet_mouthpiece_chamber_size:
      name: Размер на камерата на мундщука на кларинет
      description: Описва относителния размер на камерата на мундщука за кларинет
        (според производителя), който може да влияе на тембъра и съпротивлението при
        свирене.
    clarinet_mouthpiece_intended_tone:
      name: Предназначен тон на мундщука за кларинет
      description: Описва общата тонална цел, за която е предназначен и се предлага
        мундщукът.
    clarinet_mouthpiece_player_level:
      name: Ниво на изпълнителя за мундщук за кларинет
      description: Посочва типичното ниво на потребителя, за което е предназначен
        мундщукът.
    clarinet_reed_cut:
      name: Тип изрязване на тръстиката за кларинет
      description: Определя профила/обработката на езичето (напр. с шлайфане или без
        шлайфане и други търговски стилове на изрязване), което влияе на отговора
        и тембъра.
    clarinet_reed_material_type:
      name: Тип материал на тръстиката за кларинет
      description: Посочва от какъв материал е направена тръстиката (тръстика от растение
        или синтетичен материал и често срещани синтетични подвидове).
    clarinet_thumb_rest_type:
      name: Тип опора за палеца на кларинета
      description: Тип/характеристика на опората за десния палец.
    classical_guitar_string_3rd_string_type:
      name: Тип на 3-тата струна за класическа китара
      description: Дали сол струната (3-та струна) е гладка (монофилна) или навита.
    classical_guitar_string_bass_winding_material:
      name: Материал на намотката на басовите струни за класическа китара
      description: Материалът на навивката (обвивката) на басовите струни (обикновено
        струни 4 – 6).
    classical_guitar_string_set_configuration:
      name: Конфигурация на комплекта струни за класическа китара
      description: Посочва дали продуктът представлява пълен комплект или отделни
        струни (обикновено дискантни или басови) за класическа китара.
    clay_modeling_dough_base_material:
      name: Основен материал на глината и моделиращото тесто
      description: Основен състав/базов тип на моделиращия материал.
    clay_modeling_dough_curing_method:
      name: Метод за втвърдяване на глината и моделиращото тесто
      description: Начинът, по който материалът се втвърдява (или остава за многократна
        употреба), което определя необходимите инструменти и типичните приложения.
    clay_paintability:
      name: Възможност за боядисване на глината
      description: Посочва дали втвърдената повърхност на глината може да се боядисва
        и какви видове бои се препоръчват.
    clay_primary_composition:
      name: Основен състав на глината
      description: Основен базов материал/свързващо вещество на глината за сушене
        на въздух (напр. на хартиена основа, на минерална основа).
    clay_shooting_discipline:
      name: Дисциплина в стрелба по летящи мишени
      description: Определя дисциплината или състезателния формат на стрелба по летящи
        мишени (панички), за който е предназначен продуктът.
    cleaner_format:
      name: По-чист формат
      description: Опаковка/формат на продукта за почистване на плъзгача.
    cleaner_sanitizer_intended_area:
      name: Зона, предназначена за почистване/дезинфекция
      description: Основната част от духовия инструмент, която продуктът е предназначен
        да почиства/дезинфекцира.
    cleaning_formula:
      name: Почистваща формула
      description: Посочва основната химическа група на почистващия/дезинфекциращ
        продукт (не марка), с цел безопасност, съвместимост и филтриране по предназначение.
    cleaning_task_focus:
      name: Фокус на задачата за почистване
      description: Посочва основните замърсявания, които безводният препарат е предназначен
        да отстранява.
    cleanup_method:
      name: Метод за почистване
      description: Посочва как лепилото трябва да бъде почистено (докато е мокро)
        от ръце/инструменти/повърности.
    clear_glue_application_method:
      name: Метод за нанасяне на прозрачно лепило
      description: Посочва стила на дозатора/апликатора, включен в опаковката на прозрачното
        лепило.
    clear_glue_finish_after_drying:
      name: Финиш на прозрачното лепило (след изсъхване)
      description: Описва външния вид на лепилото след изсъхване/втвърдяване (напр.
        кристално прозрачно или полупрозрачно, гланцово или матово).
    cleat_bolt_pattern:
      name: Разположение на отворите/болтовете за закрепване на клита.
      description: Посочва конфигурацията на болтовете на обувката за закрепване на
        автомата, което определя съвместимостта между педал и обувка (напр. 2-болтов
        MTB срещу 3-болтов шосеен стандарт).
    cleat_compatibility:
      name: Съвместимост с шпайкове
      description: Посочва с кои системи за педали или автомати е съвместимо покритието
        за обувки.
    cleat_finish:
      name: Финиш на автомата за педал
      description: Посочва повърхностния финиш/покритие на швартовия кнехт, което
        влияе върху устойчивостта на корозия и външния вид.
    cleat_receptacle_system:
      name: Система за захващане на клиновете към обувката
      description: Определя съвместимия интерфейс за закрепване на шипове/клинове
        при обувки за голф с шипове.
    cleat_release_mechanism:
      name: Механизъм за освобождаване на шпайкове
      description: Посочва как велосипедният автомат за педал се освобождава от педала
        (напр. еднопосочно или многопосочно освобождаване).
    cleat_stud_type:
      name: Тип на шипа на клина
      description: Посочва конструкцията или начина на закрепване на шиповете върху
        подметката на обувките за американски футбол.
    climate_control_module_function:
      name: Функция на модула за климатичен контрол
      description: Посочва основната роля на модула в HVAC системата на превозното
        средство.
    climbing_hold_mounting_type:
      name: Тип закрепване на катерачна осигуровка
      description: Посочва начина, по който хватката се закрепва към стената или тренировъчната
        дъска.
    climbing_hold_type:
      name: Тип хватки за катерене
      description: Категоризира формата или стила на хватката, който определя начина
        на захващане.
    climbing_protection_device_type:
      name: Вид на защитното устройство за катерене
      description: Посочва стила на осигурителното средство (напр. клема, гайка, питон),
        помагайки на катерачите бързо да изберат правилната екипировка за даден скален
        профил или стил на катерене.
    climbing_rope_middle_marking:
      name: Маркировка на средата на катерачното въже
      description: Описва как средната точка (и/или краищата) на въжето са обозначени,
        за да подпомогнат безопасното рапелиране и спускане.
    climbing_rope_treatment:
      name: Обработка на катерачно въже
      description: Посочва всякакво водоотблъскващо, сухо или защитно покритие, нанесено
        върху оплетката и/или сърцевината на въжето.
    climbing_rope_type:
      name: Тип катерачно въже
      description: Класифицира въжето според UIAA сертификацията и предназначението
        му (напр. динамично единично, половинно, двойно, статично, помощно въже),
        което позволява на купувачите бързо да открият подходящото въже за тяхната
        дейност.
    climbing_safety_certifications:
      name: Сертификати за безопасност при катерене
      description: Изброява стандартите за катерене и индустриална безопасност, на
        които устройството отговаря.
    clip_color:
      name: Цвят на щипката
      description: Основен цвят на щипката за нотни листове.
    clip_mechanism_type:
      name: Тип механизъм на щипката
      description: Определя механизма за закрепване, използван при щипка за пари или
        портфейл тип щипка, което помага на купувачите да избират между магнитен,
        пружинен, лостов и други стилове.
    clip_style:
      name: Стил на щипката
      description: Определя конкретния механизъм на щипката за закрепване на държача,
        като предоставя информация за съвместимост (напр. крокодилска щипка, карабинер).
    clipper_motor_technology:
      name: Технология на мотора на машинката за подстригване
      description: Посочва конструкцията на мотора в машинката за подстригване, влияеща
        върху мощността, шума, издръжливостта и поддръжката.
    closet_configuration:
      name: Конфигурация на дрешника
      description: Определя общата форма или конфигурация на гардеробната система
        (напр. Г-образна, U-образна, островна).
    closing_mechanism:
      name: Затварящ механизъм
      description: Посочва начина на затваряне на чекмеджето, например стандартно,
        с плавно затваряне, самозатварящо се или с отваряне чрез натиск.
    cloth_construction:
      name: Конструкция на плата
      description: Посочва сплитката или финиша на плата, което влияе върху устойчивостта
        на износване и издръжливостта (напр. камгарен срещу вълнен).
    cloth_thickness:
      name: Дебелина на плата
      description: Посочва дебелината/класа на плътност на полиращата кърпа.
    club_head_material:
      name: Материал на главата на стика
      description: Посочва основния материал, използван за изработката на главата
        на стика за голф.
    clutch_hydraulic_system_type:
      name: Тип хидравлична система на съединителя
      description: Посочва съвместимостта на системата за задействане/хидравлика на
        съединителя (напр. хидравличен съединител срещу конверсия към жило).
    clutch_line_connection_type:
      name: Тип връзка на линията на съединителя
      description: Посочва типа на крайното свързване/фитинг интерфейса на съединителната
        линия, което е важно за съвместимостта с главния/работния цилиндър и твърдите
        тръбопроводи.
    clutch_pressure_plate_actuation_type:
      name: Тип задействане на притискателния диск на съединителя
      description: Посочва дали съединителят се освобождава чрез механизъм с натискане
        или издърпване (задействане с диафрагмена пружина).
    clutch_pressure_plate_release_mechanism_type:
      name: Тип механизъм за освобождаване на притискателния диск на съединителя
      description: Стил на интерфейса за освобождаване/задействане, използван от притискателния
        диск.
    clutch_pressure_plate_surface_type:
      name: Тип повърхност на притискателния диск на съединителя
      description: Стил на фрикционната контактна повърхност на притискателния диск.
    clutch_slave_cylinder_connection_type:
      name: Тип свързване на долните помпи за съединител
      description: Интерфейс за свързване на хидравличната линия към работния цилиндър
        (резбован порт, бърза връзка, банжо и др.).
    clutch_slave_cylinder_mounting_type:
      name: Тип на монтаж на работния цилиндър на съединителя
      description: Начин на монтиране на работния цилиндър към трансмисията/картера
        на съединителя (напр. болтов монтаж, щракващ монтаж, интегриран концентричен).
    coating_type:
      name: Тип покритие
      description: Определя външното покритие, глазура или заливка върху зърненото
        барче (напр. шоколад, кисело мляко).
    cocking_mechanism:
      name: Механизъм за опъване
      description: Посочва основния метод или устройство, използвано за опъване или
        отпускане на тетивата на арбалета.
    cocktail_garnish_form:
      name: Форма на гарнитурата за коктейл
      description: Описва как гарнитурата е представена/обработена за употреба (напр.
        прясна срещу дехидратирана).
    cocktail_mix_variety:
      name: Разнообразие от коктейлни миксове
      description: Показва конкретния коктейл, за чието приготвяне е предназначена
        сместа (напр. Маргарита, Мохито, Пиня Колада).
    cocktail_napkin_features:
      name: Характеристики на коктейлните салфетки
      description: Highlight функционалните, удобните и екологичните характеристики
        на коктейлните салфетки.
    cocktail_pick_tip_style:
      name: Стил на върха на коктейлна клечка
      description: Описва формата/характеристиката на върха, използван за пробождане
        или задържане на гарнитури.
    cocktail_pick_top_handle_style:
      name: Стил на горната част/дръжката на коктейлна клечка
      description: Описва декоративната горна част или формата на дръжката, използвана
        за захващане или за презентация.
    cocktail_type:
      name: Тип коктейл
      description: Посочва конкретната рецепта или стил коктейл, представен от предварително
        смесения продукт (напр. Маргарита, Негрони, Пиня Колада).
    cocktail_umbrella_handle_pick_material:
      name: Материал на дръжката/клечката на коктейлния чадър.
      description: Материал на пръчката/дръжката (без сенника) на коктейлния чадър.
    cocoa_processing_method:
      name: Метод на обработка на какаото
      description: Посочва как е обработено какаото на прах (напр. натурално, обработено
        по холандски метод, черно какао).
    cocoa_product_form:
      name: Форма на какаовия продукт
      description: Определя физическата форма, в която се продава какаовият продукт.
    coconut_husk_status:
      name: Състояние на кокосовата обвивка
      description: Посочва до каква степен външната обвивка или черупка на кокоса
        е премахната, което влияе върху удобството при употреба, съхранението и отпадъка.
    coconut_maturity_stage:
      name: Степен на зрялост на кокоса
      description: Определя етапа на развитие на кокоса при добив, който силно влияе
        на вкуса, съдържанието на вода и кулинарната употреба (напр. за пиене или
        за готвене).
    coconut_oil_refinement_type:
      name: Тип рафиниране на кокосовото масло
      description: Посочва степента на рафиниране или класа на кокосовото масло, напр.
        необработено, рафинирано, MCT, фракционирано.
    coconut_preparation_form:
      name: Форма за приготвяне на кокос
      description: Форма на подготовка на кокосаПосочва как кокосът е физически подготвен
        или нарязан (цял, нарязан на филийки, настърган, пюриран и др.), помагайки
        на купувачите бързо да намерят подходящия формат за рецепти или консумация.
    coffee_bean_species:
      name: Вид кафеено зърно
      description: Посочва вида кафени зърна, използвани в продукта.
    coffee_beverage_variety:
      name: Разнообразие от кафени напитки
      description: Класифицира готовите за консумация или смесване кафеени напитки
        според стила им.
    coffee_processing_method:
      name: Метод на обработка на кафето
      description: Посочва техниката за обработка на кафеените зърна след реколтата.
    coil_material:
      name: Материал на намотката
      description: Посочва основния материал или типа мрежа, използвани в нагревателната
        спирала, което влияе върху вкуса, издръжливостта и съвместимостта с температурния
        контрол.
    coil_spring_design:
      name: Конструкция на спиралната пружина
      description: Посочва характеристиките на пружината (напр. твърдост/скорост на
        работа и форма на навивките), които влияят на поведението при движение и комфорта.
    coil_spring_finish_coating:
      name: Финиш/покритие на спиралната пружина
      description: Повърхностно покритие или обработка, нанесени за защита от корозия.
    coil_spring_material:
      name: Материал на пружината
      description: Основен материал/състав на винтовата пружина.
    coil_system_type:
      name: Тип система от пружини
      description: Описва конкретната система от пружини, използвана в съответните
        матраци, като джобни пружини или пружини Bonnell.
    coil_type:
      name: Тип спирала
      description: Описва конструкцията или технологията на спиралата, влияеща върху
        образуването на пара и вкуса.
    coin_grade_numismatic:
      name: Клас на монетата (нумизматично)
      description: Стандартизирана степен на състояние/качество на монетата (напр.
        по скалата на Шелдън или описателна оценка).
    coin_strike_or_finish:
      name: Щампа или финиш на монетата
      description: Типът щамповане или финиш на монетата (напр. стандартна циркулационна
        щампа, колекционерска полирана щампа).
    coin_strike_type:
      name: Тип щампа на монетата
      description: Описва типа щамповане/финиш на монетата (напр. колекционерска полирана
        щампа, стандартна циркулационна щампа).
    collar_style:
      name: Стил на яката
      description: Определя дизайна на яката или деколтето на дрехата.
    collectible_gun_accessories_included:
      name: Включени аксесоари за колекционерско оръжие
      description: Изброява аксесоарите и документацията, включени към колекционерското
        оръжие (напр. кобур, калъф, щик, документи).
    collectible_gun_firing_mechanism:
      name: Механизъм за стрелба на колекционерско оръжие
      description: Посочва типа механизъм за стрелба/запалване на колекционерските
        огнестрелни оръжия (особено антикварни и исторически образци).
    collectible_knife_blade_finish:
      name: Финиш на острието на колекционерски нож
      description: Описва повърхностното покритие/обработка на острието с цел външен
        вид (а понякога и устойчивост на корозия).
    color_code_system:
      name: Система за цветови кодове.
      description: Посочва системата за цветови кодове, използвана за цифровата цветова
        референция на конеца (напр. DMC, Anchor), ако е приложимо.
    color_coding_standard:
      name: Стандарт за цветово кодиране
      description: Посочва дали дискът следва международен цветови код (напр. IWF
        или IPF) или друга схема.
    color_effect:
      name: Ефекти на цвят
      description: Посочва специални техники или ефекти за оцветяване, приложени към
        екстеншъни за коса.
    color_family:
      name: Семейство цвят
      description: Високо ниво на цветова група за sumi мастило (полезно, когато цветът
        е прекалено конкретен, напр. топло черно срещу синьо-черно).
    color_finish:
      name: Покритие на цвета
      description: Посочва финиша на видимите компоненти на предпазителя за ръка (напр.
        матов срещу гланцов), когато само цветът не е достатъчен.
    coloring_finish:
      name: Финиш на оцветяването
      description: Посочва визуалния финиш или специален ефект, създаден от оцветяването,
        като металик или неон.
    comb_material:
      name: Материал на гребена
      description: Материал на гребена на хармониката (корпусът, който образува въздушните
        камери).
    comb_type:
      name: Вид на гребена
      description: Класифицира гребените за разресване на коне според основното им
        предназначение (напр. curry comb, гребен за грива, гребен за изскубване),
        помагайки на купувачите бързо да намерят подходящия инструмент за конкретни
        нужди при поддръжка.
    combat_shorts_cut_style:
      name: Стил на кройката на шорти за бойни спортове
      description: Посочва кройката или стила на прилягане, специфичен за шорти за
        бойни спортове (напр. висока кройка, ретро кройка, компресионни).
    comic_creator_role:
      name: Роля на създателя на комикса
      description: Посочва ролята на посочения създател, свързана с обявата (напр.
        писател, художник).
    commemorative_coin_finish:
      name: Покритие на възпоменателна монета
      description: Описва типа щамповане/финиш на възпоменателна монета.
    commemorative_coin_mint_mark:
      name: Монетен знак на възпоменателна монета
      description: Посочва монетния знак (или липсата на такъв) върху монетата.
    commemorative_subject:
      name: Тема на възпоменателната монета
      description: Основна тема на възпоменанието (събитие, човек, място, годишнина,
        организация и др.).
    commercial_vehicle_class:
      name: Клас на търговско превозно средство
      description: Регулаторен/индустриален клас на базата на GVWR, използван за описание
        на тегловия клас на търговско превозно средство за разглеждане и филтриране.
    compass_damping_medium:
      name: Среда за демпфиране на компаса
      description: Посочва средата, използвана за стабилизиране на движението на стрелката
        вътре в корпуса на компаса.
    compass_illumination_type:
      name: Тип осветяване на компаса
      description: Посочва как маркировките на компаса се правят видими при слаба
        светлина (напр. луминисцентна боя, тритий, LED подсветка).
    compass_mounting_style:
      name: Стил на закрепване на компаса
      description: Описва как компасът се носи, поставя или монтира.
    compass_scale_units:
      name: Единици на скалата на компаса
      description: Посочва мерните единици (градуси, мили или и двете), отбелязани
        върху корпуса на компаса.
    compatible_abs_system:
      name: Съвместима ABS система
      description: Показва дали главният спирачен цилиндър е предназначен за превозни
        средства, оборудвани с ABS.
    compatible_adapter_brand:
      name: Марка на съвместимия адаптер
      description: Определя марката на главата на голф стика, за чийто адаптер е предварително
        конфигурирано да пасва шафтът.
    compatible_airbag_system_type:
      name: Съвместим тип система на въздушната възглавница
      description: Посочва с кое поколение/набор функции на системата за въздушни
        възглавници е съвместима частта (напр. едностепенна спрямо двустепенна).
    compatible_amplifier_fit_method:
      name: Метод за монтаж на съвместим усилвател
      description: Посочва как се определя съвместимостта на калъфа/покривалото (универсално
        пасване, специфично за модел или според размери).
    compatible_apparatus:
      name: Съвместим апарат
      description: Посочва за кой гимнастически уред или дейност са предназначени
        ръкохватките.
    compatible_archery_tool:
      name: Съвместим инструмент за стрелба с лък
      description: Посочва основния инструмент или оборудване за стрелба с лък, за
        който е предназначен аксесоарът.
    compatible_axle_size:
      name: Съвместим размер на оста
      description: Посочва диаметъра на оста или стандартa на резбата, за който е
        предназначена степенката (напр. 10 мм/3⁄8 инча, 14 мм, 3/8 инча 26 TPI).
    compatible_axle_type:
      name: Съвместим тип ос
      description: Посочва стандарта(ите) за закрепване на задната ос, които тренажорът
        поддържа, като бързо освобождаване или размери на проходна ос.
    compatible_axle_weight_rating:
      name: Съвместим товароносимостен рейтинг на оста
      description: Посочва товароносимостта на оста на ремаркето (капацитет на ос),
        за която е предназначен спирачният механизъм на ремаркето.
    compatible_bait_type:
      name: Съвместим тип стръв
      description: Посочва видовете риболовна стръв, с които е съвместим инструментът
        за пробиване на стръв, така че риболовците да могат да изберат инструмент,
        подходящ за предпочитаната от тях стръв.
    compatible_bass_scale_length:
      name: Съвместима дължина на мензурата на баса
      description: Посочва дължината(ите) на мензурата на бас китарата, за които е
        предназначен комплектът струни (важно за правилната дължина на намотаване
        и съвместимост).
    compatible_battle_top_system:
      name: Съвместима система за бойни пумпали
      description: Посочва продуктовата екосистема или серия за бойния пумпал, за
        която е предназначен продуктът (използва се за осигуряване на съвместимост
        на части и арени).
    compatible_bb_size:
      name: Съвместим размер на сачмите
      description: Посочва диаметъра на airsoft сачмите, които продуктът поддържа.
    compatible_bed_frame_style:
      name: Съвместим стил на рамката на леглото
      description: Посочва стила на леглото или рамката, за който е предназначен аксесоарът.
    compatible_bicycle_tire_type:
      name: Съвместим тип велосипедна гума
      description: Посочва типовете велосипедни гуми, които продуктът може да ремонтира
        или уплътнява.
    compatible_bike_component:
      name: Съвместим компонент за велосипед
      description: Посочва кой компонент на велосипеда е предназначен да обслужва
        инструментът или продуктът.
    compatible_billiard_game:
      name: Съвместима игра на билярд
      description: Посочва формата(ите) на игра на билярд, за които е предназначен
        триъгълникът, така че клиентите да изберат подходящ модел за своята игра.
    compatible_billiard_table_size:
      name: Съвместим размер на билярдна маса
      description: Посочва стандартната дължина(и) на масата, за която е предназначено
        покривалото, помагайки на купувачите да изберат правилния размер за билярдната
        си маса.
    compatible_bit_type:
      name: Съвместим вид на бита
      description: Стилове битове, с които предпазителят може да се използва.
    compatible_blade_hosel:
      name: Съвместим накрайник на острието
      description: Посочва типа на шийката/конуса на острието, който шафтът приема,
        за да се осигури правилно съвпадение между шафта и острието.
    compatible_blade_system:
      name: Съвместима система за остриета
      description: Показва системата/формата на сменяемите остриета, които ножът поддържа
        (напр. стандартни остриета за хоби № 11, сменяеми сегментни остриета).
    compatible_boat_weaving_shuttle_loom:
      name: Съвместим тъкачен стан със совалка тип „лодка“
      description: Посочва за какви видове станове е предназначена совалката.
    compatible_bobbin_type:
      name: Съвместим тип калерка
      description: Посочва какъв тип калерка/шпула е предназначена да използва совалката.
    compatible_bottle_mouth:
      name: Съвместим тип гърло/отвор на бутилката
      description: Тип или диаметър на гърлото на бутилката, за което е предназначена
        сламката или капачката.
    compatible_bow_attachment_system:
      name: Съвместима система за закрепване на лък
      description: Посочва интерфейса за раменете или аксесоарите, за който е предназначена
        частта (напр. ILF, винтов монтаж, бързо освобождаване).
    compatible_bow_crossbow_type:
      name: Съвместим тип лък/арбалет
      description: Определя стила на лъка или арбалета, за който е предназначен аксесоарът.
    compatible_brake_fluid:
      name: Съвместима спирачна течност
      description: DOT спецификация на спирачната течност, с която уплътненията/материалите
        на главния цилиндър са съвместими.
    compatible_brake_pad:
      name: Съвместими спирачни накладки
      description: Посочва с какви състави на спирачните накладки е одобрен за употреба
        роторът, осигурявайки безопасност и оптимално износване.
    compatible_brake_service_system:
      name: Съвместима сервизна спирачна система
      description: Посочва дали частта е предназначена за дискови спирачки, барабанни
        спирачки или и за двата типа.
    compatible_brake_system:
      name: Съвместима спирачна система
      description: Посочва ключови бележки за съвместимостта на системата при използване
        на спирачна течност.
    compatible_brake_type:
      name: Съвместим тип на спирачката
      description: Посочва типа спирачки, с които багажникът е съвместим, като дискови
        или джанти.
    compatible_brass_instrument_finish:
      name: Съвместими покрития на медни инструменти
      description: Посочва за кои финиши на медни духови инструменти почистващият
        препарат е безопасен за употреба, без да поврежда покритието.
    compatible_building_toy_system:
      name: Съвместима система за конструктори
      description: Посочва с коя система/стандарт за конструктори е съвместима играчката
        (или еквивалентен размер), като LEGO-съвместима или собствен стандарт.
    compatible_capo_fretboard_radius:
      name: Съвместим радиус на грифа на каподастъра
      description: Посочва радиуса/профила на грифа, за който каподастърът е проектиран,
        за оптимален контакт и стабилност на настройката.
    compatible_capo_number_of_strings:
      name: Съвместим брой струни за каподастъра
      description: Посочва за колко струни е предназначен каподастърът (полезно за
        6-, 7-, 8-, 12-струнни и специализирани инструменти).
    compatible_cardio_machine_type:
      name: Съвместим тип кардио уред
      description: Определя типа кардио уред, с който аксесоарът или частта е предназначена
        да работи.
    compatible_chain_link_type:
      name: Съвместим тип звено на верига
      description: Посочва какъв стил звена на веригата поддържа инструментът (стандартно,
        половин звено, бърза връзка и др.).
    compatible_chain_size:
      name: Съвместим размер на веригата
      description: Посочва каква ширина или стандарт на стъпката на веригата (напр.
        1/8 инча, 3/32 инча) поддържа инструментът.
    compatible_chain_width:
      name: Съвместима ширина на верига
      description: Посочва с кои размери вериги е съвместим свободният венец.
    compatible_chip_denomination:
      name: Съвместим номинал на чипове
      description: Посочва за кои номинали чипове таблата/кутията има означени или
        предназначени места (или е предназначена да организира).
    compatible_clarinet_mouthpiece_ligature:
      name: Съвместима лигатура за мундщук на кларинет
      description: Посочва стандарта за съвместимост или бележки за пасване на лигатурата
        към мундщука.
    compatible_classical_guitar_string_scale_length:
      name: Съвместима мензура на струни за класическа китара
      description: Съвместимост на комплекта с дължина на мензурата и струните на
        китарата.
    compatible_clay_target_size:
      name: Съвместим размер на глинени панички
      description: Изброява размерите или формите на глинените панички, които машината
        за изстрелване може да приема за правилно прилягане и работа.
    compatible_cleat_system:
      name: Съвместима система на зацепката
      description: Посочва интерфейса на автомата за педали или схемата на болтовете,
        които педалът поддържа, така че колоездачите да могат да съчетаят обувките
        си с правилната система.
    compatible_clipless_pedal_system:
      name: Съвместима система за педали без щипки
      description: Посочва конкретния стандарт за автоматични педали и автомати за
        обувки, с който продуктът е проектиран да бъде съвместим.
    compatible_clutch_type:
      name: Съвместим тип съединител
      description: Съвместимост на интерфейса на съединителя за маховика (където е
        приложимо).
    compatible_coffee_pod_system:
      name: Съвместима система за кафе капсули
      description: Посочва кафемашината или системата за приготвяне, за която са предназначени
        капсулите.
    compatible_construction_set_system:
      name: Съвместима система за конструкторски комплекти
      description: Посочва с коя система/екосистема на марката за конструктори е съвместим
        комплектът (напр. съвместим с LEGO, съвместим с DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Съвместима стойка/опора за контрабас кларинет
      description: Посочва необходимия интерфейс за стойка/щифт или стил на опора.
    compatible_coolant_chemistry:
      name: Съвместима химия на охлаждащата течност
      description: Посочва с кои химически групи охладителни течности е формулирана
        добавката да бъде съвместима.
    compatible_cooling_system_material:
      name: Съвместим материал на охладителната система
      description: Посочва за кои охладителни системи/материали препаратът за промиване
        на радиатор е безопасен (напр. алуминиеви радиатори, системи от смесени метали).
    compatible_crib_format:
      name: Съвместим формат на бебешкото легло
      description: Определя общата категория размер или форма на матрака или чаршафа,
        за който е предназначен аксесоарът.
    compatible_cross_stitch_fabric_count:
      name: Съвместима гъстота на плат за кръстат бод
      description: Препоръчителна гъстота на плата за изработване на бродерията.
    compatible_cross_stitch_frame:
      name: Съвместима рамка за кръстат бод
      description: Посочва за какъв тип използване е предназначена рамката (държане
        в ръка, настолна стойка, подова стойка или универсална).
    compatible_crossbar:
      name: Съвместима напречна греда
      description: Съвместимост на багажника с напречните греди на автомобилен покривен
        багажник (при монтаж на покрив), включително стандарти за форма/профил на
        гредите.
    compatible_cycling_cleat:
      name: Съвместим автомат за велосипедни обувки
      description: Посочва с какъв автомат или система за педали са предназначени
        да работят обувките за колоездене.
    compatible_cymbal_size:
      name: Съвместим размер на чинела
      description: Посочва предназначения (или максимален) диаметър на чинела, за
        който е предназначен калъфът; това е съвместимост с размера на чинела, а не
        външния диаметър на калъфа.
    compatible_device_type:
      name: Съвместим тип устройство
      description: Посочва за какъв тип устройство е предназначена стойката (напр.
        монитор/телевизор, таблет, смартфон, преносим DVD плейър).
    compatible_dock_structure_type:
      name: Съвместим тип докинг конструкция
      description: Конструкцията на дока, към която са предназначени да се монтират
        стъпалата.
    compatible_dough_type:
      name: Съвместим тип тесто
      description: Посочва с какви типове/марки тесто са предназначени да работят
        инструментите (напр. стандартно тесто за игра, моделираща глина).
    compatible_drawing_ink_surface:
      name: Съвместима повърхност за рисуване с мастило
      description: Посочва препоръчителните повърхности/основи за най-добра работа.
    compatible_drivetrain_brand:
      name: Съвместима марка на задвижваща система
      description: Посочва марките на задвижващата система или спирачната система,
        с които е съвместим кабелът.
    compatible_drivetrain_speeds:
      name: Съвместим брой скорости на трансмисията
      description: Посочва броя скорости на трансмисията (напр. 10-скоростна), които
        курбелът или предният венец поддържа.
    compatible_equipment:
      name: Съвместимо оборудване
      description: Посочва какъв тип оборудване за зимни спортове е предназначено
        да държи менгемето.
    compatible_evap_system:
      name: Съвместима системата за контрол на горивните изпарения (EVAP)
      description: Посочва дали капачката на резервоара е проектирана да отговаря
        на изискванията на EVAP системата (напр. уплътнение по OEM стандарт) и да
        намалява сигналите за проверка на двигателя.
    compatible_exercise_bike_style:
      name: Съвместим стил велоергометър
      description: Посочва с какви типове велоергометри е съвместим аксесоарът или
        резервната част.
    compatible_fencing_weapon:
      name: Съвместимо оръжие за фехтовка
      description: Посочва за кое фехтовално оръжие или дисциплина е предназначено
        сакото или ламето.
    compatible_fiber_type:
      name: Съвместим тип влакна
      description: Посочва основните типове влакна, които барабанният кардер е предназначен
        да обработва ефективно.
    compatible_fin_box_system:
      name: Съвместимост на кутията за плавници
      description: Посочва кутията или монтажната система за плавника, за която е
        предназначен плавникът, помагайки на сърфистите да купуват плавници, съвместими
        със сърфа им (напр. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Съвместим радиус на грифа
      description: Посочва радиуса на грифа (плосък, извит или комбиниран), с който
        каподастърът е проектиран да съвпада за равномерен натиск и намалено бръждене.
    compatible_finish_type:
      name: Съвместим тип покритие
      description: Посочва за кои видове покрития на инструменти спреят е деклариран
        като безопасен от производителя.
    compatible_fishing_reel_type:
      name: Съвместим тип макара за риболов
      description: Указва вида риболовна макара, за която е предназначен аксесоарът
        (напр. спининг, стриймкаст, мухарка).
    compatible_fly_line_weight:
      name: Съвместимо тегло на шнура за мухарка
      description: Посочва AFTMA класовете на мухарските шнурове, за които е предназначена
        шпулата.
    compatible_flywheel_type:
      name: Съвместим тип маховик
      description: Посочва типа маховик, с който е предназначен да се използва притискателният
        диск на съединителя.
    compatible_football_kick_type:
      name: Съвместим тип удар при американски футбол
      description: Посочва ситуациите на ритане, за които е предназначен продуктът
        (напр. kickoff, field goal), помагайки на спортистите бързо да намерят подходящата
        екипировка.
    compatible_fuel_system_type:
      name: Съвместим тип горивната система
      description: Посочва горивната система, за която е предназначен почистващият
        препарат.
    compatible_gas_type:
      name: Съвместим вид газ
      description: Посочва типа компресиран газ, за който е предназначен резервоарът
        за въздух за пейнтбол.
    compatible_gel_wax_additives:
      name: Съвместими добавки за гел вакса
      description: Посочва кои типове добавки са съвместими с тази гел вакса (напр.
        оцветители, вложки/декоративни елементи).
    compatible_glaze_layering:
      name: Съвместимо нанасяне на глазура на слоеве
      description: Дали глазурата е предназначена да се наслагва с други глазури за
        постигане на ефекти.
    compatible_golf_bag_type:
      name: Съвместим тип голф чанта
      description: Посочва с кои формати на голф чанти е съвместим калъфът или покривалото.
    compatible_ground_polarity:
      name: Съвместима полярност към маса
      description: Посочва дали регулаторът на напрежение е предназначен за отрицателно
        заземени или положително заземени електрически системи на превозни средства
        (или е нечувствителен към поляритет).
    compatible_guitar_body_shape:
      name: Съвместима форма на тялото на китара
      description: Посочва за каква форма/тип корпус на китара е предназначен калъфът.
    compatible_guitar_case:
      name: Съвместим калъф за китара
      description: Посочва за какви типове калъфи за китара е предназначен овлажнителят,
        така че да пасва и работи правилно.
    compatible_guitar_scale_length:
      name: Съвместима мензура на китара
      description: Посочва за каква дължина на мензурата на китарата е предназначен
        комплектът струни (според дължината на намотката/общата дължина).
    compatible_gun_platform:
      name: Съвместима оръжейна платформа
      description: Посочва с каква работна платформа или източник на захранване е
        съвместим продуктът (напр. AEG, GBB, HPA).
    compatible_hair_length:
      name: Съвместима дължина на косата
      description: Посочва максималната дължина или обем на косата, който шапката
        може удобно да побере.
    compatible_head_and_neck_restraint_system:
      name: Съвместима система за фиксиране на глава и врат
      description: Посочва дали каската включва точки за закрепване и/или е съвместима
        със системи за фиксиране на глава и врат (напр. HANS), включително наличие/монтаж
        на закрепващи елементи.
    compatible_helmet_certification_standard:
      name: Съвместим стандарт за сертификация на каската
      description: Посочва стандарта за безопасност или сертификационния контекст
        за каски, който аксесоарът е предназначен да поддържа (напр. откъсващи се
        защитни слоеве за визьори при състезания често се съобразяват с конкретни
        състезателни правила).
    compatible_helmet_shell_size:
      name: Съвместим размер на корпуса на каската
      description: Посочва за кои размери корпус на каска пасва резервната вътрешна
        част (размерите на корпуса често съответстват на диапазони като XS-S, M, L-XL).
    compatible_helmet_size:
      name: Съвместим размер каска
      description: Посочва размерите каски, с които е съвместима маската за лице.
    compatible_helmet_type:
      name: Съвместим вид каска
      description: Категория каски, с които опората за врата е предназначена да работи.
    compatible_hitch_receiver_size:
      name: Съвместим размер на отвора за теглич
      description: Посочва размера на отвора на теглича, за който е предназначен аксесоарът
        (за аксесоари, монтирани на теглич).
    compatible_hook_size:
      name: Съвместим размер на куката
      description: Система за размери на куки за плетене на една кука и/или диапазон
        от размери, за които е предназначен органайзерът (напр. американски буквени/цифрови
        размери, метрични размери в мм).
    compatible_horse_coat_type:
      name: Съвместим тип козина на кон
      description: Посочва за какъв тип конска козина е най-подходящ инструментът
        за разресване на подкосъм (напр. гъста зимна козина или чувствителна козина).
    compatible_host_platform:
      name: Съвместима хост платформа
      description: Посочва с кои хост платформи или типове устройства е съвместим
        пад контролерът (напр. Windows, macOS, iOS, Android) или дали може да работи
        самостоятелно без компютър.
    compatible_inflation_gas:
      name: Съвместим газ за надуване
      description: Посочва с какво е предназначен да се надува балонът (въздух, хелий
        или и двете).
    compatible_injection_type:
      name: Съвместим тип впръскване
      description: Показва за коя система за впръскване на гориво е предназначен продуктът.
    compatible_instrument_surface_material:
      name: Съвместима повърхност/материал на инструмент
      description: Посочва върху какви повърхности/материали на инструменти е предназначен
        да се използва полиращият препарат.
    compatible_intercom_system:
      name: Съвместима интерком система
      description: Посочва готовността/съвместимостта на каската за монтаж или инсталиране
        на касков интерком/комуникационна система.
    compatible_interior_material:
      name: Съвместим вътрешен материал
      description: Посочва за кои материали в автомобилния интериор е безопасен и
        ефективен препаратът за премахване на петна (напр. килим, текстилна тапицерия,
        кожа, винил).
    compatible_kayak_type:
      name: Съвместим тип каяк
      description: Посочва основните типове каяци, върху които е предназначен да се
        монтира комплектът с платно.
    compatible_license_plate_hole_pattern:
      name: Съвместима конфигурация на отворите за регистрационен номер
      description: Посочва конфигурацията на монтажните отвори, поддържана от стойката/държача
        (от страната на автомобила и/или табелата).
    compatible_license_plate_size:
      name: Съвместим размер на регистрационен номер
      description: Посочва регионалните или размерните стандарти за регистрационни
        табели, за които е предназначен държачът/стойката.
    compatible_loom:
      name: Съвместим стан
      description: Посочва типовете тъкачни станове, с които е предназначен да се
        използва гребенът за плоско тъкане.
    compatible_loom_type:
      name: Съвместим тип стан
      description: "„Посочва тъкачната конфигурация, с която е предназначен да се
        използва гребенът (напр. станове с твърд хедъл или гобленови станове)."
    compatible_machine_type:
      name: Съвместим тип машина
      description: Посочва с какъв тип квилинг система е предназначена да се използва
        рамката (ръчно квилинг, домашна шевна машина или квилинг машина с дълго рамо).
    compatible_mast_type:
      name: Съвместим тип мачта
      description: 'Посочва за какви диаметри на мачтата е предназначено платното:
        намален диаметър (RDM), стандартен диаметър (SDM) или и двата типа.'
    compatible_model_system_train_scale:
      name: Съвместима система за моделни влакове (мащаб)
      description: Посочва мащаба/системата на моделните влакчета, за които е съвместим
        аксесоарът (напр. HO, N, O).
    compatible_mounting_surface:
      name: Съвместима монтажна повърхност
      description: Повърхността или обектът, върху който е предназначена да се захваща
        скобата.
    compatible_mouthpiece_patch:
      name: Съвместима лепенка за мундщук
      description: Посочва дали мундщукът е предназначен за използване с подложки/пластири
        за мундщук и препоръчителния диапазон на дебелина на пластира.
    compatible_mouthpiece_type:
      name: Съвместим тип мундщук
      description: Посочва какъв тип мундщук/цевна част е предназначен да използва
        мелофонът (обикновено приемници за френски рог или тромпет, според модела).
    compatible_neck_profile_width:
      name: Съвместим профил/ширина на врата
      description: Посочва за какъв профил или ширина на грифа на китарата е предназначен
        каподастърът (напр. тесен гриф за електрическа китара срещу широк гриф за
        класическа китара).
    compatible_needle_size:
      name: Съвместим размер игла
      description: Посочва размерите/типовете игли, за които е предназначен калъфът
        (напр. игли за бродерия, гобленови игли, дължини на ръчни шевни игли).
    compatible_needle_system:
      name: Съвместима иглова система
      description: Иглена система, с която е съвместима машината (напр. 130/705H).
    compatible_parking_brake_mechanism:
      name: Съвместим механизъм на ръчната спирачка
      description: Посочва дали спирачният апарат е предназначен за работа с интегриран
        механизъм на ръчна/паркинг спирачка.
    compatible_pedal_instrument_type:
      name: Съвместим тип музикален инструмент с педал
      description: Посочва с какъв инструмент е предназначен да се използва педалът
        (напр. дигитално пиано, клавир/синтезатор, MIDI контролер).
    compatible_pedal_type:
      name: Съвместим тип педал
      description: Посочва стила или системата на педалите, за които е предназначена
        каишката или щипката (напр. платформени педали, SPD, Look Keo).
    compatible_pin_type:
      name: Съвместим тип щифт
      description: Посочва с какъв тип шипове е предназначена да се използва постелката
        (или дали поддържа шипове).
    compatible_pipe_filter_size:
      name: Съвместим размер на филтър за лула
      description: Посочва размера или стила на филтъра, който лулата е проектирана
        да приема (или че не е необходим филтър).
    compatible_plate_size:
      name: Съвместим размер пластина
      description: Размери на балистичните плочи или стандартизирани размери, които
        жилетката може да приема.
    compatible_play_vehicle_scale:
      name: Съвместим мащаб на превозните средства за игра
      description: Посочва мащаба на играчките/моделите, за който е предназначен аксесоарът
        (напр. 1:64), подобрявайки съвместимостта за колекционери и системи от писти.
    compatible_playing_surface:
      name: Съвместимост на игралното поле
      description: Посочва типа игрално поле или настилка, за които са предназначени
        обувките за американски футбол.
    compatible_pole_dimensions:
      name: Съвместими размери на стълб
      description: Посочва размера на напречното сечение на пръта/стълба, за който
        е съвместим аксесоарът.
    compatible_pole_shape:
      name: Съвместима форма на стълб
      description: Посочва формата на напречното сечение на стълба или колоната, за
        които е предназначена подложката.
    compatible_power_steering_system:
      name: Съвместимост с кормилната система
      description: Посочва за какъв тип кормилна система е предназначена течността.
    compatible_powerplant_type:
      name: Съвместим тип задвижващ двигател
      description: Посочва системата за задвижване на пневматичния пистолет за BB
        сачми, за която е предназначена частта (напр. пружинно-бутална, CO2, PCP).
    compatible_presser_foot:
      name: Съвместимо краче за шевна машина
      description: Посочва системата за закрепване/съвместимост на крачето за шевната
        машина (напр. щракващо или с винт; ниска, висока или наклонена опашка). Използвайте
        „Универсален/Множествен“, ако се поддържат няколко системи или са включени
        адаптери.
    compatible_protective_gear:
      name: Съвместима защитна екипировка
      description: Посочва с каква друга защитна екипировка е предназначена да работи
        шината за врат.
    compatible_protective_gear_integration:
      name: Съвместима интеграция със защитна екипировка
      description: Описва как протекторът е предназначен да се носи или интегрира
        с друга екипировка (напр. джоб за вложка, самостоятелно закрепване с каишки).
    compatible_punching_bag_type:
      name: Съвместим тип боксов чувал
      description: Посочва с какви стилове боксови или тренировъчни чували е съвместим
        продуктът.
    compatible_racing_discipline:
      name: Съвместима състезателна дисциплина
      description: Дисциплините в моторните спортове, за които е предназначена/сертифицирана
        каската.
    compatible_rc_scale:
      name: Съвместим мащаб за RC модели
      description: Посочва кое съотношение на мащаба за RC модели (напр. 1:10) е предназначен
        да пасва аксесоарът или частта.
    compatible_recorder_size:
      name: Съвместим размер блокфлейта
      description: Указва на кой размер на записващото устройство е проектиран да
        пасне калъфът.
    compatible_recorder_type:
      name: Съвместим тип блокфлейта
      description: Посочва с какъв тип блокфлейта (семейство/размер) е съвместим аксесоарът
        (напр. сопран, алт).
    compatible_reed_cut:
      name: Съвместим тип изрязване на тръстика
      description: Посочва с какъв тип изрязване на тръстиката е съвместима лигатурата
        (напр. френско изрязване с фаска или американско без фаска).
    compatible_reed_type:
      name: Съвместим тип тръстика
      description: Указва вида/среза на тръстиката, за който е предназначен мундщукът.
    compatible_reel_type:
      name: Съвместим тип макара
      description: Посочва за какъв стил риболовна макара е предназначена чантата,
        кутията или калъфът.
    compatible_refrigerant_type:
      name: Съвместим тип хладилен агент
      description: Посочва с какъв хладилен агент е предназначен да се използва изпарителят
        на климатика.
    compatible_ride_equipment:
      name: Съвместима екипировка за каране
      description: Видове спортна екипировка с колела, за които е предназначена рампата.
    compatible_roof_height:
      name: Съвместима височина на покрива
      description: Посочва за какъв профил на покрива е предназначен калъфът (стандартен
        срещу удължен/висок покрив).
    compatible_roof_rail_type:
      name: Съвместим тип покривни релси
      description: Посочва към каква конфигурация на покрива е предназначена да се
        закрепва системата за багажник.
    compatible_rope_count:
      name: Брой съвместими въжета
      description: Посочва за каква конфигурация на въжетата на боксовия ринг е предназначена
        частта, като рингове с 3 въжета, 4 въжета или универсален размер.
    compatible_rope_type:
      name: Съвместим тип въже
      description: Указва кои конструкции на въжета могат да се използват с устройството.
    compatible_saddle_type:
      name: Съвместим стил седло
      description: Посочва стила на седлото или ездаческата дисциплина, за която е
        предназначен аксесоарът, с цел осигуряване на съвместимост между английски,
        уестърн и други видове седла.
    compatible_saxophone_size:
      name: Съвместим размер на саксофона
      description: Посочва с какъв размер саксофон е съвместим продуктът (напр. сопран,
        алт, тенор).
    compatible_saxophone_type:
      name: Съвместим тип саксофон
      description: Посочва за кой саксофон е предназначена лигатурата/капачката.
    compatible_scale_length:
      name: Съвместима дължина на мензурата
      description: Посочва за какъв диапазон на мензурата на китарата са предназначени
        струните (напр. къса мензура, стандартна, баритон).
    compatible_seat_airbag:
      name: Съвместима въздушна възглавница на седалката
      description: Посочва дали седалката поддържа/включва странични въздушни възглавници
        или е съвместима с превозни средства, оборудвани с въздушни възглавници, вградени
        в седалката.
    compatible_seating_capacity:
      name: Съвместим капацитет на местата
      description: Посочва за какъв брой места или конфигурация е предназначен аксесоарът.
    compatible_sensor_port_type:
      name: Съвместим тип порт за сензор
      description: Посочва дали масленият картер поддържа сензори за ниво и/или температура
        на маслото и какъв е типът на порта, ако е приложимо.
    compatible_shifter_type:
      name: Съвместим тип скоростен лост
      description: Посочва типа или конфигурацията на скоростния лост, за който е
        предназначен маншонът на скоростния лост.
    compatible_shis:
      name: Съвместим SHIS
      description: Изброява кодовете по стандартизираната система за идентификация
        на чашките (SHIS), с които частта е съвместима (напр. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Съвместимост с дисциплината на кънки
      description: Посочва за каква дисциплина по кънки е предназначена частта или
        аксесоарът.
    compatible_snowshoe_deck_type:
      name: Съвместим тип платформа на снегоходки
      description: Посочва с какъв тип рамка или платформа на снегоходки е съвместимо
        закрепването.
    compatible_special_effects_lighting_features:
      name: Съвместими функции за сценично/ефектно осветление
      description: Подчертава често срещани функционални възможности, важни при избора
        на ефектно осветление (освен цвят/шарка), като свързване на устройства или
        реакция на звук.
    compatible_spinning_wheel_drive_system:
      name: Съвместима система за задвижване на предачно колело
      description: Посочва кои системи за задвижване на въртялото колело са поддържани
        от аксесоара.
    compatible_spoke_gauge:
      name: Съвместим калибър на спиците
      description: Посочва размерите (калибъра) на спиците, с които резбата на нипела
        е съвместима, за да се осигури правилно съчетаване между спици и нипели.
    compatible_steering_wheel_airbag:
      name: Съвместима въздушна възглавница на волана
      description: Посочва дали воланът поддържа запазване на OEM модул на въздушната
        възглавница (или е предназначен за приложения без airbag).
    compatible_steering_wheel_control_button:
      name: Съвместим бутон за управление на волана
      description: Посочва съвместимостта с фабрични бутони на волана (аудио, круиз
        контрол, телефон) и свързаното окабеляване.
    compatible_stencil_material:
      name: Съвместим материал на шаблона
      description: Материали, от които машината може да изработва шаблони или да обработва
        (напр. хартия, пластмасово фолио, майлар).
    compatible_stencil_media_format:
      name: Съвместим формат на носителя за шаблони.
      description: 'Посочва кои формати носители за шаблони поддържа машината: листове,
        ролки или и двете.'
    compatible_strap_retractor:
      name: Съвместим механизъм за прибиране на колан
      description: Посочва дали коланът е съвместим с прибиращи механизми или е предназначен
        за неприбиращи се (статични) колани.
    compatible_string_instrument_finish:
      name: Съвместимо покритие на струнен инструмент
      description: Посочва за какви видове покрития на инструменти е безопасен за
        употреба полиращият препарат.
    compatible_substrate_material:
      name: Съвместим материал на основата
      description: Посочва към какви повърхностни материали е формулирана боята да
        прилепва.
    compatible_surface:
      name: Съвместима повърхност
      description: Посочва за каква повърхност/материал е предназначено велкро лепилото.
    compatible_surface_material:
      name: Съвместим материал за повърхността
      description: Посочва върху какви материали на автомобилни повърхности е предназначен
        продуктът да се използва.
    compatible_tear_off_system:
      name: Съвместима система за сваляне
      description: Посочва дали очилата поддържат системи за откъсващи се или навиващи
        се ленти, включително дали имат монтажни елементи за откъсване.
    compatible_thermostat_type:
      name: Съвместим тип термостат
      description: Посочва дали водният фланец/корпус е проектиран да приема термостат
        и ако да — какъв тип/размер.
    compatible_thread:
      name: Съвместима резба
      description: Посочва какви видове конец/прежда може да поема уредът за промушване,
        според дебелина и тип.
    compatible_thread_spool_format:
      name: Съвместим формат на конеца/макарата
      description: Посочва какви формати конци е предназначена да съхранява кутията
        (калерки, шпули, конуси, бобини/картички за бродерия и др.).
    compatible_thread_yarn_tool:
      name: Съвместим инструмент за конци и прежда
      description: Съвместимост на машина/система за инструменти, които се монтират
        към или се използват с друго оборудване (напр. шевна машина, оверлог, тъкачен
        стан, предачно колело).
    compatible_tire_application:
      name: Съвместимо приложение на гумите
      description: Посочва за какъв сегмент гуми/джанти е предназначен инструментът
        за разбиване на борда на гумата (според обслужваната гума/джанта, а не модела
        на превозното средство).
    compatible_tom_pad_mounting:
      name: Съвместим монтаж на том-пад
      description: Посочва към какъв монтаж се закрепя електронният том-том (напр.
        скоба/рамо, L-рамо, стойка), което определя дали ще пасне към съществуващи
        системи за стойки.
    compatible_toy_vehicle_scale:
      name: Съвместим мащаб на превозното средство за игра
      description: Посочва мащаба на играчките превозни средства или приблизителния
        размер на превозното средство, с които комплектът за игра е съвместим.
    compatible_tpms_sensor_type:
      name: Съвместим тип TPMS сензор
      description: Посочва дали джантата поддържа TPMS сензори и/или какъв тип вентил/сензор
        е необходим.
    compatible_training_equipment:
      name: Съвместимо тренировъчно оборудване
      description: Посочва видовете тренировъчно или фитнес оборудване, които могат
        да се закрепват към стойката.
    compatible_treadmill_design:
      name: Съвместим дизайн на пътека за бягане
      description: Посочва типа конструкция на бягащата пътека, с която аксесоарът
        е съвместим, например сгъваема или несгъваема.
    compatible_tube:
      name: Съвместима вътрешна гума
      description: Посочва за каква конструкция на вътрешната гума или гумата е предназначена
        лепенката, например бутил, латекс, TPU или безкамерна гума.
    compatible_valve_type:
      name: Съвместим тип клапан
      description: Посочва с какъв тип месингов вентил е съвместима смазката.
    compatible_vaporizing_material:
      name: Съвместим материал за изпаряване
      description: Посочва какви типове материали е предназначено устройството да
        изпарява.
    compatible_vehicle_windshield_fluid:
      name: Съвместима течност за чистачки
      description: Твърдения за съвместимост, свързани с оборудване на превозното
        средство или обработки на стъклото (напр. безопасно за водоотблъскващи покрития,
        безопасно за системи за измиване на фарове).
    compatible_visor_system:
      name: Съвместима система за визьор
      description: Посочва с какви типове системи за визьор/вложка е съвместима мотоциклетната
        каска.
    compatible_water_board_type:
      name: Съвместим тип водна дъска
      description: Посочва какви дъски за водни спортове е предназначен да превозва
        багажникът.
    compatible_water_sport_board_type:
      name: Съвместим тип дъска за водни спортове
      description: Изброява типовете дъски, които багажникът е предназначен да транспортира.
    compatible_watercraft_communication_standard:
      name: Съвместим комуникационен стандарт за плавателни съдове
      description: Посочва поддържаните морски комуникационни/мрежови стандарти или
        интеграционни протоколи за съвместимост с бордовата електроника.
    compatible_watercraft_engine_type:
      name: Съвместим тип двигател на плавателни съдове
      description: Посочва за каква конфигурация на задвижването е предназначена частта
        (извънбордов двигател / вътрешен двигател / колонно задвижване / водометно
        задвижване).
    compatible_weight_plate_diameter:
      name: Съвместим диаметър на тежест за щанга
      description: Указва какви диаметри на тежестите машината приема.
    compatible_wheel_finish:
      name: Съвместимо покритие на джанта
      description: Посочва за какви покрития/материали на джанти почистващият препарат
        е безопасен за употреба (според производителя).
    compatible_whorl_drive_band_type:
      name: Съвместим тип ремък за предачно колело
      description: Указва с кой стил на задвижваща лента е предназначен да работи
        въртележката.
    compatible_wick_series:
      name: Съвместима серия фитили
      description: Посочва стандартните серии/типове фитили, за които е предназначена
        пластината, ако са посочени от продавача.
    compatible_winder_head_bit:
      name: Съвместима глава/накрайник на навивачката
      description: Посочва какъв тип интерфейс на ключа/главата за навиване поддържа
        навивачката (напр. шлицова глава, сменяеми накрайници, универсална глава).
    compatible_windlass_rode:
      name: Съвместим котвен канат за шпил
      description: Посочва какъв тип котвен канат е предназначен да обслужва шпилът.
    compatible_windshield_type:
      name: Съвместим тип предно стъкло
      description: Посочва с каква конфигурация на предното стъкло е предназначен
        да работи корпусът/кабината.
    compatible_wood:
      name: Съвместима дървесина
      description: Посочва за какви видове дърво на грифа е препоръчителен/безопасен
        полиращият препарат.
    compatible_writing_surface:
      name: Съвместима повърхност за писане
      description: Посочва повърхностите/хартии, за които мастилото е предназначено
        и работи най-добре.
    compatible_zipper_size:
      name: Съвместим размер на ципа
      description: 'Посочва за какъв размер цип е предназначен плъзгачът (често означаван
        като #3, #5, #8, #10), което улеснява филтрирането по съвместимост.'
    compliance_certification:
      name: Сертификат за съответствие
      description: Стандарти за съответствие/одобрение, покривани от LED бара за употреба
        на пътя и електромагнитна съвместимост.
    component_position:
      name: Позиция на компонента
      description: Посочва относителната позиция на частта в ангренажния механизъм
        на двигателя (напр. преден срещу заден капак, горен срещу долен). Не се отнася
        до предно/задно разположение на превозното средство.
    concentration_level:
      name: Ниво на концентрация
      description: Качествено указание колко концентрирано е доматеното пюре (единична,
        двойна, тройна концентрация), полезно за съответствие с изискванията на рецептата.
    concentration_type:
      name: Тип концентрация
      description: Посочва дали продуктът е готов за употреба или е концентрат и (ако
        е концентрат) указанията за типично разреждане.
    concert_bass_drum_mounting_stand_type:
      name: Тип стойка/монтаж за концертен бас барабан
      description: Посочва как концертният бас барабан се поддържа или монтира за
        изпълнение.
    concert_pitch_standard:
      name: Стандарт за концертен строй
      description: Посочва концертния референтен тон (A4), на който пианото е настроено
        при продажба (напр. A440, A442, A444).
    condiment_form:
      name: Форма за подправки
      description: Показва физическата форма или консистенция на продукта от хрян
        (напр. паста, прах, крем).
    condiment_texture:
      name: Текстура на подправка/сос
      description: Описва текстурата на соса/разядката (напр. с парченца или гладка).
    confetti_format:
      name: Формат на конфети
      description: Посочва формата на конфетите според начина на опаковане или изстрелване
        (напр. насипни за разпръскване или в попъри/топове).
    conga_head_tensioning_system:
      name: Система за обтягане на кожата на конга
      description: Тип на обкова за опъване/настройка на кожата на конгата (напр.
        традиционни обтегачи с винтове или модерни бързи механизми за настройка).
    conga_set_included_drum_types:
      name: Комплектът конга включва видове барабани
      description: Посочва какви типове конга са включени в комплекта (напр. quinto
        + conga + tumba).
    connector_case_style:
      name: Стил на корпуса на конектора
      description: Класифицира общия конструктивен стил на кутията за конектори (напр.
        твърд корпус срещу мек калъф), за да отрази нивото на защита и преносимост.
    console_cover_installation_method:
      name: Метод за монтаж на конзолния капак
      description: Посочва как калъфът за конзолата се закрепва към подлакътника/конзолата
        (напр. нахлузващ се, с ластични ленти, велкро, лепящ се или с щипки).
    console_display_type:
      name: Тип дисплей на конзолата
      description: Посочва стила на потребителския дисплей на устройството (напр.
        LCD, LED, сензорен екран).
    construction_design:
      name: Дизайн на конструкцията
      description: Посочва от колко шарнирни/съставни части е изработен протекторът,
        което влияе на подвижността (напр. еднокомпонентен, трикомпонентен).
    contact_angle:
      name: Контактен ъгъл
      description: Посочва контактния ъгъл на лагерните писти, изразен като единичен
        ъгъл или двойка ъгли (напр. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Тип пълнеж на жонгльорска топка за контактно жонглиране
      description: Посочва дали топката е плътна или пълнена (и какъв е видът на пълнежа),
        което влияе върху разпределението на теглото и издръжливостта.
    contact_juggling_ball_transparency:
      name: Прозрачност на жонгльорска топка за контактно жонглиране
      description: Посочва прозрачността/оптичния вид на топката.
    contact_surface_material:
      name: Материал на контактната повърхност
      description: Посочва материала, използван в контактните точки, които докосват
        инструмента (напр. корк/гума), за да се предотврати надраскване и да се подобри
        сцеплението.
    container_material:
      name: Материал на контейнера
      description: Посочва основния материал на търговската опаковка/контейнер на
        продукта (напр. стъкло, PET пластмаса, алуминий).
    contaminant_removal:
      name: Премахване на замърсители
      description: Изброява класовете замърсители, които продуктът е сертифициран
        да премахва или намалява.
    contra_alto_clarinet_body_configuration:
      name: Конфигурация на корпуса на контра-алт кларинет
      description: Описва физическата конструкция/форма на контра-алт кларинета (напр.
        прав или сгънат дизайн).
    contra_alto_clarinet_lowest_note_extension:
      name: Разширение на най-ниския тон на контра-алт кларинет
      description: Посочва най-ниския изпълним тон на инструмента (разширението на
        механиката за ниски тонове), което обикновено се използва за разграничаване
        на модели с ниско ми бемол, ниско ре или ниско до.
    contra_bass_clarinet_bell_type:
      name: Тип камбана на контрабас кларинет
      description: Конфигурация на камбаната, използвана на контрабас кларинета.
    contra_bass_clarinet_bore_type:
      name: Тип отвор на контрабаса
      description: Конструкция на канала на инструмента.
    contra_bass_clarinet_lowest_written_note:
      name: Най – ниската написана нота на контрабаса
      description: Най-ниската написана нота, която инструментът може да изсвири (често
        зависи от разширението за ниско до спрямо ниско ми).
    control_arm_bushing_material:
      name: Материал на втулките на носача
      description: Указва материала на включените/монтираните втулки, ако има такива.
    control_arm_bushings_included:
      name: Включени втулки за носач
      description: Посочва дали носачът се доставя с предварително монтирани втулки.
    control_arm_finish:
      name: Покритие на носача
      description: Посочва защитното покритие, нанесено върху носача (за защита от
        корозия и външен вид).
    control_arm_grease_fitting_type:
      name: Тип гресиращ нипел на носача
      description: Посочва дали възелът носач/шарнир включва гресиращ нипел (zerk)
        и дали подлежи на обслужване.
    control_arm_material:
      name: Материал на носача
      description: Посочва основния материал и производствената конструкция на тялото
        на носача.
    control_arm_position:
      name: Позиция на носача
      description: Посочва позицията в окачването, за която е предназначен носачът,
        в контекста на разположението спрямо оста/страната (напр. горен/долен, преден/заден,
        ляв/десен).
    control_arm_style:
      name: Стил на носача
      description: Определя геометричния/конструктивния стил на носача, използван
        в конфигурацията на окачването.
    control_cable_connector_type:
      name: Тип конектор на контролния кабел
      description: Посочва типа накрайник/конектор, използван от управляващото жило(а)
        за свързване с управлението и двигателя (напр. накрайници по OEM стандарт).
    control_voltage_or_gate_connectivity:
      name: Управляващо напрежение или свързване към управляващ вход
      description: Посочва поддръжката на връзка за контролно напрежение/гейт за интеграция
        с модулна/аналогова техника.
    controller_function:
      name: Функция на контролера
      description: Определя основната функция на контролната платка за бягаща пътека,
        като управление на двигателя, захранване или инверторно задвижване.
    controller_type:
      name: Тип контролер
      description: Посочва контролера на двигателя/управляващата система, включена
        в комплекта за конверсия на електрически скутер (или необходима за използване),
        с акцент върху характеристиките, важни за съвместимост и производителност.
    conversion_kit_cooling_method:
      name: Метод за охлаждане на конверсионен комплект
      description: Основният подход за термично управление, използван при интеграцията
        на мотора/инвертора/батерията.
    conversion_kit_installation_complexity:
      name: Посочва сложността на монтажа на комплекта за конверсия
      description: Очаквано ниво на трудност при монтажа според типичните умения/инструменти,
        необходими на клиента.
    converted_bed_size:
      name: Размер на разгънатото легло
      description: Посочва размера или конфигурацията на леглото, в което се трансформира
        бебешкото креватче след монтаж на този комплект.
    convertible_configuration:
      name: Конфигурация с преобразуване
      description: Посочва в колко различни конфигурации може да се преобразува продуктът
        (напр. бебешко легло 3-в-1 → детско легло → кушетка).
    convertible_high_chair_modes:
      name: Режими на трансформируеми високи столчета за хранене
      description: Посочва в какви конфигурации за сядане може да се преобразува столът.
    cookie_decorating_kit_items_included:
      name: Включени елементи в комплекта за декориране на бисквити
      description: Посочва отделните елементи за декорация, включени в комплекта,
        за да се знае точно какви материали съдържа кутията (напр. тубички с глазура,
        поръски, формички за бисквити).
    cookie_variety:
      name: Разнообразие от бисквитки
      description: Посочва конкретния стил или разновидност на бисквитите, помагайки
        на купувачите бързо да намерят предпочитания тип.
    cooking_state:
      name: Състояние на готвене
      description: Посочва степента на готовност на пилешкия продукт при продажба
        (суров, напълно сготвен, маринован и т.н.).
    coolant_additive_purpose:
      name: Предназначение на добавката за охладителна течност
      description: Основна предназначена функция на добавката за охлаждаща течност
        (не препарат за промиване на радиатор или специализиран уплътнител).
    coolant_base_fluid:
      name: Базова течност за охлаждаща течност
      description: Посочва основния гликолов компонент, използван във формулата на
        антифриза/охладителната течност.
    coolant_outlet_connection_style:
      name: Стил на връзката на изхода за охлаждащата течност
      description: Тип интерфейс на изходящото съединение, използван за свързване
        на радиаторен маркуч или тръба за охладителна течност.
    coolant_outlet_neck_angle:
      name: Ъгъл на изходящия щуцер за охладителна течност
      description: Ъгълът/ориентацията на изхода на водния щуцер спрямо монтажния
        фланец/двигателя (полезно при прокарване на горния радиаторен маркуч).
    coolant_technology:
      name: Технология на охладителната течност
      description: Посочва химичния състав/технологичното семейство на антифриза/охладителната
        течност (както обикновено е означено на опаковката).
    coolant_temperature_sensor_port:
      name: Порт за сензори за температура на охлаждащата течност
      description: Посочва дали водният щуцер включва порт за датчик или превключвател
        за температурата на охладителната течност и какъв интерфейс използва.
    coolant_temperature_sensor_seal_type:
      name: Тип уплътнение на сензора за температура на охладителната течност
      description: Тип уплътняване, използван между датчика и двигателя/канала за
        охладителната течност.
    cooling_system_component_included:
      name: Включен компонент за охладителната система
      description: Посочва допълнителните компоненти на охладителната система, включени
        с водната помпа.
    cooling_system_flush_application_step:
      name: Етап на промиване на охладителната система
      description: Посочва къде се вписва продуктът в сервизния процес (напр. почистващ
        препарат преди промивка срещу финално изплакване/неутрализатор).
    cooling_system_type:
      name: Тип на охладителната система
      description: Посочва конфигурацията на охладителната система, използвана от
        вътрешен морски двигател (напр. сурова вода/отворен кръг, затворен кръг/сладка
        вода с топлообменник, килово охлаждане).
    cord_material:
      name: Материал на кордата
      description: Посочва материала на връвта/кордата, използвана за издърпване на
        тампона през саксофона.
    core_type_bass_strings:
      name: Тип сърцевина (бас струни)
      description: Посочва формата на сърцевината на струната, която влияе върху усещането
        и гъвкавостта.
    cork_grease_base_material:
      name: Основен материал на корковата грес
      description: Основната база на формулата на корковата грес (напр. на основата
        на ланолин).
    cork_grease_form:
      name: Форма на корковата грес
      description: Физическата форма на продукта коркова грес.
    corn_presentation:
      name: Представяне на царевица
      description: Указва физическото представяне или формата на царевичния продукт
        (напр. цял с люспа, зърна, прах).
    corn_syrup_variety:
      name: Разновидност на царевичен сироп
      description: Посочва конкретния стил или вариант на обработка на сиропа.
    corn_variety:
      name: Сорт царевица
      description: Посочва конкретния ботанически или пазарен сорт царевица, който
        се продава, позволявайки на купувачите да различават типове според вкус, текстура,
        цвят и кулинарна употреба.
    corner_compatibility:
      name: Съвместимост с ъгъла
      description: Посочва формата на ъглите на масата (прави или заоблени), за която
        е предназначен покривалото.
    corner_flag_features:
      name: Характеристики на ъгловия флаг
      description: Подчертава специални функционални характеристики или подобрения
        на ъгловия флаг (напр. сгъваем прът, светлоотразителен материал).
    cornet_mouthpiece_shank_type:
      name: Тип мундщук на мундщука за корнет.
      description: Посочва стандарта на гнездото/шейката за мундщук, поддържан от
        корнета за съвместимост.
    cornhole_league_certification:
      name: Сертификация за cornhole лига
      description: Посочва официални сертификати или одобрения от лиги, на които продуктът
        отговаря.
    corrosion_resistance:
      name: Устойчиво на корозия
      description: Посочва обработката или степента на устойчивост на корозия на стойката/държача
        за употреба на открито.
    corrosion_resistance_level:
      name: Ниво на устойчивост на корозия
      description: Посочва защита от корозия, подходяща за сладководна/соленоводна
        среда.
    costume_components_included:
      name: Включени компоненти на костюма
      description: Посочва облеклата и аксесоарите, включени в костюма, за да се уточни
        какво съдържа комплектът.
    cotton_weave_type:
      name: Вид памучно тъкане
      description: Посочва структурата на тъкане/плетене на памучната повърхност за
        печат, която влияе върху текстурата и остротата на печата.
    counter_type:
      name: Тип брояч
      description: Посочва наличието и типа на вградено проследяване на повторения
        или сила.
    counterweight_fill_material:
      name: Материал за пълнеж на противотежест
      description: Посочва веществото, което може да се използва за добавяне на баласт
        или предварително запълване на противотежестта.
    counterweight_type:
      name: Тип противотежест
      description: Посочва дизайна или конструктивния стил на противотежестта, като
        чувал с пясък или стоманена плоча, за улесняване на съвместимостта и монтажа.
    coupler_system:
      name: Система за съединяване
      description: Тип/система на куплунга, монтиран на моделния локомотив за съвместимост
        с подвижния железопътен състав.
    court_surface_suitability:
      name: Подходящост на настилката на корта
      description: Посочва повърхността на баскетболното игрище, за която е проектирана
        подметката на обувката, с цел избор на подходящо сцепление и издръжливост
        за закрити дървени настилки, външни асфалт/бетон или и двете.
    cover_fit_style:
      name: Тип на прилягане на покривалото
      description: Описва начина, по който покривалото прилепва към масата, като влияе
        върху външния вид и нивото на защита.
    cover_fit_type:
      name: Тип прилягане на калъфа/покривалото
      description: Посочва дали покривалото е ушито по мярка (индивидуално или полуиндивидуално)
        или универсално, както и дали е предназначено за покриване във вода (на котва/акостиране)
        или за съхранение/транспорт на ремарке.
    cowbell_beater_type:
      name: Тип палка за каунбел
      description: Препоръчителен тип палка/ударен инструмент за каунбела (ако е посочено
        от продукта).
    cowbell_mounting_method:
      name: Метод на монтаж на звънеца
      description: Как е предназначен да се монтира/използва каунбелът (ръчно или
        монтиран към стойка/хардуер).
    cowbell_sound_character:
      name: Звуков характер на звънеца
      description: Обща тонална характеристика, използвана в продуктовите обяви (подпомага
        откриването отвъд размера).
    cradle_capacity:
      name: Капацитет на люлката
      description: Показва дали люлката е предназначена за едно бебе или близнаци.
    craft_cutter_embosser_machine_operation:
      name: Начин на работа на машина за рязане/релефно щамповане за ръчно изработване
      description: Посочва как работи резачката/машината за релеф от гледна точка
        на потребителския процес (напр. ръчна манивела, електрически бутон, управление
        чрез приложение).
    craft_decoration_maker_accessories_included:
      name: Включени аксесоари за машина за декоративни проекти
      description: Изброява основните аксесоари, включени към машината за декоративни
        проекти (напр. стартова лента/фолио, резервни стикери, касети с брокат, инструменти
        за почистване).
    craft_foil_application_method:
      name: Метод на нанасяне на фолио при ръчна изработка
      description: Посочва как е предназначено да се прилага/активира декоративното
        фолио (лепило, топлина, тонер-реактивно и т.н.).
    craft_foil_format:
      name: Формат на декоративното фолио
      description: Посочва физическия формат, в който се продава декоративното фолио
        (напр. ролка или листове).
    craft_glue_finish:
      name: Финален ефект на лепилото при ръчна изработка
      description: Описва външния вид на лепилото след изсъхване (напр. прозрачно,
        бяло/непрозрачно, полупрозрачно, гланцово/матово).
    craft_magnet_application:
      name: Приложение на декоративен магнит
      description: Основното предназначение или монтажна повърхност за магнитния продукт
        за декоративни проекти.
    craft_magnet_holding_strength_level:
      name: Ниво на сила на задържане на декоративен магнит
      description: Относителна категория на сила на занаятчийските магнити, която
        помага при избора на подходяща сила на задържане за проекта.
    craft_organizer_storage_features:
      name: Функции за съхранение в органайзера за ръчна изработка
      description: Описва организационните функции и вътрешните елементи за съхранение
        на органайзери за декоративни проекти (напр. регулируеми разделители, чекмеджета,
        прозрачни джобове).
    craft_scoring_board_included_accessories:
      name: Включени аксесоари към дъската за биговане при ръчна изработка.
      description: Включени аксесоари към дъската за биговане (напр. инструмент за
        биговане, биговаща пръчица/костен сгъвач, триъгълник, инструмент за пликове).
    craft_scoring_board_measurement_system:
      name: Измервателна система на дъската за биговане при ръчна изработка.
      description: Посочва измервателната система, отбелязана върху дъската за биговане
        (имперска, метрична, двойна или без маркировка).
    craft_wire_finish_coating:
      name: Финиш/покритие на занаятчийската тел
      description: Посочва повърхностното покритие или финиш на телта, използван за
        цвят, защита от потъмняване или допълнителна защита.
    craft_wood_surface_preparation:
      name: Подготовка на дървесната повърхност при ръчна изработка
      description: Посочва дали дървената повърхност е готова за финишна обработка/боядисване
        или изисква подготовка (напр. шлайфане/грундиране).
    crank_spindle_interface:
      name: Интерфейс на манивелния шпиндел
      description: Посочва системата на манивелния шпиндел, която средното движение
        поддържа (напр. SRAM DUB, квадратен конус), за да се осигури съвместимост
        между курбелите и средното движение.
    crankshaft_balance_type:
      name: Тип балансировка на коляновия вал.
      description: Посочва дали коляновият вал е вътрешно балансиран (неутрален) или
        външно балансиран (изисква хармоничен балансьор/тежести на маховика).
    crankshaft_bolt_pattern:
      name: Модел на болтовете на коляновия вал
      description: Разположение на болтовете на задния фланец за закрепване на маховик/гъвкава
        плоча.
    crankshaft_sensor_reluctor_type:
      name: Тип на релукторния елемент на сензора на коляновия вал
      description: Конфигурация на импулсния/релукторния диск за датчика на коляновия
        вал (където е приложимо).
    craps_accessories_included:
      name: С включени аксесоари за крапс
      description: Посочва допълнителните аксесоари за игра на крапс, включени извън
        заровете, чиповете и игралното поле.
    crash_cymbal_profile:
      name: Профил на crash чинел
      description: Общата извивка/профил на чинела (колко изразен е куполът), влияеща
        върху тона и реакцията.
    crash_cymbal_sound_character:
      name: Звуков характер на краш чинела
      description: Основни описателни характеристики на тембъра на креш чинела.
    crash_pad_size_class:
      name: Клас размер на предпазен катерачен дюшек
      description: Посочва общата категория размер на катерачния дюшек, давайки бърза
        представа за покриваната площ без нужда от точни размери.
    crate_engine_assembly_level:
      name: Степен на сглобеност на двигателен комплект
      description: Степен на комплектност на двигателя в кутия при доставка (кои основни
        компоненти са включени).
    cream_base_ingredient:
      name: Основен компонент на сметаната
      description: Посочва основния източник на сметаната, включително млечни и растителни
        алтернативи.
    cream_cheese_base:
      name: Форма/текстура на крем сиренето
      description: Посочва основния млечен или растителен източник, използван за производство
        на крема сиренето, за да помогне при избор според диетични изисквания, алергии
        и вкусови предпочитания.
    cream_cheese_form:
      name: Форма на крема сиренето
      description: Описва физическата форма или текстурата на крем сиренето (напр.
        блок, разбито, дип), което влияе върху начина на мазане и употребата.
    cream_variety:
      name: Разновидност на сметаната
      description: Посочва конкретния тип сметана според маслеността, обработката
        или кулинарната употреба.
    crib_accessory_features:
      name: Характеристики на аксесоари за бебешкото легло
      description: Посочва функционалните или комфортни характеристики на аксесоарите
        за бебешки и детски легла, като дишане или еластични краища.
    crib_bumper_features:
      name: Характеристики на предпазителя за бебешко легло
      description: Подчертава специалните функционални характеристики на протекторите
        за бебешко легло.
    crib_conversion_kit_components:
      name: Компоненти на комплект за преобразуване на бебешко легло
      description: Изброява основните части, включени в комплекта, за да могат купувачите
        да проверят дали имат всичко необходимо за монтажа.
    cricket_ball_grade:
      name: Клас/ниво на крикет топка
      description: Посочва нивото на качество или предназначения стандарт на игра
        на топката.
    cricket_ball_piece_construction:
      name: Конструкция на крикет топка
      description: Посочва броя на външните панели или формованите секции, използвани
        за изработката на обвивката на топката — ключов показател за качество и цена.
    cricket_ball_type:
      name: Тип топка за крикет
      description: Посочва типа крикет топка, включена към продукта, или дали не е
        включена топка.
    cricket_bat_accessory_type:
      name: Тип аксесоар за крикет бухалка
      description: Посочва типа аксесоар или консуматив за поддръжка на крикет бухалка,
        за да могат купувачите бързо да намерят нужния продукт.
    cricket_bat_size:
      name: Размер на крикет бухалка
      description: Посочва стандартизирания размер на крикет бухалката (0–6, Harrow,
        SH, LH), обикновено избиран според възрастта и ръста на играча.
    cricket_bat_size_compatibility:
      name: Съвместимост с размер на бухалка за крикет
      description: Посочва размерите на бухалките, за които е предназначен аксесоарът,
        за да се осигури правилна съвместимост.
    cricket_helmet_role:
      name: Роля на крикет каска
      description: Посочва игровата роля, за която е предназначена каската, като batting
        или wicket-keeping.
    cricket_leg_guard_type:
      name: Тип предпазител за крак при крикет
      description: Описва конкретния тип протектор за крака в крикет.
    cricket_player_role:
      name: Роля на крикет играч
      description: Посочва основната игрова роля, за която са предназначени обувките.
    cricket_protection_grade:
      name: Ниво/степен на защита за крикет екипировка
      description: Посочва класа на защитата, определен от производителите на крикет
        екипировка.
    cricket_stump_base_type:
      name: Тип основа на стълбовете за крикет
      description: Посочва основния стил или материал, включен към колчетата, влияещ
        върху стабилността и пригодността към игралната настилка.
    cricket_stump_target_features:
      name: Характеристики на целеви колчета за крикет
      description: Описва отличителни функционални характеристики, които подобряват
        удобството при тренировка, видимостта, издръжливостта или стабилността.
    cricket_stump_type:
      name: Тип колчета за крикет
      description: Категоризира стила или конструкцията на крикет стумпите, за да
        се улесни изборът между традиционни състезателни, тренировъчни или модерни
        осветени модели.
    cricket_training_focus:
      name: Тренировъчен фокус по крикет
      description: Основна крикет дисциплина или умение, за което е предназначен тренировъчният
        уред.
    croquet_set_components_included:
      name: Включени компоненти на комплект за крокет
      description: Посочва всички основни компоненти, включени в комплекта (напр.
        уикети, колчета, чанта за пренасяне), за да е ясно какво точно получава клиентът.
    cross_country_binding_system:
      name: Система за закрепване на ски за ски бягане
      description: Посочва стандарта за автомати за ски бягане, за който продуктът
        е пробит или с който е съвместим.
    cross_stitch_chart_symbol_type:
      name: Тип символи в схема за кръстат бод
      description: Как е представена схемата (символи, цветове или и двете).
    cross_stitch_finishing_type:
      name: Тип завършване за кръстат бод
      description: Предназначеният начин за завършване/експониране на завършения проект.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Механизъм за фиксиране на тъканта в рамка за гоблен/кръстат бод
      description: Посочва как платът се закрепва/опъва в рамката (напр. щипки, скоби,
        кабарчета), което влияе върху удобството при работа и съвместимостта с различни
        тъкани.
    cross_stitch_frame_included_components:
      name: Включени компоненти към рамка за кръстат бод
      description: Изброява какво е включено в комплекта (напр. само рамка срещу рамка
        + скоби + стойка), намалявайки неяснотите и връщанията.
    cross_stitch_frame_type:
      name: Тип рамка за кръстат бод
      description: Посочва конструкцията/типа на рамката за гоблен (как се фиксира
        тъканта), което влияе на удобството при работа и съвместимостта с различни
        проекти.
    cross_stitch_pattern_technique:
      name: Техника за модел на кръстат бод
      description: Техниката/стилът на кръстат бод, изискван от схемата.
    crossbar_shape_profile:
      name: Форма/профил на напречната греда
      description: Посочва аеродинамичната форма/профил на напречната греда
    crossbar_style:
      name: Стил на напречната греда
      description: Посочва конструктивния стил на лоста, разграничавайки твърди състезателни
        лостове от гъвкави или хибридни тренировъчни лостове.
    crossbow_type:
      name: Тип арбалет
      description: Посочва основния конструктивен тип на арбалета, като компаунд,
        с извити рамена или пистолетен. Стилът на конструкция определя характеристиките
        на представяне, размера и предназначението, затова клиентите често го използват
        като филтър при избор.
    crossover_component_type:
      name: Тип на кросоувър компонента
      description: Посочва основната топология на компонентите, използвани в пасивната
        кросоувър мрежа.
    crossover_configuration:
      name: Конфигурация на кросоувъра
      description: Посочва дали кросоувърът използва една или повече разделителни
        честоти (напр. 2-пътен или 3-пътен дизайн).
    crossover_type:
      name: Тип кросоувър
      description: Тип кросоувър мрежа, включена към комплекта компоненти.
    crown_profile:
      name: Профил на короната
      description: Посочва височината/профила на горната част на шапката над периферията.
    crown_style:
      name: Стил на горната част на шапка
      description: Определя общия силует или профил на горната част на бомбе.
    crust_taste_profile:
      name: Профил на вкуса на кората
      description: Посочва дали естественият вкусов профил на кората е сладък, солен
        или неутрален.
    crystal_finish:
      name: Кристално покритие
      description: Описва повърхностния финиш, покритие или степен на обработка на
        необработения кристал (напр. суров, полиран, тумблиран, фасетиран, матиран,
        с аврора покритие, боядисан, термично обработен).
    crystal_material:
      name: Кристален материал
      description: Указва материала, използван за стъклото на часовника, защитаващо
        циферблата.
    crystalline_finish_style:
      name: Кристален завършек
      description: Характерният кристален/перест вид, образуван от палмовия восък
        в завършените свещи.
    cucumber_variety:
      name: Сорт краставица
      description: Посочва сорта или пазарната разновидност на краставицата (напр.
        английска, персийска, Kirby).
    cue_compatibility:
      name: Съвместимост с щеката
      description: Посочва конфигурацията на сглобката на щеката, за която е предназначен
        калъфът, като например цяла щека или щека със сглобка 3/4.
    cue_construction:
      name: Конструкция на щеката
      description: Посочва как е конструирана щеката — от колко части е или дали представлява
        частичен компонент, като само долна част или само горна част — което влияе
        върху преносимостта и съвместимостта.
    cue_head_material:
      name: Материал на главата на щеката
      description: Посочва материала на главата на щеката (частта, която контактува
        с шайбата), което влияе върху издръжливостта и защитата на повърхността.
    cue_sport_compatibility:
      name: Съвместим спорт с щека
      description: Посочва за кой спорт с щека е предназначен аксесоарът.
    cue_thread_size:
      name: Размер на резбата на щеката
      description: Посочва спецификацията на резбата, използвана при удължители, протектори
        за сглобки, тежести и други аксесоари за щеки, за да се гарантира правилно
        пасване.
    cue_tip_hardness:
      name: Твърдост на върха на щеката
      description: Оценява твърдостта на върха на щеката, която влияе върху контрола
        на топката и усещането при удар.
    cuff_height:
      name: Височина на маншета
      description: Посочва височината на маншета на обувката (нисък, среден, висок,
        подвижен/регулируем), което влияе върху опората и гъвкавостта.
    cuff_position:
      name: Позиция на маншета
      description: Посочва към коя част от тялото на сърфиста е предназначен да се
        закрепва каишката.
    cultivation_method:
      name: Метод на отглеждане
      description: Посочва как са отглеждани зеленолистните растения, включително
        техники на култивиране и земеделски практики.
    cup_type:
      name: Тип чашка
      description: Посочва профила на пайетата (плоски или вдлъбнати) и дълбочината
        на чашката, което може да влияе върху блясъка, текстурата и начина на закрепване
        чрез шиене или лепене.
    cupcake_size:
      name: Размер на мъфин
      description: Посочва физическата категория размер на продаваните кексчета (напр.
        мини, стандартни, jumbo).
    curd_size:
      name: Размер на изварата
      description: Посочва размера или текстурата на зърната на зърнистото сирене.
    cure_method:
      name: Метод на втвърдяване
      description: Описва процеса, необходим за втвърдяване или съхнене на лепилото
        (напр. UV светлина, влажност на въздуха, топлина).
    curing_or_preparation_method:
      name: Метод на обработка или подготовка
      description: Посочва как маслините са обработени или приготвени (напр. в саламура,
        сушени в масло, печени на грил).
    curling_broom_head_material:
      name: Материал на главата на метла за кърлинг
      description: Посочва основния материал на главата или подложката на метлата.
    curling_broom_head_type:
      name: Тип глава на метла за кърлинг
      description: Посочва стила или конструкцията на почистващата глава/подложка.
    curling_shoe_slider_material:
      name: Материал на плъзгача за обувка за кърлинг
      description: Посочва основния материал на плъзгащата подметка на обувките за
        кърлинг.
    curling_training_aid_type:
      name: Тип помощно средство за тренировка по кърлинг
      description: Посочва типа тренировъчно помощно средство за кърлинг.
    curry_variety:
      name: Разновидности къри
      description: Класифицира сосовете къри според конкретния стил или рецепта, за
        която са предназначени (напр. тикка масала, масаман, тайско зелено къри),
        за да се улесни изборът по вкус и тип кухня.
    cushion_rubber_profile:
      name: Профил на гумата на борда
      description: Код за форма или профил на гумените вложки на релсата
    cushioning_level:
      name: Ниво на омекотяване
      description: Посочва степента на омекотяване под стъпалото, осигурявана от чорапа
        за защита от удар и комфорт.
    custom_label_content_type:
      name: Тип съдържание на персонализирания етикет
      description: Посочва каква информация е персонализирана върху зашивния етикет
        (напр. име, лого, съобщение, размер, символи за поддръжка, контактна информация).
    customization_type:
      name: Тип персонализиране
      description: Посочва дали фланелката е без надпис, предоставена на играч или
        персонализирана с име и/или номер.
    cut_or_preparation_style:
      name: Стил на нарязване или подготовка
      description: Посочва как зеленчуците са нарязани или подготвени в консервата
        или буркана (напр. цели, на кубчета, пръчици).
    cut_resistance_rating:
      name: Степен на устойчивост на срязване
      description: Посочва официално тестваното ниво на устойчивост на срязване на
        продукта.
    cut_type:
      name: Тип разкрояване
      description: Посочва дали платът се продава на метър, като предварително изрязано
        парче или на ролка.
    cutting_application:
      name: Приложение за рязане
      description: Основно предназначение на ножиците при рязане.
    cutting_mat_grid_style:
      name: Стил на решетката (грид) на режещата подложка
      description: Стил на отпечатаните водачи върху повърхността на подложката.
    cutting_mat_intended_use:
      name: Предназначение на подложката за рязане
      description: Основното предназначение на режещата подложка за работа при ръчна
        изработка.
    cv_boot_clamp_type:
      name: Тип скоба за маншон на каре
      description: Посочва типа скоба/лента, използвана за фиксиране на маншона на
        карето.
    cv_boot_kit_contents:
      name: Съдържание на комплект за маншон на каре
      description: Посочва какво е включено с маншона на карето (напр. скоби, пакет
        грес, фиксиращи ленти).
    cv_boot_material:
      name: Материал на маншона за карданен вал
      description: Посочва основния материал, от който е изработен маншонът на карето.
    cv_boot_position:
      name: Позиция на маншона на карето
      description: Посочва дали маншонът е предназначен за вътрешното или външното
        каре на полуоската.
    cycling_apparel_fit:
      name: Кройка на велосипедно облекло
      description: Описва кройката на облеклото, включително степента на прилепване
        и аеродинамика (напр. състезателна, свободна).
    cylinder_head_assembly:
      name: Сглобка на цилиндровата глава
      description: Посочва степента на комплектност на цилиндровата глава при продажба
        (напр. напълно сглобена с монтирани компоненти на газоразпределителния механизъм
        или гола/несглобена отливка).
    cylinder_head_material_grade:
      name: Клас/марка на материала на цилиндровата глава
      description: Посочва материала и класа, използвани за отливането на цилиндровата
        глава.
    cylinder_head_position:
      name: Позиция на цилиндровата глава
      description: Посочва за коя страна/ред е предназначена цилиндровата глава при
        многоредови двигатели (напр. лява/дясна страна или ред 1/ред 2).
    cymbal_alloy:
      name: Сплав на чинела
      description: Сплав/състав на чинелите в комплекта.
    cymbal_application:
      name: Приложение на чинела
      description: Основното приложение, за което е предназначен/предлага се на пазара
        този чинел.
    cymbal_arm_mounting_interface:
      name: Интерфейс за монтаж на рамо за чинел
      description: Посочва как рамото за чинел се закрепва към останалия барабанен
        хардуер (напр. скоба, rack система, стойка).
    cymbal_arm_rotation_positioning_features:
      name: Функции за въртене/позициониране на рамото за чинел
      description: Посочва позициониращите механизми, които влияят върху ъгъла, въртенето
        и фиксирането на рамото.
    cymbal_arm_style:
      name: Стил на рамото за чинел
      description: Посочва дали рамото за чинел е право или тип „boom“, според предпочитанията
        за обхват и позициониране.
    cymbal_drum_case_wheel_configuration:
      name: Конфигурация на колелата на кейса за чинели и барабани
      description: Посочва дали калъфът има колела и ако е приложимо, конфигурацията
        на колелата за придвижване.
    cymbal_hammering_style:
      name: Стил на изчукване на чинела
      description: Описва процеса и външния вид на изчукването, които влияят върху
        сложността на звука и усещането при свирене.
    cymbal_kit_components_included:
      name: Включени компоненти в комплекта чинели
      description: Посочва кои видове чинели са включени в комплекта с райд чинел
        (в допълнение към самия райд чинел).
    cymbal_kit_items_included:
      name: Включени артикули в комплекта чинели
      description: Посочва кои чинели са включени в комплекта/пакета (по тип чинел).
    cymbal_lathing:
      name: Струговане на чинели
      description: Посочва дали и колко от повърхността на чинела е стругована (с
        канали) спрямо необработена/сурова.
    cymbal_playing_style_genre:
      name: Стил/жанр на свирене на чинели
      description: Посочва типичния контекст на изпълнение, за който са предназначени
        чинелите (напр. чинели за ориенталски танци срещу маршови/оркестрови ръчни
        чинели).
    cymbal_set_configuration:
      name: Конфигурация на комплекта чинели
      description: Посочва дали продуктът се продава като единичен чинел, съгласуван
        чифт или комплект от няколко чифта (напр. за групово обучение).
    cymbal_sound_character:
      name: Звуков характер на чинела
      description: Описва общия тонален профил/характер на звука на чинела (напр.
        ярък или тъмен) за по-лесно избиране.
    cymbal_sustain:
      name: Състейн на чинела
      description: Посочва колко дълго звучи чинелът след удар.
    cymbal_type:
      name: Тип чинел
      description: Посочва ролята на чинела, която електронният пад за чинел е предназначен
        да имитира.
    cymbal_volume_level:
      name: Ниво на сила на звука на чинела
      description: Категория на възприеманата сила/громкост на чинела.
    cymbal_weight_class:
      name: Клас на теглото на чинелите
      description: Посочва категорията тегло на чинела, която влияе върху тона, силата
        и реакцията при свирене.
    dairy_heat_treatment:
      name: Термична обработка на млечния продукт
      description: Посочва нивото на обработка или пастьоризация, приложено към сметаната
        (напр. сурова, пастьоризирана, UHT), което влияе върху срока на годност, вкуса
        и качествата при разбиване.
    damage_type:
      name: Вид щета
      description: Посочва какви видове повреди по предното стъкло е предназначен
        да ремонтира комплектът.
    damper_pedal_style:
      name: Стил на демпферен педал
      description: Стил на демпферен педалОписва физическия тип на демпферния педал,
        използван с електронни клавишни инструменти/дигитални пиана.
    damping_adjustability:
      name: Регулируемост на затихването
      description: Посочва кои параметри на амортисьора са регулируеми, свързани със
        затихването и/или височината на каране.
    damping_level:
      name: Ниво на затихване
      description: Посочва относителната степен на намаляване на силата на звука и
        състейна, която осигурява заглушителят.
    dance_occasion:
      name: Повод за танци
      description: Посочва предназначението на облеклото в контекста на танцовата
        практика или изпълнение.
    darbuka_accessories_included:
      name: С включени аксесоари за дарбука
      description: Изброява обичайните аксесоари, включени към дарбука.
    darbuka_body_finish_type:
      name: Тип завършек на корпуса на дарбука
      description: Описва външното покритие, завършек или декоративен вариант на пазарна
        стратегия на тялото на дарбука.
    darbuka_head_material:
      name: Материал на мембраната на дарбука
      description: Посочва материала на мембраната на дарбуката.
    dart_barrel_material:
      name: Материал на тялото на стреличката за дартс
      description: Посочва основния материал на тялото на стреличката, влияещ върху
        разпределението на теглото, издръжливостта и цената.
    dart_shaft_design:
      name: Дизайн на опашката на стреличката за дартс
      description: Класифицира механичния дизайн на вала, като например фиксиран,
        въртящ се, телескопичен или интегриран с полета/перки, което влияе на представянето
        и цената.
    dart_shaft_thread_type:
      name: Тип резба на опашката на стреличката за дартс
      description: Показва размера/типа, използван за завинтване на дръжката в цевта
        на стреличката, осигурявайки съвместимост между дръжката и цевите.
    dart_thread_size:
      name: Размер на резбата на стреличките
      description: Посочва стандарта/размера на резбата, с който частта е съвместима,
        за да се осигури съвместимост между опашки, върхове и тела.
    dart_tip_compatibility:
      name: Съвместимост на върха на стреличката за дартс
      description: Посочва дали частта е предназначена за стоманени върхове, пластмасови
        върхове или и за двата типа стрелички.
    dart_tip_connection_type:
      name: Тип свързване на върха на стреличката за дартс
      description: Описва спецификацията на резбата или монтажната система, чрез която
        върхът се закрепва към тялото или опашката на стреличката, осигурявайки съвместимост.
    dartboard_tournament_approval:
      name: Одобрение за състезателна употреба на дартс мишена
      description: Посочва дали дартс мишената е официално одобрена от конкретни федерации
        или лиги по дартс.
    dartboard_type:
      name: Тип мишена за дартс
      description: Класифицира дартс мишената според технологията на изработка и съвместимостта
        със стрелички (напр. влакнеста, електронна, магнитна).
    dash_cover_construction_type:
      name: Тип конструкция на капакът за арматурно табло
      description: Описва как е оформено/конструирано покритието на таблото (напр.
        формовано или шито), което влияе върху точността на напасване и външния вид.
    dash_cover_cutout_configuration:
      name: Конфигурация на изреза на капака на таблото
      description: Посочва за кои OEM отвори/сензори на арматурното табло покритието
        е предварително изрязано или оформено.
    dashboard_accessory_position:
      name: Позиция на аксесоара на арматурното табло
      description: Посочва къде върху/около арматурното табло е предназначен да бъде
        поставен или монтиран аксесоарът.
    date_variety:
      name: Сорт фурми
      description: Посочва сорта/разновидността на фурмите (напр. Medjool, Deglet
        Noor, Ajwa). Сортът силно влияе върху вкуса, размера и текстурата и е подчертан
        в повечето продуктови заглавия и описания, затова включването му подобрява
        филтрирането и откриваемостта.
    dayan_head_material:
      name: Материал на главата на барабан даян
      description: Материал на свирещата повърхност (пуди), напр. естествена кожа
        или синтетичен материал.
    dayan_strap_material:
      name: Материал на ленитите за даян
      description: Материал на лентите за опъване (бадхи), използвани за връзване
        на даян.
    dayan_syahi_type:
      name: Тип сяхи на даяна
      description: Тип на нанасяне на сяхи (черна настройваща паста) върху мембраната
        на даяна.
    decaffeination_method:
      name: Метод за декофеинизиране
      description: Посочва процеса, използван за премахване на кофеина от безкофеиново
        кафе.
    decal_installation_method:
      name: Метод за поставяне на стикер
      description: Описва как стикерът се поставя върху повърхността на автомобила
        (напр. сухо поставяне, мокро поставяне). Подробности за необходимите инструменти/изисквания
        (напр. трансферно фолио или пистолет за горещ въздух) трябва да бъдат описани
        в инструкциите или свързаните атрибути, когато е приложимо.
    decal_orientation:
      name: Ориентация на стикера
      description: Дали стикерът е предназначен за приложение върху вътрешното стъкло,
        или върху външната повърхност.
    decal_placement_type:
      name: Тип поставяне на стикер
      description: Показва къде върху превозното средство е предназначен стикерът
        (напр. каросерия, броня, преден капак).
    decal_visibility_property:
      name: Свойство за видимост на стикера
      description: Оптични/визуални свойства на стикера, предназначени да подобрят
        видимостта или светлинната реакция (напр. светлоотразителен, флуоресцентен,
        светещ в тъмното или с прозрачни елементи).
    deck_concave_level:
      name: Ниво на извивка на дъската
      description: Посочва дълбочината или степента на вдлъбнатост на дека (напр.
        плитка, средна, дълбока).
    deck_flex_rating:
      name: Оценка на гъвкавостта на дъската
      description: Качествена оценка на гъвкавостта/твърдостта на дека.
    deck_material:
      name: Материал на дъската
      description: Идентифицира основния конструктивен материал на дъската за скейтборд.
    decoder_interface_socket_type:
      name: Тип интерфейс/гнездо на декодера
      description: Тип интерфейс на цифровия декодер или конфигурация на вградения
        декодер за модела локомотив.
    decoration_technique:
      name: Техника на декорация
      description: Посочва основния метод, използван за нанасяне на графики или декоративни
        елементи върху тениската.
    decorative_stamp_form_factor:
      name: Формат на декоративния печат
      description: Посочва физическия формат на печата и начина, по който отпечатва
        дизайна (единичен печат, комплект, ролка, фонов печат и др.).
    decorative_tape_application:
      name: Приложение на декоративната лента
      description: Основно предназначение в декорацията/ръчните занимания, за което
        декоративната лента е проектирана или рекламирана.
    decorative_tape_format:
      name: Формат на декоративна лента
      description: Посочва как декоративната лента се доставя/опакова за употреба.
    decoy_buoyancy:
      name: Плаваемост на примамката
      description: Описва как примамката се държи във водния слой (плава, задържа
        се или потъва).
    decoy_joint_type:
      name: Тип съединение на примамката
      description: Посочва дали тялото на примамката е цяло или сегментирано, което
        влияе върху движението при плуване.
    decoy_motion_mechanism:
      name: Механизъм за движение на примамката
      description: Описва как и дали примамката създава движение или водни вибрации
        за привличане на дивеч.
    decoy_posture:
      name: Позиция на примамката
      description: Посочва изобразената поза или дейност на животното, представено
        от примамката (напр. хранене, почивка, нащрек).
    decoy_size_class:
      name: Клас на размера на примамката
      description: Категоризира размера на примамката спрямо истинското животно (напр.
        „Стандартен“, „Магнум“, „Овърсайз“).
    decoy_style:
      name: Стил на примамката
      description: Определя физическата форма или конструктивния клас на примамката,
        за да помогне на ловците да изберат правилната конфигурация.
    deli_meat_variety:
      name: Разнообразие от месни деликатеси
      description: Класифицира специфичния вид месни деликатеси (напр. салам, болоня,
        прошуто, печено говеждо).
    delivery_form:
      name: Форма на доставката
      description: Физическа форма на препарата за почистване на инжектори.
    denim_composition:
      name: Състав на денима
      description: Основен влакнест състав на денима (базови влакна без багрила и
        покрития).
    denim_finish:
      name: Финиш на денима
      description: Повърхностен финиш/обработка, приложени върху деним плата.
    denim_intended_use:
      name: Предназначение на денима
      description: Типичен проект/предназначение, за което е предназначен денимът.
    denim_stretch_type:
      name: Тип разтегливост на денима
      description: Посочва дали денимът има механична еластичност, добавен еластан/спандекс
        или няма разтегливост.
    denim_wash:
      name: Обработка на денима
      description: Посочва нюанса или обработката на деним плата (напр. светъл, тъмен,
        суров, киселинно обработен).
    derailleur_cage_length:
      name: Дължина на рамото на дерайльора
      description: Посочва дължината на рамото на дерайльора, която определя капацитета
        за обем на веригата (основно при задни дерайльори).
    derailleur_mounting_style:
      name: Стил на монтаж на дерайльора
      description: Посочва как дерайльорът се закрепва към рамката или ухото на велосипеда
        (напр. braze-on, скоба, direct mount, UDH).
    derailleur_type:
      name: Тип дерайльор
      description: Показва дали продуктът е преден, или заден дерайльор.
    deshedder_tool_type:
      name: Тип инструмент за разресване на подкосъм
      description: Класифицира конструктивния тип на уреда за премахване на подкосъм,
        за да се улесни изборът на метод за груминг (напр. с ножче, блок, карди гребен
        или ръкавица).
    diabolo_axle_system:
      name: Тип осева система на диаболо
      description: Посочва системата/конфигурацията на оста на диаболото, която влияе
        върху grind триковете, стабилността и износването на връвта.
    diagnostic_functions_supported:
      name: Поддържани диагностични функции
      description: Посочва диагностичните/сервизните функции, които скенерът може
        да изпълнява.
    diagnostic_interface_type:
      name: Тип диагностичен интерфейс
      description: Интерфейс/свързване, използвано за комуникация с превозното средство
        или устройството (напр. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Цветова степен на диаманта
      description: Посочва цветовия клас на диамантите — от D (безцветен) до Z (със
        слаб цвят) — или обозначава фантазийно оцветени диаманти.
    diaper_cover_style:
      name: Стил на покривало за пелени
      description: Определя дизайнерския силует или декоративния стил на калъфката
        за пелена, за да улесни търсенето и филтрирането по стил.
    diastatic_power_unit:
      name: Единица за диастатична активност
      description: Посочва системата от единици, използвана за отчитане на диастатичната
        активност на продукта (напр. °Lintner или Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Система на настройка на диатонична хармоника
      description: Посочва подредбата на нотите/стройката, използвана при диатоничната
        хармоника.
    dice_sides:
      name: Брой страни на зара
      description: Брой страни (лица) на заровете в комплекта (напр. d6, d20). При
        смесени комплекти се използва преобладаващият тип или се посочват няколко
        стойности, ако системата го поддържа.
    didgeridoo_construction_type:
      name: Тип конструкция на диджериду
      description: Описва как е изработено или оформено диджеридуто (традиционна или
        модерна конструкция).
    dietary_formulation_claim:
      name: Твърдение за диетична формула
      description: Подчертава ключови характеристики или ограничения на формулата,
        свързани с храненето на коне (напр. без зърно, ниско съдържание на нишесте,
        органичен продукт).
    dinosaur_playset_scale_figure_size_class:
      name: Клас на мащаба/размера на фигурките в комплекта с динозаври
      description: Описва общия мащаб на включените динозаври/фигурки, за да се улесни
        съвместимостта с други комплекти.
    dinosaur_species_included:
      name: Включени видове динозаври
      description: Идентифицира кои видове динозаври са представени в комплекта за
        игра (фигури или моделирани динозаври).
    dipsy_diver_size_designation:
      name: Обозначение на размера на дипси дайвера
      description: Посочва определения от производителя код за размер на дипси дайвера,
        който съответства на теглото и дълбочината на гмуркане.
    disc_brake_rotor_mount_type:
      name: Тип монтаж на ротора на дисковата спирачка
      description: Посочва как спирачният ротор се закрепва към главината (напр. 6-болтов
        монтаж, Center Lock).
    disc_lock_accessories_included:
      name: Включени аксесоари за дисковата ключалка
      description: Посочва допълнителните елементи, включени към велосипедния дисков
        катинар, като напомнящ кабел, калъф за носене, монтажна скоба или батерии.
    disco_ball_mirror_tile_material:
      name: Материал на огледалния панел на диско топка
      description: Материал на отразителните плочки върху диско топката (ако е приложимо).
    disco_ball_mirror_tile_size:
      name: Размер на огледалните плочки на диско топката
      description: Приблизителен размер на отделните огледални плочки/квадрати върху
        диско топката.
    display_backlight_color:
      name: Цвят на подсветката на дисплея
      description: Цвят на подсветката/осветлението на дисплея или скалата на уреда.
    disposable_compostable_claim:
      name: Твърдение за еднократна употреба или компостиране
      description: Посочва дали продуктът е компостируем, биоразградим, рециклируем
        или нито едно от тях (когато е приложимо).
    distillation_method:
      name: Метод на дестилация
      description: Посочва метода на дестилация или типа казан, използван за производството
        на спиртната напитка.
    distilled_water_intended_use:
      name: Предназначение на дестилираната вода
      description: Определя основното предназначение на дестилираната вода (напр.
        пиене, CPAP апарат, овлажнител, парна ютия).
    distress_transmission_frequency:
      name: Честота за предаване на сигнал за бедствие.
      description: Основна радиочестота/радиочестоти, използвани за аварийно сигнализиране.
    distressing_level:
      name: Ниво на износване
      description: Посочва степента на умишлено износване, скъсвания или протривания,
        приложени върху плата.
    distressing_style:
      name: Стил на износване
      description: Посочва типа или степента на износване при дънките, като скъсвания
        или ефект „мустаци“.
    distributor_advance_mechanism:
      name: Механизъм за аванс на делкото
      description: Посочва типа механизъм за изпреварване на запалването, използван
        от делкото.
    distributor_cap_terminal_type:
      name: Тип на клемите/изводите на капачката на делкото
      description: Посочва типа/стила на клемите (изводите) на капачката на делкото.
    distributor_gear_material:
      name: Материал на зъбното колело на делкото
      description: Посочва материала на задвижващото зъбно колело на делкото.
    distributor_ignition_type:
      name: Тип запалителна система на делкото
      description: Посочва дали делкото е предназначено за чукче-контактна, електронна
        или високoенергийна запалителна система.
    distributor_kit_contents:
      name: Съдържание на комплекта за делко
      description: Посочва кои компоненти са включени с делкото (напр. капачка, ротор,
        запалителен модул, уплътнение/О-пръстен, задвижваща зъбчатка, кабели/конектор).
    dive_computer_form_factor:
      name: Форм фактор на компютъра за гмуркане
      description: Посочва физическия дизайн или начина на закрепване на водолазния
        компютър, например конзолен или тип часовник.
    diving_mask_design:
      name: Дизайн на маска за гмуркане
      description: Определя общия конструктивен стил на компютъра за гмуркане, влияещ
        върху начина на носене и употреба.
    divot_tool_prong_configuration:
      name: Конфигурация на вилицата на инструмента за поправка на чим
      description: Посочва броя и разположението на вилките на инструмента за поправка
        на чим, използвани за възстановяване на тревната настилка.
    divot_tool_style:
      name: Стил на уреда за поправяне на дупки
      description: Определя общата конструкция или начина на използване на инструмента
        за поправка на чим, като фиксиран, сгъваем, мултифункционален или аксесоар,
        който се закрепва към шапка или стик за голф.
    djembe_shell_construction:
      name: Конструкция на корпуса на джембе
      description: Описва метода на изработка на корпуса/тялото на джембе.
    djembe_tuning_system:
      name: Система за настройка на джембе
      description: Посочва как джембето се обтяга/настройва.
    dmx_output_connector_type:
      name: Тип изходен DMX конектор
      description: Физически формат на конектора, използван за DMX изходния порт/портове
        на контролера.
    doctor_playset_items_included:
      name: Включени артикули в лекарския комплект за игра
      description: Посочва кои медицински принадлежности и аксесоари за ролеви игри
        са включени в лекарския комплект (напр. стетоскоп, спринцовка, рефлексен чук).
    doctor_playset_role_play_setting:
      name: Сценарий за ролева игра с лекарски комплект
      description: Посочва основния контекст на ролевата игра, който лекарският комплект
        представя.
    doctor_playset_wearable_items_included:
      name: Включени артикули за носене в лекарския комплект за игра
      description: Посочва включените носими елементи на костюмите в комплекта за
        игра.
    doll_accessory_type:
      name: Тип аксесоар за кукла
      description: Определя какъв вид аксесоар за кукла или екшън фигура представлява
        продуктът (напр. дрехи, обувки, мебели, стойки за показване), позволявайки
        на потребителите да разглеждат и филтрират в тази категория аксесоари.
    doll_eye_type:
      name: Тип очи на куклата
      description: Посочва конструктивния тип на очите на куклата (напр. вградени
        акрилни, рисувани, с LED осветление).
    doll_hair_fiber_type:
      name: Тип влакна на косата на куклата
      description: Посочва типа коса/влакна, използвани за куклата (или липсата им),
        което влияе върху реалистичността, оформянето и поддръжката.
    doll_making_kit_components_included:
      name: Включени компоненти в комплект за изработка на кукли
      description: Изброява основните материали и инструменти, включени в комплекта
        за изработка на кукли, за да могат потребителите да сравняват комплектите
        и да знаят какво трябва сами да осигурят.
    dollhouse_installation_placement_type:
      name: Тип монтаж/разположение на къщичка за кукли
      description: Начинът на предназначено използване или разполагане на къщата за
        кукли (напр. за поставяне на маса, за стоене на пода или за стенен монтаж).
    dollhouse_items_included:
      name: Включени елементи за къща за кукли
      description: Посочва какво е включено в кутията с куклената къща (мебели, кукли,
        аксесоари).
    dollhouse_lighting_type:
      name: Тип осветление за къщичка за кукли
      description: Тип осветление, включено или поддържано от куклената къща.
    dollhouse_room_type:
      name: Тип стая за куклена къща
      description: Указва предназначената стая/зона в къща за кукли, където аксесоарът
        обикновено се използва.
    dollhouse_scale:
      name: Мащаб на къщата за кукли
      description: Съотношение на мащаба на куклената къща или аксесоарите ѝ (напр.
        1:12), за осигуряване на съвместимост между къщи, мебели и фигурки.
    dollhouse_style_theme:
      name: Стил/тема на куклената къща
      description: Общ стил или тема на куклената къща за улесняване на търсенето
        и избора (напр. модерен или викториански).
    donnos_playing_technique:
      name: Техника на свирене на донно
      description: Начин на свирене/задействане на донно (с ръце или с палка/ударник),
        за да се съобрази с очакванията на купувача и включените аксесоари.
    donnos_tuning_system:
      name: Система за настройка на барабани донос
      description: Основен метод за настройка или промяна на височината на звука (напр.
        чрез опъващи въжета или механизъм за притискане).
    door_assembly_type:
      name: Тип сглобяване на врата
      description: 'Посочва какво е включено: само каса на врата, само панел на врата
        или пълен комплект врата.'
    door_closure_mechanism:
      name: Механизъм за затваряне на вратата
      description: Определя механизма, който контролира затварянето на вратата (напр.
        плавно затваряне, магнитно захващане).
    door_handle_components_included:
      name: Включени компоненти на дръжката на вратата
      description: Посочва кои основни части са включени с дръжката за врата (напр.
        заключващ цилиндър, уплътнение, декоративна капачка, монтажни елементи, кабелен
        конектор, език/активатор).
    door_handle_operation:
      name: Начин на работа на дръжката на вратата
      description: Посочва основния начин на задействане/работа на дръжката на автомобилната
        врата (напр. механична връзка, патрон за ключ, безключово докосване/бутон,
        електрическо изскачане).
    door_lock_knob_attachment_method:
      name: Метод за закрепване на копчето на заключването на вратата
      description: Посочва как копчето на заключването се закрепва към заключващия
        прът (напр. с резба, чрез натискане).
    door_lock_position:
      name: Позиция на заключването на вратата
      description: Посочва за коя позиция на врата/отвор на автомобила е предназначена
        ключалката или нейният компонент.
    door_seal_feature_set:
      name: Набор от функции на уплътнението на вратата
      description: Функционални характеристики на уплътнението на вратата.
    door_seal_material_type:
      name: Тип материал на уплътнението на вратата
      description: Основен еластомер или материална група, използвана за уплътнението
        на вратата (по-специфично от общ „материал“).
    door_seal_product_form:
      name: Форма/тип на продукта на уплътнението за врата
      description: Посочва формата за продажба/опаковка на уплътнението на вратата.
    door_window_operation:
      name: Начин на управление на стъклото на вратата
      description: Посочва дали системата на стъклото на вратата е с ръчно или електрическо
        управление, или дали вратата изобщо няма стъкло.
    double_decker_bus_deck_configuration:
      name: Конфигурация на палубата на двуетажен автобус
      description: Посочва конфигурацията на достъпа/покрива на палубата на двуетажен
        автобус.
    double_drum_pedal_linkage_medium:
      name: Тип свързващ механизъм на двоен педал за барабан
      description: Посочва механизма, използван за свързване на вторичния педал с
        основния педал (напр. карданен вал, верига, ремък).
    double_end_bag_core_type:
      name: Тип вътрешно ядро на двустранна боксова круша
      description: Определя конструкцията на вътрешното ударно ядро, която влияе върху
        отскока, скоростта, усещането и нуждата от поддръжка.
    double_pointed_needle_point_style:
      name: Стил на върха на двойноостра игла
      description: Описва остротата и формата на върха, предназначени за различни
        прежди и техники на плетене.
    dough_extruder_accessories_included:
      name: Включени аксесоари към екструдера за тесто.
      description: Допълнителни компоненти, включени към екструдера за тесто.
    dough_extruder_operation_type:
      name: Тип работа на екструдера за тесто
      description: Начинът, по който тестото се избутва през екструдера за оформяне
        на форми.
    dough_extruder_shape_disc_included:
      name: Включен диск за форми на екструдера за тесто
      description: Формите, които екструдерът може да изработва чрез включените дискове/накрайници.
    dough_format:
      name: Формат на тестото
      description: Определя физическата форма/представяне на тестото в опаковката
        (напр. топка, лист, диск, настъргани ленти).
    doumbek_accessories_included:
      name: Включени аксесоари за думбек
      description: Аксесоари, включени към думбекa (напр. ключ за настройка, калъф).
    doumbek_head_material:
      name: Материал на мембраната на думбек
      description: Материал на мембраната на думбека
    doumbek_head_type:
      name: Тип мембрана на думбека
      description: Конструкция/тип на мембраната на думбека (как е изработена или
        монтирана).
    doumbek_playing_style_technique:
      name: Стил/техника на свирене на думбек
      description: Предназначен музикален стил/контекст, обичайно свързан с думбека.
    doumbek_tuning_system:
      name: Системи за настройка на думбек
      description: Начин на настройване/обтягане на думбека (или дали не подлежи на
        настройване).
    dowel_end_style:
      name: Стил на края на дюбела
      description: Описва формата/изрязването на краищата на дюбела, което влияе върху
        лекотата на поставяне, безопасността и предназначението му за ръчни проекти.
    dowel_surface_texture:
      name: Повърхностна текстура на дюбела
      description: Описва състоянието на повърхността на дюбела, например гладка или
        набраздена, което влияе върху външния вид и сцеплението на лепилото.
    drafting_compass_adjustment_mechanism:
      name: Механизъм за настройка на пергел
      description: Основен механизъм за фина настройка, използван за прецизно задаване
        на радиуса.
    drafting_compass_fine_adjustment_mechanism:
      name: Механизъм за фина настройка на пергел
      description: Тип фина настройка, използвана за прецизно задаване на радиуса
        (ако е налична).
    drafting_compass_lead_holder_type:
      name: Тип държач за графит/пълнител на пергел
      description: Вид вложка/държач за чертане, включен или поддържан от пергела.
    drag_system_material:
      name: Материал на системата за фрикционен спирачен механизъм
      description: Определя материала или технологията, използвани в авансовата система,
        които влияят върху топлоустойчивостта и плавната работа.
    drag_system_type:
      name: Тип система за плъзгане
      description: Определя типа авансова система, използвана в макарата, например
        преден, заден, лостов, звездообразен, магнитен или дисков аванс.
    drag_type:
      name: Тип аванс
      description: Посочва типа на фрикционния спирачен механизъм на макарата според
        разположението или начина на управление.
    drawer_features:
      name: Характеристики на чекмеджето
      description: Посочва специални конструктивни елементи или функционалности на
        чекмеджето (напр. плавно затваряне, облицовка с филц).
    drawer_slide_type:
      name: Тип водач за чекмедже
      description: Посочва типа монтаж и изтегляне на плъзгачите на чекмеджето (напр.
        подмонтажни, пълно изтегляне).
    drawing_ink_compatible_tools:
      name: Инструменти, съвместими с туш за рисуване
      description: Посочва инструментите за нанасяне, за които е предназначено мастилото
        (напр. перо за потапяне или четка).
    drawing_ink_permanence:
      name: Трайност/устойчивост на туша за рисуване
      description: Посочва характеристиките на трайност, важни за завършените художествени
        произведения и репродукцията им.
    dress_embellishment:
      name: Украса на рокля
      description: Подчертава изпъкналите декоративни елементи, включени в дизайна
        на роклята.
    dress_train_type:
      name: Тип шлейф за рокля
      description: Посочва наличието и дължината/стила на шлейфа на роклята, което
        определя формалността и пригодността за различни събития.
    dried_surface_finish:
      name: Покритие на изсъхналата повърхност
      description: Описва типичния външен вид на повърхността след изсъхване (блясък/текстура).
    drink_tube_insulation:
      name: Изолация на тръбата за пиене
      description: Посочва дали тръбата за пиене има изолация или термо ръкав, който
        поддържа температурата на течността (предпазва от нагряване или замръзване).
    drive_band_cross_section_shape:
      name: Форма на напречното сечение на задвижващия ремък
      description: Формата на профила на задвижващия ремък (кръгъл, плосък и др.).
    drive_band_join_type:
      name: Тип на съединението на задвижващия ремък.
      description: Начинът, по който е изработен и съединен задвижващият ремък (напр.
        безкраен/затворен или с краища за връзване).
    drive_band_material_type:
      name: Тип материал на задвижващия ремък
      description: Посочва материала/типа на задвижващия ремък, използван при предачни
        колела.
    drive_location:
      name: Местоположение на ремъка
      description: Посочва къде е разположен маховикът/задвижващият механизъм на елиптичния
        тренажор, което влияе върху заетото пространство и усещането при движение.
    drive_mechanism:
      name: Тип задвижващ механизъм
      description: Определя типа задвижване, използвано за предаване на мощността
        от педалите към маховика.
    drive_shaft_material:
      name: Материал на задвижващия вал
      description: Посочва основния материал на тръбата на задвижващия вал или на
        цялото задвижване.
    drive_system:
      name: Тип задвижваща система
      description: Определя механизма, който предава силата от педала към системата
        за съпротивление.
    drivetrain_configuration:
      name: Конфигурация на задвижващата система
      description: Посочва конфигурацията на задвижването на велосипеда, като указва
        дали задната главина е фиксирана, с едноскоростен свободен венец или flip-flop.
    drivetrain_speed_compatibility:
      name: Съвместимост с брой скорости на задвижването
      description: Посочва с колко степени на касетата е съвместен венецът, за да
        се осигури правилен профил на зъбите и разстояние между тях.
    drone_positioning_system:
      name: Система за позициониране на дронове
      description: Поддържана технология за позициониране/задържане на дрона за навигация
        и стабилен полет на място.
    drone_transmission_type:
      name: Тип предаване на дрон
      description: Основен метод, използван за управление и/или видео връзка между
        дрона и контролера/устройството.
    drop_spindle_whorl_position:
      name: Позиция на макаричката при падащото вретено
      description: Позиция на шайбата върху вала.
    drum_carder_accessories_included:
      name: Включени аксесоари за барабанен кардер
      description: Често включени компоненти в комплекта за кардираща машина
    drum_clamp_locking_mechanism:
      name: Механизъм за заключване на скоба за барабан
      description: Посочва как скобата се заключва/затяга към тръбата/обръча (напр.
        крилчат болт, болт за ключ за барабан, бързо освобождаване).
    drum_clamp_mount_interface:
      name: Интерфейс за монтаж на скоба за барабан
      description: Посочва какво осигурява скобата за закрепване на аксесоари (напр.
        държач за L-образен прът, сферичен шарнир, накланящ механизъм за чинел).
    drum_clamp_type:
      name: Тип скоба за барабан
      description: Посочва типа монтажна скоба, използвана в хардуера за барабанния
        комплект (напр. скоба за обръч или скоба за тръба).
    drum_head_application_batter_resonant:
      name: Предназначение на мембраната за барабан (ударна/резонансна)
      description: Посочва за коя страна/роля е предназначена мембраната на барабана
        (горна ударна повърхност или долна резонансна/за соло барабан).
    drum_head_collar_type:
      name: Тип борд на мембраната за барабан
      description: Посочва дали мембраната е със стандартен, нисък или специализиран
        борд, съответстващ на определени ръбове/корпуси на барабана.
    drum_head_damping_control:
      name: Контрол на заглушаването на мембраната за барабан
      description: Вградени функции за контрол на обертоновете или заглушаване, включени
        в конструкцията на мембраната.
    drum_head_film_material:
      name: Материал на фолиото на мембраната за барабан
      description: Основен материал на мембраната на кожата (обикновено PET/Mylar,
        но може да включва и специални материали).
    drum_head_hoop_collar_type:
      name: Тип обръч/яка на барабанната мембрана
      description: Посочва конструкцията на обръча и ръба на кожата за барабан (напр.
        профил на ръба и материал на обръча), което може да влияе на прилягането и
        стабилността на настройката при различни корпуси и обръчи.
    drum_head_hoop_rim_material:
      name: Материал на обръча на мембраната за барабан
      description: Материал на вътрешния обръч на мембраната (вградения обръч вътре
        в мембраната), който може да влияе върху издръжливостта и стабилността на
        настройката.
    drum_head_included:
      name: Включена е кожа за барабан
      description: Посочва дали ударната и/или резонансната мембрана са включени към
        барабана.
    drum_head_muffling_feature:
      name: Заглушаваща функция на мембраната на барабана
      description: Вградени функции за контрол на обертоновете, интегрирани в мембраната
        на барабана.
    drum_head_muffling_type:
      name: Тип заглушаване на кожата на барабана
      description: Посочва дали мембраната на барабана включва вградени елементи за
        контрол/заглушаване на обертоновете.
    drum_head_ply_count:
      name: Брой пластове на мембраната за барабан
      description: Брой слоеве (пластове) на филма в конструкцията на кожата за барабан
        (напр. 1 слой, 2 слоя).
    drum_head_position:
      name: Позиция на кожата на барабана
      description: Посочва дали мембраната е предназначена като ударна (горна/за удари),
        резонансна (долна), за соло барабан (долна) или може да се използва и по двата
        начина.
    drum_head_reinforcement_type:
      name: Тип подсилване на мембраната за барабан
      description: Посочва дали кожата на снейра включва подсилващи елементи като
        централен подсилващ елемент или контролен пръстен, които увеличават издръжливостта
        и оформят по-фокусиран тон.
    drum_head_surface_finish:
      name: Повърхностно покритие на мембраната на барабана
      description: Повърхностна текстура/финиш на кожата, който влияе на атаката на
        звука и реакцията при свирене с четки.
    drum_head_type:
      name: Тип на барабанната мембрана
      description: Посочва конструкцията/типа на мембраната, използвана за барабана
        (главно за ударни/резонансни мембрани в комплекта).
    drum_key_design_type:
      name: Тип дизайн на ключ за барабан
      description: Описва конструктивния тип на ключа за обтягане на барабани (напр.
        стандартен, тресчотков, T-образна ръкохватка).
    drum_key_drive_type:
      name: Тип задвижване на ключа за барабани
      description: Посочва типа захват/интерфейс на ключа за барабани за работа с
        обтягащия болт или монтажния хардуер.
    drum_key_handle_style:
      name: Стил на ръкохватката на ключа за барабани
      description: Описва ръкохватката/ергономичния стил на ключа за барабани, влияещ
        върху удобството и лоста при настройване.
    drum_kit_included_items:
      name: Включени елементи в комплекта барабани
      description: Изброява основните компоненти, включени в комплекта за барабани
        извън корпусите/падовете (напр. хардуер, чинели, столче).
    drum_kit_portability:
      name: Преносимост на комплекта барабани
      description: Посочва дали комплектът е проектиран за компактно съхранение/транспорт
        (напр. пътен, компактен, сгъваем).
    drum_kit_shell_construction_features:
      name: Характеристики на конструкцията на корпуса на барабана
      description: Описва как са конструирани корпусите (брой/тип пластове), което
        влияе върху тона и издръжливостта.
    drum_mount_clamp_type:
      name: Тип скоба за монтаж на барабан
      description: Описва типоразмера на скобата, използван при монтаж на барабан.
    drum_multi_clamp_clamp_type:
      name: Тип на скобата при мултискоба за барабани.
      description: Функционален стил/конфигурация на мултискобата (как захваща и какво
        свързва).
    drum_mute_material:
      name: Материал за заглушаване на барабани
      description: Посочва основния материал на заглушителя за барабан, който контактува
        с кожата и/или потиска вибрациите.
    drum_pad_triggering_zones:
      name: Зони за задействане на пад за барабани
      description: Посочва броя/типа зони на задействане, поддържани от падa за том
        (напр. само кожа или кожа + ръб), което влияе на изразителността и съвместимостта
        с модули.
    drum_pedal_accessories_included:
      name: Включени аксесоари за педал за барабан
      description: Посочва основните аксесоари и компоненти, включени в комплекта
        на педала за барабан.
    drum_pedal_baseplate_type:
      name: Тип на основната плоча на педала за барабан
      description: Посочва дали педалът използва основа или плаваща/безрамкова конструкция.
    drum_pedal_bearing_type:
      name: Тип лагер на педала за барабани
      description: Посочва лагерния механизъм, използван в основните точки на въртене
        (напр. люлеещо рамо, пета, кама).
    drum_pedal_cam_type:
      name: Тип ексцентрик на педал
      description: Посочва формата/геометрията на камата на педала за барабани, която
        влияе върху усещането и реакцията (напр. линейна или ускоряваща).
    drum_pedal_chain_configuration:
      name: Конфигурация на веригата на педала за барабан
      description: Посочва конфигурацията на веригата при педал за барабани с верижно
        задвижване (напр. единична верига, двойна верига или изнесена верига).
    drum_pedal_chain_type:
      name: Тип верига за педал на барабан
      description: Посочва типа верига, използвана в задвижването (напр. ролкова верига
        спрямо верига тип велосипед), което може да влияе върху плавността и издръжливостта.
    drum_pedal_clamp_type:
      name: Тип скоба на педала за барабани
      description: Посочва как педалът се закрепва към обръча на касата.
    drum_pedal_intended_use:
      name: Предназначение на педала за барабани
      description: Посочва основния стил/контекст на свирене, за който е проектиран/предлаган
        педалът с ремъчно задвижване.
    drum_pedal_spring_adjustment_method:
      name: Метод за регулиране на пружината на педала за барабани
      description: Посочва как се регулира напрежението на пружината на педала.
    drum_pedal_spring_type:
      name: Тип пружина за педал на барабан
      description: Посочва механизма на пружината, използван за връщащото движение
        на педала.
    drum_shell_material:
      name: Материал на корпуса на барабана
      description: Посочва основния материал на корпуса на акустичните барабани (напр.
        клен, бреза, акрил).
    drum_shell_wood_species:
      name: Вид дърво за корпуса на барабана
      description: Посочва вида дърво, използвано за корпуса на барабана, което влияе
        върху тона и резонанса.
    drumhead_type:
      name: Тип на кожата за барабан
      description: Конфигурация/тип мембрана, използвана при октобан.
    drumstick_model:
      name: Модел палки за барабани
      description: Стандартизирано означение за модел/размер на палките за барабани,
        използвано от много марки (напр. 5A, 7A).
    drumstick_taper:
      name: Степен на стесняване на палките за барабани
      description: Описва профила на изтъняване от дръжката към върха, който влияе
        върху отскока и баланса.
    drysuit_footwear_style:
      name: Тип обувна част на сухия костюм
      description: Описва интегрираното завършване на долната част на сухия костюм
        (напр. вградени ботуши, неопренови чорапи, чораповидно стъпало или уплътнения
        около глезените).
    dumbbell_style:
      name: Стил на дъмбела
      description: Посочва основния дизайн на дъмбела – дали е фиксиран, регулируем
        или с товарен/зареждаем тип дръжка – което влияе на избора и начина на използване
        при тренировки.
    dundun_playing_position:
      name: Позиция за свирене на дундун
      description: Предвидена позиция за свирене/носене на барабана.
    dye_status:
      name: Състояние на багрилото
      description: Посочва дали ватата е боядисана, небоядисана/естествена или включва
        множество цветове/смеси.
    dye_style:
      name: Стил на боядисване
      description: Посочва дали цветът на конеца е едноцветен, преливащ или специално
        боядисан.
    dye_technique:
      name: Техника на боядисване
      description: Метод, използван за оцветяване на влакното (напр. ръчно боядисване,
        боядисване в съд, секционно боядисване).
    dye_type_needlecraft_fabric:
      name: Тип боядисване (тъкан за ръкоделие)
      description: Посочва дали ленената тъкан е едноцветна, ръчно боядисана или специално
        боядисана.
    dyeing_color_processing:
      name: Боядисване / обработка на цвета
      description: Описва дали и как влакното е оцветено (напр. неоцветено, избелено/бяло
        или специфични техники на боядисване).
    e_bike_certification_class:
      name: Клас за сертифициране на електрически велосипеди
      description: Посочва официалния скоростен рейтинг на гумата за електрически
        велосипеди (напр. E-25, E-50).
    e_bike_speed_rating:
      name: Индекс на скоростта на електрическия велосипед
      description: Посочва официалното сертификационно ниво за електровелосипеди на
        гумата (напр. E25 за ≤25 км/ч, E50 за ≤50 км/ч).
    e_scooter_connector_type:
      name: Тип конектор за електрически скутер
      description: Идентифицира вида електрически конектор или щепсел, използван от
        компонента за захранване или сигнална връзка.
    e_scooter_throttle_type:
      name: Тип газ на електрическа тротинетка
      description: Посочва типа газ, използван за контрол на ускорението при електрическа
        тротинетка.
    ear_coverage:
      name: Покритие на ушите
      description: Посочва дали каската включва защита за ушите и дали тя е подвижна.
    ear_coverage_style:
      name: Стил на покритие за ушите
      description: Описва как и дали ушите са покрити от маската против мухи.
    ear_coverage_type:
      name: Тип покритие на ушите
      description: Указва как шапката покрива или защитава ушите, включително наличието
        и стила на покривалата за уши.
    ear_guard_type:
      name: Тип предпазител за уши
      description: Описва вида на защита за ушите, вградена в шапката, като твърда
        пластмаса, подплатена или сваляща се защита.
    earmuff_style:
      name: Стил на антифони
      description: Посочва начина на носене или конструктивния дизайн на антифона
        (напр. над главата или зад тила/обгръщащ).
    earring_closure_type:
      name: Тип закопчаване на обецата
      description: Посочва механизма, използван за закрепване на обецата към ухото
        (напр. закопчаване с щифт, лостче, клипс).
    easel_art_desk_features:
      name: Характеристики на статив и художествено бюро
      description: Подчертава често срещаните функционални характеристики, включени
        към статива или художественото бюро.
    easel_art_desk_surface_type:
      name: Тип повърхност на статив и художествено бюро
      description: Посочва използваемата повърхност за рисуване/писане (напр. черна
        дъска, бяла дъска, ролка хартия, магнитна дъска).
    eb_clarinet_body_type:
      name: Тип тяло на ми бемол кларинет
      description: Посочва дали кларинетът в Es (Eb) е сопранов или алтов вариант.
    eco_material_type:
      name: Вид еко материал
      description: Подчертава екологично съобразената пяна или материална технология,
        използвана в подложката.
    edge_construction:
      name: Конструкция на острието
      description: Посочва дали ските имат метален кант по никоя, част или цялата
        си дължина.
    edge_tuner_type:
      name: Тип на механизма за настройване на ръба
      description: Класифицира типа на устройството за заточване на кантове при ски
        или сноуборд, например пила с водач или електрическа машина.
    edible_plant_part:
      name: Ядлива част на растението
      description: Посочва коя част от растението се продава за консумация.
    educational_guide_included:
      name: Включено образователно ръководство
      description: Посочва какви учебни материали са включени към модела.
    educational_topic:
      name: Образователна тема
      description: Основна образователна тема, която се подкрепя от съдържанието на
        мравефермата.
    egg_component:
      name: Яйчен компонент
      description: Идентифицира коя част от яйцето съдържа продуктът, например цяло
        яйце, само белтъци, жълтъци или смеси/заместители.
    egg_component_replaced:
      name: Заменен компонент на яйцето
      description: Посочва коя част от яйцето продуктът е предназначен да замества
        (напр. цяло яйце, белтък).
    egg_enrichment:
      name: Обогатяване на яйца
      description: Посочва добавените към яйцата хранителни обогатявания, като Омега-3
        или витамин D.
    egg_farming_method:
      name: Метод за отглеждане на яйца
      description: Посочва метода на производство или отглеждане на яйцата (напр.
        без клетки, свободно отглеждане, органично).
    egg_grade:
      name: Клас яйца
      description: Посочва качествения клас, определен от регулаторни или индустриални
        организации.
    egg_processing_state:
      name: Състояние на обработката на яйца
      description: Посочва каква обработка е приложена към яйцата преди продажба (напр.
        пресни, осолени, консервирани).
    egg_production_method:
      name: Метод на производство на яйца
      description: Посочва системата на отглеждане/производство на яйцата (напр. свободно
        отглеждане без клетки, пасищно отглеждане, биологично).
    egg_replacer_main_ingredient:
      name: Основна съставка на заместител на яйца
      description: Показва основната съставка, от която е направен заместителят на
        яйцата, помагайки на потребителите с диетични нужди или желани свойства за
        печене.
    egg_size:
      name: Размер на яйцата
      description: Класифицира яйцата според стандартните търговски размери.
    egg_source_animal:
      name: Животно, източник на яйца
      description: Идентифицира животинския вид, който е произвел яйцата.
    egg_white_processing_method:
      name: Метод за обработка на яйчен белтък
      description: Посочва как са обработени белтъците след събирането им (напр. пастьоризирани,
        сушени чрез разпръскване), което влияе върху безопасността, срока на годност
        и предназначението.
    eggplant_variety:
      name: Сорт патладжан
      description: Посочва сорта или търговския вид патладжан, позволявайки на купувачите
        да избират видове с различен размер, вкус, цвят и кулинарно приложение.
    eggshell_color:
      name: Цвят на яйчена черупка
      description: Определя преобладаващия цвят на черупката на яйцата.
    elastic_edge_finish_type:
      name: Еластично покритие/тип на ръба
      description: Посочва конструкцията на ръба на тъканата еластична лента, която
        влияе върху комфорта и приложението.
    elastic_intended_use:
      name: Предназначение на ластика
      description: Основно приложение, за което е предназначена еластичната лента
        (помага за откриване на продукта и намалява несъответствията при избор).
    elastic_recovery_performance:
      name: Възстановяване на формата на ластика
      description: Описва колко добре тъканият ластик възстановява първоначалната
        си дължина след разтягане.
    elastic_recovery_quality:
      name: Качество на възстановяване на ластика
      description: Посочва способността на ластика да възстановява първоначалната
        си дължина след разтягане.
    elastic_stretch_level:
      name: Степен на разтегливост на ластика
      description: Посочва колко може да се разтяга ластикът под напрежение (често
        изразено с относителни нива, когато не е посочен точен %).
    elastic_structure:
      name: Структура на ластика
      description: Посочва конструкцията на ластика за копчета (напр. плетен, тъкан,
        оплетен), което може да влияе върху разтегливостта, възстановяването и поведението
        при шиене.
    elastic_type:
      name: Тип ластик
      description: Посочва конструктивния тип на ластика (напр. прегъваем ластик (FOE),
        оплетен, плетен, тъкан).
    electric_assist_type:
      name: Тип електрическа асистенция
      description: Посочва дали велосипедът има моторно подпомагане и какъв вид подпомагане
        предоставя.
    electric_bicycle_motor_position:
      name: Позиция на двигателя на електрическия велосипед
      description: Позиция на задвижващия електромотор при електрическия велосипед,
        като средно задвижване, предна главина, задна главина или двойна главина.
    electric_bike_class:
      name: Клас на електрически велосипед
      description: Категоризира електрическия велосипед според регулаторните класове,
        определящи ограниченията на скоростта и подпомагането чрез газ.
    electric_guitar_bridge_type:
      name: Тип мост на електрическа китара
      description: Посочва типа мост/вибрато система на електрическата китара.
    electric_instrument_output_connection_type:
      name: Тип изходен конектор на електрически инструмент
      description: Посочва физическите аудио изходни връзки, налични при електрическото
        чело.
    electric_riding_vehicle_control_options:
      name: Опции за управление на електрическо превозно средство
      description: Опции за управление/контрол, достъпни за водача/родителя (напр.
        педали, волан, дистанционно управление/превключване).
    electric_spinning_wheel_speed_control_type:
      name: Тип управление на скоростта при електрическо въртящо колело
      description: Описва как потребителят регулира скоростта на въртене на електрическото
        колело.
    electric_ukulele_output_jack_type:
      name: Тип изходен жак на електрическо укулеле
      description: Посочва физическия изходен конектор, използван от електрическото
        укулеле.
    electric_van_body_length_class:
      name: Клас дължина на каросерията на електрически ван
      description: Стандартен клас размер на ван според междуосието/дължината, използван
        в обявите.
    electric_van_roof_height_class:
      name: Клас височина на покрива на електрически ван
      description: Често използвана класификация на височината на покрива при ванове
        (особено товарни).
    electric_vehicle_drivetrain_layout:
      name: Конфигурация на задвижването на електрическо превозно средство
      description: Конфигурация на моторите/осите, описваща колко мотора има и къде
        са разположени (отвъд просто AWD/FWD/RWD).
    electric_winder_accessories_included:
      name: Включени аксесоари за електрическа машина за навиване.
      description: Изброява аксесоарите, включени към електрическата машина за навиване
        (напр. скоби, адаптери).
    electrical_connector_type:
      name: Тип електрически конектор
      description: Посочва типа конектор, използван от системата за заключване на
        вратата за електрическа интеграция (когато е приложимо).
    electrical_system_voltage:
      name: Напрежение на електрическата система
      description: Посочва номиналното напрежение на електрическата система на превозното
        средство, за което е предназначен регулаторът.
    electronic_cymbal_trigger_zones:
      name: Зони за задействане на електронен чинел
      description: Посочва броя независими зони на задействане на падa за чинел (напр.
        корпус/ръб/камбана).
    electronic_drum_module_audio_interface_functionality:
      name: Функционалност на аудио интерфейса на модула за електронни барабани
      description: Посочва дали модулът може да функционира като USB аудио интерфейс
        за запис/възпроизвеждане (в допълнение към MIDI).
    electronic_drum_module_metronome_features:
      name: Функции на метронома в модула за електронни барабани
      description: Посочва вградените функции за упражнение/метроном.
    electronic_drum_module_power_source:
      name: Захранване на модула за електронни барабани
      description: Посочва необходимия или поддържания източник на захранване за контролния
        модул.
    electronic_drum_module_sample_import_support:
      name: Поддръжка за импорт на семпли в електронен барабанен модул.
      description: Посочва дали модулът поддържа импортиране на потребителски семпли
        и по какъв начин.
    electronic_drum_pad_playing_surface_type:
      name: Тип повърхност за свирене на пад за електронни барабани
      description: Описва конструкцията на свирещата повърхност на падa за том (напр.
        мрежеста кожа или гума), което влияе върху отскока, шума и усещането при свиренe.
    electronic_features:
      name: Електронни функции
      description: Посочва електронните/интерактивните функции, включени в играчката
        банкомат (ако има такива).
    electronic_lights_and_sound:
      name: Електронни светлини и звук
      description: Посочва дали комплектът къща за кукли включва електронни светлини
        и/или звукови функции (напр. светлини, звук на звънец, музика, звукови ефекти).
    electronics_power_source:
      name: Източник на захранване за електроника
      description: Указва как се захранва активната електроника (когато е приложимо).
    eligible_race_series:
      name: Допустими състезателни серии
      description: Състезателна серия или санкционираща организация, в която автомобилът
        има право да участва.
    elliptical_trainer_part_type:
      name: Тип част за елиптичен тренажор
      description: Класифицира конкретния тип аксесоар или резервна част за елиптичен
        тренажор (напр. ремък, конзола, педал), за да могат потребителите бързо да
        филтрират необходимия продукт без да навигират през много подкатегории.
    embellishment_technique:
      name: Техника на декорация
      description: Описва основната декоративна или повърхностна обработка, приложена
        върху облеклото, като бродерия, щампа или мъниста.
    embellishment_type:
      name: Тип украса
      description: Посочва вида декоративен елемент, приложен към жартиерата, като
        дантела, панделки или перли.
    embossing_pen_ink_color:
      name: Цвят на мастилото за релефен маркер
      description: Указва цвета на мастилото, нанесено от релефния химикал (може да
        е прозрачно/лепкаво или пигментирано). Различава се от цвета на химикала/корпуса.
    embossing_stylus_tip_shape:
      name: Форма на върха на инструмента за релеф
      description: Описва геометрията на върха за релеф, използван за създаване на
        различни ефекти (напр. сферичен или остър).
    embroidered_coverage_level:
      name: Ниво на бродирано покритие
      description: Приблизително количество покритие с бродирани конци върху лицевата
        част на нашивката.
    embroidered_patch_backing_type:
      name: Тип основа (гръб) на бродираната нашивка
      description: Подложният/поддържащ слой на обратната страна на бродираната емблема,
        който влияе върху издръжливостта и начина на приложение.
    embroidery_hoop_type:
      name: Тип гергеф за бродерия
      description: Посочва конструктивния стил на гергефа за бродерия и основния му
        механизъм за обтягане.
    embroidery_machine_bobbin_type:
      name: Тип калерче за бродировъчна машина
      description: Вид/стил на зареждане на системата с калерчета.
    emergency_lighting_configuration:
      name: Конфигурация на аварийното осветление
      description: Посочва основната конфигурация на аварийните предупредителни светлини,
        монтирани на превозното средство (напр. светлинна греда на покрива, светлини
        в решетката).
    emergency_lighting_package:
      name: Пакет аварийно осветление
      description: Посочва типовете монтирани аварийни предупредителни светлини.
    emissions_compliance_standard:
      name: Стандарт за съответствие с емисионните норми
      description: Посочва сертификацията/съответствието с емисионните стандарти на
        двигателя, когато е приложимо.
    emissions_standard:
      name: Стандарт за емисии
      description: Стандарт за съответствие с емисионните норми на превозното средство
        (варира според региона и годината).
    enclosure_panel_configuration:
      name: Конфигурация на панела на корпуса
      description: Посочва кои панели или страни на заграждението са включени (конфигурация
        на покритието), напр. напълно затворено, само странични завеси или 3-странно
        (отворено отпред/отзад).
    enclosure_window_material:
      name: Материал на прозорците на заграждението
      description: Посочва материала, използван за прозрачните панели на заграждението.
    end_fitting_type:
      name: Тип накрайник
      description: Посочва типа конектор, използван в двата края на подпората (към
        превозното средство и към капака), определящ съвместимостта на монтажа.
    end_type:
      name: Тип край
      description: Посочва типа на завършване/захващане в краищата на ремъка за теглене
        за свързване към точки за възстановяване.
    ends_style_blocking_wires:
      name: Тип край на блокиращите връзки
      description: Описва как са завършени краищата на блокиращата връзка за безопасност
        и по-лесно промушване през отворите за връзки.
    enduro_bike_suspension_adjustability:
      name: Регулируемост на окачването на ендуро велосипед
      description: Посочва кои настройки на окачването са налични (обикновено за предна
        вилка и заден амортисьор).
    engine_bay_mounting_location:
      name: Място на монтаж в двигателния отсек
      description: Посочва къде е предназначен да се монтира разширителният съд в
        двигателния отсек (относителна позиция).
    engine_bearing_coating:
      name: Покритие на лагер на двигател
      description: Посочва повърхностното покритие на лагера (за износоустойчивост,
        по-добро вграждане на частици и намалено триене).
    engine_bearing_position:
      name: Позиция на лагера на двигателя
      description: Указва местоположението/функцията на лагера в двигателя.
    engine_bearing_size:
      name: Размер на лагера на двигателя
      description: Посочва дали лагерът е стандартен размер или вариант с намален/увеличен
        размер (обикновено свързано с шлайфане на коляновия вал и хлабина).
    engine_configuration:
      name: Конфигурация на двигателя
      description: Описва разположението/конфигурацията на цилиндрите на двигателя
        (напр. редови, V-образен, боксерен).
    engine_cooling_type:
      name: Тип охлаждане на двигателя
      description: Посочва метода за охлаждане на двигателя.
    engine_degreaser_form:
      name: Форма на обезмаслителя за двигател
      description: Физическа форма/вид на доставката на обезмаслителя за двигатели.
    engine_degreaser_rinse_requirement:
      name: Изискване за изплакване след използване на обезмаслител за двигатели.
      description: Посочва дали обезмаслителят е предназначен за изплакване с вода
        след нанасяне.
    engine_mount_type:
      name: Тип опора на двигателя
      description: Посочва конструктивния тип на тампона на двигателя (напр. хидравличен,
        твърд, реактивна щанга).
    engine_oil_formulation:
      name: Формула на моторното масло
      description: Посочва основното предназначение на моторното масло, като стандартна
        употреба, за двигатели с голям пробег, удължени интервали за смяна или тежкотоварни
        приложения.
    engine_oil_specification:
      name: Спецификация на моторното масло
      description: Спецификацията/стандартът, на който отговаря маслото (напр. API
        SP, API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Съдържание на комплект за основен ремонт на двигател
      description: Посочва кои основни компоненти са включени в комплекта за основен
        ремонт на двигателя.
    engine_rotation_direction:
      name: Посока на въртене на двигателя
      description: Посочва посоката на въртене на двигателя при морски приложения.
    engine_timing_system_drive_type:
      name: Тип задвижване на ангренажната система
      description: Посочва дали системата за газоразпределение на двигателя е с ремък,
        верига или зъбни колела, за съвместимост и съпоставяне на части.
    engine_valve_coating:
      name: Покритие на клапан на двигател
      description: Посочва всякаква повърхностна обработка или покритие, приложени
        върху клапана за устойчивост на износване/топлина.
    engine_valve_position:
      name: Положение на клапана на двигателя
      description: Посочва дали клапанът на двигателя е предназначен за всмукателната
        или изпускателната страна на двигателя.
    engine_valve_stem_tip_type:
      name: Тип на върха на стеблото на клапана на двигателя
      description: Посочва стила или конструкцията на върха на стеблото на клапана
        в контактната точка с кобилицата или регулиращия механизъм.
    engine_valvetrain_type:
      name: Тип на клапанния механизъм на двигателя
      description: Разположение на клапанния механизъм/разпределителния вал
    enhancement_level:
      name: Ниво на увеличаване
      description: 'Приблизително увеличение на обема, осигурено от подплънката, изразено
        в размери на чашки: леко (до 1 чашка), умерено (1–2 чашки), значително (2+
        чашки).'
    entry_zipper_location:
      name: Местоположение на входния цип
      description: Посочва къде се намира основният входен цип или отвор на костюма
        (напр. отпред, отзад, на рамото, диагонално).
    epee_point_type:
      name: Тип връх за шпага
      description: Посочва марката или стандарта на върха, монтиран на острието, което
        влияе върху съвместимостта и поддръжката.
    equestrian_discipline:
      name: Конна дисциплина
      description: Посочва дисциплината по езда, за която шпората е предназначена
        или най-подходяща.
    equestrian_helmet_safety_certification:
      name: Сертификация за безопасност на каска за езда
      description: Посочва стандартите или сертификатите за безопасност, на които
        отговаря каската.
    equine_application_area:
      name: Област на приложение при коне
      description: Указва областта на тялото или материала, за който е предназначен
        продуктът (напр. копито, грива, конска става).
    equipment_contact_material_brew_wine:
      name: Материал на контактните повърхности на оборудването (за бира/вино)
      description: Основен материал на частта, която влиза в контакт с течността (напр.
        стъкло, неръждаема стомана, пластмаса).
    eu_children_clothing_size:
      name: Европейски размер за детско облекло
      description: Посочва европейския размер на детското облекло според ръста, например
        104 или 140.
    eu_clothing_size:
      name: Европейски размер за облекло
      description: Посочва европейския размер на облеклото, като 38 или 46
    eu_cup_size:
      name: Европейски размер на чашката
      description: Посочва европейския размер на сутиен чашката, например C или E.
    eu_ring_size:
      name: Европейски размер на пръстен
      description: Посочва европейския размер на пръстена по обиколка, например 52
        или 63.
    eu_shoe_size:
      name: Европейски размер на обувки
      description: Посочва европейския размер на обувките (EU), например 42 или 42
        Wide.
    euphonium_included_accessories:
      name: Включени аксесоари за еуфониум
      description: Изброява елементите, които обикновено се включват с еуфониум (напр.
        мундщук, калъф).
    euphonium_valve_configuration:
      name: Конфигурация на клапаните на еуфониума
      description: Посочва броя на клапите и дали 4-тата клапа се управлява с ръка
        или чрез страничен механизъм.
    european_sword_historical_period:
      name: Исторически период на европейския меч
      description: Основен исторически период, на който е базирана репликата/моделът
        на меча (или епохата на оригинала).
    european_sword_pattern_type:
      name: Европейски модел/тип меч
      description: Специфичен европейски модел/тип (типология) на меч, представен
        от колекционерския меч.
    ev_connector_adapter_direction:
      name: Посока на конектора/адаптера за електрически превозни средства
      description: Посочва какво преобразува адаптерът ОТ и КЪМ (страна на входа на
        превозното средство спрямо страна на зарядното/кабела), което позволява точно
        филтриране по съвместимост.
    ev_conversion_kit_completeness_level:
      name: Ниво на комплектност на комплект за конверсия към електрическо задвижване
        на ЕПС
      description: Показва дали продуктът е комплект за пълна конверсия или частичен
        комплект/пакет (напр. само двигател + контролер).
    ev_conversion_kit_drivetrain_configuration:
      name: Конфигурация на задвижването на комплект за конверсия към електромобил
      description: Посочва архитектурата на задвижването при комплект за конверсия
        към електрическо задвижване на ЕПС, включително разположението на електромотора/конфигурацията
        на задвижването и дали се запазва съществуващата трансмисия.
    ev_conversion_kit_voltage_class:
      name: Клас на напрежение на комплект за конверсия към електромобил
      description: Номинален клас на системното напрежение, за който е проектиран
        комплектът за конверсия към електромобил. Използва се за филтриране по стандартни
        класове системно напрежение в допълнение към точното измерване на напрежението.
    evaporator_core_type:
      name: Тип изпарителен (изпарителен радиатор) блок на климатичната система
      description: Посочва конструктивния дизайн на изпарителното ядро на автомобилен
        климатик.
    evenweave_fabric_finish_treatment:
      name: Покритие/обработка на тъкан Evenweave
      description: Посочва предварителна обработка или покритие, приложено към плата,
        което влияе върху обработката или външния вид.
    evenweave_fabric_package_format:
      name: Формат на опаковката на панама
      description: Как се продава платът (нарязано парче или непрекъснато на метър/метри).
    exercise_bike_accessory_part_type:
      name: Тип аксесоар/част за велоергометър
      description: Описва основната функция или типа на компонента на продукта (напр.
        педал, задвижващ ремък, поставка за бутилка, протектор за екран, курбел).
    exercise_bike_cushion_component:
      name: Компонент на седалката за велоергометър
      description: Посочва компонента, свързан със седалката, който е включен, като
        например подплънка за седалка, седло или калъф за седалка.
    exercise_bike_metrics_tracked:
      name: Проследявани показатели за велоергометър
      description: Изброява данните за тренировката, които компютърът може да измерва
        и показва в реално време.
    exercise_mat_accessories_included:
      name: Включени аксесоари за постелка за упражнения
      description: Посочва допълнителните компоненти, включени към постелката, като
        каишки или наколенки.
    exhaust_cooling_type:
      name: Тип охлаждане на изпускателната система
      description: Посочва дали компонентът на изпускателната система е предназначен
        за мокра изпускателна система (с водно охлаждане/впръскване на вода) или суха
        изпускателна система.
    exhaust_installation_position:
      name: Позиция за монтаж на ауспуха
      description: Посочва къде върху превозното средство е монтирана частта.
    exhaust_outlet_configuration:
      name: Конфигурация на изхода на изпускателната система
      description: Посочва разположението на изхода на изпускателната тръба в задната
        част на превозното средство.
    expansion_tank_cap_connection_type:
      name: Тип свързване на капачката на разширителния съд
      description: Механичният тип свързване, използван за закрепване и уплътняване
        на капачката към гърловината на разширителния съд.
    expansion_tank_cap_pressure_relief_feature:
      name: Функция за освобождаване на налягането на капачката на разширителния съд
      description: Дали и как капачката осигурява функция за освобождаване на налягане/вакуум.
    expansion_tank_cap_seal_material:
      name: Материал на уплътнението на капачката на разширителния резервоар
      description: Материал на гарнитурата/уплътнението, което контактува с гърловината
        на разширителния съд.
    extension_attachment_method:
      name: Метод за закрепване на удължението
      description: Посочва как удължението се закрепва към кокпита/кормилото на велосипеда,
        помагайки на колоездачите да потвърдят съвместимостта със съществуващата си
        конфигурация.
    extension_bend_type:
      name: Тип извивка на удължението
      description: Описва геометричния стил или извивка на удължението на кормилото,
        което влияе върху ергономията и аеродинамиката.
    extension_mechanism:
      name: Механизъм на удължението
      description: Описва начина, по който масата се разширява по дължина или площ
        (ако е приложимо).
    extension_table_features:
      name: Характеристики на разтегателната маса
      description: Подчертава функционалните характеристики, специфични за разширителните
        маси за шевни машини.
    eyelet_grommet_installation_method:
      name: Метод за монтаж на капси и втулки
      description: Посочва как капсата/втулката се монтира или закрепва в материала.
    eyewear_lens_shape:
      name: Форма на лещите на очилата
      description: Посочва геометричната форма на лещата, като цилиндрична или сферична,
        което влияе върху зрителното поле, изкривяването и стила.
    eyewear_strap_material:
      name: Материал на каишката на очилата
      description: Посочва материала на регулируемата лента, която закрепва маската
        или очилата към главата на потребителя.
    fabric_backing_type:
      name: Тип подложка на плата
      description: Посочва дали памучният плат за печат включва стабилизираща хартиена
        подложка (и какъв вид), което определя дали може да преминава през стандартни
        принтери.
    fabric_cut_format:
      name: Формат на изрязване на плат
      description: Посочва разкрояването/формата на платното за ръкоделие.
    fabric_end_use:
      name: Предназначение на плата
      description: Посочва основното предназначение на плата (за какво е най-подходящ).
    fabric_finish:
      name: Финиш на плата
      description: Повърхностно покритие/обработка на копринената тъкан, което влияе
        на блясъка, усещането при допир и характеристиките на материала.
    fabric_intended_use:
      name: Предназначение на плата
      description: Основни препоръчителни приложения/проекти за ленения плат.
    fabric_opacity_level:
      name: Ниво на непрозрачност на плата
      description: Показва колко прозрачна е материята, което влияе върху нуждите
        от наслояване и подплата.
    fabric_patch_shape:
      name: Форма на текстилната нашивка.
      description: Описва формата на нашивките, включени в комплекта.
    fabric_repair_kit_application_method:
      name: Метод на приложение на комплект за ремонт на тъкани (как се използва за
        поправка).
      description: Посочва как поправката се прилага върху плата (напр. за гладене,
        за пришиване, самозалепваща).
    fabric_repair_kit_components_included:
      name: Включени компоненти в комплекта за поправка на плат
      description: Изброява конкретните компоненти, включени в комплекта (напр. кръпки,
        конец, игла, лепило).
    fabric_repair_kit_intended_use:
      name: Предназначение на комплекта за ремонт на тъкани
      description: Указва често срещаната задача за ремонт, за която е предназначен
        комплектът (напр. разкъсвания, дупки, подгъване).
    fabric_selling_format:
      name: Формат за продажба на платове
      description: Посочва как се продава платът (непрекъсната дължина, предварително
        изрязано парче, ролка/топ, или мостра).
    fabric_stretch_level:
      name: Ниво еластичност на плата
      description: Описва степента на разтегливост/еластичност на плата, помагайки
        на клиентите да изберат подходящи платове за прилепнали дрехи или структурирани
        проекти.
    fabric_stretch_type:
      name: Тип еластичност на плата
      description: Показва еластичността на плата на шортите, важна за мобилността
        по време на сърф или плуване.
    fabric_texture:
      name: Текстура на плата
      description: Описва усещането на повърхността или плетената структура на плата,
        използван за горнище за домашно облекло.
    fabric_use_case:
      name: Предназначение на плата
      description: Основно предназначение на сатенената тъкан/ролка.
    fabric_weight_class:
      name: Клас на теглото на тъканта
      description: Категоризира фланела по типични групи за употреба, за да помогне
        на купувачите да филтрират, без да знаят точното тегло на GSM/унция.
    face_mask_material:
      name: Материал на маската за лице
      description: Състав на материала на маската за лице, включена в комплекта с
        каската или съвместима с нея.
    face_mask_style:
      name: Стил на маската за лице
      description: Определя общата форма или конструктивен стил на модната маска за
        лице, помагайки на клиентите да намерят предпочитаното прилягане и визия.
    face_mask_style_code:
      name: Код на стила на маската за лице
      description: Определя конструктивния стил на решетката или семейството от индустриални
        кодове на маската за лице (напр. ROPO, OPO, RJOP).
    face_protection_type:
      name: Тип защита за лице
      description: Посочва типа защита за лице, предоставена с или вградена в каската,
        като решетки или визьори.
    faceplate_security_features:
      name: Функции за сигурност на лицевия панел
      description: Обхваща функциите против кражба и функциите за достъп, свързани
        с лицевия панел, извън основния дизайн.
    facing_length:
      name: Дължина на обточната/облицовъчната част
      description: Посочва дължината на извивката на мундщука, което влияе върху реакцията
        и избора на тръстика.
    fan_shroud_type:
      name: Тип кожух на вентилатора
      description: Посочва стила на покритие/геометрията на кожуха на вентилатора
        (напр. пълен, половин или пръстеновиден).
    farming_method:
      name: Метод на земеделие
      description: Подчертава практиките за хуманно отношение или отглеждане на животните,
        използвани при отглеждането им, като свободно отглеждане или органично производство.
    farming_practice:
      name: Земеделска практика
      description: Посочва основния метод на отглеждане, използван за продукта (напр.
        конвенционален, органичен, хидропонен).
    fascinator_style:
      name: Стил на фасинатор
      description: Описва конструктивния дизайн или формата на фашинатора, за да могат
        потребителите бързо да филтрират по популярни стилове дамски шапки.
    fastener_grade:
      name: Клас на крепежния елемент
      description: Показва степента/класа на якост на болта, като например степен
        8 или клас 10.9, който определя товароносимостта
    fat_rendering_state:
      name: Състояние на разтопената мазнина
      description: Посочва дали мазнината е разтопена, неразтопена (сурова) или частично
        разтопена, което влияе върху срока на годност и кулинарните приложения.
    fat_source:
      name: Източник на мазнината
      description: Посочва основния източник на мазнина, използван за производството
        на масло, гхи или маргарин (животински или растителен), подпомагайки филтрирането
        по алергии и хранителен режим.
    faucet_hole_configuration:
      name: Конфигурация на отворите за смесителя
      description: Посочва броя и разположението на предварително пробитите отвори
        за смесител върху плота на мивката/шкафчето.
    feather_application:
      name: Приложение на перата
      description: Основно предназначение или приложение на пуешките пера за изработка
        или занаяти.
    feather_attachment_format:
      name: Приставка/формат на пера
      description: Как синтетичните пера се подготвят/продават за употреба (насипни,
        на нишка, на тиксо и др.).
    feather_coloration_style:
      name: Стил на оцветяване на перата
      description: Описва начина, по който е нанесен/се проявява цветът върху перата
        (напр. едноцветен, боядисани върхове, преливане), независимо от основния цвят.
    feather_component:
      name: Компонент на перото
      description: Посочва коя част/стил на пауновото перо се продава (напр. око на
        перото спрямо стъбло).
    feather_curvature:
      name: Извивка на перото
      description: Общ профил на формата/извивката на перото.
    feather_finish:
      name: Завършек на перото
      description: Посочва дали щраусовите пера са естествени или са обработени (напр.
        боядисани или избелени) за декоративна употреба.
    feather_form:
      name: Форма на перото
      description: Указва физическата форма на продаваните парчета гъши пера.
    feather_grade:
      name: Клас на перото
      description: Общо качество/клас на подбор на перото за употреба в занаяти спрямо
        декорация.
    feather_part:
      name: Част от перото
      description: Частта/структурата на продаваното пуешко перо (често срещано в
        обяви за материали за занаяти и за връзване на мухи).
    feather_processing_type:
      name: Вид обработка на пера
      description: Как перата са били обработени/третирани за употреба в занаяти (напр.
        боядисани, избелени, естествени/небоядисани).
    feather_product_form:
      name: Форма на продукта от пера
      description: Физическата форма/разкрой на продукта от пера, в който се продава
        (напр. свободни пера, боа, ресни).
    feather_quantity_unit:
      name: Единица за количество пера
      description: Определя как се продава продуктът (например на брой, на тегло,
        на връзки), за да се осигури възможност за точно сравнение между различните
        обяви.
    feather_source:
      name: Произход на перата
      description: Посочва животинския произход на перата, използвани в перата за
        бадминтон
    feather_stiffness:
      name: Твърдост на перата
      description: Относителна твърдост/коравина на структурата на перата.
    feed_mechanism:
      name: Механизъм за подаване
      description: Посочва как топките се подават към машината за подаване.
    feed_purpose:
      name: Предназначение на фуража
      description: Описва основната хранителна или функционална цел на фуража или
        добавката.
    feeder_mechanism_type:
      name: Тип механизъм на хранилката
      description: Посочва механизма за дозиране, който хранилката използва за освобождаване
        на фуража.
    feijoa_cultivar:
      name: Сорт фейхоа
      description: Посочва конкретния сорт или разновидност на фейхоа, тъй като различните
        сортове предлагат различен вкус, размер и период на реколта.
    felt_duty:
      name: Клас на филца
      description: Посочва класификацията на филца на тенис топката (напр. за твърди
        настилки, за стандартни/меки настилки), която влияе върху издръжливостта на
        различни настилки.
    felting_mold_intended_use:
      name: Предназначение на формите за плъстене
      description: Предназначение на формата/калъпа в проекти за филцоване (какъв
        обект или изделие се изработва с нея).
    felting_pad_surface_material:
      name: Повърхностен материал на подложката за филцоване
      description: Материал, използван върху работната повърхност на подложката/постелката
        за сухо плъстене, която влиза в контакт с влакното/иглата.о/иглата.
    fencing_certification:
      name: Сертификация за фехтовка
      description: Изброява официалните одобрения от ръководни организации, на които
        отговаря фехтовалното оръжие (напр. FIE, USFA), което показва законност за
        състезания и стандарти за качество.
    fencing_connector_type:
      name: Тип конектор за фехтовка
      description: Посочва конфигурацията на конектора, използвана за свързване на
        фехтовални кабели, гнезда или макари (напр. 2-пинов, 3-пинов, байонетен),
        осигурявайки съвместимост на компонентите.
    fencing_discipline:
      name: Дисциплина по фехтовка
      description: Посочва фехтовалното оръжие или дисциплина, за които продуктът
        е предназначен или с които е съвместим.
    fencing_weapon_type:
      name: Тип фехтовално оръжие
      description: Посочва стила на фехтовалното или тренировъчното оръжие, с което
        тренировъчното средство е съвместимо или което представлява, помагайки на
        потребителите да намерят подходяща екипировка.
    fender_finish_state:
      name: Състояние на финиша на калника
      description: Посочва доставеното състояние на повърхността/финиша на калника
        за готовност за боядисване и монтаж.
    fender_pieces_included:
      name: Включени елементи на калника
      description: Изброява компонентите, включени с продукта, за да се уточни дали
        е единичен калник или пълен комплект с аксесоари.
    fender_type:
      name: Тип калник
      description: Класифицира цялостния дизайн или стил на калника.
    fennel_trimming:
      name: Подрязване на копър
      description: Посочва кои части на растението са включени с главата копър (напр.
        с листа, подрязани връх и корен).
    fennel_variety:
      name: Сорт копър
      description: Посочва култиварния или пазарния сорт на продаваните луковици резене.
    fermentation_application:
      name: Приложение на ферментацията
      description: Посочва основната храна или напитка, за която е предназначена културата
        за ферментация (напр. сирене, кисело мляко, кефир, закваска за хляб).
    fermentation_method:
      name: Метод на ферментация
      description: Посочва как е произведен или ферментирал соевият сос (напр. естествено
        ферментирал, химически хидролизиран).
    fermentation_vessel_material:
      name: Материал на съда за ферментация
      description: Основен материал на съда за ферментация, включен в комплекта (ако
        има такъв).
    ferrule_material:
      name: Материал на ферулата
      description: Посочва материала, използван за ферулата на щеката (напр. Juma,
        Phenolic, Polycarbonate, XTC или без ферула), което влияе върху издръжливостта
        и усещането при удар.
    fia_homologation_certification:
      name: FIA хомологация/сертификация
      description: Показва дали автомобилът (или клетката за безопасност) е сертифициран/хомологиран
        и по какъв стандарт.
    fiber_animal_source_type:
      name: Тип животно/източник на влакното
      description: Животинският или основният източник на ровинга (или синтетичен),
        например мериносова вълна, алпака или растителни влакна.
    fiber_luster_level:
      name: Ниво на блясък на влакната
      description: Визуален блясък на влакното, вариращ от матов до силно лъскав.
    fiber_preparation_processing_stage:
      name: Етап на подготовка/обработка на влакната
      description: Показва как снопът влакна е подготвен/обработен за употреба (напр.
        кардиран, сресан, смесен, superwash).
    fiber_preparation_type:
      name: Тип подготовка на влакното
      description: Посочва как влакното е подготвено за ръкоделие (напр. кардиран
        пласт, барабанно кардирано, предварително сплъстен лист).
    field_hockey_ball_playing_surface:
      name: Игрална настилка за хокей на трева
      description: Идентифицира игралната повърхност или средата, за която е предназначена
        топката.
    field_hockey_ball_type:
      name: Тип топка за хокей на трева
      description: Категоризира топката за хокей на трева според предназначението
        ѝ или специалната ѝ характеристика.
    field_hockey_goal_size_standard:
      name: Стандартен размер на вратата за хокей на трева
      description: Класифицира вратата според стандартните размери за хокей на трева
        или тренировъчни размери (напр. FIH стандарт за открито, детски, мини).
    field_hockey_training_objective:
      name: Цел на тренировката по хокей на трева
      description: Определя основното умение или област на фокус, които тренировъчното
        средство е предназначено да подобрява.
    field_point_attachment_method:
      name: Метод за закрепване на полевия връх
      description: Посочва как полевият връх е фиксиран към стрелата или вложката
        (напр. завинтващ се, залепващ се).
    field_point_tip_style:
      name: Тип връх на полевия накрайник
      description: Определя геометричния стил или функционалния профил на върха на
        стрелата, който влияе на проникването, усилието за изваждане и допустимостта
        според правилата.
    fielding_glove_position:
      name: Позиция на бейзболната ръкавица при защита
      description: Идентифицира защитната позиция или употребата, за която е предназначена
        ръкавицата при игра на бейзбол или софтбол.
    fielding_training_focus:
      name: Фокус на тренировките за защита
      description: Посочва основното умение, към което е насочено помощното средство
        по време на тренировъчните сесии.
    fig_variety:
      name: Сорт смокиня
      description: Идентифицира конкретния сорт или разновидност смокини, който се
        продава
    figure_8_device_design:
      name: Конструкция на осмица
      description: Определя конкретната конфигурация на устройството тип осмица, която
        влияе върху характеристиките при работа и предназначението му.
    figure_finish_type:
      name: Тип покритие на фигурката
      description: Показва повърхностното покритие/боята на фигурката на кон (как
        изглежда/се усеща като колекционерска фигурка).
    figurine_scale:
      name: Мащаб на фигурките
      description: Мащаб/съотношение на фигурката спрямо реалния обект (когато е приложимо),
        напр. 1:6.
    fill_status:
      name: Състояние на запълване
      description: Посочва дали тренировъчният манекен за борба се продава напълнен,
        ненапълнен или частично напълнен, което определя разходите за доставка и усилията
        на купувача.
    filling_consistency:
      name: Консистенция на пълнежа
      description: Описва текстурата или вискозитета на пълнежа във вида, в който
        се доставя (напр. гладък крем, плодове на парчета, паста).
    filling_type:
      name: Вид пълнеж
      description: Посочва основния пълнеж или крем вътре в бисквитките, ако има такъв.
    filtration_and_mother_status:
      name: Статус на филтрация и наличие на оцетна култура
      description: Посочва дали оцетът е филтриран, нефилтриран, суров или съдържа
        оцетна култура, насочено към потребители, търсещи пробиотични или сурови продукти.
    filtration_method:
      name: Метод за филтрация
      description: Материал или техника, използвани за филтриране и пречистване на
        водката след дестилация.
    fin_box_system:
      name: Система на кутията за финка
      description: Посочва типа кутия за финка или монтажен интерфейс, използван от
        дъската, което определя съвместимостта с допълнителни финки.
    fin_buoyancy:
      name: Плаваемост на перките
      description: Показва дали плавникът е с положителна, неутрална или отрицателна
        плаваемост във водата, което влияе върху трима и баланса на екипировката на
        гмуркача.
    fin_flex_rating:
      name: Степен на гъвкавост на плавника
      description: Посочва относителната твърдост или ниво на гъвкавост на финката,
        което влияе върху цялостното представяне.
    fin_mounting_system:
      name: Система за монтаж на финките
      description: Определя интерфейса за закрепване или стандарта, използван за монтиране
        на финката към кайтборда (напр. FCS II, завинтване, 4 отвора), осигуряващ
        съвместимост между финки и дъски.
    fin_position:
      name: Позиция на перката
      description: Посочва предназначената позиция за монтаж на финката върху дъската.
    fin_strap_type:
      name: Тип каишка за финки
      description: Посочва стила на каишката или задържащата система, използвана за
        закрепване на плавника към петата/крака.
    fin_template:
      name: Шаблон на перката
      description: Категоризира хидродинамичния профил или форма на сърф финката,
        което влияе върху стила на завиване, скоростта и цялостното усещане при каране.
    finger_count:
      name: Брой пръсти
      description: Посочва за колко пръста е предназначена ръкавицата, езичето или
        ръкохватката за освобождаване.
    finger_coverage:
      name: Покритие на пръстите
      description: Посочва каква част от пръстите е покрита.
    finger_grip_adjustability:
      name: Регулиране на хватката с пръсти
      description: Посочва как захватът за пръсти се закрепва или регулира, за да
        пасва на различни размери ръце.
    finger_hole_configuration:
      name: Конфигурация на отворите за пръсти
      description: Посочва ориентацията на ръката за отворите за пръсти (за дясна
        ръка, лява ръка или универсално).
    finger_hole_count:
      name: Брой дупки за пръсти
      description: Посочва броя отвори за пръсти в кожената ръкохватка, което е ключова
        разлика в стила между модели без пръсти, с 2, 3 или 4 отвора.
    finger_pick_band_style:
      name: Стил на лентата на перцето за пръсти
      description: Стилът на лентата/примката, която се прикрепя към пръста, влияещ
        върху комфорта и регулирането.
    finger_pick_blade_length:
      name: Дължина на перцето за пръсти
      description: Дължина на перцето за свирене, което се подава извън лентата
    finger_pick_blade_shape:
      name: Форма на острието на перцето за пръст
      description: Форма/профил на перцето за свирене (пластината), което контактува
        със струните.
    finger_pick_size:
      name: Размер на перцето за пръст
      description: Размер на лентата/примката на пръстовото перце за пасване на различни
        обиколки на пръсти или палец (не размер на инструмента).
    finger_pick_wear_location:
      name: Позиция за носене на перцето за пръст
      description: Посочва на кой пръст е предназначено да се носи пръстовото перце
        или дали продуктът е комплект за палец и пръсти.
    finger_protection:
      name: Защита на пръстите
      description: Посочва дали ръкавицата включва защита на ставите на пръстите и
        дали протекторите са подвижни.
    fingerboard_bearing_type:
      name: Тип лагери на фингърборд
      description: Посочва типа лагер, използван в колелцата на грифа.
    fingerboard_grip_type:
      name: Тип сцепление на фингърборда
      description: Указва материала/типа на повърхността за хващане, използвана на
        грифа.
    fining_agent_active_ingredient:
      name: Активна съставка на избистрящия агент
      description: Основен избистрящ или пречистващ агент, използван в продукта.
    fining_agent_type:
      name: Тип избистрящ агент
      description: Определя химичния състав или материала на средствата за филтриране/избистряне,
        използвани за избистряне на червено вино.
    finish_after_baking:
      name: Финално покритие/завършек след изпичане
      description: Описва типичния външен вид на повърхността след втвърдяване/изпичане.
    finish_effect:
      name: Ефект на покритието
      description: Описва специални повърхностни/оптични ефекти, приложени върху кристала.
    finish_type:
      name: Тип покритие
      description: Повърхностно покритие, нанесено върху тялото на укулелето.
    finished_product_format:
      name: Формат на готовия продукт
      description: Посочва типа ароматен продукт, който комплектът е предназначен
        да изработва.
    fire_pit_accessories_included:
      name: Включени аксесоари за огнище
      description: Посочва основните аксесоари, включени към огнището, като искроуловител
        или вулканични камъни, за да се изясни какво е включено в комплекта.
    firework_assortment_launch_type:
      name: Посочва типа изстрелване на асортимента от фойерверки
      description: Описва как включените фойерверки обикновено се запалват/изстрелват.
    firework_assortment_types_included:
      name: Включени типове фойерверки
      description: Определя основните типове фойерверки, включени в асортимента, за
        да помогне на купувачите да сравняват съдържанието на комплектите (напр. фонтани,
        римски свещи, пиратки).
    firework_effect_types:
      name: Типове фойерверк ефекти
      description: Основни визуални и/или сензорни ефекти, създавани от асортимента
        (изберете всички приложими).
    firework_ignition_method:
      name: Метод за запалване на фойерверки
      description: Посочва начина на запалване или задействане на фойерверка (напр.
        фитил или електрически запалител).
    firework_visual_intensity_level:
      name: Ниво на визуална интензивност на фойерверка
      description: Обща визуална интензивност/обем на искрите при ефект тип фонтан.
    firing_mode:
      name: Режим на стрелба
      description: Изброява избираемите или основните режими на стрелба, които airsoft
        оръжието поддържа.
    first_day_cover_cachet_type:
      name: Вид на печата на обложката на новоиздадени марки
      description: Вид на печата върху обложката от първия ден (напр. печатен, ръчно
        рисуван).
    first_day_cover_cancellation_type:
      name: Тип гашение на първодневен плик
      description: Тип/стил на пощенското гасене, приложено върху плика за първи ден
        (напр. машинно гасене, ръчно гасене).
    first_day_cover_set_type:
      name: Тип комплект на пликове с първодневно клеймо.
      description: Посочва дали пликът представлява единично издание, пълен комплект
        или частичен/комбиниран комплект.
    fishing_hook_size:
      name: Размер на риболовната кука
      description: 'Посочва стандартизирания размер на риболовната кука (напр. #4,
        1/0, 10/0), който помага на риболовците да съобразят размера на куката с целевите
        видове и стръвта.'
    fishing_hook_style:
      name: Стил на куката за риболов
      description: Идентифицира специфичния дизайн или модела на огъване на единичната
        кука, което влияе върху представянето, ефективността при закачане и предназначението.
    fishing_hook_type:
      name: Тип на куката за риболов
      description: Описва конфигурацията на куката, доставяна с риболовната блесна
        (ако има такава).
    fishing_line_application:
      name: Приложение на риболовното влакно
      description: Посочва предназначението на риболовното влакно или поводния материал
        (напр. повод, основно влакно, типет).
    fishing_line_buoyancy_type:
      name: Тип плаваемост на риболовното влакно
      description: Класифицира как влакното се държи във водния слой (напр. плаващо,
        междинно, потъващо), помагайки на риболовците да изберат подходяща дълбочина
        на представяне.
    fishing_needle_purpose:
      name: Предназначение на риболовната игла
      description: Посочва основното приложение на иглата при монтаж на риболовни
        такъми.
    fishing_needle_types_included:
      name: Включени типове риболовни игли
      description: Изброява конкретните типове игли или инструменти за монтаж, включени
        в комплекта, за да могат клиентите бързо да видят съдържанието му.
    fit_profile:
      name: Профил на прилягане
      description: Описва цялостната кройка и силует на протектора/пада, което влияе
        на подвижността и покритието.
    fit_volume_classification:
      name: Класификация на вътрешния обем при прилягане
      description: Категоризира общия вътрешен обем на обувката според означенията,
        използвани от производителите (напр. LV за нисък обем).
    fitting_angle:
      name: Ъгъл на монтаж
      description: Посочва ъгъла на огъване на фитинга (напр. прав, 45°, 90°). Използвайте
        „Регулируем / въртящ се“ за фитинги с променлив ъгъл и „Друг“ за нестандартни
        ъгли.
    flag_base_type:
      name: Тип основа на флага
      description: Определя стила на закрепване или основата, използвани за фиксиране
        на ъгловото знаме върху различни игрални настилки.
    flag_design_theme:
      name: Тема за дизайн на флаг
      description: Описва основната тема на дизайна, представена на флага (напр. държава/националност,
        спортен отбор, празник), като подпомага откриването и филтрирането при пазаруване
        според намерението.
    flag_mounting_method:
      name: Метод за монтаж на флага
      description: Посочва как флагът се закрепва към превозното средство (напр. монтаж
        към антена, теглич, магнитно закрепване).
    flag_type:
      name: Тип на флага
      description: Класифицира конкретното предназначение или стил на голф флага,
        като флаг за дупка, флаг за количка или тренировъчен флаг.
    flame_resistance_standard:
      name: Стандарт за огнеустойчивост
      description: Посочва конкретния стандарт/сертификация за огнеустойчивост или
        защита от електрическа дъга, на който отговаря облеклото.
    flamenco_cajon_snare_system:
      name: Тип система за снара при фламенко кахон
      description: Указва вътрешния механизъм на пружините, използван за създаване
        на характерния фламенко ефект (или липсата му).
    flammability_compliance:
      name: Съответствие със стандартите за запалимост
      description: Посочва приложимия(ите) стандарт(и) за запалимост, на който отговаря
        тъканта за интериори на превозни средства.
    flannel_brushing_finish:
      name: Тип мъхест финиш на фланела
      description: Посочва дали фланелът е мъхест и от коя страна/страни, което влияе
        върху мекотата, топлината и външния вид.
    flannel_use_type:
      name: Тип предназначение на фланела
      description: Основно предназначено приложение за фланелен разрез/болт.
    flap_configuration:
      name: Конфигурация на седловите крила
      description: Посочва типа на полата на седлото (флапа), като например монофлап
        или двоен флап.
    flare_color:
      name: Цвят на сигналния огън
      description: Цвят на излъчваната светлина/пламък (или цвят на лещата при LED
        сигнални светлини).
    flash_card_included_features:
      name: Включени функции на флаш картата
      description: Подчертава функционалните характеристики за обучение/употреба,
        включени във флаш картите.
    flavor_intensity:
      name: Интензивност на вкуса
      description: Посочва колко концентриран е овкусителят, помагайки на потребителите
        да определят подходящата дозировка (напр. стандартна сила, супер концентрат).
    flavor_solvent_base:
      name: Основа на разтворителя за овкусителя
      description: Посочва основния носител или разтворител, използван за овкусяване
        (напр. алкохол, пропиленгликол, глицерин).
    fleece_fiber_animal_type:
      name: Тип животно, от което е добито полареното влакно.
      description: Животинският източник на влакната от руно (вид).
    fleece_finish_surface:
      name: Финиш/повърхност на руното
      description: Описва повърхностната обработка/финиша на поларената материя (напр.
        антипилинг, четкан), което влияе върху образуването на топчета, мекотата и
        външния вид.
    fleece_preparation_method:
      name: Метод за подготовка на руното
      description: Как руното е подготвено/обработено за предене и ръкоделие (състояние
        на влакното).
    flesh_color:
      name: Цвят на месестата част
      description: Посочва цвета на вътрешната месеста част на пъпеша.
    fletching_orientation:
      name: Ориентация на оперението
      description: Посочва как перата на стрелата са разположени върху вала (напр.
        право, с отместване, спираловидно), което влияе върху въртенето и полета на
        стрелата.
    fletching_profile:
      name: Профил на перата на стрелата
      description: Определя геометричната форма или изрязване на перата, което влияе
        върху съпротивлението, просвета, шума и общите характеристики на полета на
        стрелата.
    flight_system_type:
      name: Тип система за пера
      description: Определя конструктивния стил на перата, като разграничава сгъваеми,
        формовани и интегрирани системи перо-вал.
    float_attachment_method:
      name: Начин на закрепяне на плувката
      description: Описва как плувката е закрепена към кордата (напр. с плъзгаща се
        или фиксирана), което позволява на рибарите да филтрират по стил на такелаж.
    float_design:
      name: Дизайн на плувката
      description: Класифицира общия стил или тип на риболовната плувка (напр. топче-плувка,
        ваглер, моливна плувка), за да могат риболовците бързо да изберат модел според
        техниката и условията.
    float_raft_use_environment:
      name: Среда за използване на поплавък/сал
      description: Основна предназначена водна среда за надуваемия продукт (басейн,
        спокойни открити води или сърф), отразяваща очакванията за издръжливост и
        дизайн.
    floatation:
      name: Плавателност
      description: Дали маякът е проектиран да плава във вода.
    floor_construction_type:
      name: Вид конструкция на пода
      description: Определя дизайна на пода на рафта (напр. самоизливане, Drop-stitch),
        който влияе върху дренажа, твърдостта и ефективността.
    floor_design:
      name: Дизайн на пода
      description: Стил на подовото покритие, включено с шатрата.
    floor_inclusion:
      name: Включен под
      description: Посочва дали вестибюлът включва под и дали този под е подвижен.
    floor_mat_cleaning_method:
      name: Метод за почистване на подовата постелка
      description: Показва препоръчителния от производителя основен метод за почистване
        на постелката за пода.
    floor_mat_edge_style:
      name: Стил на ръба на подовата постелка
      description: Описва дали постелката има повдигнати ръбове/борд за задържане
        на течности и замърсявания.
    floor_mat_format:
      name: Формат на подовата постелка
      description: Определя физическия формат или стил на продукта за подова защита
        (напр. единична постелка, сглобяема плочка, ролка).
    floor_mat_retention_system:
      name: Система за закрепване/фиксиране на автомобилни стелки.
      description: Посочва метода, използван за фиксиране на постелката на място.
    floor_mat_set_configuration:
      name: Конфигурация на комплекта подови постелки
      description: Показва кои позиции са включени в пакета (напр. само предна двойка,
        пълен комплект).
    floss_sugar_granulation_grade:
      name: Степен на финост на захарта за захарен памук
      description: Описва размера на кристалите в захарната смес (фина, средна, едра),
        което може да повлияе върху работата на машината и крайната текстура.
    floss_sugar_product_form:
      name: Форма на продукта за захарен памук
      description: Посочва дали захарта за захарен памук е готова за употреба, ароматизиран
        концентрат, който трябва да се смеси с базова захар, или безцветна базова
        захар.
    flour_grind_texture:
      name: Текстура на смилане на брашното
      description: Посочва степента на смилане или текстурата на брашното, като супер
        фино, средно, едро или каменно смляно, което може да повлияе върху резултатите
        при готвене.
    flour_processing_method:
      name: Метод на обработка на брашното
      description: Описва забележими методи на обработка или третиране, приложени
        към брашното (напр. каменно смляно, избелено, покълнало, обогатено), които
        влияят върху вкуса, цвета или хранителната стойност.
    flower_care_instructions:
      name: Инструкции за грижа за цветята
      description: Предоставя препоръчителни стъпки за грижа, специфични за свежо
        отрязани цветя (напр. подрязване на стъблата, честота на смяна на водата).
    flugelhorn_leadpipe_material:
      name: Материал на оловната тръба на флюгелхорн
      description: Материал на тръбата (ако е посочен отделно от общия материал на
        инструмента).
    flugelhorn_trigger_type:
      name: Тип спусък на флюгелхорн
      description: Посочва дали флюгелхорнът включва настройващ спусък и кой шибър/клапан
        управлява.
    fluorescence_grade:
      name: Степен на флуоресценция
      description: Показва интензитета на флуоресценцията на диаманта, когато е изложен
        на UV светлина.
    fluorescence_under_uv:
      name: Флуоресценция под UV светлина
      description: Посочва дали и какъв вид флуоресценция показва образецът под ултравиолетова
        светлина.
    fluorocarbon_content:
      name: Съдържание на флуоровъглерод
      description: Посочва дали ваксата съдържа флуоровъглеродни добавки и в какво
        количество.
    flute_case_capacity:
      name: Капацитет на калъфа за флейта
      description: Посочва за какво е предназначен калъфът, освен за основната флейта
        (напр. флейта + пиколо, допълнителна глава).
    flute_cleaning_rod_tip_type:
      name: Тип връх на пръчката за почистване на флейта
      description: Описва дизайна на края на пръчката, който държи кърпата/тампона
        или контактува с инструмента (напр. прорязан, с резба, с ухо).
    flute_footjoint_type:
      name: Тип долна част (футджойнт) на флейтата.
      description: Посочва конфигурацията на долното коляно на флейтата.
    flute_headjoint_cork_type:
      name: Тип корк на главата на флейтата
      description: Посочва материала/типа на корковата тапа или стоперния механизъм,
        включени към главата на флейтата.
    flute_key_system:
      name: Клавишна система на флейтата
      description: Определя механичната/клапанната система, използвана от флейтата
        (напр. система Boehm), когато е приложимо.
    flute_keywork_material:
      name: Материал на клашияите на флейтата
      description: Материал и/или покритие на клапаните, когато са посочени отделно
        от материала на корпуса.
    flute_offset_g:
      name: Изнесено сол на флейтата
      description: Посочва дали флейтата има изнесена клапа сол.
    flute_wall_thickness:
      name: Дебелина на стената на флейтата
      description: Категория на дебелината на стената на гофрираната тръба (тънкостененна,
        стандартна, дебелостенна).
    fly_pattern_type:
      name: Тип модел на мухата
      description: Класифицира изкуствената муха според стила за риболов или имитацията
        на насекомо/храна, за да помогне на риболовците бързо да филтрират правилния
        тип муха.
    fly_rod_style:
      name: Стил на въдица за мухарка
      description: Класифицира въдицата според предназначението ѝ за замятане (напр.
        едноръчна, двуръчна, комбинирана).
    fly_style:
      name: Стил на отвора
      description: Посочва типа преден отвор или закопчаване на долнище тип long john.
    fly_tying_tools_included:
      name: Включени инструменти за връзване на мухи
      description: Изброява конкретните инструменти за връзване на мухи, включени
        в комплекта, за да знаят купувачите точно какво е включено и да могат да сравняват
        комплектите.
    fly_type:
      name: Тип муха
      description: Посочва дали долнището тип long john включва функционален преден
        отвор и какъв е неговият тип.
    flyer_hook_mounting_method:
      name: Метод за монтаж на кука за папка
      description: Как куката се закрепва към папката (напр. чрез завиване или чрез
        притискане), което влияе върху монтажа и съвместимостта.
    flyer_hook_orientation:
      name: Ориентация на куката тип „флаер“
      description: Дали куката е предназначена за лявата или дясната страна на папката,
        или е универсална/обръщаема.
    flyer_kit_finish_coating:
      name: Покритие/финиш на комплект папки
      description: Повърхностно покритие, приложено върху компонентите на комплекта
        папки.
    flyer_kit_included_components:
      name: Включени компоненти в комплекта папки
      description: Идентифицира кои части са включени в комплекта.
    flyer_orifice_type:
      name: Тип отвор на папката
      description: Указва стила на отвора, използван на флаера.
    flying_disc_feature_set:
      name: Набор от функции за летящ диск
      description: Забележими функционални характеристики на летящия диск.
    flysheet_material:
      name: Материал на чертожния филм
      description: Посочва основната тъкан, използвана за външния тент/външното покривало,
        която влияе на теглото, издръжливостта и устойчивостта на атмосферни условия.
    flywheel_balance_type:
      name: Тип баланс на маховика
      description: Показва дали маховикът е в неутрално положение или използва външна
        небалансирана тежест.
    foam_blocks_size_class:
      name: Размерен клас на блокчетата от пяна
      description: Посочва общия размерен клас на блокчетата в комплекта.
    foam_blocks_surface_texture:
      name: Повърхностна текстура на дунапреновите блокове.
      description: Описва усещането/покритието на външната повърхност на дунапреновите
        блокове.
    foam_surface_effect:
      name: Повърхностен ефект на дунапрена
      description: Описва често срещани декоративни повърхностни ефекти, прилагани
        върху занаятчийска пяна или стиропор, като блясък, металик или холографски
        завършек.
    foil_color:
      name: Цвят на фолиото
      description: Посочва акцентния цвят на фолиото, използван върху сертификата
        (ако е приложимо).
    foil_curtain_mounting_method:
      name: Метод за монтаж на фолиева завеса
      description: Как е предназначена да бъде монтирана или окачена завесата от фолио
        (напр. самозалепваща лента, капси).
    foil_discipline:
      name: Дисциплина за хидрофойл
      description: Определя основния стил на каране или дисциплина, за която е предназначен
        хидрофойлът.
    foil_mast_board_mounting_type:
      name: Тип монтаж на мачтата на хидрофойла
      description: Определя интерфейса в горната част на мачтата, който се свързва
        с дъската или релсата на фолиото.
    foil_mast_fuselage_connection_type:
      name: Тип връзка между мачтата и фюзелажа на хидрофойла
      description: Посочва начина, по който мачтата се свързва с фюзелажа или предното
        крило.
    foil_mounting_interface:
      name: Интерфейс за монтаж на крилото
      description: Определя стандарта на свързване, който частта използва за закрепване
        към дъската или други компоненти на хидрофойла.
    foil_mounting_system:
      name: Система за монтаж на крилото
      description: Посочва монтажния интерфейс за хидрофойли или плавници върху дъската,
        осигурявайки съвместимост със съществуващия хардуер на водача.
    foil_mounting_type:
      name: Тип монтаж на крилото
      description: Посочва интерфейсната система за закрепване на фолиото към дъската,
        която осигурява съвместимост между компонентите.
    fold_over_elastic_application:
      name: Приложение на прегъващ се ластик
      description: Основно предназначение/приложение на ластик за илици.
    foldability:
      name: Сгъваемост
      description: Описва дали и как разделителят се сгъва или прибира за съхранение
        или преконфигуриране.
    foldability_stow:
      name: Сгъваемост (процес на складиране)
      description: Дали стойката се сгъва/прибира, когато не се използва (напр. сгъва
        се към превозното средство).
    folding_style:
      name: Стил на сгъване
      description: Посочва как постелката за приземяване се сгъва за транспорт и съхранение,
        което влияе върху равномерността на повърхността при приземяване и удобството
        за пренасяне.
    food_basket_items_included:
      name: Включени артикули в кошницата с храна
      description: Изброява основните видове хранителни продукти, включени в кошницата,
        за да помогне на купувачите да изберат кошници според вкусовете или хранителните
        нужди на получателите.
    food_coloring_form:
      name: Форма за оцветяване на храна
      description: Посочва физическата форма или вид на доставката на хранителния
        оцветител (напр. гел, течност, прах, спрей).
    food_contact_material:
      name: Материал, който е предназначен за контакт с храна
      description: Основен материал на оборудването за винопроизводство (ферментатори,
        сифони, фунии), използвано с мъст/вино.
    food_packing_medium:
      name: Материал за опаковане на храни
      description: Указва средата, в която са опаковани плодовете или зеленчуците
        (напр. вода, саламура, сироп, олио).
    foosball_rod_type:
      name: Тип пръчка на футболна маса
      description: Показва механичната конфигурация на пръчката, която влияе върху
        усещането и безопасността при игра.
    foot_arch_type_compatibility:
      name: Съвместимост с тип свод на стъпалото
      description: Определя профила на свода на стъпалото, за който е предназначена
        стелката.
    foot_arch_type_suitability:
      name: Съвместимост с тип свод на стъпалото
      description: Идентифицира кой профил на свода на стъпалото е предназначен да
        поддържа стелката.
    foot_coverage:
      name: Покритие на краката
      description: Посочва дали клинът/долнището е със стъпало, без стъпало, със стреме
        или с отворена пета.
    foot_guard_type:
      name: Тип протектор за стъпало
      description: Посочва дали протекторът за крак включва предпазител за пръстите/стъпалото
        и дали той е фиксиран или подвижен.
    foot_support_level:
      name: Ниво на опора за стъпалото
      description: Посочва нивото на структурна опора или твърдост, което осигурява
        подложката за обувки, като ниско, средно, високо или много високо.
    footbag_play_style:
      name: Стил на игра с топка за хек
      description: Основен предназначен стил на игра с футбег.
    football_ball_type:
      name: Тип футболна топка
      description: Посочва основното предназначение или контекст на използване на
        футболната топка, като игра, тренировка или колекционерско излагане.
    football_dummy_type:
      name: Тип тренировъчен манекен за американски футбол
      description: Класифицира стила или функционалния дизайн на тренировъчния манекен
        според конкретната му тренировъчна цел.
    football_glove_certification:
      name: Сертификация на футболни ръкавици
      description: Посочва сертификацията или стандартите за съответствие, изисквани
        за състезателна игра (напр. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Тип монтаж на таблата за крака
      description: Указва как таблото за крака се прикрепя към Frame на леглото или
        пода, като помага на купувач при избора на съвместим хардуер и методи за инсталиране.
    footboard_style:
      name: Стил на таблата за крака
      description: Определя структурния или естетическия стил на дизайна на подложката
        за крака.
    footrest_adjustability:
      name: Регулируемост на поставката за крака
      description: Посочва дали и как опорите за крака могат да се регулират, за да
        пасват на различна дължина на детските крака.
    footrest_type:
      name: Тип поставка за крака
      description: Определя наличието и дизайна на поставка за крака на табуретката.
    footstrap_configuration:
      name: Конфигурация на каишката за крака
      description: Посочва схемата на разположение на монтажните точки за каишките
        за крака върху горната част на дъската
    footswitch_action_style:
      name: Стил на действие на крачния превключвател
      description: Показва дали действието на превключвателя е моментно или заключващо
        и дали поддържа и двете.
    footswitch_power_source:
      name: Захранване на крачен превключвател
      description: Посочва начина на захранване на крачния превключвател, ако е приложимо
        (пасивно чрез вход на усилвател, батерия, външен адаптер, USB и др.).
    footwear_construction_method:
      name: Метод за изработка на обувки
      description: Определя техниката, използвана за прикрепяне на горната част към
        подметката, което влияе върху издръжливостта, възможността за подмяна на подметката
        и цената.
    footwear_cut:
      name: Височина на обувката
      description: Посочва височината около глезена (ниска, средна, висока), балансирайки
        мобилност и опора.
    footwear_size_system:
      name: Система за размери на обувки
      description: Определя регионалния стандарт за размери, използван за посочения
        номер обувки (напр. US, EU, UK).
    footwear_support_type:
      name: Тип опора на обувката
      description: Посочва биомеханичната опора или степента на контрол на пронацията,
        която обувката осигурява (напр. неутрална, стабилизираща, с контрол на движението).
    fork_material:
      name: Материал на вилката
      description: Посочва материала, използван за предната вилка на велосипеда, влияещ
        върху твърдостта, теглото и качеството на каране.
    form_factor:
      name: Типоразмер
      description: Основен хардуер форм фактор на DMX администратора.
    formula_car_series_class:
      name: Серия/клас на болидите от Формула
      description: Посочва състезателната серия или клас, за участие в които е конструиран
        болидът от Формула.
    formulation_style:
      name: Стил на формулиране
      description: Подчертава специализирани формули, предназначени за конкретни приложения
        или предпочитания (напр. за бариста, с допълнително кремообразна текстура).
    formulation_type:
      name: Тип формула
      description: Тип формула на дезинфекциращия спрей.
    fossil_preparation_level:
      name: Степен на подготовка на фосила
      description: Степен на подготовка/почистване, извършена върху пробата (напр.
        неподготвена в матрица спрямо напълно подготвена).
    fossil_preservation_type:
      name: Тип фосилизация
      description: Тип запазване на фосила (напр. перминерализация, отливка, калъп,
        отпечатък).
    fossil_restoration_status:
      name: Статус на реставрация на фосила
      description: Посочва дали и как образецът е бил ремонтиран/реставриран (напр.
        залепен, реконструиран, композитен).
    foundation_configuration:
      name: Конфигурация на основата
      description: Посочва дали основата е произведена като едно цяло или като разделен/двучастов
        комплект за по-големи размери матраци.
    foundation_profile:
      name: Профил на основата
      description: Класифицира общата височина на основата (напр. ултраниска, ниска,
        стандартна или висока), за да могат потребителите лесно да съобразят предпочитанията
        си за височина на матрака и съвместимостта с чаршафи.
    frame_adjustability:
      name: Регулируемост на рамката
      description: Посочва дали и как рамката може да се регулира (напр. по ширина/височина,
        завъртане/наклон), което влияе върху ергономията и пригодността за проекта.
    frame_drum_jingle_configuration:
      name: Конфигурация на дрънкулките при рамков барабан
      description: Дали рамковият барабан включва звънчета и, ако да — каква е общата
        конфигурация.
    frame_drum_tuning_system:
      name: Система за настройване на рамков барабан
      description: Как се настройва рамковият барабан или дали подлежи на настройване.
    frame_finish:
      name: Покритие на рамката
      description: Посочва защитното покритие или финишното покритие, нанесено върху
        рамката, което влияе върху издръжливостта и външния вид.
    frame_mounting_standard:
      name: Стандарт за монтаж на рамката
      description: Определя спецификацията на интерфейса между обувката и рамката
        (напр. 195 mm двуточково закрепване, Trinity триточково закрепване), критична
        за съвместимостта на рамката.
    frame_steel_gauge:
      name: Дебелина на стоманата на рамката
      description: Посочва дебелината (калибъра) на стоманените тръби, използвани
        за вертикалните елементи на стойката, което е важен показател за здравина
        и стабилност.
    frame_suspension_type:
      name: Тип окачване на рамката
      description: Посочва дизайна на окачването на рамката на велосипеда, като твърда
        рамка, hardtail или пълно окачване, за да помогне на купувачите да изберат
        рамка според предпочитания стил на каране.
    free_reed_instrument_orientation:
      name: Ориентация на езичков инструмент
      description: Указва как се държи/свири инструментът (в ръка с мех, през рамо
        и др.) от гледна точка на ергономичност и филтриране при употреба.
    free_weight_rack_type:
      name: Свободно тегло складов тип стелаж
      description: Класифицира структурния стил или предназначението на стойката (напр.
        стойка за щанга, стойка за гири, стойка за дискове).
    freehub_body_type:
      name: Тип тяло на задната главина
      description: Посочва стандарта на тялото на задния механизъм за касета или драйвера
        на касетата, поддържан от задната главина на велосипеда.
    freehub_driver_standard:
      name: Стандарт на драйвера за касета
      description: Определя интерфейса на касетата/драйвера, който компонентът на
        главината поддържа (напр. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Стандарт на резбата за свободен венец
      description: Посочва стандарта или размера на резбата на главината, с който
        свободният венец е съвместим.
    french_horn_bell_construction:
      name: Конструкция на фунията на валдхорната
      description: Посочва как е конструирана фунията и дали може да бъде сваляна
        за транспорт/сервиз.
    french_horn_bell_material:
      name: Материал на камбаната на валдхорна
      description: Посочва материала/сплавта на фунията (и често нейното разширение),
        използвани при валдхорната.
    french_horn_bell_type:
      name: Тип на фунията на валдхорната
      description: Конструктивен стил на фунията.
    french_horn_finish:
      name: Покритие на валдхорната
      description: Външно покритие на инструмента.
    french_horn_included_accessories:
      name: Включени аксесоари за валдхорна
      description: Аксесоари, включени с валдхорната (калъф, мундщук и др.).
    french_horn_leadpipe_material:
      name: Материал на тръбата на валдхорна
      description: Указва материала/сплавта на оловната тръба.
    french_horn_wrap_type:
      name: Тип извивка на валдхорна
      description: Обща конфигурация на навивката/формата на валдхорната.
    fretboard_radius_fit:
      name: Съвместимост с радиуса на грифа
      description: Посочва дали извивката на подложката на капото е предназначена
        за плосък или радиусен гриф, или е регулируема, за да се адаптира към различни
        радиуси на грифа.
    friction_surface_included:
      name: Включена е повърхност за триене
      description: Посочва дали маховикът включва сменяема/монтирана повърхност за
        триене (напр. вложка, пръстен) или е еднокомпонентна повърхност за триене.
    fringe_curtain_finish:
      name: Финален завършек на ресни за завеса
      description: Описва визуалния завършек на повърхността на ресните (блясък/текстура).
    fringe_curtain_material:
      name: Материал на реснираната завеса
      description: Посочва основния материал на лентите на завесата (напр. PET фолио,
        пластмаса, хартия, текстил).
    fringe_curtain_use_location:
      name: Място на използване на реснираната завеса
      description: Посочва дали реснираната завеса е предназначена за вътрешна употреба,
        външна употреба или и за двете.
    fringe_trim_style:
      name: Стил на декоративните ресни
      description: Посочва конструкцията/стила на декоративните ресни (как са оформени
        и представени нишките или бримките).
    front_axle_standard:
      name: Стандарт за предна ос
      description: Изброява диаметъра и разстоянието на оста, които вилката е проектирана
        да приема (напр. 15 × 110 mm с увеличена ширина на главината), осигурявайки
        съвместимост с главината.
    front_button_configuration:
      name: Конфигурация на предното копче
      description: Показва стила на предното копче на якето, като уточнява дали е
        едноредно или двуредно и броя на предните копчета.
    front_closure_style:
      name: Стил на предно закопчаване
      description: Посочва стила на предната част на тренчкота, като едноредно или
        двуредно закопчаване, отворен модел, прехлупване или цип.
    front_decoration_type:
      name: Тип предна декорация
      description: Посочва вида на декоративния елемент или емблемата върху предната
        част на шапката (напр. бродирана емблема, кожен нашив).
    front_point_configuration:
      name: Конфигурация на предните зъби
      description: Определя конструкцията на предните шипове (единичен, двоен, модулен,
        сменяем), което влияе върху точността на проникване в лед и смесена настилка.
    front_seat_position:
      name: Положение на предната седалка
      description: За коя страна/позиция на предния ред е предназначена седалката.
    front_style:
      name: Стил на предната част
      description: Описва конструкцията на предната част на чино панталоните, посочвайки
        дали моделът е с гладка предна част, с плисета или с други декоративни елементи.
    frosting_or_icing_type:
      name: Тип глазура или айсинг
      description: Посочва типа глазура или айсинг, нанесен върху тортата или десертното
        блокче.
    fruit_cultivar_or_variety:
      name: Сорт или разновидност на плодовете
      description: Указва конкретния сорт или наименование на плода (напр. Гала, Грени
        Смит, Монтонг, Кавендиш).
    fruit_cut_style:
      name: Стил на нарязване на плода
      description: Описва как плодът е подготвен или нарязан (напр. цял, нарязан на
        резени, на кубчета).
    fruit_mix_variety:
      name: Разнообразие от плодови миксове
      description: Посочва тематичната комбинация или общия вид на плодовата смес
        (напр. тропическа смес, горска смес).
    fruit_piece_form:
      name: Форма на парчетата плод
      description: Описва физическата форма или представяне на сушените плодови парчета,
        напр. цели, нарязани, на прах.
    fruit_snack_form:
      name: Форма на плодовата закуска
      description: Класифицира физическата форма или стил, в който е представен плодовият
        снакс.
    fruit_topping_format:
      name: Формат на плодовия топинг
      description: Описва физическата форма, текстура или стил на топинга, за да могат
        купувачите да избират между сосове, сиропи, едри плодови парчета, пукащи перли
        и др.
    fruit_variety:
      name: Разновидност плодове
      description: Определя основния плод, използван за рецепта/комплект/суровина
        за плодово вино (напр. ябълка, череша, къпина).
    fuel_cap_gasket_seal_material:
      name: Материал на уплътнението/гарнитурата на капачката на резервоара
      description: Посочва материала, използван за уплътнителната гарнитура/O-пръстена
        на капачката на резервоара.
    fuel_cap_locking_mechanism:
      name: Заключващ механизъм на капачката за гориво
      description: Посочва заключващия механизъм, използван при заключваща се капачка
        на резервоара.
    fuel_cap_type:
      name: Тип капачка за гориво
      description: Посочва функционалния тип/дизайн на капачката за гърловината за
        зареждане на гориво на превозното средство.
    fuel_cap_venting:
      name: Вентилация на капачката на резервоара
      description: Посочва дали капачката на резервоара е с вентилация и, ако е приложимо,
        какъв е типът на вентилацията.
    fuel_filter_features:
      name: Характеристики на горивния филтър
      description: Изброява основните функционални характеристики на горивния филтър
        (отделяне на вода, изпускателен клапан, порт за сензор и др.).
    fuel_filter_media_material:
      name: Материал на филтриращата среда на горивния филтър
      description: Посочва основния филтриращ материал, използван във филтърния елемент
        на горивния филтър.
    fuel_filter_mounting_connection_type:
      name: Тип монтаж/свързване на горивния филтър
      description: Посочва как се свързва/монтира горивният филтър (резбово завиване,
        бърза връзка, щуцер за маркуч, банжо връзка и др.).
    fuel_injection_cleaning_method:
      name: Метод за почистване на впръскването на гориво
      description: Посочва как комплектът се използва за почистване на системата за
        впръскване на гориво.
    fuel_injector_electrical_connector_type:
      name: Тип електрически конектор на горивния инжектор
      description: Определя стандарта/формата на електрическия конектор на инжектора.
    fuel_injector_seat_type:
      name: Тип легло на горивния инжектор
      description: Посочва стила на интерфейса на върха/леглото на инжектора, използван
        за уплътняване към всмукателната система/горивната рейка.
    fuel_injector_spray_pattern:
      name: Спрей модел на горивната дюза
      description: Определя модела на разпръскване/разпределение на горивото от инжектора,
        използвайки терминологията на производителя или индустрията (напр. конус,
        ветрилообразна струя, тънка струя тип „молив“, многоточков).
    fuel_level_sensor_mounting_type:
      name: Тип монтаж на датчика за ниво на горивото
      description: Посочва физическия монтажен интерфейс, използван за закрепване
        на сензора/датчика за нивото на горивото към резервоара или модула на горивната
        помпа.
    fuel_level_sensor_sensing_mechanism:
      name: Механизъм за отчитане на датчика за ниво на горивото
      description: Посочва използвания механизъм или технология за измерване нивото
        на горивото в датчика или изпращача за гориво.
    fuel_line_compliance_standard:
      name: Стандарт за съответствие на горивопровода
      description: Определя регулаторния или индустриалния стандарт, на който отговаря
        горивопроводът (често срещан при морски приложения).
    fuel_line_connector_interface_type:
      name: Тип интерфейс на конектора за горивопровод
      description: Посочва типа на свързване/интерфейса в края на горивопровода или
        фитинга.
    fuel_pressure_regulator_body_material:
      name: Материал на корпуса на регулатора за налягане на горивото
      description: Посочва материала на корпуса на регулатора, който влияе на издръжливостта
        и устойчивостта на корозия.
    fuel_pressure_regulator_mounting_type:
      name: Тип монтаж на регулатора за налягане на горивото
      description: Посочва как регулаторът за налягане на горивото се монтира или
        инсталира, което влияе върху съвместимостта и напасването.
    fuel_pump_inlet_type:
      name: Тип вход на горивната помпа
      description: Тип връзка на входа на горивната помпа
    fuel_pump_mounting_location:
      name: Местоположение за монтаж на горивна помпа
      description: Къде в/по горивната система на превозното средство е монтирана
        горивната помпа.
    fuel_pump_outlet_connection_type:
      name: Тип връзка на изхода на горивната помпа
      description: Посочва физическия тип връзка на изхода на горивната помпа за съвместимост
        при монтаж/инсталация.
    fuel_system_application:
      name: Приложение на горивната система
      description: Архитектура на системата за подаване на гориво, която горивната
        помпа е проектирана да поддържа (напр. карбураторна, EFI, GDI, дизелова захранваща/прехвърляща
        система).
    fuel_system_connection_type:
      name: Тип връзка на горивната система
      description: Указва стандарта(ите) за горивната система или интерфейса(ите)
        за адаптер, поддържани от комплекта.
    fuel_system_type:
      name: Тип горивна система
      description: Посочва системата за подаване на гориво на двигателя (напр. карбуратор
        или система за впръскване на гориво).
    fuel_tank_installation_position:
      name: Позиция за монтаж на резервоара за гориво
      description: Посочва типичното място за монтаж на резервоара за гориво в превозното
        средство.
    fuel_tank_orientation:
      name: Ориентация на резервоара за гориво
      description: Посочва дали резервоарът за гориво е предназначен за хоризонтален
        или вертикален монтаж.
    fuel_tank_shape:
      name: Форма на резервоара за гориво
      description: Описва общата форма/конфигурация на резервоара за гориво с цел
        съвместимост при монтаж и подмяна.
    fur_type:
      name: Тип козина
      description: Определя животинския вид или изкуствения материал на козината по
        външната част на муфата, съединителя или чантата.
    furniture_finish:
      name: Финално покритие на мебелите
      description: Описва повърхностния вариант на пазарна стратегия или покритието,
        приложено към мебелния артикул, засягащо неговия външен вид и изискванията
        за поддръжка.
    fuse_form_factor:
      name: Типоразмер на предпазителя
      description: Определя типа и размерите на физическия предпазител, за да се гарантира,
        че той ще се побере в предвидения държач или блок за предпазители (например,
        плосък срещу касетъчен).
    fuse_terminal_or_mount_style:
      name: Стил на клемата или монтаж на предпазителя
      description: Посочва начина на механично и електрическо свързване на предпазителя
        (вкарващ се, с болтов монтаж, вграден в линия).
    fusible_application_method:
      name: Метод на нанасяне на термозалепващия слой
      description: Посочва как се активира/прилага термоактивното лепило (напр. с
        ютия, термопреса, подсилване чрез шиене).
    fusible_hem_tape_application_method:
      name: Метод за прилагане на термолепяща лента за подгъв
      description: Описва как лентата се активира/прилага (напр. с ютия, термопреса).
    fusible_seam_tape_activation_method:
      name: Метод на активация на термозалепваща лента за шевове
      description: Показва как лепилото се активира по време на приложение.
    fusible_seam_tape_application:
      name: Приложение на термолепяща лента за шевове
      description: Посочва основното предназначение на термолентовата лента за шевове.
    fusible_seam_tape_material:
      name: Материал на термолентата за шевове
      description: Материал или състав на лентата/основата/носителя (не на плата,
        към който се залепва).
    fusible_seam_tape_washability:
      name: Устойчивост на термолепящата лента за шевове при пране
      description: Посочва дали слепеният шев остава здрав след пране или почистване.
    fusible_seam_tape_waterproof_rating:
      name: Степен на водоустойчивост на термолепящата лента за шевове
      description: Показва дали лентата за шевове е предназначена да създаде водоустойчив
        или водоустойчив шев след приложение.
    fusible_tape_backing_type:
      name: Тип подложка на термолепящата лента
      description: Посочва дали лентата има отделяща хартия/подложка и какъв е нейният
        вид, което влияе върху обработката и приложението.
    futon_frame_conversion_mechanism:
      name: Механизъм за трансформиране на рамката на футон
      description: Определя механизма или конструктивния стил, използван за преобразуване
        на рамката между позиции диван, шезлонг и легло.
    gaiter_height_type:
      name: Тип височина на гетите
      description: Класифицира гетите според височината на покритие на крака, като
        глезенни, до средата на прасеца, до коляното или до бедрото.
    game_variation:
      name: Вариант на играта
      description: Посочва стила на игра, за който е предназначен комплектът (напр.
        класическа игра с топка на въже, тенис с топка на въже, скоростна игра с топка).
    garlic_preparation_style:
      name: Начин на приготвяне на чесъна
      description: Посочва как чесънът е приготвен или обработен преди продажба (напр.
        цял, смлян, на прах).
    garlic_variety:
      name: Сорт чесън
      description: Определя ботаническия или търговския сорт/култивар на предлагания
        чесън.
    garment_back_style:
      name: Стил на гърба на дрехата
      description: Идентифицира дизайна или конструкцията на гърба на дрехата (напр.
        отворен гръб, ръб тип „рейсърбек“, кръстосан гръб).
    garment_pattern_type:
      name: Тип шарка на дрехата
      description: Указва вида облекло, за което е предназначена кройката.
    garnish_type:
      name: Тип гарнитура
      description: Определя каква е гарнитурата (съставка или стил на украса), използвана
        за завършване на коктейл.
    gas_lift_class:
      name: Клас на газовия амортисьор
      description: Посочва класа за безопасност и здравина на газовия амортисьорен
        цилиндър, използван за регулиране на височината на седалката.
    gas_propellant_type:
      name: Тип газов пропелант
      description: Посочва типа газов пропелант, препоръчан или съвместим, когато
        устройството е газово.
    gatta_tabla_tuning_block_material:
      name: Материал на блока за настройка на табла (гата)
      description: Материал на настройващите блокчета (gatta), използвани между настройващата
        лента и корпуса.
    gauge_mounting_type:
      name: Монтаж на манометър
      description: Как е монтиран/инсталиран измервателният уред за гориво на плавателния
        съд.
    gauge_style:
      name: Стил на измервателния уред
      description: Посочва типа манометър, който помпата използва, като аналогов циферблат,
        цифров дисплей или липса на манометър.
    gear_oil_api_classification:
      name: API класификация на трансмисионното масло
      description: API GL класификация за трансмисионни масла, използвани в диференциали/ръчни
        скоростни кутии.
    gel_wax_density_grade:
      name: Клас на плътност на гел восък
      description: Посочва класа на плътност на гел восъка, който влияе върху прозрачността,
        натоварването с аромат и пригодността за вградени декоративни елементи.
    gel_wax_transparency_level:
      name: Ниво на прозрачност на гел восъка
      description: Описва прозрачността/непрозрачността на гел восъка при нормална
        употреба.
    gelatin_form:
      name: Желатинова форма
      description: Описва физическата форма на желатина, за да могат потребителите
        да изберат подходящия формат за рецепти и индустриални приложения.
    gelatin_or_gelling_agent_source:
      name: Източник на желатин или желиращ агент
      description: Посочва произхода или типа желиращ агент, използван в продукта,
        важен за хранителни и религиозни съображения.
    gelatin_source:
      name: Източник на желатин
      description: Посочва животинския, растителния или синтетичния произход на желатина,
        за да могат купувачите да проверят съвместимостта с хранителни, етични или
        религиозни изисквания.
    gelling_agent:
      name: Желиращ агент
      description: Идентифицира основното вещество, използвано за втвърдяване или
        сгъстяване на десерта, важно за хранителната пригодност и текстурата.
    gemstone_clarity_grade:
      name: Степен на чистота на скъпоценния камък
      description: Степен на чистота на скъпоценния камък (когато е оценен).
    gemstone_creation_method:
      name: Метод за създаване на скъпоценни камъни
      description: Посочва дали скъпоценният камък е естествен, лабораторно създаден
        или имитация/симулант.
    gemstone_cut_style:
      name: Стил на шлифоване на скъпоценен камък
      description: Описва стила/финиша на шлифовката на скъпоценния камък.
    gemstone_treatment_status:
      name: Статус на обработка на скъпоценен камък
      description: Посочва дали и как скъпоценният камък е бил обработен/подобрен.
    geological_period:
      name: Геоложки период
      description: Геоложки период (и по избор епоха) на вкаменелостта, когато е известна
        (напр. юра, креда, еоцен).
    gift_box_tin_insert_type:
      name: Тип вътрешна вложка за подаръчна кутия/кутия от метал
      description: Конфигурация на вътрешната вложка за организиране/защита на предметите
        в кутията.
    gift_box_tin_sustainability_features:
      name: Характеристики за устойчивост на подаръчната кутия/метална кутия
      description: Характеристики на устойчивост на опаковката тип подаръчна кутия/кутия
        от метал.
    gift_box_tin_window_type:
      name: Тип прозорец на подаръчна кутия/метална кутия
      description: Посочва дали подаръчната кутия има отвор за показване и какъв е
        неговият тип.
    gift_message_option:
      name: Опция за съобщения за подарък
      description: Посочва дали може да бъде включено подаръчно послание/бележка и
        по какъв начин (без, включено, персонализируемо).
    ginger_maturity:
      name: Степен на зрялост на джинджифила
      description: Показва етапа на прибиране на реколтата от джинджифил, например
        млад или зрял, което влияе върху интензивността на вкуса и предпочитаното
        кулинарно приложение.
    ginger_variety:
      name: Сорт джинджифил
      description: Указва сорта, вида или свързаното коренище в семейството на джинджифила,
        за да се разграничат вкусовите профили и кулинарните приложения.
    glass_kiln_controller_type:
      name: Тип контролер за пещ за стъкло
      description: Тип температурен/изпичащ контролер, включен към пещта.
    glass_kiln_firing_application:
      name: Приложение на пещта за стъкло
      description: Основни приложения в стъкларството, за които е предназначена пещта.
    glass_stone_application_method:
      name: Метод за поставяне на стъклени камъчета
      description: Посочва как стъклените камъчета са предназначени да бъдат закрепвани/прилагани
        в проекти (напр. чрез лепене, термозалепване, пришиване).
    glass_tint:
      name: Оцветяване на стъкло
      description: Оцветяването на стъклото/пластмасата, използвано за бутилката с
        цел контрол на излагането на светлина (често срещано при пивоварство/винопроизводство).
    glaze_firing_atmosphere:
      name: Атмосфера при изпичане на глазурата
      description: Атмосфера(и) на изпичане, за които е предназначена глазурата.
    glaze_opacity:
      name: Непрозрачност на глазурата
      description: Колко прозрачна изглежда глазурата след изпичане.
    glaze_product_form:
      name: Форма на продукта за глазура
      description: Физическата форма, в която се предлага продуктът глазура (напр.
        течност, сух прах, концентрат, спрей).
    glider_avionics_package:
      name: Пакет авионика за безмоторен самолет
      description: Посочва общото ниво на навигационно и полетно оборудване, инсталирано
        в планера.
    glider_certification_rating:
      name: Сертификационен клас на планера
      description: Официален сертификационен клас, обозначаващ нивото на безопасност
        и производителност на безмоторния самолет (напр. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Конфигурация на колесника на безмоторен самолет
      description: Посочва конфигурацията на колесника, използвана от безмоторния
        самолет.
    glider_launch_method:
      name: Метод на излитане на планера
      description: Посочва начина, по който планерът обикновено се изстрелва или самостоятелно
        излита.
    glider_performance_class:
      name: Клас ефективност на планера
      description: Състезателен/производителен клас или категория, често използвани
        за планери.
    glitter_application_method:
      name: Метод за нанасяне на брокат
      description: Посочва предназначената техника за нанасяне/използване на декоративен
        брокат (напр. поръсване, смесване, втриване, нанасяне върху лепило, нанасяне
        с четка, спрей нанасяне, термофиксиране/релефно отпечатване).
    glitter_eco_friendly_claim:
      name: Твърдение за екологичност на блестящите продукти
      description: Екологични/еко характеристики, специфични за формулировките на
        насипен брокат.
    glitter_effect_type:
      name: Тип брокатен ефект
      description: Описва визуалния ефект на броката/пайетите извън основния цвят
        (напр. холографски, преливащ).
    glitter_glue_base_solvent_type:
      name: Основа с брокатено лепило/вид разтворител
      description: Описва основната база на лепилото за брокат (често важна за купувачите
        по отношение на почистването и съвместимостта с материалите).
    glitter_opacity_coverage:
      name: Непрозрачност/покритие на броката
      description: Посочва колко непрозрачен изглежда брокатният ефект след нанасяне.
    glitter_use_suitability:
      name: Предназначение на броката
      description: Посочва основното предназначение или одобрената употреба на брокатения
        прах (напр. само за декоративни цели, козметичен клас/безопасен за тяло или
        безопасен за храни).
    glove_armor_placement:
      name: Разположение на защитата на ръкавицата
      description: Идентифицира къде се намира защитната броня върху ръкавицата.
    glove_cuff_length:
      name: Дължина на маншета на ръкавицата
      description: Посочва дължината и покритието на маншета (ръкавицата) при състезателни
        ръкавици в областта на китката и предмишницата.
    glove_finger_coverage:
      name: Покритие на пръстите на ръкавицата
      description: Описва степента на покриване на пръстите от ръкавицата — от модели
        с покрити всички пръсти до модели без пръсти.
    glove_finger_design:
      name: Дизайн на пръстите на ръкавицата
      description: Посочва конфигурацията на пръстите на ръкавицата, като петпръст
        модел или ръкавица тип „лапа“.
    glove_fit_profile:
      name: Профил на прилягане на ръкавицата
      description: Описва вътрешната форма и общия силует на ръкавицата, за да могат
        играчите да изберат предпочитаното усещане.
    glove_insulation:
      name: Изолация на ръкавицата
      description: Посочва топлоизолацията или термичната конструкция на ръкавицата,
        включително нивото на изолация, вида на подплатата/изолационната технология
        или дали е отопляема.
    glove_palm_material:
      name: Материал на дланта на ръкавицата
      description: Посочва основния материал, използван в областта на дланта на ръкавицата
        (основната контактна/захватна повърхност), който може да се различава от горната
        част.
    glove_size:
      name: Размер на ръкавицата
      description: Посочва общия размер на ръката, за който са предназначени бейзболните
        ръкавици, често изразен чрез стандартни кодове за размери на облекло или детски
        размери.
    glove_webbing_style:
      name: Стил на оплетката на ръкавицата
      description: Определя дизайна на оплетката или джоба на ръкавицата, който влияе
        върху контрола на топката, пригодността за определена позиция и предпочитанията
        на играча.
    glow_effect:
      name: Светлинен ефект
      description: Посочва дали гел топчетата имат светещи в тъмното или трасировъчни
        свойства за игра при слаба светлина.
    glow_plug_connector_type:
      name: Тип конектор за подгревна свещ
      description: Тип електрически терминал/конектор на подгревната свещ за свързване
        към кабелния сноп на автомобила.
    glow_plug_heating_element_type:
      name: Тип на нагревателния елемент на свещта за подгряване
      description: Вид/технология на нагревателния елемент, използван от подгревната
        свещ.
    glue_application_format:
      name: Формат за нанасяне на лепило
      description: Указва формата на апликатора/дозиращата система, използвана за
        нанасяне на училищно лепило.
    glue_applicator_type:
      name: Тип апликатор за лепило
      description: Посочва стила на вградения апликатор/накрайник за дозиране, използван
        за нанасяне на течното лепило.
    glue_base_formulation:
      name: Формула на лепилната основа
      description: Определя основната химическа/базова формула на течното лепило за
        хоби и занаяти (по отношение на производителност, безопасност и почистване).
    glue_gun_nozzle_style:
      name: Стил на дюзата на пистолета за лепило
      description: Посочва физическия стил на дюзата на пистолета за лепило, който
        влияе върху прецизността на нанасяне и покритието с лепило.
    glue_safety_standard:
      name: Стандарт за безопасност на лепилото
      description: Посочва дали лепилото е нетоксично / безопасно за деца според етикетирането
        и общоприетите стандарти.
    goal_frame_material:
      name: Материал на рамката на вратата
      description: Определя материала на гредите/рамката на вратата, който влияе върху
        теглото, преносимостта и устойчивостта на атмосферни условия.
    goal_size:
      name: Размер на вратата
      description: Класифицира футболната врата в стандартни размери за официални
        мачове или тренировки за по-бърз избор в сравнение само с конкретните размери.
    goal_size_classification:
      name: Класификация на размера на вратата
      description: Определя стандартизирания клас размер на вратата (напр. официален
        пълен размер, детски, мини), за да могат потребителите бързо да изберат оборудване,
        подходящо за тяхното ниво на игра.
    goal_size_standard:
      name: Стандарт за размер на вратата
      description: Посочва на кой официален или възрастов стандарт отговаря вратата
        (напр. регламент на World Aquatics, до 12 години).
    goalie_configuration:
      name: Конфигурация на вратаря
      description: Посочва броя на вратите/вратарите от всяка страна, конфигурирани
        на масата (американски стил с 3 вратари срещу европейски стил с 1 вратар).
    goalie_playing_surface:
      name: Игрална повърхност за вратар
      description: Посочва основната игрална повърхност или среда, за която е предназначен
        комплектът за хокеен вратар.
    goalkeeper_glove_cut:
      name: Кройка на вратарските ръкавици
      description: Посочва конструкцията (кройката) на дланта/пръстите на вратарските
        ръкавици, която влияе върху прилягането, усещането за топката и контрола.
    goalkeeper_training_aid_type:
      name: Тип тренировъчно средство за вратари
      description: Определя стила на тренировъчното помощно средство за вратари, позволявайки
        прецизно филтриране.
    goblet_drum_playing_style:
      name: Стил на свирене на дарбука
      description: Посочва дали инструментът е предназначен основно за свирене с ръце
        или с палки/чукчета.
    gobo_format:
      name: Формат на гобо шаблона
      description: Посочва размера/стандарта на гобо шаблона, който проекторът приема
        (семейство по диаметър и дебелина), осигурявайки съвместимост със сменяеми/персонализирани
        гобо шаблони.
    gobo_root_variety:
      name: Сорт корен от репей (гобо)
      description: Определя конкретния сорт или разновидност на корен от репей (гобо).
    gobo_rotation:
      name: Въртене на гобо шаблона
      description: Посочва дали гобо шаблонът може да се върти и какъв тип посока/въртене
        се поддържа.
    goggle_accessory_type:
      name: Тип аксесоар за очила
      description: Класифицира вида аксесоар (напр. калъф, каишка), така че купувачът
        може да филтрира разнообразния набор от продукти в тази обща категория.
    goggle_features:
      name: Характеристики на предпазните очила
      description: Изброява специални функционални или дизайнерски характеристики,
        предлагани от предпазните очила.
    goggle_fit_design:
      name: Дизайн на прилягане на предпазните очила
      description: Описва как предпазните очила са предназначени да прилягат или да
        се носят, включително съвместимост за носене върху диоптрични очила (OTG).
    goggle_gasket_material:
      name: Материал на уплътнението на предпазните очила
      description: Материал на уплътнението, което прилепва към лицето, влияещо върху
        комфорта, риска от алергии и предотвратяването на течове.
    goggle_integration:
      name: Интеграция на предпазните очила
      description: Дали каската е проектирана за употреба с предпазни очила и/или
        включва вградени функции за предпазни очила.
    goggle_lens_shape:
      name: Форма на лещите на предпазните очила
      description: Определя профила на кривината на заместващата леща, влияейки върху
        изкривяването и зрителното поле (напр. цилиндрична, сферична, торична).
    goggle_lens_tint:
      name: Цвят/оттенък на лещите на предпазните очила
      description: Определя нюанса или покритието на лещата, което влияе върху пропускането
        на светлина, възприятието на цвета и естетическия вид.
    goggle_strap_material:
      name: Материал на каишката на предпазните очила
      description: Основен материал, използван за каишката за глава, влияещ върху
        издръжливостта и комфорта.
    golf_accessory_set_purpose:
      name: Предназначение на комплекта голф аксесоари
      description: Определя основното предназначение или тема на комплекта голф аксесоари.
    golf_bag_style:
      name: Стил на чанта за голф
      description: Посочва основния дизайн или стил на приложение на голф чантата
        (напр. стояща, за количка, турнирна).
    golf_ball_alignment_design:
      name: Дизайн за подравняване на топката за голф
      description: Посочва всички вградени визуални помощни средства за подравняване,
        отпечатани или оформени върху повърхността на голф топката.
    golf_ball_construction:
      name: Конструкция на топка за голф
      description: Посочва броя на слоевете/частите, използвани в конструкцията на
        голф топката, което влияе върху въртенето, усещането и дистанцията.
    golf_ball_cover_material:
      name: Материал за покриване на топката за голф
      description: Идентифицира външния покривен материал на топката за голф, който
        влияе върху въртенето, издръжливостта и усещането.
    golf_cart_cover_climate_use:
      name: Предназначение според климата за покривало на голф количка
      description: Посочва основните климатични/сезонни условия, на които е проектирано
        да издържа покривалото за съхранение.
    golf_cart_enclosure_fit_type:
      name: Тип прилягане на покривалото за голф количка
      description: Указва дали корпусът е проектиран за специфичен брой седалки/форм-фактор
        или предлага универсално/регулируемо прилягане.
    golf_cart_intended_use:
      name: Предназначение на голф количката
      description: Основен сценарий/предназначение, за което е проектирана или конфигурирана
        голф количката.
    golf_club_number:
      name: Номер на голф стик
      description: Идентифицира специфичния номер или обозначение на уеджа, отпечатано
        върху стика (напр. 5, PW, GW).
    golf_club_part_type:
      name: Тип част за голф стик
      description: Категоризира аксесоара или компонента за голф стик в често срещани
        подтипове (напр. адаптерна втулка, ферула, тежест).
    golf_grip_size:
      name: Размер на дръжката за голф стик
      description: Посочва общата категория външен размер на дръжка за голф стик,
        указвайки колко дебел е захватът в ръката.
    golf_shoe_spike_type:
      name: Тип шипове за голф обувки
      description: Идентифицира вида на системата за сцепление, използвана върху външната
        подметка на обувките за голф (напр. модели с шипове или без шипове).
    golf_tee_style:
      name: Стил на голф тий
      description: Описва конструктивния или функционалния стил/дизайн на тий за голф,
        който влияе върху височината на топката, издръжливостта или намаляването на
        въртенето.
    golf_training_focus:
      name: Фокус на тренировката по голф
      description: Класифицира основното умение или аспект, който продуктът е предназначен
        да подобри.
    golf_training_objective:
      name: Цел на тренировката по голф
      description: Определя основното голф умение или аспект, който тренировъчното
        средство е предназначено да подобри.
    gong_profile_type:
      name: Тип профил на гонга
      description: Описва физическия профил на оперния гонг (напр. плосък спрямо повдигнат
        център), който силно влияе върху тона и стила на свирене.
    grading_scale:
      name: Скала за оценяване
      description: Скалата за оценяване, използвана за сертифицирана инвестиционна
        монета (напр. Sheldon 1–70).
    grading_service:
      name: Услуга за оценяване
      description: Услуга за оценяване/сертифициране от трета страна за монетата или
        банкнотата (напр. PCGS, NGC).
    graduation_increment:
      name: Стъпка на делението
      description: Указва най-малкото отпечатано/гравирано деление на скалата на шивашкия
        калибър (резолюцията на маркировките).
    grain_processing_method:
      name: Метод за обработка на зърно
      description: Идентифицира основния метод на обработка, прилаган върху зърното
        (напр. пропарено, валцувано, покълнало), който влияе върху времето за готвене,
        текстурата и хранителната стойност.
    grand_piano_soundboard_material:
      name: Материал на резонансната дъска на роял
      description: Основният материал, използван за резонансната дъска на пианото,
        който оказва влияние върху звученето и издръжливостта.
    grappling_dummy_pose:
      name: Поза на тренировъчен манекен за граплинг
      description: Описва стандартната позиция/стойка на тренировъчния манекен, определяща
        кои упражнения и техники поддържа.
    grease_application:
      name: Предназначение на греста
      description: Указва основния компонент на превозното средство или случая на
        употреба, за който е предназначена греста.
    grease_consistency_grade_nlgi:
      name: Клас на консистенция на грес (NLGI)
      description: Посочва NLGI консистентния номер, показващ твърдостта на греста
        (напр. NLGI 2 е често срещана многофункционална).
    grease_thickener_type:
      name: Тип сгъстител на греса
      description: Идентифицира системата сгъстител/сапун, използвана във формулата
        на грес.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Тип клапан на надувната тръба на гайда Great Highland
      description: Посочва системата на възвратния клапан, използвана в духалката.
    great_highland_bagpipes_drone_configuration:
      name: Конфигурация на бурдоните на гайда Great Highland
      description: Указва видовете дронове, включени в комплекта.
    great_highland_bagpipes_mounting_material:
      name: Материал на декоративните елементи на гайда Great Highland
      description: Посочва материала на декоративните елементи на гайдата (напр. никелово
        сребро, имитация на слонова кост).
    greens_maturity_stage:
      name: Степен на зрялост на зелените култури
      description: Посочва стадия на развитие на зеленолистните зеленчуци при прибирането
        им.
    greens_preparation_state:
      name: Състояние на подготовка на зеленолистните зеленчуци
      description: Описва как зеленолистните зеленчуци са обработени или пакетирани
        (напр. предварително измити, нарязани, готови за консумация).
    grenade_effect_type:
      name: Тип ефект на гранатата
      description: Посочва основния функционален ефект, който пейнтбол гранатата произвежда
        след активиране (напр. дим, боя, светлинно-шоков ефект).
    grid_unit:
      name: Мрежова единица
      description: Основната система за измерване, отпечатана върху подложката (ако
        има мрежа/скала).
    grille_emblem_provision:
      name: Наличие на емблема върху решетката
      description: Посочва дали решетката поддържа OEM емблема/значка и по какъв начин.
    grille_mounting_method:
      name: Метод за монтаж на решетката
      description: Посочва начина на монтаж на решетката към автомобила (напр. директна
        замяна или наслагване/вложка; закрепване с болтове или щракване; необходимост
        от пробиване или без пробиване).
    grille_style:
      name: Стил на решетката
      description: Определя визуалния/дизайнерски стил на решетката на автомобила.
    grip_chalk_form:
      name: Форма на магнезия за захват
      description: Определя физическата форма на магнезия, предоставен или използван
        с торбичката.
    grip_coverage:
      name: Покритие на захвата
      description: Определя наличието и разположението на силиконови или гумирани
        елементи за сцепление върху чорапа.
    grip_design:
      name: Дизайн на дръжката
      description: Определя конфигурацията на дръжките или отворите на плочата, за
        да се улесни носенето и да се осигури гъвкавост при упражненията.
    grip_enhancer_effect:
      name: Ефект на подобрителя за захват
      description: Описва основната характеристика на ефективност, която продуктът
        осигурява (напр. абсорбиране на влага или покритие от лепкава смола).
    grip_enhancer_form:
      name: Форма на подобрител на захвата
      description: Определя физическата форма или формат на продукта за подобряване
        на захвата, за да могат спортистите да изберат подходящия метод на нанасяне.
    grip_features:
      name: Характеристики на захвата
      description: Посочва вградени елементи за захват (дръжки), предназначени да
        подобрят захвата, комфорта или контрола по време на игра.
    grip_material:
      name: Материал на захвата
      description: Определя материала, използван за захващащата повърхност на панталона.
    grip_shape:
      name: Форма на ръкохватката
      description: Описва напречното сечение или стила на захвата, особено важно при
        гриповете за пътър.
    grip_surface_type:
      name: Тип повърхност на захвата
      description: Описва дизайна на протектора/сцеплението на повърхността на педала,
        който влияе върху захвата и усещането.
    grip_tackiness_level:
      name: Ниво на лепкавост на захвата
      description: Оценява колко лепкав/сцепващ е повърхностният захват, което помага
        на играчите да избират между сухо усещане и силнолепкав контрол.
    grip_tape_form:
      name: Форма на лента за захват
      description: Посочва формата на продукта лента за захват (напр. лист, ролка,
        комплект за спрей нанасяне).
    grip_wax_form:
      name: Форма на ваксата за захват
      description: Класифицира физическата форма, в която се продава ваксата за захват.
    gripper_coverage:
      name: Покритие на грипера
      description: Указва вида на захващащото устройство на неплъзгащата се обувка,
        като посочва покритието на повърхността и възможността за отстраняване.
    grommet_application_material:
      name: Материал за приложение на капси
      description: Основен(ни) материал(и), в които са предназначени да бъдат монтирани
        капсите (напр. плат, кожа, винил, брезент/платнище).
    grommet_duty_rating:
      name: Клас на натоварване на втулката
      description: Посочва предназначения клас на здравина/натоварване на втулката.
    grommet_style:
      name: Стил на капсите
      description: Конструктивен стил на комплекта капси (начин на сглобяване/използване).
    grooming_glove_texture_type:
      name: Тип текстура на ръкавицата за груминг
      description: Определя основната текстура на повърхността, използвана за почистване
        и поддръжка, показваща предназначение като търкане, полиране или измиване.
    groove_orientation:
      name: Ориентация на каналите
      description: Описва посоката/оформлението на жлебовете или ръбовете на инструмента.
    groove_sampler_onboard_effects:
      name: Вградени ефекти на груув семплера
      description: Посочва категориите налична вградена обработка на ефекти в груув
        семплера (insert/master), като реверберация, дилей, компресия, дисторшън,
        еквалайзер, филтриране.
    groove_sampler_storage_expansion_type:
      name: Тип разширение на паметта на груув семплера
      description: Посочва сменяемите/разширяеми опции за съхранение, поддържани от
        семплера за ритъм.
    ground_attachment_method:
      name: Метод за закрепване към земята
      description: Описва как арката за подаване е закрепена към игралната повърхност,
        което влияе върху стабилността и съвместимостта с настилката.
    groupset_components_included:
      name: Включени компоненти на групсета
      description: Изброява конкретните компоненти на задвижващата система, включени
        в комплекта, за да могат клиентите да разберат какво съдържа той.
    gt_racing_class:
      name: GT състезателен клас
      description: Посочва GT категорията/класа, за който автомобилът е произведен
        или хомологиран.
    guard_construction_type:
      name: Тип конструкция на предпазителя
      description: Посочва дали предпазителят е с твърд корпус, мека защитна вложка
        или дизайн тип ръкав/каишка.
    guard_size_measurement_basis:
      name: Основа за измерване на размера на предпазителя
      description: Какво измерване се използва за определяне на размера (напр. обиколка
        на лакътя, китката, предмишницата).
    guard_style:
      name: Стил на предпазителя
      description: Класифицира конструкцията или вида на предпазителя за кънки, за
        да помогне на потребителите бързо да различават твърди предпазители за ходене,
        меки абсорбиращи калъфи, пружинни предпазители и други дизайни.
    guava_flesh_color:
      name: Цвят на месестата част на гуавата
      description: Посочва вътрешния цвят на месестата част на плода гуава.
    guava_variety:
      name: Сорт гуава
      description: Определя конкретния сорт или търговска разновидност на гуавата
        (напр. Apple guava, Mexican cream, Thai, Pink, Seedless, White).
    guide_material:
      name: Материал на водача
      description: Материал, използван за водачите или вложките на въдицата.
    guide_type:
      name: Тип водачи
      description: Посочва стила на водачите, монтирани на въдицата, като единично
        краче, ролкови или змийски водачи.
    guideline_markings:
      name: Маркировки за насочване
      description: Тип визуални маркировки за подравняване, отпечатани или вградени
        върху тренировъчната постелка за хвърляне, подпомагащи упражненията.
    guiro_scraper_material:
      name: Материал на стъргалото за гюиро
      description: Материал на включеното или препоръчано стъргало/палка, използвано
        с гюирото.
    guiro_surface_style:
      name: Повърхностен стил на гюиро
      description: Описва модела/геометрията на повърхността за свирене, която се
        стърже за създаване на звук.
    guitar_body_finish_type:
      name: Тип покритие на корпуса на китарата
      description: Посочва финиша, използван върху тялото на китарата.
    guitar_bridge_system_type:
      name: Тип система на моста на китарата
      description: Серия модели на системи за мост и струнодържател, осигуряващи съвместимост
        и удобство при избора.
    guitar_case_style:
      name: Стил на калъфа за китара
      description: Посочва общия стил на защита и конструкция на калъфа или чантата
        за китара.
    guitar_humidifier_placement:
      name: Разположение на овлажнителя за китара
      description: Посочва къде е предназначено да се използва/поставя овлажнителят
        спрямо инструмента или средата.
    guitar_pedal_i_o_configuration:
      name: Конфигурация на входно/изходни устройства за педали за китара
      description: Посочва дали педалът поддържа моно или стерео входно/изходно свързване.
    guitar_pedal_output_connector_type:
      name: Тип изходен конектор на педала за китара
      description: Указва типа на аудио изходния конектор, използван от педала.
    guitar_slide_finish:
      name: Повърхност на слайда за китара
      description: Повърхностен финиш на слайда, влияещ върху усещането и триенето
        със струните.
    guitar_slide_style:
      name: Стил на слайда за китара
      description: Посочва формата на китарния слайд или tone bar и начина, по който
        се носи/използва.
    guitar_stand_type:
      name: Тип стойка за китара
      description: Посочва основния типоразмер на стойката за китара (как поддържа
        или съхранява китарата).
    guitar_strap_attachment_type:
      name: Тип закрепване на каишка за китара
      description: Посочва как каишката се прикрепя към китарата (или бутоните за
        каишка), включително дали използва традиционни краища или системи за бързо
        освобождаване.
    guitar_strap_end_material:
      name: Материал на краищата на презрамката за китара
      description: Материал, използван в краищата на ремъка/ушите (частите, които
        се закрепват към копчетата за ремъка или системите за фиксиране на ремъка).
    guitar_strap_features:
      name: Характеристики на колана за китара
      description: Забележителни функционални характеристики на каишката за китара
        извън основния размер/материал (множествен избор).
    guitar_string_coating:
      name: Покритие на струните за китара
      description: Посочва дали струните имат защитно покритие и, ако е приложимо,
        типа на покритието.
    guitar_string_gauge_type:
      name: Тип дебелина на струните за китара
      description: Търговска категория дебелина на комплект струни за акустична китара
        (напр. екстра леки, леки, средни). Често се определя приблизително според
        дебелината на високата струна ми; точните диапазони могат да варират според
        производителя.
    guitar_string_set_gauge_category:
      name: Категория на дебелината на комплекта китарни струни
      description: Често срещани категории дебелина на комплект китарни струни (обикновено
        определени според високата ми / 1-ва струна).
    guitar_string_winding_type:
      name: Тип намотка на китарните струни
      description: Посочва външния тип навивка на навитите струни в комплекта.
    guitar_tuning_peg_button_shape:
      name: Форма на бутона на ключа за настройване на китарата
      description: Формата/стилът на ключа/бутона за настройване.
    guitar_tuning_peg_configuration:
      name: Конфигурация на ключовете за настройване на китарата
      description: Разположение на ключовете (машинките за настройка) върху главата
        на грифа.
    guitar_tuning_peg_mounting_style:
      name: Стил на монтаж на ключовете за китара
      description: Как се монтира механизмът за настройка към грифа (тип втулка и
        метод за предотвратяване на въртенето).
    guitar_tuning_peg_shaft_type:
      name: Тип ос на ключа за настройване на китарата
      description: Посочва дали колчето за струната е цяло или прорязано и как струната
        се закрепва.
    guitar_tuning_peg_style:
      name: Стил на ключовете за китара
      description: Физическият стил и формат на монтаж на механиката/ключовете за
        настройване, използвани на главата на инструмента (напр. затворен срещу отворен
        механизъм, заключващ механизъм, прорязано колче).
    gum_condition:
      name: Състояние на дъвката
      description: Състояние/статус на лепилото на марката от обратната страна (напр.
        без следа от панта, с панта, без лепило).
    gun_action_type:
      name: Тип затворен механизъм на оръжие
      description: Механичен тип действие, използвано за зареждане/стрелба (напр.
        болтово, лостово действие).
    gun_operational_status:
      name: Работно състояние на оръжието
      description: Посочва дали колекционерското оръжие е деактивирано/нестрелящо
        (и как е представено).
    gun_type:
      name: Тип оръжие
      description: Определя общия форм-фактор на античното огнестрелно оръжие.
    gusset_material:
      name: Материал на усилващата вложка
      description: Посочва материала на подплатата в областта на чатала, който влияе
        на дишаемостта, хигиената и комфорта.
    gymnastics_discipline:
      name: Дисциплина в гимнастиката
      description: Посочва дисциплината по гимнастика, за която е предназначен продуктът
        (напр. спортна, художествена, акробатична).
    hair_extension_texture:
      name: Текстура за удължаване на косата
      description: Описва къдрите, вълните или текстурния модел на удължителните кичури.
    hair_net_style:
      name: Стил на мрежата за коса
      description: Определя дизайна или конструктивния стил на мрежата за коса (напр.
        с обем, мрежа за коса, покритие за кок).
    hair_quality_grade:
      name: Клас на качеството на косата
      description: Посочва обозначенията за индустриално качество/произход на косата.
    halter_style:
      name: Стил на халтера
      description: Определя функционалния или дизайнерски стил на оглавника (напр.
        въжен, с предпазно освобождаване, изложбен), помагайки на купувачите да изберат
        оглавник, подходящ за предназначението му.
    hammock_style:
      name: Стил хамак
      description: Описва структурния стил или конструкцията на хамака.
    hand_and_foot_coverage:
      name: Покритие за ръце и крака
      description: Описва вградени или отделящи се ръкавици и ботушки, които покриват
        ръцете и/или краката.
    hand_cymbal_set_configuration:
      name: Конфигурация на комплект ръчни чинели
      description: Посочва дали продуктът се продава като съвпадащ чифт, единичен
        чинел или по-голям комплект.
    hand_drum_head_material:
      name: Материал на мембраната на ръчния барабан
      description: Материал на мембраната на барабана, използван за барабана тип „гоблет“.
    hand_exerciser_style:
      name: Стил на ръчен тренажор
      description: Класифицира цялостния стил или механизъм на уреда за упражнения
        за ръце.
    hand_guard_backbone_material:
      name: Материал на основата на протектора за ръце
      description: Материал на структурния гръбнак/гръбначен стълб (ако има такъв),
        който определя здравината и защитата.
    hand_guard_coverage_style:
      name: Стил на покритие на протектора за ръце
      description: Описва покритието/профила на протектора за ръце, влияещ върху защитата
        от вятър/удар.
    hand_guard_mounting_type:
      name: Тип монтаж на предпазителя за ръка
      description: Указва как предпазителите за ръце се закрепват към мотоциклета
        (напр. кормило с вътрешна скоба или само със скоба).
    hand_guard_set_configuration:
      name: Конфигурация на комплект предпазители за ръце
      description: Посочва дали продуктът се продава като ляв/десен чифт или като
        единична страна.
    hand_guard_style:
      name: Стил на протектора за ръце
      description: 'Описва дизайна или типа на защитата (например: затворена, отворена,
        пълна, олекотена, стандартна).'
    hand_guard_weather_protection:
      name: Защита от атмосферни условия на протектора за ръце
      description: Посочва предназначената защита от атмосферни условия, осигурявана
        от протекторите за ръце.
    hand_paddle_strap_type:
      name: Тип каишка за ръчно гребло
      description: Посочва типа каишка или липсата на каишка, използвана за закрепване
        на ръчната плочка към ръката на потребителя.
    hand_percussion_mount_attachment_mechanism:
      name: Механизъм за закрепване на ръчен перкусионен държач
      description: Посочва как монтажният елемент се закрепва към стойка, стелаж или
        друг хардуер (напр. скоба за захващане спрямо монтаж на прът/тръба).
    hand_percussion_mounting_handling:
      name: Монтаж/начин на държане на ръчния перкусионен инструмент
      description: Посочва дали инструментът обикновено се държи в ръка, носи се,
        монтира се или се поставя на маса/под по време на употреба.
    hand_percussion_pitch_type:
      name: Тип височина на тона на ръчния перкусионен инструмент
      description: Показва дали инструментът издава определена тоналност (настройваема/ноти)
        или неопределена тоналност.
    hand_percussion_playing_method:
      name: Начин на свирене на ръчния перкусионен инструмент
      description: Посочва как инструментът обикновено се използва за създаване на
        звук (напр. разклащане спрямо стържене).
    hand_percussion_set_configuration:
      name: Конфигурация на комплекта ръчни перкусионни инструменти
      description: Посочва дали продуктът е единичен инструмент, съвпадащ чифт или
        комплект от няколко части.
    hand_percussion_size_class:
      name: Размерен клас на ръчния перкусионен инструмент
      description: Обща категория размер на инструмента, когато не е предоставено
        точно измерване или за по-лесно филтриране.
    hand_sewing_needle_point_type:
      name: Тип връх на игла за ръчно шиене
      description: Форма/тип на върха на ръчната шевна игла, използвана за пробиване
        на различни материали (напр. тъкани, плетива, кожа) или прежди.
    hand_support_level:
      name: Ниво на опора за ръката
      description: Посочва степента на опора или компресия, осигурявана от ръкавицата,
        бинта или каишката.
    hand_support_size:
      name: Размер на опората за ръката
      description: Обявен от производителя размер на ръкавицата, каишката или обвивката
        (XS – XXL или универсален размер).
    handball_ball_type:
      name: Тип хандбална топка
      description: Посочва предназначената категория употреба на хандбалната топка,
        като състезателна, тренировъчна или плажна.
    handball_playing_surface:
      name: Игрална повърхност за хандбал
      description: Показва игралната повърхност, за която е оптимизирана хандбалната
        топка
    handball_target_type:
      name: Тип хандбална мишена
      description: Посочва стила или дизайна на тренировъчната мишена за хандбал.
    handbrake_actuation_type:
      name: Тип задействане на ръчната спирачка
      description: Посочва как се задейства ръчната/паркинг спирачка.
    handbrake_orientation:
      name: Ориентация на ръчната спирачка
      description: Посочва дали ръчната спирачка е предназначена за автомобили с ляв
        или десен волан, или е универсална.
    handgun_grip_material:
      name: Материал на ръкохватката на пистолета
      description: Основен материал на ръкохватките/панелите на пистолета.
    handle_configuration:
      name: Конфигурация на дръжката
      description: Описва конструктивния стил на дръжката за уейкборд (напр. единична,
        двойна, Deep-V, T-wrap), така че купувачите да могат да я съобразят с уменията,
        триковете или типа дъска.
    handle_ergonomics:
      name: Ергономичност на дръжката
      description: Описва ергономичните характеристики на дръжката, предназначени
        да подобрят комфорта и контрола.
    handle_grip_material:
      name: Материал на ръкохватката
      description: Посочва материала, използван върху повърхността за захват на дръжката,
        който влияе върху комфорта и сцеплението, особено при мокри условия.
    handle_grip_type:
      name: Тип ръкохватка
      description: Посочва покритието/материала или стила на повърхността на захвата
        на дръжката, предназначени да подобрят комфорта и контрола.
    handle_shape:
      name: Форма на дръжката
      description: Напречно сечение или профил на ръкохватката.
    handlebar_design:
      name: Дизайн на кормилото
      description: Определя типа на дръжките на степера, например без дръжки, фиксирани,
        с регулируема височина, сгъваеми или дръжки с ластици за съпротивление.
    handlebar_type:
      name: Тип кормило
      description: Посочва стила на кормилото, монтирано на велосипеда, влияещ върху
        позицията на каране, контрола и комфорта.
    handslide_bore_type:
      name: Тип отвор на handslide елемента
      description: Посочва дали бас тромбонът използва единичен или двоен отвор на
        плъзгащата тръба.
    handwear_cuff_style:
      name: Стил на маншета на ръкавиците
      description: Описва стила на маншета или китката на ръкавиците, който влияе
        върху покритието и прилягането.
    handwear_insulation_material:
      name: Материал на изолацията на ръкавиците
      description: Посочва изолиращия или подплатяващ материал, използван вътре в
        ръкавиците.
    handwear_size:
      name: Размер на аксесоар за ръце
      description: Посочва размера на ръкавиците или друго облекло за ръце, за да
        се осигури правилно прилягане.
    hang_glider_design:
      name: Дизайн на делтапланера
      description: Класифицира конструктивния стил на делтапланера (напр. гъвкаво
        крило, твърдо крило, моторизиран).
    hanger_thread_size:
      name: Размер на резбата на закачалката
      description: Посочва размера/стандарта на резбата на винта, използван за монтиране
        на стойката към колчета или сигнализатори за кълване, осигурявайки съвместимост.
    hanging_suspension_method:
      name: Метод за окачване
      description: Определя основния хардуер или система, използвани за окачване на
        люлката (напр. въже, верига, рамка със стойка).
    hardtop_finish_type:
      name: Тип покритие на твърдия покрив
      description: Посочва състоянието на външното покритие на твърдия покрив (напр.
        грундиран спрямо боядисан), което влияе върху готовността за монтаж и външния
        вид.
    hardtop_shell_material:
      name: Материал на корпуса на твърдия покрив
      description: Определя основния материал, от който е изработена твърдата част
        на твърдия покрив на превозното средство (а не покривната материя), като например
        фибростъкло или алуминий.
    hardtop_window_configuration:
      name: Конфигурация на прозорците на твърдия покрив
      description: Описва какви прозорци са включени в твърдия покрив и тяхната конфигурация.
    harmonica_comb_material:
      name: Материал на гребена на хармониката
      description: Материал, използван за гребена на хармониката (корпус на въздушните
        камери).
    harmonica_cover_plate_finish:
      name: Покритие на капаците на хармониката
      description: Определя покритието на покривните плочи на хармониката.
    harmonica_cover_plate_material:
      name: Материал на капака на хармониката
      description: Материал, използван за външните капаци.
    harmonica_finish:
      name: Покритие на хармониката
      description: Повърхностно покритие на капаците/корпуса на хармониката.
    harmonica_included_accessories:
      name: Включени аксесоари за хармоника
      description: Посочва какви аксесоари са включени към хармониката.
    harmonica_note_range:
      name: Диапазон на нотите на хармониката
      description: Класификация на диапазона на инструмента, използвана в оркестров
        контекст (напр. бас, баритон, тенор).
    harmonica_reed_plate_material:
      name: Материал на езичковите плочи на хармониката
      description: Материал, използван за езичковите плочи (напр. месинг, неръждаема
        стомана, алуминий).
    harmonica_system_type:
      name: Система/тип хармоника
      description: Посочва системата или конструктивния тип на оркестровата хармоника
        (напр. акордна, басова, баритонова, polyphonia).
    harmonica_tuning_system:
      name: Система за настройка на хармониката
      description: Посочва системата/разположението на настройка на хармониката (напр.
        Рихтер, соло, оркестрова настройка).
    harness_shell_type:
      name: Тип корпус на хамута
      description: Описва твърдостта на конструкцията на обвивката на сбруята (напр.
        мека, твърда, хибридна).
    harness_style:
      name: Стил на хамута
      description: Определя конструктивния стил/дизайн на хамута, напр. за кръста,
        седалков, за гърди/жилетка, wing belt, boardshort или хибриден.
    harness_type:
      name: Тип предпазен колан
      description: Класифицира конструктивния стил на катерачния хамут, като седалков,
        цялостен или за гърди.
    harp_action_type:
      name: Тип механика на арфа
      description: Основен механизъм, използван за промяна на височината/алтерациите
        на тона на арфата.
    harp_finish:
      name: Покритие на арфата
      description: Повърхностно покритие на тялото на арфата (напр. естествено, байцвано,
        боядисано, лакирано).
    harp_included_accessories:
      name: Включени аксесоари за арфа
      description: Изброява аксесоарите, включени при покупката на педална арфа.
    harvest_method:
      name: Метод на добив
      description: Посочва дали морските дарове са уловени в дивата природа, отглеждани
        във ферма или добити по друг метод.
    harvest_stage:
      name: Етап на прибиране на реколтата
      description: Посочва етапа на растеж, в който е събрана руколата, напр. микрозелени,
        бейби листа или зрял стрък.
    hat_style:
      name: Стил на шапката
      description: Конструкцията/стилът на парти шапката (напр. конусовидна шапка,
        корона, цилиндър, козирка), показващ основния ѝ външен вид.
    hazard_signal_mode:
      name: Режим на аварийния сигнал
      description: Избираеми светлинни модели/режими за LED/електронни пътни сигнални
        лампи.
    head_configuration:
      name: Конфигурация на главата
      description: Посочва дали главата на пикела има тесла, чук, и двете или нито
        едното, което пряко влияе на функционалността върху лед и смесен терен.
    head_material:
      name: Материал на главата
      description: Материал на ударната глава, включена към quinto барабана.
    head_movement_type:
      name: Тип движение на главата
      description: Посочва посоките на движение на двуногата опора или главата на
        стойката (напр. панорамно, наклон, странично накланяне).
    head_side:
      name: Страна на главата
      description: Посочва дали барабанната кожа е предназначена за страната на удара
        (бийтър), резонансната (предна) страна или и за двете.
    head_weight_style:
      name: Стил на теглото на главата
      description: Посочва конфигурацията на тежестта в главата на мухарската примамка,
        която влияе върху скоростта на потъване и представянето.
    headband_embellishment:
      name: Украса на лентата за глава
      description: Определя декоративните елементи, прикрепени към лентата за коса
        (например панделки, перли, кристали, ушички на животни).
    headboard_style:
      name: Стил на таблата
      description: Описва дизайна или стила на изработка на таблата, която се доставя
        заедно с леглото.
    headgear_strap_configuration:
      name: Конфигурация на каишките на предпазителя за глава
      description: Посочва броя на каишките, използвани за закрепване на борцовия
        предпазител за глава.
    headjoint_crown_style:
      name: Стил на короната на главната част
      description: Посочва стила или дизайна на коронката (крайната капачка) на главната
        част на флейтата, който може да влияе на външния вид и баланса/теглото.
    headjoint_pitch_standard:
      name: Стандарт на конуса на главата на флейта
      description: Посочва стандартa на настройка на главната част на флейтата (напр.
        ла = 440 или ла = 442).
    headliner_product_form:
      name: Форма на продукта за таванна облицовка
      description: Посочва дали продуктът представлява цялостна формована облицовка
        за таван, резервен плат или компонент за ремонт/декорация.
    headrest_mount_attachment_method:
      name: Метод за закрепване на облегалката за глава
      description: Посочва как монтажният елемент се закрепва към стойките на облегалката
        за глава/седалката.
    headrest_provision:
      name: Наличие на облегалка за глава
      description: Показва дали са включени облегалки за глава и/или дали има точки
        за монтаж на облегалки за глава.
    headset_standard:
      name: Стандарт за слушалки
      description: Тип интерфейс на челната тръба/чашките на рамката.
    headstall_style:
      name: Стил на оглавника
      description: Класифицира конструктивния дизайн или конфигурацията около ушите/челото
        на оглавника.
    headwear_intended_use:
      name: Предназначение на покривалото за глава
      description: Посочва основната цел или контекст за носене на тюрбана (напр.
        косопад при химиотерапия, плуване, религиозни цели).
    hearing_enhancer_style:
      name: Стил на слуховия усилвател
      description: Описва физическия типоразмер на устройството, така че потребителите
        да могат да избират между дизайни за цялото ухо, в ухо, за зад главата и други.
    heart_rate_monitoring_method:
      name: Метод за наблюдение на пулса
      description: Посочва как устройството улавя данни за сърдечния ритъм по време
        на тренировка.
    heart_rate_sensing_technology:
      name: Технология за измерване на сърдечния ритъм
      description: Посочва физиологичния метод за измерване, използван от монитора
        за откриване на сърдечния ритъм (напр. електрически ECG спрямо оптичен PPG).
    heart_rate_sensor_placement:
      name: Разположение на сензора за пулс
      description: Посочва къде се носи или позиционира сензорът (върху тялото или
        велосипеда), което влияе върху комфорта и точността на измерването.
    heat_retention_technology:
      name: Технология за задържане на топлина
      description: Описва технология, покритие или материал, които засилват изпотяването
        или топлинната активност при колани за тренировка (напр. неопренов сауна ефект).
    heated_glass_feature:
      name: Функция на отопляемото стъкло
      description: Посочва дали стъклото на прозореца включва интегрирани електрически
        елементи, като мрежа за размразяване на задното стъкло и/или антена, вградена
        в стъклото.
    heater_control_actuation_method:
      name: Метод за управление на отоплителната система
      description: Посочва как управлението на отоплението/ОВК системата управлява
        ОВК модула на автомобила (напр. чрез жило, вакуумно управление или електронен
        сигнал).
    heater_control_electrical_connector_type:
      name: Тип електрически конектор за управлението на отоплението
      description: Посочва стила/интерфейса на електрическия конектор, използван от
        модула за управление на отоплението (напр. кабелен извод тип pigtail спрямо
        щекерен конектор).
    heating_technology:
      name: Технология на отопление
      description: Посочва основния механизъм на нагряване, който изпарителят използва,
        за да превърне материала в пара.
    heel_shape:
      name: Форма на тока
      description: Посочва геометричния стил или силует на тока, помагайки на купувачите
        да филтрират според външния вид и предпочитанията за стабилност (напр. ток
        тип „стилето“ спрямо широк/блок ток).
    helicopter_mission_type:
      name: Тип мисия на хеликоптера
      description: Основно предназначение/роля на хеликоптера.
    helicopter_rotor_configuration:
      name: Конфигурация на ротора на хеликоптера
      description: Посочва конфигурацията на роторната система на хеликоптера (разположение
        на основен/опашен ротор), като единичен основен + опашен, коаксиален, тандемен
        или с преплитащи се ротори.
    helmet_accessory_type:
      name: Тип аксесоар за каска
      description: Посочва конкретния вид част или аксесоар за велосипедна каска,
        така че купувачите лесно да намерят правилния артикул.
    helmet_audio_connector_type:
      name: Тип аудио конектор на каската
      description: Определя типа на аудиоконектора в самолета, използван от комуникационния
        кабел на каската, ако има такъв.
    helmet_communication_system_readiness:
      name: Подготовка за комуникационна система на каската
      description: Посочва дали каската е проектирана да приема интерком/Bluetooth
        комуникационна система.
    helmet_construction_type:
      name: Тип конструкция на каската
      description: 'Описва конструкцията на корпуса и подплатата на каската (например:
        пяна, твърда конструкция, хибридна).'
    helmet_fit_head_shape:
      name: Прилягане на каската (форма на главата)
      description: Вътрешен профил на прилягане за различни форми на главата.
    helmet_interior_liner_type:
      name: Тип вътрешна подплата на каската
      description: Тип комфортна подплата и дали тя е подвижна/перяща се.
    helmet_liner_material:
      name: Материал на подплатата на каската
      description: Посочва материала на вътрешната подплата или омекотяващия слой,
        които осигуряват комфорт и абсорбиране на удари.
    helmet_retention_closure_type:
      name: Тип на системата за закопчаване и фиксиране на каската
      description: Посочва механизма за закопчаване/задържане на каишката под брадичката
        на каската (напр. двоен D-пръстен, микрометрична тресчотка).
    helmet_safety_certification:
      name: Сертификация за безопасност на каската
      description: Изброява стандартите или сертификатите за безопасност, на които
        каската отговаря.
    helmet_safety_certification_standard:
      name: Стандарт за сертификация за безопасност на каска
      description: Стандарти за безопасност/хомологация, на които мотоциклетната каска
        е сертифицирана да отговаря.
    helmet_shell_material:
      name: Материал на външната обвивка на каската
      description: Основен материал или конструкция на външната черупка на каската.
    helmet_size_system:
      name: Система за размери на каската
      description: Системата за оразмеряване, използвана за обозначаване размера на
        каската.
    helmet_sun_visor_type:
      name: Тип слънчев визьор на каската
      description: Посочва дали каската включва вътрешен падащ слънчев визьор, външен
        затъмнен визьор, и двата или нито един.
    helmet_vehicle_fit:
      name: Съвместимост на каската с превозно средство
      description: Вид превозно средство/каране, за което е предназначена каската.
    helmet_ventilation_adjustability:
      name: Регулируемост на вентилацията на каската
      description: Посочва как вентилацията на каската може да се контролира от водача.
    helmet_ventilation_configuration:
      name: Конфигурация на вентилацията на каската
      description: Описва разположението и регулируемостта на вентилацията на каската
        (напр. вентилация на брадичката, челни/входящи отвори, затварящи се отвори).
    helmet_visor_peak_adjustability:
      name: Регулируемост на козирката/визьора на каската
      description: Посочва дали козирката на офроуд каската е регулируема и/или сваляща
        се.
    helmet_visor_shield_optical_features:
      name: Оптични характеристики на визьора на каската
      description: Оптични характеристики и характеристики за съвместимост на основния
        лицев щит/визьор.
    helmet_visor_shield_type:
      name: Тип визьор/щит за каска
      description: Основна конфигурация на лицевия щит/визьор, включен с каската.
    hem_style:
      name: Стил на подгъва
      description: Посочва стила на завършване на отвора на крачола — като изчистен,
        подгънат или суров ръб — който силно влияе върху външния вид на дрехата.
    hemisphere_compatibility:
      name: Съвместимост с полукълбо
      description: Указва за кое полукълбо е предназначена звездната карта въз основа
        на видимите съзвездия.
    hemline_style:
      name: Стил на подгъва
      description: Определя кройката или дизайна на долния край на роклята.
    herbal_infusion_function:
      name: Функция за запарване на билки
      description: Показва основната полза за здравето или функционална полза, за
        която се използва запарката.
    hex_size:
      name: Размер на шестостена
      description: Размер на шестостенния ключ, необходим за монтаж/демонтаж на подгревната
        свещ.
    hi_hat_pair_type:
      name: Тип чифт hi-hat чинели
      description: Посочва дали продуктът се продава като съчетан чифт (горен и долен
        чинел), или като отделен чинел.
    hi_hat_sound_character:
      name: Характеристика на звука на хай-хет чинел
      description: Описва общия тонален профил, за да помогне на купувачите да филтрират
        според желания звук.
    high_visibility_class:
      name: Клас на висока видимост
      description: Посочва нивото на класификация за видимост ANSI/ISEA 107 на облеклото.
    highback_style:
      name: Стил с високата облегалка
      description: Описва структурния стил/дизайна на високата облегалка, който оказва
        влияние върху характеристиките при каране.
    hitch_ball_diameter:
      name: Диаметър на тегличната топка
      description: Диаметър на сферичната глава на тегличната топка, която се свързва
        с ремаркето (напр. 1 7/8 инча, 2 инча, 2 5/16 инча, 50 мм).
    hitch_ball_mounting_style:
      name: Стил на монтаж на тегличната топка
      description: Посочва дали тегличната топка е стандартен тип с гайка, фиксиран/пресован
        тип за конкретни глави на теглича, или включва интегриран монтажни метални
        елементи.
    hobby_horse_handle_type:
      name: Тип дръжка на играчка-конче
      description: Посочва конструкцията на захвата/дръжката, използвана за държане
        или управление на играчка-конче.
    hobby_horse_sound_features:
      name: Звукови функции на играчка-конче
      description: Посочва дали играчката-конче включва звукови ефекти и какви са
        те.
    hockey_goal_type:
      name: Тип хокейна врата
      description: Посочва стила или предназначението на хокейната врата (напр. за
        стандартен лед, улица, мини).
    hockey_size_category:
      name: Категория размер за хокей
      description: Посочва стандартизирания размерен сегмент на оборудването, за който
        е предназначена частта (детски, юношески, средни, възрастни).
    hockey_size_segment:
      name: Размерен сегмент за хокей
      description: Определя стандартизирания размер на хокейното оборудване, който
        определя общите размери и прилягането на предпазителите.
    hold_surface_texture:
      name: Текстура на повърхността за захват
      description: Описва грапавостта или тактилното покритие на повърхността за захват.
    home_decor_sewing_pattern_project_type:
      name: Тип проект за шивашки модел за домашен декор
      description: Посочва какъв тип предмет за домашен декор се изработва по шивашкия
        модел (напр. калъфка за възглавница, перде, тишлайфер).
    homologation_rule_set:
      name: Хомологация / набор от правила
      description: Посочва санкциониращия орган или набора от правила, с които автомобилът
        е съвместим (където е приложимo).
    honey_form:
      name: Форма на меда
      description: Посочва физическата форма или вида, в който е представен медният
        продукт.
    honey_processing_method:
      name: Метод за обработка на мед
      description: Посочва как медът е бил обработен или преработен преди опаковане.
    honey_variety:
      name: Сорт мед
      description: Посочва ботаническия или флоралния произход на меда — дали е монофлорен
        или полифлорен — което пряко влияе върху вкуса, цвета и цената.
    hood_configuration:
      name: Конфигурация на качулката
      description: Описва дизайна на качулката и функциите за регулиране.
    hood_design:
      name: Дизайн на качулката
      description: Определя наличието и стила на качулката на дрехата.
    hood_style:
      name: Стил на качулката
      description: Посочва наличието и стила на качулката на дрехата.
    hood_type:
      name: Тип качулка
      description: Показва специални дизайнерски характеристики на качулката на дрехата.
    hook_and_eye_size_hook_number:
      name: Размер на куката и ухото (номер на куката)
      description: Стандартизирано оразмеряване/номериране на кукичка и ухо (когато
        е приложимо), използвано върху опаковката за обозначаване на общия размер
        на кукичката/ухото.
    hook_and_loop_fastener_duty_rating:
      name: Клас на натоварване на велкро закопчалката
      description: Посочва предназначената здравина/натоварване на велкро закопчалката.
    hook_and_loop_fastener_format:
      name: Формат на велкро закопчалката
      description: Определя физическата форма или формата на опаковката на продукта
        с велкро (например ролка/лента, точки, ленти).
    hook_and_loop_fastener_side:
      name: Страна на велкро закопчаването
      description: Посочва дали продуктът включва само страната с кукичките, само
        страната с бримките или комплект, съдържащ и двете страни.
    hook_coating_finish:
      name: Покритие/финиш на куката
      description: Повърхностна обработка или покритие, нанесено върху куката за устойчивост
        на корозия, по-ниска видимост или цвят (напр. черен никел, калайдисване).
    hook_configuration:
      name: Конфигурация на куката
      description: Описва наличието и стила на куките, включени към примамката.
    hook_eye_style:
      name: Стил на халката за кука
      description: Посочва формата или ориентацията на ухото на куката, което влияе
        върху начина на връзване или закрепване.
    hook_eye_type:
      name: Тип халка за кука
      description: Посочва дизайна на ухото на куката, влияещ върху избора на възел
        и монтажа.
    hook_loop_format:
      name: Формат на куката и примката
      description: Определя физическия формат на пришиваемата велкро лепенка.
    hook_loop_side:
      name: Страна на велкрото
      description: Указва дали продуктът е страната с кукички, страната с примки или
        комплект от двете (кукички и примки).
    hook_material:
      name: Материал на куката
      description: Посочва материала, използван специално за куката/главата на канджата,
        ключов фактор за здравината и устойчивостта на корозия при употреба в солена
        вода.
    hook_organizer_style:
      name: Стил на органайзера за куки
      description: Физическият стил или форм-фактор на органайзера за куки (напр.
        кутия, ролка или калъф), използван за улесняване на разглеждането и филтрирането
        по тип органайзер.
    hook_point_configuration:
      name: Конфигурация на точките за закачане
      description: Посочва дали куката има два върха (двойна) или три върха (тройна).Тип
        върхове на куката
    hook_point_type:
      name: Тип върхове на куката
      description: Описва заточването или формата на върха на рибарската кука, което
        влияе върху проникването и задържането.
    hook_shank_length:
      name: Дължина на стеблото на куката
      description: Посочва относителната класификация на дължината на стеблото на
        куката (напр. късо, дълго) за бързо визуално и функционално сравнение.
    hooks_eyes_attachment_method:
      name: Метод за закрепване на кукичките и ушите
      description: Начинът, по който куките и халките (закопчалките) са прикрепени
        към дрехата или изделието.
    hop_up_type:
      name: Тип система за регулиране на траекторията
      description: Определя hop-up системата, използвана за придаване на обратно въртене
        на BB топчетата за по-голям обсег и точност.
    horse_blanket_type:
      name: Вид одеяло за коне
      description: Указва основния стил или предназначение на конската попона или
        покривало.
    horse_brush_type:
      name: Тип четка за коне
      description: Класифицира четката според специфичния ѝ стил за грижа или предназначение,
        позволявайки на клиентите да филтрират без раздробяване на категориите.
    horse_care_purpose:
      name: Предназначение за грижа за коне
      description: Основното предназначение на продукта в областта на грижата за конете,
        обхващащо нуждите, свързани със здравето, поддържането на външния вид и отглеждането.
    horse_feed_stage:
      name: Етап на хранене на коне
      description: Показва възрастовия етап или физиологичното състояние на коня,
        за което е формулиран фуражът.
    horse_groomer_type:
      name: Тип уред или инструмент за грижа и разресване на коня
      description: Класифицира стила на уреда за грижа и разресване, за да могат купувачите
        бързо да открият конкретния инструмент, от който се нуждаят.
    horse_leg_protection_type:
      name: Тип защита за краката на кон
      description: Класифицира конкретния стил или функция на ботуша, бинта или превръзката
        за коне.
    horse_model_breed:
      name: Порода кон в модела
      description: Посочва породата кон, изобразена от мащабния модел (ако е приложимо).
    hosiery_toe_style:
      name: Стил на пръстите на чорапогащника
      description: Определя конструкцията на зоната на пръстите на чорапогащника,
        важна за издръжливостта и съвместимостта с обувки с отворени пръсти.
    hot_air_balloon_basket_type:
      name: Тип кош на балон с горещ въздух
      description: Указва основната конфигурация или стил на коша (напр. стандартен
        спортен, търговски с голям капацитет, разделен на секции, с достъпна врата),
        използван за качване и предвиден режим на работа.
    hot_air_balloon_burner_type:
      name: Тип горелка за балон с горещ въздух
      description: Тип или конфигурация на горивната система, монтирана на балона.
    hot_air_balloon_envelope_material:
      name: Материал на обвивката на балона с горещ въздух
      description: Основен плат/материал, използван за обвивката (купола) на балона.
    hotfix_application_tool:
      name: Инструмент за поставяне на термофиксиращи елементи
      description: Препоръчителен инструмент или източник на топлина, използван за
        нанасяне на кристали за бързо фиксиране.
    hub_axle_type:
      name: Тип ос на главината
      description: Посочва интерфейса/системата за закрепване на оста, за която е
        проектирана главината (quick-release, проходна ос и др.).
    hub_motor_type:
      name: Тип мотор, разположен в главината на колелото
      description: Описва конструктивния тип на моторa в главината (с редуктор, директно
        задвижване, с четки или безчетков), за да информира купувачите за характеристиките
        като въртящ момент, тегло и ефективност.
    hula_hoop_construction_type:
      name: Тип конструкция на обръч
      description: Описва как е конструиран/сглобен обръчът.
    hula_hoop_features:
      name: Характеристики на обръча
      description: Подчертава отличителните функционални или дизайнерски характеристики
        на обръча за въртене.
    hull_design:
      name: Дизайн на корпуса
      description: Описва формата на корпуса, която влияе върху характеристиките на
        поведение и управляемост.
    hull_type:
      name: Тип корпус
      description: Описва формата на корпуса, която влияе върху производителността
        и стабилността.
    humidifier_refill_medium_type:
      name: Тип пълнител за овлажнител
      description: Посочва влагозадържащия/пълнещ материал, използван в овлажнителя
        за калъф (това, което се навлажнява или подменя).
    humidifier_refill_method:
      name: Метод за пълнене на овлажнителя
      description: Описва начина, по който овлажнителят се зарежда с влага или се
        подменя.
    humidifying_medium:
      name: Овлажняващ материал.
      description: Идентифицира овлажняващия елемент/среда, използван от продукта
        (какво се навлажнява/активира).
    hummus_base_ingredient:
      name: Основна съставка на хумуса
      description: Посочва основната бобова или зеленчукова съставка, използвана за
        приготвянето на хумуса.
    hunting_call_type:
      name: Вид звукова примамка
      description: Класифицира основния работен стил или механизъм на примамката/свирката
        (напр. духова, електронна, тип кутия), така че ловците бързо да изберат най-подходящия
        формат според нуждите и уменията си.
    hunting_dog_collar_function:
      name: Функция на нашийника за ловни кучета
      description: Класифицира основния функционален стил или предназначение на нашийника,
        като помага на клиентите да филтрират продуктите според функции като проследяване,
        обучение, видимост или стандартна употреба.
    hvac_control_functions:
      name: Функции за управление на ОВК система
      description: Показва кои функции на ОВК системата, размразяването и въздушния
        поток се управляват от уреда (механично или електронно).
    hybrid_drivetrain_configuration:
      name: Конфигурация на хибридното задвижване
      description: Посочва архитектурата на PHEV системата, описваща как електромоторът(ите)
        и двигателят с вътрешно горене осигуряват задвижване.
    hybrid_system_type:
      name: Тип хибридна система
      description: Класифицира хибридната архитектура, използвана от превозното средство.
    hybrid_truck_cab_type:
      name: Тип кабина на хибриден камион
      description: Указва конфигурацията на кабината на камиона, която определя капацитета
        за сядане и вътрешното пространство.
    hydration_bag_features:
      name: Характеристики на хидратиращата чанта
      description: Подчертава забележителни дизайнерски или функционални характеристики,
        специфични за хидратиращите раници.
    hydration_belt_features:
      name: Характеристики на колан за хидратация
      description: Изброява забележителни вградени функции, които подобряват удобството,
        безпасността или практичността на хидратиращия колан.
    hydration_bladder_compatibility:
      name: Съвместимост с хидратиращ резервоар
      description: Посочва дали жилетката включва или поддържа система с хидратиращ
        резервоар.
    hydration_mouthpiece_style:
      name: Стил на мундщука за хидратация
      description: Посочва дизайна или функционалния стил на мундщука или клапана
        на хидратиращата система, помагайки на клиентите да изберат предпочитания
        интерфейс за пиене и да осигурят съвместимост.
    hydration_pack_style:
      name: Стил на хидратиращата раница
      description: Посочва конструктивния стил на хидратиращата раница, като раница
        или жилетка, за улесняване на филтрирането по предназначение и начин на употреба.
    hydration_system_insulation:
      name: Изолация на хидратиращата система
      description: Посочва дали резервоарът и/или тръбата за пиене са изолирани, за
        да помагат за поддържане на температурата на течността при горещи или студени
        условия.
    hydration_valve_type:
      name: Тип клапан за хидратация
      description: Посочва стила на клапана или мундщука за пиене, включен към системата
        или бутилката, включително разпространени дизайни като bite-valve и високодебитни
        накрайници.
    hydraulic_fluid_type:
      name: Тип хидравлична течност
      description: Посочва типа спирачна течност, за която е проектиран лостът на
        хидравличната велосипедна спирачка. Тази информация е от решаващо значение
        за поддръжката и безопасността.
    hydrogenation_level:
      name: Ниво на хидрогениране
      description: Посочва дали мазнината е нехидрогенирана, частично хидрогенирана
        или напълно хидрогенирана, което влияе върху съдържанието на трансмазнини
        и качествата при печене.
    hydrophobicity_level:
      name: Ниво на хидрофобност
      description: Посочва степента на водоотблъскване/разтичане на водата, рекламирана
        за продукта.
    ice_cream_format:
      name: Формат на сладоледа
      description: Описва физическата форма или представяне на продукта сладолед (напр.
        пинта, блокче, мочи).
    ice_skate_sharpener_type:
      name: Тип острилка за кънки за лед
      description: Класифицира цялостния дизайн или формат на острилката (ръчна острилка,
        електрическа машина, шаблон и др.).
    ice_temperature_suitability:
      name: Подходяща температура на леда
      description: Посочва температурния диапазон на леда, за който е формулиран восъкът
        за хокейна стика, влияещ върху характеристиките и отблъскването на сняг.
    icing_sugar_variety:
      name: Вид пудра захар
      description: Класифицира формулата или функционалния тип пудра захар (напр.
        фондан, нетопяща се захар тип „snow powder“, оцветена, ароматизирана).
    ignition_coil_configuration:
      name: Конфигурация на запалителната бобина
      description: Определя типа на запалителната бобина (единична бобина/бобина на
        свещта, пакет от бобини с няколко извода според броя на цилиндрите, бобина
        на шина/касета или тип с разпределител).
    ignition_lead_compliance_standard:
      name: Стандарт за съответствие на запалителните кабели
      description: Официален индустриален стандарт или сертификат, на който отговарят
        запалителните кабели според производителя (напр. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Изолационен материал на кабела за запалване
      description: Основен изолационен/облицовъчен материал, използван за запалителния
        кабел (външната изолация на кабела).
    ignition_lead_set_type:
      name: Тип комплект запалителни кабели
      description: Посочва дали продуктът представлява единичен запалителен кабел
        или пълен комплект и за какво е предназначен комплектът.
    ignition_lead_terminal_type:
      name: Тип клема на запалителния кабел
      description: Стил на клемата/конектора, използван в краищата на запалителния
        кабел (напр. тип клема за запалителна свещ и тип клема за бобина/разпределител).
    illumination_type:
      name: Тип осветление
      description: Посочва дали и как топката е осветена за игра през нощта (напр.
        фосфоресциращо сияние, LED осветление, активиращо се при удар).
    immobilizer_installation_type:
      name: Тип монтаж на имобилайзер
      description: Посочва как имобилайзерът е инсталиран или свързан към превозното
        средство.
    immobilizer_unlock_method:
      name: Метод за отключване на имобилайзера
      description: Посочва как имобилайзерът се активира/деактивира или отключва.
    impact_protection_certifications:
      name: Сертификати за защита при удар
      description: Назовава конкретните стандарти за безопасност, на които защитната
        подложка отговаря или които надвишава.
    impact_protection_level:
      name: Ниво на защита от удар
      description: Посочва нивото или технологията за защита при удар, предлагани
        от спортния протектор.
    impact_protection_rating:
      name: Клас на защита при удар
      description: Посочва сертифицираното ниво на защита при удар съгласно стандартите
        (напр. EN 1621-1 Level 1, EN 14120 Level 2), помагайки на мотористите да филтрират
        продукти с по-висока степен на защита.
    impact_surface_material:
      name: Материал на ударната повърхност
      description: Описва основния материал на ударната/защитната повърхност за безопасност
        и усещане (напр. пяна, пластмаса).
    incense_base_material:
      name: Материал на основата за тамян
      description: Основен базов материал/свързващо вещество, използвано за направата
        на тамяна (прахообразна основа) в комплекта.
    incense_making_method:
      name: Метод за приготвяне на тамян
      description: Предвиденият процес за изработка, поддържан от комплекта.
    incense_tool_type:
      name: Тип инструмент за изработка на тамян
      description: Посочва какъв вид инструмент за изработка на тамян е този продукт
        (използван за оформяне, измерване, пресоване, смесване или сушене на тамян).
    incline_adjustment_type:
      name: Тип регулиране на наклона
      description: Описва как (или дали) наклонът може да се променя по време на тренировки.
    included_accessories:
      name: Включени аксесоари
      description: Изброява включените допълнителни аксесоари като резервни глави/битове,
        калъф за съхранение, кабел за зареждане или AC адаптер.
    included_case_type:
      name: Тип включен калъф
      description: Тип на включения калъф за носене/съхранение на бас саксофона (ако
        има такъв).
    included_components:
      name: Включени компоненти
      description: Изброява какво е включено в комплекта (полезно за набори инструменти
        и комплекти).
    included_fastener_components:
      name: Включени крепежни елементи
      description: Посочва дали продуктът представлява комплект с кукички и уши, само
        кукички, само уши или свързан вариант на закопчаване за облекло.
    included_hydration_vessel_type:
      name: Тип включен съд за хидратация
      description: Определя стила на контейнера за вода, който се доставя или се поддържа
        от колана.
    included_items_woodwind_instrument:
      name: Включени артикули (дървен духов инструмент)
      description: Изброява кои често включвани артикули са включени в комплекта на
        бас саксофона.
    included_materials:
      name: Включени материали
      description: Посочва какви компоненти са включени към закупения модел/шаблон
        (само шаблон спрямо шаблон + материали).
    included_mounting_accessories:
      name: Включени монтажни аксесоари
      description: Изброява кои аксесоари за монтаж/закрепване са включени към високоговорителя.
    included_pump_type:
      name: Включен тип помпа
      description: Определя вида на помпата, която е включена или вградена в надуваемото
        легло.
    included_scraper_implement_type:
      name: Тип включен инструмент за стържене
      description: Показва кои принадлежности за свирене са включени към музикалния
        скрепер (напр. пръчка/палка за скрепер, телена четка).
    indicator_design:
      name: Дизайн на индикатора
      description: Класифицира физическата форма или стила на индикатора за кълване
        при риболов.
    indicator_functions_tracked:
      name: Проследявани функции на индикатора
      description: Изброява основните аксесоари, включени към надуваемата декорация
        (напр. вентилатор, колчета, въжета за закрепване).
    indoor_outdoor_use:
      name: Употреба на закрито/открито
      description: Посочва дали играчката за боулинг е предназначена за употреба на
        закрито, на открито или и за двете.
    inflatable_decoration_items_included:
      name: Включени елементи за надуваема декорация
      description: Изброява ключовите аксесоари, включени в надуваемата декорация
        (напр. вентилатор, колове, въжета за закрепване).
    inflatable_decoration_type:
      name: Вид надуваема декорация
      description: Посочва вида на надуваемата парти декорация (форма/дизайн) с цел
        улесняване на разглеждането и филтрирането.
    inflatable_raft_float_features:
      name: Характеристики на надуваем сал/пояс
      description: Функционални характеристики, налични при надуваемия сал/пояс.
    inflation_method_included:
      name: Включен метод за надуване
      description: Посочва типа средство за напомпване на гуми, включено към комплекта
        за ремонт, ако има такова.
    infused_scent:
      name: Добавен аромат
      description: Определя ароматните или вкусовите добавки, вложени в материала
        на стръвта.
    ingredient_base_type:
      name: Тип на основната съставка
      description: Определя основната база, използвана за ферментация (напр. концентрат
        от гроздов сок спрямо пресен сок или плодов концентрат).
    ingredient_physical_form:
      name: Физична форма на съставката
      description: Определя физическата форма, в която се доставя ароматната съставка
        (използва се за работа, дозиране и формулиране).
    ingredient_processing_method:
      name: Метод за обработка на съставките
      description: Посочва основния метод на обработка, приложен към съставката (напр.
        лиофилизиране, печене, ферментация).
    ink_colors_included:
      name: Включени цветове мастило
      description: Указва цветовете на мастилото, включени в подложките за печати
        в комплекта.
    ink_pad_application_method:
      name: Метод на приложение на мастиления тампон
      description: Как мастилото се нанася/използва от тампона (традиционен тампон
        за печати, тампон тип даубер или тампон с връх тип четка).
    ink_pad_permanence:
      name: Трайност на мастилената подложка
      description: Дали отпечатаното мастило е трайно и/или архивно (устойчиво на
        избледняване и вода след изсъхване).
    ink_pad_size:
      name: Размер на мастиления тампон
      description: Стандартизиран размер/форм-фактор на повърхността/кутията на мастиления
        тампон.
    ink_pad_special_effects:
      name: Специални ефекти на мастилената подложка
      description: Специални визуални/функционални ефекти на мастилото при щамповане
        (напр. металик, брокат).
    ink_permanence:
      name: Трайност на мастилото
      description: Указва дали изсъхналото суми мастило е предназначено да бъде трайно/архивно
        или миещо се/нетрайно.
    ink_preparation_required:
      name: Необходима подготовка на мастило
      description: Показва дали мастилото суми е готово за употреба или изисква разреждане
        с вода или стриване преди употреба.
    inline_skate_brake_type:
      name: Тип спирачка за ролери
      description: Указва конфигурацията на спирачките, включени с ролерите, като
        подвижна пета спирачка или липса на спирачка.
    inner_tent_configuration:
      name: Конфигурация на вътрешната палатка
      description: Посочва конфигурацията или стила на вътрешната палатка, например
        цялостна вложка, мрежеста вложка или термо подплата.
    innerspring_coil_type:
      name: Тип вътрешна пружина
      description: Посочва конфигурацията или стила на вътрешната палатка, например
        цялостна вложка, мрежеста вложка или термо подплата.
    input_connector_type:
      name: Тип входен конектор
      description: Посочва типа аудио входен конектор, използван от педала (обикновено
        1/4-инчов TS).
    input_valve_type:
      name: Тип входен клапан
      description: Посочва стандарта на вентила на велосипедната гума/колело, към
        който се свързва адаптерът.
    insecticide_treatment:
      name: Третиране с инсектицид
      description: Показва дали мрежата е фабрично обработена с инсектицид и, ако
        да, какъв тип обработка е използван за допълнителна защита.
    insert_coverage_area:
      name: Въведете зона на покритие
      description: Указва коя част от стъпалото е предназначена да покрива вложката
        (напр. пълна дължина, само пета).
    insert_length_type:
      name: Тип дължина на вложката
      description: Показва каква част от стелката покрива опората за свода на стъпалото.
    inside_message_type:
      name: Вид на съобщението от вътрешната страна
      description: Показва дали картичката включва предварително отпечатано съобщение
        от вътрешната страна и дали може да бъде персонализирано.
    insole_attachment_method:
      name: Метод за закрепване на стелката
      description: Указва как опората за свода се фиксира в обувката (свободно поставена,
        със залепваща основа, с кукички и примки и др.).
    insole_material:
      name: Материал на стелката
      description: Описва материала, от който е изработена стелката, върху която се
        опира стъпалото, и който оказва влияние върху амортизацията и опората.
    installation_fabrication_level:
      name: Ниво на изработка на монтажа
      description: Показва обичайния обем на изработката по поръчка или модификациите,
        необходими за монтажа на комплекта.
    installation_location:
      name: Място на монтаж
      description: Посочва типичната точка за монтаж на сензора за налягане на маслото
        в двигателната маслена система (напр. отвор на масления канал в блока, корпус
        на филтъра, адаптерна плоча или монтаж на отдалечена линия).
    installation_method:
      name: Метод на инсталация
      description: Указва как постелката или плочките се закрепват или монтират върху
        пода.
    instant_coffee_form:
      name: Форма за разтворимо кафе
      description: Описва физическата форма, в която се доставя разтворимото кафе,
        което влияе върху начина на приготвяне и срока на годност.
    instep_coverage:
      name: Покритие на свода на стъпалото
      description: Посочва дали продуктът предпазва само пищяла или както пищяла,
        така и стъпалото/крака.
    instruction_format:
      name: Формат на инструкциите
      description: Формат на инструкциите, включени в комплекта.
    instrument_cleaning_swab_form_factor:
      name: Форма на почистващия тампон за инструмент
      description: Посочва физическия стил на почистващия тампон (напр. кърпа за издърпване
        спрямо система с прът/четка), за да съответства на предпочитанията на музиканта
        и ограниченията на инструмента.
    instrument_dimensions_unit_context:
      name: Контекст на мерните единици на инструмента
      description: 'Пояснява към какво се отнасят посочените размери за височина/ширина/дължина
        (например: цялостни размери на уреда, дължина на отделна тръба, височина на
        стойката).'
    instrument_electronics_type:
      name: Тип електроника на инструмента
      description: Показва дали системата за пикъп/предусилване на инструмента е активна
        или пасивна.
    instrument_key:
      name: Тоналност на инструмента
      description: Посочва обозначението на тоналността на блокфлейтата, използвано
        в каталозите (обикновено C или F за по-големи блокфлейти).
    instrument_level:
      name: Ниво на инструмента
      description: Ниво на целевия изпълнител за инструмента.
    instrument_part_mounting_method:
      name: Метод на монтаж на частта на инструмента
      description: Посочва как частта се прикрепя или монтира (напр. със скоба, чрез
        залепване или с винтове).
    instrument_parts_included:
      name: Включени части за инструмента
      description: Изброява основните компоненти/части, включени в кутията за кларинет
        в Ла.
    instrument_playing_technique:
      name: Техника на свирене на инструментa
      description: Начинът, по който инструментът се свири/задейства (напр. разклащане,
        удар, щракване).
    instrument_size_class:
      name: Клас на размера на инструмента
      description: Общ размер на инструмента, изразен като удобен за потребителя клас,
        а не като точни размери.
    insulation_fill_material:
      name: Материал на изолационния пълнеж
      description: Идентифицира основния материал, използван за изолация на якето
        или жилетката.
    integrated_bottom_type:
      name: Тип интегрирано дъно
      description: Показва дали облеклото включва вградени бикини, шорти, трико или
        подобни вътрешни слоеве за покритие при движение
    integrated_charging_options:
      name: Опции за интегрирано зареждане
      description: Изброява наличните вградени захранващи или зарядни интерфейси на
        нощното шкафче.
    integrated_furniture_function:
      name: Интегрирана функция на мебелите
      description: Определя допълнителните вградени мебели, включени с падащото легло
        или рамката (напр. бюро, диван, рафтове).
    integrated_locking:
      name: Интегрирано заключване
      description: Дали стойката включва интегрирана ключалка за закрепване към превозното
        средство и/или велосипеда.
    integrated_power_options:
      name: Интегрирани опции за захранване
      description: Посочва типа вградени захранващи или зарядни функции, които тоалетката
        предлага.
    integrated_storage_features:
      name: Интегрирани функции за съхранение
      description: Определя допълнителните функции за съхранение или аксесоари, които
        стойката за билярдни щеки включва извън местата за щеки.
    integrated_tool_functions:
      name: Вградени функции на инструмента
      description: Допълнителни функции на инструменти, интегрирани в лоста (напр.
        кука за спици, инструмент за премахване на вентилна сърцевина, инструмент
        за отделяне на борд).
    intended_board_type:
      name: Предвиден тип дъска
      description: 'Определя типа кайтборд, за който е предназначена перката (например:
        двукрил, за сърф, хидрофойл).'
    intended_consumption:
      name: Предназначена консумация
      description: Посочва как продуктът е предназначен да бъде консумиран, като указва
        дали е безопасен за консумация в сурово състояние, изисква печене или е частично
        изпечен.
    intended_craft:
      name: Предназначен занаят/приложение
      description: Основният занаятчийски контекст, за който е предназначен водачът
        за прежда.
    intended_culinary_use:
      name: Предназначение за кулинарна употреба
      description: Показва основното кулинарно приложение на соса, като например потапяне,
        готвене или глазиране.
    intended_handlebar_style:
      name: Предвиден стил на кормилото
      description: Описва предназначения тип или стил на лоста (напр. право кормило,
        шосейно кормило, аеродинамично кормило). Това бързо стеснява съвместимостта,
        без да налага допълнителни подкатегории.
    intended_player_role:
      name: Предвидена роля на играча
      description: Указва позицията на терена, за която е предназначена защитната
        каска (напр. кетчър, съдия).
    intended_playing_surface:
      name: Предназначена игрална повърхност
      description: Повърхност, за която е предназначена шайбата, топката или рингът,
        като лед, асфалт, спортни зали или синтетичен лед.
    intended_repair_location:
      name: Предвидено място за ремонт
      description: Къде върху гумата комплектът е предназначен да извършва ремонт.
    intended_seating_position:
      name: Предназначена позиция за сядане
      description: Указва позицията на седене в превозното средство, за която е предназначен
        предпазният колан за монтаж или употреба.
    intended_sewing_application:
      name: Предназначение за шиене
      description: Предназначението за шиене, за което е проектиран конецът (напр.
        универсално шиене на дрехи, капитониране, тапицерия).
    intended_technique:
      name: Предвидена техника
      description: Основна техника на плъстене, за която е предназначена подложката/постелката.
    intended_use:
      name: Предназначение
      description: Основен контекст на употреба на инструмента.
    intended_use_fleece_fabric:
      name: Предназначение (плат от полар)
      description: Основният проект/приложение, за което се предлага полареният плат.
    intended_user:
      name: Предназначен потребител
      description: Посочва за кого е предназначена защитната екипировка за авиация.
    intended_yarn_form:
      name: Предвидена форма на преждата
      description: Указва формата на преждата, за която е най-подходяща купата за
        прежда.
    interaction_mode:
      name: Режим на взаимодействие
      description: Основният метод на взаимодействие, използван за задействане на
        звуци или активности.
    interactive_effects:
      name: Интерактивни ефекти
      description: Указва електронните или механичните интерактивни ефекти, включени
        в комплект за детска кухня.
    interfacing_application_area:
      name: Област на приложение на подлепващия материал
      description: Определя обичайните области за шиене/занаяти, които подлепващият
        материал е предназначен да поддържа.
    interfacing_color_family:
      name: Цветова гама на подлепващия материал
      description: Посочва типичния основен цвят на подлепващия материал за употреба
        под светли или тъмни тъкани.
    interfacing_selling_format:
      name: Формат на продажба на подлепващия материал
      description: Описва формата на продажба на подлепващия материал (например непрекъснато
        рязане, продавано на метър, предварително изрязани парчета, ролки или мостри).
    interfacing_stiffness_level:
      name: Ниво на твърдост на подлепващия материал
      description: Описва степента на твърдост/стегнатост, осигурена от подлепващия
        материал.
    interior_padding_type:
      name: Тип вътрешна подплата
      description: Тип вътрешна подплата или система от вложки, използвана вътре в
        калъфа за защита и организиране на съдържанието.
    interior_stall_configuration:
      name: Конфигурация на вътрешния щанд
      description: Указва вътрешното разпределение/конфигурация за транспортиране
        на животни (ориентация на ремаркето и тип на отделението).
    invitation_printing_coverage:
      name: Покритие за печат на покани
      description: Кои страни на поканата са отпечатани (само отпред или двустранно).
    iodization:
      name: Йодиране
      description: Показва дали и в каква степен е добавен йод към солта.
    iridescence_level:
      name: Ниво на иризация
      description: Описва интензивността на естествения/обработен иридесцентен блясък,
        характерен за пауновите пера.
    irish_warpipe_set_configuration:
      name: Конфигурация на комплекта ирландска бойна гайда
      description: Посочва каква конфигурация се продава (цял инструмент спрямо части/частичен
        комплект), специално за ирландски гайди.
    iron_on_applique_application_method:
      name: Метод за прилагане на термоапликация
      description: Указва начина, по който апликацията за лепене с ютия трябва да
        се приложи към основата.
    ironing_center_features:
      name: Характеристики на центъра за гладене
      description: Изброява специализирани характеристики на станциите за гладене,
        които подобряват удобството и леснотата на употреба.
    jacket_breast_style:
      name: Стил на предницата на сакото
      description: Указва дали сакото е едноредно или двуредно.
    jacket_vent_style:
      name: Стил на вентилационните отвори на якето
      description: Указва типа на шлиците (отворите) в задната част на сакото.
    jam_and_jelly_consistency:
      name: Консистенция на конфитюр и желе
      description: Описва текстурата на продукта за мазане, като показва наличие на
        парченца плодове или семена.
    jaw_shape:
      name: Форма на челюстта
      description: Геометрия на челюстите или върха (напр. прав, извит, с удължен
        връх), която влияе върху прецизността и достъпа.
    jerky_form:
      name: Форма на сушеното месо
      description: Описва физическата форма или разрез на парчетата сушено месо (напр.
        ленти, пръчици, хапки).
    jersey_style:
      name: Стил спортни фланелки
      description: Посочва формата или стила на носене на фенските фланелки.
    jew_harp_accessories_included:
      name: Включени аксесоари за устна арфа
      description: Изброява включените елементи, пакетирани с варгана (напр. калъф,
        торбичка, инструкции).
    jew_s_harp_frame_style:
      name: Стил на рамката на варгана
      description: Описва конструктивния стил на рамката/тялото на варгана, който
        влияе върху усещането, издръжливостта и ергономията при свирене.
    jew_s_harp_tongue_profile:
      name: Профил на езичето на варгана
      description: Описва профила/геометрията на езичето (тръстиката) на устната хармоника
        тип еврейска арфа, което влияе върху отзивчивостта и тембъра.
    jewelry_pieces_included:
      name: Включени бижута
      description: Изброява конкретните бижута, включени в комплекта, така че купувачите
        да знаят точно какви артикули купуват.
    jigsaw_puzzle_piece_shape:
      name: Форма на парчето пъзел
      description: Общ стил на изрязване/форма на елементите и профила на ръбовете.
    jockstrap_design_features:
      name: Характеристики на дизайна на атлетичния суспензор
      description: Описва специални дизайнерски елементи, характерни за спортните
        суспензори, които влияят върху функционалността или външния вид.
    juggling_club_construction_type:
      name: Тип конструкция на жонгльорска бухалка
      description: Посочва общия конструктивен тип на жонгльорската бухалка (напр.
        едночастно формована спрямо сглобяема от няколко части), което може да повлияе
        на издръжливостта, усещането и поддръжката.
    juggling_club_core_material:
      name: Материал на сърцевината на жонгльорската бухалка
      description: Основният материал на сърцевината, използван вътре в бухалката
        (различен от външната обвивка/лента).
    juggling_prop_set_size:
      name: Размер на комплекта за жонглиране с уреди
      description: Брой основни реквизити, включени в комплекта (напр. комплект от
        3 топки, чифт пой).
    juggling_ring_edge_style:
      name: Juggling ring edge style
      description: Профил на ръба на ринга, който влияе върху удобството и захващането.
    juice_form:
      name: Форма на сок
      description: Посочва физическата форма или етапа на обработка на продукта (напр.
        течност с нормална концентрация, концентрат, прах).
    juice_processing_method:
      name: Метод за обработка на сока
      description: Посочва основната техника на обработка, приложена към сока или
        напитката, която влияе върху вкуса, запазването на хранителните вещества и
        срока на годност.
    jump_rope_style:
      name: Стил на въже за скачане
      description: Определя конструкцията на въжето/кабела (например с перли, с тъкан,
        скоростен кабел), която оказва значително влияние върху предназначението и
        експлоатационните характеристики.
    kale_variety:
      name: Сорт къдраво зеле
      description: Идентифицира специфичния сорт или разновидност на къдравото зеле
        (напр. Къдраво, Лачинато/Динозавър, Червено руско). Помага на купувачите да
        избират според вкуса, текстурата и кулинарната употреба.
    kaleidoscope_viewing_type:
      name: Вид на наблюдение през калейдоскопа
      description: Определя формата за гледане или стила на работа на калейдоскопа
        (напр. класическа тръба с окуляр, телеидоскоп с леща, въртящо се колело, прожекционен).
    kayak_construction_type:
      name: Тип конструкция на каяк
      description: Посочва основния конструктивен стил на каяка, като твърд корпус
        или надуваем.
    kayak_design_type:
      name: Тип дизайн на каяк
      description: Класифицира основното предназначение на дизайна на каяка (напр.
        сърфски, за трикове, туристически).
    kayak_hull_design:
      name: Дизайн на корпуса на каяка
      description: Определя основната форма на корпуса, която влияе върху управляемостта,
        като стабилност и маневреност при вълнови условия.
    kayak_storage_bag_type:
      name: Тип чанта за съхранение на каяк
      description: Определя стила или формата на чантата за съхранение на каяк, като
        суха чанта или чанта за гребло.
    kayak_style:
      name: Стил на каяка
      description: Посочва основния дизайн или предназначение на каяка (напр. за отдих,
        туринг, надуваем).
    keel_type:
      name: Тип кил
      description: Определя конфигурацията на кила на платноходката.
    kettlebell_style:
      name: Стил на пудовка
      description: Определя конструкцията или варианта на пудовката (напр. състезателна,
        регулируема, мека), помагайки на купувачите да изберат правилната тежест за
        тренировъчните си нужди.
    key_attachment_mechanism:
      name: Механизъм за закрепване на ключове
      description: Посочва обкова, използван за закрепване на ключовете вътре в кутията,
        като халки, щипки или винтови крепежи.
    key_retention_when_unlocked:
      name: Задържане на ключа при отключено положение
      description: Показва дали ключът може да бъде изваден от ключалката, когато
        тя е в отключено положение.
    keyboard_amplifier_inputs:
      name: Входове за усилвател на клавиатура
      description: Изброява входните връзки, поддържани от клавирния усилвател (напр.
        1/4 инча TRS, MIDI вход, Bluetooth).
    keyboard_amplifier_output_types:
      name: Видове изходи за усилвател на клавиатура
      description: Посочва основните типове изходни конектори, поддържани от клавирния
        усилвател за насочване на аудио към други системи.
    keyboard_case_handle_type:
      name: Тип дръжка на калъф за клавир
      description: Основна система за дръжки, използвана за преместване/носене на
        калъфа за клавир (в допълнение към презрамките).
    keyboard_case_interior_padding_type:
      name: Тип вътрешна подплата на калъфа за клавир
      description: Основен подход за вътрешно омекотяване/подплата, използван вътре
        в твърдия калъф.
    keyboard_case_protection_level:
      name: Ниво на защита на калъфа за клавир
      description: Общ клас на защита/твърдост на твърдия калъф, който разграничава
        формованите калъфи с твърда обвивка от калъфите за интензивна употреба от
        типа ATA.
    keyboard_case_wheel_type:
      name: Тип колелца на калъф за клавиатура
      description: Конфигурация на колелата за твърди калъфи, които включват колела.
    keyboard_pedal_connector_type:
      name: Тип на конектора за педал на клавишен инструмент
      description: Посочва типа конектор/щепсел, използван за свързване на sustain
        педала към клавир или дигитално пиано.
    keyboard_power_supply_type:
      name: Тип захранване на клавир
      description: Основен начин на захранване на клавишния инструмент (батерии, захранващ
        адаптер, USB захранване).
    keyboard_stand_tier_type:
      name: Тип стойка за клавир
      description: Показва дали стойката се продава само като основна стойка или включва/добавя
        приставка за второ ниво.
    keyboard_stand_tiers:
      name: Нива на стойката за клавиатура
      description: Брой нива за свирене, поддържани от стойката тип Z (напр. едно
        ниво или две нива).
    keychain_attachment_type:
      name: Тип закрепване на ключодържател
      description: Посочва основния закрепващ механизъм, използван за прикрепване
        на ключодържателя към ключове, чанти или колани.
    keychain_style:
      name: Стил на ключодържателя
      description: Описва общия форм-фактор на ключодържателя (какво представлява
        физически).
    keywork_finish:
      name: Покритие на клавишите
      description: Описва покритието/галванизацията конкретно върху клавишите, отделно
        от покритието на корпуса.
    kick_point:
      name: Точка на огъване
      description: Посочва местоположението на точката на огъване на дръжката на хокейния
        стик, което влияе върху скоростта и усещането при удара.
    kick_zone_grip_system:
      name: Система за сцепление в зоната на оттласкване
      description: Определя технологията, използвана в зоната за оттласкване на ските
        за сцепление.
    kickboard_features:
      name: Характеристики на дъската за оттласкване
      description: Подчертава специални характеристики на дъската за плуване, които
        подобряват тренировката или комфорта, включително текстура на повърхността
        и възможности за захват.
    kickboard_handle_style:
      name: Стил на дръжката на дъската за плуване
      description: Указва дали и как дъската за плуване има дръжки или повърхностни
        обработки, които влияят на захвата и комфорта.
    kickstand_mounting_position:
      name: Позиция за монтаж на стойката
      description: Определя къде върху рамката на велосипеда се закрепва стойката
        (напр. централен монтаж, монтаж към задната вилка или към задната ос).
    kickstand_type:
      name: Тип стойка
      description: Описва конструктивния стил или механизма на стойката (напр. странична
        стойка с един крак, централна стойка с два крака, телескопична).
    kidney_belt_support_level:
      name: Ниво на поддръжка на бъбречния колан
      description: Общото ниво на поддръжка, определено от производителя, осигурявано
        от бъбречния колан за стабилизиране на долната част на гърба и корема.
    kiln_firing_atmosphere:
      name: Атмосфера на изпичане в пещ
      description: Посочва атмосферите на изпичане, които пещта може да поддържа по
        време на работа (напр. окисление или редукция).
    kiln_heating_element_type:
      name: Тип нагревателен елемент на пещта
      description: Вид/материал на нагревателните елементи, използвани в пещта.
    kingpin_design:
      name: Дизайн на kingpin
      description: Описва конструктивния тип на основния болт на окачването, който
        влияе върху теглото и разстоянието при плъзгане по препятствия.
    kingpin_orientation:
      name: Ориентация на kingpin
      description: Определя ориентацията на основния болт на окачването, която влияе
        върху характеристиките на каране и съвместимостта с дъската.
    kit_components_included:
      name: Включени компоненти в комплекта
      description: 'Изброява отделните хардуерни елементи, включени в комплекта (например:
        колове за закрепване в земята, болтове, ленти, инструмент за монтаж), за да
        знаят купувачите точно какво купуват.'
    kit_format:
      name: Формат на комплекта
      description: Посочва как комплектът е опакован и пренасян (напр. торбичка, калъф,
        кутия).
    kit_items_included:
      name: Включени елементи в комплекта
      description: Изброява основното оборудване и консумативите, включени в комплекта
        за производство на вино, за да могат купувачите да разграничават стартовите
        комплекти от допълнителните комплекти, съдържащи само съставки.
    kit_pouch_case_type:
      name: Тип калъф/торбичка за комплекта
      description: Посочва типа включено решение за съхранение към комплекта за грижа
        (ако има такова).
    kit_tools_included:
      name: Включени инструменти в комплекта
      description: Изброява основните инструменти, предоставени в комплекта (ако има
        такива) за завършване на проекта.
    kite_inflation_system:
      name: Система за надуване на кайт
      description: Показва как се надуват предният ръб и подпорите на кайта.
    kite_line_configuration:
      name: Конфигурация на въжето на хвърчилото
      description: Посочва броя на летателните/управляващите въжета, за които е проектирано
        платното на хвърчилото – това е често срещана спецификация, необходима за
        правилното съчетаване на дръжките и въжетата.
    kite_type:
      name: Тип кайт
      description: Определя категорията на конструктивния дизайн на кайта (форма и
        тип на въжетата).
    kiteboard_bag_style:
      name: Стил на чанта за кайтборд
      description: Конкретен стил или подтип на калъф за кайтборд (напр. калъф за
        дъска, голф чанта, пътен калъф, калъф за фойл).
    kiwifruit_variety:
      name: Сорт киви
      description: Идентифицира специфичния сорт или разновидност на цвета на кивито
        (зелен, златист, червен и др.).
    knee_pad_pocket_type:
      name: Тип джоб за наколенки
      description: Показва дали и как дрехата е пригодена за носене на предпазни наколенки.
    knee_pad_style:
      name: Стил на наколенките
      description: Описва стила на конструкцията или форм-фактора на протектора за
        коляно (напр. ръкав, шина, предпазител).
    knee_protection_design:
      name: Дизайн на защитата на коляното
      description: Показва броя на шарнирните секции в областта на коляното, вградени
        в предпазителя за крака.
    kneeboard_construction:
      name: Конструкция на дъска за коляно
      description: 'Определя основната технология на изработка или състава на дъската
        (например: рото-формована пластмаса, формована чрез пресоване, въглеродни
        влакна).'
    kneeboard_strap_type:
      name: Тип каишка за наколенка
      description: Описва стила на системата с каишки за коляното, използвана за закрепване
        на карача към дъската.
    knife_lock_mechanism:
      name: Механизъм за заключване на нож
      description: Описва механизма, използван за фиксиране на острието на сгъваем
        нож в отворено положение, или посочва модели без заключващ механизъм.
    knife_locking_mechanism:
      name: Заключващ механизъм на нож
      description: Определя вида на механизма, който фиксира острието в отворено положение,
        като по този начин пряко определя безопасността, здравината и удобството при
        употреба на ножовете със заключващо се острие.
    knife_opening_mechanism:
      name: Механизъм за отваряне на нож
      description: Описва как острието се изважда от дръжката, като се правят разграничения
        между ръчно, подпомагано, автоматично и специално отваряне.
    knife_system:
      name: Система на ножа
      description: Дали и как режещият нож работи на оверлога.
    knit_elastic_application:
      name: Предназначение на плетения ластик
      description: Посочва предназначението за шиене/изработка на плетения ластичен
        кант.
    knit_pattern:
      name: Модел на плетката
      description: Определя основния вид плетка или текстура, използвана в плата на
        жилетката, като например плитка, ребра или вафелна плетка, което позволява
        на купувачите да намерят конкретни текстури и термични свойства.
    knit_style:
      name: Стил на плетивото
      description: Определя основната структура на плетивото, текстурата или декоративния
        мотив, характерни за плата на пуловера.
    knitting_marker_counter_type:
      name: Тип маркер/брояч за плетене
      description: Посочва функционалния тип продукт в категорията маркери и броячи
        за плетене.
    knitting_needle_tip_style:
      name: Стил на върха на иглата за плетене
      description: Острота/форма на върха, оптимизирана за различни прежди и техники.
    knock_sensor_technology:
      name: Технология на сензора за детонации
      description: Технологията на сензорите, използвана в сензора за детонация.
    knurl_aggressiveness:
      name: Агресивност на набраздяването
      description: Описва релефа или текстурата на набраздяването по дръжката на лоста,
        което оказва влияние върху удобството и сигурността на хватката.
    knurl_marking_standard:
      name: Стандарт за маркировка на набраздяването
      description: Посочва позицията на референтните пръстени на набраздяването за
        поставяне на ръцете (напр. IPF или IWF маркировки).
    kohlrabi_variety:
      name: Сорт алабаш
      description: Посочва сорта или пазарния вариант на грудката колраби, позволявайки
        на клиентите да избират между различни вкусови профили, размери и цветове.
    koji_mold_type:
      name: Тип плесен коджи
      description: Посочва типа или щама на плесента коджи, използвана по време на
        ферментацията, която влияе върху аромата и вкуса.
    kumquat_variety:
      name: Сорт кумкуат
      description: Определя сорта или разновидността на предлаганите кумкуати, позволявайки
        на купувачите да избират плодове според вкусовия профил, размера или кулинарното
        приложение.
    label_edge_type:
      name: Тип на ръба на етикета
      description: Указва начина на обработка на ръбовете, използван за предотвратяване
        на разнищване и за естетичен вид.
    label_finish:
      name: Покритие на етикета
      description: Посочва повърхностното покритие, текстурата или защитното покритие/обработка,
        приложени върху етикета.
    label_finish_edge_style:
      name: Стил на покритие или обработка на ръбовете на етикета
      description: Описва как са обработени ръбовете, което влияе върху комфорта и
        издръжливостта (напр. тъкан ръб спрямо лазерно изрязан).
    label_fold_type:
      name: Тип сгъване на етикета
      description: Посочва как е конструиран пришивният етикет, за да бъде зашит към
        артикула (напр. крайно сгъване или централно сгъване), което влияе върху начина
        на поставяне и позициониране.
    label_text_type:
      name: Тип текст на етикета
      description: Указва дали етикетът е празен, предварително отпечатан или предназначен
        за персонализиране/индивидуална изработка.
    lace_area_size:
      name: Размер на зоната с връзки
      description: Определя размера или конфигурацията на дантелената секция (напр.
        закопчаване 4×4, 13×6 фронтално), което определя наличното пространство за
        разделяне.
    lace_tightener_style:
      name: Стил на устройството за пристягане на връзките
      description: Определя механичния дизайн или форм-фактора на устройството за
        пристягане на връзките.
    lace_type:
      name: Вид дантела
      description: Описва материала или покритието на дантелата в областта на линията
        на косата/шапката, което оказва влияние върху реалистичността и съответствието
        с цвета на кожата.
    lacrosse_ball_certification:
      name: Сертифициране на топки за лакрос
      description: Посочва одобрението или стандартите на спортния ръководен орган,
        на които отговаря топката за лакрос.
    lacrosse_goal_regulation_certification:
      name: Сертифициране на размерите на вратите за лакрос
      description: Показва дали вратата или мрежата за лакрос отговарят на конкретните
        изисквания на съответната регулаторна организация (напр. NCAA или NFHS).
    lacrosse_pocket_type:
      name: Тип джоб за лакрос
      description: Определя общия стил на джоба или мрежата, вплетена в главата, което
        оказва влияние върху контрола върху топката и изстрелването ѝ.
    lacrosse_string_type:
      name: Тип на връзките за лакрос крос
      description: Определя точната форма или предназначението на дадения артикул
        от мрежа или въже, за да могат клиентите да разграничават отделните мрежести
        части, комплектите и конкретните ролки въже в даден джоб.
    ladder_position:
      name: Позиция на стълбата
      description: Показва къде се намира стълбата или стълбището за достъп до детското
        легло на втория етаж.
    lanyard_attachment_hardware:
      name: Окачващ елемент за връзка за носене
      description: Указва вида на накрайника на връзката за носене, който се използва
        за закрепване към ключове, значки, телефони или други аксесоари.
    lanyard_style:
      name: Стил на ремъка
      description: Посочва начина, по който ремъкът/връзката за носене се носи или
        използва.
    lanyard_type:
      name: Тип връзка за носене
      description: Описва стила на връзката за носене, включена или съвместима със
        свирката.
    lap_hand_loom_accessories_included:
      name: Включени аксесоари за ръчен стан за тъкане
      description: Аксесоари, включени към комплекта за тъкане на ръчен стан.
    lapel_style:
      name: Стил на ревера
      description: Посочва дизайна на ревера на сакото (напр. назъбен, остър, шал-яка).
    laser_safety_class:
      name: Курс по безопасност при работа с лазери
      description: Класификация на продукта по безопасност на лазерите (напр. клас
        2, 3R, 3B, 4), както е посочено в документацията/етикетирането на устройството.
    latex_processing_method:
      name: Метод за обработка на латекс
      description: Определя производствения процес, използван за производството на
        латексната пяна – обикновено „Дънлоп“ или „Талалай“ – което оказва влияние
        върху усещането, отзивчивостта и цената.
    latex_type:
      name: Тип латекс
      description: Посочва произхода и състава на латекса, използван в матрака (естествен,
        органичен, синтетичен или смесен), като информира купувачите за издръжливостта,
        екологичността и потенциалните алергени.
    launch_profile:
      name: Профил на изстрелване
      description: Посочва типичната траектория на изстрелване (ниска, средна, висока),
        която валът на голф стика е проектиран да осигурява.
    launcher_mounting_configuration:
      name: Конфигурация за монтаж на пусково устройство
      description: Определя как пусковото устройство е монтирано или конфигурирано
        за употреба, подпомагайки купувачите, които се нуждаят от самостоятелни, подцевни
        или релсово монтирани варианти.
    layer_construction:
      name: Конструкция на слоевете
      description: Посочва конструкцията на ламинирания плат (напр. 2-слоен, 2.5-слоен,
        3-слоен), която влияе върху теглото, компактността и издръжливостта.
    layer_design:
      name: Дизайн на слоевете
      description: Описва конструкцията на мрежата за коса по отношение на слоевете
        или двустранността.
    lazy_kate_tension_control_type:
      name: Тип контрол на напрежението на lazy kate-а
      description: Как lazy kate-ът прилага съпротивление/напрежение върху макарите
        по време на развиване или навиване.
    lead_hardware_type:
      name: Тип оловен обков
      description: Определя вида на приставката или закопчалката в края на повода
        (карабина, клипс, примка, верига и др.), което оказва влияние върху удобството
        при употреба, безопасността и пригодността за конкретния вид спорт.
    leaf_gelatin_grade:
      name: Клас на листовия желатин
      description: Посочва стандартизирания клас на здравина, използван за желатинови
        листове.
    leaf_preparation:
      name: Подготовка на листата
      description: Описва как листата са подготвени преди опаковане, например нарязани,
        настъргани или на жулиени.
    leaf_spring_material:
      name: Материал на листовата пружина
      description: Основен материал за изработка на пакета листови ресори.
    leak_protection_layer:
      name: Слой за защита от течове
      description: Посочва дали вградената система тип пелена в банския използва еднослоен
        или двуслоен дизайн за защита от протичане.
    leash_clip_type:
      name: Тип карабинер на повода
      description: Посочва типа клипс или обков, използван за закрепване на повода
        към нашийник или нагръдник (напр. болтов клипс, карабинер, въртящ се клипс).
    leash_style:
      name: Стил на повода
      description: Описва конфигурацията или начина на навиване на въжето/кабела на
        повода.
    leash_type:
      name: Тип повод
      description: Класифицира общия стил или предназначена конфигурация на повода
        за бързо филтриране според предназначението.
    leavening_action_type:
      name: Тип набухващо действие
      description: Посочва химичния състав или вида на набухвателя в бакпулвера (напр.
        еднодействащ, двудействащ, без алуминий). Това пряко влияе върху ефективността
        на печене и пригодността на рецептата.
    leavening_agent:
      name: Набухвател
      description: Посочва основния механизъм за набухване, използван в тестото.
    led_color_options:
      name: Опции за LED цветове
      description: Изброява избираемите LED цветове, налични на алармата за визуална
        индикация на кълване.
    led_indicator_color:
      name: Цвят на LED индикатора
      description: Показва цвета на светодиодния индикатор на продукта, което помага
        на рибарите да съчетаят няколко сигнали или да се съобразят с личните си предпочитания.
    led_light_color:
      name: Цвят на LED светлината
      description: Указва цвета на всяко интегрирано LED осветление.
    leek_variety:
      name: Сорт праз
      description: Посочва сорта на праза, което позволява разграничаване според вкуса,
        размера и периода на отглеждане.
    leg_coverage:
      name: Покритие на краката
      description: 'Посочва колко от крака покрива дадената част от неопреновия костюм
        (например: къс, дълъг).'
    leg_cuff_style:
      name: Стил на маншета на крачола
      description: Посочва вида на завършека при отвора на крачола в областта на глезена.
    leg_cut_height:
      name: Височина на изрязване на крачола
      description: Показва колко високо е изрязан отвора за крака на долнището на
        бикините.
    leg_cut_style:
      name: Стил на кройката на крачола
      description: Описва формата на отвора на крачола, която влияе на външния вид,
        комфорта и линиите от слънчево изгаряне.
    leg_length:
      name: Дължина на крака
      description: Класифицира бански по дължина на крачолите (къси, средни, дълги),
        за да могат купувачите да изберат предпочитания от тях модел, без да се налага
        разделяне на категорията.
    leg_loop_type:
      name: Тип примка за крак
      description: Описва дизайна на примките за краката.
    leg_opening_style:
      name: Стил на отвора на крачола
      description: Посочва начина на завършване на крачолите при анцуг/спортен панталон,
        например с ластични маншети, ципове или свободен подгъв.
    leg_style:
      name: Стил на крачола
      description: Определя дизайна или конструктивния стил на краката или основата
        на пейката.
    legging_foot_design:
      name: Дизайн на долната част на клина
      description: Посочва дали клинът е без стъпало, със стъпало или може да се преобразува
        между двата стила.
    leggings_waistband_style:
      name: Стил на колана на клина
      description: Посочва конструктивния дизайн на колана на клина, който влияе върху
        комфорта, поддръжката и визията.
    lei_closure_style:
      name: Тип закопчаване на лентата
      description: Посочва дали лентата представлява непрекъсната верига или има отворени
        краища, които се връзват или се закопчават с панделка.
    lemon_variety:
      name: Сорт лимон
      description: Идентифицира специфичния сорт или сорт лимони (напр. Еврика, Майер,
        Амалфи).
    length_adjustment_method:
      name: Метод за регулиране на дължината
      description: Показва дали и как дължината на въжето за скачане може да се регулира,
        за да пасне на потребителя.
    lens_color_tint:
      name: Цвят/оттенък на лещата
      description: Цвят или оттенък на лещите на защитните очила, включени в комплекта
        на продукта.
    lens_construction:
      name: Конструкция на лещата
      description: Указва структурната конструкция на лещата (напр. еднослойна, двуслойна
        термична), за да се посочи устойчивостта на замъгляване и оптичната ефективност.
    lens_tint_category:
      name: Категория на оцветяване на лещите
      description: Класифицира тъмнината на лещите въз основа на международни категории
        за нюанс, помагайки на клиента да избере лещи, подходящи за различни светлинни
        условия.
    lettuce_variety:
      name: Сорт маруля
      description: Идентифицира специфичния градинарски сорт маруля (напр. Айсберг,
        Ромен, Бутерхед), което позволява прецизно филтриране и сравнение.
    level_of_play:
      name: Ниво на игра
      description: Обявено от производителя ниво на представяне, съобразено с нивото
        на състезателност на играча и бюджета.
    lever_configuration:
      name: Конфигурация на лоста
      description: Посочва конфигурацията на лоста/дръжката за управление на двигателя
        на плавателното средство (напр. еднолостова или двулостова система).
    lever_type:
      name: Тип лост
      description: Тип/механизъм на лостовете за промяна на височината на тона, монтирани
        на струните на арфата.
    license_plate_cover_style:
      name: Стил на капака за регистрационния номер
      description: Посочва конструктивния тип на капака за регистрационния номер (напр.
        пълно покритие или капачки за винтове).
    license_plate_personalization_type:
      name: Тип персонализация на регистрационната табела
      description: Посочва дали регистрационната табела е празна, предварително отпечатана
        или позволява персонализация от купувача (текст и/или графики).
    license_usage_terms:
      name: Условия за лиценз/ползване
      description: Права за ползване на шаблона (напр. само за лична употреба срещу
        ограничено търговско ползване).
    licensed_sports_property:
      name: Лицензирана спортна марка/продукт
      description: Посочва дали продуктът е официално лицензиран от лига, отбор или
        организация.
    lid_hinge_mechanism:
      name: Механизъм на пантата на капака
      description: Определя механизма на пантите, използван за капака, което оказва
        влияние върху безопасността и удобството при употреба.
    lid_support_positions:
      name: Позиции за поддръжка на капака
      description: Указва поддържаните позиции на лостовете на капака за рояла (докъде
        може да се отвори капакът).
    lie_angle_color_code:
      name: Код за цвят на ъгъла на наклон
      description: Обозначава цветовата система на производителя за ъгъл на наклон,
        използвана при някои стикове (напр. черна точка, зелена точка).
    life_jacket_certification_standard:
      name: Стандарт за сертификация на спасителна жилетка
      description: Официална класификация за безопасност или стандарт, на който продуктът
        отговаря, като например тип USCG или нива ISO/AS.
    life_raft_certification_standard:
      name: Стандарт за сертификация на спасителен сал
      description: Стандартът/сертификацията за безопасност, на които е построен и
        обслужван салът.
    life_raft_container_type:
      name: Тип контейнер за спасителен сал
      description: Как е опакован спасителният сал за съхранение и разполагане.
    life_vest_approval_standard:
      name: Стандарт за одобрение на спасителна жилетка
      description: Посочва стандарта за сертифициране/одобрение, на който отговаря
        спасителната жилетка.
    life_vest_intended_user:
      name: Целеви потребител на спасителна жилетка
      description: Посочва предназначената категория потребители за прилягане и оразмеряване.
    lifebuoy_approval_standard:
      name: Стандарт за одобрение на спасителни пояси
      description: Стандарт за безопасност или сертификация, на който отговаря спасителният
        пояс (напр. USCG/SOLAS).
    lifebuoy_features:
      name: Характеристики на спасителния пояс
      description: Функционална безопасност, монтаж/обработка и включени аксесоари
        за спасителни пояси.
    lift_mechanism_type:
      name: Тип подемен механизъм
      description: Определя механизма, който помага за повдигане/спускане или отваряне/затваряне
        на стенното легло.
    lift_stand_support_point:
      name: Точка на опора на подемника/стойката
      description: Къде подемникът/стойката контактува или поддържа превозното средство.
    lifting_gas_type:
      name: Тип подемен газ
      description: Посочва основния подемен газ или среда за плаваемост, използвана
        от дирижабъла.
    lifting_support_type:
      name: Тип опора за повдигане
      description: Показва дали подемникът използва рампи или повдига чрез рамена/подложки,
        които контактуват с рамата/точките за повдигане.
    ligature_and_cap_component_type:
      name: Тип компонент на лигатурата и капачката
      description: Показва дали продуктът е лигатура, капачка или комплект, който
        включва и двете.
    ligature_material:
      name: Материал за лигатурата
      description: Основният материал на тялото на лигатурата, който контактува и
        закрепва пластината (напр. метал, кожа, плат).
    ligature_plating_or_finish:
      name: Покритие или финиш на лигатурата
      description: Определя покритието и/или повърхностното покритие, нанесено върху
        метална лигатура и/или капачка за кларинет.
    ligature_reed_contact_style:
      name: Стил на контакта между лигатурата и тръстиката
      description: Посочва как лигатурата контактува с тръстиката (напр. минимален
        контакт, многоточков, обхващащ тип).
    ligature_screw_position_relative_to_reed:
      name: Положение на лигатурния винт (спрямо пластината)
      description: Посочва позицията на винта за затягане на лигатурата спрямо тръстиката
        и страната към изпълнителя при монтиране върху мундщука.
    ligature_tension_adjustment_mechanism:
      name: Механизъм за регулиране на опъването на лигатурата
      description: Описва как лигатурата прилага/регулира натиска върху пластинката
        (дизайн на закрепване).
    ligature_tightening_mechanism_type:
      name: Тип механизъм за затягане на лигатурата
      description: Посочва механизма, чрез който лигатурата се затяга около мундщука
        и тръстиката (напр. един винт, два винта, лостов/бързоосвобождаващ механизъм).
    light_bar_housing_material:
      name: Материал на корпуса на светлинната лента
      description: Основен материал на корпуса на светлинната лента, който влияе върху
        издръжливостта и разсейването на топлината.
    light_bar_lens_material:
      name: Материал на лещата на LED бара
      description: Основният материал, от който е изработена лещата/капакът на светлинната
        лента, който може да повлияе на удароустойчивостта и оптичната прозрачност.
    light_bar_mounting_location:
      name: Място за монтаж на LED бара
      description: Основно предвидено място за монтаж върху превозното средство.
    light_stand_style:
      name: Стил на стойка за светлина
      description: Указва структурния стил или форм-фактора на стойката, използван
        за поддържане на светлини със специални ефекти (напр. статив, Т-образна греда,
        лост за закрепване), а не повърхността за монтаж (стена/таван), която се определя
        от типа на монтаж.
    light_switch_function:
      name: Функция на светлинния ключ
      description: Определя кои осветителни вериги или функции управлява ключът.
    lighting_control_protocols_supported:
      name: Поддържани протоколи за управление на осветлението
      description: Протоколи за управление/мрежа, които контролерът поддържа в допълнение
        към или вместо DMX512.
    lighting_effects:
      name: Светлинни ефекти
      description: Посочва всички вградени осветителни елементи, които подобряват
        играта или естетиката.
    lighting_mode:
      name: Режим на осветление
      description: Изброява наличните светлинни режими, като например постоянно светене,
        мигане, стробоскоп или SOS.
    lily_variety:
      name: Сорт лилия
      description: Определя търговския/ботаническия сорт на лилията, продавана като
        свеж отрязан цвят (напр. азиатска, ориенталска).
    limb_articulation:
      name: Артикулация на раменете
      description: Посочва степента на гъвкавост или подвижност на крайниците на манекена
        (без подвижност, фиксиран, полу-гъвкав, напълно артикулиран).
    limb_material:
      name: Материал на рамото
      description: Основен материал, използван в раменете на лък или арбалет, влияещ
        върху теглото, издръжливостта, вибрациите и цялостната производителност.
    lime_variety:
      name: Сорт лайм
      description: Определя конкретния ботанически или търговски сорт лайм, който
        се продава.
    line_buoyancy:
      name: Плаваемост на линията
      description: Описва дали плетеното влакно естествено плава или потъва и с каква
        скорост, което влияе на представянето на примамката и контрола на линията.
    line_purpose:
      name: Предназначение на линията
      description: Определя предназначението на линията в системата на хвърчилото
        (напр. предна летяща линия, линия за намаляване на мощността, юзда).
    linen_finish_treatment:
      name: Покритие/обработка на лен
      description: Всякакъв довършителен процес, приложен върху ленената тъкан, който
        променя усещането, външния вид или характеристиките.
    linen_weave_type:
      name: Тип тъкане на лен
      description: Посочва конструкцията на тъкане на ленения плат, която влияе върху
        текстурата, дишаемостта и пада на материята.
    liner_padding_type:
      name: Тип подплата на вътрешния слой
      description: Посочва конструкцията или стила на омекотяване на вътрешния слой
        (напр. мрежест, леко подплатен, капитониран).
    liner_shape:
      name: Форма на подплатата
      description: Описва общата форма на вътрешния слой за спален чувал, така че
        клиентите да могат да го съчетаят със своя спален чувал и предпочитания за
        комфорт.
    liner_type:
      name: Тип на подплатата
      description: Показва дали шортите включват вътрешен слой и, ако да, какъв е
        неговият стил.
    lining:
      name: Подплата
      description: Показва дали и как банският тип слип е подплатен, включително степента
        на покритие на подплатата вътре в дрехата.
    lining_material:
      name: Материал на подплатата
      description: Посочва материала на вътрешната подплата на обувката, който влияе
        на комфорта, дишаемостта и топлината.
    lining_type:
      name: Тип подплата
      description: Посочва дали банският е подплатен и в каква степен.
    link_connection_style:
      name: Стил на свързване на звеното
      description: Класифицира как звеното се свързва към веригата (напр. бърза връзка,
        свързващ щифт), позволявайки на колоездачите да изберат правилния метод за
        монтаж или резервна част.
    live_bait_form:
      name: Форма на жива стръв
      description: Указва физическата форма или състоянието на съхранение на стръвта,
        като например жива, замразена или сушена.
    living_room_furniture_items_included:
      name: Включени мебели за всекидневна
      description: Посочва отделните мебелни елементи, включени в комплекта за всекидневна,
        за да се разбере бързо какви компоненти (напр. диван, двуместен диван, масичка
        за кафе) са включени.
    load_mechanism:
      name: Механизъм за зареждане
      description: Посочва основния метод, чрез който се създава или добавя съпротивление
        в уреда (напр. подредени тежести, дискове, ластици).
    lock_cylinder_type:
      name: Тип цилиндър на ключалката
      description: Посочва типа цилиндър/ядро на ключалката (от значение за устойчивостта
        срещу отключване и резервните ключове).
    lock_security_level:
      name: Ниво на сигурност на ключалката
      description: Описва нивото на защита на бравата/цилиндъра срещу манипулации
        като разбиване с шперц и пробиване.
    lock_system:
      name: Система за заключване
      description: Тип на заключващата система за безопасност, която задържа подемника
        на определена височина.
    locker_bench_configuration:
      name: Конфигурация на пейката за съблекалня
      description: Описва ориентацията или конструктивната конфигурация на пейката
        за съблекалня (напр. едностранна, двустранен островен тип, стенен монтаж).
    locomotive_prototype_power_type:
      name: Тип на източника на задвижваща мощност на прототипа на локомотива
      description: Посочва реалния тип задвижване на локомотива, който е представен
        от модела.
    locomotive_wheel_arrangement_whyte_notation:
      name: Колесното разположение на локомотива (нотация на Уайт)
      description: Колесна схема на прототипа на локомотива (напр. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Класификация на височината на високото легло (лофт легло).
      description: Посочва общата височинна категория на високото легло (ниско, средно,
        високо, много високо), за да помогне при съобразяване с височината на тавана
        и пространството под леглото.
    logo_application_method:
      name: Метод за нанасяне на лого
      description: Описва как училищният герб или лого е нанесен върху дрехата (напр.
        бродиран или отпечатан).
    logo_label_compatible_fabric_weight:
      name: Съвместимо тегло на плата за етикет с лого
      description: Препоръчителна категория на плътността на тъканта, за да се прикрепи
        етикетът без деформация или излишна дебелина.
    logo_label_edge_finish:
      name: Обработка на ръбовете на етикет с лого
      description: Посочва конструкцията/обработката на ръба на етикета, която влияе
        върху устойчивостта срещу разнищване и комфорта при контакт с кожата.
    logo_label_print_production_method:
      name: Метод на изработка/печат на логото върху етикета
      description: Начинът, по който логото е нанесено или оформено върху повърхността
        на етикет
    long_block_completeness:
      name: Степен на комплектност на дългия блок
      description: Указва кои основни компоненти са включени в комплекта на дългия
        блок.
    long_john_pieces_included:
      name: Включени части за дълъг блок
      description: Уточнява дали продуктът включва само долнище, само горнище или
        и двете части от комплекта long john.
    longan_variety:
      name: Сорт Лонган
      description: Посочва сорта или търговския вид на плода лонган (напр. Kohala,
        Biew Kiew), за да помогне на купувачите да разпознаят желаните характеристики
        като вкус, размер и сладост.
    loom_accessories_included:
      name: Включени аксесоари за стан
      description: Основни аксесоари, включени към стана в кутията/опаковката.
    loom_finish:
      name: Покритие на стана
      description: Повърхностно покритие на стана (основно при дървени станове).
    loom_folding_portability_design_type:
      name: Тип конструкция за сгъване/преносимост на стан
      description: Посочва дали и по какъв начин станът се сгъва/сгъва се за транспортиране,
        или компактно съхранение.
    loom_frame_folding_design:
      name: Конструкция на сгъване на рамата на стана
      description: Посочва дали и как рамката на настолния стан се сгъва, свива или
        разглобява за съхранение или транспорт.
    loom_tension_adjustment_method:
      name: Метод за регулиране на опъването на стана
      description: Основен метод за регулиране на напрежението на основните нишки
        (основата) на стана.
    loom_tie_up_system:
      name: Система за връзване на тъкачен стан
      description: Тип система за връзване/свързване, използвана между педалите/ламелите/валовете
        (напр. Texsolv или метална верига).
    loquat_variety:
      name: Сорт мушмула
      description: Указва сорта или разновидността на мушмулата, отразявайки разликите
        в размера, вкуса, периода на зреене и външния вид.
    lubricant_features:
      name: Характеристики на смазката
      description: Подчертава специални характеристики на производителността, добавки
        или предимства на смазката.
    lubrication_requirement:
      name: Изискване за смазване
      description: Посочва дали лентата на бягащата пътека е предварително обработена
        и без нужда от поддръжка, или изисква периодично смазване или восъчно третиране.
    lubrication_type:
      name: Вид смазване
      description: Посочва дали втулката може да се смазва и дали е проектирана за
        обслужване с грес (напр. чрез канали или гресов нипел).
    lug_nut_seat_profile:
      name: Профил на леглото на гайката
      description: Посочва профила на леглото на гайката на джантата, необходим за
        правилна съвместимост и безопасен монтаж.
    lumbar_support_type:
      name: Тип лумбална опора
      description: Описва вида на лумбалната опора, с която е снабден столът (напр.
        подвижна възглавница, регулируем механизъм, масаж).
    lunge_trainer_style:
      name: Модел тренажор за напади
      description: Определя конструктивния дизайн на корда за тренировка на кон.
    lure_buoyancy:
      name: Плаваемост на примамката
      description: Определя как се държи примамката във водния стълб, когато е в покой
        или при изтегляне (например, плава на повърхността, задържа се на средна дълбочина
        или потъва).
    luster:
      name: Блясък
      description: Описва начина, по който светлината взаимодейства с повърхността
        на образеца (напр. стъкловидно тяло, метал).
    lychee_cultivar:
      name: Сорт личи
      description: Идентифицира специфичния сорт или култивар личи – като Brewster,
        Hak Ip или Mauritius – които могат да се различават по вкус, размер на семената,
        сезон на прибиране на реколтата и цена.
    lyre_flip_folder_mounting_location:
      name: Място за монтаж на папка с лира/отваряща се
      description: Когато лирата или сгъваемата конзола са предназначени за монтиране
        върху инструмента или аксесоара (напр. камбана, оловна тръба, стойка).
    lyrics_display_type:
      name: Тип показване на текст на песен
      description: Как се показват текстовете на песни (ако се поддържат) по време
        на караоке.
    magazine_compatibility:
      name: Съвместимост на пълнителите
      description: Посочва основните калибри на пълнителите или типовете пълнители,
        за които са предназначени вградените джобове на жилетката.
    magnet_requirement:
      name: Изискване за магнит
      description: Показва дали сензорът се нуждае от външен магнит, за да работи.
    magnet_toy_storage_included:
      name: Включено е място за съхранение на магнитни играчки
      description: Тип съхранение/случай, включен в магнитната играчка за организация
        на бюро и пътуване.
    malanga_variety:
      name: Сорт Маланга
      description: Идентифицира специфичния сорт корен от маланга/таро, който се продава,
        за да помогне на купувачите да изберат желания вкус, цвят или кулинарно приложение.
    malt_color_rating_system:
      name: Система за оценка на цветовете на малца
      description: Указва за кой цвят ръст на бизнеса се отнася посоченият цвят (Lovibond,
        SRM или EBC).
    malt_crush:
      name: Смилане на малца
      description: Показва дали базовият малц се продава цял/несмлян или предварително
        смлян, и ако е смлян — какъв е типът на смилането.
    malt_form:
      name: Форма на малца
      description: Показва дали продуктът се продава като цели зърна или е преработен
        за пасиране (напр. натрошен).
    malt_intended_use:
      name: Предназначение на малца
      description: Предназначена основна употреба на малца (пивоварство, дестилация
        или двойна употреба).
    malt_treatment:
      name: Обработка на малца
      description: Описва как зърното/малцът е обработен извън стандартното сушене
        и изпичане (обичайни специализирани процеси).
    malt_usage_purpose:
      name: Предназначение на малца
      description: Описва основния функционален принос на специалния малц към рецептата
        за бира.
    man_overboard_system_type:
      name: Тип система за човек зад борда
      description: Определя основната категория решения за спасяване на човек, паднал
        зад борда (MOB), предлагани от продукта.
    mandolin_back_sides_wood:
      name: Дърво за задната част и страничните стени на мандолината
      description: Посочва вида дърво, използван за изработката на задната част и
        страничните стени на мандолината.
    mandolin_body_top_wood:
      name: Дърво за горната част на корпуса на мандолина
      description: Основен вид дърво/материал, използван за изработката на горната
        плоскост на мандолината.
    mandolin_bridge_type:
      name: Тип на мост за мандолина
      description: Определя стила на мостчето, използвано при мандолината.
    mandolin_pickup_configuration:
      name: Конфигурация на адаптерите на мандолината
      description: Показва дали мандолината е снабдена с електроника и какъв тип система
        за усилване на звук е монтирана.
    mandolin_string_configuration:
      name: Конфигурация на струните на мандолината
      description: Определя конфигурацията на струните на мандолината според общия
        брой струни и броя на двойките (например 8 струни / 4 двойки).
    mangosteen_variety:
      name: Сорт мангостин
      description: Посочва конкретния вид или сорт на мангостина или близък вид от
        рода гарциния, който се предлага за продажба.
    mannequin_style:
      name: Стил на манекен
      description: Описва конструктивния дизайн или стила на изработка на тренировъчния
        манекен.
    manufacturing_process:
      name: Производствен процес
      description: Основен метод за производство на тялото на макарата или шпулата
        (напр. CNC обработка, леене под налягане).
    map_coverage_sky_planet_body:
      name: Обхват на картата (небе/планетарно тяло)
      description: 'Показва какво изобразява картата: нощното небе (съзвездия) или
        конкретно планетарно тяло.'
    map_format:
      name: Формат на картата
      description: Определя физическото или цифровото представяне на ловни карти и
        наръчници.
    map_sensor_output_signal_type:
      name: Тип изходен сигнал на MAP сензора
      description: Посочва типа изходен сигнал, който MAP сензорът подава към блока
        за управление на двигателя (ECU).
    map_size_sheet:
      name: Размер на картата (лист)
      description: Посочва крайния размер на листа/постера/планисферата за по-лесно
        показване и съвместимост (размер на рамка, място на стената).
    marabou_feather_form:
      name: Форма на перата на марабу
      description: Формата на продукта от пера марабу, в който се продава.
    marabou_feather_treatment:
      name: Обработка на перата марабу
      description: Как перата марабу са обработени или завършени за използване в ръчни
        изработки.
    marble_track_set_feature_modules:
      name: Модулни елементи на комплект за писта за топчета
      description: Подчертава специални функционални модули, включени в комплекта
        (напр. повдигач, пусков механизъм, превключватели).
    marine_flare_certification_standard:
      name: Сертификация или стандарт за морски сигнални ракети
      description: Показва кои сертификати или стандарти за морска безопасност покрива
        сигналната ракета.
    marine_safety_standard_compliance:
      name: Съответствие със стандартите за морска безопасност
      description: Показва кои официални стандарти за безопасност на водата или одобрение
        отговаря аксесоарът.
    marine_transmission_type:
      name: Тип морска трансмисия
      description: Указва типа на морската трансмисия, свързана с вътрешния двигател
        (напр. директно задвижване или V-образно задвижване).
    marker_action_type:
      name: Тип механизъм на маркера
      description: Описва основния механизъм на задействане/работа на маркера.
    marker_caliber:
      name: Калибър на маркера
      description: Определя диаметъра на боите, за изстрелването на които е предназначен
        маркерът.
    marking_durability:
      name: Издръжливост на маркировката
      description: Показва колко дълго се очаква нанесената линия да остане видима
        при нормални условия – например временно (до 3 седмици), полутрайно (до 6
        месеца) или трайно (повече от 6 месеца).
    marking_tip_type:
      name: Тип маркиращ връх
      description: Тип на маркиращия накрайник, който пергелът използва за чертане
        (напр. държач за молив, мастилен връх или връх за надраскване).
    marshmallow_processing_method:
      name: Метод за обработка на маршмелоу
      description: Описва всяка специална обработка, прилагана към маршмелоу, която
        влияе върху текстурата, срока на годност или вкуса.
    marshmallow_size:
      name: Размер маршмелоу
      description: Класифицира относителния размер на отделните парченца маршмелоу.
    martial_arts_belt_rank:
      name: Ранг на колана по бойни изкуства
      description: Показва нивото на уменията/ранга, което се отразява чрез цвета
        на колана или специалната комбинация от цветове.
    mask_bib_type:
      name: Тип предпазител за брадичката на маската
      description: Посочва типа предпазител на фехтовална маска, като стандартен плат,
        проводим, подвижен или без предпазител.
    mask_cage_material:
      name: Материал на решетката на маската
      description: Материал, използван специално за лицевата решетка или рамката на
        маската.
    mask_goggle_design:
      name: Дизайн на маска/очила
      description: Определя цялостния конструктивен дизайн или стила на покритие на
        защитната екипировка.
    mask_skirt_material:
      name: Материал на уплътнението на маската
      description: Посочва материала на мекото уплътнение, което осигурява водонепроницаемото
        уплътнение между маската и лицето.
    mask_strap_material:
      name: Материал на каишката на маската
      description: Посочва материала на каишката, която закрепва маската към главата.
    mass_air_flow_sensor_measurement_type:
      name: Тип измерване на сензора за масов въздушен поток
      description: Посочва технологията за измерване и вида на изходния сигнал на
        MAF сензора.
    mass_air_flow_sensor_mounting_type:
      name: Тип монтаж на сензора за масов въздушен поток
      description: Как MAF сензорът или модулът на сензора е монтиран/инсталиран във
        всмукателната система.
    massage_feature:
      name: Функция за масаж
      description: Показва дали регулируемата основа включва вградена функция за масаж
        и ако да — колко масажни зони предлага.
    mast_attachment_interface:
      name: Интерфейс за закрепване на мачтата
      description: Посочва стандарта на свързване между фюзелажа и мачтата, помагайки
        на купувачите да осигурят съвместимост на компонентите.
    mast_base_type:
      name: Тип основа на мачтата
      description: Определя монтажния интерфейс, който свързва мачтата с дъската или
        адаптера.
    mast_bend_curve:
      name: Крива на огъване на мачтата
      description: Модел на гъвкавост на мачтата, който определя съвместимостта и
        управлението на платното.
    mast_diameter_type:
      name: Тип диаметър на мачтата
      description: Стандартизирана класификация на диаметъра на мачтата за уиндсърф
        (напр. RDM, SDM, MDM), използвана за проверки за съвместимост.
    mat_backing_type:
      name: Тип основа на постелката
      description: Посочва вида на основата от долната страна на постелката, която
        помага тя да стои стабилно върху различни повърхности.
    mat_installation_method:
      name: Метод за монтаж на постелката
      description: Показва как постелката се монтира или фиксира на място.
    mat_style:
      name: Стил на постелката
      description: Определя конструктивния стил или формата на постелката (напр. сгъваема
        постелка, свързващи се панели, предпазна подложка).
    maternity_panel_type:
      name: Тип панел за бременни
      description: Показва стила на еластичния панел или колана, предназначен да осигури
        място за растящия корем по време на бременност.
    maternity_waistband_style:
      name: Стил на колана за бременни
      description: Показва дизайна и разположението на колана или коремния панел при
        панталоните за бременни, описвайки как дрехата поддържа растящия корем.
    mattress_top_type:
      name: Тип горен слой на матрака
      description: Определя стила на горния слой или повърхностната конструкция на
        матрака, като например горен слой тип „възглавница“ или стегнат горен слой.
    maturation_vessel_material:
      name: Материал на съда за зреене
      description: Посочва основния материал на съда или бурето, използвано за отлежаване
        на шочу.
    maximum_quilt_size_supported:
      name: Максимален размер на одеяло (юрган), който се поддържа.
      description: Максимален размер на юргана/проекта, който рамката може да побере
        (обикновено се описва чрез размери на легла или максимална ширина).
    meal_course:
      name: Тип хранене
      description: Посочва типичния повод или момент за консумация на продукта.
    meal_preparation_state:
      name: Състояние на приготвяне на храната
      description: Посочва колко подготовка е необходима преди консумация (напр. готов
        за консумация, комплект за приготвяне на ястие).
    meat_processing_state:
      name: Състояние на обработка на месото
      description: Посочва степента на термична обработка или осоляване/зреене на
        месния продукт преди продажба.
    meat_quality_grade:
      name: Клас на качеството на месото
      description: Показва качествения клас или класификация, присвоени на месото
        от признат сертифициращ орган (напр. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Твърдение относно отглеждането на животни
      description: 'Изтъква често срещани твърдения относно хуманното отношение към
        животните или селскостопанските практики, свързани с месото (например: отгледани
        на пасища, отглеждани на свобода).'
    mechanical_loom_assembly_status:
      name: Състояние на сглобката на механичен стан
      description: Как се изпраща или доставя станът и дали се налага сглобяване.
    mechanical_loom_weaving_type:
      name: Вид тъкане с механичен стан
      description: Основен механизъм/тип на тъкане, поддържан от стана.
    mechanical_puzzle_primary_mechanism:
      name: Основен механизъм на механичния пъзел
      description: Основно взаимодействие/механизъм, използван за решаване на механичния
        пъзел.
    mechanical_puzzle_solution_format:
      name: Формат за решение на механичен пъзел
      description: Формат, в който се предоставят подсказки/решения, когато са включени.
    medal_attachment_style:
      name: Стил на закрепване на медала
      description: Посочва се как трябва да се носи или показва медалът (например,
        на лента за врата, с игла за закрепване).
    medal_award_level:
      name: Ниво на отличие на медала
      description: Посочва нивото на наградата, представено от медала (напр. 1-во
        място, участник).
    medal_finish:
      name: Външен вид на медала
      description: Определя външния вид на медала (визуален блясък/текстура), независимо
        от материала.
    medal_packaging:
      name: Опаковка на медала
      description: Посочва вида на опаковката/представянето, в която се доставя медалът.
    melodica_accessory_set_included:
      name: Включен комплект аксесоари за мелодика
      description: Кои стандартни аксесоари са включени в комплекта на мелодиката.
    melodica_air_chamber_material:
      name: Материал на въздушната камера на мелодиката
      description: Материалът на въздушната камера/корпуса на мелодиката (ABS, дърво
        и др.), когато продавачите го разграничават от останалите части.
    melodica_included_accessories:
      name: Включени аксесоари за мелодика
      description: Аксесоари, включени с мелодиката в кутията.
    melodica_key_color_scheme:
      name: Цветова схема на клавишите на мелодиката
      description: Цветовата схема на клавишите (не на корпуса), която влияе върху
        четимостта (особено за деца/начинаещи).
    melodica_mouthpiece_configuration:
      name: Конфигурация на мундщука на мелодиката
      description: Показва кои интерфейси за обдухване са включени/използвани за свирене
        на мелодиката.
    melodica_mouthpiece_type:
      name: Тип мундщук за мелодика
      description: Стил на интерфейса за обдухване, включен с мелодиката (мундщук
        и/или гъвкава тръба).
    melodica_reed_plate_material:
      name: Материал на езичковата пластина на мелодиката
      description: Материалът на плочката с езичетата (различен от общия материал
        на корпуса на инструмента), който може да повлияе на издръжливостта и тона.
    melodica_size_class:
      name: Размерен клас на мелодиката
      description: Общ размерен/преносим клас за мелодика, обикновено базиран на броя
        клавиши и форм-фактора (напр. мини/ученически срещу стандартни или модели
        с разширен диапазон).
    melon_variety:
      name: Сорт пъпеш
      description: Посочва конкретния вид пъпеш в продукта, за да помогне на купувачите
        бързо да разпознаят предпочитания от тях сорт.
    memory_foam_infusion_material:
      name: Материал за инфузия с мемори пяна
      description: Посочва специални добавки, вложени в мемори пяната за охлаждане,
        контрол на миризми или антибактериален ефект.
    memory_wire_gauge:
      name: Дебелина на мемори телта
      description: Посочва размера по American Wire Gauge (AWG) на мемори телта.
    memory_wire_project_size:
      name: Размер на проекта с тел с памет на формата
      description: Посочва предназначената форма/размер на бижуто или намотката, за
        които е оформена мемори телта (напр. гривна, колие, пръстен).
    metal_purity:
      name: Чистота на метала
      description: Посочва степента на чистота на метала, използван в бижутата, която
        обикновено се изразява в карати (K) или в хилядни.
    metrics_counted:
      name: Броени метрики
      description: Изброява отделните статистики или събития, които броячът е предназначен
        да отчита.
    metronome_display_style:
      name: Стил на показване на метроном
      description: Указва как темпото се показва/индикира на потребителя (игла/махало
        срещу цифров LED/LCD или мигаща светлина).
    metronome_output_method:
      name: Метод за изход на метроном
      description: Указва наличните методи за изход за звука/ритъма на метронома.
    microphone_toy_feature_set:
      name: Комплект функции за играчка микрофон
      description: Ключови игрови функции на микрофона-играчка (гласови ефекти, усилване
        на звука, запис и др.).
    midi_output_type:
      name: Тип MIDI изход
      description: Посочва типа(овете) MIDI изход, предоставен(и) от тригер модула.
    military_branch:
      name: Военен клон
      description: Определя военния род, за който е предназначена или от който е вдъхновена
        униформата.
    milk_base_type:
      name: Тип млечна основа
      description: Посочва основното мляко или алтернативата на мляко, използвани
        в напитката, ако има такива.
    milk_feeding_method:
      name: Метод за хранене с мляко
      description: Посочва как са били отглеждани животните, от които е произведено
        млякото (например, хранени с трева или със зърнени култури), което може да
        повлияе на вкуса и хранителния състав.
    milk_processing_method:
      name: Метод за обработка на мляко
      description: Посочва обработката или технологичния процес, на който е било подложено
        млякото, което оказва влияние върху безопасността, срока на годност и хранителните
        свойства.
    milk_source_animal:
      name: Животно източник на мляко
      description: Идентифицира животното, от което е получено млякото, помагайки
        на потребителите да избират краве, козе, биволско или други млечни продукти
        от животински произход.
    millet_processing_method:
      name: Метод за обработка на просо
      description: 'Посочва основния метод на преработка или състоянието на зърното
        от просо (например: необработено, олющено, покълнало).'
    millet_variety:
      name: Сорт просо
      description: Идентифицира специфичния вид просо, съдържащо се в продукта (напр.
        перлено, лисича опашка, пръст).
    milling_process:
      name: Процес на смилане
      description: Посочва метода на производство, използван при смилането на брашното,
        който може да повлияе на вкуса, степента на термична обработка и хранителния
        състав.
    mint_mark:
      name: Монетен знак
      description: Знак на монетния двор, както е изобразен върху монетата (ако е
        приложимо).
    mirror_configuration:
      name: Конфигурация на огледалото
      description: Определя стила или структурата на огледалото, включено в комплекта
        за тоалетка.
    mirror_coverage:
      name: Огледално покритие
      description: Описва размерите на огледалните панели на плъзгащите се врати.
    mirror_curvature_type:
      name: Тип кривина на огледалото
      description: Определя дали повърхността на огледалото е изпъкнала, плоска или
        вдлъбната, което оказва влияние върху зрителното поле.
    mirror_mounting_location:
      name: Местоположение за монтаж на огледало
      description: Посочва къде на велосипеда или на велосипедиста е предвидено да
        се монтира огледалото.
    mirror_shape:
      name: Форма на огледалото
      description: Посочва геометричната форма или стила на основното огледало, включено
        в комплекта за тоалетка.
    mix_ratio:
      name: Съотношение на смесване
      description: Посочва препоръчителното съотношение на разреждане на охлаждащата
        течност с вода (за концентрати) или потвърждава фиксираното съотношение на
        предварителната смес за предварително разредени продукти.
    mma_glove_type:
      name: Вид ръкавица за ММА
      description: Посочва основното предназначение или стил на ръкавицата при тренировки
        или състезания по ММА.
    mobility_features:
      name: Функции за мобилност
      description: Посочва вградени елементи за придвижване или преносимост, като
        колелца или сгъваеми крака.
    model_aircraft_assembly_level:
      name: Ниво на сглобяване на модели самолети
      description: Показва колко конструктивни работи трябва да бъдат извършени, преди
        самолетът да може да бъде използван.
    model_making_kit_items_included:
      name: Включени елементи в комплекта за моделиране
      description: Изброява какво е включено в комплекта или пакета за моделиране
        (напр. боя, лепило, четка).
    model_making_product_type:
      name: Тип продукт за изработка на модели
      description: Определя какво представлява артикулът в моделизма (комплект, аксесоар,
        инструмент или консуматив), за да подобри разглеждането и филтрирането между
        смесени продуктови типове в моделизма.
    model_rocket_kit_contents:
      name: Съдържание на комплекта за моделиране на ракета
      description: Посочва дали продуктът е пълен многостепенен комплект за моделна
        ракета или допълнение/модул/части (напр. ускорителен или поддържащ етап).
    model_rocket_kit_format:
      name: Формат на комплекта за моделна ракета
      description: Указва дали ракетата се продава като комплект и нивото на готовност
        за сглобяване.
    model_rocket_motor_impulse_class:
      name: Клас на импулса на двигателя за моделна ракета
      description: Посочва стандартизирания клас на общия импулс на двигателя за моделна
        ракета (напр. A, B, C и др.).
    model_rocket_motor_mount_size:
      name: Размер на монтажа за мотор на моделна ракета
      description: Посочва диаметъра на корпуса на двигателя, за който е проектиран
        държачът на двигателя на ракетата.
    model_rocket_power_source_required:
      name: Необходим източник на захранване за моделна ракета
      description: Посочва дали продуктът изисква батерии/външно захранване и какъв
        тип.
    model_rocket_propellant_type:
      name: Тип гориво за моделна ракета
      description: Посочва вида на горивната/задвижващата система, използвана за задвижване
        при моделните ракети.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Препоръчителен размер на стартов прът или релса за моделна ракета
      description: Посочва диаметъра на стартовия прът или размера на релсата, за
        които е проектирана ракетата (напр. прът 1/8 инча, релса 1010).
    model_rocket_recovery_method:
      name: Метод за възстановяване на моделна ракета
      description: Основна система за безопасно приземяване на ракетата след полет.
    model_rocket_recovery_system_type:
      name: Тип система за връщане на моделна ракета
      description: Посочва основния метод за безопасно връщане на ракетата след полет.
    model_rocket_staging:
      name: Посочва броя и вида на степените (етапите) при моделните ракети
      description: Показва с колко задвижвани степени е проектирана да лети моделната
        ракета.
    model_train_accessory_electrical_connection_type:
      name: Тип електрическа връзка за аксесоари на моделен влак
      description: Посочва типа конектор или клема, използван за свързване на захранвани
        аксесоари за моделни влакове към релсовия макет (когато е приложимо).
    model_train_coupler_type:
      name: Тип куплунг за моделeн влак
      description: Посочва стандарта на куплунга, монтиран на подвижния състав или
        локомотива на моделния влак.
    model_train_gauge:
      name: Мащаб на моделно влакче
      description: Посочва системата на железопътния габарит, за която е предназначен
        аксесоарът (когато е приложимо), като помага да се осигури физическа съвместимост
        с релсовия път и трасето на потребителя.
    model_train_lighting_features:
      name: Характеристики на осветлението на моделно влакче
      description: Посочва функциите за осветление, включени в моделния влак/локомотив.
    model_train_power_pickup_method:
      name: Метод за захранване на моделeн влак
      description: Посочва начина, по който моделът получава захранване за работа
        (напр. от релсите, батерии и др.).
    model_train_scale:
      name: Скала на моделно влакче
      description: Посочва стандарта за мащаб/размер на моделния влак (съотношението
        между модела и истинския влак).
    model_train_sound_features:
      name: Звукови функции на моделния влак
      description: Показва дали моделът включва вградени звукови ефекти и какъв тип
        звукови функции предлага.
    model_train_track_gauge:
      name: Мащаб (ширина на междурелсието) на релсите за моделни влакове
      description: Посочва стандарта на междурелсието/релсовата система, за която
        е проектиран моделът (напр. стандартно междурелсие, теснолинейни варианти
        или специфични за марка/система стандарти, когато е приложимо).
    modeling_dough_base_material:
      name: Основен материал за моделиращо тесто
      description: Основен състав/база на моделиращото тесто (напр. на основата на
        пшеница/брашно спрямо полимерна основа).
    modeling_dough_features:
      name: Характеристики на моделиращото тесто
      description: Ключови функционални характеристики на моделиращото тесто, по които
        купувачите обикновено филтрират.
    modification_level:
      name: Ниво на модификация
      description: Показва степента на модификация на малца (колко добре са разградени
        ендоспермът/протеините на ечемика), често обобщавана като недостатъчно модифициран
        / модифициран / свръхмодифициран.
    molasses_base_ingredient:
      name: Основна съставка на меласата
      description: Определя основния растителен или плодов източник, от който се произвежда
        меласата.
    molasses_grade:
      name: Клас меласа
      description: Класифицира меласата според етапа на извличане/рафиниране, което
        директно влияе върху интензивността на вкуса, цвета и хранителния профил.
    mold_material:
      name: Материал на формата
      description: Основен материал на самата форма (напр. силикон, пластмаса, метал).
    molle_compatibility:
      name: Съвместимост с стандартна система за пренасяне на военно и туристическо
        оборудване (MOLLE)
      description: Показва дали жилетката предлага MOLLE/PALS ленти за прикрепване
        на модулни джобове и аксесоари.
    motor_belt_type:
      name: Тип ремък на мотора
      description: Определя дизайна/профила на ремъка, използван в задвижващата система
        на бягащата пътека.
    motor_configuration:
      name: Конфигурация на двигателя
      description: Показва колко независими задвижващи мотора използва скутерът.
    motor_mounting_configuration:
      name: Конфигурация за монтаж на двигателя
      description: Описва как моторът е монтиран/реализиран в комплекта за конверсия
        на скутер.
    motor_mounting_position:
      name: Позиция за монтаж на двигателя
      description: Показва къде на електрическия скутер е монтиран моторът, например
        в предната главина, задната главина, двойна главина или централно задвижване.
    motor_position:
      name: Позиция на мотора
      description: Показва къде е разположен моторът на електрическия велосипед, което
        влияе върху управлението и поддръжката.
    motor_vehicle_a_v_integration_features:
      name: Функции за интеграция на аудио/видео оборудване в моторни превозни средства
      description: Функции за интеграция със смартфон и автомобил, поддържани от главното
        устройство (напр. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Приложение/позиция на крушката за моторно превозно средство
      description: Посочва предназначената позиция или функция на осветлението, за
        която е проектирана крушката (напр. къси светлини, стоп светлина).
    motor_vehicle_bulb_approval_standard:
      name: Стандарт за одобрение на крушка за моторно превозно средство
      description: Посочва маркировка за съответствие с нормативните изисквания/одобрение
        за използване по пътищата на целевия пазар.
    motor_vehicle_oxygen_sensor_bank:
      name: Банкa на кислородния сензор на моторно превозно средство
      description: Посочва на коя редица цилиндри на двигателя се монтира кислородният
        сензор (напр. редица 1 или редица 2) при V-образни/боксерни двигатели; при
        редови двигатели използвайте „Не се отнася“.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Брой проводници на кислородния сензор за моторно превозно средство
      description: Брой проводници в кабелния сноп на кислородния сензор.
    motor_vehicle_oxygen_sensor_position:
      name: Позиция на кислородния сензор на моторно превозно средство
      description: Посочва къде е монтиран кислородният (O2) сензор в изпускателната
        система спрямо каталитичния конвертор.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Номер на кислородния сензор на моторно превозно средство
      description: Показва номера на сензора (напр. Сензор 1 или Сензор 2) в рамките
        на дадено обозначение на банка/позиция.
    motor_vehicle_oxygen_sensor_type:
      name: Тип кислороден сензор за моторно превозно средство
      description: Посочва дизайна/технологията на кислородния сензор.
    motor_vehicle_paint_application_method:
      name: Метод за нанасяне на боя за моторно превозно средство
      description: Описва как боята е предвидено да бъде нанесена върху повърхността
        на превозното средство.
    motor_vehicle_paint_system_step:
      name: Етап от системата за боядисване на моторно превозно средство
      description: Показва за кой етап или компонент от системата за автомобилно пребоядисване
        е предназначен продуктът (напр. грунд, базов слой, прозрачен лак).
    motor_vehicle_speaker_mounting_type:
      name: Тип монтаж на говорител за моторно превозно средство
      description: Начин на монтаж на високоговорителя в превозното средство (тип
        монтажна конструкция).
    motor_vehicle_subwoofer_size:
      name: Размер на субуфера за моторно превозно средство
      description: Номинален диаметър на субуферния говорител (напр. 8 инча, 10 инча,
        12 инча), използван за съответствие с пространството в автомобила и съвместимостта
        на корпуса.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Конфигурация на звуковата бобина на субуфера за моторно превозно средство
      description: Брой/конфигурация на звуковите намотки, използвани за съответствие
        с опциите за свързване към усилвател (напр. SVC спрямо DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Импеданс на звуковата бобина на субуфера за моторно превозно средство
        (на бобина)
      description: Импеданс на всяка звукова намотка (не крайното свързано натоварване),
        използван за изчисления при окабеляване.
    motor_vehicle_voltage_regulator_type:
      name: Тип регулатор на напрежение за моторно превозно средство
      description: Посочва технологията/типа на регулатора за моторни превозни средства.
    motorcycle_armor_certification_standard:
      name: Стандарт за сертификация на мотоциклетна броня
      description: Показва официалния стандарт(и) за безопасност, на които протекторът
        е сертифициран да отговаря (напр. EN 1621-2 за гръбни протектори, EN 1621-3
        за гръдни).
    motorcycle_cover_size_class:
      name: Размерен клас на покривало за мотоциклет
      description: Стандартизирана категория размер за покривала за мотоциклети въз
        основа на типичната категория/дължина на мотоциклета, за който е подходящо.
    motorcycle_glove_certification_standard:
      name: Стандарт за сертификация на мотоциклетни ръкавици
      description: Посочва защитния сертификат/стандарт, на който отговарят ръкавиците
        (напр. нива по EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Водоустойчива конструкция на мотоциклетни ръкавици
      description: Посочва типа метод за водоустойчивост, използван в ръкавицата (ако
        има такъв).
    motorcycle_guard_coverage_area:
      name: Зона на покритие на протектора за мотоциклет
      description: Основна зона на защита, осигурена от продукта (лакът, китка, предмишница,
        комбинирана).
    motorcycle_kidney_belt_construction_type:
      name: Тип конструкция на бъбречен колан за мотоциклет
      description: Конструктивен стил на бъбречния колан, който влияе върху твърдостта,
        въздушния поток и защитата.
    motorcycle_kidney_belt_purpose:
      name: Предназначение на мотоциклетния бъбречен колан
      description: Определя основния стил на каране или сценарий, за който е предназначен
        бъбречният колан за мотоциклет.
    motorcycle_luggage_capacity_class:
      name: Клас на капацитет на багажа на мотоциклет
      description: Показва обемния капацитет на багажа на мотоциклета, изразен в литри.
    motorcycle_luggage_mounting_system:
      name: Система за закрепване на багаж за мотоциклети
      description: Система за закрепване/монтаж, използвана за фиксиране на чантата
        или дисагите към мотоциклета (напр. презрамки за премятане, бързо освобождаване
        с монтаж на багажник).
    motorcycle_luggage_side:
      name: Страна на багажа на мотоциклет
      description: За странични чанти/дисаги посочва дали артикулът е за лявата страна,
        дясната страна или комплект/чифт.
    motorcycle_protective_gear_size_system:
      name: Система за размери на мотоциклетна защитна екипировка
      description: Показва системата за оразмеряване, използвана за продукта (напр.
        буквени размери, числови размери, универсален размер).
    motorcycle_rack_carrier_style:
      name: Стил на багажника/носача за мотоциклет
      description: Описва функционалния стил на носача за транспортиране на мотоциклет
        или скутер (платформа, релса, с повдигащ механизъм и др.).
    motorcycle_riding_discipline:
      name: Дисциплина на каране с мотоциклет
      description: Определя основната дисциплина/предназначение за каране, за която
        е предназначена шийна яка.
    motorcycle_tire_speed_rating:
      name: Скоростен индекс на мотоциклетна гума
      description: Определя максималната постоянна скорост, за която е оценена гумата,
        използвайки стандартния буквeн код (напр. H, V, W).
    motorsport_window_net_certification:
      name: Сертификация на предпазна мрежа за моторни спортове
      description: Сертификация или хомологация за състезателна безопасност, на която
        отговаря предпазната мрежа (напр. SFI или FIA), включително номер на спецификацията,
        когато е приложимо.
    mound_usage_type:
      name: Тип предназначение на могила
      description: Определя предназначената среда на приложение на стойката, като
        тренировка, игра, bullpen или многофункционална употреба.
    mount_attachment_method:
      name: Метод за закрепване на монтажа
      description: Посочва как стойката се закрепва към повърхността/структурата на
        превозното средство.
    mountainboard_truck_type:
      name: Тип тракове за маунтинборд
      description: Класифицира типа колесари, включени към дъската, който влияе върху
        реакцията при завиване и издръжливостта.
    mounting_attachment_method:
      name: Метод на монтаж/закрепване
      description: Как държачът/чантата е проектиран(а) да се закрепва към барабан,
        стойка, колан или друга повърхност.
    mounting_attachment_type:
      name: Тип монтаж/закрепване
      description: Как аксесоарът за предавателното число се закрепва или взаимодейства
        с макарата.
    mounting_hardware_included_for_installation:
      name: Включен монтажен хардуер (за инсталация)
      description: Посочва дали монтажният хардуер, необходим за инсталиране на задната
        седалка (напр. скоби, болтове, релси), е включен в продукта.
    mounting_location:
      name: Място за монтаж
      description: Посочва предназначената зона за поставяне върху оборудване или
        тяло за светлината/рефлектора (напр. предна вилка, каска, спици на колелото).
    mounting_method:
      name: Метод на монтаж
      description: Как държачът за пръчка/четка се монтира или закрепва (напр. със
        скоба, с каишка, чрез лепене).
    mounting_position:
      name: Позиция на монтаж
      description: Посочва къде е предназначено да бъде монтирано/инсталирано управлението
        на ръчната спирачка в купето на превозното средство.
    mounting_rail_type:
      name: Тип монтажна релса
      description: Посочва стандарта на релсата или интерфейса, към който се закрепва
        аксесоарът, като например Пикатини или M-LOK.
    mounting_receiver_size:
      name: Размер на монтажния приемник
      description: Необходим размер на приемника за теглич при багажници, монтирани
        на теглич.
    mounting_storage_type:
      name: Тип монтаж/съхранение
      description: Начин на монтиране или съхранение на устройството на плавателния
        съд/върху човека.
    mouth_grip_type:
      name: Тип захват за уста
      description: Описва типа захват или предпазител за уста на свирката за комфорт
        и хигиена.
    mouthguard_mold_type:
      name: Тип оформяне на протектор за уста
      description: Описва как протекторът за уста се напасва към зъбите на спортиста
        (напр. чрез нагряване и захапване, индивидуално зъболекарско напасване).
    mouthpiece_facing_length:
      name: Дължина на отвора на мундщука
      description: Посочва категорията на дължината на кривината на отвора на мундщука
        (не общата дължина на мундщука), която влияе върху реакцията, съпротивлението
        и съвместимостта с платъка.
    mouthpiece_material:
      name: Материал на мундщука
      description: Посочва материала на частта на мундщука/накрайника, която влиза
        в контакт с устата при парти свирка, който може да се различава от материала
        на основното тяло.
    mouthpiece_shank_receiver_size:
      name: Размер на шийката/приемника на мундщука
      description: Посочва стандарта на приемника/цевта на мундщука, съвместим с флигорна.
    mouthpiece_shank_size:
      name: Размер на цевта на мундщука
      description: Посочва стандарта за съвместимост на шийката/приемника на мундщука,
        за да се осигури съвместимост с предназначения духов инструмент.
    mouthpiece_shank_type:
      name: Тип стебло на мундщука
      description: Посочва стандарта на приемника/шийката на мундщука за съвместимост
        (когато е приложимо).
    mouthpiece_style:
      name: Стил на мундщука
      description: Класифицира дизайна/формата на частта за уста на трензелата, което
        влияе върху точките на натиск, строгостта и предпочитанията на коня.
    mouthpiece_type:
      name: Тип мундщук
      description: Тип мундщук в края за обдухване (вграден, подвижен или допълнително
        поставящ се).
    movement_mechanism:
      name: Механизъм на движение
      description: Определя как пейката се движи по време на употреба (люлеене, плъзгане,
        поклащане и др.).
    muffin_size:
      name: Размер на мъфините
      description: Класифицира формата на физическия размер на продукта за мъфини
        (напр. мини, стандартен, джъмбо).
    mushroom_variety:
      name: Сорт гъби
      description: Определя конкретния вид или сорт гъба или трюфел, съдържащ се в
        продукта (напр. шийтаке, кралска кладница, черен трюфел).
    music_stand_desk_tilt_adjustment:
      name: Регулиране на наклона на плота на музикална стойка
      description: Посочва дали и как може да се регулира ъгълът на плота.
    music_stand_intended_use:
      name: Предназначение на музикалната стойка
      description: Показва основното предназначение/сценарий на употреба на стойката.
    musical_block_pitch_type:
      name: Тип на височината на тона на музикалния блок
      description: Описва дали музикалният блок произвежда определена височина на
        тона (настроен) или неопределена височина на тона.
    musical_box_mechanism_type:
      name: Тип механизъм за музикална кутия
      description: Как музикалната кутия произвежда/възпроизвежда звук (напр. навиващ
        механизъм срещу електронно възпроизвеждане).
    musical_keyboard_case_fit_type:
      name: Тип съвместимост на калъф за музикална клавиатура
      description: Описва как калъфът е оразмерен спрямо инструмента (напр. универсален/общ
        диапазон на размери срещу специфично за модел/персонализирано прилягане).
    musical_ratchet_sound_character:
      name: Характер на звука на музикална тресчотка
      description: Общо описание на тембъра/силата на звука на тресчотката.
    musical_scraper_groove_surface_material:
      name: Материал на набраздената повърхност на музикален гуиро
      description: Посочва материала на оребрената/набраздена повърхност за стържене
        (може да се различава от материала на корпуса).
    musical_scraper_type:
      name: Тип музикален стържещ инструмент
      description: Посочва стила/дизайна на музикалния стържещ инструмент (напр. гуиро
        спрямо реко-реко), което влияе върху звука и техниката на свирене.
    mute_attachment_method:
      name: Метод за закрепване на заглушителя
      description: Посочва как заглушителят за чинел се закрепва или задържа върху
        чинела (напр. гел, статично прилепване, магнит, щипка).
    mute_attenuation_level:
      name: Ниво на заглушаване
      description: Посочва колко заглушителят намалява възприеманата сила на звука,
        особено важно при тренировъчни заглушители.
    mute_cork_padding_material:
      name: Материал на тапата/подложката на заглушителя
      description: Посочва материала на контактната подложка на заглушителя (напр.
        коркова лента/подложки), използвана за захващане/прилягане и защита на камбаната.
    mute_coverage_type:
      name: Тип покритие на заглушителя
      description: Показва стила/покритието на заглушителя върху свирещата повърхност
        — от малки заглушители за отделни точки до заглушители за цялата повърхност
        за упражнения.
    mute_finish:
      name: Покритие на заглушителя
      description: Повърхностно покритие на заглушителя, което може да влияе върху
        издръжливостта и външния вид (напр. полирано или сатенирано).
    name_label_text_template:
      name: Шаблон на текста за етикет с име
      description: Посочва предварително зададения текст или шаблон, отпечатан върху
        етикета с име (напр. „Принадлежи на“, „Изработено от“).
    napkin_ply:
      name: Брой пластове на салфетка
      description: Посочва дебелината на коктейлната салфетка чрез броя на пластовете.
    neck_brace_fit_system:
      name: Система за прилягане на шийна яка
      description: Посочва основния метод за регулиране и закрепване на шийния протектор
        към ездача.
    neck_brace_size_basis:
      name: Критерий за размер на шийната ортеза
      description: Показва базата за оразмеряване, използвана за избор на правилния
        размер на шийна яка.
    neck_configuration:
      name: Конфигурация на врата
      description: Посочва стила/конфигурацията на шийката, доставяна със саксофона,
        което влияе върху ергономията и удобството при свирене.
    neck_coverage_type:
      name: Тип покритие на врата
      description: Посочва стила на покритието за врата, включено с одеялото.
    neck_support_size_system:
      name: Система за размери на опора за врат
      description: Показва системата за оразмеряване, използвана за състезателната
        шийна опора/шийна яка (напр. за възрастни, младежи или универсален размер).
    necklace_length_type:
      name: Тип дължина на огърлицата
      description: Посочва стандартната категория за дължина на огърлицата, като тип
        „чоукър“ или „опера“, за улесняване на пазаруването по стил.
    needle_balance_zone:
      name: Зона на балансиране на иглата
      description: Посочва магнитната зона или полукълбо, за които е настроена иглата
        на компаса, за да осигури точни показания по света.
    needle_case_format:
      name: Формат на калъф за игли
      description: Общ тип конструкция на кутията за игли.
    needle_damping_type:
      name: Тип амортизация на иглата
      description: Описва как е стабилизирана иглата на компаса (напр. с течност,
        суха или електронно стабилизирана), което влияе върху времето за установяване
        и издръжливостта.
    needle_felting_needle_profile:
      name: Профил на иглата за сухо плъстене
      description: Напречно сечение/профил на игла за плъстене, което влияе върху
        движението на влакната и получения завършек.
    needle_holder_features:
      name: Характеристики на държача за игли
      description: Отличителни функционални характеристики на държача за игла.
    needle_holder_mounting_attachment_method:
      name: Метод за монтаж/закрепване на държача за игли
      description: Описва как държачът за игли е предназначен да бъде закрепван или
        използван по време на съхранение (напр. магнитно, с щипка, с каишка).
    needle_holder_style:
      name: Стил на държача за игли
      description: Физическият стил/дизайн за съхранение или носене на държача за
        игли.
    needle_pushing_surface_type:
      name: Тип повърхност за избутване на иглата
      description: Типът/дизайнът на повърхността за избутване на иглата върху шивашката
        длан (напр. метална вдлъбнатина, монета или подсилена подложка).
    needle_requirement_beading_pattern:
      name: Изискване за игла (модел за мъниста)
      description: Тип/размер на иглата, препоръчани от модела.
    needle_size_system:
      name: Система за размери на иглите
      description: Стандарт за означаване размера на иглите.
    needle_threader_compatible_needle_type:
      name: Съвместим тип игла за вдявач на конец
      description: Посочва за кои видове игли е предназначен уредът за вдяване (според
        категорията/предназначението на иглите).
    needle_threader_mechanism_type:
      name: Тип механизъм за вдяване на конец в игла
      description: Описва как вдявачът улавя/прекарва конеца през ухото на иглата.
    needle_threader_packaging_type:
      name: Тип опаковка на вдявача за конец
      description: Как продуктът се продава/опакова (единичен брой, мултипакет или
        комплект).
    needlecraft_fabric_color_family:
      name: Цветова група на плат за ръкоделие
      description: Нормализирана цветова група за плата „равномерка“ (използва се
        заедно с „цвят“ за филтриране).
    needlecraft_fabric_composition:
      name: Състав на плат за ръкоделие с игла
      description: Посочва състава/смеската на влакната на плата за ръкоделие с игла
        (напр. 100% памук, смес лен/памук).
    needlecraft_fabric_weave_type:
      name: Тип тъкане на плат за ръкоделие
      description: Посочва тъкането/структурата на платното за ръкоделие (напр. равномерно
        тъкане срещу традиционно ленено тъкане), което влияе върху поведението на
        бодовете и външния вид.
    needlecraft_kit_items_included:
      name: Включени елементи в комплект за ръкоделие
      description: Изброява основните компоненти, включени в комплекта за ръкоделие
        с игла (инструменти и консумативи).
    needlecraft_kit_project_type:
      name: Тип проект на комплект за ръкоделие с игла
      description: Определя какъв завършен продукт създава комплектът (крайният резултат
        от проекта).
    needlecraft_stitching_coverage:
      name: Покритие на шевовете при ръкоделие
      description: Посочва дали платът се шие през 1 нишка/квадратче или през 2 нишки
        (често при плат „равномерка“ и лен).
    needlepoint_canvas_mesh_count:
      name: Гъстота на платното за гоблен
      description: Предназначената гъстота/брой нишки на платното (нишки на инч),
        за която е проектиран моделът (често наричана брой на платното).
    needlepoint_frame_canvas_attachment_method:
      name: Метод за закрепване на платното към рамката за гоблен
      description: Описва как платното за гоблен се закрепва към рамката за гоблен.
    needlepoint_frame_compatible_stand_type:
      name: Съвместим тип стойка за рамка за гоблен
      description: Ако рамката е предназначена за монтаж на стойка, посочва с кои
        типове стойки е съвместима.
    needlepoint_frame_contents:
      name: Съдържание на рамката за гоблен
      description: Посочва кои компоненти и аксесоари са включени към рамката за гоблен
        (напр. рамка, допълнителни пръти/щанги, кабърчета/игли, захващащи ленти, чанта
        за носене).
    needlepoint_frame_tension_adjustment_type:
      name: Тип регулиране на опъна на рамката за гоблен
      description: Показва как (или дали) напрежението на рамката може да се регулира
        по време на употреба.
    needlepoint_pattern_chart_format:
      name: Формат на схемата за иглени точки
      description: Как дизайнът за гоблен е представен за шиене (схема срещу отпечатано/рисувано
        ръководство).
    needlepoint_project_type:
      name: Вид проект за гоблени
      description: Предназначеният завършен продукт/категория, за който е дизайнът
        за гоблен.
    net_design:
      name: Дизайн на мрежата
      description: Определя конструктивния тип на мрежата, като посочва дали може
        да се прибира или сгъва за по-лесно пренасяне.
    net_mesh_pattern:
      name: Шарка на мрежата
      description: Посочва геометричната форма на отворите на мрежата, която може
        да влияе върху видимостта и здравината.
    net_twine_gauge:
      name: Дебелина на нишката на мрежата
      description: Показва дебелината или здравината на нишката на мрежата, традиционно
        изразена като номер на дебелина (напр. 18, 36).
    nicotine_source:
      name: Източник на никотин
      description: Показва дали никотинът в продукта е с тютюнев произход, синтетичен
        или продуктът не съдържа никотин.
    nipple_drive_interface:
      name: Тип интерфейс на нипела
      description: Определя типа/стандарта на интерфейса или главата на нипела (външен
        или вътрешен), който определя необходимия инструмент и метода за наплитане
        на колелото.
    nock_activation_method:
      name: Метод за активиране на нока
      description: Посочва механизма, чрез който LED светлината на светещия нок се
        включва или изключва (напр. натиск от тетивата, сензор за движение, ръчен
        превключвател).
    nock_fitment_code:
      name: Код за съвместимост на нока
      description: Код на производителя или индустриален код, който идентифицира семейството/серията
        нокове, към което принадлежи.
    nock_throat_size:
      name: Размер на гърлото на нока
      description: Посочва размера на гърлото на нока (жлеба), което се захваща за
        тетивата.
    nock_transparency_level:
      name: Ниво на прозрачност на нока
      description: Описва доколко материалът на нока е прозрачен — прозрачен, полупрозрачен,
        непрозрачен или светещ в тъмното — което влияе върху видимостта и естетиката.
    nock_type:
      name: Тип нок
      description: Посочва типа нок, използван при стрелата или арбалетната стрела,
        като например щифтов, полумесец или светещ.
    noise_reduction_type:
      name: Тип шумопотискане
      description: Посочва технологията за намаляване на шума, използвана (или не)
        в интегрираните слушалки на каската, ако е приложимо.
    noise_suppression_technology:
      name: Технология за потискане на шума
      description: Посочва дали продуктът използва пасивно заглушаване или активна
        електронна схема, която потиска силните звуци и/или усилва околния звук.
    non_slip_base_features:
      name: Характеристики на неплъзгаща се основа
      description: Показва противоплъзгащите функции, включени за предотвратяване
        на движението на педала по време на изпълнение.
    nose_bridge_type:
      name: Тип на носовия мост
      description: Показва дизайна на носовия мост, който влияе върху прилягането
        при различни размери на лицето.
    nose_clip_accessories_included:
      name: Включени аксесоари за щипка за нос
      description: Изброява всички допълнителни аксесоари, включени със щипката за
        нос за плуване (напр. тапи за уши, калъф за съхранение).
    nose_clip_features:
      name: Характеристики на щипката за нос
      description: Подчертава основните функционални характеристики или удобства на
        щипката за нос.
    nose_coverage_style:
      name: Стил на покритие на носа
      description: Посочва наличието и типа на предпазния панел за носа или муцуната
        на маската против мухи.
    noseband_type:
      name: Тип ремък за нос
      description: Посочва дизайна на ремъка за нос (ако има такъв), включен с юздата.
    number_of_canvas_meshes:
      name: Брой отвори на платното
      description: Размер на мрежата на пластмасовото платно, изразен като отвори
        на инч (HPI) или брой, което определя размера на бодовете и детайлността на
        проекта.
    number_of_chainrings:
      name: Брой предни венци
      description: Показва за колко верижни колела е проектиран или с колко е доставен
        курбелът.
    number_of_control_stations:
      name: Брой контролни станции
      description: Посочва броя на кормилните/управляващите станции, поддържани от
        комплекта за управление (единична станция, двойна станция и др.).
    number_of_digits:
      name: Брой цифри
      description: Колко цифри показва броячът (напр. 1-цифрен, 2-цифрен, 3-цифрен).
    number_of_guitar_slots:
      name: Брой слотове за китара
      description: Показва колко китари е проектиран да побира калъфът/чантата за
        пренасяне.
    number_of_needlecraft_fabrics:
      name: Брой платове за ръкоделие с игла
      description: Посочва гъстотата на плата за ръкоделие, обикновено изразена като
        квадратчета/нишки на инч (напр. 14 броя).
    number_of_plastic_canvas_meshes:
      name: Брой отвори на пластмасовото платно
      description: Посочва броя на отворите на инч в пластмасовото платно, което определя
        размера на бодовете и нивото на детайлност на проекта.
    number_of_quilting_frame_rails:
      name: Брой релси на рамката за куилт
      description: Брой релси/ролки, включени в рамката за куилт (напр. системи с
        2 или 3 релси).
    number_of_rope_slots:
      name: Брой отвори за въже
      description: Показва дали осигурителното устройство е проектирано за използване
        с единично или двойно въже.
    number_of_switch_poles:
      name: Брой полюси на превключвателя
      description: Броят на отделните електрически вериги (полюси), управлявани от
        превключвателя (напр. SPST, DPST).
    number_of_switch_throws:
      name: Брой позиции на превключване
      description: Броят на изходните пътища (позиции) за всеки полюс (напр. SPDT).
    number_of_timing_chain_rows:
      name: Брой редове на ангренажната верига
      description: Посочва дали ангренажната верига е едноредова или многоредова.
    number_of_trailer_axles:
      name: Брой оси на ремаркето
      description: Брой оси на ремаркето.
    number_of_wheel_pieces:
      name: Брой части на колелата
      description: Посочва дали колелото е с конструкция от 1 част, 2 части или 3
        части.
    numbering_style:
      name: Стил на номериране
      description: Показва дали и как потниците са предварително номерирани за отборна
        идентификация (напр. без номера, 1–10, персонализирани).
    nunchuck_connector_type:
      name: Тип свързване на нунчаку
      description: Стил на свързване между двете дръжки на нунчаку (напр. въже, верига,
        въртяща се верига).
    nursing_access:
      name: Достъп за кърмене
      description: Посочва метода за достъп при кърмене, интегриран в банския тип
        рокля, ако е приложимо.
    nursing_access_type:
      name: Тип достъп за кърмене
      description: Посочва как дрехата осигурява достъп до гърдите за кърмене или
        изцеждане.
    nut_butter_texture:
      name: Текстура на ядково масло
      description: Описва физическата консистенция на ядковото масло, за да могат
        купувачите лесно да избират между гладко, хрупкаво и др.
    nutrient_fortification:
      name: Обогатяване с хранителни вещества
      description: Посочва основните хранителни вещества, с които е обогатен хранителният
        продукт или напитката.
    oak_product_form:
      name: Форма на дъбовия продукт
      description: Определя физическата форма на дъба, използван за отлежаване/овкусяване
        на продукти.
    oak_toast_level:
      name: Ниво на изпичане на дъба
      description: Посочва нивото на изпичане на дъбовите продукти.
    oboe_case_capacity:
      name: Капацитет на калъфа за обой
      description: Показва за какъв инструмент(и) и основни компоненти е предназначен
        калъфът.
    oboe_case_carry_configuration:
      name: Конфигурация за носене на калъф за обой
      description: Показва основната конфигурация за носене, предлагана от калъфа/чантичката.
    oboe_case_design:
      name: Дизайн на калъф за обой
      description: Класифицира конструкцията/твърдостта на калъфа или чантичката за
        обой (напр. твърд, полутвърд, мек), за да покаже нивото на защита.
    oboe_case_internal_fit_type:
      name: Тип вътрешно прилягане на калъф за обой
      description: Показва дали вътрешността е формована за конкретна конфигурация
        на инструмента или използва регулируеми отделения.
    oboe_keywork_plating:
      name: Покритие на клавишите за обой
      description: Посочва покритието/финиша на клавишите на обоя, отделно от материала
        на корпуса.
    oboe_strap_padding:
      name: Подплата на каишката за обой
      description: Описва наличието/типа подплата в зоната на контакт на каишката/опората
        за комфорт (напр. подплатена зона за рамо/врат).
    oboe_swab_style:
      name: Стил на почистващ тампон за обой
      description: Посочва функционалния стил/конструкция на почистващия тампон за
        обой (напр. издърпващ се, утежнена коприна).
    observation_window_material:
      name: Материал на прозореца за наблюдение
      description: Посочва материала на панелите/прозореца за наблюдение (често влияе
        върху прозрачността и издръжливостта).
    ocarina_accessories_included:
      name: Включени аксесоари за окарина
      description: Аксесоари, включени с окарината, като калъф, каишка за врат или
        схема за пръстовка.
    ocarina_chamber_count:
      name: Брой камери на окарината
      description: Посочва колко камери има линейната окарина, което влияе върху диапазона
        и сложността на свирене (единична, двойна, тройна и др.).
    ocarina_fingering_system:
      name: Система за пръстовка на окарина
      description: Посочва системата/стандарта за пръстовка, който следва висулката
        окарина (ако е приложимо).
    ocarina_finish_type:
      name: Вид покритие на окарината
      description: Повърхностно покритие на тялото на окарината, което влияе на усещането
        и външния вид.
    occupant_classification_sensor_support:
      name: Поддръжка на сензор за класификация на пътника
      description: Показва дали седалката включва сензор за класификация/тегло на
        пътника или има възможност за прехвърляне/монтаж на OEM сензора (често при
        предните пътнически седалки).
    octave_harmonica_cover_plate_material:
      name: Материал на капака на октавната хармоника
      description: Материал на външните капаци на октавната хармоника.
    octave_harmonica_tuning_system:
      name: Система за настройка на октавната хармоника
      description: Настройка/темперация на октавната хармоника.
    octoban_mounting_system_type:
      name: Тип монтажна система за октобан
      description: Начин на монтиране/позициониране на октобана по време на свирене
        (монтаж/стойка/скоба).
    odor_control_features:
      name: Функции за контрол на миризмата
      description: Показва дали продуктът осигурява неутрализиране/премахване на миризми
        и по какъв метод.
    office_furniture_items_included:
      name: Включени офис мебели
      description: Указва конкретните мебели за офис, включени в комплекта, като бюро
        или шкаф за документи.
    oil_cooler_core_type:
      name: Тип сърцевина на масления охладител
      description: Посочва вътрешната конструкция на сърцевината на масления охладител,
        което влияе върху ефективността на охлаждане, спада на налягането и издръжливостта.
    oil_cooler_mounting_style:
      name: Стил на монтаж на масления охладител
      description: Описва как масленият охладител е предназначен да бъде монтиран/инсталиран
        на превозното средство.
    oil_dipstick_component_type:
      name: Тип компонент на маслоизмервателната пръчка
      description: Посочва кой компонент за измерване на нивото на маслото се продава
        (напр. само пръчка/щека, само дръжка, пълен комплект, тръба за щека и др.).
    oil_dipstick_measurement_markings:
      name: Маркировки за измерване на нивото на маслото върху щеката
      description: Посочва какви маркировки/скала присъстват на щеката за отчитане
        нивото на маслото.
    oil_dipstick_tube_mounting_type:
      name: Посочва какви маркировки/скала присъстват на щеката за отчитане нивото
        на маслото.
      description: Указва как тръбата на щеката за масло е закрепена или монтирана
        към двигателя или блока на двигателя.
    oil_drain_plug_head_drive_type:
      name: Тип задвижване на главата на пробката за източване на масло
      description: Посочва интерфейса за захващане с инструмент на главата на пробката
        за източване на масло, използван за монтаж и демонтаж.
    oil_drain_plug_magnet_type:
      name: Тип магнит на пробката за източване на масло
      description: Указва дали пробката за източване на масло е магнитна и, ако е,
        какъв е нейният тип.
    oil_fill_cap_type:
      name: Тип капачка за наливане на масло
      description: Стил/тип на интерфейса на капачката за наливане на масло, използван
        от капака на клапаните (ако е приложимо).
    oil_filler_cap_attachment_type:
      name: Тип закрепване на капачката за наливане на масло
      description: Посочва как капачката за наливане на масло се задържа към двигателя/гърловината
        за масло (напр. с резба, байонет/четвърт оборот, чрез притискане).
    oil_filler_cap_installation_position:
      name: Позиция за монтаж на капачката за наливане на масло
      description: Указва къде се използва капачката, когато има повече от една точка
        за наливане на масло (напр. капак на клапаните, отдалечена тръба за пълнене).
    oil_filler_cap_locking_type:
      name: Тип заключване на капачката за наливане на масло
      description: Посочва дали капачката за наливане на масло е без заключване или
        използва заключващ/защитен метод за сваляне (напр. с ключ или изискващ инструмент),
        за да помогне за предотвратяване на неоторизиран достъп/кражба или случайно
        отваряне.
    oil_filler_cap_tether_type:
      name: Тип закрепване на капачката за наливане на масло
      description: Посочва дали капачката за наливане на масло е закрепена/задържана
        срещу загуба и какъв тип закрепване се използва.
    oil_filler_cap_venting_type:
      name: Тип вентилация на капачката за наливане на масло
      description: Посочва дали капачката е вентилирана и механизма за вентилация
        (ако е приложимо).
    oil_filter_style:
      name: Стил на масления филтър
      description: Посочва форм-фактора и стила на монтаж/инсталация на масления филтър
        за съвместимост с монтажното място на филтъра на двигателя.
    oil_pan_baffle_windage_features:
      name: Характеристики на преградите/ветроотвеждането на масления картер
      description: Показва вътрешните функции за контрол на маслото, включени в картера.
    oil_pan_finish_coating:
      name: Покритие/финиш на масления картер
      description: Описва повърхностното покритие или обработка на масления картер
        (боядисан, прахово боядисан, покрит с метално покритие, необработен и др.).
    oil_pressure_sensor_function_type:
      name: Тип функция на сензора за налягане на маслото
      description: Указва дали частта е с променлив изходен сигнал за налягане на
        маслото за манометър/електронен блок за управление или е превключвател за
        налягане на маслото тип включване/изключване, който активира предупредителна
        лампа.
    oil_pressure_sensor_signal_output_type:
      name: Тип изходен сигнал на сензора за налягане на маслото
      description: Указва електрическия изходен сигнал, който се генерира от датчика/предавателя
        за налягане на маслото.
    oil_processing_method:
      name: Метод за обработка на масло
      description: Указва начина на производство или рафиниране на маслото (напр.
        студено пресовано, нерафинирано, рафинирано), което влияе върху вкуса, хранителните
        свойства и подходящите кулинарни приложения.
    oil_pump_drive_method:
      name: Метод за задвижване на маслена помпа
      description: Указва как се задвижва маслената помпа в двигателя.
    oil_pump_mounting_style:
      name: Стил на монтаж на маслената помпа
      description: Указва къде и как е монтирана маслената помпа в двигателя (напр.
        вътрешен или външен/отдалечен монтаж, монтаж на капак, монтаж към масления
        картер).
    oil_system_connection_thread_standard:
      name: Стандарт на резбата за свързване към маслената система
      description: Посочва стандарта на резбата/връзката, използван от интерфейса
        на частта към маслената система за монтаж/съвместимост (напр. M12×1.5, 1/8-27
        NPT, BSPP).
    oil_viscosity_grade:
      name: Клас на вискозитет на маслото
      description: Описва относителната гъстота на предачното масло за оборудване
        за ръкоделие (не автомобилни SAE класове).
    okra_variety:
      name: Сорт бамя
      description: Определя конкретния сорт или пазарен вид бамя, като Clemson Spineless,
        Red Burgundy или Baby Okra.
    olfactory_arts_material_form:
      name: Форма на материалите за олфактивно изкуство
      description: Посочва физическата форма на материала при продажба.
    olfactory_arts_tool_kit_content:
      name: Съдържание на комплекта инструменти за обонятелни изкуства
      description: Изброява кои компоненти са включени, когато продуктът се продава
        като комплект или набор за изработка на свещи, тамян или парфюми.
    olive_variety:
      name: Сорт маслини
      description: Указва сорта маслини, който влияе върху вкуса, текстурата, цвета
        и регионалната автентичност.
    onion_variety:
      name: Сорт лук
      description: Указва конкретния вид лук, за да могат купувачите бързо да открият
        предпочитания цвят, вкус и предназначение, а търговците да описват продуктите
        по-точно.
    opacity_level:
      name: Ниво на непрозрачност
      description: Показва колко прозрачен или непрозрачен е платът.
    operating_modes:
      name: Режими на работа
      description: Основни вградени ефекти/режими на движение, поддържани от лазерната
        светлина.
    operating_voltage:
      name: Работно напрежение
      description: Указва номиналното системно напрежение, за което е проектиран инжекторът.
    optical_toy_features:
      name: Характеристики на оптичната играчка
      description: Подчертава основния визуален/оптичен ефект, произведен от играчката.
    orchestral_string_core_material:
      name: Материал на сърцевината на оркестрова струна
      description: Посочва материала на конструкцията на сърцевината на струната,
        който силно влияе върху усещането, реакцията и тона.
    orchestral_string_end_type:
      name: Тип на накрайника на струната за оркестров струнен инструмент
      description: Посочва стила на закрепване в края на струната към струнника.
    orchestral_string_included_strings:
      name: Включени струни за оркестров струнен инструмент
      description: Изброява кои конкретни струни са включени в комплекта (варира според
        инструмента).
    orchestral_string_instrument_fitting_part_type:
      name: Тип монтаж/част за оркестров струнен инструмент
      description: Указва какъв тип елемент или част е продуктът (напр. мост, опашка,
        подбрадник).
    orchestral_string_instrument_mute_type:
      name: Тип заглушител за оркестров струнен инструмент
      description: Посочва функционалния тип заглушител за оркестров струнен инструмент
        (напр. за упражнения/хотел срещу изпълнение/концерт) и/или обичайния стил
        на дизайн.
    orchestral_string_instrument_part_position:
      name: Позиция на частта в струнен оркестров инструмент
      description: Указва къде се намира частта на инструмента (полезно при варианти
        за горна/долна или лява/дясна страна).
    orchestral_string_winding_material:
      name: Материал на намотката на оркестрови струни
      description: Посочва материала на външната намотка/обвивка, използван върху
        струната.
    organza_finish_sheen:
      name: Покритие и блясък на органзата
      description: Описва повърхностния вид на органзата (матов спрямо лъскав/иридесцентен
        ефект).
    organza_ribbon_transparency_level:
      name: Ниво на прозрачност на панделка от органза
      description: Описва степента на прозрачност на панделката от органза.
    organza_transparency_level:
      name: Ниво на прозрачност на органза
      description: Описва степента на прозрачност на плата от органза при еднократно
        наслояване.
    origami_paper_shape:
      name: Форма на оригами хартията
      description: Посочва формата на листа, използвана за сгъване.
    origami_paper_sidedness:
      name: Едностранност/двустранност на оригами хартията
      description: Указва дали оригами хартията има еднакъв цвят/шарка от двете страни
        или различни страни.
    ostrich_feather_part:
      name: Част от щраусово перо
      description: Определя стила/частта от щраусово перо (напр. plume срещу drab),
        което влияе върху мекотата, плътността и типичните приложения в ръкоделието.
    outboard_motor_shaft_type:
      name: Тип вал на извънбордов двигател
      description: Стандартен клас дължина на вала, използван при извънбордови двигатели
        (обозначение, използвано в морската индустрия).
    outboard_motor_steering_type:
      name: Тип управление на извънбордов мотор
      description: Посочва интерфейса/механизма за управление, използван от извънбордовия
        мотор (напр. румпел или дистанционна система за управление).
    outdoor_table_functionality:
      name: Функционалност на външната маса
      description: Определя специализирани вградени функции, които надхвърлят обикновената
        повърхност на масата (напр. отделение за охлаждане, рафт за съхранение, капак
        за газова бутилка, основа за чадър, свързващ елемент за столове, сгъваем дизайн,
        безопасна за басейн, регулируема височина, вградени колела, LED осветление).
    outerwear_length_type:
      name: Тип дължина на връхно облекло
      description: Класифицира общата дължина на връхната дреха в стандартни описателни
        диапазони.
    outerwear_pieces_included:
      name: Включени връхни дрехи
      description: Изброява отделните части на облеклото, включени когато продуктът
        се продава като комплект.
    outfit_attachment_mechanism:
      name: Механизъм за закрепване на облеклото
      description: Посочва как частите на облеклото или аксесоарите се прикрепят към
        куклата (напр. езичета, лепило, магнити).
    outfit_items_included:
      name: Включени елементи на облеклото
      description: Изброява конкретните облекла, включени в комплекта (напр. боди,
        шорти, лента за глава).
    outlet_thread_type:
      name: Тип на резбата на изходния отвор
      description: Стандарт на резбата, използван за изходните отвори на главните
        спирачни цилиндри (напр. показател, балонно разширение или обърнато разширение).
    output_jack_type_instrument:
      name: Тип изходен жак (инструмент)
      description: Указва типа на аудио изходния жак на електрическата мандолина.
    output_signal_type:
      name: Тип изходен сигнал
      description: Тип електрически изходен сигнал, генериран от сензора (напр. аналогово
        изменение на съпротивлението чрез терморезистор).
    outsole_marking_type:
      name: Вид маркировка на външната подметка
      description: Указва дали подметката на обувката оставя следи върху настилки,
        което е важно за закрити спортове с ракета.
    outsole_material:
      name: Материал на външната подметка
      description: Посочва материала на външната подметка на обувката, който контактува
        със земята и влияе върху сцеплението, гъвкавостта и издръжливостта.
    outsole_stud_type:
      name: Тип на шиповете на външната подметка
      description: Описва конфигурацията на външната подметка/шиповете (напр. формовани
        шипове, гумени грайфери, малки издатини за изкуствена трева), която осигурява
        сцепление върху избраната игрална повърхност.
    oven_bake_clay_formulation:
      name: Формула на глина за изпичане във фурна
      description: Определя семейството на формулата на глината за изпичане във фурна
        (напр. полимерна глина срещу смолиста глина), което влияе върху обработката,
        поведението при втвърдяване и крайните свойства.
    oven_housing_configuration:
      name: Конфигурация на корпуса на фурната
      description: Определя предвиденото разположение на уредите, за които е предназначен
        шкафът (напр. единична фурна, двойна фурна или комбинация фурна и микровълнова).
    overhead_mount_installation_method:
      name: Метод за монтаж на таванна стойка
      description: Как таванната стойка се закрепва към превозното средство (стил
        на хардуера/закрепването).
    oversize_or_undersize_grade:
      name: Клас на увеличен или намален размер
      description: Посочва класа на размера на комплекта (бутала/сегменти с увеличен
        размер и/или лагери с намален размер) спрямо стандартния OEM размер.
    p_tex_application_method:
      name: Метод за нанасяне на P-Tex
      description: Описва как материалът P-Tex се нанася върху основата на ските или
        сноуборда.
    p_tex_form:
      name: Форма на P-Tex
      description: Определя физическата форма, в която се доставя материалът за ремонт.
    packability:
      name: Компактност при съхранение
      description: Показва дали и как жилетката може да бъде сгъната или прибрана,
        когато не се използва.
    packaging_format:
      name: Формат на опаковката
      description: Как струните са опаковани/продавани (индивидуални пликове, насипно
        и др.).
    packaging_material:
      name: Материал на опаковката
      description: Посочва основния материал на бутилката или контейнера, който съдържа
        водата.
    packaging_type:
      name: Тип опаковка
      description: Описва начина, по който фигурката с клатеща се глава е опакована
        за продажба, изложение или колекционерско съхранение.
    packing_medium:
      name: Течност за съхранение
      description: Показва течността или средата (като вода, различни сиропи, сок
        или саламура), използвана за съхранение на плодовете вътре в контейнера.
    pad_components_included:
      name: Включени компоненти на подложката
      description: Указва кои части са включени, когато продуктът се продава като
        комплект (напр. наколенки и налакътници, само протектори за китки).
    pad_controller_additional_control:
      name: Допълнително управление на контролер на подложка
      description: Типове допълнителни физически управления извън подложките копчета,
        плъзгачи, бутони), налични на устройството.
    pad_controller_performance_features:
      name: Характеристики на производителността на контролерните подложки
      description: Основни характеристики на контролерните подложки, свързани с производителността
        и изразителния контрол при свирене.
    pad_coverage_area:
      name: Зона на покритие на подложката
      description: Посочва зоните на тялото, които интегрираните подложки на оформящото
        бельо защитават.
    pad_material_or_technology:
      name: Материал или технология на подложката
      description: Указва патентованата технология за абсорбиране на удар или брандираният
        материал, използван в протектора.
    pad_mounting_or_holding_style:
      name: Стил на закрепване или фиксиране на подложките
      description: Показва как подложката се държи, носи или монтира по време на употреба.
    pad_saver_style:
      name: Стил на протектора за съхранение и защита на подложката
      description: Показва физическия стил/дизайн на сушителя за подложки, използван
        за изсушаване на подложките и канала.
    pad_shape:
      name: Форма на подложката
      description: Определя геометричната форма или извивката на ударната повърхност
        или цялото тяло на подложката (напр. кръгла, извита, правоъгълна, плоска),
        помагайки на потребителите да изберат подложки според тренировъчните цели
        и типовете удари.
    pad_shell_type:
      name: Тип на корпуса на подложката
      description: Класифицира конструктивния стил на външната повърхност на подложката
        (напр. твърд корпус, мек корпус, вътрешна вложка).
    pad_style:
      name: Стил на подложката
      description: Посочва типа или дизайна на подложката, доставена със шейната.
    padding_layers:
      name: Слоеве на подложката
      description: Показва броя на слоевете пяна, използвани за абсорбиране на удари.
    padding_level:
      name: Ниво на подложката
      description: Показва количеството подплата, интегрирана в контактните зони на
        каишката/опората (врат/рамо/гръб).
    padding_material:
      name: Материал на подплатата
      description: Посочва вътрешния пълнеж или подплатяващ материал, който абсорбира
        ударите в чанти, щитове, ръкавици и манекени.
    paddle_ball_attachment_type:
      name: Тип закрепване на топката за падъл
      description: Указва как топката е свързана към ракетата (или дали изобщо не
        е свързана).
    paddle_leash_style:
      name: Стил на каишката за падъл
      description: Определя стила или дизайна на въжето/каишката за падъл.
    paddle_shape:
      name: Форма на греблото
      description: Определя общия силует на главата/тялото на падъла (напр. стандартен,
        удължен, широк корпус), което влияе върху обсега, размера на sweet spot зоната
        и маневреността.
    paddleboard_intended_use:
      name: Предназначение на падълборда
      description: Класифицира основната цел на дизайна или активността, за която
        е създаден бордът (напр. туринг, йога, състезания).
    paint_application_method:
      name: Метод за нанасяне на боя
      description: Основен начин, по който продуктът е предназначен да се поставя
        върху шублера.
    paint_by_number_surface_type:
      name: Тип повърхност за рисуване по номера
      description: Повърхността, върху която е отпечатан номерираният дизайн (напр.
        платно, хартия, дървен панел).
    paint_medium_application_method:
      name: Метод за нанасяне на художествен медиум
      description: Указва препоръчителния начин на нанасяне на медиума
    paint_medium_intended_effect:
      name: Предназначен ефект на художествения медиум
      description: Описва основния резултат, който медиумът е предназначен да създаде
        (текстура, блясък, глазиране, течливост и др.).
    paint_safe_bristles:
      name: Безопасна за боя четина
      description: Указва дали косъмчетата на четката са предназначени за безопасна
        употреба върху автомобилна боя/лак (без надраскване).
    paintable_surface:
      name: Боядисваща се повърхност
      description: Показва дали формата от папие-маше е готова за боядисване в текущия
        си вид (напр. грундирана/запечатана) или изисква подготовка.
    paintball_caliber:
      name: Калибър за пейнтбол
      description: Посочва диаметъра/калибъра на пейнтболните топчета или съвместимото
        оборудване.
    paintball_feed_system:
      name: Система за подаване на пейнтбол
      description: Определя как пейнтболните топчета се подават в маркера.
    paintball_fill_color:
      name: Цвят на пълнежа за пейнтбол
      description: Указва цвета на вътрешната маркировка, който може да се различава
        от външната обвивка и определя цвета, оставян при удар.
    paintball_fill_type:
      name: Тип пълнеж за пейнтбол
      description: Описва специална формула или свойство на пълнежа (напр. миещ се,
        светещ в тъмното, прахообразен).
    paintball_grade:
      name: Клас на пейнтбол
      description: Описва класа на производителност или нивото на предназначена употреба
        (напр. начален клас, за игри на открито, състезателен, зимен).
    paintball_mask_coverage_level:
      name: Ниво на покритие на пейнтболна маска
      description: Указва кои части на лицето или главата защитава маската или очилата
        за пейнтбол (само очила, половин лице, цяло лице или цяла глава).
    paintball_tank_valve_type:
      name: Тип клапан на резервоар за пейнтбол
      description: Описва интерфейса на клапана или регулатора, наличен на резервоара.
    painting_surface_priming_type:
      name: Вид грундиране на повърхността за боядисване
      description: Посочва грунда/покритието на повърхността за рисуване (не само
        грундирана/негрундирана), което влияе върху сцеплението на боята и съвместимостта
        с техниките на рисуване.
    palette_knife_blade_edge_profile:
      name: Профил на ръба на острието на палитрен нож
      description: Описва профила на работния ръб на острието на палитрен нож (не
        остротата), което влияе върху нанасянето на следи и смесването.
    palette_knife_flexibility:
      name: Гъвкавост на палитрен нож
      description: Описва твърдостта/гъвкавостта на острието на палетния нож.
    palette_surface_finish:
      name: Покритие на повърхността на палитрата
      description: Описва покритието/финиша на смесителната повърхност, което влияе
        върху устойчивостта на петна и леснотата на почистване.
    palm_padding_level:
      name: Ниво на подплънката на дланта
      description: Описва степента на омекотяване в областта на дланта на ръкавицата
        или подложката за захват.
    palm_padding_type:
      name: Тип подплънка на дланта
      description: Показва материала или конструкцията, използвани за омекотяване
        на дланта (напр. гел, пяна, двоен слой).
    palm_wax_blend_readiness:
      name: Готовност на сместа от палмов восък
      description: Указва дали продуктът е чист палмов восък или предварително смесена
        формула, предназначена за специфични експлоатационни характеристики.
    palm_wax_form:
      name: Форма на палмов восък
      description: Физическа форма на палмовия восък при продажба, което влияе върху
        леснотата на измерване, скоростта на топене и обработката.
    pan_flute_tuning_standard:
      name: Стандарт за настройка на панфлейта
      description: Референтна честота, използвана за настройка (напр. A4= 440 Hz),
        важна за съвместно свирене с други инструменти.
    pannier_configuration:
      name: Конфигурация на дисагите
      description: Показва дали продуктът се продава като единична чанта, свързана
        двойна чанта или комплект от две/три дисаги.
    pannier_mounting_system:
      name: Система за монтаж на дисаги
      description: Определя механизма, използван за закрепване на дисагата към багажника
        или рамката на велосипеда, осигурявайки съвместимост с различни конфигурации.
    pant_cuff_style:
      name: Стил на маншета на панталона
      description: Показва завършека или регулирането при глезена на панталона (напр.
        еластични маншети, ципове при глезена, отворен подгъв).
    pant_leg_conversion_type:
      name: Тип преобразуване на крачолите на панталона
      description: Указва дали и как крачолите на панталона могат да се преобразуват
        или регулират за различни дължини.
    pantyhose_crotch_style:
      name: Стил на чатала на чорапогащник
      description: Определя дизайна на областта на чатала, разграничавaйки стандартен
        затворен чатал, отворен чатал или версии с подсилено парче.
    papaya_variety:
      name: Сорт папая
      description: Указва сорта или пазарния сорт папая (напр. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Формат на хартиена и магнитна кукла
      description: Указва дали продуктът е традиционен комплект хартиени кукли, магнитен
        комплект кукли или хибриден формат.
    paper_color_family:
      name: Цветова група на хартията
      description: Посочва дали комплектът е едноцветен, с асортирани цветове или
        специални смеси (полезно, когато цветът е различен за всеки артикул, но комплектите
        са смесени).
    paper_magnetic_doll_set_contents:
      name: Съдържание на комплект хартиени и магнитни кукли
      description: Указва кои основни компоненти са включени в комплекта.
    paper_opacity:
      name: Непрозрачност на хартията
      description: Показва колко прозрачна е хартията — от много прозрачна до непрозрачна
        (полезно за прехвърляне/копиране).
    paraglider_certification_rating:
      name: Клас на сертификация на парапланер
      description: Указва официалната класификация за летателна безопасност на парапланера
        (напр. EN или LTF класове).
    parasite_types_controlled:
      name: Типове паразити, срещу които действа продуктът
      description: Изброява вътрешните паразити, срещу които продуктът е ефективен,
        за да могат купувачите да адаптират програмите за обезпаразитяване към конкретни
        заразявания.
    parking_camera_mounting_location:
      name: Място за монтаж на камера за паркиране
      description: Къде върху превозното средство е предназначена да бъде монтирана
        камерата (напр. зона на регистрационния номер, външен монтаж отзад, вграден
        монтаж).
    parking_camera_night_vision_technology:
      name: Технология за нощно виждане на камера за паркиране
      description: Методът за подпомагане при слаба осветеност, използван от камерата.
    parking_camera_orientation:
      name: Ориентация на камера за паркиране
      description: Показва дали камерата е предназначена за задно (при движение назад),
        предно виждане или превключваемо/огледално използване.
    parking_sensor_finish:
      name: Покритие на паркинг сензора
      description: Указва повърхностното покритие на лицевата част или капачката на
        паркинг сензора (напр. грундиран за боядисване, матов, гланцов), за да се
        съчетае с външния вид на бронята.
    parking_sensor_type:
      name: Тип сензор за паркиране
      description: Указва технологията за детекция, използвана от паркинг сензора
        (напр. ултразвукова, електромагнитна, радарна, оптична).
    parsley_root_variety:
      name: Сорт корен от магданоз
      description: Посочва сорта или разновидността на корена от магданоз, когато
        е предоставен от доставчика.
    parsnip_variety:
      name: Сорт пащърнак
      description: Определя конкретния сорт или култивар на пащърнака, като Hollow
        Crown или White Gem, позволявайки на купувачите да избират според вкуса, сладостта
        или разликите в размера.
    part_condition:
      name: Състояние на частта
      description: Показва дали частта е нова, употребявана, рециклирана и др.
    part_placement:
      name: Място на монтаж на частта
      description: Указва къде върху машината (напр. степер или стълбищен тренажор)
        е монтирана частта, като ляво, дясно, предна или задна част.
    partial_capo_covered_strings:
      name: Частично покрити струни от каподастъра
      description: Посочва диапазона от струни, които частичното капо покрива, използвайки
        стандартното номериране за 6-струнна китара (1 = високо ми, 6 = ниско ми).
    parting_style:
      name: Тип разделяне
      description: Показва как перуката е или може да бъде разделена (напр. централен
        път, страничен път, свободен път), което влияе върху гъвкавостта при оформяне.
    party_favor_type:
      name: Вид подарък за парти
      description: Посочва какъв вид артикул за парти подарък е (напр. стикери, мини
        играчки, балончета), за да позволи разглеждане/филтриране в категорията парти
        подаръци.
    party_game_format:
      name: Формат на парти играта
      description: Основен физически формат на парти играта.
    party_horn_mouthpiece_type:
      name: Тип мундщук на парти свирка
      description: Посочва конструкцията на мундщука, която влияе върху хигиената
        и комфорта.
    party_horn_style:
      name: Стил на парти свирка
      description: Описва конструкцията/начина на действие на парти свирката (как
        се разгъва или издава звук).
    passenger_car_type:
      name: Тип лек автомобил
      description: Определя конкретния тип пътнически железопътен вагон за модела
        (напр. салонен вагон, спален вагон), използван за търсене и комплектоване
        на композиции.
    passion_fruit_variety:
      name: Сорт маракуя
      description: Определя/посочва ботаническия или търговския сорт маракуя (напр.
        лилава, жълта, гранадила).
    pasta_sauce_texture:
      name: Текстура на сос за паста
      description: Описва консистенцията на соса (напр. гладък, с парченца, кремообразен),
        за да съответства на предпочитанията за усещане в устата на потребителите.
    pasta_sauce_variety:
      name: Вид сос за паста
      description: Класифицира сосовете за паста според рецептата или стила, за да
        могат купувачите бързо да откриват класически сосове като маринара или специални
        сосове като водка или песто.
    pastry_crust_state:
      name: Състояние на тестената кора
      description: Описва степента на подготовка или изпичане на кората към момента
        на покупка.
    pastry_crust_style:
      name: Стил на тестената кора
      description: Определя конкретния стил на тестото или типа тестена кора.
    pastry_filling_type:
      name: Тип пълнеж за сладкиш
      description: Определя основната пълнеж на сладкиша или кифлата.
    patch_adhesion_method:
      name: Метод на закрепване на нашивката
      description: Посочва как лепенката се закрепва към вътрешната гума или гумата
        (напр. самозалепваща, вулканизираща с цимент или активираща се чрез нагряване).
    patch_backing_material:
      name: Материал на основата на нашивката
      description: Материал, използван за гърба/основата на лепенката (напр. филц,
        кепър), който контактува с декорирания артикул.
    patch_backing_type:
      name: Тип основа на нашивката
      description: Основа на нашивката (напр. термозалепваща, самозалепваща, велкро,
        без основа).
    patch_base_material:
      name: Материал на базата на нашивката
      description: Основен текстилен материал на основата/подложката на декоративната
        нашивка (не декоративните елементи).
    patch_border_edge_finish:
      name: Финиш на ръба/канта на лепенката
      description: Методът за завършване на ръба на лепенката (напр. обкантен/оверлочен
        ръб, лазерно изрязан ръб), който влияе върху издръжливостта и външния вид.
    patch_placement_area:
      name: Зона за поставяне на нашивка
      description: Обичайна зона за поставяне на лепенката върху облекло/аксесоари.
    pathogen_removal_capability:
      name: Способност за премахване на патогени
      description: Посочва кои класове микроорганизми (бактерии, протозои, вируси)
        помпата е сертифицирана да премахва.
    pattern_sizing_system:
      name: Система за оразмеряване на кройки
      description: Посочва регионалната система или стандарт за размери, използвани
        в таблицата с размери на кройката (напр. US, UK, EU).
    peak_style:
      name: Стил на козирката
      description: Посочва стила на козирката или сенника на каската, което влияе
        върху покритието, външния вид и правилата за дисциплината.
    pear_variety:
      name: Сорт круша
      description: Определя култивара или сорта круши (напр. Bartlett, Bosc, Conference),
        позволявайки на купувачите да изберат предпочитания вкус, текстура и кулинарна
        употреба.
    pearl_luster_grade:
      name: Степен на блясък на перлата
      description: Качествен клас на блясъка/лъскавината на повърхността на перлата.
    pearl_matching_level:
      name: Степен на съответствие на перлите
      description: Показва колко добре перлите съвпадат в рамките на партида или наниз
        (напр. по цвят, размер и блясък).
    pearl_shape:
      name: Форма на перлата
      description: Обща категория на формата на перлата.
    pearl_surface_condition:
      name: Обща категория на формата на перлата
      description: Показва видимото състояние на повърхността на перлата въз основа
        на наличието и тежестта на дефекти или петна.
    pearl_treatment:
      name: Обработка на перлата
      description: Разкрива всякаква обработка, приложена върху перлата, която влияе
        върху цвета/външния вид.
    pearl_type:
      name: Вид перла
      description: Посочва разновидността/произхода на перлата (напр. сладководна,
        Akoya, таитянска, Южноморска) за свободни перли.
    peat_level:
      name: Ниво на торфеност
      description: Описва интензивността на влиянието на торфения дим във уискито
        — от неторфено до силно торфено.
    pedal_and_cleat_system_compatibility:
      name: Съвместимост на система педал и автомати
      description: Посочва с кои стандарти за педали или зацепки е съвместима подложката
        или клинът, за да се гарантира, че продуктът пасва на педалите и обувките.
    pedal_configuration:
      name: Конфигурация на педалите
      description: Посочва дали столът разполага с единичен педал, разделени/независими
        педали или преобразуващ се дизайн.
    pedal_mounting_style:
      name: Стил на монтаж на педала
      description: Посочва как педалът или покритието/подложката на педала се закрепва
        към превозното средство (метод на монтаж/закрепване).
    pedal_set_components:
      name: Компоненти на комплекта педали
      description: Посочва кои педали са включени в комплекта.
    pedal_spindle_material:
      name: Материал на оста на педала
      description: Материал, използван за оста/шпиндела на педала, който влияе върху
        здравината, теглото и устойчивостта на корозия.
    pedal_spindle_thread_size:
      name: Размер на резбата на оста на педала
      description: Посочва стандарта на резбата на оста на педала, която се завинтва
        в манивелата.
    pedal_type:
      name: Тип педал
      description: Описва типа педали, включени към велосипеда, като посочва съвместимостта
        с обувки и стила на каране.
    pellet_accessory_type:
      name: Тип аксесоар за пелети
      description: Определя конкретния вид аксесоар за пелети, за да могат риболовците
        бързо да намират свредла, ластици или стопери според нуждите си за монтаж.
    pellet_grade:
      name: Вид пелети
      description: Посочва производствената прецизност или клас на качество на сачмите
        за еърсофт.
    pen_ink_color:
      name: Цвят на мастилото за писалка
      description: Показва действителния цвят на мастилото, което писалката изписва,
        който може да се различава от цвета на корпуса.
    penalty_card_accessories_included:
      name: Включени аксесоари към съдийските картони
      description: Изброява допълнителните съдийски аксесоари, включени със съдийските
        картони, като портфейл, бележник за резултати, молив, монета, свирка, калъф.
    penalty_card_colors_included:
      name: Включени цветове на наказателни картони
      description: Изброява цветовете на съдийските картони, включени в комплекта.
    penalty_flag_throw_distance:
      name: Дистанция на хвърляне на наказателен флаг
      description: Класификация на дизайна, показваща предназначения диапазон за хвърляне
        на флага.
    pendant_cutter_safety_features:
      name: Функции за безопасност на резачка за висулки
      description: Определя интегрирани защитни елементи, които намаляват риска от
        случайни порязвания по време на носене/употреба.
    pendant_cutter_wear_method:
      name: Метод на носене на висулка-резец
      description: Посочва как висулката-резец е предназначена да бъде носена или
        използвана.
    pepper_variety:
      name: Сорт пипер
      description: Посочва сорта или вида пипер, използван в продукта, което позволява
        на купувачите да различават различни вкусови профили и нива на лютивост.
    percussion_case_style:
      name: Тип калъф за ударни инструменти
      description: Класифицира общия стил/конструкция на калъфа (мека чанта срещу
        твърд/ригиден калъф спрямо хибриден).
    percussion_instruments_included:
      name: Включени ударни инструменти
      description: Изброява типовете ударни инструменти, включени, когато продуктът
        е комплект играчки с множество инструменти.
    percussion_mallet_handle_grip_style:
      name: Тип захват на дръжката на палка за ударни инструменти
      description: Определя типа обработка на захвата на дръжката (извън текстурата),
        като необработено дърво, лакирано покритие, гумиран захват или обвивка.
    percussion_mallet_head_construction:
      name: Конструкция на главата на палка за ударни инструменти
      description: Описва конструкцията на главата на палката (напр. обвита с прежда,
        обвита с филц, гумена, от необработено дърво), което влияе върху звука и издръжливостта.
    perfumery_base_carrier_type:
      name: Тип базов носител за парфюмерия
      description: Посочва носещата/разтворителната система на парфюмерийната база
        (от какво е основно съставена за разреждане и ефективност).
    perfumery_base_intended_application:
      name: Предназначение на парфюмната база за приложение
      description: Показва крайния формат на употреба, за който е предназначена базата
        (напр. спрей за фин аромат срещу рол-он).
    perfumery_ingredient_carrier_solvent:
      name: Носител/разтворител на парфюмерийна съставка
      description: Определя носителя/разтворителя, в който е доставена съставката,
        ако е разредена (напр. етанол, DPG, масло от жожоба).
    perfumery_ingredient_form:
      name: Форма на парфюмерийната съставка
      description: Посочва физическата форма/състояние на парфюмерийната съставка
        при доставка.
    perfumery_ingredient_type:
      name: Тип парфюмерийна съставка
      description: Класифицира парфюмерийната съставка според това каква е в парфюмерийната
        практика (напр. етерично масло, ароматна химикалка).
    perfumery_ingredient_usage_note:
      name: Бележка за употреба на парфюмерийни съставки
      description: Посочва типичната роля в структурата на аромата (връхна, средна/сърдечна,
        базова нотка), като се отчита, че материалите могат да присъстват в различни
        нотки.
    perfumery_ingredients:
      name: Парфюмерийни съставки
      description: Изброява видовете консумативни ароматни материали, включени в комплекта
        (напр. етерични масла, ароматни масла, алкохолна основа).
    perfumery_note_position:
      name: Позиция на парфюмната нотка
      description: Показва типичната роля на съставката в структурата на аромата (връхна/сърдечна/базова
        нотка).
    persimmon_variety:
      name: Сорт райска ябълка
      description: Определя култивара или сорта на райската ябълка, тъй като различни
        сортове като Fuyu или Hachiya се различават по текстура, вкус, стипчивост
        и кулинарна употреба.
    personalization_type:
      name: Тип персонализация
      description: Посочва дали и как продуктът може да бъде персонализиран за събитие
        (напр. монограм, име/дата, поставяне на снимка).
    phonics_focus:
      name: Фокус върху фонетиката
      description: Указва към кои фонетични и практически умения за четене на думи
        е насочена играчката за четене.
    physalis_variety:
      name: Сорт физалис
      description: Определя конкретния ботанически вид, култивар или разпространен
        сорт физалис, който се продава.
    pi_ata_filler_type_included:
      name: Включен тип пълнеж за пинята
      description: Ако е включен пълнеж, посочва какъв тип съдържание е предоставено.
    pi_ata_hanging_method:
      name: Метод за окачване на пинята
      description: Как пинятата е проектирана да бъде окачена или поддържана (примка,
        кука, включено въже и др.).
    pi_ata_opening_type:
      name: Тип отваряне на пинята
      description: Начин на отваряне и затваряне на отвора за пълнене (напр. капак,
        велкро, цип, предварително запечатан и др.).
    piccolo_key_system:
      name: Система на клапите на пиколо
      description: Посочва системата/конструкцията на механиката на пиколото (обикновено
        система Бьом при съвременните модели).
    piccolo_keywork_features:
      name: Характеристики на механиката на пиколото
      description: Посочва забележителните механизми и опции на клапите на пиколото.
    pick_grip_aid:
      name: Помощен захват за перце
      description: Показва основния вграден елемент за по-добър захват на перцето
        извън общото усещане/текстура на повърхността (напр. отвори за захват, релефно
        лого, гумена вложка).
    pickleball_construction_type:
      name: Тип конструкция за пикълбол
      description: Конструктивен метод на изработка на топчето (напр. безшевно еднокомпонентно
        или заварено от две части), който влияе върху издръжливостта и стабилността
        на полета.
    pickling_method:
      name: Метод на мариноване
      description: Посочва средата или техниката за мариноване, като оцетна саламура
        или лакто-ферментация.
    pickup_and_preamp_configuration:
      name: Конфигурация на адаптер и предусилвател
      description: Посочва дали виолата има вграден пиезо датчик и/или активен предусилвател
        за усилено изпълнение или запис.
    pickup_configuration:
      name: Конфигурация на адаптерите
      description: Описва общото разположение на звукоснемателите при електрическа
        китара чрез стандартни съкращения (напр. SSS, HSS, HH).
    pickup_cover_material:
      name: Материал на капака на адаптера
      description: Посочва основния материал на капака на адаптера (ако има такъв),
        включително често срещани покрития, когато производителят ги посочва по този
        начин.
    pickup_cover_type:
      name: Тип капак на адаптера
      description: Посочва дали адаптерът на електрическата китара има капак и какъв
        е материалът/стилът на капака (напр. метал срещу пластмаса).
    pickup_string_spacing:
      name: Разстояние между струните на адаптера
      description: Стандартът за разстояние между полюсите/струните, за който е направен
        адаптерът (напр. Fender/F-spaced срещу Gibson/standard), влияещ върху подравняването
        при китари с тремоло.
    pie_crust_type:
      name: Вид тестена основа за пай
      description: Посочва стила или типа на кората, използвана за пай или тарт, като
        ронливо тесто, graham cracker или безглутенова кора.
    piece_configuration:
      name: Конфигурация на частите
      description: Посочва от колко отделни части се състои щеката, шафтът или мостчето,
        което влияе на преносимостта и стила на игра.
    pillow_form_size:
      name: Размер на формата на възглавницата
      description: Стандартизирано обозначение на готовия размер на възглавнични пълнежи/вътрешни
        възглавници (напр. 45 × 45 см).
    pilot_helmet_communications_integration:
      name: Интеграция на комуникации в пилотска каска
      description: Показва дали каската включва или е предварително конфигурирана
        за авиационни комуникационни компоненти.
    pilot_helmet_visor_configuration:
      name: Конфигурация на визьора на пилотската каска
      description: Посочва конфигурацията на визьора/лицевия щит, включен към пилотската
        каска.
    pin_attachment_type:
      name: Тип закрепване на пина
      description: Посочва механизма за закрепване на значката към дреха или повърхност
        (напр. butterfly clutch, магнитен гръб).
    pin_backing_type:
      name: Тип основа на пина
      description: Посочва механизма за закопчаване/закрепване, използван за фиксиране
        на значката към дрехи или аксесоари.
    pin_cushion_attachment_style:
      name: Начин на закрепване на възглавничката за карфици.
      description: Как възглавничката за карфици се носи, закрепва или позиционира
        по време на употреба.
    pin_cushion_features:
      name: Характеристики на възглавничката за карфици.
      description: Функционални характеристики извън основното задържане на карфици.
    pin_face_customization_method:
      name: Метод за персонализация на лицевата част на значката
      description: Посочва начина на изработка на предната част на дизайна (напр.
        твърд емайл, мек емайл, печат).
    pin_type:
      name: Тип значка
      description: Посочва стила или формата на значката, използвана за колекционерски
        спортни артикули.
    ping_pong_certification:
      name: Сертификация за пинг-понг
      description: Декларира официалния стандарт или нивото на одобрение от управляващ
        орган за продукта.
    ping_pong_competition_certification:
      name: Сертификация за състезания по пинг-понг
      description: Показва официалния сертификационен статус на топчето за пинг-понг
        за санкционирана игра (напр. одобрено от ITTF).
    ping_pong_paddle_handle_style:
      name: Стил на дръжката на хилката за тенис на маса
      description: Определя формата/стила на дръжката на хилката, което влияе върху
        комфорта на захвата и техниката на игра.
    ping_pong_robot_accessory_type:
      name: Тип аксесоар за робот за пинг-понг
      description: Посочва функционалния подтип на аксесоара, за да може купувачите
        по-лесно да филтрират резултатите (напр. мрежи, захранващи адаптери).
    ping_pong_rubber_surface_type:
      name: Тип на повърхността на гумата за тенис на маса
      description: Посочва стила/текстурата на гумената повърхност на хилката, която
        влияе върху характеристиките на въртене и скорост.
    ping_pong_rubber_type:
      name: Тип гума за пинг-понг
      description: Посочва конструкцията на повърхността на гуменото покритие за тенис
        на маса, която влияе върху игровите характеристики.
    ping_pong_table_type:
      name: Тип маса за пинг-понг
      description: Класифицира общия стил или тип на масата за по-лесно сравнение
        (напр. състезателна, преобразуващ плот, мини).
    pipe_instrument_voicing_sound_production_method:
      name: Метод на озвучаване/образуване на звука при тръбен инструмент.
      description: Посочва начина, по който инструментът произвежда звук (чрез въздушния
        механизъм), за да се разграничават панфлейти, тръстикови тръби и органови
        тръби при филтриране.
    piston_application_type:
      name: Тип приложение на буталото
      description: Предназначение/сценарий на употреба на буталото (замяна, състезателна
        употреба или работа при тежки условия).
    piston_crown_dish_style:
      name: Стил на челото/вдлъбнатината на буталото
      description: Форма на челото на буталото, която влияе върху обема на горивната
        камера и компресията (например плоска, куполообразна, изпъкнала).
    piston_pin_retention_type:
      name: Тип задържане на буталния болт
      description: Посочва как буталният болт се фиксира в буталото/сглобката на биелата.
    pit_configuration:
      name: Конфигурация на ямата
      description: Определя структурния формат на зоната за кацане (едно цяло срещу
        многомодулна) и съответно броя на секциите или модулите в комплекта.
    pit_cover_type:
      name: Тип покривало за яма
      description: Посочва вида на защитното покритие или платнище, включено към ямата,
        което влияе върху устойчивостта срещу шпайкове, защитата от атмосферни условия
        и предпочитанията на атлетите.
    pitahaya_flesh_color:
      name: Цвят на вътрешността на питахаята
      description: Посочва цвета на вътрешната част на питахаята (драконов плод) (напр.
        бял, червен, магента) — ключова характеристика, влияеща върху вкуса, външния
        вид и възприеманата хранителна стойност.
    pitch_mat_coverage_length:
      name: Дължина на покритието на тренировъчната постелка за хвърляне
      description: Класифицира постелката за крикет според частта от игралната зона,
        която покрива (напр. цяла или половин игрална зона).
    pitch_range:
      name: Тонален диапазон
      description: Описва възприемания диапазон на височината/яркостта на звука на
        шейкъра.
    pitch_standard:
      name: Стандарт за височина на тона
      description: Посочва стандарта за височина на тона (референтна настройка), за
        който е изработен блокфлейтата (напр. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Обозначение за размер на гумата за хвърляне
      description: Посочва стандартната класификация на размера на отбивната гума
        за хвърляне, за по-лесен избор без нужда от точни измервания.
    pitching_screen_style:
      name: Стил на защитната мрежа за хвърляне
      description: Определя конструктивния дизайн на предпазния екран, за да могат
        купувачите бързо да изберат правилното защитно оформление за своя тренировъчен
        сценарий.
    pitching_target_design:
      name: Дизайн на мишена за хвърляне
      description: Класифицира общия стил или конфигурация на мишената за хвърляне.
    pitching_wheel_count:
      name: Брой колела на уреда за хвърляне.
      description: Посочва броя на задвижващите колела на машина за подаване на топки.
    pivot_adjustability:
      name: Регулируемост на оста на въртене
      description: Показва дали ножиците имат регулируем централен винт за настройка
        на напрежението при рязане.
    pivot_piece_type:
      name: Тип на шарнирния елемент
      description: Разграничава различните форми на шарнирния интерфейс, като традиционни
        чашковидни или тръбни стилове.
    place_card_holder_closure_mechanism:
      name: Механизъм за затваряне на държача за картички
      description: Посочва как държачът захваща или фиксира картичката.
    place_card_orientation:
      name: Ориентация на картичката
      description: Посочва ориентацията на картичката при употреба/излагане.
    place_card_printing_status:
      name: Статус на печат на картичката
      description: Показва дали картичката е празна за ръчно изписване/печат, предварително
        отпечатана (имената не са персонализирани) или персонализирано/по поръчка
        отпечатана.
    placket_type:
      name: Вид на закопчаването/планката
      description: Посочва стила на предното закопчаване на поло тениската, включително
        броя копчета или алтернативни видове закопчаване.
    planetarium_content_theme:
      name: Тема на съдържанието за планетариум
      description: Основното съдържание, показвано от проектора за планетариум.
    planetarium_projection_content_format:
      name: Формат на съдържанието за прожекция в планетариум
      description: Посочва механизма за прожектиране, който използва планетариумът
        (физически дискове/слайдове или дигитален/LED ефект).
    plant_fiber_type:
      name: Тип растително влакно
      description: Конкретен тип влакно от растителен произход, когато източникът
        на щапелното влакно е растение.
    plaster_gauze_finish:
      name: Финиш на гипсовата марля
      description: Характер на получената повърхностна обработка след нанасяне и заглаждане.
    plaster_gauze_grade:
      name: Клас на гипсовата марля
      description: Предназначен клас на употреба на гипсовата марля (напр. за хоби/ученици
        или професионална).
    plaster_gauze_weave_density:
      name: Плътност на тъканта на гипсовата марля
      description: Относителна отвореност/стегнатост на тъканта на марлята, влияеща
        върху здравината и поемането на гипс.
    plastic_canvas_finish:
      name: Финиш на пластмасовото платно
      description: Повърхностна/финишна обработка на ролката пластмасово платно.
    plastic_canvas_sheet_finish:
      name: Финиш на пластмасовата канава
      description: Обработка на повърхността/ръбовете на пластмасовата канава.
    plastic_canvas_transparency:
      name: Прозрачност на пластмасовото платно
      description: Степен на прозрачност или непрозрачност на пластмасовото платно.
    plate_bottom_design:
      name: Дизайн на долната част на плочата
      description: Описва конструкцията на долната страна на плочата, която влияе
        върху сцеплението, стабилността и безопасността върху различни игрални повърхности.
    plate_compatibility_standard:
      name: Стандарт за съвместимост на плочата
      description: Посочва стандарта за тежести, за който е предназначен лостът (напр.
        олимпийски 50 mm, стандартен 25 mm).
    plate_installation_type:
      name: Тип монтаж на плочата
      description: Посочва начина на закрепване или поставяне на плочата на терена
        (напр. вкопана, с колчета, преносима), за да се избира между постоянни и преносими
        варианти.
    plate_size_category:
      name: Категория размер на плочата
      description: Класифицира плочата според нивото на игра или регулаторния стандарт,
        за да могат купувачите бързо да намират оборудване, съответстващо на изискванията
        на лигата.
    play_dough_putty_kit_contents:
      name: Съдържание на комплект с пластилин и моделираща маса
      description: Определя основните включени компоненти извън самото съединение/материал
        (напр. инструменти, форми, екструдер, съхранение).
    play_dough_tool_set_items_included:
      name: Включени инструменти в комплект за пластилин
      description: Посочва видовете инструменти и аксесоари, включени в комплект за
        пластилин (напр. точилки, резци, формички).
    play_environment_suitability:
      name: Пригодност на средата за игра
      description: Посочва предназначената среда за игра на комплекта (напр. закрито,
        открито, във вода).
    play_food_features:
      name: Характеристики на храната за игра
      description: Специални функционални характеристики или степени на реалистичност
        на хранителните играчки.
    play_food_items_included:
      name: Включени хранителни играчки
      description: Посочва видовете храни за игра, включени в кухненския комплект
        за игра.
    play_food_size_scale:
      name: Мащаб на размера на храната за игра
      description: Посочва приблизителния мащаб на размерите на елементите храна за
        игра за съвместимост с детски кухни, кукли и комплекти за игра.
    play_money_set_components_included:
      name: Включени компоненти в комплект игрални пари
      description: Посочва кои типове компоненти са включени в комплекта за игра с
        пари/банкиране.
    play_pattern:
      name: Модел на игра
      description: 'Основното предназначение на играчката (например: за разтоварване/облекчаване
        на стреса, като декорация за бюро/арт-обект, за сглобяване/изграждане или
        като пъзел).'
    play_sprinkler_mounting_type:
      name: Тип монтаж на детския разпръсквач
      description: Как детският разпръсквач е позициониран/закрепен по време на употреба.
    play_vehicle_lights_and_sounds:
      name: Светлинни и звукови ефекти на играчката превозно средство.
      description: Посочва дали играчката превозно средство има електронни ефекти
        като светлини и/или звуци.
    play_vehicle_scale:
      name: Мащаб на играчката-превозно средство
      description: Показва мащабното съотношение на играчката-превозно средство (често
        използвано за отливка и моделни превозни средства).
    player_size_category:
      name: Категория размер на играча
      description: Определя предназначения размер/възрастова група на играча, за която
        е подходящ комплектът за екипировка за кетчър (напр. играчи на тийбол, младежи,
        средно напреднали, възрастни).
    player_size_range:
      name: Диапазон на размерите на играча
      description: Указва целевия диапазон на размерите на потребителя за каишката/опората
        (напр. дете, възрастен, универсален).
    playing_environment:
      name: Среда за игра
      description: Посочва основната игрална повърхност или контекст, за който е предназначена
        хокейната топка.
    playing_method:
      name: Метод на игра
      description: Основен начин за свирене/активиране на инструмента.
    playing_surface_material:
      name: Материал на игралната повърхност
      description: Определя материала на предната свиреща повърхност (тапа) на кахона,
        който силно влияе върху тона и усещането.
    playing_surface_type:
      name: Тип игрална повърхност
      description: Описва конструкцията/усещането на свирещата повърхност на тренировъчния
        пад.
    playset_activities_included:
      name: Включени са дейности в комплекта за игра
      description: Определя основните игрови дейности/компоненти, вградени в люлката/детския
        кът, за да могат купувачите по-лесно да филтрират според това какво могат
        да правят децата на конструкцията.
    playset_installation_type:
      name: Тип инсталация на детска площадка
      description: Посочва начина на монтаж или закрепване на люлката/детския комплект
        за игра.
    playset_items_included:
      name: Включени елементи за детска площадка
      description: Определя типовете предмети за ролева игра, включени в комплекта
        за пикник (храна, съдове, одеяло, кошница и др.).
    pliers_jaw_style:
      name: Стил на челюстите на клещите
      description: Описва основната конфигурация на челюстите или функционалния стил
        на клещите.
    plum_variety:
      name: Сорт слива
      description: Определя конкретния култивар или сорт слива, позволявайки на купувачите
        да избират според вкуса, цвета и предназначението за кулинарна употреба.
    plumcot_variety:
      name: Сорт плумкот
      description: Определя конкретния култивар или търговски сорт плъмкот (напр.
        Flavor King, Dapple Dandy), който може да влияе върху вкуса, цвета и сезонността.
    plunger_mute_handle_type:
      name: Тип дръжка с бутон за заглушаване
      description: Посочва вида на дръжката или захвата за държане и управление на
        заглушител тип „плунжер“ за ва-ва ефекти.
    pocket_closure_type:
      name: Тип закопчаване на джоба
      description: Определя как всеки джоб се затваря/обезопасява, помагайки на потребителите
        да намират панталони със сигурно съхранение по време на активност.
    pocket_knife_opening_mechanism:
      name: Механизъм за отваряне на джобно ножче
      description: Начин на отваряне на острието (ръчно чрез вдлъбнатина за нокът,
        палцов щифт, „флипер“, подпомогнато отваряне, автоматично и др.).
    pocket_style:
      name: Стил на джоба
      description: Посочва основната конструкция на джоба на панталоните.
    pocket_type:
      name: Тип джоб
      description: Посочва стила или наличието на джобове на дрехата.
    pod_retention_system:
      name: Система за задържане на пълнителя
      description: Описва начина, по който контейнерите за пейнтбол се държат и освобождават
        от колана или раницата.
    pogo_stick_footrest_type:
      name: Тип степенка на пого стик
      description: Описва дизайна на платформата/стъпалата, върху които се стъпва
        при използване на пружинната подскачаща пръчка.
    pogo_stick_suspension_type:
      name: Тип на окачването на пружинната пого стик
      description: Посочва механизма за отскок на пого стика, който влияе върху усещането,
        издръжливостта и поддръжката.
    poi_handle_type:
      name: Тип дръжка за пой
      description: Определя вида на дръжката/захвата/приставката, използвана за държане
        на поито.
    poi_light_source:
      name: Източник на светлина за пои
      description: За светещи пои, уточнява технологията на осветление.
    poi_tether_type:
      name: Тип въже за пои
      description: Показва типа връзка, която свързва главата на пои с идентификатора
        на потребителя, копчето или примката за китката (напр. шнур, въже, верига).
    poi_type:
      name: Тип пои
      description: Указва основния тип конструкция/употреба на пои (напр. тренировка,
        LED, огън).
    point_type:
      name: Тип точка
      description: Форма/стил на върха, използван при иглата за бродиране.
    pointe_shoe_shank_length:
      name: Дължина на подметката на палците
      description: Частта от дължината на обувката, която се поддържа от стелката
        (шенка), например пълна или 3/4 дължина.
    pointe_shoe_shank_strength:
      name: Твърдост на подметката на палци
      description: Ниво на твърдост на подметката на палците, което влияе върху опората
        и времето за разработване.
    poker_accessory_storage_included:
      name: Включено място за съхранение на покер аксесоари
      description: Посочва за кои допълнителни покер принадлежности аксесоарът предоставя
        специално място за съхранение.
    poker_chip_tray_rack_configuration:
      name: Конфигурация на поставката/стойката за покер чипове
      description: Описва вътрешния стил на организация на поставката/стойката за
        чипове (редове и капацитет на ред).
    pole_anchoring_method:
      name: Метод за закрепване на пилона
      description: Определя начина, по който стълбът е закрепен към земята или игралната
        повърхност.
    pole_basket_type:
      name: Тип кошница за щека
      description: Класифицира стила или размера на кошничката, монтирана близо до
        върха на ски щеката, като показва предназначените снежни условия.
    pole_connection_system:
      name: Система за свързване на щеките
      description: Определя механизма, който съединява секциите на щеките, като ластично
        свързване, резбово свързване или хъб системи, помагайки на потребителите да
        оценят скоростта на сглобяване и съвместимостта.
    pole_system_type:
      name: Тип система от пилони
      description: Описва конструктивната опорна система или начина на разпъване,
        използван при палатката (напр. алуминиеви рейки, надуваеми въздушни тръби,
        разпъване с туристически щеки).
    police_equipment_fitment:
      name: Комплект за полицейско оборудване
      description: Посочва какво полицейско оборудване превозното средство е конфигурирано
        или предварително окабелено да поддържа.
    police_vehicle_equipment_package:
      name: Пакет оборудване за полицейски автомобил
      description: Посочва специфичното полицейско оборудване/модификации, включени
        в автомобила при продажба.
    police_vehicle_light_siren_equipment:
      name: Оборудване със светлини/сирена за полицейски автомобил
      description: Посочва кои аварийни предупредителни устройства са монтирани на
        полицейската кола.
    police_vehicle_upfit_level:
      name: Ниво на оборудване на полицейския автомобил
      description: Описва какво специфично за полицията оборудване/модификации са
        инсталирани на камиона.
    polish_formulation:
      name: Формула на полиращия препарат
      description: Посочва основата/химията на препарата за полиране на грифа (не
        метода на нанасяне).
    polish_purpose:
      name: Цел за полиране
      description: Основен предназначен ефект на полирането на повърхността на инструмента.
    pollen_level:
      name: Ниво на цветен прашец
      description: Показва количеството/вероятността от оцветяване с прашец при сорта
        лилия.
    polymer_clay_firmness_level:
      name: Ниво на твърдост на полимерната глина
      description: Относителна твърдост/мекота на полимерната глина преди изпичане
        (работоспособност).
    polymer_clay_translucency:
      name: Прозрачност на полимерната глина
      description: Визуална непрозрачност/непрозрачност на полимерната глина след
        втвърдяване.
    pom_pom_handle_style:
      name: Стил на дръжката на помпон
      description: Описва стила или конструкцията на дръжката/захвата, използван за
        държане на помпон.
    pom_pom_trim_backing_tape_material:
      name: Материал на основата/лентата на помпон лентата
      description: Посочва материала на пришитата лента или оплетка, към която са
        закрепени помпоните (основата на декорацията).
    pom_pom_type:
      name: Тип помпон
      description: Показва наличието и конкретния тип помпон на шапката.
    pomegranate_product_form:
      name: Форма на продукта от нар
      description: Описва предлаганата физическа форма (цял плод, обелени зърна, ядки,
        замразени зърна).
    pomegranate_variety:
      name: Сорт нар
      description: Определя конкретния култивар или сорт на нара (напр. Wonderful,
        Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Стил на ластика за конска опашка.
      description: Описва конкретната конструкция или форма на ластика за коса, за
        да могат купувачите да изберат предпочитания стил.
    popcorn_form:
      name: Форма на пуканките
      description: Посочва физическата форма или начина на приготвяне на продукта
        пуканки, като готови за консумация, зърна, пакет за микровълнова, комплект
        с подправки или подаръчна кутия.
    pork_rind_form:
      name: Форма за свинската кожичка
      description: Категоризира физическата форма или стила на снаксовете от свинска
        кожа (напр. кори, пръжки, puff, pellet и др.).
    portability_features:
      name: Характеристики за преносимост
      description: Изброява вградените елементи, които подпомагат преместването, носенето
        или съхранението на шезлонга.
    portability_frame_type:
      name: Тип преносимост/рамка
      description: Дали оркестровите камбани са преносими/с полева рамка или фиксирани/с
        концертна рамка.
    portable_electronic_game_features:
      name: Функции на преносима електронна игра
      description: Основни функции за геймплей/хардуер, поддържани от устройството.
    post_surgery_stage_suitability:
      name: Подходящ етап след операция
      description: Посочва за кой етап на възстановяване (ако има такъв) е предназначено
        оформящото боди, важно за купувачите на медицинско компресиращо бельо.
    postage_stamp_format:
      name: Формат на пощенска марка
      description: Описва как стандартната марка се предлага/опакова (единична, двойка,
        лента, блок, лист, книжка, ролка и др.).
    postmark_type:
      name: Вид пощенско клеймо
      description: Вид маркировка/пощенски печат върху използвани пощенски марки от
        постоянната серия.
    potato_cut_style:
      name: Стил на рязане на картофи
      description: Посочва вида на пощенското клеймо или анулация върху използваните
        марки.
    potato_intended_use:
      name: Предназначение на картофите
      description: Разграничава картофите за директна консумация от тези, предназначени
        за семена или за замразени/преработени продукти.
    potato_variety:
      name: Сорт картофи
      description: Посочва сорта картофи, което позволява на купувачите да намерят
        конкретни видове, като например „Yukon Gold“, „Maris Piper“ или „Purple Majesty“.
    pottery_clay_firing_required:
      name: Изискване за изпичане на грънчарска глина
      description: Посочва дали материалът изисква изпичане в пещ, за да достигне
        крайната си твърдост/финиш.
    pottery_slip_application_method:
      name: Метод за нанасяне на керамичен шликер
      description: Посочва предназначената техника за нанасяне на шликера.
    pottery_slip_compatible_clay_body:
      name: Съвместим тип глина за шликер
      description: Показва типовете глинена маса, за които шликерът е предназначен
        да съответства или да се използва с тях.
    pottery_slip_form:
      name: Форма на керамичния шликер
      description: Показва дали шликерът се продава като готова за употреба течност
        или като суха смес/прах, изискваща смесване.
    pouch_design:
      name: Дизайн на джоба
      description: Описва конструктивните или допълнителните характеристики на предната
        част на джоба.
    pouch_style:
      name: Стил на джоба
      description: Посочва дизайна на предната джобна зона, насочен към комфорт, поддръжка
        и естетически предпочитания.
    powdered_beverage_variety:
      name: Сорт прахообразна напитка
      description: Класифицира продукта според вида напитка, която приготвя (напр.
        лимонада, спортна напитка, протеинов шейк).
    power_rack_style:
      name: Стил на силова стойка
      description: Посочва цялостния дизайн/конфигурация на стойката, помагайки на
        купувачите да различават пълни клетки, полу-стойки и компактни варианти.
    power_steering_fluid_formulation:
      name: Състав на течността за хидравлично сервоуправление
      description: Обща формула на течността (на базата на трансмисионна течност,
        специална хидравлична или универсална), използвана за филтриране на съвместимостта.
    practice_mute_audio_output:
      name: Звуков ефект при използване на заглушител за упражнения
      description: Посочва типа аудио изходна връзка, налична на тренировъчния заглушител
        за мониторинг и/или запис (често при безшумни/електронни тренировъчни заглушители).
    practice_mute_intonation_impact:
      name: Влияние на тренировъчния заглушител върху интонацията
      description: Описва очаквания ефект върху настройката и интонацията при използване
        на заглушител за упражнения.
    practice_mute_venting_valve_type:
      name: Тип вентилация/клапан на тренировъчния заглушител
      description: Посочва дали и как тренировъчният заглушител е вентилиран или включва
        регулируем клапан за промяна на съпротивлението/силата на звука.
    practice_pad_features:
      name: Характеристики на тренировъчната подложка
      description: Подчертава функционалните характеристики на тренировъчната подложка
        отвъд размера/материала.
    practice_pad_mounting_style:
      name: Начин на монтаж на тренировъчната подложка
      description: Посочва как тренировъчната подложка е предназначена да бъде позиционирана
        или закрепена по време на употреба.
    practice_pad_rebound_level:
      name: Ниво на отскок на тренировъчната подложка
      description: Посочва относителния отскок/реакция на тренировъчната подложка
        в сравнение с типичните барабанни кожи.
    practice_pad_surface_configuration:
      name: Конфигурация на повърхността на тренировъчната подложка
      description: Описва дали подложката има една или няколко повърхности за свирене
        и дали те се различават като усещане.
    pregnancy_stage_suitability:
      name: Подходящ етап на бременност
      description: Посочва за кой етап от бременността или следродилния период е предназначена
        дрехата.
    preparation_state:
      name: Степен на подготовка
      description: Посочва нивото на подготовка или готвене, необходимо преди консумация.
    preparation_style:
      name: Стил на приготвяне
      description: Определя формата или начина на обработка на водните кестени при
        продажба (напр. цели, нарязани, печени, замразени).
    preservation_medium:
      name: Среда за консервиране
      description: Посочва основната течност или среда, в която се съхраняват маслините
        или каперсите (напр. саламура, зехтин, оцет).
    presser_foot_attachment_method:
      name: Начин на закрепване на крачето на шевната машина
      description: Посочва как притискащото краче на шевната машина се закрепва към
        държача/рамото на крачето (напр. щракващо или винтово закрепване), което влияе
        върху съвместимостта.
    pressure_gauge_type:
      name: Тип манометър
      description: Посочва вида на манометъра, включен към велосипедната помпа, ако
        има такъв.
    pressure_measurement_unit:
      name: Мерна единица за налягане
      description: Посочва мерната единица, използвана за отчитането или калибрирането
        на сензора за налягане, полезна за сравняване на продукти и осигуряване на
        съвместимост с манометър/ECU.
    pressure_plate_balance_type:
      name: Тип баланс на притискателния диск
      description: Посочва дали притискателният диск е вътрешно балансиран или изисква/предполага
        външен баланс, съответстващ на настройката на двигателя/маховика.
    pressure_plate_components_included:
      name: Включени компоненти на притискателния диск
      description: Какво е включено в комплекта на притискателния диск.
    pressure_sensor_application:
      name: Приложение на сензора за налягане
      description: Посочва за коя автомобилна система/точка на измерване е предназначен
        сензорът за налягане.
    pressure_sensor_port_thread_standard:
      name: Стандарт на порта / резбата на сензора за налягане
      description: Посочва стандарта на механичния порт/резба, използван за монтиране
        на сензора в автомобилната система.
    pressurization_method:
      name: Начин на създаване на налягане
      description: Идентифицира как се генерира или поддържа налягането вътре в устройството.
    pretend_housekeeping_set_items_included:
      name: Включени елементи в комплект за игра „домакинство“
      description: Изброява кои аксесоари за почистване са включени в комплекта (напр.
        моп, метла, лопатка, спрей бутилка).
    pretend_play_electronic_features:
      name: Електронни функции за ролева игра
      description: Електронни/интерактивни функции, включени в продукта за ролева
        игра.
    pretend_play_set_pieces_included:
      name: Включени части в комплекта за ролева игра
      description: Основни аксесоари/компоненти, включени в комплекта за ролева игра
        (напр. касов апарат, играчки храни, инструменти).
    pretend_play_set_theme:
      name: Тема на комплект за ролеви игри
      description: Основен сценарий/тема на ролевата игра, представен от продукта
        (полезно за откриване в различни категории ролева игра).
    pretzel_coating:
      name: Покритие за гевреци
      description: Посочва всякакъв външен овкусител или покритие, приложено върху
        геврека, включително солени (осолени, овкусени) и сладки (шоколад, йогурт,
        карамел) варианти.
    pretzel_shape:
      name: Форма на геврека
      description: Посочва физическата форма на геврека (напр. усукан, пръчица, хапка),
        ключов отличителен белег, използван при търсене или филтриране.
    primary_component_material:
      name: Основен материал на компонента
      description: Основен материал на блока на двигателя.
    primary_dish_application:
      name: Основно предназначение на съда
      description: Идентифицира основното ястие или приготвяне, за което е предназначено
        тестото.
    primary_plant_base:
      name: Основна растителна база
      description: Посочва основната немлечна съставка(и), използвана за създаване
        на алтернативата на сирене.
    primary_plant_protein_source:
      name: Основен източник на растителен протеин
      description: Идентифицира основната растителна съставка, осигуряваща протеин
        в продукта.
    primary_sweetener_source:
      name: Основен източник на подсладител
      description: Идентифицира растението или суровината, от която е получен сиропът.
    print_placement:
      name: Разположение на щампата
      description: Посочва къде е разположена основната графика/лого върху тениската.
    print_technique:
      name: Техника на печат
      description: Посочва метода за декорация/печат, използван за графиката върху
        тениската.
    printable_canvas_intended_use:
      name: Предназначение на платното за печат
      description: Основно приложение, за което е оптимизирано платното за печат.
    printable_fabric_format:
      name: Формат на плат за печат
      description: Посочва как се доставя платът за печат (единични листове срещу
        непрекъсната ролка), което влияе върху подаването към принтера и работния
        процес.
    prism_material:
      name: Материал на призмата
      description: Посочва материала на самия оптичен елемент (призмата), който влияе
        върху яснотата, издръжливостта и устойчивостта на надраскване.
    prisoner_transport_configuration:
      name: Конфигурация за транспортиране на затворници
      description: Посочва дали и как ванът е конфигуриран за транспорт на задържани/затворници.
    prisoner_transport_partition_type:
      name: Тип преграда за транспортиране на затворници
      description: Вид вътрешна преграда/клетка, разделяща предното и задното отделение.
    privacy_or_acoustic_feature:
      name: Функция за поверителност или акустика
      description: Посочва вградени елементи за поверителност или акустика, като разделителни
        панели, акустични екрани или напълно затворени пространства.
    processing_state:
      name: Състояние на обработка
      description: Посочва дали перата са стерилизирани/измити или по друг начин подготвени
        за занаятчийска употреба.
    produce_grade:
      name: Клас качество на продукцията
      description: Класифицира качествения клас, присвоен на кивито въз основа на
        размер, външен вид и състояние.
    produce_growth_stage:
      name: Етап на растеж на продукцията
      description: Посочва етапа на развитие, в който се предлага продуктът (напр.
        микрозелени, млади листа, зрели листа, жива растение, семена).
    produce_washing_state:
      name: Състояние на измиване на продукцията
      description: Посочва дали зеленолистните продукти са били измити и са готови
        за консумация.
    profile_shape:
      name: Профил/форма
      description: Обща извивка/профил на чинела (колко стръмно се издига от ръба
        към камбаната).
    projectile_ammunition_type:
      name: Тип снаряд/боеприпас
      description: Посочва типа снаряди или консумативи, използвани от играчката оръжие,
        ако е приложимо.
    projectile_finish:
      name: Покритие на снаряда
      description: Посочва повърхностното покритие, нанесено върху сачмата, което
        подобрява устойчивостта на корозия или видимостта (напр. с медно покритие,
        цинково покритие, боядисана).
    projectile_type:
      name: Тип снаряд
      description: Посочва вида на снаряда, който продуктът използва или е предназначен
        да използва.
    pronation_support:
      name: Поддръжка на пронацията
      description: Посочва типа походка или модел на пронация, който маратонката е
        проектирана да поддържа.
    propellant_type:
      name: Вид на горивния газ
      description: Посочва пропеланта, за който е предназначена частта или аксесоарът.
    propeller_blade_cup:
      name: Чашка на перката
      description: Посочва степента на извивка на задния ръб на перките.
    propeller_hub_type:
      name: Вид на главината на перката
      description: Посочва системата на главината/втулката на перката (сменяеми комплекти
        или пресован монтаж).
    propeller_rotation:
      name: Въртене на перката
      description: Посочва посоката на въртене на перката.
    protectant_formula_base:
      name: Основа на защитната формула
      description: Посочва основния състав на защитния продукт, който влияе върху
        блясъка, усещането и почистването (напр. на водна основа или на разтворителна
        основа).
    protection_coverage_area:
      name: Зона на защитно покритие
      description: Идентифицира кои части на часовника покрива защитният аксесоар.
    protection_level:
      name: Ниво на защита
      description: Посочва предвиденото ниво на защита на калъфа при транспортиране
        и съхранение на инструмента.
    protective_case_interior_protection_type:
      name: Вид вътрешна защита в предпазния калъф
      description: Описва основния метод за вътрешна защита, който обезопасява и омекотява
        съдържанието.
    protective_case_shell_type:
      name: Вид на външната обвивка на защитния калъф
      description: Определя общия стил на конструкцията на външната част на калъфа
        (твърдост), който влияе върху защитата от смачкване и преносимостта.
    protective_contact_padding_material:
      name: Материал на защитната контактна подплата
      description: Материал, използван в точките на контакт с инструмента (опора/вложка
        на камбаната), за предотвратяване на надрасквания (напр. филц, гума).
    protective_cup_configuration:
      name: Конфигурация на защитната чаша
      description: Посочва дали е включена защитна чашка, дали е подвижна, или дали
        дрехата разполага само с джоб за поставяне на чашка.
    protective_eyewear_standard_compliance:
      name: Съответствие със стандартите за защитни очила
      description: Посочва стандартите или сертификатите за безопасност/устойчивост
        на удар, които очилата покриват или надвишават за спортна употреба.
    protective_gear_certification_standard:
      name: Стандарт за сертификация на защитна екипировка
      description: 'Посочва стандарта за безопасност/сертификация, с който екипировката
        е съвместима (варира според типа продукт: стандарти за каски, костюми, ударозащитна
        броня).'
    protective_gear_items_included:
      name: Включени защитни елементи/предпазни средства
      description: Изброява отделните части, съдържащи се в многокомпонентен комплект
        защитна екипировка.
    protective_gear_padding_type:
      name: Тип подплата на защитната екипировка
      description: Посочва типа подплата, използвана в защитната екипировка за защита
        при удар.
    protective_gear_safety_certifications:
      name: Сертификати за безопасност на предпазната екипировка
      description: Изброява признатите спортни стандарти за безопасност или ефективност,
        на които отговаря продуктът, като например стандартите за каски за хокей на
        трева на NOCSAE или ASTM.
    protective_pad_components_included:
      name: Включени компоненти на защитните подложки
      description: Посочва кои конкретни защитни елементи са включени в многокомпонентния
        комплект, така че купувачите да знаят точно кои части на тялото са защитени.
    protective_shorts_intended_use:
      name: Предназначение на защитните шорти
      description: Основна дисциплина за каране/състезание, за която са предназначени
        защитните шорти.
    protective_shorts_padding_type:
      name: Тип подплънка на защитни шорти
      description: Посочва конструкцията/формата на защитните елементи, използвани
        в шортите.
    protective_shorts_padding_zones:
      name: Зони на подплънката на защитни шорти
      description: Посочва кои части на тялото са защитени с вградена подплата/протектори
        в защитните шорти.
    protective_treatment:
      name: Защитна обработка
      description: Посочва защитното покритие или обработка, нанесена за устойчивост
        на петна, вода или UV лъчи (напр. тефлоново покритие).
    protector_coverage_area:
      name: Зона на покритие на протектора
      description: Посочва кои зони на торса е предназначен да покрива протекторът
        (напр. гърди, гръб, страни).
    puck_bottom_style:
      name: Тип основа на шайбата
      description: Описва профила на долната страна на шайбата, който влияе върху
        скоростта и контрола върху различни повърхности за шафълборд.
    puck_type:
      name: Тип шайба
      description: Класифицира функционалния стил или предназначението на хокейната
        шайба — от официална игра до колекционерски сувенири.
    pull_buoy_style:
      name: Тип буй за плуване
      description: Показва функционалния стил или конфигурация на буя, като например
        стандартен, за глезен или комбиниран пулкик.
    pull_through_weight_material:
      name: Материал на тежестта за прокарване
      description: При шомполи с прокарване посочва материала на тежестта, използвана
        за прекарване на шомпола през инструмента.
    pulp_content:
      name: Съдържание на пулпа
      description: Посочва количеството плодова или зеленчукова пулпа, съдържаща се
        в напитката.
    pump_accessories_included:
      name: Включени аксесоари за помпа
      description: Изброява допълнителните елементи, включени към помпата за топки,
        така че купувачите да разбират съдържанието на комплекта.
    pumping_compatibility:
      name: Съвместимост с изпомпване
      description: Посочва дали сутиенът за кърмене е предназначен за изцеждане без
        ръце, както и за кърмене.
    punch_pad_type:
      name: Тип ударна подложка
      description: Посочва дизайна или вида на тренировъчния щит, за да могат купувачите
        да изберат подходящ за своите тренировъчни нужди.
    punching_training_bag_shape:
      name: Форма на боксовата/тренировъчната круша
      description: Посочва геометричната форма на тренировъчния чувал, като помага
        на потребителите да изберат модел, подходящ за конкретни тренировъчни удари
        (напр. ъперкъти, удари в тялото).
    puncture_protection_technology:
      name: Технология за защита от пробиване
      description: Изброява патентовани или стандартни слоеве против пробиване или
        технологии за подсилване на страничната стена/корпуса, вградени в гумата (напр.
        EXO, SnakeSkin, Kevlar belt).
    puppet_features:
      name: Характеристики на куклата за куклен театър
      description: Подчертава функционалните или производителните характеристики на
        куклата (напр. подвижна уста, звукови ефекти, двустранна употреба).
    puppet_puppet_theater_accessory_type:
      name: Тип аксесоар за кукли и куклен театър
      description: Посочва какъв тип аксесоар е продуктът (напр. сценичен реквизит,
        костюм за кукла, контролна щанга, резервен конец).
    purity_unit:
      name: Единица за чистота
      description: Как се изразява чистотата на монетата (проба спрямо карат).
    push_up_bar_design:
      name: Дизайн на стойката за лицеви опори
      description: Посочва функционалния стил на лицевите опори с дръжки (напр. фиксирани,
        въртящи се, паралети).
    pushrod_end_type:
      name: Тип край на щангата за клапани
      description: Определя стила на края/приставката на буталната щанга, използвана
        на интерфейса между педала или главния цилиндър.
    putty_glow_activation_method:
      name: Метод за активиране на светенето на пластилина
      description: Как пластилинът се зарежда/активира да свети (напр. слънчева светлина,
        UV/черна светлина).
    putty_glow_color:
      name: Цвят на светене на пластилина
      description: Посочва цвета, който пластилинът излъчва, когато свети в тъмното.
    putty_inclusions:
      name: Добавки в пластилина
      description: Забележими включени добавки в пластилина (напр. брокат, конфети,
        пенести топчета).
    putty_texture:
      name: Текстура на пластилина
      description: Основно поведение при работа с пластилина (напр. подскачащ, разтеглив,
        подобен на течност).
    puzzle_accessory_features:
      name: Характеристики на аксесоарите за пъзел
      description: Функционални характеристики и дизайнерски елементи на аксесоарите
        за пъзели (варира според типа аксесоар).
    pyrometric_cone_range:
      name: Диапазон на пирометричния конус
      description: Препоръчителните пирометрични конуси, за които глазурата е формулирана
        за изпичане (напр. Cone 06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Тип покритие на задния калник
      description: Посочва колко от зоната на задния калник продуктът заменя/ремонтира.
    quarter_panel_set_contents:
      name: Съдържание на комплекта за заден калник
      description: Посочва конфигурацията на комплекта за задния калник, включена
        в обявата (една страна, чифт или с допълнителни ремонтни секции).
    quilting_ruler_markings:
      name: Маркировки на линийката за пачуърк
      description: Посочва видовете отпечатани маркировки върху линийката за пачуърк,
        използвани за рязане/подравняване.
    quilting_ruler_non_slip_feature:
      name: Неплъзгаща функция на линия за капитониране
      description: Посочва дали линията включва неплъзгаща се основа/повърхностна
        обработка за намаляване на разместването върху плата.
    quilting_ruler_transparency:
      name: Прозрачност на линийката за пачуърк
      description: Посочва прозрачността/видимостта на материала на линията за виждане
        на плата и маркировките отдолу.
    quilting_thread_usage:
      name: Предназначение на конеца за капитониране
      description: Посочва предназначението на конеца за капитониране (как е предназначен
        да се използва).
    quilting_thread_weight_system:
      name: Система за тегло на конец за капитониране
      description: Посочва системата за размер/дебелина на конеца, използвана за изразяване
        на дебелината му (напр. тегловна, Tex, дение), за да може числовият размер
        да се тълкува правилно.
    quince_variety:
      name: Сорт дюля
      description: Посочва конкретния сорт или разновидност на дюлята, тъй като вкусът,
        ароматът и кулинарната пригодност могат да се различават според сорта.
    quinoa_variety:
      name: Сорт киноа
      description: Посочва конкретния цвят или разновидност на киноата, тъй като различните
        разновидности имат различни вкусове, текстури и времена за готвене.
    quinto_tuning_system:
      name: Система за настройка на квинто
      description: Как куинтото се настройва/опъва.
    race_car_class:
      name: Клас състезателни автомобили
      description: Състезателен клас/категория, за която е създаден автомобилът (група
        по правила/хомологация).
    racing_balaclava_face_opening_style:
      name: Тип отвор за лицето на състезателната балаклава
      description: Конфигурация на отвора за лицето на балаклавата, която влияе върху
        съвместимостта с каска, уплътняването и удобството.
    racing_balaclava_neck_coverage_length:
      name: Дължина на покритието на врата на състезателната балаклава
      description: Дължината на покритие на яката/драперията за врата, предназначена
        да се прибира в костюма/ограничителя за врата за уплътнение и защита.
    racing_balaclava_ventilation_zones:
      name: Вентилационни зони за състезателна балаклава
      description: Разположение на дишащи/мрежести или вентилирани зони за подобряване
        на въздушния поток под каската.
    racing_chest_guard_intended_use:
      name: Предназначение на състезателен протектор за гърди
      description: Основна дисциплина в моторните спортове или контекст, за който
        е предназначен протекторът за гърди.
    racing_chest_guard_size_type:
      name: Тип размер на състезателния протектор за гърди
      description: Посочва дали продуктът е оразмерен за деца, възрастни или е универсален/регулируем.
    racing_glove_certification_standard:
      name: Стандарт за сертификация на състезателни ръкавици
      description: Посочва сертификата/стандарта за безопасност, с който състезателните
        ръкавици са съвместими (напр. FIA, SFI, CE), и при възможност рейтинга/нивото.
    racing_goggles_lens_system:
      name: Система от лещи за състезателни очила
      description: Посочва системата за смяна на лещите/готовност за откъсващи се
        фолиа, поддържана от очилата.
    racing_helmet_certification_standard:
      name: Стандарт за сертификация на състезателна каска
      description: Сертификатите за безопасност, на които отговаря състезателната
        каска.
    racing_kart_brake_type:
      name: Тип спирачна система на състезателен картинг
      description: Основен тип спирачна система, монтирана на картинга.
    racing_kart_class:
      name: Клас на състезателния карт
      description: Състезателен клас или набор от правила, с които картингът е създаден
        да бъде съвместим.
    racing_kart_frame_material:
      name: Материал на рамата на състезателния карт
      description: Основен материал на рамата/шасито на картинга.
    racing_kart_seat_size:
      name: Размер на седалка за състезателен карт
      description: Обозначение на размера на седалката на картинга, използвано за
        прилягане.
    racing_neck_support_style:
      name: Стил на състезателна опора за врата
      description: Конструктивен стил на състезателната опора/скоба за врата и начинът,
        по който взаимодейства с торса/каската на състезателя.
    racing_suit_certification_standard:
      name: Стандарт за сертификация на състезателен костюм
      description: Посочва сертификата/хомологацията за безопасност, на които отговаря
        състезателният костюм (напр. FIA или SFI стандарти).
    racing_suit_cuff_design:
      name: Дизайн на маншетите на състезателния костюм.
      description: Тип маншет за глезен/китка, използван за съвместимост с ръкавици/ботуши
        и подобряване на уплътнението/комфорта.
    racing_suit_size_system:
      name: Система за размери на състезателен костюм
      description: Система за размери, използвана за костюма (напр. Alpha S-XXL, Numeric
        EU/US, Youth).
    racing_truck_discipline:
      name: Дисциплина на състезателен камион
      description: Посочва основната състезателна дисциплина/формат, в който камионът
        е създаден да участва.
    rack_side_configuration:
      name: Конфигурация на страната на стойката
      description: Посочва дали стойката съхранява постелки от едната страна или от
        двете страни, което влияе върху ефективното използване на пространството и
        достъпа.
    rack_system_configuration:
      name: Конфигурация на стелажна система
      description: Описва общото оформление/форма на системата за стойка за барабани.
    racket_dampener_type:
      name: Тип амортисьор за ракета
      description: Определя механизма за монтаж или функционалния стил на амортисьора
        на вибрациите на ракетата.
    racket_grip_size:
      name: Размер на дръжката на ракета
      description: Посочва класификацията на размера на дръжката на ракетата според
        обиколката (напр. G1–G6), за да осигури правилно прилягане и комфорт на ръката.
    racket_sport_shoe_court_surface:
      name: Тип кортова настилка за обувки за спортове с ракета
      description: Посочва настилката на тенис корта, за която обувката е предназначена
        или оптимизирана, помагайки на играчите да изберат обувки с правилния грайфер
        и каучукова смес за тяхната типична игрална повърхност.
    racket_string_pattern:
      name: Шарка на кордата на ракетата
      description: Посочва броя на основните и напречните струни в наплитането на
        ракетата (напр. 16 × 18), което влияе върху контрола, въртенето и издръжливостта.
    racket_stringing_status:
      name: Статус на наплитане на ракетата
      description: Посочва дали ракетата се продава наплетена, ненаплетена или предварително
        наплетена.
    racket_weight_class:
      name: Тегловен клас на ракетата
      description: Посочва стандартните бадминтон категории за тегло „U“, позволявайки
        на играчите да избират ракети в предпочитания от тях диапазон на маса.
    racquet_toy_set_equipment_included:
      name: Включено оборудване в комплекта играчки с ракети
      description: Изброява артикулите, включени в играчката или комплекта (напр.
        мрежа, топки, ракети).
    racquetball_squash_training_aid_type:
      name: Тип тренировъчно средство за ракетбол и скуош
      description: Класифицира конкретния вид тренировъчен помощен уред или аксесоар,
        за да могат купувачите бързо да открият нужния артикул.
    radiator_cap_gasket_material:
      name: Материал на уплътнението на капачката на радиатора
      description: Материал на уплътнението(ята), използвано(и) на капачката на радиатора.
    radiator_cap_pressure_relief_style:
      name: Стил на освобождаване на налягането на капачката на радиатора
      description: Посочва стила на освобождаване на налягането/вентилация/задействане
        на капачката на радиатора, което може да повлияе на работата, безопасността
        и предназначението.
    radiator_expansion_tank_cap_application:
      name: Приложение на капачката на радиатора/разширителния съд
      description: Определя дали капачката е предназначена за гърловината на радиатора
        или за разширителен/преливен съд за охлаждаща течност.
    radiator_fan_control_type:
      name: Тип управление на вентилатора на радиатора
      description: Посочва как се управлява/задейства вентилаторът на радиатора.
    radiator_fan_mounting_pattern:
      name: Схема за монтаж на вентилатор на радиатор
      description: Посочва стила/схемата на монтаж, използвана за закрепване на вентилатора
        или вентилаторния модул.
    radiator_fan_type:
      name: Тип вентилатор на радиатор
      description: Посочва функционалния тип/конфигурация на модула на вентилатора
        на радиатора.
    radiator_hose_end_type:
      name: Тип край на маркуча на радиатора
      description: Посочва основния стил на свързване/уплътняване, използван в края/краищата
        на маркуча на радиатора за свързване към портовете на радиатора/двигателя.
    radiator_hose_position:
      name: Позиция на маркуча на радиатора
      description: Функционална позиция/тип на маркуча на радиатора в охладителната
        система.
    radiator_hose_shape:
      name: Форма на маркуча на радиатора
      description: Обща геометрия/форма на маркуча, използвана за маршрутизиране при
        монтаж и правилно прилягане.
    radiator_overflow_tank_level_sensor_provision:
      name: Предвидено място за сензор за ниво на преливния съд на радиатора
      description: Посочва дали съдът включва или поддържа сензор за ниво на охлаждащата
        течност.
    radiator_overflow_tank_shape:
      name: Форма на разширителния съд на радиатора
      description: Обща форма/конструкция на корпуса на разширителния съд.
    radish_variety:
      name: Сорт репички
      description: Посочва сорта или вида репичка, за да могат потребителите да изберат
        конкретни характеристики на вкус, цвят или размер (напр. дайкон, динена репичка,
        репичка френска закуска).
    radius_of_hollow:
      name: Радиус на вдлъбнатината
      description: Посочва профила на вдлъбнатото заточване, създадено от острилката,
        изразен като стандартни размери или плосък профил.
    rail_coverage_configuration:
      name: Конфигурация на покритие на релсата
      description: Посочва кои части на креватчето защитава комплектът покривала,
        като уточнява дали покупката е само за преден панел или за многокомпонентен
        комплект по периметъра.
    rail_mount_standard:
      name: Стандарт за монтажна релса
      description: Посочва стандарта на релсата или монтажния интерфейс, използван
        за закрепване на аксесоар (напр. мерник, фенерче) към BB оръжие.
    rail_side:
      name: Страна на релсата
      description: Посочва дали резервната релса е за лявата страна, дясната страна
        или се продава като комплект.
    rail_style:
      name: Стил на релсата
      description: Категоризира общия дизайн или конфигурация на релсата (напр. A-Frame,
        дъга, прегъната), което определя възможностите за трикове и необходимото пространство.
    rail_system:
      name: Железопътна система
      description: Посочва интерфейса за монтаж на аксесоари, наличен на оръжието
        (напр. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Технология на сензора за дъжд
      description: Принципът на засичане, използван за откриване на вода върху предното
        стъкло.
    rain_suit_configuration:
      name: Конфигурация на дъждобран
      description: Посочва дали продуктът е цял гащеризон, комплект от няколко части
        или друга конфигурация.
    rainstick_construction_type:
      name: Тип конструкция на пръчката за дъжд
      description: Описва как е конструирана пръчката за дъжд (традиционна от кактус/дървена
        тръба или съвременни алтернативи).
    rainstick_fill_material:
      name: Материал на пълнежа на дъждовната пръчка
      description: Посочва вътрешния пълнеж, използван за създаване на каскадния звук
        (напр. семена, мъниста).
    rainstick_playing_technique:
      name: Техника на свирене с дъждовна пръчка
      description: Посочва препоръчителната техника на свирене или начин на боравене,
        използвани за постигане на желания ефект при дъждовна пръчка.
    rainstick_sound_character:
      name: Звуков характер на пръчката за дъжд
      description: Описва общия звуков характер, произвеждан от пръчката за дъжд.
    raising_method:
      name: Метод на отглеждане
      description: Описва как животните са били отглеждани и угоявани преди обработка
        (напр. хранени с трева, пасищно отглеждани, доугоявани със зърно).
    rally_competition_class:
      name: Клас за рали състезания
      description: Клас по правилник или организация, за който е създаден рали автомобилът
        (когато е известно).
    rally_surface_setup:
      name: Настройка на настилка за рали
      description: Основна повърхност/терен, за които е предназначена настройката
        или конфигурацията на рали автомобила.
    ramp_surface_texture:
      name: Текстура на повърхността на рампата
      description: Описва нивото на завършек или сцепление на повърхността на рампата.
    ratchet_mounting_style:
      name: Стил на монтаж на тресчотката
      description: Как музикалният тресчотков инструмент се държи или монтира по време
        на свирене или настройка.
    rattle_element_material:
      name: Материал на дрънкалката
      description: Материал на тракащите елементи (напр. зъбци/дрънкалки/мъниста),
        които създават характерния бръмчащ/тракащ звук.
    rattle_type:
      name: Тип дрънкалка
      description: Посочва дали примамката съдържа вътрешна дрънкалка или звукова
        камера и, ако да — какъв тип дрънкалка е използвана.
    rc_airship_lifting_gas_type:
      name: Тип газ за повдигане на RC дирижабъл
      description: Посочва с какъв газ е предназначено да бъде напълнено тялото на
        дирижабъла/блимпа (ако е приложимо).
    rc_helicopter_control_frequency:
      name: Честота на управление на RC хеликоптер
      description: Радиочестотната лента, използвана между контролера и хеликоптера,
        която влияе върху устойчивостта на смущения и съвместимостта (напр. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Функции за стабилизация на RC хеликоптера
      description: Изброява функциите за подпомагане на стабилността/управлението,
        които улесняват полета или добавят възможности.
    rc_motorcycle_controller_type:
      name: Тип контролер за RC мотоциклет
      description: Форм фактор на включения контролер.
    rc_plane_takeoff_launch_method:
      name: Метод на излитане/стартиране на RC самолет
      description: Как самолетът обикновено се изстрелва/излита, което влияе къде
        и как може да бъде използван.
    rc_vehicle_controller_type:
      name: Тип контролер за RC превозно средство
      description: Посочва формата/типа на контролера, използван за управление на
        RC превозното средство.
    rc_vehicle_scale:
      name: Мащаб на RC превозно средство
      description: Посочва мащаба (клас по размер) на дистанционно управляваната кола/камион
        (напр. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Тип терен за RC превозно средство
      description: Показва основния терен, за който е предназначена колата/камионът
        с дистанционно управление.
    reach_adjustment_type:
      name: Тип регулиране на обхвата
      description: Посочва дали разстоянието между лоста на спирачката и кормилото
        може да се регулира и, ако е регулируемо, дали регулирането е без инструмент
        или изисква инструмент.
    rear_axle_spacing:
      name: Разстояние между задните оси
      description: Размер на задния дропаут/оста, за който е проектирана рамката,
        влияещ върху съвместимостта с колелото.
    rear_axle_standard:
      name: Стандарт на задната ос
      description: Определя интерфейса/формата на оста, използван от задното колело
        (напр. бързо освобождаване, различни размери проходни оси).
    rear_axle_type:
      name: Тип задна ос
      description: Посочва системата за закрепване и диаметъра на оста, използвани
        за закрепване на задното колело към рамката.
    rear_coverage:
      name: Покритие на задната част
      description: Посочва колко от седалището покрива долнището на банския (напр.
        секси, пълно).
    rear_opening_type:
      name: Тип заден отвор
      description: Описва стила на задния достъп или функцията „заден капак“ за удобно
        ползване на тоалетна, като падаща седалка или цял заден цип.
    rear_seat_configuration:
      name: Конфигурация на задните седалки
      description: Посочва конфигурацията на модула на задната седалка за правилно
        прилягане и избор на вътрешно разположение.
    rear_view_mirror_ornament_attachment_type:
      name: Тип закрепване на украшението за огледало за обратно виждане
      description: Посочва как украшението се закрепва към рамото или корпуса на огледалото
        за обратно виждане (напр. връзка, щипка, кука).
    rearview_mirror_mount_attachment_type:
      name: Тип закрепване на стойката за огледало за обратно виждане
      description: Определя как стойката физически се закрепва към огледалото за обратно
        виждане (корпус или рамо на огледалото), например чрез скоба, щипка, каишка,
        лепяща подложка или монтажна планка с болтове.
    rebound_board_face_type:
      name: Тип лицева страна на дъската за отскок
      description: Описва конфигурацията на повърхността, която определя поведението
        на отскока, като плосък, наклонен или многостенен дизайн.
    rebound_level:
      name: Ниво на отскок
      description: Посочва колко силно топката за wall ball отскача след удар, помагайки
        на потребителите да избират между модели без отскок и с умерен отскок.
    rebound_surface_configuration:
      name: Конфигурация на повърхността за отскок
      description: Посочва разположението на повърхностите за отскок и предвидимостта
        на отскоците (едностранни, двустранни или многостранни; предвидими или непредвидими).
    rebounder_design:
      name: Дизайн на ребоундъра
      description: Определя конструктивния тип или конфигурацията на отскачащата повърхност
        на продукта.
    rebounder_design_type:
      name: Тип дизайн на уред за връщане на топки
      description: Посочва основния механизъм за отскок или конструктивен тип на тренажора
        (напр. основа с еластично въже, мрежа в рамка, сгъваема мишена).
    rebounder_sides:
      name: Страни на тренажора за отскок
      description: Посочва дали уредът за връщане на топки може да връща топките от
        едната страна или от двете страни.
    rebounding_mechanism_type:
      name: Тип механизъм за отскок
      description: Посочва технологията, използвана за връщане на шайбата или топката
        (напр. гумен буфер, еластично въже).
    recipient_relationship:
      name: Връзка с получателя
      description: Предназначена връзка с получателя (напр. майка, баща, приятел)
        за поздравителната картичка.
    recliner_control_type:
      name: Тип управление на креслото с облегалка
      description: Посочва как се управлява механизмът за накланяне (напр. ръчен лост,
        електрически панел с бутони, дистанционно).
    recliner_motion_type:
      name: Тип движение на облегалката
      description: Определя основната възможност за движение на релакс креслото (напр.
        люлеещо се, плъзгащо се, въртящо се, компактно до стена, повдигащо).
    reclining_mechanism:
      name: Механизъм за накланяне
      description: Посочва механизма, използван за управление на функцията за накланяне
        на дивана.
    recommended_candle_format:
      name: Препоръчителен формат на свещта
      description: Посочва препоръчителния формат на свещите, за които са предназначени
        тези самозалепващи се държачи за фитил.
    recommended_container_type:
      name: Препоръчителен тип контейнер
      description: Материали за съдове, които са препоръчителни/безопасни за гел восъчни
        свещи.
    recommended_fabric_type:
      name: Препоръчителен тип плат
      description: Препоръчителни платове за най-добри резултати с шивашкия модел.
    recommended_fabric_weight:
      name: Препоръчително тегло на плата
      description: Посочва препоръчителната категория тегло на плата за кройката.
    recommended_food_pairing:
      name: Препоръчителна комбинация с храна
      description: Посочва основните протеини или ястия, за които е предназначен сосът
        (напр. пилешко, свинско, говеждо, риба, зеленчуци).
    recommended_lane_condition:
      name: Препоръчително състояние на пистата
      description: Посочва масления модел или състоянието на пистата, за които е предназначена
        топката.
    recommended_motor_impulse_class:
      name: Препоръчителен клас импулс на мотора
      description: Посочва препоръчителния общ клас импулс на двигателя на моделна
        ракета за безопасен/оптимален полет.
    recommended_reading_level:
      name: Препоръчително ниво за четене
      description: Посочва препоръчителния етап/ниво на четене за продукта, за да
        помогне на потребителите да го съобразят с текущото развитие на четенето при
        детето.
    recommended_sleep_position:
      name: Препоръчителна позиция за сън
      description: Посочва за кои позиции за сън е проектиран матракът да осигурява
        комфортна опора (напр. спане настрани или по гръб).
    recommended_storage:
      name: Препоръчително съхранение
      description: Посочва как продуктът трябва да се съхранява, за да се запази свежестта
        му.
    recommended_surfaces:
      name: Препоръчителни повърхности
      description: Посочва предназначените повърхности/категории материали за залепване
        на лепилото, отвъд общата съвместимост за хоби и занаяти (напр. само хартия
        срещу многофункционални повърхности).
    recommended_use_case:
      name: Препоръчителен случай на употреба
      description: Основен сценарий на употреба за уплътнителя (временен/авариен или
        дългосрочен ремонт).
    recommended_use_location:
      name: Препоръчително място на употреба
      description: Предназначена среда за люлеещата се люлка (домашен двор или обществена
        площадка и др.).
    recommended_vehicle_surfaces:
      name: Препоръчителни повърхности за превозни средства
      description: Посочва повърхностите/покритията на превозното средство, за които
        четката е предназначена да бъде безопасна (напр. прозрачен лак, матова/сатенирана
        боя, винилово фолио/защитно фолио за боя, стъкло, джанти).
    recorder_accessories_included:
      name: Включени аксесоари за блокфлейта
      description: Изброява включените аксесоари, опаковани с басовата блокфлейта
    recorder_bore_design:
      name: Дизайн на канала на блокфлейтата
      description: Дизайн на вътрешния канал на корпуса на блокфлейтата.
    recorder_bore_type:
      name: Тип канал на блокфлейта
      description: Посочва стила на канала на блокфлейтата.
    recorder_case_shell_type:
      name: Тип твърда обвивка на калъфа за блокфлейта
      description: Описва структурната твърдост на калъфа.
    recorder_finish:
      name: Покритие на блокфлейтата
      description: Повърхностно покритие/обработка на тялото на блокфлейтата (особено
        важно при дървени алт блокфлейти).
    recorder_hole_type:
      name: Тип отвори на блокфлейтата
      description: Посочва дали тоновите отвори са единични (без двойни отвори) или
        включват двойни отвори за по-добри хроматични апликатури.
    recorder_joint_configuration:
      name: Конфигурация на сглобките на блокфлейтата
      description: Описва колко секции има корпусът на блокфлейтата, което влияе върху
        преносимостта, почистването и подмяната на части.
    recorder_joint_style:
      name: Стил на сглобката на блокфлейтата
      description: Стилът на сглобката/съединението между секциите на блокфлейтата,
        ако е приложимо.
    recorder_keywork:
      name: Клапи на блокфлейтата
      description: Посочва дали блокфлейтата включва клапи (метални/пластмасови механизми)
        за ниски тонове, типични за тенорни, басови и големи блокфлейти.
    recorder_mouthpiece_type:
      name: Тип мундщук на блокфлейта
      description: Описва дали мундщукът/главната секция на блокфлейтата е интегриран
        (една част) или подвижен/сменяем.
    recorder_pitch_standard_a4:
      name: Стандарт на настройка на блокфлейтата (A4)
      description: Посочва референтната настройка, за която е създадена блокфлейтата
        (напр. A=440 Hz съвременен строй срещу A=415 Hz бароков строй).
    recorder_thumb_hole_type:
      name: Тип отвор за палеца на блокфлейта
      description: Посочва дали блокфлейтата има единичен или двоен отвор за палеца.
    recreational_vehicle_holding_tank_type:
      name: Тип резервоар за отпадни води на кемпер
      description: Посочва какви резервоари за отпадни води има кемперът.
    recreational_vehicle_leveling_system:
      name: Система за нивелиране на превозни средства тип кемпер
      description: Вид инсталирана система за нивелиране/стабилизиране.
    recycled_material_content:
      name: Съдържание на рециклирани материали
      description: Посочва какъв дял от дрехата е произведен от рециклирани влакна
        или прежди.
    reed_dent_material:
      name: Материал на зъбците на нищелката
      description: Материал на зъбците/разделителите на нищелката (елементите, които
        разделят основните нишки), който влияе върху издръжливостта и износването
        на преждата.
    reed_type:
      name: Тип пискун
      description: Посочва конструктивния тип пискун, използван в чантерите и бурдоните
        на гайдата.
    reeds_included:
      name: Включени пискуни
      description: Посочва кои тръстики са включени в комплекта за гайда (за мелодичната
        тръба и/или басовите тръби) и дали са от тръстика или синтетични.
    reefing_method:
      name: Метод за рифоване
      description: Посочва механизма (ако има такъв) за свиване или прибиране на платното,
        докато лодката е във водата.
    reel_profile:
      name: Профил на макарата
      description: Класифицира конструктивния стил/профил на корпуса на кастинг макарата.
    reel_seat_material:
      name: Материал на държача на макарата
      description: Посочва материала на макародържача, който влияе върху теглото,
        чувствителността и устойчивостта на корозия.
    reel_seat_type:
      name: Тип на макародържача
      description: Посочва стила на заключващия механизъм, който закрепва мухарската
        макара към въдицата.
    reel_size_class:
      name: Клас на размера на макарата
      description: Производителски размерен клас (напр. 1000, 3000, 5000), който обозначава
        капацитета на шпулата и общия размер и конструкция на макарата.
    referee_wallet_accessories_included:
      name: Включени аксесоари към съдийския портфейл
      description: Посочва допълнителните елементи, включени в комплекта на съдийски
        портфейл, като червени/жълти картони, записни листове или пишещи средства,
        за да знаят купувачите дали продуктът се предлага като пълен комплект.
    refinement_level:
      name: Ниво на прецизиране
      description: Посочва степента на рафиниране, през която е преминало маслото,
        влияеща върху вкуса, цвета, хранителната стойност и точката на димене.
    reflective_finish:
      name: Отразяващо покритие
      description: Посочва обработката на отразяващата повърхност на диско топката
        (напр. огледални плочки срещу холографски/иридесцентни ефекти).
    reflective_or_glow_effect:
      name: Отразяващ или светещ ефект
      description: Посочва дали топката за антена има ефекти за видимост, като отразяващ
        материал, светещи в тъмното или LED елементи.
    reflective_tape_pattern:
      name: Светлоотразителна лента
      description: Описва конфигурацията на светлоотразителната лента върху дрехата,
        използвана за покриване на изискванията за видимост.
    regulation_standard:
      name: Стандарт на регулация
      description: Посочва официалния стандарт или изискванията на компетентния орган
        относно размерите/сертифицирането, на които отговаря мрежата.
    regulator_diaphragm_material:
      name: Материал на мембраната на регулатора
      description: Посочва материала на мембраната, който влияе върху съвместимостта
        с гориво/етанол (напр. E85) и издръжливостта.
    regulator_port_thread_standard:
      name: Стандарт на резбата на порта на регулатора
      description: Посочва стандарта на резбата/връзката на портовете върху корпуса
        на регулатора за входни/изходни/връщащи портове.
    rein_features:
      name: Характеристики на поводите
      description: Подчертава специални функционални или защитни характеристики, налични
        при поводите.
    rein_style:
      name: Стил на поводите
      description: Определя конструктивния дизайн или конфигурацията на поводите,
        позволявайки на ездачите да изберат правилния тип според дисциплината и личните
        си предпочитания.
    reinforced_areas:
      name: Укрепени зони
      description: Посочва кои части от дрехата са подсилени за по-голяма устойчивост
        срещу протриване.
    reinforcement_type:
      name: Тип подсилване
      description: Конструктивно подсилване, използвано в радиаторния маркуч за здравина
        и устойчивост на температура/налягане.
    release_activation_method:
      name: Метод за активиране на освобождаването
      description: Посочва как помощното устройство за освобождаване на тетивата се
        задейства от стрелеца с лък.
    release_bearing_material:
      name: Материал на лагера на спусъка
      description: Основен материал на лагерните/контактните елементи (когато е посочен
        от производителя).
    release_jaw_style:
      name: Стил на челюстта на спусъка
      description: Описва конструкцията на челюстите или куката на освобождаващия
        механизъм.
    release_strap_type:
      name: Тип каишка на спусъка
      description: Посочва каишката или системата за свързване, включена към помощното
        устройство за освобождаване при стрелба с лък.
    remote_control_airship_envelope_material:
      name: Материал за обвивка на дирижабъл с дистанционно управление
      description: Посочва основния материал на обвивката (газовия балон) на дирижабъла/цепелина,
        различен от общия материал на играчката.
    remote_control_motorcycle_scale:
      name: Мащаб на радиоуправляем мотоциклет
      description: Мащаб на RC мотоциклета спрямо реален мотоциклет (ако е моделиран
        като мащабен модел).
    remote_control_motorcycle_terrain_suitability:
      name: Пригодност на радиоуправляем мотор за терен
      description: Основен терен, за който е предназначен RC мотоциклетът.
    remote_control_motorcycle_water_resistance:
      name: Водоустойчивост на радиоуправляем мотор
      description: Ниво на защита от вода на електрониката на RC мотоциклета.
    remote_control_plane_kit_completion_level:
      name: Ниво на комплектовка на радиоуправляем самолетен комплект
      description: Посочва какво е включено и доколко комплектът е завършен (напр.
        "готов за полет" спрямо необходимост от отделен предавател/приемник/батерия).
    remote_control_plane_landing_gear_type:
      name: Тип колесник на радиоуправляем самолет
      description: Посочва конфигурацията на колесника, която влияе върху издръжливостта
        и повърхностите за излитане/кацане.
    remote_control_plane_power_type:
      name: Тип задвижване на дистанционно управляем самолет
      description: Посочва как се задвижва самолетът (електрически или с двигател
        на бензин/газ/нитро), което оказва влияние върху поддръжката, шума и местата,
        където може да се лети с него.
    remote_control_watercraft_features:
      name: Характеристики на радиоуправляем плавателен съд
      description: Подчертава основните характеристики на радиоуправляемите плавателни
        съдове, които оказват влияние върху удобството при употреба и издръжливостта.
    remote_control_watercraft_propulsion_drive_type:
      name: Тип задвижване/пропулсия на радиоуправляем плавателен съд
      description: Указва как се управлява дистанционно управляваният плавателен съд
        във водата.
    remote_control_watercraft_water_environment:
      name: Водна среда за радиоуправляем плавателен съд
      description: Посочва водните условия, при които RC плавателният съд се представя
        най-добре.
    remote_keyless_system_programming_method:
      name: Метод за програмиране на система за безключов достъп
      description: Как дистанционното/системата се програмира или сдвоява с превозното
        средство (напр. чрез вградена процедура или професионален инструмент).
    repair_compound_type:
      name: Тип ремонтен състав
      description: Тип/формула на включения консумативен ремонтен материал (напр.
        вид кит за каросерия, вид смола за предно стъкло, вид цимент/уплътнител за
        гуми).
    repair_kit_components:
      name: Компоненти на ремонтния комплект
      description: Изброява конкретните елементи, включени в ремонтния комплект, позволявайки
        на клиентите да разберат съдържанието и да сравняват комплектите.
    repair_method:
      name: Метод за ремонт
      description: Посочва основния подход за ремонт, използван от комплекта, като
        самозалепващи лепенки или подмяна на вентил.
    replacement_part_purpose:
      name: Предназначение на резервната част
      description: Посочва дали артикулът е OEM резервна част, тунинг/производителна
        част или допълнителен аксесоар.
    replacement_part_type:
      name: Тип резервна част
      description: Определя функционалната категория на частта за кростренажор, като
        позволява на потребителите да филтрират търсения компонент.
    replacement_parts_availability:
      name: Наличност на резервни части
      description: Посочва дали се поддържат консумативни/сменяеми части за машината
        за резби (напр. резервни куки/телчета).
    replica_gun_action_type:
      name: Тип механизъм на реплика оръжие
      description: Посочва типа на действие/механизма на репликата на огнестрелно
        оръжие (както е представено), например затворен механизъм или лостов механизъм.
    replica_gun_firing_mechanism:
      name: Реплика на механизъм за стрелба на пистолет
      description: Посочва дали и как репликата симулира стрелба/функциониране (несмъртоносна),
        като например с капси или без функция за стрелба.
    replica_gun_moving_parts:
      name: Подвижни части на оръжие-реплика
      description: Посочва кои части на репликата са функционални/подвижни.
    reservoir_orientation:
      name: Ориентация на резервоара
      description: Посочва предназначената ориентация или форма на резервоара в раницата.
    reservoir_type:
      name: Тип резервоар
      description: Тип конфигурация на резервоара за главния цилиндър на съединителя.
    resin_suitability:
      name: Съвместимост на смолата
      description: Посочва дали хандбалната топка е предназначена за използване със
        смола (лепило) или е без смола.
    resistance_adjustability:
      name: Регулиране на съпротивлението
      description: Посочва дали съпротивлението при дишане може да се променя от потребителя.
    resistance_band_design:
      name: Дизайн на ластика за съпротивление
      description: Описва физическата форма или стил на ластика за съпротивление (напр.
        примка, тръба с дръжки, форма „осмица“), помагайки на клиентите да изберат
        правилния дизайн за своята тренировъчна програма.
    resistance_loading_type:
      name: Тип натоварване на съпротивлението
      description: Посочва как се осигурява или зарежда съпротивлението/тежестта на
        смит машината (напр. с дискове или със селекторни плочи за тежест.
    response_fields_included:
      name: С включени полета за отговор
      description: Посочва кои стандартни полета/опции за отговор присъстват в картата
        за отговор (напр. приемам/отказвам, избор на храна).
    restoration_status:
      name: Статус на реставрация
      description: Посочва дали ванът е оригинален, реставриран, restomod или проектно
        състояние.
    rhinestone_base_color_family:
      name: Цветова гама на основата на кристалите
      description: Определя цветовата група на основата на кристала (напр. прозрачен/кристален,
        златист/жълт, син).
    rhinestone_facet_style:
      name: Стил на фасетите на кристала
      description: Моделът/формата на фасетите на кристала, влияещи върху блясъка
        и външния вид (напр. Xilion rose, brilliant cut, фасетиран спрямо гладък).
    rhinestone_hole_reinforcement_material:
      name: Материал за укрепване на отвора на кристала
      description: Материал около/при отворите (напр. метална капса, формована пластмаса),
        който влияе върху издръжливостта при шиене.
    rhinestone_setting_type:
      name: Начин на закрепване на кристалите
      description: Как камъкът е монтиран/обкантен за пришиване (напр. монтаж с щифтове,
        обков, обшит монтаж).
    rhubarb_product_cut_type:
      name: Тип нарязване на ревен
      description: Описва физическата подготовка или нарязване на продукта от ревен.
    ribbon_construction:
      name: Конструкция на панделката
      description: Описва ключови конструктивни характеристики на гросгрейн панделката,
        като наличие на тел или еластичност, което променя предназначението ѝ (напр.
        за панделки срещу шиене).
    ribbon_packaging_type:
      name: Тип опаковка на панделката
      description: Посочва как панделката се доставя/продава.
    ribbon_pattern_style:
      name: Стил на шарката на панделката
      description: Класифицира метода за нанасяне на шарката, често използван при
        гросгрейн панделки.
    ribbon_sheen_level:
      name: Ниво на блясък на панделката
      description: Посочва визуалния блясък/лъскавина на повърхността на сатенената
        панделка.
    ribbon_style:
      name: Стил на панделката
      description: Посочва визуалния модел/стил на панделката (напр. едноцветна, райета,
        трицветна).
    ribbon_trim_backing_type:
      name: Тип основа/гръб на панделката или канта
      description: Посочва дали панделката/кантът има основа и какъв тип е тя (за
        по-лесно приложение).
    ribbon_trim_edge_finish:
      name: Обработка на ръба на панделката/канта
      description: Описва конструкцията/обработката на ръба на панделката/канта (важно
        за разнищването и предназначението).
    ric_rac_wave_size:
      name: Размер на вълната на рик-рак лентата
      description: Описва амплитудата/размера на вълните на зигзаг лентата (колко
        големи са зигзагите/вълните).
    rice_grain_length:
      name: Дължина на оризовите зърна
      description: Класифицира оризовите продукти според дължината на зърното, като
        късозърнест, среднозърнест или дългозърнест ориз, което влияе върху характеристиките
        при готвене и кулинарната употреба.
    rice_processing_method:
      name: Метод за обработка на ориз
      description: Описва как оризът е обработен или подготвен (напр. предварително
        сварен, покълнал, на люспи), което влияе върху времето за готвене, хранителната
        стойност и употребата.
    rice_variety:
      name: Сорт ориз
      description: Посочва конкретната разновидност или сорт на ориза, като позволява
        на потребителите да изберат зърна с предпочитан вкус, аромат, текстура и предназначение
        за определена кухня.
    riding_toy_features:
      name: Характеристики на играчка за яздене
      description: Подчертава често срещани функционални/защитни характеристики, специфични
        за играчките за яздене.
    rifle_action_type:
      name: Тип механизъм на пушката
      description: Механизмът на действие на пушката (как зарежда/стреля/изхвърля),
        важен за идентификацията и интереса на колекционерите.
    rifle_finish:
      name: Покритие на пушката
      description: Основно външно покритие/обработка на металните части.
    rifle_magazine_type:
      name: Тип пълнител за пушка
      description: Тип система за подаване на пушката.
    rifle_stock_material:
      name: Материал на приклада на пушката
      description: Основен материал, използван за приклада/обковката на пушката (напр.
        орех, полимер).
    rim_clamping_method:
      name: Метод за закрепване на каплата
      description: Начинът, по който машината закрепва колелото/джантата по време
        на монтаж и демонтаж.
    rim_strip_type:
      name: Тип лента за капла
      description: Класифицира лентата според нейния тип, конструкция или конкретно
        предназначение (напр. безкамерна лента за джанта или предпазна гумена лента).
    rim_tubeless_compatibility:
      name: Съвместимост на каплата с безкамерни гуми
      description: Посочва дали каплата, лентата или колелото са предназначени за
        безкамерна система на гуми.
    ripeness_stage:
      name: Етап на зрялост
      description: Посочва нивото на зрялост на плода към момента на продажба (напр.
        неузрял, узрял, готов за консумация).
    riser_pad_type:
      name: Тип подложка за повдигане
      description: Класифицира функционалния стил на подложката (напр. стандартен
        дистанционер, ударопоглъщаща, наклонен клин).
    roasted_malt_processing_type:
      name: Вид обработка на печен малц
      description: Конкретният метод на обработка или вариант, използван за създаването
        на печения малц или печеното зърно (напр. непокълнал печен ечемик, черен малц,
        варианти с намалена горчивина или без люспи).
    robotic_toy_interaction_mode:
      name: Режим на взаимодействие на роботизирана играчка
      description: Описва основния начин, по който роботът взаимодейства или се движи
        по време на игра.
    robotic_toy_light_features:
      name: Светлинни функции на роботизирана играчка
      description: Посочва дали и как играчката използва светлини като част от играта
        (напр. LED светлини, прожекция).
    robotic_toy_programming_supported:
      name: Поддържа ли се програмиране на роботизирана играчка
      description: Посочва какъв подход за програмиране, ако има такъв, поддържа играчката.
    robotic_toy_skill_level:
      name: Ниво на умения за роботизирана играчка
      description: Посочва нивото на сложност при управление/програмиране, очаквано
        от потребителя.
    robotic_toy_sound_features:
      name: Звукови функции на роботизирана играчка
      description: Посочва звуковите възможности на роботизираната играчка.
    rod_butt_style:
      name: Стил на долната част на въдицата
      description: Определя конфигурацията на долния край на въдицата, използван при
        тролинг.
    rod_construction_type:
      name: Тип конструкция на въдица
      description: Посочва общия стил на конструкцията на въдицата по отношение на
        секции и сгъваемост.
    rod_guide_material:
      name: Материал на водачите за въдица
      description: Посочва материала, използван за водачите или вложките на въдицата,
        който влияе върху издръжливостта, теглото и триенето на линията.
    rod_guide_type:
      name: Тип водачи на въдицата
      description: Посочва основния стил на водачите за влакно, монтирани на въдицата.
    rod_handle_type:
      name: Тип дръжка на въдица
      description: Посочва конфигурацията на дръжката на въдицата, което подпомага
        избора според удобството и техниката на риболов.
    roll_cage_tubing_material:
      name: Материал на тръбите на предпазната клетка
      description: Посочва материала/сплавта на тръбите, използвани за предпазната
        клетка/ролбара (напр. DOM стомана или 4130 хром-молибденова стомана).
    roller_skate_brake_shape:
      name: Форма на спирачката за ролкови кънки
      description: Описва геометричната форма/профил на спирачната глава според предпочитанията
        за производителност или външен вид.
    roller_skate_brake_type:
      name: Тип спирачка за ролкови кънки
      description: Посочва спирачната система, използвана при ролковите кънки.
    roller_ski_technique:
      name: Техника за ролкови ски
      description: Определя техниката за ски бягане, за която са предназначени ролковите
        ски.
    roller_technology:
      name: Технология на ролката
      description: Посочва интегрирана технология, която подобрява ефективността на
        масажа, като вибрация или затопляне.
    rolling_case_wheel_configuration:
      name: Конфигурация на колелата на чантата с колела
      description: Посочва конфигурацията на колелата, използвана при калъфи за музикални
        клавиатури с колелца.
    rolling_paper_format:
      name: Формат на хартията за свиване
      description: Определя физическата форма на продукта (напр. плоски листчета,
        предварително навити конуси, обвивки).
    rolling_paper_gum_type:
      name: Тип лепило на хартията за свиване
      description: Посочва лепилото (гумата), използвано по ръба на хартията за запечатване,
        което може да влияе върху вкуса и качеството на горене.
    rolling_paper_size:
      name: Размер на хартията за свиване
      description: Посочва стандартната класификация по размер на цигарената хартия
        или конус, позволявайки на клиентите бързо да изберат правилната ширина/дължина
        според нуждите си.
    rolling_stock_type:
      name: Тип подвижен железопътен състав
      description: Посочва какъв вид влак/релсово превозно средство представлява моделът
        (локомотив срещу пътнически/товарни вагони и често срещани подтипове вагони).
    roof_cargo_net_hook_fastener_style:
      name: Тип куки/закопчалки на мрежата за багаж на покрива
      description: Посочва стила на крайните крепежни елементи, използвани за свързване
        на мрежата към точките за закрепване (напр. S-кука, карабинер, J-кука).
    roof_height_class:
      name: Клас на височината на покрива
      description: Класифицира височината на покрива, която обикновено се използва
        при микробусите (особено важно при преустройствата/изграждането на кемпери).
    roof_type:
      name: Тип покрив
      description: Конфигурация на покрива или таванната секция на заграждението.
    root_variety:
      name: Сорт кореноплод
      description: Определя сорта или обичайния вид на кореноплода (напр. хрян спрямо
        истински сортове уасаби).
    rope_buoyancy:
      name: Плаваемост на въжето
      description: Посочва дали въжето е проектирано да плава на водната повърхност,
        помагайки на водачите да избегнат заплитане и улеснявайки изваждането му.
    rope_construction:
      name: Конструкция на въжето
      description: Посочва конструктивни детайли на влакната отвъд стила на оплитане,
        като усукана срещу плетена сърцевина/обвивка и дали въжето е от тип kernmantle.
    rope_material:
      name: Материал на въжето
      description: Посочва материала на въжето/кордата за настройка.
    rope_strand_compatibility:
      name: Съвместимост на нишките на въжето
      description: Посочва с кои конфигурации на въжето може да се използва осигурителното
        устройство (единично, половин/двойно, близначно или комбинации).
    rope_stretch_type:
      name: Тип разтягане на въжето
      description: Описва характеристиките на разтягане на въжето, като разграничава
        неразтегливо, слаборазтегливо, стандартно или бънджи изпълнение.
    rose_bloom_stage:
      name: Етап на цъфтеж на розата
      description: Посочва колко разцъфнали са розите при доставка/получаване (от
        пъпка до напълно разцъфнали).
    rose_grade:
      name: Клас на розата
      description: Търговски клас на качество на отрязани рози.
    rosette_center_type:
      name: Тип център на розетка
      description: Посочва типа централен декоративен елемент или вложка в предната
        част на розетката.
    rosin_dust_level:
      name: Ниво на прах от колофон
      description: Посочва очакваното количество прах от колофон, образувано при нормална
        употреба.
    rosin_formula_additives:
      name: Формула / добавки за колофон
      description: Определя отличителни характеристики на формулата, като хипоалергенна,
        нископрахова или с добавени метали смеси.
    rosin_hardness:
      name: Твърдост на колофона
      description: Посочва относителната твърдост/мекота на колофона за лък, която
        може да повлияе на сцеплението и образуването на прах при различни климатични
        условия и стилове на свирене.
    rotation_mechanism_type:
      name: Тип механизъм на въртене
      description: Посочва механизма, който позволява на въжето да се върти, влияейки
        върху плавността и постижимата скорост (напр. сачмени лагери спрямо втулки).
    rotation_motion_features:
      name: Характеристики на въртене/движение
      description: Посочва дали планетите/орбитите се въртят или движат и по какъв
        начин.
    rotor_configuration_type:
      name: Тип конфигурация на ротора
      description: 'Определя конфигурацията на ротора и типа управление на радиоуправляемия
        хеликоптер (например: коаксиален, еднороторен с фиксиран ъгъл на наклона срещу
        колективен ъгъл на наклона, многороторен), което оказва съществено влияние
        върху летателните характеристики и пригодността за различни нива на умения.'
    rotor_construction_type:
      name: Тип конструкция на ротора
      description: Посочва конструктивния стил на ротора, който влияе върху теглото,
        твърдостта и управлението на топлината.
    rotor_mounting_interface:
      name: Интерфейс за монтаж на ротора
      description: Определя стандарта на интерфейса на главината, използван за закрепване
        на ротора към колелото.
    rotor_mounting_standard:
      name: Стандарт за монтаж на ротора
      description: Посочва стандартa на интерфейса, използван за закрепване на ротора
        към главината (напр. 6-болтов или Center Lock).
    roulette_set_components_included:
      name: Включени компоненти в комплект рулетка
      description: Основни компоненти за рулетка, включени в колелото/комплекта.
    roulette_wheel_ball_track_type:
      name: Тип канал за топчето на рулетното колело
      description: Описва стила на канала за топчето върху колелото, който влияе върху
        реалистичността и усещането при игра.
    roulette_wheel_numbering_system:
      name: Система за номериране на рулетката
      description: Посочва номерацията на рулетното колело и конфигурацията на нулата
        за съвместимост с правилата/коефициентите на играта.
    rounders_equipment_included:
      name: Включено оборудване за раундърс
      description: Изброява конкретните елементи или аксесоари за играта „Раундърс“,
        включени в тренировъчния комплект или пакет, така че купувачите да знаят точно
        какво има в кутията.
    rounders_governing_body_approval:
      name: Одобрение от официалния орган на „Раундърс“
      description: Посочва сертификация или одобрение от официален орган по раундърс
        или друг спортен ръководен орган.
    row_counter_format:
      name: Формат на брояча на редове
      description: Посочва формата/типа на брояча на редове за плетене (напр. пръстен,
        верижка, кликер, дигитален).
    row_counter_mechanism:
      name: Механизъм на брояча на редове
      description: Указва как броят на редовете се увеличава/отбелязва на инструмента.
    row_counter_mounting_method:
      name: Метод за закрепване на брояча на редове
      description: Как броячът/маркерът се прикрепя по време на употреба (към игла,
        пръст, проекта и др.).
    rowel_type:
      name: Тип ролер
      description: Описва формата или профила на ръба на ролера според предпочитанията
        на ездача и чувствителността на коня.
    rowing_machine_part_type:
      name: Тип част за гребен тренажор
      description: Посочва конкретния компонент, който продуктът е предназначен да
        замени на гребен тренажор, така че купувачите бързо да намират точната част,
        без да се създават прекалено много микрокатегории.
    rubber_ducky_character_theme:
      name: Тема/герой на гуменото пате
      description: Дизайнът на модела или образа на гуменото пате (подходящ за сувенирни/колекционерски
        патета).
    rubber_ducky_features:
      name: Характеристики на гуменото пате
      description: Функционални/дизайнерски характеристики, специфични за гумени патета
        за баня.
    rubber_ducky_size_class:
      name: Размерен клас на гумено пате
      description: Удобно за купувачите групиране по размер на гумените патета според
        типичната употреба (играчка за вана, украса за торта, гигантски размер).
    ruffle_style:
      name: Стил на волана
      description: Описва конструкцията или визуалния стил на къдрицата на декоративната
        лента за стол.
    rugby_headgear_safety_certification:
      name: Сертифициране на защитни каски за ръгби
      description: Показва дали протекторът за глава отговаря на официалните стандарти
        за безопасност в ръгби или общите спортни стандарти.
    rugby_size:
      name: Размер на ръгби топка
      description: Категоризира екипировката според стандартните размерни означения,
        използвани при ръгби продуктите.
    rugby_variant:
      name: Вариант на ръгби
      description: Указва варианта (код или формат) на ръгби, за който е предназначен
        продуктът.
    ruler_edge_type:
      name: Тип ръб на линийка
      description: Посочва профила/функцията на ръба, използван за измерване или маркиране
        (напр. прав ръб, скосен ръб, борд).
    ruler_marking_style:
      name: Тип маркировка на линийката
      description: Описва оформлението на маркировките/водачите, отпечатани върху
        линийката, отвъд основните деления.
    runner_configuration:
      name: Конфигурация на плъзгача
      description: Описва броя и разположението на плъзгачите върху шейната.
    runner_material:
      name: Материал на плъзгачите
      description: Посочва материала, използван за плъзгачите или плъзгащите ленти
        на шейната.
    saddle_cover_style:
      name: Стил на калъфа за седло
      description: Класифицира общия дизайн или начина на употреба на продукта (напр.
        предпазно покривало за съхранение, покривало за каране, чанта за пренасяне).
    saddle_design:
      name: Дизайн на седлото
      description: Класифицира цялостния ергономичен или релефен дизайн/стил на седлото
        (напр. с отвор, без нос, разделен нос, с пружини).
    saddle_discipline:
      name: Дисциплина на седлото
      description: Определя основната дисциплина на езда или предназначението/стила
        на седлото.
    saddle_mounting_type:
      name: Тип монтаж на седлото
      description: Посочва начина на свързване между седалката и стойката за седалка
        за съвместимост (напр. с релси, тип „пивот“, тип „I-лъч“).
    saddle_pad_shape:
      name: Форма на подложката за седло
      description: Описва физическата форма/контур на подложката, което влияе върху
        съвместимостта със седлото и естетическите предпочитания.
    saddle_pad_style:
      name: Стил на подложката за седло
      description: Посочва функционалния стил на подложката или предназначената за
        нея дисциплина, което позволява на ездачите да изберат подходящия модел за
        своята дейност или тип седло.
    saddle_padding_material:
      name: Материал на подплънката на седлката
      description: Посочва основния омекотяващ материал или технология в седалката,
        които влияят върху комфорта и усещането при каране.
    saddle_rail_material:
      name: Материал на релсите на седлото
      description: Посочва материала, използван за релсите под велосипедната седалка,
        което влияе върху здравината, комфорта, теглото и цената.
    saddle_tree_material:
      name: Материал на основата на седлото
      description: Посочва материала, използван за основата (рамката) на седлото —
        вътрешната конструкция на седлото.
    saddle_tree_width:
      name: Ширина на основата на седлото
      description: Описва класификацията на ширината на седловата конструкция, която
        определя прилягането към холката на коня.
    safety_documentation_available:
      name: Налична документация за безопасност
      description: Посочва кои документи за съответствие/безопасност са предоставени
        за съставката (напр. информационен лист за безопасност, IFRA сертификат/декларация,
        декларация за алергени).
    safety_equipment_included:
      name: Включено оборудване за безопасност
      description: Предпазни/защитни елементи, включени в комплекта.
    safety_features:
      name: Характеристики за безопасност
      description: Посочва вградените предпазни функции, предназначени да намалят
        риска от случайни порязвания или да защитят острието по време на съхранение.
    safety_harness_type:
      name: Тип предпазен колан
      description: Посочва стила и конфигурацията на предпазния колан за задържане
        на дете, предоставен със седалката.
    safety_mechanism_type:
      name: Тип предпазен механизъм
      description: Описва стила на вградената система за безопасност, използвана за
        улавяне на щангата при неуспешно вдигане.
    safety_restraint_type:
      name: Тип предпазна обезопасителна система
      description: Тип вградено детско обезопасяване на седалката на люлката, ако
        има такова.
    safety_warning:
      name: Предупреждение за безопасност
      description: Посочва дали продуктът съдържа стандартни предупреждения за безопасност,
        свързани с топчета за игра (напр. опасност от задавяне).
    sail_shape:
      name: Форма на платното
      description: Описва геометричния стил на платното за каяк, който влияе върху
        ефективността, управлението и монтажа.
    salad_dressing_type:
      name: Вид дресинг за салата
      description: Посочва основния стил или текстура на дресинга (напр. кремообразен,
        винегрет, на основа кисело мляко), помагайки на купувачите да различават различните
        основи и консистенции.
    salad_topping_base_ingredient:
      name: Основна съставка на салатния топинг
      description: Посочва основната група съставки, които изграждат топинга, помагайки
        на клиентите да филтрират според хранителни предпочитания, алергени или желана
        текстура.
    salt_level:
      name: Ниво на соленост
      description: Посочва количеството сол или натрий, добавени към ядките или семената.
    sand_cup_features:
      name: Характеристики на формичката за пясък
      description: Функционални/физически характеристики на пясъчната чашка, които
        влияят върху играта и употребата.
    sand_shovel_handle_style:
      name: Тип дръжка на лопатката за пясък
      description: Описва формата на дръжката/захвата в края на дръжката на лопатата/копача.
    sand_toy_set_pieces_included:
      name: Включени елементи в комплект играчки за пясък
      description: Изброява видовете компоненти за игра в пясък, включени в комплекта
        (напр. кофа, лопатка, формички), за да помогне на потребителите да сравняват
        комплектите според съдържанието им.
    sand_water_mill_items_included:
      name: Включени елементи към пясъчно-водната мелница
      description: Изброява основните аксесоари, включени към играчката мелница (кофички,
        лопатки, формички и др.).
    sandbag_style:
      name: Стил на пясъчен чувал
      description: Посочва конкретния дизайн и предназначението за тренировка на пясъчната
        торба (напр. Bulgarian, Strongman, Power), помагайки на купувачите да избират
        между различни тренировъчни стилове.
    sandbox_bottom_type:
      name: Тип дъно на пясъчник
      description: Тип конструкция на основата/дъното под пясъка
    sandbox_drainage_type:
      name: Тип дренаж на пясъчника
      description: Описва как пясъчникът отвежда водата (ако е приложимо), например
        чрез дренажни отвори или подвижна тапа.
    sandbox_seating_type:
      name: Тип седалка за пясъчник
      description: Посочва дали пясъчникът включва вградени места за сядане и какъв
        тип са те.
    sapodillo_variety:
      name: Сорт саподила
      description: Посочва конкретния сорт или разновидност на саподила/чику (напр.
        „Alano“, „Prolific“), позволявайки на любителите да изберат предпочитан вкусов
        профил и характеристики.
    sapote_variety:
      name: Сорт сапоте
      description: Посочва конкретния вид/сорт сапоте (напр. черно, бяло, мамей),
        като позволява разграничаване между различните видове.
    satin_ribbon_face_type:
      name: Тип лице на сатенената панделка
      description: Посочва дали панделката има сатенено покритие от едната или от
        двете страни.
    sauce_consistency:
      name: Консистенция на соса
      description: Описва текстурата или гъстотата на соса за пица.
    sauce_product_form:
      name: Форма на продукта за сос
      description: Посочва физическата форма на соса, като течност, олио, паста, прах,
        люспи или сироп.
    sauce_variety:
      name: Вид сос
      description: Определя конкретния стил или вид рецепта на белия или сметановия
        сос (напр. Алфредо, бешамел, холандез).
    saxophone_body_finish:
      name: Покритие на тялото на саксофона
      description: Описва основното покритие/плътност на повърхността на тялото на
        саксофона (отделно от механиката на клавишите).
    saxophone_body_type:
      name: Тип корпус на саксофон
      description: Описва цялостната физическа конфигурация на корпуса и ориентацията
        на камбаната на бас саксофона.
    saxophone_construction_style:
      name: Стил на конструкцията на саксофона
      description: Посочва обичайните конструктивни характеристики на саксофона, които
        влияят върху издръжливостта, резонанса и поддръжката.
    saxophone_included_accessories:
      name: Включени аксесоари за саксофон
      description: Изброява включените аксесоари, които обикновено се доставят с комплект
        алт саксофон.
    saxophone_key_system:
      name: Система на клапите на саксофона
      description: Посочва системата на клапите на саксофона (разположение/стандарт
        на механизма), използвана в инструмента.
    saxophone_key_touch_material:
      name: Материал на накрайниците на клавишите на саксофона
      description: Посочва материала на контактните повърхности на клавишите на саксофона
        (напр. перлени вложки на клавишите).
    saxophone_mouthpiece_baffle_type:
      name: Вид на вътрешната преграда на мундщука на саксофона
      description: Описва дизайна на бафъла, който оформя въздушния поток и яркостта
        на звука.
    saxophone_neck_type:
      name: Тип гриф на саксофон
      description: Посочва конфигурацията на грифа, включен с бас саксофона.
    saxophone_package_contents:
      name: Съдържание на комплекта за саксофон
      description: Посочва кои ключови аксесоари са включени към саксофона (напр.
        калъф, мундщук, стяга, каишка за врат, комплект за почистване).
    saxophone_reed_cut:
      name: Тип изрязване на езичето за саксофон
      description: Посочва изрязването/стила на езичето за саксофон, което влияе върху
        реакцията, тона и усещането.
    saxophone_reed_material_type:
      name: Тип материал на езичето за саксофон
      description: Посочва категорията на материала на езичето (напр. естествено или
        синтетично).
    saxophone_reed_strength_scale:
      name: Скала за твърдост на тръстиката за саксофон
      description: Посочва системата/скалата за означаване на твърдостта на езичето
        (често зависеща от марката), позволявайки по-ясно сравнение между различни
        продукти.
    saxophone_small_part_thread_size:
      name: Размер на резбата на малките части за саксофон
      description: Посочва размера/стандарта на резбата за малките резбовани части
        на саксофона (главно винтове), позволявайки правилен избор на съвместими части.
    saxophone_swab_application_area:
      name: Зона на приложение на почистващата кърпа за саксофон
      description: Посочва коя част от саксофона е предназначен да почиства/подсушава
        почистващият тампон.
    scabbard_material:
      name: Материал на канията
      description: Определя основния материал на включената кания/ножница (ако има
        такава).
    scale_model_assembly_status:
      name: Статус на сглобяване на мащабния модел
      description: Посочва дали умаленият модел е готов за показване или изисква сглобяване/боядисване.
    scale_model_car_features:
      name: Характеристики на умаления модел автомобил
      description: Забележителни характеристики на модел автомобил, като отварящи
        се врати/капак, управляеми колела, окачване и др.
    scale_model_kit_assembly_requirements:
      name: Изисквания за сглобяване на комплект умален модел
      description: Посочва какви допълнителни стъпки/материали за сглобяване обикновено
        са необходими отвъд базовото сглобяване чрез щракване.
    scale_model_kit_components_included:
      name: Включени компоненти в комплекта на умаления модел
      description: Изброява какво е включено към умаления модел/комплект на танк (напр.
        стикери, фигурки, фотоецвани части).
    scale_model_paint_status:
      name: Статус на боядисване на умаления модел
      description: Посочва дали моделът на хеликоптер е предварително боядисан/завършен
        или изисква боядисване.
    scale_model_pose:
      name: Поза на мащабния модел
      description: Посочва изобразената поза на модела на коня за съвпадение с витрина/диорама.
    scale_model_rotor_configuration:
      name: Конфигурация на ротора на умален модел
      description: Указва конфигурацията на ротора на хеликоптера, изобразена от модела.
    scale_model_truck_era:
      name: Епоха на умален модел камион
      description: Показва епохата/периода от времето на реалния камион, който моделът
        представлява (полезно за колекционери, търсещи ретро срещу модерни камиони).
    scale_model_truck_propulsion_type:
      name: Епоха на умален модел камион
      description: Посочва дали изобразеният камион е дизелов, бензинов, електрически,
        хибриден или друг тип задвижване (както е представено/маркетирано от модела).
    scale_units:
      name: Мерни единици на скалата
      description: Мерните единици, отпечатани/гравирани върху раменото за задаване
        на радиус/диаметър.
    scent_function:
      name: Функция на аромата.
      description: Определя основната функция на ароматния продукт, така че ловците
        бързо да намерят подходящия продукт (напр. примамка срещу неутрализатор на
        миризма).
    scent_source:
      name: Източник на аромат
      description: Изброява основния биологичен или ароматен източник, използван във
        формулата на продукта, включително видове урина, хранителни аромати, растителни
        аромати и др.
    school_bus_body_type:
      name: Тип каросерия на училищния автобус
      description: Класифицира училищния автобус по често срещани формати на каросерията/класа,
        използвани на пазара (напр. тип A–D).
    school_bus_safety_feature:
      name: Функция за безопасност на училищен автобус
      description: Забележимо оборудване за безопасност, инсталирано на училищния
        автобус.
    school_glue_washability:
      name: Възможност за измиване на училищното лепило
      description: Посочва колко лесно изсъхналото/мокрото лепило може да бъде почистено
        от кожа/дрехи/повърхности.
    scissors_application:
      name: Предназначение на ножиците
      description: Основно предназначение за рязане или материал, за който са предназначени
        ножиците.
    scooter_brake_pad_material:
      name: Материал на спирачните накладки за скутер
      description: Посочва състава, използван в спирачните накладки, който влияе върху
        производителността, шума и живота им.
    scoring_method:
      name: Метод на точкуване
      description: Посочва начина за отбелязване на резултата на масата за футбол
        на маса (джаги), като например ръчни броячи с топчета или електронни табла.
    scoring_pattern:
      name: Модел на отбелязване на точки
      description: Разположение на зоните за отбелязване на точки, отпечатани върху
        игралното поле.
    scoring_system_type:
      name: Тип система за точкуване
      description: Описва стила на механизма за водене на резултата, включен към масата,
        като ръчни плъзгачи или различни електронни дисплеи.
    scottish_smallpipes_bag_material:
      name: Материал на торбата за шотландски гайди
      description: Посочва материала на торбата (въздушния резервоар), предоставена
        с шотландските гайди.
    scottish_smallpipes_drone_tuning_configuration:
      name: Конфигурация на настройката на дроновете на шотландски малки гайди.
      description: Посочва конфигурацията на настройка на дроновете, доставена с инструмента
        (височината и ролята на дроновете спрямо тониката).
    scottish_smallpipes_reed_type:
      name: ид на тръстиката за шотландски малки гайди
      description: Посочва типа езиче, използвано за чантерa (и/или дали езичетата
        са синтетични или от тръстика).
    scraping_surface_type:
      name: Тип повърхност за стъргане
      description: Посочва конструкцията/геометрията на повърхността за стъргане,
        която създава звук (напр. с канали, с гребен/зъби, гофрирана).
    screw_drive_type:
      name: Тип задвижване на винта
      description: Посочва вида на задвижващия профил на главата на винта или болта,
        който определя необходимия инструмент за затягане или развиване (напр. шестостенен/Ален,
        Torx).
    screw_thread_size:
      name: Размер на резбата на винта
      description: Посочва стандарта за размер на резбата на включените или съвместими
        винтове (напр. M4, M5, M6).
    sculpting_clay_base_type:
      name: Тип основа за моделираща глина
      description: Описва основната формула/база на скулптурната глина.
    seafood_cut:
      name: Начин на нарязване на морските дарове.
      description: Описва физическото разрязване или представяне на морския продукт
        (напр. цял, филе, стек).
    seafood_processing_method:
      name: Метод за обработка на морски дарове
      description: Посочва основната техника за консервиране или обработка, приложена
        към морските дарове, като пушене, осоляване или лиофилизиране.
    seafood_source:
      name: Източник на морски дарове
      description: Посочва дали морските дарове са уловени в дивата природа, отглеждани
        във ферма, на растителна основа или от друг източник, помагайки на купувачите
        да оценят устойчивостта и качеството.
    seal_material:
      name: Материал на уплътнението
      description: Материал, използван за уплътненията около врата, китките и глезените,
        които поддържат костюма водонепроницаем.
    seal_type:
      name: Тип уплътнение
      description: Посочва метода на уплътняване, използван от фитинга за предотвратяване
        на течове на охладителна течност.
    sealant_formulation:
      name: Формула на уплътнителя
      description: Посочва основната химическа формула или технология на добавките
        на уплътнителя за велосипедни гуми (напр. на латексова основа, подсилен с
        влакна, акрилен).
    seals_leak_type:
      name: Тип теч на уплътненията
      description: Вид/местоположение на теча от охладителната система, който продуктът
        е предназначен да уплътни.
    seam_construction:
      name: Конструкция на шевове
      description: Описва как се създава шевът на топката, което влияе върху замаха,
        издръжливостта и усещането.
    seam_design:
      name: Дизайн на шева
      description: Посочва конструкцията на шевовете или декоративните характеристики
        на шевовете на чорапогащника.
    seam_gauge_scale_type:
      name: Тип скала на шевомер
      description: Посочва допълнителните скали/маркировки върху шевната линийка освен
        основната измервателна скала.
    seam_gauge_slider_material:
      name: Материал на плъзгача на шевомера
      description: Посочва материала на регулируемия плъзгач/показалец, когато има
        такъв.
    seam_ripper_tip_style:
      name: Стил на върха на разкъсвача на шевове
      description: Описва функционалния дизайн на върха, използван за промушване под
        шевовете и безопасно рязане на конци.
    seam_sealing_type:
      name: Тип уплътняване на шевовете
      description: Описва метода, използван за предотвратяване на проникването на
        вода през шевовете на дъждобрана (напр. напълно подлепени, заварени).
    seam_type:
      name: Вид шев
      description: Описва стила на шевовете на бейзболната топка, който влияе върху
        захвата, аеродинамиката и предназначеното ниво на игра.
    season_condition_protection:
      name: Защита според сезона/условията
      description: Посочва основните метеорологични условия, за които е предназначено
        покривалото за предно стъкло.
    season_rating:
      name: Сезонен рейтинг
      description: Посочва сезонния рейтинг на палатката, показващ нейната пригодност
        за различни метеорологични условия (напр. 3-сезонна, 4-сезонна, 5-сезонна/експедиционна).
    seasoning_variety:
      name: Разнообразие от подправки
      description: Класифицира подправката според начина на приготвяне или традиционната
        ѝ кулинарна употреба.
    seat_adjustment_power_type:
      name: Тип задвижване на регулирането на седалката
      description: Посочва как се задвижват механизмите за регулиране на седалката
        (ръчни лостове или електрически мотори), което може да повлияе на окабеляването/съвместимостта.
    seat_belt_attachment_type:
      name: Тип закрепване на предпазния колан
      description: Описва как се закрепва коланът към механизма на автомобила/колана.
    seat_belt_buckle_electrical_connector_type:
      name: Тип електрически конектор за катарамата на предпазния колан
      description: Посочва конектора/интерфейса, използван за окабеляването на ключа
        на катарамата/обтегача, когато е приложимо.
    seat_belt_buckle_mounting_type:
      name: Тип закрепване на катарамата на предпазния колан
      description: Описва начина на закрепване на закопчалката/приемника към автомобила,
        седалката или коланната стойка (напр. с болтове, щракващо закрепване).
    seat_belt_buckle_release_button_color:
      name: Цвят на бутона за освобождаване на катарамата на предпазния колан
      description: Указва цвета на бутона за освобождаване на ключалката.
    seat_belt_cover_placement:
      name: Разположение на калъфа на предпазния колан
      description: Посочва върху коя част на предпазния колан е предназначен да се
        използва калъфът.
    seat_belt_integration:
      name: Интеграция на предпазния колан
      description: Посочва дали седалката включва вграден предпазен колан и/или гнездо
        за закопчалката, или дали е необходимо да се прехвърли оригиналното (OEM)
        гнездо за закопчалката от автомобила за монтаж.
    seat_belt_provision:
      name: Осигуряване на предпазен колан
      description: Посочва дали предпазните колани и/или свързаните с тях елементи
        (например катарами) са включени към комплекта на задната седалка или трябва
        да бъдат прехвърлени от оригиналната седалка.
    seat_belt_strap_installation_location:
      name: Място за монтаж на лентата на предпазния колан
      description: Показва къде е монтирана каишката в системата на коланите.
    seat_cover_placement:
      name: Разположение на калъфа за седалка
      description: Посочва за коя/кои позиции на седалките в автомобила е предназначен
        калъфът.
    seat_cover_securement_method:
      name: Метод за закрепване на калъфа на седалката
      description: Посочва основния начин, по който калъфът за седалка се закрепва
        към седалката. Ако се използват няколко метода, изберете основния/главния.
    seat_cover_set_contents:
      name: Съдържание на комплекта калъфи за седалки
      description: Описва какви части са включени в комплекта (напр. само долни части
        на седалките срещу пълен комплект + подглавници).
    seat_fabric:
      name: Плат на седалката
      description: Основен плат, използван за седалката и облегалката тип „слинг“
        на стола.
    seat_height_category:
      name: Категория височина на седалката
      description: Класифицира табуретката според типичния диапазон на височината
        на седалката (напр. за кухненски плот или бар), за да улесни избора.
    seat_material:
      name: Материал на седалката
      description: Идентифицира основния материал на повърхността за сядане на пейката.
    seat_mounting_type:
      name: Тип монтаж на седалката
      description: Конфигурация на монтажните релси/направляващи, използвани за закрепване
        на седалката към пода на автомобила.
    seating_surface_material:
      name: Материал на повърхността за сядане
      description: 'Определя материала, от който е изработена повърхността, върху
        която човек се настанява (например: мрежа от текстилен, плат от слама, ракита,
        тапицерия с мека подложка).'
    seatpost_clamp_mechanism:
      name: Механизъм за затягане на колчето на седалката
      description: Тип на затягащата/заключващата система, която фиксира колчето на
        седалката.
    section_orientation_compatibility:
      name: Съвместимост с ориентацията на секцията
      description: Посочва дали аксесоарът пасва на лява секция, дясна секция или
        универсална ориентация.
    sectional_configuration:
      name: Конфигурация на секционния модул
      description: Определя конкретния модул или ориентация на секционния елемент
        (напр. ъглов, ляв край с подлакътник, шезлонг), така че клиентите да могат
        да сглобяват желаните конфигурации.
    sectional_shape:
      name: Секционна форма
      description: Определя цялостната геометрична конфигурация/оформление на секционния
        диван.
    secured_components:
      name: Закрепени компоненти
      description: Изброява конкретните велосипедни части, които заключващият шиш
        или защитните гайки предпазват (напр. предно колело, задно колело, колче на
        седалката).
    seed_content:
      name: Съдържание на семената
      description: Посочва дали цитрусовият плод е без семки, с малко семки или с
        много семки.
    seed_size_classification:
      name: Класификация на размера на семената
      description: Посочва относителния размер на негодната за консумация семка в
        личито, който влияе върху количеството ядлива месеста част.
    self_adhesive_backing_format:
      name: Формат на самозалепващата основа
      description: Физически формат на самозалепващата подложка, доставяна с фитила
        (напр. предварително поставена лепенка срещу отделни стикери и др.).
    self_adhesive_hook_loop_backing_type:
      name: Тип основа на самозалепваща се велкро лента
      description: Посочва конструкцията на подложката/защитния слой и лепилната система,
        използвани от самозалепващата страна.
    self_adhesive_hook_loop_fastener_shape:
      name: Форма на самозалепващо велкро
      description: Посочва изрязването/формата на доставените елементи за закрепване.
    self_hardening_clay_finish:
      name: Финиш на самовтвърдяваща се глина
      description: Описва повърхностния вид/блясък след пълно втвърдяване (напр. естествен
        мат, сатенен и др.), полезно при избор на завършек.
    self_hardening_clay_water_resistance_after_curing:
      name: Устойчивост на вода на самовтвърдяваща се глина след изсъхване
      description: Показва устойчивост на вода след пълно втвърдяване (без допълнителен
        уплътнител).
    sensor_functions:
      name: Функции на сензора
      description: Показва кои показатели за колоездене измерва сензорът.
    sensor_measurement_mode:
      name: Режим на измерване на сензора
      description: Посочва кои показатели може да отчита сензорът (напр. само каданс,
        само скорост, двойно измерване на скорост и каданс).
    sensor_mounting_position:
      name: Позиция за монтаж на сензора
      description: Посочва мястото на велосипеда или върху колоездача, където е монтиран
        сензорът, като например курбел, главина на колело или обувка. Това се отразява
        на съвместимостта с различни настройки за велосипеди.
    sensor_mounting_type:
      name: Тип монтаж на сензора
      description: Посочва как MAP сензорът се монтира към всмукателния колектор/двигателя
        (напр. фланец с болтове срещу вградена гумена втулка).
    sensor_or_gauge_mounting_location:
      name: Място на монтаж на сензора или измервателния уред
      description: Посочва къде в автомобила е предназначен да бъде монтиран сензорът
        или измервателният уред (на ниво система/местоположение, а не ляво/дясно).
    sensory_modality:
      name: Сензорна модалност
      description: Основно(и) сетивно(и) преживяване(ия), които играчката е проектирана
        да предоставя (може да е мултисензорна).
    sensory_toy_fidget_mechanism:
      name: Сензорна играчка с механизъм за въртене
      description: Основно взаимодействие/механизъм, използван за нервност и саморегулация.
    sensory_toy_light_features:
      name: Светлинни функции на сензорна играчка
      description: Светлинни поведения/ефекти, предоставяни от играчката.
    sensory_toy_texture_type:
      name: Вид текстура на сензорната играчка
      description: Доминиращи повърхностни усещания/текстури, използвани за тактилна
        стимулация.
    sequin_application_method:
      name: Метод за нанасяне на пайети
      description: Как пайетата са предназначени да бъдат поставяни/използвани (пришиване,
        лепене, термофиксиране и др.).
    sequin_finish:
      name: Финиш на пайетите
      description: Описва повърхностния/визуалния финиш и отразяващия ефект на пайетите
        върху нашивката (напр. матов, металик, холограмен), а не основата или начина
        на закрепване на нашивката.
    serger_stitch_functions:
      name: Функции на оверлог шева
      description: Функции на шевовете, които оверлок машината поддържа (варианти
        на оверлок/обшивни шевове и специални оверлок шевове).
    serger_thread_count:
      name: Брой конци на оверлог машината
      description: Брой конци, които оверлог машината може да използва за шиене (напр.
        2/3/4/5-конечна функционалност).
    service_interval:
      name: Интервал за сервизна поддръжка
      description: Препоръчителен максимален интервал между задължителните инспекции/обслужвания
        в оторизиран сервизен център.
    serving_temperature:
      name: Температура на сервиране
      description: Посочва предназначената температура на сервиране или състояние
        на продукта при консумация.
    sesame_seed_hull_status:
      name: Състояние на обвивката на сусамовото семе
      description: Посочва дали таханът е направен от белени или небелени сусамови
        семена, което влияе на цвета, вкуса и хранителната стойност.
    sesame_seed_roast_level:
      name: Степен на печене на сусамово семе
      description: Посочва колко силно са били изпечени сусамовите семена преди смилане,
        помагайки на клиентите да изберат предпочитаната интензивност на вкуса.
    sesame_seed_variety:
      name: Сорт сусамово семе
      description: Идентифицира цвета или сорта сусамови семена, използвани за направата
        на маслото.
    set_classification:
      name: Класификация на комплекта
      description: Определя предназначеното ниво или стил на игра на комплекта за
        крокет (напр. турнирно, развлекателно, пътническо).
    set_components:
      name: Компоненти на комплекта
      description: Показва какви артикули са включени в продукта (напр. само централен
        лост или пълен комплект).
    set_items_included:
      name: Включени елементи в комплекта
      description: Посочва дрехите или аксесоарите, включени в комплекта, като плат
        за сари, дупата или колан.
    setup_mechanism:
      name: Механизъм за сглобяване
      description: Описва основния начин на разпъване на палатката (напр. автоматично
        разгъваща се, надуваема/с въздушни греди, покривна тип „мидена черупка“).
    setup_type:
      name: Тип сглобяване
      description: Как палатката/тунелът за игра се сглобява или разгъва.
    sew_in_interfacing_elasticity:
      name: Еластичност на пришивната подлепваща материя
      description: Посочва дали пришивната подлепваща материя е еластична и ако да
        — в кои посоки, за да съответства на плетени или тъкани проекти.
    sew_in_label_placement:
      name: Място на зашиване на етикета.
      description: Показва предвиденото местоположение на готовия артикул.
    sew_on_edge_finish:
      name: Финиш на ръба за пришиване
      description: Посочва дали краищата на велкро лентата са необработени/изрязани
        или завършени, за да се предотврати разнищване.
    sew_on_rhinestone_hole_orientation:
      name: Ориентация на отворите за зашиване на кристали за пришиване
      description: Подредба/ориентация на отворите спрямо кристала (напр. един до
        друг, срещуположни, кръстосани), за да поддържат различни стилове на пришиване.
    sewing_kit_components_included:
      name: Включени компоненти в шивашки комплект
      description: Изброява шивашките принадлежности/инструменти, включени в шивашки
        комплект, за да могат клиентите да сравняват съдържанието на различните комплекти.
    sewing_machine_bobbin_class:
      name: Клас на шпулата за шевна машина
      description: Посочва класа/системата на калерчето, съвместимо с шевната машина
        за калерчета и калерчета-държачи.
    sewing_machine_buttonhole_type:
      name: Тип илици на шевна машина
      description: Метод за създаване на илици, поддържан от машината.
    sewing_machine_display_type:
      name: Тип дисплей на шевна машина
      description: Вид интерфейс за управление/дисплей на шевната машина.
    sewing_machine_needle_point_type:
      name: Тип на върха на иглата на шевната машина
      description: Определя геометрията/типа на върха на иглата, който влияе на начина
        на проникване в различни тъкани (напр. остър, за трикотаж, клиновиден).
    sewing_machine_needle_system:
      name: Система на иглата за шевна машина
      description: Стандартизираната система/моделен номер на иглата, който определя
        съвместимостта с машината (напр. 130/705 H, HAx1, DBx1, 15x1 и др.).
    sewing_machine_needle_type:
      name: Тип игла за шевна машина
      description: Посочва предназначението/типа на иглата (напр. универсална, за
        трикотаж, за дънков плат), което влияе върху качеството на шева и съвместимостта
        с различни материи.
    sewing_machine_shank_type:
      name: Тип стебло на игла за шевна машина
      description: Посочва стандарта на интерфейса на държача/рамото на притискащото
        краче, за който е предназначено крачето, осигурявайки съвместимост с шевната
        машина (напр. ниско рамо, високо рамо, наклонено рамо).
    sewing_pattern_accessory_type:
      name: Вид аксесоар за шевни кройки
      description: Посочва какъв аксесоар изработва шивашкият модел.
    sewing_pattern_notions_required:
      name: Необходими шивашки материали (аксесоари) за кройката
      description: Посочва допълнителните материали/елементи, необходими за изработване
        на проекта (извън плат и конец).
    sewing_pattern_recommended_fabric:
      name: Препоръчителен плат за шивашки модел
      description: Изброява препоръчителните типове/плътности плат за шивашкия модел
        (според указанията на дизайнера на модела).
    sewing_pattern_size_range:
      name: Диапазон размери на шивашки модел
      description: Посочва диапазона от размери, за който е предназначена кройката
        (напр. бебешки до възрастни, макси размери).
    sewing_thread_size_system:
      name: Система за означаване на размера на шевния конец
      description: Стандартът за оразмеряване, използван за обозначаване размера на
        конеца (напр. Tex, Denier, Ticket, номер по тегло, V размер).
    shaft_curvature:
      name: Изкривяване на вала
      description: Описва общата форма на дръжката, която влияе върху просвета, движението
        и ергономията.
    shaft_kick_point:
      name: Точка на огъване на вала
      description: Посочва мястото по вала, където той се огъва най-много по време
        на замах, влияейки върху траекторията на полета на топката.
    shaft_length_type:
      name: Тип дължина на вала
      description: Стандартно използвано категорийно означение за размера на стреличките
        (напр. къси, средни), когато не са посочени точни размери в милиметри.
    shaft_shape:
      name: Форма на дръжката
      description: Определя профила на напречното сечение на шафта на тонфата (напр.
        кръгъл, квадратен, осмоъгълен).
    shaker_fill_material:
      name: Материал на пълнежа на шейкъра
      description: Посочва основния вътрешен пълнеж, използван за създаване на shaker
        звук (когато е приложимо), като мъниста, семена или сачми.
    shaker_shell_material:
      name: Материал на корпуса на шейкъра
      description: Указва основния материал на корпуса на яйцевидния шейкър (външната
        обвивка).
    shallot_variety:
      name: Сорт шалот
      description: Посочва конкретния култивар, търговски тип или сорт на продукта
        шалот.
    shank_style:
      name: Тип на опашката (държача)
      description: Описва общата форма на лостовите рамена на мундщука (напр. прави,
        извити или тип за паша).
    shapewear_enhancement_feature:
      name: Функция за подобряване на оформящото бельо
      description: Подчертава основното функционално подобрение, предлагано от дрехата
        (напр. прибиране на корема, повдигане на седалището, непропусклива подплата).
    sheath_type:
      name: Вид на ножницата
      description: Посочва вида на ножницата/калъфа, включен с колекционерския нож.
    sheet_music_clip_padding_material:
      name: Материал на подплатата на щипката за ноти
      description: Материал на подплатата на захвата/челюстите, която контактува с
        нотния лист или ръба на стойката, за да предотвратява разкъсване и приплъзване.
    sheet_music_clip_spring_tension_level:
      name: Ниво на опън на пружината за щипка за ноти
      description: Относителна сила на пружината/притискащата сила на щипката.
    sheet_music_clip_use_environment:
      name: Среда на използване на щипката за ноти
      description: Основната целева среда, в която щипката работи най-добре.
    shell_construction:
      name: Конструкция на корпуса
      description: Посочва как е конструиран корпусът на бас барабана, което силно
        влияе върху тона и теглото.
    shell_finish:
      name: Финиш на корпуса
      description: Външна повърхностна обработка на корпуса на думбека.
    shell_hull_status:
      name: Състояние на корпуса/обвивката
      description: Посочва дали ядките, или семената се предлагат с черупка/обвивка
        или са обелени/без обвивка.
    shift_boot_attachment_method:
      name: Метод за закрепване на маншона на скоростния лост
      description: Посочва как маншонът на скоростния лост се закрепва към централната
        конзола/облицовката около лоста (напр. щракваща рамка, задържащ пръстен, лепило).
    shift_boot_installation_hardware_included:
      name: Включен монтажен обков за маншона на скоростния лост
      description: Посочва включените монтажни елементи и компоненти за маншона на
        скоростния лост.
    shift_knob_illumination:
      name: Осветление на топката на скоростния лост
      description: Посочва дали топката на скоростния лост включва осветление и какъв
        е методът/типът на осветяване (напр. фотолуминесцентно, LED, оптично влакно,
        подсветка).
    shift_knob_installation_method:
      name: Метод за монтаж на топката на скоростния лост
      description: Посочва как топката на скоростния лост се закрепва към лоста.
    shift_knob_shape:
      name: Форма на топката (главата) на скоростния лост
      description: Описва цялостния ергономичен типоразмер на скоростния лост.
    shift_pattern_type:
      name: Тип схема на скоростите
      description: Посочва стила на маркировката на предавките върху топката на скоростния
        лост (ако има такава).
    shifter_compatibility:
      name: Съвместимост на скоростния лост
      description: Посочва дали удължението за кормило е съвместимо с електронни скорости,
        механични скорости, и с двата типа, или не е съвместимо със скоростни лостове.
    shifter_mounting_interface:
      name: Интерфейс за монтаж на скоростния лост
      description: Описва как командата за скорости се закрепва към велосипеда (напр.
        отделен захват, I-Spec, MatchMaker, монтаж в края на кормилото, на долната
        тръба, безжично).
    shifting_actuation_type:
      name: Тип задвижване на превключването
      description: Посочва механизма, използван за смяна на предавките в групсета
        (механичен, електронен с кабел, електронен безжичен, хидравличен).
    shifting_mechanism:
      name: Механизъм за превключване
      description: Посочва дали командата за скорости работи механично или електронно
        и дали е индексна или фрикционна.
    shim_purpose:
      name: Предназначение на шайбата
      description: Определя функционалния тип на продукта (напр. подложка, клин, дистанционер),
        така че колоездачите бързо да намират правилното решение за настройка без
        нужда от отделни подкатегории.
    shin_guard_attachment_method:
      name: Метод за закрепване на протектор за пищял
      description: Класифицира общия дизайн на протектора за пищял, включително интеграция
        с протектор за глезен или конструкция тип чорап.
    shirt_cuff_style:
      name: Стил на маншета на ризата
      description: Описва конструкцията на маншета на ръкава, която влияе на формалността,
        използването на копчета за ръкавели и удобството.
    shochu_base_ingredient:
      name: Основна суровина за шочу
      description: Идентифицира основния източник на нишесте или захар, използван
        за производството на шочу.
    shochu_soju_variety:
      name: Разнообразие шочу и соджу
      description: Класифицира продукта по разпознат стил или вид производство.
    shock_absorber_bushing_material:
      name: Материал на втулката на амортисьора
      description: Материал на монтажните втулки/изолатори, включени към или вградени
        в амортисьора.
    shock_absorber_charge_type:
      name: Тип пълнене/зареждане на амортисьора
      description: Посочва технологията за пълнене/демпфиране на амортисьора (напр.
        хидравличен/маслен, газов, въздушен) и/или свързания дизайн на тръбата, когато
        е приложимо.
    shock_absorber_mount_type_lower:
      name: Тип монтаж на амортисьора (долен)
      description: Стил на долния монтажен интерфейс на амортисьора за съвместимост
        при монтаж.
    shock_absorber_mount_type_upper:
      name: Тип горен монтаж на амортисьора
      description: Определя типа на горния монтажен интерфейс на амортисьора на моторно
        превозно средство с оглед на съвместимостта и подходящото монтиране.
    shock_absorber_position:
      name: Позиция на амортисьора
      description: Посочва дали амортисьорът е предназначен за предна, задна, лява
        или дясна позиция на автомобила (по-детайлно от обозначение само по ос).
    shock_absorption_system:
      name: Система за абсорбиране на удари
      description: Определя механизма, използван за намаляване на вибрациите и шума
        при обратен удар/отскок.
    shoe_collar_height:
      name: Височина на яката на обувката
      description: Класифицира обувките според височината на горната част около глезена
        (ниска, средна, висока), за да покаже нивото на покритие и опора на глезена.
    shoe_cover_height:
      name: Височина на калъфа за обувки
      description: Посочва нивото на покритие на калъфа за велосипедни обувки, като
        разграничава покрития само за пръстите от цели високи калцуни.
    shoe_sizing_system:
      name: Система за оразмеряване на обувки
      description: Посочва стандарта за размери (напр. US, UK, EU, JP, Mondopoint
        и др.), използван за дадения размер на обувките.
    shoelace_aglet_material:
      name: Материал на накрайниците на връзките за обувки
      description: Посочва материала, използван за накрайниците на връзките за обувки
        (аглети), който влияе върху издръжливостта и стила.
    shooting_rest_design:
      name: Дизайн на опора за стрелба
      description: Класифицира конструктивния тип на поставката (напр. поставка тип
        торба, шейна, триножник, менгеме за оръжие и др.).
    shooting_stick_yoke_design:
      name: Дизайн на вилката/ложата на опората за стрелба
      description: Посочва стила на люлката или вилката, която контактува с огнестрелното
        оръжие или оптиката.
    shooting_target_style:
      name: Стил на мишената за стрелба
      description: Класифицира стила или дизайна на тренировъчните мишени за фигурно
        пързаляне и хокей, за да могат клиентите да избират вида тренировка, който
        им е необходим.
    shooting_target_type:
      name: Тип мишена за стрелба
      description: Класифицира мишените за стрелба според конструкцията, материала
        или дизайна (напр. гонг, силует, хартиена мишена тип „булсай“, въртяща се
        мишена), позволявайки на стрелците бързо да намерят подходящата мишена за
        своята дисциплина и тип оръжие.
    short_block_assembly_balance_type:
      name: Тип баланс на сглобката на късия блок на двигателя
      description: Посочва дали въртящият се механизъм е вътрешно или външно балансиран.
    short_block_intended_use:
      name: Предназначение на късия блок
      description: Основно предназначение на късия блок на двигателя
    short_block_rotating_assembly_included:
      name: Включен въртящ се механизъм в късия блок на двигателя
      description: Указва кои основни компоненти на въртящия се монтаж са включени
        в късия блок.
    shot_size:
      name: Размер на сачмите
      description: Посочва размера на сачмите за насипни сачми или компоненти за боеприпаси.
    shotgun_action_type:
      name: Вид на механизма на ловната пушка
      description: Посочва механизма/начина на работа на пушката.
    shotgun_choke_type:
      name: Тип чок на гладкоцевната пушка
      description: Посочва конфигурацията на чока на цевта/цевите на гладкоцевната
        пушка.
    shotgun_gauge:
      name: Калибър на гладкоцевната пушка
      description: Посочва калибъра на гладкоцевната пушка (и .410, когато е приложимо)
        за идентификация и филтриране в колекционерски обяви.
    shotgun_stock_material:
      name: Материал на приклада на гладкоцевната пушка
      description: Посочва основния материал на приклада и цевната ложа (фурнитурата).
    shuffleboard_speed_rating:
      name: Рейтинг на скоростта при шафълборд
      description: Показва относителната скорост на плъзгане, която прахът за шафълборд
        или друг продукт за поддръжка осигурява върху масата, което позволява на играчите
        да изберат подходящата скорост според нивото си на умения и дължината на масата.
    shuffleboard_table_length_compatibility:
      name: Съвместимост по дължина на масата за шафълборд
      description: Стандартна дължина на масата за шафълборд, за която продуктът е
        предназначен да се съчетава или да допълва.
    shuttlecock_base_material:
      name: Материал на основата на перцето
      description: Посочва материала на носа/основата на перцето за бадминтон, който
        влияе на издръжливостта, усещането и отскока.
    shuttlecock_feather_material:
      name: Материал на перата на перцето за бадминтон
      description: Посочва основния източник на перата или типа конструкция, използвани
        за полата на перцето, което влияе върху издръжливостта, постоянството на игра
        и цената.
    shuttlecock_grade:
      name: Клас на перцето за бадминтон
      description: Посочва нивото на игра или качествената класификация (напр. тренировка,
        клубно, състезателно).
    shuttlecock_speed_rating:
      name: Клас на скоростта на перцето
      description: Указва определената от производителя скорост/клас на перцето за
        бадминтон, помагайки на играчите да изберат правилната скорост на полета според
        условията на игра, температурата и надморската височина.
    side_panel_installation_state:
      name: Състояние на монтаж на страничния панел
      description: Посочва дали страничният панел се доставя суров, грундиран, боядисан
        или с друго покритие/подготовка за монтаж.
    side_wall_mechanism:
      name: Механизъм за странична стена
      description: Описва как страничната стена на бебешкото легълце се отваря или
        спуска за достъп до бебето.
    signal_source:
      name: Източник на сигнал
      description: Показва как километражът получава/извлича информация за разстояние
        или време.
    silk_fiber_type:
      name: Вид копринени влакна
      description: Вид/източник на коприненото влакно, използвано за изработката на
        плата (напр. черничева коприна или туса), влияещо върху текстурата, равномерността
        и цената.
    simulated_game_species:
      name: Симулирани видове дивеч
      description: Посочва конкретната дивечова птица или животно, което манекенът
        имитира с цел реалистично обучение.
    singlet_cut_style:
      name: Кройка на борцовото трико
      description: Определя кройката/стила на борцовото трико, включително височина
        на презрамките, стил на гърба и варианти за пол/възраст.
    sink_material:
      name: Материал на мивката
      description: Посочва материала на вградените мивки, включени към тоалетния шкаф.
    sinker_attachment_style:
      name: Тип закрепване на тежестта
      description: Описва механизма, с който тежестта за риболов се закрепва към влакното
        или монтажа.
    sinker_finish:
      name: Покритие на тежестта
      description: Посочва външното покритие или обработка на повърхността на тежестта.
    sinker_shape:
      name: Форма на тежестта
      description: Определя геометричната форма на тежестта (напр. куршум, цилиндър,
        капка), за да помогне на риболовците да изберат оптимално представяне и устойчивост
        срещу закачане.
    siren_system_included:
      name: Включена сиренна система
      description: Посочва дали е инсталирана сирена/озвучителна система и какъв е
        нейният тип.
    siren_system_type:
      name: Тип сиренна система
      description: Указва инсталираната конфигурация на сирената/разпределителното
        устройство на полицейския камион.
    size_designation:
      name: Обозначение на размера
      description: Етикет със стандартизирани размери за триъгълника.
    size_system:
      name: Система за размери
      description: Посочва системата за оразмеряване или регионалния стандарт, към
        който съответства размерният етикет (напр. US, UK, EU, международни буквени
        размери).
    sizzle_mechanism:
      name: Механизъм за създаване на свистящ ефект
      description: Определя как цимбалът създава ефекта на „свистене“ (например чрез
        вградени в цимбала нитове, прикачаща се верига/сизлър или без допълнителни
        елементи).
    skate_blade_discipline:
      name: Дисциплина на острието за кънки
      description: Посочва дисциплината или приложението, за което е предназначено
        острието, като хокей или фигурно пързаляне, позволявайки на купувачите да
        филтрират подходящите остриета.
    skate_brake_type:
      name: Тип спирачка за скейт
      description: Посочва стила на спирачния механизъм, включен към кънките.
    skateboard_nut_thread_size:
      name: Размер на резбата на гайката за скейтборд
      description: Посочва размера на резбата (диаметър и стъпка) на гайката, за да
        се осигури съвместимост с оси, kingpin болтове или монтажен хардуер за скейтборд.
    skein_winder_bearing_bushing_type:
      name: Тип лагер/втулка на уреда за навиване на прежда
      description: Посочва типа лагер или втулка, използван във въртящия механизъм
        на уреда за навиване на прежда.
    skein_winder_drive_type:
      name: Тип задвижване на уреда за навиване на прежда
      description: Как уредът за навиване на прежда се задвижва/върти по време на
        употреба.
    ski_binding_mechanism:
      name: Механизъм на ски автоматите
      description: Определя основния механичен дизайн или дисциплина на автоматите
        (напр. алпийски, техническо/с щифтове, телемарк).
    ski_binding_part_type:
      name: Тип част за ски автомат
      description: Идентифицира конкретния компонент или аксесоар за ски автомати,
        позволявайки бързо филтриране между различни видове части.
    ski_boot_sole_standard:
      name: Стандарт на подметката на ски обувките
      description: Посочва стандарта за подметка или съвместимост с автомати, за който
        ски обувката е сертифицирана.
    skill_focus:
      name: Фокус на умението
      description: Посочва основното баскетболно умение, което тренировъчното пособие
        е предназначено да развива.
    skimboard_construction:
      name: Конструкция на скимборд
      description: Описва основната конструкция на дъската, с фокус върху сърцевината
        и техниката на наслояване (напр. пенеста сърцевина, дървена сърцевина).
    skin_presence:
      name: Наличие на кожа
      description: Посочва дали пилето се продава с кожа, без кожа или с частично
        премахната кожа.
    slapstick_handle_type:
      name: Тип дръжка на slapstick
      description: Описва типа на захвата/дръжката, вградена в шлепстика, който влияе
        на ергономията и удобството при използване.
    slapstick_playing_surface_material:
      name: Материал за игрална повърхност за шлепстик
      description: Посочва материала на удрящите/пляскащите елементи, които се удрят
        един в друг, за да произведат звук.
    sled_brake_type:
      name: Тип спирачка за шейна
      description: Посочва спирачния механизъм, включен към шейната, ако има такъв.
    sled_towing_method:
      name: Метод за теглене на шейна
      description: Посочва основния начин, по който шейната се дърпа или тегли.
    sleep_position_suitability:
      name: Подходяща позиция за сън
      description: Посочва за кои позиции на сън матракът е проектиран да осигурява
        най-добра опора.
    sleeping_bag_shape:
      name: Форма на спалния чувал
      description: Обща форма/кройка на спалния чувал, която влияе на топлината, теглото
        и просторността.
    sleeping_pad_type:
      name: Вид подложка за спане
      description: Идентифицира конструктивния тип на постелката – например от затвореноклетъчна
        пяна или надуваема – който влияе пряко върху комфорта, теглото и изолацията.
    sleepwear_set_pieces_included:
      name: Включени елементи в комплект за спане
      description: Изброява отделните компоненти, включени в комплект от няколко части
        за спално или домашно облекло.
    sleeve_bearing_type:
      name: Тип лагер на втулката
      description: Посочва технологията, която позволява въртенето на втулката, влияещо
        върху качеството на въртене при олимпийски щанги.
    sleeve_style:
      name: Стил на ръкава
      description: Посочва стила на ръкава отвъд дължината (напр. реглан).
    slide_board_accessories_included:
      name: Включени аксесоари към слайд борда
      description: Изброява допълнителните артикули, включени към слайд борда, така
        че купувачите да знаят точно какво е включено и да могат да сравняват комплекти.
    slide_installation_type:
      name: Тип монтаж на пързалка
      description: Описва как пързалката е предназначена да бъде инсталирана или монтирана
        (самостоятелна, прикрепена към детски комплекс и т.н.).
    slide_intended_finger:
      name: Посочва за кой пръст е предназначен слайдът
      description: Посочва на кой пръст е предназначен да се носи слайдът или дали
        не е приложимо (напр. при тонална лента).
    slide_safety_features:
      name: Функции за безопасност на пързалката
      description: Елементи за безопасност, включени в дизайна на пързалката.
    slide_type:
      name: Тип плъзгач
      description: Указва за кои видове месингови плъзгащи механизми е предназначен
        продуктът.
    slide_water_use_capability:
      name: Възможност за използване на вода при пързалката
      description: Дали пързалката е предназначена за използване с вода (напр. с маркуч)
        и как.
    slime_putty_kit_components_included:
      name: Включени компоненти в комплекта за слуз и моделин.
      description: Изброява инструментите и допълненията, включени към продукта тип
        „слайм“/моделираща маса (особено при комплекти).
    sling_material:
      name: Материал на ремъка
      description: Посочва влакното/текстила, използвано в ремъка на експресната примка
        (кучешка кост).
    smith_machine_bar_path:
      name: Траектория на движение на лоста при Смит машина
      description: Описва фиксираната траектория на движение на лоста, информирайки
        потребителите за биомеханиката и пространствените изисквания.
    smoke_color:
      name: Цвят на дима
      description: Цвят на дима, произвеждан от сигналната димка/факла (различен от
        цвета на самия продукт).
    smoked_malt_smoking_material:
      name: Използван материал за опушване на малца
      description: При опушен малц посочва материала, използван за опушване (напр.
        конкретен вид дърво или торф).
    snack_mix_variety:
      name: Разновидност на снакс микса
      description: Класифицира продукта според вида на сместа (напр. микс за пътека,
        ядков микс, намкин, сев).
    snack_processing_method:
      name: Метод за обработка на снаксове
      description: Посочва основната технология на обработка или консервиране, използвана
        за направата на снакса (напр. лиофилизиран, печен, печен/изпечен).
    snack_texture:
      name: Текстура на снакса
      description: Посочва физическото усещане при дъвчене или текстурата в устата
        на сусамените пръчици.
    snap_installation_method:
      name: Метод за монтаж на тик-так копче
      description: Описва как копчето/закопчалката се монтира или прикрепя към материала
        на проекта.
    snare_drum_bearing_edge_profile:
      name: Профил на ръба на лагера на малкия барабан
      description: Профил на носещия ръб на корпуса на малкия барабан.
    snare_drum_finish_type:
      name: Тип финиш на соло барабан
      description: Тип/конструкция на покритието, използвано върху корпуса на малкия
        барабан.
    snare_drum_hoop_type:
      name: Тип обръч на соло барабан
      description: Тип обръчи/рингове, използвани при соло барабана.
    snare_drum_mounting_type:
      name: Тип монтаж на соло барабан
      description: Начинът, по който малкият барабан е предназначен да се монтира
        или използва.
    snare_drum_shell_material:
      name: Материал на корпуса на соло барабан
      description: Посочва метала/сплавта, използвани за корпуса на малкия барабан
        (основното тяло), което силно влияе върху тона, теглото и издръжливостта.
    snare_drum_strainer_mechanism:
      name: Механизъм на обтегача на струните на малкия барабан
      description: Тип механизъм за включване/изключване на пружините на соло барабана.
    snare_drum_strainer_type:
      name: Тип на обтегача на струните на малкия барабан
      description: Тип механизъм за включване/изключване на пружините на соло барабан.
    snare_hoop_type:
      name: Тип обръч за малък барабан
      description: Тип обръчи/рингове на малкия барабан.
    snare_throw_off_type:
      name: Тип механизъм за освобождаване на пружините на малкия барабан
      description: Тип механизъм за обтягане/освобождаване, използван за включване/изключване
        на пружините на малкия барабан.
    snip_cutter_spring_mechanism:
      name: Пружинен механизъм на ножицата за рязане
      description: Показва дали ножицата използва пружинен/връщащ се механизъм и какъв
        е неговият тип.
    snorkel_mount_position:
      name: Позиция на монтаж на шнорхела
      description: Описва къде е разположен шнорхелът на главата на потребителя по
        време на употреба.
    snorkel_top_type:
      name: Тип горна част за шнорхел
      description: Описва стила на защита срещу проникване на вода в горната част
        на шнорхела, включен в комплекта.
    snow_condition_suitability:
      name: Пригодност за снежни условия
      description: Описва основните снежни условия, за които е предназначен ваксата.
    snow_sports_helmet_safety_certification:
      name: Сертификат за безопасност на каски за зимни спортове
      description: Идентифицира стандарта(ите) за безопасност, на които отговаря каската
        за каране на ски и сноуборд.
    snowboard_base_material:
      name: Основен материал за сноуборд
      description: Посочва състава или покритието на основата (екструдирана, синтерована,
        патентована формула), което влияе върху скоростта, издръжливостта и поддръжката.
    snowboard_width_class:
      name: Клас ширина на сноуборд
      description: Категоризира общата ширина на дъската спрямо размера на обувката
        (напр. нормална, широка).
    soccer_ball_compartment_type:
      name: Тип отделение за футболна топка
      description: Посочва как (или дали) раницата побира футболна топка.
    soccer_ball_type:
      name: Тип футболна топка
      description: Посочва предназначението или стила на футболната топка (напр. мачова,
        тренировъчна, за футзал), така че купувачите бързо да намерят подходящия вариант
        без нужда от много подкатегории.
    soccer_dummy_base_type:
      name: Тип на основата на тренировъчен манекен за футбол
      description: Описва вида на основата или механизма за закрепване, който използва
        тренировъчният манекен.
    soccer_dummy_design:
      name: Дизайн на футболен манекен
      description: Посочва конструктивния стил на футболния тренировъчен манекен,
        например твърд или надуваем.
    soccer_goal_target_style:
      name: Стил на тренировъчна цел за футболна врата
      description: Определя физическата форма или дизайна на тренировъчната цел, така
        че купувачите да изберат стила, който най-добре подхожда на техните упражнения.
    soccer_goal_type:
      name: Тип футболна врата
      description: 'Посочва конструктивния стил или предназначението на вратата (например:
        сгъваема, отскачаща, за игра на улицата).'
    sock_cushioning:
      name: Омекотяване на чорапа
      description: Посочва количеството и вида на омекотяване или подплънка в зоната
        на ходилото на чорапа.
    sock_cushioning_level:
      name: Ниво на омекотяване на чорапа
      description: Посочва степента на омекотяване под стъпалото, интегрирана в чорапа.
    sock_grip_type:
      name: Тип на противоплъзгащото покритие на чорапа
      description: Описва всички свойства за сцепление или против хлъзгане, приложени
        върху подметката на чорапа.
    sock_toe_style:
      name: Стил на пръстите на чорапа
      description: Описва конструктивния стил на зоната при пръстите на чорапа.
    soft_bait_style:
      name: Стил на меката примамка
      description: Класифицира дизайна или профила на меката пластмасова примамка
        (напр. червей, плувна стръв, ларва).
    soft_top_attachment_type:
      name: Тип закрепване на мек покрив
      description: Посочва как мекият покрив се закрепва към превозното средство (канали,
        копчета, велкро и др.).
    soft_top_includes_frame_hardware:
      name: Посочва дали мекият покрив включва рамка/монтажен обков
      description: Посочва дали продуктът включва рамката/дъгите за мек покрив и/или
        монтажния обков.
    soft_top_installation_type:
      name: Тип монтаж на мек покрив
      description: Посочва начина на монтаж/закрепване на мек покрив на автомобила,
        както и очаквания метод на инсталация и необходимото усилие.
    soft_top_window_configuration:
      name: Конфигурация на прозорците на мекия покрив
      description: Посочва колко прозореца има мекият покрив и кои позиции са налични.
    softball_certification:
      name: Сертификация за софтбол
      description: Изброява одобрителните печати или маркировки от спортните федерации/организации,
        отпечатани върху топката, които определят допустимостта ѝ за съответната лига
        или състезание.
    softness_level:
      name: Ниво на мекота
      description: Посочва колко мека/нископрофилна е велкро страната с бримки, важно
        за комфорт при контакт с кожата и приложения с нисък обем.
    solar_system_model_included_bodies:
      name: Включени небесни тела в модела на Слънчевата система
      description: Показва кои небесни тела са представени в моделния набор.
    solar_system_model_scaling:
      name: Мащабиране на модела на слънчевата система
      description: Посочва дали моделът на Слънчевата система е в мащаб спрямо размерите
        на планетите, разстоянията/орбитите, и двете, или представлява схематично/немащабно
        изображение.
    sold_secure_certification_level:
      name: Ниво на сертификация по стандарта Sold Secure
      description: Показва рейтинга Sold Secure, присъден на ключалката от независимия
        британски тестов орган (бронз, сребро, злато, диамант).
    sold_secure_rating:
      name: Рейтинг Sold Secure
      description: Посочва нивото на сертификация Sold Secure, определено на заключващия
        механизъм.
    sole_construction:
      name: Конструкция на подметката
      description: Посочва как е изградена подметката на обувката (цяла, разделена,
        двукомпонентна и др.), което пряко влияе върху гъвкавостта, контакта с пода
        и пригодността за специфични танцови техники.
    sole_type:
      name: Тип подметка
      description: Описва конструктивния стил на подметката, показвайки гъвкавостта
        и предназначението ѝ.
    soprano_saxophone_body_style:
      name: Стил на корпуса на сопран саксофон
      description: Описва физическата конфигурация на корпуса на сопран саксофона.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Тип бафъл на мундщук за сопран саксофон
      description: Описва дизайна на преградата/покрива на мундщука (контурът зад
        върха), влияещ върху яркостта, проекцията и реакцията на звука.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Размер на камерата на мундщук за сопран саксофон
      description: Описва размера на вътрешната камера на мундщука за сопран саксофон,
        който влияе върху съпротивлението и тембъра.
    soprano_saxophone_mouthpiece_finish:
      name: Финиш на мундщук за сопран саксофон
      description: Повърхностно покритие/плакиране, приложено върху мундщука (ако
        е приложимо).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Включени аксесоари към мундщука за сопран саксофон
      description: Посочва кои аксесоари са включени към мундщука.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Тонален характер на мундщука за сопран саксофон
      description: Общ тонален профил, обикновено свързан с дизайна на мундщука.
    sound_character:
      name: Характер на звука
      description: Описва общия тембър, който издава слапстикът.
    sound_expansion_method:
      name: Метод на звуково усилване/разпространение
      description: Посочва как модулът може да добавя или разширява вътрешната си
        звукова библиотека извън фабричните звуци (напр. пакети със съдържание, импорт
        на семпли, разширителни карти).
    sound_module_sound_library_focus:
      name: Фокус на звуковата библиотека на звуковия модул
      description: Основен акцент на фабричния звуков сет, който помага на клиентите
        да изберат подходящия модул според стила на свирене или предназначението.
    sound_port_type:
      name: Тип звуков порт
      description: Описва дизайна на звуковия отвор/порт в задната част на кахона,
        който влияе върху проекцията и ниските честоти.
    sound_sensitivity_control:
      name: Контрол на чувствителността към звука
      description: Показва дали и как може да се регулира чувствителността към звука.
    sound_synthesizer_patch_memory:
      name: Памет за съхранение на звукови синтезаторни пачове
      description: Посочва дали синтезаторът може да съхранява и извиква предварително
        запазени настройки.
    sound_type:
      name: Тип звук
      description: Основните видове звуци или аудиоизходи, които постелката възпроизвежда
        (напр. инструменти, песни, гласови указания), за да направлява играта.
    soundboard_material:
      name: Материал на резонаторната дъска
      description: Материалът, използван за резонаторната дъска на арфата (горната
        част), който определя резонанса и тона.
    soup_or_broth_variety:
      name: Вид супа или бульон
      description: Посочва стила, рецептата или кулинарната подготовка на супата или
        бульона, така че купувачите бързо да намерят предпочитания вид.
    sour_cream_variety:
      name: Вид заквасена сметана
      description: Класифицира продуктите тип заквасена сметана според конкретния
        им вид или културен стил, като например crème fraîche или мексиканска крема.
    soy_sauce_variety:
      name: Сорт соев сос
      description: Идентифицира специфичния вид или формула на соевия сос (напр. светъл,
        тъмен, тамари, понзу), което позволява на купувачите бързо да филтрират по
        вкусов профил и кулинарна употреба.
    spark_plug_electrode_material:
      name: Материал на електрода на запалителната свещ
      description: Материал/технология на електрода в запалителната свещ (централен
        и/или страничен), както се предлага от производителя (напр. мед, платина,
        иридий).
    spark_plug_seat_type:
      name: Тип седло на запалителната свещ
      description: Тип на уплътнение/седло на свещта при контакта с цилиндровата глава.
    spark_plug_terminal_type:
      name: Тип клема на запалителна свещ
      description: Тип горен накрайник, използван за свързване на кабела/капачката
        на запалването.
    sparkler_shape:
      name: Форма на бенгалския огън
      description: Обща декоративна форма на бенгалския огън.
    speaker_cone_material:
      name: Материал на мембраната на високоговорителя
      description: Основен материал на мембраната на високоговорителя (басова/средночестотна).
    speaker_size:
      name: Размер на високоговорителя
      description: Номинален размер на високоговорителя / размер за монтаж на компонентния
        високоговорител (напр. 6.5 инча, 6×9 инча), използван за съответствие с фабричните
        места и адаптерите за високоговорители.
    special_effects_output_interface:
      name: Интерфейс за изход със специални ефекти
      description: Посочва изходния конектор/интерфейс, използван за управление на
        устройства за специални ефекти.
    special_effects_stand_stability_features:
      name: Функции за стабилност на стойката за специални ефекти
      description: Посочва вградените функции за стабилност и безопасност, предназначени
        да предотвратят преобръщане или приплъзване по време на събития.
    specialty_malt_name_type:
      name: Име/вид специален малц
      description: Идентифицира конкретния наименуван вид специален малц (често използван
        като търговско наименование на стила).
    specimen_presentation:
      name: Представяне на образеца
      description: Посочва как колекционерският образец е подготвен или представен
        (напр. суров/необработен, полиран, изрязан или монтиран).
    speed_bag_accessories_included:
      name: Включени аксесоари за боксова круша
      description: Изброява допълнителните включени елементи към бързата боксова круша,
        като ръкавици, помпа, въртящ механизъм, вериги или стойка.
    speed_rating:
      name: Индекс на скоростта
      description: Посочва скоростта на игралната повърхност, осигурена от билярдното
        сукно (напр. бавна, средна или бърза).
    speedometer_backlight_type:
      name: Тип подсветка на скоростомера
      description: Посочва дали и как е подсветен скоростомерът за видимост през нощта.
    speedometer_display_type:
      name: Тип дисплей на скоростомера
      description: 'Посочва стила на отчитане на скоростта на скоростомера: аналогова
        стрелка/циферблат, цифров дисплей или комбинация от аналогови и цифрови елементи.'
    speedometer_unit_of_measure:
      name: Мерна единица на скоростомера
      description: Указва мерните единици за скорост, показани на циферблата/дисплея.
    spike_replaceability:
      name: Възможност за подмяна на шиповете
      description: Показва дали шиповете на обувката са сменяеми, фиксирани или обувката
        е без шипове.
    spike_shape:
      name: Форма на шипа
      description: Посочва геометричния тип на върха на шипа, който влияе на сцеплението
        и пригодността за различни пистови настилки.
    spike_thread_size:
      name: Размер на резбата на шипа
      description: Посочва размера или стандарта на резбата на основата, която се
        завинтва в обувката (напр. 1/4-20).
    spin_classification:
      name: Класификация на спина
      description: Посочва профила на въртене, за който е предназначен дискът (ниско,
        средно, високо, свръхсилно въртене).
    spin_profile:
      name: Профил на спина
      description: Определя относителните характеристики на въртене, които валът осигурява.
    spin_types_supported:
      name: Поддържани видове въртене
      description: Изброява видовете въртене, които машината може да придава на топките,
        за да могат играчите да тренират срещу различни стилове удари.
    spinach_preparation_style:
      name: Стил на приготвяне на спанак
      description: Описва физическата обработка на листата спанак или формата на продукта
        (напр. цели листа, нарязан, на кубчета).
    spinach_variety:
      name: Сорт спанак
      description: Посочва ботаническия или търговския сорт спанак (напр. бейби, савойски,
        воден, червен), позволявайки на купувачите да изберат точния вид, който желаят.
    spindle_bearing_surface_material:
      name: Материал на лагерната повърхност на шпиндела
      description: Материал на опорната/лагерната повърхност (връх/дъно) на опорния
        шпиндел, който влияе на плавността на работа и износването.
    spindle_bearing_type:
      name: Тип лагер на шпиндела
      description: Тип на върха/лагерната контактна зона на шпиндела, която намалява
        триенето в опорната чашка.
    spindle_finish:
      name: Покритие на вретеното
      description: Повърхностно покритие/финиш на шпиндела, който влияе на усещането,
        издръжливостта и външния вид.
    spindle_hook_type:
      name: Тип кука на вретеното
      description: Механизъм за захващане на преждата/конеца в горната част на шпиндела,
        използван за закрепване на водещия конец.
    spindle_support_method:
      name: Метод за опора на вретеното
      description: Начинът, по който шпинделът е предназначен да бъде поддържан по
        време на предене.
    spindle_tip_style:
      name: Стил на върха на шпиндела
      description: Форма/дизайн на върха, който се опира в чашката (лагерната повърхност),
        влияещ върху триенето и плавността на въртене.
    spindle_whorl_position:
      name: Позиция на вретеното на хурката
      description: Къде се намира шайбата върху оста на вретеното.
    spinner_blade_shape:
      name: Форма на перката на спинера
      description: Посочва основната форма на лопатката, използвана при блесната,
        която влияе върху вибрациите, отблясъците и дълбочината на движение.
    spinner_control_card_design_type:
      name: Дизайн/тип на контролната карта на спинера
      description: Описва начина, по който контролната карта на спинера представя
        информацията за управление (напр. съотношение, напрежение или таблица за преобразуване).
    spinner_subtype:
      name: Подтип на спинер
      description: Класифицира общия дизайн или тип блесна (напр. линейна блесна,
        блесна-примамка).
    spinning_oil_application_area:
      name: Зона на приложение на масло за спинингово колело
      description: Посочва предназначените точки за нанасяне на маслото върху спининговото
        колело.
    spinning_oil_application_tool:
      name: Инструмент за нанасяне на масло за предене
      description: Посочва стила на накрайника/опаковката на апликатора, използван
        за нанасяне на масло върху части на спининговото колело за контролирано дозиране.
    spinning_oil_features:
      name: Характеристики на маслото за спинингово колело
      description: Подчертава функционалните свойства, свързани с маслата за спинингови
        колела (остатъци, оцветяване, окисляване и възможност за измиване).
    spinning_top_features:
      name: Характеристики на пумпал за предене
      description: Специални функции за игра, включени в пумпала извън обикновеното
        въртене.
    spinning_top_launch_mechanism:
      name: Механизъм за задвижване на пумпала
      description: Как пумпалът се стартира/задвижва за въртене.
    spinning_wheel_brake_tension_system_type:
      name: Тип на спирачната/напрегателната система на въртящото се колело
      description: Посочва системата за спиране/обтягане, използвана за контрол на
        навиването на преждата.
    spinning_wheel_drive_system:
      name: Система за задвижване на предачно колело
      description: Посочва за каква задвижваща система е предназначена калерчето.
    spinning_wheel_hook_system:
      name: Система с кука на предачното колело
      description: Посочва как преждата се води по рамената на водача.
    spinning_wheel_part_application:
      name: Предназначение на частта за въртящо се колело (за каква функция или употреба
        е предназначена)
      description: Посочва за кои компоненти на предачното колело е предназначено
        маслото.
    spinning_wheel_portability_foldability:
      name: Преносимост/сгъваемост на предачното колело
      description: Посочва дали колелото е проектирано да се сгъва/разгъва за транспортиране.
    spinning_wheel_tension_adjustment_type:
      name: Тип на регулиране на напрежението при въртящото се колело
      description: Как се регулира обтягането на колелото за контрол на навиването.
    splice_termination_type:
      name: Тип снаждане/завършек
      description: Посочва крайния завършек на котвеното въже (напр. сплетено ухо,
        метален накрайник, кука с верига).
    split_shot_cut_type:
      name: Тип разрез на разцепената сачма за утежнение
      description: Посочва типа на каналчето или отвора, който позволява закрепване
        към влакното.
    split_shot_shape:
      name: Форма на сачмата със срязване
      description: Описва физическата форма на разцепената сачма, която влияе върху
        движението във водата и устойчивостта срещу закачане.
    split_shot_size:
      name: Размер на разцепената сачма
      description: Стандартизиран буквено-цифров код за размер (напр. SSG, AAA, BB,
        1), използван от производители и риболовци за класифициране на разцепени утежнения.
        Допълва точните измервания на теглото.
    spoiler_adjustability:
      name: Регулируемост на спойлера
      description: Показва дали ъгълът/височината на спойлера е регулируема.
    spoke_accessory_function:
      name: Функция на аксесоар за спици
      description: Класифицира основната функция на аксесоара върху колелото, например
        декоративна, светлоотразителна или светеща.
    spoke_butting_profile:
      name: Профил на главата на спицата
      description: Описва как се променя диаметърът на спицата по дължината ѝ (прави,
        еднократно, двукратно, трикратно или четирикратно стеснени), което влияе на
        теглото и здравината.
    spoke_gauge:
      name: Размер на спицата
      description: Посочва размера (дебелината на телта) на спиците, с които нипелът
        е съвместим.
    spoke_interface_type:
      name: Тип интерфейс на спицата
      description: Посочва типа глава на спицата, за който е проектирана главината
        (J-образна, права, T-образна).
    spoke_shape:
      name: Форма на спицата
      description: Посочва външното напречно сечение на спицата, което влияе върху
        аеродинамиката и външния вид.
    spool_form_factor:
      name: Форм фактор на шпулата
      description: Физическа форма на тялото на макарата и начинът, по който се задържа
        конецът/преждата (напр. с фланец или конусовидна).
    spoon_style:
      name: Стил на лъжицата
      description: Посочва функционалния подтип или стил на блесната, например за
        замятане, трепкаща или за влачене.
    sports_bra_padding_type:
      name: Тип подплънки на спортен сутиен
      description: Посочва вида подплънки в спортния сутиен.
    sports_cap_style:
      name: Стил на спортна шапка
      description: Определя общата конструкция/стил на шапката (напр. бейзболна шапка,
        шапка със сгъваема козирка), независимо от логото на отбора.
    sports_governing_body_certification:
      name: Сертификация от спортна организация
      description: Посочва официалните сертификати или одобрения от признати спортни
        организации, потвърждаващи, че продуктът отговаря на състезателните стандарти.
    sports_surface_compatibility:
      name: Съвместимост със спортни настилки
      description: Изброява типовете игрални или други повърхности, върху които боята
        може безопасно да се нанася.
    sports_toy_set_contents:
      name: Съдържание на комплекта спортни играчки
      description: Посочва какви компоненти са включени в комплекта спортни играчки
        (напр. топка, бухалка, мрежа, мишени).
    spray_string_cleanup_method:
      name: Метод за почистване на парти спрей нишки
      description: Препоръчителен начин за премахване/почистване на остатъци от парти
        спрей нишки.
    spray_string_finish_effect:
      name: Финиш/ефект на струните, постигнат чрез пръскане
      description: Визуален ефект на обработената чрез пръскане струна (блясък, отражателност
        и специални ефекти).
    spray_string_formulation_type:
      name: Тип формула на парти спрей нишките
      description: Как продуктът се държи по време и след пръскане (напр. дали се
        почиства лесно или е с траен ефект).
    spray_string_recommended_surface:
      name: Препоръчителна повърхност за парти спрей нишки
      description: Видове повърхности, върху които парти спрей нишките са предназначени
        за употреба (и вероятно могат лесно да се почистят).
    spray_string_scent:
      name: Аромат на струните, нанесен чрез спрей обработка
      description: Аромат или мирис на парти спрей нишките, ако има такъв.
    spray_string_suitable_age_group:
      name: Подходяща възрастова група за парти спрей нишки
      description: Препоръчителна минимална възраст/възрастова група за безопасна
        употреба.
    spread_consistency:
      name: Консистенция на разстилане
      description: 'Описва текстурата/консистенцията на соса или пастата за мазане,
        за да се създадат очаквания относно усещането в устата и начина на употреба
        (например: гладка, с парченца, разбита).'
    spread_variety:
      name: Вид крем за мазане
      description: Класифицира конкретния вид плодова крем за мазане (напр. сладко,
        желе, мармалад, плодов крем), така че купувачите да различават различните
        начини на приготвяне и текстури.
    spreader_bar_type:
      name: Тип разпределителен лост
      description: Посочва типа разпъваща щанга или система с куки, включена или съвместима
        със сбруята.
    sprint_canoe_class:
      name: Клас на спринтово кану
      description: Официална класация/дисциплина в състезателното спринтово кану.
    sprout_presentation:
      name: Представяне на кълнове
      description: Посочва физическата форма на продукта (напр. пресни кълнове, микрозеленчуци,
        саксия за отглеждане, прах).
    squash_and_gourd_variety:
      name: Вид тиква или кратуна
      description: Посочва конкретния сорт или пазарен вид тиква/кратуна, помагайки
        на купувачите бързо да намерят желания тип.
    stability_class:
      name: Клас на стабилност
      description: Обща класификация на стабилността, базирана на летателни показатели
        или маркетингови твърдения.
    stabilizer_thread_size:
      name: Размер на резбата на стабилизатора
      description: Спецификация на резбата, използвана за закрепване на стабилизатор
        или аксесоар към лък или арбалет.
    stabilizer_type:
      name: Тип стабилизатор
      description: Посочва стила или позиционната класификация на стабилизатора за
        лък или арбалет.
    stages_supported:
      name: Поддържани етапи
      description: Посочва с колко степени е проектирана да лети ракетата или комплектът.
    stain_remover_format:
      name: Формат за премахване на петна
      description: Посочва формата/начина на нанасяне на продукта за премахване на
        петна от превозни средства (спрей бутилка, аерозол, пяна, гел, прах, кърпички,
        писалка/маркер).
    stake_shape:
      name: Форма на колчето
      description: Определя напречното сечение или стила на дизайн на колче за палатка,
        което влияе върху задържащата сила в различни видове почва.
    stamp_block_features:
      name: Характеристики на блокчето за печати
      description: Подчертава функционалните характеристики на блокчетата за печати,
        като измервателни мрежи, дръжки или противоплъзгащи повърхности.
    stamp_block_type:
      name: Тип блокче за печати
      description: Посочва конструкцията/стила на блокчето за печати, използвано за
        монтиране на печати (напр. прозрачен акрилен блок, дървен блок или позициониращ
        блок).
    stamp_set_pieces_included:
      name: Включени елементи в комплект печати
      description: Посочва кои компоненти са включени в комплекта за печати и мастилени
        подложки (напр. печати, мастилени подложки, маркери).
    stand_padding_material:
      name: Материал на подплънката на стойката
      description: Материал, използван в контактните точки за защита на покритието
        на инструмента (напр. пяна, гума, силикон).
    staple_fiber_animal_fiber_type:
      name: Тип животинско влакно от щапелни влакна
      description: Конкретен тип влакно от животински произход, когато източникът
        на щапелното влакно е животно.
    staple_fiber_crimp_level:
      name: Ниво на накъдряне на щапелните влакна
      description: Степен на естествена нагънатост/вълнистост на влакното.
    staple_fiber_preparation_type:
      name: Тип подготовка на щапелните влакна
      description: Състоянието на подготовка/обработка на влакното при продажба (как
        е подредено/обработено), което силно влияе върху метода на предене, лекотата
        на изтегляне и крайния резултат.
    staple_fiber_source_type:
      name: Вид на източника на щапелните влакна
      description: Обща категория за произхода на влакнестото съдържание.
    starch_processing_type:
      name: Вид обработка на нишестето
      description: Посочва дали нишестето е натурално или е физически/химически модифицирано
        (напр. инстантно, предварително желатинизирано), за да осигури специфични
        функционални свойства като скорост на сгъстяване или температурна устойчивост.
    starch_source:
      name: Източник на нишестето
      description: Посочва растителния източник, от който е получено кулинарното нишесте
        или сгъстителят (напр. царевица, картоф, тапиока). Източникът е основният
        отличителен фактор при кулинарните нишестета и пряко влияе върху пригодността
        за рецепти, алергенните съображения и потребителското търсене.
    starfruit_variety:
      name: Сорт карамбола
      description: Идентифицира специфичния сорт или сорт карамбола (напр. Аркин,
        Фванг Тунг).
    starter_drive_type:
      name: Тип стартерно задвижване
      description: Типът на задвижващия/зацепващия механизъм на стартера, използван
        за зацепване на зъбното колело с венечния зъбен венец.
    starter_pistol_action_type:
      name: Тип механизъм за зацепване на стартера
      description: Идентифицира механизма на задействане на стартовия пистолет (напр.
        едно действие, двойно действие, полуавтоматичен).
    starter_pistol_caliber:
      name: Калибър на стартовия пистолет
      description: Посочва калибъра на халосните патрони/боеприпаси, за които е пригоден
        стартовият пистолет.
    starter_terminal_type:
      name: Тип клема на стартера
      description: Посочва стила на клемата/конектора, използван за електрически връзки
        на стартера или соленоида на стартера (напр. шпилка, плоска клема, щекерен
        конектор).
    starting_block_anchoring_method:
      name: Метод за закрепване на стартовите блокчета
      description: Описва как стартовите блокчета се закрепват към пистата (напр.
        шипове, вакуумни вендузи, гумени подложки).
    steerer_tube_design:
      name: Дизайн на кормилната тръба
      description: Описва конструктивния дизайн на кормилната тръба — права, конусовидна,
        с резба и др. — който определя съвместимостта с челния лагер и рамката.
    steering_cable_end_fitting_type:
      name: Тип на накрайника на кормилния кабел
      description: Посочва стила на завършек/закрепване в краищата на кормилното жило
        на плавателен съд (към кормилното управление и към двигателя/румпела), за
        да се осигури съвместимост с точките за свързване. Използвайте стандартното
        или обозначението на производителя, когато е приложимо.
    steering_column_adjustability_features:
      name: Характеристики за регулиране на кормилната колона
      description: Посочва какви функции за регулиране са вградени в кормилната колона.
    steering_column_ignition_provision:
      name: Подготовка за контактния ключ в кормилната колона
      description: Посочва дали кормилната колона е проектирана да приема патрон/ключ
        за запалване и/или заключване на волана.
    steering_column_shaft_end_interface_type:
      name: Тип интерфейс на края на вала на кормилната колона
      description: Посочва стила на интерфейса в края на вала на кормилната колона
        (напр. шлицов, двоен D-профил, с шпонка).
    steering_column_shift_type:
      name: Тип на превключване на скоростите от кормилната колона
      description: Посочва дали кормилната колона има вграден механизъм за превключване
        на предавките и какъв е типът на трансмисията.
    steering_component_drive_type:
      name: Тип задвижване на кормилния компонент
      description: Посочва задвижващия/подпомагащия механизъм, свързан с компонентите
        на кормилната система (особено помпи и електрически усилватели).
    steering_position:
      name: Позиция на управление
      description: Указва дали ванът е с ляв, или десен волан.
    steering_pump_pulley_type:
      name: Тип шайба на помпата на сервоуправлението
      description: Посочва типа на шайбата/задвижването, използвано с кормилната помпа.
    steering_rack_finish_coating:
      name: Покритие/финиш на кормилната рейка
      description: Посочва външното покритие/обработка за защита от корозия.
    steering_rack_position:
      name: Позиция на кормилната рейка
      description: Посочва къде е монтирана/използвана рейката в кормилната система
        на превозното средство.
    steering_wheel_cover_installation_type:
      name: Тип монтаж на калъф за волан
      description: Как калъфът за волан се монтира/закрепва върху волана.
    steering_wheel_grip_material:
      name: Материал на захвата на волана
      description: Посочва материала на обръча/захвата на волана (където ръцете имат
        контакт), който може да се различава от материала на сърцевината/спиците на
        волана.
    steering_wheel_mounting_pattern:
      name: Схема на монтаж на волана
      description: Посочва схемата на монтажните болтове/отвори, използвана за закрепване
        на волана към главина или адаптер (напр. 3-болтова, 5-болтова).
    steering_wheel_rim_material_grip_surface:
      name: Материал на обръча на волана (повърхност за захват)
      description: Посочва основния материал на покритието на захвата/обръча (различен
        от общия конструктивен материал).
    stem_material:
      name: Материал на мундщука
      description: Посочва материала, използван специално за тръбния мундщук или накрайника
        (напр. акрил, ебонит, луцит).
    stencil_machine_consumable_type:
      name: Тип консуматив за машина за шаблони
      description: Посочва консумативите, необходими за работа (ако има такива).
    step_surface_texture:
      name: Текстура на повърхността на стъпалото
      description: Посочва дизайна/материала на стъпалната повърхност, предназначен
        да подобри сцеплението и комфорта при мокри условия.
    stepper_motion_type:
      name: Тип движение на степера
      description: Определя основното стъпково движение, предлагано от уреда.
    stick_bow_profile:
      name: Профил на стика
      description: Посочва профила на извивката („тип дъга“) на стика за хокей на
        трева – ключов фактор, който влияе върху контрола на топката, изпълнението
        на силно плъзгащо подаване/удар и стила на игра.
    stick_construction:
      name: Конструкция на стика
      description: Посочва конструктивния стил на хокейния стик, например еднокомпонентен
        композитен, двукомпонентен композитен или дървен.
    stick_curvature_type:
      name: Тип извивка на стика
      description: Описва профила на извивката на стика за хвърляне, който влияе върху
        дистанцията и точността на хвърляне.
    stick_head_shape:
      name: Форма на главата на стика
      description: Определя формата на главата на стика, която влияе върху спирането
        на топката, стила на ударите и близкия контрол върху топката.
    stick_size_compatibility:
      name: Съвместимост с размер на стика
      description: Посочва размерната група хокейни стикове, с която продуктът е съвместим
        (напр. детски, юношески, междинен, за възрастни, за вратар, универсален).
    sticker_decal_features:
      name: Характеристики на стикери/декоративни лепенки
      description: Описва характеристиките на приложение и използване, специфични
        за стикери/декоративни лепенки (напр. без мехурчета, с възможност за преместване).
    sticker_finish:
      name: Финиш на стикера
      description: Описва повърхностното покритие/визуалния ефект на стикерите.
    sticker_format:
      name: Формат на стикера
      description: Посочва търговската форма на декоративните стикери (напр. лист,
        ролка, единични бройки, книжка).
    sticker_material_type:
      name: Тип материал на стикера
      description: Посочва основния материал/основа на декоративния стикер (без декоративните
        елементи).
    stilt_foot_attachment_type:
      name: Тип на закрепване на опората за крака на кокили
      description: Посочва как кракът се закрепва към кокилата (напр. катарама, велкро,
        връзки).
    stirrup_style:
      name: Стил на стремето
      description: Класифицира стила на стремената според дизайна или дисциплината,
        включително различия в безопасността, предназначението и конструкцията.
    stirrup_tread_material:
      name: Материал на стъпалото на стремето
      description: Посочва материала, използван за стъпалото или грайфера на стремето,
        който влияе върху сцеплението, комфорта и износването.
    stitch_marker_and_counter_style:
      name: Стил на маркер и брояч за бримки
      description: Посочва стила или формата на маркер за бримки или брояч на бримки/редове
        (напр. заключващ маркер, маркер с разделен пръстен, пръстеновиден брояч, цифров
        брояч).
    stitch_types:
      name: Видове шевове
      description: Видове шевове (функционални и декоративни), които машината може
        да изпълнява.
    stitching_method:
      name: Метод на зашиване
      description: Посочва как панелите на топката са съединени помежду си.
    stitching_state:
      name: Състояние на шевовете
      description: Посочва дали частите на облеклото се предоставят незашити, полуготови,
        ушити или готови за носене.
    stock_car_race_series:
      name: Серия състезания за серийни автомобили
      description: Посочва санкциониращия орган или състезателната серия/клас, за
        който е конструиран състезателният автомобил.
    stone_adhesion:
      name: Адхезия на камъните
      description: Посочва дали костилката на прасковата или нектарината е свободно
        отделяща се, прилепнала към месото или полу-свободна.
    stone_creation_method:
      name: Метод за създаване на камъка
      description: Посочва дали камъкът е естествен, лабораторно създаден, имитация
        или рециклиран.
    stone_cut_grade:
      name: Степен на шлифовка на камъка
      description: Посочва общата оценка за качеството на шлифовката на камъка.
    stone_cut_style:
      name: Стил на шлифовка на камъка
      description: Стил на шлифовка/фасетиране на стъкления камък (напр. фасетиран
        или кабошон).
    stone_fruit_cultivar:
      name: Сорт костилкови плодове
      description: Идентифицира специфичния сорт/културен сорт праскова или нектарина.
    stone_fruit_variety:
      name: Разновидност на костилков плод
      description: Разграничава подтипа в категорията (напр. праскова, нектарина,
        плоска/поничкова праскова).
    stone_setting_type:
      name: Тип на закрепване на камъка
      description: Посочва начина, по който камъкът е закрепен в изделието (напр.
        обков, зъбци, паве и др.).
    stone_transparency:
      name: Прозрачност на камъка
      description: Оптична прозрачност/непрозрачност на стъкления камък.
    storage_case_type:
      name: Тип на кутията/калъфа за съхранение
      description: Посочва вида на контейнера, в който комплектът се доставя за съхранение
        и пренасяне (напр. кутия, калъф, чанта).
    storage_compartment_type:
      name: Тип отделение за съхранение
      description: Посочва какъв тип отделение за съхранение предоставя плувния буй
        за лични вещи.
    storage_media_and_transfer_methods_supported:
      name: Поддържани носители за съхранение и методи за прехвърляне на данни
      description: Поддържани носители или методи за свързване за импортиране/експортиране
        на семпли и записване/зареждане на проекти.
    storage_requirements:
      name: Изисквания за съхранение
      description: Посочва как продуктът трябва да се съхранява преди и/или след отваряне,
        за да се запази качеството и безопасността му.
    stove_jack_compatibility:
      name: Съвместимост с отвор за печка в палатка
      description: Показва дали палатката включва огнеупорен отвор за тръба на печка.
    straight_pin_application:
      name: Предназначение на правите карфици
      description: Посочва предназначението на правите карфици.
    straight_pin_finish:
      name: Покритие на правите карфици
      description: Описва повърхностното покритие (напр. никелирано), което влияе
        върху устойчивостта на корозия и плъзгането.
    straight_pin_head_material:
      name: Материал на главичката на правите карфици
      description: Посочва материала на главата на иглата (ако има такава), като пластмаса
        или стъкло.
    straight_pin_head_shape:
      name: Форма на главичката на правите карфици
      description: Описва формата/стила на главичката на карфицата с оглед удобство
        и видимост.
    strand_configuration:
      name: Конфигурация на нишките
      description: Показва от колко отделни реда или плитки се състои верижката за
        портмоне (единична, двойна, тройна).
    strand_material:
      name: Материал на нишката
      description: Посочва материала, използван за отделните нишки/ленти.
    strap_attachment_hardware:
      name: Метални елементи за закрепване на ремъка
      description: Посочва типа/дизайна на елемента, използван за закрепване на ремъка
        към инструмента или опорната точка.
    strap_configuration:
      name: Конфигурация на ремъка
      description: Посочва броя точки за закрепване на каишката към каската (напр.
        2-точково, 4-точково), което е важно за прилягане, безопасност и състезателни
        изисквания.
    strap_functionality:
      name: Функционалност на каишката
      description: Посочва основното предназначение или дизайн на ремъка за йога постелка.
    strap_padding:
      name: Подплата на каишката
      description: Посочва степента на омекотена подплата на каишката с цел по-голям
        комфорт и разпределение на тежестта.
    strap_side:
      name: Страна на каишката
      description: Показва дали ремъкът е предназначен за ляво закрепване, дясно закрепване,
        или се продава като чифт.
    strap_width:
      name: Ширина на каишката
      description: Посочва относителната ширина на презрамките (тесни, средни, широки),
        за да насочи купувачите към желаното покритие или опора.
    strength_classification:
      name: Класификация на здравината
      description: Маркетингова обозначителна категория за здравина, използвана от
        производителите (напр. лека, здрава, много здрава).
    strength_grade:
      name: Клас на здравина
      description: Описва предвидената здравина/натоварване на закопчалката тип кука
        и примка (велкро).
    stretch_level:
      name: Ниво на разтягане
      description: Посочва колко се разтяга текстилът при употреба.
    stretch_type:
      name: Тип разтягане
      description: Показва дали тъканта има механично или еластично разтягане и в
        коя(и) посока(и).
    stretcher_bar_material:
      name: Материал на подрамката
      description: Материал, използван за подрамката/рамката (напр. бор, ела, топола,
        бреза, MDF/инженерна дървесина).
    strike_shield_shape:
      name: Форма на защитния щит срещу удари
      description: Посочва общата форма на ударната повърхност на защитния щит срещу
        удари.
    string_core_shape:
      name: Форма на сърцевината на струната
      description: Посочва формата на сърцевинната тел, използвана в навити струни,
        която влияе на усещането и стабилността.
    string_coverage:
      name: Покритие на струната
      description: Посочва кои струни е предназначен да притиска/покрива частичният
        каподастър (по брой или стандартен набор).
    string_end_type:
      name: Тип край на струната
      description: Посочва как струната завършва при моста/струнодържача за съвместимост
        (особено важно за акустични, електрически и някои бас китари).
    string_set_type:
      name: Тип комплект струни
      description: Посочва дали продуктът е пълен комплект или отделна резервна струна/струни.
    strung_status:
      name: Състояние на оплитането
      description: Посочва дали главата за лакрос е предварително оплетена с джоб
        или се продава неоплетена.
    strut_placement:
      name: Разположение на подпората
      description: Посочва предназначеното място за монтаж върху превозното средство
        (предно/задно и ляво/дясно) за подпората.
    stud_attachment_type:
      name: Тип закрепване на шипа
      description: Посочва как бутоните/шиповете са закрепени или конфигурирани върху
        подметката, което влияе на сцеплението, поддръжката и съответствието със спортните
        правила.
    stud_configuration:
      name: Конфигурация на шиповете
      description: Определя формата и разположението на бутоните/шиповете върху подметката,
        което влияе на сцеплението и представянето на различни настилки.
    stud_material:
      name: Материал на шиповете
      description: Посочва основния материал на бутоните/шиповете, което дава информация
        за издръжливостта, теглото и съответствието с изискванията за безопасност.
    stuffed_animal_features:
      name: Характеристики на плюшени животни
      description: Подчертава вградените функции за игра и комфорт на плюшената играчка.
    stump_base_type:
      name: Тип основа на колчетата
      description: Описва типа основа или система за монтаж на колчето за крикет (напр.
        шип, пружинно връщане, гумена основа с тежест и др.).
    stump_mechanism:
      name: Механизъм на пънчето
      description: Посочва механизма за връщане или закрепване на крикетните колчета
        (напр. пружинно връщане, фиксирани).
    stump_size:
      name: Размер на колчетата
      description: Етикет с размери на категории, използван за крикетни колчета, който
        посочва типичната височина и подходящата възрастова група на играчите.
    subwoofer_installation_type:
      name: Тип монтаж на субуфера
      description: Как е предвидено да се монтира субуферът в автомобилна аудиосистема.
    sugar_cane_variety:
      name: Сорт захарна тръстика
      description: Посочва конкретния сорт или търговски вид захарна тръстика, който
        може да влияе на цвета, сладостта и съдържанието на фибри.
    sugar_content_level:
      name: Ниво на съдържание на захар
      description: Класифицира общото ниво на захар или формулата на концентрата за
        напитки, което позволява на купувачите бързо да намерят опции с нормално,
        намалено или без захар.
    sugar_refinement_level:
      name: Ниво на рафиниране на захарта
      description: Посочва степента или стила на рафиниране (цвят, съдържание на меласа
        или ниво на обработка).
    sugar_source:
      name: Източник на захар
      description: Посочва растителния или материалния произход, от който е получена
        захарта.
    suit_fit:
      name: Кройка на костюма
      description: Обща кройка на костюма, показваща колко плътно приляга към тялото.
    suit_pieces:
      name: Части на костюма
      description: Посочва колко съчетаващи се дрехи са включени в комплекта костюм
        (напр. от 2, 3 или 4 части).
    suitable_for_anchoring_use:
      name: Подходящо за закотвяне
      description: Показва предвидения случай на употреба, свързан със закотвяне,
        на въжето/линията.
    suitable_for_craft_type:
      name: Подходящо за тип занаят
      description: Основно предназначение на телта за блокиране в дадения вид ръкоделие
        с игла.
    suitable_for_paint_type:
      name: Подходящо за тип боя
      description: Посочва с кои видове бои платното е предназначено/безопасно да
        се използва.
    suitable_for_swim_stroke:
      name: Подходящо за плувен стил
      description: Посочва за кои плувни стилове е предназначена или оптимизирана
        плавателната дъска за ръце.
    suitable_mounting_surface_material:
      name: Подходящ материал на повърхността за монтаж
      description: Посочва предназначената монтажна повърхност/материал, към която
        е проектирана да залепва лепящата основа.
    suitable_play_location:
      name: Подходящо място за игра
      description: Основна(и) среда(и) за игра, за която(които) е предназначена играчката
        „Мелница за пясък и вода“.
    suitable_riding_conditions:
      name: Подходящи условия за каране
      description: Посочва условията на каране (напр. сухо, мокро, зимно), за които
        е разработена смазката или почистващият препарат за велосипед.
    suitable_snow_conditions:
      name: Подходящи снежни условия
      description: Посочва основните снежни условия, за които е предназначен ваксата
        за сцепление.
    suitable_surface_type:
      name: Подходящ тип повърхност
      description: Посочва за какви пешеходни настилки е предназначен захватът.
    suitable_table_size:
      name: Подходящ размер на масата
      description: Посочва дължината/дължините на билярдната или снукър масата, които
        лампата е предназначена да осветява.
    sun_protection_rating_upf:
      name: Степен на слънцезащита (UPF)
      description: Посочва сертифицираното ниво на слънцезащита UPF на дрехата.
    sun_shade_attachment_method:
      name: Метод за закрепване на сенника
      description: Как е закрепен сенникът към прозореца/предното стъкло.
    sun_shade_style:
      name: Стил на сенник
      description: Конструкция/формат на продукта за внедряване и съхраняване на сенника.
    sunchoke_variety:
      name: Вид/сорт на земната ябълка
      description: Посочва конкретния сорт или разновидност на йерусалимски артишок
        (гулия), предоставяйки подробна информация за градинари, готвачи и взискателни
        купувачи.
    sunflower_oil_variety:
      name: Сорт слънчогледово олио
      description: Класифицира профила на мастните киселини или сорта на слънчогледовото
        олио (напр. високоолеиново, средноолеиново, линолово).
    sunflower_variety:
      name: Сорт слънчоглед
      description: Сорт/разновидност на слънчогледа (често срещани търговски сортове
        за рязан цвят).
    support_brace_features:
      name: Характеристики на опорната скоба
      description: Изброява основните функционални характеристики на опората за китка,
        като дишаща материя, подвижна шина или регулируема метална пластина.
    support_leg_count:
      name: Брой опорни крака
      description: Брой крака, които опират в земята, когато опорната стойка за стрелба
        се използва (напр. монопод, бипод, трипод).
    support_padding:
      name: Омекотяване на опората
      description: Посочва дали ремъкът/опората има вградена подплънка в зоните на
        контакт (врата/рамо/палец).
    support_structure_type:
      name: Тип опорна конструкция
      description: Посочва конструктивния метод, използван за поддържане на преградата
        срещу вятър в изправено положение.
    supported_bowling_delivery_types:
      name: Поддържани типове подаване при крикет
      description: Посочва разновидностите на крикетното подаване, които машината
        може да симулира, като вътрешно завъртане, външно завъртане и различни видове
        спин.
    supported_dive_modes:
      name: Поддържани режими на гмуркане
      description: Посочва режимите на гмуркане, които компютърът за гмуркане поддържа,
        като Air, Nitrox или Gauge.
    supported_equipment_type:
      name: Поддържан тип оборудване
      description: Идентифицира екипировката за зимни спортове, за която е предназначен
        складовият стелаж (напр. ски, сноуборд, ски щеки).
    supported_spin_types:
      name: Поддържани видове спин
      description: Указва вариациите на завъртане на топката, които изстрелвателната
        машина може да приложи.
    supported_spool_bobbin_types:
      name: Поддържани типове шпули/макари
      description: Посочва кои формати шпули/макари електрическата машина за навиване
        е проектирана да приема.
    surf_wax_temperature_rating:
      name: Температурен клас на ваксата за сърф
      description: Посочва диапазона на температурата на водата, за който е предназначена
        ваксата, осигурявайки оптимално сцепление при различни климатични условия.
    surface_coating_or_finish:
      name: Повърхностно покритие или финиш
      description: Посочва защитна или подобряваща характеристика на повърхностното
        покритие на клещите.
    surface_coating_or_wrap:
      name: Повърхностно покритие или обвивка
      description: Външното повърхностно покритие, използвано за сцепление/контрол
        върху централната палка (а понякога и върху палките за ръце).
    surface_finish:
      name: Повърхностно покритие
      description: Описва усещането/текстурата на повърхността на топката, която влияе
        на сцеплението и движението при контактно жонглиране.
    surface_finish_prep:
      name: Повърхностна обработка/подготовка
      description: Посочва състоянието на триещата повърхност (напр. повторно обработена,
        машинно обработена, отливка без допълнителна обработка) при продажба.
    surface_types_included:
      name: Включени видове повърхности
      description: Посочва каква повърхност включва комплектът за рисуване/боядисване
        (ако има), като платно, блок за рисуване, дървени панели или никаква.
    surfboard_construction:
      name: Конструкция на сърф дъска
      description: Посочва основната технология на изработка или слоевата структура
        на сърф дъската.
    surfboard_tail_shape:
      name: Форма на опашката на сърф дъската
      description: Определя формата на опашката на дъската, която влияе върху маневреността
        и задържането на вълната.
    suspension_bushing_type:
      name: Тип втулка на окачването
      description: Посочва функционалния/монтажния тип на втулката на окачването.
    suspension_configuration:
      name: Конфигурация на окачването
      description: Описва дали триколката има окачване и къде се намира то.
    suspension_material:
      name: Материал на окачването
      description: Посочва материала на веригите, въжетата или кабелите, използвани
        за окачване на люлката.
    suspension_trainer_accessories_included:
      name: Включени аксесоари за тренажор за окачване
      description: Изброява допълнителните елементи, включени в тренировъчния комплект
        (напр. закрепване за врата, удължаваща лента, чанта за съхранение), помагайки
        на купувачите да разберат какво има в кутията и да сравнят стойността на комплектите.
    suspension_trainer_anchor_type:
      name: Тип на анкерната система на тренажора за окачване
      description: Определя стила на монтаж или точката на закрепване, за които са
        предназначени лентите (напр. врата, таван, дърво), като дава информация за
        съвместимостта със средата на потребителя.
    suspension_type:
      name: Тип окачване
      description: Посочва дали вилката е твърда или използва определена система за
        окачване (въздушна, пружинна, хибридна, еластомерна и др.), помагайки на колоездачите
        да изберат подходяща вилка според стила си на каране.
    sustain_pedal_form_factor:
      name: Форм-фактор на педала за задържане на тона
      description: Физическият стил на педала за задържане на звук (напр. педал тип
        пиано срещу компактен крачен превключвател), който влияе върху усещането и
        предназначението на употреба.
    sustain_pedal_switch_type:
      name: Тип на превключвателя на педала за задържане на звук
      description: Посочва дали педалът изпраща моментен сигнал (докато е натиснат)
        или превключващ сигнал.
    sustainability_certification:
      name: Сертификация за устойчивост
      description: Екологичен сертификат или сертификат за произход на дървесния материал.
    swab_intended_bassoon_section:
      name: Секция за фагот, предназначена за почистване
      description: Показва за коя част от фагота е предназначен тампонът (различните
        канали/части изискват тампони с различна форма и размер).
    swab_style:
      name: Стил на тампона
      description: Описва физическия дизайн/формат на тампона, използван за преминаване
        или достигане до части на саксофона.
    swab_weight_material:
      name: Материал на тежестта на почистващия тампон
      description: Материал на тежестта/водача за издърпване (ако има), който влияе
        върху риска от надраскване и издръжливостта.
    swab_weight_style:
      name: Стил на тежестта за тампон
      description: Определя как е оформен тампонът, за да може да премине през канала
        на фагота.
    sway_bar_adjustability:
      name: Регулируемост на стабилизиращата щанга
      description: Дали и как твърдостта на стабилизиращата щанга може да се регулира
        (обикновено чрез множество монтажни отвори за свързващите щанги).
    sway_bar_coating:
      name: Покритие на стабилизиращата щанга
      description: Повърхностна обработка или покритие на стабилизиращата щанга за
        устойчивост на корозия и външен вид.
    sway_bar_fitment_front_rear_kit:
      name: Съвместимост на стабилизиращата щанга (предна/задна/комплект)
      description: Посочва дали стабилизиращата щанга е предназначена за предния мост,
        задния мост или се продава като комплект за двата.
    sweatshirt_pocket_type:
      name: Тип джоб на суитчър
      description: Описва стила на джобовете на суитшърта.
    sweet_potato_variety:
      name: Сорт сладки картофи
      description: Посочва конкретния сорт или пазарна разновидност на сладкия картоф.
    sweet_spot_position:
      name: Оптимална позиция
      description: Посочва къде се намира идеалната точка за удар на бухалката по
        дължината на острието, което влияе на стила на игра и условията на терена.
    sweetener_presence:
      name: Наличие на подсладител
      description: Посочва дали в ядковото масло има добавени подсладители и в какво
        количество.
    sweetening_type:
      name: Вид подсладител
      description: Описва как е подсладен продуктът или нивото му на сладост.
    swim_armband_construction_type:
      name: Тип конструкция на плувните ръкави
      description: Определя конструкцията или механизма за плаване на ръкавите (надуваеми,
        от твърда пяна, хибридни и др.).
    swim_belt_purpose:
      name: Предназначение на плувния пояс
      description: Функционално предназначение на плувния пояс (напр. помощ за поддържане
        на повърхността, воден джогинг, тренировки със съпротивление, фиксирано закрепване,
        закрепване на съпротивителен парашут, тежести, безопасно газене).
    swim_board_features:
      name: Характеристики на дъска за плуване
      description: Подчертава специални характеристики или подобрения на плувната
        дъска, които повишават удобството или безопасността.
    swim_bottom_length:
      name: Дължина на долната част на плувния костюм
      description: Класифицира общата дължина на покритие на краката при плувните
        боксерки (напр. къси боксерки или до коляното).
    swim_buoy_features:
      name: Характеристики на плувния буй
      description: Описва допълнителни характеристики или приставки, които подобряват
        видимостта, безопасността или практичността на плувния буй.
    swim_cap_style:
      name: Стил на плувна шапка
      description: Определя конструкцията или стила на дизайна на плувната шапка (напр.
        за дълга коса, състезателна, тип „балон“ или тюрбан).
    swim_diaper_feature:
      name: Характеристика на пелена за плуване
      description: Посочва дали плувните гащички имат вградена непропусклива пелена
        или изискват/не включват отделна пелена за плуване.
    swim_trainer_features:
      name: Характеристики на тренировъчния уред за плуване
      description: Подчертава допълнителни функционални или удобни характеристики
        на тренировъчния уред за плуване.
    swim_trainer_type:
      name: Тип тренажор за плуване
      description: Определя конструктивния стил или формата на тренажора за плуване,
        за да подпомогне филтрирането по дизайн и тренировъчно предназначение.
    swim_training_focus:
      name: Фокус на тренировката по плуване
      description: Посочва основната тренировъчна цел, за която е предназначено греблото
        (напр. техника, сила, изолиране на мускули).
    swim_weight_style:
      name: Стил на тежестта за плуване
      description: Класифицира формата/типа на тежестта за плуване, помагайки на купувачите
        да различават различни основни видове продукти в рамките на една категория.
    swimbait_buoyancy:
      name: Плаваемост на плаващата примамка
      description: Посочва как примамката се държи във водата (плаваща, неутрална,
        потъваща и др.), позволявайки на риболовците да изберат правилната примамка
        за желаната дълбочина и начин на водене.
    swimbait_style:
      name: Стил на изкуствена стръв тип „свимбей“
      description: Определя конструкцията или принципа на действие на примамката,
        например примамка с греблообразна опашка или плъзгаща се примамка.
    swimwear_pieces_included:
      name: Включени части на банския
      description: Изброява отделните части на облеклото, включени в комплекта буркини,
        така че купувачите да знаят точно какво съдържа комплектът.
    swimwear_set_pieces_included:
      name: Включени части в комплект бански
      description: Изброява елементите на облеклото, включени в комплекта буркини,
        така че купувачите да знаят точно какво ще получат (напр. горнище, клин, хиджаб/шапка).
    swing_attachment_connection_type:
      name: Тип закрепване/свързване на люлката
      description: Типът свързване, използван за окачване на люлката към нейната опора
        (напр. въже, верига, ремъци).
    swing_trainer_type:
      name: Тип тренажор за замах
      description: Класифицира стила или механизма на уреда за люлеене, за да могат
        купувачите бързо да намерят уреди, които отговарят на техните тренировъчни
        цели.
    swing_training_objective:
      name: Цел на тренировката за замах
      description: Класифицира основния тренировъчен фокус, механизъм или цел на тренажора
        за суинг (напр. темпо, скорост, захват).
    switch_electrical_positions:
      name: Електрически позиции на превключвателя
      description: Посочва броя и поведението на електрическите позиции на превключвателя
        (напр. 3-позиционен, моментен контакт).
    swivel_type:
      name: Тип въртяща връзка
      description: Посочва конфигурацията на въртящия елемент (шарнир), използван
        за намаляване на усукването на каишката.
    sword_scabbard_material:
      name: Материал на ножницата на меча
      description: Определя основния материал на включената кания/ножница (ако има
        такава).
    synthesizer_form_factor:
      name: Типоразмер на синтезатора
      description: Описва физическия формат/интерфейс за свирене на синтезатора.
    synthetic_feather_style:
      name: Стил на синтетичното перо
      description: Стил/форма на синтетичното перо, използвано за различни визии и
        техники за изработка.
    synthetic_formulation_type:
      name: Тип синтетична формула
      description: Посочва типа синтетична базова основа/формула (напр. PAO, естер,
        хидрокрекирана Група III).
    syrup_base_ingredient:
      name: Основна съставка на сиропа
      description: Идентифицира основното растение или източник на захар, от който
        се получава сиропът или нектарът (напр. клен, агаве, тръстикова захар).
    syrup_variety:
      name: Разнообразие на сироп
      description: Определя общия вид или категория сироп въз основа на неговата формула
        или традиционна употреба (напр. кленов, аромат на кафе, плодов, лечебен).
    t_shirt_fit:
      name: Кройка на тениска
      description: Описва предвидената обща кройка/прилягане на тениската.
    tabla_included_components:
      name: Включени компоненти на таблата
      description: Посочва кои основни елементи са включени към продукта табла (единичен
        барабан или комплект, калъфи/кутии, чукче за настройка и др.).
    tabla_set_pieces_included:
      name: Включени части в комплект табла
      description: Показва кои компоненти са включени в комплекта табла (напр. даян,
        баян, пръстени, калъфи, инструменти за настройка, чанта).
    tabla_tonal_pitch_range_bayan:
      name: Диапазон на тонове/височина на табла (баян)
      description: Описва типичния диапазон на височината/тона за баян барабаните
        (басовите) според размера и конструкцията.
    table_base_material:
      name: Материал на основата на масата
      description: Идентифицира основния материал на основата или пиедестала на масата
        (различен от краката или плота на масата), което улеснява филтрирането по
        материал.
    table_base_type:
      name: Тип на основата на масата
      description: Посочва конструкцията, която поддържа плота на масата (напр. централен
        крак, подпорна рамка, Х-образна основа).
    table_coverage_position:
      name: Позиция на покривалото за маса
      description: Посочва за кои позиции на масата за пинг-понг е предназначено покривалото
        — сгъната, разгъната за игра или и двете.
    table_hockey_part_type:
      name: Тип част за маса за хокей
      description: Определя конкретния тип компонент в системите за настолен/въздушен/щангов/балонен
        хокей.
    table_leg_design:
      name: Дизайн на краката на масата
      description: Определя конструктивния стил или формата на крака, позволявайки
        на купувачите да съчетаят външния вид и нуждите от опора.
    table_size:
      name: Размер на таблицата
      description: Търговски обозначен общ размер на билярдната маса (във футове),
        позволяващ на купувачите бързо да избират стандартни варианти като 7-футови
        бар маси или 9-футови турнирни маси.
    table_size_category:
      name: Категория размер на масата
      description: Категоризира масата за джаги според общите ѝ размери, за да помогне
        на купувачите да я съобразят с наличното пространство без изчисляване на размери.
    table_tennis_certification:
      name: Сертификат за тенис на маса
      description: Изброява официалните стандарти или одобрения от спортни/регулаторни
        организации, които продуктът покрива (напр. ITTF, EN 14468-2 класове).
    tabletop_tilt_function:
      name: Функция за накланяне на плота
      description: Посочва дали плота може да се накланя, обръща, или завърта под
        различни ъгли.
    tackle_components_included:
      name: Включени компоненти за риболовни принадлежности
      description: Изброява конкретните риболовни принадлежности, включени в комплекта,
        така че купувачите да знаят точно какво е предоставено.
    talking_drum_accessories_included:
      name: Включени аксесоари за говорещи барабани
      description: Изброява аксесоарите, включени към говорещия барабан (в кутията).
    talking_drum_cord_material:
      name: Материал на кордите на говорещия барабан
      description: Материал, използван за опъващите корди/въжета, които свързват мембраните
        на барабана.
    talking_drum_tuning_mechanism:
      name: Механизъм за настройване на говорещия барабан
      description: Как се променя височината на звука/как се прилага опъването по
        време на свирене (или при настройване).
    tam_tam_construction_style:
      name: Стил на конструкцията на там-там
      description: Стил на изработка/изчукване на там-тама.
    tam_tam_items_included:
      name: Включени елементи към там-тама
      description: Включени аксесоари към там-тама (напр. палка, стойка, калъф).
    tamarillo_variety:
      name: Сорт тамарило
      description: Идентифицира конкретния сорт или цветови вариант на плода тамарило.
    tamarind_variety:
      name: Сорт тамаринд
      description: Определя ботаническия или търговския сорт на тамаринда, който може
        да влияе върху вкуса, текстурата и кулинарната употреба.
    tambourine_frame_style:
      name: Стил на рамката на тамбурина
      description: Описва физическата ръчна рамкова конфигурация, използвана за държане/свирене
        на дайре.
    tambourine_head_material:
      name: Материал на мембраната на тамбурина
      description: Определя материала на мембраната за свирене при тамбурини с кожа.
    tambourine_jingle_configuration:
      name: Конфигурация на металните звънчета на дайрето
      description: Как чинелчетата са подредени или конструирани върху тамбурина.
    tambourine_jingle_material:
      name: Материал на чинелчетата на тамбурина
      description: Посочва материала на металните звънчета на дайрето, който влияе
        на звука и издръжливостта.
    tambourine_mounting_type:
      name: Тип на монтаж на дайрето
      description: Как е предвидено тамбуринът да бъде държан или монтиран по време
        на свирене.
    tambourine_tuning_mechanism:
      name: Механизъм за настройване на тамбурина
      description: Посочва системата за настройване на дайрето с възможност за настройка
        (ако е приложимо).
    tank_model_scale:
      name: Мащаб на модела на танка
      description: Определя мащаба на модела на танк (напр. 1:35, 1:72).
    tank_top_back_style:
      name: Стил на гърба на потника
      description: Посочва формата или кройката на задната част на потника, която
        влияе на опората, свободата на движение и визията.
    tape_application_area:
      name: Област на приложение на лентата
      description: Посочва частта от екипировката или тялото на играча, върху която
        е предназначено да се поставя лентата, за да се избере правилният тип.
    tape_finish:
      name: Покритие на лентата
      description: Повърхностно/визуално покритие (блясък или текстура) на лентата.
    tape_purpose:
      name: Предназначение на лентата
      description: Определя основното предназначение на лентата при поддръжка или
        персонализиране на ракета.
    tape_type:
      name: Тип лента
      description: Класифицира функционалния стил или конструкция на хокейната лента,
        като платнена, прозрачна полиетиленова, за сцепление, еластична самозалепваща,
        за кори на пищяла или велурена.
    tapenade_main_ingredients:
      name: Основни съставки на тапенадата
      description: Определя основната съставка, която характеризира тапенадата (маслина,
        домат, патладжан, пипер и др.), полезно за купувачи с хранителни предпочитания
        или ограничения.
    tapestry_loom_loom_format:
      name: Формат на стан за гоблени
      description: Обща форма/стил на стойката на ръчния стан за гоблени.
    tapestry_loom_shedding_method:
      name: Метод за образуване на отвор при стан за гоблени
      description: Как станът създава отвор (разделя основните нишки) за преминаване
        на вътъка.
    tapestry_loom_tensioning_system:
      name: Система за опъване на гобленовия стан
      description: Метод за опъване и закрепване на основата при стан за гоблени.
    tar_head_material:
      name: Материал на мембраната на тара
      description: Определя материала на мембраната на тара, който силно влияе върху
        усещането, издръжливостта и звученето.
    tar_playing_style:
      name: Стил на свирене на тар
      description: Определя основната позиция или техника на свирене, за която е предназначен
        тарът.
    tar_tuning_system:
      name: Система за настройване на тар
      description: Определя как се настройва тарът (как се регулира опъването на мембраната).
    target_components:
      name: Компоненти на мишената
      description: Посочва кои компоненти от горивната/въздушната система е предназначен
        да почиства продуктът.
    target_relative_humidity_rh:
      name: Целева относителна влажност (RH)
      description: Желаната относителна влажност, която продуктът е предназначен да
        поддържа в инструмента или калъфа.
    target_resetting_mechanism:
      name: Механизъм за връщане на мишената
      description: Описва как и дали мишената се връща в първоначалното си положение
        след удар.
    target_trainer_type:
      name: Тип тренажор за мишена
      description: Класифицира цялостния стил или формат на тренажора за ракетбол
        или скуош.
    targeted_contaminants:
      name: Целеви замърсители
      description: Видове микроби или паразити, които продуктът е сертифициран да
        елиминира.
    targeted_muscle_group:
      name: Целева мускулна група
      description: Основна мускулна група, която аксесоарът е предназначен да тренира
        или подпомага.
    taro_variety:
      name: Сорт таро
      description: Посочва сорта, вида или търговското наименование на тарото (напр.
        лилаво таро, едо, дашин).
    tassel_trim_header_type:
      name: Тип горна лента на пискюлната украса
      description: Определя конструкцията на горната закрепваща част, използвана за
        прикрепяне на пискюлната украса към повърхност (напр. лента, плитка, шнур).
    tassel_trim_use_case:
      name: Предназначение на пискюлната украса
      description: Основна област на приложение на пискюлната украса.
    taste_profile:
      name: Вкусов профил
      description: Описва преобладаващите вкусови характеристики на сорта ябълка.
    tea_variety:
      name: Сорт чай
      description: Класифицира конкретния вид или стил чай или запарка (напр. черен,
        зелен, матча, ройбос), за да позволи филтриране по предпочитан вид.
    teasing_tool_style:
      name: Стил на инструмент за разрошване
      description: Физическият стил или форма на инструмента за разрошване, използван
        за отваряне и смесване на влакна (напр. четка, гребло, гребен).
    tee_base_style:
      name: Основен стил на тениската
      description: Определя конструкцията на основата на стойката за ритане в ръгби,
        която поддържа топката.
    temper_hardness:
      name: Закалка / твърдост
      description: Показва колко мека или твърда е телта (колко добре запазва формата
        си).
    temperature_control_type:
      name: Тип контрол на температурата
      description: Как се контролира или регулира температурата на инструмента.
    tenkara_action_ratio:
      name: Съотношение на действието на тенкара въдица
      description: Показва традиционното съотношение на огъване при Тенкара, което
        описва къде се огъва въдицата под натоварване (напр. 6:4).
    tennis_ball_court_surface:
      name: Тип настилка за тенис топка
      description: Определя за какъв тип кортова настилка е предназначена топката,
        за да осигури оптимално представяне и издръжливост.
    tennis_ball_pressure_type:
      name: Тип налягане на тенис топка
      description: Посочва вътрешното налягане или конструкцията на топката (с налягане,
        без налягане, с ниска компресия, пяна), което влияе на отскока и издръжливостта.
    tennis_racket_grip_size:
      name: Размер на дръжката на тенис ракета
      description: Посочва стандартизираната обиколка на дръжката на ракетата (L0–L5
        или еквивалент в инчове), за да се осигури правилен захват и комфорт.
    tenor_flutophone_fingering_system:
      name: Система на пръстовка за тенорен флутофон
      description: Посочва системата за пръстовка, използвана при тенор флутофон (учебна/нотационна
        конвенция).
    tenor_recorder_joint_type:
      name: Тип сглобка на тенор блокфлейта
      description: Указва типа на съединението/връзката между секциите на тенор блокфлейтата.
    tenor_saxophone_key_system:
      name: Клавишна система за тенор саксофон
      description: Посочва системата на механиката/клапаните, използвана при инструмента
        (често описвана като френски или система Бьом при саксофони).
    tenor_saxophone_pad_material:
      name: Материал на възглавничките на тенор саксофон
      description: Посочва основния материал, използван за подложките на инструмента.
    tenor_trombone_slide_type:
      name: Тип на плъзгача на теноровия тромбон
      description: Тип плъзгач на теноровия тромбон (напр. стандартен/прав или с тригер/аксиален
        поток).
    tenor_trombone_valve_configuration:
      name: Конфигурация на теноров тромбонов клапан
      description: Показва дали тенорният тромбон има приставка за клапан/ротор и
        каква конфигурация използва.
    tension_control_type:
      name: Тип контрол на напрежението
      description: Показва как (или дали) совалката осигурява регулируемо съпротивление/опън
        върху калерчето по време на подаване.
    tension_mechanism:
      name: Механизъм за опъване
      description: Стилът на опъване, използван за контрол на подаването на вътъка
        от калерчето по време на тъкане.
    tension_pitch_modulation_system:
      name: Система за регулиране на напрежението/тона
      description: Как говорещият барабан променя височината на тона/опъна по време
        на свирене (например чрез стискане на опъващите шнурове).
    tension_system:
      name: Система за опъване
      description: Системата за навиване/опъване на предачното колело, за която е
        предназначен комплектът с водач.
    tent_fabric_material:
      name: Материал на плата на палатката
      description: Показва основния плат, използван за външната част или тялото на
        палатката, влияещ върху теглото, проветривостта и устойчивостта на атмосферни
        условия.
    tent_season_rating:
      name: Сезонен клас на палатка
      description: Класифицира палатката според броя сезони или климатичните условия,
        за които е предназначена (напр. 3-сезонна, 4-сезонна, експедиционна).
    tent_setup_type:
      name: Тип поставяне на палатка
      description: Показва конструктивния начин на разпъване на палатката, като самостоятелно
        стояща, полу-самостоятелна, несамостоятелна, надуваема или сгъваема.
    tent_style:
      name: Стил палатка
      description: Описва конструкцията на палатката (напр. куполна, тунелна, тип
        „А“).
    test_result_output_method:
      name: Метод за извеждане на резултатите от теста
      description: Определя как тестерът за автомобилен акумулатор показва или предоставя
        резултатите на потребителя (напр. индикатор, екран, разпечатка, приложение
        или софтуерен отчет).
    tether_strap_system:
      name: Система с ремък/каишка
      description: Тип система с ремък или каишка, използвана за свързване на опората
        за врата към каската или сбруята (ако е приложимо).
    text_color:
      name: Цвят на текста
      description: Цвят на отпечатания или бродирания текст върху етикета, различен
        от цвета на фона на етикета.
    textile_craft_machine_operation_type:
      name: Тип задвижване на текстилна машина
      description: Как се задвижва машината (ръчно, с педал или електрически).
    textile_finish_treatment:
      name: Текстилна обработка / финиш
      description: Определя специалните повърхностни обработки, приложени върху текстилния
        материал.
    texture_inclusions:
      name: Текстурни добавки
      description: Определя добавени съставки за текстура, като пулп от алое, семена
        от босилек, nata de coco, пукащи топчета или парченца плод.
    therapeutic_technology:
      name: Терапевтична технология
      description: Определя вградени терапевтични функции, като охлаждащ гел, магнитни
        ленти или инфрачервена керамика.
    thermal_set_components:
      name: Компоненти на термокомплект
      description: Посочва дали продуктът включва само долнище, само горнище или комплект
        от двете части.
    thermal_weight:
      name: Топлинен клас
      description: Показва степента на топлина на плата за балаклава.
    thermostat_type:
      name: Тип термостат
      description: Функционалният дизайн или начинът на управление на термостата в
        охладителната система на моторно превозно средство.
    thimble_guide_size:
      name: Размер на водача за напръстник
      description: Размерно означение на водача за напръстник (размер за прилягане/покритие),
        обикновено продаван като малък/среден/голям вместо по точни размери.
    thread_connection_size:
      name: Размер на резбовата връзка
      description: Определя спецификацията на резбата, която свързва валове, накрайници
        и адаптери (напр. 6 мм, 5/16 инча - 24).
    thread_construction:
      name: Конструкция на конеца
      description: Описва как е изработен или обработен конецът (напр. усукан конец
        за бродерия или импрегниран/запечатан конец).
    thread_cord_type_beading_pattern:
      name: Тип конец/шнур (модел за нанизване)
      description: Препоръчителен тип конец или шнур за завършване на модела.
    thread_cutter_form_factor:
      name: Форм фактор на резачка за конци
      description: Идентифицира физическия вид на ножицата за конци, например ръчни
        ножички, ножички тип висулка или пръстеновидни.
    thread_cutter_mechanism:
      name: Механизъм на ножицата за конци
      description: Описва механизма или начина на рязане, използван от резачката за
        конец.
    thread_cutter_safety_features:
      name: Функции за безопасност на резачка за конци
      description: Посочва вградените функции за безопасност, които намаляват риска
        от случайни порязвания или предпазват остриетата при съхранение.
    thread_cutter_usage_application:
      name: Предназначение/приложение на ножицата за конци
      description: Посочва основното предназначение на резачката за конец в занаятчийската
        работа.
    thread_finish_treatment:
      name: Финиш / обработка на резбата
      description: Повърхностно покритие или обработка на конеца, която влияе на обработката
        и характеристиките му (напр. восъчен, импрегниран, мерсеризиран).
    thread_material:
      name: Материал на конеца
      description: Основно влакно/материал на конеца или мулинето (не на плата).
    thread_material_fiber:
      name: Материал на конеца (влакно)
      description: Определя основното влакно/материал на самия конец (не на тъканта).
    thread_package_format:
      name: Формат на опаковката на конеца
      description: Форма на опаковката на шевния конец (напр. макара, конус, калерче).
    thread_rack_compatible_spool_type:
      name: Съвместим тип макара за стойка за конци
      description: Тип на опаковката на конеца, за която е предназначена стойката
        (напр. макари, конуси и др.).
    thread_standard_size:
      name: Стандартен размер на резбата
      description: Определя стандарта за размер/дебелина на конеца, използван върху
        етикета на продукта (напр. wt, Tex, denier).
    thread_type:
      name: Тип конец
      description: Посочва вида/конструкцията на конеца за кръстат бод (мулине/конец
        за бродерия).
    thread_weight_system:
      name: Система за определяне на дебелината на конеца
      description: Стандартът, използван за обозначаване на дебелината/теглото на
        конеца.
    thread_yarn_guide_mounting_attachment_style:
      name: Стил на закрепване/монтаж на водач за конец и прежда
      description: Описва как водачът се носи или монтира по време на употреба.
    thread_yarn_guide_tension_control:
      name: Контрол на опъна на водач за конец и прежда
      description: Показва дали и как водачът осигурява регулируемо опъване/съпротивление
        на конеца или преждата.
    thread_yarn_organizer_features:
      name: Характеристики на органайзера за конци и прежда
      description: Подчертава функциите за организация и преносимост, специфични за
        съхранение на конци/прежда.
    threader_intended_use:
      name: Предназначение на уред за вдяване на конец
      description: Посочва основния занаятчийски контекст, за който е предназначен
        ръчният уред за промушване на игла.
    threading_system:
      name: Система за вдяване
      description: Показва метода и помощните средства, използвани за вдяване на оверлог
        машината (напр. ръчно, с цветови код, насочвано, въздушно вдяване).
    threading_type:
      name: Тип резба
      description: Посочва дали бижуто използва вътрешна резба, външна резба, безрезбова
        система или не е приложимо.
    throttle_type_scooter_conversion:
      name: Тип ръкохватка на газта (при преустройство на скутер)
      description: Посочва типоразмера/интерфейса на дросела, включен или необходим
        за конверсионния комплект.
    throw_rope_end_attachment:
      name: Закрепване на края на въжето за хвърляне
      description: Крайна част или халка, предоставени в работния край/краища на спасителното
        въже.
    throw_rope_storage_packaging_type:
      name: Тип на съхранение/опаковка на спасително хвърлящо въже
      description: Как спасителното въже се съхранява или разгъва (напр. в чанта или
        на макара).
    throw_rope_visibility_features:
      name: Функции за видимост на спасителното въже
      description: Характеристики за видимост и разпознаване, предназначени да правят
        въжето по-лесно забележимо във вода или при слаба светлина.
    thrower_operation_type:
      name: Тип работа на разпръсквача
      description: Класифицира механичния/работния стил на хвъргачката, за бързо филтриране
        между ръчни и автоматични механизми.
    thumb_design:
      name: Конструкция на палеца
      description: Описва как палецът е вграден в ръкавицата, което влияе върху безопасността
        и захвата.
    tiara_design:
      name: Дизайн на тиара
      description: Определя цялостния структурен стил или силует на тиарата.
    tie_down_points_straps_included:
      name: Включени точки/ремъци за закрепване
      description: Посочва дали багажникът включва вградени точки за закрепване и/или
        включени ремъци за обезопасяване на мотоциклета/скутера.
    tiling_format:
      name: Формат на плочки
      description: Определя стила на PDF оформлението за сглобяване на отпечатани
        страници.
    time_current_characteristic:
      name: Характеристика на времевия ток
      description: Посочва времево-токовата характеристика на предпазителя (напр.
        бързодействащ или бавнодействащ), която определя пригодността му за вериги
        с пускови токове.
    timer_count_mode:
      name: Режим на отчитане на таймера
      description: Определя режима на броене на таймера, като обратно броене, броене
        нагоре (хронометър), и двете или интервално/повтарящо се броене.
    timer_display_type:
      name: Тип дисплей на таймера
      description: Показва как таймерът представя оставащото време (напр. цифров екран,
        аналогов циферблат, пясъчен часовник или без визуален дисплей).
    timer_operating_modes:
      name: Режими на работа на таймера
      description: Поддържани режими на таймера за задействане на ефекти.
    timing_belt_construction_material_rubber_compound:
      name: Материал за конструкция на ангренажния ремък (каучукова смес)
      description: Основен каучуков състав на ремъка (напр. HNBR), който влияе върху
        устойчивостта на топлина/масло и дълготрайността.
    timing_belt_profile:
      name: Профил на ангренажен ремък
      description: Стандарт за профил/форма на зъбите на ангренажния ремък (напр.
        трапецовиден или криволинеен).
    timing_belt_reinforcement_cord_material:
      name: Материал на армировъчния корд на ангренажния ремък
      description: Посочва материала на вътрешния армировъчен корд в ангренажния ремък
        (напр. фибростъкло, арамид), който влияе на здравината и разтегливостта.
    timing_component_material:
      name: Материал на компонентите на ангренажа
      description: Основен материал на компонента за синхронизация (материал на ремъка,
        метал на веригата/зъбните колела или материал на капака).
    tin_whistle_body_material:
      name: Материал на корпуса на тенекиената свирка
      description: Описва често срещаните материали за корпуса на тенекиената свирка
        по-конкретно от общия списък с материали за инструмента, когато е необходимо.
    tin_whistle_bore_type:
      name: Тип канал на тенекиената свирка
      description: Определя конструкцията на въздушния канал на тенекиената свирка.
    tin_whistle_included_accessories:
      name: Включени принадлежности за тенекиената свирка
      description: Включени аксесоари към свирката, като калъф, почистващ прът и др.
    tip_finish_coating:
      name: Финиш/покритие на върха
      description: Определя повърхностната обработка на работния край (напр. хромиране,
        прахово покритие), която влияе върху устойчивостта на корозия и надраскване
        на джантата.
    tip_shape:
      name: Форма на върха
      description: Описва формата или остротата на върха на перцето за китара, което
        влияе върху артикулацията и усещането при свирене.
    tippet_rating:
      name: Класификация на здравината/носимостта на типета
      description: Максимално препоръчително натоварване на повода, изразено в означенията
        X при мухарски риболов (напр. 4X).
    tire_changer_operation_type:
      name: Тип работа на машината за смяна на гуми
      description: Посочва начина на задвижване/управление на машината за монтаж и
        демонтаж на гуми (напр. ръчно, пневматично, хидравлично). Различен от общия
        атрибут „Източник на захранване“; използва се при описание на метода на задействане
        на машината.
    tire_changer_type:
      name: Тип машина за смяна на гуми
      description: Общият работен стил, дизайн или ниво на автоматизация на машина
        за монтаж и демонтаж на гуми.
    tire_compound_type:
      name: Тип каучукова смес на гумата
      description: Посочва класа на каучуковата смес в гумите (напр. мека, за мокро,
        слик), който влияе на сцеплението и издръжливостта при различни условия.
    tire_load_range:
      name: Товарен индекс на гумата
      description: Показва индекса на платовете/товарния индекс на гумата (често при
        LT гуми), който отразява товароносимостта.
    tire_position:
      name: Позиция на гумата
      description: Препоръчителна позиция за монтаж на превозното средство.
    tire_repair_kit_components:
      name: Компоненти на комплект за ремонт на гуми
      description: Посочва включените елементи в комплекта, за да могат клиентите
        да сравнят пълнотата на пакета.
    tire_sidewall_type:
      name: Тип странична стена на гумата
      description: Посочва стила или конструктивните характеристики на страничната
        стена.
    tire_speed_rating:
      name: Скоростен индекс на гумата
      description: Скоростен индекс на гумата (напр. H, V, W), показващ максималната
        допустима постоянна скорост..
    tire_spoon_type:
      name: Тип лост за гуми
      description: Категоризира лоста за гуми според формата на края и предназначението
        му.
    tire_system_compatibility:
      name: Съвместимост на системата за гуми
      description: Показва дали уплътнителят е предназначен за безкамерни гуми, гуми
        с вътрешна камера или и за двата типа.
    tire_temperature_rating_utqg:
      name: Температурен индекс на гумата (UTQG)
      description: UTQG индекс за устойчивост на температура при автомобилни гуми
        (напр. A, B, C).
    tire_traction_rating_utqg:
      name: Сцепление на гумата (UTQG)
      description: UTQG индекс за сцепление при спиране на мокра настилка.
    tire_tread_style:
      name: Стил на протектора на гумата
      description: Описва общия шарка̀/протектор на тръбната гума, отразяващ предназначения
        терен и характеристиките на сцепление.
    tire_tube_type:
      name: Тип вътрешна гума
      description: Показва дали гумата е предназначена за безкамерна употреба или
        за употреба с вътрешна гума.
    title_status:
      name: Статус на собствеността
      description: Правен/регистрационен статус на собствеността на превозното средство
    tobacco_application:
      name: Приложение на тютюна
      description: Посочва предназначения начин на употреба или устройството за пушене,
        за което е предназначен насипният тютюн.
    tobacco_cut_type:
      name: Тип нарязване на тютюна
      description: Определя физическото нарязване или подготовка на насипния тютюн,
        което влияе върху скоростта на горене, начина на пълнене и цялостното усещане
        при пушене.
    tobacco_strength:
      name: Сила на тютюна
      description: Показва усещаната плътност или никотинов удар на тютюна при употреба,
        като помага на купувачите да изберат интензивност според предпочитанията си.
    toe_construction:
      name: Конструкция на пръстите
      description: Определя конфигурацията на зоната при пръстите на неопреновите
        обувки, която влияе върху баланса, усещането върху дъската и топлината.
    toe_coverage:
      name: Покритие на пръстите
      description: Показва какъв тип покритие на пръстите осигурява чорапът.
    toe_pick_style:
      name: Стил на предния назъбен връх
      description: Описва дизайна на предния назъбен връх при кънки за фигурно пързаляне.
    toe_protection_type:
      name: Тип защита на пръстите
      description: Показва дали и как зоната на пръстите е подсилена за безопасност
        (напр. метално бомбе, меко бомбе).
    toe_reinforcement_type:
      name: Тип подсилване на пръстите
      description: Описва конструкцията на зоната при пръстите, която влияе върху
        издръжливостта и съвместимостта с обувките.
    toe_stop_stem_thread_size:
      name: Размер на резбата на стопера за пръсти
      description: Определя размера на резбата на стеблото на стоперите за пръсти,
        за да се гарантира съвместимост с плочата.
    tofu_preparation_style:
      name: Стил на приготвяне на тофу
      description: Категоризира традиционния стил или подвид на тофу (извън твърдостта),
        напр. копринено, на блок, бухнало, кожа, възел, ферментирало.
    tom_mount_adjustment_features:
      name: Характеристики за регулиране на стойката за том
      description: Определя какви настройки позволява стойката за том барабана (напр.
        наклон, завъртане, височина).
    tom_mount_components_included:
      name: Включени компоненти за монтаж на том
      description: Определя кои части са включени към стойката за том барабана (приемник,
        рамо, сферична връзка, скоби, фиксатори на паметта и др.).
    tom_mount_mounting_position:
      name: Позиция за монтаж на стойката за том барабан
      description: Определя къде е предназначена да се закрепва стойката за том барабана
        (напр. бас барабан, стойка за чинел, рейка).
    tonneau_cover_mounting_style:
      name: Стил на монтаж на tonneau cover
      description: Посочва как се монтира/закрепва покривалото за товарния кош към
        релсите на камиона.
    tool_case_form_factor:
      name: Типоразмер на куфара за инструменти
      description: Определя физическия вид на кутията за инструменти, който влияе
        върху преносимостта и съхранението (напр. куфарче, твърд корпус).
    tool_functions_included:
      name: Включени функции на инструмента
      description: Изброява конкретните ремонтни или поддържащи функции, които мултиинструментът
        или комплектът инструменти може да изпълнява.
    top_bunk_access_method:
      name: Метод за достъп до горното легло
      description: Показва как се достига до горното легло на двуетажно легло, като
        подпомага безопасността и съобразяването с пространството.
    top_fit:
      name: Прилягане в горната част
      description: Определя общия силует или кройка на горната дреха върху тялото
        (напр. вталена или широка).
    top_hat_style:
      name: Стил на цилиндър
      description: Определя конкретния стилов вариант на цилиндъра.
    top_soundboard_material:
      name: Материал на горната част (звуковата дъска)
      description: Определя материала на горната дъска/резонаторната плоча на китарата
        (основната плоча, която създава тона).
    topping_form:
      name: Форма на топинга
      description: Определя физическата форма или консистенцията на топинга за десерт,
        за да помогне на клиентите бързо да изберат подходящия за приложение вариант.
    topping_type:
      name: Тип топинг
      description: Показва основния външен топинг или покритие, нанесено върху поничката.
    tow_hook_type:
      name: Тип теглителна кука
      description: Показва дали дъската за колене включва вградена теглителна кука
        и определя вида на механизма ѝ.
    tow_point_configuration:
      name: Конфигурация на точките за теглене
      description: Определя конфигурацията на точките за теглене (единична, двойна,
        многоточкова), предлагана от теглимия воден ринг за различни позиции на каране.
    tow_strap_protective_features:
      name: Защитни характеристики на тегличния колан
      description: Отличителни защитни и подсилващи характеристики, вградени в тегличния
        колан.
    tow_strap_type:
      name: Тип въже за теглене
      description: Показва конструкцията на тегличния колан според предназначението
        му, например статичен тегличен колан или кинетичен възстановителен колан.
    towable_tube_style:
      name: Стил на теглим воден ринг
      description: Посочва общия дизайн или типоразмера на надуваемата тръба за теглене,
        който определя позицията на водача и усещането при каране.
    towed_water_sport_discipline:
      name: Дисциплина при воден спорт с теглене
      description: Определя за кой основен воден спорт с теглене са предназначени
        ръкавиците.
    towel_features:
      name: Характеристики на кърпата
      description: Изброява специални характеристики или екстри, включени в кърпата.
    towel_style:
      name: Стил кърпа
      description: Класифицира функционалния дизайн или формата на голф кърпата.
    toy_airplane_control_type:
      name: Тип управление на играчката самолет
      description: Указва как играчката самолет се управлява от потребителя.
    toy_airplane_features:
      name: Характеристики на играчката самолет
      description: Подчертава забележими игрови функции, налични при играчката самолет.
    toy_airplane_flight_capability:
      name: Възможности за полет на играчката самолет
      description: Показва дали играчката самолет е проектирана действително да лети,
        или е предназначена предимно за игра/демонстрация на земята.
    toy_audio_features:
      name: Звукови функции на играчката
      description: Изброява звуковите възможности и звуковите ефекти, вградени в играчката.
    toy_boat_play_features:
      name: Игрови функции на играчката лодка
      description: Подчертава забележими интерактивни функции на играчките лодки за
        игра и изследване.
    toy_boat_recommended_play_environment:
      name: Препоръчителна среда за игра с играчката лодка
      description: Определя предназначената среда за игра с играчката лодка с оглед
        на безопасността и очакванията на купувача (напр. вана или открита вода).
    toy_bowling_equipment_included:
      name: Включени елементи към играчката за боулинг
      description: Определя кои компоненти за боулинг са включени в комплекта играчка
        (напр. кегли, топка, писта/постелка, чанта за носене).
    toy_car_features:
      name: Характеристики на играчката кола
      description: Подчертава игровите функции, вградени в играчката кола (отделно
        от задвижването), като светлини, звуци или отварящи се части.
    toy_drawing_tablet_accessories_included:
      name: Включени аксесоари за детски таблет за рисуване
      description: Допълнителни включени принадлежности извън самия таблет (напр.
        допълнителен стилус, печати).
    toy_drawing_tablet_erase_method:
      name: Метод за изтриване на играчка таблет за рисуване
      description: Показва как повърхността за рисуване се почиства/изтрива.
    toy_drawing_tablet_screen_type:
      name: Тип екран на детски таблет за рисуване
      description: Типът повърхност за рисуване/показване, използвана в таблета (напр.
        LCD таблет за писане или магнитна повърхност).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Инструмент за писане/рисуване на детски таблет за рисуване
      description: Основен инструмент за рисуване върху таблета (тип писалка/стилус).
    toy_figure_sound_feature:
      name: Звукова функция на играчка фигурка
      description: Показва дали фигурката на животно издава звуци и какъв вид са те
        (напр. рев, реалистични животински звуци).
    toy_game_features:
      name: Характеристики на играчка/игра
      description: Подчертава забележими игрови или конструктивни характеристики,
        свързани с плажни и пясъчни играчки.
    toy_gift_basket_items_included:
      name: Включени артикули в подаръчна кошница с играчки
      description: Изброява основните видове играчки, включени в подаръчната кошница
        (например плюшена играчка, конструктор, пъзел).
    toy_glider_launch_method:
      name: Метод за изстрелване на игрален планер
      description: Определя как се изстрелва играчката планер, което влияе върху начина
        на игра и очакванията на купувача.
    toy_helicopter_control_type:
      name: Тип управление на играчка хеликоптер
      description: Показва как се управлява/оперира играчката хеликоптер (независимо
        от задвижването), например с дистанционно, чрез приложение или без управление
        (свободен полет).
    toy_helicopter_features:
      name: Характеристики на играчка хеликоптер
      description: Основни функционални характеристики на играчка хеликоптер (особено
        RC модели), които влияят на използваемостта и игровата стойност.
    toy_jacks_set_items_included:
      name: Включени елементи в комплекта детски „джакс“
      description: Определя кои основни елементи са включени в комплекта за игра на
        „джакс“ (напр. фигурки, топка, торбичка).
    toy_keyboard_learning_mode:
      name: Режим на обучение на детски клавир
      description: Посочва образователния/обучителния подход, поддържан от детската
        клавиатура (напр. светещи клавиши, следване на песни, насочени уроци, обучение
        с приложение).
    toy_keyboard_sound_theme:
      name: Звукова тема на детски клавир
      description: Видове вградени инструментални звуци/звукови теми (извън обикновено
        пиано).
    toy_kitchen_appliances_included:
      name: Включени кухненски уреди в детската кухня
      description: Определя кои кухненски уреди са представени в комплекта за игра,
        когато продуктът е кухня или комплект с кухненска тематика.
    toy_kitchen_assembly_requirement:
      name: Изискване за сглобяване на кухня играчка
      description: Показва дали е необходим монтаж и приблизителната сложност на монтажа.
    toy_kitchen_interactive_features:
      name: Интерактивни функции на детска кухня
      description: Подчертава интерактивните елементи, често срещани в детските кухни
        и свързаните с тях аксесоари.
    toy_motorcycle_feature_set:
      name: Комплект функции на играчка мотор
      description: Основни игрови функции на играчката мотор (изберете всички приложими).
    toy_motorcycle_scale:
      name: Мащаб на модел мотоциклет играчка
      description: Мащабно съотношение на играчки/колекционерски мотори (напр. 1:12).
    toy_parachute_launch_method:
      name: Метод за изстрелване на играчка парашут
      description: Начинът, по който играчката се изстрелва/пуска за полет.
    toy_piano_and_keyboard_accessories_included:
      name: Включени аксесоари за детско пиано и клавир
      description: Аксесоари, включени към детското пиано или детския клавир.
    toy_playset_assembly_required:
      name: Необходимост от сглобяване на детския комплект за игра
      description: Посочва дали е необходим монтаж от възрастен преди игра (надхвърлящ
        просто лесно сглобяване).
    toy_playset_items_included:
      name: Включени елементи в комплект за игра
      description: Изброява основните включени компоненти в комплекта за игра (какво
        съдържа кутията).
    toy_safety_certification:
      name: Сертификация за безопасност на играчки
      description: Стандарти/маркировки за безопасност и съответствие, приложими за
        играчките на съответния пазар (напр. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Характеристики на играчка космически кораб
      description: Показва обичайните интерактивни/игрови функции, вградени в играчката
        космически кораб.
    toy_spaceship_size_class:
      name: Размерен клас на играчка космически кораб
      description: Посочва груба размерна категория на играчката космически кораб
        за бързо филтриране, отделно от точните размери и без числов мащаб (напр.
        1:72).
    toy_tableware_pieces_included:
      name: Включени части в комплект детски съдове
      description: Определя кои съдове и прибори за игра са включени (чинии, чаши,
        прибори, съдове за сервиране).
    toy_tool_electronic_features:
      name: Електронни функции на играчка инструмент
      description: Описва интерактивните/електронните функции на играчката инструмент
        (светлини, звуци, въртеливо движение и др.).
    toy_tool_set_components_included:
      name: Включени компоненти в комплект детски инструменти
      description: Изброява конкретните предмети за ролева игра, включени в комплекта
        (особено при комплекти с инструменти).
    toy_train_scale:
      name: Мащаб на моделно влакче
      description: Определя стандартния мащаб на играчката/моделния влак (или размера
        на релсовата система), за да се гарантира съвместимост със съществуващи влакове
        и релси.
    toy_train_track_layout_type:
      name: Тип оформление на релсовия път за играчка влак
      description: Описва включеното оформление/форма на релсовия път в комплекта
        влак или допълнителния комплект релси.
    toy_weapon_gadget_features:
      name: Характеристики на играчка оръжие и шпионски приспособления
      description: Подчертава обичайните интерактивни и функционални характеристики,
        специфични за играчки оръжия и шпионски устройства.
    tpms_sensor_frequency_band:
      name: Честотна лента на TPMS сензора
      description: Поддържан радиочестотен диапазон от аксесоари, свързани със системи
        за следене на налягането в гумите (TPMS), когато е приложимо.
    track_and_field_discipline:
      name: Лекоатлетическа дисциплина
      description: Посочва конкретната атлетическа дисциплина или състезателна дисциплина,
        за която е предназначен продуктът (напр. гюле, овчарски скок, спринт).
    track_event_specialization:
      name: Специализация за конкретна лекоатлетическа дисциплина на писта
      description: Показва за коя дисциплина са оптимизирани обувките с шпайкове.
    track_field_event_suitability:
      name: Пригодност за лекоатлетически дисциплини
      description: Посочва конкретната лекоатлетическа дисциплина, за която е предназначено
        тренировъчното пособие.
    track_set_special_features:
      name: Специални функции на релсов комплект
      description: Подчертава забележими игрови функции, включени в релсовия комплект
        извън основните релси и колички.
    track_surface_compatibility:
      name: Съвместимост с тип писта
      description: Показва за каква бегова настилка са предназначени шпайковете или
        обувките.
    tracking_aid_type:
      name: Тип помощно средство за поддържане на посоката
      description: Показва дали каякът включва устройства, които подпомагат движението
        по права линия.
    traction_pattern_type:
      name: Тип на модела на сцепление
      description: Описва основния канален или грапав модел на повърхността, който
        осигурява сцепление върху подложката.
    trading_card_league:
      name: Лига на търговските (колекционерски) карти
      description: Посочва спортната лига, към която принадлежи картовият сет или
        обектът (където е приложимо).
    trailer_construction:
      name: Конструкция на ремаркета
      description: Посочва основния конструкционен материал на ремаркето (напр. алуминий,
        стомана или комбинирана конструкция).
    trailer_coupler_size:
      name: Размер на тегличната топка за ремарке
      description: Определя размера на тегличната топка, необходима за теглене.
    trailer_hitch_mounting_location_method:
      name: Място/начин на монтаж на теглича за ремарке
      description: Определя къде и как тегличът за ремарке е монтиран към превозното
        средство (напр. заден приемник, преден приемник, монтаж към рамата, към бронята
        или към товарната платформа).
    trailer_light_function:
      name: Функция на светлините на ремаркето
      description: Основна функция/позиция на светлината на ремаркето.
    trailer_suspension_type:
      name: Тип окачване на ремарке
      description: Определя типа окачване, използвано при велосипедното ремарке, например
        пружинно или ресорно, за по-добър комфорт при возене и защита на товара.
    trailer_wiring_circuit:
      name: Схема на окабеляване на ремаркето
      description: Изброява осветителните, спирачните и допълнителните електрически
        вериги/сигнали, които преминават през окабеляването на ремаркето (т.е. наличните
        захранващи, заземяващи и сигнални линии).
    trailer_wiring_connector_type:
      name: Тип конектор за електрическата инсталация на ремаркето
      description: Определя стандарта на буксата откъм ремаркето/превозното средство,
        използван за кабелни снопове и адаптери на ремаркета.
    train_whistle_intended_use:
      name: Предназначение на свирката за влак
      description: Основно предназначение/употреба на свирката.
    train_whistle_sound_character:
      name: Характер на звука на влакова свирка
      description: Описва възприемания тонален характер на звука на свирката (тембър).
    trainer_mounting_type:
      name: Тип монтаж на тренажор
      description: Описва как велосипедът се свързва с тренажора (напр. с притискане
        на колелото или директно задвижване).
    training_dummy_shape:
      name: Форма на тренировъчния манекен
      description: Определя цялостния дизайн или силует на манекена, което влияе върху
        захвата на кучето и реализма на обучението.
    training_focus:
      name: Тренировъчен фокус
      description: Описва основната област на умения, към която е насочено помощното
        средство (напр. рефлекси, работа с крака, координация око-ръка).
    training_focus_area:
      name: Фокус на обучението
      description: Определя основното умение по лакрос, което помощното средство е
        предназначено да развива.
    training_objective:
      name: Тренировъчна цел
      description: Определя основното умение или техника, които продуктът е предназначен
        да подобрява.
    training_surface_suitability:
      name: Подходящи тренировъчни повърхности
      description: Определя върху какви повърхности може да се използва тренировъчното
        средство.
    training_surface_usage:
      name: Предназначение на тренировъчната настилка
      description: Определя основните дейности, за които е предназначена тренировъчната
        настилка, като разграничава синтетичните ледени панели за кънки от настилки
        за сухи тренировки или многофункционални спортни постелки.
    training_usage_type:
      name: Тип употреба за обучение
      description: Посочва основния период или контекст на употреба на тренировъчните
        панталони, напр. за дневно или нощно обучение.
    trampoline_enclosure_type:
      name: Тип предпазна мрежа за батут
      description: Определя конфигурацията на предпазната мрежа на батута, включително
        как и къде е закрепена мрежата.
    trampoline_safety_certifications:
      name: Сертификати за безопасност на батут
      description: Посочва кои стандарти или сертификати за безопасност на трамплини
        продуктът заявява, че покрива.
    transfer_application_method:
      name: Метод за прехвърляне на изображение
      description: Определя как изображението/трансферът се нанася върху плата (напр.
        с ютия или чрез термопреса).
    transfer_method:
      name: Метод на трансфер
      description: Определя как дизайнът е предназначен да бъде прехвърлен върху плат.
    transfer_peel_temperature:
      name: Температура при отлепване на трансфера.
      description: Определя препоръчителното температурно състояние (горещо, топло
        или студено), при което защитният лист трябва да се премахне след пресоване.
    transmission_cooler_construction:
      name: Конструкция на охладител за трансмисия
      description: Определя конструктивния дизайн на сърцевината на охладителя за
        трансмисия.
    transmission_fluid_specification:
      name: Спецификация на трансмисионната течност
      description: OEM/спецификационен стандарт, на който отговаря трансмисионната
        течност (напр. семейства Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Материал на втулката на опората на трансмисията.
      description: Посочва еластомерния или изолационния материал, използван във втулката/изолатора
        на опората (елементът за гасене на вибрации).
    transmission_mount_type:
      name: Тип на опората на трансмисията
      description: Посочва конструкцията/дизайна на опората на трансмисията (напр.
        хидравлична или твърда), за да се определи съвместимостта, NVH характеристиките
        и предназначението.
    transparency_level:
      name: Ниво на прозрачност
      description: Описва колко прозрачни са стените на контейнера, като помага на
        купувачите да избират между добра видимост и скрито съхранение.
    transport_case_type:
      name: Тип транспортен калъф
      description: Класифицира конструктивния стил/твърдостта на транспортното решение,
        отразяващи нивото на защита и начина на опаковане.
    transposition_modes:
      name: Режими на транспониране
      description: Посочва режимите на транспониране/концертна настройка, които поддържа
        тунерът (напр. концертна височина и транспониращи тоналности като B♭ или E♭).
    trap_design:
      name: Дизайн на капана
      description: Определя конструктивния стил или механизма на капана, който определя
        начина на разполагане и за кои видове или среди е най-подходящ.
    trap_spring_configuration:
      name: Конфигурация на пружините на капана
      description: Показва броя или разположението на пружините, задвижващи капана,
        което влияе върху силата и законовите изисквания.
    travel_bassinet_accessories_included:
      name: Включени аксесоари за преносимо бебешко легло
      description: Изброява допълнителните елементи, включени към преносимото бебешко
        легло.
    travel_spinning_wheel_assembly_required:
      name: Изисква ли се сглобяване на вретенарското колело (чекрък) за пътуване
        преди употреба.
      description: Показва дали чекръкът изисква сглобяване/подготовка освен разгъване
        (напр. поставяне на водач, обтягане, педали) преди употреба.
    travel_spinning_wheel_portability_features:
      name: Характеристики за преносимост на преносим чекрък.
      description: Елементи на дизайна, свързани с преносимостта на преносимите чекръци,
        като сгъваема конструкция и включени транспортни решения.
    travel_trailer_appliances_fuel_type:
      name: Тип гориво за уреди в каравана
      description: Основният вид гориво, използвано за уредите/отоплението/готвенето
        в караваната (не за теглещото превозно средство).
    travel_trailer_holding_tank_type:
      name: Тип на резервоара в туристическо ремарке
      description: Показва кои резервоари за съхранение са налични в караваната (изберете
        всички приложими).
    travel_trailer_power_hookup_shore_power:
      name: Електрическо захранване на туристическо ремарке (външно захранване)
      description: Поддържани стандарти за електрическо захранване от външна мрежа.
    tread_pattern_type:
      name: Тип шарка на протектора
      description: Класифицира общия дизайн на грайфера на гумата, като slick, semi-slick
        или с грайферни бутони, което влияе върху сцеплението, съпротивлението при
        търкаляне и предназначената настилка.
    treadmill_key_type:
      name: Тип ключ за безопасност на пътека за бягане
      description: Описва физическия вид или механизма за работа/свързване на предпазния
        ключ (напр. кръгъл магнитен, пластмасова вложка, щипка).
    treadmill_part_type:
      name: Тип част за бягаща пътека
      description: Идентифицира специфичния компонент на бягащата пътека, който продуктът
        е предназначен да замени, така че купувачите да могат бързо да потвърдят съответствието
        (напр. лента, мотор).
    treadmill_position:
      name: Позиция на бягащата пътека
      description: Показва монтажната позиция на частта върху пътеката за бягане (предна,
        задна, горна, долна, централна).
    triangle_striker_material:
      name: Материал на палката за триъгълник
      description: Материал на включената палка/ударник.
    trigger_input_connector:
      name: Конектор за вход на тригера
      description: Посочва стандарта на физическия конектор, използван за входове
        за спусък.
    trigger_input_connector_type:
      name: Тип конектор за вход на спусък
      description: Определя физическия тип конектор, използван за входовете на тригера.
    trigger_input_zone_support:
      name: Поддръжка на зони за тригерни входове
      description: Показва дали тригернит входовете поддържат еднозонови и/или двузонови
        тригери (напр. кожа/обръч) и подобни многозонови реализации.
    trim_application_method:
      name: Метод за нанасяне на кант
      description: Посочва как декоративният кант е предназначен да бъде прикрепен
        към изделието (напр. за пришиване, за залепване с ютия, самозалепващ се).
    trim_detail:
      name: Детайл на декоративния кант
      description: Определя отличителните декоративни ръбове или завършващи елементи
        на облеклото (напр. кант с пискюли, ресни, дантелен кант).
    trim_elasticity:
      name: Еластичност на лентата
      description: Посочва дали декоративната лента рикрак има еластичност за използване
        върху трикотажни/спортни материи.
    trim_finish:
      name: Финиш на канта
      description: Повърхностна обработка или покритие на декоративната лента (напр.
        металик, брокат, отразяваща).
    trim_tilt_type:
      name: Тип наклон и ъгъл
      description: Дали и как моторът поддържа регулиране на наклона/ъгъла.
    trolleybus_power_supply_type:
      name: Тип захранване на тролейбус
      description: Определя как тролейбусът получава тягова енергия от електрическата
        мрежа.
    truck_bed_body_type:
      name: Тип на товарния кош/каросерията на камиона
      description: Конфигурация на товарното легло или каросерията зад кабината.
    truck_bed_length_class:
      name: Клас на дължината на товарното легло
      description: Посочва класа на дължината на товарния кош, за който е предназначена
        товарната мрежа (обикновено къс, стандартен или дълъг кош).
    truck_mounting_hole_pattern:
      name: Схема на монтажните отвори на скейтборд осите
      description: Определя схемата на отворите, използвана за монтиране на осите
        към дъската (напр. стара школа, нова школа, универсална).
    truck_mounting_style:
      name: Стил на монтаж за камион
      description: Описва как осите са закрепени към дъската (горен монтаж, монтаж
        през отвора и др.), което влияе върху височината и стабилността при каране.
    truck_profile:
      name: Профил на скейтборд осите
      description: Посочва класа на височината на трака на скейтборда спрямо дъската,
        което влияе на клиренса на колелата и усещането при каране.
    trumpet_bell_material:
      name: Материал на раструба (камбаната) на тромпета
      description: Материал, използван за камбаната на музикалния инструмент (понякога
        се различава от останалата част на инструмента).
    trumpet_leadpipe_material:
      name: Материал на тръбата на тромпета
      description: Материал или покритие, използвани за входящата тръба (основната
        тръба от мундщука до клапаните).
    trundle_mechanism:
      name: Механизъм на изтеглящото се легло
      description: Описва как вторичната част на леглото се разгъва или изтегля от
        основната рамка.
    trunk_part_type:
      name: Тип част на багажника
      description: Определя кой компонент на багажното отделение се продава (напр.
        капак на багажника, панта, заключващ механизъм).
    tuba_leadpipe_material:
      name: Материал на мундщуковата тръба на тубата
      description: Идентифицира материала, използван за омундщуковата част на тубата.
    tube_base_type:
      name: Тип основа на туба
      description: Посочва типа цокъл/основа на лампата за механично и електрическо
        съвпадение (напр. октален, новален/9-пинов).
    tube_matching_grade:
      name: Клас на съответствие на тръбите
      description: Показва дали електронните лампи са тествани и съгласувани като
        комплект и какъв тип съгласуване е приложен.
    tube_weight_category:
      name: Категория тегло на туба
      description: Класифицира тръбата по конструкция/тегло (напр. ултралека, стандартна,
        усилена), за бързо сравнение между издръжливост и характеристики.
    tubeless_compatible:
      name: Съвместимo с безкамерни гуми
      description: Показва дали колелото е проектирано да се използва без вътрешна
        гума, когато е сдвоено с безкамерни гуми.
    tubing_shape:
      name: Форма на тръбната гума
      description: Посочва напречното сечение на опорните тръби на стойката.
    tubular_construction_type:
      name: Тип тръбна конструкция
      description: Определя конструктивния стил на тръбните велосипедни гуми, като
        разграничава традиционните лепени тръбни гуми от по-новите разновидности.
    tulip_type_flower_form:
      name: Тип лале (форма на цвета)
      description: Посочва градинарския тип/форма на цветовете на лалетата в букетa
        (напр. единични, двойни, папагалови).
    tuner_input_method:
      name: Метод за вход на тунер
      description: Определя как тунерът засича височината на тона (микрофон, вибрационен/щипков
        сензор, вход чрез кабел на инструмента, контактен адаптер).
    tuning_mechanism:
      name: Механизъм за настройване
      description: Как мембраните на бонгото се обтягат/настройват.
    tuning_system:
      name: Система за настройка
      description: Как се настройва барабанът дарбука или дали подлежи на настройка.
    turn_signal_lens_color:
      name: Цвят на лещата на мигача
      description: Цвят на видимата леща/капак на корпуса на мигача (не цветът на
        излъчваната светлина).
    turn_signal_lighting_style:
      name: Стил на осветление на мигачите
      description: Визуален стил/анимация на сигнализацията, предоставяна от мигача.
    turnip_and_rutabaga_variety:
      name: Сорт ряпа и шведска ряпа
      description: Идентифицира специфичния сорт или разновидност на ряпата или брюквата.
    tweeter_crossover_type:
      name: Тип разделителен филтър за високочестотен говорител
      description: Показва типа високочестотен филтър и/или защитен компонент, включен
        към високочестотния говорител, ако има такъв.
    tweeter_material:
      name: Материал на високочестотния говорител
      description: Основен материал на мембраната/купола на високочестотния говорител.
    tweeter_mount_type:
      name: Тип монтаж на високочестотния говорител
      description: Определя как високочестотният говорител е предназначен да бъде
        монтиран в превозното средство (метод/елементи за монтаж).
    twill_direction:
      name: Посока на кепърната сплитка
      description: Посочва посоката на диагоналните линии при деним плат.
    twist_direction:
      name: Посока на усукване
      description: Посока на усукване на нишката в преждата/конеца (S-усукване или
        Z-усукване).
    u_joint_series_size:
      name: Серия/размер на карданното съединение
      description: Определя серията или стандарта за размер на карданното съединение
        (напр. серия 1310).
    uilleann_pipes_bag_material:
      name: Материал на меха на ирландската гайда
      description: Материал на въздушния мех (ако е включен), който влияе върху усещането,
        издръжливостта и поддръжката.
    uilleann_pipes_handedness:
      name: Ориентация за лява/дясна ръка при ирландска гайда
      description: Посочва дали комплектът е конфигуриран за дясна или лява ръка (подредба
        за свирене).
    uilleann_pipes_set_configuration:
      name: Конфигурация на комплекта ирландска гайда
      description: Посочва конфигурацията на уилиън гайди според наличието на регулатори
        и дронове.
    uk_childrens_shoe_size:
      name: Размер на детски обувки по британски стандарт (UK)
      description: Посочва UK размера на детски обувки, например 4 или 4 Wide
    uk_clothing_size:
      name: UK размер на облекло
      description: Посочва UK размера на облекло, например 12 или 18
    uk_cup_size:
      name: UK размер на чашката
      description: Посочва UK размера на чашката на сутиен, например C или FF
    uk_mens_shoe_size:
      name: UK размер на мъжки обувки
      description: Посочва UK размера на мъжки обувки, например 4 или 4 Wide
    uk_womens_shoe_size:
      name: Размер на дамски обувки по британски стандарт (UK)
      description: Определя размера на дамските обувки по британски стандарт, например
        6 или 6 Wide.
    ukulele_back_and_sides_wood:
      name: Дървена гръбна част и страни на укулеле
      description: Определя дървесината/материала, използван(а) за гърба и страните
        на укулелето.
    ukulele_body_cutaway:
      name: Изрез на тялото на укулелето
      description: Показва дали корпусът на концертното укулеле има изрез за по-лесен
        достъп до горните прагчета.
    ukulele_body_shape:
      name: Форма на корпуса на укулелето
      description: Общ стил/форма на тялото на укулелето.
    ukulele_bridge_material:
      name: Материал за бриджа на укулеле
      description: Определя материала, използван за магарето на укулелето.
    ukulele_construction_type:
      name: Вид конструкция на укулеле
      description: Как са изработени горната част, задната част и страните на инструмента
        (масивна дървесина или ламиниран материал).
    ukulele_electronics_configuration:
      name: Конфигурация на електрониката на укулелето
      description: Показва дали укулелето е само акустично или включва вградена електроника
        (адаптер и/или предусилвател) за усилване на звука.
    ukulele_string_re_entrant_tuning:
      name: Реентрантна настройка на струните на укулелето.
      description: Указва дали укулелето е настроено с реентрантна настройка (високо
        G), или линеарна/ниско G настройка; това е често предпочитание и влияе на
        звука.
    ukulele_top_wood:
      name: Дървесина за горната част на укулелето
      description: Определя дървесината/материала, използван(а) за горната резонансна
        плоча на укулелето.
    ukulele_tuner_mechanism:
      name: Механизъм на ключовете за настройване на укулелето
      description: Указва стила/механизма на тунера, използван на укулелето.
    ukulele_tuner_type:
      name: Тип ключове за настройване на укулелето
      description: Стил на механиката за настройване, използвана на главата на укулелето.
    ukulele_tuning:
      name: Настройка на укулелето
      description: Определя стандартната настройка, предназначена за джобното укулеле.
    ultralight_aircraft_wing_configuration:
      name: Конфигурация на крилото на свръхлек самолет
      description: Разположение и конфигурация на основното крило спрямо фюзелажа/структурата.
    under_bed_features:
      name: Характеристики на пространството под леглото
      description: Определя основния функционален елемент, разположен под платформата
        на леглото.
    underfoot_strap_type:
      name: Тип каишка под стъпалото
      description: Определя материала или конструкцията на каишката, която минава
        под обувката.
    underwear_fit:
      name: Кройка за бельо
      description: Показва общия профил на прилягане на боксерките (напр. вталени,
        свободни, компресионни).
    underwear_pieces_included:
      name: Включени части на бельото
      description: Определя кои части от облеклото са включени (горнище, долнище,
        и двете, или цял гащеризон), така че клиентите да знаят дали купуват пълен
        комплект или отделен артикул.
    uniform_pieces_included:
      name: Включени части от униформата
      description: Определя кои елементи на униформата са включени (напр. риза, панталон,
        елек), като уточнява съдържанието на комплекта при групови или комплектни
        покупки.
    uniform_role:
      name: Роля на униформата
      description: Определя професионалната роля или служба, за която е предназначен
        артикулът от униформата (напр. полиция, шериф, спешна медицинска помощ).
    update_method:
      name: Метод за актуализация
      description: Как се доставят актуализациите на фърмуера/софтуера за скенера.
    upholstery_fabric_backing_type:
      name: Тип основа (подложка) на тапицерския плат
      description: Определя подложката/ламинирането на тапицерския плат, което влияе
        върху монтажа и усещането.
    upholstery_fabric_water_resistance:
      name: Водоустойчивост на тапицерския плат
      description: Показва устойчивост на вода и разливи на повърхността на тапицерията.
    upper_material:
      name: Материал на горната част
      description: Определя основния материал, използван в горната част на маратонката,
        който влияе върху дишаемостта, издръжливостта и естетиката.
    upright_bass_pickup_system:
      name: Система за адаптер на контрабас
      description: Посочва дали контрабасът включва вграден пикап/преамп система,
        предназначена за усилване
    upright_piano_power_source:
      name: Източник на захранване на изправено пиано.
      description: Как се захранва пианото, приложимо както за акустични пиана без
        захранване, така и за пиана с безшумни/хибридни системи, изискващи електричество.
    urination_device_features:
      name: Характеристики на устройство за уриниране
      description: Подчертава специални конструктивни характеристики, които подобряват
        функционалността или удобството.
    us_childrens_shoe_size:
      name: US размер на детски обувки
      description: Посочва US размера на детски обувки, например 4 или 4 Wide
    us_clothing_size:
      name: US размер на облекло
      description: Посочва US размера на облекло, например 8 или 14
    us_cup_size:
      name: US размер на чашката
      description: Посочва US размера на чашката на сутиен, например C или DDD
    us_mens_shoe_size:
      name: US размер на мъжки обувки
      description: Посочва US размера на мъжки обувки, например 10 или 10 Wide
    us_ring_size:
      name: US размер на пръстен
      description: Посочва US размера на пръстен, например 7 или 9.5
    us_womens_shoe_size:
      name: US размер на дамски обувки
      description: Посочва US размера на дамски обувки, например 8 или 8 Wide
    usage:
      name: Предназначение
      description: Описва предназначението/настройката на разпределителния вал.
    usda_honey_grade:
      name: Клас на меда по стандарта USDA
      description: Показва официалния клас, зададен на меда от Министерството на земеделието
        на САЩ (USDA).
    user_control_method:
      name: Метод за управление от потребителя
      description: Показва как потребителят взаимодейства с машината (напр. чрез вграден
        контролен панел, дистанционно, приложение, глас), като по този начин се вземат
        предвид съображенията за лекота на използване.
    vacuum_boost_reference_port:
      name: Порт за референция към вакуум/надналягане
      description: Посочва дали регулаторът включва референтен порт към всмукателния
        колектор за вакуум/надналягане и какъв е неговият тип/изпълнение.
    valve_base_shape:
      name: Форма на основата на клапана
      description: Определя геометрията на свързване между основата на клапана и джантата
        (кръгла, конична, страничен отвор, Т-образна и др.), която влияе върху уплътняването
        и съвместимостта с вложки от пяна.
    valve_core_type:
      name: Тип сърцевина на клапана
      description: Показва дали иглата (ядрото) на вентила е сменяема, фиксирана или
        липсва (дизайн без игла) – информация, която влияе върху процедурите по поддръжка
        и съвместимостта с инструменти за инжектиране на уплътнител
    valve_cover_gasket_material:
      name: Материал на уплътнението на капака на клапаните
      description: Посочва материала на гарнитурата на капака на клапаните, включена
        в комплекта, или препоръчителния материал на гарнитурата, когато се продава
        без гарнитура (ако е приложимо).
    valve_cover_material:
      name: Материал на капака на клапана
      description: Основен конструктивен материал на капака на клапаните.
    valve_design:
      name: Дизайн на клапана
      description: Идентифицира конструкцията/дизайна на клапана на двигателя.
    valve_guard_coverage_area:
      name: Зона на покритие на предпазителя на клапана
      description: Показва кои части от секцията на клапаните защитава предпазителят.
    valvetrain_configuration:
      name: Конфигурация на клапанния механизъм
      description: Определя конфигурацията на разпределителния вал/клапанния механизъм.
    varnish_formulation_base:
      name: База на формулата на лака
      description: Посочва основната формула/химичен състав на лака за струнни инструменти,
        който влияе върху външния вид, възможността за отстраняване и съвместимостта
        със съществуващи покрития.
    varnish_transparency_tint:
      name: Прозрачност/оттенък на лака
      description: Описва дали лакът е прозрачен или оцветен и, ако е оцветен, какъв
        е основният цветови оттенък.
    vegetable_matter_vm_content:
      name: Съдържание на растителна маса (VM)
      description: Количество растителни остатъци/замърсявания, присъстващи във влакното.
    vegetable_preparation_style:
      name: Стил на приготвяне на зеленчуци
      description: Описва как зеленчукът е представен, нарязан или приготвен по друг
        начин преди продажба (напр. цял, на кубчета, на розички).
    vehicle_audio_dsp_form_factor:
      name: Форм-фактор на DSP процесор за автомобилно аудио
      description: Указва физическия/инсталационен формат на DSP устройството.
    vehicle_battery_charger_features:
      name: Характеристики на зарядното устройство за автомобилни акумулатори
      description: Изброява режимите на работа и вградените функции на зарядното устройство
        за автомобилен акумулатор (напр. режим на поддържащо зареждане, десулфатизация).
    vehicle_body_filler_form:
      name: Форма на автомобилния кит/пълнител за каросерия
      description: Физическа форма/тип опаковка на автомобилния кит за каросерия.
    vehicle_coaxial_speaker_nominal_size:
      name: Номинален размер на коаксиален автомобилен говорител
      description: Номинален размер на високоговорителя, използван при монтажа (напр.
        6,5 инча, 6x9 инча).
    vehicle_cover_size_class:
      name: Клас на размера на покривалото на превозното средство
      description: Общо групиране по размер, показващо за какъв размер превозно средство
        е предназначено покривалото.
    vehicle_decor_set_items_included:
      name: Включени елементи в комплекта за декорация на автомобил
      description: Изброява типовете декоративни елементи, включени в комплекта аксесоари
        (за по-ясна видимост на компонентите за клиента).
    vehicle_door_lock_actuation_method:
      name: Метод за задействане на автомобилна брава на врата
      description: Показва как се задейства или управлява бравата на автомобилната
        врата.
    vehicle_door_lock_actuator_kit_contents:
      name: Съдържание на комплекта за задвижващ механизъм на автомобилна брава
      description: Показва какво е включено към задвижващия механизъм (само механизъм
        или и крепежи/щанги/скоби/кабелен сноп).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Конфигурация на окабеляването на задвижващия механизъм на автомобилна
        брава
      description: Указва вида окабеляване, необходим за монтажа (брой проводници
        и роля).
    vehicle_door_lock_included_components:
      name: Включени компоненти към автомобилната брава
      description: Изброява какви компоненти са включени в опаковката (полезно за
        комплекти/сглобки).
    vehicle_electrical_connector_type:
      name: Тип електрически конектор за автомобил
      description: Определя типа електрически конектор или щепсел за регулатора/възбуждането
        на алтернатора (без основния изходен болт B+).
    vehicle_equipment_fit_out_level:
      name: Ниво на оборудване на превозното средство
      description: Показва нивото на полицейско оборудване, включено в микробуса.
    vehicle_glass_cleaner_form:
      name: Тип препарат за почистване на автомобилни стъкла
      description: Физическа форма на продукта за почистване на автомобилни стъкла
        (напр. спрей, пяна, кърпички, гел, концентрат).
    vehicle_hitch_cover_illumination_type:
      name: Тип осветяване на капака на теглича на превозното средство
      description: Посочва дали капачката за теглич има осветление и какъв тип е то.
    vehicle_hitch_cover_mounting_type:
      name: Тип монтаж на капак за теглич
      description: Показва метода, използван за закрепване/фиксиране на капачката
        на теглича в гнездото на теглича.
    vehicle_license_plate_finish:
      name: Покритие на регистрационната табела на превозно средство
      description: Повърхностно покритие на табелата.
    vehicle_license_plate_frame_anti_theft_design:
      name: Дизайн против кражба на рамката за регистрационен номер на превозно средство
      description: Свързани със сигурността конструктивни елементи, предназначени
        да възпрепятстват сваляне или манипулиране.
    vehicle_license_plate_frame_plate_standard:
      name: Стандарт на табелата за рамката за регистрационен номер на превозно средство
      description: Стандарт/регион на регистрационната табела, за който рамката е
        оразмерена.
    vehicle_license_plate_frame_profile:
      name: Профил на рамката за регистрационна табела
      description: Посочва как рамката обхваща регистрационния номер (покритие/форма),
        което влияе върху четливостта и съответствието с изискванията.
    vehicle_license_plate_mounting_hole_count:
      name: Брой монтажни отвори на регистрационната табела
      description: Брой монтажни отвори на табелата.
    vehicle_license_plate_mounting_hole_pattern:
      name: Схема на монтажните отвори за регистрационен номер на превозно средство
      description: Разположение на монтажните отвори на табелата.
    vehicle_license_plate_reflectivity:
      name: Отразителна способност на регистрационната табела
      description: Дали и как повърхността на табелата отразява светлина (важно за
        видимостта и съответствието при някои декоративни табели).
    vehicle_license_plate_size_standard:
      name: Стандартен размер на регистрационен номер на превозно средство
      description: Определя регионалния/автомобилния стандарт, за който табелата е
        оразмерена (разстояние между монтажните отвори и общи размери).
    vehicle_license_plate_text_style:
      name: Стил на текста на регистрационния номер на превозно средство
      description: Стил на знаците върху табелата (ако има такива), включително релефни
        или отпечатани.
    vehicle_license_plate_theme:
      name: Тема на регистрационния номер на превозно средство
      description: Основна дизайнерска тема на графиката на табелата.
    vehicle_lift_actuation_method:
      name: Метод за задвижване на подемник за превозно средство
      description: Как подемникът/крикът се задвижва или управлява за повдигане на
        превозното средство.
    vehicle_lift_mounting_type:
      name: Тип монтаж на автомобилен подемник
      description: Показва как подемникът е инсталиран или закрепен в работното пространство.
    vehicle_lift_type:
      name: Тип подемник за превозно средство
      description: Определя конструктивния стил на автомобилния подемник, използван
        за сервиз или съхранение (напр. двуколонен, четириколонен, ножичен).
    vehicle_magnet_attachment_type:
      name: Тип закрепване на автомобилен магнит
      description: Определя основния метод за закрепване/монтаж на продукти, продавани
        като автомобилни магнити (например само магнитно закрепване или магнитно закрепване
        с допълнително лепящо подсигуряване).
    vehicle_magnet_intended_use:
      name: Предназначение на автомобилния магнит
      description: Показва основното предназначение на автомобилния магнит.
    vehicle_mirror_adjustment_type:
      name: Тип регулиране на огледалото на превозното средство
      description: Определя как огледалото се регулира/управлява.
    vehicle_mirror_glass_type:
      name: Тип стъкло за огледало на превозно средство
      description: Определя оптичния тип/формата на повърхността на огледалното стъкло.
    vehicle_organizer_features:
      name: Характеристики на органайзер за превозно средство
      description: Основни функционални характеристики на автомобилните органайзери,
        като сгъваемост, водоустойчива подплата, термоизолирани джобове или неплъзгаща
        се основа.
    vehicle_paint_chemistry_base:
      name: Химичен състав/основа на боята за превозно средство
      description: Посочва формулата/химичния състав на боята за превозно средство.
    vehicle_polish_application_method:
      name: Метод за нанасяне на автомобилен полир
      description: Определя препоръчителния метод или инструмент за нанасяне на автомобилния
        полир.
    vehicle_pursuit_package:
      name: Полицейски пакет оборудване на превозно средство
      description: Посочва дали превозното средство е оборудвано с пакет за служебно
        преследване, предназначен за полицейска употреба (например подобрено охлаждане,
        спирачки, окачване и калибриране).
    vehicle_safety_equipment_position:
      name: Позиция на автомобилното предпазно оборудване
      description: Определя къде върху или в превозното средство е предназначено да
        се използва или монтира предпазното оборудване.
    vehicle_safety_equipment_visibility_features:
      name: Характеристики за видимост на автомобилното предпазно оборудване
      description: Показва характеристики за подобряване на видимостта, предназначени
        да увеличат забележимостта.
    vehicle_seat_row:
      name: Ред седалки в автомобила
      description: Показва за кой заден ред е предназначена седалката (втори или трети
        ред), включително приложения за сгъваеми помощни седалки.
    vehicle_steering_assist_type:
      name: Тип система за подпомагане на управлението на превозно средство
      description: Определя за коя система за подпомагане на управлението е предназначен
        компонентът.
    vehicle_steering_wheel_lock_form_factor:
      name: Форма на заключващото устройство за волан на превозно средство
      description: Описва физическия тип на заключващото устройство и начина, по който
        се свързва с волана (и по избор с други елементи за управление).
    vehicle_wax_polish_product_form:
      name: Форма на продукта за вакса/препарат за полиране за превозно средство
      description: Физическа форма/тип дозиране на ваксата, полиращия препарат, защитния
        препарат или уплътнителя.
    vehicle_wheel_valve_stem_type:
      name: Тип вентил за автомобилно колело
      description: Определя типа вентил, който се поддържа или е включен.
    vehicle_windshield_fluid_formula:
      name: Формула на течността за автомобилни чистачки
      description: Основно предназначение за почистване/отстраняване на формулата
        на течността за чистачки.
    veil_length_type:
      name: Тип дължина на воала
      description: Класифицира воала чрез стандартна терминология за дължина вместо
        чрез числово измерване.
    vellum_opacity_level:
      name: Степен на прозрачност на паус хартията
      description: Показва колко прозрачен или непрозрачен е листът пергаментова хартия.
    ventilation_configuration:
      name: Конфигурация на вентилацията
      description: Основна конфигурация на вентилацията/въздушния вход и изход на
        каската.
    ventilation_control_type:
      name: Тип управление на вентилацията
      description: Определя стила на управление на въздушния поток, вграден в каската.
    ventilation_level:
      name: Ниво на вентилация
      description: Посочва степента на вентилация/въздушен поток на протектора.
    venting_design:
      name: Дизайн на вентилацията
      description: Определя дали и как калъфът е вентилиран, за да се намалят кондензът
        и мухълът по време на съхранение.
    vestibule_type:
      name: Тип преддверие
      description: Класифицира разположението на преддверието спрямо палатката.
    vibraphone_bar_material:
      name: Материал на пластините на вибрафона
      description: Материал на звуковите пластини/клавиши на вибрафона (елементите,
        които произвеждат звук).
    vibraphone_motor_type:
      name: Тип мотор на вибрафона
      description: Тип мотор, използван за задвижване на въртящите се резонаторни
        перки за вибрато (ако има такива).
    vibraphone_range_octaves:
      name: Диапазон на вибрафона (октави)
      description: Тоналният диапазон на вибрафона, изразен в октави (напр. 3 октави,
        3,5 октави).
    vibraphone_resonator_tube_material:
      name: Материал на резонаторните тръби на вибрафона
      description: Материал на резонаторните тръби на вибрафона под пластините.
    vibraphone_tuning_standard:
      name: Стандарт за настройка на вибрафона
      description: Референтна височина на тона, използвана за настройка (A=440 Hz
        и др.).
    viewing_sides:
      name: Страни за гледане
      description: Посочва колко страни на таблото показват информация (едностранно,
        двустранно, четиристранно и др.).
    vintage_advertisement_decade:
      name: Десетилетие на ретро рекламата
      description: Определя десетилетието, през което рекламата е била първоначално
        отпечатана или произведена (приблизително, ако точната година е неизвестна).
    vintage_advertisement_format:
      name: Формат на винтидж реклама
      description: Посочва физическия формат или носителя на колекционерската винтидж
        реклама.
    vintage_advertisement_subject_category:
      name: Тематична категория на винтидж рекламата
      description: Определя категорията на рекламирания продукт/услуга (за какво е
        рекламата).
    vintage_classic_truck_cab_type:
      name: Тип кабина на ретро и класически камион
      description: Конфигурация на кабината/стил на купето на пътническото отделение
        на камиона.
    virginia_tech_helmet_star_rating:
      name: Оценка със звезди на каска по системата Virginia Tech
      description: Оценка за безопасност, присъдена от лабораторията Virginia Tech
        Helmet Lab (0–5 звезди).
    virtual_analog_synthesizer_form_factor:
      name: Форм-фактор на виртуален аналогов синтезатор
      description: Определя физическия формат на корпуса на синтезатора (клавиатура
        спрямо модул/рак).
    viscosity_thickness:
      name: Вискозитет/гъстота
      description: Описва колко гъста или течна е шликерната маса при продажба или
        при препоръчителната работна консистенция.
    vise_configuration:
      name: Конфигурация на менгемето
      description: Определя структурното оформление или броя части в комплекта менгеме,
        което влияе върху преносимостта и сложността на настройката.
    visibility_features:
      name: Характеристики за видимост
      description: Подчертава дизайнерските елементи, които подобряват видимостта
        на ездача в трафика.
    visor_brim_type:
      name: Тип козирка/сенник
      description: Посочва наличието и стила на визьор или козирка на каската.
    visor_configuration:
      name: Конфигурация на визьора
      description: Описва наличието и стила на вградена козирка или лицев щит.
    visor_lens_finish:
      name: Покритие на лещата на визьора
      description: Посочва тонирането, оптичното покритие или графичния стил, приложени
        върху лещата на визьора.
    visor_style:
      name: Стил на козирката
      description: Показва дали качулката включва козирка/сенник и нейната конфигурация.
    voc_compliance_standard:
      name: Стандарт за съответствие с VOC
      description: Твърдение за съответствие на продукта с нормативните изисквания
        за летливи органични съединения (когато е приложимо).
    voc_regulatory_class:
      name: Регулаторен клас по VOC
      description: Деклариран нормативен клас на съответствие за летливи органични
        съединения на продукта (според етикета/информационния лист за безопасност),
        използван за регионални нормативни и екологични ограничения.
    vodka_base_ingredient:
      name: Основна съставка на водката
      description: Основна селскостопанска съставка, от която е дестилирана водката
        (напр. пшеница, картофи, царевица).
    voice_coil_configuration:
      name: Конфигурация на звуковата бобина
      description: Брой/разположение на звуковите бобини за гъвкавост на свързването
        и варианти на импеданс.
    voice_effects:
      name: Гласови ефекти
      description: Вградени типове вокални ефекти, поддържани от караоке комплекта.
    voltage_rating_type:
      name: Тип номинално напрежение
      description: Определя дали номиналното напрежение на предпазителя се отнася
        за променлив ток (AC), постоянен ток (DC) или и за двата.
    voltage_regulator_connector_type:
      name: Тип конектор на регулатора на напрежение
      description: Посочва типа връзка/клема, използван за свързване на регулатора
        към окабеляването на превозното средство/алтернатора/генератора.
    wader_foot_type:
      name: Тип ботуш на гащеризон за газене
      description: Определя дали гащеризонът за газене е с интегрирани ботуши или
        с отделни чораповидни крачоли.
    wader_sole_type:
      name: Тип подметка на гащеризон за газене
      description: Посочва материала на подметката или типа сцепление, използвани
        при газещи ботуши или гащеризони с вградени ботуши.
    waistband_style:
      name: Стил на колана на талията
      description: Описва конструкцията на колана на талията и как се закопчава или
        регулира за прилягане и комфорт.
    wakeboard_binding_mounting_pattern:
      name: Схема за монтаж на автомати за уейкборд
      description: Определя модела на вложките/отворите на уейкборда, с който автоматите
        са съвместими.
    wakeboard_riding_style:
      name: Стил на каране на уейкборд
      description: Класифицира предназначената среда или стил на употреба на уейкборда.
    wall_decal_style:
      name: Стил на стенен стикер
      description: Определя как е произведен/нанесен стикерът (напр. изрязан по контур,
        трансферен, лист със стикери).
    wallyball_equipment_included:
      name: Включено оборудване за wallyball
      description: Изброява конкретните елементи, включени в комплекта за уолибол,
        за да знаят потребителите точно какво купуват и да могат да сравняват комплекти.
    warp_beam_type:
      name: Тип основен вал на стана
      description: Определя конфигурацията на основния вал за основните нишки, включен
        или монтиран на стана (конфигурацията, предоставена със стана).
    washability:
      name: Възможност за пране
      description: Показва дали лепилото се почиства с вода и/или може да се мие след
        нанасяне.
    watch_band_design:
      name: Дизайн на каишката на часовник
      description: Описва конструктивния стил или дизайна на каишката на часовника
        (напр. NATO, Milanese, Link).
    watch_movement:
      name: Механизъм на часовник
      description: Определя механизма, който задвижва часовника — ключов фактор, чрез
        който купувачите различават моделите.
    water_activation:
      name: Активиране на водата
      description: Посочва дали маякът може да се активира автоматично при потапяне
        във вода (често при EPIRB от категория I/II).
    water_chamber_configuration:
      name: Конфигурация на водните камери
      description: Описва вътрешното разположение на въздушните камери на матрака,
        като единични или двойни камери, което влияе върху опората, температурния
        контрол и смущаването на партньора.
    water_dispensing_mechanism:
      name: Механизъм за дозиране на вода
      description: Определя начина, по който водата се освобождава от уреда, например
        чрез кранове, пръскащи дюзи или гравитачно изливане.
    water_exposure_protection_level:
      name: Ниво на защита от излагане на вода
      description: Показва нивото на защита на продукта при излагане на вода (напр.
        пръски срещу временно потапяне). Използвайте степен на защита IP (Ingress
        Protection), когато е наличен официален IP код.
    water_fed_design:
      name: Дизайн с подаване на вода
      description: Показва дали четката е предназначена за използване с течаща вода
        чрез дръжка с вътрешен воден поток или връзка за маркуч.
    water_gun_features:
      name: Характеристики на воден пистолет
      description: Забележителни функционални характеристики и включени възможности
        на водния пистолет.
    water_gun_operating_mechanism:
      name: Механизъм на действие на водния пистолет
      description: Описва как водният пистолет създава налягане и изстрелва вода по
        време на употреба.
    water_gun_spray_pattern:
      name: Модел на водната струя на водния пистолет
      description: Типът водна струя, произвеждана от дюзата по време на пръскане.
    water_heating_method:
      name: Метод за загряване на водата
      description: Описва как и дали водата се загрява преди употреба — например чрез
        слънчева абсорбция, пропанови горелки, електрически нагреватели, нагряване
        с батерия, топлоизолираща изолация или без загряване.
    water_mattress_construction:
      name: Конструкция на воден матрак
      description: Определя конструктивния стил на водния матрак (напр. твърди страници
        или меки страници), което определя съвместимостта с рамката и общото усещане.
    water_play_features:
      name: Характеристики за игра с вода
      description: Включени компоненти за водни активности във водния парк/пързалка.
    water_polo_competition_approval:
      name: Одобрение за състезания по водна топка
      description: Определя ръководния орган или състезателното ниво, за които топката
        е официално одобрена или сертифицирана.
    water_polo_goal_type:
      name: Тип врата за водна топка
      description: Класифицира конструкцията или конфигурацията на монтажа на вратата
        (напр. плаваща, монтирана към палуба, преносима).
    water_pump_drive_type:
      name: Тип задвижване на водната помпа
      description: Определя как водната помпа се задвижва/управлява в охладителната
        система на превозното средство.
    water_pump_housing_material:
      name: Материал на корпуса на водната помпа
      description: Материал на корпуса/тялото на водната помпа.
    water_pump_impeller_material:
      name: Материал на работното колело на водната помпа
      description: Посочва материала на работното колело на водната помпа (вътрешен
        ротор/лопатка, която движи охлаждащата течност).
    water_pump_mounting_type:
      name: Тип монтаж на водна помпа
      description: Определя стила на монтаж/форм-фактора на водната помпа за съвместимост
        с двигателя (напр. корпус с болтов монтаж спрямо патрон/вложка).
    water_purification_method:
      name: Метод за пречистване на вода
      description: Определя основния механизъм, чрез който продуктът прави водата
        безопасна за пиене на терен (напр. помпа спрямо гравитационно подаване спрямо
        UV светлина).
    water_resistance:
      name: Водоустойчивост
      description: Съобщава степента на осигурена защита от атмосферни влияния, като
        водоустойчивост или водоотблъскване.
    water_resistance_level:
      name: Ниво на водоустойчивост
      description: Посочва дали текстилът отблъсква вода и в каква степен.
    water_resistance_rating_case_protection_level:
      name: Степен на водоустойчивост (ниво на защита на корпуса)
      description: Показва нивото на водоустойчивост/защита, осигурено от куфара на
        колелца (маркетингово ниво, не IP защита за електроника), напр. водоустойчив
        срещу непромокаем.
    water_rocket_kit_items_included:
      name: Включени елементи в комплекта водна ракета
      description: Основни компоненти, включени в опаковката на продукта.
    water_rocket_propulsion_type:
      name: Тип задвижване на водна ракета
      description: Основен източник на задвижване/енергия, използван за изстрелване
        на ракетата.
    water_rocket_recovery_system:
      name: Система за възстановяване на водната ракета
      description: Метод, използван за връщане/възстановяване на ракетата след изстрелване.
    water_ski_base_design:
      name: Дизайн на основата на водните ски
      description: Определя профила на долната част на водните ски, който влияе върху
        характеристиките на управлението.
    water_ski_fin_type:
      name: Вид перка за водни ски
      description: Определя конфигурацията на плавниците на водните ски, която влияе
        върху стабилността на посоката и маневреността.
    water_source:
      name: Източник на вода
      description: Определя произхода на водата преди газиране.
    water_sports_safety_standard:
      name: Стандарт за безопасност при водни спортове
      description: Изброява официалните стандарти за безопасност или плаваемост, на
        които отговаря продуктът (напр. CE EN 1385 за каски, ISO 12402-5 за помощни
        средства за плаваемост, USCG тип III).
    water_table_feature_set:
      name: Набор от функции на водната маса
      description: Подчертава вградените функции за игра на водната маса, като водопади,
        пръскачки, помпи или многостепенни басейни.
    water_table_items_included:
      name: Включени елементи към водната маса
      description: Определя кои аксесоари са включени към комплекта водна маса (напр.
        лодки, чаши, фунии, фигурки).
    water_table_water_source_type:
      name: Тип водоизточник на водната маса
      description: Определя как водната маса се пълни или снабдява с вода.
    waterbed_stabilization_level:
      name: Ниво на стабилизация на водния матрак
      description: Показва степента на намаляване на вълните или контрол на движението,
        осигурени от водния матрак.
    watercolor_ink_water_resistance_after_drying:
      name: Водоустойчивост на акварелното мастило (след изсъхване)
      description: Показва дали акварелната боя става водоустойчива/непромокаема след
        изсъхване (според твърдението на производителя).
    watercraft_care_application_area:
      name: Зона на приложение за поддръжка на плавателен съд
      description: Показва основната зона или компонент на плавателния съд, за който
        е предназначен продуктът.
    watercraft_drive_mechanism:
      name: Механизъм на задвижване на плавателен съд
      description: Описва конкретния бордов механизъм за задвижване, който е инсталиран
        или поддържан.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Тип монтажен модел на датчик за резервоар на плавателен съд
      description: Определя монтажния модел/стандарт за датчици на горивни резервоари
        и съвместими уреди (напр. стандартни морски болтови схеми).
    watercraft_fuel_tank_shape:
      name: Форма на резервоара за гориво на плавателен съд
      description: Описва общата физическа форма на горивния резервоар с цел планиране
        на пространството и монтажа.
    watercraft_hull_material:
      name: Материал на корпуса на плавателния съд
      description: Посочва основния материал на конструкцията на корпуса.
    watercraft_ignition_part_voltage:
      name: Напрежение на запалителен компонент за плавателен съд
      description: Номинално напрежение/изискване за запалителния компонент (когато
        е приложимо), например 12 V системи.
    watercraft_impeller_material_grade:
      name: Клас на материала на импелера на плавателния съд
      description: Указва материала на работното колело на плавателния съд (напр.
        неопренов каучук, нитрил, бронз).
    watercraft_lighting_certification_compliance:
      name: Сертификация / съответствие на осветление за плавателен съд
      description: Показва съответствието с нормативни изисквания/стандарти, по които
        осветлението е сертифицирано за морска употреба (напр. съвместимост с USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Функции за регулиране на стойката за мотор на плавателен съд
      description: Възможности за регулиране на стойката (напр. наклон, повдигане,
        плъзгане), които влияят върху удобството и съвместимостта.
    watercraft_piston_part_type:
      name: Тип бутален компонент за плавателен съд
      description: Определя кой компонент, свързан с буталото, представлява продуктовата
        обява.
    watercraft_propeller_blade_rake:
      name: Ъгъл на наклон на лопатките на витлото за плавателен съд
      description: Посочва ъгъла на наклон на перката (ъгъл спрямо главината), който
        влияе върху подемната сила и ефективността.
    watercraft_propeller_rotation_direction:
      name: Посока на въртене на витлото на плавателен съд
      description: Посочва изискваната посока на въртене/ориентация на витлото за
        съвместимост с задвижването (напр. дясно/стандартно или ляво/обратно въртене).
    watercraft_pump_stage_impeller_role:
      name: Етап на помпа / роля на работното колело за плавателен съд
      description: Определя дали работното колело е предназначено за конкретна роля
        в помпата (напр. помпа за сурова/морска вода, циркулация на охлаждаща течност,
        водометна помпа).
    watercraft_registration_status:
      name: Статус на регистрация на плавателен съд
      description: Показва дали ветроходната лодка включва документ за собственост
        и/или регистрационна документация.
    watercraft_safety_equipment_activation_type:
      name: Тип активиране на оборудване за безопасност на плавателен съд
      description: Основен метод за активиране на предпазното устройство (за маяци/аларми
        „човек зад борда“/PLB), различен от надуването.
    watercraft_steering_cable_core_material:
      name: Материал на сърцевината на кормилното жило за плавателен съд
      description: Определя материала на вътрешното жило/сърцевина, което предава
        силата.
    watercraft_steering_cable_hardware_included:
      name: Включен монтажен хардуер за кормилно жило на плавателен съд
      description: Определя кои монтажни елементи и аксесоари са включени с кормилното
        жило.
    watercraft_steering_cable_system_type:
      name: Тип система на кормилното жило за плавателен съд
      description: Посочва архитектурата на кормилната система, за която е предназначен
        кабелът (напр. ротационна, рейкова).
    watercraft_steering_wheel_hub_bore_type:
      name: Тип главина/отвор на кормилото на плавателен съд
      description: Посочва типа на централния монтажен отвор/интерфейс (напр. конусен,
        шлицов), чрез който колелото се свързва към главината или адаптера.
    watercress_variety:
      name: Разнообразие от кресон
      description: Идентифицира конкретния сорт или вид кресон, който се продава.
    waterproof_level:
      name: Ниво на водоустойчивост
      description: Посочва нивото на защита от вода на обувките, включително гарантирани
        водоустойчиви характеристики.
    wax_blend_composition:
      name: Състав на восъчна смес
      description: Изброява восъчните материали, смесени в продукта и/или рекламирания
        тип смес.
    wax_coat_type:
      name: Тип восъчно покритие
      description: Посочва дали ваксата е предназначена като основен слой, финален
        слой или универсална формула за един слой.
    wax_hardness:
      name: Твърдост на ваксата
      description: Показва относителната твърдост на ваксата, влияеща върху издръжливостта
        и плъзгането върху различни видове сняг.
    wax_physical_form:
      name: Физическа форма на ваксата
      description: Посочва физическата форма/вид, в който се доставя суровият восък
        за свещи.
    wax_recommended_candle_application:
      name: Препоръчително приложение на восъчни свещи
      description: Показва основния(ите) вид(ове) свещи, за които е формулиран восъкът.
    wax_tackiness_level:
      name: Ниво на лепкавост на ваксата
      description: Описва нивото на лепкавост/захват, което восъкът осигурява върху
        острието.
    weapon_system_integration:
      name: Интеграция на оръжейна система
      description: Посочва дали превозното средство включва интегрирани оръжейни системи
        или монтажни точки за оръжия.
    weather_suitability:
      name: Пригодност за атмосферни условия
      description: Показва състоянието на околната среда, за което са предназначени
        ръкавиците, като например игра в студено или влажно време.
    weave_finish:
      name: Плетка/завършек
      description: Описва основната текстилна сплитка или повърхностна обработка,
        която влияе върху текстурата и блясъка на вратовръзката.
    weave_style:
      name: Стил на тъкане
      description: Определя традиционния модел на сплитане, използван при изработката
        на панамената шапка, който влияе върху дишаемостта, гъвкавостта, външния вид
        и цената.
    weave_type:
      name: Тип сплитка
      description: Определя стила на текстилната сплитка/конструкция (търговско наименование
        на сплитката), който влияе върху текстурата, блясъка и начина на падане на
        плата.
    weaving_beater_edge_type:
      name: Тип на ръба на гребена (бийтера) за тъкане.
      description: Описва профила на работния ръб на плоския тъкачен гребен, който
        влиза в контакт с вътъка (напр. прав или назъбен).
    weaving_beater_style:
      name: Стил на биещия механизъм на стана
      description: Определя функционалния стил/формат на плоския тъкачен гребен.
    weaving_shuttle_tip_style:
      name: Стил на върха на тъкачната совалка
      description: Определя дизайна на предния връх/нос на совалката, който влияе
        върху преминаването ѝ през отвора и вероятността от закачане на основните
        нишки.
    weaving_shuttle_use_case:
      name: Предназначение на тъкачната совалка
      description: Определя предназначението за тъкане, за което совалката е проектирана
        или оптимизирана.
    webbing_construction_type:
      name: Тип конструкция на ремъчната лента
      description: Описва физическия стил на тъкане или плетка на лентата, който влияе
        върху обработката, здравината и предназначението ѝ.
    webbing_design:
      name: Дизайн на ципестата свръзка
      description: Описва стила на ципестата свръзка между пръстите, която влияе върху
        тренировъчното съпротивление и придвижването.
    weight_adjustability:
      name: Регулиране на теглото
      description: Описва дали съпротивлението на продукта може да се променя от потребителя
        (напр. регулируемо или с добавяне на тежести) или е фиксирано на едно ниво.
    weight_integration_system:
      name: Система за интегриране на тежести
      description: Описва дали и как баластните тежести са интегрирани в BCD (напр.
        сваляеми джобове за тежести, без тежести, допълнителни по избор).
    weight_plate_compatibility:
      name: Съвместимост с дискове за тежести
      description: Определя какъв диаметър дискове за тежести приема уредът (олимпийски,
        стандартни или и двата вида).
    weight_plate_style:
      name: Тип дискове за тежести
      description: Класифицира дизайна/типа на дисковете за тежести (напр. олимпийски,
        bumper, селекторни) за бързо филтриране по съвместимост.
    weightlifting_belt_style:
      name: Стил на колан за вдигане на тежести
      description: Категоризира цялостния дизайн или предназначената конфигурация
        на колана (напр. колан с лостов механизъм, колан за кофички, стеснен колан).
    weightlifting_federation_certification:
      name: Сертификация от федерация по вдигане на тежести
      description: Официално одобрение или съответствие на продукта от федерации по
        силови спортове, като IPF или IWF.
    wetsuit_boot_height:
      name: Височина на ботушите на неопреновия костюм
      description: Класифицира височината/кроя на ботуша върху крака, което влияе
        на покритието, подвижността и навлизането на вода.
    wetsuit_entry_system:
      name: Система за обличане на неопренов костюм
      description: Описва типа и разположението на отвора/ципа, използвани за обличане
        на неопреновия костюм.
    wetsuit_seam_construction:
      name: Конструкция на шевовете на неопренов костюм
      description: Определя как са изработени и уплътнени шевовете, което влияе върху
        топлината, гъвкавостта и издръжливостта.
    wheat_product_form:
      name: Форма на продукта от пшеница
      description: Указва физическата или преработена форма на пшеничния продукт.
    wheel_arrangement:
      name: Конфигурация на колелата
      description: Посочва схемата на разположение на колелата на парен локомотив
        (нотация на Уайт), която е основна характеристика и често използван термин
        при търсене и колекциониране.
    wheel_brake_type:
      name: Тип спирачка на колелото
      description: Описва конфигурацията на спирачките, налична на колелата или ролките
        на количката.
    wheel_chock_grip_features:
      name: Характеристики на сцеплението на клин за колела
      description: Характеристики на дизайна за сцепление и захват, които подобряват
        задържането върху повърхности и срещу гуми.
    wheel_cleaner_acidity_ph_category:
      name: Категория на киселинност / pH на препарат за джанти
      description: Посочва дали препаратът за джанти е киселинен, неутрален или алкален
        (и дали е pH-балансиран).
    wheel_cleaner_formula_type:
      name: Тип формула на препарат за джанти
      description: За препарати за джанти и свързани почистващи разтвори — определя
        основната категория на формулата на продукта (напр. киселинна, безкиселинна,
        pH-неутрална/балансирана или реагираща с желязо).
    wheel_construction_type:
      name: Тип конструкция на колелото
      description: Определя метода на производство/конструкция на колелото.
    wheel_contaminant_target:
      name: Целеви замърсители за почистване на колела
      description: Посочва основните видове замърсявания, които почистващият препарат
        е предназначен да премахва.
    wheel_core_type:
      name: Тип сърцевина на колелото
      description: Описва конструктивния стил на сърцевината на колелото, който влияе
        върху теглото, твърдостта и преноса на енергия.
    wheel_cylinder_inlet_port_thread_standard:
      name: Стандарт на резбата на входния отвор на колесния цилиндър
      description: Определя стандарта на резбата на входния отвор за спирачната тръба
        на колесния цилиндър (напр. метрична двойна развалцовка спрямо SAE обърната
        развалцовка).
    wheel_fastener_seat_type:
      name: Тип легло на крепежа на колелото
      description: Посочва типа на леглото на гайките/болтовете, което контактува
        с колелото (напр. конусно, сферично, плоско, шанк).
    wheel_illumination:
      name: Осветление на колелото
      description: Показва дали колелото има вградено осветление или функции за подсветка.
    wheel_material:
      name: Материал на колелото
      description: Определя основния състав на колелата, който влияе върху издръжливостта,
        сцеплението и поглъщането на вибрации.
    wheel_profile:
      name: Профил на колелото
      description: Описва формата на напречното сечение на колелото, която влияе върху
        скоростта, сцеплението и маневреността.
    wheel_setup_type:
      name: Тип конфигурация на колелата
      description: Определя стила на конфигурацията на колелата, използван при кънките.
    wheel_system_finish:
      name: Покритие на колесната система
      description: Повърхностно покритие/обработка на джанти, колела и определени
        части/аксесоари за колела.
    whip_style:
      name: Стил на камшика
      description: Класифицира продукта според конкретния стил на конен камшик или
        според предназначената дисциплина.
    whipped_cream_base:
      name: Основа за бита сметана
      description: Идентифицира основната съставка, използвана за приготвяне на бита
        сметана, като например млечна сметана или кокос.
    whipped_cream_form:
      name: Форма за бита сметана
      description: Показва физическия формат, в който се продава битата сметана.
    whistle_head_material:
      name: Материал на главата на свирката
      description: Определя материала на главата/мундщука на свирката (фипъл блок/глава).
    whistle_light_features:
      name: Функции на светлините на свирката
      description: Показва дали свирката включва интегрирани светлинни ефекти за партита
        (напр. LED).
    whistle_purpose:
      name: Предназначение на свирката
      description: Определя основното предназначение на свирката (спортно съдийство,
        морска безопасност, обучение на кучета и др.).
    whistle_sound_style:
      name: Стил на звука на свирката
      description: Описва стила/характера на звука на свирката (напр. еднотонален
        или многотонален).
    white_glue_finish_appearance_when_dry:
      name: Външен вид/финиш на бяло лепило след изсъхване
      description: Определя как изглежда лепилото след изсъхване за хоби/офис употреба
        (напр. прозрачно или непрозрачно).
    white_glue_washability:
      name: Възможност за измиване на бяло лепило
      description: Показва дали изсъхналото лепило може да се измие/почисти от тъкани
        или кожа.
    whitewater_kayak_style:
      name: Стил на каяк за бързи води
      description: Основно предназначение в категорията каяци за бързи води (напр.
        creekboat, river runner, playboat).
    whitewater_rating_class:
      name: Клас за бързи води
      description: Най-високият клас по Международната скала за трудност на реките,
        за който салът е оценен.
    whorl_mounting_interface:
      name: Интерфейс за монтаж на вретено
      description: Как роторът се закрепва към спининговата макара (стил/тип на връзката
        с оста).
    wick_construction_type:
      name: Тип конструкция на фитила
      description: Конструкция/стил на фитила (плетен, плосък, квадратна плитка, със
        сърцевина, дървен и др.).
    wick_core_type:
      name: Тип сърцевина на фитила
      description: Посочва дали фитилът е без ядро, или съдържа ядро (напр. с хартиено
        или цинково ядро), което влияе на твърдостта и характеристиките на горене.
    wick_tab_crimp_type:
      name: Tип на кримпване на металната основа (таб) на фитила
      description: Как държачът на фитила закрепва фитила (конструкция/тип на кримпване).
    wick_tab_material:
      name: Материал на държача на фитила
      description: "\U0001F449 Материал на прикрепената метална основа (сустейнер)
        на фитила (често калай), важен за устойчивост на корозия и съответствие с
        регулации (напр. избягване на олово)."
    wick_tab_shape:
      name: Форма на държача на фитила
      description: Форма/конструкция на пластината на държача на фитила.
    wick_type_included:
      name: Включен тип фитил
      description: Указва материала/типа на фитила, включен в комплекта.
    wig_fiber_material:
      name: Материал на влакната на перуката
      description: Определя основния вид влакна, използвани за косата на перуката,
        така че купувачите лесно да избират между варианти от естествена коса и синтетични
        опции с различни характеристики за стилизиране и издръжливост.
    wildlife_attractant_scent:
      name: Аромат за привличане на дивеч
      description: Определя основния аромат, използван за примамване на диви животни,
        включително естествени хранителни миризми и феромонни аромати.
    willow_grade:
      name: Клас на върбовата дървесина
      description: Определя качествения клас на използваната върбова дървесина, показвайки
        структурата на влакната и общото ниво на представяне.
    willow_type:
      name: Тип върбова дървесина
      description: Определя вида върбова дървесина или алтернативния материал, използван
        за острието на бухалката, което силно влияе върху представянето, издръжливостта
        и цената.
    wind_up_mechanism_type:
      name: Тип механизъм с навиване
      description: Определя как играчката се навива или активира.
    wind_up_toy_movement_pattern:
      name: Модел на движение на навиваща се играчка
      description: Описва основното движение, което се получава при навиване.
    windbreak_purpose:
      name: Предназначение на ветроупорния екран
      description: Определя основното предназначение на ветроупорния екран.
    windfoil_board_mounting_system:
      name: Система за монтаж на дъската за уиндфойл
      description: Посочва кутията или монтажния интерфейс за фойл, вградени в дъската
        за уиндфойл.
    windfoil_sail_style:
      name: Стил на платното за уиндфойл
      description: Класифицира платното според предназначения стил на каране или дисциплина.
    winding_direction:
      name: Посока на навиване
      description: Показва модела на въртене, поддържан от механизма за навиване на
        часовника (по часовниковата стрелка, обратно на часовниковата стрелка или
        двупосочен).
    winding_method:
      name: Метод на навиване
      description: Как е предвидено вътъкът да бъде навиван/зареждан за използване
        в совалката.
    winding_speed_control_type:
      name: Тип контрол на скоростта на навиване
      description: Показва метода, използван за контрол на скоростта на навиване по
        време на употреба.Тип навиване
    winding_type:
      name: Тип навиване
      description: Определя конструкцията на намотката на басовите струни (профил
        на външната обвивка).
    windlass_control_station_type:
      name: Тип контролна станция на шпила
      description: Тип интерфейс за управление, включен или поддържан за работа с
        шпила.
    windlass_mount_type:
      name: Тип монтаж на шпила
      description: Къде/как е предвидено да се монтира лебедката на лодката.
    window_component_location:
      name: Разположение на компонент на прозореца
      description: Определя за кой прозорец/отвор се отнася частта в превозното средство
        (напр. предно стъкло, стъкло на врата, задно стъкло или малко странично стъкло).
    window_configuration:
      name: Конфигурация на прозорците
      description: Посочва наличието и относителния размер на прозрачни прозорци за
        видимост върху крилото за уингфойл.
    window_glass_construction:
      name: Конструкция на стъклото на прозореца
      description: Определя конструкцията за безопасност/ламиниране на стъклото на
        моторното превозно средство.
    window_glass_features:
      name: Характеристики на стъклото на прозорците
      description: Показва дали стъклото поддържа интегрирани автомобилни технологии
        (напр. сензор за дъжд, стойка за камера).
    window_glass_finish:
      name: Покритие на стъклото на прозореца
      description: Определя вида на покритието, оцветяването и степента на затъмняване
        на автомобилните стъкла.
    window_glass_tint_color:
      name: Цвят на тонирането на стъклото
      description: Определя цветния оттенък на затъмнението в стъклото (не общия цвят
        на продукта).
    window_glass_tint_level:
      name: Ниво на затъмнение на стъклото на прозореца
      description: "\"Посочва приблизителната степен на фабрично затъмняване на стъклото
        (не става въпрос за допълнително поставено фолио). Използвайте описателни
        нива, когато точният VLT не е известен."
    window_net_latch_mechanism:
      name: Механизъм за заключване на мрежата на прозореца
      description: Указва механизма за заключване/освобождаване, използван за мрежата
        на прозореца (напр. бутон, лост, катарама тип „предпазен колан“).
    window_net_mounting_hardware:
      name: Крепежни елементи за монтаж на предпазна мрежа за прозорец
      description: Определя вида монтажен хардуер или метода на закрепване, използван
        за инсталиране на мрежата на прозореца (напр. щипка, винтове, кука/прът),
        или дали монтажният хардуер е включен.
    window_net_opening_direction:
      name: Посока на отваряне на мрежата на прозореца
      description: Определя как мрежата на прозореца се отваря/освобождава спрямо
        пътника за излизане и съответствие с изискванията.
    window_regulator_operation:
      name: Управление на механизма за прозореца
      description: Определя как се управлява механизмът за прозореца (ръчно с манивела
        или електрически).
    windshield_coverage_area:
      name: Зона на покритие на предното стъкло
      description: Определя кои части от предната външна част на превозното средство
        е предназначен да защитава калъфът за предното стъкло (напр. само предното
        стъкло или включва чистачки, огледала, странични прозорци или ръб на капака).
    windshield_mount_attachment_method:
      name: Метод за закрепване към предното стъкло
      description: Определя как стойката се закрепва или захваща повърхността на предното
        стъкло.
    windshield_washer_fluid_seasonality:
      name: Сезонност на течността за чистачки
      description: Определя предвидения сезон/климат или основния случай на употреба
        на формулата за течност за чистачки (напр. зимна против заледяване, лятна
        за насекоми, всесезонна).
    windsurf_fin_style:
      name: Стил на финката за уиндсърф
      description: Указва категорията на финката въз основа на съответната ветроходна
        дисциплина или стил на употреба (напр. за вълни, слалом, плитки води/водорасли).
    windsurfing_connection_standard:
      name: Стандарт за връзка за уиндсърф
      description: Механично свързване или тип кутия, използвана за фиксиране на компонента
        към дъската или ветроходната екипировка
    windsurfing_sail_style:
      name: Стил на платното за уиндсърф
      description: Класифицира платното според предназначената дисциплина или начин
        на употреба, като каране по вълни, свободно каране или хидрофойл.
    wine_additive_type:
      name: Вид добавка за вино
      description: Определя какъв вид продукт за производство на червено вино е това
        (съставка, добавка, мая, избистрящ агент, комплект и др.).
    wine_body:
      name: Плътност на виното
      description: Описва възприеманата плътност и усещането в устата на виното.
    wine_carbonation:
      name: Газираност на виното
      description: Показва дали виното е тихо, леко пенливо или пенливо и, когато
        е приложимо, интензивността на мехурчетата.
    wine_making_ingredient_type:
      name: Тип съставка за производство на вино
      description: Определя функционалната категория на съставките и добавките за
        винопроизводство.
    wine_making_stage:
      name: Етап на винопроизводството
      description: Идентифицира за кой етап от процеса на винопроизводство е предназначен
        продуктът.
    wine_style:
      name: Винен стил
      description: Класифицира общия стил на производство на виното отвъд цвета, като
        тихо, пенливо или подсилено вино.
    winemaking_process_stage:
      name: Етап от процеса на винопроизводство
      description: Показва основния етап от процеса на винопроизводство, за който
        е предназначен продуктът.
    wing_count:
      name: Брой крила
      description: Брой крила/рамена на бумеранга
    wing_handle_type:
      name: Тип дръжка на крилото
      description: Определя стила на системата за ръкохватки на крилото за уингфойл.
    wing_part_type:
      name: Тип част на крилото
      description: Определя конкретния компонент или резервна част за крило за уингфойл.
    wingfoiling_style:
      name: Стил на уингфойл
      description: Показва конкретната дисциплина или стил на каране с уингфойл, за
        който е предназначен продуктът.
    wiper_arm_finish:
      name: Покритие на рамото на чистачката
      description: Повърхностно покритие или защитен слой, нанесен върху рамото на
        чистачката, влияещ върху устойчивостта на корозия и външния вид.
    wiper_arm_pivot_mount_type:
      name: Тип закрепване на шарнирното рамо на чистачката
      description: Указва как рамото на чистачката се монтира към лостовото устройство
        или шарнирното съединение на чистачките на превозното средство.
    wiper_blade_attachment_type:
      name: Тип закрепване на чистачките
      description: Указва вида на конектора/закрепването, използван за монтиране на
        чистачката към рамото на чистачката.
    wiper_blade_rubber_material:
      name: Материал на гумата на перата на чистачката
      description: Материал на перцето (гуменото перо), което контактува със стъклото.
    wiper_system_position:
      name: Позиция на системата на чистачките
      description: Показва позицията на монтаж на системата за чистачки за превозното
        средство.
    wire_coating_material:
      name: Материал за покритие на тел
      description: Определя материала на външното покритие/обвивка, нанесен върху
        телта (не материала на сърцевината), което може да повлияе на устойчивостта
        на износване и колко гладко преминава през отворите на мънистата.
    wire_coating_type:
      name: Вид покритие на телта
      description: Указва дали и как проводникът е покрит/с покритие (за цвят, защита
        и текстура).
    wire_construction_type:
      name: Тип конструкция на проводника
      description: Определя физическата конструкция на телта за опъване, например
        многожилна или плътна, и дали е с покритие.
    wire_finish:
      name: Покритие на телта
      description: Определя повърхностното покритие, слоя или галванизацията, нанесени
        върху телта (напр. полирана, емайлирана, поцинкована, метализирана), което
        влияе върху външния вид и устойчивостта на потъмняване/корозия.
    wire_gauge_awg:
      name: Дебелина на телта (AWG)
      description: AWG (Американски калибър на проводниците) – размерът на проводниците,
        използвани в окабеляването.
    wire_insulation_material:
      name: Материал на изолацията на проводника
      description: Материал на изолацията/обвивката на проводника, използван в кабелния
        сноп (влияе върху устойчивостта на температура/химикали).
    wire_packaging_type:
      name: Тип опаковка на проводника
      description: Определя начина, по който проводникът се продава/опакова.
    wire_shape_profile:
      name: Форма/профил на проводника
      description: Описва напречното сечение на проводника.
    wiring_configuration:
      name: Конфигурация на окабеляването
      description: Показва дали шпага̀та за фехтовка се доставя предварително окабелена
        за електронно отчитане, без окабеляване, безжична или предназначена за неелектрическа
        тренировка.
    wobbler_style:
      name: Стил на воблера
      description: Определя конкретния стил на дизайн/движение на воблера, като crankbait
        или jerkbait.
    wood_block_surface_preparation:
      name: Подготовка на повърхността на дървения блок
      description: Посочва състоянието на повърхността на дървеното блокче, готово
        за финишно покритие и обработка.
    wood_grain_direction:
      name: Посока на дървесните влакна
      description: Посока на дървесните влакна спрямо най-дългото измерение на продукта
        (важно за здравината, поведението при рязане и външния вид).
    wood_slice_edge_style:
      name: Стил на ръба на дървения срез
      description: Състояние на ръба на среза, като естествен ръб с кора или гладък/шлифован
        ръб.
    wooden_block_special_features:
      name: Специални характеристики на дървения блок
      description: Отличителни функционални характеристики, включени в комплекта дървени
        блокчета.
    woodwind_body_construction:
      name: Конструкция на корпуса на дървен духов инструмент
      description: Показва дали инструментът е изработен от една част или от няколко
        секции (напр. 2-частов/3-частов), което влияе върху почистването, съхранението
        и преносимостта.
    woodwind_polishing_cloth_intended_use:
      name: Предназначение на кърпа за полиране на дървени духови инструменти
      description: Указва за какво е предназначена предимно кърпата за почистване/полиране
        на дървен духов инструмент.
    woodwind_small_part_type:
      name: Тип малка част за дървен духов инструмент
      description: Определя какъв вид малка резервна част за кларинет представлява
        артикулът (напр. механични части, подложки/корк/филц, пръстени).
    woofer_mounting_type:
      name: Тип монтаж на субуфер
      description: Начин на монтаж и употреба на нискочестотния високоговорител (в
        отворен обем или в кутия) и масови форми за автомобилен монтаж.
    woofer_surround_material:
      name: Материал за съраунд на нискочестотния говорител
      description: Материал, използван за окачването на басовия говорител (външния
        окачващ пръстен).
    worn_on_finger:
      name: За носене на пръста
      description: Определя на кой пръст е предназначен да се носи напръстникът-водач.
    wrap_style:
      name: Стил на навиване
      description: Показва колко пъти коланът е предназначен да се увива около кръста.
    wrapping_occasion:
      name: Повод за опаковане
      description: Основният повод за подаряване/празнуване, за който е предназначена
        опаковъчната хартия.
    wrapping_paper_features:
      name: Характеристики на опаковъчната хартия
      description: Функционални и свързани с устойчивостта свойства на опаковъчната
        хартия, като устойчивост на скъсване, рециклирано съдържание или предварително
        нарязани листове.
    wrestling_dummy_design:
      name: Дизайн на тренировъчен манекен за борба
      description: Общата форма на тялото или позата на манекена, като човешка фигура
        в изправено положение или тренировъчен чувал, което определя приложимите тренировъчни
        упражнения.
    wrestling_mat_safety_certifications:
      name: Сертификати за безопасност на постелки за борба
      description: Изброява всички сертификати или стандарти за безопасност от индустрията
        или спортните организации, на които отговаря постелката.
    wrist_strap_style:
      name: Стил на каишката за китка
      description: Описва стила на каишката за китката (или липсата на такава), който
        влияе върху поддръжката и прилягането.
    wrist_support_style:
      name: Стил за поддръжка на китката
      description: Идентифицира конструкцията или стила на поддръжката на китката,
        като шина, ръкавица, лента или обвивка, за да подпомогне избора на предпочитания
        и ефективност на потребителя.
    xylophone_range_octaves:
      name: Диапазон на ксилофона (октави)
      description: Общият диапазон на ксилофона се изразява в октави (например 2,5
        октави, 3 октави, 4 октави).
    xylophone_resonator_type:
      name: Тип резонатор на ксилофон
      description: Тип резонаторна система, използвана за усилване на тона (ако има
        такава).
    yam_variety:
      name: Сорт ямс
      description: Определя култивирания или обичаен сорт ямс, който се продава (напр.
        лилав, жълт, слонски крак).
    yarn_cutter_physical_style:
      name: Физически стил на резачка за прежда
      description: Определя физическия стил на резачката за прежда (напр. висулка,
        пръстен, ножичка), за да подпомогне разглеждането и филтрирането в тази категория.
    yarn_finish_or_effect:
      name: Завършек или ефект на преждата
      description: Подчертава специфичните визуални или функционални ефекти на преждата,
        като флуоресценция или метален блясък.
    yarn_guide_style:
      name: Тип на водача за прежда
      description: Физическият стил на компонента за водене на преждата.
    yarn_swift_adjustability:
      name: Регулируемост на държача за прежда
      description: Посочва дали и как може да се регулира мотовилката (разтегателна,
        сгъваема), което влияе на съхранението и диапазона от размери на чилетата,
        с които може да работи.
    yarn_swift_bearing_type:
      name: Тип лагер на държача за прежда
      description: Описва механизма за поддръжка на въртенето (напр. сачмен лагер),
        който влияе върху плавността и скоростта на навиване.
    yeast_application:
      name: Приложение на мая
      description: Показва основното кулинарно или ферментационно предназначение на
        продукта с мая.
    yo_yo_accessory_part_type:
      name: Вид аксесоар/част за йо-йо
      description: Определя какъв вид резервна част или аксесоар за йо-йо представлява
        продуктът (напр. връв, лагер, подложки за отклик).
    yo_yo_axle_system_type:
      name: Тип осева система на йо-йо
      description: Конструктивен подход за оста на йо-йото (напр. фиксирана ос спрямо
        проходна ос), влияещ върху усещането при игра и поддръжката.
    yo_yo_bearing_size_class:
      name: Клас на размера на лагера на йо-йото
      description: Стандартизиран клас на размера на лагера, използван от йо-йото,
        когато е приложимо.
    yo_yo_bearing_type:
      name: Тип лагер на йо-йото
      description: Конфигурация на лагера, която влияе върху чувствителността и характеристиките
        на въртене.
    yo_yo_play_style:
      name: Йо-йо стил на игра
      description: Основен предназначен стил на игра с йо-йото, отразяващ дисциплината
        с връв/трикове, за която е предназначен продуктът.
    yo_yo_response_system:
      name: Йо-йо система за реакция
      description: Уточнява механизма за реакция тип йо-йо, за който е съвместима
        тази част.
    yo_yo_responsiveness:
      name: Реагиране на йо-йо механизма
      description: Показва дали йо-йото се връща в ръката с дръпване (чувствително)
        или изисква връзване (нечувствително).
    yo_yo_string_material:
      name: Материал на въжето на йо-йото
      description: Материален състав на връвта на йо-йото.
    yogurt_base_ingredient:
      name: Основна съставка на киселото мляко
      description: Определя основния млечен или растителен източник, използван за
        направата на киселото мляко, важен за хранителните предпочитания и алергенните
        съображения.
    yoke_type:
      name: Тип вилка
      description: Определя стила на люлката или вилката, която поддържа огнестрелното
        оръжие върху монопода.
    zill_playing_style:
      name: Стил на свирене със зил
      description: Предназначен стил/контекст на изпълнение (обикновено ориенталски
        танц спрямо оркестрови/културни варианти).
    zill_strap_material:
      name: Материал на каишката за зил
      description: Материал на лентата/ластика за пръсти, използван за задържане на
        плавниците (ако е включен), влияещ върху комфорта, издръжливостта и сцеплението.
    zills_strap_adjustability:
      name: Регулируемост на лентата за зилове
      description: Дали и как включената лентата/ластик може да се регулира за прилягане.
    zipper_application:
      name: Приложение на ципа
      description: Указва предназначения проект или приложение, за което е предназначен
        ципът.
    zipper_chain_type:
      name: Тип цип с верижка
      description: Определя конструкцията/типа на веригата/зъбците на ципа.
    zipper_end_type:
      name: Тип край на ципа
      description: Показва как завършва ципът и дали е разделящ се (отворен край)
        или неразделящ се (затворен край), включително често използваните механизми
        при занаятчийски ципове.
    zipper_gauge:
      name: Размер на ципа
      description: 'Показва обозначението за дебелина/размер на веригата на ципа,
        обикновено изразено като число със знак # (например #3 или #5), което съответства
        на ширината на зъбите/спиралата и предназначението.'
    zipper_opening_length:
      name: Дължина на отваряне на ципа
      description: Определя каква част от предния отвор е с цип, като разграничава
        стилове с цял цип, половин цип или четвърт цип.
    zipper_pull_material:
      name: Материал на дръжката на ципа
      description: Уточнява материала на плъзгача или езичето на ципа (частта, която
        се хваща), различен от зъбците/веригата и лентата на ципа.
    zipper_pull_side:
      name: Страна на дърпача на ципа
      description: Определя от коя страна/страни на ципа е достъпно езичето за дърпане.
    zipper_pull_strap_cord_tab_material:
      name: Материал на каишката/връвчицата/езичето на ципа
      description: Материал на лентата/връвта/езичето/пискюла, прикрепен към дръжката
        на ципа (ако има такъв), без да включва основния механизъм/корпус на дръжката.
    zipper_reversibility_mechanism:
      name: Механизъм за обръщаемост на ципа
      description: Определя как ципът е обръщаем (напр. двустранен плъзгач спрямо
        обръщащ се/автоматично заключващ се плъзгач, предназначен за обръщаеми дрехи).
    zipper_separating_type:
      name: Тип разделяне на ципа
      description: Показва дали ципът се разделя в долната/горната част или е затворен
        в края, за съвместимост с якета, спални чували, чанти и др.
    zipper_side:
      name: Страна на ципа
      description: Определя от коя страна се намира основният цип, когато спалният
        чувал е поставен с лицевата страна нагоре.
    zipper_slider_material:
      name: Материал на плъзгача на ципа
      description: Определя материала на плъзгача на ципа (движещия се механизъм),
        който може да повлияе на здравината и устойчивостта на корозия.
    zipper_slider_pull_configuration:
      name: Конфигурация на плъзгача/дръжката на ципа
      description: Показва дали ципът има един или два плъзгача/дръжката и дали дърпачите
        са от едната или от двете страни на плъзгача.
    zipper_style:
      name: Стил на ципа
      description: Показва дължината или наличието на цип върху дрехата (напр. без
        цип, четвърт цип, половин цип, цял цип).
    zipper_tape_material:
      name: Материал на лентата на ципа
      description: Определя основния материал на лентата на ципа (текстилните страни),
        която се зашива в изделието.
    zipper_teeth_type:
      name: Тип зъбци на ципа
      description: Определя конструктивния стил на веригата/зъбците на ципа (напр.
        спирала, формована пластмаса, метал, скрит цип), който влияе върху гъвкавостта,
        здравината и типичните приложения.
    assembly_required:
      name: Изисква сглобяване
      description: Показва дали продуктът изисква сглобяване преди употреба
    organic_certification:
      name: Биологичен сертификат
      description: Указва какъв биологичен сертификат или сертификат за устойчивост
        притежава продуктът
