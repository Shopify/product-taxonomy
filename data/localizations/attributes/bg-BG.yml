    chicken_feed_stage:
      name: Етап на хранене на пилета
      description: Идентифицира подходящия жизнен етап за храна за пилета, като стартер
        или носачка
    child_seat_placement:
      name: Разположение на детска седалка
      description: Указва местоположението на детската седалка на велосипед, като
        например отпред или отзад
    chin_strap_style:
      name: Стил на ремъка за брадичката
      description: Определя структурния дизайн или конфигурация на ремъка (напр. единичен
        ремък, за цялата глава, ореол)
    chipper_technology:
      name: Технология на дробилка
      description: Идентифицира типа технология, използвана в дробилките, като шнек
        или барабан
    chiropractic_table_design:
      name: Дизайн на маса за хиропрактика
      description: Описва функционалните характеристики на маса за хиропрактика, като
        спускане или издигане
    chocolate_type:
      name: Тип шоколад
      description: Определя разнообразието от шоколад въз основа на неговите съставки
        и съдържание на какао, напр. черен шоколад, млечен шоколад
    cholesterol_analyte_measured:
      name: Измерван холестеролен аналит
      description: Изброява специфичните биомаркери, които устройството може да измерва
        или изчислява в допълнение към общия холестерол
    chuck_type:
      name: Тип патронник
      description: Указва вида на патронника в железарски инструменти, като SDS или
        SDS max
    cigar_body:
      name: Основна част на пура
      description: Указва силата и вкусовия профил на пурите, например леки, средни
        до плътни
    circuit_board_features:
      name: Характеристики на печатна платка
      description: Описва уникални аспекти на печатна платка, като например вградена
        графика или поддръжка за увеличаване на работната честота на процесора
    circuit_breaker_design:
      name: Дизайн на електрически прекъсвач
      description: Описва стила на монтиране на електрически прекъсвач, напр. със
        завинтване на болт или щепсел
    circuit_breaker_panel_form:
      name: Форма на панела на електрически прекъсвач
      description: Идентифицира типа панел на електрически прекъсвач, като миниатюрен
        или формован корпус
    circuit_breaker_type:
      name: Тип електрически прекъсвач
      description: Идентифицира типа прекъсвач, като стандартен или AFCI
    clarinet_key_system:
      name: Система за клавиши за кларинет
      description: Идентифицира система за клавиши за кларинет, като Albert или Boehm
    clasp_type:
      name: Тип закопчалка
      description: Указва типа закопчалка за аксесоари, като катарама или пеперуда
    claw_design:
      name: Дизайн на зъбци
      description: Определя формата на зъбци за чесало за гърба, като например заоблени
        или заострени
    clay/slip_texture:
      name: Текстура глина/шликер
      description: Описва усещането и консистенцията на глина или шликер, като груба
        или гладка
    clay_texture:
      name: Текстура на глина
      description: Описва усещането и консистенцията на глина, като средно опечена
        или гладка
    cleaner_purpose:
      name: Предназначение на препарат за почистване
      description: Идентифицира конкретната употреба на препарат за почистване на
        плавателни съдове, като корпус или палуба
    cleaning_instructions:
      name: Инструкции за почистване
      description: Ръководства за препоръчителния метод на почистване, като например
        за съдомиялна машина или само за ръчно миене/пране
    cleaning_kit_components_included:
      name: Включени компоненти в комплекта за почистване
      description: Изброява специфичните елементи, съдържащи се в комплекта, така
        че клиентите да разберат какви инструменти и консумативи са предоставени
    cleaning_mode:
      name: Режим на почистване
      description: Изброява специфичните режими на почистване или използване на конец
        за зъби, налични на устройството
    cleaning_purpose:
      name: Предназначение на почистване
      description: Указва предвидената употреба на продукти за почистване или пране,
        напр. освежаване, петна
    cleaning_surfaces:
      name: Повърхности за почистване
      description: Идентифицира подходящите повърхности за почистващ продукт, напр.
        стъклени повърхности или котлони
    cleaning_technology:
      name: Технология за почистване
      description: Описва основното движение или механизъм, който четката за зъби
