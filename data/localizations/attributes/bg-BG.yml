    camera_lens_type:
      name: Тип обектив на камерата
      description: Идентифицира вида на обектива на камерата, като макро или телефото
    camera_mounting_type:
      name: Тип монтаж на камерата
      description: Указва метода на закрепване на камерата, напр. статив, със захващане
    camera_sensor_type:
      name: Тип сензор на камерата
      description: Идентифицира типа сензор в камери или оптика, напр. CMOS, CCD
    camera_shape:
      name: Форма на камерата
      description: Описва стила на дизайна на камери за сигурност, напр. във форма
