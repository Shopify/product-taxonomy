        и да могат лесно да сравняват комплектите.
    firewood_seasoning:
      name: Изсушаване на дърва за огрев
      description: Показва състоянието на изсушаване на дървата за огрев, което влияе
        върху съдържанието на влага, лекотата на запалване и топлинната ефективност.
    flag_attachment_style:
      name: Стил на закачване на знаме
      description: Описва как знамето или ветрозащитният ръкав се закрепват към пилон
