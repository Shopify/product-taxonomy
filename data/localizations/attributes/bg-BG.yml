    cable_form_factor:
      name: Типоразмер на кабела
      description: Описва физическия стил на дизайна или форма на кабела
    cable_housing_material:
      name: Материал на корпуса на кабела
      description: Идентифицира материала, използван за корпуса на кабела, напр. найлон
        или PVC
    cable_jacket_rating:
      name: Оценка на обвивката на кабела
      description: Определя екологичната или оценката на безопасността на външната
        обвивка на кабела (напр. пленум, директно заравяне, устойчив на UV)
    cable_shielding:
      name: Екраниране на кабел
      description: Указва вида на защитата, използвана в кабелите, напр. плетена (STP),
        фолио (FTP)
    cable_style:
      name: Стил на кабела
      description: Описва физическия дизайн на кабела (напр. плетен, плосък, навит,
        прибиращ се)
    cable_tie_type:
      name: Тип кабелна връзка
      description: Определя конструктивния стил или механизма за закрепване на кабелната
        връзка
    cable_tray_style:
      name: Стил на кабелната скара
      description: Описва структурния стил на секцията на кабелната скара, който определя
        вентилацията и метода за поддържане на кабелите
    cable_type:
      name: Тип кабел
      description: Класифицира разнообразието от кабели, обикновено в оборудването
        за колоездене, например спирачка, предавка
    cache_level:
      name: Ниво на кеша
      description: Показва йерархичната позиция на кеша (напр. L1, L2, L3), което
        влияе на размера, латентността и близостта до процесорните ядра
    caffeine_content:
      name: Съдържание на кофеин
      description: Показва количеството кофеин в продукта, напр. без кофеин, с ниско
        съдържание на кофеин
    cage_type:
      name: Тип клетка
      description: Идентифицира стила на предпазната клетка в превозните средства,
        като цяла клетка или наполовина клетка
    calculator_accessory_type:
      name: Тип аксесоар за калкулатор
      description: Указва вида на аксесоара за калкулатор, като хартиена ролка или
        адаптер за принтер
    calculator_features:
      name: Функции на калкулатора
      description: Описва функциите, които калкулаторът може да изпълнява, като изчисляване
        на заем или статистически анализ
    calendar/organizer_features:
      name: Функции на календар/органайзер
      description: Описва специални функции на календари или органайзери, като интервали
