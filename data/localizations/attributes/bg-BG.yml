    cleanse_focus:
      name: Фокус на почистването
      description: Идентифицира основната телесна система или цел, към която е насочен
        почистващият продукт
    cleanser_type:
      name: Тип почистващо средство
      description: Описва специфичната текстура или формат на почистващото средство
    cleat_type:
      name: Тип зацепка
      description: Указва стила на зацепките, използвани в палуби, като например повдигаща
        се или с отворена основа
    climbing_activity:
      name: Активност, свързана с катерене
      description: Указва типа катерене, за който е предназначен продуктът, като алпинизъм
        или катерене по лед
    clip_type:
      name: Тип клипс
      description: Указва стила на клипс за елементи като клипбордове, напр. с голям
        капацитет
    clipper/trimmer_type:
      name: Тип машинка за подстригване/тример
      description: Идентифицира източника на захранване на машинки за подстригване
        или тримери, напр. със или без кабел
    clipper_motor_type:
      name: Тип двигател на машинката
      description: Описва механичния дизайн на двигателя, задвижващ устройството (напр.
        въртящ, ротационен, магнитен, безчетков)
    clock_and_alarm_features:
      name: Функции на часовник и аларма
      description: Описва вградените възможности за часовник и събуждане/заспиване,
        които радиото предлага
    closure_style:
      name: Стил на закопчаване
      description: Указва метода, използван за закопчаване на артикул, обикновено
        в спално бельо, напр. традиционен, скрит
    closure_type:
      name: Тип закопчаване
      description: Определя метода, използван за закопчаване или обезопасяване на
        продукт, като цип или катарами
    cloth_treatment:
      name: Обработка на плата
      description: Идентифицира дали плата е предварително обработен и ако да, естеството
        на обработката
    clothing_accessory_material:
      name: Материал на аксесоарите за облекло
      description: Идентифицира основния материал, използван в аксесоарите за облекло,
        напр. кожа или лен
    clothing_features:
      name: Характеристики на облеклото
      description: Описва уникални характеристики на облеклото, напр. водоустойчивост
        или устойчивост на гънки
    club_subset:
      name: Поднабор на стикове
      description: 'Класифицира стикове за голф в специфични подкатегории, напр. Sand
        wedge, Blade putter '
    club_type:
      name: Тип стикове
      description: Класифицира стикове за голф въз основа на специфичната им употреба,
        напр. драйвер, желязо
    coating/sealant_application:
      name: Нанасяне на покритие/уплътнител
      description: Описва функцията на защитните покрития и уплътнители, например
        защита от атмосферни влияния, предотвратяване на ръжда
    coaxial_cable_series:
      name: Серии на коаксиален кабел
      description: Идентифицира индустриално-стандартната серия или обозначение на
        кабела (напр. RG-6, RG-58, LMR-400), което диктува физическите размери и електрическата
        производителност
    cockpit_type:
      name: Тип пилотска кабина
      description: Указва дизайна и технологията, използвани в пилотската кабина на
        летателен апарат, като например аналогова или хибридна
    cocktail_decoration_design:
      name: Дизайн на коктейлна декорация
      description: Идентифицира модела или стила на консумативи за коктейлно парти,
        като полка точки или необикновени форми
    cocktail_decoration_material:
      name: Материал на коктейлна декорация
      description: Указва материала, от който се правят декорациите за коктейли, като
        пластмаса или хартия
    coffee/tea_set_pieces_included:
      name: Включени са части от комплекти за кафе/чай
      description: Посочва отделните елементи в сервиз за кафе или чай, напр. чаши
        и чинийки
    coffee_creamer_variety:
      name: Разновидност на сметана за кафе
      description: Разграничава различните видове сметана за кафе, напр. на прах,
        немлечна
    coffee_input_type:
      name: Тип форма на кафе
      description: Идентифицира формата на кафето, напр. шушулки, зърна
    coffee_product_form:
      name: Форма на продукта за кафе
      description: Указва вида продукт за кафе, напр. смляно или на зърна
    coffee_roast:
      name: Изпичане на кафето
      description: Определя нивото на изпичане на продукти за кафе, напр. светло,
        средно, тъмно
    coil_connection:
      name: Свързване на намотка
      description: Определя сменяемостта на намотката в устройствата за вейпинг, например
