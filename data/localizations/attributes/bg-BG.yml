    flame_adjustment:
      name: Регулиране на пламъка
      description: Показва дали и как може да се регулира интензитетът на пламъка.
    flask_insulation_type:
      name: Тип изолация на колбата
      description: Показва термоизолационната конструкция на колбата, която влияе
        върху запазването на температурата.
    flatware_finish:
      name: Повърхност на приборите
      description: Описва обработката на повърхността или блясъка на приборите за
