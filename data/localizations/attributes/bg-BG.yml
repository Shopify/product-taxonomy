---
bg-BG:
  attributes:
    3d_glasses_fit_design:
      name: Дизайн на прилягане на 3D очилата
      description: Показва как се носят или прикрепят очилата (например клипс, обвиващи,
        поставяне върху други очила).
    3d_glasses_material:
      name: Материал за 3D очила
      description: Посочва материала, използван за 3D очила, като например бамбук
        или неръждаема стомана
    3d_glasses_technology:
      name: Технология на 3D очилата
      description: Указва технологията за 3D изображение/синхронизация, за която са
        създадени очилата, определяйки съвместимостта със специфични дисплеи или прожектори.
    3d_printer_case_style:
      name: Стил на калъф за 3D принтер
      description: Класифицира общия тип продукт, така че купувачите да могат да различават
        между меки чанти за носене, твърди кутии, стационарни кутии и прости покривала
        за прах.
    3d_printer_cleaning_kit_components_included:
      name: Включени компоненти в комплекта за почистване на 3D принтер
      description: Изброява отделните инструменти и консумативи, предоставени в комплекта,
        така че купувачите да знаят точно какво купуват.
    3d_printing_resin_type:
      name: Тип смола за 3D принтиране
      description: Указва състава или предназначението на смолата, помагайки на купувачите
        бързо да идентифицират дали смолата е стандартна, инженерна, за отливане,
        или друг специализиран тип.
    80_plus_efficiency_rating:
      name: Оценка за ефективност 80 Plus
      description: Обозначава официалното ниво на сертифициране за енергийна ефективност
        80 Plus, което компютърното захранване е достигнало
    abrasive_material:
      name: Абразивен материал
      description: Посочва типа абразив, използван в шлифовъчни инструменти, като
        например диамант или силициев карбид
    absinthe_style:
      name: Тип на абсента
      description: Посочва типа на абсента, като например смесен или дестилиран
    absinthe_variety:
      name: Разновидност на абсента
      description: Разграничава продуктите от абсент по техните уникални разновидности,
        например руж и верте
    absorbency_level:
      name: Ниво на абсорбция
      description: Определя капацитета на абсорбция, обикновено за предмети за лична
        хигиена, напр. нощна, слаба
    absorbent_hygiene_product_features:
      name: Характеристики на абсорбиращи хигиенни продукти
      description: Посочва специалните характеристики на хигиенните продукти, като
        например непропускливи или хипоалергенни
    academic_level:
      name: Академично ниво
      description: Посочва академичното ниво на медийното съдържание, като например
        за бакалаври или доктори
    accessibility_design_features:
      name: Характеристики на дизайна за достъпност
      description: Изброява специални дизайнерски елементи, които помагат на потребители
        с проблеми със слуха, зрението или сръчността.
    accessory_material:
      name: Материал на аксесоарите
      description: Посочва вида на материала в аксесоарите, обикновено за доставка
        на консумативи, напр. пластмаса или картон
    accessory_size:
      name: Размер на аксесоара
      description: Посочва размера на аксесоарния продукт, като например един размер
        или компактен
    accordion_tuning:
      name: Настройка на акордеон
      description: Посочва вида на настройката, използвана в акордеона, като суха
        или концертна настройка
    activation_mechanism:
      name: Механизъм за активиране
      description: Посочва основния метод, който задейства алармата.
    activation_method:
      name: Метод на активиране
      description: Описва как предплатеният кредит или SIM картата се активират от
        потребителя.
    active_ingredient:
      name: Активна съставка
      description: Идентифицира основните вещества в артикулите за лична хигиена,
        напр. витамин А или ретинол
    activewear_clothing_features:
      name: Характеристики на спортното облекло за ежедневието
      description: Идентифицира уникалните характеристики на спортното облекло за
        ежедневието, като например четиристранно разтягане или дишащ дизайн
    activity:
      name: Активност
      description: Посочва спорта или активността, за която е предназначен продуктът,
        като например тенис или пилатес
    activity_tracker_design:
      name: Дизайн на инструмента за проследяване на активност
      description: Посочва как се носи инструментът за проследяване на активността,
        напр. със защипване, лента за ръка
    acupuncture_model_format:
      name: Формат на акупунктурния модел
      description: Определя размера и мащаба на акупунктурните модели, напр. в реален
        размер, миниатюрни
    acupuncture_model_type:
      name: Тип на акупунктурния модел
      description: 'Посочва частта от тялото или видовете, които акупунктурният модел
        представлява, напр. глава, ръка, животно '
    adapter_directionality:
      name: Посоки на адаптера
      description: Показва дали адаптерът поддържа поток на сигнала в двете посоки,
        или само в една определена посока.
    adapter_operating_modes:
      name: Работни режими на адаптера
      description: Указва дали адаптерът функционира като Bluetooth приемник, предавател,
        или и двете.
    adaptive_sync_technology:
      name: Технология за адаптивна синхронизация
      description: Указва технологията с променлива честота на опресняване (VRR),
        поддържана от монитора за визуализация без накъсване.
    adc_resolution:
      name: ADC резолюция
      description: Указва резолюцията (в битове) на интегрирания аналогово-цифров
        преобразувател, определящ прецизността на измерването.
    additional_animation_software_features:
      name: Допълнителни функции на софтуера за анимация
      description: Посочва уникални функции в софтуера за редактиране на анимация,
        като анимация на герои или визуални ефекти
    additional_cleaning_technology:
      name: Допълнителна почистваща технология
      description: Изброява всички почистващи технологии, включени извън парата (напр.
        ултразвук, UV, озон).
    additional_design_software_type:
      name: Допълнителен тип софтуер за дизайн
      description: Посочва допълнителни възможности на софтуера за дизайн, като например
        виртуална обиколка или ландшафтен дизайн
    additional_financial_software_features:
      name: Допълнителни функции на софтуера за финанси
      description: Идентифицира допълнителните възможности на финансовия софтуер,
        като например управление на активи или одит и спазване на правилата
    additional_graphic_software_features:
      name: Допълнителни функции на графичния софтуер
      description: Подчертава допълнителните възможности на графичния софтуер, като
        например цифрова илюстрация или дизайн на оформлението
    additional_publishing_software_features:
      name: Допълнителни функции на софтуера за публикуване
      description: Подчертава допълнителни функционалности в софтуера за публикуване,
        като например печатен дизайн или дигитално публикуване
    additional_security_software_features:
      name: Допълнителни функции на софтуера за сигурност
      description: Идентифицира допълнителни възможности на софтуера за сигурност,
        напр. криптиране на диска, установяване на проникване
    adhesive_application_type:
      name: Тип на приложение на лепилото
      description: Определя предназначената услуга за мигли или случай на употреба
        за лепилото.
    adhesive_features:
      name: Характеристики на лепилото
      description: Подчертава специални свойства на лепилото, използвано върху пластири
        или ленти.
    adhesive_format:
      name: Форма на лепилото
      description: Указва физическата форма, в която се доставя лепилото за ремонтни
        цели.
    adhesive_strength:
      name: Сила на лепилото
      description: Определя нивото на силата на свързване или повдигане на лепилото
        за ленти за нос (напр. оригинална, допълнителна сила).
    adhesive_type:
      name: Тип лепило
      description: Идентифицира типа лепило, използвано в даден продукт, като например
        постоянно и временно залепване
    aftershave_product_form:
      name: Форма на афтършейва
      description: Идентифицира консистенцията на афтършейва, като например балсам
        или крем
    age_group:
      name: Възрастова група
      description: Определя целевия възрастов диапазон за даден продукт, като например
        възрастни или деца
    age_restrictions:
      name: Възрастови ограничения
      description: Посочва изискването за минимална възраст за продукт или събитие,
        като например 18 или повече години
    ai_application:
      name: Приложение с AI
      description: Указва функцията на AI в софтуера, като например предвиждащ анализ
        или разпознаване на говор
    air_freshener_form:
      name: Вид на освежителя за въздух
      description: Определя вида на освежителите за въздух за автомобила, напр. етерично
        масло, вентилационна щипка
    air_fryer_functions:
      name: Функции на фритюрниците с горещ въздух
      description: Изброява различните режими на готвене, с които разполага фритюрник
        с горещ въздух или подобен уред, напр. пържене чрез горещ въздух, печене
    air_mattress_features:
      name: Характеристики на надуваемия матрак
      description: Описва уникалните характеристики на надуваемия матрак, като например
        лесен за надуване или устойчивост на пробиване
    air_tube_configuration:
      name: Конфигурация на въздушна тръба
      description: Указва броя или стила на тръби за напомпване с въздух, интегрирани
        с маншета
    airbrush_feed_type:
      name: Тип подаване за аерографа
      description: Идентифицира метода за подаване на боя в аерографите, като например
        гравитационно или чрез сифон
    airbrush_operation_method:
      name: Начин на опериране с аерографа
      description: Указва стила на опериране на аерографите, например двойно действие
        или едно действие
    aircraft_engine_configuration:
      name: Конфигурация на двигател на летателен апарат
      description: Указва броя на двигателите, задвижващи летателен апарат, като например
        единичен или двоен
    aircraft_engine_type:
      name: Тип двигател на летателен апарат
      description: Указва типа двигател, задвижващ летателен апарат, като например
        реактивен или турбовитлов
    airflow_opening_design:
      name: Дизайн на отвора за въздушен поток
      description: Описва конфигурацията за дишане или вентилация, вградена в мундщука.
    airsoft_equipment_included:
      name: Включено оборудване за страйкбол
      description: Посочва допълнително оборудване, предоставено с продуктите за страйкбол,
        като например защитни очила или тактическа жилетка
    album_type:
      name: Тип албум
      description: Описва стила на подвързване на комплекти за скрапбукинг или щамповане,
        напр. със спирала, скрапбук
    alcohol/solvent_content:
      name: Съдържание на алкохол/разтворител
      description: Класифицира продукта въз основа на съдържанието на алкохол или
        разтворител за целите на доставката и регулаторните органи (напр. алкохол
        ≤24%, алкохол >24%, разтворител в малка опаковка)
    alcohol_content:
      name: Съдържание на алкохол
      description: Указва дали тонерът е без алкохол, или ако присъства, приблизително
        колко алкохол съдържа формулата.
    alert_type:
      name: Тип сигнал
      description: Указва вида на сигнала, който продуктът предоставя, като например
        звукови аларми или известия на смартфона
    allergen_information:
      name: Информация за алергени
      description: Посочва потенциалните алергени, присъстващи в храни или напитки,
        като например пшеница или фъстъци
    allergen_test_type:
      name: Тип тест за алергени
      description: Указва типа алерген, който тестовият комплект е създаден да открива,
        като например свързан с храни или околната среда
    allergens:
      name: Алергени
      description: Посочва потенциалните алергени в продукти за здраве и красота,
        напр. линалол или лимонен
    allergy_friendly_features:
      name: Характеристики, които са подходящи при алергии
      description: Идентифицира дали даден продукт има подходящи при алергии характеристики,
        като например без латекс или устойчив на мухъл
    amino_acid_subtype:
      name: Подвид аминокиселина
      description: Указва основния вид или профил на аминокиселини, съдържащи се в
        добавката.
    amplifier/booster_suitable_location:
      name: Подходящо място за усилвател
      description: Указва най-добрите места за усилватели, като напр. в превозно средство
        или на голямо място
    amplifier_class:
      name: Клас усилвател
      description: Определя вида на усилвателя, като AB или D
    amplifier_configuration:
      name: Конфигурация на усилвател
      description: Указва настройката на усилватели за моторни превозни средства,
        като например двуканална или четириканална
    amputation_level:
      name: Ниво на ампутация
      description: Указва нивото на ампутация, за което е предназначен компресиращият
        чорап.
    analyte_measured:
      name: Измерен аналит
      description: Идентифицира биомаркерите, за които контролният разтвор осигурява
        калибриране.
    anamorphic_squeeze_ratio:
      name: Коефициент на анаморфно свиване
      description: Показва коефициента на хоризонтална компресия на анаморфен обектив,
        което позволява на потребителите да съчетаят обективи с желаната от тях мощност
        на декомпресия.
    anatomical_detail_displayed:
      name: Показани анатомични детайли
      description: Показва кои анатомични или меридианни характеристики са подчертани
        върху модела.
    anchor_type:
      name: Тип котва
      description: Определя котвата, използвана в оборудване за водни спортове с теглене,
        като например флюк или плугообразна
    anemometer_application:
      name: Приложение на анемометър
      description: Идентифицира предвидената употреба на анемометър, като например
        промишлена или метеорологична
    angles_supported:
      name: Поддържани ъгли
      description: 'Указва диапазона от ъгли, които продуктът може да акомодира, обикновено
        за електроника: например регулируем, 0° до 180°'
    angling_style:
      name: Риболовен стил
      description: Определя риболовната техника, за която е проектиран продуктът,
        като сърфкастинг или риболов с муха
    animal_feed_form:
      name: Форма на храната за животни
      description: Указва формата на храната за животни, като например течност или
        гранули
    animal_type:
      name: Животински вид
      description: Указва вида животно, за което е предназначен продуктът, като патици,
        елени или кучета
    answering_machine_type:
      name: Тип телефонен секретар
      description: Указва наличието и технологията на интегриран телефонен секретар
    antenna_connector_type:
      name: Тип конектор за антена
      description: Указва RF конектора, използван за прикрепване на външни антени
    antenna_rf_connector_type:
      name: Тип RF конектор на антената
      description: Идентифицира RF конектора, използван от антената.
    antenna_type:
      name: Тип антена
      description: Указва вида на антената за електронни устройства, напр. многопосочна,
        решетка
    anti_agin_skin_care_type:
      name: Тип грижа за кожата против стареене
      description: Класифицира вида артикул за грижа за кожата против стареене, напр.
        маска, тоник
    anti_perspirant_strength_level:
      name: Ниво на сила на антиперспиранта
      description: Обозначава класификацията на ефикасност на антиперспиранта (напр.
        клинична сила, спортна сила).
    antibody_class_tested:
      name: Тестван клас антитела
      description: Посочва имуноглобулина или биомаркера, който комплектът открива
        (напр. IgE, IgG4).
    antifreeze_type:
      name: Тип антифриз
      description: Указва типа антифриз за поддръжка на превозни средства, напр. концентрат,
        предварително разреден
    antique_car_design:
      name: Дизайн на антикварни автомобили
      description: Описва основния стил на дизайна на антикварен автомобил, като например
        T-bucket или Grand Tourer.
    antique_vehicle_era:
      name: Епоха на антикварното превозно средство
      description: Описва историческия период на антикварното превозно средство, като
        например месинговата епоха или епоха на винтидж автомобилите
    appliance_board_function:
      name: Функция на платката на уреда
      description: Указва функционалната роля на платката в уреда.
    appliance_unit_location:
      name: Местоположение на модула на уреда
      description: Показва физическата секция на уреда, за която е предназначена платката
        (например вътрешен или външен модул).
    application_area:
      name: Област на приложение
      description: Указва частта от тялото или областта, където се прилага продуктът,
        напр. устни, цяло тяло
    application_method:
      name: Начин на приложение
      description: Определя как се прилага или използва даден продукт, например гел,
        течност, спрей
    application_type:
      name: Тип нанасяне
      description: Показва дали третирането остава, или се изплаква и всеки специален
        режим на употреба
    applicator_format:
      name: Форма на апликатора
      description: Описва физическата форма или стил на апликатора за лосион или слънцезащитен
        крем
    applicator_material:
      name: Материал на апликатора
