        пера
    decorative_stamp_design:
      name: Дизайн на декоративен печат
      description: Описва дизайна на декоративни печати, напр. приказка или ретро/винтидж
    denomination:
      name: Деноминация
      description: Идентифицира номиналната стойност на колекционерски предмети като
        монети и марки, напр. 1000 долара, 1 цент
    dental_appliance_compatibility:
      name: Съвместимост с дентални уреди
      description: Посочва за кои дентални уреди или възстановителни работи пяната
        е безопасна или предназначена (напр. алайнери, брекети, фасети).
    dental_floss_format:
      name: Форма на конеца за зъби
      description: Идентифицира цялостната форма на продукта или стил на подаване
        на конеца
    dental_floss_shape:
      name: Форма на конец за зъби
      description: Идентифицира формата или стила на конеца за зъби, напр. стандартен
        или лента
    dental_floss_thickness_level:
      name: Ниво на дебелина на конеца за зъби
      description: Разграничава зъбния конец въз основа на нивото на дебелината, като
        тънък или обикновен
    dental_floss_type:
      name: Тип конец за зъби
      description: Идентифицира типа конец за зъби, като невосъчен или восъчен
    dental_mouthgard_recommended_use:
      name: Препоръчителна употреба на дентален протектор за уста
      description: Идентифицира предназначението на денталните протектори за уста,
        напр. намаляване на хъркането, ортодонтска защита
    dental_mouthguard_arch_coverage:
      name: Покритие на зъбната дъга от предпазителя за уста
      description: Посочва какви зъбни дъги предпазителят за уста е предназначен да
        покрие
    dental_mouthguard_certifications:
      name: Сертификати за дентален протектор за уста
      description: Показва сертификати за безопасност и качество на дентални протектори
        за уста, като например без BPA или сертифицирани за CE
    dental_paste_flavor:
      name: Вкус на денталната паста
      description: Идентифицира вкуса на денталната паста, например без вкус или с
        вкус на дъвка
    dental_repair_kit_certifications:
      name: Сертификати за комплекти за поправка на зъби
      description: Идентифицира сертификатите, които притежава комплектът за поправка
        на зъби, напр. одобрен от FDA или без BPA
    dental_water_jet_operation:
      name: Работа на зъбен душ
      description: Определя източника на захранване на зъбния душ, напр. със или без
        кабел
    dentistry_items_included:
      name: Включени дентални елементи
      description: Идентифицира денталните инструменти, включени в комплекта, напр.
        зъболекарско огледало или инструмент за отстраняване на плака
    denture_arch_coverage:
      name: Покритие на зъбната дъга от протезата
      description: Идентифицира каква зъбна дъга протезата (или винирите за закопчаване)
        е предназначена да покрие
    denture_base_color:
      name: Цвят на основата на зъбната протеза
      description: Определя нюанса на изкуствения венец в денталните протези, като
        розов или естествен венец
    denture_coverage:
      name: Покритие на зъбните протези
      description: Идентифицира степента на покритие на зъбната протеза, напр. пълно
        или частично
    denture_design:
      name: Дизайн на зъбните протези
      description: Описва вида на зъбната протеза, напр. гъвкава, имедиатна
    denture_retention_mechanism:
      name: Механизъм за задържане на протеза
      description: Посочва как протезата остава на място върху зъбите или венците.
    denture_teeth_color:
      name: Цвят на зъбите на зъбната протезата
      description: Определя нюанса на цвета на зъбите на зъбната протезата, като мръснобял
        или светложълт
    deployment_type:
      name: Тип на внедряване
      description: Описва как се внедрява AI софтуер, като например хибриден или базиран
        на облак
    desk_organizer_features:
      name: Функции на органайзер за бюро
      description: Описва специфичните функции на органайзера за бюро, като например
        регулируеми разделители или вградени отделения
    desk_size:
      name: Размер на бюрото
      description: Показва категорията на размера на бюрото, като малък (S) или голям
        (L)
    detailed_ingredients:
      name: Подробни съставки
      description: Изброява специфични компоненти, използвани в продукти за здраве
        и красота, напр. витамин C, пробиотици
    detectable_drugs:
      name: Наркотици, чието наличие може да бъде открито
      description: Указва видовете наркотици, които тестът може да идентифицира, напр.
        марихуана, опиати
    detection_technology:
      name: Технология за откриване
      description: Посочва научния принцип или биологичен маркер, който HIV тестът
        открива (напр. антитела, комбинация антиген/антитела, RNA PCR).
    detector_operation_mode:
      name: Режим на работа на детектора
      description: Описва как функционира детектор за безопасност, като взаимосвързан
        или самостоятелен
    detector_sensitivity:
      name: Чувствителност на детектора
      description: Описва регулируемостта на чувствителността на металотърсача, като
        регулируема или фиксирана
    detector_type:
      name: Тип детектор
      description: Уточнява начина за откриване, използван в устройствата за безопасност,
        напр. йонизационен оптичен, вземане на проби от въздух
    developer_strength:
      name: Сила на оксидант
      description: Посочва концентрацията на пероксид или обема на оксиданти или комплекти
        за постигане на желаното изсветляване
    developmental_features:
      name: Характеристики, свързани с развитие
      description: Подчертава ползите за развитие на даден продукт, напр. езиково
        развитие или емоционално и социално израстване
    device_interface:
      name: Интерфейс на устройството
      description: Указва метода на свързване между електронни устройства, напр. HDMI,
        USB
    device_technology:
      name: Технология на устройството
      description: Описва типа технология в хардуерните инструменти, като цифрова
        или аналогова
    dexterity_skills:
      name: Умения, свързани със сръчност
      description: Идентифицира специфичните умения, свързани със сръчност, необходими
        за игра, напр. балансиране или прецизност
    dial_color:
      name: Цвят на циферблата
      description: Указва цвета на циферблата на часовника, напр. златен или многоцветен
    dial_pattern:
      name: Модел на циферблата
      description: Описва дизайна или мотива върху циферблата на часовника, напр.
        точки или тай-дай
    dialing_method:
      name: Метод на набиране
      description: Определя механизма, който телефонът използва за въвеждане на числа.
    diaper_bag_additional_features:
      name: Допълнителни функции на чанта за пелени
      description: Посочва допълнителни функции в чантите за пелени, напр. включена
        подложка за повиване, държач за шише
    diaper_bag_material:
      name: Материал на чантата за пелени
      description: Указва вида на материала, от който е изработена чантата за пелени,
        напр. кожа или платно
    diaper_bag_style:
      name: Стил на чантата за пелени
      description: Описва дизайна или формата на чанта за пелени, напр. раница или
        за през тялото
    diaper_features:
      name: Характеристики на пелените
      description: Описва специални характеристики на пелените, напр. непропускливи
        или хипоалергенни
    diaper_kit_components:
      name: Компоненти на комплекта с пелени
      description: Посочва елементите, включени в комплект с пелени, като кърпички
        или подложка за смяна на пелени
    diaper_organizer_features:
      name: Функции на органайзер за пелени
      description: Подчертава уникалните характеристики на органайзерите за пелени,
        като множество отделения или водоустойчива подплата
    diaper_size:
      name: Размер на пелената
      description: Указва размера на пелените, напр за бебе или за малко дете
    diaper_type:
      name: Тип пелена
      description: Разграничава помощни средства при инконтиненция, като превръзки,
        гащички или пелени
    dice_shape:
      name: Форма на зарове
      description: Описва геометричната форма на зарове, като напр. куб (6 страни)
        или икосаедър (20 страни)
    dielectric_type:
      name: Тип диелектрик
      description: Определя диелектрика или изолационния материал, използван в кондензатори,
        напр. керамика или електролит
    dietary_preferences:
      name: Диетични предпочитания
      description: Помага за идентифициране на продукти, подходящи за специфични диети,
        напр. веган, без ядки
    dietary_supplements:
      name: Хранителни добавки
      description: Идентифицира добавените хранителни вещества в даден продукт, като
        калций или пробиотици
    dietary_use:
      name: Диетична употреба
      description: Класифицира продукти въз основа на диетични ползи, напр. изграждане
        на мускули, ниско съдържание на въглехидрати
    difficulty_level:
      name: Ниво на трудност
      description: Посочва нивото на сложност или предизвикателство на пъзел или игра,
        напр. например лесно или експертно
    diffuser_design:
      name: Дизайн на дифузер
      description: Описва структурата на дифузер за светкавица, като пръстен или купол
    digestive_supplement_type:
      name: Тип хранителна добавка за храносмилане
      description: Класифицира конкретния вид хранителна добавка за храносмилане (напр.
        пробиотик, ензими, фибри)
    digital_sound_processing:
      name: Цифрова обработка на звука
      description: Указва техниките за модифициране на звука в аудиокомпонентите,
        като забавяне или реверберация
    digitizer_surface_finish:
      name: Повърхностно покритие на дигитайзера
      description: Описва повърхностното покритие или покритието на стъклото на дигитайзера
    din_size:
      name: Размер на DIN
      description: Определя стандартизирания размер на отвора в таблото, в който се
        побира приемникът (напр. единичен DIN, двоен DIN).
    dinnerware_pieces_included:
      name: Включени части от прибори за хранене
      description: Определя компонентите на колекция от прибори за хранене, като чинии
        за вечеря или купа за сервиране
    direct_box_type:
      name: Тип директна кутия
      description: Указва верижната конфигурация на директната кутия (DI), която влияе
        върху изискванията за захранване, звуковия характер и предназначеното приложение.
    direction_detection_capability:
      name: Способност за откриване на посока
      description: Посочва дали радарът може да докладва посоката на обектите (например
        приближаващи, отдалечаващи се или и двете).
    dirt_separating_method:
      name: Метод за отделяне на мръсотия
      description: Описва техниката, използвана от прахосмукачка за отделяне на мръсотия,
        напр. циклонно филтриране
    discharge_type:
      name: Тип разтоварване
      description: Указва вида на разтоварване в самосвали, като странично разтоварване
        или прехвърляне
    disk_format_type:
      name: Тип формат на диска
      description: Идентифицира типа формат на диска за софтуерни продукти, като Blu-ray
        или CD
    dispenser_type:
      name: Тип дозатор
      description: Указва формата за дозиране на продукта, обикновено в продукти за
        здраве и красота, напр. пръчици, буркан
    dispensing_operation_type:
      name: Тип работа на дозатора
      description: Описва дали пастата за зъби се дозира ръчно, полуавтоматично, или
        автоматично
    display_board_features:
      name: Характеристики на таблото
      description: Описва уникални характеристики на таблата, като самозалепваща се
        задна част или здрави
    display_color_mode:
      name: Цветен режим на дисплея
      description: Указва цвета на дисплея на продукта, напр. цветен, черно-бял
    display_features:
      name: Характеристики на дисплея
      description: Описва типа дисплей на продукт, като сензорен екран или бутони
        за управление
    display_interface:
      name: Интерфейс на дисплея
      description: Определя интерфейса за видео или данни, използван от екранния модул.
    display_mode:
      name: Режим на показване
      description: Описва метода на показване на продукт, като цифров или аналогов
    display_recommended_use:
      name: Показване на препоръчителната употреба
      description: Предлага идеалното използване за дисплеи на търговски изложения
        въз основа на формат и дизайн, напр за реклама или образование
    display_resolution:
      name: Разделителна способност на дисплея
      description: Определя разделителна способност на цифров дисплей, напр. 1280
        x 1024, пълна висока детайлност
    display_sign_design:
      name: Дизайн на указващ знак
      description: Идентифицира типа информация, която знакът изразява, напр. тоалетна,
        разпродажба или изход
    display_technology:
      name: Технология на дисплея
      description: Определя типа екранна технология, използвана в даден продукт, напр.
        LED, електронно мастило
    disposable/reusable_bag_features:
      name: Функции на чантата за еднократна/многократна употреба
      description: Описва основните характеристики на торбичките за отпадъци от домашни
        любимци, като биоразградими или непропускливи
    disposable/reusable_item_material:
      name: Материал на предмет за еднократна/многократна употреба
      description: Идентифицира дали материалът на продукта е за еднократна, или многократна
        употреба, напр. биоразградими материали, хартия
    disposable_bag_features:
      name: Характеристики на торбата за еднократна употреба
      description: Подчертава уникалните характеристики на пълнителите за кошове за
        пелени, като контрол на миризмата или с аромат
    disposable_bag_material:
      name: Материал на торбата за еднократна употреба
      description: Указва състава на торбичките за еднократна употреба, напр. пластмаса,
        биоразградими материали
    disposable_glove_features:
      name: Характеристики на ръкавици за еднократна употреба
      description: Идентифицира специални характеристики на ръкавици за еднократна
        употреба, напр. дълъг маншет или без пудра
    disposable_tableware_material:
      name: Материал на съдове за еднократна употреба
      description: Идентифицира материала, използван в съдовете за еднократна употреба,
        като пластмаса или хартия
    dive_computer_items_included:
      name: Включени елементи за компютър за гмуркане
      description: Указва какви елементи са включени в компютъра за гмуркане, като
        например предавател или каишка
    diving/snorkeling_equipment_included:
      name: Включено оборудване за гмуркане/шнорхелинг
      description: Указва включените аксесоари за гмуркане/шнорхелинг, като неопренов
        костюм или шнорхел
    diving_regulator_style:
      name: Стил на водолазния регулатор
      description: Указва стила на водолазния регулатор, като небалансирано бутало
        или диафрагма
    dj_equipment_features:
      name: Характеристики на DJ оборудване
      description: Указва уникалните характеристики на DJ оборудването, като MIDI
        контрол или самостоятелна работа
    dj_software_compatibility:
      name: Съвместимост на DJ софтуера
      description: Идентифицира DJ софтуера, с който продуктът е съвместим, напр.
        Rekordbox, Serato DJ
    docking_compatibility:
      name: Съвместимост с докинг станцията
      description: Показва дали конзолата може да бъде свързана с докинг станция,
        или заредена без премахване на калъфа.
    docsis_standard:
      name: DOCSIS стандарт
      description: Указва версията на DOCSIS, поддържана от кабелните модеми.
    dog_age_group:
      name: Възрастова група на кучета
      description: Помага за сортиране на кучешки принадлежности според жизнения етап
        на кучето, напр. кученце, възрастно куче
    dog_diaper_size:
      name: Размер на пелената за куче
      description: Определя размера на пелените за кучета, напр. изключително голям
        (XL), малък (S)
    dog_diaper_type:
      name: Тип пелена за куче
      description: Идентифицира конкретния тип пелена за кучета, напр. за възрастни
        женски, за кученца
    dog_house_features:
      name: Характеристики на къщи за кучета
      description: Описва специални характеристики на къщи за кучета, като регулируеми
        размери или UV защита
    dog_kennel/run_features:
      name: Функции за кучешка колиба/клетка за бягане
      description: Подчертава уникалните характеристики на кучешка колиба/клетка за
        бягане, например устойчиво на атмосферни влияния, преносимо
    dog_kennel_features:
      name: Функции за кучешка колиба
      description: Описва специфични характеристики на кучешка колиба, като например
        възможност за заключване или сгъване
    dog_pen_features:
      name: Характеристики на кошара за кучета
      description: Описва специалните характеристики на кошарите за кучета, като UV
        защита или устойчивост на атмосферни влияния
    dog_toy_type:
      name: Тип играчка за куче
      description: Класифицира типа кучешка играчка, като плюшена или издаваща писклив
        звук
    doll/playset_features:
      name: Характеристики на кукла/комплект за игра
      description: Описва специални характеристики на кукли или комплекти за игра,
        като шарнирни стави или такива за колекциониране
    doll_features:
      name: Характеристики на куклата
      description: Описва специалните характеристики на куклите, като шарнирни стави
        или реалистични детайли
    doll_type:
      name: Тип кукла
      description: Идентифицира категорията на кукла, като бебе или колекционерска
    door/frame_application:
      name: Приложение на врата/каса
      description: Идентифицира къде е предназначена да се използва касата за вратата,
        напр. вътрешна, външна
    door_application:
      name: Приложение за врата
      description: Указва приложението на врати или панти, като вътрешни или външни
    door_closer_application:
      name: Приложение на затварянето на вратата
      description: Указва приложението на затварянето на вратата, като вътрешно или
        външно
    door_closer_design:
      name: Дизайн на затваряне на врати
      description: Идентифицира стила на дизайна за затваряне на врати, като подов
        или скрит над главата
    door_color:
      name: Цвят на вратата
      description: Указва цвета на вратата на продукта, като червено или черно
    door_frame_finish:
      name: Покритие на касата на вратата
      description: Указва покритието на повърхността на касата на вратата, като предварително
        завършено или готово за довършване
    door_glass_finish:
      name: Стъклено покритие на вратата
      description: Указва типа стъклено покритие на вратите, като например оловно
        или шарено
    door_insulation:
      name: Изолация на вратата
      description: Определя състоянието на изолация на вратите, напр. изолирани, неизолирани
    door_knob_function:
      name: Функция на топката на вратата
      description: Указва функцията на топките и дръжките на вратите, напр. разрешаване
        или предотвратяване на влизане
    door_mat_base_color:
      name: Основен цвят на изтривалката
      description: Идентифицира основния цвят на основата на изтривалката, като бежово
        или черно
    door_mat_base_material:
      name: Материал за основата на изтривалка
      description: Указва материала на долната част на изтривалка, като юта или латекс
    door_mat_base_pattern:
      name: Модел на основата на изтривалка
      description: Описва дизайна или мотива върху основата на изтривалка, като например
        флорални или геометрични
    door_mat_surface_material:
      name: Материал на повърхността на изтривалката
      description: Указва материала на повърхността на изтривалка, като морска трева
        или гума
    door_material:
      name: Материал на вратата
      description: Указва конструктивния материал на врата, като например закалено
        стъкло или плоскости от дървесни влакна със средна плътност (MDF)
    door_pattern:
      name: Модел на вратата
      description: Описва дизайна или мотива на врата, обикновено за бюфети и шкафове
        за трапезария
    door_stop_placement:
      name: Разположение на ограничителя на вратата
      description: Идентифицира къде е монтиран ограничител на вратата, например на
        пода или стената
    door_stopper_design:
      name: Дизайн на стопер за врата
      description: Определя стила на стопера за врата, като например с форма на кука
        или клин
    door_suitable_location:
      name: Подходящо място за врата
      description: Идентифицира идеалното разположение за врата, като предна или за
        вътрешен двор
    door_surface_finish:
      name: Покритие на повърхността на вратата
      description: Посочва покритието на повърхността на домашни врати, като остъклени
        или неглазирани
    door_type:
      name: Тип врата
      description: Определя механизма за отваряне на вратите, например на панти, плъзгащи
        се
    double_stroller_configuration:
      name: Конфигурация на двойна количка
      description: Определя разположението на местата за сядане в двойни колички,
        напр. едно зад друго или едно до друго
    download_format:
      name: Формат за изтегляне
      description: Указва файловия формат за изтегляне на цифрова музика, като MP3
        или WAV
    downstream_port_types:
      name: Типове изходни портове
      description: Посочва видовете изходни портове, които хъбът предлага за свързване
        на периферни устройства (напр. USB-A, USB-C, HDMI, Ethernet)
    drain_location:
      name: Местоположение на отводнителен отвор
      description: Указва разположението на отводнителния отвор във вани или душкабини,
        като например в центъра или вляво
    drainage_feature:
      name: Дренажна характеристика
      description: Посочва всеки дизайн, който позволява дрениране на течности или
        изсушаване вътре в кутията
    drawing/painting_kit_items_included:
      name: Включени елементи от комплекта за рисуване
      description: Идентифицира предмети в комплект за изкуство или ръчна изработка,
        напр. блокче за оцветяване, чаша за рисуване
    dress_form_features:
      name: Характеристики на манекен за дрехи
      description: Подчертава ключови характеристики на манекена за дрехи, като повърхност
        с възможност за поставяне на карфици или въртяща се основа
    dress_occasion:
      name: Повод за роклята
      description: Посочва предвидения повод за рокля, напр. за празник, за всеки
        ден
    dress_style:
      name: Стил на роклята
      description: Идентифицира дизайна на рокля, напр. с прихлупване или имперска
        талия
    drill_features:
      name: Характеристики на бормашината
      description: Идентифицира специални характеристики на бормашина, като регулируема
        скорост или вградено осветление
    drilling_method:
      name: Метод на пробиване
      description: Идентифицира техниката, използвана в сондажните машини, като ротационно
        или ударно сондиране
    drilling_rig_orientation:
      name: Ориентация на сондажната кула
      description: Идентифицира посоката на сондиране от сондажна кула, като хоризонтална
        или вертикална
    drinkware_material:
      name: Материал за съдове за напитки
      description: Определя материала на съдовете за напитки, като стъкло или пластмаса
    drinkware_pieces_included:
      name: Включени части за съдове за напитки
      description: Идентифицира разнообразието от компоненти за съдове за напитки,
        включени в комплект, като кана или чаши за вино
    drinkware_shape:
      name: Форма на съдове за напитки
      description: Определя контура или силуета на съд за напитки, например извит
        или изтънен
    drive_form_factor:
      name: Типоразмер на диска
      description: Определя класа на височината или класа на размера на механизма
        на диска (напр. пълна височина, половин височина, тънък).
    drive_size:
      name: Размер на захвата
      description: Описва размера на захвата на гнездови и динамометрични ключове,
        напр. 1 инч
    drive_type:
      name: Тип задвижване
      description: Идентифицира типа на задвижващата система в превозни средства или
        тежки машини, като 2WD или 4WD
    driver_configuration:
      name: Конфигурация на драйвера
      description: Определя броя на отделните говорители в системата на високоговорителя
        (напр. двупосочно, трипосочно)
    driver_technology:
      name: Технология на драйвера
      description: Указва типа преобразувател, използван за произвеждане на звук (например
        динамичен, балансирана арматура, планарен магнитен, хибриден)
    drone_board_function:
      name: Функция на платката на дрона
      description: Описва основната цел на платката в системата на дрона
    drone_features:
      name: Характеристики на дрон
      description: Указва различните функционални и дизайнерски характеристики, налични
        в дрон, като например GPS навигация или избягване на препятствия
    drum_configuration:
      name: Конфигурация на барабана
      description: Използва се за указване на настройката на комплект барабани, като
        например 7 части или само самият корпус
    drum_hardware_adjustability:
      name: Настройка на железните части на барабаните
      description: Посочва регулируемите характеристики на аксесоарите за барабани
        и перкусии, напр. регулируем ъгъл на удара
    drum_hardware_material:
      name: Материал на железните части на барабаните
      description: Идентифицира материала, използван в железните части на барабаните,
        като стомана или алуминий
    dry/wet_cleaning:
      name: Сухо/мокро почистване
      description: Указва дали продуктите са подходящи за сухо, или мокро почистване
    dry_bean_variety:
      name: Разновидност на сух боб
      description: Идентифицира разновидността на използвания сух боб, напр. нахут,
        черен боб
    dryer_features:
      name: Характеристики на сушилнята
      description: Определя уникални характеристики на сушилня за пране, като самопочистваща
        се или с инверторна технология
    dryer_technology:
      name: Технология на машината за изсушаване
      description: Уточнява технологията на сушене в ОВК системи, напр. десикант,
        охлаждане
    drying_method:
      name: Метод на изсушаване
      description: Посочва как устройството суши четките за зъби след стерилизация,
        ако е приложимо.
    drying_speed:
      name: Скорост на сушене
      description: Определя скоростта, с която даден продукт изсъхва или втвърдява,
        например бързосъхнещо или нормално
    dsl_standard_compatibility:
      name: Съвместимост с DSL стандарт
      description: Идентифицира кои DSL стандарти поддържа даден филтър или аксесоар,
        за да осигури правилно шумопотискане и качество на връзката.
    duct_design:
      name: Чертеж на каналите
      description: Идентифицира формата на въздуховодите в ОВК системите, напр. твърди,
        гъвкави
    duct_shape:
      name: Форма на канала
      description: Описва формата на въздуховодите в ОВК системите, като кръгли или
        плоски
    duplex_component_type:
      name: Тип компонент на дуплекса
      description: Определя специфичната форма на доставената дуплексна част (например
        сглобка, тава, зъбно колело)
    duplexer_installation_type:
      name: Тип инсталация на дуплексера
      description: Изяснява как дуплексерът се прикрепя към принтера (например вътрешен
        слот, външно задно прикрепване).
    duplexing_technology:
      name: Технология за двустранен печат
      description: Указва дали даден принтер поддържа двустранен печат, напр. не се
        поддържа, автоматичен двустранен печат
    duplication_operation_mode:
      name: Режим на работа при дублиране
      description: Показва дали дубликаторът функционира независимо, изисква връзка
        към компютър, или поддържа и двата режима
    durability_features:
      name: Характеристики, свързани с издръжливост
      description: Подчертава способността на продукта да издържа на различни условия,
        напр. устойчив на ръжда, удар
    dust_container_type:
      name: Тип контейнер за прах
      description: Определя типа система за събиране на прах в прахосмукачки и уреди,
        напр. без торба, торба за прах
    dust_mask_type:
      name: Тип противопрахова маска
      description: Указва типоразмера на защитните противопрахови маски, напр. сгъваема
        или плоска
    dvi_connection_type:
      name: Тип DVI връзка
      description: Идентифицира специфичния DVI конектор и формат на връзката, който
        се поддържа (напр. DVI-D еднолинков, DVI-I двулинков, Mini-DVI).
    dye_form:
      name: Форма на багрилото
      description: Описва физическото състояние на занаятчийски багрила, напр. гел
        или прах
    dynamic_level:
      name: Динамично ниво
      description: Категоризира топки за ракетбол и скуош въз основа на скорост и
        отскок, напр. зелена точка, червена точка
    dynamics_processing_function:
      name: Функция за обработка на динамиката
      description: Идентифицира основните задачи за динамика, които устройството изпълнява
        (например компресор, лимитер, шумов гейт, деесер)
    e_book_formats_supported:
      name: Поддържани формати за електронни книги
      description: Идентифицира диапазона от формати на електронни книги, съвместими
        с устройството, напр. PDF или EPUB
    e_book_reader_part_location:
      name: Местоположение на частта на четеца за електронни книги
      description: Определя къде на устройството е инсталирана или разположена частта.
    e_cigarette/vaporizer_style:
      name: Стил на електронна цигара/изпарител
      description: Класифицира електронните цигари и изпарителите по техния типоразмер,
        напр. за еднократна употреба, писалка
    e_liquid_flavor:
      name: Вкус на никотиновите течности
      description: Посочва вкуса на никотиновата течност за изпарители и електронни
        цигари, напр. кафе, ягода
    e_liquid_variety:
      name: Разновидност на никотиновите течности
      description: Разграничава различни опции за никотиновите течности, напр. шортфил,
        никотинов шот
    e_reader_display_technology:
      name: Технология на дисплея на електронния четец
      description: Идентифицира типа технология на екрана, използвана в електронните
        четци, напр. LCD или електронно мастило
    ear_care_application_method:
      name: Начин на приложение на грижа за ушите
      description: Указва метода на приложение за продукти за грижа за ушите, напр.
        накрайник или капкомер
    ear_dryer_technology:
      name: Технология на сушилнята за уши
      description: Идентифицира основният механизъм за сушене, използван от продукта.
    ear_orientation:
      name: Ориентация на ухото
      description: Указва дали слушалката е проектирана за лявото ухо, дясното ухо,
        или може да се носи на което и да е.
    ear_pick_tip_style:
      name: Стил на върха на ушната клечка
      description: Определя формата или дизайна на работния връх, който премахва ушната
        кал
    ear_side:
      name: Страна на ухото
      description: Посочва дали апаратът е предназначен за лявото ухо, дясното ухо,
        или за употреба като двустранна двойка
    ear_tip_size:
      name: Размер на накрайника за уши
      description: Предоставя общия размерен етикет, обикновено използван за накрайници
        за вътрешно ухо, когато точните размери в милиметри не са предоставени
    ear_tip_style:
      name: Стил на накрайника за уши
      description: Определя геометричната форма на накрайника за уши, която влияе
        на прилягането и акустичното уплътнение
    earphone_features:
      name: Характеристики на слушалките
      description: Подчертава уникалните характеристики на слушалките, напр. вграден
        микрофон или контрол на силата на звука
    earplug_cord_style:
      name: Стил на шнура на тапите за уши
      description: Показва дали тапите за уши са свързани с шнур, който помага за
        предотвратяване на загуба и улеснява премахването
    earplug_shape:
      name: Форма на тапите за уши
      description: Описва физическият профил на тапата за уши, влияещ върху комфорта
        и прилягането в различни ушни канали
    earplug_type:
      name: Тип тапи за уши
      description: Класифицира конструкционния стил на тапи за уши от диспенсер (напр.
        от пяна, формовани, филтрирани)
    earplug_use:
      name: Използване на тапа за уши
      description: Определя конкретната дейност или цел на тапите за уши, напр. плуване
        или сън
    earring_design:
      name: Дизайн на обеца
      description: Описва стила или структурата на обеци, като кръгли или на щифт
    edge_style:
      name: Стил на ръба
      description: Указва формата на ръбовете на елементи като плотове, напр. заоблени,
        остри
    edge_type:
      name: Тип ръб
      description: Идентифицира стила на ръбовете на инструменти или прибори, като
        микроназъбени или назъбени
    education_level:
      name: Образователно ниво
      description: Указва образователния етап, за който е създаден софтуерът, като
        например начално училище или висше учебно заведение
    effects_processor_form_factor:
      name: Типоразмер на процесора за ефекти
      description: Описва физическия формат или формат на доставка на процесора
    egg_decorating_items_included:
      name: Включени елементи за украса на яйца
      description: Указва аксесоарите, предоставени в комплектите за декориране на
        яйца, напр. таблетки за боядисване, поставка за яйца
    egg_turning:
      name: Обръщане на яйца
      description: Описва метода за обръщане на яйца в инкубатори, напр. автоматичен
        или ръчен
    electric_scooter_motor_type:
      name: Тип двигател за електрически скутер
      description: Указва типа и конфигурацията на двигатели за скутери, като напр.
        четков и безчетков двигател
    electrode_connector_type:
      name: Тип конектор за електрод
      description: Описва физическия интерфейс, използван за прикрепване на електроди
        или подложки
    electronic_drum_components:
      name: Компоненти за електронни барабани
      description: Указва елементите на електронен комплект барабани, като барабанен
        модул или барабанни подложки
    electronic_game_genre:
      name: Жанр електронни игри
      description: Идентифицира категорията на електронна игра, като например фитнес
        или пъзел
    electrotherapy_modality:
      name: Модалност на електротерапията
      description: Посочва видовете стимулационни технологии, които устройството поддържа
        (напр. TENS, EMS, IFC).
    embellishment/trim_material:
      name: Материал за украса/гарниране
      description: Идентифицира материала, използван за декоративни детайли или покрития,
        като пайети или перли
    embellishments:
      name: Декорации
      description: Идентифицира добавени декоративни елементи върху продукт, като
        пайети или копчета
    embossing_project_type:
      name: Тип проект за ембосинг
      description: Идентифицира типа проект за ембосинг, като изработка на скрапбукинг
        или на картички
    embouchure_hole_shape:
      name: Форма на отвора на амбушура
      description: Описва формата на отвора на главата на флейтата, като кръгла или
        овална
    emergency/safety_sign_design:
      name: Дизайн на знаци за аварии/безопасност
      description: Идентифицира типа съобщение за безопасност или авария върху знак,
        напр. пожарен изход или куче пазач
    emergency_items_included:
      name: Включени аварийни предмети
      description: Посочва елементи, включени в аварийните комплекти, напр. радио
        или батерии
    enclosure_type:
      name: Тип корпус
      description: Указва вида на корпуса или капака за 3D принтери, като отворена
        рамка или корпус „направи си сам“
    end_design:
      name: Дизайн на краищата
      description: Определя броя на функционалните краища и дали са заменяеми, или
        взаимозаменяеми
    enema_device_type:
      name: Тип устройство за клизма
      description: Класифицира основния дизайн или системата за подаване на продукта
    enema_nozzle_type:
      name: Тип накрайник за клизма
      description: Определя стила или материала на накрайника или върха, доставен
        с комплекта (напр. тънък връх, педиатричен връх, накрайник от неръждаема стомана)
    energy_efficiency_class:
      name: Клас на енергийна ефективност
      description: Определя степента на енергийна ефективност на продукт, напр. A+++
    energy_efficiency_class_hdr:
      name: Клас на енергийна ефективност (HDR)
      description: Указва енергийната ефективност на устройства, които поддържат HDR,
        обикновено телевизори, например A+++
    energy_efficiency_class_sdr:
      name: Клас на енергийна ефективност (SDR)
      description: Указва енергийната ефективност на устройства, които поддържат SDR,
        обикновено телевизори, например A+++
    engine_design:
      name: Дизайн на двигателя
      description: Описва конфигурацията на двигателя на превозното средство, напр.
        2-тактов
    engine_purpose:
      name: Предназначение на двигателя
      description: Идентифицира предвидената употреба на малък двигател, като косачка
        за трева или резачка
    engine_type:
      name: Тип двигател
      description: Идентифицира вида двигател в превозно средство или част, напр.
        електрически или дизелов
    engraving:
      name: Гравиране
      description: Посочва типа гравиране върху продукт, като персонализиран текст
        или гравиране на лого
    entry_orientation:
      name: Ориентация на подаването
      description: Описва посоката, в която монетите се подават в механизма (напр.
        отпред, отгоре, отстрани, отдолу).
    envelope_features:
      name: Характеристики на плика
      description: Описва специалните характеристики на пликовете, като например затваряне
        със закопчалка или с хартиен капак
    envelope_seal_design:
      name: Дизайн на печат на плик
      description: Описва естетиката или стила на печатите за пликове, като например
        цветя или монограм
    equalizer_type:
      name: Тип еквалайзер
      description: Класифицира топологията на еквализация или стила на обработка,
        предоставен от устройството
    equipment_operation:
      name: Работа на оборудването
      description: Описва как работи дадена част от медицинско оборудване, като ръчно
        или захранвано
    era:
      name: Ера
      description: Използва се за категоризиране на колекционерски предмети или антики
        според техния период от време, напр. Дивия запад или Втората световна война
    error_correction_type:
      name: Тип корекция на грешки
      description: Показва дали модулът за памет включва възможност за коригиране
        на грешки и ако да, специфичната технология за коригиране или стил на буфериране,
        който се използва
    esrb_rating:
      name: Класификация от ESRB
      description: Идентифицира възрастовата уместност на видеоигрите, като E (за
        всички) или T (тийнейджъри)
    ethernet_cable_category:
      name: Категория на Ethernet кабела
      description: Показва TIA/EIA категорийната оценка на усукана двойка Ethernet
        кабели, определяща честотната лента и производителността
    ethernet_lan_interface_type:
      name: Тип интерфейс на LAN за Ethernet
      description: Указва вида на Ethernet връзката, която продуктът поддържа, като
        LAN или бърза
    ev_battery_features:
      name: Характеристики на батерията за ЕПС
      description: Подчертава характеристиките на батериите за ЕПС, като дълъг живот
        на цикъла или интелигентна система за управление на батерията
    ev_battery_type:
      name: Вид на батерията за ЕПС
      description: Идентифицира типа батерия, използвана в електрически превозни средства,
        като литиевойонна или оловнокиселинна
    ev_connector/adapter_type:
      name: Тип конектор/адаптер за ЕПС
      description: Идентифицира типа конектор или адаптер за електрически превозни
        средства, като CCS или Tesla
    ev_conversion_kit_components:
      name: Компоненти на комплект за преобразуване за ЕПС
      description: Идентифицира частите, включени в комплект за преобразуване за ЕПС,
        напр. двигател или батерия
    evaporation_technology:
      name: Технология на изпаряване
      description: Определя системата за изпаряване в устройствата за климатичен контрол,
        като естествено или ултразвуково
    event_type:
      name: Тип събитие
      description: Класифицира естеството на събитие, напр. концерт, семинар или фестивал
    exercise_equipment_included:
      name: Включено оборудване за упражнения
      description: Идентифицира конкретните елементи за упражнения, включени в комплект,
        като напр. постелка за йога или дъмбели
    exercise_equipment_material:
      name: Материал на оборудването за упражнения
      description: Идентифицира основния материал, използван във фитнес оборудването,
        напр. стомана или гума
    exercise_machine_board_function:
      name: Функция на платката на фитнес уреда
      description: Описва основната функция или местоположение на платката в уреда
        (например управление на двигателя, дисплей)
    exercise_machine_features:
      name: Характеристики на уреда за упражнения
      description: Описва специалните характеристики на оборудването за упражнения,
        като регулируема скорост или вграден дисплей
    exercise_mat_material:
      name: Материал на постелката за упражнения
      description: Указва вида на материала, използван в постелките за упражнения,
        като PVC или корк
    exfoliating_agent_type:
      name: Тип ексфолиращ агент
      description: Идентифицира основният абразивен или химичен ексфолиант, който
        се използва
    exfoliation_level:
      name: Ниво на ексфолиация
      description: Показва колко нежно или силно е ексфолиращото действие на гъбата
    exfoliation_method:
      name: Метод на ексфолиация
      description: Показва дали и как почистващото средство ексфолира кожата (напр.
        физически, химически, ензимно)
    expansion_slots:
      name: Слотове за допълнения
      description: Указва слотове за добавяне на хардуер в компютри или сървъри, напр.
        PCIe, M.2
    exposure_control:
      name: Контрол на експонацията
      description: Определя метода за регулиране на количеството светлина в снимка,
        напр. приоритет на затвора, приоритет на блендата
    extended_saxophone_range:
      name: Разширен диапазон на саксофона
      description: Указва разширения нотен диапазон на саксофона, като висок ключ
        F# или нисък ключ A
    external_antenna_connector_type:
      name: Тип конектор за външна антена
      description: Определя физическия конектор, използван за прикрепване на външни
        антени
    external_defibrillator_features:
      name: Характеристики на външен дефибрилатор
      description: Подчертава ключови характеристики на медицинските дефибрилатори,
        като педиатрична функция или ЕКГ на екрана
    extinguisher_rating:
      name: Оценка на пожарогасителя
      description: Показва оценката на пожарогасителите, напр. клас A, клас B
    extinguishing_agent_type:
      name: Вид на пожарогасителния агент
      description: Указва вида на пожарогасителното вещество в продуктите за пожарна
        безопасност, напр. вода или пяна
    extraction_method:
      name: Метод на екстракция
      description: Идентифицира техниката, използвана за извличане на канабиноиди
        от коноп
    extraction_technology:
      name: Технология за екстракция
      description: Описва основния механизъм, който продуктът използва за извличане
        на замърсявания
    extraction_type:
      name: Тип екстракция
      description: Определя метода за отстраняване на въздуха в абсорбатори, като
        безканални или конвертируеми
    extractor_items_included:
      name: Включени екстрактори
      description: Изброява различните екстрактори или аксесоари, включени в комплекта
    extractor_tip_style:
      name: Стил на върха на екстрактора
      description: Определя дизайна на върха на инструменти за екстракция, напр. лопатка,
        игла
    eye_care_applicator_type:
      name: Тип апликатор за грижа за очите
      description: Определя стила на вграден апликатор или накрайник на дозатор, предоставен
        с продукта за третиране на очите
    eye_condition_treated:
      name: Лекувано очно състояние
      description: Показва основния очен проблем, за чието облекчаване или лечение
        е формулиран продуктът
    eye_pillow_shape:
      name: Форма на възглавница за очи
      description: Определя физическата форма на възглавница за очи, като например
        очертана или правоъгълна
    eye_shadow_effect:
      name: Ефект на сенки за очи
      description: Определя визуалното въздействие на сенките за очи, напр. опушено,
        блясък
    eye_shadow_palette_size:
      name: Размер на палитрата със сенки за очи
      description: Класифицира продуктите по общите форми на палитри за бързо разглеждане.
    eyebrow_applicator_type:
      name: Тип апликатор за вежди
      description: Описва апликатора или върха, използван за нанасяне на продукта
        за вежди
    eyebrow_enhancer_color:
      name: Цвят на средствата за подчертаване на вежди
      description: Определя цвета на продуктите за подчертаване на веждите, като черно
        или светло русо
    eyebrow_stencil_shape:
      name: Форма на шаблона за вежди
      description: Описва основната форма на веждите или стил на веждата, която шаблонът
        е предназначен да създаде.
    eyelash_applicator_design:
      name: Дизайн на апликатори за мигли
      description: Определя стила на апликаторите за изкуствени мигли, напр. прави,
        извити
    eyelash_curl_type:
      name: Тип извитост на миглите
      description: Определя класификацията на извитостта (напр. C-къдрица, D-къдрица)
        на влакната на миглите.
    eyelash_curler_type:
      name: Тип извивачка за мигли
      description: Определя дизайна или механизма на извивачката за мигли
    eyelash_material:
      name: Материал на миглите
      description: Идентифицира вида на материала, използван за изкуствени мигли,
        като коприна или синтетика
    eyelash_remover_formulation:
      name: Формула на средството за премахване на мигли
      description: Идентифицира основния тип формула на средството за премахване
    eyelash_style:
      name: Стил на миглите
      description: Описва цялостният визуален ефект или дизайн на комплекта мигли
        (напр. естествен, котешко око, драматичен)
    eyelash_type:
      name: Тип мигли
      description: Определя вида на изкуствените мигли, напр. мигли на лентичка, удължаване
    eyepiece/adapter_material:
      name: Материал на окуляр/адаптер
      description: Идентифицира материала, използван в окулярите или адаптерите на
        микроскопа, като стъкло или метал
    eyewear_compatibility:
      name: Съвместимост с очила
      description: Показва типа очила, за които е предназначена лентата
    eyewear_frame_color:
      name: Цвят на рамката на очилата
      description: Идентифицира цвета на рамката на очилата, като черно или златно
    eyewear_frame_design:
      name: Дизайн на рамката на очила
      description: Описва стила на слънчевите очила, като тип „авиатор“ или „котешко
        око“
    eyewear_frame_material:
      name: Материал на рамката на очилата
      description: Указва вида на материала, използван за рамки за очила, като бамбук
        или въглеродни влакна
    eyewear_frame_pattern:
      name: Шарка на рамката на очила
      description: Идентифицира шарката върху рамките на очилата, например райе или
        каре
    eyewear_frame_shape:
      name: Форма на рамката на очила
      description: Описва формата на очилата, като кръгли или квадратни
    eyewear_hinge_type:
      name: Тип панта на очилата
      description: Описва механизма на пантата, използван на рамките, влияещ върху
        издръжливостта и гъвкавостта
    eyewear_lens_color:
      name: Цвят на лещата на очилата
      description: Идентифицира цвета на лещата на очилата, като прозрачен или оранжев
    eyewear_lens_material:
      name: Материал на лещите за очила
      description: Указва типа материал, използван за лещи за очила, например стъкло
        или пластмаса с висок индекс
    eyewear_lens_pattern:
      name: Модел на лещите за очила
      description: Описва дизайна или десена на стъклата за очила, като сърца или
        пейсли
    eyewear_strap_features:
      name: Характеристики на лентата за очила
      description: Подчертава забележителни функционални характеристики на лентата
        или верижката (напр. плаващи, отразяващи, с бързо освобождаване)
    eyewear_strap_or_chain_style:
      name: Стил на лентата или верижката за очила
      description: Определя основния стил на конструкция или типоразмера на лената
        или верижката за очила (напр. шнур, метална верижка неопренова лента)
    fabric:
      name: Плат
      description: Идентифицира типа плат, използван в даден продукт, например памук
        или деним
    fabric_structure:
      name: Структура на плата
      description: Показва структурния състав на плата, като тъкан или нетъкан
    face_area:
      name: Област на лицето
      description: Указва областта на лицето, към която е насочен продуктът за грижа
        за кожата, като например очи или шия
    face_powder_color:
      name: Цвят на пудра за лице
      description: Указва нюанса на пудрата за лице, като розово злато или наситено
        кафяво
    face_powder_type:
      name: Тип пудра за лице
      description: Идентифицира вида пудра за лице, като завършваща или насипна
    faceplate_design:
      name: Дизайн на панелите
      description: Идентифицира типа панел на електрониката на превозното средство,
        като разглобяем или фиксиран
    facial_cleansing_kit_items_included:
      name: Включени артикули в комплекта за почистване на лице
      description: Изброява специфичните продукти или инструменти, съдържащи се в
        комплекта за почистване на лице (напр. почистващо средство, тонер, серум,
        четка, несесер за пътуване)
    facial_steamer_features:
      name: Характеристики на уреда с пара за лице
      description: Изброява ключови вградени функционалности, които подобряват третирането
        с пара
    facility_sign_design:
      name: Дизайн на табела за съоръжение
      description: Описва конкретната зона или стая, за която е предназначен знакът,
        като кухня или офис
    fader_type:
      name: Тип фейдър
      description: Идентифицира физическия стил на канални фейдъри на миксера.
    false_eyelash_adhesive_formulation:
      name: Формула на лепилото за изкуствени мигли
      description: Определя основната химическа формула на лепилото
    false_nail_adhesive_type:
      name: Тип лепило за изкуствени нокти
      description: Идентифицира вида на опцията за лепило, предоставена или изисквана
        за ноктите (напр. лепило, лепенки, и двете, нито едното)
    false_nail_application_method:
      name: Метод за нанасяне на изкуствени нокти
      description: Идентифицира как се поставят изкуствени нокти, като например залепване
        или натискане
    fastener_finish:
      name: Завършек на закопчалка
      description: Описва покритието на повърхността на аксесоар от желязо, като месинг
        или хром
    fastener_material:
      name: Материал на закопчалката
      description: Указва вида на материала, използван в закопчалките, напр. месинг,
        неръждаема стомана
    fastener_type:
      name: Тип закопчалка
      description: Идентифицира вида на използвания механизъм за закопчаване, например
        магнитен
    fat_content:
      name: Съдържание на мазнини
      description: Определя количеството мазнини в хранителните продукти и напитките,
        напр. пълномаслено, нискомаслено
    faucet_thread:
      name: Резба за кран
      description: Указва вида на връзката на кран с резба, като двойна или женска
        резба
    features:
      name: Характеристики
      description: Описва допълнителни качества или характеристики на продукт, като
        например лек или сгъваем
    feed_system:
      name: Система за захранване
      description: Описва как хартията се подава в устройство, напр. автоматично или
        ръчно
    feet_type:
      name: Тип крачета
      description: Указва вида на крачетата на електронни аксесоари, обикновено стикове
        за селфи, напр. прибиращи се
    felt_tip_design:
      name: Дизайн на филцовия връх
      description: Описва дебелината на филцовия връх на химикала, като средна или
        фина
    feminine_sanitary_supply_features:
      name: Характеристики на дамските санитарни консумативи
      description: Описва специфични характеристики на дамските санитарни продукти,
        напр. дишащ дизайн, бърза абсорбция
    fencing_components:
      name: Компоненти за ограда
      description: Идентифицира части от оградна система, като релса или панел
    fertility_metrics_measured:
      name: Измервани показатели за плодовитост
      description: Изброява биологичните показатели или параметри, които продуктът
        предоставя на потребителя
    fiber_art_project_type:
      name: Тип проект за изкуство от влакна
      description: Категоризира художествените занаяти с влакна, като бродерия или
        макраме
    fiber_optic_mode:
      name: Режим на оптични влакна
      description: Указва дали даден оптичен аксесоар е предназначен за едномодови
        или многомодови оптични влакна.
    field_flatness:
      name: Плоскост на полето
      description: Показва плоскостта на полето в лещите на микроскопа, напр. суперплан,
        полуплан
    filament_type:
      name: Тип нишка
      description: Идентифицира типа нишка, използван при 3D печат, като смола или
        безопасно за храни
    file_format_type:
      name: Тип файлов формат
      description: Указва формата на дигиталните файлове, напр. GIF, PDF
    file_shape:
      name: Форма на пила
      description: Описва формата на пилите за крака, като контурна или овална
    filler_material:
      name: Материал на пълнежа
      description: Идентифицира вида на материала, използван за пълнеж на продукт,
        обикновено възглавници или възглавнички, например мемори пяна, пера
    filler_support:
      name: Опора на пълнежа
      description: Определя нивото на твърдост или стила на вътрешността на възглавницата,
        като например мека или мемори пяна
    filler_type:
      name: Тип запълващ кит
      description: Указва вида на запълващия кит, използван при поддръжката на автомобила,
        като фибростъкло или лек
    filling/padding_project_type:
      name: Тип проект за запълване/подплънка
      description: Уточнява предвидената употреба на материал за пълнеж или подплънка,
        напр. изработка на плюшени играчки
    film_application_method:
      name: Метод на нанасяне на фолиа
      description: Указва как се поставят фолиата за стъкла, напр. статично залепващо,
        самозалепващо се
    film_format:
      name: Формат на филма
      description: Указва вида на филма, използван във фотоапаратите, като 35 мм или
        Instax mini
    film_type:
      name: Тип филм
      description: Идентифицира размера и формата на филма, използван във фотоапаратите,
        като 35 мм или 120 мм
    filter_form_factor:
      name: Типоразмер на филтъра
      description: Описва физическия стил на филтърната единица за проверка на съвместимостта
        (например касета, вентилаторен филтър, капсула, диск, комплект филтри)
    filter_installation_type:
      name: Тип инсталация на филтъра
      description: Определя физическия стил и метод на инсталация на DSL филтъра
    filter_material:
      name: Материал на филтъра
      description: Указва вида на материала, използван във филтрите, обикновено за
        кафе, например хартия, коноп
    filter_slope:
      name: Стръмност на филтъра
      description: Указва скоростта на затихване на филтрите на кросовъра, изразена
        в dB на октава
    filter_topology:
      name: Топология на филтъра
      description: Указва семейството на отговора на филтъра, което определя формата
        на честотния отговор и фазовите характеристики
    filter_type:
      name: Тип филтър
      description: Разграничава между филтри, типични за аквариуми, например механични,
        химически
    filtering_modes:
      name: Режими на филтриране
      description: Определя работните режими на радар или детектори за скорост, напр.
        режим на магистрала, блокиране на GPS
    filtration_class:
      name: Клас на филтриране
      description: Класифицира нивото на филтриране на аксесоарите за респиратори,
        като FFP1 или B3
    filtration_technology:
      name: Технология на филтриране
      description: Идентифицира технологията или етапа, използван от филтъра за премахване
        на въздушни замърсители, произведени по време на печат
    fin_material:
      name: Материал за плавници
      description: Указва вида на материала в плавниците за гмуркане или гмуркане
        с шнорхел, като пластмаса или гума
    fin_pocket_type:
      name: Тип пантоф на плавника
      description: Уточнява дизайна на пантофа на плавниците за гмуркане, например
        цяло стъпало, отворена пета
    fin_profile:
      name: Профил на перката
      description: Класифицира дъската за сърф въз основа на конфигурацията на перките,
        напр. пет перки, двойна
    fingerboard_color:
      name: Цвят на грифа
      description: Определя цвета на грифа на струнни инструменти, напр. сребрист,
        бял
    fingerboard_material:
      name: Материал на грифа
      description: Указва вида на материала, използван за грифа на китари, като абаносово
        дърво или синтетика
    fingerboard_pattern:
      name: Модел на грифа
      description: Описва дизайна или мотива върху грифа на китара, напр. флорален
        или геометричен
    fingerprint_capture_method:
      name: Метод за заснемане на пръстови отпечатъци
      description: Определя вида на използвания метод за разпознаване на пръстови
        отпечатъци, като капацитивен или оптичен
    finial_shape:
      name: Форма на завършващата част
      description: Определя дизайна или формата на декоративна завършваща част, като
        жълъд или топка
    finish:
      name: Завършек
      description: Описва качеството на повърхността на продукт, като сатен или мат
    fire_extinguisher_items_included:
      name: Включени са елементи за пожарогасители
      description: Указва допълнителните елементи, включени в пожарогасителя, като
        изпускателен маркуч или монтажна скоба
    firewire_standard:
      name: FireWire стандарт
      description: Идентифицира IEEE 1394 спецификацията, която кабелът поддържа,
        което определя максималната скорост и съвместимостта с устройства
    firmness:
      name: Твърдост
      description: Указва нивото на твърдост на предмети като мебели или матраци,
        напр. изключително меки, твърди
    first_aid_container_type:
      name: Тип контейнер за първа помощ
      description: Определя основния стил на контейнера или кутията, доставена с комплекта
    first_aid_kit_compliance_standard:
      name: Стандарт за спазване на изискванията за комплекта за първа помощ
      description: Указва всеки формален стандарт или регламент, на която комплектът
        отговаря
    first_aid_kit_components:
      name: Компоненти на комплекта за първа помощ
      description: Подробности за съдържанието на комплектите за първа помощ, например
        бинтове, ножици
    first_aid_kit_usage:
      name: Използване на комплект за първа помощ
      description: Указва предназначението на комплектите за първа помощ, напр. пътуване,
        спорт
    first_steps/crawlers_style:
      name: Стил за обувки за първи стъпки/лазене
      description: Указва типа обувки за бебета, които се учат да ходят или пълзят,
        напр. обувки за прохождане, обувки с мека подметка
    fish_type:
      name: Вид риба
      description: Помага за намиране на съответствие спрямо специфични видове риби,
        като например тропическа или студеноводна
    fishing_rod_action:
      name: Действие на въдицата
      description: Указва бързината на въдица, като бавна или изключително бърза
    fishing_rod_power:
      name: Мощност на въдицата
      description: Указва мощността на въдицата, напр. много лека, изключително тежка
    fishing_wire_material:
      name: Материал за кордата
      description: Идентифицира състава на кордата, като найлон или неръждаема стомана
    fit:
      name: Прилягане
      description: Описва прилягането на дреха, обикновено форма на панталон, например
        скини, широк
    fit_type:
      name: Тип прилягане
      description: Описва типа на прилягане за части и аксесоари на превозни средства,
        напр. персонализирано или универсално
    fixation_type:
      name: Тип фиксиране
      description: Определя механизма за закрепване, обикновено за стойки за коледни
        елхи, например фиксиращ шип, фиксиращ винт
    flag_shape:
      name: Форма на знаме
      description: Определя геометричната форма на знамена и въздушни чорапи, като
        например сълза или вимпел
    flammability_rating_ul_94:
      name: Оценка на запалимост (UL 94)
      description: Посочва UL 94 класификацията за огнеустойчивост на материала на
        обвивката
    flare_type:
      name: Тип сигнални светлини
      description: Идентифицира типа аварийни сигнални светлини за пътя, като LED
        или традиционни
    flash_card_theme:
      name: Тема за флашкарта
      description: Указва темата за обучение на флашкарти, като азбука или числа
    flash_cell_type:
      name: Тип флаш клетка
      description: Идентифицира броя битове, съхранявани в една флаш клетка в архитектурата
        на паметта (напр. SLC, MLC, TLC).
    flash_modes:
      name: Режими на светкавица
      description: Идентифицира различните настройки за светкавицата на камерата,
        като автоматична или ръчна
    flash_type:
      name: Тип светкавица
      description: Идентифицира типа светкавица, използвана във фотоапаратите, като
        пръстеновидна или макро
    flashing_material:
      name: Материал на покривните обшивки
      description: Идентифицира материала, използван в покривните обшивки, като пластмаса
        или мед
    flat_shoe_style:
      name: Стил на равни обувки
      description: Идентифицира специфичния дизайн на равни обувки, като балеринки
        или еспадрили
    flatware_material:
      name: Материал за прибори за хранене
      description: Идентифицира материала на приборите за хранене, като неръждаема
        стомана или сребро
    flatware_pieces_included:
      name: Включени части от прибори за хранене
      description: Указва видовете прибори в комплект прибори за хранене, като нож
        за масло или лъжица за супа
    flavor:
      name: Аромат
      description: Указва вкуса или аромата на продукт, напр. ванилия, мента
    flavor_profile:
      name: Вкусов профил
      description: Идентифицира специфичните вкусови нотки на артикули, обикновено
        за пивоварство, например карамел, с вкус на ядки
    flexibility_rating:
      name: Оценка за гъвкавост
      description: Показва нивото на гъвкавост на връзките за сноуборд или снегоходки,
        напр. 4
    floor_configuration:
      name: Конфигурация на пода
      description: Показва дали палатката включва под и ако да, какъв тип под се предоставя
    floral_wire_design:
      name: Дизайн на цветарската тел
      description: Описва вида на цветарската тел, използвана в изработката, като
        тел за свързване или покрита с плат
    flour/grain_type:
      name: Тип брашно/зърно
      description: Указва вида на зърното или брашното в даден продукт, например царевица,
        пшеница
    flow_rate_type:
      name: Тип дебит
      description: Определя скоростта, с която се разпределя течността, обикновено
        за бебешки бутилки, например средно, бавно
    flower_color:
      name: Цвят на цветето
      description: Указва цвета на цветето, като например розово или многоцветно
    flower_pattern:
      name: Шарка на цветето
      description: Описва шарката в цветята, напр. райета, точки
    flue_type:
      name: Тип димоотвод
      description: Идентифицира вида на димоотводната система в камините, като балансирана
        или конвенционална
    fluid_type:
      name: Тип течност
      description: Указва течността, необходима за оборудване за специални ефекти,
        като сух лед или мъгла
    fluoride_content:
      name: Съдържание на флуор
      description: Показва наличието и относителната концентрация на флуор във водата
        за уста
    flush_plate_color:
      name: Цвят на стенната плочка с бутона за казанчето
      description: Идентифицира цвета на стенната плочка с бутона за казанчето за
        тоалетна, като бяло или сребристо
    flush_plate_pattern:
      name: Шарка на стенната плочка с бутона за казанчето
      description: Описва дизайна или мотива върху стенната плочка с бутона за казанчето,
        например флорален или кариран
    flush_system:
      name: Система на струята на казанчето
      description: Указва системата на струята на казанчето, използвана във водопроводните
        инсталации, като единична или двойна
    flute_configuration:
      name: Конфигурация на флейта
      description: Идентифицира конкретната настройка на флейта, като B footjoint
        или Inline G
    fm_transmitter_playback_source:
      name: Източник на възпроизвеждане на FM предавател
      description: Идентифицира опциите за мултимедиен вход, от които устройството
        може да възпроизвежда, освен Bluetooth (например USB стик, microSD карта)
    foam_form:
      name: Форма на пяната
      description: Идентифицира формата или типа на гумираната пяна в даден продукт,
        като топки или листове
    focus_adjustment:
      name: Коригиране на фокуса
      description: Указва как камерата коригира фокуса си, напр. автоматично, ръчно
    focus_device_type:
      name: Тип устройство за фокусиране
      description: Идентифицира типа устройство за фокусиране, използвано във фотоапаратите,
        напр. инструмент за подпомагане на фокуса, манивела за фокусиране
    focus_type:
      name: Тип фокус
      description: Идентифицира метода на фокусиране в камери, като TTL или TTL-CT-SIR
    fold_type:
      name: Тип сгъване
      description: Идентифицира стила на сгъване в хартиени продукти, като Z-образно
        сгъване или двойно сгъване
    folder/report_cover_material:
      name: Материал за корицата на папка
      description: Идентифицира материала, използван за направата на папки, като хартия
        или кожа
    folding_mechanism:
      name: Механизъм на сгъване
      description: Определя как се сгъва продукт, обикновено за колички, напр. компактно,
        с една ръка
    font_style:
      name: Стил на шрифта
      description: Указва вида на шрифта в софтуерните продукти, като sans serif или
        script
    food_bag_material:
      name: Материал на торбички за храна
      description: Идентифицира материала, използван в торбичките за съхранение на
        храна, като хартия или силикон
    food_dispenser_type:
      name: Тип диспенсър за храна
      description: Указва вида на храната, за която е предназначен диспенсърът, като
        зърнени храни или тестени изделия
    food_product_form:
      name: Форма на хранителния продукт
      description: Указва формата, в която е представен хранителният продукт, като
        изсушен или замразен
    food_storage_material:
      name: Материал за съхранение на храна
      description: Идентифицира материала, използван в предметите за съхранение на
        храни, като стъкло или пластмаса
    food_supplement_form:
      name: Форма на хранителните добавки
      description: Указва формата на добавката за здраве, като течност или таблетки
    foot_arch_type:
      name: Тип свод на стъпалото
      description: Определя типа свод на стъпалото, който продуктът е предназначен
        да поддържа
    foot_side:
      name: Страна на стъпалото
      description: Показва дали опората за глезена е предназначена за левия крак,
        десния крак, или може да се използва от двете страни.
    footage_type:
      name: Вид заснет материал
      description: Описва категорията на стокова фотография или видеоматериал, напр.
        анимации, текстури
    footboard_type:
      name: Тип стъпало
      description: Определя стила на стъпалото на педалите за барабани, като твърдо
        или перфорирано
    footwear_color:
      name: Цвят на обувките
      description: Указва основния цвят на обувката, като бяло или червено
    footwear_material:
      name: Материал за обувки
      description: Указва вида на материала, използван в обувките, като велур или
        гума
    footwear_pattern:
      name: Шарка на обувките
      description: Описва визуалния мотив върху обувките, например ивици или листа
    force_feedback_type:
      name: Тип силова обратна връзка
      description: Описва задвижващия механизъм, използван за генериране на силова
        обратна връзка и съпротивление при управление
    format_supported:
      name: Поддържан формат
      description: Указва съвместимите размери, обикновено за фотоалбуми, напр. 12
        x 16 инча, 13 x 18 см
    formula_level:
      name: Ниво на млечната формула
      description: Определя възрастта, подходяща за млечната формула за бебета, напр.
        ниво 1 (0 – 6 месеца)
    formulation_strength:
      name: Сила на формулата
      description: Показва сравнителната сила на формулата на продукта
    fossil_type:
      name: Тип изкопаеми
      description: Указва вида на вкаменелостите, като зъби от акула или кост на динозавър
    foundation_color:
      name: Цвят на основата
      description: Идентифицира цвета на основата на матрак, като бежово или черно
    foundation_material:
      name: Материал на основата
      description: Идентифицира основния материал, използван в основата на матрака,
        като метал или дърво
    foundation_pattern:
      name: Модел на основата
      description: Описва дизайна или мотива върху основата на матрак, като шеврон
        или дамаска
    fragrance:
      name: Аромат
      description: Определя дали даден продукт е ароматизиран, или не, напр. флорален
        аромат, без аромат
    fragrance_level:
      name: Степен на аромата
      description: Указва силата на аромата на даден продукт, напр. без аромат, с
        лек аромат
    frame_color:
      name: Цвят на рамката
      description: Указва цвета на рамката на продукта, като прозрачен или златен
    frame_design:
      name: Дизайн на рамката
      description: Описва стила или материала на рамката на продукта, като метал или
        дърво
    frame_material:
      name: Материал на рамката
      description: Определя материала, използван в рамката на продукта, като дърво
        или пластмаса
    frame_pattern:
      name: Модел на рамката
      description: Описва визуалния дизайн или стила на рамката на продукта, като
        геометрична или раирана
    frame_style:
      name: Стил на рамката
      description: Описва дизайна или вида на рамката за произведения на изкуството,
        като модерна или рустик
    frequency/radio_bands_supported:
      name: Поддържани честоти/радиочестотни ленти
      description: Показва радиочестотните ленти, с които устройството е съвместимо,
        напр. AM, UHF
    frequency_type:
      name: Тип честота
      description: Идентифицира настройката на честотата на металотърсачи, напр. единична,
        синхронна
    frequency_weighting:
      name: Честотно претегляне
      description: Описва честотната характеристика на шумомера, като например A-претегляне
    frog_material:
      name: Материал на жабката
      description: Идентифицира материала, използван в жабката на лъка за струнни
        инструменти, като абаносово дърво или сребро
    fruit_source:
      name: Източник на плодове
      description: Идентифицира дали плодовете в напитките са от концентрат, или не
    fuel_additives:
      name: Добавки за гориво
      description: Идентифицира типа добавка в горивните продукти, като антигел или
        инхибитор на корозия
    fuel_container_features:
      name: Характеристики на контейнера за гориво
      description: Описва специфични характеристики на резервоарите за гориво, като
        например устойчив на разливане чучур или индикатор за гориво
    fuel_grade:
      name: Клас гориво
      description: Указва класа на горивните продукти, например Bioheat или 2-K
    fuel_purity:
      name: Чистота на горивото
      description: Указва нивото на чистота на пропановото гориво, напр. HD-5, комерсиално
    fuel_source:
      name: Източник на гориво
      description: Указва използвания източник на енергия, обикновено за горивни клетки,
        например водород, пропан
    fuel_supply:
      name: Подаване на гориво
      description: Указва източника на гориво за превозни средства или двигатели,
        като дизел или хибрид
    furniture/fixture_color:
      name: Цвят на мебелите/арматурата
      description: Идентифицира цвета на мебелите или арматурата, като бежово или
        черно
    furniture/fixture_features:
      name: Характеристики на мебелите/арматурата
      description: Подчертава специалните характеристики на мебелите или арматурата,
        като регулируеми рафтове или вградено огледало
    furniture/fixture_material:
      name: Материал на мебелите/арматурата
      description: Идентифицира основния материал, използван в мебелите или арматурата,
        като дърво или метал
    furniture/fixture_pattern:
      name: Десен на мебелите/арматурата
      description: Идентифицира визуалната тема върху мебелите, като например райе
        или каре
    game_components:
      name: Компоненти на играта
      description: Идентифицира частите, включени в комплект игра, като зарове или
        дъска за игра
    game_console_skin_coverage:
      name: Покритие на обложките за игрови конзоли
      description: Показва кои части на устройството покрива комплектът обложки
    game_difficulty:
      name: Трудност на играта
      description: Описва нивото на предизвикателство в игра за парти, като средно
        или трудно
    game_features:
      name: Характеристики на играта
      description: Подчертава специални характеристики на игра, например удобна за
        пътувания или с възможност за персонализиране
    game_name:
      name: Име на играта
      description: Идентифицира конкретното име на игра за пиене, като Биър понг или
        Кингс къп
    gameplay_skills:
      name: Умения за игра
      description: Идентифицира уменията, които се подобряват от дадена игра, като
        стратегическо мислене или памет
    games_included:
      name: Включени игри
      description: Изброява игрите, които идват с продукта, като карти или пулове
    gaming_enhancement_features:
      name: Функции за подобряване на игрите
      description: Показва HDMI 2.1 технологии, ориентирани към игри, поддържани от
        приемника
    garage_door_material:
      name: Материал за гаражна врата
      description: Идентифицира строителния материал на гаражните врати, като стомана
        или дърво
    gardening_use:
      name: Използване в градината
      description: Определя предназначението на продукт в градината, напр. наторяване,
        озеленяване
    garment_steamer_design:
      name: Дизайн на уреда за гладене с пара
      description: Определя стила или типа на уреда за гладене с пара, като ръчен
        или четка с пара
    gases_detected:
      name: Разпознати газове
      description: Идентифицира специфичните газове, които детекторът може да разпознае,
        като метан или радон
    gate_mounting_type:
      name: Тип монтаж на врата
      description: Указва къде е инсталирана врата за бебе или домашен любимец, като
        стена или врата
    gauge_type:
      name: Тип индикатор
      description: Указва вида на индикатора на превозното средство, като ниво на
        горивото или температура
    gear_material:
      name: Материал на зъбно колело
      description: Указва материала, използван в конструкцията на зъбни колела, като
        въглеродни влакна или титан
    gear_ratio:
      name: Съотношение на зъбното колело
      description: Определя съотношение на зъбното колело за макарите за риболов,
        напр. 6:1, 1:1
    gearing_type:
      name: Тип скоростна система
      description: Указва типа на скоростна система във велосипеди, като верига или
        ремък
    gel_strength:
      name: Твърдост на желето
      description: Показва твърдостта на желето или градуса на Блум за желатиновите
        продукти, напр. висок градус, нисък градус
    gemstone_type:
      name: Тип скъпоценен камък
      description: Посочва основния скъпоценен камък, използван в изделието, въз основа
        на минералната или материална класификация на камъка
    genre:
      name: Жанр
      description: Класифицира категорията или стила на мултимедията, като например
        ужаси или фентъзи
    geological_era:
      name: Геоложка ера
      description: Класифицира възрастта на колекционерски скали или вкаменелости,
        като мезозой или неозой
    gift_bag_handle_design:
      name: Дизайн на дръжка за подаръчна торбичка
      description: Описва стила на дръжките на торбичките за подаръци, като въже или
        панделка
    gift_set_format:
      name: Форма на подаръчен комплект
      description: Указва стила на презентация на подаръчни комплекти, като подаръчна
        кутия или подаръчна торбичка
    gimbal_stabilization_axes:
      name: Оси за стабилизиране на карданния вал
      description: Идентифицира броя на осите на електронна или механична стабилизация,
        осигурена, когато селфи стикът включва функция за кардан.
    gin_variety:
      name: Разновидност на джина
      description: Класифицира джин продуктите по техния специфичен тип, например
        ароматизиран, сух лондонски
    glaze_finish:
      name: Глазиран завършек
      description: Показва текстурата и блясъка на керамично или грънчарско глазиране,
        като сатен или кракле
    glazing_type:
      name: Вид стъклопакет
      description: Идентифицира типа стъклопакет на прозореца, като двоен или единичен
        стъклопакет
    glide_style:
      name: Стил на плъзгане
      description: Показва предназначената характеристика на плъзгане на кънките (напр.
        скорост, контрол).
    glitter_particle_size:
      name: Размер на блестящите частици
      description: Категоризира размера на частиците на блясъка, влияещ върху интензивността
        на искрене, текстурата и лекотата на нанасяне
    glitter_shape:
      name: Форма на блясъка
      description: Определя формата на блясъка, като сърце или звезда
    glucose_measurement_units:
      name: Единици за измерване на глюкоза
      description: Показва в кои измервателни единици (mg/dL или mmol/L) глюкомерът
        може да показва резултати
    glucose_meter_features:
      name: Характеристики на глюкомера
      description: Описва специалните характеристики на глюкомерите, като преносими
        или с функция за памет
    glue_gun_features:
      name: Характеристики на пистолет за лепене
      description: Подчертава уникалните характеристики на пистолет за лепене, като
        бързо нагряване или функции за безопасност
    glue_gun_operation:
      name: Работа с пистолет за лепене
      description: Идентифицира източника на захранване на пистолет за лепене, напр.
        със или без кабел
    glue_gun_technology:
      name: Технология на пистолет за лепене
      description: Указва типа технология, използвана в пистолета за лепене, напр.
        студено, топло
    glue_strength:
      name: Сила на лепилото
      description: Показва способността за залепване на лепилото, напр. силно, леко
    glue_viscosity:
      name: Вискозитет на лепилото
      description: Описва гъстотата на лепилото, влиеяща върху потока и контрола на
        нанасянето
    golf_ball_type:
      name: Тип топка за голф
      description: Указва характеристиките на ефективността на топките за голф, като
        например изпълнение на ниво обиколка или мека топка
    golf_equipment_included:
      name: Включено оборудване за голф
      description: Идентифицира допълнителните елементи за голф, включени в комплекта,
        като инструмент за премахване на трева или калъф за топка за голф
    gps_compatible_device:
      name: Съвместимо устройство с GPS
      description: Указва устройства, които могат да използват GPS софтуер, като лаптопи
        или авиационни устройства
    gps_device_features:
      name: Функции на GPS устройството
      description: Описва специалните възможности на GPS устройство, като базирано
        на AI или вграден видеорегистратор
    gps_map_type:
      name: Тип GPS карта
      description: Указва вида на картата, използвана в GPS софтуера, като топографски
        или морски карти
    gps_software_focus:
      name: Фокус на GPS софтуера
      description: Идентифицира основната употреба на GPS софтуер, като например автомобилна
        навигация или геопространствен анализ
    grading:
      name: Оценяване
      description: Показва качеството или състоянието на колекционерските карти за
        търговия, като BCCG или PSA
    grain:
      name: Зърнистост
      description: Показва нивото на зърнистост във филма на камерата, например високо
        или фино
    grape_variety:
      name: Сорт грозде
      description: Идентифицира вида грозде, използвано във винопроизводството, като
        каберне совиньон или шардоне
    graphics_card_type:
      name: Тип графична карта
      description: Указва вида на графичната карта в компютъра, напр. професионална,
        специализирана
    graphics_tablet_accessories_included:
      name: Включени аксесоари за графични таблети
      description: Идентифицира допълнителните елементи, включени в графичен таблет,
        като стойка за писалка или връзка за писалка
    graphics_tablet_specialized_features:
      name: Специализирани функции за графичен таблет
      description: Посочва специалните характеристики на графичен таблет, като водоустойчив
        или с LED подсветка
    gravel/substrate_material:
      name: Чакъл/субстратен материал
      description: Определя състава на чакъл за аквариум чакъл или на субстрати, напр.
        глина, кварц
    gray_coverage_level:
      name: Ниво на покриване на сива коса
      description: Показва процента или степента на сива или бяла коса, която продуктът
        може да покрие или смеси
    grease_filter_material:
      name: Материал на филтъра за мазнини
      description: Указва материала, използван във филтъра за мазнини на продукта,
        напр. метал, неръждаема стомана
    grind_size:
      name: Размер при смилане
      description: Показва едростта или фиността на смляното кафе, като изключително
        едра или фина
    grip_or_holder_style:
      name: Стил на дръжката или захващането
      description: Идентифицира основната физическа форма на продукта, помагайки на
        клиентите бързо да филтрират за предпочитания от тях дизайн
    grip_texture:
      name: Текстура на захващането
      description: Описва усещането на повърхността при хващане на продукта, като
        гладка или текстурирана
    grip_type:
      name: Тип захващане
      description: Определя стила на захващането на оборудване за фехтовка, напр.
        френска рапира, дръжка тип „пистолет“
    grit_type:
      name: Тип зърненост на абразива
      description: Определя нивото на зърненост на абразива на инструментите или стоматологичните
        продукти, като грубо или изключително фино
    grooming_kit_format:
      name: Размер на комплект за подстригване
      description: Указва вида на опаковката на комплектите за подстригване, напр.
        чантичка или кутия
    guitar_fitting/part_type:
      name: Тип част/аксесоар за китара
      description: Указва вида на частта или аксесоара за китара, като пикгард или
        ключ за настройка
    guitar_size:
      name: Размер на китара
      description: Указва размера на китарата, като пълен размер или 3/4
    gutter_fitting_type:
      name: Тип сглобяване на улуци
      description: Идентифицира вида на сглобяването, използван в системите за улуци,
        като конектор за водосточна тръба или капачка в края
    gutter_style:
      name: Стил на улука
      description: Указва вида на улука, като например дълбок или индустриален
    habitat_material:
      name: Материал за местообитанието
      description: Идентифицира основния материал на местообитанията на домашни любимци,
        като акрил или дърво
    hair_care_effect:
      name: Ефект за грижата за косата
      description: Определя основните ползи или резултати, които шампоанът е формулиран
        да осигури
    hair_care_finish:
      name: Завършек на грижата за косата
      description: Определя крайния вид или текстура на косата след използване на
        продукти, напр. блестяща, матова
    hair_care_items_included:
      name: Включени продукти за грижа за косата
      description: Указва типовете продукти за грижа за косата, включени в комплект,
        като серум за коса или маска за коса
    hair_care_technology:
      name: Технология за грижа за косата
      description: Определя технологията, използвана в продуктите за грижа за косата,
        напр. пара, термолиза
    hair_color:
      name: Цвят на косата
      description: Идентифицира цвета или нюанса на продуктите за грижа за косата,
        като например русо или тъмнокафяво
    hair_color_formulation:
      name: Формула на боята за коса
      description: Показва дълготрайността или функционалния тип на цветовия ефект
        на продукта (напр. трайна боя, тонер, покриване на корени)
    hair_concealer_fiber_material:
      name: Материал на влакната на коректора за коса
      description: Посочва основния материал на изграждащите влакна или пудрите на
        продукта
    hair_dryer_motor_type:
      name: Тип мотор на сешоар
      description: Посочва вида мотор, използван в сешоара, влияещ върху издръжливостта,
        нивото на шума и силата на въздушния поток
    hair_dye_type_removed:
      name: Тип премахвана боя за коса
      description: Посочва кои видове боя за коса продуктът е предназначен да премахне
        (напр. трайна, къна)
    hair_loss_type:
      name: Тип косопад
      description: Организира продукти въз основа на вида на косопада, напр. алопеция
        ареата, плешивост при мъжете
    hair_oil_application:
      name: Нанасяне на маслото за коса
      description: Посочва как маслото за коса е предназначено да се използва или
        нанася
    hair_oil_effect:
      name: Ефект на маслото за коса
      description: Показва основните ползи или резултати, които маслото за коса осигурява
    hair_shear_type:
      name: Тип ножици за коса
      description: Определя стила на ножиците за коса, използвани в грижата за косата,
        напр. текстуриране, изтъняване
    hair_styling_benefits:
      name: Ползи при оформяне на косата
      description: Подчертава ключовите ползи или ефектите, които продуктът предоставя
        на косата
    hair_styling_items_included:
      name: Включени продукти за оформяне на косата
      description: Идентифицира уредите за оформяне на косата, включени в комплекта,
        като например маша или четка за коса
    hair_styling_tool_features:
      name: Характеристики на уредите за оформяне на косата
      description: Идентифицира специалните характеристики на уредите за оформяне
        на коса, като регулируем термостат или автоматично изключване
    hair_treatment_effect:
      name: Ефект за третиране на косата
      description: Посочва основните ползи, осигурени от серума за коса
    hair_type:
      name: Тип коса
      description: Класифицира продуктите въз основа на специфични типове или състояния
        на косата, като къдрава или суха
    hammer_head_material:
      name: Материал на главата на чука
      description: Идентифицира състава на главата на чук, като стомана или фибростъкло
    hand_side:
      name: Ръка
      description: Указва ръката, за която е създаден даден продукт, напр. лява или
        и за двете
    hand_soap_features:
      name: Характеристики на сапуна за ръце
      description: Подчертава специалните характеристики или ползи на прахообразния
        сапун за ръце
    hand_warmer_type:
      name: Тип нагревател за ръце
      description: Идентифицира вида нагревател за ръце, като активиран от кислород
        или захранван от батерии
    handcuff_lock_type:
      name: Тип заключване за белезници
      description: Идентифицира заключващия механизъм на белезници, като ключ или
        двойна ключалка
    handle_color:
      name: Цвят на дръжката
      description: Указва цвета на дръжката на продукта, като червено или черно
    handle_design:
      name: Дизайн на дръжката
      description: Описва стила на дръжката на инструмент, като права или тип „пистолет“
    handle_grip_texture:
      name: Текстура на захващането на дръжката
      description: Определя усещането за повърхността на дръжката на продукта, като
        оребрена или гладка
    handle_material:
      name: Материал на дръжката
      description: Указва материала, използван в дръжката на продукта, като бамбук
        или пластмаса
    handle_pattern:
      name: Модел на дръжката
      description: Описва дизайна или мотива на дръжката на продукт, например флорален
        или геометричен
    handle_style:
      name: Стил на дръжката
      description: Определя дизайна или формата на дръжката на бастуна, влияещи върху
        комфорта на захвата, ергономиката и естетиката
    handle_type:
      name: Тип дръжка
      description: Указва дължината или наличието на дръжка върху продукт, напр. къса,
        без дръжка
    handset_type:
      name: Тип слушалка
      description: Определя слушалка за телефони, напр. с кабел или без кабел
    handwear_features:
      name: Характеристики на облеклото за ръце
      description: Описва специални характеристики на ръкавици или ръкавици без пръсти,
        като регулируемо затваряне или с подобрено захващане
    handwear_material:
      name: Материал на облеклото за ръце
      description: Описва вида на материала, използван в ръкавици или ръкавици без
        пръсти, като изкуствена кожа или вълна
    handwear_type:
      name: Тип облекло за ръце
      description: Класифицира типа на облеклото за ръце, например ръкавици без пръсти,
        ръкавици за сняг
    hanging_chair_design:
      name: Дизайн на висящ стол
      description: Указва дали висящият стол се предлага със стойка, или не
    haptic_feedback_type:
      name: Тип хаптична обратна връзка
      description: Описва вида тактилна или двигателна обратна връзка, която контролерът
        предоставя
    hard_cider_variety:
      name: Разновидност на сайдера
      description: Указва вкусовия профил на сайдера, напр. стипчив, сладък
    hard_drive_features:
      name: Характеристики на твърдия диск
      description: Идентифицира специалните възможности на твърдия диск, като базиран
        на AI или удароустойчив
    hard_drive_form_factor:
      name: Типоразмер на твърдия диск
      description: Указва физическия размер на твърдия диск, напр. 2,5 инча, 3,5 инча
    hard_drive_installation:
      name: Инсталиране на твърд диск
      description: Идентифицира разположението на твърдия диск в електрониката, като
        вътрешен или външен
    hardhat_class:
      name: Клас каски
      description: Идентифицира класификацията за безопасност на каските, напр. C
        (проводима), E (електрическа)
    hardness:
      name: Твърдост
      description: Указва твърдостта на даден продукт, например мек, среден, твърд
    hardness_rating_pencil_scale:
      name: Твърдост по скала (скала за молив)
      description: Определя степента на твърдост на закаленото стъкло въз основа на
        скалата за твърдост за молив.
    hardware_finish:
      name: Покритие на железарските предмети
      description: Описва обработката на повърхностната или покритието на железарските
        предмети, като месинг или хром
    hardware_material:
      name: Материал на железарските предмети
      description: Указва материала на железарските предмети, като неръждаема стомана
        или метал
    hardware_mounting_type:
      name: Тип монтаж на железарски предмети
      description: Идентифицира как е инсталиран или разположен железарски предмет,
        например монтиран на стена, свободно стоящ
    hardwood_lumber_grade:
      name: Клас дървен материал от твърда дървесина
      description: Класифицира качеството на дървения материал от твърда дървесина,
        напр. № 2A обикновен
    harness_closure_type:
      name: Тип закопчаване с колани
      description: Указва типа на закопчаване, използвано в коланите, като катарама
        със странично откопчаване или цип
    harp_size:
      name: Размер на арфата
      description: Указва категорията размер на арфа, напр. малка, голяма концертна
    hatch_suitable_location:
      name: Подходящо място за отвора тип „люк“
      description: Идентифицира идеалното разположение за отворите тип „люк“, като
        под или стена
    hazmat_suit_design:
      name: Дизайн на защитен костюм
      description: Описва стила на облекло за работа с опасни материали, напр. гащеризон
        или облекло за пълна химическа защита
    hdmi_version_supported:
      name: Поддържана HDMI версия
      description: Определя най-високата версия на HDMI спецификацията, която устройството
        напълно поддържа (напр. HDMI 2.1 за 4K при 120 Hz).
    hdr_format:
      name: HDR формат
      description: Указва високия динамичен диапазон (HDR) за телевизори, напр. HDR10,
        Dolby Vision
    headjoint_cut:
      name: Отвор на мундщука на флейтата
      description: Уточнява отвора на мундщука на флейтите, напр. вълнообразен, Z-образен
    headphone_cushion_shape:
      name: Форма на възглавничките за слушалки
      description: Описва физическия контур на възглавничката, за да помогне на клиентите
        да съпоставят геометрията на наушниците
    headphone_driver_technology:
      name: Технология на драйвера на слушалките
      description: Определя типа преобразувател, използван за създаване на звук в
        слушалките
    headphone_jack_type:
      name: Тип жак за слушалки
      description: Указва типа на размера на жака за слушалки, като 3,5 мм, USB type-C
    headphone_style:
      name: Стил на слушалките
      description: Определя дизайна на слушалките, напр. преминаващи зад врата, в
        ухото
    headset_connection_type:
      name: Тип връзка за слушалки
      description: Указва интерфейса(ите), налични за свързване на външни слушалки
        към телефона.
    headwear_features:
      name: Характеристики на шапките
      description: Подчертава уникалните характеристики на шапките, напр. сгъваеми,
        универсални
    hearing_aid_compatibility:
      name: Съвместимост със слухови апарати
      description: Указва дали телефонът отговаря на изискванията за съвместимост
        със слухови апарати (HAC) и ако е приложимо, нивото на оценката
    hearing_aid_ear_side:
      name: Страна на ухото за слуховия апарат
      description: Посочва дали слуховият апарат е проектиран за лявото ухо, дясното
        ухо, или за двете уши
    hearing_aid_features:
      name: Характеристики на слуховия апарат
      description: Подчертава специалните характеристики на слуховите апарати, напр.
        презареждаща се батерия или цифров
    hearing_aid_material:
      name: Материал за слухови апарати
      description: Идентифицира основния материал, използван в структурата на слухови
        апарати, като пластмаса или силикон
    hearing_loss_level:
      name: Ниво на загуба на слух
      description: Посочва степента на загуба на слух, за която е предназначен слуховият
        апарат
    hearing_protection_class:
      name: Клас на защита на слуха
      description: Определя местния сертификационен клас, който показва ефективността
        на затихване според регионалните стандарти
    heat_function:
      name: Топлинна функция
      description: Указва дали даден продукт има функция за нагряване, обикновено
        за предмети за лична хигиена
    heat_level:
      name: Ниво на лютивина
      description: Показва пикантността на хранителните продукти и напитките, като
        леко или много люто
    heat_settings:
      name: Настройки за топлината
      description: Определя нивата на контрол на температурата на продукта, напр.
        ниско, средно, високо
    heat_source:
      name: Източник на топлина
      description: Указва вида на източника на топлина в нагревателните подложки,
        напр. затопляне в микровълнова фурна, термичен гел
    heat_therapy_type:
      name: Тип топлинна терапия
      description: Показва дали продуктът осигурява влажна топлина, суха топлина,
        или и двете
    heating_instructions:
      name: Инструкции за затопляне
      description: Указва как правилно да затоплите продукта, напр. фурна, котлон
    heating_method:
      name: Метод на затопляне
      description: Указва техниката, използвана за затопляне, обикновено за нагреватели
        за бебешки шишета, например пара, водна баня
    heating_pad_design:
      name: Дизайн на нагревателна подложка
      description: Посочва физическия стил или типоразмера на нагревателната подложка
    heating_pad_features:
      name: Характеристики на нагревателната подложка
      description: Подчертава специални функционални характеристики или удобства,
        вградени в нагревателната подложка
    heating_speed:
      name: Скорост на нагряване
      description: Показва скоростта, с която продуктът се нагрява, например бързо,
        бавно
    heel_height_type:
      name: Тип височина на тока
      description: Определя височината на тока на обувката, като равен или висок
    heel_shoe_type:
      name: Тип обувки на ток
      description: Идентифицира стила на тока на обувка, като токчета на платформа
        или клиновидни токчета
    height_adjustment:
      name: Регулиране на височината
      description: Указва дали височината на продукта може да се променя, напр. фиксирана
        височина, регулируема височина
    helicobacter_pylori_detection_method:
      name: Метод за установяване на хеликобактер пилори
      description: Идентифицира биологичния принцип или подход, който китът използва
        за установяване на инфекция с хеликобактер пилори
    helmet_shade_design:
      name: Дизайн на затъмняване на визьора на каската
      description: Описва типа механизъм за затъмняване на визьора в заваръчните каски,
        като фиксирано или автоматично затъмняване
    herbal_supplement_health_goal:
      name: Здравна цел на билковата добавка
      description: Показва основната цел за благосъстоянието, телесната система или
        физиологичната област, която билковата добавка е предназначена да поддържа
        (напр. укрепване на имунната система, облекчаване на стреса, пречистване на
        черния дроб и детоксикация)
    hitch_class:
      name: Клас на теглича
      description: Идентифицира капацитета за теглене на теглича на превозното средство,
        като клас I или клас II
    hitch_type:
      name: Тип теглич
      description: Указва метода на монтиране за ремаркета за велосипеди, като монтиране
        на ос или на седалка
    hiv_test_generation:
      name: Поколение HIV тест
      description: Указва поколението на HIV диагностичния тест, отразявайки подобренията
        в чувствителността и период на откриване
    hockey_equipment_included:
      name: Включено оборудване за хокей
      description: Указва елементите в комплект оборудване за лакрос, като стик за
        лакрос или раменни подложки
    hold_level:
      name: Ниво на задържане
      description: Определя силата на фиксацията на оформящите продукти за косата,
        напр. лека, силна
    hole_plating_type:
      name: Тип покритие на отворите
      description: Показва дали отворите на платката са без покритие, с проходно покритие,
        или имат вътрешни отвори, което влияе върху запояването и междуслойната свързаност
    hook_design:
      name: Дизайн на кука
      description: Идентифицира дизайна на куки, катарами и закопчалки, напр. пружина,
        двустранна
    hook_grip_design:
      name: Дизайн на захващане на куката
      description: Описва стила на захващане на куките за плетене на една кука, като
        неплъзгащи се или ергономични
    hook_size:
      name: Размер на куката
      description: Идентифицира размера на куките за плетене на една кука, като B,
        G или I
    hook_type:
      name: Тип кука
      description: Идентифицира стила на кука за лодка, като фиксирана или телескопична
    hoop_shape:
      name: Форма на обръч
      description: Описва формата на елемент на базата на обръч, обикновено риболовни
        мрежи, например D-образна
    horse_category:
      name: Категория кон
      description: Класифицира конската сбруя въз основа на размера и породата на
        коня, напр. пони, стандартен кон
    horse_grooming_accessories_included:
      name: Включени аксесоари за груминг на коне
      description: Идентифицира допълнителни предмети, включени в продуктите за груминг
        на коне, като остриета или куфар за носене
    hose_material:
      name: Материал на маркуча
      description: Указва вида на материала, използван в маркучите, като PVC или алуминий
    host_interface:
      name: Интерфейс на хоста
      description: Указва метода, използван за свързване с твърди дискове, като Thunderbolt
        3 или SATA
    housing_color:
      name: Цвят на корпуса
      description: Идентифицира цвета на външната обвивка на продукта, като бежово
        или прозрачно
    housing_material:
      name: Материал на корпуса
      description: Указва материала, използван във външния слой на продукта, напр.
        неръждаема стомана, дърво
    housing_pattern:
      name: Модел на корпуса
      description: Описва дизайна или мотива върху екстериора на продукта, като абстрактен
        или лого
    hub/switch_storage_options:
      name: Опции за съхранение за мрежов концентратор/комутатор
      description: Идентифицира възможностите за съхранение на мрежови концентратори
        или комутатори, като стекируем и нестекируем
    humidification_system:
      name: Система за овлажняване
      description: Описва вида опция за овлажняване, включена или поддържана от PAP
        машината
    humidifier_design:
      name: Дизайн на овлажнител
      description: Описва стила на овлажнител, като с възможност за прикрепване или
        преносим
    humidity_control:
      name: Контрол на влажността
      description: Показва способността на продукта да регулира нивата на влага, обикновено
        за овлажнители за пури, например 0,65
    humidity_control_method:
      name: Метод за контрол на влажността
      description: Определя вида на регулиране на влажността в устройствата, например
        полуавтоматично, ръчно
    hunting/survival_knife_design:
      name: Дизайн на нож за лов/оцеляване
      description: Идентифицира дизайна на ловен нож/нож за оцеляване, като връх на
        копие или връх танто
    hunting_blind_design:
      name: Дизайн на прикритие за лов
      description: Указва вида на дизайна на прикритието за лов, напр. без екран,
        еднопосочно виждане
    hvac_control_type:
      name: Тип управление на ОВК
      description: Идентифицира вида управление на ОВК, като дигитално или ръчно
    ice_pack_type:
      name: Тип на пакет с лед
      description: Уточнява материала или технологията, използвани в пакет с лед,
        напр. пакет с гел, пакет с пяна
    icon_type:
      name: Тип икона
      description: Указва типа на компютърната икона, като папка или за социална медия
    identity_verification_requirement:
      name: Изискване за проверка на самоличността
      description: Определя дали се изисква регистрация с истинско име, или потвърждаване
        на самоличността чрез eKYC преди да може да се използва електронната или физическата
        SIM карта.
    ignition_system:
      name: Система за запалване
      description: Идентифицира вида на системата за запалване в генераторите, като
        ръчна или електронна
    illumination_technique:
      name: Техника на осветяване
      description: Идентифицира метода на осветяване, използван в микроскопите, като
        ярко или тъмно поле
    image_formats_supported:
      name: Поддържани формати на изображения
      description: Идентифицира типовете файлове с изображения, които камерата може
        да създаде, като JPEG или RAW
    image_sensor_size:
      name: Размер на сензора за изображение
      description: Указва размера на сензора за изображения във фотоапаратите, като
        1/1,7 или пълен кадър
    immobilizer_type:
      name: Тип имобилайзер
      description: Указва вида на устройството, използвано за предотвратяване на кражба
        на превозно средство, например заключване на гуми или заключване на волана
    incense_fragrance:
      name: Аромат на тамян
      description: Идентифицира аромата на продукт от тамян, като лавандула или сандалово
        дърво
    incense_kit_items_included:
      name: Включени артикули от комплекта за тамян
      description: Идентифицира елементите, съдържащи се в комплекта за правене на
        тамян, напр. бамбукови пръчици, форми
    incense_type:
      name: Вид тамян
      description: Идентифицира формата на тамян, като конус или пръчка
    incontinence_aid_features:
      name: Функции за помощ при инконтиненция
      description: Описва специалните характеристики на помощните средства при инконтиненция,
        като непропускливи или хипоалергенни
    incontinence_pad_type:
      name: Тип подложка при инконтиненция
      description: Определя специфичния стил или форма на подложката (напр. протектор,
        предпазител, силно абсорбираща подложка)
    inductance_tolerance:
      name: Толеранс на индуктивността
      description: Определя допустимото процентно отклонение от номиналната стойност
        на индуктивността
    industry_focus:
      name: Целеви отрасъл
      description: Подчертава целевите сектори за продукт, като образование или производство
    infant_age_group:
      name: Възрастова група на бебета
      description: Класифицира продукти, подходящи за специфични възрастови групи
        на бебета, напр. новородени, 0 – 6 месеца
    inflation_method:
      name: Начин на надуване
      description: Идентифицира как се надува даден продукт, например автоматично
        или хидростатично
    ingredient_category:
      name: Категория на съставките
      description: Класифицира вида на съставките във витамини и добавки, напр. фибри,
        билки
    ingredient_origin:
      name: Произход на съставката
      description: Указва източника на съставките на продукта, напр. естествени, синтетични
    ingredient_pathway:
      name: Начин за получаване на съставката
      description: Указва дали парфюмерийните съставки са естествено получени чрез
        физическо отделяне от биомаса без химическа промяна, или са синтезирани по
        други начини
    ingredients:
      name: Съставки
      description: Указва компонентите, използвани във формулата на продукта, напр.
        цинков оксид, алое вера
    ingress_protection_ip_rating:
      name: Степен на защита от проникване (IP)
      description: Предоставя официалния IP рейтинг за водо/прахоустойчивост, на който
        отговаря корпусът (напр. IP68).
    ink_application_technique:
      name: Техника на нанасяне на мастило
      description: Описва метода, използван за нанасяне на мастило в изкуствата и
        занаятите, като ситопечат
    ink_color:
      name: Цвят на мастилото
      description: Идентифицира цвета на мастилото, обикновено за офис консумативи,
        например черен, сребрист
    ink_form:
      name: Форма за мастило
      description: Описва метода на опаковане или доставка на художествено мастило,
        като писалка или бутилка
    ink_pattern:
      name: Шаблон на мастилото
      description: Идентифицира визуалната тема на химикалки или печати, напр. геометрична,
        коледна
    ink_type:
      name: Тип мастило
      description: Идентифицира вида мастило, използвано в даден продукт, като например
        на основата на разтворител или багрило
    inline_skating_style:
      name: Стил на ролери
      description: Определя специфичния стил на ролери, за които продуктът е предназначен,
        като развлекателни или скоростни ролери
    input/output_ports:
      name: Портове за вход/изход
      description: Идентифицира видовете налични портове на дадено устройство, като
        USB или изходен жак
    input_connection:
      name: Връзка с входа
      description: Указва типа връзка с входа за аудиокабели, като 3,5 мм или RCA
    input_connection_type:
      name: Тип входяща връзка
      description: Определя конектора или интерфейсния стандарт, приет от входната
        страна на преобразувателя
    input_signal_interface:
      name: Интерфейс на входящия сигнал
      description: Определя типовете на входящите връзки, които аудиопреобразувателят
        приема
    input_video_interface:
      name: Интерфейс на входящото видео
      description: Определя типовете видеоконектори, които се приемат като вход от
        преобразувателя за сканиране
    insole_length_type:
      name: Тип дължина на стелката
      description: Определя покритието или стила на дължината на вложката
    installation_accessories_included:
      name: Включени аксесоари за монтаж
      description: Идентифицира всички инструменти или материали с инструкции, включени
        в комплекта с батерията с цел подпомагане на монтирането
    installation_tools_included:
      name: Включени инструменти за монтаж
      description: Посочва всички инструменти или консумативи, включени в комплекта
        с частта  с цел подпомагане на монтирането
    instruction_set_architecture:
      name: Архитектура на набора от инструкции
      description: Определя компютърната архитектура, която процесорът може да разбере,
        например 32-битова
    instrument/accessory_finish:
      name: Покритие на инструмент/аксесоар
      description: Описва обработката на повърхността или цвета на музикален инструмент
        или аксесоар, като позлатен или лакиран
    instrument_accessory_material:
      name: Материал за аксесоари за инструменти
      description: Идентифицира материала, използван в аксесоарите за музикални инструменти,
        като дърво или месинг
    instrument_bow_material:
      name: Материал на лък за инструменти
      description: Идентифицира материала, използван в конструкцията на лъка на музикален
        инструмент, като въглеродни влакна или бразилско дърво
    instrument_color:
      name: Цвят на инструмента
      description: Идентифицира цвета на музикален инструмент, като черен или сребрист
    instrument_controller_type:
      name: Тип контролер на инструмента
      description: Идентифицира музикалния инструмент, симулиран от контролер за игра,
        като например китара или микрофон
    instrument_material:
      name: Материал на инструмента
      description: Идентифицира основния материал, използван в конструкцията на музикален
        инструмент, като кленово дърво или месинг
    instrument_part_material:
      name: Материал на частите на инструменти
      description: Указва вида на материала, използван в частите на инструмента, като
        абаносово дърво или позлатено
    instrument_pattern:
      name: Модел на инструмента
      description: Описва визуалния дизайн или мотив върху музикален инструмент, като
        масивен или с текстура
    instrument_string_color:
      name: Цвят на струната на инструмента
      description: Идентифицира цвета на струните на музикални инструменти, като злато
        или сребро
    instrument_string_material:
      name: Материал на струните на инструменти
      description: Указва състава на струните на музикален инструмент, като бронз
        или флуоровъглерод
    instrument_string_pattern:
      name: Модел на струната на инструмента
      description: Указва модела на китарните струни, като плътни или геометрични
    instrument_support_type:
      name: Тип опора на инструмента
      description: Идентифицира типа опора, използвана за музикален инструмент, като
        презрамка за врата или музикална стойка
    insulation_material:
      name: Изолационен материал
      description: Определя състава на изолацията, като минерална вата или полиуретан
        (PU)
    integrated_led_lighting:
      name: Интегрирано LED осветление
      description: Показва дали високоговорителят включва вградено LED, или RGB осветление
        и съответния тип
    integrated_power/charging_options:
      name: Интегрирани опции за захранване/зареждане
      description: Указва дали стойката включва вградени електрически контакти и/или
        USB портове за зареждане, подобрявайки функционалността за свързани устройства
    integrated_stand_type:
      name: Тип интегрирана стойка
      description: Описва стила на вградената стойка или поддържащия механизъм на
        корпуса.
    intended_application:
      name: Предвидено приложение
      description: Идентифицира специфичната употреба на бои и политури, напр. врати,
        веранди/огради
    intended_effect:
      name: Предназначен ефект
      description: Описва основното ползотворно въздействие върху благосъстоянието,
        за което CBD добавката се рекламира
    intended_jewelry_type:
      name: Вид бижута, за които е предназначена
      description: Показва кои видове бижута стойката е предназначена да държи или
        показва
    intended_surface:
      name: Предназначена повърхност
      description: Идентифицира основната повърхност, която подложката е предназначена
        да защитава
    intercom_communication_type:
      name: Тип комуникация на домофона
      description: Класифицира основния комуникационен формат, който устройството
        поддържа
    intercom_wiring_type:
      name: Тип окабеляване на домофона
      description: Указва схемата за окабеляване или комуникация, за която е проектиран
        високоговорителят на домофона
    interface_type:
      name: Тип интерфейс
      description: Идентифицира типа на връзката, която продуктът използва, като Bluetooth
        или USB
    interior_lining_material:
      name: Материал на вътрешната облицовка
      description: Идентифицира основния материал, който облицова вътрешността на
        кутията за бижута, защитавайки ги от надраскване и износване
    interior_texture:
      name: Вътрешна текстура
      description: Определя модела на вътрешната повърхност, който помага за създаване
        на пяна вътре в купата или чашата
    internal_drive_form_factor_supported:
      name: Поддържа се типоразмер на вътрешно устройство
      description: Показва съвместимите размери на твърдия диск за дадено устройство,
        напр. 2,5 инча
    internet_radio_form_factor:
      name: Типоразмер на интернет радио
      description: Определя физическия стил или ориентация на монтаж на интернет радиото
    intimate_apparel_features:
      name: Характеристики на интимното облекло
      description: Описва специалните характеристики на интимното облекло, като дишащ
        дизайн или удобно прилягане
    inverter_type:
      name: Тип инвертор
      description: Идентифицира типа инвертор за захранване в частите на ЕПС, като
        чиста синусоида или квадратна вълна
    invitation_personalization_design:
      name: Дизайн за персонализиране на покани
      description: Определя характеристиките на дизайна на покана, напр. включено
        искане „Моля за отговор“, възможност за персонализиране
    ironing_features:
      name: Функции за гладене
      description: Указва специалните характеристики на ютия или система за гладене,
        напр. автоматично изключване, усилване на парата
    item_condition:
      name: Състояние на артикула
      description: Показва качеството на артикул, обикновено превозни средства или
        части за превозни средства, например сертифицирани употребявани, ремонтирани
        (от производителя)
    item_material:
      name: Материал на артикула
      description: Указва основния състав на артикул, обикновено за части и аксесоари
        за превозни средства, например мед, фибростъкло
    item_style:
      name: Стил на предмета
      description: Описва естетическата или дизайнерска тема на предмет, като например
        модерен или рустик
    j_cup_type:
      name: Тип J-образна кука
      description: Определя стила на J-образната кука на оборудването за вдигане на
        тежести, например плоски, тип „сандвич“
    jaw_advancement_adjustability:
      name: Регулируемост на изместването на челюстта
      description: Показва дали и как позицията на долната челюст, осигурена от устройството,
        може да бъде регулирана от потребителя
    jaw_material:
      name: Материал на челюстта
      description: Идентифицира материала, използван в челюстта на инструмент, като
        стомана или титан
    jewelry_cleaning_accessories_included:
      name: Включени аксесоари за почистване на бижута
      description: Посочва всички допълнителни инструменти или аксесоари, доставени
        с почистващото средство (напр. четки, тави, кърпи за полиране)
    jewelry_cleaning_purpose:
      name: Цел при почистване на бижута
      description: Показва основната предназначена функция на продукта (напр. премахване
        на потъмняване, полиране, защитно покритие)
    jewelry_finding_type:
      name: Тип части за бижута
      description: Идентифицира конкретния компонент, използван в производството на
        бижута, като капачета за мъниста или халкички
    jewelry_material:
      name: Материал за бижута
      description: Идентифицира основния материал, използван в бижутата, като злато
        или емайл
    jewelry_project_type:
      name: Тип проект за бижута
      description: Указва типа проект за бижута, като например изработка на огърлица
        или изделие от тел
    jewelry_set_type:
      name: Тип комплекти бижута
      description: Идентифицира вида на бижутата в комплекта за изработка на бижута,
        като пръстен или колие
    jewelry_steam_cleaner_features:
      name: Характеристики на парен почистващ уред за бижута
      description: Изброява забележителни вградени функции или функции за безопасност,
        които разграничават моделите
    jewelry_type:
      name: Тип бижута
      description: Разграничава типовете бижута, като изящни или имитиращи бижута
    joint_connection:
      name: Връзка на съединителната скоба
      description: Указва свързването на съединителната скоба на билярдната щека,
        напр. композитно, без съединителна скоба
    joint_face_type:
      name: Тип повърхност на съединителната скоба
      description: Указва вида на повърхността на съединителната скоба на шафта за
        билярд, като цяла или със спомагателна скоба
    joint_style:
      name: Стил на съединителната скоба
      description: Определя вида на съединителната скоба, използвана в щеките за билярд,
        като uni-loc или радиално
    journey_type:
      name: Тип пътуване
      description: Посочва вида на пътуването, покрито от билета, въз основа на броя
        на пътуванията и посоката на придвижване.
    joystick_mounting_style:
      name: Стил на свързване на джойстика
      description: Показва как сглобката на джойстика е закрепена към контролния панел
        или корпуса
    joystick_sensor_technology:
      name: Сензорна технология на джойстика
      description: Идентифицира основната сензорна технология, използвана за разпознаване
        на движение или позиция
    jump_rope_design:
      name: Дизайн на въже за скачане
      description: Описва типа въже за скачане, като обикновено или смартвъже
    jumping_surface_color:
      name: Цвят на повърхността за скачане
      description: Идентифицира цвета на повърхността за скачане на батута, като син
        или черен
    jumping_surface_material:
      name: Материал на повърхността за скачане
      description: Указва тъканта на областта за скачане на батута, напр. синтетика,
        полипропилен
    jumping_surface_pattern:
      name: Шарка на повърхността за скачане
      description: Идентифицира дизайна или щампата върху повърхността за скачане
        на батут, като звезди или райе
    karaoke_modes:
      name: Стил на караоке
      description: Указва вида на караоке изпълнението, например от един човек или
        дует
    kerosene_application:
      name: Приложение на керосин
      description: Идентифицира специфичната употреба на керосин, като например за
        нагреватели или реактивно гориво
    key_purpose:
      name: Предназначение на ключа
      description: Указва за къде е създаден да се използва ключ или заготовка за
        ключ, напр. врата, катинар
    keyboard_action:
      name: Действие на клавишите за музикална клавиатура
      description: Определя усещането на клавишите на пианото, като клавиши с чук
        или претеглени клавиши
    keyboard_assembly_type:
      name: Тип сглобка на клавиатурата
      description: Определя физическата сглобка, която се доставя (напр. самостоятелна
        клавиатура, подложка за длани с клавиатура, отделен комплект клавиши)
    keyboard_backlight_type:
      name: Тип подсветка на клавиатурата
      description: Детайлизира технологията или стила на осветление, използвани за
        клавишите или корпуса на клавиатурата
    keyboard_format:
      name: Формат на клавиатурата
      description: Определя размера и оформлението на клавиатура, като пълноразмерна
        или компактна
    keyboard_key_type:
      name: Тип клавиш
      description: Описва реакцията или усещането на клавишите на музикални клавиатури,
        като претеглени или полупретеглени
    keyboard_language:
      name: Език на клавиатурата
      description: Указва езиковата подредба на клавиатура, като ENG (английски) или
        DEU (немски)
    keyboard_layout:
      name: Подредба на клавиатурата
      description: Указва подредбата на клавишите на клавиатура, напр. QWERTY, Workman
    keyboard_mounting_style:
      name: Стил на свързване на клавиатурата
      description: Определя метода за свързване на вътрешната поставка, който влияе
        на звука и усещането на механичните клавиатури
    keyboard_port_type:
      name: Тип порт на клавиатурата
      description: Указва типа порт за свързване на клавиатура, като например USB
        type-C
    keyboard_specialized_features:
      name: Специализирани функции на клавиатурата
      description: Идентифицира уникални функции на клавиатурата, като регулируем
        ъгъл или подсветка
    keyboard_switch_type:
      name: Тип превключвател на клавиатурата
      description: Определя стила на обратна връзка на клавиатурата, като например
        тактилен или кликващ
    keyboard_type:
      name: Тип клавиатура
      description: Указва дизайна и функционалността на клавиатура, напр. стандартна,
        с подсветка
    keycap_legend_printing_method:
      name: Метод за отпечатване на легендата на капачките на клавиатурата
      description: Описва как легендите се прилагат към капачките на клавиатурата,
        спомагащи за дълъг живот и външния вид.
    keycap_material:
      name: Материал на капачките на клавиатурата
      description: Показва основния материал или производствения процес на капачките
        на клавиатурата, който влияе на издръжливостта, текстурата и легендите
    keycap_profile:
      name: Профил на капачките на клавиатурата
      description: Определя семейството на формата на набора капачки на клавиатурата,
        влияещо на усещането при писане и естетиката
    keypad_style:
      name: Стил на цифровата клавиатура
      description: Определя метод на въвеждане за цифрови клавиатури, като например
        цифров или буквено-цифров
    keystone_correction_type:
      name: Тип корекция на трапецовидно изкривяване
      description: Описва типа корекция на трапецовидно или геометрично изкривяване,
        която проекторът поддържа за елиминиране на трапецовидни деформации (например
        ръчна вертикална, автоматична четириточкова)
    kiln_features:
      name: Характеристики на пещта
      description: Посочва функционалните възможности и конструктивните характеристики
        на пещта
    kiln_loading_style:
      name: Начин на зареждане на пещта
      description: Указва метода, чрез който изделията се поставят и изваждат от камерата
        на пещта
    kit_construction_type:
      name: Тип конструкция на комплект
      description: Указва тъканта на областта за скачане на батута, напр. синтетика,
        полипропилен
    kitchen/dining_furniture_items_included:
      name: Комплекти части за мебели за кухня и трапезария
      description: Идентифицира конкретните части за мебели, включени в комплект,
        като трапезни столове или кухненски остров
    kitchen_utensil_items_included:
      name: Включени кухненски прибори
      description: Идентифицира инструментите, включени в комплект кухненски прибори,
        като бъркалка или щипка
    kitesurfing_style:
      name: Стил на кайтсърфинг
      description: Определя специфичния стил на кайтсърфинг, за който продуктът е
        предназначен, като каране на вълни
    knee_brace_style:
      name: Стил на ортезите за коляно
      description: Определя структурния дизайн на ортезата, отразявайки как се носи
        и нивото на предоставена подкрепа
    kneeboard_features:
      name: Характеристики на нийборд
      description: Описва специфични характеристики на нийборд, като регулируема лента
        или противоплъзгаща се
    knife_type:
      name: Тип нож
      description: Класифицира ножовете въз основа на тяхното предназначение или дизайн,
        като многофункционален инструмент или джобно ножче
    knitting/padding_project_type:
      name: Тип проект за плетене/пълнеж
      description: Идентифицира предназначението на материали за плетене или пълнеж,
        като например ватиране или производство на възглавници
    knitting_project_type:
      name: Тип проект за плетене
      description: Указва вида на проекта за плетене, като например правене на възглавници
        или плюшени играчки
    knob/handle_design:
      name: Дизайн на дръжката/топката
      description: Описва стила на обкова на шкаф, като кръгла топка или дръжки за
        дърпане
    knob_function:
      name: Функция на копчето
      description: Указва функцията на копчетата на усилвателя, като усилване или
        високи честоти
    knob_style:
      name: Стил копче
      description: Описва дизайна на копчетата на усилватели за музикални инструменти,
        като стандартни или ретро/винтидж
    knot_shape:
      name: Форма на възела
      description: Определя цялостната форма или профил на възела или главата на четката
    labeling_project_type:
      name: Тип проект за обозначаване с етикет
      description: Указва целта за изработка на етикети за зашиване, като изработка
        на домашен текстил или изработка на персонализирани подаръци
    laboratory_freezer_design:
      name: Дизайн на лабораторен фризер
      description: Описва конфигурацията на лабораторен фризер, като изправен или
        тип „сандък“
    lacrosse_equipment_included:
      name: Включено оборудване за лакрос
      description: Указва елементите в комплект оборудване за лакрос, като стик за
        лакрос или подложки за раменете
    ladder_type:
      name: Тип стълба
      description: Идентифицира стила на стълба за лодка, като фиксирана или телескопична
    lamination_mode:
      name: Режим на ламиниране
      description: Идентифицира вида на използвания процес на ламиниране, като студено
        ламиниране или горещо ламиниране
    lamination_type:
      name: Тип ламиниране
      description: Определя дали повърхността на схемата или модела е ламинирана и
        ако да, дали е едностранна или двустранна
    lamp_assembly_type:
      name: Тип сглобка на лампата
      description: Указва дали продуктът е крушка без корпус, лампа с корпус, двоен
        пакет, или друга конфигурация на сглобка
    lamp_quality_grade:
      name: Клас на качеството на лампата
      description: Показва дали лампата е от оригиналния производител на оборудване
        (OEM), използва OEM крушка в съвместим корпус, или е изцяло произведена от
        трета страна/съвместима
    lamp_type:
      name: Тип лампа
      description: Определя източника на светлина във фотографски увеличители, напр.
        студена светлина, дихроична
    lancet_mechanism_type:
      name: Тип механизъм на ланцета
      description: Определя работния механизъм или дизайна за безопасност на ланцетите
        (напр. безопасно прибиращи се, активирани от натиск)
    language:
      name: Език
      description: Указва използвания език или съвместим език, напр. английски, многоезичен
    language_version:
      name: Езикова версия
      description: Указва езиковата версия на медиен продукт, като ENG-US или ARA-арабски
    laptop_cable_type:
      name: Тип кабел за лаптоп
      description: Идентифицира функционалната цел на кабела в лаптопа
    laptop_housing_part_type:
      name: Тип част от корпуса на лаптопа
      description: Определя кой външен компонент е предоставен (напр. долна основа,
        подложка за длани, рамка)
    laser_color:
      name: Цвят на лазер
      description: Идентифицира цвета на лазерна показалка, като червена или зелена
    laser_light_source:
      name: Лазерен източник на светлина
      description: Указва светлинната технология, използвана в лазерните показалки,
        като например LED
    laser_pattern:
      name: Лазерен модел
      description: Идентифицира дизайна или мотива, създаден от лазер, като звезди
        или животни
    lathe_application:
      name: Приложение за струг
      description: Определя вида работа, за която е предназначен стругът, като например
        струговане на акрил или обработка на стъкло
    laundry_detergent_features:
      name: Характеристики на перилния препарат
      description: Описва специалните характеристики на перилния препарат, като защита
        на цвета или премахване на петна
    lead_grade:
      name: Степен на олово
      description: Указва степента на олово в пишещи инструменти, напр. H, 9B
    leash_design:
      name: Дизайн на каишка
      description: Описва функционалността на каишките за домашни любимци, като например
        подвижни или прибиращи се
    leather/vinyl_texture:
      name: Текстура на кожа/винил
      description: Описва усещането за повърхността на кожени или винилови продукти,
        като гладка или зърнеста
    leather_type:
      name: Вид кожа
      description: Указва животинския източник или вида кожа, използвана в продукта
        (напр. телешка кожа, крокодилска кожа, питон, синтетична кожа)
    lectern_mounting_type:
      name: Тип монтаж на катедра
      description: Определя стила на настройка на катедрата, например настолна или
        подова
    led_light_mode:
      name: Режим на LED осветлението
      description: Посочва избираемите работни режими, които комбинират различни спектри
        или интензитети (напр. синя, червена, синя и червена)
    leg_color:
      name: Цвят на крака
      description: Определя оттенъка на краката на продукта, напр. бяло, кафяво
    leg_lock_type:
      name: Тип ключалка на крака
      description: Указва типа ключалка, използван в електронни аксесоари, обикновено
        стикове за селфита; например въртяща се ключалка
    leg_material:
      name: Материал на крака
      description: Указва материала, използван за краката на продукт, като черешово
        дърво или бамбук
    leg_pattern:
      name: Модел на крака
      description: 'Определя дизайна или отпечатъка върху краката на продукта, като
        животни или геометричен '
    leg_sections:
      name: Секции на краката
      description: Указва броя на секциите на краката в електронни аксесоари, обикновено
        стикове за селфи; например 5+
    legend_type:
      name: Тип легенда
      description: Показва дали маркерът е празен, или предварително отпечатан с числа,
        букви, символи или други маркировки
    length_adjustability:
      name: Регулируемост на дължината
      description: Показва дали дължината на ремъка, или верижката може да бъде променена
        от потребителя или е фиксирана
    lens/slide_material:
      name: Материал на лещата/диапозитива
      description: Указва материала, използван при направата на лещи или диапозитиви,
        като пластмаса или стъкло
    lens_cap_compatible_device:
      name: Устройство, съвместимо с капачката на обектива
      description: Указва оборудване, съвместимо с капачките на обектива, като монокуляр
        или цифров фотоапарат
    lens_case_accessories_included:
      name: Включени аксесоари за кутийката за лещи
      description: Изброява допълнителните предмети, опаковани с кутийката (напр.
        пинсети, бутилка за разтвор)
    lens_characteristic:
      name: Характеристика на лещите
      description: Посочва специални функционални характеристики, приложени към лещите
        (напр. блокиране на синя светлина, UV400)
    lens_coating:
      name: Покритие на обектива
      description: Определя вида на покритието на лещите за очила, напр. антирефлексно,
        устойчиво на надраскване
    lens_color:
      name: Цвят на лещите
      description: Указва цвета на стъклата на очила, като жълто или черно
    lens_color_combination:
      name: Цветова комбинация на лещите
      description: Указва цветовото сдвояване на лещите, използвано за анаглифни 3D
        очила
    lens_configuration:
      name: Конфигурация на обектива
      description: Указва настройката на обектива в елементи като лупи, като единични
        или множество
    lens_filter_category:
      name: Категория на филтъра на лещата
      description: Определя европейската стандартна категория на филтър (0 – 4), която
        класифицира лещите по тяхната плътност на нюансите и условията на осветление,
        за които са подходящи
    lens_filter_effects:
      name: Ефекти на филтъра на обектива
      description: Описва специфичните ефекти, които филтърът на обектива предоставя,
        като корекция на цветовете или макро
    lens_filter_type:
      name: Тип филтър на обектива
      description: Указва категорията на филтъра за обектива на камерата, напр. градиент,
        неутрална плътност
    lens_kit_accessories_included:
      name: Включени аксесоари за обектив
      description: Изброява допълнителните артикули, предоставени с комплекта обектив
        или филтър за телефона, така че купувачите да знаят точно какво получават
        и да могат да сравняват пакетите.
    lens_material:
      name: Материал на обектива
      description: Идентифицира основния материал, използван за оптичните елементи
        или корпуса на лещата, като например оптично стъкло, пластмаса или алуминиева
        сплав.
    lens_pattern:
      name: Модел на лещата
      description: Описва дизайна или визуалния външен вид на лещи за очила, като
        твърди или текстурирани
    lens_polarization:
      name: Поляризация на лещата
      description: Показва типа поляризация на лещите в очилата, напр. фотополяризация
    lens_protector_coverage_style:
      name: Стил на покритие на протектора за обектив
      description: Определя физическия типоразмер или дизайна на покритието на протектор
        за обектив на камерата на мобилен телефон.
    lens_protector_features:
      name: Характеристики на протектора за обектив
      description: Изброява специалните функционални характеристики, предлагани от
        протектора.
    lens_refractive_index:
      name: Показател на пречупване на лещата
      description: Определя числения показател на пречупване (напр. 1,50, 1,60, 1,67),
        който пряко корелира с дебелината и теглото на лещата
    lens_storage_type:
      name: Тип съхранение на обектива
      description: Описва вида на съхранението на обективите на камерата, като калъф
        за обектив или торбичка за обектив
    lens_tint_type:
      name: Тип нюанс на лещата
      description: Описва нюанса, приложен към лещата за видимост или козметични цели
    lens_type:
      name: Тип леща
      description: Указва вида на лещите в продуктите за очила, като поляризирани
        или прогресивни
    license_type:
      name: Тип лиценз
      description: Указва типа софтуерен лиценз, като например отворен код или еднократна
        покупка
    lid_material:
      name: Материал на капака
      description: Идентифицира типа материал, използван в капака на продукта, като
        стъкло или неръждаема стомана
    lid_type:
      name: Тип капак
      description: Посочва се видът на използвания капак, например с обръщане или
        с пристягане
    life_jacket_features:
      name: Характеристики на спасителната жилетка
      description: Подчертава уникалните характеристики на спасителните жилетки, като
        отразяващи или плаващи
    light_attachment_type:
      name: Тип закрепване на светлината
      description: Описва как се закрепва лампа за книга, като гъвкава или фиксирана
    light_color:
      name: Цвят на светлината
      description: Определя цвета или нюанса на светлината, като например бял или
        многоцветен
    light_control:
      name: Контрол на светлината
      description: Определя нивото на блокиране на светлината чрез обработка на прозорци,
        напр. затъмнение, прозрачност
    light_design:
      name: Светлинен дизайн
      description: Описва вида на светлинния дизайн в аксесоарите на камерата, като
        LED или пръстен
    light_exposure_modes:
      name: Режими на светлинна експозиция
      description: Указва опциите за регулиране на светлината в камерите, като AE
        с приоритет на затвора или AE с приоритет на блендата
    light_filtering:
      name: Филтриране на светлината
      description: Указва възможностите за филтриране на светлината на даден продукт,
        като дифузия или затъмнение
    light_options:
      name: Светлинни опции
      description: Указва светлинните характеристики на продукт, като меко сияние
        или промяна на цвета
    light_pattern:
      name: Модел на светлината
      description: Определя визуалната тема на осветителните продукти, например геометрична
        или дъгова
    light_rejection_type:
      name: Тип отхвърляне на светлина
      description: Показва дали и как екранът отхвърля околната или таванната светлина,
        подобрявайки контраста на изображението в светли среди
    light_source:
      name: Източник на светлина
      description: Идентифицира вида на електрическата крушка, използвана в даден
        продукт, като например LED или флуоресцентна
    light_spectrum:
      name: Светлинен спектър
      description: Определя диапазона от дължини на светлинните вълни, които даден
        продукт може да произведе, напр. синя светлина, инфрачервена светлина
    light_temperature:
      name: Температура на светлината
      description: Определя цветовите характеристики на източниците на светлина, като
        например топло бяло или дневна светлина
    light_therapy_device_form_factor:
      name: Типоразмер на устройството за светлинна терапия
      description: Описва физическия стил или конфигурация на устройството (напр.
        панел, маска, ръчно).
    light_type:
      name: Тип светлина
      description: Идентифицира специфичния тип светлина, използвана в плавателни
        съдове, напр. навигация, под вода
    lighting_features:
      name: Характеристики на осветлението
      description: Описва специални характеристики на осветлението, като регулируема
        яркост или LED осветление
    lighting_options:
      name: Опции за осветление
      description: Указва типа осветяване за табели, като осветени или неосветени
    lighting_type:
      name: Тип осветление
      description: Описва всички вградени осветителни функции на слушалките
    line/rope_type:
      name: Тип линия/въже
      description: Идентифицира стила на изграждане на анкерни линии или въжета, като
        тринишкова или двойна оплетка
    line_spacing_options:
      name: Опции за разстояние между редовете
      description: Идентифицира опции за разстояние между редовете, обикновено за
        пишещи машини; например двойно, регулируемо
    liner_features:
      name: Характеристики на пелените
      description: Описва специални характеристики на пелените, напр. непропускливи
        или хипоалергенни
    lip_balm_tint_level:
      name: Ниво на нюанса на балсама за устни
      description: Класифицира нивото на нюанса или цветова интензивност, която балсамът
        предоставя
    lip_gloss_applicator_type:
      name: Тип апликатор на гланца за устни
      description: Идентифицира стила на апликатора, включен с гланца за устни, който
        влияе върху лекотата на нанасяне и предпочитанието на потребителя
    lip_gloss_effect:
      name: Ефект на гланц за устни
      description: Описва ефекта или завършека, който осигурява блясък за устни, напр.
        изглаждане, плътност
    lip_gloss_formulation:
      name: Формула на гланца за устни
      description: Определя основната текстура или форма на гланца за устни
    lip_liner_design:
      name: Дизайн на молив за устни
      description: Идентифицира вида молив за устни, като прибиращ се или фиксиран
    lip_makeup_opacity:
      name: Непрозрачност на грима за устни
      description: Показва нивото на покритие или непрозрачност на продукта след нанасяне
    lip_plate_material:
      name: Материал на пластината за уста
      description: Идентифицира материала, използван за пластината за уста на флейта,
        като сребро или дърво
    lipstick_coverage:
      name: Покритие на червилото
      description: Описва нивото на непрозрачност на цвета, осигурено от червилото
        (напр. прозрачно, средно, пълно)
    lipstick_effect:
      name: Ефект на червило
      description: Описва ефекта или завършека, който осигурява червилото, напр. изглаждане,
        плътност
    liqueur_variety:
      name: Сорт ликьор
      description: Класифицира ликьорите според техните първични вкусови профили,
        напр. ядки, сметана
    livestock_food_ingredients:
      name: Съставки на храните за птици
      description: Определя основните съставки в храната за животни, като ечемичен
        или соев шрот
    lnb_output:
      name: LNB изход
      description: Указва броя на връзките на сателитен приемник, като една или четири
    lnb_technology:
      name: LNB технология
      description: Класифицира типа технология в сателитните LNB, като универсална
        или нискошумна
    load_capacity:
      name: Товароносимост
      description: Указва ограничението на теглото, което продуктът може да издържи,
        като например леко или тежко
    loading_ramp_type:
      name: Товарен тип рампа
      description: Идентифицира стила на товарната рампа за превозни средства, като
        единична или тройна
    loading_type:
      name: Тип зареждане
      description: Указва как се зареждат пералните уреди, като например зареждане
        отпред или отгоре
    lock_placement:
      name: Позициониране на ключалка
      description: Идентифицира къде е разположена ключалката върху частите на двигателя
        на плавателния съд, като например външна или вътрешна
    lock_type:
      name: Тип заключване
      description: Указва заключващ механизъм, използван от продукта, като ключ или
        код
    locking_mechanism:
      name: Заключващ механизъм
      description: Указва вида на използваното заключване, обикновено за продукти
        за безопасност; например автоматично затваряне, плъзгане
    logic_family:
      name: Логическо семейство
      description: Идентифицира полупроводниковото логическо семейство или технология
        на интегралната схема
    lovibond:
      name: Lovibond
      description: Показва интензитета на цвета на пивоварните зърна и малцове, като
        светъл или тъмен
    lubricant_application:
      name: Приложение на лубрикант
      description: Определя подходящите области на приложение за персонален лубрикант,
        като масаж или вагинален
    lubricant_composition:
      name: Състав на лубриканта
      description: Определя основната съставка на персоналните лубриканти, като например
        на водна или силиконова основа
    lubricant_dispenser_type:
      name: Тип дозатор за лубрикант
      description: Идентифицира типа на опаковката или контейнера за лубрикант, като
        варел или бутилка
    lubricant_effect:
      name: Ефект на лубриканта
      description: Показва всички функционални ефекти или стилове, предоставени лубриканта
        на презерватива
    lubricant_form:
      name: Форма на лубрикант
      description: Описва консистенцията на лубрикант, като гел или паста
    luggage/bag_closure:
      name: Затваряне на багаж/чанта
      description: Идентифицира вида на затваряне, използван за багаж или чанти, като
        цип или щракване
    lumber/wood_type:
      name: Вид дървен материал/дърво
      description: Идентифицира конкретния вид дърво или дървен материал, използвани
        в даден продукт, като дъб или бор
    lyre/flip_folder_attachment_type:
      name: Тип приставка за лира/папка за ноти
      description: Указва вида на приставката за музикални лири и папки за ноти, като
        каишка или скоба за лира
    m_2_drive_length_supported:
      name: Поддържана дължина на M.2 диск
      description: Определя кои дължини на M.2 карти корпусът или адаптерът могат
        да приемат
    magnet_type:
      name: Тип магнит
      description: Идентифицира типа магнит, използван в даден продукт, напр. керамика,
        титан
    magnification:
      name: Увеличение
      description: Указва силата на увеличение на продукт, като например 1x или 100x
    magsafe_compatibility:
      name: Съвместимост с MagSafe
      description: Показва дали аксесоарът поддържа магнитното закрепване или екосистемата
        за зареждане MagSafe на Apple.
    makeup_brush_application:
      name: Приложение на четката за грим
      description: Определя основната козметична употреба или зона, за която е предназначена
        четката (напр. фондьотен, сенки за очи, контур).
    makeup_features:
      name: Характеристики на грима
      description: Подчертава ключови характеристики на козметиката, като висока пигментация
        или без аромат
    makeup_shade:
      name: Тон за грим
      description: Описва нюанса на козметиката, като средно розово или наситено кафяво
    mallet_material:
      name: Материал на чука
      description: Идентифицира вида на материала, използван в перкусионните чукове,
        като месинг или гума
    management_type:
      name: Тип управление
      description: Описва нивото на управляемост на устройството (напр. напълно управляемо,
        интелигентно управляемо, неуправляемо), така че купувачите да могат да съпоставят
        възможностите на продукта с мрежовите изисквания
    mandibular_device_fitting_method:
      name: Метод на напасване на мандибуларната шина
      description: Описва как шината се напасва или оформя спрямо зъбите на потребителя
    mandolin_back_shape:
      name: Форма на гърба на мандолината
      description: Указва извивката и дизайна на гърба на мандолината, като например
        плосък гръб или арка
    manufacturer_type:
      name: Тип производител
      description: Указва източника на части или аксесоари за превозни средства, като
        например оригинални части или части на трета страна
    map_update_policy:
      name: Правила за актуализиране на картите
      description: Посочва как се предоставят или ценообразуват актуализациите на
        картите за устройството
    marine_navigator_features:
      name: Характеристики на морския навигатор
      description: Указва възможностите на инструментите за морска навигация, като
        сензорен екран или водоустойчив
    marker_format:
      name: Формат на маркера
      description: Определя физическия стил или конструкция на маркера.
    marker_text_color:
      name: Цвят на текста на маркера
      description: Определя цвета на отпечатаната легенда или текст на повърхността
        на маркера (различен от цвета на тялото на маркера).
    marker_tip_design:
      name: Дизайн на върха на маркера
      description: Описва формата на върха на маркера, като например куршум или длето
    marquee_substrate:
      name: Субстрат на надписа
      description: Определя физическия носител, върху който е отпечатано или доставено
        изображението (напр. просветляващо фолио, обратно отпечатан акрил, винилов
        стикер)
    mascara_brush_shape:
      name: Форма на четката на спиралата
      description: Определя формата или дизайна на вградената пръчица или четка за
        основа за спирала, която силно влияе върху нанасянето и резултатите
    mascara_effect:
      name: Ефект на спирала
      description: Описва желания резултат или характеристика на спирала, напр. извиване,
        удължаване
    mascara_formulation:
      name: Формула на спиралата
      description: Показва основният състав на продукта или специалната технология
        (напр. течна, с влакна, обгръщаща миглите), която влияе върху текстурата,
        носенето и премахването
    mask_cushion_material:
      name: Материал на възглавничката на маската
      description: Описва специфичния материал, използван за възглавничката или уплътнението
        на маската
    mask_size:
      name: Размер на маската
      description: Посочва обозначението на размера, предоставено от производителя
    mask_type:
      name: Тип маска
      description: Уточнява дизайна на маски, обикновено за респираторна грижа; например
        орална, назална
    masonry_material:
      name: Материал за зидария
      description: Определя състава на зидани елементи, като цимент или варовик
    masonry_product_form:
      name: Форма за продукт за зидария
      description: Указва формата на продуктите за зидария, като паста или прах
    massage_area:
      name: Зона за масаж
      description: Указва частта от тялото, за която е предназначен продуктът, напр.
        лице, бикини линия
    massage_mechanism_dimensionality:
      name: Измерност на масажния механизъм
      description: Посочва броя на осите на движение, в които работят масажните ролки
        (напр. 2D, 3D, 4D, 5D)
    massage_stone_texture:
      name: Текстура на масажен камък
      description: Описва усещането на повърхността на масажните камъни, като гладка
        или грапава
    massage_technique:
      name: Масажна техника
      description: Определя методите на масаж, предлагани от даден продукт, напр.
        ударни, дълбокотъканни
    mat/rug_shape:
      name: Форма на постелка/килим
      description: Описва формата на постелки или килими, като кръгли или квадратни
    mat_base_material:
      name: Материал за основата на постелка
      description: Указва вида на материала, използван за основата на постелките,
        т.е. корк, мемори пяна
    mat_features:
      name: Характеристики на постелката
      description: Описва специфични характеристики на постелки за дома или офиса,
        като противоплъзгаща основа или водоустойчива
    material:
      name: Материал
      description: Определя основния материал на продукта, като памук или вълна
    material_firmness:
      name: Твърдост на материала
      description: Описва твърдостта или мекотата на даден продукт, напр. твърд, гъвкав
    material_hardness:
      name: Устойчивост на материала
      description: Определя устойчивостта на продукта, обикновено за спортно или фитнес
        оборудване; напр. изключително мек, с висока устойчивост
    material_origin:
      name: Произход на материала
      description: Указва формата или състоянието, в което се доставят ценните материали
        (напр. насипни/немонтирани, завършени бижута, отпечатана/дигитална подаръчна
        карта)
    material_treatment:
      name: Обработка на материали
      description: Указва химични или физически обработки, прилагани към материалите
        за съхранение или безопасност (напр. термична обработка, фумигация, химическа
        обработка)
    maternity_clothing_features:
      name: Характеристики на облеклото за бременни
      description: Описва уникални характеристики на облеклото за бременни, напр.
        място за растеж на корема, поддържащи чашки
    maternity_sleepwear_style:
      name: Стил спално облекло за бременни
      description: Указва стила на спалното облекло за бременни, като комбинезон или
        риза за сън
    mattress_features:
      name: Характеристики на матрака
      description: Подчертава специалните характеристики на матрака, като хипоалергенен
        или с охлаждаща функция
    maximum_bit_depth:
      name: Максимална битова дълбочина
      description: Определя най-високата цифрова дължина на думата (в битове), която
        преобразувателят поддържа, влияеща върху динамичния диапазон и резолюцията
    maximum_magnification:
      name: Максимално увеличение
      description: Показва най-високия коефициент на увеличение, който микроскопът
        може да постигне, като 10x или 100x
    maximum_reel_diameter_supported:
      name: Максимален поддържан диаметър на ролката
      description: Указва най-големия диаметър на ролката, който устройството може
        да побере
    measured_parameters:
      name: Измерени параметри
      description: Изброява електрическите или батерийните показатели, които устройството
        може да измерва или показва
    measuring_method:
      name: Метод на измерване
      description: Определя техниката, използвана за количествено определяне на телесните
        мазнини, напр. оптична, калиперна
    measuring_tool_features:
      name: Характеристики на измервателния инструмент
      description: Описва специални характеристики на измервателни инструменти, като
        вградена камера или преносими
    measuring_type:
      name: Тип на измерване
      description: Указва метода на измерване за здравни устройства, напр. чело, пръст
    meat_cut:
      name: Разфасовка на месо
      description: Помага за идентифициране на конкретната разфасовка или вид месо,
        напр. бургер, крилца
    meat_type:
      name: Тип месо
      description: Идентифицира източника на месни продукти, напр. на растителна основа,
        пиле
    media_access:
      name: Достъп до медиите
      description: Определя как клиентите могат да имат достъп до медии, напр. цифров
        абонамент, печат и онлайн
    media_content_type:
      name: Тип медийно съдържание
      description: Идентифицира жанра или категорията на медийното съдържание, като
        риалити телевизия или стендъп комедия
    media_format:
      name: Медиен формат
      description: Определя съвместимите медийни формати за устройство, като винил
        или VHS
    media_physical_size:
      name: Физически размер на носителя
      description: Определя стандартизирания физически размер или типоразмер на празния
        носител
    media_player_form_factor:
      name: Типоразмер на медиен плейър
      description: Описва физическия стил на устройството, помагайки на купувачите
        да избират между компактни устройства и по-големи телевизионни приемници
    media_section:
      name: Медиен раздел
      description: Идентифицира конкретната категория на вестник или списание, като
        спорт или политика
    media_theme:
      name: Медийна тема
      description: Категоризира медийното съдържание според основния му фокус, като
        пътуване или игри
    medical_alarm_features:
      name: Характеристики на медицинска аларма
      description: Описва възможностите на медицинска алармена система, като дълъг
        живот на батерията или двупосочна комуникация
    medical_device_certification:
      name: Сертификация на медицинско устройство
      description: Изброява регулаторни одобрения или стандарти, с които биометричният
        монитор съответства (напр. CE, FDA 510(k))
    medical_identification_type:
      name: Тип медицинска идентификация
      description: Идентифицира формата на медицинска идентификация, като например
        гривна или огърлица
    medical_symbol:
      name: Медицински символ
      description: Посочва символа, показан върху бижуто или етикета, подпомагащ бързото
        разпознаване от спасителите
    medical_syringe_purpose:
      name: Предназначение на медицинска спринцовка
      description: Идентифицира предназначението на медицинска спринцовка, като например
        за инжектиране или промиване
    medical_tape_material:
      name: Материал за медицинска лента
      description: Идентифицира състава на медицинска лента, като пластмаса или латекс
    medicine/drug_form:
      name: Форма на лекарство
      description: Идентифицира физическата форма на лекарство, като таблетки или
        течност
    medicine/supplement_form:
      name: Форма на хранителна добавка/лекарство
      description: Идентифицира физическата форма на лекарство или добавка, като капсули
        или течност
    medium:
      name: Средно
      description: Идентифицира типа колекционерска вещ, като сувенири или карта за
        обмен
    melodica_style:
      name: Стил мелодика
      description: Указва стила на оформление на мелодичен инструмент, като стил на
        пиано или стил на клавиатура
    memory_channels:
      name: Канали на паметта
      description: Определя капацитета за предаване на данни на компютърни процесори,
        като двоен или четворен
    memory_form_factor:
      name: Форм фактор на паметта
      description: Указва физическото оформление на модулите памет, като DIMM или
        micro-DIMM
    memory_rank:
      name: Ранг на паметта
      description: Показва ранговото оформление на модула (как са организирани чиповете),
        засягайки съвместимостта и настройката на производителността
    memory_storage_type:
      name: Тип съхранение на паметта
      description: Идентифицира вида на паметта, използвана в камерите, като Micro
        SD карта или вградена памет
    memory_technology:
      name: Технология на паметта
      description: Указва вида на паметта, използвана в електронни устройства, като
        DDR или SDRAM
    menstrual_cup_shape:
      name: Форма на менструална чашка
      description: Описва формата на менструалните чашки, например камбана, V-образна
    menstrual_cup_size:
      name: Размер на менструалната чашка
      description: Показва категорията на размера, етикетиран от производителя (напр.
        малък, размер 1)
    menstrual_cup_stem_type:
      name: Тип накрайник на менструалната чашка
      description: Определя дизайна на накрайника или дръжката за премахване на чашката
    mesh_networking_technology:
      name: Технология за многосвързана мрежа
      description: Определя дали точката за достъп поддържа мрежова възможност и използвания
        стандарт или протокол
    mesh_type:
      name: Тип мрежа
      description: Определя стила или конструкцията на мрежеста тъкан, като указва
        нейното предназначение или характеристики, напр. атлетична, изчеткана
    metal_detector_features:
      name: Характеристики на детектор за метал
      description: Подчертава уникалните характеристики на детектори за метал, напр.
        кобур, водоустойчив
    metal_molding_application:
      name: Приложение за формоване на метал
      description: Идентифицира предвидената употреба на метални форми за отливане,
        като бижута или фигурки
    meter_type:
      name: Тип измервателен уред
      description: Идентифицира типа измервателен уред, използван в горивните системи
        на плавателни съдове, като цифров или аналогов
    metrics_supported:
      name: Поддържани показатели
      description: Указва видовете биометрични измервания, които продуктът предоставя,
        напр. костна маса, мускулна маса
    micrometer_type:
      name: Тип микрометър
      description: Идентифицира конкретното приложение или дизайн на микрометър, като
        острие или отвор
    microphone_design:
      name: Дизайн на микрофон
      description: Определя категорията на дизайна за микрофони, напр. кондензатор,
        динамичен
    microphone_preamp_form_factor:
      name: Типоразмер на микрофонен предусилвател
      description: Идентифицира физическия стил или формат на корпуса на микрофонния
        предусилвател за инсталация или използване
    microphone_thread:
      name: Резба за микрофон
      description: Указва размера на резбата за микрофони, напр. 1/4"-20, M6
    microphone_type:
      name: Тип микрофон
      description: Определя използваната микрофонна технология, като кондензатор или
        динамичен
    microphone_windshield_type:
      name: Тип ветробран за микрофон
      description: Указва конструктивния стил на ветробрана (например калъф от дунапрен,
