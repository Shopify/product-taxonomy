    chemical_application:
      name: Приложение на химически продукт
      description: Идентифицира основната употреба на химически продукт, например
        хидроизолация, почистване
    chemical_container_type:
      name: Тип контейнер за химикали
      description: Указва вида на контейнера за препарати за почистване на канали,
