    supplement_health_focus:
      name: Здравен фокус на добавката
      description: Определя основната област на благосъстояние, която добавката е
        предназначена да подкрепя
    support/brace_material:
      name: Материал за опори/скоби
      description: Идентифицира материала, използван в опори или скоби, като неопрен
        или пяна
    support_cushion_features:
      name: Характеристики на поддържащата възглавница
      description: Откроява специални функционални екстри или подобрения, предлагани
        от възглавницата
    support_level:
      name: Ниво на поддръжка
      description: Посочва общата оценка на стабилност или поддръжка, предлагана от
        ортезата за различни нива на тежест на нараняването или активност
    support_rigidity_level:
      name: Ниво на твърдост на опората
      description: Описва цялостната твърдост или структурна опора, предоставена от
        стелката – от приятно омекотяване до твърда ортотична опора
    supported_audio_sources:
      name: Поддържани аудиоизточници
      description: Посочва източниците на възпроизвеждане или вход, които устройството
        може да обработва
    supported_countries:
      name: Поддържани държави
      description: Изброява конкретните държави или територии, където SIM/eSIM или
        предплатеният план предоставя услуга.
    supported_display_technologies:
      name: Поддържани дисплейни технологии
      description: Посочва типовете дисплейни или екранни технологии, които калибраторът
        може да профилира или измерва
    supported_dvi_link_type:
      name: Поддържан тип DVI връзка
      description: Посочва дали устройството обработва еднолинкови, двулинкови, или
        и двата DVI сигнални стандарта
    supported_erase_modes:
      name: Поддържани режими за изтриване
      description: Изброява стандартите за сигурно изтриване, които дубликаторът може
        да извършва на целеви дискове
    supported_input_types:
      name: Поддържани типове входове
      description: Посочва видовете аудиовходове, които каналната лента приема (например
        микрофон, линеен, инструментален Hi-Z).
    supported_language:
      name: Поддържан език
      description: Указва езиците, които софтуерният продукт поддържа, като английски
        или испански
    supported_media_sources:
      name: Поддържани източници на мултимедия
      description: Определя физическите или дигиталните мултимедийни входове, от които
        устройството може да възпроизвежда музика
    supported_raid_levels:
      name: Поддържани RAID нива
      description: Посочва конфигурациите на дисков масив, които интегрираният контролер
        за съхранение може да използва
    supported_scan_media_type:
      name: Поддържан тип мултимедия за сканиране
      description: Посочва видовете оригинали, които скенерът може да обработва (например
        различни видове филм, отразяващи отпечатвания)
    supported_sdi_standards:
      name: Поддържани SDI стандарти
      description: Показва SDI скоростите/стандартите за предаване на данни (SD-SDI,
        HD-SDI, 3G-SDI и др.), които устройството поддържа за предаване на сигнал
    supported_usb_device_types:
      name: Поддържани типове USB устройства
      description: Определя видовете USB устройства за съхранение, които дубликаторът
        може да обработва
    surface_sides:
      name: Страни на повърхността
      description: Показва дали печатното легло може да се използва от едната или
        от двете страни
    surface_texture:
      name: Текстура на повърхността
      description: Описва усещането или шарката върху повърхността на продукта, обикновено
        за презервативи; например гладка, оребрена
    surfboard_features:
      name: Характеристики на дъската за сърф
      description: Определя уникални характеристики на дъска за сърф, като надуваема
        или твърда
    surveillance_camera_design:
      name: Дизайн на камера за наблюдение
      description: Идентифицира вида на дизайна на камерите за наблюдение, например
        термични или панорамни
    surveillance_camera_mounting_type:
      name: Тип монтаж на камера за наблюдение
      description: Идентифицира как може да се монтира камера за наблюдение, напр.
        стена, таван
    surverying_accessories_included:
      name: Включени аксесоари за геодезия
      description: Указва допълнителни компоненти, опаковани с геодезически инструменти,
        като скоба или нивелираща щанга
    suspender_style:
      name: Стил на тиранти
      description: 'Определя стила на тиранти, напр. X-гръб, Y-гръб '
    sustainability:
      name: Устойчивост
      description: Подчертава продукти, които поддържат устойчиви практики, напр.
        справедлива търговия, отговорно добиване
    swab_end_configuration:
      name: Конфигурация на краищата на клечката
      description: Показва дали клечката има един използваем край, или два, и дали
        те се различават
    swab_material:
      name: Материал за тампон
      description: Указва тъканта на тампона за почистване на музикален инструмент,
        напр. коприна, филц
    swimwear_features:
      name: Характеристики на бански костюми
      description: Идентифицира специалните характеристики на банските костюми, като
        бързо съхнене или UPF слънцезащита
    swing_style:
      name: Стил на удар
      description: Класифицира въз основа на техника на замах, обикновено за тенис
        ракети; например дълги удари
    swing_weighting:
      name: Претегляне на удар
      description: Показва разпределението на теглото на бейзболна или софтболна бухалка,
        напр. балансирано, крайно натоварване
    switch_control_type:
      name: Тип управление на превключване
      description: Описва как се управлява превключвател за светлина, като бутон или
        сензор
    switch_management_type:
      name: Тип управление на комутатора
      description: Класифицира нивото или стила на управление и конфигурация, която
        комутаторът поддържа (напр. неуправляем, интелигентен, уебуправляем, напълно
        управляем)
    switch_mechanism:
      name: Механизъм на комутатора
      description: Идентифицира вътрешната технология за задействане на бутона (напр.
        микрокомутатор, оптичен), която влияе върху усещането, продължителността на
        живота и реагирането
    switch_stem_compatibility:
      name: Съвместимост със „стъблото“ на комутатора
      description: Идентифицира механичните или други видове „стъбла“ на комутатори,
        към които капачките на клавиатурата или комплектът клавиши пасват
    switching_layer:
      name: Слой на комутация
      description: Показва най-високият OSI слой, на който комутаторът работи директно
        (напр. слой 2, слой 3, хибриди).
    switching_method:
      name: Метод на превключване
      description: Определя метода, използван за превключване между различни входове
        в електронни продукти; например дистанционно управление
    synthesis_method:
      name: Метод на синтез
      description: Указва метода за синтез на звук в електронни инструменти, като
        виртуални аналогови или модулни
    system/power_cable_connector_type_end_a:
      name: Тип конектор на системен/захранващ кабел (край А)
      description: Идентифицира точния стандарт на конектора, наличен на първия край
        на кабела (напр. IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: Тип конектор на системен/захранващ кабел (край Б)
      description: Идентифицира точния стандарт на конектора, наличен на втория край
        на кабела (напр. IEC C13, DC 5,5 × 2,1 мм, бананов щепсел).
    system_components_included:
      name: Включени системни компоненти
      description: Посочва ключовите хардуерни части, доставени със системата, така
        че купувачите да разберат какво е или не е част от пакета
    system_of_measurement:
      name: Система за измерване
      description: Идентифицира мерната единица, използвана в даден продукт, като
        имперска или метрична
    system_range:
      name: Обхват на системата
      description: Определя оперативната област на медицински алармени системи, напр.
        домашни, GPS
    systems_supported:
      name: Поддържани системи
      description: Указва платформите за игри, с които продуктът е съвместим; например
        Xbox, Nintendo switch
    tab_style:
      name: Стил на раздела
      description: Указва стила на разделите на аксесоарите за подвързване, напр.
        предварително отпечатани, номерирани
    tablet_case_functional_features:
      name: Функционални характеристики на калъфа за таблет
      description: Подчертава ключови функционални допълнения, включени в калъфа за
        таблет
    tabletop_color:
      name: Цвят на плота
      description: Указва цвета на горната повърхност на масата, като черно или бяло
    tabletop_material:
      name: Материал за плот
      description: Идентифицира състава на повърхността на масата, например шперплат,
        бетон
    tabletop_pattern:
      name: Десен на плот
      description: Определя дизайна или отпечатъка върху повърхност на маса, като
        Коледа или масив
    tabletop_shape:
      name: Форма на плот
      description: Описва геометричната форма на плота на масата, например квадратна,
        бъбрековидна
    tableware_material:
      name: Материал на посудата за хранене
      description: Определя състава на посудата за хранене, като костен порцелан или
        фаянс
    tack/pushpin_head_design:
      name: Дизайн на главата на щифта
      description: Описва формата на главичката на щифта - кръгла или декоративна.
    tag_fastening:
      name: Закрепване на етикет
      description: Описва метода, използван за закрепване на етикет към багажа, като
        катарами или примки
    talc_content:
      name: Съдържание на талк
      description: Посочва дали формулата съдържа талк, дали е без талк, или използва
        намалени нива на талк
    tampon_absorbency_level:
      name: Ниво на абсорбция на тампона
      description: Идентифицира абсорбиращия капацитет на тампоните, като лек или
        тежък
    tampon_features:
      name: Характеристики на тампона
      description: Описва специфичните характеристики на тампоните, като удобен дизайн
        или непропускливост
    tan_type:
      name: Тип тен
      description: Определя интензитета на цвета и процеса на нанасяне на артикулите
        за тен, напр. тъмен, незабавен
    tank_color:
      name: Цвят на казанче
      description: Идентифицира цвета на продукт, обикновено тоалетни казанчета; например
        черно, бяло
    tank_material:
      name: Материал на резервоара
      description: Указва материала на резервоара на продукта, обикновено за градински
        инструменти; например метал, пластмаса
    tank_pattern:
      name: Шарка на казанче
      description: Идентифицира визуалния мотив върху тоалетните казанчета, като плътен
        или абстрактен
    tape_cartridge_format:
      name: Формат на лентовата касета
      description: Определя технологиите за лентови касети (напр. LTO, DAT, DLT),
        които устройството може да чете или записва
    tape_cartridge_generation:
      name: Поколение на лентовата касета
      description: Показва специфичното поколение или версия в семейството на лентова
        технология (най-често поколения LTO), което устройството поддържа
    tape_material:
      name: Материал на лента
      description: Указва вида на материала, използван в лентовите продукти, като
        винил или пластмаса
    tape_speed_supported:
      name: Поддържана скорост на лентата
      description: Посочва скоростите на възпроизвеждане и запис на лентата (инчове
        в секунда), с които устройството с магнетофонни ролки може да работи
    target_audience:
      name: Целева аудитория
      description: Указва за кого е подходящ даден продукт, като например деца или
        всички възрасти
    target_facial_zone:
      name: Целева лицева зона
      description: Определя лицевата зона, за която лентата за пори е предназначена
        да третира (напр. нос, брадичка, Т-зона)
    target_gender:
      name: Целеви пол
      description: Идентифицира предвидения пол за продукт, като женски, мъжки или
        унисекс
    targeted_pests:
      name: Целеви вредители
      description: Идентифицира типа вредители, срещу които даден продукт е ефективен,
        напр. мухъл, водорасли
    targeted_skin_concern:
      name: Целеви кожен проблем
      description: Показва специфичната лезия или кожно състояние, за чието лечение
        е формулиран продуктът
    targeted_stains:
      name: Целеви петна
      description: Идентифицира типовете петна, за които е предназначен продуктът,
        като храна или кал
    tea_input_type:
      name: Тип приготвяне на чай
      description: Указва начина на приготвяне на чай, напр. торбички, K-чаши
    technology_level:
      name: Технологично ниво
      description: Показва сложността на технологията на продукта, напр. базова, напреднала
    teeth_material:
      name: Материал на зъбците
      description: Идентифицира материала, използван в зъбците, обикновено за градински
        инструменти; например пластмаса, метал
    telephone_cable_interface:
      name: Интерфейс за телефонен кабел
      description: Определя типа щепсел, използван в телефонните кабели, като RJ-10
    telephone_cable_second_interface:
      name: Втори интерфейс на телефонния кабел
      description: Определя типа на конектора на противоположния край на кабела, когато
        се различава от основния интерфейс (напр. RJ45 към RJ11)
    telephone_cord_style:
      name: Стил на телефонен кабел
      description: Определя физическата форма на телефонния кабел, помагайки на клиенти,
        които се нуждаят от прав, спираловиден или специален кабел за резервни слушалки
        и стенни стойки.
    telephone_style:
      name: Стил на телефон
      description: Определя дизайна или естетиката на телефон, напр. винтидж, модерен
    telescope_level:
      name: Ниво за използване на телескоп
      description: Показва сложността или нивото на умения, необходимо за телескоп,
        като начинаещи или напреднали
    telescope_tracking_system:
      name: Система за проследяване на телескоп
      description: Идентифицира вида на системата за проследяване в телескопите, напр.
        ръчна, моторизирана
    television_circuit_board_type:
      name: Тип печатна платка за телевизор
      description: Идентифицира функционалната роля на печатната платка в телевизионен
        комплект (например основна платка, платка за захранване, T-Con платка)
    television_shape:
      name: Форма на телевизор
      description: Определя физическия контур на телевизионния екран, като извит или
        плосък
    television_speaker_position:
      name: Позиция на телевизионния високоговорител
      description: Идентифицира физическото местоположение или роля на високоговорителя
        в телевизионната сглобка (например ляв, десен, централен, субуфер)
    television_specialized_features:
      name: Специализирани телевизионни функции
      description: Идентифицира уникалните възможности на телевизора, като гласово
        управление или вградена звукова лента
    temperature:
      name: Температура
      description: Определя настройките за топлина за устройства като пистолети за
        лепило, напр. двойно, високо
    temperature_control:
      name: Контрол на температурата
      description: 'Определя възможността за регулиране на температурата на продукта,
        обикновено за нагреватели за бутилки; например регулируеми, предварително
        зададени '
    temperature_measurement:
      name: Измерване на температура
      description: Показва дали продуктът измерва във Фаренхайт или Целзий
    template_type:
      name: Тип шаблон
      description: Указва категорията на шаблоните на документи, например визитна
        картичка, листовка
    temple_color:
      name: Цвят на рамка
      description: Указва цвета на рамката или завитата част на рамката на очилата,
        като червено или прозрачно
    temple_pattern:
      name: Шарка на рамка
      description: Описва дизайна или мотива върху завитата част на рамката на очилата,
        като лого или каре
    tension:
      name: Опън
      description: Описва нивото на опън на струните за музикални инструменти, напр.
        изключително тежко
    tensioning_system:
      name: Система за опън
      description: Описва механизма, използван за поддържане на повърхността на екрана
        плоска и без гънки
    tent_setup_style:
      name: Стил на поставяне на палатката
      description: Показва как палатката се разгръща или сглобява
    tequila_variety:
      name: Сорт текила
      description: Указва типа текила, напр. златна, отлежала
    terminal_operation:
      name: Работа на терминал
      description: Определя типа работа на касовите апарати, като ръчни или електронни
    termination_method:
      name: Метод на терминиране
      description: Определя техниката, използвана за прикрепване на проводниците към
        контактите на конектора (напр. пресоване, спойка, връзка чрез изместване на
        изолацията)
    terrain:
      name: Терен
      description: Указва вида на земята, за която е проектиран продукт, обикновено
        за външно оборудване; например планина, търкаляне
    test_format:
      name: Формат на теста
      description: Определя типа тест за продукти за здраве и красота, напр. дигитален,
        тест лента
    test_method:
      name: Метод на изпитване
      description: Определя процедурата за провеждане на медицински тест, например
        тест у дома, лабораторен анализ
    test_sample:
      name: Тестова проба
      description: Указва вида на пробата, необходима за здравни и медицински тестове,
        напр. тампон, слюнка
    tetherball_equipment_included:
      name: Включено оборудване за тетърбол
      description: Показва включването на основни предмети в комплекта тетърбол, като
        въже или тетърбол
    tethering_policy:
      name: Правила за тетъринг
      description: Изяснява дали мобилната точка за достъп, или тетърингът са разрешени
        според условията на плана за електронната SIM карта
    text_plate_material:
      name: Материал на табела с текст
      description: Идентифицира материала на табелата с текст върху офисните печати,
        като метал или гума
    textile_craft_machine_features:
      name: Характеристики на текстилна машина
      description: Описва специални характеристики на машините за текстилни занаяти,
        като регулируемо напрежение или преносими
    textile_craft_project_type:
      name: Тип текстилен занаятчийски проект
      description: Идентифицира типа текстилен занаятчийски проект, като плетене или
        ватиране
    texture:
      name: Текстура
      description: Определя усещането или консистенцията на продукт, като кремообразен,
        матов или абсорбиращ
    texture_level:
      name: Ниво на текстура
      description: Показва гладкостта или грубостта на продукта, обикновено за хранителни
        пюрета; напр. ниво 1 (пюре), ниво 2 (кайма)
    theme:
      name: Тема
      description: Описва основната тема или мотив на продукта, като спорт, космос
        или празници
    therapeutic_features:
      name: Терапевтични характеристики
      description: Посочва допълнителни терапевтични модалности, интегрирани в шината
        за врат
    therapeutic_swing_accessories_included:
      name: Включени аксесоари за терапевтична люлка
      description: Посочва допълнителен хардуер или аксесоари, доставени с люлката
    therapy_mode_supported:
      name: Поддържан терапевтичен режим
      description: Изброява алгоритмите за дихателна терапия, в които устройството
        може да работи, извън стандартния APAP
    therapy_temperature_type:
      name: Тип температурна терапията
      description: Показва дали продуктът осигурява топлинна терапия, студена терапия
        или и двете
    thermal_detector_type:
      name: Тип термичен детектор
      description: Указва технологията, използвана за термично откриване в устройства,
        като детектор за аморфен силиций (a Si)
    thermal_sensation:
      name: Топлинно усещане
      description: Описва възприемания температурен ефект върху кожата след нанасяне
    thermocouple_type:
      name: Тип термодвойка
      description: Указва категорията на термодвойката в сензорите, напр. тип J, тип
        S
    thickness_type:
      name: Тип дебелина
      description: Показва нивото на дебелина за елементи като тънки, средни или дебели
    thinner_application:
      name: Приложение на разредител
      description: Описва типа вещество, за което се използва разредител, като боя
        или епоксидна смола
    thread_direction:
      name: Посока на резбата
      description: Идентифицира посоката на резбата на железарските изделия, например
        лява или дясна
    threaded_rod_size:
      name: Размер на шпилка
      description: Определя диаметъра на шпилка, например M10, M20
    throw_pillow_shape:
      name: Форма на декоративна възглавница
      description: Идентифицира формата на декоративни възглавници, като подложка
        или правоъгълна
    thumb_grip_profile:
      name: Профил на захвата за палец
      description: Описва повърхността или стила на формата на горната част на захвата
        за палец (напр. вдлъбнат, куполовиден), което влияе на захвата и усещането
        за контрол
    ticket_additional_features:
      name: Допълнителни функции на билета
      description: Подчертава допълнителни предимства, предлагани с билети, като срещи
        и поздрави или дейности след събитието
    ticket_class:
      name: Клас на билета
      description: Посочва нивото на обслужване или класа на местата, предоставени
        с билета
    ticket_type:
      name: Тип билет
      description: Идентифицира категорията билети за събития, като общ вход или запазени
        места
    tile_design:
      name: Дизайн на плочки
      description: Описва шарката или стила на плочка, като например геометрична или
        рибена кост
    tile_game_type:
      name: Тип игра с плочки
      description: Идентифицира конкретния тип игра с плочки, като домино или маджонг
    tile_installation_method:
      name: Метод на монтаж на плочки
      description: Описва как се монтира даден продукт, обикновено таван или стенни
        плочки; напр. монтаж на място
    tile_look:
      name: Изглед на плочки
      description: Описва външния вид или стила на плочка, като мрамор или 3D
    tile_material:
      name: Материал за плочки
      description: Идентифицира състава на плочки, като керамика или камък
    tile_texture:
      name: Текстура на плочки
      description: Описва усещането за повърхността на плочка, като например гладка
        или текстурирана
    time_period:
      name: Период от време
      description: Указва времевата рамка, свързана с академични статии или изследвания,
        като средновековна или индустриална революция
    time_signatures:
      name: Времеви означения
      description: Определя структурата на ударите, обикновено за метрономи; например
        4/4, 3/4
    time_weighting:
      name: Времево претегляне
      description: Използва се за указване колко бързо звукомерът реагира на звукови
        колебания, напр. бавно, бързо
    timepiece_features:
      name: Характеристики на часовника
      description: Идентифицира специални характеристики на часовник, като регулируема
        продължителност или осветяване
    timer_design:
      name: Дизайн на таймер
      description: Описва типа таймер, използван в оборудването за тъмни стаи, като
        цифров или аналогов
    timer_features:
      name: Характеристики на таймера
      description: Описва специалните функции на таймера, като регулируема продължителност
        или вграден дисплей
    timer_type:
      name: Тип таймер
      description: Указва настройката на честотата за таймерите, напр. ежедневно,
        седмично
    tingle_intensity:
      name: Интензивност на изтръпването
      description: Описва нивото на топлина или изтръпване, произведено от продукта
        при нанасяне
    tip_design:
      name: Дизайн на върха
      description: Указва вида на върха на медицински игли и спринцовки, като луер
        заключване или плъзгащ се накрайник
    tip_material:
      name: Материал на накрайника
      description: Указва материала, използван за накрайника на продукта, като бамбук
        или пластмаса
    tip_opening:
      name: Отвор за накрайник
      description: Описва ширината на отвора на мундщука при духови инструменти, като
        среден или голям
    tip_style:
      name: Стил на накрайник
      description: Описва дизайна на накрайника на продукта, например под ъгъл, извит
    tip_type:
      name: Тип накрайник
      description: Определя вида на накрайник на риболовни копия, като длето или двоен
        шип
    tire_bead_type:
      name: Тип борд на гумата
      description: Указва вида борд в гумите за велосипеди, като сгъваеми или твърди
    tobacco_type:
      name: Тип тютюн
      description: Указва сорта тютюн, напр. турски, вирджиния
    toddler_bed_features:
      name: Характеристики на легло за малки деца
      description: Описва специалните характеристики на леглата за малки деца, като
        регулируема височина или вградена нощна лампа
    toe_spacer_design:
      name: Дизайн на разделител на пръстите на краката
      description: Описва конструкцията на разделителите на пръстите на краката, използвани
        в грижата за краката, напр. контурна конструкция, конструкция с примки
    toe_strap_type:
      name: Тип каишка за пръсти на краката
      description: Указва дизайна на каишката за пръстите на краката, обикновено за
        връзки за сноуборд или снегоходки; например капачка на пръстите или традиционна
    toe_style:
      name: Стил на пръстите
      description: Определя формата или дизайна на носа на обувката, като отворен
        или заострен
    toilet/bidet_mounting_type:
      name: Тип монтаж на тоалетна/биде
      description: Идентифицира как се монтира тоалетна или биде, като монтирано на
        пода или на стена
    toilet_cover_design:
      name: Дизайн на тоалетна чиния
      description: Описва формата на тоалетните капаци, като кръгли или удължени
    toilet_cover_features:
      name: Характеристики на капака на тоалетната
      description: Описва специалните характеристики на капака за тоалетна, като бързо
        освобождаване или плавно затваряне
    toilet_mounting_type:
      name: Тип монтаж на тоалетна
      description: Определя метода на монтаж на тоалетна, например монтирана на стена,
        монтирана на пода
    toilet_shape:
      name: Форма на тоалетна
      description: Описва формата на тоалетна, като кръгла или правоъгълна
    tom_tom_design:
      name: Дизайн на том-том
      description: Описва типа на барабана том-том, например подов или за стойка
    tonearm_type:
      name: Тип на рамото
      description: Описва геометрията на рамото, която влияе върху производителността
        на проследяване и използваемостта от DJ
    tool/utensil_material:
      name: Материал за инструмент/прибор
      description: Идентифицира основния материал, използван в инструмент или прибор,
        като неръждаема стомана или тиково дърво
    tool_key_tip:
      name: Накрайник на ключ на инструмента
      description: Указва вида на накрайника на ключа на инструмента, като Phillips
        или гаечен ключ
    tool_mobility:
      name: Мобилност на инструмента
      description: Описва дали даден инструмент е с кабел или без кабел, обикновено
        за стоматологични продукти
    tool_operation:
      name: Работа с инструмента
      description: Описва как се управлява даден инструмент, например ръчно или със
        захранване
    toothbrush_head_size:
      name: Размер на главата на четката за зъби
      description: Определя относителния размер на почистващата глава за различни
        размери на устата и нужди от почистване
    toothbrush_head_type:
      name: Тип глава на четката за зъби
      description: Класифицира функционалния стил на главата (напр. за избелване,
        грижа за венците, за деца)
    toothpaste_type:
      name: Вид паста за зъби
      description: Определя специфичната функция на пастата за зъби, като например
        против кариес или избелване
    toothpick_design:
      name: Дизайн на клечка за зъби
      description: Указва формата на клечките за зъби, например кръгли или плоски
    top_color:
      name: Цвят на повърхност
      description: Определя основния цвят на горната повърхност на продукта, напр.
        прозрачен, бронзов
    top_length_type:
      name: Тип дължина на горна дреха
      description: Определя дължината на топове или ризи, като кроп топ или дълги
    top_material:
      name: Материал на повърхност
      description: Определя материала на горната повърхност на продукта, например
        дърво, стъкло
    top_pattern:
      name: Десен на повърхност
      description: Описва дизайна или отпечатъка върху повърхността на продукт, като
        цветя или райета
    top_surface_material:
      name: Материал на горната повърхност
      description: Указва материала, използван за горната повърхност на продукта,
        като например неръждаема стомана или керамично стъкло
    top_up_method:
      name: Метод за допълване
      description: Посочва начините, по които клиентите могат да добавят допълнителен
        кредит или да подновят плана на предплатената карта или SIM картата.
    tote_handle_type:
      name: Тип дръжка за чанта тип „тоут“
      description: Идентифицира стила на дръжките на чанта тип „тоут“, като къса или
        дълга
    totem_design:
      name: Дизайн на тотем
      description: Определя дизайна на тотеми за търговско изложение, като едностранни
        или двустранни
    touch_capabilities:
      name: Сензорни възможности
      description: Посочва типа на сензорно взаимодействие, което поддържа дадена
        електроника, например единично или двойно
    touchpad_form_factor:
      name: Типоразмер на сензорния панел
      description: Определя предназначения стил на инсталиране или използване на сензорния
        панел
    touchscreen_technology:
      name: Сензорна технология
      description: Идентифицира технологията на сензорния екран за интерактивни устройства,
        като капацитивни или резистивни
    touchscreen_wire_configuration:
      name: Конфигурация на проводниците на сензорния екран
      description: Показва броя на проводниците или линиите, използвани от резистивни
        сензорни екрани, засягащи съвместимостта с контролери
    toy/game_material:
      name: Материали за играчки/игри
      description: Идентифицира основния материал, използван в играчка или игра, като
        пластмаса или дърво
    toy_figure_features:
      name: Характеристики на фигурата на играчката
      description: Подчертава специалните характеристики на фигурите на играчките,
        като шарнирни стави или реалистични детайли
    toy_figure_theme:
      name: Тема на фигура на играчка
      description: Идентифицира темата или категорията на фигура на играчка, като
        животно или спорт
    toy_tool_type:
      name: Тип инструмент-играчка
      description: Идентифицира типа инструмент-играчка в комплект за игра, като бормашина
        или чук
    track_configuration:
      name: Конфигурация на записите
      description: Показва формата на лентовия запис и каналите, които машината може
        да записва или възпроизвежда (например стерео спрямо моно, брой записи)
    tracker_form_factor:
      name: Типоразмер на тракера
      description: Определя физическият стил и форма на хардуера на тракера
    tracking_metrics:
      name: Проследяване на показатели
      description: Указва данните за здравето и фитнеса, наблюдавани от продукта,
        напр. сън, крачки
    tracking_purpose:
      name: Цел на проследяването
      description: Указва предвидената употреба на GPS устройства за проследяване,
        като проследяване на активи или проследяване на домашни любимци
    tractor_accessories_included:
      name: Включени аксесоари за трактор
      description: Указва допълнителни функции, предоставени с трактора, като комплект
        за мулчиране или нож за сняг
    trade_show_display_features:
      name: Характеристики на дисплей за търговски изложения
      description: Идентифицира специалните характеристики на дисплеите на търговски
        изложения, като сензорен екран или осветление
    trading_card_packaging:
      name: Опаковка за карти за размяна
      description: Идентифицира как са опаковани картите за размяна, като например
        блистер или бустер пакет
    traffic_control_device_features:
      name: Характеристики на устройството за контрол на трафика
      description: Идентифицира уникални характеристики на елементите за контрол на
        трафика, като за подреждане или претеглена основа
    trail_camera_design:
      name: Дизайн на камера за проследяване
      description: Описва типа камера за проследяване, като стандартна или клетъчна
    trailer_type:
      name: Тип ремарке
      description: Идентифицира дизайна или стила на ремарке на моторно превозно средство,
        например отворено или затворено
    training_data_requirements:
      name: Изисквания за данни за обучение
      description: Идентифицира вида и качеството на данните, необходими за ефективно
        обучение на AI или софтуер за машинно обучение, напр. етикетирани данни
    trampoline_design:
      name: Дизайн на батут
      description: Описва конструкцията на батут, като пружинна или спирална пружина
    transceiver_form_factor:
      name: Типоразмер на приемопредавателя
      description: Определя физическия модулен стандарт на мрежовия приемопредавател
        (напр. SFP, QSFP28)
    transcriber/dictation_system_features:
      name: Функции на системата за препис/диктовка
      description: Идентифицира специални характеристики на системи за препис или
        диктовка, като захранване с изкуствен интелект или намаляване на шума
    transfer_aid_type:
      name: Тип помощно средство за трансфер
      description: Класифицира стила на помощното средство, разграничавайки твърди
        дъски от гъвкави чаршафи и въздушни матраци
    transfer_board_shape:
      name: Форма на дъската за трансфер
      description: Определя геометричния профил на дъската или чаршафа, което влияе
        върху пътя на трансфер и съвместимостта с различни височини на седалки или
        легла
    transfer_boards_surface_type:
      name: Тип повърхност на платки за прехвърляне
      description: Указва повърхностната текстура на платките за прехвърляне на мобилност,
        напр. подплатени, гладки
    transfer_paper_technique:
      name: Техника на трансферна хартия
      description: Идентифицира метода, използван с трансферна хартия, като например
        мастиленоструйна или ютия
    transmission_type:
      name: Тип трансмисия
      description: Идентифицира типа трансмисия в превозни средства или части, като
        ръчна или автоматична
    transmitter_form_factor:
      name: Типоразмер на предавателя
      description: Класифицира физическия стил или корпус на предавателния блок, за
        да помогне на купувачите бързо да намерят формата, която отговаря на тяхното
        приложение
    transport_type:
      name: Тип транспорт
      description: Посочва вида обществен транспорт, за който билетът или картата
        са валидни
    trash_can_features:
      name: Функции на кофата за боклук
      description: Описва специалните характеристики на кофите за боклук, като контрол
        на миризмата или крачен педал
    travel_pillow_features:
      name: Характеристики на възглавницата за пътуване
      description: Изброява специални функционални характеристики, аксесоари или подобрения
        на дизайна на възглавницата за пътуване
    travel_pillow_shape:
      name: Форма на възглавница за пътуване
      description: 'Описва физическия контур на възглавници за пътуване, като J-образна
        форма '
    tray_compatibility:
      name: Съвместимост с шината
      description: Идентифицира стила на шината за избелване или накрайника, за който
        кутията е предназначена да побере
    treatment_area:
      name: Зона за третиране
      description: Указва частта от тялото, към която е насочен продукт, обикновено
        за артикули за масаж; например гръб, шия
    treatment_method:
      name: Метод на лечение
      description: Описва механизма или технологията за доставка, която продуктът
        използва за елиминиране на лезията (напр. криотерапия, химическа киселина,
        микроиглена лепенка)
    treatment_modes:
      name: Режими на лечение
      description: Изброява функционалните режими, които устройството поддържа (напр.
        HR, SHR, SR)
    treatment_objective:
      name: Цел на лечението
      description: Определя проблема, който продуктът адресира, обикновено за артикули
        за лична хигиена; например хъркане, треска
    treatment_target_area:
      name: Целева зона на третирането
      description: Показва дали продуктът е формулиран за мигли, вежди или и двете
    treatment_texture:
      name: Текстура на продукт за лечение
      description: Определя консистенцията на продуктите за лечение, като крем за
        обрив от пелени; например дебела, пудра
    treatment_type:
      name: Вид лечение
      description: Указва метода на лечение, обикновено за лечение на косопад; например
        лазер, локално
    tree_stand_material:
      name: Материал на стойка за дърво
      description: Указва от какво е направена стойка за дърво, например пластмаса
        или метал
    trellis_design:
      name: Дизайн на пергола
      description: Идентифицира дизайна на решетката в огради или прегради, напр.
        квадрат, ромб
    tricycle_design:
      name: Дизайн на триколка
      description: Описва стила на триколката, като изправена или легнала
    tricycle_propulsion_type:
      name: Тип задвижване на триколка
      description: Указва как се задвижва триколка, като например бутане или предно
        задвижване
    trip_type:
      name: Тип изключване
      description: Указва вида на изключването на прекъсвач, напр. несменяем
    tripod/monopod_attachment_type:
      name: Тип закрепване за статив/монопод
      description: Указва типа връзка за аксесоари за статив или монопод, като 3/8
        или универсален
    tripod/monopod_head_type:
      name: Тип глава за статив/монопод
      description: Указва механизма на главите на статив/монопод, като редуктор или
        кардан
    tripod_handle_type:
      name: Тип дръжка за статив
      description: Указва функционалността на дръжките на статив, напр. многофункционална,
        пистолетна дръжка
    trophy_design:
      name: Дизайн на трофей
      description: Описва специфичния стил или форма на трофей, като например чаша
        или звезда
    truck_type:
      name: Тип камион
      description: Класифицира типа на камиона, например самосвал или плоскотоварен
        камион
    tube_component:
      name: Тръбен компонент
      description: Указва вида на тръбата в музикалните усилватели, напр. кутия, стойка
    tube_configuration:
      name: Конфигурация на тръбата
      description: Описва разположението на тръбите в усилвател на музикален инструмент,
        като единична тръба или съвпадащ чифт
    tuner_design:
      name: Дизайн на тунер
      description: Описва стила на електронните тунери за музикални инструменти, като
        clip-on или педал
    tuner_type:
      name: Тип тунер
      description: Определя вида на приеманата радиочестота, като AM/FM или сателитно
        радио
    tuning_fork_design:
      name: Дизайн на камертон
      description: Описва специфичния дизайн на камертон, като претеглен или непретеглен
    tuning_fork_frequency:
      name: Честота на камертон
      description: Указва честотата на камертон, като например 128 Hz или 256 Hz
    tuning_modes:
      name: Режими на настройка
      description: Идентифицира специфичните настройки на инструмента за електронни
        тунери, като китара или цигулка
    tuning_pitch:
      name: Настройка на височината
      description: Указва височината на настройка на инструмент, като C# или Ab
    tuning_range:
      name: Диапазон на настройка
      description: Указва диапазона от налични опции за настройка, като стандартен
        или отворен
    tv_broadcast_standards_supported:
      name: Поддържани телевизионни излъчвателни стандарти
      description: Изброява специфичните телевизионни излъчвателни или кабелни/сателитни
        стандарти, които картата или адаптерът могат да декодират или приемат
    uc_platform_certification:
      name: Сертифициране на UC платформа
      description: Идентифицира платформи за унифицирани комуникации или срещи, за
        които устройството е официално сертифицирано.
    ultrasound_probe_type:
      name: Тип ултразвукова сонда
      description: Идентифицира конструктивните характеристики на сондата, снабдена
        с монитор (напр. водоустойчива, вътрешна)
    undershirt_style:
      name: Стил на долна дреха
      description: Описва дизайна или кройката на долна дреха, като кръгло деколте
        или V-образно деколте
    underwear_style:
      name: Стил бельо
      description: Определя дизайна и кройката на бельо, като бикини или цели слипове
    units_of_measurement:
      name: Мерни единици
      description: Указва измервателната система, използвана за продукта, напр. милиметри
        (mm), Фаренхайт (°F)
    update_frequency:
      name: Честота на актуализиране
      description: Показва редовността на актуализациите за софтуер или данни, например
        в реално време, ежегодно
    upholstery_color:
      name: Цвят на тапицерията
      description: Идентифицира цвета на тапицерията на продукта, като червен или
        бежов
    upholstery_material:
      name: Материал на тапицерията
      description: Идентифицира тъканта, използвана за тапицерия, като кожа или кадифе
    upholstery_pattern:
      name: Десен на тапицерия
      description: Описва визуалния дизайн върху мебелен плат, например райе или каре
    uplink_port_type:
      name: Тип порт за изходяща връзка
      description: Определя най-високоскоростният конектор за изходяща връзка, присъстващ
        на комутатора (напр. SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: UPS топология
      description: Показва вътрешния дизайнерски подход, който UPS използва за обработка
        и подаване на захранване (напр. в готовност, линейно-интерактивен, онлайн)
    urinal_mounting_type:
      name: Тип монтаж на писоар
      description: Указва как се монтира писоар, напр. на стена или на пода
    usage_conditions:
      name: Условия за ползване
      description: Указва дали продуктът е подходящ за употреба в сухи или мокри условия,
        обикновено за самобръсначки
    usage_environment:
      name: Среда на употреба
      description: Определя къде е предназначен продуктът за тен да се използва
    usage_frequency:
      name: Честота на употреба
      description: Указва препоръчителната честота на употреба на продукта, като ежедневна
        или ежеседмична
    usage_type:
      name: Тип употреба
      description: Указва предвидения цикъл на употреба на продукта, напр. за многократна
        употреба, за многократно пълнене
    usb_connector_type:
      name: Тип USB конектор
      description: Идентифицира физическия(ите) USB конектор(и), предоставен(и) на
        устройството за данни и/или захранване.
    usb_standard:
      name: USB стандарт
      description: Указва USB версията за електронни устройства, като USB 2.0 или
        USB 3.1 Gen 1
    user_type:
      name: Тип потребител
      description: Идентифицира предвидения потребител на софтуерен продукт, като
        физическо лице или малък бизнес
    utility/maintenance_task_type:
      name: Тип задача за помощна програма/поддръжка
      description: Категоризира задачата, изпълнявана от софтуер, като почистване
        на диск или системен оптимизатор
    uv_blocking_class:
      name: Клас на UV блокиране
      description: Показва нивото на UV защита, вградено в контактната леща, както
        е определено от ISO стандартите
    uv_protection:
      name: UV защита
      description: Указва способността на продукта да блокира UV лъчите, обикновено
        за слънчеви очила; например UV400
    uva_protection_grade:
      name: Степен на UVA защита
      description: Показва степента на UVA защита на продукта, често изразена като
        PA степени
    vacuum_air_filtering_technology:
      name: Технология за вакуумно филтриране на въздуха
      description: Указва вида на въздушното филтриране, използвано в прахосмукачките,
        като HEPA или pet
    valve_type:
      name: Тип клапан
      description: Указва типа на клапана в части за велосипеди, напр. Presta, Schrader
    van_type:
      name: Тип ван
      description: Разграничава между различни видове ванове, като пътнически ван
        или преустроен ван
    vaping_style:
      name: Вейпинг стил
      description: 'Уточнява техниката за вейпинг на електронни цигари, напр. директно
        към белите дробове, от устата към белите дробове '
    varnish/finish_application:
      name: Нанасяне на лак/покритие
      description: Указва подходящите области на приложение за лак или покритие, като
        стени или врати
    vase_shape:
      name: Форма на ваза
      description: Описва геометричната или органична форма на ваза, като кръгла или
        бутилка
    vcr_configuration:
      name: Конфигурация на видеокасетофона
      description: Идентифицира дали устройството е самостоятелен видеокасетофон или
        комбинирано устройство с допълнителни устройства или тунери
    vdi_protocol_support:
      name: Поддръжка на VDI протокол
      description: Указва поддържаните протоколи за виртуална десктоп инфраструктура
        (VDI), напр. PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Функции за аларма/заключване на превозно средство
      description: Определя уникалните характеристики на системите за сигурност на
        автомобила, например дистанционно стартиране или устойчивост на атмосферни
        влияния
    vehicle_application_area:
      name: Област на приложение на превозното средство
      description: Указва частта от превозното средство, за която се отнася продуктът,
        като тапицерия или екстериор
    vehicle_audio_system_features:
      name: Характеристики на аудио системата на автомобила
      description: Идентифицира специални характеристики на аудио системата на автомобила,
        като усилване на басите или LED дисплей
    vehicle_braking_features:
      name: Спирачни характеристики на автомобила
      description: Описва специфичните характеристики на спирачните части на автомобила,
        като например устойчивост на корозия или пробиване
    vehicle_cleaning_item_features:
      name: Характеристики на елемента за почистване на превозни средства
      description: Подчертава предимствата на елементите за почистване на превозни
        средства, като подобрена горивна ефективност или силен гланц
    vehicle_decor_features:
      name: Характеристики на декорация на превозни средства
      description: Описва характеристиките на елементите за декорация на превозни
        средства, като UV устойчиви или водоустойчиви
    vehicle_drive/handling_features:
      name: Характеристики на задвижване/управление на превозното средство
      description: Описва характеристиките на частите на моторни превозни средства,
        обикновено в системите за трансмисия, задвижване, теглене и колела; напр.
        висока ефективност, устойчивост на топлина
    vehicle_engine/part_features:
      name: Характеристики на двигател/част на превозно средство
      description: Показва уникалните характеристики на частите на двигателя на моторно
        превозно средство, като икономия на гориво или подобрение на производителността
    vehicle_engine_features:
      name: Характеристики на двигател на превозно средство
      description: Описва специфични характеристики на двигателя на превозното средство,
        като висока ефективност или икономия на гориво
    vehicle_exhaust_type:
      name: Тип изпускателна система на превозно средство
      description: Идентифицира типа изпускателна система в превозно средство, като
        задна ос или турбо задна
    vehicle_features:
      name: Характеристики на превозно средство
      description: Описва специални характеристики или оборудване в превозно средство,
        като отопляеми седалки или навигационна система
    vehicle_floor_configuration:
      name: Конфигурация на пода на превозно средство
      description: Указва дизайна и оформлението на пода на превозното средство за
        пътуване до работното място, като например нисък или полунисък под
    vehicle_fluid_features:
      name: Характеристики на течности в превозното средство
      description: Описва специални свойства на течности в превозното средство, като
        антифриз или биоразградими
    vehicle_fluid_type:
      name: Тип течност в превозното средство
      description: Идентифицира типа течност, използвана при поддръжката на превозното
        средство, като концентрат или предварително разредена
    vehicle_frame/body_features:
      name: Характеристики на рамата/каросерията на превозното средство
      description: Описва специални характеристики на частите на каросерията на превозното
        средство, като боядисани или хромирани покрития
    vehicle_mirror_design:
      name: Дизайн на автомобилни огледала
      description: Определя конструктивните характеристики на огледалата за моторни
        превозни средства, като разтегателни или сгъваеми
    vehicle_mirror_features:
      name: Характеристики на автомобилни огледала
      description: Описва специални характеристики на автомобилни огледала, като автоматично
        затъмняване или отопление
    vehicle_mirror_type:
      name: Тип автомобилно огледало
      description: Идентифицира конкретния тип автомобилно огледало, като например
        за обратно или странично виждане
    vehicle_mounting_location:
      name: Местоположение за монтиране в превозното средство
      description: Указва зоната в превозното средство, където е предназначено да
        се инсталира стойката
    vehicle_oil_features:
      name: Свойства на автомобилното масло
      description: Описва уникалните свойства на моторното масло, като защита срещу
        износване или висока ефективност на филтриране
    vehicle_paint_type:
      name: Тип боя за автомобил
      description: Указва категорията на боята на превозното средство, като комплект
        боя или боя за каросерията на моторно превозно средство
    vehicle_placement:
      name: Разположение на превозното средство
      description: Указва къде на велосипед може да бъде поставен продуктът, напр.
        рамка, предна част
    vehicle_seating_features:
      name: Характеристики на седалките в превозното средство
      description: Описва специалните характеристики на седалките в превозното средство,
        като например отопление или накланяне
    vehicle_suspension_features:
      name: Характеристики на окачването на автомобила
      description: Определя уникалните характеристики на частите за окачване на автомобила,
        като регулируеми или хидравлични
    vehicle_tire_type:
      name: Тип автомобилна гума
      description: Указва сезонната или теренната пригодност на автомобилните гуми,
        като зимни или всякакви терени
    vehicle_type:
      name: Тип превозно средство
      description: Класифицира типа превозно средство, например SUV или ветроходна
        лодка
    ventilation_type:
      name: Тип вентилация
      description: Описва основния стил на вентилационните отвори или функциите за
        въздушен поток на корпуса, които управляват вътрешната температура
    verification_technology:
      name: Технология за проверка
      description: Идентифицира технологията, използвана в детекторите на банкноти,
        като магнитна или инфрачервена
    vesa_mounting_pattern:
      name: VESA монтажен шаблон
      description: Определя VESA разстоянието между отворите на гърба на монитора
        за съвместимост с монтажи, рамена и стойки
    vg/pg_ratio:
      name: Съотношение VG/PG
      description: Показва съотношението растителен глицерин към пропилей гликол в
        е-течности, напр. 30:70
    video_codecs/formats_supported:
      name: Поддържани видео кодеци/формати
      description: Определя видео кодеците и форматите, поддържани от устройството,
        като MP4 или H.264
    video_game_content_features:
      name: Характеристики на съдържанието на видеоигрите
      description: Идентифицира специални характеристики на софтуера за видео игри,
        напр. съдържание за изтегляне (DLC), ранен достъп
    video_game_format:
      name: Формат на видеоигра
      description: Указва метода на доставка и вида на носителя за видеоигри, като
        например цифров или физически.
    video_game_genre:
      name: Жанр видео игра
      description: Класифицира типа видео игра, като семейна или оцеляване
    video_game_platform:
      name: Платформа за видео игри
      description: Указва платформата, с която е съвместима видео играта, като PC
        или PlayStation 5
    video_game_sub_genre:
      name: Поджанр видео игра
      description: Идентифицира конкретната подкатегория на видео игра, като MMORPG
        или Battle Royale
    video_port_type:
      name: Тип видео порт
      description: Указва вида на видео порта, който продуктът поддържа, напр. HDMI,
        порт за дисплей
    video_recorder_type:
      name: Тип видеорекордер
      description: Указва основната записваща технология на устройството (например
        DVR, NVR, XVR)
    video_region_code:
      name: Регионален видео код
      description: Определя регионалната съвместимост на DVD и Blu-ray плейъри, като
        без регион или регион 1
    video_resolution_supported:
      name: Поддържана видео резолюция
      description: Определя яснотата или качеството на видеото, което устройството
        поддържа, като 1080p или ултра HD
    video_signal_standard:
      name: Стандарт на видео сигнала
      description: Указва аналоговите видео стандарти за излъчване, поддържани от
        устройството (например NTSC, PAL, SECAM)
    viewing_area_height:
      name: Височина на зрителната зона
      description: Определя височината на зрителната зоната в продукти като заваръчни
        шлемове, напр. средна, голяма
    viewing_area_width:
      name: Ширина на зрителната зона
      description: Определя ширината на зрителната зоната в продукти като заваръчни
        шлемове, напр. средна, голяма
    vinegar_drink_variety:
      name: Разновидност на напитката с оцет
      description: Указва вида напитка на основата на оцет, напр. комбуча, шраб
    vinegar_variety:
      name: Сорт оцет
      description: Разграничава различните видове оцет, например плодов, балсамов
    viscosity:
      name: Вискозитет
      description: Определя съпротивлението на потока на моторни масла, като 10W-40
        или 15W-50
    vision_correction_type:
      name: Тип корекция на зрението
      description: Показва оптичния дизайн, предназначен за коригиране на специфични
        зрителни състояния
    visual_effect:
      name: Визуален ефект
      description: Определя визуалните характеристики на продукт, типично за арт глазури;
        напр. петниста, текстурирана
    voice_recorder_form_factor:
      name: Типоразмер на диктофон
      description: Описва физическия стил или маскировка на рекордера, така че купувачите
        могат да изберат дизайна, който отговаря на техния случай на използване
    voip_protocol_support:
      name: Поддръжка на VDI протокол
      description: Указва протоколите за глас по интернет протокол (VoIP), които устройството
        може да поддържа, като SIP или IAX
    wader_type:
      name: Тип гащеризон
      description: Определя специфичния стил на гащеризони за риболов или лов, като
        ханш или кръст
    waist_rise:
      name: Повдигане на талията
      description: Показва къде на талията стои дадена дреха, например ниска, средна
        или висока
    walker_brake_type:
      name: Тип спирачка на проходилката
      description: Описва спирачния механизъм, вграден в проходилката
    walker_seat_type:
      name: Тип седалка на проходилката
      description: Идентифицира дали проходилката включва седалка и стила на седалката
    walker_type:
      name: Тип проходилка
      description: Класифицира структурния стил и предназначената употреба на проходилката
    walking_aid_tip_type:
      name: Тип накрайник на помощното средство за ходене
      description: Посочва стила или технологията на накрайника на бастуна за земята
    wall_material:
      name: Материал на стена
      description: Идентифицира материала, използван за стената на продукта, обикновено
        в сауни; например кедър
    wall_patching_application:
      name: Приложение за закърпване на стени
      description: Идентифицира подходящата повърхност за смес за закърпване, като
        дърво или гипс
    wall_plate_style:
      name: Стил на плочи за стена
      description: Описва дизайна на плочи или капаци за стена, като конвенционални
        или без винтове
    wallet_features:
      name: Характеристики на портфейл
      description: Описва специалните характеристики на портфейлите, като RFID защита
        или компактен дизайн
    wallpaper_application_method:
      name: Метод на поставяне на тапети
      description: Определя метода за поставяне на тапети, напр. отлепване и залепване
        или изискване на паста
    wallpaper_theme:
      name: Тема за тапет
      description: Идентифицира основния обект или стил на тапет на работния плот,
        като природа или абстрактен
    wan_interface_type:
      name: Тип WAN интерфейс
      description: Определя типа физическа връзка, използван за WAN/интернет връзката
        на рутера (напр. Ethernet, оптичен кабел, DSL, клетъчен)
    warning_category:
      name: Категория предупреждения
      description: Класифицира категорията на знаците за сигурност или безопасност,
        напр. забрана, предупреждение
    washer/dryer_features:
      name: Характеристики на пералня/сушилня
      description: Подчертава уникалните характеристики на пералните уреди, напр.
        заключване за деца, самопочистване
    washer_form:
      name: Форма на шайба
      description: Описва конкретния тип шайба в хардуерните аксесоари, като плоска
        или пружинна
    washing_machine_features:
      name: Характеристики на пералната машина
      description: Идентифицира специални функции на перална машина, като заключване
        за деца или таймер за отложен старт
    washing_method:
      name: Метод на пране
      description: 'Указва препоръчителния процес на почистване за даден продукт,
        например ръчно пране, машинно пране '
    washing_programs:
      name: Програми за пране
      description: Определя различните цикли на пране, които пералната машина предлага,
        като студено пране или деликатно пране
    waste_bag_features:
      name: Характеристики на торбичка за отпадъци
      description: Описва специалните характеристики на торбичките за отпадъци от
        домашни любимци, като биоразградими или непропускливи
    waste_bag_material:
      name: Материал на торбичка за отпадъци
      description: Идентифицира материала на торбичките за отпадъци, като пластмаса
        или биоразградими материали
    watch/band_material:
      name: Материал за часовник/каишка
      description: Указва типа материал за каишки за часовници, като найлон или силикон
    watch_accessory_style:
      name: Стил аксесоар за часовник
      description: Определя стила на аксесоарите за часовник, например спортен, модерен
    watch_display:
      name: Дисплей на часовника
      description: Разграничава дисплеите на часовника, като цифрови или аналогови
    watch_features:
      name: Функции на часовник
      description: Идентифицира специални характеристики на часовник, като автоматичен
        механизъм или светещи стрелки
    watch_material:
      name: Материал на часовник
      description: Указва вида на материала, използван за часовника, като титан или
        силикон
    water_filter_application:
      name: Приложение на филтър за вода
      description: Идентифицира предвидената употреба на филтър за вода, обикновено
        за уреди; например кафе машина, машина за лед
    water_flosser_modes:
      name: Режими на воден иригатор
      description: Изброява наличните режими на почистване, в които устройството може
        да работи
    water_sport:
      name: Водни спортове
      description: Указва водния спорт, за който е предназначен продуктът, като гмуркане
        с акваланг или каяк
    watercraft_engine_control_type:
      name: Тип управление на двигател на плавателен съд
      description: Идентифицира типа система за управление в двигател на плавателен
        съд, като газ или превключване
    watercraft_features:
      name: Характеристики на плавателен съд
      description: Описва удобства или системи на плавателен съд, като например кухня
        или спирачна система
    watercraft_motor_mounting_type:
      name: Тип монтаж на мотор на плавателен съд
      description: Идентифицира къде на плавателния съд е монтиран моторът, като нос
        или кърма
    watercraft_propulsion_type:
      name: Тип задвижване на плавателен съд
      description: Указва как се задвижва плавателен съд, например ръчно или моторизирано
    watercraft_steering_wheel_type:
      name: Тип волан за плавателен съд
      description: Указва вида на волана за плавателен съд, като електрически или
        стандартен
    watercraft_type:
      name: Тип плавателен съд
      description: Идентифицира категорията плавателен съд, като например спортен
        или луксозен
    waveski_features:
      name: Характеристики на уейвски
      description: Описва уникалните характеристики на уейвски, като регулируема презрамка
        или противоплъзгаща се лента
    wax_application_method:
      name: Метод на нанасяне на восък
      description: Указва техниката, използвана за нанасяне на восък върху екипировка
        за зимни спортове, като студен или горещ
    wax_type:
      name: Тип восък
      description: Указва типа восък в предмети като свещи, като соя или парафин
    wear_schedule:
      name: График на носене
      description: Определя максималната одобрена продължителност на последователно
        носене на лещата преди сваляне
    weather_alert_technology:
      name: Технология за предупреждение за времето
      description: Указва стандарта за предупреждение или сертификация, поддържан
        от радиото за автоматизирани аварийни предупреждения
    weather_strip_design:
      name: Дизайн на изолираща лента
      description: Описва формата на изолиращи ленти, като кръгли или плоски
    weather_supply_application_method:
      name: Метод на прилагане на метеорологичните консумативи
      description: Описва как се прилагат консумативи за защита от атмосферни влияния,
        като самозалепващи или незалепващи
    weatherization_application:
      name: Приложение за продукт за защита от атмосферни влияния
      description: Идентифицира къде се прилага продукт за защита от атмосферни влияния,
        като например прозорци или врати
    webcam_design:
      name: Дизайн на уеб камера
      description: Идентифицира типа уеб камера, като конферентна, лаптоп или plug-and-play
    weight_bar_activity:
      name: Дейност с щангата с тежести
      description: Уточнява предвиденото използване на щанги за вдигане на тежести,
        напр. пауърлифтинг, техническо обучение
    weight_bar_type:
      name: Тип щанга за тежести
      description: Указва дизайна на щанги за вдигане на тежести, като права или извита
    weight_loss_mechanism:
      name: Механизъм за отслабване
      description: Идентифицира основния физиологичен подход, който добавката използва
        за подпомагане на загубата на тегло
    weight_type:
      name: Тип тегло
      description: Описва теглото на артикулите, като леки, средни или тежки
    weight_unit_supported:
      name: Поддържана единица за тегло
      description: Дефинира единиците за тегло, които продуктът използва за измерване,
        напр. паунди, камъни
    welding_helmet_features:
      name: Характеристики на заваръчен шлем
      description: Идентифицира специални характеристики на заваръчните шлемове, напр.
        истински цвят, режим на шлифоване
    wet_bag_features:
      name: Характеристики на мокра торбичка
      description: Описва специфични характеристики на мокри торбички за пелени, като
        непропускливи или екологични
    wheel_hardness:
      name: Твърдост на колелото
      description: Определя нивото на твърдост на колелата на скейтборда, напр. 75A
    wheel_hub_placement:
      name: Разположение на главината на колелото
      description: Указва позицията на главината на колелото в скейтбордове, като
        център или отместване
    wheel_part_type:
      name: Тип част на колело
      description: Идентифицира специфичния компонент на системата на колелото на
        превозното средство, като лагер на колело или главина на колело
    wheel_style:
      name: Стил на джантата
      description: Описва физическата форма на джантата или стила на дисциплината
        на шофиране
    wheel_type:
      name: Тип колело
      description: Указва вида на колело за велосипедни продукти, като например надуваемо
        или твърдо
    wheelchair_type:
      name: Тип инвалидна количка
      description: Разграничава между различни видове инвалидни колички, напр. електрически,
        ръчни
    whiskey_style:
      name: Стил уиски
      description: Определя конкретния вид уиски, напр. единичен малц, смесен малц
    whiskey_variety:
      name: Сорт уиски
      description: Класифицира уискито въз основа на вида или вида на зърното, например
        царевица, ръж
    wi_fi_band:
      name: Wi-Fi лента
      description: Указва безжичния честотен обхват на устройство, като например 2,4
        GHz
    wi_fi_standard:
      name: Wi-Fi стандарт
      description: Указва протокола за безжична мрежа, като 802.11ac
    width_adjustment:
      name: Регулиране на ширината
      description: Показва дали ширината на оборудването може да бъде променена, за
        да пасне на различни приспособления, легла или потребители
    winder_features:
      name: Характеристики на устройство за навиване
      description: Описва специалните характеристики на устройствата за навиване на
        китарни струни, като устройство за издърпване на щифтове на мост или вграден
        нож
    windlass_design:
      name: Дизайн на лебедка
      description: Описва ориентацията на котвена лебедка, като хоризонтална или вертикална
    window_treatment_material:
      name: Материал за аксесоари за прозорци
      description: Определя състава на щори или сенници за прозорци, като алуминий
        или пластмаса
    windsurfing_board_style:
      name: Стил на дъска за уиндсърф
      description: Указва вида на дъската за уиндсърф, като свободен стил или слалом
    wine_rack_design:
      name: Дизайн на стелаж за вино
      description: Определя стила или естетиката на стелажа за вино, например модерен,
        традиционен
    wine_sweetness:
      name: Сладост на вино
      description: Помага за категоризиране на вина по степен на сладост, напр. сухи,
        сладки
    wine_variety:
      name: Винен сорт
      description: Помага за разграничаване на различни видове вина, например бяло,
        розе
    wing_style:
      name: Стил на крилцата
      description: Показва дали превръзката включва стабилизиращи крилца и ако да,
        какъв стил
    wipe_dispenser/warmer_features:
      name: Дозатор за кърпи/нагревател
      description: Описва специалните характеристики на дозаторите за кърпички и нагревателите,
        т.е. удобни за пътуване
    wipe_dispenser_features:
      name: Характеристики на дозатора за кърпи
      description: Описва специалните характеристики на дозаторите за кърпички, като
        разпределителен механизъм или LED индикатор
    wipe_fragrance:
      name: Аромат на кърпичка
      description: Идентифицира аромата на продуктите за почистване, като неароматизирани
        или лавандулови
    wipe_packaging:
      name: Опаковка за кърпички
      description: Определя контейнера или стила на опаковката за кърпички, напр.
        опаковка за повторно пълнене, с размер за пътуване
    wipe_purpose:
      name: Предназначение на кърпичките
      description: Идентифицира основното предназначение или ползата на кърпичките
    wipe_warmer_features:
      name: Функции на нагреватели за кърпички
      description: Подробности за специфичните характеристики на нагревател за кърпички,
        като например удобен за пътуване или задържане на влага
    wire/rope_material:
      name: Материал тел/въже
      description: Указва материала, използван в продуктите от тел или въже, като
        мед или полиестер
    wire_thickness:
      name: Дебелина на проводник
      description: Указва дебелината на проводниците, като дебели или фини
    wireless_charging_standard:
      name: Стандарт за безжично зареждане
      description: Идентифицира протокола(ите) за индуктивно зареждане, поддържан(и)
        от телефона.
    wireless_multi_room_platform:
      name: Безжична платформа за няколко помещения
      description: Определя собствената или екосистемата на трета страна, използвана
        за поточно предаване на аудио в няколко помещения
    wireless_streaming_protocols_supported:
      name: Поддържани протоколи за безжичен стрийминг
      description: Идентифицира стандартите или услугите за безжичен стрийминг, които
        стереоуредбата може да получава естествено
    wood_finish:
      name: Финиш на дърво
      description: Описва метода на довършителна обработка или изработка, прилаган
        върху дървени изделия (напр. масивна дървесина, фурнирована, инженерна, омаслена,
        лакирана, боядисана)
    woodwind_care_items_included:
      name: Включени артикули за поддръжка за дървени духови инструменти
      description: Идентифицира артикулите за поддръжка, включени в дървен духов инструмент,
        като четка за почистване или коркова грес
    work_capacity:
      name: Работен капацитет
      description: Описва нивото на производителност на даден продукт, като тежкотоварен
        или лекотоварен
    wreath_design:
      name: Дизайн на венец
      description: Идентифицира основния материал или формата на венец, като метал
        или обръч
    wrist_rest_features:
      name: Функции на подложката за китка
      description: Изброява специални функционални или дизайнерски характеристики,
        които добавят стойност
    wrist_rest_type:
      name: Тип подложка за китка
      description: Идентифицира предназначеното сдвояване на устройството или конфигурацията
        на комплекта на подложката за китка (напр. само клавиатура, само мишка, комбинирани
        комплекти)
    xlr_pin_count:
      name: Брой пинове на XLR
      description: Показва специфичната конфигурация на пиновете (брой пинове) на
        XLR конекторите
    yacht_type:
      name: Тип яхта
      description: Класифицира типа яхта, като моторна или изследователска
    yarn_weight_category:
      name: Категория тегло на преждата
      description: Идентифицира дебелината на преждата, като супер обемна или занаятчийска
    zipper_pull_style:
      name: Стил на издърпване с цип
      description: Описва дизайна или покритието на цип, като например текстуриран
        или релефен
    zoom_type:
      name: Тип увеличение
      description: Указва вида на функцията за увеличение в камерите за документи,
        като цифрово или оптично
    air_fryer_accessory_type:
      name: Тип аксесоар за фритюрник с горещ въздух
      description: Идентифицира конкретния вид продаван аксесоар.
    air_purifier_filter_technology:
      name: Технология на филтъра за пречистване на въздух
      description: Идентифицира основния метод за филтриране или пречистване, използван
        от устройството.
    air_purifier_filtration_rating:
      name: Клас на филтриране на пречиствателя на въздух
      description: Показва сертифицирания клас на ефективност на филтърния материал.
    animal_care_set_components_included:
      name: Включени компоненти от комплекта за грижа за животни
      description: Изброява приставките и аксесоарите за подстригване или почистване,
        предоставени в комплекта, така че купувачът да знае точно какво получава.
    apron_features:
      name: Характеристики на престилката
      description: Подчертава специалните функционални характеристики на престилката.
    apron_style:
      name: Стил на престилка
      description: Определя цялостната кройка или конструкция на престилката.
    aquatic_plant_growth_habit:
      name: Начин на растеж на водните растения
      description: Класифицира водните растения според типичното им положение и стил
        на растеж във водната колона.
    arbor_top_design:
      name: Дизайн на горната част на беседката
      description: Указва формата или стила на горната част на беседката, помагайки
        на клиентите да съобразят архитектурните си предпочитания.
    ashtray_type:
      name: Тип пепелник
      description: Класифицира пепелника според основното му предназначение или контекст.
    attractant_type:
      name: Тип примамка
      description: Определя механизма за примамка, интегриран в лепилото, ако има
        такъв, като помага на клиентите да изберат най-ефективната капан за тяхната
        ситуация.
    awning_operation_type:
      name: Тип на работа на тентата
      description: Описва механизма, използван за разгъване и прибиране на тентата.
    bag_clip_style:
      name: Стил на закопчаване за чанта
      description: Описва механичния стил на затварящия механизъм на закопчалката.
    bag_configuration:
      name: Конфигурация на торбата
      description: Описва броя и вида на торбите, включени в системата за събиране
        на трева.
    bag_insulation:
      name: Изолация на торбата
      description: Показва дали торбичката за вино е термоизолирана, за да се поддържа
        температурата на бутилката.
    baking_liner_size:
      name: Размер на хартията за печене
      description: Категорична конвенция за определяне на размера, използвана от пекарите
        за описание на капацитета на хартиените формички спрямо стандартните размери
        на кексчета.
    baking_sheet_style:
      name: Стил на листа за печене
      description: Идентифицира стила на конструкцията на листа, например с ръб или
        перфорация.
    ballast_material:
      name: Баластен материал
      description: Изброява материалите, които могат да се използват за баластиране
        (пълнене) на ролковия барабан, като помага на купувачите да изберат модели,
        съвместими с предпочитаните от тях материали за пълнеж.
    base_features:
      name: Характеристики на базата
      description: Подчертава стабилността или сцеплението на основата, помагайки
        на потребителите, които се нуждаят от противоплъзгаща или вакуумна функционалност
        на работните повърхности.
    baster_tip_type:
      name: Тип накрайник за кухненска пипета
      description: Класифицира вида на накрайника или приставката на кухненската пипета,
        като позволява на потребителите да филтрират между стандартни пипети с гумена
        помпа, инжекционни игли и накрайници тип четка.
    bathroom_accessories_included:
      name: Включени аксесоари за баня
      description: Изброява конкретните артикули, които се предлагат в комплекта аксесоари
        за баня, така че купувачите да знаят точно какви части са включени.
    bathroom_accessory_compatibility:
      name: Съвместимост на аксесоарите за баня
      description: Показва за кой аксесоар или приспособление за баня е предназначена
        стойката.
    battery_backup_support:
      name: Поддръжка на резервно захранване от батерия
      description: Показва дали аварийната резервна батерия е включена, опционална
        или не се поддържа.
    bedskirt_corner_style:
      name: Стил на ъглите на покривалото за легло
      description: Определя как са завършени ъглите на покривалото за легло, което
        влияе на прилягането му към легла с крака или колони.
    bedskirt_style:
      name: Стил на покривалото за легло
      description: Определя конструкцията и визуалния дизайн на покривалото за легло,
        помагайки на купувачите да избират между визии като например с плисе или шев.
    beer_glass_type:
      name: Вид бирена чаша
      description: Идентифицира конкретния стил или форма на чашата за бира, помагайки
        на купувачите да намерят идеалния съд за предпочитаната от тях бира (напр.
        пинт, пилснер, вайцен)
    belt_profile:
      name: Профил на ремъка
      description: Идентифицира напречното сечение или стила на ремъка, за да се гарантира
        правилното му прилягане към конструкцията на ремъчната шайба.
    beverage_tub_features:
      name: Характеристики на кофата за напитки
      description: Подчертава забележителните дизайнерски характеристики или включените
        компоненти, които добавят функционалност или удобство към кофата за напитки.
    blade_construction_method:
      name: Метод на изработка на острието
      description: Указва как е произведено острието.
    blade_finish:
      name: Повърхност на острието
      description: Повърхностна обработка или естетично покритие, нанесено върху острието.
    blade_shape:
      name: Форма на острието
      description: Описва геометричната форма/профил на лопатката.
    blade_sidedness:
      name: Странa на острието
      description: Показва дали острието на ножицата за жив плет има режещи зъбци
        само от едната страна или от двете страни.
    bleach_formulation:
      name: Формула на белина
      description: Показва химическата основа на избелващия продукт (напр. на хлорна
        или кислородна основа).
    bleach_type:
      name: Вид белина
      description: Посочва наличието и вида на избелващото средство, използвано в
        препарата за премахване на петна.
    blender_jar_material:
      name: Материал на каната на блендера
      description: Указва материала, използван за основния контейнер/кана на блендера.
    blooming_season:
      name: Сезон на цъфтеж
      description: Показва сезона(ите), през който(ите) растението обикновено цъфти.
    booster_pump_requirement:
      name: Изискване за бустерна помпа
      description: Изяснява дали е необходима отделна бустерна помпа, за да работи
        почистването.
    bore_type:
      name: Тип отвор
      description: Определя типа на отвора или интерфейса, използван за монтиране
        на ролката към вала.
    bottle_cap_gasket_material:
      name: Материал на уплътнението на капачката на бутилката
      description: Идентифицира материала на уплътнението, което е в контакт с ръба
        на бутилката.
    bottle_cap_liner_type:
      name: Тип подложка за капачка на бутилка
      description: Указва вида или материала на уплътнителната обвивка вътре в капачката
        на бутилката, което влияе върху херметичността и съвместимостта на продукта.
    bottle_fill_state:
      name: Състояние на пълнене на бутилката
      description: Показва дали бутилката се продава празна или предварително напълнена
        с питейна вода.
    bottle_stopper_mechanism:
      name: Механизъм за запушване на бутилка
      description: Определя механизма или стила на запечатване, използван от запушалката
        или предпазителя.
    bowl_type:
      name: Тип купа
      description: Класифицира основното предназначение или стил на купата.
    bread_storage_ventilation:
      name: Вентилация за съхранение на хляб
      description: Описва дали и как контейнерът позволява въздушния поток да поддържа
        хляба свеж.
    brew_strength_options:
      name: Опции за сила на варенето
      description: Изброява нивата на сила на приготвяне, които могат да се избират
        и които регулират времето за екстракция или дебита, за да се получи по-меко
        или по-силно кафе.
    bridge_railing_style:
      name: Стил на парапета на моста
      description: Определя наличието и стила на парапетите на моста, което влияе
        на безопасността и външния вид.
    briquette_ignition_type:
      name: Тип запалване на брикети
      description: Показва дали брикетите съдържат запалителни добавки или са стандартни,
        което помага на потребителите да разберат колко са удобни за запалване.
    bristle_stiffness:
      name: Твърдост на четката
      description: Показва твърдостта на влакната на четката, влияеща върху силата
        на почистване и пригодността за различни видове покрития на тоалетни чинии.
    bristle_tip_type:
      name: Тип накрайник с косъмчета
      description: Показва дали върховете на влакната са разделени (разцепени) за
        по-фино събиране на прах или остават неразцепени за тежки отпадъци.
    bucket_features:
      name: Характеристики на кофата
      description: Подчертава специалните характеристики или функционалните подобрения
        на кофата, така че купувачите да могат бързо да намерят продукти с необходимите
        удобства.
    bulb_finish:
      name: Покритие на крушката
      description: Описва външното покритие или финиш на стъклото на крушката, което
        влияе върху разпространението на светлината и стила.
    burner_shape:
      name: Форма на горелката
      description: Описва геометричния дизайн на горелката на грила, който определя
        прилягането и разпределението на топлината вътре в грила.
    burr_shape:
      name: Форма на мелещия диск
      description: Определя геометрията на мелещите дискове при кафемелачки с плоски
        или конусовидни ножове, което влияе върху равномерността на смилането и генерирането
        на топлина по време на работа.
    butterfly_feeder_food_type:
      name: Вид храна за хранилка за пеперуди
      description: Идентифицира вида храна или примамка, за която е предназначена
        хранилката.
    cabinet_light_fixture_style:
      name: Стил на осветителните тела за шкафове
      description: Описва физическия стил или формата на осветителното тяло.
    candle_container_material:
      name: Материал на контейнера за свещи
      description: Идентифицира материала, от който е изработен съдът или контейнерът
        на свещта (за свещи в буркан/тенекиена кутия).
    canner_type:
      name: Тип уред за консервиране
      description: Определя метода или типа на консервиране, за който е предназначен
        уредът.
    canopy_shape:
      name: Форма на сенника
      description: Определя геометричната форма на отворения сенник.
    canopy_venting:
      name: Вентилация на сенника
      description: Посочва конфигурацията на вентилацията на сенника, която влияе
        върху съпротивлението на вятъра и разсейването на топлината.
    car_cleaning_kit_items_included:
      name: Включен комплект артикул за почистване на автомобили
      description: Изброява конкретните инструменти и аксесоари, включени в комплекта,
        за да знаят клиентите точно какво получават и да могат лесно да сравняват
        различните комплекти.
    carbonation_level_adjustment:
      name: Регулиране на нивото на карбонизация
      description: Показва дали апаратът за газирани напитки предлага фиксирано или
        регулируемо ниво на газиране.
    catalytic_combustor_type:
      name: Тип каталитичен горивен апарат
      description: Показва дали печката използва каталитична, некаталитична или хибридна
        система за горене, което оказва влияние върху ефективността и емисиите.
    ceiling_light_fixture_style:
      name: Стил на осветително тяло за таван
      description: Определя основния структурен стил/конфигурация на осветителното
        тяло на тавана.
    center_hole_shape:
      name: Форма на централния отвор
      description: Описва геометричната форма на монтажния/централния отвор на ножа,
        който определя съвместимостта с конкретни шпиндели на косачката.
    chainsaw_bar_mount_type:
      name: Тип закрепване на шината на верижния трион
      description: Определя схемата на монтаж или вида на слота на шината на верижния
        трион, за да се гарантира, че тя пасва на главата на триона.
    chainsaw_bar_nose_type:
      name: Тип нос на шина на верижен трион
      description: Идентифицира стила на върха на шината, което влияе върху ефективността
        на рязане и поддръжката.
    chainsaw_bar_type:
      name: Тип шина на верижен трион
      description: Класифицира конструкцията или предназначението на шината.
    chainsaw_cutter_type:
      name: Тип режещ инструмент за верижен трион
      description: Идентифицира профила/дизайна на режещия инструмент на веригата,
        което влияе върху скоростта на рязане, издръжливостта и характеристиките на
        откат.
    champagne_glass_type:
      name: Вид чаша за шампанско
      description: Определя конкретния дизайн на чашата за шампанско, което позволява
        на купувачите да разграничават формите, оптимизирани за различни преживявания
        при пиене.
    chandelier_shape:
      name: Форма на полилей
      description: Определя цялостната структурна форма на полилея.
    charcoal_chimney_features:
      name: Характеристики на комина с дървени въглища
      description: Изброява забележителните функционални характеристики на комина
        с дървени въглища.
    charcoal_ignition_type:
      name: Тип запалване на дървените въглища
      description: Показва дали дървените въглища са обработени или проектирани за
        по-лесно запалване или по-чисто горене.
    chopstick_style:
      name: Стил на клечки за хранене
      description: Определя регионалния или културния стил на клечките за хранене,
        който може да повлияе на тяхната дължина, форма и декорация.
    chopstick_trainer_design:
      name: Дизайн на помощно средство за клечки
      description: Описва механичния дизайн или помощното средство, използвано от
        обучаващия.
    cigar_cutter_type:
      name: Тип резачка за пури
      description: Указва механизма или стила на рязане, използван за отстраняване
        на капачката на пурата.
    cigar_punch_type:
      name: Тип перфоратор за пури
      description: Идентифицира механизма или стила на перфоратора за пури.
    clay_pot_material:
      name: Материал за глинени съдове
      description: Идентифицира състава или стила на глината, използвани в съда, като
        например фаянс или камениновa керамика.
    cleaner_concentration:
      name: По-чиста концентрация
      description: Показва дали почистващият препарат се продава готов за употреба
        или като концентрат, който трябва да се разреди преди употреба.
    cleaning_cloth_features:
      name: Характеристики на почистващата кърпа
      description: Подчертава специалните характеристики на кърпите.
    cleaning_solution_concentration:
      name: Концентрация на почистващия разтвор
      description: Показва дали продуктът се продава готов за употреба, концентриран
        или в други разредени форми.
    clock_chime_melody:
      name: Мелодия на звънеца на часовника
      description: Определя мелодията или звуковия модел на отброяване, който часовникът
        изпълнява на всеки кръгъл час или на четвърт час.
    clock_display_type:
      name: Тип дисплей на часовника
      description: Определя как се представя времето, което е полезно за клиенти,
        които предпочитат цифров, аналогов, флип и др.
    clock_hand_mounting_type:
      name: Тип монтаж на часовниковата стрелка
      description: Определя стила на интерфейса, използван за прикрепване на стрелките
        на часовника към механизма.
    clock_hand_style:
      name: Стил на стрелката на часовника
      description: Определя визуалния дизайн на стрелките, позволявайки на купувачите
        да намерят стрелки, които отговарят на естетиката на техния часовник.
    clock_movement_type:
      name: Тип часовников механизъм
      description: Идентифицира вътрешния механизъм за отчитане на времето на часовника.
    clothespin_type:
      name: Тип щипка за дрехи
      description: Идентифицира структурния дизайн/стил на щипката за дрехи.
    co2_cylinder_compatibility:
      name: Съвместимост с CO2 бутилки
      description: Определя типа или размера на бутилката с CO2, която сода-машината
        приема, като по този начин гарантира, че купувачите могат да намерят съвместими
        касети за презареждане.
    co2_supplementation_requirement:
      name: Необходимост от добавки с CO2
      description: Показва нивото на добавка на въглероден диоксид, необходимо за
        оптимално здраве на растенията в аквариума.
    coaster_features:
      name: Характеристики на подложките
      description: Идентифицира уникални характеристики на подложките за чаши, като
        например абсорбираща или противоплъзгаща основа.
    cocktail_strainer_type:
      name: Тип цедка за коктейли
      description: Определя дизайна на цедката за коктейли, което влияе върху съвместимостта
        с шейкърите и стила на употреба.
    code_technology:
      name: Технология на кода
      description: Идентифицира кода или технологията за сигурност, която дистанционното
        използва за комуникация с устройството за отваряне на гаражна врата.
    coffee_decanter_warmer_features:
      name: Характеристики на подгревателя за кафе
      description: Подчертава отличителните функционални или защитни характеристики,
        специфични за нагревателите за кафе.
    coffee_filter_basket_size:
      name: Размер на кошницата за филтър за кафе
      description: Указва стандартизираното обозначение на размера, което кошницата
        поддържа, като гарантира съвместимост с филтри и машини.
    coffee_filter_shape:
      name: Форма на филтър за кафе
      description: Указва геометричната форма на филтъра за кафе, за да се гарантира
        съвместимост с различни кафемашини.
    coffee_filter_type:
      name: Тип филтър за кафе
      description: Указва стила на филтъра, който кафемашината за капково кафе приема
        или включва, което може да повлияе на вкуса и текущите разходи за консумативи.
    coffee_grinder_accessory_type:
      name: Тип аксесоар за кафемелачка
      description: Класифицира специфичния вид аксесоар, за да улесни филтрирането
        и търсенето.
    colander_style:
      name: Стил на гевгира
      description: Класифицира структурния дизайн на гевгира, като например купа с
        крачета или над мивката.
    compatible_air_conditioner_type:
      name: Съвместим тип климатик
      description: Идентифицира типа климатик, с който е проектиран аксесоарът.
    compatible_awning_rail_type:
      name: Съвместим тип релса за тента
      description: Указва релсата или тръбната система на тентата, за която е проектирана
        скобата за закачалка.
    compatible_beverage_type:
      name: Съвместим тип напитка
      description: Указва вида напитка, за която е предназначена запушалката или защитната
        опаковка.
    compatible_can_size:
      name: Съвместим размер на кутията
      description: Изброява размерите на кутиите за напитки, които трошачката може
        да побере.
    compatible_cigarette_size:
      name: Съвместим размер цигари
      description: Изброява стандартните дължини или формати на цигарите, които пасват
        на държача.
    compatible_coffee_capsule_system:
      name: Съвместима система за кафе капсули
      description: Указва системата от капсули или кафе дози, с която е съвместим
        адаптерът, за да се гарантира, че клиентите ще изберат модел, подходящ за
        предпочитания от тях кафе формат.
    compatible_coffee_maker_type:
      name: Съвместим тип кафемашина
      description: Показва типа кафемашина или еспресо машина, за която е предназначен
        аксесоарът.
    compatible_cooking_thermometer_type:
      name: Съвместим тип термометър за готвене
      description: Указва типовете термометри за готвене, за чието регулиране или
        проверка е предназначен този инструмент за калибриране.
    compatible_coupler_size:
      name: Съвместим размер на съединителя
      description: Определя размера на съединителя, който декоративната торбичка трябва
        да пасне без подрязване.
    compatible_dehumidifier_technology:
      name: Съвместима технология за обезвлажнители
      description: Показва технологията на обезвлажнителя, с която е съвместим филтърът,
        като например компресор или изсушител.
    compatible_feeder_type:
      name: Съвместим тип захранващо устройство
      description: Идентифицира стиловете подаващи устройства, за които е проектирана
        тавата.
    compatible_footwear_material:
      name: Съвместим материал за обувки
      description: Изброява видовете материали за обувки, за които е подходящ лакът
        или восъкът.
    compatible_fuel_type:
      name: Съвместим тип гориво
      description: Определя типа гориво, с което аксесоарът е съвместим, като гарантира
        подходящо съчетание с пропан, природен газ, електричество или други горивни
        нагреватели за тераса.
    compatible_garment_steamer_design:
      name: Съвместим дизайн на уреда за гладене с пара
      description: Указва моделите уреди за гладене с пара, с които е проектиран държачът
        за кабел.
    compatible_grill_type:
      name: Съвместим тип грил
      description: Указва видовете скари, с които е предназначен аксесоарът.
    compatible_hazardous_waste_type:
      name: Съвместим вид опасни отпадъци
      description: Указва вида опасни отпадъци, за които е предназначен контейнерът.
    compatible_ironing_board_type:
      name: Съвместим тип дъска за гладене
      description: Показва вида дъска за гладене, за която е съвместима частта, помагайки
        на купувачите да определят съвместимостта.
    compatible_lawn_mower_type:
      name: Съвместим тип косачка за трева
      description: Посочва типа косачка, за който е предназначен комплектът за оформяне
        на ивици върху тревната площ, за да се гарантира съвместимост.
    compatible_leaf_blower_style:
      name: Съвместим модел духалка за листа
      description: Указва формата на духалката за листа, с която е съвместим аксесоарът.
    compatible_mailbox_size:
      name: Съвместим размер на пощенската кутия
      description: Показва размера(ите) на пощенската кутия, за които е проектиран
        аксесоарът, следвайки общите класификации на USPS/индустрията.
    compatible_mailbox_type:
      name: Съвместим тип пощенска кутия
      description: Определя стила на пощенската кутия, която се побира вътре или с
        приложението, като помага на купувачите да потвърдят правилното прилягане.
    compatible_napkin_size:
      name: Съвместим размер на салфетката
      description: Указва размера или формата на салфетката, за която е предназначен
        държачът/диспенсерът.
    compatible_outdoor_grill_style:
      name: Съвместим стил на грил за открито
      description: Указва стила или конфигурацията на външната скара, за която е предназначен
        капакът.
    compatible_radiator_style:
      name: Съвместим стил на радиатор
      description: Изброява видовете радиатори, за които е предназначен аксесоарът,
        като например панелен радиатор, колонен радиатор, радиатор за кърпи или первазен
        радиатор.
    compatible_refrigerator_compartment:
      name: Съвместимо хладилно отделение
      description: Указва къде в хладилника е предназначен да се използва аксесоарът.
    compatible_stove_fuel_type:
      name: Съвместим тип гориво за печка
      description: Идентифицира видовете гориво, с които е съвместим аксесоарът за
        преносима печка, помагайки на клиентите да съчетаят артикула с печката си
        (напр. газ в бутилка или алкохол).
    compatible_stove_type:
      name: Съвместим тип печка
      description: Идентифицира видовете преносими готварски печки, за които е предназначена
        тази основа.
    compatible_tissue_box_type:
      name: Съвместим тип кутия за салфетки
      description: Идентифицира стила/размера на кутията за салфетки, за която е предназначен
        държачът.
    compatible_tractor_type:
      name: Съвместим тип трактор
      description: Указва категорията трактор, за който е предназначена частта/аксесоарът.
    compatible_umbrella_type:
      name: Съвместим тип чадър
      description: Определя стила на градинския чадър, за който е проектиран калъфът.
    compatible_washing_machine_type:
      name: Съвместим тип перална машина
      description: Указва за кои модели перални машини е подходящ препаратът (напр.
        предно зареждане, горно зареждане, високоефективна).
    compatible_waste_container_type:
      name: Съвместим тип контейнер за отпадъци
      description: Посочва типа контейнер за отпадъци, с който аксесоарът е предназначен
        да бъде съвместим или да работи.
    compatible_water_cooler_type:
      name: Съвместим тип охладител за вода
      description: Показва с кои модели охладители за вода е съвместим аксесоарът,
        помагайки на клиентите да изберат правилните части за своето устройство.
    compatible_water_heater_type:
      name: Съвместим тип бойлер
      description: Указва типа бойлер, с който е съвместим продуктът.
    compatible_wrap_material:
      name: Съвместим материал за опаковане
      description: Изброява видовете фолио за храна, за които е предназначен диспенсърът.
    compost_aerator_design:
      name: Дизайн на аератор за компост
      description: Идентифицира механичния дизайн или стил на аератора, описвайки
        как той разбърква компоста.
    compost_form:
      name: Форма за компост
      description: Описва физическото представяне или стила на опаковане на компостния
        продукт.
    compost_source_material:
      name: Източник на материали за компост
      description: Идентифицира основния(ите) органичен(ни) материал(и), от който
        е получен компостът.
    compression_method:
      name: Метод на компресиране
      description: Показва техниката, използвана за изтласкване на въздух или задържане
        на пространството в торбата.
    cooking_gel_fuel_base:
      name: Основа на гел горивото за готвене
      description: Определя основния химичен състав на гел горивото, като позволява
        на потребителите да избират между формули на основата на етанол, метанол,
        гликол и други варианти, които се различават по мирис, топлоотдаване и пригодност
        за употреба на закрито или открито.
    cooking_surface_texture:
      name: Текстура на повърхността за готвене
      description: Определя текстурата на повърхността за готвене, като например плоска,
        оребрена или с двойно предназначение.
    cooking_thermometer_design:
      name: Дизайн на термометъра за готвене
      description: Идентифицира начина на работа на термометъра за готвене, напр.
        аналогов или цифров.
    cookware_coating_material:
      name: Материал за покритие на кухненски съдове
      description: Идентифицира типа на вътрешното или външното покритие, нанесено
        върху съда за готвене, като предоставя информация за неговите антиприлепващи
        свойства, издръжливост и изисквания за поддръжка.
    cookware_coating_type:
      name: Вид покритие на съдовете за готвене
      description: Определя вътрешното или повърхностното покритие на съда за готвене.
    cookware_lid_style:
      name: Стил на капака на съда за готвене
      description: Описва цялостния стил или функционална конструкция на капака.
    cooler_style:
      name: Стил на охладителя
      description: Идентифицира структурния дизайн на преносимия охладител за храна/напитки,
        помагайки на купувачите да избират между твърди сандъци, меки чанти, раници
        и др.
    corkscrew_accessories_included:
      name: Включени аксесоари за тирбушон
      description: Указва допълнителните компоненти, опаковани с тирбушона.
    corkscrew_hinge_type:
      name: Тип панта на тирбушон
      description: Указва дали тирбушонът използва механизъм с единична или двойна
        панта и лост.
    corkscrew_tools_included:
      name: Включени инструменти за тирбушон
      description: Изброява инструментите и аксесоарите, включени в комплекта с тирбушона
        (напр. нож за фолио, отварачка за бутилки, нож) така че купувачите да могат
        да видят какво е включено.
    crushing_method:
      name: Метод на смачкване
      description: Описва механизма, използван за компресиране на кутията.
    crust_browning_level:
      name: Степен на запичане на коричката
      description: Идентифицира избираемите опции за цвят/тъмнина на кората, които
        предлага хлебопекарната.
    cultivar_type:
      name: Тип сорта
      description: Определя селекционния тип на сорта, като посочва дали е наследствен,
        хибриден, свободно опрашван или генетично модифициран.
    cultivator_type:
      name: Тип култиватор
      description: Класифицира структурния дизайн на култиватора, като например с
        предни или задни зъбци.
    cup_warmer_features:
      name: Характеристики на подгревателя за чаши
      description: Подчертава специалния дизайн или удобните функции, характерни за
        подгревателите за чаши.
    curtain_heading_style:
      name: Тип горна лента на завеса
      description: Определя стила на горния ръб/лента на завесата или пердето, чрез
        който тя се окачва, като това определя необходимия монтажен обков и цялостната
        визия.
    curtain_lining_type:
      name: Тип подплата за завеси
      description: Посочва дали завесата е с подплата и какъв тип е тя, което влияе
        върху топлоизолацията, нивото на прозрачност и начина, по който пада платът.
    curtain_rod_type:
      name: Тип корниз за завеси
      description: Класифицира структурния стил на пръчката, помагайки на купувачите
        бързо да намерят пръчки, подходящи за техните нужди при монтажа.
    cutting_disc_function:
      name: Функция на режещия диск
      description: Определя конкретното действие за обработка на храната, което дискът
        изпълнява.
    cutting_head_type:
      name: Тип режеща глава
      description: Указва стила на режещия елемент, използван от приставката.
    cutting_mechanism_type:
      name: Тип режещ механизъм
      description: Описва стила на режещия инструмент, вграден в диспенсъра.
    cylinder_connector_type:
      name: Тип конектор за цилиндър
      description: Определя връзката или резбата на цилиндъра, като определя съвместимостта
        с конкретни модели машини за газирани напитки.
    decorating_bag_features:
      name: Характеристики на декорирането на торбичката
      description: Подчертава специалния дизайн или функционалните характеристики
        на декоративната торбичка.
    dehumidifier_refill_form:
      name: Форма за попълване на влагоуловител
      description: Определя физическата форма/формат на пълнителя, така че клиентът
        да може да избира съвместими стилове.
    desiccant_material:
      name: Изсушаващ материал
      description: Посочва използваното влагоабсорбиращо вещество, важно за ефективността,
        многократната употреба и съображенията за безопасност.
    dial_finish:
      name: Покритие на циферблата
      description: Описва повърхностната обработка на циферблата, която влияе върху
        отблясъците и стила.
    dinnerware_features:
      name: Характеристики на съдовете за хранене
      description: Подчертава специалните функционални характеристики на съда за хранене.
    dish_detergent_features:
      name: Характеристики на препарата за съдове
      description: Изброява забележителни формулировки или екологични свойства, които
        помагат на купувачите да филтрират и сравняват продуктите.
    dishwasher_accessory_type:
      name: Тип аксесоар за съдомиялна машина
      description: Класифицира специфичния вид аксесоар, което позволява на купувачите
        бързо да филтрират.
    dishwasher_wash_programs:
      name: Програми за измиване на съдомиялна машина
      description: Изброява предварително зададените цикли на измиване, налични за
        съдомиялната машина, което позволява на клиентите да филтрират по гъвкавост
        на програмите.
    dispensing_mechanism:
      name: Механизъм за дозиране
      description: Описва как напитката се излива от термоканата, което влияе на използваемостта
        в различни ситуации.
    dispensing_temperature_options:
      name: Опции за температура на дозиране
      description: Показва опциите за температура, които може да предоставя охладителят
        за вода.
    displayed_character:
      name: Показан символ
      description: Идентифицира буквено-цифровия символ, представляван от отделния
        елемент.
    diving_board_surface_texture:
      name: Текстура на повърхността на трамплина
      description: Описва текстурата на горната повърхност на дъската, влияеща върху
        сцеплението и устойчивостта на хлъзгане.
    door_configuration:
      name: Конфигурация на вратата
      description: Показва колко врати за достъп има капанът
    door_hinge_orientation:
      name: Ориентация на пантите на вратата
      description: Определя позицията на пантата или посоката на отваряне на вратата
        или капака на фризера.
    door_hinge_position:
      name: Положение на пантите на вратата
      description: Определя страната на вратата, на която се намира пантата, или дали
        тя е обръщаема, което оказва влияние върху монтажа и планирането на пространството.
    draft_gas_type:
      name: Тип газ за наливна система
      description: Указва вида газ, използван при наливане на напитки от кег или диспенсър.
        Изборът на газ е важен за нивото на карбонизация, текстурата, пяната и общия
        стил на напитката.
    drainage_design:
      name: Дизайн на оттичане
      description: Показва как сапунерката управлява оттичането на водата, за да поддържа
        сапуна сух.
    drainage_method:
      name: Метод на оттичане
      description: Описва как се изхвърля събраната вода, като посочва дали е необходимо
        ръчно изпразване.
    drawer_organizer_features:
      name: Характеристики на органайзера за чекмеджета
      description: Подчертава значимите функционални характеристики на вложката за
        организиране на чекмеджета.
    drinkware_crystal_composition:
      name: Състав на кристалните съдове за напитки
      description: Идентифицира конкретната формула на стъклото/кристала, като подчертава
        съдържанието на олово и характеристиките на прозрачността.
    drinkware_holder_style:
      name: Стил на държача за чаши
      description: Класифицира общия дизайн или конфигурация на държача за чаши.
    drinkware_insulation:
      name: Изолация на съдовете за напитки
      description: Определя изолационната конструкция на съдовете за напитки, която
