    coin_material:
      name: Материал за монети
      description: Указва вида на материала, от който е направена колекционерската
        монета, напр. бронз, мед
    collagen_source:
      name: Източник на колаген
      description: Идентифицира основния произход на колагена, използван в добавката
        (напр. говежди, морски, растителен)
    collagen_type:
      name: Тип колаген
      description: Посочва молекулярните типове колаген, предоставени от продукта
        (напр. Тип I, II, III)
    collar/mount_compatible_device:
      name: Устройство, съвместимо със скоба/поставка
      description: Указва съвместимото устройство за скоба или стойки за статив, напр.
        обектив, камера
    collar/mount_design:
      name: Дизайн на скоба/поставка
      description: Описва дизайна на скоби или стойки за статив, като например бързо
        освобождаване или пръстен
    collar_lock_type:
      name: Тип заключване на скоба
      description: Указва вида на заключване на скоба на оборудване за вдигане на
        тежести, напр. спинлок или пружинна скоба
    color:
      name: Цвят
      description: Определя основния цвят или шарка, напр. синьо или раирано
    color_accuracy_standards:
      name: Стандарти за точност на цветовете
      description: Определя стандартите за калибриране на цветовете, обикновено за
        монитори, например sRGB, Adobe RGB
    color_depth:
      name: Дълбочина на цвета
      description: Показва оптичната/изходна битова дълбочина на скенера (брой битове
        на пиксел), която определя точността на цвета, градацията и възможностите
        за редактиране
    color_saturation:
      name: Наситеност на цвета
      description: Показва интензитета на цвета във филма на камерата, напр. висок,
        нисък
    comb/brush_size:
      name: Размер на гребена/четката
      description: Класифицира общия физически размер на четката или гребена
    comb_features:
      name: Характеристики на гребена
      description: Изброява забележими характеристики на изпълнението или дизайна
        на гребена
    comb_tooth_spacing:
      name: Разстояние между зъбите на гребена
      description: Описва разстоянието или плътността на зъбите на гребена
    comic_edition:
      name: Издание на комикс
      description: Показва конкретната заглавие или издание на комикс, което може
        да повлияе на неговата рядкост и колекционерска стойност – напр. първо издание,
        алтернативна корица
    comic_tradition:
      name: Традиция на комикс
      description: Показва културната или регионална традиция, от която произлиза
        комиксът, като например китайски комикси или манга
    commode_opening_type:
      name: Тип отвор на тоалетния стол
      description: Идентифицира наличието и стила на всеки изрез за тоалетна или съвместимост
        с кофа в седалката
    communication_device_features:
      name: Характеристики на устройство за комуникация
      description: Идентифицира уникални функции в комуникационните устройства, напр.
        сензорен екран или гласово управление
    communication_protocols:
      name: Комуникационни протоколи
      description: Указва използвания мрежов протокол, напр. Modbus или Profibus
    compass_style:
      name: Стил на компас
      description: Указва стила на навигационните компаси, напр. компас за гмуркане
        или жирокомпас
    compatible_accessibility_equipment_type:
      name: Тип съвместимо оборудване за достъпност
      description: Посочва вида на оборудването за достъпност или мобилност, с което
        аксесоарът е предназначен да работи
    compatible_aircraft_type:
      name: Съвместим тип летателен апарат
      description: Идентифицира типа летателен апарат, за който продуктът е подходящ,
        напр. самолет или хеликоптер
    compatible_amplifier:
      name: Съвместим усилвател
      description: Идентифицира типа усилвател, с който продуктът е съвместим, напр.
        бас или кийборд
    compatible_aquarium:
      name: Съвместим аквариум
      description: Указва за какви типове аквариуми е подходящ даден продукт, напр.
        всички аквариуми, солена вода
    compatible_baby_bottle_design:
      name: Съвместим дизайн на бебешко шише
      description: Показва стиловете бебешки шишета, с които продуктът е съвместим,
        като например широко гърло
    compatible_baby_carrier_type:
      name: Съвместим тип кош за новородено
      description: Указва типа кош за новородено, с който продуктът е съвместим, напр.
        за раница
    compatible_baby_chair_type:
      name: Съвместим тип бебешко столче
      description: Указва типа бебешко столче, за което продуктът е подходящ, напр.
        за количка за пазаруване или за ресторант
    compatible_baby_transport_type:
      name: Съвместим тип транспортиране за бебета
      description: Идентифицира съвместими артикули за транспортиране на бебета, напр.
        количка или столче за кола
    compatible_ball_type:
      name: Съвместим тип топка
      description: Идентифицира типовете топки, подходящи за използване с продукта,
        напр. тенис, топка с дупки (Wiffle)
    compatible_battery_size:
      name: Съвместим размер на батерията
      description: Идентифицира размерите на батериите, с които продуктът е съвместим,
        напр. AAA, CR2032
    compatible_battery_technology:
      name: Съвместима технология за батерии
      description: Указва типа на технологията на батерията, с която продуктът е съвместим,
        като литиевойонна или алкална
    compatible_bench_positions:
      name: Съвместими позиции на пейка
      description: Указва диапазона от позиции, обикновено за пейка за тренировки,
        например равна или с наклон
    compatible_bike_type:
      name: Съвместим тип велосипед
      description: Указва типа велосипед, за който е предназначен продуктът, като
        електрически или шосеен
    compatible_brass_instrument:
      name: Съвместим духов инструмент
      description: Указва духовия инструмент, с който продуктът може да се използва,
        като тромпет или туба
    compatible_cable_tie_material:
      name: Съвместим материал за кабелни връзки
      description: Идентифицира типа кабелна връзка (напр. неръждаема стомана, найлон),
        която пистолетът е предназначен да монтира или премахва
    compatible_chemical_treatment_strength_level:
      name: Съвместимо ниво на сила на химическо третиране
      description: Показва препоръчваната от производителя сила или ефикасност (напр.
        лека, нормална, супер) на химическото третиране
    compatible_clarinet_type:
      name: Съвместим тип кларинет
      description: Идентифицира типа кларинет, с който продуктът е съвместим, като
        кларинет A или универсален
    compatible_contact_lens_type:
      name: Съвместим тип контактни лещи
      description: Идентифицира кои категории контактни лещи могат да бъдат съхранявани
        или почиствани в кутията
    compatible_contact_lenses:
      name: Съвместими контактни лещи
      description: Показва типовете или материалите на контактни лещи, с които разтворът
        може безопасно да се използва.
    compatible_cosmetic_tools:
      name: Съвместими козметични инструменти
      description: Указва с кои инструменти за красота може да се използва продуктът,
        напр. гъби, пинсети
    compatible_device:
      name: Съвместимо устройство
      description: Указва кои устройства работят с електроника, като например смартчасовник
        или безжична слушалка
    compatible_drum_configuration:
      name: Съвместима конфигурация на барабана
      description: Идентифицира настройката на барабаните, за която е предназначен
        продуктът, като контрабас или хай-хет
    compatible_electric/acoustic_instrument:
      name: Съвместим електрически/акустичен инструмент
      description: Идентифицира електрическия или акустичния инструмент, за който
        е предназначен продуктът, напр. електрическа китара или синтезатор
    compatible_electronic_card_type:
      name: Съвместим тип електронна карта
      description: Указва типовете електронни карти, с които продуктът може да взаимодейства,
        като например магнитна лента или библиотека
    compatible_equipment_type:
      name: Съвместим тип оборудване
      description: Указва категорията оборудване за басейн или спа, за което е проектирана
        печатната платка (напр. нагревател, помпа, хлоратор)
    compatible_exercise_machine_type:
      name: Съвместим тип фитнес уред
      description: Идентифицира типа фитнес уред, за който е предназначена платката
        (напр. бягаща пътека, елиптичен тренажор)
    compatible_exercises:
      name: Съвместими упражнения
      description: Указва упражненията, които могат да се изпълняват с продукта, като
        набирания на брадички или набиране
    compatible_eyewear_type:
      name: Съвместим тип очила
      description: Идентифицира вида очила, за които аксесоарът е предназначен да
        пасне или работи
    compatible_filament:
      name: Съвместим филамент
      description: Указва видовете нишки, които 3D принтерът може да използва, напр.
        полимлечна киселина (PLA) или найлон
    compatible_film_type:
      name: Съвместим тип филм
      description: Идентифицира типа филм, който камерата може да използва, като негативен
        филм или цветен филм
    compatible_flute_type:
      name: Съвместим тип флейта
      description: Идентифицира вида флейта, с която продуктът е съвместим, напр.
        универсален, пиколо
    compatible_game_format:
      name: Съвместим формат на играта
      description: Указва типа на поддържания формат на играта, като например само
        цифрово изтегляне или физически диск
    compatible_gardening_tool:
      name: Съвместим инструмент за градинарство
      description: Указва с кои градински инструменти може да се използва продукт,
        като например гребло или лопата
    compatible_hair_color:
      name: Съвместим цвят на косата
      description: Намира съответствие на продукти със специфични цветове на косата,
        напр. сребристо, русо
    compatible_hammock_design:
      name: Съвместим дизайн на хамак
      description: Указва вида на хамака, с който продуктът е съвместим, напр. висящ,
        на стойка
    compatible_harmonica_type:
      name: Съвместим тип хармоника
      description: Идентифицира типа хармоника, за който е предназначен продуктът,
        напр. диатонична или хроматична
    compatible_hdcp:
      name: Съвместима широколентовата система за защита на дигитално съдържание (HDCP)
      description: Указва съвместимост с HDCP на електронни устройства, напр. HDCP
        2.2 или несъвместими
    compatible_instrument:
      name: Съвместим инструмент
      description: Идентифицира музикалния инструмент, за който е предназначен продуктът,
        като например китара или пиано
    compatible_keyboard_configuration:
      name: Съвместима конфигурация на кийборда
      description: Идентифицира подредбата на кийборда, съвместима с даден продукт,
        като 61-клавишна или 76-клавишна
    compatible_lock_type:
      name: Съвместим тип ключалка
      description: Идентифицира типовете ключалки, с които продуктът може да работи,
        напр. ключалка с код или електронна
    compatible_makeup:
      name: Съвместим грим
      description: Указва съвместими продукти за грим, напр. червило, сенки за очи
    compatible_mattress_size:
      name: Съвместим размер на матрака
      description: Указва размера на матрака, който е подходящ за продукта, напр.
        голямо двойно, двойно единично легло
    compatible_memory_cards:
      name: Съвместими карти с памет
      description: Идентифицира типовете карти с памет, които даден продукт може да
        използва, обикновено за камери, например SD, microSDHC
    compatible_microphone_thread:
      name: Съвместима резба за микрофон
      description: Указва съвместимия размер на резбата за микрофон, напр. 5/8"-27
    compatible_motherboard_form_factor:
      name: Съвместим типоразмер на дънната платка
      description: Указва размерите на дънната платка, които продуктът може да поддържа,
        като например ATX
    compatible_oboe_type:
      name: Съвместим тип обой
      description: Идентифицира типа обой, за който е предназначен продуктът, напр.
        универсален или английска валдхорна
    compatible_operating_system:
      name: Съвместима операционна система
      description: Определя софтуерната съвместимост на продукт, напр. Windows, macOS
    compatible_orchestral_string_instrument:
      name: Съвместим оркестров струнен инструмент
      description: Идентифицира конкретния оркестров струнен инструмент, за който
        е предназначен продуктът, като цигулка или виолончело
    compatible_paper_size:
      name: Съвместим размер хартия
      description: Указва размерите на хартията, които устройството може да поеме,
        обикновено за принтери, например A4, пощенска картичка
    compatible_patient_profile:
      name: Съвместим профил на пациента
      description: Идентифицира подходящата група пациенти за медицински продукт,
        напр. педиатрични или гериатрични
    compatible_percussion_instrument:
      name: Съвместим ударен музикален инструмент
      description: Идентифицира с кои ударни музикални инструменти може да се използва
        даден продукт, напр. барабан или бонго
    compatible_pinball_machine_edition:
      name: Съвместима версия на флипера
      description: Определя към коя версия или ниво на оборудване на флипера пасва
        аксесоарът (напр. Pro, Premium, LE)
    compatible_play_vehicle_type:
      name: Съвместим тип превозно средство за игра
      description: Идентифицира типа превозно средство за игра, за което продуктът
        е подходящ, напр. кола или лодка
    compatible_player:
      name: Съвместим плейър
      description: Идентифицира устройствата, които могат да се използват с касетен
        адаптер, напр. iPad, лаптоп
    compatible_polish_thinner_type:
      name: Съвместим тип разредител за лак
      description: Показва системите за покритие на нокти, с които разредителят е
        предназначен да работи
    compatible_power_supply_form_factor:
      name: Съвместим типоразмер на захранването
      description: Определя размера или стандарта на компютърното захранване (PSU),
        за който корпусът е проектиран да побира
    compatible_printer:
      name: Съвместим принтер
      description: Идентифицира типа принтер, с който продуктът е съвместим, напр.
        лазерен или мастиленоструен
    compatible_processor_series:
      name: Съвместима серия процесори
      description: Указва серията процесори, с които продуктът е съвместим, като AMD
        Ryzen или Intel core solo
    compatible_programming_languages:
      name: Съвместими езици за програмиране
      description: Идентифицира езиците за програмиране, с които софтуерният продукт
        може да работи, като Python или Java
    compatible_recipes:
      name: Съвместими рецепти
      description: Указва рецептите, подходящи за продукта, обикновено за машини за
        сладолед, например сорбе, джелато
    compatible_resin_type:
      name: Съвместим тип смола
      description: Указва категориите UV смола, които SLA/MSLA принтерът може да използва.
    compatible_resolution:
      name: Съвместима разделителна способност
      description: Определя поддържаната разделителна способност на дисплея, напр.
        1080p, пълна висока детайлност
    compatible_satellite_radio_service:
      name: Съвместима сателитна радио услуга
      description: Идентифицира сателитните радио услуги, с които приемникът е проектиран
        да работи, осигурявайки съвместимост със съществуващи или планирани абонаменти
    compatible_seat_type:
      name: Съвместим тип седалка
      description: Определя типа детско столче за кола, за което продуктът е подходящ,
        напр. седалка или столче за кола за бебе
    compatible_shoe_size:
      name: Съвместим размер обувки
      description: Съчетава продуктите с конкретни размери обувки, напр. 12, 42
    compatible_software_platform:
      name: Съвместима софтуерна платформа
      description: Идентифицира софтуерните платформи, с които даден продукт е съвместим,
        като Adobe Creative или Canva
    compatible_special_effects_device:
      name: Съвместимо устройство за специални ефекти
      description: Идентифицира устройствата за специални ефекти, с които продуктът
        може да работи, като LED светлини или машини за мъгла
    compatible_stove_top_type:
      name: Съвместим тип котлон
      description: Идентифицира типа котлони, с които продуктът може да се използва,
        като газови или индукционни
    compatible_string_instrument:
      name: Съвместим струнен инструмент
      description: Идентифицира за кой струнен инструмент е предназначен продуктът,
        като укулеле или бас китара
    compatible_stroller_type:
      name: Съвместим тип количка
      description: Указва типа количка, за който продуктът е подходящ, напр. чадър
        или джогинг
    compatible_vacuum_type:
      name: Съвместим тип прахосмукачка
      description: Указва типа прахосмукачка, с който продуктът е съвместим, като
        например ръчна или с пара
    compatible_vehicle:
      name: Съвместимо превозно средство
      description: Указва типа превозно средство, за което е предназначен продукт,
        като например кола или високопроходим автомобил
    compatible_voice_assistant:
      name: Съвместим гласов асистент
      description: Идентифицира платформите за гласово управление, които могат да
        управляват приемника
    compatible_walking_aid_equipment:
      name: Съвместими помощни средства за ходене
      description: Указва за кои помощни средства за ходене е предназначен продуктът,
        напр. патерици, проходилки
    compatible_wax_container_size:
      name: Съвместим размер на контейнера за восък
      description: Изброява стандартните размери на касети, кутии или съдове, които
        могат да бъдат поставени директно в нагревателя без преливане
    compatible_wax_form:
      name: Съвместима форма на восък
      description: Определя формите на восъка за депилация, които нагревателят е предназначен
        да топи
    compatible_weight_lifting_accessory:
      name: Съвместим аксесоар за вдигане на тежести
      description: Указва оборудването за вдигане на тежести, с което продуктът е
        съвместим, като щанга или дъмбел
    compliance_certifications:
      name: Сертификати за съответствие
      description: Указва сертификатите за съответствие на продукт, като HIPAA или
        FedRAMP
    component_mounting_style:
      name: Стил на монтиране на компонент
      description: Определя основния метод, чрез който електронен компонент или платка
        се прикрепва към печатна платка, панел, шаси или релса
    component_output_type:
      name: Тип изход на компонент
      description: Указва типа изходен сигнал на електронни компоненти, като UART
        или аналогов
    component_package_type:
      name: Тип корпус на компонента
      description: Определя типоразмера или корпуса на електронните компоненти, напр.
        SDM (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: Код за размер на компонента
      description: Указва стандартизирания SMD или обозначение за размер на отвора
        (например 0603, 0805), използван за корпуса на кондензатора
    component_tolerance:
      name: Толеранс на компонента
      description: Определя допустимото отклонение от номиналната стойност (съпротивление,
        капацитет, индуктивност, честота и др.), изразено като процент
    components_included:
      name: Включени компоненти
      description: Изброява частите на оборудването, осигурени в стартовия комплект
    compression_circuit_type:
      name: Тип верига за компресия
      description: Описва основната технология за намаляване на усилването (напр.
        VCA, FET, оптична), която оформя звука и отговора на процесора
    compression_format:
      name: Формат на компресиране
      description: Определя вида на използваното компресиране на видеофайл, напр.
        MPEG-4, AVI
    compression_level:
      name: Ниво на компресиране
      description: Показва интензитета на налягането в продуктите за компресиране,
        например леко, твърдо
    computer_accessories_included:
      name: Включени компютърни аксесоари
      description: Идентифицира предоставените допълнителни компютърни аксесоари,
        като мишка или чанта за лаптоп
    computer_form:
      name: Форма на компютър
      description: Определя физическия дизайн или оформлението на компютър, като например
        универсален или ноутбук
    computer_server_features:
      name: Характеристики на компютърен сървър
      description: Описва специални характеристики на сървър, като резервно захранване
        или поддръжка на виртуализация
    computer_specialized_features:
      name: Компютърни специализирани функции
      description: Подчертава специфични функции на компютъра, като система за водно
        охлаждане или RGB осветление
    concertina_button_configuration:
      name: Конфигурация на бутоните за концертина
      description: Указва броя и разположението на бутоните на концертина, като англоконцертина
        с 20 бутона
    condition:
      name: Състояние
      description: Описва състоянието или качеството на продукт, напр. без дефекти
        (M), лошо (P)
    conditioner_effect:
      name: Ефект на балсам за коса
      description: Определя предимствата на балсама за коса, като придава лъскавост
        или против пърхот
    condom_compatibility:
      name: Съвместимост с презервативи
      description: Посочва с кои материали за презервативи лубрикантът е безопасен
        за употреба
    condom_fit_type:
      name: Тип прилягане на презерватива
      description: Описва общото оразмеряване или анатомичен контур, проектиран за
        подобряване на комфорта и усещането
    condom_type:
      name: Тип презерватив
      description: Разграничава дали презервативът е предназначен за мъже, или жени
    conductivity_gel_application:
      name: Приложение на контактен гел
      description: Посочва медицинската или диагностична процедура, за която е предназначен
        проводимият контактен гел или лосион
    conductor_core_type:
      name: Тип сърцевина на проводника
      description: Показва дали вътрешният проводник е многожилен или с твърда сърцевина
    connecting_thread:
      name: Свързваща резба
      description: Указва вида на резбата за свързване на водопроводни части, напр.
        1/2 инча IPS
    connection_method:
      name: Метод на свързване
      description: Указва вида на връзката, която продуктът използва, като безжична
        или кабелна
    connection_type:
      name: Тип връзка
      description: Указва вида на връзката, използвана от електронни устройства, напр.
        с кабел или Bluetooth
    connectivity_technology:
      name: Технология за свързване
      description: Определя метода за пренос на данни в даден продукт, напр. Bluetooth,
        USB
    connectivity_type:
      name: Тип свързаност
      description: Изяснява дали платката е без запояване (стил макетна платка) или
        проектирана за запояване
    connector_1_type:
      name: Тип на конектор 1
      description: Определя конектора или интерфейса, наличен на първия край на адаптера
        или съединителя
    connector_2_type:
      name: Тип на конектор 2
      description: Определя конектора или интерфейса, наличен на втория край на адаптера
        или съединителя
    connector_contact_plating:
      name: Покритие на контактите на конектора
      description: Определя повърхностното покритие, приложено към електрическите
        контакти за подобряване на проводимостта и устойчивостта на корозия
    connector_design:
      name: Дизайн на конектора
      description: Идентифицира дизайна на верижни конектори или връзки, като отворен
        край или с бутон за натискане
    connector_gender:
      name: Пол на конекторите
      description: Указва пола на краищата на конекторите в електрониката, напр. мъжки,
        мъжки към женски
    connector_mounting_style:
      name: Стил на монтаж на конектора
      description: Показва как конекторът е механично монтиран или интегриран в сглобка
        (напр. печатна платка, панел, шаси, кабел, съединител).
    connector_orientation:
      name: Ориентация на конектора
      description: Описва физическата ориентация на съединителния интерфейс спрямо
        монтажната повърхност или кабела (напр. прав, под прав ъгъл, вертикален).
    connector_position:
      name: Позиция на конектора
      description: Описва местоположението на видеоконектора, когато екранът се гледа
        отпред (напр. долу вдясно, горе вляво).
    connector_type:
      name: Тип конектор
      description: Указва стила или стандарта на конектора, присъстващ на краищата
        на джъмперния кабел.
    console_accessories_included:
      name: Включени аксесоари за конзола
      description: Изброява ключовите аксесоари или компоненти, пакетирани с конзолата
        (например контролери, кабели, докинг станция, игри).
    console_system:
      name: Система на конзолата
      description: Определя конкретната марка на конзола за видеоигри, като Atari
        2600 или Playstation
    console_type:
      name: Тип конзола
      description: Класифицира физическия типоразмер на конзолата и предназначената
        среда за използване.
    constitutive_ingredients:
      name: Основни съставки
      description: Указва основните компоненти, използвани във формулата на продукта,
        напр. пчелен восък, масло от шипка
    construction:
      name: Строителство
      description: Показва метода или техниката на изработка на метални изделия, използвани
        при производството на бижута (напр. позлатени, вермейл, с пълнеж, плътни)
    construction_set_theme:
      name: Тема за строителен комплект
      description: Идентифицира темата на строителен комплект, като например пирати
        или животни
    contact_lens_case_accessories_included:
      name: Включени аксесоари за кутията за контактни лещи
      description: Изброява допълнителните предмети, опаковани с кутията за контактни
        лещи.
    contact_lens_case_features:
      name: Характеристики на кутията за контактни лещи
      description: Подчертава забележителните функционални характеристики или включвания
        на кутията.
    contact_lens_material:
      name: Материал на контактните лещи
      description: Определя полимерната формула или семейство материали (напр. хидрогел,
        силиконов хидрогел), от които е направена лещата.
    contact_material:
      name: Материал на контактите
      description: Идентифицира метала или покритието, използвано за контактите на
