    bullion_form:
      name: Форма на кюлчета
      description: Указва вида на кюлчетата, като кръгове или правоъгълни
    bungee_arm_mechanism:
      name: Механизъм на бънджито за мишка
      description: Определя технологията, използвана за окачване и насочване на кабела
        на мишката (напр. пружинно рамо, еластичен шнур, магнитно окачване)
    burner_material:
