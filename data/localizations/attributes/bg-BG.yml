        могат бързо да изберат подходящото решение за намаляване на шума от вятъра
    microscope_features:
      name: Характеристики на микроскопа
      description: Подчертава уникалните аспекти на микроскопите, като преносимост
        или функция за памет
    microscope_slide_material:
      name: Материал за предметни стъкла за микроскоп
      description: Указва вида на материала, използван в предметни стъкла за микроскоп,
        като стъкло или пластмаса
    midi_connectivity:
      name: MIDI свързаност
      description: Идентифицира типа MIDI връзка на музикални инструменти, като MIDI
        in или USB midi
    mimo_technology:
      name: MIMO технология
      description: Показва технологията за безжична връзка с множество входове и множество
        изходи, поддържана от рутера
    mineral_class:
      name: Клас минерали
      description: Идентифицира конкретната категория минерал, като оксиди или силикати
    mineral_compound_form:
      name: Форма на минерално съединение
      description: Посочва химичната форма или хелат на минерала (напр. цитрат, глицинат),
