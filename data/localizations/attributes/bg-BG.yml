    espresso_boiler_type:
      name: Тип нагревателна система на еспресо машина
      description: Описва конфигурацията на нагревателната система, използвана за
        производство на кафе и пара.
    fabric_care_product_form:
      name: Форма на продукта за грижа за тъкани
      description: Определя физическата форма на продукт за грижа за тъкани, като
        омекотител за тъкани или добавка за сушилня.
    fabric_softener_features:
      name: Характеристики на омекотителя за тъкани
      description: Подчертава специалните характеристики или предимства на омекотителите
        за дрехи.
    fabric_stiffness_level:
      name: Ниво на твърдост на тъканта
      description: Посочва степента на твърдост или стегнатост, която нишестето придава
