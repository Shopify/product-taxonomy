    motherboard_form_factor:
      name: Форм фактор на дънната платка
      description: Указва физическите размери и стандарти на дънната платка, напр.
        ATX, Mini-ITX
    motherboard_memory_features:
      name: Характеристики на паметта на дънната платка
      description: Описва характеристиките на паметта на дънна платка, като ECC или
        небуферирана
    motion:
