    fragrance_refill_type:
      name: Вид пълнител с аромат
      description: Определя формата на пълнителите с аромати, които дифузерът поддържа.
    freezer_configuration:
      name: Конфигурация на фризера
      description: Идентифицира физическата ориентация/стил на дизайна на фризерния
        модул.
    freezing_method:
      name: Метод на замразяване
      description: Определя технологията, използвана за замразяване на сместа в машината
