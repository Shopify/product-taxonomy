    mounting_type:
      name: Тип монтаж
      description: Указва как се инсталира или закрепва даден продукт, като щипка
        или вендуза
    mouse/trackball_features:
      name: Функции на мишка/тракбол
      description: Описва специални характеристики на мишки/тракболи, като ергономичен
        дизайн или регулируемо тегло
    mouse_pad_features:
      name: Характеристики на подложката за мишка
      description: Описва уникални характеристики на подложка за мишка, като осветление
        или зашити ръбове
    mouse_port_type:
      name: Тип порт за мишка
      description: Указва типа връзка за компютърна мишка, напр. безжична UBS, Bluetooth
    mouse_technology:
      name: Технология на мишката
      description: Указва функционалността или дизайна на компютърна мишка, като например
        безжична или игрална
    mouthgard_design:
      name: Дизайн на предпазител за уста
      description: Идентифицира дизайна на спортни предпазители за уста, като единични
        или двойни
    mouthpiece:
      name: Мундщук
      description: Идентифицира вида на мундщука за музикални инструменти, като A
        или Bass
    moving/shipping_box_material:
      name: Материал на кутията за преместване/транспортиране
      description: Идентифицира материала, използван в кутиите за преместване или
        транспортиране, като картон или пластмаса
    mp3_player_accessories_included:
      name: Включени аксесоари за MP3 плейър
      description: Идентифицира допълнителните аксесоари, опаковани с MP3 плейър,
        като калъф или зарядно за кола
    mpaa_rating:
      name: MPAA рейтинг
      description: Идентифицира рейтинга на Motion Picture Association of America
        (MPAA) за медии, като G или PG-13
    multi_gpu_technology:
      name: Твхнология Multi-GPU
      description: 'Указва способността на дънната платка да поддържа множество GPU,
        напр. не се поддържа, CrossFireX '
    multiplexer_technology:
      name: Технология на мултиплексора
      description: Определя основната технология на сигнала или дължината на вълната,
        използвана от мултиплексора (напр. CWDM, DWDM)
    muscle_stimulator_design:
      name: Дизайн на мускулен стимулатор
      description: Идентифицира типа мускулен стимулатор, като лента за крака или
        стикер
    music_genre:
      name: Музикален жанр
      description: Класифицира продуктите според специфичния им музикален жанр, като
        Коледни или поп рок
    music_stand_design:
      name: Дизайн на музикална стойка
      description: Описва вида на музикалната стойка, като за под или за стена
    musical_key:
      name: Музикален тон
      description: Указва музикалния тон на инструмент, напр. C мажор, F#
    nail_art_items_included:
      name: Включени артикули за ноктопластика
      description: Идентифицира специфичните аксесоари за ноктопластика в комплект,
        като ваденки или инструмент за поставяне на точки
    nail_art_medium_type:
      name: Тип средство за ноктопластика
      description: Определя основното средство или форма на материала за принадлежностите
        за ноктопластика
    nail_care_features:
      name: Характеристики за грижа за ноктите
      description: Описва специфични качества на продуктите за грижа за ноктите, като
        устойчивост на напукване или бързо изсъхване
    nail_design:
      name: Дизайн на нокти
      description: Определя естетическия модел или завършека на елементи за нокти,
        напр. френски връх, омбре
    nail_polish_drying_form:
      name: Форма за сушене на лак за нокти
      description: Идентифицира метода на нанасяне на средства за изсушаване на лак
        за нокти, като капки или спрей
    nail_shape:
      name: Форма на ноктите
      description: Описва стила на върха на ноктите за козметични продукти, например
        бадем, квадрат
    national/regional_rating:
      name: Национален/регионален рейтинг
      description: Указва националнния или регионалния рейтинг за видео игра, напр.
        MA 15+, всички възрасти
    native_aspect_ratio:
      name: Оригинално съотношение
      description: Указва оригиналното съотношение на екрана, обикновено за проектори;
        например 16:8
    nebulizer_design:
      name: Дизайн на пулверизатор
      description: Определя дизайна и преносимостта на пулверизатор, например ръчен,
        настолен
    nebulizer_technology:
      name: Технология на пулверизатор
      description: Указва технологията, използвана в пулверизаторите, напр. мрежа,
        струя
    neck_color:
      name: Цвят на грифа
      description: Идентифицира цвета на зоната на грифа на китара, като например
        бяла или многоцветна
    neck_material:
      name: Материал на грифа
      description: Идентифицира материала, използван в грифа на струнни инструменти,
        като кленово дърво или палисандрово дърво
    neck_pattern:
      name: Шаблон на грифа
      description: Идентифицира дизайна или щампа върху грифа на китара, като цветя
        или райета
    necklace_design:
      name: Дизайн на колие
      description: Описва стила на колието, например висулка или медальон
    neckline:
      name: Деколте
      description: Използва се за описание на формата на деколтето на дреха, като
        V-образно деколте или лодка
    needle_coating_type:
      name: Тип покритие на иглата
      description: Посочва всяко повърхностно покритие, нанесено върху тялото на иглата
        за подобряване на плъзгането или терапевтичните свойства
    needle_eye_type:
      name: Тип ухо на игла
      description: Описва размера и вида на ухото на иглата, например голямо или разделено.
    needle_gauge:
      name: Диаметър на иглата
      description: Показва дебелината на иглите, използвани в медицината или практиките
        за татуиране, като 18 или 22
    needle_housing_material:
      name: Материал на корпуса на иглата
      description: Идентифицира материала на корпуса на иглата, като пластмаса или
        неръждаема стомана
    needle_material:
      name: Материал на иглата
      description: Определя състава на иглите, обикновено в акупунктурата; напр. неръждаема
        стомана, позлатена
    needle_size:
      name: Размер на иглата
      description: Описва размера на иглите за изкуства и занаяти, напр. 14, 100/16
    needlecraft_kit_type:
      name: Тип комплект за ръкоделие
      description: Идентифицира типа комплект за ръкоделие, като плетене на една кука
        или кръстат бод
    negative/slide_storage_type:
      name: Тип съхранение на негатив/диапозитив
      description: Указва метода за съхраняване на фотографски негативи или диапозитиви,
        напр. архивна кутия за съхранение, въртележка за диапозитиви
    nema_enclosure_rating:
      name: NEMA оценка на корпуса
      description: Определя класификацията на типа на NEMA, която дефинира защитата
        срещу опасности от околната среда (напр. тип 4X, тип 12)
    net_material:
      name: Материал на мрежата
      description: Идентифицира типа материал, използван в мрежести продукти, като
        найлон или полиестер
    net_mounting_type:
      name: Тип монтаж на мрежа
      description: Идентифицира как се монтира тенис мрежа, като щипка или стойка
        за триножник
    network_cable_interface:
      name: Интерфейс за мрежов кабел
      description: Указва типа конектор на мрежов кабел, напр. BNC, MPO/MTP
    network_layer_support:
      name: Поддръжка на мрежови слой
      description: Показва най-високите функции за превключване или маршрутизиране
        на OSI слой, предоставени от комутатора
    network_protocols_supported:
      name: Поддържани мрежови протоколи
      description: Определя мрежовите стандарти, които устройството поддържа, напр.
        TCP/IP, DNS
    networking_standards:
      name: Мрежови стандарти
      description: 'Указва протоколите, които мрежовото устройство поддържа, напр.
        IEEE 802.3 '
    neutral_density_rating:
      name: Класификация на неутрална плътност
      description: Определя оптичната плътност или сила на филтъра с неутрална плътност,
        изразена чрез общи фактори с неутрална плътност или намаления на стъпки
    nightgown_style:
      name: Стил нощница
      description: Указва стил на нощница, напр. бебешка кукла, риза
    nipple_material:
      name: Материал на биберона
      description: Указва материала, използван за биберона на бутилката, напр. латекс,
        гума
    nipple_shape:
      name: Форма на биберона
      description: Определя формата на биберона на бебешката бутилка, като плоски
        или ъглови
    nipple_type:
      name: Тип биберони
      description: Указва типа на биберона на бебешките бутилки, като широко гърло
        или стандартно
    nock_material:
      name: Материал на нока
      description: Указва вида на материала, използван за нокове за стрели, като алуминий
        или пластмаса
    noise_cancellation_technology:
      name: Технология за намаляване на шума
      description: Указва типа система за намаляване на шума, използвана в слушалките,
        помагайки на купувачите да идентифицират модели с активен, пасивен или адаптивен
        контрол на шума
    noise_intensity:
      name: Интензивност на шума
      description: Описва нивото на звука, произведен от продукт, обикновено фойерверки;
        например ниско, високо
    noise_reduction_system:
      name: Система за намаляване на шума
      description: Указва вградените аналогови стандарти за намаляване на шума, поддържани
        от устройството
    notepad_cover_type:
      name: Тип корица на бележника
      description: Идентифицира вида на корицата на книга, като твърди корици или
        меки корици
    notepad_design:
      name: Дизайн на бележник
      description: Описва подвързването или оформлението на бележник, като спираловидно
        или дисково подвързано
    nozzle_coating:
      name: Покритие на дюзата
      description: Указва всяко повърхностно покритие, приложено към дюзата за подобряване
        на износоустойчивостта или намаляване на прилепването на филамента
    nozzle_thread_type:
      name: Тип резба на дюзата
      description: Определя механичната резба или монтажния стандарт, използван за
        прикрепване на дюзата (например M6, MK8, E3D V6, Volcano)
    nozzle_type:
      name: Тип дюза
      description: Определя вида на дюзата за стоматологични водни струи, напр. ортодонтска,
        за почистване на език
    nursery_theme:
      name: Тема за детска стая
      description: Определя дизайна или мотива на продукти, свързани с детска стая,
        като джунгла или динозавър
    nursing_cover_coverage:
      name: Покритие за кърмене
      description: Определя покритието, осигурено от покритие за кърмене, като пълно
        или частично
    nursing_pad_design:
      name: Дизайн на подложка за кърмене
      description: Описва физическите характеристики на подложките за кърмене, като
        дебели или кръгли
    nursing_pillow_shape:
      name: Форма на възглавница за кърмене
      description: Идентифицира контура на възглавниците за кърмене, като C-образна
        форма или U-образна форма
    nut/seed_type:
      name: Тип ядки/семена
      description: Идентифицира конкретния вид ядка или семена в продукт, като бадеми
        или семена от чиа
    nut_butter_variety:
      name: Разновидност на ядково масло
      description: Разпознава разновидността на ядките в пастите на основата на ядки,
        напр. фъстъци, бадеми
    nut_form:
      name: Форма на гайки
      description: Описва формата на железарски гайки, например квадрат, крило
    nut_processing_method:
      name: Метод за обработка на ядки
      description: Определя как се приготвят ядки или семена, например захаросани,
        сурови
    nutrient_content:
      name: Съдържание на хранителни вещества
      description: Указва наличните хранителни елементи, обикновено за торове; например
        азот, фосфор
    oboe_key_system:
      name: Ключова система за обой
      description: Идентифицира ключовата система на обой, като френска или консерватория
    ocarina_style:
      name: Стил окарина
      description: Описва стила на окарините, напр. напречна или висяща
    occasion:
      name: Повод
      description: Определя подходящото събитие или обстановка за даден продукт, например
        ежедневен, официален
    occasion_style:
      name: Стил на повода
      description: Помага за категоризирането на продукти въз основа на повод, напр.
        ежедневен, рокля
    odor_remover_application_area:
      name: Зона на приложение на средството за премахване на миризми
      description: Определя къде е предназначен продуктът да се нанася за премахване
        на миризма
    office_cart_features:
      name: Характеристики на офис количката
      description: Описва специфичните характеристики на офис количка, като регулируеми
        рафтове или заключващи се колела
    office_instrument_material:
      name: Материал за офис инструменти
      description: Уточнява състава на офис инструменти, например дърво или акрил
    office_supply_material:
      name: Канцеларски материали
      description: Идентифицира основния материал за офис консумативи, като кожа или
        картон
    oil_extraction_method:
      name: Метод за извличане на масло
      description: Определя как основното масло е било обработено или извлечено (напр.
        студено пресовано, рафинирано)
    oil_type:
      name: Тип масло
      description: Указва типа масло, използвано в даден продукт, напр. парафин, керосин
    olfactory_family:
      name: Обонятелно семейство
      description: Определя общата обонятелна категория, към която принадлежи даден
        аромат, като например алдехиден, животински
    one_piece_style:
      name: Стил на една част
      description: Идентифицира специфичния стил на дреха от една част, като гащеризон
        или комбинезон
    open/closed_sign_design:
      name: Отворен/затворен дизайн на табела
      description: Указва стила на знак за отворено/затворено, напр. работно време,
        персонализиран
    opening_direction:
      name: Посока на отваряне
      description: Указва посоката, в която се отваря даден продукт, обикновено за
        порти; напр. еднопосочно люлеене
    opening_mechanism:
      name: Механизъм за отваряне
      description: Указва как се отваря даден продукт, обикновено за врати за бебета
        или домашни любимци; например лост, крачен педал
    operating_mode:
      name: Режим на работа
      description: Определя метода на работа, типично за медицинско оборудване; например
        полуавтоматичен
    operating_system:
      name: Операционна система
      description: Определя системния софтуер, който устройството използва, като iOS
        или ChromeOS
    operating_system_compatibility:
      name: Съвместимост на операционната система
      description: Идентифицира операционните системи, които дистанционният затвор
        поддържа веднага щом го разопаковате.
    operation_mechanism:
      name: Механизъм на работа
      description: Описва как инструментът прилага напрежение и реже връзката (напр.
        ръчно, пневматично, автоматично)
    operation_method:
      name: Метод на работа
      description: Определя как се работи с даден продукт, обикновено за устройства
        за отваряне на гаражни врати; например ремъчно задвижване, хидравлично
    optical_disc_recordability:
      name: Възможност за запис на оптичен диск
      description: Определя дали оптичният диск е еднократно записваем, или презаписваем
        и дали е едно- или двуслоен
    optical_drive_form_factor:
      name: Типоразмер на оптичния диск
      description: Определя физическия размер и стила на инсталиране на диска
    optical_drive_loading_mechanism:
      name: Механизъм за зареждане на оптичния диск
      description: Показва как дисковете се поставят в устройството (напр. зареждане
        чрез тава, зареждане през слот, зареждане отгоре)
    optical_drive_type:
      name: Тип оптично устройство
      description: Идентифицира медийните формати, които оптичното устройство може
        да чете и записва, напр. CD-ROM, DVD-ROM
    optical_frame_design:
      name: Дизайн на оптичната рамка
      description: Определя дали очилата имат рамка или не, напр. без рамка, пълна
        рамка
    optical_zoom:
      name: Оптично увеличение
      description: Показва възможността за увеличение на камерата, напр. без увеличение,
        повече от 30x
    oral_care_function:
      name: Функция за орална грижа
      description: Подчертава основната дентална полза или полза за оралното здраве,
        за която помага продуктът (напр. избелване, облекчаване на чувствителността,
        здраве на венците)
    oral_care_items_included:
      name: Включени предмети за орална грижа
      description: Изброява видовете продукти за орална грижа, съдържащи се в комплекта
    organizer_type:
      name: Тип органайзер
      description: Указва категорията за съхранение на превозното средство, като поставка
        за чаша или жабка
    orientation:
      name: Ориентация
      description: Указва предвиденото позициониране на продукта, напр. хоризонтално,
        вертикално
    orthotic_coverage_length:
      name: Дължина на покритието на ортезата
      description: Определя каква част стъпалото покрива опората за свода (напр. пълна
        дължина, 3/4 дължина, подложка за петата)
    outdoor_equipment_features:
      name: Характеристики на оборудване на открито
      description: Идентифицира уникални характеристики на екипировката за работа
        на открито, като например устойчивост на атмосферни влияния или преносимост
    outdoor_furniture_items_included:
      name: Включени елементи за външно обзавеждане
      description: Идентифицира конкретните артикули, включени в комплект мебели за
        открито, като столове или маса
    outdoor_power_accessories_included:
      name: Включени аксесоари за захранване на открито
      description: Указва допълнителни артикули, предоставени с външно захранващо
        оборудване, напр. резачка, тапи за уши
    outdoor_walking_activity:
      name: Разходка на открито
      description: Класифицира продукти въз основа на планирана дейност на открито,
        напр. трекинг, бягане по пътека
    outerwear_clothing_features:
      name: Характеристики на връхни дрехи
      description: Идентифицира специалните характеристики на връхни дрехи, като изолация
        или водоустойчивост
    outlet_type:
      name: Тип изход
      description: Указва типа щепсел за електронни устройства, напр. тип A, тип L
    output_connection:
      name: Изходна връзка
      description: Указва типа изходна връзка за аудио кабели, като 3,5 мм или RCA
    output_connection_type:
      name: Тип връзка за изход
      description: Определя конектора или интерфейсния стандарт, предоставен от преобразувателя
        на изходната му страна
    output_level:
      name: Изходно ниво
      description: Описва изходното ниво на аксесоарите за музикални инструменти,
        като ниско или високо
    output_signal_interface:
      name: Интерфейс на изходящия сигнал
      description: Определя типовете връзки за изход, предоставени от преобразувателя
    output_video_interface:
      name: Интерфейс на изходното видео
      description: Определя типовете видеоконектори, които са предоставени като изход
        от преобразувателя за сканиране
    output_waveform:
      name: Форма на изходна вълна
      description: Указва вида на сигнала, генериран от електронен осцилатор, като
        трион или синус
    oven_accessories_included:
      name: Включени аксесоари за фурна
      description: Подробности за включените допълнителни компоненти на фурната, като
        тиган за печене или решетка
    overclock_profile_support:
      name: Поддръжка на профил за увеличаване на работната честота на процесора
      description: Идентифицира стандартизираните профили за увеличаване на работната
        честота на процесора, съхранени в модула (напр. Intel XMP, AMD EXPO)
    oxygen_cylinder_outlet_standard:
      name: Стандарт за изходен отвор на кислородна бутилка
      description: Посочва CGA стандарта за изходна връзка на клапана на бутилката
    oxygen_tank_valve_type:
      name: Тип вентил на кислородния резервоар
      description: Указва вентила, използван в резервоарите за кислород, напр
    pa_rating:
      name: Степен на защита PA
      description: Определя степента на UVA защита на слънцезащитния крем (напр. PA+,
        PA+++, PA++++) въз основа на метода за хиперпигментация
    pacifier/teether_design:
      name: Дизайн на бибеон/гризалка
      description: Описва дизайна на бебешки биберони и гризалки, напр. пръстеновидни,
