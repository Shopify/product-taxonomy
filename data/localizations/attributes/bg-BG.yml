    food_storage_features:
      name: Характеристики за съхранение на храни
      description: Подчертава специалните характеристики, които добавят функционалност
        или удобство към продукта за съхранение на храни.
    food_wrap_features:
      name: Характеристики на фолиото за храна
      description: Подчертава специфичните характеристики, които влияят върху употребата
