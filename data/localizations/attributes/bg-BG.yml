    footwear_type_compatibility:
      name: Съвместимост на видовете обувки
      description: Идентифицира вида обувки, за които е предназначен оформящият елемент.
    formulation_concentration:
      name: Концентрация на формулата
      description: Идентифицира дали продуктът е концентрат или готова за употреба
