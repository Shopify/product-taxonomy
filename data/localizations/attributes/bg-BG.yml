    bottle_closure_type:
      name: Тип затваряне на бутилката
      description: Идентифицира типа затваряне, използван за бутилка, напр. корк или
        капачка тип „корона“
    bottle_design:
      name: Дизайн на бутилка
      description: Описва характеристиките на бутилка, обикновено за бебешки продукти,
