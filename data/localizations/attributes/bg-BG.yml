    book_cover_type:
      name: Тип корици на книга
      description: Идентифицира вида на корицата на книга, като твърди корици или
        меки корици
    bookmark_design:
      name: Дизайн на отметки
      description: Описва стила или типа на отметка, напр. магнитна или клипс
    bookmark_shape:
      name: Форма на отметка
      description: Описва формата на отметка, напр. кръгла или квадратна
    boombox_lighting_effects:
