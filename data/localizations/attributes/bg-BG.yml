      description: Идентифицира материала, използван в конструкцията на печка или
        горелка за грил, като чугун или неръждаема стомана
    butt_cap_color:
      name: Цвят на капачката на водача
      description: Указва цвета на капачката на водача на въдиците, като черен или
        син
    butt_cap_material:
      name: Материал на капачката на водача
      description: Определя състава на долния край на дръжката на спортни стоки, напр.
        EVA (етилен винил ацетат), корк
    butt_cap_pattern:
      name: Модел на капачката на водача
      description: Описва дизайна или мотива на крайната капачка на въдица, напр.
        камуфлаж или цветя
    button/snap_closure_type:
      name: Тип закопчаване с копче/закопчалка
      description: Описва стила на механизма за закопчаване, като например магнитен
