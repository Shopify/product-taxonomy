    motorcycle/scooter_type:
      name: Тип мотоциклет/скутер
      description: Класифицира типа мотоциклет или скутер, като офроуд или мотопед
    motorcycle_drive_type:
      name: Тип задвижване на мотоциклет
      description: Указва трансмисионния механизъм на мотоциклета, като вал или верига
    motorcycle_glove_purpose:
      name: Предназначение на ръкавици за мотоциклет
      description: Идентифицира предвидената употреба на ръкавици за мотоциклет, като
        офроуд или туринг
    motorcycle_tire_type:
      name: Тип гума за мотоциклет
      description: Класифицира гумата за мотоциклет въз основа на нейната употреба,
        като състезание или скутер
    mount/stand_features:
      name: Характеристики за монтаж/стойка
      description: Подробности за специфичните характеристики на монтажа или стойката
