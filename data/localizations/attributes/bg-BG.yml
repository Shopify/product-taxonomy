    mount_material:
      name: Материал за монтиране
      description: Указва състава на стойката на продукта, като неръждаема стомана
        или пластмаса
    mounting_hardware:
      name: Монтажен хардуер
      description: Идентифицира типа хардуер, използван за инсталиране или монтиране
