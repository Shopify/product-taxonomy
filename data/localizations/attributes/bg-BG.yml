    book/file_cover_material:
      name: Материал за корицата на книга/папка
      description: Идентифицира материала, използван в кориците на книги или папки,
        като например картон или кожа
    book_cover_material:
      name: Материал за корицата на книга
      description: Идентифицира материала, използван за корици на книги, като кожа
