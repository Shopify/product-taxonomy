    mount_installation_point:
      name: Точка за монтиране на стойката
      description: Показва къде в превозното средство или оборудването е монтирана
        стойката
    mount_interface_system:
      name: Система на интерфейса за монтаж
      description: Идентифицира патентованата или индустриално-стандартна платформа
