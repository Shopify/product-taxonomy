    calendar_format:
      name: Формат на календара
      description: Указва времевата рамка на календарен продукт, като ежедневен или
        месечен
    calibration_sensor_type:
      name: Тип сензор за калибриране
      description: Указва основната хардуерна технология или типоразмера на калибратора
    call_blocking_method:
      name: Метод за блокиране на повиквания
      description: Определя как устройството идентифицира и блокира нежелани повиквания
    caller_id_compatibility:
      name: Съвместимост с идентификатор на обаждащия се
      description: Посочва дали телефонът поддържа услуги за идентификатор на обаждащия
        се, предоставени от телефонната мрежа
    caller_id_standard_compatibility:
      name: Съвместимост със стандарт за идентификация на обаждащия се
      description: Показва кои формати за сигнализиране на идентификация на обаждащия
        се устройството може да декодира
    cam_system:
      name: Система на камерата
      description: Указва системата на камерата, използвана в оборудването за стрелба
        с лък, напр. хибридна, единична
    camera_attachment:
      name: Приставка за камера
      description: Указва частта или аксесоара на камерата, като ъглов визьор или
