    food_dehydrator_surface_type:
      name: Тип повърхност за дехидратиране на храна
      description: Описва стила на повърхността на листовете/тавите, който влияе върху
        въздушния поток и отделянето на храната.
    food_dehydrator_tray_type:
      name: Тип тава за дехидратор за храни
      description: Идентифицира специфичния стил или функционален дизайн на тавата.
    food_grater_type:
      name: Тип ренде за храна
      description: Определя структурния стил на рендето.
    food_processor_attachments_included:
      name: Включени приставки за кухненски робот
      description: Изброява конкретните видове приставки, включени в комплекта, за
