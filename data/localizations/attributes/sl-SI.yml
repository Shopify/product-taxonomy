      description: Razlikuje izdelke z absintom po njihovih edinstvenih sortah, na
        primer rouge, verte
    absorbency_level:
      name: Stopnja vpojnosti
      description: Definira vpojnost, običajno za izdelke za osebno nego, na primer
        nočna krema, lahka tekstura
    absorbent_hygiene_product_features:
      name: Lastnosti vpojnih higienskih izdelkov
      description: Določa posebne lastnosti higienskih izdelkov, kot je neprepustnost
