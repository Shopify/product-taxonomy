    track_lighting_system_compatibility:
      name: Združljivost sistema reflektorskih luči
      description: Navaja električni in mehanski standard vodila, za katerega je svetilo
        ali dodatek zasnovan.
    track_rail_circuit_configuration:
      name: Konfiguracija tirnega tokokroga
      description: Označuje število ali vrsto električnih krogov, ki jih tirno vodilo
        podpira, kar vpliva na neodvisno upravljanje skupin svetil.
    track_system_standard:
      name: Standard tirnega sistema
      description: Določa fizični standard tirnega vodila, na katerega se prilega
        napajalni priključek, kar omogoča kupcem, da uskladijo komponente s svojim
        tirnim vodilom (npr. H, J ali L tirno vodilo).
    tractor_tire_application:
      name: Uporaba traktorskih pnevmatik
      description: Označuje primarno uporabo ali okolje, za katero je pnevmatika zasnovana.
    tractor_tire_tread_classification:
      name: Razvrstitev profilov traktorskih pnevmatik
      description: Razvršča vzorec profilov traktorskih pnevmatik v skladu s kmetijskimi
        in industrijskimi standardi.
    tree_shape:
      name: Oblika drevesa
      description: Opisuje splošno silhueto ali profil umetnega drevesa.
    trigger_type:
      name: Vrsta sprožilca
      description: Navaja sprožilni mehanizem, ki se uporablja za nadzor pretoka vode
        na šobi.
    trimmer_line_feed_system:
      name: Sistem za podajanje nitke za obrezovalnik
      description: Opredeljuje, kako se rezalna nitka med delovanjem pomika od glave.
    trimmer_line_shape:
      name: Oblika nitke za obrezovalnik
      description: Opisuje prečni prerez nitke za obrezovalnik, ki vpliva na zmogljivost
        rezanja in hrup.
    turntable_type:
      name: Vrsta vrtljivega podstavka
      description: Določa slog kuhališča, ki ločuje tradicionalne steklene vrtljive
        podstavke od ravnih ali nagnjenih podstavkov, ki se ne vrtijo.
    ultrasonic_cleaner_accessories_included:
      name: Priloženi dodatki za ultrazvočni čistilnik
      description: Navaja dodatne komponente, ki so priložene čistilniku, da kupci
        natančno vedo, kaj je v škatli.
    umbrella_base_type:
      name: Vrsta podstavka za dežnik
      description: Določa strukturni slog ali zasnovo montaže podstavka.
    umbrella_opening_mechanism:
      name: Mehanizem za odpiranje dežnika
      description: Določa, kako se dežnik razpre in zapre.
    umbrella_type:
      name: Vrsta dežnika
      description: Navaja celotno zasnovo ali obliko dežnika.
    upf_rating:
      name: Ocena UPF
      description: Označuje faktor zaščite pred ultravijoličnim sevanjem (UPF) tkanine
        senčnika, ki količinsko opredeljuje njeno učinkovitost pri blokiranju škodljivih
        UV-žarkov.
    utensil_flexibility:
      name: Prilagodljivost pripomočka
      description: Označuje, kako trdno ali prožno je telo strgala, kar vpliva na
        primernost za ukrivljene posode ali trdo testo.
    utensil_holder_features:
      name: Značilnosti držala za pripomoček
      description: Opisuje posebne funkcionalne lastnosti držala za kuhinjske pripomočke.
    utensil_tray_features:
      name: Značilnosti pladnja za pripomočke
      description: Izpostavlja posebne lastnosti, ki izboljšujejo funkcionalnost pladnja.
    vacuum_hose_connection_type:
      name: Tip priključka vakuumske cevi
      description: Opisuje vrsto priključka na koncih cevi, ki zagotavlja pravilno
        mehansko prileganje sesalnikom ali dodatkom.
    valance_style:
      name: Slog okrasnega naborka
      description: Določa dekorativni slog okrasnega naborka, kar pomaga strankam
        pri izbiri slgoa, ki se ujema z njihovim okrasjem.
    valet_organizer_features:
      name: Značilnosti polnilnega stojala z organizatorjem
      description: Izpostavlja posebne organizacijske značilnosti, vgrajene v sistem
        za polnjenje.
    valve_configuration:
      name: Konfiguracija ventila
      description: Določa funkcionalni slog ventila za vrtno cev, kar kupcem pomaga
        hitro izbrati pravo rešitev za njihovo namakalno napravo.
    valve_stem_angle:
      name: Kot ventila
      description: Navaja usmeritev/kot ventila glede na cev, kar vpliva na preprostost
        napihovanja in prileganje obroča.
    vase_filler_type:
      name: Vrsta polnila za vazo
      description: Razvršča izdelek glede na vrsto polnilnega materiala ali obliko.
    vent_pipe_type:
      name: Vrsta prezračevalne cevi
      description: Klasificira slog konstrukcije dimnika ali prezračevalne cevi.
    vent_style:
      name: Slog prezračevalnega kanala
      description: Razvršča strukturni slog ali namen prezračevalnega elementa.
    waffle_style:
      name: Slog vaflja
      description: Določa mrežo ali vzorec vaflja, ki ga ustvarijo plošče.
    wallpaper_removal_type:
      name: Vrsta odstranjevanja tapet
      description: Označuje preprostost odstranitve pri prenovi.
    wallpaper_washability_rating:
      name: Ocena pralnosti tapet
      description: Določa, kako se lahko površina tapete očisti po namestitvi.
    warmer_type:
      name: Vrsta grelnika
      description: Navaja primarni mehanizem segrevanja ali namembno uporabo sveče
        ali oljnega grelca.
    warmth_level:
      name: Raven toplote
      description: Klasificira splošno raven toplote ali sezonsko primernost odeje
        ali prešite odeje.
    warmth_rating:
      name: Ocena toplote
      description: Označuje stopnjo izolacije odeje, podobno kot ocene TOG pri posteljnini.
    waste_container_lid_features:
      name: Značilnosti pokrova zabojnika za odpadke
      description: Izpostavlja posebne funkcionalnosti ali izboljšave, vgrajene v
        pokrov.
    waste_container_sign_message:
      name: Sporočilo na znaku zabojnika za odpadke
      description: Določa specifičen tok odpadkov ali opozorilno besedilo, natisnjeno
        na etiketi ali znaku.
    water_filtration_technology:
      name: Tehnologija filtracije vode
      description: Opisuje osnovno tehnologijo ali mehanizem, ki se uporablja za čiščenje
        vode.
    water_heater_element_connection_type:
      name: Vrsta priključka grelnega elementa vode
      description: Opredeljuje način montaže elementa, pri čemer razlikuje med vijačnimi
        in različnimi prirobničnimi izvedbami.
    water_sensor_design:
      name: Zasnova senzorja vode
      description: Navaja fizični slog elementa za zaznavanje vode.
    water_supply_type:
      name: Vrsta oskrbe z vodo
      description: Opredeljuje, kako naprava prejema vodo, pri čemer razlikuje med
        rezervoarji za ročno polnjenje in vodovodnimi cevmi.
    watering_needs:
      name: Potrebe po zalivanju
      description: Opisuje tipične potrebe rastline po vodi.
    wax_paper_form:
      name: Oblika povoskanega papirja
      description: Navaja, ali se povoskani papir prodaja kot zvitek ali kot vnaprej
        narezani listi.
    weather_guard_mounting_method:
      name: Način pritrditve zaščite pred vremenskimi vplivi
      description: Navaja, kako se zaščita pritrdi na podajalnik ali podporno konstrukcijo.
    wheel_bearing_type:
      name: Vrsta kolesnega ležaja
      description: Opredeljuje notranjo konstrukcijo ležaja ali puše kolesa, kar vpliva
        na gladkost kotaljenja in zahteve glede vzdrževanja.
    wheel_tread_style:
      name: Vzorec profila kolesa
      description: Navaja profil kolesa, ki vpliva na oprijem, raven hrupa in morebitne
        sledi na tleh.
    whistling:
      name: Žvižganje
      description: Navaja, ali grelnik vode oddaja žvižgajoč zvok, ko voda doseže
        vrelišče.
    wick_material:
      name: Material stenja
      description: Opredeljuje sestavo uporabljenega stenja (npr. bombaž, steklena
        vlakna).
    window_film_installation_surface:
      name: Površina za namestitev okenske folije
      description: Navaja, ali je folija zasnovana za notranjo, zunanjo ali dvostransko
        uporabo.
    window_film_type:
      name: Vrsta okenske folije
      description: Kategorizira funkcionalni slog folije (npr. zasebnost v primerjavi
        z varnostjo).
    window_rod_type:
      name: Vrsta okenske palice
      description: Klasificira funkcionalni slog okenske palice.
    window_screen_type:
      name: Vrsta okenske mreže
      description: Določa strukturni slog ali način delovanja okna.
    window_treatment_lining_type:
      name: Vrsta podloge za okrasne zavese
      description: Navaja, ali je okrasni naborek ali karnisa podložena in kakšna
        vrsta podloge je uporabljena.
    wine_aerator_type:
      name: Vrsta prezračevalnika vina
      description: Navaja obliko ali način delovanja vinskega prezračevalnika.
    wine_glass_style:
      name: Slog vinskega kozarca
      description: Navaja predvideno vrsto vina ali obliko kozarca za optimizacijo
        arome in okusa.
    wok_bottom_type:
      name: Vrsta dna voka
      description: Določa obliko dna voka, kar vpliva na združljivost z različnimi
        kuhališči in obroči za vok.
    wood_grain_orientation:
      name: Orientacija lesnih vlaken
      description: Navaja usmerjenost lesnih vlaken v izdelku, kot so prečna vlakna,
        vzdolžna vlakna ali površinska vlakna. Usmerjenost vlaken vpliva na trajnost
        in prijaznost do noža.
    wood_seasoning_method:
      name: Metoda obdelave lesa
      description: Pokaže, kako je lesno gorivo sušeno ali zorjeno, kar vpliva na
        vsebnost vlage in kakovost gorenja.
    wrap_format:
      name: Oblika zavijanja
      description: Navaja fizično obliko, v kateri je folija za živila dobavljena,
        na primer v zvitkih ali vnaprej narezanih listih.
    abacus_bead_material:
      name: Material kroglic za abakus
      description: Primarni material kroglic za abakus.
    abec_rating:
      name: Ocena ABEC
      description: Določa stopnjo natančnosti ležajev na podlagi klasifikacije ABEC,
        ki označuje gladkost delovanja in stopnje tolerance.
    abrasive_level:
      name: Raven abrazivnosti
      description: Relativna rezalna moč polirnega sredstva/paste na avtomobilskih
        lakih.
    absinthe_accessories_included:
      name: Priloženi dodatki za absint
      description: Podrobnosti o vseh dodatkih, ki so priloženi izdelku, kot so žlice,
        kozarci ali sladkorne kocke.
    ac_compressor_mounting_style:
      name: Slog montaže kompresorja klimatske naprave
      description: Opisuje način mehanske montaže/pritrditve ali vmesnik nosilca kompresorja
        na pogonski sistem motorja/dodatne opreme.
    ac_compressor_oil_type:
      name: Vrsta olja za kompresor klimatske naprave
      description: Določa kemijsko sestavo mazivnega olja, ki ga zahteva/uporablja
        kompresor klimatske naprave (najpogostejše vrste vključujejo PAG in POE).
    accent_modes:
      name: Načini poudarkov
      description: Določa, kako lahko metronom poudari udarce znotraj takta (poleg
        osnovnega klika).
    access_mechanism:
      name: Mehanizem dostopa
      description: Opisuje, kako uporabnik doseže dvignjeno spalno ploščad v mansardi.
    accessibility_features:
      name: Funkcije za dostopnost
      description: Določa opremo in konfiguracije minibusa, povezane z dostopnostjo.
    accessories_included:
      name: Vključena dodatna oprema
      description: Navaja dodatne elemente, ki so priloženi stolu (npr. tabure, ledvena
        blazina), kar daje kupcem jasen pregled nad dodano vrednostjo.
    accessory_pieces_included:
      name: Priloženi dodatni deli
      description: Navaja modne dodatke, ki so vključeni v večdelni darilni komplet
        ali paket modnih dodatkov.
    acoustic_amplifier_feedback_control_features:
      name: Funkcije za nadzor povratne zveze akustičnega ojačevalnika
      description: Označuje vgrajena orodja za preprečevanje povratne zveze za akustične
        instrumente (npr. pasovno zaporni filter, fazno stikalo, samodejno preprečevanje
        povratne zveze).
    acoustic_drum_kit_components_included:
      name: Vključene komponente kompleta akustičnega bobna
      description: Označuje, kateri glavni sestavni deli so vključeni v komplet (samo
        komplet bobnov z ogrodjem ali celoten komplet; činele/pritrdilni material).
    acoustic_guitar_body_shape:
      name: Oblika telesa akustične kitare
      description: Opisuje obliko/obris telesa akustične kitare, ki vpliva na zvok,
        udobje in tipično uporabo.
    acoustic_guitar_string_core_design:
      name: Zasnova jedra strun za akustično kitaro
      description: Konstrukcija jedra navitih strun.
    acoustic_piano_key_material:
      name: Material tipk akustičnega klavirja
      description: Določa primarni material, uporabljen za zgornje dele tipk klavirja/slonovino.
    acoustic_piano_lid_type:
      name: Tip pokrova akustičnega klavirja
      description: Določa vrsto mehanizma pokrova, ki se uporablja pri akustičnem
        klavirju (za razlikovanje med pokrovom pri koncertnem klavirju in pokončnem
        klavirju).
    acoustic_piano_plate_frame_material:
      name: Material plošče/okvirja akustičnega klavirja
      description: Določa glavni material klavirske plošče/okvira (harfa), običajno
        lito železo.
    acoustic_piano_soundboard_material:
      name: Material resonančne plošče akustičnega klavirja
      description: Določa primarni material, uporabljen za zvočno ploščo klavirja.
    action_figure_scale:
      name: Merilo akcijske figurice
      description: 'Označuje razmerje zbirateljskega merila (npr. 1 : 12), kateremu
        je dodatek namenjen.'
    action_type:
      name: Vrsta dejanja
      description: Opisuje mehanizem streljanja ali napenjanja puške (npr. zaklep,
        prelomna cev, vzvod).
    actuation_mechanism:
      name: Pogonski mehanizem
      description: 'Označuje, kako ročica aktivira zavorni sistem: izključno z mehanskim
        kablom, popolnoma hidravlično, hidravlično s kablom ali elektronsko/brezžično.'
    actuation_method:
      name: Metoda aktivacije
      description: Kako se sistem za gašenje aktivira ali sproži.
    adapter_orientation:
      name: Orientacija razdelilnika
      description: Določa kot ali konfiguracijo adapterja za ventil kolesarske pnevmatike,
        kar vpliva na dostopnost tlačilke (npr. naravnost, 90°).
    additive_application_stage:
      name: Faza aplikacije aditivov
      description: Označuje, kdaj v postopku je izdelek namenjen uporabi.
    adhesive_backing:
      name: Lepilna podlaga
      description: Ali ima tiskana svila lepilno podlago za aplikacijo tipa "odlepi
        in prilepi".
    adhesive_formulation:
      name: Formulacija lepila
      description: Označuje kemično osnovo ali formulacijo lepila, kot je cianoakrilat
        ali epoksi.
    adhesive_sides:
      name: Lepilne stranice
      description: Označuje, ali je lepilni trak lepljiv na eni ali obeh straneh traku/mreže.
    adjunct_grain_processing_form:
      name: Oblika dodatne predelave žita
      description: Označuje fizično/predelano obliko pomožnega žita, kot se prodaja
        za pivovarstvo (npr. kosmičasto, torificirano, sladno, surovo).
    adjustability_type:
      name: Vrsta prilagodljivosti
      description: Določa, kakšno vrsto nastavitve opornik podpira, če sploh katero.
    adjustable_cup_mutes:
      name: Nastavljivi dušilci za trobente
      description: Označuje, ali je dušilec nastavljiv/odstranljiv in kakšen je način
        prilagajanja.
    adjustable_zones:
      name: Nastavljive cone
      description: Določa, katere dele podnožja je mogoče prilagoditi neodvisno.
    adjustment_type:
      name: Vrsta prilagoditve
      description: Označuje, ali je regulator nastavljiv in kako se izvede nastavitev.
    administration_method:
      name: Način dajanja
      description: Navaja, kako se konju daje sredstvo proti glistam (npr. peroralno
        ali z injekcijo), kar pomaga kupcem upoštevati veterinarska navodila in izbrati
        obvladljiv način aplikacije.
    advice_card_prompt_type:
      name: Vrsta poziva kartice za nasvet
      description: Vrsta poziva, natisnjenega na kartici (ali odsotnost poziva).
    aeration_method:
      name: Metoda prezračevanja
      description: Opisuje vrsto prezračevanja, ki ga zagotavlja ali podpira vsebnik,
        s čimer se zagotovi zadostna količina kisika za živo vabo.
    aero_package_components:
      name: Komponente aerodinamičnega paketa
      description: Označuje, katere ključne aerodinamične komponente so nameščene
        na vozilu (izberite vse, kar velja).
    aerodynamic_elements_included:
      name: Vključeni aerodinamični elementi
      description: Določa, katere aerodinamične komponente so vključene v formulo
        dirkalnik (izberite vse veljavne, če so podprte).
    aftertouch_support:
      name: Podpora za Aftertouch
      description: Ali krmilnik podpira Aftertouch (kanal ali polifoničen) na tipkah.
    agave_content_classification:
      name: Razvrstitev po vsebnosti agave
      description: Navedba, ali je tequila izdelana iz 100 % modre agave Weber ali
        pa gre za mešanico, ki vsebuje najmanj 51 % agavnega sladkorja.
    aida_cloth_count:
      name: Gostota blaga Aida
      description: Določa gostoto tkanine Aida (število kvadratov/šivov na palec),
        ki določa velikost vzorca in velikost motiva.
    aida_cloth_pre_cut_format:
      name: Prednarezana oblika tkanina Aida
      description: Označuje, ali se tkanina Aida prodaja kot vnaprej narezan kos,
        celoten kos, odrezan z zvitka, ali na roli.
    air_bag_material:
      name: Material zračne blazine
      description: Določa material zračne blazine/rezervoarja, ki se uporablja pri
        irskih dudah.
    air_bed_internal_construction:
      name: Notranja konstrukcija zračne postelje
      description: Opisuje notranjo strukturo ali tehnologijo podpore, ki se uporablja
        v notranjosti zračne postelje za udobje in stabilnost.
    air_dry_clay_color_form:
      name: Barva iz zračno sušene gline
      description: Ali se glina prodaja že obarvana, bela/nevtralna za slikanje ali
        kot mešanica/asortiment.
    air_hockey_items_included:
      name: Vključeni kosi za zračni hokej
      description: Navaja posamezne dodatke, ki so vključeni v komplet, da kupci natančno
        vedo, kaj bodo prejeli (npr. 2 ročaja, 4 ploščki, 2 podložki s filcem).
    air_intake_temperature_sensor_mounting_style:
      name: Način montaže senzorja temperature dovodnega zraka
      description: Fizični način namestitve senzorja IAT v dovodnem sistemu.
    air_integration_capability:
      name: Možnost integracije zraka
      description: Označuje, ali in kako potapljaški računalnik podpira brezžične
        oddajnike tlaka v jeklenkah.
    air_mattress_valve_type:
      name: Vrsta ventila za zračno vzmetnico
      description: Določa vrsto ventila, ki mu dodatek ustreza ali ga vsebuje, kar
        zagotavlja združljivost med tlačilkami, ventili in nadomestnimi deli.
    air_water_rocket_kit_items_included:
      name: Vsebina kompleta za izdelavo rakete na zrak in vodo
      description: Ključne komponente, ki so vključene v komplet rakete (izstrelitev,
        črpalka, zakrilca, deli za polnjenje).
    air_water_rocket_launch_method:
      name: Način izstrelitve rakete na zrak in vodo
      description: Kako je raketa pod pritiskom/se izstreli (interakcija uporabnika
        in slog opreme).
    airbag_position:
      name: Položaj zračne blazine
      description: Določa predvideni položaj/območje zadrževanja, ki ga podpira del
        zračne blazine.
    aircraft_ads_b_capability:
      name: Zmogljivost sistema ADS-B za letala
      description: Določa, ali je letalo opremljeno za skladnost s sistemom ADS-B
        Out.
    aircraft_airframe_material:
      name: Material trupa letala
      description: Primarni material(i), uporabljen(i) pri konstrukciji trupa letala.
    aircraft_cabin_configuration:
      name: Konfiguracija kabine letala
      description: Določa razporeditev kabine letala (npr. konferenčna postavitev,
        zofa, štiri-conska kabina).
    aircraft_documentation_included:
      name: Vključena dokumentacija letala
      description: Navaja, kateri dokumenti so priloženi delu (npr. 8130-3).
    aircraft_galley_configuration:
      name: Konfiguracija kuhinjskega dela letala
      description: Prisotnost in vrsta kuhinje/prehranskih prostorov v kabini.
    aircraft_installation_location:
      name: Lokacija namestitve v letalu
      description: Kje v letalu je del ali dodatna oprema vgrajena ali se uporablja.
    aircraft_internet_connection:
      name: Internetna povezava letala
      description: Označuje prisotnost/vrsto internetne povezave v kabini.
    aircraft_landing_gear_type:
      name: Vrsta pristajalnega podvozja letala
      description: Določa konfiguracijo podvozja žirokopterja.
    aircraft_lavatory_configuration:
      name: Konfiguracija stranišč v letalu
      description: Vrsta konfiguracije stranišča v letalu.
    aircraft_maintenance_program_enrollment:
      name: Vpis v program vzdrževanja letal
      description: Označuje, ali je letalo vključen v program vzdrževanja motorja
        in/ali trupa, in če je, katera vrsta kritja velja (motor, trup ali oboje).
    aircraft_operational_certification:
      name: Certificiranje delovanja letala
      description: Določa regulativno ali operativno podlago za certifikacijo, v skladu
        s katero se letalo uporablja (odvisno od pristojnosti, npr. FAA del 91/135/121,
        EASA AOC).
    aircraft_protective_gear_certification:
      name: Certificiranje zaščitne opreme letala
      description: Določa letalski/regulativni ali industrijski standard, ki ga mora
        zaščitna oprema izpolnjevati.
    aircraft_system_application:
      name: Aplikacija letalskega sistema
      description: Določa, kateremu sistemu ali območju letala pripada del/dodatek
        (uporablja se za brskanje in filtriranje med različnimi deli letala).
    airflow_resistance_level:
      name: Raven zračne upornosti letala
      description: Kaže, kako omejujoč se zdi dušilec glede na protitlak/zračni upor.
    airship_envelope_material:
      name: Material ovoja zračne ladje
      description: Primarni material ovoja zračne ladje (zunanja plast).
    airsoft_part_type:
      name: Vrsta dela za airsoft
      description: Določa vrsto funkcionalne komponente ali dodatka za orožje airsoft
        npr. nabojnik, cev, ščitnik za roko).
    airworthiness_approval_basis:
      name: Podlaga za odobritev plovnosti
      description: Določa osnovo za odobritev/certificiranje za del, kjer je to primerno
        (npr. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Nastavljivost glasnosti alarma
      description: Označuje, ali in kako lahko uporabnik prilagodi glasnost alarma.
    alcohol_ink_finish_effect:
      name: Učinek končne obdelave z alkoholnim črnilom
      description: Opisuje vizualni učinek/končni videz, ki ga ustvari formulacija
        alkoholnega črnila (več, kot le barva) na primer kovinski ali biserni.
    alignment_aid_style:
      name: Slog pripomočka za poravnavo
      description: Opisuje vrsto vodil za poravnavo, natisnjenih ali vtisnjenih v
        površino podlage (npr. ravna črta, oznake razdalje).
    alternator_cooling_type:
      name: Vrsta hlajenja alternatorja
      description: Opisuje, kako se alternator hladi in zrači.
    alternator_marine_ignition_protection_rating:
      name: Ocena zaščite pred vžigom za ladijske alternatorje
      description: Označuje, ali je alternator zaščiten pred vžigom za prostore z
        ladijskimi motorji (npr. v skladu s standardom SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Konfiguracija montaže alternatorja
      description: Določa fizično konfiguracijo montaže, ki se uporablja za pritrditev
        alternatorja na nosilec motorja.
    alternator_pulley_type:
      name: Tip jermenice alternatorja
      description: Določa zasnovo jermenice/sklopke na alternatorju (ali označuje,
        da jermenica ni vključena).
    alternator_regulator_type:
      name: Tip regulatorja alternatorja
      description: Navedite, ali je napetostni regulator vgrajen v alternator ali
        je zunanjega tipa ter ali ga upravlja proizvajalec originalne opreme (upravljanje
        prek računalnika/PCM).
    alternator_terminal_connection_type:
      name: Vrsta povezave terminal alternatorja
      description: Osnovni način električnega priključka za izhodne/vzbujevalne priključke
        alternatorja, ki pomaga zagotoviti združljivost kabelskega snopa.
    altitude_suitability:
      name: Primernost za nadmorsko višino
      description: Označuje, ali je žoga zasnovana za stanja določene nadmorske višine,
        ki vplivajo na hitrost in odboj.
    ambulance_stretcher_mount_type:
      name: Vrsta montaže nosilca za reševalno vozilo
      description: Določa vrsto sistema za nalaganje/montažo nosil, ki ga podpira
        reševalno vozilo.
    american_football_safety_certification:
      name: Certifikat o varnosti za ameriški nogomet
      description: Označuje varnostne certifikate ali standarde, specifične za ameriški
        nogomet, ki jih izpolnjuje izdelek.
    amplifier_tube_function:
      name: Funkcija ojačevalne cevi
      description: Določa funkcionalno vlogo cevi znotraj tokokroga ojačevalnika instrumenta
        (npr. predojačevalnik v primerjavi z močjo).
    analog_synthesizer_cv_gate_i_o:
      name: Vhodi in izhodi CV/Gate
      description: Označuje vrste krmilnih napetosti in povezav vrat, ki so podprte
        za integracijo z modularno/analogno opremo.
    analog_synthesizer_keybed_configuration:
      name: Konfiguracija tipkovnice analognega sintetizatorja
      description: Opisuje, ali ima sintetizator vgrajeno tipkovnico in če jo ima,
        število tipk.
    anchor_configuration:
      name: Konfiguracija sidra
      description: Kaže, ali sistem za vzmetenje uporablja eno osrednjo pritrdilno
        točko ali več neodvisnih pritrdilnih točk, kar vpliva na raznolikost vaj in
        zahtevnost postavitve.
    animal_raising_method:
      name: Metoda vzreje živali
      description: Opisuje kmetijske ali živinorejske prakse, ki se uporabljajo za
        izvorno žival.
    animal_species:
      name: Živalske vrste
      description: Določa žival ali bitje, ki ga predstavlja plišasta žival (npr.
        medved, zajček, dinozaver).
    animal_trap_jaw_style:
      name: Slog čeljusti za past a živali
      description: Konfiguracija čeljusti pasti, ki vpliva na moč zadrževanja in dobrobit
        živali.
    animal_trap_type:
      name: Vrsta pasti za živali
      description: Razvršča mehansko zasnovo/obliko pasti, kar kupcem omogoča hitro
        iskanje natančne metode ulova, ki jo potrebujejo ali jo dovoljujejo predpisi.
    ankle_collar_style:
      name: Slog gleženjskega dela
      description: Opisuje stil ali konstrukcijo gleženjskega dela čevlja, na primer
        nizek, srednje visok, visok, za nogavice ali brez vezalk, kar vpliva na oporo,
        prileganje in videz.
    ankle_guard_protection_level:
      name: Stopnja zaščite gležnja
      description: Ocenjuje splošno raven zaščite pred udarci, ki jo zagotavlja ščitnik
        za gleženj.
    ankle_strap_padding_type:
      name: Tip oblazinjenja trakca okoli gležnja
      description: Opisuje blažilni material ali pristop oblazinjenja, ki se uporablja
        znotraj traku in vpliva na udobje.
    ankle_strap_type:
      name: Vrsta traku za gleženj
      description: Klasificira konstrukcijo ali zasnovo gležnjevega traku pri vezeh
        za desko za sneg.
    ant_farm_habitat_medium_type:
      name: Vrsta medija za gojilnico za mravlje
      description: Določa primarni medij za tuneliranje/opazovanje, ki ga zagotavlja
        ali zahteva gojilnica za mravlje
    ant_farm_kit_contents:
      name: Vsebina kompleta za gojilnico za mravlje
      description: Navaja, katere sestavne dele vsebuje komplet za gojilnico za mravlje
        (npr. posodo za bivališče, pesek/gel, kupon za mravlje, pripomočke za hranjenje).
    ant_farm_lighting_type:
      name: Vrsta razsvetljave za gojilnico za mravlje
      description: Določa vrsto vgrajene osvetlitve (če je del kompleta), ki se uporablja
        za opazovanje.
    antenna_fit_type:
      name: Vrsta prileganja antene
      description: Kateri obliki antene je namenjena antenska kroglica.
    anti_caking_agent:
      name: Sredstvo proti sprijemanju
      description: 'Določa vrsto sredstva proti sprijemanju, ki se dodaja za preprečevanje
        strjevanja v grudice: ta podatek je pomemben z vidika alergij in natančnosti
        recepture.'
    anti_g_suit_bladder_material:
      name: Material mehurja v protigravitacijski obleki
      description: Material, uporabljen za notranji(-e) napihljivi(-e) mehur(-je)
        znotraj obleke proti gravitaciji; navedite vse, če je uporabljenih več materialov.
    anti_g_suit_connector_type:
      name: Vrsta priključka protigravitacijske obleke
      description: Določa vrsto/standard priključka za zračno/tlačno cev, ki se uporablja
        za povezavo z letalom ali regulatorjem.
    anti_g_suit_inflation_method:
      name: Način napihovanja obleke anti-G
      description: Označuje, na kakšen način so mehurji protigravitacijske obleke
        pod pritiskom, da zagotavljajo gravitacijsko zaščito.
    anti_g_suit_size_system:
      name: Sistem velikosti protigravitacijske obleke
      description: Standard velikosti, ki se uporablja za določitev sistema velikosti/prileganja
        obleke.
    anti_reverse_type:
      name: Vrsta sistema proti povratnemu vrtenju
      description: Določa vrsto mehanizma proti povratnemu vrtenju, ki vpliva na nastavitev
        umetne vabe in povratni hod.
    anti_theft_feature:
      name: Funkcija proti kraji
      description: Označuje, ali nosilec/držalo zagotavlja zaščito pred krajo, kot
        so zaklepni pritrdilni elementi ali zasnova, ki ščiti pred nedovoljenim posegom.
    antique_gun_ignition_system:
      name: Sistem za vžig starinske pištole
      description: Določa zgodovinski sistem streljanja/vžiga, ki ga je uporabljalo
        starinsko strelno orožje.
    apple_variety:
      name: Sorta jabolka
      description: Določa sorto ali različico jabolk (npr. Gala, Fuji, Granny Smith),
        kar strankam pomaga pri izbiri glede na okus, teksturo in kulinarično uporabo.
    applique_edge_finish:
      name: Zaključna obdelava roba našitka
      description: Opisuje, kako so obdelani robovi, kar vpliva na videz in odpornost
        proti strganju.
    arbor_type:
      name: Vrsta loka
      description: Razvršča rolo glede na zasnovo jedra tuljave, kar vpliva na hitrost
        navijanja vrvice, kapaciteto podloge in spomin vrvice.
    archery_accessory_type:
      name: Vrsta dodatka za lokostrelstvo
      description: Določa vrsto dodatka, namenjenega za lokostrelsko opremo, da lahko
        kupec hitro filtrira izdelke.
    archery_part_type:
      name: Vrsta dela za lokostrelstvo
      description: Določa specifično strojno opremo ali nadomestni del, ki je naprodaj
        (npr. ročaj, krak, tetiva), kar omogoča natančno filtriranje, ne da bi se
        odprlo kategorijsko drevo.
    archery_range_accessory_type:
      name: Vrsta dodatka za lokostrelsko strelišče
      description: Razvršča posamezne vrste opreme, ki se uporablja na strelišču za
        lokostrelstvo, kar kupcem omogoča, da hitro poiščejo točno tisto, kar potrebujejo.
    archery_target_features:
      name: Značilnosti tarč za lokostrelstvo
      description: Navaja posebne funkcionalne ali praktične lastnosti, ki niso zajete
        v drugih lastnostih (npr. samopopravljiva pena, ročaj za prenašanje).
    archery_tool_type:
      name: Vrsta orodja za lokostrelstvo
      description: Razvršča določeno vrsto orodja ali opreme za lokostrelstvo.
    armband_features:
      name: Značilnosti zapestnice
      description: Navaja posebne funkcionalne ali vizualne lastnosti, ki izboljšajo
        zapestnico.
    armguard_style:
      name: Stil ščitnika za podlaket
      description: Določa slog izdelave ali obliko ščitnika za podlaket, kar daje
        vpogled v obseg zasnove ter tradicionalen ali sodoben videz.
    armor_protection_type:
      name: Vrsta oklepne zaščite
      description: Vrsta zaščite, ki jo zagotavlja sistem oklepja vozila.
    armrest_adjustability:
      name: Nastavljivost naslona za roke
      description: Določa dimenzijsko prilagodljivost in konfiguracijo naslonov stola
        za roke (npr. fiksni, 2D, 3D, preklopni).
    armrest_type:
      name: Vrsta naslona za roke
      description: Opisuje prisotnost in nastavljivost naslonjal za roke na stolu
        (npr. brez naslonjala, fiksno, nastavljivo, snemljivo).
    arrow_bolt_point_type:
      name: Tip konice puščice
      description: Določa slog konice, nameščene na puščici.
    arrow_component_type:
      name: Vrsta sestavnega dela puščice
      description: Klasificira posamezne dele ali dodatke za puščice (vložki, ovitki,
        puše, lepila itd.), da lahko kupci filtrirajo izdelke, ne da bi potrebovali
        na desetine dodatnih podkategorij.
    arrow_containment_level:
      name: Stopnja zajetja puščice
      description: Opisuje, ali nastavek "rest" puščico v celoti zajema, delno zajema
        ali je ne zajema.
    arrow_fletching_orientation:
      name: Orientacija peres puščice
      description: Določa smer ali kot namestitve perja (npr. levo pero, desno pero,
        vijačno pero), ki določa smer vrtenja puščice med letom.
    arrow_nock_groove_size:
      name: Velikost utora puščice
      description: Določa velikostni razred utora pete puščice, kar določa združljivost
        z različnimi premeri tetiv.
    arrow_nock_type:
      name: Vrsta utora puščice
      description: Oblika/slog utora puščice, ki se stika s tetivo.
    arrow_rest_style:
      name: Slog resta puščice
      description: Opredeljuje način delovanja/mehanizem resta za puščico (npr. drop-away,
        blade, whisker biscuit). Slog določa, kako rest podpira, drži in ustreli puščico
        ter je primarni način razlikovanja izdelkov.
    arrow_shaft_compatibility:
      name: Združljivost cevk za puščice
      description: Označuje standard cevke/vložka puščice, v katerega se prilega utor
        puščice (npr. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Slog konice orodja za umetnost/ustvarjanje
      description: Opisuje obliko/profil delovne konice (npr. koničasta ali zaobljena
        kroglica), da navede vrsto reliefnih sledi, ki jih ustvarja.
    art_ink_lightfastness_rating:
      name: Ocena svetlobne obstojnosti črnila za umetniško ustvarjanje
      description: Označuje odpornost črnila proti bledenju pri izpostavljenosti svetlobi,
        običajno izraženo s standardnimi ocenami.
    art_ink_opacity:
      name: Motnost umetniškega črnila
      description: Določa stopnjo prekrivnosti črnila po nanosu.
    art_security_rating:
      name: Varnostna ocena ART
      description: Določa nizozemsko oceno ART z zvezdicami (1–5 zvezdic), ki je bila
        podeljena ključavnici.
    artichoke_cut:
      name: Del artičoke
      description: Navaja, kateri del ali pripravljeno obliko artičoke se ponuja (npr.
        cela, sredica, spodnji del), da bodo kupci vedeli, koliko hrane dobijo in
        za kakšne kulinarične namene je primerna.
    artichoke_variety:
      name: Sorta artičok
      description: Navaja sorto ali botanično različico artičoke, ki kupcem pomaga
        razlikovati med velikostmi, barvami, okusi in načini uporabe v kuhinji.
    articulation_features:
      name: Značilnosti artikulacije
      description: Označuje, ali ima model dinozavra premične dele (gibljiva čeljust,
        okončine, rep) in splošno gibljivost.
    artificial_bait_form:
      name: Oblika umetne vabe
      description: Označuje fizično obliko ali slog videza vabe za ribe.
    asa_mounting_type:
      name: Vrsta montaže ACA
      description: Označuje vrsto vmesnika adapterja za vir zraka (ASA) ali standard
        pritrditve, ki ga uporabljajo spustne tirnice (npr. dovetail, vodilo, neposredna
        pritrditev).
    ascender_descender_type:
      name: Vrsta prižeme za vzpenjanje/spuščanje
      description: Razvrsti slog prižeme za vzpenjanje ali spuščanje za natančnejše
        filtriranje.
    aspiration_type:
      name: Način dovajanja zraka
      description: Označuje način dovajanja/polnjenja zraka v motor.
    assembly_state:
      name: Stanje montaže
      description: Označuje, ali je omara poslana pripravljena za montažo, predhodno
        sestavljena ali je poslana v kakšni drugačni obliki.
    assistance_mechanism:
      name: Mehanizem pomoči
      description: Opisuje morebitne vgrajene sisteme za pomoč ali upore, ki jih vadbeni
        stolp ponuja za izvajanje potegov, dipov ali drugih vaj.
    atemoya_cultivar:
      name: Sorta atemoje
      description: Navedena je imenovana sorta/vrsta atemoje, kar kupcem omogoča,
        da izberejo sadeže z okusom, velikostjo ali lastnostmi semen, ki jim najbolj
        ustrezajo.
    athletic_cup_size:
      name: Velikost ščitnika za mednožje
      description: Označuje velikost ščitnika, ki jo je določil proizvajalec, da se
        zagotovi ustrezno prileganje športniku.
    attachment_position:
      name: Položaj pritrditve
      description: Določa, na kateri del sedeža ali kolesarja je torba namenjena za
        pritrditev.
    attractant_scent_profile:
      name: Profil privabljala
      description: Opisuje specifičen vonj ali okus, ki se uporablja za privabljanje
        divjih živali ali prikrivanje človeškega vonja.
    atv_utv_intended_use:
      name: Predvidena uporaba vozil ATV/UTV
      description: Primarna predvidena uporaba/slog vozila ATV/UTV.
    audio_channel_configuration:
      name: Konfiguracija avdio kanala
      description: Število ločenih avdio kanalov, ki jih podpira izenačevalnik/DSP
        (npr. 2-kanalni stereo, 4-kanalni spredaj/zadaj, 6-kanalni).
    audio_inputs:
      name: Avdio vhodi
      description: Določa vrste vhodnih priključkov za avdio, ki so na voljo za vzorčenje/snemanje
        (npr. 1/4-palčni linijski, XLR, 3,5 mm, mikrofonski predojačevalnik, gramofonski).
    audio_output:
      name: Avdio izhod
      description: Označuje, ali igrača oddaja zvok in kako se zvok oddaja.
    audio_outputs:
      name: Avdio izhodi
      description: Določa razpoložljive povezave zvočnega izhoda, vključno z glavnimi
        izhodi in vsemi dodeljivimi/pomožnimi izhodi.
    audio_playback_source:
      name: Vir predvajanja zvoka
      description: Primarni medijski viri, iz katerih lahko sistem za karaoke predvaja
        glasbo.
    autograph_authentication:
      name: Avtentikacija avtograma
      description: Označuje stanje/vrsto avtentikacije za avtogram na kartici.
    autograph_format:
      name: Oblika avtograma
      description: Opisuje, ali gre pri podpisu za izvirni, ročno podpisani avtogram,
        žigosano/natisnjeno kopijo ali za posvetilo/dodatek.
    autogyro_cockpit_enclosure:
      name: Ohišje kabine avtožira
      description: Določa, ali je pilotska kabina odprta ali zaprta.
    available_firing_modes:
      name: Razpoložljivi načini streljanja
      description: Prikaže seznam izbirnih načinov streljanja, ki jih marker podpira
        že ob nakupu.
    avocado_variety:
      name: Sorta avokada
      description: Določa kultivar ali sorto avokada, kar pomaga kupcu razlikovati
        med razlikami v okusu, teksturi, velikosti in vsebnosti olja.
    award_customization_included:
      name: Vključeno je prilagajanje priznanja
      description: Označuje, kakšna prilagojenost je vključena v nakup priznanja.
    award_material:
      name: Material priznanja
      description: Določa primarni material(-e) priznanja (pokal, plaketa, medalja,
        značka, trak).
    award_mounting_display_type:
      name: Vrsta namestitve/razstave nagrade
      description: Določa, kako naj bi bila nagrada razstavljena ali nameščena (na
        steni, na mizi ali je namenjena za nošenje)
    award_plaque_plate_material:
      name: Material plakete
      description: Določa material plošče z imenom/gravirane plošče, pritrjene na
        plaketo (razlikuje se od materiala opore).
    award_ribbon_attachment_type:
      name: Vrsta pritrditve nagradnega traku
      description: Določa, kako naj se trak pritrdi ali nosi.
    award_ribbon_imprint_method:
      name: Način tiska na nagradne trakove
      description: Določa, kako se besedilo/grafika uporabi na traku.
    award_ribbon_material:
      name: Material za nagradni trak
      description: Glavni material traku (npr. saten, poliester).
    award_ribbon_placement_title:
      name: Mesto/naziv na nagradnem traku
      description: Standardno mesto ali naziv, ki ga označuje trak (npr. 1. mesto,
        udeleženec).
    axle_compatibility:
      name: Združljivost osi
      description: Navaja standard osi kolesa, kar zagotavlja združljivost z okvirjem
        in vilicami kolesa.
    back_beam_type:
      name: Vrsta zadnjega žarka
      description: Vrsta/nastavljivost hrbtnega valja (npr. fiksni ali nastavljiv
        po višini).
    back_design:
      name: Zasnova hrbtne strani
      description: Opisuje pomembne konstrukcijske elemente na hrbtni strani oblačil,
        ki vplivajo na videz in oporo.
    back_panel_type:
      name: Vrsta zadnje plošče
      description: Določa slog ali material zadnje plošče omarice, kar vpliva na vidljivost
        in ujemanje dekorja.
    back_sides_material:
      name: Material za hrbet in stranice
      description: Določa material, uporabljen za zadnjo stran in stranice trupa klasične
        kitare.
    backing_type:
      name: Vrsta opore
      description: Opisuje način podlage/pritrditve prodajanega okrasnega kamenčka
        (za samolepilne izdelke).
    backup_camera_mounting_location:
      name: Mesto namestitve kamere za vzvratno vožnjo
      description: Označuje predvideno mesto namestitve kamere za vzvratno vožnjo
        na vozilu.
    backup_camera_video_interface:
      name: Video vmesnik kamere za vzvratno vožnjo
      description: Določa video izhod/vmesnik/priključek, ki ga uporablja kamera za
        vzvratno vožnjo za priklop na monitor, DVR ali glavno enoto (npr. kompozitni
        RCA, LVDS OEM, IP prek omrežja Ethernet).
    badminton_set_components_included:
      name: Priložene komponente kompleta za badminton
      description: Navaja samostojne kose, ki so del kompleta za badminton.
    bag_attachment_method:
      name: Način pritrditve torbe
      description: Označuje glavni način pritrditve hidracijske torbe/nosilca na drugo
        opremo (npr. mreže MOLLE, zanke za pas, karabin).
    bag_case_carrying_style:
      name: Način nošenja torbe/etuija
      description: Opredeljuje osnovno obliko kovčka/torbe za prevoz (način, kako
        je zasnovana za prevoz).
    bag_cover_material:
      name: Material prevleke torbe
      description: Določa material prevleke torbe (zunanje prevleke), kar vpliva na
        trpežnost, oprijem in izgled.
    bag_embellishment:
      name: Okrasitev torbe
      description: Opisuje izrazite okrasne elemente na zunanji strani torbe, kot
        so resice, zakovice ali prešivanje.
    bag_fill_medium:
      name: Sredstvo za polnjenje vreči
      description: Določa snov, ki se uporablja za polnjenje ali ustvarjanje tlaka
        v vreči (npr. zrak, voda, pesek).
    bag_material:
      name: Material blazine
      description: Material zračne blazine/mehurja.
    bag_padding_level:
      name: Raven oblazinjenja blazine
      description: Določa stopnjo ali slog oblazinjenja, vključenega v blazino ali
        prevleko.
    bag_size_descriptor:
      name: Opis velikosti torbice
      description: Tržni velikostni razred za vrečasto ramensko torbico (npr. majhna,
        velika), ki dopolnjuje točno določene dimenzije.
    bagel_size:
      name: Velikost bagela
      description: Določa splošno velikost bagela, npr. mini, tanek, standardni, velik,
        ekstra velik ali jumbo velik.
    bagpipe_accessories_included:
      name: Priloženi dodatki za dude
      description: Navaja glavne sestavne dele/dodatke, ki so priloženi dudam (poleg
        samih cevi), na primer kovček, vadbena piščalka, prevleka, vrvice in sredstvo
        za uravnavanje vlage.
    bagpipes_playing_mode:
      name: Način igranja na dude
      description: Kako se med igranjem v instrument dovaja zrak.
    bait_compatibility:
      name: Združljivost vabe
      description: Navaja vrste vab, za katere je pripomoček za pelete zasnovan, kar
        ribičem pomaga zagotoviti, da se izbrano orodje ujema z njihovo želeno vabo.
    bait_species:
      name: Vrste vab
      description: Navaja glavno vrsto organizma, ki se ponuja kot vaba, kar ribičem
        pomaga zagotoviti zakonsko skladnost in učinkovitost za ciljno vrsto rib.
    baking_chip_form:
      name: Oblika čipsa za peko
      description: Opisuje fizično velikost ali obliko čokoladnih kapljic, kar vpliva
        na njihovo taljenje in končni videz recepta.
    balance_board_style:
      name: Slog ravnotežne plošče
      description: Razvršča ravnotežne deske glede na njihov mehanizem ali konstrukcijo,
        da se opiše, kako se deska premika in kakšen izziv za vadbo ponuja.
    balance_cushion_accessories_included:
      name: Vključeni so dodatki za ravnotežno blazino
      description: Navaja vse dodatke, ki so priloženi blazini, kar kupcu omogoča
        primerjavo vrednosti paketa.
    balance_type:
      name: Vrsta tehtnice
      description: Označuje stanje/stopnjo uravnoteženosti pogonske gredi ob prodaji
        (npr. tovarniško uravnotežena, uravnotežena za visoke hitrosti, neuravnotežena).
    ball_bladder_material:
      name: Material meha žoge
      description: Določa material, uporabljen za notranji mehur rokometne žoge, ki
        vpliva na zračnost žoge, odbojnost in splošno vzdržljivost.
    ball_certification:
      name: Certifikat za žogo
      description: Označuje uradna potrdila o zmogljivosti ali certifikate, ki jih
        je žoga pridobila.
    ball_construction:
      name: Konstrukcija žoge
      description: Označuje proizvodni postopek, ki se uporablja za spajanje delov
        žoge in vpliva na njeno vzdržljivost, občutek pri dotiku, vpijanje vode ter
        ceno.
    ball_core_construction:
      name: Konstrukcije sredice žoge
      description: Podrobnosti o notranji konstrukciji žoge, kar vpliva na odboj in
        občutek pri dotiku.
    ball_core_type:
      name: Vrsta sredice žoge
      description: Označuje notranjo konstrukcijo žoge, ki vpliva na odboj in porazdelitev
        teže.
    ball_cup_game_included_pieces:
      name: Igra z žogo in pokalom, vključuje figure
      description: Navaja, kateri sestavni deli so vključeni v paket igre z žogico
        in lončkom.
    ball_drilling_state:
      name: Stanje prevrtanosti žogice
      description: Označuje, ali so v krogli izvrtane luknje za prste, in če so, v
        kolikšni meri.
    ball_holder_type:
      name: Vrsta držala za žogice
      description: Določa strukturni slog ali obliko držala za žogico.
    ball_pit_ball_surface_finish:
      name: Površinska obdelava žoge za bazen z žogami
      description: Opisuje taktilno/vizualno obdelavo površine žoge, ki vpliva na
        oprijem, občutek pri igri in čiščenje.
    ball_pit_safety_features:
      name: Varnostne funkcije bazena z žogami
      description: Varnostne oblikovne značilnosti, pomembne za bazene z žogami.
    ball_pump_accessory_type:
      name: Vrsta dodatne opreme za tlačilko za žoge
      description: Opredeljuje posebno vrsto dodatkov za tlačilke za žoge, tako da
        lahko trgovci merilnike tlaka, cevi, maziva in druge dodatke uvrstijo v eno
        samo nadrejeno kategorijo.
    ball_return_mechanism:
      name: Mehanizem za vračanje žogice
      description: Določa slog vračanja žogice, vključen v podlogo, če obstaja.
    ball_return_type:
      name: Vrsta vračanja žogice
      description: Sistem zbiranja in vračanja žogice
    ball_speed_rating:
      name: Ocena hitrosti žogice
      description: Proizvajalčev hitrostni razred, ki označuje, kako hitro žogic potuje
        v standardnih pogojih.
    ball_surface_texture:
      name: Tekstura površine žoge
      description: Opisuje zunanjo teksturo ali vzorec prog na žogicah, ki lahko vpliva
        na oprijem in estetiko.
    ball_surface_type:
      name: Vrsta površine žoge
      description: Opisuje zunanji premaz ali blaženje žogice, kar označuje občutek
        pri udarcu in oprijem.
    ballonet_configuration:
      name: Konfiguracija baloneta
      description: Vrsta in konfiguracija balonetnega sistema za uravnavanje trima
        in tlaka (pri netogih in poltogih zračnih ladjah).
    balloon_closure_valve_type:
      name: Tip zapiranja/ventila balona
      description: Določa, kako je balon zatesnjen po napihovanju (npr. z vrvico,
        samotesnilnim ventilom).
    balloon_kit_finish:
      name: Izgled balonov v kompletu
      description: Opisuje površinsko/vizualno obdelavo balonov v kompletu.
    balloon_kit_material:
      name: Material balonov v kompletu
      description: Določa primarni material balonov v kompletu.
