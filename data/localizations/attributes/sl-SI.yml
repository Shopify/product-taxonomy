      description: Navaja, ali ovoj nudi toplotno izolacijo za ohranjanje pijače hladne
        ali tople.
    slice_style:
      name: Slog rezine
      description: Navaja primarni slog rezanja, ki ga proizvaja kuhinjski rezalnik,
        na primer julienne ali waffle.
    slipcover_stretch_type:
      name: Vrsta raztegljive prevleke
      description: Navaja stopnjo in smer elastičnosti tkanine, uporabljene v prevleki.
    smoker_type:
      name: Vrsta aparata za dimljenje
      description: Razvršča aparat za dimljenje glede na njegovo strukturno zasnovo
        ali način dimljenja.
    smoking_chip_size:
      name: Velikost sekancev za dimljenje
      description: Navaja fizično velikost sekancev za dimljenje, kar vpliva na hitrost
        gorenja in primernost za različne žare ali aparate za dimljenje.
    snow_blower_stage_type:
      name: Vrsta snežne freze
      description: Označuje število stopenj svedra/impelerja, ki se uporabljajo za
        premikanje in odlaganje snega, kar je glavna specifikacija za razlikovanje
        med enostopenjskimi, dvofaznimi in trifaznimi stroji.
    soap_dispenser_operation_type:
      name: Vrsta delovanja dozirnika mila
      description: Navaja aktivacijski mehanizem, ki se uporablja za doziranje mila
        ali losjona.
    soil_texture:
      name: Tekstura prsti
      description: Opisuje prevladujočo velikost/sestavo delcev prsti, ki vpliva na
        drenažo in prezračevanje.
    spa_installation_type:
      name: Vrsta namestitve masažnega bazena
      description: Razvršča masažno kad glede na to, kako je nameščena ali konfigurirana
        na lokaciji.
    space_heater_safety_features:
      name: Varnostne lastnosti grelnika prostora
      description: Izpostavlja vgrajene varnostne mehanizme, ki ščitijo uporabnike
        in premoženje.
    spice_organizer_features:
      name: Lastnosti organizatorja začimb
      description: Izpostavlja posebne funkcionalne lastnosti organizatorjev začimb.
    spray_pattern:
      name: Vzorec razprševanja
      description: Določa vrsto razpršitve olja, ki jo proizvaja šoba razpršilnika.
    sprayer_operation_mechanism:
      name: Mehanizem delovanja razpršilnika
      description: Navaja, kako se ustvari tlak za doziranje olja iz razpršilnika.
    spring_type:
      name: Vrsta vzmeti
      description: Opredeljuje vrsto vzmeti, ki se uporablja v mehanizmu obrezovalnika
        robov.
    sprinkle_opening_style:
      name: Slog odprtin za posipanje
      description: Določa grobost ali stil perforacij/mreže, ki se uporablja za doziranje
        kakava (fina mreža v primerjavi z velikimi odprtinami itd.).
    sprinkler_orientation:
      name: Usmerjenost požarne brizgalke
      description: Navja, kako je nameščena in zasnovana glava požarne brizgalke.
    sprinkler_response_type:
      name: Vrsta odziva brizgalke
      description: Navaja toplotno odzivno lastnost glave brizgalke.
    sprinkler_type:
      name: Vrsta razpršilnika
      description: Razvršča mehanski način delovanja ali slog razporeditve brizgalke
        za lažjo primerjavo in filtriranje.
    sprinkler_valve_type:
      name: Vrsta ventila za razpršilnik
      description: Določa funkcionaln ali aktivacijsko vrsto ventila brizgalke.
    squirrel_feed_type:
      name: Vrsta krme za veverice
      description: Opredeljuje vrste krme, za katero je krmilnik namenjen, in tako
        zagotavlja združljivost s hrano, ki jo veverice najraje jedo.
    squirrel_resistance:
      name: Odpornost proti vevericam
      description: Navaja, ali ima kletka za loj funkcije, zasnovane za odganjanje
        veveric od dostopa do loja.
    stackability:
      name: Možnost zlaganja
      description: Označuje, ali je mogoče več enot varno zložiti za prostorsko učinkovito
        shranjevanje.
    stackable_design:
      name: Zložljiva zasnova
      description: Označuje, ali je zabojnik zasnovan tako, da ga je mogoče varno
        zložiti, ko je poln ali prazen.
    stacking_capability:
      name: Zmogljivost zlaganja
      description: Navaja, ali je vsebnik mogoče zlagati, vstavljati, strniti ali
        ga ni mogoče zlagati z drugimi vsebniki.
    stainless_steel_cleaner_features:
      name: Značilnosti čistila za nerjaveče jeklo
      description: Navaja posebne lastnosti izdelka, ki so edinstvene ali še posebej
        pomembne za nego nerjavečega jekla.
    staple/pin_shape:
      name: Oblika sponk/žebljičkov
      description: Določa splošno obliko sponke in pomaga strankam izbrati med sponkami,
        oblikovanimi v črko U, okroglimi sponkami itd.
    staple_coating:
      name: Premaz sponk
      description: Opisuje vsak zaščitni premaz, ki se nanese na sponko ali žebljiček,
        da se prepreči rjavenje ali podaljša življenjska doba.
    steam_nozzle_type:
      name: Vrsta parne šobe
      description: Opredeljuje funkcionalni slog nastavka šobe parnega čistilnika.
    steam_table_pan_cover_features:
      name: Značilnosti pokrova parne namizne posode
      description: Izpostavlja posebne funkcionalne značilnosti pokrovov parne namizne
        posode, ki olajšujejo delo v gostinskih obratih.
    steam_table_pan_size:
      name: Velikost parne namizne posode
      description: Navaja velikost gastronorm posode (npr. polna, 1/2, 1/3), za katero
        je posoda ali pokrov zasnovan.
    steam_table_pan_size_compatibility:
      name: Združljivost velikosti parne namizne posode
      description: Navaja velikost gastronorm ali standardno velikost posod, ki jih
        enota lahko sprejme.
    steam_table_pan_type:
      name: Vrsta gastronorm posode
      description: Navaja konstrukcijski slog posode, ki vpliva na odvodnjavanje in
        toplotno učinkovitost.
    stemware_design:
      name: Oblika kozarca
      description: Navaja, ali ima kozarec klasičen pecelj ali je brez peclja.
    stick_tip_style:
      name: Slog konice palčke
      description: Določa obliko konice palčke in vpliva na to, kako palčka prebode
        ali podpira živila.
    stocking_toe_orientation:
      name: Usmeritev prstov nogavic
      description: Navaja smer, v katero kaže konica nogavice, ko je obešena, kar
        vpliva na vizualno simetrijo pri prikazovanju več nogavic.
    stopper_type:
      name: Vrsta zapirala
      description: Navaja vrsto zapirala, ki je priloženo dekanterju, če obstaja.
    strainer_style:
      name: Vrsta sita
      description: Razvršča zasnovo cedila ali cedilnika.
    strainer_type:
      name: Vrsta cedila
      description: Navaja slog ali obliko cedila, pri čemer navaja njegovo predvideno
        uporabo v kulinariki in strukturo mreže.
    strap_end_fitting_type:
      name: Vrsta pritrdilnega elementa na koncu traku
      description: Navaja opremo ali pritrdilni element, ki se nahaja na koncu vlečnega
        traku in omogoča povezovanje, pritrjevanje ali nastavljanje.
    straw_dispensing_mechanism:
      name: Mehanizem za izdajanje slamic
      description: Opisuje način izdajanja slamic, ki pomaga kupcem, ki iščejo posebne
        higienske ali priročne funkcije.
    sugar_dispenser_mechanism:
      name: Mehanizem posode za sladkor
      description: Podrobno opisuje, kako se sladkor posipa iz posode, kar pomaga
        kupcem pri izbiri njihovega želenega načina posipanja.
    suitable_for_pool_shape:
      name: Primerno za obliko bazena
      description: Označuje, s katerimi oblikami bazenov se lahko dodatna oprema uporablja,
        kar uporabnikom pomaga zagotoviti ustrezno prileganje.
    suitable_pool_surface_type:
      name: Primerna vrsta površine bazena
      description: Opredeljuje materiale površine bazena, za katere je krtača/metla
        zasnovana, s čimer preprečuje poškodbe površine in zagotavlja optimalno čiščenje.
    suitable_spread_material:
      name: Primeren material za trosenje
      description: Opredeljuje vrste materialov, za katere je trosilnik zasnovan.
    sundial_type:
      name: Vrsta sončne ure
      description: Opredeljuje slog oblikovanja ali znanstveno konfiguracijo sončne
        ure.
    supplement_function:
      name: Funkcija dodatka
      description: Razvršča dodatke glede na njihov primarni namen in tako pomaga
        pridelovalcem izbrati pravi dodatek za specifične potrebe rastlin.
    surface_reflectivity:
      name: Površinska odbojnost
      description: Označuje, ali je površina znaka zasnovana tako, da odbija svetlobo
        za boljšo vidljivost ponoči.
    sweetener_type:
      name: Vrsta sladila
      description: Opredeljuje glavno sladilo, uporabljeno v sirupu.
    table_skirt_pleat_style:
      name: Slog gub na namizni zavesici
      description: Določa dekorativni slog gubanja ali nabiranja zavesice, kar pomaga
        kupcem pri usklajevanju z estetskimi temami.
    tablecloth_clip_design:
      name: Oblika sponke za prt
      description: Opisuje mehanizem ali slog sponke za prt.
    tablecloth_features:
      name: Značilnosti prta
      description: Izpostavlja posebne zmogljivosti ali oblikovne značilnosti prta.
    tamper_evident_feature:
      name: Funkcija zaščite pred nedovoljenim odpiranjem
      description: Označuje prisotnost in slog funkcije zaščite pred nedovoljenim
        odpiranjem, vgrajene v pokrovček.
    tang_type:
      name: Vrsta dela rezila, ki sega v držalo
      description: Označuje obliko dela rezila, ki sega v držalo, in kako daleč ta
        del sega v držalo.
    teapot_spout_style:
      name: Slog dulca čajnika
      description: Opisuje zasnovo izlivnega dulca čajnika, ki vpliva na nadzor pri
        točenju in na estetski videz.
    temperature_zones:
      name: Temperaturna območja
      description: Določa, koliko neodvisno nadzorovanih temperaturnih con ima hladilnik
        za vino.
    thermocouple_junction_type:
      name: Vrsta spoja termoelementa
      description: Označuje konstrukcijo senzorskega spoja, ki vpliva na odzivni čas
        in električno izolacijo.
    thermometer_design:
      name: Zasnova termometra
      description: Navaja osnovni način delovanja ali tehnologijo gospodinjskega termometra.
    thermos_handle_type:
      name: Vrsta ročaja termovke
      description: Opisuje vrsto ročaja ali pripomočka za nošenje, vgrajenega v termovko.
    thread_standard:
      name: Standard navoja
      description: Določa specifikacijo navoja, ki se uporablja na priključkih dodatne
        opreme, da se zagotovi medsebojna združljivost z vodovodno instalacijo.
    tilt_mechanism:
      name: Mehanizem za nagibanje
      description: Navaja mehanizem, ki omogoča nagibanje nadstreška za optimalno
        postavitev sence.
    time_format:
      name: Oblika časa
      description: Označuje, ali se čas prikazuje v 12-urni, 24-urni obliki ali v
        obeh.
    timer_mechanism:
      name: Mehanizem časovnika
      description: Opredeljuje osnovni mehanizem, ki se uporablja za merjenje časa.
    tine_position:
      name: Položaj zobcev
      description: Opisuje konfiguracijo zobcev v razmerju do koles/motorja, kar vpliva
        na manevrsko sposobnost in prodiranje v tla.
    tire_construction:
      name: Konstrukcija pnevmatike
      description: Označuje notranjo konstrukcijsko metodo ogrodja pnevmatike.
    tire_construction_type:
      name: Vrsta konstrukcije pnevmatike
      description: Opredeljuje, ali je pnevmatika diagonalne ali radialne konstrukcije,
        kar vpliva na prožnost, nosilnost in kakovost vožnje.
    tire_tread_pattern:
      name: Vzorec profila pnevmatike
      description: Opisuje profil pnevmatike in navaja primernost za različne razmere
        na ruši in potrebe po oprijemu.
    tissue_lotion_content:
      name: Vsebina losjona za robčke
      description: Označuje, ali so robčki prepojeni z losjonom ali drugimi pomirjujočimi
        dodatki.
    toaster_features:
      name: Značilnosti opekača kruha
      description: Navaja posebne funkcije in oblikovne elemente, ki so na voljo v
        opekaču kruha.
    tong_type:
      name: Vrsta klešč
      description: Navaja primarni slog ali predvideno uporabo klešč.
    toothbrush_holder_features:
      name: Značilnosti držala za zobno ščetko
      description: Izpostavlja posebne funkcije ali oblikovne elemente, ki razlikujejo
        držalo.
    toothpick_dispensing_mechanism:
      name: Mehanizem za izdajanje zobotrebcev
      description: Opredeljuje mehanizem, s katerim se izdajajo zobotrebci.
    topographical_relief:
      name: Topografski relief
      description: Označuje, ali ima površina globusa dvignjen relief.
    towel_holder_design:
      name: Zasnova držala za brisače
      description: Opisuje strukturni slog držala za brisače, kot je palica ali obroč.
    towel_weave:
      name: Tkanje brisače
      description: Opisuje konstrukcijo ali slog tkanja tkanine brisač, ki vpliva
        na teksturo, vpojnost in čas sušenja.
    track_lighting_rail_type:
      name: Vrsta vodila za reflektorske luči
      description: Določa mehanski/električni standard vodila, ki določa, katera svetila
