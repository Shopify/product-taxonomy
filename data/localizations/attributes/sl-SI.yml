    delivery_form:
      name: Oblika dobave
      description: Fizična oblika dostave čistila za injektorje.
    denim_composition:
      name: Sestava denima
      description: Primarna vlaknasta sestava džinsa (osnovna vlakna brez barvil/apretur).
    denim_finish:
      name: Denim zaključek
      description: Površinska/obdelava, nanesena na denim tkanino.
    denim_intended_use:
      name: Namen uporabe denima
      description: Tipičen projekt/uporaba, za katero je denim namenjen.
    denim_stretch_type:
      name: Raztegljiv jeans
      description: Ali je denim mehansko raztegljiv, ima dodan elastan/spandex ali
        ga sploh ni.
    denim_wash:
      name: Pranje denima
      description: Označuje odtenek ali stopnjo pranja, ki se uporablja na denim tkanini
        (npr. svetel, temen, surov, kislost).
    derailleur_cage_length:
      name: Dolžina kletke zadnjega menjalnika
      description: Označuje dolžino kletke menjalnika, ki določa nosilnost verige
        (predvsem za zadnje menjalnike).
    derailleur_mounting_style:
      name: Način montaže menjalnika
      description: Določa, kako se menjalnik pritrdi na Frame kolesa ali nosilec (npr.
        spajkano, s spono, neposredno pritrjevanje, UDH).
    derailleur_type:
      name: Vrsta menjalnika
      description: Označuje, ali je izdelek sprednji ali zadnji menjalnik.
    deshedder_tool_type:
      name: Vrsta orodja za odstranjevanje dlak
      description: Klasificira strukturni slog mačke, ki se lišpa, tako da lahko kupec
        izbere želeno metodo nege (npr. z rezilom, blokom, curryjem ali rokavico).
    diabolo_axle_system:
      name: Sistem osi Diabolo
      description: Določa sistem/konfiguracijo osi diabolo, ki vpliva na brušenje,
        stabilnost in obrabo zob.
    diagnostic_functions_supported:
      name: Podprte diagnostične funkcije
      description: Določa diagnostične/vzdrževalne Functions jih lahko izvaja skener.
    diagnostic_interface_type:
      name: Vrsta diagnostičnega vmesnika
      description: povezava/vmesnik, ki se uporablja za komunikacijo z vozilom ali
        napravo (npr. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Diamantna barva
      description: Označuje barvo diamantov, od D (brezbarven) do Z (svetla barva)
        ali označuje diamante v domišljijski barvi.
    diaper_cover_style:
      name: Slog prevleke za plenice
      description: Določa oblikovno silhueto ali dekorativni slog prevleke za plenice,
        kar olajša brskanje in filtriranje na podlagi sloga.
    diastatic_power_unit:
      name: Diastatična napajalna enota
      description: Določa sistem enot, uporabljen za Poročila vrednosti diastatične
        moči izdelka (npr. °Lintner proti Windisch-Kolbachu).
    diatonic_harmonica_tuning_system:
      name: Sistem uglasitve diatonične ustne harmonike
      description: Določa notni sistem/uglaševanje, ki ga uporablja diatonična harmonika.
    dice_sides:
      name: Strani kocke
      description: Število stranic (ploskev) na kocko za kocke, ki so vključene v
        izdelek (npr. d6, d20). Za mešane nabore uporabite prevladujočo vrednost ali
        vrednost seznam kot več vrednosti, kadar je to podprto.
    didgeridoo_construction_type:
      name: Vrsta konstrukcije didžeriduja
      description: Kako je didžeridu zgrajen ali oblikovan (tradicionalni ali sodobni
        pristop k gradnji).
    dietary_formulation_claim:
      name: Trditev o prehranski formulaciji
      description: Highlight ključne lastnosti ali izključitve formulacije, pomembne
        za prehrano konj (npr. brez žitaric, z nizko vsebnostjo škroba, organsko).
    dinosaur_playset_scale_figure_size_class:
      name: Igralni komplet dinozavrov v merilu/figuri velikosti
      description: Opisuje splošno merilo priloženih dinozavrov/figuric za lažjo združljivost
        z drugimi kompleti.
    dinosaur_species_included:
      name: Vključene vrste dinozavrov
      description: Določa, katere vrste dinozavrov so predstavljene v igralnem kompletu
        (figure ali oblikovani dinozavri).
    dipsy_diver_size_designation:
      name: Oznaka velikosti Dipsy diverja
      description: Označuje proizvajalčevo oznako velikosti ribiškega potapljača,
        ki je povezana z njegovo težo in globino potopa.
    disc_brake_rotor_mount_type:
      name: Vrsta montaže rotorja kolutne zavore
      description: Določa, kako se rotor kolutne zavore pritrdi na pesto (npr. 6-vijak,
        Center Lock).
    disc_lock_accessories_included:
      name: Priloženi dodatki za zaklepanje diska
      description: Določa dodatne dele, ki so priloženi ključavnici za disk kolesa,
        kot so opomni kabel, torbica za nošenje, nosilec za montažo ali baterije.
    disco_ball_mirror_tile_material:
      name: Material zrcalnih ploščic na disko krogli
      description: Material odsevne ploščice na disko krogli (če je primerno).
    disco_ball_mirror_tile_size:
      name: Disco ball ogledalo velikosti plasti
      description: Približna velikost samostojnih zrcalnih plošč/kvadratov na disko
        krogli.
    display_backlight_color:
      name: Barva osvetlitve ozadja zaslona
      description: Barva osvetlitve ozadja/osvetlitve zaslona/številčnice merilnika.
    disposable_compostable_claim:
      name: Trditev za enkratno uporabo/kompostiranost
      description: Označuje, ali je izdelek kompostabilen, biorazgradljiv, reciklabilen
        ali ne (kjer je to primerno).
    distillation_method:
      name: Metoda destilacije
      description: Določa metodo destilacije ali vrsto destilatorja, ki se uporablja
        za proizvodnjo žgane pijače.
    distilled_water_intended_use:
      name: Namen uporabe destilirane vode
      description: Določa primarno aplikacijo za destilirano vodo (npr. pitna voda,
        naprava CPAP, vlažilec zraka, parni likalnik).
    distress_transmission_frequency:
      name: Frekvenca oddajanja v stiski
      description: Primarna radijska frekvenca/frekvence, ki se uporabljajo za klic
        v stiski.
    distressing_level:
      name: Stopnja stiske
      description: Določa količino namerne obrabe, raztrganin ali odrgnin na tkanini.
    distressing_style:
      name: Slog v stiski
      description: Označuje vrsto ali stopnjo umazanije na kavbojkah, kot so raztrgani
        ali brkasti učinki.
    distributor_advance_mechanism:
      name: Mehanizem za napredovanje razdelilnika
      description: Določa vrsto mehanizma za napredovanje krmiljenja vžiga, ki ga
        uporablja razdelilnik.
    distributor_cap_terminal_type:
      name: Vrsta terminal na pokrovu razdelilnika
      description: Določa vrsto priključka na pokrovu razdelilnika.
    distributor_gear_material:
      name: Material zobnika razdelilnika
      description: Določa material zobnika pogona razdelilnika.
    distributor_ignition_type:
      name: Vrsta vžiga razdelilnika
      description: Določa, ali je razdelilnik zasnovan za točke, elektronski vžig
        ali sisteme tipa HEI.
    distributor_kit_contents:
      name: Distributer komplet Vsebina
      description: Označuje, katere komponente so priložene razdelilniku (npr. pokrov,
        rotor, vžigalni Modules, tesnilo/O-obroč, pogonski zobnik, ožičenje/povezovalnik).
    dive_computer_form_factor:
      name: Oblika potapljaškega računalnika
      description: Določa fizično zasnovo ali način namestitve potapljaškega računalnika,
        na primer na konzolo ali v obliki ure.
    diving_mask_design:
      name: Zasnova potapljaške maske
      description: Določa celoten strukturni slog potapljaške maske, Influence prileganje,
        vidno polje in predvideno uporabo.
    divot_tool_prong_configuration:
      name: Konfiguracija zobcev orodja Divot
      description: Določa število in razporeditev zobcev na orodju za izrezovanje
        trav, ki se uporabljajo za popravilo poškodb trate.
    divot_tool_style:
      name: Slog orodja Divot
      description: Določa celoten strukturni ali namestitveni slog orodja za vdolbino,
        kot je fiksno orodje, preklopno/zložljivo orodje, večnamensko orodje ali dodatki,
        ki se pritrdijo na klobuk ali palico.
    djembe_shell_construction:
      name: Izdelava školjke djembe
      description: Opisuje način izdelave oboda/telesa džembeja.
    djembe_tuning_system:
      name: Sistem za uglaševanje Djembeja
      description: Določa, kako je djembe napet/uglašen.
    dmx_output_connector_type:
      name: Tip DMX izhoda
      description: Format fizičnega povezovalnika, ki se uporablja za krmilnikova
        izhodna vrata DMX.
    doctor_playset_items_included:
      name: Vključeni kosi v zdravniškem igralnem kompletu
      description: Določa navidezna medicinska orodja in dodatke za vlogo, ki so vključeni
        v komplet za igro zdravnika (npr. stetoskop, brizga, refleksno kladivo).
    doctor_playset_role_play_setting:
      name: Igralni komplet Zdravnik vloga-play Nastavitve
      description: Določa primarni Context vloge, ki ga predstavlja igralni komplet
        zdravnika.
    doctor_playset_wearable_items_included:
      name: Vključeni nosljivi kosi v zdravniškem igralnem kompletu
      description: Označuje nosljive dele kostuma, ki so priloženi igralnemu kompletu.
    doll_accessory_type:
      name: Vrsta dodatka za punčko
      description: Določa vrsto dodatka oziroma pripomočka za punčke ali akcijske
        figurice (npr. oblačila, obutev, pohištvo, stojala za razstavljanje), kar
        kupcem omogoča brskanje in natančno filtriranje izdelkov znotraj te specifične
        zbirateljske kategorije.
    doll_eye_type:
      name: Tip lutkinega očesa
      description: Določa slog izdelave oči lutke (npr. vstavljene akrilne, pobarvane,
        LED osvetlitev).
    doll_hair_fiber_type:
      name: Vrsta vlaken za lase za lutke
      description: Vrsta las/vlaken, uporabljenih na lutki (ali brez), kar vpliva
        na realizem, oblikovanje in nego.
    doll_making_kit_components_included:
      name: Vključeni sestavni deli kompleta za izdelavo punčk
      description: Navaja ključne materiale in orodja, ki so vključena v komplet za
        izdelavo lutke, da lahko kupec primerja pakete in ve, kaj potrebuje za lastno
        Supply .
    dollhouse_installation_placement_type:
      name: Montaža/umestitev hišice za punčke
      description: Kako naj bi se hišica za punčke uporabljala ali postavila (npr.
        namizna, talna ali stenska).
    dollhouse_items_included:
      name: Priloženi predmeti v kompletu hišice za punčke
      description: Prepozna, kaj je v škatli s hišico za punčke (pohištvo, punčke,
        dodatki).
    dollhouse_lighting_type:
      name: Vrsta osvetlitve hišice za punčke
      description: Vrsta razsvetljave, ki je vključena v hišico za punčke ali jo ta
        podpira.
    dollhouse_room_type:
      name: Vrsta sobe v hišici za punčke
      description: Določa predvideni prostor/območje znotraj hišice za punčke, kjer
        se dodatek običajno uporablja.
    dollhouse_scale:
      name: Merilo hišice za punčke
      description: Razmerje merila hišice za punčke ali dodatkov za hišico za punčke
        (npr. 1:12) za zagotovitev združljivosti med hišicami, pohištvom in figuricami.
    dollhouse_style_theme:
      name: Stil/tematika hišice za punčke
      description: Splošni slog ali tema hišice za punčke za brskanje in obdarovanje
        (npr. moderna v primerjavi z viktorijansko).
    donnos_playing_technique:
      name: Donnosova tehnika igranja
      description: Kako se Donnos igra/upravlja (samo ročno v primerjavi s palico/udarcem),
        da ustreza pričakovanjem kupca in priloženi dodatki.
    donnos_tuning_system:
      name: Sistem uglasitve donnos
      description: Primarna metoda, ki se uporablja za uglaševanje ali spreminjanje
        višine tona (npr. napenjalne vrvice/mehanizem za stiskanje).
    door_assembly_type:
      name: Vrsta sestave vrat
      description: 'Določa, kaj je vključeno: samo ohišje vrat, obloga vrat ali celotna
        montaža vrat.'
    door_closure_mechanism:
      name: Mehanizem za zapiranje vrat
      description: Določa mehanizem, ki nadzoruje zapiranje vrat (npr. mehko zapiranje,
        magnetni zapah).
    door_handle_components_included:
      name: Priloženi deli kompleta vratne kljuke
      description: Določa, kateri ključni deli so priloženi vratom (npr. valj ključavnice,
        tesnilo, okrasni pokrov, montažna strojna oprema, kabelski priključek, zapah/aktuator).
    door_handle_operation:
      name: Način delovanja vratne kljuke
      description: Določa primarni način aktiviranja/upravljanja sklopa vrat vozila
        (npr. mehanska povezava, ključavnični valj, brezključno odpiranje/gumb, električno
        odpiranje).
    door_lock_knob_attachment_method:
      name: Način pritrditve gumba za ključavnico na vratih
      description: Določa, kako se gumb za ključavnico vrat pritrdi na ključavnico
        (npr. z vtisnjenim nastavkom, natisnjenim).
    door_lock_position:
      name: Položaj ključavnice vrat
      description: Določa, za kateri položaj vrat/odpiranja je ključavnica vrat ali
        del ključavnice vrat zasnovan za prileganje na vozilu.
    door_seal_feature_set:
      name: Komplet funkcij tesnila vrat
      description: Funkcionalne značilnosti tesnila vrat.
    door_seal_material_type:
      name: Vrsta materiala tesnila vrat
      description: Primarni elastomer/družina materialov, uporabljenih za tesnilo
        vrat (natančnejša oznaka od splošnega materiala).
    door_seal_product_form:
      name: Oblika izdelka tesnila vrat
      description: Določa prodajno/embalaže obliko tesnila vrat.
    door_window_operation:
      name: Delovanje okna na vratih
      description: Določa, ali je okenski sistem vrat namenjen za ročno ali električno
        upravljanje oziroma ali vrata nimajo okna.
    double_decker_bus_deck_configuration:
      name: Zasnova nadstropij dvonadstropnega avtobusa
      description: Določa konfiguracijo dostopa do palube/strehe dvonadstropnega avtobusa.
    double_drum_pedal_linkage_medium:
      name: Medij povezave dvojnega pedala za bas boben
      description: Določa medij, ki se uporablja za povezavo sekundarnega pedala s
        primarnim pedalom (npr. pogonska gred, veriga, jermen).
    double_end_bag_core_type:
      name: Vrsta jedra hitre žoge na dveh elastikah
      description: Določa notranjo konstrukcijo udarnega jedra, ki določa hitrost
        odboja, občutek in zahteve glede vzdrževanja.
    double_pointed_needle_point_style:
      name: Vrsta konice pletilnih igel z dvema konicama
      description: Opisuje ostrino oziroma obliko konice igle, ki je prilagojena različnim
        vrstam preje in stilom pletenja.
    dough_extruder_accessories_included:
      name: Priloženi dodatki za ekstruder testa
      description: Dodatne komponente, ki so priložene ekstruderju testa.
    dough_extruder_operation_type:
      name: Vrsta delovanja ekstruderja testa
      description: Način potiskanja testa skozi ekstruder za oblikovanje končnih oblik.
    dough_extruder_shape_disc_included:
      name: Vključeni oblikovalni diski za ekstruder testa
      description: Oblika ali oblike, ki jih ekstruder lahko izdela s pomočjo priloženih
        nastavkov/šob.
    dough_format:
      name: Oblika testa
      description: Določa fizično predstavitev/obliko testa v embalaži (npr. krogla,
        list, disk, narezane niti).
    doumbek_accessories_included:
      name: Vključeni dodatki za doumbek
      description: Dodatki, priloženi doumbeku (npr. ključ za uglaševanje, zaboj).
    doumbek_head_material:
      name: Material opne za doumbek
      description: Material membrane bobna na dumbeku.
    doumbek_head_type:
      name: Vrsta opne za doumbek
      description: Konstrukcija/vrsta vpetja opne za doumbek (kako je membrana izdelana
        ali nameščena).
    doumbek_playing_style_technique:
      name: Slog/tehnika igranja na doumbek
      description: Predvideni kontekst/slog igranja, ki se običajno povezuje z dumbekom.
    doumbek_tuning_system:
      name: Sistem uglasitve doumbeka
      description: Način napenjanja/uglaševanja dumbeka (ali podatek o tem, da ni
        uglasljiv).
    dowel_end_style:
      name: Oblika zaključka moznika
      description: Opisuje rez oziroma obliko koncev lesene palice, kar vpliva na
        enostavnost vstavljanja, varnost in predvideno uporabo pri ustvarjanju.
    dowel_surface_texture:
      name: Površinska tekstura lesene vezi
      description: Opisuje stanje površine moznika, na primer gladko ali rebrasto,
        kar vpliva na videz in oprijem lepila.
    drafting_compass_adjustment_mechanism:
      name: Mehanizem za nastavljanje risarskega šestila
      description: Primarni mehanizem za fino nastavitev, ki se uporablja za natančno
        nastavitev polmera.
    drafting_compass_fine_adjustment_mechanism:
      name: Mehanizem za fino nastavljanje tehničnega šestila
      description: Vrsta fine nastavitve, ki se uporablja za natančno nastavitev polmera
        (če je prisotna).
    drafting_compass_lead_holder_type:
      name: Tip vpenjala mine pri šestilu
      description: Vrsta vstavka/držala za risanje, ki ga vključuje ali podpira kompas.
    drag_system_material:
      name: Material vlečnega sistema
      description: Določa material ali tehnologijo, uporabljeno v vlečnem skladu,
        Influence toplotno odpornost in gladkost.
    drag_system_type:
      name: Vrsta zavornega sistema
      description: Določa vrsto vlečnega mehanizma, ki se uporablja v kolutu, na primer
        sprednji, zadnji, vzvodni, zvezdasti, magnetni ali diskasti vlečni mehanizem.
    drag_type:
      name: Vrsta vlečenja
      description: Določa vrsto vlečnega mehanizma, ki ga uporablja kolut (lokacija
        ali način aktiviranja).
    drawer_features:
      name: Značilnosti predala
      description: Podrobneje opisuje posebne konstrukcijske elemente ali funkcionalnosti
        predalov (npr. mehko zapiranje, obloga iz filca).
    drawer_slide_type:
      name: Vrsta predala
      description: Določa način montaže in izvlečenja vodil predalov (npr. podmontaža,
        polni izvleček).
    drawing_ink_compatible_tools:
      name: Orodja, združljiva s črnilom za risanje
      description: Določa orodja za uporabo, za katera je črnilo namenjeno (npr. potopno
        pero ali čopič).
    drawing_ink_permanence:
      name: Trajnost risanega črnila
      description: Določa značilnosti trajnosti, pomembne za končno umetniško delo
        in reprodukcijo.
    dress_embellishment:
      name: Okrasitev obleke
      description: Izpostavlja izstopajoče okrasne elemente, vključene v kroj obleke.
    dress_train_type:
      name: Vrsta obleke z vlakom
      description: Določa prisotnost in dolžino/slog vlečke obleke, kar kaže na formalnost
        in primernost Venue .
    dried_surface_finish:
      name: Površinski premaz posušenega materiala
      description: Opisuje tipičen videz površine po sušenju (sijaj/tekstura).
    drink_tube_insulation:
      name: Izolacija cevi za pitje
      description: Določa, ali ima cev za pitje izolacijo ali toplotni ovoj, ki preprečuje
        segrevanje ali zmrzovanje tekočin.
    drive_band_cross_section_shape:
      name: Presek pogonskega traku Shapes
      description: Oblika profila pogonskega traku (okrogle, ploščate itd.).
    drive_band_join_type:
      name: Vrsta spoja pogonskega traku
      description: Način spajanja/izdelave pogonske vrvice (neskončna vrvica brez
        konca vs. vrvica, ki jo je treba zavezati, itd.).
    drive_band_material_type:
      name: Vrsta materiala pogonskega jermena
      description: Določa material/vrsto pogonskega traku, ki se uporablja na kolovratih.
    drive_location:
      name: Lokacija pogona
      description: Določa, kje je vztrajnik/pogonski mehanizem nameščen na eliptičnem
        trenažerju, Influence na odtis in občutek Motion .
    drive_mechanism:
      name: Pogonski mehanizem
      description: Določa vrsto pogonskega sklopa, ki se uporablja za prenos moči
        od pedalov do vztrajnika.
    drive_shaft_material:
      name: Material pogonske gredi
      description: Določa primarni konstrukcijski material cevi pogonske gredi ali
        celotnega sklopa.
    drive_system:
      name: Pogonski sistem
      description: Določa mehanizem, s katerim pedal Prenosi pritiska na sistem upora.
    drivetrain_configuration:
      name: Konfiguracija pogonskega sklopa
      description: Določa nastavitev pogonskega sklopa na kolesu, ki označuje, ali
        je zadnje pesto fiksno, prosto z eno prestavo ali preklopno.
    drivetrain_speed_compatibility:
      name: Združljivost hitrosti pogonskega sklopa
      description: Navaja hitrosti kasete, za katere je verižnik zasnovan, kar zagotavlja
        pravilne profile zob in razmik med njimi.
    drone_positioning_system:
      name: Sistem za pozicioniranje dronov
      description: Uvajanje tehnologije pozicioniranja/zadrževanja, ki jo podpira
        dron za Navigacijo in stabilno lebdenje.
    drone_transmission_type:
      name: Vrsta prenosa drona
      description: Primarna metoda, ki se uporablja za nadzor in/ali video povezavo
        med dronom in krmilnikom/napravo.
    drop_spindle_whorl_position:
      name: Položaj vztrajnika na ročnem vretenu
      description: Položaj vztrajnika na osi vretena.
    drum_carder_accessories_included:
      name: Vključeni dodatki za mikalnik volne
      description: Predmeti, ki so običajno vključeni v komplet crdača z bobnom.
    drum_clamp_locking_mechanism:
      name: Mehanizem za zaklepanje objemke bobna
      description: Določa, kako se objemka pritrdi/zategne na cev/obroč (npr. krilni
        vijak, vijak z bobnastim ključem, hitra sprostitev).
    drum_clamp_mount_interface:
      name: Vmesnik za pritrditev objemke za boben
      description: Določa, kaj objemka omogoča za pritrditev dodatkov (npr. sprejemnik
        L-palice, kroglični zglob, nagibnik činele).
    drum_clamp_type:
      name: Vrsta objemke za boben
      description: Določa funkcionalni slog objemke, ki se uporablja pri montaži bobna
        (npr. obročasta objemka v primerjavi s stojalo/cevno objemko).
    drum_head_application_batter_resonant:
      name: Namembnost opne bobna (udarna/resonančna)
      description: Določa, za katero stran/vlogo je membrana na bobnu zasnovana (zgornja
        igralna površina v primerjavi s spodnjo resonančno/stranjo malega bobna).
    drum_head_collar_type:
      name: Vrsta roba opne bobna
      description: Določa, ali ima glava standardni ovratnik, nizek ovratnik ali poseben
        profil ovratnika, ki ustreza določenim robovom/lupinam ležaja.
    drum_head_damping_control:
      name: Nadzor dušenja glave bobna
      description: Vgrajene funkcije za nadzor prizvoka ali način dušenja, vključene
        v zasnovo glave.
    drum_head_film_material:
      name: Material folije za glavo bobna
      description: Primarni material glave (običajno PET/Mylar, lahko pa vključuje
        tudi posebne materiale).
    drum_head_hoop_collar_type:
      name: Vrsta obroča opne za boben
      description: Določa konstrukcijo obroča in vratu membrane bobna (npr. profil
        vratu in material obroča), kar lahko vpliva na prileganje in stabilnost uglasitve
        na določenih ohišjih in obročih.
    drum_head_hoop_rim_material:
      name: Material obroča/roba bobna
      description: Material obroča/roba iz mesa (vgrajen obroč v notranjosti glave),
        ki lahko vpliva na vzdržljivost in stabilnost uglaševanja.
    drum_head_included:
      name: Priložena glava bobna
      description: Označuje, ali so bobnu priložene udarne in/ali resonančne membrane.
    drum_head_muffling_feature:
      name: Lastnost pridušitve opne za boben
      description: Vgrajene funkcije za nadzor prizvoka, integrirane v glavo bobna.
    drum_head_muffling_type:
      name: Vrsta dušilca bobna
      description: Označuje, ali ima membrana bobna vgrajene elemente za nadzor/dušenje
        prizvoka.
    drum_head_ply_count:
      name: Število slojev glave bobna
      description: Število slojev/plasti folije, uporabljenih v konstrukciji glave
        bobna (npr. enoslojna, dvoslojna).
    drum_head_position:
      name: Položaj glave bobna
      description: Določa, ali je membrana bobna namenjena kot udarna (zgornja/udarna),
        resonančna (spodnja), membrana za mali boben (spodnja) ali pa se lahko uporablja
        na oba načina.
    drum_head_reinforcement_type:
      name: Vrsta ojačitve glave bobna
      description: Določa, ali ima opna malega bobna ojačitve, kot sta sredinska pika
        ali kontrolni obroč, za povečanje vzdržljivosti in osredotočenega tona.
    drum_head_surface_finish:
      name: Površinska obdelava opne za boben
      description: Tekstura/obdelava površine opne, ki vpliva na oster začetni ton
        in odzivnost pri igranju z metlicami.
    drum_head_type:
      name: Vrsta membrane bobna
      description: Določa konstrukcijo/vrsto membrane, ki se uporablja na bobnu (predvsem
        za membrane za udarjanje/resonančne membrane kot Supply).
    drum_key_design_type:
      name: Vrsta zasnove ključa za uglaševanje bobnov
      description: Opisuje funkcionalno zasnovo ključa nateznega bobna (npr. standardni,
        ragljasti, T-uporabniško ime).
    drum_key_drive_type:
      name: Vrsta pogona bobna
      description: Določa slog pogona/vmesnika bobnastega ključa, ki se uporablja
        za pritrditev natezne palice ali pritrditve strojne opreme.
    drum_key_handle_style:
      name: Oblika ročaja ključa za bobne
      description: Opisuje obliko ali ergonomski slog ročaja ključa za uglaševanje
        bobnov, kar vpliva na udobje in vzvod med uglaševanjem.
    drum_kit_included_items:
      name: Priloženi elementi v kompletu bobnov
      description: Navaja, kateri glavni kosi so vključeni v komplet bobnov, Beyond
        lupin/blazinic (npr. strojna oprema, činele, prestol).
    drum_kit_portability:
      name: Popolna prenosljivost bobna
      description: Označuje, ali je komplet zasnovan za kompaktno shranjevanje/prevoz
        (npr. potovanje/kompaktnost/zlaganje).
    drum_kit_shell_construction_features:
      name: Značilnosti konstrukcije celotnega oboda bobna
      description: Način izdelave obodov (število slojev/vrsta), kar vpliva na ton
        in vzdržljivost.
    drum_mount_clamp_type:
      name: Vrsta objemke za montažo bobna
      description: Opisuje konstrukcijsko obliko ali vrsto objemke, ki se uporablja
        pri strojni opremi za montažo in pritrjevanje bobnov.
    drum_multi_clamp_clamp_type:
      name: Vrsta objemke z več objemkami za boben
      description: Funkcionalni slog/konfiguracija večnamenske objemke (način vpenjanja
        in kaj povezuje).
    drum_mute_material:
      name: Material za utišanje bobnov
      description: Določa primarni material dušilca bobna, ki je v stiku z glavo bobna
        in/ali duši vibracije.
    drum_pad_triggering_zones:
      name: Območja sprožilca bobna
      description: Določa število/vrsto con sprožilca, ki jih podpira tom pad (npr.
        samo membrana v primerjavi z membrano in obročem), kar vpliva na izraznost
        in združljivost Modules .
    drum_pedal_accessories_included:
      name: Vključeni dodatki za pedal za boben
      description: Navaja ključno dodatno opremo in komponente, ki so priložene bobnarskemu
        pedalu.
    drum_pedal_baseplate_type:
      name: Vrsta osnovne plošče pedala za boben
      description: Določa, ali pedal uporablja osnovno ploščo ali plavajočo/brezokvirno
        zasnovo.
    drum_pedal_bearing_type:
      name: Vrsta ležaja pedala za boben
      description: Določa ležajni mehanizem, ki se uporablja na primarnih vrtilnih
        točkah (npr. zibalka, peta, odmična gred).
    drum_pedal_cam_type:
      name: Vrsta odmikala pedala za boben
      description: Določa obliko/geometrijo odmične gredi bobnastega pedala, ki vpliva
        na občutek in odziv (npr. linearno v primerjavi s pospeševalnikom).
    drum_pedal_chain_configuration:
      name: Konfiguracija verige pedalov za boben
      description: Določa razporeditev verige, ki jo uporablja verižni pogonski pedal
        za bobne (npr. enojna veriga, dvojna veriga ali odmaknjena veriga).
    drum_pedal_chain_type:
      name: Vrsta verige pedala za boben
      description: Označuje vrsto verige, uporabljene v pogonu (npr. valjčna veriga
        v primerjavi s kolesarsko verigo), kar lahko vpliva na gladkost in vzdržljivost.
    drum_pedal_clamp_type:
      name: Vrsta objemke za pedal za boben
      description: Določa, kako se pedal pritrdi na obroč bas bobna.
    drum_pedal_intended_use:
      name: Namen uporabe pedala za boben
      description: Določa primarni kontekst igranja, za katerega je pedal z jermenskim
        pogonom zasnovan/oglaševan.
    drum_pedal_spring_adjustment_method:
      name: Metoda nastavitve vzmeti pedala za boben
      description: Določa, kako se nastavi napetost vzmeti na pedalu.
    drum_pedal_spring_type:
      name: Vrsta vzmeti pedala za boben
      description: Določa vzmetni mehanizem, ki se uporablja za vračanje pedala.
    drum_shell_material:
      name: Material oboda bobna
      description: Določa primarni material ohišja za akustične bobne (npr. javor,
        breza, akril).
    drum_shell_wood_species:
      name: Vrsta lesa oboda bobna
      description: Določa vrsto lesa, uporabljeno za ohišje bobna, Influence ton in
        resonanco.
    drumhead_type:
      name: Vrsta membrane za boben
      description: Konfiguracija/tip glave, uporabljen na oktobanu.
    drumstick_model:
      name: Model bobnarskih palic
      description: Standardizirana oznaka modela/velikosti bobna, ki jo uporabljajo
        številne blagovne znamke (npr. 5A, 7A).
    drumstick_taper:
      name: Zoženje bobna
      description: Opisuje profil zožitve od ročaja do konice, kar vpliva na odboj
        in ravnotežje paličice.
    drysuit_footwear_style:
      name: Slog obutve za suho obleko
      description: Opisuje integriran zaključek na spodnjem delu nog suhe obleke (npr.
        vgrajeni škornji, neoprenske nogavice ali goli gležnji s tesnili).
    dumbbell_style:
      name: Slog z utežmi
      description: Določa osnovno zasnovo uteži – ne glede na to, ali gre za fiksno
        enoto, nastavljiv sistem ali obremenljiv slog uteži –, ki močno Influence
        nakupne odločitve in uporabo med vadbo.
    dundun_playing_position:
      name: Igralni položaj dunduna
      description: Predvideni položaj igranja/nošenja bobna.
    dye_status:
      name: Stanje barvanja
      description: Označuje, ali je polnilo barvano, nebarvano/naravno ali vsebuje
        več Colors/mešanic.
    dye_style:
      name: Slog barvanja
      description: Določa, ali je barva sukanca enotna, večbarvna/večbarvno prelivajoča
        ali drugače namensko barvana.
    dye_technique:
      name: Tehnika barvanja
      description: Metoda, uporabljena za barvanje vlaken (npr. ročno barvanje, barvanje
        v kotlu, barvanje v vesolju).
    dye_type_needlecraft_fabric:
      name: Vrsta barvila (tkanina za vezenje)
      description: Označuje, ali je lanena tkanina enobarvna, ročno barvana ali specialno
        barvana.
    dyeing_color_processing:
      name: Barvanje/obdelava barv
      description: Opisuje, ali in kako je bilo vlakno obarvano (npr. nebarvano, beljeno/belo
        ali s posebnimi tehnikami barvanja).
    e_bike_certification_class:
      name: Razred certificiranja za električna kolesa
      description: Določa uradno hitrostno oznako pnevmatike za električna kolesa
        (npr. E-25, E-50).
    e_bike_speed_rating:
      name: Indeks hitrosti električnega kolesa
      description: Navaja uradno stopnjo certificiranja pnevmatike za električna kolesa
        (npr. E25 za ≤25 km/h, E50 za ≤50 km/h).
    e_scooter_connector_type:
      name: Vrsta povezovalnika električnega skuterja
      description: Določa vrsto električnega priključka ali vtiča, ki ga komponenta
        uporablja za napajanje ali signalna priključka.
    e_scooter_throttle_type:
      name: Električni skuter omejenega tipa
      description: Določa vrsto omejena, ki se uporablja za nadzor pospeševanja na
        električnem skuterju.
    ear_coverage:
      name: Pokrivanje ušes
      description: Določa, ali čelada vključuje zaščito za ušesa in ali je ta snemljiva.
    ear_coverage_style:
      name: Stil pokritosti ušes
      description: Opisuje, kako oziroma če maska proti muham prekriva ušesa.
    ear_coverage_type:
      name: Vrsta pokrivanja ušes
      description: Določa, kako klobuk pokriva ali ščiti ušesa, vključno s prisotnostjo
        in obliko ušesnih loput.
    ear_guard_type:
      name: Vrsta ščitnika za ušesa
      description: Opisuje vrsto zaščite za ušesa, integrirane v kapo, kot so trda
        plastika, oblazinjeni ali odstranljivi ščitniki.
    earmuff_style:
      name: Slog naušnikov
      description: Določa, kako se glušniki nosijo ali kakšno je njihovo strukturno
        zasnovo (npr. čez glavo ali se ovijajo za glavo).
    earring_closure_type:
      name: Vrsta zapenjanja uhanov
      description: Določa mehanizem, ki se uporablja za pritrditev uhana na uho (npr.
        potisni mehanizem, vzvodni mehanizem, sponka).
    easel_art_desk_features:
      name: Značilnosti stojala in umetniške mize
      description: Izpostavlja pogoste funkcionalne lastnosti, ki so vključene v slikarsko
        stojalo ali risalno mizo.
    easel_art_desk_surface_type:
      name: Vrsta površine za stojalo in umetniško mizo
      description: Določa uporabno površino za risanje/pisanje (npr. tabla, bela tabla,
        Paper zvitek, magnetna tabla).
    eb_clarinet_body_type:
      name: Vrsta trupa Eb klarineta
      description: Določa, ali je Eb klarinet sopranska ali altovska različica.
    eco_material_type:
      name: Vrsta ekološkega materiala
      description: Izpostavlja okoljsko ozaveščeno tehnologijo pene ali materiala,
        uporabljenega v podlogi/padu.
    edge_construction:
      name: Konstrukcija roba
      description: Določa, ali ima smučka kovinski robnik po celotni dolžini, delu
        ali brez njega.
    edge_tuner_type:
      name: Vrsta robnega uglaševalnika
      description: Razvršča slog brusilnika robnikov za smuči ali snežne deske, kot
        je vodilo za pilo ali električni strojček.
    edible_plant_part:
      name: Užitni del rastline
      description: Določa, kateri del rastline se prodaja za uživanje.
    educational_guide_included:
      name: Priložen izobraževalni vodnik
      description: Določa, katera učna gradiva so vključena v model.
    educational_topic:
      name: Izobraževalna tema
      description: Primarna učna tema, ki jo podpira izobraževalni Vsebina mravljišča.
    egg_component:
      name: Jajčna komponenta
      description: Določa, kateri del jajca izdelek vsebuje, na primer celo jajce,
        samo beljake, rumenjake ali mešanice/nadomestke.
    egg_component_replaced:
      name: Zamenjana jajčna komponenta
      description: Določa, kateri del jajca naj bi izdelek nadomestil (npr. celo jajce,
        jajčni beljak).
    egg_enrichment:
      name: Obogatitev jajc
      description: Določa morebitno prehransko obogatitev, dodano jajcem, kot je obogatitev
        z omega-3 ali vitaminom D.
    egg_farming_method:
      name: Metoda gojenja jajc
      description: Določa metodo proizvodnje ali reje, uporabljeno za jajca (npr.
        prosta reja, prosta reja, ekološka reja).
    egg_grade:
      name: Jajčna stopnja
      description: Določa stopnjo kakovosti, ki jo dodelijo regulativni ali industrijski
        organi.
    egg_processing_state:
      name: Stanje predelave jajc
      description: Določa kakršno koli obdelavo jajc pred prodajo (npr. Fresh, soljena,
        stoletna jajca).
    egg_production_method:
      name: Metoda proizvodnje jajc
      description: Določa sistem kmetovanja ali nastanitve, ki se uporablja za proizvodnjo
        jajc (npr. prosta reja, pašna reja, ekološka reja).
    egg_replacer_main_ingredient:
      name: Glavna sestavina nadomestka za jajca
      description: Določa glavno osnovno sestavino, iz katere je narejen nadomestek
        za jajca, kar uporabnikom pomaga pri prehranskih potrebah ali želenih pekovskih
        lastnostih.
    egg_size:
      name: Velikost jajca
      description: Razvršča jajca po standardnih oznakah velikosti trga.
    egg_source_animal:
      name: Živalski vir jajc
      description: Določa živalsko vrsto, ki je izlegla jajčeca.
    egg_white_processing_method:
      name: Metoda predelave jajčnih beljakov
      description: Določa, kako so bili beljaki predelani po zbiranju (npr. pasterizirani,
        sušeni z razprševanjem), kar vpliva na varnost živil, življenjsko dobo polica
        in uporabnost.
    eggplant_variety:
      name: Sorta jajčevcev
      description: Določa kultivar oziroma tržno sorto jajčevca, kar kupcem omogoča
        izbiro vrst, ki se razlikujejo po velikosti, okusu, barvi in kulinarični uporabi.
    eggshell_color:
      name: Barva jajčne lupine
      description: Določa prevladujočo barvo lupine jajc.
    elastic_edge_finish_type:
      name: Elastična obdelava/vrsta roba
      description: Določa robno konstrukcijo tkane elastike, ki Impact udobje in uporabo.
    elastic_intended_use:
      name: Elastična predvidena uporaba
      description: Primarna uporaba, za katero je elastika zasnovana (pomaga pri odkrivanju
        in zmanjšuje neusklajenosti).
    elastic_recovery_performance:
      name: Uspeh elastičnega okrevanja
      description: Opisuje, kako dobro se tkana elastika po raztezanju vrne v prvotno
        dolžino.
    elastic_recovery_quality:
      name: Kakovost elastičnega okrevanja
      description: Določa okrevanje elastike po raztezanju – kako dobro se po raztezanju
        vrne v prvotno dolžino.
    elastic_stretch_level:
      name: Stopnja elastičnega raztezanja
      description: Koliko se lahko elastika raztegne pod napetostjo (pogosto izraženo
        kot relativne ravni, kadar natančen odstotek ni naveden).
    elastic_structure:
      name: Elastična struktura
      description: Določa strukturno izdelavo elastike z gumbnicami (npr. pletena,
        tkana, pletena iz vrvic/bise), kar vpliva na raztegljivost, povratno elastičnost
        in lastnosti pri šivanju.
    elastic_type:
      name: Vrsta elastike
      description: Določa vrsto konstrukcije elastike (npr. prepogljiva elastika (FOE),
        pletena, pletena, tkana).
    electric_assist_type:
      name: Vrsta električne pomoči
      description: Določa, ali ima kolo motorno pomoč in kakšno pomoč nudi.
    electric_bicycle_motor_position:
      name: Položaj motorja električnega kolesa
      description: Lokacija pogonskega motorja na električnem kolesu, kot je na primer
        MID (ID trgovca) - pogon, sprednje pesto, zadnje pesto ali dvojno pesto.
    electric_bike_class:
      name: Razred električnih koles
      description: Električna kolesa razvršča glede na regulativne razrede, ki določajo
        omejitve hitrosti in asistenco omejen.
    electric_guitar_bridge_type:
      name: Vrsta kobilice na električni kitari
      description: Določa vrsto kobilice/vibrato sistema na električni kitari.
    electric_instrument_output_connection_type:
      name: Vrsta izhodnega priključka električnega instrumenta
      description: Določa fizični avdio izhodni priključek(-e), ki je(-so) na voljo
        na električnem violončelu.
    electric_riding_vehicle_control_options:
      name: Možnosti upravljanja električnih vozil
      description: Možnosti upravljanja/nadzora za voznika/starša (npr. pedal, volan,
        daljinski preklop).
    electric_spinning_wheel_speed_control_type:
      name: Električni nadzor hitrosti vrtečega se kolesa
      description: Opisuje, kako uporabnik prilagodi hitrost vrtenja na električnem
        kolesu.
    electric_ukulele_output_jack_type:
      name: Izhodni priključek za električno ukulele
      description: Določa fizični izhodni priključek, ki ga uporablja električni ukulele.
    electric_van_body_length_class:
      name: Razred dolžine karoserije električnega kombija
      description: Skupni razred velikosti kombijev glede na medosno razdaljo/dolžino,
        ki se uporablja v seznamu.
    electric_van_roof_height_class:
      name: Višinski razred strehe električnega kombija
      description: Običajna klasifikacija višine strehe, ki se uporablja za dostavna
        vozila (zlasti tovorna dostavna vozila).
    electric_vehicle_drivetrain_layout:
      name: Postavitev pogona električnega vozila
      description: Konfiguracija motorja/osi, ki opisuje, koliko motorjev in kje se
        nahajajo (Beyond le pogon na vsa kolesa/prednja kolesa/zadnji pogon).
    electric_winder_accessories_included:
      name: Priloženi dodatki za električni navijalec
      description: Navaja dodatke, ki so priloženi električnemu navijalcu (npr. spone,
        adapterji).
    electrical_connector_type:
      name: Vrsta električnega priključka
      description: Določa slog povezovalnika, ki ga uporablja sistem zaklepanja/zaklepanja
        vrat za električno integracijo (če je primerno).
    electrical_system_voltage:
      name: Napetost električnega sistema
      description: Določa nazivno napetost električnega sistema vozila, za katero
        je regulator zasnovan.
    electronic_cymbal_trigger_zones:
      name: Območja proženja na elektronski čineli
      description: Določa, koliko neodvisnih con sprožilca ponuja blazinica činele
        (npr. lok/rob/zvonec).
    electronic_drum_module_audio_interface_functionality:
      name: Funkcionalnost avdio vmesnika elektronskih bobnarskih Modules
      description: Določa, ali lahko moduli delujejo kot USB avdio vmesnik za snemanje/predvajanje
        (poleg MIDI).
    electronic_drum_module_metronome_features:
      name: Funkcije metronoma elektronskih bobnarskih Modules
      description: Določa zmožnost vgrajene prakse/metronoma.
    electronic_drum_module_power_source:
      name: Vir napajanja za elektronske Modules
      description: Določa potreben ali podprt vir napajanja za krmilne module.
    electronic_drum_module_sample_import_support:
      name: Podpora za uvoz vzorcev Modules elektronskih bobnov
      description: Določa, ali lahko moduli uvažajo uporabniške vzorce in s kakšno
        metodo.
    electronic_drum_pad_playing_surface_type:
      name: Tip udarne površine elektronskega bobna
      description: Opisuje zgradbo in material igralne površine tom pada (npr. mrežasta
        opna ali guma), kar vpliva na odboj, hrup in občutek pri igranju.
    electronic_features:
      name: Elektronske funkcije
      description: Določa elektronske/interaktivne funkcije, vključene v kos igralnega
        bančništva (če obstajajo).
    electronic_lights_and_sound:
      name: Elektronske luči in zvok
      description: Določa, ali komplet za igro hišica za punčke vključuje elektronske
        luči in/ali zvočne funkcije (npr. luči, zvonec na vratih, glasbo, zvočne učinke).
    electronics_power_source:
      name: Elektronski vir energije
      description: Določa, kako se napaja aktivna elektronika (če je primerno).
    eligible_race_series:
      name: Upravičene serije dirk
      description: Dirkalna serija ali sankcijski organ, v katerem je avtomobil upravičen
        do tekmovanja.
    elliptical_trainer_part_type:
      name: Vrsta dela eliptičnega trenažerja
      description: Razvršča specifično vrsto dodatne opreme ali nadomestnega dela
        za eliptični trenažer (npr. jermen, konzola, pedal), kar kupcem omogoča hitro
        filtriranje do želenega artikla brez brskanja po številnih mikrokategorijah.
    embellishment_technique:
      name: Tehnika okraševanja
      description: Podrobneje opisuje glavno dekoracijo ali površinsko obdelavo, uporabljeno
        na oblačilu, kot so vezenje, potisk ali kvačkanje s kroglicami.
    embellishment_type:
      name: Vrsta okrasja
      description: Določa vrsto dekorativnega elementa, uporabljenega na podvezici,
        kot so čipka, pentlje ali biseri.
    embossing_pen_ink_color:
      name: Barva črnila peresa za embosiranje
      description: Določa barvo črnila, ki ga nanese reliefno pero (lahko je prozorno/lepljivo
        ali pigmentirano). Razlikuje se od barve peresa/soda.
    embossing_stylus_tip_shape:
      name: Oblika konice pisala za reliefno odtiskovanje
      description: Opisuje geometrijo konice za reliefni tisk, ki se uporablja za
        ustvarjanje različnih učinkov (npr. kroglasta ali koničasta).
    embroidered_coverage_level:
      name: Stopnja prekritosti z vezenjem
      description: Približna količina vezenih gnid, ki pokrivajo sprednjo stran našitka.
    embroidered_patch_backing_type:
      name: Vrsta vezene podloge
      description: Podloga/plast na hrbtni strani vezenega našitka, ki vpliva na vzdržljivost
        in način namestitve.
    embroidery_hoop_type:
      name: Vrsta obroča za vezenje
      description: Določa način izdelave vezilnega obroča in njegov primarni mehanizem
        za napenjanje.
    embroidery_machine_bobbin_type:
      name: Tip spodnjega vretenca za vezilni stroj
      description: Tip in način vstavljanja spodnjega vretenca
    emergency_lighting_configuration:
      name: Konfiguracija zasilne razsvetljave
      description: Določa konfiguracijo primarno nameščene zasilne opozorilne razsvetljave
        na vozilu (npr. strešna svetlobna letev, luči na maski).
    emergency_lighting_package:
      name: Paket zasilne razsvetljave
      description: Določa vrste nameščenih zasilnih opozorilnih luči.
    emissions_compliance_standard:
      name: Standard skladnosti z emisijami
      description: Označuje certifikat/skladnost z emisijami za motor, kjer je to
        primerno.
    emissions_standard:
      name: Emisijski standard
      description: Standard skladnosti z emisijami za vozilo (razlikuje se glede na
        regijo in leto).
    enclosure_panel_configuration:
      name: Konfiguracija plošče ohišja
      description: Določa, katere plošče ali stranice ohišja so vključene (konfiguracija
        pokritosti), na primer popolno ohišje, samo stranske zavese ali 3-stransko
        (odprto spredaj/zadaj).
    enclosure_window_material:
      name: Material okna na ohišju
      description: Določa material, uporabljen za prozorne okenske plošče ohišja.
    end_fitting_type:
      name: Vrsta končnega priključka
      description: Slog povezovalnika, uporabljen na vsakem koncu opornika (na strani
        vozila in na strani pokrova), določa združljivost nosilcev.
    end_type:
      name: Vrsta zaključka
      description: Določa način pritrjevanja/pritrjevanja na koncih vlečnega traku
        za povezavo z reševalnimi točkami.
    ends_style_blocking_wires:
      name: Stil zaključkov žic za napenjanje pletenin
      description: Kako so konci blokirne žice zaključeni za varnost in lažje napeljevanje
        skozi robove čipke.
    enduro_bike_suspension_adjustability:
      name: Nastavljivost vzmetenja enduro kolesa
      description: Označuje, katere nastavitve vzmetenja so na voljo (običajno za
        sprednje vilice in zadnji amortizer).
    engine_bay_mounting_location:
      name: Mesto montaže v motornem prostoru
      description: Kjer je predvidena namestitev prelivne posode v nosilcu motorja
        (relativni položaj).
    engine_bearing_coating:
      name: Premaz ležaja motorja
      description: Določa morebitno površinsko prevleko ležaja (za odpornost proti
        obrabi, vgradljivost, zmanjšano trenje).
    engine_bearing_position:
      name: Položaj ležaja motorja
      description: Določa lokacijo/funkcijo ležaja v motorju.
    engine_bearing_size:
      name: Velikost ležaja motorja
      description: Določa, ali je ležaj standardne velikosti ali premajhne/prevelike
        razlike (običajno povezano z brušenjem in razprodajo ročične gredi).
    engine_configuration:
      name: Konfiguracija motorja
      description: Opisuje konfiguracijo/postavitev valjev motorja (npr. vrstni, V,
        bokser).
    engine_cooling_type:
      name: Vrsta hlajenja motorja
      description: Določa način hlajenja motorja.
    engine_degreaser_form:
      name: Oblika razmaščevalca motorja
      description: Fizična oblika/oblika dostave razmaščevalca motorja.
    engine_degreaser_rinse_requirement:
      name: Zahteva glede izpiranja razmaščevalca motorja
      description: Ali je razmaščevalec namenjen izpiranju z vodo po nanosu.
    engine_mount_type:
      name: Vrsta nosilca motorja
      description: Določa funkcionalno zasnovo nosilca motorja (npr. hidravlični,
        trdni, vzmet za navor).
    engine_oil_formulation:
      name: Formulacija motornega olja
      description: Označuje osredotočenost formulacije motornega olja, kot so standardna
        uporaba, kondicioniranje za velike prevožene kilometre, podaljšani intervali
        menjave olja ali uporaba za vozni park/težka vozila.
    engine_oil_specification:
      name: Specifikacija motornega olja
      description: Specifikacija/standard, ki ga olje izpolnjuje (npr. API SP, API
        SN Shopify Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Obnova motorja komplet Vsebina
      description: Določa, katere glavne komponente so vključene v komplet za obnovo
        motorja.
    engine_rotation_direction:
      name: Smer vrtenja motorja
      description: Določa smer vrtenja motorja, ki se uporablja v navtiki.
    engine_timing_system_drive_type:
      name: Vrsta pogona sistema krmiljenja motorja
      description: Označuje, ali je sistem krmiljenja motorja jermenski, verižni ali
        zobniški, da se zagotovi ujemanje združljivosti.
    engine_valve_coating:
      name: Premaz motornega ventila
      description: Označuje morebitno površinsko obdelavo ali premaz, nanesen na ventil
        zaradi odpornosti proti obrabi/toploti.
    engine_valve_position:
      name: Položaj ventila motorja
      description: Določa, ali je ventil motorja namenjen za sesalno ali izpušno stran
        motorja.
    engine_valve_stem_tip_type:
      name: Vrsta konice stebla ventila motorja
      description: Določa slog ali konstrukcijo konice stebla ventila na stični točki
        z nihajno ročico ali nastavitvenim elementom.
    engine_valvetrain_type:
      name: Tip ventilskega mehanizma motorja
      description: Razporeditev ventilov/odmične gredi.
    enhancement_level:
      name: Raven izboljšave
      description: 'Okvirno povečanje prostornine, ki ga zagotavlja vložek, izraženo
        v velikostih košaric: diskretno (do 1 velikost), zmerno (1–2 velikosti) ali
        znatno (2 ali več velikosti).'
    entry_zipper_location:
      name: Lokacija vstopne zadrge
      description: Določa, kje se nahaja glavna zadrga ali odprtina obleke (npr. spredaj,
        zadaj, na rami, diagonalno).
    epee_point_type:
      name: Vrsta konice meča
      description: Določa znamko ali standard konice, nameščene na rezilu, kar vpliva
        na združljivost in vzdrževanje.
    equestrian_discipline:
      name: Konjeniška disciplina
      description: Določa disciplino jahanja, za katero je ostroga predvidena ali
        najbolj primerna.
    equestrian_helmet_safety_certification:
      name: Certifikat o varnosti konjeniške čelade
      description: Določa varnostne standarde ali certifikate, katerim ustreza čelada.
    equine_application_area:
      name: Področje uporabe za konje
      description: Določa regijo telesa ali material, za katerega je izdelek namenjen
        (npr. kopito, griva, žebljiček).
    equipment_contact_material_brew_wine:
      name: Material opreme v stiku s pijačo (pivo/vino)
      description: Primarni material kosa, ki je v stiku s tekočino (npr. steklo,
        nerjaveče jeklo, plastika).
    eu_children_clothing_size:
      name: Velikost otroških oblačil EU
      description: Določa velikost otroških oblačil EU glede na višino, na primer
        104 ali 140
    eu_clothing_size:
      name: Velikost oblačil EU
      description: Navaja evropsko (EU) velikost oblačil, kot sta številki 38 ali
        46
    eu_cup_size:
      name: Velikost EU pokala
      description: Določa velikost košarice modrčka EU, na primer C ali E
    eu_ring_size:
      name: Velikost obroča EU
      description: Določa velikost prstana EU glede na obseg, na primer 52 ali 63
    eu_shoe_size:
      name: Velikost čevljev EU
      description: Določa velikost čevljev EU, na primer 42 ali 42 Wide
    euphonium_included_accessories:
      name: Priloženi dodatki za evfonij
      description: Seznami so vključevali kos, ki je bil običajno pakiran z evfonijem
        (npr. ustnikom, zabojem).
    euphonium_valve_configuration:
      name: Konfiguracija ventilov evfonija
      description: Določa število ventilov in ali se 4. ventil upravlja ročno ali
        s stranskim mehanizmom.
    european_sword_historical_period:
      name: Zgodovinsko obdobje evropskega meča
      description: Primarno zgodovinsko obdobje, na katerem temelji vzorec/replika
        meča (ali doba originala).
    european_sword_pattern_type:
      name: Vzorčna zasnova/vrsta evropskega meča
      description: Specifičen evropski vzorec/tip meča (tipologija), ki ga predstavlja
        zbirateljski meč.
    ev_connector_adapter_direction:
      name: Smer priključka/adapterja za električna vozila
      description: Določa, kaj naj adapter pretvori FROM in TO (stran vtičnice vozila
        v primerjavi s stranjo polnilnika/kabla), kar omogoča natančno filtriranje
        združljivosti.
    ev_conversion_kit_completeness_level:
      name: Stopnja celovitosti kompleta za predelavo v električno vozilo
      description: Označuje, ali gre pri izdelku za polni konverzijski komplet ali
        za delni komplet/paket (npr. samo motor in krmilnik).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfiguracija pogonskega sklopa kompleta za predelavo v električno vozilo
      description: Določa arhitekturo pogonskega sklopa električnega vozila, vključno
        z namestitvijo motorja/pogona in ali ohranja obstoječi menjalnik.
    ev_conversion_kit_voltage_class:
      name: Razred napetosti kompleta za predelavo v električno vozilo
      description: Nazivni napetostni razred sistema (bucket), okoli katerega je zasnovana
        EV konverzija komplet. Uporabite to za filtriranje po običajnih razredih napetosti
        sistema poleg natančne meritve napetosti.
    evaporator_core_type:
      name: Tip jedra uparjalnika
      description: Določa konstrukcijsko zasnovo jedra uparjalnika avtomobilske klimatske
        naprave.
    evenweave_fabric_finish_treatment:
      name: Premaz/obdelava blaga z enakomernim tkanjem
      description: Označuje kakršno koli predhodno obdelavo ali obdelavo tkanine,
        ki vpliva na obdelavo ali videz.
    evenweave_fabric_package_format:
      name: Oblika pakiranja blaga z enakomernim tkanjem
      description: Kako se blago prodaja (rezano v kosih ali na meter/metre).
    exercise_bike_accessory_part_type:
      name: Vrsta dodatka/dela vadbenega kolesa
      description: Opisuje primarne funkcije ali tipe komponent kos (npr. pedal, pogonski
        jermen, držalo za bidon, pokrov zaslona, gonilka).
    exercise_bike_cushion_component:
      name: Komponenta blazine za vadbeno kolo
      description: Določa priloženo komponento sedeža, kot je blazinica za sedež,
        sedlo ali prevleka za sedež.
    exercise_bike_metrics_tracked:
      name: Sledene meritve sobnega kolesa
      description: Navaja polja s podatki o vadbi, ki jih računalnik lahko meri in
        prikazuje v realnem času.
    exercise_mat_accessories_included:
      name: Priloženi dodatki za vadbeno podlogo
      description: Navaja dodatne komponente, priložene blazini, kot so trakovi ali
        podloge za kolena.
    exhaust_cooling_type:
      name: Vrsta hlajenja izpušnih plinov
      description: Označuje, ali je izpušna komponenta namenjena za mokre (vodno hlajene/z
        vbrizgavanjem vode) ali suhe izpušne sisteme.
    exhaust_installation_position:
      name: Položaj namestitve izpušnega sistema
      description: Označuje, kje na vozilu je del nameščen.
    exhaust_outlet_configuration:
      name: Konfiguracija izpušne odprtine
      description: Določa izpušno odprtino na zadnji strani vozila.
    expansion_tank_cap_connection_type:
      name: Vrsta priključka pokrovčka ekspanzijske posode
      description: Mehanski način povezave se uporablja za pritrditev in tesnjenje
        pokrovčka na vrat ekspanzijske posode.
    expansion_tank_cap_pressure_relief_feature:
      name: Funkcija za razbremenitev tlaka v pokrovu ekspanzijske posode
      description: Ali in kako pokrovček zagotavlja funkcijo razbremenitve tlaka/vakuuma.
    expansion_tank_cap_seal_material:
      name: Material tesnila pokrova ekspanzijske posode
      description: Material tesnila, ki je v stiku z vratom ekspanzijske posode.
    extension_attachment_method:
      name: Način pritrditve podaljška
      description: Označuje, kako se podaljšek pritrdi na pilotsko kabino/krmilo kolesa,
        kar pomaga kolesarjem preveriti združljivost z obstoječimi nastavitvami.
    extension_bend_type:
      name: Vrsta kolena podaljška
      description: Opisuje geometrijski slog ali upogib podaljška krmila, ki vpliva
        na ergonomijo in aerodinamiko voznika.
    extension_mechanism:
      name: Mehanizem za podaljšanje
      description: Opisuje metodo, ki jo miza uporablja za povečanje svoje dolžine
        ali površine, če je to primerno.
    extension_table_features:
      name: Značilnosti raztezne mize
      description: Izpostavlja funkcionalne lastnosti, specifične za podaljške mizic
        za šivalne stroje.
    eyelet_grommet_installation_method:
      name: Način namestitve ušesc in kovic
      description: Določa način namestitve oziroma pritrditve obročka v material.
    eyewear_lens_shape:
      name: Oblika leč očal
      description: Označuje geometrijsko obliko leče, kot so valjaste ali okrogle,
        ki vplivajo na vidno polje, popačenje in slog.
    eyewear_strap_material:
      name: Material traku za očala
      description: Določa material nastavljivega traku, ki pritrdi zaščitna očala
        ali očala na uporabnikovo glavo.
    fabric_backing_type:
      name: Vrsta tkanine za podlago
      description: Določa, ali tiskalni bombaž vključuje stabilizacijsko papirnato
        podlogo (in kakšno vrsto), kar opredeljuje, ali ga je mogoče vstaviti v standardne
        tiskalnike.
    fabric_cut_format:
      name: Format rezane tkanine
      description: Določa kroj/format platna za šivanje.
    fabric_end_use:
      name: Končna uporaba tkanine
      description: Določa primarno predvideno uporabo tkanine (za kaj se najbolje
        uporablja).
    fabric_finish:
      name: Zaključek tkanine
      description: Končni nanos ali obdelava površine svilene tkanine, ki vpliva na
        njen lesk, otip in funkcionalnost.
    fabric_intended_use:
      name: Namen uporabe blaga
      description: Primarna priporočena aplikacija/projekti za laneno tkanino.
    fabric_opacity_level:
      name: Stopnja prosojnosti tkanine
      description: Označuje, kako prosojna je tkanina, kar vpliva na potrebe po oblačenju
        in podlogi.
    fabric_patch_shape:
      name: Oblika zaplate za tkanino
      description: Opisuje obliko zaplat, ki so vključene v komplet.
    fabric_repair_kit_application_method:
      name: Metoda popravljanja tkanin komplet aplikacija
      description: Določa, kako se popravilo nanese na tkanino (npr. z likanjem, prišivanjem,
        lepilom).
    fabric_repair_kit_components_included:
      name: Kompletne komponente za popravilo tkanin so vključene
      description: Navaja specifične komponente, priložene v kompletu (npr. krpice
        za popravilo, sukanec, igla, lepilo).
    fabric_repair_kit_intended_use:
      name: Popravilo tkanin komplet, predvidena uporaba
      description: Določa običajno nalogo popravila, za katero je komplet zasnovan
        (npr. raztrganine, luknje, robljenje).
    fabric_selling_format:
      name: Format prodaje tkanin
      description: Določa, kako se tkanina prodaja (neprekinjena dolžina, vnaprej
        razrezan kos, zvitek/sornik ali vzorec).
    fabric_stretch_level:
      name: Stopnja raztegljivosti blaga
      description: Opisuje stopnjo raztegljivosti/elastičnosti tkanine, kar pomaga
        kupcu izbrati ustrezne tkanine za oprijeta oblačila ali strukturirane projekte.
    fabric_stretch_type:
      name: Vrsta raztegljivosti blaga
      description: Označuje zmogljivost raztegljivosti materiala kopalnih hlač (boardshort),
        kar je pomembno za gibljivost med surfanjem ali plavanjem.
    fabric_texture:
      name: Tekstura tkanine
      description: Opisuje površinski občutek ali pleteno strukturo tkanine, uporabljene
        v zgornjem delu oblačil za prosti čas.
    fabric_use_case:
      name: Namen uporabe tkanine
      description: Primarna predvidena uporaba za kos/vijak iz satenaste tkanine.
    fabric_weight_class:
      name: Razred teže tkanine
      description: Razvršča flanelo po tipičnih razredih uporabne teže, da pomaga
        kupcu filtrirati brez natančne vrednosti GSM/oz.
    face_mask_material:
      name: Material maske za obraz
      description: Sestava materiala obrazne maske, ki je priložena čeladi ali je
        z njo združljiva.
    face_mask_style:
      name: Stil maske za obraz
      description: Določa splošno obliko ali slog izdelave modne zaščitne maske za
        obraz, kar kupcem pomaga najti želeno prileganje in estetski videz.
    face_mask_style_code:
      name: Koda sloga obrazne maske
      description: Določa strukturni slog črt ali družino industrijskih kod obrazne
        maske (npr. ROPO, OPO, RJOP).
    face_protection_type:
      name: Vrsta zaščite za obraz
      description: Označuje vrsto zaščite za obraz, Supply priložena čeladi ali vgrajena
        vanjo, na primer ščitniki ali vizirji.
    faceplate_security_features:
      name: Varnostni elementi čelne plošče
      description: Zajema funkcije za preprečevanje kraje in načine dostopa, povezane
        s prednjo ploščo, ki presegajo zgolj osnovno zasnovo.
    facing_length:
      name: Dolžina udarne plošče
      description: Določa dolžino ukrivljenosti ustnika, kar vpliva na odziv in izbiro
        jezička.
    fan_shroud_type:
      name: Tip ohišja ventilatorja
      description: Določa slog pokritosti/geometrije ohišja ventilatorja (npr. polno,
        polovično ali obročasto).
    farming_method:
      name: Način kmetovanja
      description: Izpostavlja prakse dobrega počutja živali ali načine reje, ki so
        bili uporabljeni pri vzreji (npr. prosta reja ali ekološka reja).
    farming_practice:
      name: Kmetijska praksa
      description: Določa primarno metodo pridelave, uporabljeno za izdelek (npr.
        konvencionalna, ekološka, hidroponična).
    fascinator_style:
      name: Slog fascinatorja
      description: Opisuje strukturno zasnovo ali obliko fascinatorja (lasnega okrasa),
        tako da lahko kupci hitro filtrirajo po priljubljenih klobučarskih slogih.
    fastener_grade:
      name: Razred trdnosti pritrdilnega elementa
      description: Označuje razred/trdnost vijaka, na primer razred 8 ali razred 10.9,
        ki določa nosilnost.
    fat_rendering_state:
      name: Stanje topivosti maščobe
      description: Določa, ali je maščoba topljena, netopljena (surova) ali delno
        topljena, kar vpliva na življenjsko dobo police in kulinarično uporabo.
    fat_source:
      name: Vir maščobe
      description: Določa primarni vir maščobe, uporabljen za proizvodnjo masla, gvoja
        (ghee) ali margarine (živalski ali rastlinski), kar podpira filtriranje glede
        na alergije in prehranske omejitve.
    faucet_hole_configuration:
      name: Konfiguracija odprtin za armaturo
      description: Označuje število in namestitev predhodno izvrtanih lukenj za pipo
        na zgornjem delu umivalnika.
    feather_application:
      name: Način uporabe perja
      description: Opisuje glavni predvideni namen uporabe ali aplikacijo puranjih
        peres za ustvarjanje, ročna dela ali izdelavo različnih izdelkov.
    feather_attachment_format:
      name: Pritrditev/format perja
      description: Kako so sintetična peresa pripravljena/prodajana za uporabo (na
        težo, na vrvici, na traku itd.).
    feather_coloration_style:
      name: Slog obarvanosti perja
      description: Opisuje, kako se barva nanaša/pojavlja na peresih (npr. enobarvna,
        barvana na konicah, gradient), neodvisno od osnovne vrednosti barve.
    feather_component:
      name: Sestavni del peresa
      description: Navaja, kateri del ali slog pavjega peresa je naprodaj (npr. pero
        s pavjim očesom nasproti stranskim nitim/resicam).
    feather_curvature:
      name: Ukrivljenost perja
      description: Splošna oblika/profil ukrivljenosti peresa.
    feather_finish:
      name: Končna obdelava perja
      description: Določa, ali so nojeva perja naravna ali so bila obdelana (npr.
        barvana ali beljena) za dekorativno uporabo.
    feather_form:
      name: Oblika perja
      description: Določa fizično obliko kosov gosjega perja, ki se prodajajo.
    feather_grade:
      name: Kakovostni razred perja
      description: Splošna kakovost/izbirna ocena perja za Craft v primerjavi z uporabo
        za razstavo.
    feather_part:
      name: Del peresa
      description: Del/struktura puranjega peresa, ki se prodaja (običajno v seznamu
        Supply Craft in vezanje muh).
    feather_processing_type:
      name: Vrsta obdelave perja
      description: Kako so bila peresa obdelana/pripravljena za ustvarjanje (npr.
        barvana, beljena, naravna/nebarvana).
    feather_product_form:
      name: Oblika izdelka iz perja
      description: Fizična oblika/kroj peresnega izdelka, kot se prodaja (npr. ohlapno
        perje v primerjavi z boami v primerjavi z resicami).
    feather_quantity_unit:
      name: Enota za količino perja
      description: Določa, kako se izdelek prodaja (npr. po kosih, po teži, v šopih),
        da se omogoči natančna primerjava po seznamu.
    feather_source:
      name: Vir perja
      description: Določa živalski vir perja, ki se uporablja v peresnih žabicah.
    feather_stiffness:
      name: Togost perja
      description: Relativna togost/rigidnost peresnih zarez/strukture.
    feed_mechanism:
      name: Mehanizem podajanja
      description: Označuje, kako se žogice dovajajo v stroj za metanje.
    feed_purpose:
      name: Namen krme
      description: Opisuje primarni prehranski ali funkcionalni cilj krme ali dodatka.
    feeder_mechanism_type:
      name: Vrsta podajalnega mehanizma
      description: Določa mehanizem za doziranje, ki ga podajalnik uporablja za sproščanje
        krme.
    feijoa_cultivar:
      name: Sorta feijoe
      description: Določa specifično kultivar ali sorto feijoje, saj različne sorte
        ponujajo raznolike okuse, velikosti plodov in čase obiranja.
    felt_duty:
      name: Trpežnost filca
      description: Določa klasifikacijo teniške žogice glede na njeno trpežnost (npr.
        ekstra dajatve, običajna dajatve), ki Impact dolgo življenjsko dobo na različnih
        površinah.
    felting_mold_intended_use:
      name: Namen uporabe modela za polstenje
      description: Za kaj je kalup namenjen ustvarjanju ali uporabi pri projektih
        polstenja.
    felting_pad_surface_material:
      name: Površinski material podloge za polstenje
      description: Material, ki se uporablja na delovni površini blazinice/podloge
        za polstenje, ki je v stiku z vlakni/iglo.
    fencing_certification:
      name: Certifikat za ograje
      description: Navaja uradne odobritve upravnih organov, ki jih izpolnjuje orožje
        za sabljanje (npr. FIE, USFA), z navedbo zakonitosti tekmovanja in standardov
        kakovosti.
    fencing_connector_type:
      name: Ograja tipa povezovalnik
      description: Določa konfiguracijo povezovalnika, ki se uporablja za pritrditev
        vrvic, vtičnic ali kolutov ograj (npr. 2-pripeto, 3-pripeto, bajonet), s čimer
        zagotavlja združljivost komponent.
    fencing_discipline:
      name: Disciplina sabljanja
      description: Določa orožje ali disciplino mečevanja, za katero je izdelek zasnovan
        ali z njim združljiv.
    fencing_weapon_type:
      name: Vrsta orožja za sabljanje
      description: Določa slog mečevanja ali vadbenega orožja, s katerim je pripomoček
        za vadbo združljiv ali ga predstavlja, in uporabnikom pomaga najti primerno
        opremo.
    fender_finish_state:
      name: Stanje zaključka blatnika
      description: Označuje stanje površine/obdelave dostavljenega blatnika ter njegovo
        pripravljenost za barvanje in montažo.
    fender_pieces_included:
      name: Vključeni deli blatnika
      description: Navaja komponente, ki so priložene izdelku, da se pojasni, ali
        gre za posamezen blatnik ali za celoten komplet z dodatki.
    fender_type:
      name: Tip blatnika
      description: Razvršča celotno zasnovo ali slog blatnika.
    fennel_trimming:
      name: Obrezovanje komarčka
      description: Določa, kateri deli rastline so vključeni v čebulico komarčka (npr.
        z listi, obrezanim vrhom in korenino).
    fennel_variety:
      name: Sorta komarčka
      description: Določa kultivar ali sorto trg čebulic komarčka, ki se prodajajo.
    fermentation_application:
      name: Aplikacija fermentacije
      description: Določa primarno živilo ali pijačo, ki jo kultura fermentira (npr.
        sir, jogurt, mlečni kefir, kislo testo).
    fermentation_method:
      name: Metoda fermentacije
      description: Določa, kako je bila sojina omaka proizvedena ali fermentirana
        (npr. naravno kuhana, kemično hidrolizirana).
    fermentation_vessel_material:
      name: Material fermentacijske posode
      description: Primarni material fermentacijske posode, ki je vključena v komplet
        (če obstaja).
    ferrule_material:
      name: Material veznega obročka
      description: Določa material, uporabljen za ohišje gredi (npr. Juma, fenol,
        polikarbonat, XTC ali nič), vzdržljivost Impact in občutek ob udarcu.
    fia_homologation_certification:
      name: Homologacija/certifikat FIA
      description: Označuje, ali je avtomobil (ali varnostna celica) certificiran/homologiran
        in po katerem standardu.
    fiber_animal_source_type:
      name: Vrsta vlaken živalskega izvora/vir
      description: Živalski ali primarni vir, iz katerega prihaja roving (ali sintetični),
        kot so merino volna, alpaka ali rastlinska vlakna.
    fiber_luster_level:
      name: Stopnja sijaja vlaken
      description: Vizualni sijaj vlaken, od mat do visokega sijaja.
    fiber_preparation_processing_stage:
      name: Faza priprave/obdelave vlaken
      description: Označuje, kako je bil trak pripravljen/obdelan za uporabo (npr.
        kartica v primerjavi s česanim, mešanim, superpranim).
    fiber_preparation_type:
      name: Vrsta priprave vlaken
      description: Določa, kako so bila vlakna pripravljena za ustvarjanje (npr. sčesana
        plošča volne, vlakna iz bobna za mletje/česanje, predpolstena plošča).
    field_hockey_ball_playing_surface:
      name: Igralna površina z žogo za hokej na travi
      description: Določa igralno površino ali okolje, za katero je žoga zasnovana.
    field_hockey_ball_type:
      name: Vrsta žoge za hokej na travi
      description: Razvršča žogico za hokej na travi glede na njen predviden namen
        uporabe ali posebne lastnosti.
    field_hockey_goal_size_standard:
      name: Standardna velikost golov za hokej na travi
      description: Razvršča gol glede na običajne standarde hokeja na travi ali vadbene
        velikosti (npr. uradni FIH gol za zunanja igrišča, mladinski, mini).
    field_hockey_training_objective:
      name: Cilj treninga hokeja na travi
      description: Določa primarno spretnost ali področje osredotočenosti, ki ga je
        učni pripomoček zasnovan za izboljšanje.
    field_point_attachment_method:
      name: Način namestitve konice puščice
      description: Označuje, kako je konica polja pritrjena na steblo ali vložek puščice
        (npr. z vijakom, z lepljenjem).
    field_point_tip_style:
      name: Oblika konice vadbene puščice
      description: Določa geometrijski slog ali funkcionalni profil terenske konice
        (za puščice), kar vpliva na prodornost, težavnost odstranjevanja in zakonsko
        ustreznost.
    fielding_glove_position:
      name: Položaj rokavice za igranje na terenu
      description: Določa obrambni položaj ali uporabo, za katero je rokavica zasnovana
        pri igri baseballa ali softballa.
    fielding_training_focus:
      name: Osredotočenost na trening na terenu
      description: Določa primarno območje spretnosti, na katerega je pomoč usmerjena
        med vadbo seja.
    fig_variety:
      name: Sorta fige
      description: Določa specifično sorto ali različico fige, ki se prodaja.
    figure_8_device_design:
      name: Oblika varovala osmice
      description: Določa specifično konfiguracijo naprave v obliki osmice, ki vpliva
        na značilnosti obdelave in predvideno uporabo.
    figure_finish_type:
      name: Vrsta zaključka figure
      description: Označuje površino/barvno obdelavo figure modela konja (kako izgleda/se
        obnaša kot zbirateljski predmet).
    figurine_scale:
      name: Merilo figurice
      description: Merilo/razmerje figurice glede na pravi motiv (če je primerno),
        npr. 1:6.
    fill_status:
      name: Stanje polnjenja
      description: Označuje, ali se lutka za borilne veščine prodaja že napolnjena,
        prazna ali delno napolnjena, kar določa stroške dostave in trud kupca.
    filling_consistency:
      name: Konsistenca polnjenja
      description: Opisuje teksturo ali viskoznost polnila, kot je dobavljeno (npr.
        gladka krema, koščki sadja, pasta).
    filling_type:
      name: Vrsta polnjenja
      description: Določa glavni nadev ali kremo v piškotih, če obstaja.
    filtration_and_mother_status:
      name: Stanje filtracije in prisotnost ocetne matice
      description: Določa, ali je kis filtriran, nefiltriran, surov ali vsebuje "materni
        del", kar ustreza potrošnikom, ki iščejo probiotične ali surove možnosti.
    filtration_method:
      name: Način filtracije
      description: Material ali tehnika, ki se uporablja za filtriranje in čiščenje
        vodke po destilaciji.
    fin_box_system:
      name: Sistem naseda za plavut
      description: Določa ohišje rebrc ali montažni vmesnik, ki ga uporablja plošča,
        in s tem določa združljivost rebrc z nadomestnimi deli.
    fin_buoyancy:
      name: Plovnost plavuti
      description: Označuje, ali je plavut v vodi pozitivno, nevtralno ali negativno
        vzgonska, ter stanje opreme in nastavitve opreme Impact Diver.
    fin_flex_rating:
      name: Stopnja prožnosti plavuti
      description: Označuje relativno togost ali stopnjo upogibnosti plavuti, kar
        vpliva na splošno uspešnost.
    fin_mounting_system:
      name: Sistem montaže plavuti
      description: Določa vmesnik ali standard za pritrditev, ki se uporablja za fiksiranje
        smernika na kiteboard (npr. FCS II, pritrditev z vijaki, 4-luknjični sistem),
        kar zagotavlja združljivost med smerniki in deskami.
    fin_position:
      name: Položaj smernika
      description: Navaja predviden položaj namestitve smernika (fina) na deski.
    fin_strap_type:
      name: Vrsta traku za plavuti
      description: Določa vrsto traku ali sistema zadrževanja strank, ki se uporablja
        za pritrditev plavuti na peto/stopalo.
    fin_template:
      name: Šablona smernika
      description: Razvršča hidrodinamično obliko ali profil smernika za surf desko,
        kar vpliva na slog zavijanja, hitrost in celoten občutek na deski.
    finger_count:
      name: Štetje prstov
      description: Označuje število prstov, ki jim je rokavica, ščitnik za prste (tab)
        ali sprožilec prilagojen za podporo.
    finger_coverage:
      name: Pokritost prstov
      description: Označuje, kolikšen del prstov je pokrit.
    finger_grip_adjustability:
      name: Nastavljivost oprijema prstov
      description: Označuje, kako se oprijem za prste pritrdi ali prilagodi različnim
        velikostim rok.
    finger_hole_configuration:
      name: Konfiguracija luknjic za prste
      description: Navaja prilagojenost lukenj za prste glede na ročnost (desničarji,
        levičarji ali dvoročni/univerzalni).
    finger_hole_count:
      name: Število lukenj za prste
      description: Navaja število lukenj za prste v usnjenem ročaju, kar je ključna
        razlika v slogu med modeli brez prstov, modeli z dvema, tremi in štirimi luknjami.
    finger_pick_band_style:
      name: Slog obročka naprstnika
      description: Navaja slog paščka ali zanke, ki se namesti na prst, kar vpliva
        na udobje in možnost prilagajanja.
    finger_pick_blade_length:
      name: Dolžina rezila naprstnika
      description: Dolžina obiralnega rezila, ki sega od traku.
    finger_pick_blade_shape:
      name: Oblika rezila naprstnika
      description: Oblika/profil površine za obiranje (rezila), ki se dotika rezila.
    finger_pick_size:
      name: Velikost izbirnika prstov
      description: Velikost traku/zanke trzalice se prilagodi različnim obsegom prstov
        ali palcev (ne velikosti instrumenta).
    finger_pick_wear_location:
      name: Lokacija za nošenje prstnih kljukic
      description: Označuje, na katerem prstu je predvideno nošenje naprstnika, ali
        pa določa, ali gre za komplet za palec in ostale prste.
    finger_protection:
      name: Zaščita za prste
      description: Označuje, ali rokavica vključuje zaščitne opore (bodicami/vložki)
        za prste in ali so te opore odstranljive.
    fingerboard_bearing_type:
      name: Vrsta ležaja ubiralke
      description: Določa vrsto ležaja, ki se uporablja v ubiralkah.
    fingerboard_grip_type:
      name: Vrsta oprijema klaviature
      description: Določa material/vrsto površine oprijema, ki se uporablja na ubiralki.
    fining_agent_active_ingredient:
      name: Aktivna sestavina sredstva za bistrenje
      description: Primarno sredstvo za bistrenje ali čiščenje, ki se uporablja v
        izdelku.
    fining_agent_type:
      name: Vrsta sredstva za bistrenje
      description: Določa kemijsko sestavo ali material sredstva za bistrenje/čiščenje
        za izdelke, ki bistrijo rdeče vino.
    finish_after_baking:
      name: Končni premaz ali obdelava po peki
      description: Opisuje tipičen videz površine po strjevanju/pečenju.
    finish_effect:
      name: Končni učinek
      description: Opisuje posebne površinske/optične učinke, nanesene na okrasni
        kamen.
    finish_type:
      name: Vrsta zaključka
      description: Površinska obdelava, nanesena na telo ukulele.
    finished_product_format:
      name: Končana oblika izdelka
      description: Navaja vrsto dišavnega izdelka, ki mu je komplet namenjen za izdelavo.
    fire_pit_accessories_included:
      name: Vključeni dodatki za odprto kurišče
      description: Navaja pomembne dodatke, ki so priloženi kurišču, kot so zaščitne
        mreže proti iskram ali lavino kamenje, kar jasno prikazuje vsebino paketa.
    firework_assortment_launch_type:
      name: Način izstrelitve pirotehničnega kompleta
      description: Opisuje, kako se vključeni ognjemetni izdelki običajno vžgejo ali
        sprožijo.
    firework_assortment_types_included:
      name: Vključene vrste ognjemetov
      description: Prepozna primarne vrste ognjemetov, ki so vključeni v komplet,
        kar kupcem pomaga primerjati vsebino paketov (npr. fontane, rimske sveče,
        petarde).
    firework_effect_types:
      name: Vrste ognjemetnih učinkov
      description: Primarni vizualni in/ali senzorični učinki, ki jih ustvarja asortiman
        (izberite vse, kar velja).
    firework_ignition_method:
      name: Metoda vžiga ognjemeta
      description: Določa, kako se ognjemet prižge ali sproži (npr. z vžigalico ali
        električno vžigalico).
    firework_visual_intensity_level:
      name: Stopnja vizualne intenzivnosti ognjemeta
      description: Skupna vizualna intenzivnost/volumen Spark za učinek fontane.
    firing_mode:
      name: Modestreljanja
      description: Navaja izbire ali primarne načine streljanja, ki jih podpira airsoft
        replika.
    first_day_cover_cachet_type:
      name: Vrsta priložnostnega žiga na ovitku za prvi dan
      description: Navaja vrsto ilustracije na kuverti prvega dne (npr. tiskana, ročno
        poslikana).
    first_day_cover_cancellation_type:
      name: Vrsta odpovedi kritja za prvi dan
      description: Vrsta/slog poštnega žiga, uporabljenega na ovitku prvega dne (npr.
        strojni žig, ročni žig).
    first_day_cover_set_type:
      name: Vrsta kompleta naslovnic za prvi dan
      description: Označuje, ali naslovnica predstavlja posamezno številko, celoten
        komplet ali podmnožico/kombinacijo.
    fishing_hook_size:
      name: Velikost ribiškega trnka
      description: Določa standardizirano oznako velikosti ribiškega trnka (npr. št.
        4, 1/0, 10/0), kar ribičem pomaga pri usklajevanju dimenzij trnka s ciljno
        vrsto in vabo.
    fishing_hook_style:
      name: Stil ribiškega trnka
      description: Navaja specifično zasnovo ali vzorec upogibanja enojnega trnka,
        ki vpliva na predstavitev, učinkovitost trnka in predvideno uporabo.
    fishing_hook_type:
      name: Vrsta ribiškega trnka
      description: Opisuje konfiguracijo oziroma postavitev trnkov, ki so priloženi
        ribiški žlici (če so priloženi)
    fishing_line_application:
      name: Aplikacija za ribiško vrvico
      description: Določa predvideno uporabo ribiške vrvice ali materiala za predvez
        (npr. predvez, glavna vrvica, predvez).
    fishing_line_buoyancy_type:
      name: Vrsta vzgona ribiške vrvice
      description: Razvršča, kako se vrvica obnaša v vodnem stolpecu (npr. plavajoča,
        srednje močna, potapljajoča se), kar pomaga ribičem izbrati ustrezno globinsko
        predstavitev.
    fishing_needle_purpose:
      name: Namen ribiške igle
      description: Določa primarno uporabo igle pri nalogah ribiške opreme.
    fishing_needle_types_included:
      name: Vključene vrste ribiških igel
      description: Navaja specifične sloge igel ali orodij za navezovanje, ki so priloženi
        v kompletu, tako da lahko kupci hitro vidijo vsebino seta.
    fit_profile:
      name: Profil prileganja
      description: Opisuje celoten kroj in silhueto blazinice, ki vplivata na mobilnost
        in pokritost.
    fit_volume_classification:
      name: Klasifikacija prostornine prileganja
      description: Skupno notranjo prostornino prtljažnika kategorizira kot trg z
        blagovno znamko (npr. LV za majhno prostornino).
    fitting_angle:
      name: Kot vgradnje
      description: Določa kot upogiba telesa fitinga (npr. raven, 45°, 90°). Za fitinge
        s spremenljivim kotom uporabite »Nastavljivo/vrtljivo«, za nenavadne kote
        pa »Drugo«.
    flag_base_type:
      name: Vrsta podstavka zastave
      description: Določa sidranje ali osnovni slog, ki se uporablja za pritrditev
        kotne zastavice na različnih igralnih površinah.
    flag_design_theme:
      name: Tematika zasnove zastave
      description: Opisuje primarno oblikovno temo, predstavljeno na zastavi (npr.
        država/nacionalna, športna ekipa, praznik), in podpira odkrivanje ter filtriranje
        za nakupovanje na podlagi namena.
    flag_mounting_method:
      name: Način montaže zastave
      description: Določa, kako se zastava pritrdi na vozilo (npr. nosilec za anteno,
        nosilec za kljuko, magnet).
    flag_type:
      name: Vrsta zastave
      description: Razvršča specifičen namen ali slog golf zastavice, kot je zastavica
        za luknjo (pin flag), zastavica za golf voziček (cart flag) ali zastavica
        za vadbišče (practice flag).
    flame_resistance_standard:
      name: Standard za odpornost proti ognju
      description: Določa specifični standard/certifikat glede ognjevarne ali obločne
        odpornosti, ki ga oblačilo izpolnjuje.
    flamenco_cajon_snare_system:
      name: Sistem strun za flamenko kahon
      description: Določa notranji mehanizem za mali lok, ki se uporablja za ustvarjanje
        značilnega flamenko brenčanja (ali pa ga sploh ne ustvarja).
    flammability_compliance:
      name: Skladnost z vnetljivostjo
      description: Navaja priporočene korake za nego, specifične za sveže rezano cvetje
        (npr. obrezovanje stebel, pogostost menjave vode).
    flannel_brushing_finish:
      name: Ščetkana flanelasta površina
      description: Navaja, ali je flanela krtačena in na kateri strani oziroma straneh
        (enostransko ali dvostransko), kar vpliva na mehkobo, toploto in končni videz
        tkanine.
    flannel_use_type:
      name: Vrsta uporabe flanele
      description: Primarni predvideni namen uporabe za kos ali navitje (tavelo) flanele.
    flap_configuration:
      name: Konfiguracija poklopcev
      description: Določa slog zavihka sedla, na primer enojni ali dvojni zavihek.
    flare_color:
      name: Barva signalne rakete
      description: Barva oddane svetlobe/plamena (ali barva leče pri LED-lučeh).
    flash_card_included_features:
      name: Vključene lastnosti učnih kartic
      description: Navaja vključene funkcionalne značilnosti za učenje ali uporabo,
        ki so priložene učnim karticam.
    flavor_intensity:
      name: Intenzivnost okusa
      description: Navaja, kako koncentriran je izdelek z aromo, kar uporabnikom pomaga
        določiti ustrezen odmerek (npr. standardna jakost, super jakost).
    flavor_solvent_base:
      name: Osnova topila za arome
      description: Navaja glavno nosilno snov ali topilo, uporabljeno v aromi (npr.
        alkohol, propilen glikol, glicerin).
    fleece_fiber_animal_type:
      name: Vrsta živali izvora flisa/vlaken
      description: Živalski vir vlaken flisa (vrsta).
    fleece_finish_surface:
      name: Končna obdelava/površina flisa
      description: Opisuje površino oziroma zaključno obdelavo flisa (npr. kosmaten,
        obdelava proti muckanju), kar vpliva na nagnjenost k muckanju, mehkobo in
        videz materiala.
    fleece_preparation_method:
      name: Metoda priprave flisa
      description: Navaja, kako je flis pripravljen ali obdelan za ustvarjanje in
        predenje (stanje vlaken).
    flesh_color:
      name: Barva mesa
      description: Določa notranjo barvo mesa melone.
    fletching_orientation:
      name: Usmerjenost peres na puščici
      description: Določa, kako so peresa nameščena na drogu (npr. ravna, odmaknjena,
        spiralna), kar vpliva na vrtenje in let puščice.
    fletching_profile:
      name: Profil peres na puščici
      description: Določa geometrijsko obliko ali izrez krmilnih peres, kar vpliva
        na zračni upor, prosti tek, hrup in splošne lastnosti leta puščice.
    flight_system_type:
      name: Vrsta sistema letenja
      description: Določa slog konstrukcije letala, pri čemer razlikuje med zložljivimi,
        oblikovanimi in integriranimi sistemi letala in gredi.
    float_attachment_method:
      name: Način pritrditve plovca
      description: Opisuje, kako je plovec pritrjen na vrvico (npr. z drsnim ali fiksnim
        pritrdilnim elementom), kar ribičem omogoča filtriranje po načinu pritrditve.
    float_design:
      name: Zasnova plovca
      description: Razvršča celoten slog ali vrsto ribiškega plovca (npr. bobber,
        waggler, pencil), tako da lahko ribiči hitro izberejo model, ki ustreza njihovi
        tehniki in stanju.
    float_raft_use_environment:
      name: Okolje uporabe plovcev/splavov
      description: Primarno namenjena napihljiva igrača za uporabo v vodi (bazen proti
        mirni odprti vodi proti valovom), kar odraža pričakovanja glede vzdržljivosti
        in oblikovanja.
    floatation:
      name: Plovnost
      description: Ali je svetilnik zasnovan tako, da plava v vodi.
    floor_construction_type:
      name: Vrsta konstrukcije tal
      description: Navaja specifično obliko oziroma zasnovo dna rafta (npr. samoodvodno
        dno, "drop-stitch" dno z visokim pritiskom), kar vpliva na odtekanje vode,
        togost in plovne lastnosti.
    floor_design:
      name: Zasnova tal
      description: Vrsta talne obloge Supply z ogrado.
    floor_inclusion:
      name: Vključitev tal
      description: Navaja, ali ima preddverje tla in ali so ta tla odstranljiva.
    floor_mat_cleaning_method:
      name: Metoda čiščenja talnih preprog
      description: Določa proizvajalčevo priporočeno primarno metodo čiščenja talne
        preproge.
    floor_mat_edge_style:
      name: Slog roba talne preproge
      description: Opisuje, ali ima podloga dvignjene robove, ki zadržujejo razlite
        tekočine in umazanijo.
    floor_mat_format:
      name: Format talne preproge
      description: Določa fizično obliko ali slog izdelka za zaščito tal (npr. enojna
        podloga, prepletena plošča, zvitek).
    floor_mat_retention_system:
      name: Sistem zadrževanja talne podloge
      description: Določa metodo, ki se uporablja za pritrditev podloge na mestu.
    floor_mat_set_configuration:
      name: Konfiguracija kompleta talnih preprog
      description: Označuje, kateri položaji so vključeni v paket (npr. samo sprednji
        par, celoten komplet).
    floss_sugar_granulation_grade:
      name: Stopnja granulacije sladkorja za sladkorno peno
      description: Opisuje velikost kristalov v sladkorni mešanici (npr. drobni, srednji,
        grobi), kar lahko vpliva na delovanje naprave in končno teksturo.
    floss_sugar_product_form:
      name: Oblika izdelka iz sladkorne nitke
      description: Označuje, ali je sladkorna nitka pripravljena za uporabo, koncentrat
        arome, ki ga je treba zmešati z osnovnim sladkorjem, ali brezbarven osnovni
        sladkor.
    flour_grind_texture:
      name: Tekstura mletja moke
      description: Navaja stopnjo mletja ali teksturo moke, na primer zelo fino, srednje,
        grobo ali mleto na kamnitem drobirju, kar lahko vpliva na uspešnost recepta.
    flour_processing_method:
      name: Način predelave moke
      description: Zajema pomembne metode predelave ali obdelave moke (npr. mletje
        na kamnih, beljenje, kaljenje, obogatitev), ki vpliva na okus, barvo ali hranilno
        vrednost.
    flower_care_instructions:
      name: Navodila za nego cvetja
      description: Navaja priporočene korake za nego, specifične za sveže rezano cvetje
        (npr. obrezovanje stebel, pogostost menjave vode).
    flugelhorn_leadpipe_material:
      name: Material ustnične cevi krilnega roga
      description: Material vodilne cevi (če je naveden ločeno od celotnega materiala
        glasbila).
    flugelhorn_trigger_type:
      name: Vrsta sprožilca krilnega roga
      description: Označuje, ali krilni rog vključuje sprožilec za uglasitev in na
        kateri zvon/ventil oziroma nivojski poteg ( deluje.
    fluorescence_grade:
      name: Fluorescenčna stopnja
      description: Navaja intenzivnost fluorescence diamanta, ko je izpostavljen UV-svetlobi.
    fluorescence_under_uv:
      name: Fluorescenca pod UV-svetlobo
      description: Označuje, ali in kakšno vrsto fluorescence primerek kaže pod ultravijolično
        svetlobo.
    fluorocarbon_content:
      name: Fluorokarbonska vsebina
      description: Označuje, ali vosek vsebuje dodatke fluoroogljika in v kakšni količini.
    flute_case_capacity:
      name: Zmogljivost flavte
      description: Navaja, kaj vse je poleg osrednjega telesa flavte še predvideno
        za shranjevanje v kovčku (npr. flavta + pikolo, dodatna glava flavte).
    flute_cleaning_rod_tip_type:
      name: Vrsta konice čistilne palice za flavto
      description: Opisuje zasnovo konca palice, ki drži krpico/čistilni tampón ali
        prihaja v stik z instrumentom (npr. z režo, z navojem, z ušescem).
    flute_footjoint_type:
      name: Tip stopalnega sklepa flavte
      description: Navaja konfiguracijo oziroma vrsto spodnjega dela (noge) flavte.
    flute_headjoint_cork_type:
      name: Glava flavte iz plute
      description: Navaja material oziroma vrsto sklopa plute in čepa (stoperja),
        ki je priložen glavi flavte (ustniku).
    flute_key_system:
      name: Sistem zaklopk flavte
      description: Kjer je primerno, označuje mehanski/ključni sistem, ki ga uporablja
        flavta (npr. Boehmov sistem).
    flute_keywork_material:
      name: Material mehanizma zaklopk flavte
      description: Navaja material in/ali prevleko tipk (mehanizma), kadar je naveden
        ločeno od materiala trupa.
    flute_offset_g:
      name: Odmik žlebov G
      description: Določa, ali ima flavta odmaknjeno postavitev tipke G.
    flute_wall_thickness:
      name: Debelina stene žleba
      description: Kategorija debeline stene žlebljene cevi (tankostenska, standardna,
        debelostenska).
    fly_pattern_type:
      name: Vrsta vzorca umetne muhe
      description: Razvršča umetno muho glede na slog ribolova ali vrsto žuželke oziroma
        plena, ki jo posnema, kar ribičem pomaga hitro izbrati pravi stil muhe.
    fly_rod_style:
      name: Slog muharske palice
      description: Razvršča palico glede na predvideno disciplino metanja ali uporabo
        (npr. Single-hand, Switch, Spey).
    fly_style:
      name: Stil umetne muhe
      description: Določa vrsto odprtine ali sprednje odprtine na spodnjih delih hlačk.
    fly_tying_tools_included:
      name: Priloženo orodje za vezanje muh
      description: Navaja specifična orodja za vezanje umetnih muh, ki so vključena
        v komplet, tako da kupci natančno vedo, kaj dobijo, in lahko primerjajo različne
        pakete.
    fly_type:
      name: Vrsta muhe
      description: Določa, ali imajo dolge hlače funkcionalno odprtino, in slog te
        odprtine.
    flyer_hook_mounting_method:
      name: Način pritrditve kljuke za letake
      description: Navaja način, kako se kavelj pritrdi na krilce (npr. privijanje
        v primerjavi s pritisnim prileganjem), kar vpliva na enostavnost namestitve
        in združljivost.
    flyer_hook_orientation:
      name: Orientacija kljuke letaka
      description: Označuje, ali je kavelj namenjen levi ali desni strani krila kolovrata
        (flyer) oziroma ali je obojestranski/univerzalen.
    flyer_kit_finish_coating:
      name: Popolna obdelava/premaz letaka
      description: Površinska obdelava, nanesena na celotne komponente letaka.
    flyer_kit_included_components:
      name: Letak, vključno z vsemi komponentami
      description: Določa, kateri deli so vključeni v komplet.
    flyer_orifice_type:
      name: Vrsta odprtine letaka
      description: Določa vrsto odprtine, uporabljene na letaku.
    flying_disc_feature_set:
      name: Nabor funkcij letečega diska
      description: Pomembne funkcionalne lastnosti frizbija.
    flysheet_material:
      name: Material za zunanje platno
      description: Določa glavni material, uporabljen za zunanje platno šotora, kar
        vpliva na težo, trpežnost in vremensko odpornost.
    flywheel_balance_type:
      name: Vrsta stanja vztrajnika
      description: Označuje, ali je vztrajnik v nevtralnem stanju ali uporablja zunanjo
        utež za neuravnoteženje.
    foam_blocks_size_class:
      name: Razred velikosti penenih blokov
      description: Označuje splošni razred velikosti blokov v množici.
    foam_blocks_surface_texture:
      name: Površinska tekstura penastih blokov
      description: Opisuje občutek/zaključek zunanje površine penastih blokov.
    foam_surface_effect:
      name: Učinek penaste površine
      description: Opisuje pogoste dekorativne površinske učinke, ki se uporabljajo
        na peni Craft ali stiroporu, kot so bleščice, kovinski ali holografski zaključki.
    foil_color:
      name: Folija barva
      description: Določa barvo folije, uporabljeno na certifikatu (če je primerno).
    foil_curtain_mounting_method:
      name: Način montaže folijske zavese
      description: Navaja, kako je folijska zavesa predvidena za namestitev ali obešanje
        (npr. samolepilni trak, kovinski obročki).
    foil_discipline:
      name: Disciplina floret
      description: Določa primarni slog vožnje ali disciplino, za katero je hidrogliser
        zasnovan.
    foil_mast_board_mounting_type:
      name: Vrsta pritrditve na folijski jambor
      description: Določa vmesnik na vrhu jamborja (masta), s katerim se ta pritrdi
        na desko ali vodilo krila.
    foil_mast_fuselage_connection_type:
      name: Folija jambor tipa povezava trupa
      description: Določa, kako je jambor povezan s trupom ali sklopom sprednjega
        krila.
    foil_mounting_interface:
      name: Vmesnik za montažo hidrokrila
      description: Določa standard povezave, ki ga del uporablja za pritrditev na
        ploščo ali druge folijske komponente.
    foil_mounting_system:
      name: Sistem montaže hidrokrila
      description: Določa montažni vmesnik za namestitev hidrokril ali smernikov na
        desko, kar zagotavlja združljivost z obstoječo opremo deskarja.
    foil_mounting_type:
      name: Vrsta montaže hidrokrila
      description: Določa vmesniški sistem, ki se uporablja za pritrditev folije na
        ploščo in zagotavlja združljivost med komponentami.
    fold_over_elastic_application:
      name: Elastika za pregibanje
      description: Glavni predvideni namen ali uporaba elastike z gumbnicami.
    foldability:
      name: Zložljivost
      description: Opisuje, ali in kako se delilnik zloži ali strni za shranjevanje
        ali preoblikovanje.
    foldability_stow:
      name: Zložljivost (zlaganje)
      description: Označuje, ali se prtljažnik (npr. za kolesa) lahko zloži ali pospravi,
        ko ni v uporabi (npr. zložljiv navzgor proti vozilu).
    folding_style:
      name: Zložljivi model
      description: Označuje, kako se zaščitna blazina zloži za prevoz in shranjevanje,
        kar vpliva na enakomernost pristajalne površine in njeno zložljivost.
    food_basket_items_included:
      name: Vključeni izdelki v košarici s hrano
      description: Navaja glavne vrste prehranskih izdelkov, vključenih v košarico,
        kar kupcem pomaga izbrati košarice, ki ustrezajo okusu ali prehranskim potrebam
        obdarovancev.
    food_coloring_form:
      name: Oblika za barvilo za živila
      description: Določa fizično obliko ali format, v katerem se dobavlja jedilno
        barvilo (npr. gel, tekočina, prah, sprej).
    food_contact_material:
      name: Material za stik z živili
      description: Glavni material delov vinarske opreme (fermentorji, sifoni, lijaki),
        ki se uporabljajo z moštom ali vinom.
    food_packing_medium:
      name: Sredstvo za pakiranje hrane
      description: Določa medij, v katerem je pakirano sadje ali zelenjava (npr. voda,
        slanica, sirup, olje).
    foosball_rod_type:
      name: Vrsta palice za namizni nogomet
      description: Označuje mehansko konfiguracijo palice, ki vpliva na občutek in
        varnost igranja.
    foot_arch_type_compatibility:
      name: Združljivost tipov stopalnega loka
      description: Določa profil stopalnega loka, za katerega je vložek zasnovan.
    foot_arch_type_suitability:
      name: Primernost glede na vrsto nožnega loka
      description: Določa, kateremu profilu stopalnega loka je vložek namenjen za
        podporo.
    foot_coverage:
      name: Pokritost stopal
      description: Označuje, ali so gležnjarji s peto, brez pete, s stremenom ali
        z odprto peto.
    foot_guard_type:
      name: Vrsta zaščite za noge
      description: Označuje, ali ščitnik za noge vključuje pokrovček za prste/stopalo
        in ali je pokrovček fiksni ali odstranljivi.
    foot_support_level:
      name: Stopnja podpore stopalu
      description: Označuje raven strukturne podpore ali trdnosti, ki jo zagotavlja
        vložek za čevelj, na primer nizka, srednja, visoka ali zelo visoka.
    footbag_play_style:
      name: Slog igre v footbagu
      description: Glavni predvideni slog igre s footbagom (žogico za brcanje).
    football_ball_type:
      name: Vrsta nogometne žoge
      description: Določa glavni predvideni namen ali kontekst uporabe nogometne žoge,
        kot so uradne tekme, treningi ali zbirateljski prikaz.
    football_dummy_type:
      name: Tip nogometne lutke
      description: Klasificira slog ali funkcionalno zasnovo lutke, da odraža njen
        specifični namen vadbe.
    football_glove_certification:
      name: Certificiranje nogometnih rokavic
      description: Označuje certifikat ali skladnost s standardi, potrebnimi za tekmovalno
        igro (npr. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Vrsta montaže stopalke
      description: Določa, kako se vznožje pritrdi na okvir postelje ali tla, kar
        pomaga pri izbiri združljive strojne opreme in načinov namestitve.
    footboard_style:
      name: Stil stopalke
      description: Določa strukturni ali estetski slog oblikovanja podnožja.
    footrest_adjustability:
      name: Nastavljivost naslona za noge
      description: Določa, ali in kako je mogoče opore za noge prilagoditi različnim
        dolžinam otrokovih nog.
    footrest_type:
      name: Vrsta opore za noge
      description: Določa prisotnost in obliko naslona za noge na stolčku.
    footstrap_configuration:
      name: Konfiguracija traku za noge
      description: Določa vzorec oziroma razporeditev vstavkov za zanke za noge na
        krovu deske.
    footswitch_action_style:
      name: Slog delovanja nožnega stikala
      description: Označuje, ali je delovanje stikala trenutno ali zaskočno in ali
        podpira oboje.
    footswitch_power_source:
      name: Vir napajanja nožnega stikala
      description: Določa, kako se nožno stikalo napaja, če je primerno (pasivno prek
        ojačevalnega priključka, baterije, zunanjega adapterja, USB-ja itd.).
    footwear_construction_method:
      name: Metoda izdelave obutve
      description: Določa tehniko pritrditve zgornjega dela na podplat, Influence
        vzdržljivost, možnosti podplata in ceno.
    footwear_cut:
      name: Kroj obutve
      description: Označuje višino ovratnika ob gležnju (nizek, srednji ali visok
        izrez), kar zagotavlja ravnovesje med gibljivostjo in oporo.
    footwear_size_system:
      name: Sistem velikosti obutve
      description: Določa regionalni standard velikosti, ki se uporablja za navedeno
        velikost čevljev (npr. ZDA, EU, Združeno kraljestvo).
    footwear_support_type:
      name: Tip podpore obutve
      description: Določa raven biomehanske podpore ali nadzora pronacije, ki jo čevelj
        zagotavlja (npr. nevtralno, stabilnost, nadzor gibanja).
    fork_material:
      name: Material vilic
      description: Določa material, uporabljen za prednje vilice kolesa, kar vpliva
        na togost, težo in kakovost vožnje.
    form_factor:
      name: Oblika
      description: Primarna strojna oprema form factor of the DMX krmilnik.
    formula_car_series_class:
      name: Serija/razred formule
      description: Določa dirkaško serijo ali razred, v katerem je formula zgrajena
        za tekmovanje.
    formulation_style:
      name: Oblika formule
      description: Izpostavlja specializirane recepture, prilagojene za posebne načine
        uporabe ali okuse (npr. Barista, Extra Creamy/Izjemno kremasto).
    formulation_type:
      name: Vrsta formulacije
      description: Slog formulacije razkužilnega pršila.
    fossil_preparation_level:
      name: Raven priprave fosilov
      description: Stopnja priprave/čiščenja vzorca (npr. nepripravljen v matriksu
        v primerjavi s popolnoma pripravljenim).
    fossil_preservation_type:
      name: Vrsta ohranjanja fosilov
      description: Vrsta ohranjanja fosilov (npr. permineralizirano, ulito, plesen,
        prikaz).
    fossil_restoration_status:
      name: Stanje obnove fosilov
      description: Ali je bil vzorec popravljen/restavriran in kako (npr. lepljen,
        rekonstruiran, kompoziten).
    foundation_configuration:
      name: Konfiguracija temeljev
      description: Določa, ali je posteljno dno izdelano v enem kosu ali kot dvodelni
        set (iz dveh delov) za večje dimenzije vzmetnic.
    foundation_profile:
      name: Profil Foundations
      description: Razvršča celotno višinsko kategorijo podstavka oziroma temelja
        postelje (npr. izjemno nizek, nizek, standarden ali visok profil), kar kupcem
        omogoča hitro prilagajanje želeni višini vzmetnice in prileganju rjuham.
    frame_adjustability:
      name: Nastavljivost okvirja
      description: Označuje, ali in kako je mogoče okvir prilagoditi (npr. nastavljivost
        širine/višine, vrtenje/nagib), kar vpliva na ergonomijo in prileganje projektu.
    frame_drum_jingle_configuration:
      name: Konfiguracija kraguljčkov uokvirjenega bobna
      description: Ali boben Frame vključuje zvončke in če je tako, splošna konfiguracija.
    frame_drum_tuning_system:
      name: Sistem uglaševanja uokvirjenega bobna
      description: Navaja način uglaševanja uokvirjenega bobna oziroma podatek o tem,
        ali je boben sploh mogoče uglasiti.
    frame_finish:
      name: Končna obdelava okvirja
      description: Določa zaščitni premaz ali končni sloj materiala, nanesen na okvir,
        kar vpliva na vzdržljivost in estetski videz.
    frame_mounting_standard:
      name: Standard montaže okvirja
      description: Določa specifikacijo stičišča med čevljem in podvozjem (okvirjem)
        rolerjev (npr. 195 mm 2-točkovno vpetje, Trinity 3-točkovno vpetje), kar je
        ključno za združljivost okvirja.
    frame_steel_gauge:
      name: Debelina pločevine okvirja
      description: Določa debelino (kaliber) jeklenih cevi, uporabljenih v pokončnih
        nosilcih stojala, kar je ključni kazalnik trdnosti in stabilnosti.
    frame_suspension_type:
      name: Vrsta vzmetenja okvirja
      description: Določa vrsto vzmetenja kolesarskega okvirja, kot so trdi (brez
        vzmetenja), s prednjim vzmetenjem ali polnovzmeteni okvirji, kar kupcem pomaga
        izbrati okvir, ki ustreza njihovemu načrtovanemu projektu.
    free_reed_instrument_orientation:
      name: Orientacija glasbila s prostim jezičkom
      description: Določa, kako se instrument drži/igra (v roki z mehom, na rami itd.)
        zaradi ergonomije in uporabe - zaboj filtriranja.
    free_weight_rack_type:
      name: Tip stojala za proste uteži
      description: Razvršča strukturni slog ali Functions stojala (npr. stojalo z
        utežmi, stojalo s kettlebellom, ploščno drevo).
    freehub_body_type:
      name: Tip telesa račne
      description: Določa standard ohišja prostega pesta ali gonilnika kasete, ki
        ga podpira zadnje pesto kolesa.
    freehub_driver_standard:
      name: Standard gonilnega telesa račne
      description: Označuje vmesnik kasete/gonilnik, ki ga pesto podpira (npr. Shimano
        HG, SRAM XD).
    freewheel_thread_standard:
      name: Standardni navoj verižnika
      description: Določa standard ali velikost pesta, s katerim je prosti tek združljiv.
    french_horn_bell_construction:
      name: Konstrukcija zvonca za rog
      description: Določa, kako je zvonec izdelan in ali ga je mogoče odstraniti za
        prevoz/servis.
    french_horn_bell_material:
      name: Material odmevnika francoskega roga
      description: Določa material/zlitino zvonca (in pogosto tudi roba zvonca), ki
        se uporablja na francoskem rogu.
    french_horn_bell_type:
      name: Vrsta zvonca za francoski rog
      description: Slog konstrukcije zvona.
    french_horn_finish:
      name: Zaključek francoskega roga
      description: Zunanja obdelava/prevleka instrumenta.
    french_horn_included_accessories:
      name: Priložena oprema za francoski rog
      description: Dodatki, priloženi francoskemu rogu (zaboj, ustnik itd.).
    french_horn_leadpipe_material:
      name: Material ustnične cevi francoskega roga
      description: Določa material/zlitino svinčene cevi.
    french_horn_wrap_type:
      name: Vrsta navitja francoskega roga
      description: Celotna konfiguracija zvijanja/oblike roga
    fretboard_radius_fit:
      name: Prilagoditev polmeru ubiralke
      description: Določa, ali je ukrivljenost blazinice kapodastra prilagojena za
        ravne ali zaokrožene ubiralke, oziroma ali je nastavljiva za prilagajanje
        različnim radijem ubiralk.
    friction_surface_included:
      name: Vključena je površina za trenje
      description: Ali vztrajnik vključuje zamenljivo/nameščeno torno površino (npr.
        vložek, obroč) ali je torna površina iz enega kosa.
    fringe_curtain_finish:
      name: Zaključek z resicami za zaveso
      description: Opisuje vizualni zaključek površine resic (sijaj/tekstura).
    fringe_curtain_material:
      name: Material za resice za zavese
      description: Določa primarni material trakov za zavese (npr. PET folija, plastika,
        papir, tkanina).
    fringe_curtain_use_location:
      name: Lokacija uporabe zavese iz resic
      description: Označuje, ali je resasta zavesa namenjena za notranjo uporabo,
        zunanjo uporabo ali oboje.
    fringe_trim_style:
      name: Slog obrob z resicami
      description: Določa konstrukcijo/slog resic (kako so prameni ali zanke oblikovani
        in predstavljeni).
    front_axle_standard:
      name: Standardna sprednja os
      description: Navaja premer osi in razmik, ki ga vilice lahko sprejmejo (npr.
        15 x 110 mm Boost), kar zagotavlja združljivost s pestom.
    front_button_configuration:
      name: Konfiguracija gumbov na sprednji strani
      description: Določa slog sprednjega gumija na suknjiču, pri čemer določa, ali
        je enojno ali dvoredno zapenjanje in število sprednjih gum.
    front_closure_style:
      name: Slog zapiranja spredaj
      description: Določa način zapenjanja na prednji strani trenčkota, kot so enoredno
        ali dvoredno zapenjanje, odprt kroj, kroj na preklop ali zapenjanje z zadrgo.
    front_decoration_type:
      name: Vrsta sprednje dekoracije
      description: Določa vrsto okraska ali našitka na sprednji strani klobuka (npr.
        vezeni našitek, usnjen našitek).
    front_point_configuration:
      name: Konfiguracija sprednjih zob
      description: Določa zasnovo sprednjih zob (enozobec, dvozobec, modularni ali
        zamenljivi zobje), kar vpliva na natančnost prodiranja v led in mešan teren.
    front_seat_position:
      name: Položaj sprednjega sedeža
      description: Za katero stran/položaj v prvi vrsti je sedež namenjen.
    front_style:
      name: Sprednji slog
      description: Opisuje sprednjo konstrukcijo chino hlač, pri čemer navaja, ali
        so hlače spredaj ravne, nagubane ali imajo kako drugače detajle.
    frosting_or_icing_type:
      name: Vrsta glazure ali glazure
      description: Določa vrsto glazure ali preliva, ki se nanese na torto ali sladico.
    fruit_cultivar_or_variety:
      name: Sorta ali kultivar sadja
      description: Določa posebno sorto ali ime sorte sadja (npr. Gala, Granny Smith,
        Monthong, Cavendish).
    fruit_cut_style:
      name: Slog rezanja sadja
      description: Opisuje, kako je sadje pripravljeno ali narezano (npr. celo, narezano
        na rezine, na kocke).
    fruit_mix_variety:
      name: Raznolikost sadnih mešanic
      description: Poimenuje tematsko mešanico ali splošno vrsto sadnega miksa (npr.
        tropski miks, jagodičevje/mešano jagodičevje).
    fruit_piece_form:
      name: Oblika sadnega kosa
      description: Opisuje fizični rez ali predstavitev koščkov suhega sadja, npr.
        celih, narezanih, v prahu.
    fruit_snack_form:
      name: Oblika sadnega prigrizka
      description: Razvršča fizično obliko ali slog, v katerem je sadni prigrizek
        predstavljen.
    fruit_topping_format:
      name: Oblika sadnega preliva
      description: Opisuje fizično obliko, teksturo ali slog preliva, tako da se lahko
        kupec izbira med omakami, sirupi, koščki sadja, pokajočimi biseri itd.
    fruit_variety:
      name: Sorta sadja
      description: Določa primarno sadje, uporabljeno za recept/komplet/Supply sadnega
        vina (npr. jabolko, češnja, robida).
    fuel_cap_gasket_seal_material:
      name: Tesnilo/material pokrovčka goriva
      description: Določa material, uporabljen za tesnilo/O-obroč na pokrovčku rezervoarja
        za gorivo.
    fuel_cap_locking_mechanism:
      name: Zaklepni mehanizem pokrova rezervoarja
      description: Določa način zaklepanja, ki ga uporablja zaklepni pokrovček rezervoarja
        za gorivo.
    fuel_cap_type:
      name: Vrsta pokrova rezervoarja
      description: Določa funkcionalno vrsto/zasnovo pokrovčka za gorivo, ki se uporablja
        za dolivno odprtino za gorivo vozila.
    fuel_cap_venting:
      name: Odzračevanje pokrovčka goriva
      description: Označuje, ali je pokrovček rezervoarja za gorivo odzračen in, če
        je primerno, način odzračevanja.
    fuel_filter_features:
      name: Značilnosti filtra za gorivo
      description: Navaja pomembne funkcionalne značilnosti filtra za gorivo (ločevanje
        vode, izpustni ventil, senzorska odprtina itd.).
    fuel_filter_media_material:
      name: Material filtrirnega medija filtra za gorivo
      description: Določa primarni filtracijski medij, ki se uporablja znotraj elementa
        filtra za gorivo.
    fuel_filter_mounting_connection_type:
      name: Vrsta montaže/povezave filtra za gorivo
      description: Določa, kako se filter za gorivo priključi/namesti (priključek/navoj,
        hitri priključek, cevni konektor, Banjo itd.).
    fuel_injection_cleaning_method:
      name: Metoda čiščenja vbrizgalnika goriva
      description: Označuje, kako se komplet uporablja za čiščenje sistema za vbrizgavanje
        goriva.
    fuel_injector_electrical_connector_type:
      name: Vrsta električnega priključka vbrizgalnika goriva
      description: Določa standard ali obliko električnega priključka vbrizgalnika.
    fuel_injector_seat_type:
      name: Vrsta sedeža vbrizgalnika goriva
      description: Določa slog vmesnika konice/sedeža injektorja, ki se uporablja
        za tesnjenje na sesalnem/gorivnem vodu.
    fuel_injector_spray_pattern:
      name: Vzorec pršenja vbrizgalnika goriva
      description: Določa vzorec pršenja/porazdelitve goriva vbrizgalnika z uporabo
        proizvajalčeve ali industrijske terminologije (npr. stožec, pahljača, usmerjen
        curek, z več odprtinami).
    fuel_level_sensor_mounting_type:
      name: Vrsta pritrditve senzorja ravni goriva
      description: Določa fizični vmesnik za pritrditev, ki se uporablja za pritrditev
        senzorja ravni goriva/oddajnika na rezervoar za gorivo ali modul črpalke.
    fuel_level_sensor_sensing_mechanism:
      name: Mehanizem zaznavanja senzorja ravni goriva
      description: Določa mehanizem/tehnologijo zaznavanja, ki se uporablja za merjenje
        ravni goriva v senzorju ravni goriva ali oddajni enoti.
    fuel_line_compliance_standard:
      name: Standard skladnosti cevi za gorivo
      description: Določa regulativni ali industrijski standard, ki ga izpolnjuje
        cev za gorivo (običajno v pomorstvu).
    fuel_line_connector_interface_type:
      name: Vrsta vmesnika priključka cevi za gorivo
      description: Določa slog povezave/vmesnika na koncih cevi za gorivo ali priključka.
    fuel_pressure_regulator_body_material:
      name: Material ohišja regulatorja tlaka goriva
      description: Določa material ohišja/telesa regulatorja za vzdržljivost in odpornost
        proti koroziji.
    fuel_pressure_regulator_mounting_type:
      name: Vrsta pritrditve regulatorja tlaka goriva
      description: Določa, kako je regulator tlaka goriva pritrjen ali nameščen, kar
        vpliva na primernost in združljivost.
    fuel_pump_inlet_type:
      name: Vrsta dovoda črpalke za gorivo
      description: Slog povezave pri dovodu črpalke.
    fuel_pump_mounting_location:
      name: Mesto pritrditve črpalke za gorivo
      description: Kjer je črpalka za gorivo nameščena v sistemu za gorivo vozila.
    fuel_pump_outlet_connection_type:
      name: Vrsta povezave izhoda črpalke za gorivo
      description: Določa fizični način povezave pri izhodu črpalke za gorivo za združljivost
        z vgradnjo/namestitvijo.
    fuel_system_application:
      name: Uporaba sistema za gorivo
      description: 'Arhitektura sistema dovajanja goriva: črpalka za gorivo je zasnovana
        za podporo (npr. uplinjač, EFI, GDI, dvig/prenos dizla).'
    fuel_system_connection_type:
      name: Vrsta povezave sistema za gorivo
      description: Določa standarde sistema za gorivo ali vmesnike adapterja, ki jih
        komplet podpira.
    fuel_system_type:
      name: Vrsta sistema za gorivo
      description: Določa sistem dovajanja goriva motorja (npr. arhitekturo uplinjača
        ali vbrizgavanja goriva).
    fuel_tank_installation_position:
      name: Položaj namestitve rezervoarja za gorivo
      description: Določa tipičen položaj namestitve rezervoarja za gorivo na vozilu.
    fuel_tank_orientation:
      name: Orientacija rezervoarja za gorivo
      description: Določa, ali je rezervoar za gorivo namenjen za vgradnjo vodoravno
        ali navpično.
    fuel_tank_shape:
      name: Oblika rezervoarja za gorivo
      description: Opisuje celoten faktor oblike rezervoarja za gorivo za podporo
        fizične prileganja in ujemanja z zamenjavo.
    fur_type:
      name: Vrsta dlake
      description: Določa vrsto ali umetno snov morebitnega krzna na zunanji strani
        mehke clutch torbice ali torbice.
    furniture_finish:
      name: Končna obdelava pohištva
      description: Opisuje površinsko obdelavo ali končno obdelavo, ki se nanese na
        kos pohištva, kar vpliva na njegov videz in zahteve glede vzdrževanja.
    fuse_form_factor:
      name: Oblika ohišja varovalke
      description: Določa tip/izvedbo fizične varovalke, da se zagotovi njena združljivost
        z nameravanim držalom varovalk ali blokom varovalk (npr. ploščata varovalka
        ali cevna varovalka).
    fuse_terminal_or_mount_style:
      name: Terminal varovalke ali način pritrditve
      description: Določa, kako se varovalka mehansko/električno poveže (vtična ali
        vijačna vgradnja ali linijska).
    fusible_application_method:
      name: Način nanašanja talilnega materiala
      description: Določa, kako se toplotno lepljivo lepilo aktivira/nanese (npr.
        s toploto likalnika, s pritiskanjem, z utrjevalnim šivom).
    fusible_hem_tape_application_method:
      name: Metoda uporabe traka za robljenje
      description: Opisuje, kako se trak aktivira/namesti (npr. z likanjem, s toplotno
        prešo).
    fusible_seam_tape_activation_method:
      name: Način aktivacije talilnega traku za šive
      description: Označuje, kako se lepilo aktivira med nanosom.
    fusible_seam_tape_application:
      name: Aplikacija talilnega traku za šive
      description: Določa primarno predvideno uporabo talilnega traku za šive.
    fusible_seam_tape_material:
      name: Material talilnega traku za šive
      description: Material ali sestava traku/traku/nosilca (ne tkanine, na katero
        se nalepi).
    fusible_seam_tape_washability:
      name: Pralnost talilnega traku za šive
      description: Označuje, ali je taljeni šiv po pranju ali čiščenju ostal nepoškodovan.
    fusible_seam_tape_waterproof_rating:
      name: Vodoodpornost talilnega traku za šive
      description: Označuje, ali je trak za šive namenjen ustvarjanju vodotesnega
        vodoodpornega šiva po aplikaciji.
    fusible_tape_backing_type:
      name: Vrsta podlage talilnega traku
      description: Določa, ali ima trak zaščitni papir/oblogo in kakšno obliko ima
        ta, kar vpliva na ravnanje z njim in njegovo uporabo.
    futon_frame_conversion_mechanism:
      name: Mehanizem za preoblikovanje ogrodja futona
      description: Določa mehanizem ali strukturni slog, ki se uporablja za pretvorbo
        ogrodja med položaji kavča, ležalnika in postelje.
    gaiter_height_type:
      name: Vrsta višine gamaše
      description: Gamše razvršča glede na višino, do katere pokrivajo nogo, na primer
        do gležnja, do sredine meč, do kolen ali do stegen.
    game_variation:
      name: Različica igre
      description: Določa slog igranja, za katerega je komplet zasnovan (npr. klasični
        tetherball, tether tenis, speedball).
    garlic_preparation_style:
      name: Način priprave česna
      description: Določa, kako je česen pripravljen ali predelan pred prodajo (npr.
        cel, sesekljan, v prahu).
    garlic_variety:
      name: Sorta česna
      description: Določa botanično ali komercialno sorto/kultivar česna, ki je v
        ponudbi.
    garment_back_style:
      name: Slog hrbtnega dela oblačila
      description: Določa obliko ali konstrukcijo zadnjega dela oblačila (npr. odprt
        hrbet, zožen zadnji del, križast).
    garment_pattern_type:
      name: Vrsta kroja oblačil
      description: Navaja vrsto oblačila, za izdelavo katerega je namenjen krojaški
        vzorec.
    garnish_type:
      name: Vrsta okraska
      description: Določa, kaj je okras (sestavina ali slog okraska), ki se uporablja
        za okrasitev koktajla.
    gas_lift_class:
      name: Razred dvižnega plina
      description: Določa varnostni in trdnostni razred plinskega vzmetnega valja,
        ki se uporablja za nastavitev višine sedeža.
    gas_propellant_type:
      name: Vrsta plinskega pogonskega sredstva
      description: Določa vrsto plinskega pogonskega sredstva, ki je priporočena ali
        združljiva, kadar gre za pištolo na plin.
    gatta_tabla_tuning_block_material:
      name: Material gatta (blok za uglaševanje tabla bobna)
      description: Material uglaševalnih blokov (gatta), ki se uporabljajo med uglaševalnim
        trakom in ohišjem.
    gauge_mounting_type:
      name: Vrsta montaže merilnika
      description: Kako je merilnik goriva nameščen/nameščen na plovilu.
    gauge_style:
      name: Slog merilnika
      description: Določa vrsto manometra, ki ga uporablja črpalka, na primer analogni
        kazalec, digitalni prikaz ali brez manometra.
    gear_oil_api_classification:
      name: Klasifikacija API olja za menjalnike
      description: Klasifikacija API GL za olja za menjalnike, ki se uporabljajo v
        diferencialih/ročnih menjalnikih.
    gel_wax_density_grade:
      name: Stopnja gostote voska iz gela
      description: Označuje stopnjo gostote voska iz gela, kar vpliva na prozornost,
        vonj in primernost za vgradnjo.
    gel_wax_transparency_level:
      name: Stopnja prosojnosti voska iz gela
      description: Opisuje prozornost voska iz gela, če se uporablja po predvidenem
        namenu.
    gelatin_form:
      name: Oblika želatina
      description: Opisuje fizikalne lastnosti želatine, da lahko uporabniki izberejo
        ustrezno obliko za recepte in industrijske namene.
    gelatin_or_gelling_agent_source:
      name: Vir želatine ali želirnega sredstva
      description: Navedba izvora ali vrste želirnega sredstva, uporabljenega v izdelku,
        kar je pomembno zaradi prehranskih in verskih razlogov.
    gelatin_source:
      name: Vir želatine
      description: Označuje živalski, rastlinski ali sintetični izvor želatine, tako
        da lahko kupci preverijo, ali je v skladu z njihovimi prehranskimi, etičnimi
        ali verskimi zahtevami.
    gelling_agent:
      name: Želirno sredstvo
      description: Določa primarno snov, ki se uporablja za zgostitev ali utrjevanje
        sladice, kar je pomembno za prehransko primernost in teksturo.
    gemstone_clarity_grade:
      name: Stopnja čistosti dragulja
      description: Stopnja čistosti dragulja (če je ocenjen).
    gemstone_creation_method:
      name: Metoda izdelave dragulja
      description: Označuje, ali je dragulj naraven, laboratorijsko ustvarjen ali
        imitacija/simulant.
    gemstone_cut_style:
      name: Slog brusa dragulja
      description: Opisuje način brusa/obdelavo vzorca dragulja.
    gemstone_treatment_status:
      name: Stanje obdelave dragulja
      description: Označuje, če in kako je bil dragulj obdelan/izboljšan.
    geological_period:
      name: Geološko obdobje
      description: Geološko obdobje (in po želji tudi doba) fosila, če je znano (npr.
        jura, kreda, eocen).
    gift_box_tin_insert_type:
      name: Vložek za darilno škatlo/pločevinko
      description: Konfiguracija notranjega vložka za organizacijo/zaščito predmetov
        v škatli/pločevinki.
    gift_box_tin_sustainability_features:
      name: Trajnostne lastnosti darilne škatle/pločevinke
      description: Trajnostne lastnosti darilne škatle/pločevinke.
    gift_box_tin_window_type:
      name: Vrsta okenca na darilni škatli/pločevinki
      description: Ali ima darilna škatla ogledno okence in kakšnega sloga je.
    gift_message_option:
      name: Možnost obdarovalnega sporočila
      description: Določa, ali je mogoče vključiti obdarovalno sporočilo/opombo in
        kako (brez, vključeno, prilagodljivo).
    ginger_maturity:
      name: Zrelost ingverja
      description: Označuje stopnjo zrelosti ingverja, na primer mlad ali zrel, kar
        vpliva na intenzivnost okusa in najprimernejše načine uporabe v kuhinji.
    ginger_variety:
      name: Sorta ingverja
      description: Označuje sorto, vrsto ali sorodno koreniko iz družine ingverja,
        da se razlikujejo okusni profili in kulinarične uporabe.
    glass_kiln_controller_type:
      name: Vrsta krmilnika steklarske peči
      description: Vrsta regulatorja temperature/žganja, ki je priložen peči.
    glass_kiln_firing_application:
      name: Aplikacija za žganje stekla v steklarski peči
      description: Primarna aplikacija(-e) za obdelavo stekla, za katero(-e) je peč
        zasnovana.
    glass_stone_application_method:
      name: Metoda aplikacije steklenega kamna
      description: Določa, kako naj se steklene kamne pritrdi/uporabi v projektih
        (npr. z lepljenjem, z vročim lepljenjem, s prišitjem).
    glass_tint:
      name: Obarvanje stekla
      description: Barva stekla/plastike, uporabljena pri steklenici za uravnavanje
        izpostavljenosti svetlobi (pogosta pri pivovarstvu/vinarstvu).
    glaze_firing_atmosphere:
      name: Atmosfera za glaziranje
      description: Atmosfera(-e) žganja, za katero(-e) je glazura namenjena.
    glaze_opacity:
      name: Motnost glazure
      description: Kako prozorna je glazura po žganju.
    glaze_product_form:
      name: Oblika izdelka za glazuro
      description: Fizična oblika, v kateri se izdelek glazure dobavi (npr. tekočina,
        suhi prah, koncentrat, pršilo).
    glider_avionics_package:
      name: Avionični paket za jadralno letalo
      description: Označuje splošno raven navigacije in letalne instrumentacije, nameščene
        v jadralnem letalu.
    glider_certification_rating:
      name: Certifikacijska ocena za jadralna letala
      description: Uradni certifikacijski razred, ki označuje raven varnosti in uspešnosti
        jadralnega letala (npr. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Konfiguracija pristajalnega podvozja jadralnega letala
      description: Določa konfiguracijo pristajalnega podvozja, ki jo uporablja jadralno
        letalo.
    glider_launch_method:
      name: Metoda vzleta jadralnega letala
      description: Določa način, kako jadralno letalo vzleti oz. je izstreljeno.
    glider_performance_class:
      name: Razred uspešnosti jadralnega letala
      description: Tekmovalni/zmogljivostni razred ali kategorija, ki se običajno
        uporablja za jadralna letala.
    glitter_application_method:
      name: Način nanašanja bleščic
      description: Označuje predvideno tehniko nanašanja/uporabe okrasnih bleščic
        (npr. posipanje, vmešavanje, vtiranje, nanašanje z lepilom, nanašanje s čopičem,
        pršenje, s toploto/vtiskanje).
    glitter_eco_friendly_claim:
      name: Trditev, da so bleščice okolju prijazne
      description: Okoljske/ekološke trditve, specifične za bleščice v prahu.
    glitter_effect_type:
      name: Vrsta učinka bleščic
      description: Opisuje vizualni učinek bleščic/ploščatih bleščic, ki presega osnovno
        barvo (npr. holografski, mavrični).
    glitter_glue_base_solvent_type:
      name: Osnova/vrsta topila bleščic
      description: Opisuje osnovno sestavo lepila bleščic (pogosta skrb kupcev glede
        čiščenja in združljivosti z drugimi materiali).
    glitter_opacity_coverage:
      name: Neprozornost/pokritost bleščic
      description: Označuje, kako prozoren je učinek bleščic ob nanosu.
    glitter_use_suitability:
      name: Primernost uporabe bleščic
      description: Označuje primarni predvideni ali odobreni namen uporabe bleščic
        v prahu (npr. samo za ustvarjanje, kozmetične namene/varno za telo ali varno
        za hrano).
    glove_armor_placement:
      name: Namestitev zaščitnih ojačitev na rokavici
      description: Določa, kje na rokavici se nahajajo zaščitne ojačitve.
    glove_cuff_length:
      name: Dolžina manšete rokavice
      description: Označuje stil dolžine pokritosti manšete dirkalne rokavice na zapestju/podlahti.
    glove_finger_coverage:
      name: Pokritost prstov na rokavici
      description: Opisuje stopnjo pokritosti prstov, ki jo zagotavlja rokavica –
        od modelov s celimi prsti do modelov brez prstov.
    glove_finger_design:
      name: Oblika prstov na rokavici
      description: Navaja konfiguracijo prstov na rokavici, kot so rokavice s petimi
        prsti ali rokavice z enim prstom (palčniki).
    glove_fit_profile:
      name: Profil prileganja rokavice
      description: Opisuje notranjo obliko in splošno silhueto rokavice, da si lahko
        igralci izberejo želeni občutek.
    glove_insulation:
      name: Izolacija rokavice
      description: Določa izolacijsko/toplotno konstrukcijo ali ogrevanje rokavice
        (npr. stopnjo izolacije, tehnologijo podloge/izolacije ali vrsto z ogrevanjem).
    glove_palm_material:
      name: Material dlani rokavice
      description: Določa primarni material, uporabljen na dlani rokavice (glavna
        stična/oprijemalna površina), ki se lahko razlikuje od vrhnjega dela.
    glove_size:
      name: Velikost rokavice
      description: Označuje splošno velikost roke, za katero so boksarske rokavice
        zasnovane, pogosto izraženo z oznakami velikosti oblačil ali mladinskimi velikostmi.
    glove_webbing_style:
      name: Stil mrežice na rokavici
      description: Določa zasnovo mrežice ali žepa rokavice, kar vpliva na nadzor
        nad žogo, primernost za igralno mesto in želje igralca.
    glow_effect:
      name: Učinek svetilnosti /
      description: Označuje, ali imajo gel kroglice lastnost svetenja v temi ali sledilne
        lastnosti za igranje v slabši svetlobi.
    glow_plug_connector_type:
      name: Vrsta priključka žarilne svečke
      description: Stil električnega terminala/priključka na žarilni svečki, ki se
        uporablja za povezavo s kabelskim snopom vozila.
    glow_plug_heating_element_type:
      name: Vrsta grelnega elementa žarilne svečke
      description: Vrsta/tehnologija grelnega elementa, ki ga uporablja žarilna svečka.
    glue_application_format:
      name: Oblika nanašanja lepila
      description: Določa format aplikatorja/doziranja, ki se uporablja za nanašanje
        šolskega lepila.
    glue_applicator_type:
      name: Vrsta aplikatorja za lepilo
      description: Določa vgrajeni slog aplikatorja/dozirne konice, ki se uporablja
        za nanašanje tekočega lepila.
    glue_base_formulation:
      name: Formulacija lepilne osnove
      description: Določa stil vgrajenega aplikatorja, ki se uporablja za nanašanje
        tekočega lepila.
    glue_gun_nozzle_style:
      name: Stil šobe na pištoli za lepilo
      description: Določa fizični stil konice šobe pištole za lepilo, kar vpliva na
        natančnost nanašanja in pokritost z lepilom.
    glue_safety_standard:
      name: Varnostni standard za lepilo
      description: Označuje, ali je lepilo nestrupeno/varno za otroke v skladu z označevanjem
        in uveljavljenimi standardi.
    goal_frame_material:
      name: Material okvirja gola
      description: Določa material vratnic/okvirja gola, kar vpliva na težo, prenosljivost
        in vremensko odpornost.
    goal_size:
      name: Velikost gola
      description: Razvršča nogometni gol v običajne uradne skupine ali skupine velikosti
        za trening za hitrejšo izbiro kot le na podlagi samih dimenzij.
    goal_size_classification:
      name: Klasifikacija velikosti gola
      description: Označuje standardiziran razred velikosti gola (npr. uradna polna
        velikost, mladinski, majhen), da lahko uporabniki hitro izberejo opremo, primerno
        za njihovo raven igre.
    goal_size_standard:
      name: Standardna velikost gola
      description: Označuje, kateri uradni standard ali standard starostne skupine
        gol izpolnjuje (npr. predpisi World Aquatics, 12U).
    goalie_configuration:
      name: Konfiguracija vratarja
      description: Označuje število vratarjev na stran, nastavljenih na mizi (ameriški
        stil s 3 vratarji proti evropskemu stilu z 1 vratarjem).
    goalie_playing_surface:
      name: Igralna površina za vratarja
      description: Določa primarno igralno površino ali okolje, za katerega je komplet
        hokejske vratarske opreme zasnovan.
    goalkeeper_glove_cut:
      name: Kroj vratarskih rokavic
      description: Označuje stil izdelave (kroj) dlani/prstov vratarskih rokavic,
        kar vpliva na prileganje, občutek za žogo in nadzor.
    goalkeeper_training_aid_type:
      name: Vrsta pripomočka za trening vratarjev
      description: Določa stil pripomočka za trening vratarjev, kar omogoča natančno
        filtriranje.
    goblet_drum_playing_style:
      name: Način igranja na čašasti boben
      description: Ali je instrument zasnovan primarno za igranje z rokami ali za
        uporabo s palčkami/tolkači.
    gobo_format:
      name: Format gobo šablone
      description: Določa velikost/standard gobo šablone, ki jo projektor sprejme
        (družina premerov in debelin), kar zagotavlja združljivost z nadomestnimi
        ali prilagojenimi gobo šablonami.
    gobo_root_variety:
      name: Sorta korenine gobo
      description: Določa specifično sorto ali različico korenine gobo (velikega lapuha).
    gobo_rotation:
      name: Rotacija gobo šablone
      description: Navaja, ali se gobo šablona lahko vrti in katera smer je podprta.
    goggle_accessory_type:
      name: Vrsta dodatka za očala
      description: Razvršča vrsto dodatka (npr. prevleka, kovček, trak), da lahko
        kupci filtrirajo raznolik nabor izdelkov znotraj te krovne kategorije.
    goggle_features:
      name: Lastnosti očal
      description: Navaja osebne funkcionalne ali oblikovne lastnosti, ki jih ponujajo
        očala.
    goggle_fit_design:
      name: Zasnova prileganja očal
      description: Opisuje, kako naj bi se očala prilegala ali nosila, vključno z
        združljivostjo OTG (nad korekcijskimi očali).
    goggle_gasket_material:
      name: Material tesnila očal
      description: Material tesnila, ki se prilega obrazu, kar vpliva na udobje, tveganje
        za alergije in preprečevanje puščanja.
    goggle_integration:
      name: Integracija z očali
      description: Ali je čelada zasnovana za uporabo z očali in/ali vključuje integrirane
        elemente za zadrževanje očal.
    goggle_lens_shape:
      name: Oblika leče očal
      description: Določa profil ukrivljenosti nadomestne leče, kar vpliva na popačenje
        in vidno polje (npr. cilindrična, sferična, torična).
    goggle_lens_tint:
      name: Zatemnitev leč očal
      description: Določa zatemnitev ali obdelavo leče, kar vpliva na prepustnost
        svetlobe, zaznavanje barv in estetski videz.
    goggle_strap_material:
      name: Material traku očal
      description: Glavni material, uporabljen za naglavni trak, ki vpliva na vzdržljivost
        in udobje.
    golf_accessory_set_purpose:
      name: Namen kompleta dodatkov za golf
      description: Opredeljuje primarni predvideni namen ali tematiko kompleta dodatkov
        za golf.
    golf_bag_style:
      name: Slog torbe za golf
      description: Označuje primarno zasnovo ali stil uporabe torbe za golf (npr.
        s stojalom, za voziček, profesionalna).
    golf_ball_alignment_design:
      name: Zasnova linije za poravnavo na žogici za golf
      description: Navaja vsak vgrajen vizualni pripomoček za poravnavo, natisnjen
        ali vtisnjen na površino žogice.
    golf_ball_construction:
      name: Konstrukcija žogice za golf
      description: Navaja število slojev/delov, uporabljenih pri zgradbi golf žogice,
        kar vpliva na rotacijo, občutek in razdaljo.
    golf_ball_cover_material:
      name: Material vrhnjega sloja žogice za golf
      description: Opredeljuje material zunanjega ovoja golf žogice, kar vpliva na
        rotacijo (spin), vzdržljivost in občutek.
    golf_cart_cover_climate_use:
      name: Uporaba prevleke za voziček za golf glede na podnebje
      description: Označuje primarne podnebne/sezonske razmere, za katere je prevleka
        za shranjevanje zasnovana.
    golf_cart_enclosure_fit_type:
      name: Vrsta prileganja zaščitne kabine za voziček za golf
      description: Navaja, ali je zaščitna kabina zasnovana za določeno število sedežev/obliko
        ali pa ponuja univerzalno/prilagodljivo prileganje.
    golf_cart_intended_use:
      name: Namen uporabe vozička za golf
      description: Primarni predvideni primer uporabe, za katerega je golf voziček
        zasnovan ali konfiguriran.
    golf_club_number:
      name: Številka palice za golf
      description: Opredeljuje specifično številko ali oznako palice, natisnjeno na
        palici (npr. 5, PW, GW).
    golf_club_part_type:
      name: Vrsta dela za palico za golf
      description: Razvršča dodatek ali komponento palice za golf v običajne podvrste
        (npr. razdelilni tulec, obroček, utež).
    golf_grip_size:
      name: Velikost ročaja za palico za golf
      description: Navaja splošno kategorijo zunanje velikosti ročaja za golf palico,
        ki označuje, kako debel je ročaj v roki.
    golf_shoe_spike_type:
      name: Vrsta žebljičkov na čevljih za golf
      description: Opredeljuje vrsto sistema za oprijem, uporabljenega na podplatu
        čevljev za golf (npr. modeli z žebljički ali brez njih).
    golf_tee_style:
      name: Stil podstavka pri golfu
      description: Opisuje strukturni ali funkcionalni stil/zasnovo podstavka za žogico
        za golf, kar vpliva na višino žogice, vzdržljivost ali zmanjšanje rotacije.
    golf_training_focus:
      name: Fokus treninga golfa
      description: Klasificira primarno sposobnost ali vidik, ki ga izdelek želi izboljšati.
    golf_training_objective:
      name: Cilj treninga golfa
      description: Določa primarno veščino pri golfu ali vidik, ki ga pripomoček za
        trening izboljšuje.
    gong_profile_type:
      name: Vrsta profila gonga
      description: Opisuje fizični profil opernega gonga (npr. raven proti dvignjenemu
        središču), kar močno vpliva na ton in slog igranja.
    grading_scale:
      name: Lestvica ocenjevanja
      description: Lestvica ocenjevanja, uporabljena za ocenjevanje investicijskih
        kovancev (npr. Sheldonova lestvica 1–70).
    grading_service:
      name: Storitev ocenjevanja
      description: Neodvisna služba za ocenjevanje/certificiranje kovancev ali bankovcev
        (npr. PCGS, NGC).
    graduation_increment:
      name: Korak merilne lestvice
      description: Navaja najmanjšo natisnjeno/vgravirano razdelitev na merilu za
        šive (ločljivost oznak).
    grain_processing_method:
      name: Način predelave žit
      description: Opredeljuje primarno metodo predelave, uporabljeno za žito (npr.
        delno skuhan/parboiled, valjan, kaljen), kar vpliva na čas kuhanja, teksturo
        in hranilno vrednost.
    grand_piano_soundboard_material:
      name: Material resonančne plošče koncertnega klavirja
      description: Glavni material, uporabljen za resonančno ploščo klavirja, ki vpliva
        na ton in vzdržljivost.
    grappling_dummy_pose:
      name: Položaj lutke za rokoborbo
      description: Opisuje privzeti položaj/držo telesa lutke, kar določa, katere
        vaje in tehnike omogoča.
    grease_application:
      name: Uporaba masti
      description: Navaja primarno komponento vozila ali primer uporabe, za katerega
        je mast namenjena.
    grease_consistency_grade_nlgi:
      name: Stopnja konsistence masti (NLGI)
      description: Navaja številko konsistence NLGI, ki označuje trdnost masti (npr.
        NLGI 2 je običajna večnamenska mast).
    grease_thickener_type:
      name: Vrsta zgoščevalca masti
      description: Opredeljuje zgoščevalec/milni sistem, uporabljen v formuli masti.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Vrsta ventila na pihalni cevi škotskih dud
      description: Navaja nepovratni ventilski sistem, uporabljen v pihalni cevi.
    great_highland_bagpipes_drone_configuration:
      name: Konfiguracija dordonskih cevi škotskih dud
      description: Navaja vrste dordonskih cevi, vključenih v komplet.
    great_highland_bagpipes_mounting_material:
      name: Okrasni material škotskih dud
      description: Navaja material dekorativnih elementov na dudah (npr. novo srebro/nikelj-srebro,
        imitacija slonovine).
    greens_maturity_stage:
      name: Stopnja zrelosti listnate zelenjave
      description: Označuje razvojno stopnjo listnate zelenjave ob obiranju.
    greens_preparation_state:
      name: Stanje priprave listnate zelenjave
      description: Opisuje, kako je listnata zelenjava obdelana ali pakirana (npr.
        predhodno oprana, narezana, pripravljena za uživanje).
    grenade_effect_type:
      name: Vrsta učinka granate
      description: Označuje primarni funkcionalni učinek, ki ga aktivirana paintball
        granata proizvede (npr. dim, barva, zvočni šok).
    grid_unit:
      name: Enota mreže
      description: Primarni merilni sistem, natisnjen na podlogi (če je prisotna mreža/merilo).
    grille_emblem_provision:
      name: Nastavek za emblem na maski
      description: Navaja, ali prednja maska omogoča namestitev originalnega (OEM)
        emblema/značke in kako.
    grille_mounting_method:
      name: Način montaže mreže
      description: Navaja, kako se maska namesti na vozilo (npr. neposredna zamenjava
        nasproti vložku/preobleki; privijanje nasproti pripenjanju/sponkam; potrebno
        vrtanje nasproti vrtanju ni potrebno).
    grille_style:
      name: Stil mreže
      description: Določa vizualni/oblikovalski slog maske vozila.
    grip_chalk_form:
      name: Oblika krede za oprijem
      description: Opredeljuje fizično obliko krede, ki je priložen ali se uporablja
        s vrečko.
    grip_coverage:
      name: Pokritost oprijemalne površine
      description: Opredeljuje prisotnost in mesto silikonskih ali gumiranih oprijemalnih
        elementov na nogavici.
    grip_design:
      name: Zasnova ročaja
      description: Navaja konfiguracijo ročaja ali lukenj na kolutu za lažje prenašanje
        in vsestranskost pri vadbi.
    grip_enhancer_effect:
      name: Učinek sredstva za izboljšanje oprijema
      description: Opisuje primarno funkcionalno lastnost, ki jo izdelek zagotavlja
        (npr. vpijanje vlage ali lepljiv smolnat premaz).
    grip_enhancer_form:
      name: Oblika sredstva za izboljšanje oprijema
      description: Opredeljuje fizično obliko ali format sredstva za izboljšanje oprijema,
        da lahko športniki izberejo ustrezen način nanosa.
    grip_features:
      name: Značilnosti oprijema ročaja
      description: Označuje vgrajene lastnosti oprijema/ročaja, namenjene izboljšanju
        držanja, udobja ali nadzora med igro.
    grip_material:
      name: Material oprijema ročaja
      description: Opredeljuje material, uporabljen za oprijemalno površino hlač.
    grip_shape:
      name: Oblika ročaja
      description: Opisuje obliko prečnega prereza ali stil ročaja, kar je še posebej
        pomembno za ročaje palic bližalk.
    grip_surface_type:
      name: Vrsta oprijemalne površine
      description: Opisuje zasnovo profilne/oprijemalne površine pedala, ki vpliva
        na oprijem in občutek.
    grip_tackiness_level:
      name: Stopnja lepljivosti oprijemalne površine
      description: Ocenjuje, kako lepljiva ali oprijemljiva je površina ročaja, kar
        igralcem pomaga izbrati med suhim in zelo lepljivim občutkom.
    grip_tape_form:
      name: Oblika protidrsnega traku
      description: Označuje obliko dobave traku za oprijem (npr. v listu, roli, komplet
        z razpršilom).
    grip_wax_form:
      name: Oblika voska za oprijem
      description: Razvršča fizično obliko, v kateri se vosek za oprijem prodaja.
    gripper_coverage:
      name: Pokritost oprijemalne površine
      description: Navaja stil oprijemala na nedrsečem čevlju, kar označuje pokritost
        površine in možnost odstranitve.
    grommet_application_material:
      name: Material za namestitev kovinske zakovice
      description: Glavni materiali, v katere so kovinske zakovice namenjene za namestitev
        (npr. tkanina, usnje, vinil, cerada/platno).
    grommet_duty_rating:
      name: Razred obremenitve kovinske zakovice
      description: Označuje predvideni razred trdnosti/uporabe kovinske zakovice.
    grommet_style:
      name: Stil kovinske zakovice
      description: Stil izdelave kompleta kovinskih zakovic (kako je sestavljen/se
        uporablja).
    grooming_glove_texture_type:
      name: Vrsta teksture rokavice za nego
      description: Opredeljuje primarno površinsko teksturo, ki se uporablja za nego,
        kar označuje predvideni namen, kot je drgnjenje, poliranje ali pranje.
    groove_orientation:
      name: Usmerjenost utorov
      description: Opisuje smer/postavitev utorov ali grebenov na instrumentu.
    groove_sampler_onboard_effects:
      name: Vgrajeni učinki ritmičnega vzorčevalnika
      description: Označuje kategorije vgrajene obdelave z učinki, ki so na voljo
        na ritmičnem vzorčevalniku (vstavljeni/glavni), kot so odmev, zakasnitev,
        kompresija, distorzija, EQ, filtriranje.
    groove_sampler_storage_expansion_type:
      name: Vrsta razširitve pomnilnika ritmičnega vzorčevalnika
      description: Navaja možnosti odstranljivega/razširljivega pomnilnika, ki jih
        podpira ritmični vzorčevalnik.
    ground_attachment_method:
      name: Način pritrditve v tla
      description: Opisuje, kako je prehodni lok pritrjen na igralno površino, kar
        vpliva na stabilnost in združljivost s površino.
    groupset_components_included:
      name: Vključeni sestavni deli pogonskega sklopa
      description: Navaja specifične komponente pogonskega sklopa, vključene v komplet
        komponent (groupset), da kupci razumejo vsebino paketa.
    gt_racing_class:
      name: Dirkalni razred GT
      description: Navaja kategorijo/razred GT, za katerega je avtomobil izdelan ali
        homologiran.
    guard_construction_type:
      name: Vrsta izdelave ščitnika
      description: Ali je ščitnik trdi zaščitni oklep, mehki zaščitni vložek ali model
        v obliki rokava/traku.
    guard_size_measurement_basis:
      name: Osnova za merjenje velikosti ščitnika
      description: Na kateri meritvi temelji določanje velikosti (npr. obseg komolca,
        obseg zapestja, obseg podlakti).
    guard_style:
      name: Slog ščitnika
      description: Razvršča zgradbo ali vrsto ščitnika za rezila drsalk, kar kupcem
        pomaga hitro razlikovati med trdimi ščitniki za hojo, mehkimi vpojnimi ščitniki,
        ščitniki z vzmetjo in drugimi modeli.
    guava_flesh_color:
      name: Barva mesa gvajane
      description: Označuje notranjo barvo mesa sadeža gvajave.
    guava_variety:
      name: Sorta gvajave
      description: Opredeljuje specifični kultivar ali tržno sorto gvajave, ki se
        prodaja (npr. jabolčna gvajava, mehiška krema, tajska, rožnata, brez pečk,
        bela).
    guide_material:
      name: Material vodila
      description: Material, uporabljen za vodila vrvice ali vložke na ribiški palici.
    guide_type:
      name: Vrsta vodila
      description: Navaja stil vodil, nameščenih na ribiški palici, kot so enonoga
        vodila, valjčna vodila ali kačasta vodila.
    guideline_markings:
      name: Oznake vodilnih linij
      description: Vrsta vizualnih oznak za poravnavo, natisnjenih ali vtisnjenih
        na površino podloge za mete, ki pomagajo pri vadbi metov.
    guiro_scraper_material:
      name: Material strgala za guiro
      description: Material priloženega ali priporočenega strgala/tolkala, ki se uporablja
        z instrumentom guiro.
    guiro_surface_style:
      name: Stil površine za guiro
      description: Opisuje vzorec/geometrijo igralne površine, po kateri se strga
        za izvajanje zvoka.
    guitar_body_finish_type:
      name: Vrsta površinske obdelave trupa kitare
      description: Navaja površinsko obdelavo, uporabljeno na trupu kitare.
    guitar_bridge_system_type:
      name: Vrsta sistema kobilice kitare
      description: Družina zasnove sistema kobilice/držala za združljivost in brskanje.
    guitar_case_style:
      name: Stil kovčka za kitaro
      description: Navaja splošni stil zaščite/strukture kovčka ali mehke torbe za
        kitaro.
    guitar_humidifier_placement:
      name: Namestitev vlažilnika za kitaro
      description: Navaja, kje je vlažilnik predviden za uporabo/namestitev glede
        na instrument ali okolje.
    guitar_pedal_i_o_configuration:
      name: Konfiguracija vhodov/izhodov kitarskega pedala
      description: Označuje, ali pedal podpira mono ali stereo usmerjanje vhodov/izhodov.
    guitar_pedal_output_connector_type:
      name: Vrsta izhodnega priključka kitarskega pedala
      description: Navaja vrsto avdio izhodnega priključka, ki ga uporablja pedal.
    guitar_slide_finish:
      name: Površinska obdelava kitarskega drsnika
      description: Površinska obdelava drsnika, ki vpliva na občutek in trenje ob
        strune.
    guitar_slide_style:
      name: Stil drsnika za kitaro
      description: Navaja oblik kitarskega drsnika ali tonske palice ter kako se nosi/uporablja.
    guitar_stand_type:
      name: Vrsta stojala za kitaro
      description: Navaja primarno obliko stojala za kitaro (kako podpira/shranjuje
        kitaro).
    guitar_strap_attachment_type:
      name: Vrsta pritrditve kitarskega traku
      description: Navaja, kako se trak pritrdi na kitaro (ali na gumbe za trak),
        vključno s tem, ali uporablja klasične konce ali sisteme za hitro odpenjanje.
    guitar_strap_end_material:
      name: Material konca kitarskega traku
      description: Material, uporabljen na koncih/jezičkih traku (deli, ki se pritrdijo
        na gumbe za trak ali sisteme za zaklepanje traku).
    guitar_strap_features:
      name: Lastnosti pasu za kitaro
      description: Pomembne funkcionalne lastnosti kitarskega traku poleg osnovne
        velikosti/materiala (večkratna izbira).
    guitar_string_coating:
      name: Premaz kitarskih strun
      description: Označuje, ali imajo strune zaščitni premaz in, če ga imajo, stil
        premaza.
    guitar_string_gauge_type:
      name: Vrsta debeline kitarskih strun
      description: Tržna kategorija debeline kompleta strun za akustično kitaro (npr.
        zelo tanke, tanke, srednje). Pogosto se oceni glede na debelino visoke strune
        E; natančna območja debeline se lahko razlikujejo glede na proizvajalca.
    guitar_string_set_gauge_category:
      name: Kategorija debeline kompleta kitarskih strun
      description: Splošne tržne družine debelin za komplet kitarskih strun (običajno
        izpeljane iz visoke strune E/1. strune).
    guitar_string_winding_type:
      name: Vrsta navijanja kitarskih strun
      description: Navaja stil zunanjega ovitja ovitih strun v kompletu.
    guitar_tuning_peg_button_shape:
      name: Oblika gumba kitarskega vijaka za uglasitev
      description: Oblika/stil gumba ključa za uglasitev.
    guitar_tuning_peg_configuration:
      name: Konfiguracija kitarskih vijakov za uglasitev
      description: Razporeditev kompleta vijakov na glavi kitare.
    guitar_tuning_peg_mounting_style:
      name: Stil montaže količev za uglaševanje za kitaro
      description: Kako se mehanizem za uglasitev montira na glavo kitare (vrsta puše
        in metoda proti vrtenju).
    guitar_tuning_peg_shaft_type:
      name: Vrsta stebla kitarskega vijaka za uglasitev
      description: Ali je steblo za struno polno ali deljeno ter kako se struna pritrdi.
    guitar_tuning_peg_style:
      name: Stil količev za uglaševanje za kitaro
      description: Fizični stil mehanizma/vijaka za uglasitev in format montaže, uporabljen
        na glavi instrumenta (npr. zaprti zobniki nasproti odprtim zobnikom, z zaklepanjem,
        deljeno steblo).
    gum_condition:
      name: Stanje dlesni
      description: Stanje/status lepila na hrbtni strani znamke (npr. nikoli lepljeno/čisto,
        lepljeno s falcem, brez lepila).
    gun_action_type:
      name: Vrsta mehanizma orožja
      description: Vrsta mehanskega delovanja, ki se uporablja za polnjenje/streljanje
        (npr. repetirno z zaklepom, vzvodno).
    gun_operational_status:
      name: Operativni status orožja
      description: Označuje, ali je zbirateljsko orožje deaktivirano/neizstrelno (in
        kako je predstavljeno).
    gun_type:
      name: Vrsta orožja
      description: Opredeljuje splošno obliko strelnega orožja za starinsko orožje.
    gusset_material:
      name: Material ojačitvenega klinastega vložka
      description: Navaja material, uporabljen v podlogi mednožnega vložka, kar vpliva
        na zračnost, higieno in udobje.
    gymnastics_discipline:
      name: Gimnastična disciplina
      description: Navaja panogo gimnastike, za katero je izdelek predviden (npr.
        športna, ritmična, akrobatska).
    hair_extension_texture:
      name: Tekstura lasnih podaljškov
      description: Opisuje kodranost, valovitost ali vzorec teksture pramenov lasnih
        podaljškov.
    hair_net_style:
      name: Stil mrežice za lase
      description: Opredeljuje zasnovo ali stil izdelave mrežice za lase (npr. volumenska
        kapica, mrežasta ruta, pokrivalo za figo).
    hair_quality_grade:
      name: Kakovostini razred las
      description: Označuje industrijske oznake kakovosti/izvora las.
    halter_style:
      name: Slog povodca
      description: Opredeljuje funkcionalni ali oblikovni stil oglavnika (npr. iz
        vrvi, varnostni, razstavni), kar kupcem pomaga izbrati oglavnik, primeren
        za njihov predviden namen uporabe.
    hammock_style:
      name: Stil viseče mreže
      description: Opisuje strukturni stil ali izdelavo viseče mreže.
    hand_and_foot_coverage:
      name: Pokritost rok in nog
      description: Opisuje integrirane ali odstranljive rokavičke in copatke, ki pokrivajo
        roke in/ali noge.
    hand_cymbal_set_configuration:
      name: Konfiguracija kompleta ročnih činel
      description: Označuje, ali se izdelek prodaja kot ujemajoč se par, posamezna
        činela ali večji komplet.
    hand_drum_head_material:
      name: Material opne ročnega bobna
      description: Material membrane bobna, uporabljene na čašastem bobnu.
    hand_exerciser_style:
      name: Stil pripomočka za vadbo rok
      description: Razvršča splošni stil ali mehanizem pripomočka za vadbo rok.
    hand_guard_backbone_material:
      name: Material ogrodja ščitnika za roke
      description: Material strukturnega ojačanja/ogrodja (če je prisotno), kar določa
        trdnost in zaščito.
    hand_guard_coverage_style:
      name: Stil pokritosti ščitnika za roke
      description: Opisuje pokritost/profil ščitnika za roke, kar vpliva na zaščito
        pred vetrom in udarci.
    hand_guard_mounting_type:
      name: Vrsta pritrditve ščitnika za roke
      description: Navaja, kako se ščitniki za roke pritrdijo na motor (npr. na konec
        krmila z notranjo objemko nasproti montaži samo z objemko).
    hand_guard_set_configuration:
      name: Konfiguracija kompleta ščitnikov za roke
      description: Ali se izdelek prodaja kot levi/desni par ali kot posamezna stran
    hand_guard_style:
      name: Slog ščitnika za roke
      description: Opisuje zasnovo pokritosti ali stil ščitnika (npr. zaprt, odprt,
        polni, lahki, standardni).
    hand_guard_weather_protection:
      name: Zaščita ščitnika za roke pred vremenskimi vplivi
      description: Označuje predvideno zaščito pred vremenskimi vplivi, ki jo zagotavljajo
        ščitniki za roke.
    hand_paddle_strap_type:
      name: Vrsta traku za ročno veslo
      description: Navaja vrsto traku ali odsotnost traku, ki se uporablja za pritrditev
        plavalne ročke na uporabnikovo roko.
    hand_percussion_mount_attachment_mechanism:
      name: Mehanizem za pritrditev nosilca ročnih tolkal
      description: Navaja, kako se nosilec pritrdi na stojalo, ogrodje ali drugo strojno
        opremo (npr. z objemko nasproti montaži na palico).
    hand_percussion_mounting_handling:
      name: Montaža/rokovanje z ročnimi tolkali
      description: Ali se instrument med običajno uporabo drži v roki, nosi, namesti
        ali postavi na mizo/tla.
    hand_percussion_pitch_type:
      name: Vrsta višine tona ročnih tolkal
      description: Označuje, ali instrument proizvaja določljivo višino tona (uglasljiv/note)
        ali nedoločljivo višino tona.
    hand_percussion_playing_method:
      name: Način igranja na ročna tolkala
      description: Kako se na instrument običajno igra za izvajanje zvoka (npr. s
        tresenjem nasproti strganju).
    hand_percussion_set_configuration:
      name: Konfiguracija kompleta ročnih tolkal
      description: Ali je izdelek posamezen instrument, ujemajoč se par ali večdelni
        komplet.
    hand_percussion_size_class:
      name: Razred velikosti ročnih tolkal
      description: Splošna kategorija velikosti instrumenta, kadar natančna meritev
        ni navedena, ali za enostavno filtriranje.
    hand_sewing_needle_point_type:
      name: Vrsta konice igle za ročno šivanje
      description: Oblika/stil konice igle za ročno šivanje, ki se uporablja za prebadanje
        različnih materialov (npr. tkana blaga, pletenine, usnje) ali preje.
    hand_support_level:
      name: Stopnja podpore za roko
      description: Navaja stopnjo podpore ali kompresije, ki jo zagotavlja rokavica,
        ovitek ali trak.
    hand_support_size:
      name: Velikost podpore za roko
      description: Velikost rokavice, traku ali ovitka, ki jo navaja proizvajalec
        (XS–XXL ali univerzalna velikost).
    handball_ball_type:
      name: Vrsta rokometne žoge
      description: Označuje predvideno kategorijo uporabe rokometne žoge, kot je tekma,
        trening ali plaža.
    handball_playing_surface:
      name: Igralna površina za rokomet
      description: Označuje igralno površino oziroma površine, za katere je rokometna
        žoga optimizirana.
    handball_target_type:
      name: Vrsta tarče za rokomet
      description: Navaja stil ali zasnovo strelske tarče, namenjene treningu rokometa.
    handbrake_actuation_type:
      name: Vrsta aktivacije ročne zavore
      description: Navaja kako se aktivira parkirna zavora.
    handbrake_orientation:
      name: Usmerjenost ročne zavore
      description: Navaja, ali je ročna zavora zasnovana za vozila z volanom na levi
        ali desni strani ali pa je univerzalna.
    handgun_grip_material:
      name: Material ročaja kratkocevnega orožja
      description: Glavni material ročajev/ploščic kratkocevnega orožja.
    handle_configuration:
      name: Konfiguracija ročaja
      description: Opisuje strukturni stil ročaja za wakeboard (npr. enojni, dvojni,
        Deep-V, T-wrap), da lahko kupci uskladijo svoje veščine, trike ali vrsto deske.
    handle_ergonomics:
      name: Ergonomija ročaja
      description: Opisuje ergonomske lastnosti ročaja, namenjene izboljšanju udobja
        in nadzora.
    handle_grip_material:
      name: Material ročaja za oprijem
      description: Navaja material, uporabljen na oprijemalni površini ročaja, kar
        vpliva na udobje in oprijem, zlasti ko je moker.
    handle_grip_type:
      name: Vrsta ročaja za oprijem
      description: Navaja prevleko/material ali stil površine oprijema ročaja, namenjen
        izboljšanju udobja in nadzora.
    handle_shape:
      name: Oblika ročaja
      description: Oblika prečnega prereza ali profil ročaja.
    handlebar_design:
      name: Zasnova krmila
      description: Navaja vrsto krmila na fiksni napravi za stopanje, kot so brez
        krmila, fiksno, nastavljivo po višini, zložljivo ali ročaji z elastičnimi
        trakovi.
    handlebar_type:
      name: Vrsta krmila
      description: Opredeljuje stil krmila, nameščenega na kolesu, kar vpliva na držo
        med vožnjo, nadzor in udobje.
    handslide_bore_type:
      name: Vrsta kalibra ročnega drsnika
      description: Navaja, ali bas pozavna uporablja poteznico z enojnim ali dvojnim
        kalibrom.
    handwear_cuff_style:
      name: Stil manšete rokavice
      description: Opisuje stil izdelave manšete ali zapestja rokavic ali palčnikov,
        kar vpliva na pokritost in prileganje.
    handwear_insulation_material:
      name: Izolacijski material rokavice
      description: Opredeljuje izolacijski material ali material podloge, uporabljen
        znotraj rokavic ali palčnikov.
    handwear_size:
      name: Velikost rokavic
      description: Navaja velikost rokavic ali druge opreme za roke, da se zagotovi
        pravilno prileganje.
    hang_glider_design:
      name: Zasnova jadralnega zmaja
      description: Razvršča strukturni stil zmaja (npr. gibljiva krila, toga krila,
        motorna različica).
    hanger_thread_size:
      name: Velikost navoja nosilca
      description: Označuje velikost/standard navoja vijaka, ki se uporablja za montažo
        nosilca na ribiške palice ali indikatorje ugriza, kar zagotavlja združljivost.
    hanging_suspension_method:
      name: Način visečega vzmetenja
      description: Določa glavno opremo ali sistem, ki se uporablja za obešanje gugalnice
        (npr. vrv, veriga, ogrodje stojala).
    hardtop_finish_type:
      name: Vrsta premaza trde strehe
      description: Navaja stanje zunanjega premaza trde strehe (npr. s temeljno barvo
        nasproti lakiranemu), kar vpliva na pripravljenost za namestitev in videz.
    hardtop_shell_material:
      name: Material školjke trde strehe
      description: Navaja glavni material toge školjke trde strehe vozila (brez kakršnega
        koli blaga za prekritje), kot sta steklena vlakna ali aluminij.
    hardtop_window_configuration:
      name: Konfiguracija oken trde strehe
      description: Opisuje, katera okna so vključena s trdo streho, in njihovo konfiguracijo.
    harmonica_comb_material:
      name: Material glavnika ustne harmonike
      description: Material, uporabljen za glavnik ustne harmonike.
    harmonica_cover_plate_finish:
      name: Površinska obdelava pokrovne plošče ustne harmonike
      description: Navaja površinsko obdelavo ali premaz na pokrovnih ploščah ustne
        harmonike.
    harmonica_cover_plate_material:
      name: Material pokrovne plošče ustne harmonike
      description: Material, uporabljen za zunanje pokrovne plošče.
    harmonica_finish:
      name: Površinska obdelava ustne harmonike
      description: Površinska obdelava pokrovnih plošč ustne harmonike.
    harmonica_included_accessories:
      name: Vključeni dodatki za ustno harmoniko
      description: Označuje, kateri dodatki so vključeni k ustni harmoniki.
    harmonica_note_range:
      name: Razpon tonov ustne harmonike
      description: Klasifikacija razpona instrumenta, ki se uporablja v orkestrskem
        kontekstu (npr. bas, bariton, tenor).
    harmonica_reed_plate_material:
      name: Material piskovnih ploščic ustne harmonike
      description: Material, uporabljen za piskovne ploščice (npr. medenina, nerjavno
        jeklo, aluminij).
    harmonica_system_type:
      name: Sistem/vrsta ustne harmonike
      description: Opredeljuje sistem ali obliko orkestrske ustne harmonike (npr.
        akordna, basovska, baritonska, polifonična).
    harmonica_tuning_system:
      name: Sistem uglasitve ustne harmonike
      description: Navaja razporeditev/sistem uglasitve, ki jo uporablja ustna harmonika
        (npr. Richterjeva, solo, orkestrska uglasitev).
    harness_shell_type:
      name: Vrsta školjke trapeza
      description: Opisuje togost konstrukcije školjke trapeza (npr. mehka školjka,
        trda školjka, hibrid).
    harness_style:
      name: Slog trapeza
      description: Določa strukturni stil/zasnovo trapeza, npr. ledveni, sedežni,
        prsni/telovnik, krilni pas, kopalne hlače ali hibrid.
    harness_type:
      name: Vrsta pasu
      description: Razvršča strukturni stil plezalnega pasu, kot je sedežni, celotni
        ali prsni.
    harp_action_type:
      name: Vrsta mehanizma harfe
      description: Glavni mehanizem, ki se uporablja za spreminjanje višine tona/predznakov
        na harfi.
    harp_finish:
      name: Površinska obdelava harfe
      description: Površinska obdelava trupa harfe (npr. naravna, lužena, barvana,
        lakirana).
    harp_included_accessories:
      name: Vključeni dodatki za harfo
      description: Navaja dodatke, ki so vključeni ob nakupu harfe s pedali.
    harvest_method:
      name: Način žetve
      description: Označuje, ali so bili morski sadeži ulovljeni v divjini, gojeni
        ali pridobljeni na drug način.
    harvest_stage:
      name: Stopnja žetve
      description: Navaja stopnjo rasti, pri kateri je bila rukola obrana, kot je
        mikrozelenjava, mlado listje ali zrel šop.
    hat_style:
      name: Stil pokrivala
      description: Konstrukcija/stil prazničnega klobuka (npr. stožčast klobuk, krona,
        cilinder, vizir), ki odraža, kako izdelek v osnovi izgleda.
    hazard_signal_mode:
      name: Način varnostnega signaliziranja
      description: Izbira svetlobnih vzorcev/načinov za LED/elektronske cestne opozorilne
        luči.
    head_configuration:
      name: Konfiguracija glave
      description: Navaja, ali ima glava cepina lopatko, kladivo, oboje ali ničesar,
        kar neposredno vpliva na funkcionalnost na ledu in mešanem terenu.
    head_material:
      name: Material glave
      description: Material igralne opne, ki je priložena bobnu quinto.
    head_movement_type:
      name: Vrsta gibanja glave
      description: Zmogljivost usmerjenega premikanja glave dvonožnega stojala ali
        palice (npr. vodoravno, nagib, prečni nagib).
    head_side:
      name: Stran opne
      description: Navaja, ali je opna za boben namenjena udarni strani, resonančni
        (sprednji) strani ali obema.
    head_weight_style:
      name: Stil teže glave
      description: Opredeljuje konfiguracijo teže na glavi umetne muhe, kar vpliva
        na hitrost potapljanja in predstavitev.
    headband_embellishment:
      name: Okras naglavnega traku
      description: Opredeljuje dekorativne elemente, pritrjene na naglavni trak (npr.
        pentlje, biseri, kristali, živalska ušesa).
    headboard_style:
      name: Slog vzglavja
      description: Opisuje zasnovo ali stil izdelave vzglavja, ki je priloženo postelji.
    headgear_strap_configuration:
      name: Konfiguracija trakov zaščitne čelade/pokrivala
      description: Označuje število trakov, ki se uporabljajo za pritrditev rokoborske
        zaščitne čelade.
    headjoint_crown_style:
      name: Stil kapice glave flavte
      description: Navaja stil ali zasnovo kapice glave flavte (končnega pokrovčka),
        kar lahko vpliva na estetiko in težo/ravnovesje.
    headjoint_pitch_standard:
      name: Standard uglasitve glave flavte
      description: Označuje standard uglasitve zasnove glave flavte (npr. A=440 nasproti
        A=442).
    headliner_product_form:
      name: Oblika izdelka za stropno oblogo
      description: Navaja, ali je izdelek celoten ulit sklop stropne obloge, nadomestno
        blago ali komponenta za popravilo/obrobo.
    headrest_mount_attachment_method:
      name: Način pritrditve nosilca naslona za glavo
      description: Navaja, kako se nosilec pritrdi na palice naslona za glavo/sedeža.
    headrest_provision:
      name: Nastavek za naslon za glavo
      description: Označuje, ali so nasloni za glavo vključeni in/ali ali so prisotne
        montažne točke za naslon za glavo.
    headset_standard:
      name: Standard krmilnega ležaja
      description: Vrsta vmesnika krmilne cevi/krmilnega ležaja, ki ga uporablja okvir.
    headstall_style:
      name: Stil naglavnega dela oglavnika
      description: Razvršča strukturno zasnovo ali konfiguracijo ušesnega/čelnega
        dela naglavnega dela oglavnika.
    headwear_intended_use:
      name: Predviden namen uporabe pokrivala
      description: Označuje primarni namen ali kontekst nošenja turbana (npr. izguba
        las zaradi kemoterapije, plavanje, religiozni razlogi).
    hearing_enhancer_style:
      name: Slog ojačevalca sluha
      description: Opisuje splošno obliko naprave, da lahko uporabniki izbirajo med
        naušesnimi modelimi, modelimi za v uho, modelimi za namestitev za glavo in
        drugimi modeli.
    heart_rate_monitoring_method:
      name: Način spremljanja srčnega utripa
      description: Opredeljuje, kako naprava zajema podatke o srčnem utripu med vadbo.
    heart_rate_sensing_technology:
      name: Tehnologija zaznavanja srčnega utripa
      description: Navaja fiziološko metodo merjenja, ki jo merilnik uporablja za
        zaznavanje srčnega utripa (npr. električni EKG nasproti optičnemu PPG).
    heart_rate_sensor_placement:
      name: Namestitev senzorja srčnega utripa
      description: Označuje, kje se senzor nosi ali kje je nameščen (na telesu ali
        kolesu), kar vpliva na udobje in natančnost meritve.
    heat_retention_technology:
      name: Tehnologija zadrževanja toplote
      description: Opisuje katero koli tehnologijo, premaz ali material, ki povečuje
        potenje ali toplotno aktivnost pri steznikih za vadbo (npr. neoprenski učinek
        savne).
    heated_glass_feature:
      name: Funkcija ogrevanega stekla
      description: Označuje, ali okensko steklo vključuje integrirane električne elemente,
        kot sta mreža za odmrzovanje zadnjega stekla in/ali v steklo vgrajena antena.
    heater_control_actuation_method:
      name: Način aktiviranja upravljanja grelnika
      description: Navaja, kako upravljanje grelnika/HVAC sistema aktivira enoto HVAC
        v vozilu (npr. aktivacija preko pletenice/kabla, vakuumsko aktiviranje ali
        elektronsko signaliziranje).
    heater_control_electrical_connector_type:
      name: Vrsta električnega priključka upravljanja grelnika
      description: Navaja stil/vmesnik električnega priključka, ki ga uporablja sklop
        za upravljanje grelnika (npr. pletenica nasproti klasičnemu vtiču).
    heating_technology:
      name: Tehnologija ogrevanja
      description: Opredeljuje glavni mehanizem ogrevanja, ki ga uparjalnik uporablja
        za pretvorbo materiala v paro.
    heel_shape:
      name: Oblika pete
      description: Navaja geometrijski stil ali silhueto same pete, kar kupcem pomaga
        filtrirati po strukturnem videzu in želenem udobju/stabilnosti (npr. tanka
        peta nasproti blok peti).
    helicopter_mission_type:
      name: Vrsta misije s helikopterjem
      description: Glavni predvideni namen uporabe/vloga helikopterja.
    helicopter_rotor_configuration:
      name: Konfiguracija rotorjev helikopterja
      description: Navaja razporeditev sistema rotorjev helikopterja (razporeditev
        glavnega in repnega rotorja), kot so enojni glavni + repni rotor, koaksialni,
        tandem ali prekrižani rotorji.
    helmet_accessory_type:
      name: Vrsta dodatka za čelado
      description: Opredeljuje specifično vrsto dela ali dodatka za kolesarsko čelado,
        da lahko kupci takoj najdejo pravi izdelek.
    helmet_audio_connector_type:
      name: Vrsta avdio priključka za čelado
      description: Navaja vrsto avdio priključka zračnega plovila, ki ga uporablja
        komunikacijski vod na čeladi, če je prisoten.
    helmet_communication_system_readiness:
      name: Pripravljenost čelade za komunikacijski sistem
      description: Ali je čelada zasnovana za namestitev domofona oziroma komunikacijskega
        sistema Bluetooth.
    helmet_construction_type:
      name: Vrsta izdelave čelade
      description: Opisuje stil izdelave školjke in obloge čelade (npr. pena, trda
        školjka, hibrid).
    helmet_fit_head_shape:
      name: Prileganje čelade (oblika glave)
      description: Notranji profil prileganja, predviden za različne oblike glav.
    helmet_interior_liner_type:
      name: Vrsta notranje obloge čelade
      description: Vrsta udobne obloge in ali je odstranljiva/pralna.
    helmet_liner_material:
      name: Material obloge čelade
      description: Navaja material notranje obloge ali blazinjenja, ki zagotavlja
        udobje in ublažitev udarcev.
    helmet_retention_closure_type:
      name: Vrsta zapenjanja sistema za pritrditev čelade
      description: Navaja mehanizem za zapenjanje/pritrditev podbradnega traku čelade
        (npr. dvojni D-obroček, mikrometrična zaponka).
    helmet_safety_certification:
      name: Varnostni certifikat čelade
      description: Navaja varnostne standarde ali certifikate, ki jih čelada izpolnjuje.
    helmet_safety_certification_standard:
      name: Standard za certificiranje na področju varnosti za čelade
      description: Varnostni/homologacijski standardi, za izpolnjevanje katerih je
        motoristična čelada certificirana.
    helmet_shell_material:
      name: Material školjke čelade
      description: Primarni material ali konstrukcija zunanje lupine, uporabljena
        za čelado.
    helmet_size_system:
      name: Glavni material ali zgradba zunanje školjke, uporabljena za čelado.
      description: Sistem velikosti, ki se uporablja za izražanje velikosti čelade.
    helmet_sun_visor_type:
      name: Vrsta sončnega vizirja čelade
      description: Navaja, ali čelada vključuje notranji dvižni sončni vizir, zatemnjen
        zunanji vizir, oboje ali ničesar.
    helmet_vehicle_fit:
      name: Prileganje čelade v vozilu
      description: Vrsta vozila/načina vožnje, za katerega je čelada predvidena.
    helmet_ventilation_adjustability:
      name: Nastavljivost prezračevanja čelade
      description: Navaja, kako lahko voznik upravlja prezračevanje čelade.
    helmet_ventilation_configuration:
      name: Konfiguracija prezračevanja čelade
      description: Opisuje razporeditev in nastavljivost prezračevanja čelade (npr.
        bradni zračnik, čelni/vhodni zračniki, zaprljivi zračniki).
    helmet_visor_peak_adjustability:
      name: Nastavljivost vizirja/senčnika čelade
      description: Ali je terenski vizir/ščitnik čelade nastavljiv in/ali odstranljiv.
    helmet_visor_shield_optical_features:
      name: Optične lastnosti vizirja (zaščite) čelade
      description: Optične lastnosti in značilnosti združljivosti glavnega zaščitnega
        vizirja.
    helmet_visor_shield_type:
      name: Vrsta vizirja/zaščite za čelado
      description: Glavna konfiguracija zaščitnega vizirja, ki je priložen čeladi.
    hem_style:
      name: Stil spodnjega roba
      description: Opredeljuje stil zaključka odprtine za nogo – kot je gladek, zavihan
        ali neobdelan – kar močno vpliva na videz oblačila.
    hemisphere_compatibility:
      name: Združljivost s poloblo (hemisfero)
      description: Navaja, za katero poloblo je karta zvezd zasnovana na podlagi vidnih
        ozvezdij.
    hemline_style:
      name: Stil linije spodnjega roba
      description: Določa kroj ali zasnovo spodnjega roba obleke.
    herbal_infusion_function:
      name: Funkcija zeliščnega poparka (čaja)
      description: Označuje primarno dobrobit za počutje ali funkcionalno korist,
        za katero se poparek trži.
    hex_size:
      name: Velikost imbusa (šestkotnika)
      description: Velikost šestkotnika (imbusa) ključa, ki je potrebna za namestitev/odstranitev
        žarilne svečke.
    hi_hat_pair_type:
      name: Vrsta para činel hi-hat
      description: Označuje, ali gre pri ponudbi za ujemajoč se par zgornje/spodnje
        činele ali za posamezno komponento činele.
    hi_hat_sound_character:
      name: Zvočni značaj hi-hat činele
      description: Opisuje splošni zvočni profil, kar kupcem pomaga filtrirati po
        zvoku, ki ga želijo.
    high_visibility_class:
      name: Razred visoke vidljivosti
      description: Navaja raven klasifikacije vidljivosti oblačila po standardu ANSI/ISEA
        107.
    highback_style:
      name: Stil hrbtišča
      description: Opisuje strukturni stil/zasnovo hrbtišča, kar vpliva na vozne lastnosti.
    hitch_ball_diameter:
      name: Premer vlečne krogle
      description: Premer glave vlečne krogle (sfere), ki se spaja s priklopom prikolice
        (npr. 1 7/8 palca, 2 palca, 2 5/16 palca, 50 mm).
    hitch_ball_mounting_style:
      name: Stil montaže vlečne krogle
      description: Ali je vlečna krogla standardna krogla z montažo na matico, fiksni/stisnjeni
        model za določene vlečne glave ali pa vključuje integrirano strojno opremo.
    hobby_horse_handle_type:
      name: Vrsta ročaja lesene igrače konjička
      description: Navaja zgradbo oprijema/ročaja, ki se uporablja za držanje ali
        usmerjanje konjička na palici.
    hobby_horse_sound_features:
      name: Zvočne funkcije lesene igrače konjička
      description: Označuje, ali leseni konjiček na palici vključuje zvočne učinke
        in kakšne vrste.
    hockey_goal_type:
      name: Vrsta hokejskega gola
      description: Navaja stil ali predvideni primer uporabe hokejskega gola (npr.
        uradni za led, ulični, mini).
    hockey_size_category:
      name: Kategorija velikosti za hokej
      description: Označuje standardizirani segment velikosti opreme, ki ji del ustreza
        (otroški, mladinski, vmesni, članski).
    hockey_size_segment:
      name: Segment velikosti za hokej
      description: Navaja standardizirani segment velikosti hokejske opreme, ki določa
        splošne dimenzije in prileganje ščitnikov.
    hold_surface_texture:
      name: Tekstura površine za oprijem
      description: Opisuje hrapavost ali taktilno obdelavo oprijemalne površine oprimka.
    home_decor_sewing_pattern_project_type:
      name: Vrsta projekta šivalnega kroja za dom
      description: Opredeljuje vrsto dekorativnega predmeta za dom, ki ga šivalni
        kroj ustvari (npr. prevleka za vzglavnik, zavesa, namizni tekač).
    homologation_rule_set:
      name: Homologacija/sklop pravil
      description: Navaja krovno organizacijo ali sklop pravil, s katerimi je avtomobil
        usklajen (kjer je to primerno).
    honey_form:
      name: Oblika medu
      description: Navaja fizično obliko ali predstavitev izdelka iz medu.
    honey_processing_method:
      name: Način predelave medu
      description: Označuje, kako je bil med obdelan ali predelan pred pakiranjem.
    honey_variety:
      name: Sorta medu
      description: Opredeljuje botanični ali cvetlični vir medu – enocvetni ali veccvetni
        – kar neposredno vpliva na okus, barvo in ceno.
    hood_configuration:
      name: Konfiguracija kapuce
      description: Opisuje zasnovo kapuce in lastnosti njene nastavljivosti.
    hood_design:
      name: Zasnova kapuce
      description: Določa prisotnost in stil kapuce na oblačilu.
    hood_style:
      name: Stil kapuce
      description: Označuje prisotnost in stil kapuce na oblačilu.
    hood_type:
      name: Vrsta kapuce
      description: Označuje posebne oblikovne značilnosti dela oblačila s kapuco.
    hook_and_eye_size_hook_number:
      name: Velikost kovinske zanke in stisne (številka kovinske zanke)
      description: Standardizirana velikost/številčenje zank in stisen (kjer je primerno),
        uporabljeno na embalaži za prikaz splošne velikosti kljukice/zanke.
    hook_and_loop_fastener_duty_rating:
      name: Razred obremenitve sprijemalnega traku (ježka)
      description: Označuje predvideno stopnjo trdnosti/obremenitve sprijemalnega
        traku (ježka
    hook_and_loop_fastener_format:
      name: Format sprijemalnega traku (ježka)
      description: Navaja fizično obliko ali format pakiranja izdelka s sprijemalnim
        trakom (npr. rola/trak, pike, trakovi).
    hook_and_loop_fastener_side:
      name: Stran sprijemalnega traku
      description: Navaja, ali izdelek vključuje samo grobo stran (kavlje), samo mehko
        stran (zanke) ali komplet, ki vsebuje obe strani.
    hook_coating_finish:
      name: Premaz/obdelava trnka
      description: Površinska obdelava ali premaz, nanesen na trnek za odpornost proti
        koroziji, neopaznost ali barvo (npr. črni nikelj, svetleči kositer).
    hook_configuration:
      name: Konfiguracija trnka
      description: Opisuje prisotnost in stil trnkov, ki so priloženi vabi.
    hook_eye_style:
      name: Stil ušesca trnka
      description: Navaja obliko ali usmerjenost ušesca trnka, kar vpliva na to, kako
        se trnek priveže ali pritrdi.
    hook_eye_type:
      name: Vrsta ušesca trnka
      description: Navaja zasnovo ušesca trnka, kar vpliva na izbiro vozla in namestitev
    hook_loop_format:
      name: Format sprijemalnega traku (ježka)
      description: Navaja fizično obliko sprijemalnega traku (ježka).
    hook_loop_side:
      name: Stran sprijemalnega traku
      description: Navaja, ali je izdelek groba stran, mehka stran ali ujemajoč se
        komplet sprijemalnega traku.
    hook_material:
      name: Material trnka
      description: Opredeljuje material, uporabljen specifično za kljuko ribiške ostriži,
        kar je ključni dejavnik za trdnost in odpornost proti koroziji pri uporabi
        v slani vodi.
    hook_organizer_style:
      name: Stil organizatorja trnkov
      description: Fizični stil ali oblika organizatorja trnkov (na primer kovček,
        rola ali torbica), ki se uporablja za podporo brskanja in filtriranja po vrsti
        organizatorja.
    hook_point_configuration:
      name: Konfiguracija konice trnka
      description: Navaja, ali ima trnek dve konici (dvojni) ali tri konice (trojni).
    hook_point_type:
      name: Vrsta konice trnka
      description: Opisuje brušenje ali obliko konice ribiškega trnka, kar vpliva
        na prebadanje in sposobnost zadrževanja.
    hook_shank_length:
      name: Dolžina stebla trnka
      description: Označuje klasifikacijo relativne dolžine stebla trnka (npr. kratko,
        dolgo) za hitro vizualno in funkcionalno primerjavo.
    hooks_eyes_attachment_method:
      name: Način pritrditve zank in stisen (kljukic)
      description: Kako so zanke in stisne pritrjene na oblačilo ali projekt.
    hop_up_type:
      name: Vrsta hop-up sistema
      description: Določa hop-up sistem, ki se uporablja za ustvarjanje vzvratne rotacije
        na kroglicah za večji domet in natančnost.
    horse_blanket_type:
      name: Vrsta konjske odeje
      description: Navaja primarni stil ali predvideni namen uporabe konjske odeje
        ali pregrinjala.
    horse_brush_type:
      name: Vrsta krtače za konje
      description: Razvršča krtačo po njenem specifičnem stilu nege ali predvidenem
        namenu, kar strankam omogoča filtriranje brez drobljenja hierarhije kategorij.
    horse_care_purpose:
      name: Namen nege konj
      description: Primarni funkcionalni namen izdelka znotraj nege konj, ki obsega
        zdravstvene potrebe, nego in oskrbo.
    horse_feed_stage:
      name: Stopnja krmljenja konja
      description: Označuje življenjsko obdobje ali fiziološki status konja, za katerega
        je krma pripravljena.
    horse_groomer_type:
      name: Vrsta pripomočka za nego konj.
      description: Razvršča stil pripomočka za nego, da lahko kupci hitro najdejo
        specifično orodje, ki ga potrebujejo.
    horse_leg_protection_type:
      name: Vrsta zaščite za konjske noge
      description: Razvršča specifičen stil ali funkcijo konjskega ščitnika, ovitka
        ali povoja.
    horse_model_breed:
      name: Pasma modela konja
      description: Navaja pasmo konja, ki jo upodablja pomanjšani model (če je primerno).
    hosiery_toe_style:
      name: Stil prstnega dela nogavic
      description: Določa izdelavo prstnega dela nogavic, kar je pomembno za vzdržljivost
        in združljivost z odprto obutvijo.
    hot_air_balloon_basket_type:
      name: Vrsta košare balona na vroč zrak
      description: Navaja primarno konfiguracijo/stil košare (npr. standardna športna,
        komercialna z veliko zmogljivostjo, predeljena, dostopna/z vrati), ki se uporablja
        za vkrcavanje in predvideno delovanje.
    hot_air_balloon_burner_type:
      name: Vrsta gorilnika balona na vroč zrak
      description: Vrsta/konfiguracija gorilnega sistema, nameščenega na balonu.
    hot_air_balloon_envelope_material:
      name: Material kupole balona na vroč zrak
      description: Glavna tkanina/material, uporabljen za kupolo balona.
    hotfix_application_tool:
      name: Orodje za nanašanje popravkov s toploto
      description: Priporočeno orodje ali toplotni vir, ki se uporablja za nanašanje
        lepljivih kamenčkov.
    hub_axle_type:
      name: Vrsta osi pesta
      description: Opredeljuje vmesnik osi/sistem zadrževanja, za katerega je pesto
        zasnovano (hitri izpenjalec, votla os itd.)
    hub_motor_type:
      name: Vrsta motorja v pestu
      description: Opisuje stil izdelave motorja v pestu (z zobniškim prenosom, z
        neposrednim pogonom, s ščetkami, brezščetni), da kupce seznani z lastnostmi
        navora, teže in učinkovitosti.
    hula_hoop_construction_type:
      name: Vrsta izdelave obroča hula hoop
      description: Opisuje, kako je obroč izdelan/sestavljen.
    hula_hoop_features:
      name: Značilnosti obroča hula hoop
      description: Izpostavlja pomembne funkcionalne ali oblikovne lastnosti obroča
        hula hoop.
    hull_design:
      name: Zasnova trupa
      description: Opisuje obliko trupa, ki vpliva na lastnosti delovanja in vodljivosti.
    hull_type:
      name: Vrsta trupa
      description: Opisuje obliko trupa, ki vpliva na delovanje in stabilnost.
    humidifier_refill_medium_type:
      name: Vrsta medija za polnjenje vlažilnika zraka
      description: Opredeljuje medij za zadrževanje vlage/polnjenje, ki ga uporablja
        vlažilnik v ohišju (kaj se zmoči ali zamenja).
    humidifier_refill_method:
      name: Način polnjenja vlažilnika zraka
      description: Opisuje, kako se vlažilnik ponovno napolni z vlago ali zamenja.
    humidifying_medium:
      name: Vlažilni medij
      description: Opredeljuje vlažilni element/medij, ki ga izdelek uporablja (kaj
        se zmoči/aktivira).
    hummus_base_ingredient:
      name: Osnovna sestavina humusa
      description: Opredeljuje glavno stročnico ali zelenjavno osnovo, uporabljeno
        za pripravo humusa.
    hunting_call_type:
      name: Vrsta lovske vabilne piščali
      description: Razvršča primarni stil delovanja ali mehanizem vabilne piščali
        (npr. ustna/na pihanje, elektronska, škatlasta), da lahko lovci hitro izberejo
        format, ki najbolj ustreza njihovim potrebam in ravni znanja.
    hunting_dog_collar_function:
      name: Funkcija ovratnice za lovske pse
      description: Razvršča primarni funkcionalni stil ali namen ovratnice, kar kupcem
        pomaga filtrirati izdelke za funkcije, kot so sledenje, trening, vidljivost
        ali običajna uporaba.
    hvac_control_functions:
      name: Nadzorne funkcije HVAC (gretje, prezračevanje, hlajenje)
      description: Označuje, katere funkcije ogrevanja, prezračevanja in hlajenja
        (HVAC)/odmrzovanja/pretoka zraka upravlja enota (mehansko ali elektronsko).
    hybrid_drivetrain_configuration:
      name: Konfiguracija hibridnega pogonskega sklopa
      description: Označuje arhitekturo sistema priključnega hibrida (PHEV), ki opisuje,
        kako elektromotor(ji) in motor z notranjim izgorevanjem zagotavljajo pogon.
    hybrid_system_type:
      name: Vrsta hibridnega sistema
      description: Razvršča arhitekturo hibridizacije, ki jo uporablja vozilo.
    hybrid_truck_cab_type:
      name: Vrsta kabine hibridnega tovornjaka
      description: Navaja konfiguracijo kabine tovornjaka, kar vpliva na število sedežev
        in notranji prostor.
    hydration_bag_features:
      name: Lastnosti hidracijske torbe
      description: Izpostavlja pomembne oblikovne ali funkcionalne lastnosti, specifične
        za hidracijske nahrbtnike/torbe.
    hydration_belt_features:
      name: Lastnosti hidracijskega pasu
      description: Navaja pomembne vgrajene lastnosti, ki izboljšujejo uporabnost,
        varnost ali priročnost hidracijskega pasu.
    hydration_bladder_compatibility:
      name: Združljivost s hidracijskim mehom
      description: Označuje, ali telovnik vključuje hidracijski meh oziroma podpira
        njegov sistem.
    hydration_mouthpiece_style:
      name: Stil ustnika za hidracijo
      description: Navaja zasnovo ali funkcionalni stil ustnika oziroma ventila hidracijskega
        sistema, kar kupcem pomaga izbrati želeni način pitja in zagotoviti združljivost.
    hydration_pack_style:
      name: Stil hidracijskega nahrbtnika
      description: Navaja strukturni stil hidracijskega kompleta, kot je nahrbtnik
        ali telovnik, za lažje filtriranje glede na prileganje in primer uporabe.
    hydration_system_insulation:
      name: Izolacija hidracijskega sistema
      description: Označuje, ali sta meh in/ali cevka za pitje izolirana, kar pomaga
        ohranjati temperaturo tekočine v vročih ali hladnih razmerah
    hydration_valve_type:
      name: Vrsta hidracijskega ventila
      description: Opredeljuje stil ventila za pitje ali ustnika, priloženega sistemu
        ali plastenki, kar zajema običajne modele na ugriz in šobe z visokim pretokom.
    hydraulic_fluid_type:
      name: Vrsta hidravlične tekočine
      description: Navaja vrsto zavorne tekočine, za uporabo katere je zasnovana ročica
        hidravlične zavorne kolesa. Te informacije so ključne za vzdrževanje in varnost.
    hydrogenation_level:
      name: Stopnja hidrogenacije
      description: Označuje, ali je maščoba nehidrogenirana, delno hidrogenirana ali
        popolnoma hidrogenirana, kar vpliva na vsebnost transmaščob in lastnosti pri
        peki.
    hydrophobicity_level:
      name: Stopnja hidrofobnosti
      description: Označuje stopnjo učinkovitosti odbijanja vode (ustvarjanje kapljic
        ali odtekanje v plasti), ki jo izdelek oglašuje.
    ice_cream_format:
      name: Oblika sladoleda
      description: Opisuje fizično obliko ali predstavitev sladolednega izdelka (npr.
        lonček, lučka, moči).
    ice_skate_sharpener_type:
      name: Vrsta brusilnika za drsalke
      description: Razvršča splošno zasnovo ali format brusilnika (ročni brusni kamen,
        električni stroj, šablona/jig itd.).
    ice_temperature_suitability:
      name: Primernost glede na temperaturo ledu
      description: Označuje temperaturno območje ledu, za katerega je vosek za hokejske
        palice zasnovan, kar vpliva na delovanje in lastnosti odbijanja snega.
    icing_sugar_variety:
      name: Sorta sladkorja v prahu
      description: Razvršča sestavo ali funkcionalno vrsto sladkorja v prahu (npr.
        fondant, sladkor v prahu, ki se ne topi, barvni, aromatizirani).
    ignition_coil_configuration:
      name: Konfiguracija vžigalne tuljave
      description: Navaja obliko vžigalne tuljave (posamezna tuljava/tuljava na svečki,
        večizhodni blok tuljav glede na število valjev, vžigalna letev/kaseta ali
        model z razdelilnikom vžiga).
    ignition_lead_compliance_standard:
      name: Standard skladnosti vžigalnega kabla
      description: Uradni industrijski standard ali certifikat, ki ga vžigalni kabel
        (ali kabli) izpolnjuje v skladu s trditvami proizvajalca (npr. SAE J2031,
        ISO 3808).
    ignition_lead_insulation_material:
      name: Izolacijski material vžigalnega kabla
      description: Glavni izolacijski material oziroma material plašča, uporabljen
        na vžigalnem kablu (zunanja izolacija kabla).
    ignition_lead_set_type:
      name: Vrsta kompleta vžigalnih kablov
      description: Ali je izdelek posamezen vžigalni kabel ali celoten komplet ter
        komu oziroma čemu je komplet namenjen.
    ignition_lead_terminal_type:
      name: Vrsta priključka vžigalnega kabla
      description: Stil priključka/konektorja, uporabljenega na koncih vžigalnega
        kabla (npr. priključek za vžigalno svečko in stil priključka za tuljavo/razdelilnik
        vžiga).
    illumination_type:
      name: Vrsta osvetlitve
      description: Navaja, ali je žoga osvetljena za nočno igro in kako (npr. fosforni
        sijaj, LED lučka, ki se aktivira ob udarcu).
    immobilizer_installation_type:
      name: Vrsta namestitve blokade motorja
      description: Označuje, kako je blokada motorja (imobilizator) nameščena ali
        povezana z vozilom.
    immobilizer_unlock_method:
      name: Način odklenitve blokade motorja
      description: Navaja, kako se blokada motorja (imobilizator) vklopi/izklopi ali
        odklene.
    impact_protection_certifications:
      name: Certifikati za zaščito pred udarci
      description: Navaja specifične varnostne standarde, ki jih zaščitni ščitnik
        izpolnjuje ali presega.
    impact_protection_level:
      name: Stopnja zaščite pred udarci
      description: Navaja raven zaščite pred udarci ali tehnologijo, ki jo ponuja
        športna zaščitna košarica.
    impact_protection_rating:
      name: Ocena zaščite pred udarci
      description: Navaja certificirano raven zaščite pred udarci v skladu s standardi
        (npr. EN 1621-1 raven 1, EN 14120 raven 2), kar voznikom pomaga filtrirati
        zaščito višjega razreda.
    impact_surface_material:
      name: Material udarne površine
      description: Opisuje glavni material udarne površine oziroma površine za ublažitev
        udarcev za varnost in občutek (npr. pena, plastika).
    incense_base_material:
      name: Osnovni material za kadilo
      description: Glavni osnovni material oziroma vezivo, uporabljeno za izdelavo
        kadila (praškasta osnova) v kompletu.
    incense_making_method:
      name: Metoda izdelave kadila
      description: Predvideni ustvarjalni postopek, ki ga komplet podpira.
    incense_tool_type:
      name: Vrsta orodja za kadilo
      description: Navaja, kakšne vrste orodje za izdelavo kadil je ta izdelek (uporablja
        se za oblikovanje, merjenje, stiskanje, mešanje ali sušenje kadila).
    incline_adjustment_type:
      name: Vrsta nastavljanja naklona
      description: Opisuje, kako (ali če sploh) se naklon lahko spreminja med vadbo.
    included_accessories:
      name: Vključeni dodatki
      description: Navaja vključene dodatke, kot so rezervne glave/nastavki, kovček
        za shranjevanje, polnilni kabel ali napajalnik.
    included_case_type:
      name: Vrsta vključene torbice
      description: Vrsta kovčka za prenašanje/shranjevanje, ki je priložen bas saksofonu
        (če je prisoten).
    included_components:
      name: Vključene komponente
      description: Navaja, kaj je vključeno v paket (koristno za komplete orodij in
        pakete več izdelkov).
    included_fastener_components:
      name: Vključene komponente pritrdilnih elementov
      description: Navaja, ali je izdelek komplet zank in stisen (kljukic), samo kljukice,
        samo zanke ali sorodna različica zapenjanja oblačil.
    included_hydration_vessel_type:
      name: Vrsta vključene hidracijske posode
      description: Opredeljuje stil hidracijske posode, ki je priložena pasu ali jo
        ta podpira.
    included_items_woodwind_instrument:
      name: Vključeni predmeti (pihalo)
      description: Navaja, kateri običajno priloženi predmeti so vključeni v paket
        z bas saksofonom.
    included_materials:
      name: Vključeni materiali
      description: Označuje, katere komponente so vključene ob nakupu kroja (samo
        kroj nasproti kroju z materiali).
    included_mounting_accessories:
      name: Vključeni dodatki za montažo
      description: Navaja, kateri dodatki za montažo/pritrditev so priloženi h konferenčnemu
        zvočniku.
    included_pump_type:
      name: Vrsta vključene tlačilke
      description: Opredeljuje vrsto tlačilke, ki je priložena napihljivi postelji
        ali integrirana vanjo.
    included_scraper_implement_type:
      name: Vrsta priloženega pripomočka za strganje
      description: Označuje, kateri pripomoček oziroma pripomočki za igranje so priloženi
        glasbenemu strgalu (npr. palčka za strganje, žičnata krtačka).
    indicator_design:
      name: Zasnova indikatorja
      description: Razvršča fizično obliko ali stil ribiškega indikatorja ugriza.
    indicator_functions_tracked:
      name: Spremljane funkcije indikatorja
      description: Navaja specifične športne metrike, ki jih indikator spremlja, kot
        so žoge, udarci, outi, menjave, število metov, vratca, rezultat ali poskusi.
    indoor_outdoor_use:
      name: Uporaba v zaprtih prostorih/na prostem
      description: Označuje, ali je igrača za kegljanje namenjena uporabi v zaprtih
        prostorih, na prostem ali oboje.
    inflatable_decoration_items_included:
      name: Vključeni predmeti napihljive dekoracije
      description: Navaja ključne dodatke, ki so priloženi napihljivi dekoraciji (npr.
        ventilator za napihovanje, klini, pritrdilne vrvi).
    inflatable_decoration_type:
      name: Vrsta napihljive dekoracije
      description: Navaja vrsto napihljive praznične dekoracije (obliko) za lažje
        brskanje in filtriranje.
    inflatable_raft_float_features:
      name: Lastnosti napihljivega splava / obroča
      description: Funkcionalne lastnosti, prisotne na napihljivem splavu ali plovilu/obroču
    inflation_method_included:
      name: Vključen način napihovanja
      description: Navaja vrsto rešitve za napihovanje pnevmatik, ki je vključena
        v komplet za popravilo, če je prisotna.
    infused_scent:
      name: Vgrajen vonj/aroma
      description: Opredeljuje dišavne ali aromatične dodatke, s katerimi je prepojen
        material vabe.
    ingredient_base_type:
      name: Vrsta osnove sestavin
      description: Opredeljuje glavno osnovo, zagotovljeno za fermentacijo (npr. koncentrat
        grozdnega soka nasproti svežemu soku nasproti sadnemu koncentratu).
    ingredient_physical_form:
      name: Fizična oblika sestavine
      description: Navaja fizično obliko, v kateri je dobavljena sestavina dišave
        (uporablja se za rokovanje, merjenje in pripravo formule).
    ingredient_processing_method:
      name: Način predelave sestavin
      description: Navaja primarno tehniko predelave, uporabljeno za sestavino (npr.
        liofilizirano/sušeno z zamrzovanjem, praženo, fermentirano).
    ink_colors_included:
      name: Vključene barve črnila
      description: Navaja barve črnila, ki so vključene v blazinici oziroma blazinicah
        za štampiljke v kompletu
    ink_pad_application_method:
      name: Način uporabe blazinice za štampiljke
      description: Kako se črnilo nanaša/uporablja iz blazinice (klasična blazinica
        za štampiljke nasproti gobici za nanos nasproti blazinici s čopičem).
    ink_pad_permanence:
      name: Obstojnost blazinice za štampiljke
      description: Ali je odtisnjeno črnilo obstojno in/ali arhivsko (odpornost proti
        bledenju in vodi, ko se posuši).
    ink_pad_size:
      name: Velikost blazinice za štampiljke
      description: Standardizirana velikost/oblika površine ali ohišja blazinice za
        štampiljke.
    ink_pad_special_effects:
      name: Posebni učinki blazinice za štampiljke
      description: Posebni vizualni/funkcionalni učinki črnila pri odtiskovanju (npr.
        kovinski, bleščice).
    ink_permanence:
      name: Obstojnost črnila
      description: Označuje, ali je posušeno sumi črnilo predvideno kot obstojno/arhivsko
        nasproti pralnemu/neobstojnemu.
    ink_preparation_required:
      name: Potrebna je priprava črnila
      description: Označuje, ali je sumi črnilo pripravljeno za uporabo ali pa pred
        uporabo zahteva redčenje z vodo oziroma mletje.
    inline_skate_brake_type:
      name: Vrsta zavore za rolerje
      description: Navaja konfiguracijo zavore, vključene pri rolarjih, kot je odstranljiva
        petna zavora ali različica brez zavore.
    inner_tent_configuration:
      name: Konfiguracija notranjega šotora
      description: Navaja konfiguracijo ali stil notranjega šotora, na primer celotni
        vložek, mrežasti vložek ali toplotna podloga.
    innerspring_coil_type:
      name: Vrsta vzmeti znotraj vzmetnice
      description: Navaja stil izdelave sistema notranjih vzmeti znotraj vzmetnice,
        kar vpliva na podporo, izolacijo gibanja in ceno.
    input_connector_type:
      name: Vrsta vhodnega priključka
      description: Navaja vrsto avdio vhodnega priključka, ki ga uporablja pedal (običajno
        1/4-palčni TS).
    input_valve_type:
      name: Vrsta vhodnega ventila
      description: Označuje standard ventila na kolesarski zračnici/obroču, od katerega
        adapter vzpostavlja povezavo.
    insecticide_treatment:
      name: Obdelava z insekticidom
      description: Označuje, ali je bila mreža tovarniško obdelana z insekticidom
        in, če je bila, navaja vrsto obdelave, uporabljeno za dodatno zaščito.
    insert_coverage_area:
      name: Območje pokritosti vložka
      description: Navaja, kateri del stopala je vložek zasnovan pokriti (npr. celotna
        dolžina, samo peta).
    insert_length_type:
      name: Vrsta dolžine vložka
      description: Označuje, kolikšen del ležišča stopala pokriva opora za stopalni
        lok.
    inside_message_type:
      name: Vrsta notranjega sporočila
      description: Označuje, ali čestitka vključuje vnaprej natisnjeno sporočilo na
        notranji strani in ali jo je mogoče prilagoditi.
    insole_attachment_method:
      name: Način pritrditve vložka
      description: Navaja, kako opora za stopalni lok ostane na mestu znotraj čevlja
        (prosto vstavljiva, s samolepilno hrbtno stranjo, s sprijemalnim trakom/ježkom
        itd.).
    insole_material:
      name: Material vložka
      description: Opisuje material ležišča stopala ali notranjega vložka, na katerem
        počiva stopalo, kar vpliva na blazinjenje in podporo.
    installation_fabrication_level:
      name: Stopnja predelave za namestitev
      description: Označuje običajno količino prilagojene predelave ali modifikacije,
        ki je potrebna za namestitev kompleta.
    installation_location:
      name: Mesto namestitve
      description: Navaja običajno mesto namestitve senzorja tlaka olja v motornem
        oljnem sistemu (npr. odprtina oljnega kanala na bloku, ohišje filtra, vmesna/sendvič
        plošča ali montaža na ločeno cev).
    installation_method:
      name: Način namestitve
      description: Navaja, kako se podloga ali plošča pritrdi oziroma namesti na tla.
    instant_coffee_form:
      name: Oblika instant kave
      description: Opisuje fizično obliko, v kateri je dobavljena instant kava, kar
        vpliva na način priprave in rok uporabnosti.
    instep_coverage:
      name: Pokritost narta
      description: Navaja, ali izdelek ščiti le piščal ali tako piščal kot nart/stopalo.
    instruction_format:
      name: Oblika navodil
      description: Oblika navodil, priloženih kompletu.
    instrument_cleaning_swab_form_factor:
      name: Oblika krpice za čiščenje instrumentov
      description: Navaja fizični stil krpice (npr. vlečna krpa nasproti sistemu s
        palico/krtačo), da ustreza željam glasbenika in omejitvam instrumenta.
    instrument_dimensions_unit_context:
      name: Kontekst enote za dimenzije instrumenta
      description: Razjasnjuje, na kaj se nanašajo navedene mere višine/širine/dolžine
        (npr. celotni instrument, dolžina posamezne cevi, višina stojala).
    instrument_electronics_type:
      name: Vrsta elektronike instrumenta
      description: Označuje, ali je sistem odjemnikov zvoka/predojačevalnika instrumenta
        aktiven ali pasiven.
    instrument_key:
      name: Uglasitev instrumenta
      description: Navaja oznako uglasitve kljunaste flavte, uporabljeno v katalogih
        (običajno C ali F za večje kljunaste flavte).
    instrument_level:
      name: Raven instrumenta
      description: Ciljna raven glasbenika za ponujeni instrument (npr. začetniški,
        profesionalni).
    instrument_part_mounting_method:
      name: Način montaže dela instrumenta
      description: Navaja, kako se del pritrdi ali namesti (npr. z objemko nasproti
        lepljenju nasproti privijanju).
    instrument_parts_included:
      name: Vključeni deli instrumenta
      description: Navaja glavne vključene komponente/dele v škatli za klarinet v
        A.
    instrument_playing_technique:
      name: Tehnika igranja na instrument
      description: Kako se na instrument običajno igra/sproži zvok (npr. s tresenjem,
        udarjanjem, ropotanjem).
    instrument_size_class:
      name: Razred velikosti instrumenta
      description: Splošna velikost instrumenta, izražena kot kupcu prijazen razred
        namesto natančnih dimenzij.
    insulation_fill_material:
      name: Material izolacijskega polnila
      description: Opredeljuje primarni material, uporabljen za izolacijo jakne ali
        telovnika.
    integrated_bottom_type:
      name: Vrsta integriranega dna
      description: Označuje, ali oblačilo vključuje vgrajene spodnjice, kratke hlače,
        dres ali podobne spodnje sloje za pokritost med gibanjem.
    integrated_charging_options:
      name: Možnosti integriranega polnjenja
      description: Navaja vgrajene napajalne ali polnilne vmesnike, ki so na voljo
        na nočni omarici.
    integrated_furniture_function:
      name: Integrirana funkcija pohištva
      description: Opredeljuje dodatne vgrajene pohištvene elemente, ki so vključeni
        v stensko posteljo ali posteljni okvir (npr. pisalna miza, zofa, police).
    integrated_locking:
      name: Integrirano zaklepanje
      description: Ali nosilec vključuje integrirano ključavnico za zaklepanje nosilca
        na vozilo in/ali kolesa na nosilec.
    integrated_power_options:
      name: Možnosti integriranega napajanja
      description: Označuje vrsto vgrajenih napajalnih ali polnilnih lastnosti, ki
        jih ponuja toaletna miza.
    integrated_storage_features:
      name: Integrirane funkcije shranjevanja
      description: Opredeljuje dodatne funkcije za shranjevanje ali dodatke, ki jih
        vključuje stojalo za biljardne palice poleg samih rež za palice.
    integrated_tool_functions:
      name: Integrirane funkcije orodja
      description: Dodatne funkcije orodja, integrirane v ročico (npr. kavelj za napere,
        ključ za ventilček, snemalec plašča).
    intended_board_type:
      name: Predvidena vrsta deske
      description: Navaja slog deske za kajtanje, za katerega je smernik zasnovan
        (npr. twin tip, usmerjena surf deska, hidrokrilo).
    intended_consumption:
      name: Predvidena način uživanja
      description: Navaja, kako je izdelek predviden za uživanje, pri čemer označuje,
        ali ga je varno uživati surovega, zahteva peko ali pa je delno pečen.
    intended_craft:
      name: Predvideno ročno delo
      description: Glavni kontekst ročnega dela, za katerega je vodilo preje zasnovano.
    intended_culinary_use:
      name: Predvidena kulinarična uporaba
      description: Označuje primarni namen kulinarične uporabe omake, kot je pomakanje,
        kuhanje ali glaziranje.
    intended_handlebar_style:
      name: Predvidena oblika krmila
      description: Opisuje predvideno obliko krmila ali primer uporabe ročice (npr.
        ravno krmilo, ukrivljeno krmilo, aero krmilo). To hitro zoži združljivost
        brez prisilnega uvajanja dodatnih podkategorij.
    intended_player_role:
      name: Predvidena vloga igralca
      description: Navaja vlogo na igrišču, za katero je naglavna oprema zasnovana
        (npr. lovilec, sodnik).
    intended_playing_surface:
      name: Predvidena igralna površina
      description: Površina, za katero je plošček, žoga ali obroč zasnovan, kot so
        led, asfalt, telovadna tla ali sintetični led.
    intended_repair_location:
      name: Predvidena lokacija popravila
      description: Kje na pnevmatiki je komplet predviden za popravilo.
    intended_seating_position:
      name: Predvideni položaj sedeža
      description: Navaja položaj sedeža v vozilu, na katerem je pas varnostnega pasu
        predviden za namestitev ali uporabo.
    intended_sewing_application:
      name: Predviden namen šivanja
      description: Predviden namen šivanja, za katerega je sukanec zasnovan (npr.
        večnamensko šivanje oblačil, prešivanje, oblazinjenje).
    intended_technique:
      name: Predvidena tehnika
      description: Glavna tehnika polstenja, za katero je podlaga zasnovana.
    intended_use:
      name: Predviden namen uporabe
      description: Glavni kontekst uporabe instrumenta.
    intended_use_fleece_fabric:
      name: Predviden namen uporabe (flis)
      description: Glavni projekt oziroma namen uporabe, za katerega se flis trži.
    intended_user:
      name: Predvideni uporabnik
      description: Označuje, komu je zaščitna oprema za letala namenjena za uporabo.
    intended_yarn_form:
      name: Predvidena oblika preje
      description: Navaja obliko predstavitve preje, ki jo skleda za prejo najbolje
        podpira.
    interaction_mode:
      name: Način interakcije
      description: Glavna metoda interakcije, ki se uporablja za sprožanje zvokov
        ali dejavnosti.
    interactive_effects:
      name: Interaktivni učinki
      description: Opredeljuje interaktivne elektronske ali mehanske učinke, ki so
        vključeni v kuhinjski igralni komplet.
    interfacing_application_area:
      name: Vmesniško območje aplikacij
      description: Področje uporabe medvloge.
    interfacing_color_family:
      name: Družina barv medvloge
      description: Označuje običajno osnovno barvo medvloge, ki se uporablja pod svetlimi
        ali temnimi tkaninami.
    interfacing_selling_format:
      name: Format prodaje medvloge
      description: Opisuje format prodaje medvloge (na primer neprekinjen izrez, ki
        se prodaja na dolžino, vnaprej narezani kosi, role ali vzorci).
    interfacing_stiffness_level:
      name: Stopnja togosti medvloge
      description: Opisuje stopnjo togosti/čvrstosti, ki jo zagotavlja medvloga.
    interior_padding_type:
      name: Vrsta notranjega blazinjenja
      description: Vrsta notranjega blazinjenja ali sistema vložkov, uporabljenega
        znotraj kovčka za zaščito in organizacijo vsebine.
    interior_stall_configuration:
      name: Konfiguracija notranjih predelov
      description: Navaja notranjo razporeditev/konfiguracijo za prevoz živali (usmerjenost
        boksov in stil predelov).
    invitation_printing_coverage:
      name: Pokritost tiskanja vabil
      description: Katera stran oziroma strani vabila so natisnjene (samo sprednja
        stran nasproti obojestranskemu tisku).
    iodization:
      name: Jodiranje
      description: Označuje, ali je sol jodirana in v kakšnem obsegu.
    iridescence_level:
      name: Stopnja iridescence
      description: Opisuje intenzivnost naravnega ali obdelanega prelivajočega se
        sijaja, značilnega za pavje pero.
    irish_warpipe_set_configuration:
      name: Konfiguracija kompleta irskih dud
      description: Označuje, katera konfiguracija se prodaja specifično za irske dude
        (celoten instrument nasproti delom/delnemu kompletu).
    iron_on_applique_application_method:
      name: Način nanašanja likalne aplikacije
      description: Navaja, kako je likalna aplikacija predvidena za nanos na podlago.
    ironing_center_features:
      name: Lastnosti likalne postaje
      description: Navaja specializirane lastnosti likalnih postaj, ki izboljšujejo
        uporabnost in priročnost.
    jacket_breast_style:
      name: Stil zapenjanja suknjiča
      description: Navaja, ali je suknjič obleke enoreden ali dvoreden.
    jacket_vent_style:
      name: Stil razporka na suknjiču
      description: Označuje vrsto razporka (odprtine) na hrbtni strani suknjiča.
    jam_and_jelly_consistency:
      name: Konsistenca džemov in marmelad
      description: Opisuje teksturo namaza, pri čemer označuje prisotnost sadnih koščkov
        ali semen.
    jaw_shape:
      name: Oblika čeljusti
      description: Geometrija čeljusti ali konice (npr. ravna, upognjena, dolga čeljust),
        kar vpliva na natančnost in doseg.
    jerky_form:
      name: Oblika sušenega mesa
      description: Opisuje fizično obliko ali kroj kosov sušenega mesa (npr. trakovi,
        palčke, grižljaji).
    jersey_style:
      name: Stil dresa
      description: Navaja obliko ali stil nošenja navijaškega dresa.
    jew_harp_accessories_included:
      name: Vključeni dodatki za dromljo
      description: Navaja vključene predmete, ki so zapakirani z dromljo (npr. kovček,
        torbica, navodila).
    jew_s_harp_frame_style:
      name: Stil okvirja dromlje
      description: Opisuje stil izdelave okvirja/trupa dromlje, kar vpliva na občutek,
        vzdržljivost in ergonomijo igranja.
    jew_s_harp_tongue_profile:
      name: Profil jezička dromlje
      description: Opisuje profil/geometrijo jezička dromlje, kar vpliva na odzivnost
        in barvo zvoka.
    jewelry_pieces_included:
      name: Vključeni kosi nakita
      description: Navaja specifične kosov nakita, ki so vključeni v komplet, da kupci
        natančno vedo, katere kose kupujejo.
    jigsaw_puzzle_piece_shape:
      name: Oblika kosov sestavljanke
      description: Splošni stil izreza/oblike kosov in profil robov.
    jockstrap_design_features:
      name: Oblikovne lastnosti suspenzorja
      description: Zajema posebne oblikovne elemente, značilne za suspenzorje, ki
        vplivajo na funkcijo ali estetiko.
    juggling_club_construction_type:
      name: Vrsta izdelave žonglerskega kaveljčka
      description: Navaja splošno vrsto izdelave žonglerskega kija (npr. enodelno
        ulit nasproti sestavljenemu iz več delov), kar lahko vpliva na vzdržljivost,
        občutek in vzdrževanje.
    juggling_club_core_material:
      name: Material jedra žonglerskega kija
      description: Glavni material jedra, uporabljen znotraj kija (ločen od zunanjega
        ovoja/traku).
    juggling_prop_set_size:
      name: Velikost kompleta žonglerskih rekvizitov
      description: Število glavnih rekvizitov, vključenih v komplet (npr. komplet
        3 žogic, par poiev).
    juggling_ring_edge_style:
      name: Stil roba žonglerskega obroča
      description: Profil roba obroča, kar vpliva na udobje in lovljenje.
    juice_form:
      name: Oblika soka
      description: Navaja fizično obliko ali stopnjo predelave izdelka (npr. običajna
        tekočina, koncentrat, prašek).
    juice_processing_method:
      name: Način predelave soka
      description: Navaja primarno tehniko predelave, uporabljeno za sok ali pijačo,
        kar vpliva na okus, ohranjanje hranilnih snovi in rok uporabnosti.
    jump_rope_style:
      name: Stil kolebnice
      description: Opredeljuje specifični kultivar ali sorto ohrovta (npr. kodrasti,
        toskanski, rdeči ruski).
    kale_variety:
      name: Sorta ohrovta
      description: Določa specifično sorto ali kultivar ohrovta (npr. kodrasti, lacinato/dinozavrski,
        rdeči ruski). To kupcem pomaga pri izbiri na podlagi okusa, teksture in kulinarične
        uporabe.
    kaleidoscope_viewing_type:
      name: Vrsta gledanja skozi kalejdoskop
      description: Opredeljuje format gledanja ali stil delovanja kalejdoskopa (npr.
        klasična cev z okularjem, telejdoskop na osnovi leč, upravljanje s kolescem,
        projekcija).
    kayak_construction_type:
      name: Vrsta izdelave kajaka
      description: Navaja primarni stil izdelave kajaka, kot sta trda školjka ali
        napihljiva različica.
    kayak_design_type:
      name: Vrsta zasnove kajaka
      description: Razvršča primarni oblikovni namen kajaka (npr. surfski, playboat,
        potovalni)
    kayak_hull_design:
      name: Zasnova trupa kajaka
      description: Opredeljuje primarno obliko trupa, kar vpliva na lastnosti vodljivosti,
        kot sta stabilnost in okretnost v razmerah s surf valovi.
    kayak_storage_bag_type:
      name: Vrsta torbe za shranjevanje kajaka
      description: Opredeljuje stil ali format torbe za shranjevanje kajakaške opreme,
        kot je vodoodporna torba ali torba za veslo.
    kayak_style:
      name: Stil kajaka
      description: Navaja primarni oblikovni stil ali stil uporabe kajaka (npr. rekreacijski,
        potovalni, napihljivi).
    keel_type:
      name: Vrsta gredlja
      description: Opredeljuje konfiguracijo gredlja jadrnice.
    kettlebell_style:
      name: Stil krogelne uteži
      description: Opredeljuje zgradbo ali različico stila krogelne uteži (npr. tekmovalna,
        nastavljiva, mehka), kar kupcem pomaga izbrati pravo utež za njihove potrebe
        pri vadbi.
    key_attachment_mechanism:
      name: Mehanizem za pritrditev ključev
      description: Navaja strojno opremo oziroma elemente, ki se uporabljajo za pritrditev
        ključev znotraj etuija, kot so obročki, sponke ali navojni sorniki.
    key_retention_when_unlocked:
      name: Zadrževanje ključa v odklenjenem položaju
      description: Označuje, ali je ključ mogoče odstraniti iz ključavnice, ko je
        ta v odklenjenem položaju.
    keyboard_amplifier_inputs:
      name: Vhodi ojačevalnika za klaviature
      description: Navaja vhodne priključke, ki jih podpira ojačevalnik za klaviature
        (npr. 1/4-palčni TRS, MIDI vhod, Bluetooth).
    keyboard_amplifier_output_types:
      name: Vrste izhodov ojačevalnika za klaviature
      description: Navaja primarne vrste izhodnih priključkov, ki jih podpira ojačevalnik
        za klaviature za usmerjanje zvoka v druge sisteme.
    keyboard_case_handle_type:
      name: Vrsta ročaja kovčka za klaviature
      description: Glavni sistem ročaja, ki se uporablja za premikanje/prenašanje
        kovčka za klaviature (poleg naramnic).
    keyboard_case_interior_padding_type:
      name: Vrsta notranjega blazinjenja kovčka za klaviature
      description: Glavni način notranjega blazinjenja/obloge, uporabljen znotraj
        trdega kovčka.
    keyboard_case_protection_level:
      name: Stopnja zaščite kovčka za klaviature
      description: Splošni razred zaščite/togosti trdega kovčka, ki razlikuje ulite
        kovčke s trdo školjko od visokozmogljivih profesionalnih potovalnih kovčkov.
    keyboard_case_wheel_type:
      name: Vrsta kolesc kovčka za klaviature
      description: Konfiguracija koles za trde kovčke, ki vključujejo kolesa.
    keyboard_pedal_connector_type:
      name: Vrsta priključka pedala za klaviature
      description: Določa vrsto vtiča/vtiča, ki se uporablja za priključitev sustain
        pedala na klaviaturo ali digitalni klavir.
    keyboard_power_supply_type:
      name: Vrsta napajanja klaviature
      description: Glavni način napajanja klaviature (baterija, napajalnik izmeničnega
        toka/AC adapter, USB-napajanje).
    keyboard_stand_tier_type:
      name: Vrsta nadgradnje stojala za klaviature
      description: Označuje, ali se stojalo prodaja le kot osnovno stojalo ali pa
        vključuje oziroma omogoča dodajanje nastavka za drugo etažo (dodatno klaviaturo).
    keyboard_stand_tiers:
      name: Nadstropja stojala za klaviature
      description: Število igralnih etaž, ki jih podpira stojalo v obliki črke Z (npr.
        enoetažno ali dvoetažno).
    keychain_attachment_type:
      name: Vrsta pritrditve obeska za ključe
      description: Navaja primarno strojno opremo (elemente) za pritrditev, ki se
        uporablja za zavarovanje obeska na ključe, torbe ali pasove.
    keychain_style:
      name: Stil obeska za ključe
      description: Opisuje splošno obliko obeska za ključe (kaj izdelek fizično je).
    keywork_finish:
      name: Površinska obdelava mehanizma s tipkami
      description: Opisuje površinsko obdelavo/premaz specifično na mehanizmu s tipkami,
        ločeno od obdelave trupa.
    kick_point:
      name: Točka upogiba
      description: Navaja lokacijo točke upogiba na ratišču hokejske palice, kar vpliva
        na hitrost izstrela ploščka in občutek.
    kick_zone_grip_system:
      name: Sistem oprijema v odrivni coni
      description: Opredeljuje tehnologijo, uporabljeno v odrivni coni smuči za boljši
        oprijem.
    kickboard_features:
      name: Lastnosti plavalne deske
      description: Izpostavlja posebne značilnosti plavalne deske, ki izboljšujejo
        trening ali udobje, vključno s teksturo površine in možnostmi oprijema z rokami.
    kickboard_handle_style:
      name: Stil ročaja plavalne deske
      description: Opredeljuje, ali in kako plavalna deska zagotavlja ročaje ali površinske
        obdelave, ki vplivajo na rokovanje in udobje.
    kickstand_mounting_position:
      name: Položaj montaže stojala
      description: Opredeljuje, kje na okvirju kolesa se stojalo pritrdi (npr. sredinska
        montaža, montaža na cev ob verigi, montaža na zadnjo os).
    kickstand_type:
      name: Vrsta stojala
      description: Opisuje strukturni stil ali mehanizem stojala (npr. enonogo stransko
        stojalo, dvonogo sredinsko stojalo, teleskopsko stojalo).
    kidney_belt_support_level:
      name: Stopnja podpore ledvenega pasu
      description: Splošna stopnja podpore, ki jo določi proizvajalec in jo ledveni
        pas zagotavlja za stabilizacijo spodnjega dela hrbta in trebušnega predela.
    kiln_firing_atmosphere:
      name: Atmosfera pečenja v peči
      description: Navaja atmosfero(-e) peke, ki jo žgalna peč podpira med delovanjem
        (npr. oksidacija ali redukcija).
    kiln_heating_element_type:
      name: Vrsta grelnega elementa žgalne peči
      description: Vrsta/material grelnih elementov, uporabljenih v žgalni peči.
    kingpin_design:
      name: Zasnova kraljevega čepa
      description: Opisuje stil izdelave kraljevega čepa, kar vpliva na težo in odmik
        pri drsenju.
    kingpin_orientation:
      name: Orientacija kraljevega čepa
      description: Opredeljuje usmerjenost kraljevega čepa na podvozju, kar vpliva
        na vozne lastnosti in združljivost z desko.
    kit_components_included:
      name: Vključeni sestavni deli kompleta
      description: Navaja posamezne dele strojne opreme, ki so priloženi v kompletu
        (npr. talni klini, vijaki, trakovi, orodje za namestitev), da kupci natančno
        vedo, kaj kupujejo.
    kit_format:
      name: Format kompleta
      description: Navaja, kako je komplet pakiran in kako se prenaša (npr. torbica,
        kovček, škatla).
    kit_items_included:
      name: Vključeni kosi v kompletu
      description: Navaja glavno opremo in pripomočke, vključene v komplet za izdelavo
        vina, da lahko kupci ločijo začetne komplete od polnil, ki vsebujejo samo
        sestavine.
    kit_pouch_case_type:
      name: Vrsta torbice/kovčka kompleta
      description: Navaja vrsto vključene rešitve za shranjevanje kompleta za nego
        (če je prisotna).
    kit_tools_included:
      name: Vključena orodja v kompletu
      description: Navaja glavna orodja, ki so na voljo v kompletu (če so prisotna)
        za dokončanje projekta.
    kite_inflation_system:
      name: Sistem za napihovanje zmajev
      description: Označuje, kako so napihnjeni sprednji rob in prečne cevi zmaja.
    kite_line_configuration:
      name: Konfiguracija vrvic za zmaja
      description: Označuje število letalnih/krmilnih vrvic, za uporabo katerih je
        jadro zmaja zasnovano, kar je splošna specifikacija za pravilno usklajevanje
        krmilnih palic in vrvic.
    kite_type:
      name: Vrsta zmaja
      description: Določa kategorijo strukturne zasnove zmaja (oblika in stil vrvnega
        sistema).
    kiteboard_bag_style:
      name: Slog torbe za kajtanje
      description: Specifičen stil ali podvrsta kovčka oz. torbe za kiteboard (npr.
        torba za desko/Boardbag, golf torba, potovalna torba).
    kiwifruit_variety:
      name: Sorta kivija
      description: Opredeljuje specifično sorto ali barvno različico kivija (zeleni,
        zlati, rdeči itd.).
    knee_pad_pocket_type:
      name: Vrsta žepa za ščitnike za kolena
      description: Označuje, ali in kako oblačilo omogoča namestitev zaščitnih ščitnikov
        za kolena.
    knee_pad_style:
      name: Stil ščitnikov za kolena
      description: Opisuje stil izdelave ali obliko zaščite za kolena (npr. podpora,
        opornica, ščitnik).
    knee_protection_design:
      name: Zasnova zaščite za kolena
      description: Označuje število gibljivih delov za koleno, ki so vgrajeni v ščitnik
        za noge.
    kneeboard_construction:
      name: Konstrukcija deske za klečeče deskanje na vodi
      description: Opredeljuje primarno tehniko izdelave ali zgradbo deske (npr. rotacijsko
        litana plastika, kompresijsko oblikovana plastika, ogljikova vlakna).
    kneeboard_strap_type:
      name: Vrsta traku za desko za klečeče deskanje na vodi
      description: Opisuje stil sistema kolenskega traku, ki se uporablja za pritrditev
        uporabnika na desko.
    knife_lock_mechanism:
      name: Mehanizem zaklepa noža
      description: Navaja mehanizem, ki se uporablja za fiksiranje rezila zložljivega
        noža v odprtem položaju, ali pa označuje zasnove brez zaklepanja.
    knife_locking_mechanism:
      name: Mehanizem zaklepanja noža
      description: Navaja vrsto mehanizma, ki fiksira rezilo v odprtem položaju, kar
        neposredno določa varnost, trdnost in enostavnost uporabe pri nožih z zaklepanjem
        rezila.
    knife_opening_mechanism:
      name: Mehanizem odpiranja noža
      description: Opisuje, kako se rezilo izvleče iz ročaja, pri čemer razlikuje
        med ročnim, podprtim, avtomatskim in posebnimi stili odpiranja.
    knife_system:
      name: Sistem nožev
      description: Ali in kako rezalni nož deluje na šivalnem stroju.
    knit_elastic_application:
      name: Namen uporabe pletene elastike
      description: Navaja predvideni primer uporabe pletenega elastičnega traku pri
        šivanju ali ustvarjanju.
    knit_pattern:
      name: Vzorec pletenja
      description: Opredeljuje primarni pletilni šiv ali teksturo, uporabljeno v blagu
        jopice, kot so kite, rebrasti ali satasti vzorec, kar kupcem omogoča iskanje
        specifičnih tekstur in toplotnih lastnosti.
    knit_style:
      name: Slog pletenja
      description: Navaja primarno pleteno zgradbo, teksturo ali dekorativni vzorec
        na blagu puloverja.
    knitting_marker_counter_type:
      name: Vrsta označevalca/števca za pletenje
      description: Navaja funkcionalno vrsto izdelka znotraj označevalcev in števcev
        za pletenje.
    knitting_needle_tip_style:
      name: Slog konice pletilne igle
      description: Ostrina/oblika konice, optimizirana za različne preje in tehnike.
    knock_sensor_technology:
      name: Tehnologija senzorja za trkanje
      description: Tehnologija zaznavanja, uporabljena v senzorju klenkanja.
    knurl_aggressiveness:
      name: Ostrina grče
      description: "Opisuje ostrino ali teksturo vzorca grče na ratišču palice, kar
        vpliva na udobje in varnost oprijema.\tO"
    knurl_marking_standard:
      name: Standard označevanja grče
      description: Navaja položaj referenčnih obročev narebričenja, ki se uporabljajo
        za postavitev rok (npr. oznake IPF ali IWF).
    kohlrabi_variety:
      name: Sorta kolerabice
      description: Navaja kultivar ali tržno sorto gumba kolobarice, kar strankam
        omogoča izbiro med različnimi profili okusov, velikostmi in barvami.
    koji_mold_type:
      name: Vrsta koli plesni
      description: Označuje vrsto ali sev koli plesni, uporabljene med fermentacijo,
        kar vpliva na aromo in okus.
    kumquat_variety:
      name: Sorta kumkvata
      description: Opredeljuje ponujeni kultivar ali sorto kumkvatov, kar kupcem omogoča
        izbiro sadežev na podlagi profila okusa, velikosti ali kulinarične uporabe.
    label_edge_type:
      name: Vrsta roba etikete
      description: Navaja stil obdelave robov, ki se uporablja za preprečevanje cefranja
        in določanje estetike.
    label_finish:
      name: Površinska obdelava etikete
      description: Navaja površinsko obdelavo, teksturo ali zaščitni premaz/obdelavo,
        naneseno na etiketo.
    label_finish_edge_style:
      name: Stil obdelave/roba etikete
      description: Kako so robovi obdelani, kar vpliva na udobje in vzdržljivost (npr.
        tkani rob nasproti laserskemu izrezu).
    label_fold_type:
      name: Vrsta pregiba etikete
      description: Navaja, kako je všivna etiketa zasnovana za všitje v izdelek (npr.
        končni prepogib nasproti sredinskemu prepogibu), kar vpliva na način namestitve
        in njeno lego.
    label_text_type:
      name: Vrsta besedila na etiketi
      description: Označuje, ali je etiketa prazna, vnaprej natisnjena ali predvidena
        za prilagoditev.
    lace_area_size:
      name: Velikost predela s čipko
      description: Določa velikost ali konfiguracijo predela s čipko (npr. zapiranje
        4x4, sprednji del 13x6), kar določa razpoložljiv prostor za razdelek.
    lace_tightener_style:
      name: Stil pripomočka za zategovanje čipke
      description: Opredeljuje mehansko zasnovo ali obliko pripomočka za zategovanje
        čipke.
    lace_type:
      name: Vrsta čipke
      description: Opisuje material ali obdelavo čipke na liniji lasišča/kapi, kar
        vpliva na realizem in usklajenost s tenom kože.
    lacrosse_ball_certification:
      name: Certifikat žogice za lacrosse
      description: Navaja odobritve krovnih športnih organizacij ali standarde, ki
        jih žogica za lakros izpolnjuje.
    lacrosse_goal_regulation_certification:
      name: Uradni certifikat gola za lakros
      description: Označuje, ali gol ali mreža za lakros ustrezata specifičnim zahtevam
        krovne organizacije (npr. NCAA ali NFHS).
    lacrosse_pocket_type:
      name: Vrsta mrežice (žepa) na palici za lakros
      description: Opredeljuje splošni stil žepa ali mrežice, vpetega v glavo palice,
        kar vpliva na nadzor nad žogico in njen izmet.
    lacrosse_string_type:
      name: Vrsta vrvice za lakros
      description: Razvršča natančno obliko ali predviden namen uporabe vrvice ali
        mrežastega elementa, da lahko kupci ločijo med deli mrežic, kompleti in specifičnimi
        nalogami vrvic znotraj žepa.
    ladder_position:
      name: Položaj lestve
      description: Opredeljuje, kje na visoki otroški postelji se nahaja dostop preko
        lestve ali stopnic.
    lanyard_attachment_hardware:
      name: Strojna oprema za pritrditev traku za ključe
      description: Označuje stil strojne opreme na koncu traku, ki se povezuje s ključi,
        značkami, telefoni ali drugimi dodatki.
    lanyard_style:
      name: Stil traku za ključe
      description: Navaja, kako se trak za ključe nosi ali prenaša.
    lanyard_type:
      name: Vrsta traku za ključe
      description: Opisuje stil traku, ki je priložen piščali ali je z njo združljiv.
    lap_hand_loom_accessories_included:
      name: Vključeni dodatki za namizno ročno statve
      description: Dodatki, vključeni v paket z namizno ročno statvijo
    lapel_style:
      name: Slog ovratnika
      description: Navaja zasnovo ovratnika suknjiča (npr. klasičen, koničast, šal
        ovratnik).
    laser_safety_class:
      name: Varnostni razred laserja
      description: Varnostna klasifikacija laserja za izdelek (npr. razred 2, 3R,
        3B, 4), kot je navedeno v dokumentaciji/oznaki naprave.
    latex_processing_method:
      name: Način predelave lateksa
      description: Navaja proizvodni postopek, uporabljen za izdelavo lateks pene
        – običajno Dunlop ali Talalay – kar vpliva na občutek, odzivnost in ceno.
    latex_type:
      name: Vrsta lateksa
      description: Označuje izvor in sestavo lateksa, uporabljenega v vzmetnici (naravni,
        organski, sintetični ali mešani), kar kupce seznani z vzdržljivostjo, okoljsko
        prijaznostjo in morebitnimi alergeni.
    launch_profile:
      name: Profil izmeta
      description: Označuje običajno trajektorijo izmeta žogice (nizka, srednja, visoka),
        za katero je ratišče golf palice zasnovano.
    launcher_mounting_configuration:
      name: Konfiguracija montaže metalca
      description: Opredeljuje, kako je lansirnik nameščen ali konfiguriran za uporabo,
        kar pomaga kupcem, ki potrebujejo samostojne možnosti, možnosti montaže pod
        cevjo ali na tračnico.
    layer_construction:
      name: Konstrukcija slojev
      description: Določa konstrukcijo laminata tkanine (npr. dvoslojna, 2,5-slojna,
        trislojna), ki vpliva na težo, zložljivost in vzdržljivost.
    layer_design:
      name: Zasnova slojev
      description: Opisuje zgradbo mrežice za lase glede na sloje ali možnost obojestranske
        uporabe.
    lazy_kate_tension_control_type:
      name: Vrsta nadzora napetosti naprave »lazy kate«
      description: Kako naprava »lazy kate« izvaja upor/napetost na vretenca med sukanjem
        ali navijanjem.
    lead_hardware_type:
      name: Vrsta strojne opreme povodca
      description: Določa stil pritrditve ali zaponke na koncu povodca (karabin, sponka,
        zanka, veriga itd.), kar vpliva na enostavnost uporabe, varnost in primernost
        za določen namen.
    leaf_gelatin_grade:
      name: Razred listnate želatine
      description: Navaja standardizirani razred trdnosti, uporabljen za listnato
        želatino.
    leaf_preparation:
      name: Priprava listov
      description: Opisuje, kako so listi pripravljeni pred pakiranjem, na primer
        sesekljani, narezani na trakove ali narezani na način »julienne«.
    leaf_spring_material:
      name: Material listnate vzmeti
      description: Glavni material izdelave paketa listnatih vzmeti.
    leak_protection_layer:
      name: Sloj za zaščito pred iztekanjem
      description: Označuje, ali vgrajeni sistem plenic pri plavalnih hlačah (jammer)
        uporablja eno- ali dvoslojno zasnovo za zaščito pred iztekanjem.
    leash_clip_type:
      name: Vrsta sponke povodca
      description: Navaja stil sponke ali strojne opreme, ki se uporablja za pritrditev
        povodca na ovratnico ali oprsnico (npr. klasični karabin na potisk, vponka/karabiner,
        vrtljiva sponka).
    leash_style:
      name: Slog povodca
      description: Opisuje konfiguracijo vrvice ali stil zvijanja povodca.
    leash_type:
      name: Vrsta povodca
      description: Razvršča splošni stil ali namensko konfiguracijo povodca za hitro
        filtriranje glede na predvideno uporabo.
    leavening_action_type:
      name: Vrsta delovanja vzhajalnega sredstva
      description: Opredeljuje kemično sestavo ali stil vzhajanja pecilnega praška
        (npr. enofazno delovanje, dvofazno delovanje, brez aluminija). To neposredno
        vpliva na uspešnost peke in primernost recepta.
    leavening_agent:
      name: Sredstvo za vzhajanje
      description: Navaja glavni mehanizem vzhajanja, uporabljen v testu.
    led_color_options:
      name: Možnosti LED barv
      description: Navaja nastavljive barve LED lučk, ki so na voljo na indikatorju
        za vizualni prikaz ugriza.
    led_indicator_color:
      name: Barva LED indikatorja
      description: Opredeljuje barvo LED indikatorja na izdelku, kar ribičem pomaga
        uskladiti več indikatorjev ali ustreči osebnim željam.
    led_light_color:
      name: Barva LED svetlobe
      description: Navaja barvo katere koli vgrajene LED osvetlitve.
    leek_variety:
      name: Sorta pora
      description: Navaja kultivar ali sorto pora, kar omogoča razlikovanje po okusu,
        velikosti in rastni sezoni.
    leg_coverage:
      name: Pokritost nog
      description: Navaja, kolikšen del noge pokriva neoprenska obleka (npr. kratka,
        celotna dolžina).
    leg_cuff_style:
      name: Stil spodnjega roba hlačnic
      description: Navaja stil zaključka na gležnji odprtini hlač.
    leg_cut_height:
      name: Višina nožnega izreza
      description: Označuje, kako visoko je izrezana odprtina za nogo na spodnjem
        delu bikinija.
    leg_cut_style:
      name: Stil izreza za noge
      description: Opisuje obliko odprtine za nogo, kar vpliva na videz, udobje in
        linije sončenja.
    leg_length:
      name: Dolžina hlačnic
      description: Razvršča kopalne hlače po relativni dolžini hlačnic (kratke, srednje,
        dolge), da lahko kupci izberejo želeno pokritost brez drobljenja kategorije.
    leg_loop_type:
      name: Vrsta nožnih zank
      description: Opisuje zasnovo zank na hlačnicah.
    leg_opening_style:
      name: Stil odprtine za nogo
      description: Navaja, kako so zaključene odprtine za noge na spodnjih delih trenirk,
        kot so elastični patenti, robovi z zadrgo ali odprti robovi.
    leg_style:
      name: Slog hlačnic
      description: Določa slog zasnove ali konstrukcije nog ali podnožja klopi.
    legging_foot_design:
      name: Zasnova stopalnega dela pajkic
      description: Navaja, ali so pajkice brez stopal, s stopali ali pa omogočajo
        prehajanje med obema stiloma.
    leggings_waistband_style:
      name: Stil pasu pri pajkicah
      description: Navaja strukturno zasnovo pasu pri pajkicah, kar vpliva na udobje,
        podporo in estetiko.
    lei_closure_style:
      name: Stil zapenjanja cvetlične ogrlice
      description: Opisuje, ali je cvetlična ogrlica sklenjena zanka ali pa ima odprte
        konce, ki se zavežejo oziroma pritrdijo s trakom.
    lemon_variety:
      name: Sorta limone
      description: Opredeljuje specifični kultivar ali sorto limon (npr. Eureka, Meyer,
        Amalfi).
    length_adjustment_method:
      name: Način nastavljanja dolžine
      description: Označuje, ali in kako se lahko dolžina kolebnice prilagodi uporabniku.
    lens_color_tint:
      name: Barva/zatemnitev leče
      description: Barva ali zatemnitev leč zaščitnih očal, ki so priložene izdelku.
    lens_construction:
      name: Konstrukcija leče
      description: Navaja strukturno zgradbo leče (npr. enoslojna, dvoslojna termična),
        kar označuje odpornost proti rošenju in optično učinkovitost.
    lens_tint_category:
      name: Kategorija zatemnitve leče
      description: Razvršča temnost leč na podlagi mednarodnih kategorij zatemnitve,
        kar strankam pomaga izbrati leče, primerne za različne svetlobne razmere.
    lettuce_variety:
      name: Sorta solate
      description: Opredeljuje specifično hortikulturno sorto zelene solate (npr.
        ledenka, rimska solata, mehkolistna solata), kar omogoča natančno filtriranje
        in primerjavo.
    level_of_play:
      name: Raven igranja
      description: Stopnja zmogljivosti opreme, ki jo navaja proizvajalec in je usklajena
        s tekmovalnostjo in proračunom igralca.
    lever_configuration:
      name: Konfiguracija ročic
      description: Označuje konfiguracijo ročic/ročajev za upravljanje motorja plovila
        (npr. sistem z enim ročajem nasproti sistemu z dvema ročajema).
    lever_type:
      name: Vrsta ročice
      description: Vrsta/mehanizem ročic za spreminjanje višine tonov, nameščenih
        na strunah harfe.
    license_plate_cover_style:
      name: Stil okvirja/prevleke za registrsko tablico
      description: Navaja stil izdelave prevleke za registrsko tablico (npr. popolno
        pokrivalo nasproti pokrovčkom za vijake).
    license_plate_personalization_type:
      name: Vrsta personalizacije registrske tablice
      description: Navaja, ali je registrska tablica prazna, vnaprej natisnjena ali
        pa podpira prilagoditev po želji kupca (besedilo in/ali grafika).
    license_usage_terms:
      name: Licenčni pogoji/pogoji uporabe
      description: Pravice do uporabe kroja (npr. samo za osebno uporabo nasproti
        omejeni komercialni uporabi).
    licensed_sports_property:
      name: Uradno licencirana športna znamka
      description: Označuje, ali je izdelek uradno licenciran s strani lige, ekipe
        ali organizacije.
    lid_hinge_mechanism:
      name: Tečajni mehanizem pokrova
      description: Navaja tečajni mehanizem, uporabljen za pokrov, kar vpliva na varnost
        in enostavnost uporabe.
    lid_support_positions:
      name: Položaji podpore pokrova
      description: Navaja podprte položaje palice za podporo pokrova pri klavirju
        (kako močno se pokrov lahko odpre).
    lie_angle_color_code:
      name: Barvna koda kota lažnih kotov
      description: Označuje proizvajalčev sistem barvnega kodiranja kota palice, ki
        se uporablja pri nekaterih palicah (npr. črna pika, zelena pika).
    life_jacket_certification_standard:
      name: Standard za certificiranje na področju varnosti za rešilne jopiče
      description: Uradna varnostna klasifikacija ali standard, ki ga izdelek izpolnjuje,
        kot sta razred USCG ali ravni ISO/AS.
    life_raft_certification_standard:
      name: Standard za certificiranje na področju varnosti za rešilne slapove
      description: Varnostni standard/certifikat, za izpolnjevanje katerega je splav
        izdelan in servisiran.
    life_raft_container_type:
      name: Vrsta vsebnika za rešilni splav
      description: Kako je rešilni splav pakiran za shranjevanje in aktivacijo.
    life_vest_approval_standard:
      name: Standard odobritve za rešilne jopiče
      description: Navaja standard certifikacije/odobritve, s katerim je usklajen
        rešilni jopič.
    life_vest_intended_user:
      name: Predvideni uporabnik rešilnega jopiča
      description: Označuje predvideno kategorijo uporabnika za prileganje in oskrbo.
    lifebuoy_approval_standard:
      name: Standard odobritve rešilnega obroča
      description: Varnostna odobritev ali standard, s katerim je usklajen rešilni
        obroč (npr. USCG/SOLAS)
    lifebuoy_features:
      name: Lastnosti rešilnega obroča
      description: Funkcionalna varnost, montaža/rokovanje in vključene lastnosti
        dodatkov za rešilne obroče.
    lift_mechanism_type:
      name: Vrsta dvižnega mehanizma
      description: Navaja mehanizem, ki pomaga pri dvigovanju/spuščanju ali odpiranju/zapiranju
        stenske postelje.
    lift_stand_support_point:
      name: Točka podpore za dvigalko/stojalo
      description: Kjer se dvigalka/stojalo dotika/podpira vozilo
    lifting_gas_type:
      name: Vrsta nosilnega plina
      description: Navaja glavni nosilni plin ali medij za plovnost, ki ga uporablja
        zračna ladja.
    lifting_support_type:
      name: Vrsta podpore za dvigovanje
      description: Označuje, ali se na dvigalko zapelje preko dovoznih stez ali pa
        se dviguje preko ročic/podlog, ki se dotikajo okvirja/točk za dvigovanje.
    ligature_and_cap_component_type:
      name: Vrsta komponente objemke in pokrovčka
      description: Označuje, ali je izdelek objemka, pokrovček ali komplet, ki vključuje
        oboje.
    ligature_material:
      name: Material objemke
      description: Glavni material trupa objemke, ki je v stiku z jezičkom in ga pritrjuje
        (npr. kovina, usnje, tkanina).
    ligature_plating_or_finish:
      name: Premaz ali površinska obdelava objemke
      description: Navaja premaz in/ali površinsko obdelavo, naneseno na kovinsko
        objemko in/ali pokrovček klarineta.
    ligature_reed_contact_style:
      name: Stil stika objemke z jezičkom
      description: Navaja, kako je objemka v stiku z jezičkom (npr. minimalen stik,
        večtočkovni stik, ovijalni stik).
    ligature_screw_position_relative_to_reed:
      name: Položaj vijaka objemke (glede na jeziček)
      description: Označuje položaj vijaka(-ov) za zategovanje objemke glede na jeziček
        oziroma stran, obrnjeno proti igralcu, ko je nameščena na ustnik.
    ligature_tension_adjustment_mechanism:
      name: Mehanizem za nastavljanje napetosti objemke
      description: Opisuje, kako objemka izvaja/prilagaja pritisk na jeziček (zasnova
        pritrjevanja).
    ligature_tightening_mechanism_type:
      name: Vrsta mehanizma za zategovanje objemke
      description: Navaja mehanizem, s katerim se objemka zategne okoli ustnika in
        jezička (npr. enojni vijak, dvojni vijak, ročica/hitri izpenjalec).
    light_bar_housing_material:
      name: Material ohišja svetlobne palice
      description: Glavni material ohišja/trupa svetlobne palice, kar vpliva na vzdržljivost
        in odvajanje toplote.
    light_bar_lens_material:
      name: Material leče svetlobnega bloka
      description: Glavni material leče/pokrova LED panela, kar lahko vpliva na odpornost
        proti udarcem in optično čistost.
    light_bar_mounting_location:
      name: Mesto montaže svetlobnega bloka
      description: Glavni predvideni položaj montaže na vozilu.
    light_stand_style:
      name: Stil stojala za luč
      description: Navaja strukturni stil ali obliko (form factor) stojala, ki se
        uporablja za podporo luči za posebne učinke (npr. tripod, T-nosilec, dvig
        s kolescem), ne pa montažne površine (stena/strop), kar pokriva vrsta montaže.
    light_switch_function:
      name: Funkcija stikala za luč
      description: Opredeljuje, kateri svetlobni krog(-e) ali funkcijo(-e) stikalo
        upravlja.
    lighting_control_protocols_supported:
      name: Podprti protokoli za upravljanje razsvetljave
      description: Nadzorni/omrežni protokoli, ki jih krmilnik podpira poleg DMX512
        ali namesto njega.
    lighting_effects:
      name: Svetlobni učinki
      description: Navaja vse integrirane svetlobne lastnosti, ki izboljšajo igranje
        ali estetiko.
    lighting_mode:
      name: Način osvetlitve
      description: Navaja razpoložljive delovne svetlobne vzorce, kot so neprekinjeno
        svetenje, utripanje, stroboskop ali SOS.
    lily_variety:
      name: Sorta lilije
      description: Navaja komercialno/botanično sorto lilije, ki se prodaja kot sveže
        rezano cvetje (npr. azijska, orientalska).
    limb_articulation:
      name: Gibljivost udov
      description: Označuje stopnjo prožnosti ali gibljivosti udov pri lutki (brez,
        fiksna, delno upogljiva, popolnoma gibljiva).
    limb_material:
      name: Material krakov
      description: Glavni material, uporabljen v krakih loka ali samostrela, kar vpliva
        na težo, vzdržljivost, tresljaje in splošno delovanje.
    lime_variety:
      name: Sorta limete
      description: Opredeljuje specifično botanično ali komercialno sorto limete,
        ki se prodaja.
    line_buoyancy:
      name: Plovnost vrvice
      description: Opisuje, ali pletena vrvica naravno plava ali se potaplja in s
        kakšno hitrostjo, kar vpliva na predstavitev vabe in upravljanje vrvice.
    line_purpose:
      name: Plovnost vrvice
      description: Določa predvideno funkcijo vrvice znotraj sistema zmaja (npr. sprednja
        letalna vrvica, depower vrvica, vrvica uzde).
    linen_finish_treatment:
      name: Površinska obdelava/obdelava lana
      description: Kateri koli postopek dodelave, uporabljen na lanenem blagu, ki
        spremeni občutek na otip, videz ali zmogljivost.
    linen_weave_type:
      name: Vrsta tkanja lana
      description: Navaja zgradbo tkanja lanenega blaga, kar vpliva na teksturo, zračnost
        in padanje blaga.
    liner_padding_type:
      name: Vrsta podloge/blazinjenja
      description: Označuje zgradbo ali stil blazinjenja vložka (npr. mrežast, rahlo
        podložen, prešit).
    liner_shape:
      name: Oblika vložka
      description: Označuje, ali kratke hlače vključujejo notranji vložek in, če ga,
        kakšnega stila je.
    liner_type:
      name: Vrsta vložka/podloge
      description: Označuje, ali kratke hlače vključujejo notranji vložek in, če ga,
        kakšnega stila je.
    lining:
      name: Podloga
      description: Označuje, ali in kako so kopalke (hlačke) podložene, vključno z
        obsegom pokritosti s podlogo znotraj oblačila.
    lining_material:
      name: Material podloge
      description: Navaja material, uporabljen za notranjo podlogo čevlja, kar vpliva
        na udobje, zračnost in toploto.
    lining_type:
      name: Vrsta podloge
      description: Navaja, ali so kopalke podložene in v kakšnem obsegu.
    link_connection_style:
      name: Stil povezovanja členov
      description: Razvršča, kako člen povezuje verigo (npr. hitri člen/quick link,
        povezovalni zatič), kar kolesarjem omogoča izbiro pravilnega načina namestitve
        ali nadomestnega dela.
    live_bait_form:
      name: Oblika žive vabe
      description: Navaja fizično obliko ali stanje ohranjenosti vabe, kot je živa,
        zamrznjena ali posušena.
    living_room_furniture_items_included:
      name: Vključeni kosi pohištva za dnevno sobo
      description: Navaja posamezne kose pohištva, ki so del kompleta za dnevno sobo,
        kar kupcem pomaga hitro razumeti, katere komponente (npr. zofa, dvosed, klubska
        mizica) so vključene.
    load_mechanism:
      name: Mehanizem obremenitve
      description: Navaja glavno metodo, s katero se ustvarja ali dodaja upornost
        napravi (npr. izbirni sklad uteži, nalaganje kolutov, nalaganje elastičnih
        trakov).
    lock_cylinder_type:
      name: Vrsta cilindra ključavnice
      description: Navaja vrsto uporabljenega cilindra/jedra ključavnice (pomembno
        za odpornost proti vlomom in za nadomestne ključe).
    lock_security_level:
      name: Stopnja varnosti ključavnice
      description: Opisuje lastnosti varnostne odpornosti ključavnice/cilindra proti
        vlomom z uporabo orodij in vrtanja.
    lock_system:
      name: Sistem zaklepanja
      description: Vrsta varnostnega sistema zaklepanja, ki se uporablja za zadrževanje
        dvigalke na določeni višini.
    locker_bench_configuration:
      name: Konfiguracija klopi za garderobo
      description: Opisuje usmerjenost ali strukturno konfiguracijo garderobne klopi
        (npr. enostranska, dvostranski otok, stenska montaža).
    locomotive_prototype_power_type:
      name: Vrsta pogona prototipa lokomotive
      description: Navaja vrsto pogona prave lokomotive, ki jo model upodablja.
    locomotive_wheel_arrangement_whyte_notation:
      name: Razporeditev koles lokomotive (Whyteova notacija)
      description: Razporeditev koles prototipa lokomotive (npr. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Klasifikacija višine visoke postelje (pograda)
      description: Označuje splošni stil višine visoke postelje (nizka, srednja, visoka,
        ekstra visoka), kar kupcem pomaga uskladiti višino stropa in zahteve glede
        prostora pod posteljo.
    logo_application_method:
      name: Način namestitve logotipa
      description: Opisuje, kako je šolski grb ali logotip nameščen na oblačilo (npr.
        izvezen ali natisnjen).
    logo_label_compatible_fabric_weight:
      name: Združljiva teža blaga za etiketo z logotipom
      description: Priporočena kategorija teže blaga za namestitev etikete brez popačenja
        ali kopičenja materiala.
    logo_label_edge_finish:
      name: Površinska obdelava roba etikete z logotipom
      description: Navaja izdelavo/obdelavo roba etikete, kar vpliva na odpornost
        proti cefranju in udobje v stiku s kožo.
    logo_label_print_production_method:
      name: Način tiska/izdelave etikete z logotipom
      description: Kako je logotip nameščen/izdelan na površini etikete.
    long_block_completeness:
      name: Stopnja dokončanosti motorja
      description: Navaja, katere glavne komponente so vključene v sklop delno sestavljenega
        motorja.
    long_john_pieces_included:
      name: Vključeni deli dolgega spodnjega perila
      description: Pojasnjuje, ali izdelek vključuje le spodnji del, le zgornji del
        ali oba dela kompleta dolgega spodnjega perila (ali neoprena brez rokavov).
    longan_variety:
      name: Sorta Longan
      description: Navaja kultivar ali komercialno sorto sadeža longan (npr. Kohala,
        Biew Kiew), kar kupcem pomaga prepoznati želeni okus, velikost in lastnosti
        sladkosti.
    loom_accessories_included:
      name: Vključeni dodatki za statve
      description: Ključni dodatki, ki so priloženi statvam v škatli/paketu.
    loom_finish:
      name: Površinska obdelava tekaških sani
      description: Površinska obdelava statva (predvsem za lesene statve).
    loom_folding_portability_design_type:
      name: Vrsta zasnove zložljivosti/prenosljivosti statva
      description: Ali in kako se statve zložijo/sesedejo za transport ali kompaktno
        shranjevanje.
    loom_frame_folding_design:
      name: Zasnova zložljivosti ogrodja statva
      description: Navaja, ali in kako se ogrodje namiznih statva zloži, sesede ali
        razstavi za shranjevanje oziroma transport.
    loom_tension_adjustment_method:
      name: Način nastavljanja napetosti na statvah
      description: Glavna metoda, ki se uporablja za nastavljanje napetosti osnove
        na statvah.
    loom_tie_up_system:
      name: Sistem vezave na statvah
      description: Vrsta sistema vezave/povezave, uporabljenega med podnožniki, vzvodi
        in listi (npr. Texsolv ali kovinska veriga).
    loquat_variety:
      name: Sorta nešplje
      description: Navaja kultivar ali sorto nešplje, kar odraža razlike v velikosti,
        okusu, sezoni zorenja in videzu.
    lubricant_features:
      name: Lastnosti maziva
      description: Izpostavlja posebne zmogljivostne značilnosti, aditive ali prednosti
        maziva.
    lubrication_requirement:
      name: Zahteva po mazanju
      description: Označuje, ali je tekalni trak predhodno obdelan/brez vzdrževanja
        ali pa zahteva redno mazanje oziroma voskanje.
    lubrication_type:
      name: Vrsta mazanja
      description: Navaja možnost mazanja puše z oljem ali mastjo ter ali je zasnovana
        za servisiranje z mastjo (npr. utori ali mazalka).
    lug_nut_seat_profile:
      name: Profil ležišča kolesne matice
      description: Navaja profil ležišča kolesne matice, ki ga zahteva platišče, da
        se zagotovi pravilna združljivost matic in varna namestitev.
    lumbar_support_type:
      name: Vrsta ledvene podpore
      description: Opisuje stil ledvene podpore, ki jo ponuja stol (npr. odstranljiva
        blazina, nastavljiv mehanizem, masaža).
    lunge_trainer_style:
      name: Stil pripomočka za lonžiranje
      description: Določa strukturno zasnovo pripomočka za lonžiranje (delo s konjem
        na vrvi).
    lure_buoyancy:
      name: Plovnost umetne vabe
      description: Navaja, kako se vaba obnaša v vodnem stolpcu, ko miruje ali med
        vlečenjem (npr. plavanje na površini, lebdenje v srednjem sloju vode ali potapljanje).
    luster:
      name: Lesk
      description: Opisuje način, kako svetloba komunicira s površino vzorca (npr.
        steklast, kovinski sijaj).
    lychee_cultivar:
      name: Kultivar ličija
      description: Opredeljuje specifično sorto ali kultivar ličija – kot so Brewster,
        Hak Ip ali Mauritius – ki se lahko razlikujejo po okusu, velikosti koščice,
        sezoni obiranja in ceni.
    lyre_flip_folder_mounting_location:
      name: Mesto montaže liričnega držala/preklopne mape
      description: Kje na instrumentu ali dodatku je predvideno mesto za montažo liričnega
        držala za note ali preklopne mape (npr. odmevnik, ustnična cev, stojalo).
    lyrics_display_type:
      name: Vrsta prikaza besedila skladbe
      description: Kako se med karaokami prikazuje besedilo (če je funkcija podprta).
    magazine_compatibility:
      name: Združljivost z nabojniki
      description: Opredeljuje primarne kalibre ali vrste nabojnikov, za shranjevanje
        katerih so zasnovani vgrajeni žepi na telovniku.
    magnet_requirement:
      name: Zahteva po magnetu
      description: Označuje, ali senzor za delovanje potrebuje zunanji magnet.
    magnet_toy_storage_included:
      name: Vključeno shranjevanje magnetnih igrač
      description: Vrsta shrambe/kovčka, ki je priložen magnetni igrači za organizacijo
        na mizi in potovanja.
    malanga_variety:
      name: Sorta malange
      description: Opredeljuje specifično sorto korenine malange/taro, ki se prodaja,
        kar kupcem pomaga izbrati želeni okus, barvo ali kulinarično uporabo.
    malt_color_rating_system:
      name: Sistem ocenjevanja barve slada
      description: Navaja, na katero barvno lestvico se nanaša navedena barva (Lovibond,
        SRM ali EBC).
    malt_crush:
      name: Mletje slada
      description: Označuje, ali se osnovni slad prodaja v celem/nemlet ali predhodno
        zdrobljen, in če je zdrobljen, navaja stil mletja.
    malt_form:
      name: Oblika slada
      description: Označuje, ali se izdelek prodaja kot cela zrna ali predelan za
        drozganje (npr. zdrobljen).
    malt_intended_use:
      name: Namen uporabe slada
      description: Predviden primarni namen uporabe slada (pivovarstvo, žganjekuha
        ali dvojni namen).
    malt_treatment:
      name: Obdelava slada
      description: Opisuje, kako so bila zrna/slad predelana poleg standardnega sušenja
        v sušilnici (običajni posebni postopki).
    malt_usage_purpose:
      name: Namen uporabe slada
      description: Opisuje glavni funkcionalni prispevek posebnega slada k receptu
        za pivo.
    man_overboard_system_type:
      name: Vrsta sistema za primer človeka v vodi
      description: Navaja primarno kategorijo rešitve za primer človeka v vodi (MOB),
        ki jo izdelek zagotavlja.
    mandolin_back_sides_wood:
      name: Les za hrbtišče in obod mandoline
      description: Navaja vrsto lesa, uporabljenega za hrbtišče in obod mandoline.
    mandolin_body_top_wood:
      name: Les za vrhnjo ploščo trupa mandoline
      description: Glavni les/material, uporabljen za resonančno ploščo (vrhnjo ploščo)
        mandoline.
    mandolin_bridge_type:
      name: Vrsta kobilice za mandolino
      description: Navaja stil kobilice, uporabljene na mandolini.
    mandolin_pickup_configuration:
      name: Konfiguracija odjemnikov zvoka za mandolino
      description: Označuje, ali mandolina vključuje elektroniko in kakšen sistem
        prevzema je nameščen.
    mandolin_string_configuration:
      name: Konfiguracija strun za mandolino
      description: Določa konfiguracijo nizov mandoline glede na skupne nize in število
        hodov (npr. 8 nizov / 4 hodi).
    mangosteen_variety:
      name: Sorta mangostana
      description: Opredeljuje specifično vrsto ali kultivar mangostana ali tesno
        povezanega sadeža iz rodu Garcinia, ki se prodaja.
    mannequin_style:
      name: Stil lutke
      description: Opisuje strukturno zasnovo ali stil izdelave vadbene lutke.
    manufacturing_process:
      name: Proizvodni proces
      description: Glavna proizvodna metoda ohišja role ali tuljave (npr. CNC-obdelano,
        tlačno lito).
    map_coverage_sky_planet_body:
      name: Pokritost karte (nebo/planetarno telo)
      description: 'Označuje, kaj karta prikazuje: nočno nebo (ozvezdja) ali določeno
        planetarno telo.'
    map_format:
      name: Format karte
      description: Določa fizično ali digitalno predstavitev lovskih kart in vodnikov.
    map_sensor_output_signal_type:
      name: Vrsta izhodnega signala senzorja MAP
      description: Navaja vrsto izhodnega signala, ki ga senzor absolutnega tlaka
        v sesalnem kolektorju (MAP) zagotavlja motorni elektronski enoti (ECU).
    map_size_sheet:
      name: Velikost karte (list)
      description: Navaja končno velikost lista karte/plakata/planisfere za lažjo
        oceno združljivosti in razstavljanja (velikost okvirja, stenski prostor).
    marabou_feather_form:
      name: Oblika marabu peresa
      description: Oblika izdelka iz marabu peres, kot se prodaja.
    marabou_feather_treatment:
      name: Obdelava marabu peresa
      description: Kako je bilo marabu pero obdelano ali dokončano za uporabo pri
        ustvarjanju.
    marble_track_set_feature_modules:
      name: Funkcionalni moduli kompleta steze za frnikole
      description: Izpostavlja posebne funkcionalne module, ki so vključeni v komplet
        (npr. dvigalo, lansirnik, kretnice).
    marine_flare_certification_standard:
      name: Certifikat/standard pomorske signalne rakete
      description: Označuje, katere pomorske varnostne certifikate ali standarde signalna
        raketa izpolnjuje.
    marine_safety_standard_compliance:
      name: Skladnost s pomorskimi varnostnimi standardi
      description: Označuje, katere uradne standarde ali odobritve za varnost na vodi
        ta dodatek izpolnjuje.
    marine_transmission_type:
      name: Vrsta navtičnega menjalnika
      description: Navaja vrsto pomorskega menjalnika/pogona, povezanega z vgrajenim
        motorjem (npr. neposredni pogon nasproti V-pogonu).
    marker_action_type:
      name: Vrsta delovanja markerja
      description: Opisuje osnovni mehanizem sprožitve/delovanja markerja.
    marker_caliber:
      name: Kaliber markerja
      description: Navaja premer paintball kroglic, za streljanje katerih je marker
        zasnovan.
    marking_durability:
      name: Obstojnost oznake (talne označbe)
      description: Označuje, kako dolgo naj bi naslikana/vrisana linija ostala vidna
        v normalnih razmerah, kot na primer začasna (do 3 tedne), polobstojna (do
        6 mesecev) ali obstojna (več kot 6 mesecev).
    marking_tip_type:
      name: Vrsta pisalne konice
      description: Vrsta označevalnega vložka, ki ga šestilo uporablja za risanje
        (npr. držalo za mino nasproti črnilu nasproti konici za praskanje/zarisovanje)
    marshmallow_processing_method:
      name: Način predelave penastih bonbonov
      description: Opisuje katero koli posebno predelavo penastih bonbonov, kar vpliva
        na teksturo, rok uporabnosti ali okus.
    marshmallow_size:
      name: Velikost penastih bonbonov
      description: Razvršča relativno velikost penastih bonbonov.
    martial_arts_belt_rank:
      name: Stopnja (čin) pasu v borilnih veščinah
      description: Označuje raven veščine/stopnje, ki jo predstavlja barva pasu ali
        posebna barvna kombinacija.
    mask_bib_type:
      name: Vrsta podbradnika maske
      description: Navaja vrsto podbradnika na sabljaški maski, kot so standardno
        platno, prevodni material, odstranljivi podbradnik ali različica brez njega.
    mask_cage_material:
      name: Material mrežice maske
      description: Material, uporabljen specifično za obrazno mrežico ali okvir maske.
    mask_goggle_design:
      name: Zasnova maske/očal
      description: Določa splošno strukturno zasnovo ali stil pokritosti zaščitne
        opreme.
    mask_skirt_material:
      name: Material obrobe maske
      description: Opredeljuje material mehkega robnega tesnila, ki zagotavlja vodotesno
        tesnjenje med masko in obrazom.
    mask_strap_material:
      name: Material traku maske
      description: Navaja material traku, ki pritrjuje masko na glavo.
    mass_air_flow_sensor_measurement_type:
      name: Vrsta merjenja senzorja masnega pretoka zraka
      description: Navaja tehnologijo zaznavanja/format izhoda, ki ga uporablja senzor
        masnega pretoka zraka (MAF).
    mass_air_flow_sensor_mounting_type:
      name: Vrsta montaže senzorja masnega pretoka zraka (MAF)
      description: Kako je senzor ali sklop senzorja MAF nameščen/nameščen v sesalnem
        sistemu.
    massage_feature:
      name: Funkcija masaže
      description: Označuje, ali nastavljivo podnožje vključuje integrirano funkcijo
        masaže in, če jo, koliko masažnih con zagotavlja.
    mast_attachment_interface:
      name: Vmesnik za pritrditev jamborja
      description: Navaja standard povezave med trupom (fuselage) in jamborjem, kar
        kupcem pomaga zagotoviti združljivost komponent.
    mast_base_type:
      name: Vrsta podnožja jamborja
      description: Opredeljuje montažni vmesnik, ki povezuje jambor z desko ali adapterjem.
    mast_bend_curve:
      name: Krivulja upogiba jamborja
      description: Vzorec upogibanja jamborja, ki določa združljivost z jadrom in
        vodljivost.
    mast_diameter_type:
      name: Vrsta premera jamborja
      description: Standardizirana klasifikacija premera jamborja za jadranje na deski
        (npr. RDM, SDM, MDM), ki se uporablja za preverjanje združljivosti.
    mat_backing_type:
      name: Vrsta hrbtne strani podloge
      description: Navaja vrsto hrbtne strani na spodnji strani podloge, ki jo pomaga
        obdržati na mestu na različnih površinah.
    mat_installation_method:
      name: Način namestitve blazine ali predpražnika
      description: Označuje, kako se podloga namesti ali pritrdi na mesto.
    mat_style:
      name: Slog podloge
      description: Določa strukturni stil ali obliko podloge (npr. zložljiva podloga,
        plošča s sestavljivim robom, varovalna blazina).
    maternity_panel_type:
      name: Vrsta nosečniškega vložka
      description: Označuje stil elastičnega vložka ali pasu, zasnovanega za prilagajanje
        rasti med nosečnostjo.
    maternity_waistband_style:
      name: Stil nosečniškega pasu
      description: Označuje zasnovo in položaj pasu ali trebušnega vložka, značilnega
        za nosečniške hlače, ter opisuje, kako oblačilo podpira rastoči trebušček.
    mattress_top_type:
      name: Vrsta vrhnjega dela vzmetnice
      description: Navaja stil vrhnje plasti ali površinske zgradbe vzmetnice, kot
        je nadvložek ali čvrst rob.
    maturation_vessel_material:
      name: Material posode za zorenje
      description: Navaja glavni material posode ali soda, uporabljenega za staranje
        žgane pijače šoču.
    maximum_quilt_size_supported:
      name: Največja podprta velikost prešite odeje
      description: Največja velikost prešite odeje/projekta, ki jo okvir lahko sprejme
        (običajno opisano z velikostmi postelj ali največjo širino).
    meal_course:
      name: Hod obroka
      description: Opredeljuje običajno priložnost obroka za ta izdelek (npr. predjed,
        glavna jed).
    meal_preparation_state:
      name: Stanje priprave obroka
      description: Označuje, kolikšna priprava je potrebna pred zaužitjem (npr. pripravljeno
        za uživanje, komplet za pripravo obroka).
    meat_processing_state:
      name: Stanje predelave mesa
      description: Označuje stopnjo toplotne obdelave ali sušenja/zorenja, uporabljeno
        na mesnem izdelku pred prodajo.
    meat_quality_grade:
      name: Kakovostni razred mesa
      description: Označuje kakovostni razred ali klasifikacijo, ki jo mesu dodeli
        priznani ocenjevalni organ (npr. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Trditev o načinu reje mesa
      description: Izpostavlja splošne trditve o dobrobiti živali ali kmetijski praksi,
        povezane z mesom (npr. krmljeno s travo, prosta reja).
    mechanical_loom_assembly_status:
      name: Stanje sestavljenosti mehanske statve
      description: Kako se statve pošljejo ali dostavijo glede na zahtevano stopnjo
        sestavljanja.
    mechanical_loom_weaving_type:
      name: Vrsta tkanja mehanske statve
      description: Glavni mehanizem oziroma vrsta tkanja, ki jo statve podpirajo.
    mechanical_puzzle_primary_mechanism:
      name: Glavni mehanizem mehanske sestavljanke
      description: Glavna interakcija/mehanizem, ki se uporablja za reševanje mehanske
        sestavljanke.
    mechanical_puzzle_solution_format:
      name: Format rešitve mehanske sestavljanke
      description: Format, v katerem so priloženi namigi/rešitve, če so vključeni.
    medal_attachment_style:
      name: Stil pritrjevanja medalje
      description: Navaja, kako je medalja predvidena za nošenje ali razstavljanje
        (npr. ovratni trak, pripenjanje z buciko).
    medal_award_level:
      name: Stopnja nagrade medalje
      description: Navaja stopnjo nagrade, ki jo medalja predstavlja (npr. 1. mesto,
        udeleženec).
    medal_finish:
      name: Površinska obdelava medalje
      description: Navaja površinsko obdelavo medalje (vizualni sijaj/teksturo), neodvisno
        od materiala.
    medal_packaging:
      name: Embalaža medalje
      description: Označuje vrsto predstavitvene embalaže, ki je priložena medalji.
    melodica_accessory_set_included:
      name: Vključen komplet dodatkov za melodiko
      description: Kateri splošni dodatki so vključeni v paket za melodiko.
    melodica_air_chamber_material:
      name: Material zračne komore melodike
      description: Material zračne komore/trupa melodike (ABS, les itd.), kadar prodajalci
        to razlikujejo od ostalih delov.
    melodica_included_accessories:
      name: Vključeni dodatki k melodiki
      description: Dodatki, priloženi k melodiki v škatli.
    melodica_key_color_scheme:
      name: Barvna shema tipk melodike
      description: Barvna shema tipk (ne trupa), kar vpliva na čitljivost (zlasti
        za otroke/začetnike).
    melodica_mouthpiece_configuration:
      name: Konfiguracija ustnika melodike
      description: Označuje, kateri pihalni vmesnik(-i) je vključen/se uporablja za
        igranje melodike.
    melodica_mouthpiece_type:
      name: Vrsta ustnika melodike
      description: Stil pihalnega vmesnika, priloženega k melodiki (ustnik in/ali
        upogljiva cev).
    melodica_reed_plate_material:
      name: Material piskovne plošče melodike
      description: Material piskovne ploščice (ločen od splošnega materiala trupa
        instrumenta), ki lahko vpliva na vzdržljivost in ton
    melodica_size_class:
      name: Razred velikosti melodike
      description: Splošni razred velikosti/prenosljivosti za melodiko, ki običajno
        temelji na skupinah glede na število tipk in obliko (npr. mini/za učence nasproti
        standardnim modelom ali modelom z razširjenim razponom).
    melon_variety:
      name: Sorta melon
      description: Navaja specifično vrsto melone v izdelku, kar kupcem pomaga hitro
        prepoznati njihovo želeno sorto.
    memory_foam_infusion_material:
      name: Material za prepojitev spominske pene
      description: Opredeljuje posebne snovi, s katerimi je prepojena spominska pena
        za hlajenje, nadzor vonja ali antimikrobne namene.
    memory_wire_gauge:
      name: Debelina žice s spominom oblike
      description: Navaja velikost žice s spominom oblike po ameriškem merilu za premer
        žic (AWG).
    memory_wire_project_size:
      name: Velikost projekta z žico s spominom oblike
      description: Navaja predvideno obliko nakita ali velikost zavoja, za katero
        je žica s spominom oblike ukrivljena (npr. zapestnica, ogrlica, prstan).
    metal_purity:
      name: Čistost kovine
      description: Označuje stopnjo finosti ali čistosti kovine, uporabljene v nakitu,
        običajno izraženo v karatih (K) ali tisočinkah.
    metrics_counted:
      name: Štete metrike
      description: Navaja posamezne statistične podatke ali dogodke, ki jih je števec
        zasnovan spremljati.
    metronome_display_style:
      name: Stil prikaza metronoma
      description: Navaja, kako se tempo prikazuje/označuje uporabniku (kazalec/nihalo
        nasproti številčnemu LED/LCD zaslonu nasproti utripajoči lučki).
    metronome_output_method:
      name: Način izhoda metronoma
      description: Navaja razpoložljive načine izhoda za zvok metronoma ali signal
        ritma.
    microphone_toy_feature_set:
      name: Komplet funkcij igrače z mikrofonom
      description: Ključne igralno usmerjene zmožnosti mikrofona za igrače mikrofone
        (glasovni učinki, ojačitev zvoka, snemanje itd.).
    midi_output_type:
      name: Vrsta izhoda MIDI
      description: Navaja vrsto(-e) MIDI izhoda, ki ga zagotavlja sprožilni modul.
    military_branch:
      name: Vojaški rod
      description: Opredeljuje vojaški rod, za katerega je uniforma izdana ali po
        katerem je navdihnjena.
    milk_base_type:
      name: Vrsta mlečne osnove
      description: Navaja primarno mleko ali mlečni nadomestek, uporabljen v pijači,
        če je prisoten.
    milk_feeding_method:
      name: Način krmljenja za proizvodnjo mleka
      description: Označuje, kako so bile krmljene živali (npr. krmljene s travo ali
        krmljene z žitom), kar lahko vpliva na okus in prehranski profil.
    milk_processing_method:
      name: Metoda predelave mleka
      description: Navaja obdelavo ali tehniko predelave, ki jo je mleko prestalo,
        kar vpliva na varnost, rok uporabnosti in prehranske lastnosti.
    milk_source_animal:
      name: Živalski vir mleka
      description: Opredeljuje žival, od katere je bilo mleko pridobljeno, kar potrošnikom
        pomaga izbrati kravje, kozje, bivolje ali drugo živalsko mleko.
    millet_processing_method:
      name: Metoda predelave prosa
      description: Označuje primarni način predelave ali stanje prosenega zrna (npr.
        nepolirano, oluščeno, kaljeno).
    millet_variety:
      name: Sorta prosa
      description: Opredeljuje specifično vrsto prosenega zrna v izdelku (npr. krevljasto,
        lisičjerepe, prstasto proso).
    milling_process:
      name: Postopek mletja
      description: Označuje proizvodno metodo, uporabljeno za mletje moke/zdroba,
        kar lahko vpliva na okus, izpostavljenost toploti in prehranski profil.
    mint_mark:
      name: Oznaka kovnice
      description: Oznaka kovnice, kot je prikazana na kovancu (če je primerno).
    mirror_configuration:
      name: Konfiguracija ogledal
      description: Navaja stil ali strukturo ogledala, ki je vključeno v toaletni
        komplet.
    mirror_coverage:
      name: Pokritost z ogledali
      description: Opisuje obseg zrcalnih površin na drsnih vratih.
    mirror_curvature_type:
      name: Vrsta ukrivljenosti ogledala
      description: Navaja, ali je površina ogledala izbočena (konveksna), ravna ali
        vdolbena (konkavna), kar vpliva na vidno polje.
    mirror_mounting_location:
      name: Mesto montaže ogledala
      description: Navaja, kje na kolesu ali kolesarju je ogledalo predvideno za namestitev.
    mirror_shape:
      name: Oblika ogledala
      description: Označuje geometrijsko obliko ali stil glavnega ogledala, vključenega
        v toaletni komplet.
    mix_ratio:
      name: Mešalno razmerje
      description: Navaja priporočeno razmerje redčenja hladilne tekočine z vodo (za
        koncentrate) ali potrjuje fiksno razmerje predmešanice za predhodno razredčene
        izdelke.
    mma_glove_type:
      name: Vrsta rokavic za MMA
      description: Označuje primarni predvideni namen uporabe ali stil rokavic znotraj
        treninga ali tekmovanja MMA.
    mobility_features:
      name: Lastnosti mobilnosti
      description: Označuje vgrajene elemente za premikanje ali prenosljivost, kot
        so kolesca ali zložljive noge.
    model_aircraft_assembly_level:
      name: Stopnja sestavljenosti modela letala
      description: Označuje, kolikšna stopnja sestavljanja je potrebna, preden se
        letalo lahko uporabi.
    model_making_kit_items_included:
      name: Vključeni predmeti v kompletu za maketarstvo
      description: Navaja, kaj je vključeno v komplet ali paket za maketarstvo (npr.
        barva, lepilo, čopič).
    model_making_product_type:
      name: Vključeni predmeti v kompletu za maketarstvo
      description: Opredeljuje, kaj izdelek v osnovi je znotraj maketarstva (komplet,
        dodatek, orodje ali material), kar izboljšuje brskanje in filtriranje med
        mešanimi vrstami izdelkov znotraj maketarstva.
    model_rocket_kit_contents:
      name: Vsebina kompleta modela rakete
      description: Označuje, ali je izdelek celoten komplet večstopenjske modelne
        rakete ali pa komplet dodatkov/modulov/delov (npr. komponente potisne ali
        glavne stopnje).
    model_rocket_kit_format:
      name: Format kompleta modelarske rakete
      description: Navaja, ali se raketa prodaja kot komplet, in stopnjo pripravljenosti
        na sestavljanje.
    model_rocket_motor_impulse_class:
      name: Razred impulza motorja modelne rakete
      description: Označuje standardizirani razred celotnega impulza motorja modelne
        rakete (npr. A, B, C ...).
    model_rocket_motor_mount_size:
      name: Velikost nosilca motorja modelne rakete
      description: Navaja premer ohišja motorja, ki ga je nosilec motorja na raketi
        zasnovan sprejeti.
    model_rocket_power_source_required:
      name: Potreben vir napajanja modelne rakete
      description: Označuje, ali izdelek potrebuje baterije oziroma zunanje napajanje
        in kakšne vrste.
    model_rocket_propellant_type:
      name: Vrsta raketnega goriva za model
      description: Opredeljuje pogonsko gorivo/motorne sistem, uporabljen za pogon
        pri izdelkih modelnih raket.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Priporočena velikost lansirne palice ali tirnice za modelno raketo
      description: Navaja premer lansirne palice ali velikost tirnice, za katero je
        raketa zasnovana (npr. 1/8-palčna palica, lansirna tirnica 1010).
    model_rocket_recovery_method:
      name: Vrsta sistema za pristanek (reševanje) modelne rakete
      description: Glavni sistem za reševanje, ki se uporablja za varno vrnitev rakete
        po poletu.
    model_rocket_recovery_system_type:
      name: Tip sistema za reševanje modelne rakete
      description: Navaja glavni način reševanja, ki se uporablja za varno vrnitev
        rakete po poletu.
    model_rocket_staging:
      name: Stopnjevitost modelne rakete
      description: Označuje, s koliko pogonskimi stopnjami je modelna raketa zasnovana
        leteti.
    model_train_accessory_electrical_connection_type:
      name: Vrsta električnega priključka dodatkov za modele vlakov
      description: Navaja stil priključka ali terminala, ki se uporablja za povezavo
        električnih dodatkov modelov vlakov na maketo (kadar je to primerno).
    model_train_coupler_type:
      name: Vrsta sklopke modela vlaka
      description: Navaja standard sklopke, nameščene na voznem parku ali lokomotivi
        modela vlaka.
    model_train_gauge:
      name: Širina tiru modela laka
      description: Navaja sistem tirne širine modelne železnice, za katerega je dodatek
        predviden (kadar je to primerno), kar pomaga zagotoviti fizično združljivost
        s kolesi in maketo uporabnika.
    model_train_lighting_features:
      name: Lastnosti osvetlitve modela vlaka
      description: Navaja funkcionalnost osvetlitve, ki je vključena na modelu vlaka/lokomotive.
    model_train_power_pickup_method:
      name: Način odjema toka modela vlaka
      description: Navaja, kako model prejema energijo za delovanje (napajanje preko
        tirnic, baterija itd.).
    model_train_scale:
      name: Merilo modela vlaka
      description: Navaja standard merila/velikosti modela vlaka (razmerje med modelom
        in pravim vlakom).
    model_train_sound_features:
      name: Zvočne lastnosti modela vlaka
      description: Označuje, ali model vključuje vgrajene zvočne učinke in kakšne
        vrste je zvočna ponudba.
    model_train_track_gauge:
      name: Tirna širina modela vlaka
      description: Navaja standard tirne širine/tirnega sistema, po katerem je model
        zasnovan voziti (npr. standardna tirna širina, različice ozkotirne železnice
        ali za določene blagovne znamke/sisteme specifične tirne širine, kjer je to
        primerno).
    modeling_dough_base_material:
      name: Lastnosti mase za oblikovanje
      description: Ključne funkcionalne značilnosti mase za oblikovanje, po katerih
        kupci običajno filtrirajo.
    modeling_dough_features:
      name: Stopnja modifikacije
      description: Ključne funkcionalne značilnosti mase za oblikovanje, po katerih
        kupci običajno filtrirajo.
    modification_level:
      name: Stopnja modifikacije (razgradnje slada)
      description: Označuje stopnjo modifikacije slada (kako temeljito so razgrajeni
        endosperm/proteini ječmena), pogosto povzeto kot nezadostno modificiran/modificiran/prekomerno
        modificiran.
    molasses_base_ingredient:
      name: Osnovna sestavina melase
      description: Opredeljuje primarni rastlinski ali sadni vir, iz katerega je melasa
        proizvedena.
    molasses_grade:
      name: Razred (kakovost) melase
      description: Razvršča melaso po stopnji ekstrakcije/rafiniranja, Microsoft kar
        neposredno vpliva na intenzivnost okusa, barvo in prehranski profil.
    mold_material:
      name: Material kalupa
      description: Glavni materialni sestav samih modelov (npr. silikon, plastika,
        kovina).
    molle_compatibility:
      name: Združljivost s sistemom MOLLE
      description: Označuje, ali telovnik ponuja MOLLE/PALS sistem trakov za pritrjevanje
        modularnih torbic in dodatkov.
    motor_belt_type:
      name: Vrsta pogonskega jermena motorja
      description: Določa zasnovo/profil jermena, uporabljenega v pogonskem sistemu
        tekalne steze.
    motor_configuration:
      name: Konfiguracija motorja
      description: Označuje, koliko neodvisnih pogonskih motorjev uporablja skuter.
    motor_mounting_configuration:
      name: Konfiguracija nosilcev motorja
      description: Opisuje, kako je motor nameščen/vgrajen v kompletu za predelavo
        skuterja.
    motor_mounting_position:
      name: Položaj namestitve motorja
      description: Označuje, kje na električnem skuterju je motor nameščen, kot so
        prednje pesto, zadnje pesto, obe mesti ali sredinski pogon.
    motor_position:
      name: Položaj motorja
      description: Označuje, kje na električnem kolesu se nahaja motor, kar vpliva
        na vodljivost in vzdrževanje.
    motor_vehicle_a_v_integration_features:
      name: Lastnosti avdio-video (A/V) integracije motornega vozila
      description: Lastnosti integracije pametnega telefona in vozila, ki jih podpira
        glavna enota (npr. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Namen uporabe/položaj žarnice motornega vozila
      description: Navaja predvideni položaj osvetlitve vozila ali funkcijo, za katero
        je žarnica zasnovana (npr. kratke luči, zavorna luč).
    motor_vehicle_bulb_approval_standard:
      name: Standard odobritve žarnice motornega vozila
      description: Označuje zakonsko skladnost/oznako odobritve za amazon uporabo
        v cestnem prometu na ciljnem trgu.
    motor_vehicle_oxygen_sensor_bank:
      name: Vrstica senzorja kisika motornega vozila
      description: Označuje, na katero vrsto valjev (banko) motorja se prilega lambda
        sonda (npr. banka 1 nasproti banki 2 pri V-motorjih/protipotnih-boxer motorjih;
        pri vrstnih motorjih se uporabi »Ni določljivo«).
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Položaj lambda sonde motornega vozila
      description: Število žic v kabelskem snopu lambda sonde.
    motor_vehicle_oxygen_sensor_position:
      name: Položaj lambda sonde motornega vozila
      description: Navaja, kje v izpušnem sistemu je nameščena lambda sonda (O2) glede
        na katalizator.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Navaja zasnovo/tehnologijo lambda sonde.
      description: Označuje številko senzorja (npr. senzor 1 ali senzor 2) znotraj
        določene oznake banke/položaja.
    motor_vehicle_oxygen_sensor_type:
      name: Vrsta senzorja kisika motornega vozila
      description: Navaja zasnovo/tehnologijo lambda sonde.
    motor_vehicle_paint_application_method:
      name: Način nanašanja barve motornega vozila
      description: Kako je barva predvidena za nanos na površino vozila.
    motor_vehicle_paint_system_step:
      name: Korak sistema barvanja motornega vozila
      description: Označuje, za kateri korak ali komponento avtomobilskega sistema
        ličenja je izdelek predviden (npr. osnovni premaz, barvni podlaga, brezbarvni
        lak).
    motor_vehicle_speaker_mounting_type:
      name: Vrsta montaže zvočnika motornega vozila
      description: Kako je zvočnik predviden za vgradnjo v vozilo (oblika montaže).
    motor_vehicle_subwoofer_size:
      name: Velikost nizkotonskega zvočnika motornega vozila
      description: Nominalni premer nizkotonskega zvočnika (npr. 8 palcev, 10 palcev,
        12 palcev), ki se uporablja za uskladitev s prostorom v vozilu in združljivostjo
        z ohišjem.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguracija zvočne tuljave nizkotonca motornega vozila
      description: Število/konfiguracija zvočnih tuljav, ki se uporablja za uskladitev
        z možnostmi ožičenja ojačevalnika (npr. enojna tuljava/SVC nasproti dvojni
        tuljavi/DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedanca zvočne tuljave nizkotonca motornega vozila (na tuljavo)
      description: Nazivna vrednost impedance posamezne zvočne tuljave (ne končna
        upornost ožičenja), ki se uporablja za izračune vezave.
    motor_vehicle_voltage_regulator_type:
      name: Vrsta regulatorja napetosti motornega vozila
      description: Označuje tehnologijo/obliko regulatorja napetosti, ki se uporablja
        v motornih vozilih.
    motorcycle_armor_certification_standard:
      name: Certifikacijski standard za motoristično zaščitno opremo
      description: Označuje uradni varnostni standard ali standarde, za izpolnjevanje
        katerih je ščitnik certificiran (npr. EN 1621-2 za ščitnike hrbta, EN 1621-3
        za ščitnike prsnega koša).
    motorcycle_cover_size_class:
      name: Razred velikosti ponjave za motorno kolo
      description: Standardiziran razred velikosti za zaščitne ponjave za shranjevanje
        motornih koles na podlagi običajne kategorije oziroma dolžinskega razpona
        motorja, ki mu ustreza.
    motorcycle_glove_certification_standard:
      name: Standard certifikacije motorističnih rokavic
      description: Navaja zaščitni certifikat/standard, ki ga rokavice izpolnjujejo
        (npr. ravni EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Vodoodporna izdelava motorističnih rokavic
      description: Navaja vrsto metode vodoodpornosti, uporabljene pri rokavicah (če
        je prisotna).
    motorcycle_guard_coverage_area:
      name: Območje pokritosti ščitnika za motoriste
      description: Glavno območje pokritosti, ki ga izdelek zagotavlja (komolec, zapestje,
        podlaket, kombinacija).
    motorcycle_kidney_belt_construction_type:
      name: Namen motorističnega ledvenega pasu
      description: Stil izdelave ledvenega pasu, kar vpliva na togost, pretok zraka
        in zaščito.
    motorcycle_kidney_belt_purpose:
      name: Namen ledvičnega pasu za motorno kolo
      description: Opredeljuje primarni stil vožnje ali scenarij, za katerega je motoristični
        ledveni pas zasnovan.
    motorcycle_luggage_capacity_class:
      name: Razred prostornine prtljage za motorna kolesa
      description: Označuje prostornino prtljage za motorna kolesa, izraženo v litrih.
    motorcycle_luggage_mounting_system:
      name: Sistem montaže prtljage za motorna kolesa
      description: Sistem pritrjevanja/montaže, ki se uporablja za zavarovanje torbe/stranskega
        kovčka na motorno kolo (npr. trakovi za namestitev preko sedeža, hitri izpenjalec
        z montažo na prtljažnik).
    motorcycle_luggage_side:
      name: Stran prtljage za motorno kolo
      description: Pri stranskih kovčkih/bisagah označuje, ali je izdelek namenjen
        za levo stran, desno stran ali pa gre za par/komplet.
    motorcycle_protective_gear_size_system:
      name: Sistem velikosti motoristične zaščitne opreme
      description: Označuje sistem velikosti, uporabljen na izdelku (npr. črkovne
        oznake/alpha sizing, številčne oznake, ena velikost).
    motorcycle_rack_carrier_style:
      name: Stil prtljažnika (nosilca) za motorna kolesa
      description: Opisuje funkcionalni stil nosilca za prevoz motornega kolesa ali
        skuterja (platforma nasproti tirnici nasproti nosilcu z dvižno pomočjo itd.).
    motorcycle_riding_discipline:
      name: Kategorija vožnje z motornim kolesom
      description: Opredeljuje glavno disciplino vožnje/uporabe, za katero je zaščita
        za vrat zasnovana.
    motorcycle_tire_speed_rating:
      name: Indeks hitrosti motoristične pnevmatike
      description: Opredeljuje največjo trajno hitrost, za katero je pnevmatika odobrena,
        z uporabo standardne črkovne kode (npr. H, V, W).
    motorsport_window_net_certification:
      name: Certifikat varovalne mreže za okno v motošportu
      description: Varnostni certifikat za dirkanje ali homologacija, ki jo varovalna
        mreža za okno izpolnjuje (npr. SFI ali FIA), vključno s številko specifikacije,
        kjer je to primerno.
    mound_usage_type:
      name: Vrsta uporabe nasipa
      description: Opredeljuje predvideno okolje uporabe nasipa, kot so vadba, tekma,
        ogrevalni prostor ali večnamenska uporaba.
    mount_attachment_method:
      name: Način pritrditve nosilca
      description: Navaja, kako se nosilec pritrdi na površino/strukturo vozila.
    mountainboard_truck_type:
      name: Vrsta podvozja za mountainboard
      description: Razvršča stil podvozij, vključenih v komplet z desko, kar vpliva
        na odzivnost pri zavijanju in vzdržljivost.
    mounting_attachment_method:
      name: Način montaže/pritrjevanje
      description: Kako je držalo/torba zasnovana za pritrditev na boben, stojalo,
        pas ali drugo površino.
    mounting_attachment_type:
      name: Vrsta montaže/pritrditve
      description: Kako se dodatek za razmerje pritrdi ali poveže s predeno-sukalnim
        kolesom.
    mounting_hardware_included_for_installation:
      name: Vključena strojna oprema za montažo
      description: Označuje, ali je strojna oprema za montažo, potrebna za namestitev
        zadnjega sedeža (npr. nosilci, vijaki, tirnice), priložena izdelku.
    mounting_location:
      name: Lokacija namestitve
      description: Navaja predvideno območje namestitve luči/odsevnika na opremi ali
        telesu (npr. prednje vilice, čelada, naperki kolesa).
    mounting_method:
      name: Način namestitve
      description: Kako se držalo za palčke/krtačke montira ali pritrdi (npr. s sponko,
        s trakom, z lepilom).
    mounting_position:
      name: Položaj montaže
      description: Navaja, kje v kabini vozila je predvideno mesto za montažo/vgradnjo
        ročice ročne zavore.
    mounting_rail_type:
      name: Vrsta montažne tračnice
      description: Navaja standard tračnice ali vmesnika, na katerega se dodatek pritrdi,
        kot sta Picatinny ali M-LOK.
    mounting_receiver_size:
      name: Velikost montažnega priklopa
      description: Velikost odprtine vlečne kljuke (priklopa), ki je potrebna za prtljažnike
        za tovor, nameščene na kljuko.
    mounting_storage_type:
      name: Vrsta montaže/shranjevanja
      description: Kako je naprava predvidena za montažo ali shranjevanje na plovilu
        oziroma osebi.
    mouth_grip_type:
      name: Vrsta ustnega oprijema
      description: Opisuje vrsto ustnega oprijema ali zaščite na piščali za večje
        udobje in higieno.
    mouthguard_mold_type:
      name: Vrsta oblikovanja ščitnika za zobe
      description: Opisuje, kako se ščitnik za zobe prilagodi športnikovim zobem (npr.
        s segrevanjem in ugrizom/boil-and-bite, po meri izdelan zobni ščitnik.
    mouthpiece_facing_length:
      name: Dolžina naležne površine ustnika
      description: Označuje kategorijo dolžine zakrivljenosti naležne površine ustnika
        (ne celotne dolžine ustnika), kar vpliva na odzivnost, upornost in združljivost
        z jezičkom.
    mouthpiece_material:
      name: Material ustnika
      description: Navaja material dela ustnika/konice praznične piščalke (party blower),
        ki je v stiku z usti in se lahko razlikuje od materiala glavnega trupa.
    mouthpiece_shank_receiver_size:
      name: Velikost stebla/sprejemnika ustnika
      description: Navaja standard sprejemnika/stebla ustnika, ki je združljiv s krilovko.
    mouthpiece_shank_size:
      name: Velikost stebla ustnika
      description: Navaja standard prileganja stebla/sprejemnika ustnika, da se zagotovi
        združljivost s predvidenim trobilom.
    mouthpiece_shank_type:
      name: Vrsta stebla ustnika
      description: Navaja standard sprejemnika/stebla ustnika za združljivost (kjer
        je to primerno).
    mouthpiece_style:
      name: Stil ustnika
      description: Razvršča zasnovo/obliko ustnega dela stroge brzde, kar vpliva na
        točke pritiska, ostrino in preference konja.
    mouthpiece_type:
      name: Vrsta ustnika
      description: Vrsta ustnika na pihalnem koncu (vgrajeni, odstranljivi ali dodani
        modeli).
    movement_mechanism:
      name: Mehanizem premikanja
      description: Določa, kako se klop premika med uporabo (nihanje, drsenje, zibanje
        itd.).
    muffin_size:
      name: Velikost kolačka
      description: Razvršča fizični format velikosti kolačka (npr. mini, standardni,
        jumbo).
    mushroom_variety:
      name: Raznolikost gob
      description: Opredeljuje specifično vrsto ali sorto gobe ali kaviarja/tartufa
        v izdelku (npr. šitake, kraljevi ostrigar, črni tartuf).
    music_stand_desk_tilt_adjustment:
      name: Nastavljanje nagiba pulta stojala za note
      description: Označuje, ali in kako se lahko kot pulta prilagodi.
    music_stand_intended_use:
      name: Predviden namen uporabe stojala za note
      description: Označuje primarno predvideno okolje oziroma primer uporabe za stojalo.
    musical_block_pitch_type:
      name: Vrsta višine tona tolkalnega bloka
      description: Opisuje, ali tolkalni blok proizvaja določeno višino tona (uglašen)
        ali nedoločeno višino tona.
    musical_box_mechanism_type:
      name: Vrsta mehanizma glasbene skrinjice
      description: Kako glasbena skrinjica proizvaja/predvaja zvok (npr. mehanizem
        na navijanje nasproti elektronskemu predvajanju).
    musical_keyboard_case_fit_type:
      name: Vrsta prileganja kovčka za glasbene klaviature
      description: Opisuje, kako je velikost kovčka prilagojena instrumentu (npr.
        univerzalno/splošno območje velikosti nasproti specifičnemu modelu/prilagoditvi
        po meri).
    musical_ratchet_sound_character:
      name: Zvočni značaj glasbene raglje
      description: Splošni opis barve zvoka/značaja glasnosti raglje.
    musical_scraper_groove_surface_material:
      name: Material narebrene površine glasbenega strgala
      description: Navaja material narebrene/žlebičaste površine za strganje (lahko
        se razlikuje od materiala trupa).
    musical_scraper_type:
      name: Vrsta glasbenega strgala
      description: Navaja stil/zasnovo glasbenega strgala (npr. guiro nasproti instrumentu
        reco-reco), kar vpliva na zvok in tehniko igranja.
    mute_attachment_method:
      name: Način pritrditve dušilca
      description: Navaja, kako se dušilec činele pritrdi ali drži na mestu na čineli
        (npr. gel, statični oprijem, magnet, sponka).
    mute_attenuation_level:
      name: Raven dušenja dušilca
      description: Označuje, za koliko dušilec zmanjša zaznavno glasnost, kar je še
        posebej pomembno pri dušilcih za vadbo.
    mute_cork_padding_material:
      name: Material plute/blazinjenja dušilca
      description: Navaja material kontaktnega blazinjenja dušilca (npr. plutovinasti
        trakovi/blazinice), ki se uporablja za oprijem/prileganje in zaščito odmevnika.
    mute_coverage_type:
      name: Vrsta pokritosti dušilca
      description: Označuje stil/pokritost dušilca na igralni površini, od majhnih
        točkovnih dušilcev do celopovršinskih dušilcev za vadbo.
    mute_finish:
      name: Površinska obdelava dušilca
      description: Površinska obdelava dušilca, ki lahko vpliva na vzdržljivost in
        estetiko (npr. polirano nasproti satenastemu zaključku).
    name_label_text_template:
      name: Predloga besedila imenske etikete
      description: Navaja vnaprej nastavljeno besedilo ali predlogo, natisnjeno na
        imenski etiketi (npr. »Pripada«, »Izdelal«).
    napkin_ply:
      name: Slojevitost prtička
      description: Označuje debelino koktajl serviete s številom slojev.
    neck_brace_fit_system:
      name: Sistem prileganja opornice za vrat
      description: Označuje primarno metodo, ki se uporablja za prilagajanje in pritrditev
        vratne opornice na voznika.
    neck_brace_size_basis:
      name: Osnova za velikost vratne opornice
      description: Označuje osnovo za določanje velikosti, ki se uporablja za izbiro
        pravilne velikosti vratne opornice.
    neck_configuration:
      name: Konfiguracija vratu
      description: Navaja stil/konfiguracijo loka, priloženega saksofonu, kar vpliva
        na ergonomijo in igralne lastnosti.
    neck_coverage_type:
      name: Vrsta pokritosti vratu
      description: Navaja stil pokritosti vratu, ki je priložen odeji.
    neck_support_size_system:
      name: Sistem velikosti vratne opore
      description: Označuje sistem velikosti, ki se uporablja za dirkalno vratno oporo/opornico
        (npr. odrasli, mladina ali ena velikost).
    necklace_length_type:
      name: Vrsta dolžine ogrlice
      description: Navaja običajno kategorijo dolžine ogrlice, kot sta oprijeta ali
        operna dolžina, za lažje nakupovanje glede na stiil.
    needle_balance_zone:
      name: Območje uravnoteženosti igle
      description: Označuje območje magnetne uravnoteženosti ali poloblo, za katero
        je igla kompasa umerjena, kar zagotavlja natančne odčitke po vsem svetu.
    needle_case_format:
      name: Format etuija za igle
      description: Splošna oblika organizatorja etuija za igle.
    needle_damping_type:
      name: Vrsta dušenja igle
      description: Opisuje, kako je igla kompasa stabilizirana (npr. polnjena s tekočino,
        suha ali elektronsko stabilizirana), kar vpliva na čas umiritve in vzdržljivost.
    needle_felting_needle_profile:
      name: Profil igle za polstenje
      description: Prečni prerez/profil igle za polstenje, kar vpliva na premikanje
        vlaken in končni izgled površine.
    needle_holder_features:
      name: Značilnosti držala za igle
      description: Izstopajoče funkcionalne lastnosti držala za igle.
    needle_holder_mounting_attachment_method:
      name: Način namestitve/pritrditve držala igle
      description: Kako je držalo za igle predvideno za pritrjevanje ali uporabo med
        shranjevanjem (npr. magnetno, s sponko, s trakom).
    needle_holder_style:
      name: Slog držala za iglo
      description: Fizični način shranjevanja ali stil/zasnova za prenašanje držala
        za igle.
    needle_pushing_surface_type:
      name: Vrsta potisne površine za iglo
      description: Vrsta/zasnova potisne površine za iglo na šivalni rokavici/naprstniku
        (npr. kovinska jamica, kovanec ali ojačan vložek)
    needle_requirement_beading_pattern:
      name: Zahteva po iglah (vzorec za usmerjanje s kroglicami)
      description: Vrsta/velikost igle, ki jo priporoča kroj oz. vzorec.
    needle_size_system:
      name: Sistem velikosti igel
      description: Standard velikosti, ki se uporablja za označevanje velikosti igel.
    needle_threader_compatible_needle_type:
      name: Vrsta igel, združljivih z vdevalcem sukanca
      description: Navaja, za katere vrste igel je vdevalec sukanca zasnovan (glede
        na kategorijo/uporabo igle).
    needle_threader_mechanism_type:
      name: Vrsta mehanizma vdevalca niti
      description: Vrsta embalaže vdevalca sukanca
    needle_threader_packaging_type:
      name: Kako se izdelek prodaja/pakira (posamično parkiranje v primerjavi s pakiranjem
        v kompletu).
      description: Kako se izdelek prodaja/pakira (posamezno v primerjavi z večkratnim
        pakiranjem v primerjavi s kompletom).
    needlecraft_fabric_color_family:
      name: Družina barv blaga za ročna dela
      description: Standardizirana družina barv za enakomerno tkano blago (uporablja
        se skupaj z barvo za fasetiranje).
    needlecraft_fabric_composition:
      name: Sestava blaga za ročna dela
      description: Navaja sestavo/mešanico vlaken blaga za ročna dela (npr. 100 %
        bombaž, mešanica lana in bombaža).
    needlecraft_fabric_weave_type:
      name: Vrsta tkanja blaga za ročna dela
      description: Navaja tkanje/zgradbo lanenega blaga za ročna dela (npr. enakomerno
        tkano blago nasproti klasičnemu lanu), kar vpliva na obnašanje šivov in videz.
    needlecraft_kit_items_included:
      name: Vključeni predmeti v kompletu za ročna dela
      description: Navaja glavne komponente, vključene v komplet za ročna dela (orodja
        in potrošni material).
    needlecraft_kit_project_type:
      name: Vrsta projekta kompleta za ročna dela
      description: Opredeljuje, kateri končni izdelek se ustvari s kompletom (končni
        rezultat projekta).
    needlecraft_stitching_coverage:
      name: Pokritost šivanja pri ročnih delih
      description: Označuje, ali se na blagu šiva preko 1 niti/kvadratka ali preko
        2 niti (običajno za enakomerno tkano blago in lan).
    needlepoint_canvas_mesh_count:
      name: Gostota mrežice kanvasa za gobelin
      description: Predvidena gostota mrežice kanvasa (število niti na palec), za
        katero je vzorec zasnovan
    needlepoint_frame_canvas_attachment_method:
      name: Način pritrjevanja kanvasa na okvir za gobelin
      description: Opisuje, kako se kanvas za gobelin pritrdi na okvir.
    needlepoint_frame_compatible_stand_type:
      name: Vrsta stojala, združljivega z okvirjem za gobelin
      description: Če je okvir zasnovan za montažo na stojalo, navaja vrsto oziroma
        vrste stojal, s katerimi je združljiv.
    needlepoint_frame_contents:
      name: Vsebina okvirja za gobelin
      description: Navaja, katere komponente in dodatki so priloženi okvirju za gobelin
        (npr. okvir, dodatne letvice/palice, žebljički/bucike, oprijemalni trakovi,
        torba za prenašanje).
    needlepoint_frame_tension_adjustment_type:
      name: Vrsta projekta za gobelin
      description: Označuje, kako (ali če sploh) se lahko napetost okvirja spreminja
        med uporabo.
    needlepoint_pattern_chart_format:
      name: Format sheme/grafikona vzorca za vezenje
      description: Kako je vzorec za gobelin predstavljen za šivanje (v obliki sheme/grafikona
        nasproti natisnjenemu/poslikanemu vodilu).
    needlepoint_project_type:
      name: Vrsta projekta za gobelin
      description: Predvideni končni izdelek oziroma kategorija, za katero je vzorec
        za gobelin zasnovan.
    net_design:
      name: Zasnova mreže
      description: Opredeljuje stil izdelave mreže, pri čemer označuje, ali se lahko
        zloži ali skliče za boljšo prenosljivost.
    net_mesh_pattern:
      name: Vzorec mrežnih očes
      description: Navaja geometrijsko obliko odprtin (očes) mreže, kar lahko vpliva
        na vidljivost in trdnost.
    net_twine_gauge:
      name: Debelina vrvice mreže
      description: Označuje debelino ali trdnost vrvice mreže, ki je tradicionalno
        izražena s številko debeline (npr. 18, 36).
    nicotine_source:
      name: Vir nikotina
      description: Označuje, ali je nikotin v izdelku pridobljen iz tobaka, je sintetičen,
        ali pa izdelek sploh ne vsebuje nikotina.
    nipple_drive_interface:
      name: Povezava pogona tulca
      description: Opredeljuje stil/standard vmesnika oziroma glave tulca napere (zunanji
        ali notranji), kar določa potrebno orodje in metodo centriranja/priprave kolesa.
    nock_activation_method:
      name: Način aktivacije tetivnega stikala
      description: Navaja mehanizem, s katerim se vklopi ali izklopi LED lučka na
        osvetljenem koncu puščice/tetivnem stikalu (npr. pritisk tetive, senzor gibanja,
        ročno stikalo).
    nock_fitment_code:
      name: Koda prileganja tetivnega konca
      description: Proizvajalčeva ali industrijska koda, ki opredeljuje družino/serijo,
        kateri tetivni konec pripada.
    nock_throat_size:
      name: Velikost utora tetivnega konca
      description: Navaja velikost utora tetivnega konca, ki se natakne na tetivo
        loka.
    nock_transparency_level:
      name: Stopnja prosojnosti tetivne zareze
      description: Opisuje, kako prosojen je material tetivnega konca – popolnoma
        prosojen, delno prosojen, neprosojen ali svetleč v temi – kar vpliva na vidljivost
        in estetiko.
    nock_type:
      name: Vrsta tetivnega konca
      description: Navaja zasnovo tetivnega konca, uporabljenega na puščici ali samostrelnem
        projektu, kot so pin, polmesec ali osvetljena različica.
    noise_reduction_type:
      name: Vrsta zmanjševanja hrupa
      description: Navaja tehnologijo za zmanjševanje hrupa, ki je uporabljena (ali
        ni uporabljena) v integriranih slušalkah čelade, če je to primerno.
    noise_suppression_technology:
      name: Tehnologija za zatiranje hrupa
      description: Navaja, ali izdelek uporablja pasivno dušenje ali aktivno elektronsko
        vezje, ki stisne (komprimira) glasne zvoke in/ali ojača zvoke iz okolice
    non_slip_base_features:
      name: Lastnosti protizdrsnega podnožja
      description: Označuje priložene protizdrsne lastnosti, ki preprečujejo premikanje
        pedala med nastopom.
    nose_bridge_type:
      name: Vrsta nosnega mostička
      description: Označuje zasnovo nosnega mostička, kar vpliva na prileganje različnim
        velikostim obraza.
    nose_clip_accessories_included:
      name: Vključeni dodatki za nosno sponko
      description: Navaja vse dodatne pripomočke, priložene plavalni sponki za nos
        (npr. čepki za ušesa, škatlica za shranjevanje).
    nose_clip_features:
      name: Lastnosti nosne sponke
      description: Izpostavlja splošne funkcionalne lastnosti ali lastnosti udobja
        nosne sponke.
    nose_coverage_style:
      name: Stil pokritosti nosu
      description: Označuje prisotnost in vrsto zaščitne plošče za nos ali gobec na
        maski proti muham.
    noseband_type:
      name: Vrsta nosnika (nosnega jermena)
      description: Navaja zasnovo nosnika (če je prisoten), ki je priložen uzdi.
    number_of_canvas_meshes:
      name: Število očes na platnu
      description: Velikost očes na poli plastičnega platna, izražena kot število
        lukenj na palec (HPI) ali gostota, kar določa velikost šiva in natančnost
        podrobnosti projekta.
    number_of_chainrings:
      name: Število verižnikov
      description: Označuje, koliko verižnikov je gonilka zasnovana sprejeti ali kolikor
        jih je priloženih.
    number_of_control_stations:
      name: Število krmilnih mest
      description: Označuje število krmilnih/kontrolnih postaj, ki jih podpira krmilni
        komplet (ena postaja v primerjavi z dvema postajama itd.).
    number_of_digits:
      name: Število števk
      description: Koliko števk prikazuje števec (npr. 1-mestni, 2-mestni, 3-mestni).
    number_of_guitar_slots:
      name: Število mest za kitare
      description: Označuje, za koliko kitar je kovček/torba namenjena.
    number_of_needlecraft_fabrics:
      name: Število blaga za ročna dela
      description: Navaja gostoto blaga za platno/blago za ročna dela, običajno izraženo
        kot število kvadratkov/niti na palec (npr. gostota 14).
    number_of_plastic_canvas_meshes:
      name: Število očes na plastičnem platnu
      description: Navaja gostoto očes na plastičnem platnu (lukenj na palec), kar
        določa velikost šiva in raven podrobnosti projekta.
    number_of_quilting_frame_rails:
      name: Število vodil okvirja za prešivanje
      description: Število vodil/valjev, vključenih v okvir za prešivanje (npr. sistem
        z dvema vodiloma v primerjavi s sistemom s tremi vodili).
    number_of_rope_slots:
      name: Število rež za vrv
      description: Označuje, ali je varovalo zasnovano za uporabo z enojno ali dvojno
        vrvjo.
    number_of_switch_poles:
      name: Število polov stikala
      description: Število ločenih vezij (polov), ki jih stikalo upravlja (npr. SPST,
        DPST).
    number_of_switch_throws:
      name: Število smeri stikala
      description: Število izhodnih poti (smeri) na pol (npr. SPDT).
    number_of_timing_chain_rows:
      name: Število vrst pogonske verige
      description: Označuje, ali je pogonska veriga enovrstna ali večvrstna.
    number_of_trailer_axles:
      name: Število osi prikolice
      description: Število osi na prikolici.
    number_of_wheel_pieces:
      name: Število delov platišča
      description: Navaja, ali je platišče enodelne, dvodelne ali tridelne izdelave.
    numbering_style:
      name: Slog oštevilčevanja
      description: Označuje, ali in kako so številke predhodno oštevilčene za identifikacijo
        ekipe (npr. neoštevilčeni, 1–10, po meri).
    nunchuck_connector_type:
      name: Vrsta priključka za nunčake
      description: Stil povezave med obema ročajema nunčak (npr. vrv, veriga, vrtljiva
        veriga).
    nursing_access:
      name: Vrsta dostopa za dojenje
      description: Navaja, kako oblačilo omogoča dostop do prsi za dojenje ali črpanje
        mleka.
    nursing_access_type:
      name: Vrsta dostopa za negovalce
      description: Določa, kako oblačilo omogoča dostop do dojk za dojenje ali črpanje.
    nut_butter_texture:
      name: Tekstura oreškovega masla
      description: Opisuje fizično konsistenco oreškovega masla (npr. arašidovega),
        da lahko kupci enostavno izbirajo med gladko, hrustljavo s koščki itd.
    nutrient_fortification:
      name: Obogatitev s hranilnimi snovmi
      description: Opredeljuje ključna hranila, s katerimi je napitek ali živilski
        izdelek obogaten.
    oak_product_form:
      name: Oblika hrastovega izdelka
      description: Opredeljuje fizično obliko hrasta, ki se uporablja za staranje/aromatiziranje
        izdelkov (npr. vinarstvo).
    oak_toast_level:
      name: Stopnja osmoditve hrasta
      description: Navaja stopnjo osmoditve hrastovih izdelkov.
    oboe_case_capacity:
      name: Kapaciteta kovčka za oboo
      description: Označuje, za prenašanje katerega instrumenta (ali instrumentov)
        in glavnih komponent je kovček zasnovan.
    oboe_case_carry_configuration:
      name: Konfiguracija prenašanja kovčka za oboo
      description: Označuje glavno konfiguracijo prenašanja, ki jo ponuja kovček ali
        mehka torba.
    oboe_case_design:
      name: Zasnova kovčka za oboo
      description: Razvršča zgradbo/togost kovčka ali mehke torbe za oboo (npr. trdi,
        poltrdi, mehki), kar označuje raven zaščite.
    oboe_case_internal_fit_type:
      name: Vrsta notranjega prileganja kovčka za oboo
      description: Označuje, ali je notranjost ulita za specifično konfiguracijo instrumenta
        ali pa uporablja nastavljive predele.
    oboe_keywork_plating:
      name: Premaz mehanizma s tipkami
      description: Navaja premaz/površinsko obdelavo mehanizma s tipkami oboe, ločeno
        od materiala trupa
    oboe_strap_padding:
      name: Blazinjenje traku za oboo
      description: Opisuje prisotnost/vrsto blazinjenja na kontaktnem območju traku
        oziroma podpore za večje udobje (npr. podloženo območje ramen/vrata).
    oboe_swab_style:
      name: Stil čistilne krpe za oboo
      description: Navaja funkcionalni stil/izdelavo čistilnega brisala za oboo (npr.
        prehodna krpa, obtežena svila).
    observation_window_material:
      name: Material opazovalnega okenca
      description: Navaja material gledalnih plošč/okenca (pogosto vpliva na čistost
        in vzdržljivost).
    ocarina_accessories_included:
      name: Vključeni dodatki k okarini
      description: Dodatki, priloženi okarini, kot so kovček, ovratni trak ali tabela
        prstnih redov.
    ocarina_chamber_count:
      name: Število komor okarine
      description: Označuje, koliko komor ima linijska okarina, kar vpliva na razpon
        in zahtevnost igranja (enojna/dvojna/trojna itd.).
    ocarina_fingering_system:
      name: Sistem prstnih redov za okarino
      description: Navaja sistem/standard prstnih redov, ki mu sledi obesna okarina
        (če je primerno).
    ocarina_finish_type:
      name: Vrsta površinske obdelave okarine
      description: Površinska obdelava trupa okarine, ki vpliva na občutek in estetiko.
    occupant_classification_sensor_support:
      name: Podpora senzorja za klasifikacijo potnikov
      description: Označuje, ali sedež vključuje senzor za klasifikacijo/težo potnika
        ali pa ima nastavek za prenos/namestitev originalnega (OEM) senzorja (običajno
        za prednje sedeže).
    octave_harmonica_cover_plate_material:
      name: Material pokrovne plošče oktavne ustne harmonike
      description: Material zunanjih pokrivnih plošč oktavne ustne harmonike.
    octave_harmonica_tuning_system:
      name: Sistem uglaševanja oktavne ustne harmonike
      description: Uglasitev/temperacija, uporabljena za oktavno ustno harmoniko.
    octoban_mounting_system_type:
      name: Vrsta sistema montaže oktabana
      description: Kako je oktaban montiran/postavljen med igranjem (nastavitev nosilca/nosača/stojala).
    odor_control_features:
      name: Lastnosti nadzora vonjav
      description: Označuje, ali izdelek zagotavlja funkcionalnost nevtralizacije
        vonja/dezodoriranja in s kakšnim pristopom.
    office_furniture_items_included:
      name: Vključeni kosi pisarniškega pohištva
      description: Opredeljuje specifične kose pisarniškega pohištva, vključene v
        komplet, kot sta pisalna miza ali omara za dokumente.
    oil_cooler_core_type:
      name: Vrsta jedra hladilnika olja
      description: Navaja notranjo zgradbo jedra hladilnika olja, kar vpliva na učinkovitost
        hlajenja, padec tlaka in vzdržljivost.
    oil_cooler_mounting_style:
      name: Stil montaže hladilnika olja
      description: Opisuje predvideni položaj montaže/vgradnje hladilnika olja na
        vozilu.
    oil_dipstick_component_type:
      name: Vrsta komponente merilne palice za olje
      description: Navaja, katera komponenta za merjenje nivoja olja se prodaja (npr.
        samo rezilo/palica merilnika, samo ročaj, celoten sklop, cev merilne palice
        itd.).
    oil_dipstick_measurement_markings:
      name: Merilne oznake na merilni palici za olje
      description: Navaja, katere oznake/lestvica so prisotne na merilni palici za
        odčitavanje nivoja olja.
    oil_dipstick_tube_mounting_type:
      name: Vrsta montaže cevi merilne palice za olje.
      description: Navaja, kako je cev merilne palice za olje fiksirana ali montirana
        na motor oziroma blok motorja.
    oil_drain_plug_head_drive_type:
      name: Vrsta pogona glave čepa za izpust olja
      description: Navaja vmesnik za oprijem orodja na glavi čepa za izpust olja,
        ki se uporablja za namestitev in odstranitev.
    oil_drain_plug_magnet_type:
      name: Vrsta magneta čepa za izpust olja
      description: Navaja, ali je čep za izpust olja magneten in, če je, kakšnega
        stila.
    oil_fill_cap_type:
      name: Vrsta pokrovčka za dolivanje olja
      description: Stil/vrsta vmesnika pokrovčka za nalivanje olja, ki ga uporablja
        pokrov ventilov (če je primerno).
    oil_filler_cap_attachment_type:
      name: Vrsta pritrjevanja pokrovčka za nalivanje olja
      description: Navaja, kako je pokrovček za nalivanje olja fiksiran na motorju/vratu
        za nalivanje olja (npr. z navojem, bajonetni sistem/četrtinski obrat, s stiskom.
    oil_filler_cap_installation_position:
      name: Položaj namestitve pokrovčka za nalivanje olja
      description: Navaja, kje se pokrovček uporablja, kadar obstaja več točk za nalivanje
        olja (npr. pokrov ventilov, ločena cev za nalivanje).
    oil_filler_cap_locking_type:
      name: Vrsta zaklepanja pokrovčka za dolivanje olja
      description: Navaja, ali je pokrovček za nalivanje olja brez zaklepanja ali
        pa uporablja metodo odstranjevanja z zaklepanjem/varovanjem (npr. s ključem
        ali z zahtevanim orodjem), kar pomaga preprečiti nepooblaščeno poseganje/krajo
        ali nenamerno odpiranje.
    oil_filler_cap_tether_type:
      name: Vrsta vezi pokrovčka za dolivanje olja
      description: Navaja, ali je pokrovček za nalivanje olja pritrjen s trakom/zadržan,
        da se prepreči izguba, in kakšen stil traku je uporabljen.
    oil_filler_cap_venting_type:
      name: Vrsta odzračevanja pokrovčka za nalivanje olja
      description: Navaja, ali je pokrovček odzračen, in mehanizem odzračevanja (če
        je primerno).
    oil_filter_style:
      name: Vrsta oljnega filtra
      description: Navaja obliko in stil montaže/namestitve oljnega filtra za združljivost
        z nosilcem filtra na motorju.
    oil_pan_baffle_windage_features:
      name: Lastnosti pregrad/zaščite pred pljuskanjem v oljni kadi
      description: Označuje notranje lastnosti za nadzor olja, ki so vključene v kadi.
    oil_pan_finish_coating:
      name: Končna obdelava/premaz korita za olje
      description: Opisuje površinsko obdelavo ali premaz oljne kade (barvano, prašno
        lakirano, prevlečeno, neobdelano itd.).
    oil_pressure_sensor_function_type:
      name: Vrsta funkcije senzorja tlaka olja
      description: Označuje, ali je del senzor s spremenljivim izhodom tlaka olja
        za merilnik/ECU ali pa stikalo za tlak olja (vklop/izklop), ki sproži opozorilno
        lučko.
    oil_pressure_sensor_signal_output_type:
      name: Vrsta izhodnega signala senzorja tlaka olja
      description: Navaja električni izhod oziroma stil signala, ki ga proizvaja senzor/oddajnik
        tlaka olja.
    oil_processing_method:
      name: Metoda predelave olja
      description: Navaja, kako je bilo olje pridelano ali rafinirano (npr. hladno
        stiskano, deviško, rafinirano), kar vpliva na okus, hranilno vrednost in primernost
        uporabe pri kuhanju.
    oil_pump_drive_method:
      name: Način pogona oljne črpalke
      description: Označuje, kaj poganja oljno črpalko znotraj motorja.
    oil_pump_mounting_style:
      name: Stil montaže oljne črpalke
      description: Navaja, kje in kako se oljna črpalka montira v motorju (npr. notranja
        nasproti zunanji/ločeni montaži, montaža na pokrov, montaža v oljni kadi).
    oil_system_connection_thread_standard:
      name: Standard povezovalnega navoja oljnega sistema
      description: Navaja standard navoja/povezave, ki ga vmesnik oljnega sistema
        na delu uporablja za namestitev/združljivost (npr. M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Razred viskoznosti olja
      description: Opisuje relativno gostoto olja za predenje pri rokodelski opremi
        (niso avtomobilski razredi SAE).
    okra_variety:
      name: Sorta okre
      description: Opredeljuje specifični kultivar ali tržno sorto ponujene okre,
        kot so Clemson Spineless, Red Burgundy ali Baby Okra.
    olfactory_arts_material_form:
      name: Oblika materiala za olfaktorne umetnosti
      description: Navaja fizično obliko materiala, kot se prodaja.
    olfactory_arts_tool_kit_content:
      name: Vsebina kompleta orodij za dišavno umetnost
      description: Navaja, katere komponente so vključene, ko se izdelek prodaja kot
        komplet ali set za izdelavo sveč, kadil ali parfumov.
    olive_variety:
      name: Sorta oljk
      description: Navaja kultivar uporabljene olive, kar vpliva na okus, teksturo,
        barvo in regionalno avtentičnost.
    onion_variety:
      name: Sorta čebule
      description: Navaja specifično vrsto čebule, da lahko kupci hitro najdejo želeno
        barvo, okus in profile uporabe, trgovcem pa omogoča natančno uvrstitev izdelkov.
    opacity_level:
      name: Stopnja motnosti
      description: Označuje, kako prosojna ali neprozorna je tkanina.
    operating_modes:
      name: Načini delovanja
      description: Glavni vgrajeni načini učinkov/gibanja, ki jih podpira laserska
        luč.
    operating_voltage:
      name: Delovna napetost
      description: Navaja nominalno napetost sistema, za katero je brizgalka zasnovana.
    optical_toy_features:
      name: Lastnosti optične igrače
      description: Izpostavlja glavni vizualni/optični učinek, ki ga igrača proizvaja.
    orchestral_string_core_material:
      name: Material jedra orkestralne strune
      description: Navaja material izdelave jedra strune, kar močno vpliva na občutek,
        odzivnost in ton.
    orchestral_string_end_type:
      name: Vrsta zaključka orkestralne strune
      description: Navaja stil pritrjevanja na koncu strune pri držalu.
    orchestral_string_included_strings:
      name: Vključene strune v kompletu za orkestrske strunski instrument
      description: Navaja, katere specifične strune so vključene v paketu (odvisno
        od instrumenta).
    orchestral_string_instrument_fitting_part_type:
      name: Vrsta opreme/dela za orkestralne strunske instrumente
      description: Navaja, kakšne vrste oprema/del je izdelek (npr. kobilica, strnik,
        podbradnik).
    orchestral_string_instrument_mute_type:
      name: Vrsta dušilca za orkestrske strunske instrumente
      description: Navaja funkcionalno vrsto dušilca za orkestralne strunske instrumente
        (npr. za vadbo/hotel nasproti nastopu/koncertu) in/ali splošni stil zasnove.
    orchestral_string_instrument_part_position:
      name: Položaj dela orkestralnega strunskega instrumenta
      description: Označuje, kam del sodi na instrumentu (koristno, kadar so deli
        na voljo v zgornji/spodnji ali levi/desni različici).
    orchestral_string_winding_material:
      name: Material ovojnice strune za orkestrske instrumente s strunami
      description: Navaja material zunanjega ovitja/ovoja, uporabljenega na struni.
    organza_finish_sheen:
      name: Površinska obdelava / sijaj organze
      description: Opisuje površinski videz organze (mat nasproti svetlečim/prelivajočim
        se učinkom).
    organza_ribbon_transparency_level:
      name: Stopnja prosojnosti traku iz organze
      description: Opisuje, kako prosojen je trak iz organze.
    organza_transparency_level:
      name: Stopnja prosojnosti organze
      description: Opisuje, kako prosojna je tkanina iz organze, ko je položena v
        enem sloju
    origami_paper_shape:
      name: Oblika origami papirja
      description: Navaja obliko lista, ki se uporablja za zlaganje
    origami_paper_sidedness:
      name: Enostranskost/dvostranskost origami papirja
      description: Označuje, ali ima origami papir enako barvo/vzorec na obeh straneh
        ali pa so si strani v kontrastu.
    ostrich_feather_part:
      name: Del nojevega perja
      description: Označuje območje magnetne uravnoteženosti ali poloblo, za katero
        je igla kompasa umerjena, kar zagotavlja natančne odčitke po vsem svetu.
    outboard_motor_shaft_type:
      name: Vrsta gredi izvenkrmnega motorja
      description: Standardni razred dolžine osi, ki jo uporabljajo izvenkrmni motorji
        (oblika oznake, ki se uporablja v pomorski industriji).
    outboard_motor_steering_type:
      name: Vrsta krmiljenja izvenkrmnega motorja
      description: Navaja krmilni vmesnik/mehanizem, ki ga uporablja izvenkrmni motor
        (npr. krmilno ročico/tiller ali sistem za daljinsko krmiljenje).
    outdoor_table_functionality:
      name: Funkcionalnost zunanje mize
      description: Opredeljuje specializirane vgrajene funkcije, ki presegajo preprosto
        površino mize (npr. hladilni predal, polica za shranjevanje, pokrov za plinsko
        jeklenko, podstavek za sončnik, priključek za stole, zložljiva zasnova, sef
        za uporabo v bazenu, nastavljiva višina, integrirana kolesa, LED osvetlitev).
    outerwear_length_type:
      name: Vrsta dolžine vrhnjih oblačil
      description: Razvršča splošno dolžino vrhnjega oblačila v standardne opisne
        razpone.
    outerwear_pieces_included:
      name: Vključeni kosi vrhnjih oblačil
      description: Navaja kose oblačil, ki so na voljo, ko se izdelek prodaja kot
        komplet.
    outfit_attachment_mechanism:
      name: Mehanizem za pritrjevanje oblačila
      description: Navaja, kako se kosi oblačil ali dodatkov pritrdijo na lutko (npr.
        z zavihki, lepilom, magneti).
    outfit_items_included:
      name: Vključeni predmeti v kompletu oblačil
      description: Navaja specifične kose oblačil, ki so vključeni v komplet (npr.
        bodi, kratke hlače, naglavni trak).
    outlet_thread_type:
      name: Vrsta navoja na izhodu
      description: Standard navoja, uporabljen na izhodnih odprtinah zavornih cevi
        glavnega zavornega valja (npr. metrični polni obrob nasproti SAE obrnjenemu
        obrobu).
    output_jack_type_instrument:
      name: Vrsta izhodnega priključka za instrument
      description: Navaja vrsto avdio izhodnega priključka na električni mandolini.
    output_signal_type:
      name: Vrsta izhodnega signala
      description: Električno obnašanje/vrsta izhoda, ki ga proizvaja senzor (npr.
        analogni upor NTC termistorja).
    outsole_marking_type:
      name: Vrsta puščanja sledi zunanjega podplata
      description: Označuje, ali zunanji podplat čevlja pušča sledi na dvoranskih
        površinah, kar je ključnega pomena za dvoranske športe z loparjem.
    outsole_material:
      name: Material zunanjega podplata
      description: Označuje material zunanjega podplata čevlja, ki je v stiku s tlemi,
        kar vpliva na oprijem, prožnost in vzdržljivost.
    outsole_stud_type:
      name: Vrsta čepov zunanjega podplata
      description: Opisuje konfiguracijo zunanjega podplata/čepov (npr. čepi, gumijasti
        profili, drobni čepki za umetno travo), ki zagotavlja oprijem na izbrani igralni
        površini.
    oven_bake_clay_formulation:
      name: Sestava mase za modeliranje s peko v pečici
      description: Opredeljuje družino sestave mase za modeliranje s peko v pečici
        (npr. polimerna masa nasproti smolni masi), kar vpliva na rokovanje, obnašanje
        med strjevanjem in lastnosti končnega izdelka.
    oven_housing_configuration:
      name: Konfiguracija ohišja pečice
      description: Določa predvideno razporeditev aparatov, ki jo omogoča kuhinjska
        omara (npr. enojna pečica, dvojna pečica ali kombinacija pečice in mikrovalovne
        pečice).
    overhead_mount_installation_method:
      name: Način namestitve stropnega nosilca
      description: Kako je stropni nosilec pritrjen na vozilo (stil strojne opreme/pritrditve).
    oversize_or_undersize_grade:
      name: Stopnja prevelike ali premajhne velikosti (prevelikih/premajhnih delov)
      description: Navaja stopnjo velikosti kompleta (preveliki bati/obročki in/ali
        premajhni ležaji) glede na originalno (OEM) standardno velikost.
    p_tex_application_method:
      name: Metoda nanašanja P-Texa
      description: Opisuje, kako se P-Tex material nanaša na drsno ploskev smuči ali
        snežne deske.
    p_tex_form:
      name: Oblika P-Tex-a
      description: Opredeljuje fizično obliko, v kateri je dobavljen material za popravilo.
    packability:
      name: Zložljivost
      description: Označuje, ali in kako se telovnik lahko zloži oziroma shrani, ko
        ni v uporabi.
    packaging_format:
      name: Format pakiranja
      description: Kako so strune pakirane/prodane (posamezne ovojnice, v razsutem
        stanju itd.).
    packaging_material:
      name: Material za embalažo
      description: Navaja glavni material plastenke ali posode, ki drži vodo.
    packaging_type:
      name: Vrsta pakiranja
      description: Opisuje, kako je figurica s premikajočo glavo zapakirana za maloprodajo,
        razstavljanje ali zbirateljsko shranjevanje.
    packing_medium:
      name: Medij pakiranja
      description: Označuje tekočino ali medij (kot so voda, različni sirupi, sok
        ali slanica), ki se uporablja za konzerviranje sadja znotraj posode.
    pad_components_included:
      name: Vključene komponente blazinice
      description: Navaja, kateri kosi so vključeni, ko se izdelek prodaja kot komplet
        (npr. samo ščitniki za kolena in komolce, ščitniki za zapestja).
    pad_controller_additional_control:
      name: Dodatni kontrolniki kontrolerja s ploščicami
      description: Vrste dodatnih fizičnih kontrolnikov poleg ploščic (gumbi, drsniki,
        tipke), ki so prisotni na enoti.
    pad_controller_performance_features:
      name: Zmogljivostne lastnosti kontrolerja s ploščicami
      description: Ključne s funkcijo delovanja povezane lastnosti ploščic za igranje
        in ekspresivni nadzor.
    pad_coverage_area:
      name: Območje pokritosti ploščic
      description: Navaja predele telesa, ki jih ščitijo integrirane ploščice.
    pad_material_or_technology:
      name: Material ali tehnologija ploščic
      description: Navaja lastniško tehnologijo za ublažitev udarcev ali blagovno
        znamko materiala, uporabljenega v blazinici.
    pad_mounting_or_holding_style:
      name: Stil montaže ali držanja blazinice
      description: Označuje, kako se ščitnik drži, nosi ali namesti med uporabo.
    pad_saver_style:
      name: Stil čistilnega vložka
      description: Označuje fizični stil/zasnovo čistilnega vložka, ki se uporablja
        za sušenje blazinic in vrtine.
    pad_shape:
      name: Oblika blazinice
      description: Določa geometrijsko obliko ali ukrivljenost udarne površine ščitnika
        ali celotnega telesa (npr. okrogel, ukrivljen, pravokoten, raven), kar uporabnikom
        pomaga uskladiti ščitnike s cilji treninga in vrstami udarcev.
    pad_shell_type:
      name: Vrsta školjke ščitnika
      description: Razvršča stil izdelave zunanje površine ščitnika (npr. trda školjka,
        mehka školjka, notranji vložek).
    pad_style:
      name: Slog ščitnika
      description: Navaja vrsto ali zasnovo blazine, ki je priložena sankam.
    padding_layers:
      name: Sloji blazinjenja
      description: Označuje število penastih slojev, uporabljenih za ublažitev udarcev.
    padding_level:
      name: Raven blazinjenja
      description: Označuje količino blazinjenja, integriranega v kontaktna območja
        traku/podpore (vrat/ramena/hrbet).
    padding_material:
      name: Material blazinjenja (polnila)
      description: Navaja notranje polnilo ali snov za blazinjenje, ki ublaži udarce
        znotraj vreč, ščitov, rokavic in vadbenih lutk.
    paddle_ball_attachment_type:
      name: Vrsta pritrjevanja žogice pri namiznem loparju
      description: Navaja, kako je žogica povezana z loparjem (ali pa označuje, da
        ni privezana).
    paddle_leash_style:
      name: Stil vrvice za veslo
      description: Opredeljuje stil ali zasnovo vrvice za veslo.
    paddle_shape:
      name: Oblika lopatice
      description: Določa splošno silhueto glave/trupa loparja (npr. standardna, podaljšana,
        široko telo), kar vpliva na doseg, velikost idealne točke zadetka in okretnost.
    paddleboard_intended_use:
      name: Predviden namen uporabe deske za veslanje
      description: Razvršča primarni oblikovni namen ali dejavnost, za katero je deska
        izdelana (npr. potovalni, joga, tekmovalni).
    paint_application_method:
      name: Metoda nanašanja barve
      description: Glavni način, na katerega je izdelek predviden za nanos na zavorno
        sedlo.
    paint_by_number_surface_type:
      name: Vrsta površine za slikanje po številkah
      description: Površina, na katero je natisnjen oštevilčen motiv (npr. platno,
        papir, lesena plošča).
    paint_medium_application_method:
      name: Način nanašanja slikarskega medija
      description: Označuje priporočeni način nanašanja medija.
    paint_medium_intended_effect:
      name: Predvideni učinek slikarskega medija
      description: Zajema glavni rezultat, ki naj bi ga medij ustvaril (tekstura,
        sijaj, glazura, pretok/livnost itd.).
    paint_safe_bristles:
      name: Ščetine, varne za barvanje
      description: Označuje, ali se ščetine krtače oglašujejo kot varne za uporabo
        na avtomobilski barvi/brezbarvnem laku (brez praskanja).
    paintable_surface:
      name: Površina primerna za barvanje
      description: Označuje, ali je oblika iz papirja kašé že pripravljena za barvanje
        (npr. nanesen temeljni premaz/zaščita) ali pa zahteva predpripravo.
    paintball_caliber:
      name: Kaliber za paintball
      description: Navaja premer/kaliber paintball kroglic ali združljive opreme.
    paintball_feed_system:
      name: Sistem podajanja paintball kroglic
      description: Določa, kako se paintball kroglice podajajo v marker.
    paintball_fill_color:
      name: Barva polnila kroglic za paintball
      description: Označuje barvo notranjega označevalnega polnila, ki se lahko razlikuje
        od zunanje lupine in določa barvo, ki ostane ob udarcu.
    paintball_fill_type:
      name: Vrsta polnila paintball kroglice
      description: Opisuje katero koli posebno sestavo ali lastnost polnila (npr.
        pralno, svetleče v temi, prašek).
    paintball_grade:
      name: Kakovostni razred paintball kroglic
      description: Opisuje razred zmogljivosti ali raven predvidene uporabe (npr.
        vstopna, terenska, tekmovalna, zimska).
    paintball_mask_coverage_level:
      name: Stopnja pokritosti maske za paintball
      description: Označuje, katere dele obraza ali glave ščitijo očala ali maska
        za paintball (samo očala, pol obraza, celoten obraz ali celotna glava).
    paintball_tank_valve_type:
      name: Vrsta ventila jeklenke za paintball
      description: Opisuje vmesnik ventila ali regulatorja, ki je prisoten na jeklenki.
    painting_surface_priming_type:
      name: Vrsta temeljnega premaza slikarske površine
      description: Navaja temeljni premaz/sloj na slikarski površini (več kot le s
        premazom/brez premaza), kar vpliva na oprijem barve in združljivost s tehniko.
    palette_knife_blade_edge_profile:
      name: Profil roba rezila slikarske lopatice
      description: Opisuje profil delovnega roba rezila slikarske lopatice (ne ostrine),
        kar vpliva na nanašanje sledi in mešanje barv.
    palette_knife_flexibility:
      name: Prožnost slikarske lopatice
      description: Opisuje togost/prožnost rezila slikarske lopatice.
    palette_surface_finish:
      name: Površinska obdelava slikarske palete
      description: Opisuje površinsko obdelavo/premaz mešalne površine, kar vpliva
        na odpornost proti umazaniji in enostavnost čiščenja.
    palm_padding_level:
      name: Raven blazinjenja dlani
      description: Opisuje količino blazinjenja na predelu dlani pri rokavici ali
        podlogi za oprijem.
    palm_padding_type:
      name: Vrsta blazinjenja dlani
      description: Označuje material ali zgradbo, uporabljeno za blazinjenje dlani
        (npr. gel, pena, dvoslojni material).
    palm_wax_blend_readiness:
      name: Pripravljenost mešanice palmovega voska
      description: Ali gre za čisti palmov vosek ali za vnaprej pripravljeno mešanico,
        zasnovano za specifične zmogljivostne lastnosti.
    palm_wax_form:
      name: Oblika palmovega voska
      description: Fizična oblika palmovega voska, kot se prodaja, kar vpliva na enostavnost
        merjenja, hitrost taljenja in rokovanje.
    pan_flute_tuning_standard:
      name: Standard uglasitve panove piščali
      description: Referenčna frekvenca, uporabljena za uglasitev (npr. A4 = 440 Hz),
        kar je pomembno za igranje z drugimi glasbila.
    pannier_configuration:
      name: Konfiguracija potovalnih torb
      description: Označuje, ali se izdelek prodaja kot posamezna torba, povezana
        dvojna torba ali kot par/trojni komplet stranskih kolesarskih torb.
    pannier_mounting_system:
      name: Sistem za montažo potovalnih torb
      description: Določa mehanizem, ki se uporablja za pritrditev stranske torbe
        na prtljažnik ali okvir kolesa, kar zagotavlja združljivost z različnimi konfiguracijami.
    pant_cuff_style:
      name: Stil spodnjega roba hlačnic
      description: Označuje zaključek ali prilagoditev na gležnju hlač (npr. elastični
        patenti, zadrge na gležnjih, odprt rob).
    pant_leg_conversion_type:
      name: Vrsta predelave hlačnic
      description: Označuje, ali in kako se lahko hlačnice predelajo oziroma prilagodijo
        za različne dolžine (npr. odpenjanje z zadrgo).
    pantyhose_crotch_style:
      name: Stil mednožja pri hlačnih nogavicah
      description: Določa zasnovo predela mednožja, pri čemer razlikuje med standardnim
        zaprtim mednožjem, različico brez mednožja ali različico z ojačanim klinom.
    papaya_variety:
      name: Sorta papaje
      description: Navaja kultivar ali tržno sorto papaje (npr. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Format papirnate in magnetne punčke
      description: Navaja, ali je izdelek klasični komplet papirnatih punčk, komplet
        magnetnih punčk ali hibridni format.
    paper_color_family:
      name: Družina barv papirja
      description: Navaja, ali je paket enobarven, v mešanih barvah ali vsebuje posebne
        mešanice (koristno, kadar je barva določena po kosu, paketi pa so mešani).
    paper_magnetic_doll_set_contents:
      name: Vsebina kompleta papirnate in magnetne punčke
      description: Označuje, katere glavne komponente so vključene v komplet.
    paper_opacity:
      name: Motnost papirja
      description: Označuje, kako prosojen je papir, od zelo prosojnega do motnega/neprosojnega
        (koristno za preslikavanje).
    paraglider_certification_rating:
      name: Ocena certifikacije jadralnega padala
      description: Navaja uradno oceno plovnosti, dodeljeno krilu jadralnega padala
        (npr. razredi EN ali LTF).
    parasite_types_controlled:
      name: Nadzorovane vrste zajedavcev
      description: Navaja notranje zajedavce, proti katerim je izdelek učinkovit,
        da lahko kupci prilagodijo programe razglistovanja specifičnim okužbam.
    parking_camera_mounting_location:
      name: Mesto montaže parkirne kamere
      description: Kje na vozilu je predvidena namestitev kamere (npr. območje registrske
        tablice, površinska montaža zadaj, poravnana vgradnja).
    parking_camera_night_vision_technology:
      name: Tehnologija nočnega vida parkirne kamere
      description: Metoda pomoči pri šibki svetlobi, ki jo uporablja kamera.
    parking_camera_orientation:
      name: Usmerjenost parkirne kamere
      description: Ali je kamera zasnovana za vzvratno (vzvratno) gledanje, gledanje
        naprej ali za izbirno/zrcalno uporabo.
    parking_sensor_finish:
      name: Površinska obdelava parkirnega senzorja
      description: Označuje površinsko obdelavo čelne strani/pokrovčka parkirnega
        senzorja (npr. primeren za barvanje/s temeljnim premazom, mat, sijaj), kar
        pomaga pri usklajevanju z estetiko odbijača.
    parking_sensor_type:
      name: Vrsta parkirnega senzorja
      description: Navaja tehnologijo zaznavanja, ki jo uporablja parkirni senzor
        (npr. ultrazvočni, elektromagnetni, radarski, optični).
    parsley_root_variety:
      name: Sorta peteršiljeve korenine
      description: Navaja kultivar ali sorto peteršiljeve korenine, če jo navede dobavitelj.
    parsnip_variety:
      name: Sorta pastinaka
      description: Opredeljuje specifično sorto ali kultivar pastinaka, kot sta Hollow
        Crown ali White Gem, kar kupcem omogoča izbiro na podlagi razlik v okusu,
        sladkosti ali velikosti.
    part_condition:
      name: Stanje dela
      description: Označuje, ali je del nov, rabljen, obnovljen itd.
    part_placement:
      name: Namestitev dela
      description: Označuje, kje na napravi (npr. na simulatorju hoje po stopnicah
        ali stepperju) je del nameščen, na primer levo, desno, spredaj ali zadaj.
    partial_capo_covered_strings:
      name: Pokrite strune delne kapodastre
      description: Navaja obseg strun, ki jih delna kapodastra pokriva, z uporabo
        standardnega očislovanja za 6-strunsko kitaro (1 = visoki E, 6 = nizki E).
    parting_style:
      name: Stil preče
      description: Označuje, kako ima lasulja narejeno ali kako se ji lahko naredi
        prečo (npr. na sredini, ob strani, poljubna preča), kar vpliva na prilagodljivost
        pri oblikovanju pričeske.
    party_favor_type:
      name: Vrsta drobnega darila za goste
      description: Navaja, za kakšno vrsto drobnega darila za goste gre (npr. nalepke,
        mini igrače, milni mehurčki), kar omogoča brskanje in filtriranje znotraj
        kategorije daril za goste.
    party_game_format:
      name: Format družabne igre za zabave
      description: Glavni fizični format družabne igre za zabave.
    party_horn_mouthpiece_type:
      name: Vrsta ustnika praznične piščalke
      description: Navaja zgradbo ustnika, kar vpliva na higieno in udobje.
    party_horn_style:
      name: Stil praznične piščalke
      description: Opisuje stil izdelave/obnašanja praznične piščalke (kako se razteza
        ali oddaja zvok).
    passenger_car_type:
      name: Vrsta potniškega vagona
      description: Opredeljuje specifično vrsto potniškega voznega parka (potniškega
        vagona) za model (npr. potniški vagon, spalni vagon), kar se uporablja za
        brskanje in sestavljanje kompletov.
    passion_fruit_variety:
      name: Sorta pasijonke
      description: Opredeljuje/navaja botanično ali komercialno sorto ponujene pasijonke
        (npr. vijolična, rumena, granadila).
    pasta_sauce_texture:
      name: Tekstura omake za testenine
      description: Opisuje konsistenco omake (npr. gladka, s koščki, kremasta), da
        ustreza osebnim željam potrošnika glede občutka v ustih.
    pasta_sauce_variety:
      name: Različne omake za testenine
      description: Razvršča omake za testenine po receptu ali stilu, da lahko kupci
        hitro najdejo klasike, kot je marinara, ali posebne omake, kot sta omaka z
        vodko ali pesto.
    pastry_crust_state:
      name: Stanje testa za pite
      description: Opisuje stanje priprave ali peke testa ob nakupu.
    pastry_crust_style:
      name: Stil skorje na testu
      description: Opredeljuje specifični stil peciva ali vrsto testa za podlago.
    pastry_filling_type:
      name: Vrsta nadeva za testo
      description: Navaja glavni notranji nadev peciva ali pogače.
    patch_adhesion_method:
      name: Način lepljenja krpe/obliža
      description: Navaja, kako se krpa prilepi na zračnico ali pnevmatiko (npr. samolepilna,
        vulkanizacija z lepilom ali toplotno aktivirana).
    patch_backing_material:
      name: Material hrbtne strani emblemske krpe
      description: Material, uporabljen na hrbtni strani/osnovi krpe (npr. filc, kegljiščna
        vezava), ki pride v stik z okraševalnim predmetom.
    patch_backing_type:
      name: Vrsta hrbtne strani emblemske krpe
      description: Hrbtna stran, uporabljena na našitku (npr. toplotno tesnjenje/likanje,
        samolepilna podlaga, sprijemalni trak, brez).
    patch_base_material:
      name: Osnovni material emblemske krpe
      description: Glavni osnovni/hrbtni tekstilni material našitka z motivom (ne
        dekorativni okraski).
    patch_border_edge_finish:
      name: Zaključek roba/obrobe našitka
      description: Metoda zaključka roba našitka (npr. obrobni šiv, lasersko odrezan
        rob), kar vpliva na vzdržljivost in videz.
    patch_placement_area:
      name: Območje namestitve našitka
      description: Običajno predvideno območje namestitve našitka na oblačilih/dodatkih.
    pathogen_removal_capability:
      name: Zmožnost odstranjevanja patogenov
      description: Navaja, katere razrede mikroorganizmov (bakterije, praživali, virusi)
        je črpalka certificirana odstraniti.
    pattern_sizing_system:
      name: Sistem velikosti krojev
      description: Navaja regionalni sistem ali standard velikosti, uporabljen za
        tabelo velikosti kroja (npr. ZDA, VB, EU).
    peak_style:
      name: Stil šlema
      description: Navaja stil vizirja ali ščitnika na čeladi, kar vpliva na pokritost,
        estetiko in pravila discipline.
    pear_variety:
      name: Sorta hrušk
      description: Opredeljuje kultivar ali sorto hrušk (npr. Bartlett, Bosc, Conference),
        kar kupcem omogoča izbiro glede na želeni okus, teksturo in kulinarično uporabo.
    pearl_luster_grade:
      name: Razred leska biserov
      description: Kakovostni razred leska/sijaja površine biserov.
    pearl_matching_level:
      name: Raven usklajenosti biserov
      description: Označuje, kako dobro so biseri usklajeni znotraj serije ali niza
        (npr. po barvi, velikosti in lesku).
    pearl_shape:
      name: Oblika biserov
      description: Splošna kategorija oblike bisera.
    pearl_surface_condition:
      name: Stanje površine biserov
      description: Označuje vidno stanje površine biserov na podlagi prisotnosti in
        izrazitosti nepravilnosti ali pik.
    pearl_treatment:
      name: Obdelava biserov
      description: Razkriva katero koli obdelavo, uporabljeno na biseru, ki vpliva
        na barvo/videz.
    pearl_type:
      name: Vrsta bisera
      description: Navaja sorto/izvor bisera (npr. sladkovodni, Akoya, Tahitian, South
        Sea) za bisere.
    peat_level:
      name: Stopnja šote
      description: Opisuje intenzivnost vpliva tresetnega dima v viskiju, od nedimljenega
        do močno dimljenega s šoto.
    pedal_and_cleat_system_compatibility:
      name: Združljivost sistema pedalov in kolesarskih ploščic
      description: Navaja, za katere standarde pedalov ali kolesarskih ploščic je
        podložka ali zagozda zasnovana, kar kupcem zagotavlja izbiro izdelka, ki ustreza
        njihovim pedalom in čevljem.
    pedal_configuration:
      name: Konfiguracija pedalov
      description: Označuje, ali ima stol en sam pedal, deljena/neodvisna pedala ali
        spremenljivo zasnovo.
    pedal_mounting_style:
      name: Stil montaže pedalov
      description: Navaja, kako se pedal ali prevleka/podloga pedala pritrdi na vozilo
        (način namestitve/pritrjevanja).
    pedal_set_components:
      name: Komponente kompleta pedalov
      description: Navaja, kateri pedali so vključeni v komplet.
    pedal_spindle_material:
      name: Material osi pedala
      description: Material, uporabljen za os pedala, kar vpliva na trdnost, težo
        in odpornost proti koroziji.
    pedal_spindle_thread_size:
      name: Velikost navoja osi pedala
      description: Navaja standard navoja osi pedala, ki se privije v ročico gonilke.
    pedal_type:
      name: Vrsta pedala
      description: Opisuje stil pedalov, priloženih kolesu, kar označuje združljivost
        s čevlji in stil vožnje.
    pellet_accessory_type:
      name: Vrsta dodatka za pelete
      description: Opredeljuje specifično vrsto dodatka za pelete, da lahko ribiči
        hitro najdejo svedre, naprave za nameščanje elastik ali stoperje glede na
        svoje potrebe pri izdelavi navez.
    pellet_grade:
      name: Razred kroglic
      description: Označuje proizvodno natančnost ali razred zmogljivosti airsoft
        kroglic
    pen_ink_color:
      name: Barva črnila pisala
      description: Označuje dejansko barvo črnila, ki jo pisalo oddaja, in se lahko
        razlikuje od zunanje barve ohišja.
    penalty_card_accessories_included:
      name: Vključeni dodatki h kazenskim kartonom
      description: Navaja dodatne sodniške pripomočke, priložene kazenskim kartonom,
        kot so denarnica/etui, beležka za rezultate, svinčnik, kovanec, piščalka ali
        torbica.
    penalty_card_colors_included:
      name: Vključene barve kazenskih kartonov
      description: Navaja barve kazenskih kartonov, ki so vsebovani v kompletu izdelka.
    penalty_flag_throw_distance:
      name: Razdalja meta sodniške zastavice
      description: Klasifikacija zasnove, ki označuje predvideni domet meta zastavice.
    pendant_cutter_safety_features:
      name: Varnostne lastnosti rezalnika v obliki obeska
      description: Opredeljuje integrirane varnostne elemente, ki zmanjšujejo tveganje
        za nenamerne ureznine med prenašanjem/nošenjem.
    pendant_cutter_wear_method:
      name: Način nošenja rezalnika v obliki obeska
      description: Navaja, kako je rezalnik v obliki obeska predviden za prenašanje
        ali nošenje.
    pepper_variety:
      name: Sorta paprike
      description: Navaja sorto ali vrsto paprike/popra, uporabljeno v izdelku, kar
        kupcem omogoča razlikovanje med različnimi profili okusa in stopnjami pekočnosti.
    percussion_case_style:
      name: Stil kovčka za tolkala
      description: Razvršča splošni stil/zgradbo kovčka (mehka torba nasproti trdemu/togemu
        kovčku nasproti hibridnemu).
    percussion_instruments_included:
      name: Vključena tolkala
      description: Navaja vrste tolkal, ki so vključena, kadar je izdelek komplet
        igrač z več instrumenti.
    percussion_mallet_handle_grip_style:
      name: Stil ročaja/oprijema tolkalne palice
      description: Opredeljuje vrsto obdelave oprijema na ročaju (več kot le tekstura),
        kot so neobdelan les, lakiran les, gumiran oprijem ali ovoj.
    percussion_mallet_head_construction:
      name: Izdelava glave tolkalne palice
      description: Opisuje stil izdelave/zgradbe glave palice (npr. ovita preja, ovit
        filc, guma, surov les), kar vpliva na zvok in vzdržljivost.
    perfumery_base_carrier_type:
      name: Vrsta nosilca parfumskega osnove
      description: Navaja sistem nosilca/topila parfumskega osnove (iz česa je osnova
        prvenstveno izdelana za redčenje in učinkovitost).
    perfumery_base_intended_application:
      name: Predvideni namen uporabe parfumske osnove
      description: Označuje format končne uporabe, za katerega je osnova zasnovana
        (npr. razpršilo za fine dišave v primerjavi z roll-onom).
    perfumery_ingredient_carrier_solvent:
      name: Nosilec/topilo parfumske sestavine
      description: Opredeljuje nosilec/topilo, v katerem je dobavljena sestavina,
        če je razredčena (npr. etanol, DPG, jojobino olje).
    perfumery_ingredient_form:
      name: Oblika sestavine za izdelavo parfuma
      description: Navaja fizično obliko/stanje parfumske sestavine, kot je dobavljena.
    perfumery_ingredient_type:
      name: Vrsta sestavine za izdelavo parfuma
      description: Razvršča parfumsko sestavino glede na to, kaj predstavlja v parfumski
        praksi (npr. eterično olje, aromatična kemikalija).
    perfumery_ingredient_usage_note:
      name: Uporabniška nota parfumske sestavine
      description: Označuje običajno vlogo v strukturi dišave (zgornja, srednja/srčna,
        spodnja nota), pri čemer upošteva, da se materiali lahko raztezajo čez več
        not.
    perfumery_ingredients:
      name: Sestavine za izdelavo parfuma
      description: Navaja vrste potrošnih dišavnih materialov, ki so vključeni v komplet
        (npr. eterična olja, dišavna olja, alkoholna osnova).
    perfumery_note_position:
      name: Položaj parfumske note
      description: Označuje običajno vlogo sestavine v strukturi dišave (zgornja/srčna/spodnja
        nota).
    persimmon_variety:
      name: Sorta kakija
      description: Opredeljuje kultivar ali sorto kakija, saj se različne sorte, kot
        sta Fuyu ali Hachiya, razlikujejo po teksturi, okusu, trpkosti in kulinarični
        uporabi.
    personalization_type:
      name: Vrsta personalizacije
      description: Navaja, ali in kako se izdelek lahko prilagodi za dogodek (npr.
        monogram, ime/datum, vstavitev fotografije).
    phonics_focus:
      name: Glasoslovje
      description: Navaja, katere fonetične veščine in veščine branja besed cilja
        bralna igrač.
    physalis_variety:
      name: Sorta volčjega jabolka
      description: Opredeljuje specifično botanično vrsto, kultivar ali splošno sorto
        fizalisa, ki se prodaja.
    pi_ata_filler_type_included:
      name: Vrsta vključenega polnila za pinjato
      description: Če je polnilo vključeno, navaja vrsto zagotovljene vsebine.
    pi_ata_hanging_method:
      name: Način obešanja pinjate
      description: Kako je pinjata zasnovana za obešanje ali podporo (zanka, kljuka,
        priložena vrvica itd.).
    pi_ata_opening_type:
      name: Vrsta odprtine na pinjati
      description: Kako se dostopa do odprtine za polnjenje oziroma kako se ta zapre
        (zavihek, ježek, zadrga, vnaprej zapečateno itd.).
    piccolo_key_system:
      name: Sistem mehanizma flavte pikolo
      description: Opredeljuje sistem/zasnovo mehanizma s tipkami, uporabljenega na
        pikolo flavti (običajno Boehmov sistem za moderne flavte pikolo).
    piccolo_keywork_features:
      name: Lastnosti mehanizma flavte pikolo
      description: Navaja pomembne mehanizme tipk in možnosti na pikolo flavti.
    pick_grip_aid:
      name: Pripomoček za oprijem trzalice
      description: Označuje glavni vgrajeni pripomoček za oprijem na trzalici poleg
        splošnega občutka/teksture površine (npr. luknjice za oprijem, vtisinjen logotip,
        gumijasti vložek).
    pickleball_construction_type:
      name: Vrsta izdelave pickleball žogice/loparja
      description: Proizvodna zgradba žoge, kot je enodelna brez šivov ali varjena
        iz dveh delov, kar vpliva na vzdržljivost in konstantnost leta.
    pickling_method:
      name: Metoda vlaganja
      description: Navaja medij ali tehniko konzerviranja, uporabljeno za vlaganje,
        kot sta kisla slanica ali laktovegetabilna fermentacija.
    pickup_and_preamp_configuration:
      name: Konfiguracija odjemnika zvoka in predoječevalnika
      description: Označuje, ali viola vključuje vgrajen odjemnik zvoka in/ali aktiven
        predojačevalnik za ojačano igranje ali snemanje.
    pickup_configuration:
      name: Konfiguracija odjemnika zvoka
      description: Opisuje splošno razporeditev odjemnikov zvoka na električni kitari
        z uporabo običajnih kratic (npr. SSS, HSS, HH).
    pickup_cover_material:
      name: Material pokrova odjemnika zvoka
      description: Navaja glavni material pokrova odjemnika zvoka (če je prisoten),
        vključno z običajnimi galvaniziranimi zaključki, kadar proizvajalec to tako
        navede.
    pickup_cover_type:
      name: Vrsta pokrova odjemnika zvoka
      description: Navaja, ali ima odjemnik zvoka električne kitare pokrov ter material/stil
        pokrova (npr. kovinski nasproti plastičnemu).
    pickup_string_spacing:
      name: Razmik med strunami odjemnika zvoka
      description: Standard razmika med magnetnimi poli/strunami, za katerega je odjemnik
        zvoka izdelan (npr. Fender v primerjavi z Gibson/standard), kar vpliva na
        poravnavo na kitarah s tremolom.
    pie_crust_type:
      name: Vrsta testa za pito
      description: Navaja stil ali vrsto testa, uporabljenega za pito ali tortico
        (tart), kot so listnato testo, graham piškoti ali brezglutensko testo.
    piece_configuration:
      name: Konfiguracija delov
      description: Označuje, iz koliko ločenih delov so sestavljeni biljardna palica,
        ratišče ali podporni mostiček, kar vpliva na prenosljivost in stil igre.
    pillow_form_size:
      name: Velikost polnilne blazine
      description: Standardizirana oznaka končne velikosti za polnilne blazine/vložke
        (cca. 45 x 45 cm).
    pilot_helmet_communications_integration:
      name: Integracija komunikacije letalske čelade
      description: Označuje, ali čelada vključuje komponente za letalsko komunikacijo
        oziroma je vnaprej konfigurirana zanje.
    pilot_helmet_visor_configuration:
      name: Konfiguracija vizirja letalske čelade
      description: Navaja konfiguracijo vizirja/zaščitnega ščita za obraz, ki je vključena
        pri letalski čeladi.
    pin_attachment_type:
      name: Vrsta pritrjevanja značke
      description: Navaja mehanizem zadnjega dela/zapenjanja broške, ki se uporablja
        za pritrditev broške na oblačila ali površino (npr. metuljček zaponka, magnetni
        hrbet).
    pin_backing_type:
      name: Vrsta hrbtne strani značke
      description: Navaja mehanizem za zapenjanje/podlogo, ki se uporablja za pritrditev
        žebljička na oblačila ali dodatke.
    pin_cushion_attachment_style:
      name: Stil pritrjevanja blazinice za bucike
      description: Kako se blazinica za bucike nosi, pritrdi ali namesti med uporabo.
    pin_cushion_features:
      name: Lastnosti blazinice za bucike
      description: Funkcionalne lastnosti, ki presegajo osnovno držanje bucik.
    pin_face_customization_method:
      name: Način prilagoditve (izdelave) sprednje strani broške
      description: Navaja, kako je izdelan sprednji motiv (npr. trdi emajl, mehki
        emajl, tiskan motiv).
    pin_type:
      name: Vrsta broške
      description: Navaja stil ali format broške/značke, ki se uporablja za športne
        navijaške zbirateljske predmete.
    ping_pong_certification:
      name: Certifikat za namizni tenis
      description: Določa uradni standard ali raven odobritve krovne organizacije
        za izdelek.
    ping_pong_competition_certification:
      name: Tekmovalni certifikat za namizni tenis
      description: Označuje uradni status certifikacije žogice za namizni tenis za
        uradna tekmovanja (npr. odobreno s strani ITTF).
    ping_pong_paddle_handle_style:
      name: Stil ročaja loparja za namizni tenis
      description: Določa obliko/stil ročaja loparja, kar vpliva na udobje oprijema
        in tehniko igranja.
    ping_pong_robot_accessory_type:
      name: Vrsta dodatka za robot za namizni tenis
      description: Opredeljuje funkcionalno podvrsto dodatka, da lahko kupci hitro
        zožijo rezultate (npr. lovilne mreže nasproti napajalnikom).
    ping_pong_rubber_surface_type:
      name: Vrsta površine gume za namizni tenis
      description: Opredeljuje stil/teksturo površine gume, nameščene na loparju,
        kar vpliva na lastnosti rotacije in hitrosti.
    ping_pong_rubber_type:
      name: Vrsta gume za namizni tenis
      description: Navaja stil izdelave površine gume za namizni tenis, kar vpliva
        na igralne lastnosti.
    ping_pong_table_type:
      name: Vrsta mize za namizni tenis
      description: Razvršča splošni stil ali format mize za lažjo primerjavo (npr.
        tekmovalna, plošča za predelavo top, mini miza).
    pipe_instrument_voicing_sound_production_method:
      name: Način intoniranja / proizvodnje zvoka piščali (cevastih instrumentov)
      description: Navaja, kako instrument proizvaja zvok (mehanizem zračnega toka),
        kar v filtrih pomaga razlikovati med piščalmi, piščalmi z jezičkom in družinami
        orgelskih piščali.
    piston_application_type:
      name: Vrsta uporabe bata
      description: Predvideni namen obremenitve/primer uporabe bata (standardni nadomestni
        del nasproti predelavi/dirkanju nasproti težkim pogojem).
    piston_crown_dish_style:
      name: Stil čela/vdolbine bata
      description: Oblika čela bata, ki vpliva na prostornino zgorevalne komore in
        kompresijo (npr. ravno čelo, izbočeno-konveksno čelo, vdolbeno čelo).
    piston_pin_retention_type:
      name: Vrsta zadrževanja batnega sornika
      description: Navaja, kako je batni sornik fiksiran v sklopu bata in ojnice.
    pit_configuration:
      name: Konfiguracija jame
      description: Določa strukturni format pristajalnega območja (enodelno nasproti
        večmodularnemu) in posledično število dobavljenih sekcij ali modulov.
    pit_cover_type:
      name: Vrsta pokrova jame
      description: Navaja zaščitno površino ali ponjavo, priloženo pristajalni blazini,
        kar vpliva na odpornost proti atletskim šprintaricam, vremensko zaščito in
        želje atleta.
    pitahaya_flesh_color:
      name: Barva mesa pitaje
      description: Navaja barvo notranjega mesa pitaje (zmajevega sadeža) (npr. bela,
        rdeča, magenta), kar je ključni razlikovalni dejavnik, ki vpliva na okus,
        videz in zaznavno hranilno vrednost.
    pitch_mat_coverage_length:
      name: Dolžina pokritosti metalne podlage
      description: Razvršča podlago za igrišče kriketa glede na del vratc, ki ga pokriva
        (npr. celotno ali polovično igrišče).
    pitch_range:
      name: Frekvenčni razpon
      description: Opisuje zaznavni razpon višine tona/svetlosti zvoka mešalca.
    pitch_standard:
      name: Standard uglasitve
      description: Navaja standard višine tona (referenčno uglasitev), za katero je
        kljunasta flavta izdelana (npr. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Oznaka velikosti metalne plošče
      description: Označuje standardno klasifikacijo velikosti igrišča za metalno
        ploščo, kar poenostavi izbiro, ne da bi morali kupci poznati natančne mere.
    pitching_screen_style:
      name: Stil zaščitne mreže za metalce
      description: Določa strukturno zasnovo zaščitne mreže, da lahko kupci hitro
        izberejo pravilno postavitev zaščite za svoj scenarij treninga.
    pitching_target_design:
      name: Zasnova tarče za metanje
      description: Razvršča splošni stil ali konfiguracijo metalne tarče.
    pitching_wheel_count:
      name: Število koles metalnega stroja
      description: Označuje število pogonskih koles, ki jih uporablja stroj za metanje
        žogic.
    pivot_adjustability:
      name: Nastavljivost osi
      description: Označuje, ali imajo škarje nastavljiv vijak vrtišča za prilagajanje
        napetosti rezanja.
    pivot_piece_type:
      name: Vrsta nihajnega dela
      description: Razlikuje med različnimi priloženimi oblikami vmesnika vrtišča,
        kot so klasične skodelice ali cevni stil.
    place_card_holder_closure_mechanism:
      name: Mehanizem zapenjanja držala za sedežne kartice
      description: Navaja, kako držalo zagrabi ali zavaruje kartico.
    place_card_orientation:
      name: Usmerjenost sedežne kartice
      description: Navaja usmerjenost sedežne kartice, ko se uporablja ali razstavlja
        (npr. vodoravno, navpično).
    place_card_printing_status:
      name: Status tiska sedežne kartice
      description: Označuje, ali je sedežna kartica prazna za ročno pisanje/tiskanje,
        vnaprej natisnjena (splošni motivi brez osebnih imen) ali pa natisnjena po
        meri.
    placket_type:
      name: Vrsta obrobe z gumbi
      description: Navaja stil sprednje odprtine na polo majici, vključno s številom
        gumbov ali alternativnimi načini zapenjanja.
    planetarium_content_theme:
      name: Vsebinska tematika planetarija
      description: Glavna vsebina, ki jo prikazuje projektor planetarija.
    planetarium_projection_content_format:
      name: Format projekcijske vsebine planetarija
      description: Navaja mehanizem projekcije vsebine, ki jo planetarij uporablja
        (fizični diski/diapozitivi nasproti digitalnemu/LED učinku).
    plant_fiber_type:
      name: Vrsta rastlinskih vlaken
      description: Specifična vrsta vlaken rastlinskega izvora, kadar je vrsta vira
        krajših vlaken rastlina.
    plaster_gauze_finish:
      name: Končni izgled mavčne gaze
      description: Končna težnja videza površine po nanosu in glajenju.
    plaster_gauze_grade:
      name: Razred mavčne gaze
      description: Razred predvidenega namena uporabe mavčne gaze (npr. za ustvarjanje/študente
        v primerjavi s profesionalci).
    plaster_gauze_weave_density:
      name: Gostota tkanja mavčne gaze
      description: Relativna odprtost/gostota tkanja gaze, kar vpliva na trdnost in
        sposobnost vpijanja mavca.
    plastic_canvas_finish:
      name: Površinska obdelava plastičnega platna
      description: Površinska obdelava/zaključek zvitka plastičnega platna.
    plastic_canvas_sheet_finish:
      name: Končni izgled plastičnega rešetkastega platna
      description: Obdelava površine/roba plastičnega rešetkastega platna.
    plastic_canvas_transparency:
      name: Prosojnost plastičnega platna
      description: Kako prosojno ali motno je plastično platno.
    plate_bottom_design:
      name: Zasnova dna športne plošče
      description: Opisuje zgradbo spodnje strani plošče (podplata/ogrodja), kar vpliva
        na oprijem, stabilnost in varnost na različnih igralnih površinah.
    plate_compatibility_standard:
      name: Standard združljivosti plošč
      description: Označuje standard kolutov za uteži (weight-plate), za katerega
        je fitnes palica zasnovana (npr. olimpijski 50 mm, standardni 25 mm).
    plate_installation_type:
      name: Vrsta namestitve metalne baze
      description: Navaja, kako je domača ali metalna plošča pritrjena ali postavljena
        na igrišču (npr. vkopana v tla, s klini, prenosna/vmešana), kar kupcem omogoča
        izbiro med trajnimi in prenosnimi možnostmi.
    plate_size_category:
      name: Kategorija velikosti plošče
      description: Razvršča ploščo/bazo glede na raven igre ali uradni standard pravilnika,
        da lahko kupci hitro najdejo opremo, ki je skladna s pravili lige.
    play_dough_putty_kit_contents:
      name: Vsebina kompleta plastelina in mase za oblikovanje
      description: Opredeljuje glavne vključene komponente poleg same mase (npr. orodja,
        modelčki, brizgalka, shramba).
    play_dough_tool_set_items_included:
      name: Vključeni predmeti v kompletu orodij za plastelin
      description: Opredeljuje vrste orodij in dodatkov, vključenih v komplet orodij
        za plastelin (npr. valjarji, rezalniki, modelčki).
    play_environment_suitability:
      name: Primernost za igralno okolje
      description: Opredeljuje predvideno igralno okolje za komplet (npr. v zaprtih
        prostorih, na prostem, voda).
    play_food_features:
      name: Lastnosti igrač v obliki hrane
      description: Posebne funkcionalne lastnosti ali lastnosti realizma kosov igrač
        v obliki hrane.
    play_food_items_included:
      name: Vključeni kosi igrač v obliki hrane
      description: Označuje vrste igrače hrane, ki so priložene otroškemu kuhinjskemu
        kompletu.
    play_food_size_scale:
      name: Merilo velikosti igrače hrane
      description: Označuje približno merilo velikosti kosov navidezne hrane za združljivost
        z otroškimi kuhinjami, lutkami in igralnimi kompleti.
    play_money_set_components_included:
      name: Vključene komponente kompleta igralnega denarja
      description: Navaja, katere vrste komponent so vključene v kompletu igralnega
        denarja/bančništva.
    play_pattern:
      name: Vzorec igre
      description: Glavni način, na katerega je igrača predvidena za uporabo (npr.
        kratkočasenje/lajšanje stresa, namizna skulptura/umetnost, sestavljanje/gradnja
        ali uganke).
    play_sprinkler_mounting_type:
      name: Vrsta montaže igralnega pršilnika
      description: Kako je igralni pršilnik postavljen/fiksiran med uporabo.
    play_vehicle_lights_and_sounds:
      name: Luči in zvoki igralnega vozila
      description: Označuje, ali igralno vozilo vključuje elektronske igralne učinke,
        kot so luči in/ali zvoki.
    play_vehicle_scale:
      name: Merilo igralnega vozila
      description: Označuje razmerje merila igralnega vozila (pogosto se uporablja
        za kovinske avtomobilčke in modelčke vozil).
    player_size_category:
      name: Kategorija velikosti igralca
      description: Določa predvideni razred velikosti/starosti igralca, ki mu komplet
        lovilske opreme ustreza (npr. igralec za začetnike, mladinec, srednja šola,
        odrasli).
    player_size_range:
      name: Razpon velikosti igralca
      description: Navaja predvideni razpon velikosti uporabnika za trak/podporo (npr.
        otrok, odrasel, univerzalen).
    playing_environment:
      name: Igralno okolje
      description: Navaja glavno igralno površino ali kontekst, za katerega je hokejska
        žogica zasnovana.
    playing_method:
      name: Način igranja
      description: Glavni način, na katerega je instrument predviden za igranje/aktivacijo.
    playing_surface_material:
      name: Material igralne površine
      description: Opredeljuje material sprednje udarne površine, kar močno vpliva
        na ton in občutek.
    playing_surface_type:
      name: Vrsta igralne površine
      description: Opisuje zgradbo/občutek igralne površine vadbene podloge.
    playset_activities_included:
      name: Vključene dejavnosti igralnega kompleta
      description: Opredeljuje glavne igralne dejavnosti/komponente, vgrajene v komplet
        gugalnic/igralni komplet, kar kupcem pomaga filtrirati glede na to, kaj otroci
        lahko počnejo na strukturi.
    playset_installation_type:
      name: Vrsta namestitve igralnega kompleta
      description: Navaja, kako je komplet gugalnic/igralni komplet nameščen ali fiksiran.
    playset_items_included:
      name: Vključeni predmeti v igralnem kompletu
      description: Opredeljuje vrste kosov za navidezno igro, ki so vključeni v piknik
        igralni komplet (hrana, namizna posoda, odeja, košara itd.).
    pliers_jaw_style:
      name: Stil čeljusti klešč
      description: Opisuje glavno konfiguracijo čeljusti ali funkcionalni stil klešč.
    plum_variety:
      name: Sorta sliv
      description: Opredeljuje specifični kultivar ali sorto sliv, kar kupcem omogoča
        izbiro na podlagi okusa, barve in predvidenega kulinaričnega namena uporabe.
    plumcot_variety:
      name: Sorta plumcota (hibrida slive in marelice)
      description: Opredeljuje specifični kultivar ali komercialno sorto hibrida med
        slivo in marelico (plumcota) (npr. Flavor King, Dapple Dandy), kar lahko vpliva
        na okus, barvo in sezonskost.
    plunger_mute_handle_type:
      name: Vrsta ročaja piščali/flavte
      description: Navaja stil ročaja ali oprijema, ki se uporablja za držanje in
        upravljanje dušilca na zvon za učinke »wa-wa«
    pocket_closure_type:
      name: Vrsta zapenjanja žepa
      description: Določa, kako je posamezen žep zavarovan, kar uporabnikom pomaga
        najti hlače z varnim shranjevanjem med dejavnostjo.
    pocket_knife_opening_mechanism:
      name: Mehanizem odpiranja žepnega noža
      description: Kako se rezilo sproži/odpre (ročno z urezom za noht, nastavek za
        palec, plavut, asistirano odpiranje, samodejno odpiranje itd.).
    pocket_style:
      name: Stil žepa
      description: Navaja glavno zgradbo žepov na hlačnicah.
    pocket_type:
      name: Vrsta žepa
      description: Opredeljuje stil ali prisotnost žepov na oblačilu.
    pod_retention_system:
      name: Sistem zadrževanja tub
      description: Opisuje, kako so paintball tube fiksirane na mestu in kako se sprostijo
        z nosilnega pasu ali nahrbtnika.
    pogo_stick_footrest_type:
      name: Vrsta opore za noge na pogo palici
      description: Opisuje zasnovo platforme/stope za noge, ki se uporablja za stanje
        na pogo palici.
    pogo_stick_suspension_type:
      name: Vrsta vzmetenja pogo palice
      description: Navaja mehanizem odboja pogo palice, kar vpliva na občutek, vzdržljivost
        in vzdrževanje.
    poi_handle_type:
      name: Vrsta ročaja za poi
      description: Navaja stil ročaja/oprijema/privezave, ki se uporablja za držanje
        poi-ja.
    poi_light_source:
      name: Vir svetlobe poi-ja
      description: Pri osvetljenih poi-jih navaja tehnologijo osvetlitve.
    poi_tether_type:
      name: Vrsta vrvi za poi
      description: Označuje vrsto priveze, ki povezuje glavo poi-ja z ročajem, gumbom
        ali zapestno zanko (npr. vrvica, vrv, veriga).
    poi_type:
      name: Vrsta zanimive točke (POI)
      description: Navaja glavno vrsto izdelave/uporabe poi-ja (npr. za vadbo, LED,
        ognjeni).
    point_type:
      name: Vrsta konice
      description: Oblika/stil konice, ki se uporablja na igli za vezenje.
    pointe_shoe_shank_length:
      name: Dolžina podplata baletnega copata
      description: Del dolžine čevlja, ki ga podpira podplatni vložek kot je celotna
        dolžina ali 3/4 dolžine.
    pointe_shoe_shank_strength:
      name: Trdnost podplatnega vložka baletnega copata
      description: Stopnja togosti podplatnega vložka baletnega copata, kar vpliva
        na podporo in čas, potreben za omehčanje.
    poker_accessory_storage_included:
      name: Vključeno shranjevanje dodatkov za poker
      description: Označuje, za katere dodatne poker predmete pripomoček zagotavlja
        namensko shranjevanje.
    poker_chip_tray_rack_configuration:
      name: Konfiguracija podstavka/stojala za poker žetone
      description: Opisuje stil notranje organizacije podstavka/stojala za žetone
        (vrstice in kapaciteta na posamezno vrstico).
    pole_anchoring_method:
      name: Metoda sidranja palice
      description: Določa, kako se palica/steber fiksira v tla ali igralno površino.
    pole_basket_type:
      name: Vrsta krpljice za palico
      description: Razvršča stil ali velikost krpljice, nameščene blizu konice smučarske
        palice, kar označuje predvidene snežne razmere.
    pole_connection_system:
      name: istem povezovanja palic
      description: Opredeljuje mehanizem, ki povezuje dele palic med seboj, kot so
        elastične vrvice, navoji ali osrednji sistemi, kar uporabnikom pomaga oceniti
        hitrost postavitve in združljivost.
    pole_system_type:
      name: Vrsta sistema palic
      description: Opisuje strukturni podporni sistem ali stil postavitve, ki ga šotor
        uporablja (npr. aluminijaste palice, napihljive zračne cevi, postavitev s
        pohodnimi palicami).
    police_equipment_fitment:
      name: Namestitev policijske opreme
      description: Navaja, za podporo katere policijske opreme je vozilo konfigurirano
        ali vnaprej ožičeno.
    police_vehicle_equipment_package:
      name: Paket opreme policijskega vozila
      description: Označuje specifično policijsko predelavo/opremo, ki je vključena
        ob prodaji vozila.
    police_vehicle_light_siren_equipment:
      name: Svetlobna/zvočna oprema policijskega vozila
      description: Določa, katere naprave za opozarjanje v sili so nameščene v policijskem
        avtomobilu.
    police_vehicle_upfit_level:
      name: Stopnja opremljenosti policijskega vozila
      description: Navaja, katere naprave za zasilno opozarjanje so nameščene na policijskem
        avtomobilu.
    polish_formulation:
      name: Sestava čistila
      description: Označuje osnovo sestave/kemijo politure za ubiralko (ne metode
        nanašanja).
    polish_purpose:
      name: Sestava čistila
      description: Primarni predvideni rezultat poliranja površine instrumenta.
    pollen_level:
      name: Raven cvetnega prahu
      description: Označuje količino/verjetnost rjavih madežev cvetnega prahu pri
        določeni sorti lilij.
    polymer_clay_firmness_level:
      name: Stopnja trdote polimerne mase
      description: Relativna trdota/mehkoba polimerne mase pred peko (obdelovalnost).
    polymer_clay_translucency:
      name: Prosojnost polimerne mase
      description: Vizualna motnost/prosojnost polimerne mase, ko je strjena.
    pom_pom_handle_style:
      name: Stil ročaja navijaškega cofa
      description: Opisuje stil ali zgradbo ročaja/oprijema, ki se uporablja za držanje
        navijaškega cofi.
    pom_pom_trim_backing_tape_material:
      name: Material traku/podloge obrobe s cofi
      description: Opredeljuje material šivanega traku ali pletenice, na katero so
        pritrjeni okrasni cofi (osnova obrobe).
    pom_pom_type:
      name: Vrsta cofa
      description: Označuje prisotnost in specifično vrsto cofa ali čopka na kapi.
    pomegranate_product_form:
      name: Oblika izdelka iz granatnega jabolka
      description: Opisuje ponujeno fizično obliko (celi sadež, olupljena semena/arili,
        jedrca, zamrznjena semena/arili).
    pomegranate_variety:
      name: Sorta granatnega jabolka
      description: Opredeljuje specifični kultivar ali sorto granatnega jabolka (npr.
        Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Stil elastike za čop
      description: Opisuje specifično zgradbo ali obliko elastike za čop, da lahko
        kupci izberejo svoj želeni stil.
    popcorn_form:
      name: Oblika pokovke
      description: Označuje fizično obliko ali obliko priprave izdelka iz pokovke,
        kot so pripravljena za uživanje, koruzna zrna, paket za mikrovalovno pečico,
        komplet z začimbami ali darilna pločevinka.
    pork_rind_form:
      name: Oblika ocvrtih svinjskih kožic
      description: Kategorizira fizično obliko ali stil prigrizkov iz svinjske kože
        (npr. kožica, ocvirki, ekspandirana kožica, peleti itd.).
    portability_features:
      name: Lastnosti prenosljivosti
      description: Navaja vgrajene elemente, ki pomagajo pri premikanju, prenašanju
        ali shranjevanju ležalnika.
    portability_frame_type:
      name: Zložljivost / Vrsta okvirja
      description: Ali so orkestrski zvonovi prenosni/terenski ali fiksni/koncertni.
    portable_electronic_game_features:
      name: Lastnosti prenosnih elektronskih iger
      description: Ključne lastnosti igranja/strojne opreme, ki jih naprava podpira.
    post_surgery_stage_suitability:
      name: Primernost glede na stopnjo pooperativnega obdobja
      description: Označuje, za katero stopnjo okrevanja (če sploh katero) je bodi
        zasnovan, kar je pomembno za kupce medicinskih oblačil za oblikovanje postave.
    postage_stamp_format:
      name: Oblika poštne znamke
      description: Kako je redna poštna znamka ponujena/pakirana (posamično, v paru,
        v traku, v bloku, v poli, v zvezku, v zvitku itd.).
    postmark_type:
      name: Vrsta poštnega žiga
      description: Vrsta razveljavitve/poštnega žiga, ki je prisoten na rabljenih
        rednih znamkah.
    potato_cut_style:
      name: Stil rezanja krompirja
      description: Označuje fizični stil rezanja ali priprave krompirja, kadar se
        ne prodaja cel.
    potato_intended_use:
      name: Predviden namen uporabe krompirja
      description: Razlikuje med krompirjem, namenjenim za takojšnjo porabo, in tistim,
        ki je namenjen za semenski krompir ali zamrznjene predelane izdelke.
    potato_variety:
      name: Sorta krompirja
      description: Navaja kultivar/sorto krompirja, kar kupcem omogoča iskanje specifičnih
        vrst, kot so »Yukon Gold«, »Maris Piper« ali »Purple Majesty«.
    pottery_clay_firing_required:
      name: Zahtevano pečenje lončarske gline
      description: Ali material zahteva pečenje v lončarski peči, da doseže svojo
        predvideno končno trdoto/izgled.
    pottery_slip_application_method:
      name: Način nanašanja lončarske lene
      description: Navaja predvideno tehniko nanašanja tekoče gline
    pottery_slip_compatible_clay_body:
      name: Združljivost lončarske lene z glineni masami
      description: Označuje vrsto oziroma vrste glinenih mas, s katerimi je tekoča
        glina usklajena ali zasnovana za delo.
    pottery_slip_form:
      name: Oblika lončarske lene
      description: Označuje, ali se tekoča glina prodaja kot tekočina, pripravljena
        za uporabo, ali kot suha mešanica/prašek, ki zahteva mešanje.
    pouch_design:
      name: Oblika torbice
      description: Podrobno opisuje lastnosti izdelave ali izboljšave na predelu sprednjega
        žepa.
    pouch_style:
      name: Slog žepa
      description: Navaja zasnovo predela sprednjega žepa, pri čemer upošteva udobje,
        podporo in estetske želje.
    powdered_beverage_variety:
      name: Sorta napitka v prahu
      description: Izdelek razvršča glede na vrsto pijače, ki jo pripravlja (npr.
        limonada, športna pijača, beljakovinski napitek).
    power_rack_style:
      name: Stil kletke za uteži
      description: Navaja splošno zasnovo/konfiguracijo kletke, kar kupcem pomaga
        razlikovati med celotnimi kletkami, polovičnimi kletkami in različicami za
        varčevanje s prostorom.
    power_steering_fluid_formulation:
      name: Sestava tekočine za servo volan
      description: Splošna družina sestave tekočine (na osnovi ATF nasproti namenski
        hidravlični/CHF nasproti univerzalni), ki se uporablja za filtriranje združljivosti
        na visoki ravni.
    practice_mute_audio_output:
      name: Avdio izhod dušilca za vadbo
      description: Navaja vrsto priključka za avdio izhod, ki je na voljo na dušilcu
        za vadbo za spremljanje in/ali snemanje (običajno pri tihih/elektronskih dušilcih
        za vadbo).
    practice_mute_intonation_impact:
      name: Vpliv dušilca za vadbo na intonacijo
      description: Opisuje pričakovani učinek uglasitve/intonacije pri uporabi dušilca
        za vadbo.
    practice_mute_venting_valve_type:
      name: Vrsta odzračevanja/ventila dušilca za vadbo
      description: Navaja, ali je dušilec za vadbo odzračen in kako oziroma ali vključuje
        nastavljiv ventil za spreminjanje upora/glasnosti.
    practice_pad_features:
      name: Lastnosti vadbene podloge
      description: Izpostavlja funkcionalne lastnosti vadbene podloge poleg velikosti/materiala.
    practice_pad_mounting_style:
      name: Stil montaže vadbene podloge
      description: Označuje, kako je vadbena podlaga predvidena za postavitev ali
        pritrditev med uporabo.
    practice_pad_rebound_level:
      name: Raven odboja vadbene podloge
      description: Označuje relativni odboj/odzivnost vadbene podloge v primerjavi
        z običajnimi opnami bobnov.
    practice_pad_surface_configuration:
      name: Konfiguracija površine vadbene podloge
      description: Opisuje, ali ima podlaga eno ali več udarnih površin in ali se
        razlikujejo po občutku.
    pregnancy_stage_suitability:
      name: Primernost glede na obdobje nosečnosti
      description: Označuje, za katero obdobje nosečnosti ali poporodno obdobje je
        oblačilo zasnovano.
    preparation_state:
      name: Stanje priprave
      description: Označuje stopnjo priprave ali kuhanja, ki je potrebna pred uživanjem.
    preparation_style:
      name: Stil priprave
      description: Določa stanje rezanja ali predelave vodnih kostanjev ob prodaji
        (npr. celi, narezani na rezine, praženi, zamrznjeni).
    preservation_medium:
      name: Medij konzerviranja
      description: Navaja glavno tekočino ali medij, v katerem so olive ali kapre
        konzervirane (npr. slanica, olivno olje, kis).
    presser_foot_attachment_method:
      name: Način pritrjevanja šivalne tace
      description: Označuje, kako se taca šivalnega stroja pritrdi na držalo/steblo
        tace (npr. s klikom v primerjavi s privijanjem), kar vpliva na združljivost.
    pressure_gauge_type:
      name: Vrsta manometra
      description: Označuje vrsto manometra, ki je priložen kolesarski tlačilki, če
        je prisoten.
    pressure_measurement_unit:
      name: Merilna enota za tlak
      description: Označuje enoto, ki se uporablja za odčitavanje ali kalibracijo
        senzorja tlaka, kar je koristno za primerjavo izdelkov in zagotavljanje združljivosti
        z merilnikom/ECU.
    pressure_plate_balance_type:
      name: Vrsta uravnoteženja potisne plošče
      description: Označuje, ali je potisna plošča uravnotežena interno ali pa zahteva/predvideva
        zunanje uravnoteženje, ki se ujema s konfiguracijo motorja/vztrajnika.
    pressure_plate_components_included:
      name: Vključene komponente potisne plošče
      description: Kaj je vključeno v ponudbi potisne plošče.
    pressure_sensor_application:
      name: Uporaba senzorja tlaka
      description: Opredeljuje sistem vozila/merilno točko, za katero je senzor tlaka
        zasnovan.
    pressure_sensor_port_thread_standard:
      name: Standard odprtine/navoja senzorja tlaka
      description: Navaja standard mehanske odprtine/navoja, ki se uporablja za namestitev
        senzorja v sistem vozila.
    pressurization_method:
      name: Način tlačnega delovanja
      description: Opredeljuje, kako se tlak ustvarja ali vzdržuje znotraj naprave.
    pretend_housekeeping_set_items_included:
      name: Vključeni predmeti v kompletu za navidezno gospodinjstvo
      description: Navaja, kateri gospodinjski pripomočki so vključeni v komplet (npr.
        krpa za tla, metla, smetišnica, plastenka z razpršilom).
    pretend_play_electronic_features:
      name: Elektronske lastnosti za navidezno igro
      description: Elektronske/interaktivne lastnosti, vključene v izdelku za navidezno
        igro.
    pretend_play_set_pieces_included:
      name: Vključeni kosi kompleta za navidezno igro
      description: Glavni rekviziti/komponente, vključeni v komplet za navidezno igro
        (npr. blagajna, igrača hrana, orodja).
    pretend_play_set_theme:
      name: Tematika kompleta za navidezno igro
      description: Glavni scenarij/tematika navidezne igre, ki jo izdelek predstavlja
        (koristno za prečno odkrivanje med vsemi igračami za navidezno igro).
    pretzel_coating:
      name: Premaz breskvic/prest
      description: Opredeljuje kateri koli zunanji posip, začimbo ali premaz, nanesen
        na presto, kar zajema tako slane (soljeno, začinjeno) kot sladke (čokolada,
        jogurt, karamela) možnosti.
    pretzel_shape:
      name: Oblike preste
      description: Navaja fizično obliko preste (npr. klasično zavita, palčka, grižljaj),
        kar je ključni razlikovalni dejavnik, ki ga kupci uporabljajo pri iskanju
        ali filtriranju.
    primary_component_material:
      name: Glavni material komponente
      description: Glavni material bloka motorja.
    primary_dish_application:
      name: Glavna uporaba jedi
      description: Opredeljuje glavno jed ali pripravo, za katero je testo predvideno.
    primary_plant_base:
      name: Glavna rastlinska osnova
      description: Označuje glavno ne mlečno sestavino (ali sestavine), uporabljeno
        za ustvarjanje alternative siru.
    primary_plant_protein_source:
      name: Glavni vir rastlinskih beljakovin
      description: Opredeljuje glavno rastlinsko sestavino, ki zagotavlja beljakovine
        v izdelku.
    primary_sweetener_source:
      name: Glavni vir sladila
      description: Opredeljuje rastlino ali surovino, iz katere je sirup pridobljen.
    print_placement:
      name: Položaj tiska
      description: Označuje, kje na majici s kratkimi rokavi je nameščena glavna grafika.
    print_technique:
      name: Tehnika tiska
      description: Navaja metodo dekoracije/tiska, uporabljeno na grafiki majice s
        kratkimi rokavi.
    printable_canvas_intended_use:
      name: Predviden namen uporabe platna za tisk
      description: Glavni namen uporabe, za katerega je platno za tisk optimizirano.
    printable_fabric_format:
      name: Format tkanine za tisk
      description: Navaja, kako je bombaž za tisk dobavljen (posamezni listi nasproti
        neprekinjenemu zvitku), kar vpliva na podajanje tiskalnika in potek dela na
        projektu.
    prism_material:
      name: Material prizme
      description: Navaja material samega optičnega elementa, kar vpliva na čistost,
        vzdržljivost in odpornost proti praskam.
    prisoner_transport_configuration:
      name: Konfiguracija za prevoz zapornikov
      description: Navaja, ali je kombi konfiguriran za prevoz pridržanih oseb/zapornikov
        in kako.
    prisoner_transport_partition_type:
      name: Vrsta predelne stene za prevoz zapornikov
      description: Vrsta notranje predelne stene/kletke, ki ločuje sprednji in zadnji
        prostor.
    privacy_or_acoustic_feature:
      name: Lastnost zasebnosti ali akustike
      description: Navaja vgrajene elemente za zasebnost ali akustiko, kot so predelne
        plošče, akustični zasloni ali popolne kabine.
    processing_state:
      name: Stanje predelave
      description: Ali so peresa sterilizirana/oprana ali kako drugače pripravljena
        za uporabo pri ustvarjanju.
    produce_grade:
      name: Razred kmetijskih pridelkov
      description: Razvršča kakovostni razred, dodeljen kiviju na podlagi velikosti,
        videza in stanja.
    produce_growth_stage:
      name: Stopnja rasti kmetijskega pridelka
      description: Navaja stopnjo rasti, v kateri se pridelek prodaja (npr. mikrozelenje,
        mladi listi, zreli listi, živa rastlina, seme).
    produce_washing_state:
      name: Stanje opranosti kmetijskega pridelka
      description: Označuje, ali je bila listnata zelenjava oprana in je pripravljena
        za uživanje.
    profile_shape:
      name: Profil/oblika
      description: Splošna ukrivljenost/profil činele (kako strmo se dviga od roba
        do zvona).
    projectile_ammunition_type:
      name: Vrsta izstrelka/streliva
      description: Navaja vrsto izstrelkov ali potrošnega materiala, ki ga uporablja
        igrače orožje, če je to primerno.
    projectile_finish:
      name: Površinska obdelava izstrelka
      description: Navaja kateri koli površinski premaz, nanesen na kroglico, kar
        pomaga pri odpornosti proti koroziji ali vidljivosti (npr. bakren premaz,
        cinkan premaz, barvano).
    projectile_type:
      name: Vrsta izstrelka
      description: Določa vrsto izstrelka, ki ga izdelek uporablja ali za katerega
        je namenjen.
    pronation_support:
      name: Podpora proti pronaciji
      description: Označuje vrsto hoje ali vzorca pronacije, ki ji je športni copat
        prilagojen.
    propellant_type:
      name: Vrsta pogonskega sredstva
      description: Navaja pogonsko sredstvo, za uporabo katerega je del ali dodatek
        zasnovan.
    propeller_blade_cup:
      name: Ukrivljenost roba rezila propelerja
      description: Označuje stopnjo ukrivljenosti (zakrivljenost izstopnega roba)
        na rezilih.
    propeller_hub_type:
      name: Vrsta pesta propelerja
      description: Navaja sistem pesta/puše, ki ga uporablja propeler (kompleti zamenljivih
        pest nasproti vtisnjenim pestom).
    propeller_rotation:
      name: Smer vrtenja propelerja
      description: Določa smer vrtenja propelerja.
    protectant_formula_base:
      name: Osnova sestave zaščitnega sredstva
      description: Navaja osnovo sestave zaščitnega sredstva, kar vpliva na sijaj,
        občutek in čiščenje (npr. na vodni osnovi nasproti osnovi na bazi topil).
    protection_coverage_area:
      name: Območje pokritosti zaščite
      description: Določa, katere dele ure pokriva zaščitni dodatek.
    protection_level:
      name: Raven zaščite
      description: Označuje predvideno raven zaščite kovčka za transport in shranjevanje
        instrumenta.
    protective_case_interior_protection_type:
      name: Vrsta notranje zaščite zaščitnega kovčka
      description: Opisuje glavno metodo notranje zaščite, ki se uporablja za varovanje
        in ublažitev vsebine.
    protective_case_shell_type:
      name: Vrsta školjke zaščitnega kovčka
      description: Opredeljuje splošni stil izdelave zunanjosti kovčka (togost), kar
        vpliva na zaščito pred stiskanjem in na prenosljivost.
    protective_contact_padding_material:
      name: Zaščitni material blazinjenja na stičnih točkah
      description: Material, uporabljen na stičnih točkah z instrumentom (vložek za
        nosilec/zvon), ki preprečuje praske (npr. filc, guma).
    protective_cup_configuration:
      name: Konfiguracija zaščitne skodvice
      description: Navaja, ali je zaščitna skodvica vključena, odstranljiva ali pa
        ima oblačilo le žep za namestitev skodvice.
    protective_eyewear_standard_compliance:
      name: Skladnost zaščitnih očal s standardi
      description: Navaja standarde ali certifikate za varnost ali odpornost proti
        udarcem, ki jih očala izpolnjujejo ali presegajo za športno uporabo.
    protective_gear_certification_standard:
      name: Standard certifikacije zaščitne opreme
      description: 'Označuje varnostni/certifikacijski standard, s katerim je oprema
        skladna (odvisno od vrste predmeta: standardi za čelade, standardi za kombinezone,
        standardi za zaščitne oklepe pred udarci).'
    protective_gear_items_included:
      name: Vključeni kosi zaščitne opreme
      description: Navaja posamezne kose, vsebovane v večdelnem kompletu zaščitne
        opreme.
    protective_gear_padding_type:
      name: Vrsta blazinjenja zaščitne opreme
      description: Navaja vrsto blazinjenja, uporabljenega v zaščitni opremi za zaščito
        pred udarci.
    protective_gear_safety_certifications:
      name: Varnostni certifikati zaščitne opreme
      description: Navaja priznane športno specifične standarde za varnost ali zmogljivost,
        ki jih izdelek izpolnjuje, kot so standardi NOCSAE ali ASTM za čelade za hokej
        na travi.
    protective_pad_components_included:
      name: Vključene komponente zaščitnih podlog/ščitnikov
      description: Navaja, kateri specifični zaščitni predmeti so vključeni v večdelni
        komplet, da kupci natančno vedo, kateri deli telesa so pokriti.
    protective_shorts_intended_use:
      name: Predviden namen uporabe zaščitnih kratkih hlač
      description: Glavna disciplina vožnje/dirkanja, za katero so zaščitne kratke
        hlače zasnovane.
    protective_shorts_padding_type:
      name: Vrsta blazinjenja zaščitnih kratkih hlač
      description: Navaja zgradbo/format zaščitnih elementov, uporabljenih v kratkih
        hlačah.
    protective_shorts_padding_zones:
      name: Cone blazinjenja zaščitnih kratkih hlač
      description: Opredeljuje, kateri deli telesa imajo integrirano blazinjenje/oklep
        v zaščitnih kratkih hlačah.
    protective_treatment:
      name: Zaščitna obdelava
      description: Navaja kateri koli zaščitni premaz ali obdelavo, naneseno za odpornost
        proti nečistočam, vodi ali UV-žarkom (npr. teflon).
    protector_coverage_area:
      name: Območje pokritosti zaščite
      description: Navaja, kateri predel oziroma predele torza je zaščita zasnovana
        pokriti (npr. prsni koš, hrbet, boki).
    puck_bottom_style:
      name: Stil spodnje strani ploščice
      description: Opisuje profil spodnje strani ploščice, ki vpliva na hitrost in
        nadzor na različnih igralnih površinah za shuffleboard.
    puck_type:
      name: Vrsta ploščka
      description: Opisuje profil spodnje strani ploščice, kar vpliva na hitrost in
        nadzor na različnih površinah.
    pull_buoy_style:
      name: Stil plavalnega plovca za noge
      description: Označuje funkcionalni stil ali konfiguracijo plavalnega plovca
        za noge, kot so standardni, gleženjski ali kombinacija plovca in deske.
    pull_through_weight_material:
      name: Material obtežitve prehodnega brisala
      description: Pri prehodnih čistilnih krpah opredeljuje material uteži, ki se
        uporablja za vodenje krpe skozi instrument.
    pulp_content:
      name: Vsebnost sadne kaše
      description: Označuje količino sadne ali zelenjavne pulpe v pijači.
    pump_accessories_included:
      name: Vključeni dodatki za črpalko
      description: Navaja dodatne predmete, priložene tlačilki za žoge, da lahko kupci
        razumejo vsebino paketa.
    pumping_compatibility:
      name: Združljivost s črpanjem mleka
      description: Označuje, ali je nedrček za dojenje zasnovan za prostoročno črpanje
        mleka kot tudi za hranjenje.
    punch_pad_type:
      name: Vrsta fokusne podloge za udarce
      description: Navaja zasnovo ali stil podloge za udarce/trening, da lahko kupci
        izberejo pravilno podlogo za svoje potrebe pri treningu.
    punching_training_bag_shape:
      name: Oblika vreče za boks/trening
      description: Navaja geometrijski stil težke vreče, kar kupcem pomaga izbrati
        modele, primerne za specifične udarne vaje (npr. aperkate, udarce v telo).
    puncture_protection_technology:
      name: Tehnologija za zaščito pred predrtjem
      description: Navaja vse lastniške ali splošne sloje proti predrtju oziroma tehnologije
        za ojačitev bočnic/ohišja, vgrajene v pnevmatiko (npr. EXO, SnakeSkin, Kevlar
        pas).
    puppet_features:
      name: Lastnosti ročne lutke
      description: Izpostavlja funkcionalne lastnosti ali lastnosti delovanja lutke
        (npr. premična usta, zvočni učinki, obojestranska lutka).
    puppet_puppet_theater_accessory_type:
      name: Vrsta dodatka za lutke in lutkovno gledališče
      description: Navaja, za kakšno vrsto dodatka gre (npr. gledališki rekvizit,
        kostum za lutko, krmilna palica, nadomestna vrvica).
    purity_unit:
      name: Enota za čistost
      description: Kako je izražena čistost kovanca (tisočinke v primerjavi s karatom)
    push_up_bar_design:
      name: Zasnova ročajev za sklice
      description: Označuje funkcionalni stil zasnove ročajev za sklece (npr. fiksni,
        vrtljivi, nizka bradlja).
    pushrod_end_type:
      name: Vrsta zaključka potisne palice
      description: Navaja stil zaključka/pritrdišča potisne palice, ki se uporablja
        na vmesniku pedala ali glavnega valja.
    putty_glow_activation_method:
      name: Način aktivacije svetilnosti mase za oblikovanje
      description: Kako se masa napolni/aktivira za svetenje v temi (npr. s sončno
        svetlobo, UV svetlobo).
    putty_glow_color:
      name: Barva svetilnosti mase za oblikovanje
      description: Opredeljuje barvo, ki jo masa oddaja, ko sveti v temi.
    putty_inclusions:
      name: Dodatki v masi za oblikovanje
      description: Izstopajoči primešani dodatki znotraj mase (npr. bleščice, konfeti,
        penaste kroglice).
    putty_texture:
      name: Tekstura mase za oblikovanje
      description: Glavno obnašanje mase pri rokovanju (npr. odbojna, raztegljiva,
        podobna tekočini).
    puzzle_accessory_features:
      name: Lastnosti dodatkov za sestavljanke
      description: Funkcionalne lastnosti in oblikovni elementi dodatkov za sestavljanke
        (razlikuje se glede na vrsto dodatka).
    pyrometric_cone_range:
      name: Temperaturni razpon pirometričnih stožcev
      description: Priporočeni pirometrični stožec (ali stožci), za pečenje na katerega
        je glazura zasnovana (npr. stožec 06–04, stožec 5–6).
    quarter_panel_coverage_type:
      name: Vrsta pokritosti blatnika
      description: Navaja, kolikšen del območja blatnika izdelek nadomešča oziroma
        popravlja.
    quarter_panel_set_contents:
      name: Vsebina kompleta bočne stene/blatnika
      description: Navaja konfiguracijo paketa bočne stene, ki je vključen v ponudbo
        (enostranski, par ali z dodatnimi deli za popravilo).
    quilting_ruler_markings:
      name: Oznake na ravnilu za prešivanje
      description: Navaja vrste natisnjenih oznak na ravnilu za prešivanje, ki se
        uporabljajo za rezanje/poravnavo.
    quilting_ruler_non_slip_feature:
      name: Protizdrsna lastnost ravnila za prešivanje
      description: Označuje, ali ravnilo vključuje protizdrsno hrbtno stran/površinsko
        obdelavo za zmanjšanje premikanja na blagu.
    quilting_ruler_transparency:
      name: Prosojnost ravnila za prešivanje
      description: Označuje prosojnost/vidljivost materiala ravnila, ki omogoča ogled
        tkanine in oznak pod njim.
    quilting_thread_usage:
      name: Uporaba sukanca za prešivanje
      description: Označuje predvideni namen uporabe sukanca pri prešivanju (kako
        naj bi se uporabljal).
    quilting_thread_weight_system:
      name: Sistem debeline sukanca za prešivanje
      description: Navaja sistem ocenjevanja velikosti/teže sukanca, ki se uporablja
        za izražanje debeline sukanca (npr. wt, Tex, Denier), da se lahko številčna
        velikost pravilno interpretira.
    quince_variety:
      name: Sorta kutin
      description: Opredeljuje specifični kultivar ali sorto kutine, saj se okus,
        aroma in kulinarična primernost lahko razlikujejo glede na sorto.
    quinoa_variety:
      name: Sorta kvinoje
      description: Opredeljuje specifično barvo ali sorto kvinoje, saj imajo različne
        sorte izrazite okuse, teksture in čase kuhanja.
    quinto_tuning_system:
      name: Sistem uglaševanja kuinto bobna
      description: Kako je kinto uglašen/napet.
    race_car_class:
      name: Razred dirkalnega avtomobila
      description: Tekmovalni razred/kategorija, za katero je avtomobil izdelan (razvrščanje
        po pravilniku/homologaciji).
    racing_balaclava_face_opening_style:
      name: Stil odprtine za obraz na dirkalni podkapi
      description: Konfiguracija odprtine za obraz na podkapi, kar vpliva na prileganje
        čelade, tesnjenje in udobje.
    racing_balaclava_neck_coverage_length:
      name: Dolžina pokritosti vratu dirkalne podkape
      description: Dolžina pokritosti vratnega dela/zavihka, ki je zasnovan za namestitev
        pod kombinezon/zaščito vratu zaradi tesnjenja in zaščite.
    racing_balaclava_ventilation_zones:
      name: Prezračevalna območja dirkalne podkape
      description: Namestitev določenih dihajočih/mrežastih ali prezračevanih območij
        za izboljšanje pretoka zraka pod čelado.
    racing_chest_guard_intended_use:
      name: Namen dirkalnih ščitnikov za prsni koš
      description: Glavna disciplina motošporta ali kontekst, za katerega je ščitnik
        za prsni koš zasnovan.
    racing_chest_guard_size_type:
      name: Vrsta velikosti dirkalnego ščitnika za prsni koš
      description: Označuje, ali je velikost izdelka prilagojena mladini, odraslim
        ali pa je univerzalna/nastavljiva.
    racing_glove_certification_standard:
      name: Certifikacijski standard za dirkaške rokavice
      description: Navaja varnostni certifikat/standard, s katerim so skladne dirkalne
        rokavice (npr. FIA, SFI, CE), in po želji oceno/raven, kadar je to primerno.
    racing_goggles_lens_system:
      name: Sistem leč za dirkalna očala
      description: Navaja sistem za zamenjavo leč ali pripravljenost na zaščitne folije,
        ki ga podpirajo očala.
    racing_helmet_certification_standard:
      name: Certifikacijski standard za dirkaško čelado
      description: Varnostni certifikat oziroma certifikati, ki jih izpolnjuje dirkalna
        čelada.
    racing_kart_brake_type:
      name: Vrsta zavor dirkalnega gokarta
      description: Glavna vrsta zavornega sistema, nameščenega na gokartu.
    racing_kart_class:
      name: Razred dirkalnega gokarta
      description: Tekmovalni razred ali pravilnik, s katerim je gokart zasnovan v
        skladu.
    racing_kart_frame_material:
      name: Material okvirja dirkalnega gokarta
      description: Glavni material okvirja/šasije gokarta.
    racing_kart_seat_size:
      name: Velikost dirkalne sedežne garniture za karting
      description: Oznaka velikosti sedeža za karting, ki se uporablja za prileganje.
    racing_neck_support_style:
      name: Velikost sedeža dirkalnega gokarta
      description: Strukturni stil dirkalne opore/zaščite za vrat in kako se povezuje
        s kolesarjevim/voznikovim torzom oziroma čelado.
    racing_suit_certification_standard:
      name: Certifikacijski standard za dirkaški kombinezon
      description: Navaja dirkalni varnostni certifikat/homologacijo, ki jo kombinezon
        izpolnjuje (npr. standardi FIA ali SFI).
    racing_suit_cuff_design:
      name: Zasnova patentov dirkalnega kombinezona
      description: Vrsta patenta na gležnju/zapestju, ki služi za stik z rokavicami/škornji
        ter izboljšuje tesnjenje/udobje.
    racing_suit_size_system:
      name: Sistem velikosti dirkaškega kombinezona
      description: Sistem velikosti, uporabljen za kombinezon (npr. črkovni S–XXL,
        številčni EU/ZDA, mladinski).
    racing_truck_discipline:
      name: Disciplina dirkalnih tovornjakov
      description: Navaja glavno dirkalno disciplino/format, za tekmovanje v kateri
        je tovornjak izdelan.
    rack_side_configuration:
      name: Konfiguracija strani prtljažnika
      description: Označuje, ali stojalo shranjuje blazine na eni ali na obeh straneh,
        kar vpliva na prostorsko učinkovitost in dostop.
    rack_system_configuration:
      name: Konfiguracija sistema stojala
      description: Opisuje splošno razporeditev/obliko stojala v sistemu ogrodja za
        bobne.
    racket_dampener_type:
      name: Vrsta blažilca vibracij za lopar
      description: Navaja mehanizem namestitve ali funkcionalni stil blažilca vibracij
        za lopar.
    racket_grip_size:
      name: Velikost ročaja loparja
      description: Navaja klasifikacijo velikosti ročaja loparja na podlagi obsega
        (npr. G1 do G5), kar zagotavlja pravilno prileganje roki in udobje.
    racket_sport_shoe_court_surface:
      name: Igralna površina za čevlje za športe z loparjem
      description: Navaja površino teniškega igrišča, za katero je čevelj zasnovan
        ali optimiziran, kar igralcem pomaga izbrati obutev s pravilnim vzorcem zunanjega
        podplata in gumijasto zmesjo za njihovo običajno igralno podlago.
    racket_string_pattern:
      name: Vzorec strun loparja
      description: Navaja število navpičnih (glavnih) in vodoravnih (prečnih) strun
        v mreži loparja (npr. 16 × 18), kar vpliva na nadzor, rotacijo in vzdržljivost.
    racket_stringing_status:
      name: Stanje napetosti strun loparja
      description: Označuje, ali se lopar prodaja z napetimi strunami, brez strun
        ali vnaprej napet.
    racket_weight_class:
      name: Razred teže loparja
      description: Zagotavlja standardne badmintonske kategorije teže »U«, kar igralcem
        omogoča izbiro loparjev znotraj njihovega želenega masnega razpona.
    racquet_toy_set_equipment_included:
      name: Vključena oprema v kompletu igrač z loparji
      description: Navaja, kateri predmeti so vključeni v igračo ali komplet (npr.
        mreža, žogice, loparji).
    racquetball_squash_training_aid_type:
      name: Vrsta pripomočka za trening racquetballa in squasha
      description: Razvršča specifično vrsto pripomočka za trening ali dodatka, da
        lahko kupci hitro najdejo izdelek, ki ga potrebujejo.
    radiator_cap_gasket_material:
      name: Material tesnila pokrovčka hladilnika
      description: Material tesnil, ki se uporabljajo na pokrovčku hladilnika.
    radiator_cap_pressure_relief_style:
      name: Stil razbremenitve tlaka pokrovčka hladilnika
      description: Navaja stil razbremenitve tlaka/odzračevanja/sprožitve pokrovčka
        hladilnika, kar lahko vpliva na rokovanje, varnost in predvideno uporabo.
    radiator_expansion_tank_cap_application:
      name: Uporaba pokrovčka hladilnika/ekspanzijske posode
      description: Opredeljuje, ali je pokrovček predviden za vrat za nalivanje hladilnika
        ali za ekspanzijsko/prelivno posodo hladilne tekočine.
    radiator_fan_control_type:
      name: Vrsta nadzora ventilatorja hladilnika
      description: Navaja, kako se ventilator hladilnika krmili/sproži.
    radiator_fan_mounting_pattern:
      name: Vzorec montaže ventilatorja hladilnika
      description: Navaja stil/vzorec montaže, ki se uporablja za pritrditev ventilatorja
        ali sklopa ventilatorja.
    radiator_fan_type:
      name: Vrsta ventilatorja hladilnika
      description: Navaja funkcionalno vrsto/konfiguracijo sklopa ventilatorja hladilnika.
    radiator_hose_end_type:
      name: Vrsta zaključka cevi hladilnika
      description: Navaja glavni stil povezave/tesnjenja, uporabljen na koncu (ali
        koncih) cevi hladilnika za stik z odprtinami na hladilniku/motorju.
    radiator_hose_position:
      name: Položaj cevi hladilnika
      description: Funkcionalni položaj/vrsta cevi hladilnika znotraj hladilnega sistema.
    radiator_hose_shape:
      name: Oblika cevi hladilnika
      description: Splošna geometrija/oblika cevi, uporabljena za napeljevanje in
        prilagajanje pri namestitvi.
    radiator_overflow_tank_level_sensor_provision:
      name: Priprava za senzor nivoja v ekspanzijski posodi hladilnika
      description: Označuje, ali posoda vključuje senzor nivoja hladilne tekočine
        oziroma podpira njegovo namestitev.
    radiator_overflow_tank_shape:
      name: Oblika ekspanzijske posode hladilnika
      description: Splošna oblika telesa ekspanzijske posode.
    radish_variety:
      name: Sorta redkvice
      description: Navaja kultivar ali vrsto redkvice, da lahko kupci izberejo specifične
        značilnosti okusa, barve ali velikosti (npr. Daikon, Watermelon, French Breakfast).
    radius_of_hollow:
      name: Polmer utora
      description: Navaja profil utora rezila, ki ga ustvari brusilnik, izražen v
        običajnih ločenih velikostih ali kot raven.
    rail_coverage_configuration:
      name: Konfiguracija pokritosti ograjice
      description: Označuje, kateri del (ali dele) otroške posteljice zaščitni komplet
        varuje, s čimer pojasnjuje, ali nakup vsebuje eno sprednjo ploščo ali večdelen
        komplet za celoten obseg.
    rail_mount_standard:
      name: Standard montažne tirnice
      description: Opredeljuje standard tirnice ali montažnega vmesnika, ki se uporablja
        za pritrditev dodatka (npr. merka, svetilke) na orožje s kroglicami.
    rail_side:
      name: Stran tirnice
      description: Označuje, ali je nadomestna tirnica namenjena levi strani, desni
        strani ali pa se prodaja kot par.
    rail_style:
      name: Slog tirnice
      description: Razvršča splošno zasnovo ali konfiguracijo tirnice (npr. A-okvir,
        mavrica, salomonska tirnica), kar določa možnosti izvajanja trikov in potreben
        prostor.
    rail_system:
      name: Sistem tirnic
      description: Opredeljuje vmesnik za montažo dodatkov, ki je prisoten na orožju
        (npr. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tehnologija senzorja za dež
      description: Princip zaznavanja, ki se uporablja za zaznavo vode na vetrobranskem
        steklu.
    rain_suit_configuration:
      name: Konfiguracija dežnega kombinezona
      description: Opredeljuje, ali je izdelek enodelni kombinezon, večdelni komplet
        ali drugačna konfiguracija.
    rainstick_construction_type:
      name: Vrsta konstrukcije dežne palice
      description: Opisuje, kako je dežna palica izdelana (klasična cev iz kaktusa/lesa
        nasproti sodobnim alternativam).
    rainstick_fill_material:
      name: Polnilni material za dežne palice
      description: Navaja notranje polnilo, ki se uporablja za ustvarjanje zvoka prelivanja
        (npr. semena, kroglice).
    rainstick_playing_technique:
      name: Tehnika igranja na dežno palico
      description: Označuje priporočeno tehniko (ali tehnike) igranja oziroma stil
        rokovanja, ki se uporablja za ustvarjanje predvidenega učinka na dežni palici.
    rainstick_sound_character:
      name: Zvočni značaj dežne palice
      description: Opisuje splošni zvočni značaj, ki ga proizvaja dežna palica.
    raising_method:
      name: Način reje
      description: Opisuje, kako so bile živali vzrejene in obdelane pred predelavo
        (npr. krmljene s travo, reja na pašnikih, obdelane z žitom).
    rally_competition_class:
      name: Tekmovalni razred za reli
      description: Razred krovne organizacije ali pravilnika, v skladu s katerim je
        avtomobil za reli izdelan (kjer je znan).
    rally_surface_setup:
      name: Nastavitev avtomobila glede na podlago relija
      description: Glavna površina/teren, ki ga cilja nastavitev ali predelava avtomobila
        za reli.
    ramp_surface_texture:
      name: Tekstura površine klančine
      description: Opisuje končni izgled ali raven oprijema vozne površine rampe.
    ratchet_mounting_style:
      name: Stil montaže zaskočnega mehanizma
      description: Kako se sistrum/raglja drži ali montira med igranjem ali postavljanjem.
    rattle_element_material:
      name: Material ropotajočih elementov
      description: Material ropotuljih elementov (npr. zobje/zvončki/kroglice), ki
        ustvarjajo značilno brenčanje/ropotanje.
    rattle_type:
      name: Vrsta ropotulje
      description: Vrsta dvižnega plina za daljinsko vodene zračne ladje.
    rc_airship_lifting_gas_type:
      name: Vodena zračna ladja, dviganje plina
      description: Označuje, s katerim plinom je predvideno polnjenje ovoja zračne
        ladje (če je to primerno).
    rc_helicopter_control_frequency:
      name: Lastnosti stabilizacije daljinsko vodenega helikopterja
      description: Radijski frekvenčni pas, ki se uporablja med kontrolerjem in helikopterjem,
        kar vpliva na odpornost proti motnjam in združljivost (npr. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Funkcije stabilizacije vodenega helikopterja
      description: Navaja lastnosti pomoči pri stabilizaciji/vodenju, ki olajšajo
        letenje ali dodajo zmogljivosti.
    rc_motorcycle_controller_type:
      name: Vrsta daljinskega upravljalnika za radijsko vodeni motor
      description: Oblika priloženega kontrolerja.
    rc_plane_takeoff_launch_method:
      name: Metoda vzleta/Launch RC letala
      description: Kako letalo običajno vzleti ali se izstreli, kar vpliva na to,
        kje in kako se lahko uporablja.
    rc_vehicle_controller_type:
      name: Vrsta kontrolerja za daljinsko vodena vozila
      description: Navaja obliko kontrolerja, ki se uporablja za upravljanje daljinsko
        vodenega vozila.
    rc_vehicle_scale:
      name: Merilo radijsko vodenega vozila
      description: Navaja razmerje merila (razred velikosti) avtomobila/tovornjaka
        na daljinsko vodenje (npr. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Vrsta terena za daljinsko vodena vozila
      description: Označuje glavni teren, za katerega je avtomobil/tovornjak na daljinsko
        vodenje zasnovan.
    reach_adjustment_type:
      name: Vrsta nastavitve dosega
      description: Označuje, ali se razdalja med ročico in krmilom lahko nastavi,
        in če je nastavljiva, ali je nastavitev mogoča brez orodja ali zahteva orodje.
    rear_axle_spacing:
      name: Razmik zadnje osi
      description: Velikost vpetja/osi, ki jo je zadnji del okvirja zasnovan sprejeti,
        kar vpliva na združljivost obročev.
    rear_axle_standard:
      name: Standard zadnje osi
      description: Določa vmesnik/format osi, ki jo uporablja zadnji obroč (npr. hitri
        zapenjalec, različne velikosti skozi osi).
    rear_axle_type:
      name: Vrsta zadnje osi
      description: Navaja sistem pritrjevanja in premer osi, ki se uporabljata za
        fiksiranje zadnjega obroča na okvir.
    rear_coverage:
      name: Pokritost hrbtnega dela
      description: Navaja kolikšen del zadnjice pokriva spodnji del bikinija (npr.
        drzno, popolno pokrivanje).
    rear_opening_type:
      name: Vrsta zadnje odprtine
      description: Opisuje stil zadnje odprtine ali funkcije zavihka na zadnji strani
        za priročno uporabo stranišča, kot sta spustni sedežni del ali celotna zadnja
        zadrga.
    rear_seat_configuration:
      name: Konfiguracija zadnjih sedežev
      description: Navaja konfiguracijo sklopa zadnjih sedežev za podporo pri prilagajanju
        in izbiri razporeditve notranjosti.
    rear_view_mirror_ornament_attachment_type:
      name: Vrsta pritrjevanja okraska za vzvratno ogledalo
      description: Navaja, kako se okrasek pritrdi na steblo ali ohišje vzvratnega
        ogledala (npr. zanka iz vrvice, sponka, kljukica).
    rearview_mirror_mount_attachment_type:
      name: Vrsta pritrjevanja nosilca vzvratnega ogledala
      description: Določa, kako se nosilec fizično pritrdi na sklop vzvratnega ogledala
        (telo ali steblo ogledala), kot so objemka, sponka, trak, lepilna podloga
        ali vijačni nosilec.
    rebound_board_face_type:
      name: Vrsta udarne strani odbojne deske
      description: Opisuje konfiguracijo površine, ki določa obnašanje odboja, kot
        so ravne, nagnjene ali večstranske zasnove.
    rebound_level:
      name: Raven odboja
      description: Označuje, kako močno se težka žoga odbije nazaj po udarcu, kar
        uporabnikom pomaga izbrati med zasnovami brez odboja in z zmernim odbojem.
    rebound_surface_configuration:
      name: Konfiguracija odbojne površine
      description: Navaja razporeditev odbojnih površin in predvidljivost odbojev
        (enostranska, dvostranska ali večstranska površina; predvidljiv nasproti nepredvidljivemu
        odboju).
    rebounder_design:
      name: Zasnova odbojne mreže
      description: Določa strukturni stil ali konfiguracijo odbojne površine izdelka.
    rebounder_design_type:
      name: Vrsta zasnove odbojne mreže
      description: Navaja glavni odbojni mehanizem ali stil izdelave trenažerja (npr.
        osnova z elastično vrvico, mreža z okvirjem, prenosna tarča).
    rebounder_sides:
      name: Strani odbojne mreže
      description: Označuje, ali lahko odbojna mreža vrača žoge z ene ali z obeh strani.
    rebounding_mechanism_type:
      name: Vrsta mehanizma za odboj
      description: Navaja tehnologijo, ki se uporablja za vračanje ploščice ali žoge
        (npr. gumijasti odbojnik, elastična vrv).
    recipient_relationship:
      name: Odnos s prejemnikom
      description: Predvideni odnos s prejemnikom (npr. mama, oče, prijatelj) za voščilnico.
    recliner_control_type:
      name: Vrsta krmiljenja počivalnika
      description: Navaja, kako se upravlja nagibni mehanizem (npr. ročna ročica,
        električna plošča z gumbi, daljinski upravljalnik).
    recliner_motion_type:
      name: Vrsta gibanja počivalnika
      description: Določa glavno zmožnost premikanja počivalnika (npr. gugalni, drsni,
        vrtljivi, stenski, dvižni).
    reclining_mechanism:
      name: Nagibni mehanizem
      description: Navaja mehanizem, ki se uporablja za delovanje funkcije nagiba
        kavča.
    recommended_candle_format:
      name: Priporočena oblika sveče
      description: Označuje priporočeni format ali formate sveč, za katere so predvideni
        ti samolepilni podstavki za stenje
    recommended_container_type:
      name: Vrsta priporočene posode
      description: Materiali posod, ki so priporočljivi/varni za sveče iz gela.
    recommended_fabric_type:
      name: Priporočena vrsta tkanine
      description: Priporočene tkanine za najboljše rezultate s šivalnim krojem.
    recommended_fabric_weight:
      name: Priporočena gramatura tkanine
      description: Označuje priporočeno kategorijo gramature tkanine za kroj.
    recommended_food_pairing:
      name: Priporočeno spajanje s hrano
      description: Opredeljuje glavne beljakovine ali jedi, za katere je omaka predvidena
        (npr. piščanec, svinjina, govedina, ribe, zelenjava).
    recommended_lane_condition:
      name: Priporočeno stanje steze
      description: Označuje oljni vzorec ali stanje steze, za katero je krogla zasnovana
    recommended_motor_impulse_class:
      name: Priporočeni razred impulza motorja
      description: Navaja priporočeni razred skupnega impulza motorja modelarske rakete
        za varen/optimalen let.
    recommended_reading_level:
      name: Priporočena stopnja branja
      description: Označuje priporočeno stopnjo/sposobnost branja za izdelek, kar
        kupcem pomaga, da ga uskladijo z otrokovim trenutnim bralnim razvojem.
    recommended_sleep_position:
      name: Priporočen položaj spanja
      description: Opredeljuje, katere položaje za spanje je vzmetnica zasnovana udobno
        podpirati (npr. spanje na boku ali na hrbtu).
    recommended_storage:
      name: Priporočeno shranjevanje
      description: Označuje, kako je treba izdelek shranjevati, da se ohrani svežina.
    recommended_surfaces:
      name: Priporočene površine
      description: Navaja predvidene lepilne površine/kategorije materialov za lepilo,
        ki presegajo splošno združljivost za ustvarjanje (npr. samo za papir nasproti
        večnamenski uporabi za različne površine).
    recommended_use_case:
      name: Priporočeni primer uporabe
      description: Glavni predvideni scenarij uporabe tesnilne mase (začasno/nujno
        popravilo nasproti dolgoročnemu popravilu).
    recommended_use_location:
      name: Priporočena lokacija uporabe
      description: Predvideno okolje za gugalnico (domače dvorišče v primerjavi s
        komercialnim otroškim igriščem itd.).
    recommended_vehicle_surfaces:
      name: Priporočene površine vozila
      description: Navaja površine/zaključke vozila, za katere je krtača predvidena
        kot varna (npr. lakirana barva, mat/satenasta barva, vinilna folija/PPF zaščita,
        steklo, platišča).
    recorder_accessories_included:
      name: Priloženi dodatki za snemanje
      description: Navaja vključene dodatke, ki so zapakirani skupaj z velikobasovno
        kljunasto flavto.
    recorder_bore_design:
      name: Zasnova vrtine kljunaste flavte
      description: Zasnova notranjega profila vrtine trupa kljunaste flavte.
    recorder_bore_type:
      name: Vključeni dodatki k kljunasti flavti
      description: Navaja stil vrtine kljunaste flavte.
    recorder_case_shell_type:
      name: Vrsta školjke kovčka za kljunasto flavto
      description: Označuje strukturno togost kovčka.
    recorder_finish:
      name: Končni izgled kljunaste flavte
      description: Površinska obdelava telesa kljunaste flavte (posebej pomembno za
        lesene altovske kljunaste flavte).
    recorder_hole_type:
      name: Vrsta odprtine za snemalnik
      description: Ali so tonske luknjice enojne (brez dvojnih luknjic) ali vključujejo
        dvojne luknjice for izboljšano kromatično prstno tehniko.
    recorder_joint_configuration:
      name: Konfiguracija spojev kljunaste flavte
      description: Opisuje, iz koliko delov trupa je sestavljena kljunasta flavta,
        kar vpliva na prenosljivost, čiščenje in zamenjavo delov.
    recorder_joint_style:
      name: Stil spojev kljunaste flavte
      description: Mehanizem kljunaste flavte
    recorder_keywork:
      name: Tipkovnica s snemalnikom
      description: Označuje, ali kljunasta flavta vključuje zaklopko oziroma zaklopke
        (kovinske/plastične mehanizme) za nizke tone, kar je značilno za tenorske,
        basovske ali velike kljunaste flavte.
    recorder_mouthpiece_type:
      name: Vrsta vrtine kljunaste flavte
      description: Opisuje, ali je ustnik/glava kljunaste flavte integriran (enodelna)
        ali odstranljiv/zamenljiv.
    recorder_pitch_standard_a4:
      name: Standard uglasitve kljunaste flavte (A4)
      description: Označuje referenčno višino tona, za katero je kljunasta flavta
        izdelana (npr. moderna uglasitev A = 440 Hz nasproti baročni uglasitvi A =
        415 Hz).
    recorder_thumb_hole_type:
      name: Vrsta ustnika kljunaste flavte
      description: Navaja, ali ima kljunasta flavta zasnovo z enojno ali dvojno palčno
        luknjico.
    recreational_vehicle_holding_tank_type:
      name: Vrsta zbiralnega rezervoarja za počitniška vozila (avtodome/prikolice)
      description: Označuje, katere zbiralne rezervoarje za odpadno vodo (sivo/črno
        vodo) ima počitniško vozilo.
    recreational_vehicle_leveling_system:
      name: Sistem za uravnavanje počitniškega vozila
      description: Vrsta nameščenega sistema za uravnavanje/stabilizacijo.
    recycled_material_content:
      name: Vsebnost recikliranega materiala
      description: Označuje delež oblačila, izdelanega iz recikliranih vlaken ali
        preje.
    reed_dent_material:
      name: Material zob rstnika
      description: Material zob/grebena rstnika, kar vpliva na vzdržljivost in abrazijo
        preje.
    reed_type:
      name: Vrsta piska
      description: Navaja vrsto izdelave piska, ki ga uporabljata melodijska in basovske
        cevi dud.
    reeds_included:
      name: Vključeni piski
      description: Navaja, kateri piski (jezički) so vključeni v komplet škotskih
        dud (za melodijsko in/ali basovske cevi) ter ali so iz trstike ali sintetični.
    reefing_method:
      name: Vrsta palčne odprtine kljunaste flavte
      description: Označuje mehanizem (če obstaja) za krajšanje ali pospravljanje
        jadra med plovbo na vodi.
    reel_profile:
      name: Profil ribiške role
      description: Razvršča strukturni stil/profil ohišja ribiške role za mehanizem
        baitcasting.
    reel_seat_material:
      name: Metoda krajšanja jader
      description: Navaja material izdelave ležišča role na ribiški palici, kar vpliva
        na težo, občutljivost in odpornost proti koroziji.
    reel_seat_type:
      name: Vrsta ležišča role
      description: Navaja stil zaklepnega mehanizma, ki pritrjuje maharsko rolo na
        ribiško palico.
    reel_size_class:
      name: Material ležišča role
      description: Velikostni razred, ki ga določi proizvajalec (npr. 1000, 3000,
        5000) in označuje kapaciteto glave role ter splošno zgradbo role.
    referee_wallet_accessories_included:
      name: Vključeni dodatki v sodniški denarnici / etuiju
      description: Navaja dodatne predmete, priložene sodniški denarnici, kot so rdeči/rumeni
        kartoni, beležke za rezultate ali pisala, da kupci vedo, ali se denarnica
        prodaja kot celoten komplet.
    refinement_level:
      name: Stopnja prečiščenosti
      description: Označuje stopnjo rafiniranja, ki jo je prestalo olje, kar vpliva
        na okus, barvo, hranilno vrednost in dimno točko.
    reflective_finish:
      name: Odsevni končni izgled
      description: Navaja odsevno obdelavo površine disko krogle (npr. ploščiceogledala
        v primerjavi snholografskim/mavričnim učinkom)
    reflective_or_glow_effect:
      name: Odsevni ali sijoči učinek
      description: Označuje, ali ima okrasna žogica za anteno učinke za boljšo vidljivost,
        kot so odsevni material, svetenje v temi ali svetlobni/LED elementi.
    reflective_tape_pattern:
      name: Vzorec odsevnega traku
      description: Opisuje konfiguracijo odsevnega traku na oblačilu, ki se uporablja
        za izpolnjevanje zahtev glede vidljivosti.
    regulation_standard:
      name: Uradni tekmovalni standard
      description: Navaja uradni standard ali dimenzije/certifikacijo krovne organizacije,
        ki jo mreža izpolnjuje.
    regulator_diaphragm_material:
      name: Material membrane regulatorja
      description: Navaja material membrane, kar vpliva na združljivost z gorivom/etanolom
        (npr. E85) in vzdržljivost.
    regulator_port_thread_standard:
      name: Standard navoja odprtine regulatorja
      description: Navaja standard navoja/povezave odprtine, ki se uporablja na ohišju
        regulatorja za dotočne, iztočne ali povratne odprtine.
    rein_features:
      name: Razred velikosti role
      description: Izpostavlja posebne funkcionalne ali varnostne lastnosti, ki so
        prisotne na vajetih.
    rein_style:
      name: Stil vajeti
      description: Opredeljuje strukturno zasnovo ali konfiguracijo vajeti, kar jahačem
        omogoča izbiro pravilne vrste za njihovo disciplino in osebne preference.
    reinforced_areas:
      name: Ojačani predeli
      description: Opredeljuje, kateri deli oblačila so ojačani zaradi večje trpežnosti
        proti obrabi.
    reinforcement_type:
      name: Vrsta ojačitve
      description: Konstrukcijska ojačitev, uporabljena v cevi hladilnika za trdnost
        in odpornost proti temperaturi/tlaku.
    release_activation_method:
      name: Način aktivacije sprožilca
      description: Navaja, kako lokostrelec sproži lokostrelski sprožilec.
    release_bearing_material:
      name: Material potisnega ležaja
      description: Glavni material komponent ležaja/čelne strani (kjer to navede proizvajalec).
    release_jaw_style:
      name: Stil čeljusti sprožilca
      description: Opisuje zasnovo čeljusti ali kljuke sprožilne glave.
    release_strap_type:
      name: Vrsta traku sprožilca
      description: Opredeljuje trak ali sistem povezovanja, ki je priložen lokostrelskemu
        sprožilcu.
    remote_control_airship_envelope_material:
      name: Material ovoja daljinsko vodene zračne ladje
      description: Navaja glavni material ovoja zračne ladje (plinske vreče), ločeno
        od splošnega materiala igrače.
    remote_control_motorcycle_scale:
      name: Lastnosti vajeti
      description: Merilo daljinsko vodenega motorja glede na pravi motor (če je izdelan
        kot model v merilu).
    remote_control_motorcycle_terrain_suitability:
      name: Primernost daljinsko vodenega motorja za terene
      description: Glavni teren, za delovanje na katerem je daljinsko vodeni motor
        zasnovan
    remote_control_motorcycle_water_resistance:
      name: Vodoodpornost daljinsko vodenega motorja
      description: Stopnja zaščite pred vodo za elektroniko daljinsko vodenega motorja.
    remote_control_plane_kit_completion_level:
      name: Stopnja dokončanosti kompleta daljinsko vodenega letala
      description: Označuje, kaj je vključeno in kako dokončan je komplet (npr. pripravljen
        za letenje v primerjavi s potrebo po ločenem oddajniku/sprejemniku/bateriji).
    remote_control_plane_landing_gear_type:
      name: Vrsta podvozja daljinsko vodenega letala
      description: Označuje konfiguracijo podvozja, kar vpliva na vzdržljivost in
        površine za vzletanje/pristajanje.
    remote_control_plane_power_type:
      name: Vrsta pogona daljinsko vodenega letala
      description: Navaja, kako se letalo napaja/poganja (električni pogon nasproti
        pogonu na žarilne svečke/bencin/nitro), kar vpliva na vzdrževanje, hrup in
        mesta, kjer lahko leta.
    remote_control_watercraft_features:
      name: Lastnosti daljinsko vodenega plovila
      description: Izpostavlja ključne specifične lastnosti daljinsko vodenega plovila,
        ki vplivajo na uporabnost in vzdržljivost.
    remote_control_watercraft_propulsion_drive_type:
      name: Vrsta pogona daljinsko vodenega plovila
      description: Navaja, kako se daljinsko vodeno plovilo poganja v vodi.
    remote_control_watercraft_water_environment:
      name: Vodno okolje daljinsko vodenega plovila
      description: Označuje predvidene vodne razmere, v katerih daljinsko vodeno plovilo
        deluje najbolje.
    remote_keyless_system_programming_method:
      name: Način programiranja sistema za daljinsko upravljanje brez ključa
      description: Kako se daljinski upravljalnik/sistem programira ali seznani z
        vozilom (npr. vgrajeni postopek v vozilu nasproti profesionalnemu orodju).
    repair_compound_type:
      name: Vrsta mase za popravilo
      description: Vrsta/sestava vključenega potrošnega materiala za popravilo (npr.
        vrsta kita za karoserijo, vrsta smole za vetrobransko steklo, vrsta lepila/tesnila
        za čepe za pnevmatike).
    repair_kit_components:
      name: Komponente kompleta za popravilo
      description: Navaja specifične predmete, vključene v komplet za popravilo, kar
        kupcem omogoča razumevanje vsebine in primerjavo paketov.
    repair_method:
      name: Način popravila
      description: Navaja glavni pristop k popravilu, ki ga komplet uporablja, kot
        so samolepilne krpe (odlepi-in-prilepi) ali zamenjava ventila.
    replacement_part_purpose:
      name: Merilo daljinsko vodenega motorja
      description: Označuje, ali je predmet originalni nadomestni del, nadgradnja/zmogljivejši
        del ali dodatna oprema.
    replacement_part_type:
      name: Vrsta nadomestnega dela
      description: Funkcionalna kategorija dela za eliptični trenažer, kar kupcem
        omogoča filtriranje komponente, ki jo potrebujejo.
    replacement_parts_availability:
      name: Razpoložljivost nadomestnih delov
      description: Označuje, ali so za vdevalec nitke podprti potrošni/zamenljivi
        deli (npr. nadomestne kljukice/žice).
    replica_gun_action_type:
      name: Vrsta mehanizma replike orožja
      description: Navaja vrsto delovanja/mehanizma replike strelnega orožja (kot
        je upodobljeno), kot sta gredna zaponka ali vzvodni mehanizem.
    replica_gun_firing_mechanism:
      name: Sprožilni mehanizem replike orožja
      description: Označuje, ali in kako replika simulira streljanje/delovanje (nesmrtno),
        kot sta streljanje s kapicami ali nefunkcionalno delovanje (brez streljanja).
    replica_gun_moving_parts:
      name: Premični deli replike orožja
      description: Označuje, kateri deli so na repliki funkcionalni oziroma premični.
    reservoir_orientation:
      name: Usmerjenost rezervoarja
      description: Navaja predvideno usmerjenost ali profil meha za vodo znotraj nahrbtnika.
    reservoir_type:
      name: Vrsta rezervoarja
      description: Vrsta konfiguracije rezervoarja za glavni valj sklopke.
    resin_suitability:
      name: Primernost za uporabo s smolo
      description: Navaja, ali je rokometna žoga zasnovana za uporabo s smolo (lepilom)
        ali pa je namenjena uporabi brez smole.
    resistance_adjustability:
      name: Nastavljivost upora
      description: Navaja, ali uporabnik lahko spremeni dihalni upor.
    resistance_band_design:
      name: Zasnova elastičnega traku za vadbo
      description: Opisuje fizično obliko ali stil elastičnega traku za vadbo (npr.
        zanka, cevasti trak z ročaji, osmica), kar kupcem pomaga izbrati pravilno
        zasnovo za njihovo vadbeno rutino.
    resistance_loading_type:
      name: Vrsta obremenitve z uporom
      description: Označuje, kako se zagotavlja ali nalaga upor/teža na Smithovi napravi
        (npr. z nalaganjem kolutov ali z vgrajenimi izbiralnimi utežmi).
    response_fields_included:
      name: Vključena polja za odgovor
      description: Navaja, katera standardna polja/možnosti za odgovor so prisotna
        na kartici za odgovor (npr. sprejmi/zavrni, izbira obroka).
    restoration_status:
      name: Status obnovljenosti
      description: Označuje, ali je kombi v originalnem, obnovljenem, posodobljenem
        stanju ali pa gre za projektno stanje.
    rhinestone_base_color_family:
      name: Družina barv podstavka kristalčka
      description: Opredeljuje družino barv podstavka kristalčka (npr. prosojna/kristalna,
        zlata/rumena, modra).
    rhinestone_facet_style:
      name: Stil brušenja kristalčkov
      description: Vzorec ploskev kristalčka, ki vpliva na lesk in videz (npr. Xilion
        rose, briljantni rez, fasetiran nasproti gladkemu).
    rhinestone_hole_reinforcement_material:
      name: Material za ojačitev luknjice za kristalčke
      description: Material okoli luknjic ali na luknjicah (npr. kovinska zakovica,
        brizgana plastika), kar vpliva na trpežnost med šivanjem.
    rhinestone_setting_type:
      name: Vrsta nameščanja kristalčkov
      description: Kako je kamen nameščen/obrobljen za šivanje (npr. vpetje s kremplji,
        vpetje z okvirjem, obrobljeno vpetje).
    rhubarb_product_cut_type:
      name: Vrsta rezanja izdelka iz rabarbare
      description: Opisuje fizično pripravo ali obliko rezanja izdelka iz rabarbare.
    ribbon_construction:
      name: Zgradba okrasnega traku
      description: Opisuje ključne lastnosti zgradbe rebrastega traku, kot je npr.
        prisotnost žice ali elastičnost, kar spreminja njegovo uporabo (npr. izdelava
        mašen nasproti šivanju).
    ribbon_packaging_type:
      name: Vrsta pakiranja okrasnega traku
      description: Označuje, kako se okrasni trak dobavlja oziroma prodaja (npr. na
        zvitku, rezan na metre).
    ribbon_pattern_style:
      name: Stil vzorca okrasnega traku
      description: Razvršča metodo nanašanja vzorca, ki se običajno uporablja na rebrastih
        trakovih.
    ribbon_sheen_level:
      name: Stopnja sijaja okrasnega traku
      description: Označuje vizualni lesk/sijaj površine satenastega traku.
    ribbon_style:
      name: Stil okrasnega traku
      description: Navaja vizualni vzorec/stil okrasnega traku (npr. enobarven, črtast,
        tribarven).
    ribbon_trim_backing_type:
      name: Vrsta hrbtne strani okrasnega traku
      description: Označuje, ali ima okrasni trak/obroba hrbtno stran in kakšne vrste
        je ta (za enostavno nanašanje, npr. samolepilna).
    ribbon_trim_edge_finish:
      name: Končna obdelava roba okrasnega traku
      description: Opisuje zgradbo/končno obdelavo roba traku ali obrobe (koristno
        za predvidevanje cefranja in določanje namena uporabe).
    ric_rac_wave_size:
      name: Velikost valov cik-cak traku
      description: Opisuje amplitudo/merilo valov cik-cak traku (kako velike so cik-cak
        linije oziroma valovi).
    rice_grain_length:
      name: Dolžina riževega zrna
      description: Razvršča riževe izdelke glede na dolžino zrna, kot so kratkozrnati,
        srednjezrnati ali dolgozrnati riž, kar vpliva na lastnosti kuhanja in kulinarično
        uporabo.
    rice_processing_method:
      name: Namen nadomestnega dela
      description: Opisuje, kako je bil riž predelan ali pripravljen (npr. parboiled/obdelan
        s paro, kaljen, v kosmičih), kar vpliva na čas kuhanja, hranilno vrednost
        in uporabo.
    rice_variety:
      name: Metoda predelave riža
      description: Navaja specifično sorto ali kultivar riža, kar kupcem omogoča izbiro
        zrn z želenim okusom, aromo, teksturo in predvidenim kulinaričnim namenom.
    riding_toy_features:
      name: Lastnosti igrače za jahanje/poganjalca
      description: Izpostavlja običajne funkcionalne in varnostne lastnosti, specifične
        za igrače za jahanje (poganjalce).
    rifle_action_type:
      name: Vrsta mehanizma puške
      description: Mehanski princip delovanja puške (kako polni, strelja in izmetava
        tulce), kar je pomembno za identifikacijo in zbirateljski interes.
    rifle_finish:
      name: Končna obdelava površine puške
      description: Glavna zunanja površinska obdelava/premaz kovinskih delov orožja.
    rifle_magazine_type:
      name: Vrsta nabojnika za puško
      description: Vrsta polnilnega sistema za puško.
    rifle_stock_material:
      name: Material kopita puške
      description: Glavni material, uporabljen za kopito/lesene ali plastične dele
        puške (npr. oreh, polimer).
    rim_clamping_method:
      name: Način vpenjanja platišča
      description: Kako stroj zavaruje oziroma vpne kolo/platišče med montiranjem
        in demontiranjem.
    rim_strip_type:
      name: Vrsta zaščitnega traku za platišče
      description: Razvršča trak glede na njegov stil, zgradbo ali specifično uporabo
        (npr. trak za platišča brez zračnice v primerjavi z zaščitnim gumijastim trakom).
    rim_tubeless_compatibility:
      name: Združljivost platišča z uporabo brez zračnic
      description: Označuje, ali so platišče, trak ali obroč zasnovani za konfiguracije
        pnevmatik brez zračnic.
    ripeness_stage:
      name: Stopnja zrelosti
      description: Označuje stopnjo zrelosti sadja v času prodaje (npr. nezrelo, zrelo,
        pripravljeno za uživanje).
    riser_pad_type:
      name: Vrsta podložke za podvozje
      description: Razvršča funkcionalni stil podložke (npr. standardni distančnik,
        podložka za ublažitev udarcev, poševna podložka/zagozda).
    roasted_malt_processing_type:
      name: Vrsta predelave praženega slada
      description: Navaja specifični pristop k predelavi ali različico, uporabljeno
        za ustvarjanje praženega slada ali praženega zrnja (npr. nepražen sladni ječmen,
        črni slad, različice z odstranjeno grenčico ali odstranjenimi luskami).
    robotic_toy_interaction_mode:
      name: Način interakcije robotske igrače
      description: Opisuje glavni način, na katerega robot komunicira ali se premika
        med igro.
    robotic_toy_light_features:
      name: Sorta riža
      description: Označuje, ali igrača uporablja luči kot del igre in kako (npr.
        diode LED, projekcija).
    robotic_toy_programming_supported:
      name: Podprto programiranje robotske igrače
      description: Navaja, kateri pristop k programiranju, če sploh katerega, igrača
        podpira.
    robotic_toy_skill_level:
      name: Zahtevnostna stopnja robotske igrače
      description: Označuje stopnjo kompleksnosti upravljanja/programiranja, ki se
        pričakuje od uporabnika.
    robotic_toy_sound_features:
      name: Zvočne lastnosti robotske igrače
      description: Označuje zvočne zmožnosti robotske igrače.
    rod_butt_style:
      name: Stil zaključka ribiške palice
      description: Določa konfiguracijo spodnjega zaključka palice, ki se uporablja
        pri lovu s panulo.
    rod_construction_type:
      name: Lastnosti osvetlitve robotske igrače
      description: Označuje splošni stil izdelave ribiške palice glede na število
        delov in zložljivost.
    rod_guide_material:
      name: Material vodil ribiške palice
      description: Navaja material, uporabljen za vodila vrvice ali vložke na ribiški
        palici, kar vpliva na vzdržljivost, težo in trenje vrvice.
    rod_guide_type:
      name: Vrsta vodil ribiške palice
      description: Navaja glavni stil vodil za vrvico, nameščenih na palici.
    rod_handle_type:
      name: Vrsta izdelave ribiške palice
      description: Navaja konfiguracijo oprijema ribiške palice, kar pripomore k udobju
        in izbiri tehnike.
    roll_cage_tubing_material:
      name: Material cevi varnostne kletke
      description: Navaja material/zlitino cevi, uporabljeno za varnostno kletko/varnostni
        lok (npr. DOM jeklo v primerjavi z 4130 krom-molibdenovim jeklom).
    roller_skate_brake_shape:
      name: Oblika zavore kotalk
      description: Opisuje geometrijsko obliko/profil zavorne glave za boljšo zmogljivost
        ali estetske želje.
    roller_skate_brake_type:
      name: Vrsta ročaja ribiške palice
      description: Navaja zavorni sistem, ki se uporablja na kotalkah.
    roller_ski_technique:
      name: Tehnika teka na rolkah
      description: Opredeljuje tehniko smučarskega teka, za katero so smučarske rolke
        zasnovane.
    roller_technology:
      name: Tehnologija masažnih valjev
      description: Označuje integrirano tehnologijo, ki izboljša učinkovitost masaže,
        kot sta vibracija ali toplota.
    rolling_case_wheel_configuration:
      name: Konfiguracija koles prenosnega kovčka
      description: Navaja konfiguracijo koles, uporabljeno na prenosnih kovčkih za
        glasbene klaviature.
    rolling_paper_format:
      name: Format cigaretnega papirčka
      description: Opredeljuje fizično predstavitev izdelka (npr. ravni lističi, vnaprej
        zviti stožci, ovoji).
    rolling_paper_gum_type:
      name: Vrsta lepila cigaretnega papirčka
      description: Navaja lepilo, uporabljeno na robu papirčka za lepljenje, kar lahko
        vpliva na okus in učinkovitost.
    rolling_paper_size:
      name: Velikost cigaretnega papirčka
      description: Označuje standardno klasifikacijo velikosti cigaretnega papirčka
        ali stožca, kar kupcem omogoča hitro izbiro pravilne širine/dolžine za njihove
        potrebe.
    rolling_stock_type:
      name: Vrsta tirnih vozil
      description: Navaja, za kakšno vrsto vlaka/tirnega vozila gre pri modelu (lokomotiva
        nasproti potniškim/tovornim vagonom in običajnim podvrstam vagonov).
    roof_cargo_net_hook_fastener_style:
      name: Stil kljuke/zaponke strešne tovorne mreže
      description: Navaja stil končnega okovja, ki se uporablja za povezavo mreže
        s sidrnimi točkami (npr. S-kljuka, karabin, J-kljuka).
    roof_height_class:
      name: Vrsta zavore za kotalke
      description: Kategorizira višino strehe, ki se običajno uporablja za kombije
        (posebej pomembno za predelave v bivalnike).
    roof_type:
      name: Vrsta strehe
      description: Konfiguracija strešnega ali stropnega dela ograde.
    root_variety:
      name: Sorta korenike
      description: Opredeljuje sorto ali splošno vrsto korenine (npr. hren nasproti
        pravim sortam wasabija).
    rope_buoyancy:
      name: Razred višine strehe
      description: Navaja, ali je vrv zasnovana tako, da plava na vodni površini,
        kar športnikom pomaga preprečiti zapletanje in poenostavi dvigovanje.
    rope_construction:
      name: Plovnost vrvi
      description: Navaja podrobnosti o zgradbi vlaken, ki presegajo stil pletenja,
        kot sta zvito nasproti pletenemu jedru/plašču ter ali gre za vrv z oplaščenim
        jedrom.
    rope_material:
      name: Material vrvi
      description: Opredeljuje material vrvi/vrvice za uglasitev.
    rope_strand_compatibility:
      name: Združljivost s prameni vrvi
      description: Označuje, katere konfiguracije pramenov vrvi lahko varovalna naprava
        sprejme (enojna, polovična/dvojna, dvojčica ali kombinacije).
    rope_stretch_type:
      name: Vrsta raztezanja vrvi
      description: Opisuje lastnosti raztegljivosti vrvi, pri čemer razlikuje med
        neraztegljivimi vrvmi, vrvmi z nizko raztegljivostjo, standardnimi vrvmi ali
        elastičnimi vrvmi.
    rose_bloom_stage:
      name: Stopnja cvetenja vrtnice
      description: Označuje, kako odprti so cvetovi vrtnic ob dostavi/prihodu (od
        popka do popolnoma odprtega cveta).
    rose_grade:
      name: Kakovostni razred vrtnic
      description: Komercialni kakovostni razred rezanih vrtnic.
    rosette_center_type:
      name: Vrsta središča rozete
      description: Navaja vrsto središčnega detajla ali vložka na sprednji strani
        rozete.
    rosin_dust_level:
      name: Stopnja prašenja kolofonije
      description: Označuje pričakovano količino prahu kolofonije, ki nastane med
        običajno uporabo.
    rosin_formula_additives:
      name: Sestava/aditivi kolofonije
      description: Opredeljuje izstopajoče lastnosti sestave, kot so hipoalergične
        mešanice, mešanice z malo prahu ali mešanice z dodatkom kovinskih delcev.
    rosin_hardness:
      name: Trdota kolofonije
      description: Označuje relativno trdoto/mehkobo kolofonije za lok, kar lahko
        vpliva na oprijem in prašenje v različnih podnebjih ter stilih igranja.
    rotation_mechanism_type:
      name: Vrsta rotacijskega mehanizma
      description: Navaja mehanizem, ki omogoča vrtenje vrvi, kar vpliva na gladkost
        in dosegljivo hitrost (npr. kroglični ležaji v primerjavi s pušami).
    rotation_motion_features:
      name: Funkcije vrtenja/gibanja
      description: Označuje, ali se planeti/orbite vrtijo oziroma premikajo in kako.
    rotor_configuration_type:
      name: Zgradba vrvi
      description: Opredeljuje konfiguracijo rotorja in stil vodenja daljinsko vodenega
        helikopterja (npr. koaksialni, enorotorski s fiksnim korakom v primerjavi
        s kolektivnim korakom, večrotorski), kar bistveno vpliva na letalne lastnosti
        in primernost za različne stopnje znanja.
    rotor_construction_type:
      name: Vrsta konfiguracije rotorja
      description: Navaja stil izdelave rotorja (zavornega diska), kar vpliva na težo,
        togost in upravljanje toplote.
    rotor_mounting_interface:
      name: Vrsta izdelave rotorja
      description: Določa standard vmesnika pesta, ki se uporablja za pritrditev zavornega
        diska na kolo.
    rotor_mounting_standard:
      name: Vmesnik za montažo rotorja
      description: Navaja standard vmesnika, ki se uporablja za pritrditev zavornega
        diska na pesto (npr. s 6 vijaki ali Center Lock).
    roulette_set_components_included:
      name: Standard za montažo rotorja
      description: Ključne vključene komponente, povezane z ruleto, ki so priložene
        kolesu/kompletu.
    roulette_wheel_ball_track_type:
      name: Vrsta kroglične steze kolesa rulete
      description: Opisuje stil kroglične steze, uporabljene na kolesu, kar vpliva
        na realizem in občutek igre.
    roulette_wheel_numbering_system:
      name: Sistem številčenja kolesa rulete
      description: Označuje številčenje kolesa rulete in konfiguracijo ničel za združljivost
        z načinom igre/verjetnostmi dobitka (npr. evropska vs. ameriška).
    rounders_equipment_included:
      name: Vključene komponente kompleta rulete
      description: Navaja specifične predmete ali dodatke za igro rounders, ki so
        priloženi kompletu ali paketu pripomočkov za trening, da kupci natančno vedo,
        kaj je v škatli.
    rounders_governing_body_approval:
      name: Odobritev krovne organizacije za rounders
      description: Označuje certifikacijo ali odobritev s strani uradne krovne organizacije
        za rounders ali druge športne organizacije.
    row_counter_format:
      name: Format števca vrstic
      description: Navaja format/stil števca vrstic za pletenje (npr. prstan, verižica,
        kliker, digitalen).
    row_counter_mechanism:
      name: Mehanizem števca vrstic
      description: Navaja, kako se število vrstic premika naprej/beleži na pripomočku.
    row_counter_mounting_method:
      name: Način namestitve števca vrstic
      description: Kako se števec/marker pritrdi med uporabo (na iglo, na prst, na
        projekt itd.).
    rowel_type:
      name: Vrsta nazobčanega kolesca
      description: Opisuje obliko ali profil roba nazobčenega kolesca glede na jahačeve
        želje in občutljivost konja.
    rowing_machine_part_type:
      name: Vrsta dela za veslaško napravo
      description: Opredeljuje specifično komponento, ki jo izdelek nadomešča na veslaški
        napravi, da lahko kupci hitro najdejo natančen del, ki ga potrebujejo, ne
        da bi pri tem ustvarili eksplozijo mikro-kategorij.
    rubber_ducky_character_theme:
      name: Lik/tematika gumijaste račke
      description: Tematika ali stilizacija lika gumijaste račke (koristno za unikatne/zbirateljske
        račke).
    rubber_ducky_features:
      name: Lastnosti gumijaste račke
      description: Funkcionalne/oblikovne lastnosti, specifične za gumijaste račke
        za kopanje.
    rubber_ducky_size_class:
      name: Razred velikosti gumijaste račke
      description: Kupcem prijazno razvrščanje gumijastih račk v skupine po velikosti
        na podlagi običajne uporabe (igrača za kad nasproti okrasu za torte nasproti
        jumbo velikosti).
    ruffle_style:
      name: Stil volančkov
      description: Opisuje zgradbo ali vizualni stil volančka (naborka) na traku za
        krasitev stola.
    rugby_headgear_safety_certification:
      name: Označuje, ali zaščitno pokrivalo izpolnjuje uradne varnostne standarde
        za ragbi ali splošne športne varnostne standarde.
      description: Označuje, ali pokrivalo izpolnjuje uradne ragbi ali splošne športne
        varnostne standarde.
    rugby_size:
      name: Ragbi velikost
      description: Kategorizira opremo glede na običajne oznake velikosti, specifične
        za ragbi, ki se uporabljajo v naslovih izdelkov.
    rugby_variant:
      name: Različica ragbija
      description: Navaja različico ragbija (pravilnik ali format), za katero je izdelek
        predviden
    ruler_edge_type:
      name: Vrsta roba ravnila
      description: Opredeljuje profil/funkcijo roba, ki se uporablja za merjenje ali
        označevanje (npr. raven rob, poševen rob)
    ruler_marking_style:
      name: Stil oznak ravnila
      description: Opisuje postavitev oznak/vodil, natisnjenih na ravnilu, ki presegajo
        osnovne črtice za milimetre/centimetre.
    runner_configuration:
      name: Vključena oprema za igro rounders
      description: Opisuje število in razporeditev sanic na saneh.
    runner_material:
      name: Material sanic
      description: Navaja material, uporabljen za sanice sani ali drsne trakove.
    saddle_cover_style:
      name: Stil prevleke za sedlo
      description: Razvršča splošno zasnovo ali stil uporabe izdelka (npr. prevleka
        za shranjevanje, prevleka za uporabo med vožnjo/ježo, torba za prenašanje).
    saddle_design:
      name: Zasnova sedla
      description: Razvršča splošno ergonomsko zasnovo ali stil razbremenitve sedla
        oz. sedeža (npr. z izrezom, brez konice, z deljeno konico, z vzmetenjem).
    saddle_discipline:
      name: Disciplina sedla
      description: Določa primarno disciplino jahanja ali predvideno uporabo/slog
        sedla.
    saddle_mounting_type:
      name: Konfiguracija drsnih letev
      description: Navaja glavno disciplino jahanja/vožnje ali predviden namen uporabe/stil
        sedla.
    saddle_pad_shape:
      name: Oblika podsedelne podloge
      description: Opisuje fizični kroj/obris podloge, kar vpliva na združljivost
        s sedlom in estetske želje.
    saddle_pad_style:
      name: Stil podsedelnice
      description: Opredeljuje funkcionalni stil podloge ali predvideno disciplino,
        kar kolesarjem/jahačem omogoča izbiro prave zasnove za njihovo aktivnost ali
        vrsto sedla.
    saddle_padding_material:
      name: Material blazinjenja sedla/sedeža
      description: Označuje glavni blažilni material ali tehnologijo znotraj sedla/sedeža,
        kar vpliva na udobje in občutek med vožnjo.
    saddle_rail_material:
      name: Material vodil kolesarskega sedla
      description: Navaja material, uporabljen za vodila pod kolesarskim sedežem,
        kar vpliva na trdnost, udobje, težo in ceno.
    saddle_tree_material:
      name: Material ogrodja sedla
      description: Navaja material, uporabljen za ogrodje sedla, tj. notranji okvir
        sedla.
    saddle_tree_width:
      name: Širina ogrodja sedla
      description: Opisuje klasifikacijo širine ogrodja sedla, kar določa prileganje
        na konjskem zavihku.
    safety_documentation_available:
      name: Na voljo je varnostna dokumentacija
      description: Označuje, kateri dokumenti o skladnosti/varnosti so predloženi
        za sestavino (npr. varnostni list, certifikat/izjava IFRA, izjava/deklaracija
        o alergenih).
    safety_equipment_included:
      name: Vključena varnostna oprema
      description: Varnostni/zaščitni predmeti, vključeni v komplet.
    safety_features:
      name: Varnostne funkcije
      description: Označuje vgrajene varnostne lastnosti, namenjene zmanjšanju nenamernih
        ureznin ali zaščiti rezila med shranjevanjem.
    safety_harness_type:
      name: Vrsta varnostnega pasu
      description: Označuje stil in konfiguracijo zadrževalnega pasu za otroke, ki
        je priložen sedežu.
    safety_mechanism_type:
      name: Vrsta varnostnega mehanizma
      description: Opisuje stil vgrajenega varnostnega sistema, ki se uporablja za
        ulov dvižne palice z utežmi pri neuspelih dvigih.
    safety_restraint_type:
      name: Vrsta varnostnega zadrževala
      description: Vrsta vgrajenega otroškega varovala na sedežu gugalnice, če je
        prisotno.
    safety_warning:
      name: Varnostno opozorilo
      description: Označuje, ali izdelek vsebuje običajna varnostna opozorila za igrače,
        ki so pomembna za kroglice (npr. nevarnost zadušitve).
    sail_shape:
      name: Oblika jadra
      description: Opisuje geometrijski stil kajakaškega jadra, kar vpliva na učinkovitost,
        upravljanje in montažo.
    salad_dressing_type:
      name: Vrsta solatnega preliva
      description: Opredeljuje osnovni stil ali teksturo preliva (npr. kremast, vinaigrette,
        na osnovi jogurta), kar kupcem pomaga razlikovati med različnimi osnovami
        in konsistencami.
    salad_topping_base_ingredient:
      name: Glavna sestavina posipa za solato
      description: Navaja glavno skupino sestavin, ki tvori posip, kar strankam pomaga
        pri filtriranju glede na prehranske preference, skrbi glede alergenov ali
        želeno teksturo.
    salt_level:
      name: Stopnja slanosti
      description: Označuje količino soli ali natrija, dodano oreščkom ali semenom.
    sand_cup_features:
      name: Lastnosti posodice za pesek
      description: Funkcionalne/fizične lastnosti posodice (ali posodic) za pesek,
        ki vplivajo na igro in uporabo.
    sand_shovel_handle_style:
      name: Stil ročaja lopatke za pesek
      description: Opisuje obliko ročaja/oprijema na koncu rastišča lopate/lopatke.
    sand_toy_set_pieces_included:
      name: Vključeni kosi v kompletu igrač za pesek
      description: Navaja vrste komponent igrač za pesek, ki so vključene v komplet
        (npr. vedro, lopatka, modelčki), kar kupcem pomaga primerjati komplete glede
        na njihovo vsebino.
    sand_water_mill_items_included:
      name: Vključeni predmeti v mlinu za pesek in vodo
      description: Navaja ključne dodatne komponente, vključene v igračo mlin (vedra,
        zajemalke, modelčki itd.).
    sandbag_style:
      name: Stil utežne vreče s peskom
      description: Opredeljuje specifično zasnovo in predviden namen vadbe z vrečo
        peska (npr. bolgarska vreča, strongman, power bag), kar kupcem pomaga izbrati
        med različnimi oblikami vadbe.
    sandbox_bottom_type:
      name: Vrsta dna peskovnika
      description: Vrsta konstrukcije osnove/dna, ki se uporablja pod peskom.
    sandbox_drainage_type:
      name: Vrsta drenaže
      description: Kako peskovnik odvaja vodo (če je to primerno), kot so drenažne
        luknje ali odstranljiv čep.
    sandbox_seating_type:
      name: Vrsta sedišča v peskovniku
      description: Ali peskovnik vključuje integrirano sedišče in kakšne vrste je.
    sapodillo_variety:
      name: Sorta sapodile
      description: Opredeljuje specifični kultivar ali sorto sapodile/čikuja (npr.
        »Alano«, »Prolific«), kar navdušencem omogoča izbiro želenih profilov okusa
        in značilnosti.
    sapote_variety:
      name: Sorta zapote
      description: Navaja specifično vrsto/tip sapote v ponudbi (npr. črna, bela,
        mamey), kar kupcem omogoča razlikovanje med različnimi vrstami.
    satin_ribbon_face_type:
      name: Vrsta čelne strani satenastega traku
      description: Navaja, ali ima okrasni trak satenast končni izgled na eni ali
        na obeh straneh.
    sauce_consistency:
      name: Konsistenca omake
      description: Opisuje teksturo ali gostoto omake za pico.
    sauce_product_form:
      name: Oblika omake kot izdelka
      description: Označuje fizično obliko omake kot izdelka, kot so tekočina, olje,
        pasta, prah, kosmiči ali sirup.
    sauce_variety:
      name: Vrsta omake
      description: Opredeljuje specifični stil ali družino receptov bele ali kremne
        omake (npr. Alfredo, bešamel, holandska omaka).
    saxophone_body_finish:
      name: Končna obdelava trupa saksofona
      description: Opisuje glavno končno obdelavo/prevleko na trupu saksofona (ločeno
        od mehanizma z zaklopkami).
    saxophone_body_type:
      name: Vrsta trupa saksofona
      description: Opisuje splošno fizično konfiguracijo trupa basovskega saksofona
        in usmerjenost zvona.
    saxophone_construction_style:
      name: Stil izdelave saksofona
      description: Označuje splošne konstrukcijske lastnosti izdelave saksofona, ki
        vplivajo na trpežnost, resonanco in servisiranje.
    saxophone_included_accessories:
      name: Priloženi dodatki za saksofon
      description: Navaja vključene dodatke, ki so običajno priloženi paketu altovskega
        saksofona.
    saxophone_key_system:
      name: Sistem zaklopk (mehanizma) saksofona
      description: Opredeljuje sistem zaklopk saksofona (standard razporeditve/mehanizma)
        na instrumentu.
    saxophone_key_touch_material:
      name: Material površine zaklopk saksofona
      description: Vrsta deflektorja ustnika za saksofon
    saxophone_mouthpiece_baffle_type:
      name: Opisuje zasnovo deflektorja, ki oblikuje pretok zraka in svetlost tona.
      description: Opisuje zasnovo pregrade, ki Shapes pretok zraka in svetlost.
    saxophone_neck_type:
      name: Vrsta vratu saksofona
      description: Navaja konfiguracijo vratu, ki je priložen basovskemu saksofonu.
    saxophone_package_contents:
      name: Vsebina paketa saksofona
      description: Navaja, kateri ključni dodatki so priloženi saksofonu (npr. kovček,
        ustnik, ligatura, ovratni trak, komplet za čiščenje).
    saxophone_reed_cut:
      name: Kroj jezička za saksofon
      description: Navaja stil jezička za saksofon, kar vpliva na odzivnost, ton in
        občutek.
    saxophone_reed_material_type:
      name: Vrsta materiala jezička za saksofon
      description: Navaja kategorijo materiala jezička (npr. trstika v primerjavi
        s sintetiko).
    saxophone_reed_strength_scale:
      name: Lestvica trdote jezička za saksofon
      description: Navaja številčni sistem/lestvico trdote, ki se uporablja za jeziček
        (pogosto odvisno od znamke), kar omogoča jasnejšo primerjavo med ponudbami.
    saxophone_small_part_thread_size:
      name: Velikost navoja malih delov saksofona
      description: Navaja velikost/standard navoja za male dele saksofona z navojem
        (predvsem vijake), kar omogoča izbiro pravilnega prileganja.
    saxophone_swab_application_area:
      name: Območje uporabe čistilne krpe za saksofon
      description: Označuje, kateri del saksofona je čistilna krpa predvidena čistiti/sušiti.
    scabbard_material:
      name: Material nožnice
      description: Navaja glavni material priložene nožnice/toka (če je prisoten).
    scale_model_assembly_status:
      name: Status sestavljenosti makete
      description: Označuje, ali je maketa pripravljena za razstavljanje ali pa zahteva
        sestavljanje/barvanje
    scale_model_car_features:
      name: Lastnosti makete avtomobila
      description: Izstopajoče lastnosti makete avtomobila, kot so odpiranje vrat/pokrova
        motorja, vodljiva kolesa, vzmetenje itd.
    scale_model_kit_assembly_requirements:
      name: Zahteve za sestavljanje kompleta makete
      description: Navaja, kateri dodatni koraki sestavljanja/pripomočki so običajno
        potrebni poleg osnovnega sestavljanja s klikom
    scale_model_kit_components_included:
      name: Vključene komponente kompleta makete
      description: Navaja, kaj je vključeno v model/komplet tanka v merilu (npr. nalepke,
        figure, fotojedkane dele).
    scale_model_paint_status:
      name: Status obarvanosti makete
      description: Označuje, ali je maketa helikopterja vnaprej pobarvana/dokončana
        ali pa zahteva barvanje.
    scale_model_pose:
      name: Poza makete (pomanjšanega modela)
      description: Navaja upodobljeno pozo modela konja za uskladitev pri razstavljanju
        ali umeščanju v dioramo.
    scale_model_rotor_configuration:
      name: Konfiguracija rotorja makete
      description: Navaja konfiguracijo rotorja helikopterja, ki jo model upodablja.
    scale_model_truck_era:
      name: Obdobje makete tovornjaka
      description: Označuje obdobje/časovni okvir pravega tovornjaka, ki ga model
        predstavlja (koristno za zbiratelje, ki iščejo starodobne nasproti sodobnim
        tovornjakom).
    scale_model_truck_propulsion_type:
      name: Vrsta pogona makete tovornjaka
      description: Navaja, ali je upodobljeni tovornjak dizelski, bencinski, električni,
        hibridni ali pa gre za drugo vrsto pogona (kot jo model predstavlja/oglašuje).
    scale_units:
      name: Enote merilne lestvice
      description: Merilne enote, natisnjene/vgravirane na vodilu (gredi) za nastavljanje
        radija/premera.
    scent_function:
      name: Funkcija vonja
      description: Določa glavno funkcijo dišavnega izdelka, da lahko lovci hitro
        zožijo izbiro na pravo pripomoček (npr. vabilo/atraktaat nasproti odstranjevalcu
        vonjav).
    scent_source:
      name: Vir vonja (vonjave)
      description: Navaja glavni biološki ali aromatični vir, uporabljen v sestavi
        izdelka, kar zajema vrste urina, vonjave na osnovi hrane, rastlinske arome
        itd.
    school_bus_body_type:
      name: Vrsta karoserije šolskega avtobusa
      description: Razvršča šolski avtobus glede na običajne formate karoserije/razredov,
        ki se uporabljajo na trgu (npr. vrsta A–D).
    school_bus_safety_feature:
      name: Varnostna lastnost šolskega avtobusa
      description: Izstopajoča varnostna oprema, nameščena na šolskem avtobusu.
    school_glue_washability:
      name: Pralnost šolskega lepila
      description: Označuje, kako enostavno je mogoče posušeno/mokro lepilo očistiti
        s kože, oblačil ali površin.
    scissors_application:
      name: Uporaba škarij
      description: Glavni predvideni namen rezanja oziroma material za škarje.
    scooter_brake_pad_material:
      name: Material zavorne ploščice skiroja
      description: Navaja zmes, uporabljeno v zavornih ploščicah, kar vpliva na delovanje,
        hrup in življenjsko dobo.
    scoring_method:
      name: Metoda točkovanja
      description: Navaja, kako se spremljajo rezultati na mizi za namizni nogomet,
        kot so ročni števci s kroglicami ali elektronske semaforje.
    scoring_pattern:
      name: Vzorec točkovanja
      description: Razporeditev točkovalnih območij, natisnjenih na igralni površini.
    scoring_system_type:
      name: Vrsta sistema točkovanja
      description: Opisuje slog mehanizma za beleženje rezultatov, ki je vključen
        v mizo, kot so ročni drsniki ali različni elektronski zasloni.
    scottish_smallpipes_bag_material:
      name: Material meha škotskih malih dud
      description: Navaja material meha, ki je priložen malim dudam.
    scottish_smallpipes_drone_tuning_configuration:
      name: Konfiguracija uglasitve basovskih cevi škotskih malih dud
      description: Navaja konfiguracijo uglasitve basovskih cevi (dronov), ki je priložena
        instrumentu (višine tonov/vloge dronov v primerjavi s toniko).
    scottish_smallpipes_reed_type:
      name: Vrsta piska škotskih malih dud
      description: Opredeljuje vrsto piska, ki se uporablja za melodijsko cev (in/ali
        ali so piski sintetični nasproti tistim iz trstike).
    scraping_surface_type:
      name: Vrsta strgalne površine
      description: Navaja zgradbo/geometrijo strgalne površine, ki proizvaja zvok
        (npr. z utori, glavnik/zobje, valovita).
    screw_drive_type:
      name: Vrsta utora vijaka
      description: Navaja stil utora na glavi vijaka ali sornika, kar označuje orodje,
        potrebno za privijanje ali odstranjevanje (npr. inbus/Allen, Torx).
    screw_thread_size:
      name: Velikost navoja vijaka
      description: Navaja standard velikosti navoja priloženih ali združljivih vijakov
        (npr. M4, M5, M6).
    sculpting_clay_base_type:
      name: Vrsta osnove mase za kiparjenje
      description: Opisuje osnovno sestavo/osnovo mase za kiparjenje.
    seafood_cut:
      name: Rez morskih sadežev/rib
      description: Opisuje fizični rez ali predstavitev morskega sadeža oziroma ribjega
        izdelka (npr. cel, file, zrezek).
    seafood_processing_method:
      name: Metoda predelave morskih sadežev
      description: Navaja glavno tehniko konzerviranja ali predelave, uporabljeno
        na morskih sadežih, kot so dimljenje, soljenje ali liofilizacija (sušenje
        z zamrzovanjem).
    seafood_source:
      name: Vir morskih sadežev
      description: Označuje, ali so morski sadeži ulovljeni v divjini, gojeni v ribogojnici,
        na rastlinski osnovi ali iz drugega vira, kar kupcem pomaga oceniti trajnost
        in kakovost.
    seal_material:
      name: Material tesnila
      description: Material, uporabljen za tesnila na vratu, zapestjih in gležnjih,
        ki ohranjajo obleko vodotesno.
    seal_type:
      name: Vrsta tesnila
      description: Navaja metodo tesnjenja, ki jo uporablja priključek za preprečevanje
        puščanja hladilne tekočine.
    sealant_formulation:
      name: Sestava tesnilne mase
      description: Označuje glavno kemijsko sestavo ali tehnologijo aditivov tesnilne
        mase za kolesarske pnevmatike (npr. na osnovi lateksa, ojačana z vlakni, akrilna)
    seals_leak_type:
      name: Vrsta puščanja za tesnjenje
      description: Vrsta/lokacija puščanja v hladilnem sistemu, ki jo je izdelek predviden
        zatesniti
    seam_construction:
      name: Zgradba šivov
      description: Opisuje, kako je ustvarjen šiv na žogi, kar vpliva na rotacijo,
        vzdržljivost in občutek.
    seam_design:
      name: Zasnova šiva
      description: Navaja zgradbo šiva ali dekorativne lastnosti šivov na nogavicah.
    seam_gauge_scale_type:
      name: Vrsta lestvice merilnika šivov
      description: Označuje, katere lestvice/oznake so vključene na merilniku šivov
        poleg osnovne lestvice ravnila.
    seam_gauge_slider_material:
      name: Material drsnika merilnika šivov
      description: Opredeljuje material nastavljive komponente drsnika/kazalca, kadar
        je ta prisotna.
    seam_ripper_tip_style:
      name: Stil konice za paranje šivov
      description: Opisuje funkcionalno zasnovo konice, ki se uporablja za drsenje
        pod šive in varno rezanje sukanca.
    seam_sealing_type:
      name: Vrsta tesnjenja šivov
      description: Opisuje metodo, uporabljeno za preprečevanje vdora vode na šivih
        dežne obleke (npr. popolnoma prelepljeni šivi, varjeni šivi).
    seam_type:
      name: Vrsta šiva
      description: Opisuje stil šivanja na žogi za baseball, kar vpliva na oprijem,
        aerodinamiko in predvideno raven igre.
    season_condition_protection:
      name: Zaščita pred letnimi časi
      description: Označuje glavno vreme/vremenske razmere, pred katerimi je pokrivalo
        za vetrobransko steklo predvideno varovati.
    season_rating:
      name: Ocena primernosti za letne čase
      description: Navaja sezonsko oceno šotora, kar označuje njegovo primernost za
        različne vremenske razmere (npr. za 3 letne čase, 4 letne čase, 5 letnih časov/ekspedicijski).
    seasoning_variety:
      name: Sorta začimbne mešanice
      description: Razvršča začimbno mešanico glede na stil njene priprave ali tradicionalno
        kulinarično uporabo.
    seat_adjustment_power_type:
      name: Vrsta pogona za nastavljanje sedeža
      description: Navaja, kako se sprožijo mehanizmi za nastavljanje sedeža (ročne
        ročice nasproti električnim motorjem), kar vpliva na ožičenje/združljivost.
    seat_belt_attachment_type:
      name: Vrsta pritrjevanja varnostnega pasu
      description: Navaja, kako se trak pritrdi na vozilo oziroma na kovinske dele
        pasu.
    seat_belt_buckle_electrical_connector_type:
      name: Vrsta električnega priključka zaponke varnostnega pasu
      description: Navaja priključek/vmesnik, ki se uporablja za ožičenje stikala
        zaponke/zateznika pasu, kadar je to primerno.
    seat_belt_buckle_mounting_type:
      name: Vrsta montaže zaponke varnostnega pasu
      description: Opisuje, kako se zaponka/sprejemnik pritrdi na vozilo, sedež ali
        steblo pasu (npr. s privijanjem, s sponko/klikom).
    seat_belt_buckle_release_button_color:
      name: Barva gumba za sprostitev zaponke varnostnega pasu
      description: Navaja barvo gumba za sprostitev zaponke.
    seat_belt_cover_placement:
      name: Namestitev prevleke za varnostni pas
      description: Navaja, na katerem delu varnostnega pasu je predvidena uporaba
        prevleke.
    seat_belt_integration:
      name: Integracija varnostnega pasu
      description: Navaja, ali sedež vključuje integriran varnostni pas in/ali sprejemnik
        zaponke ali pa je treba za namestitev prenesti originalni (OEM) sprejemnik
        zaponke vozila.
    seat_belt_provision:
      name: Prisotnost varnostnega pasu
      description: Označuje, ali so varnostni pasovi in/ali pripadajoči kovinski deli
        pasu (na primer zaponke) vključeni v sklop zadnjih sedežev ali pa jih je treba
        prenesti z originalnega sedeža.
    seat_belt_strap_installation_location:
      name: Mesto namestitve traku varnostnega pasu
      description: Označuje, kje znotraj sistema pasov je trak nameščen.
    seat_cover_placement:
      name: Namestitev prevleke za sedež
      description: Označuje, za katero sedežno mesto oziroma mesta na vozilu je prevleka
        predvidena.
    seat_cover_securement_method:
      name: Način pritrditve prevleke za sedež
      description: Označuje glavni način, na katerega je prevleka za sedež pritrjena
        na sedež. Če se uporablja več metod, izberite glavno/primarno.
    seat_cover_set_contents:
      name: Vsebina kompleta prevlek za sedeže
      description: Opisuje, kateri kosi so vključeni v paket (npr. samo spodnji deli
        sedežev nasproti celotnemu sedežu + vzglavniki).
    seat_fabric:
      name: Tkanina sedeža
      description: Glavna tkanina, uporabljena za sedežni del in mrežo naslonjala
        stola.
    seat_height_category:
      name: Kategorija višine sedeža
      description: Razvršča stolček glede na običajni razpon višine sedeža (npr. višina
        pulta ali šanka) za poenostavitev izbire.
    seat_material:
      name: Material sedeža
      description: Opredeljuje glavni material sedalne površine klopi.
    seat_mounting_type:
      name: Vrsta montaže sedeža
      description: Konfiguracija montaže/tirnic, ki se uporablja za pritrditev sedeža
        na tla vozila.
    seating_surface_material:
      name: Material sedalne površine
      description: Navaja material površine, na kateri oseba leži oziroma počiva (npr.
        mrežica Textilene, viseče platno, protje, blazinjeno oblazinjenje).
    seatpost_clamp_mechanism:
      name: Mehanizem objemke sedežne opore
      description: Vrsta vpenjalnega/zapiralnega sistema, ki pritrjuje sedežno oporo.
    section_orientation_compatibility:
      name: Združljivost usmerjenosti elementa
      description: Označuje, ali se dodatek prilega elementu z levo usmerjenim naslonom,
        desno usmerjenim naslonom ali univerzalno usmerjenemu elementu.
    sectional_configuration:
      name: Konfiguracija modularne sedežne garniture
      description: Določa specifični modul ali usmerjenost modularne enote (npr. kotni
        element, levi zaključek z naslonom, počivalnik), da lahko kupci sestavijo
        želene razporeditve.
    sectional_shape:
      name: Oblika modularne sedežne garniture
      description: Določa splošno geometrijsko konfiguracijo/razporeditev modularne
        zofe.
    secured_components:
      name: Zavarovane komponente
      description: Navaja specifične dele kolesa, ki jih varuje zaklepni zatič ali
        varnostne matice (npr. prednje kolo, zadnje kolo, sedežna opora).
    seed_content:
      name: Vsebnost semen
      description: Označuje, ali je citrus brez semen, vsebuje malo semen ali pa je
        popolnoma poln semen.
    seed_size_classification:
      name: Klasifikacija velikosti semen
      description: Označuje relativno velikost neužitnega semena znotraj ličija, kar
        vpliva na količino užitnega mesa.
    self_adhesive_backing_format:
      name: Format samolepilne hrbtne strani
      description: Fizični format lepilne hrbtne strani, ki je priložena podstavku
        za vžigalno vrvico/steno (vnaprej nameščena blazinica nasproti ločenim nalepkam
        itd.).
    self_adhesive_hook_loop_backing_type:
      name: Samolepilna podloga z ježkom in zanko
      description: Navaja zgradbo hrbtne strani/zaščitne folije in lepilni sistem,
        uporabljen na samolepilni strani.
    self_adhesive_hook_loop_fastener_shape:
      name: Oblika samolepilne sponke na ježka
      description: Navaja kroj/obliko priloženih kosov sponke oziroma ježka.
    self_hardening_clay_finish:
      name: Končni izgled samozapiralne gline
      description: Opisuje videz/sijaj površine, ko je glina popolnoma strjena (koristno
        za izbiro med naravno mat, satenasto površino itd.).
    self_hardening_clay_water_resistance_after_curing:
      name: Vodoodpornost samozapiralne gline po strjevanju
      description: Označuje odpornost proti izpostavljenosti vodi, ko je glina popolnoma
        strjena (brez dodatnega tesnila).
    sensor_functions:
      name: Funkcija senzorjev
      description: Označuje, katere kolesarske metrične podatke senzor meri.
    sensor_measurement_mode:
      name: Način merjenja senzorja
      description: Označuje, katere metrične podatke senzor lahko zajema (npr. samo
        kadenco, samo hitrost, dvojno hitrost in kadenco).
    sensor_mounting_position:
      name: Položaj montaže senzorja
      description: Navaja mesto na kolesu ali kolesarju, kjer je senzor nameščen,
        kot so gonilka, pesto kolesa ali čevelj. To vpliva na združljivost z različnimi
        konfiguracijami koles.
    sensor_mounting_type:
      name: Vrsta montaže senzorja
      description: Navaja, kako se MAP senzor montira na sesalni kolektor/motor (npr.
        prirobnica z vijaki v primerjavi z vtisnimi tesnilki)
    sensor_or_gauge_mounting_location:
      name: Mesto montaže senzorja ali merilnika
      description: Navaja, kje na vozilu je predvidena namestitev senzorja ali merilnika
        (na ravni sistema/lokacije, ne levo/desno).
    sensory_modality:
      name: Senzorična modalnost
      description: Glavna čutna izkušnja oziroma izkušnje, ki jih je igrača zasnovana
        ponuditi (lahko je veččutna).
    sensory_toy_fidget_mechanism:
      name: Fidget mehanizem senzorične igrače
      description: Glavna interakcija/mehanizem, ki se uporablja za igranje (fidgeting)
        in samoregulacijo.
    sensory_toy_light_features:
      name: Značilnosti senzoričnih igrač z lučkami
      description: Načini osvetlitve/učinki, ki jih igrača omogoča.
    sensory_toy_texture_type:
      name: Vrsta teksture senzorične igrače
      description: Prevladujoč občutek na površini/elementi teksture, ki se uporabljajo
        za tipalno stimulacijo.
    sequin_application_method:
      name: Metoda nanašanja bleščic
      description: Kako je bleščica (konfeti) predvidena za nanašanje/uporabo (šivanje
        v primerjavi z lepljenjem v primerjavi s toplotnim pritrjevanjem itd.)
    sequin_finish:
      name: Končni izgled bleščice
      description: Opisuje površinski/vizualni izgled in odsevni učinek bleščic, uporabljenih
        na emblemski krpi (npr. mat, kovinski, holografski), ne pa hrbtne strani krpe
        ali metode pritrjevanja.
    serger_stitch_functions:
      name: Funkcije vbodov opletilnega šivalnega stroja
      description: Tonske funkcije vbodov, ki jih opletilni stroj podpira (variacije
        robnega šivanja in posebni vbodi opletilnega stroja).
    serger_thread_count:
      name: Število niti opletilnega šivalnega stroja
      description: Število niti, ki jih opletilni stroj lahko uporabi za šivanje (npr.
        zmožnost šivanja z 2/3/4/5 nitmi)
    service_interval:
      name: Servisni interval
      description: Priporočeni največji časovni razmik med zahtevanimi pregledi/servisiranjem
        s strani odobrenega servisa.
    serving_temperature:
      name: Temperatura serviranja
      description: Označuje predvideno temperaturo serviranja ali stanje izdelka ob
        zaužitju.
    sesame_seed_hull_status:
      name: Status luščenja sezamovih semen
      description: Navaja, ali je tahini narejen iz oluščenih ali neoluščenih sezamovih
        semen, kar vpliva na barvo, okus in hranilno vrednost.
    sesame_seed_roast_level:
      name: Stopnja praženja sezamovih semen
      description: Označuje, koliko so bila sezamova semena prepražena pred mletjem,
        kar kupcem pomaga izbrati želeno intenzivnost okusa.
    sesame_seed_variety:
      name: Sorta sezamovih semen
      description: Opredeljuje barvo ali sorto sezamovih semen, uporabljenih za izdelavo
        olja.
    set_classification:
      name: Klasifikacija kompleta
      description: Določa predvideno raven igre ali stil kompleta za kriket (npr.
        turnirski, rekreativni, potovalni).
    set_components:
      name: Komponente kompleta
      description: Označuje, kateri kosi so vključeni v izdelek (npr. samo sredinska
        palica v primerjavi s celotnim kompletom).
    set_items_included:
      name: Vključeni predmeti v kompletu
      description: Navaja oblačila ali dodatke, vključene v komplet, kot so blago
        za sari, dupatta ali pas.
    setup_mechanism:
      name: Mehanizem postavitve
      description: Opisuje glavni način postavitve šotora (npr. samopostavljiv, napihljiv,
        strešni trdi kovček).
    setup_type:
      name: Vrsta postavitve
      description: Kako se igralni šotor/predor sestavi ali postavi.
    sew_in_interfacing_elasticity:
      name: Elastičnost medvloge za šivanje
      description: Označuje, ali je medvloga za šivanje raztegljiva in če je, v kateri
        smeri oziroma smereh, da ustreza pletenim ali tkanim projektom.
    sew_in_label_placement:
      name: Namestitev etikete za šivanje
      description: Označuje predvideno mesto namestitve na končnem izdelku.
    sew_on_edge_finish:
      name: Končna obdelava roba za prišivanje
      description: Označuje, ali so robovi traku na ježka surovi/rezani ali končno
        obdelani, da so odporni proti cefranju.
    sew_on_rhinestone_hole_orientation:
      name: Usmerjenost luknjic kristalčka za prišivanje
      description: Razporeditev/usmerjenost luknjic glede na kamen (npr. ena poleg
        druge, nasproti si, v križ), kar omogoča različne stile šivanja.
    sewing_kit_components_included:
      name: Vključene komponente v šivalnem kompletu
      description: Navaja šivalne pripomočke/orodja, vključene v šivalni komplet,
        da lahko kupci primerjajo, kaj vsebuje posamezni komplet.
    sewing_machine_bobbin_class:
      name: Razred vretenca šivalnega stroja
      description: Navaja razred/sistem vretenca, ki je združljiv s šivalnim strojem
        za vretenca in ohišja vretenc.
    sewing_machine_buttonhole_type:
      name: Vrsta gumbnice šivalnega stroja
      description: Metoda izdelave gumbnic, ki jo stroj podpira.
    sewing_machine_display_type:
      name: Vrsta zaslona šivalnega stroja
      description: Vrsta vmesnika za upravljanje/zaslona na šivalnem stroju.
    sewing_machine_needle_point_type:
      name: Vrsta konice igle za šivalni stroj
      description: Določa geometrijo konice/družino konic igle, kar določa, kako prodira
        skozi različne tkanine (npr. ostra v primerjavi z zaobljeno v primerjavi s
        klinasto konico).
    sewing_machine_needle_system:
      name: Sistem igel za šivalni stroj
      description: Standardizirani sistem igel/številka modela, ki določa združljivost
        s strojem (pogosto zapisano kot 130/705 H, HAx1, DBx1, 15×1 itd.).
    sewing_machine_needle_type:
      name: Vrsta igle za šivalni stroj
      description: Navaja predviden namen uporabe/stil igle (npr. univerzalna, za
        pletenine/ballpoint, jeans/denim), kar vpliva na kakovost vboda in primernost
        za blago.
    sewing_machine_shank_type:
      name: Vrsta stebla šivalnega stroja
      description: Navaja standard stebla/vmesnika tačke za šivanje, za katerega je
        tačka zasnovana, kar zagotavlja združljivost s šivalnim strojem (npr. nizko
        steblo, visoko steblo, poševno steblo).
    sewing_pattern_accessory_type:
      name: Vrsta modnega dodatka šivalnega kroja
      description: Navaja, kateri modni dodatek se izdela s pomočjo tega šivalnega
        kroja.
    sewing_pattern_notions_required:
      name: Zahtevani šivalni pripomočki za šivalni kroj
      description: Navaja izstopajoče dodatne materiale/kovinske dele, potrebne za
        dokončanje projekta (poleg blaga in sukanca).
    sewing_pattern_recommended_fabric:
      name: Priporočena tkanina za šivalni kroj
      description: Navaja priporočene vrste tkanin za šivalni kroj (kot jih navaja
        oblikovalec kroja).
    sewing_pattern_size_range:
      name: Razpon velikosti šivalnega kroja
      description: Navaja predviden razpon velikosti, ki jih kroj pokriva (npr. od
        dojenčkov do odraslih, večje velikosti).
    sewing_thread_size_system:
      name: Sistem debeline sukanca za šivanje
      description: Standard velikosti, ki se uporablja za izražanje debeline sukanca
        (npr. Tex, Denier, Ticket, številka teže, velikost V).
    shaft_curvature:
      name: Ukrivljenost rastišča
      description: Opisuje splošno obliko rastišča, kar vpliva na prosti prostor,
        zamah in ergonomijo.
    shaft_kick_point:
      name: Točka upogiba rastišča
      description: Opredeljuje položaj vzdolž rastišča, kjer se med zamahom najbolj
        upogne, kar vpliva na smer leta žogice.
    shaft_length_type:
      name: Vrsta dolžine gredi
      description: Industrijsko standardna kategorična oznaka velikosti za rastišča
        pikada (npr. kratka, srednja), ki se uporablja, kadar natančne mere v milimetrih
        niso navedene.
    shaft_shape:
      name: Oblika ročaja
      description: Določa profil prečnega prereza ročaja tonfe (npr. okrogel, kvadraten,
        osemkotni).
    shaker_fill_material:
      name: Polnilni material stresalnika
      description: Navaja glavno notranje polnilo, ki se uporablja za ustvarjanje
        zvoka stresala (kadar je to primerno), kot so kroglice, semena ali šibre
    shaker_shell_material:
      name: Material ohišja stresalnika
      description: Navaja glavni material trupa/školjke jajčnega stresala (zunanjega
        ohišja).
    shallot_variety:
      name: Sorta šalotke
      description: Opredeljuje specifični kultivar, tržno vrsto ali sorto izdelka
        iz šalotke.
    shank_style:
      name: Stil stranskega dela žvale
      description: Opisuje splošno obliko/konfiguracijo stranskih delov vzvodne žvale
        (npr. ravni, ukrivljeni, pašni).
    shapewear_enhancement_feature:
      name: Funkcija oblikovanja postave
      description: Izpostavlja glavno funkcionalno izboljšavo, ki jo oblačilo ponuja
        (npr. oblikovanje trebuha, dvig zadnjice, neprepustna podloga).
    sheath_type:
      name: Vrsta nožnice
      description: Vrsta nožnice, ki je priložena zbirateljskemu nožu.
    sheet_music_clip_padding_material:
      name: Material blazinjenja sponke za note
      description: Material kakršnega koli blazinjenja čeljusti/ročaja, ki je v stiku
        s papirjem ali robom stojala, da se prepreči trganje in drsenje.
    sheet_music_clip_spring_tension_level:
      name: Stopnja napetosti vzmeti sponke za note
      description: Relativna moč vzmeti sponke/vpenjalne sile.
    sheet_music_clip_use_environment:
      name: Okolje uporabe sponke za note
      description: Glavno predvideno okolje, kjer je sponka zasnovana za najboljše
        delovanje.
    shell_construction:
      name: Zgradba školjke
      description: Navaja, kako je izdelan obod (školjka) bas bobna, kar močno vpliva
        na ton in težo.
    shell_finish:
      name: Končna obdelava školjke
      description: Zunanja končna obdelava oboda tarabuke.
    shell_hull_status:
      name: Stanje lupine
      description: Navaja, ali se oreščki ali semena prodajajo s celimi ali odstranjenimi
        lupinami oziroma luskami.
    shift_boot_attachment_method:
      name: Način pritrjevanja manšete prestavne ročice
      description: Navaja, kako se manšeta prestavne ročice pritrdi na konzolo vozila/obrobo
        prestavne ročice (npr. okrasni okvir na klik, zadrževalni obroč, lepilo).
    shift_boot_installation_hardware_included:
      name: Vključeno okovje za namestitev manšete prestavne ročice
      description: Navaja namestitveno okovje in komponente, ki so priložene manšeti
        prestavne ročice.
    shift_knob_illumination:
      name: Osvetlitev glave prestavne ročice
      description: Navaja, ali glava prestavne ročice vključuje osvetlitev, ter način/vrsto
        osvetlitve (npr. fotoluminiscenčna, LED, optična vlakna, osvetljen vzorec
        ozadja).
    shift_knob_installation_method:
      name: Način namestitve glave prestavne ročice
      description: Navaja, kako se glava prestavne ročice pritrdi na prestavno ročico/vzvod.
    shift_knob_shape:
      name: Oblika glave prestavne ročice
      description: Opisuje splošno ergonomsko obliko glave prestavne ročice.
    shift_pattern_type:
      name: Vrsta sheme prestavljanja
      description: Navaja stil oznak prestav na glavi prestavne ročice (če so prisotne).
    shifter_compatibility:
      name: Združljivost prestavne ročice
      description: Označuje, ali je podaljšek krmila združljiv z elektronskimi prestavnimi
        ročicami, mehanskimi prestavnimi ročicami, obojimi ali pa sploh ni združljiv
        s prestavnimi ročicami.
    shifter_mounting_interface:
      name: Vmesnik za montažo prestavne ročice
      description: Opisuje, kako se prestavna ročica pritrdi na kolo (npr. ločena
        velikost objemke, I-Spec, MatchMaker, na koncu krmila, na spodnji cevi okvirja,
        brezžično).
    shifting_actuation_type:
      name: Vrsta sprožitve prestavljanja
      description: Opredeljuje mehanizem, ki se uporablja za menjavo prestav v sklopu
        opreme (mehanski, elektronski žični, elektronski brezžični, hidravlični).
    shifting_mechanism:
      name: Mehanizem prestavljanja
      description: Opredeljuje, ali prestavna ročica deluje mehansko ali elektronsko
        ter ali deluje na klike (indeksirano) ali na trenje (frikcijsko).
    shim_purpose:
      name: Namen distančnika
      description: Določa funkcionalno vrsto izdelka (npr. podložka, zagozda, distančnik),
        da lahko kolesarji hitro najdejo pravo rešitev za prilagoditev brez potrebe
        po ločenih podkategorijah.
    shin_guard_attachment_method:
      name: Način pritrjevanja ščitnika za piščali
      description: Razvršča splošni format zasnove ščitnika za piščali, vključno z
        integracijo ščitnika za gleženj ali nogavično konstrukcijo.
    shirt_cuff_style:
      name: Stil manšete srajce
      description: Opredeljuje zgradbo manšete rokava, kar vpliva na formalnost, kombiniranje
        z gumbi za manšete in udobje.
    shochu_base_ingredient:
      name: Osnovna sestavina za šoču
      description: Opredeljuje glavni vir škroba ali sladkorja, ki se uporablja za
        proizvodnjo šočuja.
    shochu_soju_variety:
      name: Vrsta šočuja in sodžuja
      description: Razvršča izdelek glede na njegov priznani stil ali vrsto proizvodnje.
    shock_absorber_bushing_material:
      name: Material puše blažilnika
      description: Material montažnih puš/izolatorjev, ki so priloženi blažilniku
        ali vgrajeni vanj.
    shock_absorber_charge_type:
      name: Vrsta polnjenja blažilnika
      description: Navaja tehnologijo polnjenja/blaženja amortizerja (npr. hidravlični/oljni,
        plinski, zračni) in/ali povezano zasnovo cevi, kjer je to primerno
    shock_absorber_mount_type_lower:
      name: Vrsta montaže amortizerja
      description: Stil spodnjega montažnega vmesnika blažilnika za ujemanje pri namestitvi.
    shock_absorber_mount_type_upper:
      name: Vrsta montaže blažilnika (zgornja)
      description: Navaja zgornji montažni vmesnik blažilnika motornega vozila za
        uskladitev pri namestitvi/združljivosti.
    shock_absorber_position:
      name: Položaj blažilnika
      description: Navaja, ali je blažilnik predviden za sprednji, zadnji, levi ali
        desni položaj na vozilu (bolj natančno od same namestitve na os).
    shock_absorption_system:
      name: Sistem za blaženje udarcev
      description: Določa mehanizem, ki se uporablja za zmanjšanje vibracij in hrupa
        pri povratnem hodu.
    shoe_collar_height:
      name: Višina roba čevlja
      description: Razvršča čevlje glede na višino ovratnika/kroja (nizki, polvisoki,
        visoki), kar označuje pokritost in oporo glede na gleženj.
    shoe_cover_height:
      name: Višina prevleke za čevlje
      description: Navaja raven pokritosti kolesarske prevleke za čevlje, pri čemer
        razlikuje med prevlekami za prste in celotnimi visokimi nadčevlji.
    shoe_sizing_system:
      name: Sistem velikosti obutve
      description: Opredeljuje standard velikosti (ZDA, VB, EU, JP, Mondopoint itd.),
        ki se uporablja za navedeno velikost čevlja.
    shoelace_aglet_material:
      name: Material zaključkov vezalk
      description: Opredeljuje material, uporabljen za konice (zaključke) na koncih
        vezalk, kar vpliva na trpežnost in stil.
    shooting_rest_design:
      name: Zasnova stojala za streljanje
      description: Razvršča strukturni stil naslona (vhodni naslon, sani, stativni
        naslon, primež za orožje itd.).
    shooting_stick_yoke_design:
      name: Zasnova vilic strelske palice
      description: Navaja stil zibelke ali vilic, ki se povezuje s strelnim orožjem
        ali optiko.
    shooting_target_style:
      name: Stil strelske tarče
      description: Razvršča stil ali zasnovo tarč za umetnostno drsanje in hokejsko
        streljanje, da lahko kupci izberejo želeni fokus treninga.
    shooting_target_type:
      name: Vrsta strelske tarče
      description: Razvršča strelske tarče po strukturnem stilu, materialu ali zasnovi
        (npr. gong, silhueta, papirnata tarča s središčem, vrtljiva tarča), kar strelcem
        omogoča hitro iskanje prave tarče za njihovo disciplino in vrsto strelnega
        orožja.
    short_block_assembly_balance_type:
      name: 'Vrsta uravnoteženja sklopa delnega motorja '
      description: Označuje, ali je rotacijski sklop uravnotežen notranje ali zunanje.
    short_block_intended_use:
      name: Predviden namen uporabe delnega motorja
      description: Glavni predvideni primer uporabe za delni motor.
    short_block_rotating_assembly_included:
      name: Vključen rotacijski sklop delnega motorja
      description: Navaja, katere glavne komponente rotacijskega sklopa so vključene
        z delnim motorjem.
    shot_size:
      name: Velikost šiber
      description: Navaja oznako velikosti šiber za nepakirane šibre ali komponente
        streliva.
    shotgun_action_type:
      name: Vrsta mehanizma šibrovke
      description: Določa mehanizem/delovanje šibrovke.
    shotgun_choke_type:
      name: Vrsta zožitve cevi šibrovke
      description: Navaja konfiguracijo čoka na cevi oziroma ceveh šibrovke.
    shotgun_gauge:
      name: Kaliber šibrovke
      description: Navaja kaliber cevi šibrnice (in premer .410,  kjer je to primerno)
        za identifikacijo in filtriranje med zbirateljskimi ponudbami.
    shotgun_stock_material:
      name: Material kopita šibrovke
      description: Navaja glavni material kopita/prednjega lesa (lesene ali plastične
        opreme).
    shuffleboard_speed_rating:
      name: Ocena hitrosti shuffleboarda
      description: Označuje relativno hitrost drsenja, ki jo prašek za shuffleboard
        ali drug izdelek za vzdrževanje zagotavlja na mizi, kar igralcem omogoča izbiro
        ustrezne hitrosti glede na njihovo raven znanja in dolžino mize.
    shuffleboard_table_length_compatibility:
      name: Združljivost dolžin mize za shuffleboard
      description: Standardna dolžina mize za shuffleboard, za katero je izdelek zasnovan,
        da se ji prilega ali jo dopolnjuje.
    shuttlecock_base_material:
      name: Osnovni material pasje bombice
      description: Opredeljuje material, uporabljen za kapico/osnovo badminton žogice,
        kar vpliva na trpežnost, občutek in odboj.
    shuttlecock_feather_material:
      name: Material perja žogice za badminton
      description: Opredeljuje material, uporabljen za kapico/osnovo badminton žogice,
        kar vpliva na trpežnost, občutek in odboj.
    shuttlecock_grade:
      name: Kakovostni razred žogice za badminton
      description: Opredeljuje glavni vir perja ali vrsto izdelave, uporabljeno na
        krilcu badminton žogice, kar vpliva na trpežnost, konsistentnost in ceno.
    shuttlecock_speed_rating:
      name: Ocena hitrosti pasje bombice
      description: Navaja hitrost ali oceno badminton žogice, ki jo določi proizvajalec,
        kar igralcem omogoča izbiro pravilne hitrosti leta glede na njihove pogoje
        igre, temperaturo in nadmorsko višino.
    side_panel_installation_state:
      name: Stanje namestitve stranske plošče
      description: Navaja, ali je stranska plošča dobavljena neobdelana, s temeljnim
        premazom, pobarvana ali drugače premazana/pripravljena za namestitev.
    side_wall_mechanism:
      name: Mehanizem stranice
      description: Opisuje, kako se stranska stranica obposteljne zibelke odpre ali
        spusti za dostop do dojenčka.
    signal_source:
      name: Vir signala
      description: Označuje, kako števec kilometrov prejema/pridobiva informacije
        o razdalji ali času.
    silk_fiber_type:
      name: Vrsta svilenih vlaken
      description: Vrsta/vir svilenih vlaken, uporabljenih za izdelavo blaga (npr.
        murva/dudov sviloprejka ali tussah), kar vpliva na teksturo, enakomernost
        in ceno.
    simulated_game_species:
      name: Simulirane vrste divjadi
      description: Označuje specifično ptico ali žival, ki jo lutka posnema za realističen
        trening.
    singlet_cut_style:
      name: Stil kroja trikoja
      description: Navaja stil rokoborskega trikoja ob upoštevanju višine naramnic,
        stila hrbtnega dela in različic glede na spol/starost.
    sink_material:
      name: Material pomivalnega korita
      description: Navaja material integriranega umivalnika (ali umivalnikov), ki
        je vključen v kopalniški blok z ogledalom.
    sinker_attachment_style:
      name: Stil pritrjevanja uteži
      description: Opisuje mehanizem na ribiški uteži, ki služi za pritrjevanje na
        ribiško vrvico ali sistem.
    sinker_finish:
      name: Končna obdelava uteži
      description: Navaja zunanji premaz ali površinsko obdelavo ribiške uteži.
    sinker_shape:
      name: Oblika svinca
      description: Določa geometrijsko obliko ribiške uteži (npr. krogla, valj, solza),
        da lahko ribiči izberejo optimalno predstavitev in odpornost proti zapenjanju.
    siren_system_included:
      name: Vključen sistem sirene
      description: Označuje, ali je sistem sirene/ozvočenja nameščen in kakšne vrste
        je.
    siren_system_type:
      name: Vrsta sistema siren
      description: Navaja nameščeno konfiguracijo sirene/ozvočenja na policijskem
        tovornjaku.
    size_designation:
      name: Oznaka velikosti
      description: Standardizirana oznaka velikosti za triangel.
    size_system:
      name: Sistem velikosti
      description: Navaja sistem velikosti ali regionalni standard, kateremu ustreza
        oznaka velikosti (npr. ZDA, VB, EU, mednarodna črkovna oznaka).
    sizzle_mechanism:
      name: Mehanizem za šumeč učinek
      description: Navaja, kako činela proizvaja šumeč učinek (npr. zakovice, nameščene
        v čineli, pritrdljiva verižica ali da kovinski deli niso vključeni).
    skate_blade_discipline:
      name: Disciplina rezila drsalke
      description: Opredeljuje drsalno disciplino ali namen uporabe, za katerega je
        rezilo zasnovano, kot sta hokej ali umetnostno drsanje, kar kupcem omogoča
        filtriranje ustreznih rezil.
    skate_brake_type:
      name: Vrsta zavore za rolarje
      description: Opredeljuje stil zavornega mehanizma, ki je priložen drsalkam oziroma
        kotalkam.
    skateboard_nut_thread_size:
      name: Velikost navoja matice za rolko
      description: Navaja velikost navoja (premer in korak) matice, kar zagotavlja
        združljivost z osmi rolke, glavnimi vijaki ali okovjem za montažo.
    skein_winder_bearing_bushing_type:
      name: Vrsta ležaja/puše navijalca štren
      description: Navaja vrsto ležaja ali puše, ki se uporablja v rotacijskem sklopu
        navijalca štren.
    skein_winder_drive_type:
      name: Vrsta pogona navijalca štren
      description: Kako se navijalec štren napaja oziroma vrti med uporabo (npr. ročno,
        električno).
    ski_binding_mechanism:
      name: Mehanizem smučarskih vezi
      description: Določa osnovno mehansko zasnovo ali disciplino vezi (npr. alpinska,
        tehnična, telemark).
    ski_binding_part_type:
      name: Vrsta dela za smučarske vezi
      description: Opredeljuje specifično komponento ali dodatek za smučarske vezi,
        kar omogoča hitro filtriranje med številnimi vrstami delov.
    ski_boot_sole_standard:
      name: Standard podplata smučarskega čevlja
      description: Opredeljuje standard podplata ali standard združljivosti z vezmi,
        za katerega je smučarski čevelj certificiran.
    skill_focus:
      name: Osredotočenost na spretnost
      description: Opredeljuje glavno košarkarsko spretnost, za razvoj katere je pripomoček
        za trening predviden.
    skimboard_construction:
      name: Izdelava deske za plitvine
      description: Opisuje glavno zgradbo deske s poudarkom na jedru in tehniki polaganja
        slojev (npr. penasto jedro, leseno jedro).
    skin_presence:
      name: Prisotnost kože
      description: Navaja, ali se piščanec prodaja s kožo, brez kože ali z delno odstranjeno
        kožo.
    slapstick_handle_type:
      name: Vrsta ročaja biča
      description: Opisuje stil oprijema/ročaja, ki je integriran v bič, kar vpliva
        na ergonomijo in udobje med igranjem.
    slapstick_playing_surface_material:
      name: Material igralne površine biča
      description: Navaja material udarnih elementov, ki ob medsebojnem stiku proizvedejo
        zvok.
    sled_brake_type:
      name: Vrsta zavore za sani
      description: Navaja zavorni mehanizem, ki je vključen na saneh, če sploh obstaja.
    sled_towing_method:
      name: Način vleke sani
      description: Označuje glavni način, na katerega se sani vlečejo.
    sleep_position_suitability:
      name: Primernost položaja spanja
      description: Označuje, katere položaje za spanje vzmetnica najučinkoviteje podpira.
    sleeping_bag_shape:
      name: Oblika spalne vreče
      description: Splošni kroj spalne vreče, kar vpliva na toploto, težo in prostornost.
    sleeping_pad_type:
      name: Vrsta spalne podloge
      description: Opredeljuje stil izdelave podloge — kot je pena z zaprtimi celicami
        ali napihljiv zrak — kar neposredno vpliva na udobje, težo in izolacijo.
    sleepwear_set_pieces_included:
      name: Vključeni kosi v kompletu pižame
      description: Navaja posamezne komponente, ki so na voljo v večdelnem kompletu
        pižam ali oblačil za prosti čas.
    sleeve_bearing_type:
      name: Vrsta ležajnih puš na osi
      description: Opredeljuje tehnologijo, ki omogoča vrtenje rokava (naslona za
        uteži) palice, kar vpliva na kakovost vrtenja pri olimpijskih dvigih.
    sleeve_style:
      name: Stil rokavov
      description: Navaja stil rokava, ki presega samo dolžino.
    slide_board_accessories_included:
      name: Vključeni dodatki drsne plošče
      description: Navaja dodatne predmete, zapakirane skupaj z drsno ploščo, da kupci
        natančno vedo, kaj je vključeno, in lahko primerjajo pakete.
    slide_installation_type:
      name: Vrsta namestitve tobogana
      description: Kako je tobogan predviden za namestitev ali montažo (samostojno,
        pritrjen na igralni komplet itd.).
    slide_intended_finger:
      name: Predvideni prst za drsnik
      description: Označuje, na katerem prstu je predvideno nošenje kitarskega drsnika,
        ali pa navaja, da to ni primerno (npr. pri kovinski palici za havajsko kitaro).
    slide_safety_features:
      name: Varnostne lastnosti tobogana
      description: Oblikovni elementi, povezani z varnostjo, ki so vključeni na toboganu.
    slide_type:
      name: Vrsta drsnika
      description: Navaja vrsto ali vrste drsnih mehanizmov trobil za čiščenje katerih
        je izdelek predviden.
    slide_water_use_capability:
      name: Zmožnost uporabe tobogana z vodo
      description: Ali je tobogan zasnovan za uporabo z vodo (npr. priključek za cev)
        in na kakšen način.
    slime_putty_kit_components_included:
      name: Vključene komponente kompleta sluzi in kita
      description: Navaja orodja in dodatke, ki so priloženi izdelku iz sluzi/kita
        (posebej pri kompletih/paketih).
    sling_material:
      name: Material zanke
      description: Navaja vlakno/tekstil, uporabljen v zanki sistema za plezanje.
    smith_machine_bar_path:
      name: Pot palice na Smithovi napravi
      description: Opisuje fiksno pot gibanja palice, kar uporabnike seznanja z biomehaniko
        in prostorskimi zahtevami.
    smoke_color:
      name: Barva dima
      description: Barva dima, ki ga proizvaja signalna raketa/dimni signal (različna
        od barve ohišja izdelka).
    smoked_malt_smoking_material:
      name: Material za dimljenje dimljenega slada
      description: Za dimljene slade opredeljuje material, uporabljen med dimljenjem
        (npr. specifična vrsta lesa ali šota).
    snack_mix_variety:
      name: Sorta mešanice prigrizkov
      description: Razvršča izdelek glede na stil mešanice (npr. študentska hrana,
        mešanica oreščkov, sev).
    snack_processing_method:
      name: Metoda predelave prigrizkov
      description: Označuje glavno tehniko predelave ali konzerviranja, uporabljeno
        za pripravo prigrizka (npr. liofilizirano/sušeno z zamrzovanjem, pečeno, praženo).
    snack_texture:
      name: Tekstura prigrizka
      description: Označuje fizični ugriz ali občutek v ustih pri sezamovih palčkah.
    snap_installation_method:
      name: Metoda namestitve pritiskača
      description: Kako je pritiskač predviden za namestitev/pritrjevanje na material
        projekta.
    snare_drum_bearing_edge_profile:
      name: Profil nalegalnega roba malega bobna
      description: Profil nalegalnega roba malega bobna.
    snare_drum_finish_type:
      name: Vrsta končne obdelave maličnega bobna
      description: Visokozahtevna konstrukcija/vrsta končne obdelave, uporabljena
        na obodu malega bobna.
    snare_drum_hoop_type:
      name: Vrsta obroča maličnega bobna
      description: Vrsta obročev, uporabljenih na maličnem bobnu.
    snare_drum_mounting_type:
      name: Vrsta montaže maličnega bobna
      description: Kako je mali boben predviden za montažo oziroma uporabo.
    snare_drum_shell_material:
      name: Material lesene/kovinske školjke maličnega bobna
      description: Navaja kovino/zlitino, uporabljeno za obod malega bobna (glavni
        trup), kar močno vpliva na ton, težo in vzdržljivost.
    snare_drum_strainer_mechanism:
      name: Mehanizem mrežice malega bobna
      description: Vrsta mehanizma za napenjanje/sprostitev mrežice, ki se uporablja
        za vklop/izklop strun bobna.
    snare_drum_strainer_type:
      name: Vrsta mrežice malega bobna
      description: Vrsta mehanizma za napenjanje/sprostitev mrežice, ki se uporablja
        za vklop/izklop strun bobna.
    snare_hoop_type:
      name: Vrsta obroča malega bobna
      description: Vrsta obročev na malem bobnu.
    snare_throw_off_type:
      name: Vrsta mehanizma za sprostitev mrežice na bobnu
      description: Vrsta napenjalnega/izklopnega mehanizma, ki se uporablja za vklop
        ali izklop mrežice bobna.
    snip_cutter_spring_mechanism:
      name: Vzmetni mehanizem škarjastih rezalnikov
      description: Označuje, ali škarjasti rezalnik uporablja vzmetni/povratni mehanizem,
        in navaja njegov stil.
    snorkel_mount_position:
      name: Položaj namestitve dihalke
      description: Opisuje, kje na uporabnikovi glavi je dihalka nameščena med uporabo.
    snorkel_top_type:
      name: Vrsta zgornjega dela dihalke
      description: Opisuje stil zaščite pred vdorom vode na vrhu dihalke, ki je vključena
        v komplet.
    snow_condition_suitability:
      name: Primernost glede na snežne razmere
      description: Opisuje glavne snežne razmere, za katere je vosek predviden.
    snow_sports_helmet_safety_certification:
      name: Varnostni certifikat čelade za zimske športe
      description: Opredeljuje varnostni standard ali standarde, ki jih čelada izpolnjuje
        za uporabo pri smučanju in deskanju na snegu.
    snowboard_base_material:
      name: Material drsne ploskve deske za sneg
      description: Opredeljuje sestavo ali končno obdelavo drsne ploskve (ekstrudirana,
        sintrana stopnja, lastniške formule), kar vpliva na hitrost, trpežnost in
        vzdrževanje.
    snowboard_width_class:
      name: Razred širine deske za sneg
      description: Kategorizira splošno širino deske glede na velikost čevlja (npr.
        običajna, široka).
    soccer_ball_compartment_type:
      name: Vrsta prekata za nogometno žogo
      description: Navaja, kako (ali če sploh) nahrbtnik omogoča shranjevanje nogometne
        žoge.
    soccer_ball_type:
      name: Vrsta nogometne žoge
      description: Navaja predviden namen uporabe ali stil nogometne žoge (npr. tekmovalna,
        za trening, za notranji nogomet), da lahko kupci hitro najdejo pravo različico
        brez potrebe po številnih podkategorijah.
    soccer_dummy_base_type:
      name: Vrsta podstavka nogometne žive stene
      description: Opisuje stil podstavka ali sidrnega mehanizma, ki ga lutka uporablja.
    soccer_dummy_design:
      name: Zasnova nogometne žive stene
      description: Navaja stil izdelave lutke za nogometni trening, kot je toga ali
        napihljiva.
    soccer_goal_target_style:
      name: Stil tarče za nogometni gol
      description: Določa fizično obliko ali zasnovo tarče za trening, da lahko kupci
        izberejo stil, ki najbolj ustreza njihovim vajam.
    soccer_goal_type:
      name: Vrsta nogometnega gola
      description: Označuje strukturni stil ali predviden namen uporabe gola (npr.
        prenosni zložljivi, z odbojno mrežo, ulični).
    sock_cushioning:
      name: Blazinjenje nogavic
      description: Označuje količino in stil blazinjenja oziroma podlaganja pod stopalom,
        ki je vgrajeno v nogavico.
    sock_cushioning_level:
      name: Raven blazinjenja nogavice
      description: Navaja količino blazinjenja pod stopalom, ki je integrirano v nogavico.
    sock_grip_type:
      name: Vrsta oprijema nogavice
      description: Opisuje kakršne koli protizdrsne lastnosti ali elemente za oprijem,
        nanesene na podplat nogavice.
    sock_toe_style:
      name: Stil prstnega dela nogavice
      description: Opisuje stil izdelave prstnega predela nogavice.
    soft_bait_style:
      name: Stil mehke vabe
      description: Razvršča zasnovo telesa ali profil mehke plastične vabe (npr. črv,
        swimbait, ličinka).
    soft_top_attachment_type:
      name: Vrsta pritrjevanja platnene strehe
      description: Opredeljuje, kako se mehka streha pritrdi na vozilo (utori, pritiskači,
        ježki itd.).
    soft_top_includes_frame_hardware:
      name: Mehka streha vključuje okvir/okovje
      description: Označuje, ali izdelek vključuje okvir/loke mehke strehe in/ali
        okovje za montažo.
    soft_top_installation_type:
      name: Vrsta namestitve mehke strehe
      description: Navaja, kako se mehka streha vozila namesti/pritrdi, kar označuje
        predvideno metodo namestitve in potreben trud.
    soft_top_window_configuration:
      name: Konfiguracija oken platnene strehe
      description: Označuje, koliko oken ima mehka streha in kateri položaji so prisotni.
    softball_certification:
      name: Certifikacija za softball
      description: Navaja žige ali odobritve krovnih organizacij, natisnjene na žogi,
        ki določajo primernost za lige ali tekme.
    softness_level:
      name: Stopnja mehkobe
      description: Označuje, kako mehka oziroma nizko-profilna je kosmata stran ježka,
        kar je pomembno za udobje ob stiku s kožo in za namene uporabe z minimalnim
        volumnom.
    solar_system_model_included_bodies:
      name: Vključena nebesna telesa v modelu osončja
      description: Označuje, katera nebesna telesa so zastopana v kompletu modela.
    solar_system_model_scaling:
      name: Skaliranje modela sončnega sistema
      description: Označuje, ali je model osončja izdelan v merilu za velikosti planetov,
        razdalje/orbite, oboje, ali pa gre za shematski prikaz, ki ni v merilu.
    sold_secure_certification_level:
      name: Stopnja certifikacije Sold Secure
      description: Navaja oceno Sold Secure, ki jo je ključavnici podelil neodvisni
        organ za testiranje v Združenem kraljestvu (bronasta, srebrna, zlata, diamantna).
    sold_secure_rating:
      name: Ocena Sold Secure
      description: Označuje stopnjo certifikacije Sold Secure, dodeljeno ključavnici.
    sole_construction:
      name: Zgradba podplata
      description: Označuje, kako je podplat čevlja zasnovan (celoten, deljen, dvodelni
        itd.), kar neposredno vpliva na prožnost, stik s tlemi in primernost za specifične
        plesne tehnike.
    sole_type:
      name: Vrsta podplata
      description: Opisuje strukturni stil podplata, kar označuje prožnost in predviden
        namen uporabe.
    soprano_saxophone_body_style:
      name: Stil trupa sopranskega saksofona
      description: Opisuje fizično konfiguracijo telesa sopranskega saksofona.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Vrsta pregrade ustnika sopranskega saksofona
      description: Opisuje zasnovo deflektorja/stropa ustnika (konturo tik za konico),
        kar vpliva na svetlost, projekcijo in odzivnost.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Velikost komore ustnika sopranskega saksofona
      description: Opisuje velikost notranje komore ustnika za sopranski saksofon,
        kar vpliva na upor in barvo tona.
    soprano_saxophone_mouthpiece_finish:
      name: Končna obdelava ustnika sopranskega saksofona
      description: Površinska obdelava/prevleka, nanesena na ustnik (če je primerno).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Vključeni dodatki k ustniku za sopranski saksofon
      description: Opredeljuje, kateri dodatki so priloženi ustniku.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Zvočni značaj ustnika za sopranski saksofon
      description: Splošni zvočni profil, ki se običajno povezuje z zasnovo ustnika.
    sound_character:
      name: Zvočni značaj
      description: Opisuje splošno barvo tona, ki jo proizvaja bič.
    sound_expansion_method:
      name: Način razširitve zvoka
      description: Navaja, kako lahko modul doda ali razširi svojo notranjo knjižnico
        zvokov presežek tovarniških zvokov (npr. s paketi vsebin, uvozom vzorcev,
        razširitvenimi karticami).
    sound_module_sound_library_focus:
      name: Fokus zvočne knjižnice zvočnega modula
      description: Glavni poudarek tovarniškega nabora zvokov, kar kupcem pomaga najti
        pravi modul za njihov stil oziroma primer uporabe.
    sound_port_type:
      name: Vrsta zvočne odprtine
      description: Opisuje zasnovo zvočne odprtine na zadnji strani cajona, kar vpliva
        na projekcijo in odzivnost nizkih tonov.
    sound_sensitivity_control:
      name: Nadzor občutljivosti zvoka
      description: Označuje, ali se občutljivost zvoka lahko nastavi in na kakšen
        način.
    sound_synthesizer_patch_memory:
      name: Pomnilnik barv zvoka zvočnega sintetizatorja
      description: Označuje, ali sintetizator lahko shrani in prikliče prednastavitve
        (barve zvoka).
    sound_type:
      name: Vrsta zvoka
      description: Glavna vrsta oziroma vrste zvoka ali zvočni izhodi, ki jih preproga
        proizvaja (npr. glasbila, pesmi, glasovni napotki) za usmerjanje igre.
    soundboard_material:
      name: Material rezonančne plošče
      description: Material, uporabljen za zgornjo rezonančno ploščo harfe, ki ustvarja
        resonanco in ton.
    soup_or_broth_variety:
      name: Vrsta juhe ali jušne osnove
      description: Navaja stil, recept ali kulinarično pripravo juhe ali jušne osnove,
        da lahko kupci hitro najdejo svojo želeno vrsto.
    sour_cream_variety:
      name: Vrsta kisle smetane
      description: Razvršča izdelke iz kisle smetane glede na njihovo specifično sorto
        ali kulinarični stil, kot sta crème fraîche ali mehiška krema.
    soy_sauce_variety:
      name: Sorta sojine omake
      description: Opredeljuje specifični stil ali sestavo sojine omake (npr. svetla,
        temna, tamari, ponzu), kar kupcem omogoča hitro filtriranje po profilu okusa
        in kulinarični uporabi.
    spark_plug_electrode_material:
      name: Material elektrode vžigalne svečke
      description: Material/tehnologija konic elektrod na vžigalnem koncu vžigalne
        svečke (sredinske in/ali ozemljitvene), kot se oglašuje (npr. baker, platina,
        iridij).
    spark_plug_seat_type:
      name: Vrsta naseda vžigalne svečke
      description: Stil naseda, ki ga vžigalna svečka uporablja na stiku z glavo valja.
    spark_plug_terminal_type:
      name: Vrsta priključka vžigalne svečke
      description: Stil zgornjega priključka (terminala), ki se uporablja za povezavo
        vžigalnega kabla/manšete.
    sparkler_shape:
      name: Oblika kresničke
      description: Splošna unikatna oziroma zabavna oblika kresničke.
    speaker_cone_material:
      name: Material membrane zvočnika
      description: Glavni material membrane zvočnika (nizkotonska/srednjetonska membrana).
    speaker_size:
      name: Velikost zvočnika
      description: Nominalna velikost gonilnika/vgradna velikost za komponentni zvočnik
        (npr. 16,5 cm/6,5 palcev, 6×9 palcev), ki se uporablja za uskladitev s tovarniškimi
        mesti in adapterji za zvočnike.
    special_effects_output_interface:
      name: Izhodni vmesnik za posebne učinke
      description: Navaja izhodni priključek/vmesnik, ki se uporablja za nadzor naprav
        za posebne učinke.
    special_effects_stand_stability_features:
      name: Stabilnostne lastnosti stojala za posebne učinke
      description: Navaja vgrajene stabilnostne in varnostne lastnosti, namenjene
        preprečevanju prevračanja ali zdrsa med dogodki.
    specialty_malt_name_type:
      name: Ime/vrsta posebnega slada
      description: Opredeljuje specifično poimenovano vrsto posebnega slada (pogosto
        se uporablja kot komercialno ime stila).
    specimen_presentation:
      name: Predstavitev primerka
      description: Označuje, kako je zbirateljski primerek pripravljen ali predstavljen
        (npr. surov/nepripravljen, poliran, rezan ali nameščen na podstavek).
    speed_bag_accessories_included:
      name: Vključeni dodatki za hitro hruško
      description: Navaja dodatne predmete, priložene hitri žogi za boks, kot so rokavice,
        tlačilke, vrtljivi sklepi, verige ali stojala.
    speed_rating:
      name: Razred hitrosti
      description: Označuje hitrost igralne površine, ki jo zagotavlja sukno za biljardno
        mizo (npr. počasna, srednja ali hitra).
    speedometer_backlight_type:
      name: Vrsta osvetlitve ozadja merilnika hitrosti
      description: Navaja, ali je merilnik hitrosti osvetljen iz ozadja in kako, zaradi
        vidljivosti ponoči.
    speedometer_display_type:
      name: Vrsta zaslona merilnika hitrosti
      description: 'Označuje stil prikaza hitrosti na merilniku: analogna igla/število,
        digitalen številčni prikaz ali kombinacija analognih in digitalnih elementov.'
    speedometer_unit_of_measure:
      name: Merilna enota merilnika hitrosti
      description: Navaja enote za hitrost, prikazane na številčnici/zaslonu (npr.
        km/h, mph).
    spike_replaceability:
      name: Zamenljivost žebljičkov
      description: Označuje, ali so žebljički na čevlju zamenljivi, fiksni ali pa
        je čevelj brez žebljičkov.
    spike_shape:
      name: Oblika žebljička
      description: Opredeljuje geometrijski stil konice žebljička, kar vpliva na oprijem
        in primernost za različne površine stez.
    spike_thread_size:
      name: Velikost navoja žebljička
      description: Navaja velikost ali standard navojne osnove, ki se privije v čevelj.
    spin_classification:
      name: Klasifikacija vrtenja
      description: Označuje profil vrtenja (izmeta), za katerega je disk zasnovan
        (nizka, srednja, visoka ali hiper rotacija).
    spin_profile:
      name: Profil vrtenja
      description: Navaja relativne značilnosti vrtenja, ki jih rastišče spodbuja.
    spin_types_supported:
      name: Podprte vrste vrtenja
      description: Navaja vrste vrtenja, ki jih stroj lahko podeli žogam, da lahko
        igralci vadijo različne stile udarcev.
    spinach_preparation_style:
      name: Stil priprave špinače
      description: Opisuje fizično pripravo špinačnih listov ali obliko izdelka (npr.
        celi listi, sesekljana, v kockah).
    spinach_variety:
      name: Sorta špinače
      description: Opredeljuje botanično ali tržno sorto špinače (npr. mlada špinača,
        savojska, vodna, rdeča), kar kupcem omogoča izbiro natančne vrste, ki jo želijo.
    spindle_bearing_surface_material:
      name: Material ležajne površine vretena
      description: Material konice/ležajne površine, ki se uporablja pri podprtih
        vretenih (konica/dno), kar vpliva na gladkost vrtenja in obrabo.
    spindle_bearing_type:
      name: Vrsta ležaja vretena
      description: Vrsta konice vretena/ležajnega vmesnika, ki zmanjšuje trenje ob
        podporno posodico/skodelico.
    spindle_finish:
      name: Končna obdelava vretena
      description: Površinska obdelava/premaz vretena, kar vpliva na občutek, trpežnost
        in estetiko.
    spindle_hook_type:
      name: Vrsta kljukice vretena
      description: Mehanizem za lovljenje preje na vrhu vretena, ki se uporablja za
        zavarovanje začetne nitke/preje.
    spindle_support_method:
      name: Način podpiranja vretena
      description: Kako je vreteno predvideno podpirati med predenjem.
    spindle_tip_style:
      name: Slog konice vretena
      description: Oblika/zasnova konice, ki počiva v posodici/skodelici (ležajna
        površina), kar vpliva na trenje in gladkost predenja.
    spindle_whorl_position:
      name: Položaj vztrajnika vretena
      description: Kje vretence sedi na rastišču vretena.
    spinner_blade_shape:
      name: Oblika krilca predilca
      description: Opredeljuje glavno obliko krilca, uporabljeno na predilcu, kar
        vpliva na vibracije, bliskanje in globino pomikanja.
    spinner_control_card_design_type:
      name: Zasnova/vrsta kontrolne kartice za predilca
      description: Opisuje vrsto kontrolne kartice za vabe glede na to, kako predstavlja
        informacije za upravljanje (npr. referenca razmerja, referenca napetosti,
        pretvorbena tabela).
    spinner_subtype:
      name: Podvrsta vrtavke
      description: Razvršča splošno zasnovo ali družino predilcev
    spinning_oil_application_area:
      name: Območje nanosa olja za kolovrat
      description: Navaja predvideno mesto oziroma mesta nanosa olja na kolovratu.
    spinning_oil_application_tool:
      name: Orodje za nanašanje olja za predenje
      description: Označuje stil konice aplikatorja/embalaže, ki se uporablja za nanašanje
        olja na dele kolovrata za nadzorovano doziranje.
    spinning_oil_features:
      name: Lastnosti olja za kolovrat
      description: Izpostavlja funkcionalne lastnosti, pomembne za olja za kolovrate
        (ostanki, madeži, oksidacija in pralnost).
    spinning_top_features:
      name: Orodje za nanašanje olja za predenje
      description: Sprožilni mehanizem čavre
    spinning_top_launch_mechanism:
      name: Kako se čavra zažene oziroma požene v vrtenje.
      description: Vrsta zavornega/napenjalnega sistema kolovrata
    spinning_wheel_brake_tension_system_type:
      name: Vrsta zavore/napenjalnega sistema za vrtenje kolesa
      description: Navaja zavorni sistem oziroma sistem napetosti za prevzemanje,
        ki se uporablja za nadzor vlečenja preje.
    spinning_wheel_drive_system:
      name: Pogonski sistem kolovrata
      description: Označuje pogonski sistem, za katerega je vretence predvideno.
    spinning_wheel_hook_system:
      name: Sistem kljukic kolovrata
      description: Navaja, kako se preja vodi vzdolž krilc kolovrata.
    spinning_wheel_part_application:
      name: Uporaba dela za kolovrat
      description: Navaja, za katere komponente kolovrata je olje predvideno.
    spinning_wheel_portability_foldability:
      name: Prenosljivost/zložljivost kolovrata
      description: Označuje, ali je kolovrat zasnovan tako, da se zloži za transport.
    spinning_wheel_tension_adjustment_type:
      name: Vrsta nastavljanja napetosti kolovrata
      description: Kako se na kolovratu nastavlja napetost za nadzor prevzemanja preje.
    splice_termination_type:
      name: Vrsta spleta/zaključka
      description: Navaja končni zaključek na sidrni vrvi (npr. vpleteno uho, naseda,
        veriga).
    split_shot_cut_type:
      name: Vrsta zareze razcepljene uteži
      description: Navaja stil utora ali odprtine, ki omogoča pritrditev na vrvico.
    split_shot_shape:
      name: Oblika deljenega svinca
      description: Opisuje fizično obliko razcepljene uteži, kar vpliva na hidrodinamiko
        in odpornost proti zapenjanju.
    split_shot_size:
      name: Velikost razcepljene uteži
      description: Standardizirana alfanumerična koda velikosti (npr. SSG, AAA, BB,
        1), ki jo proizvajalci in ribiči uporabljajo za razvrščanje razcepljenih uteži.
        Dopolnjuje natančne meritve teže.
    spoiler_adjustability:
      name: Nastavljivost spojlerja
      description: Funkcija dodatka za špice kolesa.
    spoke_accessory_function:
      name: Funkcija dodatka za napere kolesa
      description: Razvršča glavno funkcijo dodatka na kolesu, kot je dekorativna,
        odsevna ali svetlobna.
    spoke_butting_profile:
      name: Profil debeline naper
      description: Opisuje, kako se premer napere spreminja vzdolž njene dolžine (enaka
        debelina/plain, enkratno, dvakratno, trikratno ali štirikratno stanjšana),
        kar vpliva na težo in trdnost.
    spoke_gauge:
      name: Debelina naper
      description: Navaja debelina naper, s katerimi je tuljava napere združljiva
    spoke_interface_type:
      name: Vrsta naseda
      description: Označuje stil glave napere, za katerega je pesto zasnovano (ukrivljena,
        ravna, T-glava).
    spoke_shape:
      name: Oblika naper
      description: Navaja zunanji prečni prerez žice napere, kar vpliva na aerodinamiko
        in estetiko.
    spool_form_factor:
      name: Oblika tuljave
      description: Fizični stil telesa tuljave in način zadrževanja nitke/preje (npr.
        s prirobnico v primerjavi s stožcem).
    spoon_style:
      name: Stil žlice
      description: Označuje funkcionalno podvrsto ali stil nihajne vabe — žlice (npr.
        za metanje, lahka plapolajoča, za panulanje).
    sports_bra_padding_type:
      name: Vrsta blazinjenja športnega modrčka
      description: Navaja vrsto blazinjenja, ki je zagotovljeno v športnem modrčku
    sports_cap_style:
      name: Stil športne kape
      description: Opredeljuje splošno zgradbo/stil kape (npr. kapa za bejzbol, s
        paščkom na zadnji strani), ne glede na blagovno znamko ekipe.
    sports_governing_body_certification:
      name: Certifikat športne krovne organizacije
      description: Označuje uradne certifikate ali odobritve priznanih športnih krovnih
        organizacij, kar potrjuje, da izdelek izpolnjuje tekmovalne standarde.
    sports_surface_compatibility:
      name: Združljivost s športnimi površinami
      description: Navaja vrste igralnih ali talnih površin, na katere se barva lahko
        varno nanese.
    sports_toy_set_contents:
      name: Vsebina kompleta športnih igrač
      description: Opredeljuje, katere komponente so vključene v komplet športnih
        igrač (npr. žoga, kij, mreža, tarče).
    spray_string_cleanup_method:
      name: Način čiščenja nitk v razpršilu
      description: Priporočeni način za odstranjevanje/čiščenje ostankov nitk v razpršilu.
    spray_string_finish_effect:
      name: Končni izgled/učinek nitk v razpršilu
      description: Vizualni učinek nanesenih nitk v razpršilu ob nanosu (sijaj/odsevnost
        in posebni učinki).
    spray_string_formulation_type:
      name: Vrsta sestave nitk v razpršilu
      description: Kako se izdelek obnaša med pršenjem in po njem (npr. pralen v primerjavi
        z obstojnim).
    spray_string_recommended_surface:
      name: Priporočena površina za nitke v razpršilu
      description: Vrste površin, na katerih so nitke v razpršilu predvidene za uporabo
        (in s katerih se verjetno dajo očistiti).
    spray_string_scent:
      name: Vonj nitk v razpršilu
      description: Profil dišave ali vonja nitk v razpršilu, če je prisoten.
    spray_string_suitable_age_group:
      name: Primerna starostna skupina za nitke v razpršilu
      description: Priporočena minimalna starost uporabnika/starostna skupina za varno
        uporabo.
    spread_consistency:
      name: Konsistenca namaza
      description: Opisuje teksturo/gostoto pomake ali namaza, da postavi pričakovanja
        glede občutka v ustih in uporabe (npr. gladek, s koščki, pasiran).
    spread_variety:
      name: Vrsta namaza
      description: Razvršča specifično vrsto sadnega namaza (npr. džem, žele, marmelada,
        sadna krema), da lahko kupci razlikujejo med različnimi stili priprave in
        teksturami.
    spreader_bar_type:
      name: Vrsta distančnika
      description: Označuje vrsto traverze ali sistema kljuk, ki je priložen traku/pasu
        ali je z njim združljiv.
    sprint_canoe_class:
      name: Razred sprinterskega kanuja
      description: Navaja uradno oznako tekmovalnega razreda za sprinterski kanu.
    sprout_presentation:
      name: Predstavitev kalčkov
      description: Opredeljuje fizično predstavitev izdelka (npr. sveži kalčki, mikrozelenjava,
        živi kalčki v lončku za vzgojo, prah).
    squash_and_gourd_variety:
      name: Sorte buč in bučk
      description: Opredeljuje specifični kultivar ali tržno sorto buče ali bučke,
        kar kupcem pomaga hitro najti njihovo želeno vrsto.
    stability_class:
      name: Razred stabilnosti
      description: Splošna kategorizacija stabilnosti, izpeljana iz ocen leta ali
        tržnih trditev.
    stabilizer_thread_size:
      name: Velikost navoja stabilizatorja
      description: Specifikacija navoja, ki se uporablja za pritrditev stabilizatorja
        ali dodatka na lok ali samostrel.
    stabilizer_type:
      name: Vrsta stabilizatorja
      description: Opredeljuje stil ali položajno klasifikacijo stabilizatorja loka
        ali samostrela.
    stages_supported:
      name: Podprte stopnje
      description: Označuje, s koliko stopnjami je raketa ali komplet zasnovan za
        letenje.
    stain_remover_format:
      name: Oblika odstranjevalca madežev
      description: Navaja obliko/format izdelka, ki se uporablja za obdelavo madežev
        na vozilu (steklenica s pršilom, aerosol, pena, gel, prah, robčki, pisalo/marker).
    stake_shape:
      name: Oblika klina
      description: Določa prečni prerez ali stil zasnove šotorskega klina, kar vpliva
        na moč držanja v različnih vrstah tal.
    stamp_block_features:
      name: Lastnosti akrilnega bloka za štampiljke
      description: Izpostavlja funkcionalne lastnosti blokov za štampiljke, kot so
        merilne mreže, ročaji ali protizdrsne površine.
    stamp_block_type:
      name: Vrsta bloka za štampiljke
      description: Navaja zgradbo/stil bloka za štampiljke, ki se uporablja za namestitev
        štampiljk za odtisk (npr. prosojni akrilni blok, lesen blok ali pozicionirni
        blok).
    stamp_set_pieces_included:
      name: Vključeni kosi v kompletu štampiljk
      description: Označuje, katere komponente so vključene v komplet štampiljk in
        blazinic (npr. štampiljke, črnilne blazinice, flomastri).
    stand_padding_material:
      name: Material blazinjenja stojala
      description: Material, uporabljen na stičnih točkah za zaščito laka/površine
        instrumenta (npr. pena, guma, silikon).
    staple_fiber_animal_fiber_type:
      name: Vrsta živalskih vlaken rezanih vlaken
      description: Specifična vrsta vlakna živalskega izvora, ko je vrsta vira rezanih
        vlaken živalska
    staple_fiber_crimp_level:
      name: Stopnja nakodranosti rezanih vlaken
      description: Stopnja naravne nakodranosti/valovitosti v vlaknu.
    staple_fiber_preparation_type:
      name: Vrsta priprave rezanih vlaken
      description: Stanje priprave/predelave vlaken v prodaji (kako so poravnana/obdelana),
        kar močno vpliva na metodo predenja, enostavnost vlečenja in končni rezultat.
    staple_fiber_source_type:
      name: Vrsta vira rezanih vlaken
      description: Splošna kategorija izvora za vsebnost vlaken.
    starch_processing_type:
      name: Vrsta predelave škroba
      description: Označuje, ali je škrob nativen ali pa je bil fizično oziroma kemično
        modificiran (npr. instantni, vnaprej želatinizirani škrob), da zagotovi specifične
        funkcionalne lastnosti, kot sta hitrost zgoščevanja ali temperaturna toleranca.
    starch_source:
      name: Vir škroba
      description: Navaja botanični vir, iz katerega je pridobljen kuharski škrob
        ali gostilo (npr. koruza, krompir, tapioka). Vir je glavni ločevalni dejavnik
        za kuharske škrobe in neposredno vpliva na primernost recepta, pomisleke glede
        alergenov in iskalno vedenje potrošnikov.
    starfruit_variety:
      name: Sorta karambole
      description: Opredeljuje specifični kultivar ali sorto karambole (npr. Arkin,
        Fwang Tung)
    starter_drive_type:
      name: Vrsta zaganjalnega pogona
      description: Navaja vrsto zaganjalnega pogona/vklopnega mehanizma, ki se uporablja
        za vklop zobnika z vztrajnikom.
    starter_pistol_action_type:
      name: Vrsta mehanizma štartne pištole
      description: Opredeljuje prožilni mehanizem/delovanje štartne pištole (npr.
        enojno delovanje, dvojno delovanje, polavtomatsko).
    starter_pistol_caliber:
      name: Kaliber štartne pištole
      description: Navaja kaliber slepega streliva ali naboja, za katerega je štartna
        pištola zasnovana.
    starter_terminal_type:
      name: Vrsta priključka zaganjalnika
      description: Navaja stil priključka/konektorja, ki se uporablja za električne
        povezave na zaganjalniku ali elektromagnetnem stikalu zaganjalnika (npr. navojni
        čep, ploščati konektor, vtični konektor).
    starting_block_anchoring_method:
      name: Način sidranja štartnega bloka
      description: Opisuje, kako se bloki pritrdijo na površino steze (npr. z žebljički,
        priseski, gumijastimi podložkami).
    steerer_tube_design:
      name: Zasnova krmilne cevi
      description: Opisuje strukturno zasnovo krmilne cevi — ravna, konusna, z navojem
        itd. — kar določa združljivost s krmilnim ležajem in okvirjem.
    steering_cable_end_fitting_type:
      name: Vrsta končnega priključka krmilne pletenice
      description: Opredeljuje stil zaključka/pritrditve na koncih krmilne pletenice
        plovila (konec pri krmilu in konec pri motorju/rudi), kar zagotavlja združljivost
        s krmilnim mehanizmom in priključnimi točkami na motorju. Uporabite standardno
        oznako ali oznako proizvajalca, kjer je to primerno.
    steering_column_adjustability_features:
      name: Funkcije nastavljivosti krmilnega stebra
      description: Označuje, katere funkcije nastavljanja so vgrajene v krmilni steber.
    steering_column_ignition_provision:
      name: Nastavek za vžig na krmilnem stebru
      description: Označuje, ali je krmilni steber zasnovan tako, da sprejme cilinder/stikalo
        vžigalne ključavnice in/ali ključavnico za zaklep krmila.
    steering_column_shaft_end_interface_type:
      name: Vrsta vmesnika konca gredi krmilnega stebra
      description: Opredeljuje stil vmesnika na koncu gredi krmilnega stebra (npr.
        z utori/splined, dvojni D, z zagozdo).
    steering_column_shift_type:
      name: Vrsta prestavljanja na krmilnem stebru
      description: Navaja, ali krmilni steber vključuje mehanizem za prestavljanje
        na krmilu ter njegovo vrsto prenosa.
    steering_component_drive_type:
      name: Vrsta pogona krmilne komponente
      description: Navaja pogonski/asistenčni mehanizem, ki je pomemben za krmilne
        komponente (predvsem za črpalke in EPS sisteme).
    steering_position:
      name: Položaj krmila
      description: Navaja, ali ima kombi volan na levi ali desni strani.
    steering_pump_pulley_type:
      name: Vrsta jermenice krmilne črpalke
      description: Določa vrsto pogona/vmesnika jermenice, ki se uporablja s krmilno
        črpalko (črpalko servovolana).
    steering_rack_finish_coating:
      name: Končna obdelava/premaz krmilnega droga
      description: Navaja zunanjo končno obdelavo/premaz za zaščito pred korozijo.
    steering_rack_position:
      name: Položaj krmilnega droga
      description: Navaja, kje v krmilnem sistemu vozila je krmilni drog nameščen
        oziroma uporabljen.
    steering_wheel_cover_installation_type:
      name: Vrsta namestitve prevleke za volan
      description: Kako se prevleka za volan namesti oziroma pritrdi na volan.
    steering_wheel_grip_material:
      name: Material oprijema volana
      description: Navaja material na obroču/oprijemu volana (kjer je stik z rokami),
        ki se lahko razlikuje od jedra/naper volana.
    steering_wheel_mounting_pattern:
      name: Vzorec montaže volana
      description: Navaja vzorec namestitve vijakov/lukenj, ki se uporablja za pritrditev
        volana na pesto ali adapter (npr. s 3 vijaki, s 5 vijaki).
    steering_wheel_rim_material_grip_surface:
      name: Material obroča volana (površine oprijema)
      description: Navaja glavni material prevleke oprijema/obroča (različno od celotnega
        konstrukcijskega materiala).
    stem_material:
      name: Material ustnika
      description: Navaja material, uporabljen specifično za steblo pipe ali ustnik
        (npr. akril, ebonit, lucit).
    stencil_machine_consumable_type:
      name: Vrsta potrošnega materiala za stroj za šablone
      description: Navaja potrošni material, potreben za delovanje (če sploh obstaja).
    step_surface_texture:
      name: Tekstura površine stopnice
      description: Navaja zasnovo/material tekalne površine stopnice ali površine,
        namenjene izboljšanju oprijema in udobja, ko je mokra.
    stepper_motion_type:
      name: Vrsta gibanja koračnega mehanizma
      description: Določa glavno koračno gibanje, ki ga stroj omogoča.
    stick_bow_profile:
      name: Profil loka palice
      description: Navaja profil ukrivljenosti rastišča palice za hokej na travi,
        kar je ključni dejavnik, ki vpliva na nadzor žogice, uspešnost drag-flicka
        in stil igre.
    stick_construction:
      name: Izdelava palice
      description: Navaja stil izdelave hokejske palice, kot so enodelni kompozit,
        dvodelni kompozit ali les.
    stick_curvature_type:
      name: Vrsta ukrivljenosti palice
      description: Opisuje profil ukrivljenosti palice za metanje vabe, kar vpliva
        na razdaljo in natančnost meta.
    stick_head_shape:
      name: Oblika glave palice
      description: Določa obliko glave palice, kar vpliva na sprejem, stil udarjanja
        in nadzor žogice od blizu.
    stick_size_compatibility:
      name: Združljivost velikosti palice
      description: Opredeljuje skupino velikosti hokejske palice, s katero je izdelek
        združljiv (npr. Youth, Junior, Intermediate, Senior, Goalie, Universal).
    sticker_decal_features:
      name: Značilnosti nalepk
      description: Zajema lastnosti nanašanja in obstojnosti, specifične za nalepke
        (npr. brez mehurčkov, možnost prestavljanja).
    sticker_finish:
      name: Končni izgled nalepke
      description: Opisuje končni izgled površine/vizualni učinek nalepk.
    sticker_format:
      name: Oblika nalepke
      description: Navaja prodajni format dekorativnih nalepk (npr. polica, zvitek,
        posamična, knjižica).
    sticker_material_type:
      name: Vrsta materiala nalepke
      description: Navaja primarno podlago/material dekorativne nalepke (ne vključuje
        okrasnih dodatkov).
    stilt_foot_attachment_type:
      name: Vrsta pritrditve na podnožje za hodulje
      description: Navaja, kako se uporabnikova noga pritrdi na hoduljo (npr. pašček
        z zaponko, ježek, zavezovanje z vezalkami).
    stirrup_style:
      name: Stil stremena
      description: Razvršča stil stremen glede na zasnovo ali disciplino, kar obsega
        različice glede na varnost, disciplino in konstrukcijo.
    stirrup_tread_material:
      name: Material tekalne površine stremena
      description: Navaja material, uporabljen za podlogo ali tekalno površino stremena,
        kar vpliva na oprijem, udobje in obrabo.
    stitch_marker_and_counter_style:
      name: Označevalec in števec šivov
      description: Navaja stil ali format označevalca šivov oziroma števca šivov/vrstic
        (npr. zaklepni označevalec, označevalec z deljenim obročem, števec v obliki
        prstana, digitalni števec).
    stitch_types:
      name: Vrste vbodov
      description: Vrste vbodov (funkcionalni in dekorativni), ki jih stroj lahko
        izdela.
    stitching_method:
      name: Metoda šivanja
      description: Označuje, kako so ploskve žoge spojene med seboj.
    stitching_state:
      name: Stanje zašitosti
      description: Označuje, ali so deli oblačila dobavljeni nezašiti, delno zašiti,
        zašiti ali pripravljeni za nošenje.
    stock_car_race_series:
      name: Dirkalna serija serijskih avtomobilov
      description: Navaja krovno organizacijo ali dirkalno serijo/razred, za tekmovanje
        v katerem je serijski dirkalnik izdelan.
    stone_adhesion:
      name: Oprijem koščice
      description: Označuje, ali se koščica breskve ali nektarine zlahka loči od mesa,
        se drži mesa ali pa je delno ločljiva.
    stone_creation_method:
      name: Metoda ustvarjanja kamna
      description: Navaja, ali je kamen naraven, vzgojen v laboratoriju, umetni ali
        recikliran.
    stone_cut_grade:
      name: Ocena brusa kamna
      description: Označuje splošno oceno kakovosti brusa kamna.
    stone_cut_style:
      name: Stil brusa kamna
      description: Stil brusa/fasetiranja steklenega kamna (npr. fasetiran brus v
        primerjavi z mehkim zaobljenim brusom).
    stone_fruit_cultivar:
      name: Kultivar koščičastega sadja
      description: Opredeljuje specifični kultivar/sorto breskve ali nektarine.
    stone_fruit_variety:
      name: Sorta koščičastega sadja
      description: Razlikuje podvrsto znotraj kategorije (npr. breskev, nektarina,
        ploščata breskev).
    stone_setting_type:
      name: Vrsta vpetja kamna
      description: Navaja, kako je kamen zavarovan v kosu nakita (obroba, zobci, tlakovano
        itd.).
    stone_transparency:
      name: Prosojnost kamna
      description: Optična prosojnost/motnost steklenega kamna.
    storage_case_type:
      name: Vrsta kovčka za shranjevanje
      description: Označuje vrsto vsebnika, v katerem je komplet dobavljen za shranjevanje
        in transport (npr. škatla, kovček, torba).
    storage_compartment_type:
      name: Vrsta prostora za shranjevanje
      description: Navaja vrsto prekata za shranjevanje, ki ga plavalna boja omogoča
        za osebne predmete.
    storage_media_and_transfer_methods_supported:
      name: Podprti mediji za shranjevanje in metode prenosa
      description: Podprti mediji ali metode povezovanja za uvoz/izvoz vzorcev ter
        shranjevanje/nalaganje projektov.
    storage_requirements:
      name: Zahteve glede shranjevanja
      description: Navaja, kako je treba izdelek shranjevati pred odpiranjem in/ali
        po njem, da se ohranita kakovost in varnost.
    stove_jack_compatibility:
      name: Združljivost z odprtino za dimnik
      description: Označuje, ali šotor vključuje ognjevarno odprtino za dimno cev
        peči.
    straight_pin_application:
      name: Uporaba bucik
      description: Navaja predviden namen uporabe za bucike.
    straight_pin_finish:
      name: Končna obdelava bucik
      description: Opisuje končno obdelavo površine ali premaz bucike (npr. ponikljano),
        kar vpliva na odpornost proti koroziji in drsenje.
    straight_pin_head_material:
      name: Material glave bucike
      description: Navaja material glave bucike (če je prisotna), kot sta plastika
        ali steklo.
    straight_pin_head_shape:
      name: Oblika glave bucike
      description: Opisuje obliko/stil glave bucike zaradi uporabnosti in vidljivosti.
    strand_configuration:
      name: Konfiguracija pramenov
      description: Označuje, koliko ločenih vrst ali pramenov tvori verigo za denarnico
        (enojna, dvojna, trojna).
    strand_material:
      name: Material pramenov
      description: Navaja material, uporabljen za posamezne pramene/trakove.
    strap_attachment_hardware:
      name: Okovje za pritrditev pasu
      description: Navaja vrsto/zasnovo okovja, ki se uporablja za pritrditev pasu
        na instrument ali podporno točko.
    strap_configuration:
      name: Konfiguracija traku
      description: Označuje število točk za pritrditev čelade na pasu (npr. 2-točkovni,
        4-točkovni), kar je ključno za prileganje, varnost in zahteve lig.
    strap_functionality:
      name: Funkcionalnost traku
      description: Navaja glavni predviden namen uporabe ali zasnovo pasu za joga
        blazino.
    strap_padding:
      name: Blazinjenje traku
      description: Označuje stopnjo podložene (blazinjene) zgradbe pasu, namenjene
        izboljšanju udobja in porazdelitvi teže.
    strap_side:
      name: Stran traku
      description: Označuje, ali je pas zasnovan za levo vez, desno vez ali pa se
        prodaja v paru.
    strap_width:
      name: Širina traku
      description: Označuje relativno širino naramnic (tanka, srednja, široka), kar
        usmerja kupce, ki iščejo specifično pokritost ali oporo.
    strength_classification:
      name: Klasifikacija trdnosti
      description: Tržna oznaka trdnosti/moči, ki jo blagovne znamke običajno uporabljajo
        (npr. lahka, močna, izjemno močna).
    strength_grade:
      name: Kakovostni razred trdnosti
      description: Opisuje predvideno moč držanja / raven obremenitve sponke na ježka.
    stretch_level:
      name: Stopnja raztegljivosti
      description: Označuje, koliko se tekstil med uporabo raztegne.
    stretch_type:
      name: Vrsta raztezanja
      description: Označuje, ali ima tkanina mehansko ali elastično raztegljivost
        in v kateri smeri oziroma smereh.
    stretcher_bar_material:
      name: Material nosilne palice
      description: Material, uporabljen za letvice podokvirja/okvir (npr. bor, jelka,
        topol, breza, MDF/obdelan les).
    strike_shield_shape:
      name: Oblika ščita za udarce
      description: Navaja splošno obliko udarne površine ščita za udarce.
    string_core_shape:
      name: Oblika jedra strune
      description: Navaja obliko jedra žice, uporabljene v ovitih strunah, kar vpliva
        na občutek in stabilnost.
    string_coverage:
      name: Pokritost strun
      description: Navaja, katere strune je delni kapodaster zasnovan za pritiskanje/pokrivanje
        (po številu ali običajnem naboru).
    string_end_type:
      name: Vrsta zaključka strune
      description: Navaja, kako se struna zaključi pri mostičku zaradi združljivosti
        (posebej pomembno za akustične/električne kitare in nekatere base).
    string_set_type:
      name: Vrsta kompleta strun
      description: Navaja, ali je izdelek celoten komplet ali posamezna nadomestna
        struna oz. strune.
    strung_status:
      name: Status napetosti strun
      description: Označuje, ali je glava za lakros vnaprej opremljena z mrežastim
        žepom ali pa se prodaja brez napetih strun.
    strut_placement:
      name: Namestitev vzmetne noge
      description: Navaja predviden položaj namestitve na vozilu (spredaj/zadaj in
        levo/desno) za vzmetno nogo.
    stud_attachment_type:
      name: Vrsta pritrditve čepov
      description: Navaja, kako so čepi/žebljički pritrjeni ali konfigurirani na podplatu,
        kar vpliva na oprijem, vzdrževanje in skladnost s pravili lige.
    stud_configuration:
      name: Konfiguracija čepov
      description: Določa obliko in razporeditev čepov/žebljičkov na podplatu, kar
        vpliva na oprijem in uspešnost na različnih površinah.
    stud_material:
      name: Material čepov
      description: Opredeljuje glavni material čepov/žebljičkov, kar daje informacije
        o trpežnosti, teži in skladnosti z varnostnimi predpisi.
    stuffed_animal_features:
      name: Značilnosti plišastih živali
      description: Izpostavlja vgrajene lastnosti za igro in udobje plišaste igrače.
    stump_base_type:
      name: Vrsta podstavka kriket količka
      description: Določa stil podstavka ali montažnega sistema, ki ga uporablja količek
        za kriket (žebelj, povratna vzmet, obtežena guma itd.).
    stump_mechanism:
      name: Mehanizem kriket količka
      description: Navaja povratni ali montažni mehanizem količka za kriket (npr.
        z vzmetnim povratkom, fiksni).
    stump_size:
      name: Velikost kriket količka
      description: Kategorična oznaka velikosti, ki se uporablja za količke za kriket,
        kar označuje običajno višino in primerno starostno skupino igralcev.
    subwoofer_installation_type:
      name: Vrsta namestitve nizkotonskega zvočnika
      description: Kako je nizkotonski zvočnik predviden za namestitev v avdio sistem
        vozila.
    sugar_cane_variety:
      name: Sorta sladkornega trsa
      description: Opredeljuje specifični kultivar ali tržno sorto sladkornega trsa,
        kar lahko vpliva na barvo, sladkost in vsebnost vlaknin.
    sugar_content_level:
      name: Stopnja vsebnosti sladkorja
      description: Razvršča splošno stopnjo sladkorja ali sestavo koncentrata pijače,
        kar kupcem omogoča hitro iskanje običajnih različic, različic z zmanjšano
        vsebnostjo ali možnosti brez sladkorja.
    sugar_refinement_level:
      name: Stopnja prečiščenosti sladkorja
      description: Označuje stopnjo ali stil rafinacije (barvo, vsebnost melase ali
        raven predelave)
    sugar_source:
      name: Vir sladkorja
      description: Opredeljuje botanični vir ali izvor materiala, iz katerega je pridobljen
        sladkor.
    suit_fit:
      name: Prileganje obleke
      description: Splošni kroj obleke, kar označuje, kako tesno se prilega telesu.
    suit_pieces:
      name: Deli obleke
      description: Navaja, koliko usklajenih kosov oblačil je vključenih v komplet
        obleke (npr. dvodelna, tridelna, štiridelna).
    suitable_for_anchoring_use:
      name: Primerno za uporabo pri sidranju
      description: Označuje predvideni primer uporabe vrvi/vrvice, povezan s sidranjem.
    suitable_for_craft_type:
      name: Primerno za vrsto ročnega ustvarjanja
      description: Glavni namen ročnega dela z iglo za katerega je žica za napenjanje
        predvidena.
    suitable_for_paint_type:
      name: Primerno za vrsto barve
      description: Označuje, za katere vrste barv je platno predvideno oziroma varno
        za uporabo.
    suitable_for_swim_stroke:
      name: Primerno za plavalno tehniko
      description: Označuje, za katero plavalno tehniko oziroma tehnike je plavalna
        lopatka zasnovana ali optimizirana.
    suitable_mounting_surface_material:
      name: Material primeren za montažno površino
      description: Navaja predvideno montažno površino/material, na katerega je lepilna
        hrbtna stran zasnovana za lepljenje.
    suitable_play_location:
      name: Primerno mesto za igro
      description: Glavno predvideno igralno okolje oziroma okolja za igračo mlin
        na pesek in vodo.
    suitable_riding_conditions:
      name: Primerne kolesarske razmere
      description: Označuje kolesarske razmere (npr. suho, mokro, zima), za katere
        je mazivo ali čistilo za kolo zasnovano.
    suitable_snow_conditions:
      name: Primerne snežne razmere
      description: Označuje glavne snežne razmere, za katere je vosek za oprijem zasnovan.
    suitable_surface_type:
      name: Vrsta primerne površine
      description: Navaja pohodne površine, za katere je oprijem zasnovan.
    suitable_table_size:
      name: Primerna velikost mize
      description: Navaja dolžino oziroma dolžine mize za biljard, za osvetlitev katerih
        je luč zasnovana.
    sun_protection_rating_upf:
      name: Stopnja zaščite pred soncem (UPF)
      description: Zagotavlja certificirano raven UPF zaščite oblačila pred soncem.
    sun_shade_attachment_method:
      name: Način pritrditve senčnika
      description: Kako se senčnik pritrdi na okno oziroma vetrobransko steklo.
    sun_shade_style:
      name: Slog senčnika
      description: Zgradba/format izdelka za razpiranje in shranjevanje senčnika.
    sunchoke_variety:
      name: Sorta topinamburja
      description: Označuje specifični kultivar ali sorto topinamburja (zemeljske
        artičoke), kar zagotavlja podrobne informacije za vrtnarje, kuharje in zahtevne
        kupce.
    sunflower_oil_variety:
      name: Sorta sončničnega olja
      description: Razvršča profil maščobnih kislin ali kultivar sončničnega olja
        (npr. visokooleinsko, srednjeoleinsko, linolno).
    sunflower_variety:
      name: Sorta sončnic
      description: Kultivar/sorta sončnice (običajne tržne sorte za uporabo kot rezano
        cvetje).
    support_brace_features:
      name: Lastnosti opornice
      description: Navaja izstopajoče funkcionalne lastnosti opornice za zapestje,
        kot so zračno blago, odstranljiva opornica (navadna) ali nastavljiva kovinska
        ploščica.
    support_leg_count:
      name: Število podpornih nog
      description: Število nog, ki so v stiku s tlemi, ko je strelska palica v uporabi
        (npr. enonožec, dvonožec, trinožec).
    support_padding:
      name: Blazinjenje opore
      description: Označuje, ali trak/opora vključuje integrirano blazinjenje na stičnih
        točkah (vrat/rama/palec).
    support_structure_type:
      name: Vrsta podporne strukture
      description: Označuje metodo zgradbe, ki se uporablja za ohranjanje protivetrne
        zaščite v pokončnem položaju.
    supported_bowling_delivery_types:
      name: Podprte vrste metov v kegljanju
      description: Navaja variacije metov pri kriketu (bowling), ki jih stroj lahko
        simulira, kot so vrste inswing, outswing in vrste vrtenja (spin).
    supported_dive_modes:
      name: Podprti načini potapljanja
      description: Navaja operativne načine potapljanja, ki jih potapljaški računalnik
        podpira, kot so Air, Nitrox ali Gauge.
    supported_equipment_type:
      name: Vrsta podprte opreme
      description: Opredeljuje zimskošportno opremo, za držanje katere je nosilec
        zasnovan (npr. smuči, deske za sneg, smučarske palice).
    supported_spin_types:
      name: Podprte vrste vrtenja
      description: Navaja variacije vrtenja žoge, ki jih metalec lahko izvede.
    supported_spool_bobbin_types:
      name: Podprte vrste tuljav/tulca
      description: Navaja, katere formate tuljav/vretenc je električni navijalec zasnovan
        sprejeti.
    surf_wax_temperature_rating:
      name: Temperaturni razred voska za surfanje
      description: Navaja temperaturni razpon vode, za katerega je vosek zasnovan,
        kar zagotavlja optimalen oprijem v različnih podnebnih razmerah.
    surface_coating_or_finish:
      name: Površinski premaz ali končna obdelava
      description: Navaja kakršno koli zaščitno obdelavo ali obdelavo površine za
        izboljšanje zmogljivosti, ki je nanesena na klešče.
    surface_coating_or_wrap:
      name: Površinski premaz ali ovoj
      description: Zunanja obdelava površine, ki se uporablja za oprijem/nadzor na
        sredinski palici (in včasih na ročnih palicah).
    surface_finish:
      name: Končna obdelava površine
      description: Opisuje občutek/teksturo površine žoge, kar vpliva na oprijem in
        gibanje med kontaktnim žongliranjem.
    surface_finish_prep:
      name: Končna obdelava/priprava površine
      description: Označuje stanje frikcijske površine (npr. obnovljena površina,
        strojno obdelana, surova iz livarne) ob prodaji.
    surface_types_included:
      name: Vključene vrste površin
      description: Navaja, katero površino komplet vključuje za risanje/slikanje (če
        sploh katero), kot so platno, blok papirja, lesene plošče ali brez.
    surfboard_construction:
      name: Izdelava deske za surfanje
      description: Navaja glavno tehnologijo izdelave ali polaganje slojev deske za
        surfanje.
    surfboard_tail_shape:
      name: Oblika repa deske za surfanje
      description: Določa obris repa deske, kar vpliva na okretnost in držanje smeri.
    suspension_bushing_type:
      name: Vrsta puše vzmetenja
      description: Navaja funkcionalni/namestitveni stil puše vzmetenja.
    suspension_configuration:
      name: Konfiguracija vzmetenja
      description: Opisuje, ali ima trikolo vzmetenje in kje se nahaja
    suspension_material:
      name: Material vzmetenja
      description: Navaja material verig, vrvi ali jeklenic, ki se uporabljajo za
        obešanje gugalnice.
    suspension_trainer_accessories_included:
      name: Vključeni dodatki za trenažer s trakovi
      description: Navaja dodatne predmete, priložene kompletu trenažerja (npr. sidro
        za vrata, podaljševalni trak, vrečka za shranjevanje), kar kupcem pomaga razumeti,
        kaj je v škatli, in primerjati vrednost paketov.
    suspension_trainer_anchor_type:
      name: Vrsta sidra za trenažer s trakovi
      description: Določa stil montaže ali sidrno točko, za katero so trakovi zasnovani
        (npr. vrata, strop, drevo), kar daje informacije o združljivosti z uporabnikovim
        okoljem.
    suspension_type:
      name: Vrsta vzmetenja
      description: Navaja, ali so vilice toge ali pa uporabljajo določen sistem vzmetenja
        (zračni, vzmetni, hibridni, elastomerni itd.), kar kolesarjem pomaga uskladiti
        vilice z njihovim stilom vožnje.
    sustain_pedal_form_factor:
      name: Oblika pedala
      description: Opisuje fizični stil sustain pedala (npr. nožni pedal v stilu klavirja
        v primerjavi s kompaktno nožno tipko), kar vpliva na občutek in predviden
        namen uporabe
    sustain_pedal_switch_type:
      name: Vrsta stikala za pedal
      description: Označuje, ali pedal pošilja trenuten signal (samo med pritiskom)
        ali trajni preklopni signal.
    sustainability_certification:
      name: Certifikat o trajnosti
      description: Okoljski certifikat ali certifikat o izvoru za lesni material.
    swab_intended_bassoon_section:
      name: Predvideni del fagota za čistilno krpo
      description: Opredeljuje, kateri del fagota je čistilna krpa zasnovana čistiti
        (različne vrtine/deli zahtevajo različne oblike in velikosti krp).
    swab_style:
      name: Stil čistilne krpe
      description: Opisuje fizično zasnovo/format čistilne krpe, ki se uporablja za
        prehajanje skozi dele saksofona ali doseganje njegovih predelov.
    swab_weight_material:
      name: Material uteži čistilne krpe
      description: Material uteži/vodila za vlečenje skozi cev (če je prisotno), kar
        vpliva na tveganje praskanja in na trpežnost.
    swab_weight_style:
      name: Stil uteži čistilne krpe
      description: Navaja, kako je čistilna krpa obtežena za prehajanje skozi vrtino
        fagota.
    sway_bar_adjustability:
      name: Nastavljivost stabilizatorja podvozja
      description: Ali je otrdelost stabilizatorja nastavljiva in kako (običajno prek
        več montažnih lukenj na končnih sponah/končnikih).
    sway_bar_coating:
      name: Premaz stabilizatorja podvozja
      description: Obdelava površine ali premaz na stabilizatorju za odpornost proti
        koroziji in lepši videz.
    sway_bar_fitment_front_rear_kit:
      name: Umeščenost stabilizatorja (spredaj/zadaj/komplet)
      description: Označuje, ali je stabilizator predviden za sprednjo os, zadnjo
        os ali pa se prodaja kot komplet za sprednji in zadnji del.
    sweatshirt_pocket_type:
      name: Vrsta žepa na jopi
      description: Opisuje stil žepov, ki so prisotni na jopi oz. puloverju.
    sweet_potato_variety:
      name: Sorta sladkega krompirja
      description: Opredeljuje specifični kultivar ali tržno sorto sladkega krompirja.
    sweet_spot_position:
      name: Položaj idealne točke udarca
      description: Opredeljuje, kje vzdolž udarne ploskve kija se nahaja idealna točka
        za udarec, kar vpliva na stil igre in pogoje meta.
    sweetener_presence:
      name: Prisotnost sladila
      description: Navaja, ali so v oreškovem maslu prisotna dodana sladila in v kakšni
        količini.
    sweetening_type:
      name: Vrsta slajenja
      description: Opisuje, kako je izdelek oslajen ali kakšna je njegova stopnja
        sladkobe.
    swim_armband_construction_type:
      name: Vrsta izdelave plavalnih rokavčkov
      description: Določa strukturni stil ali mehanizem plovnosti rokavčkov (napihljivi
        nasproti trdi peni, hibridni itd.).
    swim_belt_purpose:
      name: Namen plavalnega pasu
      description: Funkcionalna klasifikacija plavalnega pasu (npr. podpora vzgonu/plovnosti,
        hoja v vodi, trening z odporom, statični privezi, pritrditev padala za upor,
        balast z utežmi, varno bredenje).
    swim_board_features:
      name: Lastnosti plavalne deske
      description: Izpostavlja posebne značilnosti ali izboljšave plavalne deske,
        ki izboljšujejo uporabnost ali varnost.
    swim_bottom_length:
      name: Dolžina spodnjega dela kopalk
      description: Razvršča splošno pokritost nog pri kopalnih boksaricah (npr. kratke
        kopalne hlače v primerjavi z dolžino do kolen)
    swim_buoy_features:
      name: Značilnosti plavalne boje
      description: Zajema dodatne omembe vredne značilnosti ali dodatke, ki izboljšujejo
        vidljivost, varnost ali uporabnost plavalne boje.
    swim_cap_style:
      name: Slog plavalne kape
      description: Določa zgradbo ali stil zasnove plavalne kape (npr. za dolge lase,
        zaobljena/tekmovalna, z mehurčki/v obliki turbana).
    swim_diaper_feature:
      name: Funkcija plavalne plenice
      description: Označuje, ali imajo kopalne hlačke integrirano neprepustno funkcijo
        plenic ali pa zahtevajo/izpuščajo ločeno plavalno plenico.
    swim_trainer_features:
      name: Lastnosti pripomočka za učenje plavanja
      description: Izpostavlja dodatne funkcionalne lastnosti ali lastnosti za udobje
        pripomočka za učenje plavanja.
    swim_trainer_type:
      name: Vrsta pripomočka za učenje plavanja
      description: Določa strukturni stil ali format pripomočka za učenje plavanja,
        kar pomaga pri filtriranju glede na zasnovo in namen treninga.
    swim_training_focus:
      name: Fokus plavalnega treninga
      description: Opredeljuje glavni cilj treninga, ki ga plavalna lopatka cilja
        (npr. tehnika, moč, izolacija mišic).
    swim_weight_style:
      name: Stil plavalne uteži
      description: Razvršča obliko plavalne uteži, kar kupcem pomaga razlikovati med
        bistveno različnimi vrstami izdelkov znotraj iste kategorije.
    swimbait_buoyancy:
      name: Plovnost varljive ribice
      description: Označuje, kako se varljiva ribica obnaša v vodnem stolpcu (plavajoča,
        lebdeča, potopljiva itd.), kar ribičem omogoča izbiro prave vabe za njihovo
        ciljno globino in stil vodenja vabe.
    swimbait_style:
      name: Stil varljive ribice
      description: Razvršča zgradbo ali zasnovo delovanja varljive ribice (npr. s
        kopitastim repom ali drseča vaba).
    swimwear_pieces_included:
      name: Vključeni kosi kopalk
      description: Navaja posamezne komponente oblačila, ki so priložene v kompletu
        burkinija, da kupci natančno vedo, kaj vsebuje paket.
    swimwear_set_pieces_included:
      name: Vključeni kosi v kompletu kopalk
      description: Navaja komponente oblačila, ki so na voljo v kompletu burkinija,
        da kupci natančno vedo, kaj bodo prejeli (npr. zgornji del, pajkice, hidžab/kapa).
    swing_attachment_connection_type:
      name: Vrsta pritrjevanja/povezave gugalnice
      description: Vrsta povezave, ki se uporablja za obešanje gugalnice na njeno
        podporo (npr. vrv, veriga, trakovi).
    swing_trainer_type:
      name: Vrsta trenažerja za zamah
      description: Razvršča stil ali mehanizem trenažerja za zamah, da lahko kupci
        hitro najdejo naprave, ki ustrezajo njihovim ciljem treninga.
    swing_training_objective:
      name: Cilj treninga zamaha
      description: Razvršča glavni fokus treninga, mehanizem ali cilj trenažerja za
        zamah (npr. tempo, hitrost, oprijem).
    switch_electrical_positions:
      name: Električni položaj stikala
      description: Navaja število in obnašanje električnih položajev na stikalu (npr.
        3-položajno stikalo, trenuten vklop).
    swivel_type:
      name: Vrsta vrtljivega sklepa
      description: Navaja konfiguracijo vrtljivega sklepa, ki se uporablja za zmanjšanje
        zapletanja povodca oz. vrvice.
    sword_scabbard_material:
      name: Material nožnice meča
      description: Navaja glavni material priložene nožnice/toka (če je prisoten).
    synthesizer_form_factor:
      name: Oblika sintetizatorja
      description: Opisuje fizični format vmesnika oziroma igralne površine sintetizatorja.
    synthetic_feather_style:
      name: Slog sintetičnega perja
      description: Stil/kroj sintetičnega perja, ki se uporablja za različne izglede
        in tehnike ustvarjanja.
    synthetic_formulation_type:
      name: Vrsta sintetične sestave
      description: Navaja vrsto sintetične bazne zaloge/formulacije (npr. PAO, ester,
        hidrokrekirana skupina III).
    syrup_base_ingredient:
      name: Osnovna sestavina sirupa
      description: Opredeljuje glavni rastlinski vir ali vir sladkorja, iz katerega
        je sirup ali nektar pridobljen (npr. javor, agava, trsni sladkor).
    syrup_variety:
      name: Vrsta sirupa
      description: Določa splošni stil ali kategorijo sirupa na podlagi njegove sestave
        ali tradicionalne uporabe (npr. javorjev sirup, aroma za kavo, sadni, zdravilni
        sirup).
    t_shirt_fit:
      name: Prileganje majice s kratkimi rokavi
      description: Opisuje predvideno splošno prileganje/kroj majice s kratkimi rokavi.
    tabla_included_components:
      name: Vključene komponente k tabli
      description: Označuje, kateri ključni predmeti so vključeni v ponudbo table
        (posamezen boben nasproti kompletu, pokrivala/kovčki, uglaševalno kladivce
        itd.).
    tabla_set_pieces_included:
      name: Vključeni kosi v kompletu table
      description: Označuje, katere komponente so vključene v komplet table (npr.
        dayan, bayan, obroči, pokrivala, orodja za uglaševanje, torba).
    tabla_tonal_pitch_range_bayan:
      name: Tonalni/zvočni razpon table
      description: Opisuje običajno kategorijo zvočnega/tonalnega razpona za bayan
        bobne (basovski del table) na podlagi velikosti in zgradbe.
    table_base_material:
      name: Material podstavka mize
      description: Opredeljuje glavni material podstavka ali stebra mize (različno
        od nog ali namizne plošče), kar pomaga pri filtriranju glede na specifičen
        material.
    table_base_type:
      name: Vrsta podstavka mize
      description: Opredeljuje strukturno zasnovo, ki podpira namizno ploščo (npr.
        steber, podnožje s kozli, X-podnožje).
    table_coverage_position:
      name: Položaj pokritosti mize
      description: 'Označuje, za kateri položaj oziroma položaje mize za namizni tenis
        je pokrivalo zasnovano: zloženo, postavljeno za igro ali oboje.'
    table_hockey_part_type:
      name: Vrsta dela za namizni hokej
      description: Opredeljuje specifično vrsto komponente znotraj sistemov za namizni
        hokej, zračni hokej ali hokej z ročicami.
    table_leg_design:
      name: Zasnova nog mize
      description: Opredeljuje strukturni stil ali geometrijo noge, kar kupcem omogoča
        uskladitev s specifično estetiko in potrebami po opori.
    table_size:
      name: Velikost mize
      description: Komercialno navedena splošna velikost biljardne mize, kar kupcem
        omogoča hitro izbiro običajnih možnosti, kot so šank mize ali tekmovalne mize.
    table_size_category:
      name: Kategorija velikosti mize
      description: Razvršča mizo za namizni nogomet glede na splošno tlorisno površino
        kar kupcem pomaga pri uskladitvi z razpoložljivim prostorom brez računanja
        mer.
    table_tennis_certification:
      name: Certifikat za namizni tenis
      description: Navaja uradne standarde ali odobritve krovnih organizacij, ki jih
        izdelek izpolnjuje (npr. ITTF, razredi EN 14468-2).
    tabletop_tilt_function:
      name: Funkcija nagiba namizne plošče
      description: Navaja, ali se namizna plošča lahko nagne, preklopi ali zasuče
        pod različnimi koti.
    tackle_components_included:
      name: Vključene komponente ribiške opreme
      description: Navaja specifične komponente ribiške opreme, vključene v komplet,
        da kupci natančno vedo, kaj je zagotovljeno.
    talking_drum_accessories_included:
      name: Vključeni dodatki za govoreči boben
      description: Navaja dodatke, ki so priloženi govorečemu bobnu
    talking_drum_cord_material:
      name: Material vrvice za govoreči boben
      description: Material, uporabljen za napenjalne vrvice/vrvi, ki povezujejo opne
        bobna.
    talking_drum_tuning_mechanism:
      name: Mehanizem za uglaševanje govorečega bobna
      description: Kako se spreminja višina tona bobna/kako se izvaja napenjanje med
        igranjem (ali pri pripravi).
    tam_tam_construction_style:
      name: Stil izdelave tam-tama
      description: Stil izdelave/kovanja tam-tama.
    tam_tam_items_included:
      name: Priloženi predmeti k tam-tamu
      description: Dodatki, priloženi k tam-tamu (npr. tolkalna palica, stojalo, pokrivalo).
    tamarillo_variety:
      name: Sorta tamarila
      description: Opredeljuje specifični kultivar ali barvno različico sadeža tamarilo.
    tamarind_variety:
      name: Sorta tamarinda
      description: Navaja botanično ali tržno sorto tamarinda, kar lahko vpliva na
        okus, teksturo in kulinarično uporabo.
    tambourine_frame_style:
      name: Stil okvirja tamburina
      description: Opisuje fizično konfiguracijo ročnega okvirja, ki se uporablja
        za držanje/igranje tamburina.
    tambourine_head_material:
      name: Material opne tamburina
      description: Navaja material igralne opne (membrane) na tamburinih z opno.
    tambourine_jingle_configuration:
      name: Konfiguracija kraguljčkov tamburina
      description: Kako so kraguljčki razporejeni ali nameščeni na tamburinu.
    tambourine_jingle_material:
      name: Material kraguljčkov tamburina
      description: Navaja material kraguljčkov tamburina (kovinskih ploščic), kar
        vpliva na ton in trpežnost.
    tambourine_mounting_type:
      name: Vrsta montaže tamburina
      description: Kako je tamburin predviden za držanje ali montažo med igranjem.
    tambourine_tuning_mechanism:
      name: Mehanizem za uglaševanje tamburina
      description: Navaja sistem uglaševanja, ki se uporablja na nastavljivih ročnih
        tamburinih (če je primerno).
    tank_model_scale:
      name: Merilo makete tanka
      description: Navaja razmerje merila makete tanka (npr. 1:35, 1:72).
    tank_top_back_style:
      name: Stil hrbtnega dela majice brez rokavov
      description: Navaja obliko ali kroj hrbtnega dela majice brez rokavov, kar vpliva
        na oporo, mobilnost in estetiko.
    tape_application_area:
      name: Področje uporabe traku
      description: Navaja del opreme ali igralca, kamor je trak predviden za namestitev,
        kar kupcem pomaga izbrati pravi stil.
    tape_finish:
      name: Končni izgled traku
      description: Površinski/vizualni izgled (sijaj ali tekstura) traku.
    tape_purpose:
      name: Namen traku
      description: Navaja glavni funkcionalni namen uporabe traku v okviru vzdrževanja
        ali prilagajanja loparja.
    tape_type:
      name: Vrsta traku
      description: Razvršča funkcionalni stil ali zgradbo hokejskega traku, kot so
        platneni, prosojni polietilenski, oprijemalni, raztegljivi kohezivni trak,
        trak za ščitnike ali irhovina.
    tapenade_main_ingredients:
      name: Glavne sestavine tapenade
      description: Navaja glavno osnovno sestavino, ki določa tapenado (olive, paradižnik,
        jajčevec, paprika itd.), kar je koristno za kupce s preferencami ali omejitvami
        glede sestavin.
    tapestry_loom_loom_format:
      name: Format statev za tapiserije
      description: Splošna oblika/stil stojala ročnih statev za tapiserije.
    tapestry_loom_shedding_method:
      name: Način odpiranja zeva statev za tapiserije
      description: Kako statve ločijo nitke osnove za prehod votka.
    tapestry_loom_tensioning_system:
      name: Sistem napenjanja statev za tapiserije
      description: Metoda, ki se uporablja za napenjanje in zavarovanje osnove na
        statvah za tapiserije.
    tar_head_material:
      name: Material opne bobna tar
      description: Opredeljuje material opne (membrane) bobna tar, kar močno vpliva
        na občutek, trpežnost in ton.
    tar_playing_style:
      name: Stil igranja tara
      description: Navaja glavni položaj/tehniko igranja, za katero je tar zasnovan.
    tar_tuning_system:
      name: Sistem uglaševanja tara
      description: Navaja, kako se tar uglašuje (kako se nastavlja napetost opne).
    target_components:
      name: Komponente tarče
      description: Navaja, katere komponente za gorivo/dovod zraka je izdelek predviden
        čistiti.
    target_relative_humidity_rh:
      name: Ciljna relativna vlažnost
      description: Predvidena ciljna relativna vlažnost, ki jo je izdelek zasnovan
        vzdrževati znotraj okolja instrumenta/kovčka
    target_resetting_mechanism:
      name: Mehanizem za ponastavitev tarče
      description: Opisuje, kako ali če sploh se tarča po zadetku vrne v svoj prvotni
        položaj.
    target_trainer_type:
      name: Vrsta trenažerja s tarčo
      description: Razvršča splošni stil ali format trenažerja s tarčo za racquetball
        ali skvoš
    targeted_contaminants:
      name: Ciljna onesnaževala
      description: Vrste mikrobov ali parazitov, za odstranjevanje katerih je izdelek
        certificiran.
    targeted_muscle_group:
      name: Ciljna mišična skupina
      description: Glavna mišična skupina, za trening ali podporo katere je dodatek
        predviden.
    taro_variety:
      name: Sorta taro korenine
      description: Navaja kultivar, vrsto ali tržno ime ponujene korenine taro (npr.
        vijolični taro, eddoe, dasheen).
    tassel_trim_header_type:
      name: Vrsta traku/roba cofaste obrobe
      description: Navaja zgradbo zgornjega roba/montažnega dela, ki se uporablja
        za pritrjevanje cofaste obrobe na površino (npr. trak, kito, vrvico).
    tassel_trim_use_case:
      name: Primer uporabe cofaste obrobe
      description: Glavno predvideno področje uporabe za cofasto obrobo.
    taste_profile:
      name: Profil okusa
      description: Opisuje prevladujoče značilnosti okusa sorte jabolk.
    tea_variety:
      name: Sorta čaja
      description: Razvršča specifično vrsto ali stil čaja oz. poparka (npr. črni,
        zeleni, matcha, rooibos), da lahko kupci filtrirajo svoje želene sorte.
    teasing_tool_style:
      name: Stil orodja za mikanje
      description: Fizični stil ali oblika orodja za mikanje, ki se uporablja za odpiranje
        in mešanje vlaken (npr. krtača, grabljice, glavnik).
    tee_base_style:
      name: Stil podstavka za žogo
      description: Opredeljuje strukturno zasnovo podstavka za brcanje pri ragbiju,
        ki podpira žogo.
    temper_hardness:
      name: Trdota/odpornost žice
      description: Označuje, kako mehka ali trda je žica (kako dobro obdrži obliko).
    temperature_control_type:
      name: Vrsta nadzora temperature
      description: Kako se temperatura orodja nadzoruje oziroma nastavlja.
    tenkara_action_ratio:
      name: Razmerje delovanja Tenkara
      description: Označuje tradicionalno razmerje upogiba Tenkara, ki opisuje, kje
        se palica pod obremenitvijo upogne (npr. 6:4).
    tennis_ball_court_surface:
      name: Površina teniškega igrišča
      description: Navaja površino oziroma površine igrišča, za katere je žoga zasnovana,
        kar zagotavlja optimalno zmogljivost in trpežnost.
    tennis_ball_pressure_type:
      name: Vrsta pritiska teniške žogice
      description: Opredeljuje notranji pritisk ali zgradbo žoge (pod pritiskom, brez
        pritiska, nizka kompresija, pena), kar vpliva na odboj in trpežnost.
    tennis_racket_grip_size:
      name: Velikost ročaja teniškega loparja
      description: Navaja standardiziran obseg ročaja loparja (L0–L5 ali ustrezne
        vrednosti v palcih), kar zagotavlja pravilno prileganje roki in udobje.
    tenor_flutophone_fingering_system:
      name: Sistem prstnih redov za tenor flutofon
      description: Navaja sistem prstnih redov, ki ga uporablja tenor flutofon (učna/notna
        konvencija).
    tenor_recorder_joint_type:
      name: Vrsta spoja tenorske kljunaste flavte
      description: Navaja vrsto spoja/povezave med deli tenorske kljunaste flavte.
    tenor_saxophone_key_system:
      name: Sistem zaklopk tenorskega saksofona
      description: Navaja uporabljeni sistem/standard zaklopk (pri saksofonih pogosto
        imenovan francoski/Boehmov stil).
    tenor_saxophone_pad_material:
      name: Material blazinic tenorskega saksofona
      description: Navaja glavni material, uporabljen za blazinice instrumenta.
    tenor_trombone_slide_type:
      name: Vrsta potega (drsnika) tenorske pozavne
      description: Vrsta potega, ki se uporablja na tenorski pozavni (npr. standardni/ravni
        v primerjavi s potegom s sprožilcem/z aksialnim pretokom).
    tenor_trombone_valve_configuration:
      name: Konfiguracija ventilov tenorske pozavne
      description: Označuje, ali ima tenorska pozavna dodatek z ventili/rotorji, in
        navaja, katero konfiguracijo uporablja.
    tension_control_type:
      name: Vrsta nadzora napetosti
      description: Označuje, kako (ali če sploh) čolniček zagotavlja nastavljiv upor/napetost
        na tuljavi/vretenu med podajanjem nitke.
    tension_mechanism:
      name: Mehanizem napenjanja
      description: Stil napenjanja, ki se uporablja za nadzor podajanja votka s tuljave/votkovne
        cevi med tkanjem.
    tension_pitch_modulation_system:
      name: Sistem za modulacijo napetosti/višine tona
      description: Kako govoreči boben med igranjem spreminja višino/napetost tona
        (na primer s stiskanjem napenjalnih vrvic).
    tension_system:
      name: Sistem napenjanja
      description: Sistem prevzemanja/napetosti kolovrata, za katerega je komplet
        s krilcem predviden.
    tent_fabric_material:
      name: Material tkanine šotora
      description: Opredeljuje glavno tkanino, uporabljeno za zunanje platno ali trup
        šotora, kar vpliva na težo, zračnost in vremensko odpornost.
    tent_season_rating:
      name: Sezonski razred šotora
      description: Razvršča šotor glede na število sezon ali vremenske razmere, za
        katere je zasnovan (npr. 3-sezonski, 4-sezonski, ekspedicijski)
    tent_setup_type:
      name: Vrsta postavitve šotora
      description: Označuje strukturni stil postavljanja šotora, kot je samostoječi,
        delno samostoječi, nesamostoječi, napihljivi/z zračnim ogrodjem ali samopostavljivi.
    tent_style:
      name: Slog šotora
      description: Opisuje strukturno zasnovo šotora (npr. iglu/kupola, tunel, v obliki
        črke A).
    test_result_output_method:
      name: Način prikaza rezultatov testa
      description: Navaja, kako tester avtomobilskih akumulatorjev prikaže ali posreduje
        rezultate testa uporabniku (npr. indikator, zaslon, izpis, aplikacija ali
        programsko poročilo).
    tether_strap_system:
      name: Sistem trakov / varnostnih vezi
      description: Vrsta sistema vezi ali trakov, ki se uporablja za povezavo opore
        za vrat s čelado ali pasom (če je primerno).
    text_color:
      name: Barva besedila
      description: Barva natisnjenega ali izvezenega besedila na etiketi, ločena od
        barve ozadja etikete.
    textile_craft_machine_operation_type:
      name: Vrsta delovanja tekstilnega ustvarjalnega stroja
      description: Kako se stroj upravlja (ročni pogon nasproti nožnemu pogonu nasproti
        motoriziranemu/električnemu).
    textile_finish_treatment:
      name: Končna obdelava/obdelava tekstila
      description: Navaja izstopajoče obdelave površine, nanesene na tekstilni material.
    texture_inclusions:
      name: Teksturni dodatki
      description: Navaja dodane teksturne komponente, kot so pulpa aloe vere, semena
        bazilike, kokosova smetana, pokajoči mehurčki ali koščki sadja.
    therapeutic_technology:
      name: Terapevtska tehnologija
      description: Navaja kakršno koli integrirano terapevtsko funkcijo, kot so hladilni
        gel, magnetni trakovi ali infrardeča keramika.
    thermal_set_components:
      name: Komponente termo kompleta
      description: Opredeljuje, ali izdelek vključuje le spodnji del, le zgornji del
        ali oba kosa kot komplet.
    thermal_weight:
      name: Toplotna teža
      description: Označuje toplotno kategorijo tkanine bakalave.
    thermostat_type:
      name: Vrsta termostata
      description: Funkcionalna zasnova ali stil upravljanja termostata hladilnega
        sistema motornega vozila.
    thimble_guide_size:
      name: Velikost vodila za prstanec
      description: Oznaka velikosti vodila za naprstnik (velikost prileganja/pokritosti),
        ki se običajno prodaja kot majhna/srednja/velika namesto izmerjenih dimenzij.
    thread_connection_size:
      name: Velikost navojnega priključka
      description: Določa specifikacijo navoja, ki povezuje gredi, konice in adapterje
        (npr. 6 mm).
    thread_construction:
      name: Zgradba sukanca
      description: Kako je sukanec izdelan ali obdelan (npr. večnitna preja za vezenje
        nasproti lepljenemu/ojačanemu sukancu).
    thread_cord_type_beading_pattern:
      name: Vrsta sukanca/vrvice (za vzorec nizanja kroglic)
      description: Priporočena vrsta sukanca ali vrvice, ki se uporablja za dokončanje
        vzorca.
    thread_cutter_form_factor:
      name: Oblika rezila za sukanec
      description: Določa fizični slog rezalnika gnid, kot so ročne škarje, obesne
        škarje ali škarje v obliki obroča.
    thread_cutter_mechanism:
      name: Mehanizem rezila za sukanec
      description: Opisuje rezalno delovanje ali mehanizem, ki ga uporablja rezilo
        za sukanec.
    thread_cutter_safety_features:
      name: Varnostne lastnosti rezila za sukanec
      description: Označuje vgrajene varnostne lastnosti, ki zmanjšujejo tveganje
        nenamernih ureznin ali ščitijo rezila med shranjevanjem.
    thread_cutter_usage_application:
      name: Uporaba rezila za sukanec
      description: Označuje glavni predviden namen ročnega ustvarjanja za rezilo za
        sukanec.
    thread_finish_treatment:
      name: Obdelava sukanca
      description: Površinski izgled ali obdelava, nanesena na sukanec, kar vpliva
        na rokovanje in lastnosti (npr. voskan, lepljen, merceriziran).
    thread_material:
      name: Material sukanca
      description: Glavna vsebnost vlaken/materiala sukanca/preje (ne velja za blago).
    thread_material_fiber:
      name: Material sukanca (vlakna)
      description: Navaja glavno vlakno/material samega sukanca (ne velja za blago).
    thread_package_format:
      name: Format pakiranja sukanca
      description: Format pakiranja šivalnega sukanca (npr. navaden motek/tuljava,
        stožec, vretence).
    thread_rack_compatible_spool_type:
      name: Združljiva vrsta tuljave za stojalo za sukance
      description: Vrsta pakiranja sukanca, za sprejem katere je stojalo zasnovano
        (motki nasproti stožcem itd.).
    thread_standard_size:
      name: Standardna velikost sukanca
      description: Opredeljuje standard velikosti/teže sukanca, ki se uporablja na
        etiketi izdelka (npr. wt, Tex, denier).
    thread_type:
      name: Vrsta sukanca
      description: Navaja zgradbo/vrsto sukanca/preje za križni vbod (vezenje).
    thread_weight_system:
      name: Sistem teže sukanca
      description: Standard, ki se uporablja za izražanje debeline/teže sukanca.
    thread_yarn_guide_mounting_attachment_style:
      name: Stil montaže/pritrditve vodila za sukanec in prejo
      description: Opisuje, kako se vodilo nosi ali namesti med uporabo.
    thread_yarn_guide_tension_control:
      name: Nadzor napetosti vodila za sukanec in prejo
      description: Označuje, ali in kako vodilo zagotavlja nastavljivo napetost/upor
        na sukancu ali preji.
    thread_yarn_organizer_features:
      name: Lastnosti organizatorja za sukance in prejo
      description: Izpostavlja funkcionalne lastnosti organizacije in prenosljivosti,
        specifične za shranjevanje sukancev/preje.
    threader_intended_use:
      name: Predviden namen uporabe vdevalca niti
      description: Označuje glavni kontekst ročnega ustvarjanja, za katerega je ročni
        vdevalec niti zasnovan.
    threading_system:
      name: Sistem vdevanja niti
      description: Označuje metodo in pripomočke, ki se uporabljajo za vdevanje niti
        v opletilni šivalni stroj (npr. ročno, barvno kodirano, vodeno, zračno vdevanje).
    threading_type:
      name: Vrsta vdevanja niti
      description: Označuje, ali nakit uporablja notranje navoje, zunanje navoje,
        je brez navoja ali pa to ni primerno
    throttle_type_scooter_conversion:
      name: Vrsta ročice za plin (predelava skuterja)
      description: Navaja obliko (form factor)/vmesnik ročice za plin, ki je vključena
        v komplet za predelavo ali jo ta zahteva.
    throw_rope_end_attachment:
      name: Končni priključek reševalne (metalne) vrvi
      description: Zaključno okovje/priključek ali zanka, ki je na voljo na delovnem
        koncu oziroma koncih metalne vrvi.
    throw_rope_storage_packaging_type:
      name: Vrsta shranjevanja/pakiranja reševalne (metalne) vrvi
      description: Vidnostne lastnosti reševalne (metalne) vrvi.
    throw_rope_visibility_features:
      name: Vidljivost vrvi za metanje
      description: Lastnosti vidnosti in identifikacije, namenjene lažji opaznosti
        vrvi v vodi ali šibki svetlobi.
    thrower_operation_type:
      name: Vrsta delovanja metalca
      description: Razvršča mehanski stil oziroma stil delovanja metalca (npr. za
        glinaste golobe) za hitro filtriranje ročnih nasproti avtomatskim mehanizmom.
    thumb_design:
      name: Zasnova palca
      description: Opisuje, kako je palec vgrajen v rokavico, kar vpliva na varnost
        in oprijem.
    tiara_design:
      name: Zasnova tiare
      description: Navaja splošni strukturni stil ali silhueto tiare.
    tie_down_points_straps_included:
      name: Vključene pritrdilne točke/trakovi
      description: Navaja, ali nosilec vključuje integrirane pritrdilne točke in/ali
        priložene trakove za zavarovanje motornega kolesa/skuterja.
    tiling_format:
      name: Format polaganja ploščic
      description: Navaja stil razporeditve PDF-ja za sestavljanje natisnjenih strani.
    time_current_characteristic:
      name: Časovno-tokovna karakteristika
      description: Označuje časovno-tokovno obnašanje varovalke (npr. hitra/fast-acting
        nasproti varovalki s časovnim zamikom), kar vpliva na primernost za tokokroge
        z vklopnimi tokovi.
    timer_count_mode:
      name: Način odštevanja/številčenja časovnika
      description: Označuje časovno-tokovno obnašanje varovalke (npr. hitra v primerjavi
        z varovalko s časovnim zamikom), kar vpliva na primernost za tokokroge z vklopnimi
        tokovi.
    timer_display_type:
      name: Način odštevanja/številčenja časovnika
      description: Označuje, kako igralni časovnik prikazuje preostali čas (npr. digitalen
        zaslon, analogna številčnica, peščena ura ali brez vizualnega prikaza).
    timer_operating_modes:
      name: Načini delovanja časovnika
      description: Podprta obnašanja časovnika za sprožanje učinkov.
    timing_belt_construction_material_rubber_compound:
      name: Material izdelave zobatega jermena
      description: Glavna gumena zmes jermena, ki se uporablja (npr. HNBR), kar vpliva
        na odpornost proti vročini/olju in na življenjsko dobo.
    timing_belt_profile:
      name: Profil zobatega jermena
      description: Standard profila/oblike zob zobatega jermena (npr. trapezni v primerjavi
        z zaobljenim).
    timing_belt_reinforcement_cord_material:
      name: Material ojačitvene vrvice zobatega jermena
      description: Navaja material notranje ojačitvene vrvice znotraj zobatega jermena
        (npr. steklena vlakna, aramid), kar vpliva na trdnost in raztegljivost.
    timing_component_material:
      name: Material komponente krmilnega mehanizma
      description: Glavni material komponente krmilnega mehanizma (zmes jermena, kovina
        verige/zobnika, material pokrova).
    tin_whistle_body_material:
      name: Material trupa irske piščali
      description: Po potrebi zajema običajne materiale trupa irske piščali bolj specifično
        kot splošni seznam materialov za glasbila.
    tin_whistle_bore_type:
      name: Vrsta vrtine irske piščali
      description: Navaja zasnovo vrtine irske piščali.
    tin_whistle_included_accessories:
      name: Vključeni dodatki k irski piščali
      description: Dodatki, priloženi k irski piščali (npr. etui/kovček, čistilna
        palica).
    tip_finish_coating:
      name: Končna obdelava/premaz konice
      description: Navaja površinsko obdelavo na delovnem koncu (npr. kromirano, prašno
        lakirano), kar vpliva na odpornost proti koroziji in poškodbe platišča.
    tip_shape:
      name: Oblika konice
      description: Opisuje obliko ali ostrino konice kitarske trzalice, kar vpliva
        na artikulacijo in občutek pri brenkanju.
    tippet_rating:
      name: Ocena debeline/trdnosti predvrvice
      description: Največja priporočena trdnost predvrvice, izražena z oznakami X
        za muharjenje (npr. 4X).
    tire_changer_operation_type:
      name: Vrsta delovanja naprave za premontažo pnevmatik
      description: Navaja, kako se naprava za premontažo pnevmatik sproži/upravlja
        (npr. ročno, pnevmatorsko, hidravlično). Različno od splošnega atributa »Vir
        napajanja«; uporablja se pri opisovanju metode proženja delovanja stroja.
    tire_changer_type:
      name: Vrsta naprave za premontažo pnevmatik
      description: Splošni stil delovanja, zasnova ali raven avtomatizacije naprave
        za premontažo pnevmatik.
    tire_compound_type:
      name: Vrsta zmesi pnevmatike
      description: Navaja klasifikacijo gumene zmesi, uporabljene v pnevmatikah (npr.
        mehka, za dež, gladka), kar vpliva na oprijem in trpežnost v različnih razmerah.
    tire_load_range:
      name: Razpon nosilnosti pnevmatike
      description: Označuje število platen/oznako razpona nosilnosti pnevmatike (običajno
        za LT pnevmatike za lahka tovorna vozila), kar odraža zmogljivost nošenja
        tovora.
    tire_position:
      name: Položaj pnevmatike
      description: Priporočeni položaj namestitve na vozilu.
    tire_repair_kit_components:
      name: Komponente kompleta za popravilo pnevmatik
      description: Navaja predmete, vključene v komplet, kar strankam omogoča primerjavo
        celovitosti paketov.
    tire_sidewall_type:
      name: Vrsta bočnice pnevmatike
      description: Navaja stilsko oblikovanje ali konstrukcijske lastnosti bočnice.
    tire_speed_rating:
      name: Hitrostni razred pnevmatike
      description: Črka hitrostnega razreda pnevmatike (npr. H, V, W), ki označuje
        največjo trajno hitrostno zmogljivost.
    tire_spoon_type:
      name: Vrsta žlice za pnevmatike
      description: Razvršča žlico za pnevmatike glede na obliko konca in predviden
        namen uporabe.
    tire_system_compatibility:
      name: Združljivost sistemov pnevmatike
      description: Označuje, ali je tesnilo predvideno za sisteme brez zračnice, pnevmatike
        z zračnico ali oboje.
    tire_temperature_rating_utqg:
      name: Ocena odpornosti pnevmatike na temperaturo (UTQG)
      description: Razred odpornosti na temperaturo po UTQG za avtomobilske pnevmatike
        (npr. A, B, C).
    tire_traction_rating_utqg:
      name: Ocena oprijema pnevmatike (UTQG)
      description: Razred oprijema po UTQG za zmogljivost zaviranja na mokri podlagi.
    tire_tread_style:
      name: Stil tekalne plasti pnevmatike
      description: Opisuje splošni vzorec tekalne plasti tabularne pnevmatike, kar
        odraža predvideni teren in lastnosti oprijema.
    tire_tube_type:
      name: Vrsta zračnice za pnevmatiko
      description: Ali je pnevmatika zasnovana za uporabo brez zračnice ali z zračnico.
    title_status:
      name: Status lastniškega lista
      description: Pravni status registracije vozila.
    tobacco_application:
      name: Uporaba tobaka
      description: Označuje predvideno metodo uživanja ali kadilski pripomoček, za
        katerega je zasnovan tobak v rinfuzi.
    tobacco_cut_type:
      name: Vrsta kroja tobaka
      description: Navaja fizični kroj ali stil priprave tobaka v rinfuzi, kar vpliva
        na stopnjo gorenja, metodo polnjenja in splošno izkušnjo kajenja.
    tobacco_strength:
      name: Moč tobaka
      description: Označuje zaznano polnost okusa ali nikotinski udarec tobaka ob
        uživanju, kar kupcem pomaga izbrati jakost, ki ustreza njihovi preferenci.
    toe_construction:
      name: Zgradba prstnega predela
      description: Navaja konfiguracijo prstnega predela neoprenskih čevljev, kar
        vpliva na ravnotežje, občutek deske in toploto.
    toe_coverage:
      name: Pokritost prstov
      description: Označuje vrsto pokritosti prstov, ki jo zagotavlja nogavica.
    toe_pick_style:
      name: Stil konice na drsalki
      description: Opisuje zasnovo konice z zobci na rezilih drsalk za umetnostno
        drsanje.
    toe_protection_type:
      name: Vrsta zaščite za prste
      description: Označuje, ali je prstni predel ojačan zaradi varnostnih razlogov
        in na kakšen način (npr. jeklena kapica, mehka kapica).
    toe_reinforcement_type:
      name: Vrsta ojačitve prstnega predela
      description: Podrobno opisuje zgradbo prstnega predela, kar vpliva na trpežnost
        in združljivost s čevlji.
    toe_stop_stem_thread_size:
      name: Velikost navoja stebla prstne zavore
      description: Navaja velikost navoja stebel prstnih zavor, kar zagotavlja združljivost
        s podvozjem kotalke.
    tofu_preparation_style:
      name: Stil priprave tofuja
      description: Razvršča tradicionalni stil ali podvrsto tofuja, ki presega samo
        trdoto (npr. svileni tofu, v bloku, ocvrti, tofu kožica, vozlički, fermentirani).
    tom_mount_adjustment_features:
      name: Lastnosti nastavljanja nosilca za prehode
      description: Navaja, katere nastavitve nosilec prehoda omogoča za pozicioniranje
        bobna (npr. nagib, rotacija, višina).
    tom_mount_components_included:
      name: Vključene komponente nosilca za prehode
      description: Navaja, kateri deli so vključeni v nosilec za prehode (sprejemnik,
        roka, kroglični zglob, objemke, spominske zapore itd.).
    tom_mount_mounting_position:
      name: Položaj montaže nosilca za prehode
      description: Navaja, kam je nosilec prehoda predviden za pritrditev (npr. na
        bas boben, stojalo za činele, ogrodje).
    tonneau_cover_mounting_style:
      name: Stil montaže pokrova kesona
      description: Označuje, kako se pokrov kesona namesti/pritrdi na stranska vodila
        kesona poltovornjaka.
    tool_case_form_factor:
      name: Oblika kovčka za orodje
      description: Opredeljuje fizični stil kovčka za orodje, kar vpliva na prenosljivost
        in shranjevanje (npr. aktovka, trdo ohišje).
    tool_functions_included:
      name: Vključene funkcije orodja
      description: Navaja specifične funkcije popravila ali vzdrževanja, ki jih večnamensko
        orodje ali komplet orodij lahko opravlja.
    top_bunk_access_method:
      name: Način dostopa do zgornjega ležišča
      description: Označuje, kako uporabniki dosežejo zgornje ležišče pograda, kar
        pomaga pri varnostnih in prostorskih pomislekih.
    top_fit:
      name: Prileganje zgornjega dela oblačila
      description: Navaja splošno silhueto ali prileganje zgornjega dela oblačila
        telesu (npr. oprijeto ali ohlapno)
    top_hat_style:
      name: Stil cilindričnega klobuka
      description: Opredeljuje specifično različico stila cilindričnega klobuka.
    top_soundboard_material:
      name: Material zgornje plošče
      description: Navaja material zgornje plošče kitare (glavne plošče, ki proizvaja
        ton).
    topping_form:
      name: Oblika preliva oziroma posipa
      description: Določa fizično obliko ali konsistenco preliva/posipa za sladice,
        kar kupcem pomaga hitro zožiti izbiro na želeni namen uporabe.
    topping_type:
      name: Vrsta preliva
      description: Označuje glavni zunanji posip, preliv ali premaz, nanesen na krof.
    tow_hook_type:
      name: Vrsta vlečne kljuke
      description: Označuje, ali deska za klečanje vključuje integrirano vlečno kljuko,
        ter navaja stil njenega mehanizma.
    tow_point_configuration:
      name: Konfiguracija vlečne točke
      description: Navaja konfiguracijo vlečne točke (enojna, dvojna, večkratna),
        ki jo ponuja vlečna tuba za različne položaje vožnje.
    tow_strap_protective_features:
      name: Zaščitne lastnosti vlečnega traku
      description: Izstopajoče konstrukcijske lastnosti za varnost in trpežnost, vgrajene
        v vlečni trak.
    tow_strap_type:
      name: Tip traku za prste na nogi
      description: Označuje funkcionalno zgradbo vlečnega traku, kot je statični vlečni
        trak nasproti kinetičnemu reševalnemu traku.
    towable_tube_style:
      name: Stil vlečne tube
      description: Opredeljuje splošno zasnovo ali obliko vlečne tube, kar narekuje
        položaj voznika in izkušnjo vožnje.
    towed_water_sport_discipline:
      name: Disciplina vlečnih vodnih športov
      description: Navaja glavno vlečno vodno aktivnost, za katero je rokavica zasnovana.
    towel_features:
      name: Lastnosti brisače
      description: Navaja posebne značilnosti ali dodatke, priložene k brisači.
    towel_style:
      name: Stil brisače
      description: Razvršča funkcionalno zasnovo ali format brisače za golf.
    toy_airplane_control_type:
      name: Vrsta upravljanja igralnega letala
      description: Navaja, kako uporabnik upravlja igralno letalo.
    toy_airplane_features:
      name: Lastnosti igralnega letala
      description: Izpostavlja igralne lastnosti, prisotne na igralnem letalu.
    toy_airplane_flight_capability:
      name: Zmogljivost letenja igralnega letala
      description: Označuje, ali je igralno letalo zasnovano za dejansko letenje/drsenje
        ali pa je prvenstveno namenjeno igri na tleh/razstavi.
    toy_audio_features:
      name: Zvočne lastnosti igrače
      description: Navaja zvočne zmogljivosti in zvočne učinke, ki so vgrajeni v igračo.
    toy_boat_play_features:
      name: Igralne lastnosti igralnega čolna
      description: Izpostavlja interaktivne lastnosti igralnih čolnov za odkrivanje
        in filtriranje.
    toy_boat_recommended_play_environment:
      name: Priporočeno igralno okolje za igralni čoln
      description: Navaja predvideno igralno okolje za igralni čoln, kar podpira pričakovanja
        kupcev in varnost (npr. kopalna kad nasproti odprti vodi).
    toy_bowling_equipment_included:
      name: Vključena oprema za otroško kegljanje
      description: Navaja, katere kegljaške komponente so vključene v igralni komplet
        za kegljanje (npr. keglji, krogla, steza/podloga, torba za nošenje).
    toy_car_features:
      name: Lastnosti igralnega avtomobilčka
      description: Izpostavlja igralne lastnosti, integrirane v igralni avtomobilček
        (ločeno od pogona), kot so luči, zvoki ali deli, ki se odpirajo.
    toy_drawing_tablet_accessories_included:
      name: Vključeni dodatki za otroško risalno tablico
      description: Dodatni vključeni pripomočki poleg same tablice (npr. dodatno pisalo,
        štampiljke).
    toy_drawing_tablet_erase_method:
      name: Metoda (način) brisanja otroške risalne tablice
      description: Kako se risalna površina očisti/izbriše.
    toy_drawing_tablet_screen_type:
      name: Vrsta zaslona otroške risalne tablice
      description: Vrsta uporabljene risalne/prikazovalne površine (npr. LCD pisalna
        tablica v primerjavi z magnetno).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrument za pisanje/risanje na otroško risalno tablico
      description: Primarno orodje, ki se uporablja za risanje po tablici (tip pisala).
    toy_figure_sound_feature:
      name: Zvok igrače
      description: Označuje, ali živalska figurica proizvaja zvoke in kakšne vrste
        (npr. rjovenje, realističen živalski zvok).
    toy_game_features:
      name: Lastnosti igrače/igre
      description: Izpostavlja izstopajoče igralne ali konstrukcijske lastnosti, pomembne
        za igrače za plažo in pesek.
    toy_gift_basket_items_included:
      name: Vključeni predmeti v darilnem košu z igračami
      description: 'Navaja glavne vrste igrač, ki so vključene v košarico za obdarovanje
        (na primer: plišasta igrača, gradbeni komplet, sestavljanka).'
    toy_glider_launch_method:
      name: Metoda izstrelitve igralnega jadralnega letal
      description: Navaja, kako se igralno jadralno letalo izstreli, kar vpliva na
        stil igre in pričakovanja kupcev.
    toy_helicopter_control_type:
      name: Vrsta upravljanja igralnega helikopterja
      description: Kako se igralni helikopter upravlja/vodi (neodvisno od pogona),
        kot je ročni daljinski upravljalnik, upravljanje prek aplikacije ali brez
        upravljanja (prosti polet).
    toy_helicopter_features:
      name: Lastnosti igralnega helikopterja
      description: Ključne funkcionalne lastnosti igralnega helikopterja (predvsem
        vodenih modelov), ki vplivajo na uporabnost in vrednost igre.
    toy_jacks_set_items_included:
      name: Vključeni predmeti v kompletu igralnih kamenčkov
      description: Navaja, kateri glavni predmeti so vključeni v komplet igralnih
        kamenčkov (npr. kamenčki, žogica, vrečka).
    toy_keyboard_learning_mode:
      name: Način učenja na igralni klaviaturi
      description: Označuje izobraževalni pristop oziroma pristop učenja, ki ga podpira
        igralna klaviatura (npr. osvetljene tipke, pesmi za spremljanje, vodene lekcije,
        učenje s pomočjo aplikacije).
    toy_keyboard_sound_theme:
      name: Zvočna tematika igralne klaviature
      description: Vrste vgrajenih zvokov instrumentov/zvočnih tematik v ponudbi (poleg
        običajnega klavirja).
    toy_kitchen_appliances_included:
      name: Vključeni kuhinjski aparati v otroški kuhinji
      description: Navaja kuhinjski aparat (ali aparate), ki so zastopani v igralnem
        kompletu, ko je izdelek aparat ali komplet, osredotočen na aparate.
    toy_kitchen_assembly_requirement:
      name: Zahteva po sestavljanju otroške kuhinje
      description: Označuje, ali je sestavljanje potrebno, in približno zahtevnost
        sestavljanja.
    toy_kitchen_interactive_features:
      name: Interaktivne lastnosti otroške kuhinje
      description: Izpostavlja interaktivne elemente, ki se običajno pojavljajo v
        otroških kuhinjah in pripadajočih dodatkih.
    toy_motorcycle_feature_set:
      name: Nabor lastnosti igralnega motorja
      description: Ključne igralne lastnosti igralnega motorja (izberite vse, kar
        ustreza).
    toy_motorcycle_scale:
      name: Merilo igralnega motorja
      description: Razmerje merila za igralne/zbirateljske motorje (npr. 1:12).
    toy_parachute_launch_method:
      name: Metoda sprožitve igralnega padala
      description: Kako je igrača predvidena za izstrelitev/sprožitev za polet.
    toy_piano_and_keyboard_accessories_included:
      name: Vključeni dodatki za igralni klavir in klaviaturo
      description: Dodatki, priloženi k igralnemu klavirju ali igralni klaviaturi.
    toy_playset_assembly_required:
      name: Zahtevano sestavljanje igralnega kompleta
      description: Označuje, ali je pred igro potrebno sestavljanje s strani odrasle
        osebe (več kot le preprosto stikanje delov).
    toy_playset_items_included:
      name: Vključeni predmeti v otroškem igralnem kompletu
      description: Navaja glavne vključene komponente v igralnem kompletu (kaj je
        vključeno v škatli).
    toy_safety_certification:
      name: Varnostna certifikacija igrače
      description: Varnostni in skladnostni standardi/oznake, ki veljajo za igrače
        na kupčevem trgu (npr. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Lastnosti igralnega vesoljskega plovila
      description: Označuje običajne interaktivne/igralne lastnosti, vgrajene v igralno
        vesoljsko plovilo.
    toy_spaceship_size_class:
      name: Razred velikosti igralnega vesoljskega plovila
      description: Označuje grob razred velikosti za igralno vesoljsko plovilo za
        podporo hitremu filtriranju, ločeno od natančnih dimenzij (dolžina/širina/višina)
        in ne kot številčno razmerje merila modela (npr. 1:72).
    toy_tableware_pieces_included:
      name: Vključeni kosi igralne posode
      description: Navaja, kateri kosi igralne posode so vključeni (krožniki, skodelice,
        pribor, servirni kosi).
    toy_tool_electronic_features:
      name: Elektronske lastnosti igralnega orodja
      description: Opisuje interaktivne/elektronske funkcije igralnega orodja (lučke,
        zvoki, vrtenje itd.).
    toy_tool_set_components_included:
      name: Vključene komponente v kompletu otroškega orodja
      description: Navaja specifične predmete igralnega orodja, vključene v paketu
        (posebej za komplete orodja).
    toy_train_scale:
      name: Merilo igralnega vlaka
      description: Navaja standard merila igralnega/modelnega vlaka (ali velikost
        sistema tirnic), kar zagotavlja združljivost z obstoječimi vlaki in tiri.
    toy_train_track_layout_type:
      name: Vrsta razporeditve tirnic igralnega vlaka
      description: Opisuje vključeno razporeditev/obliko tirnic za komplet vlaka ali
        razširitveni paket tirnic.
    toy_weapon_gadget_features:
      name: Lastnosti igralnega orožja in pripomočkov
      description: Izpostavlja običajne interaktivne in funkcionalne lastnosti, specifične
        za igralno orožje in vohunske pripomočke.
    tpms_sensor_frequency_band:
      name: Frekvenčni pas senzorja TPMS
      description: Radijski frekvenčni pas, ki ga podpirajo dodatki, povezani s TPMS
        (kadar je to ustrezno).
    track_and_field_discipline:
      name: Atletika — disciplina
      description: Opredeljuje specifični atletski dogodek ali disciplino, za katero
        je izdelek predviden (npr. met krogle, skok s palico, šprinti).
    track_event_specialization:
      name: Specializacija za tekaške atletske discipline
      description: Označuje vrsto discipline, za katero so atletski športni copati
        z bodiči optimizirani.
    track_field_event_suitability:
      name: Primernost za atletsko disciplino
      description: Opredeljuje specifične atletske discipline, za katere je pripomoček
        za trening predviden.
    track_set_special_features:
      name: Posebne lastnosti kompleta steze
      description: Izpostavlja izstopajoče igralne lastnosti, vključene v komplet
        steze, ki presegajo osnovno progo in avtomobilčke.
    track_surface_compatibility:
      name: Združljivost s površino steze
      description: Označuje tekaško površino (ali površine), za katere so bodiči ali
        športni copati optimizirani
    tracking_aid_type:
      name: Vrsta pripomočka za sledenje
      description: Označuje, ali kajak vključuje pripomočke, ki izboljšujejo sledenje
        premice.
    traction_pattern_type:
      name: Vrsta vzorca oprijema
      description: Opisuje glavni površinski utor ali vzorec tekalne plasti, ki zagotavlja
        oprijem na podlogi.
    trading_card_league:
      name: Liga zbiranja kartic
      description: Opredeljuje športno ligo, povezano s kompletom kartic ali tematiko
        (kjer je to ustrezno).
    trailer_construction:
      name: Zgradba priklopnika
      description: Opredeljuje glavno zgradbo priklopnika za okvir/karoserijo (npr.
        aluminij, jeklo ali mešana zgradba).
    trailer_coupler_size:
      name: Velikost sklopke priklopnika
      description: Navaja velikost krogle sklopke priklopnika, ki je potrebna za vleko.
    trailer_hitch_mounting_location_method:
      name: Mesto/metoda montaže vlečne kljuke priklopnika
      description: Navaja, kje in kako je vlečna kljuka nameščena na vozilo (npr.
        zadnji priklop, prednji priklop, montaža na okvir, montaža na odbijač, montaža
        na keson).
    trailer_light_function:
      name: Funkcija luči priklopnika
      description: Glavna funkcija/položaj luči priklopnika.
    trailer_suspension_type:
      name: Vrsta vzmetenja priklopnika
      description: Navaja vrsto sistema vzmetenja, uporabljenega na kolesarski prikolici,
        kot je vijačna ali listnata vzmet, za izboljšanje udobja med vožnjo in zaščito
        tovora.
    trailer_wiring_circuit:
      name: Ožičenje prikopnika
      description: Navaja svetlobne, zavorne in pomožne krogotoke/signale, ki jih
        prenaša ožičenje priklopnika (tj. kateri napajalni/ozemljitveni in signalni
        vodi so prisotni).
    trailer_wiring_connector_type:
      name: Vrsta priključka ožičenja priklopnika
      description: Navaja standard vtikača na strani prikolice/vozila, ki se uporablja
        za kabelske snope in adapterje priklopnika.
    train_whistle_intended_use:
      name: Predvidena uporaba vlakovne piščali
      description: Glavni predvideni kontekst uporabe piščali.
    train_whistle_sound_character:
      name: Zvočni značaj vlakovne piščali
      description: Opisuje zaznani tonalni značaj zvoka piščali (barvo zvoka).
    trainer_mounting_type:
      name: Vrsta montaže trenažerja
      description: Opisuje, kako se kolo poveže s trenažerjem (npr. vpetje s kolesom
        ali neposredni pogon).
    training_dummy_shape:
      name: Oblika vadbene lutke
      description: Navaja splošno zasnovo ali silhueto lutke, kar vpliva na peskov
        prijem in realističnost treninga.
    training_focus:
      name: Fokus treninga
      description: Opisuje glavno področje spretnosti, ki ga pripomoček cilja (npr.
        refleksi, delo z nogami, koordinacija oči in rok).
    training_focus_area:
      name: Področje fokusa treninga
      description: Navaja glavno spretnost pri lacrossu, za razvoj katere je pripomoček
        zasnovan.
    training_objective:
      name: Cilj treninga
      description: Navaja glavno spretnost ali tehniko, za izboljšanje katere je izdelek
        zasnovan.
    training_surface_suitability:
      name: Primernost vadbene površine
      description: Navaja, na katerih površinah se lahko trenažer uporablja.
    training_surface_usage:
      name: Uporaba vadbene površine
      description: Navaja glavne aktivnosti, ki jih vadbena površina podpira, pri
        čemer razlikuje plošče iz sintetičnega ledu, primerne za drsanje, od podlog
        za suhi trening ali večnamenskih športnih blazin.
    training_usage_type:
      name: Vrsta uporabe med navajanjem
      description: Navaja glavno predvideno obdobje ali kontekst uporabe hlačk za
        navajanje na kahljico, kot je navajanje podnevi ali čez noč.
    trampoline_enclosure_type:
      name: Vrsta ograje za trampolin
      description: Navaja konfiguracijo zaščitne ograje, uporabljene na trampolinu,
        vključno s tem, kako in kje je mreža nameščena.
    trampoline_safety_certifications:
      name: Varnostni certifikati za trampolin
      description: Označuje, s katerimi varnostnimi standardi/certifikati, pomembnimi
        za trampoline, izdelek izkazuje skladnost.
    transfer_application_method:
      name: Metoda nanašanja za preslikavo
      description: Navaja, kako se preslikava nanese na tkanino (npr. z likanjem v
        primerjavi s toplotno prešo).
    transfer_method:
      name: Način prenosa
      description: Navaja, kako je dizajn predviden za prenos na tkanino.
    transfer_peel_temperature:
      name: Temperatura odstranjevanja preslikave
      description: Navaja priporočeno temperaturno stanje (vroče, toplo ali hladno),
        pri katerem je treba po stiskanju odstraniti nosilni list.
    transmission_cooler_construction:
      name: Izdelava hladilnika menjalnika
      description: Navaja konstrukcijsko zasnovo jedra hladilnika menjalnika.
    transmission_fluid_specification:
      name: Specifikacija tekočine za menjalnik
      description: Standard OEM/specifikacij, ki jih izpolnjuje tekočina za menjalnik
        (npr. družine Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Material puše nosilca menjalnika
      description: Navaja elastomer ali izolacijski material, uporabljen v puši/izolatorju
        nosilca (element za dušenje vibracij).
    transmission_mount_type:
      name: Vrsta nosilca menjalnika
      description: Navaja konstrukcijo/zasnovo nosilca menjalnika (npr. hidravlični
        v primerjavi s fiksnim), kar pomaga določiti prileganje, NVH značilnosti in
        predvideno uporabo.
    transparency_level:
      name: Stopnja prosojnosti
      description: Opisuje, kako prosojne so stene zabojnika, kar kupcem pomaga pri
        odločitvi med jasno vidljivostjo in skritim shranjevanjem.
    transport_case_type:
      name: Vrsta transportnega kovčka
      description: Razvršča strukturni stil/togost transportne rešitve, kar odraža
        raven zaščite in metodo pakiranja.
    transposition_modes:
      name: Načini transponiranja
      description: Navaja načine transponiranja/vokalne intonacije, ki jih uglaševalec
        podpira (npr. osnovni uglaševalni ton in transponiranje tonov, kot sta B♭
        ali E♭).
    trap_design:
      name: Zasnova pasti
      description: Opredeljuje strukturni stil ali mehanizem pasti, kar določa metodo
        sprožitve ter vrste ali okolja, za katera je najbolj primerna.
    trap_spring_configuration:
      name: Konfiguracija vzmeti past
      description: Označuje število ali razporeditev vzmeti, ki poganjajo past, kar
        vpliva na moč in zakonitost.
    travel_bassinet_accessories_included:
      name: Vključeni dodatki za potovalno zibelko
      description: Navaja dodatne predmete, priložene k potovalni zibelki.
    travel_spinning_wheel_assembly_required:
      name: Zahtevano sestavljanje potovalnega kolovrata
      description: Ali kolo pred uporabo zahteva sestavljanje/pripravo, ki presega
        zgolj razpiranje (npr. namestitev krila, napenjanje, stopalke).
    travel_spinning_wheel_portability_features:
      name: Lastnosti prenosljivosti potovalnega kolovrata
      description: Zasnovni elementi, povezani s prenosljivostjo potovalnih kolovratov,
        kot so zložljiva konstrukcija in vključene transportne rešitve.
    travel_trailer_appliances_fuel_type:
      name: Vrsta goriva za aparate v bivalni prikolici
      description: Glavno gorivo, ki se uporablja za vgrajene aparate/ogrevanje/kuhanje
        (ne za vlečno vozilo).
    travel_trailer_holding_tank_type:
      name: Vrsta zadrževalnega rezervoarja bivalne prikolice
      description: Označuje, kateri zadrževalni rezervoarji so prisotni v bivalni
        prikolici (izberite vse, kar ustreza).
    travel_trailer_power_hookup_shore_power:
      name: Priključek za napajanje potovalne prikolice (kopenski priključek)
      description: Električni priključni standardi, podprti za povezave z zunanjim
        omrežjem.
    tread_pattern_type:
      name: Vrsta vzorca tekalne plasti
      description: Razvršča splošno zasnovo tekalne plasti pnevmatike, kot je gladka,
        polgladka ali profil z bodiči, kar odraža predvideni teren in lastnosti oprijema.
    treadmill_key_type:
      name: Vrsta ključa za tekalno stezo
      description: Opisuje fizični stil ali mehanizem delovanja/povezave varnostnega
        ključa (npr. magnetni okrogli, plastični vložek, na sponko).
    treadmill_part_type:
      name: Vrsta dela za tekalno stezo
      description: Opredeljuje specifično komponento tekalne steze, ki jo izdelek
        nadomešča, da lahko kupci hitro potrdijo prileganje (npr. tekalni trak v primerjavi
        z motorjem).
    treadmill_position:
      name: Položaj na tekalni stezi
      description: Označuje položaj namestitve dela na tekalni stezi (spredaj, zadaj,
        zgoraj, spodaj, na sredini).
    triangle_striker_material:
      name: Material palčke za triangel
      description: Material priložene udarne palčke (udarjala).
    trigger_input_connector:
      name: Vrsta priključka za sprožilni vhod
      description: Navaja fizični standard priključka, ki se uporablja za sprožilne
        vhode.
    trigger_input_connector_type:
      name: Vrsta priključka za sprožilni vhod
      description: Navaja vrsto fizičnega priključka, ki se uporablja za sprožilne
        vhode.
    trigger_input_zone_support:
      name: Podpora conskemu območju sprožilnega vhoda
      description: Označuje, ali sprožilni vhodi podpirajo enoconske in/ali dvoconske
        sprožilce (npr. opna/rob) ter podobne večconske izvedbe.
    trim_application_method:
      name: Metoda nanašanja obrobe
      description: Označuje, kako je obroba predvidena za pritrditev na projekt (npr.
        s šivanjem, z likanjem, z lepljenjem).
    trim_detail:
      name: Detajl obrobe
      description: Opredeljuje izstopajoče dekorativne robove ali končne obdelave
        na oblačilu (npr. obroba s čopki, resice, obroba s čipko).
    trim_elasticity:
      name: Elastičnost obrobe
      description: Označuje, ali je cik-cak obroba raztegljiva za uporabo na pletenih
        oblačilih ali športni opremi.
    trim_finish:
      name: Končni izgled obrobe
      description: Obdelava površine, nanesena na obrobo (npr. kovinska, z bleščicami,
        odsevna).
    trim_tilt_type:
      name: Vrsta sistema za nagib in dvig
      description: Ali motor podpira nastavitev nagiba/dviga in na kakšen način.
    trolleybus_power_supply_type:
      name: Vrsta napajanja trolejbusa
      description: Navaja, kako trolejbus sprejema vlečno moč iz električnega omrežja.
    truck_bed_body_type:
      name: Vrsta kesona/karoserije poltovornjaka
      description: Konfiguracija tovornega kesona ali karoserije za kabino.
    truck_bed_length_class:
      name: Razred dolžine kesona poltovornjaka
      description: Označuje razred dolžine kesona poltovornjaka, za katerega je tovorna
        mreža zasnovana (splošno znano kot kratek/standardni/dolg keson).
    truck_mounting_hole_pattern:
      name: Vzorec montažnih lukenj podvozja
      description: Navaja razporeditev lukenj, ki se uporablja za montažo podvozij
        na desko (npr. Old school, New school, Universal).
    truck_mounting_style:
      name: Stil montaže podvozja
      description: Kako so podvozja pritrjena na desko, kar vpliva na višino vožnje
        in stabilnost.
    truck_profile:
      name: Profil tovornjaka
      description: Označuje klasifikacijo višine vožnje podvozja rolke glede na desko,
        kar vpliva na odmik koles in občutek deske.
    trumpet_bell_material:
      name: Material odmevnika trobente
      description: Material, uporabljen za predel odmevnika (včasih se razlikuje od
        preostalega instrumenta).
    trumpet_leadpipe_material:
      name: Material ustnikovne cevi trobente
      description: Material ali obdelava, uporabljena za ustnikovno cev (glavno cev
        od ustnika do ventilov).
    trundle_mechanism:
      name: Mehanizem izvlečne postelje
      description: Opisuje, kako se sekundarna komponenta postelje izvleče iz glavnega
        okvirja.
    trunk_part_type:
      name: Vrsta dela za prtljažnik
      description: Navaja, katera karoserijska komponenta, povezana s prtljažnikom,
        se prodaja (npr. pokrov prtljažnika, tečaj, zapah).
    tuba_leadpipe_material:
      name: Material ustnikovne cevi tube
      description: Opredeljuje material, uporabljen za predel ustnikovne cevi tube.
    tube_base_type:
      name: Vrsta podnožja cevi
      description: Navaja družino podnožja/vtičnice cevi, ki se uporablja za fizično/električno
        prileganje (npr. Octal, Noval/9-pin).
    tube_matching_grade:
      name: Stopnja usklajenosti cevi
      description: Označuje, ali so cevi testirane/usklajene kot komplet, ter navaja
        vrsto zagotovljene usklajenosti.
    tube_weight_category:
      name: Kategorija teže cevi
      description: Razvršča cev po izdelavi/teži (npr. izjemno lahka, standardna,
        za zahtevno uporabo) za hitro primerjavo trpežnosti nasproti zmogljivosti.
    tubeless_compatible:
      name: Združljivo s sistemom brez zračnice
      description: Označuje, ali je kolo zasnovano za uporabo brez zračnice, kadar
        je kombinirano s pnevmatikami brez zračnice.
    tubing_shape:
      name: Oblika cevi
      description: Navaja obliko prečnega prereza podpornih cevi stojala.
    tubular_construction_type:
      name: Vrsta tabularne izdelave
      description: Navaja stil izdelave tubularnih kolesarskih pnevmatik, pri čemer
        razlikuje med tradicionalnimi lepljenimi tubularji in novejšimi različicami.
    tulip_type_flower_form:
      name: Vrsta tulipa
      description: Navaja hortikulturno vrsto/obliko cveta tulipanov v šopku (npr.
        enojni, dvojni, papagajski).
    tuner_input_method:
      name: Metoda vhoda uglaševalca
      description: Navaja, kako uglaševalec zazna višino tona (mikrofon, senzor vibracij/sponka,
        vhod za kabel instrumenta, kontaktni odjemnik zvoka).
    tuning_mechanism:
      name: Mehanizem uglaševanja
      description: Kako se opne bongo bobnov napenjajo/uglašujejo.
    tuning_system:
      name: Sistem uglaševanja
      description: Kako se boben v obliki peščenega kozarca uglašuje oziroma ali ga
        je sploh mogoče uglasiti.
    turn_signal_lens_color:
      name: Stil osvetlitve smernika
      description: Vizualni stil signaliziranja/animacija, ki jo zagotavlja smernik
        (npr. dinamični smernik).
    turn_signal_lighting_style:
      name: Slog osvetlitve smernikov
      description: Slog/animacija vizualne signalizacije, ki jo zagotavlja smernik.
    turnip_and_rutabaga_variety:
      name: Sorta repe in podzemne kolenice
      description: Opredeljuje specifično sorto ali kultivar repe oziroma podzemne
        kolenice.
    tweeter_crossover_type:
      name: Vrsta kretnice za visokotonski zvočnik
      description: Označuje vrsto visokoprepustne kretnice in/ali zaščitne komponente,
        ki je priložena visokotonskemu zvočniku (če je prisotna).
    tweeter_material:
      name: Material visokotonskega zvočnika
      description: Glavni material membrane/kalote visokotonskega zvočnika.
    tweeter_mount_type:
      name: Vrsta montaže visokotonskega zvočnika
      description: Navaja, kako je visokotonski zvočnik predviden za namestitev v
        vozilo (metoda montaže/okovje).
    twill_direction:
      name: Smer keper vezave
      description: Označuje smer linije keper vezave pri tkanju denima.
    twist_direction:
      name: Smer sukanja
      description: Smer sukanja niti, uporabljena pri preji/sukancu (S-sukanje ali
        Z-sukanje).
    u_joint_series_size:
      name: Serija/velikost U-zgloba
      description: Navaja serijo U-zgloba ali uporabljeni standard velikosti (npr.
        serija 1310).
    uilleann_pipes_bag_material:
      name: Material meha irskih dud
      description: Material komponente zračnega meha (če je vključen), kar vpliva
        na občutek, trpežnost in vzdrževanje.
    uilleann_pipes_handedness:
      name: Prilagojenost irskih dud za levičarje/desničarje
      description: Označuje, ali je komplet konfiguriran za postavitev igranja z desno
        ali levo roko.
    uilleann_pipes_set_configuration:
      name: Konfiguracija kompleta irskih dud
      description: Navaja, katera konfiguracija irskih dud je vključena, glede na
        prisotnost regulatorjev in dron cevi.
    uk_childrens_shoe_size:
      name: Britanska velikost otroških čevljev
      description: Navaja britansko velikost otroških čevljev, kot sta 4 ali 4 Wide.
    uk_clothing_size:
      name: Britanska velikost oblačil
      description: Navaja britansko velikost oblačil, kot sta 12 ali 18.
    uk_cup_size:
      name: Britanska velikost košarice
      description: Navaja britansko velikost košarice modrčka, kot sta C ali FF
    uk_mens_shoe_size:
      name: Britanska velikost moških čevljev
      description: Navaja britansko velikost moških čevljev, kot sta 9 ali 9 Wide.
    uk_womens_shoe_size:
      name: Britanska velikost ženskih čevljev
      description: Navaja britansko velikost ženskih čevljev, kot sta 6 ali 6 Wide.
    ukulele_back_and_sides_wood:
      name: Les za hrbtno stran in obod ukuleleja
      description: Opredeljuje les/material, uporabljen za hrbtno stran in obod ukuleleja.
    ukulele_body_cutaway:
      name: Izrez trupa ukuleleja
      description: Splošni stil/oblika trupa, uporabljena za ukulele.
    ukulele_body_shape:
      name: Oblika trupa ukuleleja
      description: Splošni stil/oblika trupa, uporabljena za ukulele.
    ukulele_bridge_material:
      name: Material mostička ukuleleja
      description: Navaja material, uporabljen za mostiček ukuleleja.
    ukulele_construction_type:
      name: Vrsta izdelave ukuleleja
      description: Kako so izdelane zgornja/hrbtna stran in obod instrumenta (masivni
        les v primerjavi z laminatom).
    ukulele_electronics_configuration:
      name: Konfiguracija elektronike ukuleleja
      description: Označuje, ali je ukulele izključno akustičen ali pa vključuje vgrajeno
        elektroniko (odjemnik zvoka in/ali predjačevalnik) za ojačitev zvoka.
    ukulele_string_re_entrant_tuning:
      name: Re-entrantno uglaševanje strun ukulelesa
      description: Ali je ukulele pripravljen z re-entrantnim uglaševanjem (visoki
        G) v primerjavi z linearnim/nizkim G; gre za običajno preferenco kupcev, ki
        vpliva na zvok.
    ukulele_top_wood:
      name: Les za zgornjo ploščo ukuleleja
      description: Opredeljuje les/material, uporabljen za zgornjo/rezonančno ploščo
        ukuleleja.
    ukulele_tuner_mechanism:
      name: Mehanizem uglaševanja za ukulele
      description: Navaja stil/mehanizem navijalcev, uporabljen na ukuleleju.
    ukulele_tuner_type:
      name: Vrsta navijalcev ukuleleja
      description: Stil mehanizma za uglaševanje, uporabljenega na glavi ukuleleja.
    ukulele_tuning:
      name: Uglaševanje ukuleleja
      description: Navaja predvideno standardno uglaševanje za žepni ukulele.
    ultralight_aircraft_wing_configuration:
      name: Konfiguracija kril ultralahkega letala
      description: Namestitev in konfiguracija glavnega krila glede na trup/strukturo
        letala.
    under_bed_features:
      name: Lastnosti predela pod posteljo
      description: Opredeljuje glavni funkcionalni element, ki se nahaja pod posteljno
        platformo.
    underfoot_strap_type:
      name: Vrsta traku za pod stopalom
      description: Opredeljuje material ali zasnovo, uporabljeno za trak, ki poteka
        pod obutvijo.
    underwear_fit:
      name: Prileganje spodnjega perila
      description: Označuje splošni profil prileganja boksaric (npr. oprijete, ohlapne,
        kompresijske).
    underwear_pieces_included:
      name: Vključeni kosi spodnjega perila
      description: Opredeljuje, kateri kosi oblačila so na voljo (zgornji del, spodnji
        del, oboje ali enodelni kombinezon), da kupci vedo, ali kupujejo celoten komplet
        ali posamezen kos.
    uniform_pieces_included:
      name: Vključeni kosi uniforme
      description: Opredeljuje, katere komponente oblačil so priložene (npr. srajca,
        hlače, brezrokavnik), s čimer pojasnjuje vsebino paketa pri količinskih nakupih
        ali nakupih kompletov.
    uniform_role:
      name: Vloga uniforme
      description: Navaja poklicno vlogo ali službo, za katero je kos uniforme predviden
        (npr. policija, šerif, reševalna služba).
    update_method:
      name: Metoda posodabljanja
      description: Kako se posodobitve strojne/programske opreme izvedejo za optični
        bralnik.
    upholstery_fabric_backing_type:
      name: Vrsta hrbtne strani blazinjenja
      description: Navaja hrbtno stran/laminacijo na tkanini za blazinjenje, kar vpliva
        na namestitev in občutek.
    upholstery_fabric_water_resistance:
      name: Vodoodpornost oblazinjenega blaga
      description: Označuje odpornost površine tkanine za blazinjenje na vodo in razlitja.
    upper_material:
      name: Vrsta vrhnjega materiala
      description: Navaja glavni material, uporabljen na zgornjem delu športnega copata,
        kar vpliva na zračnost, trpežnost in estetiko.
    upright_bass_pickup_system:
      name: Sistem odjemnika zvoka za kontrabas
      description: Označuje, ali kontrabas vključuje nameščen sistem odjemnika zvoka/predjačevalnika,
        predviden za ojačitev zvoka.
    upright_piano_power_source:
      name: Vir napajanja za pokončni klavir
      description: Kako se pokončni klavir (pianino) napaja, kar velja tako za akustične
        pianine brez napajanja kot tudi za pianine s tiho/hibridno izvedbo, ki potrebujejo
        elektriko.
    urination_device_features:
      name: Lastnosti pripomočka za uriniranje
      description: Izpostavlja posebne oblikovne značilnosti, ki izboljšujejo funkcionalnost
        ali priročnost.
    us_childrens_shoe_size:
      name: Ameriška velikost otroških čevljev
      description: Navaja ameriško velikost otroških čevljev, kot sta 5 ali 5 Wide.
    us_clothing_size:
      name: Ameriška velikost oblačil
      description: Navaja ameriško velikost oblačil, kot sta 8 ali 14
    us_cup_size:
      name: Ameriška velikost košarice
      description: Navaja ameriško velikost košarice modrčka, kot sta C ali DDD
    us_mens_shoe_size:
      name: Ameriška velikost moških čevljev
      description: Navaja ameriško velikost moških čevljev, kot sta 10 ali 10 Wide.
    us_ring_size:
      name: Ameriška velikost prstana
      description: Navaja ameriško velikost prstana, kot sta 7 ali 9.5
    us_womens_shoe_size:
      name: Ameriška velikost ženskih čevljev
      description: Navaja ameriško velikost ženskih čevljev, kot sta 8 ali 8 Wide.
    usage:
      name: Uporaba
      description: Opisuje predviden primer uporabe/nastavitev odmične gredi.
    usda_honey_grade:
      name: Razred medu USDA
      description: Označuje uradni razred Ameriškega ministrstva za kmetijstvo (USDA),
        dodeljen medu.
    user_control_method:
      name: Metoda uporabniškega upravljanja
      description: Označuje, kako uporabnik komunicira z napravo (npr. vgrajena nadzorna
        plošča, daljinski upravljalnik, aplikacija, glas), kar podaja informacije
        o enostavnosti uporabe.
    vacuum_boost_reference_port:
      name: Referenčni priključek za vakuum/pritisk
      description: Označuje, ali regulator vključuje referenčni priključek sesalnega
        kolektorja za vakuum/pritisk, ter navaja njegov stil.
    valve_base_shape:
      name: Oblika podnožja ventila
      description: Opredeljuje geometrijo stika med podnožjem ventila in platiščem
        (okroglo, stožčasto, s stranskim izhodom, v obliki črke T itd.), kar vpliva
        na tesnjenje in združljivost s penastimi vložki.
    valve_core_type:
      name: Vrsta igle ventila
      description: Označuje, ali je igla (jedro) ventila odstranljiva, fiksna ali
        brez igle, kar so informacije, ki vplivajo na postopke vzdrževanja in združljivost
        z orodji za vbrizgavanje tesnilne mase.
    valve_cover_gasket_material:
      name: Material tesnila pokrova ventilov
      description: Navaja material tesnila pokrova ventilov, ki je priložen pokrovu,
        ali priporočeni material tesnila, kadar se prodaja brez tesnila (če je to
        ustrezno).
    valve_cover_material:
      name: Material pokrova ventilov
      description: Glavni material izdelave pokrova ventilov.
    valve_design:
      name: Zasnova ventila
      description: Opredeljuje zgradbo/zasnovo motornega ventila.
    valve_guard_coverage_area:
      name: Območje pokritosti zaščite za ventile
      description: Označuje, katere dele predela z ventili zaščita varuje.
    valvetrain_configuration:
      name: Konfiguracija krmilnega mehanizma ventilov
      description: Navaja razporeditev odmične gredi/krmilnega mehanizma ventilov.
    varnish_formulation_base:
      name: Osnova recepture laka
      description: Navaja glavno recepturo/kemijsko sestavo laka za strunske instrumente,
        kar vpliva na videz, reverzibilnost in združljivost z obstoječimi premazi.
    varnish_transparency_tint:
      name: Prosojnost/pobarvanost laka
      description: Opisuje, ali je lak prosojen (brezbarven) ali toniran (pobarvan),
        in če je toniran, splošno družino barvnega odtenka.
    vegetable_matter_vm_content:
      name: Vsebnost rastlinskih primesi (VM)
      description: Količina rastlinskih ostankov/nečistoč, prisotnih v vlaknu.
    vegetable_preparation_style:
      name: Način priprave zelenjave
      description: Opisuje, kako je zelenjava predstavljena, narezana ali kako drugače
        pripravljena pred prodajo (npr. cela, narezana na kocke, cvetki).
    vehicle_audio_dsp_form_factor:
      name: Oblika avtoakustičnega DSP-ja
      description: Navaja fizični/namestitveni format enote DSP (digitalnega zvočnega
        procesorja).
    vehicle_battery_charger_features:
      name: Lastnosti polnilnika akumulatorja vozila
      description: Navaja načine delovanja in vgrajene lastnosti polnilnika akumulatorja
        vozila (npr. način vzdrževalnega polnjenja/float mode, desulfatizacija).
    vehicle_body_filler_form:
      name: Oblika avtomobilskega kita
      description: Fizična oblika/stil pakiranja izdelka za kitanje karoserije.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominalna velikost koaksialnega zvočnika za vozilo
      description: Nominalna velikost zvočnika, uporabljena pri vgradnji (npr. 6,5
        palca, 6x9 palcev).
    vehicle_cover_size_class:
      name: Razred velikosti ponjave za vozilo
      description: Splošna skupina velikosti, ki označuje, za katero velikost vozila
        je prevleka zasnovana.
    vehicle_decor_set_items_included:
      name: Vključeni predmeti v kompletu dekoracije za vozilo
      description: Navaja vrste dekorativnih predmetov, vključenih v komplet dodatkov
        (vidnost na ravni komponent za kupce).
    vehicle_door_lock_actuation_method:
      name: Metoda sproženja zaklepanja vrat vozila
      description: Označuje, kako se zaklepanje vrat vozila sproži ali upravlja.
    vehicle_door_lock_actuator_kit_contents:
      name: Vsebina kompleta sprožilca (aktuatorja) za zaklepanje vrat vozila
      description: Označuje, kaj je vključeno s sprožilcem (samo sprožilec nasproti
        okovju/palicam/nosilcem/kabelskemu snopu).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfiguracija ožičenja sprožilca za zaklepanje vrat vozila
      description: Navaja stil ožičenja, ki je potreben za namestitev.
    vehicle_door_lock_included_components:
      name: Vključene komponente ključavnice vrat vozila
      description: Navaja, katere komponente so vključene v paket (koristno za komplete/sestave).
    vehicle_electrical_connector_type:
      name: Vrsta električnega priključka vozila
      description: Navaja električni priključek regulatorja/vzbujalnega navitja alternatorja
        ali stil vtikača (razen glavnega izhodnega vijaka B+).
    vehicle_equipment_fit_out_level:
      name: Raven opremljenosti vozila
      description: Označuje raven policijske predelave/opreme, ki je vključena v kombi.
    vehicle_glass_cleaner_form:
      name: Obrazec za čiščenje stekla vozil
      description: Fizična oblika izdelka za čiščenje stekla vozil (npr. razpršilo,
        pena, robčki, gel, koncentrat).
    vehicle_hitch_cover_illumination_type:
      name: Vrsta osvetlitve pokrova vlečne kljuke vozila
      description: Navaja, ali ima pokrov vlečne kljuke osvetlitev in kakšne vrste.
    vehicle_hitch_cover_mounting_type:
      name: Vrsta montaže pokrova vlečne kljuke vozila
      description: Označuje metodo, ki se uporablja za zadrževanje/pritrditev pokrova
        vlečne kljuke v sprejemnik kljuke.
    vehicle_license_plate_finish:
      name: Končna obdelava registrske tablice vozila
      description: Površinska obdelava tablice.
    vehicle_license_plate_frame_anti_theft_design:
      name: Standard tablice za okvir registrske tablice vozila
      description: Varnostno-zasnovni elementi, namenjeni odvračanju od odstranjevanja
        ali nepooblaščenega spreminjanja.
    vehicle_license_plate_frame_plate_standard:
      name: Standard tablice za okvir registrske tablice vozila
      description: Standard/regija registrske tablice, za velikost katere je okvir
        zasnovan.
    vehicle_license_plate_frame_profile:
      name: Profil okvirja registrske tablice vozila
      description: Kako okvir obroblja tablico (pokritost/oblika), kar vpliva na čitljivost
        in skladnost s predpisi.
    vehicle_license_plate_mounting_hole_count:
      name: Število montažnih lukenj registrske tablice vozila
      description: Število montažnih lukenj na tablici.
    vehicle_license_plate_mounting_hole_pattern:
      name: Vzorec montažnih lukenj za registrsko tablico vozila
      description: Vzorec namestitve montažnih lukenj na tablici.
    vehicle_license_plate_reflectivity:
      name: Odsevnost registrske tablice vozila
      description: Ali površina tablice odseva svetlobo in na kakšen način (pomembno
        za vidnost in skladnost pri nekaterih okrasnih tablicah).
    vehicle_license_plate_size_standard:
      name: Standard velikosti registrske tablice vozila
      description: Označuje regionalni standard oziroma standard vozila, za velikost
        katerega je tablica zasnovana (razmik med montažnimi luknjami in splošne dimenzije).
    vehicle_license_plate_text_style:
      name: Stil besedila registrske tablice vozila
      description: Stil znakov na tablici (če obstajajo), vključno z izbočenimi nasproti
        natisnjenim.
    vehicle_license_plate_theme:
      name: Tematika registrske tablice vozila
      description: Splošna oblikovna tematika za grafiko na tablici.
    vehicle_lift_actuation_method:
      name: Metoda sproženja dvigala za vozila
      description: Kako se dvigalo/dvigalka napaja oziroma sproži za dvig vozila.
    vehicle_lift_mounting_type:
      name: Vrsta montaže dvigala za vozila
      description: Označuje, kako je dvigalo nameščeno ali usidrano v delovnem prostoru.
    vehicle_lift_type:
      name: Vrsta dvigala za vozila
      description: Navaja strukturni stil dvigala za vozila, ki se uporablja za servisiranje
        ali shranjevanje (npr. dvostebrno, štiristebrno, škarjasto).
    vehicle_magnet_attachment_type:
      name: Vrsta pritrditve z magnetom za vozilo
      description: Navaja glavno metodo pritrjevanja/montaže za izdelke, ki se prodajajo
        kot magneti za vozila (na primer, samo magnetni nasproti magnetnim z dodatkom
        lepila).
    vehicle_magnet_intended_use:
      name: Predvidena uporaba magneta za vozilo
      description: Vrsta nastavljanja ogledala vozila
    vehicle_mirror_adjustment_type:
      name: Vrsta nastavitve ogledala vozila
      description: Navaja, kako se ogledalo nastavlja/upravlja.
    vehicle_mirror_glass_type:
      name: Vrsta stekla ogledala vozila
      description: Navaja optično vrsto oziroma vrsto oblike steklene površine ogledala.
    vehicle_organizer_features:
      name: Lastnosti organizatorja za vozilo
      description: Ključne funkcionalne lastnosti organizatorjev za vozila, kot so
        zložljivost, vodoodporna podloga, izolirani žepi ali nedrseče podnožje.
    vehicle_paint_chemistry_base:
      name: Kemična sestava/osnova avtomobilske barve
      description: Označuje recepturo/kemično sestavo barve, uporabljeno pri avtomobilski
        barvi.
    vehicle_polish_application_method:
      name: Metoda (način) nanašanja avtomobilskega polirnega sredstva
      description: Navaja priporočeno metodo ali orodje za nanašanje avtomobilskega
        polirnega sredstva.
    vehicle_pursuit_package:
      name: Paket za zasledovanje vozila
      description: Označuje, ali je vozilo opremljeno z zmogljivostnim paketom za
        zasledovalne naloge, namenjenim policijski uporabi (na primer nadgrajeno hlajenje,
        zavore, vzmetenje in kalibracija).
    vehicle_safety_equipment_position:
      name: Položaj varnostne opreme v vozilu
      description: Navaja, kje na ali v vozilu je varnostna oprema predvidena za uporabo
        ali namestitev.
    vehicle_safety_equipment_visibility_features:
      name: Lastnosti vidnosti varnostne opreme vozila
      description: Označuje lastnosti za izboljšanje vidnosti, ki so zasnovane za
        povečanje opaznosti.
    vehicle_seat_row:
      name: Sedežna vrsta vozila
      description: Označuje, za katero zadnjo vrsto je sedež namenjen (druga vrsta
        nasproti tretji vrsti), vključno z namestitvami zadnjih pomožnih (zložljivih)
        sedežev.
    vehicle_steering_assist_type:
      name: Vrsta pomoči pri krmiljenju vozila
      description: Navaja sistem pomoči pri krmiljenju, za katerega je komponenta
        zasnovana.
    vehicle_steering_wheel_lock_form_factor:
      name: Oblika ključavnice za volan vozila
      description: Opisuje fizični stil ključavnice in kako se povezuje z volanom
        (ter izbirno z drugimi upravljalnimi elementi).
    vehicle_wax_polish_product_form:
      name: Oblika izdelka za voskanje/poliranje vozila
      description: Fizična oblika / format nanašanja voska, polirnega sredstva, zaščitnega
        premaza ali tesnilne mase.
    vehicle_wheel_valve_stem_type:
      name: Vrsta stebla ventila kolesa vozila
      description: Navaja vrsto stebla ventila, ki je podprta ali vključena.
    vehicle_windshield_fluid_formula:
      name: Formula tekočine za vetrobransko steklo vozila
      description: Glavni fokus čiščenja/odstranjevanja recepture tekočine za vetrobransko
        steklo (npr. proti zmrzovanju, za odstranjevanje žuželk).
    veil_length_type:
      name: Vrsta dolžine tančice
      description: Razvršča tančico z uporabo standardne terminologije za dolžino
        namesto številčnih meritev.
    vellum_opacity_level:
      name: Stopnja motnosti pergamenta
      description: Označuje, kako prosojen ali moten je list pergamenta.
    ventilation_configuration:
      name: Konfiguracija prezračevanja
      description: Primarna konfiguracija prezračevanja / dovoda in odvoda zraka na
        čeladi.
    ventilation_control_type:
      name: Vrsta nadzora prezračevanja
      description: Navaja stil upravljanja pretoka zraka, vgrajen v čelado.
    ventilation_level:
      name: Raven prezračevanja
      description: Označuje relativno zasnovo pretoka zraka/prezračevanja ščitnika.
    venting_design:
      name: Zasnova prezračevanja
      description: Navaja, ali je pokrivalo prezračevano in na kakšen način, da se
        zmanjša nastajanje kondenza in plesni med shranjevanjem.
    vestibule_type:
      name: Vrsta predprostora
      description: Razvršča razporeditev predprostora glede na šotor.
    vibraphone_bar_material:
      name: Material ploščic vibrafona
      description: Material zvočnih ploščic/tipk vibrafona (ploščic, ki proizvajajo
        zvok).
    vibraphone_motor_type:
      name: Vrsta motorja za vibrafon
      description: Vrsta motorja, ki se uporablja za pogon vrtečih se ventilatorjev
        resonatorja za učinek vibrata (če je nameščen).
    vibraphone_range_octaves:
      name: Razpon vibrafona (v oktavah)
      description: Razpon tonov vibrafona, izražen v oktavah (npr. 3 oktave, 3,5 oktave).
    vibraphone_resonator_tube_material:
      name: Material resonančnih cevi vibrafona
      description: Material resonančnih cevi vibrafona pod ploščicami
    vibraphone_tuning_standard:
      name: Standard uglaševanja vibrafona
      description: Referenčna višina tona, ki se uporablja za uglaševanje (A=440 Hz
        itd.).
    viewing_sides:
      name: Prikazovalne strani
      description: Navaja, koliko ploskev semaforja prikazuje informacije (enostranski,
        dvostranski, štiristranski itd.).
    vintage_advertisement_decade:
      name: Desetletje starinskih oglasov
      description: 'Navaja desetletje, v katerem je bil oglas prvotno natisnjen ali
        izdelan (približno: če natančno leto ni znano).'
    vintage_advertisement_format:
      name: Format starinskega (vintage) oglasa
      description: Navaja fizični format ali medij zbirateljskega starinskega oglasa.
    vintage_advertisement_subject_category:
      name: Kategorija tematike starinskega oglasa
      description: Opredeljuje kategorijo izdelka/storitve, ki se oglašuje (čemu je
        oglas namenjen).
    vintage_classic_truck_cab_type:
      name: Vrsta kabine starinskih in klasičnih tovorna vozila
      description: Konfiguracija kabine/stil karoserije potniškega prostora tovornjaka.
    virginia_tech_helmet_star_rating:
      name: Ocena z zvezdicami za čelado po Virginia Tech
      description: Varnostna ocena, ki jo dodeli laboratorij za čelade Virginia Tech
        (0-5 zvezdic).
    virtual_analog_synthesizer_form_factor:
      name: Oblika virtualnega analognega sintesajzerja
      description: Navaja fizični format ohišja sintesajzerja (klaviaturav primerjavi
        z modulom).
    viscosity_thickness:
      name: Viskoznost/gostota
      description: Opisuje, kako gosta ali tekoča je premazna masa v prodaji ali pri
        priporočeni delovni konsistenci.
    vise_configuration:
      name: Konfiguracija primeža
      description: Opisuje, kako gosta ali tekoča je livna glina v prodaji ali pri
        priporočeni delovni konsistenci.
    visibility_features:
      name: Lastnosti vidnosti
      description: Navaja strukturno razporeditev ali število kosov v kompletu primeža,
        kar vpliva na prenosljivost in zahtevnost montaže.
    visor_brim_type:
      name: Vrsta vizirja/senčnika
      description: Označuje prisotnost in stil vizirja ali senčnika na čeladi
    visor_configuration:
      name: Konfiguracija vizirja
      description: Opisuje prisotnost in stil katerega koli vgrajenega vizirja ali
        zaščitnega vizirja za obraz.
    visor_lens_finish:
      name: Končna obdelava leče vizirja
      description: Navaja odtenek (zatemnitev), optično obdelavo ali grafični stil,
        nanesen na lečo vizirja.
    visor_style:
      name: Stil vizirja
      description: Označuje, ali kapuca vključuje ščitnik/senčnik, ter navaja njeno
        konfiguracijo.
    voc_compliance_standard:
      name: Standard za skladnost z emisijami hlapnih organskih spojin (VOC)
      description: Regulativna izjava o skladnosti izdelka glede hlapnih organskih
        spojin (VOC) (kjer je to ustrezno).
    voc_regulatory_class:
      name: Regulativni razred glede hlapnih organskih spojin (VOC)
      description: Deklarirani regulativni/skladnostni razred glede hlapnih organskih
        spojin (VOC) za izdelek (glede na etiketo/varnostni list), ki se uporablja
        za regionalne regulativne in okoljske omejitve.
    vodka_base_ingredient:
      name: Osnovna sestavina vodke
      description: Glavna kmetijska sestavina, iz katere je vodka destilirana (npr.
        pšenica, krompir, koruza).
    voice_coil_configuration:
      name: Konfiguracija glasovne tuljave
      description: Število/razporeditev glasovnih tuljav za prilagodljivost ožičenja
        in možnosti impedance.
    voice_effects:
      name: Glasovni učinki
      description: Vrste vgrajenih vokalnih učinkov, ki jih podpira karaoke komplet.
    voltage_rating_type:
      name: Vrsta nazivne napetosti
      description: Navaja, ali velja nazivna napetost varovalke za izmenični tok (AC),
        enosmerni tok (DC) ali oboje.
    voltage_regulator_connector_type:
      name: Vrsta priključka regulatorja napetosti
      description: Navaja, ali imajo ribiške hlače integrirane škornje ali ločene
        neoprenske nogavice.
    wader_foot_type:
      name: Vrsta stopala ribiških hlač
      description: Določa, ali imajo škornji integrirane škornje ali ločene nogavice.
    wader_sole_type:
      name: Vrsta podplata za vodne čevlje
      description: Navaja material zunanjega podplata ali vrsto oprijema, ki se uporablja
        na ribiških škornjih ali hlačah z integriranimi škornji.
    waistband_style:
      name: Slog pasu
      description: Opisuje zgradbo pasu ter kako se zapenja ali prilagaja za prileganje
        in udobje.
    wakeboard_binding_mounting_pattern:
      name: Vzorec montaže vezi za wakeboard
      description: Navaja vzorec vložkov/plošče na wakeboardu, s katerim so vezi združljive.
    wakeboard_riding_style:
      name: Stil vožnje z wakeboardom
      description: Razvršča predvideno okolje ali stil uporabe wakeboarda.
    wall_decal_style:
      name: Stil stenske nalepke
      description: Navaja, kako je nalepka izdelana/nanesena (npr. izrezana, preslikava,
        list z nalepkami).
    wallyball_equipment_included:
      name: Vključena oprema za odbojko v dvorani
      description: Navaja specifične kose, priložene v kompletu za wallyball, da kupci
        natančno vedo, kaj kupujejo, in lahko primerjajo pakete.
    warp_beam_type:
      name: Vrsta osnovnega vratila
      description: Navaja vključeno ali nameščeno konfiguracijo osnovnega vratila
        statev (priprava vratila, priložena k statvam).
    washability:
      name: Pralnost
      description: Označuje, ali se lepilo čisti z vodo in/ali je pralno po nanosu.
    watch_band_design:
      name: Zasnova paščka za uro
      description: Opisuje stil izdelave ali oblikovni vzorec paščka za uro (npr.
        NATO, milanski pašček, pašček s členki).
    watch_movement:
      name: Mehanizem ure
      description: Navaja mehanizem, ki poganja uro, kar je ključni dejavnik, ki ga
        kupci uporabljajo za razlikovanje med modeli.
    water_activation:
      name: Aktivacija z vodo
      description: Ali se radijska boja lahko samodejno aktivira ob potopitvi v vodo
        (običajno za EPIRB naprave kategorije I/II).
    water_chamber_configuration:
      name: Konfiguracija vodne komore
      description: Opisuje razporeditev notranjega mehurja vzmetnice, kot je enojna
        ali dvojna komora, kar vpliva na podporo, nadzor temperature in motenje partnerja.
    water_dispensing_mechanism:
      name: Mehanizem za točenje vode
      description: Določa, kako se voda sprošča iz enote, na primer prek pip, razpršilnih
        šob ali gravitacijskega izlivanja.
    water_exposure_protection_level:
      name: Stopnja zaščite pred izpostavljenostjo vodi
      description: Označuje raven zaščite izdelka, ko je izpostavljen vodi (npr. brizganje
        tekočine nasproti začasni potopitvi). Uporabite stopnjo zaščite pred vdorom
        (IP rating), ko je na voljo uradna koda IP.
    water_fed_design:
      name: Zasnova s pretokom vode
      description: Označuje, ali je krtača zasnovana za uporabo s tekočo vodo prek
        pretočnega ročaja ali priključka za cev.
    water_gun_features:
      name: Lastnosti vodne pištole
      description: Izstopajoče funkcionalne lastnosti in vključene zmogljivosti vodne
        pištole.
    water_gun_operating_mechanism:
      name: Mehanizem delovanja vodne pištole
      description: Kako vodna pištola med uporabo vzpostavi pritisk in izbrizga vodo.
    water_gun_spray_pattern:
      name: Vzorec pršenja vodne pištole
      description: Vrsta vodnega curka, ki ga šoba ustvari med streljanjem.
    water_heating_method:
      name: Metoda ogrevanja vode
      description: Opisuje, kako oziroma ali se voda pred uporabo segreje — na primer
        s sončno absorpcijo, propanskimi gorilniki, električnimi grelci, baterijskim
        ogrevanjem, izolacijo za zadrževanje toplote ali pa se sploh ne segreva.
    water_mattress_construction:
      name: Izdelava vodne postelje
      description: Navaja stil izdelave vodne vzmetnice (npr. s trdim ali mehkim robom),
        kar določa združljivost z okvirjem in splošni občutek.
    water_play_features:
      name: Lastnosti vodne igre
      description: Komponente za vodne aktivnosti, vključene v vodni park/vodni tobogan.
    water_polo_competition_approval:
      name: Odobritev žoge za tekmovanja v vaterpolu
      description: Določa vodstveni organ ali raven tekmovanja, za katero je žoga
        uradno odobrena ali certificirana.
    water_polo_goal_type:
      name: Vrsta gola za vaterpolo
      description: Razvršča strukturno ali montažno konfiguracijo gola (npr. plavajoči,
        montaža na rob bazena, prenosni).
    water_pump_drive_type:
      name: Vrsta pogona vodne črpalke
      description: Navaja, kako je vodna črpalka gnana/sprožena v hladilnem sistemu
        vozila
    water_pump_housing_material:
      name: Material ohišja vodne črpalke
      description: Material ohišja/telesa vodne črpalke.
    water_pump_impeller_material:
      name: Material tekača vodne črpalke
      description: Navaja material tekača vodne črpalke (notranjega rotorja/lopatice,
        ki premika hladilno tekočino).
    water_pump_mounting_type:
      name: Vrsta pritrditve vodne črpalke
      description: Določa način montaže/oblike vodne črpalke za vgradnjo v motor (npr.
        ohišje z vijaki v primerjavi s kartušo/vložkom).
    water_purification_method:
      name: Metoda čiščenja vode
      description: Opredeljuje glavni mehanizem, s katerim izdelek poskrbi, da je
        voda varna za pitje na terenu (npr. črpalka v primerjavi z gravitacijskim
        dotočnim sistemom v primerjavi z UV-svetlobo).
    water_resistance:
      name: Vodoodpornost
      description: Sporoča stopnjo zagotovljene vremenske zaščite, kot je vodoodporno
        ali vodoodbojno.
    water_resistance_level:
      name: Stopnja vodoodpornosti
      description: Označuje, ali tekstil odbija vodo in do katere stopnje.
    water_resistance_rating_case_protection_level:
      name: Ocena vodoodpornosti (stopnja zaščite kovčka)
      description: Označuje raven vodoodpornosti/zaščite, ki jo zagotavlja potovalni
        kovček s kolesi (tržna raven, ne IP-tesnjenje elektronike), npr. vodoodbojno
        v primerjavi z nevodoodbojnim.
    water_rocket_kit_items_included:
      name: Vključeni predmeti v kompletu vodne rakete
      description: Glavne vključene komponente v paketu izdelka.
    water_rocket_propulsion_type:
      name: Vrsta pogona vodne rakete
      description: Glavni pogon/vir energije, ki se uporablja za izstrelitev rakete.
    water_rocket_recovery_system:
      name: Sistem za reševanje vodnih raket
      description: Metoda, ki se uporablja za reševanje rakete po izstrelitvi.
    water_ski_base_design:
      name: Zasnova drsne ploskve vodne smučke
      description: Navaja spodnji profil trupa vodnih smuči, kar vpliva na lastnosti
        upravljanja.
    water_ski_fin_type:
      name: Vrsta smernika vodne smučke
      description: Navaja konfiguracijo smernika vodne smučke, kar vpliva na smerno
        stabilnost in manevriranje.
    water_source:
      name: Vir vode
      description: Opredeljuje vir vode pred karbonizacijo.
    water_sports_safety_standard:
      name: Varnostni standard za vodne športe
      description: Navaja uradne varnostne standarde ali standarde plovnosti, ki jih
        izdelek izpolnjuje (npr. CE EN 1385 za čelade, ISO 12402-5 za pripomočke za
        plovnost, USCG tip III).
    water_table_feature_set:
      name: Nabor lastnosti mize za igro z vodo
      description: Izpostavlja vgrajene igralne lastnosti vodne mize, kot so slapovi,
        razpršilci, črpalke ali večnivojska korita.
    water_table_items_included:
      name: Vključeni predmeti v kompletu vodne mize
      description: Navaja, kateri dodatki so priloženi kompletu vodne mize (npr. čolnički,
        skodelice, lijaki, figurice).
    water_table_water_source_type:
      name: Vrsta vira vode za vodno mizo
      description: Navaja, kako se vodna miza polni ali oskrbuje z vodo.
    waterbed_stabilization_level:
      name: Raven stabilizacije vodne postelje
      description: Označuje stopnjo zmanjšanja valovanja ali nadzora gibanja, ki jo
        zagotavlja vzmetnica vodne postelje.
    watercolor_ink_water_resistance_after_drying:
      name: Vodoodpornost akvarelnega črnila (po sušenju)
      description: Označuje, ali akvarelno črnilo po sušenju postane vodoodporno/vodoodbojno
        (glede na trditve proizvajalca).
    watercraft_care_application_area:
      name: Področje uporabe sredstva za nego plovil
      description: Označuje glavno področje ali komponento plovila, za katero je izdelek
        predviden za uporabo.
    watercraft_drive_mechanism:
      name: Pogonski mehanizem plovila
      description: Opisuje specifični vgrajeni pogonski mehanizem, ki je nameščen
        ali podprt.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Vzorec senzorja nivoja goriva (plovca) rezervoarja plovila
      description: Navaja montažni vzorec/standard za senzorje nivoja goriva v rezervoarju
        in združljive merilnike (npr. običajni navtični vzorci vijakov).
    watercraft_fuel_tank_shape:
      name: Oblika rezervoarja za gorivo plovila
      description: Opisuje splošno fizično obliko rezervoarja za gorivo za pomoč při
        načrtovanju prostora/prileganja.
    watercraft_hull_material:
      name: Material trupa plovila
      description: Navaja glavni material izdelave trupa.
    watercraft_ignition_part_voltage:
      name: Napetost vžigalnega dela plovila
      description: Nominalna ocena/zahteva glede napetosti za vžigalni del (kadar
        je to ustrezno), kot so 12-voltni sistemi.
    watercraft_impeller_material_grade:
      name: Razred materiala tekača plovila
      description: Navaja material tekača plovila (npr. neoprenska guma, nitril, bron).
    watercraft_lighting_certification_compliance:
      name: Certifikacija/skladnost razsvetljave plovila
      description: Označuje regulativno skladnost oziroma skladnost s standardi, za
        katero je luč certificirana za pomorsko uporabo (npr. skladnost z USCG/ABYC/COLREGs)
    watercraft_motor_mount_adjustment_features:
      name: Lastnosti nastavljanja nosilca motorja plovila
      description: Zmogljivosti nastavljanja nosilca (npr. nagib, dvig, pomik), kar
        vpliva na uporabnost in prileganje.
    watercraft_piston_part_type:
      name: Vrsta batnega dela za plovilo
      description: Opredeljuje, katero komponento, povezano z batom, predstavlja ponudba.
    watercraft_propeller_blade_rake:
      name: Nagib rezila propelerja plovila
      description: Navaja nagib rezila (kot rezila glede na pesto), kar vpliva na
        dvig premca in zmogljivost.
    watercraft_propeller_rotation_direction:
      name: Smer vrtenja propelerja plovila
      description: Označuje zahtevano smer vrtenja propelerja/prilagojenost za desno
        ali levo stran za združljivost s pogonskim sklopom (npr. desnosučno/standardno
        v primerjavi z levosučnim/nasprotno vrtečim).
    watercraft_pump_stage_impeller_role:
      name: Stopnja črpalke/vloga tekača plovila
      description: Opredeljuje, ali je tekač predviden za specifično vlogo črpalke
        (npr. črpalka za surovo/morsko vodo, kroženje hladilne tekočine, jet črpalka).
    watercraft_registration_status:
      name: Status registracije plovila
      description: Označuje, ali jadrnica vključuje lastniški list in/ali dokumentacijo
        o registraciji.
    watercraft_safety_equipment_activation_type:
      name: Vrsta aktivacije varnostne opreme plovila
      description: Glavna metoda aktiviranja varnostne naprave (za radijske boje,
        MOB alarme za človeka v morju ali osebne lokatorje PLB), ki se razlikuje od
        napihovanja.
    watercraft_steering_cable_core_material:
      name: Material jedra krmilnega kabla plovila
      description: Navaja material notranjega kabla/jedra, ki prenaša silo.
    watercraft_steering_cable_hardware_included:
      name: Priložena strojna oprema za krmilni kabel plovila
      description: Navaja, katero montažno okovje in dodatki so priloženi k krmilnemu
        kablu.
    watercraft_steering_cable_system_type:
      name: Vrsta sistema krmilnega kabla za plovilo
      description: Navaja arhitekturo krmilnega sistema, za katero je kabel zasnovan
        (npr. rotacijski sistem, zobata letev).
    watercraft_steering_wheel_hub_bore_type:
      name: Vrsta pesta/vrtine krmila plovila
      description: Navaja stil vmesnika osrednje montaže/vrtine (npr. stožčast, utorjen),
        kjer se krmilo spoji s pestom ali adapterjem.
    watercress_variety:
      name: Sorta vodne kreše
      description: Opredeljuje specifično sorto ali vrsto kreše, ki se prodaja.
    waterproof_level:
      name: Raven vodoodpornosti
      description: Označuje raven zaščite obutve pred vodo, vključno z morebitnimi
        garancijskimi trditvami o vodoodpornosti.
    wax_blend_composition:
      name: Sestava mešanice voska
      description: Navaja voskaste materiale, zmešane v izdelku, in/ali vrsto mešanice
        na trgu.
    wax_coat_type:
      name: Vrsta sloja voska
      description: Označuje, ali je vosek predviden kot osnovni premaz, vrhnji premaz
        ali kot večnamenska formula/formula za enoslojni nanos.
    wax_hardness:
      name: Trdota voska
      description: Označuje relativno trdoto voska, kar vpliva na obstojnost in drsenje
        na različnih vrstah snega.
    wax_physical_form:
      name: Fizična oblika voska
      description: Označuje fizično obliko/format, v katerem je dobavljen surovi vosek
        za sveče.
    wax_recommended_candle_application:
      name: Priporočena uporaba voska za sveče
      description: Označuje glavni stil (ali stile) sveč, za katere je vosek zasnovan.
    wax_tackiness_level:
      name: Raven lepljivosti voska
      description: Opisuje stopnjo lepljivosti/oprijema, ki jo vosek zagotavlja na
        rezilu.
    weapon_system_integration:
      name: Integracija orožnega sistema
      description: Označuje, ali vozilo vključuje integrirane orožne sisteme ali nosilce.
    weather_suitability:
      name: Vremenska primernost
      description: Označuje okoljsko stanje, za katero so rokavice zasnovane, na primer
        igranje v hladnem ali mokrem vremenu.
    weave_finish:
      name: Vezava/končni izgled
      description: Opisuje glavno vezavo tkanine ali površinsko obdelavo, ki vpliva
        na teksturo in lesk kravate.
    weave_style:
      name: Stil tkanja
      description: Navaja tradicionalni vzorec tkanja, uporabljen pri izdelavi panamskega
        klobuka, kar vpliva na zračnost, prožnost, videz in ceno.
    weave_type:
      name: Vrsta vezave
      description: Opredeljuje stil vezave/zgradbe tkanine (trgovsko ime vezave),
        kar vpliva na teksturo, lesk in padanje tkanine.
    weaving_beater_edge_type:
      name: Vrsta roba tkalnega stroja
      description: Opisuje profil delovnega roba tkalnega stroja, ki prihaja v stik
        z votkom (npr. raven ali nazobčan).
    weaving_beater_style:
      name: Stil grebena za potiskanje votka
      description: Opredeljuje funkcionalni stil/format tkalnega stroja.
    weaving_shuttle_tip_style:
      name: Stil konice tkalnega čolnička
      description: Navaja zasnovo prednje konice/nosa čolnička, kar vpliva na to,
        kako prehaja skozi tkačni zij, in na verjetnost, da se zatakne za osnovne
        niti.
    weaving_shuttle_use_case:
      name: Primer uporabe tkačnega čolnička
      description: Navaja predvideni namen tkanja, za katerega je čolniček zasnovan
        ali optimiziran.
    webbing_construction_type:
      name: Vrsta izdelave gurtne
      description: Opisuje fizični stil tkanja ali pletenja gurtne, kar vpliva na
        rokovanje, moč in predvideno uporabo.
    webbing_design:
      name: Zasnova plavalne mrene
      description: Opisuje stil mrene med prsti (na plavalnih rokavicah), kar vpliva
        na vadbo z uporom in potisk.
    weight_adjustability:
      name: Nastavljivost teže
      description: Opisuje, ali uporabnik lahko spreminja upor izdelka (npr. z izbirnikom
        ali z dodajanjem uteži) ali pa je fiksiran na eno težo.
    weight_integration_system:
      name: Sistem integracije uteži
      description: Opisuje, ali so balastne uteži integrirane v kompenzator plovnosti
        (BCD) in na kakšen način (npr. snemljivi žepi za uteži, brez njih, izbiren
        dodatek).
    weight_plate_compatibility:
      name: Združljivost s koluti za uteži
      description: Določa, kateri premer kolutov za uteži naprava sprejema (olimpijski,
        standardni ali oboje).
    weight_plate_style:
      name: Slog koluta za uteži
      description: Razvršča zasnovo/vrsto koluta za uteži (npr. olimpijski, odbojni/bumper,
        z izbirnikom) za hitro filtriranje združljivosti.
    weightlifting_belt_style:
      name: Stil pasu za dvigovanje uteži
      description: Razvršča splošno zasnovo ali namensko konfiguracijo pasu (npr.
        pas s vzvodom, pas za obtežitev/dip belt, zožan pas).
    weightlifting_federation_certification:
      name: Certifikat zveze za dvigovanje uteži
      description: Uradna odobritev ali skladnost izdelka s straní zvez za porte za
        moč, kot sta IPF ali IWF.
    wetsuit_boot_height:
      name: Višina neoprenskega čevlja
      description: Razvršča višino/kroj čevlja na nogi, kar vpliva na pokritost, mobilnost
        in vdor vode.
    wetsuit_entry_system:
      name: Sistem oblačenja neoprenske obleke
      description: Opisuje vrsto in položaj odprtine/sistema zadrge, ki se uporablja
        za oblačenje neoprenske obleke.
    wetsuit_seam_construction:
      name: Zgradba šivov neoprenske obleke
      description: Navaja, kako so šivi izdelani in zatesnjeni, kar vpliva na toploto,
        prožnost in trpežnost.
    wheat_product_form:
      name: Oblika pšeničnega izdelka
      description: Navaja fizično ali predelano obliko pšeničnega izdelka.
    wheel_arrangement:
      name: Razporeditev koles
      description: Navaja razporeditev koles parne lokomotive (Whyteova notacija),
        kar je ključna lastnost in pogost zbirateljski oziroma iskalni izraz.
    wheel_brake_type:
      name: Vrsta zavore kolesa
      description: Podrobno opisuje konfiguracijo zaviranja na kolesih ali kolescih
        vozička.
    wheel_chock_grip_features:
      name: Lastnosti oprijema zagozde za kolesa
      description: Zasnovne lastnosti za oprijem in trenje, ki izboljšujejo zadrževalno
        moč na površinah in ob pnevmatikah.
    wheel_cleaner_acidity_ph_category:
      name: Kislost/pH kategorija čistila za platišča (kolesa)
      description: Označuje, ali je čistilo za platišča kislo, nevtralno ali alkalno
        (ter izbirno, ali se trži kot pH-nevtralno).
    wheel_cleaner_formula_type:
      name: Vrsta formule čistila za platišča
      description: Za čistila za platišča in sorodne čistilne raztopine označuje glavno
        kategorijo formule izdelka (npr. na osnovi kisline, brez kisline, pH-nevtralna/uravnotežena
        ali reakcijska na železo).
    wheel_construction_type:
      name: Vrsta izdelave kolesa
      description: Navaja metodo proizvodnje/izdelave platišča.
    wheel_contaminant_target:
      name: Ciljna nečistoča čistila za platišča
      description: Navaja glavne vrste nečistoč, za odstranjevanje katerih je čistilo
        zasnovano.
    wheel_core_type:
      name: Vrsta jedra kolesa
      description: Opisuje stil izdelave jedra kolesa, kar vpliva na težo, togost
        in prenos energije.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standard navoja vhodne odprtine zavornega valja kolesa
      description: Navaja standard navoja vhodne odprtine zavorne cevi na zavornem
        valju kolesa (npr. metrični rob v primerjavi s SAE obrnjenim robom).
    wheel_fastener_seat_type:
      name: Vrsta naseda pritrdilnega elementa kolesa
      description: Navaja stil naseda kolesne matice/vijaka, ki se ujema s kolesom
        (npr. stožčast/končni, kroglični/radijski, raven, mag/s steblom).
    wheel_illumination:
      name: Osvetlitev kolesa
      description: Označuje, ali ima kolo vgrajeno osvetlitev ali funkcije svetenja.
    wheel_material:
      name: Material kolesa
      description: Opredeljuje glavno sestavo koles, kar vpliva na trpežnost, oprijem
        in dušenje vibracij.
    wheel_profile:
      name: Profil kolesa
      description: Opisuje obliko prečnega prereza kolesa, ki vpliva na hitrost, oprijem
        in okretnost.
    wheel_setup_type:
      name: Vrsta postavitve koles
      description: Določa stil konfiguracije koles, uporabljen na drsalkah/rolerjih.
    wheel_system_finish:
      name: Končna obdelava kolesnega sistema
      description: Površinska obdelava/premaz platišč/koles in določenih kolesnih
        delov/dodatkov.
    whip_style:
      name: Slog biča
      description: Razvršča izdelek po njegovem specifičnem konjeniškem stilu biča
        ali jahalne palice oziroma predvideni disciplini.
    whipped_cream_base:
      name: Osnova za stepeno smetano
      description: Opredeljuje glavno osnovno sestavino, uporabljeno za izdelavo stepene
        smetane, kot je mlečna smetana ali kokos.
    whipped_cream_form:
      name: Oblika stepene smetane
      description: Označuje fizično obliko, v kateri se stepena smetana prodaja (npr.
        v razpršilu, tekoča).
    whistle_head_material:
      name: Material glave piščali
      description: Navaja material glave/ustnika piščali (ustničnega bloka/glave).
    whistle_light_features:
      name: Svetlobne lastnosti piščalke
      description: Označuje, ali piščalka vključuje integrirane svetlobne učinke za
        zabave (npr. LED).
    whistle_purpose:
      name: Namen piščalke
      description: Opredeljuje glavni predvideni namen uporabe piščalke (športno treniranje,
        pomorska varnost, šolanje psov itd.).
    whistle_sound_style:
      name: Zvočni stil piščalke
      description: Opisuje stil/značaj izhoda zvoka piščalke (npr. enotonski nasproti
        večtonskemu).
    white_glue_finish_appearance_when_dry:
      name: Končni izgled/videz belega lepila, ko se posuši
      description: Navaja, kako je lepilo videti po sušenju pri uporabi za ustvarjanje/pisarno
        (npr. prozorno nasproti motnemu).
    white_glue_washability:
      name: Pralnost belega lepila
      description: Označuje, ali se posušeno lepilo lahko izpere/očisti s tkanin ali
        kože.
    whitewater_kayak_style:
      name: Stil kajaka za divje vode
      description: Glavni oblikovalski namen znotraj segmenta divjih voda (npr. Creekboat,
        River Runner, Playboat).
    whitewater_rating_class:
      name: Ocena divje vode (razred)
      description: Najvišji razred po mednarodni lestvici zahtevnosti rek, ki ga je
        splav sposoben obvladati.
    whorl_mounting_interface:
      name: Vmesnik za montažo vztrajnika
      description: Kako se vretence pritrdi na kolovrat (stil gredi/povezava).
    wick_construction_type:
      name: Vrsta izdelave stenja
      description: Zgradba/stil stenja (pleten, ploščat, kvadratno pleten, z jedrom,
        lesen itd.).
    wick_core_type:
      name: Vrsta jedra stenja
      description: Ali je stenj brez jedra ali vključuje material jedra (npr. s papirnatim
        ali cinkovim jedrom), kar vpliva na togost in lastnosti gorenja.
    wick_tab_crimp_type:
      name: Vrsta stiskanja podstavka za stenj
      description: Kako podstavek za stenj varuje stenj (stil izdelave/stiskanja).
    wick_tab_material:
      name: Material podstavka
      description: Material priloženega podstavka/držala (običajno bele pločevine),
        kar je pomembno za odpornost proti koroziji in regulativne preference (npr.
        izogibanje svincu).
    wick_tab_shape:
      name: Oblika podstavka za stenj
      description: Oblika ploščice podstavka za stenj.
    wick_type_included:
      name: Vključena vrsta stenja
      description: Navaja material/vrsto stenja, ki je vključen v komplet.
    wig_fiber_material:
      name: Material vlaken lasulje
      description: Opredeljuje glavno vlakno, uporabljeno za lase lasulje, da lahko
        kupci enostavno izbirajo med različicami iz pravih človeških las in sintetičnimi
        možnostmi z različnimi lastnostmi oblikovanja in obstojnosti.
    wildlife_attractant_scent:
      name: Vonj vabe za divjad
      description: Opredeljuje glavni vonj, ki se uporablja za privabljanje divjadi,
        kar zajema naravne vonjave hrane in vonjave na bazi feromonov.
    willow_grade:
      name: Razred vrbovega lesa
      description: Navaja razred kakovosti uporabljene vrbe (vrbovega lesa), kar označuje
        strukturo letnic in splošno raven zmogljivosti.
    willow_type:
      name: Vrsta vrbovega lesa
      description: Opredeljuje vrsto vrbe ali alternativnega materiala, uporabljenega
        za lopatko (ploskev) palice, kar močno vpliva na zmogljivost, trpežnost in
        ceno.
    wind_up_mechanism_type:
      name: Vrsta mehanizma na navijanje
      description: Navaja, kako se igrača navije ali aktivira.
    wind_up_toy_movement_pattern:
      name: Vzorec gibanja igrače na navijanje
      description: Opisuje glavno gibanje, ki nastane, ko se igrača navije.
    windbreak_purpose:
      name: Namen vetrobrana
      description: Določa glavni predvideni primer uporabe vetrobrana.
    windfoil_board_mounting_system:
      name: Sistem za pritrditev vetrobranske folije
      description: Določa folijsko škatlo ali montažni vmesnik, vgrajen v vetrobransko
        folijo.
    windfoil_sail_style:
      name: Slog jadra z vetrnim profilom
      description: Razvršča jadro glede na predvideni slog ali disciplino jadranja.
    winding_direction:
      name: Smer navijanja
      description: Označuje vzorec vrtenja, ki ga podpira navijalec ure (v smeri urinega
        kazalca, v nasprotni smeri urinega kazalca ali dvosmerno).
    winding_method:
      name: Metoda navijanja
      description: Kako je votek predviden za navijanje/nameščanje za uporabo v čolničku.
    winding_speed_control_type:
      name: Vrsta nadzora hitrosti navijanja
      description: Označuje metodo, ki se uporablja za nadzor hitrosti navijanja med
        uporabo.
    winding_type:
      name: Vrsta navijanja
      description: Navaja zgradbo navitja basovskih strun (profil zunanjega ovoja).
    windlass_control_station_type:
      name: Vrsta nadzorne postaje sidrnega vitla
      description: Vrsta krmilnega vmesnika, ki je vključen ali podprt za upravljanje
        vitla.
    windlass_mount_type:
      name: Vrsta montaže sidrnega vitla
      description: Kje/kako je predvidena namestitev vitla na plovilo.
    window_component_location:
      name: Lokacija komponente okna
      description: Navaja, za katero okno/odprtino v vozilu velja del (npr. vetrobransko
        steklo v primerjavi s steklom na vratih v primerjavi z zadnjim oknom v primerjavi
        z bočnim/kotnim steklom).
    window_configuration:
      name: Konfiguracija oken
      description: Označuje prisotnost in relativno velikost prozornih oken za vidljivost
        na profilu krila.
    window_glass_construction:
      name: Zgradba okenskega stekla
      description: Navaja varnostno/laminacijsko zgradbo okenskega stekla motornega
        vozila.
    window_glass_features:
      name: Značilnosti okenskega stekla
      description: Označuje, ali steklo podpira integrirane tehnologije vozila (npr.
        podlogo za senzor za dež, nosilec za kamero).
    window_glass_finish:
      name: Končna obdelava okenskega stekla
      description: Navaja končno obdelavo/zatemnitev/zaščito zasebnosti okenskega
        stekla motornega vozila.
    window_glass_tint_color:
      name: Barva zatemnitve okenskega stekla
      description: Navaja barvni odtenek zatemnitve, prisotne v steklu (ne splošne
        barve izdelka).
    window_glass_tint_level:
      name: Stopnja zatemnitve okenskega stekla
      description: Označuje približno temnost tovarniške zatemnitve/zatemnitve za
        zasebnost okenskega stekla (ne naknadno nameščene folije). Uporabite opisne
        ravni, kadar natančna vrednost VLT (prepustnost svetlobe) ni znana.
    window_net_latch_mechanism:
      name: Zapahnitveni mehanizem zaščitne mreže za okno
      description: Navaja mehanizem za zapahnitev/sprostitev, ki se uporablja za zaščitno
        mrežo za okno (npr. gumb, ročica, zaponka v stilu varnostnega pasu).
    window_net_mounting_hardware:
      name: Okovje za montažo zaščitne mreže za okno
      description: Opredeljuje vrsto montažnega okovja ali metodo pritrjevanja, ki
        se uporablja za namestitev zaščitne mreže za okno (npr. na sponko, vijaki,
        stil s kljuko/palico), ali navaja, ali je okovje vključeno.
    window_net_opening_direction:
      name: Smer odpiranja zaščitne mreže za okno
      description: Navaja, kako se zaščitna mreža za okno odpira/sprosti glede na
        potnika za izstop in skladnost s pravili.
    window_regulator_operation:
      name: Delovanje pomikanja stekel
      description: Navaja, kako se pomik stekla upravlja (ročni pomik z ročico ali
        električni).
    windshield_coverage_area:
      name: Območje pokritosti vetrobranskega stekla
      description: Navaja, katere dele zunanjega prednjega dela vozila je pokrivalo
        za vetrobransko steklo zasnovano zaščititi (npr. samo vetrobransko steklo
        nasproti temu, da vključuje brisalce, ogledala, stranska okna ali rob pokrova
        motorja).
    windshield_mount_attachment_method:
      name: Metoda pritrditve nosilca za vetrobransko steklo
      description: Navaja, kako se nosilec oprime ali pritrdi na površino vetrobranskega
        stekla.
    windshield_washer_fluid_seasonality:
      name: Sezonskost tekočine za pranje vetrobranskega stekla
      description: Označuje predvideno sezono/podnebje ali glavni primer uporabe recepture
        tekočine za pranje vetrobranskega stekla (npr. zimsko odmrzovalno sredstvo,
        letno čistilo za odstranjevanje žuželk, celoletno).
    windsurf_fin_style:
      name: Stil smernika za deskanje na deski
      description: Razvršča smernik glede na predvideno jadralno disciplino ali stil
        uporabe (npr. valovanje, slalom, trava).
    windsurfing_connection_standard:
      name: Standardna povezava za jadranje na deski
      description: Mehanski vmesnik ali vrsta škatle, ki se uporablja za pritrditev
        dela na desko ali jadralno opremo.
    windsurfing_sail_style:
      name: Stil jadra za jadranje na deski
      description: Razvršča predvideno disciplino ali primer uporabe jadra, kot so
        wave, freeride ali foil.
    wine_additive_type:
      name: Vrsta dodatka za vino
      description: Navaja, kakšne vrste izdelek za pridelavo rdečega vina je to (sestavina,
        aditiv, kvasovke, sredstvo za bistrenje, komplet itd.).
    wine_body:
      name: Polnost vina
      description: Opisuje zaznano težo in občutek vina v ustih
    wine_carbonation:
      name: Karbonizacija vina
      description: Označuje, ali je vino mirno, polpeneče ali peneče, ter kjer je
        to pomembno, intenzivnost biserjenja
    wine_making_ingredient_type:
      name: Vrsta sestavine za proizvodnjo vina
      description: Navaja funkcionalno kategorijo sestavin za potrošne vinske aditive
        in sestavine.
    wine_making_stage:
      name: Faza pridelave vina
      description: Opredeljuje, za kateri korak postopka pridelave vina je izdelek
        predviden.
    wine_style:
      name: Stil vina
      description: Razvršča širši stil pridelave vina, ki presega samo barvo, kot
        je mirno, peneče ali utrjeno (alkoholizirano) vino.
    winemaking_process_stage:
      name: Faza postopka vinarstva
      description: Označuje primarno fazo postopka pridelave vina, za katero je pripomoček
        predviden.
    wing_count:
      name: Število kril
      description: Število kril/rok na bumerangu.
    wing_handle_type:
      name: Vrsta krilnega ročaja
      description: Navaja stil sistema ročajev na profilu krila.
    wing_part_type:
      name: Vrsta dela za krilo
      description: Opredeljuje specifično komponento ali nadomestni del za profil
        krila.
    wingfoiling_style:
      name: Slog krila
      description: Označuje specifično disciplino krila ali stil vožnje, ki ga izdelek
        cilja.
    wiper_arm_finish:
      name: Končna obdelava ročice brisalca
      description: Površinska obdelava ali zaščitni premaz, nanesen na ročico brisalca,
        kar vpliva na odpornost proti koroziji in videz.
    wiper_arm_pivot_mount_type:
      name: Vrsta vrtilnega nosilca ročice brisalca
      description: Navaja, kako se ročica brisalca namesti na vzvodje ali zglob brisalca
        vozila.
    wiper_blade_attachment_type:
      name: Vrsta pritrditve metlice brisalcev
      description: Navaja stil priključka/pritrditve, ki se uporablja za montažo metlice
        brisalca na ročico brisalca.
    wiper_blade_rubber_material:
      name: Gumijasti material metlice brisalca
      description: Material brisalnega elementa (vložka/polnila), ki prihaja v stik
        s steklom.
    wiper_system_position:
      name: Položaj sistema brisalcev
      description: Označuje položaj namestitve sistema brisalcev na vozilu.
    wire_coating_material:
      name: Material premaza žiga
      description: Navaja material zunanjega premaza/plašča, nanesenega na žico (ne
        materiala jedra žice), kar lahko vpliva na odpornost proti obrabi in gladkost
        prehoda skozi luknjice kroglic.
    wire_coating_type:
      name: Vrsta premaza žice
      description: Navaja, ali je žica premazana/prekrita in na kakšen način (zaradi
        barve, zaščite in teksture).
    wire_construction_type:
      name: Vrsta konstrukcije pnevmatike
      description: Navaja fizično zgradbo žice za nizanje kroglic, kot je pletena
        žica nasproti enojni (žici v enem kosu) ter ali je premazana.
    wire_finish:
      name: Končni izgled žice
      description: Navaja površinsko obdelavo, premaz ali prevleko, naneseno na žico
        (npr. polirana, emajlirana, pocinkana, galvanizirana), kar vpliva na videz
        in odpornost proti potemnitvi/koroziji.
    wire_gauge_awg:
      name: Debelina žice (AWG)
      description: Velikost prevodnikov po ameriškem merilu za debelino žic (AWG),
        uporabljenih v kabelskem snopu.
    wire_insulation_material:
      name: Material izolacije žice
      description: Material izolacije/plašča žice, uporabljenega v kabelskem snopu
        (vpliva na temperaturno/kemično odpornost).
    wire_packaging_type:
      name: Vrsta pakiranja žice
      description: Navaja način prodaje/pakiranja žice (npr. na kolutu, v snopu).
    wire_shape_profile:
      name: Oblika/profil žic
      description: Opisuje obliko prečnega prereza žice.
    wiring_configuration:
      name: Konfiguracija ožičenja
      description: Označuje, ali je meč za sabljanje dobavljen že ožičen za električno
        beleženje točk, brez žic, brezžičen ali pa je namenjen neelektrični vadbi.
    wobbler_style:
      name: Slog voblerja
      description: Določa specifično zasnovo/stil delovanja voblerja, kot je crankbait
        ali jerkbait.
    wood_block_surface_preparation:
      name: Priprava površine lesenega bloka
      description: Označuje stanje površine lesenega bloka, ki je pripravljena za
        takojšnjo uporabo za končno obdelavo in ustvarjanje.
    wood_grain_direction:
      name: Smer lesnih vlaken
      description: Smer lesnih vlaken glede na najdaljšo dimenzijo izdelka (pomembno
        za trdnost, obnašanje pri rezanju in videz).
    wood_slice_edge_style:
      name: Slog roba lesene rezine
      description: Stanje roba rezine, kot je naravni rob z lubjem v primerjavi z
        gladkim/brušenim robom.
    wooden_block_special_features:
      name: Posebne lastnosti lesenih kock
      description: Izstopajoče funkcionalne lastnosti, vključene v komplet lesenih
        kock.
    woodwind_body_construction:
      name: Zgradba trupa lesenega pihala
      description: Označuje, ali je instrument izdelan iz enega kosa ali iz več delov
        (npr. 2-delni/3-delni), kar vpliva na čiščenje, shranjevanje in prenosljivost.
    woodwind_polishing_cloth_intended_use:
      name: Predvidena uporaba krpe za poliranje lesenih pihal
      description: Navaja, kaj je krpa prvenstveno zasnovana čistiti/polirati na lesenem
        pihalu.
    woodwind_small_part_type:
      name: Vrsta malega dela za lesena pihala
      description: Navaja, za kakšno vrsto malega nadomestnega dela za klarinet gre
        (npr. okovje mehanizma tipk, blazinice/pluta/polst, obročki).
    woofer_mounting_type:
      name: Vrsta montaže nizkotonskega zvočnika
      description: Kako je nizkotonec predviden za montažo/uporabo (v prostem zraku
        v primerjavi z ohišjem) ter običajne avtomobilske oblike montaže.
    woofer_surround_material:
      name: Material, uporabljen za obrobo nizkotonca
      description: Material, uporabljen za obrobo nizkotonca (zunanji obroč vzmetenja).
    worn_on_finger:
      name: Prst, na katerem se nosi
      description: Navaja, na katerem prstu je predvideno nošenje vodila za naprstnik.
    wrap_style:
      name: Stil ovijanja
      description: Označuje, kolikokrat je pas predviden za ovitje okoli pasu.
    wrapping_occasion:
      name: Priložnost za zavijanje
      description: Glavna priložnost za obdarovanje/praznovanje, za katero je darilni
        papir predviden.
    wrapping_paper_features:
      name: Lastnosti darilnega papirja
      description: Funkcionalne in z trajnostjo povezane lastnosti darilnega papirja,
        kot so odpornost proti trganju, vsebnost recikliranih materialov ali vnaprej
        narezani formati listov.
    wrestling_dummy_design:
      name: Zasnova lutke za rokoborbo
      description: Splošna oblika telesa ali drža lutke, kot je stoječa človeška oblika
        ali vreča za metanje, kar narekuje izvedljive vadbene tehnike.
    wrestling_mat_safety_certifications:
      name: Varnostni certifikati za rokoborske blazine
      description: Navaja vse varnostne certifikate ali standarde industrijskih ali
        športnih organov, ki jih blazina izpolnjuje.
    wrist_strap_style:
      name: Stil zapestnega paščka
      description: Opisuje stil paščka za zapestje (ali njegovo odsotnost), kar vpliva
        na podporo in prileganje.
    wrist_support_style:
      name: Stil podpore za zapestje
      description: Opredeljuje zgradbo ali stil podpore za zapestje, kot je opornica,
        rokavica, kineziološki trak ali ovoj, kar pomaga pri izbiri glede na uporabnikove
        preference in zmogljivost.
    xylophone_range_octaves:
      name: Razpon ksilofona
      description: Skupni razpon ksilofona, izražen v oktavah (npr. 2,5 oktave, 3
        oktave, 4 oktave).
    xylophone_resonator_type:
      name: Vrsta resonatorja ksilofona
      description: Vrsta sistema resonatorja, ki se uporablja za ojačitev tona (če
        obstaja).
    yam_variety:
      name: Sorta jama
      description: Navaja kultivar ali splošno sorto jama, ki se prodaja (npr. vijolični,
        rumeni, slonovo stopalo).
    yarn_cutter_physical_style:
      name: Končni izgled preje
      description: Opredeljuje fizični stil rezila za prejo (npr. obesek, prstan,
        škarjice), kar podpira brskanje in filtriranje znotraj te kategorije.
    yarn_finish_or_effect:
      name: Končna obdelava ali izgled preje
      description: Izpostavlja posebne vizualne ali funkcionalne obdelave, nanesene
        na prejo, kot sta fluorescenca ali kovinski lesk.
    yarn_guide_style:
      name: Stil vodila preje
      description: Fizični stil komponente za vodenje preje.
    yarn_swift_adjustability:
      name: Hitra nastavljivost preje
      description: Označuje, ali in na kakšen način se navijalnik preje (motovilo)
        lahko nastavi (razširljiv, zložljiv), kar vpliva na shranjevanje in razpon
        velikosti štren, ki jih lahko sprejme.
    yarn_swift_bearing_type:
      name: Vrsta ležaja navijalnika preje
      description: Opisuje podporni mehanizem vrtenja (npr. kroglični ležaj), kar
        vpliva na gladkost in hitrost navijanja.
    yeast_application:
      name: Uporaba kvasa
      description: Označuje primarno predvideno kulinarično uporabo ali uporabo za
        fermentacijo kvasnega izdelka.
    yo_yo_accessory_part_type:
      name: Vrsta dodatka/dela za jo-jo
      description: Opredeljuje, za kakšno vrsto nadomestnega dela ali dodatka za jo-jo
        gre (npr. vrvica, ležaj, zavorni obročki)
    yo_yo_axle_system_type:
      name: Vrsta sistema osi jo-joja
      description: Konstrukcijski pristop za os jo-joja (npr. fiksna os v primerjavi
        z transaksialno osjo z ležajem), kar vpliva na občutek igre in vzdrževanje.
    yo_yo_bearing_size_class:
      name: Razred velikosti ležaja jo-joja
      description: Standardizirani razred velikosti ležaja, ki ga uporablja jo-jo,
        kjer je to ustrezno.
    yo_yo_bearing_type:
      name: Vrsta ležaja jo-jo
      description: Konfiguracija ležaja, ki vpliva na odzivnost in lastnosti vrtenja.
    yo_yo_play_style:
      name: Stil igre z jo-jojem
      description: Primarni predvideni slog igre jo-joja, ki odraža disciplino niz/trikov,
        za katero je izdelek zasnovan.
    yo_yo_response_system:
      name: Odzivni sistem jo-joja
      description: Navaja odzivni mehanizem jo-joja, za katerega je ta del zasnovan.
    yo_yo_responsiveness:
      name: Odzivnost jo-joja
      description: Ali se jo-jo vrne v roko s potegom (odziven) ali pa zahteva vezavo
        (neodziven).
    yo_yo_string_material:
      name: Material vrvice za jo-jo
      description: Sestava materiala vrvice za jo-jo.
    yogurt_base_ingredient:
      name: Osnovna sestavina jogurta
      description: Opredeljuje glavni vir na osnovi mleka ali rastlin, uporabljen
        za izdelavo jogurta, kar je ključno za prehranske preference in vidike alergenov.
    yoke_type:
      name: Vrsta jahača
      description: Opredeljuje stil ležišča ali jahača, ki podpira strelno orožje
        na enonožnem stojalu.
    zill_playing_style:
      name: Stil igranja prstnih činel
      description: Predvideni kontekst/stil igranja (običajno trebušni ples v primerjavi
        z orkestralnim/kulturnim različicam).
    zill_strap_material:
      name: Material paščka prstnih činel
      description: Material zapestnega traku/elastike za prste, ki se uporablja za
        držanje prstnih činel (če je priložen), kar vpliva na udobje, trpežnost in
        oprijem.
    zills_strap_adjustability:
      name: Nastavljivost traku prstnih činel
      description: Ali se priloženi trak/elastika lahko nastavi za prileganje in na
        kakšen način.
    zipper_application:
      name: Uporaba zadrge
      description: Navaja predvideni projekt ali namen uporabe, za katerega je zadrga
        zasnovana.
    zipper_chain_type:
      name: Vrsta verige zadrge
      description: Navaja zgradbo/vrsto verige/zobcev zadrge.
    zipper_end_type:
      name: Vrsta zaključka zadrge
      description: Označuje, kako se zadrga zaključi in ali je deljiva (odprt zaključek)
        ali nedeljiva (zaprt zaključek), vključno z običajnim okovjem za deljivi zaključek,
        ki se uporablja pri zadrgah za ustvarjanje.
    zipper_gauge:
      name: Širina zadrge
      description: 'Označuje oznako kalibra/velikosti verige zadrge, običajno izraženo
        s številko in znakom # (na primer #3 ali #5), kar je povezano s širino zobcev/spirale
        in predvideno uporabo.'
    zipper_opening_length:
      name: Dolžina odprtine zadrge
      description: Določa, kolikšen del prednje odprtine se zapira z zadrgo, pri čemer
        razlikuje med stili s celotno zadrgo , polovično zadrgo ali četrtinsko zadrgo.
    zipper_pull_material:
      name: Material drsnika zadrge
      description: Navaja material drsnika zadrge ali jezička drsnika (dela, ki ga
        primete), ki se razlikuje od zobcev/verige in traku zadrge.
    zipper_pull_side:
      name: Stran drsnika zadrge
      description: Navaja, s katere strani (ali strani) zadrge je jeziček drsnika
        dostopen.
    zipper_pull_strap_cord_tab_material:
      name: Material traku/vrvice/jezička za drsnik zadrge
      description: Material komponente traku/vrvice/jezička/čopka, ki je pritrjena
        na drsnik zadrge (če je prisotna), razen glavnega okovja/telesa drsnika zadrge.
    zipper_reversibility_mechanism:
      name: Mehanizem obrnljivosti zadrge
      description: Navaja, kako je zadrga obrnljiva (npr. dvostranski drsnik nasproti
        preklopnemu drsniku/drsniku s samodejno blokado, zasnovanem za obrnljiva oblačila).
    zipper_separating_type:
      name: Vrsta deljenja zadrge
      description: Označuje, ali se zadrga deli na dnu/vrhu ali pa ima zaprt zaključek,
        zaradi prileganja na jaknah, spalnih vrečah, torbah itd.
    zipper_side:
      name: Stran zadrge
      description: Navaja stran, na kateri se nahaja glavna zadrga, ko spalna vreča
        leži obrnjena navzgor.
    zipper_slider_material:
      name: Konfiguracija drsnika/poteznega dela zadrge
      description: Navaja material drsnika zadrge (premičnega mehanizma), kar lahko
        vpliva na trdnost in odpornost proti koroziji.
    zipper_slider_pull_configuration:
      name: Konfiguracija drsnika/vlečnega mehanizma zadrge
      description: Označuje, ali ima zadrga en drsnik/potezni del ali dva, ter ali
        so potezni deli na eni ali obeh straneh drsnika.
    zipper_style:
      name: Stil zadrge
      description: Označuje dolžino zadrge ali njeno prisotnost na oblačilu (npr.
        brez zadrge, četrtinska zadrga, polovična zadrga, celotna zadrga).
    zipper_tape_material:
      name: Material traku zadrge
      description: Navaja glavni material traku zadrge (tekstilnih strani), ki se
        všije v projekt.
    zipper_teeth_type:
      name: Vrsta zobcev zadrge
      description: Navaja stil izdelave verige/zobcev zadrge (npr. spiralna, brizgana
        plastika, kovinska, nevidna), kar vpliva na prožnost, trdnost in tipične primere
        uporabe.
    assembly_required:
      name: Potrebno sestavljanje
      description: Označuje, ali je treba izdelek pred uporabo sestaviti
    organic_certification:
      name: Ekološki certifikat
      description: Označuje, kateri ekološki ali trajnostni certifikat ima izdelek
