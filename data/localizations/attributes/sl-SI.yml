      description: Vrste primarnih perlic, ki jih zahteva vzorec.
    bead_type_patch_embellishment:
      name: Vrsta kroglic (okras na našitku)
      description: Glavna vrsta kroglic, uporabljenih na površini našitka.
    beaded_accessory_project_type:
      name: Vrsta projekta z nakitnimi dodatki
      description: Kakšen dodatek ustvari vzorec.
    beading_needle_flexibility:
      name: Fleksibilnost igle za perlice
      description: Relativna fleksibilnost stebla igle za vodenje po ozkih prehodih
        perlic.
    beading_pattern_bead_size:
      name: Velikost perlic v vzorcu perlic
      description: Priporočena velikost perlic, določena z vzorcem (običajno velikost
        drobnih perlic, npr. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Oblika diagrama vzorcev perlic
      description: Kako je vzorec vizualno predstavljen (npr. grafično v primerjavi
        s fotografijami po korakih).
    beading_pattern_stitch_technique:
      name: Vzorec/tehnika za izdelavo okraskov s perlicami
      description: Primarni šiv ali tehnika tkanja s perlicami, uporabljena v vzorcu.
    beading_technique_stitch:
      name: Tehnika/šiv za perlice
      description: Označuje glavno tehniko izdelave nakita ali vrsto šiva, uporabljeno
        v vzorcu (npr. peyote, brick).
    beading_thread_fiber_type:
      name: Vrsta vlakna za nit perlic
      description: Določa podtip vlaken/materiala niti za perlice (bolj specifično
        kot generični material), kar vpliva na ustvarjanje.
    beading_thread_size:
      name: Velikost niti za bisere
      description: Označuje proizvajalčevo/industrijsko oznako debeline, ki se uporablja
        za niti za perlice (odvisno od blagovne znamke/serije), na primer debelina
        D ali 00.
    beading_thread_use_case:
      name: Primer uporabe za nit za perlice
      description: Opisuje glavno priporočeno uporabo niti za perlice, kar kupcem
        pomaga izbrati pravi izdelek za njihov projekt.
    beading_wire_coating_material:
      name: Material za prevleko žice za perlice
      description: Določa material zunanje prevleke na žici za perlice (če je prisotna),
        kar vpliva na občutek, vzdržljivost in odpornost proti zvijanju.
    beading_wire_strand_count:
      name: Število žil žice za perlice
      description: Označuje število pramenov v večžilni žici za perlice (npr. 7-žilna,
        19-žilna, 49-žilna,) kar vpliva na prožnost in način visenja.
    beadlock_type:
      name: Tip zapore
      description: Označuje, ali ima kolo zapore in kakšen je njihov slog (pomaga
        kupcem terenskih/UTV vozil).
    beam_material:
      name: Material nosilca
      description: Primarni material nosilca/droga (pogosto drugačen od glav/pritrditev).
    beam_pattern:
      name: Vzorec žarka
      description: Vzorec porazdelitve svetlobnega žarka, ki se uporablja za osvetlitev
        vožnje/terenske vožnje.
    bean_bag_fabric_material:
      name: Material blaga za vreče za sedenje
      description: Označuje zunanjo tkanino, uporabljeno za vreče za sedenje, dobavljene
        s kompletom.
    bean_paste_variety:
      name: Različne vrste fižolove paste
      description: Razvršča določeno vrsto fižolove paste glede na način proizvodnje
        ali glavno sestavino.
    bean_preparation:
      name: Priprava fižola
      description: Označuje, kako je fižol pripravljen ali predelan pred razprodajo
        (npr. celi stroki, oluščen, sesekljan, kaljen).
    bean_variety:
      name: Vrsta fižola
      description: Določa botanično ali tržno sorto fižola (npr. zeleni fižol, edamame,
        dolga vigna).
    beanie_style:
      name: Slog zimske kape
      description: Določa celotno obliko, konstrukcijo ali silhueto kape, da lahko
        kupec hitro izbira med običajnimi različicami.
    bearing_clearance:
      name: Odmik ležaja
      description: Označuje razred notranje radialne zračnosti ležaja (količina notranje
        zračnosti); razred C0 se imenuje tudi CN ali normalni odmik.
    bearing_construction_type:
      name: Vrsta konstrukcije ležaja
      description: Opredeljuje tip ali konstrukcijo ležaja, uporabljen v pestu (npr.
        vstavni ležaj, kroglični ležaj).
    bearing_edge_type:
      name: Vrsta roba bobna
      description: Tip/profil robov bobna, ki vpliva na zvočni začetek in trajanje
        zvoka.
    bearing_lubrication:
      name: Mazivo za ležaje
      description: Označuje vrsto maziva, ki se uporablja na ležaju med proizvodnjo,
        kot je mast ali olje.
    bearing_material:
      name: Material ležaja
      description: Določa material konstrukcije ležaja (npr. jeklo, keramični hibrid),
        kar pomaga kolesarjem pri izbiri med možnostmi vzdržljivosti, moči in zmogljivosti.
    bearing_rating:
      name: Ocena ležaja
      description: Navaja toleranco ali razred zmogljivosti ležaja, uporabljenega
        v drsalkah (npr. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Oznaka tesnila ležaja
      description: Označuje vrsto tesnjenja, ki se uporablja na ležaju, kar vpliva
        na vzdržljivost in kotalni upor.
    bearing_seal_type:
      name: Vrsta tesnila ležaja
      description: Določa zasnovo tesnila ali zaščite, ki ščiti notranjost ležaja
        pred onesnaževalci in vpliva na upor (npr. 2RS, ZZ, LLU, odprto).
    bearing_shield_type:
      name: Vrsta zaščite ležaja
      description: Vrsta zaščite ali tesnjenja, ki ščiti notranjost ležaja.
    bearing_size_code:
      name: Koda velikosti ležaja
      description: Standardizirana oznaka ležaja (npr. 608, 688), ki kombinira notranji,
        zunanji premer in širino.
    bearing_type:
      name: Vrsta ležaja
      description: Določa konstrukcijski slog ležajev, uporabljenih v krmilnem ležaju.
    beater_head_material:
      name: Material udarjalke
      description: Določa material kontakta/glave tolkala za bas bobne (npr. filc,
        les, guma).
    beaters_included:
      name: Priložena tolkala
      description: Določa, koliko tolkal je vključenih/nameščenih na pedal za bobne
        (npr. enojno ali dvojno tolkalo) ali če tolkalo ni vključeno.
    bed_base_type:
      name: Vrsta vznožja postelje
      description: Opredeljuje konstrukcijski tip osnovne plošče postelje ali divana
        (npr. trdna podlaga, vzmetna rešetka, nastavljiva).
    bed_storage_type:
      name: Vrsta shranjevanja postelje
      description: Določa integrirani mehanizem za shranjevanje posteljnega okvirja.
    bedroom_furniture_items_included:
      name: Priloženi elementi pohištva za spalnico
      description: Navaja posamezne kose pohištva, ki so vključeni v spalni komplet
        (npr. postelja, komoda, nočne omarice), kar kupcem omogoča, da hitro vidijo,
        kaj je vključeno, ne da bi jim bilo treba brati dolge opise.
    bedroom_vanity_items_included:
      name: Vključen toaletni kotiček za spalnico
      description: Navaja posamezne predmete, ki so vključeni v komplet toaletnega
        kotička, da kupci natančno vedo, kaj je vključeno v dobavo (npr. ogledalo,
        stolček, komplet za osvetlitev).
    beer_based_cocktail_variety:
      name: Različni koktajli na osnovi piva
      description: Razvršča koktajle na osnovi piva glede na njihovo specifično vrsto,
        npr. radler, shandy, michelada.
    beet_variety:
      name: Vrsta repe
      description: Določa kultivar ali sorto pese, kar pomaga kupcu prepoznati okus,
        barvo in kulinarično uporabo (npr. rdeča, zlata, chioggia).
    bell_actuation_mechanism:
      name: Mehanizem za aktivacijo zvonca
      description: Določa, kako mora uporabnik ravnati, da se sproži zvonec, kar kupcem
        pomaga izbrati najbolj ergonomično rešitev.
    bell_guard_coverage_area:
      name: Območje pokritosti zaščite zvonca
      description: Označuje, za kateri del zvonca je zaščita zasnovana za ščititi.
    bell_material:
      name: Material zvonca
      description: Material komponente zvonca (če je naveden ločeno od celotnega materiala
        glasbila).
    bellhousing_bolt_pattern:
      name: Vzorec vijakov ohišja sklopke
      description: Določa standardni vzorec razporeditve vijakov na strani sklopke/motorja
        ali družino vzorcev, ki se uporablja pri ohišju menjalnika.
    bellows_material:
      name: Material meha
      description: Material ohišja /prekrivnega dela meha (če je vključen).
    bellows_orientation:
      name: Orientacija meha
      description: Označuje konfiguracijo meha, ki se uporablja za dovajanje zraka
        v cevi.
    belly_panel_style:
      name: Slog trebušnega dela
      description: Opisuje konstrukcijo pasu ali trebušnega dela, ki se prilagaja
        rastočemu trebuhu.
    belt_buckle_type:
      name: Vrsta zaponke za pas
      description: Opisuje specifičen mehanizem ali zasnovo zaponke, ki se uporablja
        na pasu.
    beret_style:
      name: Slog baretke
      description: Označuje posebno obliko baretke ali kulturno različico.
    berry_species:
      name: Vrste jagodičevja
      description: Označuje vrsto jagodičevja, ki ga izdelek vsebuje, da lahko kupec
        hitro filtrira in najde želeno jagodičevje.
    beta_casein_variant:
      name: Varianta beta-kazeina
      description: Navedba, katera različica beljakovine beta-kazeina (npr. A2) je
        prisotna v mleku za potrošnike, ki imajo težave s prebavo.
    beverage_sweetness_level:
      name: Stopnja sladkosti pijače
      description: Pijačo razvršča glede na stopnjo dodane sladkosti ali sladkorja.
    bezel_graduation_units:
      name: Enote merjenja na obroču
      description: Določa oznake enot na obroču (stopinje, milsi ali dvojna skala).
    bicycle_brake_set_components_included:
      name: Priložene komponente kompleta zavor za kolo
      description: Vsebuje seznam posameznih delov, ki so priloženi v kompletu, tako
        da kupci natančno vedo, kaj je vključeno, in lahko primerjajo različne konfiguracije
        paketov.
    bicycle_cage_mounting_position:
      name: Položaj za pritrditev držala za bidon
      description: Določa, kam na kolesu je namenjena namestitev držala za bidon.
    bicycle_computer_mount_placement:
      name: Umestitev nosilca za kolesarski računalnik
      description: Določa, kam na kolesu se namesti nosilec računalnika, na primer
        spredaj na krmilu ali na pokrovu krmila.
    bicycle_folding_mechanism:
      name: Mehanizem za zlaganje kolesa
      description: Opisuje mehanski sistem zlaganja, ki se uporablja na okvirju kolesa
        (npr. polovično zlaganje, navpično zlaganje).
    bicycle_frame_design:
      name: Zasnova okvirja kolesa
      description: Določa celoten slog okvirja kolesa, kar vpliva na dostopnost, nosilnost
        in shranjevanje.
    bicycle_frame_style:
      name: Slog okvirja kolesa
      description: Opisuje strukturni slog okvirja kolesa (okvir s spuščeno cevjo,
        lowrider, chopper stretch itd.), kar vpliva na držo kolesarja in videz kolesa.
    bicycle_handlebar_type:
      name: Vrsta kolesarskega krmila
      description: Določa specifičen slog ali geometrijo krmila in pomaga kolesarjem
        izbrati krmilo, ki ustreza njihovemu položaju med vožnjo in slogu vožnje
    bicycle_headset_configuration:
      name: Konfiguracija kolesarskih slušalk
      description: Označuje konstrukcijski slog ali standard kolesarskega krmilnega
        ležaja glede na razpored ležajnih skodelic (npr. zunanja skodelica, ZeroStack,
        integrirana, navojna).
    bicycle_hub_type:
      name: Vrsta pesta kolesa
      description: Opisuje mehanizem pesta, dobavljenega s kolesom, kar vpliva na
        združljivost pogonskega sklopa in slog vožnje.
    bicycle_lock_security_certification:
      name: Certifikat varnosti kolesarskih ključavnic
      description: Certifikat neodvisnega zunanjega izvajalca, ki potrjuje uspešnost
        proti kraji (npr. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Vrsta pedala za kolo
      description: Opisuje splošni način delovanja ali zasnovo pedala, na primer platformne,
        različice brez zapenjanja ali hibridne modele, ter kolesarjem pomaga izbrati
        pravi sistem, ki ustreza njihovemu slogu vožnje.
    bicycle_propulsion_type:
      name: Vrsta pogona kolesa
      description: Določa, kako se kolo poganja, na primer z ročnim pedaliranjem,
        električno pomočjo ali z motorjem z notranjim zgorevanjem.
    bicycle_pump_type:
      name: Vrsta tlačilke za kolo
      description: Določa strukturni slog tlačilke in pomaga kupcu izbrati zasnovo,
        ki najbolj ustreza njihovim potrebam pri vožnji, shranjevanju ali nujnih primerih.
    bicycle_rack_mounting_type:
      name: Vrsta pritrditve za kolo
      description: Opisuje glavni način ali mesto pritrditve nosilca na kolo, kar
        uporabnikom pomaga pri preverjanju združljivosti z njihovim okvirjem in komponentami.
    bicycle_suspension_type:
      name: Vrsta vzmetenja kolesa
      description: Določa prisotnost in konfiguracijo vzmetenja na kolesu.
    bicycle_tire_tread_pattern:
      name: Vzorec profila kolesarske pnevmatike
      description: Določa slog profila pnevmatike, kar vpliva na oprijem in kotalni
        upor na različnih površinah.
    bidirectional_charging_capability:
      name: Možnost dvosmernega polnjenja
      description: Označuje, ali električno vozilo podpira načine dvosmernega polnjenja,
        kot sta V2G in/ali V2H.
    bike_rack_mounting_style:
      name: Slog montaže stojala za kolo
      description: Kako stojalo zavaruje/pritrdi kolo.
    bike_rack_tilt_function:
      name: Funkcija nagiba stojala kolesa
      description: Ali je na voljo funkcija nagiba, ki omogoča dostop do prtljažnika,
        ko je nosilec nameščen, in kakšna je ta funkcija?
    bikini_top_style:
      name: Stil zgornjega dela bikinija
      description: Določa dizajn ali kroj zgornjega dela bikinija, kar kupcu pomaga
        najti želene kroje in silhuete.
    billiard_brush_type:
      name: Vrsta biljardne krtače
      description: Določa poseben slog orodja za čiščenje biljardne mize (npr. krtača
        za mizo, krtača za robove, blok za glajenje).
    billiard_glove_finger_coverage:
      name: Pokrivanje prstov pri biljardni rokavici
      description: Določa, katere prste prekriva rokavica s svoj ozasnovo, kar omogoča
        natančno filtriranje za sloge rokavic, specifičnih za biljard.
    billiard_pocket_style:
      name: Stil žepov za biljard mizo
      description: Določa strukturni ali estetski slog žepa, ki vpliva na združljivost
        in dekoracijo mize.
    billiard_rack_style:
      name: Slog biljardnega stojala
      description: Opisuje fizični slog ali mehanizem stojala (npr. tradicionalni
        okvir, zložljiv).
    billiard_table_type:
      name: Vrsta biljardne mize
      description: Določa disciplino biljarda ali način uporabe, za katero je miza
        zasnovana (npr. biljard, snooker, karambol).
    billiards_discipline:
      name: Biljardna različica
      description: Označuje specifično različico (vrsto igre) biljarda, za katero
        je izdelek namenjen ali z njo združljiv.
    binding_compatibility_standard:
      name: Standard združljivosti vezi
      description: Določa vmesnik vezi (edini standard), za katerega je smučarski
        čevelj certificiran, kar zagotavlja varno in pravilno združevanje s smučarskimi
        vezmi.
    binding_inclusion:
      name: Vključitev vezi
      description: Določa, ali se smuči prodajajo brez vezi, z integriranim sistemom
        ali z ločenimi vezmi.
    binding_interface:
      name: Vmesnik vezi
      description: Označuje standard ploščadi ali vmesnika vezi, s katerim so smuči
        že opremljene ali s katerim so združljive, kar zagotavlja združljivost smučarskih
        čevljev in vezi.
    binding_liner_type:
      name: Vrsta podloge vezi
      description: Opisuje vrsto notranje obloge, uporabljene v vezi/smučarskem čevlju
        (npr. odstranljiva, primerna za hojo, toplotno prilegajoča).
    binding_mounting_system:
      name: Sistem za pritrditev vezi
      description: Označuje vmesnik, ki se uporablja za pritrditev vezi na smučko
        (ploščati nosilec, tirnica, plošča itd.).
    binding_position:
      name: Položaj vezave
      description: Označuje predvideni položaj namestitve ali konfiguracijo vezi (npr.
        sprednji del čevlja, zadnji del čevlja, ARTP).
    binding_strap_position:
      name: Položaj traku vezi
      description: Določa, kje na vezi je predvidena namestitev traku.
    bingo_components_included:
      name: Vključene komponente za bingo
      description: Navaja komponente, ki so priložene kompletu za bingo, kot so bingo
        kroglice, kartice in flomastri.
    bingo_number_range:
      name: Razpon števil za bingo
      description: Določa obseg/različico številk za bingo, ki jih podpira ta komplet.
    bingo_set_features:
      name: Značilnosti kompleta za bingo
      description: Opredeljuje osnovno obliko bingo kompleta (fizični/ročni ali elektronski/interaktivni).
    bipod_mounting_interface:
      name: Vmesnik za pritrditev dvonožca
      description: Določa pritrdilni vmesnik, ki se uporablja za pritrditev dvonožca
        na strelno orožje ali sistem vodil.
    bit_attachment_type:
      name: Vrsta pritrditve nastavka
      description: Določa, kako se uzde pritrdi na nastavek (npr. z vrvjo, s sponkami,
        s čikaškimi vijaki).
    bit_mouthpiece_design:
      name: Zasnoa ustnika
      description: Opisuje konstrukcijski slog ali konfiguracijo spojev ustnika, kar
        vpliva na porazdelitev tlaka, prostor do ustnega neba in splošno trdoto.
    bit_ring_style:
      name: Slog obroča na uzdi
      description: Opredeljuje stil stranskega dela uzde ali obroča, ki se pritrdi
        na uzdo, ter vpliva na delovanje, stransko vodenje in občutek vajeti.
    bladder_material:
      name: Material meha
      description: Določa material, uporabljen za notranji mehur, ki zadržuje zrak.
    blade_attachment_type:
      name: Vrsta pritrditve rezila
      description: Določa, ali drsalka uporablja dvižni mehanizem (tečaji) ali fiksno
        pritrditev rezila.
    blade_finish_coating:
      name: Končna obdelava/premaz rezila
      description: Površinska obdelava, nanesena na rezilo zaradi estetike ali zaščite
        pred korozijo.
    blade_hosel_type:
      name: Vrsta nosila rezila
      description: Določa vrsto priključka na nosilu rezila, ki se vstavlja v držalo,
        kar vpliva na združljivost (npr. standardni ali stožčasti).
    blade_length_type:
      name: Vrsta dolžine rezila
      description: Dolžino plavuti razvršča v kratko, srednjo ali dolgo, pri čemer
        vsaka vpliva na ritem plavanja z nogami in cilje treninga.
    blade_lie:
      name: Naklon rezila
      description: Navaja vrednost naklona rezila hokejske palice, ki kaže, kako leži
        lopatica na ledu glede na držalo.
    blade_sharpness:
      name: Ostrina rezila
      description: Označuje, ali je rob orožja za vadbo nabrušen ali ali je top.
    blade_size_category:
      name: Kategorija velikosti rezila
      description: Standardizirana mednarodna koda velikosti rezila sablje (0–5),
        ki se uporablja za razlikovanje med mladinskimi in odraslimi rezili.
    blade_size_class:
      name: Razred velikosti rezila
      description: Lopar je razvrščen v skladu s standardi za velikosti igralcev,
        ki ustrezajo velikostim ročajev, kot so otroški, mladinski, srednji ali odrasli.
    blade_size_number:
      name: Številka velikosti rezila
      description: Standardna številčna oznaka velikosti (0–5), ki jo določajo predpisi
        o sabljanju in ki opredeljuje dolžino rezila ter upravičenost do tekmovanja
        v posamezni starostni skupini.
    blaster_mechanism:
      name: Mehanizem orodja za peskanje
      description: Določa notranji mehanizem delovanja orodja za peskanje z gelom
        (npr. GBB, AEG, vzmet).
    block_edge_style:
      name: Slog roba bloka
      description: Opisuje, kako so robovi/vogali lesenih blokov obdelani za boljši
        občutek in varnost.
    blocking_mat_features:
      name: Lastnosti podloge podloge
      description: Funkcionalne lastnosti, specifične za blokirne podloge (shranjevanje,
        prenosljivost, uporabnost).
    blocking_mat_grid_unit:
      name: Enota mrežaste blokirne podloge
      description: Sistem enot, uporabljen na natisnjeni mreži, ki uporabnikom pomaga
        pri ujemanju vzorcev in meritev.
    blocking_mat_surface_markings:
      name: Označevanje površine blokirne podloge
      description: Vrsta merilnih oznak/vodilnih oznak, natisnjenih ali vtisnjenih
        v površino podloge.
    blocking_wire_coating:
      name: Premaz napenjalne žice
      description: Površinska obdelava/premaz na napenjalni žici, ki vpliva na odpornost
        proti rji, gladkost in tveganje zatikanja.
    blocking_wire_end_cap_type:
      name: Vrsta končnega pokrovčka za napenjalno žico
      description: Določa vrsto zaščite/končne obdelave zaključka, ki se uporablja
        na koncih napenjalne žice za varnost in zaščito tkanine.
    blocking_wire_set_includes:
      name: Komplet napenjalne žice vključuje
      description: Določa, katere komponente so vključene v izdelek z napenjalno žico
        (npr. blokirni zatiči, cev za shranjevanje).
    blocking_wire_usage:
      name: Uporaba napenjalne žice
      description: Primarna uporaba, za katero je zasnovana fleksibilna napenjalna
        žica.
    bloom_stage:
      name: Faza cvetenja
      description: Označuje, kako odprti so cvetovi marjetic ob dostavi/odpremi.
    blower_motor_bearing_type:
      name: Vrsta ležaja motorja puhalnika
      description: Določa zasnovo ležaja, uporabljenega v motorju puhalnika.
    blower_motor_mounting_position:
      name: Položaj namestitve motorja puhalnika
      description: Kjer je motor puhalnika nameščen v modulu HVAC/vozilu (npr. spredaj,
        zadaj).
    blowpipe_valve_type:
      name: Tip ventila za pihalno cev
      description: Določa vključeni slog ventila za pihalno cev (če obstaja).
    bo_staff_style:
      name: Slog Bo palice
      description: Opredeljuje konstrukcijski slog ali izvedbo palice (npr. ravna,
        zožena, obložena s peno, zložljiva).
    board_game_theme:
      name: Tema družabne igre
      description: Tema zgodbe/okolja namizne igre (za odkrivanje in brskanje).
    board_rail_shape:
      name: Oblika roba deske
      description: Opredeljuje obliko robov deske (npr. mehka, trda, 50/50), ki vpliva
        na oprijem in vodljivost na valu.
    board_size_classification:
      name: Klasifikacija velikosti deske
      description: Razvršča desko ali komplet za štrbunk v splošne standardizirane
        velikosti.
    board_type_compatibility:
      name: Združljivost tipov plošč
      description: Določa vrsto deske, za katero je zasnovan gleženjska vrv.
    boat_construction_type:
      name: Vrsta konstrukcije ladje
      description: Opisuje strukturni slog ali obliko čolna na vesla (npr. napihljiv,
        tog).
    boat_hook_flotation:
      name: Plovnost kavljev za čolne
      description: Označuje, ali je kavelj zasnovan tako, da plava, če pade v vodo.
    boat_ladder_stowage_style:
      name: Slog shranjevanja lestve za čolne
      description: Opisuje, kako se lestev hrani, ko ni v uporabi (npr. zložljiva,
        izvlečna, odstranljiva).
    boat_trailer_construction_type:
      name: Vrsta konstrukcije prikolice za čolne
      description: Kaže, ali prikolica čoln podpira s podstavki, valji ali hibridnim
        sistemom.
    boat_weaving_shuttle_weft_exit_type:
      name: Vrsta izhoda tkalskega čolnička z votkovnim navitkom
      description: Kako votkovna preja med tkanjem izstopa iz čolnička.
    bobbin_loading_type:
      name: Vrsta nalaganja vretena
      description: Določa, kako se vreteno vstavi/naloži v šivalni stroj.
    bobbin_system:
      name: Sistem vretena
      description: Sistem/vrsta nalaganja vretena, ki ga uporablja šivalni stroj.
    bobbin_type:
      name: Vrsta vretena
      description: Določa format nosilca preje, za katerega je čolniček zasnovan (ali
        ga vsebuje), kar določa združljivost in tipično uporabo (npr. čolnički z votkovnim
        navitkom pogosto uporabljajo vretena; čolni za preproge so lahko odprti za
        trakove).
    bobbin_winder_winding_direction:
      name: Smer navijanja orodja za vreteno
      description: Določa smer navijanja/vrtenja, ki jo podpira orodje za navijanje
        vretena.
    bobble_mechanism:
      name: Mehanizem za zibanje
      description: Določa slog mehanizma za zibanje, ki vpliva na gibanje in vzdržljivost.
    bocal_material:
      name: Material odmevnika
      description: Določa material vključenih odmevnikov.
    bodhr_n_head_material:
      name: Material za glavo bodhrana
      description: Material igralne opne (membrane), ki močno vpliva na ton in zahteve
        glede vzdrževanja.
    bodhr_n_tuning_system_type:
      name: Vrsta uglaševalnega sistema za bodhran
      description: Vrsta vgrajenega mehanizma za uglaševanje, ki se uporablja za nastavitev
        napetosti opne (če je nastavljiva).
    body_armor_coverage_area:
      name: Območje pokritosti ščitnika za telo
      description: Označuje, katere dele telesa izdelek ščiti.
    body_armor_intended_use:
      name: Namen uporabe ščitnika za telo
      description: Določa primarni scenarij vožnje ali uporabe, za katerega je zasnovan
        ščitnik za telo za ATV/UTV.
    body_cord_connector_style:
      name: Vrsta priključka za sabljaško žico
      description: Opisuje konfiguracijo povezovalnika na koncih žice (npr. število
        zobcev ali vrsta bajoneta), ki določa združljivost z orožjem in semaforjem
        za točkovanje.
    body_panel_finish_state:
      name: Stanje končne obdelave karoserije
      description: Opisuje stanje površine bočnega dela karoserije ob prodaji, pripravljeno
        za barvanje in vgradnjo.
    body_shape:
      name: Oblika telesa
      description: Določa splošno obliko/slog telesa električne kitare.
    bodysuit_bottom_coverage:
      name: Pokritost spodnjega dela bodija
      description: Določa kroj in pokritost spodnjega dela bodija, kar vpliva na udobje
        in združljivost z oblačili.
    boilie_shape:
      name: Oblika boljijev
      description: Prepozna oblike bojlijev, ki jih ustvari miza za oblikovanje bojlijev,
        kar ribičem omogoča izbiro med različnimi profili vab.
    boilie_stop_buoyancy:
      name: Zaustavitev plovnosti bojlija
      description: Določa, ali je zaustavitev bojlija zasnovana tako, da plava, potone
        ali ostane nevtralno plavajoč, kar vpliva na predstavitev vabe v vodnem stolpu.
    bok_choy_variety:
      name: Sorta pak čoj
      description: Določa kultivar, trgovsko ime ali sorto pak čoja (npr. Baby, Shanghai,
        Nai Bai, Tatsoi, Purple Lady), kar omogoča, da kupec izbere želeni okus, velikost
        in videz.
    bolt_drive_style:
      name: Vrsta glave vijaka
      description: Določa vrsto glave vijakov za pritrditev rolke, pri čemer razlikuje
        med običajnimi vrstami glav, kot sta imbus ali križna.
    bone_content:
      name: Vsebnost kosti
      description: Določa, ali meso vsebuje kosti.
    bongo_center_block_material:
      name: Material sredinskega bloka za bongo bobne
      description: Material sredinskega bloka, ki povezuje oba korpusa bongov (če
        je primerno).
    bongo_shell_material:
      name: Material korpusa bonga
      description: Material korpusa bongov (bobnov), razen membran in komponent.
    bongo_tuning_system:
      name: Sistem za uglaševanje bongov
      description: Kako so bobni bongo uglašeni oziroma kako so zasnovani za uglaševanje
        (npr. tradicionalno uglaševanje z napenjalnimi vijaki v primerjavi z uglaševanjem
        z vrvico), kar vpliva na vzdrževanje in avtentičnost.
    boning_type:
      name: Vrsta odstranjevanja kosti
      description: Opisuje strukturni podporni sistem znotraj steznika, ki združuje
        material in obliko uporabljenih kostic, kar neposredno vpliva na stopnjo podpore,
        prožnost in vzdržljivost.
    boot_liner_type:
      name: Vrsta podloge čevlja za deskanje na snegu
      description: Opisuje možnost oblikovanja ali prilagajanja notranje podloge v
        čevlju za deskanje na snegu (npr. toplotno prilegajoča, odstranljiva).
    boot_sole_compatibility:
      name: Združljivost podplata škornja
      description: Navaja norme za podplate čevljev ali vmesniške sisteme, ki jih
        vez sprejema.
    boot_support_level:
      name: Raven podpore za čevelj
      description: Opisuje splošno togost/oporo gležnja ali čevlja, ki jo zagotavlja
        drsalka.
    boot_width_code:
      name: Koda širine čevlja
      description: Črkovna oznaka širine, ki jo določa proizvajalec in se uporablja
        izključno pri velikostih drsalnih čevljev (npr. AAA, AA, B, C, D).
    booth_configuration:
      name: Konfiguracija stojnice
      description: Določa celotno konfiguracijo sedežev v kabini (npr. enostranska,
        kotna, modularna).
    bootie_toe_design:
      name: Oblika za prste čevljev za surfanje
      description: Določa slog konstrukcije prstnega predela pri čevljih za surfanje
        in grebenskih čevljih.
    border_type:
      name: Vrsta obrobe
      description: Oblika robov/robni vzorec vezenega našitka (vpliva na videz, odpornost
        proti strganju in predvideno kakovost).
    bore_cleaner_format:
      name: Format čistila za cevje
      description: Označuje fizično obliko izdelka za čiščenje cevja (orodje v primerjavi
        s potrošnim materialom).
    bore_cleaner_safe_for_finish:
      name: Čistilo za cevje, varno za končno obdelavo
      description: Označuje, za katere običajne premaze za medeninaste instrumente
        je čistilo za cevje varno za uporabo.
    bottle_cage_loading_direction:
      name: Smer vstavljanja bidona v držalo
      description: Opisuje smer, iz katere se bidon vstavlja ali odstranjuje iz držala.
    bottle_neck_finish_closure_size:
      name: Velikost grla/vrha steklenice
      description: Standardizirana velikost odprtine/vrha steklenice, ki zagotavlja
        združljivost s pokrovčki, zamaški in stroji za zapiranje (npr. 26-mm kronast
        zamašek).
    bottle_style:
      name: Slog steklenice
      description: Najpogostejše oblike steklenic za polnjenje, ki se uporabljajo
        pri domačem pivovarstvu in vinarstvu.
    bottom_bracket_interface:
      name: Vmesnik gonilnega ležaja
      description: Označuje standard vretena/gonilnega ležaja, za katerega je ročica
        zasnovana, s čimer se zagotovi združljivost okvira in srednjega ležaja.
    bottom_bracket_standard:
      name: Standard gonilnega ležaja
      description: Ohišje gonilnega ležaja/vmesnik, ki ga podpira okvir in določa
        združljivost gonilnega sklopa.
    bottom_type_suitability:
      name: Primernost vrste dna
      description: Določa stanje morskega dna, za katero je sidro zasnovano za najboljši
        oprijem.
    bounce_level:
      name: Stopnja odboja
      description: Kaže, kako močno se žoga odbije ob padcu ali metu, kar uporabnikom
        pomaga izbrati pravo žogo za vaje, kot so meti ob steno ali udarci ob tla.
    bouncy_ball_surface_finish:
      name: Površinska obdelava odbojne žogice
      description: Opisuje taktilno in/ali vizualno površinsko obdelavo odbojne žogice
        (npr. gladka, bodičasta, bleščeča).
    boundary_marker_type:
      name: Vrsta mejnega označevalca
      description: Določa fizično obliko elementa oz. izdelka, ki označuje meje igrišča
        (npr. stožec, trak, barva, šablona, stroj).
    bouquet_size_tier:
      name: Razred velikosti šopka
      description: Standardizirana velikostna razvrstitev šopka, neodvisna od števila
        stebel (koristno pri mešanih šopkih).
    bow_and_yo_yo_edge_finish:
      name: Zaključek z lokom in jojo
      description: Opisuje obrobo/zaključek, ki se uporablja pri pentljah/joji (zlasti
        pri pentljah iz trakov).
    bow_case_shell_type:
      name: Vrsta ohišja kovčka za lok
      description: Opisuje strukturno konstrukcijo zunanjosti kovčka za lok (npr.
        trda ali mehka zunanjost kovčka).
    bow_compatibility:
      name: Združljivost loka
      description: Določa vrsto loka, za katerega je lovska konica namenjena oziroma
        za katerega je primerna.
    bow_hair_color:
      name: Barva pentlje za lase
      description: Opisuje barvo/videz strun, uporabljenih na loku za godala (npr.
        bele/beljene, naravno bele, črne).
    bow_stick_material:
      name: Material palice loka
      description: Označuje material, iz katerega je izdelan lok (glavna palica),
        ki močno vpliva na težo, občutek pri uporabi in ceno.
    bow_type:
      name: Vrsta loka
      description: Opredeljuje konstrukcijo mladinskega loka (npr. sestavljeni lok,
        ukrivljeni lok, dolgi lok), ki močno vpliva na slog streljanja, potrebno opremo
        in programe treninga.
    bow_winding_material:
      name: Material ovoja loka
      description: Določa material, uporabljen za ovijanje loka, kar vpliva na oprijem
        in ravnotežje
    bow_yo_yo_embellishment_style:
      name: Okrašen slog pentlje/joje
      description: Določa način konstrukcije okraska (pentlja ali joja iz blaga).
    bowling_ball_core_type:
      name: Vrsta sredice kegljaške žoge
      description: Opisuje notranjo zasnovo jedra ali simetrijo kegljaške krogle,
        kar vpliva na gibanje krogle in njeno sposobnost zavijanja.
    bowling_ball_coverstock_type:
      name: Vrsta zunanje prevleke kegljaške krogle
      description: Določa material ali tehnologijo zunanje prevleke kegljaške krogle,
        ki določa oprijem in potencial zavijanja.
    bowling_set_style:
      name: Slog kompleta za kegljanje
      description: Določa splošni slog ali primer uporabe kegljaškega kompleta.
    box_lid_type:
      name: Vrsta pokrova škatle
      description: Tip pokrova/mehanizma za odpiranje, ki se uporablja pri darilni
        škatli ali zabojčku.
    box_spring_profile:
      name: Profil vzmetnice
      description: Razvrsti splošno višino vzmetnice v kupcem prijazne kategorije
        profilov (npr. nizek profil, standardni profil, visok profil), tako da lahko
        kupci hitro filtrirajo ponudbo, ne da bi poznali natančne mere.
    box_spring_requirement:
      name: Zahteva za vzmetnico
      description: Navedeno je, ali je za vzmetnico potrebna dodatna vzmetna podlaga
        ali podlaga.
    boxing_ring_style:
      name: Stil boksarskega ringa
      description: Opredeljuje splošni slog izdelave ali predvideno namembnost obroča
        (npr. tekmovalni ali trening, za namestitev na višini ali na tleh).
    bra_length_type:
      name: Vrsta dolžine modrca
      description: Opredeljuje razvrstitev modrčkov po dolžini glede na višino pokritosti,
        na primer standardni, dolgi, srednje dolgi ali kratki.
    bra_padding_type:
      name: Vrsta blazinice modrca
      description: Opisuje stopnjo ali prisotnost blazinice v modrcu
    braces_compatibility:
      name: Združljivost opornice
      description: Določa, ali se ščitnik za zobe lahko nosi z ortodontskim aparatom
        in v kolikšni meri.
    brake_band_form:
      name: Oblika zavornega traku
      description: Označuje, ali je zavorni trak dobavljen kot neprekinjena zanka
        (neskončen) ali kot odrezek, ki ga je treba pritrditi.
    brake_band_material_type:
      name: Vrsta materiala zavornega traku
      description: Določa funkcionalni material zavornega traku (npr. bombažna vrvica
        ali najlonska vrvica ali jeklena vzmet), kar vpliva na vzdržljivost, oprijem,
        raztegljivost in hrup.
    brake_band_style:
      name: Vrsta zavornega traku
      description: Opisuje sistem/vrsto napenjanja zavornega traku, ki se uporablja
        na kolovratu za napenjanje krilca/vretena.
    brake_bleeding_method:
      name: Metoda odzračevanja zavor
      description: Način odzračevanja, ki ga podpira komplet.
    brake_booster_assist_type:
      name: Tip pomožnega mehanizma ojačevalnika zavornega učinka
      description: Označuje pomožni mehanizem, ki ga uporablja ojačevalnik zavor.
    brake_booster_diaphragm_configuration:
      name: Konfiguracija diafragme ojačevalnika zavor
      description: Označuje število/vrsto diafragm, uporabljenih v ojačevalniku.
    brake_caliper_bleeder_screw_position:
      name: Položaj vijaka za odzračevanje zavorne čeljusti
      description: Določa položaj vijaka za odzračevanje na zavorni čeljusti, ko je
        nameščen (uporablja se za preverjanje, ali je vijak za odzračevanje usmerjen
        proti najvišji točki za pravilno odzračevanje).
    brake_caliper_finish:
      name: Končna obdelava zavorne čeljusti
      description: Opredeljuje površinsko obdelavo ali zaščitni premaz, ki je nanesen
        na ohišje zavorne čeljusti (npr. barva, prevleka, anodizirano).
    brake_caliper_included_hardware:
      name: Priložene komponente zavorne čeljusti
      description: Določa, kaj je vključeno v sklop čeljusti.
    brake_caliper_mount_type:
      name: Vrsta pritrditve zavorne čeljusti
      description: Vrsta montažnega vmesnika, ki se uporablja za pritrditev čeljusti
        na členek/nosilec.
    brake_caliper_paint_base_chemistry:
      name: Kemijska sestava barvne osnove za zavorne čeljusti
      description: Uporabljeni sistem barve/smole ali skupina kemijskih sestavin.
    brake_caliper_paint_kit_contents:
      name: Vsebina barvnega kompleta za zavorno čeljust
      description: Označuje, kaj je vključeno v paket poleg barve same.
    brake_circuit_type:
      name: Vrsta zavornega tokokroga
      description: Konfiguracija hidravličnega tokokroga, ki jo podpira glavni valj.
    brake_clutch_fluid_base_chemistry:
      name: Kemična sestava zavorne tekočine/tekočine sklopke
      description: Primarna kemična osnova hidravlične tekočine za zavoro/sklopko,
        ki vpliva na združljivost in možnost mešanja.
    brake_clutch_fluid_dot_specification:
      name: Specifikacija DOT tekočine za zavoro/sklopko
      description: Razvrstitev po standardu DOT za hidravlične tekočine za zavore
        ali sklopko (npr. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Zaključna obdelava/premaz zavornega bobna
      description: Površinska obdelava ali zaščitni premaz, nanesen na zavorni boben
        (npr. e-premaz, barvan, pocinkan).
    brake_drum_type:
      name: Vrsta zavornega bobna
      description: Vrsta izvedbe zavornega bobna (z integriranim pestom/ležajem ali
        brez njega).
    brake_fluid_base:
      name: Osnova zavorne tekočine
      description: Določa formulacijo zahtevane ali vključene hidravlične zavorne
        tekočine.
    brake_fluid_base_chemistry:
      name: Osnovna kemična sestava zavorne tekočine
      description: Določa osnovno kemično sestavo zavorne tekočine, ki določa združljivost
        in pravila mešanja.
    brake_fluid_dot_specification:
      name: Specifikacija DOT zavorne tekočine
      description: Označuje oceno/specifikacijo zavorne tekočine DOT (npr. DOT 3,
        DOT 4) za izdelke zavorne tekočine.
    brake_fluid_standards_compliance:
      name: Skladnost zavorne tekočine s standardi
      description: Industrijski standardi, ki naj bi jih zavorna tekočina izpolnjevala
        (poleg klasifikacije DOT).
    brake_fluid_type:
      name: Vrsta zavorne tekočine
      description: Določa zavorno tekočino, potrebno za hidravlične zavorne čeljusti
        kolesa.
    brake_hose_end_fitting_type:
      name: Vrsta priključka na koncu zavorne cevi
      description: Vrsta priključka na obeh koncih zavorne cevi (npr. očesni, razširjen,
        z notranjim/zunanjim navojem), ki zagotavlja združljivost s čeljustmi/vodi.
    brake_lever_pull_type:
      name: Vrsta vlečenja zavorne ročice
      description: Določa razmerje vleka kabla oziroma mehaniko, za katero je ročica
        zasnovana, s čimer se zagotovi združljivost z določenimi zavornimi čeljustmi
        (npr. obročne zavore ali v-zavore)
    brake_light_switch_actuation_type:
      name: Način aktivacije stikala zavornih luči
      description: Opredeljuje, kateri fizični dogodek sproži stikalo (pedal/bat v
        primerjavi ali hidravlični tlak itd.).
    brake_light_switch_connector_type:
      name: Vrsta priključka stikala zavornih luči
      description: Določa vrsto/format električnega povezovalnika, ki ga stikalo zavorne
        luči uporablja za povezavo s kabelskim snopom vozila.
    brake_light_switch_contact_type:
      name: Način aktivacije kontakta zavornih luči
      description: Konfiguracija/vedenje električnih kontaktov stikala zavorne luči
        (npr. normalno odprt/zaprt, preklopni ali večkrožni).
    brake_light_switch_mounting_style:
      name: Način montaže stikala zavorne luči
      description: Kako je stikalo zavorne luči nameščeno/pritrjeno na vozilo ali
        na zavorni sistem (npr. z navojem, sponko, nosilcem, vijakom banjo).
    brake_master_cylinder_mounting_type:
      name: Vrsta pritrditve glavnega zavornega cilindra
      description: Kako se glavni zavorni cilinder pritrdi na vozilo/ojačevalnik zavornega
        učinka (razpored vijakov/vrsta prirobnice).
    brake_master_cylinder_reservoir_type:
      name: Vrsta rezervoarja glavnega zavornega cilindra
      description: Vrsta/konfiguracija rezervoarja za zavorno tekočino, ki je dobavljen
        z glavnim zavornim valjem ali ga ta zahteva.
    brake_mount_type:
      name: Vrsta nosilca zavore
      description: Označuje zavorni vmesnik, vgrajen v vilice, da lahko kolesarji
        preverijo združljivost zavornega sistema.
    brake_mounting_flange_bolt_pattern:
      name: Vzorec prirobničnih vijakov za pritrditev zavore
      description: Določa razpored montažnih lukenj/vijakov na prirobnici, ki se uporablja
        za pritrditev nosilne plošče zavore ali nosilca zavorne čeljusti na os prikolice
        (npr. 4 vijaki).
    brake_pad_backing_plate_material:
      name: Material nosilne plošče zavornih ploščic
      description: Določa material nosilne plošče zavornih ploščic, kar vpliva na
        odvajanje toplote in težo.
    brake_pad_compatible_rotor_type:
      name: Tip rotorja, združljiv z zavornimi ploščicami
      description: Določa predvideno vrsto površine rotorja/diska, za katero je ploščica
        zasnovana.
    brake_pad_compound:
      name: Zmes zavornih ploščic
      description: Določa formulo tornega materiala zavorne ploščice.
    brake_pad_form_factor:
      name: Oblika zavornih ploščic
      description: Določa zavorni sistem/obliko, za katero je ploščica zasnovana (npr.
        kolut, boben, parkirna zavora).
    brake_pad_material:
      name: Material zavornih ploščic
      description: Določa skupino torne zmesi/materialov, ki se uporablja v oblogi
        zavornih ploščic.
    brake_pad_shim_included:
      name: Vključena podložka zavornih ploščic
      description: Označuje, ali so podložke za zmanjšanje hrupa priložene ali že
        vnaprej nameščene.
    brake_pad_wear_indicator_type:
      name: Vrsta indikatorja obrabe zavornih ploščic
      description: Označuje, kakšen indikator obrabe je priložen zavornim ploščicam
        (npr. mehanski opozorilni jeziček ali elektronski senzor).
    brake_position:
      name: Položaj zavore
      description: Označuje, kje na vozilu je predvidena namestitev zavorne komponente.
    brake_rotor_mount_type:
      name: Vrsta nosilca zavornega koluta
      description: Določa vmesnik, ki se uporablja za pritrditev zavornega rotorja
        na pesto (če je primerno).
    brake_service_kit_components_included:
      name: Vključene komponente kompleta za servis zavor
      description: Seznam orodij/adapterjev/potrošnega materiala, ki so vključeni
        v komplet za servis zavor.
    brake_shoe_friction_material:
      name: Torni material zavornih čeljusti
      description: Zmes za trenje/oblogo, uporabljena na zavorni oblogi (material,
        ki je v stiku z bobnom).
    brake_shoe_set_contents:
      name: Vsebina kompleta zavorne obloge
      description: Kaj je vključeno v paket (npr. samo obloge ali obloge s komponentami/vzmetmi).
    brake_system_type:
      name: Vrsta zavornega sistema
      description: Določa tehnologijo zavornega mehanizma, ki se uporablja za nadzor
        vrtenja tuljave med metanjem.
    brake_type:
      name: Vrsta zavore
      description: Vrsta mehanizma za zaviranje/napenjanje osnovnega valja.
    brandy_age_classification:
      name: Klasifikacije starosti žganja
      description: Razvršča žganje po standardnih oznakah kakovosti in starosti (npr.
        VS, VSOP, XO), ki odražajo minimalne zahteve glede zorenja.
    brass_cleaning_tool_type:
      name: Vrsta orodja za čiščenje trobil
      description: Določa vrsto orodja, ki se uporablja za čiščenje ali vzdrževanje
        trobil.
    brass_instrument_application_area:
      name: Področje uporabe trobil
      description: Deli trobila, za katere je namenjen razpršilo za razkuževanje.
    brass_instrument_care_kit_purpose:
      name: Namen kompleta za nego trobil
      description: Opisuje predvideni scenarij uporabe kompleta (redno vzdrževanje,
        temeljito čiščenje, potovanje/nujni primer, študentski začetni komplet itd.).
    brass_instrument_case_shell_material:
      name: Material ohišja kovčka za trobila
      description: Primarni material trdnega ohišja (če je primerno), ki je ločen
        od splošnega materiala kovčka.
    brass_instrument_lubricant_additives_features:
      name: Dodatki/lastnosti maziv za trobila
      description: Pomembne funkcionalne lastnosti formulacije maziva.
    brass_instrument_lubricant_base_composition:
      name: Osnovna sestava maziva za trobila
      description: Primarna osnova/kemijska sestava, ki se uporablja za maziva za
        trobila.
    brass_instrument_lubricant_viscosity_grade:
      name: Stopnja viskoznosti maziva za medeninaste instrumente
      description: Relativna gostota/teklost maziva, namenjenega za trobila.
    brass_instrument_replacement_part_type:
      name: Vrsta nadomestnega dela za trobila
      description: Navedite, za kakšen nadomestni del za trobila gre (komponente ventilov/potisnih
        cevi/vodnih ventilov, zamaškov/filci, zaščite itd.).
    brass_instrument_valve_configuration:
      name: Konfiguracija ventila za trobila
      description: Kako instrument spreminja višino tona (mehanizem ventila/potisnega
        dela).
    brass_lubricant_application_area:
      name: Območje uporabe lubrikanta za trobila
      description: Mehanizem trobila, za katerega je mazivo namenjeno.
    brass_mouthpiece_backbore:
      name: Notranjost ustnika za trobila
      description: Profil/kategorija notranjosti ustnika (oblika/velikost notranjosti),
        ki vpliva na ton in intonacijo.
    brass_mouthpiece_cup_depth:
      name: Globina skodelice ustnika trobila
      description: Globinska klasifikacija skodelice ustnika (kako globoka je skodelica),
        kar vpliva na ton in odziv.
    brass_polishing_cloth_abrasiveness_level:
      name: Stopnja abrazivnosti polirne krpe za trobila
      description: Kaže, kako močno krpo deluje pri odstranjevanju madežev v primerjavi
        z nežnim poliranjem.
    bread_crumb_base_ingredient:
      name: Osnovna sestavina za drobtine
      description: Označuje glavno sestavino, iz katere so narejene drobtine, kot
        so pšenica, riž, svinjska koža ali mandlji.
    bread_variety:
      name: Vrsta kruha
      description: Določa stil ali vrsto kruha ali žemljic, kar kupcu pomaga najti
        določene vrste (npr. brioche, bageta, naan).
    breadstick_style:
      name: Slog kruhovih palčk
      description: Določa poseben tradicionalni slog ali obliko kruhove palčke.
    bridge_head_material:
      name: Glavni material mosta
      description: Material, ki se uporablja izključno za glavo mostička in vpliva
        na težo, občutek ter vzdržljivost.
    bridge_head_type:
      name: Vrsta glave mostička
      description: Določa slog glave mostička in pomaga kupcu izbrati želeno obliko
        naslona za palico.
    bridle_part_type:
      name: Vrsta dela uzde
      description: Označuje konkretni del uzde, ki ga nadomestni izdelek predstavlja,
        s čimer strankam pomaga najti točno tisti del, ki ga potrebujejo.
    bridle_style:
      name: Slog uzde
      description: Klasificira celoten slog ali konstrukcijo uzde, tako da lahko jahači
        hitro najdejo opremo, ki ustreza njihovim potrebam ali disciplini.
    broadhead_field_point_attachment_style:
      name: Način pritrditve lovske konice ali športne konice
      description: Določa, kako se lovska ali športna konica pritrdi na steblo puščice.
    broadhead_thread_size:
      name: Velikost navoja lovske konice
      description: Navaja specifikacijo navoja, ki se uporablja za pritrditev lovske
        konice ali športne konice na puščico ali steblo.
    broadhead_tip_type:
      name: Vrsta lovske konice
      description: Opredeljuje obliko konice/končnika lovske konice, ki sproži penetracijo
        in vpliva na učinkovitost pri različnih vrstah divjadi.
    broccoli_cut:
      name: Del brokolija
      description: Določa, kako je bil brokoli narezan ali pripravljen pred pakiranjem
        (npr. cela glava, cvetovi, narezan).
    broccoli_variety:
      name: Sorta brokolija
      description: Določa specifično sorto ali tržno sorto brokolija (npr. tenderstem,
        romanesco).
    broom_head_material:
      name: Glavni material metle
      description: Opredeljuje sestavo materiala glave metle, ki vpliva na njeno vzdržljivost
        in igralne lastnosti.
    brush_format:
      name: Zasnova krtače
      description: Označuje fizično obliko krtače za smuči ali snežne deske, pri čemer
        razlikuje med ročnimi krtačami in rotacijskimi krtačami, ki se pritrdijo na
        vrtalnik, kot so rotacijski valji iz volne ali filca.
    brush_shape:
      name: Oblika krtače
      description: Opredeljuje fizično obliko ali profil telesa ali glave krtače,
        kar vpliva na površino stika in rokovanje z njo.
    brussel_sprout_preparation:
      name: Priprava brstičnega ohrovta
      description: Opisuje fizično pripravo ali način rezanja dobavljenega brstičnega
        ohrovta.
    brussels_sprout_variety:
      name: Sorta brstičnega ohrovta
      description: Določa kultivar ali sorto brstičnega ohrovta, vključno s sedanjimi
        in prihodnjimi sortami.
    bubble_blower_features:
      name: Značilnosti puhalnika mehurčkov
      description: Navaja pogoste funkcionalne značilnosti pihalnikov mehurčkov.
    bubble_gun_bubble_output_modes:
      name: Načini pihanja mehurčkov iz pištole za mehurčke
      description: Določa načine delovanja pištole za mehurčke, na primer način z
        enim mehurčkom, način neprekinjenega pihanja mehurčkov ali način z več hitrostmi.
    bubble_machine_features:
      name: Lastnosti naprave za mehurčke
      description: Poudarja skupne funkcionalne značilnosti naprav za mehurčke, ki
        presegajo njihovo osnovno delovanje.
    bubble_machine_items_included:
      name: Vključeni kosi k stroju za mehurčke
      description: Navaja ključne dele, ki so priloženi v škatli (npr. tekočina za
        mehurčke, dodatne palčke, trak za nošenje, daljinski upravljalnik).
    bubble_output_rate:
      name: Hitrost pihanja mehurčkov
      description: Označuje približno/kvalitativno hitrost nastajanja mehurčkov pri
        napravi za ustvarjanje mehurčkov (npr. nizka/srednja/visoka), vključno s tem,
        ali je zmogljivost nastavljiva.
    bubble_solution_container_type:
      name: Vrsta vsebnika tekočine za mehurčke
      description: Določa, kako se tekočina za mehurčke dovaja/uporablja v pištoli
        za mehurčke (npr. notranji rezervoar, pritrjena steklenica, ločen pladenj/potop).
    bubble_toy_included_accessories:
      name: Priloženi dodatki za igračo z mehurčki
      description: Navaja običajne kose, ki so priloženi igrači za ustvarjanje mehurčkov
        (npr. steklenička z raztopino, pladenj, nadomestne palčke).
    buckwheat_processing_method:
      name: Metoda predelave ajde
      description: Opisuje postopek obdelave ajde pred prodajo (npr. praženje, kaljenje,
        napihovanje).
    buckwheat_product_form:
      name: Oblika izdelka iz ajde
      description: Fizična oblika, značilna za ajdo, ki zajema oblike, ki niso vključene
        v splošni seznam (npr. kosmiči, ekspandirani izdelki, vrečke za takojšnjo
        pripravo).
    bug_collecting_kit_items_included:
      name: Priloženi izdelki kompleta za zbiranje žuželk
      description: Orodja in izobraževalno gradivo, vključeno v komplet za iskanje
        napak v sistemu.
    built_in_storage_type:
      name: Vrsta vgrajenega shranjevanja
      description: Opisuje vrste prostora za shranjevanje, vgrajenega v okvir pogradov
        (npr. predali, police, prostor za shranjevanje v stopnicah).
    bumper_finish:
      name: Končna obdelava odbijača
      description: Določa površinski premaz ali končno obdelavo, ki se nanese na odbijač.
    bumper_sensor_cutouts:
      name: Izrezi na odbijaču za senzorje
      description: Pokaže, katere odprtine/izreze za vgradnjo OEM ima odbijač ali
        podpira.
    bunk_bed_configuration:
      name: Konfiguracija pograda
      description: Označuje kombinacijo strukturne nastavitve in velikosti vzmetnice
        pograda.
    buoyancy:
      name: Buoyancy
      description: Označuje, kako se vaba obnaša v vodnem stolpu, na primer ali plava,
        potone ali ostane v lebdečem položaju.
    burkini_pieces_included:
      name: Priloženi deli za burkini
      description: Naštete so sestavne dele oblačila, ki so vključene v komplet burkinija,
        da kupci natančno vedo, kaj kupujejo.
    burn_rate:
      name: Burn rate
      description: Opisuje, kako hitro gori papir za zvijanje, ko ga prižgemo.
    bus_model_type:
      name: Tip modela avtobusa
      description: Določa konfiguracijo/tip avtobusa v resničnem svetu, ki ga predstavlja
        maketa (karoserija/razred uporabe).
    bust_design:
      name: Zasnova prsnega dela
      description: Opisuje konfiguracijo prsnega predela in pokritost izreza vratu
        (npr. odprte prsi, vgrajen modrček, globok izrez).
    butter_variety:
      name: Sorta masla
      description: Določa način proizvodnje ali določeno vrsto masla, kot so kultivirano
        maslo, sladka smetana, evropsko maslo, prečiščeno maslo (ghee) ali sirotkino
        maslo.
    buttermilk_variety:
      name: Vrsta pinjenca
      description: Določa specifično vrsto ali obliko pinjenca, ki se prodaja (npr.
        kultiviran, tradicionalni, v prahu).
    button_application:
      name: Uporaba gumba
      description: Označuje predvideno uporabo ali vrsto projekta za gumb (npr. oblačila,
        oblazinjenje).
    button_attachment_type:
      name: Vrsta pritrditve gumba
      description: Opredeljuje konstrukcijo gumba za pritrditev na tkanino (npr. luknje
        za prešivanje ali pecelj), ne pa načina zapiranja.
    button_finish:
      name: Končna obdelava gumba
      description: Opisuje površinsko obdelavo/videz gumba (npr. mat ali sijajni).
    buttonhole_elastic_application:
      name: Aplikacija z elastiko za gumbnice
      description: Primarna predvidena uporaba/aplikacija za prepogljivo okrasno elastiko.
    cab_type:
      name: Vrsta taksija
      description: Določa konfiguracijo kabine tovornjaka.
    cabasa_construction_type:
      name: Vrsta konstrukcije cabase
      description: Določa fizično konstrukcijo/slog telesa cabase in sklopa verižice/biserov.
    cabbage_variety:
      name: Sorta zelja
      description: Navedite sorto ali vrsto zelja (npr. zeleno, kitajsko, savojsko),
        da lahko kupci izbirajo glede na okus, teksturo in kulinarično uporabo.
    cabinet_door_style:
      name: Slog vrat omare
      description: Opredeljuje vizualno obliko vratne plošče omarice, na primer v
        slogu Shaker ali z reliefno ploščo, da se bolje prilega estetiki kuhinje.
    cabinet_overlay_type:
      name: Stil prekrivanja vrat
      description: Določa, kako se vrata prekrivajo ali prilegajo glede na okvir omare.
    cable_end_type:
      name: Vrsta zaključka kabla
      description: Opisuje obliko ali izvedbo končnega nastavka ali priključka kabla,
        ki se povezuje z zavorno ročico ali ročico za prestavljanje.
    cable_housing_construction:
      name: Konstrukcija ovoja kabla
      description: Opisuje konstrukcijo ovoja – na primer za navijanje brez stiskanja
        ali s segmentiranimi členi –, kar vpliva na odpornost proti stiskanju, prožnost
        in občutek pri vožnji.
    cable_housing_liner_type:
      name: Tip notranjosti ovoja kabla
      description: Navaja, ali ovoj vsebuje notranjo oblogo in/ali je bilo obdelano
        z mazivom, ter kateri material ali tehnologija sta bila uporabljena, saj to
        vpliva na zmanjšanje trenja in odpornost proti vremenskim vplivom.
    cable_management_type:
      name: Vrsta upravljanja kablov
      description: Določa vrsto vgrajenih funkcij za upravljanje kablov ali napajanja,
        ki jih ponuja konferenčna miza.
    cable_surface_treatment:
      name: Obravnava površine kabla
      description: Označuje morebitni poseben premaz ali končno obdelavo kabla za
        zmanjšanje trenja ali zaščito pred korozijo.
    cabochon_back_type:
      name: Zadnja stran kabošona
      description: Označuje zadnji profil/končno obdelavo kabošona, kar vpliva na
        načine namestitve/lepljenja in združljivost.
    cacao_bean_variety:
      name: Sorta kakavovega zrna
      description: Določa botanično sorto ali kultivar uporabljenih kakavovih zrn.
    cacao_roast_level:
      name: Stopnja praženja kakava
      description: Opisuje stopnjo praženja kakava pred mletjem.
    cage_package_type:
      name: Vrsta paketa kletke
      description: Določa, katere komponente so vključene v nakup (npr. samo mreža,
        komplet okvirja, celoten paket).
    cajon_body_shell_material:
      name: Material telesa/korpusa cajona
      description: Označuje material telesa/korpusa cajona (brez tape).
    cajon_corner_control_system:
      name: Sistem za nadzorovanje kotov cajona
      description: Določa, ali cajon omogoča nastavitev zvoka v vogalih (npr. z vijaki
        v vogalih), da se spremeni odziv pri udarjanju.
    cajon_corner_edge_design:
      name: Oblika vogalov/robov cajona
      description: Opisuje konstrukcijo vogalov/robov, ki vpliva na udobje in igralnost.
    cajon_feet_type:
      name: Vrsta podstavkov za cajon
      description: Določa vrsto podstavkov na cajonu, kar vpliva na stabilnost in
        resonanco.
    cajon_snare_adjustability:
      name: Nastavljivost sistema snare cajona
      description: Označuje, ali in kako je mogoče prilagoditi učinek sistema snare
        (napetost, zategovanje ali oboje).
    cajon_snare_system_type:
      name: Vrsta sistema snare cajona
      description: Določa notranji mehanizem sistema snare, ki se uporablja za ustvarjanje
        učinka snare.
    cake_shape:
      name: Oblika torte
      description: Opisuje obliko, v kateri se kavna torta speče.
    cake_topping:
      name: Okras za torto
      description: Označuje glavni okras ali preliv, ki se nanese na kavno torto.
    cake_type:
      name: Vrsta torte
      description: Opisuje slog ali vrsto torte (npr. kolač, biskvitna, cheesecake).
    caliper_mount_type:
      name: Vrsta pritrditve čeljusti
      description: Opredeljuje standard vpetja na okvir ali vilice, ki ga uporablja
        zavorna čeljust (npr. Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Standard montaže čeljusti
      description: Določa vgradni vmesnik/standard (npr. Flat Mount, Post Mount, IS
        itd.), ki se uporablja za pritrditev zavorne čeljusti na okvir ali vilice
        kolesa.
    camera_mounting_location_vehicle_exterior:
      name: Mesto namestitve kamere (zunanjost vozila)
      description: Kje naj bi bile kamere nameščene na vozilu (npr. na sprednjem žrelu,
        zadku, stranskih ogledalih).
    camouflage_environment_type:
      name: Vrsta kamuflažnega okolja
      description: Označuje primarno okolje, za katero je kamuflažni vzorec zasnovan,
        kot je gozd, puščava ali močvirje.
    camping_oil_application:
      name: Aplikacija olja za kampiranje
      description: Določa primarno predvideno uporabo olja v kontekstu kampiranja
        (npr. gorivo za svetilke ali gorivo za štedilnik).
    camshaft_construction:
      name: Konstrukcija odmične gredi
      description: Izdelava/izvedba odmične gredi.
    camshaft_material:
      name: Material odmične gredi
      description: Primarni material jedra/gredi odmične gredi (osnovni material).
    camshaft_position:
      name: Položaj odmične gredi
      description: Določa predvideno lokacijo/vrsto odmične gredi v motorju (npr.
        sesalna ali izpušna ali določena banka/položaj motorja).
    candle_container_type_included:
      name: Priložena je posoda za sveče
      description: Določa vrsto posod za sveče, ki so priložene kompletu, če so vključene.
    candle_dye_form:
      name: Oblika barvila za sveče
      description: Določa fizično obliko barvila za sveče, ki se uporablja pri izdelavi
        sveč.
    candle_fragrance_form:
      name: Zasnova dišave za sveče
      description: Določa vrsto/zasnovo sestavine dišave, namenjene izdelavi sveč.
    candle_making_tool_type:
      name: Vrsta orodja za izdelavo sveč
      description: Določa, za kakšno orodje za izdelavo sveč gre pri izdelku (npr.
        lonček za izlivanje, orodje za centriranje stenja, termometer).
    candy_texture:
      name: Tekstura sladkarije
      description: Opisuje občutek v ustih ali konsistenco bonbona, neodvisno od okusa
        ali oblike.
    candying_method:
      name: Metoda kandiranja
      description: Opisuje, kako je bilo sadje kandirano ali konzervirano s sladkorjem
        (npr. kristalizirano, glazirano, v sirupu).
    canned_meat_form:
      name: Oblika konzerviranega mesa
      description: Opredeljuje obdelano obliko ali videz mesa v embalaži.
    canoe_construction_type:
      name: Vrsta konstrukcije kanuja
      description: Razlikuje med vrstami izdelave trupa kanuja, kot so trda lupina,
        napihljiv in zložljiv.
    canoe_hull_shape:
      name: Oblika trupa kanuja
      description: Opredeljuje primarni presek trupa ali profil dna, kar vpliva na
        stabilnost in vodljivost.
    canoe_stern_design:
      name: Zasnova krme kanuja
      description: Določa slog krme trupa, kar vpliva na združljivost motorjev in
        vodljivost.
    canopy_type:
      name: Vrsta nadstreška
      description: Opisuje vrsto nadstreška ali strešne kritine, ki je priložena postelji
        kabani.
    canvas_compatible_media:
      name: Mediji, združljivi s platnom
      description: Označuje, za kateri umetniški/ustvarjalni medij je platno namenjeno
        uporabi.
    canvas_format:
      name: Format platna
      description: Označuje, ali se platno za tiskanje prodaja v obliki listov, zvitkov
        ali vnaprej narezanih platen.
    canvas_mounting_format:
      name: Format/namestitev platna
      description: Fizična oblika/način pritrditve platna.
    canvas_stretcher_assembly_type:
      name: Vrsta sklopa držala platna
      description: Ali se držala prodajajo sestavljena kot okvir ali kot palice/kompleti,
        ki jih je treba sestaviti.
    canvas_stretcher_corner_joint_type:
      name: Vrsta vogalnega spoja za napenjalcev za platna
      description: Kako so vogali napenjalcev povezani/izdelani (npr. z zatiči in
        utori, z medsebojnimi spoji, s sponkami, s ključnimi spoji).
    canvas_surface_tone:
      name: Ton površine platna
      description: Osnovni odtenek/barva površine platna, ki je bila pripravljena
        z osnovnim premazom (podlaga), ne pa kakršen koli natisnjen motiv ali vzorec
        (npr. bela, črna, tonirana).
    canvas_weave_type:
      name: Vrsta tkanja platna
      description: Opisuje tkanje površine platna, ki vpliva na teksturo in nanašanje
        barve.
    cap_attachment_style:
      name: Slog namestitve kapice
      description: Opredeljuje način izdelave/pritrditve pokrovčka ustnika saksofona,
        kar lahko vpliva na zaščito in prileganje v kovček.
    cap_construction:
      name: Konstrukcija kapice
      description: Opisuje, kako je izdelana podlaga za lasuljo (npr. s čipkastim
        sprednjim delom, v celoti iz čipke, ročno vezana), kar vpliva na realističnost,
        udobje in raznolikost stiliranja.
    cap_crown_structure:
      name: Struktura vrha kape s šiltom
      description: Označuje, ali je vrh kape s šiltom strukturiran (ojačan) ali nestrukturirana
        (mehek).
    cap_fit_type:
      name: Vrsta prileganja kapice
      description: Določa, kako se kapa prilega ali prilagaja glavi uporabnika (npr.
        prilagojena ali nastavljiva).
    cap_seal_type:
      name: Vrsta tesnila pokrova
      description: Označuje tesnilni element, ki se uporablja za preprečevanje uhajanja
        olja in izstopanja hlapov (npr. O-obroček, tesnilo).
    cap_size:
      name: Velikost pokrovčka
      description: Nalepke standardnih velikosti, ki navajajo splošno velikost glave,
        primerno za lasuljo.
    cap_type:
      name: Vrsta kapice
      description: Vrsta vmesnika pokrova/zapirala, ki se uporablja na prelivnem rezervoarju.
    caper_size_grade:
      name: Razred velikosti kaper
      description: Kapre razvršča po industrijskih standardnih imenih razredov, ki
        ustrezajo premeru popka.
    capo_clamping_mechanism:
      name: Mehanizem za namestitev kapodastra
      description: Določa način pritrditve/uporabe, s katerim se izvaja pritisk na
        strune (način delovanja kapodastra).
    capo_finish:
      name: Zaključek kapodastra
      description: Površinska obdelava telesa kapodastra (vizualna/na otip), neodvisna
        od barve (npr. mat ali sijajna).
    capo_fit_type:
      name: Vrsta prileganja kapodastra
      description: Določa profil vratu, za katerega je kapodaster namenjen (vključno
        z radijem/ravnostjo), kar vpliva na pritrditev brez šumenja in intonacijo.
    capo_pad_material:
      name: Material blazinice kapice
      description: Določa material kontaktne blazinice, ki se dotika strun/ubiralke
        (vpliva na oprijem, stabilnost uglaševanja in morebitno zaključno oznako).
    capo_tension_mechanism:
      name: Mehanizem za napenjanje kapodastra
      description: Določa, kako se na strune pri drsnem kapodastru izvaja in prilagaja
        pritisk/napetost.
    capture_method:
      name: Metoda ujemanja
      description: Označuje, ali je past namenjena za ulov živih živali ali za smrtonosni
        učinek.
    car_ev_conversion_kit_motor_type:
      name: Tip motorja v kompletu za predelavo avtomobila v električno vozilo
      description: Določa tehnologijo trakcijskega motorja, ki je vključena v komplet
        za predelavo ali jo ta zahteva (npr. indukcijski motor na izmenični tok ali
        motor s trajnimi magneti).
    car_playset_items_included:
      name: Vključeni kosi v avtomobilskem igralnem kompletu
      description: Naštete so glavni sestavni deli, ki so vključeni v avtomobilski
        igralni komplet poleg osnovne konstrukcije (npr. avtomobilčki, figurice, prometni
        znaki).
    car_shampoo_application_method:
      name: Metoda nanašanja avtomobilskega šampona
      description: Kako naj bi se šampon nanašal med pranjem.
    car_wash_solution_form:
      name: Obrazec za naročilo storitve avtopralnice
      description: Določa fizično obliko raztopine za pranje avtomobila (npr. tekočina,
        pena, robčki).
    car_wash_solution_scent:
      name: Vonj raztopine za pranje avtomobila
      description: Določa vonj/dišavo raztopine za pranje avtomobila (če je odišavljena).
    carbonated_water_variety:
      name: Vrsta gazirane vode
      description: Razvršča gazirano vodo na podlagi običajnih vrst in formulacije
        (npr. tonik, seltzer, funkcionalna gazirana voda).
    carbonation:
      name: Karbonizacija
      description: Opisuje stopnjo ali vrsto gaziranosti v pijači (npr. brez mehurčkov,
        rahlo gazirana, gazirana, nitro).
    carburetor_barrel_count:
      name: Število valjev uplinjača
      description: Označuje število odprtin/cevi za plin v uplinjaču.
    carburetor_choke_type:
      name: Vrsta dušilne lopute uplinjača
      description: Označuje način aktiviranja dušilne lopute, ki ga uporablja uplinjač.
    carburetor_mounting_flange_type:
      name: Tip prirobnice za montažo uplinjača
      description: Določa slog vmesnika za pritrditev uplinjača, da se zagotovi prileganje
        sesalnemu kolektorju/razdelilniku (npr. navojni priključek ali pritrditev
        s prirobnico/vijaki).
    card_binder_page_type:
      name: Vrsta strani mape za shranjevanje kartic
      description: 'Za mape/portfolie: vrsta strani, ki se uporabljajo za shranjevanje
        kartic.'
    card_box_holder_type:
      name: Vrsta škatlice/držala za kartice
      description: Opredeljuje obliko izdelka, namenjenega zbiranju ali shranjevanju
        kartic na dogodku (npr. škatla, škatla v obliki poštnega nabiralnika, košara,
        stojalo za shranjevanje).
    card_game_accessory_features:
      name: Značilnosti dodatkov za igro s kartami
      description: Pomembne funkcionalne lastnosti dodatkov za igro s kartami.
    card_lot_type:
      name: Vrsta lota kartice
      description: Označuje, ali je izdelek ena sama kartica ali lot/asortiment z
        več karticami.
    card_sleeve_size_format_compatibility:
      name: Velikost/združljivost formata ovitka kartice
      description: Določa velikost kartice, za katero so zasnovani ovitki/strani/škatle.
    carding_surface_pin_material:
      name: Material zobcev za mikanje
      description: Material zobcev, ki se uporablja za česanje in zrahljanje vlaken.
    care_durability:
      name: Trajnost nege
      description: Označuje pričakovano odpornost etikete proti pranju in toploti
        po namestitvi.
    care_label_attachment_type:
      name: Vrsta pritrditve etikete za nego
      description: Za kakšno namestitev na kos je etiketa za nego zasnovana (npr.
        všivanje, likanje/toplotni nanos, z lepilom).
    care_label_format:
      name: Oblika etikete za nego
      description: Fizična/tiskana oblika etikete za nego izdelka.
    care_label_symbol_system:
      name: Sistem simbolov etikete za nego
      description: Standardi/nabor simbolov, uporabljeni na etiketi (npr. simboli
        za nego ISO, simboli ASTM/US).
    cargo_area_configuration:
      name: Konfiguracija tovornega prostora
      description: Določa strukturni slog ali lokacijo tovornega prostora na tovornem
        kolesu (npr. podaljšan zadek, kolo s sprednjim nakladalnikom, tricikel).
    cargo_net_adjustability:
      name: Nastavljivost tovorne mreže
      description: Označuje, ali in kako je mogoče prilagoditi napetost/prileganje
        tovorne mreže.
    cargo_net_position:
      name: Položaj tovorne mreže
      description: Na katerem mestu v prtljažniku naj bi se mreža namestila ali delovala.
    cargo_net_stretch_type:
      name: Vrsta raztegljive tovorne mreže
      description: Ali je mreža za prtljago elastična/raztegljiva ali fiksna/neraztegljiva.
    cargo_net_style:
      name: Stil tovorne mreže
      description: Določa način izdelave ali obliko tovorne mreže (npr. elastična
        vrvica, trak, mrežasta, pregradna, viseča mreža).
    cargo_rack_finish:
      name: Končna obdelava prtljažnika za tovor
      description: Zunanja površinska obdelava/premaz prtljažnika za tovor.
    carpet_cleaner_application_method:
      name: Metoda aplikacije čistila za preproge
      description: Opisuje predvideni način nanašanja izdelka in vnašanja v preprogo
        (poleg splošne oblike).
    carrier_style:
      name: Slog nosilca
      description: Nosilni mehanizem/slog, ki se uporablja za podporo čolna na vozilu.
    carrot_size:
      name: Velikost korenja
      description: Klasificira splošno velikost korenja.
    carrot_variety:
      name: Sorta korenja
      description: Določa specifično sorto ali kultivar korenja.
    carrying_capacity_pairs_boards:
      name: Nosilnost (pari/plošče)
      description: Navaja količino smuči (parov) ali snežnih desk, ki jih lahko nosi
        ali za katero je namenjen določen dodatek, kadar se uporablja skupaj z nosilcem
        (npr. podaljški).
    cartridge_thread_compatibility:
      name: Združljivost kartušnih navojev
      description: Označuje standard navoja, ki ga podpira vaporizator ali baterija,
        s čimer se zagotovi fizična združljivost kartuš in baterij.
    case_capacity_butts_shafts:
      name: Prostornina kovčka (kapice × palice)
      description: Določa, koliko biljardnih kapic in palic lahko sprejme kovček,
        izraženo v obliki »konice-držala« (npr. 2x4 = 2 kapici in 4 palice).
    case_features:
      name: Lastnosti etuija
      description: Poudarja funkcionalne lastnosti kovčka za činele/bobne, ki se nanašajo
        na zaščito in prevoz.
    case_humidifier_refill_type:
      name: Vrsta polnila za vlažilnik zraka
      description: Označuje, ali vlažilnik uporablja ponovno uporabne (ponovno navlažljive/regenerativne)
        vložke ali zamenljive vložke za enkratno uporabo.
    case_lining_material:
      name: Material notranje obloge etuija
      description: Označuje primarni material, ki obdaja notranjost kovčka ali torbe
        in se dotika instrumenta ali vsebine ter ga ščiti.
    case_material:
      name: Material etuija
      description: Označuje osnovni material ohišja ure, ki vpliva na njegovo vzdržljivost,
        težo in videz.
    case_mounting_method:
      name: Način montaže ohišja
      description: Kako naj bi bil vlažilec zraka nameščen ali pritrjen v ohišju instrumenta.
    case_structure:
      name: Struktura ohišja
      description: Označuje togost konstrukcije ohišja.
    case_style_cymbal_drum:
      name: Slog kovčka (činele/boben)
      description: Določa, ali je izdelek mehka torba, trd kovček ali hibridna zasnova
        za prevoz činel ali bobnov.
    casing_material:
      name: Material ohišja
      description: Opisuje glavno tkanino, uporabljeno v ohišju pnevmatike, ki vpliva
        na težo, vozne lastnosti in zaščito pred predrtjem.
    casino_set_chip_material:
      name: Material za čipe v igralnici
      description: Primarni material vključenih čipov (če je primerno).
    casino_set_layout_included:
      name: Vključena postavitev igralniškega kompleta
      description: Določa, kakšna igralna površina/postavitev je vključena v komplet.
    cask_finish:
      name: Zaključna obdelava soda
      description: Določa sod ali sodček, ki se uporablja za dodelavo ali zorenje
        žgane pijače, na primer sod za burbon ali sod za šeri.
    cassava_variety:
      name: Sorta manioke
      description: Določa specifično sorto ali kultivar juke/manioke, ki je na voljo,
        kar vpliva na okus, barvo in kuhalne lastnosti.
    cassette_body_type:
      name: Tip ohišja verižnika
      description: Standard račne ali gonilnika, ki ga podpira zadnje kolo ali pesto
        (npr. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Nabor funkcij kasetnega predvajalnika
      description: Označuje funkcije za prenos in predvajanje kaset, ki so skupne
        kasetofonom, vgrajenim v armaturno ploščo.
    cassette_speed_compatibility:
      name: Združljivost hitrosti kasete
      description: Označuje število prestav (npr. 7-stopenjska, 12-stopenjska), za
        katere je verižnik ali verižnik s prostim tekom zasnovan, kar zagotavlja združljivost
        verige, prestavne ročice in menjalnika.
    castanet_shell_size_class:
      name: Razred velikosti ploščic kastanjet
      description: Standardiziran razred velikosti za ploščice kastanjet, ki ga igralci/učitelji
        pogosto uporabljajo za izbiro prileganja in tona.
    castanets_included_pieces:
      name: Vključeni kosi v kastanjete
      description: Označuje, kaj je vključeno v ponudbo izdelka (par ali posamezen
        kos, plus dodatki).
    castanets_pitch:
      name: Tonska višina kastanjet
      description: Označuje običajno oznako višine tona, ki jo proizvajalci uporabljajo
        za opis zvočnega razpona.
    castanets_type:
      name: Vrsta kastanjet
      description: Določa slog kastanjet ali kategorijo predvidene uporabe.
    caster_type:
      name: Vrsta kolesca
      description: Določa vrsto kolesc ali koles, nameščenih na voziček (npr. vrtljiva,
        zaklepna), kar se nanaša na okretnost in stabilnost.
    castle_playset_included_items:
      name: Vključeni kosi igralnega kompleta z gradom
      description: Prikazuje glavne sestavne dele, vključene v komplet z gradom, da
        lahko kupci primerjajo različne komplete (npr. figurice, pohištvo, vozila,
        dodatki).
    catcher_equipment_included:
      name: Priložena oprema za lovilce
      description: Določa komponente, ki so vključene v komplet opreme lovilca, kot
        sta lovilčeva čelada ali ščitnik za prsi.
    catcher_helmet_style:
      name: Slog čelade lovilca
      description: Označuje celoten slog oblikovanja zaščitnega pokrivala lovilca.
    cattle_breed:
      name: Pasma goveda
      description: Določa pasmo goveda, iz katere je bilo pridobljeno goveje meso
        (npr. angus, wagyu, hereford).
    cauliflower_variety:
      name: Sorta cvetače
      description: Določa kultivar, barvo ali posebno sorto cvetače, ki se prodaja.
    celery_form:
      name: Oblika zelene
      description: Določa fizično obliko ali način reza, v katerem se zelena prodaja.
    celery_variety:
      name: Vrsta zelene
      description: Zabeleži specifično sorto ali kultivar zelene, kar omogoča izbiro
        glede na okusni profil, barvo ali kulinarično uporabo.
    cereal_bar_texture:
      name: Tekstura žitne ploščice
      description: Opisuje občutek v ustih in konsistenco žitne ploščice (npr. žvečljiva,
        hrustljava).
    cereal_type:
      name: Vrsta žita
      description: Razvršča obliko ali format kosmičev ali granole (kosmiči, blazinice,
        granola v kepah, müsli itd.), da kupec lažje najde želeno teksturo ali način
        priprave.
    certificate_border_style:
      name: Slog obrobe certifikata
      description: Opisuje dekorativni rob, uporabljen na certifikatu.
    certificate_personalization_type:
      name: Vrsta prilagajanja certifikata
      description: Določa, kako je mogoče certifikat prilagoditi (neizpolnjeno za
        ročno pisanje, predloga za tiskanje, vnaprej natisnjeno s spremenljivimi polji
        itd.).
    certification_service:
      name: Storitev certificiranja
      description: Zunanje podjetje za ocenjevanje/certificiranje (če je to ustrezno).
    certification_standard:
      name: Standard certificiranja
      description: Določa certifikat o varnosti in požarni odpornosti ali standard
        skladnosti, ki ga mora balaklava izpolnjevati.
    chain_coating_finish:
      name: Premaz/končna obdelava verige
      description: Opisuje kakršno koli površinsko obdelavo ali končno obdelavo verige,
        ki je namenjena povečanju trajnosti, zmanjšanju trenja, preprečevanju korozije
        ali spreminjanju videza (npr. titanov nitrid, DLC, nikelj, nerjavni EPT).
    chain_connection_type:
      name: Vrsta zaključkov verige
      description: Določa metodo zaključevanja, ki je na voljo ali potrebna za spajanje
        koncev verige.
    chain_tier_configuration:
      name: Konfiguracija verige
      description: Določa število/razpored verig v lovilnem sklopu (enojna, dvojna
        ali trojna veriga).
    chain_tool_type:
      name: Vrsta verižnega orodja
      description: Klasificira določeno vrsto orodja za verigo kolesa, tako da lahko
        kupec hitro najde pravilno napravo.
    chainring_shape:
      name: Oblika verižnega obroča
      description: Označuje obliko verižnega obroča, na primer okrogla ali ovalna/eliptična.
    chair_accessories_included:
      name: Priloženi dodatki za stol
      description: Navaja vgrajene ali priložene dodatke, ki izboljšajo funkcionalnost
        stola.
    chair_sash_care_instructions:
      name: Navodila za nego okrasja stola
      description: Opisuje priporočeno metodo čiščenja/vzdrževanja okrasja stola.
    chair_sash_finish:
      name: Končna obdelava okrasja stola
      description: Opisuje površinski sijaj/zaključno obdelavo tkanine okrasja.
    chair_storage_design:
      name: Zasnova hrambe stolov
      description: Označuje, kako naj se shranjuje prožni stol (npr. zložljiv, zložljiv
        en na drugega, nezložljiv), da bi stranke lažje ocenile shranjevanje in prenosljivost.
    chaise_or_sectional_orientation:
      name: Usmeritev počivalnika ali podaljška
      description: Določa stran, na kateri se nahaja vgrajen počivalnik ali podaljšek,
        ko gledamo proti kavču.
    chamber_size:
      name: Velikost komore
      description: Označuje velikost/prostornino komore ustnika, kar vpliva na upornost
        in barvo tona.
    chanter_finger_spacing:
      name: Razmik med prsti na piščalki za dude
      description: Označuje razmik med prsti/profil velikosti na piščalki za dude
        (pogosto opisan kot standardne, majhne dlani ali velike dlani).
    chanter_type:
      name: Vrsta piščalke za dude
      description: Vrsta/konfiguracija piščalke za dude , ki je priložena instrumentu
        (ali se uporablja na instrumentu), na primer z odprtim ali zaprtim koncem,
        za vaje ali s tipkami.
    chard_variety:
      name: Sorta blitve
      description: Določa specifično sorto ali barvno različico blitve, ki se prodaja.
    charging_port_location:
      name: Lokacija priključka za polnjenje
      description: Fizična lokacija glavne zunanje vtičnice za polnjenje vozila (priključek
        za polnjenje)
    chassis_construction_type:
      name: Vrsta konstrukcije šasije
      description: Opisuje primarno metodo konstrukcije šasije, ki se uporablja za
        vozilo.
    checkbook_loading_orientation:
      name: Orientacija ovitka čekovne knjižice
      description: Označuje, ali je ovitek za čekovno knjižico združljiv z oblikami
        čekov z vstavljanjem od zgoraj, od strani ali z univerzalnimi oblikami.
    cheekpiece_style:
      name: Slog ličnikov
      description: Določa vrsto konfiguracije ličca/obroča na brzdi, ki določa funkcionalnost
        vajeti in bočno stabilnost.
    cheese_alternative_form:
      name: Alternativna oblika sira
      description: Določa fizično obliko ali rez, v katerem se prodaja alternativa
        sira.
    cheese_form:
      name: Oblika sira
      description: Opisuje fizično predstavitev sirovega izdelka (npr. kolo, blok,
        narezan, nariban).
    cheese_texture:
      name: Tekstura sira
      description: Sir razvršča glede na njegovo splošno teksturo ali čvrstost.
    cheese_variety:
      name: Sorta sira
      description: Določa sorto sira, ki se uporablja kot glavna aroma v prigrizku.
    cherimoya_variety:
      name: Sorta čerimoje
      description: Določa specifično sorto/kultivar čerimoje (npr. fino de jete, el
        bumpo).
    cherry_variety:
      name: Vrsta češnje
      description: Določa kultivar ali sorto češenj, kar kupcu pomaga izbrati posebne
        vrste, znane po okusu, barvi, velikosti ali predvideni kulinarični uporabi.
    chest_pocket_style:
      name: Slog prsnega žepa
      description: Določa prisotnost in razporeditev prsnih žepov na srajci.
    chewing_tobacco_form:
      name: Oblika žvečilnega tobaka
      description: Določa fizično obliko, način reza ali velikost vrečke tobačnega
        izdelka za žvečenje (npr. ohlapen list, dolg rez, ozka vrečka).
    chicory_variety:
      name: Sorta cikorije
      description: Navedite konkretno sorto ali kultivar prodajane radičice cikorije
        (npr. radicchio, belgijska endivija, escarole).
    chiffon_recommended_use:
      name: Priporočena uporaba šifona
      description: Primarna priporočena uporaba tkanine šifon pri šivanju/ustvarjanju.
    child_seat_accessory_type:
      name: Vrsta dodatne opreme za otroški sedež
      description: Opredeljuje konkretno vrsto dodatka ali nadomestnega dela za otroški
        avtomobilski sedež (npr. sedežna blazina, opora za noge, pritrdilni adapter),
        kar kupcem omogoča, da hitro poiščejo izdelek, ki ga potrebujejo, ne da bi
        bilo treba ustvarjati številne podkategorije.
    child_seat_mounting_type:
      name: Vrsta pritrditve otroškega sedeža
      description: Določa, kako se otroški sedež kolesa pritrdi na okvir kolesa, stojalo
        ali kokpit.
    chime_sound_character:
      name: Zvočni značaj zvončka
      description: Opisuje predvideni zvočni značaj/barvo zvončkov.
    chin_cup_type:
      name: Vrsta podbradnika
      description: Določa slog ali konstrukcijo podbradnika, kar vpliva na udobje
        in zaščito pred udarci.
    chin_strap_type:
      name: Vrsta bradnega pasu
      description: Določa vrsto traku podbradnika pri klobuku – brez traku, fiksni,
        nastavljivi ali snemljivi –, da kupcem pomaga izbrati modele, ki ostanejo
        na mestu tudi v vetrovnih razmerah ali pri aktivnih dejavnostih.
    china_cymbal_edge_shape:
      name: Oblike kitajskih činel
      description: Opisuje profil roba/prirobnice, značilen za kitajske činele (koliko
        navzgor je obrnjen rob), kar vpliva na občutek in zvok.
    china_cymbal_sound_character:
      name: Zvočni značaj kitajskih činel
      description: Osnovni opisniki zvočnega/tonalnega značaja kitajskih činel, ki
        se uporabljajo za iskanje in filtriranje (npr. »udaren«, »temen«, »svetel«).
        Velja lahko več vrednosti.
    chinstrap_type:
      name: Vrsta traku podbradnika
      description: Vrsta traku podbradnika, priloženega čeladi.
    chip_cut_style:
      name: Slog rezanja čipsa
      description: Določa fizični rez ali teksturo čipsa (npr. rebrast, kuhan v kotlu,
        pokast).
    chip_denomination:
      name: Vrednosti žetonov
      description: Katere vrednosti žetonov so vključene v komplet (natisnjene ali
        dodeljene).
    chocolate_form:
      name: Oblika čokolade
      description: Opisuje fizično obliko, v kateri se prodaja čokolada za peko.
    choy_sum_variety:
      name: Sorta kitajskega zelja
      description: Določa specifično trgovsko ali botanično sorto kitajskega zelja,
        ki se prodaja.
    cigar_wrapper_color:
      name: Barva ovoja za cigare
      description: Standardna klasifikacija barv ovijalnega lista cigare.
    cigarette_filter_type:
      name: Vrsta cigaretnega filtra
      description: Določa, ali ima cigareta filter, in če ga ima, konstrukcijo ali
        posebnost tega filtra.
    cigarette_size:
      name: Velikost cigaret
      description: Razvršča cigarete po standardni dolžini ali formatu v industriji
        (npr. king velikost, 100s, slim).
    cigarette_strength_descriptor:
      name: Opisnik moči cigarete
      description: Oznaka moči, ki jo blagovne znamke tradicionalno uporabljajo za
        označevanje vsebnosti katrana in nikotina (npr. Light, Bold, Silver).
    cinch_liner_material:
      name: Material za podlogo zategovalnih pasov
      description: Označuje material, uporabljen za podlogo ali oblazinjenje, ki je
        v stiku s konjem.
    circular_knitting_needle_cable_type:
      name: Vrsta kabla krožnih pletilk
      description: Material/lastnosti in konstrukcija kabla (npr. prevlečeno jeklo,
        najlon), ki vplivajo na spomin/upogibanje in delovanje vrtljivega spoja.
    circular_knitting_needles_tip_material:
      name: Material za konice krožnih pletilk
      description: Material obeh konic igel (različno od materiala kabla).
    circumference_adjustment_mechanism:
      name: Mehanizem za nastavitev obsega
      description: Mehanizem, ki se uporablja za nastavitev ali zaklepanje obsega
        sukanca.
    clamp_design:
      name: Zasnova objemke
      description: Opisuje strukturni slog ali mehanizem objemke.
    clamp_sheet_music_clip_features:
      name: Značilnosti sponke za notni papir
      description: Funkcionalne in zaščitne lastnosti sponk za notni papir (npr. podloženo,
        nedrseče, vrtljivo).
    clamping_closure_type:
      name: Vrsta vpenjanja
      description: Določa mehanizem, ki se uporablja za zategovanje ali pritrditev
        obroča za vezenje okoli blaga.
    clarinet_bell_acoustic_design:
      name: Akustična zasnova zvona za klarinet
      description: Opisuje zasnovo zvoka/zračnost zvona, ki vpliva na odzivnost in
        intonacijo.
    clarinet_bell_adjustment_mechanism:
      name: Mehanizem za nastavitev zvona za klarinet
      description: Opisuje, kako se prilagodi dolžina/geometrija zvona.
    clarinet_bell_ring_material:
      name: Material za obroč zvona za klarinet
      description: Določa material zaščitnega obroča/traku na robu zvona klarinet,
        če je prisoten.
    clarinet_bell_tuning_effect:
      name: Učinek uglaševanja zvona klarineta
      description: Kaže, kako je zvon zasnovan tako, da vpliva na uglaševanje/intonacijo
        (zlasti pri grlnih tonih in nizkem registru) v primerjavi s standardnim zvonom.
    clarinet_body_type:
      name: Vrsta telesa klarineta
      description: Označuje primarno vrsto konstrukcije telesa za A klarinet.
    clarinet_bore_type:
      name: Vrsta izvrtine za klarinet
      description: Opisuje zasnovo izvrtine altovskega klarineta.
    clarinet_cap_style:
      name: Slog pokrovčka za klarinet
      description: Oblika pokrovčka, ki je priložen ligaturi za klarinet in/ali pokrovčku
        za ustnik (npr. obrnjen ali z odprtinami za zrak).
    clarinet_care_kit_intended_use:
      name: Namen uporabe kompleta za nego klarineta
      description: Glavni namen uporabe, za katerega je komplet namenjen (npr. hitro
        vsakodnevno brisanje ali temeljito čiščenje/vzdrževanje).
    clarinet_included_accessories:
      name: Klarinet, vključno z dodatki
      description: Določa, kaj je v škatli s Bb klarinetom.
    clarinet_keywork_material:
      name: Material tipk klarineta
      description: Določa material mehanizma tipk klarineta (npr. medenina, nikljevo
        srebro, posrebren).
    clarinet_keywork_plating:
      name: Obloga tipk klarineta
      description: Določa prevleko/material zaključne obdelave tipk klarinetnega mehanizma.
    clarinet_mouthpiece_baffle_profile:
      name: Profil deflektorja ustnika klarineta
      description: Opisuje profil notranjega deflektorja/stropa ustnika klarineta,
        kar vpliva na svetlost in projekcijo.
    clarinet_mouthpiece_beak_shape:
      name: Oblika jezička ustnika za klarinet
      description: Določa zunanji profil/kot jezička za udobje igralca in občutek
        odprtine za ustnik.
    clarinet_mouthpiece_chamber_size:
      name: Velikost ustnika za klarinet
      description: Opisuje relativno velikost komore ustnika za klarinet (kot jo je
        določil proizvajalec), kar lahko vpliva barvo tona in upor pri igranju.
    clarinet_mouthpiece_intended_tone:
      name: Želeni ton ustnika za klarinet
      description: Opisuje splošni želeni ton, za katerega je ustnik namenjen.
    clarinet_mouthpiece_player_level:
      name: Raven igralca ustnika za klarinet
      description: Označuje tipično ciljno raven uporabnika za ustnik.
    clarinet_reed_cut:
      name: Rez jezička klarinet
      description: Določa rez/profil jezička (npr. piljen ali nepiljen ter druge tržne
        oblike reza), kar vpliva na odzivnost in ton.
    clarinet_reed_material_type:
      name: Vrsta materiala jezička za klarinet
      description: Označuje material, iz katerega je izdelan jeziček (trst ali sintetični
        material ter pogoste podvrste sintetičnih materialov).
    clarinet_thumb_rest_type:
      name: Vrsta naslona za palec za klarinet
      description: Vrsta/značilnost naslona za desni palec.
    classical_guitar_string_3rd_string_type:
      name: Tip tretje strune klasične kitare
      description: Ali je (3.) struna G navadna (monofilament) ali navita.
    classical_guitar_string_bass_winding_material:
      name: Material za ovijanje basovske strune za klasično kitaro
      description: Material za ovijanje, ki se uporablja pri basovskih strunah (običajno
        strune 4–6).
    classical_guitar_string_set_configuration:
      name: Konfiguracija kompleta strun za klasično kitaro
      description: Določa, ali je izdelek celoten komplet ali zajema specifične strune
        (običajno visoke ali nizke tone) za klasično kitaro.
    clay_modeling_dough_base_material:
      name: Osnovni material gline in modelirne mase
      description: Primarna formulacija/osnovni tip materiala za modeliranje.
    clay_modeling_dough_curing_method:
      name: Postopek sušenja gline in modelirne mase
      description: Kako se material strdi (ali ostane primeren za ponovno uporabo),
        kar določa potrebna orodja in tipične primere uporabe.
    clay_paintability:
      name: Možnost barvanja gline
      description: Označuje, ali je mogoče strjeno glineno površino barvati in katere
        vrste barv so priporočene.
    clay_primary_composition:
      name: Primarna sestava gline
      description: Osnovni material/vezivo gline, ki se suši na zraku (npr. na osnovi
        papirja, na osnovi mineralov).
    clay_shooting_discipline:
      name: Disciplina streljanja glinastih tarč
      description: Označuje disciplino streljanja glinastih tarč ali dogodek, za katerega
        je izdelek namenjen.
    cleaner_format:
      name: Oblika čistila
      description: Embalaža/oblika izdelka za čiščenje poteznic.
    cleaner_sanitizer_intended_area:
      name: Območje, namenjeno čistilu/razkužilu
      description: Glavni del trobila, ki ga izdelek očisti/razkuži.
    cleaning_formula:
      name: Čistilna formula
      description: Določa glavno skupino kemijskih sredstev za čiščenje/razkuževanje,
        ki jih vsebuje izdelek (ne blagovne znamke), da se omogoči filtriranje po
        varnosti, združljivosti in načinu uporabe.
    cleaning_task_focus:
      name: Osredotočenost čiščenja
      description: Opredeljuje glavne težave pri čiščenju, ki jih naj bi rešilo brezvodno
        pranje.
    cleanup_method:
      name: Metoda čiščenja
      description: Določa, kako naj bi se lepilo (dokler je mokro) očistilo z rok/orodja/površin.
    clear_glue_application_method:
      name: Metoda nanašanja prozornega lepila
      description: Določa vrsto doziranja/aplikatorja, ki je priložen embalaži prozornega
        lepila.
    clear_glue_finish_after_drying:
      name: Končno prozorno lepilo (po sušenju)
      description: Opisuje videz lepila po sušenju/utrjevanju (npr. kristalno prozorno
        ali prosojno, sijajno ali mat).
    cleat_bolt_pattern:
      name: Vzorec vijakov za vpenjanje
      description: Določa konfiguracijo vijakov na čevlju, ki se uporablja za pritrditev
        vpenjala, kar določa združljivost med pedalom in čevljem (npr. 2 vijaka za
        gorsko kolesarjenje ali 3 vijaki za cestno kolesarjenje).
    cleat_compatibility:
      name: Združljivost kolesarskih čevljev
      description: Navedene so vrste pedalov ali sistemov vpenjal, za katere je prevleka
        za čevlje primerna.
    cleat_finish:
      name: Zaključek vpenjal
      description: Določa površinsko obdelavo/premaz podstavka vpenjal, ki vpliva
        na odpornost proti koroziji in videz.
    cleat_receptacle_system:
      name: Sistem vtičnic za vpenjala
      description: Označuje združljiv sistem pritrditve špic/vpenjal, ki se uporablja
        pri čevljih za golf s špicami.
    cleat_release_mechanism:
      name: Mehanizem za sprostitev kolesarskih čevljev
      description: Določa, kako se kolesno vpenjalo odklopi s pedala (npr. enojna
        sprostitev ali večsmerna sprostitev).
    cleat_stud_type:
      name: Vrsta špic za kopačke
      description: Določa konstrukcijo ali način pritrditve špic na podplatu kopačk
        za ameriški nogomet.
    climate_control_module_function:
      name: Delovanje modula za nadzor klime
      description: Opredeljuje glavno vlogo modula v sistemu klimatizacije vozila.
    climbing_hold_mounting_type:
      name: Vrsta pritrditve plezalnih oprimkov
      description: Določa, kako je oprimek pritrjen na steno ali vadbeno desko.
    climbing_hold_type:
      name: Vrsta oprimkov za plezanje
      description: Kategorizira obliko ali slog oprimka, kar določa način prijema.
    climbing_protection_device_type:
      name: Vrsta varovalne opreme za plezanje
      description: Opredeljuje vrsto varovalne opreme (npr. klini, matice, varnostni
        klin) in plezalcem pomaga, da hitro izberejo pravo opremo za določeno skalno
        formacijo ali stil plezanja.
    climbing_rope_middle_marking:
      name: Oznaka na sredini plezalne vrvi
      description: Opisuje, kako se prepozna sredina (in/ali konci) vrvi, kar pomaga
        pri varnem spuščanju po vrvi.
    climbing_rope_treatment:
      name: Obdelava plezalne vrvi
      description: Označuje kakršen koli vodoodbojen, suh ali zaščitni premaz, nanesen
        na ovoj in/ali jedro vrvi.
    climbing_rope_type:
      name: Vrsta plezalne vrvi
      description: Razvršča vrv po certifikatu UIAA in namenu uporabe (npr. dinamična
        enojna, polovična, dvojček, statična, pomožna vrv), kar kupcem omogoča, da
        hitro najdejo pravo vrv za svojo dejavnost.
    climbing_safety_certifications:
      name: Certifikati o varnosti plezanja
      description: Navaja standarde plezanja in industrijske varnosti, ki jih naprava
        izpolnjuje.
    clip_color:
      name: Barva sponke
      description: Primarna barva sponke za notni zapis.
    clip_mechanism_type:
      name: Vrsta mehanizma sponke
      description: Določa mehanizem zapiranja, ki se uporablja pri sponkah za bankovce
        ali denarnicah s sponko za bankovce, ter kupcem pomaga pri izbiri med magnetnim,
        vzmetnim, ročnim in drugimi mehanizmi.
    clip_style:
      name: Slog sponke
      description: Opisuje konkretni mehanizem sponke, ki se uporablja za pritrditev
        nosilca, in navaja podatke o združljivosti (npr. aligatorska sponka, karabin).
    clipper_motor_technology:
      name: Tehnologija motorja strižnika
      description: Opisuje konstrukcijo motorja, uporabljenega v strižniku, ki vpliva
        na moč, hrup, vzdržljivost in vzdrževanje.
    closet_configuration:
      name: Konfiguracija omare
      description: Opredeljuje splošno obliko ali razpored sistema vstopne garderobe
        (npr. v obliki črke L, v obliki črke U, otok).
    closing_mechanism:
      name: Zapiralni mehanizem
      description: Določa način zapiranja predala, na primer standardno, tiho zapiranje,
        samodejno zapiranje ali odpiranje na potisk.
    cloth_construction:
      name: Sestava tkanine
      description: Označuje tkanje ali končno obdelavo blaga, ki vpliva na hitrost
        in vzdržljivost (npr. kamgarn ali volneno).
    cloth_thickness:
      name: Debelina tkanine
      description: Označuje razred debeline/teže polirne krpe.
    club_head_material:
      name: Material glave palice
      description: Določa glavni material, uporabljen pri izdelavi glave palice.
    clutch_hydraulic_system_type:
      name: Vrsta hidravličnega sistema sklopke
      description: Označuje združljivost sistema za aktiviranje sklopke/hidravličnega
        sistema (npr. hidravlična sklopka ali kabel).
    clutch_line_connection_type:
      name: Vrsta povezave voda sklopke
      description: Določa končni priključek/priključni element, ki se uporablja na
        vodu sklopke (pomembno za združljivost z glavnim in pomožnim zavornim cilindrom
        ter trdimi cevmi).
    clutch_pressure_plate_actuation_type:
      name: Vrsta aktivacije tlačne plošče sklopke
      description: Določa, ali se sklopka sprošča s potisnim ali vlečnim sprožilnim
        mehanizmom (aktivacija z membransko vzmetjo).
    clutch_pressure_plate_release_mechanism_type:
      name: Tip mehanizma za sprostitev tlačne plošče sklopke
      description: Vrsta vmesnika za sproščanje/aktiviranje, ki ga uporablja tlačna
        plošča.
    clutch_pressure_plate_surface_type:
      name: Vrsta površine tlačne plošče sklopke
      description: Vrsta kontaktne površine tlačne plošče.
    clutch_slave_cylinder_connection_type:
      name: Vrsta povezave pomožnih valjev sklopke
      description: Priključek za hidravlično cev na pomožnem cilindru (navojni priključek,
        hitri priključek, banjo itd.).
    clutch_slave_cylinder_mounting_type:
      name: Vrsta pritrditve pomožnega cilindra sklopke
      description: Kako se pomožni cilinder pritrdi na menjalnik/ohišje sklopke (npr.
        z vijaki, s sponko, integrirano koncentrično).
    coating_type:
      name: Vrsta premaza
      description: Označuje morebitni zunanji premaz, preliv ali glazuro, naneseno
        na žitno ploščico (npr. čokolada, jogurt).
    cocking_mechanism:
      name: Mehanizem za napenjanje
      description: Določa primarno metodo ali napravo, ki se uporablja za napenjanje
        ali spuščanje strune samostrela.
    cocktail_garnish_form:
      name: Oblika okrasitve koktajlov
      description: Opisuje, kako je okrasitev predstavljena/obdelana za uporabo (npr.
        sveža ali dehidrirana).
    cocktail_mix_variety:
      name: Različne mešanice za koktajle
      description: Označuje specifičen koktajl, ki ga določena mešanica ustvari (npr.
        margarita, mojito, piña colada).
    cocktail_napkin_features:
      name: Značilnosti koktajl prtičkov
      description: Označuje funkcionalne, priročne in okolju prijazne lastnosti koktajl
        prtičkov.
    cocktail_pick_tip_style:
      name: Slog konice zobotrebcev za koktajl
      description: Opisuje obliko/značilnost konice, ki se uporablja za prebadanje
        ali držanje okraskov.
    cocktail_pick_top_handle_style:
      name: Stil ročaja/zgornjega dela zobotrebca za koktalj
      description: Opisuje okrasni zgornji del ali ročaj, ki se uporablja za oprijem
        ali predstavitev.
    cocktail_type:
      name: Vrsta koktajla
      description: Navaja specifičen recept ali slog koktajla, ki ga predstavlja vnaprej
        zmešan izdelek (npr. margarita, negroni, piña colada).
    cocktail_umbrella_handle_pick_material:
      name: Material ročaja/zobotrebca dežnička za koktajl
      description: Material, iz katerega je izdelan ročaj/konica (brez strehe) dežnička
        za koktajl.
    cocoa_processing_method:
      name: Metoda predelave kakava
      description: Navaja način predelave kakavovega prahu (npr. naravni, alkalizirani,
        črni kakav).
    cocoa_product_form:
      name: Oblika izdelka s kakavom
      description: Določa fizično obliko, v kateri se kakavov izdelek prodaja.
    coconut_husk_status:
      name: Stanje kokosovega vlaknatega ovoja
      description: Označuje, v kolikšni meri je bil odstranjen zunanji ovoj kokosa,
        kar vpliva na enostavnost uporabe, skladiščenja in odpadkov.
    coconut_maturity_stage:
      name: Stopnja zrelosti kokosa
      description: Opredeljuje razvojno stopnjo kokosa ob obiranju, kar močno vpliva
        na okus, vsebnost vode in kulinarično uporabo (npr. za pitje ali kuhanje).
    coconut_oil_refinement_type:
      name: Vrsta rafiniranja kokosovega olja
      description: Označuje stopnjo prečiščenosti ali kakovost kokosovega olja, npr.
        deviško, rafinirano, MCT, frakcionirano.
    coconut_preparation_form:
      name: Oblika priprave kokosa
      description: Opisuje, kako je kokos fizično pripravljen ali narezan (cel, v
        rezinah, nariban, v kaši itd.), kar kupcem pomaga, da hitro najdejo obliko,
        ki jo potrebujejo za recepte ali prigrizke.
    coffee_bean_species:
      name: Vrste kavnih zrn
      description: Določa vrsto kavnih zrn, uporabljenih v izdelku.
    coffee_beverage_variety:
      name: Vrsta kavnega napitka
      description: Razvršča kavne napitke, pripravljene za uživanje, ali mešanice
        kave, po slogu.
    coffee_processing_method:
      name: Metoda obdelave kave
      description: Označuje tehniko obdelave kavnih zrn po žetvi.
    coil_material:
      name: Material tuljave
      description: Določa glavni material ali vrsto mreže, uporabljene v grelni spirali,
        kar vpliva na okus, življenjsko dobo in združljivost z regulacijo temperature.
    coil_spring_design:
      name: Zasnova vijačne vzmeti
      description: Določa hitrost/obliko vijačne vzmeti, kar vpliva na vozne lastnosti.
    coil_spring_finish_coating:
      name: Zaključek/premaz vijačne vzmeti
      description: Površinska obdelava ali premaz, nanesen za zaščito pred korozijo.
    coil_spring_material:
      name: Material vijačne vzmeti
      description: Primarni material/sestava vijačne vzmeti.
    coil_system_type:
      name: Vrsta tuljavnega sistema
      description: podatek specifičen sistem vzmeti ali tuljave, ki se uporablja v
        ustreznih vzmetnicah, kot so žepkaste vzmeti ali vzmeti bonnell.
    coil_type:
      name: Vrsta tuljave
      description: Opisuje konstrukcijo ali uporabljeno tehnologijo tuljave, kar vpliva
        na proizvodnjo pare in okus.
    coin_grade_numismatic:
      name: Razred kovancev (numizmatičen)
      description: Standardizirana ocena kovanca (npr. Sheldonova lestvica ali pridevniška
        ocena).
    coin_strike_or_finish:
      name: Način kovanja ali površinska obdelava kovancev
      description: Vrsta kovanja ali zaključna obdelava kovanca (npr. običajno kovanje,
        tehnika poliranja plošče).
    coin_strike_type:
      name: Vrsta kovanja kovancev
      description: Opisuje vrsto kovanja/zaključne obdelave kovanca (npr. tehnika
        poliranja plošče, običajno kovanje).
    collar_style:
      name: Slog ovratnika
      description: Določa obliko ovratnika ali izreza na oblačilu.
    collectible_gun_accessories_included:
      name: Priloženi dodatki za zbirateljsko pištolo
      description: Navaja dodatke in dokumentacijo, ki so priloženi zbirateljski pištoli
        (npr. tok, kovček, bajonet, dokumentacija).
    collectible_gun_firing_mechanism:
      name: Mehanizem za streljanje zbirateljske pištole
      description: Določa vrsto mehanizma za streljanje/vžig orožja za zbirateljsko
        strelno orožje (zlasti za starinske in zgodovinske kose).
    collectible_knife_blade_finish:
      name: Zaključek rezila zbirateljskega noža
      description: Opisuje površinsko obdelavo rezila glede na videz (in včasih glede
        odpornosti na korozijo).
    color_code_system:
      name: Sistem barvnih kod
      description: Označuje sistem barvnih kod, ki se uporablja za številčno označevanje
        barv preje (npr. DMC, anchor), če je to ustrezno.
    color_coding_standard:
      name: Standard kodiranja barv
      description: Navedite, ali je plošča izdelana v skladu z mednarodnim barvnim
        kodeksom (npr. IWF ali IPF) ali po drugem sistemu.
    color_effect:
      name: Barvni učinek
      description: Določa posebne tehnike ali učinke barvanja, ki se uporabljajo za
        podaljške las.
    color_family:
      name: Barvna družina
      description: Barvna družina visoke ravni za kitajsko črnilo (koristno, kadar
        je barva preveč razčlenjena, npr. topla črna v primerjavi z modro-črno).
    color_finish:
      name: Barvna končna dodelava
      description: Določa končno obdelavo vidnih komponent ščitnika za roke (npr.
        mat ali sijaj), kadar barva sama ne zadostuje.
    coloring_finish:
      name: Končna obdelava z barvanjem
      description: Opredeljuje vizualni videz ali poseben učinek, ki ga ustvari barva,
        na primer kovinski ali neonski.
    comb_material:
      name: Material glavnika
      description: Material grebena orglic (telo, ki tvori zračne komore).
    comb_type:
      name: Vrsta glavnika
      description: Glavnike za nego konj razvršča glede na njihovo glavno funkcionalno
        namembnost (npr. glavnik za krtačenje, glavnik za grivo, glavnik za izčesavanje),
        kar kupcem pomaga hitro najti pravo orodje za njihove posebne potrebe pri
        negi.
    combat_shorts_cut_style:
      name: Kroj bojnih kratkih hlač
      description: Označuje kroj ali slog kroja, značilen za kratke hlače za borilne
        športe (npr. visok kroj, retro kroj, kompresija).
    comic_creator_role:
      name: Vloga ustvarjalca stripov
      description: Določa vlogo avtorja, ki je navedena v zvezi z objavo (npr. avtor
        besedila, umetnik).
    commemorative_coin_finish:
      name: Končna obdelava spominskega kovanca
      description: Opisuje vrsto kovanja/končne obdelave spominskega kovanca.
    commemorative_coin_mint_mark:
      name: Oznaka kovnice spominskega kovanca
      description: Označuje oznako kovnice (ali pa oznake kovnice ni) na kovancu.
    commemorative_subject:
      name: Spominski predmet
      description: Primarni obeleženi predmet (dgodek, oseba, kraj, obletnica, organizacija
        itd.).
    commercial_vehicle_class:
      name: Vrsta gospodarskega vozila
      description: Regulativni/industrijski razred, ki temelji na oceni bruto mase
        vozila in se uporablja za opis razreda teže komercialnega vozila za brskanje
        in filtriranje.
    compass_damping_medium:
      name: Sredstvo blaženja kompasa
      description: Določa sredstvo, ki se uporablja za stabilizacijo gibanja igle
        znotraj kapsule kompasa.
    compass_illumination_type:
      name: Vrsta osvetlitve kompasa
      description: Določa, kako so oznake kompasa vidne ob šibki svetlobi (npr. svetleča
        barva, tritij, LED osvetlitev ozadja).
    compass_mounting_style:
      name: Slog montaže kompasa
      description: Opisuje, kako se kompas prenaša, nosi ali namešča.
    compass_scale_units:
      name: Merske enote kompasa
      description: Določa merske enote (stopinje, milsi ali oboje), označene na ohišju
        kompasa.
    compatible_abs_system:
      name: Združljiv sistem ABS
      description: Označuje, ali je glavni zavorni valj namenjen vozilom, opremljenim
        z ABS-om.
    compatible_adapter_brand:
      name: Blagovna znamka združljivega adapterja
      description: Označuje znamko glave palice za golf, za katero je držalo že vnaprej
        prilagojeno.
    compatible_airbag_system_type:
      name: Vrsta združljivega sistema zračnih blazin
      description: Označuje generacijo sistema zračnih blazin oziroma nabor funkcij,
        s katerim je del združljiv (npr. enostopenjski ali dvostopenjski).
    compatible_amplifier_fit_method:
      name: Metoda prilagajanja združljivega ojačevalnika
      description: Navaja, kako je opredeljena združljivost ovitka/kovčka (univerzalna
        velikost, prilagojena posameznemu modelu ali po merah).
    compatible_apparatus:
      name: Združljiva oprema
      description: Določa gimnastično opremo ali dejavnost, za katero so ročaji zasnovani.
    compatible_archery_tool:
      name: Združljivo orodje za lokostrelstvo
      description: Označuje primarno lokostrelsko orodje ali kos opreme, za katerega
        je pripomoček zasnovan.
    compatible_axle_size:
      name: Združljiva velikost osi
      description: Določa premer pesta/osi ali standard navoja, za katerega je stopalka
        zasnovana (npr. 10 mm/3⁄8 palca, 14 mm, 3/8x26 TPI).
    compatible_axle_type:
      name: Združljiva vrsta osi
      description: Navaja standarde pritrditve zadnje osi, ki jih podpira trenažer,
        na primer velikosti za hitro sprostitev ali skozi os.
    compatible_axle_weight_rating:
      name: Nazivna obremenitev združljive osi
      description: Določa nazivno obremenitev osi priklopnika (nosilnost na os), za
        katero je zasnovan zavorni sklop priklopnika.
    compatible_bait_type:
      name: Združljiva vrsta vabe
      description: Določa vrste ribiških vab, s katerimi je sveder za vabe združljiv,
        tako da lahko ribiči izberejo orodje, ki ustreza njihovi najljubši vabi.
    compatible_bass_scale_length:
      name: Združljiva dolžina lestvice bas kitare
      description: Označuje dolžino(-e) lestvice bas kitare, za katero(-e) je namenjen
        komplet strun (pomembno za pravilno dolžino navijanja in prileganje).
    compatible_battle_top_system:
      name: Združljiv sistem za Battle Top
      description: Določa ekosistem izdelka za Battle Top ali serijo, za katero je
        kos zasnovan (uporablja se za zagotavljanje združljivosti delov in arene).
    compatible_bb_size:
      name: Združljiva velikost zračne pištole
      description: Označuje premer airsoft kroglic, ki ga izdelek podpira.
    compatible_bed_frame_style:
      name: Slog združljivega okvirja postelje
      description: Določa slog postelje ali okvir, za katerega je dodatna oprema zasnovana.
    compatible_bicycle_tire_type:
      name: Vrsta združljive kolesarske pnevmatike
      description: Določa vrste kolesarskih pnevmatik, ki jih je mogoče s tem izdelkom
        popraviti ali zatesniti.
    compatible_bike_component:
      name: Združljiva komponenta kolesa
      description: Določa, za servisiranje katerega dela kolesa je orodje ali izdelek
        namenjen.
    compatible_billiard_game:
      name: Združljiva biljardna igra
      description: Določa format(e) biljardne igre, za katere je okvir zasnovan, s
        čimer se zagotovi, da stranke izberejo okvir, ki ustreza njihovi igri.
    compatible_billiard_table_size:
      name: Velikost združljive biljardne mize
      description: Določa standardno dolžino mize, za katero je namenjena prevleka,
        s čimer se zagotovi, da kupec izbere prevleko ustrezne velikosti za svojo
        biljardno mizo.
    compatible_bit_type:
      name: Združljiva vrsta nastavka
      description: Vrste nastavkov, s katerimi se lahko uporablja ščitnik.
    compatible_blade_hosel:
      name: Združljiv nosilec za glavo
      description: Označuje slog nosilca rezila, ki je združljiv z držalom palice,
        s čimer se zagotovi pravilno prileganje držala in rezila.
    compatible_blade_system:
      name: Združljiv sistem za glavo
      description: Označuje sistem/format nadomestnega rezila, ki ga nož sprejema
        (npr. standardni hobi št. 11, segmentna rezila, ki se ločijo).
    compatible_boat_weaving_shuttle_loom:
      name: Združljiv statve za tkalske čolničke z votkovnim navitkom
      description: Za katere vrste statev je namenjen tkalski čolniček?
    compatible_bobbin_type:
      name: Združljiva vrsta vretena
      description: Označuje, za katero vrsto vretena/koluta je zasnovan tkalski čolniček.
    compatible_bottle_mouth:
      name: Združljivo ustje steklenice
      description: Vrsta ali premer ustja steklenice, za katerega je slamica ali pokrovček
        zasnovan.
    compatible_bow_attachment_system:
      name: Združljiv sistem za pritrditev loka
      description: Označuje vmesnik kraka ali dodatne opreme, za katerega je del zasnovan
        (npr. ILF, vijačni priključek, hitra odstranitev).
    compatible_bow_crossbow_type:
      name: Vrsta združljivega loka/samostrela
      description: Označuje slog loka ali samostrela, za katerega je pripomoček zasnovan.
    compatible_brake_fluid:
      name: Združljiva zavorna tekočina
      description: Specifikacije DOT za zavorno tekočino, s katerimi so združljiva
        tesnila/materiali glavnega zavornega valja.
    compatible_brake_pad:
      name: Združljiva zavorna ploščica
      description: Označuje, za katere zmesi zavornih ploščic je rotor odobren, kar
        zagotavlja varnost in optimalno obrabo.
    compatible_brake_service_system:
      name: Združljiv sistem za servisiranje zavor
      description: Določa, ali je del namenjen za kolutne zavore, bobnaste zavore
        ali oboje.
    compatible_brake_system:
      name: Združljiv zavorni sistem
      description: Določa ključne opombe o združljivosti sistema za uporabo zavorne
        tekočine.
    compatible_brake_type:
      name: Združljiva vrsta zavore
      description: Določa vrsto zavore, s katero je okvir združljiv, na primer disk
        ali obroč.
    compatible_brass_instrument_finish:
      name: Združljiva končna obdelava trobila
      description: Določa, na katerih površinah trobil je čistilo varno za uporabo,
        ne da bi poškodovalo površino.
    compatible_building_toy_system:
      name: Združljiv sistem gradbenih kock
      description: Navedba, s katerim sistemom/standardom je igrača združljiva (ali
        ima enakovredne mere), na primer združljiva z LEGO kockami ali lastniški sistem.
    compatible_capo_fretboard_radius:
      name: Združljiv polmer ubiralke kapodastra
      description: Določa polmer/profil ubiralke, za katerega je kapodaster zasnovan
        za optimalen stik in stabilnost uglaševanja.
    compatible_capo_number_of_strings:
      name: Združljivo število strun za kapodaster
      description: Označuje, za koliko strun je kapodaster zasnovan (uporabno za 6-,
        7-, 8-, 12 strun in posebne instrumente).
    compatible_cardio_machine_type:
      name: Združljiva vrsta kardio naprave
      description: Določa vrsto kardio naprave, za katero je pripomoček ali del zasnovan.
    compatible_chain_link_type:
      name: Združljiva vrsta verižnih členov
      description: Določa slog verižnega člena, ki ga podpira orodje (standardni,
        polčlen, hitro sklapljanje itd.).
    compatible_chain_size:
      name: Združljiva vrsta verige
      description: Določa standarde širine verige ali koraka (npr. 1/8 palca, 3/32
        palca), ki jih orodje podpira.
    compatible_chain_width:
      name: Združljiva širina verige
      description: Označuje, za katero velikost verige je zasnovan kolesarski verižnik
        s prostim tekom.
    compatible_chip_denomination:
      name: Združljiva vrednost žetona
      description: Navaja vrednosti žetonov, za katere ima pladenj/kovček označena
        ali namenska mesta (ali za katere je namenjen).
    compatible_clarinet_mouthpiece_ligature:
      name: Združljiva ligatura za ustnik klarinet
      description: Določa standard prileganja ligature ali opombe o združljivosti
        za ustnik.
    compatible_classical_guitar_string_scale_length:
      name: Združljiva dolžina lestvice za strune za klasično kitaro
      description: Združljivost predvidene dolžine lestvice kitare/dolžine strun za
        komplet.
    compatible_clay_target_size:
      name: Združljiva velikost glinene tarče
      description: Navaja velikost ali obliko glinenih tarč, ki jih metalec lahko
        prime za pravilno prileganje in uspešnost.
    compatible_cleat_system:
      name: Združljiv sistem kolesarskih čevljev
      description: Določa vmesnik vpenjal ali vzorec vijakov na pedalni podpori, da
        lahko kolesarji prilagodijo svoje čevlje pravilnemu sistemu.
    compatible_clipless_pedal_system:
      name: Združljiv sistem pedal brez sponk
      description: Določa specifični standard pedalov/vpenjal brez sponk, s katerim
        je izdelek združljiv.
    compatible_clutch_type:
      name: Združljiv tip sklopke
      description: Združljivost vmesnika sklopke za vztrajnik (kjer je primerno).
    compatible_coffee_pod_system:
      name: Združljiv sistem za kavne blazinice
      description: Določa kavni aparat ali sistem za kuhanje, kateremu so namenjene
        kapsule.
    compatible_construction_set_system:
      name: Združljiv sistem gradbenih kompletov
      description: Označuje, s katerim gradbenim sistemom/ekosistemom blagovne znamke
        je komplet združljiv (npr. združljiv z LEGO ali DUPLO kockami).
    compatible_contra_bass_clarinet_peg_stand:
      name: Združljivo stojalo/vijak za kontrabas klarinet
      description: Označuje potreben vmesnik stojala/vijaka ali slog podpore.
    compatible_coolant_chemistry:
      name: Združljiva kemija hladilne tekočine
      description: Določa, s katerimi skupinami kemičnih snovi hladilnih tekočin je
        aditiv združljiv.
    compatible_cooling_system_material:
      name: Združljiv material hladilnega sistema
      description: Določa, za katere hladilne sisteme/materiale je čistilno sredstvo
        za hladilni sistem varno (npr. aluminijasti radiatorji, sistemi iz mešanih
        kovin).
    compatible_crib_format:
      name: Združljiv format zibelke
      description: Določa splošno kategorijo velikosti ali oblike vzmetnice ali rjuhe,
        za katero je dodatek zasnovan.
    compatible_cross_stitch_fabric_count:
      name: Številka blaga, združljivega s križnim vbodom
      description: Priporočena količina blaga za šivanje vzorca.
    compatible_cross_stitch_frame:
      name: Združljiv okvir za šivanje s križnim vbodom
      description: Označuje, za katero uporabo je okvir zasnovan (ročna uporaba, namizno
        stojalo, talno stojalo ali univerzalna uporaba).
    compatible_crossbar:
      name: Združljiv prečnih drogov
      description: Združljivost nosilca s prečnimi drogi strešnega nosilca vozila
        (če je nameščen na strehi), vključno s standardi glede oblike/profila prečnih
        nosilcev.
    compatible_cycling_cleat:
      name: Združljivi kolesarski vpenjalni čevlji
      description: Določa za kateri sistem vpenjal ali pedal so kolesarski čevlji
        zasnovani.
    compatible_cymbal_size:
      name: Združljiva velikost činel
      description: Naveden je predviden (ali največji) premer činele, za katero je
        kovček zasnovan; gre za združljivost z velikostjo činele, ne pa za zunanji
        premer kovčka.
    compatible_device_type:
      name: Združljiva vrsta naprave
      description: Označuje, za kakšno napravo je nosilec namenjen (npr. monitor/TV,
        tablični računalnik, pametni telefon, prenosni DVD predvajalnik).
    compatible_dock_structure_type:
      name: Združljiva vrsta priveznih konstrukcij
      description: Konstrukcija privezne konstrukcije, za katero so stopnice zasnovane
        za montažo.
    compatible_dough_type:
      name: Združljiva vrsta testa
      description: Določa, za katere vrste/blagovne znamke modelirne mase so pripomočki
        namenjeni (npr. standardna igralna masa, modelirna glina).
    compatible_drawing_ink_surface:
      name: Združljiva površina za črnilom za risanje
      description: Označuje priporočene površine/podlage za najboljši učinek.
    compatible_drivetrain_brand:
      name: Združljiva blagovna znamka pogonskega sklopa
      description: Navaja blagovne znamke pogonskih ali zavornih sistemov, za katere
        je kabel namenjen.
    compatible_drivetrain_speeds:
      name: Združljive hitrosti pogonskega sklopa
      description: Določa število prestav pogonskega sklopa (npr. 10 prestav) gonilke
        ali verižnika.
    compatible_equipment:
      name: Združljiva oprema
      description: Določa vrsto zimske športne opreme, za katero je primež zasnovan.
    compatible_evap_system:
      name: Združljiv sistem EVAP
      description: Označuje, ali je pokrovček goriva zasnovan tako, da izpolnjuje
        zahteve sistema EVAP (npr. tesnjenje po specifikacijah proizvajalca originalne
        opreme) in zmanjšuje število lučk za preverjanje motorja.
    compatible_exercise_bike_style:
      name: Združljiv slog vadbenega kolesa
      description: Označuje, za katere vrste vadbenih koles je zasnovan dodatek ali
        nadomestni del.
    compatible_fencing_weapon:
      name: Združljivo orožje za sabljanje
      description: Določa, za katero orožje ali disciplino mečevanja je jakna ali
        jopič za sabljanje namenjen.
    compatible_fiber_type:
      name: Združljiva vrsta vlaknine
      description: Primarne vrste vlaken, ki jih valjasti mikalnik učinkovito obdela.
    compatible_fin_box_system:
      name: Združljiv sistem nosilcev plavuti
      description: Označuje sistem pritrditve plavuti, za katerega je plavut zasnovana,
        kar deskarjem pomaga pri nakupu plavuti, ki so združljive z njihovo desko
        (npr. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Združljiv radij prstne rolke
      description: Določa ubiralko (ravna, ukrivljena ali sestavljena), za katero
        je kapodaster zasnovan za enakomeren pritisk in zmanjšano brnenje.
    compatible_finish_type:
      name: Združljiva vrsta končne obdelave
      description: Označuje, za katere vrste površinske obdelave instrumentov je pršilo
        navedeno kot varno.
    compatible_fishing_reel_type:
      name: Združljiv tip ribiškega koluta
      description: Določa vrsto ribiškega koluta, za katerega je pripomoček zasnovan
        ali s katerim lahko deluje (npr. vrtenje, metanje vabe, muharjenje).
    compatible_fly_line_weight:
      name: Združljiva teža vrvice za muharjenje
      description: Označuje teže vrvice za muharjenje AFTMA, za katere je kolut zasnovan.
    compatible_flywheel_type:
      name: Združljiva vrsta vztrajnika
      description: Določa tip vztrajnika, s katerim je predvidena uporaba tlačne plošče
        sklopke.
    compatible_football_kick_type:
      name: Združljiva vrsta nogometne brce
      description: Opredeljuje situacije pri brcanju, za katere je izdelek namenjen
        (npr. začetni udarec, gol z igrišča), s čimer športnikom pomaga hitro najti
        ustrezno opremo.
    compatible_fuel_system_type:
      name: Združljiva vrsta sistema za gorivo
      description: Določa sistem dovajanja goriva, za katerega je čistilec zasnovan.
    compatible_gas_type:
      name: Združljiva vrsta plina
      description: Določa vrsto stisnjenega plina, za katerega je zasnovana zračna
        jeklenka za paintball.
    compatible_gel_wax_additives:
      name: Združljivi dodatki za vosek iz gela
      description: Določa, katere vrste dodatkov so združljive s tem voskom iz gela
        (npr. vrsta barvila, vstavki).
    compatible_glaze_layering:
      name: Združljivo nanašanje glazure
      description: Ali je glazura namenjena za nanos v plasteh z drugimi glazurami
        za doseganje učinkov.
    compatible_golf_bag_type:
      name: Združljiva vrsta torbe za golf
      description: Označuje, katerim formatom torb za golf ustreza prevleka ali kovček.
    compatible_ground_polarity:
      name: Združljiva ozemljitvena polarnost
      description: Navaja, ali je napetostni regulator namenjen za električne sisteme
        vozil z negativno ali pozitivno maso (ali pa ni občutljiv na polariteto).
    compatible_guitar_body_shape:
      name: Združljive oblike telesa kitare
      description: Označuje, za katero telo/obliko kitare je zasnovan kovček.
    compatible_guitar_case:
      name: Združljiv kovček za kitaro
      description: Določa, v katere modele kovčkov za kitaro je vlažilnik namenjen
        in v katerih deluje pravilno.
    compatible_guitar_scale_length:
      name: Združljiva dolžina menzure kitare
      description: Označuje, za katero dolžino(-e) skale kitare je predviden komplet
        strun (na podlagi dolžine navijanja/celotne dolžine).
    compatible_gun_platform:
      name: Združljiva platforma za pištole
      description: Določa platformo delovanja ali vir napajanja, s katerim je izdelek
        združljiv (npr. AEG, GBB, HPA).
    compatible_hair_length:
      name: Združljiva dolžina las
      description: Določa največjo dolžino ali volumen las, za katero se pokrivalo
        udobno prilega.
    compatible_head_and_neck_restraint_system:
      name: Združljiv sistem za zadrževanje glave in vratu
      description: Navedite, ali ima čelada pritrdilne točke in/ali je združljiva
        s sistemi za zaščito glave in vratu (npr. HANS), vključno s stanjem vključitve/namestitve
        pritrdilnih točk.
    compatible_helmet_certification_standard:
      name: Standard certificiranja združljivih čelad
      description: Označuje varnostni standard za čelade ali certifikacijski kontekst,
        ki mu dodatek ustreza (npr. odtrgalne folije med dirko pogosto upoštevajo
        posebna pravila organizatorjev).
    compatible_helmet_shell_size:
      name: Združljiva velikost školjke čelade
      description: Označuje, kateri velikosti školjke čelade ustreza nadomestni notranji
        del (velikost školjke se pogosto preslika v razpone velikosti, kot so XS–S,
        M, L–XL).
    compatible_helmet_size:
      name: Združljiva velikost čelade
      description: Označuje velikost čelade, s katero je obrazna maska združljiva.
    compatible_helmet_type:
      name: Združljiva vrsta čelade
      description: Kategorija čelade, za katero je zasnovana opora za vrat.
    compatible_hitch_receiver_size:
      name: Združljiva velikost priklopa vlečne kljuke
      description: Velikost odprtine priklopa vlečne kljuke, s katero se ujema dodatek
        (za dodatke, nameščene na vlečno kljuko).
    compatible_hook_size:
      name: Združljiva velikost kljuke
      description: Sistem(i) velikosti kvačk in/ali obseg velikosti, za katere je
        organizator namenjen (npr. ameriške črkovno-številčne velikosti, metrični
        obseg v milimetrih).
    compatible_horse_coat_type:
      name: Združljiva vrsta pregrinjala za konja
      description: Določa značilnosti dlake konja, za katere je odstranjevalec odmrlih
        dlak najbolj primeren (npr. gosta zimska dlaka ali občutljiva dlaka).
    compatible_host_platform:
      name: Združljiva gostiteljska platforma
      description: Določa, s katerimi gostiteljskimi platformami ali vrstami naprav
        je kontrolnik združljiv (npr. Windows, macOS, iOS, Android) ali pa ali lahko
        deluje samostojno brez računalnika.
    compatible_inflation_gas:
      name: Združljiv plin za napihovanje
      description: Določa, s čim naj bi se balon napihnil (zrak, helij ali oba).
    compatible_injection_type:
      name: Združljiva vrsta vbrizgavanja
      description: Navedeno je, za kateri sistem vbrizgavanja goriva je izdelek namenjen
        za čiščenje.
    compatible_instrument_surface_material:
      name: Združljiva površina/material instrumenta
      description: Označuje, za katere površine/materiale instrumentov je polirno
        sredstvo namenjeno.
    compatible_intercom_system:
      name: Združljiv domofonski sistem
      description: Označuje, da je čelada združljiva za vgradnjo ali namestitev komunikacijskega
        sistema.
    compatible_interior_material:
      name: Združljiv notranji material
      description: Navedene so vrste materialov v notranjosti vozila, na katerih je
        uporaba odstranjevalca madežev varna/učinkovita (npr. preproga, tkaninska
        oblazinjenost, usnje, vinil).
    compatible_kayak_type:
      name: Združljiva vrsta kajaka
      description: Navaja splošne vrste kajakov, za katere je zasnovan komplet jader.
    compatible_license_plate_hole_pattern:
      name: Kompatibilen vzorec lukenj za registrsko tablico
      description: Določa konfiguracijo montažnih lukenj, za katero je zasnovan nosilec/držalo
        (stran vozila in/ali stran plošče).
    compatible_license_plate_size:
      name: Združljiva velikost registrske tablice
      description: Označuje regionalno ali dimenzijsko velikost, za katero je nosilec/držalo
        zasnovan.
    compatible_loom:
      name: Združljiva statev
      description: Določa vrsto(-e) statve, s katero(-imi) se uporablja ploščati tolkači
        za tkanje.
    compatible_loom_type:
      name: Združljiva vrsta statve
      description: Označuje nastavitev tkanja, za katero je namenjena uporaba tolkača
        (npr. toge statve ali statve za tapiserije).
    compatible_machine_type:
      name: Združljiva vrsta stroja
      description: Navaja za kakšno vrsto prešivanja je okvir namenjen (samo ročno
        prešivanje, gospodinjski šivalni stroj, dolgi stroji za prešivanje).
    compatible_mast_type:
      name: Združljiva vrsta jamborja
      description: 'Določa, za katere premere jambora je jadro zasnovano: zmanjšan
        premer (RDM), standardni premer (SDM) ali oboje.'
    compatible_model_system_train_scale:
      name: Združljiv modelni sistem (merilo vlakov)
      description: Določa merilo/sistem modelnega vlaka, s katerim se dodatna oprema
        ujema, kadar je to primerno (npr. HO, N, O).
    compatible_mounting_surface:
      name: Združljiva površina za pritrditev
      description: Predvidena površina ali predmet, na katerega se sponka pritrdi.
    compatible_mouthpiece_patch:
      name: Združljiva obloga za ustnik
      description: Označuje, ali je ustnik zasnovan za uporabo z oblogami za ustnik,
        in predlagan obseg debeline obloge.
    compatible_mouthpiece_type:
      name: Združljiva vrsta ustnika
      description: Navedba, za kateri tip ustnika/stebla je melofon namenjen (odvisno
        od modela so to običajno vstavki za rog ali trobento).
    compatible_neck_profile_width:
      name: Združljiv profil/širina vratu
      description: Označuje profil/širino vratu kitare, za katerega je zasnovan kapodaster
        (npr. ozek za električno kitaro ali širok za klasično kitaro).
    compatible_needle_size:
      name: Združljiva velikost igle
      description: Navedene so velikosti/vrste igel, katerim je namenjena škatlica
        (npr. dolžine igel za vezenje, tapiserijo in ročno šivanje).
    compatible_needle_system:
      name: Združljiv sistem igel
      description: Sistem(i) igel, s katerimi je stroj združljiv (npr. 130/705H).
    compatible_parking_brake_mechanism:
      name: Združljiv mehanizem parkirne zavore
      description: Označuje, ali je čeljust zasnovana za delovanje z integriranim
        mehanizmom parkirne zavore.
    compatible_pedal_instrument_type:
      name: Združljiv tip instrumenta s pedali
      description: Določa, za kaj se uporablja pedal (npr. digitalni klavir, klaviatura/sintetizator,
        MIDI krmilnik).
    compatible_pedal_type:
      name: Združljiva vrsta pedala
      description: Označuje vrsto ali sistem pedal, za katerega je trak ali sponka
        zasnovana (npr. platforma, SPD, Look Keo).
    compatible_pin_type:
      name: Združljiva vrsta zatiča
      description: Za kakšne vrste zatičev je podloga namenjena (oz. ali je mogoče
        vanjo vtakniti zatiče).
    compatible_pipe_filter_size:
      name: Združljiva velikost cevi za filter
      description: Označuje velikost ali vrsto filtra, ki jo cev lahko sprejme (oz.
        ali filter ni potreben).
    compatible_plate_size:
      name: Združljiva velikost plošče
      description: Dimenzija balistične plošče ali standardizirana velikost, ki ustreza
        jopiču.
    compatible_play_vehicle_scale:
      name: Združljivo merilo igrače vozila
      description: Označuje merilo igrače, za katero je dodatek zasnovan (npr. 1:64),
        kar izboljša prileganje/združljivost za zbiratelje in sledilne sisteme.
    compatible_playing_surface:
      name: Združljiva igralna površina
      description: Označuje vrsto igrišča ali površine, za katero so zasnovani čevlji
        za ameriški nogomer.
    compatible_pole_dimensions:
      name: Združljive dimenzije drogov
      description: Določa velikost preseka pola, ki ji ustreza dodatek.
    compatible_pole_shape:
      name: Združljiva oblika palic
      description: Določa obliko preseka droga ali stebra, za katerega je obloga zasnovana.
    compatible_power_steering_system:
      name: Združljiv servo volanski sistem
      description: Označuje tip(-e) krmilnega sistema, za katerega(e) je tekočina
        namenjena.
    compatible_powerplant_type:
      name: Združljiv tip pogonskega sistema
      description: Označuje pogonski sistem zračne puške, za katerega je del namenjen
        (npr. vzmetno-batni, CO2, PCP).
    compatible_presser_foot:
      name: Združljiva šivalna tačka
      description: Določa sistem pritrditve/združljivosti šivalne tačke, ki ga podpira
        šivalni stroj (npr. zaskočna ali privijačena; nizko/visoko/poševno steblo).
        Uporabite »Univerzalno/Večkratno«, če je podprtih več sistemov ali so priloženi
        adapterji.
    compatible_protective_gear:
      name: Združljiva zaščitna oprema
      description: Določa, s katero drugo zaščitno opremo je opornica za vrat zasnovana
        za uporabo.
    compatible_protective_gear_integration:
      name: Integracija združljive zaščitne opreme
      description: Opisuje, kako naj bi se ščitnik nosil ali integriral z drugo opremo
        (npr. žep za vstavke, samostojni trak).
    compatible_punching_bag_type:
      name: Združljiva vrsta boksarske vreče
      description: Določa, s katerimi vrstami boksarskih ali vadbenih vreč je izdelek
        združljiv.
    compatible_racing_discipline:
      name: Združljiva dirkaška disciplina
      description: Disciplina(-e) motošporta, za katero(-e) je čelada zasnovana/certificirana.
    compatible_rc_scale:
      name: Združljiva tehtnica RC
      description: Označuje merilo RC (npr. 1:10), za katero je dodatna oprema ali
        del namenjen.
    compatible_recorder_size:
      name: Združljiva velikost blokflavte
      description: Določa, za katere velikosti kljunaste flavte je kovček zasnovan.
    compatible_recorder_type:
      name: Združljiva vrsta blokflavte
      description: Določa vrsto/velikost kljunaste flavte, s katero je dodatna oprema
        združljiva (npr. sopran, alto).
    compatible_reed_cut:
      name: Združljiv rez piska
      description: Določa, s katerim slogom reza jezička naj bi bila ligatura združljiva
        (npr. piljen/francoski rez v primerjavi z nepiljenim/ameriškim rezom).
    compatible_reed_type:
      name: Združljiva vrsta piska
      description: Določa vrsto/reza jezička, za katero je ustnik zasnovan.
    compatible_reel_type:
      name: Združljiva vrsta rola
      description: Določa vrsto ribiškega koluta, za katerega je zasnovana torba,
        kovček ali prevleka.
    compatible_refrigerant_type:
      name: Združljiva vrsta hladilnega sredstva
      description: Navedeno je, za katero hladilno sredstvo je namenjen uparjalniki
        klimatskih naprav.
    compatible_ride_equipment:
      name: Združljiva oprema za zabaviščne naprave
      description: Vrste športne opreme na kolesih, za katere je rampa namenjena.
    compatible_roof_height:
      name: Združljiva višina strehe
      description: Označuje, za kateri profil strehe je zasnovana prevleka (standardna
        ali podaljšana/visoka streha).
    compatible_roof_rail_type:
      name: Združljiva vrsta strešnih sani
      description: Določa, za katero konfiguracijo strehe je zasnovan osnovni sistem
        nosilcev.
    compatible_rope_count:
      name: Združljivo število vrvi
      description: Določa konfiguracijo vrvi za boksarski ring, za katero je del zasnovan,
        na primer obroči s 3 vrvmi, obroči s 4 vrvmi ali univerzalno prileganje.
    compatible_rope_type:
      name: Združljiva vrsta vrvi
      description: Določa, katere konstrukcije vrvi se lahko uporabljajo z napravo.
    compatible_saddle_type:
      name: Združljiva vrsta sedla
      description: Določa slog sedla ali disciplino jahanja, za katero je pripomoček
        zasnovan, kar zagotavlja pravilno združljivost z angleškimi, western in drugimi
        sedli.
    compatible_saxophone_size:
      name: Združljiva velikost saksofona
      description: Označuje, s katero velikostjo saksofona je izdelek združljiv (npr.
        sopran, alto, tenor).
    compatible_saxophone_type:
      name: Združljiva vrsta saksofona
      description: Določa, za kateri saksofon je ligatura/pokrovček zasnovana.
    compatible_scale_length:
      name: Združljiva dolžina menzure
      description: Določa obseg dolžine lestvice kitare, za katero so namenjene strune
        (npr. kratka lestvica, standardna lestvica, bariton).
    compatible_seat_airbag:
      name: Združljiva zračna blazina sedeža
      description: Označuje, ali sedež podpira/vsebuje stranske zračne blazine oz.
        ali je združljiv z vozili, opremljenimi z zračnimi blazinami, vgrajenimi v
        sedeže.
    compatible_seating_capacity:
      name: Združljiva sedežna kapaciteta
      description: Določa število sedežev ali konfiguracijo, za katero je zasnovan
        dodatek.
    compatible_sensor_port_type:
      name: Združljiva vrsta odprtine za senzor
      description: Določa, ali oljna korita podpirajo senzorje nivoja olja in/ali
        temperature olja ter vrsto odprtine, če je primerno.
    compatible_shifter_type:
      name: Združljiva vrsta prestavne ročice
      description: Opredeljuje vrsto ali konfiguracijo prestavne ročice, za katero
        je zasnovan ovitek.
    compatible_shis:
      name: Združljiv SHIS
      description: Navaja kode standardiziranega sistema za identifikacijo slušalk
        z mikrofonom (SHIS), ki jim del ustreza (npr. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Združljiva drsalna disciplina
      description: Označuje drsalne discipline, za katere je del ali dodatek zasnovan.
    compatible_snowshoe_deck_type:
      name: Združljiva vrsta plošče za krplje
      description: Določa slog okvirja ali plošče za krplje, s katerim so združljive
        vezi.
    compatible_special_effects_lighting_features:
      name: Združljive funkcije osvetlitve za posebne učinke
      description: Označuje pogoste oznake zmogljivosti, ki vplivajo na nakupovalne
        odločitve za luči za svetlobne učinke (poleg barve/vzorca), kot so povezovanje
        enot ali odzivanje na zvok.
    compatible_spinning_wheel_drive_system:
      name: Združljiv pogonski sistem kolovrata
      description: Določa, katere pogonske sisteme kolovrata podpira dodatek.
    compatible_spoke_gauge:
      name: Združljiva debelina napere
      description: Označuje velikost debeline žice napere, ki jim ustrezajo navoji
        nastavka napere, kar kupcem omogoča pravilno kombiniranje naper in navoja.
    compatible_steering_wheel_airbag:
      name: Združljiva zračna blazina na volanu
      description: Označuje, ali volan podpira originalni modul zračnih blazin (ali
        je namenjen za uporabo brez zračnih blazin).
    compatible_steering_wheel_control_button:
      name: Združljiv gumb za upravljanje na volanu
      description: Označuje združljivost s tovarniško nameščenimi krmilnimi elementi
        na volanu (zvok/tempomat/telefon) in pripadajočo napeljavo.
    compatible_stencil_material:
      name: Združljiv material za šablone
      description: Materiali, iz katerih lahko stroj ustvari šablone ali jih obdela
        (npr. papir, plastična folija, mylar).
    compatible_stencil_media_format:
      name: Združljiva oblika materiala za šablone
      description: 'Označuje, katere materiale za šablone podpira stroj: liste, zvitke
        ali oboje.'
    compatible_strap_retractor:
      name: Združljiv navijalec traku
      description: Označuje, ali je trak združljiv z izvlečnimi sistemi ali je zasnovan
        za pasove, ki niso vlečni (statični).
    compatible_string_instrument_finish:
      name: Združljiv premaz za godala
      description: Določa, na katerih vrstah površinske obdelave instrumentov je loščilo
        varno za uporabo.
    compatible_substrate_material:
      name: Združljiv material podlage
      description: Površinski material, na katerega se barva oprime.
    compatible_surface:
      name: Združljiva površina
      description: Določa površino/material, na katerega se samolepilni ježek prilepi.
    compatible_surface_material:
      name: Združljiv površinski material
      description: Površinski materiali vozil, na katerih je izdelek predviden za
        uporabo.
    compatible_tear_off_system:
      name: Združljiv listni sistem
      description: Označuje, ali imajo očala možnost odtrganja leče in/ali odvijanja
        folije, vključno s tem, ali imajo pritrdilne točke za odtrganje.
    compatible_thermostat_type:
      name: Združljiva vrsta termostata
      description: Ali je ohišje zasnovano za namestitev termostata in če je, kakšne
        vrste/velikosti.
    compatible_thread:
      name: Združljiva nit
      description: Označuje, za katere vrste niti/preje je vdevalec zasnovan (po debelini/vrsti).
    compatible_thread_spool_format:
      name: Združljiva oblika niti/koluta
      description: Označuje, katere oblike niti je mogoče shranjevati v škatli (tuljave,
        vretenca, vretena/kartice za nitko, stožci itd.).
    compatible_thread_yarn_tool:
      name: Združljivo orodje za nit in prejo
      description: Združljivost strojev/sistemov za orodja, katere se namesti na drugo
        opremo ali uporablja z njo (npr. šivalni stroj, opletilni šivalni stroj/šivalni
        stroj overlock, statve, kolovrat).
    compatible_tire_application:
      name: Združljiva uporaba pnevmatik
      description: Označuje uporabo pnevmatike/platišča, za katero je zasnovano orodje
        za menjavo pnevmatik (glede na servisirano pnevmatiko/platišče, ne na model
        vozila).
    compatible_tom_pad_mounting:
      name: Združljiv nosilec za tom bobne
      description: Določa, na kaj se elektronski tom-tom pritrdi (npr. nosilec s sponko/palico,
        L-palica, nosilec za stojalo), kar vpliva na to, ali bo ustrezal obstoječim
        sistemom stojal.
    compatible_toy_vehicle_scale:
      name: Združljivo merilo igrače vozila igrače
      description: Označuje merilo igrače vozila ali približno velikost vozila, s
        katerim je igralni komplet združljiv.
    compatible_tpms_sensor_type:
      name: Združljiva vrsta senzorja TPMS
      description: Določa, ali kolo podpira senzorje TPMS in/ali katero koli zahtevano
        vrsto ventila/senzorja.
    compatible_training_equipment:
      name: Združljiva oprema za vadbo
      description: Navaja vrste opreme za vadbo ali fitnes, ki jo je mogoče pritrditi
        na nosilec.
    compatible_treadmill_design:
      name: Združljiva zasnova tekalne steze
      description: Določa, s katero zasnovo tekalne steze je dodatek združljiv, na
        primer z zložljivimi ali nezložljivimi modeli.
    compatible_tube:
      name: Združljiva cev
      description: Označuje konstrukcijo zračnice ali pnevmatike, za katero je obliž
        zasnovan, na primer butil, lateks, TPU ali pnevmatika brez zračnice.
    compatible_valve_type:
      name: Združljiva vrsta ventila
      description: Določa, s katero vrsto medeninastega ventila je mazivo združljivo.
    compatible_vaporizing_material:
      name: Združljiv material za uparjanje
      description: Označuje vrste materialov, ki jih naprava lahko uparja.
    compatible_vehicle_windshield_fluid:
      name: Združljiva tekočina za vetrobransko steklo vozila
      description: Trditve o združljivosti v zvezi z opremo vozila ali obdelavo stekla
        (npr. varno za premaze, ki odbijajo dež, varno za uporabo z napravo za pranje
        žarometov).
    compatible_visor_system:
      name: Združljiv sistem vizirjev
      description: Označuje, s katerimi vrstami sistemov vizirja/vstavkov je motoristična
        čelada združljiva.
    compatible_water_board_type:
      name: Združljiva vrsta deske za vodo
      description: Za katere deske za vodne športe je stojalo namenjeno.
    compatible_water_sport_board_type:
      name: Združljiva vrsta deske za vodne športe
      description: Navaja vrste desk, za prevoz katerih je stojalo zasnovano.
    compatible_watercraft_communication_standard:
      name: Združljiv komunikacijski standard za plovila
      description: Določa podprte standarde ali integracijske protokole za pomorsko
        komunikacijo/omrežje za interoperabilnost z vgrajeno elektroniko.
    compatible_watercraft_engine_type:
      name: Združljiva vrsta motorja za plovila
      description: Označuje ciljno konfiguracijo pogonskega sklopa, ki ji del ustreza
        (zunanji/notranji/krmni/reaktivni pogon).
    compatible_weight_plate_diameter:
      name: Združljiv premer uteži
      description: Določa, katere premere uteži naprava sprejme.
    compatible_wheel_finish:
      name: Združljiva obdelava platišč
      description: Določa, za katere površine/materiale platišč je čistilo varno za
        uporabo (kot trdi proizvajalec).
    compatible_whorl_drive_band_type:
      name: Združljiva vrsta pogonskega traku vretena
      description: Določa, s katerim slogom pogonskega traku naj bi vreteno delovalo.
    compatible_wick_series:
      name: Združljiva serija stenjev
      description: Označuje običajne serije/vrste stenjev, za katere je podstavek
        zasnovan (poimenovanje v industriji), če jih določi prodajalec.
    compatible_winder_head_bit:
      name: Združljiva glava/nastavek za orodje za navijanje
      description: Določa slog vmesnika ključa/glave uglaševalca, ki ga podpira orodje
        za navijanje (npr. glava z režami, zamenljivi nastavki, univerzalna glava).
    compatible_windlass_rode:
      name: Združljiva veriga za vitel
      description: Določa, za katero vrsto sidrne verige je vitel zasnovan.
    compatible_windshield_type:
      name: Združljiva vrsta vetrobranskega stekla
      description: Določa, za katero nastavitev vetrobranskega stekla je ohišje zasnovano.
    compatible_wood:
      name: Združljiv les
      description: Določa, za katere vrste lesa ubiralke je loščilo priporočljivo/varno.
    compatible_writing_surface:
      name: Združljiva pisalna površina
      description: Določa površine/vrste papirja, na katerih črnilo najbolje deluje.
    compatible_zipper_size:
      name: Združljiva velikost zadrge
      description: 'Označuje velikost zadrge, ki ji je namenjen ključek (pogosto izraženo
        kot #3, #5, #8, #10), kar izboljša filtriranje združljivosti.'
    compliance_certification:
      name: Certifikati o skladnosti
      description: Standardi skladnosti/odobritve, ki jih izpolnjuje svetlobna letev
        za uporabo v cestnem prometu in elektromagnetno združljivost.
    component_position:
      name: Položaj komponente
      description: Določa relativni položaj dela znotraj sklopa krmiljenja motorja
        (npr. sprednji pokrov proti zadnjemu, zgornji proti spodnjemu). Ne gre za
        namestitev na sprednjem/zadnjem delu vozila.
    concentration_level:
      name: Raven koncentracije
      description: Kakovostni kazalnik koncentracije paradižnikove mezge (enojna,
        dvojna, trojna), uporaben za povezovanje zahtev receptov.
    concentration_type:
      name: Vrsta koncentracije
      description: Označuje, ali je izdelek pripravljen za uporabo ali koncentrat,
        in (če je koncentrat) splošna navodila za redčenje.
    concert_bass_drum_mounting_stand_type:
      name: Vrsta stojala za koncertni bas boben
      description: Kako je koncertni bas boben podprt ali nameščen za nastop.
    concert_pitch_standard:
      name: Standard komornega tona
      description: Določa referenčni komorni ton (A4), na katerega je klavir uglašen
        v času prodaje (npr. A440, A442, A444).
    condiment_form:
      name: Oblika začimb
      description: Označuje fizično obliko ali konsistenco hrenovega izdelka (npr.
        pasta, prašek, krema).
    condiment_texture:
      name: Tekstura začimb
      description: Opisuje fizično konsistenco začinjene priloge ali čatnija (npr.
        s koščki, gladka).
    confetti_format:
      name: Oblika konfetov
      description: Določa obliko izdelka s konfeti glede na to, kako so konfeti pakirani
        ali izstreljeni (npr. raztreseni v primerjavi s strelci/topovi).
    conga_head_tensioning_system:
      name: Sistem za napenjanje glave conga bobna
      description: Vrsta mehanizma, ki se uporablja za napenjanje/uglaševanje glave
        conga bobna (npr. tradicionalno uglaševanje z napenjalnimi vijaki v primerjavi
        s sodobnimi mehanizmi za hitro uglaševanje).
    conga_set_included_drum_types:
      name: Vrste bobnov, vključene v komplet conga bobnov
      description: Katere vrste conga bobnov so vključene v komplet conga bobnov (npr.
        quinto + conga + tumba).
    connector_case_style:
      name: Slog ohišja priključka
      description: Razvršča celoten slog izdelave ohišja priključka (npr. trda školjka
        v primerjavi z mehko torbico), kar odraža raven zaščite in prenosljivost.
    console_cover_installation_method:
      name: Način namestitve prevleke konzole
      description: Določa, kako se prevleka konzole pritrdi na konzolo/naslonjalo
        za roke (npr. z natikanjem, elastičnimi trakovi, ježkom, lepilom, sponko).
    console_display_type:
      name: Vrsta zaslona konzole
      description: Določa vrsto uporabniškega zaslona na napravi (npr. LCD, LED, zaslon
        na dotik).
    construction_design:
      name: Zasnova konstrukcije
      description: Označuje, koliko zgibnih delov sestavlja ščitnik, kar vpliva na
        mobilnost (npr. enodelna v primerjavi s tridelno).
    contact_angle:
      name: Kontaktni kot
      description: Določa kontaktni kot ležajnih obročev, izražen kot en sam kot ali
        par kotov (npr. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Vrsta polnjenja žogice za kontaktno žongliranje
      description: Določa, ali je žogica polna ali napolnjena (in če je napolnjena,
        vrsto polnila), kar vpliva na porazdelitev teže in vzdržljivost.
    contact_juggling_ball_transparency:
      name: Prozornost žogice za kontaktno žongliranje
      description: Določa prosojnost/optični videz žogice.
    contact_surface_material:
      name: Material stične površine
      description: Označuje material, uporabljen na kontaktnih točkah, ki se dotikajo
        instrumenta (npr. pluta/guma), za preprečevanje praskanja in izboljšanje oprijema.
    container_material:
      name: Material za embalažo
      description: Določa primarni material embalaže izdelka (npr. steklo, PET plastika,
        aluminij).
    contaminant_removal:
      name: Odstranjevanje onesnaževal
      description: Navaja razrede onesnaževal, za odstranjevanje ali zmanjševanje
        katerih je izdelek certificiran.
    contra_alto_clarinet_body_configuration:
      name: Konfiguracija telesa kontra-altovskega klarineta
      description: Opisuje fizično obliko kontra-altovskega klarineta (npr. ravna
        zasnova v primerjavi s pregibno).
    contra_alto_clarinet_lowest_note_extension:
      name: Podaljšanje najnižjega tona kontra-altovskega klarineta
      description: Določa najnižjo možno notno podaljšanje instrumenta (najnižjo noto,
        ki jo dovoljuje tipkovnica), ki se običajno uporablja za razlikovanje med
        modeli z nizkim E♭, nizkim D in nizkim C.
    contra_bass_clarinet_bell_type:
      name: Vrsta odmevnika kontrabasovskega klarineta
      description: Konfiguracija odmevnika, ki se uporablja v kontrabasovskem klarinetu.
    contra_bass_clarinet_bore_type:
      name: Vrsta vrtine kontrabas klarineta
      description: Zasnova izvrtine instrumenta.
    contra_bass_clarinet_lowest_written_note:
      name: Najnižja zapisana nota kontrabas klarineta
      description: Najnižja zapisana nota, ki jo instrument lahko zaigra (pogosto
        je odvisna od podaljška za nizki C v primerjavi z nizkim Eb).
    control_arm_bushing_material:
      name: Material puše krmilne ročice
      description: Določa material vključenih/nameščenih puš, če so prisotne.
    control_arm_bushings_included:
      name: Vključene puše krmilnih ročic
      description: Označuje, ali je krmilna ročica dobavljena z nameščenimi pušami.
    control_arm_finish:
      name: Končna obdelava krmilne ročice
      description: Določa zaščitni premaz, nanesen na krmilno ročico (zaščita pred
        korozijo in videz).
    control_arm_grease_fitting_type:
      name: Vrsta mazalnega nastavka krmilne ročice
      description: Določa, ali sklop krmilne ročice/krogelnega zgloba vključuje mazalni
        nastavek (zerk) in ali je ta uporaben.
    control_arm_material:
      name: Material krmilne ročice
      description: Določa primarni material in proizvodno konstrukcijo ohišja krmilne
        ročice.
    control_arm_position:
      name: Položaj krmilne ročice
      description: Določa položaj vzmetenja, za katerega je zasnovana krmilna ročica
        glede na stran/vogal osi (npr. zgornji/spodnji, sprednji/zadnji, levi/desni).
    control_arm_style:
      name: Slog krmilne ročice
      description: Določa geometrijski/oblikovalski slog krmilne ročice, uporabljene
        pri postavitvi vzmetenja.
    control_cable_connector_type:
      name: Vrsta priključka krmilnega kabla
      description: Določa slog konca/priključka, ki ga uporabljajo krmilni kabli za
        povezavo s krmilnikom in motorjem (npr. končni priključki, specifični za proizvajalca
        originalne opreme).
    control_voltage_or_gate_connectivity:
      name: Krmilna napetost ali povezljivost vrat
      description: Navaja podporo za povezavo s kontrolno napetostjo/vhodom za integracijo
        z modularno/analogno opremo.
    controller_function:
      name: Funkcija krmilnika
      description: Določa primarno vlogo nadzorne plošče tekalne steze, kot so krmiljenje
        motorja, napajanje ali pogon preko inverterja.
    controller_type:
      name: Vrsta krmilnika
      description: Določa krmilnik/nadzorni sistem motorja, ki je vključen v komplet
        za predelavo skuterja v električno vozilo (ali potreben za uporabo), pri čemer
        se osredotoča na značilnosti krmilnika, pomembne za združljivost in zmogljivost.
    conversion_kit_cooling_method:
      name: Način hlajenja kompleta za predelavo
      description: Primarni pristop k upravljanju temperature, ki se uporablja za
        integracijo motorja/inverterja/baterije.
    conversion_kit_installation_complexity:
      name: Zahtevnost namestitve kompleta za predelavo
      description: Pričakovana raven zahtevnosti glede na običajne zahtevane veščine/orodja
        stranke.
    converted_bed_size:
      name: Velikost predelane postelje
      description: Označuje velikost postelje ali konfiguracijo, v katero se bo otroška
        posteljica predelala, ko bo ta komplet nameščen.
    convertible_configuration:
      name: Prilagodljiva konfiguracija
      description: Označuje, v koliko različnih konfiguracij postelje se izdelek lahko
        pretvori (npr. otroška posteljica 3 v 1 → postelja za malčke → dnevna postelja).
    convertible_high_chair_modes:
      name: Načini uporabe nastavljivega stolčka za hranjenje
      description: Določa konfiguracije sedenja, v katere se lahko stol preoblikuje.
    cookie_decorating_kit_items_included:
      name: Izdelki v kompletu za okraševanje piškotov
      description: Navaja posamezne sestavne dele za okraševanje, tako da stranke
        točno vedo, kateri pripomočki so v škatli (npr. tube za glazuro, mrvice, modelčki
        za piškote).
    cookie_variety:
      name: Slog piškota
      description: Določa vrsto ali slog piškota, da lahko kupci hitro najdejo svojo
        najljubšo vrsto.
    cooking_state:
      name: Stanje kuhanja
      description: Označuje stopnjo pripravljenosti piščančjega izdelka ob prodaji
        (surov, popolnoma kuhan, mariniran itd.).
    coolant_additive_purpose:
      name: Namen dodatka za hladilno tekočino
      description: Primarna predvidena funkcija dodatka za hladilno tekočino (ne sredstva
        za izpiranje hladilnika ali namenskega tesnila).
    coolant_base_fluid:
      name: Osnovna hladilna tekočina
      description: Določa primarno glikolno osnovo, uporabljeno v formulaciji sredstva
        proti zmrzovanju/hladilne tekočine.
    coolant_outlet_connection_style:
      name: Slog priključka odprtine za hladilno tekočino
      description: Slog vmesnika priključka odprtine se uporablja za pritrditev cevi
        hladilnika ali cevi za hladilno tekočino.
    coolant_outlet_neck_angle:
      name: Kot priključka odprtine za hladilno tekočino
      description: Kot/usmerjenost priključka odprtine glede na pritrdilno prirobnico/motor
        (uporabno za napeljavo zgornje cevi hladilnika).
    coolant_technology:
      name: Tehnologija hladilne tekočine
      description: Določa kemijsko sestavo/tehnološko družino hladilne tekočine, uporabljene
        v sredstvu proti zmrzovanju/hladilni tekočini (kot je običajno označeno na
        embalaži).
    coolant_temperature_sensor_port:
      name: Priključek senzorja temperature hladilne tekočine
      description: Ali ima priključek kanal za senzor ali stikalo temperature hladilne
        tekočine in kateri vmesnik uporablja.
    coolant_temperature_sensor_seal_type:
      name: Vrsta tesnila senzorja temperature hladilne tekočine
      description: Vrsta tesnjenja, ki se uporablja med senzorjem in prehodom med
        motorjem/hladilno tekočino.
    cooling_system_component_included:
      name: Vključene komponente hladilnega sistema
      description: Navaja dodatne komponente hladilnega sistema, ki so del vodne črpalke.
    cooling_system_flush_application_step:
      name: Korak uporabe pri izpiranju hladilnega sistema
      description: Označuje, kam izdelek spada v postopku uporabe (npr. čistilo za
        predhodno izpiranje v primerjavi s končnim izpiranjem/nevtralizatorjem).
    cooling_system_type:
      name: Vrsta hladilnega sistema
      description: Določa konfiguracijo hladilnega sistema, uporabljenega v notranjem
        ladijskem motorju (npr. neobdelana voda/odprta zanka, zaprta zanka/sladka
        voda s toplotnim izmenjevalnikom, hlajenje gredlja).
    cord_material:
      name: Material vrvice
      description: Določa material vrvice, ki se uporablja za vlečenje palčke skozi
        saksofon.
    core_type_bass_strings:
      name: Vrsta jedra (strune za bas kitaro)
      description: Določa obliko jedra strune, ki vpliva na občutek in prožnost.
    cork_grease_base_material:
      name: Osnovni material masti za pluto
      description: Primarna osnova formulacije masti za pluto (npr. na osnovi lanolina).
    cork_grease_form:
      name: Oblika masti za pluto
      description: Fizična oblika masti za pluto.
    corn_presentation:
      name: Predstavitev koruze
      description: Določa fizično predstavitev ali obliko koruznega izdelka (npr.
        cel v lupini, zrna, prah).
    corn_syrup_variety:
      name: Vrsta koruznega sirupa
      description: Določa poseben slog ali različico predelave sirupa.
    corn_variety:
      name: Sorta koruze
      description: Določa specifično botanično ali trgovsko sorto koruze v prodaji,
        kar kupcu omogoča razlikovanje med vrstami, ki se razlikujejo po okusu, teksturi,
        barvi in kulinarični uporabi.
    corner_compatibility:
      name: Združljivost s kotnimi elementi
      description: Določa oblike vogalov mize (kvadratni ali okrogli), za katere je
        prevleka zasnovana.
    corner_flag_features:
      name: Značilnosti kotne zastavice
      description: Označuje posebne funkcionalne lastnosti ali izboljšave kotne zastavice
        (npr. zložljiv drog, odsevni material).
    cornet_mouthpiece_shank_type:
      name: Vrsta stebla ustnika pri kornetu
      description: Določa standard sprejemnika/stebla ustnika, ki ga kornet podpira
        za združljivost.
    cornhole_league_certification:
      name: Certifikacija lige štrbunka
      description: Označuje uradne certifikate ali odobritve lig, ki jih izdelek izpolnjuje.
    corrosion_resistance:
      name: Odporen proti koroziji
      description: Določa obdelavo ali stopnjo odpornosti proti koroziji nosilca/držala
        za uporabo na prostem.
    corrosion_resistance_level:
      name: Stopnja odpornosti proti koroziji
      description: Označuje zaščito pred korozijo, primerno za sladkovodna/slanovodna
        okolja.
    costume_components_included:
      name: Vključene sestavne dele kostuma
      description: Navaja kose oblačil in dodatke, ki so del kostuma, ter pojasni,
        kaj je del kompleta.
    cotton_weave_type:
      name: Vrsta tkanja bombaža
      description: Opisuje strukturo tkanja/pletenja bombažne površine za tiskanje,
        ki vpliva na teksturo in ostrino tiska.
    counter_type:
      name: Vrsta števca
      description: Označuje prisotnost in slog vgrajenega sledenja ponovitvam ali
        sili.
    counterweight_fill_material:
      name: Polnilni material za protiuteži
      description: Označuje snov, ki se lahko uporabi za dodajanje balasta ali predhodno
        polnjenje protiuteži.
    counterweight_type:
      name: Vrsta protiuteži
      description: Določa zasnovo ali slog izdelave protiuteži, kot je vreča s peskom
        ali jeklena plošča, za lažjo združljivost in namestitev.
    coupler_system:
      name: Sistem spojk
      description: Vrsta/sistem spojk, nameščenih na modelu lokomotive za združljivost
        z železniškim voznim parkom.
    court_surface_suitability:
      name: Primernost površine igrišča
      description: Označuje površino košarkarskega igrišča, za katero je podplat čevlja
        zasnovan, kar kupcu pomaga izbrati pravi oprijem in vzdržljivost za notranja
        lesena igrišča, zunanji asfalt/beton ali oboje.
    cover_fit_style:
      name: Stil prileganja prevleke
      description: Opisuje, kako se prevleka prilega mizi, kar vpliva na videz in
        raven zaščite.
    cover_fit_type:
      name: Vrsta prileganja prevleke
      description: Označuje, ali je prevleka izdelana po meri (po meri/delno po meri)
        ali univerzalna in ali je namenjena za privez v vodi ali shranjevanje/uporabo
        na prikolici.
    cowbell_beater_type:
      name: Vrsta udarjalke za kravje zvonce
      description: Priporočena vrsta orodja za udarjanje zvok/zaključek kravjega zvona
        (če izdelek tako določi).
    cowbell_mounting_method:
      name: Način montaže kravjega zvonca
      description: Kakšna je predvidena montaža/uporaba kravjega zvonca (ročni v primerjavi
        z montažo na držalo).
    cowbell_sound_character:
      name: Zvočni značaj kravjega zvonca
      description: Splošni zvočni značaj, uporabljen v seznamih (omogoča iskanje tudi
        po drugih lastnostih, ne samo po velikosti).
    cradle_capacity:
      name: Zmogljivost zibelke
      description: Označuje, ali je zibelka zasnovana za enega dojenčka ali dvojčke.
    craft_cutter_embosser_machine_operation:
      name: Upravljanje pripomočkov za rezanje in vtiskovanje
      description: Določa, kako pripomoček za rezanje/vtiskovanje deluje z vidika
        uporabnikovega delovnega procesa (npr. ročna ročica, električni potisni gumb,
        krmiljenje z aplikacijo).
    craft_decoration_maker_accessories_included:
      name: Priloženi dodatki za orodje za izdelavo okraskov
      description: Navaja ključne dodatke, ki so priloženi orodju za izdelavo okraskov
        (npr. začetni trak/folija, nadomestne nalepke, kartuše z bleščicami, čistilna
        orodja).
    craft_foil_application_method:
      name: Način nanašanja folije za ustvarjanje
      description: Določa, kako naj se folija za ustvarjanje nanese/aktivira (lepilo,
        toplota, toner/reaktivno itd.).
    craft_foil_format:
      name: Oblika folije za ustvarjanje
      description: Označuje fizično obliko folije za ustvarjanje, kot se prodaja (npr.
        zvitek v primerjavi z listi).
    craft_glue_finish:
      name: Končni videz lepila za ustvarjanje
      description: Opisuje videz lepila po sušenju (npr. prozorno, belo/neprozorno,
        prosojno, bleščeče/mat).
    craft_magnet_application:
      name: Uporaba magneta za ustvarjanje
      description: Primarni primer uporabe magneta za ustvarjanje ali površina za
        njegovo namestitev.
    craft_magnet_holding_strength_level:
      name: Stopnja zadrževalne moči magneta za ustvarjanje
      description: Relativna kategorija moči za magnete za ustvarjanje, ki kupcem
        pomaga izbrati ustrezno zadrževalno moč za njihov projekt.
    craft_organizer_storage_features:
      name: Funkcije shranjevanja organizatorja za ustvarjanje
      description: Opisuje organizacijske funkcije in notranje elemente za shranjevanje
        organizatorjev za ustvarjanje (npr. nastavljivi razdelki, predali, prozorni
        žepi).
    craft_scoring_board_included_accessories:
      name: Priloženi dodatki za deske za ustvarjalno rezbarjenje
      description: Dodatki, priloženi deski za rezbarjenje (npr. pisalo za rezbarjenje/orodje
        za zgibanje, trikotnik, orodje za ovojnice).
    craft_scoring_board_measurement_system:
      name: Merilni sistem desk za ustvarjalno rezbarjenje
      description: Določa merilni sistem, označen na deski za rezbarjenje (imperialni,
        metrični, dualni ali neoznačeni).
    craft_wire_finish_coating:
      name: Zaključek/premaz žice za ustvarjanje
      description: Določa površinsko obdelavo ali premaz, ki se nanese na žico za
        barvo, odpornost proti potemnenju ali zaščito.
    craft_wood_surface_preparation:
      name: Priprava površine lesa za ustvarjanje
      description: Označuje, ali je lesena površina pripravljena za končno obdelavo/barvanje
        ali jo je treba pripraviti (npr. brušenje/premazovanje).
    crank_spindle_interface:
      name: Vmesnik osi pogona
      description: Določa nosilce gonilnega ležaja v sistemu osi pogona (npr. SRAM
        DUB, Square Taper), kar zagotavlja združljivost med gonilko in gonilnim ležajem.
    crankshaft_balance_type:
      name: Vrsta uravnoteženja ročične gredi
      description: Označuje, ali je ročična gred notranje uravnotežena (nevtralna)
        ali zunanje uravnotežena (potrebuje blažilnik torzijskih vibracij/uteži vztrajnika).
    crankshaft_bolt_pattern:
      name: Vzorec vijakov ročične gredi
      description: Vzorec vijakov na zadnji prirobnici za pritrditev vztrajnika/fleksibilne
        plošče.
    crankshaft_sensor_reluctor_type:
      name: Vrsta senzorskega zobatega obroča ročične gredi
      description: Uporabljena konfiguracija sprožilnika senzorja položaja ročične
        gredi/zobatega obroča (po potrebi).
    craps_accessories_included:
      name: Vključeni dodatki za igro s kockami
      description: Označuje dodatne dodatke, specifične za craps, poleg kock/žetonov/postavitev.
    crash_cymbal_profile:
      name: Profil udarnih činel
      description: Celotna ukrivljenost/profil činele (kako izrazit je lok), kar vpliva
        na višino in odziv.
    crash_cymbal_sound_character:
      name: Zvočni značaj crash činele
      description: Primarni opisniki zvočnega značaja zvoka udarnih činel.
    crash_pad_size_class:
      name: Razred velikosti plezalne blazine
      description: Označuje kategorijo splošne velikosti plezalne blazine, pri čemer
        kupci hitro dobijo občutek pokritosti površine brez potrebe po natančnih dimenzijah.
    crate_engine_assembly_level:
      name: Raven sestavljanja motorja brez dodatnih komponent
      description: Kako popoln je motor brez dodatnih komponent pri odpremi (katere
        glavne komponente so vključene).
    cream_base_ingredient:
      name: Osnovna sestavina smetane
      description: Določa primarni vir smetane, ki zajema tako mlečne vrste kot rastlinske
        alternative.
    cream_cheese_base:
      name: Osnova kremnega sira
      description: Določa primarni mlečni ali rastlinski vir, uporabljen za izdelavo
        kremnega sira, kar kupcem pomaga pri izbiri z vidika prehrane, alergenov in
        okusa.
    cream_cheese_form:
      name: Oblika kremnega sira
      description: Opisuje fizično obliko ali teksturo kremnega sira (npr. kocka,
        stepen, za pomakanje), ki vpliva na mazljivost in predvideno uporabo.
    cream_variety:
      name: Vrsta smetane
      description: Določa specifično vrsto smetane glede na vsebnost maščobe, način
        obdelave ali predvideno kulinarično uporabo (npr. kot dodatek za kavo in omake,
        smetana za stepanje, smetana za kuhanje).
    crib_accessory_features:
      name: Lastnosti dodatkov za otroško posteljico
      description: Navaja funkcionalne lastnosti ali lastnosti za večje udobje, specifične
        za dodatke za otroške posteljice in posteljice za malčke, kot so zračnost
        ali elastični robovi.
    crib_bumper_features:
      name: Značilnosti zaščitne obrobe za otroško posteljico
      description: Izpostavlja posebne funkcionalne lastnosti obrobe za otroško posteljico.
    crib_conversion_kit_components:
      name: Sestavni deli kompleta za predelavo otroške posteljice
      description: Navaja glavne dele kompleta, da lahko kupci preverijo, ali imajo
        vse potrebno za namestitev.
    cricket_ball_grade:
      name: Razred žoge za kriket
      description: Določa raven kakovosti ali predvideni igralni standard žoge.
    cricket_ball_piece_construction:
      name: Konstrukcija delov žoge za kriket
      description: Označuje število zunanjih delov ali oblikovanih delov, uporabljenih
        za izdelavo prevleke žoge, kar je ključni kazalnik kakovosti in cene.
    cricket_ball_type:
      name: Vrsta kriket žogice
      description: Določa vrsto žoge za kriket, ki je dobavljena z izdelkom, ali označuje,
        če žoga ni priložena.
    cricket_bat_accessory_type:
      name: Vrsta dodatka za kij za kriket
      description: Določa vrsto dodatka ali vzdrževalnega kosa za kij za kriket, da
        lahko kupci hitro filtrirajo izdelke, ki jih potrebujejo.
    cricket_bat_size:
      name: Velikost kija za kriket
      description: Označuje standardizirano klasifikacijo velikosti kijev za kriket
        (0–6, za mladince, za odrasle s krajšim ročajem, za odrasle z daljšim ročajem),
        ki je običajno izbrana glede na starost in višino igralca.
    cricket_bat_size_compatibility:
      name: Združljivost velikosti kijev za kriket
      description: Navaja velikost kijev, za katero je dodatek zasnovan, kar zagotavlja
        ustrezno združljivost.
    cricket_helmet_role:
      name: Vloga čelade za kriket
      description: Označuje vlogo v igri, za katero je čelada zasnovana, kot je odbijanje
        ali vloga vratarja.
    cricket_leg_guard_type:
      name: Vrsta ščitnika za noge pri kriketu
      description: Označuje poseben slog zaščite za noge pri kriketu.
    cricket_player_role:
      name: Vloga igralca kriketa
      description: Določa primarno vlogo v igri, za katero je čevelj zasnovan.
    cricket_protection_grade:
      name: Stopnja zaščite pri kriketu
      description: Določa stopnjo zaščite, ki jo dodelijo proizvajalci opreme za kriket.
    cricket_stump_base_type:
      name: Vrsta podstavka za kriket vratnice
      description: Označuje slog podlage ali material, dobavljen z nastavki, kar vpliva
        na stabilnost in primernost igralne površine.
    cricket_stump_target_features:
      name: Ciljne lastnosti nastavkov za kriket
      description: Označuje različne funkcionalne lastnosti, ki izboljšajo uporabnost,
        preglednost, vzdržljivost ali stabilnost treninga.
    cricket_stump_type:
      name: Vrsta nastavkov za kriket
      description: Kategorizira slog ali konstrukcijo nastavkov, da kupci lažje izberejo
        med standardnimi nastavki za tekme, različicami za trening ali sodobnimi osvetljenimi
        modeli.
    cricket_training_focus:
      name: Fokus treninga kriketa
      description: Primarna spretnost ali disciplina v kriketu, ki ga pripomoček izboljša.
    croquet_set_components_included:
      name: Vključeni sestavni deli kompleta za kriket
      description: Navaja vse ključne komponente v kompletu (npr. vratca, količki,
        torba za nošenje), tako da stranke točno vedo, kaj kupujejo.
    cross_country_binding_system:
      name: Sistem vezi za tek na smučeh
      description: Določa standard vezi za tek na smučeh, za katere je izdelek izvrtan
        ali je z njimi združljiv.
    cross_stitch_chart_symbol_type:
      name: Vrsta simbolov v vzorcu za križni vbod
      description: Kako je vzorec predstavljen (simboli, barve ali oboje).
    cross_stitch_finishing_type:
      name: Vrsta zaključka s križnim vbodom
      description: Predvidena vrsta zaključka/prikaza za izvezen izdelek.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mehanizem za pritrditev blaga okvirja za križni vbod
      description: Označuje, kako je tkanina pritrjena/napeta v okvir (npr. s sponkami,
        objemkami, žebljički), kar vpliva na enostavnost uporabe in združljivost tkanine.
    cross_stitch_frame_included_components:
      name: Sestavni deli okvirja za križni vbod
      description: Navaja, kaj je v škatli (npr. samo okvir v primerjavi z okvirjem
        + objemkami + stojalom), kar zmanjšuje dvoumnost in vračila.
    cross_stitch_frame_type:
      name: Vrsta okvirja za križni vbod
      description: Določa konstrukcijo/vrsto okvirja za križni vbod (kako je tkanina
        pritrjena), kar vpliva na uporabnost in združljivost projekta.
    cross_stitch_pattern_technique:
      name: Tehnika vzorca križnega vboda
      description: Tehnika/slog križnega vboda, ki ga zahteva vzorec.
    crossbar_shape_profile:
      name: Oblika/profil prečk
      description: Določa aerodinamično/profilno obliko prečke.
    crossbar_style:
      name: Slog prečke
      description: Določa slog konstrukcije prečke in ločuje toge tekmovalne palice
        od prilagodljivih ali hibridnih vadbenih palic.
    crossbow_type:
      name: Vrsta samostrela
      description: Določa osnovni slog zasnove samostrela, kot so sestavljeni, ukrivljeni
        ali pištolski. Slog gradnje poganja uspešnost, velikost in uporabnost zaboj,
        zato kupec pogosto filtrira po njem.
    crossover_component_type:
      name: Vrsta sestavnih delov kretnic
      description: Določa topologijo primarnih sestavnih delov, uporabljenih v mreži
        pasivnih kretnic.
    crossover_configuration:
      name: Konfiguracija kretnice
      description: Označuje, ali kretnica uporablja eno samo križno točko ali več
        točk (npr. dvosmerna ali trismerna zasnova).
    crossover_type:
      name: Vrsta kretnice
      description: Vrsta mreže kretnic v kompletu sestavnih delov.
    crown_profile:
      name: Profil krone
      description: Določa višino/profil krone kape nad robom.
    crown_style:
      name: Slog krone
      description: Določa splošno silhueto ali profil krone na polcilindru.
    crust_taste_profile:
      name: Profil okusa skorje
      description: Označuje, ali je okus skorje sladek, slan ali nevtralen.
    crystal_finish:
      name: Kristalni zaključek
      description: Opisuje površinsko obdelavo, premaz ali stanje obdelave ohlapnega
        kristala (npr. surov, poliran, zaobljen, fasetno brušen, matiran, prevlečen
        z avro, barvan, toplotno obdelan).
    crystal_material:
      name: Kristalni material
      description: Določa material, uporabljen za steklo ure, ki ščiti številčnico.
    crystalline_finish_style:
      name: Zaključek s kristalnim učinkom
      description: Značilen videz kristala/perja, ki ga v končanih svečah ustvari
        palmov vosek.
    cucumber_variety:
      name: Sorta kumar
      description: Določa kultivar ali sorto kumare (npr. angleška, perzijska, Kirbyjeva).
    cue_compatibility:
      name: Združljivost biljardne palice
      description: Označuje konfiguracijo spojev biljardnih palic, za katero jeetui
        zasnovan, na primer enodelne palice ali palice s 3/4 spojem.
    cue_construction:
      name: Izdelava biljardne palice
      description: Označuje, kako je biljardna palica izdelana – število kosov ali
        ali je delna komponenta, na primer samo zadnji del ali samo gred – kar vpliva
        na prenosljivost in združljivost.
    cue_head_material:
      name: Material kapice biljardne palice
      description: Določa material glave biljardnega palice (del, ki se dotika ploščka),
        kar vpliva na vzdržljivost in zaščito površine.
    cue_sport_compatibility:
      name: Združljivost s športom z biljardnimi palicami
      description: Določa, za kateri šport z biljardnimi palicami je dodatek zasnovan.
    cue_thread_size:
      name: Navoj biljardne palice
      description: Določa specifikacijo navoja, ki se uporablja na podaljških, ščitnikih
        za spoje, utežnih vijakih in drugih dodatkih za biljardne palice, da se zagotovi
        pravilno prileganje.
    cue_tip_hardness:
      name: Trdota konice biljardne palice
      description: Oceni trdnost konice biljardne palice, kar vpliva na nadzor nad
        kroglo in povratne informacije.
    cuff_height:
      name: Višina manšete
      description: Navaja višino manšete rolerja (nizka, srednja, visoka, odstranljiva/nastavljiva),
        kar vpliva na oporo in prilagodljivost.
    cuff_position:
      name: Položaj manšete
      description: Označuje, kje na telesu deskarja je pritrjena manšeta varovalne
        vrvice.
    cultivation_method:
      name: Način gojenja
      description: Določa, kako je bila zelena zelenjava gojena, vključno s tehnikami
        gojenja in kmetijskimi praksami.
    cup_type:
      name: Vrsta profila
      description: Označuje profil površine bleščice (ravna ali vbočena) in globino
        vbočenja, kar lahko vpliva na blesk, teksturo in na to, kako se bleščica prišije
        ali lepi.
    cupcake_size:
      name: Velikost kolačka
      description: Določa kategorijo fizične velikosti prodanih kolačkov (npr. majhen,
        standardni, zelo velik).
    curd_size:
      name: Velikost skute
      description: Določa velikost ali teksturo skutinih zrn.
    cure_method:
      name: Način sušenja
      description: Opisuje postopek, potreben za strjevanje ali utrjevanje lepila
        (npr. UV-svetloba, zračna vlaga, toplota).
    curing_or_preparation_method:
      name: Način sušenja ali priprave
      description: Določa, kako so bile olive sušene ali drugače pripravljene (npr.
        sušene v slanici, sušene v olju, pečene na žaru).
    curling_broom_head_material:
      name: Material za glavo metle za curling
      description: Določa primarno sestavo materiala glave ali blazinice metle.
    curling_broom_head_type:
      name: Vrsta glave metle za curling
      description: Določa slog ali konstrukcijo glave/blazinice za pometanje.
    curling_shoe_slider_material:
      name: Material drsalnega podplata čevljev za curling
      description: Določa primarni material drsalnega podplata, ki se uporablja na
        čevljih za curling.
    curling_training_aid_type:
      name: Vrsta pripomočka za vadbo curlinga
      description: Določa vrsto pripomočka za vadbo curlinga.
    curry_variety:
      name: Sorta karija
      description: Razvršča izdelke s curry omako glede na specifični slog curryja
        ali recept, za katerega so namenjeni, kot so tikka masala, massaman ali tajski
        zeleni curry, kar omogoča natančno filtriranje okusa/sloga.
    cushion_rubber_profile:
      name: Profil gume za robove
      description: Koda oblike ali profila gumijastih kosov za robove.
    cushioning_level:
      name: Stopnja oblazinjenja
      description: Označuje količino oblazinjenja pod stopalom, ki ga nogavica zagotavlja
        za zaščito pred udarci in udobje.
    custom_label_content_type:
      name: Vrsta vsebine etiket po meri
      description: Določa, katere informacije so dodane po meri na všito etiketo (npr.
        ime, logotip, sporočilo, velikost, simboli za nego, podatki za stik).
    customization_type:
      name: Vrsta prilagajanja
      description: Določa, ali je dres prazen, pridobljen od igralca ali po meri z
        osebnim imenom/številko.
    cut_or_preparation_style:
      name: Rezanje ali način priprave
      description: Določa, kako so koščki zelenjave narezani ali pripravljeni v pločevinki
        ali kozarcu (npr. celi, narezani na kocke, paličice).
    cut_resistance_rating:
      name: Stopnja odpornosti proti urezninam
      description: Določa formalno preizkušeno raven odpornosti izdelka proti urezninam.
    cut_type:
      name: Vrsta reza
      description: Označuje, ali se tkanina prodaja na meter, kot vnaprej narezana
        ali kot rola/svitek.
    cutting_application:
      name: Uporaba za rezanje
      description: Primarni namen uporabe rezanja za škarje.
    cutting_mat_grid_style:
      name: Slog mreže rezalne podloge
      description: Natisnjen slog vodil na površini podloge.
    cutting_mat_intended_use:
      name: Namen uporabe rezalne podloge
      description: Primarni namen uporabe površine za ustvarjanje/delo, za katero
        je zasnovana rezalna podloga.
    cv_boot_clamp_type:
      name: Vrsta objemke za manšeto homokinetičnega zgloba
      description: Določa vrsto objemke/traku, ki se uporablja za pritrditev manšete
        homokinetičnega zgloba.
    cv_boot_kit_contents:
      name: Vsebina kompleta manšet homokinetičnega zgloba
      description: Navaja, kaj je priloženo manšeti homokinetičnega zgloba (npr. objemke,
        paket masti, pritrdilni trakovi).
    cv_boot_material:
      name: Material manšete homokinetičnega zgloba
      description: Določa primarni material, iz katerega je izdelana manšeta homokinetičnega
        zgloba.
    cv_boot_position:
      name: Položaj manšete homokinetičnega zgloba
      description: Določa, ali se manšeta homokinetičnega zgloba prilega notranjemu
        ali zunanjemu položaju homokinetičnega zgloba na osi.
    cycling_apparel_fit:
      name: Prileganje kolesarskih oblačil
      description: Opisuje kroj oblačila in navaja predvideno tesnost in aerodinamiko
        (npr. tekmovalen, sproščen).
    cylinder_head_assembly:
      name: Sklop glave valja
      description: Določa stopnjo celovitosti glave valja, kot se prodaja (npr. popolnoma
        sestavljena z nameščenimi komponentami ventilskega mehanizma v primerjavi
        z golo/nesestavljeno litino).
    cylinder_head_material_grade:
      name: Razred materiala glave valja
      description: Določa material in razred, uporabljena za ulivanje glave valja.
    cylinder_head_position:
      name: Položaj glave valja
      description: Določa, kateri vrsti/strani ali usmerjenosti ustreza glava valja
        pri večvrstnih motorjih (npr. leva/desna stran ali vrsta 1/vrsta 2).
    cymbal_alloy:
      name: Zlitina za činele
      description: Zlitina/sestava činel v kompletu.
    cymbal_application:
      name: Uporaba činel
      description: Primarna uporaba, za katero je činela zasnovana oziroma tržena.
    cymbal_arm_mounting_interface:
      name: Vmesnik za pritrditev stojala za činele
      description: Določa, kako se stojalo za činele pritrdi na preostale dele bobna
        (npr. objemka, stojalo, priključek stojala).
    cymbal_arm_rotation_positioning_features:
      name: Funkcije vrtenja/postavljanja stojala za činele
      description: Določa funkcije postavljanja, ki vplivajo na to, kako je mogoče
        stojalo nagniti/zavrteti in zakleniti.
    cymbal_arm_style:
      name: Slog stojala za činele
      description: Določa, ali je stojalo za činele ravno ali ima gibljiv del, za
        nastavitve dosega in postavljanja.
    cymbal_drum_case_wheel_configuration:
      name: Konfiguracija koles kovčka za činele in bobne
      description: Označuje, ali ima kovček kolesa in (po potrebi) konfiguracijo koles
        za prevoz na kolesih.
    cymbal_hammering_style:
      name: Slog udarjanja činel
      description: Postopek/videz udarjanja, ki vpliva na zahtevnost in občutek.
    cymbal_kit_components_included:
      name: Vključeni sestavni deli kompleta činel
      description: Določa, katere vrste činel so vključene v komplet/paket ride činel
        (poleg same ride činele).
    cymbal_kit_items_included:
      name: Vključeni kosi v kompletu činel
      description: Določa, katere činele so vključene v komplet/paket (po vrsti činele).
    cymbal_lathing:
      name: Struženje činel
      description: Določa, ali je površina činele stružena (z utori) v primerjavi
        z nestruženo/surovo oziroma kolikšen del površine činele je stružen (z utori)
        v primerjavi z nestruženim/surovim.
    cymbal_playing_style_genre:
      name: Slog/zvrst igranja činel
      description: Določa tipičen kontekst nastopov, za katere so činele zasnovane
        (npr. činele za trebušni ples v primerjavi z ročnimi činelami za korakanje/orkester).
    cymbal_set_configuration:
      name: Konfiguracija kompleta činel
      description: Označuje, ali se izdelek prodaja kot ena sama činela, par činel
        ali komplet več parov (npr. za skupinsko poučevanje).
    cymbal_sound_character:
      name: Zvočni značaj činel
      description: Opisuje celoten tonski profil/zvok činele, ki se uporablja za odkrivanje
        (npr. svetel v primerjavi s temnim).
    cymbal_sustain:
      name: Trajanje zvena činele
      description: Kako dolgo zveni činela po udarcu.
    cymbal_type:
      name: Vrsta činele
      description: Določa funkcionalno vlogo činele, ki ga elektronska blazinica činele
        posnema.
    cymbal_volume_level:
      name: Glasnost činele
      description: Zaznana glasnost/kategorija zvoka činele.
    cymbal_weight_class:
      name: Težinski razred činele
      description: Označuje težinski razred činele, ki vpliva na ton, glasnost in
        odziv.
    dairy_heat_treatment:
      name: Toplotna obdelava mlečnih izdelkov
      description: Določa stopnjo obdelave ali pasterizacije smetane (npr. surova,
        pasterizirana, obdelana z ultra visoko temperaturo), ki vpliva na obstojnost,
        okus in uspešnost stepanja.
    damage_type:
      name: Vrsta poškodb
      description: Določa vrste poškodb vetrobranskega stekla, za popravilo katerih
        je komplet namenjen..
    damper_pedal_style:
      name: Vrsta stopalke za dušenje
      description: Opisuje fizični slog stopalke za dušenje, ki se uporablja s klaviaturami/digitalnimi
        klavirji.
    damping_adjustability:
      name: Nastavljivost dušenja
      description: Označuje, kateri parametri dušenja in/ali višine ride so nastavljivi
        na amortizerju.
    damping_level:
      name: Raven dušenja
      description: Označuje relativno količino zmanjšanja glasnosti in trajanja zvena,
        ki jo zagotavlja utišanje.
    dance_occasion:
      name: Plesna priložnost
      description: Označuje kontekst predvidene uporabe oblačila pri plesnem treningu
        ali nastopu.
    darbuka_accessories_included:
      name: Vključeni dodatki za darbruko
      description: Navaja običajne dodatke, ki so priloženi darbuki.
    darbuka_body_finish_type:
      name: Vrsta zaključne obdelave telesa darbuke
      description: Opisuje zunanjo zaključno obdelavo, premaz ali okrasno obdelavo
        telesa darbuke.
    darbuka_head_material:
      name: Material za glavo darbuke
      description: Določa material opne bobna na darbuki.
    dart_barrel_material:
      name: Material trupa pikado puščice
      description: Določa primarni material trupa pikado puščice, kar vpliva na porazdelitev
        teže, vzdržljivost in ceno.
    dart_shaft_design:
      name: Zasnova osi za pikado puščico
      description: Klasificira mehansko zasnovo osi, na primer ali je fiksna, vrtljiva,
        teleskopska ali ima krilca, kar vpliva na uspešnost in ceno.
    dart_shaft_thread_type:
      name: Vrsta navoja osi za pikado puščico
      description: Označuje velikost/vrsto navoja, ki se uporablja za privijanje osi
        v trup pikado puščice, kar zagotavlja združljivost osi in trupa.
    dart_thread_size:
      name: Velikost navoja pikada
      description: Določa velikost/standard, s katerim je del združljiv, kar zagotavlja
        prileganje med osmi, konicami in trupi.
    dart_tip_compatibility:
      name: Združljivost konic pikado puščic
      description: Označuje, ali je del pikado puščice zasnovan za jekleno konico,
        mehko konico ali obe vrsti pikado puščic.
    dart_tip_connection_type:
      name: Vrsta povezovanja konic pikado puščic
      description: Opisuje specifikacijo navoja ali sistem pritrditve, ki ga konica
        uporablja za pritrditev na trup ali os pikado puščic, kar zagotavlja združljivost.
    dartboard_tournament_approval:
      name: Odobritev za turnir v pikadu
      description: Označuje, ali so določene pikado zveze ali lige uradno odobrile
        tarčo za pikado.
    dartboard_type:
      name: Vrsta tarče za pikado
      description: Klasificira tarčo za pikado glede na tehnologijo izdelave in združljivost
        s pikado puščicami (npr. iz sisala, elektronska, magnetna).
    dash_cover_construction_type:
      name: Vrsta izdelave prevleke za armaturno ploščo
      description: Opisuje, kako je oblikovan/strukturiran pokrov nadzorne plošče
        (npr. oblikovan v primerjavi s šivanim), kar vpliva na natančnost prileganja
        in videz.
    dash_cover_cutout_configuration:
      name: Konfiguracija izreza pokrova nadzorne plošče
      description: Označuje, za katere odprtine/senzorje originalne nadzorne plošče
        je pokrov predhodno izrezan ali oblikovan.
    dashboard_accessory_position:
      name: Položaj dodatkov za nadzorno ploščo
      description: Določa, kam na nadzorni plošči ali okoli nje se dodatek namesti.
    date_variety:
      name: Sorta datljev
      description: Določa kultivar/sorto datljev (npr. medjool, deglet noor, ajwa).
        Raznolikost močno vpliva na okus, velikost, teksturo in je izpostavljena v
        večini izdelkov in opisov, zato njen zajem izboljša filtriranje in odkrivanje.
    dayan_head_material:
      name: Material opne za dayan
      description: Material igralne površine (pudi), na primer naravna živalska koža
        ali sintetični.
    dayan_strap_material:
      name: Material traku za dayan
      description: Material napenjalnih trakov (baddhi), ki se uporabljajo za vezanje
        dayana.
    dayan_syahi_type:
      name: Vrsta syahi za dayan
      description: Vrsta paste (črna uglaševalna pasta) na glavi dayana.
    decaffeination_method:
      name: Način odstranjevanja kofeina
      description: Določa postopek, ki se uporablja za odstranjevanje kofeina iz kave
        brez kofeina.
    decal_installation_method:
      name: Način namestitve nalepk
      description: Kako se nalepka namesti na površino vozila (npr. suho nanašanje,
        mokro nanašanje). Podatki o orodju/zahtevah (npr. prenosni trak ali toplotna
        pištola) morajo biti po potrebi navedeni v navodilih ali ustreznih lastnostih
        orodja.
    decal_orientation:
      name: Položaj nalepke
      description: Ali je nalepka namenjena za uporabo na notranji strani stekla ali
        na zunanji površini.
    decal_placement_type:
      name: Vrsta namestitve nalepke
      description: Označuje, kam na vozilo se nalepka nalepi (npr. karoserija, odbijač,
        pokrov motorja).
    decal_visibility_property:
      name: Lastnost vidnosti nalepke
      description: Optične/vidne lastnosti nalepke za izboljšanje vidljivosti ali
        odziva na svetlobo (npr. odsevne, fluorescentne, svetleče v temi ali prosojne
        lastnosti).
    deck_concave_level:
      name: Raven konkavnosti deske
      description: Označuje globino ali intenzivnost konkavne vbokline deske (npr.
        blaga, srednja, globoka).
    deck_flex_rating:
      name: Ocena prožnosti deske
      description: Kvalitativna ocena prožnosti/togosti deske.
    deck_material:
      name: Material krovne plošče
      description: Določa primarni material, iz katerega je izdelana deska rolke.
    decoder_interface_socket_type:
      name: Vrsta vmesnika/vtičnice dekoderja
      description: Vrsta vmesnika digitalnega dekoderja ali konfiguracija vgrajenega
        dekoderja za model lokomotive.
    decoration_technique:
      name: Tehnika okraševanja
      description: Opredeljuje primarni način nanašanja grafik ali okraskov na majico.
    decorative_stamp_form_factor:
      name: Oblika okrasnega žiga
      description: Določa fizično obliko žiga in način tiskanja dizajna (en sam žig,
        komplet, valj, ozadje itd.).
    decorative_tape_application:
      name: Nanos okrasnega traku
      description: Primarni namen uporabe pri ustvarjanju, za katero je okrasni trak
        zasnovan ali tržen.
    decorative_tape_format:
      name: Oblika okrasnega traku
      description: Določa, kako je okrasni trak dobavljen/zapakiran za uporabo.
    decoy_buoyancy:
      name: Plovnost vabe
      description: Opisuje, kako se vaba obnaša v vodnem stolpcu (lebdi, visi ali
        se potaplja).
    decoy_joint_type:
      name: Vrsta spoja vabe
      description: Označuje, ali je telo vabe trdno ali zgibno, kar vpliva na način
        gibanja v vodi.
    decoy_motion_mechanism:
      name: Mehanizem gibanja vabe
      description: Opisuje, kako, če sploh, vaba povzroča gibanje ali vznemirjanje
        vode, da privabi divjad.
    decoy_posture:
      name: Položaj vabe
      description: Označuje upodobljeno držo ali aktivnost živali, ki jo modelira
        vaba (npr. hranjenje, počitek, budnost).
    decoy_size_class:
      name: Razred velikosti vabe
      description: Kategorizira relativno velikost vabe v primerjavi s pravo živaljo
        (npr. standardna, magnum, prevelika).
    decoy_style:
      name: Slog vabe
      description: Določa fizični oblikovni faktor ali oblikovni razred vabe, da pomaga
        lovcem izbrati pravilno nastavitev.
    deli_meat_variety:
      name: Raznolikost delikatesnega mesa
      description: Razvršča določeno vrsto delikatesnega mesa (npr. salama, bolonjska
