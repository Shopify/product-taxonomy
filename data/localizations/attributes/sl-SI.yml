---
sl-SI:
  attributes:
    3d_glasses_fit_design:
      name: Zasnova prileganja 3D očal
      description: Označuje, kako se očala nosijo ali pritrdijo (npr. sponke, ovijalna,
        čez očala).
    3d_glasses_material:
      name: Material za 3D-očala
      description: Podaja material, uporabljen za 3D-očala, na primer bambus ali nerjavno
        jeklo
    3d_glasses_technology:
      name: Tehnologija 3D očal
      description: Določa tehnologijo 3D slike/sinhronizacije, za katero so očala
        zasnovana, kar določa združljivost s specifičnimi zasloni ali projektorji.
    3d_printer_case_style:
      name: Slog ohišja za 3D tiskalnik
      description: Razvršča splošni tip izdelka, da lahko kupci razlikujejo med mehkimi
