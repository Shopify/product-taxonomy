        pokrivali proti prahu.
    3d_printer_cleaning_kit_components_included:
      name: Vključene komponente kompleta za čiščenje 3D tiskalnika
      description: Navaja posamezna orodja in potrošni material v kompletu, da kupci
        natančno vedo, kaj kupujejo.
    3d_printing_resin_type:
      name: Tip smole za 3D tiskanje
      description: Določa formulacijo ali predvideno uporabo smole, kar kupcem pomaga
        hitro prepoznati, ali je smola standardna, inženirska, za litje ali drugih
        specializiranih tipov.
    80_plus_efficiency_rating:
      name: Ocena učinkovitosti 80 Plus
      description: Označuje uradno raven certifikata energetske učinkovitosti 80 Plus,
        ki jo je PSU dosegel.
    abrasive_material:
