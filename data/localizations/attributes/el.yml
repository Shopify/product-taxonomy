    software_features:
      name: Χαρακτηριστικά λογισμικού
      description: Προσδιορίζει τις βασικές λειτουργίες ενός προϊόντος λογισμικού,
        όπως προστασία απορρήτου ή αυτόματη δημιουργία αντιγράφων ασφαλείας
    software_tool_type:
      name: Τύπος εργαλείου λογισμικού
      description: Ταξινομεί τον τύπο των εργαλείων ανάπτυξης λογισμικού, όπως το
        πρόγραμμα επεξεργασίας πηγαίου κώδικα ή το σύστημα ελέγχου έκδοσης
    softwood_lumber_grade:
