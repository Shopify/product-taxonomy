    silencer/blimp_type:
      name: Τύπος σιγαστήρα/blimp
      description: Καθορίζει το είδος της συσκευής ηχομόνωσης για φωτογραφικές μηχανές,
        όπως το blimp φακού
    sim_card_capability:
      name: Δυνατότητα κάρτας SIM
      description: Υποδεικνύει τον τύπο διαμόρφωσης της κάρτας SIM σε φορητές συσκευές,
        π.χ. διπλή, ενσωματωμένη
    sim_card_type:
      name: Τύπος κάρτας SIM
      description: Καθορίζει το μέγεθος και τη μορφή μιας κάρτας SIM, όπως η eSIM
        ή η microSIM
    sim_card_type_1:
      name: Κάρτα SIM 1 τύπου 1
      description: Καθορίζει τη συμβατή μορφή κάρτας SIM για την υποδοχή 1 ενός κινητού
        τηλεφώνου, όπως Nano SIM
    sim_card_type_2:
      name: Κάρτα SIM τύπου 2
      description: Καθορίζει τη συμβατή μορφή κάρτας SIM για την υποδοχή 2 ενός κινητού
        τηλεφώνου, όπως Nano SIM
    sink_mounting_type:
      name: Τύπος τοποθέτησης νεροχύτη
      description: Καθορίζει τη μέθοδο εγκατάστασης για νεροχύτες, π.χ. πάγκος, τοίχος
    sink_shape:
      name: Σχήμα νεροχύτη
      description: Καθορίζει το γεωμετρικό σχέδιο των νεροχυτών, όπως οβάλ ή ορθογώνιο
    sink_type:
      name: Τύπος νεροχύτη
      description: Καθορίζει το σχέδιο των νεροχυτών κουζίνας ή των βοηθητικών νεροχυτών,
        όπως μισός νεροχύτης
    sinker_material:
      name: Υλικό βαριδίου ψαρέματος
      description: Καθορίζει τη σύνθεση των βαριδίων ψαρέματος, όπως μόλυβδος ή ψευδάργυρος
    size:
      name: Μέγεθος
      description: Χρησιμοποιείται για τον καθορισμό του μεγέθους ενός προϊόντος,
        όπως 0-3 μηνών ή extra large (XL)
    skate_shape:
      name: Σχήμα πατινιών
      description: Περιγράφει τον φυσικό παράγοντα μορφής των πατινών που παρέχονται
        στη συσκευασία.
    skateboarding_style:
      name: Στυλ skateboard
      description: Καθορίζει τον τύπο skateboard για τον οποίο έχει σχεδιαστεί το
        προϊόν, όπως ελεύθερο ή εκτός δρόμου
    ski_construction:
      name: Κατασκευή σκι
      description: Προσδιορίζει τον τύπο κατασκευής του σκι, όπως υβριδικό καπάκι
        ή μερικό καπάκι
    skiing_style:
      name: Στυλ σκι
      description: Ταξινομεί προϊόντα με βάση την τεχνική και το στυλ του σκι, όπως
        κατάβαση ή σκανδιναβικό
    skill_level:
      name: Επίπεδο δεξιοτήτων
      description: Προσδιορίζει την επάρκεια που απαιτείται για τη χρήση ενός προϊόντος,
        όπως για αρχάριους ή ειδικούς
    skin_care_effect:
      name: Αποτέλεσμα περιποίησης του δέρματος
      description: Καθορίζει τα επιδιωκόμενα οφέλη των προϊόντων περιποίησης του δέρματος,
        π.χ. αντιγήρανση, ενίσχυση του όγκου
    skin_care_features:
      name: Χαρακτηριστικά περιποίησης του δέρματος
      description: Προσδιορίζει τα οφέλη των ειδών φροντίδας του δέρματος, όπως η
        μακροχρόνια προστασία ή η προστασία UVA/UVB
    skin_care_mask_type:
      name: Τύπος μάσκας περιποίησης δέρματος
      description: Προσδιορίζει το είδος της μάσκας περιποίησης δέρματος, όπως πηλός
        ή απολέπιση
    skin_care_tool_features:
      name: Χαρακτηριστικά εργαλείου περιποίησης δέρματος
      description: Επισημαίνει αξιοσημείωτα λειτουργικά χαρακτηριστικά ή χαρακτηριστικά
        ευκολίας του εργαλείου (π.χ., αδιάβροχο, ρυθμιζόμενη ένταση).
    skin_tone:
      name: Τόνος δέρματος
      description: Ταιριάζει προϊόντα με συγκεκριμένους τόνους δέρματος, π.χ. σκουρόχρωμο
        δέρμα, ανοιχτόχρωμο δέρμα
    skin_undertone:
      name: Υποτόνος δέρματος
      description: Βοηθά στην αντιστοίχιση προϊόντων με συγκεκριμένους υποτόνους δέρματος,
