    storage_drive_interface_type:
      name: Τύπος διεπαφής μονάδας αποθήκευσης
      description: Καθορίζει τον τύπο σύνδεσης των συσκευών αποθήκευσης, π.χ. SATA,
        NVMe
    storage_drive_interfaces_supported:
      name: Υποστηριζόμενες διεπαφές μονάδας αποθήκευσης
      description: Προσδιορίζει τις συμβατές διεπαφές μονάδας αποθήκευσης, όπως SATA
