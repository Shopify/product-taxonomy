    slipper_style:
      name: Στυλ παντόφλας
      description: Προσδιορίζει το στυλ των παντόφλων, όπως μπαλαρίνα ή σαγιονάρα
    slot_machine_type:
      name: Τύπος κουλοχέρη
      description: Προσδιορίζει το στυλ του κουλοχέρη, όπως μοντέρνο ή παραδοσιακό
    small_animal_dietary_requirements:
