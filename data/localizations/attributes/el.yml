    snowboarding_style:
      name: Στυλ snowboard
      description: Καθορίζει τον τύπο snowboard για τον οποίο έχει σχεδιαστεί το προϊόν,
        όπως backcountry ή freeriding
    snowmobile_type:
      name: Τύπος snowmobile
      description: Καθορίζει την προβλεπόμενη χρήση ή τον σχεδιασμό ενός οχήματος
        χιονιού, όπως χρηστικό ή τουριστικό
    soap_making_method:
      name: Μέθοδος παρασκευής σαπουνιού
      description: Προσδιορίζει την πρωτεύουσα διαδικασία παραγωγής που χρησιμοποιείται
