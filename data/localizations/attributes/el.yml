    stripper_application:
      name: Εφαρμογή διαβρωτικού
      description: Καθορίζει την επίστρωση ή το συγκολλητικό υλικό που έχει σχεδιαστεί
        να αφαιρεί ή να διαλύει ένα προϊόν, π.χ. εποξειδικό χρώμα
    stroller_features:
      name: Χαρακτηριστικά καροτσιού
      description: Προσδιορίζει συγκεκριμένα χαρακτηριστικά ενός καροτσιού, όπως πτυσσόμενο
