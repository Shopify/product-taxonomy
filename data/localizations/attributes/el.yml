    strap_design:
      name: Σχέδιο λουριού
      description: Περιγράφει την οπτική εμφάνιση του λουριού ενός προϊόντος, όπως
        εμπριμέ ή μοτίβο
    strap_wearing_style:
      name: Στυλ φορέματος ιμάντα
      description: Προσδιορίζει πώς προορίζεται να φορεθεί ή να μεταφερθεί ο ιμάντας.
    straw/stirrer_design:
      name: Σχέδιο για καλαμάκι/αναδευτήρα
      description: Περιγράφει το σχέδιο ή το στυλ για καλαμάκι ή αναδευτήρα, όπως
