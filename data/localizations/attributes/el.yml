    skirt/dress_length_type:
      name: Τύπος μήκους φούστας/φορέματος
      description: Καθορίζει το μήκος για φούστες ή φορέματα, όπως μίνι ή μάξι
    skirt_style:
      name: Στυλ φούστας
      description: Περιγράφει το σχέδιο ή το κόψιμο μιας φούστας, όπως ίσια ή πτυχωτή
    slat_color:
