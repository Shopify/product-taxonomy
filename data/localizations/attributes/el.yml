    string_color:
      name: Χρώμα χορδής
      description: Προσδιορίζει το χρώμα της χορδής σε τόξα και βαλλίστρες, όπως διαφανές
    string_instrument_size:
      name: Μέγεθος έγχορδου οργάνου
      description: Υποδεικνύει το μέγεθος ενός έγχορδου οργάνου, όπως 3/4 ή πλήρους
