    small_animal_food_form:
      name: Μορφή τροφής για μικρά ζώα
      description: Προσδιορίζει τη μορφή τροφής για μικρά ζώα, π.χ. νωπή, σανό
    small_animal_food_ingredients:
      name: Συστατικά τροφής για μικρά ζώα
      description: Προσδιορίζει τα κύρια συστατικά των τροφών για μικρά ζώα, όπως
