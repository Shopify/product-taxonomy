    staircase_features:
      name: Χαρακτηριστικά κλιμακοστασίου
      description: Υπογραμμίζει μοναδικές πτυχές των κλιμακοστασίων, όπως ανοιχτές
        μετώπες ή πλατύσκαλο
    staircase_type:
      name: Τύπος κλιμακοστασίου
      description: Καθορίζει τη σχεδίαση των κλιμακοστασίων, π.χ. καμπυλωτά, εξωτερικά
    stamp_theme:
      name: Θέμα σφραγίδας
      description: Προσδιορίζει το θέμα ή το σχέδιο μιας σφραγίδας, όπως ζώα ή ιστορία
    stamp_type:
      name: Τύπος σφραγίδας
      description: Προσδιορίζει το είδος της σφραγίδας γραφείου, όπως παραδοσιακή
