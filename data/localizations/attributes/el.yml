      description: Περιγράφει τη μορφή ενός αναπνευστήρα, όπως σε σχήμα J ή εύκαμπτος
    snowboard_construction:
      name: Κατασκευή snowboard
      description: Προσδιορίζει το στυλ κατασκευής των snowboard, όπως camber ή rocker
    snowboard_design:
      name: Σχέδιο snowboard
      description: Καθορίζει το σχήμα και το στυλ ενός snowboard, όπως το δίδυμο άκρο
