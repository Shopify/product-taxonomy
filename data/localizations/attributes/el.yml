    sprinkler_head_type:
      name: Τύπος κεφαλής ψεκαστήρα
      description: Καθορίζει το σχέδιο του ψεκασμού νερού, π.χ. κώνος, πίδακας
    sprinkler_shape:
      name: Σχήμα ψεκαστήρα
