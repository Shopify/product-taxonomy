    sleeve_length_type:
      name: Τύπος μήκους μανικιού
      description: Καθορίζει το στυλ των μανικιών σε είδη ένδυσης, όπως κοντά ή αμάνικα
    sleeving_style:
      name: Στυλ μανικιού
      description: Ταξινομεί την κατασκευή ή τον δομικό σχεδιασμό του μανικιού (π.χ.,
