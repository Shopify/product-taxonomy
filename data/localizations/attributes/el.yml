    softball_discipline:
      name: Παραλλαγή σόφτμπολ
      description: 'Καθορίζει τον συγκεκριμένο τύπο σόφτμπολ, όπως fastpitch ή slowpitch '
    softbox_mounting_type:
      name: Τύπος τοποθέτησης softbox
      description: Καθορίζει τη συμβατότητα του softbox με διαφορετικά συστήματα φωτισμού,
