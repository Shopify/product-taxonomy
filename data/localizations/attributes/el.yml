    stylus_holder_type:
      name: Τύπος βάσης γραφίδας
      description: Υποδεικνύει εάν η θήκη παρέχει αποθήκευση για γραφίδα και τι μορφή
        παίρνει αυτή η αποθήκευση.
    stylus_support:
      name: Υποστήριξη γραφίδας
