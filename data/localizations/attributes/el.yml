    soda_variety:
      name: Ποικιλία αναψυκτικού
      description: Ταξινομεί τα προϊόντα αναψυκτικού ανά τύπο ή γεύση, π.χ. λεμόνι
        λάιμ, πορτοκάλι
    sofa_features:
      name: Χαρακτηριστικά καναπέ
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά ενός καναπέ, όπως ρυθμιζόμενα
