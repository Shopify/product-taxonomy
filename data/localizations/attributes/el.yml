    solar_cell_type:
      name: Τύπος ηλιακών κυψελών
      description: Καθορίζει την τεχνολογία των ηλιακών κυψελών, όπως λεπτής μεμβράνης
        ή μονοκρυσταλλικού πυριτίου
    solar_panel_connections:
      name: Συνδέσεις ηλιακών πάνελ
      description: Καθορίζει τον σύνδεσμο που χρησιμοποιείται με ηλιακούς συλλέκτες,
        π.χ. κλιπ αλιγάτορα ή βύσμα DC
    solar_panel_design:
      name: Σχεδιασμός ηλιακών πάνελ
      description: Περιγράφει το στυλ εγκατάστασης των ηλιακών πάνελ, όπως ανεξάρτητοι
        ή στέγης
    solder/flux_application:
      name: Εφαρμογή προϊόντος συγκόλλησης/πάστας
      description: Καθορίζει την περιοχή εφαρμογής για προϊόντα συγκόλλησης/πάστας,
        π.χ. ηλεκτρονικά, υδραυλικά
    soleplate_type:
      name: Τύπος πλάκας
      description: Καθορίζει τον τύπο της πλάκας που χρησιμοποιείται σε σίδερα, όπως
        κεραμικό ή ανοξείδωτος χάλυβας
    solubility:
      name: Διαλυτότητα
      description: Καθορίζει πόσο καλά διαλύεται ένα προϊόν σε ένα υγρό, π.χ. αδιάλυτο,
        μερικώς διαλυτό
    solution_type:
      name: Τύπος διαλύματος
      description: Καθορίζει τον τύπο διαλύματος για προϊόντα φροντίδας της όρασης,
        όπως φυσιολογικός ορός ή υπεροξείδιο του υδρογόνου
    solvent/thinner_application:
      name: Εφαρμογή διαλύτη/διαλυτικού
      description: Καθορίζει την επικάλυψη ή το συγκολλητικό υλικό που έχει σχεδιαστεί
        να διαλύει ή να αραιώνει ένα προϊόν, π.χ. εποξειδικό, βαφή
    solvent_application:
      name: Εφαρμογή διαλύτη
      description: Καθορίζει την επίστρωση ή το συγκολλητικό υλικό που έχει σχεδιαστεί
        να διαλύει ένα προϊόν, π.χ. εποξειδικό, βαφή
    sonar_imaging_modes:
      name: Λειτουργίες απεικόνισης σόναρ
      description: Προσδιορίζει τις τεχνολογίες προβολής σόναρ που υποστηρίζει ο ανιχνευτής
        ψαριών.
    soothing_sounds:
      name: Καταπραϋντικοί ήχοι
      description: Καθορίζει την ποικιλία των χαλαρωτικών ήχων που προσφέρονται, π.χ.
        χτύπος της καρδιάς, λευκός θόρυβος
    sound_controls:
      name: Χειριστήρια ήχου
      description: Προσδιορίζει τις λειτουργίες ελέγχου ήχου σε μουσικά όργανα ή ενισχυτές,
        π.χ. αντήχηση, ισοσταθμιστής
    sound_effects:
      name: Ηχητικά εφέ
      description: Προσδιορίζει τους τύπους ηχητικών εφέ, συνήθως για μουσικά όργανα
        και αξεσουάρ. πχ συμπίεση, καθυστέρηση
    sound_insulation:
      name: Ηχομόνωση
      description: Προσδιορίζει τις ηχομονωτικές δυνατότητες ενός προϊόντος, όπως
        ακουστική ή μη μόνωση
    sound_options:
      name: Επιλογές ήχου
      description: Καθορίζει τις διάφορες διαθέσιμες επιλογές ήχου, συνήθως για μετρονόμους.
        π.χ. καταμέτρηση φωνής, κλικ
    speaker_configuration:
      name: Διαμόρφωση ηχείου
      description: Περιγράφει τη διαμόρφωση των ηχείων, συνήθως για ερμάρια ενισχυτών
        μουσικών οργάνων, π.χ. κλειστή πλάτη
    speaker_design:
      name: Σχεδιασμός ηχείων
      description: Καθορίζει τη φυσική και λειτουργική σχεδίαση ηχείων, όπως υπογούφερ
        ή πύργος
    speaker_enclosure_type:
      name: Τύπος περιβλήματος ηχείου
      description: Περιγράφει την ακουστική αρχή περιβλήματος που χρησιμοποιείται
        από την καμπίνα του ηχείου.
    speaker_features:
      name: Χαρακτηριστικά ηχείων
      description: Προσδιορίζει ειδικές δυνατότητες των ηχείων, όπως ακύρωση θορύβου
        ή φωνητικός έλεγχος
    speaker_position_in_laptop:
      name: Θέση ηχείου στον φορητό υπολογιστή
      description: Υποδεικνύει πού εγκαθίσταται η συναρμολόγηση ηχείων εντός του φορητού
        υπολογιστή.
    speaker_technology:
      name: Τεχνολογία ηχείων
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται στη σχεδίαση του ηχείου,
        π.χ. δυναμική, ηλεκτροστατική
    speakerphone_type:
      name: Τύπος μεγαφώνου
      description: Καθορίζει τη λειτουργικότητα των μεγαφώνων σε οχήματα, όπως ασύρματα
        ή hands-free
    speed_settings:
      name: Ρυθμίσεις ταχύτητας
      description: Καθορίζει το εύρος των επιλογών ταχύτητας για ένα προϊόν, π.χ.
        μεμονωμένη, μεταβλητή
    spf_level:
      name: Επίπεδο SPF
      description: Καθορίζει το επίπεδο προστασίας UVB που προσφέρει ένα προϊόν, π.χ.
        SPF 50
    spike_design:
      name: Σχέδιο πασάλων
      description: Προσδιορίζει το στυλ των πασάλων, όπως για σκηνή ή γεωύφασμα
    spinner_type:
      name: Τύπος περιστρεφόμενου τροχού
      description: Περιγράφει τον αριθμό των τροχών σε αποσκευές ή βαλίτσες, όπως
        δίτροχες ή τετράτροχες
    spirit_dilution:
      name: Βαθμός αραίωσης αλκοολούχων ποτών
      description: Υποδεικνύει το επίπεδο συγκέντρωσης των αλκοολούχων ποτών, π.χ.
        αραιωμένο, χωρίς αραίωση
    splint/stay_configuration:
      name: Διαμόρφωση νάρθηκα/στηρίγματος
      description: Περιγράφει την παρουσία και τον τύπο άκαμπτων ή ημιάκαμπτων στηριγμάτων
        ή ναρθήκων που χρησιμοποιούνται στον νάρθηκα.
    splitter/switch_features:
      name: Χαρακτηριστικά διαχωριστή/διακόπτη
      description: Περιγράφει τις δυνατότητες διαχωριστών ή διακοπτών ήχου/βίντεο,
        όπως υποστήριξη 3D ή εξαγωγή ήχου
    splitter_use:
      name: Χρήση διαχωριστή
      description: Καθορίζει τους τύπους σύνδεσης που υποστηρίζει ένας διαχωριστής,
        όπως HDMI ή ethernet
    sponge_shape:
      name: Σχήμα σφουγγαριού
      description: Περιγράφει τη μορφή σφουγγαριών, συνήθως για μακιγιάζ, π.χ. με
        περίγραμμα, δάκρυ
    spool_color:
      name: Χρώμα μασουριού
      description: Προσδιορίζει το χρώμα του μασουριού σε καρούλια ψαρέματος, όπως
        διαφανές ή πράσινο
    spool_material:
      name: Υλικό μασουριού
      description: Καθορίζει το υλικό που χρησιμοποιείται για το μασούρι σε καρούλι
        ψαρέματος, όπως πλαστικό ή γραφίτης
    spool_pattern:
      name: Μοτίβο μασουριού
      description: Περιγράφει το σχέδιο ή το μοτίβο του μασουριού σε καρούλι ψαρέματος,
        όπως καμουφλάζ ή συμπαγές
    sport:
      name: Άθλημα
      description: Καθορίζει το άθλημα για το οποίο προορίζεται το προϊόν, όπως μπάσκετ
