    stone_name:
      name: Όνομα πέτρας
      description: Καθορίζει τον τύπο της πέτρας που χρησιμοποιείται σε προϊόντα υγείας
        και ομορφιάς, όπως ο ροζ χαλαζίας ή ο οψιανός
    stone_shape:
      name: Σχήμα πέτρας
      description: Καθορίζει το γεωμετρικό σχήμα μιας πέτρας, π.χ. καρδιά, εξάγωνο
    stone_type:
      name: Τύπος πέτρας
      description: Διακρίνει τους τύπους πέτρας για εργαλεία χαλάρωσης, όπως κρύα
