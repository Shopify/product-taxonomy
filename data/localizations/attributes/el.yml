    string_pattern:
      name: Μοτίβο χορδής
      description: Περιγράφει το σχέδιο σε χορδή τοξοβολίας, όπως ριγέ
    strip/patch_technology:
      name: Τεχνολογία ταινίας/επιθέματος
      description: Περιγράφει το πρωτεύον υλικό ή την τεχνολογία που χρησιμοποιείται
