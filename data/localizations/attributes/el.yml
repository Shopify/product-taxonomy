    surverying_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ τοπογράφου
      description: Καθορίζει επιπλέον εξαρτήματα συσκευασμένα με τοπογραφικά εργαλεία,
        όπως σφιγκτήρα ή ράβδο ισοπέδωσης
    suspender_style:
      name: Στυλ για τιράντες
      description: 'Καθορίζει το στυλ της τιράντας, π.χ. τύπου X ή Y '
    sustainability:
      name: Βιωσιμότητα
      description: Επισημαίνει προϊόντα που υποστηρίζουν βιώσιμες πρακτικές, π.χ.
        δίκαιο εμπόριο, με υπεύθυνη πηγή
    swab_end_configuration:
      name: Διαμόρφωση άκρου μπατονέτας
      description: Υποδεικνύει εάν η μπατονέτα έχει ένα χρησιμοποιήσιμο άκρο ή δύο,
        και εάν τα άκρα διαφέρουν.
    swab_material:
      name: Υλικό μπατονέτας
      description: Καθορίζει το ύφασμα μιας μπατονέτας καθαρισμού μουσικών οργάνων,
        π.χ. μετάξι, τσόχα
    swimwear_features:
      name: Χαρακτηριστικά για μαγιό
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των μαγιό, όπως γρήγορο
        στέγνωμα ή αντηλιακή προστασία UPF
    swing_style:
      name: Στυλ αιώρησης
      description: Ταξινομείται με βάση την τεχνική αιώρησης, συνήθως για ρακέτες
        τένις, π.χ. μακριά χτυπήματα
    swing_weighting:
      name: Ζύγιση αιώρησης
      description: Υποδεικνύει την κατανομή βάρους ενός ρόπαλου μπέιζμπολ ή σόφτμπολ,
        π.χ. ισορροπημένο, τελικό φορτίο
    switch_control_type:
      name: Τύπος ελέγχου διακόπτη
      description: Περιγράφει πώς ελέγχεται ένας διακόπτης φώτων, όπως κουμπί ή αισθητήρας
    switch_management_type:
      name: Τύπος διαχείρισης διακόπτη
      description: Κατατάσσει το επίπεδο ή το στυλ διαχείρισης και διαμόρφωσης που
        υποστηρίζει ο διακόπτης (π.χ., μη διαχειριζόμενος, έξυπνος, διαχειριζόμενος
        μέσω web, πλήρως διαχειριζόμενος).
    switch_mechanism:
      name: Μηχανισμός διακόπτη
      description: Προσδιορίζει την εσωτερική τεχνολογία ενεργοποίησης του κουμπιού
        (π.χ., μικροδιακόπτης, οπτικός), που επηρεάζει την αίσθηση, τη διάρκεια ζωής
        και την ανταπόκριση.
    switch_stem_compatibility:
      name: Συμβατότητα στελέχους διακόπτη
      description: Προσδιορίζει τα μηχανικά ή άλλα στυλ στελέχους διακόπτη που ταιριάζει
        το καπάκι πλήκτρου ή το σετ πλήκτρων.
    switching_layer:
      name: Επίπεδο μεταγωγής
      description: Υποδεικνύει το υψηλότερο επίπεδο OSI στο οποίο λειτουργεί εγγενώς
        ο διακόπτης (π.χ., Επίπεδο 2, Επίπεδο 3, υβριδικά).
    switching_method:
      name: Μέθοδος εναλλαγής
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για την εναλλαγή μεταξύ
        διαφορετικών εισόδων σε ηλεκτρονικά προϊόντα, π.χ. με τηλεχειριστήριο
    synthesis_method:
      name: Μέθοδος σύνθεσης
      description: Καθορίζει τη μέθοδο σύνθεσης ήχου σε ηλεκτρονικά όργανα, όπως εικονικά
        αναλογικά ή αρθρωτά
    system/power_cable_connector_type_end_a:
      name: Τύπος συνδετήρα καλωδίου συστήματος/τροφοδοσίας (άκρο A)
      description: Προσδιορίζει το ακριβές πρότυπο συνδετήρα που υπάρχει στο πρώτο
        άκρο του καλωδίου (π.χ., IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: Τύπος συνδετήρα καλωδίου συστήματος/τροφοδοσίας (άκρο B)
      description: Προσδιορίζει το ακριβές πρότυπο συνδετήρα που υπάρχει στο δεύτερο
        άκρο του καλωδίου (π.χ., IEC C13, DC 5.5 × 2.1 mm, φις μπανάνα).
    system_components_included:
      name: Εξαρτήματα συστήματος που περιλαμβάνονται
      description: Αναφέρει τα βασικά κομμάτια υλικού που αποστέλλονται με το σύστημα
        ώστε οι αγοραστές να κατανοούν τι είναι ή δεν είναι μέρος του πακέτου.
    system_of_measurement:
      name: Σύστημα μέτρησης
      description: Προσδιορίζει τη μονάδα μέτρησης που χρησιμοποιείται σε ένα προϊόν,
        όπως το αυτοκρατορικό ή το μετρικό
    system_range:
      name: Εύρος συστήματος
      description: Καθορίζει την περιοχή λειτουργίας των ιατρικών συστημάτων συναγερμού,
        π.χ. με έδρα το σπίτι, GPS
    systems_supported:
      name: Υποστηριζόμενα συστήματα
      description: Καθορίζει τις πλατφόρμες παιχνιδιών με τις οποίες είναι συμβατό
        ένα προϊόν. π.χ. Xbox, Nintendo switch
    tab_style:
      name: Στυλ καρτέλας
      description: Καθορίζει το στυλ των καρτελών στα αξεσουάρ βιβλιοδεσίας, π.χ.
        προεκτυπωμένα, αριθμημένα
    tablet_case_functional_features:
      name: Λειτουργικά χαρακτηριστικά θήκης tablet
      description: Επισημαίνει βασικές λειτουργικές προσθήκες που συμπεριλαμβάνονται
        με τη θήκη tablet.
    tabletop_color:
      name: Χρώμα επιφάνειας τραπεζιού
      description: Καθορίζει το χρώμα της επιφάνειας ενός τραπεζιού, όπως μαύρο ή
        λευκό
    tabletop_material:
      name: Υλικό επιφάνειας τραπεζιού
      description: Προσδιορίζει τη σύνθεση της επιφάνειας του τραπεζιού, π.χ. κόντρα
        πλακέ, σκυρόδεμα
    tabletop_pattern:
      name: Μοτίβο επιφάνειας τραπεζιού
      description: Καθορίζει το σχέδιο ή την εκτύπωση σε μια επιφάνεια τραπεζιού,
        όπως χριστουγεννιάτικη ή μασίφ
    tabletop_shape:
      name: Σχήμα επιφάνειας τραπεζιού
      description: Περιγράφει το γεωμετρικό σχήμα της επιφάνειας ενός τραπεζιού, π.χ.
        τετράγωνο, σε ελλειπτικό σχήμα
    tableware_material:
      name: Υλικό επιτραπέζιου σκεύους
      description: Καθορίζει τη σύνθεση επιτραπέζιων σκευών, όπως πορσελάνη bone china
        ή πήλινο
    tack/pushpin_head_design:
      name: Σχεδιασμός κεφαλής πινέζας
      description: Περιγράφει το σχήμα μιας κεφαλής πινέζας, όπως στρογγυλό ή διακοσμητικό
    tag_fastening:
      name: Στερέωση ετικέτας
      description: Περιγράφει τη μέθοδο που χρησιμοποιείται για τη στερέωση μιας ετικέτας
        στις αποσκευές, όπως πόρπες ή βρόχους
    talc_content:
      name: Περιεκτικότητα σε τάλκη
      description: Δηλώνει εάν η σύνθεση περιέχει τάλκη, είναι χωρίς τάλκη ή χρησιμοποιεί
        μειωμένα επίπεδα τάλκης.
    tampon_absorbency_level:
      name: Επίπεδο απορροφητικότητας ταμπόν
      description: Προσδιορίζει την απορροφητική ικανότητα των ταμπόν, όπως ελαφριά
        ή βαριά
    tampon_features:
      name: Χαρακτηριστικά ταμπόν
      description: Περιγράφει τα ειδικά χαρακτηριστικά των ταμπόν, όπως ο άνετος σχεδιασμός
        ή η στεγανότητα
    tan_type:
      name: Τύπος μαυρίσματος
      description: Καθορίζει την ένταση του χρώματος και τη διαδικασία εφαρμογής των
        ειδών μαυρίσματος, π.χ. βαθύ, στιγμιαίο
    tank_color:
      name: Χρώμα ντεπόζιτου
      description: Προσδιορίζει το χρώμα ενός προϊόντος, συνήθως καζανάκια τουαλέτας,
        π.χ. μαύρο, άσπρο
    tank_material:
      name: Υλικό ντεπόζιτου
      description: Καθορίζει το υλικό του ντεπόζιτου ενός προϊόντος, συνήθως για εργαλεία
        κηπουρικής, π.χ. μέταλλο, πλαστικό
    tank_pattern:
      name: Μοτίβο ντεπόζιτου
      description: Προσδιορίζει το οπτικό μοτίβο στα καζανάκια τουαλέτας, όπως συμπαγές
        ή αφηρημένο
    tape_cartridge_format:
      name: Μορφή κασέτας ταινίας
      description: Καθορίζει τις τεχνολογίες κασέτας ταινίας (π.χ., LTO, DAT, DLT)
        που μπορεί να διαβάσει ή να γράψει η μονάδα.
    tape_cartridge_generation:
      name: Γενιά κασέτας ταινίας
      description: Υποδεικνύει τη συγκεκριμένη γενιά ή έκδοση εντός μιας οικογένειας
        τεχνολογίας ταινίας (πιο συχνά γενιές LTO) που υποστηρίζει η μονάδα.
    tape_material:
      name: Υλικό ταινίας
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε προϊόντα ταινίας,
        όπως βινύλιο ή πλαστικό
    tape_speed_supported:
      name: Υποστηριζόμενη ταχύτητα ταινίας
      description: Αναφέρει τις ταχύτητες αναπαραγωγής και εγγραφής ταινίας (ίντσες
        ανά δευτερόλεπτο) στις οποίες μπορεί να λειτουργήσει η μονάδα reel-to-reel.
    target_audience:
      name: Στοχευόμενο κοινό
      description: Καθορίζει για ποιους είναι κατάλληλο ένα προϊόν, όπως για παιδιά
        ή για όλες τις ηλικίες
    target_facial_zone:
      name: Στοχευμένη ζώνη προσώπου
      description: Καθορίζει τη ζώνη του προσώπου που είναι σχεδιασμένη να θεραπεύει
        η ταινία πόρων (π.χ., μύτη, πηγούνι, ζώνη Τ).
    target_gender:
      name: Φύλο-στόχος
      description: Προσδιορίζει το φύλο στο οποίο απευθύνεται ένα προϊόν, όπως θηλυκό,
        αρσενικό ή unisex
    targeted_pests:
      name: Στοχευόμενα παράσιτα
      description: Προσδιορίζει τον τύπο των παρασίτων για τα οποία ένα προϊόν είναι
        αποτελεσματικό π.χ. μούχλα, φύκια
    targeted_skin_concern:
      name: Στοχευμένη ανησυχία δέρματος
      description: Υποδεικνύει τη συγκεκριμένη βλάβη ή δερματική πάθηση που το προϊόν
        είναι σχεδιασμένο να θεραπεύσει.
    targeted_stains:
      name: Στοχευόμενοι λεκέδες
      description: Προσδιορίζει τους τύπους λεκέδων που έχει σχεδιαστεί να αντιμετωπίζει
        ένα προϊόν, όπως φαγητό ή λάσπη
    tea_input_type:
      name: Τύπος υλικού για παρασκευή τσαγιού
      description: Καθορίζει το στυλ παρασκευής του τσαγιού, π.χ. σακουλάκια, K-cups
    technology_level:
      name: Τεχνολογικό επίπεδο
      description: Υποδεικνύει την πολυπλοκότητα της τεχνολογίας ενός προϊόντος, π.χ.
        βασική, προηγμένη
    teeth_material:
      name: Υλικό για δόντια εξοπλισμού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στα δόντια εξοπλισμού,
        συνήθως για εργαλεία κηπουρικής, π.χ. πλαστικό, μέταλλο
    telephone_cable_interface:
      name: Διεπαφή καλωδίου τηλεφώνου
      description: Καθορίζει τον τύπο βύσματος που χρησιμοποιείται σε καλώδια τηλεφώνου,
        όπως το RJ-10
    telephone_cable_second_interface:
      name: Δεύτερη διεπαφή τηλεφωνικού καλωδίου
      description: Καθορίζει τον τύπο συνδετήρα στο αντίθετο άκρο του καλωδίου όταν
        διαφέρει από την κύρια διεπαφή (π.χ., RJ45 σε RJ11).
    telephone_cord_style:
      name: Στυλ τηλεφωνικού καλωδίου
      description: Καθορίζει τη φυσική μορφή του τηλεφωνικού καλωδίου, βοηθώντας τους
        πελάτες που χρειάζονται ένα ευθύ, σπειροειδές ή ειδικό καλώδιο για αντικατάσταση
        ακουστικών και επιτοίχιων στηριγμάτων.
    telephone_style:
      name: Στυλ τηλεφώνου
      description: Καθορίζει το σχέδιο ή την αισθητική ενός τηλεφώνου, π.χ. vintage,
        μοντέρνο
    telescope_level:
      name: Επίπεδο τηλεσκοπίου
      description: Υποδεικνύει την πολυπλοκότητα ή το επίπεδο δεξιοτήτων που απαιτείται
        για ένα τηλεσκόπιο, όπως για αρχάριους ή για προχωρημένους
    telescope_tracking_system:
      name: Σύστημα παρακολούθησης τηλεσκοπίου
      description: Προσδιορίζει τον τύπο του συστήματος παρακολούθησης σε τηλεσκόπια,
        π.χ. χειροκίνητο, μηχανοκίνητο
    television_circuit_board_type:
      name: Τύπος πλακέτας κυκλώματος τηλεόρασης
      description: Προσδιορίζει τον λειτουργικό ρόλο της πλακέτας κυκλώματος εντός
        ενός τηλεοπτικού σετ (π.χ., κύρια πλακέτα, πλακέτα τροφοδοσίας, πλακέτα T-Con).
    television_shape:
      name: Σχήμα τηλεόρασης
      description: Καθορίζει το φυσικό περίγραμμα της οθόνης της τηλεόρασης, όπως
        κυρτή ή επίπεδη
    television_speaker_position:
      name: Θέση ηχείου τηλεόρασης
      description: Προσδιορίζει τη φυσική θέση ή τον ρόλο του ηχείου εντός της συναρμολόγησης
        της τηλεόρασης (π.χ., αριστερά, δεξιά, κέντρο, subwoofer).
    television_specialized_features:
      name: Εξειδικευμένες δυνατότητες τηλεόρασης
      description: Προσδιορίζει μοναδικές δυνατότητες μιας τηλεόρασης, όπως φωνητικός
        έλεγχος ή ενσωματωμένη γραμμή ήχου
    temperature:
      name: Θερμοκρασία
      description: Καθορίζει τις ρυθμίσεις θερμότητας για συσκευές όπως πιστόλια κόλλας,
        π.χ. διπλή, υψηλή
    temperature_control:
      name: Έλεγχος θερμοκρασίας
      description: 'Καθορίζει τη δυνατότητα προσαρμογής της θερμοκρασίας του προϊόντος,
        συνήθως για θερμαντήρες μπουκαλιών. π.χ. ρυθμιζόμενο, προκαθορισμένο '
    temperature_measurement:
      name: Μέτρηση θερμοκρασίας
      description: Υποδεικνύει εάν το προϊόν μετράει σε Φαρενάιτ ή Κελσίου
    template_type:
      name: Τύπος προτύπου
      description: Καθορίζει την κατηγορία των προτύπων εγγράφων, π.χ. επαγγελματική
        κάρτα, φυλλάδιο
    temple_color:
      name: Χρώμα βραχίονα γυαλιών
      description: Καθορίζει το χρώμα του βραχίονα των γυαλιών, όπως κόκκινο ή διαφανές
    temple_pattern:
      name: Μοτίβο βραχίονα γυαλιών
      description: Περιγράφει το σχέδιο ή το μοτίβο του βραχίονα των γυαλιών, όπως
        λογότυπο ή καρό
    tension:
      name: Τάση
      description: Περιγράφει το επίπεδο τάσης των χορδών για μουσικά όργανα, π.χ.
        εξαιρετικά βαριά
    tensioning_system:
      name: Σύστημα τάνυσης
      description: Περιγράφει τον μηχανισμό που χρησιμοποιείται για να διατηρεί την
        επιφάνεια της οθόνης επίπεδη και χωρίς τσακίσματα.
    tent_setup_style:
      name: Τρόπος στησίματος σκηνής
      description: Υποδεικνύει πώς η σκηνή αναπτύσσεται ή συναρμολογείται.
    tequila_variety:
      name: Ποικιλία τεκίλας
      description: Καθορίζει το είδος της τεκίλας, π.χ. χρυσό, πεπαλαιωμένο
    terminal_operation:
      name: Λειτουργία τερματικού
      description: Καθορίζει τον τύπο λειτουργίας των ταμειακών μηχανών, όπως χειροκίνητες
        ή ηλεκτρονικές
    termination_method:
      name: Μέθοδος τερματισμού
      description: Καθορίζει την τεχνική που χρησιμοποιείται για την προσάρτηση των
        αγωγών στις επαφές του συνδετήρα (π.χ., πρέσα, συγκόλληση, IDC).
    terrain:
      name: Έδαφος
      description: Καθορίζει τον τύπο εδάφους για τον οποίο έχει σχεδιαστεί ένα προϊόν,
        συνήθως για εξοπλισμό εξωτερικού χώρου, π.χ. ορεινό, κυλιόμενο
    test_format:
      name: Μορφή δοκιμής
      description: Καθορίζει τον τύπο του τεστ για προϊόντα υγείας και ομορφιάς, π.χ.
        ψηφιακό, δοκιμαστική ταινία
    test_method:
      name: Μέθοδος δοκιμής
      description: Καθορίζει τη διαδικασία για τη διεξαγωγή μιας ιατρικής εξέτασης,
        π.χ. εξέταση στο σπίτι, εργαστηριακή ανάλυση
    test_sample:
      name: Δείγμα δοκιμής
      description: Καθορίζει τον τύπο του δείγματος που απαιτείται για υγειονομικές
        και ιατρικές εξετάσεις, π.χ. μπατονέτα, σάλιο
    tetherball_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός tetherball
      description: Υποδεικνύει τη συμπερίληψη βασικών αντικειμένων σε ένα σετ tetherball,
        όπως σχοινί ή tetherball
    tethering_policy:
      name: Πολιτική tethering
      description: Διευκρινίζει εάν επιτρέπεται το mobile hotspot ή το tethering σύμφωνα
        με τους όρους του πλάνου eSIM.
    text_plate_material:
      name: Υλικό πινακίδας κειμένου
      description: Προσδιορίζει το υλικό της πινακίδας κειμένου σε σφραγίδες γραφείου,
        όπως μέταλλο ή καουτσούκ
    textile_craft_machine_features:
      name: Χαρακτηριστικά μηχανημάτων κλωστοϋφαντουργίας
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των μηχανημάτων κλωστοϋφαντουργίας,
        όπως ρυθμιζόμενη τάση ή φορητά
    textile_craft_project_type:
      name: Τύπος έργου κλωστοϋφαντουργίας
      description: Προσδιορίζει τον τύπο του έργου κλωστοϋφαντουργίας, όπως το πλέξιμο
        ή το φοδράρισμα
    texture:
      name: Υφή
      description: Καθορίζει την αίσθηση ή τη συνοχή ενός προϊόντος, όπως κρεμώδες,
        ματ ή απορροφητικό
    texture_level:
      name: Επίπεδο υφής
      description: Υποδεικνύει την απαλότητα ή την τραχύτητα ενός προϊόντος, συνήθως
        για διατροφικούς πουρέδες τροφίμων, π.χ. Επίπεδο 1 (πουρέ), Επίπεδο 2 (κιμάς)
    theme:
      name: Θέμα
      description: Περιγράφει το κύριο θέμα ή μοτίβο του προϊόντος, όπως ο αθλητισμός,
        το διάστημα ή οι διακοπές
    therapeutic_features:
      name: Θεραπευτικά χαρακτηριστικά
      description: Απαριθμεί πρόσθετες θεραπευτικές μεθόδους που ενσωματώνονται στον
        αυχενικό νάρθηκα.
    therapeutic_swing_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ θεραπευτικής κούνιας
      description: Απαριθμεί πρόσθετο υλικό ή αξεσουάρ που παρέχονται με την κούνια.
    therapy_mode_supported:
      name: Υποστηριζόμενη λειτουργία θεραπείας
      description: Απαριθμεί τους αλγόριθμους θεραπείας αναπνοής στους οποίους μπορεί
        να λειτουργεί η συσκευή, πέραν του τυπικού APAP.
    therapy_temperature_type:
      name: Τύπος θερμοκρασίας θεραπείας
      description: Υποδεικνύει αν το προϊόν παρέχει θερμή θεραπεία, ψυχρή θεραπεία
        ή και τις δύο.
    thermal_detector_type:
      name: Τύπος θερμικού ανιχνευτή
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται για τη θερμική ανίχνευση
        σε συσκευές, όπως ο ανιχνευτής άμορφου πυριτίου (a Si)
    thermal_sensation:
      name: Θερμική αίσθηση
      description: Περιγράφει την αντιληπτή επίδραση θερμοκρασίας στο δέρμα μετά την
        εφαρμογή.
    thermocouple_type:
      name: Τύπος θερμοστοιχείου
      description: Καθορίζει την κατηγορία θερμοστοιχείου σε αισθητήρες, π.χ. Τύπος
        J, Τύπος S
    thickness_type:
      name: Τύπος πάχους
      description: Υποδεικνύει το επίπεδο πάχους για αντικείμενα, όπως λεπτά, μεσαία
        ή χοντρά
    thinner_application:
      name: Εφαρμογή διαλυτικού
      description: Περιγράφει τον τύπο της ουσίας για την οποία χρησιμοποιείται ένα
        διαλυτικό, όπως χρώμα ή εποξειδικό
    thread_direction:
      name: Κατεύθυνση σπειρώματος
      description: Προσδιορίζει την κατεύθυνση του σπειρώματος σε στοιχεία υλικού,
        όπως αριστερόστροφο ή δεξιόστροφο
    threaded_rod_size:
      name: Μέγεθος ράβδου με σπείρωμα
      description: Καθορίζει τη διάμετρο μιας ράβδου με σπείρωμα, π.χ. M10, M20
    throw_pillow_shape:
      name: Σχήμα διακοσμητικού μαξιλαριού
      description: Προσδιορίζει το σχήμα των διακοσμητικών μαξιλαριών, όπως κυλινδρικό
        ή ορθογώνιο
    thumb_grip_profile:
      name: Προφίλ λαβής αντίχειρα
      description: Περιγράφει την επιφάνεια ή το στυλ σχήματος της κορυφής της λαβής
        αντίχειρα (π.χ., κοίλη, θολωτή), που επηρεάζει τη λαβή και την αίσθηση ελέγχου.
    ticket_additional_features:
      name: Πρόσθετα χαρακτηριστικά εισιτηρίου
      description: Υπογραμμίζει τα πρόσθετα οφέλη που προσφέρονται με τα εισιτήρια,
        όπως δραστηριότητες υποδοχής και χαιρετισμού ή δραστηριότητες μετά την εκδήλωση
    ticket_class:
      name: Κατηγορία εισιτηρίου
      description: Καθορίζει το επίπεδο υπηρεσίας ή την κατηγορία θέσης που παρέχεται
        με το εισιτήριο.
    ticket_type:
      name: Τύπος εισιτηρίου
      description: Προσδιορίζει την κατηγορία των εισιτηρίων για εκδηλώσεις, όπως
        γενική είσοδος ή δεσμευμένες θέσεις
    tile_design:
      name: Σχέδιο πλακιδίων
      description: Περιγράφει το μοτίβο ή το στυλ ενός πλακιδίου, όπως γεωμετρικό
        ή ψαροκόκαλο
    tile_game_type:
      name: Τύπος παιχνιδιού πλακιδίων
      description: Προσδιορίζει τον συγκεκριμένο τύπο παιχνιδιού με πλακίδια, όπως
        ντόμινο ή mahjong
    tile_installation_method:
      name: Μέθοδος τοποθέτησης πλακιδίων
      description: Περιγράφει πώς τοποθετείται ένα προϊόν, συνήθως πλακίδια οροφής
        ή τοίχου, π.χ. εγκατάσταση χωρίς προεξοχή
    tile_look:
      name: Όψη πλακιδίων
      description: Περιγράφει την εμφάνιση ή το στυλ ενός πλακιδίου, όπως μάρμαρο
        ή 3D
    tile_material:
      name: Υλικό πλακιδίων
      description: Προσδιορίζει τη σύνθεση των πλακιδίων, όπως κεραμικά ή από πέτρα
    tile_texture:
      name: Υφή πλακιδίων
      description: Περιγράφει την αίσθηση επιφάνειας ενός πλακιδίου, όπως λεία ή ανάγλυφη
    time_period:
      name: Χρονική περίοδος
      description: Καθορίζει το χρονικό πλαίσιο που σχετίζεται με ακαδημαϊκές εργασίες
        ή σπουδές, όπως η μεσαιωνική περίοδος ή η βιομηχανική επανάσταση
    time_signatures:
      name: Χρονοδείκτες
      description: Καθορίζει τη δομή του μέρους του μέτρου, συνήθως για μετρονόμους,
        π.χ. 4/4, 3/4
    time_weighting:
      name: Χρονική στάθμιση
      description: Χρησιμοποιείται για τον καθορισμό του πόσο γρήγορα ανταποκρίνεται
        ένα ηχόμετρο στις διακυμάνσεις του ήχου, π.χ. αργό, γρήγορο
    timepiece_features:
      name: Χαρακτηριστικά ρολογιού
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά ενός ρολογιού, όπως ρυθμιζόμενη
        διάρκεια ή φωτιζόμενο
    timer_design:
      name: Σχεδιασμός χρονοδιακόπτη
      description: Περιγράφει τον τύπο του χρονοδιακόπτη που χρησιμοποιείται σε εξοπλισμό
        σκοτεινών θαλάμων, όπως ψηφιακός ή αναλογικός
    timer_features:
      name: Χαρακτηριστικά χρονοδιακόπτη
      description: Περιγράφει τις ειδικές λειτουργίες ενός χρονοδιακόπτη, όπως ρυθμιζόμενη
        διάρκεια ή ενσωματωμένη οθόνη
    timer_type:
      name: Τύπος χρονοδιακόπτη
      description: Καθορίζει τη ρύθμιση συχνότητας για χρονοδιακόπτες, π.χ. καθημερινά,
        εβδομαδιαία
    tingle_intensity:
      name: Ένταση τσιμπήματος
      description: Περιγράφει το επίπεδο αίσθησης θερμότητας ή τσιμπήματος που παράγεται
        από το προϊόν όταν εφαρμόζεται.
    tip_design:
      name: Σχέδιο άκρου (μύτης)
      description: Καθορίζει τον τύπο του άκρου σε ιατρικές βελόνες και σύριγγες,
        όπως luer lock ή slip tip
    tip_material:
      name: Υλικό άκρου (μύτης)
      description: Καθορίζει το υλικό που χρησιμοποιείται στο άκρο του προϊόντος,
        π.χ. βαμβάκι, σιλικόνη
    tip_opening:
      name: Άνοιγμα άκρου (μύτης)
      description: Περιγράφει το πλάτος του ανοίγματος του επιστόμιου σε πνευστά όργανα,
        όπως μεσαία ή μεγάλα
    tip_style:
      name: Στυλ άκρου (μύτης)
      description: Περιγράφει το σχέδιο του άκρου του προϊόντος, π.χ. γωνιακό, κυρτό
    tip_type:
      name: Τύπος άκρου (μύτης)
      description: Καθορίζει τον τύπο του άκρου στα καμάκια ψαρέματος, όπως σμίλη
        ή διπλό δόντι
    tire_bead_type:
      name: Τύπος στεφάνης ελαστικού
      description: Καθορίζει τον τύπο στεφάνης για ελαστικά ποδηλάτου, όπως πτυσσόμενη
        ή άκαμπτη
    tobacco_type:
      name: Τύπος καπνού
      description: Καθορίζει την ποικιλία καπνού, π.χ. τούρκικος, Βιρτζίνια
    toddler_bed_features:
      name: Χαρακτηριστικά παιδικού κρεβατιού
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των παιδικών κρεβατιών,
        όπως ρυθμιζόμενο ύψος ή ενσωματωμένο νυχτερινό φως
    toe_spacer_design:
      name: Σχέδιο αποστάτη δακτύλων
      description: Περιγράφει το σχέδιο των διαχωριστικών δακτύλων που χρησιμοποιούνται
        στη φροντίδα των ποδιών, π.χ. σχεδιασμός με περίγραμμα, θηλιά
    toe_strap_type:
      name: Τύπος ιμάντα δακτύλων
      description: Καθορίζει τη σχεδίαση του ιμάντα δακτύλων, συνήθως για δεσίματα
        snowboard ή χιονοπέδιλων, π.χ. καπέλο δακτύλου ή παραδοσιακό
    toe_style:
      name: Στυλ μύτης παπουτσιού
      description: Καθορίζει το σχήμα ή το σχέδιο της μύτης ενός παπουτσιού, όπως
        ανοιχτό ή μυτερό
    toilet/bidet_mounting_type:
      name: Τύπος τοποθέτησης λεκάνης τουαλέτας/μπιντέ
      description: Προσδιορίζει τον τρόπο εγκατάστασης μιας λεκάνης τουαλέτας ή μπιντέ,
        όπως επιτοίχια ή επιδαπέδια
    toilet_cover_design:
      name: Σχέδιο καλύμματος λεκάνης τουαλέτας
      description: Περιγράφει το σχήμα των καλυμμάτων λεκάνης τουαλέτας, όπως στρογγυλά
        ή επιμήκη
    toilet_cover_features:
      name: Χαρακτηριστικά καλύμματος λεκάνης τουαλέτας
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά ενός καλύμματος λεκάνης
        τουαλέτας, όπως γρήγορη απελευθέρωση ή απαλό κλείσιμο
    toilet_mounting_type:
      name: Τύπος τοποθέτησης λεκάνης τουαλέτας
      description: Καθορίζει τη μέθοδο εγκατάστασης μιας λεκάνης τουαλέτας, π.χ. επιτοίχια,
        επιδαπέδια
    toilet_shape:
      name: Σχήμα λεκάνης τουαλέτας
      description: Περιγράφει τη μορφή μιας λεκάνης τουαλέτας, όπως στρογγυλή ή ορθογώνια
    tom_tom_design:
      name: Σχέδιο tom-tom
      description: Περιγράφει τον τύπο του τυμπάνου tom-tom, όπως εγκατεστημένο στο
        δάπεδο ή σε βάση
    tonearm_type:
      name: Τύπος βραχίονα
      description: Περιγράφει τη γεωμετρία του βραχίονα, που επηρεάζει την απόδοση
        παρακολούθησης και τη χρηστικότητα για DJ.
    tool/utensil_material:
      name: Υλικό εργαλείου/σκεύους
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε ένα εργαλείο
        ή σκεύος, όπως ανοξείδωτο ατσάλι ή ξύλο τικ
    tool_key_tip:
      name: Άκρο κλειδιού (εργαλείου)
      description: Καθορίζει τον τύπο του άκρου ενός κλειδιού (εργαλείου), όπως Phillips
        ή γαλλικό κλειδί
    tool_mobility:
      name: Κινητικότητα εργαλείων
      description: Περιγράφει εάν ένα εργαλείο είναι ενσύρματο ή χωρίς καλώδιο, συνήθως
        για οδοντιατρικά προϊόντα
    tool_operation:
      name: Λειτουργία εργαλείου
      description: Περιγράφει τον τρόπο λειτουργίας ενός εργαλείου, όπως χειροκίνητα
        ή ηλεκτρικά
    toothbrush_head_size:
      name: Μέγεθος κεφαλής οδοντόβουρτσας
      description: Καθορίζει το σχετικό μέγεθος της κεφαλής βουρτσίσματος για να ταιριάζει
        σε διαφορετικά μεγέθη στόματος και ανάγκες καθαρισμού.
    toothbrush_head_type:
      name: Τύπος κεφαλής οδοντόβουρτσας
      description: Κατηγοριοποιεί το λειτουργικό στυλ της κεφαλής (π.χ., λεύκανση,
        φροντίδα ούλων, παιδιά).
    toothpaste_type:
      name: Τύπος οδοντόκρεμας
      description: Καθορίζει τη συγκεκριμένη λειτουργία της οδοντόκρεμας, όπως κατά
        της τερηδόνας ή λεύκανσης
    toothpick_design:
      name: Σχέδιο οδοντογλυφίδας
      description: Καθορίζει τη μορφή των οδοντογλυφίδων, όπως στρογγυλές ή επίπεδες
    top_color:
      name: Χρώμα άνω επιφάνειας
      description: Καθορίζει το κύριο χρώμα της άνω επιφάνειας ενός προϊόντος, π.χ.
        διαφανές, μπρονζέ
    top_length_type:
      name: Τύπος μήκους μπλούζας
      description: Καθορίζει το μήκος των μπλουζών ή των πουκάμισων, όπως crop top
        ή μακριά
    top_material:
      name: Υλικό άνω επιφάνειας
      description: Καθορίζει το υλικό της άνω επιφάνειας ενός προϊόντος, π.χ. ξύλο,
        γυαλί
    top_pattern:
      name: Μοτίβο άνω επιφάνειας
      description: Περιγράφει το σχέδιο ή την εκτύπωση στην επιφάνεια ενός προϊόντος,
        όπως φλοράλ ή ριγέ
    top_surface_material:
      name: Υλικό άνω επιφάνειας
      description: Καθορίζει το υλικό που χρησιμοποιείται στην άνω επιφάνεια του προϊόντος,
        όπως ανοξείδωτο ατσάλι ή κεραμικό γυαλί
    top_up_method:
      name: Μέθοδος ανανέωσης υπολοίπου
      description: Καθορίζει τους τρόπους με τους οποίους οι πελάτες μπορούν να προσθέσουν
        επιπλέον πίστωση ή να ανανεώσουν το πρόγραμμα στην προπληρωμένη κάρτα ή την
        κάρτα SIM.
    tote_handle_type:
      name: Τύπος λαβής τσάντας tote
      description: Προσδιορίζει το στυλ των λαβών σε μια τσάντα tote, όπως κοντές
        ή μακριές
    totem_design:
      name: Σχέδιο τοτέμ
      description: Καθορίζει το σχέδιο των τοτέμ εμπορικών εκθέσεων, όπως μονής ή
        διπλής όψης
    touch_capabilities:
      name: Δυνατότητες αφής
      description: Υποδεικνύει τον τύπο αλληλεπίδρασης αφής που υποστηρίζει ένα ηλεκτρονικό,
        όπως μονή ή διπλή
    touchpad_form_factor:
      name: Παράγοντας μορφής touchpad
      description: Καθορίζει το προβλεπόμενο στυλ εγκατάστασης ή χρήσης του touchpad.
    touchscreen_technology:
      name: Τεχνολογία οθόνης αφής
      description: Προσδιορίζει την τεχνολογία οθόνης αφής για διαδραστικές συσκευές,
        όπως χωρητική ή αντίστασης
    touchscreen_wire_configuration:
      name: Διαμόρφωση καλωδίων οθόνης αφής
      description: Υποδεικνύει τον αριθμό καλωδίων ή γραμμών που χρησιμοποιούνται
        από αντιστατικούς ψηφιοποιητές, επηρεάζοντας τη συμβατότητα με ελεγκτές.
    toy/game_material:
      name: Υλικό παιχνιδιού
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε ένα παιχνίδι,
        όπως πλαστικό ή ξύλο
    toy_figure_features:
      name: Χαρακτηριστικά φιγούρας παιχνιδιού
      description: Υπογραμμίζει τα ιδιαίτερα χαρακτηριστικά των φιγούρων παιχνιδιού,
        όπως αρθρωτές ενώσεις ή ρεαλιστικές λεπτομέρειες
    toy_figure_theme:
      name: Θέμα φιγούρας παιχνιδιού
      description: Προσδιορίζει το θέμα ή την κατηγορία μιας φιγούρας παιχνιδιού,
        όπως ζώο ή αθλήματα
    toy_tool_type:
      name: Τύπος εργαλείου παιχνιδιού
      description: Προσδιορίζει τον τύπο του εργαλείου παιχνιδιού σε ένα σετ παιχνιδιού
        προσποίησης, όπως ένα τρυπάνι ή ένα σφυρί
    track_configuration:
      name: Διαμόρφωση κομματιού
      description: Υποδεικνύει τη μορφή κομματιού ταινίας και τα κανάλια που μπορεί
        να εγγράψει ή να αναπαράγει το μηχάνημα (π.χ., στερεοφωνικό εναντίον μονοφωνικό,
        αριθμός κομματιών).
    tracker_form_factor:
      name: Μορφή ανιχνευτή
      description: Καθορίζει το φυσικό στυλ και σχήμα του υλικού του ανιχνευτή.
    tracking_metrics:
      name: Μετρήσεις παρακολούθησης
      description: Καθορίζει τα δεδομένα υγείας και φυσικής κατάστασης που παρακολουθούνται
        από το προϊόν, π.χ. ύπνος, βήματα
    tracking_purpose:
      name: Σκοπός παρακολούθησης
      description: Καθορίζει την προβλεπόμενη χρήση των συσκευών παρακολούθησης GPS,
        όπως η παρακολούθηση περιουσιακών στοιχείων ή η παρακολούθηση κατοικίδιων
        ζώων
    tractor_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ τρακτέρ
      description: Καθορίζει επιπλέον χαρακτηριστικά που παρέχονται με το τρακτέρ,
        όπως κιτ εδαφοκάλυψης ή εκχιονιστήρας
    trade_show_display_features:
      name: Χαρακτηριστικά προβολής εμπορικών εκθέσεων
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των προβολών εμπορικών
        εκθέσεων, όπως οθόνη αφής ή φωτισμός
    trading_card_packaging:
      name: Συσκευασία καρτών συναλλαγών
      description: Προσδιορίζει τον τρόπο με τον οποίο συσκευάζονται οι κάρτες συναλλαγών,
        όπως πακέτα blister ή booster
    traffic_control_device_features:
      name: Χαρακτηριστικά της συσκευής ελέγχου κυκλοφορίας
      description: Προσδιορίζει μοναδικά χαρακτηριστικά στοιχείων ελέγχου κυκλοφορίας,
        όπως στοιβαζόμενη ή σταθμισμένη βάση
    trail_camera_design:
      name: Σχεδιασμός απομακρυσμένης κάμερας
      description: Περιγράφει τον τύπο της απομακρυσμένης κάμερας, όπως τυπική ή κινητής
        τηλεφωνίας
    trailer_type:
      name: Τύπος ρυμουλκούμενου οχήματος
      description: Προσδιορίζει το σχέδιο ή το στυλ ενός ρυμουλκούμενου μηχανοκίνητου
        οχήματος, όπως ανοιχτό ή κλειστό
    training_data_requirements:
      name: Απαιτήσεις δεδομένων εκπαίδευσης
      description: Προσδιορίζει τον τύπο και την ποιότητα δεδομένων που απαιτούνται
        για αποτελεσματική εκπαίδευση με λογισμικό τεχνητής νοημοσύνης ή μηχανική
        εκμάθηση, π.χ. δεδομένα με ετικέτα
    trampoline_design:
      name: Σχέδιο τραμπολίνου
      description: Περιγράφει την κατασκευή τραμπολίνου, όπως χωρίς ελατήριο ή με
        σπειροειδές ελατήριο
    transceiver_form_factor:
      name: Μορφή πομποδέκτη
      description: Καθορίζει το φυσικό πρότυπο μονάδας του πομποδέκτη δικτύωσης (π.χ.,
        SFP, QSFP28).
    transcriber/dictation_system_features:
      name: Χαρακτηριστικά συστήματος μεταγραφής/υπαγόρευσης
      description: Προσδιορίζει ειδικά χαρακτηριστικά μεταγραφέων ή συστημάτων υπαγόρευσης,
        όπως τεχνητή νοημοσύνη ή μείωση θορύβου
    transfer_aid_type:
      name: Τύπος βοηθήματος μεταφοράς
      description: Κατηγοριοποιεί το στυλ του βοηθήματος, διακρίνοντας τις άκαμπτες
        σανίδες από τα εύκαμπτα φύλλα και τα στρώματα με αέρα.
    transfer_board_shape:
      name: Σχήμα σανίδας μεταφοράς
      description: Καθορίζει το γεωμετρικό προφίλ της σανίδας ή του φύλλου, που επηρεάζει
        τη διαδρομή μεταφοράς και τη συμβατότητα με διαφορετικά ύψη καθισμάτων ή κρεβατιών.
    transfer_boards_surface_type:
      name: Τύπος επιφάνειας σανίδων μεταφοράς
      description: Καθορίζει την υφή της επιφάνειας των σανίδων μεταφοράς κινητικότητας,
        π.χ. με επένδυση, λεία
    transfer_paper_technique:
      name: Τεχνική χαρτιού μεταφοράς
      description: Προσδιορίζει τη μέθοδο που χρησιμοποιείται με χαρτί μεταφοράς,
        όπως inkjet ή θερμοκόλληση
    transmission_type:
      name: Τύπος μετάδοσης
      description: Προσδιορίζει τον τύπο του κιβωτίου ταχυτήτων σε οχήματα ή ανταλλακτικά,
        όπως χειροκίνητο ή αυτόματο
    transmitter_form_factor:
      name: Μορφή πομπού
      description: Ταξινομεί το φυσικό στυλ ή το περίβλημα της μονάδας πομπού για
        να βοηθήσει τους αγοραστές να βρουν γρήγορα τη μορφή που ταιριάζει στην εφαρμογή
        τους.
    transport_type:
      name: Τύπος μεταφοράς
      description: Καθορίζει τον τρόπο δημόσιας μεταφοράς για τον οποίο ισχύει το
        εισιτήριο ή η κάρτα.
    trash_can_features:
      name: Χαρακτηριστικά κάδου απορριμμάτων
      description: Περιγράφει ειδικά χαρακτηριστικά των δοχείων απορριμμάτων, όπως
        έλεγχος οσμών ή πεντάλ ποδιού
    travel_pillow_features:
      name: Χαρακτηριστικά ταξιδιωτικού μαξιλαριού
      description: Αναφέρει ειδικά λειτουργικά χαρακτηριστικά, αξεσουάρ ή σχεδιαστικές
        βελτιώσεις του ταξιδιωτικού μαξιλαριού.
    travel_pillow_shape:
      name: Σχήμα μαξιλαριού ταξιδιού
      description: 'Περιγράφει το φυσικό περίγραμμα των μαξιλαριών ταξιδιού, όπως
        σε σχήμα J '
    tray_compatibility:
      name: Συμβατότητα δίσκου
      description: Προσδιορίζει το στυλ του δίσκου λεύκανσης ή του επιστόμιου που
        έχει σχεδιαστεί να ταιριάζει η θήκη.
    treatment_area:
      name: Περιοχή θεραπείας
      description: Καθορίζει το μέρος του σώματος που στοχεύει ένα προϊόν, συνήθως
        για είδη μασάζ, π.χ. πλάτη, λαιμός
    treatment_method:
      name: Μέθοδος θεραπείας
      description: Περιγράφει τον μηχανισμό ή την τεχνολογία παράδοσης που χρησιμοποιεί
        το προϊόν για την εξάλειψη της βλάβης (π.χ., κρυοθεραπεία, χημικό οξύ, επίθεμα
        μικροβελονών).
    treatment_modes:
      name: Λειτουργίες θεραπείας
      description: Αναφέρει τις λειτουργικές λειτουργίες που υποστηρίζει η συσκευή
        (π.χ., HR, SHR, SR).
    treatment_objective:
      name: Στόχος θεραπείας
      description: Καθορίζει το πρόβλημα που αντιμετωπίζει το προϊόν, συνήθως για
        είδη προσωπικής φροντίδας, π.χ. ροχαλητό, πυρετός
    treatment_target_area:
      name: Περιοχή στόχος θεραπείας
      description: Υποδεικνύει εάν το προϊόν είναι σχεδιασμένο για βλεφαρίδες, φρύδια,
        ή και τα δύο.
    treatment_texture:
      name: Υφή προϊόντων θεραπείας
      description: Καθορίζει τη συνοχή των προϊόντων θεραπείας, όπως η κρέμα εξανθήματος
        από την πάνα, π.χ. παχύρευστη, σκόνη
    treatment_type:
      name: Τύπος θεραπείας
      description: Καθορίζει τη μέθοδο θεραπείας, συνήθως για θεραπείες τριχόπτωσης,
        π.χ. λέιζερ, τοπική
    tree_stand_material:
      name: Υλικό βάσης δέντρου
      description: Καθορίζει από τι κατασκευάζεται μια βάση δέντρου, όπως πλαστικό
        ή μέταλλο
    trellis_design:
      name: Σχέδιο δικτυωτού πλέγματος
      description: Προσδιορίζει το σχέδιο του πλέγματος σε περίφραξη ή φράγματα, π.χ.
        τετράγωνο, διαμάντι
    tricycle_design:
      name: Σχέδιο τρίκυκλου
      description: Περιγράφει το στυλ ενός τρίκυκλου, όπως όρθιο ή ξαπλωτό
    tricycle_propulsion_type:
      name: Τύπος πρόωσης τρίκυκλου
      description: Καθορίζει τον τρόπο οδήγησης ενός τρίκυκλου, όπως ώθηση ή μπροστινή
        κίνηση
    trip_type:
      name: Τύπος διαδρομής
      description: Καθορίζει τον τύπο διαδρομής σε διακόπτη κυκλώματος, π.χ. μη εναλλάξιμος
    tripod/monopod_attachment_type:
      name: Τύπος προσάρτησης τρίποδου/μονόποδου
      description: Καθορίζει τον τύπο σύνδεσης για αξεσουάρ τρίποδων ή μονόποδων,
        όπως 3/8 ή γενικής χρήσης
    tripod/monopod_head_type:
      name: Τύπος κεφαλής τρίποδου/μονόποδου
      description: Καθορίζει τον μηχανισμό των κεφαλών τρίποδων/μονόποδων, όπως γρανάζι
        ή αντίζυγο
    tripod_handle_type:
      name: Τύπος λαβής τρίποδου
      description: Καθορίζει τη λειτουργικότητα των λαβών τρίποδων, π.χ. λαβή πολλαπλών
        λειτουργιών, πιστολιού
    trophy_design:
      name: Σχέδιο τροπαίου
      description: Περιγράφει το συγκεκριμένο στυλ ή σχήμα ενός τροπαίου, όπως ένα
        κύπελλο ή ένα αστέρι
    truck_type:
      name: Τύπος φορτηγού
      description: Ταξινομεί τον τύπο του φορτηγού, όπως ανατρεπόμενο φορτηγό ή φορτηγό
        με επίπεδη επιφάνεια
    tube_component:
      name: Εξάρτημα σωλήνα
      description: Καθορίζει τον τύπο του σωλήνα σε ενισχυτές μουσικής, π.χ. θήκη,
        βάση
    tube_configuration:
      name: Διαμόρφωση σωλήνα
      description: Περιγράφει τη διάταξη των σωλήνων σε έναν ενισχυτή μουσικών οργάνων,
        όπως μονό σωλήνα ή ταιριαστό ζευγάρι
    tuner_design:
      name: Σχεδιασμός συντονιστή
      description: Περιγράφει το στυλ των ηλεκτρονικών συντονιστών για μουσικά όργανα,
        όπως clip-on ή πεντάλ
    tuner_type:
      name: Τύπος συντονιστή
      description: Καθορίζει τον τύπο της ραδιοφωνικής συχνότητας που λαμβάνεται,
        όπως AM/FM ή δορυφορικό ραδιόφωνο
    tuning_fork_design:
      name: Σχέδιο διαπασών
      description: Περιγράφει το συγκεκριμένο σχέδιο ενός διαπασών, όπως σταθμισμένο
        ή μη σταθμισμένο
    tuning_fork_frequency:
      name: Συχνότητα διαπασών
      description: Καθορίζει τη συχνότητα ενός διαπασών, όπως 128 Hz ή 256 Hz
    tuning_modes:
      name: Λειτουργίες συντονισμού
      description: Προσδιορίζει τις συγκεκριμένες ρυθμίσεις οργάνων για ηλεκτρονικούς
        συντονιστές, όπως κιθάρα ή βιολί
    tuning_pitch:
      name: Βήμα συντονισμού
      description: Καθορίζει το βήμα συντονισμού ενός οργάνου, όπως το C# ή το Ab
    tuning_range:
      name: Εύρος συντονισμού
      description: Καθορίζει το εύρος των διαθέσιμων επιλογών συντονισμού, όπως τυπικό
        ή ανοιχτό
    tv_broadcast_standards_supported:
      name: Υποστηριζόμενα πρότυπα τηλεοπτικής μετάδοσης
      description: Απαριθμεί τα συγκεκριμένα τηλεοπτικά πρότυπα εκπομπής ή καλωδιακής/δορυφορικής
        λήψης που μπορεί να αποκωδικοποιήσει ή να λάβει η κάρτα ή ο προσαρμογέας.
    uc_platform_certification:
      name: Πιστοποίηση πλατφόρμας UC
      description: Προσδιορίζει πλατφόρμες ενοποιημένων επικοινωνιών ή συσκέψεων για
        τις οποίες η συσκευή είναι επίσημα πιστοποιημένη.
    ultrasound_probe_type:
      name: Τύπος κεφαλής υπερήχων
      description: Προσδιορίζει τα σχεδιαστικά χαρακτηριστικά του καθετήρα που παρέχεται
        με την οθόνη (π.χ., αδιάβροχος, εσωτερικός).
    undershirt_style:
      name: Στυλ επάνω εσώρουχου
      description: Περιγράφει το σχέδιο ή το κόψιμο ενός επάνω εσώρουχου, όπως κλειστή
        λαιμόκοψη ή λαιμόκοψη V
    underwear_style:
      name: Στυλ κάτω εσώρουχου
      description: Καθορίζει το σχέδιο και το κόψιμο ενός κάτω εσώρουχου, όπως μπικίνι
        ή σλιπ
    units_of_measurement:
      name: Μονάδες μέτρησης
      description: Καθορίζει το σύστημα μέτρησης που χρησιμοποιείται για το προϊόν,
        π.χ. χιλιοστά (mm), Φαρενάιτ (°F)
    update_frequency:
      name: Συχνότητα ενημέρωσης
      description: Υποδεικνύει την κανονικότητα των ενημερώσεων για λογισμικό ή δεδομένα,
        π.χ. σε πραγματικό χρόνο, ετησίως
    upholstery_color:
      name: Χρώμα ταπετσαρίας
      description: Προσδιορίζει το χρώμα της ταπετσαρίας ενός προϊόντος, όπως κόκκινο
        ή μπεζ
    upholstery_material:
      name: Υλικό ταπετσαρίας
      description: Προσδιορίζει το υλικό επένδυσης που χρησιμοποιείται για ταπετσαρίες,
        όπως δέρμα ή βελούδο
    upholstery_pattern:
      name: Μοτίβο ταπετσαρίας
      description: Περιγράφει το οπτικό σχέδιο του υλικού επένδυσης επίπλων, για παράδειγμα,
        ρίγες ή καρό
    uplink_port_type:
      name: Τύπος θύρας uplink
      description: Καθορίζει τον συνδέσμο uplink υψηλότερης ταχύτητας που υπάρχει
        στον διακόπτη (π.χ., SFP+, QSFP28, 10GBase-T).
    ups_topology:
      name: Τοπολογία UPS
      description: Υποδεικνύει την εσωτερική σχεδιαστική προσέγγιση που χρησιμοποιεί
        ένα UPS για να προετοιμάσει και να παρέχει ισχύ (π.χ., αναμονή, γραμμική-διαδραστική,
        online).
    urinal_mounting_type:
      name: Τύπος τοποθέτησης ουρητηρίου
      description: Καθορίζει τον τρόπο εγκατάστασης ενός ουρητηρίου, όπως επιτοίχια
        ή επιδαπέδια
    usage_conditions:
      name: Συνθήκες χρήσης
      description: Καθορίζει εάν το προϊόν είναι κατάλληλο για χρήση σε ξηρές ή υγρές
        συνθήκες, συνήθως για ξυράφια
    usage_environment:
      name: Περιβάλλον χρήσης
      description: Καθορίζει πού προορίζεται να χρησιμοποιηθεί το προϊόν μαυρίσματος.
    usage_frequency:
      name: Συχνότητα χρήσης
      description: Καθορίζει τη συνιστώμενη συχνότητα χρήσης του προϊόντος, όπως ημερήσια
        ή εβδομαδιαία
    usage_type:
      name: Τύπος χρήσης
      description: Καθορίζει τον προβλεπόμενο κύκλο χρήσης του προϊόντος, π.χ. επαναχρησιμοποιήσιμο,
        επαναγεμιζόμενο
    usb_connector_type:
      name: Τύπος σύνδεσης USB
      description: Προσδιορίζει τη φυσική υποδοχή(-ές) USB που παρέχεται στη συσκευή
        για δεδομένα ή/και τροφοδοσία.
    usb_standard:
      name: Πρότυπο USB
      description: Καθορίζει την έκδοση USB για ηλεκτρονικές συσκευές, όπως USB 2.0
        ή USB 3.1 Gen 1
    user_type:
      name: Τύπος χρήστη
      description: Προσδιορίζει τον προβλεπόμενο χρήστη ενός προϊόντος λογισμικού,
        όπως ατομική ή μικρή επιχείρηση
    utility/maintenance_task_type:
      name: Τύπος εργασίας utility/maintenance
      description: Κατηγοριοποιεί την εργασία που εκτελείται από ένα λογισμικό, όπως
        εκκαθάριση δίσκου ή βελτιστοποίηση συστήματος
    uv_blocking_class:
      name: Κατηγορία προστασίας UV
      description: Υποδεικνύει το επίπεδο προστασίας UV που είναι ενσωματωμένο στον
        φακό επαφής όπως ορίζεται από τα πρότυπα ISO.
    uv_protection:
      name: Προστασία από την υπεριώδη ακτινοβολία
      description: Καθορίζει την ικανότητα του προϊόντος να μπλοκάρει τις ακτίνες
        UV, συνήθως για γυαλιά ηλίου, π.χ. UV400
    uva_protection_grade:
      name: Βαθμός προστασίας UVA
      description: Υποδεικνύει τη βαθμολογία προστασίας UVA του προϊόντος, που εκφράζεται
        συνήθως ως βαθμοί PA.
    vacuum_air_filtering_technology:
      name: Τεχνολογία φιλτραρίσματος αέρα κενού
      description: Καθορίζει τον τύπο του φιλτραρίσματος αέρα που χρησιμοποιείται
        σε ηλεκτρικές σκούπες, όπως HEPA ή κατοικίδιο
    valve_type:
      name: Τύπος βαλβίδας
      description: Καθορίζει τον τύπο βαλβίδας σε εξαρτήματα ποδηλάτου, π.χ. Presta,
        Schrader
    van_type:
      name: Τύπος βαν
      description: Διακρίνει μεταξύ διαφορετικών τύπων βαν, όπως επιβατικό βαν ή μετατρεπόμενο
        βαν
    vaping_style:
      name: Στυλ ατμίσματος
      description: 'Καθορίζει την τεχνική ατμίσματος για ηλεκτρονικά τσιγάρα, π.χ.
        απευθείας στον πνεύμονα, από στόμα σε πνεύμονα '
    varnish/finish_application:
      name: Εφαρμογή βερνικιού/ φινιρίσματος
      description: Καθορίζει τις κατάλληλες περιοχές εφαρμογής για ένα βερνίκι ή φινίρισμα,
        όπως τοίχους ή πόρτες
    vase_shape:
      name: Σχήμα βάζου
      description: Περιγράφει τη γεωμετρική ή οργανική μορφή ενός βάζου, όπως στρογγυλό
        ή μπουκάλι
    vcr_configuration:
      name: Διαμόρφωση VCR
      description: Προσδιορίζει εάν η μονάδα είναι αυτόνομο VCR ή συνδυαστική συσκευή
        με πρόσθετες μονάδες ή δέκτες.
    vdi_protocol_support:
      name: Υποστήριξη πρωτοκόλλου VDI
      description: Καθορίζει τα υποστηριζόμενα πρωτόκολλα Virtual Desktop Infrastructure
        (VDI), π.χ. PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Λειτουργίες συναγερμού/κλειδώματος οχήματος
      description: Καθορίζει τα μοναδικά χαρακτηριστικά των συστημάτων ασφαλείας του
        οχήματος, για παράδειγμα, την απομακρυσμένη εκκίνηση ή την αντοχή στις καιρικές
        συνθήκες
    vehicle_application_area:
      name: Περιοχή εφαρμογής οχήματος
      description: Καθορίζει το μέρος ενός οχήματος στο οποίο εφαρμόζεται το προϊόν,
        όπως ταπετσαρία ή εξωτερικό
    vehicle_audio_system_features:
      name: Χαρακτηριστικά συστήματος ήχου οχήματος
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά του ηχοσυστήματος ενός
        οχήματος, όπως ενίσχυση μπάσων ή οθόνη LED
    vehicle_braking_features:
      name: Χαρακτηριστικά πέδησης οχήματος
      description: Περιγράφει τα ειδικά χαρακτηριστικά των εξαρτημάτων πέδησης του
        οχήματος, όπως ανθεκτικά στη διάβρωση ή με διάτρηση
    vehicle_cleaning_item_features:
      name: Χαρακτηριστικά ειδών καθαρισμού οχήματος
      description: Υπογραμμίζει τα πλεονεκτήματα των ειδών καθαρισμού του οχήματος,
        όπως η βελτιωμένη απόδοση καυσίμου ή η υψηλή στιλπνότητα
    vehicle_decor_features:
      name: Χαρακτηριστικά διακόσμησης οχήματος
      description: Περιγράφει τα χαρακτηριστικά των διακοσμητικών ειδών του οχήματος,
        όπως ανθεκτικά στην υπεριώδη ακτινοβολία ή αδιάβροχα
    vehicle_drive/handling_features:
      name: Χαρακτηριστικά οδήγησης/χειρισμού οχήματος
      description: Περιγράφει τα χαρακτηριστικά των εξαρτημάτων μηχανοκίνητων οχημάτων,
        συνήθως σε συστήματα μετάδοσης, κίνησης, ρυμούλκησης και τροχών, π.χ. υψηλή
        απόδοση, ανθεκτικό στη θερμότητα
    vehicle_engine/part_features:
      name: Χαρακτηριστικά κινητήρα/εξαρτήματος οχήματος
      description: Υποδεικνύει τα μοναδικά χαρακτηριστικά των εξαρτημάτων του κινητήρα
        του οχήματος, όπως η οικονομία καυσίμου ή η αναβάθμιση απόδοσης
    vehicle_engine_features:
      name: Χαρακτηριστικά κινητήρα οχήματος
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά του κινητήρα ενός οχήματος,
        όπως υψηλές επιδόσεις ή οικονομία καυσίμου
    vehicle_exhaust_type:
      name: Τύπος εξάτμισης οχήματος
      description: Προσδιορίζει τον τύπο του συστήματος εξάτμισης σε ένα όχημα, όπως
        πίσω άξονα ή turbo-back
    vehicle_features:
      name: Χαρακτηριστικά οχήματος
      description: Περιγράφει ειδικά χαρακτηριστικά ή εξοπλισμό σε ένα όχημα, όπως
        θερμαινόμενα καθίσματα ή σύστημα πλοήγησης
    vehicle_floor_configuration:
      name: Διαμόρφωση δαπέδου οχήματος
      description: Καθορίζει τη σχεδίαση και τη διάταξη του δαπέδου ενός οχήματος
        καθημερινής μετακίνησης, όπως χαμηλού ή ημι-χαμηλού δαπέδου
    vehicle_fluid_features:
      name: Χαρακτηριστικά υγρών οχημάτων
      description: Περιγράφει ειδικές ιδιότητες των υγρών οχημάτων, όπως αντιψυκτικό
        ή βιοδιασπώμενο
    vehicle_fluid_type:
      name: Τύπος υγρού οχήματος
      description: Προσδιορίζει τον τύπο του υγρού που χρησιμοποιείται στη συντήρηση
        του οχήματος, όπως συμπυκνωμένο ή προαραιωμένο
    vehicle_frame/body_features:
      name: Χαρακτηριστικά πλαισίου/ αμαξώματος οχήματος
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των μερών του αμαξώματος
        του οχήματος, όπως βαμμένο ή φινίρισμα χρωμίου
    vehicle_mirror_design:
      name: Σχέδιο καθρέφτη οχήματος
      description: Καθορίζει τα σχεδιαστικά χαρακτηριστικά των καθρεπτών μηχανοκίνητων
        οχημάτων, όπως επεκτάσιμοι ή αναδιπλούμενοι
    vehicle_mirror_features:
      name: Χαρακτηριστικά καθρεφτών οχήματος
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των καθρεπτών του οχήματος,
        όπως η αυτόματη μείωση της φωτεινότητας ή η θέρμανση
    vehicle_mirror_type:
      name: Τύπος καθρέπτη οχήματος
      description: Προσδιορίζει τον συγκεκριμένο τύπο καθρέφτη σε ένα όχημα, όπως
        εσωτερικός ή πλάγιος
    vehicle_mounting_location:
      name: Θέση στήριξης οχήματος
      description: Καθορίζει την περιοχή σε ένα όχημα όπου προορίζεται να εγκατασταθεί
        η βάση.
    vehicle_oil_features:
      name: Χαρακτηριστικά λιπαντικών οχημάτων
      description: Περιγράφει μοναδικές ιδιότητες του λαδιού κινητήρα, όπως προστασία
        από τη φθορά ή υψηλή απόδοση φιλτραρίσματος
    vehicle_paint_type:
      name: Τύπος βαφής οχήματος
      description: Καθορίζει την κατηγορία βαφής οχήματος, όπως κιτ βαφής ή βαφή αμαξώματος
        μηχανοκίνητου οχήματος
    vehicle_placement:
      name: Τοποθέτηση σε όχημα
      description: Καθορίζει πού μπορεί να τοποθετηθεί το προϊόν σε ένα ποδήλατο,
        π.χ. πλαίσιο, μπροστά
    vehicle_seating_features:
      name: Χαρακτηριστικά καθισμάτων οχήματος
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των καθισμάτων οχημάτων,
        όπως θερμαινόμενα ή ανακλινόμενα καθίσματα
    vehicle_suspension_features:
      name: Χαρακτηριστικά ανάρτησης οχήματος
      description: Καθορίζει τα μοναδικά χαρακτηριστικά των εξαρτημάτων ανάρτησης
        οχήματος, όπως ρυθμιζόμενη ή υδραυλική
    vehicle_tire_type:
      name: Τύπος ελαστικού οχήματος
      description: Καθορίζει την καταλληλότητα των ελαστικών οχημάτων ανάλογα με την
        εποχή ή το έδαφος, όπως χειμερινά ή παντός εδάφους
    vehicle_type:
      name: Τύπος οχήματος
      description: Ταξινομεί τον τύπο του οχήματος, για παράδειγμα, SUV ή ιστιοφόρο
    ventilation_type:
      name: Τύπος εξαερισμού
      description: Περιγράφει το κύριο στυλ εξαερισμού ή τα χαρακτηριστικά ροής αέρα
        του περιβλήματος που διαχειρίζονται την εσωτερική θερμοκρασία.
    verification_technology:
      name: Τεχνολογία επαλήθευσης
      description: Προσδιορίζει την τεχνολογία που χρησιμοποιείται σε επαληθευτές
        χαρτονομισμάτων, όπως μαγνητική ή υπέρυθρη
    vesa_mounting_pattern:
      name: Πρότυπο στήριξης VESA
      description: Καθορίζει την απόσταση οπών VESA στο πίσω μέρος της οθόνης για
        συμβατότητα με βάσεις, βραχίονες και στηρίγματα.
    vg/pg_ratio:
      name: Αναλογία VG/PG
      description: Υποδεικνύει την αναλογία φυτικής γλυκερίνης προς προπυλενογλυκόλη
        στα ηλεκτρονικά υγρά, π.χ. 30:70
    video_codecs/formats_supported:
      name: Υποστηριζόμενοι κωδικοποιητές/μορφές βίντεο
      description: Καθορίζει τους κωδικοποιητές βίντεο και τις μορφές που υποστηρίζει
        μια συσκευή, όπως MP4 ή H.264
    video_game_content_features:
      name: Χαρακτηριστικά περιεχομένου βιντεοπαιχνιδιών
      description: Προσδιορίζει τα ειδικά χαρακτηριστικά του λογισμικού βιντεοπαιχνιδιών,
        π.χ. περιεχόμενο με δυνατότητα λήψης (DLC), πρώιμη πρόσβαση
    video_game_format:
      name: Είδος βιντεοπαιχνιδιών
      description: Προσδιορίζει τη μέθοδο ή τρόπο παράδοσης και τον τύπο μέσου για
        τα βιντεοπαιχνίδια, όπως εάν είναι ψηφιακά ή σε φυσικά μέσα.
    video_game_genre:
      name: Είδος βιντεοπαιχνιδιών
      description: Ταξινομεί τον τύπο του βιντεοπαιχνιδιού, όπως οικογενειακό ή επιβίωσης
    video_game_platform:
      name: Πλατφόρμα βιντεοπαιχνιδιών
      description: Καθορίζει την πλατφόρμα με την οποία είναι συμβατό ένα βιντεοπαιχνίδι,
        όπως το PC ή το PlayStation 5
    video_game_sub_genre:
      name: Υποείδος βιντεοπαιχνιδιών
      description: Προσδιορίζει τη συγκεκριμένη υποκατηγορία ενός βιντεοπαιχνιδιού,
        όπως το MMORPG ή το battle royale
    video_port_type:
      name: Τύπος θύρας βίντεο
      description: Καθορίζει τον τύπο της θύρας βίντεο που υποστηρίζει ένα προϊόν,
        π.χ. HDMI, θύρα οθόνης
    video_recorder_type:
      name: Τύπος εγγραφέα βίντεο
      description: Καθορίζει τη θεμελιώδη τεχνολογία εγγραφής της συσκευής (π.χ.,
        DVR, NVR, XVR).
    video_region_code:
      name: Κωδικός περιοχής βίντεο
      description: Καθορίζει τη συμβατότητα περιοχής των συσκευών αναπαραγωγής DVD
        και Blu-ray, όπως χωρίς περιοχή ή περιοχή 1
    video_resolution_supported:
      name: Υποστηριζόμενη ανάλυση βίντεο
      description: Καθορίζει την ευκρίνεια ή την ποιότητα βίντεο που υποστηρίζει μια
        συσκευή, όπως 1080p ή ultra HD
    video_signal_standard:
      name: Πρότυπο σήματος βίντεο
      description: Καθορίζει το/τα αναλογικό/ά πρότυπο/α μετάδοσης βίντεο που υποστηρίζεται
        από τη συσκευή (π.χ., NTSC, PAL, SECAM).
    viewing_area_height:
      name: Ύψος περιοχής θέασης
      description: Καθορίζει το ύψος της περιοχής θέασης σε προϊόντα όπως κράνη συγκόλλησης,
        π.χ. μεσαίο, μεγάλο
    viewing_area_width:
      name: Πλάτος περιοχής θέασης
      description: Καθορίζει το πλάτος της περιοχής θέασης σε προϊόντα όπως κράνη
        συγκόλλησης, π.χ. μεσαίο, μεγάλο
    vinegar_drink_variety:
      name: Ποικιλία ροφήματος ξυδιού
      description: Καθορίζει τον τύπο του ροφήματος με βάση το ξύδι, π.χ. kombucha,
        θάμνος
    vinegar_variety:
      name: Ποικιλία ξυδιού
      description: Διακρίνει διάφορα είδη ξυδιού, π.χ. από φρούτα, βαλσαμικό
    viscosity:
      name: Ιξώδες
      description: Καθορίζει την αντίσταση ροής των λιπαντικών κινητήρα, όπως 10W-40
        ή 15W-50
    vision_correction_type:
      name: Τύπος διόρθωσης όρασης
      description: Υποδεικνύει τον οπτικό σχεδιασμό που προορίζεται για τη διόρθωση
        συγκεκριμένων συνθηκών όρασης.
    visual_effect:
      name: Οπτικό εφέ
      description: Καθορίζει τα οπτικά χαρακτηριστικά ενός προϊόντος, συνήθως για
        βερνίκια τέχνης, π.χ. διάστικτο, ανάγλυφο
    voice_recorder_form_factor:
      name: Μορφή συσκευής εγγραφής φωνής
      description: Περιγράφει το φυσικό στυλ ή την απόκρυψη του εγγραφέα ώστε οι αγοραστές
        να μπορούν να επιλέξουν τον σχεδιασμό που ταιριάζει στην περίπτωση χρήσης
        τους.
    voip_protocol_support:
      name: Υποστήριξη πρωτοκόλλου VoIP
      description: Καθορίζει τα πρωτόκολλα Voice over Internet Protocol (VoIP) που
        μπορεί να υποστηρίξει μια συσκευή, όπως SIP ή IAX
    wader_type:
      name: Τύπος στολής (ψαρέματος ή κυνηγιού)
      description: Καθορίζει το συγκεκριμένο στυλ των στολών ψαρέματος ή κυνηγιού,
        όπως μέχρι το ισχίο ή τη μέση
    waist_rise:
      name: Ύψος μέσης
      description: Υποδεικνύει πού κάθεται στη μέση ένα ρούχο, όπως χαμηλό, μεσαίο
        ή ψηλό
    walker_brake_type:
      name: Τύπος φρένου περιπατητή
      description: Περιγράφει τον μηχανισμό πέδησης που ενσωματώνεται στον περιπατητή.
    walker_seat_type:
      name: Τύπος καθίσματος περιπατητή
      description: Προσδιορίζει αν ο περιπατητής περιλαμβάνει κάθισμα και το στυλ
        του καθίσματος.
    walker_type:
      name: Τύπος περιπατητή
      description: Κατηγοριοποιεί το δομικό στυλ και την προβλεπόμενη χρήση του περιπατητή.
    walking_aid_tip_type:
      name: Τύπος άκρου βοηθήματος βάδισης
      description: Καθορίζει το στυλ ή την τεχνολογία του άκρου εδάφους του μπαστουνιού.
    wall_material:
      name: Υλικό τοίχου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τον τοίχο του προϊόντος,
        συνήθως σε σάουνες, π.χ. κέδρος
    wall_patching_application:
      name: Εφαρμογή μπαλωμάτων τοίχου
      description: Προσδιορίζει την κατάλληλη επιφάνεια για μια ένωση μπαλώματος,
        όπως ξύλο ή γύψο
    wall_plate_style:
      name: Στυλ πλάκας τοίχου
      description: Περιγράφει το σχέδιο πλακών ή καλυμμάτων τοίχου, όπως συμβατικά
        ή χωρίς βίδες
    wallet_features:
      name: Χαρακτηριστικά πορτοφολιού
      description: Περιγράφει ειδικά χαρακτηριστικά των πορτοφολιών, όπως προστασία
        RFID ή συμπαγής σχεδιασμός
    wallpaper_application_method:
      name: Μέθοδος εφαρμογής ταπετσαρίας
      description: Καθορίζει τη μέθοδο εφαρμογής ταπετσαρίας, π.χ. ξεφλούδισμα & κόλληση
        ή απαιτεί κόλλα
    wallpaper_theme:
      name: Θέμα ταπετσαρίας
      description: Προσδιορίζει το κύριο θέμα ή το στυλ μιας ταπετσαρίας επιφάνειας
        εργασίας, όπως φύση ή αφηρημένο
    wan_interface_type:
      name: Τύπος διεπαφής WAN
      description: Καθορίζει τον τύπο φυσικής σύνδεσης που χρησιμοποιείται για τη
        σύνδεση WAN/Internet του δρομολογητή (π.χ., Ethernet, οπτική ίνα, DSL, κυψελοειδής).
    warning_category:
      name: Κατηγορία προειδοποίησης
      description: Ταξινομεί την κατηγορία των πινακίδων ασφάλειας, π.χ. απαγόρευση,
        προειδοποίηση
    washer/dryer_features:
      name: Χαρακτηριστικά πλυντηρίου/στεγνωτηρίου
      description: Αναδεικνύει μοναδικά χαρακτηριστικά των συσκευών πλυντηρίου, π.χ.
        κλειδαριά για παιδιά, αυτοκαθαρισμός
    washer_form:
      name: Μορφή ροδέλας στεγανοποίησης
      description: Περιγράφει τον συγκεκριμένο τύπο ροδέλας στεγανοποίησης σε αξεσουάρ
        υλικού, όπως επίπεδη ή ελατηριωτή
    washing_machine_features:
      name: Χαρακτηριστικά πλυντηρίου ρούχων
      description: Προσδιορίζει ειδικές λειτουργίες ενός πλυντηρίου, όπως κλειδαριά
        για παιδιά ή χρονοδιακόπτη καθυστερημένης εκκίνησης
    washing_method:
      name: Μέθοδος πλυσίματος
      description: 'Καθορίζει τη συνιστώμενη διαδικασία καθαρισμού για ένα προϊόν,
        π.χ. πλύσιμο στο χέρι, πλύσιμο στο πλυντήριο '
    washing_programs:
      name: Προγράμματα πλυσίματος
      description: Καθορίζει τους διαφορετικούς κύκλους πλύσης που προσφέρει ένα πλυντήριο
        ρούχων, όπως με κρύο νερό ή για ευαίσθητα ρούχα
    waste_bag_features:
      name: Χαρακτηριστικά σακούλας απορριμμάτων
      description: Περιγράφει τα ειδικά χαρακτηριστικά των σακουλών απορριμμάτων για
        κατοικίδια ζώα, όπως βιοδιασπώμενες ή στεγανές
    waste_bag_material:
      name: Υλικό σακούλας απορριμμάτων
      description: Προσδιορίζει το υλικό των σακουλών απορριμμάτων, όπως πλαστικά
        ή βιοδιασπώμενα υλικά
    watch/band_material:
      name: Υλικό λουριού ρολογιού
      description: Καθορίζει τον τύπο υλικού για λουριά ρολογιών, όπως νάιλον ή σιλικόνη
    watch_accessory_style:
      name: Στυλ αξεσουάρ ρολογιού
      description: Καθορίζει το στυλ των αξεσουάρ ρολογιών, π.χ. σπορ, μοντέρνο
    watch_display:
      name: Οθόνη ρολογιού
      description: Διακρίνει τις οθόνες ρολογιών, όπως ψηφιακές ή αναλογικές
    watch_features:
      name: Χαρακτηριστικά ρολογιού
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά ενός ρολογιού, όπως η
        αυτόματη κίνηση ή οι φωτεινοί δείκτες
    watch_material:
      name: Υλικό ρολογιού
      description: Καθορίζει τον τύπο υλικού που χρησιμοποιείται για το ρολόι, όπως
        τιτάνιο ή σιλικόνη
    water_filter_application:
      name: Εφαρμογή φίλτρου νερού
      description: Προσδιορίζει την προβλεπόμενη χρήση ενός φίλτρου νερού, συνήθως
        για συσκευές, π.χ. καφετιέρα, παγομηχανή
    water_flosser_modes:
      name: Λειτουργίες υδροπίεσης
      description: Απαριθμεί τις διαθέσιμες λειτουργίες καθαρισμού στις οποίες μπορεί
        να λειτουργήσει η συσκευή.
    water_sport:
      name: Θαλάσσιο σπορ
      description: Καθορίζει τα θαλάσσια σπορ για τα οποία έχει σχεδιαστεί το προϊόν,
        όπως καταδύσεις ή καγιάκ
    watercraft_engine_control_type:
      name: Τύπος ελέγχου κινητήρα σκάφους
      description: Προσδιορίζει τον τύπο του συστήματος ελέγχου σε έναν κινητήρα σκάφους,
        όπως γκάζι ή αλλαγή ταχυτήτων
    watercraft_features:
      name: Χαρακτηριστικά σκάφους
      description: Περιγράφει ανέσεις ή συστήματα σε ένα σκάφος, όπως κουζίνα ή σύστημα
        φρένων
    watercraft_motor_mounting_type:
      name: Τύπος τοποθέτησης κινητήρα σκάφους
      description: Προσδιορίζει πού τοποθετείται ο κινητήρας στο σκάφος, όπως πλώρη
        ή πρύμνη
    watercraft_propulsion_type:
      name: Τύπος πρόωσης σκαφών
      description: Καθορίζει τον τρόπο με τον οποίο προωθείται ένα σκάφος, όπως χειροκίνητο
        ή μηχανοκίνητο
    watercraft_steering_wheel_type:
      name: Τύπος τιμονιού σκάφους
      description: Καθορίζει τον τύπο του τιμονιού του σκάφους, όπως ηλεκτρικό ή στάνταρ
    watercraft_type:
      name: Τύπος σκάφους
      description: Προσδιορίζει την κατηγορία των σκαφών, όπως αθλητικά ή πολυτελή
    waveski_features:
      name: Χαρακτηριστικά waveski
      description: Περιγράφει τα μοναδικά χαρακτηριστικά ενός waveski, όπως ρυθμιζόμενο
        λουρί ή αντιολισθητικό
    wax_application_method:
      name: Μέθοδος εφαρμογής κεριού
      description: Καθορίζει την τεχνική που χρησιμοποιείται για την εφαρμογή κεριού
        σε εξοπλισμό χειμερινών σπορ, όπως κρύο ή ζεστό
    wax_type:
      name: Τύπος κεριού
      description: Καθορίζει τον τύπο του κεριού σε αντικείμενα όπως κεριά, όπως σόγια
        ή παραφίνη
    wear_schedule:
      name: Πρόγραμμα χρήσης
      description: Καθορίζει τη μέγιστη εγκεκριμένη διάρκεια συνεχούς χρήσης για τον
        φακό πριν από την αφαίρεση.
    weather_alert_technology:
      name: Τεχνολογία ειδοποίησης καιρού
      description: Καθορίζει το πρότυπο ειδοποίησης ή πιστοποίηση που υποστηρίζεται
        από το ραδιόφωνο για αυτοματοποιημένες προειδοποιήσεις έκτακτης ανάγκης.
    weather_strip_design:
      name: Σχέδιο μονωτικής ταινίας κουφωμάτων
      description: Περιγράφει το σχήμα των υλικών μόνωσης κουφωμάτων, όπως στρογγυλά
        ή επίπεδα
    weather_supply_application_method:
      name: Μέθοδος εφαρμογής συστημάτων προστασίας από τον καιρό
      description: Περιγράφει τον τρόπο με τον οποίο εφαρμόζονται τα συστήματα προστασίας
        από τον καιρό, όπως αυτοκόλλητα ή μη
    weatherization_application:
      name: Εφαρμογή συστημάτων προστασίας από τον καιρό
      description: Προσδιορίζει πού εφαρμόζεται ένα προϊόν προστασίας από τον καιρό,
        όπως παράθυρα ή πόρτες
    webcam_design:
      name: Σχεδιασμός webcam
      description: Προσδιορίζει τον τύπο της κάμερας web, όπως για συνδιάσκεψη, φορητό
        υπολογιστή ή plug-and-play
    weight_bar_activity:
      name: Δραστηριότητα με μπάρες άρσης βαρών
      description: Καθορίζει την προβλεπόμενη χρήση για μπάρες άρσης βαρών, π.χ. δυναμικό
        τρίαθλο, προπόνηση τεχνικής
    weight_bar_type:
      name: Τύπος μπάρας άρσης βαρών
      description: Καθορίζει το σχέδιο για μπάρες άρσης βαρών, όπως παγίδα ή μπούκλα
    weight_loss_mechanism:
      name: Μηχανισμός απώλειας βάρους
      description: Προσδιορίζει την κύρια φυσιολογική προσέγγιση που χρησιμοποιεί
        το συμπλήρωμα για την υποστήριξη της απώλειας βάρους.
    weight_type:
      name: Τύπος βάρους
      description: Περιγράφει το βάρος αντικειμένων, όπως ελαφριά, μεσαία ή βαριά
    weight_unit_supported:
      name: Υποστηριζόμενη μονάδα βάρους
      description: Καθορίζει τις μονάδες βάρους που χρησιμοποιεί ένα προϊόν για μέτρηση,
        π.χ. λίβρες, λίθοι (stones)
    welding_helmet_features:
      name: Χαρακτηριστικά κράνους συγκόλλησης
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των κρανών συγκόλλησης,
        π.χ. αληθινό χρώμα, λειτουργία λείανσης
    wet_bag_features:
      name: Χαρακτηριστικά σακουλών για υγρά απορρίμματα
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά των σακουλών για υγρές πάνες,
        όπως στεγανές ή φιλικές προς το περιβάλλον
    wheel_hardness:
      name: Σκληρότητα τροχού
      description: Καθορίζει το επίπεδο σκληρότητας των τροχών skateboard, π.χ. 75A
    wheel_hub_placement:
      name: Τοποθέτηση πλήμνης τροχού
      description: Καθορίζει τη θέση της πλήμνης του τροχού σε skateboards, όπως κεντρική
        ή με μετατόπιση
    wheel_part_type:
      name: Τύπος ανταλλακτικού τροχού
      description: Προσδιορίζει το συγκεκριμένο στοιχείο του συστήματος τροχών ενός
        οχήματος, όπως ρουλεμάν τροχού ή πλήμνη τροχού
    wheel_style:
      name: Στυλ τιμονιού
      description: Περιγράφει το φυσικό σχήμα στεφάνης ή το στυλ οδηγικής πειθαρχίας.
    wheel_type:
      name: Τύπος τροχού
      description: Καθορίζει το είδος του τροχού για ποδηλατικά προϊόντα, όπως φουσκωτό
        ή συμπαγές
    wheelchair_type:
      name: Τύπος αναπηρικού αμαξιδίου
      description: Διακρίνει μεταξύ διαφορετικών τύπων αναπηρικών αμαξιδίων, π.χ.
        ηλεκτρικά, χειροκίνητα
    whiskey_style:
      name: Στυλ ουίσκι
      description: Καθορίζει το συγκεκριμένο είδος ουίσκι, π.χ. single malt, blended
        malt
    whiskey_variety:
      name: Ποικιλία ουίσκι
      description: Ταξινομεί το ουίσκι με βάση τον τύπο ή το στυλ του δημητριακού,
        π.χ. καλαμπόκι, σίκαλη
    wi_fi_band:
      name: Εύρος συχνότητας wi-fi
      description: Καθορίζει το εύρος ασύρματης συχνότητας μιας συσκευής, όπως 2,4
        GHz
    wi_fi_standard:
      name: Πρότυπο wi-fi
      description: Καθορίζει το πρωτόκολλο ασύρματης δικτύωσης, όπως το 802.11ac
    width_adjustment:
      name: Ρύθμιση πλάτους
      description: Υποδεικνύει αν το πλάτος του εξοπλισμού μπορεί να τροποποιηθεί
        για να ταιριάζει σε διαφορετικές εγκαταστάσεις, κρεβάτια ή χρήστες.
    winder_features:
      name: Χαρακτηριστικά μανιβέλας κουρδίσματος
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των μανιβέλων κουρδίσματος
        για κιθάρες, όπως ένας εξολκέας καρφίτσας γέφυρας ή ενσωματωμένος κόφτης
    windlass_design:
      name: Σχεδιασμός βαρούλκου
      description: Περιγράφει τον προσανατολισμό ενός βαρούλκου άγκυρας, όπως οριζόντιος
        ή κάθετος
    window_treatment_material:
      name: Υλικό καλυμμάτων παραθύρων
      description: Καθορίζει τη σύνθεση των περσίδων ή των σκιάστρων παραθύρων, όπως
        αλουμίνιο ή πλαστικό
    windsurfing_board_style:
      name: Στυλ ιστιοσανίδας
      description: Καθορίζει τον τύπο ιστιοσανίδας, όπως ελεύθερο ή σλάλομ
    wine_rack_design:
      name: Σχέδιο σχάρας κρασιού
      description: Καθορίζει το στυλ ή την αισθητική μιας σχάρας κρασιού, π.χ. μοντέρνο,
        παραδοσιακό
    wine_sweetness:
      name: Γλυκύτητα κρασιού
      description: Βοηθά στην κατηγοριοποίηση των κρασιών κατά επίπεδο γλυκύτητας,
        π.χ. ξηρά, γλυκά
    wine_variety:
      name: Ποικιλία κρασιού
      description: Βοηθά στη διάκριση μεταξύ διαφορετικών ειδών κρασιών, π.χ. λευκό,
        ροζέ
    wing_style:
      name: Στυλ φτερών
      description: Υποδεικνύει εάν η σερβιέτα περιλαμβάνει σταθεροποιητικά φτερά και,
        αν ναι, τι στυλ.
    wipe_dispenser/warmer_features:
      name: Χαρακτηριστικά διανομέα/θερμαντήρα υγρών μαντηλιών
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των διανομέων και των θερμαντήρων
        υγρών μαντηλιών, δηλαδή φιλικά για το ταξίδι
    wipe_dispenser_features:
      name: Χαρακτηριστικά διανομέα υγρών μαντηλιών
      description: Περιγράφει τα ειδικά χαρακτηριστικά των διανομέων υγρών μαντηλιών,
        όπως ο μηχανισμός διανομής ή η ένδειξη LED
    wipe_fragrance:
      name: Άρωμα υγρών μαντηλιών
      description: Προσδιορίζει το άρωμα των υγρών μαντηλιών, όπως χωρίς άρωμα ή λεβάντα
    wipe_packaging:
      name: Συσκευασία υγρών μαντηλιών
      description: Καθορίζει το δοχείο ή το στυλ συσκευασίας υγρών μαντηλιών, π.χ.
        συσκευασία αναπλήρωσης, μέγεθος ταξιδιού
    wipe_purpose:
      name: Σκοπός μαντηλιού
      description: Προσδιορίζει την πρωτεύουσα προτιθέμενη χρήση ή το όφελος των μαντηλιών.
    wipe_warmer_features:
      name: Χαρακτηριστικά θερμαντήρα υγρών μαντηλιών
      description: Αναφέρει λεπτομερώς τα ειδικά χαρακτηριστικά ενός θερμαντήρα υγρών
        μαντηλιών, όπως φιλικό για το ταξίδι ή διατήρηση υγρασίας
    wire/rope_material:
      name: Υλικό σύρματος/σχοινιού
      description: Καθορίζει το υλικό που χρησιμοποιείται σε προϊόντα σύρματος ή σχοινιού,
        όπως χαλκός ή πολυεστέρας
    wire_thickness:
      name: Πάχος σύρματος
      description: Καθορίζει το πάχος των συρμάτων, όπως χοντρά ή λεπτά
    wireless_charging_standard:
      name: Πρότυπο ασύρματης φόρτισης
      description: Προσδιορίζει το πρωτόκολλο(-α) επαγωγικής φόρτισης που υποστηρίζεται
        από το τηλέφωνο.
    wireless_multi_room_platform:
      name: Πλατφόρμα ασύρματου πολυδωματίου
      description: Καθορίζει το ιδιόκτητο ή τρίτου οικοσύστημα που χρησιμοποιείται
        για streaming ήχου σε πολλά δωμάτια.
    wireless_streaming_protocols_supported:
      name: Υποστηριζόμενα πρωτόκολλα ασύρματης ροής
      description: Προσδιορίζει τα ασύρματα πρότυπα ροής ή τις υπηρεσίες που μπορεί
        να λάβει εγγενώς το στερεοφωνικό.
    wood_finish:
      name: Φινίρισμα ξύλου
      description: Περιγράφει την τελική επεξεργασία ή τη μέθοδο κατασκευής που εφαρμόζεται
        σε προϊόντα ξύλου (π.χ. συμπαγές ξύλο, επενδυμένο με καπλαμά, τεχνητά επεξεργασμένο,
        λαδωμένο, βερνικωμένο, βαμμένο)
    woodwind_care_items_included:
      name: Περιλαμβάνονται είδη φροντίδας ξύλινων πνευστών οργάνων
      description: Προσδιορίζει τα είδη φροντίδας που περιλαμβάνονται μαζί με ένα
        ξύλινο πνευστό όργανο, όπως βούρτσα καθαρισμού ή γράσο φελλού
    work_capacity:
      name: Ικανότητα εργασίας
      description: Περιγράφει το επίπεδο απόδοσης ενός προϊόντος, όπως βαρέως τύπου
        ή ελαφρού τύπου
    wreath_design:
      name: Σχέδιο στεφανιού
      description: Προσδιορίζει το κύριο υλικό ή το σχήμα ενός στεφανιού, όπως μέταλλο
        ή τσέρκι
    wrist_rest_features:
      name: Χαρακτηριστικά στηρίγματος καρπού
      description: Απαριθμεί ειδικά λειτουργικά χαρακτηριστικά ή χαρακτηριστικά σχεδίασης
        που προσθέτουν αξία.
    wrist_rest_type:
      name: Τύπος στηρίγματος καρπού
      description: Προσδιορίζει την προβλεπόμενη σύζευξη συσκευής ή τη διαμόρφωση
        σετ του στηρίγματος καρπού (π.χ., μόνο πληκτρολόγιο, μόνο ποντίκι, συνδυασμένα
        σετ).
    xlr_pin_count:
      name: Αριθμός ακίδων XLR
      description: Υποδεικνύει τη συγκεκριμένη διαμόρφωση ακίδων (αριθμός ακίδων)
        των συνδετήρων XLR.
    yacht_type:
      name: Τύπος γιοτ
      description: Ταξινομεί τον τύπο του γιοτ, όπως μηχανοκίνητο ή εξερευνητή
    yarn_weight_category:
      name: Κατηγορία βάρους νήματος
      description: Προσδιορίζει το πάχος του νήματος, όπως εξαιρετικά ογκώδες ή χειροποίητο
    zipper_pull_style:
      name: Στυλ γλωττίδας φερμουάρ
      description: Περιγράφει το σχέδιο ή το φινίρισμα μιας γλωττίδας φερμουάρ, όπως
        ανάγλυφο ή εγχάρακτο
    zoom_type:
      name: Τύπος ζουμ
      description: Καθορίζει τον τύπο της λειτουργίας ζουμ σε κάμερες εγγράφων, όπως
        ψηφιακό ή οπτικό
    air_fryer_accessory_type:
      name: Τύπος αξεσουάρ φριτέζας αέρα
      description: Προσδιορίζει το συγκεκριμένο είδος αξεσουάρ που πωλείται.
    air_purifier_filter_technology:
      name: Τεχνολογία φίλτρου καθαρισμού αέρα
      description: Προσδιορίζει την κύρια μέθοδο φιλτραρίσματος ή καθαρισμού που χρησιμοποιείται
        από τη συσκευή.
    air_purifier_filtration_rating:
      name: Κατηγορία απόδοσης φιλτραρίσματος καθαριστή αέρα
      description: Υποδεικνύει την πιστοποιημένη κατηγορία απόδοσης του μέσου φιλτραρίσματος.
    animal_care_set_components_included:
      name: Περιλαμβανόμενα εξαρτήματα σετ φροντίδας ζώων
      description: Παραθέτει τα επιμέρους εξαρτήματα και αξεσουάρ περιποίησης ή καθαρισμού
        που περιλαμβάνονται στο σετ, ώστε οι καταναλωτές να γνωρίζουν ακριβώς τι περιλαμβάνεται.
    apron_features:
      name: Χαρακτηριστικά ποδιάς
      description: Αναδεικνύει τα ειδικά λειτουργικά χαρακτηριστικά της ποδιάς.
    apron_style:
      name: Στυλ ποδιάς
      description: Καθορίζει τη συνολική γραμμή ή κατασκευή της ποδιάς.
    aquatic_plant_growth_habit:
      name: Τρόπος ανάπτυξης υδρόβιου φυτού
      description: Κατατάσσει τα υδρόβια φυτά βάσει της συνήθους θέσης και του τρόπου
        ανάπτυξής τους στη στήλη του νερού.
    arbor_top_design:
      name: Σχεδιασμός κορυφής αψίδας
      description: Καθορίζει το σχήμα ή το ύφος του επάνω τμήματος της αψίδας, βοηθώντας
        τους πελάτες να το ταιριάξουν με τις αρχιτεκτονικές τους προτιμήσεις.
    ashtray_type:
      name: Τύπος σταχτοδοχείου
      description: Κατατάσσει το σταχτοδοχείο βάσει της κύριας χρήσης ή του περιβάλλοντος
        στο οποίο προορίζεται να χρησιμοποιηθεί.
    attractant_type:
      name: Τύπος ελκυστικού
      description: Καθορίζει τον μηχανισμό προσέλκυσης που είναι ενσωματωμένος στην
        κόλλα, εφόσον υπάρχει, βοηθώντας τους πελάτες να επιλέξουν την πιο αποτελεσματική
        παγίδα για την περίπτωσή τους.
    awning_operation_type:
      name: Τύπος λειτουργίας τέντας
      description: Περιγράφει τον μηχανισμό που χρησιμοποιείται για την έκταση και
        την ανάκληση της τέντας.
    bag_clip_style:
      name: Τύπος κλιπ σακούλας
      description: Περιγράφει τον μηχανικό τύπο του μηχανισμού κλεισίματος του κλιπ.
    bag_configuration:
      name: Διαμόρφωση σακούλας
      description: Περιγράφει τον αριθμό και το στυλ των σακουλών που περιλαμβάνονται
        στο σύστημα συλλογής χλόης.
    bag_insulation:
      name: Θερμομόνωση τσάντας
      description: Υποδεικνύει εάν η τσάντα μεταφοράς κρασιού είναι θερμομονωμένη
        ώστε να διατηρείται η θερμοκρασία της φιάλης.
    baking_liner_size:
      name: Μέγεθος θήκης ψησίματος
      description: Κατηγοριοποιημένη κλίμακα μεγέθους που χρησιμοποιείται από αρτοποιούς/ζαχαροπλάστες
        για την περιγραφή της χωρητικότητας της θήκης σε σχέση με τα τυπικά μεγέθη
        cupcake.
    baking_sheet_style:
      name: Τύπος λαμαρίνας ψησίματος
      description: Προσδιορίζει τον τύπο κατασκευής της λαμαρίνας, όπως με χείλος
        ή διάτρητη.
    ballast_material:
      name: Υλικό έρματος
      description: Καταγράφει τα υλικά που μπορούν να χρησιμοποιηθούν ως έρμα (γέμισμα)
        στον κύλινδρο, βοηθώντας τους αγοραστές να επιλέξουν μοντέλα συμβατά με το
        προτιμώμενο υλικό πλήρωσης.
    base_features:
      name: Χαρακτηριστικά βάσης
      description: Αναδεικνύει τα χαρακτηριστικά σταθερότητας ή πρόσφυσης της βάσης,
        διευκολύνοντας χρήστες που χρειάζονται αντιολισθητική ή αναρροφητική λειτουργία
        σε επιφάνειες εργασίας.
    baster_tip_type:
      name: Τύπος μύτης σύριγγας μαγειρικής
      description: Κατατάσσει τον τύπο μύτης ή εξαρτήματος της σύριγγας μαγειρικής,
        επιτρέποντας στους αγοραστές να φιλτράρουν μεταξύ κλασικής σύριγγας με φούσκα,
        βελόνας έγχυσης και μύτης με βουρτσάκι.
    bathroom_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ μπάνιου
      description: Παραθέτει τα συγκεκριμένα είδη που περιλαμβάνονται στο σετ αξεσουάρ
        μπάνιου, ώστε οι αγοραστές να γνωρίζουν ακριβώς ποια τεμάχια περιλαμβάνονται.
    bathroom_accessory_compatibility:
      name: Συμβατότητα αξεσουάρ μπάνιου
      description: Υποδεικνύει ποιο αξεσουάρ ή είδος υγιεινής μπάνιου προορίζεται
        να συγκρατεί η βάση στήριξης.
    battery_backup_support:
      name: Υποστήριξη εφεδρικής μπαταρίας
      description: Υποδεικνύει αν περιλαμβάνεται εφεδρική μπαταρία ανάγκης, αν διατίθεται
        προαιρετικά ή αν δεν υποστηρίζεται.
    bedskirt_corner_style:
      name: Στυλ γωνίας κρεβατόγυρου
      description: Καθορίζει τον τρόπο φινιρίσματος των γωνιών του καλύμματος του
        κάτω μέρους του κρεβατιού, επηρεάζοντας την εφαρμογή σε κρεβάτια με υποπόδια
        ή πασσάλους.
    bedskirt_style:
      name: Στυλ κρεβατόγυρου
      description: Καθορίζει τον τρόπο τελειώματος των γωνιών του κρεβατόγυρου, επηρεάζοντας
        την εφαρμογή σε κρεβάτια με ποδαρικό ή κολόνες
    beer_glass_type:
      name: Τύπος ποτηριού μπύρας
      description: Προσδιορίζει το συγκεκριμένο στυλ ή σχήμα του ποτηριού μπύρας,
        βοηθώντας τους αγοραστές να βρουν το ιδανικό ποτήρι για την μπύρα της προτίμησής
        τους (π.χ. pint, pilsner, weizen).
    belt_profile:
      name: Προφίλ ιμάντα
      description: Προσδιορίζει τη διατομή ή τον τύπο του ιμάντα, ώστε να εξασφαλίζεται
        σωστή εφαρμογή με τον σχεδιασμό της τροχαλίας.
    beverage_tub_features:
      name: Χαρακτηριστικά δοχείου πάγου για ποτά
      description: Αναδεικνύει σημαντικά σχεδιαστικά χαρακτηριστικά ή περιλαμβανόμενα
        εξαρτήματα που προσθέτουν λειτουργικότητα ή ευκολία στο δοχείο πάγου για ποτά.
    blade_construction_method:
      name: Μέθοδος κατασκευής λεπίδας
      description: Καθορίζει τον τρόπο με τον οποίο κατασκευάστηκε η λεπίδα.
    blade_finish:
      name: Φινίρισμα λεπίδας
      description: Επιφανειακή επεξεργασία ή αισθητικό φινίρισμα που εφαρμόζεται στη
        λεπίδα.
    blade_shape:
      name: Σχήμα λεπίδας
      description: Περιγράφει το γεωμετρικό σχήμα/προφίλ της λεπίδας του φτυαριού.
    blade_sidedness:
      name: Διαμόρφωση κοπής λεπίδας (μονής ή διπλής όψης)
      description: Υποδεικνύει αν η λεπίδα του θαμνοκοπτικού διαθέτει δόντια κοπής
        στη μία πλευρά μόνο ή και στις δύο πλευρές.
    bleach_formulation:
      name: Σύνθεση λευκαντικού
      description: Υποδεικνύει τη χημική βάση του λευκαντικού προϊόντος (π.χ. με βάση
        το χλώριο ή το οξυγόνο).
    bleach_type:
      name: Τύπος λευκαντικού
      description: Καθορίζει την παρουσία και το είδος λευκαντικού ή αποχρωστικού
        παράγοντα που χρησιμοποιείται στο καθαριστικό λεκέδων.
    blender_jar_material:
      name: Υλικό κανάτας μπλέντερ
      description: Καθορίζει το υλικό που χρησιμοποιείται για την κύρια κανάτα/δοχείο
        ανάμειξης.
    blooming_season:
      name: Περίοδος ανθοφορίας
      description: Υποδεικνύει την εποχή ή τις εποχές κατά τις οποίες το φυτό συνήθως
        ανθίζει.
    booster_pump_requirement:
      name: Απαίτηση αντλίας ενίσχυσης
      description: Διευκρινίζει αν απαιτείται ξεχωριστή αντλία ενίσχυσης για τη λειτουργία
        του καθαριστή (sweep).
    bore_type:
      name: Τύπος οπής (bore)
      description: Καθορίζει τον τύπο οπής ή τη διασύνδεση που χρησιμοποιείται για
        τη στερέωση της τροχαλίας στον άξονα.
    bottle_cap_gasket_material:
      name: Υλικό παρεμβύσματος καπακιού φιάλης
      description: Προσδιορίζει το υλικό του παρεμβύσματος στεγανοποίησης που έρχεται
        σε επαφή με το χείλος της φιάλης.
    bottle_cap_liner_type:
      name: Τύπος εσωτερικής επένδυσης καπακιού φιάλης
      description: Καθορίζει τον τύπο ή το υλικό της εσωτερικής επένδυσης στεγανοποίησης
        στο καπάκι, το οποίο επηρεάζει τη στεγανότητα και τη συμβατότητα με το προϊόν.
    bottle_fill_state:
      name: Κατάσταση πλήρωσης φιάλης
      description: Υποδεικνύει εάν η φιάλη πωλείται άδεια ή προγεμισμένη με πόσιμο
        νερό.
    bottle_stopper_mechanism:
      name: Μηχανισμός πώματος φιάλης
      description: Ορίζει τον μηχανισμό ή το στυλ στεγανοποίησης που χρησιμοποιείται
        από το πώμα ή το πώμα διατήρησης.
    bowl_type:
      name: Τύπος μπολ
      description: Κατηγοριοποιεί την κύρια προβλεπόμενη χρήση ή το στυλ του μπολ.
    bread_storage_ventilation:
      name: Αερισμός δοχείου αποθήκευσης ψωμιού
      description: Περιγράφει εάν και με ποιον τρόπο το δοχείο επιτρέπει την κυκλοφορία
        αέρα ώστε να διατηρείται το ψωμί φρέσκο.
    brew_strength_options:
      name: Επιλογές έντασης εκχύλισης
      description: Παραθέτει τα επιλέξιμα επίπεδα εκχύλισης που ρυθμίζουν τον χρόνο
        εκχύλισης ή τη ροή, ώστε να παράγεται πιο ήπιος ή πιο δυνατός καφές.
    bridge_railing_style:
      name: Στυλ κιγκλιδώματος γέφυρας
      description: Καθορίζει την ύπαρξη και το στυλ των κιγκλιδωμάτων στη γέφυρα,
        επηρεάζοντας την ασφάλεια και την αισθητική.
    briquette_ignition_type:
      name: Τύπος ανάφλεξης μπρικέτας
      description: Υποδεικνύει εάν οι μπρικέτες περιλαμβάνουν βοηθήματα ανάφλεξης
        ή είναι απλές, βοηθώντας τους χρήστες να κατανοήσουν την ευκολία ανάμματος.
    bristle_stiffness:
      name: Σκληρότητα ινών βούρτσας
      description: Υποδεικνύει τη δυσκαμψία των ινών της βούρτσας, επηρεάζοντας την
        ισχύ καθαρισμού και την καταλληλότητα για διαφορετικές επιφάνειες λεκάνης
        τουαλέτας.
    bristle_tip_type:
      name: Τύπος άκρου τριχών
      description: Υποδεικνύει εάν οι άκρες των τριχών είναι διαχωρισμένες (flagged)
        για λεπτότερη συλλογή σκόνης ή παραμένουν αδιαχώριστες για βαριά υπολείμματα.
    bucket_features:
      name: Χαρακτηριστικά κάδου
      description: Αναδεικνύει ειδικά χαρακτηριστικά ή λειτουργικές βελτιώσεις ενός
        κάδου, ώστε οι καταναλωτές να εντοπίζουν γρήγορα προϊόντα με τις επιθυμητές
        ευκολίες.
    bulb_finish:
      name: Φινίρισμα λαμπτήρα
      description: Περιγράφει την εξωτερική επίστρωση ή το φινίρισμα του γυαλιού του
        λαμπτήρα, το οποίο επηρεάζει τη διάχυση του φωτός και το αισθητικό ύφος.
    burner_shape:
      name: Σχήμα καυστήρα
      description: Περιγράφει τον γεωμετρικό σχεδιασμό του καυστήρα ψησταριάς, ο οποίος
        καθορίζει την εφαρμογή και την κατανομή της θερμότητας στο εσωτερικό της ψησταριάς.
    burr_shape:
      name: Σχήμα μύλου (burr)
      description: Καθορίζει τη γεωμετρία των μαχαιριών (burr) σε μύλους άλεσης, η
        οποία επηρεάζει την ομοιομορφία της άλεσης και την παραγωγή θερμότητας.
    butterfly_feeder_food_type:
      name: Τύπος τροφής ταΐστρας πεταλούδων
      description: Προσδιορίζει το είδος τροφής ή ελκυστικού που έχει σχεδιαστεί να
        περιέχει η ταΐστρα.
    cabinet_light_fixture_style:
      name: Στυλ φωτιστικού ντουλαπιού
      description: Περιγράφει το φυσικό στυλ ή τον παράγοντα μορφής του φωτιστικού
        ντουλαπιού.
    candle_container_material:
      name: Υλικό δοχείου κεριού
      description: Προσδιορίζει το υλικό του δοχείου ή περιέκτη του κεριού (για κεριά
        σε γυάλινο ή μεταλλικό δοχείο).
    canner_type:
      name: Τύπος αποστειρωτή κονσερβοποίησης
      description: Καθορίζει τη μέθοδο ή τον τύπο κονσερβοποίησης για τον οποίο έχει
        σχεδιαστεί ο αποστειρωτής κονσερβοποίησης.
    canopy_shape:
      name: Σχήμα σκέπαστρου
      description: Καθορίζει το γεωμετρικό σχήμα του ανοιγμένου σκέπαστρου.
    canopy_venting:
      name: Αερισμός σκέπαστρου
      description: Δηλώνει τη διαμόρφωση αερισμού του σκέπαστρου, η οποία επηρεάζει
        την αντοχή στον άνεμο και τη διάχυση της θερμότητας.
    car_cleaning_kit_items_included:
      name: Περιλαμβανόμενα είδη κιτ καθαρισμού αυτοκινήτου
      description: Αναφέρει τα συγκεκριμένα εργαλεία και αξεσουάρ που περιλαμβάνονται
        στο κιτ, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται και να μπορούν
        να συγκρίνουν πακέτα.
    carbonation_level_adjustment:
      name: Ρύθμιση επιπέδου ανθράκωσης
      description: Υποδεικνύει εάν η συσκευή παρασκευής σόδας προσφέρει σταθερό ή
        ρυθμιζόμενο επίπεδο ανθράκωσης.
    catalytic_combustor_type:
      name: Τύπος καταλυτικού καυστήρα
      description: Υποδεικνύει εάν η σόμπα χρησιμοποιεί καταλυτικό, μη καταλυτικό
        ή υβριδικό σύστημα καύσης, επηρεάζοντας την απόδοση και τις εκπομπές.
    ceiling_light_fixture_style:
      name: Στυλ φωτιστικού οροφής
      description: Καθορίζει το βασικό δομικό στυλ/τη διαμόρφωση του φωτιστικού οροφής.
    center_hole_shape:
      name: Σχήμα κεντρικής οπής
      description: Περιγράφει το γεωμετρικό σχήμα της κεντρικής οπής/οπής στερέωσης
        της λεπίδας, το οποίο καθορίζει τη συμβατότητα με συγκεκριμένους άξονες χλοοκοπτικού.
    chainsaw_bar_mount_type:
      name: Τύπος βάσης λάμας αλυσοπρίονου
      description: Καθορίζει το μοτίβο στερέωσης ή τον τύπο εγκοπής της λάμας αλυσοπρίονου,
        ώστε να εξασφαλίζεται η συμβατότητα με το σώμα του αλυσοπρίονου.
    chainsaw_bar_nose_type:
      name: Τύπος μύτης λάμας αλυσοπρίονου
      description: Προσδιορίζει τον τύπο της άκρης της λάμας, επηρεάζοντας την απόδοση
        κοπής και τη συντήρηση.
    chainsaw_bar_type:
      name: Τύπος κόφτη πούρων
      description: Κατηγοριοποιεί την κατασκευή ή τη χρήση της λάμας.
    chainsaw_cutter_type:
      name: Τύπος κοπτήρα αλυσίδας αλυσοπρίονου
      description: Προσδιορίζει το προφίλ/σχεδιασμό του κοπτήρα της αλυσίδας, επηρεάζοντας
        την ταχύτητα κοπής, την ανθεκτικότητα και τα χαρακτηριστικά ανάκρουσης.
    champagne_glass_type:
      name: Τύπος ποτηριού σαμπάνιας
      description: Καθορίζει τον συγκεκριμένο σχεδιασμό του ποτηριού σαμπάνιας, επιτρέποντας
        στους αγοραστές να διακρίνουν μεταξύ σχημάτων βελτιστοποιημένων για διαφορετικές
        εμπειρίες κατανάλωσης.
    chandelier_shape:
      name: Σχήμα πολυελαίου
      description: Καθορίζει τη συνολική δομική μορφή του πολυελαίου.
    charcoal_chimney_features:
      name: Χαρακτηριστικά καμινάδας ανάμματος κάρβουνων
      description: Αναφέρει αξιοσημείωτα λειτουργικά χαρακτηριστικά της καμινάδας
        ανάμματος κάρβουνων.
    charcoal_ignition_type:
      name: Τύπος ανάφλεξης κάρβουνου
      description: Υποδεικνύει εάν το κάρβουνο έχει υποστεί επεξεργασία ή έχει σχεδιαστεί
        για ευκολότερο άναμμα ή καθαρότερη καύση.
    chopstick_style:
      name: Στυλ chopstick
      description: Καθορίζει το περιφερειακό ή πολιτισμικό στυλ για τα ξυλάκια φαγητού
        (chopstick), το οποίο μπορεί να επηρεάζει το μήκος, το σχήμα και τη διακόσμησή
        τους
    chopstick_trainer_design:
      name: Σχεδιασμός εκπαιδευτικού βοηθήματος για chopstick
      description: Περιγράφει τον μηχανικό σχεδιασμό ή τη μέθοδο υποβοήθησης που χρησιμοποιεί
        το βοήθημα.
    cigar_cutter_type:
      name: Τύπος κόφτη πούρων
      description: Καθορίζει τον μηχανισμό ή το στυλ κοπής που χρησιμοποιείται για
        την αφαίρεση της κεφαλής του πούρου.
    cigar_punch_type:
      name: Τύπος διατρητήρα πούρων
      description: Προσδιορίζει τον μηχανισμό ή το στυλ του διατρητήρα πούρων.
    clay_pot_material:
      name: Υλικό πήλινου σκεύους
      description: Προσδιορίζει τη σύσταση ή τον τύπο πηλού που χρησιμοποιείται στο
        σκεύος, όπως κεραμικό τύπου earthenware ή stoneware.
    cleaner_concentration:
      name: Συγκέντρωση καθαριστικού
      description: Υποδεικνύει εάν το καθαριστικό διατίθεται έτοιμο προς χρήση ή ως
        συμπύκνωμα που πρέπει να αραιωθεί πριν από τη χρήση.
    cleaning_cloth_features:
      name: Χαρακτηριστικά πανιού καθαρισμού
      description: Αναδεικνύει ειδικά χαρακτηριστικά απόδοσης των πανιών.
    cleaning_solution_concentration:
      name: Συγκέντρωση διαλύματος καθαρισμού
      description: Υποδεικνύει εάν το προϊόν διατίθεται έτοιμο προς χρήση, σε συμπυκνωμένη
        μορφή ή σε άλλη μορφή αραίωσης.
    clock_chime_melody:
      name: Μελωδία κουδουνίσματος ρολογιού
      description: Καθορίζει τη μελωδία ή το μοτίβο χτυπημάτων που ακούγεται από το
        ρολόι κάθε ώρα ή κάθε τέταρτο.
    clock_display_type:
      name: Τύπος οθόνης ρολογιού
      description: Καθορίζει τον τρόπο που εμφανίζεται η ώρα, το οποίο είναι χρήσιμο
        για τους πελάτες που προτιμούν ψηφιακή μορφή, αναλογική, τύπου flip κ.λπ.
    clock_hand_mounting_type:
      name: Τύπος τοποθέτησης δεικτών ρολογιού
      description: Καθορίζει το στυλ διεπαφής που χρησιμοποιείται για την προσθήκη
        των δεικτών ρολογιού στην κίνηση.
    clock_hand_style:
      name: Στυλ δεικτών ρολογιού
      description: Καθορίζει τον οπτικό σχεδιασμό των δεικτών, επιτρέποντας στους
        αγοραστές να επιλέξουν δείκτες που ταιριάζουν με την αισθητική του ρολογιού
        τους.
    clock_movement_type:
      name: Τύπος μηχανισμού ρολογιού
      description: Προσδιορίζει τον εσωτερικό μηχανισμό χρονομέτρησης του ρολογιού.
    clothespin_type:
      name: Τύπος για το μανταλάκι
      description: Προσδιορίζει τον δομικό σχεδιασμό/στυλ για το μανταλάκι.
    co2_cylinder_compatibility:
      name: Συμβατότητα φιάλης CO2
      description: Καθορίζει τον τύπο ή το μέγεθος φιάλης CO₂ που δέχεται η συσκευή
        παρασκευής σόδας, ώστε οι αγοραστές να βρίσκουν συμβατά ανταλλακτικά φυσίγγια.
    co2_supplementation_requirement:
      name: Απαίτηση παροχής CO₂
      description: Υποδεικνύει το επίπεδο παροχής διοξειδίου του άνθρακα που απαιτείται
        για τη βέλτιστη υγεία των φυτών σε ενυδρεία.
    coaster_features:
      name: Χαρακτηριστικά σουβέρ
      description: Προσδιορίζει ιδιαίτερα χαρακτηριστικά των σουβέρ, όπως απορροφητική
        ή αντιολισθητική βάση.
    cocktail_strainer_type:
      name: Τύπος σουρωτηριού κοκτέιλ
      description: Καθορίζει τον σχεδιασμό του σουρωτηριού κοκτέιλ, ο οποίος επηρεάζει
        τη συμβατότητα με σέικερ και τον τρόπο χρήσης.
    code_technology:
      name: Τεχνολογία κωδικοποίησης
      description: Προσδιορίζει την τεχνολογία κωδικοποίησης ή ασφαλείας που χρησιμοποιεί
        το τηλεχειριστήριο για να επικοινωνεί με τον μηχανισμό γκαραζόπορτας.
    coffee_decanter_warmer_features:
      name: Χαρακτηριστικά θερμαντικής βάσης καράφας καφέ
      description: Αναδεικνύει σημαντικά λειτουργικά ή χαρακτηριστικά ασφαλείας που
        αφορούν τη θερμαντική βάση καράφας καφέ.
    coffee_filter_basket_size:
      name: Μέγεθος καλαθιού φίλτρου καφέ
      description: Καθορίζει την τυποποιημένη ονομασία μεγέθους που υποστηρίζει το
        καλάθι, διασφαλίζοντας συμβατότητα με φίλτρα και μηχανές.
    coffee_filter_shape:
      name: Σχήμα φίλτρου καφέ
      description: Καθορίζει το γεωμετρικό σχήμα του φίλτρου καφέ ώστε να διασφαλίζεται
        η συμβατότητα με διαφορετικές καφετιέρες.
    coffee_filter_type:
      name: Τύπος φίλτρου καφέ
      description: Καθορίζει τον τύπο φίλτρου που δέχεται ή περιλαμβάνει η καφετιέρα
        φίλτρου, ο οποίος μπορεί να επηρεάζει τη γεύση και το διαρκές κόστος αναλωσίμων.
    coffee_grinder_accessory_type:
      name: Τύπος αξεσουάρ μύλου καφέ
      description: Κατατάσσει το συγκεκριμένο είδος αξεσουάρ για τη διευκόλυνση του
        φιλτραρίσματος και της αναζήτησης.
    colander_style:
      name: Στυλ σουρωτηριού
      description: Κατατάσσει τον δομικό σχεδιασμό του σουρωτηριού, όπως με βάση (ποδαράκια)
        ή για τοποθέτηση πάνω από τον νεροχύτη.
    compatible_air_conditioner_type:
      name: Συμβατός τύπος κλιματιστικού
      description: Προσδιορίζει τον τύπο κλιματιστικού με τον οποίο έχει σχεδιαστεί
        να λειτουργεί το αξεσουάρ.
    compatible_awning_rail_type:
      name: Συμβατός τύπος ράγας τέντας
      description: Καθορίζει τη ράγα ή το σύστημα σωλήνωσης τέντας στο οποίο έχει
        σχεδιαστεί να εφαρμόζει το κλιπ ανάρτησης.
    compatible_beverage_type:
      name: Συμβατός τύπος ροφήματος
      description: Καθορίζει τον τύπο ροφήματος που έχει σχεδιαστεί να διατηρεί το
        πώμα ή το σύστημα συντήρησης.
    compatible_can_size:
      name: Συμβατό μέγεθος δοχείου (κουτιού)
      description: Αναφέρει τα μεγέθη κουτιών ροφημάτων που μπορεί να δεχθεί ο συμπιεστής.
    compatible_cigarette_size:
      name: Συμβατό μέγεθος τσιγάρου
      description: Αναφέρει τα τυπικά μήκη ή μορφές τσιγάρων που ταιριάζουν στη θήκη.
    compatible_coffee_capsule_system:
      name: Συμβατό σύστημα κάψουλας καφέ
      description: Καθορίζει το σύστημα κάψουλας ή pod για το οποίο έχει σχεδιαστεί
        ο αντάπτορας, διασφαλίζοντας ότι οι καταναλωτές επιλέγουν αντάπτορα συμβατό
        με τον προτιμώμενο τύπο καφέ.
    compatible_coffee_maker_type:
      name: Συμβατός τύπος καφετιέρας
      description: Υποδεικνύει τον τύπο καφετιέρας ή μηχανής espresso για τον οποίο
        έχει σχεδιαστεί το αξεσουάρ.
    compatible_cooking_thermometer_type:
      name: Συμβατός τύπος θερμομέτρου μαγειρικής
      description: Καθορίζει τους τύπους θερμομέτρων μαγειρικής που το εργαλείο βαθμονόμησης
        έχει σχεδιαστεί να ρυθμίζει ή να επαληθεύει.
    compatible_coupler_size:
      name: Συμβατό μέγεθος συνδέσμου (coupler)
      description: Καθορίζει το μέγεθος του ζεύκτη (coupler) στο οποίο εφαρμόζει η
        σακούλα ζαχαροπλαστικής χωρίς να χρειάζεται κόψιμο.
    compatible_dehumidifier_technology:
      name: Συμβατή τεχνολογία αφυγραντήρα
      description: Υποδεικνύει την τεχνολογία αφυγραντήρα με την οποία είναι συμβατό
        το φίλτρο, όπως συμπιεστή ή απορροφητικού υλικού (desiccant).
    compatible_feeder_type:
      name: Συμβατός τύπος ταΐστρας
      description: Προσδιορίζει τους τύπους ταΐστρας στους οποίους έχει σχεδιαστεί
        να εφαρμόζει ο δίσκος.
    compatible_footwear_material:
      name: Συμβατό υλικό υποδημάτων
      description: Αναφέρει τους τύπους υλικών υποδημάτων για τους οποίους είναι κατάλληλο
        το βερνίκι ή το κερί.
    compatible_fuel_type:
      name: Συμβατός τύπος καυσίμου
      description: Καθορίζει τον τύπο καυσίμου με τον οποίο είναι σχεδιασμένο να είναι
        συμβατό το αξεσουάρ, διασφαλίζοντας σωστή αντιστοίχιση με θερμάστρες εξωτερικού
        χώρου που λειτουργούν με προπάνιο, φυσικό αέριο, ηλεκτρικό ρεύμα ή άλλο καύσιμο.
    compatible_garment_steamer_design:
      name: Συμβατός σχεδιασμός ατμοκαθαριστή ρούχων
      description: Καθορίζει τα στυλ ατμοκαθαριστή ρούχων για τα οποία έχει σχεδιαστεί
        η θήκη καλωδίου.
    compatible_grill_type:
      name: Συμβατός τύπος ψησταριάς
      description: Καθορίζει τους τύπους ψησταριών με τους οποίους προορίζεται να
        λειτουργήσει το αξεσουάρ.
    compatible_hazardous_waste_type:
      name: Συμβατός τύπος επικίνδυνων αποβλήτων
      description: Καθορίζει τον τύπο επικίνδυνων αποβλήτων που έχει σχεδιαστεί να
        συγκρατεί το δοχείο.
    compatible_ironing_board_type:
      name: Συμβατός τύπος σιδερώστρας
      description: Υποδεικνύει το στυλ της σιδερώστρας στην οποία ταιριάζει το εξάρτημα,
        βοηθώντας τον αγοραστή να προσδιορίσει τη συμβατότητα.
    compatible_lawn_mower_type:
      name: Συμβατός τύπος χλοοκοπτικού
      description: Υποδεικνύει το στυλ του χλοοκοπτικού για το οποίο έχει σχεδιαστεί
        το κιτ λωρίδων.
    compatible_leaf_blower_style:
      name: Συμβατό στυλ φυσητήρα φύλλων
      description: Καθορίζει τον συντελεστή μορφής του φυσητήρα φύλλων με τον οποίο
        είναι συμβατό το αξεσουάρ.
    compatible_mailbox_size:
      name: Συμβατό μέγεθος γραμματοκιβωτίου
      description: Υποδεικνύει το μέγεθος ή τα μεγέθη γραμματοκιβωτίου που είναι συμβατά
        με το αξεσουάρ σύμφωνα με τις κοινές ταξινομήσεις του USPS και του κλάδου.
    compatible_mailbox_type:
      name: Συμβατός τύπος γραμματοκιβωτίου
      description: Καθορίζει τον τύπο γραμματοκιβωτίου που ταιριάζει εντός ή επάνω
        στο περίβλημα, βοηθώντας τους αγοραστές να επιβεβαιώσουν τη σωστή εφαρμογή.
    compatible_napkin_size:
      name: Συμβατό μέγεθος χαρτοπετσέτας
      description: Καθορίζει τις διαστάσεις ή τη μορφή χαρτοπετσέτας για τις οποίες
        έχει σχεδιαστεί η θήκη/διανομέας.
    compatible_outdoor_grill_style:
      name: Συμβατό στυλ υπαίθριας ψησταριάς
      description: Καθορίζει το στυλ ή τη διαμόρφωση υπαίθριας ψησταριάς για την οποία
        έχει σχεδιαστεί το κάλυμμα.
    compatible_radiator_style:
      name: Συμβατό στυλ καλοριφέρ
      description: Παραθέτει τα στυλ καλοριφέρ για τα οποία έχει σχεδιαστεί το αξεσουάρ,
        όπως καλοριφέρ πάνελ, καλοριφέρ στήλης, καλοριφέρ ράγας πετσετών ή καλοριφέρ
        σοβατεπί.
    compatible_refrigerator_compartment:
      name: Συμβατό διαμέρισμα ψυγείου
      description: Καθορίζει σε ποιο σημείο του ψυγείου προορίζεται να χρησιμοποιηθεί
        το εξάρτημα.
    compatible_stove_fuel_type:
      name: Συμβατός τύπος καυσίμου κουζίνας
      description: Προσδιορίζει τους τύπους καυσίμων με τους οποίους είναι συμβατό
        ένα φορητό αξεσουάρ κουζίνας, βοηθώντας τους πελάτες να ταιριάξουν το κομμάτι
        με την κουζίνα τους (π.χ., δοχείο βενζίνης ή αλκοόλη).
    compatible_stove_type:
      name: Συμβατός τύπος κουζίνας
      description: Προσδιορίζει τα είδη φορητών εστιών μαγειρέματος με τα οποία έχει
        σχεδιαστεί για να συνδέεται αυτή η βάση.
    compatible_tissue_box_type:
      name: Συμβατός τύπος κουτιού χαρτομάντιλων
      description: Προσδιορίζει το στυλ/μέγεθος του κουτιού χαρτομάντιλων για το οποίο
        έχει σχεδιαστεί η θήκη.
    compatible_tractor_type:
      name: Συμβατός τύπος τρακτέρ
      description: Καθορίζει την κατηγορία του τρακτέρ για την οποία έχει σχεδιαστεί
        το εξάρτημα/αξεσουάρ.
    compatible_umbrella_type:
      name: Συμβατός τύπος ομπρέλας
      description: Καθορίζει το στυλ της εξωτερικής ομπρέλας στην οποία έχει σχεδιαστεί
        να ταιριάζει το κάλυμμα.
    compatible_washing_machine_type:
      name: Συμβατός τύπος πλυντηρίου ρούχων
      description: Καθορίζει για ποιους σχεδιασμούς πλυντηρίων είναι κατάλληλο το
        καθαριστικό (π.χ., εμπρόσθιας φόρτωσης, άνω φόρτωσης, υψηλής απόδοσης).
    compatible_waste_container_type:
      name: Συμβατός τύπος κάδου απορριμμάτων
      description: Καθορίζει τον τύπο κάδου απορριμμάτων με τον οποίο είναι σχεδιασμένο
        να ταιριάζει ή να λειτουργεί το αξεσουάρ.
    compatible_water_cooler_type:
      name: Συμβατός τύπος ψύκτη νερού
      description: Υποδεικνύει με ποιους τύπους ψύκτη νερού είναι συμβατό το αξεσουάρ,
        βοηθώντας τους πελάτες να επιλέξουν τα σωστά εξαρτήματα για τη συσκευή τους.
    compatible_water_heater_type:
      name: Συμβατός τύπος θερμοσίφωνα
      description: Καθορίζει τον τύπο θερμοσίφωνα με τον οποίο είναι συμβατό το προϊόν.
    compatible_wrap_material:
      name: Συμβατό υλικό περιτυλίγματος
      description: Παραθέτει τους τύπους μεμβράνης/υλικού περιτυλίγματος τροφίμων
        που έχει σχεδιαστεί να συγκρατεί ο διανομέας.
    compost_aerator_design:
      name: Σχεδιασμός αεριστήρα κομποστοποίησης
      description: Προσδιορίζει τον μηχανικό σχεδιασμό ή τον τύπο του αεριστήρα, περιγράφοντας
        τον τρόπο με τον οποίο αναδεύει το κομπόστ.
    compost_form:
      name: Μορφή κομπόστ
      description: Περιγράφει τη φυσική μορφή ή τον τύπο συσκευασίας του προϊόντος
        κομπόστ.
    compost_source_material:
      name: Υλικό προέλευσης κομπόστ
      description: Προσδιορίζει το πρωτογενές υλικό ή τα πρωτογενή υλικά προέλευσης
        του κομπόστ.
    compression_method:
      name: Μέθοδος συμπίεσης
      description: Υποδεικνύει την τεχνική που χρησιμοποιείται για την απομάκρυνση
        του αέρα ή την εξοικονόμηση χώρου μέσα στη σακούλα.
    cooking_gel_fuel_base:
      name: Βάση καυσίμου γέλης μαγειρέματος
      description: Προσδιορίζει την κύρια χημική βάση του καυσίμου γέλης, επιτρέποντας
        στους χρήστες να επιλέγουν μεταξύ βάσης αιθανόλης, μεθανόλης, γλυκόλης και
        άλλων συνθέσεων καυσίμου που διαφέρουν ως προς την οσμή, την απόδοση θερμότητας
        και την καταλληλότητα για χρήση σε εσωτερικούς ή εξωτερικούς χώρους.
    cooking_surface_texture:
      name: Υφή επιφάνειας μαγειρέματος
      description: Καθορίζει την υφή της επιφάνειας μαγειρέματος, όπως λεία, ραβδωτή
        ή διπλής χρήσης.
    cooking_thermometer_design:
      name: Σχεδιασμός θερμόμετρου μαγειρέματος
      description: Προσδιορίζει τον τρόπο λειτουργίας ενός θερμόμετρου μαγειρέματος,
        π.χ. αναλογικό ή ψηφιακό.
    cookware_coating_material:
      name: Υλικό επίστρωσης μαγειρικού σκεύους
      description: Προσδιορίζει τον τύπο εσωτερικής ή εξωτερικής επίστρωσης που εφαρμόζεται
        στο μαγειρικό σκεύος, παρέχοντας πληροφορίες για τις αντικολλητικές ιδιότητες,
        την ανθεκτικότητα και τις απαιτήσεις συντήρησης.
    cookware_coating_type:
      name: Τύπος επίστρωσης μαγειρικού σκεύους
      description: Καθορίζει την εσωτερική ή επιφανειακή επίστρωση του μαγειρικού
        σκεύους.
    cookware_lid_style:
      name: Στυλ καπακιού μαγειρικού σκεύους
      description: Περιγράφει το συνολικό στυλ ή τη λειτουργική κατασκευή του καπακιού.
    cooler_style:
      name: Τύπος φορητού ψυγείου
      description: Προσδιορίζει τον δομικό σχεδιασμό του φορητού ψυγείου τροφίμων/ποτών,
        βοηθώντας τους αγοραστές να επιλέξουν μεταξύ σκληρού ψυγείου, μαλακής τσάντας,
        σακιδίου πλάτης κ.λπ.
    corkscrew_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ τιρμπουσόν
      description: Καθορίζει τα επιπλέον εξαρτήματα που περιλαμβάνονται στη συσκευασία
        μαζί με το τιρμπουσόν.
    corkscrew_hinge_type:
      name: Τύπος άρθρωσης τιρμπουσόν
      description: Καθορίζει εάν το τιρμπουσόν διαθέτει μηχανισμό μονού ή διπλού μοχλού
        (άρθρωσης).
    corkscrew_tools_included:
      name: Περιλαμβανόμενα εργαλεία τιρμπουσόν
      description: Καταγράφει τα εργαλεία και αξεσουάρ που περιλαμβάνονται στη συσκευασία
        μαζί με το τιρμπουσόν (π.χ. κόφτης αλουμινόχαρτου, ανοιχτήρι μπουκαλιών, λεπίδα
        μαχαιριού), ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται.
    crushing_method:
      name: Μέθοδος σύνθλιψης
      description: Περιγράφει τον μηχανισμό που χρησιμοποιείται για τη συμπίεση του
        κουτιού.
    crust_browning_level:
      name: Επίπεδο ροδίσματος κόρας
      description: Προσδιορίζει τις διαθέσιμες επιλογές χρώματος/βαθμού ψησίματος
        της κόρας που προσφέρει ο αρτοπαρασκευαστής.
    cultivar_type:
      name: Τύπος ποικιλίας (cultivar)
      description: Καθορίζει τον τύπο βελτίωσης της ποικιλίας, αναφέροντας εάν είναι
        παραδοσιακή (heirloom), υβρίδιο, ανοιχτής επικονίασης ή γενετικά τροποποιημένη.
    cultivator_type:
      name: Τύπος καλλιεργητή
      description: Κατατάσσει τον δομικό σχεδιασμό του καλλιεργητή, όπως με μπροστινά
        ή πίσω δόντια (front-tine ή rear-tine).
    cup_warmer_features:
      name: Χαρακτηριστικά θερμαντήρα φλιτζανιών
      description: Αναδεικνύει ειδικά σχεδιαστικά ή λειτουργικά χαρακτηριστικά ευκολίας
        που αφορούν τους θερμαντήρες φλιτζανιών.
    curtain_heading_style:
      name: Στυλ κεφαλής κουρτίνας
      description: Καθορίζει το στυλ του επάνω άκρου/κεφαλής που χρησιμοποιείται για
        την ανάρτηση της κουρτίνας ή του υφάσματος, το οποίο επηρεάζει τα απαιτούμενα
        εξαρτήματα στήριξης και τη συνολική εμφάνιση.
    curtain_lining_type:
      name: Τύπος επένδυσης κουρτίνας
      description: Υποδεικνύει εάν η κουρτίνα περιλαμβάνει επένδυση και τον τύπο υλικού
        που χρησιμοποιείται και επηρεάζει τη θερμομόνωση, την ιδιωτικότητα και την
        εμφάνιση.
    curtain_rod_type:
      name: Τύπος κουρτινόξυλου
      description: Κατηγοριοποιεί τον δομικό τύπο του κουρτινόξυλου, βοηθώντας τους
        αγοραστές να εντοπίσουν γρήγορα μοντέλα κατάλληλα για τις ανάγκες εγκατάστασής
        τους.
    cutting_disc_function:
      name: Λειτουργία δίσκου κοπής
      description: Καθορίζει τη συγκεκριμένη λειτουργία επεξεργασίας τροφίμων που
        εκτελεί ο δίσκος.
    cutting_head_type:
      name: Τύπος κεφαλής κοπής
      description: Προσδιορίζει το είδος του κοπτικού στοιχείου που χρησιμοποιείται
        από το εξάρτημα.
    cutting_mechanism_type:
      name: Τύπος μηχανισμού κοπής
      description: Περιγράφει τον τύπο του κοπτικού μηχανισμού που είναι ενσωματωμένος
        στον διανομέα.
    cylinder_connector_type:
      name: Τύπος σύνδεσης κυλίνδρου
      description: Καθορίζει τον τύπο σύνδεσης ή το σπείρωμα του κυλίνδρου, που επηρεάζει
        τη συμβατότητα με συγκεκριμένα μοντέλα συσκευών παρασκευής σόδας.
    decorating_bag_features:
      name: Χαρακτηριστικά διακόσμησης σακούλας
      description: Αναδεικνύει ειδικά σχεδιαστικά ή λειτουργικά χαρακτηριστικά της
        σακούλας ζαχαροπλαστικής.
    dehumidifier_refill_form:
      name: Μορφή αναπλήρωσης αφυγραντήρα
      description: Καθορίζει τη φυσική μορφή/μορφότυπο του ανταλλακτικού, ώστε οι
        πελάτες να επιλέγουν συμβατές επιλογές.
    desiccant_material:
      name: Αποξηραντικό υλικό
      description: Προσδιορίζει την ουσία απορρόφησης υγρασίας που χρησιμοποιείται,
        σημαντική για την απόδοση, τη δυνατότητα επαναχρησιμοποίησης και ζητήματα
        ασφάλειας.
    dial_finish:
      name: Φινίρισμα καντράν
      description: Περιγράφει το φινίρισμα της επιφάνειας του καντράν, επηρεάζοντας
        την αντανάκλαση και το στυλ.
    dinnerware_features:
      name: Χαρακτηριστικά σερβίτσιου
      description: Αναδεικνύει ειδικά λειτουργικά χαρακτηριστικά του είδους σερβιρίσματος.
    dish_detergent_features:
      name: Χαρακτηριστικά απορρυπαντικού πιάτων
      description: Παραθέτει αξιοσημείωτα χαρακτηριστικά σύνθεσης ή οικολογικές ιδιότητες
        που βοηθούν τους αγοραστές να φιλτράρουν και να συγκρίνουν προϊόντα.
    dishwasher_accessory_type:
      name: Τύπος αξεσουάρ πλυντηρίου πιάτων
      description: Κατατάσσει το συγκεκριμένο είδος αξεσουάρ, επιτρέποντας στους αγοραστές
        να φιλτράρουν γρήγορα.
    dishwasher_wash_programs:
      name: Προγράμματα πλύσης πλυντηρίου πιάτων
      description: Παραθέτει τους προκαθορισμένους κύκλους πλύσης που διαθέτει το
        πλυντήριο πιάτων, επιτρέποντας στους πελάτες να φιλτράρουν με βάση την ευελιξία
        των προγραμμάτων.
    dispensing_mechanism:
      name: Μηχανισμός διανομής
      description: Περιγράφει τον τρόπο με τον οποίο το ρόφημα διανέμεται από το στόμιο,
        επηρεάζοντας τη χρηστικότητα σε διαφορετικά περιβάλλοντα χρήσης.
    dispensing_temperature_options:
      name: Επιλογές θερμοκρασίας διανομής
      description: Υποδεικνύει τις επιλογές θερμοκρασίας που μπορεί να παρέχει ο ψύκτης
        νερού.
    displayed_character:
      name: Εμφανιζόμενος χαρακτήρας
      description: Προσδιορίζει τον αλφαριθμητικό χαρακτήρα που αναπαρίσταται από
        το μεμονωμένο τεμάχιο.
    diving_board_surface_texture:
      name: Υφή επιφάνειας βατήρα
      description: Περιγράφει την υφή της επάνω επιφάνειας του βατήρα, η οποία επηρεάζει
        την πρόσφυση και την αντιολισθητική ικανότητα.
    door_configuration:
      name: Διάταξη πόρτας
      description: Υποδεικνύει πόσες πόρτες πρόσβασης έχει η παγίδα
    door_hinge_orientation:
      name: Κατεύθυνση μεντεσέ πόρτας
      description: Καθορίζει τη θέση του μεντεσέ ή την κατεύθυνση ανοίγματος της πόρτας
        ή του καπακιού του καταψύκτη.
    door_hinge_position:
      name: Θέση μεντεσέ πόρτας
      description: Καθορίζει την πλευρά της πόρτας στην οποία βρίσκεται ο μεντεσές
        ή αν είναι αναστρέψιμος, επηρεάζοντας την εγκατάσταση και τον σχεδιασμό του
        χώρου.
    draft_gas_type:
      name: Τύπος αερίου παροχής
      description: Καθορίζει τον τύπο συστήματος αερίου που χρησιμοποιείται για την
        παροχή, σημαντικό για την ανθράκωση και το στυλ σερβιρίσματος του ποτού.
    drainage_design:
      name: Σχεδιασμός αποστράγγισης
      description: Αναφέρει πώς η σαπουνοθήκη διαχειρίζεται την απορροή του νερού
        για να διατηρεί το σαπούνι στεγνό.
    drainage_method:
      name: Μέθοδος αποστράγγισης
      description: Περιγράφει πώς απομακρύνεται το συλλεγμένο νερό, υποδεικνύοντας
        αν απαιτείται χειροκίνητο άδειασμα.
    drawer_organizer_features:
      name: Χαρακτηριστικά οργανωτή συρταριού
      description: Αναδεικνύει σημαντικά λειτουργικά χαρακτηριστικά ενός ενθέτου οργανωτή
        συρταριού.
    drinkware_crystal_composition:
      name: Σύνθεση κρυστάλλου σκευών ποτού
      description: Προσδιορίζει τη συγκεκριμένη σύνθεση γυαλιού/κρυστάλλου που χρησιμοποιείται,
        επισημαίνοντας την περιεκτικότητα σε μόλυβδο και τα χαρακτηριστικά διαύγειας.
    drinkware_holder_style:
      name: Τύπος βάσης σκευών ποτού
      description: Κατατάσσει τον γενικό σχεδιασμό ή τη διαμόρφωση της βάσης για σκεύη
        ποτού.
    drinkware_insulation:
      name: Μόνωση σκευών ποτού
      description: Προσδιορίζει τη δομή μόνωσης του σκεύους, επηρεάζοντας τη διατήρηση
        της θερμοκρασίας.
    dripper_design:
      name: Σχεδιασμός ντρίπερ
      description: Καθορίζει το συνολικό σχήμα του ντρίπερ ή το στυλ αποστράγγισης,
        επηρεάζοντας τα χαρακτηριστικά εκχύλισης.
    drum_grating_styles_included:
      name: Τύποι τυμπάνου κοπής που περιλαμβάνονται
      description: Απαριθμεί τους διαφορετικούς τύπους τυμπάνου τριψίματος ή κοπής
        που περιλαμβάνονται στο σετ, ώστε οι χρήστες να βλέπουν γρήγορα τις διαθέσιμες
        λειτουργίες.
    dryer_drum_material:
      name: Υλικό κάδου στεγνωτηρίου
      description: Δηλώνει το υλικό κατασκευής του εσωτερικού κάδου, το οποίο επηρεάζει
        την ανθεκτικότητα, τη συσσώρευση στατικού ηλεκτρισμού και τον θόρυβο.
    dryer_sheet_features:
      name: Χαρακτηριστικά φύλλων στεγνωτηρίου
      description: Αναδεικνύει τα ιδιαίτερα χαρακτηριστικά ή τα πλεονεκτήματα των
        φύλλων στεγνωτηρίου.
    dryer_venting_type:
      name: Τύπος εξαερισμού στεγνωτηρίου
      description: Κατατάσσει τη μέθοδο εξαερισμού που χρησιμοποιεί το στεγνωτήριο,
        η οποία επηρεάζει τις απαιτήσεις εγκατάστασης και την ενεργειακή απόδοση.
    drying_system:
      name: Σύστημα στεγνώματος
      description: Δηλώνει την τεχνολογία που χρησιμοποιεί το πλυντήριο πιάτων για
        το στέγνωμα των σκευών στο τέλος του κύκλου.
    duster_head_material:
      name: Υλικό κεφαλής ξεσκονόπανου
      description: Καθορίζει το υλικό της κεφαλής συλλογής σκόνης, σημαντικό για την
        απόδοση και για ζητήματα αλλεργιών.
    dustpan_type:
      name: Τύπος φαρασιού
      description: Κατατάσσει το συνολικό στυλ ή τη διαμόρφωση του φαρασιού.
    edge_finish:
      name: Φινίρισμα άκρης
      description: Περιγράφει την τεχνική φινιρίσματος που εφαρμόζεται στις άκρες
        του διαδρόμου, επηρεάζοντας την αισθητική και την ανθεκτικότητα.
    egg_cooker_functions:
      name: Λειτουργίες βραστήρα αυγών
      description: Απαριθμεί τα προγράμματα ή τις λειτουργίες μαγειρέματος που υποστηρίζει
        ο βραστήρας αυγών.
    egg_cup_design:
      name: Σχεδιασμός αυγοθήκης
      description: Καθορίζει το δομικό στυλ της αυγοθήκης, όπως με βάση ή με πόδι.
    electric_kettle_features:
      name: Χαρακτηριστικά ηλεκτρικού βραστήρα
      description: Απαριθμεί αξιοσημείωτα χαρακτηριστικά ευκολίας ή ασφάλειας που
        περιλαμβάνονται στον βραστήρα.
    emergency_blanket_features:
      name: Χαρακτηριστικά κουβέρτας έκτακτης ανάγκης
      description: Αναδεικνύει τα ιδιαίτερα λειτουργικά χαρακτηριστικά της κουβέρτας.
    emergency_lighting_operating_mode:
      name: Τρόπος λειτουργίας φωτιστικού έκτακτης ανάγκης
      description: Καθορίζει τη συμπεριφορά του φωτιστικού έκτακτης ανάγκης υπό κανονικές
        συνθήκες ρεύματος και κατά τη διάρκεια διακοπών.
    entrance_slot_design:
      name: Σχεδιασμός ανοίγματος εισόδου
      description: Περιγράφει το στυλ των ανοιγμάτων που επιτρέπουν στις πεταλούδες
        να εισέρχονται στο σπίτι.
    espresso_boiler_type:
      name: Τύπος λέβητα μηχανής εσπρέσο
      description: Περιγράφει τη διαμόρφωση του συστήματος θέρμανσης που χρησιμοποιείται
        για την παραγωγή εκχύλισης και ατμού.
    fabric_care_product_form:
      name: Μορφή προϊόντος φροντίδας υφασμάτων
      description: Καθορίζει τη φυσική μορφή του προϊόντος φροντίδας υφασμάτων, όπως
        μαλακτικό ή πρόσθετο στεγνωτηρίου.
    fabric_softener_features:
      name: Χαρακτηριστικά μαλακτικού υφασμάτων
      description: Αναδεικνύει τα ιδιαίτερα λειτουργικά χαρακτηριστικά ή τα πλεονεκτήματα
        των μαλακτικών ρούχων.
    fabric_stiffness_level:
      name: Επίπεδο σκληρότητας υφάσματος
      description: Δηλώνει τον βαθμό σκληρότητας ή κολλαρίσματος που προσδίδεται στο
        ύφασμα από το άμυλο μετά το σιδέρωμα.
    fabric_weave:
      name: Ύφανση υφάσματος
      description: Καθορίζει τη συγκεκριμένη κατασκευή ύφανσης του υφάσματος, επηρεάζοντας
        την αίσθηση και την εμφάνιση.
    feeder_design:
      name: Σχεδιασμός ταΐστρας
      description: Καθορίζει τον δομικό τύπο της ταΐστρας.
    fermentation_crock_type:
      name: Τύπος δοχείου ζύμωσης (crock)
      description: Προσδιορίζει τον βασικό σχεδιασμό του δοχείου ζύμωσης
    filament_style:
      name: Στυλ νήματος
      description: Προσδιορίζει την εσωτερική διαμόρφωση του νήματος, η οποία επηρεάζει
        την αισθητική και την κατανομή του φωτός.
    film_reusability:
      name: Δυνατότητα επανάχρησης μεμβράνης
      description: Δηλώνει εάν η μεμβράνη έχει σχεδιαστεί για μία μόνο χρήση ή μπορεί
        να αφαιρεθεί, να αποθηκευθεί και να εφαρμοστεί ξανά.
    filter_bleaching_method:
      name: Μέθοδος χλωρίωσης με φίλτρο
      description: Προσδιορίζει την κατάσταση χλωρίωσης και τη διαδικασία που χρησιμοποιείται
        για το φίλτρο, το οποίο επηρεάζει τις προτιμήσεις αναφορικά με τη γεύση και
        τη βιωσιμότητα.
    filter_technology:
      name: Τεχνολογία φίλτρου
      description: Προσδιορίζει την τεχνολογία ελέγχου οσμών ή φιλτραρίσματος που
        χρησιμοποιείται.
    fire_alarm_panel_type:
      name: Τύπος πίνακα συναγερμού πυρκαγιάς
      description: Προσδιορίζει την αρχιτεκτονική συστήματος του πίνακα.
    fire_protection_class:
      name: Κλάση πυροπροστασίας
      description: Υποδεικνύει την κατηγορία πιστοποίησης που ορίζει τη μέγιστη εσωτερική
        θερμοκρασία που επιτρέπεται κατά τη διάρκεια δοκιμών πυρκαγιάς (π.χ., UL Class
        350).
    fire_starter_type:
      name: Τύπος προσανάμματος
      description: Καθορίζει τη βασική μορφή ή τον μηχανισμό του προϊόντος ανάμματος,
        βοηθώντας τους αγοραστές να βρουν ακριβώς τον τύπο ανάφλεξης που χρειάζονται.
    fireplace_fuel_form:
      name: Μορφή καυσίμου τζακιού
      description: Καθορίζει τη φυσική μορφή ή παρουσίαση του καυσίμου, επιτρέποντας
        στους αγοραστές να επιλέξουν μεταξύ κορμών, pellets, μπρικετών, δοχείων γέλης
        και άλλων επιλογών κατάλληλων για τη συσκευή τους.
    fireplace_tool_items_included:
      name: Περιλαμβανόμενα εργαλεία τζακιού
      description: Παραθέτει τα συγκεκριμένα εργαλεία ή αξεσουάρ τζακιού που περιλαμβάνονται
        στο προϊόν, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται και να
        μπορούν να συγκρίνουν εύκολα τα σετ.
    firewood_seasoning:
      name: Κατάσταση ξήρανσης καυσόξυλων
      description: Υποδεικνύει την κατάσταση ξήρανσης των καυσόξυλων, η οποία επηρεάζει
        την υγρασία, την ευκολία ανάφλεξης και την θερμική απόδοση.
    flag_attachment_style:
      name: Τύπος στερέωσης σημαίας
      description: Περιγράφει τον τρόπο με τον οποίο η σημαία ή το ανεμούριο στερεώνεται
        σε ιστό ή σημείο στήριξης.
    flame_adjustment:
      name: Ρύθμιση φλόγας
      description: Υποδεικνύει εάν και με ποιον τρόπο μπορεί να ρυθμιστεί η ένταση
        της φλόγας.
    flask_insulation_type:
      name: Τύπος μόνωσης φιάλης
      description: Υποδεικνύει τη θερμομονωτική κατασκευή της φιάλης, επηρεάζοντας
        τη διατήρηση της θερμοκρασίας.
    flatware_finish:
      name: Φινίρισμα μαχαιροπήρουνων
      description: Περιγράφει την επιφανειακή επεξεργασία ή τη γυαλάδα του τεμαχίου
        μαχαιροπίρουνου, επηρεάζοντας την αισθητική και την ορατότητα των γρατζουνιών.
    floor_protection_transparency_level:
      name: Επίπεδο διαφάνειας προστατευτικού δαπέδου
      description: Υποδεικνύει τον βαθμό διαφάνειας της μεμβράνης ή του διαδρόμου,
        από πλήρως διαφανές έως αδιαφανές.
    floor_scrubber_brush_type:
      name: Τύπος βούρτσας μηχανής καθαρισμού δαπέδου
      description: Καθορίζει τη βασική διαμόρφωση βούρτσας ή δίσκου που χρησιμοποιεί
        η μηχανή καθαρισμού.
    floor_surface_compatibility:
      name: Συμβατότητα με επιφάνειες δαπέδου
      description: Καθορίζει τα υλικά επιφανειών δαπέδου για τα οποία το προστατευτικό
        είναι ασφαλές και σχεδιασμένο να προστατεύει.
    flow_control_type:
      name: Τύπος ελέγχου ροής
      description: Περιγράφει εάν το καρφί ποτίσματος διαθέτει ρυθμιζόμενο μηχανισμό
        για μεταβολή της παροχής νερού.
    flue_outlet_position:
      name: Θέση εξόδου καπναγωγού
      description: Καθορίζει το σημείο από το οποίο ο καπναγωγός εξέρχεται από το
        σώμα της σόμπας, επηρεάζοντας τη διάταξη εγκατάστασης και τη σύνδεση με την
        καμινάδα.
    flue_pipe_connection_type:
      name: Τύπος σύνδεσης σωλήνα καπναγωγού
      description: Περιγράφει τον μηχανισμό σύνδεσης που χρησιμοποιείται για τη σύνδεση
        της προέκτασης με άλλα εξαρτήματα διαχείρισης καυσαερίων.
    fluorescent_tube_output_type:
      name: Τύπος απόδοσης λαμπτήρα φθορισμού
      description: Καθορίζει τον υποτύπο απόδοσης του λαμπτήρα φθορισμού, σημαντικό
        για τη συμβατότητα με το ballast και τη φωτεινότητα.
    fly_swatter_type:
      name: Τύπος μυγοσκοτώστρας
      description: Υποδεικνύει τον τρόπο λειτουργίας ή τον μηχανισμό της μυγοσκοτώστρας.
    foil_duty_rating:
      name: Αξιολόγηση αντοχής αλουμινόχαρτου
      description: Ταξινομεί την αντοχή ή την ποιότητα του αλουμινόχαρτου για την
        προβλεπόμενη χρήση.
    foliage_color:
      name: Χρώμα φυλλώματος
      description: Καθορίζει το κυρίαρχο χρώμα των φύλλων του φυτού, επιτρέποντας
        την επιλογή για διακοσμητικούς λόγους πέρα από το χρώμα λουλουδιών.
    fondue_pot_type:
      name: Τύπος σκεύους φοντύ
      description: Κατατάσσει το στυλ θέρμανσης ή την προβλεπόμενη χρήση του σετ φοντύ.
    fondue_set_pieces_included:
      name: Περιλαμβανόμενα τεμάχια σετ φοντύ
      description: Προσδιορίζει τα εξαρτήματα που περιλαμβάνονται σε ένα σετ φοντύ,
        όπως το σκεύος φοντύ ή τα πιρουνάκια.
    food_carrier_insulation_type:
      name: Τύπος μόνωσης δοχείου μεταφοράς τροφίμων
      description: Προσδιορίζει εάν το προϊόν διαθέτει μόνωση και ποια τεχνολογία
        μόνωσης χρησιμοποιείται.
    food_dehydrator_surface_type:
      name: Τύπος επιφάνειας αφυγραντήρα τροφίμων
      description: Περιγράφει τον τύπο επιφάνειας των φύλλων/δίσκων, επηρεάζοντας
        τη ροή αέρα και την αποκόλληση των τροφίμων.
    food_dehydrator_tray_type:
      name: Τύπος δίσκου αφυγραντήρα τροφίμων
      description: Προσδιορίζει το συγκεκριμένο στυλ ή τον λειτουργικό σχεδιασμό του
        δίσκου.
    food_grater_type:
      name: Τύπος τρίφτη τροφίμων
      description: Προσδιορίζει τον δομικό τύπο του τρίφτη.
    food_processor_attachments_included:
      name: Περιλαμβανόμενα εξαρτήματα πολυκόφτη
      description: Παραθέτει τους συγκεκριμένους τύπους εξαρτημάτων που περιλαμβάνονται
        στο σετ, ώστε οι πελάτες να γνωρίζουν ακριβώς ποιες λειτουργίες αποκτούν με
        την αγορά τους.
    food_storage_bag_features:
      name: Χαρακτηριστικά σακούλας αποθήκευσης τροφίμων
      description: Αναδεικνύει τα αξιοσημείωτα λειτουργικά χαρακτηριστικά της σακούλας.
    food_storage_bag_type:
      name: Τύπος σακούλας αποθήκευσης τροφίμων
      description: Καθορίζει τον βασικό τύπο ή την κατηγορία προβλεπόμενης χρήσης
        της σακούλας αποθήκευσης τροφίμων.
    food_storage_features:
      name: Χαρακτηριστικά αποθήκευσης τροφίμων
      description: Αναδεικνύει ειδικά χαρακτηριστικά που προσθέτουν λειτουργικότητα
        ή ευκολία στο προϊόν αποθήκευσης τροφίμων.
    food_wrap_features:
      name: Χαρακτηριστικά μεμβράνης τροφίμων
      description: Αναδεικνύει ειδικά χαρακτηριστικά που επηρεάζουν τη χρήση και τη
        βιωσιμότητα.
    footwear_type_compatibility:
      name: Συμβατότητα τύπων υποδημάτων
      description: Προσδιορίζει τον τύπο υποδημάτων για τον οποίο προορίζεται το καλούπι.
    formulation_concentration:
      name: Συγκέντρωση σύνθεσης
      description: Προσδιορίζει εάν το προϊόν είναι συμπυκνωμένο ή έτοιμο προς χρήση.
    fountain_design:
      name: Σχεδιασμός σιντριβανιού
      description: Κατατάσσει τον δομικό τύπο ή τη μορφή σχεδιασμού του σιντριβανιού.
    fragrance_oil_application:
      name: Εφαρμογή αρωματικού ελαίου
      description: Καθορίζει τη συνιστώμενη ή συνήθη χρήση του ελαίου, βοηθώντας τους
        πελάτες που ασχολούνται με DIY και χόμπι να επιλέξουν την κατάλληλη σύνθεση.
    fragrance_oil_composition:
      name: Σύνθεση αρωματικού ελαίου
      description: Δηλώνει εάν η σύνθεση αποτελείται αποκλειστικά από φυσικό αιθέριο
        έλαιο, από συνθετικό αρωματικό έλαιο ή από συνδυασμό και των δύο.
    fragrance_refill_type:
      name: Τύπος ανταλλακτικού αρώματος
      description: Καθορίζει τη μορφή των ανταλλακτικών αρώματος που δέχεται ο διαχυτής.
    freezer_configuration:
      name: Διαμόρφωση καταψύκτη
      description: Προσδιορίζει τον φυσικό προσανατολισμό ή το σχεδιαστικό τύπο της
        μονάδας καταψύκτη.
    freezing_method:
      name: Μέθοδος κατάψυξης
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται για την κατάψυξη του
        μείγματος σε παγωτομηχανή, βοηθώντας τους αγοραστές να διακρίνουν μεταξύ μοντέλων
        με συμπιεστή, μονάδων με προ-καταψυχόμενο κάδο, χειροκίνητων τύπων με αλάτι
        και πάγο, καθώς και άλλων σχεδιάσεων.
    fuel_compatibility:
      name: Συμβατότητα καυσίμου
      description: Καθορίζει τους τύπους καυσίμου που έχει σχεδιαστεί να συγκρατεί
        με ασφάλεια η σχάρα.
    funnel_type:
      name: Τύπος χοάνης
      description: Κατατάσσει τη χοάνη βάσει του σχεδιασμού ή της προβλεπόμενης χρήσης
        της.
    furnace_configuration:
      name: Διαμόρφωση φούρνου
      description: Καθορίζει τον φυσικό προσανατολισμό ροής αέρα του περιβλήματος
        του κλιβάνου για την εγκατάσταση.
    furniture_anchor_type:
      name: Τύπος αγκύρωσης επίπλου
      description: Καθορίζει τον δομικό τύπο ενός κιτ αγκύρωσης επίπλου, υποδεικνύοντας
        τον μηχανισμό λειτουργίας του.
    garage_floor_mat_style:
      name: Τύπος τάπητα δαπέδου γκαράζ
      description: Προσδιορίζει τη μορφή ή τον τύπο σχεδιασμού του τάπητα δαπέδου
        γκαράζ.
    garbage_disposal_feed_type:
      name: Τύπος τροφοδοσίας τεμαχιστή απορριμμάτων
      description: Προσδιορίζει τον τρόπο με τον οποίο τα υπολείμματα τροφίμων τροφοδοτούνται
        στον τεμαχιστή απορριμμάτων — είτε συνεχώς κατά τη λειτουργία είτε σε διακριτές
        δόσεις.
    garbage_disposal_stopper_style:
      name: Τύπος πώματος τεμαχιστή απορριμμάτων
      description: Υποδεικνύει τον λειτουργικό τύπο του πώματος.
    garden_hose_design:
      name: Σχεδιασμός λάστιχου ποτίσματος
      description: Προσδιορίζει τον δομικό τύπο του λάστιχου, ο οποίος καθορίζει την
        προβλεπόμενη χρήση και τα χαρακτηριστικά χειρισμού.
    garden_hose_fitting_type:
      name: Τύπος σύνδεσης λάστιχου κήπου
      description: Προσδιορίζει τον τύπο ή τη λειτουργία ενός εξαρτήματος σωλήνα ποτίσματος
        κήπου, όπως αντάπτορας ή διακλαδωτής τύπου Y, για τη διευκόλυνση της αναζήτησης
        και του φιλτραρίσματος.
    gardening_fork_type:
      name: Τύπος πιρούνας κήπου
      description: Κατατάσσει το συγκεκριμένο στυλ ή την προβλεπόμενη χρήση του πιρουνιού.
    garland_style:
      name: Τύπος γιρλάντας
      description: Κατατάσσει τη δομή ή το διακοσμητικό ύφος της γιρλάντας.
    gas_type:
      name: Τύπος αερίου
      description: Προσδιορίζει τον τύπο του συμπιεσμένου αερίου που περιέχεται στη
        φιάλη φόρτισης.
    gasket_profile_type:
      name: Τύπος προφίλ φλάντζας
      description: Καθορίζει το βιομηχανικό πρότυπο προφίλ ή τον τύπο διατομής της
        φλάντζας.
    gazebo_roof_material:
      name: Υλικό οροφής για κιόσκι
      description: Καθορίζει το υλικό των πάνελ οροφής ή της σκληρής επικάλυψης σε
        ένα κιόσκι.
    glass_and_surface_cleaner_features:
      name: Χαρακτηριστικά καθαριστικού για γυάλινες και λοιπές επιφάνειες
      description: Αναδεικνύει τα ιδιαίτερα χαρακτηριστικά ή τα οφέλη του καθαριστικού
        για γυάλινες και λοιπές επιφάνειες.
    glass_cleaner_features:
      name: Χαρακτηριστικά καθαριστικού τζαμιών
      description: Αναδεικνύει ιδιαίτερα χαρακτηριστικά απόδοσης ή σύνθεσης που αφορούν
        ειδικά τα καθαριστικά τζαμιών.
    glazing_material:
      name: Υλικό υαλοκάλυψης
      description: Προσδιορίζει το υλικό που καλύπτει την επιφάνεια της φωτογραφίας
        (π.χ. γυαλί, ακρυλικό ή κανένα).
    globe_map_content:
      name: Περιεχόμενο χάρτη υδρόγειου
      description: Περιγράφει το κύριο χαρτογραφικό περιεχόμενο που εμφανίζεται στην
        υδρόγειο.
    glue_trap_design:
      name: Σχεδιασμός παγίδας με κόλλα
      description: Προσδιορίζει τον τρόπο φυσικής κατασκευής ή τη μορφή της παγίδας,
        βοηθώντας την επιλογή αναφορικά με το σημείο τοποθέτησης και τον τύπο ανεπιθύμητου
        ζώου.
    grab_bar_shape:
      name: Σχήμα χειρολαβής στήριξης
      description: Καθορίζει τον δομικό σχεδιασμό της χειρολαβής στήριξης, επηρεάζοντας
        τη θέση εγκατάστασης και τον τρόπο υποστήριξης του χρήστη.
    grass_discharge_type:
      name: Τύπος εκτόξευσης χόρτου
      description: Καθορίζει τον τρόπο με τον οποίο η χλοοκοπτική μηχανή αποβάλλει
        τα κομμένα χόρτα (π.χ. πλευρική εκτόξευση, συλλογή σε πίσω σάκο).
    grate_design:
      name: Σχεδιασμός σχάρας
      description: Προσδιορίζει τον δομικό τύπο της σχάρας.
    grater_design:
      name: Σχεδιασμός τρίφτη
      description: Κατατάσσει τον φυσικό σχεδιασμό ή τον μηχανισμό ενός τρίφτη ή zester.
    grating_surface_coarseness:
      name: Βαθμός τραχύτητας επιφάνειας τριψίματος
      description: Υποδεικνύει το μέγεθος/την υφή των οπών ή των προεξοχών κοπής στην
        επιφάνεια τριψίματος.
    grill_grate_material:
      name: Υλικό σχάρας ψησταριάς
      description: Καθορίζει το υλικό ή την επίστρωση της κύριας σχάρας ψησίματος.
    grill_thermometer_type:
      name: Τύπος θερμομέτρου ψησταριάς
      description: Υποδεικνύει τον βασικό σχεδιασμό ή την τεχνολογία του θερμομέτρου
        ψησταριάς, βοηθώντας τους αγοραστές να εντοπίσουν γρήγορα τον τύπο που ταιριάζει
        στη διάταξη ψησίματός τους.
    grinding_mechanism_material:
      name: Υλικό μηχανισμού άλεσης
      description: Καθορίζει το υλικό του εσωτερικού μηχανισμού άλεσης/των μαχαιριδίων
        (burrs) που αλέθουν τα μπαχαρικά.
    grinding_mechanism_type:
      name: Τύπος μηχανισμού άλεσης
      description: Καθορίζει τον εσωτερικό μηχανισμό που είναι υπεύθυνος για την άλεση
        ή την κονιορτοποίηση.
    growing_media_buffering:
      name: Ρύθμιση pH υποστρώματος καλλιέργειας
      description: Υποδεικνύει εάν ο κοκοφοίνικας (coir) έχει υποστεί κατεργασία ρύθμισης
        (buffering) για την απομάκρυνση περίσσειας αλάτων, επηρεάζοντας τη διαχείριση
        θρεπτικών στοιχείων.
    growing_media_form:
      name: Μορφή υποστρώματος καλλιέργειας
      description: Καθορίζει τη φυσική μορφή διάθεσης του κοκοφοίνικα (coconut coir),
        βοηθώντας τους καλλιεργητές να κατανοήσουν τις απαιτήσεις χειρισμού και ενυδάτωσης.
    growing_medium_type:
      name: Τύπος υποστρώματος καλλιέργειας
      description: Προσδιορίζει το υπόστρωμα που παρέχεται για τη βλάστηση σπόρων
        και την ανάπτυξη φυτών.
    growth_habit:
      name: Τύπος ανάπτυξης φυτού
      description: Περιγράφει τη συνολική μορφή του φυτού, βοηθώντας τους πελάτες
        στη λήψη αποφάσεων σχετικά με τις αποστάσεις φύτευσης και την επιλογή δοχείου.
    hand_dryer_accessory_type:
      name: Τύπος αξεσουάρ στεγνωτήρα χεριών
      description: Προσδιορίζει το συγκεκριμένο είδος αξεσουάρ στεγνωτήρα χεριών προκειμένου
        οι αγοραστές να κατανοούν άμεσα τι ακριβώς είναι το προϊόν.
    handle_connection_type:
      name: Τύπος σύνδεσης λαβής
      description: Καθορίζει τον μηχανισμό με τον οποίο προσαρμόζεται η λαβή σε σκούπα,
        σφουγγαρίστρα ή άλλες κεφαλές καθαρισμού, διασφαλίζοντας τη συμβατότητα.
    handle_grip_style:
      name: Τύπος λαβής χειρολαβής
      description: Καθορίζει το σχήμα ή την εργονομία της λαβής του πιρουνιού.
    handle_length_adjustability:
      name: Ρύθμιση μήκους λαβής
      description: Περιγράφει εάν και με ποιον τρόπο ρυθμίζεται το μήκος της λαβής,
        επιτρέποντας στους αγοραστές να επιλέγουν μεταξύ σταθερών και τηλεσκοπικών
        επιλογών.
    handle_position:
      name: Θέση λαβής
      description: Περιγράφει τη θέση ή τον τύπο της λαβής στο ποτιστήρι, που επηρεάζει
        την εργονομία κατά το πότισμα και την αποθήκευση.
    handrail_configuration:
      name: Διαμόρφωση χειρολισθήρα
      description: Υποδεικνύει εάν το προϊόν περιλαμβάνει χειρολισθήρες και ποια είναι
        η διάταξή τους.
    hanging_attachment_type:
      name: Τύπος εξαρτήματος ανάρτησης
      description: Καθορίζει το εξάρτημα ή τη μέθοδο που παρέχεται για την ανάρτηση
        του διακοσμητικού ηλιοσυλλέκτη.
    hardiness_zone:
      name: Ζώνη ανθεκτικότητας
      description: Καθορίζει τη ζώνη κλιματικής ανθεκτικότητας USDA (ή αντίστοιχη)
        στην οποία το φυτό μπορεί να επιβιώσει σε εξωτερικό χώρο.
    hazards_detected:
      name: Ανιχνευόμενοι κίνδυνοι
      description: Αναφέρει τους συγκεκριμένους κινδύνους που έχει σχεδιαστεί να ανιχνεύει
        η συσκευή.
    heating_stages:
      name: Στάδια θέρμανσης
      description: Καθορίζει τον αριθμό των σταδίων θέρμανσης ή το επίπεδο διαμόρφωσης
        που υποστηρίζει η μονάδα.
    home_alarm_features:
      name: Χαρακτηριστικά συστήματος συναγερμού κατοικίας
      description: Προσδιορίζει ειδικές λειτουργίες ενός συστήματος συναγερμού κατοικίας,
        όπως εφεδρική τροφοδοσία μπαταρίας ή επαγγελματική παρακολούθηση.
    hook_style:
      name: Τύπος γάντζου
      description: Κατατάσσει τον σχεδιασμό/τη λειτουργία του γάντζου, διευκολύνοντας
        την οπτική και λειτουργική αντιστοίχιση.
    humidifier_features:
      name: Χαρακτηριστικά υγραντήρα
      description: Αναδεικνύει σημαντικές πρόσθετες λειτουργίες ή επιλογές που διαφοροποιούν
        τα μοντέλα υγραντήρα και διευκολύνουν το φιλτράρισμα.
    humidifier_filter_type:
      name: Τύπος φίλτρου υγραντήρα
      description: Προσδιορίζει τον τύπο ή τη δομή του φίλτρου, ώστε οι πελάτες να
        μπορούν να επιλέξουν το σωστό ανταλλακτικό για τον υγραντήρα τους.
    humidor_accessory_type:
      name: Τύπος αξεσουάρ υγραντήρα πούρων
      description: Κατατάσσει το συγκεκριμένο είδος αξεσουάρ, επιτρέποντας στους αγοραστές
        να φιλτράρουν γρήγορα εντός της ευρύτερης κατηγορίας.
    hydroponic_nutrient_system:
      name: Σύστημα υδροπονικών θρεπτικών συστατικών
      description: Υποδεικνύει τον αριθμό των συστατικών του συστήματος υδροπονικών
        θρεπτικών (π.χ. μονοσυστατικό, δισυστατικό) που πρέπει να συνδυαστούν πριν
        από τη χρήση.
    hygrometer_type:
      name: Τύπος υγρόμετρου
      description: Προσδιορίζει τον τύπο υγρομέτρου που περιλαμβάνεται στον υγραντήρα
        πούρων (humidor), εφόσον υπάρχει.
    ice_bucket_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ κάδου πάγου
      description: Αναφέρει τα συμπληρωματικά είδη μπαρ που παρέχονται μαζί με τον
        κάδο πάγου.
    ice_bucket_insulation:
      name: Μόνωση κάδου πάγου
      description: Υποδεικνύει την κατασκευή των τοιχωμάτων ή το επίπεδο μόνωσης του
        κάδου πάγου, που επηρεάζει τη διάρκεια διατήρησης του πάγου.
    ice_cream_maker_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ παγωτομηχανής
      description: Προσδιορίζει τα πρόσθετα είδη που περιλαμβάνονται σε σετ πολλαπλών
        τεμαχίων, ώστε οι πελάτες να γνωρίζουν ακριβώς τι θα παραλάβουν.
    ice_shape:
      name: Σχήμα πάγου
      description: Περιγράφει το σχήμα του πάγου που παράγει η συσκευή, βοηθώντας
        τους χρήστες να επιλέξουν παγομηχανές που δημιουργούν το επιθυμητό είδος πάγου.
    incense_holder_style:
      name: Τύπος βάσης αρωματικών στικ
      description: Προσδιορίζει τον δομικό σχεδιασμό της βάσης, βοηθώντας τους αγοραστές
        να επιλέξουν μεταξύ διαφορετικών λειτουργικών και αισθητικών μορφών.
    infuser_type:
      name: Τύπος εγχυτήρα
      description: Υποδεικνύει εάν περιλαμβάνεται εγχυτήρας φρούτων ή τσαγιού και
        τον τύπο του.
    inner_pot_coating:
      name: Επίστρωση εσωτερικού κάδου
      description: Προσδιορίζει τον τύπο επίστρωσης στην επιφάνεια του εσωτερικού
        κάδου, υποδεικνύοντας αντικολλητικές ιδιότητες και ευκολία καθαρισμού.
    insulation_capability:
      name: Ικανότητα μόνωσης
      description: Υποδεικνύει εάν και με ποιον τρόπο το κάλυμμα μονώνει τα ροφήματα,
        διακρίνοντας τα καθαρά διακοσμητικά καλύμματα από εκείνα που ρυθμίζουν τη
        θερμοκρασία.
    insulation_status:
      name: Κατάσταση μόνωσης
      description: Δηλώνει εάν το παγούρι διαθέτει μόνωση για τη διατήρηση της θερμοκρασίας
        του ροφήματος.
    insulation_technology:
      name: Τεχνολογία μόνωσης
      description: Προσδιορίζει την κατασκευή/τεχνολογία μόνωσης που χρησιμοποιείται
        για τη διατήρηση της θερμοκρασίας.
    insulation_type:
      name: Τύπος μόνωσης
      description: Καθορίζει εάν και με ποιον τρόπο η παγοθήκη ή ο ψύκτης ποτών διαθέτει
        μόνωση, επηρεάζοντας τη διατήρηση του πάγου και τον έλεγχο της συμπύκνωσης.
    intended_beverage_type:
      name: Προοριζόμενος τύπος ροφήματος
      description: Υποδεικνύει το κύριο ρόφημα για το οποίο έχει σχεδιαστεί ή με το
        οποίο χρησιμοποιείται συχνότερα η καράφα.
    internal_membrane_type:
      name: Τύπος εσωτερικής μεμβράνης
      description: Προσδιορίζει τον εσωτερικό σχεδιασμό διαχωρισμού που διατηρεί το
        νερό και τον αέρα χωριστά μέσα στη δεξαμενή.
    iron_cleaner_purpose:
      name: Σκοπός καθαριστικού σίδερου
      description: Καθορίζει την κύρια προοριζόμενη χρήση του καθαριστικού.
    ironing_board_form_factor:
      name: Μορφή/τύπος κατασκευής σιδερώστρας
      description: Κατατάσσει τον συνολικό τύπο ή τρόπο εγκατάστασης της σιδερώστρας,
        βοηθώντας τους αγοραστές να εντοπίσουν τον κατάλληλο τύπο.
    ironing_board_pad_shape:
      name: Σχήμα καλύμματος σιδερώστρας
      description: Υποδεικνύει το συνολικό σχήμα/προφίλ του καλύμματος, ώστε να διασφαλίζεται
        η συμβατότητα με διαφορετικά σχέδια σιδερώστρας.
    jar_shape:
      name: Σχήμα βάζου
      description: Περιγράφει τη συνολική γεωμετρική ή παραδοσιακή μορφή του διακοσμητικού
        βάζου.
    juicer_type:
      name: Τύπος αποχυμωτή
      description: Ταξινομεί τον μηχανισμό που χρησιμοποιεί ο αποχυμωτής για την εξαγωγή
        χυμού.
    key_blade_type:
      name: Τύπος λεπίδας κλειδιού
      description: Κατατάσσει τον φυσικό τύπο λεπίδας του κλειδιού, όπως επίπεδη/οδοντωτή,
        σωληνωτή ή τύπου dimple.
    kitchen_layout:
      name: Διάταξη κουζίνας
      description: Καθορίζει τη συνολική διαμόρφωση της προκατασκευασμένης κουζίνας
        (π.χ. σε έναν τοίχο ή σε σχήμα L), βοηθώντας τους αγοραστές να βρουν συνθέσεις
        που ταιριάζουν στο σχήμα του χώρου και στις προτιμήσεις ροής εργασίας.
    kitchen_linen_items_included:
      name: Περιλαμβανόμενα είδη κουζίνας (υφασμάτινα)
      description: Παραθέτει τα συγκεκριμένα είδη λευκών ειδών κουζίνας που περιλαμβάνονται
        στο σετ, βοηθώντας τους αγοραστές να γνωρίζουν ακριβώς ποια είδη αγοράζουν.
    label_content_type:
      name: Τύπος περιεχομένου ετικέτας
      description: Περιγράφει εάν η επιφάνεια της ετικέτας είναι κενή, προεκτυπωμένη
        με πρότυπα ή διαμορφωμένη με άλλο τρόπο.
    lamp_arm_style:
      name: Τύπος βραχίονα φωτιστικού
      description: Περιγράφει τον σχεδιασμό του βραχίονα/λαιμού του φωτιστικού, ο
        οποίος επηρεάζει τη δυνατότητα ρύθμισης και την τοποθέτηση (π.χ. εύκαμπτος
        βραχίονας τύπου gooseneck έναντι αρθρωτού βραχίονα).
    lamp_post_base_mounting_type:
      name: Τύπος στερέωσης βάσης ιστού φωτιστικού
      description: Καθορίζει τον τρόπο εγκατάστασης ή στερέωσης της βάσης στο έδαφος
        ή σε επιφάνεια.
    lamp_shade_fitter_type:
      name: Τύπος σύνδεσης καπέλου φωτιστικού
      description: Καθορίζει τον μηχανισμό σύνδεσης μεταξύ καπέλου και φωτιστικού,
        διασφαλίζοντας τη συμβατότητα χωρίς αβεβαιότητα.
    lamp_shade_shape:
      name: Σχήμα καπέλου φωτιστικού
      description: Καθορίζει το γεωμετρικό σχήμα του καπέλου, επιτρέποντας στους καταναλωτές
        να εντοπίζουν γρήγορα το επιθυμητό περίγραμμα/στυλ.
    lamp_shade_translucency:
      name: Διαπερατότητα φωτός καπέλου φωτιστικού
      description: Περιγράφει το πόσο φως διαπερνά το καπέλο, βοηθώντας τους χρήστες
        να επιλέξουν την επιθυμητή ατμόσφαιρα.
    lampshade_shape:
      name: Σχήμα καπέλου φωτιστικού
      description: Περιγράφει το γεωμετρικό σχήμα ή η μορφή του καπέλου φωτιστικού.
    laundry_ball_texture:
      name: Υφή μπάλας πλυντηρίου
      description: Περιγράφει το στυλ της επιφάνειας της μπάλας, το οποίο επηρεάζει
        την κίνηση του υφάσματος και την αποκόλληση του χνουδιού.
    laundry_wash_accessory_type:
      name: Τύπος αξεσουάρ πλυσίματος ρούχων
      description: Προσδιορίζει τον συγκεκριμένο τύπο σακούλας ή πλαισίου πλυσίματος
        ρούχων.
    lawn_aerator_type:
      name: Τύπος αεριστήρα γκαζόν
      description: Κατατάσσει τους αεριστήρες γκαζόν με βάση τον βασικό σχεδιασμό
        λειτουργίας ή τη μορφή κατασκευής τους.
    lawn_mower_belt_type:
      name: Τύπος ιμάντα χλοοκοπτικού
      description: Κατατάσσει τον δομικό σχεδιασμό ή το προφίλ του ιμάντα.
    lawn_mower_blade_type:
      name: Τύπος λεπίδας χλοοκοπτικού
      description: Καθορίζει τον σχεδιασμό κοπής ή ανύψωσης της λεπίδας του χλοοκοπτικού
        και την προβλεπόμενη χρήση της.
    lawn_spreader_type:
      name: Τύπος διασκορπιστή γκαζόν
      description: Καθορίζει τον μηχανικό τύπο ή τη διαμόρφωση του διασκορπιστή γκαζόν/κήπου,
        όπως τύπου διασποράς (broadcast) ή πτώσης (drop).
    lawn_tractor_tread_type:
      name: Τύπος πέλματος ελαστικού τρακτέρ γκαζόν
      description: Περιγράφει το μοτίβο πέλματος που προορίζεται για συγκεκριμένες
        επιφάνειες ή απαιτήσεις πρόσφυσης.
    lid_features:
      name: Χαρακτηριστικά καπακιού
      description: Αναδεικνύει τυχόν ειδικά λειτουργικά στοιχεία του καπακιού που
        διευκολύνουν το μαγείρεμα ή τον καθαρισμό.
    lid_vent_type:
      name: Τύπος εξαερισμού καπακιού
      description: Δηλώνει εάν και με ποιον τρόπο το καπάκι επιτρέπει τη διαφυγή ατμού.
    lift_mechanism:
      name: Μηχανισμός ανύψωσης
      description: Καθορίζει τον μηχανισμό λειτουργίας που χρησιμοποιείται για την
        ανύψωση, το κατέβασμα ή την κλίση της περσίδας ή του σκίαστρου.
    light_exposure_requirement:
      name: Απαίτηση έκθεσης στο φως
      description: Καθορίζει το επίπεδο φωτισμού που χρειάζεται η οικοσφαίρα ώστε
        να παραμένει υγιής χωρίς να υπερθερμαίνεται ή να καταπονεί τους οργανισμούς.
    liner_installation_method:
      name: Μέθοδος εγκατάστασης επένδυσης
      description: Περιγράφει πώς η επένδυση παραμένει σταθερή στην επιφάνεια.
    lint_roller_type:
      name: Τύπος ρολού χνουδιών
      description: Κατατάσσει τον μηχανισμό καθαρισμού ή τον σχεδιασμό του ρολού χνουδιών.
    live_trap_design:
      name: Σχεδιασμός παγίδας σύλληψης ζωντανών ζώων
      description: Ταξινομεί το συνολικό δομικό στυλ της παγίδας
    lock_keying_option:
      name: Επιλογή κλειδώματος (keying)
      description: Καθορίζει τον τύπο κλειδώματος (keying), διευκολύνοντας αγοραστές
        που χρειάζονται πολλαπλές κλειδαριές με κοινό κλειδί ή ξεχωριστό κλειδί για
        κάθε κλειδαριά.
    lubricant_requirement:
      name: Απαίτηση λιπαντικού
      description: Καθορίζει τον τύπο λιπαντικού που συνιστάται ή απαιτείται κατά
        το ακόνισμα.
    lunch_set_items_included:
      name: Περιλαμβανόμενα είδη σετ φαγητού
      description: Απαριθμεί τα επιμέρους εξαρτήματα που περιλαμβάνονται στο σετ δοχείου
        φαγητού.
    machete_blade_style:
      name: Στυλ λεπίδας μασέτας
      description: Καθορίζει το παραδοσιακό, περιφερειακό ή λειτουργικό στυλ της λεπίδας
        της μασέτας.
    map_style:
      name: Στυλ χάρτη
      description: Καθορίζει το χαρτογραφικό στυλ ή τη θεματική εστίαση που απεικονίζεται
        στην υδρόγειο σφαίρα.
    masher_head_design:
      name: Σχεδιασμός κεφαλής πρέσας (πουρέ)
      description: Κατατάσσει τον σχεδιασμό της επιφάνειας πολτοποίησης, ο οποίος
        επηρεάζει την υφή και την απαιτούμενη προσπάθεια.
    mattress_protector_features:
      name: Χαρακτηριστικά προστατευτικού στρώματος
      description: Αναδεικνύει λειτουργικά ή προστατευτικά χαρακτηριστικά ειδικά για
        προστατευτικά στρώματος, επιτρέποντας στους αγοραστές να φιλτράρουν βάσει
        ιδιοτήτων όπως η αδιαβροχοποίηση ή τα υποαλλεργικά υλικά.
    measuring_spoon_features:
      name: Χαρακτηριστικά δοσομετρικού κουταλιού
      description: Αναδεικνύει ιδιαίτερα σχεδιαστικά ή λειτουργικά χαρακτηριστικά
        σχετικά με τα δοσομετρικά κουτάλια.
    meat_tenderizer_face_type:
      name: Τύπος επιφάνειας σφυριού κρέατος
      description: Περιγράφει την υφή της επιφάνειας εργασίας της κεφαλής του σφυριού
        κρέατος.
    meat_tenderizer_mechanism:
      name: Μηχανισμός σφυριού κρέατος
      description: Κατατάσσει τον κύριο μηχανισμό λειτουργίας του σφυριού κρέατος.
    medical_specialty:
      name: Ιατρική ειδικότητα
      description: Καθορίζει την ιατρική ειδικότητα ή τον κλάδο υγειονομικής περίθαλψης
        για τον οποίο έχει σχεδιαστεί ο εξοπλισμός
    merv_rating:
      name: Βαθμολογία MERV
      description: Καθορίζει την τιμή Minimum Efficiency Reporting Value (MERV), η
        οποία υποδεικνύει την ικανότητα του φίλτρου να συγκρατεί σωματίδια διαφόρων
        μεγεθών.
    microwave_compatibility:
      name: Συμβατότητα με φούρνο μικροκυμάτων
      description: Καθορίζει εάν το προϊόν μπορεί να χρησιμοποιηθεί με ασφάλεια σε
        φούρνο μικροκυμάτων.
    microwave_oven_functions:
      name: Λειτουργίες φούρνου μικροκυμάτων
      description: Απαριθμεί τις προρυθμισμένες ή προηγμένες λειτουργίες μαγειρέματος
        που διατίθενται, επιτρέποντας στους πελάτες να εντοπίζουν μοντέλα με αερόθερμο,
        γκριλ, αισθητήρα μαγειρέματος κ.λπ.
    milk_frother_type:
      name: Μέθοδος αφροποίησης γάλακτος
      description: Καθορίζει την τεχνολογία ή τον μηχανισμό που χρησιμοποιείται για
        την αφροποίηση γάλακτος.
    milk_frothing_method:
      name: Μέθοδος παρασκευής αφρού γάλακτος
      description: Καθορίζει την τεχνολογία ή τον μηχανισμό που χρησιμοποιείται για
        την παρασκευή αφρού γάλακτος.
    milk_frothing_system:
      name: Σύστημα αφρού γάλακτος
      description: Καθορίζει τον τύπο του μηχανισμού αφρού γάλακτος ή ατμού που παρέχεται
        από τη μηχανή.
    mirror_curvature:
      name: Καμπυλότητα καθρέφτη
      description: Καθορίζει την καμπυλότητα της ανακλαστικής επιφάνειας, επηρεάζοντας
        τη γωνία θέασης και την παραμόρφωση.
    mirror_type:
      name: Τύπος καθρέφτη
      description: Κατατάσσει το γενικό στυλ ή τη λειτουργική κατηγορία του καθρέφτη.
    mist_output_mode:
      name: Λειτουργία εξόδου ομίχλης
      description: Υποδεικνύει τα επιλέξιμα μοτίβα ομίχλης ή τις ρυθμίσεις έντασης
        που διατίθενται στον διαχυτήρα.
    mixing_bowl_features:
      name: Χαρακτηριστικά μπολ ανάμειξης
      description: Αναδεικνύει ειδικά λειτουργικά χαρακτηριστικά του μπολ που επηρεάζουν
        τη χρηστικότητα και τη συντήρηση.
    mixing_mechanism:
      name: Μηχανισμός ανάδευσης
      description: Περιγράφει τον εσωτερικό μηχανισμό που χρησιμοποιείται για την
        ανάμειξη των υλικών του ντρέσινγκ.
    mochi_maker_functions:
      name: Λειτουργίες παρασκευαστή mochi
      description: Παραθέτει τα ενσωματωμένα προγράμματα ή τις λειτουργίες που υποστηρίζει
        η συσκευή.
    mode_of_action:
      name: Τρόπος δράσης
      description: Υποδεικνύει τον τρόπο με τον οποίο δρα το μυκητοκτόνο, διακρίνοντας
        τα προστατευτικά επαφής από τα διασυστηματικά ή διαλαμινικά προϊόντα.
    moisture_absorber_form:
      name: Μορφή απορροφητή υγρασίας
      description: Περιγράφει τη φυσική μορφή του προϊόντος, επιτρέποντας στους αγοραστές
        να επιλέγουν κρεμαστές σακούλες, δοχεία, φακέλους κ.λπ.
    money_retrieval_method:
      name: Μέθοδος ανάκτησης χρημάτων
      description: Περιγράφει τον τρόπο με τον οποίο αφαιρούνται τα αποταμιευμένα
        χρήματα από τον κουμπαρά.
    mop_head_type:
      name: Τύπος κεφαλής σφουγγαρίστρας
      description: Αναφέρει τον δομικό σχεδιασμό της κεφαλής σφουγγαρίστρας ή του
        ανταλλακτικού, επιτρέποντας στους αγοραστές να βρουν το κατάλληλο στυλ για
        τις ανάγκες καθαρισμού τους.
    mop_wringing_mechanism:
      name: Μηχανισμός στύψιμου σφουγγαρίστρας
      description: Υποδεικνύει τον τρόπο με τον οποίο απομακρύνεται το πλεονάζον υγρό
        από τη σφουγγαρίστρα, βοηθώντας τους αγοραστές να επιλέξουν τον προτιμώμενο
        τρόπο στυψίματος.
    mounting_bolt_pattern:
      name: Διάταξη μπουλονιών στερέωσης
      description: Καθορίζει τον αριθμό και τη διάταξη των οπών μπουλονιών στερέωσης
        στο περίβλημα της ατράκτου (π.χ. τριγωνική διάταξη 3 μπουλονιών, τετράγωνη
        διάταξη 4 μπουλονιών).
    mouthpiece_shape:
      name: Σχήμα επιστομίου
      description: Καθορίζει το σχήμα του άκρου του επιστομίου της πίπας τσιγάρου.
    mower_deck_material:
      name: Υλικό καταστρώματος χλοοκοπτικού
      description: Υποδεικνύει το υλικό κατασκευής του καταστρώματος του χλοοκοπτικού,
        το οποίο επηρεάζει την ανθεκτικότητα και το βάρος.
    mulch_form:
      name: Μορφή εδαφοκάλυψης
      description: Περιγράφει τη φυσική μορφή ή τη σύσταση του υλικού εδαφοκάλυψης.
    nap_mat_items_included:
      name: Περιλαμβανόμενα είδη στο στρωματάκι ύπνου
      description: Παραθέτει τα συγκεκριμένα εξαρτήματα ή αξεσουάρ που περιλαμβάνονται
        στο στρωματάκι ύπνου.
    napkin_edge_finish:
      name: Φινίρισμα άκρης πετσέτας
      description: Καθορίζει τη ραφή ή το διακοσμητικό φινίρισμα κατά μήκος της άκρης
        ή του στριφώματος της πετσέτας.
    noodle_core_design:
      name: Σχεδιασμός πυρήνα σωλήνα αφρού
      description: Περιγράφει εάν ο σωλήνας αφρού διαθέτει συμπαγή ή κοίλο πυρήνα.
    nozzle_adjustability:
      name: Ρυθμιζόμενη λειτουργία ακροφυσίου
      description: Υποδεικνύει εάν το ακροφύσιο μπορεί να ρυθμιστεί για αλλαγή του
        μοτίβου ψεκασμού ή της παροχής ροής.
    nozzle_material:
      name: Υλικό ακροφυσίου
      description: Καθορίζει το υλικό των ακροφυσίων ψεκασμού, λαμβάνοντας υπόψη την
        ανθεκτικότητα και την αντοχή στο φράξιμο.
    nozzle_style:
      name: Στυλ ακροφυσίου
      description: Καθορίζει το λειτουργικό σχήμα ή στυλ του ακρουφυσίου του σωλήνα.
    nozzle_types_included:
      name: Τύποι ακροφυσίων που περιλαμβάνονται
      description: Παραθέτει τα σχήματα/τους τύπους ακροφυσίων που παρέχονται με το
        πιστόλι παρασκευής jerky, βοηθώντας τους αγοραστές να γνωρίζουν ποιες μορφές
        προϊόντος μπορούν να δημιουργήσουν.
    number_of_compartments:
      name: Αριθμός διαμερισμάτων
      description: Υποδεικνύει πόσα ξεχωριστά διαμερίσματα διαθέτει ο κάδος απορριμμάτων
        για τη διαλογή αποβλήτων ή ανακυκλώσιμων υλικών.
    numeral_style:
      name: Στυλ αριθμών
      description: Καθορίζει το οπτικό στυλ ή την παρουσία αριθμών στο καντράν του
        ρολογιού.
    oil_dispenser_spout_design:
      name: Σχεδιασμός ρύγχους διανεμητή λαδιού
      description: Περιγράφει το στυλ του ρύγχους ή του ακροφυσίου, το οποίο επηρεάζει
        τον έλεγχο ροής και την αποφυγή σταξίματος.
    organizer_application:
      name: Χρήση οργανωτή
      description: Καθορίζει τον βασικό τύπο αντικειμένων που έχει σχεδιαστεί να αποθηκεύει
        το ένθετο.
    ornament_hook_style:
      name: Στυλ γάντζου στολιδιού
      description: Προσδιορίζει το στυλ ή το σχήμα του γάντζου στολιδιού που χρησιμοποιείται
        για την ανάρτηση διακοσμητικών.
    oscillation_mode:
      name: Λειτουργία ταλάντωσης
      description: Περιγράφει εάν και με ποιον τρόπο ο ανεμιστήρας ταλαντώνεται για
        την κατανομή του αέρα.
    oscillation_type:
      name: Τύπος ταλάντωσης
      description: Καθορίζει εάν και πώς ο ανεμιστήρας ταλαντώνεται, βοηθώντας τους
        αγοραστές που χρειάζονται ευρεία κυκλοφορία αέρα.
    outdoor_grill_rack_type:
      name: Τύπος σχάρας εξωτερικής ψησταριάς
      description: Καθορίζει το λειτουργικό στυλ της σχάρας, διευκρινίζοντας την προβλεπόμενη
        χρήση της στο ψήσιμο.
    oxygen_indicator_type:
      name: Τύπος δείκτη οξυγόνου
      description: Καθορίζει αν περιλαμβάνεται οπτικός δείκτης που δείχνει αν το φακελάκι
        απορροφητικού παραμένει ενεργό και ποια μορφή έχει.
    pad_cleaning_action:
      name: Δράση καθαρισμού πανιού
      description: Περιγράφει τη βασική λειτουργία καθαρισμού του πανιού ή το τελικό
        αποτέλεσμα.
    pan_bottom_type:
      name: Τύπος βάσης ταψιού
      description: Υποδεικνύει αν το ταψί διαθέτει αποσπώμενη βάση ή συμπαγή, σταθερή
        βάση.
    pan_perforation_type:
      name: Τύπος διάτρησης ταψιού
      description: Υποδεικνύει αν ο πάτος/τα τοιχώματα του ταψιού είναι συμπαγή ή
        διάτρητα ώστε να επιτρέπεται η αποστράγγιση υγρών.
    parasol_opening_mechanism:
      name: Μηχανισμός ανοίγματος ομπρέλας
      description: Περιγράφει τον τρόπο με τον οποίο ανοίγει/κλείνει το πανί της ομπρέλας.
    parchment_paper_coating:
      name: Επίστρωση λαδόκολλας
      description: Προσδιορίζει την επιφανειακή επεξεργασία που εφαρμόζεται στη λαδόκολλα
        για την παροχή αντικολλητικών ιδιοτήτων.
    particle_size_grade:
      name: Κατηγορία μεγέθους κόκκων
      description: Περιγράφει την κατηγοριοποίηση μεγέθους κόκκων του βερμικουλίτη,
        επηρεάζοντας τον αερισμό και την ικανότητα συγκράτησης νερού.
    patio_heater_safety_features:
      name: Χαρακτηριστικά ασφαλείας θερμάστρας εξωτερικού χώρου
      description: Αναδεικνύει τους ενσωματωμένους μηχανισμούς ασφαλείας που έχουν
        σχεδιαστεί για την αποτροπή ατυχημάτων και τη διασφάλιση ασφαλούς λειτουργίας.
    pattern_match_type:
      name: Τύπος ευθυγράμμισης σχεδίου
      description: Καθορίζει τον τρόπο με τον οποίο πρέπει να ευθυγραμμίζεται το σχέδιο
        μεταξύ των λωρίδων κατά την εγκατάσταση.
    pendulum_compatibility:
      name: Συμβατότητα με εκκρεμές
      description: Υποδεικνύει εάν η κίνηση μπορεί να κινήσει ένα εκκρεμές και εάν
        περιλαμβάνεται ένα εκκρεμές.
    perch_design:
      name: Σχεδιασμός κούρνιας
      description: Περιγράφει το δομικό στυλ ή τη μορφή της κούρνιας.
    perch_surface_texture:
      name: Υφή επιφάνειας κούρνιας
      description: Καθορίζει την αίσθηση/φινίρισμα της επιφάνειας της κούρνιας, που
        επηρεάζει το κράτημα και τη φθορά των νυχιών.
    pet_safety:
      name: Ασφάλεια κατοικίδιων ζώων
      description: Υποδεικνύει αν το φυτό είναι τοξικό ή μη τοξικό για κοινά οικιακά
        κατοικίδια.
    pet_toxicity:
      name: Τοξικότητα για κατοικίδια
      description: Δηλώνει αν το φυτό είναι τοξικό για κοινά οικιακά κατοικίδια, διασφαλίζοντας
        την ασφάλεια των πελατών που έχουν κατοικίδια.
    ph_adjustment_direction:
      name: Κατεύθυνση ρύθμισης pH
      description: Υποδεικνύει αν το προϊόν έχει σχεδιαστεί για να αυξάνει (pH Up)
        ή να μειώνει (pH Down) το επίπεδο pH του διαλύματος.
    pie_pan_edge_style:
      name: Στυλ χείλους ταψιού πίτας
      description: Περιγράφει τον σχεδιασμό του χείλους, επηρεάζοντας την εμφάνιση
        της ζύμης και την ευκολία ξεφορμαρίσματος.
    pin_shape:
      name: Σχήμα καρφίτσας
      description: Περιγράφει τη συνολική μορφή της καρφίτσας που στερεώνει το ύφασμα.
    pipe_connection_method:
      name: Μέθοδος σύνδεσης σωλήνα
      description: Καθορίζει το είδος των συνδέσεων στα άκρα της καμπύλης του σωλήνα
        (π.χ. αρσενικό, θηλυκό, push fit, με σπείρωμα) ώστε να διασφαλίζεται η συμβατότητα
        εγκατάστασης.
    piping_tip_shape:
      name: Σχήμα μύτης κορνέ
      description: Καθορίζει το σχήμα ή τον σχεδιασμό της μύτης κορνέ/διακόσμησης.
    pitcher_spout_style:
      name: Στυλ στομίου κανάτας
      description: Καθορίζει τον σχεδιασμό του στομίου, ο οποίος επηρεάζει την ακρίβεια
        στο latte art και τον έλεγχο της ροής κατά το σερβίρισμα.
    pizza_cutter_design:
      name: Σχεδιασμός κόφτη πίτσας
      description: Προσδιορίζει το δομικό στυλ του κόφτη πίτσας, βοηθώντας τους πελάτες
        να επιλέξουν μεταξύ διαφορετικών μηχανισμών κοπής.
    pizza_pan_style:
      name: Στυλ ταψιού πίτσας
      description: Προσδιορίζει το στυλ κατασκευής/σχεδιασμού του ταψιού πίτσας, υποδεικνύοντας
        πώς ψήνει τη ζύμη και για ποιο είδος πίτσας προορίζεται.
    plant_care_difficulty:
      name: Βαθμός δυσκολίας φροντίδας φυτού
      description: Υποδεικνύει το επίπεδο φροντίδας που απαιτείται για τη διατήρηση
        του φυτού, βοηθώντας αρχάριους και έμπειρους χρήστες να επιλέξουν κατάλληλα.
    plant_container_type:
      name: Τύπος δοχείου φυτού
      description: Προσδιορίζει τον τύπο δοχείου που περιλαμβάνεται με τον τεχνητό
        θάμνο, εφόσον υπάρχει.
    plant_life_cycle:
      name: Κύκλος ζωής φυτού
      description: Υποδεικνύει εάν το φυτό είναι ετήσιο, διετές ή πολυετές.
    planter_material:
      name: Υλικό ζαρντινιέρας
      description: Υποδεικνύει το υλικό της παρεχόμενης γλάστρας/ζαρντινιέρας, εφόσον
        περιλαμβάνεται.
    plate_coupling_pattern:
      name: Μοτίβο σύζευξης πιάτου
      description: Καθορίζει τη διαμόρφωση του κεντρικού συνδέσμου στην κάτω πλευρά
        του πιάτου που εφαρμόζει στον σύνδεσμο του μοτέρ του φούρνου μικροκυμάτων,
        διασφαλίζοντας τη σωστή περιστροφή.
    plate_purpose:
      name: Χρήση πλάκας
      description: Καθορίζει τον λειτουργικό ρόλο της πλάκας στο σύστημα του χλοοκοπτικού.
    plate_style:
      name: Στυλ πιάτου
      description: Προσδιορίζει το συγκεκριμένο στυλ ή την προβλεπόμενη χρήση του
        πιάτου σερβιρίσματος.
    pole_construction_type:
      name: Τύπος κατασκευής κονταριού
      description: Καθορίζει το δομικό στυλ του στύλου, επηρεάζοντας τη συναρμολόγηση
        και τη φορητότητα.
    pool_chemical_type:
      name: Τύπος χημικού πισίνας
      description: Κατηγοριοποιεί την κύρια λειτουργία ή τη χημική σύσταση του προϊόντος
        επεξεργασίας πισίνας.
    pool_filter_type:
      name: Τύπος φίλτρου πισίνας
      description: Προσδιορίζει την τεχνολογία φιλτραρίσματος ή τον τύπο κατασκευής
        που χρησιμοποιείται από το φίλτρο πισίνας ή σπα.
    pool_game_type:
      name: Τύπος παιχνιδιού πισίνας
      description: Προσδιορίζει το συγκεκριμένο είδος παιχνιδιού ή αθλήματος που επιτρέπει
        το προϊόν μέσα στην πισίνα.
    pool_ladder_design:
      name: Σχεδιασμός σκάλας πισίνας
      description: Κατατάσσει τη συνολική δομική σχεδίαση της σκάλας πισίνας.
    pool_liner_installation_style:
      name: Τύπος εγκατάστασης επένδυσης πισίνας
      description: Προσδιορίζει τη μέθοδο στερέωσης που χρησιμοποιείται για την τοποθέτηση
        της επένδυσης στο τοίχωμα της πισίνας.
    pool_lounge_style:
      name: Στυλ ξαπλώστρας πισίνας
      description: Κατατάσσει το δομικό στυλ της ξαπλώστρας πισίνας για οπτικό ή λειτουργικό
        φιλτράρισμα.
    pool_lounger_features:
      name: Χαρακτηριστικά ξαπλώστρας πισίνας
      description: Αναδεικνύει ειδικά ενσωματωμένα χαρακτηριστικά που προσθέτουν λειτουργικότητα
        ή άνεση στη ξαπλώστρα.
    pool_skimmer_type:
      name: Τύπος skimmer πισίνας
      description: Κατατάσσει τον σχεδιασμό του skimmer, βοηθώντας τους αγοραστές
        να συγκρίνουν απόχες χειρός με αυτόματα ή πλωτά skimmer.
    pool_toy_features:
      name: Χαρακτηριστικά παιχνιδιών πισίνας
      description: Αναδεικνύει αξιοσημείωτα λειτουργικά ή σχεδιαστικά χαρακτηριστικά
        ειδικά για παιχνίδια πισίνας.
    pool_type:
      name: Τύπος πισίνας
      description: Ταξινομεί το δομικό στυλ της πισίνας.
    pool_vacuum_type:
      name: Τύπος καθαριστή πισίνας
      description: Υποδεικνύει τον τρόπο λειτουργίας ή τον μηχανισμό κίνησης του καθαριστή
        πισίνας.
    popcorn_kernel_variety:
      name: Ποικιλία κόκκου ποπ κορν
      description: Καθορίζει τη φυσική ποικιλία ή το σχήμα του κόκκου ποπ κορν.
    portafilter_type:
      name: Τύπος portafilter
      description: Προσδιορίζει τον δομικό τύπο του portafilter, επηρεάζοντας τη μέθοδο
        εκχύλισης και τη ροή εργασίας.
    post_installation_method:
      name: Μέθοδος εγκατάστασης στύλου
      description: Καθορίζει πώς εγκαθίσταται ή στερεώνεται ο στύλος του γραμματοκιβωτίου
        στη θέση του.
    pour_spout_design:
      name: Σχεδιασμός στομίου ροής
      description: Καθορίζει ειδικά χαρακτηριστικά ή το στυλ του στομίου ροής που
        επηρεάζουν τον έλεγχο της ροής.
    pour_spout_style:
      name: Στυλ στομίου ροής
      description: Περιγράφει τον σχεδιασμό του στομίου ροής του διανομέα, ο οποίος
        επηρεάζει τον έλεγχο ροής και την αντοχή στο στάξιμο.
    power_equipment_hitch_type:
      name: Τύπος σύνδεσης εξοπλισμού ισχύος
      description: Προσδιορίζει τη διεπαφή σύνδεσης που χρησιμοποιεί το εξάρτημα για
        την τοποθέτηση σε τρακτέρ ή μονάδες ισχύος.
    predator_guard_style:
      name: Τύπος προστατευτικού από θηρευτές
      description: Κατηγοριοποιεί τον δομικό σχεδιασμό του προστατευτικού, βοηθώντας
        τους αγοραστές να εντοπίσουν γρήγορα λύσεις τύπου κώνου, δίσκου, κλωβού ή
        διάτρητης πλάκας.
    preferred_soil_type:
      name: Προτιμώμενος τύπος εδάφους
      description: Υποδεικνύει τη σύνθεση του εδάφους στο οποίο ευδοκιμεί το φυτό.
    preparation_type:
      name: Τύπος παρασκευής
      description: Περιγράφει τη μέθοδο που απαιτείται για να καταστεί το τρόφιμο
        έτοιμο προς κατανάλωση.
    preservation_method:
      name: Μέθοδος συντήρησης
      description: Περιγράφει την τεχνική που χρησιμοποιείται για την αποξήρανση ή
        τη διατήρηση των λουλουδιών.
    pressure_cooker_handle_type:
      name: Τύπος λαβής χύτρας ταχύτητας
      description: Υποδεικνύει το στυλ ή τη θέση της λαβής της χύτρας ταχύτητας που
        αντικαθίσταται.
    pressure_cooker_safety_features:
      name: Χαρακτηριστικά ασφαλείας χύτρας ταχύτητας
      description: Απαριθμεί τα ενσωματωμένα συστήματα ασφαλείας που αποτρέπουν ατυχήματα,
        όπως καπάκια με μηχανισμό κλειδώματος ή βαλβίδες εκτόνωσης πίεσης.
    pressure_settings:
      name: Ρυθμίσεις πίεσης
      description: Καθορίζει πόσα διακριτά επίπεδα πίεσης προσφέρει η χύτρα ταχύτητας
        στον χρήστη.
    pressure_washer_outlet_connector_type:
      name: Τύπος συνδέσμου εξόδου πλυστικού υψηλής πίεσης
      description: Προσδιορίζει τις προδιαγραφές του συνδέσμου στο μπροστινό μέρος
        της πιστολοειδούς λαβής, που χρησιμοποιείται για τη σύνδεση λόγχης ή ακροφυσίων.
    pressure_washer_spray_pattern:
      name: Μοτίβο ψεκασμού πλυστικού υψηλής πίεσης
      description: Καθορίζει τη γωνία ή το μοτίβο ψεκασμού που παράγεται από το ακροφύσιο
        του πλυστικού υψηλής πίεσης.
    print_edition_type:
      name: Τύπος έντυπης έκδοσης
      description: Κατηγοριοποιεί τον τύπο έκδοσης του εντύπου, αποδίδοντας τη σπανιότητα
        και την αξία του.
    printed_sides:
      name: Εκτυπωμένες πλευρές
      description: Υποδεικνύει εάν το προϊόν είναι εκτυπωμένο στη μία πλευρά ή και
        στις δύο πλευρές.
    procedure:
      name: Διαδικασία
      description: Καθορίζει τον τύπο ιατρικής διαδικασίας ή εκπαίδευσης για τον οποίο
        έχει σχεδιαστεί ο εξοπλισμός
    protected_item_type:
      name: Τύπος προστατευόμενου αντικειμένου
      description: Καθορίζει τον τύπο εγγράφου ή αντικειμένου που έχει σχεδιαστεί
        να προστατεύει η θήκη RFID.
    pulley_groove_profile:
      name: Προφίλ αυλάκωσης τροχαλίας
      description: Καθορίζει το προφίλ διεπαφής με τον ιμάντα της ελεύθερης τροχαλίας
        (idler).
    pulp_ejection_type:
      name: Τύπος αποβολής πολτού
      description: Υποδεικνύει πώς αποβάλλεται ο πολτός από τη συσκευή.
    pump_type:
      name: Τύπος αντλίας
      description: Καθορίζει τον σχεδιασμό του μηχανισμού αντλίας του πλυστικού υψηλής
        πίεσης.
    punch_bowl_components_included:
      name: Περιλαμβανόμενα εξαρτήματα μπολ παντς
      description: Περιγράφει τη μέθοδο εσωτερικής ραφής ή διαχωριστικών θαλάμων που
        χρησιμοποιείται σε ένα πάπλωμα, επηρεάζοντας την κατανομή της θερμότητας και
        την ανθεκτικότητα.
    quilt_construction_type:
      name: Τύπος κατασκευής παπλώματος
      description: Περιγράφει τη μέθοδο εσωτερικής ραφής ή διαφράγματος που χρησιμοποιείται
        σε ένα πάπλωμα, η οποία επηρεάζει τη ζεστασιά και την ανθεκτικότητα.
    radiator_design_type:
      name: Τύπος σχεδιασμού καλοριφέρ
      description: Προσδιορίζει τον δομικό τύπο του καλοριφέρ.
    rain_barrel_design:
      name: Σχεδιασμός βαρελιού συλλογής βρόχινου νερού
      description: Κατατάσσει τον δομικό τύπο του βαρελιού συλλογής βρόχινου νερού.
    rain_chain_style:
      name: Στυλ αλυσίδας απορροής βρόχινου νερού
      description: Καθορίζει τον δομικό σχεδιασμό της αλυσίδας απορροής, ώστε οι πελάτες
        να φιλτράρουν βάσει αισθητικής προτίμησης και απόδοσης ροής νερού.
    range_hood_filter_type:
      name: Τύπος φίλτρου απορροφητήρα
      description: Κατατάσσει το στυλ του ανταλλακτικού φίλτρου ώστε να διασφαλίζεται
        η σωστή εφαρμογή και απόδοση.
    range_installation_type:
      name: Τύπος εγκατάστασης κουζίνας
      description: Περιγράφει τη διαμόρφωση με την οποία εγκαθίσταται η κουζίνα στον
        χώρο της κουζίνας.
    recorder_type:
      name: Τύπος συσκευής εγγραφής
      description: Προσδιορίζει την τεχνολογία εγγραφής που χρησιμοποιείται (π.χ.,
        DVR, NVR) για να βοηθήσει στη σύγκριση αναλογικών και IP λύσεων.
    refrigerator_configuration:
      name: Διαμόρφωση ψυγείου
      description: Προσδιορίζει το συνολικό στυλ διάταξης της πόρτας και του θαλάμου
        του ψυγείου.
    release_type:
      name: Τύπος αποδέσμευσης
      description: Υποδεικνύει πόσο γρήγορα απελευθερώνονται τα θρεπτικά συστατικά
        από το λίπασμα.
    relief_style:
      name: Στυλ ανάγλυφης επιφάνειας
      description: Υποδεικνύει εάν οι επιφανειακές υψομετρικές διαμορφώσεις είναι
        ανάγλυφες, εγχάρακτες ή επίπεδες στην υδρόγειο σφαίρα.
    repellent_mechanism:
      name: Μηχανισμός απώθησης
      description: Καθορίζει τον κύριο αποτρεπτικό μηχανισμό που χρησιμοποιεί το προϊόν,
        όπως χημική οσμή, υπερηχητικό ήχο ή παλλόμενο φως.
    replaceable_brush_head:
      name: Ανταλλακτική κεφαλή βούρτσας
      description: Καθορίζει εάν η κεφαλή της βούρτσας μπορεί να αφαιρεθεί και να
        αντικατασταθεί όταν φθαρεί.
    rib_material:
      name: Υλικό ακτίνων
      description: Καθορίζει το υλικό που χρησιμοποιείται για τις ακτίνες της ομπρέλας,
        όπως υαλονήματα ή αλουμίνιο.
    rice_cooker_functions:
      name: Λειτουργίες ρυζομάγειρα
      description: Παραθέτει τα προκαθορισμένα προγράμματα ή τις λειτουργίες μαγειρέματος
        που διαθέτει ο ρυζομάγειρας, επιτρέποντας στους αγοραστές να συγκρίνουν την
        ευελιξία.
    roaster_oven_functions:
      name: Λειτουργίες φούρνου ροστ
      description: Παραθέτει τις προκαθορισμένες ή υποστηριζόμενες λειτουργίες μαγειρέματος
        που είναι διαθέσιμες σε φούρνο ροστ.
    roasting_rack_shape:
      name: Σχήμα σχάρας ψησίματος
      description: Καθορίζει το δομικό σχήμα ή τον σχεδιασμό της σχάρας, που επηρεάζει
        την εφαρμογή και την απόδοση στο ψήσιμο.
    rockwool_form:
      name: Μορφή πετροβάμβακα
      description: Καθορίζει τη φυσική μορφή ή διαμόρφωση του προϊόντος πετροβάμβακα.
    roof_style:
      name: Στυλ στέγης
      description: Καθορίζει το αρχιτεκτονικό στυλ ή το σχήμα της στέγης.
    rose_attachment:
      name: Υποδοχή ροζέτας
      description: Δηλώνει εάν το δοχείο περιλαμβάνει αποσπώμενη ροζέτα/κεφαλή ψεκασμού,
        η ροζέτα είναι σταθερή ή δεν διαθέτει καθόλου ροζέτα.
    safety_mirror_features:
      name: Χαρακτηριστικά καθρέφτη ασφαλείας
      description: Αναδεικνύει ειδικά χαρακτηριστικά απόδοσης που ενισχύουν την ανθεκτικότητα
        ή την ορατότητα.
    salad_spinner_mechanism:
      name: Μηχανισμός στίφτη σαλάτας
      description: Καθορίζει τον μηχανισμό περιστροφής που χρησιμοποιείται για το
        στέγνωμα των λαχανικών, βοηθώντας τους αγοραστές να επιλέξουν τον επιθυμητό
        τρόπο λειτουργίας.
    sand_color:
      name: Χρώμα άμμου
      description: Δηλώνει το χρώμα της άμμου ή του κοκκώδους υλικού πλήρωσης μέσα
        στην κλεψύδρα, ανεξάρτητα από το χρώμα του εξωτερικού πλαισίου.
    sand_type:
      name: Τύπος άμμου
      description: Καθορίζει τον τύπο της άμμου βάσει της σύστασής της ή της συνήθους
        εφαρμογής της.
    saucer_functionality:
      name: Λειτουργικότητα για το πιατάκι
      description: Καθορίζει το λειτουργικό στυλ αναφορικά με το πατάκι ή τον δίσκο,
        όπως αυτοποτιζόμενος ή με σχεδιασμό δεξαμενής.
    sauna_form_factor:
      name: Μορφή / τύπος κατασκευής σάουνας
      description: Ορίζει τη γενική δομική διαμόρφωση της μονάδας σάουνας.
    sauna_heater_type:
      name: Τύπος θερμαντήρα σάουνας
      description: Δηλώνει τον τύπο θερμαντήρα που περιλαμβάνεται ή υποστηρίζεται
        από το σετ σάουνας.
    scoop_release_mechanism:
      name: Μηχανισμός απελευθέρωσης σέσουλας
      description: Περιγράφει τον τύπο μηχανισμού απελευθέρωσης προϊόντος που είναι
        ενσωματωμένος στη σέσουλα.
    scoop_surface_design:
      name: Σχεδιασμός επιφάνειας σέσουλας
      description: Περιγράφει εάν η επιφάνεια της σέσουλας είναι συμπαγής ή διάτρητη
        ώστε να επιτρέπει την αποστράγγιση λαδιού.
    scoop_wall_design:
      name: Σχεδιασμός τοιχώματος σέσουλας
      description: Περιγράφει εάν η επιφάνεια της σέσουλας είναι συμπαγής ή διάτρητη/με
        σχισμές για να επιτρέπει να περνούν μικρά κομμάτια ή το λάδι.
    scrubber_head_type:
      name: Τύπος κεφαλής βούρτσας καθαρισμού
      description: Περιγράφει τη μηχανική λειτουργία ή τον σχεδιασμό της κεφαλής της
        βούρτσας.
    scrubbing_strength:
      name: Ένταση καθαρισμού
      description: Υποδεικνύει το σχετικό επίπεδο τριβής/αποτριβής που προσφέρει το
        προϊόν.
    seafood_utensil_items_included:
      name: Περιλαμβανόμενα εργαλεία θαλασσινών
      description: Παραθέτει επιπλέον εργαλεία για οστρακοειδή που περιλαμβάνονται
        μαζί με τον σπαστήρα, επιτρέποντας στους πελάτες να συγκρίνουν μεμονωμένους
        σπαστήρες με πλήρη σετ.
    sealing_modes:
      name: Λειτουργίες σφράγισης
      description: Παραθέτει τα διαθέσιμα προγράμματα σφράγισης της συσκευής.
    security_sensor_subtype:
      name: Υποτύπος αισθητήρα ασφαλείας
      description: Καθορίζει τη συγκεκριμένη λειτουργία/τον τύπο του αισθητήρα ασφαλείας.
    seed_treatment:
      name: Επεξεργασία σπόρων
      description: Καθορίζει τυχόν ειδική επεξεργασία που έχει εφαρμοστεί στους σπόρους.
    self_cleaning_method:
      name: Μέθοδος αυτοκαθαρισμού
      description: Καθορίζει τον τύπο τεχνολογίας αυτοκαθαρισμού που χρησιμοποιεί
        ο φούρνος.
    serveware_pieces_included:
      name: Περιλαμβανόμενα είδη σερβιρίσματος
      description: Παραθέτει τα διαφορετικά εξαρτήματα σερβιρίσματος που περιλαμβάνονται
        σε ένα σετ πολλών τεμαχίων.
    shaker_set_pieces_included:
      name: Σετ αλατοπίπερου
      description: Παραθέτει τα επιμέρους εξαρτήματα που περιλαμβάνονται στο σετ,
        πέρα από τα βασικά δοχεία αλατιού και πιπεριού.
    sheath_material:
      name: Υλικό θήκης
      description: Υλικό του περιβλήματος του αισθητήρα θερμοζεύγους, το οποίο επηρεάζει
        την αντοχή στη διάβρωση και τη μέγιστη θερμοκρασία λειτουργίας.
    shelf_location_in_appliance:
      name: Θέση ραφιού στη συσκευή
      description: Υποδεικνύει σε ποιο σημείο στο εσωτερικό της συσκευής προορίζεται
        να τοποθετηθεί το ράφι.
    shoe_brush_type:
      name: Τύπος βούρτσας παπουτσιών
      description: Ταξινομεί το λειτουργικό στυλ της βούρτσας παπουτσιών, επιτρέποντας
        στους αγοραστές να εντοπίζει βούρτσες σχεδιασμένες για συγκεκριμένες εργασίες.
    shoe_dryer_technology:
      name: Τεχνολογία στεγνωτήρα παπουτσιών
      description: Καθορίζει την κύρια τεχνολογία στεγνώματος που χρησιμοποιείται
        από το στεγνωτήριο παπουτσιών.
    shoe_organizer_design:
      name: Σχεδιασμός οργάνωσης παπουτσιών
      description: Προσδιορίζει το συνολικό στυλ ή τη μορφή της οργάνωσης παπουτσιών
        για να βοηθήσει τον αγοραστή να φιλτράρει το κομμάτι.
    shoe_polish_form:
      name: Μορφή βερνικιού παπουτσιών
      description: Προσδιορίζει τη φυσική μορφή ή τη μέθοδο παράδοσης του προϊόντος
        βερνικιού παπουτσιών.
    shoe_treatment_purpose:
      name: Σκοπός προϊόντος περιποίησης παπουτσιών
      description: Προσδιορίζει την κύρια λειτουργία ή το βασικό όφελος του προϊόντος
        περιποίησης.
    shoe_tree_design:
      name: Σχεδιασμός καλαποδιού
      description: Προσδιορίζει το δομικό στυλ ή τον μηχανισμό του καλαποδιού, επηρεάζοντας
        την προσαρμοστικότητα, τον επιθυμητό τύπο παπουτσιών και τη χρησιμότητα.
    shot_glass_style:
      name: Στυλ σφηνοπότηρου
      description: Κατηγοριοποιεί το συγκεκριμένο στυλ ή τη μορφή του σφηνοπότηρου.
    shovel_handle_grip_type:
      name: Τύπος λαβής λαβής φτυαριού.
      description: Καθορίζει το στυλ χειρολαβής στο άκρο της λαβής.
    shovel_head_type:
      name: Τύπος κεφαλής φτυαριού
      description: Ταξινομεί το λειτουργικό σχήμα/στυλ της κεφαλής φτυαριού.
    shower_curtain_ring_type:
      name: Τύπος κρίκου κουρτίνας μπάνιου
      description: Προσδιορίζει το λειτουργικό στυλ των κρίκων της κουρτίνας μπάνιου.
    shrub_shape:
      name: Σχήμα θάμνου
      description: Περιγράφει τη συνολική σμιλευμένη/τοπιαρική μορφή του τεχνητού
        θάμνου.
    signature_presence:
      name: Παρουσία υπογραφής
      description: Καθορίζει εάν και με ποιον τρόπο το έργο είναι υπογεγραμμένο από
        τον καλλιτέχνη.
    sink_caddy_features:
      name: Χαρακτηριστικά θήκης νεροχύτη
      description: Επισημαίνει ειδικά λειτουργικά στοιχεία της θήκης νεροχύτη.
    size_adjustability:
      name: Δυνατότητα ρύθμισης μεγέθους
      description: Υποδεικνύει εάν το μήκος/πλάτος του προϊόντος μπορεί να ρυθμιστεί
        ώστε να ταιριάζει σε πολλαπλά μεγέθη παπουτσιών.
    skewer_tip_type:
      name: Τύπος άκρου σουβλακιού
      description: Καθορίζει τον τύπο άκρου του σουβλακιού, επηρεάζοντας την ευκολία
        διάτρησης του τροφίμου και τη συνολική παρουσίαση.
    sleeping_position_suitability:
      name: Καταλληλότητα θέσης ύπνου
      description: Υποδεικνύει για ποιες θέσεις ύπνου έχει σχεδιαστεί το μαξιλάρι.
    sleeve_insulation:
      name: Μόνωση περιβλήματος
      description: Υποδεικνύει εάν το περίβλημα παρέχει θερμομόνωση για να διατηρεί
        τα ποτά κρύα ή ζεστά.
    slice_style:
      name: Στυλ κοπής
      description: Καθορίζει το κύριο στυλ κοπής που παράγει ο κόφτης κουζίνας, όπως
        ζουλιέν ή κυματιστή κοπή.
    slipcover_stretch_type:
      name: Τύπος ελαστικού καλύμματος
      description: Καθορίζει τον βαθμό και την κατεύθυνση της ελαστικότητας του υφάσματος
        που χρησιμοποιείται στο κάλυμμα.
    smoker_type:
      name: Τύπος καπνιστηριού
      description: Ταξινομεί το καπνιστήρι με βάση τον δομικό του σχεδιασμό ή τη μέθοδο
        καπνίσματος.
    smoking_chip_size:
      name: Μέγεθος ροκανιδιών ξύλου καπνίσματος
      description: Υποδεικνύει το φυσικό μέγεθος/κοπή των ροκανιδιών καπνίσματος,
        το οποίο επηρεάζει τον ρυθμό κάυσής και την καταλληλότητα για διαφορετικές
        ψησταριές ή καπνιστήρια.
    snow_blower_stage_type:
      name: Τύπος σταδίου εκχιονιστικού
      description: Υποδεικνύει τον αριθμό σταδίων κοχλία/πτερωτής που χρησιμοποιούνται
        για τη μετακίνηση και εκτόξευση του χιονιού, βασική προδιαγραφή για τη διάκριση
        μονοβάθμιων, διβάθμιων και τριβάθμιων μηχανημάτων.
    soap_dispenser_operation_type:
      name: Τύπος λειτουργίας διανομέα σαπουνιού
      description: Καθορίζει τον μηχανισμό ενεργοποίησης που χρησιμοποιείται για τη
        διάθεση σαπουνιού ή λοσιόν.
    soil_texture:
      name: Υφή εδάφους
      description: Περιγράφει το κυρίαρχο μέγεθος/σύσταση σωματιδίων του εδάφους που
        επηρεάζει την αποστράγγιση και τον αερισμό.
    spa_installation_type:
      name: Τύπος εγκατάστασης σπα
      description: Κατατάσσει το σπα με βάση τον τρόπο εγκατάστασης ή διαμόρφωσής
        του στον χώρο.
    space_heater_safety_features:
      name: Χαρακτηριστικά ασφαλείας αερόθερμου
      description: Επισημαίνει τα ενσωματωμένα χαρακτηριστικά ασφαλείας που προστατεύουν
        χρήστες και περιουσία.
    spice_organizer_features:
      name: Χαρακτηριστικά οργάνωσης μπαχαρικών
      description: Αναδεικνύει τα ειδικά λειτουργικά χαρακτηριστικά των οργανωτών
        μπαχαρικών.
    spray_pattern:
      name: Μοτίβο ψεκασμού
      description: Καθορίζει τον τύπο διασποράς λαδιού που παράγεται από το ακροφύσιο
        ψεκασμού.
    sprayer_operation_mechanism:
      name: Μηχανισμός λειτουργίας ψεκαστήρα
      description: Καθορίζει τον τρόπο με τον οποίο δημιουργείται πίεση για τη διανομή
        λαδιού από τον ψεκαστήρα.
    spring_type:
      name: Τύπος ελατηρίου
      description: Προσδιορίζει τον τύπο ελατηρίου που χρησιμοποιείται στον μηχανισμό
        του κόφτη άκρων.
    sprinkle_opening_style:
      name: Τύπος ανοίγματος πασπαλίσματος
      description: Καθορίζει τον βαθμό λεπτότητας ή το είδος των οπών/πλέγματος που
        χρησιμοποιούνται για τη διανομή κακάο (λεπτό πλέγμα έναντι μεγάλων οπών κ.λπ.).
    sprinkler_orientation:
      name: Προσανατολισμός καταιονιστήρα
      description: Δηλώνει τον προσανατολισμό εγκατάστασης και τον τύπο κεφαλής του
        πυροσβεστικού καταιονιστήρα.
    sprinkler_response_type:
      name: Τύπος απόκρισης καταιονιστήρα
      description: Καθορίζει το χαρακτηριστικό θερμικής απόκρισης της κεφαλής καταιονιστήρα.
    sprinkler_type:
      name: Τύπος εκτοξευτήρα
      description: Κατηγοριοποιεί τη μηχανική λειτουργία ή τον τρόπο διανομής του
        καταιονιστήρα, διευκολύνοντας τη σύγκριση και το φιλτράρισμα.
    sprinkler_valve_type:
      name: Τύπος βαλβίδας εκτοξευτήρα
      description: Καθορίζει τον λειτουργικό τύπο ή τον τύπο ενεργοποίησης της βαλβίδας
        καταιονιστήρα.
    squirrel_feed_type:
      name: Τύπος τροφής για σκίουρους
      description: Προσδιορίζει τα είδη τροφής που ο ταΐστρας έχει σχεδιαστεί να διανέμει,
        διασφαλίζοντας συμβατότητα με τις προτιμώμενες τροφές των σκίουρων.
    squirrel_resistance:
      name: Αντοχή σε σκίουρους
      description: Δηλώνει εάν το κλουβί λίπους (suet) ενσωματώνει χαρακτηριστικά
        που αποτρέπουν τους σκίουρους από την πρόσβαση στο λίπος.
    stackability:
      name: Δυνατότητα στοίβαξης
      description: Υποδεικνύει εάν πολλές μονάδες μπορούν να στοιβάζονται με ασφάλεια
        για αποθήκευση με εξοικονόμηση χώρου.
    stackable_design:
      name: Σχεδιασμός με δυνατότητα στοίβαξης
      description: Υποδεικνύει εάν το κοντέινερ έχει σχεδιαστεί για ασφαλή στοίβαξη
        όταν είναι γεμάτο ή άδειο.
    stacking_capability:
      name: Ικανότητα στοίβαξης
      description: Καθορίζει εάν το κοντέινερ μπορεί να στοιβάζεται, να τοποθετείται
        το ένα μέσα στο άλλο ή να συμπτύσσεται ή εάν δεν μπορεί να στοιβάζεται με
        άλλα κοντέινερ.
    stainless_steel_cleaner_features:
      name: Χαρακτηριστικά καθαριστικού ανοξείδωτου χάλυβα
      description: Καθορίζει ειδικά χαρακτηριστικά απόδοσης του προϊόντος που είναι
        μοναδικά ή ιδιαίτερα σημαντικά για τη φροντίδα ανοξείδωτου χάλυβα.
    staple/pin_shape:
      name: Σχήμα συνδετήρα/πινέζας
      description: Ορίζει τη συνολική μορφή των συνδετικών στοιχείων, βοηθώντας τους
        αγοραστές να επιλέξουν μεταξύ συνδετήρων σχήματος U, πινεζών με στρογγυλή
        κεφαλή κ.λπ.
    staple_coating:
      name: Επικάλυψη συνδετήρα
      description: Περιγράφει την τυχόν προστατευτική επίστρωση που εφαρμόζεται στον
        συνδετήρα ή την πινέζα για την αποτροπή σκουριάς ή τη βελτίωση της ανθεκτικότητας.
    steam_nozzle_type:
      name: Τύπος ακροφυσίου ατμού
      description: Προσδιορίζει το λειτουργικό στυλ του εξαρτήματος ακροφυσίου του
        ατμοκαθαριστή.
    steam_table_pan_cover_features:
      name: Χαρακτηριστικά καπακιού δοχείου bain-marie
      description: Αναδεικνύει ειδικά λειτουργικά χαρακτηριστικά των καπακιών δοχείων
        bain-marie που διευκολύνουν τις λειτουργίες επαγγελματικής εστίασης.
    steam_table_pan_size:
      name: Μέγεθος δοχείου bain-marie
      description: Καθορίζει το τυποποιημένο κλάσμα Gastronorm/ξενοδοχειακού δοχείου
        (π.χ. ολόκληρο, 1/2, 1/3) για το οποίο έχει σχεδιαστεί το δοχείο ή το καπάκι.
    steam_table_pan_size_compatibility:
      name: Συμβατότητα μεγέθους τραπεζιού ατμού
      description: Αναφέρει τα μεγέθη Gastronorm ή τυποποιημένων δοχείων που μπορεί
        να δεχτεί η μονάδα.
    steam_table_pan_type:
      name: Τύπος δοχείου bain-marie
      description: Καθορίζει τον κατασκευαστικό τύπο του δοχείου, επηρεάζοντας την
        αποστράγγιση και την απόδοση θέρμανσης.
    stemware_design:
      name: Σχεδιασμός ποτηριών με πόδι
      description: Καθορίζει εάν τα ποτήρια διαθέτουν παραδοσιακό πόδι ή είναι χωρίς
        πόδι.
    stick_tip_style:
      name: Σχήμα άκρου στικ/σουβλακιού
      description: Ορίζει τον σχεδιασμό του άκρου από το καλαμάκι, επηρεάζοντας το
        πώς διαπερνά ή συγκρατεί τα τρόφιμα.
    stocking_toe_orientation:
      name: Προσανατολισμός μύτης χριστουγεννιάτικης κάλτσας
      description: Καθορίζει την κατεύθυνση προς την οποία δείχνει η μύτη της κάλτσας
        όταν είναι κρεμασμένη, επηρεάζοντας την οπτική συμμετρία κατά την προβολή
        πολλαπλών καλτσών.
    stopper_type:
      name: Τύπος πώματος
      description: Καθορίζει το είδος κλεισίματος που παρέχεται με την καράφα, εάν
        υπάρχει.
    strainer_style:
      name: Τύπος σουρωτηριού
      description: Κατατάσσει τον σχεδιασμό του σουρωτηριού ή στραγγιστηριού.
    strainer_type:
      name: Τύπος σουρωτηριού
      description: Καθορίζει το στυλ ή τον σχεδιασμό του σουρωτηριού, υποδεικνύοντας
        τη γαστρονομική του χρήση και την κατασκευή του πλέγματος.
    strap_end_fitting_type:
      name: Τύπος εξαρτήματος άκρου ιμάντα
      description: Καθορίζει το εξάρτημα ή το μεταλλικό τελείωμα στο άκρο του ιμάντα
        έλξης που διευκολύνει τη σύνδεση, τη στερέωση ή τη ρύθμιση.
    straw_dispensing_mechanism:
      name: Μηχανισμός διανομής καλαμακιών
      description: Περιγράφει τον τρόπο με τον οποίο διανέμονται τα καλαμάκια, βοηθώντας
        τους αγοραστές που αναζητούν συγκεκριμένα χαρακτηριστικά υγιεινής ή ευκολίας.
    sugar_dispenser_mechanism:
      name: Μηχανισμός δοσομετρητή ζάχαρης
      description: Περιγράφει πώς διανέμεται η ζάχαρη από το δοχείο, βοηθώντας τους
        αγοραστές να επιλέξουν το προτιμώμενο στυλ σερβιρίσματος.
    suitable_for_pool_shape:
      name: Κατάλληλο για σχήμα πισίνας
      description: Υποδηλώνει με ποια σχήματα πισίνας μπορεί να χρησιμοποιηθεί το
        αξεσουάρ, βοηθώντας τους χρήστες να διασφαλίσουν σωστή εφαρμογή.
    suitable_pool_surface_type:
      name: Κατάλληλος τύπος επιφάνειας πισίνας
      description: Προσδιορίζει τα υλικά επιφάνειας πισίνας για τα οποία έχει σχεδιαστεί
        η βούρτσα/σκούπα, αποτρέποντας φθορές και διασφαλίζοντας βέλτιστο καθαρισμό.
    suitable_spread_material:
      name: Κατάλληλο υλικό διασποράς
      description: Προσδιορίζει τους τύπους υλικών που έχει σχεδιαστεί να διανέμει
        ο διανομέας.
    sundial_type:
      name: Τύπος ηλιακού ρολογιού
      description: Προσδιορίζει το στυλ σχεδιασμού ή την επιστημονική διαμόρφωση του
        ηλιακού ρολογιού.
    supplement_function:
      name: Λειτουργία συμπληρώματος
      description: Κατηγοριοποιεί τα συμπληρώματα βάσει της κύριας χρήσης τους, βοηθώντας
        τους καλλιεργητές να επιλέξουν το κατάλληλο πρόσθετο για συγκεκριμένες ανάγκες
        φυτών.
    surface_reflectivity:
      name: Ανακλαστικότητα επιφάνειας
      description: Υποδηλώνει εάν η επιφάνεια της πινακίδας είναι κατασκευασμένη ώστε
        να αντανακλά το φως για βελτιωμένη ορατότητα τη νύχτα.
    sweetener_type:
      name: Τύπος γλυκαντικού
      description: Προσδιορίζει τον βασικό γλυκαντικό παράγοντα που χρησιμοποιείται
        στο σιρόπι.
    table_skirt_pleat_style:
      name: Στυλ πιέτας με υφασμάτινο διακοσμητικό κάλυμμα τραπεζιού
      description: Καθορίζει το στυλ με διακοσμητικές πιέτες ή σούρες του καλύμματος,
        βοηθώντας τους αγοραστές να αντιστοιχίζουν τα αισθητικά θέματα που θέλουν.
    tablecloth_clip_design:
      name: Σχεδιασμός κλιπ τραπεζομάντιλου
      description: Περιγράφει τον μηχανισμό ή το στυλ του κλιπ του τραπεζομάντιλου.
    tablecloth_features:
      name: Χαρακτηριστικά τραπεζομάντιλου
      description: Αναδεικνύει ειδικά χαρακτηριστικά απόδοσης ή σχεδιασμού του τραπεζομάντιλου.
    tamper_evident_feature:
      name: Χαρακτηριστικό ένδειξης παραβίασης
      description: Δηλώνει την ύπαρξη και τον τύπο μηχανισμού ένδειξης παραβίασης
        που είναι ενσωματωμένος στο καπάκι.
    tang_type:
      name: Τύπος λάμας (tang)
      description: Δηλώνει τον τύπο κατασκευής tang του μαχαιριού, προσδιορίζοντας
        σε ποιο βαθμό το μέταλλο της λεπίδας εκτείνεται μέσα στη λαβή.
    teapot_spout_style:
      name: Στυλ ρύγχους τσαγιέρας
      description: Περιγράφει τον σχεδιασμό του ρύγχους εκροής της τσαγιέρας, επηρεάζοντας
        τον έλεγχο ροής και την αισθητική.
    temperature_zones:
      name: Ζώνες θερμοκρασίας
      description: Προσδιορίζει πόσες ανεξάρτητα ρυθμιζόμενες ζώνες θερμοκρασίας διαθέτει
        το ψυγείο κρασιών.
    thermocouple_junction_type:
      name: Τύπος ένωσης θερμοζεύγους
      description: Δηλώνει την κατασκευή της ένωσης μέτρησης, η οποία επηρεάζει τον
        χρόνο απόκρισης και την ηλεκτρική απομόνωση.
    thermometer_design:
      name: Σχεδιασμός θερμομέτρου
      description: Καθορίζει τον βασικό τρόπο λειτουργίας ή την τεχνολογία του οικιακού
        θερμομέτρου.
    thermos_handle_type:
      name: Τύπος λαβή θερμός
      description: Περιγράφει το στυλ της λαβής ή του βοηθήματος μεταφοράς που είναι
        ενσωματωμένο στο θερμός.
    thread_standard:
      name: Πρότυπο σπειρώματος
      description: Προσδιορίζει την προδιαγραφή σπειρώματος που χρησιμοποιείται στη
        σύνδεση του αξεσουάρ για να διασφαλίσει τη διασταυρούμενη συμβατότητα με εξαρτήματα
        υδραυλικών εγκαταστάσεων.
    tilt_mechanism:
      name: Μηχανισμός κλίσης
      description: Καθορίζει τον μηχανισμό που επιτρέπει στο στέγαστρο να γέρνει για
        βέλτιστη τοποθέτηση σκίασης.
    time_format:
      name: Μορφή ώρας
      description: Δηλώνει αν το ρολόι μπορεί να εμφανίζει την ώρα σε μορφή 12ώρου,
        24ώρου ή και στις δύο μορφές.
    timer_mechanism:
      name: Μηχανισμός χρονοδιακόπτη
      description: Προσδιορίζει τον βασικό μηχανισμό που χρησιμοποιείται για τη μέτρηση
        του χρόνου.
    tine_position:
      name: Θέση δοντιών (tines)
      description: Περιγράφει τη διάταξη των δοντιών σε σχέση με τους τροχούς/τον
        κινητήρα, η οποία επηρεάζει την ευελιξία και τη διείσδυση στο έδαφος.
    tire_construction:
      name: Κατασκευή ελαστικού
      description: Προσδιορίζει τη μέθοδο εσωτερικής κατασκευής του σκελετού του ελαστικού.
    tire_construction_type:
      name: Τύπος κατασκευής ελαστικού
      description: Δηλώνει αν το ελαστικό είναι διαγώνιας (bias-ply) ή ακτινικής (radial)
        κατασκευής, κάτι που επηρεάζει την ευκαμψία, τη φέρουσα ικανότητα και την
        ποιότητα κύλισης.
    tire_tread_pattern:
      name: Σχέδιο πέλματος ελαστικού
      description: Περιγράφει το σχέδιο του πέλματος του ελαστικού, υποδεικνύοντας
        την καταλληλότητά του για διαφορετικές επιφάνειες και ανάγκες πρόσφυσης.
    tissue_lotion_content:
      name: Περιεκτικότητα χαρτομάντιλου σε λοσιόν
      description: Δηλώνει αν τα χαρτομάντιλα είναι εμποτισμένα με λοσιόν ή άλλα καταπραϋντικά
        πρόσθετα.
    toaster_features:
      name: Χαρακτηριστικά φρυγανιέρας
      description: Παραθέτει τις ειδικές λειτουργίες και στοιχεία σχεδίασης που διατίθενται
        στη φρυγανιέρα.
    tong_type:
      name: Τύπος λαβίδας
      description: Καθορίζει το κύριο στυλ ή την προβλεπόμενη χρήση της λαβίδας.
    toothbrush_holder_features:
      name: Χαρακτηριστικά θήκης οδοντόβουρτσας
      description: Τονίζει τις ειδικές λειτουργίες ή στοιχεία σχεδίασης που διαφοροποιούν
        αυτήν τη θήκη.
    toothpick_dispensing_mechanism:
      name: Μηχανισμός διανομής οδοντογλυφίδων
      description: Προσδιορίζει τον μηχανισμό με τον οποίο διανέμονται οι οδοντογλυφίδες.
    topographical_relief:
      name: Ανάγλυφο τοπογραφίας
      description: Υποδεικνύει εάν η επιφάνεια της υδρογείου διαθέτει ανάγλυφη τοπογραφία.
    towel_holder_design:
      name: Σχεδιασμός βάσης/θήκης πετσέτας
      description: Περιγράφει τον δομικό τύπο της βάσης πετσέτας, όπως ράγα ή κρίκος.
    towel_weave:
      name: Ύφανση πετσέτας
      description: Περιγράφει την κατασκευή ή το είδος ύφανσης του υφάσματος της πετσέτας,
        που επηρεάζει την υφή, την απορροφητικότητα και τον χρόνο στεγνώματος.
    track_lighting_rail_type:
      name: Τύπος ράγας συστήματος φωτισμού ράγας
      description: Καθορίζει το μηχανικό/ηλεκτρικό πρότυπο της ράγας, προσδιορίζοντας
        ποια φωτιστικά και συνδετικά στοιχεία είναι συμβατά.
    track_lighting_system_compatibility:
      name: Συμβατότητα συστήματος φωτισμού ράγας
      description: Καθορίζει το ηλεκτρικό και μηχανικό πρότυπο της ράγας για το οποίο
        έχει σχεδιαστεί το φωτιστικό ή το αξεσουάρ.
    track_rail_circuit_configuration:
      name: Διαμόρφωση κυκλωμάτων ράγας
      description: Υποδεικνύει τον αριθμό ή τον τύπο ηλεκτρικών κυκλωμάτων που υποστηρίζει
        η ράγα, επηρεάζοντας τον ανεξάρτητο έλεγχο ομάδων φωτιστικών.
    track_system_standard:
      name: Πρότυπο συστήματος ράγας
      description: Προσδιορίζει το φυσικό πρότυπο ράγας στο οποίο ταιριάζει η παροχή
        ρεύματος, επιτρέποντας στους αγοραστές να αντιστοιχίσουν τα εξαρτήματα στη
        ράγα τους (π.χ. ράγα τύπου H, J ή L).
    tractor_tire_application:
      name: Εφαρμογή ελαστικών τρακτέρ
      description: Υποδεικνύει την κύρια εφαρμογή ή το περιβάλλον για το οποίο έχει
        σχεδιαστεί το ελαστικό.
    tractor_tire_tread_classification:
      name: Κατηγοριοποίηση πέλματος ελαστικού τρακτέρ
      description: Κατατάσσει το σχέδιο πέλματος του ελαστικού τρακτέρ σύμφωνα με
        αγροτικά και βιομηχανικά πρότυπα.
    tree_shape:
      name: Σχήμα δέντρου
      description: Περιγράφει τη συνολική σιλουέτα ή το προφίλ ενός τεχνητού δέντρου.
    trigger_type:
      name: Τύπος σκανδάλης
      description: Καθορίζει τον μηχανισμό σκανδάλης που χρησιμοποιείται για τον έλεγχο
        της ροής νερού στο ακροφύσιο.
    trimmer_line_feed_system:
      name: Σύστημα τροφοδοσίας μεσινέζας
      description: Προσδιορίζει τον τρόπο με τον οποίο προωθείται η γραμμή κοπής από
        την κεφαλή κατά τη λειτουργία.
    trimmer_line_shape:
      name: Σχήμα μεσινέζας
      description: Περιγράφει το σχήμα διατομής της μεσινέζας, το οποίο επηρεάζει
        την απόδοση κοπής και το επίπεδο θορύβου.
    turntable_type:
      name: Τύπος περιστρεφόμενου δίσκου
      description: Προσδιορίζει το είδος της επιφάνειας μαγειρέματος, διακρίνοντας
        μεταξύ παραδοσιακών περιστρεφόμενων γυάλινων δίσκων και επίπεδων ή μη περιστρεφόμενων
        σχεδιασμών.
    ultrasonic_cleaner_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ καθαριστή υπερήχων
      description: Αναφέρει τα επιπλέον εξαρτήματα που παρέχονται με τον καθαριστή,
        ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται στη συσκευασία.
    umbrella_base_type:
      name: Τύπος βάσης ομπρέλας
      description: Καθορίζει τον δομικό τύπο ή τον σχεδιασμό στήριξης της βάσης.
    umbrella_opening_mechanism:
      name: Μηχανισμός ανοίγματος ομπρέλας
      description: Καθορίζει τον τρόπο με τον οποίο το πανί της ομπρέλας ανοίγει και
        κλείνει.
    umbrella_type:
      name: Τύπος ομπρέλας
      description: Καθορίζει τον συνολικό σχεδιασμό ή τη μορφή της ομπρέλας.
    upf_rating:
      name: Δείκτης προστασίας UPF
      description: Υποδεικνύει τον δείκτη υπεριώδους προστασίας (UPF) του υφάσματος
        της ομπρέλας, ποσοτικοποιώντας την αποτελεσματικότητά του στην παρεμπόδιση
        επιβλαβών ακτίνων UV.
    utensil_flexibility:
      name: Ευκαμψία εργαλείου
      description: Υποδεικνύει πόσο άκαμπτο ή εύκαμπτο είναι το σώμα της σπάτουλας,
        επηρεάζοντας την καταλληλότητά της για καμπύλα μπολ ή σφιχτή ζύμη.
    utensil_holder_features:
      name: Χαρακτηριστικά θήκης εργαλείων
      description: Περιγράφει ειδικά λειτουργικά χαρακτηριστικά μιας θήκης εργαλείων
        κουζίνας.
    utensil_tray_features:
      name: Χαρακτηριστικά δίσκου εργαλείων
      description: Αναδεικνύει ειδικά χαρακτηριστικά που ενισχύουν τη λειτουργικότητα
        του δίσκου.
    vacuum_hose_connection_type:
      name: Τύπος σύνδεσης σωλήνα κενού
      description: Περιγράφει το στυλ του συγχρονιστή στα άκρα των σωλήνων, διασφαλίζοντας
        τη σωστή μηχανική εφαρμογή με ηλεκτρικές σκούπες ή αξεσουάρ.
    valance_style:
      name: Στυλ βολάν
      description: Προσδιορίζει τον διακοσμητικό σχεδιασμό του βολάν, βοηθώντας τους
        πελάτες να επιλέξουν στυλ που ταιριάζει με τη διακόσμησή τους.
    valet_organizer_features:
      name: Χαρακτηριστικά οργανωτή valet
      description: Αναδεικνύει συγκεκριμένα οργανωτικά χαρακτηριστικά που είναι ενσωματωμένα
        στη βάση φόρτισης/οργανωτή.
    valve_configuration:
      name: Διαμόρφωση βαλβίδας
      description: Καθορίζει τον λειτουργικό τύπο της βαλβίδας λάστιχου κήπου, βοηθώντας
        τους αγοραστές να επιλέξουν γρήγορα τη σωστή λύση για το σύστημα ποτίσματος.
    valve_stem_angle:
      name: Γωνία στελέχους βαλβίδας
      description: Καθορίζει τον προσανατολισμό/τη γωνία του στελέχους της βαλβίδας
        σε σχέση με τον σωλήνα, επηρεάζοντας την ευκολία φουσκώματος και την εφαρμογή
        στη ζάντα.
    vase_filler_type:
      name: Τύπος γεμίσματος βάζου
      description: Κατηγοριοποιεί το προϊόν με βάση το συγκεκριμένο είδος υλικού ή
        μορφής γεμίσματος.
    vent_pipe_type:
      name: Τύπος σωλήνα εξαερισμού
      description: Κατατάσσει τον δομικό τύπο της καμινάδας ή του σωλήνα εξαερισμού.
    vent_style:
      name: Στυλ εξαερισμού
      description: Ταξινομεί το δομικό στυλ ή τον σκοπό του στοιχείου εξαερισμού.
    waffle_style:
      name: Στυλ βάφλας
      description: Προσδιορίζει μοτίβο βάφλες ή το σχέδιο που προκύπτει από τις πλάκες.
    wallpaper_removal_type:
      name: Τύπος αφαίρεσης ταπετσαρίας
      description: Υποδεικνύει την ευκολία αφαίρεσης κατά την ανακαίνιση.
    wallpaper_washability_rating:
      name: Βαθμολογία δυνατότητας πλυσίματος ταπετσαρίας
      description: Ορίζει τον τρόπο καθαρισμού της επιφάνειας της ταπετσαρίας μετά
        την τοποθέτησή της.
    warmer_type:
      name: Θερμότερος τύπος
      description: Καθορίζει τον κύριο μηχανισμό θέρμανσης ή την προβλεπόμενη χρήση
        του θερμαντήρα κεριού ή ελαίων.
    warmth_level:
      name: Επίπεδο θερμότητας
      description: Ταξινομεί το συνολικό επίπεδο ζεστασιάς ή την εποχιακή καταλληλότητα
        του παπλώματος.
    warmth_rating:
      name: Βαθμολογία θερμότητας
      description: Υποδεικνύει το επίπεδο μόνωσης μιας κουβέρτας, παρόμοιο με τις
        αξιολογήσεις TOG στα κλινοσκεπάσματα.
    waste_container_lid_features:
      name: Χαρακτηριστικά καπακιού δοχείου απορριμμάτων
      description: Αναδεικνύει ειδικές λειτουργίες ή βελτιώσεις που είναι ενσωματωμένες
        στο καπάκι.
    waste_container_sign_message:
      name: Μήνυμα σήμανσης κάδου απορριμμάτων
      description: Καθορίζει το συγκεκριμένο ρεύμα αποβλήτων ή το προειδοποιητικό
        κείμενο που αναγράφεται στην ετικέτα ή τη σήμανση.
    water_filtration_technology:
      name: Τεχνολογία φιλτραρίσματος νερού
      description: Περιγράφει τη βασική τεχνολογία ή τον μηχανισμό που χρησιμοποιείται
        για τον καθαρισμό του νερού.
    water_heater_element_connection_type:
      name: Τύπος σύνδεσης αντίστασης θερμοσίφωνα
      description: Προσδιορίζει τον τρόπο τοποθέτησης της αντίστασης, διακρίνοντας
        μεταξύ βιδωτής τοποθέτησης και διαφόρων τύπων φλάντζας.
    water_sensor_design:
      name: Σχεδιασμός αισθητήρα νερού
      description: Καθορίζει τη φυσική μορφή του στοιχείου ανίχνευσης νερού.
    water_supply_type:
      name: Τύπος παροχής νερού
      description: Προσδιορίζει τον τρόπο με τον οποίο η συσκευή τροφοδοτείται με
        νερό, διακρίνοντας μεταξύ δεξαμενών χειροκίνητης πλήρωσης και μόνιμης σύνδεσης
        με την παροχή νερού.
    watering_needs:
      name: Ανάγκες ποτίσματος
      description: Περιγράφει τις τυπικές ανάγκες του φυτού σε νερό.
    wax_paper_form:
      name: Μορφή κερωμένου χαρτιού
      description: Καθορίζει αν το κηρόχαρτο διατίθεται σε συνεχές ρολό ή σε κομμένα
        φύλλα.
    weather_guard_mounting_method:
      name: Μέθοδος στερέωσης προστατευτικού καιρού
      description: Καθορίζει τον τρόπο με τον οποίο το προστατευτικό προσαρμόζεται
        στον τροφοδότη ή στη δομή στήριξης.
    wheel_bearing_type:
      name: Τύπος ρουλεμάν τροχού
      description: Προσδιορίζει τον εσωτερικό τύπο ρουλεμάν ή κουζινέτου του τροχού,
        επηρεάζοντας την ομαλότητα κύλισης και τις απαιτήσεις συντήρησης.
    wheel_tread_style:
      name: Σχέδιο πέλματος τροχού
      description: Καθορίζει το σχέδιο του πέλματος του τροχού, το οποίο επηρεάζει
        την πρόσφυση, το επίπεδο θορύβου και την πιθανή δημιουργία σημαδιών στο δάπεδο.
    whistling:
      name: Σφύριγμα
      description: Καθορίζει εάν ο βραστήρας παράγει ήχο σφυρίγματος όταν το νερό
        φτάνει στο σημείο βρασμού.
    wick_material:
      name: Υλικό φυτιλιού
      description: Προσδιορίζει τη σύνθεση του φυτιλιού που χρησιμοποιείται (π.χ.
        βαμβάκι, υαλοΐνες).
    window_film_installation_surface:
      name: Επιφάνεια τοποθέτησης μεμβράνης παραθύρου
      description: Καθορίζει εάν η μεμβράνη προορίζεται για εσωτερική, εξωτερική ή
        διπλής επιφάνειας εφαρμογή.
    window_film_type:
      name: Τύπος μεμβράνης παραθύρων
      description: Κατηγοριοποιεί τη λειτουργική κατηγορία της μεμβράνης (π.χ. ιδιωτικότητα
        έναντι ασφάλειας).
    window_rod_type:
      name: Τύπος κουρτινόξυλου
      description: Ταξινομεί το λειτουργικό στυλ του κουρτινόξυλου
    window_screen_type:
      name: Τύπος σίτας παραθύρου
      description: Ορίζει το δομικό στυλ ή τη μέθοδο λειτουργίας της σίτας.
    window_treatment_lining_type:
      name: Τύπος επένδυσης διακοσμητικού παραθύρου
      description: Καθορίζει εάν η ποδιά ή η κορνίζα παραθύρου διαθέτει επένδυση και
        ποιος τύπος επένδυσης χρησιμοποιείται.
    wine_aerator_type:
      name: Τύπος αεριστήρα κρασιού
      description: Καθορίζει τη μορφή ή τον τρόπο λειτουργίας του αεριστήρα κρασιού.
    wine_glass_style:
      name: Τύπος ποτηριού κρασιού
      description: Καθορίζει τον προοριζόμενο τύπο κρασιού ή το σχέδιο του ποτηριού
        για βελτιστοποίηση του αρώματος και της γεύσης.
    wok_bottom_type:
      name: Τύπος βάσης γουόκ
      description: Ορίζει το σχήμα της βάσης του wok, καθορίζοντας τη συμβατότητα
        με διαφορετικές εστίες και δακτυλίους γουόκ.
    wood_grain_orientation:
      name: Κατεύθυνση νερών ξύλου
      description: Καθορίζει τον προσανατολισμό των νερών του ξύλου στο προϊόν, όπως
        εγκάρσια νερά (end grain), πλάγια νερά (edge grain) ή επιφανειακά νερά (face
        grain). Ο προσανατολισμός των νερών επηρεάζει την ανθεκτικότητα και τη φιλικότητα
        προς τα μαχαίρια.
    wood_seasoning_method:
      name: Μέθοδος ξήρανσης ξύλου
      description: Υποδεικνύει τον τρόπο με τον οποίο ξηράνθηκε ή προετοιμάστηκε το
        καύσιμο ξύλο, επηρεάζοντας το περιεχόμενο υγρασίας και την ποιότητα καύσης
        του.
    wrap_format:
      name: Μορφή περιτυλίγματος
      description: Καθορίζει τη φυσική μορφή στην οποία βρίσκεται το περιτύλιγμα τροφίμων,
        όπως ρολά ή κομμένα φύλλα.
    abacus_bead_material:
      name: Υλικό χάντρας άβακα
      description: Κύριο υλικό των χαντρών άβακα.
    abec_rating:
      name: Βαθμολογία ABEC
      description: Καθορίζει την ακρίβεια των ρουλεμάν με βάση τις αξιολογήσεις ABEC,
        υποδεικνύοντας τα επίπεδα ομαλότητας και ανοχής.
    abrasive_level:
      name: Επίπεδο λείανσης
      description: Σχετική αντοχή κοπής γυαλιστικού/ένωσης σε φινιρίσματα αυτοκινήτων.
    absinthe_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για αψέντι
      description: Αναφέρει λεπτομερώς τυχόν αξεσουάρ που συσκευάζονται το προϊόν,
        όπως κουτάλια, ποτήρια ή κύβους ζάχαρης.
    ac_compressor_mounting_style:
      name: Στυλ τοποθέτησης συμπιεστή AC
      description: Περιγράφει το μηχανικό στυλ τοποθέτησης/σύνδεσης ή τη διεπαφή βραχίονα
        του συμπιεστή στον κινητήρα/βοηθητικό σύστημα μετάδοσης κίνησης.
    ac_compressor_oil_type:
      name: Τύπος λαδιού συμπιεστή AC
      description: Καθορίζει τη χημεία του λιπαντικού λαδιού που απαιτείται/χρησιμοποιείται
        από τον συμπιεστή AC (οι συνήθεις τύποι περιλαμβάνουν τα PAG και POE).
    accent_modes:
      name: Λειτουργίες έμφασης
      description: Καθορίζει τον τρόπο με τον οποίο ο μετρονόμος μπορεί να τονίσει
        τους ρυθμούς μέσα σε ένα μέτρο (κλικ στο Beyond Basic Shopify ).
    access_mechanism:
      name: Μηχανισμός πρόσβασης
      description: Περιγράφει τον τρόπο με τον οποίο ο χρήστης φτάνει στην υπερυψωμένη
        πλατφόρμα ύπνου.
    accessibility_features:
      name: Λειτουργίες προσβασιμότητας
      description: Καθορίζει τον εξοπλισμό και τις διαμορφώσεις που σχετίζονται με
        την προσβασιμότητα στο minibus.
    accessories_included:
      name: Περιλαμβάνονται αξεσουάρ
      description: Παραθέτει συμπληρωματικά κομμάτια που συνοδεύουν την καρέκλα (π.χ.
        μαξιλάρι αφρού, μαξιλάρι οσφυϊκής στήριξης), δίνοντας στον αγοραστή μια σαφή
        εικόνα της προστιθέμενης αξίας.
    accessory_pieces_included:
      name: Περιλαμβάνονται αξεσουάρ
      description: Παραθέτει τα κομμάτια που περιλαμβάνονται σε ένα σετ δώρου ή πακέτο
        αξεσουάρ ένδυσης πολλών τεμαχίων.
    acoustic_amplifier_feedback_control_features:
      name: Λειτουργίες ελέγχου ανάδρασης ακουστικού ενισχυτή
      description: Υποδεικνύει ενσωματωμένα εργαλεία κατά της ανάδρασης για ακουστικά
        όργανα (π.χ. φίλτρο εγκοπής, διακόπτης φάσης, αυτόματη καταστολή ανάδρασης).
    acoustic_drum_kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα ακουστικού ντράμκιτ
      description: Υποδεικνύει ποια κύρια επιμέρους προϊόντα περιλαμβάνονται στο κιτ
        (συσκευασία κελύφους μόνο έναντι πλήρους κιτ, περιλαμβάνονται κύμβαλα/υλικός
        εξοπλισμός).
    acoustic_guitar_body_shape:
      name: Σχήμα σώματος ακουστικής κιθάρας
      description: Περιγράφει το σχήμα/περίγραμμα του σώματος της ακουστικής κιθάρας,
        το οποίο επηρεάζει τον τόνο, την άνεση και την τυπική χρήση.
    acoustic_guitar_string_core_design:
      name: Σχεδιασμός πυρήνα χορδών ακουστικής κιθάρας
      description: Η βασική κατασκευή των τυλιγμένων χορδών.
    acoustic_piano_key_material:
      name: Υλικό πλήκτρων ακουστικού πιάνου
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται για τις επιφάνειες
        των πλήκτρων του πιάνου.
    acoustic_piano_lid_type:
      name: Τύπος καπακιού ακουστικού πιάνου
      description: Καθορίζει το στυλ του μηχανισμού καπακιού/καλύμματος που χρησιμοποιείται
        στο ακουστικό πιάνου (για εκδόσεις grand/upright fallboard/top lid).
    acoustic_piano_plate_frame_material:
      name: Υλικό πλαισίου ακουστικού πιάνου
      description: Καθορίζει το κύριο υλικό της πλάκας/πλαισίου του πιάνου (άρπα),
        συνήθως χυτοσίδηρος.
    acoustic_piano_soundboard_material:
      name: Υλικό ηχείου ακουστικού πιάνου
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται για την κονσόλα ήχου
        του πιάνου.
    action_figure_scale:
      name: Κλίμακα φιγούρας δράσης
      description: Υποδεικνύει την αναλογία κλίμακας συλλέκτη (π.χ., 1:12) στην οποία
        προορίζεται να ταιριάζει το αξεσουάρ.
    action_type:
      name: Τύπος δράσης
      description: Περιγράφει τον μηχανισμό πυροδότησης ή όπλισης του όπλου (π.χ.,
        λειτουργία κλείστρου, λειτουργία κάννης, λειτουργία μοχλού).
    actuation_mechanism:
      name: Μηχανισμός ενεργοποίησης
      description: 'Υποδεικνύει τον τρόπο με τον οποίο ο μοχλός ενεργοποιεί το σύστημα
        πέδησης: καθαρά μηχανικός με καλώδιο, πλήρως υδραυλικός, υδραυλικός με καλώδιο
        ή ηλεκτρονικός/ασύρματος.'
    actuation_method:
      name: Μέθοδος ενεργοποίησης
      description: Πώς ενεργοποιείται ή εκτονώνεται το σύστημα καταστολής.
    adapter_orientation:
      name: Προσανατολισμός προσαρμογέα
      description: Καθορίζει τη γωνία ή τη διαμόρφωση ενός προσαρμογέα βαλβίδας ελαστικού
        ποδηλάτου, που επηρεάζει την προσβασιμότητα της αντλίας (π.χ., ευθεία, 90°).
    additive_application_stage:
      name: Στάδιο εφαρμογής πρόσθετων
      description: Υποδεικνύει πότε πρόκειται να χρησιμοποιηθεί το προϊόν κατά τη
        διάρκεια της διαδικασίας.
    adhesive_backing:
      name: Αυτοκόλλητο υπόστρωμα
      description: Εάν το εκτυπώσιμο μετάξι έχει αυτοκόλλητο υπόστρωμα για εφαρμογή
        «peel-and-stick».
    adhesive_formulation:
      name: Σύνθεση κόλλας
      description: Υποδεικνύει τη χημική βάση ή τη σύνθεση της κόλλας, όπως κυανοακρυλικό
        ή εποξικό.
    adhesive_sides:
      name: Αυτοκόλλητες πλευρές
      description: Υποδεικνύει εάν η εύτηκτη κόλλα βρίσκεται στη μία ή και στις δύο
        πλευρές της ταινίας/μεμβράνης.
    adjunct_grain_processing_form:
      name: Συμπληρωματική μορφή επεξεργασίας σιτηρών
      description: Υποδεικνύει τη φυσική/μεταποιητική μορφή του συμπληρωματικού σιτηρού
        όπως πωλείται για ζυθοποιία (π.χ., σε νιφάδες, φρυγανισμένο, με βύνη, ωμό).
    adjustability_type:
      name: Τύπος δυνατότητας προσαρμογής
      description: Καθορίζει τον τύπο ρύθμισης που υποστηρίζει ο ορθοστάτης, εάν υπάρχει.
    adjustable_cup_mutes:
      name: Ρυθμιζόμενες σουρντίνες τύπου κυπέλλου
      description: Υποδεικνύει εάν το κύπελλο είναι ρυθμιζόμενο/αφαιρούμενο και τον
        τρόπο ρύθμισης.
    adjustable_zones:
      name: Ρυθμιζόμενες ζώνες
      description: Προσδιορίζει ποια τμήματα της βάσης μπορούν να ρυθμιστούν ανεξάρτητα.
    adjustment_type:
      name: Τύπος προσαρμογής
      description: Υποδεικνύει εάν ο ρυθμιστής είναι ρυθμιζόμενος και πώς πραγματοποιείται
        η ρύθμιση.
    administration_method:
      name: Μέθοδος χορήγησης
      description: Υποδεικνύει τον τρόπο χορήγησης του σκευάσματος αποπαρασίτωσης
        στο άλογο (π.χ., από το στόμα ή με ένεση), βοηθώντας τον αγοραστή να συμμορφώνεται
        με τις κτηνιατρικές οδηγίες και να επιλέγει μια διαχειρίσιμη μέθοδο εφαρμογής.
    advice_card_prompt_type:
      name: Τύπος κάρτας συμβουλών
      description: Τύπος προτροπής που είναι τυπωμένος στην κάρτα (ή έλλειψη προτροπής).
    aeration_method:
      name: Μέθοδος αερισμού
      description: Περιγράφει τον τύπο αερισμού που παρέχεται ή υποστηρίζεται από
        το κοντέινερ, διασφαλίζοντας επαρκές οξυγόνο για το ζωντανό δόλωμα.
    aero_package_components:
      name: Επιμέρους προϊόντα πακέτου Aero
      description: Υποδεικνύει ποια βασικά αεροδυναμικά επιμέρους προϊόντα είναι εγκατεστημένα
        στο όχημα (επιλέξτε όλα όσα ισχύουν).
    aerodynamic_elements_included:
      name: Περιλαμβάνονται αεροδυναμικά στοιχεία
      description: Καθορίζει ποια αεροδυναμικά εξαρτήματα περιλαμβάνονται στο αυτοκίνητο
        φόρμουλα (επιλέξτε όλα όσα ισχύουν, εάν υποστηρίζονται).
    aftertouch_support:
      name: Υποστήριξη Aftertouch
      description: Εάν το χειριστήριο υποστηρίζει aftertouch (καναλιού ή πολυφωνικού)
        σε πλήκτρα/pads.
    agave_content_classification:
      name: Ταξινόμηση περιεκτικότητας σε αγαύη
      description: Διευκρινίζει εάν η τεκίλα παράγεται από 100% αγαύη Blue Weber ή
        είναι μείγμα που περιέχει τουλάχιστον 51% σάκχαρα αγαύης.
    aida_cloth_count:
      name: Αριθμός υφασμάτων Aida
      description: Καθορίζει την πυκνότητα του υφάσματος Aida (αριθμός τετραγώνων/βελονιών
        ανά ίντσα), η οποία καθορίζει το μέγεθος της βελονιάς και την κλίμακα του
        σχεδίου.
    aida_cloth_pre_cut_format:
      name: Ύφασμα Aida σε προ-κομμένη μορφή
      description: Υποδεικνύει εάν το ύφασμα Aida πωλείται ως προ-κομμένο τεμάχιο,
        ως συνεχές κομμάτι κομμένο από μπομπίνα ή σε ρολό.
    air_bag_material:
      name: Υλικό αερόσακου
      description: Καθορίζει το υλικό του αερόσακου/ρεζερβουάρ που χρησιμοποιείται
        με το Irish warpipe.
    air_bed_internal_construction:
      name: Εσωτερική κατασκευή κρεβατιού αέρα
      description: Περιγράφει την εσωτερική δομή ή τεχνολογία υποστύλωσης που χρησιμοποιείται
        στο εσωτερικό του κρεβατιού αέρα για άνεση και σταθερότητα.
    air_dry_clay_color_form:
      name: Μορφή χρώματος πηλού air-dry
      description: Είτε ο πηλός πωλείται προχρωματισμένος, λευκός/σε ουδέτερη απόχρωση
        για ζωγραφική, είτε ως μείγμα/ποικιλία.
    air_hockey_items_included:
      name: Περιλαμβάνεται κομμάτια Air hockey
      description: Παραθέτει τα συγκεκριμένα αξεσουάρ που περιέχονται σε ένα σετ,
        ώστε ο πελάτης να γνωρίζει ακριβώς τι παραλαμβάνει (π.χ., 2 ωστήρια, 4 δίσκους,
        2 τσόχες).
    air_intake_temperature_sensor_mounting_style:
      name: Στυλ τοποθέτησης αισθητήρα θερμοκρασίας εισαγωγής αέρα
      description: Ο φυσικός τρόπος τοποθέτησης του αισθητήρα IAT στο σύστημα εισαγωγής.
    air_integration_capability:
      name: Ικανότητα ενσωμάτωσης αέρα
      description: Υποδεικνύει εάν και πώς ο υπολογιστής κατάδυσης υποστηρίζει ασύρματους
        πομπούς πίεσης φιάλης
    air_mattress_valve_type:
      name: Τύπος βαλβίδας στρώματος αέρα
      description: Καθορίζει τον τύπο της βαλβίδας που προσαρμόζεται ή περιλαμβάνεται
        σε ένα παρελκόμενο, διασφαλίζοντας τη συμβατότητα μεταξύ αντλιών, βαλβίδων
        και εξαρτημάτων επισκευής.
    air_water_rocket_kit_items_included:
      name: Περιλαμβάνονται κομμάτια κιτ πυραύλων αέρα και νερού
      description: Βασικά εξαρτήματα που περιλαμβάνονται στο σετ πυραύλων (εκτοξευτής,
        αντλία, πτερύγια, εξαρτήματα αναπλήρωσης).
    air_water_rocket_launch_method:
      name: Μέθοδος εκτόξευσης πυραύλων αέρος και νερού
      description: Πώς συμπιέζεται/εκτοξεύεται ο πύραυλος (η αλληλεπίδραση του χρήστη
        και το στυλ εξοπλισμού).
    airbag_position:
      name: Θέση αερόσακου
      description: Καθορίζει την προβλεπόμενη θέση/ζώνη συγκράτησης που υποστηρίζει
        το τμήμα αερόσακου.
    aircraft_ads_b_capability:
      name: Ικανότητα αεροσκάφους ADS-B
      description: Καθορίζει εάν το αεροσκάφος είναι εξοπλισμένο για συμμόρφωση με
        τη διαδικασία ADS-B Out.
    aircraft_airframe_material:
      name: Υλικό σκελετού αεροσκάφους
      description: Πρωτογενές(-ά) υλικό(-α) που χρησιμοποιείται(-ούνται) στην κατασκευή
        του σκελετού του αεροσκάφους.
    aircraft_cabin_configuration:
      name: Διαμόρφωση καμπίνας αεροσκάφους
      description: Καθορίζει τη διάταξη της καμπίνας του αεροσκάφους (π.χ., ομάδα
        συνεδριάσεων, ανάκλιντρο, καμπίνα τεσσάρων ζωνών).
    aircraft_documentation_included:
      name: Περιλαμβάνεται τεκμηρίωση αεροσκάφους
      description: Παραθέτει τα έγγραφα που παρέχονται με το εξάρτημα (π.χ. 8130-3).
    aircraft_galley_configuration:
      name: Διαμόρφωση κουζίνας αεροσκάφους
      description: Παρουσία και τύπος εγκαταστάσεων κουζίνας/τροφοδοσίας στην καμπίνα.
    aircraft_installation_location:
      name: Τοποθεσία εγκατάστασης αεροσκαφών
      description: Το σημείο αεροσκάφος όπου εγκαθίσταται ή χρησιμοποιείται το εξάρτημα
        ή το αξεσουάρ.
    aircraft_internet_connection:
      name: Σύνδεση διαδικτύου αεροσκαφών
      description: Υποδεικνύει την παρουσία/είδος σύνδεσης στο διαδίκτυο εντός της
        καμπίνας.
    aircraft_landing_gear_type:
      name: Τύπος συστήματος προσγείωσης αεροσκαφών
      description: Καθορίζει τη διαμόρφωση του συστήματος προσγείωσης του αυτογύρου.
    aircraft_lavatory_configuration:
      name: Διαμόρφωση τουαλέτας αεροσκαφών
      description: Τύπος διαμόρφωσης τουαλέτας επί του σκάφους.
    aircraft_maintenance_program_enrollment:
      name: Εγγραφή σε πρόγραμμα συντήρησης αεροσκαφών
      description: Υποδεικνύει εάν το αεροσκάφος είναι εγγεγραμμένο σε πρόγραμμα συντήρησης
        κινητήρων ή/και άτρακτου και, εάν ναι, ποιος τύπος κάλυψης ισχύει (κινητήρας,
        άτρακτος ή και τα δύο).
    aircraft_operational_certification:
      name: Πιστοποίηση λειτουργίας αεροσκαφών
      description: Καθορίζει τη ρυθμιστική ή επιχειρησιακή βάση πιστοποίησης βάσει
        της οποίας λειτουργεί το αεροσκάφος (εξαρτάται από τη δικαιοδοσία, π.χ. FAA
        Μέρος 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Πιστοποίηση προστατευτικού εξοπλισμού αεροσκαφών
      description: Καθορίζει το αεροπορικό/κανονιστικό ή βιομηχανικό πρότυπο με το
        οποίο είναι πιστοποιημένος ο προστατευτικός εξοπλισμός.
    aircraft_system_application:
      name: Εφαρμογή συστήματος αεροσκαφών
      description: Προσδιορίζει σε ποιο σύστημα ή περιοχή αεροσκάφους ανήκει το εξάρτημα/αξεσουάρ
        (χρησιμοποιείται για περιήγηση και φιλτράρισμα σε διάφορα εξαρτήματα αεροσκάφους).
    airflow_resistance_level:
      name: Επίπεδο αντίστασης στη ροή αέρα
      description: Υποδεικνύει πόσο περιοριστική είναι η σουρντίνα όσον αφορά την
        αντίθλιψη/αντίσταση αέρα.
    airship_envelope_material:
      name: Υλικό περιβλήματος αερόπλοιου
      description: Κύριο υλικό του περιβλήματος (κέλυφος) του αερόπλοιου.
    airsoft_part_type:
      name: Τύπος εξαρτήματος Airsoft
      description: Προσδιορίζει το λειτουργικό εξάρτημα ή τον τύπο αξεσουάρ για όπλα
        airsoft (π.χ. γεμιστήρας, κάννη, χειροφυλακτήρας).
    airworthiness_approval_basis:
      name: Βάση έγκρισης αξιοπλοΐας
      description: Καθορίζει τη βάση έγκρισης/πιστοποίησης για το εξάρτημα, όπου εφαρμόζεται
        (π.χ., PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Δυνατότητα ρύθμισης έντασης συναγερμού
      description: Υποδεικνύει εάν και πώς μπορεί να ρυθμιστεί η ένταση του συναγερμού
        από τον χρήστη.
    alcohol_ink_finish_effect:
      name: Εφέ φινιρίσματος με μελάνι αλκοόλης
      description: Περιγράφει το οπτικό εφέ/φινίρισμα που παράγεται από τη σύνθεση
        μελανιού αλκοόλης (πέραν από το απλό χρώμα), όπως μεταλλικό ή περλέ.
    alignment_aid_style:
      name: Στυλ βοηθήματος ευθυγράμμισης
      description: Περιγράφει τον τύπο των οδηγών ευθυγράμμισης που είναι τυπωμένοι
        ή ενσωματωμένοι στην επιφάνεια του τάπητα (π.χ. ευθεία γραμμή, δείκτες απόστασης).
    alternator_cooling_type:
      name: Τύπος ψύξης εναλλάκτη
      description: Περιγράφει τον τρόπο ψύξης και αερισμού του εναλλάκτη.
    alternator_marine_ignition_protection_rating:
      name: Βαθμός προστασίας ανάφλεξης εναλλάκτη για ναυτιλιακή χρήση
      description: Υποδεικνύει εάν ο εναλλάκτης διαθέτει προστασία ανάφλεξης για τα
        διαμερίσματα κινητήρων θαλάσσης (π.χ. συμβατό με SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Διαμόρφωση τοποθέτησης εναλλάκτη
      description: Καθορίζει τη φυσική διαμόρφωση τοποθέτησης που χρησιμοποιείται
        για τη σύνδεση του εναλλάκτη σε μια βάση κινητήρα.
    alternator_pulley_type:
      name: Τύπος τροχαλίας εναλλάκτη
      description: Καθορίζει τον σχεδιασμό τροχαλίας/συμπλέκτη στον εναλλάκτη (ή υποδεικνύει
        ότι δεν περιλαμβάνεται τροχαλία).
    alternator_regulator_type:
      name: Τύπος ρυθμιστή εναλλάκτη
      description: Υποδεικνύει εάν ο ρυθμιστής τάσης είναι εσωτερικός ή εξωτερικός
        του εναλλάκτη, και εάν ελέγχεται από τον κατασκευαστή πρωτότυπου εξοπλισμού
        (OEM) (έλεγχος μέσω υπολογιστή/PCM).
    alternator_terminal_connection_type:
      name: Τύπος σύνδεσης τερματικού εναλλάκτη
      description: Κύριος τύπος ηλεκτρικής σύνδεσης για τους ακροδέκτες εξόδου/διέγερσης
        του εναλλάκτη για να διασφαλιστεί η συμβατότητα της πλεξούδας καλωδίωσης.
    altitude_suitability:
      name: Καταλληλότητα υψομέτρου
      description: Υποδεικνύει εάν η μπάλα έχει σχεδιαστεί για συγκεκριμένο υψόμετρο,
        το οποίο επηρεάζει την ταχύτητα και την αναπήδηση.
    ambulance_stretcher_mount_type:
      name: Τύπος βάσης φορείου ασθενοφόρου
      description: Καθορίζει τον τύπο συστήματος φόρτωσης/τοποθέτησης φορείου που
        υποστηρίζεται από το ασθενοφόρο.
    american_football_safety_certification:
      name: Πιστοποίηση ασφάλειας αμερικανικού ποδοσφαίρου
      description: Υποδεικνύει τις πιστοποιήσεις ή τα πρότυπα ασφαλείας που αφορούν
        συγκεκριμένα το αμερικανικό ποδόσφαιρο και τα οποία πληροί το προϊόν.
    amplifier_tube_function:
      name: Λειτουργία λυχνίας ενισχυτή
      description: Καθορίζει τον λειτουργικό ρόλο της λυχνίας μέσα σε ένα κύκλωμα
        ενισχυτή οργάνων (π.χ., προενισχυτής έναντι ισχύος).
    analog_synthesizer_cv_gate_i_o:
      name: Αναλογικό συνθεσάιζερ CV/Gate I/O
      description: Υποδεικνύει τους τύπους συνδέσεων τάσης ελέγχου και πύλης που υποστηρίζονται
        για διασύνδεση με modular/αναλογικό εξοπλισμό.
    analog_synthesizer_keybed_configuration:
      name: Διαμόρφωση πλήκτρων αναλογικού συνθεσάιζερ
      description: Περιγράφει εάν το συνθεσάιζερ περιλαμβάνει ενσωματωμένα πλήκτρα
        και, εάν ναι, τον αριθμό των πλήκτρων.
    anchor_configuration:
      name: Διαμόρφωση αγκύρωσης
      description: Υποδεικνύει εάν το σύστημα ανάρτησης χρησιμοποιεί ένα μόνο κεντρικό
        σημείο αγκύρωσης ή πολλαπλά ανεξάρτητα σημεία αγκύρωσης, επηρεάζοντας την
        ποικιλία και την πολυπλοκότητα της εγκατάστασης.
    animal_raising_method:
      name: Μέθοδος εκτροφής ζώων
      description: Περιγράφει τις γεωργικές ή κτηνοτροφικές πρακτικές που χρησιμοποιούνται
        για το ζώο προέλευσης.
    animal_species:
      name: Είδη ζώων
      description: Καθορίζει το ζώο ή το πλάσμα που αναπαριστά το λούτρινο ζωάκι (π.χ.
        αρκούδα, λαγουδάκι, δεινόσαυρος).
    animal_trap_jaw_style:
      name: Στυλ παγίδας ζώων τύπου δόκανο
      description: Διαμόρφωση των σιαγόνων της παγίδας, που επηρεάζει τη δύναμη συγκράτησης
        και την καλή διαβίωση των ζώων.
    animal_trap_type:
      name: Τύπος παγίδας ζώων
      description: Ταξινομεί το μηχανικό στυλ/σχέδιο της παγίδας, επιτρέποντας στους
        αγοραστές να εντοπίζουν γρήγορα την ακριβή μέθοδο παγίδευσης που χρειάζονται
        ή που επιτρέπουν οι κανονισμοί.
    ankle_collar_style:
      name: Στυλ κολάρου αστραγάλου
      description: Περιγράφει το στυλ ή την κατασκευή του κολάρου αστραγάλου ενός
        παπουτσιού, όπως χαμηλό κόψιμο, μεσαίο κόψιμο, ψηλό κόψιμο, γιακάς με κάλτσα
        ή χωρίς κορδόνια, που Influence την υποστήριξη, την εφαρμογή και την αισθητική.
    ankle_guard_protection_level:
      name: Επίπεδο προστασίας προστατευτικού αστραγάλου
      description: Αξιολογεί το συνολικό επίπεδο προστασίας από κραδασμούς που παρέχει
        το προστατευτικό αστραγάλου.
    ankle_strap_padding_type:
      name: Τύπος επένδυσης στο λουράκι αστραγάλου
      description: Περιγράφει το υλικό απορρόφησης κραδασμών ή την προσέγγιση εσωτερικού
        περιθωρίου που χρησιμοποιείται στο εσωτερικό του ιμάντα και επηρεάζει την
        άνεση.
    ankle_strap_type:
      name: Τύπος ιμάντα αστραγάλου
      description: Ταξινομεί την κατασκευή ή το σχεδιασμό ενός λουριού αστραγάλου
        που συνδέει το snowboard.
    ant_farm_habitat_medium_type:
      name: Τύπος υποστρώματος βιότοπου μυρμηγκοφάρμας
      description: Καθορίζει το κύριο μέσο διάνοιξης σήραγγας/παρατήρησης που παρέχεται
        ή απαιτείται από τη μηρμυγκοφάρμα.
    ant_farm_kit_contents:
      name: Περιεχόμενα κιτ μηρμυγκοφάρμας
      description: Προσδιορίζει ποια επιμέρους προϊόντα περιλαμβάνονται στο κιτ της
        φάρμας μυρμηγκιών (π.χ. κοντέινερ ενδιαιτήματος, άμμος/τζελ, δελτίο εξαργύρωσης
        για μυρμήγκια, εργαλεία σίτισης).
    ant_farm_lighting_type:
      name: Τύπος φωτισμού μηρμυγκοφάρμας
      description: Καθορίζει τον ενσωματωμένο φωτισμό/τύπο φωτισμού (εάν υπάρχει)
        που χρησιμοποιείται για την παρατήρηση.
    antenna_fit_type:
      name: Τύπος βάσης κεραίας
      description: Σε ποιον συντελεστή μορφής κεραίας προορίζεται να προσαρμοστεί
        η σφαίρα κεραίας.
    anti_caking_agent:
      name: Αντισυσσωματικός παράγοντας
      description: Καθορίζει τον τύπο του αντισυσσωματικού παράγοντα που προστίθεται
        για την αποφυγή συσσωμάτωσης, πληροφορίες που είναι σημαντικές για την εξέταση
        αλλεργιών και την ακρίβεια της συνταγής.
    anti_g_suit_bladder_material:
      name: Υλικό αεροθαλάμου στολής Anti-G
      description: Υλικό που χρησιμοποιείται για τον/τους εσωτερικό/-ούς διογκώσιμο/-ους
        αεροθάλαμο/-ους της στολής anti-G. Αναφέρετε όλα όσα ισχύουν εάν χρησιμοποιούνται
        πολλαπλά υλικά.
    anti_g_suit_connector_type:
      name: Τύπος συνδέσμου στολής Anti-G
      description: Καθορίζει το στυλ/πρότυπο του συνδέσμου του εύκαμπτου σωλήνα αέρα/πίεσης
        που χρησιμοποιείται για τη διασύνδεση με το αεροσκάφος ή τον ρυθμιστή.
    anti_g_suit_inflation_method:
      name: Μέθοδος πλήρωσης στολής Anti-G
      description: Υποδεικνύει τον τρόπο συμπίεσης των αεροθαλάμων της στολής για
        την παροχή προστασίας από δυνάμεις G.
    anti_g_suit_size_system:
      name: Σύστημα μεγεθών στολής Anti-G
      description: Πρότυπο μεγέθους που χρησιμοποιείται για τον καθορισμό του συστήματος
        μεγέθους/εφαρμογής της στολής.
    anti_reverse_type:
      name: Τύπος αντιεπιστροφής
      description: Καθορίζει τον τύπο του παρεχόμενου μηχανισμού αντιεπιστροφής, ο
        οποίος επηρεάζει τη ρύθμιση του αγκίστρου και το back-play.
    anti_theft_feature:
      name: Λειτουργία κατά της κλοπής
      description: Υποδεικνύει εάν η βάση/θήκη παρέχει αποτροπή κλοπής, όπως συνδετήρες
        κλειδώματος ή σχεδιασμό ανθεκτικό σε παραβίαση.
    antique_gun_ignition_system:
      name: Σύστημα πυροδότησης παλαιού πυροβόλου όπλου
      description: Καθορίζει το ιστορικό σύστημα βολής/πυροδότησης που χρησιμοποιείται
        από το παλαιό πυροβόλο όπλο.
    apple_variety:
      name: Ποικιλία μήλου
      description: Καθορίζει την καλλιέργεια ή την ποικιλία του μήλου (π.χ. Gala,
        Fuji, Granny Smith), βοηθώντας τους πελάτες να επιλέξουν βάσει γεύσης, υφής
        και μαγειρικής χρήσης.
    applique_edge_finish:
      name: Φινίρισμα άκρων απλικέ
      description: Περιγράφει τον τρόπο φινιρίσματος των άκρων, επηρεάζοντας την εμφάνιση
        και την αντοχή στο ξέφτισμα.
    arbor_type:
      name: Τύπος άξονα στήριξης
      description: Ταξινομεί τον κύλινδρο ανάλογα με τον σχεδιασμό του άξονα της μπομπίνας,
        ο οποίος επηρεάζει την ταχύτητα ανάκτησης της πετονιάς, την χωρητικότητα υποστήριξης
        και τη μνήμη της πετονιάς.
    archery_accessory_type:
      name: Τύπος αξεσουάρ τοξοβολίας
      description: Καθορίζει τον τύπο του εξαρτήματος που προορίζεται για εργαλεία
        τοξοβολίας, ώστε ο αγοραστής να μπορεί γρήγορα να φιλτράρει τα προϊόντα.
    archery_part_type:
      name: Τύπος εξαρτήματος τοξοβολίας
      description: Προσδιορίζει τον συγκεκριμένο υλικό εξοπλισμό ή ανταλλακτικό που
        πωλείται (π.χ., ανυψωτικό, άκρο, χορδή τόξου), επιτρέποντας το ακριβές φιλτράρισμα
        χωρίς να διαταράσσει το δέντρο κατηγοριών.
    archery_range_accessory_type:
      name: Τύπος αξεσουάρ για πεδίο τοξοβολίας
      description: Ταξινομεί το συγκεκριμένο είδος αξεσουάρ που χρησιμοποιείται σε
        ένα σκοπευτήριο τοξοβολίας, επιτρέποντας στον αγοραστή να φιλτράρει γρήγορα
        για το ακριβές προϊόν που χρειάζεται.
    archery_target_features:
      name: Χαρακτηριστικά στόχου τοξοβολίας
      description: Παραθέτει εξειδικευμένα χαρακτηριστικά απόδοσης ή ευκολίας που
        δεν καλύπτονται από άλλα χαρακτηριστικά (π.χ. αυτοθεραπευόμενος αφρός, λαβή
        μεταφοράς).
    archery_tool_type:
      name: Τύπος εργαλείου τοξοβολίας
      description: Κατατάσσει το συγκεκριμένο είδος εργαλείου ή εξοπλισμού τοξοβολίας.
    armband_features:
      name: Χαρακτηριστικά περιβραχιόνιου
      description: Παραθέτει ειδικές λειτουργικές ή οπτικές δυνατότητες που αναβαθμίζουν
        το περιβραχιόνιο.
    armguard_style:
      name: Τύπος προστατευτικού βραχίονα
      description: Ορίζει το στυλ κατασκευής ή τον συντελεστή μορφής του προστατευτικού
        βραχίονα, παρέχοντας ενδιαφέρουσες πληροφορίες σχετικά με την κάλυψη και την
        παραδοσιακή έναντι της σύγχρονης εμφάνισης.
    armor_protection_type:
      name: Τύπος προστασίας θωράκισης
      description: Τύπος προστασίας που παρέχεται από το σύστημα θωράκισης του οχήματος.
    armrest_adjustability:
      name: Ρύθμιση υποστήριξη μπράτσων
      description: Ορίζει τη δυνατότητα ρύθμισης διαστάσεων και τη διαμόρφωση των
        μπράτσων της καρέκλας (π.χ., σταθερά, 2D, 3D, αναδιπλούμενα).
    armrest_type:
      name: Τύπος υποβραχιόνιου
      description: Περιγράφει την παρουσία και τη δυνατότητα ρύθμισης των μπράτσων
        στην καρέκλα (π.χ., χωρίς μπράτσα, σταθερά, ρυθμιζόμενα, αφαιρούμενα).
    arrow_bolt_point_type:
      name: Τύπος αιχμής βέλους/βαλλίστρας
      description: Ορίζει το στυλ της αιχμής ή της μύτης που είναι εγκατεστημένη σε
        ένα βέλος ή ένα μπουλόνι.
    arrow_component_type:
      name: Τύπος εξαρτήματος βέλους
      description: Κατατάσσει το συγκεκριμένο εξάρτημα ή αξεσουάρ του βέλους (π.χ.
        ένθετο, περίβλημα, δακτύλιος, κόλλα κ.λπ.), ώστε οι πελάτες να μπορούν να
        φιλτράρουν τα προϊόντα χωρίς την ανάγκη πολλών επιπλέον υποκατηγοριών.
    arrow_containment_level:
      name: Επίπεδο συγκράτησης βέλους
      description: Περιγράφει αν το στήριγμα βέλους περιβάλλει πλήρως, μερικώς ή δεν
        περιβάλλει καθόλου το βέλος.
    arrow_fletching_orientation:
      name: Κατεύθυνση πτερώματος βέλους
      description: Καθορίζει τον προσανατολισμό ή την εκτροπή του πτερώματος, όπως
        αριστερόστροφη, δεξιόστροφη ή ελικοειδής διάταξη, η οποία καθορίζει τη φορά
        περιστροφής του βέλους.
    arrow_nock_groove_size:
      name: Μέγεθος εγκοπής nock του βέλους
      description: Καθορίζει την ταξινόμηση μεγέθους της συμβολοσειρά εγκοπής/λαιμού
        του nock, προσδιορίζοντας τη συμβατότητα με διαφορετικές διαμέτρους χορδής
        τόξου.
    arrow_nock_type:
      name: Τύπος βέλους
      description: Σχεδιασμός/στυλ της εγκοπής του βέλους που εφάπτεται με τη χορδή
        του τόξου.
    arrow_rest_style:
      name: Στυλ στηρίγματος βέλους
      description: Καθορίζει το λειτουργικό στυλ/μηχανισμό του στηρίγματος βέλους,
        όπως drop-away, blade ή whisker biscuit. Το στυλ καθορίζει τον τρόπο με τον
        οποίο το στήριγμα υποστηρίζει, συγκρατεί και απελευθερώνει το βέλος και αποτελεί
        βασικό κριτήριο διαφοροποίησης των προϊόντων από τους αγοραστές.
    arrow_shaft_compatibility:
      name: Συμβατότητα στελέχους βέλους
      description: Υποδεικνύει το πρότυπο του σωλήνα/δακτυλίου του βέλους στο οποίο
        εφαρμόζει το φωτιζόμενο nock (π.χ. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Στυλ μύτης εργαλείου τέχνης/χειροτεχνίας
      description: Περιγράφει το σχήμα/προφίλ της άκρης εργασίας (π.χ. αιχμηρή ή στρογγυλεμένη
        σε μορφή σφαίρας), υποδεικνύοντας τον τύπο των αποτυπωμάτων/χαράξεων που δημιουργεί.
    art_ink_lightfastness_rating:
      name: Βαθμολογία αντοχής μελανιού στο φως
      description: Υποδεικνύει την αντίσταση του μελανιού στο ξεθώριασμα όταν εκτίθεται
        στο φως, η οποία συνήθως εκφράζεται μέσω τυπικών αξιολογήσεων.
    art_ink_opacity:
      name: Αδιαφάνεια μελανιού τέχνης
      description: Καθορίζει το επίπεδο κάλυψης του μελανιού μόλις εφαρμοστεί.
    art_security_rating:
      name: Βαθμολογία ασφαλείας ART
      description: Καθορίζει τη βαθμολογία αστέρων Dutch ART (1-5 αστέρια) που έλαβε
        η κλειδαριά.
    artichoke_cut:
      name: Κοπή αγκινάρας
      description: Υποδεικνύει ποιο μέρος ή ποιο παρασκεύασμα της αγκινάρας προσφέρεται
        (π.χ. ολόκληρο, καρδιά, κάτω μέρος), ώστε ο πελάτης να κατανοήσει την απόδοση
        και την προβλεπόμενη γαστρονομική εφαρμογή.
    artichoke_variety:
      name: Ποικιλία αγκινάρας
      description: Καθορίζει την καλλιέργεια ή τη βοτανική ποικιλία της αγκινάρας,
        βοηθώντας τους αγοραστές να διακρίνουν μεγέθη, χρώματα, γεύσεις και μαγειρικές
        χρήσεις.
    articulation_features:
      name: Χαρακτηριστικά άρθρωσης
      description: Υποδεικνύει εάν το μοντέλο δεινοσαύρου έχει κινητά μέρη (γνάθος,
        άκρα, ουρά που μπορούν να κινηθούν) και γενική δυνατότητα κινήσεως.
    artificial_bait_form:
      name: Μορφή τεχνητού δολώματος
      description: Υποδεικνύει τη φυσική μορφή ή το στυλ παρουσίασης του δολώματος
        ή του τεχνητού δολώματος.
    asa_mounting_type:
      name: Τύπος τοποθέτησης ASA
      description: Υποδεικνύει το στυλ της διεπαφής ή το πρότυπο στήριξης του προσαρμογέα
        πηγής αέρα (ASA) που χρησιμοποιεί το drop forward (π.χ. ολισθητήρας τύπου
        dovetail, ράγα, άμεση τοποθέτηση).
    ascender_descender_type:
      name: Τύπος αναβατήρα/καταβατήρα
      description: Ταξινομεί τον τύπο της αναρριχητικής συσκευής ανόδου ή του καταβατήρα
        για ακριβέστερο φιλτράρισμα.
    aspiration_type:
      name: Τύπος αναρρόφησης
      description: Υποδεικνύει τον τρόπο αναρρόφησης/υποστήριξης του κινητήρα.
    assembly_state:
      name: Κατάσταση συναρμολόγησης
      description: Υποδεικνύει αν το ντουλάπι αποστέλλεται έτοιμο για συναρμολόγηση,
        προ-συναρμολογημένο ή σε κάποια άλλη μορφή.
    assistance_mechanism:
      name: Βοηθητικός μηχανισμός
      description: Καθορίζει τυχόν ενσωματωμένο σύστημα υποβοήθησης ή αντίστασης που
        παρέχει ο πύργος γυμναστικής για έλξεις, βυθίσεις ή άλλες ασκήσεις.
    atemoya_cultivar:
      name: Ποικιλία ατεμόγια
      description: Καθορίζει την ονομαστική ποικιλία (cultivar) του φρούτου ατεμόγια,
        επιτρέποντας στους αγοραστές να επιλέγουν φρούτα με συγκεκριμένα χαρακτηριστικά
        γεύσης, μεγέθους ή σπόρων.
    athletic_cup_size:
      name: Μέγεθος αθλητικού προστατευτικού (σπασουάρ)
      description: Υποδεικνύει το μέγεθος που έχει καθοριστεί από τον κατασκευαστή
        του προστατευτικού για να εξασφαλίσει τη σωστή εφαρμογή του αθλητή.
    attachment_position:
      name: Θέση προσάρτησης
      description: Καθορίζει το σημείο στη σέλα ή στον αναβάτη που έχει σχεδιαστεί
        για να στερεωθεί η τσάντα.
    attractant_scent_profile:
      name: Προφίλ οσμής ουσίας προσέλκυσης
      description: Περιγράφει τη συγκεκριμένη οσμή ή γεύση που χρησιμοποιείται για
        να προσελκύσει την άγρια ζωή ή να καλύψει την ανθρώπινη μυρωδιά.
    atv_utv_intended_use:
      name: Προβλεπόμενη χρήση ATV/UTV
      description: Κύρια προβλεπόμενη χρήση/στυλ του ATV/UTV.
    audio_channel_configuration:
      name: Διαμόρφωση καναλιού ήχου
      description: Ο αριθμός των διακριτών καναλιών ήχου που υποστηρίζει ο ισοσταθμιστής/DSP
        (ψηφιακός επεξεργαστής σήματος), όπως στερεοφωνικό 2 καναλιών, 4 κανάλια εμπρός/πίσω
        ή 6 κανάλια.
    audio_inputs:
      name: Είσοδοι ήχου
      description: Καθορίζει τους τύπους εισόδων ήχου που είναι διαθέσιμοι για δειγματοληψία/εγγραφή
        (π.χ. γραμμή 1/4", XLR, 3,5 mm, προενισχυτής μικροφώνου, phono).
    audio_output:
      name: Έξοδος ήχου
      description: Υποδεικνύει εάν το παιχνίδι παρέχει ήχο και πώς παρέχεται ο ήχος.
    audio_outputs:
      name: Έξοδοι ήχου
      description: Καθορίζει τις διαθέσιμες εξόδους ήχου, συμπεριλαμβανομένων των
        κύριων εξόδων και τυχόν αναθέσιμων/βοηθητικών (aux) εξόδων.
    audio_playback_source:
      name: Πηγή αναπαραγωγής ήχου
      description: Κύριες πηγές πολυμέσων από τις οποίες μπορεί να αναπαράγει μουσική
        το σετ καραόκε.
    autograph_authentication:
      name: Πιστοποίηση γνησιότητας αυτόγραφου
      description: Υποδεικνύει την κατάσταση ή τον τύπο πιστοποίησης γνησιότητας για
        μια υπογραφή στην κάρτα.
    autograph_format:
      name: Μορφή αυτόγραφου
      description: Περιγράφει εάν η υπογραφή είναι πρωτότυπο χειρόγραφο αυτόγραφο,
        σφραγισμένο/τυπωμένο φαξ ή επιγραφή/πρόσθετο.
    autogyro_cockpit_enclosure:
      name: Κάλυπτρο πιλοτηρίου αυτόγυρου
      description: Καθορίζει αν το πιλοτήριο είναι ανοικτό ή κλειστό.
    available_firing_modes:
      name: Διαθέσιμη λειτουργίες βολής
      description: Παραθέτει τις επιλέξιμες λειτουργίες βολής που υποστηρίζει ο δείκτης
        εξ αρχής.
    avocado_variety:
      name: Ποικιλία αβοκάντο
      description: Καθορίζει την καλλιέργεια ή την ποικιλία του αβοκάντο, βοηθώντας
        τους αγοραστές να διακρίνουν τις διαφορές στη γεύση, την υφή, το μέγεθος και
        το περιεχόμενο λαδιού.
    award_customization_included:
      name: Περιλαμβάνεται προσαρμογή βραβείου
      description: Υποδεικνύει ποιες δυνατότητες εξατομίκευσης/προσαρμογής περιλαμβάνονται
        στην αγορά βραβείου.
    award_material:
      name: Υλικό βραβείων
      description: Καθορίζει το κύριο υλικό ή τα κύρια υλικά του αντικειμένου βράβευσης
        (κύπελλο, πλακέτα, μετάλλιο, κονκάρδα, μεταλλικά στοιχεία κορδέλας).
    award_mounting_display_type:
      name: Τύπος τοποθέτησης/εμφάνισης βραβείων
      description: Καθορίζει πώς προορίζεται να εμφανιστεί ή να τοποθετηθεί το βραβείο
        (τοίχου vs επιτραπέζιο vs φορετό).
    award_plaque_plate_material:
      name: Υλικό πλάκας βραβείων
      description: Καθορίζει το υλικό της πινακίδας ονόματος/πλάκας χάραξης που είναι
        προσαρτημένη στην πλακέτα (διακριτό από το υλικό της βάσης).
    award_ribbon_attachment_type:
      name: Τύπος προσάρτησης κορδέλας βραβείου
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να προσαρτηθεί ή να
        φορεθεί η κορδέλα.
    award_ribbon_imprint_method:
      name: Μέθοδος σφραγίδας κορδέλας βραβείου
      description: Καθορίζει τον τρόπο εφαρμογής κειμένου/γραφικών στην κορδέλα.
    award_ribbon_material:
      name: Υλικό κορδέλας βραβείων
      description: Κύριο υλικό του υφάσματος της κορδέλας (π.χ. σατέν, πολυεστέρας).
    award_ribbon_placement_title:
      name: Τοποθέτηση/τίτλος κορδέλας βραβείου
      description: Η τυπική τοποθέτηση ή ο τίτλος που αποδίδεται από την κορδέλα (π.χ.
        1η θέση, συμμετέχοντας).
    axle_compatibility:
      name: Συμβατότητα άξονα
      description: Υποδεικνύει το πρότυπο άξονα που δέχεται ο τροχός, διασφαλίζοντας
        τη συμβατότητα με τον σκελετό και το πιρούνι του ποδηλάτου.
    back_beam_type:
      name: Τύπος πίσω δοκού
      description: Τύπος/δυνατότητα ρύθμισης της πίσω δοκού (π.χ., απλή ή ρυθμιζόμενη
        καθ' ύψος).
    back_design:
      name: Σχεδιασμός πλάτης
      description: Καθορίζει αξιοσημείωτες κατασκευές πλάτης σε ρούχα που επηρεάζουν
        το στυλ και την υποστήριξη.
    back_panel_type:
      name: Τύπος πίσω πάνελ
      description: Καθορίζει το στυλ ή το υλικό του πίσω πάνελ του ντουλαπιού, το
        οποίο επηρεάζει την ορατότητα της έκθεσης και την αισθητική προσαρμογή με
        τη διακόσμηση.
    back_sides_material:
      name: Υλικό πίσω μέρους και πλευρών
      description: Καθορίζει το υλικό που χρησιμοποιείται για το πίσω μέρος και τα
        πλαϊνά του σώματος της κλασικής κιθάρας.
    backing_type:
      name: Τύπος υποστρώματος
      description: Περιγράφει το στυλ βάσης/στερέωσης του διακοσμητικού στρας που
        πωλείται (για αυτοκόλλητα προϊόντα).
    backup_camera_mounting_location:
      name: Καθορίζει τη θέση τοποθέτησης της κάμερας οπισθοπορείας, επηρεάζοντας
        το πεδίο ορατότητας και την κάλυψη της εικόνας
      description: Υποδεικνύει την προβλεπόμενη τοποθεσία εγκατάστασης στο όχημα για
        τη δημιουργία αντιγράφων ασφαλείας κάμερας.
    backup_camera_video_interface:
      name: Διεπαφή βίντεο της κάμερας οπισθοπορείας
      description: Καθορίζει την έξοδο/διεπαφή/σύνδεσμο βίντεο που χρησιμοποιεί η
        κάμερα οπισθοπορείας για σύνδεση με οθόνη, DVR ή κεντρική μονάδα (π.χ. σύνθετο
        RCA, OEM LVDS, IP μέσω Ethernet).
    badminton_set_components_included:
      name: Περιλαμβάνονται επιμέρους προϊόντα σετ μπάντμιντον
      description: Καταγράφει τα επιμέρους αντικείμενα που περιλαμβάνονται σε ένα
        σετ μπάντμιντον.
    bag_attachment_method:
      name: Μέθοδος προσάρτησης τσάντας
      description: Υποδεικνύει τον κύριο τρόπο στερέωσης του ασκού/θήκης ενυδάτωσης
        σε άλλο εξοπλισμό (π.χ. σύστημα MOLLE, θηλιά ζώνης, καραμπίνερ).
    bag_case_carrying_style:
      name: Στυλ τσάντας/θήκης μεταφοράς
      description: Καθορίζει τον κύριο συνολικό τύπο μεταφοράς της θήκης/τσάντας (gigbag),
        δηλαδή τον τρόπο με τον οποίο είναι σχεδιασμένη να μεταφέρεται.
    bag_cover_material:
      name: Υλικό καλύμματος τσάντας
      description: Καθορίζει το υλικό του καλύμματος της τσάντας (εξωτερικό κάλυμμα),
        το οποίο επηρεάζει την ανθεκτικότητα, το κράτημα και την εμφάνιση.
    bag_embellishment:
      name: Διακόσμηση τσάντας
      description: Περιγράφει εξέχοντα διακοσμητικά στοιχεία που εφαρμόζονται στο
        εξωτερικό της τσάντας, όπως φούντες, τρουκ ή καπιτονέ ραφή.
    bag_fill_medium:
      name: Μέσο πλήρωσης σάκου
      description: Προσδιορίζει την ουσία που χρησιμοποιείται για την πλήρωση ή την
        πίεση του σάκου (π.χ. αέρας, νερό, άμμος).
    bag_material:
      name: Υλικό σάκου
      description: Υλικό του αερόσακου/ασκού.
    bag_padding_level:
      name: Επίπεδο εσωτερικού περιθωρίου τσάντας
      description: Καθορίζει τον βαθμό ή το στυλ του εσωτερικού περιθωρίου που ενσωματώνεται
        στην τσάντα ή το κάλυμμα.
    bag_size_descriptor:
      name: Περιγραφικός δείκτης μεγέθους σάκου
      description: Εμπορική κατηγορία μεγέθους για την τσάντα bucket (π.χ. mini, large)
        που συμπληρώνει τις ακριβείς διαστάσεις.
    bagel_size:
      name: Μέγεθος Bagel
      description: Καθορίζει το γενικό μέγεθος του μπέιγκελ, π.χ. mini, λεπτό, τυπικό,
        μεγάλο, εξαιρετικά μεγάλο ή jumbo.
    bagpipe_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ γκάιντας
      description: Παραθέτει τα κύρια εξαρτήματα/αξεσουάρ που περιλαμβάνονται στις
        γκάιντες (πέρα από τους κεντρικούς σωλήνες), για παράδειγμα θήκη, αυλό εξάσκησης,
        κάλυμμα, κορδόνια, έλεγχο υγρασίας.
    bagpipes_playing_mode:
      name: Λειτουργία παιξίματος γκάιντας
      description: Πώς τροφοδοτείται το όργανο με αέρα όταν παίζετε.
    bait_compatibility:
      name: Συμβατότητα δολώματος
      description: Παραθέτει τους τύπους δολωμάτων για τους οποίους έχει σχεδιαστεί
        να λειτουργεί το παρελκόμενο πέλλετ, βοηθώντας τους αλιείς να διασφαλίσουν
        ότι ο επιλεγμένος εξοπλισμός αντιστοιχεί στο προτιμώμενο δόλωμα.
    bait_species:
      name: Είδη δολώματος
      description: Προσδιορίζει τον κύριο οργανισμό που προσφέρεται ως δόλωμα, βοηθώντας
        τους ψαράδες να διασφαλίσουν τη νομιμότητα και την αποτελεσματικότητα του
        είδους-στόχου.
    baking_chip_form:
      name: Μορφή baking chip
      description: Περιγράφει το φυσικό μέγεθος ή ή το σχήμα των σταγόνων ψησίματος,
        το οποίο επηρεάζει τη συμπεριφορά τήξης και την εμφάνιση της συνταγής.
    balance_board_style:
      name: Στυλ σανίδας ισορροπίας
      description: Ταξινομεί τις σανίδες ισορροπίας με βάση τον μηχανισμό ή το στυλ
        κατασκευής τους, για να υποδείξει τον τρόπο που κινείται η σανίδα και την
        παρεχόμενη εκπαιδευτική πρόκληση.
    balance_cushion_accessories_included:
      name: Περιλαμβάνονται άλλα αξεσουάρ μαξιλαριού ισορροπίας
      description: Παραθέτει τυχόν αξεσουάρ που συσκευάζονται με το μαξιλάρι, επιτρέποντας
        στον αγοραστή να συγκρίνει την αξία του σετ.
    balance_type:
      name: Τύπος ισορροπίας
      description: Υποδεικνύει την κατάσταση/βαθμό εξισορρόπησης του άξονα μετάδοσης
        κίνησης όπως πωλείται (π.χ., εργοστασιακή εξισορρόπηση, εξισορρόπηση υψηλής
        ταχύτητας, χωρίς εξισορρόπηση).
    ball_bladder_material:
      name: Υλικό αεροθαλάμου μπάλας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τον εσωτερικό αεροθάλαμο
        της μπάλας χάντμπολ, το οποίο επηρεάζει τη συγκράτηση του αέρα, την αναπήδηση
        και τη συνολική ανθεκτικότητα.
    ball_certification:
      name: Πιστοποίηση μπάλας
      description: Υποδεικνύει επίσημες πιστοποιήσεις απόδοσης ή έγκριση που έχει
        λάβει η μπάλα.
    ball_construction:
      name: Κατασκευή μπάλας
      description: Υποδεικνύει τη μέθοδο κατασκευής που χρησιμοποιήθηκε για τη σύνδεση
        των τμημάτων της μπάλας, η οποία επηρεάζει την ανθεκτικότητα, την αφή, την
        απορρόφηση νερού και την τιμή.
    ball_core_construction:
      name: Κατασκευή πυρήνα μπάλας
      description: Παρέχει λεπτομέρειες για την εσωτερική δομή της μπάλας, επηρεάζοντας
        την επαναφορά και την αίσθηση.
    ball_core_type:
      name: Τύπος πυρήνα μπάλας
      description: Υποδεικνύει την εσωτερική κατασκευή της μπάλας, η οποία επηρεάζει
        την αναπήδηση και τη διανομή βάρους.
    ball_cup_game_included_pieces:
      name: Κομμάτια παιχνιδιού με μπάλα και κύπελλο που περιλαμβάνονται
      description: Προσδιορίζει ποια εξαρτήματα περιλαμβάνονται στη συσκευασία του
        προϊόντος για ένα παιχνίδι με μπάλα και κύπελλο.
    ball_drilling_state:
      name: Κατάσταση διάνοιξης οπών μπάλας
      description: Υποδεικνύει εάν έχουν διανοιχθεί οπές για τα δάχτυλα στην μπάλα
        και, εάν ναι, σε ποιο βαθμό.
    ball_holder_type:
      name: Τύπος βάσης μπάλας
      description: Προσδιορίζει το δομικό στυλ ή τον συντελεστή μορφής της θήκης της
        μπάλας.
    ball_pit_ball_surface_finish:
      name: Φινίρισμα επιφάνειας μπάλας μπαλοπισίνας
      description: Περιγράφει το απτικό/οπτικό φινίρισμα της επιφάνειας της μπάλας,
        το οποίο επηρεάζει το κράτημα, την αίσθηση του παιχνιδιού και τον καθαρισμό.
    ball_pit_safety_features:
      name: Χαρακτηριστικά ασφαλείας μπαλοπισίνας
      description: Χαρακτηριστικά σχεδιασμού που σχετίζονται με την ασφάλεια και αφορούν
        πισίνες με μπάλες.
    ball_pump_accessory_type:
      name: Τύπος αξεσουάρ αντλίας με μπάλες
      description: Ορίζει το συγκεκριμένο είδος αξεσουάρ αντλίας με μπάλες, οι έμποροι
        να μπορούν να επισημαίνουν μανόμετρα, σωλήνες, λιπαντικά και άλλα πρόσθετα
        εντός μιας ενιαίας κύριας κατηγορίας.
    ball_return_mechanism:
      name: Μηχανισμός επιστροφής μπάλας
      description: Καθορίζει το στυλ επιστροφής της μπάλας που ενσωματώνεται στον
        τάπητα, εάν υπάρχει.
    ball_return_type:
      name: Τύπος επιστροφής μπάλας
      description: Τύπος συστήματος τσέπης/επιστροφής που συλλέγει μπάλες κατά τη
        διάρκεια του παιχνιδιού.
    ball_speed_rating:
      name: Βαθμολογία ταχύτητας μπάλας
      description: Κατηγορία ταχύτητας ορισμένη από τον κατασκευαστή, που υποδεικνύει
        πόσο γρήγορα κινείται η μπάλα υπό κανονικές συνθήκες.
    ball_surface_texture:
      name: Υφή επιφάνειας μπάλας
      description: Περιγράφει την εξωτερική υφή ή το μοτίβο ραβδώσεων των μπαλών,
        το οποίο μπορεί να επηρεάσει την πρόσφυση και την αισθητική.
    ball_surface_type:
      name: Τύπος επιφάνειας μπάλας
      description: Περιγράφει το εξωτερικό φινίρισμα ή την αντικραδασμική προστασία
        της μπάλας για να υποδείξει την αίσθηση πρόσκρουσης και το κράτημα.
    ballonet_configuration:
      name: Διαμόρφωση μπαλονιού
      description: Τύπος/διαμόρφωση συστήματος μπαλονιών που χρησιμοποιείται για τη
        διαχείριση της αντιστάθμισης και της πίεσης (για μη άκαμπτα/ημί-άκαμπτα αερόπλοια).
    balloon_closure_valve_type:
      name: Τύπος κλεισίματος/βαλβίδας μπαλονιού
      description: Προσδιορίζει πώς σφραγίζεται το μπαλόνι μετά το φούσκωμα (π.χ.
        δέσιμο, αυτοσφραγιζόμενη βαλβίδα).
    balloon_kit_finish:
      name: Φινίρισμα κιτ μπαλονιών
      description: Περιγράφει το επιφανειακό/οπτικό φινίρισμα των μπαλονιών που περιλαμβάνονται
        στο κιτ.
    balloon_kit_material:
      name: Υλικό κιτ μπαλονιών
      description: Καθορίζει το κύριο υλικό των μπαλονιών που περιλαμβάνονται στο
        κιτ.
    banana_variety:
      name: Ποικιλία μπανάνας
      description: Καθορίζει την ποικιλία ή τον τύπο της μπανάνας που προσφέρεται.
    banjo_head_type:
      name: Τύπος μεμβράνης Banjo
      description: Τύπος/υλικό της μεμβράνης Banjo , που επηρεάζει τη φωτεινότητα,
        την ένταση και την αίσθηση.
    banjo_neck_material:
      name: Τύπος αυχένα banjo
      description: Υλικό του λαιμού, που επηρεάζει την αίσθηση, τη σταθερότητα και
        τον τόνο.
    banjo_pickup_configuration:
      name: Διαμόρφωση μαγνήτη (pickup) Banjo
      description: Εάν το banjo περιλαμβάνει ενσωματωμένο μαγνήτη και ποια γενική
        τεχνολογία μαγνήτη χρησιμοποιεί.
    banjo_rim_material:
      name: Υλικό χείλους banjo
      description: Υλικό του χείλους/δοχείου (το κυκλικό σώμα), το οποίο επηρεάζει
        έντονα τον τόνο και το βάρος.
    banjo_tone_ring_type:
      name: Τύπος δαχτυλιδιού τόνου banjo
      description: Καθορίζει τη σχεδίαση/οικογένεια υλικού του δακτυλίου τόνου του
        Banjo που διαμορφώνει το ηχόχρωμα και την ένταση.
    banjo_tuning_machine_type:
      name: Τύπος μηχανής κουρδίσματος/συντονισμού banjo
      description: Τύπος κουρδιστήρων/διατάξεων συντονισμού που χρησιμοποιούνται στο
        banjo.
    banknote_authentication_grading:
      name: Γνησιότητα/ταξινόμησης τραπεζογραμματίων
      description: Υπηρεσία τρίτου μέρους (εάν υπάρχει) που πιστοποίησε/διαβάθμισε
        το τραπεζογραμμάτιο.
    banknote_grade:
      name: Διαβάθμιση τραπεζογραμματίου
      description: Τυποποιημένη διαβάθμιση τραπεζογραμματίου σε κλίμακα συλλογής χαρτονομισμάτων.
    banknote_holder_type:
      name: Τύπος θήκης τραπεζογραμματίου
      description: Υποδεικνύει το πλαίσιο της φυσικής κατάστασης του τραπεζογραμματίου
        (π.χ. ελεύθερο έναντι θήκης διαβάθμισης).
    banknote_material:
      name: Υλικό τραπεζογραμματίου
      description: Κύριο υπόστρωμα/υλικό του τραπεζογραμματίου.
    banknote_security_features:
      name: Χαρακτηριστικά ασφαλείας τραπεζογραμματίου
      description: Σημαντικά χαρακτηριστικά ασφαλείας/σχεδιασμού που φέρει το τραπεζογραμμάτιο.
    banknote_serial_number_type:
      name: Τύπος σειριακού αριθμού τραπεζογραμματίου
      description: Υποδεικνύει εάν ο σειριακός αριθμός υπάρχει ή/και έχει ειδικά χαρακτηριστικά
        συλλεκτικότητας (όχι τον πραγματικό αριθμό).
    banner_display_location:
      name: Τοποθεσία εμφάνισης banner
      description: Καθορίζει το προβλεπόμενο πλαίσιο τοποθέτησης για το banner (π.χ.
        πόρτα, τοίχος, φόντο τραπεζιού).
    banner_hanging_hardware_type:
      name: Τύπος υλικού εξοπλισμού ανάρτησης banner
      description: Καθορίζει τον κύριο εξοπλισμό ανάρτησης/προσάρτησης που είναι ενσωματωμένος
        ή περιλαμβάνεται στο banner (π.χ. δακτύλιοι, υποδοχή κονταριού, σχοινί).
    banner_message_type:
      name: Τύπος μηνύματος banner
      description: Υποδεικνύει εάν το κείμενο/μήνυμα του banner είναι προεκτυπωμένο
        (σταθερό) ή κενό/εξατομικεύσιμο.
    banner_shape:
      name: Σχήμα μπάνερ
      description: Καθορίζει το συνολικό σχήμα/κοπή του banner για φιλάθλους.
    banquette_configuration:
      name: Διαμόρφωση πάγκου
      description: Συνολικά σχήματα ή προσανατολισμός του πάγκου.
    bar_coating:
      name: Επικάλυψη ράβδου
      description: Προσδιορίζει την εξωτερική βρώσιμη επίστρωση που έχει εφαρμοστεί
        στη μπάρα, εάν υπάρχει.
    bar_pad_style:
      name: Στυλ μαξιλαριού μπάρας
      description: Στυλ σχεδιασμού του μαξιλαριού μπάρας και της κατασκευής του καλύμματος.
    bar_texture:
      name: Υφή μπάρας
      description: Περιγράφει τη συνολική υφή ή το τμήμα της μπάρας.
    barb_type:
      name: Τύπος καρφιού
      description: Υποδεικνύει εάν το αγκίστρι έχει καρφί και τη μορφή του.
    barbell_finish:
      name: Φινίρισμα μπάρας άρσης βαρών
      description: Περιγράφει λεπτομερώς την προστατευτική ή αισθητική επιφανειακή
        επεξεργασία/επίστρωση που εφαρμόζεται στην μπάρα ή/και στις θήκες, η οποία
        επηρεάζει την αντοχή στη διάβρωση, την αίσθηση πρόσφυσης και την τιμή.
    barbell_knurling_pattern:
      name: Μοτίβο αυλάκωσης μπάρας
      description: Περιγράφει το στυλ και τον βαθμό επιθετικότητας της χάραξης (knurling)
        στο σημείο λαβής της μπάρας, συμπεριλαμβανομένων των ειδικών σημάνσεων για
        powerlifting ή weightlifting.
    barista_suitability:
      name: Καταλληλότητα για barista
      description: Περιγράφει εάν το προϊόν έχει σχεδιαστεί για την παρασκευή καφέ
        και την παρασκευή αφρού.
    barre_rail_configuration:
      name: Διαμόρφωση μπάρας χορού
      description: Υποδεικνύει τον αριθμό των οριζόντιων δοκών που παρέχονται με την
        μπάρα μπαλέτου.
    barrel_or_cask_type:
      name: Τύπος βαρελιού
      description: Καθορίζει τον τύπο του βαρελιού που χρησιμοποιήθηκε για την παλαίωση
        ή το φινίρισμα της τεκίλας (π.χ. αμερικανική δρυς, ex-bourbon, βαρέλι sherry).
    barrel_profile:
      name: Προφίλ βαρελιού
      description: Περιγράφει το συνολικό σχήμα ή την ισορροπία του σώματος του βέλους.
    barrel_thread_standard:
      name: Πρότυπο σπειρώματος βαρελιού
      description: Προσδιορίζει το σπείρωμα της κάννης που χρησιμοποιείται στον δείκτη
        για συμβατότητα με τις κάννες δευτερογενούς αγοράς.
    base_anchoring_method:
      name: Μέθοδος αγκύρωσης βάσης
      description: Προσδιορίζει τον τρόπο με τον οποίο η βάση στερεώνεται στο έδαφος,
        υποδεικνύοντας την καταλληλότητά της για διαφορετικές επιφάνειες και συνθήκες
        χρήσης.
    base_ballast_method:
      name: Μέθοδος έρματος βάσης
      description: Υποδεικνύει πώς (ή αν) η βάση του προπονητικού εξοπλισμού διαθέτει
        βάρος για σταθερότητα (π.χ. πλήρωση με νερό ή άμμο).
    base_configuration:
      name: Διαμόρφωση ράβδου
      description: Υποδεικνύει τη δομική διαμόρφωση της βάσης του πάνελ.
    base_fill_material:
      name: Υλικό πλήρωσης βάσης
      description: Καθορίζει την ουσία που χρησιμοποιείται για να γεμίσει ή να προσδώσει
        βάρος στη βάση της προπονητικής φιγούρας μπάσκετ, επηρεάζοντας τη σταθερότητα
        και την ευκολία εγκατάστασης.
    base_ingredient:
      name: Βασικό συστατικό
      description: Προσδιορίζει το κύριο γεωργικό συστατικό από το οποίο αποστάζεται
        το shochu ή το soju.
    base_oil_type:
      name: Τύπος βασικού λαδιού
      description: Καθορίζει τη σύνθεση βασικού ελαίου του υγρού μετάδοσης (π.χ.,
        πλήρως συνθετικό έναντι ημισυνθετικού έναντι συμβατικού).
    base_storage_type:
      name: Τύπος βασικού αποθηκευτικού χώρου
      description: Καθορίζει εάν η βάση παρέχει ενσωματωμένο χώρο αποθήκευσης και
        τον μηχανισμό που χρησιμοποιείται.
    baseball_glove_type:
      name: Τύπος γαντιού μπέιζμπολ
      description: Κατηγοριοποιεί το γάντι ή το γάντι χωρίς δάχτυλα ανάλογα με τη
        θέση του παίκτη ή τον λειτουργικό σκοπό του.
    baseball_softball_league_certification:
      name: Πιστοποίηση πρωταθλήματος μπέιζμπολ και σόφτμπολ
      description: Καθορίζει τα πρότυπα του διοικητικού οργάνου ή του πρωταθλήματος
        που πληροί το προϊόν.
    baseball_softball_usage_role:
      name: Ρόλος χρήσης μπέιζμπολ/σόφτμπολ
      description: Καθορίζει τον ρόλο στο γήπεδο ή τον τύπο συμμετέχοντα για τον οποίο
        προορίζεται η προστατευτική περικνημίδα (π.χ. catcher, batter, umpire, fielder).
    baseball_toy_set_components_included:
      name: Περιλαμβάνονται εξαρτήματα σετ παιχνιδιού μπέιζμπολ
      description: Καθορίζει ποια επιμέρους προϊόντα παιχνιδιού μπέιζμπολ περιλαμβάνονται
        στο προϊόν (π.χ., ρόπαλο, μπάλα, βάση στήριξης, βάσεις).
    baseplate_construction:
      name: Κατασκευή πλάκας βάσης
      description: Υποδεικνύει τη μέθοδο κατασκευής της πλάκας βάσης του φορτηγού
        οχήματος, η οποία επηρεάζει την αντοχή και το βάρος.
    basketball_hoop_accessory_type:
      name: Τύπος αξεσουάρ στεφάνης μπάσκετ
      description: Κατατάσσει τον συγκεκριμένο τύπο εξαρτήματος ή αξεσουάρ της μπασκέτας,
        ώστε να διευκολύνει το φιλτράρισμα και τη σύγκριση.
    basketball_padding_location:
      name: Θέση της επένδυσης στη μπάλα μπάσκετ
      description: Καθορίζει το τμήμα του συστήματος μπάσκετ που προορίζεται να καλύπτει
        το προστατευτικό μαξιλάρι.
    basketball_rim_type:
      name: Τύπος στεφάνης μπάσκετ
      description: Καθορίζει το δομικό στυλ ή το στυλ απόδοσης της στεφάνης μπάσκετ,
        ώστε οι αγοραστές να μπορούν να επιλέξουν το σχέδιο που ταιριάζει στο επίπεδο
        παιχνιδιού και στις ανάγκες εγκατάστασής τους.
    basketball_toy_features:
      name: Χαρακτηριστικά παιχνιδιού μπάσκετ
      description: Επισημαίνει αξιοσημείωτα χαρακτηριστικά παιχνιδιού/λειτουργικότητας
        των παιχνιδιών μπάσκετ πέραν από τις βασικές διαστάσεις.
    bass_clarinet_body_material:
      name: Υλικό σώματος μπάσου κλαρινέτου
      description: Κύριο υλικό του σώματος του μπάσου κλαρινέτου (εξαιρουμένων των
        κλειδιών, των στηριγμάτων και άλλου μεταλλικού υλικού εξοπλισμού).
    bass_clarinet_lowest_written_note:
      name: Χαμηλότερη γραπτή νότα που μπορεί να αποδώσει το κλαρινέτο μπάσο
      description: Η χαμηλότερη νότα που μπορεί να παίξει το κλαρινέτο μπάσο (συχνά
        αναφέρεται από τους μουσικούς ως χαμηλό E♭, χαμηλό D, χαμηλό C ή χαμηλό B,
        ανάλογα με την προέκταση του οργάνου).
    bass_drum_beater_head_shape:
      name: Σχήμα κεφαλής μπαγκέτας μπάσου τυμπάνου
      description: Περιγράφει το γεωμετρικό σχήμα/προφίλ της επιφάνειας κρούσης του
        κόπανου του μπάσου τυμπάνου (η επιφάνεια που έρχεται σε επαφή με τη μεμβράνη
        του τυμπάνου).
    bass_drum_beater_shaft_material:
      name: Υλικό στελέχους της μπαγκέτας μπάσου τυμπάνου
      description: Καθορίζει το υλικό του στελέχους/ράβδου της μπαγκέτας (όχι της
        κεφαλής μπαγκέτας).
    bass_drum_head_built_in_muffling:
      name: Ενσωματωμένη σίγαση μεμβράνης μπάσου τυμπάνου
      description: Τύπος ενσωματωμένης απόσβεσης/σίγασης που περιλαμβάνεται στον σχεδιασμό
        της μεμβράνης.
    bass_drum_head_configuration:
      name: Διαμόρφωση κεφαλής μπάσου τυμπάνου
      description: Περιγράφει ποιες κεφαλές περιλαμβάνονται/έχουν εγκατασταθεί στο
        μπάσο τύμπανο κατά την αγορά.
    bass_drum_head_surface_finish:
      name: Φινίρισμα επιφάνειας κεφαλής μπάσου τυμπάνου
      description: Υφή/φινίρισμα επιφάνειας της κεφαλής του μπάσου τυμπάνου.
    bass_drum_head_type:
      name: Τύπος μεμβράνης μπάσου τυμπάνου
      description: Τύπος σχεδιασμού ή ειδική κατασκευή της μεμβράνης του μπάσου τυμπάνου.
    bass_drum_hoop_material:
      name: Υλικό στεφάνης μπάσου τυμπάνου
      description: Προσδιορίζει το υλικό των στεφανιών των μπάσου τυμπάνου, το οποίο
        επηρεάζει την ανθεκτικότητα, την αισθητική και το βάρος.
    bass_drum_mounting_style:
      name: Στυλ τοποθέτησης μπάσου τυμπάνου
      description: Υποδεικνύει τον τρόπο με τον οποίο το μπάσο τύμπανο έχει σχεδιαστεί
        να στηρίζεται ή να χρησιμοποιείται (π.χ. με πόδια στήριξης, σε βάση/βάθρο,
        σε σύστημα μεταφοράς marching carrier κ.λπ.).
    bass_harmonica_comb_material:
      name: Υλικό χτένας της μπάσας φυσαρμόνικας
      description: Υλικό του σώματος/χτένας (μπλοκ αεροθαλάμου) της φυσαρμόνικας μπάσου.
    bass_harmonica_mouthpiece_style:
      name: Στυλ επιστομίου μπάσου φυσαρμόνικας
      description: Υποδεικνύει τη διαμόρφωση του επιστομίου της φυσαρμόνικας μπάσου.
    bass_harmonica_reed_material:
      name: Υλικό καλαμιού φυσαρμόνικας μπάσου
      description: Υλικό των καλαμιών που χρησιμοποιούνται στη φυσαρμόνικα μπάσου.
    bass_harmonica_tuning_system:
      name: Σύστημα συντονισμού/κουρδίσματος φυσαρμόνικας μπάσου
      description: Καθορίζει το σύστημα κουρδίσματος/τονικής ιδιοσυγκρασίας που χρησιμοποιείται
        για τη φυσαρμόνικα μπάσου.
    bass_recorder_bocal_type:
      name: Τύπος μπόκαλ φλογέρας μπάσου
      description: Καθορίζει τον τύπο του μποκάλ/αεραγωγού που χρησιμοποιείται για
        να φτάσει η ροή του αέρα στο επιστόμιο της φλογέρας μπάσου.
    bass_recorder_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται για φλογέρα bass recorder
      description: Παραθέτει τα αξεσουάρ που περιλαμβάνονται στη συσκευασία της φλογέρας
        bass recorder.
    bass_recorder_keywork_material:
      name: Υλικό για πλήκτρα φλογέρας bass recorder
      description: Καθορίζει το υλικό του μηχανισμού κλειδιών της φλογέρας (εάν υπάρχει).
    bass_trombone_slide_material:
      name: Υλικό διαφάνειας για μπάσο τρομπόνι
      description: Καθορίζει το κύριο υλικό/επένδυση των εξωτερικών σωλήνων αντλίας
        (ή/και του συγκροτήματος αντλίας) για το μπάσο τρομπόνι.
    bass_trombone_valve_wrap_style:
      name: Στυλ περιτύλιξης βαλβίδας μπάσου τρομπονιού
      description: Καθορίζει τον σχεδιασμό περιτύλιξης βαλβίδας που χρησιμοποιείται
        στο όργανο.
    bass_ukulele_string_type:
      name: Τύπος χορδής μπάσου γιουκαλίλι
      description: Υποδεικνύει τον γενικό τύπο χορδών που χρησιμοποιείται στο μπάσο
        γιουκαλίλι.
    bassinet_cradle_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ λίκνου και κούνιας μωρού
      description: Επισημαίνει αξιοσημείωτα λειτουργικά χαρακτηριστικά ή ιδιότητες
        των αξεσουάρ κούνιας και λίκνου (π.χ. αδιάβροχη, βιολογικά πιστοποιημένη,
        υποαλλεργική).
    bassoon_bell_material:
      name: Υλικό καμπάνας φαγκότου
      description: Καθορίζει το υλικό της καμπάνας του φαγκότου.
    bassoon_bocal_system:
      name: Σύστημα μπόκαλ φαγκότου
      description: Η παραλλαγή/ο τύπος του bocal που χρησιμοποιείται για διαφορετικά
        συστήματα φαγκότου και περιπτώσεις χρήσης.
    bassoon_case_shell_type:
      name: Τύπος κελύφους θήκης φαγκότου
      description: Υποδεικνύει τη δομή προστασίας της θήκης (μαλακή, σκληρή ή υβριδική).
    bassoon_keywork_material:
      name: Υλικό μηχανισμού κλειδιών του φαγκότου
      description: Καθορίζει το υλικό και/ή την επιμετάλλωση του μηχανισμού κλειδιών
        του φαγκότου (πλήκτρα και μηχανικά υλικά)
    bassoon_model_level:
      name: Επίπεδο μοντέλου φαγκότου
      description: Υποδεικνύει το προβλεπόμενο επίπεδο παικτή για το φαγκότο.
    bassoon_performance_level:
      name: Επίπεδο απόδοσης φαγκότου
      description: Υποδεικνύει το επίπεδο παίκτη για το οποίο προορίζεται το μοντέλο
        φαγκότου.
    bassoon_reed_scrape_style:
      name: Στυλ ξυσίματος καλαμιού φαγκότου
      description: Υποδεικνύει το στυλ ξυσίματος/προφίλ του καλαμιού φαγκότου.
    bassoon_reed_thread_color:
      name: Χρώμα νήματος καλαμιού φαγκότου
      description: Χρώμα του νήματος περιέλιξης που χρησιμοποιείται στο καλάμι.
    bassoon_reed_type:
      name: Τύπος καλαμιού φαγκότου
      description: Καθορίζει τον υποτύπο καλαμιού φαγκότου για τον οποίο είναι συμβατό
        το προϊόν (όπου ισχύει).
    bassoon_system:
      name: Σύστημα φαγκότου
      description: Καθορίζει το σύστημα κλειδιών ή την κατασκευαστική παράδοση σχεδιασμού
        που ακολουθεί το όργανο.
    bat_construction:
      name: Κατασκευή μπαστουνιού
      description: Υποδεικνύει από πόσα διακριτά κομμάτια ή ενωμένες ενότητες αποτελείται
        το σώμα του ρόπαλου (π.χ. μονοκόμματο, δύο κομματιών, υβριδικό), επηρεάζοντας
        την ευκαμψία, τον έλεγχο των κραδασμών και τη συνολική απόδοση.
    bat_handle_size_compatibility:
      name: Συμβατότητα του μεγέθους της λαβής του ρόπαλου
      description: Υποδεικνύει το μέγεθος(-η) λαβής ροπάλου κρίκετ για το οποίο είναι
        σχεδιασμένη η λαβή.
    bath_book_interactive_features:
      name: Διαδραστικά χαρακτηριστικά του βιβλίου μπάνιου
      description: Ενσωματωμένα χαρακτηριστικά παιχνιδιού/μάθησης ενσωματωμένες στο
        βιβλίο μπάνιου.
    bath_bubble_machine_features:
      name: Χαρακτηριστικά μηχανής φυσαλίδων μπάνιου
      description: Βασικά λειτουργικά χαρακτηριστικά της μηχανής φυσαλίδων μπάνιου
        πέρα από τη βασική παραγωγή φυσαλίδων.
    bath_crayon_features:
      name: Χαρακτηριστικά κηρομπογιάς μπάνιου
      description: Βασικά χαρακτηριστικά λειτουργίας/ασφάλειας των κηρομπογιών μπάνιου.
    bath_squirter_spray_pattern:
      name: Μοτίβο ψεκασμού παιχνιδιού μπάνιου
      description: Περιγράφει τον τρόπο με τον οποίο το παιχνίδι μπάνιου (bath squirter)
        εκτοξεύει ή διανέμει το νερό (μοτίβο εξόδου) όταν πιέζεται ή ενεργοποιείται.
    bath_toy_molded_drain_design:
      name: Σχεδιασμός με ενσωματωμένη αποστράγγιση (molded-drain design) στο παιχνίδι
        μπάνιου
      description: Υποδεικνύει αν το παιχνίδι είναι σχεδιασμένο ώστε να αποστραγγίζει
        και να στεγνώνει εύκολα, μειώνοντας την κατακράτηση νερού.
    bath_toy_water_play_function:
      name: Λειτουργία παιχνιδιού μπάνιου με νερό
      description: Προσδιορίζει τον κύριο μηχανισμό αλληλεπίδρασης με το νερό/παιχνιδιού
        του προϊόντος.
    baton_size_standard:
      name: Τυποποιημένο μέγεθος της μπαγκέτας/ράβδου
      description: Ταξινόμηση μεγέθους του σκυταλοδρομικού ραβδιού (relay baton) για
        αγώνες, δηλαδή (junior ή senior)
    battery_case_certification_standard:
      name: Πιστοποίηση/πρότυπο θήκης μπαταρίας
      description: Παραθέτει τις σχετικές πιστοποιήσεις μεταφοράς/ασφάλειας ή τα πρότυπα
        δοκιμών με τα οποία συμμορφώνεται η θήκη για τη μεταφορά/αποθήκευση μπαταριών.
    battery_case_interior_padding_material:
      name: Υλικό εσωτερικής επένδυσης της θήκης μπαταρίας
      description: Καθορίζει το κύριο υλικό επένδυσης/μαξιλαριού που χρησιμοποιείται
        στο εσωτερικό της θήκης (εάν υπάρχει).
    battery_configuration:
      name: Διαμόρφωση μπαταρίας
      description: Υποδεικνύει τη φυσική διάταξη/σχήμα της συσκευασίας, ώστε οι χρήστες
        να αντιστοιχίσουν την μπαταρία στον περιορισμένο χώρο του διαμερίσματος σε
        συγκεκριμένα αντίγραφα Airsoft.
    battery_group_size:
      name: Μέγεθος γκρουπ μπαταρίας
      description: Τυποποιημένο μέγεθος μπαταρίας (π.χ. ομάδα BCI 24F, H6) που χρησιμοποιείται
        για τοποθέτηση σε πολλά οχήματα.
    battery_polarity:
      name: Πολικότητα μπαταρίας
      description: Καθορίζει την πολικότητα ή τη διάταξη των ακροδεκτών (τη θέση του
        θετικού πόλου), η οποία αποτελεί βασικό περιορισμό συμβατότητας για πολλές
        μπαταρίες αυτοκινήτων και οχημάτων powersports.
    battery_standards_supported:
      name: Υποστηριζόμενα πρότυπα μπαταρίας
      description: Καθορίζει τα πρότυπα αξιολόγησης της μπαταρίας που υποστηρίζει
        ο ελεγκτής κατά τη δοκιμή απόδοσης εκκίνησης ή υγείας.
    battery_voltage_class:
      name: Κλάση τάσης μπαταρίας
      description: Κοινή κλάση συστήματος τάσης για τη συσκευασία μπαταρίας ηλεκτρικών
        οχημάτων (EV), που χρησιμοποιείται για γρήγορο φιλτράρισμα (π.χ., συστήματα
        400V έναντι 800V).
    batting_cage_components_included:
      name: Περιλαμβάνονται εξαρτήματα κλωβού χτυπημάτων
      description: Καταγράφει τα επιμέρους εξαρτήματα που παρέχονται με το προϊόν,
        ώστε οι αγοραστές να μπορούν να επιβεβαιώσουν αν περιλαμβάνεται πλήρες σύστημα
        ή συγκεκριμένα ανταλλακτικά.
    batting_helmet_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ κράνους κρούσης
      description: Καταγράφει τα προστατευτικά ή διακοσμητικά αξεσουάρ που περιλαμβάνονται
        μαζί με το κράνος batting.
    batting_stuffing_form_factor:
      name: Τύπος/μορφή βάτας και υλικού γεμίσματος
      description: Προσδιορίζει εάν το προϊόν πωλείται ως χύμα γέμιση, φύλλα, ρολά,
        προκομμένα κομμάτια ή διαμορφωμένα σχήματα.
    batting_stuffing_loft_level:
      name: Επίπεδο πάχους και όγκου βάτας και γεμίσματος
      description: Υποδεικνύει το επίπεδο πάχους/όγκου της βάτας ή του γεμίσματος
        (σχετική αφρατάδα/ύψος), που χρησιμοποιείται συνήθως για την επιλογή υλικών
        παπλωματοποιίας και επένδυσης.
    batting_stuffing_thermal_insulation_level:
      name: Βαθμός θερμομονωτικής ικανότητας της βάτας και του γεμίσματος
      description: Σχετική απόδοση θερμότητας/μόνωσης της βάτας που χρησιμοποιείται
        σε παπλώματα, μπουφάν και κουβέρτες.
    batting_tee_base_design:
      name: Σχεδιασμός βάσης στηρίγματος κρούσης
      description: Περιγράφει το στυλ ή την κατασκευή της βάσης του tee, το οποίο
        επηρεάζει τη σταθερότητα και τους τύπους επιφανειών παιχνιδιού για τους οποίους
        είναι κατάλληλο.
    battle_top_arena_stadium_compatibility:
      name: Συμβατότητα αρένας/σταδίου σβούρας μάχης
      description: Υποδεικνύει με ποιο σύστημα αρένας/σταδίου έχει σχεδιαστεί να χρησιμοποιείται
        το προϊόν (ειδικά για σετ ή ειδικά σχήματα αρένας).
    battle_top_items_included:
      name: Περιλαμβανόμενα είδη σβούρας μάχης
      description: Καθορίζει ποια είδη σβούρας μάχης περιλαμβάνονται στη συσκευασία
        (π.χ., σβούρα, εκτοξευτές, στάδια/αρένες, κορδόνι εκκίνησης, ανταλλακτικά).
    battle_top_performance_type:
      name: Τύπος απόδοσης σβούρας μάχης
      description: Περιγράφει το γενικό στυλ απόδοσης της σβούρας μάχης, αντικατοπτρίζοντας
        συνήθως τον τρόπο συμπεριφοράς της στην αρένα (π.χ. επιθετική ή προσανατολισμένη
        στην αντοχή).
    bayan_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται στο μπαγιάν
      description: Αξεσουάρ που περιλαμβάνονται στο μπαγιάν (στο κουτί).
    bayan_tuning_system_type:
      name: Τύπος συστήματος κουρδίσματος μπαγιάν
      description: Ο τρόπος με τον οποίο τεντώνεται/κουρδίζεται το μπαγιάν (στυλ κατασκευής),
        που επηρεάζει τη φορητότητα και την ευκολία κουρδίσματος.
    bb_gun_action_type:
      name: Τύπος μηχανισμού όπλου BB
      description: Υποδεικνύει τον μηχανικό μηχανισμό γεμίσματος ή κύκλου λειτουργίας
        του όπλου BB (π.χ., δράση μοχλού, αντλία, κάννη με σπάσιμο).
    bb_gun_caliber:
      name: Διαμέτρημα αεροβόλου όπλου
      description: Ορίζει τη διάμετρο των βλημάτων που έχει σχεδιαστεί για να βάλλει
        το όπλο, διασφαλίζοντας τη συμβατότητα των πυρομαχικών.
    bb_gun_part_type:
      name: Τύπος εξαρτήματος αεροβόλου όπλου
      description: Ταξινομεί το συγκεκριμένο εξάρτημα ή αξεσουάρ που έχει σχεδιαστεί
        για αεροβόλα όπλα, επιτρέποντας στον αγοραστή να εντοπίσει γρήγορα το ακριβές
        ανταλλακτικό, αναβαθμισμένο ή προσθετό εξάρτημα (π.χ. κάννη, στεγανοποίηση
        εμβόλου, ταχυγεμιστήρας).
    beach_ball_features:
      name: Χαρακτηριστικά μπάλας θαλάσσης
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά ειδικά για τις μπάλες θαλάσσης.
    beach_bucket_features:
      name: Χαρακτηριστικά κουβά παραλίας
      description: Λειτουργικά χαρακτηριστικά του κουβά θαλάσσης που επηρεάζουν τη
        χρήση, την ανθεκτικότητα και την ευχρηστία.
    beach_sand_toy_items_included:
      name: Περιλαμβάνονται παιχνίδια παραλίας και άμμου
      description: Επιπλέον παιχνίδια για την παραλία/άμμο περιλαμβάνονται στον κουβά
        (αν πωλείται ως σετ).
    bead_breaker_type:
      name: Τύπος αποκολλητή ελαστικών
      description: Τύπος/σχεδιασμός του μηχανισμού θραύσης χαντρών.
    bead_hole_style:
      name: Στυλ οπής χάντρας
      description: Καθορίζει το στυλ ή τη διαμόρφωση της οπής/σχισμής στην χάντρα,
        η οποία επηρεάζει τον τρόπο με τον οποίο κάθεται στο αγκίστρι ή το νήμα.
    bead_type:
      name: Τύπος χάντρας
      description: Κύριος τύπος χάντρας που απαιτείται από το σχέδιο.
    bead_type_patch_embellishment:
      name: Τύπος χάντρας (διακοσμητικό με σχέδιο)
      description: Κύριος τύπος χαντρών που χρησιμοποιούνται στην επιφάνεια του μπαλώματος.
    beaded_accessory_project_type:
      name: Τύπος έργου αξεσουάρ με χάντρες
      description: Τι αξεσουάρ δημιουργεί το πατρόν.
    beading_needle_flexibility:
      name: Ευκαμψία βελόνας κεντήματος με χάντρες
      description: Σχετική ευκαμψία του στελέχους της βελόνας για την καθοδήγηση σε
        στενά περάσματα κεντήματος με χάντρες.
    beading_pattern_bead_size:
      name: Μοτίβο με χάντρες, μέγεθος χάντρας
      description: Συνιστώμενο(-α) μέγεθος(-η) χάντρας που καθορίζεται(-ονται) από
        το πατρόν (συνήθως μέγεθος χαντρών-σπόρων, π.χ., 11/0, 8/0).
    beading_pattern_chart_format:
      name: Μορφή διαγράμματος μοτίβου για χάντρες
      description: Περιγράφει τον τρόπο με τον οποίο απεικονίζεται το μοτίβο οπτικά
        (π.χ. με γράφημα ή φωτογραφίες βήμα-βήμα).
    beading_pattern_stitch_technique:
      name: Βελονιά/τεχνική μοτίβου με χάντρες
      description: Κύρια βελονιά ή τεχνική ύφανσης με χάντρες που χρησιμοποιείται
        στο μοτίβο.
    beading_technique_stitch:
      name: Τεχνική/ραφή κοσμητικής χάντρας
      description: Καθορίζει την κύρια τεχνική ή ραφή χαντρών που χρησιμοποιείται
        στο σχέδιο (π.χ. peyote stitch, brick stitch).
    beading_thread_fiber_type:
      name: Τύπος ίνας νήματος για χάντρες
      description: Καθορίζει τον υποτύπο ίνας/υλικού της κλωστής για χάντρες (πιο
        συγκεκριμένο από το γενικό υλικό) που σχετίζεται με την απόδοση.
    beading_thread_size:
      name: Μέγεθος κλωστής για χάντρες
      description: Υποδεικνύει την ετικέτα μεγέθους κατασκευαστή/κλάδου για την κλωστή
        με χάντρες (ανάλογα με τη μάρκα/σειρά), όπως μέγεθος D ή 00.
    beading_thread_use_case:
      name: Θήκη χρήσης νήματος με χάντρες
      description: Προσδιορίζει την κύρια προτεινόμενη χρήση για το νήμα με χάντρες,
        βοηθώντας τους αγοραστές να επιλέξουν το σωστό προϊόν για το έργο τους.
    beading_wire_coating_material:
      name: Υλικό επικάλυψης σύρματος με χάντρες
      description: Καθορίζει το υλικό εξωτερικής επίστρωσης στο σύρμα με χάντρες (εάν
        υπάρχει), το οποίο επηρεάζει την αφή, την ανθεκτικότητα και την αντίσταση
        στο τσάκισμα.
    beading_wire_strand_count:
      name: Αριθμός κλώνων σύρματος για χάντρες
      description: Υποδεικνύει τον αριθμό των νημάτων σε πολύκλωνο σύρμα για χάντρες
        (π.χ. 7-κλώνων, 19-κλώνων, 49-κλώνων), επηρεάζοντας την ευκαμψία και την κίνηση/πτώση
        του.
    beadlock_type:
      name: Τύπος συστήματος ασφάλισης με χάντρες
      description: Υποδεικνύει εάν ο τροχός είναι beadlock και ποιον τύπο έχει, βοηθώντας
        τους αγοραστές οχημάτων εκτός δρόμου/UTV να επιλέξουν κατάλληλους τροχούς.
    beam_material:
      name: Υλικό δοκού
      description: Κύριο υλικό της δοκού/ράβδου (συχνά διαφορετικό από τις κεφαλές/τα
        προσαρτήματα).
    beam_pattern:
      name: Μοτίβο δοκού
      description: Μοτίβο κατανομής της εκπομπής φωτός που χρησιμοποιείται για φώτα
        οδήγησης ή εκτός δρόμου.
    bean_bag_fabric_material:
      name: Υλικό υφάσματος για σακουλάκια φασολιών
      description: Προσδιορίζει το εξωτερικό ύφασμα που χρησιμοποιείται για τα σακουλάκια
        φασολιών που παρέχονται με το σετ.
    bean_paste_variety:
      name: Ποικιλία πάστας φασολιών
      description: Ταξινομεί τον συγκεκριμένο τύπο πάστας φασολιών με βάση τον τρόπο
        παραγωγής ή το κύριο συστατικό.
    bean_preparation:
      name: Προετοιμασία φασολιών
      description: Υποδεικνύει τον τρόπο παρασκευής ή επεξεργασίας των φασολιών πριν
        από την πώληση (π.χ., ολόκληρα λοβά, αποφλοιωμένα, ψιλοκομμένα, με φύτρο).
    bean_variety:
      name: Ποικιλία φασολιών
      description: Προσδιορίζει τη βοτανική ή εμπορική ποικιλία των φασολιών (π.χ.
        πράσινα φασόλια, edamame, αμπελοφάσουλα).
    beanie_style:
      name: Στυλ σκούφου
      description: Καθορίζει τον συνολικό σχεδιασμό, την κατασκευή ή τη σιλουέτα του
        σκούφου, ώστε ο αγοραστής να μπορεί να επιλέξει γρήγορα ανάμεσα σε κοινές
        παραλλαγές.
    bearing_clearance:
      name: Διάκενο ρουλεμάν
      description: Υποδεικνύει την κλάση εσωτερικού ακτινικού διακένου του ρουλεμάν
        (μέγεθος εσωτερικής ανοχής). Η κλάση C0 αναφέρεται και ως CN ή ή κανονικό
        διάκενο.
    bearing_construction_type:
      name: Τύπος κατασκευής ρουλεμάν
      description: Προσδιορίζει το σχεδιασμό ή το στυλ κατασκευής του ρουλεμάν που
        χρησιμοποιείται στην πλήμνη (π.χ., φυσίγγιο, χαλαρή μπίλια).
    bearing_edge_type:
      name: Τύπος ακμής ρουλεμάν
      description: Τύπος/προφίλ της ακμής του κελύφους του ρουλεμάν, που επηρεάζει
        την επίθεση και τη διάρκεια αντήχησης.
    bearing_lubrication:
      name: Λίπανση ρουλεμάν
      description: Υποδεικνύει τον τύπο λιπαντικού που εφαρμόζεται στο ρουλεμάν κατά
        την κατασκευή, όπως γράσο ή λάδι.
    bearing_material:
      name: Υλικό ρουλεμάν
      description: Προσδιορίζει το υλικό κατασκευής του ρουλεμάν (π.χ. χάλυβας, κεραμικό
        υβρίδιο), βοηθώντας τους αναβάτες να επιλέξουν μεταξύ επιλογών ανθεκτικότητας,
        κόστους και απόδοσης.
    bearing_rating:
      name: Κατάταξη ρουλεμάν
      description: Καθορίζει την ανοχή ρουλεμάν ή την κατηγορία απόδοσης που χρησιμοποιείται
        στα πατίνια (π.χ., ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Κωδικός τσιμούχας ρουλεμάν
      description: Υποδεικνύει τον τρόπο στεγανοποίησης που χρησιμοποιείται στο ρουλεμάν,
        ο οποίος επηρεάζει την ανθεκτικότητα και την αντίσταση κύλισης.
    bearing_seal_type:
      name: Τύπος τσιμούχας ρουλεμάν
      description: Καθορίζει τον σχεδιασμό στεγανοποίησης ή θωράκισης που προστατεύει
        τα εσωτερικά μέρη του ρουλεμάν από ρύπους και επηρεάζει την αντίσταση (π.χ.,
        2RS, ZZ, LLU, ανοιχτό).
    bearing_shield_type:
      name: Τύπος θωράκισης ρουλεμάν
      description: Τύπος θωράκισης ή στεγανοποίησης που προστατεύει τα εσωτερικά μέρη
        του ρουλεμάν.
    bearing_size_code:
      name: Κωδικός μεγέθους ρουλεμάν
      description: Τυποποιημένη ονομασία ρουλεμάν (π.χ., 608, 688) που συνδυάζει εσωτερική,
        εξωτερική διάμετρο και πλάτος.
    bearing_type:
      name: Τύπος ρουλεμάν
      description: Καθορίζει το στυλ κατασκευής των ρουλεμάν που χρησιμοποιούνται
        στο σύστημα διεύθυνσης.
    beater_head_material:
      name: Υλικό κεφαλής της μπαγκέτας
      description: Καθορίζει το υλικό επαφής/κεφαλής ενός μπάσου τυμπάνου (π.χ., τσόχα,
        ξύλο, καουτσούκ).
    beaters_included:
      name: Περιλαμβάνονται μπαγκέτες
      description: Καθορίζει πόσες μπαγκέτες περιλαμβάνονται/εγκαθίστανται με το πεντάλ
        τυμπάνου (π.χ., μονή ή διπλή μπαγκέτα) ή αν δεν περιλαμβάνεται μπαγκέτα.
    bed_base_type:
      name: Τύπος βάσης κρεβατιού
      description: Ορίζει το δομικό στυλ της βάσης του κρεβατιού ή του ντιβανιού (π.χ.,
        πλατφόρμα, ελατηριωτές τάβλες, ρυθμιζόμενη).
    bed_storage_type:
      name: Τύπος αποθηκευτικού χώρου κρεβατιού
      description: Ορίζει τον ενσωματωμένο μηχανισμό αποθήκευσης του πλαισίου κρεβατιού.
    bedroom_furniture_items_included:
      name: Περιλαμβάνονται έπιπλα μπάνιου
      description: Προσδιορίζει τα μεμονωμένα έπιπλα που περιλαμβάνονται στο σετ κρεβατοκάμαρας
        (π.χ. κρεβάτι, συρταριέρα, κομοδίνα), επιτρέποντας στους αγοραστές να βλέπουν
        γρήγορα τι περιλαμβάνεται χωρίς να διαβάζουν μακροσκελείς περιγραφές.
    bedroom_vanity_items_included:
      name: Περιλαμβάνονται αντικείμενα με το έπιπλο καλλωπισμού υπνοδωματίου
      description: Παραθέτει τα μεμονωμένα είδη που παρέχονται με ένα σετ τουαλέτας
        κρεβατοκάμαρας, ώστε οι πελάτες να γνωρίζουν ακριβώς τι παραδίδεται (π.χ.
        καθρέφτης, σκαμπό, κιτ φωτισμού).
    beer_based_cocktail_variety:
      name: Ποικιλία κοκτέιλ με βάση την μπύρα
      description: Ταξινομεί τα κοκτέιλ με βάση την μπύρα ανάλογα με την ποικιλία
        τους, π.χ. Radler, Shandy, Michelada.
    beet_variety:
      name: Ποικιλία παντζαριού
      description: Καθορίζει την καλλιεργητική ποικιλία του παντζαριού, βοηθώντας
        τους αγοραστές να αναγνωρίσουν τη γεύση, το χρώμα και τις μαγειρικές χρήσεις
        (π.χ. Κόκκινο, Χρυσό, Chioggia).
    bell_actuation_mechanism:
      name: Μηχανισμός ενεργοποίησης κουδουνιού
      description: Καθορίζει την ενέργεια του χρήστη που απαιτείται για να χτυπήσει
        το κουδούνι, βοηθώντας τον αγοραστή να επιλέξει την προτιμώμενη εργονομία.
    bell_guard_coverage_area:
      name: Περιοχή κάλυψης προστατευτικού καμπάνας
      description: Υποδεικνύει ποιο τμήμα του κουδουνιού προορίζεται να προστατεύει
        η προστατευτική θήκη.
    bell_material:
      name: Τύπος κουδουνιού
      description: Υλικό του εξαρτήματος της καμπάνας (εάν καθορίζεται ξεχωριστά από
        το συνολικό υλικό του οργάνου).
    bellhousing_bolt_pattern:
      name: Μοτίβο βιδών καμπύλης συμπλέκτη
      description: Καθορίζει το πρότυπο ή την οικογένεια της διάταξης των μπουλονιών
        στην πλευρά της καμπάνας/κινητήρα που χρησιμοποιεί το κέλυφος του κιβωτίου
        ταχυτήτων.
    bellows_material:
      name: Υλικό φυσητήρα
      description: Υλικό του σώματος/καλύμματος του φυσητήρα (εάν περιλαμβάνεται).
    bellows_orientation:
      name: Προσανατολισμός φυσητήρα
      description: Υποδεικνύει τη διαμόρφωση φυσητήρα που χρησιμοποιείται για παροχή
        αέρα στους σωλήνες.
    belly_panel_style:
      name: Τύπος προστατευτικού πάνελ κοιλιάς
      description: Περιγράφει την κατασκευή της ζώνης ή του κοιλιακού τμήματος μιας
        κοιλιά που μεγαλώνει.
    belt_buckle_type:
      name: Τύπος αγκράφας ζώνης
      description: Περιγράφει τον συγκεκριμένο μηχανισμό ή το σχέδιο πόρπης που χρησιμοποιείται
        στη ζώνη.
    beret_style:
      name: Στυλ μπερέ
      description: Προσδιορίζει το συγκεκριμένο σχέδιο μπερέ ή την πολιτισμική παραλλαγή.
    berry_species:
      name: Είδη μούρων
      description: Υποδεικνύει το είδος του μούρου που περιέχεται στο προϊόν, ώστε
        ο αγοραστής να μπορεί γρήγορα να βρει το επιθυμητό μούρο.
    beta_casein_variant:
      name: Παραλλαγή βήτα-καζεΐνης
      description: Καθορίζει ποια έκδοση βήτα-καζεΐνης (π.χ., Α2) υπάρχει στο γάλα
        για καταναλωτές με ανησυχίες σχετικά με την πεπτικότητά του.
    beverage_sweetness_level:
      name: Επίπεδο γλυκύτητας ποτού
      description: Ταξινομεί το ρόφημα ανάλογα με τον βαθμό προστιθέμενης γλυκύτητας
        ή ζάχαρης.
    bezel_graduation_units:
      name: Μονάδες διαβάθμισης δακτυλίου
      description: Καθορίζει τις μονάδες σήμανσης στον περιστρεφόμενο δακτύλιο (μοίρες,
        mils ή διπλή κλίμακα).
    bicycle_brake_set_components_included:
      name: Περιλαμβάνονται εξαρτήματα σετ φρένων ποδηλάτου
      description: Καταγράφει τα επιμέρους εξαρτήματα που περιλαμβάνονται στο κιτ,
        ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται και να μπορούν να
        συγκρίνουν διαφορετικές διαμορφώσεις σετ.
    bicycle_cage_mounting_position:
      name: Θέση τοποθέτησης κλωβού ποδηλάτου
      description: Καθορίζει το σημείο στο ποδήλατο για το οποίο έχει σχεδιαστεί να
        τοποθετηθεί η θήκη
    bicycle_computer_mount_placement:
      name: Τοποθέτηση βάσης κοντέρ ποδηλάτου
      description: Προσδιορίζει το σημείο στο ποδήλατο όπου εγκαθίσταται η βάση του
        κοντέρ, όπως στο μπροστινό μέρος του τιμονιού ή στο πάνω κάλυμμα του λαιμού.
    bicycle_folding_mechanism:
      name: Μηχανισμός αναδίπλωσης ποδηλάτου
      description: Καθορίζει τον μηχανικό μηχανισμό αναδίπλωσης που χρησιμοποιείται
        στο πλαίσιο του ποδηλάτου (π.χ. ημιδιπλούμενο, κάθετη αναδίπλωση).
    bicycle_frame_design:
      name: Σχεδιασμός σκελετού ποδηλάτου
      description: Καθορίζει το γενικό στυλ του πλαισίου ποδηλάτου, επηρεάζοντας την
        προσβασιμότητα, τη χωρητικότητα φόρτωσης και την ευκολία αποθήκευσης.
    bicycle_frame_style:
      name: Στυλ πλαισίου ποδηλάτου
      description: Περιγράφει το δομικό στυλ του Frame του ποδηλάτου (step-through,
        lowrider, chopper stretch, κ.λπ.) που επηρεάζει τη στάση του σώματος και την
        αισθητική του αναβάτη.
    bicycle_handlebar_type:
      name: Τύπος τιμονιού ποδηλάτου
      description: Προσδιορίζει το συγκεκριμένο στυλ ή γεωμετρία του τιμονιού, βοηθώντας
        τους αναβάτες να επιλέξουν τιμόνια κατάλληλα για τη θέση οδήγησης και την
        πειθαρχία τους.
    bicycle_headset_configuration:
      name: Διαμόρφωση ακουστικών ποδηλάτου
      description: Υποδεικνύει το δομικό στυλ ή το πρότυπο των ακουστικών ποδηλάτου
        σύμφωνα με τη διάταξη της θήκης του (π.χ. External Cup, ZeroStack, Integrated,
        Threaded).
    bicycle_hub_type:
      name: Τύπος πλήμνης ποδηλάτου
      description: Περιγράφει τον μηχανισμό της πλήμνης που συνοδεύει τον τροχό, επηρεάζοντας
        τη συμβατότητα με το σύστημα μετάδοσης και το στυλ οδήγησης.
    bicycle_lock_security_certification:
      name: Πιστοποίηση ασφαλείας κλειδαριάς ποδηλάτου
      description: Ανεξάρτητη πιστοποίηση από τρίτο φορέα που επικυρώνει την αντικλεπτική
        απόδοση (π.χ. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Τύπος πεντάλ ποδηλάτου
      description: Καθορίζει το γενικό στυλ λειτουργίας ή τον σχεδιασμό του πεντάλ,
        όπως πλατφόρμα, clipless ή υβριδικά, βοηθώντας τους αναβάτες να επιλέξουν
        τη σωστή διεπαφή για το στυλ οδήγησής τους.
    bicycle_propulsion_type:
      name: Τύπος πρόωσης ποδηλάτου
      description: Καθορίζει τον τρόπο πρόωσης του ποδηλάτου, όπως χειροκίνητη πεδηλασία,
        ηλεκτρική υποβοήθηση ή κινητήρας εσωτερικής καύσης.
    bicycle_pump_type:
      name: Τύπος αντλίας ποδηλάτου
      description: Προσδιορίζει το δομικό στυλ της αντλίας, βοηθώντας τον αγοραστή
        να επιλέξει το σχέδιο που ταιριάζει καλύτερα στις ανάγκες οδήγησης, αποθήκευσης
        ή έκτακτης ανάγκης.
    bicycle_rack_mounting_type:
      name: Τύπος τοποθέτησης σχάρας ποδηλάτου
      description: Περιγράφει την κύρια μέθοδο ή ή το σημείο που χρησιμοποιείται για
        την προσάρτηση της σχάρας στο ποδήλατο, βοηθώντας τους χρήστες να επιβεβαιώσουν
        τη συμβατότητα με τον σκελετό και τον εξοπλισμό τους.
    bicycle_suspension_type:
      name: Τύπος ανάρτησης ποδηλάτου
      description: Προσδιορίζει την παρουσία και τη διαμόρφωση της ανάρτησης στο ποδήλατο.
    bicycle_tire_tread_pattern:
      name: Σχέδιο πέλματος ελαστικού ποδηλάτου
      description: Καθορίζει το στυλ πέλματος του ελαστικού, επηρεάζει την πρόσφυση
        και την αντίσταση κύλισης σε διαφορετικές επιφάνειες.
    bidirectional_charging_capability:
      name: Δυνατότητα αμφίδρομης φόρτισης
      description: Υποδεικνύει εάν το ηλεκτρικό όχημα (EV) υποστηρίζει λειτουργίες
        αμφίδρομης φόρτισης, όπως V2G και/ή V2H.
    bike_rack_mounting_style:
      name: Στυλ τοποθέτησης rack ποδηλάτου
      description: Πώς στηρίζεται/ασφαλίζεται το ποδήλατο από τη σχάρα.
    bike_rack_tilt_function:
      name: Λειτουργία ανάκλισης βάσης ποδηλάτου
      description: Καθορίζει αν υπάρχει και ποια λειτουργία κλίσης επιτρέπει την πρόσβαση
        στον πίσω χώρο φόρτωσης ενώ η σχάρα είναι εγκατεστημένη.
    bikini_top_style:
      name: Στυλ τοπ μπικίνι
      description: Καθορίζει το σχέδιο ή το κόψιμο του πάνω μέρους του μπικίνι, βοηθώντας
        τους αγοραστές να βρουν την προτιμώμενη εφαρμογή και σιλουέτα.
    billiard_brush_type:
      name: Τύπος βούρτσας μπιλιάρδου
      description: Ορίζει το συγκεκριμένο στυλ εργαλείου καθαρισμού τραπεζιού μπιλιάρδου
        (π.χ. βούρτσα τραπεζιού, βούρτσα στέκας, εργαλείο κατεύθυνσης της τσόχας).
    billiard_glove_finger_coverage:
      name: Κάλυψη των δακτύλων στο γάντι μπιλιάρδου
      description: Προσδιορίζει ποια δάχτυλα καλύπτονται από το σχέδιο του γαντιού,
        παρέχοντας ακριβές φιλτράρισμα για στυλ γαντιών ειδικά για μπιλιάρδο.
    billiard_pocket_style:
      name: Στυλ θυρίδας μπιλιάρδου
      description: Καθορίζει το δομικό ή αισθητικό στυλ της τσέπης, το οποίο επηρεάζει
        τη συμβατότητα και τη διακόσμηση του τραπεζιού.
    billiard_rack_style:
      name: Στυλ ραφιού μπιλιάρδου
      description: Περιγράφει το φυσικό στυλ ή τον μηχανισμό του πλαισίου τοποθέτησης
        (π.χ. παραδοσιακό πλαίσιο, φύλλο προτύπου, αναδιπλούμενο).
    billiard_table_type:
      name: Τύπος τραπεζιού μπιλιάρδου
      description: Καθορίζει το είδος ή τη μορφή του παιχνιδιού με στέκα (cue sport)
        για το οποίο είναι σχεδιασμένο το τραπέζι (π.χ. pool, snooker, carom).
    billiards_discipline:
      name: Είδος του μπιλιάρδου
      description: Υποδεικνύει τη συγκεκριμένη παραλλαγή του παιχνιδιού με στέκα (cue
        sport) για την οποία προορίζεται ή είναι συμβατό το προϊόν
    binding_compatibility_standard:
      name: Πρότυπο συμβατότητας σύνδεσης
      description: Προσδιορίζει τη διεπαφή σύνδεσης (αποκλειστικό πρότυπο) για την
        οποία είναι πιστοποιημένη η μπότα του σκι, διασφαλίζοντας την ασφαλή και σωστή
        αντιστοίχιση με τις συνδέσεις του σκι.
    binding_inclusion:
      name: Συμπερίληψη συνδέσεων
      description: Καθορίζει εάν τα σκι πωλούνται επίπεδα, με ενσωματωμένο σύστημα
        ή με ξεχωριστές συνδέσεις.
    binding_interface:
      name: Διεπαφή δέστρας
      description: Υποδεικνύει την πλάκα της δέστρας ή το πρότυπο διεπαφής με το οποίο
        είναι προσυναρμολογημένα τα σκι ή με το οποίο είναι συμβατά, διασφαλίζοντας
        τη συμβατότητα μπότας/δέστρας.
    binding_liner_type:
      name: Τύπος επένδυσης σύνδεσης
      description: Περιγράφει το στυλ της εσωτερικής επένδυσης που χρησιμοποιείται
        στη σύνδεση/μπότα (π.χ., αφαιρούμενη, walkable, θερμικά διαμορφώσιμη).
    binding_mounting_system:
      name: Σύστημα στήριξης με συνδέσεις
      description: Προσδιορίζει τη διεπαφή που χρησιμοποιείται για την προσάρτηση
        της δέστρας στο σκι (επίπεδη βάση, ράγα/τροχιά, πλάκα κ.λπ.).
    binding_position:
      name: Θέση πρόσδεσης
      description: Υποδηλώνει την προβλεπόμενη θέση ή διαμόρφωση τοποθέτησης για τη
        σύνδεση (π.χ., μπροστινό/πίσω μέρος μπότας, ARTP).
    binding_strap_position:
      name: Θέση ιμάντα σύνδεσης
      description: Καθορίζει το σημείο της δέστρας όπου προορίζεται να τοποθετηθεί
        ο ιμάντας.
    bingo_components_included:
      name: Περιλαμβάνονται εξαρτήματα bingo
      description: Παραθέτει τα εξαρτήματα που συσκευάζονται με το σετ μπίνγκο, όπως
        μπάλες μπίνγκο, κάρτες και μαρκαδόρους.
    bingo_number_range:
      name: Εύρος αριθμών μπίνγκο
      description: Προσδιορίζει το εύρος/παραλλαγή αριθμών μπίνγκο που υποστηρίζεται
        από το σετ.
    bingo_set_features:
      name: Χαρακτηριστικά του σετ μπίνγκο
      description: Προσδιορίζει την κύρια μορφή προϊόντος του σετ μπίνγκο (φυσική/χειροκίνητη
        έναντι ηλεκτρονικής/διαδραστικής).
    bipod_mounting_interface:
      name: Διεπαφή τοποθέτησης δίποδα
      description: Καθορίζει τη διεπαφή σύνδεσης που χρησιμοποιείται για τη σύνδεση
        του διπόδου στο πυροβόλο όπλο ή στο σύστημα ράγας.
    bit_attachment_type:
      name: Τύπος σύνδεσης ρύγχους
      description: Καθορίζει τον τρόπο με τον οποίο το χαλινάρι συνδέεται με το στόμιο,
        όπως άκρα με δέσιμο, άκρα με αγκράφα ή άκρα με βίδα τύπου Chicago.
    bit_mouthpiece_design:
      name: Σχεδιασμός επιστομίου μύτης
      description: Προσδιορίζει το δομικό στυλ ή τη διαμόρφωση της άρθρωσης του επιστόμιου,
        η οποία καθορίζει την κατανομή της πίεσης, το διάκενο στην υπερώα και τη συνολική
        σκληρότητα.
    bit_ring_style:
      name: Στυλ δακτυλίου στομίου
      description: Ορίζει το στυλ της παρειάς ή του δακτυλίου του χαλινού που προσαρτάται
        στην ηνία, επηρεάζοντας τη δράση, την πλευρική καθοδήγηση και την αίσθηση
        των ηνίων.
    bladder_material:
      name: Υλικό αεροθαλάμου
      description: Καθορίζει το υλικό που χρησιμοποιείται για τον εσωτερικό αεροθάλαμο,
        ο οποίος συγκρατεί τον αέρα.
    blade_attachment_type:
      name: Τύπος σύνδεσης λεπίδας
      description: Προσδιορίζει εάν το πατίνι χρησιμοποιεί μηχανισμό με κλιπ (με αρθρώσεις)
        ή σταθερή βάση λεπίδας.
    blade_finish_coating:
      name: Φινίρισμα/επίστρωση λεπίδας
      description: Επιφανειακή επεξεργασία που εφαρμόζεται στη λεπίδα για αισθητικούς
        λόγους ή αντιδιαβρωτική προστασία.
    blade_hosel_type:
      name: Τύπος λαιμού λεπίδας
      description: Καθορίζει τον τύπο σύνδεσης του εύκαμπτου σωλήνα της λεπίδας που
        ταιριάζει στο στέλεχος, ο οποίος επηρεάζει τη συμβατότητα του εξοπλισμού (π.χ.
        Standard ή Tapered).
    blade_length_type:
      name: Τύπος μήκους λεπίδας
      description: Κατατάσσει το μήκος της λεπίδας του πτερυγίου ως κοντό, μεσαίο
        ή μακρύ, επηρεάζοντας τον ρυθμό λακτίσματος και τους στόχους προπόνησης.
    blade_lie:
      name: Γωνία κλίσης της λεπίδας
      description: Καθορίζει τον αριθμό κλίσης της λεπίδας του μπαστουνιού του χόκεϊ,
        υποδεικνύοντας πώς κάθεται η λεπίδα στον πάγο σε σχέση με το στέλεχος.
    blade_sharpness:
      name: Αιχμηρότητα της λεπίδας
      description: Υποδεικνύει εάν η κόψη του όπλου είναι ακονισμένη ή αμβλεία για
        προπόνηση.
    blade_size_category:
      name: Κατηγορία μεγέθους λεπίδας
      description: Τυποποιημένος διεθνής κωδικός μεγέθους (0–5) για λεπίδες σπάθης
        που χρησιμοποιείται για τη διάκριση λεπίδων για εφήβους και ενήλικες.
    blade_size_class:
      name: Κλάση μεγέθους λεπίδας
      description: Κατατάσσει τη λεπίδα σύμφωνα με το πρότυπο μεγέθους παίκτη, ώστε
        να ταιριάζει με μεγέθη στελέχους όπως Youth, Junior, Intermediate ή Senior.
    blade_size_number:
      name: Αριθμός μεγέθους λεπίδας
      description: Τυποποιημένος αριθμητικός κωδικός μεγέθους (0–5) που ορίζεται από
        κανονισμούς ξιφασκίας που καθορίζουν το μήκος της λεπίδας και το δικαίωμα
        συμμετοχής ανά ηλικιακή ομάδα.
    blaster_mechanism:
      name: Μηχανισμός εκτόξευσης
      description: Ορίζει τον εσωτερικό μηχανισμό λειτουργίας του εκτοξευτή τζελ (π.χ.
        GBB, AEG, ελατήριο).
    block_edge_style:
      name: Στυλ ακμής μπλοκ
      description: Περιγράφει τον τρόπο με τον οποίο έχουν υποστεί επεξεργασία οι
        άκρες/γωνίες των ξύλινων μπλοκ για αίσθηση και ασφάλεια.
    blocking_mat_features:
      name: Χαρακτηριστικά υποστρώματος δέσμευσης
      description: Λειτουργικά χαρακτηριστικά ειδικά για τα στρώματα μπλοκαρίσματος
        (αποθήκευση, φορητότητα, χρηστικότητα).
    blocking_mat_grid_unit:
      name: Μονάδα πλέγματος του στρώματος μπλοκαρίσματος
      description: Το σύστημα μονάδων που χρησιμοποιείται στο εκτυπωμένο πλέγμα, το
        οποίο βοηθά τους χρήστες να αντιστοιχίζουν μοτίβα και μετρήσεις.
    blocking_mat_surface_markings:
      name: Σημάνσεις επιφάνειας βάσης μπλοκαρίσματος
      description: Τύπος μετρητικών ή οδηγικών σημάνσεων που είναι τυπωμένες ή διαμορφωμένες
        στην επιφάνεια του στρώματος.
    blocking_wire_coating:
      name: Επίστρωση σύρματος μπλοκαρίσματος
      description: Επιφανειακή επεξεργασία ή επίστρωση στο σύρμα μπλοκαρίσματος, η
        οποία επηρεάζει την αντοχή στη σκουριά, την ομαλότητα και τον κίνδυνο εμπλοκής.
    blocking_wire_end_cap_type:
      name: Τύπος καπακιού άκρου του σύρματος μπλοκαρίσματος
      description: Καθορίζει τον τύπο προστασίας/φινιρίσματος των άκρων που χρησιμοποιείται
        στα άκρα των συρμάτων μπλοκαρίσματος για ασφάλεια και προστασία του υφάσματος.
    blocking_wire_set_includes:
      name: Το σετ σύρματος μπλοκαρίσματος περιλαμβάνει
      description: Καθορίζει ποια εξαρτήματα περιλαμβάνονται με το προϊόν σύρματος
        μπλοκαρίσματος, (όπως π.χ. καρφίτσες Τ (T-pins), σωλήνα αποθήκευσης κ.λπ.).
    blocking_wire_usage:
      name: Χρήση σύρματος μπλοκαρίσματος
      description: Καθορίζει την κύρια χρήση για την οποία έχει σχεδιαστεί το εύκαμπτο
        σύρμα μπλοκαρίσματος.
    bloom_stage:
      name: Στάδιο άνθισης
      description: Υποδεικνύει πόσο ανοιχτά είναι τα άνθη μαργαρίτας κατά την παράδοση/αποστολή.
    blower_motor_bearing_type:
      name: Τύπος ρουλεμάν μοτέρ ανεμιστήρα
      description: Καθορίζει τον σχεδιασμό ρουλεμάν που χρησιμοποιείται στο μοτέρ
        του ανεμιστήρα.
    blower_motor_mounting_position:
      name: Θέση τοποθέτησης μοτέρ ανεμιστήρα
      description: Το σημείο όπου είναι εγκατεστημένο το μοτέρ του ανεμιστήρα στη
        μονάδα HVAC ή στο όχημα (π.χ., μπροστά, πίσω).
    blowpipe_valve_type:
      name: Τύπος βαλβίδας φυσητήρα
      description: Καθορίζει το στυλ βαλβίδας φυσητήρα που περιλαμβάνεται (εάν υπάρχει).
    bo_staff_style:
      name: Στυλ ράβδου Bo
      description: Ορίζει το δομικό στυλ ή την κατασκευή του μπαστουνιού (π.χ., ίσιο,
        κωνικό, με αφρώδες υλικό, πτυσσόμενο).
    board_game_theme:
      name: Θέμα επιτραπέζιου παιχνιδιού
      description: Αφηγηματικό/θεματικό πλαίσιο του επιτραπέζιου παιχνιδιού (που χρησιμοποιείται
        για ανακάλυψη και περιήγηση).
    board_rail_shape:
      name: Σχήμα περιμετρικού χείλους της σανίδας
      description: Καθορίζει το περίγραμμα των πλαϊνών της σανίδας (π.χ., μαλακά,
        σκληρά, 50/50) που επηρεάζει το κράτημα και την κατεύθυνση στο κύμα.
    board_size_classification:
      name: Ταξινόμηση μεγέθους σανίδας
      description: Ταξινομεί την σανίδα ή το σετ cornhole σε κοινά τυποποιημένα μεγέθη.
    board_type_compatibility:
      name: Συμβατότητα τύπου σανίδας
      description: Καθορίζει τον τύπο της σανίδας για την οποία έχει σχεδιαστεί το
        λουρί.
    boat_construction_type:
      name: Τύπος κατασκευής βάρκας
      description: Περιγράφει το δομικό στυλ ή τη μορφή της κωπηλατικής βάρκας με
        κουπιά (π.χ. φουσκωτή, άκαμπτη).
    boat_hook_flotation:
      name: Πλευστότητα με γάντζο σκάφους
      description: Υποδεικνύει αν το γάντζο σκάφους έχει σχεδιαστεί ώστε να επιπλέει
        σε περίπτωση που πέσει στο νερό.
    boat_ladder_stowage_style:
      name: Στυλ αποθήκευσης σκάλας σκάφους
      description: Περιγράφει τον τρόπο αποθήκευσης της σκάλας όταν δε χρησιμοποιείται
        (π.χ., πτυσσόμενη, αναδιπλούμενη, αφαιρούμενη).
    boat_trailer_construction_type:
      name: Τύπος κατασκευής τρέιλερ σκάφους
      description: Υποδεικνύει αν το τρέιλερ υποστηρίζει το σκάφος με τάκους, κυλίνδρους
        ή υβριδικό σύστημα.
    boat_weaving_shuttle_weft_exit_type:
      name: Τύπος εξόδου του υφαδιού από το σαΐτι της ύφανσης
      description: Ο τρόπος με τον οποίο το νήμα υφαδιού εξέρχεται από τη σαΐτα κατά
        την ύφανση.
    bobbin_loading_type:
      name: Τύπος φόρτωσης μπομπίνας
      description: Καθορίζει τον τρόπο εισαγωγής/τοποθέτησης της μπομπίνας στη ραπτομηχανή.
    bobbin_system:
      name: Σύστημα μπομπίνας
      description: Το σύστημα/τύπος φόρτωσης μπομπίνας που χρησιμοποιείται από τη
        ραπτομηχανή.
    bobbin_type:
      name: Τύπος μπομπίνας
      description: Καθορίζει τη μορφή φορέα νήματος για την οποία έχει σχεδιαστεί
        (ή περιλαμβάνει) το σαΐτι, γεγονός που επηρεάζει τη συμβατότητα και τη συνήθη
        χρήση του (π.χ. τα boat shuttles χρησιμοποιούν συχνά μπομπίνες, ενώ τα rag
        shuttles μπορεί να είναι ανοικτά για λωρίδες υφάσματος).
    bobbin_winder_winding_direction:
      name: Κατεύθυνση περιέλιξης του τυλιχτή μπομπίνας
      description: Καθορίζει την κατεύθυνση περιέλιξης/περιστροφής που υποστηρίζεται
        από το μηχανισμό τυλίγματος της μπομπίνας.
    bobble_mechanism:
      name: Μηχανισμός ταλάντωσης
      description: Καθορίζει το στυλ του μηχανισμού ταλάντωσης, ο οποίος επηρεάζει
        την κίνηση και την ανθεκτικότητα.
    bocal_material:
      name: Υλικό μεταλλικού λαιμού
      description: Καθορίζει το υλικό του(των) συμπεριλαμβανομένου(-ων) επιστομίου(-ων).
    bodhr_n_head_material:
      name: Υλικό κεφαλής Bodhrán
      description: Το υλικό της κεφαλής αναπαραγωγής (μεμβράνη), το οποίο επηρεάζει
        έντονα τον τόνο και τις απαιτήσεις συντήρησης.
    bodhr_n_tuning_system_type:
      name: Τύπος συστήματος κουρδίσματος bodhrán
      description: Το στυλ του ενσωματωμένου μηχανισμού συντονισμού που χρησιμοποιείται
        για τη ρύθμιση της τάσης της κεφαλής (εάν έχει δυνατότητα συντονισμού).
    body_armor_coverage_area:
      name: Περιοχή κάλυψης θωράκισης σώματος
      description: Υποδεικνύει ποιες ζώνες σώματος προστατεύει το προϊόν.
    body_armor_intended_use:
      name: Προβλεπόμενη χρήση θωράκισης αμαξώματος
      description: Καθορίζει το βασικό σενάριο οδήγησης ή χρήσης για το οποίο έχει
        σχεδιαστεί η προστατευτική πανοπλία για ATV/UTV.
    body_cord_connector_style:
      name: Τύπος συνδέσμου καλωδίου αμαξώματος
      description: Περιγράφει τη διαμόρφωση του συνδέσμου στα άκρα των καλωδίων (π.χ.,
        αριθμό ακίδων ή στυλ μπαγιονέτ) που καθορίζει τη συμβατότητα με όπλα και συσκευές
        καταγραφής σκορ.
    body_panel_finish_state:
      name: Κατάσταση φινιρίσματος πάνελ αμαξώματος
      description: Περιγράφει την κατάσταση προετοιμασίας/φινιρίσματος της επιφάνειας
        του πίσω πλαϊνού πάνελ όπως διατίθεται προς πώληση, για βαφή ή εγκατάσταση.
    body_shape:
      name: Σχήμα σώματος
      description: Καθορίζει το γενικό σχήμα ή το στυλ του σώματος της ηλεκτρικής
        κιθάρας.
    bodysuit_bottom_coverage:
      name: Κάλυψη κάτω μέρους στο κορμάκι
      description: Καθορίζει το κόψιμο και την κάλυψη που έχει το κορμάκι στο κάτω
        μέρος, επηρεάζοντας την άνεση και τη συμβατότητα με το υπόλοιπο ντύσιμο.
    boilie_shape:
      name: Σχήμα Boilie
      description: Προσδιορίζει το σχήμα των boilies που παράγονται από το τραπέζι
        κύλισης, επιτρέποντας στους ψαράδες να επιλέξουν ανάμεσα σε διαφορετικά προφίλ
        δολωμάτων.
    boilie_stop_buoyancy:
      name: Άνωση του boilie stop
      description: Καθορίζει αν το boilie stop έχει σχεδιαστεί να επιπλέει, να βυθίζεται
        ή να είναι ουδέτερα πλευστό, επηρεάζοντας την παρουσίαση του δολώματος στη
        στήλη του νερού.
    bok_choy_variety:
      name: Ποικιλία Bok choy
      description: Καθορίζει την καλλιέργεια, το όνομα αγοράς ή την ποικιλία του bok
        choy (π.χ. Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), επιτρέποντας στον
        αγοραστή να επιλέγει την επιθυμητή γεύση, μέγεθος και εμφάνιση.
    bolt_drive_style:
      name: Τύπος κίνησης μπουλονιού
      description: Καθορίζει τον τύπο κίνησης των μπουλονιών στερέωσης του skateboard,
        διακρίνοντας μεταξύ κοινών τύπων όπως Allen ή Phillips.
    bone_content:
      name: Περιεκτικότητα οστών
      description: Καθορίζει εάν το κρέας περιέχει κόκαλα.
    bongo_center_block_material:
      name: Υλικό κεντρικού μπλοκ bongo
      description: Υλικό του κεντρικού μπλοκ που συνδέει τα δύο κελύφη bongo (εάν
        υπάρχει).
    bongo_shell_material:
      name: Υλικό κελύφους Bongo
      description: Υλικό των κελυφών bongo (σώματα τυμπάνων), εξαιρουμένων των μεμβρανών
        και του υλικού εξοπλισμού.
    bongo_tuning_system:
      name: Σύστημα κουρδίσματος Bongo
      description: Καθορίζει τον τρόπο κουρδίσματος/κατασκευής των bongo για το κούρδισμα
        (π.χ. παραδοσιακό σύστημα με τάπες/βίδες ή δέσιμο με σχοινί), επηρεάζοντας
        τη συντήρηση και την αυθεντικότητα του οργάνου.
    boning_type:
      name: Τύπος νευρώσεων
      description: Καθορίζει το δομικό σύστημα υποστήριξης στο εσώρουχο σύσφιξης (cincher),
        συνδυάζοντας τόσο το υλικό όσο και τον τύπο/σχήμα των μπανελών που χρησιμοποιούνται,
        επηρεάζοντας άμεσα το επίπεδο στήριξης, την ευκαμψία και την ανθεκτικότητα.
    boot_liner_type:
      name: Τύπος επένδυσης μπότας
      description: Περιγράφει την κατασκευή ή την ικανότητα προσαρμογής της εσωτερικής
        επένδυσης στο εσωτερικό της μπότας του snowboard (π.χ. θερμοδιαμορφώσιμη,
        αφαιρούμενη).
    boot_sole_compatibility:
      name: Συμβατότητα σόλας μπότας
      description: Καταγράφει τα πρότυπα σόλας μποτών ή τα συστήματα διεπαφής που
        δέχεται το δέσιμο.
    boot_support_level:
      name: Επίπεδο υποστήριξης μπότας
      description: Περιγράφει τη συνολική ακαμψία ή το επίπεδο υποστήριξης στον αστράγαλο/μπότα
        που προσφέρει το παγοπέδιλο.
    boot_width_code:
      name: Κωδικός πλάτους μπότας
      description: Προσδιορισμός πλάτους με γράμματα του κατασκευαστή που χρησιμοποιείται
        ειδικά στα μεγέθη παγοπέδιλων καλλιτεχνικού πατινάζ (π.χ. AAA, AA, B, C, D).
    booth_configuration:
      name: Διαμόρφωση θαλάμου
      description: Προσδιορίζει τη συνολική διαμόρφωση καθισμάτων του booth (π.χ.
        μονής όψης, γωνιακό, αρθρωτό).
    bootie_toe_design:
      name: Σχεδιασμός δακτύλων για μποτάκια
      description: Προσδιορίζει το στυλ κατασκευής των δακτύλων για μποτάκια surf
        και reef.
    border_type:
      name: Τύπος περιγράμματος
      description: Στυλ φινιρίσματος/περιγράμματος της ραφής στο κεντημένο έμβλημα
        (patch) (επηρεάζει την εμφάνιση, την αντοχή στο ξεφτίσμα και την αντιλαμβανόμενη
        ποιότητα).
    bore_cleaner_format:
      name: Μορφή καθαριστικού αυλού
      description: Υποδεικνύει τη φυσική μορφή του προϊόντος καθαρισμού αυλού (εργαλείο
        έναντι αναλώσιμου).
    bore_cleaner_safe_for_finish:
      name: Καθαριστικό οπής ασφαλές για το φινίρισμα
      description: Υποδεικνύει με ποια κοινά φινιρίσματα χάλκινων οργάνων είναι ασφαλής
        η χρήση του καθαριστικού αυλού.
    bottle_cage_loading_direction:
      name: Κατεύθυνση τοποθέτησης παγουροθήκης
      description: Περιγράφει την κατεύθυνση από την οποία το μπουκάλι εισάγεται ή
        αφαιρείται από τη θήκη.
    bottle_neck_finish_closure_size:
      name: Φινίρισμα στομίου φιάλης / μέγεθος πώματος
      description: Το τυποποιημένο μέγεθος ανοίγματος/φινιρίσματος φιάλης για τη διασφάλιση
        της συμβατότητας με καπάκια, φελλούς και μηχανισμούς πωματισμού (π.χ. φινίρισμα
        crown 26 mm).
    bottle_style:
      name: Στυλ φιάλης
      description: Συνήθεις παράγοντες μορφής μπουκαλιών εμφιάλωσης που χρησιμοποιούνται
        στην οικιακή ζυθοποιία και οινοποίηση.
    bottom_bracket_interface:
      name: Διεπαφή κάτω βραχίονα
      description: Καθορίζει το πρότυπο άξονα/μεσαίας τριβής για το οποίο έχει σχεδιαστεί
        ο στρόφαλος, εξασφαλίζοντας τη συμβατότητα με το πλαίσιο και τη μεσαία τριβή.
    bottom_bracket_standard:
      name: Πρότυπο μεσαίας τριβής
      description: Κέλυφος/πρότυπο διεπαφής της μεσαίας τριβής που υποστηρίζεται από
        το πλαίσιο, καθορίζοντας τη συμβατότητα με τον στρόφαλο.
    bottom_type_suitability:
      name: Καταλληλότητα τύπου κάτω μέρους
      description: Καθορίζει τις συνθήκες βυθού στις οποίες η άγκυρα είναι σχεδιασμένη
        να προσφέρει το καλύτερο κράτημα.
    bounce_level:
      name: Επίπεδο αναπήδησης
      description: Υποδεικνύει πόσο αναπηδά η μπάλα όταν πέφτει ή πετιέται, βοηθώντας
        τους χρήστες να επιλέξουν τη σωστή μπάλα για ασκήσεις όπως ρίψεις στον τοίχο
        ή δυναμικές ρίψεις στο έδαφος.
    bouncy_ball_surface_finish:
      name: Φινίρισμα επιφάνειας μπάλας αναπήδησης
      description: Καθορίζει το απτικό ή/και οπτικό φινίρισμα επιφάνειας μιας μπάλας
        αναπήδησης (π.χ. λεία, με ακίδες, γκλίτερ).
    boundary_marker_type:
      name: Τύπος σήμανσης ορίων
      description: Ορίζει τη φυσική μορφή της σήμανσης ορίων γηπέδου ή του προϊόντος
        διαγράμμισης (π.χ. κώνος, ταινία, χρώμα, στένσιλ, μηχάνημα).
    bouquet_size_tier:
      name: Κατηγορία μεγέθους της ανθοδέσμης
      description: Τυποποιημένη κατηγορία μεγέθους για την ανθοδέσμη/δέσμη, ανεξάρτητα
        από τον αριθμό των μίσχων (χρήσιμη όταν υπάρχουν μεικτά είδη μίσχων).
    bow_and_yo_yo_edge_finish:
      name: Φινίρισμα άκρων δοξαριού και γιο-γιο
      description: Περιγράφει το φινίρισμα μπορντούρας/κοπής που χρησιμοποιείται στο
        φιόγκο/yo-yo (ειδικά για φιόγκους με κορδέλα).
    bow_case_shell_type:
      name: Τύπος κελύφους θήκης τόξου.
      description: Περιγράφει τη δομική κατασκευή της εξωτερικής θήκης του τόξου (π.χ.
        σκληρή θήκη έναντι μαλακής θήκης).
    bow_compatibility:
      name: Συμβατότητα τόξου
      description: Καθορίζει τον τύπο του τόξου για τον οποίο προορίζεται ή για τον
        οποίο έχει βαθμολογηθεί η λεπίδα.
    bow_hair_color:
      name: Χρώμα τριχών δοξαριού
      description: Καθορίζει το χρώμα/εμφάνιση των τριχών που χρησιμοποιούνται στο
        δοξάρι ορχηστρικού εγχόρδου οργάνου (π.χ. λευκές/αποχρωματισμένες, φυσικές
        λευκές, μαύρες).
    bow_stick_material:
      name: Υλικό ράβδου τόξου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τη βέργα του δοξαριού
        (το κύριο στέλεχος), το οποίο επηρεάζει σημαντικά το βάρος, την αίσθηση και
        την τιμή.
    bow_type:
      name: Τύπος δοξαριού
      description: Καθορίζει τον δομικό σχεδιασμό του παιδικού τόξου (π.χ. σύνθετο/compound,
        επανακλινόμενο/recurve, longbow), που επηρεάζει σε μεγάλο βαθμό το στυλ βολής,
        τα απαιτούμενα αξεσουάρ και τα προγράμματα εκπαίδευσης.
    bow_winding_material:
      name: Υλικό περιέλιξης δοξαριού
      description: Καθορίζει το υλικό που χρησιμοποιείται για την περιέλιξη/επικάλυψη
        του δοξαριού, επηρεάζοντας το κράτημα και την ισορροπία.
    bow_yo_yo_embellishment_style:
      name: Στυλ διακόσμησης δοξαριού/γιο-γιο
      description: Καθορίζει το στυλ κατασκευής του διακοσμητικού στοιχείου (π.χ.
        φιόγκος ή κατασκευή τύπου υφασμάτινου yo-yo).
    bowling_ball_core_type:
      name: Τύπος πυρήνα μπάλας μπόουλινγκ
      description: Προσδιορίζει τον εσωτερικό σχεδιασμό του πυρήνα ή ή τη συμμετρία
        της μπάλας του μπόουλινγκ, που επηρεάζει την κίνηση της μπάλας και τη δυνατότητα
        φαλτσαρίσματος.
    bowling_ball_coverstock_type:
      name: Τύπος καλύμματος μπάλας μπόουλινγκ
      description: Καθορίζει το υλικό ή την τεχνολογία του εξωτερικού καλύμματος της
        μπάλα μπόουλινγκ, που καθορίζει την πρόσφυση και την ικανότητα κάμψης.
    bowling_set_style:
      name: Στυλ σετ μπόουλινγκ
      description: Ορίζει το γενικό στυλ ή τη χρήση της λέξης «θήκη» του σετ μπόουλινγκ.
    box_lid_type:
      name: Τύπος καπακιού κουτιού
      description: Τύπος μηχανισμού καπακιού/ανοίγματος που χρησιμοποιείται στο κουτί
        δώρου ή το μεταλλικό δοχείο.
    box_spring_profile:
      name: Προφίλ πλαισίου με ελατήρια
      description: Κατηγοριοποιεί το συνολικό ύψος του πλαισίου με ελατήρια σε φιλικές
        προς τον αγοραστή κατηγορίες προφίλ (π.χ. χαμηλό, στάνταρ, υψηλό), ώστε οι
        πελάτες να μπορούν να φιλτράρουν γρήγορα χωρίς να γνωρίζουν τις ακριβείς διαστάσεις.
    box_spring_requirement:
      name: Απαίτηση υποστρώματος με ελατήρια
      description: Υποδεικνύει εάν χρειάζεται επιπλέον ελατήριο ή βάση για το στρώμα.
    boxing_ring_style:
      name: Στυλ ρινγκ πυγμαχίας
      description: Κατηγοριοποιεί το συνολικό στυλ κατασκευής ή το προοριζόμενο σενάριο
        χρήσης του κρίκου (π.χ. για αγώνες έναντι προπόνησης, σε ανύψωση έναντι στο
        έδαφος).
    bra_length_type:
      name: Τύπος μήκους σουτιέν
      description: Ορίζει την κατηγοριοποίηση του μήκους των σουτιέν με βάση την κατακόρυφη
        κάλυψη, όπως στάνταρ, longline, midi ή cropped.
    bra_padding_type:
      name: Τύπος ενίσχυσης σουτιέν
      description: Περιγράφει το επίπεδο ή την παρουσία ενίσχυσης στα κύπελλα.
    braces_compatibility:
      name: Συμβατότητα με αντηρίδες
      description: Καθορίζει εάν το μασελάκι μπορεί να φορεθεί μαζί με ορθοδοντικά
        σιδεράκια και σε ποιο βαθμό.
    brake_band_form:
      name: Μορφή της ζώνης φρένων
      description: Υποδεικνύει εάν ο ιμάντας φρένου παρέχεται ως συνεχής βρόχος (ατέρμονος)
        ή ως κομμένο μήκος που πρέπει να στερεωθεί.
    brake_band_material_type:
      name: Τύπος υλικού ζώνης φρένων
      description: Καθορίζει το λειτουργικό υλικό του ιμάντα φρένου (π.χ. βαμβακερό
        κορδόνι έναντι νάιλον νήματος έναντι ατσάλινου ελατηρίου), το οποίο επηρεάζει
        την ανθεκτικότητα, το κράτημα, την ελαστικότητα και τον θόρυβο.
    brake_band_style:
      name: Στυλ ζώνης φρένων
      description: Καθορίζει το σύστημα/στυλ τάσης του ιμάντα φρένων που χρησιμοποιείται
        σε έναν περιστρεφόμενο τροχό για την εφαρμογή τάσης πτερυγίου/μπομπίνας.
    brake_bleeding_method:
      name: Μέθοδος εξαέρωσης φρένων
      description: Προσέγγιση εξαέρωσης που υποστηρίζεται από το κιτ.
    brake_booster_assist_type:
      name: Τύπος υποβοήθησης σερβόφρενου
      description: Υποδεικνύει τον μηχανισμό υποβοήθησης που χρησιμοποιείται από το
        σερβόφρενο.
    brake_booster_diaphragm_configuration:
      name: Διαμόρφωση διαφράγματος σερβόφρενου
      description: Υποδεικνύει τον αριθμό/τύπο μεμβρανών που χρησιμοποιούνται στον
        ενισχυτή.
    brake_caliper_bleeder_screw_position:
      name: Θέση βίδας εξαέρωσης δαγκάνας φρένων
      description: Καθορίζει τη θέση της βίδας εξαέρωσης στη δαγκάνα μετά την τοποθέτηση
        (χρησιμοποιείται για να επιβεβαιωθεί ότι ο εξαερωτήρας είναι προσανατολισμένος
        στο υψηλότερο σημείο για σωστή εξαέρωση).
    brake_caliper_finish:
      name: Φινίρισμα δαγκάνας φρένων
      description: Καθορίζει το φινίρισμα επιφάνειας ή την προστατευτική επίστρωση
        που εφαρμόζεται στο σώμα του δαγκάνα φρένου (π.χ. βαφή, επιχρύσωση/plating,
        ανοδίωση).
    brake_caliper_included_hardware:
      name: Περιλαμβάνεται υλικός εξοπλισμός δαγκάνας φρένου
      description: Καθορίζει τι περιλαμβάνεται στο συγκρότημα δαγκάνας.
    brake_caliper_mount_type:
      name: Τύπος βάσης δαγκάνας φρένων
      description: Στυλ διεπαφής στήριξης που χρησιμοποιείται για τη σύνδεση της δαγκάνας
        στην άρθρωση/βάση.
    brake_caliper_paint_base_chemistry:
      name: Χημεία βάσης χρώματος δαγκάνας φρένων
      description: Το σύστημα βαφής/φινιρίσματος ή η χημική οικογένεια που χρησιμοποιήθηκε.
    brake_caliper_paint_kit_contents:
      name: Περιεχόμενα κιτ εμβόλου δαγκάνας φρένου
      description: Υποδεικνύει τι περιλαμβάνεται στη συσκευασία πέρα από τη βαφή καθαυτή.
    brake_circuit_type:
      name: Τύπος κυκλώματος πέδησης
      description: Διαμόρφωση υδραυλικού κυκλώματος που υποστηρίζεται από τον κύριο
        κύλινδρο.
    brake_clutch_fluid_base_chemistry:
      name: Βασική χημεία υγρού φρένων/συμπλέκτη
      description: Κύρια χημική βάση του υδραυλικού υγρού φρένων/συμπλέκτη, η οποία
        επηρεάζει τη συμβατότητα και την αναμειξιμότητα.
    brake_clutch_fluid_dot_specification:
      name: Προδιαγραφές υγρού φρένων/συμπλέκτη DOT
      description: Ταξινόμηση απόδοσης DOT για υγρά υδραυλικών φρένων/συμπλέκτη (π.χ.,
        DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Φινίρισμα/επικάλυψη τυμπάνου φρένου
      description: Επιφανειακό φινίρισμα ή προστατευτική επίστρωση που εφαρμόζεται
        στο ταμπούρο φρένων (π.χ., ηλεκτρονική επίστρωση, βαμμένο, επιψευδαργυρωμένο).
    brake_drum_type:
      name: Τύπος ταμπούρου φρένων
      description: Τύπος σχεδιασμού του ταμπούρου φρένων (με ή χωρίς ενσωματωμένη
        πλήμνη/ρουλεμάν).
    brake_fluid_base:
      name: Βάση υγρού φρένων
      description: Καθορίζει τη σύνθεση του απαιτούμενου ή περιλαμβανόμενου υγρού
        υδραυλικών φρένων.
    brake_fluid_base_chemistry:
      name: Χημεία βάσης υγρού φρένων
      description: Ορίζει τη χημική βάση του υγρού φρένων, η οποία καθορίζει τη συμβατότητα
        και τους κανόνες ανάμειξης.
    brake_fluid_dot_specification:
      name: Προδιαγραφή DOT υγρού φρένων
      description: Υποδεικνύει την κατάταξη/προδιαγραφή DOT του υγρού φρένων (π.χ.
        DOT 3, DOT 4) για προϊόντα υγρών φρένων.
    brake_fluid_standards_compliance:
      name: Συμμόρφωση με τα πρότυπα υγρών φρένων
      description: Βιομηχανικά πρότυπα που ισχυρίζεται ότι πληροί το υγρό φρένων (πέραν
        της αξιολόγησης DOT).
    brake_fluid_type:
      name: Τύπος υγρού φρένων
      description: Καθορίζει το υγρό φρένων που απαιτείται για τις υδραυλικές δαγκάνες
        φρένων ποδηλάτων.
    brake_hose_end_fitting_type:
      name: Τύπος συνδέσμου άκρου σωλήνα φρένου
      description: Στυλ σύνδεσης σε κάθε άκρο του σωλήνα φρένου (π.χ. banjo, flare,
        αρσενικό/θηλυκό σπείρωμα), που χρησιμοποιείται για να εξασφαλιστεί η συμβατότητα
        με δαγκάνες και γραμμές.
    brake_lever_pull_type:
      name: Τύπος έλξης μανέτας φρένου
      description: Ορίζει την αναλογία έλξης/μηχανικό πλεονέκτημα της μανέτας, διασφαλίζοντας
        τη συμβατότητα με συγκεκριμένες δαγκάνες (π.χ. μικρής διαδρομής/short-pull,
        μεγάλης διαδρομής/long-pull).
    brake_light_switch_actuation_type:
      name: Τύπος ενεργοποίησης διακόπτη φώτων φρένων
      description: Καθορίζει ποιο φυσικό γεγονός ενεργοποιεί τον διακόπτη (π.χ. πεντάλ/έμβολο
        έναντι υδραυλικής πίεσης κ.λπ.).
    brake_light_switch_connector_type:
      name: Τύπος ενεργοποίησης διακόπτη φώτων φρένων
      description: Καθορίζει το στυλ/μορφή του ηλεκτρικού συγχρονιστή που χρησιμοποιείται
        από τον διακόπτη φώτων φρένων για σύνδεση με την καλωδίωση του οχήματος.
    brake_light_switch_contact_type:
      name: Τύπος επαφής διακόπτη φώτων φρένων
      description: Διαμόρφωση/συμπεριφορά ηλεκτρικών επαφών του διακόπτη φώτων φρένων
        (π.χ. κανονικά ανοικτή/κλειστή, μεταγωγική ή πολλαπλών κυκλωμάτων).
    brake_light_switch_mounting_style:
      name: Στυλ τοποθέτησης διακόπτη φώτων φρένων
      description: Πώς τοποθετείται/εγκαθίσταται ο διακόπτης φώτων φρένων στο όχημα
        ή στο σύστημα φρένων (π.χ., νήμα, κλιπ, βάση στήριξης, μπουλόνι Banjo ).
    brake_master_cylinder_mounting_type:
      name: Τύπος στήριξης κύριου κυλίνδρου φρένων
      description: Ο τρόπος στήριξης της κεντρικής αντλίας φρένων στο όχημα/σερβόφρενο
        (διάταξη μπουλονιών, μέγεθος φλάντζας).
    brake_master_cylinder_reservoir_type:
      name: Τύπος δοχείου κύριου κυλίνδρου φρένων
      description: Τύπος/διαμόρφωση του δοχείου υγρού φρένων που παρέχεται ή απαιτείται
        από την κεντρική αντλία.
    brake_mount_type:
      name: Τύπος βάσης στήριξης φρένου
      description: Προσδιορίζει τη διεπαφή πέδησης που είναι ενσωματωμένη στο πιρούνι,
        ώστε οι αναβάτες να μπορούν να επιβεβαιώσουν τη συμβατότητα του συστήματος
        πέδησης.
    brake_mounting_flange_bolt_pattern:
      name: Διάταξη μπουλονιών φλάντζας στήριξης φρένου
      description: Καθορίζει τη φλάντζα στήριξης / διάταξη μπουλονιών για τη σύνδεση
        της πλάκας στήριξης φρένων ή της βάσης δαγκάνας στον άξονα του ρυμουλκούμενου
        (π.χ. 4 μπουλόνια).
    brake_pad_backing_plate_material:
      name: Υλικό πλάκας στήριξης τακακιού φρένου
      description: Καθορίζει το υλικό της πλάκας στήριξης των τακακιών φρένων, επηρεάζοντας
        την απαγωγή θερμότητας και το βάρος.
    brake_pad_compatible_rotor_type:
      name: Τύπος ρότορα συμβατού με τακάκια φρένων
      description: Καθορίζει τον προβλεπόμενο τύπο επιφάνειας ρότορα/δίσκου με τον
        οποίο έχει σχεδιαστεί να λειτουργεί το τακάκι.
    brake_pad_compound:
      name: Μείγμα για τακάκια φρένων
      description: Προσδιορίζει τον τύπο του υλικού τριβής ενός τακακιού φρένων.
    brake_pad_form_factor:
      name: Συντελεστής μορφής τακακιού φρένων
      description: Καθορίζει το σύστημα/τον συντελεστή μορφής φρένων για το οποίο
        έχει σχεδιαστεί το τακάκι (π.χ. δισκόφρενο, ταμπούρο, χειρόφρενο).
    brake_pad_material:
      name: Υλικό τακακιού φρένων
      description: Καθορίζει το μείγμα τριβής / την οικογένεια υλικών που χρησιμοποιούνται
        στην επένδυση των τακακιών φρένων.
    brake_pad_shim_included:
      name: Περιλαμβάνεται έλασμα τακακιού φρένου
      description: Υποδεικνύει εάν περιλαμβάνονται ή είναι προτοποθετημένα ελάσματα
        μείωσης θορύβου.
    brake_pad_wear_indicator_type:
      name: Τύπος δείκτη φθοράς τακακιών φρένων
      description: Υποδεικνύει τον τύπο του δείκτη φθοράς που περιλαμβάνεται στα τακάκια
        φρένων (π.χ. μηχανική ηχητική γλωσσίδα ή ηλεκτρονικός αισθητήρας).
    brake_position:
      name: Θέση φρένου
      description: Υποδεικνύει πού στο όχημα προορίζεται να εγκατασταθεί το εξάρτημα
        πέδησης.
    brake_rotor_mount_type:
      name: Τύπος στερέωσης δίσκου φρένου
      description: Ορίζει τη διεπαφή που χρησιμοποιείται για τη σύνδεση ενός ρότορα
        φρένου στην πλήμνη (εάν υπάρχει).
    brake_service_kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα κιτ σέρβις φρένων
      description: Λίστα εργαλείων/προσαρμογέων/αναλώσιμων που περιλαμβάνονται στο
        κιτ σέρβις φρένων.
    brake_shoe_friction_material:
      name: Υλικό τριβής σιαγόνας φρένου
      description: Το μείγμα της τριβής/επένδυσης στη σιαγόνα φρένου (το υλικό που
        έρχεται σε επαφή με το τύμπανο).
    brake_shoe_set_contents:
      name: Περιεχόμενα κιτ σιαγόνων φρένου
      description: Τι περιλαμβάνεται στη συσκευασία (π.χ. μόνο σιαγόνες έναντι σιαγόνων
        με παρελκόμενα/ελατήρια).
    brake_system_type:
      name: Τύπος συστήματος πέδησης
      description: Καθορίζει την τεχνολογία μηχανισμού πέδησης που χρησιμοποιείται
        για τον έλεγχο της περιστροφής της μπομπίνας κατά τη ρίψη.
    brake_type:
      name: Τύπος φρένων
      description: Τύπος μηχανισμού πέδησης/τάνυσης του στημονιού.
    brandy_age_classification:
      name: Κατηγοριοποίηση παλαίωσης μπράντι
      description: Κατηγοριοποιεί το μπράντι χρησιμοποιώντας ονομασίες ποιότητας/ηλικίας
        που αντικατοπτρίζουν τα πρότυπα του κλάδου (π.χ., VS, VSOP, XO), τα οποία
        αντικατοπτρίζουν τις ελάχιστες απαιτήσεις παλαίωσης.
    brass_cleaning_tool_type:
      name: Τύπος εργαλείου καθαρισμού ορείχαλκου
      description: Καθορίζει τον τύπο του εργαλείου που χρησιμοποιείται για τον καθαρισμό
        ή τη συντήρηση χάλκινων οργάνων.
    brass_instrument_application_area:
      name: Περιοχή εφαρμογής χάλκινων οργάνων
      description: Το(τα) μέρος(-η) του χάλκινου οργάνου στο(στα) οποίο(-α) προορίζεται
        να χρησιμοποιηθεί το απολυμαντικό σπρέι.
    brass_instrument_care_kit_purpose:
      name: Σκοπός κιτ φροντίδας χάλκινων οργάνων
      description: Περιγράφει το προβλεπόμενο σενάριο χρήσης για το κιτ (τακτική συντήρηση,
        βαθύς καθαρισμός, ταξίδι/έκτακτη ανάγκη, φοιτητικό starter kit, κ.λπ.).
    brass_instrument_case_shell_material:
      name: Υλικό κελύφους θήκης χάλκινων οργάνων
      description: Κύριο υλικό του σκληρού κελύφους/πλαισίου (όπου εφαρμόζεται), ανεξάρτητα
        από το γενικό υλικό της τσάντας/θήκης.
    brass_instrument_lubricant_additives_features:
      name: Πρόσθετα/χαρακτηριστικά λιπαντικών για χάλκινα όργανα
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά της σύνθεσης του λιπαντικού.
    brass_instrument_lubricant_base_composition:
      name: Σύνθεση βάσης λιπαντικού για χάλκινα πνευστά όργανα
      description: Πρωτογενής βάση/χημεία λιπαντικού που χρησιμοποιείται για λιπαντικά
        χάλκινων πνευστών οργάνων.
    brass_instrument_lubricant_viscosity_grade:
      name: Βαθμός ιξώδους λιπαντικού για χάλκινα όργανα
      description: Σχετικό πάχος/ροή του λιπαντικού που προορίζεται για χάλκινα όργανα.
    brass_instrument_replacement_part_type:
      name: Τύπος ανταλλακτικού για πνευστά ορειχάλκινα όργανα
      description: Καθορίζει το είδος του ανταλλακτικού που πρόκειται για χάλκινα
        πνευστά όργανα (εξαρτήματα κλειδιών βαλβίδας/ολίσθησης/νερού, φελλοί/τσόχες,
        προστατευτικά κ.λπ.).
    brass_instrument_valve_configuration:
      name: Διαμόρφωση βαλβίδας χάλκινων οργάνων
      description: Πώς αλλάζει το τονικό ύψος του οργάνου (μηχανισμός βαλβίδας/ολίσθησης).
    brass_lubricant_application_area:
      name: Περιοχή εφαρμογής λιπαντικού για ορειχάλκινα πνευστά όργανα
      description: Ο μηχανισμός των χάλκινων οργάνων για τον οποίο προορίζεται το
        λιπαντικό.
    brass_mouthpiece_backbore:
      name: Πίσω διάμετρος του χάλκινου επιστομίου
      description: Προφίλ/κατηγορία επιστομίου (σχήμα/μέγεθος του επιστομίου), που
        επηρεάζει τον τόνο και τον τονισμό.
    brass_mouthpiece_cup_depth:
      name: Βάθος κυπέλλου επιστομίου από ορείχαλκο
      description: Ταξινόμηση βάθους κυπέλλου του επιστομίου (πόσο βαθύ είναι το κύπελλο),
        που επηρεάζει τον τόνο και την απόκριση.
    brass_polishing_cloth_abrasiveness_level:
      name: Επίπεδο λειαντικότητας του πανιού γυαλίσματος για χάλκινα όργανα
      description: Υποδεικνύει πόσο έντονο είναι το πανί στο να αφαιρεί τη θαμπάδα
        σε σύγκριση με το να προσφέρει ένα απαλό γυάλισμα.
    bread_crumb_base_ingredient:
      name: Βασικό συστατικό πάνκο
      description: Υποδεικνύει το κύριο συστατικό από το οποίο παρασκευάζεται το πάνκο,
        όπως σιτάρι, ρύζι, χοιρινό δέρμα ή αμύγδαλο.
    bread_variety:
      name: Ποικιλία ψωμιού
      description: Καθορίζει το στυλ ή την ποικιλία του ψωμιού ή των κουλουριών, βοηθώντας
        τους αγοραστές να εντοπίσουν συγκεκριμένους τύπους (π.χ. brioche, μπαγκέτα,
        naan).
    breadstick_style:
      name: Τύπος κριτσινιού
      description: Προσδιορίζει το συγκεκριμένο παραδοσιακό στυλ ή μορφή του ψωμιού.
    bridge_head_material:
      name: Υλικό κεφαλής γέφυρας
      description: Υλικό που χρησιμοποιείται αποκλειστικά για την κεφαλή της γέφυρας,
        επηρεάζοντας το βάρος, την αίσθηση και την ανθεκτικότητα.
    bridge_head_type:
      name: Τύπος κεφαλής Bridge
      description: Καθορίζει το στυλ της κεφαλής της γέφυρας, βοηθώντας τους αγοραστές
        να επιλέξουν το προτιμώμενο σχήμα για την υποστήριξη της στέκας.
    bridle_part_type:
      name: Τύπος μέρους του χαλιναριού
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα του χαλιναριού που αντιπροσωπεύει
        το ανταλλακτικό κομμάτι, βοηθώντας τους πελάτες να βρουν το ακριβές εξάρτημα
        που χρειάζονται.
    bridle_style:
      name: Στυλ χαλιναριού
      description: Ταξινομεί το συνολικό στυλ ή την κατασκευή του χαλιναριού, ώστε
        οι αναβάτες να μπορούν να εντοπίζουν γρήγορα τον εξοπλισμό που ταιριάζει στις
        ανάγκες ή το άθλημά τους.
    broadhead_field_point_attachment_style:
      name: Στυλ προσάρτησης της αιχμής βέλους
      description: Καθορίζει τον τρόπο με τον οποίο η κεφαλή ή η αιχμή broadhead ή
        η αιχμή field point προσαρτάται στο στέλεχος του βέλους.
    broadhead_thread_size:
      name: Μέγεθος σπειρώματος της ευρείας αιχμής
      description: Παραθέτει τις προδιαγραφές του σπειρώματος που χρησιμοποιείται
        για την προσάρτηση της αιχμής broadhead ή field point στο ένθετο ή στο στέλεχος
        του βέλους.
    broadhead_tip_type:
      name: Τύπος άκρου ευρείας αιχμής
      description: Ορίζει το στυλ της μύτης/του δακτυλίου της αιχμής broadhead που
        ξεκινά τη διείσδυση, επηρεάζοντας την απόδοση σε διαφορετικά θηράματα.
    broccoli_cut:
      name: Κοπή μπρόκολου
      description: Καθορίζει τον τρόπο κοπής ή προετοιμασίας του μπρόκολου πριν από
        τη συσκευασία (π.χ. ολόκληρο το κεφάλι, φούντες, ψιλοκομμένο σανρύζι).
    broccoli_variety:
      name: Ποικιλία μπρόκολου
      description: Προσδιορίζει τη συγκεκριμένη καλλιεργητική ποικιλία ή την εμπορική
        ποικιλία μπρόκολου (π.χ. Tenderstem, Romanesco).
    broom_head_material:
      name: Υλικό κεφαλής σκούπας
      description: Καθορίζει τη σύνθεση του υλικού της κεφαλής της σκούπας, η οποία
        επηρεάζει την ανθεκτικότητα και τα χαρακτηριστικά παιχνιδιού.
    brush_format:
      name: Μορφή πινέλου
      description: Υποδεικνύει τη φυσική μορφή μιας βούρτσας για σκι ή snowboard,
        διακρίνοντας μεταξύ χειροκίνητων μπλοκ και περιστροφικών μορφών που λειτουργούν
        με τρυπάνι, όπως κύλινδροι από roto wool ή roto felt.
    brush_shape:
      name: Σχήμα πινέλου
      description: Καθορίζει το φυσικό σχήμα ή το προφίλ του σώματος ή της κεφαλής
        της βούρτσας, γεγονός που επηρεάζει την επιφάνεια επαφής και τον χειρισμό.
    brussel_sprout_preparation:
      name: Προετοιμασία για λαχανάκια Βρυξελλών
      description: Περιγράφει τη φυσική προετοιμασία ή τον τρόπο κοπής στα λαχανάκια
        Βρυξελλών.
    brussels_sprout_variety:
      name: Ποικιλία στα λαχανάκια Βρυξελλών
      description: Καθορίζει την καλλιεργητική ποικιλία ή την ποικιλία σε λαχανάκια
        Βρυξελλών, λαμβάνοντας υπόψη τις τρέχουσες και τις μελλοντικές ποικιλίες.
    bubble_blower_features:
      name: Χαρακτηριστικά συσκευής για φυσαλίδες
      description: Παραθέτει κοινά λειτουργικά χαρακτηριστικά των συσκευών για φυσαλίδες.
    bubble_gun_bubble_output_modes:
      name: Λειτουργίες εξόδου φυσαλίδων πιστολιού
      description: Καθορίζει τους τρόπους λειτουργίας του όπλου για φούσκες, όπως
        μονές φούσκες, συνεχής ροή ή ρυθμίσεις πολλαπλής ταχύτητας.
    bubble_machine_features:
      name: Λειτουργίες μηχανήματος φυσαλίδων
      description: Αναδεικνύει κοινά λειτουργικά χαρακτηριστικά των μηχανών φουσκών
        πέρα από την βασική λειτουργία τους.
    bubble_machine_items_included:
      name: Αντικείμενα που περιλαμβάνονται στη συσκευασία της μηχανής φουσκών
      description: Παραθέτει τα βασικά στοιχεία που περιλαμβάνονται στη συσκευασία
        (π.χ. διάλυμα για φυσαλίδες, επιπλέον ράβδοι, ιμάντας μεταφοράς, τηλεχειριστήριο).
    bubble_output_rate:
      name: Ρυθμός απόδοσης φυσαλίδων
      description: Υποδεικνύει τον κατά προσέγγιση/ποιοτικό ρυθμό παραγωγής φυσαλίδων
        για ένα πιστόλι φυσαλίδων (π.χ., χαμηλός/μεσαίος/υψηλός), συμπεριλαμβανομένου
        του εάν η απόδοση είναι μεταβλητή.
    bubble_solution_container_type:
      name: Τύπος δοχείου διαλύματος φουσκών
      description: Καθορίζει τον τρόπο παροχής/χρήσης του διαλύματος φυσαλίδων με
        το πιστόλι φυσαλίδων (π.χ. εσωτερικό δοχείο, προσαρτημένη φιάλη, ξεχωριστός
        δίσκος/εμβάπτιση).
    bubble_toy_included_accessories:
      name: Παιχνίδι με φούσκες που περιλαμβάνει αξεσουάρ
      description: Παραθέτει συνηθισμένα κομμάτια που περιλαμβάνονται στο παιχνίδι
        με τις φούσκες (π.χ. μπουκάλι διαλύματος, δίσκος, ανταλλακτικά ραβδιά).
    buckwheat_processing_method:
      name: Μέθοδος επεξεργασίας φαγόπυρου
      description: Περιγράφει την επεξεργασία που εφαρμόζεται στο φαγόπυρο πριν από
        την πώληση (π.χ., καβουρδισμένο, φύτρα φαγόπυρου, διογκωμένο).
    buckwheat_product_form:
      name: Μορφή προϊόντος φαγόπυρου
      description: Φυσική παρουσίαση ειδικά για το φαγόπυρο που περιλαμβάνει μορφές
        που δεν καλύπτονται από τον γενικό κατάλογο (π.χ. νιφάδες, puffs, στιγμιαία
        φακελάκια).
    bug_collecting_kit_items_included:
      name: Περιλαμβάνεται κιτ προϊόντων συλλογής εντόμων
      description: Εργαλεία και εκπαιδευτικό υλικό που περιλαμβάνονται σε μια κιτ
        συλλογή εντόμων.
    built_in_storage_type:
      name: Τύπος ενσωματωμένης αποθήκευσης
      description: Προσδιορίζει τους τύπους αποθηκευτικού χώρου που ενσωματώνονται
        στο πλαίσιο της κουκέτας (π.χ. συρτάρια, ράφια, αποθηκευτικός χώρος στη σκάλα).
    bumper_finish:
      name: Φινίρισμα προφυλακτήρα
      description: Καθορίζει την επιφανειακή επίστρωση ή το φινίρισμα που εφαρμόζεται
        στον προφυλακτήρα.
    bumper_sensor_cutouts:
      name: Ανοίγματα αισθητήρων προφυλακτήρα
      description: Υποδεικνύει ποια ανοίγματα/εγκοπές υποβοήθησης OEM περιλαμβάνει
        ή υποστηρίζει προφυλακτήρας.
    bunk_bed_configuration:
      name: Διαμόρφωση κουκέτας
      description: Υποδεικνύει τον συνδυασμό δομικής διάταξης και μεγέθους στρώματος
        της κουκέτας.
    buoyancy:
      name: Άνωση
      description: Υποδεικνύει τη συμπεριφορά πλευστότητας του δολώματος ή του τεχνητού
        δολώματος στη στήλη του νερού, όπως επιπλέει, βυθίζεται ή αιωρείται.
    burkini_pieces_included:
      name: Περιλαμβάνονται κομμάτια μπουρκίνι
      description: Παραθέτει τα μέρη του ενδύματος που περιλαμβάνονται στο σετ μπουρκίνι,
        ώστε οι πελάτες να γνωρίζουν ακριβώς τι αγοράζουν.
    burn_rate:
      name: Ρυθμός καύσης
      description: Περιγράφει τον ρυθμό καύσης του χαρτιού μόλις ανάψει.
    bus_model_type:
      name: Τύπος μοντέλου λεωφορείου
      description: Προσδιορίζει την πραγματική διαμόρφωση/τύπο διαύλου που αναπαρίσταται
        από το μοντέλο κλίμακας (κλάση αμαξώματος/χρήσης).
    bust_design:
      name: Σχέδιο στήθους
      description: Περιγράφει τη διαμόρφωση του στήθους και την κάλυψη του ντεκολτέ
        στο κορμάκι (π.χ. ανοιχτό ντεκολτέ, ενσωματωμένο σουτιέν, βαθύ ντεκολτέ).
    butter_variety:
      name: Ποικιλία βουτύρου
      description: Καθορίζει το στυλ παραγωγής ή τον διακριτό τύπο του βουτύρου, όπως
        με καλλιέργεια, από γλυκιά κρέμα, ευρωπαϊκού τύπου, διαυγασμένο ή βούτυρο
        ορού γάλακτος.
    buttermilk_variety:
      name: Ποικιλία βουτυρογάλακτος
      description: Προσδιορίζει το συγκεκριμένο στυλ ή μορφή του ξινόγαλου που πωλείται
        (π.χ. με καλλιέργεια, παραδοσιακό, σε σκόνη).
    button_application:
      name: Εφαρμογή κουμπιού
      description: Υποδεικνύει την προβλεπόμενη εφαρμογή ή τον τύπο έργου για το κουμπί
        (π.χ., ένδυση, ταπετσαρίες).
    button_attachment_type:
      name: Τύπος στερέωσης κουμπιού
      description: Καθορίζει την κατασκευή του κουμπιού για την τοποθέτησή του στο
        ύφασμα (π.χ., οπές ραφής έναντι στελέχους), όχι το στυλ κλεισίματος.
    button_finish:
      name: Φινίρισμα κουμπιού
      description: Περιγράφει το φινίρισμα/εμφάνιση της επιφάνειας του κουμπιού (π.χ.,
        ματ έναντι γυαλιστερού).
    buttonhole_elastic_application:
      name: Εφαρμογή λάστιχου με κουμπότρυπες
      description: Κύρια προβλεπόμενη χρήση/εφαρμογή για το διακοσμητικό λάστιχο διπλής
        όψης.
    cab_type:
      name: Τύπος καμπίνας
      description: Καθορίζει τη διαμόρφωση της καμπίνας του φορτηγού.
    cabasa_construction_type:
      name: Τύπος κατασκευής cabasa
      description: Καθορίζει τη φυσική κατασκευή/στυλ του σώματος cabasa και του συγκροτήματος
        αλυσίδας/χαντρών.
    cabbage_variety:
      name: Ποικιλία λάχανου
      description: Προσδιορίζει την ποικιλία ή τον τύπο του λάχανου (π.χ. πράσινο,
        νάπα, σαβοΐας), ώστε ώστε οι αγοραστές να μπορούν να φιλτράρουν ανά γεύση,
        υφή και μαγειρική χρήση.
    cabinet_door_style:
      name: Στυλ πόρτας ντουλαπιού
      description: Προσδιορίζει τον οπτικό σχεδιασμό του πάνελ της πόρτας του ντουλαπιού,
        όπως Shaker ή υπερυψωμένο πάνελ, για να ταιριάζει με την αισθητική της κουζίνας.
    cabinet_overlay_type:
      name: Τύπος επικάλυψης ντουλαπιού
      description: Καθορίζει τον τρόπο με τον οποίο οι πόρτες επικαλύπτονται ή στέκονται
        σε σχέση με το πλαίσιο του ντουλαπιού.
    cable_end_type:
      name: Τύπος άκρου καλωδίου
      description: Περιγράφει το σχήμα ή το στυλ του άκρου του συρματόσχοινου ή του
        εξαρτήματος που συνδέεται με τις μανέτες φρένων ή αλλαγής ταχυτήτων.
    cable_housing_construction:
      name: Κατασκευή περιβλήματος καλωδίου
      description: Περιγράφει τον δομικό σχεδιασμό του περιβλήματος—όπως πλεγμένο
        σε σπείρα, χωρίς συμπίεση ή σε τμηματικούς συνδέσμους—ο οποίος επηρεάζει την
        αντοχή στη συμπίεση, την ευκαμψία και την αίσθηση κατά τη χρήση.
    cable_housing_liner_type:
      name: Τύπος επένδυσης περιβλήματος καλωδίου
      description: Υποδεικνύει εάν το περίβλημα περιλαμβάνει εσωτερική επένδυση ή/και
        επεξεργασία λίπανσης, καθώς και το υλικό ή την τεχνολογία που χρησιμοποιείται,
        επηρεάζοντας τη μείωση της τριβής και την ανθεκτικότητα στις καιρικές συνθήκες.
    cable_management_type:
      name: Τύπος διαχείρισης καλωδίου
      description: Καθορίζει τον τύπο του ενσωματωμένου καλωδίου ή των λειτουργιών
        διαχείρισης ενέργειας που προσφέρει το τραπέζι συνεδριάσεων.
    cable_surface_treatment:
      name: Επιφανειακή επεξεργασία καλωδίου
      description: Προσδιορίζει οποιαδήποτε ειδική επίστρωση ή φινίρισμα που εφαρμόζεται
        στο καλώδιο για μειωμένη τριβή ή προστασία από τη διάβρωση.
    cabochon_back_type:
      name: Τύπος πίσω όψης Cabochon
      description: Υποδεικνύει το προφίλ/φινίρισμα της πίσω όψης του cabochon, το
        οποίο επηρεάζει τις μεθόδους τοποθέτησης/κόλλησης και τη συμβατότητα.
    cacao_bean_variety:
      name: Ποικιλία κόκκων κακάο
      description: Προσδιορίζει τη βοτανική ποικιλία ή την καλλιέργεια του χρησιμοποιούμενου
        κόκκου κακάο.
    cacao_roast_level:
      name: Επίπεδο καβουρδίσματος κακάο
      description: Περιγράφει τον βαθμό στον οποίο καβουρδίστηκε το κακάο πριν από
        την άλεση.
    cage_package_type:
      name: Τύπος συσκευασίας κλωβού
      description: Ορίζει ποια επιμέρους προϊόντα περιλαμβάνονται στην αγορά (π.χ.,
        μόνο δίκτυο, κιτ πλαισίου , πλήρες πακέτο).
    cajon_body_shell_material:
      name: Υλικό σώματος/κελύφους cajon
      description: Καθορίζει το υλικό του σώματος/κελύφους του cajon (χωρίς να συμπεριλαμβάνεται
        το tapa).
    cajon_corner_control_system:
      name: Σύστημα ελέγχου γωνίας Cajon
      description: Καθορίζει αν το cajon διαθέτει ρύθμιση ήχου στις γωνίες (π.χ. βίδες
        στις γωνίες) για να τροποποιείται η απόκριση του slap.
    cajon_corner_edge_design:
      name: Σχεδιασμός γωνίας/άκρης Cajon
      description: Περιγράφει την κατασκευή γωνίας/άκρης που επηρεάζει την άνεση και
        τη δυνατότητα παιξίματος.
    cajon_feet_type:
      name: Τύπος ποδιών cajon
      description: Καθορίζει τον τύπο των ποδιών στο cajon, τη σταθερότητα πρόσκρουσης
        και τον συντονισμό.
    cajon_snare_adjustability:
      name: Ρυθμιζόμενη δυνατότητα ταμπούρου cajon
      description: Υποδεικνύει εάν και πώς μπορεί να ρυθμιστεί το εφέ ταμπούρου (τάση,
        επαφή ή και τα δύο).
    cajon_snare_system_type:
      name: Τύπος συστήματος παγίδευσης του cajon
      description: Καθορίζει τον εσωτερικό μηχανισμό παγίδευσης που χρησιμοποιείται
        για τη δημιουργία του φαινομένου παγίδευσης.
    cake_shape:
      name: Σχήμα κέικ
      description: Περιγράφει τη φυσική μορφή στην οποία ψήνεται το coffee cake.
    cake_topping:
      name: Επικάλυψη κέικ
      description: Προσδιορίζει την κύρια επικάλυψη ή το φινίρισμα που εφαρμόζεται
        στο κέικ καφέ.
    cake_type:
      name: Τύπος κέικ
      description: Περιγράφει το στυλ ή την ποικιλία του κέικ (π.χ., Pound, Pancake,
        Cheesecake).
    caliper_mount_type:
      name: Τύπος βάσης δαγκάνας
      description: Ορίζει το πρότυπο διεπαφής πλαισίου ή πιρουνιού που χρησιμοποιεί
        η δαγκάνα φρένου (π.χ. στήριξη σε υποδοχές, επίπεδη στήριξη).
    caliper_mounting_standard:
      name: Πρότυπο τοποθέτησης δαγκάνας
      description: Καθορίζει τη διεπαφή/πρότυπο τοποθέτησης (π.χ., επίπεδη βάση, βάση
        σε στύλο, IS, κ.λπ.) που χρησιμοποιείται για τη σύνδεση της δαγκάνας φρένου
        στο πλαίσιο ή το πιρούνι του ποδηλάτου.
    camera_mounting_location_vehicle_exterior:
      name: Θέση τοποθέτησης κάμερας (εξωτερικό οχήματος)
      description: Καθορίζει πού προορίζεται να τοποθετηθεί η κάμερα ή οι κάμερες
        στο όχημα (π.χ. εμπρόσθια γρίλια, πίσω μέρος, πλευρικοί καθρέφτες).
    camouflage_environment_type:
      name: Τύπος περιβάλλοντος καμουφλάζ
      description: Υποδεικνύει το κύριο περιβάλλον για το οποίο έχει σχεδιαστεί το
        μοτίβο καμουφλάζ, όπως δασικές εκτάσεις, έρημος ή βάλτος.
    camping_oil_application:
      name: Εφαρμογή λαδιού παραφίνης
      description: Καθορίζει την κύρια προβλεπόμενη χρήση του λαδιού σε περιβάλλον
        κάμπινγκ (π.χ. καύσιμο φανού έναντι καυσίμου εστίας).
    camshaft_construction:
      name: Κατασκευή εκκεντροφόρου άξονα
      description: Στυλ κατασκευής/ημικατεργασμένου εκκεντροφόρου άξονα.
    camshaft_material:
      name: Υλικό εκκεντροφόρου άξονα
      description: Πρωτεύον υλικό του πυρήνα/άξονα εκκεντροφόρου (βασικό υλικό).
    camshaft_position:
      name: Θέση εκκεντροφόρου
      description: Καθορίζει τον προβλεπόμενο τύπο/θέση του εκκεντροφόρου εντός του
        κινητήρα (π.χ. εισαγωγή ή εξαγωγή ή μια συγκεκριμένη συστοιχία/θέση κινητήρα).
    candle_container_type_included:
      name: Τύπος δοχείου κεριού που περιλαμβάνεται
      description: Καθορίζει τον τύπο του/των δοχείου/ων κεριού που περιλαμβάνονται
        στο σετ, αν υπάρχουν.
    candle_dye_form:
      name: Μορφή βαφής κεριού
      description: Καθορίζει τη φυσική μορφή της βαφής/χρωστικής που χρησιμοποιείται
        για την παρασκευή κεριών.
    candle_fragrance_form:
      name: Μορφή αρώματος κεριού
      description: Καθορίζει τον τύπο/μορφή του αρωματικού συστατικού που προορίζεται
        για την κατασκευή κεριών.
    candle_making_tool_type:
      name: Τύπος εργαλείου κατασκευής κεριών
      description: Προσδιορίζει το είδος του εργαλείου κατασκευής κεριών που πρόκειται
        για το προϊόν (π.χ. δοχείο έκχυσης, εργαλείο κεντραρίσματος φυτιλιού, θερμόμετρο).
    candy_texture:
      name: Υφή καραμέλας
      description: Περιγράφει την αίσθηση στο στόμα ή την υφή της καραμέλας, ανεξάρτητα
        από τη γεύση ή το σχήμα.
    candying_method:
      name: Μέθοδος καραμελώματος
      description: Περιγράφει τον τρόπο με τον οποίο τα φρούτα έχουν καραμελωθεί ή
        διατηρηθεί με ζάχαρη (π.χ., κρυσταλλωμένα, γλασαρισμένα, σε σιρόπι).
    canned_meat_form:
      name: Μορφή κονσερβοποιημένου κρέατος
      description: Ταξινομεί την επεξεργασμένη μορφή ή παρουσίαση του κρέατος μέσα
        στη συσκευασία.
    canoe_construction_type:
      name: Τύπος κατασκευής κανό
      description: Διακρίνει μεταξύ των στυλ κατασκευής κύτους κανό, όπως σκληρό κέλυφος,
        φουσκωτό και πτυσσόμενο.
    canoe_hull_shape:
      name: Σχήμα κύτους κανό
      description: Καθορίζει την κύρια διατομή του κύτους ή το προφίλ πυθμένα, που
        επηρεάζει τη σταθερότητα και τη διακίνηση.
    canoe_stern_design:
      name: Σχεδιασμός πρύμνης κανό
      description: Καθορίζει τον τύπο της πρύμνης του σκάφους, ο οποίος επηρεάζει
        τη συμβατότητα με τον κινητήρα και τη συμπεριφορά κατά την πλεύση.
    canopy_type:
      name: Τύπος στεγάστρου
      description: Περιγράφει το στυλ της σκίασης ή της κάλυψης οροφής που περιλαμβάνεται
        με το κρεβάτι καμπάνα (cabana bed).
    canvas_compatible_media:
      name: Συμβατά μέσα με καμβά
      description: Καθορίζει με ποια υλικά τέχνης ή χειροτεχνίας προορίζεται να χρησιμοποιηθεί
        το καμβά.
    canvas_format:
      name: Μορφή καμβά
      description: Υποδεικνύει εάν ο εκτυπώσιμος καμβάς πωλείται ως φύλλα, ρολά ή
        προκομμένα πάνελ.
    canvas_mounting_format:
      name: Τοποθέτηση/μορφοποίηση σε καμβά
      description: Φυσική μορφή/στυλ τοποθέτησης του προϊόντος καμβά ζωγραφικής.
    canvas_stretcher_assembly_type:
      name: Τύπος συναρμολόγησης του τελάρου καμβά
      description: Είτε το τελάρο πωλείται συναρμολογημένο ως πλαίσιο είτε ως ράβδοι/κιτ
        που απαιτούν συναρμολόγηση.
    canvas_stretcher_corner_joint_type:
      name: Τύπος σύνδεσης γωνίας του σκελετού καμβά
      description: Πώς ενώνονται/κατασκευάζονται οι γωνίες του σκελετού καμβά (π.χ.
        ένωση mortise & tenon, finger joint, με καρφιά, με σφήνες).
    canvas_surface_tone:
      name: Τόνος επιφάνειας καμβά
      description: Βασικός τόνος/χρώμα της βαμμένης επιφάνειας του καμβά (ground),
        όχι οποιοδήποτε τυπωμένο σχέδιο ή μοτίβο (π.χ. λευκό, μαύρο, χρωματισμένο).
    canvas_weave_type:
      name: Τύπος ύφανσης καμβά
      description: Περιγράφει την ύφανση της επιφάνειας του καμβά, η οποία επηρεάζει
        την υφή και τη διακίνηση του χρώματος.
    cap_attachment_style:
      name: Τύπος στερέωσης καπακιού
      description: Καθορίζει τον τρόπο κατασκευής/σύνδεσης του καπακιού του επιστόμιου
        του σαξοφώνου, ο οποίος μπορεί να επηρεάσει την προστασία και την εφαρμογή
        στη θήκη.
    cap_construction:
      name: Κατασκευή καπακιού
      description: Καθορίζει πώς κατασκευάζεται το σκουφάκι της περούκας (π.χ. lace
        front, full lace, hand-tied), κάτι που επηρεάζει τον ρεαλισμό, την άνεση και
        την ευελιξία στο χτένισμα.
    cap_crown_structure:
      name: Δομή του στελέχους (κορώνας) του καπέλου
      description: Δείχνει αν η κορώνα του καπέλου είναι δομημένη (σκληρυμένη) ή αδόμητη
        (μαλακή).
    cap_fit_type:
      name: Τύπος προσαρμογής καπακιού
      description: Καθορίζει τον τρόπο με τον οποίο εφαρμόζει ή προσαρμόζεται το καπέλο
        στο κεφάλι του χρήστη (π.χ. σταθερό μέγεθος έναντι ρυθμιζόμενου).
    cap_seal_type:
      name: Τύπος τσιμούχας καπακιού
      description: Καθορίζει το σφραγιστικό στοιχείο που χρησιμοποιείται για την αποτροπή
        διαρροής λαδιού και διαφυγής ατμών (π.χ. δακτύλιος στεγανοποίησης, φλάντζα).
    cap_size:
      name: Μέγεθος καπέλου
      description: Τυπικές ενδείξεις μεγέθους που υποδεικνύουν τη συνολική εφαρμογή
        του μεγέθους κεφαλής για το σκουφάκι της περούκας.
    cap_type:
      name: Τύπος καπακιού
      description: Τύπος διεπαφής καπακιού/κλεισίματος που χρησιμοποιείται στη δεξαμενή
        υπερχείλισης.
    caper_size_grade:
      name: Βαθμίδα μεγέθους κάππαρης
      description: Ταξινομεί τις κάππαρες σύμφωνα με τα βιομηχανικά πρότυπα, χρησιμοποιώντας
        ονομασίες βαθμίδων που αντιστοιχούν στη διάμετρο του μπουμπουκιού.
    capo_clamping_mechanism:
      name: Μηχανισμός σύσφιξης καποτάστου
      description: Καθορίζει το στυλ σύσφιξης/λειτουργίας που χρησιμοποιείται για
        την εφαρμογή πίεσης στις χορδές (πώς λειτουργεί το καποτάστο).
    capo_finish:
      name: Φινίρισμα καποτάστου
      description: Φινίρισμα επιφάνειας του σώματος του καποτάστου (οπτικό/αίσθηση),
        ανεξάρτητα από το χρώμα (π.χ., ματ έναντι γυαλιστερού).
    capo_fit_type:
      name: Τύπος προσαρμογής καποτάστο
      description: Καθορίζει το προφίλ του λαιμού της κιθάρας ή άλλου έγχορδου οργάνου
        για το οποίο έχει σχεδιαστεί το καποτάστο (συμπεριλαμβανομένης της καμπυλότητας
        ή της επίπεδης μορφής), επηρεάζοντας την εφαρμογή χωρίς βούισμα και τη σωστή
        τονικότητα.
    capo_pad_material:
      name: Υλικό επιθέματος καποτάστου
      description: Καθορίζει το υλικό του μαξιλαριού επαφής που αγγίζει τις χορδές/την
        ταστιέρα (επηρεάζει την πρόσφυση, τη σταθερότητα κουρδίσματος και την πιθανή
        σήμανση φινιρίσματος).
    capo_tension_mechanism:
      name: Μηχανισμός τάσης καποτάστο
      description: Καθορίζει τον τρόπο εφαρμογής και ρύθμισης της πίεσης/τάνυσης στις
        χορδές για το συρόμενο καποτάστο.
    capture_method:
      name: Μέθοδος καταγραφής
      description: Υποδεικνύει εάν η παγίδα προορίζεται για σύλληψη ζωντανών ζώων
        ή για θανατηφόρα παγίδευση.
    car_ev_conversion_kit_motor_type:
      name: Τύπος κινητήρα κιτ μετατροπής ηλεκτροκίνητου αυτοκινήτου
      description: Καθορίζει την τεχνολογία κινητήρα έλξης που περιλαμβάνεται ή απαιτείται
        από το κιτ μετατροπής (π.χ. επαγωγικός AC έναντι μόνιμου μαγνήτη).
    car_playset_items_included:
      name: Περιλαμβάνεται κομμάτια σετ παιχνιδιού αυτοκινήτου
      description: Παραθέτει τα κύρια επιμέρους προϊόντα που περιλαμβάνονται στο σετ
        παιχνιδιού αυτοκινήτου πέρα από τη βασική δομή (π.χ. αυτοκίνητα, φιγούρες,
        πινακίδες).
    car_shampoo_application_method:
      name: Μέθοδος εφαρμογής σαμπουάν αυτοκινήτου
      description: Πώς προορίζεται να εφαρμόζεται το σαμπουάν κατά το πλύσιμο.
    car_wash_solution_form:
      name: Μορφή διαλύματος για πλύσιμο αυτοκινήτου
      description: Καθορίζει τη φυσική μορφή του διαλύματος πλυσίματος αυτοκινήτων
        (π.χ. υγρό, αφρός, μαντηλάκια).
    car_wash_solution_scent:
      name: Άρωμα διαλύματος για πλύσιμο αυτοκινήτων
      description: Καθορίζει το άρωμα/μυρωδιά του διαλύματος πλυσίματος αυτοκινήτου
        (εάν έχει άρωμα).
    carbonated_water_variety:
      name: Ποικιλία ανθρακούχου νερού
      description: Κατηγοριοποιεί το ανθρακούχο νερό βάσει κοινών εμπορικών τύπων
        και σύνθεσης (π.χ. τόνικ, σόδα, λειτουργικό ανθρακούχο νερό).
    carbonation:
      name: Ανθράκωση
      description: Περιγράφει το επίπεδο ή το στυλ ανθράκωσης στο ποτό (π.χ. απλό,
        ελαφρώς ανθρακούχο, ανθρακούχο, νιτροποιημένο).
    carburetor_barrel_count:
      name: Αριθμός θαλάμων (βαρελιών) του καρμπυρατέρ
      description: Υποδεικνύει τον αριθμό των οπών/βαρελιών ανακοπής στο καρμπυρατέρ.
    carburetor_choke_type:
      name: Τύπος τσοκ καρμπυρατέρ
      description: Υποδεικνύει τον τρόπο ενεργοποίησης του τσοκ που χρησιμοποιείται
        από το καρμπυρατέρ.
    carburetor_mounting_flange_type:
      name: Τύπος φλάντζας στήριξης καρμπυρατέρ
      description: Καθορίζει τον τύπο διεπαφής στερέωσης του καρμπιρατέρ ώστε να διασφαλίζεται
        η συμβατότητα με την εισαγωγή/πολλαπλή (π.χ. σύνδεση τύπου spigot έναντι φλάντζας/μοτίβου
        βιδών).
    card_binder_page_type:
      name: Τύπος σελίδας ντοσιέ κάρτας
      description: 'Για ντοσιέ/φακέλους: το στυλ των σελίδων που χρησιμοποιούνται
        για την αποθήκευση καρτών.'
    card_box_holder_type:
      name: Τύπος κουτιού/θήκης καρτών
      description: Καθορίζει τη λειτουργική μορφή του προϊόντος για τη συλλογή ή τη
        φύλαξη καρτών σε ένα γεγονός (π.χ. κουτί, κουτί τύπου ταχυδρομικής θυρίδας,
        καλάθι, βάση-θήκη).
    card_game_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ παιχνιδιών με κάρτες
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά των αξεσουάρ παιχνιδιών
        καρτών.
    card_lot_type:
      name: Τύπος παρτίδας καρτών
      description: Δηλώνει αν το προϊόν είναι μεμονωμένη κάρτα ή σετ/ποικιλία πολλαπλών
        καρτών.
    card_sleeve_size_format_compatibility:
      name: Συμβατότητα μεγέθους/μορφής θήκης καρτών
      description: Καθορίζει τα μεγέθη καρτών για τα οποία έχουν σχεδιαστεί οι θήκες,
        οι σελίδες ή τα κουτιά αποθήκευσης.
    carding_surface_pin_material:
      name: Υλικό καρφιών της επιφάνειας λαναρίσματος
      description: Υλικό των ακίδων/δοντιών που χρησιμοποιείται για το ξεμπέρδεμα
        και το άνοιγμα των ινών.
    care_durability:
      name: Ανθεκτικότητα φροντίδας
      description: Υποδεικνύει τις προσδοκίες για την αντοχή στο πλύσιμο/θερμική αντοχή
        για την ετικέτα μετά την εφαρμογή.
    care_label_attachment_type:
      name: Τύπος στερέωσης ετικέτας φροντίδας
      description: Περιγράφει τον τρόπο εφαρμογής της ετικέτας φροντίδας στο προϊόν
        (π.χ. ραμμένη, με θερμομεταφορά/σιδέρωμα, αυτοκόλλητη).
    care_label_format:
      name: Μορφή ετικέτας φροντίδας
      description: Η φυσική/έντυπη μορφή του προϊόντος της ετικέτας φροντίδας του
        προϊόντος.
    care_label_symbol_system:
      name: Σύστημα συμβόλων ετικέτας φροντίδας
      description: Το σύνολο προτύπων/συμβόλων που χρησιμοποιείται στην ετικέτα (π.χ.
        σύμβολα φροντίδας ISO, σύμβολα ASTM/US).
    cargo_area_configuration:
      name: Διαμόρφωση χώρου αποσκευών
      description: Καθορίζει το δομικό στυλ ή την τοποθεσία του χώρου φόρτωσης σε
        ένα ποδήλατο μεταφοράς εμπορευμάτων (π.χ., longtail, εμπρόσθιας φόρτωσης,
        τρίκυκλο).
    cargo_net_adjustability:
      name: Ρύθμιση καθαρού φορτίου
      description: Υποδεικνύει εάν και πώς μπορεί να ρυθμιστεί η τάνυση/εφαρμογή του
        διχτυού φορτίου.
    cargo_net_position:
      name: Καθαρή θέση φορτίου
      description: Καθορίζει σε ποιο σημείο στον χώρο αποσκευών ή φορτίου προορίζεται
        να τοποθετηθεί ή να λειτουργήσει το δίχτυ.
    cargo_net_stretch_type:
      name: Τύπος ελαστικού διχτυού φορτίου
      description: Εάν το δίχτυ χώρου αποσκευών είναι ελαστικό/με δυνατότητα τεντώματος
        ή σταθερό/μη ελαστικό.
    cargo_net_style:
      name: Στυλ διχτυού φορτίου
      description: Καθορίζει τον τύπο κατασκευής ή τη μορφή του διχτυού φορτίου (π.χ.
        ελαστικό κορδόνι, ιμάντας, φράγμα, αιώρα).
    cargo_rack_finish:
      name: Φινίρισμα ραφιού φορτίου
      description: Εξωτερικό φινίρισμα/επίστρωση της σχάρας φορτίου.
    carpet_cleaner_application_method:
      name: Μέθοδος εφαρμογής καθαριστικού χαλιών
      description: Καθορίζει τον προβλεπόμενο τρόπο εφαρμογής και επεξεργασίας του
        προϊόντος στο χαλί (πέρα από τη γενική μορφή).
    carrier_style:
      name: Στυλ φορέα
      description: Ο μηχανισμός/στυλ μεταφοράς που χρησιμοποιείται για την υποστήριξη
        του σκάφους στο όχημα.
    carrot_size:
      name: Μέγεθος καρότου
      description: Ταξινομεί το γενικό μέγεθος του προϊόντος καρότου.
    carrot_variety:
      name: Ποικιλία καρότου
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία ή καλλιέργεια καρότου.
    carrying_capacity_pairs_boards:
      name: Χωρητικότητα μεταφοράς (ζευγάρια/σανίδες)
      description: Καθορίζει πόσα σκι (ζεύγη) ή snowboard μπορεί να υποστηρίξει ή
        προορίζεται να υποστηρίξει ένα αξεσουάρ όταν χρησιμοποιείται με τη σχάρα (π.χ.
        κιτ επέκτασης).
    cartridge_thread_compatibility:
      name: Συμβατότητα σπειρώματος φυσίγγων
      description: Καθορίζει το πρότυπο σπειρώματος που υποστηρίζει ο εξατμιστής ή
        η μπαταρία, εξασφαλίζοντας φυσική συμβατότητα με τις φυσίγγες.
    case_capacity_butts_shafts:
      name: Χωρητικότητα θήκης (άκρα × άξονες)
      description: Καθορίζει πόσες λαβές και πόσους κορμούς μπορεί να χωρέσει η θήκη,
        εκφρασμένο σε μορφή λαβή-προς-κορμό (π.χ. 2x4 = 2 λαβές και 4 κορμοί).
    case_features:
      name: Χαρακτηριστικά θήκης
      description: Τονίζει τις λειτουργικές δυνατότητες της θήκης κρουστών/ντραμς
        που σχετίζονται με την προστασία και τη μεταφορά.
    case_humidifier_refill_type:
      name: Τύπος ανταλλακτικού/αναπλήρωσης για τον υγραντήρα θήκης.
      description: Δείχνει εάν ο υγραντήρας χρησιμοποιεί επαναχρησιμοποιούμενα (αναβρεχόμενα/αναγεννώμενα)
        μέσα ή αναλώσιμα ανταλλακτικά.
    case_lining_material:
      name: Υλικός επικάλυψης θήκης
      description: Προσδιορίζει το πρωτεύον υλικό που επενδύει το εσωτερικό μιας θήκης
        ή gigbag που έρχεται σε επαφή και προστατεύει το όργανο ή το περιεχόμενο.
    case_material:
      name: Υλικό θήκης
      description: Καθορίζει το κύριο υλικό της κάσας του ρολογιού, επηρεάζοντας την
        ανθεκτικότητα, το βάρος και την αισθητική.
    case_mounting_method:
      name: Μέθοδος τοποθέτησης θήκης
      description: Πώς προορίζεται να τοποθετηθεί ή να συνδεθεί ο υγραντήρας μέσα
        στη θήκη του οργάνου.
    case_structure:
      name: Δομή θήκης
      description: Υποδεικνύει την ακαμψία της κατασκευής της θήκης.
    case_style_cymbal_drum:
      name: Στυλ θήκης (κύμβαλο/τύμπανο)
      description: Καθορίζει εάν το προϊόν είναι μαλακή τσάντα, σκληρή θήκη ή υβριδικός
        σχεδιασμός για τη μεταφορά κυμβάλων ή ντράμσετ.
    casing_material:
      name: Υλικό περιβλήματος
      description: Προσδιορίζει το βασικό ύφασμα που χρησιμοποιείται στο περίβλημα
        του ελαστικού, επηρεάζοντας το βάρος, την αίσθηση κύλισης και την αντοχή σε
        τρυπήματα.
    casino_set_chip_material:
      name: Υλικό κατασκευής μαρκών καζίνο
      description: Πρωτογενές υλικό των τσιπ που περιλαμβάνονται (εάν υπάρχει).
    casino_set_layout_included:
      name: Περιλαμβάνεται διάταξη σετ καζίνο
      description: Καθορίζει τον τύπο της επιφάνειας παιχνιδιού ή της διάταξης που
        περιλαμβάνεται στο σετ.
    cask_finish:
      name: Φινίρισμα βαρελιού
      description: Προσδιορίζει το βαρέλι ή το δοχείο που χρησιμοποιείται για την
        τελική επεξεργασία ή την ωρίμανση του οινοπνευματώδους ποτού, όπως ένα βαρέλι
        bourbon ή ένα βαρέλι sherry.
    cassava_variety:
      name: Ποικιλία μανιόκας
      description: Καθορίζει την συγκεκριμένη ποικιλία ή καλλιεργούμενο τύπο γιούκας/μανιόκας
        που προσφέρεται, επηρεάζοντας τη γεύση, το χρώμα και τις ιδιότητες μαγειρέματος.
    cassette_body_type:
      name: Τύπος σώματος κασέτας
      description: Πρότυπο freehub ή driver που δέχεται η πίσω πλήμνη ή ο τροχός (π.χ.
        HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Σύνολο λειτουργιών κασέτας
      description: Υποδεικνύει λειτουργίες μεταφοράς και αναπαραγωγής κασέτας που
        είναι κοινές στα κασετόφωνα που είναι ενσωματωμένα στο ταμπλό.
    cassette_speed_compatibility:
      name: Συμβατότητα ταχύτητας κασέτας
      description: Υποδεικνύει τον αριθμό των ταχυτήτων (π.χ., 7 ταχυτήτων, 12 ταχυτήτων)
        με τις οποίες έχει σχεδιαστεί να λειτουργεί η κασέτα ή ο ελεύθερος τροχός,
        διασφαλίζοντας τη συμβατότητα με αλυσίδα, λεβιέ ταχυτήτων και σασμάν.
    castanet_shell_size_class:
      name: Κατηγορία μεγέθους κελύφους καστανιέτας
      description: Τυποποιημένη κατηγορία μεγέθους για τα κέλυφη καστανιέτας, που
        χρησιμοποιείται συνήθως από μουσικούς και δασκάλους για την επιλογή κατάλληλης
        εφαρμογής και ήχου.
    castanets_included_pieces:
      name: Κομμάτια καστανιέτας που περιλαμβάνονται
      description: Υποδεικνύει τι περιλαμβάνεται στην προσφορά του προϊόντος (ζευγάρι
        έναντι μεμονωμένου τεμαχίου, καθώς και τυχόν επιπλέον παρελκόμενα).
    castanets_pitch:
      name: Τονικό ύψος καστανιέτων
      description: Υποδεικνύει την κοινή ένδειξη τονικού ύψους/μεγέθους που χρησιμοποιούν
        οι κατασκευαστές για να περιγράψουν το εύρος του ήχου.
    castanets_type:
      name: Τύπος καστανιέτας
      description: Καθορίζει το στυλ των καστανιετών ή την κατηγορία προβλεπόμενης
        χρήσης.
    caster_type:
      name: Τύπος ρόδας
      description: Καθορίζει το στυλ των ροδών ή τροχών που είναι τοποθετημένοι στο
        καρότσι (π.χ. περιστρεφόμενοι, με κλείδωμα), παρέχοντας πληροφορίες για την
        ευελιξία και τη σταθερότητα.
    castle_playset_included_items:
      name: Αντικείμενα που περιλαμβάνονται στο σετ παιχνιδιού κάστρου
      description: Καταγράφει τα κύρια εξαρτήματα που περιλαμβάνονται στο σετ παιχνιδιού
        κάστρου, ώστε οι αγοραστές να μπορούν να συγκρίνουν τα σετ (π.χ. φιγούρες,
        έπιπλα, οχήματα, αξεσουάρ).
    catcher_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός κυνηγού
      description: Καθορίζει τα εξαρτήματα που περιλαμβάνονται σε ένα σετ εξοπλισμού
        κυνηγού, όπως κράνος κυνηγού ή θώρακας προστασίας.
    catcher_helmet_style:
      name: Στυλ κράνους catcher
      description: Καθορίζει το συνολικό στυλ σχεδίασης του προστατευτικού κράνους
        του κυνηγού.
    cattle_breed:
      name: Φυλή βοοειδών
      description: Προσδιορίζει τη ράτσα βοοειδών από την οποία προήλθε το βοδινό
        κρέας (π.χ. Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Ποικιλία κουνουπιδιού
      description: Προσδιορίζει την καλλιέργεια, το χρώμα ή την ειδική ποικιλία του
        κουνουπιδιού που πωλείται.
    celery_form:
      name: Μορφή σέλινου
      description: Καθορίζει τη φυσική μορφή ή το στυλ κοπής με το οποίο πωλείται
        το σέλερι.
    celery_variety:
      name: Ποικιλία σέλερι
      description: Καταγράφει τη συγκεκριμένη καλλιέργεια ή ποικιλία σέλινου, επιτρέποντας
        τον αγοραστή να επιλέγει με βάση τη γευστική απόδοση, το χρώμα ή τη μαγειρική
        χρήση.
    cereal_bar_texture:
      name: Υφή μπάρας δημητριακών
      description: Περιγράφει την υφή και την πυκνότητα της μπάρας δημητριακών (π.χ.
        μαλακή, τραγανή).
    cereal_type:
      name: Τύπος δημητριακών
      description: Κατηγοριοποιεί το σχήμα ή τη μορφή των δημητριακών ή του γκρανόλα
        (νιφάδες, puffs, σφαιρίδια γκρανόλα, μούσλι κ.λπ.) για να βοηθήσει τους αγοραστές
        να βρουν την επιθυμητή υφή ή τρόπο παρασκευής.
    certificate_border_style:
      name: Στυλ περιγράμματος πιστοποιητικού
      description: Περιγράφει την διακοσμητική επεξεργασία περιγράμματος που χρησιμοποιείται
        στο πιστοποιητικό.
    certificate_personalization_type:
      name: Τύπος εξατομίκευσης πιστοποιητικού
      description: Καθορίζει τον τρόπο με τον οποίο μπορεί να εξατομικευτεί το πιστοποιητικό
        (π.χ. κενό για χειρόγραφη συμπλήρωση, εκτυπώσιμο πρότυπο, προεκτυπωμένο με
        μεταβλητά πεδία κ.λπ.).
    certification_service:
      name: Υπηρεσία πιστοποίησης
      description: Εταιρεία τρίτης βαθμίδας αξιολόγησης/πιστοποίησης (εφόσον υπάρχει).
    certification_standard:
      name: Πρότυπο πιστοποίησης
      description: Καθορίζει το πρότυπο πιστοποίησης ασφάλειας και πυραντίστασης ή
        συμμόρφωσης που έχει αξιολογηθεί ότι πληροί η μπαλακλάβα.
    chain_coating_finish:
      name: Επίστρωση/φινίρισμα αλυσίδας
      description: Καθορίζει οποιαδήποτε επιφανειακή επεξεργασία ή φινίρισμα εφαρμόζεται
        στην αλυσίδα για βελτίωση της ανθεκτικότητας, μείωση της τριβής, πρόληψη της
        διάβρωσης ή αλλαγή της εμφάνισης (π.χ. Ti-nitride, DLC, νικέλιο, αντισκωριακή
        επεξεργασία EPT).
    chain_connection_type:
      name: Τύπος σύνδεσης αλυσίδας
      description: Καθορίζει τη μέθοδο κλεισίματος που παρέχεται ή απαιτείται για
        την ένωση των άκρων της αλυσίδας.
    chain_tier_configuration:
      name: Διαμόρφωση βαθμίδας αλυσίδας
      description: Καθορίζει τον αριθμό/διάταξη των επιπέδων αλυσίδας στο συγκρότημα
        συλλογής (μονό, διπλό ή τριπλό).
    chain_tool_type:
      name: Τύπος εργαλείου αλυσίδας
      description: Ταξινομεί το συγκεκριμένο είδος εργαλείου καδένας ποδηλάτων, ώστε
        ο αγοραστής να μπορεί να βρει γρήγορα τη σωστή διάταξη.
    chainring_shape:
      name: Σχήμα δισκοβραχίονα
      description: Υποδεικνύει το σχήμα του δακτυλίου αλυσίδας, όπως στρογγυλό ή οβάλ/ελλειπτικό.
    chair_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ καρέκλας
      description: Παραθέτει ενσωματωμένα ή συμπεριλαμβανόμενα αξεσουάρ που βελτιώνουν
        τη λειτουργικότητα μιας καρέκλας.
    chair_sash_care_instructions:
      name: Οδηγίες φροντίδας για το πλαίσιο της καρέκλας
      description: Περιγράφει τη συνιστώμενη μέθοδο καθαρισμού/συντήρησης για το πλαίσιο
        της καρέκλας.
    chair_sash_finish:
      name: Φινίρισμα πλαισίου καρέκλας
      description: Περιγράφει την επιφανειακή γυαλάδα/φινίρισμα του υφάσματος της
        ζώνης.
    chair_storage_design:
      name: Σχεδιασμός αποθηκευτικού χώρου καρέκλας
      description: Υποδεικνύει τον τρόπο με τον οποίο η αναδιπλούμενη καρέκλα προορίζεται
        να είναι κατάλληλη (π.χ., πτυσσόμενη, στοιβαζόμενη, μη πτυσσόμενη) για να
        βοηθήσει στην αξιολόγηση της αποθήκευσης και της φορητότητας.
    chaise_or_sectional_orientation:
      name: Προσανατολισμός σε ξαπλώστρα ή σε γωνιακή διάταξη
      description: Καθορίζει την πλευρά στην οποία βρίσκεται μια ενσωματωμένη ξαπλώστρα
        ή μια επέκταση όταν είναι στραμμένο προς τον καναπέ.
    chamber_size:
      name: Μέγεθος θαλάμου
      description: Υποδεικνύει το μέγεθος/όγκο του θαλάμου του επιστομίου, το οποίο
        επηρεάζει την αντίσταση και το ηχόχρωμα.
    chanter_finger_spacing:
      name: Απόσταση δακτύλων τραγουδιστή
      description: Υποδεικνύει το προφίλ απόστασης μεταξύ των δακτύλων του τραγουδιστή/μέγεθος
        (συχνά περιγράφεται ως τυπικό, μικρό ή μεγάλο χέρι).
    chanter_type:
      name: Τύπος αυλού
      description: Το στυλ/διαμόρφωση του αυλού (chanter) που περιλαμβάνεται ή χρησιμοποιείται
        από το όργανο, όπως ανοιχτού άκρου, κλειστού άκρου, εξάσκησης ή με πλήκτρα.
    chard_variety:
      name: Ποικιλία σέσκουλου
      description: Προσδιορίζει την συγκεκριμένη καλλιέργεια ή χρωματική ποικιλία
        του σέσκουλου που πωλείται.
    charging_port_location:
      name: Τοποθεσία θύρας φόρτισης
      description: Φυσική θέση της κύριας εξωτερικής εισόδου φόρτισης του οχήματος
        (θύρα φόρτισης).
    chassis_construction_type:
      name: Τύπος κατασκευής αμαξώματος
      description: Περιγράφει την κύρια μέθοδο κατασκευής πλαισίου που χρησιμοποιείται
        για το όχημα.
    checkbook_loading_orientation:
      name: Προσανατολισμός φόρτωσης βιβλιαρίου επιταγών
      description: Υποδεικνύει εάν το κάλυμμα του βιβλιαρίου επιταγών είναι συμβατό
        με τις μορφές επιταγής άνω, πλευρικής ή γενικής φόρτωσης.
    cheekpiece_style:
      name: Τύπος μάγουλου
      description: Ορίζει τον τύπο διαμόρφωσης μάγουλου/δακτυλίου στο επιστόμιο, ο
        οποίος καθορίζει τη δράση των ηνίων και τη πλευρική σταθερότητα.
    cheese_alternative_form:
      name: Εναλλακτική μορφή τυριού
      description: Καθορίζει τη φυσική μορφή ή την κοπή στην οποία πωλείται το εναλλακτικό
        τυρί.
    cheese_form:
      name: Μορφή τυριού
      description: Περιγράφει τη φυσική παρουσίαση του προϊόντος τυριού (π.χ., τεμαχισμένο
        σε ρολό, σε μπαστούνι, σε φέτες, τριμμένο).
    cheese_texture:
      name: Υφή τυριού
      description: Ταξινομεί το τυρί με βάση τη γενική υφή ή τη σκληρότητά του.
    cheese_variety:
      name: Ποικιλία τυριών
      description: Προσδιορίζει τον τύπο τυριού που χρησιμοποιείται ως κύρια αρωματική
        ύλη στο σνακ.
    cherimoya_variety:
      name: Ποικιλία τσεριμόγια
      description: Προσδιορίζει την συγκεκριμένη καλλιέργεια/ποικιλία της τσεριμόγιας
        (π.χ., Fino de Jete, El Bumpo).
    cherry_variety:
      name: Ποικιλία κερασιού
      description: Καθορίζει την καλλιέργεια ή την ποικιλία των κερασιών, βοηθώντας
        τους αγοραστές να επιλέξουν συγκεκριμένους τύπους γνωστούς για τη γεύση, το
        χρώμα, το μέγεθος ή την προβλεπόμενη μαγειρική τους χρήση.
    chest_pocket_style:
      name: Στυλ τσέπης στο στήθος
      description: Καθορίζει την παρουσία και τη διαμόρφωση των τσεπών στο στήθος
        στο πουκάμισο.
    chewing_tobacco_form:
      name: Μορφή μασώμενου καμπνού
      description: Προσδιορίζει τη φυσική μορφή, το στυλ κοπής ή το μέγεθος της συσκευασίας
        του προϊόντος μασώμενου καπνού (π.χ., σε σχήμα φύλλου, σε μακρύ κομμάτι, σε
        λεπτή συσκευασία).
    chicory_variety:
      name: Ποικιλία κιχωρίου
      description: Καθορίζει την συγκεκριμένη ποικιλία ή καλλιέργεια σικορέ που πωλείται
        (π.χ. Ραντίκιο, Βέλγικο Εντίβι, Εσκαρόλ).
    chiffon_recommended_use:
      name: Συνιστώμενη χρήση σιφόν
      description: Κύρια συνιστώμενη εφαρμογή ραπτικής/χειροτεχνίας για το ύφασμα
        σιφόν.
    child_seat_accessory_type:
      name: Τύπος αξεσουάρ παιδικού καθίσματος
      description: Ορίζει το συγκεκριμένο είδος αξεσουάρ ή ανταλλακτικού παιδικού
        καθίσματος (π.χ. μαξιλάρι καθίσματος, υποπόδιο, προσαρμογέας τοποθέτησης),
        επιτρέποντας στους αγοραστές να περιορίσουν γρήγορα τα κομμάτια που χρειάζονται
        χωρίς να δημιουργήσουν πολλές μικροκατηγορίες.
    child_seat_mounting_type:
      name: Τύπος τοποθέτησης παιδικού καθίσματος
      description: Καθορίζει τον τρόπο με τον οποίο το παιδικό κάθισμα ποδηλάτου στερεώνεται
        στο πλαίσιο, το ράφι ή την περιοχή του πιλοτηρίου του ποδηλάτου.
    chime_sound_character:
      name: Χαρακτήρας ήχου κουδουνίσματος
      description: Περιγράφει τον επιδιωκόμενο ηχητικό χαρακτήρα/ηχόχρωμα των κουδουνισμάτων
    chin_cup_type:
      name: Τύπος θήκης πηγουνιού
      description: Καθορίζει το στυλ ή την κατασκευή της θήκης πηγουνιού, το οποίο
        επηρεάζει την άνεση και την προστασία από κραδασμούς.
    chin_strap_type:
      name: Τύπος υποσιαγώνιου λουριού
      description: Καθορίζει τον τύπο λουριού πηγουνιού του καπέλου — κανένα, σταθερό,
        ρυθμιζόμενο ή αφαιρούμενο — για να βοηθήσει τους αγοραστές να επιλέξουν στυλ
        που παραμένουν ασφαλή σε συνθήκες ανέμου ή δραστηριοτήτων.
    china_cymbal_edge_shape:
      name: Σχήμα ακμής κυμβάλου Κίνας
      description: Περιγράφει το τυπικό προφίλ άκρης/φλάντζας για τα πορσελάνινα κύμβαλα
        (πόσο ανεστραμμένο είναι το χείλος), το οποίο επηρεάζει την αίσθηση και τον
        ήχο.
    china_cymbal_sound_character:
      name: Χαρακτήρας ήχου κυμβάλου Κίνας
      description: Πρωτεύων ήχος/τονικός χαρακτήρας περιγραφικός δείκτης για ένα πορσελάνινο
        κύμβαλο που χρησιμοποιείται για ανακάλυψη και φιλτράρισμα (π.χ. “trashy”,
        “dark”, “bright”). Ενδέχεται να ισχύουν πολλαπλές τιμές.
    chinstrap_type:
      name: Τύπος λουριού πηγουνιού
      description: Στυλ λουριού πηγουνιού που παρέχεται με το κράνος.
    chip_cut_style:
      name: Στυλ κοπής τσιπ
      description: Καθορίζει το φυσικό στυλ κοπής ή υφής των τσιπς (π.χ. ραβδωτά,
        τηγανισμένα σε κατσαρόλα, ψημένα στον αέρα).
    chip_denomination:
      name: Ονομαστική αξία τσιπ
      description: Ποιες ονομαστικές αξίες (τιμές) περιλαμβάνονται στο σύνολο (εκτυπωμένες
        ή εκχωρημένες).
    chocolate_form:
      name: Μορφή σοκολάτας
      description: Περιγράφει τη φυσική μορφή με την οποία πωλείται η σοκολάτα ψησίματος.
    choy_sum_variety:
      name: Ποικιλία Choy sum
      description: Προσδιορίζει τη συγκεκριμένη μορφή αγοράς ή τη βοτανική ποικιλία
        choy sum που πωλείται.
    cigar_wrapper_color:
      name: Χρώμα περιτυλίγματος πούρου
      description: Τυπική ταξινόμηση χρώματος του φύλλου περιτυλίγματος πούρου.
    cigarette_filter_type:
      name: Τύπος φίλτρου τσιγάρου
      description: Καθορίζει εάν το τσιγάρο διαθέτει φίλτρο και, εάν ναι, την κατασκευή
        ή το ιδιαίτερο χαρακτηριστικό αυτού του φίλτρου.
    cigarette_size:
      name: Μέγεθος τσιγάρου
      description: Ταξινομεί τα τσιγάρα με βάση το μήκος ή τη μορφή που ορίζουν τα
        πρότυπα του κλάδου (π.χ. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Περιγραφικός δείκτης έντασης τσιγάρου
      description: Εμπορική ένδειξη έντασης που χρησιμοποιείται παραδοσιακά από τις
        μάρκες για να υποδηλώνει την περιεκτικότητα/ένταση πίσσας και νικοτίνης (π.χ.
        Light, Bold, Silver).
    cinch_liner_material:
      name: Υλικό επένδυσης cinch
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για την επένδυση ή την
        ενίσχυση που έρχεται σε επαφή με το άλογο.
    circular_knitting_needle_cable_type:
      name: Τύπος κυκλικής βελόνας πλεξίματος
      description: Υποδεικνύει το υλικό και τη δομή του καλωδίου (π.χ. επιστρωμένο
        ατσάλι, νάιλον), επηρεάζοντας τη μνήμη, την τάση να τσακίζεται και τη συμπεριφορά
        περιστροφής.
    circular_knitting_needles_tip_material:
      name: Υλικό άκρης κυκλικών βελόνων πλεξίματος
      description: Υλικό των δύο άκρων της βελόνας (σε αντίθεση με το υλικό πλεξίματος).
    circumference_adjustment_mechanism:
      name: Μηχανισμός ρύθμισης περιφέρειας
      description: Μηχανισμός που χρησιμοποιείται για τη ρύθμιση ή το κλείδωμα της
        περιφέρειας του κουβαριού.
    clamp_design:
      name: Σχεδιασμός σφιγκτήρα
      description: Περιγράφει το δομικό στυλ ή τον μηχανισμό του σφιγκτήρα.
    clamp_sheet_music_clip_features:
      name: Λειτουργικά χαρακτηριστικά του κλιπ για παρτιτούρες
      description: Λειτουργικά και προστατευτικά χαρακτηριστικά κλιπ για παρτιτούρες
        (π.χ. επένδυση, αντιολισθητικό, περιστρεφόμενο).
    clamping_closure_type:
      name: Τύπος κλιπ/κλεισίματος
      description: Καθορίζει τον μηχανισμό που χρησιμοποιείται για το σφίξιμο ή τη
        στερέωση του κρίκου κεντήματος γύρω από το ύφασμα.
    clarinet_bell_acoustic_design:
      name: Ακουστικός σχεδιασμός καμπάνας κλαρινέτου
      description: Περιγράφει τον σχεδιασμό ήχου/εξαερισμού της καμπάνας που έχει
        σκοπό να επηρεάσει την απόκριση και τον τόνο της φωνής.
    clarinet_bell_adjustment_mechanism:
      name: Μηχανισμός ρύθμισης καμπάνας κλαρινέτου
      description: Περιγράφει τον τρόπο ρύθμισης του μήκους/γεωμετρίας της καμπάνας.
    clarinet_bell_ring_material:
      name: Υλικό για το δαχτυλίδι της καμπάνας κλαρινέτου
      description: Καθορίζει το υλικό του προστατευτικού δακτυλίου/ταινίας στο χείλος
        της καμπάνας του κλαρινέτου, εάν υπάρχει.
    clarinet_bell_tuning_effect:
      name: Εφέ συντονισμού/κουρδίσματος καμπάνας κλαρινέτου
      description: Υποδεικνύει πώς η καμπάνα έχει σχεδιαστεί για να επηρεάζει το κούρδισμα/τον
        τονισμό (ειδικά τους τόνους του λαιμού και τη χαμηλή εγγραφή) σε σύγκριση
        με μια τυπική καμπάνα.
    clarinet_body_type:
      name: Τύπος σώματος κλαρινέτου
      description: Υποδεικνύει τον κύριο τύπο κατασκευής σώματος για το κλαρινέτο
        A.
    clarinet_bore_type:
      name: Τύπος οπής κλαρινέτου
      description: Περιγράφει τον σχεδιασμό της κάννης του κλαρινέτου.
    clarinet_cap_style:
      name: Στυλ καπέλου κλαρινέτου
      description: Στυλ σχεδιασμού του καπακιού που περιλαμβάνεται με το σφιγκτήρα
        κλαρινέτου και/ή το προϊόν καπακιού επιστομίου (π.χ. ανεστραμμένο ή αεριζόμενο).
    clarinet_care_kit_intended_use:
      name: Προβλεπόμενη χρήση κιτ φροντίδας κλαρινέτου
      description: Κύριο πλαίσιο χρήσης για το οποίο έχει σχεδιαστεί το κιτ (π.χ.
        γρήγορο καθημερινό στέγνωμα έναντι βαθύ καθαρισμού/συντήρησης).
    clarinet_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται με το κλαρινέτο
      description: Αναγνωρίζει τι περιλαμβάνεται στη συσκευασία του κλαρινέτου Bb.
    clarinet_keywork_material:
      name: Υλικό για κλαρινέτο
      description: Καθορίζει το υλικό του μηχανισμού κλειδιού του κλαρινέτου (π.χ.
        ορείχαλκος, νικέλιο-άργυρος, επιπλατινωμένο).
    clarinet_keywork_plating:
      name: Επιμετάλλωση μηχανισμού κλειδιών κλαρινέτου
      description: Καθορίζει το φινίρισμα επιμετάλλωσης/υλικού των κλειδιών του κλαρινέτου
        (πλήκτρα).
    clarinet_mouthpiece_baffle_profile:
      name: Προφίλ διαφράγματος επιστομίου κλαρινέτου
      description: Περιγράφει το εσωτερικό προφίλ διαφράγματος/επάνω μέρους του επιστόμιου
        του κλαρινέτου, το οποίο επηρεάζει τη φωτεινότητα και την προβολή του ήχου.
    clarinet_mouthpiece_beak_shape:
      name: Σχήμα ράμφους επιστομίου κλαρινέτου
      description: Καθορίζει το εξωτερικό προφίλ/γωνία του ράμφους για άνεση του παίχτη
        και αίσθηση στο στόμιο.
    clarinet_mouthpiece_chamber_size:
      name: Μέγεθος θαλάμου επιστομίου κλαρινέτου
      description: Περιγράφει το σχετικό μέγεθος του θαλάμου ενός επιστομίου κλαρινέτου
        (όπως καθορίζεται από τον κατασκευαστή), το οποίο μπορεί να επηρεάσει το ηχόχρωμα
        και την αντίσταση στο παίξιμο.
    clarinet_mouthpiece_intended_tone:
      name: Επιστόμιο κλαρινέτου που προορίζεται για τόνο
      description: Περιγράφει τον γενικό τονικό στόχο που προβάλλεται για το επιστόμιο
        από τον κατασκευαστή.
    clarinet_mouthpiece_player_level:
      name: Επίπεδο παίκτη επιστομίου κλαρινέτου
      description: Υποδεικνύει το τυπικό επίπεδο χρήστη-στόχου για το επιστόμιο.
    clarinet_reed_cut:
      name: Κοπή καλαμιού κλαρινέτου
      description: Καθορίζει τον τύπο κοπής/προφίλ της γλωττίδας (π.χ. λιμαρισμένο
        ή μη λιμαρισμένο και άλλες εμπορικά διαθέσιμες κοπές), ο οποίος επηρεάζει
        την απόκριση και τον ήχο.
    clarinet_reed_material_type:
      name: Τύπος υλικού γλωττίδας κλαρινέτου
      description: Καθορίζει από τι είναι κατασκευασμένο το γλωσσίδι (καλάμι ή συνθετικό
        υλικό) και, στην περίπτωση του συνθετικού, τον συνηθισμένο υποτύπο.
    clarinet_thumb_rest_type:
      name: Τύπος στηρίγματος αντίχειρα στο κλαρινέτο
      description: Τύπος/χαρακτηριστικό στηρίγματος του δεξιού αντίχειρα.
    classical_guitar_string_3rd_string_type:
      name: Τύπος 3ης χορδής κλασικής κιθάρας
      description: Καθορίζει αν η χορδή Σολ (3η) είναι απλή (μονονήμα) ή τυλιγμένη.
    classical_guitar_string_bass_winding_material:
      name: Υλικό περιτυλίγματος των μπάσων χορδών κλασικής κιθάρας
      description: Το υλικό περιέλιξης που χρησιμοποιείται στις μπάσες χορδές (συνήθως
        στις χορδές 4–6).
    classical_guitar_string_set_configuration:
      name: Διαμόρφωση σετ χορδών κλασικής κιθάρας
      description: Καθορίζει εάν το προϊόν είναι ένα πλήρες σετ ή συγκεκριμένες χορδές
        (συνήθως πρίμα ή μπάσα) για κλασική κιθάρα.
    clay_modeling_dough_base_material:
      name: Βασικό υλικό πηλού ή πλαστελίνης
      description: Κύριος τύπος σύνθεσης/βάσης της πλαστελίνης.
    clay_modeling_dough_curing_method:
      name: Μέθοδος σκλήρυνσης/συναρμολόγησης του πηλού ή της πλαστελίνης
      description: Πώς το υλικό πήζει/σκληραίνει (ή παραμένει επαναχρησιμοποιήσιμο),
        κάτι που καθορίζει τα απαιτούμενα εργαλεία και τις τυπικές χρήσεις.
    clay_paintability:
      name: Δυνατότητα βαφής πηλού
      description: Δείχνει αν η επιφάνεια του σκληρυμένου πηλού μπορεί να βαφτεί και
        τους συνιστώμενους τύπους χρωμάτων.
    clay_primary_composition:
      name: Πρωτογενής σύνθεση πηλού
      description: Κύριο βασικό υλικό/συνδετικό του αυτοσκληρυνόμενου πηλού (π.χ.
        με βάση το χαρτί, ορυκτής βάσης).
    clay_shooting_discipline:
      name: Αγωνιστική σκοποβολή με πήλινους στόχους
      description: Καθορίζει την αγωνιστική κατηγορία ή το είδος αγώνα σκοποβολής
        με πήλινους στόχους για το οποίο προορίζεται το προϊόν.
    cleaner_format:
      name: Καθαρότερη μορφή
      description: Η συσκευασία/μορφή του προϊόντος καθαρισμού slide.
    cleaner_sanitizer_intended_area:
      name: Περιοχή που προορίζεται για καθαριστικό/απολυμαντικό
      description: Το κύριο μέρος του χάλκινου πνευστού οργάνου που προορίζεται να
        καθαριστεί/απολυμανθεί με το προϊόν.
    cleaning_formula:
      name: Φόρμουλα καθαρισμού
      description: Καθορίζει την κύρια χημική κατηγορία καθαρισμού/απολύμανσης του
        προϊόντος (όχι μάρκα), ώστε να υποστηρίζεται η ασφάλεια, η συμβατότητα και
        το φιλτράρισμα χρήσης.
    cleaning_task_focus:
      name: Εστίαση στην εργασία καθαρισμού
      description: Καθορίζει τα κύρια προβλήματα καθαρισμού που προορίζεται να αντιμετωπίσει
        το προϊόν πλυσίματος αυτοκινήτου χωρίς νερό.
    cleanup_method:
      name: Μέθοδος καθαρισμού
      description: Καθορίζει τον τρόπο με τον οποίο η κόλλα πρόκειται να καθαριστεί
        (ενώ είναι βρεγμένη) από χέρια/εργαλεία/επιφάνειες.
    clear_glue_application_method:
      name: Μέθοδος εφαρμογής διαφανούς κόλλας
      description: Καθορίζει το στυλ δοσομετρητή/εφαρμοστή που περιλαμβάνεται στη
        συσκευασία της διαφανούς κόλλας.
    clear_glue_finish_after_drying:
      name: Φινίρισμα διαφανούς κόλλας (μετά το στέγνωμα)
      description: Περιγράφει την εμφάνιση της κόλλας αφού στεγνώσει/σκληρυνθεί (π.χ.,
        κρυστάλλινη έναντι ημιδιαφανούς, γυαλιστερή έναντι ματ).
    cleat_bolt_pattern:
      name: Μοτίβο μπουλονιού
      description: Καθορίζει τη διαμόρφωση των μπουλονιών του παπουτσιού που χρησιμοποιούνται
        για την τοποθέτηση του πέλματος, η οποία καθορίζει τη συμβατότητα του πεντάλ
        και του παπουτσιού (π.χ., ποδήλατο MTB 2 μπουλονιών έναντι ποδηλάτου δρόμου
        3 μπουλονιών).
    cleat_compatibility:
      name: Συμβατότητα παπουτσιού με καρφιά
      description: Καθορίζει σε ποια συστήματα πεντάλ ή σχαρών ταιριάζει το κάλυμμα
        παπουτσιού.
    cleat_finish:
      name: Φινίρισμα πέλματος
      description: Καθορίζει το τελείωμα ή την επίστρωση της αρπάγης προβλήτας, επηρεάζοντας
        την αντοχή στη διάβρωση και την εμφάνιση.
    cleat_receptacle_system:
      name: Σύστημα υποδοχής μπουλονιού
      description: Καθορίζει τη συμβατή διεπαφή σύνδεσης για καρφιά/μπουλόνια που
        χρησιμοποιούνται σε παπούτσια γκολφ με καρφιά.
    cleat_release_mechanism:
      name: Μηχανισμός απελευθέρωσης καρφιού
      description: Καθορίζει τον τρόπο με τον οποίο η τριβή ποδηλάτου απελευθερώνεται
        από το πεντάλ (π.χ. μονοκατεύθυνση ή πολυκατευθυντική απελευθέρωση).
    cleat_stud_type:
      name: Τύπος καρφιού μπουλονιού
      description: Καθορίζει τον τρόπο κατασκευής ή στερέωσης των καρφιών στη σόλα
        των παπουτσιών αμερικανικού ποδοσφαίρου.
    climate_control_module_function:
      name: Λειτουργία της μονάδας κλιματικού ελέγχου
      description: Καθορίζει τον κύριο ρόλο του μονάδας στο σύστημα HVAC του οχήματος.
    climbing_hold_mounting_type:
      name: Τύπος στήριξης της λαβής αναρρίχησης
      description: Καθορίζει τον τρόπο με τον οποίο στερεώνεται η βάση στον τοίχο
        ή στη σανίδα προπόνησης.
    climbing_hold_type:
      name: Τύπος κρατήματος αναρρίχησης
      description: Κατηγοριοποιεί τα σχήματα ή το στυλ της βάσης που καθορίζουν τον
        τρόπο πιασίματος.
    climbing_protection_device_type:
      name: Τύπος προστατευτικής διάταξης αναρρίχησης
      description: Καθορίζει το στυλ διάταξης προστασίας (π.χ. έκκεντρο, παξιμάδι,
        καρφί), βοηθώντας τους αναρριχητές να περιορίσουν γρήγορα τον εξοπλισμό τους
        για ένα δεδομένο βράχο ή στυλ αναρρίχησης.
    climbing_rope_middle_marking:
      name: Μεσαία σήμανση σχοινιού αναρρίχησης
      description: Περιγράφει πώς εντοπίζεται το μέσο του σχοινιού (και/ή οι άκρες
        του) για να διευκολύνεται η ασφαλής κατάβαση και το κατέβασμα.
    climbing_rope_treatment:
      name: Επεξεργασία του σχοινιού αναρρίχησης
      description: Υποδεικνύει οποιοδήποτε υδατοαπωθητικό, ξηρό ή προστατευτικό φινίρισμα
        που έχει εφαρμοστεί στο περίβλημα ή/και στον πυρήνα του σχοινιού.
    climbing_rope_type:
      name: Τύπος σχοινιού αναρρίχησης
      description: Κατατάσσει το σχοινί με βάση την πιστοποίηση UIAA και την προβλεπόμενη
        χρήση (π.χ. δυναμικό μονό, μισό, διπλό, στατικό, βοηθητικό σχοινί), επιτρέποντας
        στον αγοραστή να εντοπίζει γρήγορα το σωστό σχοινί για τη δραστηριότητά του.
    climbing_safety_certifications:
      name: Πιστοποιήσεις ασφάλειας αναρρίχησης
      description: Παραθέτει τα πρότυπα αναρρίχησης και βιομηχανικής ασφάλειας που
        πληροί η διάταξη.
    clip_color:
      name: Χρώμα κλιπ
      description: Κύριο χρώμα του κλιπ φύλλων μουσικής με σφιγκτήρα.
    clip_mechanism_type:
      name: Τύπος μηχανισμού κλιπ
      description: Καθορίζει τον μηχανισμό στερέωσης που χρησιμοποιείται από ένα κλιπ
        χρημάτων ή πορτοφόλι με κλιπ, βοηθώντας τους αγοραστές να επιλέξουν μεταξύ
        μαγνήτη, ελατηρίου, μοχλού και άλλων τύπων.
    clip_style:
      name: Στυλ κλιπ
      description: Καθορίζει τον συγκεκριμένο μηχανισμό κλιπ που χρησιμοποιείται για
        την προσαρμογή της βάσης, παρέχοντας πληροφορίες συμβατότητας (π.χ. κλιπ τύπου
        alligator, καραμπίνερ).
    clipper_motor_technology:
      name: Τεχνολογία μοτέρ κουρευτικής μηχανής
      description: Καθορίζει τον σχεδιασμό του μοτέρ που χρησιμοποιείται στην κουρευτική
        μηχανή, επηρεάζοντας την ισχύ, τον θόρυβο, τη διάρκεια ζωής και τη συντήρηση.
    closet_configuration:
      name: Διαμόρφωση ντουλάπας
      description: Καθορίζει το συνολικό σχήμα ή τη διάταξη του συστήματος ντουλάπας
        walk-in (π.χ. σχήμα Γ, σχήμα Π, με νησίδα).
    closing_mechanism:
      name: Μηχανισμός κλεισίματος
      description: Καθορίζει την ενέργεια κλεισίματος του συρταριού, όπως τυπικό,
        απαλό κλείσιμο, αυτόματο κλείσιμο ή άνοιγμα με πάτημα.
    cloth_construction:
      name: Κατασκευή υφάσματος
      description: Καθορίζει τον τύπο ύφανσης ή το φινίρισμα του υφάσματος, που επηρεάζει
        την ταχύτητα και την αντοχή (π.χ. Worsted έναντι Woolen).
    cloth_thickness:
      name: Πάχος υφάσματος
      description: Υποδεικνύει την κατηγορία πάχους/βάρους του πανιού γυαλίσματος.
    club_head_material:
      name: Υλικό κεφαλής μπαστούνιου
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται στην κατασκευή της
        κεφαλής του μπαστουνιού.
    clutch_hydraulic_system_type:
      name: Τύπος υδραυλικού συστήματος συμπλέκτη
      description: Υποδεικνύει τη συμβατότητα του συστήματος ενεργοποίησης του συμπλέκτη
        (π.χ. υδραυλικός συμπλέκτης έναντι εφαρμογών μετατροπής με συρματόσχοινο).
    clutch_line_connection_type:
      name: Τύπος σύνδεσης γραμμής συμπλέκτη
      description: Καθορίζει τη διεπαφή τελικής σύνδεσης/τοποθέτησης που χρησιμοποιείται
        από τη γραμμή συμπλέκτη (σημαντικό για τη συμβατότητα με κύριους/υποτελείς
        κυλίνδρους και σταθερούς αγωγούς).
    clutch_pressure_plate_actuation_type:
      name: Τύπος ενεργοποίησης πλάκας πίεσης συμπλέκτη
      description: Υποδεικνύει εάν ο συμπλέκτης απελευθερώνεται με μηχανισμό απελευθέρωσης
        τύπου ώθησης ή έλξης (ενεργοποίηση ελατηρίου διαφράγματος).
    clutch_pressure_plate_release_mechanism_type:
      name: Τύπος μηχανισμού απελευθέρωσης πλάκας πίεσης συμπλέκτη
      description: Το στυλ διεπαφής απελευθέρωσης/ενεργοποίησης που χρησιμοποιείται
        από την πλάκα πίεσης.
    clutch_pressure_plate_surface_type:
      name: Τύπος επιφάνειας πλάκας πίεσης συμπλέκτη
      description: Τύπος επιφάνειας τριβής της πλάκας πίεσης.
    clutch_slave_cylinder_connection_type:
      name: Τύπος σύνδεσης δευτερεύοντος κυλίνδρου συμπλέκτη
      description: Διεπαφή σύνδεσης υδραυλικής γραμμής στον υποδοχέα κυλίνδρου (βιδωτή
        θύρα, ταχεία σύνδεση, banjo κ.λπ.).
    clutch_slave_cylinder_mounting_type:
      name: Τύπος τοποθέτησης του κυλίνδρου αποδέσμευσης συμπλέκτη
      description: Πώς στερεώνεται η αντλία υποβραχιόνιου στο κιβώτιο ταχυτήτων/κέλυφος
        (π.χ., με βίδα, με κλιπ, ενσωματωμένο ομόκεντρο).
    coating_type:
      name: Τύπος επίστρωσης
      description: Καθορίζει οποιαδήποτε εξωτερική επικάλυψη, ράντισμα ή γλάσο που
        εφαρμόζεται στη μπάρα δημητριακών (π.χ. σοκολάτα, γιαούρτι).
    cocking_mechanism:
      name: Μηχανισμός όπλισης
      description: Καθορίζει την κύρια μέθοδο ή συσκευή που χρησιμοποιείται για την
        όπλιση ή την αποόπλιση της χορδής της βαλλίστρας.
    cocktail_garnish_form:
      name: Σχήμα γαρνιτούρας κοκτέιλ
      description: Περιγράφει τον τρόπο παρουσίασης/επεξεργασίας της γαρνιτούρας για
        χρήση (π.χ. νωπή έναντι αφυδατωμένης).
    cocktail_mix_variety:
      name: Ποικιλία μειγμάτων κοκτέιλ
      description: Υποδεικνύει το συγκεκριμένο κοκτέιλ που προορίζεται για το μείγμα
        (π.χ. Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Χαρακτηριστικά χαρτοπετσέτας κοκτέιλ
      description: Υπογραμμίζει τα λειτουργικά, βολικά και φιλικά προς το περιβάλλον
        χαρακτηριστικά των χαρτοπετσετών για κοκτέιλ.
    cocktail_pick_tip_style:
      name: Τύπος διακοσμητικού στικ κοκτέιλ
      description: Περιγράφει το σχήμα ή το χαρακτηριστικό της άκρης που χρησιμοποιείται
        για να τρυπήσει ή να συγκρατήσει τις γαρνιτούρες.
    cocktail_pick_top_handle_style:
      name: Τύπος διακοσμητικού στικ για κοκτέιλ
      description: Περιγράφει το διακοσμητικό επάνω μέρος ή το σχήμα της λαβής που
        χρησιμοποιείται για κράτημα ή παρουσίαση.
    cocktail_type:
      name: Τύπος κοκτέιλ
      description: Αναφέρει τη συγκεκριμένη συνταγή ή το στυλ κοκτέιλ που αντιπροσωπεύεται
        από το προαναμεμειγμένο προϊόν (π.χ., Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Υλικό της λαβίδας/οδοντογλυφίδας της διακοσμητικής ομπρέλας κοκτέιλ
      description: Υλικό του τμήματος διακοσμητικού στικ (εξαιρουμένης της ομπρέλας)
        της ομπρέλας κοκτέιλ.
    cocoa_processing_method:
      name: Μέθοδος επεξεργασίας κακάο
      description: Καθορίζει τον τρόπο επεξεργασίας της σκόνης κακάο (π.χ., Φυσικό,
        Ολλανδικής επεξεργασίας, Μαύρο κακάο).
    cocoa_product_form:
      name: Μορφή προϊόντος κακάο
      description: Ορίζει τη φυσική μορφή στην οποία πωλείται το προϊόν κακάο.
    coconut_husk_status:
      name: Κατάσταση φλοιού καρύδας
      description: Υποδεικνύει τον βαθμό στον οποίο έχει αφαιρεθεί ο εξωτερικός φλοιός
        ή κέλυφος της καρύδας, επηρεάζοντας την ευκολία χρήσης, αποθήκευσης και απόρριψης.
    coconut_maturity_stage:
      name: Στάδιο ωρίμανσης καρύδας
      description: Προσδιορίζει το στάδιο ανάπτυξης της καρύδας κατά τη συγκομιδή,
        το οποίο επηρεάζει έντονα τη γεύση, το περιεχόμενο νερού και τη μαγειρική
        χρήση (π.χ. κατανάλωση έναντι μαγειρέματος).
    coconut_oil_refinement_type:
      name: Τύπος εξευγενισμού ελαίου καρύδας
      description: Καθορίζει τη διύλιση ή την ποιότητα του ελαίου καρύδας, π.χ. παρθένο,
        εξευγενισμένο, MCT, κλασματικής απόσταξης.
    coconut_preparation_form:
      name: Φόρμα παρασκευής καρύδας
      description: Καθορίζει τον τρόπο με τον οποίο η καρύδα παρασκευάζεται ή κόβεται
        φυσικά (ολόκληρη, σε φέτες, τριμμένη, σε πουρέ κ.λπ.), βοηθώντας τον αγοραστή
        να βρει γρήγορα τη μορφή που χρειάζεται για συνταγές ή σνακ.
    coffee_bean_species:
      name: Είδη κόκκων καφέ
      description: Καθορίζει το είδος των κόκκων καφέ που χρησιμοποιούνται στο προϊόν.
    coffee_beverage_variety:
      name: Ποικιλία ροφημάτων καφέ
      description: Ταξινομεί έτοιμα προς κατανάλωση ή μείγματα ροφημάτων καφέ ανάλογα
        με το στυλ.
    coffee_processing_method:
      name: Μέθοδος επεξεργασίας καφέ
      description: Υποδεικνύει την τεχνική επεξεργασίας μετά τη συγκομιδή που χρησιμοποιείται
        στους κόκκους καφέ.
    coil_material:
      name: Υλικό πηνίου
      description: Καθορίζει το κύριο υλικό ή τον τύπο πλέγματος που χρησιμοποιείται
        στο θερμαντικό πηνίο, επηρεάζοντας τη γεύση, τη μακροζωία και τη συμβατότητα
        με τον έλεγχο θερμοκρασίας.
    coil_spring_design:
      name: Σχεδιασμός ελικοειδούς ελατηρίου
      description: Καθορίζει τον ρυθμό/σχεδιασμό του ελατηρίου σπείρας, ο οποίος επηρεάζει
        τα χαρακτηριστικά κύλισης και απόσβεσης.
    coil_spring_finish_coating:
      name: Φινίρισμα/επίστρωση ελικοειδούς ελατηρίου
      description: Φινίρισμα ή επίστρωση επιφάνειας που εφαρμόζεται για προστασία
        από τη διάβρωση.
    coil_spring_material:
      name: Υλικό ελικοειδούς ελατηρίου
      description: Πρωτεύον υλικό/σύνθεση του ελικοειδούς ελατηρίου.
    coil_system_type:
      name: Τύπος συστήματος πηνίου
      description: Περιγράφει λεπτομερώς το συγκεκριμένο σύστημα πηνίων ή ελατηρίων
        που χρησιμοποιείται σε κατάλληλα στρώματα, όπως πηνία τσέπης ή πηνία Bonnell.
    coil_type:
      name: Τύπος πηνίου
      description: Περιγράφει την κατασκευή ή την τεχνολογία του πηνίου που χρησιμοποιείται,
        επηρεάζοντας την παραγωγή ατμών και τη γεύση.
    coin_grade_numismatic:
      name: Βαθμός νομίσματος (νομισματικός)
      description: Τυποποιημένος βαθμός κατάστασης του νομίσματος (π.χ. κλίμακα Sheldon
        ή περιγραφική βαθμολόγηση).
    coin_strike_or_finish:
      name: Τύπος κοπής ή φινιρίσματος νομίσματος
      description: Ο τύπος ή το φινίρισμα του νομίσματος (π.χ., business strike, proof).
    coin_strike_type:
      name: Τύπος κοπής νομίσματος
      description: Περιγράφει τον τύπο κοπής/φινιρίσματος του νομίσματος (π.χ., proof,
        business strike).
    collar_style:
      name: Στυλ κολάρου
      description: Ορίζει το σχέδιο του γιακά ή του ντεκολτέ στο ένδυμα.
    collectible_gun_accessories_included:
      name: Περιλαμβάνονται συλλεκτικά αξεσουάρ όπλων
      description: Καταγράφει τα αξεσουάρ και τα έγγραφα που περιλαμβάνονται με το
        συλλεκτικό όπλο (π.χ. θήκη, κασετίνα, ξιφολόγχη, έγγραφα).
    collectible_gun_firing_mechanism:
      name: Συλλεκτικός μηχανισμός πυροδότησης όπλου
      description: Καθορίζει τον τύπο μηχανισμού πυροδότησης/ανάφλεξης του όπλου για
        συλλεκτικά πυροβόλα όπλα (ειδικά αντίκες και ιστορικά κομμάτια).
    collectible_knife_blade_finish:
      name: Φινίρισμα λεπίδας συλλεκτικού μαχαιριού
      description: Περιγράφει το φινίρισμα/επιφανειακή επεξεργασία της λάμας για λόγους
        εμφάνισης (και, σε ορισμένες περιπτώσεις, αντοχής στη διάβρωση).
    color_code_system:
      name: Σύστημα κωδικοποίησης με χρώματα
      description: Καθορίζει το σύστημα κωδικοποίησης με χρώματα που χρησιμοποιείται
        για την αριθμητική αναφορά του νήματος (π.χ. DMC, Anchor), εφόσον εφαρμόζεται.
    color_coding_standard:
      name: Πρότυπο κωδικοποίησης με χρώματα
      description: Υποδεικνύει εάν η πινακίδα ακολουθεί έναν διεθνή κωδικό χρώματος
        (π.χ., IWF ή IPF) ή κάποιο άλλο σχήμα.
    color_effect:
      name: Χρωματικά εφέ
      description: Καθορίζει ειδικές τεχνικές χρώματος ή εφέ που εφαρμόζονται σε extensions
        μαλλιών.
    color_family:
      name: Οικογένεια χρώματος
      description: Οικογένεια χρωμάτων υψηλού επιπέδου για μελάνι sumi (χρήσιμη όταν
        το χρώμα είναι πολύ κοκκώδες, π.χ. ζεστό μαύρο έναντι μπλε-μαύρου).
    color_finish:
      name: Χρωματικό φινίρισμα
      description: Καθορίζει το φινίρισμα των ορατών εξαρτημάτων της χειροπροστασίας
        (π.χ. ματ έναντι γυαλιστερού) όταν το χρώμα από μόνο του δεν επαρκεί.
    coloring_finish:
      name: Φινίρισμα χρωματισμού
      description: Καθορίζει το οπτικό φινίρισμα ή το ειδικό εφέ που παράγεται από
        τον χρωματισμό, όπως μεταλλικό ή νέον.
    comb_material:
      name: Υλικό χτένας
      description: Υλικό της χτένας της φυσαρμόνικας (το σώμα που σχηματίζει τους
        αεροθαλάμους).
    comb_type:
      name: Τύπος χτένας
      description: Κατηγοριοποιεί τις χτένες φροντίδας αλόγου ανάλογα με τον κύριο
        λειτουργικό τους τύπο (π.χ. χτένα μασάζ, χτένα χαίτης, χτένα κουρέματος),
        βοηθώντας τους αγοραστές να βρουν γρήγορα το κατάλληλο εργαλείο για συγκεκριμένες
        ανάγκες περιποίησης.
    combat_shorts_cut_style:
      name: Στυλ κοπής στρατιωτικού σορτς
      description: Υποδεικνύει το στυλ κοπής ή εφαρμογής που αφορά συγκεκριμένα τα
        στρατιωτικά σορτς (π.χ., ψηλό κόψιμο, ρετρό κόψιμο, συμπίεση).
    comic_creator_role:
      name: Ρόλος δημιουργού κόμικ
      description: Καθορίζει τον αναγνωρισμένο ρόλο δημιουργού που σχετίζεται με την
        καταχώριση (π.χ. συγγραφέας, καλλιτέχνης).
    commemorative_coin_finish:
      name: Φινίρισμα αναμνηστικού νομίσματος.
      description: Περιγράφει τον τύπο κοπής/φινιρίσματος ενός αναμνηστικού νομίσματος.
    commemorative_coin_mint_mark:
      name: Σήμα κοπής νομίσματος συλλεκτικού χαρακτήρα
      description: Υποδεικνύει το σήμα κοπής (ή την απουσία σήματος) στο νόμισμα.
    commemorative_subject:
      name: Επετειακό/μνημονικό θέμα
      description: Πρωτοβάθμιο εορταστικό θέμα (γεγονός, πρόσωπο, τόπος, επέτειος,
        οργανισμός, κ.λπ.).
    commercial_vehicle_class:
      name: Κατηγορία εμπορικού οχήματος
      description: Κανονιστική/βιομηχανική κατηγορία βάσει GVWR που χρησιμοποιείται
        για την περιγραφή της κατηγορίας βάρους ενός επαγγελματικού οχήματος για περιήγηση
        και φιλτράρισμα.
    compass_damping_medium:
      name: Μέσο απόσβεσης πυξίδας
      description: Καθορίζει το μέσο που χρησιμοποιείται για τη σταθεροποίηση της
        κίνησης της βελόνας μέσα στην κάψουλα της πυξίδας.
    compass_illumination_type:
      name: Τύπος φωτισμού πυξίδας
      description: Καθορίζει τον τρόπο με τον οποίο τα σημάδια της πυξίδας γίνονται
        ορατά σε συνθήκες χαμηλού φωτισμού (π.χ., φωσφορίζουσα βαφή, τρίτιο, οπίσθιος
        φωτισμός LED).
    compass_mounting_style:
      name: Τύπος στήριξης πυξίδας
      description: Περιγράφει τον τρόπο μεταφοράς, χρήσης ή εγκατάστασης της πυξίδας.
    compass_scale_units:
      name: Μονάδες κλίμακας πυξίδας
      description: Καθορίζει τις μονάδες μέτρησης (μοίρες, mils ή και τα δύο) που
        είναι σημειωμένες στο περίβλημα της πυξίδας.
    compatible_abs_system:
      name: Συμβατό σύστημα ABS
      description: Υποδεικνύει αν ο κύριος κύλινδρος προορίζεται για οχήματα εξοπλισμένα
        με ABS.
    compatible_adapter_brand:
      name: Επωνυμία συμβατού προσαρμογέα
      description: Προσδιορίζει την επωνυμία της κεφαλής του μπαστουνιού του γκολφ
        στον προσαρμογέα της οποίας ο άξονας είναι προδιαμορφωμένος για να ταιριάζει.
    compatible_airbag_system_type:
      name: Συμβατός τύπος συστήματος αερόσακων
      description: Υποδεικνύει τη γενιά/σύνολο χαρακτηριστικών συστήματος αερόσακων
        με το οποίο είναι συμβατό το εξάρτημα (π.χ., μονοβάθμιο έναντι διπλού σταδίου).
    compatible_amplifier_fit_method:
      name: Συμβατή μέθοδος προσαρμογής ενισχυτή
      description: Υποδεικνύει τον τρόπο με τον οποίο ορίζεται η συμβατότητα της θήκης/καλύμματος
        (καθολική εφαρμογή, συμβατότητα ανά μοντέλο ή με βάση τις διαστάσεις).
    compatible_apparatus:
      name: Συμβατές συσκευές
      description: Καθορίζει το όργανο γυμναστικής ή τη δραστηριότητα για την οποία
        έχουν σχεδιαστεί οι λαβές.
    compatible_archery_tool:
      name: Συμβατό εργαλείο τοξοβολίας
      description: Υποδεικνύει το κύριο εργαλείο ή κομμάτι εξοπλισμού τοξοβολίας με
        το οποίο έχει σχεδιαστεί να λειτουργεί το αξεσουάρ.
    compatible_axle_size:
      name: Συμβατό μέγεθος άξονα
      description: Καθορίζει τη διάμετρο πλήμνης/άξονα ή το τυπικό νήμα για το οποίο
        έχει σχεδιαστεί το μαρσπιέ (π.χ., 10 mm/3⁄8 ίντσας, 14 mm, 3/8 in 26 TPI).
    compatible_axle_type:
      name: Συμβατός τύπος άξονα
      description: Καθορίζει το πρότυπο σύνδεσης του πίσω άξονα που υποστηρίζει ο
        προπονητής, όπως ταχείας απελευθέρωσης (quick-release) ή διαμέτρους διαμπερούς
        άξονα (thru-axle).
    compatible_axle_weight_rating:
      name: Συμβατή ονομαστική ικανότητα φορτίου άξονα
      description: Καθορίζει την ονομαστική χωρητικότητα βάρους ανά άξονα (ικανότητα
        ανά άξονα) για την οποία έχει σχεδιαστεί το συγκρότημα φρένων του ρυμουλκούμενου.
    compatible_bait_type:
      name: Συμβατός τύπος δολώματος
      description: Καθορίζει τους τύπους δολωμάτων ψαρέματος με τους οποίους είναι
        συμβατή η βελόνα δολώματος, ώστε οι ψαράδες να μπορούν να επιλέξουν ένα εργαλείο
        που ταιριάζει με το δόλωμα που προτιμούν.
    compatible_bass_scale_length:
      name: Συμβατό μήκος κλίμακας μπάσων
      description: Καθορίζει το μήκος κλίμακας του μπάσου για το οποίο προορίζεται
        το σετ χορδών (σημαντικό για σωστό μήκος περιέλιξης και εφαρμογή).
    compatible_battle_top_system:
      name: Σύστημα μάχης συμβατό με το προϊόν
      description: Προσδιορίζει το οικοσύστημα προϊόντων ή τη σειρά για την οποία
        έχει σχεδιαστεί το σύστημα (χρησιμοποιείται για να διασφαλιστεί η συμβατότητα
        του τμήματος και της αρένας).
    compatible_bb_size:
      name: Συμβατό μέγεθος BB
      description: Καθορίζει τη διάμετρο των βολίδων airsoft που υποστηρίζει το προϊόν.
    compatible_bed_frame_style:
      name: Συμβατό στυλ σκελετού κρεβατιού
      description: Καθορίζει το στυλ κρεβατιού ή το πλαίσιο στο οποίο έχει σχεδιαστεί
        το αξεσουάρ.
    compatible_bicycle_tire_type:
      name: Συμβατός τύπος ελαστικού ποδηλάτου
      description: Καθορίζει τους τύπους ελαστικών ποδηλάτου που μπορεί να επισκευάσει
        ή να στεγανοποιήσει το προϊόν.
    compatible_bike_component:
      name: Συμβατό εξάρτημα ποδηλάτου
      description: Καθορίζει ποιο εξάρτημα του ποδηλάτου προορίζεται να εξυπηρετεί
        το εργαλείο ή το προϊόν.
    compatible_billiard_game:
      name: Συμβατό παιχνίδι μπιλιάρδου
      description: Καθορίζει τη μορφή παιχνιδιού μπιλιάρδου για την οποία έχει σχεδιαστεί
        το ράφι, διασφαλίζοντας ότι οι πελάτες επιλέγουν ράφι συμβατό με το παιχνίδι
        τους.
    compatible_billiard_table_size:
      name: Συμβατό μέγεθος τραπεζιού μπιλιάρδου
      description: Καθορίζει το πρότυπο μήκος(η) τραπεζιού για το οποίο έχει σχεδιαστεί
        το κάλυμμα, διασφαλίζοντας ότι οι αγοραστές επιλέγουν κάλυμμα με σωστό μέγεθος
        για το τραπέζι μπιλιάρδου τους.
    compatible_bit_type:
      name: Συμβατός τύπος ποδηλάτου
      description: Τύποι μύτης με τους οποίους μπορεί να χρησιμοποιηθεί ο οδηγός.
    compatible_blade_hosel:
      name: Συμβατός λαιμός λεπίδας
      description: Υποδεικνύει το στυλ εύκαμπτου σωλήνα/κώνου λεπίδας που δέχεται
        ο άξονας, διασφαλίζοντας ότι ο άξονας και η λεπίδα ταιριάζουν σωστά μεταξύ
        τους.
    compatible_blade_system:
      name: Συμβατό σύστημα λεπίδας
      description: 'Υποδεικνύει το σύστημα/μορφή ανταλλακτικής λεπίδας που δέχεται
        το μαχαίρι (π.χ., τυπικό hobby #11, λεπίδες με αποσπώμενο τμήμα).'
    compatible_boat_weaving_shuttle_loom:
      name: Τύπος υφαντικού αργαλειού που είναι συμβατός με τη βελόνα/σχοινί για σκάφη
      description: Τύποι αργαλειού για τους οποίους προορίζεται η σαΐτα.
    compatible_bobbin_type:
      name: Συμβατός τύπος μπομπίνας
      description: Υποδεικνύει το είδος μπομπίνας/καρουλιού που έχει σχεδιαστεί για
        χρήση από τη σαΐτα.
    compatible_bottle_mouth:
      name: Συμβατό στόμιο μπουκαλιού
      description: Τύπος ή διάμετρος στομίου μπουκαλιού στην οποία έχει σχεδιαστεί
        το καλαμάκι ή το καπάκι.
    compatible_bow_attachment_system:
      name: Συμβατό σύστημα προσάρτησης τόξου
      description: Καθορίζει τη διεπαφή του σκέλους ή του αξεσουάρ για την οποία προορίζεται
        το εξάρτημα (π.χ. ILF, βιδωτή σύνδεση, ταχεία αποσύνδεση).
    compatible_bow_crossbow_type:
      name: Συμβατός τύπος τόξου/βαλλίστρας
      description: Υποδηλώνει το στυλ τόξου ή βαλλίστρας για το οποίο έχει σχεδιαστεί
        το αξεσουάρ.
    compatible_brake_fluid:
      name: Συμβατό υγρό φρένων
      description: Προδιαγραφές υγρού φρένων DOT με τις οποίες είναι σχεδιασμένα να
        είναι συμβατά τα στεγανοποιητικά/υλικά του κυλίνδρου φρένων.
    compatible_brake_pad:
      name: Συμβατό τακάκι φρένων
      description: Καθορίζει για ποια τακάκια φρένου είναι εγκεκριμένος ο δίσκος,
        διασφαλίζοντας ασφάλεια και βέλτιστη φθορά.
    compatible_brake_service_system:
      name: Συμβατό σύστημα συντήρησης φρένων
      description: Καθορίζει εάν το εξάρτημα προορίζεται για δισκόφρενα, ταμπούρα
        ή και τα δύο.
    compatible_brake_system:
      name: Συμβατό σύστημα φρένων
      description: Καθορίζει βασικές σημειώσεις συμβατότητας συστήματος για τη χρήση
        υγρού φρένων.
    compatible_brake_type:
      name: Συμβατός τύπος φρένων
      description: Καθορίζει τον τύπο φρένου με τον οποίο είναι συμβατό το rack, όπως
        δίσκος ή ζάντα.
    compatible_brass_instrument_finish:
      name: Συμβατό φινίρισμα ορειχάλκινου πνευστού οργάνου
      description: Καθορίζει σε ποια φινιρίσματα χάλκινων οργάνων είναι ασφαλές να
        χρησιμοποιηθεί το καθαριστικό χωρίς να καταστραφεί το φινίρισμα.
    compatible_building_toy_system:
      name: Συμβατό σύστημα παιχνιδιών κατασκευής
      description: Καθορίζει με ποιο σύστημα/πρότυπο κατασκευής είναι συμβατό το παιχνίδι
        (ή αντίστοιχο μέγεθος), π.χ. συμβατό με LEGO ή ιδιωτικής ετικέτας.
    compatible_capo_fretboard_radius:
      name: Συμβατή ακτίνα ταστιέρας καποτάστου
      description: Καθορίζει την ακτίνα/προφίλ ταστιέρας στην οποία έχει σχεδιαστεί
        το καποτάστο για βέλτιστη επαφή και σταθερότητα κουρδίσματος.
    compatible_capo_number_of_strings:
      name: Συμβατός αριθμός χορδών καποτάστο
      description: Υποδεικνύει πόσες χορδές έχει σχεδιαστεί για να συσφίξει το καποτάστο
        (χρήσιμο για όργανα 6-, 7-, 8-, 12-χορδών και ειδικών οργάνων).
    compatible_cardio_machine_type:
      name: Συμβατός τύπος καρδιομηχανήματος
      description: Προσδιορίζει τον τύπο του μηχανήματος καρδιοαναπνευστικής άσκησης
        για το οποίο έχει σχεδιαστεί να λειτουργεί το παρελκόμενο ή το εξάρτημα.
    compatible_chain_link_type:
      name: Συμβατός τύπος κρίκου αλυσίδας
      description: Καθορίζει το στυλ της αλυσίδας που υποστηρίζει το εργαλείο (τυπική,
        ημι-αλυσίδα, γρήγορη σύνδεση κ.λπ.).
    compatible_chain_size:
      name: Συμβατό μέγεθος δοχείου (κουτιού)
      description: Καθορίζει το πλάτος ή το πρότυπο βήματος της αλυσίδας (π.χ. 1/8
        ίντσας, 3/32 ίντσας) που υποστηρίζει το εργαλείο.
    compatible_chain_width:
      name: Συμβατό πλάτος αλυσίδας
      description: Υποδεικνύει με ποια μεγέθη αλυσίδας έχει σχεδιαστεί να λειτουργεί
        ο ελεύθερος τροχός.
    compatible_chip_denomination:
      name: Ονομασία συμβατού τσιπ
      description: Υποδεικνύει για ποιες ονομασίες τσιπ περιλαμβάνει ετικετοποιημένες
        ή με ειδικές θέσεις ο δίσκος/θήκη (ή ποιες προορίζεται να οργανώνει).
    compatible_clarinet_mouthpiece_ligature:
      name: Συμβατός σφιγκτήρας για επιστόμιο κλαρινέτου
      description: Προσδιορίζει το πρότυπο εφαρμογής του συνδέσμου ή τις σημειώσεις
        συμβατότητας για το επιστόμιο.
    compatible_classical_guitar_string_scale_length:
      name: Συμβατό μήκος κλίμακας χορδών κλασικής κιθάρας
      description: Το προβλεπόμενο μήκος κλίμακας/μήκος χορδής κιθάρας για το οποίο
        είναι συμβατό το σετ.
    compatible_clay_target_size:
      name: Συμβατό μέγεθος πήλινου στόχου
      description: Καταγράφει τα μεγέθη ή τα σχήματα των πήλινων στόχων που μπορεί
        να δεχτεί ο εκτοξευτής για σωστή εφαρμογή και απόδοση.
    compatible_cleat_system:
      name: Συμβατό σύστημα καρφιού
      description: Καθορίζει τη διεπαφή βιδών ή το μοτίβο μπουλονιών που υποστηρίζει
        το πεντάλ, ώστε οι αναβάτες να αντιστοιχίσουν τα παπούτσια τους με το σωστό
        σύστημα.
    compatible_clipless_pedal_system:
      name: Συμβατό σύστημα πεντάλ χωρίς κλιπ
      description: Προσδιορίζει το συγκεκριμένο πρότυπο πεντάλ/βίδας χωρίς κλιπ με
        το οποίο έχει σχεδιαστεί να διασυνδέεται το προϊόν.
    compatible_clutch_type:
      name: Συμβατός τύπος συμπλέκτη
      description: Συμβατότητα διεπαφής συμπλέκτη για τον σφόνδυλο (όπου εφαρμόζεται).
    compatible_coffee_pod_system:
      name: Συμβατό σύστημα καψουλών καφέ
      description: Καθορίζει τη μηχανή καφέ ή το σύστημα παρασκευής για το οποίο έχουν
        σχεδιαστεί οι κάψουλες.
    compatible_construction_set_system:
      name: Συμβατό σύστημα σετ κατασκευής
      description: Υποδεικνύει με ποιο σύστημα/οικοσύστημα σετ κατασκευής ή μάρκας
        είναι συμβατό το σετ (π.χ. συμβατό με LEGO, συμβατό με DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Συμβατότητα βάσης/στήριξης για κοντραμπάσο κλαρινέτο
      description: Υποδεικνύει τη διεπαφή της βάσης/στήριξης ή τον τύπο υποστήριξης
        που απαιτείται.
    compatible_coolant_chemistry:
      name: Συμβατή χημεία ψυκτικού μέσου με συμβατό ψυκτικό μέσο
      description: Καθορίζει με ποιες χημικές οικογένειες ψυκτικού υγρού είναι διαμορφωμένο
        να είναι συμβατό το πρόσθετο.
    compatible_cooling_system_material:
      name: Συμβατό υλικό συστήματος ψύξης
      description: Καθορίζει με ποια συστήματα ψύξης/υλικά είναι ασφαλές να χρησιμοποιηθεί
        το καθαριστικό ψυγείου (π.χ. ψυγεία αλουμινίου, συστήματα μεικτών μετάλλων).
    compatible_crib_format:
      name: Συμβατή μορφή κούνιας
      description: Καθορίζει τη γενική κατηγορία μεγέθους ή σχήματος του στρώματος
        ή του σεντονιού για το οποίο έχει σχεδιαστεί το αξεσουάρ.
    compatible_cross_stitch_fabric_count:
      name: Συμβατά μέτρα υφάσματος για σταυροβελονιά
      description: Προτεινόμενα μέτρα υφάσματος για την εκτέλεση ραφής σχεδίου.
    compatible_cross_stitch_frame:
      name: Συμβατό πλαίσιο σταυροβελονιάς
      description: Υποδεικνύει με τι έχει σχεδιαστεί να χρησιμοποιείται το πλαίσιο
        (χρήση στο χέρι, επιτραπέζια βάση, επιδαπέδια βάση ή γενικής χρήσης).
    compatible_crossbar:
      name: Συμβατή εγκάρσια μπάρα
      description: Συμβατότητα του rack με τις εγκάρσιες μπάρες οροφής του οχήματος
        (εφόσον τοποθετείται στην οροφή), συμπεριλαμβανομένων των προτύπων σχήματος/διατομής
        των εγκάρσιων μπαρών.
    compatible_cycling_cleat:
      name: Συμβατή βίδα ποδηλασίας
      description: Καθορίζει το σύστημα βίδας ή πεντάλ με το οποίο έχουν σχεδιαστεί
        να λειτουργούν τα ποδηλατικά παπούτσια.
    compatible_cymbal_size:
      name: Συμβατό μέγεθος κυμβάλου
      description: Καθορίζει την προβλεπόμενη (ή μέγιστη) διάμετρο του κυμβάλου για
        την οποία έχει σχεδιαστεί η θήκη. Πρόκειται για συμβατότητα με το μέγεθος
        του κυμβάλου και όχι με την εξωτερική διάμετρο της θήκης.
    compatible_device_type:
      name: Συμβατός τύπος συσκευής
      description: Υποδεικνύει το είδος της συσκευής που προορίζεται να δεχτεί η βάση
        (π.χ. οθόνη/τηλεόραση, tablet, smartphone, φορητή συσκευή αναπαραγωγής DVD).
    compatible_dock_structure_type:
      name: Συμβατός τύπος δομής σταθμού
      description: Η κατασκευή σταθμού στην οποία είναι σχεδιασμένες να τοποθετούνται
        οι σκάλες.
    compatible_dough_type:
      name: Συμβατός τύπος ζύμης
      description: Καθορίζει τους τύπους/επωνυμία ζύμης με τους οποίους έχουν σχεδιαστεί
        να λειτουργούν τα εργαλεία (π.χ., τυπική πλαστελίνη, πηλός).
    compatible_drawing_ink_surface:
      name: Συμβατή επιφάνεια για μελάνι σχεδίασης.
      description: Υποδεικνύει τις συνιστώμενες επιφάνειες/υποστρώματα για βέλτιστη
        απόδοση.
    compatible_drivetrain_brand:
      name: Συμβατή μάρκα συστήματος μετάδοσης κίνησης
      description: Παραθέτει το σύστημα μετάδοσης κίνησης ή πέδησης με το οποίο έχει
        σχεδιαστεί να λειτουργεί το καλώδιο.
    compatible_drivetrain_speeds:
      name: Συμβατές ταχύτητες συστήματος μετάδοσης κίνησης
      description: Καθορίζει τον αριθμό των ταχυτήτων του συστήματος μετάδοσης κίνησης
        (π.χ. 10 ταχύτητες) που υποστηρίζονται από τον στρόφαλο ή τον δακτύλιο αλυσίδας.
    compatible_equipment:
      name: Συμβατός εξοπλισμός
      description: Καθορίζει τον τύπο εξοπλισμού χειμερινών σπορ για τον οποίο έχει
        σχεδιαστεί η μέγγενη.
    compatible_evap_system:
      name: Συμβατό σύστημα EVAP
      description: Υποδεικνύει αν το καπάκι καυσίμου έχει σχεδιαστεί ώστε να πληροί
        τις απαιτήσεις του συστήματος EVAP (π.χ. στεγανοποίηση προδιαγραφών OEM) και
        να μειώνει την εμφάνιση προειδοποιητικών ενδείξεων κινητήρα (check engine).
    compatible_exercise_bike_style:
      name: Συμβατό στυλ ποδηλάτου γυμναστικής
      description: Υποδεικνύει με ποιους τύπους ποδηλάτων γυμναστικής έχει σχεδιαστεί
        το αξεσουάρ ή το ανταλλακτικό να ταιριάζει.
    compatible_fencing_weapon:
      name: Συμβατό όπλο ξιφασκίας
      description: Καθορίζει για ποιο όπλο ή κατηγορία ξιφασκίας προορίζεται το σακάκι
        ή το lamé.
    compatible_fiber_type:
      name: Συμβατός τύπος ίνας
      description: Κύριοι τύποι ινών για τους οποίους ο μηχανισμός καρνταρίσματος
        είναι σχεδιασμένος να επεξεργάζεται αποτελεσματικά.
    compatible_fin_box_system:
      name: Συμβατό σύστημα κουτιού πτερυγίου
      description: Καθορίζει το σύστημα βάσης ή στερέωσης για το οποίο είναι σχεδιασμένο
        το πτερύγιο, βοηθώντας τους surfers να επιλέξουν συμβατά πτερύγια για τη σανίδα
        τους (π.χ. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Συμβατή ακτίνα ταστιέρας
      description: Καθορίζει την ακτίνα της ταστιέρας (επίπεδη, καμπύλη ή σύνθετη)
        στην οποία έχει σχεδιαστεί το καποτάστο για ομοιόμορφη πίεση και μειωμένο
        βουητό.
    compatible_finish_type:
      name: Συμβατός τύπος φινιρίσματος
      description: Υποδεικνύει για ποιους τύπους φινιρίσματος οργάνων δηλώνεται ότι
        το σπρέι είναι ασφαλές.
    compatible_fishing_reel_type:
      name: Συμβατός τύπος μηχανισμού ψαρέματος
      description: Καθορίζει το στυλ του μηχανισμού ψαρέματος για το οποίο έχει σχεδιαστεί
        ή λειτουργεί το αξεσουάρ (π.χ. spinning, baitcasting, fly).
    compatible_fly_line_weight:
      name: Συμβατό βάρος πετονιάς
      description: Υποδεικνύει τα βάρη πετονιάς AFTMA που έχει σχεδιαστεί να συγκρατεί
        το καρούλι.
    compatible_flywheel_type:
      name: Συμβατός τύπος σφονδύλου
      description: Καθορίζει τον τύπο του σφονδύλου με τον οποίο προορίζεται η χρήση
        της πλάκας πίεσης συμπλέκτη.
    compatible_football_kick_type:
      name: Συμβατός τύπος ποδοσφαιρικού λακτίσματος
      description: Καθορίζει τις καταστάσεις λακτίσματος για τις οποίες έχει σχεδιαστεί
        το προϊόν (π.χ. kickoff, field goal), βοηθώντας τους αθλητές να εντοπίζουν
        γρήγορα τον κατάλληλο εξοπλισμό.
    compatible_fuel_system_type:
      name: Συμβατός τύπος συστήματος καυσίμου
      description: Καθορίζει το σύστημα παραγωγής καυσίμου για το οποίο έχει σχεδιαστεί
        το καθαριστικό.
    compatible_gas_type:
      name: Συμβατός τύπος αερίου
      description: Προσδιορίζει τον τύπο του συμπιεσμένου αερίου για το οποίο έχει
        σχεδιαστεί η δεξαμενή αέρα του paintball.
    compatible_gel_wax_additives:
      name: Συμβατά πρόσθετα για κερί σε μορφή gel.
      description: Καθορίζει τους τύπους προσθέτων που είναι συμβατοί με το συγκεκριμένο
        κερί gel (π.χ. τύποι χρωστικών, εγκλείσματα/διακοσμητικά στοιχεία).
    compatible_glaze_layering:
      name: Συμβατή επικάλυψη υαλώματος
      description: Αν το υάλωμα προορίζεται να εφαρμόζεται σε στρώσεις μαζί με άλλα
        υαλώματα για δημιουργία εφέ.
    compatible_golf_bag_type:
      name: Συμβατός τύπος τσάντας γκολφ
      description: Υποδεικνύει σε ποια τσάντα γκολφ ταιριάζει το κάλυμμα ή η θήκη.
    compatible_ground_polarity:
      name: Συμβατή πολικότητα γείωσης
      description: Υποδεικνύει αν ο ρυθμιστής τάσης προορίζεται για ηλεκτρικά συστήματα
        οχημάτων με αρνητική ή θετική γείωση (ή αν δεν είναι ευαίσθητος στην πολικότητα).
    compatible_guitar_body_shape:
      name: Συμβατό σχήμα σώματος κιθάρας
      description: Υποδεικνύει σε ποιο σώμα/σχήμα κιθάρας έχει σχεδιαστεί για να ταιριάζει.
    compatible_guitar_case:
      name: Συμβατή θήκη κιθάρας
      description: Καθορίζει σε ποια στυλ θήκης κιθάρας έχει σχεδιαστεί για να ταιριάζει
        και να λειτουργεί σωστά ο υγραντήρας.
    compatible_guitar_scale_length:
      name: Συμβατό μήκος κλίμακας κιθάρας
      description: Υποδεικνύει σε ποια κλίμακα κιθάρας προορίζεται να χωρέσει το σετ
        χορδών (βάσει του μήκους τυλίγματος/συνολικού μήκους).
    compatible_gun_platform:
      name: Συμβατή πλατφόρμα όπλων
      description: Καθορίζει την πλατφόρμα λειτουργίας ή την πηγή τροφοδοσίας με την
        οποία είναι συμβατό το προϊόν (π.χ., AEG, GBB, HPA).
    compatible_hair_length:
      name: Συμβατό μήκος μαλλιών
      description: Καθορίζει το μέγιστο μήκος ή όγκο μαλλιών που χωράει άνετα το κάλυμμα
        κεφαλής.
    compatible_head_and_neck_restraint_system:
      name: Συμβατό σύστημα συγκράτησης κεφαλής και αυχένα
      description: Υποδεικνύει αν το κράνος διαθέτει σημεία αγκύρωσης ή είναι συμβατό
        με συστήματα συγκράτησης κεφαλής και αυχένα (π.χ. HANS), συμπεριλαμβανομένης
        της ύπαρξης ή δυνατότητας εγκατάστασης των σχετικών σημείων στήριξης.
    compatible_helmet_certification_standard:
      name: Πρότυπο πιστοποίησης συμβατού κράνους
      description: Υποδεικνύει οποιοδήποτε πρότυπο ή πιστοποίηση ασφάλειας κράνους
        στο οποίο προορίζεται να συμμορφώνεται ή να υποστηρίζει το αξεσουάρ (π.χ.
        τα σκισίματα για χρήση σε αγώνες συχνά αναφέρονται σε συγκεκριμένους κανόνες
        επιβολής κυρώσεων).
    compatible_helmet_shell_size:
      name: Συμβατό μέγεθος κελύφους κράνους
      description: Υποδεικνύει για ποια μεγέθη εξωτερικού κελύφους κράνους ταιριάζει
        το ανταλλακτικό εσωτερικό εξάρτημα (το μέγεθος του κελύφους αντιστοιχεί συχνά
        σε εύρη μεγεθών όπως XS–S, M, L–XL).
    compatible_helmet_size:
      name: Συμβατό μέγεθος κράνους
      description: Υποδεικνύει το μέγεθος του κράνους με το οποίο είναι συμβατή η
        μάσκα προσώπου.
    compatible_helmet_type:
      name: Συμβατός τύπος κράνους
      description: Κατηγορία κράνους με την οποία έχει σχεδιαστεί η υποστήριξη αυχένα.
    compatible_hitch_receiver_size:
      name: Συμβατό μέγεθος υποδοχής κοτσαδόρου
      description: Το μέγεθος ανοίγματος της υποδοχής κοτσαδόρου στο οποίο έχει σχεδιαστεί
        να εφαρμόζει το αξεσουάρ (για εξαρτήματα που τοποθετούνται σε κοτσαδόρο).
    compatible_hook_size:
      name: Συμβατό μέγεθος αγκίστρου
      description: Συστήματα μεγεθών και/ή εύρος μεγεθών βελονιών για βελονάκι για
        τα οποία έχει σχεδιαστεί η συμβατότητα του οργανωτή (π.χ. αμερικανικά γράμματα/αριθμοί
        ή μετρικό εύρος σε mm).
    compatible_horse_coat_type:
      name: Συμβατός τύπος τριχώματος αλόγου
      description: Καθορίζει τα χαρακτηριστικά του τριχώματος του αλόγου για τα οποία
        είναι πιο κατάλληλο το εργαλείο απομάκρυνσης υποτριχώματος, όπως πυκνό χειμερινό
        τρίχωμα ή ευαίσθητο τρίχωμα.
    compatible_host_platform:
      name: Συμβατή φιλοξενούμενη πλατφόρμα
      description: Καθορίζει με ποιες πλατφόρμες/συσκευές είναι συμβατό το pad controller
        (π.χ. Windows, macOS, iOS, Android) ή αν μπορεί να λειτουργήσει αυτόνομα χωρίς
        υπολογιστή.
    compatible_inflation_gas:
      name: Συμβατό αέριο πλήρωσης
      description: Καθορίζει με τι προορίζεται να φουσκώσει το μπαλόνι (αέρα, ήλιο
        ή οποιοδήποτε από τα δύο).
    compatible_injection_type:
      name: Συμβατός τύπος έγχυσης
      description: Υποδεικνύει ποιο σύστημα ψεκασμού καυσίμου έχει σχεδιαστεί για
        τον καθαρισμό του προϊόντος.
    compatible_instrument_surface_material:
      name: Συμβατή επιφάνεια/υλικό οργάνου
      description: Υποδεικνύει σε ποιες επιφάνειες/υλικά εργαλείων προορίζεται να
        χρησιμοποιηθεί το γυαλιστικό.
    compatible_intercom_system:
      name: Συμβατό σύστημα ενδοεπικοινωνίας
      description: Υποδεικνύει την ετοιμότητα ή συμβατότητα του κράνους για την τοποθέτηση
        ή εγκατάσταση συστήματος ενδοεπικοινωνίας/επικοινωνίας κράνους.
    compatible_interior_material:
      name: Συμβατό υλικό εσωτερικού
      description: Υποδεικνύει για ποια υλικά εσωτερικού χώρου οχήματος είναι ασφαλές/αποτελεσματικό
        το προϊόν αφαίρεσης λεκέδων (π.χ. χαλί, υφασμάτινη ταπετσαρία, δέρμα, βινύλιο).
    compatible_kayak_type:
      name: Συμβατός τύπος καγιάκ
      description: Καταγράφει τους γενικούς τύπους καγιάκ στους οποίους έχει σχεδιαστεί
        να τοποθετείται το σετ ιστίου.
    compatible_license_plate_hole_pattern:
      name: Συμβατό μοτίβο οπών πινακίδας κυκλοφορίας
      description: Καθορίζει τη διαμόρφωση της οπής στερέωσης που υποστηρίζεται από
        το στήριγμα/τη βάση (πλευρά οχήματος ή/και πλευρά πλάκας).
    compatible_license_plate_size:
      name: Συμβατό μέγεθος πινακίδας κυκλοφορίας
      description: Υποδεικνύει τα περιφερειακά ή διαστασιολογικά μεγέθη πινακίδων
        κυκλοφορίας βάσει των οποίων έχει σχεδιαστεί η εφαρμογή βάσης/θήκης.
    compatible_loom:
      name: Συμβατός αργαλειός
      description: Καθορίζει τους τύπους αργαλειού για τους οποίους προορίζεται η
        επίπεδη σαΐτα ύφανσης.
    compatible_loom_type:
      name: Συμβατός τύπος αργαλειού
      description: Υποδεικνύει τη διάταξη ύφανσης με την οποία προορίζεται να χρησιμοποιείται
        το εξάρτημα κτυπήματος (π.χ. αργαλειοί με άκαμπτο μιτάρι έναντι αργαλειών
        ταπισερί).
    compatible_machine_type:
      name: Συμβατός τύπος μηχανήματος
      description: Υποδεικνύει με ποιον τύπο εξοπλισμού καπιτοναρίσματος έχει σχεδιαστεί
        να χρησιμοποιείται το πλαίσιο (μόνο χειροποίητο καπιτονάρισμα, οικιακή ραπτομηχανή
        ή επαγγελματική longarm μηχανή καπιτοναρίσματος).
    compatible_mast_type:
      name: Συμβατός τύπος ιστού
      description: 'Καθορίζει για ποιες διαμέτρους ιστού έχει σχεδιαστεί το πανί:
        μειωμένης διαμέτρου (RDM), τυπικής διαμέτρου (SDM) ή και για τις δύο.'
    compatible_model_system_train_scale:
      name: Συμβατό σύστημα μοντελισμού (κλίμακα σιδηροδρόμων)
      description: Καθορίζει την κλίμακα/σύστημα μοντελισμού σιδηροδρόμων στο οποίο
        ταιριάζει το αξεσουάρ (π.χ. HO, N, O).
    compatible_mounting_surface:
      name: Συμβατή επιφάνεια τοποθέτησης
      description: Η επιφάνεια ή το αντικείμενο το οποίο προορίζεται για να στερεωθεί
        το κλιπ.
    compatible_mouthpiece_patch:
      name: Συμβατό επίθεμα επιστομίου
      description: Υποδεικνύει αν το επιστόμιο έχει σχεδιαστεί για χρήση με μαξιλαράκια/επιθέματα
        επιστομίου και το προτεινόμενο εύρος πάχους επιθέματος.
    compatible_mouthpiece_type:
      name: Συμβατός τύπος επιστομίου
      description: Υποδεικνύει τον τύπο/στέλεχος επιστομίου με τον οποίο είναι σχεδιασμένο
        να χρησιμοποιείται το μελλόφωνο (συνήθως τύπου κόρνου ή τύπου τρομπέτας, ανάλογα
        με το μοντέλο).
    compatible_neck_profile_width:
      name: 'Συμβατό προφίλ/πλάτος αυχένα:'
      description: Υποδεικνύει την κατηγορία προφίλ/πλάτους αυχένα κιθάρας στην οποία
        έχει σχεδιαστεί να εφαρμόζει το καποτάστο (π.χ. στενός ηλεκτρικής κιθάρας
        έναντι φαρδιού κλασικής κιθάρας).
    compatible_needle_size:
      name: Συμβατός τύπος βελόνας
      description: Υποδεικνύει τα μεγέθη/τύπους βελονών για τους οποίους έχει σχεδιαστεί
        η θήκη να είναι συμβατή (π.χ. βελόνες κεντήματος, ταπισερί, μήκη βελονών ραπτικής
        χειρός).
    compatible_needle_system:
      name: Συμβατό σύστημα βελόνας
      description: Σύστημα βελόνας με το οποίο είναι συμβατό το μηχάνημα (π.χ. 130/705H).
    compatible_parking_brake_mechanism:
      name: Συμβατός μηχανισμός χειρόφρενου
      description: Υποδεικνύει εάν η δαγκάνα έχει σχεδιαστεί για να λειτουργεί με
        ενσωματωμένο μηχανισμό χειρόφρενου.
    compatible_pedal_instrument_type:
      name: Συμβατός τύπος οργάνου με πεντάλ
      description: Καθορίζει με τι προορίζεται να χρησιμοποιηθεί το πεντάλ (π.χ. ψηφιακό
        πιάνο, πληκτρολόγιο/συνθεσάιζερ, MIDI controller).
    compatible_pedal_type:
      name: Συμβατός τύπος πεντάλ
      description: Υποδεικνύει το στυλ ή το σύστημα πεντάλ στο οποίο έχει σχεδιαστεί
        ο ιμάντας ή το κλιπ (π.χ. πλατφόρμα, SPD, Look Keo).
    compatible_pin_type:
      name: Συμβατός τύπος πείρου
      description: Τύπος πείρων με τους οποίους έχει σχεδιαστεί να χρησιμοποιείται
        το υπόστρωμα (ή αν είναι κατάλληλο για στερέωση με πείρους).
    compatible_pipe_filter_size:
      name: Συμβατό μέγεθος φίλτρου σωλήνα
      description: Υποδεικνύει το μέγεθος ή τον τύπο φίλτρου που έχει σχεδιαστεί να
        δέχεται ο σωλήνας (ή αν δεν απαιτείται φίλτρο)
    compatible_plate_size:
      name: Συμβατό μέγεθος πλάκας
      description: Διαστάσεις ή τυποποιημένα μεγέθη βαλλιστικής πλάκας που μπορεί
        να δεχτεί το γιλέκο.
    compatible_play_vehicle_scale:
      name: Συμβατή κλίμακα οχήματος παιχνιδιού
      description: Υποδεικνύει την κλίμακα παιχνιδιού στην οποία έχει σχεδιαστεί να
        ταιριάζει το αξεσουάρ (π.χ. 1:64), βελτιώνοντας την εφαρμογή/συμβατότητα για
        συλλέκτες και συστήματα παρακολούθησης.
    compatible_playing_surface:
      name: Συμβατή επιφάνεια παιχνιδιού
      description: Υποδεικνύει τον τύπο αγωνιστικού γηπέδου ή επιφάνειας για τον οποίο
        έχουν σχεδιαστεί τα παπούτσια αμερικανικού ποδοσφαίρου.
    compatible_pole_dimensions:
      name: Συμβατές διαστάσεις στύλου
      description: Καθορίζει το μέγεθος της διατομής του στύλου στο οποίο ταιριάζει
        το εξάρτημα.
    compatible_pole_shape:
      name: Συμβατές διαστάσεις στύλου
      description: Καθορίζει το σχήμα της διατομής του στύλου ή της κολόνας για την
        οποία έχει σχεδιαστεί η προστατευτική επένδυση.
    compatible_power_steering_system:
      name: Συμβατό σύστημα συστήματος διεύθυνσης
      description: Υποδεικνύει τους τύπους συστημάτων διεύθυνσης για τους οποίους
        προορίζεται το υγρό.
    compatible_powerplant_type:
      name: Συμβατός τύπος κινητήρα
      description: Υποδεικνύει το σύστημα προώθησης του αεροβόλου BB για το οποίο
        προορίζεται το εξάρτημα (π.χ. ελατηρίου-εμβόλου, CO2, PCP).
    compatible_presser_foot:
      name: Συμβατό πεντάλ πίεσης
      description: Καθορίζει το σύστημα τοποθέτησης/συμβατότητας του πεντάλ πίεσης
        που υποστηρίζει η ραπτομηχανή (π.χ., κουμπωτό έναντι βιδωτού· χαμηλό/ψηλό/κυρτό
        στέλεχος). Χρησιμοποιήστε «Universal/Multiple» εάν υποστηρίζονται πολλαπλά
        συστήματα ή περιλαμβάνονται προσαρμογείς.
    compatible_protective_gear:
      name: Συμβατός προστατευτικός εξοπλισμός
      description: Καθορίζει με ποιον άλλο προστατευτικό εξοπλισμό έχει σχεδιαστεί
        να λειτουργεί το προστατευτικό αυχένα.
    compatible_protective_gear_integration:
      name: Συμβατή ενσωμάτωση προστατευτικού εξοπλισμού
      description: Περιγράφει τον τρόπο με τον οποίο προορίζεται να φοριέται ή να
        ενσωματώνεται το προστατευτικό με άλλον εξοπλισμό (π.χ. τοποθέτηση σε εσωτερική
        θήκη, αυτόνομο με ιμάντες).
    compatible_punching_bag_type:
      name: Συμβατός τύπος σάκου πυγμαχίας
      description: Καθορίζει με ποια στυλ σάκου μποξ ή σάκου προπόνησης είναι συμβατό
        το προϊόν.
    compatible_racing_discipline:
      name: Συμβατή αγωνιστική κατηγορία
      description: Οι κατηγορίες μηχανοκίνητου αθλητισμού για τις οποίες προορίζεται
        ή είναι πιστοποιημένο το κράνος.
    compatible_rc_scale:
      name: Συμβατή κλίμακα RC
      description: Υποδεικνύει την αναλογία κλίμακας RC (π.χ. 1:10) στην οποία έχει
        σχεδιαστεί να ταιριάζει το παρελκόμενο ή το εξάρτημα.
    compatible_recorder_size:
      name: Συμβατό μέγεθος συσκευής εγγραφής
      description: Καθορίζει τα μεγέθη φλογέρας για τα οποία έχει σχεδιαστεί η θήκη.
    compatible_recorder_type:
      name: Συμβατός τύπος συσκευής εγγραφής
      description: Καθορίζει τον τύπο/οικογένεια φλογέρας με την οποία είναι συμβατό
        το παρελκόμενο (π.χ. σοπράνο, άλτο).
    compatible_reed_cut:
      name: Συμβατή κοπή γλωττίδας
      description: Καθορίζει με ποιο στυλ κοπής γλωττίδας είναι συμβατός ο σφιγκτήρας
        (π.χ. λιμαρισμένο/γαλλική κοπή έναντι αλιμάριστου/αμερικανική κοπή).
    compatible_reed_type:
      name: Συμβατός τύπος γλωττίδας
      description: Καθορίζει τον τύπο/κοπή γλωττίδας για τον οποίο έχει σχεδιαστεί
        το επιστόμιο.
    compatible_reel_type:
      name: Συμβατός τύπος καρουλιού
      description: Καθορίζει τον τύπο μηχανισμού ψαρέματος για τον οποίο έχει σχεδιαστεί
        η τσάντα, η θήκη ή το κάλυμμα.
    compatible_refrigerant_type:
      name: Συμβατός τύπος ψυκτικού μέσου
      description: Υποδεικνύει με ποιο ψυκτικό μέσο προορίζεται να χρησιμοποιηθεί
        ο εξατμιστής AC.
    compatible_ride_equipment:
      name: Συμβατός εξοπλισμός ιππασίας
      description: Τύποι τροχήλατου αθλητικού εξοπλισμού για τους οποίους προορίζεται
        η ράμπα.
    compatible_roof_height:
      name: Συμβατό ύψος οροφής
      description: Υποδεικνύει για ποιο προφίλ οροφής έχει σχεδιαστεί το κάλυμμα (τυπική
        έναντι εκτεταμένης/ψηλής οροφής).
    compatible_roof_rail_type:
      name: Συμβατός τύπος ράγας οροφής
      description: Καθορίζει τη διαμόρφωση οροφής στην οποία έχει σχεδιαστεί να προσαρμόζεται
        το βασικό σύστημα rack.
    compatible_rope_count:
      name: Συμβατός αριθμός σχοινιών
      description: Καθορίζει τη διάταξη σχοινιών του ρινγκ πυγμαχίας για την οποία
        έχει σχεδιαστεί το εξάρτημα, όπως ρινγκ με 3 σχοινιά, 4 σχοινιά ή καθολική
        συμβατότητα.
    compatible_rope_type:
      name: Συμβατός τύπος σχοινιού
      description: Καθορίζει ποιες κατασκευές σχοινιών μπορούν να χρησιμοποιηθούν
        με τη συσκευή.
    compatible_saddle_type:
      name: Συμβατός τύπος σέλας
      description: Καθορίζει τον τύπο σέλας ή την ιππική χρήση για την οποία έχει
        σχεδιαστεί το εξάρτημα, εξασφαλίζοντας σωστή συμβατότητα μεταξύ αγγλικών,
        western και άλλων τύπων σελών.
    compatible_saxophone_size:
      name: Συμβατό μέγεθος σαξοφώνου
      description: Υποδεικνύει με ποιο μέγεθος σαξοφώνου είναι συμβατό το προϊόν (π.χ.
        σοπράνο, άλτο, τενόρο).
    compatible_saxophone_type:
      name: Συμβατός τύπος σαξοφώνου
      description: Καθορίζει με ποιο σαξόφωνο είναι σχεδιασμένος να ταιριάζει ο σφιγκτήρας
        ή το καπάκι επιστομίου.
    compatible_scale_length:
      name: Συμβατό μήκος κλίμακας
      description: Καθορίζει το εύρος μήκους κλίμακας κιθάρας για το οποίο προορίζονται
        οι χορδές (π.χ. μικρή κλίμακα, τυπική, βαρύτονος).
    compatible_seat_airbag:
      name: Συμβατός αερόσακος καθίσματος
      description: Υποδεικνύει αν το κάθισμα διαθέτει πλευρικούς αερόσακους ή είναι
        συμβατό με οχήματα εξοπλισμένα με αερόσακους τοποθετημένους στο κάθισμα.
    compatible_seating_capacity:
      name: Συμβατή χωρητικότητα καθισμάτων
      description: Καθορίζει τον αριθμό των καθισμάτων ή τη διαμόρφωση για την οποία
        έχει σχεδιαστεί το παρελκόμενο.
    compatible_sensor_port_type:
      name: Συμβατός τύπος θύρας αισθητήρα
      description: Καθορίζει εάν το κάρτερ λαδιού υποστηρίζεται από αισθητήρες στάθμης
        λαδιού ή/και θερμοκρασίας λαδιού και τον τύπο θύρας, εάν υπάρχει.
    compatible_shifter_type:
      name: Συμβατός τύπος λεβιέ ταχυτήτων
      description: Καθορίζει τον τύπο ή τη διαμόρφωση του λεβιέ ταχυτήτων για τον
        οποίο έχει σχεδιαστεί η φούσκα επιλογέα ταχυτήτων.
    compatible_shis:
      name: Συμβατό SHIS
      description: Καταγράφει τους κωδικούς του Standardized Headset Identification
        System (SHIS) με τους οποίους είναι συμβατό το εξάρτημα (π.χ. IS42, EC34,
        ZS44/28.6).
    compatible_skating_discipline:
      name: Συμβατή κατηγορία πατινάζ
      description: Υποδεικνύει τις κατηγορίες/μορφές πατινάζ για τις οποίες έχει σχεδιαστεί
        το εξάρτημα ή το αξεσουάρ.
    compatible_snowshoe_deck_type:
      name: Συμβατός τύπος επιφάνειας χιονοπέδιλου
      description: Καθορίζει τον τύπο σκελετού ή επιφάνειας χιονοπέδιλου με τον οποίο
        είναι συμβατό το δέσιμο.
    compatible_special_effects_lighting_features:
      name: Συμβατά χαρακτηριστικά φωτισμού ειδικών εφέ
      description: Αναδεικνύει κοινές λειτουργικές δυνατότητες που επηρεάζουν την
        επιλογή κατά την αγορά φωτιστικών εφέ (πέρα από χρώμα/μοτίβο), όπως η δυνατότητα
        σύνδεσης πολλών μονάδων ή η αντίδραση σε ήχο.
    compatible_spinning_wheel_drive_system:
      name: Συμβατό σύστημα κίνησης με περιστρεφόμενους τροχούς
      description: Καθορίζει ποιο σύστημα κίνησης περιστρεφόμενου τροχού υποστηρίζει
        το παρελκόμενο.
    compatible_spoke_gauge:
      name: Συμβατό πάχος ακτίνων
      description: Υποδεικνύει τα μεγέθη πάχους σύρματος ακτίνας με τα οποία ταιριάζει
        το σπείρωμα του στομίου, επιτρέποντας τη σωστή αντιστοίχιση ακτίνων και στομίων.
    compatible_steering_wheel_airbag:
      name: Συμβατός αερόσακος τιμονιού
      description: Υποδεικνύει αν το τιμόνι υποστηρίζει τη διατήρηση του εργοστασιακού
        (OEM) αερόσακου ή αν προορίζεται για εφαρμογές χωρίς αερόσακο.
    compatible_steering_wheel_control_button:
      name: Συμβατό κουμπί ελέγχου τιμονιού
      description: Υποδεικνύει συμβατότητα με τα εργοστασιακά χειριστήρια που είναι
        τοποθετημένα στο τιμόνι (ηχοσύστημα/σύστημα σταθερού ταξιδιού/τηλέφωνο) και
        τη σχετική καλωδίωση.
    compatible_stencil_material:
      name: Συμβατό υλικό στένσιλ
      description: Υλικά από τα οποία το μηχάνημα μπορεί να δημιουργήσει ή να επεξεργαστεί
        στένσιλ (π.χ. χαρτί, πλαστική μεμβράνη, mylar).
    compatible_stencil_media_format:
      name: Συμβατή μορφή υλικού στένσιλ
      description: 'Υποδεικνύει τους τύπους μορφής υλικού στένσιλ που υποστηρίζει
        το μηχάνημα: φύλλα, ρολά ή και τα δύο.'
    compatible_strap_retractor:
      name: Συμβατός μηχανισμός επαδίπλωσης ιμάντα
      description: Υποδεικνύει εάν ο ιμάντας είναι συμβατός με αναδιπλούμενα συστήματα
        ή έχει σχεδιαστεί για μη αναδιπλούμενες (στατικές) ζώνες.
    compatible_string_instrument_finish:
      name: Συμβατό φινίρισμα έγχορδου οργάνου
      description: Καθορίζει σε ποιους τύπους φινιρίσματος οργάνων είναι ασφαλές να
        χρησιμοποιηθεί το γυαλιστικό.
    compatible_substrate_material:
      name: Συμβατό υλικό υποστρώματος
      description: Το υλικό επιφάνειας έχει σχεδιαστεί για να προσκολλάται το χρώμα.
    compatible_surface:
      name: Συμβατή επιφάνεια
      description: Καθορίζει την επιφάνεια ή το υλικό στο οποίο προορίζεται να συγκολληθεί
        το αυτοκόλλητο hook-and-loop.
    compatible_surface_material:
      name: Συμβατό υλικό επιφάνειας
      description: Υλικά επιφανειών οχήματος στα οποία έχει σχεδιαστεί να χρησιμοποιείται
        το προϊόν.
    compatible_tear_off_system:
      name: Συμβατό σύστημα tear-off
      description: Υποδεικνύει αν τα γυαλιά υποστηρίζουν συστήματα tear-off ή/και
        roll-off, συμπεριλαμβανομένου του αν διαθέτουν σημεία στήριξης για την τοποθέτηση
        tear-off.
    compatible_thermostat_type:
      name: Συμβατός τύπος θερμοστάτη
      description: Αν ο αυχένας/περίβλημα νερού έχει σχεδιαστεί να δέχεται θερμοστάτη
        και, εφόσον ισχύει, τι τύπο/μέγεθος θερμοστάτη υποστηρίζει.
    compatible_thread:
      name: Συμβατό νήμα
      description: Υποδεικνύει τους τύπους νήματος/κλωστής που έχει σχεδιαστεί να
        χειρίζεται το εργαλείο περάσματος, με βάση το πάχος ή τον τύπο τους.
    compatible_thread_spool_format:
      name: Συμβατή μορφή νήματος/καρουλιού
      description: Υποδεικνύει τις μορφές νήματος που έχει σχεδιαστεί να αποθηκεύει
        το κουτί (καρούλια, μασούρια, καρούλια κεντήματος/κάρτες, κώνους κ.λπ.).
    compatible_thread_yarn_tool:
      name: Συμβατό εργαλείο κλωστής και νήματος
      description: Συμβατότητα μηχανής/συστήματος για εργαλεία που τοποθετούνται σε
        ή χρησιμοποιούνται με άλλο εξοπλισμό (π.χ. ραπτομηχανή, serger/overlocker,
        αργαλειός, ανέμη).
    compatible_tire_application:
      name: Συμβατή εφαρμογή ελαστικών
      description: Υποδεικνύει το τμήμα εφαρμογής ελαστικού/τροχού για το οποίο έχει
        σχεδιαστεί ο αποζευκτήρας στεφάνης, με βάση το ελαστικό/τροχό που εξυπηρετείται
        και όχι το μοντέλο του οχήματος.
    compatible_tom_pad_mounting:
      name: Συμβατή βάση/σύστημα τοποθέτησης ταμπούρου tom
      description: Καθορίζει σε τι τοποθετείται το ηλεκτρονικό tom-tom (π.χ. βάση
        σύσφιξης/ράβδου, ράβδος L, βάση στήριξης), επηρεάζοντας τη συμβατότητα με
        υπάρχοντα συστήματα στήριξης.
    compatible_toy_vehicle_scale:
      name: Συμβατή κλίμακα οχήματος παιχνιδιού
      description: Υποδεικνύει την κλίμακα του παιχνιδιού-οχήματος ή το κατά προσέγγιση
        μέγεθος οχήματος με το οποίο είναι συμβατό το σετ παιχνιδιού.
    compatible_tpms_sensor_type:
      name: Συμβατός τύπος αισθητήρα TPMS
      description: Καθορίζει εάν ο τροχός υποστηρίζεται από αισθητήρες TPMS ή/και
        οποιονδήποτε απαιτούμενο τύπο βαλβίδας/αισθητήρα.
    compatible_training_equipment:
      name: Συμβατός εξοπλισμός εκπαίδευσης
      description: Παραθέτει τους τύπους εξοπλισμού προπόνησης ή γυμναστικής που μπορούν
        να προσαρτηθούν στη βάση.
    compatible_treadmill_design:
      name: Συμβατός σχεδιασμός διαδρόμου
      description: Καθορίζει τον σχεδιασμό του διαδρόμου με τον οποίο είναι συμβατό
        το αξεσουάρ, όπως πτυσσόμενα ή μη πτυσσόμενα μοντέλα.
    compatible_tube:
      name: Συμβατός σωλήνας
      description: Υποδεικνύει τον τύπο εσωτερικού σωλήνα ή κατασκευής ελαστικού για
        τον οποίο έχει σχεδιαστεί το μπάλωμα, όπως βουτυλίου, λάτεξ, TPU ή tubeless.
    compatible_valve_type:
      name: Συμβατός τύπος βαλβίδας
      description: Καθορίζει με ποιον τύπο ορειχάλκινης βαλβίδας είναι συμβατό το
        λιπαντικό.
    compatible_vaporizing_material:
      name: Συμβατό υλικό εξάτμισης
      description: Υποδεικνύει τους τύπους υλικών για τους οποίους έχει σχεδιαστεί
        η συσκευή για εξάτμιση.
    compatible_vehicle_windshield_fluid:
      name: Συμβατό υγρό παρμπρίζ οχήματος
      description: Ισχυρισμοί συμβατότητας που σχετίζονται με τον εξοπλισμό οχήματος
        ή επεξεργασίες γυαλιού (π.χ. ασφαλές για υδροαπωθητικές επιστρώσεις, ασφαλές
        για συστήματα καθαρισμού προβολέων).
    compatible_visor_system:
      name: Συμβατό σύστημα προσωπίδας
      description: Υποδεικνύει με ποια συστήματα ζελατίνας/εσωτερικών ενθεμάτων είναι
        συμβατό το κράνος μοτοσικλέτας.
    compatible_water_board_type:
      name: Συμβατός τύπος σανίδας νερού
      description: Για τη μεταφορά ποιων τύπων σανίδων θαλάσσιων σπορ προορίζεται
        το rack
    compatible_water_sport_board_type:
      name: Συμβατός τύπος σανίδας θαλάσσιων σπορ
      description: Παραθέτει τους τύπους σανίδων για τη μεταφορά των οποίων έχει σχεδιαστεί
        το rack
    compatible_watercraft_communication_standard:
      name: Συμβατό πρότυπο επικοινωνίας για σκάφη
      description: Καθορίζει τα υποστηριζόμενα ναυτιλιακά πρότυπα επικοινωνίας/δικτύου
        ή πρωτόκολλα ενσωμάτωσης για διαλειτουργικότητα με τα ηλεκτρονικά του σκάφους.
    compatible_watercraft_engine_type:
      name: Συμβατός τύπος κινητήρα σκάφους
      description: Υποδεικνύει τη στοχευμένη διαμόρφωση συστήματος πρόωσης για την
        οποία ταιριάζει το εξάρτημα (εξωλέμβιος, εσωλέμβιος, sterndrive ή jet drive).
    compatible_weight_plate_diameter:
      name: Συμβατή διάμετρος πλάκας βάρους
      description: Καθορίζει ποιες διαμέτρους πλάκας βάρους δέχεται το μηχάνημα.
    compatible_wheel_finish:
      name: Συμβατό φινίρισμα τροχού
      description: Καθορίζει τα φινιρίσματα/υλικά των τροχών στα οποία είναι ασφαλές
        να χρησιμοποιηθεί το καθαριστικό (όπως ισχυρίζεται ο κατασκευαστής).
    compatible_whorl_drive_band_type:
      name: Συμβατός τύπος ιμάντα κίνησης σπείρας
      description: Καθορίζει με ποιο στυλ ιμάντα κίνησης προορίζεται να λειτουργήσει
        το σπείρωμα.
    compatible_wick_series:
      name: Συμβατή σειρά φιτιλιών
      description: Υποδεικνύει τις συνήθεις σειρές/τύπους φιτιλιού για τους οποίους
        έχει σχεδιαστεί η καρτέλα (ονομασία κλάδου), εάν καθορίζεται από τον πωλητή.
    compatible_winder_head_bit:
      name: Συμβατή κεφαλή/μύτη περιέλιξης
      description: Καθορίζει τον τύπο διεπαφής κλειδιού/κεφαλής περιέλιξης που υποστηρίζει
        ο τυλίκτης (π.χ. σχιστή κεφαλή, εναλλάξιμες μύτες, καθολική κεφαλή).
    compatible_windlass_rode:
      name: Συμβατό σκοινί βαρούλκου
      description: Καθορίζει τον τύπο της άγκυρας που για τον χειρισμό του οποίου
        έχει σχεδιαστεί το βαρούλκο.
    compatible_windshield_type:
      name: Συμβατός τύπος παρμπρίζ
      description: Καθορίζει με ποιο παρμπρίζ έχει σχεδιαστεί να λειτουργεί το περίβλημα.
    compatible_wood:
      name: Συμβατό ξύλο
      description: Καθορίζει για ποιους τύπους ξύλου ταστιέρας συνιστάται/είναι ασφαλές
        το γυαλιστικό.
    compatible_writing_surface:
      name: Συμβατή επιφάνεια γραφής
      description: Καθορίζει τις επιφάνειες/χαρτιά στα οποία το μελάνι προορίζεται
        να λειτουργεί καλύτερα.
    compatible_zipper_size:
      name: Συμβατό μέγεθος φερμουάρ
      description: 'Υποδεικνύει το μέγεθος φερμουάρ για το οποίο έχει σχεδιαστεί το
        εξάρτημα έλξης, συνήθως εκφρασμένο ως #3, #5, #8, #10 κ.λπ., βελτιώνοντας
        το φιλτράρισμα συμβατότητας.'
    compliance_certification:
      name: Πιστοποιήσεις συμμόρφωσης
      description: Πρότυπα συμμόρφωσης/έγκρισης που πληροί η φωτεινή μπάρα για χρήση
        στον δρόμο και ηλεκτρομαγνητική συμβατότητα.
    component_position:
      name: Θέση εξαρτήματος
      description: Καθορίζει τη σχετική θέση του εξαρτήματος μέσα στο συγκρότημα χρονισμού
        κινητήρα (π.χ., μπροστινό έναντι πίσω καλύμματος, άνω έναντι κάτω καλύμματος).
        Όχι την τοποθέτηση του οχήματος μπροστά/πίσω.
    concentration_level:
      name: Επίπεδο συγκέντρωσης
      description: Ποιοτική ένδειξη του βαθμού συμπύκνωσης του πελτέ ντομάτας (μονός,
        διπλός, τριπλός), χρήσιμη για την αντιστοίχιση των απαιτήσεων της συνταγής.
    concentration_type:
      name: Τύπος συγκέντρωσης
      description: Υποδεικνύει εάν το προϊόν είναι έτοιμο προς χρήση ή σε συμπυκνωμένη
        μορφή και (εάν πρόκειται για συμπυκνωμένη μορφή) τις τυπικές οδηγίες αραίωσης.
    concert_bass_drum_mounting_stand_type:
      name: Τύπος βάσης στήριξης για μπάσο τύμπανο συναυλίας
      description: Πώς στηρίζεται ή τοποθετείται το μπάσο τύμπανο συναυλίας για την
        απόδοση.
    concert_pitch_standard:
      name: Πρότυπο τονικού ύψους συναυλίας
      description: Καθορίζει το πρότυπο αναφοράς τονικού ύψους συναυλίας (A4) στο
        οποίο είναι κουρδισμένο το πιάνο κατά την πώληση (π.χ. A440, A442, A444).
    condiment_form:
      name: Μορφή καρυκεύματος
      description: Υποδεικνύει τη φυσική μορφή ή την υφή του προϊόντος horseradish
        (π.χ. πάστα, σκόνη, κρέμα).
    condiment_texture:
      name: Υφή καρυκεύματος
      description: Περιγράφει τη φυσική υφή του relish ή του chutney (π.χ. με κομμάτια,
        λεία).
    confetti_format:
      name: Μορφή κομφετί
      description: Καθορίζει τη μορφή του προϊόντος κομφετί με βάση τον τρόπο συσκευασίας
        ή εκτόξευσης (π.χ. χύμα ρίψης έναντι poppers/κανόνια).
    conga_head_tensioning_system:
      name: Σύστημα τάνυσης κεφαλής Conga
      description: Τύπος υλικού εξοπλισμού που χρησιμοποιείται για την τάνυση/συντονισμό
        της κεφαλής conga (π.χ. παραδοσιακός συντονισμός γλωττίδων έναντι σύγχρονου
        μηχανισμού γρήγορης ρύθμισης).
    conga_set_included_drum_types:
      name: Σετ Conga που περιλαμβάνει τύπους τυμπάνων
      description: Ποιοι τύποι conga περιλαμβάνονται σε ένα σετ conga (π.χ. quinto
        + conga + tumba).
    connector_case_style:
      name: Τύπος/στυλ θήκης συνδέσμου
      description: Ταξινομεί το συνολικό στυλ κατασκευής της θήκης συνδέσμου (π.χ.
        σκληρό κέλυφος έναντι μαλακής θήκης) ώστε να αντικατοπτρίζει το επίπεδο προστασίας
        και τη φορητότητα.
    console_cover_installation_method:
      name: Μέθοδος εγκατάστασης καλύμματος κονσόλας
      description: Καθορίζει τον τρόπο με τον οποίο το κάλυμμα της κονσόλας στερεώνεται
        στην κονσόλα/μπράτσο (π.χ., slip-on, ελαστικοί ιμάντες, hook & loop, αυτοκόλλητο,
        clip-on).
    console_display_type:
      name: Τύπος οθόνης κονσόλας
      description: Προσδιορίζει το στυλ της οθόνης χρήστη που παρέχεται στο μηχάνημα
        (π.χ. LCD, LED, οθόνη αφής).
    construction_design:
      name: Σχέδιο κατασκευής
      description: Υποδεικνύει από πόσα αρθρωτά τμήματα αποτελείται το προστατευτικό,
        επηρεάζοντας την ευκινησία (π.χ. 1 κομμάτι έναντι 3).
    contact_angle:
      name: Γωνία επαφής
      description: Καθορίζει τη γωνία επαφής των δακτυλίων ρουλεμάν, εκφρασμένη ως
        μία μόνο γωνία ή ως ένα ζευγοποιημένο σύνολο γωνιών (π.χ., 36°/45°).
    contact_juggling_ball_fill_type:
      name: Τύπος γεμίσματος μπάλας ζογκλερικών επαφής
      description: Προσδιορίζει εάν η μπάλα είναι συμπαγής ή με γέμισμα (και αν ισχύει,
        τι είδους γέμισμα), γεγονός που επηρεάζει τη διαφορά βάρους και την ανθεκτικότητα.
    contact_juggling_ball_transparency:
      name: Διαφάνεια μπάλας ζογκλερικών με επαφή
      description: Καθορίζει τη διαφάνεια/οπτική εμφάνιση της μπάλας.
    contact_surface_material:
      name: Υλικό επιφάνειας επαφής
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στα σημεία επαφής που
        αγγίζουν το όργανο (π.χ. φελλός/λάστιχο) για την αποφυγή γρατσουνιών και τη
        βελτίωση της πρόσφυσης.
    container_material:
      name: Υλικό δοχείου
      description: Καθορίζει το κύριο υλικό του δοχείου λιανικής πώλησης του προϊόντος
        (π.χ. γυαλί, πλαστικό PET, αλουμίνιο).
    contaminant_removal:
      name: Αφαίρεση ρύπων
      description: Παραθέτει τις κατηγορίες ρύπων για τις οποίες το προϊόν είναι πιστοποιημένο
        ότι αφαιρεί ή μειώνει.
    contra_alto_clarinet_body_configuration:
      name: Διαμόρφωση σώματος κόντρα-άλτο κλαρινέτου
      description: Περιγράφει τη φυσική μορφή/σχεδίαση του κόντρα-άλτο κλαρινέτου
        (π.χ. ίσιο έναντι αναδιπλούμενου σχεδιασμού).
    contra_alto_clarinet_lowest_note_extension:
      name: Επέκταση χαμηλότερης νότας κόντρα-άλτο κλαρινέτου
      description: Καθορίζει την επέκταση της χαμηλότερης εκτελέσιμης νότας του οργάνου
        (τη χαμηλότερη νότα που επιτρέπει ο μηχανισμός κλειδιών), και χρησιμοποιείται
        συνήθως για τη διάκριση μοντέλων χαμηλού E♭, χαμηλού D ή χαμηλού C.
    contra_bass_clarinet_bell_type:
      name: Τύπος καμπάνας κόντρα-μπάσου κλαρινέτου
      description: Διαμόρφωση καμπάνας που χρησιμοποιείται στο κλαρινέτο κοντρα-μπάσο.
    contra_bass_clarinet_bore_type:
      name: Τύπος οπής κόντρα-μπάσου κλαρινέτου
      description: Σχεδιασμός οπής του οργάνου.
    contra_bass_clarinet_lowest_written_note:
      name: Χαμηλότερη γραπτή νότα κόντρα-μπάσου κλαρινέτου
      description: Η χαμηλότερη γραπτή νότα που μπορεί να παίξει το όργανο (συχνά
        εξαρτάται από την επέκταση χαμηλού C ή χαμηλού E♭).
    control_arm_bushing_material:
      name: Υλικό δακτυλίου βραχίονα ελέγχου
      description: Καθορίζει το υλικό των συμπεριλαμβανόμενων/εγκατεστημένων δακτυλίων,
        εάν υπάρχουν.
    control_arm_bushings_included:
      name: Περιλαμβάνονται δακτύλιοι βραχίονα ελέγχου
      description: Υποδεικνύει αν ο βραχίονας ελέγχου παρέχεται με προεγκατεστημένους
        δακτυλίους.
    control_arm_finish:
      name: Φινίρισμα βραχίονα ελέγχου
      description: Καθορίζει την προστατευτική επίστρωση που εφαρμόζεται στον βραχίονα
        ελέγχου (προστασία από διάβρωση και αισθητική εμφάνιση).
    control_arm_grease_fitting_type:
      name: Τύπος γρασαδόρου (λιπαντικού ρακόρ) του βραχίονα ελέγχου
      description: Καθορίζει αν η διάταξη του βραχίονα ελέγχου/σφαιρικής άρθρωσης
        περιλαμβάνει γρασαδόρο (zerk) και αν είναι επισκευάσιμη.
    control_arm_material:
      name: Υλικό βραχίονα ελέγχου
      description: Καθορίζει το κύριο υλικό και τον τρόπο κατασκευής του σώματος του
        βραχίονα ελέγχου.
    control_arm_position:
      name: Θέση βραχίονα ελέγχου
      description: Καθορίζει τη θέση της ανάρτησης για την οποία έχει σχεδιαστεί ο
        βραχίονας ελέγχου στο πλαίσιο της γωνίας/πλευράς του άξονα (π.χ. άνω/κάτω,
        εμπρός/πίσω, αριστερή/δεξιά).
    control_arm_style:
      name: Στυλ βραχίονα ελέγχου
      description: Προσδιορίζει το γεωμετρικό/σχεδιαστικό στυλ του βραχίονα ελέγχου
        που χρησιμοποιείται στη διάταξη της ανάρτησης.
    control_cable_connector_type:
      name: Τύπος συνδέσμου καλωδίου ελέγχου
      description: Καθορίζει τον τύπο άκρου/συνδέσμου που χρησιμοποιείται από τα καλώδια
        ελέγχου για τη διασύνδεση με τον μηχανισμό ελέγχου και τον κινητήρα (π.χ.
        εξαρτήματα άκρου ειδικά για OEM).
    control_voltage_or_gate_connectivity:
      name: Τάση ελέγχου ή συνδεσιμότητα πύλης
      description: Καθορίζει την υποστήριξη σύνδεσης τάσης ελέγχου / θύρας για ενσωμάτωση
        με αρθρωτό / αναλογικό εξοπλισμό.
    controller_function:
      name: Λειτουργία διάταξης ελέγχου
      description: Ορίζει τον κύριο ρόλο της πλακέτας ελέγχου του διαδρόμου, όπως
        έλεγχος μοτέρ, τροφοδοσία ή μονάδα μετατροπέα.
    controller_type:
      name: Τύπος διάταξης ελέγχου
      description: Καθορίζει τον ελεγκτή κινητήρα/σύστημα ελέγχου που περιλαμβάνεται
        στο κιτ μετατροπής ηλεκτρικού σκούτερ (ή απαιτείται για τη χρήση του), με
        έμφαση στα χαρακτηριστικά του ελεγκτή που σχετίζονται με τη συμβατότητα και
        την απόδοση.
    conversion_kit_cooling_method:
      name: Μέθοδος ψύξης κιτ μετατροπής
      description: Πρωτογενής προσέγγιση θερμικής διαχείρισης που χρησιμοποιείται
        για την ενσωμάτωση μοτέρ/μετατροπέα/μπαταρίας.
    conversion_kit_installation_complexity:
      name: Πολυπλοκότητα εγκατάστασης κιτ μετατροπής
      description: Αναμενόμενο επίπεδο προσπάθειας εγκατάστασης με βάση την τυπική
        δεξιότητα του πελάτη/απαιτούμενα εργαλεία.
    converted_bed_size:
      name: Μέγεθος μετατρεπόμενου κρεβατιού
      description: Υποδεικνύει το μέγεθος ή τη διαμόρφωση του κρεβατιού στο οποίο
        θα μετατραπεί η κούνια όταν εγκατασταθεί αυτό το κιτ.
    convertible_configuration:
      name: Διαμορφώσιμη διάταξη
      description: Υποδεικνύει σε πόσες διαφορετικές διαμορφώσεις κρεβατιού μετατρέπεται
        το προϊόν (π.χ. κούνια 3 σε 1 → παιδικό κρεβάτι → ανάκλινδρο).
    convertible_high_chair_modes:
      name: Λειτουργίες/τρόποι μετατροπής παιδικού καθίσματος φαγητού
      description: Καθορίζει τις διαμορφώσεις καθισμάτων στις οποίες μπορεί να μετατραπεί
        η καρέκλα.
    cookie_decorating_kit_items_included:
      name: Περιεχόμενα που περιλαμβάνονται στο κιτ διακόσμησης μπισκότων
      description: Καταγράφει τα επιμέρους διακοσμητικά στοιχεία που περιλαμβάνονται,
        ώστε οι πελάτες να γνωρίζουν ακριβώς ποια υλικά περιέχονται στη συσκευασία
        (π.χ. σωληνάρια γλάσου, τρούφες/ζαχαρωτά, κουπ πατ μπισκότων).
    cookie_variety:
      name: Ποικιλία μπισκότων
      description: Προσδιορίζει το συγκεκριμένο στυλ ή ποικιλία μπισκότων, βοηθώντας
        τους αγοραστές να βρουν γρήγορα τον προτιμώμενο τύπο τους.
    cooking_state:
      name: Κατάσταση μαγειρέματος
      description: Υποδεικνύει το επίπεδο ετοιμότητας του προϊόντος κοτόπουλου κατά
        την πώληση (ωμό, πλήρως μαγειρεμένο, μαριναρισμένο κ.λπ.).
    coolant_additive_purpose:
      name: Σκοπός πρόσθετου ψυκτικού μέσου
      description: Κύριες προβλεπόμενες λειτουργίες του πρόσθετου ψυκτικού υγρού (όχι
        έκπλυση ψυγείου ή ειδικό στεγανοποιητικό προϊόν).
    coolant_base_fluid:
      name: Βασικό υγρό ψυκτικού
      description: Προσδιορίζει την κύρια βάση γλυκόλης που χρησιμοποιείται στη σύνθεση
        αντιψυκτικού/ψυκτικού.
    coolant_outlet_connection_style:
      name: Στυλ σύνδεσης εξόδου ψυκτικού υγρού
      description: Ο τύπος/στυλ διεπαφής σύνδεσης εξόδου που χρησιμοποιείται για τη
        σύνδεση σωλήνα ψυγείου ή γραμμής ψυκτικού υγρού.
    coolant_outlet_neck_angle:
      name: Γωνία αυχένα εξόδου ψυκτικού υγρού
      description: Η γωνία/προσανατολισμός της εξόδου του λαιμού νερού σε σχέση με
        τη βάση στερέωσης/τον κινητήρα (χρήσιμος για τη δρομολόγηση του άνω σωλήνα
        του ψυγείου).
    coolant_technology:
      name: Τεχνολογία ψυκτικού υγρού
      description: Καθορίζει τη χημεία/τεχνολογική κατηγορία του ψυκτικού υγρού (αντιψυκτικού),
        όπως αναγράφεται συνήθως στη συσκευασία.
    coolant_temperature_sensor_port:
      name: Θύρα αισθητήρα θερμοκρασίας ψυκτικού υγρού
      description: Εάν ο αυχένας νερού περιλαμβάνει θύρα για αισθητήρα ή διακόπτη
        θερμοκρασίας ψυκτικού και ποια διεπαφή χρησιμοποιεί.
    coolant_temperature_sensor_seal_type:
      name: Τύπος στεγανοποίησης του αισθητήρα θερμοκρασίας ψυκτικού υγρού
      description: Τύπος μεθόδου στεγανοποίησης που χρησιμοποιείται μεταξύ του αισθητήρα
        και της διόδου κινητήρα/ψυκτικού.
    cooling_system_component_included:
      name: Περιλαμβάνεται εξάρτημα συστήματος ψύξης
      description: Παραθέτει πρόσθετα εξαρτήματα συστήματος ψύξης που περιλαμβάνονται
        στην αντλία νερού.
    cooling_system_flush_application_step:
      name: Βήμα εφαρμογής έκπλυσης συστήματος ψύξης
      description: Υποδεικνύει πού εντάσσεται το προϊόν στη διαδικασία σέρβις (π.χ.,
        καθαριστικό προ-έκπλυσης έναντι τελικής έκπλυσης/ουδετεροποιητή).
    cooling_system_type:
      name: Τύπος συστήματος ψύξης
      description: Καθορίζει τη διαμόρφωση του συστήματος ψύξης που χρησιμοποιείται
        από έναν ενδοκάρβιο θαλάσσιο κινητήρα (π.χ. ανοιχτού κυκλώματος με θαλασσινό
        νερό, κλειστού κυκλώματος με γλυκό νερό και εναλλάκτη θερμότητας, ψύξη μέσω
        καρίνας).
    cord_material:
      name: Υλικό νήματος
      description: Καθορίζει το υλικό του κορδονιού/νήματος που χρησιμοποιείται για
        το τράβηγμα του καθαριστικού σφουγγαριού μέσα από το σαξόφωνο.
    core_type_bass_strings:
      name: Τύπος πυρήνα (χορδές μπάσου)
      description: Καθορίζει το σχήμα του πυρήνα της χορδής, το οποίο επηρεάζει την
        αίσθηση και την ευκαμψία.
    cork_grease_base_material:
      name: Βασικό υλικό του λιπαντικού φελλού
      description: Κύρια βάση της σύνθεσης του λιπαντικού φελλού (π.χ. βάση λανολίνης).
    cork_grease_form:
      name: Μορφή λιπαντικού φελλού
      description: Ο φυσικός παράγοντας μορφής του προϊόντος γράσου φελλού.
    corn_presentation:
      name: Παρουσίαση καλαμποκιού
      description: Καθορίζει τη φυσική παρουσίαση ή τη μορφή του προϊόντος καλαμποκιού
        (π.χ., ολόκληρο σε φλοιό, κόκκους, σκόνη).
    corn_syrup_variety:
      name: Ποικιλία σιροπιού καλαμποκιού
      description: Καθορίζει το συγκεκριμένο στυλ ή την παραλλαγή επεξεργασίας του
        σιροπιού.
    corn_variety:
      name: Ποικιλία καλαμποκιού
      description: Προσδιορίζει τη συγκεκριμένη βοτανική ή εμπορική ποικιλία καλαμποκιού
        που πωλείται, επιτρέποντας στους καταναλωτές να διακρίνουν μεταξύ τύπων που
        διαφέρουν στη γεύση, την υφή, το χρώμα και τη μαγειρική χρήση.
    corner_compatibility:
      name: Συμβατότητα γωνίας
      description: Καθορίζει το σχήμα των γωνιών του τραπεζιού (τετράγωνες ή στρογγυλές)
        για το οποίο έχει σχεδιαστεί το κάλυμμα.
    corner_flag_features:
      name: Χαρακτηριστικά της γωνιακής σημαίας
      description: Επισημαίνει ειδικά λειτουργικά χαρακτηριστικά ή βελτιώσεις της
        γωνιακής σημαίας (π.χ. πτυσσόμενος ιστός, ανακλαστικό υλικό).
    cornet_mouthpiece_shank_type:
      name: Τύπος στελέχους επιστομίου κορνέτας
      description: Καθορίζει το πρότυπο δέκτη/στελέχους επιστομίου που υποστηρίζεται
        από την κορνέτα για συμβατότητα.
    cornhole_league_certification:
      name: Πιστοποίηση για χρήση σε επίσημες διοργανώσεις cornhole
      description: Υποδεικνύει επίσημες πιστοποιήσεις ή εγκρίσεις από διοργανώσεις
        που πληροί το προϊόν.
    corrosion_resistance:
      name: Ανθεκτικό στη διάβρωση
      description: Καθορίζει την επεξεργασία ή την αξιολόγηση αντοχής στη διάβρωση
        της βάσης/υποδοχής για χρήση σε εξωτερικό περιβάλλον.
    corrosion_resistance_level:
      name: Επίπεδο αντοχής στη διάβρωση
      description: Υποδεικνύει προστασία από τη διάβρωση που είναι κατάλληλη για περιβάλλοντα
        γλυκού/αλμυρού νερού.
    costume_components_included:
      name: Περιλαμβάνονται στοιχεία στολής
      description: Παραθέτει τα κομμάτια ενδύματος και αξεσουάρ που περιλαμβάνονται
        στη στολή, διευκρινίζοντας τι αποτελεί μέρος του σετ.
    cotton_weave_type:
      name: Τύπος ύφανσης βαμβακιού
      description: Περιγράφει την κατασκευή ύφανσης/πλέξης της εκτυπώσιμης βαμβακερής
        επιφάνειας που επηρεάζει την υφή και την ευκρίνεια της εκτύπωσης.
    counter_type:
      name: Τύπος πάγκου εργασίας
      description: Υποδεικνύει την ύπαρξη και το στυλ ενσωματωμένης επανάληψης ή παρακολούθησης
        ισχύος.
    counterweight_fill_material:
      name: Υλικό πλήρωσης αντίβαρου
      description: Υποδεικνύει την ουσία που μπορεί να χρησιμοποιηθεί για την προσθήκη
        έρματος ή την προπλήρωση του αντίβαρου.
    counterweight_type:
      name: Τύπος αντίβαρου
      description: Καθορίζει το στυλ σχεδιασμού ή κατασκευής του αντίβαρου, όπως σακί
        με άμμο ή χαλύβδινη πλάκα, για να βοηθήσει στη συμβατότητα και την εγκατάσταση.
    coupler_system:
      name: Σύστημα σύζευξης
      description: Τύπος/σύστημα ζεύξης που τοποθετείται στο μοντέλο ατμομηχανής για
        συμβατότητα με το υλικό κύλισης.
    court_surface_suitability:
      name: Καταλληλότητα επιφάνειας γηπέδου
      description: Υποδεικνύει τον τύπο επιφάνειας γηπέδου μπάσκετ για τον οποίο έχει
        σχεδιαστεί η εξωτερική σόλα του παπουτσιού, βοηθώντας τους αγοραστές να επιλέξουν
        τη σωστή πρόσφυση και αντοχή για ξύλινα εσωτερικά γήπεδα, εξωτερική άσφαλτο/σκυρόδεμα
        ή και τα δύο.
    cover_fit_style:
      name: Τύπος εφαρμογής καλύμματος
      description: Περιγράφει πώς το κάλυμμα εφαρμόζει πάνω στο τραπέζι, επηρεάζοντας
        την εμφάνιση και το επίπεδο προστασίας.
    cover_fit_type:
      name: Τύπος εφαρμογής καλύμματος
      description: Υποδεικνύει εάν το κάλυμμα είναι κατά παραγγελία (προσαρμοσμένο/ημι-προσαρμοσμένο)
        ή καθολικό, και εάν προορίζεται για πρόσδεση στο νερό ή για αποθήκευση/χρήση
        με ρυμουλκούμενο.
    cowbell_beater_type:
      name: Τύπος στελέχους κρούσης κουδούνας αγελάδας
      description: Συνιστώμενος τύπος εργαλείου κρούσης για τον ήχο/φινίρισμα της
        κουδούνας αγελάδας (εάν καθορίζεται από το προϊόν).
    cowbell_mounting_method:
      name: Μέθοδος στήριξης κουδούνας αγελάδας
      description: Πώς προορίζεται να τοποθετηθεί/χρησιμοποιηθεί η κουδούνα αγελάδας
        (χειρός έναντι τοποθέτησης σε υλικό εξοπλισμό).
    cowbell_sound_character:
      name: Ηχητικός χαρακτήρας κουδούνας αγελάδας
      description: Γενικός τονικός χαρακτήρας που χρησιμοποιείται στις καταχωρίσεις
        (υποστηρίζει αναζήτηση πέρα από το μέγεθος).
    cradle_capacity:
      name: Χωρητικότητα κούνιας
      description: Υποδεικνύει εάν η κούνια έχει σχεδιαστεί για να φιλοξενεί ένα μόνο
        βρέφος ή δίδυμα.
    craft_cutter_embosser_machine_operation:
      name: Λειτουργία μηχανής κοπής/ανάγλυφης αποτύπωσης χειροτεχνίας
      description: Καθορίζει τον τρόπο λειτουργίας της μηχανής κοπής/ανάγλυφης αποτύπωσης
        από την οπτική της χρήσης (ροή εργασίας του χρήστη), π.χ. χειροκίνητη μανιβέλα,
        ηλεκτρική με κουμπί ή ελεγχόμενη μέσω εφαρμογής.
    craft_decoration_maker_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για τη συσκευή κατασκευής διακοσμητικών χειροτεχνίας.
      description: Παραθέτει τα βασικά αξεσουάρ που περιλαμβάνονται στη συσκευή κατασκευής
        διακοσμητικών χειροτεχνίας (π.χ. ταινία/φιλμ εκκίνησης, ανταλλακτικά αυτοκόλλητα,
        κασέτες γκλίτερ, εργαλεία καθαρισμού).
    craft_foil_application_method:
      name: Μέθοδος εφαρμογής φύλλου για χειροτεχνίες
      description: Προσδιορίζει τον τρόπο εφαρμογής/ενεργοποίησης του φύλλου για χειροτεχνίες
        (κόλλα, θερμότητα, toner/αντιδραστικό μέσο κ.λπ.).
    craft_foil_format:
      name: Μορφή φύλλου για χειροτεχνίες
      description: Υποδεικνύει τη φυσική μορφή του φύλλου χειροτεχνιών όπως πωλείται
        (π.χ., ρολό έναντι φύλλων).
    craft_glue_finish:
      name: Φινίρισμα με κόλλα χειροτεχνίας
      description: Περιγράφει την εμφάνιση της κόλλας μετά το στέγνωμα (π.χ., διαφανής,
        λευκή/αδιαφανής, ημιδιαφανής, γυαλιστερή/ματ).
    craft_magnet_application:
      name: Εφαρμογή μαγνήτη χειροτεχνίας
      description: Κύρια προβλεπόμενη χρήση χειροτεχνίας ή επιφάνεια τοποθέτησης για
        το προϊόν μαγνήτη.
    craft_magnet_holding_strength_level:
      name: Επίπεδο ισχύος συγκράτησης μαγνήτη χειροτεχνίας
      description: Σχετική κατηγορία ισχύος για μαγνήτες χειροτεχνίας, ώστε να βοηθά
        τους αγοραστές να επιλέγουν την κατάλληλη δύναμη συγκράτησης για το έργο τους.
    craft_organizer_storage_features:
      name: Χαρακτηριστικά αποθήκευσης διάταξης οργάνωσης χειροτεχνίας
      description: Περιγράφει τα χαρακτηριστικά οργάνωσης και τα εσωτερικά στοιχεία
        αποθήκευσης των διατάξεων οργάνωσης χειροτεχνίας (π.χ. ρυθμιζόμενα διαχωριστικά,
        συρτάρια, διαφανείς θήκες).
    craft_scoring_board_included_accessories:
      name: Πίνακας βαθμολόγησης χειροτεχνίας που περιλαμβάνει αξεσουάρ
      description: Αξεσουάρ που περιλαμβάνονται στον πίνακα βαθμολόγησης (π.χ. γραφίδα
        βαθμολόγησης/κόκκαλο βιβλιοδεσίας, τρίγωνο, εργαλείο φακέλων).
    craft_scoring_board_measurement_system:
      name: Σύστημα μέτρησης πίνακα βαθμολόγησης χειροτεχνίας
      description: Καθορίζει το σύστημα μέτρησης που σημειώνεται στον πίνακα βαθμολόγησης
        (αυτοκρατορικό, ποσοτικό μέγεθος, διπλό ή χωρίς ενδείξεις).
    craft_wire_finish_coating:
      name: Φινίρισμα/επένδυση σύρματος χειροτεχνίας
      description: Καθορίζει το φινίρισμα ή την επίστρωση της επιφάνειας του σύρματος
        για χρώμα, αντοχή στο θάμπωμα ή προστασία.
    craft_wood_surface_preparation:
      name: Προετοιμασία επιφάνειας ξύλου χειροτεχνίας
      description: Υποδεικνύει εάν η ξύλινη επιφάνεια είναι έτοιμη για φινίρισμα/βάψιμο
        ή απαιτεί προετοιμασία (π.χ. τρίψιμο/αστάρωμα).
    crank_spindle_interface:
      name: Διεπαφή άξονα στροφάλου
      description: Καθορίζει το σύστημα άξονα μανιβέλας που υποστηρίζει ο κάτω βραχίονας
        (π.χ. SRAM DUB, τετράγωνος κώνος), διασφαλίζοντας τη συμβατότητα μεταξύ σετ
        μανιβέλας και κάτω βραχίονα.
    crankshaft_balance_type:
      name: Τύπος ζυγοστάθμισης στροφαλοφόρου
      description: Υποδεικνύει αν ο στροφαλοφόρος άξονας είναι εσωτερικά ζυγοσταθμισμένος
        (ουδέτερος) ή εξωτερικά ζυγοσταθμισμένος (απαιτεί αποσβεστήρα κραδασμών/βαρίδια
        στον σφόνδυλο).
    crankshaft_bolt_pattern:
      name: Μοτίβο μπουλονιού στροφαλοφόρου άξονα
      description: Διάταξη μπουλονιών στην πίσω φλάντζα για τη στερέωση του σφονδύλου
        ή της εύκαμπτης πλάκας.
    crankshaft_sensor_reluctor_type:
      name: Τύπος τροχού παλμών στροφαλοφόρου άξονα
      description: Διαμόρφωση του τροχού ενεργοποίησης/παλμών του αισθητήρα θέσης
        στροφαλοφόρου άξονα (όπου εφαρμόζεται).
    craps_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για ζάρια
      description: Προσδιορίζει πρόσθετα αξεσουάρ ειδικά για ζάρια που περιλαμβάνονται,
        πέραν από τα ζάρια/μάρκες/διάταξη.
    crash_cymbal_profile:
      name: Προφίλ crash κυμβάλου
      description: Συνολική καμπυλότητα/προφίλ του κυμβάλου (πόσο έντονη είναι η καμπύλη
        του σώματος), που επηρεάζει το ύψος του ήχου και την απόκριση.
    crash_cymbal_sound_character:
      name: Ηχητικός χαρακτήρας crash κυμβάλου
      description: Κύριοι περιγραφικοί χαρακτηρισμοί του ηχητικού χαρακτήρα του crash
        κυμβάλου.
    crash_pad_size_class:
      name: Κατηγορία μεγέθους μαξιλαριού πρόσκρουσης
      description: Υποδεικνύει τη γενική κατηγορία μεγέθους ενός μαξιλαριού πρόσκρουσης
        αναρρίχησης, δίνοντας στους αγοραστές μια γρήγορη εικόνα της επιφάνειας κάλυψης
        χωρίς να απαιτούνται ακριβείς διαστάσεις.
    crate_engine_assembly_level:
      name: Επίπεδο συναρμολόγησης κινητήρα crate
      description: Πόσο ολοκληρωμένος είναι ο crate κινητήρας όπως παραδίδεται (ποια
        βασικά εξαρτήματα περιλαμβάνονται).
    cream_base_ingredient:
      name: Συστατικό βάσης κρέμας
      description: Προσδιορίζει την κύρια πηγή της κρέμας, καλύπτοντας τόσο τα γαλακτοκομικά
        είδη όσο και τις φυτικές εναλλακτικές λύσεις.
    cream_cheese_base:
      name: Βάση τυριού κρέμας
      description: Προσδιορίζει την κύρια γαλακτοκομική ή φυτική πηγή που χρησιμοποιείται
        για την παρασκευή του τυριού κρέμα, βοηθώντας τον αγοραστή με διατροφικές,
        αλλεργιογόνες και γευστικές παραμέτρους.
    cream_cheese_form:
      name: Μορφή τυριού κρέμα
      description: Περιγράφει τη φυσική μορφή ή την υφή του τυριού κρέμα (π.χ., σε
        μπλοκ, σαντιγί, ντιπ), η οποία επηρεάζει την ικανότητα επάλειψης και την προβλεπόμενη
        χρήση.
    cream_variety:
      name: Ποικιλία κρέμας
      description: Προσδιορίζει το συγκεκριμένο στυλ κρέμας με βάση το λίπος, το στυλ
        επεξεργασίας ή την προβλεπόμενη μαγειρική χρήση (π.χ. Half & Half, διπλή κρέμα,
        κρέμα μαγειρικής).
    crib_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ κούνιας
      description: Καταγράφει λειτουργικά ή χαρακτηριστικά άνεσης που αφορούν αξεσουάρ
        κούνιας και παιδικού κρεβατιού, όπως χαρακτηριστικά αναπνοής ή ελαστικές άκρες.
    crib_bumper_features:
      name: Χαρακτηριστικά προστατευτικού κούνιας
      description: Επισημαίνει ειδικά λειτουργικά χαρακτηριστικά ενός προστατευτικού
        κούνιας
    crib_conversion_kit_components:
      name: Εξαρτήματα κιτ μετατροπής κούνιας μωρού
      description: Παραθέτει τα κύρια μέρη που περιλαμβάνονται στο κιτ, ώστε ο αγοραστής
        να μπορεί να επαληθεύσει ότι έχουν όλα τα απαραίτητα για την εγκατάσταση.
    cricket_ball_grade:
      name: Βαθμός μπάλας κρίκετ
      description: Καθορίζει το επίπεδο ποιότητας ή το προβλεπόμενο πρότυπο παιχνιδιού
        της μπάλας.
    cricket_ball_piece_construction:
      name: Κατασκευή κομματιού μπάλας κρίκετ
      description: Υποδεικνύει τον αριθμό των εξωτερικών κομματιών ή των διαμορφωμένων
        τμημάτων που χρησιμοποιούνται για την κατασκευή του εξωτερικού κελύφους της
        μπάλας, βασικός δείκτης ποιότητας και τιμής.
    cricket_ball_type:
      name: Τύπος μπάλας κρίκετ
      description: Καθορίζει τον τύπο της μπάλας κρίκετ που παρέχεται με το προϊόν
        ή αν δεν περιλαμβάνεται μπάλα.
    cricket_bat_accessory_type:
      name: Τύπος αξεσουάρ μπαστουνιού κρίκετ
      description: Καθορίζει τον τύπο αξεσουάρ ή προϊόντος συντήρησης για μπαστούνι
        κρίκετ, ώστε οι αγοραστές να μπορούν εύκολα να φιλτράρουν το προϊόν που χρειάζονται.
    cricket_bat_size:
      name: Μέγεθος μπαστουνιού κρίκετ
      description: Υποδεικνύει την τυποποιημένη ταξινόμηση μεγέθους μπαστουνιού κρίκετ
        (0–6, Harrow, SH, LH), η οποία συνήθως επιλέγεται με βάση την ηλικία και το
        ύψος του παίκτη.
    cricket_bat_size_compatibility:
      name: Συμβατότητα μεγέθους μπαστουνιού κρίκετ
      description: Παραθέτει το μέγεθος του μπαστουνιού στο οποίο έχει σχεδιαστεί
        το αξεσουάρ, εξασφαλίζοντας την κατάλληλη συμβατότητα.
    cricket_helmet_role:
      name: Ρόλος κράνους κρίκετ
      description: Υποδεικνύει τον αγωνιστικό ρόλο για τον οποίο έχει σχεδιαστεί το
        κράνος, όπως batting ή wicket-keeping.
    cricket_leg_guard_type:
      name: Τύπος προστατευτικού ποδιού κρίκετ
      description: Υποδηλώνει το συγκεκριμένο στυλ προστασίας ποδιών του κρίκετ.
    cricket_player_role:
      name: Ρόλος παίκτη κρίκετ
      description: Καθορίζει τον κύριο ρόλο παιχνιδιού για τον οποίο έχει σχεδιαστεί
        το παπούτσι.
    cricket_protection_grade:
      name: Βαθμός προστασίας κρίκετ
      description: Καθορίζει την ταξινόμηση βαθμού προστασίας που εκχωρείται από τον
        κατασκευαστή του εξοπλισμού κρίκετ.
    cricket_stump_base_type:
      name: Τύπος βάσης κολοβώματος κρίκετ
      description: Υποδεικνύει τον τύπο ή το υλικό της βάσης που παρέχεται με τα κολοβώματα,
        επηρεάζοντας τη σταθερότητα και την καταλληλότητα για την επιφάνεια παιχνιδιού.
    cricket_stump_target_features:
      name: Χαρακτηριστικά στόχου κολοβώματος κρίκετ
      description: Επισημαίνει διακριτά λειτουργικά χαρακτηριστικά που βελτιώνουν
        τη χρηστικότητα στην προπόνηση, την ορατότητα, την ανθεκτικότητα ή τη σταθερότητα.
    cricket_stump_type:
      name: Τύπος κολοβώματος κρίκετ
      description: Κατηγοριοποιεί το στυλ ή την κατασκευή των stumps, βοηθώντας τους
        αγοραστές να επιλέξουν μεταξύ παραδοσιακών κολοβωμάτων αγώνα, παραλλαγών προπόνησης
        ή σύγχρονων φωτιζόμενων μοντέλων.
    cricket_training_focus:
      name: Εστίαση προπόνησης κρίκετ
      description: Βασική δεξιότητα ή αγωνιστικός τομέας του κρίκετ για τον οποίο
        έχει σχεδιαστεί το βοήθημα προπόνησης.
    croquet_set_components_included:
      name: Περιλαμβάνονται εξαρτήματα σετ κροκέ
      description: Καταγράφει όλα τα βασικά εξαρτήματα που περιλαμβάνονται στο σετ
        (π.χ. wickets, πασσάλους, τσάντα μεταφοράς), ώστε οι πελάτες να γνωρίζουν
        ακριβώς τι αγοράζουν.
    cross_country_binding_system:
      name: Σύστημα δεσίματος ανώμαλου δρόμου
      description: Καθορίζει το πρότυπο δεσίματος για ανώμαλο δρόμο με το οποίο το
        προϊόν είναι τρυπημένο ή συμβατό.
    cross_stitch_chart_symbol_type:
      name: Τύπος συμβόλου διαγράμματος σταυροβελονιάς
      description: Πώς αναπαρίσταται το γράφημα (σύμβολα, χρώματα ή και τα δύο).
    cross_stitch_finishing_type:
      name: Τύπος φινιρίσματος σταυροβελονιάς
      description: Προβλεπόμενος τύπος τελικής επεξεργασίας/έκθεσης για το ραμμένο
        έργο.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Μηχανισμός συγκράτησης υφάσματος πλαισίου σταυροβελονιάς
      description: Υποδεικνύει τον τρόπο με τον οποίο στερεώνεται/τεντώνεται το ύφασμα
        στο πλαίσιο (π.χ. κλιπ, σφιγκτήρες, πινέζες), επηρεάζοντας την ευκολία χρήσης
        και τη συμβατότητα με τα υφάσματα.
    cross_stitch_frame_included_components:
      name: Εξαρτήματα πλαισίου σταυροβελονιάς που περιλαμβάνονται
      description: Καταγράφει τι περιλαμβάνεται στη συσκευασία (π.χ. μόνο το πλαίσιο
        ή πλαίσιο + σφιγκτήρες + βάση), μειώνοντας την ασάφεια και τις επιστροφές.
    cross_stitch_frame_type:
      name: Τύπος πλαισίου σταυροβελονιάς
      description: Καθορίζει τον τύπο/κατασκευή του πλαισίου για σταυροβελονιά (τον
        τρόπο συγκράτησης του υφάσματος), επηρεάζοντας τη χρηστικότητα και τη συμβατότητα
        με τα έργα.
    cross_stitch_pattern_technique:
      name: Τεχνική μοτίβου σταυροβελονιάς
      description: Η τεχνική/στυλ σταυροβελονιάς που απαιτείται από το διάγραμμα.
    crossbar_shape_profile:
      name: Σχήμα/ προφίλ εγκάρσιας ράβδου
      description: Καθορίζει το αεροδυναμικό σχήμα/προφίλ της εγκάρσιας ράβδου.
    crossbar_style:
      name: Στυλ εγκάρσιας ράβδου
      description: Προσδιορίζει τον τύπο κατασκευής της εγκάρσιας ράβδου, διακρίνοντας
        τις άκαμπτες ράβδους αγώνων από τις εύκαμπτες ή υβριδικές ράβδους προπόνησης.
    crossbow_type:
      name: Τύπος βαλλίστρας
      description: Προσδιορίζει τον βασικό σχεδιαστικό τύπο της βαλλίστρας, όπως compound,
        recurve ή πιστολοειδής. Ο τύπος κατασκευής επηρεάζει την απόδοση, το μέγεθος
        και τις χρήσεις, γι’ αυτό οι αγοραστές συχνά τον χρησιμοποιούν ως φίλτρο αναζήτησης.
    crossover_component_type:
      name: Τύπος εξαρτήματος διασταύρωσης
      description: Προσδιορίζει την τοπολογία του κύριου στοιχείου που χρησιμοποιείται
        στο παθητικό δίκτυο διασταύρωσης.
    crossover_configuration:
      name: Διαμόρφωση crossover
      description: Υποδεικνύει εάν η διασταύρωση χρησιμοποιεί ένα μόνο σημείο διασταύρωσης
        ή πολλαπλά σημεία (π.χ., σχεδιασμοί 2 δρόμων έναντι 3 δρόμων).
    crossover_type:
      name: Τύπος διασταύρωσης
      description: Τύπος δικτύου διασταύρωσης που περιλαμβάνεται στο σετ εξαρτημάτων.
    crown_profile:
      name: Προφίλ στεφάνης
      description: Καθορίζει το ύψος/προφίλ της στεφάνης καπακιού πάνω από το χείλος.
    crown_style:
      name: Στυλ στεφάνης
      description: Ορίζει τη συνολική σιλουέτα ή το προφίλ της στεφάνης σε ένα καπέλο
        bowler.
    crust_taste_profile:
      name: Γευστικό προφίλ ζύμης
      description: Υποδεικνύει εάν ο εγγενής γευστικός προσανατολισμός της ζύμης είναι
        γλυκός, αλμυρός ή ουδέτερος.
    crystal_finish:
      name: Κρυστάλλινο φινίρισμα
      description: Περιγράφει το φινίρισμα της επιφάνειας, την επίστρωση ή την κατάσταση
        επεξεργασίας του χαλαρού κρυστάλλου (π.χ. ακατέργαστος, γυαλισμένος, στρογγυλεμένος,
        με έδρες, ματ, με επίστρωση aura, βαμμένος, θερμικά επεξεργασμένος).
    crystal_material:
      name: Υλικό κρυστάλλου
      description: Καθορίζει το υλικό που χρησιμοποιείται για το κρύσταλλο του ρολογιού
        που προστατεύει το καντράν.
    crystalline_finish_style:
      name: Κρυστάλλινο φινίρισμα
      description: Η χαρακτηριστική κρυσταλλική/«φτερωτή» εμφάνιση που δημιουργείται
        από το κερί φοίνικα στα τελικά κεριά.
    cucumber_variety:
      name: Ποικιλία αγγουριού
      description: Καθορίζει την ποικιλία καλλιέργειας ή εμπορική ποικιλία του αγγουριού
        (π.χ. αγγλικό, περσικό, Kirby).
    cue_compatibility:
      name: Συμβατότητα στέκας
      description: Υποδεικνύει τη διαμόρφωση της ένωσης της στέκας για την οποία έχει
        σχεδιαστεί η θήκη, όπως μονοκόμματες στέκες ή στέκες με ένωση 3/4.
    cue_construction:
      name: Κατασκευή στέκας
      description: Υποδεικνύει τον τρόπο κατασκευής της στέκας —τον αριθμό των κομματιών
        ή το αν πρόκειται για μερικό συστατικό, όπως μόνο η βάση ή μόνο ο άξονας—
        επηρεάζοντας τη φορητότητα και τη συμβατότητα.
    cue_head_material:
      name: Υλικό κεφαλής στέκας
      description: Προσδιορίζει το υλικό της κεφαλής της στέκας (το τμήμα που έρχεται
        σε επαφή με το puck), το οποίο επηρεάζει την ανθεκτικότητα και την προστασία
        της επιφάνειας.
    cue_sport_compatibility:
      name: Συμβατότητα με αθλήματα στέκας
      description: Προσδιορίζει για ποιο άθλημα στέκας έχει σχεδιαστεί το αξεσουάρ.
    cue_thread_size:
      name: Μέγεθος σπειρώματος στέκας
      description: Καθορίζει τις προδιαγραφές σπειρώματος που χρησιμοποιούνται σε
        προεκτάσεις, προστατευτικά ένωσης, βίδες βάρους και άλλα αξεσουάρ στέκας,
        ώστε να εξασφαλίζεται η σωστή εφαρμογή.
    cue_tip_hardness:
      name: Σκληρότητα άκρου στέκας
      description: Βαθμολογεί τη σταθερότητα του άκρου της στέκας, η οποία επηρεάζει
        τον έλεγχο της μπάλας και την ανάδραση.
    cuff_height:
      name: Ύψος μανσέτας
      description: Καθορίζει το ύψος της μανσέτας της μπότας (χαμηλό, μεσαίο, υψηλό,
        αποσπώμενο/ρυθμιζόμενο), επηρεάζοντας την υποστήριξη και την ευκαμψία.
    cuff_position:
      name: Θέση μανσέτας
      description: Υποδεικνύει το σημείο στο σώμα του αναβάτη όπου έχει σχεδιαστεί
        για να στερεωθεί η μανσέτα του λουριού.
    cultivation_method:
      name: Μέθοδος καλλιέργειας
      description: Καθορίζει τον τρόπο καλλιέργειας πράσινων λαχανικών, καλύπτοντας
        τις τεχνικές καλλιέργειας και τις γεωργικές πρακτικές.
    cup_type:
      name: Τύπος κοιλότητας
      description: Υποδεικνύει το προφίλ της επιφάνειας της παγιέτας (επίπεδη ή κοίλη)
        και το βάθος της κοιλότητας, το οποίο μπορεί να επηρεάσει τη λάμψη, την υφή
        και τον τρόπο που εφαρμόζεται όταν ράβεται ή προσκολλάται.
    cupcake_size:
      name: Μέγεθος καπ-κέικ
      description: Καθορίζει τη φυσική κατηγορία μεγέθους των καπ-κέικ που πωλούνται
        (π.χ. mini, standard, jumbo).
    curd_size:
      name: Μέγεθος πήγματος
      description: Καθορίζει το μέγεθος ή την υφή πηγμάτων τυριού cottage.
    cure_method:
      name: Μέθοδος ωρίμανσης
      description: Περιγράφει τη διαδικασία που απαιτείται για να πήξει ή να πολυμεριστεί
        η κόλλα (π.χ. υπεριώδης ακτινοβολία, υγρασία αέρα, θερμότητα).
    curing_or_preparation_method:
      name: Μέθοδος πολυμερισμού ή προετοιμασίας
      description: Καθορίζει τον τρόπο ωρίμανσης ή επεξεργασίας των ελιών (π.χ. σε
        άλμη, σε λάδι, ψητές/στα κάρβουνα).
    curling_broom_head_material:
      name: Υλικό κεφαλής σκούπας κέρλινγκ
      description: Προσδιορίζει τη σύνθεση του κύριου υλικού της κεφαλής ή του επιθέματος
        της σκούπας.
    curling_broom_head_type:
      name: Τύπος κεφαλής σκούπας κέρλινγκ
      description: Καθορίζει το στυλ ή την κατασκευή της κεφαλής/επιθέματος σάρωσης.
    curling_shoe_slider_material:
      name: Υλικό ολισθητήρα παπουτσιών κέρλινγκ
      description: Προσδιορίζει το κύριο υλικό της σόλας ολίσθησης που χρησιμοποιείται
        στα παπούτσια κέρλινγκ.
    curling_training_aid_type:
      name: Τύπος βοηθήματος προπόνησης κέρλινγκ
      description: Προσδιορίζει τον τύπο του βοηθήματος προπόνησης κέρλινγκ.
    curry_variety:
      name: Ποικιλία κάρι
      description: Ταξινομεί τη σάλτσα κάρυ ανάλογα με το συγκεκριμένο στυλ ή συνταγή
        κάρυ την οποία πρόκειται να δημιουργήσει, όπως Tikka Masala, Massaman ή Thai
        green, για να επιτρέψει το ακριβές φιλτράρισμα γεύσης/στυλ.
    cushion_rubber_profile:
      name: Προφίλ ελαστικού τμήματος
      description: Κωδικός σχήματος ή προφίλ των ελαστικών τμημάτων της ράγας
    cushioning_level:
      name: Επίπεδο απορρόφησης κραδασμών
      description: Υποδεικνύει την ποσότητα ενίσχυσης/επένδυσης κάτω από το πέλμα
        που παρέχει η κάλτσα για προστασία από κραδασμούς και άνεση.
    custom_label_content_type:
      name: Τύπος περιεχομένου προσαρμοσμένης ετικέτας
      description: Καθορίζει ποιες πληροφορίες είναι προσαρμοσμένες στη ραμμένη ετικέτα
        (π.χ. όνομα, λογότυπο, μήνυμα, μέγεθος, σύμβολα φροντίδας, στοιχεία επικοινωνίας).
    customization_type:
      name: Τύπος προσαρμογής
      description: Καθορίζει εάν η φανέλα είναι κενή, έχει εκδοθεί από τον παίκτη
        ή είναι προσαρμοσμένη με εξατομικευμένο όνομα/αριθμό.
    cut_or_preparation_style:
      name: Στυλ κοπής ή προετοιμασίας
      description: Καθορίζει τον τρόπο κοπής ή προετοιμασίας των λαχανικών μέσα στο
        κουτί ή το βάζο (π.χ. ολόκληρα, σε κύβους, σε λωρίδες).
    cut_resistance_rating:
      name: Βαθμολογία αντοχής στην κοπή
      description: Καθορίζει το επίσημα ελεγμένο επίπεδο αντοχής του αντικειμένου
        στην κοπή.
    cut_type:
      name: Τύπος κοπής
      description: Υποδεικνύει εάν το ύφασμα πωλείται ανά μέτρο, ως προκομμένο ή ως
        ρολό.
    cutting_application:
      name: Εφαρμογή κοπής
      description: Κύρια προβλεπόμενη χρήση κοπής για το ψαλίδι.
    cutting_mat_grid_style:
      name: Στυλ πλέγματος υποστρώματος κοπής
      description: Ο τύπος τυπωμένου οδηγού στην επιφάνεια κοπής.
    cutting_mat_intended_use:
      name: Προβλεπόμενη χρήση του υποστρώματος κοπής
      description: Η κύρια χρήση της επιφάνειας εργασίας για χειροτεχνίες για την
        οποία έχει σχεδιαστεί το υπόστρωμα κοπής.
    cv_boot_clamp_type:
      name: Τύπος σφιγκτήρα φούσκας ημιαξονίου
      description: Καθορίζει το στυλ σφιγκτήρα/ταινίας που χρησιμοποιείται για τη
        στερέωση της φούσκας ημιαξονίου.
    cv_boot_kit_contents:
      name: Περιεχόμενα κιτ φούσκας ημιαξονίου
      description: Καταγράφει τι περιλαμβάνεται με τη φούσκα ημιαξονίου (π.χ. σφιγκτήρες,
        σακουλάκι γράσου, ιμάντες συγκράτησης).
    cv_boot_material:
      name: Υλικό φούσκας ημιαξονίου
      description: Καθορίζει το κύριο υλικό κατασκευής της φούσκας ημιαξονίου.
    cv_boot_position:
      name: Θέση φούσκας ημιαξονίου
      description: Καθορίζει εάν η φούσκα ημιαξονίου ταιριάζει στην έσω (εσωτερική)
        ή στην έξω (εξωτερική) θέση της φούσκας ημιαξονίου στον άξονα.
    cycling_apparel_fit:
      name: Εφαρμογή ενδυμάτων ποδηλασίας
      description: Περιγράφει το κόψιμο του ενδύματος, υποδεικνύοντας τον βαθμό εφαρμογής
        και την αεροδυναμική του σχεδίαση (π.χ. αγωνιστική εφαρμογή, χαλαρή εφαρμογή).
    cylinder_head_assembly:
      name: Συγκρότημα κυλινδροκεφαλής
      description: Καθορίζει το επίπεδο πληρότητας της κυλινδροκεφαλής όπως πωλείται
        (π.χ. πλήρως συναρμολογημένη με εγκατεστημένα τα εξαρτήματα του βαλβιδομηχανισμού
        έναντι γυμνού/ασυναρμολόγητου χυτού σώματος).
    cylinder_head_material_grade:
      name: Βαθμός υλικού κυλινδροκεφαλής
      description: Καθορίζει το υλικό και την ποιότητα που χρησιμοποιούνται για τη
        χύτευση της κυλινδροκεφαλής.
    cylinder_head_position:
      name: Θέση κυλινδροκεφαλής
      description: Προσδιορίζει σε ποια πλευρά ή προσανατολισμό ταιριάζει η κυλινδροκεφαλή
        σε κινητήρες πολλαπλών κυβισμών (π.χ., αριστερή/δεξιά πλευρά ή πλευρά 1/2).
    cymbal_alloy:
      name: Κράμα κυμβάλων
      description: Κράμα/σύνθεση των κυμβάλων στο κιτ.
    cymbal_application:
      name: Εφαρμογή κυμβάλου
      description: Κύρια εφαρμογή αναπαραγωγής για την οποία έχει σχεδιαστεί/διατίθεται
        στην αγορά το κύμβαλο.
    cymbal_arm_mounting_interface:
      name: Διεπαφή τοποθέτησης βραχίονα κυμβάλου
      description: Καθορίζει τον τρόπο με τον οποίο ο βραχίονας του κύμβαλου συνδέεται
        με τον υπόλοιπο υλικό εξοπλισμό των τυμπάνων (π.χ. σφιγκτήρας, rack, υποδοχή
        βάσης).
    cymbal_arm_rotation_positioning_features:
      name: Χαρακτηριστικά περιστροφής/τοποθέτησης βραχίονα κυμβάλου
      description: Καθορίζει χαρακτηριστικά τοποθέτησης που επηρεάζουν τον τρόπο με
        τον οποίο ο βραχίονας μπορεί να δημιουργήσει γωνία/περιστραφεί και να κλειδώσει.
    cymbal_arm_style:
      name: Στυλ βραχίονα κυμβάλου
      description: Καθορίζει αν ο βραχίονας του κύμβαλου είναι ίσιος ή τύπου μπούμας,
        ανάλογα με τις προτιμήσεις σε εμβέλεια και τοποθέτηση.
    cymbal_drum_case_wheel_configuration:
      name: Διαμόρφωση τροχών θήκης για κύμβαλα και τύμπανα.
      description: Υποδεικνύει εάν η θήκη διαθέτει τροχούς και (εάν υπάρχει) τη διαμόρφωση
        των τροχών για κυλιόμενη μεταφορά.
    cymbal_hammering_style:
      name: Στυλ σφυρηλάτησης κύμβαλου
      description: Διαδικασία/εμφάνιση σφυρηλάτησης που επηρεάζει την πολυπλοκότητα
        και την αίσθηση του ήχου.
    cymbal_kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα κιτ κυμβάλων
      description: Καθορίζει ποιοι τύποι κύμβαλων περιλαμβάνονται στο κιτ/σετ ride
        κυμβάλων (εκτός από το ίδιο το ride κύμβαλο).
    cymbal_kit_items_included:
      name: Περιλαμβάνονται αντικείμενα κιτ κυμβάλων
      description: Προσδιορίζει ποια κύμβαλα περιλαμβάνονται στο κιτ/σετ (ανά τύπο
        κυμβάλου).
    cymbal_lathing:
      name: Τόρνευση κυμβάλων
      description: Καθορίζει εάν/πόσο μέρος της επιφάνειας του κυμβάλου είναι τορνευμένο
        (με αυλακώσεις) έναντι μη τορνευμένου/ακατέργαστου.
    cymbal_playing_style_genre:
      name: Στυλ/είδος παιξίματος κυμβάλων
      description: Προσδιορίζει το τυπικό πλαίσιο απόδοσης/χρήσης για το οποίο έχουν
        σχεδιαστεί τα κύμβαλα (π.χ. zills για belly dance έναντι χειροκίνητων κύμβαλων
        για marching ή ορχήστρα).
    cymbal_set_configuration:
      name: Διαμόρφωση σετ κυμβάλων
      description: Υποδεικνύει αν το προϊόν πωλείται ως μεμονωμένο κύμβαλο, ως ταιριαστό
        ζευγάρι ή ως σετ πολλών ζευγαριών (π.χ. για ομαδική οδηγία).
    cymbal_sound_character:
      name: Ηχητικός χαρακτήρας κυμβάλου
      description: Περιγράφει το συνολικό τονικό προφίλ/φωνή του κυμβάλου που χρησιμοποιείται
        για την ανακάλυψη (π.χ., φωτεινό έναντι σκοτεινού).
    cymbal_sustain:
      name: Διάρκεια αντήχησης κύμβαλου.
      description: Πόσο διαρκεί η αντήχηση του κύμβαλου μετά το χτύπημα.
    cymbal_type:
      name: Τύπος κυμβάλου
      description: Καθορίζει τον λειτουργικό ρόλο κύμβαλου που προορίζεται να προσομοιώσει
        το ηλεκτρονικό pad κύμβαλου.
    cymbal_volume_level:
      name: Επίπεδο έντασης κυμβάλου
      description: Αντιληπτή κατηγορία έντασης/απόδοσης του κυμβάλου.
    cymbal_weight_class:
      name: Κατηγορία βάρους κυμβάλου
      description: Υποδεικνύει την κατηγορία βάρους του κυμβάλου, επηρεάζοντας τον
        τόνο, την ένταση και την απόκριση.
    dairy_heat_treatment:
      name: Θερμική επεξεργασία γαλακτοκομικών.
      description: Προσδιορίζει το επίπεδο επεξεργασίας ή παστερίωσης που έχει υποστεί
        η κρέμα (π.χ. ωμή, παστεριωμένη, UHT), το οποίο επηρεάζει τη διάρκεια ζωής,
        τη γεύση και την ικανότητα χτυπήματος.
    damage_type:
      name: Τύπος ζημιάς
      description: Καθορίζει τους τύπους ζημιών στο παρμπρίζ τους οποίους προορίζεται
        να επισκευάσει το κιτ.
    damper_pedal_style:
      name: Στυλ πεντάλ αμορτισέρ
      description: Περιγράφει το φυσικό στυλ του πεντάλ αμορτισέρ που χρησιμοποιείται
        με πληκτρολόγια/ψηφιακά πιάνο.
    damping_adjustability:
      name: Ρύθμιση απόσβεσης
      description: Υποδεικνύει ποιες ρυθμίσεις απόσβεσης και/ή ύψους ανάρτησης είναι
        ρυθμιζόμενες στο αμορτισέρ.
    damping_level:
      name: Επίπεδο απόσβεσης
      description: Υποδεικνύει τη σχετική ποσότητα μείωσης έντασης ήχου και διατήρησης
        που παρέχει η σίγαση.
    dance_occasion:
      name: Χορευτική περίσταση
      description: Υποδεικνύει το πλαίσιο προβλεπόμενης χρήσης του ενδύματος σε πρακτική
        ή παράσταση χορού.
    darbuka_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ νταρμπούκας
      description: Παραθέτει τα συνηθισμένα αξεσουάρ που περιλαμβάνονται στη νταρμπούκα.
    darbuka_body_finish_type:
      name: Τύπος φινιρίσματος νταρμπούκας
      description: Περιγράφει το εξωτερικό φινίρισμα, επίστρωση ή διακοσμητική επεξεργασία
        του της νταρμπούκας.
    darbuka_head_material:
      name: Υλικό κεφαλής νταρμπούκας
      description: Καθορίζει το υλικό της μεμβράνης της κεφαλής σε μια νταρμπούκα.
    dart_barrel_material:
      name: Υλικό του κορμού βέλους
      description: Καθορίζει το κύριο υλικό του κορμού βέλους, επηρεάζοντας το βάρος,
        την ανθεκτικότητα και την τιμή.
    dart_shaft_design:
      name: Σχεδιασμός άξονα βέλους
      description: Κατατάσσει τον μηχανικό σχεδιασμό του άξονα, όπως αν είναι σταθερός,
        περιστρεφόμενος, τηλεσκοπικός ή ενσωματώνει την πτέρυγα, κάτι που επηρεάζει
        την απόδοση και την τιμή.
    dart_shaft_thread_type:
      name: Τύπος σπειρώματος άξονα βέλους
      description: Υποδεικνύει το μέγεθος/τύπο σπειρώματος που χρησιμοποιείται για
        το βίδωμα του άξονα στο σώμα του βέλους, εξασφαλίζοντας τη συμβατότητα μεταξύ
        αξόνων και σωμάτων.
    dart_thread_size:
      name: Μέγεθος σπειρώματος βέλους
      description: Καθορίζει το μέγεθος/πρότυπο σπειρώματος με το οποίο είναι συμβατό
        το εξάρτημα, εξασφαλίζοντας την εφαρμογή μεταξύ αξόνων, αιχμών και σωμάτων.
    dart_tip_compatibility:
      name: Συμβατότητα με αιχμή βέλους
      description: Υποδεικνύει εάν το τμήμα του βέλους προορίζεται για ατσάλινη αιχμή,
        μαλακή αιχμή ή και για τα δύο είδη.
    dart_tip_connection_type:
      name: Τύπος σύνδεσης αιχμής βέλους
      description: Περιγράφει τις προδιαγραφές σπειρώματος ή το σύστημα στερέωσης
        που χρησιμοποιεί η αιχμή για να προσαρμοστεί στο σώμα ή τον άξονα του βέλους,
        εξασφαλίζοντας τη συμβατότητα.
    dartboard_tournament_approval:
      name: Εγκρίσεις για χρήση σε τουρνουά dartboard
      description: Υποδεικνύει αν ο στόχος είναι επίσημα εγκεκριμένος από συγκεκριμένες
        ομοσπονδίες ή διοργανώσεις για βελάκια.
    dartboard_type:
      name: Τύπος στόχου
      description: Ταξινομεί τον πίνακα βελών σύμφωνα με την τεχνολογία κατασκευής
        και τη συμβατότητα με τα βελάκια (π.χ., με ίνες, ηλεκτρονικό, μαγνητικό).
    dash_cover_construction_type:
      name: Τύπος κατασκευής καλύμματος βέλους
      description: Περιγράφει τον τρόπο διαμόρφωσης/κατασκευής του καλύμματος στόχου
        (π.χ. χυτό έναντι ραμμένου), κάτι που επηρεάζει την ακρίβεια εφαρμογής και
        την εμφάνιση.
    dash_cover_cutout_configuration:
      name: Διαμόρφωση ανοίγματος καλύμματος στόχου
      description: Υποδεικνύει για ποια ανοίγματα/αισθητήρες του εργοστασιακού ταμπλό
        (OEM) είναι προκομμένο ή διαμορφωμένο το κάλυμμα.
    dashboard_accessory_position:
      name: Θέση αξεσουάρ στο ταμπλό
      description: Καθορίζει το σημείο πάνω/γύρω από τον πίνακα ελέγχου που προορίζεται
        να τοποθετηθεί ή να στερεωθεί το αξεσουάρ.
    date_variety:
      name: Ποικιλία χουρμά
      description: Καθορίζει την καλλιέργεια/ποικιλία των χουρμάδων (π.χ., Medjool,
        Deglet Noor, Ajwa). Η ποικιλία επηρεάζει σημαντικά τη γεύση, το μέγεθος και
        την υφή και επισημαίνεται στους περισσότερους τίτλους και περιγραφές προϊόντων,
        επομένως η καταγραφή της βελτιώνει τη φιλτράριση και την αναζήτηση.
    dayan_head_material:
      name: Υλικό κεφαλής dayan
      description: Υλικό της επιφάνειας παιχνιδιού (pudi), όπως φυσικός τύπος δέρματος
        ή συνθετικό.
    dayan_strap_material:
      name: Υλικό ιμάντα dayan
      description: Υλικό των ιμάντων τάνυσης (baddhi) που χρησιμοποιούνται για το
        δέσιμο του dayan.
    dayan_syahi_type:
      name: Τύπος Dayan syahi
      description: Τύπος εφαρμογής syahi (μαύρης πάστας ρύθμισης) στην κεφαλή του
        dayan.
    decaffeination_method:
      name: Μέθοδος αποκαφεϊνοποίησης
      description: Προσδιορίζει τη διαδικασία που χρησιμοποιείται για την αφαίρεση
        της καφεΐνης από τον ντεκαφεϊνέ καφέ.
    decal_installation_method:
      name: Μέθοδος εγκατάστασης αυτοκόλλητων
      description: Πώς εφαρμόζεται το αυτοκόλλητο στην επιφάνεια του οχήματος (π.χ.
        εφαρμογή σε στεγνή κατάσταση, εφαρμογή σε υγρή κατάσταση). Λεπτομέρειες εργαλείων/απαιτήσεων
        (π.χ. ταινία μεταφοράς ή πιστόλι θερμού αέρα) θα πρέπει να καταγράφονται στις
        οδηγίες ή σε σχετικά χαρακτηριστικά εργαλείων, όπου εφαρμόζεται.
    decal_orientation:
      name: Προσανατολισμός αυτοκόλλητων
      description: Εάν το αυτοκόλλητο προορίζεται για εφαρμογή στο εσωτερικό του γυαλιού
        ή σε εξωτερική επιφάνεια.
    decal_placement_type:
      name: Τύπος τοποθέτησης αυτοκόλλητου
      description: Υποδεικνύει σε ποιο σημείο του οχήματος προορίζεται να εφαρμοστεί
        το αυτοκόλλητο (π.χ. πάνελ αμαξώματος, προφυλακτήρας, καπό).
    decal_visibility_property:
      name: Ιδιότητα προβολής αυτοκόλλητου
      description: Οπτικές/ιδιότητες προβολής ενός αυτοκόλλητου που προορίζονται να
        βελτιώσουν την ορατότητα ή την απόκριση στο φως (π.χ. ανακλαστικό, φθορίζον,
        φωσφορίζον στο σκοτάδι ή χαρακτηριστικά διαφάνειας).
    deck_concave_level:
      name: Επίπεδο κοίλανσης της πλατφόρμας
      description: Υποδεικνύει το βάθος ή την ένταση κοίλανσης πλατφόρμας (π.χ., απαλό,
        μέτριο, βαθύ).
    deck_flex_rating:
      name: Βαθμολογία ευκαμψίας πλατφόρμας
      description: Ποιοτική αξιολόγηση της ευελιξίας/ακαμψίας της πλατφόρμας.
    deck_material:
      name: Υλικό πλατφόρμας
      description: Προσδιορίζει το κύριο υλικό κατασκευής της πλατφόρμας skateboard.
    decoder_interface_socket_type:
      name: Διεπαφή αποκωδικοποιητή / τύπος υποδοχής
      description: Τύπος διεπαφής ψηφιακού αποκωδικοποιητή ή διαμόρφωση ενσωματωμένου
        αποκωδικοποιητή για το μοντέλο μηχανής.
    decoration_technique:
      name: Τεχνική διακόσμησης
      description: Προσδιορίζει την κύρια μέθοδο που χρησιμοποιείται για την εφαρμογή
        γραφικών ή διακοσμητικών στοιχείων στο μπλουζάκι.
    decorative_stamp_form_factor:
      name: Παράγοντας μορφής της διακοσμητικής σφραγίδας
      description: Προσδιορίζει τη μορφή της φυσικής σφραγίδας και τον τρόπο εκτύπωσης
        ενός σχεδίου (μονή σφραγίδα, σετ, ρολό, φόντο, κ.λπ.).
    decorative_tape_application:
      name: Εφαρμογή διακοσμητικής ταινίας
      description: Κύρια χρήση χειροτεχνίας για την οποία έχει σχεδιαστεί ή προωθείται
        η διακοσμητική ταινία.
    decorative_tape_format:
      name: Μορφή διακοσμητικής ταινίας
      description: Καθορίζει τον τρόπο με τον οποίο η διακοσμητική ταινία παρέχεται/συσκευάζεται
        για χρήση.
    decoy_buoyancy:
      name: Πλευστότητα δολώματος
      description: Περιγράφει πώς συμπεριφέρεται το δόλωμα στη στήλη του νερού (επιπλέει,
        αιωρείται ή βυθίζεται).
    decoy_joint_type:
      name: Τύπος σύνδεσης με δόλωμα
      description: Υποδεικνύει εάν το σώμα του δολώματος είναι συμπαγές ή αρθρωτό,
        επηρεάζοντας την κολύμβηση.
    decoy_motion_mechanism:
      name: Μηχανισμός κίνησης δολώματος
      description: Περιγράφει πώς, και αν, το δόλωμα παράγει κίνηση ή ανατάραξη νερού
        για να προσελκύσει θηράματα.
    decoy_posture:
      name: Στάση δολώματος
      description: Υποδεικνύει την απεικονιζόμενη στάση ή δραστηριότητα του ζώου που
        αναπαριστά το δόλωμα (π.χ. τάισμα, ανάπαυση, εγρήγορση).
    decoy_size_class:
      name: Κατηγορία μεγέθους δολώματος
      description: Κατηγοριοποιεί τη σχετική κλίμακα του δολώματος σε σύγκριση με
        το πραγματικό ζώο (π.χ., Standard, Magnum, Oversize).
    decoy_style:
      name: Στυλ δολώματος
      description: Ορίζει τον φυσικό παράγοντα μορφής ή την κατηγορία σχεδιασμού του
        δολώματος για να βοηθήσει τους κυνηγούς να επιλέξουν τη σωστή εγκατάσταση.
    deli_meat_variety:
      name: Ποικιλία αλλαντικών ντελικατέσεν
      description: Ταξινομεί το συγκεκριμένο είδος αλλαντικού (π.χ. σαλάμι, μορταδέλα,
        προσούτο, ψητό βοδινό).
    delivery_form:
      name: Μορφή παράδοσης
      description: Φυσική μορφή παράδοσης του καθαριστή μπεκ.
    denim_composition:
      name: Σύνθεση τζιν
      description: Σύνθεση πρωτογενών ινών του τζιν (βασικές ίνες εξαιρουμένων των
        βαφών/φινιρισμάτων).
    denim_finish:
      name: Φινίρισμα τζιν
      description: Φινίρισμα επιφάνειας/επεξεργασίας που εφαρμόζεται σε ύφασμα τζιν.
    denim_intended_use:
      name: Προβλεπόμενη χρήση τζιν
      description: Τυπικό έργο/χρήση για την οποία διατίθεται στην αγορά το τζιν.
    denim_stretch_type:
      name: Τζιν ελαστικού τύπου
      description: Είτε το τζιν έχει μηχανική ελαστικότητα, προσθήκη ελαστάνης/σπάντεξ,
        είτε καθόλου ελαστικότητα.
    denim_wash:
      name: Ξέπλυμα τζιν
      description: Υποδεικνύει την απόχρωση ή την επεξεργασία ξεπλυματος που εφαρμόζεται
        σε ύφασμα τζιν (π.χ. ανοιχτό, σκούρο, ακατέργαστο, οξύ).
    derailleur_cage_length:
      name: Μήκος κλωβού μηχανισμού αλλαγής ταχυτήτων
      description: Υποδεικνύει το μήκος του κλωβού του μηχανισμού αλλαγής ταχυτήτων
        που καθορίζει την ικανότητα της αλυσίδας (κυρίως για τους πίσω μηχανισμούς
        αλλαγής ταχυτήτων).
    derailleur_mounting_style:
      name: Στυλ τοποθέτησης μηχανισμού αλλαγής ταχυτήτων
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται ο μηχανισμός αλλαγής
        ταχυτήτων στο πλαίσιο ή την ανάρτηση του ποδηλάτου (π.χ., με συγκόλληση, με
        σφιγκτήρα, απευθείας τοποθέτηση, UDH).
    derailleur_type:
      name: Τύπος μηχανισμού αλλαγής ταχυτήτων
      description: Υποδεικνύει εάν το προϊόν είναι εμπρόσθιος ή οπίσθιος μηχανισμός
        αλλαγής ταχυτήτων.
    deshedder_tool_type:
      name: Τύπος εργαλείου αφαίρεσης νεκρής τρίχας
      description: Ταξινομεί το δομικό στυλ του εργαλείου αφαίρεσης νεκρής τρίχας,
        ώστε ο αγοραστής να μπορεί να επιλέξει την προτιμώμενη μέθοδο περιποίησης
        (π.χ. λεπίδα, μπλοκ, βούρτσα curry ή γάντι).
    diabolo_axle_system:
      name: Σύστημα αξόνων Diabolo
      description: Καθορίζει το σύστημα/διαμόρφωση άξονα diabolo που επηρεάζει τις
        λειάνσεις, τη σταθερότητα και τη φθορά χορδών.
    diagnostic_functions_supported:
      name: Υποστηριζόμενες διαγνωστικές λειτουργίες
      description: Καθορίζει τις λειτουργίες διάγνωσης/συντήρησης που μπορεί να εκτελέσει
        ο σαρωτής.
    diagnostic_interface_type:
      name: Τύπος διαγνωστικής διεπαφής
      description: Σύνδεση/διεπαφή που χρησιμοποιείται για την επικοινωνία με το όχημα
        ή τη συσκευή (π.χ. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Βαθμός χρώματος διαμαντιού
      description: Υποδηλώνει τον βαθμό χρώματος των διαμαντιών, από D (άχρωμο) έως
        Z (ανοιχτόχρωμο) ή υποδηλώνει διαμάντια φανταχτερού χρώματος.
    diaper_cover_style:
      name: Στυλ καλύμματος πάνας
      description: Ορίζει τη σιλουέτα του σχεδιασμού ή το διακοσμητικό στυλ του καλύμματος
        της πάνας για να βοηθήσει στην περιήγηση και το φιλτράρισμα με βάση το στυλ.
    diastatic_power_unit:
      name: Μονάδα μέτρησης διαστατικής ισχύος
      description: Καθορίζει το σύστημα μονάδας που χρησιμοποιείται για την αναφορά
        της τιμής διαστατικής ισχύος του προϊόντος (π.χ. °Lintner ή Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Σύστημα κουρδίσματος διατονικής φυσαρμόνικας
      description: Καθορίζει τη διάταξη των νοτών/το σύστημα κουρδίσματος που χρησιμοποιείται
        από το διατονικό στόμιο.
    dice_sides:
      name: Πλευρές ζαριών
      description: Αριθμός πλευρών (όψεων) ανά ζάρι για τα ζάρια που περιλαμβάνονται
        στο προϊόν (π.χ., d6, d20). Για μικτά σετ, χρησιμοποιήστε την κυρίαρχη επιλογή
        ή καταγράψτε πολλές τιμές όταν υποστηρίζεται.
    didgeridoo_construction_type:
      name: Τύπος κατασκευής ντιτζεριντού
      description: Πώς κατασκευάζεται ή σχηματίζεται το ντιτζεριντού (παραδοσιακή
        ή σύγχρονη κατασκευαστική προσέγγιση).
    dietary_formulation_claim:
      name: Διατροφικός ισχυρισμός σύνθεσης
      description: Τονίζει τα κύρια χαρακτηριστικά σύνθεσης ή αποκλεισμούς που αφορούν
        τη διατροφή του αλόγου (π.χ. χωρίς σιτηρά, χαμηλή περιεκτικότητα σε άμυλο,
        βιολογικό).
    dinosaur_playset_scale_figure_size_class:
      name: Κλίμακα/κατηγορία μεγέθους των φιγούρων του σετ παιχνιδιού με δεινόσαυρους
      description: Περιγράφει τη γενική κλίμακα των δεινοσαύρων/φιγούρων που περιλαμβάνονται
        για να βοηθήσει στη συμβατότητα με άλλα σετ.
    dinosaur_species_included:
      name: Περιλαμβάνονται είδη δεινοσαύρων
      description: Προσδιορίζει ποια είδη δεινοσαύρων αναπαρίστανται στο σετ παιχνιδιού
        (φιγούρες ή δεινόσαυροι μέσω καλουπιού).
    dipsy_diver_size_designation:
      name: Καθορισμός μεγέθους του dipsy diver
      description: Υποδεικνύει τον καθορισμένο από τον κατασκευαστή κωδικό μεγέθους
        του dipsy, ο οποίος σχετίζεται με το βάρος και το βάθος κατάδυσης.
    disc_brake_rotor_mount_type:
      name: Τύπος στερέωσης δίσκου φρένου
      description: Προσδιορίζει τον τρόπο με τον οποίο συνδέεται ένας δίσκος φρένου
        με την πλήμνη (π.χ., 6 μπουλόνια, κεντρική ασφάλιση).
    disc_lock_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ κλειδώματος δίσκου
      description: Καθορίζει τα πρόσθετα αντικείμενα που περιλαμβάνονται με ένα λουκέτο
        δίσκου ποδηλάτου, όπως καλώδιο υπενθύμισης, θήκη μεταφοράς, βάση στήριξης
        ή μπαταρίες.
    disco_ball_mirror_tile_material:
      name: Υλικό πλακιδίων καθρέφτη ντίσκο-μπάλας
      description: Το υλικό των ανακλαστικών πλακιδίων της ντισκο-μπάλας (εφόσον εφαρμόζεται).
    disco_ball_mirror_tile_size:
      name: Μέγεθος πλακιδίου καθρέφτη ντισκο-μπάλας
      description: Κατά προσέγγιση μέγεθος των επιμέρους καθρεφτών/τετραγώνων στη
        ντισκο-μπάλα.
    display_backlight_color:
      name: Οπίσθιος φωτισμός οθόνης
      description: Χρώμα οπίσθιου φωτισμού/φωτισμού της οθόνης ή του καντράν του μετρητή.
    disposable_compostable_claim:
      name: Ισχυρισμός για αναλώσιμο/κομποστοποιήσιμο προϊόν
      description: Υποδεικνύει αν το προϊόν είναι κομποστοποιήσιμο, βιοδιασπώμενο,
        ανακυκλώσιμο ή κανένα από τα παραπάνω (όπου εφαρμόζεται).
    distillation_method:
      name: Μέθοδος απόσταξης
      description: Προσδιορίζει τη μέθοδο απόσταξης ή τον τύπο αποστακτήρα που χρησιμοποιείται
        για την παραγωγή του οινοπνευματώδους ποτού.
    distilled_water_intended_use:
      name: Προβλεπόμενη χρήση απεσταγμένου νερού
      description: Ορίζει την κύρια εφαρμογή για το απεσταγμένο νερό (π.χ., πόσιμο
        νερό, συσκευή CPAP, υγραντήρας, σίδερο ατμού).
    distress_transmission_frequency:
      name: Συχνότητα εκπομπής σήματος κινδύνου
      description: Κύρια ραδιοσυχνότητα/συχνότητες που χρησιμοποιούνται για την εκπομπή
        σήματος κινδύνου.
    distressing_level:
      name: Επίπεδο φθοράς
      description: Καθορίζει την ποσότητα της σκόπιμης φθοράς, σχισμών ή ξεφτισμάτων
        που έχει εφαρμοστεί στο ύφασμα.
    distressing_style:
      name: Στυλ φθοράς
      description: Υποδεικνύει τον τύπο ή το επίπεδο τεχνητής φθοράς στο τζιν, όπως
        εφέ σκισίματος ή «ινών».
    distributor_advance_mechanism:
      name: Μηχανισμός προώθησης διανομέα
      description: Καθορίζει τον τύπο μηχανισμού προπορείας χρονισμού ανάφλεξης που
        χρησιμοποιείται από τον διανομέα.
    distributor_cap_terminal_type:
      name: Τύπος ακροδέκτη καλύμματος διανομέα
      description: Καθορίζει το στυλ των ακροδεκτών του καλύμματος διανομέα.
    distributor_gear_material:
      name: Υλικό γραναζιού διανομέα
      description: Καθορίζει το υλικό του γραναζιού κίνησης του διανομέα.
    distributor_ignition_type:
      name: Τύπος ανάφλεξης διανομέα
      description: Καθορίζει εάν ο διανομέας έχει σχεδιαστεί για συστήματα σημείων
        ανάφλεξης, ηλεκτρονικής ανάφλεξης ή συστήματα τύπου HEI.
    distributor_kit_contents:
      name: Περιεχόμενα κιτ διανομέα
      description: Υποδεικνύει ποια εξαρτήματα περιλαμβάνονται στον διανομέα (π.χ.,
        καπάκι, ρότορας, μονάδα ανάφλεξης, φλάντζα/στεγανοποιητικός δακτύλιος, γρανάζι
        κίνησης, καλωδίωση/σύνδεσμος).
    dive_computer_form_factor:
      name: Συντελεστής μορφής υπολογιστή κατάδυσης
      description: Καθορίζει τον φυσικό σχεδιασμό ή τη μέθοδο τοποθέτησης του υπολογιστή
        κατάδυσης, όπως τοποθέτηση σε κονσόλα ή στυλ ρολογιού.
    diving_mask_design:
      name: Σχεδιασμός μάσκας κατάδυσης
      description: Καθορίζει τον συνολικό δομικό τύπο της μάσκας κατάδυσης, επηρεάζοντας
        την εφαρμογή, το πεδίο όρασης και τη σκοπούμενη χρήση.
    divot_tool_prong_configuration:
      name: Διαμόρφωση ακίδων του εργαλείου επιδιόρθωσης χλοοτάπητα
      description: Καθορίζει τον αριθμό και τη διάταξη των ακίδων του εργαλείου επιδιόρθωσης
        χλοοτάπητα που χρησιμοποιούνται για την αποκατάσταση ζημιών στο γρασίδι.
    divot_tool_style:
      name: Στυλ εργαλείου επιδιόρθωσης χλοοτάπητα
      description: Καθορίζει τη συνολική κατασκευαστική ή μορφή ανάπτυξης του εργαλείου
        επιδιόρθωσης χλοοτάπητα, όπως σταθερό, πτυσσόμενο τύπου switchblade, πολυεργαλείο
        ή αξεσουάρ που προσαρμόζονται σε καπέλο ή μπαστούνι.
    djembe_shell_construction:
      name: Κατασκευή κελύφους τζέμπε
      description: Περιγράφει τη μέθοδο κατασκευής του κελύφους/σώματος του τζέμπε.
    djembe_tuning_system:
      name: Σύστημα κουρδίσματος τζέμπε
      description: Καθορίζει τον τρόπο τάνυσης/κουρδίσματος του τζέμπε.
    dmx_output_connector_type:
      name: Τύπος συνδέσμου εξόδου DMX
      description: Φυσικός τύπος συνδέσμου που χρησιμοποιείται στις θύρες εξόδου DMX
        του ελεγκτή.
    doctor_playset_items_included:
      name: Περιλαμβάνονται αντικείμενα σετ παιχνιδιού γιατρού
      description: Καθορίζει τα εικονικά ιατρικά εργαλεία και τα αξεσουάρ παιχνιδιού
        ρόλων που περιλαμβάνονται στο σετ παιχνιδιού γιατρού (π.χ. στηθοσκόπιο, σύριγγα,
        αντανακλαστικό σφυρί).
    doctor_playset_role_play_setting:
      name: Ρύθμιση σετ παιχνιδιού γιατρού
      description: Προσδιορίζει το βασικό πλαίσιο ρόλων που αναπαριστά το σετ παιχνιδιού
        γιατρού.
    doctor_playset_wearable_items_included:
      name: Περιλαμβάνονται φορετά αντικείμενα σετ παιχνιδιού γιατρού
      description: Υποδεικνύει φορετά εξαρτήματα στολής που περιλαμβάνονται στο σετ
        παιχνιδιού.
    doll_accessory_type:
      name: Τύπος αξεσουάρ κούκλας
      description: Καθορίζει τι είδους αξεσουάρ για κούκλα ή φιγούρα δράσης είναι
        το προϊόν (π.χ. ρούχα, παπούτσια, έπιπλα, βάσεις προβολής), επιτρέποντας στους
        αγοραστές να περιηγηθούν και να φιλτράρουν μέσα σε αυτή την κατηγορία αξεσουάρ.
    doll_eye_type:
      name: Τύπος ματιού κούκλας
      description: Καθορίζει το στυλ κατασκευής των ματιών της κούκλας (π.χ. ένθετο
        ακρυλικό, βαμμένο, φωτισμός LED).
    doll_hair_fiber_type:
      name: Τύπος ίνας τρίχας κούκλας
      description: Τύπος τρίχας/ίνας που χρησιμοποιείται στην κούκλα (ή καθόλου),
        που επηρεάζει το εφέ ρεαλισμού, το στυλ και τη φροντίδα.
    doll_making_kit_components_included:
      name: Περιλαμβανόμενα εξαρτήματα σετ κατασκευής κούκλας
      description: Παραθέτει τα βασικά υλικά και εργαλεία που περιλαμβάνονται στο
        κιτ κατασκευής κούκλας, ώστε οι αγοραστές να μπορούν να τα συγκρίνουν και
        να γνωρίζουν τι χρειάζεται να προμηθευτούν μόνοι τους.
    dollhouse_installation_placement_type:
      name: Τύπος εγκατάστασης/τοποθέτησης κουκλόσπιτου
      description: Πώς προορίζεται να χρησιμοποιηθεί ή να τοποθετηθεί το κουκλόσπιτο
        (π.χ., επιτραπέζιο έναντι επιδαπέδιου έναντι επιτοίχιου).
    dollhouse_items_included:
      name: Περιλαμβάνονται αντικείμενα κουκλόσπιτου
      description: Αναγνωρίζει τι περιλαμβάνεται στο κουτί με το κουκλόσπιτο (έπιπλα,
        κούκλες, αξεσουάρ).
    dollhouse_lighting_type:
      name: Τύπος φωτισμού κουκλόσπιτου
      description: Τύπος φωτισμού που περιλαμβάνεται ή υποστηρίζεται από το κουκλόσπιτο.
    dollhouse_room_type:
      name: Τύπος δωματίου κουκλόσπιτου
      description: Καθορίζει το προβλεπόμενο δωμάτιο/περιοχή μέσα σε ένα κουκλόσπιτο
        όπου χρησιμοποιείται συνήθως το αξεσουάρ.
    dollhouse_scale:
      name: Κλίμακα κουκλόσπιτου
      description: Αναλογία κλίμακας ενός κουκλόσπιτου ή αξεσουάρ κουκλόσπιτου (π.χ.
        1:12) για να διασφαλιστεί η συμβατότητα μεταξύ σπιτιών, επίπλων και φιγούρων.
    dollhouse_style_theme:
      name: Στυλ/θέμα κουκλόσπιτου
      description: Συνολικό στυλ ή θέμα του κουκλόσπιτου για περιήγηση και αποστολή
        δώρου (π.χ. μοντέρνο έναντι βικτωριανού).
    donnos_playing_technique:
      name: Τεχνική παιχνιδιού donnos
      description: Πώς παίζεται/ενεργοποιείται το donnos (μόνο με το χέρι έναντι με
        μπαστούνι/επίθεση), για να ταιριάζει με τις προσδοκίες του αγοραστή και τα
        αξεσουάρ που περιλαμβάνονται.
    donnos_tuning_system:
      name: Σύστημα κουρδίσματος donnos
      description: Κύρια μέθοδος που χρησιμοποιείται για τον συντονισμό ή την αλλαγή
        του ύψους της φωνής (π.χ., καλώδια τάνυσης/μηχανισμός συμπίεσης).
    door_assembly_type:
      name: Τύπος συναρμολόγησης πόρτας
      description: 'Υποδεικνύει τι περιλαμβάνεται: μόνο το κέλυφος της πόρτας, το
        περίβλημα της πόρτας ή το πλήρες συγκρότημα της πόρτας.'
    door_closure_mechanism:
      name: Μηχανισμός κλεισίματος πόρτας
      description: Ορίζει τον μηχανισμό που ελέγχει το κλείσιμο της πόρτας (π.χ.,
        απαλό κλείσιμο, μαγνητικό μάνδαλο).
    door_handle_components_included:
      name: Περιλαμβάνονται εξαρτήματα χειρολαβής πόρτας
      description: Υποδεικνύει ποια βασικά μέρη περιλαμβάνονται στη χειρολαβή της
        πόρτας (προσδιοριστικό οντότητας) (π.χ. κύλινδρος κλειδαριάς, φλάντζα/τσιμούχα,
        κάλυμμα επένδυσης, υλικό τοποθέτησης εξοπλισμού, pigtail καλωδίωσης, μάνδαλο/ενεργοποιητής).
    door_handle_operation:
      name: Λειτουργία χειρολαβής πόρτας
      description: Καθορίζει τον βασικό τρόπο ενεργοποίησης/λειτουργίας της χειρολαβής
        πόρτας οχήματος (π.χ. μηχανικός σύνδεσμος, κύλινδρος κλειδιού, ανέπαφη/κουμπί
        keyless, ηλεκτρικό pop-out).
    door_lock_knob_attachment_method:
      name: Μέθοδος προσάρτησης κουμπιού κλειδαριάς πόρτας
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται το κουμπί της κλειδαριάς
        της πόρτας στη ράβδο κλειδαριάς (π.χ., με σπείρωμα, push-on).
    door_lock_position:
      name: Θέση κλειδαριάς πόρτας
      description: Καθορίζει σε ποια θέση πόρτας/ανοίγματος προορίζεται να τοποθετηθεί
        η κλειδαριά πόρτας ή το εξάρτημά της σε ένα όχημα.
    door_seal_feature_set:
      name: Σετ χαρακτηριστικών στεγανοποίησης πόρτας
      description: Λειτουργικά χαρακτηριστικά της στεγανοποίησης της πόρτας.
    door_seal_material_type:
      name: Τύπος υλικού στεγανοποίησης πόρτας
      description: Κύρια οικογένεια ελαστομερούς/υλικού που χρησιμοποιείται για τη
        στεγανοποίηση πόρτας (πέρα από τη γενική κατηγορία υλικού).
    door_seal_product_form:
      name: Μορφή προϊόντος στεγανοποίησης πόρτας
      description: Υποδεικνύει τη μορφή πώλησης/συσκευασίας της στεγανοποίησης της
        πόρτας.
    door_window_operation:
      name: Λειτουργία παραθύρου πόρτας
      description: Καθορίζει εάν το σύστημα παραθύρων της πόρτας προορίζεται για χειροκίνητη
        ή ηλεκτρική λειτουργία ή εάν η πόρτα δεν έχει παράθυρο.
    double_decker_bus_deck_configuration:
      name: Διαμόρφωση καταστρωμάτων διώροφου λεωφορείου
      description: Καθορίζει τη διαμόρφωση πρόσβασης στο κατάστρωμα/οροφής ενός διώροφου
        λεωφορείου.
    double_drum_pedal_linkage_medium:
      name: Μέσο σύνδεσης διπλού πεντάλ τυμπάνου
      description: Καθορίζει το μέσο που χρησιμοποιείται για τη σύνδεση του δευτερεύοντος
        πεντάλ στο πρωτεύον (π.χ., κινητήριος άξονας, αλυσίδα, ιμάντας).
    double_end_bag_core_type:
      name: Τύπος πυρήνα σάκου διπλού άκρου
      description: Καθορίζει την εσωτερική κατασκευή του πυρήνα κρούσης, η οποία επηρεάζει
        την ταχύτητα επαναφοράς, την αίσθηση και τις απαιτήσεις συντήρησης.
    double_pointed_needle_point_style:
      name: Στυλ βελόνας με διπλή μύτη
      description: Περιγράφει την οξύτητα/σχήμα της μύτης που προορίζεται για διαφορετικά
        νήματα και στυλ πλεξίματος.
    dough_extruder_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ στη συσκευή εξώθησης ζύμης
      description: Πρόσθετα εξαρτήματα που περιλαμβάνονται στη συσκευή εξώθησης ζύμης.
    dough_extruder_operation_type:
      name: Τύπος λειτουργίας συσκευής εξώθησης ζύμης
      description: Πώς ωθείται η ζύμη μέσα από τη συσκευή εξώθησης για να διαμορφώσει
        σχήματα.
    dough_extruder_shape_disc_included:
      name: Περιλαμβάνεται δίσκος σχημάτων συσκευή εξώθησης ζύμης
      description: Τα σχήματα που μπορεί να δημιουργήσει η συσκευή εξώθησης μέσω των
        παρεχόμενων δίσκων/ακροφυσίων.
    dough_format:
      name: Μορφή ζύμης
      description: Προσδιορίζει τη φυσική παρουσίαση/σχήμα της ζύμης μέσα στη συσκευασία
        (π.χ. μπάλα, φύλλο, δίσκος, τεμαχισμένες λωρίδες).
    doumbek_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ ντουμπέκ
      description: Αξεσουάρ που περιλαμβάνονται στο ντουμπέκ (π.χ. κλειδί κουρδίσματος,
        θήκη).
    doumbek_head_material:
      name: Υλικό κεφαλής ντουμπέκ
      description: Υλικό της κεφαλής τυμπάνου (μεμβράνη) στο ντουμπέκ.
    doumbek_head_type:
      name: Τύπος κεφαλής ντουμπέκ
      description: Κατασκευή/τύπος της κεφαλής ντουμπέκ (πώς κατασκευάζεται ή τοποθετείται
        η μεμβράνη).
    doumbek_playing_style_technique:
      name: Στυλ/τεχνική παιξίματος ντουμπέκ
      description: Προοριζόμενο πλαίσιο ή το στυλ παιξίματος που συνήθως συνδέεται
        με το ντουμπέκ.
    doumbek_tuning_system:
      name: Σύστημα κουρδίσματος ντουμπέκ
      description: Πώς τεντώνεται/ρυθμίζεται το ντουμπέκ (ή αν δεν είναι ρυθμιζόμενο).
    dowel_end_style:
      name: Στυλ άκρου πείρου
      description: Περιγράφει την κοπή/σχήμα των άκρων του πείρου, επηρεάζοντας την
        ευκολία τοποθέτησης, την ασφάλεια και την προοριζόμενη χρήση στη χειροτεχνία.
    dowel_surface_texture:
      name: Υφή επιφάνειας πείρου
      description: Περιγράφει την κατάσταση της επιφάνειας του πείρου, όπως λεία ή
        αυλακωτή, η οποία επηρεάζει την εμφάνιση και την πρόσφυση της κόλλας.
    drafting_compass_adjustment_mechanism:
      name: Μηχανισμός ρύθμισης διαβήτη σχεδίασης
      description: Κύριος μηχανισμός μικρορύθμισης που χρησιμοποιείται για την ακριβή
        ρύθμιση της ακτίνας.
    drafting_compass_fine_adjustment_mechanism:
      name: Μηχανισμός μικρορύθμισης διαβήτη σχεδίασης
      description: Τύπος μικρορύθμισης που χρησιμοποιείται για τον ακριβή ορισμό της
        ακτίνας (εάν υπάρχει).
    drafting_compass_lead_holder_type:
      name: Τύπος συγκράτησης γραφίδας διαβήτη σχεδίασης
      description: Τύπος ένθετου/υποδοχής σχεδίασης που περιλαμβάνεται ή υποστηρίζεται
        από τον διαβήτη.
    drag_system_material:
      name: Υλικό συστήματος φρένων
      description: Καθορίζει το υλικό ή την τεχνολογία που χρησιμοποιείται στο σύστημα
        φρένων, επηρεάζοντας την αντοχή στη θερμότητα και την ομαλή λειτουργία.
    drag_system_type:
      name: Τύπος συστήματος φρένων
      description: Καθορίζει το στυλ του μηχανισμού φρένων στο ρουλεμάν, όπως εμπρόσθιο,
        οπίσθιο, μοχλού, αστεροειδές, μαγνητικό ή δισκόφρενο.
    drag_type:
      name: Τύπος πέδησης
      description: Καθορίζει το στυλ του μηχανισμού φρένων που χρησιμοποιεί το ρουλεμάν,
        είτε από άποψη θέσης (θέση ή μέθοδος ενεργοποίησης).
    drawer_features:
      name: Χαρακτηριστικά συρταριού
      description: Περιγράφει τα ειδικά στοιχεία κατασκευής ή τις λειτουργίες του
        συρταριού (π.χ. με αθόρυβο κλείσιμο, επένδυση με βελούδο).
    drawer_slide_type:
      name: Τύπος ολίσθησης συρταριού
      description: Καθορίζει τον τρόπο τοποθέτησης και τον τύπο επέκτασης των οδηγών
        συρταριού (π.χ. τοποθετούμενοι στο κάτω μέρος, πλήρους έκτασης).
    drawing_ink_compatible_tools:
      name: Εργαλεία συμβατά με μελάνι σχεδίασης
      description: Καθορίζει τα εργαλεία εφαρμογής για τα οποία προορίζεται το μελάνι
        (π.χ., πένα έναντι πινέλου).
    drawing_ink_permanence:
      name: Ανθεκτικό μελάνι σχεδίασης
      description: Υποδεικνύει χαρακτηριστικά μονιμότητας που είναι σημαντικά για
        το τελικό έργο τέχνης και την αναπαραγωγή.
    dress_embellishment:
      name: Διακόσμηση φορέματος
      description: Επισημαίνει τα κυρίαρχα διακοσμητικά στοιχεία που ενσωματώνονται
        στον σχεδιασμό του φορέματος.
    dress_train_type:
      name: Τύπος ουράς φορέματος
      description: Υποδεικνύει την ύπαρξη και το μήκος/στυλ της ουράς του φορέματος,
        επηρεάζοντας το επίπεδο επισημότητας και την καταλληλότητα για τον χώρο/εκδήλωση.
    dried_surface_finish:
      name: Φινίρισμα αποξηραμένης επιφάνειας
      description: Περιγράφει την τυπική εμφάνιση της επιφάνειας μετά το στέγνωμα
        (γυαλάδα/υφή).
    drink_tube_insulation:
      name: Μόνωση σωλήνα ποτού
      description: Υποδεικνύει εάν ο σωλήνας ποτού περιλαμβάνει μόνωση ή θερμικό περίβλημα
        για να μην θερμαίνονται ή να παγώνουν τα υγρά.
    drive_band_cross_section_shape:
      name: Σχήμα διατομής ιμάντα κίνησης
      description: Το σχήμα της διατομής του ιμάντα κίνησης (στρογγυλό, επίπεδο κ.λπ.).
    drive_band_join_type:
      name: Τύπος σύνδεσης ιμάντα κίνησης
      description: Πώς συνδέεται/κατασκευάζεται ο ιμάντας κίνησης (ατέρμονη σύνδεση
        έναντι ενιαίας σύνδεσης, κ.λπ.).
    drive_band_material_type:
      name: Τύπος υλικού ιμάντα κίνησης
      description: Καθορίζει το υλικό/τύπο του ιμάντα κίνησης που χρησιμοποιείται
        στους περιστρεφόμενους τροχούς.
    drive_location:
      name: Τοποθέτηση συστήματος μετάδοσης κίνησης
      description: Καθορίζει τη θέση του σφονδύλου/συστήματος μετάδοσης κίνησης στο
        ελλειπτικό, επηρεάζοντας τον χώρο που καταλαμβάνει και την αίσθηση της κίνησης.
    drive_mechanism:
      name: Μηχανισμός μετάδοσης κίνησης
      description: Προσδιορίζει τον τύπο του συστήματος μετάδοσης κίνησης που χρησιμοποιείται
        για τη μεταφορά ισχύος από τα πεντάλ στον σφόνδυλο.
    drive_shaft_material:
      name: Υλικό άξονα μετάδοσης κίνησης
      description: Καθορίζει το κύριο υλικό κατασκευής του σωλήνα του άξονα μετάδοσης
        κίνησης ή του πλήρους συγκροτήματος.
    drive_system:
      name: Σύστημα μετάδοσης κίνησης
      description: Καθορίζει τον μηχανισμό που μεταφέρει τη δύναμη του πεντάλ στο
        σύστημα αντίστασης.
    drivetrain_configuration:
      name: Διαμόρφωση συστήματος μετάδοσης κίνησης
      description: Καθορίζει τη διαμόρφωση του συστήματος μετάδοσης στο ποδήλατο,
        υποδεικνύοντας αν το πίσω κέντρο είναι σταθερό, μονής ταχύτητας freewheel
        ή τύπου flip-flop.
    drivetrain_speed_compatibility:
      name: Συμβατότητα ταχύτητας συστήματος μετάδοσης κίνησης
      description: Παραθέτει τις ταχύτητες κασέτας για τις οποίες έχει σχεδιαστεί
        να λειτουργεί ο δίσκος αλυσίδας, διασφαλίζοντας τα σωστά προφίλ δοντιών και
        την κατάλληλη απόσταση μεταξύ τους.
    drone_positioning_system:
      name: Σύστημα εντοπισμού θέσης drone
      description: Τεχνολογία εντοπισμού θέσης/διατήρησης θέσης επί του drone που
        υποστηρίζει την πλοήγηση και τη σταθερή αιώρηση.
    drone_transmission_type:
      name: Τύπος μετάδοσης κίνησης drone
      description: Η κύρια μέθοδος που χρησιμοποιείται για τον έλεγχο ή/και τη σύνδεση
        βίντεο μεταξύ του drone και της διάταξης ελέγχου/συσκευής.
    drop_spindle_whorl_position:
      name: Θέση σπείρας στο αδράχτι
      description: Θέση σπείρας στον άξονα.
    drum_carder_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ συστήματος νηματοποίησης
      description: Συνήθη αντικείμενα που περιλαμβάνονται σε κιτ χτένας ινών.
    drum_clamp_locking_mechanism:
      name: Μηχανισμός ασφάλισης σφιγκτήρα τυμπάνου
      description: Καθορίζει τον τρόπο με τον οποίο ο σφιγκτήρας ασφαλίζει/σφίγγει
        στον σωλήνα ή στο στεφάνι (π.χ. βίδα πεταλούδα, βίδα με κλειδί τυμπάνου, ταχεία
        απελευθέρωση).
    drum_clamp_mount_interface:
      name: Διεπαφή στήριξης σφιγκτήρα τυμπάνου
      description: Καθορίζει τι παρέχει ο σφιγκτήρας για την προσάρτηση αξεσουάρ (π.χ.,
        δέκτης ράβδου L, σφαιρική άρθρωση, μηχανισμός κλίσης κυμβάλου).
    drum_clamp_type:
      name: Τύπος σφιγκτήρα τυμπάνου
      description: Καθορίζει το λειτουργικό στυλ σφιγκτήρα που χρησιμοποιείται στο
        υλικό στερέωσης του ντραμκιτ (π.χ. σφιγκτήρας στεφανιού έναντι σφιγκτήρα rack/σωλήνα).
    drum_head_application_batter_resonant:
      name: Εφαρμογή κεφαλής τυμπάνου (χτύπημα/αντήχηση)
      description: Καθορίζει για ποια πλευρά/ρόλο έχει σχεδιαστεί η κεφαλή ενός τυμπάνου
        (πάνω επιφάνεια παιξίματος έναντι κάτω επιφάνειας αντήχησης/πλευράς ταμπούρου).
    drum_head_collar_type:
      name: Τύπος κολάρου κεφαλής τυμπάνου
      description: Καθορίζει εάν η κεφαλή έχει τυπικό κολάρο, χαμηλό κολάρο ή ειδικό
        προφίλ κολάρου που να ταιριάζει με συγκεκριμένες άκρες ρουλεμάν/κελύφη τυμπάνου.
    drum_head_damping_control:
      name: Έλεγχος απόσβεσης κεφαλής τυμπάνου
      description: Ενσωματωμένα χαρακτηριστικά ελέγχου υπερτόνων ή στυλ απόσβεσης
        που περιλαμβάνονται στο σχέδιο της μεμβράνης.
    drum_head_film_material:
      name: Υλικό μεμβράνης κεφαλής τυμπάνου
      description: Πρωτεύον υλικό της μεμβράνης κεφαλής (συνήθως PET/Mylar, αλλά μπορεί
        να περιλαμβάνει και ειδικά υλικά).
    drum_head_hoop_collar_type:
      name: Τύπος στεφάνης/δακτυλίου κεφαλής τυμπάνου
      description: Προσδιορίζει την κατασκευή του στεφανιού και του κολάρου της κεφαλής
        του τυμπάνου (π.χ., το προφίλ του κολάρου και το υλικό του στεφανιού), τα
        οποία μπορούν να επηρεάσουν την εφαρμογή και τη σταθερότητα του κουρδίσματος
        σε ορισμένα κελύφη και άκρα.
    drum_head_hoop_rim_material:
      name: Υλικό στεφάνης/άκρου κεφαλής τυμπάνου
      description: Υλικό της στεφάνης/χείλους της σάρκας (η ενσωματωμένη στεφάνη στο
        εσωτερικό της κεφαλής), το οποίο μπορεί να επηρεάσει την ανθεκτικότητα και
        τη σταθερότητα του κουρδίσματος.
    drum_head_included:
      name: Περιλαμβάνεται κεφαλή τυμπάνου
      description: Υποδεικνύει εάν στο τύμπανο περιλαμβάνονται κεφαλές κρούσης ή/και
        κεφαλές συντονισμού.
    drum_head_muffling_feature:
      name: Χαρακτηριστικό απόσβεσης κεφαλής τυμπάνου
      description: Λειτουργίες ελέγχου υπερτόνων ενσωματωμένες στην κεφαλή του τυμπάνου.
    drum_head_muffling_type:
      name: Τύπος σιγαστήρα κεφαλής τυμπάνου
      description: Υποδεικνύει εάν η κεφαλή του τυμπάνου περιλαμβάνει ενσωματωμένα
        στοιχεία ελέγχου/σίγασης υπερτόνων.
    drum_head_ply_count:
      name: Αριθμός πτυχών κεφαλής τυμπάνου
      description: Αριθμός στρώσεων/φύλλων μεμβράνης που χρησιμοποιούνται στην κατασκευή
        της μεμβράνης τυμπάνου (π.χ. 1 στρώση, 2 στρώσεις).
    drum_head_position:
      name: Θέση κεφαλής τυμπάνου
      description: Υποδεικνύει αν η μεμβράνη τυμπάνου προορίζεται ως κρουστική (πάνω/επιφάνεια
        κρούσης), αντηχητική (κάτω), πλευρά ταμπούρου (κάτω πλευρά) ή αν μπορεί να
        χρησιμοποιηθεί και με τους δύο τρόπους.
    drum_head_reinforcement_type:
      name: Τύπος ενίσχυσης κεφαλής τυμπάνου
      description: Υποδεικνύει αν η μεμβράνη του ταμπούρου περιλαμβάνει ενισχυτικά
        χαρακτηριστικά, όπως κεντρικό «dot» ή δακτύλιο ελέγχου, τα οποία αυξάνουν
        την ανθεκτικότητα και εστιάζουν τον ήχο.
    drum_head_surface_finish:
      name: Φινίρισμα επιφάνειας κεφαλής τυμπάνου
      description: Υφή/φινίρισμα της επιφάνειας της μεμβράνης που επηρεάζει την αντίδραση
        στο χτύπημα και στις κινήσεις με βούρτσα.
    drum_head_type:
      name: Τύπος κεφαλής τυμπάνου
      description: Καθορίζει την κατασκευή/τύπο της κεφαλής που χρησιμοποιείται στο
        τύμπανο (κυρίως για κεφαλές κρούσης/αντήχησης, όπως παρέχεται).
    drum_key_design_type:
      name: Τύπος σχεδίασης κλειδιού τυμπάνου
      description: Περιγράφει τον λειτουργικό σχεδιασμό του κλειδιού τυμπάνου για
        τέντωμα (π.χ. τυπικό, με καστάνια, τύπου Τ).
    drum_key_drive_type:
      name: Τύπος κίνησης κλειδιού τυμπάνου
      description: Καθορίζει το στυλ κίνησης/διασύνδεσης του κλειδιού τυμπάνου που
        χρησιμοποιείται για την εμπλοκή της ράβδου τάνυσης ή της στερέωσης υλικού
        εξοπλισμού.
    drum_key_handle_style:
      name: Στυλ λαβής κλειδιού τυμπάνου
      description: Περιγράφει τη λαβή (προσδιοριστικό οντότητας)/εργονομικό στυλ του
        κλειδιού τυμπάνου, επηρεάζοντας την άνεση και τη μόχλευση κατά τον συντονισμό.
    drum_kit_included_items:
      name: Αντικείμενα που περιλαμβάνονται στο ντραμκιτ
      description: Καταγράφει ποια βασικά είδη περιλαμβάνονται στο ντραμκιτ πέρα από
        τα κελύφη ή τα pads (π.χ. υλικό, κύμβαλα, σκαμπό).
    drum_kit_portability:
      name: Φορητότητα ντραμκιτ
      description: Υποδεικνύει αν το σετ έχει σχεδιαστεί για συμπαγή αποθήκευση/μεταφορά
        (π.χ. ταξιδιωτικό, compact ή πτυσσόμενο).
    drum_kit_shell_construction_features:
      name: Χαρακτηριστικά κατασκευής κελύφους ντραμκιτ
      description: Ο τρόπος κατασκευής των κελυφών (αριθμός στρώσεων/τύπος), που επηρεάζει
        τον τόνο και την ανθεκτικότητα.
    drum_mount_clamp_type:
      name: Τύπος σφιγκτήρα βάσης τυμπάνου
      description: Περιγράφει τον παράγοντα μορφής σφιγκτήρα που χρησιμοποιείται στον
        εξοπλισμό τοποθέτησης τυμπάνων.
    drum_multi_clamp_clamp_type:
      name: Τύπος σφιγκτήρα «πολλαπλών σφιγκτήρων» τυμπάνου
      description: Το λειτουργικό στυλ/διαμόρφωση του πολλαπλού σφιγκτήρα (πώς σφίγγει
        και τι συνδέει).
    drum_mute_material:
      name: Υλικό σίγασης τυμπάνου
      description: Καθορίζει το κύριο υλικό του σίγασης τυμπάνου που έρχεται σε επαφή
        με την κεφαλή του τυμπάνου ή/και αποσβένει τους κραδασμούς.
    drum_pad_triggering_zones:
      name: Ζώνες ενεργοποίησης drum pad
      description: Υποδεικνύει τον αριθμό/τύπο των ζωνών ενεργοποίησης που υποστηρίζει
        το tom pad (π.χ. μόνο κεφαλή έναντι κεφαλής + χείλους), επηρεάζοντας την εκφραστικότητα
        και τη συμβατότητα με της μονάδας.
    drum_pedal_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ πεντάλ τυμπάνου
      description: Παραθέτει τα βασικά αξεσουάρ και εξαρτήματα που περιλαμβάνονται
        στη συσκευασία του πεντάλ τυμπάνου.
    drum_pedal_baseplate_type:
      name: Τύπος βάσης πεντάλ τυμπάνου
      description: Υποδεικνύει εάν το πεντάλ χρησιμοποιεί πλάκα βάσης ή πλωτό/χωρίς
        πλαίσιο σχεδιασμό.
    drum_pedal_bearing_type:
      name: Τύπος ρουλεμάν πεντάλ τυμπάνου
      description: Καθορίζει τον μηχανισμό ρουλεμάν που χρησιμοποιείται στα κύρια
        σημεία περιστροφής (π.χ. ζύγωθρο, φτέρνα, έκκεντρο).
    drum_pedal_cam_type:
      name: Τύπος έκκεντρου πεντάλ τυμπάνου
      description: Καθορίζει το σχήμα/γεωμετρία του εκκέντρου ενός πεντάλ τυμπάνου,
        το οποίο επηρεάζει την αίσθηση και την απόκριση (π.χ. γραμμικό ή επιταχυνόμενο).
    drum_pedal_chain_configuration:
      name: Διαμόρφωση αλυσίδας πεντάλ τυμπάνου
      description: Καθορίζει τη διάταξη αλυσίδας που χρησιμοποιείται από ένα πεντάλ
        τυμπάνου με κίνηση αλυσίδας (π.χ., μονή αλυσίδα, διπλή αλυσίδα ή αλυσίδα μετατόπισης).
    drum_pedal_chain_type:
      name: Τύπος αλυσίδας πεντάλ τυμπάνου
      description: Υποδεικνύει τον τύπο της αλυσίδας που χρησιμοποιείται στο σύστημα
        μετάδοσης κίνησης (π.χ. αλυσίδα κυλίνδρων ή τύπου ποδηλάτου), ο οποίος μπορεί
        να επηρεάζει την ομαλότητα και την ανθεκτικότητα.
    drum_pedal_clamp_type:
      name: Τύπος σφιγκτήρα πεντάλ τυμπάνου
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται το πεντάλ στο στεφάνι
        του μπάσου τυμπάνου.
    drum_pedal_intended_use:
      name: Προβλεπόμενη χρήση πεντάλ τυμπάνου
      description: Υποδεικνύει το βασικό πλαίσιο χρήσης για το οποίο έχει σχεδιαστεί
        ή προωθείται το πεντάλ με ιμάντα.
    drum_pedal_spring_adjustment_method:
      name: Μέθοδος ρύθμισης ελατηρίου πεντάλ τυμπάνου
      description: Υποδεικνύει τον τρόπο ρύθμισης της τάνυσης του ελατηρίου στο πεντάλ.
    drum_pedal_spring_type:
      name: Τύπος ελατηρίου πεντάλ τυμπάνου
      description: Καθορίζει τον μηχανισμό ελατηρίου που χρησιμοποιείται για την επαναφορά
        του πεντάλ.
    drum_shell_material:
      name: Υλικό κελύφους τυμπάνου
      description: Καθορίζει το κύριο υλικό κατασκευής του κελύφους για ακουστικά
        τύμπανα (π.χ. σφένδαμος, σημύδα, ακρυλικό).
    drum_shell_wood_species:
      name: Είδη ξύλου κελύφους τυμπάνου
      description: Προσδιορίζει το είδος ξύλου που χρησιμοποιείται για το κέλυφος
        του τυμπάνου, επηρεάζοντας τον τόνο και την αντήχηση.
    drumhead_type:
      name: Τύπος κεφαλής τυμπάνου
      description: Διαμόρφωση/τύπος κεφαλής που χρησιμοποιείται στο octoban.
    drumstick_model:
      name: Μοντέλο μπαγκέτας τυμπάνου
      description: Τυποποιημένος κωδικός/μέγεθος μπαγκέτας τυμπάνου που χρησιμοποιείται
        από πολλές επωνυμίες (π.χ. 5A, 7A).
    drumstick_taper:
      name: Κωνικότητα μπαγκέτας τυμπάνου
      description: Περιγράφει το προφίλ κωνικότητας από τον κορμό προς τη μύτη, επηρεάζοντας
        την ανάκρουση και την ισορροπία.
    drysuit_footwear_style:
      name: Στυλ υποδημάτων για στεγανή στολή
      description: Περιγράφει το ενσωματωμένο φινίρισμα στο κάτω μέρος του ποδιού
        της στεγανής στολής (π.χ. ενσωματωμένα παπούτσια, κάλτσες από νεοπρένιο, τύπος
        «stockingfoot» ή στεγανοποιήσεις γύρω από τον αστράγαλο).
    dumbbell_style:
      name: Στυλ αλτήρα
      description: Προσδιορίζει τη θεμελιώδη σχεδίαση του αλτήρα—είτε πρόκειται για
        σταθερή μονάδα, ρυθμιζόμενο σύστημα ή στυλ λαβής με δυνατότητα φόρτωσης (προσδιοριστικό
        οντότητας)—που επηρεάζει έντονα τις αποφάσεις αγοράς και τη χρήση προπόνησης.
    dundun_playing_position:
      name: Θέση παιξίματος dundun
      description: Προβλεπόμενη θέση παιξίματος/μεταφοράς για το τύμπανο.
    dye_status:
      name: Κατάσταση χρωστικής
      description: Υποδεικνύει αν οι ίνες είναι βαμμένες, άβαφες/φυσικές ή περιλαμβάνει
        πολλαπλά χρώματα/μείγματα.
    dye_style:
      name: Στυλ βαφής
      description: Καθορίζει εάν το χρώμα του νήματος είναι μονόχρωμο, πολύχρωμο ή
        με άλλο ειδικό χρώμα.
    dye_technique:
      name: Τεχνική βαφής
      description: Μέθοδος που χρησιμοποιείται για το χρωμάτωση της ίνας (π.χ. βαφή
        στο χέρι, βαφή σε βραστήρα, βαφή ανά διαστήματα).
    dye_type_needlecraft_fabric:
      name: Τύπος βαφής (υφάσματα για βελονάκι/χειροτεχνία)
      description: Υποδεικνύει εάν το λινό ύφασμα είναι μονόχρωμο, βαμμένο στο χέρι
        ή βαμμένο ειδικά.
    dyeing_color_processing:
      name: Βαφή / επεξεργασία χρώματος
      description: Περιγράφει εάν και πώς χρωματίστηκε η ίνα (π.χ., άβαφη, λευκασμένη/λευκή
        ή συγκεκριμένες τεχνικές βαφής).
    e_bike_certification_class:
      name: Κατηγορία πιστοποίησης ηλεκτρικού ποδηλάτου
      description: Καθορίζει την επίσημη βαθμολογία ταχύτητας του ελαστικού για ηλεκτρικά
        ποδήλατα (π.χ., E-25, E-50).
    e_bike_speed_rating:
      name: Βαθμολογία ταχύτητας ηλεκτρικού ποδηλάτου
      description: Αναφέρει το επίσημο επίπεδο πιστοποίησης ηλεκτρικού ποδηλάτου για
        το ελαστικό (π.χ., E25 για ≤25 km/h, E50 για ≤50 km/h).
    e_scooter_connector_type:
      name: Τύπος συνδέσμου ηλεκτρικού σκούτερ
      description: Προσδιορίζει το στυλ του ηλεκτρικού συνδέσμου ή του βύσματος που
        χρησιμοποιείται από το εξάρτημα για σύνδεση ρεύματος ή σήματος.
    e_scooter_throttle_type:
      name: Τύπος ηλεκτρικού σκούτερ
      description: Καθορίζει τον τύπο ανακοπής που χρησιμοποιείται για τον έλεγχο
        της επιτάχυνσης σε ένα ηλεκτρικό σκούτερ.
    ear_coverage:
      name: Κάλυψη αυτιών
      description: Καθορίζει εάν το κράνος περιλαμβάνει προστασία ακοής και εάν είναι
        αφαιρούμενη.
    ear_coverage_style:
      name: Στυλ κάλυψης αυτιού
      description: Περιγράφει πώς ή αν τα αυτιά καλύπτονται από τη μάσκα ιπποειδών.
    ear_coverage_type:
      name: Τύπος κάλυψης αυτιών
      description: Καθορίζει τον τρόπο με τον οποίο το καπέλο καλύπτει ή προστατεύει
        τα αυτιά, συμπεριλαμβανομένης της παρουσίας και του στυλ των πτερυγίων των
        αυτιών.
    ear_guard_type:
      name: Τύπος προστατευτικού αυτιών
      description: Περιγράφει το είδος της προστασίας των αυτιών που είναι ενσωματωμένη
        στο καπέλο, όπως σκληρό πλαστικό, επενδεδυμένα ή αφαιρούμενα προστατευτικά.
    earmuff_style:
      name: Στυλ ωτοασπίδων
      description: Προσδιορίζει τον τρόπο με τον οποίο φοριέται η ωτοασπίδα ή το δομικό
        της στυλ σχεδιασμού (π.χ., πάνω από το κεφάλι ή τυλίγεται γύρω από το κεφάλι).
    earring_closure_type:
      name: Τύπος κλεισίματος σκουλαρικιού
      description: Καθορίζει τον μηχανισμό που χρησιμοποιείται για τη στερέωση του
        σκουλαρικιού στο αυτί (π.χ., push-back, leverback, clip-on).
    easel_art_desk_features:
      name: Χαρακτηριστικά καβαλέτου και τραπεζιού τέχνης
      description: Αναδεικνύει τα κοινά λειτουργικά χαρακτηριστικά που περιλαμβάνονται
        στο καβαλέτο ή στο τραπέζι τέχνης.
    easel_art_desk_surface_type:
      name: Τύπος επιφάνειας καβαλέτου και τραπεζιού τέχνης
      description: Καθορίζει τις χρησιμοποιήσιμες επιφάνειες σχεδίασης/γραφής που
        παρέχονται (π.χ. μαυροπίνακας, λευκοπίνακας, ρολό χαρτιού, μαγνητικός πίνακας).
    eb_clarinet_body_type:
      name: Τύπος σώματος κλαρινέτου σε Μι ύφεση (E♭)
      description: Καθορίζει εάν το κλαρινέτο Eb είναι παραλλαγή σοπράνο ή άλτο.
    eco_material_type:
      name: Τύπος οικολογικού υλικού
      description: Αναδεικνύει την οικολογικά υπεύθυνη τεχνολογία αφρού ή υλικού που
        χρησιμοποιείται στο στρώμα/μαξιλάρι.
    edge_construction:
      name: Κατασκευή άκρου
      description: Υποδεικνύει αν το σκι διαθέτει μεταλλική ακμή σε μέρος ή σε όλο
        το μήκος του.
    edge_tuner_type:
      name: Τύπος edge tuner
      description: Κατηγοριοποιεί το στυλ edge tuner για σκι ή snowboard, όπως οδηγός
        λίμας ή ηλεκτρικό μηχάνημα.
    edible_plant_part:
      name: Βρώσιμο μέρος του φυτού
      description: Υποδεικνύει ποιο μέρος του φυτού πωλείται για κατανάλωση.
    educational_guide_included:
      name: Περιλαμβάνεται εκπαιδευτικός οδηγός
      description: Υποδεικνύει ποιο εκπαιδευτικό υλικό περιλαμβάνεται στο μοντέλο.
    educational_topic:
      name: Εκπαιδευτικό θέμα
      description: Κύριο θέμα μάθησης που υποστηρίζεται από το εκπαιδευτικό περιεχόμενο
        της καλλιέργειας μυρμηγκιών.
    egg_component:
      name: Συστατικό αυγού
      description: Καθορίζει ποιο μέρος του αυγού περιέχει το προϊόν, όπως ολόκληρο
        αυγό, μόνο ασπράδια, κρόκους ή μείγματα/υποκατάστατα.
    egg_component_replaced:
      name: Αντικατάσταση συστατικού αυγού
      description: Υποδεικνύει ποιο μέρος του αυγού προορίζεται να αντικαταστήσει
        το προϊόν (π.χ. ολόκληρο αυγό, ασπράδι αυγού).
    egg_enrichment:
      name: Ενίσχυση αυγών
      description: Υποδεικνύει τυχόν διατροφική ενίσχυση που έχει προστεθεί στα αυγά,
        όπως εμπλουτισμός με ωμέγα-3 ή βιταμίνη D.
    egg_farming_method:
      name: Μέθοδος γεωργίας αυγών
      description: Υποδεικνύει τη μέθοδο παραγωγής ή εκτροφής των αυγών (π.χ. χωρίς
        κλουβί, ελευθέρας βοσκής, βιολογικά).
    egg_grade:
      name: Ποιότητα αυγού
      description: Υποδεικνύει την κατηγορία ποιότητας που έχει αποδοθεί από ρυθμιστικούς
        ή κλαδικούς φορείς.
    egg_processing_state:
      name: Κατάσταση επεξεργασίας αυγών
      description: Υποδεικνύει τυχόν επεξεργασία που έχει εφαρμοστεί στα αυγά πριν
        από την πώληση (π.χ. φρέσκα, αλατισμένα, αλκαλοποιημένα αυγά).
    egg_production_method:
      name: Μέθοδος παραγωγής αυγών
      description: Προσδιορίζει το σύστημα εκτροφής ή στέγασης που χρησιμοποιείται
        για την παραγωγή των αυγών (π.χ., εκτός κλουβιών, σε βοσκότοπους, βιολογικό).
    egg_replacer_main_ingredient:
      name: Κύριο συστατικό υποκατάστατου αυγού
      description: Υποδεικνύει το κύριο βασικό συστατικό από το οποίο παρασκευάζεται
        το υποκατάστατο αυγού, βοηθώντας τους χρήστες με διατροφικές ανάγκες ή επιθυμητές
        ιδιότητες στη μαγειρική.
    egg_size:
      name: Μέγεθος αυγού
      description: Ταξινομεί τα αυγά με βάση τις τυπικές ονομασίες μεγέθους αγοράς.
    egg_source_animal:
      name: Ζώο προέλευσης αυγού
      description: Προσδιορίζει το είδος του ζώου που παρήγαγε τα αυγά.
    egg_white_processing_method:
      name: Μέθοδος επεξεργασίας ασπραδιού αυγού
      description: Υποδεικνύει τον τρόπο επεξεργασίας των ασπράδιων αυγών μετά τη
        συλλογή (π.χ. παστερίωση, ξήρανση με ψεκασμό), επηρεάζοντας την ασφάλεια των
        τροφίμων, τη διάρκεια ζωής στο ράφι και τη χρήση της θήκης.
    eggplant_variety:
      name: Ποικιλία μελιτζάνας
      description: Καθορίζει την ποικιλία ή την αγορά ποικιλίας μελιτζάνας, επιτρέποντας
        στον αγοραστή να επιλέξει τύπους που διαφέρουν ως προς το μέγεθος, τη γεύση,
        το χρώμα και τη μαγειρική χρήση.
    eggshell_color:
      name: Χρώμα κελύφους αυγού
      description: Καθορίζει το κυρίαρχο χρώμα του κελύφους των αυγών.
    elastic_edge_finish_type:
      name: Ελαστικό φινίρισμα/τύπος άκρης
      description: Καθορίζει την κατασκευή της άκρης του υφασμένου ελαστικού που επηρεάζει
        την άνεση και την εφαρμογή.
    elastic_intended_use:
      name: Προβλεπόμενη χρήση ελαστικού
      description: Κύρια χρήση για την οποία προορίζεται το ελαστικό (βοηθά στην ανακάλυψη
        και μειώνει τις ασυμβατότητες).
    elastic_recovery_performance:
      name: Απόδοση ανάκτησης ελαστικού
      description: Περιγράφει πόσο καλά το υφαντό ελαστικό επανέρχεται στο αρχικό
        του μήκος μετά από τέντωμα.
    elastic_recovery_quality:
      name: Ποιότητα ανάκτησης ελαστικού
      description: Δείχνει την ικανότητα ανάκτησης του ελαστικού — πόσο καλά επανέρχεται
        στο αρχικό του μήκος μετά από τέντωμα.
    elastic_stretch_level:
      name: Επίπεδο ελαστικής τάνυσης
      description: Πόσο μπορεί να εκταθεί το ελαστικό υπό τάση (συχνά εκφράζεται ως
        σχετικά επίπεδα όταν δεν παρέχεται το ακριβές ποσοστό %).
    elastic_structure:
      name: Δομή ελαστικού
      description: Καθορίζει τη δομική κατασκευή του ελαστικού για κουμπότρυπες (π.χ.
        πλεκτό, υφαντό, πλεγμένο), η οποία μπορεί να επηρεάσει την ελαστικότητα, την
        επαναφορά και την απόδοση ραψίματος.
    elastic_type:
      name: Τύπος ελαστικού
      description: Καθορίζει τον τύπο κατασκευής του ελαστικού (π.χ., πτυσσόμενο ελαστικό
        (FOE), πλεγμένο, πλεκτό, υφαντό).
    electric_assist_type:
      name: Τύπος ηλεκτρικής υποβοήθησης
      description: Υποδεικνύει αν το ποδήλατο διαθέτει ηλεκτρική υποβοήθηση και το
        είδος της υποβοήθησης που παρέχεται.
    electric_bicycle_motor_position:
      name: Θέση μοτέρ ηλεκτρικού ποδηλάτου
      description: Τοποθεσία του κινητήρα κίνησης στο ηλεκτρικό ποδήλατο, όπως μεσαίος
        κινητήρας, εμπρός τροχός, πίσω τροχός ή διπλός τροχός.
    electric_bike_class:
      name: Κατηγορία ηλεκτρικού ποδηλάτου
      description: Κατηγοριοποιεί το ηλεκτρικό ποδήλατο σύμφωνα με τις κανονιστικές
        κατηγορίες που καθορίζουν τα όρια ταχύτητας και την υποβοήθηση μέσω γκαζιού.
    electric_guitar_bridge_type:
      name: Τύπος γέφυρας ηλεκτρικής κιθάρας
      description: Καθορίζει τον τύπο γέφυρας/βιμπράτο στην ηλεκτρική κιθάρα.
    electric_instrument_output_connection_type:
      name: Τύπος σύνδεσης εξόδου ηλεκτρικού οργάνου
      description: Καθορίζει τις διαθέσιμες επιλογές ελέγχου/λειτουργίας για τον αναβάτη
        ή τον γονέα (π.χ. πεντάλ, τιμόνι, απομακρυσμένος έλεγχος).
    electric_riding_vehicle_control_options:
      name: Επιλογές ελέγχου οδήγησης ηλεκτρικού οχήματος
      description: Διαθέσιμες επιλογές ελέγχου/λειτουργίας για τον αναβάτη ή τον γονέα
        (π.χ. πεντάλ, τιμόνι ή τηλεχειριστήριο).
    electric_spinning_wheel_speed_control_type:
      name: Τύπος ελέγχου ταχύτητας ηλεκτρικού περιστρεφόμενου τροχού
      description: Περιγράφει τον τρόπο με τον οποίο ο χρήστης ρυθμίζει την ταχύτητα
        περιστροφής στον ηλεκτρικό τροχό.
    electric_ukulele_output_jack_type:
      name: Τύπος εξόδου ηλεκτρικού γιουκαλίλι
      description: Καθορίζει τον σύνδεσμο φυσικής εξόδου που χρησιμοποιείται από το
        ηλεκτρικό γιουκαλίλι.
    electric_van_body_length_class:
      name: Κατηγορία μήκους αμαξώματος ηλεκτρικού van
      description: Κοινή κατηγορία μεγέθους van με βάση το μεταξόνιο/μήκος που χρησιμοποιείται
        στην καταχώριση.
    electric_van_roof_height_class:
      name: Κατηγορία ύψους οροφής ηλεκτρικού van
      description: Κοινή ταξινόμηση ύψους οροφής που χρησιμοποιείται για τα van (ειδικά
        τα φορτηγά).
    electric_vehicle_drivetrain_layout:
      name: Διάταξη συστήματος μετάδοσης κίνησης ηλεκτρικού οχήματος
      description: Διαμόρφωση κινητήρα/άξονα που περιγράφει τον αριθμό των κινητήρων
        και την τοποθεσία τους (πέραν από τους απλούς AWD/FWD/RWD).
    electric_winder_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ ηλεκτρικής διάταξης κουρδίσματος
      description: Παραθέτει τα αξεσουάρ που περιλαμβάνονται στην ηλεκτρική διάταξη
        κουρδίσματος (π.χ. σφιγκτήρες, προσαρμογείς).
    electrical_connector_type:
      name: Τύπος ηλεκτρικού συνδέσμου
      description: Καθορίζει το στυλ συνδέσμου που χρησιμοποιείται από το σύστημα
        ασφάλισης/κλειδώματος πόρτας για την ηλεκτρική ενσωμάτωση (αν υπάρχει).
    electrical_system_voltage:
      name: Τάση ηλεκτρικού συστήματος
      description: Υποδεικνύει την ονομαστική τάση του ηλεκτρικού συστήματος του οχήματος
        για την οποία έχει σχεδιαστεί ο ρυθμιστής.
    electronic_cymbal_trigger_zones:
      name: Ζώνες ενεργοποίησης ηλεκτρονικού κύμβαλου
      description: Καθορίζει πόσες ανεξάρτητες ζώνες στοιχείων ενεργοποίησης παρέχει
        το pad (π.χ. τόξο/άκρη/καμπάνα).
    electronic_drum_module_audio_interface_functionality:
      name: Λειτουργικότητα ηλεκτρονικής διεπαφής ήχου μονάδας τυμπάνου
      description: Υποδεικνύει εάν η μονάδα μπορεί να λειτουργήσει ως διεπαφή ήχου
        USB για εγγραφή/αναπαραγωγή, πέρα από τη λειτουργία MIDI.
    electronic_drum_module_metronome_features:
      name: Χαρακτηριστικά μετρονόμου μονάδας ηλεκτρονικών τυμπάνων
      description: Καθορίζει την ενσωματωμένη ικανότητα πρακτικής/μετρονόμου
    electronic_drum_module_power_source:
      name: Πηγή τροφοδοσίας μονάδας ηλεκτρονικών τυμπάνων
      description: Καθορίζει την απαιτούμενη ή υποστηριζόμενη πηγή τροφοδοσίας για
        τη μονάδα ελέγχου.
    electronic_drum_module_sample_import_support:
      name: Υποστήριξη εισαγωγής δειγμάτων στη μονάδα ηλεκτρονικών τυμπάνων
      description: Υποδεικνύει εάν οι μονάδες μπορούν να εισαγάγουν δείγματα χρηστών
        και με ποια μέθοδο.
    electronic_drum_pad_playing_surface_type:
      name: Τύπος επιφάνειας παιξίματος ηλεκτρονικού τυμπάνου
      description: Περιγράφει την κατασκευή της επιφάνειας παιξίματος του tom pad
        (π.χ., κεφαλή με πλέγμα έναντι ελαστικού), η οποία επηρεάζει την ανα πήδηση,
        τον θόρυβο και την αίσθηση.
    electronic_features:
      name: Ηλεκτρονικές λειτουργίες
      description: Υποδεικνύει ηλεκτρονικές/διαδραστικές λειτουργίες που περιλαμβάνονται
        στο κομμάτι του play banking (εάν υπάρχουν).
    electronic_lights_and_sound:
      name: Ηλεκτρονικά φώτα και ήχος
      description: Υποδεικνύει εάν το σετ παιχνιδιού με κουκλόσπιτο περιλαμβάνει ηλεκτρονικά
        φώτα ή/και ηχητικά χαρακτηριστικά (π.χ. φώτα, κουδούνι πόρτας, μουσική, ηχητικά
        εφέ).
    electronics_power_source:
      name: Πηγή τροφοδοσίας ηλεκτρονικών συσκευών
      description: Καθορίζει τον τρόπο τροφοδοσίας των ενεργών ηλεκτρονικών (όπου
        εφαρμόζεται).
    eligible_race_series:
      name: Επιλέξιμες σειρές αγώνων
      description: Σειρά αγώνων ή διοργανωτικός φορέας στον οποίο το αυτοκίνητο είναι
        επιλέξιμο να συμμετέχει.
    elliptical_trainer_part_type:
      name: Τύπος εξαρτήματος ελλειπτικού γυμναστηρίου
      description: Ταξινομεί το συγκεκριμένο είδος αξεσουάρ ή ανταλλακτικού για ένα
        ελλειπτικό μηχάνημα (π.χ. ζώνη, κονσόλα, πετάλι), ώστε ο αγοραστής να μπορεί
        να φιλτράρει γρήγορα το κομμάτι που χρειάζεται χωρίς να χρειάζεται να πλοηγηθεί
        σε πολλές μικροκατηγορίες.
    embellishment_technique:
      name: Τεχνική διακόσμησης
      description: Περιγράφει τη βασική διακοσμητική ή επιφανειακή επεξεργασία που
        εφαρμόζεται στο ένδυμα, όπως κέντημα, τύπωμα ή χάντρες.
    embellishment_type:
      name: Τύπος διακόσμησης
      description: Προσδιορίζει τον τύπο του διακοσμητικού στοιχείου που εφαρμόζεται
        στην καλτσοδέτα, όπως δαντέλα, φιόγκους ή μαργαριτάρια.
    embossing_pen_ink_color:
      name: Χρώμα μελανιού στυλό ανάγλυφης γραφής
      description: Καθορίζει το χρώμα του μελανιού που εναποτίθεται από την πένα ανάγλυφης
        γραφής (μπορεί να είναι διαφανές/κολλώδες ή με χρωστική). Διαφορετικό από
        το χρώμα της πένας/στυλό.
    embossing_stylus_tip_shape:
      name: Σχήμα άκρης γραφίδας με ανάγλυφη γραφή
      description: Περιγράφει τη γεωμετρία της άκρης ανάγλυφης γραφής που χρησιμοποιείται
        για τη δημιουργία διαφορετικών εφέ (π.χ., σφαιρική έναντι μυτερής).
    embroidered_coverage_level:
      name: Επίπεδο κάλυψης κεντητής επιφάνειας
      description: Κατά προσέγγιση ποσότητα κάλυψης με κεντημένο νήμα στην επιφάνεια
        του μπαλώματος.
    embroidered_patch_backing_type:
      name: Τύπος υποστρώματος κεντήματος
      description: Το υπόστρωμα/στρώμα υποστήριξης στην πίσω πλευρά του κεντήματος
        που επηρεάζει την ανθεκτικότητα και τον τρόπο εφαρμογής του.
    embroidery_hoop_type:
      name: Τύπος τελάρου κεντήματος
      description: Προσδιορίζει το στυλ κατασκευής του τελάρου κεντήματος και τον
        κύριο μηχανισμό τάνυσης.
    embroidery_machine_bobbin_type:
      name: Τύπος μπομπίνας μηχανής κεντήματος
      description: Τύπος/στυλ φόρτωσης του συστήματος μπομπίνας.
    emergency_lighting_configuration:
      name: Διαμόρφωση φωτισμού έκτακτης ανάγκης
      description: Καθορίζει την κύρια εγκατεστημένη διαμόρφωση φωτισμού έκτακτης
        ανάγκης στο όχημα (π.χ., μπάρα φωτισμού οροφής, φώτα μάσκας).
    emergency_lighting_package:
      name: Πακέτο φωτισμού έκτακτης ανάγκης
      description: Καθορίζει τους τύπους των εγκατεστημένων φώτων προειδοποίησης έκτακτης
        ανάγκης.
    emissions_compliance_standard:
      name: Πρότυπο συμμόρφωσης εκπομπών
      description: Υποδεικνύει την πιστοποίηση/συμμόρφωση με τις εκπομπές ρύπων για
        τον κινητήρα, όπου εφαρμόζεται.
    emissions_standard:
      name: Πρότυπο εκπομπών
      description: Πρότυπο συμμόρφωσης εκπομπών για το όχημα (διαφέρει ανάλογα με
        την περιοχή και το έτος).
    enclosure_panel_configuration:
      name: Διαμόρφωση πίνακα περιβλήματος
      description: Καθορίζει ποια πάνελ ή πλευρές περιβλήματος περιλαμβάνονται (διαμόρφωση
        κάλυψης), όπως πλήρες περίβλημα, μόνο πλευρικές κουρτίνες ή 3 όψεων (ανοιχτό
        εμπρός/πίσω).
    enclosure_window_material:
      name: Υλικό παραθύρου περιβλήματος
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τα διαφανή πάνελ
        παραθύρων του περιβλήματος.
    end_fitting_type:
      name: Τύπος τελικής τοποθέτησης
      description: Το στυλ συνδέσμου που χρησιμοποιείται σε κάθε άκρο του αμορτισέρ
        (πλευρά του οχήματος και πλευρά του καπό), καθορίζοντας τη συμβατότητα της
        βάσης.
    end_type:
      name: Τύπος άκρου
      description: Καθορίζει τον τύπο τερματισμού/προσάρτησης στα άκρα του ιμάντα
        ρυμούλκησης για σύνδεση σε σημεία ανάκτησης.
    ends_style_blocking_wires:
      name: Στυλ άκρων (σύρματα φραγής)
      description: Πώς είναι διαμορφωμένα τα άκρα του σύρματος φραγής για ασφάλεια
        και ευκολία στο πέρασμα μέσα από τις άκρες της δαντέλας.
    enduro_bike_suspension_adjustability:
      name: Ρυθμιζόμενη ανάρτηση ποδηλάτου Enduro
      description: Υποδεικνύει ποιες ρυθμίσεις ανάρτησης είναι διαθέσιμες (συνήθως
        για μπροστινό πιρούνι και πίσω αμορτισέρ).
    engine_bay_mounting_location:
      name: Τοποθεσία στερέωσης στο χώρο του κινητήρα
      description: Η θέση στο χώρο του κινητήρα όπου προορίζεται να τοποθετηθεί το
        δοχείο υπερχείλισης (σχετική θέση).
    engine_bearing_coating:
      name: Επίστρωση ρουλεμάν κινητήρα
      description: Καθορίζει τυχόν επιφανειακή επίστρωση στο ρουλεμάν (για αντοχή
        στη φθορά, δυνατότητα ενσωμάτωσης ή μείωση τριβών).
    engine_bearing_position:
      name: Θέση ρουλεμάν κινητήρα
      description: Καθορίζει τη θέση ή τη λειτουργία του ρουλεμάν μέσα στον κινητήρα.
    engine_bearing_size:
      name: Μέγεθος ρουλεμάν κινητήρα
      description: Καθορίζει αν το ρουλεμάν είναι τυπικού μεγέθους ή υπομεγέθους/υπερμεγέθους
        (συνήθως σχετίζεται με κατεργασία στροφάλου και ανοχές).
    engine_configuration:
      name: Διαμόρφωση κινητήρα
      description: Περιγράφει τη διάταξη/διαμόρφωση των κυλίνδρων του κινητήρα (π.χ.
        εν σειρά, V, επίπεδος/boxer).
    engine_cooling_type:
      name: Τύπος ψύξης κινητήρα
      description: Καθορίζει τη μέθοδο ψύξης του κινητήρα.
    engine_degreaser_form:
      name: Μορφή απολιπαντικού κινητήρα
      description: Η φυσική μορφή / μορφή παράδοσης του απολιπαντικού κινητήρα.
    engine_degreaser_rinse_requirement:
      name: Απαιτείται έκπλυση με απολιπαντικό κινητήρα
      description: Εάν το απολιπαντικό προορίζεται για έκπλυση με νερό μετά την εφαρμογή.
    engine_mount_type:
      name: Τύπος βάσης κινητήρα
      description: Καθορίζει τον λειτουργικό σχεδιασμό της βάσης κινητήρα (π.χ. υδραυλική,
        συμπαγής, αμορτισέρ ροπής).
    engine_oil_formulation:
      name: Σύνθεση λαδιού κινητήρα
      description: Υποδεικνύει τον τύπο σύνθεσης του λιπαντικού κινητήρα, όπως για
        τυπική χρήση, κινητήρες υψηλών χιλιομέτρων, παρατεταμένα διαστήματα αλλαγής
        ή επαγγελματικές/βαρέως τύπου εφαρμογές.
    engine_oil_specification:
      name: Προδιαγραφές λαδιού κινητήρα
      description: Οι προδιαγραφές/πρότυπο που πληροί το λάδι (π.χ. API SP, API SN
        Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Περιεχόμενο κιτ ανακατασκευής κινητήρα
      description: Προσδιορίζει ποια κύρια εξαρτήματα περιλαμβάνονται στο κιτ επισκευής
        κινητήρα.
    engine_rotation_direction:
      name: Κατεύθυνση περιστροφής κινητήρα
      description: Καθορίζει την κατεύθυνση περιστροφής του κινητήρα που χρησιμοποιείται
        στη ναυτική εφαρμογή.
    engine_timing_system_drive_type:
      name: Τύπος κίνησης συστήματος χρονισμού κινητήρα
      description: Υποδεικνύει εάν το σύστημα χρονισμού του κινητήρα είναι κινούμενο
        με ιμάντα, με καδένα ή με γρανάζια για αντιστοίχιση συμβατότητας.
    engine_valve_coating:
      name: Επίστρωση βαλβίδων κινητήρα
      description: Προσδιορίζει οποιαδήποτε επιφάνεια σενάριο δοκιμής ή επίστρωση
        που εφαρμόζεται στη βαλβίδα για αντοχή στη φθορά/θερμότητα.
    engine_valve_position:
      name: Θέση βαλβίδας κινητήρα
      description: Καθορίζει εάν η βαλβίδα κινητήρα προορίζεται για την πλευρά εισαγωγής
        ή την πλευρά εξαγωγής του κινητήρα.
    engine_valve_stem_tip_type:
      name: Τύπος άκρου στελέχους βαλβίδας κινητήρα
      description: Καθορίζει το στυλ ή την κατασκευή του άκρου του στελέχους βαλβίδας
        στο σημείο επαφής με το ζύγωθρο ή τον ρυθμιστή.
    engine_valvetrain_type:
      name: Τύπος συστήματος βαλβίδων κινητήρα
      description: Διάταξη συστήματος βαλβίδων/εκκεντροφόρου άξονα.
    enhancement_level:
      name: Επίπεδο βελτίωσης
      description: 'Κατά προσέγγιση αύξηση όγκου που παρέχει το ένθετο, εκφρασμένη
        σε μεγέθη cup: Διακριτική (έως 1 cup), Μέτρια (1–2 cups), Σημαντική (2+ cup).'
    entry_zipper_location:
      name: Θέση φερμουάρ εισόδου
      description: Καθορίζει πού βρίσκεται το κύριο φερμουάρ ή το άνοιγμα εισόδου
        της στολής (π.χ. μπροστά, πίσω, στον ώμο, διαγώνια).
    epee_point_type:
      name: Τύπος μύτης ξίφους ξιφασκίας
      description: Καθορίζει τη μάρκα ή το πρότυπο της μύτης που είναι εγκατεστημένη
        στη λεπίδα, η οποία επηρεάζει τη συμβατότητα και τη συντήρηση.
    equestrian_discipline:
      name: Ιππικό αγώνισμα
      description: Καθορίζει το ιππικό αγώνισμα για το οποίο προορίζεται ή είναι το
        πιο κατάλληλο το σπιρούνι.
    equestrian_helmet_safety_certification:
      name: Πιστοποίηση ασφάλειας κράνους ιππασίας
      description: Καθορίζει τα πρότυπα ασφαλείας ή τις πιστοποιήσεις με τις οποίες
        συμμορφώνεται το κράνος.
    equine_application_area:
      name: Πεδίο εφαρμογής σε ιπποειδή
      description: Καθορίζει την περιοχή του σώματος ή το υλικό για το οποίο προορίζεται
        το προϊόν (π.χ. οπλή, χαίτη, ιπποσκευή).
    equipment_contact_material_brew_wine:
      name: Υλικό επαφής εξοπλισμού (ζυθοποιία/κρασί)
      description: Κύριο υλικό του κομματιού που έρχεται σε επαφή με το υγρό (π.χ.
        γυαλί, ανοξείδωτο ατσάλι, πλαστικό).
    eu_children_clothing_size:
      name: Μέγεθος παιδικών ενδυμάτων ΕΕ
      description: Καθορίζει το μέγεθος παιδικών ενδυμάτων της ΕΕ κατά ύψος, όπως
        104 ή 140
    eu_clothing_size:
      name: Μεγέθη ένδυσης ΕΕ
      description: Καθορίζει το μέγεθος ενδύματος σύμφωνα με το ευρωπαϊκό σύστημα
        (EU), όπως 38 ή 46.
    eu_cup_size:
      name: Μεγέθη cup ΕΕ
      description: Καθορίζει το μέγεθος cup ΕΕ του σουτιέν, όπως C ή E
    eu_ring_size:
      name: Μέγεθος δαχτυλιδιών ΕΕ
      description: Καθορίζει το μέγεθος δαχτυλιδιών ΕΕ κατά περιφέρεια, όπως 52 ή
        63
    eu_shoe_size:
      name: Μέγεθος υποδημάτων ΕΕ
      description: Καθορίζει το μέγεθος υποδημάτων ΕΕ, όπως 42 ή 42 Wide
    euphonium_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται στο ευφώνιο
      description: Οι λίστες περιλάμβαναν στοιχεία συνήθως σετ με ευφώνιο (π.χ. επιστόμιο,
        θήκη).
    euphonium_valve_configuration:
      name: Διαμόρφωση βαλβίδας ευφωνίου
      description: Καθορίζει τον αριθμό των βαλβίδων και εάν η 4η βαλβίδα λειτουργεί
        χειροκίνητα ή με μηχανισμό πλευρικής δράσης.
    european_sword_historical_period:
      name: Ιστορική περίοδος ευρωπαϊκού ξίφους
      description: Κύρια ιστορική περίοδος στην οποία βασίζεται το σχέδιο/αντίγραφο
        του ξίφους (ή η εποχή του πρωτοτύπου).
    european_sword_pattern_type:
      name: Μοτίβο/τύπος ευρωπαϊκού ξίφους
      description: Συγκεκριμένος τύπος/πρότυπο ευρωπαϊκού ξίφους (τυπολογία) που αντιπροσωπεύει
        το συλλεκτικό ξίφος.
    ev_connector_adapter_direction:
      name: Κατεύθυνση συνδέσμου/προσαρμογέα EV
      description: Καθορίζει τι μετατρέπει ο προσαρμογέας ΑΠΟ και ΣΕ (πλευρά εισόδου
        οχήματος έναντι πλευράς φορτιστή/καλωδίου), επιτρέποντας το ακριβές φιλτράρισμα
        συμβατότητας.
    ev_conversion_kit_completeness_level:
      name: Επίπεδο πληρότητας κιτ μετατροπής EV
      description: Υποδεικνύει αν το προϊόν είναι πλήρες κιτ μετατροπής ή μερικό κιτ/πακέτο
        (π.χ. μόνο κινητήρας + ελεγκτής).
    ev_conversion_kit_drivetrain_configuration:
      name: Διαμόρφωση κιτ μετατροπής EV για σύστημα μετάδοσης κίνησης
      description: Καθορίζει την αρχιτεκτονική του συστήματος μετάδοσης κίνησης ενός
        κιτ μετατροπής EV, συμπεριλαμβανομένης της τοποθέτησης/διάταξης του κινητήρα
        και του κατά πόσον διατηρεί το υπάρχον κιβώτιο ταχυτήτων.
    ev_conversion_kit_voltage_class:
      name: Κλάση τάσης κιτ μετατροπής EV
      description: Ονομαστική κατηγορία τάσης συστήματος (κάδος) γύρω από την οποία
        έχει σχεδιαστεί το κιτ μετατροπής EV. Χρησιμοποιήστε αυτό για φιλτράρισμα
        με βάση τις κοινές κατηγορίες τάσης συστήματος, εκτός από την ακριβή μέτρηση
        τάσης.
    evaporator_core_type:
      name: Τύπος πυρήνα εξατμιστή
      description: Καθορίζει τον σχεδιασμό κατασκευής ενός πυρήνα εξατμιστή A/C αυτοκινήτου.
    evenweave_fabric_finish_treatment:
      name: Φινίρισμα ή επεξεργασία υφάσματος evenweave
      description: Υποδεικνύει οποιοδήποτε προ-φινίρισμα ή επεξεργασία έχει εφαρμοστεί
        στο ύφασμα και επηρεάζει την υφή, τη συμπεριφορά ή την εμφάνισή του.
    evenweave_fabric_package_format:
      name: Μορφή συσκευασίας υφάσματος evenweave
      description: Πώς πωλείται το ύφασμα (κομμένο κομμάτι έναντι συνεχούς ανά μέτρο).
    exercise_bike_accessory_part_type:
      name: Τύπος εξαρτήματος/αξεσουάρ ποδηλάτου γυμναστικής
      description: Περιγράφει την κύρια λειτουργία ή τον τύπο εξαρτήματος του αντικειμένου
        (π.χ. πεντάλ, ιμάντας μετάδοσης, θήκη μπουκαλιού, προστατευτικό οθόνης, στρόφαλος).
    exercise_bike_cushion_component:
      name: Εξάρτημα μαξιλαριού ποδηλάτου γυμναστικής
      description: Καθορίζει το εξάρτημα που σχετίζεται με το κάθισμα και περιλαμβάνεται,
        όπως μαξιλάρι καθίσματος, σέλα ή κάλυμμα καθίσματος.
    exercise_bike_metrics_tracked:
      name: Μετρήσεις που καταγράφονται από το ποδήλατο γυμναστική
      description: Παραθέτει τα πεδία δεδομένων προπόνησης που μπορεί να μετρήσει
        και να εμφανίσει ο υπολογιστής σε πραγματικό χρόνο.
    exercise_mat_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ στρώματος γυμναστικής
      description: Απαριθμεί πρόσθετα εξαρτήματα που περιλαμβάνονται με το στρώμα,
        όπως ιμάντες ή επιγονατίδες.
    exhaust_cooling_type:
      name: Τύπος ψύξης εξάτμισης
      description: Υποδεικνύει αν το εξάρτημα εξάτμισης προορίζεται για υγρό σύστημα
        (με ψύξη/έγχυση νερού) ή για ξηρό σύστημα εξάτμισης.
    exhaust_installation_position:
      name: Θέση εγκατάστασης εξάτμισης
      description: Υποδεικνύει σε ποιο σημείο στο όχημα είναι εγκατεστημένο το εξάρτημα.
    exhaust_outlet_configuration:
      name: Διαμόρφωση εξόδου εξάτμισης
      description: Καθορίζει τη διάταξη εξόδου εξάτμισης στο πίσω μέρος του οχήματος.
    expansion_tank_cap_connection_type:
      name: Τύπος σύνδεσης καπακιού δεξαμενής διαστολής
      description: Το μηχανικό στυλ σύνδεσης που χρησιμοποιείται για τη σύνδεση και
        τη στεγανοποίηση του καπακιού στον αυχένα του δοχείου διαστολής.
    expansion_tank_cap_pressure_relief_feature:
      name: Λειτουργία εκτόνωσης πίεσης στο καπάκι του δοχείου διαστολής
      description: Εάν και πώς το καπάκι παρέχει λειτουργία εκτόνωσης πίεσης/κενού.
    expansion_tank_cap_seal_material:
      name: Υλικό στεγανοποίησης καπακιού δεξαμενής διαστολής
      description: Υλικό της φλάντζας/τσιμούχας που έρχεται σε επαφή με τον αυχένα
        του δοχείου διαστολής.
    extension_attachment_method:
      name: Μέθοδος προσάρτησης επέκτασης
      description: Υποδεικνύει τον τρόπο με τον οποίο η επέκταση προσαρτάται στο cockpit/τιμόνι
        του ποδηλάτου, βοηθώντας τον αναβάτη να επιβεβαιώσει τη συμβατότητα με την
        υπάρχουσα διάταξη.
    extension_bend_type:
      name: Τύπος κάμψης επέκτασης
      description: Περιγράφει το γεωμετρικό στυλ ή την κάμψη της επέκτασης του τιμονιού,
        η οποία επηρεάζει την εργονομία και την αεροδυναμική του αναβάτη.
    extension_mechanism:
      name: Μηχανισμός επέκτασης
      description: Περιγράφει τη μέθοδο που χρησιμοποιεί ένα τραπέζι για να αναπτύσσει
        το μήκος ή την επιφάνειά του, εάν ισχύει.
    extension_table_features:
      name: Χαρακτηριστικά τραπεζιού προέκτασης
      description: Επισημαίνει λειτουργικά χαρακτηριστικά ειδικά για τραπέζια προέκτασης
        ραπτομηχανών.
    eyelet_grommet_installation_method:
      name: Μέθοδος τοποθέτησης κρίκων και ροδελών
      description: Καθορίζει τον τρόπο εγκατάστασης/στερέωσης του κρίκου/ροδέλας στο
        υλικό.
    eyewear_lens_shape:
      name: Σχήμα φακού οράσεως
      description: Υποδεικνύει το γεωμετρικό σχήμα του φακού, όπως κυλινδρικό ή σφαιρικό,
        το οποίο επηρεάζει το οπτικό πεδίο, την παραμόρφωση και το στυλ.
    eyewear_strap_material:
      name: Υλικό λουριού γυαλιών
      description: Καθορίζει το υλικό του ρυθμιζόμενου ιμάντα που ασφαλίζει τα γυαλιά
        ή τα προστατευτικά γυαλιά στο κεφάλι του χρήστη.
    fabric_backing_type:
      name: Τύπος υποστήριξης υφάσματος
      description: Καθορίζει αν το εκτυπώσιμο βαμβακερό ύφασμα περιλαμβάνει σταθεροποιητικό
        υπόστρωμα χαρτιού (και τι τύπου), το οποίο επηρεάζει το αν μπορεί να τροφοδοτηθεί
        σε συμβατικούς εκτυπωτές.
    fabric_cut_format:
      name: Μορφή κοπής υφάσματος
      description: Καθορίζει την κοπή/μορφή του τεμαχίου καμβά για για κεντήματα.
    fabric_end_use:
      name: Τελική χρήση υφάσματος
      description: Προσδιορίζει την κύρια προβλεπόμενη εφαρμογή του υφάσματος (για
        ποιον σκοπό χρησιμοποιείται καλύτερα).
    fabric_finish:
      name: Φινίρισμα υφάσματος
      description: Φινίρισμα ή επεξεργασία που εφαρμόζεται στο ύφασμα μεταξιού και
        επηρεάζει τη γυαλάδα, την υφή και την απόδοσή του.
    fabric_intended_use:
      name: Προβλεπόμενη χρήση υφάσματος
      description: Κύρια προτεινόμενη εφαρμογή/έργο για το λινό ύφασμα.
    fabric_opacity_level:
      name: Επίπεδο αδιαφάνειας υφάσματος
      description: Υποδεικνύει πόσο διαφανές είναι το ύφασμα, επηρεάζοντας τις ανάγκες
        σε στρώσεις και επένδυση.
    fabric_patch_shape:
      name: Σχήμα υφασμάτινου επιθέματος
      description: Περιγράφει το σχήμα των επιθεμάτων που περιλαμβάνονται στο κιτ.
    fabric_repair_kit_application_method:
      name: Μέθοδος εφαρμογής κιτ επιδιόρθωσης υφάσματος
      description: Καθορίζει τον τρόπο εφαρμογής της επισκευής στο ύφασμα (π.χ. θερμοκολλητό,
        ραμμένο, αυτοκόλλητο).
    fabric_repair_kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα κιτ επιδιόρθωσης υφάσματος
      description: Παραθέτει τα συγκεκριμένα εξαρτήματα που παρέχονται στο κιτ (π.χ.
        επιθέματα, νήμα, βελόνα, κόλλα).
    fabric_repair_kit_intended_use:
      name: Κιτ επισκευής υφασμάτων για προβλεπόμενη χρήση
      description: Καθορίζει την συνηθισμένη εργασία επισκευής για την οποία έχει
        σχεδιαστεί το κιτ (π.χ. σχισίματα, τρύπες, στρίφωμα).
    fabric_selling_format:
      name: Μορφή πώλησης υφασμάτων
      description: Καθορίζει τον τρόπο διάθεσης του υφάσματος (συνεχές μήκος, προκομμένο
        κομμάτι, ρολό/μπομπίνα ή δείγμα).
    fabric_stretch_level:
      name: Επίπεδο ελαστικότητας υφάσματος
      description: Περιγράφει τον βαθμό ελαστικότητας του υφάσματος, βοηθώντας τον
        αγοραστή να επιλέξει τα κατάλληλα υφάσματα για εφαρμοστά ενδύματα ή δομημένα
        σχέδια.
    fabric_stretch_type:
      name: Τύπος ελαστικότητας υφάσματος
      description: Υποδεικνύει την ελαστικότητα του υφάσματος boardshort, σημαντική
        για την κινητικότητα κατά τη διάρκεια του surfing ή της κολύμβησης.
    fabric_texture:
      name: Υφή υφάσματος
      description: Περιγράφει την αίσθηση της επιφάνειας ή τη δομή πλέξης του υφάσματος
        που χρησιμοποιείται στο τοπ.
    fabric_use_case:
      name: Χρήση υφάσματος
      description: Κύρια προβλεπόμενη χρήση του υφάσματος σατέν.
    fabric_weight_class:
      name: Κατηγορία βάρους υφάσματος
      description: Κατηγοριοποιεί το φανελένιο ύφασμα σε ζώνες βάρους ανάλογα με τη
        συνήθη χρήση, βοηθώντας στην επιλογή χωρίς να απαιτείται γνώση ακριβούς GSM/oz.
    face_mask_material:
      name: Υλικό μάσκας προσώπου
      description: Σύνθεση υλικού της μάσκας προσώπου που περιλαμβάνεται στο κράνος
        ή συμβατότητα με αυτό.
    face_mask_style:
      name: Στυλ μάσκας προσώπου
      description: Ορίζει τα συνολικά σχήματα ή το στυλ κατασκευής της μοντέρνας μάσκας
        προσώπου, βοηθώντας τους αγοραστές να βρουν την εφαρμογή και αισθητική της
        προτίμησής τους.
    face_mask_style_code:
      name: Κωδικός στυλ μάσκας προσώπου
      description: Ορίζει το δομικό στυλ γραμμών ή την οικογένεια βιομηχανικών κωδικών
        της μάσκας προσώπου (π.χ., ROPO, OPO, RJOP).
    face_protection_type:
      name: Τύπος προστατευτικού προσώπου
      description: Υποδεικνύει τον τύπο προστασίας προσώπου που περιλαμβάνεται ή είναι
        ενσωματωμένος στο κράνος, όπως πλέγμα ή προσωπίδα.
    faceplate_security_features:
      name: Χαρακτηριστικά ασφαλείας της πρόσοψης
      description: Καταγράφει λειτουργίες αποτροπής κλοπής και πρόσβασης που σχετίζονται
        με την πρόσοψη πέραν από τον βασικό σχεδιασμό.
    facing_length:
      name: Μήκος όψης
      description: Καθορίζει το μήκος όψης (μήκος καμπύλης) του επιστομίου, επηρεάζοντας
        την απόκριση και την επιλογή γλωττίδας.
    fan_shroud_type:
      name: Τύπος περιβλήματος ανεμιστήρα
      description: Καθορίζει το στυλ κάλυψης/γεωμετρίας του περιβλήματος του ανεμιστήρα
        (π.χ., πλήρες έναντι μισού έναντι δακτυλίου).
    farming_method:
      name: Μέθοδος καλλιέργειας
      description: Επισημαίνει τις πρακτικές ευζωίας ζώων ή εκτροφής που εφαρμόζονται,
        όπως ελευθέρας βοσκής ή βιολογική εκτροφή.
    farming_practice:
      name: Γεωργική πρακτική
      description: Προσδιορίζει την κύρια μέθοδο καλλιέργειας που χρησιμοποιείται
        για το προϊόν (π.χ. συμβατική, βιολογική, υδροπονία).
    fascinator_style:
      name: Στυλ fascinator
      description: Περιγράφει τον δομικό σχεδιασμό ή το σχήμα του fascinator, ώστε
        οι αγοραστές να μπορούν να φιλτράρουν εύκολα ανά δημοφιλή στυλ πιλοποιΐας.
    fastener_grade:
      name: Βαθμός συνδετήρα
      description: Υποδεικνύει τον βαθμό/κατηγορία αντοχής του μπουλονιού, όπως Βαθμός
        8 ή Κλάση 10.9, ο οποίος καθορίζει τη φέρουσα ικανότητα.
    fat_rendering_state:
      name: Κατάσταση επεξεργασίας λίπους
      description: Καθορίζει αν το λίπος είναι λιωμένο, ακατέργαστο ή μερικώς επεξεργασμένο,
        επηρεάζοντας τη διάρκεια ζωής και τις μαγειρικές χρήσεις του.
    fat_source:
      name: Πηγή λίπους
      description: Καθορίζει την κύρια πηγή λίπους που χρησιμοποιείται για την παραγωγή
        βουτύρου, βουτύτου γκι ή μαργαρίνης (ζωική ή φυτική), υποστηρίζοντας φίλτρα
        αλλεργιών και διατροφικών επιλογών.
    faucet_hole_configuration:
      name: Διαμόρφωση οπής βρύσης
      description: Υποδεικνύει τον αριθμό και τη διάταξη των προ-διάτρητων οπών για
        μπαταρία στην επιφάνεια του νιπτήρα.
    feather_application:
      name: Φτερό εφαρμογής
      description: Κύρια προβλεπόμενη χρήση ή εφαρμογή των φτερών γαλοπούλας για χειροτεχνία
        ή κατασκευή.
    feather_attachment_format:
      name: Σύνδεση/μορφή φτερού
      description: Καθορίζει τον τρόπο προετοιμασίας/διάθεσης των συνθετικών φτερών
        για χρήση (χαλαρά, σε κλωστή, σε ταινία κ.λπ.).
    feather_coloration_style:
      name: Στυλ χρωματισμού φτερών
      description: Περιγράφει τον τρόπο με τον οποίο εφαρμόζεται/εμφανίζεται το χρώμα
        στα φτερά (π.χ., συμπαγές, βαμμένο στην άκρη, διαβαθμισμένο), ανεξάρτητα από
        την τιμή βασικού χρώματος.
    feather_component:
      name: Στοιχείο φτερού
      description: Καθορίζει ποιο μέρος/στυλ φτερού παγωνιού πωλείται (π.χ. φτερό
        «μάτι» έναντι φτερού herl).
    feather_curvature:
      name: Καμπυλότητα φτερού
      description: Συνολικό σχήμα/προφίλ καμπυλότητας του φτερού.
    feather_finish:
      name: Φινίρισμα με φτερά
      description: Υποδεικνύει εάν τα φτερά της στρουθοκαμήλου είναι φυσικά ή έχουν
        υποστεί επεξεργασία (π.χ. βαφή ή λεύκανση) για διακοσμητική χρήση.
    feather_form:
      name: Μορφή φτερού
      description: Καθορίζει τη φυσική μορφή των κομματιών από φτερό χήνας που πωλούνται.
    feather_grade:
      name: Βαθμός φτερού
      description: Συνολική ποιότητα/βαθμός επιλογής του φτερού για χειροτεχνίες έναντι
        χρήσης για επίδειξη.
    feather_part:
      name: Τμήμα φτερού
      description: Το τμήμα/η δομή του φτερού γαλοπούλας που πωλείται (συχνό σε είδη
        χειροτεχνίας και δεσίματος τεχνητών μυγών για ψάρεμα).
    feather_processing_type:
      name: Τύπος επεξεργασίας φτερών
      description: Τρόπος επεξεργασίας/κατεργασίας των φτερών για χρήση σε χειροτεχνία
        (π.χ. βαμμένα, λευκασμένα, φυσικά/ακατέργαστα).
    feather_product_form:
      name: Μορφή προϊόντος με φτερά
      description: Η φυσική μορφή/κοπή του προϊόντος με φτερά όπως πωλείται (π.χ.,
        χαλαρά φτερά έναντι μποά έναντι κροσιών).
    feather_quantity_unit:
      name: Μονάδα ποσότητας φτερού
      description: Καθορίζει τον τρόπο πώλησης του προϊόντος (π.χ. ανά τεμάχιο, κατά
        βάρος, ανά δεμάτι) για να υποστηρίζει την ακριβή σύγκριση μεταξύ καταχωρίσεων.
    feather_source:
      name: Πηγή φτερών
      description: Καθορίζει την ζωική πηγή των φτερών που χρησιμοποιούνται στα μπλάκια
        του μπάντμινγκτον.
    feather_stiffness:
      name: Σκληρότητα φτερού
      description: Σχετική ακαμψία/σκληρότητα των ινών ή της δομής του φτερού.
    feed_mechanism:
      name: Μηχανισμός τροφοδοσίας
      description: Υποδεικνύει τον τρόπο με τον οποίο τροφοδοτούνται οι μπάλες στη
        μηχανή ρίψης.
    feed_purpose:
      name: Σκοπός τροφής
      description: Περιγράφει τον πρωταρχικό διατροφικό ή λειτουργικό στόχο της τροφής
        ή του συμπληρώματος διατροφής.
    feeder_mechanism_type:
      name: Τύπος μηχανισμού τροφοδοσίας
      description: Προσδιορίζει τον μηχανισμό διανομής που χρησιμοποιεί ο τροφοδότης
        για την απελευθέρωση της τροφής.
    feijoa_cultivar:
      name: Ποικιλία Feijoa
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία ή ποικιλία feijoa, καθώς
        διαφορετικές ποικιλίες προσφέρουν ξεχωριστές γεύσεις, μέγεθος και χρόνους
        συγκομιδής.
    felt_duty:
      name: Κατηγορία χρήσης τσόχας
      description: Καθορίζει την κατηγορία χρήσης της τσόχας της μπάλας τένις (π.χ.
        βαριά χρήση, κανονική χρήση), η οποία επηρεάζει την αντοχή της σε διαφορετικές
        επιφάνειες.
    felting_mold_intended_use:
      name: Προβλεπόμενη χρήση καλουπιού για τσόχα
      description: Καθορίζει τι προορίζεται να δημιουργήσει ή σε τι χρησιμοποιείται
        το καλούπι σε έργα τσόχας.
    felting_pad_surface_material:
      name: Υλικό επιφάνειας τάπητα από τσόχα
      description: Υλικό της επιφάνειας εργασίας του τάπητα τσόχας που έρχεται σε
        επαφή με τις ίνες ή τη βελόνα.
    fencing_certification:
      name: Πιστοποίηση ξιφασκίας
      description: Απαριθμεί τις εγκρίσεις από επίσημους διοικητικούς φορείς που πληροί
        το όπλο ξιφασκίας (π.χ. FIE, USFA), υποδεικνύοντας την καταλληλότητα για αγώνες
        και τα πρότυπα ποιότητας.
    fencing_connector_type:
      name: Τύπος συνδέσμου περίφραξης
      description: Καθορίζει τη διαμόρφωση του συνδέσμου που χρησιμοποιείται για τη
        σύνδεση καλωδίων περίφραξης, υποδοχών ή καρουλιών (π.χ. 2 πείρων, 3 πείρων,
        bayonet), εξασφαλίζοντας τη συμβατότητα των εξαρτημάτων.
    fencing_discipline:
      name: Πειθαρχία ξιφασκίας
      description: Καθορίζει το όπλο ή το άθλημα ξιφασκίας για το οποίο έχει σχεδιαστεί
        ή με το οποίο είναι συμβατό το προϊόν.
    fencing_weapon_type:
      name: Τύπος όπλου ξιφασκίας
      description: Καθορίζει το στυλ όπλου ξιφασκίας ή εξάσκησης με το οποίο είναι
        συμβατό ή αντιπροσωπεύει το βοήθημα εκπαίδευσης, βοηθώντας τους χρήστες να
        βρουν τον κατάλληλο εξοπλισμό.
    fender_finish_state:
      name: Κατάσταση φινιρίσματος φτερού
      description: Υποδεικνύει την κατάσταση επιφάνειας/φινιρίσματος του φτερού όπως
        παρέχεται, σε σχέση με την ετοιμότητά του για βαφή και εγκατάσταση.
    fender_pieces_included:
      name: Περιλαμβάνονται εξαρτήματα φτερού
      description: Απαριθμεί τα εξαρτήματα που περιλαμβάνονται στο προϊόν, διευκρινίζοντας
        αν πρόκειται για ένα μόνο φτερό ή για πλήρες σετ με αξεσουάρ.
    fender_type:
      name: Τύπος φτερού
      description: Ταξινομεί το συνολικό σχέδιο ή στυλ του φτερού.
    fennel_trimming:
      name: Κλάδεμα μάραθου
      description: Υποδεικνύει ποια μέρη του φυτού περιλαμβάνονται στον βολβό του
        μάραθου (π.χ., με φύλλα, κομμένη κορυφή και ρίζα).
    fennel_variety:
      name: Ποικιλία μάραθου
      description: Καθορίζει την ποικιλία καλλιέργειας ή αγορά των βολβών μάραθου
        που πωλούνται.
    fermentation_application:
      name: Εφαρμογή ζύμωσης
      description: Καθορίζει το βασικό τρόφιμο ή ποτό για το οποίο προορίζεται η καλλιέργεια
        ζύμωσης (π.χ. τυρί, γιαούρτι, κεφίρ γάλακτος, προζύμι).
    fermentation_method:
      name: Μέθοδος ζύμωσης
      description: Καθορίζει τον τρόπο παραγωγής ή ζύμωσης της σάλτσας σόγιας (π.χ.,
        φυσικής παρασκευής, χημικής υδρόλυσης).
    fermentation_vessel_material:
      name: Υλικό δοχείου ζύμωσης
      description: Πρωτογενές υλικό του δοχείου ζύμωσης που περιλαμβάνεται στο κιτ
        (εάν υπάρχει).
    ferrule_material:
      name: Υλικό δακτυλίου σύνδεσης
      description: Καθορίζει το υλικό που χρησιμοποιείται για τον ακροδέκτη του άξονα
        (π.χ. Juma, φαινολικό, πολυανθρακικό, XTC ή κανένα), επηρεάζοντας την αντοχή
        και την αίσθηση κρούσης.
    fia_homologation_certification:
      name: Πιστοποίηση/ομοσπονδιακή έγκριση FIA
      description: Υποδεικνύει εάν το αυτοκίνητο (ή ο κλωβός ασφαλείας) είναι πιστοποιημένο/εγκεκριμένο
        και σύμφωνα με ποιο πρότυπο.
    fiber_animal_source_type:
      name: Τύπος ζωικής προέλευσης/πηγής της ίνας
      description: Το ζώο ή η κύρια πηγή από την οποία προέρχεται το roving (ή συνθετικό
        υλικό), όπως μαλλί merino, αλπακά ή φυτικές ίνες.
    fiber_luster_level:
      name: Επίπεδο λάμψης ινών
      description: Οπτική λάμψη της ίνας, που κυμαίνεται από ματ έως υψηλή λάμψη.
    fiber_preparation_processing_stage:
      name: Στάδιο προετοιμασίας / επεξεργασίας ινών
      description: Υποδεικνύει τον τρόπο προετοιμασίας/επεξεργασίας του sliver για
        χρήση (π.χ. καρνταρισμένο ή χτενισμένο, σύμμεικτο, superwash).
    fiber_preparation_type:
      name: Τύπος παρασκευής ινών
      description: Καθορίζει τον τρόπο προετοιμασίας της ίνας για χειροτεχνία (π.χ.
        carded batt, drum-carded, φύλλο prefelt).
    field_hockey_ball_playing_surface:
      name: Επιφάνεια παιχνιδιού μπάλας χόκεϊ επί χόρτου
      description: Προσδιορίζει την επιφάνεια παιχνιδιού ή το περιβάλλον για το οποίο
        έχει σχεδιαστεί η μπάλα.
    field_hockey_ball_type:
      name: Τύπος μπάλας χόκεϊ επί χόρτου
      description: Κατηγοριοποιεί την μπάλα του χόκεϊ επί χόρτου με βάση την προβλεπόμενη
        χρήση ή το ειδικό χαρακτηριστικό της.
    field_hockey_goal_size_standard:
      name: Πρότυπο μέγεθος γκολ χόκεϊ επί χόρτου
      description: Κατηγοριοποιεί το τέρμα σύμφωνα με τα πρότυπα ή τα μεγέθη προπόνησης
        του χόκεϊ επί χόρτου (π.χ. επίσημο FIH, για νέους, μίνι).
    field_hockey_training_objective:
      name: Στόχος προπόνησης χόκεϊ επί χόρτου
      description: Ορίζει την κύρια δεξιότητα ή την περιοχή εστίασης που έχει σχεδιαστεί
        για να βελτιώσει το εκπαιδευτικό βοήθημα.
    field_point_attachment_method:
      name: Μέθοδος προσάρτησης field point
      description: Υποδεικνύει τον τρόπο με τον οποίο το field point στερεώνεται στον
        άξονα ή το ένθετο βέλους (π.χ. βιδωμένο, κολλημένο).
    field_point_tip_style:
      name: Στυλ άκρου field point
      description: Καθορίζει το γεωμετρικό σχήμα ή το λειτουργικό προφίλ της άκρης
        του field point, επηρεάζοντας τη διείσδυση, την ευκολία αφαίρεσης και τη νομιμότητα.
    fielding_glove_position:
      name: Θέση γαντιού στο fielding
      description: Προσδιορίζει την αμυντική θέση ή τη χρήση για την οποία έχει σχεδιαστεί
        το γάντι στο μπέιζμπολ ή του σόφτμπολ.
    fielding_training_focus:
      name: Εστίαση προπόνησης fielding
      description: Καθορίζει την κύρια δεξιότητα που στοχεύει το βοήθημα κατά τη διάρκεια
        των προπονήσεων.
    fig_variety:
      name: Ποικιλία σύκου
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία σύκου που πωλείται.
    figure_8_device_design:
      name: Σχεδιασμός συσκευής σχήματος 8
      description: Προσδιορίζει τη συγκεκριμένη διαμόρφωση της συσκευής του σχήματος
        8, η οποία επηρεάζει τα χαρακτηριστικά διακίνησης και την προβλεπόμενη χρήση.
    figure_finish_type:
      name: Τύπος φινιρίσματος φιγούρας
      description: Υποδεικνύει την επιφάνεια/το φινίρισμα χρώματος της φιγούρας του
        μοντέλου αλόγου (εμφάνιση/αίσθηση ως συλλεκτικό αντικείμενο).
    figurine_scale:
      name: Κλίμακα φιγούρας
      description: Κλίμακα/αναλογία της φιγούρας σε σχέση με το πραγματικό αντικείμενο
        (όπου εφαρμόζεται), π.χ. 1:6.
    fill_status:
      name: Κατάσταση πλήρωσης
      description: Υποδεικνύει αν το dummy πάλης πωλείται γεμισμένο, άδειο ή μερικώς
        γεμισμένο, επηρεάζοντας το κόστος αποστολής και την προσπάθεια του αγοραστή.
    filling_consistency:
      name: Συνοχή πλήρωσης
      description: Περιγράφει την υφή ή το ιξώδες της γέμισης όπως παρέχεται (π.χ.
        λεία κρέμα, κομμάτια φρούτου, πάστα).
    filling_type:
      name: Τύπος πλήρωσης
      description: Καθορίζει την κύρια γέμιση ή κρέμα μέσα στο cookie, εάν υπάρχει.
    filtration_and_mother_status:
      name: Κατάσταση φιλτραρίσματος και «mother»
      description: Υποδεικνύει αν το ξίδι είναι φιλτραρισμένο, αφιλτράριστο, ωμό ή
        αν περιέχει τη «mother», καλύπτοντας καταναλωτές που αναζητούν προβιοτικές
        ή ανεπεξέργαστες επιλογές.
    filtration_method:
      name: Μέθοδος διήθησης
      description: Υλικό ή τεχνική που χρησιμοποιείται για το φιλτράρισμα και τον
        καθαρισμό της βότκας μετά την απόσταξη.
    fin_box_system:
      name: Σύστημα κιβωτίου πτερυγίων
      description: Καθορίζει τον τύπο πτερυγίων/συστήματος στήριξης των πτερυγίων
        της σανίδας, που επηρεάζει τη συμβατότητα με aftermarket πτερύγια.
    fin_buoyancy:
      name: Πλευστότητα πτερυγίων
      description: Υποδεικνύει αν το πτερύγιο είναι θετικά, ουδέτερα ή αρνητικά πλευστό
        στο νερό, επηρεάζοντας την ισορροπία και τη διαχείριση της άνωσης του δύτη.
    fin_flex_rating:
      name: Βαθμός ευκαμψίας πτερυγίου
      description: Υποδεικνύει τη σχετική ακαμψία ή το επίπεδο ευκαμψίας του πτερυγίου,
        που επηρεάζει τη συνολική απόδοση.
    fin_mounting_system:
      name: Σύστημα τοποθέτησης πτερυγίου
      description: Καθορίζει τη διεπαφή ή το πρότυπο στερέωσης που χρησιμοποιείται
        για την τοποθέτηση του πτερυγίου στη σανίδα kiteboard (π.χ. FCS II, βιδωτό,
        4 οπών), εξασφαλίζοντας τη συμβατότητα μεταξύ πτερυγίων και σανίδων.
    fin_position:
      name: Θέση πτερυγίου
      description: Καθορίζει την προβλεπόμενη θέση τοποθέτησης του πτερυγίου στη σανίδα.
    fin_strap_type:
      name: Τύπος ιμάντα πτερυγίου
      description: Καθορίζει το στυλ ιμάντα ή συστήματος συγκράτησης που χρησιμοποιείται
        για τη στερέωση του πτερυγίου στη φτέρνα/πόδι.
    fin_template:
      name: Πρότυπο πτερυγίου
      description: Κατηγοριοποιεί το υδροδυναμικό πρότυπο ή το περίγραμμα του πτερυγίου
        της σανίδας σερφ, επηρεάζοντας το στυλ στροφής, την ταχύτητα και τη συνολική
        αίσθηση της σανίδας.
    finger_count:
      name: Αριθμός δακτύλων
      description: Υποδεικνύει τον αριθμό δακτύλων για τον οποίο έχει σχεδιαστεί το
        γάντι, η γλωττίδα ή η λαβή απελευθέρωσης.
    finger_coverage:
      name: Κάλυψη δακτύλων
      description: Υποδεικνύει το μέρος από τα δάχτυλα που καλύπτεται.
    finger_grip_adjustability:
      name: Ρυθμιζόμενη λαβή δακτύλων
      description: Υποδεικνύει τον τρόπο με τον οποίο η λαβή δακτύλων προσαρτάται
        ή ρυθμίζεται ώστε να εφαρμόζει σε διαφορετικά μεγέθη χεριών.
    finger_hole_configuration:
      name: Διαμόρφωση οπής δακτύλου
      description: Καθορίζει τον προσανατολισμό των οπών των δακτύλων για το χέρι
        (δεξιόχειρας, αριστερόχειρας ή αμφιδέξιος).
    finger_hole_count:
      name: Αριθμός οπών δακτύλου
      description: Αναφέρει τον αριθμό οπών δακτύλων στο δερμάτινο grip, μια βασική
        διαφορά στυλ μεταξύ μοντέλων χωρίς δάχτυλα, 2 οπών, 3 οπών και 4 οπών.
    finger_pick_band_style:
      name: Στυλ δακτυλίου finger pick
      description: Στυλ της ταινίας/θηλιάς που στερεώνεται στο δάχτυλο, που επηρεάζει
        την άνεση και τη δυνατότητα ρύθμισης.
    finger_pick_blade_length:
      name: Μήκος λεπίδας finger pick
      description: Μήκος της λεπίδας πένας που προεξέχει από τον δακτύλιο στήριξης.
    finger_pick_blade_shape:
      name: Σχήμα λεπίδας πένας δακτύλου
      description: Σχήμα/προφίλ της επιφάνειας πένας (λεπίδας) που έρχεται σε επαφή
        με τις χορδές.
    finger_pick_size:
      name: Μέγεθος finger pick
      description: Μέγεθος του δακτυλίου/θηλιάς του finger pick ώστε να εφαρμόζει
        σε διαφορετικές περιμέτρους δακτύλων ή αντίχειρα (όχι μέγεθος οργάνου).
    finger_pick_wear_location:
      name: Θέση χρήσης finger pick
      description: Υποδεικνύει σε ποιο δάχτυλο προορίζεται να φορεθεί το finger pick
        ή αν το προϊόν είναι σετ για αντίχειρα και δάχτυλα.
    finger_protection:
      name: Προστασία των δακτύλων
      description: Υποδεικνύει αν το γάντι διαθέτει προστασία δακτύλων με ενισχυτικό
        σκελετό και αν αυτός είναι αφαιρούμενος.
    fingerboard_bearing_type:
      name: Τύπος ρουλεμάν ταστιέρας
      description: Καθορίζει τον τύπο ρουλεμάν που χρησιμοποιείται στα ροδάκια ταστιέρας.
    fingerboard_grip_type:
      name: Τύπος πρόσφυσης ταστιέρας
      description: Καθορίζει το υλικό/τύπο της επιφάνειας λαβής που χρησιμοποιείται
        στην ταστιέρα.
    fining_agent_active_ingredient:
      name: Ενεργό συστατικό του μέσου διαύγασης
      description: ο μέσο διαύγασης ή καθαρισμού που χρησιμοποιείται στο προϊόν.
    fining_agent_type:
      name: Τύπος παράγοντα διαύγασης
      description: Καθορίζει τη χημεία ή το υλικό του μέσου διαύγασης/καθαρισμού για
        προϊόντα που διαυγάζουν το κόκκινο κρασί.
    finish_after_baking:
      name: Φινίρισμα μετά το ψήσιμο
      description: Περιγράφει την τυπική εμφάνιση της επιφάνειας μετά τη σκλήρυνση/ψήσιμο.
    finish_effect:
      name: Εφέ φινιρίσματος
      description: Περιγράφει ειδικά επιφανειακά ή οπτικά εφέ που εφαρμόζονται στο
        στρας.
    finish_type:
      name: Τύπος φινιρίσματος
      description: Φινίρισμα επιφάνειας που εφαρμόζεται στο σώμα του γιουκαλίλι.
    finished_product_format:
      name: Μορφή τελικού προϊόντος
      description: Καθορίζει τον τύπο του αρωματικού προϊόντος που προορίζεται να
        παράγει το κιτ.
    fire_pit_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ εστίας φωτιάς
      description: Απαριθμεί τα σημαντικά αξεσουάρ που περιλαμβάνονται με το τζάκι
        εξωτερικού χώρου, όπως προστατευτικά πλέγματα σπινθήρων ή πέτρες λάβας, διευκρινίζοντας
        τι περιέχεται στη συσκευασία.
    firework_assortment_launch_type:
      name: Τύπος εκτόξευσης ποικιλίας πυροτεχνημάτων
      description: Περιγράφει τον τρόπο με τον οποίο τα περιλαμβανόμενα πυροτεχνήματα
        συνήθως ανάβουν ή εκτοξεύονται.
    firework_assortment_types_included:
      name: Περιλαμβάνονται είδη συλλογής πυροτεχνημάτων
      description: Προσδιορίζει τους κύριους τύπους πυροτεχνημάτων που περιλαμβάνονται
        στην ποικιλία για να βοηθήσει τους αγοραστές να συγκρίνουν τα περιεχόμενα
        (π.χ. σιντριβάνια, ρωμαϊκά κεριά, κροτίδες).
    firework_effect_types:
      name: Τύποι εφέ πυροτεχνημάτων
      description: Πρωτογενείς οικογένειες οπτικών ή/και αισθητηριακών εφέ που παράγονται
        από την ποικιλία (επιλέγω όλα όσα ισχύουν).
    firework_ignition_method:
      name: Μέθοδος ανάφλεξης πυροτεχνημάτων
      description: Καθορίζει τον τρόπο ανάφλεξης ή πυροδότησης του πυροτεχνήματος
        (π.χ., φυτίλι ή ηλεκτρικό σπίρτο).
    firework_visual_intensity_level:
      name: Επίπεδο οπτικής έντασης πυροτεχνημάτων
      description: Συνολική οπτική ένταση/όγκος σπινθήρων του εφέ σιντριβανιού.
    firing_mode:
      name: Λειτουργία πυροδότησης
      description: Απαριθμεί τις διαθέσιμες ή κύριες λειτουργίες βολής που υποστηρίζει
        το πιστόλι airsoft.
    first_day_cover_cachet_type:
      name: Τύπος διακοσμητικής σήμανση) του φακέλου πρώτης ημέρας κυκλοφορίας
      description: Τύπος σφραγίδας (cachet) στον φάκελο πρώτης ημέρας (π.χ. τυπωμένη,
        χειροποίητη).
    first_day_cover_cancellation_type:
      name: Τύπος ακύρωσης κάλυψης πρώτης ημέρας
      description: Τύπος/στυλ ταχυδρομικής ακύρωσης που εφαρμόζεται την πρώτη ημέρα
        κάλυψης (π.χ. μηχανική ακύρωση, χειροκίνητη ακύρωση).
    first_day_cover_set_type:
      name: Τύπος σετ καλύμματος πρώτης ημέρας
      description: Υποδεικνύει εάν το εξώφυλλο αντιπροσωπεύει ένα μόνο τεύχος, ένα
        πλήρες σύνολο ή ένα υποσύνολο/συνδυασμό.
    fishing_hook_size:
      name: Αγκίστρι ψαρέματος
      description: 'Καθορίζει το τυποποιημένο μέγεθος του αγκιστριού ψαρέματος (π.χ.
        #4, 1/0, 10/0), βοηθώντας τους ψαράδες να επιλέξουν το κατάλληλο μέγεθος ανάλογα
        με το είδος-στόχο και το δόλωμα.'
    fishing_hook_style:
      name: Στυλ αγκιστριού ψαρέματος
      description: Προσδιορίζει τον συγκεκριμένο σχεδιασμό ή το μοτίβο κάμψης του
        μονού αγκιστριού, το οποίο επηρεάζει την παρουσίαση, την αποτελεσματικότητα
        του αγκιστριού και την προβλεπόμενη εφαρμογή.
    fishing_hook_type:
      name: Τύπος αγκιστριού ψαρέματος
      description: Περιγράφει τη διαμόρφωση του αγκιστριού που διαθέτει το κουτάλι
        ψαρέματος (εάν υπάρχει).
    fishing_line_application:
      name: Πετονιά ψαρέματος
      description: Προσδιορίζει την προβλεπόμενη χρήση του υλικού πετονιάς ή οδηγού
        (π.χ., οδηγός, κύρια πετονιά, παράμαλο).
    fishing_line_buoyancy_type:
      name: Τύπος πλευστότητας πετονιάς
      description: Ταξινομεί τον τρόπο συμπεριφοράς της πετονιάς στη στήλη του νερού
        (π.χ., επιπλέουσα, ενδιάμεση, βυθιζόμενη), βοηθώντας τους ψαράδες να επιλέξουν
        μια κατάλληλη παρουσίαση βάθους.
    fishing_needle_purpose:
      name: Σκοπός της βελόνας ψαρέματος
      description: Προσδιορίζει την κύρια εφαρμογή της βελόνας σε εργασίες αλιευτικού
        εξοπλισμού.
    fishing_needle_types_included:
      name: Περιλαμβάνονται τύποι βελονών ψαρέματος
      description: Απαριθμεί τους συγκεκριμένους τύπους βελονών ή εργαλείων αρματώματος
        που περιλαμβάνονται στο σετ, ώστε οι πελάτες να βλέπουν εύκολα το περιεχόμενο
        του κιτ.
    fit_profile:
      name: Προσαρμογή προφίλ
      description: Περιγράφει τη συνολική γραμμή και σιλουέτα του προστατευτικού,
        η οποία επηρεάζει την κινητικότητα και την κάλυψη.
    fit_volume_classification:
      name: Ταξινόμηση όγκου προσαρμογής
      description: Κατηγοριοποιεί τον συνολικό εσωτερικό όγκο του παπουτσιού όπως
        τον ορίζουν οι κατασκευαστές (π.χ. LV για χαμηλό όγκο).
    fitting_angle:
      name: Γωνία τοποθέτησης
      description: Καθορίζει τη γωνία κάμψης του σώματος προσαρμογής (π.χ., ευθεία,
        45°, 90°). Χρησιμοποιήστε την επιλογή «Ρυθμιζόμενο / περιστρεφόμενο» για εξαρτήματα
        με μεταβλητή γωνία και την επιλογή «Άλλο» για ασυνήθιστες γωνίες.
    flag_base_type:
      name: Τύπος βάσης σημαίας
      description: Ορίζει το στυλ αγκύρωσης ή βάσης που χρησιμοποιείται για τη στερέωση
        της σημαίας του κόρνερ σε διαφορετικές επιφάνειες παιχνιδιού.
    flag_design_theme:
      name: Θέμα σχεδιασμού σημαίας
      description: Περιγράφει το κύριο θέμα σχεδίασης που αντιπροσωπεύεται στη σημαία
        (π.χ. χώρα/εθνική ομάδα, αθλητική ομάδα, εορτή), υποστηρίζοντας την ανακάλυψη
        και το φιλτράρισμα για αγορές βάσει πρόθεσης.
    flag_mounting_method:
      name: Μέθοδος στερέωσης σημαίας
      description: Καθορίζει τον τρόπο με τον οποίο η σημαία στερεώνεται στο όχημα
        (π.χ., βάση κεραίας, βάση ρυμούλκησης, μαγνητική).
    flag_type:
      name: Τύπος σημαίας
      description: Κατηγοριοποιεί τη συγκεκριμένη χρήση ή τον τύπο της σημαίας γκολφ,
        όπως σημαία πιν, σημαία καροτσιού ή σημαία προπόνησης.
    flame_resistance_standard:
      name: Πρότυπο αντοχής στη φλόγα
      description: Υποδεικνύει το συγκεκριμένο πρότυπο ή πιστοποίηση αντοχής στη φλόγα
        ή σε ηλεκτρικό τόξο που πληροί το ένδυμα.
    flamenco_cajon_snare_system:
      name: Σύστημα ταμπούρου cajón flamenco
      description: Καθορίζει τον εσωτερικό μηχανισμό παγίδευσης που χρησιμοποιείται
        για να δημιουργήσει τον χαρακτηριστικό βόμβο (ή καθόλου) του φλαμένκο.
    flammability_compliance:
      name: Συμμόρφωση με την ευφλεκτότητα
      description: Καθορίζει τα ισχύοντα πρότυπα αναφλεξιμότητας που πληροί το ύφασμα
        για εσωτερικούς χώρους οχημάτων.
    flannel_brushing_finish:
      name: Φινίρισμα βουρτσίσματος φανέλας
      description: Υποδεικνύει αν η φανέλα έχει υποστεί βούρτσισμα και σε ποια πλευρά/πλευρές,
        επηρεάζοντας την απαλότητα, τη θερμότητα και την εμφάνιση.
    flannel_use_type:
      name: Τύπος χρήσης φανέλας
      description: Κύρια προβλεπόμενη χρήση του κομματιού/ρολού φανέλας.
    flap_configuration:
      name: Διαμόρφωση πτερυγίου
      description: Καθορίζει το στυλ πτερυγίου της σέλας, όπως μονό ή διπλό πτερύγιο.
    flare_color:
      name: Χρώμα φωτοβολίδας
      description: Χρώμα του εκπεμπόμενου φωτός/φλόγας (ή χρώμα φακού για LED φωτοβολίδες).
    flash_card_included_features:
      name: Χαρακτηριστικά που περιλαμβάνει η κάρτα flash
      description: Επισημαίνει λειτουργικά χαρακτηριστικά εκμάθησης ή χρήσης που περιλαμβάνονται
        στις κάρτες flash.
    flavor_intensity:
      name: Ένταση γεύσης
      description: Υποδεικνύει τη συγκέντρωση του αρωματικού προϊόντος, βοηθώντας
        στον καθορισμό της κατάλληλης δοσολογίας (π.χ. κανονική ισχύς, υπερ-συμπυκνωμένο).
    flavor_solvent_base:
      name: Βάση διαλύτη αρώματος
      description: Προσδιορίζει την κύρια μεταφορά ή διαλύτη που χρησιμοποιείται στην
        αρωματική ύλη (π.χ. αλκοόλη, προπυλενογλυκόλη, γλυκερίνη).
    fleece_fiber_animal_type:
      name: Τύπος ζώου προέλευσης της ίνας fleece
      description: Το είδος ζώου από το οποίο προέρχεται η ίνα fleece (είδος).
    fleece_finish_surface:
      name: Φινίρισμα / επιφάνεια από fleece
      description: Περιγράφει την επιφάνεια/φινίρισμα του fleece (π.χ. anti-pill,
        βουρτσισμένο), το οποίο επηρεάζει τη δημιουργία κόμπων, την απαλότητα και
        την εμφάνιση.
    fleece_preparation_method:
      name: Μέθοδος προετοιμασίας fleece
      description: Περιγράφει τον τρόπο προετοιμασίας/επεξεργασίας του fleece για
        χειροτεχνία και γνέσιμο (κατάσταση της ίνας).
    flesh_color:
      name: Χρώμα σάρκας
      description: Καθορίζει το εσωτερικό χρώμα της σάρκας του πεπονιού.
    fletching_orientation:
      name: Προσανατολισμός φτερώματος
      description: Καθορίζει τον τρόπο τοποθέτησης των φτερωμάτων στο στέλεχος (π.χ.
        ευθεία, με μετατόπιση, ελικοειδής), επηρεάζοντας την περιστροφή και την πτήση
        του βέλους.
    fletching_profile:
      name: Προφίλ φτερώματος
      description: Καθορίζει το γεωμετρικό σχήμα ή την κοπή του φτερώματος, η οποία
        επηρεάζει την αντίσταση, την απόσταση από το τόξο, τον θόρυβο και τα συνολικά
        χαρακτηριστικά πτήσης του βέλους.
    flight_system_type:
      name: Τύπος συστήματος πτέρυγας
      description: Προσδιορίζει το στυλ κατασκευής της πτέρυγας, διακρίνοντας μεταξύ
        πτυσσόμενων, χυτευμένων και ολοκληρωμένων συστημάτων πτέρυγας και άξονα.
    float_attachment_method:
      name: Τρόπος στερέωσης του φλοτέρ
      description: Περιγράφει τον τρόπο με τον οποίο ο φελλός προσαρτάται στη πετονιά
        (π.χ. συρόμενος ή σταθερός), επιτρέποντας στους ψαράδες να πραγματοποιούν
        φιλτράρισμα ανάλογα με το στήσιμο του εξοπλισμού.
    float_design:
      name: Σχεδιασμός φελλού
      description: Κατηγοριοποιεί το συνολικό στυλ ή τύπο του φελλού ψαρέματος (π.χ.
        bobber, waggler, pencil), ώστε οι ψαράδες να επιλέγουν γρήγορα το κατάλληλο
        μοντέλο για την τεχνική και τις συνθήκες τους.
    float_raft_use_environment:
      name: Περιβάλλον χρήσης φουσκωτού/σχεδίας
      description: Κύριο περιβάλλον νερού για το φουσκωτό (πισίνα, ήρεμα ανοιχτά νερά
        ή κύμα), που αντικατοπτρίζει τις απαιτήσεις αντοχής και σχεδιασμού.
    floatation:
      name: Επίπλευση
      description: Εάν ο φάρος έχει σχεδιαστεί για να επιπλέει στο νερό.
    floor_construction_type:
      name: Τύπος κατασκευής δαπέδου
      description: Καθορίζει τον σχεδιασμό του δαπέδου της σχεδίας (π.χ. αυτοαποστραγγιζόμενο,
        drop-stitch), ο οποίος επηρεάζει την αποστράγγιση, την ακαμψία και την απόδοση.
    floor_design:
      name: Σχέδιο δαπέδου
      description: Στυλ καλύμματος εδάφους που παρέχεται με το περίβλημα.
    floor_inclusion:
      name: Συμπερίληψη δαπέδου
      description: Αναφέρει εάν ο προθάλαμος περιλαμβάνει δάπεδο και εάν το δάπεδο
        αυτό είναι αφαιρούμενο.
    floor_mat_cleaning_method:
      name: Μέθοδος καθαρισμού για πατάκι δαπέδου
      description: Υποδεικνύει τη συνιστώμενη μέθοδο πρωτογενούς καθαρισμού του κατασκευαστή
        για το πατάκι.
    floor_mat_edge_style:
      name: Στυλ άκρης για πατάκι δαπέδου
      description: Περιγράφει εάν το πατάκι έχει υπερυψωμένες άκρες/χείλος για να
        συγκρατεί διαρροές και υπολείμματα.
    floor_mat_format:
      name: Μορφή για πατάκι δαπέδου
      description: Καθορίζει τη φυσική μορφή ή το στυλ του προϊόντος προστασίας δαπέδου
        (π.χ. μονό πατάκι, κουμπωτά πλακίδια, ρολό).
    floor_mat_retention_system:
      name: Σύστημα συγκράτησης για πατάκι δαπέδου
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για να διατηρείται το πατάκι
        ασφαλισμένο στη θέση του.
    floor_mat_set_configuration:
      name: Διαμόρφωση σετ με πατάκι δαπέδου
      description: Υποδεικνύει ποιες θέσεις περιλαμβάνονται στη συσκευασία (π.χ. μόνο
        μπροστινό ζεύγος, πλήρες σετ).
    floss_sugar_granulation_grade:
      name: Βαθμός κοκκοποίησης ζάχαρης για μαλλί της γριάς
      description: Περιγράφει το μέγεθος των κρυστάλλων του μείγματος ζάχαρης (λεπτό,
        μέτριο, χονδρό), το οποίο μπορεί να επηρεάσει την απόδοση της μηχανής και
        την τελική υφή.
    floss_sugar_product_form:
      name: Μορφή προϊόντος ζάχαρης για μαλλί της γριάς
      description: Υποδεικνύει αν η ζάχαρη για μαλλί της γριάς είναι έτοιμη προς χρήση,
        συμπυκνωμένο άρωμα που απαιτεί ανάμιξη με βασική ζάχαρη ή άχρωμη βασική ζάχαρη.
    flour_grind_texture:
      name: Υφή άλεσης αλευριού
      description: Υποδεικνύει το μέγεθος άλεσης ή την υφή του αλευριού, όπως πολύ
        ψιλό, μεσαίο, χοντρό ή αλεσμένο σε πέτρινο μύλο, κάτι που επηρεάζει την απόδοση
        στη συνταγή.
    flour_processing_method:
      name: Μέθοδος επεξεργασίας αλεύρων
      description: Καταγράφει τις βασικές μεθόδους επεξεργασίας ή κατεργασίας του
        αλευριού (π.χ. άλεση σε πέτρινο μύλο, λεύκανση, βλάστηση, εμπλουτισμός), που
        επηρεάζουν τη γεύση, το χρώμα ή τη θρεπτική αξία.
    flower_care_instructions:
      name: Οδηγίες φροντίδας λουλουδιών
      description: Παρέχει συνιστώμενες οδηγίες φροντίδας ειδικά για φρέσκα κομμένα
        λουλούδια (π.χ. κόψιμο των βλαστών, συχνότητα αλλαγής νερού).
    flugelhorn_leadpipe_material:
      name: Υλικό σωλήνα εισαγωγής φλικόρνου
      description: Υλικό του εξαρτήματος του κεντρικού σωλήνα (εάν καθορίζεται ξεχωριστά
        από το συνολικό υλικό του οργάνου).
    flugelhorn_trigger_type:
      name: Τύπος στοιχείου ενεργοποίησης φλικόρνου
      description: Υποδεικνύει αν το φλικόρνο διαθέτει μηχανισμό ρύθμισης και σε ποια
        αντλία/βαλβίδα λειτουργεί.
    fluorescence_grade:
      name: Βαθμός φθορισμού
      description: Υποδεικνύει την ένταση φθορισμού του διαμαντιού όταν εκτίθεται
        σε υπεριώδες φως (UV).
    fluorescence_under_uv:
      name: Φθορισμός υπό υπεριώδη ακτινοβολία
      description: Υποδεικνύει εάν/τι είδους φθορισμό εμφανίζει το δείγμα υπό υπεριώδη
        ακτινοβολία.
    fluorocarbon_content:
      name: Περιεκτικότητα σε φθοριοάνθρακα
      description: Υποδεικνύει αν το κερί περιέχει πρόσθετα φθοριοανθράκων και σε
        ποιο επίπεδο.
    flute_case_capacity:
      name: Χωρητικότητα θήκης φλάουτου
      description: Υποδεικνύει τι έχει σχεδιαστεί να χωράει η θήκη, πέρα από το κύριο
        σώμα της φλογέρας (π.χ. φλογέρα + piccolo, επιπλέον κεφαλή).
    flute_cleaning_rod_tip_type:
      name: Τύπος άκρης ράβδου καθαρισμού φλογέρας
      description: Περιγράφει τον σχεδιασμό της άκρης της ράβδου που συγκρατεί το
        πανί/στυλεό ή έρχεται σε επαφή με το όργανο (π.χ. σχιστή, με σπείρωμα, με
        κρίκο).
    flute_footjoint_type:
      name: Τύπος άρθρωσης ποδιού φλάουτου
      description: Καθορίζει τη διαμόρφωση της άρθρωσης του ποδιού του φλάουτου.
    flute_headjoint_cork_type:
      name: Τύπος φελλού κεφαλής φλογέρας
      description: Καθορίζει το υλικό/τύπο του συγκροτήματος φελλού ή στοπ της κεφαλής
        που παρέχεται με την κεφαλή του οργάνου.
    flute_key_system:
      name: Σύστημα κλειδιών φλάουτου
      description: Καθορίζει το μηχανικό/κλειδοσύστημα της φλογέρας (π.χ. σύστημα
        Boehm), όπου εφαρμόζεται.
    flute_keywork_material:
      name: Υλικό μηχανισμού κλειδιών φλάουτου
      description: Υλικό ή/και επιμετάλλωση των κλειδιών (κλειδοκατασκευή), όταν καθορίζεται
        ξεχωριστά από το υλικό του σώματος.
    flute_offset_g:
      name: Μετατοπισμένο G φλάουτου
      description: Καθορίζει εάν το φλάουτο διαθέτει διάταξη με μετατοπισμένο κλειδί
        G.
    flute_wall_thickness:
      name: Πάχος τοιχώματος φλάουτου
      description: Κατηγορία πάχους τοιχώματος του σωλήνα του φλάουτου (λεπτού τοιχώματος,
        τυπικού, παχέος τοιχώματος).
    fly_pattern_type:
      name: Τύπος μοτίβου τεχνητής μύγας
      description: Ταξινομεί το τεχνητό δόλωμα (μύγα) με βάση το στυλ ψαρέματος ή
        την απομίμηση εντόμων/φυσικής τροφής, για να βοηθήσει τους ψαράδες να φιλτράρουν
        γρήγορα το σωστό στυλ μύγας.
    fly_rod_style:
      name: Στυλ καλαμιού για τεχνητή μύγα
      description: Ταξινομεί το καλάμι ανάλογα με την τεχνική ρίψης (casting) ή τη
        χρήση για την οποία προορίζεται (π.χ., Μονόχειρο/Single-hand, Switch, Spey).
    fly_style:
      name: Τύπος δολώματος
      description: Καθορίζει τον τύπο της πατιλέτας ή του μπροστινού ανοίγματος στο
        ισοθερμικό παντελόνι.
    fly_tying_tools_included:
      name: Περιλαμβάνονται εργαλεία κατασκευής τεχνητών μυγών (δολωμάτων)
      description: Παραθέτει τα συγκεκριμένα εργαλεία κατασκευής τεχνητών μυγών που
        παρέχονται στο σετ, ώστε ο αγοραστής να γνωρίζει ακριβώς τι περιλαμβάνεται
        και να μπορεί να συγκρίνει τα σετ.
    fly_type:
      name: Τύπος πατιλέτας
      description: Καθορίζει εάν το το ισοθερμικό παντελόνι διαθέτει λειτουργική πατιλέτα
        και το στυλ αυτής της πατιλέτας.
    flyer_hook_mounting_method:
      name: Μέθοδος τοποθέτησης αγκίστρου του ιπτάμενου αντικειμένου
      description: Ο τρόπος με τον οποίο το άγκιστρο στερεώνεται στο ιπτάμενο αντικείμενο
        (π.χ., βιδωτό έναντι κουμπωτού), γεγονός που επηρεάζει τη δυνατότητα εγκατάστασης
        και τη συμβατότητα.
    flyer_hook_orientation:
      name: Προσανατολισμός αγκίστρου του ιπτάμενου αντικειμένου
      description: Εάν το άγκιστρο προορίζεται για την αριστερή ή τη δεξιά πλευρά
        του ιπτάμενου αντικειμένου ή αν είναι είναι αναστρέψιμο/γενικής χρήσης.
    flyer_kit_finish_coating:
      name: Φινίρισμα/επίστρωση κιτ ιπτάμενου αντικειμένου
      description: Φινίρισμα επιφάνειας που εφαρμόζεται στα εξαρτήματα του κιτ του
        ιπτάμενου αντικειμένου.
    flyer_kit_included_components:
      name: Περιλαμβανόμενα εξαρτήματα κιτ ιπτάμενου αντικειμένου
      description: Προσδιορίζει ποια εξαρτήματα περιλαμβάνονται στο κιτ.
    flyer_orifice_type:
      name: Τύπος στομίου του ιπτάμενου αντικειμένου
      description: Καθορίζει το στυλ του στομίου που χρησιμοποιείται στο ιπτάμενο
        αντικείμενο.
    flying_disc_feature_set:
      name: Σετ χαρακτηριστικών ιπτάμενου δίσκου
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά του ιπτάμενου δίσκου.
    flysheet_material:
      name: Υλικό εξωτερικού καλύμματος σκηνής
      description: Προσδιορίζει το κύριο ύφασμα που χρησιμοποιείται για την εξωτερική
        σκηνή/κάλυμμα προστασίας, το οποίο επηρεάζει το βάρος, την ανθεκτικότητα και
        την αντοχή στις καιρικές συνθήκες.
    flywheel_balance_type:
      name: Τύπος ζυγοστάθμισης σφονδύλου
      description: Υποδεικνύει εάν ο σφόνδυλος διαθέτει ουδέτερη ζυγοστάθμιση ή αν
        χρησιμοποιεί εξωτερικό αντίβαρο.
    foam_blocks_size_class:
      name: Κατηγορία μεγέθους μπλοκ αφρού
      description: Υποδεικνύει τη γενική κατηγορία μεγέθους των μπλοκ στο σύνολο.
    foam_blocks_surface_texture:
      name: Υφή επιφάνειας των μπλοκ αφρού
      description: Περιγράφει την αίσθηση/φινίρισμα της εξωτερικής επιφάνειας των
        μπλοκ αφρού.
    foam_surface_effect:
      name: Εφέ επιφάνειας αφρού
      description: Περιγράφει συνηθισμένα διακοσμητικά επιφανειακά εφέ που εφαρμόζονται
        σε αφρό Craft ή φελιζόλ, όπως γκλίτερ, μεταλλικά ή ολογραφικά φινιρίσματα.
    foil_color:
      name: Χρώμα μεταλλοτυπίας
      description: Καθορίζει το χρώμα του διακοσμητικού αλουμινίου που χρησιμοποιείται
        ως έμφαση στο πιστοποιητικό (εάν εφαρμόζεται).
    foil_curtain_mounting_method:
      name: Μέθοδος τοποθέτησης μεταλλιζέ κουρτίνας
      description: Πώς προορίζεται να τοποθετηθεί ή να κρεμαστεί η μεταλλιζέ κουρτίνα
        (π.χ., αυτοκόλλητη ταινία, δακτύλιοι).
    foil_discipline:
      name: Κατηγορία foil
      description: Προσδιορίζει το κύριο στυλ πλεύσης ή την κατηγορία αθλήματος για
        την οποία έχει σχεδιαστεί το foil.
    foil_mast_board_mounting_type:
      name: Τύπος στερέωσης ιστού foil στη σανίδα
      description: Ορίζει τον τρόπο σύνδεσης στο επάνω μέρος του ιστού που προσαρτάται
        στη σανίδα ή στον οδηγό του foil.
    foil_mast_fuselage_connection_type:
      name: Τύπος σύνδεσης ιστού και ατράκτου του foil
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται ο ιστός με την άτρακτο
        ή με το συγκρότημα του μπροστινού πτερυγίου.
    foil_mounting_interface:
      name: Διεπαφή στερέωσης φύλλου
      description: Προσδιορίζει το πρότυπο σύνδεσης που χρησιμοποιεί το εξάρτημα για
        να συνδεθεί με τη σανίδα ή με άλλα μέρη του foil.
    foil_mounting_system:
      name: Σύστημα τοποθέτησης φύλλου
      description: Καθορίζει τη διεπαφή τοποθέτησης για foils ή πτερύγια στη σανίδα,
        διασφαλίζοντας τη συμβατότητα με τον υπάρχοντα υλικό εξοπλισμό του αναβάτη.
    foil_mounting_type:
      name: Τύπος τοποθέτησης φύλλου
      description: Προσδιορίζει το σύστημα σύνδεσης που χρησιμοποιείται για τη στερέωση
        του foil στη σανίδα, διασφαλίζοντας τη συμβατότητα μεταξύ των εξαρτημάτων.
    fold_over_elastic_application:
      name: Εφαρμογή ελαστικού ρελιού
      description: Κύρια προβλεπόμενη χρήση/εφαρμογή του ελαστικού ρελιού.
    foldability:
      name: Δυνατότητα αναδίπλωσης
      description: Περιγράφει εάν και πώς ο διαχωριστής διπλώνεται ή συμπτύσσεται
        για αποθήκευση ή αναδιαμόρφωση.
    foldability_stow:
      name: Δυνατότητα αναδίπλωσης (φύλαξης)
      description: Εάν η σχάρα αναδιπλώνεται/μαζεύεται όταν δε χρησιμοποιείται (π.χ.
        διπλώνει προς το μέρος του οχήματος).
    folding_style:
      name: Στυλ αναδίπλωσης
      description: Υποδεικνύει τον τρόπο με τον οποίο διπλώνει το στρώμα προστασίας
        (crash pad) για μεταφορά και αποθήκευση, κάτι που επηρεάζει την ομοιομορφία
        της επιφάνειας προσγείωσης και την ευκολία μεταφοράς.
    food_basket_items_included:
      name: Περιλαμβανόμενα είδη καλαθιού τροφίμων
      description: Παραθέτει τα κύρια είδη τροφίμων που περιλαμβάνονται στο καλάθι
        για να βοηθήσει τους αγοραστές να επιλέξουν καλάθια που ταιριάζουν στις γευστικές
        προτιμήσεις ή τις διατροφικές ανάγκες των παραληπτών.
    food_coloring_form:
      name: Μορφή χρωστικής ουσίας ζαχαροπλαστικής
      description: Καθορίζει τη φυσική μορφή ή τον τρόπο διάθεσης με τον οποίο παρέχεται
        η χρωστική ουσία ζαχαροπλαστικής (π.χ. τζελ, υγρό, σκόνη, σπρέι).
    food_contact_material:
      name: Υλικό κατάλληλο για επαφή με τρόφιμα
      description: Το βασικό υλικό κατασκευής των εξαρτημάτων του οινοποιητικού εξοπλισμού
        (κάδοι ζύμωσης, σιφώνια, χωνιά) που χρησιμοποιούνται με τον μούστο/το κρασί.
    food_packing_medium:
      name: Μέσο συσκευασίας τροφίμων
      description: Καθορίζει το μέσο στο οποίο συσκευάζονται τα φρούτα ή τα λαχανικά
        (π.χ. νερό, άλμη, σιρόπι, λάδι).
    foosball_rod_type:
      name: Τύπος ράβδου για ποδοσφαιράκι
      description: Υποδεικνύει τη μηχανική διαμόρφωση της ράβδου που επηρεάζει την
        αίσθηση και την ασφάλεια του παιχνιδιού.
    foot_arch_type_compatibility:
      name: Συμβατότητα τύπου καμάρας ποδιού
      description: Προσδιορίζει το προφίλ καμάρας του ποδιού για το οποίο έχει σχεδιαστεί
        ο πάτος.
    foot_arch_type_suitability:
      name: Καταλληλότητα τύπου καμάρας ποδιού
      description: Προσδιορίζει ποιο προφίλ καμάρας ποδιού προορίζεται να υποστηρίξει
        ο πάτος.
    foot_coverage:
      name: Κάλυψη πέλματος
      description: Υποδεικνύει εάν το ένδυμα (καλσόν/κολάν) διαθέτει ενσωματωμένο
        πέλμα, αν είναι χωρίς πέλμα, αν έχει υποπάτιο (λάστιχο πατούσας/stirrup) ή
        αν είναι με ανοιχτή φτέρνα.
    foot_guard_type:
      name: Τύπος προστατευτικού κουντεπιέ/πέλματος
      description: Υποδεικνύει εάν η επικαλαμίδα περιλαμβάνει ενσωματωμένο προστατευτικό
        για τα δάχτυλα/το πέλμα και καθορίζει εάν το προστατευτικό είναι σταθερό ή
        αφαιρούμενο.
    foot_support_level:
      name: Επίπεδο στήριξης πέλματος
      description: Υποδεικνύει το επίπεδο ανατομικής υποστήριξης ή σκληρότητας που
        παρέχει ο πάτος του παπουτσιού, όπως χαμηλό, μεσαίο, υψηλό ή εξαιρετικά υψηλό.
    footbag_play_style:
      name: Στυλ παιχνιδιού Footbag
      description: Το κύριο προβλεπόμενο στυλ παιχνιδιού για το footbag.
    football_ball_type:
      name: Τύπος μπάλας ποδοσφαίρου
      description: Καθορίζει την κύρια προβλεπόμενη χρήση ή το πλαίσιο χρήσης για
        την μπάλα ποδοσφαίρου, όπως παιχνίδι, προπόνηση ή συλλεκτική έκθεση.
    football_dummy_type:
      name: Τύπος ομοιώματος προπόνησης ποδοσφαίρου
      description: Ταξινομεί το στυλ ή τον λειτουργικό σχεδιασμό του ομοιώματος ώστε
        να αντικατοπτρίζει τον συγκεκριμένο προπονητικό σκοπό του.
    football_glove_certification:
      name: Πιστοποίηση γαντιών ποδοσφαίρου
      description: Υποδεικνύει την πιστοποίηση ή τη συμμόρφωση με τα πρότυπα που απαιτούνται
        για τη συμμετοχή σε επίσημους αγώνες (π.χ., SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Τύπος στερέωσης ποδοστροφέα
      description: Καθορίζει τον τρόπο με τον οποίο το ποδαρικό συνδέεται στο πλαίσιο
        του κρεβατιού ή στο δάπεδο, βοηθώντας τους αγοραστές σε επιλέξουν συμβατό
        υλικό εξοπλισμό και μεθόδους εγκατάστασης.
    footboard_style:
      name: Στυλ ποδοστροφέα
      description: Ορίζει το δομικό ή αισθητικό στυλ σχεδιασμού του ποδαρικού.
    footrest_adjustability:
      name: Δυνατότητα προσαρμογής υποπόδιου
      description: Καθορίζει εάν και πώς μπορούν να ρυθμιστούν τα υποπόδια ώστε να
        προσαρμόζονται στο ύψος των ποδιών του παιδιού.
    footrest_type:
      name: Τύπος υποπόδιου
      description: Προσδιορίζει την παρουσία και τον σχεδιασμό ενός υποποδίου στο
        σκαμπό.
    footstrap_configuration:
      name: Διαμόρφωση δεστρών
      description: Καθορίζει το μοτίβο των υποδοχών για τις δέστρες στην πάνω επιφάνεια
        της σανίδας.
    footswitch_action_style:
      name: Στυλ λειτουργίας ποδοδιακόπτη
      description: Υποδεικνύει εάν η λειτουργία του διακόπτη είναι στιγμιαία ή συγκράτησης
        ή εάν υποστηρίζει και τα δύο.
    footswitch_power_source:
      name: Πηγή τροφοδοσίας ποδοδιακόπτη
      description: Καθορίζει τον τρόπο τροφοδοσίας του ποδοδιακόπτη, εάν υπάρχει (παθητική
        μέσω υποδοχής ενισχυτή, μπαταρίας, εξωτερικού προσαρμογέα, USB κ.λπ.).
    footwear_construction_method:
      name: Μέθοδος κατασκευής υποδημάτων
      description: Ορίζει την τεχνική που χρησιμοποιείται για τη σύνδεση του πάνω
        μέρους με τη σόλα, η οποία επηρεάζει την ανθεκτικότητα, τη δυνατότητα αντικατάστασης
        της σόλας και την τιμή.
    footwear_cut:
      name: Γραμμή υποδημάτων
      description: Υποδεικνύει το ύψος του υποδήματος στον αστράγαλο (χαμηλή, μεσαία
        ψηλή γραμμή), εξασφαλίζοντας την κατάλληλη ισορροπία μεταξύ ελευθερίας κίνησης
        και υποστήριξης.
    footwear_size_system:
      name: Σύστημα μεγέθους υποδημάτων
      description: Προσδιορίζει το περιφερειακό πρότυπο μεγέθους που χρησιμοποιείται
        για το δηλωμένο μέγεθος υποδημάτων (π.χ. ΗΠΑ, ΕΕ, Ηνωμένο Βασίλειο).
    footwear_support_type:
      name: Τύπος υποστήριξης υποδημάτων
      description: Καθορίζει το επίπεδο εμβιομηχανικής υποστήριξης ή ελέγχου πρηνισμού
        που παρέχει το παπούτσι (π.χ. Ουδέτερο, σταθερότητα, έλεγχος κίνησης).
    fork_material:
      name: Υλικό πιρουνιού
      description: Καθορίζει το υλικό που χρησιμοποιείται για το μπροστινό πιρούνι
        του ποδηλάτου, το οποίο επηρεάζει στην ακαμψία, το βάρος και την ποιότητα
        κύλισης.
    form_factor:
      name: Συντελεστής μορφής
      description: Βασικός τύπος υλικού εξοπλισμού του ελεγκτή DMX
    formula_car_series_class:
      name: Σειρά/κατηγορία αυτοκινήτων φόρμουλας
      description: Καθορίζει τη σειρά αγώνων ή την κλάση στην οποία έχει κατασκευαστεί
        για να αγωνιστεί το αυτοκίνητο φόρμουλας.
    formulation_style:
      name: Στυλ σύνθεσης
      description: Επισημαίνει εξειδικευμένες συνθέσεις σχεδιασμένες για συγκεκριμένες
        χρήσεις ή προτιμήσεις (π.χ. Barista, Extra Creamy).
    formulation_type:
      name: Τύπος σύνθεσης
      description: Η μορφή σύνθεσης του απολυμαντικού σπρέι.
    fossil_preparation_level:
      name: Επίπεδο προετοιμασίας απολιθώματος
      description: Βαθμός προετοιμασίας/καθαρισμού που πραγματοποιήθηκε στο δείγμα
        (π.χ. εγκλωβισμένο στο αρχικό πέτρωμα έναντι πλήρως πλήρως καθαρισμένου).
    fossil_preservation_type:
      name: Τύπος διατήρησης απολιθώματος
      description: Ο τρόπος με τον οποίο διατηρήθηκε το απολίθωμα (π.χ. μέσω εμπλουτισμού
        με ορυκτά, ως φυσικό εκμαγείο, καλούπι ή επιφανειακό αποτύπωμα).
    fossil_restoration_status:
      name: Κατάσταση αποκατάστασης απολιθώματος
      description: Εάν και πώς το δείγμα έχει επισκευαστεί/αποκατασταθεί (π.χ. κολλημένο,
        ανακατασκευασμένο, σύνθετο).
    foundation_configuration:
      name: Διαμόρφωση βάσης στρώματος
      description: Καθορίζει εάν η βάση του στρώματος κατασκευάζεται ως ενιαίο κομμάτι
        ή ως σετ δύο κομματιών για μεγαλύτερα μεγέθη στρωμάτων.
    foundation_profile:
      name: Προφίλ βάσης στρώματος
      description: Ταξινομεί τη συνολική κατηγορία ύψους της βάσης του στρώματος (π.χ.
        εξαιρετικά χαμηλή, χαμηλή, τυπική ή υψηλού προφίλ), ώστε ο αγοραστής να μπορεί
        γρήγορα να επιλέγει εύκολα με βάση τις προτιμήσεις του για το συνολικό ύψος
        και την εφαρμογή των σεντονιών.
    frame_adjustability:
      name: Δυνατότητα προσαρμογής πλαισίου
      description: Υποδεικνύει εάν και πώς μπορεί να ρυθμιστεί το πλαίσιο (π.χ. δυνατότητα
        ρύθμισης πλάτους/ύψους, περιστροφή/κλίση), κάτι που επηρεάζει την εργονομία
        και την προσαρμογή στο έργο.
    frame_drum_jingle_configuration:
      name: Διαμόρφωση για ζίλια (κουδουνάκια) τυμπάνου (ντεφιού)
      description: Υποδεικνύει εάν το τύμπανο διαθέτει ζίλια και, αν ναι, ποια είναι
        η γενική τους διαμόρφωση.
    frame_drum_tuning_system:
      name: Σύστημα κουρδίσματος τυμπάνου
      description: Πώς κουρδίζεται το τύμπανο ή αν διαθέτει δυνατότητα κουρδίσματος.
    frame_finish:
      name: Φινίρισμα σκελετού
      description: Καθορίζει την προστατευτική επίστρωση ή το φινίρισμα του υλικού
        που εφαρμόζεται στον σκελετό, επηρεάζοντας την ανθεκτικότητα και την αισθητική.
    frame_mounting_standard:
      name: Πρότυπο στερέωσης πλαισίου
      description: Ορίζει την προδιαγραφή σύνδεσης της μπότας με τον σκελετό (π.χ.
        195 mm 2 σημείων, Trinity 3 σημείων), η οποία είναι κρίσιμη για τη συμβατότητα
        του σκελετού.
    frame_steel_gauge:
      name: Πάχος χάλυβα πλαισίου
      description: Προσδιορίζει το πάχος (gauge) των χαλύβδινων σωλήνων που χρησιμοποιούνται
        στους ορθοστάτες της ραφιέρας, αποτελώντας κρίσιμο δείκτη αντοχής και σταθερότητας.
    frame_suspension_type:
      name: Τύπος ανάρτησης σκελετού
      description: Υποδεικνύει τον σχεδιασμό της ανάρτησης του σκελετού του ποδηλάτου,
        όπως χωρίς ανάρτηση, με εμπρόσθια ανάρτηση ή με διπλή ανάρτηση, για να βοηθήσει
        τον αγοραστή να επιλέξει τον σκελετό που ταιριάζει με την προβλεπόμενη κατασκευή
        του.
    free_reed_instrument_orientation:
      name: Προσανατολισμός οργάνου ελεύθερης γλωσσίδας
      description: Καθορίζει τον τρόπο κρατήματος/παιξίματος του οργάνου (φορητό με
        φυσούνα, με ιμάντα ώμου κ.λπ.) για λόγους εργονομίας και φιλτραρίσματος με
        βάση τη χρήση.
    free_weight_rack_type:
      name: Τύπος βάσης ελεύθερων βαρών
      description: Ταξινομεί το δομικό στυλ ή τη λειτουργία της βάσης (π.χ. βάση για
        μπάρες, σταντ για kettlebells, σταντ για δίσκους βαρών).
    freehub_body_type:
      name: Τύπος σώματος ελεύθερου (Freehub)
      description: Καθορίζει το πρότυπο του σώματος του ή του οδηγού κασέτας (cassette
        driver) που υποστηρίζει το πίσω κέντρο του ποδηλάτου.
    freehub_driver_standard:
      name: Πρότυπο οδηγού ελεύθερου
      description: Προσδιορίζει τον τύπο υποδοχής/διεπαφής της κασέτας που υποστηρίζει
        το κέντρο (π.χ., Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Πρότυπο σπειρώματος ελεύθερου γραναζιού
      description: Καθορίζει το πρότυπο ή το μέγεθος του σπειρώματος του κέντρου με
        το οποίο είναι συμβατό το ελεύθερο γρανάζι.
    french_horn_bell_construction:
      name: Κατασκευή καμπάνας γαλλικού κόρνου
      description: Καθορίζει τον τρόπο κατασκευής της καμπάνας και εάν είναι αποσπώμενη
        για ευκολία στη μεταφορά/συντήρηση.
    french_horn_bell_material:
      name: Υλικό καμπάνας γαλλικού κόρνου
      description: Καθορίζει το υλικό/κράμα της καμπάνας (και συχνά του ανοίγματος
        της καμπάνας) που χρησιμοποιείται στο γαλλικό κόρνο.
    french_horn_bell_type:
      name: Άνοιγμα καμπάνας γαλλικού κόρνου
      description: Στυλ κατασκευής της καμπάνας.
    french_horn_finish:
      name: Φινίρισμα γαλλικού κόρνου
      description: Εξωτερικό φινίρισμα/επιμετάλλωση του οργάνου.
    french_horn_included_accessories:
      name: Συμπεριλαμβανόμενα αξεσουάρ γαλλικού κόρνου
      description: Αξεσουάρ που περιλαμβάνονται με το γαλλικό κόρνο (θήκη, επιστόμιο
        κ.λπ.).
    french_horn_leadpipe_material:
      name: Υλικό κύριου σωλήνα γαλλικού κόρνου
      description: Καθορίζει το υλικό/κράμα του σωλήνα εισαγωγής.
    french_horn_wrap_type:
      name: Τύπος περιέλιξης γαλλικού κόρνου
      description: Συνολική τύπος/διαμόρφωση περιέλιξης του γαλλικού κόρνου.
    fretboard_radius_fit:
      name: Προσαρμογή ακτίνας ταστιέρας
      description: Υποδεικνύει εάν η καμπυλότητα του προστατευτικού του καποτάστου
        έχει σχεδιαστεί για επίπεδες ή καμπύλες ταστιέρες ή εάν είναι ρυθμιζόμενη
        ώστε να προσαρμόζεται σε πολλαπλές ακτίνες ταστιέρας.
    friction_surface_included:
      name: Περιλαμβάνεται επιφάνεια τριβής
      description: Εάν ο σφόνδυλος περιλαμβάνει αντικαταστάσιμη/εγκατεστημένη επιφάνεια
        τριβής (π.χ. ένθετο, δακτύλιο) ή είναι μια μονοκόμματη επιφάνεια τριβής.
    fringe_curtain_finish:
      name: Φινίρισμα κουρτίνας με κρόσσια
      description: Περιγράφει το οπτικό φινίρισμα της επιφάνειας των κροσσιών (γυαλάδα/υφή).
    fringe_curtain_material:
      name: Υλικό κουρτίνας με κρόσσια
      description: Καθορίζει το κύριο υλικό των λωρίδων κουρτίνας (π.χ. μεταλλιζέ
        φιλμ PET, πλαστικό, χαρτί, ύφασμα).
    fringe_curtain_use_location:
      name: Τοποθεσία χρήσης κουρτίνας με κρόσσια
      description: Υποδεικνύει εάν η κουρτίνα με κρόσσια προορίζεται για εσωτερική
        χρήση, εξωτερική χρήση ή και τα δύο.
    fringe_trim_style:
      name: Στυλ τρέσας με κρόσσια
      description: Καθορίζει την κατασκευή/στυλ της τρέσας με κρόσσια (πώς σχηματίζονται
        και παρουσιάζονται οι κλωστές ή οι θηλιές).
    front_axle_standard:
      name: Πρότυπο μπροστινού άξονα
      description: Παραθέτει τη διάμετρο του άξονα και την απόσταση που έχει σχεδιαστεί
        να δέχεται το πιρούνι (π.χ., Boost 15 x 110 mm), διασφαλίζοντας τη συμβατότητα
        του κέντρου.
    front_button_configuration:
      name: Διαμόρφωση μπροστινού κουμπιού
      description: Υποδεικνύει το στυλ των μπροστινών κουμπιών του σακακιού, καθορίζοντας
        αν είναι μονόπετο ή σταυρωτό καθώς και τον αριθμό των κουμπιών στο μπροστινό
        μέρος.
    front_closure_style:
      name: Στυλ μπροστινού κλεισίματος
      description: Υποδεικνύει το στυλ κατασκευής του μπροστινού μέρους στο trench
        coat, όπως μονόπετο ή σταυρωτό, ανοιχτό, κρουαζέ ή με φερμουάρ.
    front_decoration_type:
      name: Τύπος μπροστινού διακοσμητικού
      description: Προσδιορίζει τον τύπο του διακοσμητικού στοιχείου ή του σήματος
        που βρίσκεται στο μπροστινό μέρος του καπέλου (π.χ. κεντημένο σήμα, δερμάτινο
        σήμα).
    front_point_configuration:
      name: Διαμόρφωση μπροστινού σημείου
      description: Καθορίζει τον σχεδιασμό των μπροστινών αιχμών (μονή αιχμή, διπλή
        αιχμή, βαθμιδωτή/modular, αντικαταστάσιμη), γεγονός που επηρεάζει την ακρίβεια
        διείσδυσης στον πάγο και σε μικτά εδάφη.
    front_seat_position:
      name: Θέση μπροστινού καθίσματος
      description: Για ποια πλευρά/θέση στην πρώτη σειρά προορίζεται το κάθισμα.
    front_style:
      name: Γραμμή μπροστινού μέρους
      description: Περιγράφει τη σχεδίαση στο μπροστινό μέρος του παντελονιού chinos,
        υποδεικνύοντας εάν το παντελόνι είναι χωρίς πιέτες, με πιέτες ή αν διαθέτει
        άλλες λεπτομέρειες.
    frosting_or_icing_type:
      name: Τύπος γλάσου ή κρέμας επικάλυψης
      description: Καθορίζει τον τύπο του γλάσου ή της κρέμας επικάλυψης που εφαρμόζεται
        στο κέικ ή στη μπάρα επιδορπίου.
    fruit_cultivar_or_variety:
      name: Ποικιλία φρούτων
      description: Καθορίζει την συγκεκριμένη ποικιλία ή την ονομασία της ποικιλίας
        του φρούτου (π.χ. Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Στυλ κοπής φρούτων
      description: Περιγράφει τον τρόπο παρασκευής ή κοπής του φρούτου (π.χ. ολόκληρο,
        σε φέτες, σε κύβους).
    fruit_mix_variety:
      name: Ποικιλία μεικτών φρούτων
      description: Ονομάζει τον συγκεκριμένο γευστικό συνδυασμό ή τη γενική ποικιλία
        του μείγματος φρούτων (π.χ., Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Μορφή κομματιού φρούτων
      description: Περιγράφει τη φυσική κοπή ή παρουσίαση τεμαχίων αποξηραμένων φρούτων,
        π.χ. ολόκληρα, σε φέτες, σε σκόνη.
    fruit_snack_form:
      name: Μορφή σνακ φρούτων
      description: Ταξινομεί τη φυσική μορφή ή το στυλ με το οποίο παρουσιάζεται το
        σνακ φρούτων.
    fruit_topping_format:
      name: Υλικό επικάλυψης φρούτων
      description: Περιγράφει τη φυσική μορφή, την υφή ή το στυλ της επικάλυψης, ώστε
        οι αγοραστές να μπορούν να επιλέγουν ανάμεσα σε σάλτσες, σιρόπια, χοντρά κομμάτια
        φρούτων, πέρλες που σκάνε (popping pearls) κ.λπ.
    fruit_variety:
      name: Ποικιλία φρούτων
      description: Προσδιορίζει το βασικό φρούτο που χρησιμοποιείται για μια συνταγή/κιτ/υλικά
        παρασκευής φρουτώδους οίνου (π.χ. μήλο, κεράσι, βατόμουρο).
    fuel_cap_gasket_seal_material:
      name: Υλικό φλάντζας/στεγανοποίησης τάπας καυσίμου
      description: Καθορίζει το υλικό που χρησιμοποιείται για τη φλάντζα στεγανοποίησης/δακτύλιο
        Ο στο καπάκι καυσίμου.
    fuel_cap_locking_mechanism:
      name: Μηχανισμός ασφάλισης τάπας καυσίμου
      description: Υποδεικνύει την προσέγγιση κλειδώματος που χρησιμοποιείται από
        μία τάπα καυσίμου με κλειδαριά.
    fuel_cap_type:
      name: Τύπος τάπας καυσίμου
      description: Καθορίζει τον λειτουργικό τύπο/σχεδιασμό της τάπας καυσίμου που
        χρησιμοποιείται στο στόμιο πλήρωσης του ρεζερβουάρ ενός οχήματος.
    fuel_cap_venting:
      name: Εξαερισμός τάπας καυσίμου
      description: Υποδεικνύει εάν η τάπα καυσίμου διαθέτει εξαερισμό και, αν ναι,
        τον τύπο του εξαερισμού.
    fuel_filter_features:
      name: Χαρακτηριστικά φίλτρου καυσίμου
      description: Παραθέτει σημαντικά λειτουργικά χαρακτηριστικά του φίλτρου καυσίμου
        (διαχωρισμός νερού, βαλβίδα αποστράγγισης, θύρα αισθητήρα κ.λπ.).
    fuel_filter_media_material:
      name: Υλικό μέσου φίλτρου καυσίμου
      description: Καθορίζει το πρωτεύον μέσο φιλτραρίσματος που χρησιμοποιείται στο
        εσωτερικό του στοιχείου φίλτρου καυσίμου
    fuel_filter_mounting_connection_type:
      name: Τύπος τοποθέτησης/σύνδεσης φίλτρου καυσίμου
      description: Καθορίζει τον τρόπο σύνδεσης/εγκατάστασης του φίλτρου καυσίμου
        (βιδωτό/spin-on, ταχυσύνδεσμος, ακροφύσιο εύκαμπτου σωλήνα, σύνδεσμος Banjo,
        κ.λπ.).
    fuel_injection_cleaning_method:
      name: Μέθοδος καθαρισμού ψεκασμού καυσίμου
      description: Υποδεικνύει τον τρόπο χρήσης του κιτ για τον καθαρισμό του συστήματος
        ψεκασμού καυσίμου.
    fuel_injector_electrical_connector_type:
      name: Τύπος ηλεκτρικού συνδέσμου του μπεκ καυσίμου
      description: Καθορίζει το πρότυπο/σχήμα του ηλεκτρικού συνδέσμου του μπεκ.
    fuel_injector_seat_type:
      name: Τύπος έδρας μπεκ ψεκασμού καυσίμου
      description: Καθορίζει το στυλ διεπαφής άκρου/έδρας μπεκ ψεκασμού που χρησιμοποιείται
        για τη στεγανοποίηση στην εισαγωγή/σωλήνα καυσίμου.
    fuel_injector_spray_pattern:
      name: Μοτίβο ψεκασμού μπεκ ψεκασμού καυσίμου
      description: Προσδιορίζει το μοτίβο ψεκασμού/διανομής καυσίμου του μπεκ ψεκασμού
        χρησιμοποιώντας την ορολογία του κατασκευαστή ή της βιομηχανίας (π.χ. κωνική
        δέσμη, βεντάλια, λεπτή/γραμμική δέσμη, πολλαπλές οπές).
    fuel_level_sensor_mounting_type:
      name: Τύπος τοποθέτησης αισθητήρα στάθμης καυσίμου
      description: Καθορίζει τη φυσική διεπαφή τοποθέτησης που χρησιμοποιείται για
        τη διασύνδεση του αισθητήρα/φλοτέρ στάθμης καυσίμου στο ρεζερβουάρ καυσίμου
        ή στη μονάδα της αντλίας.
    fuel_level_sensor_sensing_mechanism:
      name: Μηχανισμός ανίχνευσης αισθητήρα στάθμης καυσίμου
      description: Καθορίζει τον μηχανισμό/τεχνολογία ανίχνευσης που χρησιμοποιείται
        για τη μέτρηση της στάθμης καυσίμου σε έναν αισθητήρα ή μονάδα φλοτέρ στάθμης
        καυσίμου.
    fuel_line_compliance_standard:
      name: Πρότυπο συμμόρφωσης γραμμής καυσίμου
      description: Προσδιορίζει το κανονιστικό ή βιομηχανικό πρότυπο που πληροί η
        γραμμή καυσίμου (σύνηθες σε ναυτιλιακές/θαλάσσιες εφαρμογές).
    fuel_line_connector_interface_type:
      name: Τύπος διεπαφής συνδέσμου γραμμής καυσίμου
      description: Καθορίζει το στυλ σύνδεσης/διεπαφής στο(στα) άκρο(-α) της γραμμής
        καυσίμου ή του ρακόρ εξαρτήματος.
    fuel_pressure_regulator_body_material:
      name: Υλικό σώματος ρυθμιστή πίεσης καυσίμου
      description: Καθορίζει το υλικό του περιβλήματος/σώματος του ρυθμιστή για ανθεκτικότητα
        και αντοχή στη διάβρωση.
    fuel_pressure_regulator_mounting_type:
      name: Τύπος τοποθέτησης ρυθμιστή πίεσης καυσίμου
      description: Καθορίζει τον τρόπο τοποθέτησης ή εγκατάστασης του ρυθμιστή πίεσης
        καυσίμου, επηρεάζοντας την εφαρμογή και τη συμβατότητα.
    fuel_pump_inlet_type:
      name: Τύπος εισόδου αντλίας καυσίμου
      description: Στυλ σύνδεσης στην είσοδο της αντλίας.
    fuel_pump_mounting_location:
      name: Θέση τοποθέτησης αντλίας καυσίμου
      description: Η θέση όπου είναι εγκατεστημένη η αντλία καυσίμου επί/εντός του
        συστήματος καυσίμου του οχήματος.
    fuel_pump_outlet_connection_type:
      name: Τύπος σύνδεσης εξόδου αντλίας καυσίμου
      description: Καθορίζει το φυσικό στυλ σύνδεσης στην έξοδο της αντλίας καυσίμου
        για συμβατότητα εφαρμογής/εγκατάστασης.
    fuel_system_application:
      name: Εφαρμογή συστήματος καυσίμου
      description: Αρχιτεκτονική συστήματος τροφοδοσίας καυσίμου η αντλία καυσίμου
        έχει σχεδιαστεί για υποστήριξη (π.χ. καρμπυρατέρ, EFI, GDI, αντλία ανύψωσης/μεταφοράς
        πετρελαίου).
    fuel_system_connection_type:
      name: Τύπος σύνδεσης συστήματος καυσίμου
      description: Καθορίζει το(τα) πρότυπο(-α) σύνδεσης του συστήματος καυσίμου ή
        τη(τις) διεπαφή(-ές) προσαρμογέα που υποστηρίζονται από το κιτ.
    fuel_system_type:
      name: Τύπος συστήματος καυσίμου
      description: Καθορίζει το σύστημα τροφοδοσίας καυσίμου του κινητήρα (π.χ. αρχιτεκτονική
        καρμπυρατέρ ή ψεκασμού καυσίμου).
    fuel_tank_installation_position:
      name: Θέση εγκατάστασης δεξαμενής καυσίμου
      description: Καθορίζει την τυπική θέση εγκατάστασης της δεξαμενής καυσίμου στο
        όχημα.
    fuel_tank_orientation:
      name: Προσανατολισμός δεξαμενής καυσίμου
      description: Καθορίζει εάν η δεξαμενή καυσίμου προορίζεται για οριζόντια ή κάθετη
        εγκατάσταση.
    fuel_tank_shape:
      name: Σχήμα δεξαμενής καυσίμου
      description: Περιγράφει τον συνολικό συντελεστή μορφής/σχήμα της δεξαμενής καυσίμου
        για να εξασφαλίσει τη σωστή εφαρμογή και τη συμβατότητα αντικατάστασης.
    fur_type:
      name: Τύπος γούνας
      description: Προσδιορίζει το είδος ή το συνθετικό υλικό τυχόν γούνας στο εξωτερικό
        τμήμα από το τσαντάκι muff clutch ή την απλής τσάντα.
    furniture_finish:
      name: Φινίρισμα επίπλων
      description: Περιγράφει την επεξεργασία επιφάνειας ή το φινίρισμα που εφαρμόζεται
        στο έπιπλο, επηρεάζοντας την εμφάνιση και τις απαιτήσεις συντήρησης.
    fuse_form_factor:
      name: Παράγοντας μορφής ασφάλειας
      description: Καθορίζει το φυσικό στυλ/αποτύπωμα ασφάλειας ώστε να διασφαλίζεται
        η εφαρμογή στην προβλεπόμενη ασφαλειοθήκη ή ασφαλειοκιβώτιο (π.χ. ασφάλεια
        τύπου μαχαιριού έναντι κυλινδρικής).
    fuse_terminal_or_mount_style:
      name: Στυλ ακροδέκτη ή στήριξης ασφάλειας
      description: Καθορίζει τον τρόπο μηχανικής/ηλεκτρικής σύνδεσης της ασφάλειας
        (κουμπωτή, βιδωτή ή εν σειρά).
    fusible_application_method:
      name: Μέθοδος εφαρμογής θερμοκολλώμενου υλικού
      description: Καθορίζει τον τρόπο ενεργοποίησης/εφαρμογής μιας εύτηκτης κόλλας
        (π.χ. με σιδέρωμα, πρέσα, ενίσχυση ραφής).
    fusible_hem_tape_application_method:
      name: Μέθοδος εφαρμογής θερμοκολλητικής ταινίας στριφώματος
      description: Περιγράφει τον τρόπο ενεργοποίησης/εφαρμογής της ταινίας (π.χ.
        με σιδέρωμα, θερμική πρέσα).
    fusible_seam_tape_activation_method:
      name: Μέθοδος ενεργοποίησης θερμοκολλώμενης ταινίας ραφής
      description: Υποδεικνύει τον τρόπο ενεργοποίησης της κόλλας κατά την εφαρμογή.
    fusible_seam_tape_application:
      name: Εφαρμογή θερμοκολλητικής ταινίας ραφών
      description: Καθορίζει την κύρια προβλεπόμενη χρήση της θερμοκολλητικής ταινίας
        ραφών.
    fusible_seam_tape_material:
      name: Υλικό θερμοκολλητικής ταινίας ραφών
      description: Υλικό ή σύνθεση της ταινίας/αράχνης/φορέα (όχι του υφάσματος επάνω
        στο οποίο κολλάει).
    fusible_seam_tape_washability:
      name: Αντοχή της θερμοκολλητικής ταινίας ραφών στο πλύσιμο
      description: Υποδεικνύει εάν η κολλημένη ραφή παραμένει άθικτη μετά το πλύσιμο
        ή τον καθαρισμό.
    fusible_seam_tape_waterproof_rating:
      name: Δείκτης αδιαβροχοποίησης θερμοκολλητικής ταινίας ραφών
      description: Υποδεικνύει εάν η ταινία ραφών προορίζεται να δημιουργήσει μια
        αδιάβροχη ή υδατοαπωθητική (ανθεκτική στο νερό) ραφή μετά την εφαρμογή.
    fusible_tape_backing_type:
      name: Τύπος υποστρώματος της θερμοκολλητικής ταινίας
      description: Καθορίζει εάν η ταινία διαθέτει αντικολλητικό χαρτί/προστατευτική
        επένδυση και ποια είναι η μορφή του, στοιχείο που επηρεάζει τον χειρισμό και
        την εφαρμογή.
    futon_frame_conversion_mechanism:
      name: Μηχανισμός μετατροπής σκελετού φουτόν (futon)
      description: Ορίζει τον μηχανισμό ή το δομικό στυλ που χρησιμοποιείται για τη
        μετατροπή του σκελετού μεταξύ των θέσεων καναπέ, ανακλίντρου και κρεβατιού.
    gaiter_height_type:
      name: Τύπος ύψους γκέτας
      description: Ταξινομεί τις γκέτες ανάλογα με το ύψος κάλυψης που παρέχουν στο
        πόδι, όπως ύψος αστραγάλου, μέσης γάμπας, γονάτου ή μηρού.
    game_variation:
      name: Παραλλαγή παιχνιδιού
      description: Καθορίζει το στυλ παιχνιδιού για το οποίο έχει σχεδιαστεί το σετ
        (π.χ. κλασικό tetherball, tether tennis, speedball).
    garlic_preparation_style:
      name: Στυλ προετοιμασίας σκόρδου
      description: Καθορίζει τον τρόπο προετοιμασίας ή επεξεργασίας του σκόρδου πριν
        από την πώληση (π.χ., ολόκληρο, ψιλοκομμένο, σε σκόνη).
    garlic_variety:
      name: Ποικιλία σκόρδου
      description: Προσδιορίζει τη βοτανική ή εμπορική ποικιλία/καλλιεργητική ποικιλία
        του σκόρδου που προσφέρεται.
    garment_back_style:
      name: Στυλ πλάτης ενδύματος
      description: Προσδιορίζει το σχέδιο ή την κατασκευή της πλάτης του ενδύματος
        (π.χ. ανοιχτή πλάτη, αθλητική πλάτη, χιαστί πλάτη).
    garment_pattern_type:
      name: Τύπος πατρόν ενδύματος
      description: Καθορίζει τον τύπο του ενδύματος που προορίζεται να δημιουργηθεί
        από το πατρόν ραπτικής.
    garnish_type:
      name: Τύπος γαρνιτούρας
      description: Προσδιορίζει το είδος της γαρνιτούρας (συστατικό ή στυλ γαρνιτούρας)
        που χρησιμοποιείται για την ολοκλήρωση ενός κοκτέιλ.
    gas_lift_class:
      name: Κατηγορία ανελκυστήρα αερίου
      description: Καθορίζει την κλάση ασφάλειας και αντοχής του κυλίνδρου αμορτισέρ
        αερίου που χρησιμοποιείται για τη ρύθμιση του ύψους του καθίσματος.
    gas_propellant_type:
      name: Τύπος προωθητικού αερίου
      description: Καθορίζει τον τύπο προωθητικού αερίου που συνιστάται ή είναι συμβατός
        όταν ο εκτοξευτής λειτουργεί με αέριο.
    gatta_tabla_tuning_block_material:
      name: Υλικό Gatta (ξύλινοι κύλινδροι κουρδίσματος τάμπλα)
      description: Υλικό των κυλίνδρων κουρδίσματος (gatta) που χρησιμοποιούνται μεταξύ
        του ιμάντα κουρδίσματος και του ηχείου (κελύφους).
    gauge_mounting_type:
      name: Τύπος τοποθέτησης μετρητή
      description: Τρόπος στήριξης/εγκατάστασης του μετρητή καυσίμου στο σκάφος.
    gauge_style:
      name: Στυλ μετρητή
      description: Καθορίζει τον τύπο του μανόμετρου που διαθέτει η αντλία, όπως αναλογικό
        με καντράν, με ψηφιακή ένδειξη ή χωρίς μανόμετρο).
    gear_oil_api_classification:
      name: Ταξινόμηση API λιπαντικού κιβωτίου ταχυτήτων
      description: Ταξινόμηση API GL για βαλβολίνες που χρησιμοποιούνται σε διαφορικά/χειροκίνητα
        κιβώτια ταχυτήτων.
    gel_wax_density_grade:
      name: Βαθμός πυκνότητας κεριού σε μορφή τζελ
      description: Υποδεικνύει τον βαθμό πυκνότητας του κεριού gel, που επηρεάζει
        τη διαύγεια, τη συγκράτηση (φορτίο) του αρώματος και την καταλληλότητα για
        ενσωμάτωση αντικειμένων.
    gel_wax_transparency_level:
      name: Επίπεδο διαφάνειας κεριού σε μορφή τζελ
      description: Περιγράφει τη διαύγεια/αδιαφάνεια του κεριού τζελ όταν χρησιμοποιείται
        όπως προβλέπεται.
    gelatin_form:
      name: Μορφή ζελατίνης
      description: Προσδιορίζει τη φυσική μορφή της ζελατίνης ώστε οι χρήστες να μπορούν
        να επιλέξουν την κατάλληλη μορφή για συνταγές και βιομηχανικές εφαρμογές.
    gelatin_or_gelling_agent_source:
      name: Πηγή προέλευσης ζελατίνης ή πηκτικού μέσου
      description: Υποδεικνύει την προέλευση ή τον τύπο του πηκτικού μέσου που χρησιμοποιείται
        στο προϊόν, στοιχείο σημαντικό για διατροφικούς και θρησκευτικούς περιορισμούς.
    gelatin_source:
      name: Πηγή προέλευσης ζελατίνης
      description: Υποδεικνύει τη ζωική, φυτική ή συνθετική προέλευση της ζελατίνης,
        ώστε ο αγοραστής να μπορεί να επαληθεύσει τη συμβατότητα με διατροφικές, ηθικές
        ή θρησκευτικές απαιτήσεις.
    gelling_agent:
      name: Πηκτικό μέσο
      description: Προσδιορίζει την κύρια ουσία που χρησιμοποιείται για την πήξη ή
        τη συμπύκνωση (πήξιμο) του επιδορπίου, στοιχείο σημαντικό για τη διατροφική
        συμβατότητα και την υφή.
    gemstone_clarity_grade:
      name: Βαθμός καθαρότητας πολύτιμου λίθου
      description: Βαθμός καθαρότητας του πολύτιμου λίθου (όταν βαθμολογείται).
    gemstone_creation_method:
      name: Μέθοδος δημιουργίας πολύτιμου λίθου
      description: Υποδεικνύει εάν ο πολύτιμος λίθος είναι φυσικός, εργαστηριακός
        (τεχνητός) ή προϊόν απομίμησης/προσομοίωσης.
    gemstone_cut_style:
      name: Στυλ κοπής πολύτιμου λίθου
      description: Περιγράφει το στυλ κοπής/φινίρισμα του δείγματος πολύτιμου λίθου.
    gemstone_treatment_status:
      name: Κατάσταση επεξεργασίας πολύτιμου λίθου
      description: Υποδεικνύει εάν και πώς ο πολύτιμος λίθος έχει υποστεί επεξεργασία/βελτιωθεί.
    geological_period:
      name: Γεωλογική περίοδος
      description: Γεωλογική περίοδος (και προαιρετικά εποχή) του απολιθώματος όταν
        είναι γνωστή (π.χ. Ιουρασική, Κρητιδική, Ηώκαινος).
    gift_box_tin_insert_type:
      name: Τύπος εσωτερικού ενθέματος κουτιού δώρου/μεταλλικού κουτιού
      description: Διαμόρφωση του εσωτερικού ενθέματος για την οργάνωση/προστασία
        των κομματιών μέσα στο κουτί/μεταλλικό κουτί.
    gift_box_tin_sustainability_features:
      name: Χαρακτηριστικά βιωσιμότητας κουτιού δώρου/μεταλλικού κουτιού
      description: Χαρακτηριστικά που σχετίζονται με τη βιωσιμότητα της συσκευασίας
        του κουτιού δώρου/μεταλλικού κουτιού.
    gift_box_tin_window_type:
      name: Τύπος παραθύρου σε κουτί/μεταλλική συσκευασία δώρου
      description: Υποδεικνύει εάν το κουτί δώρου διαθέτει παράθυρο προβολής (διάφανη
        όψη) και τι στυλ είναι.
    gift_message_option:
      name: Επιλογή μηνύματος δώρου
      description: Καθορίζει εάν μπορεί να συμπεριληφθεί ένα μήνυμα/σημείωμα αποστολή
        δώρου και πώς (κανένα, συμπεριλαμβάνεται, προσαρμόσιμο).
    ginger_maturity:
      name: Ωριμότητα τζίντζερ
      description: Υποδεικνύει το στάδιο συγκομιδής του τζίντζερ, όπως πρώιμο ή ώριμο,
        το οποίο επηρεάζει την ένταση της γεύσης και τις προτιμώμενες μαγειρικές εφαρμογές.
    ginger_variety:
      name: Ποικιλία τζίντζερ
      description: Προσδιορίζει την καλλιεργητική ποικιλία, τον τύπο ή το συγγενές
        ρίζωμα εντός της οικογένειας τζίντζερ για τη διαφοροποίηση των γευστικών προφίλ
        και των μαγειρικών χρήσεων.
    glass_kiln_controller_type:
      name: Τύπος ελεγκτή κλιβάνου υαλουργίας
      description: Ο τύπος του ελεγκτή θερμοκρασίας/ψησίματος που περιλαμβάνεται στον
        κλίβανο.
    glass_kiln_firing_application:
      name: Εφαρμογή ψησίματος κλιβάνου υαλουργίας
      description: Κύρια(-ες) εφαρμογή(-ές) επεξεργασίας γυαλιού για την(τις) οποία(-ες)
        έχει σχεδιαστεί ο κλίβανος.
    glass_stone_application_method:
      name: Μέθοδος τοποθέτησης γυάλινων διακοσμητικών λίθων
      description: Καθορίζει τον τρόπο στερέωσης/εφαρμογής των διακοσμητικών λίθων
        σε έργα (π.χ. κολλητά, θερμοκολλητά, ραφτά).
    glass_tint:
      name: Απόχρωση γυαλιού
      description: Ο χρωματισμός του γυαλιού/πλαστικού του μπουκαλιού για τον έλεγχο
        της έκθεσης στο φως (σύνηθες στη ζυθοποιία/οινοποιία).
    glaze_firing_atmosphere:
      name: Συνθήκες ατμόσφαιρας κλιβάνου (για υάλωση)
      description: Η(Οι) ατμόσφαιρα(-ες) ψησίματος για την οποία έχει σχεδιαστεί η
        υάλωση.
    glaze_opacity:
      name: Βαθμός διαφάνειας της υάλωσης
      description: Το επίπεδο διαφάνειας της υάλωσης μετά το ψήσιμο.
    glaze_product_form:
      name: Μορφή προϊόντος γλάσου
      description: Η φυσική μορφή με την οποία παρέχεται η υάλωση (π.χ. υγρή, σε σκόνη,
        συμπυκνωμένη, σε σπρέι).
    glider_avionics_package:
      name: Πακέτο αεροηλεκτρονικών συστημάτων για ανεμόπτερα
      description: Υποδεικνύει το συνολικό επίπεδο των οργάνων πλοήγησης και πτήσης
        που είναι εγκατεστημένα στο ανεμόπτερο.
    glider_certification_rating:
      name: Βαθμολογία πιστοποίησης ανεμόπτερου
      description: Επίσημη κατηγορία πιστοποίησης που υποδηλώνει το επίπεδο ασφάλειας
        και απόδοσης του ανεμοπτέρου (π.χ. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Διαμόρφωση συστήματος προσγείωσης ανεμοπτέρου
      description: Καθορίζει τη διαμόρφωση του συστήματος προσγείωσης που χρησιμοποιείται
        από το ανεμόπτερο.
    glider_launch_method:
      name: Μέθοδος απογείωσης με ανεμόπτερο
      description: Καθορίζει τον τρόπο με τον οποίο το ανεμόπτερο συνήθως απογειώνεται
        ή απογειώνεται αυτόνομα.
    glider_performance_class:
      name: Κατηγορία απόδοσης ανεμοπτέρου
      description: Κατηγορία αγώνων/απόδοσης που χρησιμοποιείται συνήθως για ανεμόπτερα.
    glitter_application_method:
      name: Μέθοδος εφαρμογής γκλίτερ
      description: Υποδεικνύει την προβλεπόμενη τεχνική για την εφαρμογή/χρήση γκλίτερ
        χειροτεχνίας (π.χ. πασπάλισμα/ανακίνηση, ανάμειξη, τρίψιμο, εφαρμογή πάνω
        από κόλλα, εφαρμογή με πινέλο, ψεκασμός, θερμοκόλληση/ανάγλυφο).
    glitter_eco_friendly_claim:
      name: Περιβαλλοντικός ισχυρισμός (οικολογικό σήμα) γκλίτερ
      description: Περιβαλλοντικοί/οικολογικοί ισχυρισμοί ειδικά για γκλίτερ σε ελεύθερη
        μορφή.
    glitter_effect_type:
      name: Τύπος εφέ γκλίτερ
      description: Περιγράφει το οπτικό εφέ του γκλίτερ/της παγιέτας πέραν του βασικού
        χρώματος (π.χ. ολογραφικό, ιριδίζον).
    glitter_glue_base_solvent_type:
      name: Τύπος βάσης/διαλύτη κόλλας γκλίτερ
      description: Περιγράφει την κύρια βάση της κόλλας γκλίτερ (στοιχείο που ενδιαφέρει
        συχνά τους αγοραστές για τον καθαρισμό και τη συμβατότητα των υλικών).
    glitter_opacity_coverage:
      name: Καλυπτικότητα/Αδιαφάνεια γκλίτερ
      description: Υποδεικνύει τον βαθμό καλυπτικότητας του εφέ γκλίτερ κατά την εφαρμογή.
    glitter_use_suitability:
      name: Καταλληλότητα χρήσης γκλίτερ
      description: Υποδεικνύει το κύριο προβλεπόμενο ή εγκεκριμένο πλαίσιο χρήσης
        για το γκλίτερ σε σκόνη (π.χ. μόνο για χειροτεχνία, καλλυντικής χρήσης/ασφαλές
        για το σώμα, κατάλληλο για τρόφιμα).
    glove_armor_placement:
      name: Τοποθέτηση θωράκισης γαντιών
      description: Προσδιορίζει τα σημεία όπου βρίσκεται η προστατευτική θωράκιση
        στο γάντι.
    glove_cuff_length:
      name: Μήκος μανσέτας γαντιού
      description: Υποδεικνύει το μήκος κάλυψης της μανσέτας/γαντιού ενός αγωνιστικού
        γαντιού στον καρπό/αντιβράχιο.
    glove_finger_coverage:
      name: Επίπεδο κάλυψης δακτύλων γαντιού
      description: Περιγράφει το επίπεδο κάλυψης των δακτύλων που παρέχεται από το
        γάντι, από σχέδια με πλήρη κάλυψη δακτύλων έως σχέδια χωρίς δάχτυλα.
    glove_finger_design:
      name: Σχεδιασμός δακτύλων γαντιού
      description: Καθορίζει τη διαμόρφωση των δακτύλων του γαντιού, όπως κλασικό
        πενταδάκτυλο ή μονοκόμματο.
    glove_fit_profile:
      name: Προφίλ εφαρμογής γαντιών
      description: Περιγράφει το εσωτερικό σχήμα και τη συνολική γραμμή του γαντιού,
        ώστε οι παίκτες να μπορούν να επιλέξουν την αίσθηση που προτιμούν.
    glove_insulation:
      name: Θερμομόνωση γαντιών
      description: Καθορίζει τη θερμομόνωση/θερμική κατασκευή ή το σύστημα θέρμανσης
        του γαντιού (π.χ. επίπεδο μόνωσης, τεχνολογία επένδυσης/μόνωσης ή θερμαινόμενος
        τύπος).
    glove_palm_material:
      name: Υλικό παλάμης γαντιού
      description: Καθορίζει το πρωτεύον υλικό που χρησιμοποιείται στην παλάμη του
        γαντιού (κύρια επιφάνεια επαφής/κρατήματος), το οποίο ενδέχεται να διαφέρει
        από το υλικό στο πάνω μέρος του χεριού.
    glove_size:
      name: Μέγεθος γαντιού
      description: Υποδεικνύει το γενικό μέγεθος χεριού για το οποίο έχουν σχεδιαστεί
        τα γάντια σάκου, το οποίο συχνά εκφράζεται με κωδικούς μεγεθών ένδυσης ή παιδικά/εφηβικά
        μεγέθη.
    glove_webbing_style:
      name: Τύπος πλέγματος γαντιού
      description: Καθορίζει το σχέδιο του πλέγματος ή της υποδοχής του γαντιού, στοιχείο
        που επηρεάζει τον έλεγχο της μπάλας, την καταλληλότητα της θέσης και τις προτιμήσεις
        του παίκτη.
    glow_effect:
      name: Εφέ λάμψης
      description: Υποδεικνύει εάν τα σφαιρίδια τζελ διαθέτουν φωσφορίζουσες ιδιότητες
        ή ιδιότητες τροχιοδεικτικού ιχνηλάτη για παιχνίδι σε συνθήκες χαμηλού φωτισμού.
    glow_plug_connector_type:
      name: Τύπος συνδέσμου προθερμαντήρα
      description: Ο τύπος του ηλεκτρικού ακροδέκτη/συνδέσμου επάνω στον προθερμαντήρα
        για τη σύνδεση με την πλεξούδα καλωδίωσης του οχήματος.
    glow_plug_heating_element_type:
      name: Τύπος θερμαντικού στοιχείου προθερμαντήρα
      description: Τύπος/τεχνολογία του θερμαντικού στοιχείου που χρησιμοποιείται
        από τον προθερμαντήρα.
    glue_application_format:
      name: Μορφή εφαρμογής κόλλας
      description: Καθορίζει τη μορφή του απλικατέρ/διανομέα που χρησιμοποιείται για
        την εφαρμογή σχολικής κόλλας.
    glue_applicator_type:
      name: Τύπος απλικατέρ κόλλας
      description: Καθορίζει το στυλ του ενσωματωμένου απλικατέρ/διανομέα που χρησιμοποιείται
        για την εφαρμογή της υγρής κόλλας.
    glue_base_formulation:
      name: Χημική σύσταση κόλλας
      description: Προσδιορίζει την κύρια χημική/βασική σύνθεση της υγρής κόλλας χειροτεχνίας
        (για απόδοση, ασφάλεια και ευκολία καθαρισμού).
    glue_gun_nozzle_style:
      name: Στυλ ακροφυσίου πιστολιού θερμοκόλλησης
      description: Καθορίζει το φυσικό στυλ ακροφυσίου ενός πιστολιού θερμοκόλλησης,
        το οποίο επηρεάζει την ακρίβεια εφαρμογής και την κάλυψη της κόλλας.
    glue_safety_standard:
      name: Πρότυπο ασφαλείας κόλλας
      description: Υποδεικνύει εάν η κόλλα είναι μη τοξική / ασφαλής για παιδιά σύμφωνα
        με τη σήμανση και τα κοινά πρότυπα.
    goal_frame_material:
      name: Υλικό πλαισίου τέρματος
      description: Προσδιορίζει το υλικό των δοκαριών/του πλαισίου του τέρματος, το
        οποίο επηρεάζει το βάρος, τη φορητότητα και την αντοχή στις καιρικές συνθήκες.
    goal_size:
      name: Μέγεθος τέρματος
      description: Κατατάσσει ένα τέρμα ποδοσφαίρου σε ομάδες μεγεθών για αγώνες ή
        προπόνηση, διευκολύνοντας την επιλογή σε σχέση με τις σκέτες διαστάσεις.
    goal_size_classification:
      name: Κατάταξη μεγέθους τέρματος
      description: Υποδηλώνει την τυποποιημένη κατηγορία μεγέθους του τέρματος (π.χ.
        πλήρες μέγεθος, εφηβικό, μίνι) ώστε οι χρήστες να μπορούν γρήγορα να επιλέγουν
        εξοπλισμό κατάλληλο για το επίπεδο παιχνιδιού τους.
    goal_size_standard:
      name: Πρότυπο μεγέθους τέρματος
      description: Υποδεικνύει το επίσημο πρότυπο ή την ηλικιακή ομάδα του τέρματος
        (π.χ., κανονισμός World Aquatics, 12U).
    goalie_configuration:
      name: Διαμόρφωση τερματοφύλακα
      description: Δηλώνει τον αριθμό των τερμάτων ανά σετ που εμφανίζονται στον πίνακα
        (στυλ αμερικανικού 3-τερματοφυλάκων έναντι ευρωπαϊκού 1-τερματοφύλακα).
    goalie_playing_surface:
      name: Επιφάνεια παιχνιδιού τερματοφύλακα
      description: Καθορίζει την κύρια επιφάνεια ή το περιβάλλον παιχνιδιού για το
        οποίο έχει σχεδιαστεί το σετ εξοπλισμού τερματοφύλακα χόκεϊ.
    goalkeeper_glove_cut:
      name: Κοπή γαντιών τερματοφύλακα
      description: Υποδεικνύει το στυλ κατασκευής (κοπή) παλάμης/δακτύλων των γαντιών
        τερματοφύλακα, το οποίο επηρεάζει την εφαρμογή, την αίσθηση της μπάλας και
        τον έλεγχο.
    goalkeeper_training_aid_type:
      name: Τύπος βοηθήματος προπόνησης τερματοφύλακα
      description: Προσδιορίζει το στυλ του βοηθήματος προπόνησης τερματοφύλακα, επιτρέποντας
        το ακριβές φιλτράρισμα.
    goblet_drum_playing_style:
      name: Στυλ παιξίματος τυμπάνου Goblet
      description: Είτε το όργανο έχει σχεδιαστεί κυρίως για παίξιμο με το χέρι είτε
        για χρήση με μπαγκέτες/κόπανους.
    gobo_format:
      name: Μορφή Gobo
      description: Καθορίζει το μέγεθος/πρότυπο gobo που δέχεται ο προβολέας (διάμετρος
        και πάχος), διασφαλίζοντας τη συμβατότητα με ανταλλακτικά/προσαρμοσμένα gobo.
    gobo_root_variety:
      name: Ποικιλία ρίζας Gobo
      description: Προσδιορίζει τη συγκεκριμένη καλλιέργεια ή ποικιλία της ρίζας gobo
        (burdock).
    gobo_rotation:
      name: Περιστροφή Gobo
      description: Καθορίζει εάν το gobo μπορεί να περιστραφεί και ποια κατεύθυνση
        υποστηρίζεται.
    goggle_accessory_type:
      name: Τύπος αξεσουάρ γυαλιών προστασίας
      description: Ταξινομεί το είδος του αξεσουάρ (π.χ. κάλυμμα, θήκη, λουράκι) ώστε
        ο αγοραστής να μπορεί να φιλτράρει το διαφορετικό σετ προϊόντων σε αυτήν την
        ευρύτερη κατηγορία.
    goggle_features:
      name: Χαρακτηριστικά των προστατευτικών γυαλιών
      description: Παραθέτει ειδικά λειτουργικά ή σχεδιαστικά χαρακτηριστικά που προσφέρουν
        τα γυαλιά.
    goggle_fit_design:
      name: Σχεδιασμός εφαρμογής προστατευτικών γυαλιών
      description: Περιγράφει τον τρόπο με τον οποίο προορίζονται να εφαρμόζουν ή
        να φοριούνται τα γυαλιά, συμπεριλαμβανομένης της συμβατότητας OTG (πάνω από
        τα γυαλιά).
    goggle_gasket_material:
      name: Υλικό φλάντζας προστατευτικών γυαλιών
      description: Υλικό της στεγανοποίησης που εφαρμόζει στο πρόσωπο, το οποίο επηρεάζει
        την άνεση, τις αλλεργίες και την πρόληψη διαρροών.
    goggle_integration:
      name: Ενσωμάτωση στα προστατευτικά γυαλιά
      description: Υποδεικνύει αν το κράνος έχει σχεδιαστεί για χρήση με προστατευτικά
        γυαλιά ή/και αν περιλαμβάνει ενσωματωμένα χαρακτηριστικά για τη σταθεροποίησή
        τους.
    goggle_lens_shape:
      name: Σχήμα φακού προστατευτικών γυαλιών
      description: Ορίζει το προφίλ καμπυλότητας του φακού αντικατάστασης, επηρεάζοντας
        την παραμόρφωση και το οπτικό πεδίο (π.χ., κυλινδρικό, σφαιρικό, τορικό).
    goggle_lens_tint:
      name: Απόχρωση φακού προστατευτικών γυαλιών
      description: Ορίζει την απόχρωση ή το φινίρισμα του φακού, το οποίο επηρεάζει
        τη μετάδοση του φωτός, την αντίληψη χρώματος και την αισθητική εμφάνιση.
    goggle_strap_material:
      name: Υλικό ιμάντα γυαλιών
      description: Κύριο υλικό που χρησιμοποιείται για τον ιμάντα κεφαλής, το οποίο
        επηρεάζει την ανθεκτικότητα και την άνεση.
    golf_accessory_set_purpose:
      name: Σκοπός του σετ αξεσουάρ γκολφ
      description: Προσδιορίζει την κύρια προβλεπόμενη χρήση ή το θέμα του σετ αξεσουάρ
        γκολφ.
    golf_bag_style:
      name: Στυλ τσάντας γκολφ
      description: Υποδεικνύει τον κύριο σχεδιασμό ή το στυλ εφαρμογής της τσάντας
        του γκολφ (π.χ. με στήριγμα, για αμαξίδιο, για το προσωπικό).
    golf_ball_alignment_design:
      name: Σχεδιασμός ευθυγράμμισης μπάλας γκολφ
      description: Καθορίζει οποιοδήποτε ενσωματωμένο βοήθημα οπτικής ευθυγράμμισης
        που είναι τυπωμένο ή ανάγλυφο στην επιφάνεια της μπάλας.
    golf_ball_construction:
      name: Κατασκευή μπάλας γκολφ
      description: Καθορίζει τον αριθμό των στρώσεων/κομματιών που χρησιμοποιούνται
        στην κατασκευή της μπάλας του γκολφ, ο οποίος επηρεάζει τo φάλτσο (spin),
        την αίσθηση και την απόσταση.
    golf_ball_cover_material:
      name: Υλικό εξωτερικού περιβλήματος μπάλας γκολφ
      description: Προσδιορίζει το εξωτερικό υλικό περιβλήματος της μπάλας του γκολφ,
        το οποίο επηρεάζει το φάλτσο, την ανθεκτικότητα και την αίσθηση.
    golf_cart_cover_climate_use:
      name: Κλιματική χρήση καλύμματος αμαξιδίου γκολφ (golf cart)
      description: Υποδεικνύει την κύρια κλιματική/εποχική συνθήκη στην οποία έχει
        σχεδιαστεί να αντέχει το κάλυμμα αποθήκευσης.
    golf_cart_enclosure_fit_type:
      name: Τύπος εφαρμογής περιβλήματος αμαξιδίου γκολφ
      description: Καθορίζει εάν το περίβλημα έχει σχεδιαστεί για συγκεκριμένο αριθμό
        θέσεων/διάταξη (form factor) ή προσφέρει γενική/ρυθμιζόμενη εφαρμογή.
    golf_cart_intended_use:
      name: Προβλεπόμενη χρήση αμαξιδίου γκολφ
      description: Η κύρια προβλεπόμενη χρήση ή περίπτωση χρήσης για την οποία έχει
        σχεδιαστεί ή διαμορφωθεί το αμαξίδιο γκολφ.
    golf_club_number:
      name: Αριθμός μπαστουνιού γκολφ
      description: Προσδιορίζει τον συγκεκριμένο αριθμό ή την ονομασία σφήνας (wedge)
        που είναι τυπωμένη στο μπαστούνι (π.χ. 5, PW, GW).
    golf_club_part_type:
      name: Τύπος εξαρτήματος μπαστουνιού γκολφ
      description: Κατηγοριοποιεί το αξεσουάρ ή το εξάρτημα του μπαστουνιού του γκολφ
        σε κοινούς υποτύπους (π.χ. μανίκι προσαρμογέα, χιτώνιο, δακτύλιο, βάρος).
    golf_grip_size:
      name: Μέγεθος λαβής γκολφ
      description: Καθορίζει τη συνολική κατηγορία εξωτερικού μεγέθους της λαβής του
        γκολφ, υποδεικνύοντας πόσο παχιά είναι η λαβή στο χέρι.
    golf_shoe_spike_type:
      name: Τύπος καρφιών παπουτσιού γκολφ
      description: Προσδιορίζει τον τύπο του συστήματος πρόσφυσης που χρησιμοποιείται
        στην εξωτερική σόλα των παπουτσιών γκολφ (π.χ. σχέδια με καρφιά ή χωρίς καρφιά).
    golf_tee_style:
      name: Τύπος βάσης μπάλας γκολφ
      description: Περιγράφει το δομικό ή λειτουργικό στυλ/σχεδιασμό της βάσης στήριξης
        (golf tee), το οποίο επηρεάζει το ύψος της μπάλας, την ανθεκτικότητα ή τη
        μείωση του φάλτσου (spin).
    golf_training_focus:
      name: Εστίαση στην προπόνηση γκολφ
      description: Ταξινομεί την κύρια δεξιότητα ή πτυχή την οποία το προϊόν προορίζεται
        να βελτιώσει.
    golf_training_objective:
      name: Στόχος προπόνησης γκολφ
      description: Προσδιορίζει τη βασική δεξιότητα ή πτυχή του γκολφ για την οποία
        έχει σχεδιαστεί το βοήθημα προπόνησης.
    gong_profile_type:
      name: Τύπος προφίλ Γκονγκ
      description: Περιγράφει το φυσικό προφίλ του γκονγκ της όπερας (π.χ. επίπεδο
        έναντι υπερυψωμένου κέντρου), το οποίο επηρεάζει έντονα τον τόνο και το στυλ
        παιξίματος.
    grading_scale:
      name: Κλίμακα βαθμολόγησης
      description: Η κλίμακα βαθμολόγησης που χρησιμοποιείται σε ένα βαθμολογημένο
        επενδυτικό νόμισμα (bullion) (π.χ. κλίμακα Sheldon 1-70).
    grading_service:
      name: Υπηρεσία βαθμολόγησης
      description: Ανεξάρτητη υπηρεσία αξιολόγησης/πιστοποίησης τρίτος για το νόμισμα
        ή το χαρτονόμισμα (π.χ. PCGS, NGC).
    graduation_increment:
      name: Διαβάθμιση κλίμακας (Graduation increment)
      description: Καθορίζει τη μικρότερη τυπωμένη/χαραγμένη διαίρεση στην κλίμακα
        του μετρητή ραφής (την ανάλυση των σημάνσεων).
    grain_processing_method:
      name: Μέθοδος επεξεργασίας σιτηρών
      description: Προσδιορίζει την κύρια μέθοδο επεξεργασίας που εφαρμόζεται στον
        κόκκο (π.χ. προβρασμένο, σε νιφάδες, με φύτρα), η οποία επηρεάζει τον χρόνο
        μαγειρέματος, την υφή και τη θρεπτική αξία.
    grand_piano_soundboard_material:
      name: Υλικό ηχητικής πλάκας μεγάλου πιάνου
      description: Κύριο υλικό που χρησιμοποιείται για το ηχείο πιάνου (resonant board),
        το οποίο επηρεάζει τον τόνο και την ανθεκτικότητα.
    grappling_dummy_pose:
      name: Πόζα ομοιώματος προπόνησης
      description: Περιγράφει την προεπιλεγμένη θέση/στάση σώματος του ομοιώματος,
        προσδιορίζοντας ποιες ασκήσεις και τεχνικές υποστηρίζονται.
    grease_application:
      name: Εφαρμογή γράσου
      description: Καθορίζει το κύριο εξάρτημα του οχήματος ή την περίπτωση χρήσης
        για την οποία προορίζεται το γράσο.
    grease_consistency_grade_nlgi:
      name: Βαθμός συνεκτικότητας γράσου (NLGI)
      description: Καθορίζει τον αριθμό συνεκτικότητας NLGI που υποδεικνύει τη σταθερότητα
        του γράσου (π.χ. το NLGI 2 είναι κοινό γράσο πολλαπλών χρήσεων).
    grease_thickener_type:
      name: Τύπος πυκνωτικού μέσου γράσου
      description: Καθορίζει το σύστημα πυκνωτικού μέσου/σαπωνοποιητή που χρησιμοποιείται
        στη σύνθεση του γράσου.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Τύπος βαλβίδας επιστομίου για γκάιντες Great Highland
      description: Καθορίζει το σύστημα βαλβίδας αντεπιστροφής που χρησιμοποιείται
        στον σωλήνα φυσήματος.
    great_highland_bagpipes_drone_configuration:
      name: Διαμόρφωση drone για γκάιντες Great Highland
      description: Καθορίζει τους τύπους drones που περιλαμβάνονται στο σετ.
    great_highland_bagpipes_mounting_material:
      name: Υλικό διακοσμητικών στοιχείων στήριξης γκάιντας Great Highland
      description: Καθορίζει το υλικό των διακοσμητικών στοιχείων στήριξης στις γκάιντες
        (π.χ. νικέλιο-ασήμι, απομίμηση ελεφαντόδοντου).
    greens_maturity_stage:
      name: Στάδιο ωριμότητας των φυλλωδών λαχανικών
      description: Υποδεικνύει το στάδιο ανάπτυξης των φυλλωδών λαχανικών κατά τη
        συγκομιδή.
    greens_preparation_state:
      name: Κατάσταση προετοιμασίας των φυλλωδών λαχανικών
      description: Περιγράφει τον τρόπο επεξεργασίας ή συσκευασίας των φυλλωδών λαχανικών
        (π.χ., προπλυμένα, ψιλοκομμένα, έτοιμα προς κατανάλωση).
    grenade_effect_type:
      name: Τύπος εφέ χειροβομβίδας
      description: Υποδεικνύει το κύριο λειτουργικό αποτέλεσμα που παράγεται από τη
        χειροβομβίδα paintball μόλις ενεργοποιηθεί (π.χ. καπνός, μπογιά, κρότος λάμψης).
    grid_unit:
      name: Μονάδα πλέγματος
      description: Το κύριο σύστημα μέτρησης που είναι τυπωμένο στο χαλάκι/υπόστρωμα
        (εάν υπάρχει πλέγμα/κλίμακα).
    grille_emblem_provision:
      name: Υποδοχή εμβλήματος μάσκας
      description: Καθορίζει εάν η μάσκα υποστηρίζει ένα έμβλημα/σήμα OEM και πώς.
    grille_mounting_method:
      name: Μέθοδος τοποθέτησης πλέγματος
      description: Καθορίζει τον τρόπο εγκατάστασης της μάσκας στο όχημα (π.χ. άμεση
        αντικατάσταση έναντι ένθετου/επικάλυψης, βιδωτή σύνδεση έναντι κλιπαριστής/κουμπωτής,
        απαιτείται διάτρηση έναντι μη απαιτούμενης διάτρησης).
    grille_style:
      name: Στυλ πλέγματος
      description: Καθορίζει το οπτικό/σχεδιαστικό στυλ της μάσκας του οχήματος.
    grip_chalk_form:
      name: Μορφή κιμωλίας λαβής
      description: Προσδιορίζει τη φυσική μορφή της κιμωλίας που παρέχεται ή χρησιμοποιείται
        με την τσάντα.
    grip_coverage:
      name: Κάλυψη λαβής
      description: Προσδιορίζει την παρουσία και την τοποθέτηση στοιχείων λαβής από
        σιλικόνη ή καουτσούκ στην κάλτσα.
    grip_design:
      name: Σχεδιασμός λαβής
      description: Καθορίζει τη διαμόρφωση λαβής ή οπής της πλάκας για ευκολότερη
        μεταφορά και ευελιξία άσκησης.
    grip_enhancer_effect:
      name: Εφέ ενίσχυσης πρόσφυσης
      description: Περιγράφει το κύριο χαρακτηριστικό απόδοσης που παρέχει το προϊόν
        (π.χ. απορρόφηση υγρασίας ή κολλώδη υφή ρητίνης).
    grip_enhancer_form:
      name: Μορφή ενισχυτικού πρόσφυσης
      description: Προσδιορίζει τη φυσική μορφή ή τη μορφή του προϊόντος ενίσχυσης
        πρόσφυσης, ώστε οι αθλητές να μπορούν να επιλέγουν την κατάλληλη μέθοδο εφαρμογής.
    grip_features:
      name: Χαρακτηριστικά λαβής
      description: Υποδεικνύει χαρακτηριστικά ενσωματωμένης λαβής/χειρολαβής που προορίζονται
        να βελτιώσουν το κράτημα, την άνεση ή τον έλεγχο κατά τη διάρκεια του παιχνιδιού.
    grip_material:
      name: Υλικό λαβής
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για την επιφάνεια κρατήματος
        του παντελονιού.
    grip_shape:
      name: Σχήμα λαβής
      description: Περιγράφει το σχήμα ή το στυλ της λαβής σε διατομή, το οποίο είναι
        ιδιαίτερα σημαντικό για τις λαβές putter.
    grip_surface_type:
      name: Τύπος επιφάνειας πρόσφυσης
      description: Περιγράφει τον σχεδιασμό του πέλματος/επιφάνειας πρόσφυσης της
        επιφάνειας του πεντάλ, ο οποίος επηρεάζει την πρόσφυση και την αίσθηση.
    grip_tackiness_level:
      name: Επίπεδο κολλώδους πρόσφυσης
      description: Αξιολογεί πόσο ήπια ή έντονα κολλώδης είναι η επιφάνεια λαβής,
        βοηθώντας τους παίκτες να επιλέξουν ανάμεσα σε μια στεγνή αίσθηση και έναν
        έλεγχο υψηλής πρόσφυσης.
    grip_tape_form:
      name: Μορφή ταινίας πρόσφυσης
      description: Υποδεικνύει τη μορφή διάθεσης του προϊόντος ταινίας πρόσφυσης/λαβής
        (π.χ. φύλλο, ρολό, κιτ ψεκασμού).
    grip_wax_form:
      name: Μορφή κεριού πρόσφυσης
      description: Ταξινομεί τη φυσική μορφή στην οποία πωλείται το κερί πρόσφυσης.
    gripper_coverage:
      name: Κάλυψη λαβίδας
      description: Καθορίζει το στυλ του μηχανισμού πρόσφυσης στο αντιολισθητικό παπούτσι,
        υποδεικνύοντας την κάλυψη της επιφάνειας και τη δυνατότητα αφαίρεσης.
    grommet_application_material:
      name: Υλικό δακτυλίων στεγανοποίησης
      description: Πρωτεύον(-οντα) υλικό(-ά) στο(στα) οποίο(-α) προορίζεται(-ονται)
        να τοποθετηθούν οι δακτύλιοι στεγανοποίησης (π.χ. ύφασμα, δέρμα, βινύλιο,
        μουσαμάς/καμβάς).
    grommet_duty_rating:
      name: Αξιολόγηση αντοχής δακτυλίων
      description: Υποδεικνύει την προβλεπόμενη κατηγορία χρήσης/αντοχής του δακτυλίου.
    grommet_style:
      name: Στυλ δακτυλίου
      description: Στυλ κατασκευής του σετ δακτυλίων (πώς συναρμολογείται/χρησιμοποιείται).
    grooming_glove_texture_type:
      name: Τύπος υφής γαντιού περιποίησης κατοικιδίων
      description: Προσδιορίζει την κύρια υφή της επιφάνειας που χρησιμοποιείται για
        περιποίηση, υποδεικνύοντας τον προβλεπόμενο σκοπό, όπως τρίψιμο, γυάλισμα
        ή πλύσιμο.
    groove_orientation:
      name: Προσανατολισμός αυλακώσεων
      description: Περιγράφει την κατεύθυνση/διάταξη των αυλακώσεων ή των ραβδώσεων
        στο όργανο.
    groove_sampler_onboard_effects:
      name: Ενσωματωμένα εφέ του groove sampler
      description: Υποδεικνύει τις κατηγορίες ενσωματωμένης επεξεργασίας εφέ που είναι
        διαθέσιμες στο groove sampler (insert/master), όπως reverb, delay, συμπίεση,
        παραμόρφωση, EQ, φιλτράρισμα.
    groove_sampler_storage_expansion_type:
      name: Τύπος επέκτασης αποθήκευσης του groove sampler
      description: Καθορίζει επιλογές αφαιρούμενης/επεκτάσιμης αποθήκευσης που υποστηρίζονται
        από το groove sampler.
    ground_attachment_method:
      name: Τρόπος στερέωσης στο έδαφος
      description: Περιγράφει τον τρόπο με τον οποίο το τόξο πάσας ασφαλίζεται στην
        επιφάνεια παιχνιδιού, επηρεάζοντας τη σταθερότητα και τη συμβατότητα με την
        επιφάνεια.
    groupset_components_included:
      name: Περιλαμβάνονται εξαρτήματα groupset
      description: Παραθέτει τα συγκεκριμένα εξαρτήματα του συστήματος μετάδοσης κίνησης
        που περιλαμβάνονται στο σετ εξαρτημάτων, ώστε ο πελάτης να κατανοήσει τα περιεχόμενα
        του σετ.
    gt_racing_class:
      name: Κατηγορία αγώνων GT
      description: Καθορίζει την κατηγορία/κλάση GT για την οποία έχει κατασκευαστεί
        ή είναι εγκεκριμένο το αυτοκίνητο για να συμμετάσχει σε αγώνες.
    guard_construction_type:
      name: Τύπος κατασκευής προστατευτικού
      description: Υποδεικνύει αν το προστατευτικό είναι σκληρού κελύφους, μαλακής
        επένδυσης θωράκισης ή αν είναι σχεδιασμένο σε στυλ μανικιού/ιμάντα.
    guard_size_measurement_basis:
      name: Βάση μέτρησης μεγέθους προστατευτικού
      description: Σε ποια μέτρηση βασίζεται η επιλογή του μεγέθους (π.χ. περιφέρεια
        αγκώνα, περιφέρεια καρπού, περιφέρεια αντιβραχίου).
    guard_style:
      name: Στυλ προστατευτικού
      description: Ταξινομεί την κατασκευή ή τον τύπο του προστατευτικού λεπίδας του
        παγοπέδιλου για να βοηθήσει τον αγοραστή να διαφοροποιήσει γρήγορα μεταξύ
        των προστατευτικών σκληρού τύπου, των υφασμάτινων προστατευτικών απορρόφησης
        υγρασίας, των προστατευτικών με ελατήριο και άλλων σχεδίων.
    guava_flesh_color:
      name: Χρώμα σάρκας γκουάβα
      description: Υποδεικνύει το εσωτερικό χρώμα της σάρκας του καρπού της γκουάβα.
    guava_variety:
      name: Ποικιλία γκουάβα
      description: Προσδιορίζει την συγκεκριμένη καλλιεργήσιμη ποικιλία ή εμπορική
        ποικιλία γκουάβα που πωλείται (π.χ., γκουάβα μήλο, μεξικάνικη κρέμα, ταϊλανδέζικη,
        ροζ, χωρίς κουκούτσια, λευκή).
    guide_material:
      name: Υλικό οδηγού
      description: Υλικό που χρησιμοποιείται για τους οδηγούς ή τα ένθετα των οδηγών
        του καλαμιού ψαρέματος.
    guide_type:
      name: Τύπος οδηγού
      description: Καθορίζει το στυλ του οδηγού που είναι τοποθετημένος σε ένα καλάμι
        ψαρέματος, όπως μονής στήριξης, οδηγός με ράουλο ή ελικοειδής.
    guideline_markings:
      name: Σημάνσεις καθοδήγησης
      description: Τύπος οπτικών σημάνσεων ευθυγράμμισης που είναι τυπωμένες ή ανάγλυφες
        στην επιφάνεια του τάπητα προπόνησης για να βοηθούν στις ασκήσεις ρίψης.
    guiro_scraper_material:
      name: Υλικό ξύστρας Guiro
      description: Υλικό της παρεχόμενης ή συνιστώμενης ξύστρας/striker που χρησιμοποιείται
        με το guiro.
    guiro_surface_style:
      name: Στυλ επιφάνειας του Guiro
      description: Περιγράφει το μοτίβο/γεωμετρία της επιφάνειας κρούσης που ξύνεται
        για να παραχθεί ήχος.
    guitar_body_finish_type:
      name: Τύπος φινιρίσματος σώματος κιθάρας
      description: Καθορίζει το φινίρισμα που χρησιμοποιείται στο σώμα της κιθάρας.
    guitar_bridge_system_type:
      name: Τύπος συστήματος γέφυρας κιθάρας
      description: Οικογένεια σχεδιασμού συστήματος γέφυρας/χορδοστάτη για συμβατότητα
        και περιήγηση.
    guitar_case_style:
      name: Στυλ θήκης κιθάρας
      description: Καθορίζει το συνολικό στυλ προστασίας/δομής της θήκης κιθάρας ή
        της υφασμάτινης θήκης μεταφοράς.
    guitar_humidifier_placement:
      name: Τοποθέτηση υγραντήρα κιθάρας
      description: Καθορίζει πού προορίζεται να χρησιμοποιηθεί/τοποθετηθεί ο υγραντήρας
        σε σχέση με το όργανο ή τον χώρο.
    guitar_pedal_i_o_configuration:
      name: Διαμόρφωση εισόδου/εξόδου πεντάλ κιθάρας
      description: Υποδεικνύει εάν το πεντάλ υποστηρίζει μονοφωνική ή στερεοφωνική
        δρομολόγηση εισόδου/εξόδου.
    guitar_pedal_output_connector_type:
      name: Τύπος βύσματος εξόδου πεντάλ κιθάρας
      description: Καθορίζει τον τύπο βύσματος εξόδου ήχου που χρησιμοποιείται από
        το πεντάλ.
    guitar_slide_finish:
      name: Φινίρισμα slide κιθάρας
      description: Επιφανειακό φινίρισμα του slide που επηρεάζει την αίσθηση και την
        τριβή με τις χορδές.
    guitar_slide_style:
      name: Slide κιθάρας
      description: Καθορίζει τον συντελεστή μορφής του slide ή του tone bar της κιθάρας
        και τον τρόπο που φοριέται/χρησιμοποιείται.
    guitar_stand_type:
      name: Τύπος βάσης κιθάρας
      description: Καθορίζει τον κύριο παράγοντα μορφής της βάσης κιθάρας (πώς στηρίζει/αποθηκεύει
        την κιθάρα).
    guitar_strap_attachment_type:
      name: Τύπος στερέωσης ζώνης κιθάρας
      description: Καθορίζει τον τρόπο με τον οποίο στερεώνεται η ζώνη στην κιθάρα
        (ή στα κουμπιά ζώνης), συμπεριλαμβανομένου του εάν χρησιμοποιεί παραδοσιακά
        άκρα ή συστήματα γρήγορης απελευθέρωσης.
    guitar_strap_end_material:
      name: Υλικό άκρου ζώνης κιθάρας
      description: Υλικό που χρησιμοποιείται στα άκρα/tabs της ζώνης (στα σημεία που
        προσαρμόζονται στα κουμπιά ζώνης ή στα συστήματα ασφάλισης με ζώνη).
    guitar_strap_features:
      name: Χαρακτηριστικά ιμάντα κιθάρας
      description: Ιδιαίτερα λειτουργικά χαρακτηριστικά της ζώνης κιθάρας πέρα από
        τα βασικά χαρακτηριστικά μέγεθος/υλικό (multi-select).
    guitar_string_coating:
      name: Επίστρωση χορδών κιθάρας
      description: Υποδεικνύει εάν οι χορδές διαθέτουν προστατευτική επίστρωση και,
        εάν ισχύει, το είδος της επίστρωσης.
    guitar_string_gauge_type:
      name: Τύπος πάχους χορδών κιθάρας
      description: Η κατηγορία πάχους ενός σετ χορδών ακουστικής κιθάρας στην αγορά
        (π.χ. extra light, light, medium). Συχνά προσεγγίζεται από το πάχος της ψηλής
        χορδής Μι (high E). Το ακριβές εύρος τιμών πάχους μπορεί να ποικίλλει ανάλογα
        με τον κατασκευαστή.
    guitar_string_set_gauge_category:
      name: Κατηγορία πάχους σετ χορδών κιθάρας
      description: Κοινές εμπορικές κατηγορίες πάχους για σετ χορδών κιθάρας (συνήθως
        προκύπτουν από το πάχος της ψηλής Μι / 1ης χορδής).
    guitar_string_winding_type:
      name: Τύπος περιέλιξης χορδών κιθάρας
      description: Καθορίζει το στυλ εξωτερικής περιέλιξης των τυλιχτών χορδών (wound
        strings) του σετ.
    guitar_tuning_peg_button_shape:
      name: Σχήμα μπουτόν κλειδιών κιθάρας
      description: Το σχήμα/στυλ του κλειδιού/μπουτόν κουρδίσματος
    guitar_tuning_peg_configuration:
      name: Διαμόρφωση διάταξης κλειδιών κουρδίσματος κιθάρας
      description: Η διάταξη του σετ κλειδιών πάνω στην κεφαλή της κιθάρας.
    guitar_tuning_peg_mounting_style:
      name: Τύπος στερέωσης κλειδιών κουρδίσματος κιθάρας
      description: Πώς τοποθετούνται τα κλειδιά κουρδίσματος στην κεφαλή (τύπος δακτυλίου
        και μέθοδος σταθεροποίησης/κατά της περιστροφής).
    guitar_tuning_peg_shaft_type:
      name: Τύπος άξονα κλειδιών σταθεροποίησης κιθάρας
      description: Αν ο άξονας υποδοχής της χορδής είναι συμπαγής ή σχιστός και ο
        τρόπος που ασφαλίζει η χορδή.
    guitar_tuning_peg_style:
      name: Τύπος κλειδιών κουρδίσματος κιθάρας
      description: Το στυλ κλειδιού/πείρου κουρδίσματος και η μορφή τοποθέτησης που
        χρησιμοποιείται στην κεφαλή ενός οργάνου (π.χ. κλειστού τύπου έναντι ανοιχτού
        τύπου γρανάζι, κλειδιά ασφαλείας, σχιστός άξονας).
    gum_condition:
      name: Κατάσταση γόμας γραμματοσήμου
      description: Η κατάσταση της γόμας στην πίσω όψη του γραμματοσήμου (π.χ. ασφράγιστο
        με πλήρη γόμα, αλλοιωμένη γόμα από χρήση, χωρίς γόμα).
    gun_action_type:
      name: Τύπος μηχανισμού λειτουργίας όπλου
      description: Τύπος μηχανικής δράσης που χρησιμοποιείται για πυροδότηση (π.χ.,
        δράση με κινητό κλείστρο, δράση με μοχλό).
    gun_operational_status:
      name: Κατάσταση λειτουργίας όπλου
      description: Υποδεικνύει εάν το συλλεκτικό όπλο είναι απενεργοποιημένο/δεν πυροδοτεί
        (και πώς παρουσιάζεται).
    gun_type:
      name: Τύπος όπλου
      description: Προσδιορίζει τον γενικό παράγοντα μορφής πυροβόλου όπλου για το
        όπλο αντίκα.
    gusset_material:
      name: Υλικό ενίσχυσης
      description: Καθορίζει το υλικό που χρησιμοποιείται στην επένδυση καβάλου/ενίσχυσης,
        το οποίο επηρεάζει την αναπνοή, την υγιεινή και την άνεση.
    gymnastics_discipline:
      name: Γυμναστική κατηγορία
      description: Καθορίζει τον κλάδο της γυμναστικής για τον οποίο προορίζεται το
        προϊόν (π.χ. Καλλιτεχνική, Ρυθμική, Ακροβατική).
    hair_extension_texture:
      name: Υφή extension μαλλιών
      description: Περιγράφει την μπούκλα, τον κυματισμό ή το μοτίβο υφής των τριχών
        του extension.
    hair_net_style:
      name: Στυλ διχτυού μαλλιών
      description: Προσδιορίζει τον σχεδιασμό ή το στυλ κατασκευής του διχτυού για
        τα μαλλιά (π.χ., φουσκωτό, σινιόν, κάλυμμα σε κότσο).
    hair_quality_grade:
      name: Κατηγορία ποιότητας μαλλιών
      description: Υποδηλώνει την ποιότητα του κλάδου/της ονομασίας προέλευσης των
        μαλλιών.
    halter_style:
      name: Στυλ Halter
      description: Προσδιορίζει το λειτουργικό ή σχεδιαστικό στυλ του καπιστριού (π.χ.
        σχοινί, breakaway, show), βοηθώντας τον αγοραστή να επιλέξει ένα καπίστρι
        κατάλληλο για την προβλεπόμενη χρήση του.
    hammock_style:
      name: Στυλ αιώρας
      description: Περιγράφει το δομικό στυλ ή την κατασκευή της αιώρας.
    hand_and_foot_coverage:
      name: Κάλυψη χεριών και ποδιών
      description: Περιγράφει ενσωματωμένα ή αποσπώμενα γάντια και μποτάκια που καλύπτουν
        τα χέρια ή/και τα πόδια.
    hand_cymbal_set_configuration:
      name: Διαμόρφωση σετ κυμβάλων χειρός
      description: Υποδεικνύει εάν το προϊόν πωλείται ως σετ δύο τεμαχίων, μονό πιατίνι
        ή μεγαλύτερο σετ.
    hand_drum_head_material:
      name: Υλικό μεμβράνης τυμπάνου χειρός
      description: Υλικό της μεμβράνης του τυμπάνου που χρησιμοποιείται στο κυπελλοειδές
        τύμπανο/τουμπερλέκι.
    hand_exerciser_style:
      name: Στυλ οργάνου γυμναστικής χεριών
      description: Ταξινομεί το συνολικό στυλ ή μηχανισμό του οργάνου γυμναστικής
        χεριών.
    hand_guard_backbone_material:
      name: Υλικό κεντρικού άξονα για την προστασία των χεριών
      description: Υλικό του εσωτερικού/δομικού άξονα (εάν υπάρχει), το οποίο καθορίζει
        την αντοχή και την προστασία.
    hand_guard_coverage_style:
      name: Στυλ κάλυψης προστατευτικού χεριών
      description: Περιγράφει την κάλυψη/προφίλ προστατευτικού χεριών, που επηρεάζει
        την προστασία από τον άνεμο/χτυπήματα.
    hand_guard_mounting_type:
      name: Τύπος τοποθέτησης προστατευτικού χεριών
      description: Καθορίζει τον τρόπο με τον οποίο συνδέονται τα προστατευτικά χεριών
        στη μοτοσικλέτα (π.χ. στο αντίβαρο με εσωτερικό σφιγκτήρα ή μόνο με σφιγκτήρα).
    hand_guard_set_configuration:
      name: Διαμόρφωση σετ προστατευτικού χειρός
      description: Υποδεικνύει εάν το προϊόν πωλείται ως ζεύγος (αριστερό/δεξί) ή
        ως μεμονωμένη πλευρά.
    hand_guard_style:
      name: Στυλ προστατευτικού χεριών
      description: Περιγράφει τον σχεδιασμό ή το στυλ κάλυψης του προστατευτικού (π.χ.
        Κλειστού τύπου, Ανοιχτού τύπου, Πλήρες, Lite, Standard).
    hand_guard_weather_protection:
      name: Προστατευτικό χεριών για προστασία από τις καιρικές συνθήκες
      description: Υποδεικνύει την προβλεπόμενη προστασία από τις καιρικές συνθήκες
        που παρέχουν τα προστατευτικά χεριών.
    hand_paddle_strap_type:
      name: Τύπος ιμάντα για paddle στο χέρι
      description: Καθορίζει τον τύπο του ιμάντα ή την απουσία ιμάντα που χρησιμοποιείται
        για τη στερέωση του paddle στο χέρι του χρήστη.
    hand_percussion_mount_attachment_mechanism:
      name: Μηχανισμός προσάρτησης βάσης για κρουστά χειρός
      description: Καθορίζει τον τρόπο με τον οποίο η βάση προσαρμόζεται σε ορθοστάτη,
        ράφι ή άλλο υλικό εξοπλισμό (π.χ. με σφιγκτήρα έναντι ράβδου).
    hand_percussion_mounting_handling:
      name: Τοποθέτηση/Χειρισμός κρουστών χειρός
      description: Υποδεικνύει εάν το όργανο είναι χειρός, φορετό, επιτραπέζιο/επιδαπέδιο
        ή αν στηρίζεται σε βάση κατά τη διάρκεια της τυπικής χρήσης.
    hand_percussion_pitch_type:
      name: Τύπος τονικού ύψους για κρουστά χειρός
      description: Υποδεικνύει εάν το όργανο παράγει συγκεκριμένο τονικό ύψος (κουρδίζεται/βγάζει
        νότες) ή απροσδιόριστο τονικό ύψος.
    hand_percussion_playing_method:
      name: Τρόπος παιξίματος κρουστών χειρός
      description: Ο τρόπος με τον οποίο παίζεται συνήθως το όργανο για την παραγωγή
        ήχου (π.χ. με ανακίνηση/κούνημα έναντι τριβής).
    hand_percussion_set_configuration:
      name: Διαμόρφωση σετ κρουστών χειρός
      description: Υποδεικνύει εάν το προϊόν πωλείται ως μεμονωμένο όργανο, ως συμβατό
        ζευγάρι ή ως σετ πολλαπλών τεμαχίων.
    hand_percussion_size_class:
      name: Κατηγορία μεγέθους κρουστών χειρός
      description: Γενική κατηγορία μεγέθους του οργάνου όταν δεν παρέχεται ακριβής
        μέτρηση ή για εύκολο φιλτράρισμα.
    hand_sewing_needle_point_type:
      name: Τύπος μύτης βελόνας για ράψιμο στο χέρι
      description: Το σχήμα/στυλ της μύτης της βελόνας για ράψιμο στο χέρι, που επιλέγεται
        ανάλογα με τη διαπερατότητα των διαφορετικών υλικών (π.χ. υφαντό ύφασμα, πλεκτά,
        δέρμα) ή νήματα.
    hand_support_level:
      name: Επίπεδο υποστήριξης χεριού
      description: Καθορίζει τον βαθμό υποστήριξης ή συμπίεσης που παρέχεται από το
        γάντι, το περικάρπιο ή τον ιμάντα.
    hand_support_size:
      name: Μέγεθος στηρίγματος χεριού
      description: Μέγεθος γαντιού, ιμάντα ή περικάρπιου που δηλώνεται από τον κατασκευαστή
        (XS-XXL ή ενιαίο μέγεθος).
    handball_ball_type:
      name: Τύπος μπάλας handball
      description: Υποδεικνύει την προβλεπόμενη κατηγορία χρήσης χάντμπολ, όπως για
        αγώνα, προπόνηση ή beach handball.
    handball_playing_surface:
      name: Επιφάνεια παιχνιδιού χάντμπολ
      description: Υποδεικνύει την(τις) επιφάνεια(-ες) παιχνιδιού για την(τις) οποία(-ες)
        έχει βελτιστοποιηθεί το χάντμπολ.
    handball_target_type:
      name: Τύπος στόχου χάντμπολ
      description: Καθορίζει το στυλ ή το σχέδιο του στόχου βολής που προορίζεται
        για την ομαδική προπόνηση χάντμπολ.
    handbrake_actuation_type:
      name: Τύπος ενεργοποίησης χειρόφρενου
      description: Καθορίζει τον τρόπο ενεργοποίησης του χειρόφρενου.
    handbrake_orientation:
      name: Προσανατολισμός χειρόφρενου
      description: Καθορίζει εάν το χειρόφρενο έχει σχεδιαστεί για οχήματα με τιμόνι
        αριστερά ή δεξιά ή εάν είναι γενικής χρήσης.
    handgun_grip_material:
      name: Υλικό λαβής πιστολιού
      description: Κύριο υλικό των λαβών/πλαισίων του πιστολιού χειρός.
    handle_configuration:
      name: Διαμόρφωση λαβής
      description: Περιγράφει το δομικό στυλ της λαβής wakeboard (π.χ. μονή, διπλή,
        Deep-V, T-wrap) ώστε ο αγοραστής να μπορεί να επιλέγει ανάλογα με δεξιότητες,
        κόλπα ή τύπο σανίδας.
    handle_ergonomics:
      name: Εργονομία λαβής
      description: Περιγράφει τα εργονομικά χαρακτηριστικά της λαβής που αποσκοπούν
        στη βελτίωση της άνεσης και του ελέγχου.
    handle_grip_material:
      name: Υλικό λαβής
      description: Καθορίζει το υλικό που χρησιμοποιείται στην επιφάνεια λαβής της
        λαβής, το οποίο επηρεάζει την άνεση και την πρόσφυση, ιδιαίτερα όταν είναι
        βρεγμένο.
    handle_grip_type:
      name: Τύπος λαβής
      description: Καθορίζει το κάλυμμα/υλικό ή το στυλ επιφάνειας της λαβής που αποσκοπεί
        στη βελτίωση της άνεσης και του ελέγχου.
    handle_shape:
      name: Σχήμα λαβής
      description: Σχήμα διατομής ή προφίλ της λαβής.
    handlebar_design:
      name: Σχεδιασμός τιμονιού
      description: Καθορίζει τον τύπο του τιμονιού στο stepper (όργανο γυμναστικής),
        όπως χωρίς τιμόνι, σταθερό, ρυθμιζόμενου ύψους, αναδιπλούμενο ή με λαβές ιμάντων
        αντίστασης.
    handlebar_type:
      name: Τύπος τιμονιού
      description: Προσδιορίζει το στυλ του τιμονιού που είναι τοποθετημένο στο ποδήλατο,
        ο οποίος επηρεάζει τη στάση του σώματος, τον έλεγχο και την άνεση κατά την
        οδήγηση.
    handslide_bore_type:
      name: Τύπος διαμετρήματος σωλήνα του σλάιντ
      description: Καθορίζει εάν το μπάσο τρομπόνι διαθέτει σλάιντ μονού ή διπλού
        διαμετρήματος.
    handwear_cuff_style:
      name: Στυλ μανσέτας γαντιού
      description: Περιγράφει τον τρόπο κατασκευής της μανσέτας ή του καρπού στα γάντια,
        κλασικά ή μονοκόμματα/mittens), ο οποίος επηρεάζει την κάλυψη και την εφαρμογή.
    handwear_insulation_material:
      name: Θερμομονωτικό υλικό γαντιών
      description: Προσδιορίζει το υλικό μόνωσης ή επένδυσης που χρησιμοποιείται στο
        εσωτερικό των γαντιών, κλασικών ή μονοκόμματων.
    handwear_size:
      name: Μέγεθος εξοπλισμού χεριών
      description: Καθορίζει το μέγεθος των γαντιών ή άλλων καλυμμάτων χεριών για
        τη διασφάλιση της σωστής εφαρμογής.
    hang_glider_design:
      name: Σχεδιασμός αιωροπτέρου
      description: Ταξινομεί το δομικό στυλ του αιωροπτέρου (π.χ. με εύκαμπτη πτέρυγα,
        με άκαμπτη πτέρυγα, μηχανοκίνητο).
    hanger_thread_size:
      name: Μέγεθος σπειρώματος ανάρτησης
      description: Υποδεικνύει το μέγεθος/πρότυπο του σπειρώματος της βίδας που χρησιμοποιείται
        για τη στερέωση του στηρίγματος σε ορθοστάτες (bank sticks) ή ειδοποιητές
        τσιμπιάς, διασφαλίζοντας τη συμβατότητα.
    hanging_suspension_method:
      name: Μέθοδος ανάρτησης στηρίγματος
      description: Καθορίζει τον κύριο υλικό εξοπλισμό ή σύστημα που χρησιμοποιείται
        για την ανάρτηση της κούνιας (π.χ. σχοινί, αλυσίδα, πλαίσιο στήριξης).
    hardtop_finish_type:
      name: Τύπος φινιρίσματος σκληρής οροφής
      description: Καθορίζει την κατάσταση του εξωτερικού φινιρίσματος της σκληρής
        οροφής (π.χ. με αστάρι ή βαμμένη), η οποία επηρεάζει την ετοιμότητα τοποθέτησης
        και την εμφάνιση.
    hardtop_shell_material:
      name: Υλικό κελύφους σκληρής οροφής
      description: Καθορίζει το κύριο υλικό του άκαμπτου κελύφους της σκληρής οροφής
        ενός οχήματος (εξαιρουμένου του υφασμάτινου καλύμματος), όπως υαλοβάμβακα
        ή αλουμίνιο.
    hardtop_window_configuration:
      name: Διαμόρφωση παραθύρων σκληρής οροφής
      description: Περιγράφει ποια παράθυρα περιλαμβάνονται στην σκληρή οροφή και
        τη διαμόρφωσή τους.
    harmonica_comb_material:
      name: Υλικό χτένας φυσαρμόνικας
      description: Υλικό κατασκευής του σώματος (comb) της φυσαρμόνικας.
    harmonica_cover_plate_finish:
      name: Φινίρισμα καλυμμάτων φυσαρμόνικας
      description: Καθορίζει το φινίρισμα ή την επίστρωση στα καλύμματα της φυσαρμόνικας.
    harmonica_cover_plate_material:
      name: Υλικό πλακών κάλυψης φυσαρμόνικας
      description: Υλικό κατασκευής των εξωτερικών καλυμμάτων.
    harmonica_finish:
      name: Φινίρισμα φυσαρμόνικας
      description: Φινίρισμα επιφάνειας των καλυμμάτων/σώματος φυσαρμόνικας.
    harmonica_included_accessories:
      name: Υλικά που περιλαμβάνονται στη φυσαρμόνικα
      description: Υποδεικνύει ποια αξεσουάρ περιλαμβάνονται στη φυσαρμόνικα.
    harmonica_note_range:
      name: Τονικό εύρος φυσαρμόνικας
      description: Ταξινόμηση εύρους οργάνων για χρήση σε ορχήστρα (π.χ. μπάσο, βαρύτονος,
        τενόρος).
    harmonica_reed_plate_material:
      name: Υλικό πλακών με γλωσσίδες φυσαρμόνικας
      description: Υλικό που χρησιμοποιείται για τις πλάκες με τις γλωσσίδες (π.χ.
        ορείχαλκος, ανοξείδωτος χάλυβας, αλουμίνιο).
    harmonica_system_type:
      name: Σύστημα/τύπος φυσαρμόνικας
      description: Προσδιορίζει το σύστημα ή τη σχεδίαση της ορχηστρικής φυσαρμόνικας
        (π.χ. chord, bass, baritone, polyphonia).
    harmonica_tuning_system:
      name: Σύστημα κουρδίσματος φυσαρμόνικας
      description: Καθορίζει τη διάταξη/σύστημα κουρδίσματος που της φυσαρμόνικας
        (π.χ. Richter, Solo, Orchestra tuning).
    harness_shell_type:
      name: Τύπος δομής της ζώνης
      description: Περιγράφει την ακαμψία κατασκευής της δομής της ζώνης (π.χ., Softshell,
        Hardshell, Hybrid).
    harness_style:
      name: Στυλ ζώνης
      description: Ορίζει το δομικό στυλ/σχεδιασμό της ζώνης, π.χ. μέσης, καθίσματος,
        στήθους/γιλέκου, ζώνης wing, ενσωματωμένης σε μαγιό-σορτς ή υβριδικής.
    harness_type:
      name: Τύπος καλωδίωσης
      description: Ταξινομεί το δομικό στυλ της ζώνης αναρρίχησης, όπως ζώνη καθίσματος,
        ολόσωμη ή στήθους.
    harp_action_type:
      name: Τύπος μηχανισμού δράσης άρπας
      description: Κύριος μηχανισμός που χρησιμοποιείται για την αλλαγή του τονικού
        ύψους/των αλλοιώσεων στην άρπα.
    harp_finish:
      name: Φινίρισμα άρπας
      description: Φινίρισμα επιφάνειας του σώματος της άρπας (π.χ. φυσικό ξύλο, βερνικωμένο,
        βαμμένο, λακαρισμένο).
    harp_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται στην άρπα
      description: Παραθέτει τα αξεσουάρ που συνοδεύουν την άρπα με πεντάλ.
    harvest_method:
      name: Μέθοδος συγκομιδής/αλίευσης
      description: Υποδεικνύει εάν τα θαλασσινά είναι ελεύθερης αλίευσης, εκτροφείου
        ή αν προέρχονται από άλλη μέθοδο.
    harvest_stage:
      name: Στάδιο συγκομιδής
      description: Καθορίζει το στάδιο ανάπτυξης κατά τη συγκομιδή της ρόκας, όπως
        microgreens (νεαροί βλαστοί), φύλλα baby ή ώριμο ματσάκι.
    hat_style:
      name: Στυλ καπέλου
      description: Η κατασκευή/στυλ του καπέλου για πάρτι (π.χ. κωνικό καπέλο, στέμμα,
        ημίψηλο καπέλο, με γείσο) ώστε να αντικατοπτρίζει τη βασική μορφή του κομματιού.
    hazard_signal_mode:
      name: Λειτουργία σήματος κινδύνου
      description: Επιλογή μοτίβων ή λειτουργιών φωτισμού για ηλεκτρονικά αλάρμ/φάρους
        LED οδικής ασφάλειας.
    head_configuration:
      name: Διαμόρφωση κεφαλής
      description: Καθορίζει εάν η κεφαλή του τσεκουριού διαθέτει φτυαράκι (adze),
        σφυρί, και τα δύο ή κανένα, επηρεάζοντας άμεσα τη λειτουργικότητα σε πάγο
        και μικτό έδαφος.
    head_material:
      name: Υλικό κεφαλής
      description: Υλικό της μεμβράνης (δέρματος) που παρέχεται με το κίντο (quinto).
    head_movement_type:
      name: Τύπος κίνησης κεφαλής
      description: Ικανότητα κατευθυντικής κίνησης της κεφαλής του δίποδου ή του ορθοστάτη/stick
        (π.χ. οριζόντια περιστροφή, κάθετη κλίση, πλευρική κλίση).
    head_side:
      name: Πλευρά μεμβράνης
      description: Καθορίζει εάν η μεμβράνη του τυμπάνου προορίζεται για την πλευρά
        κρούσης, την πλευρά αντήχησης ή για οποιαδήποτε από τις δύο.
    head_weight_style:
      name: Στυλ βάρους κεφαλιού δολώματος
      description: Προσδιορίζει τη διαμόρφωση βάρους στο κεφάλι της μύγας, η οποία
        επηρεάζει τον ρυθμό βύθισης και την παρουσίαση στο νερό.
    headband_embellishment:
      name: Διακοσμητικά στοιχεία στέκας/κορδέλας μαλλιών
      description: Προσδιορίζει τα διακοσμητικά στοιχεία που είναι προσαρτημένα στη
        στέκα/κορδέλα (π.χ. φιόγκοι, πέρλες/μαργαριτάρια, κρύσταλλα, ζωάκια/αυτιά
        ζώων).
    headboard_style:
      name: Στυλ κεφαλαριού
      description: Περιγράφει τον σχεδιασμό ή το στυλ κατασκευής του κεφαλαριού που
        παρέχεται μαζί με το κρεβάτι.
    headgear_strap_configuration:
      name: Διαμόρφωση ιμάντα προστατευτικής κάσκας πάλης
      description: Υποδεικνύει τον αριθμό των ιμάντων που χρησιμοποιούνται για τη
        στερέωση της προστατευτικής κάσκας πάλης.
    headjoint_crown_style:
      name: Στυλ κορώνας κεφαλής φλάουτου
      description: Καθορίζει το στυλ ή το σχέδιο της κορώνας της κεφαλής του φλάουτου,
        η οποία μπορεί να επηρεάσει την αισθητική και το βάρος/την ισορροπία του οργάνου.
    headjoint_pitch_standard:
      name: Πρότυπο κουρδίσματος κεφαλής
      description: Υποδεικνύει το πρότυπο σχεδιασμού κουρδίσματος της κεφαλής του
        φλάουτου (π.χ. A=440 ή A=442).
    headliner_product_form:
      name: Μορφή προϊόντος επένδυσης οροφής
      description: Καθορίζει εάν το προϊόν είναι πλήρες σετ προδιαμορφωμένου ουρανού
        αυτοκινήτου, ανταλλακτικό ύφασμα ή εξάρτημα επισκευής/φινιρίσματος.
    headrest_mount_attachment_method:
      name: Μέθοδος στερέωσης βάσης προσκέφαλου
      description: Καθορίζει τον τρόπο με τον οποίο η βάση στερεώνεται στους στύλους
        στήριξης του προσκέφαλου/του καθίσματος.
    headrest_provision:
      name: Πρόβλεψη προσκέφαλου
      description: Υποδεικνύει εάν περιλαμβάνονται προσκέφαλα ή/και εάν υπάρχουν σημεία
        στήριξης για προσκέφαλα..
    headset_standard:
      name: Πρότυπο ακουστικών
      description: Τύπος διεπαφής ακουστικού-σωλήνα/σετ κεφαλής που χρησιμοποιείται
        από το πλαίσιο.
    headstall_style:
      name: Στυλ κεφαλαριάς
      description: Ταξινομεί τον δομικό σχεδιασμό ή τη διαμόρφωση αυτιού/φρυδιού του
        μετώπου της κεφαλαριάς.
    headwear_intended_use:
      name: Προβλεπόμενη χρήση καλύμματος κεφαλής
      description: Υποδεικνύει τον κύριο σκοπό ή πλαίσιο για τη χρήση του τουρμπάνι
        (π.χ απώλεια μαλλιών λόγω χημειοθεραπείας, κολύμβηση, θρησκευτικοί λόγοι).
    hearing_enhancer_style:
      name: Στυλ ενισχυτή ακοής
      description: Περιγράφει τον φυσικό παράγοντα μορφής της συσκευής, ώστε οι χρήστες
        να μπορούν να επιλέξουν μεταξύ σχεδίασης over-ear, in-ear, behind-the-head
        και άλλων σχεδίων.
    heart_rate_monitoring_method:
      name: Μέθοδος παρακολούθησης καρδιακού ρυθμού
      description: Προσδιορίζει τον τρόπο με τον οποίο το μηχάνημα καταγράφει δεδομένα
        καρδιακού ρυθμού κατά τη διάρκεια των προπονήσεων.
    heart_rate_sensing_technology:
      name: Τεχνολογία ανίχνευσης καρδιακού ρυθμού
      description: Καθορίζει τη μέθοδο φυσιολογικής μέτρησης που χρησιμοποιεί η οθόνη
        για την ανίχνευση του καρδιακού ρυθμού (π.χ., ηλεκτρικό ΗΚΓ έναντι οπτικού
        PPG).
    heart_rate_sensor_placement:
      name: Τοποθέτηση αισθητήρα καρδιακών παλμών
      description: Υποδεικνύει πού φοριέται ή τοποθετείται ο αισθητήρας (στο σώμα
        ή στο ποδήλατο), επηρεάζοντας την άνεση και την ακρίβεια των μετρήσεων.
    heat_retention_technology:
      name: Τεχνολογία διατήρησης θερμότητας
      description: Περιγράφει οποιαδήποτε τεχνολογία, επίστρωση ή υλικό που ενισχύει
        την εφίδρωση ή τη θερμική δραστηριότητα για ασκήσεις με επίκεντρο την προπόνηση
        (π.χ., εφέ σάουνας από νεοπρένιο).
    heated_glass_feature:
      name: Λειτουργία θερμαινόμενου τζαμιού
      description: Υποδεικνύει εάν το τζάμι του παραθύρου περιλαμβάνει ενσωματωμένα
        ηλεκτρικά στοιχεία, όπως ένα πίσω πλέγμα απόψυξης ή/και μια ενσωματωμένη κεραία
        στο τζάμι.
    heater_control_actuation_method:
      name: Μέθοδος ενεργοποίησης χειριστηρίου θερμαντήρα
      description: Καθορίζει τον τρόπο με τον οποίο το χειριστήριο θερμαντήρα /HVAC
        ενεργοποιεί το κιβώτιο HVAC του οχήματος (π.χ. με ντίζα, με κενό αέρος ή με
        ηλεκτρονικό σήμα).
    heater_control_electrical_connector_type:
      name: Τύπος ηλεκτρικής σύνδεσης χειριστηρίου θερμαντήρα.
      description: Καθορίζει το στυλ/τη διεπαφή της ηλεκτρικής σύνδεσης που χρησιμοποιείται
        από το συγκρότημα ελέγχου θερμαντήρα (π.χ. τύπος πλεξούδας [pigtail] έναντι
        τύπου βύσματος).
    heating_technology:
      name: Τεχνολογία θέρμανσης
      description: Προσδιορίζει τον κύριο μηχανισμό θέρμανσης που χρησιμοποιεί ο ατμοποιητής
        για να μετατρέψει υλικό σε ατμό.
    heel_shape:
      name: Στυλ ύψους τακουνιού
      description: Καθορίζει το γεωμετρικό ύφος ή τη σιλουέτα του ίδιου του τακουνιού,
        βοηθώντας τους αγοραστές να φιλτράρουν με βάση την εμφάνιση και τις προτιμήσεις
        σταθερότητας (π.χ., τακούνι στιλέτο έναντι block).
    helicopter_mission_type:
      name: Τύπος αποστολής ελικοπτέρου
      description: Κύρια προβλεπόμενη χρήση/ρόλος του ελικοπτέρου.
    helicopter_rotor_configuration:
      name: Διαμόρφωση ρότορα ελικοπτέρου
      description: Καθορίζει τη διάταξη του συστήματος ρότορα του ελικοπτέρου (διάταξη
        κύριου/ουραίου ρότορα), όπως μονός κύριος + ουραίος, ομοαξονικός, σε σειρά
        ή συμπλεκόμενος.
    helmet_accessory_type:
      name: Τύπος αξεσουάρ κράνους
      description: Προσδιορίζει το συγκεκριμένο είδος εξαρτήματος ή αξεσουάρ κράνους
        ποδηλάτου, ώστε ο αγοραστής να μπορεί να εντοπίσει αμέσως το σωστό κομμάτι.
    helmet_audio_connector_type:
      name: Τύπος σύνδεσης ήχου κράνους
      description: Καθορίζει τον τύπο της σύνδεσης ήχου του αεροσκάφους που χρησιμοποιείται
        από το καλώδιο επικοινωνίας του κράνους, εάν υπάρχει.
    helmet_communication_system_readiness:
      name: Ετοιμότητα συστήματος επικοινωνίας κράνους
      description: Εάν το κράνος έχει σχεδιαστεί για να δέχεται σύστημα ενδοεπικοινωνίας/επικοινωνίας
        Bluetooth.
    helmet_construction_type:
      name: Τύπος κατασκευής κράνους
      description: Περιγράφει τον τρόπο κατασκευής του κελύφους και της επένδυσης
        του κράνους (π.χ. αφρώδες, σκληρό κέλυφος, υβριδικό).
    helmet_fit_head_shape:
      name: Εφαρμογή κράνους (σχήμα κεφαλής)
      description: Το εσωτερικό προφίλ εφαρμογής προορίζεται για διαφορετικά σχήματα
        κεφαλής.
    helmet_interior_liner_type:
      name: Τύπος εσωτερικής επένδυσης κράνους
      description: Τύπος άνετης επένδυσης και αν είναι αφαιρούμενη/πλενόμενη.
    helmet_liner_material:
      name: Υλικό επένδυσης κράνους
      description: Καθορίζει το υλικό της εσωτερικής επένδυσης ή του εσωτερικού περιθώριο
        που παρέχουν άνεση και απορρόφηση κρούσης.
    helmet_retention_closure_type:
      name: Τύπος κλεισίματος του ιμάντα του κράνους.
      description: Καθορίζει τον μηχανισμό κλεισίματος/συγκράτησης του ιμάντα πηγουνιού
        του κράνους (π.χ. διπλός δακτύλιος D, μικρομετρική καστάνια).
    helmet_safety_certification:
      name: Πιστοποίηση ασφάλειας κράνους
      description: Παραθέτει τα πρότυπα ασφαλείας ή τις πιστοποιήσεις με τα οποία
        συμμορφώνεται το κράνος.
    helmet_safety_certification_standard:
      name: Πρότυπο πιστοποίησης ασφάλειας κράνους
      description: Πρότυπα ασφάλειας/έγκρισης τύπου (homologation) που είναι πιστοποιημένο
        να πληροί το κράνος μοτοσικλέτας.
    helmet_shell_material:
      name: Υλικό κελύφους κράνους
      description: Κύριο υλικό ή τύπος κατασκευής του εξωτερικού κελύφους του κράνους.
    helmet_size_system:
      name: Σύστημα μεγεθών κράνους
      description: Το σχήμα μεγεθών που χρησιμοποιείται για να εκφράσει το μέγεθος
        του κράνους.
    helmet_sun_visor_type:
      name: Τύπος ηλιακού σκίαστρου κράνους
      description: Καθορίζει εάν το κράνος περιλαμβάνει εσωτερικό αναδιπλούμενο (drop-down)
        σκίαστρο, φιμέ εξωτερική ζελατίνα, και τα δύο ή κανένα από τα δύο.
    helmet_vehicle_fit:
      name: Κράνος κατάλληλο για όχημα
      description: Τύπος οχήματος/χρήσης οδήγησης για τον οποίο προορίζεται το κράνος.
    helmet_ventilation_adjustability:
      name: Ρύθμιση αερισμού κράνους
      description: Καθορίζει τον τρόπο με τον οποίο ο αερισμός του κράνους μπορεί
        να ελεγχθεί από τον αναβάτη.
    helmet_ventilation_configuration:
      name: Διαμόρφωση αερισμού κράνους
      description: Περιγράφει τη διάταξη αερισμού του κράνους και τη δυνατότητα ρύθμισης
        (π.χ. αεραγωγός στο πηγούνι, αεραγωγοί στο μέτωπο/εισαγωγής, αεραγωγοί που
        κλείνουν).
    helmet_visor_peak_adjustability:
      name: Ρυθμιζόμενη ζελατίνα/γείσο κράνους.
      description: Εάν το γείσο/ζελατίνα του κράνους εκτός δρόμου είναι ρυθμιζόμενο
        ή/και αφαιρούμενο.
    helmet_visor_shield_optical_features:
      name: Οπτικά χαρακτηριστικά ζελατίνας κράνους
      description: Οπτικά χαρακτηριστικά και χαρακτηριστικά συμβατότητας της κύριας
        προσωπίδας/ζελατίνας.
    helmet_visor_shield_type:
      name: Τύπος ζελατίνας/προσωπίδας κράνους
      description: Η κύρια διαμόρφωση προσωπίδας/ζελατίνας που περιλαμβάνεται στο
        κράνος.
    hem_style:
      name: Στυλ στριφώματος
      description: Προσδιορίζει το στυλ φινιρίσματος του ανοίγματος του ποδιού, όπως
        καθαρό, τυλιγμένο ή ακατέργαστο, που επηρεάζει έντονα την εμφάνιση του ενδύματος.
    hemisphere_compatibility:
      name: Συμβατότητα ημισφαιρίων
      description: Καθορίζει για ποιο ημισφαίριο έχει σχεδιαστεί ο χάρτης των αστεριών,
        με βάση τους ορατούς αστερισμούς.
    hemline_style:
      name: Στυλ στριφώματος
      description: Ορίζει το κόψιμο ή το σχέδιο του κάτω άκρου του φορέματος.
    herbal_infusion_function:
      name: Λειτουργία για έγχυμα βοτάνων
      description: Υποδεικνύει το κύριο όφελος ευεξίας ή λειτουργικού οφέλους για
        το οποίο διατίθεται στην αγορά το έγχυμα.
    hex_size:
      name: Εξαγωνικό μέγεθος
      description: Απαιτούμενο εξαγωνικό μέγεθος κλειδιού για την εγκατάσταση/αφαίρεση
        του προθερμαντήρα.
    hi_hat_pair_type:
      name: Τύπος ζεύγους Hi-hat
      description: Υποδεικνύει εάν η καταχώριση αφορά ταιριαστό ζεύγος (top/bottom)
        ή μεμονωμένο εξάρτημα πιάτου.
    hi_hat_sound_character:
      name: Ηχητικός χαρακτήρας hi-hat
      description: Περιγράφει το συνολικό τονικό προφίλ για να βοηθήσει τον αγοραστή
        να φιλτράρει με βάση τον ήχο που θέλει.
    high_visibility_class:
      name: Κατηγορία υψηλής ορατότητας
      description: Καθορίζει το επίπεδο ταξινόμησης ορατότητας κατά το πρότυπο ANSI/ISEA
        107 για το ένδυμα.
    highback_style:
      name: Στυλ Highback
      description: Περιγράφει το δομικό στυλ/σχεδιασμό του highback που επηρεάζει
        τα χαρακτηριστικά οδήγησης.
    hitch_ball_diameter:
      name: Διάμετρος σφαίρας κοτσαδόρου
      description: Διάμετρος της κεφαλής του σφαίρας κοτσαδόρου που κουμπώνει σε έναν
        σύνδεσμο ρυμούλκησης (π.χ., 1 7/8 ίντσες, 2 ίντσες, 2 5/16 ίντσες, 50 mm).
    hitch_ball_mounting_style:
      name: Στυλ τοποθέτησης σφαίρας κοτσαδόρου
      description: Υποδεικνύει αν η σφαίρα κοτσαδόρου είναι τυπική με στερέωση παξιμαδιού,
        σταθερού/πρεσαριστού τύπου για συγκεκριμένες κεφαλές κοτσαδόρου, ή αν περιλαμβάνει
        ενσωματωμένο υλικό εξοπλισμό.
    hobby_horse_handle_type:
      name: Τύπος λαβής για αλογάκι (hobby horse)
      description: Καθορίζει την κατασκευή λαβής/χειρολαβής που χρησιμοποιείται για
        το κράτημα ή την κατεύθυνση του παιχνιδιού αλογάκι.
    hobby_horse_sound_features:
      name: Χαρακτηριστικά ήχου για αλογάκι
      description: Υποδεικνύει εάν το αλογάκι περιλαμβάνει ηχητικά εφέ και τι είδους.
    hockey_goal_type:
      name: Τύπος τέρματος χόκεϊ
      description: Καθορίζει το στυλ ή την προβλεπόμενη χρήση του τέρματος του χόκεϊ
        (π.χ. επίσημο γήπεδο πάγου, δρόμου, μίνι).
    hockey_size_category:
      name: Κατηγορία μεγέθους χόκεϊ
      description: Υποδηλώνει την κατηγορία μεγέθους του τυποποιημένου εξοπλισμού
        στην οποία ταιριάζει το εξάρτημα (Παιδικό, Εφήβων, Ενδιάμεσο, Ενηλίκων).
    hockey_size_segment:
      name: Κατηγορία μεγέθους εξοπλισμού χόκεϊ
      description: Καθορίζει την κατηγορία μεγέθους του τυποποιημένου εξοπλισμού χόκεϊ
        που καθορίζει τις συνολικές διαστάσεις των προστατευτικών (pads) και την εφαρμογή.
    hold_surface_texture:
      name: Υφή επιφάνειας λαβής
      description: Περιγράφει την τραχύτητα ή το απτικό φινίρισμα της επιφάνειας πιασίματος
        της λαβής.
    home_decor_sewing_pattern_project_type:
      name: Τύπος έργου για πατρόν ραπτικής διακόσμησης σπιτιού
      description: Προσδιορίζει το στοιχείο διακόσμησης σπιτιού που έχει σχεδιαστεί
        για να δημιουργηθεί με το πατρόν ραπτικής (π.χ. μαξιλάρια, κουρτίνες, καλύμματα
        επίπλων).
    homologation_rule_set:
      name: Έγκριση τύπου (Homologation) / σύνολο κανόνων
      description: Καθορίζει τον φορέα έγκρισης ή το σύνολο κανόνων με τους οποίους
        συμμορφώνεται το αυτοκίνητο (όπου ισχύει).
    honey_form:
      name: Μορφή μελιού
      description: Καθορίζει τη φυσική μορφή ή την παρουσίαση του προϊόντος μελιού.
    honey_processing_method:
      name: Μέθοδος επεξεργασίας μελιού
      description: Υποδεικνύει τον τρόπο με τον οποίο το μέλι υποβλήθηκε σε επεξεργασία
        ή κατεργασία πριν από τη συσκευασία.
    honey_variety:
      name: Ποικιλία μελιού
      description: Προσδιορίζει τη βοτανική ή ανθική πηγή του μελιού, είτε μονοανθικό
        είτε πολυανθικό, η οποία επηρεάζει άμεσα τη γεύση, το χρώμα και την τιμή.
    hood_configuration:
      name: Διαμόρφωση κουκούλας
      description: Περιγράφει τον σχεδιασμό της κουκούλας και τα χαρακτηριστικά ρύθμισης.
    hood_design:
      name: Σχέδιο κουκούλας
      description: Υποδεικνύει την ύπαρξη και το στυλ της κουκούλας στο ένδυμα.
    hood_style:
      name: Στυλ κουκούλας
      description: Υποδεικνύει την παρουσία και το στυλ κουκούλας στο ένδυμα.
    hood_type:
      name: Τύπος κουκούλας
      description: Υποδεικνύει ειδικά χαρακτηριστικά σχεδιασμού του τμήματος της κουκούλας
        του ενδύματος.
    hook_and_eye_size_hook_number:
      name: Μέγεθος κόπιτσας (αριθμός αγκίστρου)
      description: Τυποποιημένο μέγεθος/αρίθμηση για κόπιτσες (όπου εφαρμόζεται) που
        χρησιμοποιείται στη συσκευασία για την ένδειξη του συνολικού μεγέθους αγκίστρου/κόπιτσας.
    hook_and_loop_fastener_duty_rating:
      name: Κατηγορία αντοχής αυτοκόλλητης ταινίας
      description: Υποδεικνύει το προβλεπόμενο επίπεδο αντοχής/καταπόνησης της αυτοκόλλητης
        ταινίας.
    hook_and_loop_fastener_format:
      name: Μορφή αυτοκόλλητης ταινίας
      description: Καθορίζει τη φυσική μορφή ή τη μορφή συσκευασίας του αυτοκόλλητου
        προϊόντος (π.χ. ρολό/ταινία, στρογγυλά αυτοκόλλητα, λωρίδες).
    hook_and_loop_fastener_side:
      name: Πλευρά κλεισίματος hook and loop
      description: Καθορίζει εάν το προϊόν περιλαμβάνει μόνο την πλευρά των αγκίστρων,
        μόνο την πλευρά των θηλιών ή ένα σύνολο που περιέχει και τις δύο πλευρές.
    hook_coating_finish:
      name: Επίστρωση/φινίρισμα αγκιστριού
      description: Επεξεργασία επιφάνειας ή επιμετάλλωση που εφαρμόζεται στο αγκίστρι
        για αντοχή στη διάβρωση, χαμηλή ορατότητα ή χρώμα (π.χ. μαύρο νικέλιο, στιλπνός
        κασσίτερος).
    hook_configuration:
      name: Διαμόρφωση στο αγκίστρι
      description: Περιγράφει την παρουσία και το στυλ των αγκιστριών που παρέχονται
        με το τεχνητό δόλωμα.
    hook_eye_style:
      name: Στυλ κρίκου αγκιστριού
      description: Καθορίζει το σχήμα ή τον προσανατολισμό της οπής του αγκιστριού,
        που επηρεάζει τον τρόπο με τον οποίο δένεται ή στερεώνεται το αγκίστρι.
    hook_eye_type:
      name: Τύπος κρίκου αγκιστριού
      description: Καθορίζει το σχεδιασμό του ματιού του αγκιστριού, επηρεάζοντας
        την επιλογή κόμπου και την αρματωσιά.
    hook_loop_format:
      name: Μορφή αυτοκόλλητης ταινίας
      description: Καθορίζει τον φυσικό παράγοντα μορφής της ραφτής αυτοκόλλητης ταινίας.
    hook_loop_side:
      name: Πλευρά hook-and-loop
      description: Καθορίζει εάν το προϊόν είναι η πλευρά του αγκίστρου, η πλευρά
        της θηλιάς ή ένα αντίστοιχο αυτοκόλλητης ταινίας.
    hook_material:
      name: Υλικό αγκιστριού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται ειδικά για το αγκίστρι/κεφαλή
        του γάντζου, έναν βασικό παράγοντα για την αντοχή και την προστασία από τη
        διάβρωση σε περιβάλλον αλμυρού νερού.
    hook_organizer_style:
      name: Θήκη οργάνωσης αγκιστριών
      description: Το φυσικό στυλ ή ο παράγοντας μορφής της θήκης οργάνωσης αγκιστριών
        (για παράδειγμα, θήκη, ρολό ή θήκη), που χρησιμοποιείται για την υποστήριξη
        της περιήγησης και του φιλτραρίσματος κατά τύπο θήκης.
    hook_point_configuration:
      name: Διαμόρφωση σημείου αγκίστρωσης
      description: Δηλώνει εάν το αγκίστρι έχει δύο άκρα (διπλό) ή τρία άκρα (τριπλό).
    hook_point_type:
      name: Τύπος μύτης αγκιστριού
      description: Περιγράφει το τρόχισμα ή το σχήμα της μύτης ενός αγκιστριού ψαρέματος,
        το οποίο επηρεάζει τη διείσδυση και την ικανότητα συγκράτησης.
    hook_shank_length:
      name: Μήκος στελέχους αγκιστριού
      description: Υποδεικνύει την σχετική ταξινόμηση μήκους του στελέχους του αγκιστριού
        (π.χ., κοντό, μακρύ) για γρήγορη οπτική και λειτουργική σύγκριση.
    hooks_eyes_attachment_method:
      name: Μέθοδος σύνδεσης με κόπιτσες
      description: Ο τρόπος με τον οποίο οι κόπιτσες στερεώνονται στο ένδυμα ή το
        έργο.
    hop_up_type:
      name: Τύπος Hop-up
      description: Ορίζει το σύστημα hop-up που χρησιμοποιείται για να προσδώσει ανάστροφη
        περιστροφή στα σφαιρίδια για εμβέλεια και ακρίβεια.
    horse_blanket_type:
      name: Τύπος κουβέρτας αλόγου
      description: Καθορίζει το κύριο στυλ ή την προβλεπόμενη χρήση της κουβέρτας
        ή του σεντονιού για το άλογο.
    horse_brush_type:
      name: Τύπος βούρτσας αλόγου
      description: Ταξινομεί τη βούρτσα με βάση το συγκεκριμένο στυλ περιποίησης ή
        τον προβλεπόμενο σκοπό, επιτρέποντας στους πελάτες να φιλτράρουν τα προϊόντα
        χωρίς να διασπάται η ιεραρχία των κατηγοριών.
    horse_care_purpose:
      name: Σκοπός φροντίδας αλόγου
      description: Πρωταρχικός λειτουργικός σκοπός του προϊόντος στο πλαίσιο της φροντίδας
        των αλόγων, που καλύπτει τις ανάγκες υγείας, περιποίησης και διαχείρισης.
    horse_feed_stage:
      name: Στάδιο διατροφής αλόγου
      description: Υποδεικνύει το στάδιο ζωής ή τη φυσιολογική κατάσταση του αλόγου
        για την οποία έχει παρασκευαστεί η τροφή.
    horse_groomer_type:
      name: Τύπος εργαλείου περιποίησης αλόγου
      description: Ταξινομεί το στυλ του εργαλείου περιποίησης, ώστε οι αγοραστές
        να μπορούν να εντοπίσουν γρήγορα το συγκεκριμένο εργαλείο που χρειάζεται.
    horse_leg_protection_type:
      name: Τύπος προστασίας ποδιών αλόγου
      description: Ταξινομεί το συγκεκριμένο στυλ ή τη λειτουργία της μπότας ιππασίας,
        του περικαλύμματος ή του επιδέσμου για τα πόδια του αλόγου.
    horse_model_breed:
      name: Ράτσα μοντέλου αλόγου
      description: Καθορίζει τη ράτσα του αλόγου που απεικονίζεται από το μοντέλο
        σε κλίμακα (εάν υπάρχει).
    hosiery_toe_style:
      name: Στυλ μύτης καλσόν / καλτσών
      description: Ορίζει την κατασκευή της περιοχής των δακτύλων του καλσόν, σημαντική
        για την ανθεκτικότητα και τη συμβατότητα με υποδήματα με ανοιχτά δάχτυλα.
    hot_air_balloon_basket_type:
      name: Τύπος καλαθιού για αερόστατο θερμού αέρα
      description: Καθορίζει τη διαμόρφωση/το στυλ του κύριου καλαθιού (π.χ., τυπικό
        αθλητικό, εμπορικό υψηλής χωρητικότητας, διαχωρισμένο, προσβάσιμο/με πόρτα)
        που χρησιμοποιείται για την επιβίβαση και την προβλεπόμενη λειτουργία.
    hot_air_balloon_burner_type:
      name: Τύπος καυστήρα αερόστατου θερμού αέρα
      description: Τύπος/διαμόρφωση συστήματος καυστήρα που είναι εγκατεστημένο στο
        αερόστατο.
    hot_air_balloon_envelope_material:
      name: Υλικό αεροθαλάμου αερόστατου θερμού αέρα
      description: Κύριο ύφασμα/υλικό που χρησιμοποιείται για τον αεροθάλαμο του αερόστατου
        (θόλος).
    hotfix_application_tool:
      name: Εργαλείο εφαρμογής στρας (hotfix)
      description: Συνιστώμενο εργαλείο ή πηγή θερμότητας που χρησιμοποιείται για
        την εφαρμογή θερμοκολλητικών στρας.
    hub_axle_type:
      name: Τύπος άξονα πλήμνης
      description: Προσδιορίζει τη διεπαφή του άξονα/το σύστημα συγκράτησης για το
        οποίο είναι σχεδιασμένη η πλήμνη (ταχείας απελευθέρωσης, περαστού άξονα, κ.λπ.).
    hub_motor_type:
      name: Τύπος κινητήρα πλήμνης
      description: Περιγράφει τον τύπο κατασκευής του κινητήρα πλήμνης (με γρανάζια,
        άμεσης μετάδοσης κίνησης, με ψήκτρες, χωρίς ψήκτρες) για να ενημερώσει τον
        αγοραστή σχετικά με τα χαρακτηριστικά ροπής, βάρους και απόδοσης.
    hula_hoop_construction_type:
      name: Τύπος κατασκευής χούλα χουπ
      description: Περιγράφει τον τρόπο κατασκευής/συναρμολόγησης του στεφανιού.
    hula_hoop_features:
      name: Χαρακτηριστικά χούλα χουπ
      description: Επισημαίνει σημαντικά λειτουργικά ή σχεδιαστικά χαρακτηριστικά
        του χούλα χουπ
    hull_design:
      name: Σχεδιασμός κύτους
      description: Περιγράφει το σχήμα του κύτους που επηρεάζει τα χαρακτηριστικά
        απόδοσης και χειρισμού.
    hull_type:
      name: Τύπος κύτους
      description: Περιγράφει τη μορφή του κύτους που επηρεάζει την απόδοση και την
        ευστάθεια.
    humidifier_refill_medium_type:
      name: Τύπος μέσου πλήρωσης υγραντήρα
      description: Προσδιορίζει το μέσο συγκράτησης/αναπλήρωσης υγρασίας που χρησιμοποιείται
        από τον υγραντήρα θήκης (τι βρέχεται ή αντικαθίσταται).
    humidifier_refill_method:
      name: Μέθοδος αναπλήρωσης υγραντήρα
      description: Περιγράφει τον τρόπο με τον οποίο ο υγραντήρας επαναφορτίζεται
        με υγρασία ή αντικαθίσταται.
    humidifying_medium:
      name: Μέσο ύγρανσης
      description: Προσδιορίζει το στοιχείο/μέσο ύγρανσης που χρησιμοποιείται από
        το προϊόν (τι βρέχεται/ενεργοποιείται).
    hummus_base_ingredient:
      name: Συστατικό βάσης χούμους
      description: Προσδιορίζει την κύρια βάση οσπρίων ή λαχανικών που χρησιμοποιείται
        για την παρασκευή του χούμους.
    hunting_call_type:
      name: Τύπος κράχτη (κυνηγιού)
      description: Ταξινομεί το κύριο στυλ λειτουργίας ή μηχανισμό του κράχτη (π.χ.
        επιστόμιος/χειροκίνητος, ηλεκτρονικός, κουτί/box) ώστε οι κυνηγοί να μπορούν
        γρήγορα να επιλέξουν τη μορφή που ταιριάζει καλύτερα στις ανάγκες και το επίπεδο
        δεξιοτήτων τους.
    hunting_dog_collar_function:
      name: Λειτουργία κολάρου κυνηγετικού σκύλου
      description: Ταξινομεί το κύριο λειτουργικό στυλ ή σκοπό του κολάρου, βοηθώντας
        τους αγοραστές να φιλτράρουν τα προϊόντα βάσει λειτουργιών όπως η παρακολούθηση,
        η εκπαίδευση, η ορατότητα ή η τυπική χρήση.
    hvac_control_functions:
      name: Λειτουργίες ελέγχου HVAC
      description: Υποδεικνύει ποιες λειτουργίες HVAC/απόψυξης/ροής αέρα ελέγχονται
        από τη μονάδα (μηχανική ή ηλεκτρονική).
    hybrid_drivetrain_configuration:
      name: Διαμόρφωση υβριδικού συστήματος μετάδοσης κίνησης
      description: Υποδεικνύει την αρχιτεκτονική του συστήματος PHEV που περιγράφει
        τον τρόπο με τον οποίο ο/οι ηλεκτροκινητήρας/οι και ο κινητήρας καύσης παρέχουν
        πρόωση.
    hybrid_system_type:
      name: Τύπος υβριδικού συστήματος
      description: Ταξινομεί την αρχιτεκτονική υβριδικής τεχνολογίας που χρησιμοποιείται
        από το όχημα.
    hybrid_truck_cab_type:
      name: Τύπος καμπίνας υβριδικού φορτηγού
      description: Καθορίζει τη διαμόρφωση της καμπίνας του φορτηγού, η οποία επηρεάζει
        τη χωρητικότητα καθισμάτων και τον εσωτερικό χώρο.
    hydration_bag_features:
      name: Χαρακτηριστικά σακιδίου ενυδάτωσης
      description: Επισημαίνει αξιοσημείωτα σχεδιαστικά ή λειτουργικά χαρακτηριστικά
        που αφορούν ειδικά τα σακίδια ενυδάτωσης.
    hydration_belt_features:
      name: Χαρακτηριστικά ζώνης ενυδάτωσης
      description: Παραθέτει αξιοσημείωτες ενσωματωμένες λειτουργίες που ενισχύουν
        τη χρηστικότητα, την ασφάλεια ή την ευκολία της ζώνης ενυδάτωσης.
    hydration_bladder_compatibility:
      name: Συμβατότητα με ασκό ενυδάτωσης
      description: Υποδεικνύει εάν το γιλέκο περιλαμβάνει ή υποστηρίζει σύστημα ασκού
        ενυδάτωσης.
    hydration_mouthpiece_style:
      name: Στυλ επιστομίου ενυδάτωσης
      description: Καθορίζει τον σχεδιασμό ή το λειτουργικό στυλ ενός επιστομίου ή
        βαλβίδας συστήματος ενυδάτωσης, βοηθώντας τους αγοραστές να επιλέξουν τον
        προτιμώμενο τρόπο πόσης και να διασφαλίσουν τη συμβατότητα.
    hydration_pack_style:
      name: Τύπος σακιδίου ενυδάτωσης
      description: Καθορίζει το δομικό στυλ του σακιδίου ενυδάτωσης, όπως σακίδιο
        πλάτης ή γιλέκο, για να διευκολύνει την εφαρμογή και το φιλτράρισμα βάσει
        χρήσης.
    hydration_system_insulation:
      name: Μόνωση συστήματος ενυδάτωσης
      description: Υποδεικνύει εάν το δοχείο νερού ή/και ο σωλήνας πόσης είναι μονωμένα
        για να βοηθούν στη διατήρηση της θερμοκρασίας του υγρού σε ζεστό ή κρύο περιβάλλον.
    hydration_valve_type:
      name: Τύπος βαλβίδας ενυδάτωσης
      description: Προσδιορίζει το στυλ της βαλβίδας πόσης ή του επιστομίου που παρέχεται
        με το σύστημα ή τη φιάλη, καλύπτοντας τα συνηθισμένα σχέδια βαλβίδας δαγκώματος
        και ακροφυσίων υψηλής ροής.
    hydraulic_fluid_type:
      name: Τύπος υδραυλικού υγρού
      description: Καθορίζει τον τύπο υγρού φρένων που έχει σχεδιαστεί να χρησιμοποιεί
        μια υδραυλική μανέτα φρένου ποδηλάτου. Αυτές οι πληροφορίες είναι κρίσιμες
        για τη συντήρηση και την ασφάλεια.
    hydrogenation_level:
      name: Επίπεδο υδρογόνωσης
      description: Υποδεικνύει εάν το λίπος είναι μη υδρογονωμένο, μερικώς υδρογονωμένο
        ή πλήρως υδρογονωμένο, κάτι που επηρεάζει την περιεκτικότητα σε τρανς λιπαρά
        και την απόδοση στο ψήσιμο.
    hydrophobicity_level:
      name: Επίπεδο υδροφοβικότητας
      description: Υποδεικνύει τον βαθμό απόδοσης σχηματισμού σταγόνων/στρώματος νερού
        που προβάλλεται για το προϊόν.
    ice_cream_format:
      name: Μορφή παγωτού
      description: Περιγράφει τη φυσική μορφή ή την παρουσίαση του προϊόντος παγωτού
        (π.χ., κύπελλο, μπάρα, μότσι).
    ice_skate_sharpener_type:
      name: Τύπος ακονιστηρίου παγοπέδιλων
      description: Ταξινομεί τον συνολικό σχεδιασμό ή τύπο του ακονιστηρίου (πέτρα
        χειρός, ηλεκτρικό μηχάνημα, οδηγός/καλούπι (jig) κ.λπ.).
    ice_temperature_suitability:
      name: Καταλληλότητα θερμοκρασίας πάγου
      description: Υποδεικνύει το εύρος θερμοκρασίας πάγου για το οποίο έχει παρασκευαστεί
        το κερί για μπαστούνια του χόκεϊ, επηρεάζοντας την απόδοση και τις ιδιότητες
        απώθησης του χιονιού.
    icing_sugar_variety:
      name: Ποικιλία ζάχαρης άχνης
      description: Ταξινομεί τη σύνθεση ή τον λειτουργικό τύπο ζάχαρης άχνης (π.χ.,
        ζαχαρόπαστα, άχνη διακόσμησης που δεν λιώνει, χρωματιστή, αρωματισμένη).
    ignition_coil_configuration:
      name: Διαμόρφωση πηνίου ανάφλεξης
      description: Καθορίζει τον τύπο κατασκευής του πηνίου ανάφλεξης (μονός πολλαπλασιαστής/πολλαπλασιαστής
        απευθείας στο μπουζί, μπλοκ πολλαπλασιαστών ανάλογα με τον αριθμό κυλίνδρων,
        ράγα/κασέτα πολλαπλασιαστών ή τύπου διανομέα).
    ignition_lead_compliance_standard:
      name: Πρότυπο συμμόρφωσης καλωδίων ανάφλεξης
      description: Επίσημο βιομηχανικό πρότυπο ή πιστοποίηση που πληρούν τα καλώδια
        ανάφλεξης, σύμφωνα με τον κατασκευαστή (π.χ. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Υλικό μόνωσης καλωδίων ανάφλεξης
      description: Πρωτεύον υλικό μόνωσης/περιβλήματος που χρησιμοποιείται στα καλώδια
        ανάφλεξης (εξωτερική μόνωση καλωδίου).
    ignition_lead_set_type:
      name: Τύπος σετ καλωδίων ανάφλεξης
      description: Διευκρινίζει αν το προϊόν είναι μεμονωμένο καλώδιο ανάφλεξης ή
        πλήρες σετ και για ποιο σκοπό προορίζεται το σετ.
    ignition_lead_terminal_type:
      name: Τύπος ακροδέκτη καλωδίου ανάφλεξης
      description: Ο τύπος του ακροδέκτη/συνδέσμου που χρησιμοποιείται στα άκρα του
        καλωδίου ανάφλεξης (π.χ. ακροδέκτης μπουζί και ακροδέκτης πολλαπλασιαστή/διανομέα).
    illumination_type:
      name: Τύπος φωτισμού
      description: Καθορίζει εάν και πώς φωτίζεται η μπάλα για νυχτερινό παιχνίδι
        (π.χ. φωσφορίζουσα λάμψη, LED που ενεργοποιείται με την κρούση).
    immobilizer_installation_type:
      name: Τύπος εγκατάστασης immobilizer
      description: Υποδεικνύει τον τρόπο εγκατάστασης ή σύνδεσης του συστήματος ακινητοποίησης
        στο όχημα.
    immobilizer_unlock_method:
      name: Μέθοδος ξεκλειδώματος του συστήματος ακινητοποίησης
      description: Καθορίζει τον τρόπο οπλισμού/αφόπλισης ή ξεκλειδώματος του συστήματος
        ακινητοποίησης.
    impact_protection_certifications:
      name: Πιστοποιήσεις προστασίας από κρούση
      description: Ονομάζει το(τα) συγκεκριμένο(-α) πρότυπο(-α) ασφαλείας που πληροί
        ή υπερβαίνει το προστατευτικό επίθεμα.
    impact_protection_level:
      name: Επίπεδο προστασίας από κρούση
      description: Καθορίζει το επίπεδο προστασίας από κρούση ή την τεχνολογία που
        προσφέρει το αθλητικό σπασουάρ.
    impact_protection_rating:
      name: Βαθμός προστασίας από κρούση
      description: Καθορίζει το πιστοποιημένο επίπεδο προστασίας από κρούση σύμφωνα
        με τα πρότυπα (π.χ. EN 1621-1 Επίπεδο 1, EN 14120 Επίπεδο 2), βοηθώντας τους
        αναβάτες να φιλτράρουν για προστασία υψηλότερου επιπέδου.
    impact_surface_material:
      name: Υλικό επιφάνειας κρούσης
      description: Περιγράφει το κύριο υλικό της επιφάνειας κρούσης/πρόσκρουσης για
        ασφάλεια και αίσθηση (π.χ. αφρός, πλαστικό).
    incense_base_material:
      name: Υλικό βάσης θυμιάματος
      description: Πρωτεύον υλικό βάσης/συνδετικό υλικό που χρησιμοποιείται για την
        παρασκευή του θυμιάματος (βάση σε σκόνη) στο κιτ.
    incense_making_method:
      name: Μέθοδος παρασκευής θυμιάματος
      description: Η προβλεπόμενη διαδικασία χειροτεχνίας που υποστηρίζεται από το
        κιτ.
    incense_tool_type:
      name: Τύπος εργαλείου θυμιάματος
      description: Καθορίζει τι είδους εργαλείο παρασκευής θυμιάματος είναι αυτό το
        προϊόν (χρησιμοποιείται για τη σχηματοποίηση, τη μέτρηση, την πίεση, την ανάμειξη
        ή το στέγνωμα του θυμιάματος).
    incline_adjustment_type:
      name: Τύπος ρύθμισης κλίσης
      description: Περιγράφει πώς (ή αν) μπορεί να αλλάξει η κλίση κατά τη διάρκεια
        των προπονήσεων.
    included_accessories:
      name: Περιλαμβάνονται αξεσουάρ
      description: Παραθέτει τα περιλαμβανόμενα πρόσθετα, όπως εφεδρικές κεφαλές/μύτες,
        θήκη αποθήκευσης, καλώδιο φόρτισης ή τροφοδοτικό AC.
    included_case_type:
      name: Τύπος θήκης που περιλαμβάνεται
      description: Τύπος θήκης μεταφοράς/αποθήκευσης που περιλαμβάνεται στο μπάσο
        σαξόφωνο (εάν υπάρχει).
    included_components:
      name: Περιλαμβανόμενα εξαρτήματα
      description: Παραθέτει τι περιλαμβάνεται στη συσκευασία (χρήσιμο για σετ εργαλείων
        και πακέτα).
    included_fastener_components:
      name: Περιλαμβάνονται εξαρτήματα στερέωσης
      description: Καθορίζει εάν το προϊόν είναι σετ με κόπιτσες, μόνο με άγκιστρα,
        μόνο με θηλιές ή σχετική παραλλαγή κλεισίματος ενδύματος.
    included_hydration_vessel_type:
      name: Περιλαμβάνεται τύπος δοχείου ενυδάτωσης
      description: Προσδιορίζει τον τύπο του δοχείου ενυδάτωσης που παρέχεται ή υποστηρίζεται
        από τη ζώνη.
    included_items_woodwind_instrument:
      name: Περιλαμβανόμενα κομμάτια (ξύλινο πνευστό όργανο)
      description: Παραθέτει ποια από τα συνήθως κομμάτια του σετ περιλαμβάνονται
        στη συσκευασία του μπάσου σαξοφώνου.
    included_materials:
      name: Περιλαμβανόμενα υλικά
      description: Υποδεικνύει ποια επιμέρους προϊόντα περιλαμβάνονται στην αγορά
        του πατρόν (μόνο πατρόν έναντι πατρόν + υλικά).
    included_mounting_accessories:
      name: Περιλαμβάνονται αξεσουάρ τοποθέτησης
      description: Παραθέτει τα αξεσουάρ στήριξης/σύνδεσης που περιλαμβάνονται στο
        ηχείο ανοικτής ακρόασης.
    included_pump_type:
      name: Περιλαμβάνεται τύπος αντλίας
      description: Προσδιορίζει τον τύπο της αντλίας, είτε παρέχεται ξεχωριστά είτε
        είναι ενσωματωμένη στο στρώμα αέρα.
    included_scraper_implement_type:
      name: Τύπος περιλαμβανόμενου εξαρτήματος ξύστρας
      description: Υποδεικνύει ποιο(-α) εξάρτημα(-ατα) παιξίματος περιλαμβάνεται(-ονται)
        στη μουσική ξύστρα (π.χ., ράβδος απόξεσης/ξύστρα, συρμάτινη βούρτσα).
    indicator_design:
      name: Σχεδιασμός δείκτη
      description: Ταξινομεί τη φυσική μορφή ή το στυλ του ειδοποιητή τσιμπήματος
        ψαρέματος.
    indicator_functions_tracked:
      name: Λειτουργίες δείκτη που παρακολουθούνται
      description: Παραθέτει τα συγκεκριμένα στατιστικά του αγώνα που παρακολουθεί
        ο δείκτης όπως μπάλες, χτυπήματα, άουτ, συμμετοχές, πλήθος pitch, όβερ, wickets,
        σκορ ή downs.
    indoor_outdoor_use:
      name: Εσωτερική/εξωτερική χρήση
      description: Υποδεικνύει αν το παιχνίδι μπόουλινγκ προορίζεται για χρήση σε
        εσωτερικό χώρο, εξωτερικό χώρο ή και τα δύο.
    inflatable_decoration_items_included:
      name: Περιλαμβανόμενα φουσκωτά διακοσμητικά είδη
      description: Παραθέτει τα βασικά αξεσουάρ που περιλαμβάνονται στη φουσκωτή διακόσμηση
        (π.χ., ανεμιστήρας, πάσσαλοι, σχοινιά πρόσδεσης).
    inflatable_decoration_type:
      name: Τύπος φουσκωτής διακόσμησης
      description: Καθορίζει το είδος της φουσκωτής διακόσμησης για πάρτι (σχήμα/τύπος
        κατασκευής) για τη διευκόλυνση της περιήγησης και του φιλτραρίσματος.
    inflatable_raft_float_features:
      name: Χαρακτηριστικά φουσκωτής σχεδίας/πλωτήρα
      description: Λειτουργικά χαρακτηριστικά που υπάρχουν στη φουσκωτή σχεδία/πλωτήρα.
    inflation_method_included:
      name: Περιλαμβανόμενη μέθοδος φουσκώματος
      description: Καθορίζει τον τύπο του εξοπλισμού φουσκώματος ελαστικών που περιλαμβάνεται
        στο κιτ επισκευής, εάν υπάρχει.
    infused_scent:
      name: Εμπλουτισμένο άρωμα
      description: Προσδιορίζει πρόσθετα αρώματος ή γεύσης που είναι εμποτισμένα στο
        υλικό δολώματος.
    ingredient_base_type:
      name: Τύπος βάσης συστατικού
      description: Προσδιορίζει την κύρια βάση που παρέχεται για τη ζύμωση (π.χ. εκχύλισμα
        βύνης, συμπυκνωμένος χυμός φρούτων, ζάχαρη), η οποία καθορίζει τον τύπο του
        παραγόμενου ποτού.
    ingredient_physical_form:
      name: Φυσική μορφή συστατικού
      description: Καθορίζει τη φυσική μορφή με την οποία παρέχεται το συστατικό του
        αρώματος (χρησιμοποιείται για τον χειρισμό, τη μέτρηση και τη διαμόρφωση της
        σύνθεσης).
    ingredient_processing_method:
      name: Μέθοδος επεξεργασίας συστατικών
      description: Καθορίζει την τεχνική πρωτογενούς επεξεργασίας που εφαρμόζεται
        στο συστατικό (π.χ. λυοφιλίωση, ψήσιμο, ζύμωση).
    ink_colors_included:
      name: Περιλαμβανόμενα χρώματα μελανιού
      description: Καθορίζει τα χρώματα μελανιού που περιλαμβάνονται στο(στα) ταμπόν
        σφραγίδας του σετ.
    ink_pad_application_method:
      name: Μέθοδος εφαρμογής ταμπόν μελανιού
      description: Πώς διανέμεται/χρησιμοποιείται το μελάνι από το ταμπόν (παραδοσιακό
        ταμπόν σφραγίδας έναντι ταμπόν με σφουγγαράκι dauber έναντι ταμπόν με μύτη
        πινέλου).
    ink_pad_permanence:
      name: Μονιμότητα μελανιού ταμπόν
      description: Εάν το σφραγισμένο μελάνι είναι μόνιμο ή/και ανεξίτηλο (αντοχή
        στο ξεθώριασμα και στο νερό αφού στεγνώσει).
    ink_pad_size:
      name: Μέγεθος ταμπόν μελανιού
      description: Τυποποιημένο μέγεθος/τύπος κατασκευής της επιφάνειας/θήκης του
        ταμπόν μελανιού.
    ink_pad_special_effects:
      name: Ειδικά εφέ μελανιού
      description: Ειδικά οπτικά/λειτουργικά εφέ του μελανιού κατά την εκτύπωση (π.χ.
        μεταλλικό, γκλίτερ).
    ink_permanence:
      name: Μονιμότητα μελανιού
      description: Υποδεικνύει εάν το αποξηραμένο μελάνι sumi είναι μόνιμο/ανεξίτηλο
        (archival) ή πλενόμενο/μη μόνιμο.
    ink_preparation_required:
      name: Απαιτείται προετοιμασία μελανιού
      description: Υποδεικνύει εάν το μελάνι sumi είναι έτοιμο για χρήση ή εάν χρειάζεται
        αραίωση με νερό ή τρίψιμο πριν από τη χρήση.
    inline_skate_brake_type:
      name: Τύπος φρένου inline πατινιών (ρόλερ)
      description: Καθορίζει τη διαμόρφωση φρένων που περιλαμβάνεται στα inline πατίνια,
        όπως αφαιρούμενο φρένο φτέρνας ή καθόλου φρένο.
    inner_tent_configuration:
      name: Διαμόρφωση εσωτερικής σκηνής
      description: Καθορίζει τη διαμόρφωση ή το στυλ της εσωτερικής σκηνής, για παράδειγμα
        πλήρης εσωτερική σκηνή, εσωτερική σκηνή με σήτα ή θερμική επένδυση.
    innerspring_coil_type:
      name: Τύπος εσωτερικών ελατηρίων
      description: Καθορίζει το στυλ κατασκευής του συστήματος εσωτερικών ελατηρίων
        μέσα στο στρώμα, το οποίο επηρεάζει την υποστήριξη, την απομόνωση κίνησης
        και την τιμή.
    input_connector_type:
      name: Τύπος συνδέσμου εισόδου
      description: Καθορίζει τον τύπο υποδοχής εισόδου ήχου που χρησιμοποιείται από
        το πεντάλ (συνήθως βύσμα TS 1/4 ίντσας).
    input_valve_type:
      name: Τύπος βαλβίδας εισόδου
      description: Υποδεικνύει το πρότυπο βαλβίδας που υπάρχει στον αεροθάλαμο/τροχό
        του ποδηλάτου, με το οποίο συνδέεται ο προσαρμογέας.
    insecticide_treatment:
      name: Επεξεργασία με εντομοκτόνο
      description: Υποδεικνύει εάν το δίχτυ έχει υποστεί εργοστασιακή επεξεργασία
        με εντομοκτόνο και, εάν ναι, τον τύπο επεξεργασίας που χρησιμοποιείται για
        πρόσθετη προστασία.
    insert_coverage_area:
      name: Περιοχή κάλυψης του εσωτερικού πρόσθετου
      description: Καθορίζει ποιο μέρος του ποδιού έχει σχεδιαστεί να καλύπτει το
        ένθετο (π.χ. πλήρες μήκος, μόνο φτέρνα).
    insert_length_type:
      name: Εισαγωγή τύπου μήκους
      description: Υποδεικνύει πόσο από το πέλμα καλύπτει η υποστήριξη της καμάρας.
    inside_message_type:
      name: Τύπος ενσωματωμένου μηνύματος
      description: Υποδεικνύει εάν η κάρτα περιλαμβάνει προεκτυπωμένο μήνυμα στο εσωτερικό
        και εάν είναι προσαρμόσιμη.
    insole_attachment_method:
      name: Μέθοδος στερέωσης πάτου
      description: Καθορίζει τον τρόπο με τον οποίο η υποστύλωση της καμάρας παραμένει
        στη θέση της μέσα στο παπούτσι (ελεύθερη/αποσπώμενη, με αυτοκόλλητη επένδυση,
        με αυτοκόλλητη ταινία, κ.λπ.).
    insole_material:
      name: Υλικό εσωτερικής σόλας
      description: Περιγράφει το υλικό του πέλματος ή της εσωτερικής σόλας πάνω στην
        οποία στηρίζεται το πόδι, επηρεάζοντας την απορρόφηση κραδασμών και την υποστήριξη.
    installation_fabrication_level:
      name: Επίπεδο κατασκευής εγκατάστασης
      description: Υποδεικνύει την τυπική ποσότητα προσαρμοσμένης κατασκευής ή τροποποίησης
        που απαιτείται για την εγκατάσταση του κιτ.
    installation_location:
      name: Θέση εγκατάστασης
      description: Καθορίζει το τυπικό σημείο εγκατάστασης για τον αισθητήρα πίεσης
        λαδιού στο σύστημα λαδιού κινητήρα (π.χ., θύρα μπλοκ λαδιού, περίβλημα φίλτρου,
        πλάκα προσαρμογέα ή απομακρυσμένη βάση σωλήνων).
    installation_method:
      name: Μέθοδος εγκατάστασης
      description: Καθορίζει τον τρόπο με τον οποίο το χαλάκι ή το πλακάκι ασφαλίζεται
        ή τοποθετείται στο δάπεδο.
    instant_coffee_form:
      name: Μορφή στιγμιαίου καφέ
      description: Περιγράφει τη φυσική μορφή στην οποία παρέχεται ο στιγμιαίος καφές,
        επηρεάζοντας τη μέθοδο παρασκευής και τη διάρκεια ζωής του.
    instep_coverage:
      name: Κάλυψη κνήμης/κουντεπιέ
      description: Καθορίζει εάν το προϊόν προστατεύει μόνο την κνήμη ή και τα δύο,
        την κνήμη και το κουντεπιέ/πέλμα.
    instruction_format:
      name: Μορφή οδηγιών
      description: Μορφή των οδηγιών που περιλαμβάνονται στο κιτ.
    instrument_cleaning_swab_form_factor:
      name: Τύπος διάταξης καθαριστικού οργάνων
      description: Καθορίζει τη σχεδιαστική μορφή του καθαριστικού (π.χ. πανί καθαρισμού
        με κορδόνι έναντι συστήματος ράβδου/βούρτσας), ώστε να ανταποκρίνεται στις
        προτιμήσεις του μουσικού και τους περιορισμούς του οργάνου.
    instrument_dimensions_unit_context:
      name: Μονάδα μέτρησης διαστάσεων οργάνου
      description: Διευκρινίζει σε τι αναφέρονται οι παρεχόμενες μετρήσεις ύψους/πλάτους/μήκους
        (π.χ. συνολικό όργανο, μήκος μεμονωμένου σωλήνα, ύψος βάσης).
    instrument_electronics_type:
      name: Τύπος ηλεκτρονικών οργάνου
      description: Υποδεικνύει εάν το σύστημα μαγνήτη/προενίσχυσης του οργάνου είναι
        ενεργό ή παθητικό.
    instrument_key:
      name: Κλειδί οργάνου
      description: Καθορίζει τον χαρακτηρισμό κουρδίσματος (κλειδιού) οργάνου που
        χρησιμοποιείται στους Καταλόγους (συνήθως C ή F για μεγαλύτερα φλάουτα με
        ράμφος).
    instrument_level:
      name: Επίπεδο δεξιοτήτων για το όργανο
      description: Στοχευμένο επίπεδο μουσικού για το συγκεκριμένο όργανο.
    instrument_part_mounting_method:
      name: Μέθοδος τοποθέτησης εξαρτήματος οργάνου
      description: Καθορίζει τον τρόπο σύνδεσης ή εγκατάστασης του εξαρτήματος (π.χ.,
        με σφίξιμο έναντι αυτοκόλλητου έναντι βιδωτού).
    instrument_parts_included:
      name: Περιλαμβάνονται εξαρτήματα οργάνων
      description: Παραθέτει τα κύρια εξαρτήματα/μέρη που περιλαμβάνονται στο κουτί
        για ένα κλαρινέτο σε A.
    instrument_playing_technique:
      name: Τεχνική παιξίματος οργάνου
      description: Πώς παίζεται/ενεργοποιείται συνήθως το όργανο (π.χ., με κούνημα,
        κρούση, φύσημα).
    instrument_size_class:
      name: Κατηγορία μεγέθους οργάνου
      description: Γενικό μέγεθος του μέσου που εκφράζεται ως κατηγορία φιλική προς
        τον αγοραστή αντί για ακριβείς διαστάσεις.
    insulation_fill_material:
      name: Υλικό πλήρωσης μόνωσης
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται για τη μόνωση του
        σακακιού ή του γιλέκου.
    integrated_bottom_type:
      name: Τύπος ενσωματωμένου πάτου
      description: Υποδεικνύει εάν το ένδυμα περιλαμβάνει ενσωματωμένο σλιπ, σορτς,
        κολάν ή παρόμοια εσωτερικά ρούχα για κάλυψη κατά την κίνηση.
    integrated_charging_options:
      name: Ενσωματωμένες επιλογές φόρτισης
      description: Παραθέτει τις ενσωματωμένες θύρες τροφοδοσίας ή φόρτισης που είναι
        διαθέσιμες στο κομοδίνο.
    integrated_furniture_function:
      name: Ενσωματωμένες λειτουργίες επίπλων
      description: Προσδιορίζει πρόσθετα εντοιχισμένα στοιχεία επίπλων που περιλαμβάνονται
        στο κρεβάτι τοίχου ή στον σκελετό (π.χ. γραφείο, καναπές, ράφια).
    integrated_locking:
      name: Ενσωματωμένο κλείδωμα
      description: Εάν η σχάρα περιλαμβάνει ενσωματωμένη κλειδαριά για την ασφάλιση
        της σχάρας στο όχημα ή/και του ποδηλάτου στη σχάρα.
    integrated_power_options:
      name: Ενσωματωμένες επιλογές τροφοδοσίας
      description: Υποδεικνύει τον τύπο ενσωματωμένης τροφοδοσίας ή φόρτισης που παρέχει
        το έπιπλο τουαλέτας.
    integrated_storage_features:
      name: Ενσωματωμένες λειτουργίες αποθήκευσης
      description: Προσδιορίζει πρόσθετα χαρακτηριστικά αποθήκευσης ή αξεσουάρ που
        περιλαμβάνει η σχάρα/βάση για στέκες μπιλιάρδου, πέρα από τις υποδοχές για
        στέκες.
    integrated_tool_functions:
      name: Ενσωματωμένες λειτουργίες εργαλείων
      description: Πρόσθετα χαρακτηριστικά εργαλείου ενσωματωμένα στον μοχλό (π.χ.
        άγκιστρο για τις ακτίνες, εργαλείο αφαίρεσης πυρήνα βαλβίδας, εξάρτημα αποκόλλησης
        της πατούρας του ελαστικού).
    intended_board_type:
      name: Προβλεπόμενος τύπος σανίδας
      description: Καθορίζει το στυλ του kiteboard για το οποίο έχει σχεδιαστεί το
        πτερύγιο (π.χ. twin tip, surf directional, hydrofoil).
    intended_consumption:
      name: Προβλεπόμενος τρόπος κατανάλωσης
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να καταναλωθεί το
        προϊόν, υποδεικνύοντας εάν είναι ασφαλές για κατανάλωση ωμό, εάν απαιτεί ψήσιμο
        ή εάν είναι μερικώς ψημένο.
    intended_craft:
      name: Προβλεπόμενη χειροτεχνία
      description: Το κύριο είδος χειροτεχνίας για το οποίο έχει σχεδιαστεί το συγκεκριμένο
        νήμα.
    intended_culinary_use:
      name: Προβλεπόμενη μαγειρική χρήση
      description: Υποδεικνύει την κύρια μαγειρική εφαρμογή της σάλτσας, όπως ντιπ
        (βούτηγμα), μαγείρεμα ή γλάσο.
    intended_handlebar_style:
      name: Προβλεπόμενο στυλ τιμονιού
      description: Περιγράφει το προβλεπόμενο στυλ τιμονιού ή τη συμβατή χρήση του
        λεβιέ ταχυτήτων/φρένου (π.χ., ίσιο τιμόνι, αγωνιστικό τιμόνι, αεροδυναμικό).
        Αυτό περιορίζει γρήγορα τη συμβατότητα χωρίς να επιβάλλει πρόσθετες υποκατηγορίες.
    intended_player_role:
      name: Προβλεπόμενος ρόλος παίκτη
      description: Καθορίζει τον ρόλο εντός γηπέδου για τον οποίο προορίζεται το κάλυμμα
        κεφαλής (π.χ., catcher, umpire).
    intended_playing_surface:
      name: Προβλεπόμενη επιφάνεια παιχνιδιού
      description: Επιφάνειες για τις οποίες έχει σχεδιαστεί το puck, η μπάλα ή ο
        δακτύλιος, όπως πάγος, άσφαλτος, δάπεδα γυμναστηρίου ή συνθετικός πάγος.
    intended_repair_location:
      name: Προβλεπόμενο σημείο επισκευής στο ελαστικό
      description: Σε ποιο σημείο του ελαστικού προορίζεται να κάνει επισκευή το κιτ.
    intended_seating_position:
      name: Προβλεπόμενη θέση καθίσματος
      description: Καθορίζει τη θέση καθίσματος του οχήματος στην οποία προορίζεται
        να εγκατασταθεί ή να χρησιμοποιηθεί ο ιμάντας της ζώνης ασφαλείας.
    intended_sewing_application:
      name: Προβλεπόμενη εφαρμογή ραψίματος
      description: Προβλεπόμενη εφαρμογή ραψίματος για την οποία έχει σχεδιαστεί το
        νήμα (π.χ. ράψιμο ενδυμάτων για όλες τις χρήσεις, ραφή καπιτονέ, ταπετσαρία).
    intended_technique:
      name: Προβλεπόμενη τεχνική
      description: Κύρια τεχνική felting για την οποία έχει σχεδιαστεί το υπόστρωμα/ταπέτο.
    intended_use:
      name: Προβλεπόμενη χρήση
      description: Κύριο πλαίσιο χρήσης οργάνου
    intended_use_fleece_fabric:
      name: Προβλεπόμενη χρήση (ύφασμα από φλις)
      description: Κύριο έργο/εφαρμογή για το οποίο διατίθεται στην αγορά το ύφασμα
        φλις.
    intended_user:
      name: Προοριζόμενος χρήστης
      description: Υποδεικνύει από ποιον έχει σχεδιαστεί να χρησιμοποιείται ο προστατευτικός
        εξοπλισμός του αεροσκάφους.
    intended_yarn_form:
      name: Προβλεπόμενη μορφή νήματος
      description: Καθορίζει τη μορφή παρουσίασης νήματος που υποστηρίζεται βέλτιστα
        από το μπολ νήματος.
    interaction_mode:
      name: Λειτουργία αλληλεπίδρασης
      description: Κύρια μέθοδος αλληλεπίδρασης που χρησιμοποιείται για την ενεργοποίηση
        ήχων ή δραστηριοτήτων.
    interactive_effects:
      name: Διαδραστικά εφέ
      description: Προσδιορίζει τα διαδραστικά ηλεκτρονικά ή μηχανικά εφέ που περιλαμβάνονται
        σε ένα σετ παιχνιδιού κουζίνας.
    interfacing_application_area:
      name: Περιοχή εφαρμογής ενισχυτικού υφάσματος
      description: Προσδιορίζει τις κοινές περιοχές ραψίματος/χειροτεχνίας που προορίζεται
        να ενισχύσει το υλικό.
    interfacing_color_family:
      name: Χρωματική κατηγορία ενισχυτικού υφάσματος
      description: Υποδεικνύει το τυπικό βασικό χρώμα ενισχυτικού υφάσματος που προορίζεται
        για χρήση κάτω από ανοιχτόχρωμα ή σκούρα υφάσματα.
    interfacing_selling_format:
      name: Μορφή πώλησης ενισχυτικού υφάσματος
      description: Περιγράφει τη μορφή πώλησης ενισχυτικού υφάσματος (για παράδειγμα,
        συνεχές κομμάτι που πωλείται με το μέτρο, προκομμένα κομμάτια, ρολά ή δείγματα).
    interfacing_stiffness_level:
      name: Επίπεδο ακαμψίας ενισχυτικού υφάσματος
      description: Περιγράφει τον βαθμό ακαμψίας/σταθερότητας που παρέχεται από το
        ενισχυτικό ύφασμα.
    interior_padding_type:
      name: Τύπος εσωτερικής επένδυσης
      description: Τύπος εσωτερικής επένδυσης ή συστήματος εισαγωγής (διαχωριστικών)
        που χρησιμοποιείται μέσα στη θήκη για την προστασία και την οργάνωση του περιεχομένου.
    interior_stall_configuration:
      name: Διαμόρφωση εσωτερικού στάβλου
      description: Καθορίζει την εσωτερική διάταξη/διαμόρφωση για τη μεταφορά ζώων
        (προσανατολισμός στάβλου και στυλ διαμερισμάτων).
    invitation_printing_coverage:
      name: Κάλυψη εκτύπωσης προσκλήσεων
      description: Ποιες πλευρές της πρόσκλησης είναι τυπωμένες (μόνο η μπροστινή
        πλευρά έναντι διπλής όψης).
    iodization:
      name: Ιωδίωση
      description: Υποδεικνύει εάν και σε ποιο βαθμό έχει προστεθεί ιώδιο στο αλάτι.
    iridescence_level:
      name: Επίπεδο ιριδισμού
      description: Περιγράφει την ένταση της φυσικής/επεξεργασμένης ιριδίζουσας λάμψης
        που είναι χαρακτηριστική των φτερών παγωνιού.
    irish_warpipe_set_configuration:
      name: Διαμόρφωση σετ ιρλανδικής γκάιντας
      description: Υποδεικνύει ποια διαμόρφωση πωλείται (πλήρες όργανο έναντι ανταλλακτικών/μερικού
        σετ) ειδικά για ιρλανδικές γκάιντες.
    iron_on_applique_application_method:
      name: Μέθοδος εφαρμογής θερμοκολλητικού απλικέ
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να εφαρμοστεί το θερμοκολλητικό
        απλικέ στο υπόστρωμα.
    ironing_center_features:
      name: Χαρακτηριστικά συστήματος σιδερώματος
      description: Παραθέτει εξειδικευμένα χαρακτηριστικά των συστημάτων σιδερώματος
        που βελτιώνουν τη χρηστικότητα και την ευκολία.
    jacket_breast_style:
      name: Στυλ κουμπώματος σακακιού
      description: Καθορίζει εάν το σακάκι του κοστουμιού είναι μονόκουμπο ή σταυρωτό.
    jacket_vent_style:
      name: Στυλ αερισμού περιβλήματος
      description: Υποδεικνύει τον τύπο του ανοίγματος (σκισίματος) στο πίσω μέρος
        του σακακιού του κοστουμιού.
    jam_and_jelly_consistency:
      name: Συνοχή μαρμελάδας και ζελέ
      description: Περιγράφει την υφή του αλείμματος, υποδεικνύοντας την παρουσία
        κομματιών φρούτων ή σπόρων.
    jaw_shape:
      name: Γεωμετρία σιαγόνων
      description: Η γεωμετρία των σιαγόνων ή της άκρης (π.χ. ευθεία, λυγισμένη, με
        μακριά μύτη) επηρεάζει την ακρίβεια και την εμβέλεια.
    jerky_form:
      name: Μορφή αποξηραμένου κρέατος (Jerky)
      description: Περιγράφει τη φυσική μορφή ή την κοπή των κομματιών από το αποξηραμένο
        κρέας (π.χ. λωρίδες, στικ, μπουκιές).
    jersey_style:
      name: Στυλ φανέλας
      description: Καθορίζει τον παράγοντα μορφής της φανέλας ή το στυλ ένδυσης για
        τις φανέλες οπαδών.
    jew_harp_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ άρπας στόματος
      description: Παραθέτει τα συμπεριλαμβανόμενα είδη που συσκευάζονται μαζί με
        την άρπα στόματος (π.χ. θήκη, πουγκί, οδηγίες).
    jew_s_harp_frame_style:
      name: Στυλ πλαισίου άρπας στόματος
      description: Περιγράφει το στυλ κατασκευής του πλαισίου/σώματος της άρπας στόματος,
        το οποίο επηρεάζει την αίσθηση, την ανθεκτικότητα και την εργονομία παιξίματος.
    jew_s_harp_tongue_profile:
      name: Προφίλ γλωσσίδας άρπας στόματος
      description: Περιγράφει το προφίλ/τη γεωμετρία της γλωσσίδας (ελάσματος) της
        άρπας στόματος, το οποίο επηρεάζει την αποκρισιμότητα και ηχόχρωμα.
    jewelry_pieces_included:
      name: Περιλαμβάνονται κοσμήματα
      description: Παραθέτει τα συγκεκριμένα κοσμήματα που περιλαμβάνονται στο σετ,
        ώστε οι αγοραστές να γνωρίζουν ακριβώς ποια κομμάτια αγοράζουν.
    jigsaw_puzzle_piece_shape:
      name: Σχήμα κομματιών παζλ
      description: Το γενικό στυλ κοπής/σχήματος των κομματιών και το προφίλ των άκρων.
    jockstrap_design_features:
      name: Χαρακτηριστικά σχεδιασμού Jockstrap
      description: Αποτυπώνει ειδικά σχεδιαστικά στοιχεία μοναδικά για τα jock straps,
        τα οποία επηρεάζουν τη λειτουργία ή την αισθητική.
    juggling_club_construction_type:
      name: Τύπος κατασκευής κορίνας ζογκλερικών
      description: Καθορίζει τον συνολικό τύπο κατασκευής μιας κορίνας ζογκλερικών
        (π.χ. ενιαίο χυτευμένο σώμα έναντι συναρμολογούμενου από πολλά τεμάχια), ο
        οποίος μπορεί να επηρεάσει την ανθεκτικότητα, την αίσθηση και τη συντήρηση.
    juggling_club_core_material:
      name: Υλικό πυρήνα κορίνας ζογκλερικών
      description: Το κύριο υλικό του πυρήνα που χρησιμοποιείται στο εσωτερικό της
        κορίνας (διαφορετικό από την εξωτερική περιτύλιξη/ταινία).
    juggling_prop_set_size:
      name: Μέγεθος σετ αξεσουάρ ζογκλερικών
      description: Αριθμός βασικών αντικειμένων που περιλαμβάνονται στο σετ (π.χ.
        σετ 3 μπαλών, ζευγάρι poi).
    juggling_ring_edge_style:
      name: Στυλ άκρης δακτυλίου ζογκλερικών
      description: Το προφίλ της άκρης του δακτυλίου που επηρεάζει την άνεση και το
        πιάσιμο.
    juice_form:
      name: Μορφή χυμού
      description: Καθορίζει τη φυσική μορφή ή το στάδιο επεξεργασίας του προϊόντος
        (π.χ. φυσικός χυμός / μη συμπυκνωμένος, συμπυκνωμένος, σε σκόνη).
    juice_processing_method:
      name: Μέθοδος επεξεργασίας χυμού
      description: Καθορίζει την τεχνική πρωτογενούς επεξεργασίας που εφαρμόζεται
        στον χυμό ή το ρόφημα, η οποία επηρεάζει τη γεύση, τη διατήρηση των θρεπτικών
        συστατικών και τη διάρκεια ζωής.
    jump_rope_style:
      name: Στυλ για σχοινάκι γυμναστικής
      description: Ταξινομεί το στυλ κατασκευής στο σχοινάκι (π.χ. με χάντρες, υφασμάτινο,
        με επενδεδυμένο συρματόσχοινο), το οποίο επηρεάζει σημαντικά την προβλεπόμενη
        χρήση και την απόδοση.
    kale_variety:
      name: Ποικιλία λαχανίδας
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία λαχανίδας (kale) (π.χ. Curly,
        Lacinato/Dinosaur, Red Russian). Αυτό βοηθά τους αγοραστές να επιλέξουν με
        βάση τη γεύση, την υφή και τη μαγειρική χρήση.
    kaleidoscope_viewing_type:
      name: Τύπος προβολής καλειδοσκοπίου
      description: Προσδιορίζει τη μορφή προβολής ή το στυλ λειτουργίας του καλειδοσκοπίου
        (π.χ. κλασικός σωλήνας με προσοφθάλμιο, βασισμένο σε φακό τηλεσκοπίου, λειτουργία
        με τροχό, προβολή).
    kayak_construction_type:
      name: Τύπος κατασκευής καγιάκ
      description: Καθορίζει το κύριο στυλ κατασκευής του καγιάκ, όπως σκληρό κέλυφος
        ή φουσκωτό.
    kayak_design_type:
      name: Τύπος σχεδιασμού καγιάκ
      description: Ταξινομεί τον κύριο σχεδιαστικό σκοπό του καγιάκ (π.χ. surfski,
        playboat, touring).
    kayak_hull_design:
      name: Σχεδιασμός γάστρας καγιάκ
      description: Προσδιορίζει το κύριο σχήμα της γάστρας, το οποίο επηρεάζει τα
        χαρακτηριστικά χειρισμού, όπως τη σταθερότητα και την ευελιξία σε συνθήκες
        κυματισμού.
    kayak_storage_bag_type:
      name: Τύπος σάκου αποθήκευσης καγιάκ
      description: Καθορίζει το στυλ ή τη μορφή της τσάντας αποθήκευσης καγιάκ, όπως
        αδιάβροχος σάκος (dry bag) ή τσάντα κουπιού.
    kayak_style:
      name: Στυλ καγιάκ
      description: Καθορίζει τον κύριο σχεδιασμό ή το στυλ χρήσης του καγιάκ (π.χ.,
        αναψυχής, τουρισμού, φουσκωτό).
    keel_type:
      name: Τύπος καρίνας
      description: Προσδιορίζει τη διαμόρφωση της καρίνας του ιστιοφόρου.
    kettlebell_style:
      name: Στυλ kettlebell
      description: Προσδιορίζει την κατασκευή ή την παραλλαγή στυλ του kettlebell
        (π.χ. αγώνων, ρυθμιζόμενο, μαλακό), βοηθώντας τους αγοραστές να επιλέξουν
        το κατάλληλο βάρος για τις προπονητικές τους ανάγκες.
    key_attachment_mechanism:
      name: Μηχανισμός συγκράτησης/ανάρτησης κλειδιών
      description: Καθορίζει το υλικό/εξάρτημα που χρησιμοποιείται για την ασφάλιση
        των κλειδιών στο εσωτερικό της θήκης, όπως κρίκοι, κλιπ ή πείροι με βίδα.
    key_retention_when_unlocked:
      name: Συγκράτηση κλειδιού κατά το ξεκλείδωμα
      description: Υποδεικνύει εάν το κλειδί μπορεί να αφαιρεθεί από την κλειδαριά
        όταν αυτή βρίσκεται σε ανοιχτή (ξεκλείδωτη) θέση.
    keyboard_amplifier_inputs:
      name: Είσοδοι ενισχυτή πλήκτρων
      description: Παραθέτει τις συνδέσεις εισόδου που υποστηρίζει ο ενισχυτής πλήκτρων
        (π.χ., 1/4 in TRS, MIDI In, Bluetooth).
    keyboard_amplifier_output_types:
      name: Τύποι εξόδων ενισχυτή πλήκτρων
      description: Καθορίζει τους κύριους τύπους βυσμάτων εξόδου που υποστηρίζει ο
        ενισχυτής πλήκτρων για τη δρομολόγηση του ήχου σε άλλα συστήματα.
    keyboard_case_handle_type:
      name: Τύπος λαβής θήκης πλήκτρων
      description: Κύριο σύστημα λαβής που χρησιμοποιείται για τη μεταφορά της θήκης
        των πλήκτρων (εκτός από τους ιμάντες).
    keyboard_case_interior_padding_type:
      name: Τύπος εσωτερικής επένδυσης/προστασίας θήκης πλήκτρων
      description: Η κύρια εσωτερική επένδυση/αντικραδασμική προστασία που χρησιμοποιείται
        μέσα στη σκληρή θήκη.
    keyboard_case_protection_level:
      name: Επίπεδο προστασίας θήκης πλήκτρων
      description: Συνολική κατηγορία προστασίας/ακαμψίας της σκληρής θήκης, που διαχωρίζει
        τις χυτευμένες θήκες σκληρού κελύφους από τις βαρέος τύπου επαγγελματικές
        θήκες μεταφοράς (τύπου Flight/ATA).
    keyboard_case_wheel_type:
      name: Τύπος τροχών θήκης πληκτρολογίου
      description: Διάταξη τροχών για σκληρές θήκες που διαθέτουν ρόδες.
    keyboard_pedal_connector_type:
      name: Τύπος βύσματος πεντάλ πλήκτρων
      description: Καθορίζει τον τύπο βύσματος/σύνδεσης που χρησιμοποιείται για τη
        σύνδεση του πεντάλ sustain σε πλήκτρα ή ψηφιακό πιάνο.
    keyboard_power_supply_type:
      name: Τύπος τροφοδοσίας πλήκτρων
      description: Κύρια μέθοδος τροφοδοσίας για τα πλήκτρα (μπαταρία, τροφοδοτικό
        AC, τροφοδοσία μέσω USB).
    keyboard_stand_tier_type:
      name: Τύπος βάσης πλήκτρων
      description: Υποδεικνύει αν η βάση πωλείται μόνο ως κύρια (μονή) βάση ή αν περιλαμβάνει/δέχεται
        προσθήκη δεύτερου επιπέδου (tier).
    keyboard_stand_tiers:
      name: Επίπεδα βάσης στήριξης πληκτρολογίου
      description: Αριθμός επιπέδων τοποθέτησης που υποστηρίζονται από τη βάση τύπου
        Z (π.χ. μονό ή διπλό επίπεδο).
    keychain_attachment_type:
      name: Τύπος σύνδεσης μπρελόκ
      description: Καθορίζει το κύριο εξάρτημα στερέωσης που χρησιμοποιείται για την
        ασφάλιση του μπρελόκ σε κλειδιά, τσάντες ή ζώνες.
    keychain_style:
      name: Στυλ μπρελόκ
      description: Περιγράφει τη συνολική μορφή και το σχήμα του μπρελόκ (τι είναι
        ως φυσικό αντικείμενο).
    keywork_finish:
      name: Φινίρισμα μηχανισμού κλειδιών (κλειδιού)
      description: Περιγράφει το φινίρισμα/την επιμετάλλωση ειδικά στον μηχανισμό
        των κλειδιών (κλειδιά), ξεχωριστά από το φινίρισμα του σώματος.
    kick_point:
      name: Σημείο κάμψης (Kick point)
      description: Καθορίζει τη θέση του σημείου κάμψης (kick-point) στο στέλεχος
        (shaft) του μπαστουνιού χόκεϊ, το οποίο επηρεάζει την ταχύτητα απελευθέρωσης
        και την αίσθηση του σουτ.
    kick_zone_grip_system:
      name: Σύστημα πρόσφυσης (grip) στη ζώνη λακτίσματος
      description: Προσδιορίζει την τεχνολογία που χρησιμοποιείται στη ζώνη λακτίσματος
        (kick zone) του σκι για την πρόσφυση.
    kickboard_features:
      name: Χαρακτηριστικά σανίδας κολύμβησης (kickboard)
      description: Προσδιορίζει τα σχεδιαστικά χαρακτηριστικά της σανίδας κολύμβησης
        που βελτιώνουν την προπόνηση ή την άνεση, συμπεριλαμβανομένης της υφής της
        επιφάνειας και των επιλογών λαβής.
    kickboard_handle_style:
      name: Στυλ λαβής σανίδας κολύμβησης
      description: Προσδιορίζει αν και με ποιο τρόπο η σανίδα κολύμβησης διαθέτει
        λαβές ή ειδική επεξεργασία επιφάνειας που επηρεάζουν τον χειρισμό και την
        άνεση.
    kickstand_mounting_position:
      name: Θέση τοποθέτησης σταντ
      description: Προσδιορίζει το σημείο στο πλαίσιο (σκελετό) του ποδηλάτου όπου
        στερεώνεται το σταντ (π.χ. κεντρική τοποθέτηση, τοποθέτηση στο κάτω πίσω πιρούνι
        / chainstay, τοποθέτηση στον πίσω άξονα).
    kickstand_type:
      name: Τύπος σταντ
      description: Περιγράφει τη δομή ή τον μηχανισμό του σταντ (π.χ. μονό πλευρικό
        σταντ, διπλό κεντρικό σταντ, τηλεσκοπικό).
    kidney_belt_support_level:
      name: Επίπεδο υποστήριξης ζώνης μέσης (νεφρών)
      description: Το καθορισμένο από τον κατασκευαστή συνολικό επίπεδο υποστήριξης
        που παρέχει μια ζώνη μέσης για τη σταθεροποίηση του κάτω μέρους της πλάτης
        και της κοιλιακής χώρας.
    kiln_firing_atmosphere:
      name: Ατμόσφαιρα ψησίματος κεραμικών
      description: Καθορίζει τον τύπο της ατμόσφαιρας όπτησης που μπορεί να δημιουργήσει
        ο κλίβανος κατά τη λειτουργία του (π.χ., οξείδωση ή αναγωγή).
    kiln_heating_element_type:
      name: Τύπος θερμαντικού στοιχείου κλιβάνου
      description: Τύπος/υλικό των θερμαντικών στοιχείων που χρησιμοποιούνται στον
        κλίβανο.
    kingpin_design:
      name: Σχεδιασμός πείρου
      description: Περιγράφει το στυλ κατασκευής του ίδιου του πείρου (kingpin), το
        βάρος πρόσκρουσης και την αντοχή στην τριβή (grind clearance).
    kingpin_orientation:
      name: Προσανατολισμός πείρου
      description: Προσδιορίζει τον προσανατολισμό του πείρου του άξονα (truck), ο
        οποίος επηρεάζει τα χαρακτηριστικά οδήγησης (ride) και τη συμβατότητα με τη
        σανίδα (deck).
    kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα κιτ
      description: Παραθέτει τα εξαρτήματα (hardware) που περιλαμβάνονται στο κιτ
        (π.χ. πασσάλους, μπουλόνια, ιμάντες, εργαλείο εγκατάστασης), ώστε οι αγοραστές
        να γνωρίζουν ακριβώς τι αγοράζουν.
    kit_format:
      name: Συσκευασία κιτ
      description: Καθορίζει τον τρόπο συσκευασίας και μεταφοράς του κιτ (π.χ. πουγκί,
        θήκη, κουτί).
    kit_items_included:
      name: Περιλαμβανόμενα είδη κιτ
      description: Παραθέτει τον κύριο εξοπλισμό και τα εξαρτήματα που περιλαμβάνονται
        στο κιτ παρασκευής, ώστε ο αγοραστής να μπορεί να διακρίνει τα κιτ εκκίνησης
        (starter kits) από τα ανταλλακτικά περιεχομένου (refills).
    kit_pouch_case_type:
      name: Τύπος θήκης/πουγκιού κιτ
      description: Καθορίζει τον τύπο της παρεχόμενης θήκης αποθήκευσης για το κιτ
        φροντίδας (εάν υπάρχει).
    kit_tools_included:
      name: Περιλαμβανόμενα εργαλεία κιτ
      description: Παραθέτει τα κύρια εργαλεία που παρέχονται στο κιτ (εάν υπάρχουν)
        για την ολοκλήρωση του έργου.
    kite_inflation_system:
      name: Σύστημα φουσκώματος αετού (Kite)
      description: Υποδεικνύει πώς φουσκώνουν η πρόσθια άκρη και τα στηρίγματα του
        αετού.
    kite_line_configuration:
      name: Διαμόρφωση σχοινιών αετού
      description: Προσδιορίζει τον αριθμό των σχοινιών πτήσης/ελέγχου που έχει σχεδιαστεί
        να χρησιμοποιεί ο αετός, μια κοινή προδιαγραφή για τη σωστή αντιστοίχιση μπαρών
        (bars) και σχοινιών.
    kite_type:
      name: Τύπος αετού (Kite)
      description: Ορίζει την κατηγορία δομικού σχεδιασμού του αετού (σχήμα και στυλ
        χαλινού/bridle).
    kiteboard_bag_style:
      name: Στυλ τσάντας kiteboard
      description: Συγκεκριμένο στυλ ή υπότυπος θήκης kiteboard (π.χ. τσάντα σανίδας,
        τσάντα γκολφ, τσάντα ταξιδιού, τσάντα foil bag).
    kiwifruit_variety:
      name: Ποικιλία ακτινιδίων
      description: Προσδιορίζει την συγκεκριμένη καλλιέργεια ή ποικιλία χρώματος του
        ακτινιδίου (πράσινο, χρυσό, κόκκινο, κ.λπ.).
    knee_pad_pocket_type:
      name: Τύπος υποδοχής για επιγονατίδα
      description: Υποδεικνύει εάν και πώς το ένδυμα δέχεται προστατευτικές επιγονατίδες.
    knee_pad_style:
      name: Στυλ επιγονατίδας
      description: Περιγράφει το στυλ κατασκευής ή τη μορφή της προστασίας γονάτου
        (π.χ., επιγονατίδα-μανίκι, νάρθηκας, προστατευτικό κέλυφος).
    knee_protection_design:
      name: Αριθμός αρθρώσεων προστατευτικού γονάτου
      description: Υποδεικνύει τον αριθμό των αρθρωτών τμημάτων που είναι ενσωματωμένα
        στο προστατευτικό ποδιού.
    kneeboard_construction:
      name: Κατασκευή σανίδας Kneeboard
      description: Προσδιορίζει την κύρια τεχνική κατασκευής ή τη σύνθετη κατασκευή
        της σανίδας (π.χ., χυτευμένο με περιστροφική χύτευση (rotomolded), χυτευμένο
        με συμπίεση, ανθρακονήματα).
    kneeboard_strap_type:
      name: Τύπος ιμάντα σανίδας Kneeboard
      description: Περιγράφει το στυλ του συστήματος ιμάντων που χρησιμοποιείται για
        τη στερέωση του αναβάτη στη σανίδα Kneeboard.
    knife_lock_mechanism:
      name: Μηχανισμός ασφάλισης μαχαιριού
      description: Καθορίζει τον τύπο του μηχανισμού που ασφαλίζει τη λεπίδα στην
        ανοιχτή θέση, ορίζοντας την ασφάλεια, την αντοχή και την ευκολία χρήσης κατά
        το κλείσιμο του μαχαιριού.
    knife_locking_mechanism:
      name: Μηχανισμός ασφάλισης μαχαιριού
      description: Καθορίζει τον τύπο του μηχανισμού που ασφαλίζει τη λεπίδα στην
        ανοιχτή θέση, ορίζοντας άμεσα την ασφάλεια, την αντοχή και την ευκολία χρήσης
        για το κλείδωμα των μαχαιριών.
    knife_opening_mechanism:
      name: Μηχανισμός ανοίγματος μαχαιριού
      description: Περιγράφει πώς εκτείνεται η λεπίδα από τη λαβή, διακρίνοντας τα
        στυλ χειροκίνητου, υποβοηθούμενου (assisted), αυτόματου και ειδικού ανοίγματος.
    knife_system:
      name: Σύστημα μαχαιριού
      description: Υποδεικνύει εάν και πώς λειτουργεί ο κόφτης πάνω στο μαχαίρι.
    knit_elastic_application:
      name: Εφαρμογή ελαστικού πλεξίματος
      description: Προσδιορίζει την προβλεπόμενη χρήση, ραφή ή χειροτεχνία για το
        πλεκτό ελαστικό περίγραμμα.
    knit_pattern:
      name: Πλεκτό μοτίβο
      description: Προσδιορίζει την κύρια πλεκτή βελονιά ή υφή που χρησιμοποιείται
        στο ύφασμα της ζακέτας, όπως κοτσίδα, ριμπ ή βάφλα, επιτρέποντας στον αγοραστή
        να βρει συγκεκριμένες υφές και θερμικές ιδιότητες.
    knit_style:
      name: Στυλ πλεξίματος
      description: Καθορίζει την κύρια πλεκτή κατασκευή, την υφή ή το διακοσμητικό
        μοτίβο που εμφανίζεται στο ύφασμα του πουλόβερ/πλεκτού.
    knitting_marker_counter_type:
      name: Τύπος μετρητή/μετρητή πλεξίματος
      description: Καθορίζει τον λειτουργικό τύπο προϊόντος μέσα σε δείκτες και μετρητές
        πλεξίματος.
    knitting_needle_tip_style:
      name: Στυλ μύτης βελόνας πλεξίματος
      description: Το σχήμα και η αιχμηρότητα της μύτης, βελτιστοποιημένα για διαφορετικά
        νήματα και τεχνικές.
    knock_sensor_technology:
      name: Τεχνολογία αισθητήρα κρουστικής ανίχνευσης
      description: Η τεχνολογία ανίχνευσης που χρησιμοποιείται στον αισθητήρα κρούσης.
    knurl_aggressiveness:
      name: Βαθμός τραχύτητας ανάγλυφης επιφάνειας (Knurl aggressiveness)
      description: Προσδιορίζει την ευκρίνεια ή την υφή του μοτίβου των οδοντώσεων
        (knurl) στη λαβή/άξονα, επηρεάζοντας την άνεση και την ασφάλεια του κρατήματος.
    knurl_marking_standard:
      name: Πρότυπο σήμανσης ανάγλυφης επιφάνειας (Knurl marking standard)
      description: Καθορίζει τη θέση των δακτυλίων αναφοράς στην ανάγλυφη λαβή που
        χρησιμοποιούνται για την τοποθέτηση του χεριού (π.χ., σημάνσεις IPF ή IWF).
    kohlrabi_variety:
      name: Ποικιλία γογγυλοκράμβης (Kohlrabi)
      description: Καθορίζει την ποικιλία ή τον τύπο του βολβού γογγυλοκράμβης, επιτρέποντας
        στον πελάτη να επιλέξει μεταξύ διαφορετικών προφίλ γεύσης, μεγέθους και χρωμάτων.
    koji_mold_type:
      name: Τύπος μύκητα Koji
      description: Υποδεικνύει τον τύπο ή το στέλεχος του μύκητα koji που χρησιμοποιείται
        κατά τη ζύμωση, το οποίο επηρεάζει το άρωμα και τη γεύση.
    kumquat_variety:
      name: Ποικιλία κουμκουάτ
      description: Προσδιορίζει την ποικιλία των κουμκουάτ που προσφέρονται, επιτρέποντας
        στους αγοραστές να επιλέγουν με βάση το γευστικό προφίλ, το μέγεθος ή τη μαγειρική
        χρήση.
    label_edge_type:
      name: Τύπος άκρης ετικέτας
      description: Καθορίζει το στυλ φινιρίσματος των άκρων που χρησιμοποιείται για
        την αποφυγή ξεφτίσματος και τον καθορισμό της αισθητικής.
    label_finish:
      name: Φινίρισμα ετικέτας
      description: Καθορίζει το φινίρισμα της επιφάνειας, την υφή ή την προστατευτική
        επίστρωση/σενάριο δοκιμής που εφαρμόζεται στην ετικέτα.
    label_finish_edge_style:
      name: Φινίρισμα ετικέτας /στυλ άκρης
      description: Πώς φινιρίζονται οι άκρες, κάτι που επηρεάζει την άνεση και την
        ανθεκτικότητα (π.χ., υφαντή άκρη έναντι κοπής με λέιζερ).
    label_fold_type:
      name: Τύπος δίπλωσης ετικέτας
      description: Καθορίζει τον τρόπο με τον οποίο είναι κατασκευασμένη η υφαντή/ραμμένη
        ετικέτα (π.χ. δίπλωση στις άκρες έναντι δίπλωσης στη μέση), επηρεάζοντας τον
        τρόπο ραφής και τη θέση της.
    label_text_type:
      name: Τύπος κειμένου ετικέτας
      description: Υποδεικνύει εάν η ετικέτα είναι κενή, προεκτυπωμένη ή προορίζεται
        για εξατομίκευση/προσαρμογή.
    lace_area_size:
      name: Μέγεθος περιοχής δαντέλας
      description: Ορίζει το μέγεθος ή τη διαμόρφωση του τμήματος της δαντέλας (π.χ.
        Κλείσιμο 4×4, μπροστινό μέρος 13×6), που καθορίζει τον διαθέσιμο χώρο χωρίσματος.
    lace_tightener_style:
      name: Στυλ σφιξίματος κορδονιών
      description: Προσδιορίζει τον μηχανικό σχεδιασμό ή τη μορφή του συστήματος/μηχανισμού
        σύσφιξης των κορδονιών.
    lace_type:
      name: Τύπος δαντέλας
      description: Περιγράφει το υλικό της δαντέλας ή το φινίρισμα στη γραμμή των
        μαλλιών/τη βάση της περούκας, το οποίο επηρεάζει τον ρεαλισμό και την εναρμόνιση
        με τον τόνο του δέρματος.
    lacrosse_ball_certification:
      name: Πιστοποίηση μπάλας Λακρός (Lacrosse)
      description: Καθορίζει την έγκριση του φορέα που διέπει το άθλημα ή τα πρότυπα
        που πληροί η μπάλα λακρός.
    lacrosse_goal_regulation_certification:
      name: Πιστοποίηση κανονισμών τέρματος λακρός
      description: Υποδεικνύει εάν το τέρμα ή το δίχτυ λακρός πληροί τις προδιαγραφές
        μιας συγκεκριμένης διοικητικής αρχής (π.χ., NCAA ή NFHS).
    lacrosse_pocket_type:
      name: Τύπος τσέπης λακρός
      description: Προσδιορίζει το γενικό στυλ του πλέγματος ή της τσέπης στην κεφαλή,
        επηρεάζοντας τον έλεγχο και την απελευθέρωση της μπάλας.
    lacrosse_string_type:
      name: Τύπος κορδονιών/πλέγματος λακρός
      description: Ταξινομεί την ακριβή μορφή ή την προβλεπόμενη χρήση του κορδονιού
        ή του κομματιού πλέγματος, ώστε οι πελάτες να μπορούν να διαφοροποιούν τα
        κομμάτια πλέγματος, τα κιτ και τους συγκεκριμένους ρόλους των κορδονιών μέσα
        σε μια τσέπη.
    ladder_position:
      name: Τοποθεσία σκάλας
      description: Προσδιορίζει πού βρίσκεται η σκάλα ή η πρόσβαση στο επάνω κρεβάτι
        (κουκέτα) ή στο κρεβάτι νηπίου.
    lanyard_attachment_hardware:
      name: Εξάρτημα κορδονιού υλικού εξοπλισμού
      description: Υποδεικνύει το στυλ του υλικού εξοπλισμού στο άκρο του κορδονιού
        που συνδέεται με κλειδιά, κονκάρδες, τηλέφωνα ή άλλα αξεσουάρ.
    lanyard_style:
      name: Στυλ κορδονιού λαιμού
      description: Καθορίζει τον τρόπο με τον οποίο φοριέται ή μεταφέρεται το κορδόνι.
    lanyard_type:
      name: Τύπος κορδονιού
      description: Περιγράφει το στυλ του κορδονιού, ή αν παρέχεται/είναι συμβατό
        με σφυρίχτρα.
    lap_hand_loom_accessories_included:
      name: Συμπεριλαμβανόμενα αξεσουάρ αργαλειού χειρός
      description: Αξεσουάρ που περιλαμβάνονται στη συσκευασία του αργαλειού χειρός.
    lapel_style:
      name: Στυλ πέτου
      description: Καθορίζει το σχέδιο του πέτου του σακακιού (π.χ. με εγκοπή, μυτερό,
        σάλι).
    laser_safety_class:
      name: Κατηγορία ασφάλειας λέιζερ
      description: Ταξινόμηση ασφάλειας λέιζερ του προϊόντος (π.χ. Κλάση 2, 3R, 3B,
        4) όπως υποδεικνύεται στην τεκμηρίωση/σήμανση της συσκευής.
    latex_processing_method:
      name: Μέθοδος επεξεργασίας λατέξ
      description: Καθορίζει τη διαδικασία κατασκευής που χρησιμοποιείται για την
        παραγωγή του αφρώδους λάτεξ, συνήθως Dunlop ή Talalay, η οποία επηρεάζει την
        αίσθηση, την απόκριση και την τιμή.
    latex_type:
      name: Τύπος λατέξ
      description: Υποδεικνύει την πηγή και τη σύνθεση του λάτεξ που χρησιμοποιείται
        στο στρώμα (φυσικό, οργανικό, συνθετικό ή σύμμεικτο), ενημερώνοντας τον αγοραστή
        σχετικά με την ανθεκτικότητα, την οικολογική συμπεριφορά και τα πιθανά αλλεργιογόνα.
    launch_profile:
      name: Προφίλ τροχιάς εκτόξευσης
      description: Υποδεικνύει την τυπική τροχιά εκτόξευσης (χαμηλή, μέση, υψηλή)
        που έχει σχεδιαστεί να παράγει ένα στέλεχος μπαστουνιού γκολφ.
    launcher_mounting_configuration:
      name: Διαμόρφωση τοποθέτησης εκτοξευτήρα
      description: Προσδιορίζει τον τρόπο τοποθέτησης ή διαμόρφωσης του εκτοξευτή
        για χρήση, βοηθώντας τους αγοραστές που χρειάζονται επιλογές αυτόνομης τοποθέτησης,
        τοποθέτησης κάτω από την κάννη ή τοποθέτησης σε ράγα.
    layer_construction:
      name: Κατασκευή στρώσης
      description: Καθορίζει την κατασκευή του πολυστρωματικού υφάσματος (π.χ., 2
        στρώσεις, 2,5 στρώσεις, 3 στρώσεις) που επηρεάζει το βάρος, τη δυνατότητα
        συσκευασίας και την ανθεκτικότητα.
    layer_design:
      name: Σχεδιασμός στρώσεων
      description: Περιγράφει την κατασκευή του διχτυού μαλλιών με όρους στρώσεων
        ή αναστρεψιμότητας.
    lazy_kate_tension_control_type:
      name: Έλεγχος τάσης χαλαρού ιμάντα (Lazy kain tension control type)
      description: Πώς η ταινία ελέγχου τάσης εφαρμόζει αντίσταση/τάση στα καρούλια/μπομπίνες
        κατά το τύλιγμα ή το ξετύλιγμα.
    lead_hardware_type:
      name: Τύπος υλικού εξοπλισμού οδηγού
      description: Προσδιορίζει το στυλ προσάρτησης ή στερέωσης στο άκρο του λουριού
        (κούμπωμα, κλιπ, γάντζος, αλυσίδα κ.λπ.), επηρεάζοντας την ευκολία χρήσης,
        την ασφάλεια και την καταλληλότητα για κάθε χρήση.
    leaf_gelatin_grade:
      name: Βαθμός φύλλων ζελατίνης
      description: Καθορίζει τον τυποποιημένο βαθμό αντοχής που χρησιμοποιείται για
        τα φύλλα ζελατίνης.
    leaf_preparation:
      name: Προετοιμασία φύλλου
      description: Περιγράφει τον τρόπο προετοιμασίας των φύλλων πριν από τη συσκευασία,
        όπως ψιλοκομμένο, τεμαχισμένο ή σε λωρίδες.
    leaf_spring_material:
      name: Υλικό φύλλου ελατηρίου
      description: Κύριο υλικό κατασκευής του πακέτου φύλλων σούστας.
    leak_protection_layer:
      name: Στρώμα προστασίας από διαρροές
      description: Υποδεικνύει εάν το ενσωματωμένο σύστημα πάνας (πάνας) του αθλητικού
        μαγιό (swim jammer) χρησιμοποιεί σχεδιασμό μονής ή διπλής στρώσης για προστασία
        από διαρροές.
    leash_clip_type:
      name: Τύπος κλιπ λουριού
      description: Καθορίζει το κλιπ ή τον τύπο υλικού εξοπλισμού που χρησιμοποιείται
        για τη σύνδεση του λουριού σε κολάρο ή ιμάντα (π.χ., κλιπ με ελατήριο, καραμπίνερ,
        περιστρεφόμενο κλιπ).
    leash_style:
      name: Στυλ λουριού
      description: Περιγράφει τη διαμόρφωση του κορδονιού ή το στυλ περιέλιξης του
        λουριού.
    leash_type:
      name: Τύπος δεσίματος
      description: Ταξινομεί το συνολικό στυλ ή τη διαμόρφωση του λουριού για εύκολο
        και γρήγορο φιλτράρισμα ανάλογα με την προβλεπόμενη χρήση.
    leavening_action_type:
      name: Τύπος δράσης διόγκωσης
      description: Προσδιορίζει τη χημική φόρμουλα ή τον τρόπο διόγκωσης του μπέικιν
        πάουντερ (π.χ., απλής δράσης, διπλής δράσης, χωρίς αλουμίνιο). Αυτό επηρεάζει
        άμεσα την απόδοση ψησίματος και την καταλληλότητα της συνταγής.
    leavening_agent:
      name: Διογκωτικό μέσο
      description: Καθορίζει τον κύριο μηχανισμό διογκώσεως που χρησιμοποιείται στη
        ζύμη.
    led_color_options:
      name: Επιλογές χρώματος LED
      description: Παραθέτει τα διαθέσιμα χρώματα LED στον ειδοποιητή για οπτική ένδειξη
        τσιμπήματος.
    led_indicator_color:
      name: Ένδειξη χρώματος LED
      description: Προσδιορίζει το χρώμα της ένδειξης LED του προϊόντος, βοηθώντας
        τους ψαράδες να συνδυάζουν πολλαπλούς ειδοποιητές ή να επιλέγουν βάσει προσωπικών
        προτιμήσεων.
    led_light_color:
      name: Χρώμα φωτισμού LED
      description: Καθορίζει το χρώμα οποιουδήποτε ενσωματωμένου φωτισμού LED.
    leek_variety:
      name: Ποικιλία πράσου
      description: Καθορίζει την καλλιέργεια ή την ποικιλία του πράσου, επιτρέποντας
        τη διαφοροποίηση ανάλογα με τη γεύση, το μέγεθος και την καλλιεργητική περίοδο.
    leg_coverage:
      name: Κάλυψη ποδιού
      description: Καθορίζει πόσο μέρος του ποδιού καλύπτει η στολή κατάδυσης (π.χ.
        κοντή στολή, ολόσωμη στολή).
    leg_cuff_style:
      name: Στυλ ρεβέρ/μανσέτας παντελονιού
      description: Καθορίζει το στυλ φινιρίσματος στο άνοιγμα του αστραγάλου του παντελονιού.
    leg_cut_height:
      name: Ύψος κοψίματος στο πόδι
      description: Υποδεικνύει πόσο ψηλά είναι το κόψιμο για το πόδι στο κάτω μέρος
        (σλιπ) του μπικίνι.
    leg_cut_style:
      name: Στυλ κοπής ποδιού
      description: Περιγράφει το σχήμα του ανοίγματος των ποδιών, το οποίο επηρεάζει
        την εμφάνιση, την άνεση και τις γραμμές μαυρίσματος.
    leg_length:
      name: Μήκος ποδιού
      description: Κατηγοριοποιεί τα μαγιό-σορτς (swim trunks) με βάση το σχετικό
        μήκος του ποδιού (κοντό, μεσαίο, μακρύ) για να επιτρέψει στους αγοραστές να
        επιλέξουν την κάλυψη που προτιμούν χωρίς να αλλάξουν κατηγορία.
    leg_loop_type:
      name: Τύπος θηλιάς ποδιού
      description: Περιγράφει τον σχεδιασμό των θηλιών για τα πόδια.
    leg_opening_style:
      name: Στυλ ανοίγματος ποδιών
      description: Καθορίζει τον τρόπο με τον οποίο τελειώνουν τα ανοίγματα των ποδιών
        στα παντελόνια, όπως ελαστικές μανσέτες, στριφώματα με φερμουάρ ή ανοιχτά
        στριφώματα.
    leg_style:
      name: Στυλ ποδιού
      description: Ορίζει το στυλ σχεδιασμού ή κατασκευής των ποδιών ή της βάσης του
        πάγκου.
    legging_foot_design:
      name: Σχέδιο πέλματος κολάν
      description: Καθορίζει αν τα κολάν είναι χωρίς πέλμα, με πέλμα ή μπορούν να
        μετατραπούν και στα δύο στυλ.
    leggings_waistband_style:
      name: Στυλ ζώνης μέσης κολάν
      description: Καθορίζει τον δομικό σχεδιασμό της ζώνης του κολάν, επηρεάζοντας
        την άνεση, την υποστήριξη και την αισθητική.
    lei_closure_style:
      name: Στυλ κλεισίματος για Lei
      description: Περιγράφει εάν το λέι είναι μια συνεχής θηλιά ή έχει ανοιχτά άκρα
        που δένουν ή κουμπώνουν με κορδέλα.
    lemon_variety:
      name: Ποικιλία λεμονιού
      description: Προσδιορίζει την συγκεκριμένη καλλιέργεια ή ποικιλία των λεμονιών
        (π.χ., Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Μέθοδος ρύθμισης μήκους
      description: Υποδεικνύει εάν και πώς ρυθμίζεται το μήκος του σχοινιού άλματος
        ώστε να ταιριάζει στον χρήστη.
    lens_color_tint:
      name: Χρώμα/απόχρωση φακού
      description: Το χρώμα ή η απόχρωση των φακών στα γυαλιά προστασίας που παρέχονται
        με το προϊόν.
    lens_construction:
      name: Κατασκευή φακού
      description: Καθορίζει τη δομική κατασκευή του φακού (π.χ. μονό κρύσταλλο, διπλό
        αντιθαμβωτικό κρύσταλλο) για να υποδείξει την ανθεκτικότητα στο θόλωμα και
        την οπτική απόδοση.
    lens_tint_category:
      name: Κατηγορία απόχρωσης φακού
      description: Ταξινομεί τη σκοτεινότητα των φακών με βάση τις διεθνείς κατηγορίες
        απόχρωσης, βοηθώντας τον πελάτη να επιλέξει φακούς κατάλληλους για διαφορετικές
        συνθήκες φωτισμού.
    lettuce_variety:
      name: Ποικιλία μαρουλιού
      description: Προσδιορίζει την συγκεκριμένη κηπευτική ποικιλία μαρουλιού (π.χ.
        Iceberg, Romaine, Butterhead), επιτρέποντας το ακριβές φιλτράρισμα και τη
        σύγκριση.
    level_of_play:
      name: Επίπεδο παιχνιδιού
      description: Το επίπεδο απόδοσης που δηλώνει ο κατασκευαστής, το οποίο ευθυγραμμίζεται
        με την ανταγωνιστικότητα και τον προϋπολογισμό του παίκτη.
    lever_configuration:
      name: Διαμόρφωση μοχλού
      description: Υποδεικνύει τη διάταξη/διάρθρωση του μοχλού/λαβής του χειριστηρίου
        του κινητήρα του σκάφους (π.χ., μονός μοχλός έναντι διπλού μοχλού).
    lever_type:
      name: Τύπος μοχλού
      description: Τύπος/μηχανισμός μοχλών αλλαγής τόνου που είναι τοποθετημένοι στις
        χορδές της άρπας.
    license_plate_cover_style:
      name: Στυλ καλύμματος πινακίδας κυκλοφορίας
      description: Καθορίζει τον τρόπο κατασκευής του καλύμματος της πινακίδας κυκλοφορίας
        (π.χ., πλήρες κάλυμμα έναντι καλυμμάτων για βίδες).
    license_plate_personalization_type:
      name: Τύπος εξατομίκευσης πινακίδας κυκλοφορίας
      description: Καθορίζει εάν η πινακίδα είναι κενή, προεκτυπωμένη ή υποστηρίζει
        εξατομίκευση που παρέχεται από τον αγοραστή (κείμενο ή/και γραφικά).
    license_usage_terms:
      name: Όροι άδειας χρήσης/χρήσης
      description: Δικαιώματα χρήσης για το μοτίβο (π.χ. μόνο για προσωπική χρήση
        έναντι περιορισμένης εμπορικής χρήσης).
    licensed_sports_property:
      name: Αδειοδοτημένο αθλητικό προϊόν/σήμα
      description: Υποδεικνύει εάν το προϊόν έχει επίσημη άδεια από κάποιο πρωτάθλημα/ομάδα/οργανισμό.
    lid_hinge_mechanism:
      name: Μηχανισμός μεντεσέ καπακιού
      description: Καθορίζει τον μηχανισμό μεντεσέ που χρησιμοποιείται για το καπάκι,
        επηρεάζοντας την ασφάλεια και την ευκολία χρήσης.
    lid_support_positions:
      name: Θέσεις υποστήριξης καπακιού
      description: Καθορίζει τις υποστηριζόμενες θέσεις του στηρίγματος καπακιού για
        το πιάνο με ουρά (πόσο ψηλά μπορεί να ανοίξει το καπάκι).
    lie_angle_color_code:
      name: Κωδικός χρώματος γωνίας lie
      description: Υποδηλώνει το χρωματικά κωδικοποιημένο σύστημα γωνίας lie του κατασκευαστή
        που χρησιμοποιείται σε ορισμένα μπαστούνια (π.χ. μαύρη κουκκίδα, πράσινη κουκκίδα).
    life_jacket_certification_standard:
      name: Πρότυπο πιστοποίησης σωσιβίου
      description: Επίσημη ταξινόμηση ασφαλείας ή πρότυπο που πληροί το προϊόν, όπως
        τύπος USCG ή επίπεδα ISO/AS.
    life_raft_certification_standard:
      name: Πρότυπο πιστοποίησης σωσίβιας σχεδίας
      description: Το πρότυπο/πιστοποίηση ασφαλείας βάσει του οποίου έχει σχεδιαστεί,
        κατασκευαστεί και συντηρείται η σχεδία.
    life_raft_container_type:
      name: Τύπος κοντέινερ σωσίβιας λέμβου
      description: Πώς συσκευάζεται η σωσίβια λέμβος για αποθήκευση και χρήση.
    life_vest_approval_standard:
      name: Πρότυπο έγκρισης σωσίβιου γιλέκου
      description: Καθορίζει το πρότυπο πιστοποίησης/έγκρισης με το οποίο συμμορφώνεται
        το σωσίβιο γιλέκο.
    life_vest_intended_user:
      name: Προοριζόμενος χρήστης για το σωσίβιο
      description: Υποδεικνύει την προβλεπόμενη κατηγορία χρήστη για εφαρμογή και
        παροχή.
    lifebuoy_approval_standard:
      name: Πρότυπο έγκρισης σωσιβίου
      description: Έγκριση ασφαλείας ή πρότυπο με το οποίο συμμορφώνεται το σωσίβιο
        (π.χ. USCG/SOLAS).
    lifebuoy_features:
      name: Χαρακτηριστικά σωσιβίου
      description: Χαρακτηριστικά λειτουργικής ασφάλειας, τοποθέτησης/χειρισμού και
        συμπεριλαμβανόμενων αξεσουάρ για σωσίβια.
    lift_mechanism_type:
      name: Τύπος μηχανισμού ανύψωσης
      description: Καθορίζει τον μηχανισμό που βοηθά στην ανύψωση/κατέβασμα ή στο
        άνοιγμα/κλείσιμο του επιτοίχιου κρεβατιού.
    lift_stand_support_point:
      name: Σημείο υποστήριξης ανύψωσης/στήριξης
      description: Το σημείο όπου ο ανελκυστήρας/το σταντ έρχεται σε επαφή με το όχημα/το
        υποστηρίζει.
    lifting_gas_type:
      name: Τύπος αερίου ανύψωσης
      description: Καθορίζει το κύριο αέριο ανύψωσης ή το μέσο πλευστότητας που χρησιμοποιείται
        στο αερόπλοιο.
    lifting_support_type:
      name: Τύπος υποστήριξης ανύψωσης
      description: Υποδεικνύει εάν η ανύψωση γίνεται με οδήγηση του οχήματος πάνω
        σε ράμπες ή μέσω βραχιόνων/επιθεμάτων που έρχονται σε επαφή με το πλαίσιο/τα
        σημεία ανύψωσης.
    ligature_and_cap_component_type:
      name: Τύπος σφιγκτήρα και τάπας
      description: Υποδεικνύει εάν το προϊόν είναι σφιγκτήρας, τάπα ή ένα σετ που
        περιλαμβάνει και τα δύο.
    ligature_material:
      name: Υλικό σφιγκτήρα
      description: Πρωτεύον υλικό του σώματος του σφιγκτήρα που εφάπτεται και ασφαλίζει
        το καλάμι (π.χ. μέταλλο, δέρμα, ύφασμα).
    ligature_plating_or_finish:
      name: Επιμετάλλωση ή φινίρισμα σφιγκτήρα
      description: Καθορίζει την επιμετάλλωση ή/και το φινίρισμα της επιφάνειας που
        εφαρμόζεται σε ένα μεταλλικό σφιγκτήρα ή/και τάπα κλαρινέτου.
    ligature_reed_contact_style:
      name: Στυλ επαφής σφιγκτήρα με το καλάμι
      description: Καθορίζει τον τρόπο με τον οποίο ο σφιγκτήρας έρχεται σε επαφή
        με το καλάμι (π.χ. ελάχιστη επαφή, πολλαπλά σημεία, περιτύλιξη).
    ligature_screw_position_relative_to_reed:
      name: Θέση βίδας σφιγκτήρα (σε σχέση με το καλάμι)
      description: Υποδεικνύει τη θέση της(των) βίδας(-ών) σύσφιξης του σφιγκτήρα
        σε σχέση με την πλευρά που βλέπει προς το καλάμι/τον μουσικό όταν είναι τοποθετημένος
        στο επιστόμιο.
    ligature_tension_adjustment_mechanism:
      name: Μηχανισμός ρύθμισης τάσης σφιγκτήρα
      description: Περιγράφει τον τρόπο με τον οποίο ο σφιγκτήρας εφαρμόζει/ρυθμίζει
        την πίεση στο καλάμι (σχεδιασμός σύσφιξης).
    ligature_tightening_mechanism_type:
      name: Τύπος μηχανισμού σύσφιξης σφιγκτήρα
      description: Καθορίζει τον μηχανισμό με τον οποίο σφίγγεται ο σφιγκτήρας γύρω
        από το επιστόμιο και το καλάμι (π.χ. μονή βίδα, διπλή βίδα, μοχλός ταχείας
        απελευθέρωσης).
    light_bar_housing_material:
      name: Υλικό περιβλήματος φωτεινής μπάρας
      description: Κύριο υλικό του περιβλήματος/σώματος της φωτεινής μπάρας, αντοχή
        στην κρούση και απαγωγή θερμότητας.
    light_bar_lens_material:
      name: Υλικό φακού light bar
      description: Κύριο υλικό του φακού/καλύμματος της φωτεινής μπάρας, το οποίο
        μπορεί να επηρεάσει την αντοχή στην κρούση και την οπτική διαύγεια.
    light_bar_mounting_location:
      name: Τοποθεσία στήριξης light bar
      description: Κύρια προβλεπόμενη θέση τοποθέτησης στο όχημα.
    light_stand_style:
      name: Στυλ βάσης φωτιστικού
      description: Καθορίζει το δομικό στυλ ή τον τύπος της βάσης που χρησιμοποιείται
        για την υποστήριξη φωτιστικών ειδικών εφέ (π.χ. τρίποδο, μπάρα σχήματος T,
        βάση με μανιβέλα), και όχι την επιφάνεια τοποθέτησης (τοίχος/οροφή), η οποία
        καλύπτεται από τον τύπο τοποθέτησης.
    light_switch_function:
      name: Λειτουργία διακόπτη φωτισμού
      description: Προσδιορίζει ποια κυκλώματα φωτισμού ή λειτουργίες ελέγχει ο διακόπτης.
    lighting_control_protocols_supported:
      name: Υποστηριζόμενα πρωτόκολλα ελέγχου φωτισμού
      description: Πρωτόκολλα ελέγχου/δικτύου που υποστηρίζει ο ελεγκτής επιπλέον
        ή αντί του DMX512.
    lighting_effects:
      name: Εφέ φωτισμού
      description: Καθορίζει τυχόν ενσωματωμένες λειτουργίες φωτισμού που βελτιώνουν
        το παιχνίδι (gameplay) ή την αισθητική.
    lighting_mode:
      name: Λειτουργία φωτισμού
      description: Απαριθμεί τα διαθέσιμα λειτουργικά μοτίβα φωτισμού, όπως σταθερό,
        αναβοσβήνον, στροβοσκοπικό ή SOS.
    lily_variety:
      name: Ποικιλία κρίνου
      description: Προσδιορίζει την εμπορική/βοτανική ποικιλία κρίνου που πωλείται
        ως κομμένο λουλούδι (π.χ. ασιατικό, ανατολίτικο).
    limb_articulation:
      name: Άρθρωση άκρων
      description: Υποδεικνύει τον βαθμό ευλυγισίας ή άρθρωσης των άκρων στο ανδρείκελο
        (καμία, σταθερή, ημιεύκαμπτη, πλήρως αρθρωτή).
    limb_material:
      name: Υλικό άκρων
      description: Πρωτογενές υλικό που χρησιμοποιείται στα άκρα ενός τόξου ή βαλλίστρας,
        το οποίο επηρεάζει το βάρος, την ανθεκτικότητα, τους κραδασμούς και τη συνολική
        απόδοση.
    lime_variety:
      name: Ποικιλία λάιμ
      description: Προσδιορίζει τη συγκεκριμένη βοτανική ή εμπορική ποικιλία λάιμ
        που πωλείται.
    line_buoyancy:
      name: Πλευστότητα σκοινιού
      description: Περιγράφει εάν το νήμα επιπλέει φυσικά ή βυθίζεται και με ποιο
        ρυθμό, επηρεάζοντας την παρουσίαση του δολώματος και τη διαχείριση της πετονιάς.
    line_purpose:
      name: Σκοπός σκοινιού
      description: Ορίζει τις προβλεπόμενες λειτουργίες των σχοινιών εντός του συστήματος
        kite (π.χ. σχοινί καθοδήγησης, σχοινί αποσυμπίεσης/depower, χαλινάρι).
    linen_finish_treatment:
      name: Φινίρισμα/επεξεργασία λινού
      description: Οποιαδήποτε διαδικασία φινιρίσματος που εφαρμόζεται στο λινό ύφασμα
        και η οποία αλλάζει την αίσθηση, την εμφάνιση ή την απόδοση.
    linen_weave_type:
      name: Τύπος ύφανσης από λινό
      description: Καθορίζει την κατασκευή της ύφανσης του λινού υφάσματος, η οποία
        επηρεάζει την υφή, την αναπνευσιμότητα και το ντραπέ.
    liner_padding_type:
      name: Τύπος επένδυσης/ενίσχυσης λινού
      description: Υποδεικνύει την κατασκευή ή το στυλ απορρόφησης κραδασμών της επένδυσης
        (π.χ., mesh, ελαφρώς επενδεδυμένο, καπιτονέ).
    liner_shape:
      name: Σχήμα επένδυσης
      description: Περιγράφει το συνολικό σχήμα της επένδυσης του υπνόσακου, ώστε
        οι πελάτες να μπορούν να το ταιριάξουν με τον υπνόσακό τους και τις προτιμήσεις
        άνεσής τους.
    liner_type:
      name: Τύπος επένδυσης
      description: Υποδεικνύει εάν το σορτς περιλαμβάνει εσωτερική επένδυση και, εάν
        ναι, τι στυλ είναι.
    lining:
      name: Επένδυση
      description: Υποδεικνύει εάν και πώς έχει επενδυθεί το μαγιό, συμπεριλαμβανομένης
        της έκτασης της κάλυψης της επένδυσης μέσα στο ένδυμα.
    lining_material:
      name: Υλικό επένδυσης
      description: Καθορίζει το υλικό που χρησιμοποιείται για την εσωτερική επένδυση
        του παπουτσιού, επηρεάζοντας την άνεση, την αναπνευσιμότητα και τη ζεστασιά.
    lining_type:
      name: Τύπος επένδυσης
      description: Καθορίζει εάν το μαγιό έχει επένδυση και σε ποιο βαθμό.
    link_connection_style:
      name: Στυλ σύνδεσης κρίκων
      description: Ταξινομεί τον τρόπο με τον οποίο ο σύνδεσμος συνδέεται με την αλυσίδα
        (π.χ., γρήγορος σύνδεσμος, πείρος σύνδεσης), επιτρέποντας στους αναβάτες/ποδηλάτες
        να επιλέξουν τη σωστή μέθοδο τοποθέτησης ή αντικατάστασης.
    live_bait_form:
      name: Μορφή ζωντανού δολώματος
      description: Καθορίζει τη φυσική μορφή ή την κατάσταση διατήρησης του δολώματος,
        όπως ζωντανό, κατεψυγμένο ή αποξηραμένο.
    living_room_furniture_items_included:
      name: Περιλαμβάνονται είδη επίπλωσης σαλονιού
      description: Καθορίζει τα μεμονωμένα κομμάτια επίπλων που αποτελούν μέρος του
        σετ σαλονιού, βοηθώντας τον αγοραστή να καταλάβει γρήγορα ποια ακριβώς εξαρτήματα
        (π.χ. καναπές, διθέσιος καναπές, τραπεζάκι σαλονιού) περιλαμβάνονται.
    load_mechanism:
      name: Μηχανισμός φόρτωσης
      description: Καθορίζει την κύρια μέθοδο με την οποία παράγεται ή προστίθεται
        αντίσταση στο μηχάνημα (π.χ., επιλογή στοίβας βαρών, υποδοχή δίσκων βαρών,
        ελαστική ταινία).
    lock_cylinder_type:
      name: Τύπος κυλίνδρου κλειδαριάς
      description: Καθορίζει τον τύπο του κυλίνδρου/πυρήνα κλειδιού που χρησιμοποιείται
        (σχετικά με την αντίσταση στην παραβίαση και τα ανταλλακτικά κλειδιά).
    lock_security_level:
      name: Επίπεδο ασφαλείας κλειδώματος
      description: Περιγράφει τα χαρακτηριστικά ασφαλείας της κλειδαριάς/κυλίνδρου
        έναντι διάτρησης και παραβίασης.
    lock_system:
      name: Σύστημα κλειδώματος
      description: Τύπος συστήματος κλειδώματος ασφαλείας που χρησιμοποιείται για
        τη συγκράτηση του ανυψωτήρα σε ύψος.
    locker_bench_configuration:
      name: Διαμόρφωση πάγκου αποδυτηρίων
      description: Περιγράφει τον προσανατολισμό ή τη δομική διαμόρφωση του πάγκου
        αποδυτηρίων (π.χ., μονόπλευρο, διπλής όψης, επιτοίχια τοποθέτηση).
    locomotive_prototype_power_type:
      name: Τύπος ισχύος πρωτοτύπου ατμομηχανής
      description: Καθορίζει τον πραγματικό τύπο πρόωσης ατμομηχανής που αντιπροσωπεύεται
        από το μοντέλο.
    locomotive_wheel_arrangement_whyte_notation:
      name: Διάταξη τροχού ατμομηχανής (σημειογραφία Whyte)
      description: Διάταξη τροχών του πρωτοτύπου της ατμομηχανής (π.χ. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Ταξινόμηση ύψους κρεβατιού Loft
      description: Υποδεικνύει το συνολικό ύψος του κρεβατιού Loft (χαμηλό, μέτριο,
        ψηλό, πολύ ψηλό), βοηθώντας τον αγοραστή να το συνδυάσει με το ύψος της οροφής
        και τις απαιτήσεις χώρου κάτω από το κρεβάτι.
    logo_application_method:
      name: Μέθοδος εφαρμογή λογοτύπου
      description: Περιγράφει τον τρόπο εφαρμογής του σχολικού οικόσημου ή λογότυπου
        στο ένδυμα (π.χ. κεντημένο ή τυπωμένο).
    logo_label_compatible_fabric_weight:
      name: Βάρος υφάσματος κατάλληλο για ετικέτα/λογότυπο
      description: Συνιστώμενη κατηγορία βάρους υφάσματος για την τοποθέτηση της ετικέτας
        χωρίς παραμόρφωση ή όγκο.
    logo_label_edge_finish:
      name: Φινίρισμα άκρης ετικέτας/λογοτύπου
      description: Καθορίζει την κατασκευή/φινίρισμα της άκρης της ετικέτας, η οποία
        επηρεάζει την αντοχή στο ξέφτισμα και την άνεση στο δέρμα.
    logo_label_print_production_method:
      name: Μέθοδος εκτύπωσης/παραγωγής ετικέτας/λογοτύπου
      description: Καθορίζει πώς εφαρμόζεται/σχηματίζεται το λογότυπο στην επιφάνεια
        της ετικέτας.
    long_block_completeness:
      name: Πληρότητα μπλοκ κινητήρα
      description: Καθορίζει ποια κύρια εξαρτήματα περιλαμβάνονται στο πλήρες σετ
        του μπλοκ κινητήρα.
    long_john_pieces_included:
      name: Περιλαμβάνονται κομμάτια ισοθερμικού (Long John)
      description: Διευκρινίζει εάν το προϊόν περιλαμβάνει μόνο το κάτω μέρος, μόνο
        το πάνω μέρος ή και τα δύο κομμάτια του ισοθερμικού σετ (Long John).
    longan_variety:
      name: Ποικιλία Λονγκάν
      description: Καθορίζει την ποικιλία ή την εμπορική ποικιλία του καρπού longan
        (π.χ. Kohala, Biew Kiew), βοηθώντας τον αγοραστή να αναγνωρίσει τα επιθυμητά
        χαρακτηριστικά γεύσης, μεγέθους και γλυκύτητας.
    loom_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ αργαλειού
      description: Βασικά αξεσουάρ αργαλειού που περιλαμβάνονται στο κουτί/στη συσκευασία.
    loom_finish:
      name: Φινίρισμα αργαλειού
      description: Το φινίρισμα της επιφάνειας του αργαλειού (κυρίως για ξύλινους
        αργαλειούς).
    loom_folding_portability_design_type:
      name: Τύπος σχεδιασμού πτυσσόμενου/φορητού αργαλειού
      description: Υποδεικνύει εάν και πώς ο αργαλειός διπλώνεται/συμπτύσσεται για
        εύκολη μεταφορά ή εξοικονόμηση χώρου κατά την αποθήκευση.
    loom_frame_folding_design:
      name: Σκελετός με αναδιπλούμενο σχεδιασμό
      description: Καθορίζει εάν και πώς το σκελετός του αργαλειού τραπεζιού διπλώνεται,
        συμπτύσσεται ή αποσυναρμολογείται για αποθήκευση ή μεταφορά.
    loom_tension_adjustment_method:
      name: Μέθοδος ρύθμισης τάσης αργαλειού
      description: Κύρια μέθοδος που χρησιμοποιείται για τη ρύθμιση της τάσης του
        στημονιού στον αργαλειό.
    loom_tie_up_system:
      name: Σύστημα δεσίματος αργαλειού
      description: Τύπος συστήματος πρόσδεσης/σύνδεσης που χρησιμοποιείται μεταξύ
        πεντάλ/αντιβάρων/πλαισίων (π.χ. Texsolv ή μεταλλική αλυσίδα).
    loquat_variety:
      name: Ποικιλία μούσμουλου
      description: Καθορίζει την καλλιέργεια ή την ποικιλία του μούσμουλου, αναδεικνύοντας
        τις διαφορές στο μέγεθος, τη γεύση, την εποχή ωρίμανσης και την εμφάνιση.
    lubricant_features:
      name: Χαρακτηριστικά λιπαντικού
      description: Επισημαίνει τα ειδικά χαρακτηριστικά απόδοσης, τα πρόσθετα ή τα
        οφέλη του λιπαντικού.
    lubrication_requirement:
      name: Απαιτήσεις λίπανσης
      description: Υποδεικνύει εάν ο ιμάντας του διαδρόμου έχει υποστεί προεπεξεργασία/δεν
        χρειάζεται συντήρηση ή εάν απαιτεί τακτική λίπανση ή κέρωμα.
    lubrication_type:
      name: Τύπος λίπανσης
      description: Καθορίζει τη λίπανση/δυνατότητα λίπανσης του δακτυλίου και εάν
        έχει σχεδιαστεί για συντήρηση με γράσο (π.χ. μέσω αυλακώσεων ή γρασαδόρου
        zerk).
    lug_nut_seat_profile:
      name: Προφίλ έδρας παξιμαδιού τροχού
      description: Καθορίζει το προφίλ έδρας του παξιμαδιού τροχού που απαιτείται
        από τον τροχό για να διασφαλιστεί η σωστή συμβατότητα του παξιμαδιού τροχού
        και η ασφαλής τοποθέτηση.
    lumbar_support_type:
      name: Τύπος οσφυϊκής υποστήριξης
      description: Περιγράφει το στυλ της οσφυϊκής υποστήριξης που παρέχεται στην
        καρέκλα (π.χ. αποσπώμενο μαξιλάρι, ρυθμιζόμενος μηχανισμός, λειτουργία μασάζ).
    lunge_trainer_style:
      name: Στυλ οργάνου γυμναστικής προβολών (Lunge Trainer)
      description: Ορίζει τον δομικό σχεδιασμό ενός οργάνου γυμναστικής προβολών.
    lure_buoyancy:
      name: Άνωση δολώματος
      description: Καθορίζει τον τρόπο με τον οποίο συμπεριφέρεται το δόλωμα μέσα
        στο νερό όταν βρίσκεται σε ηρεμία ή κατά τη διάρκεια της ανάκτησης (π.χ. επιπλέει
        στην επιφάνεια, αιωρείται στα μεσόνερα ή βυθίζεται).
    luster:
      name: Λάμψη
      description: Περιγράφει τον τρόπο με τον οποίο το φως αλληλεπιδρά με την επιφάνεια
        του δείγματος (π.χ. υαλώδης λάμψη, μεταλλική λάμψη).
    lychee_cultivar:
      name: Ποικιλία Λίτσι
      description: Προσδιορίζει την συγκεκριμένη ποικιλία ή καλλιεργητική ποικιλία
        λίτσι, όπως Brewster, Hak Ip ή Mauritius, η οποία μπορεί να διαφέρει ως προς
        τη γεύση, το μέγεθος των σπόρων, την εποχή συγκομιδής και την τιμή.
    lyre_flip_folder_mounting_location:
      name: Θέση τοποθέτησης αναλόγιου/θήκης σημειώσεων
      description: Καθορίζει πού προορίζεται να τοποθετηθεί το αναλόγιο (lyre) ή η
        θήκη σημειώσεων στο όργανο ή στο αξεσουάρ (π.χ., καμπάνα, σωλήνας κουρδίσματος,
        βάση).
    lyrics_display_type:
      name: Τύπος εμφάνισης στίχων
      description: Πώς εμφανίζονται οι στίχοι (εάν υποστηρίζονται) κατά τη διάρκεια
        του καραόκε.
    magazine_compatibility:
      name: Συμβατότητα γεμιστήρα
      description: Προσδιορίζει τα κύρια διαμετρήματα ή τους τύπους γεμιστήρων που
        έχουν σχεδιαστεί για να χωράνε στις ενσωματωμένες θήκες του γιλέκου.
    magnet_requirement:
      name: Απαίτηση μαγνήτη
      description: Υποδεικνύει εάν ο αισθητήρας χρειάζεται εξωτερικό μαγνήτη για να
        λειτουργήσει.
    magnet_toy_storage_included:
      name: Περιλαμβάνεται αποθήκευση για μαγνητικά παιχνίδια
      description: Ο τύπος της αποθήκευσης/θήκης που περιλαμβάνεται με το μαγνητικό
        παιχνίδι γραφείου για οργάνωση και ταξίδια.
    malanga_variety:
      name: Ποικιλία Μαλάνγκα
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία του βολβού malanga/taro που
        πωλείται, για να βοηθήσει τον αγοραστή να επιλέξει την επιθυμητή γεύση, χρώμα
        ή μαγειρική εφαρμογή.
    malt_color_rating_system:
      name: Σύστημα αξιολόγησης χρώματος βύνης
      description: Καθορίζει σε ποια κλίμακα χρώματος δηλώνεται το αναφερόμενο χρώμα
        (Lovibond, SRM ή EBC).
    malt_crush:
      name: Θρυμματισμός βύνης
      description: Υποδεικνύει εάν η βασική βύνη πωλείται ολόκληρη/μη αλεσμένη ή προθρυμματισμένη
        και, εάν ναι, τον τρόπο θρυμματισμού.
    malt_form:
      name: Μορφή βύνης
      description: Υποδεικνύει εάν το προϊόν πωλείται ως ολόκληροι σπόροι ή έχει υποστεί
        επεξεργασία για πολτοποίηση (π.χ. θρυμματισμένο).
    malt_intended_use:
      name: Προοριζόμενη χρήση βύνης
      description: Προβλεπόμενη κύρια χρήση για τη βύνη (ζυθοποιία, απόσταξη ή διπλός
        σκοπός).
    malt_treatment:
      name: Επεξεργασία βύνης
      description: Περιγράφει τον τρόπο επεξεργασίας του σιτηρού/βύνης πέρα από την
        τυπική αποξήρανση (κοινές ειδικές διαδικασίες).
    malt_usage_purpose:
      name: Σκοπός χρήσης βύνης
      description: Περιγράφει την κύρια λειτουργική συμβολή μιας ειδικής βύνης σε
        μια συνταγή μπίρας.
    man_overboard_system_type:
      name: Τύπος συστήματος διάσωσης ανθρώπου στη θάλασσα
      description: Καθορίζει την κύρια κατηγορία συστημάτων για τον άνθρωπο στη θάλασσα
        (MOB) που παρέχεται από το προϊόν.
    mandolin_back_sides_wood:
      name: Ξύλινη πλάτη και πλαϊνά μαντολίνου
      description: Καθορίζει το είδος ξύλου που χρησιμοποιείται για την πλάτη και
        τα πλαϊνά του μαντολίνου.
    mandolin_body_top_wood:
      name: Ξύλο για το καπάκι του μαντολίνου
      description: Κύριο ξύλο/υλικό που χρησιμοποιείται για το καπάκι του μαντολίνου.
    mandolin_bridge_type:
      name: Τύπος γέφυρας μαντολίνου
      description: Καθορίζει τον τύπο γέφυρας που χρησιμοποιείται στο μαντολίνο.
    mandolin_pickup_configuration:
      name: Διαμόρφωση μαγνητών μαντολίνου
      description: Υποδεικνύει εάν το μαντολίνο περιλαμβάνει ηλεκτρικά μέρη και τι
        είδους σύστημα μαγνητών είναι εγκατεστημένο.
    mandolin_string_configuration:
      name: Διαμόρφωση χορδής μαντολίνου
      description: Καθορίζει τη διαμόρφωση των χορδών του μαντολίνου ανά συνολικό
        αριθμό χορδών και αριθμό ζευγών (π.χ. 8 χορδές / 4 ζεύγη χορδών).
    mangosteen_variety:
      name: Ποικιλία Mangosteen
      description: Προσδιορίζει το συγκεκριμένο είδος ή ποικιλία mangosteen ή στενά
        συγγενικού καρπού Garcinia που πωλείται.
    mannequin_style:
      name: Στυλ ανδρείκελου
      description: Περιγράφει τον δομικό σχεδιασμό ή το στυλ κατασκευής του εκπαιδευτικού
        ανδρείκελου.
    manufacturing_process:
      name: Διαδικασία κατασκευής
      description: Πρωτογενής μέθοδος παραγωγής του σώματος ή της μπομπίνας του καρουλιού
        (π.χ. κατεργασία με CNC, χύτευση υπό πίεση).
    map_coverage_sky_planet_body:
      name: Κάλυψη χάρτη (ουράνιο/πλανητικό σώμα)
      description: 'Υποδεικνύει τι απεικονίζει ο χάρτης: τον νυχτερινό ουρανό (αστερισμούς)
        ή ένα συγκεκριμένο πλανητικό σώμα.'
    map_format:
      name: Μορφή χάρτη
      description: Ορίζει τη φυσική ή ψηφιακή παρουσίαση κυνηγετικών χαρτών και οδηγών.
    map_sensor_output_signal_type:
      name: Τύπος σήματος εξόδου αισθητήρα MAP
      description: Καθορίζει τον τύπο του σήματος εξόδου που παρέχει ο αισθητήρας
        MAP στη μονάδα ελέγχου κινητήρα (ECU).
    map_size_sheet:
      name: Μέγεθος χάρτη (φύλλο)
      description: Καθορίζει το τελικό μέγεθος του φύλλου/αφίσας/επιπεδόσφαιρας χάρτη
        για να βοηθήσει στην απεικόνιση και τη συμβατότητα (μέγεθος μέγεθος κάδρου
        , χώρος στον τοίχο).
    marabou_feather_form:
      name: Μορφή προϊόντος από φτερά μαραμπού
      description: Ο παράγοντας μορφής του προϊόντος από φτερά μαραμπού όπως πωλείται.
    marabou_feather_treatment:
      name: Επεξεργασία φτερών μαραμπού
      description: Πώς έγινε η επεξεργασία ή το φινίρισμα του φτερού μαραμπού για
        χειροτεχνική χρήση.
    marble_track_set_feature_modules:
      name: Χαρακτηριστικά στοιχεία πίστας για μπίλιες
      description: Επισημαίνει τα ειδικά λειτουργικά στοιχεία που περιλαμβάνονται
        στο σετ (π.χ. ανελκυστήρας, εκτοξευτής, διακόπτες).
    marine_flare_certification_standard:
      name: Πιστοποίηση/πρότυπο ναυτικής φωτοβολίδας
      description: Υποδεικνύει ποιες πιστοποιήσεις ή πρότυπα ναυτικής ασφάλειας πληροί
        η φωτοβολίδα.
    marine_safety_standard_compliance:
      name: Συμμόρφωση με τα πρότυπα ναυτικής ασφάλειας
      description: Υποδεικνύει ποια επίσημα πρότυπα ασφάλειας στο νερό ή ποιες εγκρίσεις
        πληροί το αξεσουάρ.
    marine_transmission_type:
      name: Τύπος ναυτικού κιβωτίου ταχυτήτων.
      description: Καθορίζει τον τύπο του ναυτικού κιβωτίου ταχυτήτων που συνδυάζεται
        με τον εσωλέμβιο κινητήρα (π.χ., άμεση μετάδοση κίνησης έναντι συστήματος
        V-drive).
    marker_action_type:
      name: Τύπος λειτουργίας γραμμοχαράκτη
      description: Περιγράφει τον βασικό μηχανισμό πυροδότησης/λειτουργίας του μαρκαδόρου.
    marker_caliber:
      name: Διαμέτρημα μαρκαδόρου
      description: Καθορίζει τη διάμετρο των μπάλων paintball που έχει σχεδιαστεί
        να εκτοξεύει ο μαρκαδόρος.
    marking_durability:
      name: Ανθεκτικότητα σήμανσης
      description: Υποδεικνύει για πόσο χρονικό διάστημα αναμένεται να παραμείνει
        ορατή η αποτυπωμένη γραμμή υπό κανονικές συνθήκες, όπως προσωρινή (έως 3 εβδομάδες),
        ημιμόνιμη (έως 6 μήνες) ή μόνιμη (περισσότερο από 6 μήνες).
    marking_tip_type:
      name: Τύπος μύτης σήμανσης
      description: Ο τύπος μύτης που χρησιμοποιεί ο διαβήτης για σχεδίαση (π.χ. υποδοχή
        γραφίτη, μελάνι ή ακίδα χάραξης).
    marshmallow_processing_method:
      name: Μέθοδος επεξεργασίας Marshmallow
      description: Περιγράφει οποιαδήποτε ειδική επεξεργασία που εφαρμόζεται στα marshmallows
        και επηρεάζει την υφή, τη διάρκεια ζωής στο ράφι ή τη γεύση.
    marshmallow_size:
      name: Μέγεθος μαρσμέλοου
      description: Ταξινομεί το σχετικό μέγεθος των κομματιών του προϊόντος marshmallow.
    martial_arts_belt_rank:
      name: Βαθμίδα ζώνης πολεμικών τεχνών
      description: Υποδεικνύει το επίπεδο δεξιότητας/κατάταξης που αντιπροσωπεύεται
        από τον συνδυασμό χρώματος ή ειδικού χρώματος της ζώνης.
    mask_bib_type:
      name: Τύπος προστατευτικού λαιμού μάσκας (bib)
      description: Καθορίζει τον τύπο του προστατευτικού λαιμού σε μια μάσκα ξιφασκίας,
        όπως συμβατικό υφασμάτινο, αγώγιμο, αφαιρούμενο ή χωρίς προστατευτικό.
    mask_cage_material:
      name: Υλικό πλέγματος μάσκας
      description: Υλικό που χρησιμοποιείται ειδικά για το προστατευτικό πλέγμα ή
        τον σκελετό της μάσκας.
    mask_goggle_design:
      name: Σχεδιασμός μάσκας/προστατευτικών γυαλιών
      description: Ορίζει τον συνολικό δομικό σχεδιασμό ή το στυλ κάλυψης του προστατευτικού
        εξοπλισμού.
    mask_skirt_material:
      name: Υλικό περιμέτρου μάσκας
      description: Προσδιορίζει το υλικό της μαλακής φούστας που παρέχει την υδατοστεγή
        σφράγιση μεταξύ της μάσκας και του προσώπου.
    mask_strap_material:
      name: Υλικό λουριού μάσκας
      description: Καθορίζει το υλικό του ιμάντα που ασφαλίζει τη μάσκα στο κεφάλι.
    mass_air_flow_sensor_measurement_type:
      name: Τύπος μέτρησης αισθητήρα μάζας αέρα
      description: Καθορίζει την τεχνολογία/στυλ σήματος εξόδου ανίχνευσης που χρησιμοποιείται
        από τον αισθητήρα MAF.
    mass_air_flow_sensor_mounting_type:
      name: Τύπος τοποθέτησης αισθητήρα ροής αέρα
      description: Πώς τοποθετείται/εγκαθίσταται ο αισθητήρας MAF ή το συγκρότημα
        αισθητήρα στο σύστημα εισαγωγής.
    massage_feature:
      name: Λειτουργία μασάζ
      description: Υποδεικνύει εάν η ρυθμιζόμενη βάση περιλαμβάνει ενσωματωμένες λειτουργίες
        μασάζ και, εάν ναι, πόσες ζώνες μασάζ παρέχει.
    mast_attachment_interface:
      name: Διεπαφή σύνδεσης ιστού
      description: Καθορίζει το πρότυπο σύνδεσης μεταξύ της ατράκτου και του ιστού,
        βοηθώντας τον αγοραστή στην εξασφάλιση της συμβατότητας του εξαρτήματος.
    mast_base_type:
      name: Τύπος βάσης ιστού
      description: Προσδιορίζει τη διεπαφή τοποθέτησης που συνδέει τον ιστό με τη
        σανίδα ή τον προσαρμογέα.
    mast_bend_curve:
      name: Καμπύλη κάμψης ιστού
      description: Μοτίβο κάμψης του ιστού που καθορίζει τη συμβατότητα και τη συμπεριφορά
        των πανιών.
    mast_diameter_type:
      name: Τύπος διαμέτρου ιστού
      description: Τυποποιημένη ταξινόμηση διαμέτρου του ιστού ιστιοσανίδας (π.χ.
        RDM, SDM, MDM) που χρησιμοποιείται για ελέγχους συμβατότητας.
    mat_backing_type:
      name: Τύπος υποστρώματος τάπητα
      description: Καθορίζει τον τύπο της επένδυσης στην κάτω πλευρά του τάπητα που
        βοηθά στη διατήρησή του στη θέση του σε διάφορες επιφάνειες.
    mat_installation_method:
      name: Μέθοδος εγκατάστασης επιθέματος
      description: Υποδεικνύει τον τρόπο εγκατάστασης ή ασφάλισης του τάπητα στη θέση
        του.
    mat_style:
      name: Στυλ τάπητα
      description: Ορίζει το δομικό στυλ ή τον παράγοντα μορφής του τάπητα (π.χ. πτυσσόμενος
        τάπητας, αλληλοασφαλιζόμενα πλακίδια, στρώμα πτώσης/crash pad).
    maternity_panel_type:
      name: Τύπος ελαστικής ζώνης εγκυμοσύνης
      description: Υποδεικνύει το στυλ της ελαστικής ζώνης ή της ζώνης μέσης που έχει
        σχεδιαστεί για να προσαρμόζεται στην ανάπτυξη της κοιλιάς κατά την εγκυμοσύνη.
    maternity_waistband_style:
      name: Στυλ ζώνης εγκυμοσύνης
      description: Υποδεικνύει τη σχεδίαση και την τοποθέτηση της ζώνης μέσης ή της
        ελαστικής ζώνης της κοιλιάς ειδικά για το παντελόνι εγκυμοσύνης, περιγράφοντας
        πώς το ένδυμα υποστηρίζει την κοιλιά καθώς αναπτύσσεται.
    mattress_top_type:
      name: Τύπος επιφάνειας στρώματος
      description: Καθορίζει το στυλ του άνω στρώματος ή της κατασκευής της επιφάνειας
        του στρώματος, όπως ανώστρωμα με μαξιλάρι ή σφιχτό επίστρωμα.
    maturation_vessel_material:
      name: Υλικό δοχείου ωρίμανσης
      description: Καθορίζει το κύριο υλικό του δοχείου ή του βαρελιού που χρησιμοποιείται
        για την παλαίωση του shochu.
    maximum_quilt_size_supported:
      name: Μέγιστο υποστηριζόμενο μέγεθος παπλώματος
      description: Το μέγιστο μέγεθος παπλώματος/υφάσματος που μπορεί να φιλοξενήσει
        το πλαίσιο (συνήθως περιγράφεται από το μέγεθος του κρεβατιού ή το μέγιστο
        πλάτος).
    meal_course:
      name: Κατηγορία γεύματος
      description: Προσδιορίζει την τυπική περίσταση γεύματος για το προϊόν.
    meal_preparation_state:
      name: Κατάσταση προετοιμασίας γεύματος
      description: Υποδεικνύει πόση προετοιμασία απαιτείται πριν από την κατανάλωση
        (π.χ. Έτοιμο προς κατανάλωση, Κιτ γεύματος).
    meat_processing_state:
      name: Κατάσταση επεξεργασίας κρέατος
      description: Υποδεικνύει τον βαθμό μαγειρέματος ή ωρίμανσης που εφαρμόζεται
        στο προϊόν κρέατος πριν από την πώληση.
    meat_quality_grade:
      name: Βαθμός ποιότητας κρέατος
      description: Υποδεικνύει τον βαθμό ποιότητας ή την ταξινόμηση που έχει αποδοθεί
        στο κρέας από μια αναγνωρισμένη αρχή αξιολόγησης (π.χ., USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Ισχυρισμός για την εκτροφή κρέατος
      description: Επισημαίνει κοινούς ισχυρισμούς για την καλή διαβίωση των ζώων
        ή τις πρακτικές εκτροφής που σχετίζονται με το κρέας (π.χ. εκτρεφόμενο με
        χόρτο, ελευθέρας βοσκής).
    mechanical_loom_assembly_status:
      name: Κατάσταση συναρμολόγησης μηχανικού αργαλειού
      description: Πώς παραδίδεται ο αργαλειός όσον αφορά τη συναρμολόγηση που απαιτείται.
    mechanical_loom_weaving_type:
      name: Τύπος ύφανσης μηχανικού αργαλειού
      description: Κύριος μηχανισμός/τύπος ύφανσης που υποστηρίζεται από τον αργαλειό.
    mechanical_puzzle_primary_mechanism:
      name: Κύριος μηχανισμός μηχανικού παζλ
      description: Πρωταρχική αλληλεπίδραση/μηχανισμός που χρησιμοποιείται για την
        επίλυση του μηχανικού παζλ.
    mechanical_puzzle_solution_format:
      name: Μορφή λύσης μηχανικού παζλ
      description: Μορφή στην οποία παρέχονται συμβουλές/λύσεις όταν περιλαμβάνονται.
    medal_attachment_style:
      name: Τρόπος στερέωσης του μεταλλίου
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να φορεθεί ή να εκτεθεί
        το μετάλλιο (π.χ. κορδέλα λαιμού, καρφίτσα στο πίσω μέρος).
    medal_award_level:
      name: Επίπεδο απονομής μεταλλίου
      description: Καθορίζει το επίπεδο βράβευσης που αντιπροσωπεύει το μετάλλιο (π.χ.,
        1η θέση, συμμετέχων).
    medal_finish:
      name: Φινίρισμα μεταλλίου
      description: Καθορίζει το φινίρισμα της επιφάνειας του μεταλλίου (οπτική γυαλάδα/υφή),
        ανεξάρτητα από το υλικό.
    medal_packaging:
      name: Συσκευασία μεταλλίου
      description: Υποδεικνύει τον τύπο συσκευασίας παρουσίασης που περιλαμβάνεται
        με το μετάλλιο.
    melodica_accessory_set_included:
      name: Περιλαμβάνεται σετ αξεσουάρ μελόντικας
      description: Ποια συνηθισμένα αξεσουάρ περιλαμβάνονται στη συσκευασία της μελόντικας.
    melodica_air_chamber_material:
      name: Υλικό θαλάμου αέρα μελόντικας
      description: Το υλικό του αεροθαλάμου/σώματος της μελόντικας (ABS, ξύλο κ.λπ.)
        όταν οι πωλητές το διακρίνουν από άλλα μέρη.
    melodica_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται στη μελόντικα
      description: Αξεσουάρ που περιλαμβάνονται στο κουτί της μελόντικα.
    melodica_key_color_scheme:
      name: Χρωματική παλέτα πλήκτρων μελόντικας
      description: Χρωματική παλέτα των πλήκτρων (όχι του σώματος), η οποία επηρεάζει
        την αναγνωσιμότητα (ειδικά για παιδιά/αρχάριους).
    melodica_mouthpiece_configuration:
      name: Διαμόρφωση επιστομίου μελόντικας
      description: Υποδεικνύει ποιο(-α) εξάρτημα(-ατα) φυσήματος περιλαμβάνεται(-ονται)
        ή χρησιμοποιείται(-ούνται) για το παίξιμο της μελόντικας.
    melodica_mouthpiece_type:
      name: Τύπος επιστομίου μελόντικας
      description: Ο τύπος του εξαρτήματος φυσήματος που περιλαμβάνεται με τη μελόντικα
        (επιστόμιο ή/και εύκαμπτος σωλήνας).
    melodica_reed_plate_material:
      name: Υλικό πλάκας γλωττίδων μελόντικας
      description: Το υλικό της πλάκας των γλωσσιδών (διαφορετικό από το συνολικό
        υλικό του σώματος του οργάνου), το οποίο μπορεί να επηρεάσει την ανθεκτικότητα
        και τον τόνο.
    melodica_size_class:
      name: Κατηγορία μεγέθους μελόντικας
      description: Γενική κατηγορία μεγέθους/φορητότητας για μια μελόντικα, η οποία
        συνήθως βασίζεται στον αριθμό των πλήκτρων και στο σχήμα της (π.χ. μοντέλα
        mini/μαθητικά, standard ή διευρυμένης έκτασης).
    melon_variety:
      name: Ποικιλία πεπονιού
      description: Καθορίζει τον συγκεκριμένο τύπο πεπονιού στο προϊόν, ώστε οι αγοραστές
        να βρίσκουν γρήγορα την ποικιλία της προτίμησής τους.
    memory_foam_infusion_material:
      name: Υλικό έγχυσης αφρού μνήμης
      description: Προσδιορίζει ειδικές ουσίες που εγχέονται στον αφρό μνήμης για
        ψύξη, έλεγχο οσμών ή αντιμικροβιακούς σκοπούς.
    memory_wire_gauge:
      name: Μετρητής καλωδίου μνήμης
      description: Καθορίζει το μέγεθος του σύρματος μνήμης με το αμερικανικό πρότυπο
        μέτρησης συρμάτων (AWG).
    memory_wire_project_size:
      name: Μέγεθος έργου με σύρμα μνήμης
      description: Καθορίζει το προβλεπόμενο σχήμα κοσμήματος ή το μέγεθος της σπείρας
        για το οποίο προορίζεται το σύρμα μνήμης (π.χ. βραχιόλι, κολιέ, δαχτυλίδι).
    metal_purity:
      name: Καθαρότητα μετάλλου
      description: Υποδεικνύει την λεπτότητα ή τον βαθμό καθαρότητας του μετάλλου
        που χρησιμοποιείται στο κόσμημα, που συνήθως εκφράζεται σε καράτια (K) ή βαθμούς
        καθαρότητας ανά χίλια.
    metrics_counted:
      name: Μετρούμενες τιμές
      description: Παραθέτει τα επιμέρους στατιστικά στοιχεία ή τα συμβάντα που έχει
        σχεδιαστεί να καταγράφει ο μετρητής.
    metronome_display_style:
      name: Στυλ εμφάνισης μετρονόμου
      description: Καθορίζει τον τρόπο εμφάνισης/ένδειξης του ρυθμού στον χρήστη (βελόνα/εκκρεμές,
        ψηφιακή οθόνη LED/LCD ή φωτεινή ένδειξη που αναβοσβήνει).
    metronome_output_method:
      name: Τύπος εξόδου σήματος μετρονόμου
      description: Καθορίζει τις διαθέσιμες μεθόδους εξόδου για το σήμα ήχου/ρυθμού
        του μετρονόμου.
    microphone_toy_feature_set:
      name: Σετ λειτουργίας παιχνιδιών μικροφώνου
      description: Βασικές δυνατότητες που εστιάζουν στο παιχνίδι για μικρόφωνα-παιχνίδια
        (εφέ φωνής, ενίσχυση ήχου, ηχογράφηση κ.λπ.).
    midi_output_type:
      name: Τύπος εξόδου MIDI
      description: Καθορίζει τον(τους) τύπο(-ους) της εξόδου MIDI που παρέχεται από
        τη μονάδα ενεργοποίησης.
    military_branch:
      name: Κλάδος των ενόπλων δυνάμεων
      description: Προσδιορίζει τον κλάδο των ενόπλων δυνάμεων για τον οποίο προορίζεται
        ή από τον οποίο είναι εμπνευσμένη η στολή.
    milk_base_type:
      name: Τύπος βάσης γάλακτος
      description: Καθορίζει το κύριο γάλα ή την εναλλακτική λύση γάλακτος που χρησιμοποιείται
        στο ρόφημα, εάν υπάρχει.
    milk_feeding_method:
      name: Μέθοδος σίτισης με γάλα
      description: Υποδεικνύει τον τρόπο με τον οποίο τρέφονταν τα ζώα προέλευσης
        (π.χ. τρέφονταν με χόρτο ή με σιτηρά), κάτι που μπορεί να επηρεάσει τη γεύση
        και το θρεπτικό προφίλ.
    milk_processing_method:
      name: Μέθοδος επεξεργασίας γάλακτος
      description: Καθορίζει τη μέθοδο επεξεργασίας ή την τεχνική επεξεργασίας που
        έχει υποστεί το γάλα, η οποία επηρεάζει την ασφάλεια, τη τη διάρκεια ζωής
        και τις θρεπτικές ιδιότητές του.
    milk_source_animal:
      name: Ζώο προέλευσης γάλακτος
      description: Προσδιορίζει το ζώο από το οποίο ελήφθη το γάλα, βοηθώντας τους
        καταναλωτές να επιλέγουν αγελαδινό, κατσικίσιο, βουβαλίσιο ή άλλο γαλακτοκομικό
        προϊόν ζωικής προέλευσης.
    millet_processing_method:
      name: Μέθοδος επεξεργασίας γάλακτος
      description: Υποδεικνύει την κύρια μέθοδο επεξεργασίας ή την κατάσταση του κόκκου
        του κεχρί (π.χ. μη αποφλοιωμένος, αποφλοιωμένος, με φύτρο).
    millet_variety:
      name: Ποικιλία κεχριού
      description: Προσδιορίζει τον συγκεκριμένο τύπο κόκκου από κεχρί που περιέχεται
        στο προϊόν (π.χ. pearl, foxtail, finger).
    milling_process:
      name: Διαδικασία άλεσης
      description: Υποδεικνύει τη μέθοδο παραγωγής που χρησιμοποιείται για την άλεση
        του αλεύρου, η οποία μπορεί να επηρεάσει τη γεύση, την έκθεση στη θερμότητα
        και το θρεπτικό προφίλ.
    mint_mark:
      name: Σήμα νομισματοκοπείου
      description: Σήμα νομισματοκοπείου όπως αναγράφεται στο κέρμα (εάν υπάρχει).
    mirror_configuration:
      name: Διαμόρφωση καθρέφτη
      description: Καθορίζει το στυλ ή τη δομή του καθρέφτη που περιλαμβάνεται στο
        σετ τουαλέτας με καθρέφτη.
    mirror_coverage:
      name: Κάλυψη καθρέφτη
      description: Περιγράφει την έκταση των φύλλων καθρέφτη στις συρόμενες πόρτες.
    mirror_curvature_type:
      name: Τύπος καμπυλότητας καθρέφτη
      description: Καθορίζει εάν η επιφάνεια του καθρέφτη είναι κυρτή, επίπεδη ή κοίλη,
        επηρεάζοντας το οπτικό πεδίο.
    mirror_mounting_location:
      name: Σημείο τοποθέτησης καθρέφτη
      description: Καθορίζει το σημείο στο ποδήλατο ή στον αναβάτη όπου προορίζεται
        να τοποθετηθεί ο καθρέφτης.
    mirror_shape:
      name: Σχήμα καθρέφτη
      description: Υποδεικνύει το γεωμετρικό σχήμα ή το στυλ του κύριου καθρέφτη που
        περιλαμβάνεται στο σετ τουαλέτας με καθρέφτη.
    mix_ratio:
      name: Αναλογία ανάμειξης
      description: Καθορίζει τη συνιστώμενη αναλογία αραίωσης ψυκτικού υγρού προς
        νερό (για συμπυκνωμένα προϊόντα) ή επιβεβαιώνει την καθορισμένη αναλογία έτοιμου
        μείγματος (premix) για προαραιωμένα προϊόντα.
    mma_glove_type:
      name: Τύπος γαντιού MMA
      description: Υποδεικνύει την κύρια προβλεπόμενη χρήση ή το στυλ του γαντιού
        στην προπόνηση ή τον αγώνα MMA.
    mobility_features:
      name: Χαρακτηριστικά φορητότητας
      description: Υποδεικνύει ενσωματωμένα στοιχεία κίνησης ή φορητότητας, όπως ροδάκια
        ή πτυσσόμενα πόδια.
    model_aircraft_assembly_level:
      name: Επίπεδο συναρμολόγησης μοντέλων αεροσκαφών
      description: Υποδεικνύει τον βαθμό κατασκευής που απαιτείται προτού χρησιμοποιηθεί
        το αεροσκάφος.
    model_making_kit_items_included:
      name: Περιλαμβανόμενα είδη κιτ μοντελισμού
      description: Παραθέτει τι περιλαμβάνεται σε ένα κιτ ή σετ μοντελισμού (π.χ.
        χρώμα, κόλλα, πινέλο).
    model_making_product_type:
      name: Τύπος προϊόντος μοντελισμού
      description: Προσδιορίζει τη βασική κατηγορία του είδους στο πλαίσιο του μοντελισμού
        (κιτ, αξεσουάρ, εργαλείο ή αναλώσιμο), με σκοπό τη βελτίωση της περιήγησης
        και του φιλτραρίσματος ανάμεσα σε διαφορετικούς τύπους προϊόντων μοντελισμού.
    model_rocket_kit_contents:
      name: Περιεχόμενα κιτ μοντέλου πυραύλου
      description: Υποδεικνύει αν το προϊόν είναι ένα πλήρες κιτ μοντέλου πυραύλου
        πολλαπλών σταδίων ή ένα κιτ πρόσθετων/μονάδων/εξαρτημάτων (π.χ. εξαρτήματα
        σταδίου επιτάχυνσης ή σταδίου διατήρησης).
    model_rocket_kit_format:
      name: Μορφή κιτ μοντέλου πυραύλου
      description: Καθορίζει εάν ο πύραυλος πωλείται ως κιτ και το επίπεδο ετοιμότητας
        συναρμολόγησης.
    model_rocket_motor_impulse_class:
      name: Κατηγορία ώθησης κινητήρα μοντέλου πυραύλου
      description: Υποδεικνύει την τυποποιημένη κατηγορία συνολικής ώθησης του κινητήρα
        μοντέλου πυραύλου (π.χ. A, B, C ...).
    model_rocket_motor_mount_size:
      name: Μέγεθος βάσης κινητήρα μοντέλου πυραύλου
      description: Καθορίζει τη διάμετρο του περιβλήματος του κινητήρα που έχει σχεδιαστεί
        να δέχεται η βάση του κινητήρα του πυραύλου.
    model_rocket_power_source_required:
      name: Απαιτείται πηγή τροφοδοσίας μοντέλου πυραύλου
      description: Υποδεικνύει εάν το προϊόν απαιτεί μπαταρίες/εξωτερική τροφοδοσία
        και τι είδους.
    model_rocket_propellant_type:
      name: Τύπος προωθητικού μοντέλου πυραύλου
      description: Προσδιορίζει το σύστημα προωθητικού/κινητήρα που χρησιμοποιείται
        για την πρόωση σε μοντέλα πυραύλων.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Συνιστώμενο μέγεθος ράβδου ή ράγας εκτόξευσης για το μοντέλο πυραύλου
      description: Καθορίζει τη διάμετρο της ράβδου εκτόξευσης ή το μέγεθος της ράγας
        εκτόξευσης για την οποία έχει σχεδιαστεί ο πύραυλος (π.χ. ράβδος 1/8 ίντσας,
        ράγα εκτόξευσης 1010).
    model_rocket_recovery_method:
      name: Μέθοδος ανάκτησης μοντέλου πυραύλου
      description: Κύριο σύστημα ανάκτησης που χρησιμοποιείται για την ασφαλή επιστροφή
        του πυραύλου μετά την πτήση.
    model_rocket_recovery_system_type:
      name: Τύπος συστήματος ανάκτησης μοντέλου πυραύλου
      description: Καθορίζει την κύρια μέθοδο ανάκτησης που χρησιμοποιείται για την
        ασφαλή επιστροφή του πυραύλου μετά την πτήση.
    model_rocket_staging:
      name: Διάταξη σταδίων μοντέλου πυραύλου
      description: Υποδεικνύει με πόσα μηχανοκίνητα στάδια έχει σχεδιαστεί να πετάει
        το μοντέλο πυραύλου.
    model_train_accessory_electrical_connection_type:
      name: Τύπος ηλεκτρικής σύνδεσης για αξεσουάρ μοντελισμού τρένων
      description: Καθορίζει τον τύπο συνδέσμου ή ακροδέκτη που χρησιμοποιείται για
        τη σύνδεση αξεσουάρ ηλεκτρικού μοντέλου αμαξοστοιχίας σε μακέτα (όπου ισχύει).
    model_train_coupler_type:
      name: Τύπος ζεύκτη μοντέλου τρένου
      description: Καθορίζει το πρότυπο ζεύξης που είναι εγκατεστημένο στο τροχαίο
        υλικό ή την ατμομηχανή μοντέλου τρένου.
    model_train_gauge:
      name: Μέτρηση μοντέλου σιδηροδρόμου
      description: Καθορίζει το μοντέλο συστήματος μετρητή σιδηροδρομικής γραμμής
        για το οποίο προορίζεται το εξάρτημα (όταν ισχύει), συμβάλλοντας στη διασφάλιση
        της φυσικής συμβατότητας με την παρακολούθηση και τη διάταξη του χρήστη.
    model_train_lighting_features:
      name: Λειτουργίες φωτισμού μοντέλου σιδηροδρόμου
      description: Καθορίζει τη λειτουργικότητα φωτισμού που περιλαμβάνεται στο μοντέλο
        τρένου/ατμομηχανής.
    model_train_power_pickup_method:
      name: Μέθοδος λήψης ισχύος/ρεύματος μοντέλου τρένου
      description: Καθορίζει τον τρόπο με τον οποίο το μοντέλο λαμβάνει ισχύ για λειτουργία
        (ισχύς μέσω γραμμής, μπαταρία κ.λπ.).
    model_train_scale:
      name: Κλίμακα μοντέλου σιδηροδρόμου
      description: Καθορίζει το πρότυπο κλίμακας/μέγεθος του μοντέλου τρένου (σχέση
        μεταξύ του μοντέλου και του πραγματικού τρένου).
    model_train_sound_features:
      name: Χαρακτηριστικά ήχου τρένου μοντέλου
      description: Υποδεικνύει εάν το μοντέλο περιλαμβάνει ενσωματωμένα ηχητικά εφέ
        στάδιο και τι τύπο ήχου προσφέρει.
    model_train_track_gauge:
      name: Εύρος τροχιάς μοντέλου τρένου
      description: Καθορίζει το πρότυπο εύρους τροχιάς/σιδηροδρομικών γραμμών στις
        οποίες είναι σχεδιασμένο να κινείται το μοντέλο (π.χ. κανονικό εύρος, παραλλαγές
        στενού εύρους, ή ειδικά εύρη ανά επωνυμία/σύστημα κατά περίπτωση).
    modeling_dough_base_material:
      name: Υλικό βάσης ζύμης μοντελισμού
      description: Κύρια βάση/σύνθεση της μοντελισμού μοντελισμού (π.χ. με βάση το
        σιτάρι/αλεύρι έναντι της βάσης από πολυμερές).
    modeling_dough_features:
      name: Χαρακτηριστικά ζύμης μοντελισμού
      description: Βασικά λειτουργικά χαρακτηριστικά της ζύμης μοντελισμού βάσει των
        οποίων φιλτράρουν τις αναζητήσεις τους οι αγοραστές.
    modification_level:
      name: Επίπεδο τροποποίησης βύνης
      description: Υποδεικνύει τον βαθμό τροποποίησης της βύνης (πόσο αποτελεσματικά
        διασπώνται τα ενδοσπέρμια/οι πρωτεΐνες του κριθαριού), ο οποίος συχνά συνοψίζεται
        ως χαμηλής/μέτριας/υψηλής τροποποίησης.
    molasses_base_ingredient:
      name: Βασικό συστατικό μελάσας
      description: Προσδιορίζει την κύρια πηγή φυτού ή καρπού από την οποία παράγεται
        η μελάσα.
    molasses_grade:
      name: Βαθμός ποιότητας μελάσας
      description: Ταξινομεί τη μελάσα ανά στάδιο εκχύλισης/ραφιναρίσματος, το οποίο
        επηρεάζει άμεσα την ένταση της γεύσης, το χρώμα και το θρεπτικό προφίλ.
    mold_material:
      name: Υλικό χύτευσης
      description: Πρωτογενής σύνθεση υλικού του ίδιου του καλουπιού (π.χ. σιλικόνη,
        πλαστικό, μέταλλο).
    molle_compatibility:
      name: Συμβατότητα MOLLE
      description: Υποδεικνύει εάν το γιλέκο διαθέτει ιμάντα MOLLE/PALS για την τοποθέτηση
        αρθρωτών θυλάκων και αξεσουάρ.
    motor_belt_type:
      name: Τύπος ιμάντα κινητήρα
      description: Ορίζει τον σχεδιασμό/προφίλ του ιμάντα που χρησιμοποιείται στο
        σύστημα κίνησης του διαδρόμου γυμναστικής.
    motor_configuration:
      name: Διαμόρφωση κινητήρα
      description: Υποδεικνύει πόσους ανεξάρτητους κινητήρες κίνησης χρησιμοποιεί
        το σκούτερ.
    motor_mounting_configuration:
      name: Διαμόρφωση τοποθέτησης κινητήρα
      description: Περιγράφει τον τρόπο τοποθέτησης/ενσωμάτωσης του κινητήρα στο κιτ
        μετατροπής για ένα σκούτερ.
    motor_mounting_position:
      name: Θέση τοποθέτησης κινητήρα
      description: Υποδεικνύει πού στο ηλεκτρικό σκούτερ είναι τοποθετημένος ο κινητήρας,
        όπως στον μπροστινό τροχό, στον πίσω τροχό, στον διπλό τροχό ή στην κεντρική
        μονάδα μετάδοσης κίνησης.
    motor_position:
      name: Θέση κινητήρα
      description: Υποδεικνύει πού βρίσκεται ο κινητήρας στο ηλεκτρικό ποδήλατο, επηρεάζοντας
        τον χειρισμό και τη συντήρηση.
    motor_vehicle_a_v_integration_features:
      name: Χαρακτηριστικά ενσωμάτωσης οπτικοακουστικών συστημάτων για μηχανοκίνητα
        οχήματα
      description: Λειτουργίες ενσωμάτωσης smartphone και οχήματος που υποστηρίζονται
        από την κεντρική μονάδα (π.χ. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Εφαρμογή/θέση λαμπτήρα μηχανοκίνητου οχήματος
      description: Καθορίζει την προβλεπόμενη θέση φωτισμού του οχήματος ή τη λειτουργία
        για την οποία έχει σχεδιαστεί ο λαμπτήρας (π.χ., μεσαία σκάλα, φως φρένων).
    motor_vehicle_bulb_approval_standard:
      name: Πρότυπο έγκρισης λαμπτήρων μηχανοκίνητων οχημάτων
      description: Υποδεικνύει κανονιστική συμμόρφωση/σήμανση έγκρισης για οδική χρήση
        στην αγορά-στόχο.
    motor_vehicle_oxygen_sensor_bank:
      name: Πίνακας αισθητήρα οξυγόνου σε μηχανοκίνητο όχημα
      description: Υποδεικνύει σε ποια συστοιχία κυλίνδρων του κινητήρα ταιριάζει
        ο αισθητήρας οξυγόνου (π.χ. Συστοιχία 1 έναντι Συστοιχίας 2) για κινητήρες
        τύπου V/διάταξης boxer. Η επιλογή «Δεν ισχύει» χρησιμοποιείται για κινητήρες
        σε σειρά.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Αριθμός καλωδίων αισθητήρα οξυγόνου μηχανοκίνητου οχήματος
      description: Αριθμός καλωδίων στην καλωδίωση του αισθητήρα οξυγόνου.
    motor_vehicle_oxygen_sensor_position:
      name: Θέση αισθητήρα οξυγόνου μηχανοκίνητου οχήματος
      description: Καθορίζει τη θέση εγκατάστασης του αισθητήρα οξυγόνου (O2) στο
        σύστημα εξάτμισης σε σχέση με τον καταλυτικό μετατροπέα.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Αριθμός αισθητήρα οξυγόνου μηχανοκίνητου οχήματος
      description: Υποδεικνύει τον αριθμό του αισθητήρα (π.χ., Αισθητήρας 1 ή Αισθητήρας
        2) εντός μιας δεδομένης ονομασίας σειράς/θέσης.
    motor_vehicle_oxygen_sensor_type:
      name: Τύπος αισθητήρα οξυγόνου σε μηχανοκίνητο όχημα
      description: Καθορίζει τον σχεδιασμό/τεχνολογία του αισθητήρα οξυγόνου.
    motor_vehicle_paint_application_method:
      name: Μέθοδος εφαρμογής βαφής μηχανοκίνητων οχημάτων
      description: Πώς προορίζεται να εφαρμοστεί το χρώμα στην επιφάνεια του οχήματος.
    motor_vehicle_paint_system_step:
      name: Βήμα συστήματος βαφής μηχανοκίνητου οχήματος
      description: Υποδεικνύει για ποιο βήμα ή εξάρτημα ενός συστήματος βαφής φινιρίσματος
        αυτοκινήτου προορίζεται το προϊόν (π.χ., αστάρι, βασική επίστρωση, διαφανές
        χρώμα).
    motor_vehicle_speaker_mounting_type:
      name: Τύπος τοποθέτησης ηχείου μηχανοκίνητου οχήματος
      description: Πώς προορίζεται να εγκατασταθεί το ηχείο στο όχημα (συντελεστής
        μορφής τοποθέτησης).
    motor_vehicle_subwoofer_size:
      name: Μέγεθος subwoofer σε μηχανοκίνητο όχημα
      description: Ονομαστική διάμετρος οδηγού υπογούφερ (π.χ., 8 ίντσες, 10 ίντσες,
        12 ίντσες), που χρησιμοποιείται για να ταιριάζει με τον χώρο του οχήματος
        και τη συμβατότητα του περιβλήματος.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Διαμόρφωση πηνίου φωνής υπογούφερ μηχανοκίνητου οχήματος
      description: Αριθμός/διαμόρφωση πηνίων φωνής που χρησιμοποιείται για την αντιστοίχιση
        επιλογών καλωδίωσης ενισχυτή (π.χ., SVC έναντι DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Σύνθετη αντίσταση πηνίου φωνής υπογούφερ μηχανοκίνητου οχήματος (ανά πηνίο)
      description: Ονομαστική σύνθετη αντίσταση κάθε πηνίου φωνής (όχι τελικό φορτίο
        καλωδίωσης), που χρησιμοποιείται για τους υπολογισμούς καλωδίωσης.
    motor_vehicle_voltage_regulator_type:
      name: Τύπος ρυθμιστή τάσης μηχανοκίνητου οχήματος
      description: Υποδεικνύει την τεχνολογία/μορφή του ρυθμιστή που χρησιμοποιείται
        στα μηχανοκίνητα οχήματα.
    motorcycle_armor_certification_standard:
      name: Πρότυπο πιστοποίησης προστατευτικής θωράκισης μοτοσικλέτας
      description: Υποδεικνύει το(τα) επίσημο(-α) πρότυπο(-α) ασφαλείας που έχει(έχουν)
        πιστοποιηθεί ότι πληροί το προστατευτικό (π.χ. EN 1621-2 για προστατευτικά
        πλάτης, EN 1621-3 για προστατευτικά στήθους).
    motorcycle_cover_size_class:
      name: Κατηγορία μεγέθους καλύμματος μοτοσυκλέτας
      description: Τυποποιημένη κατηγορία μεγέθους για καλύμματα αποθήκευσης μοτοσικλέτας,
        με βάση την τυπική κατηγορία/εύρος μήκους μοτοσικλέτας στην οποία ταιριάζει.
    motorcycle_glove_certification_standard:
      name: Πρότυπο πιστοποίησης γαντιών μοτοσικλέτας
      description: Καθορίζει την πιστοποίηση/πρότυπο προστασίας με την οποία συμμορφώνονται
        τα γάντια (π.χ. επίπεδα EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Γάντι μοτοσικλέτας αδιάβροχης κατασκευής
      description: Καθορίζει τον τύπο της μεθόδου στεγανοποίησης που χρησιμοποιείται
        στο γάντι (εάν υπάρχει).
    motorcycle_guard_coverage_area:
      name: Περιοχή κάλυψης προστατευτικού μοτοσικλέτας
      description: Η κύρια περιοχή κάλυψης που παρέχεται από το προϊόν (αγκώνας, καρπός,
        αντιβράχιο, συνδυασμός).
    motorcycle_kidney_belt_construction_type:
      name: Τύπος κατασκευής ιμάντα νεφρού μοτοσικλέτας
      description: Στυλ κατασκευής της ζώνης νεφρού που επηρεάζει την ακαμψία, τη
        ροή του αέρα και την προστασία.
    motorcycle_kidney_belt_purpose:
      name: Σκοπός της ζώνης νεφρού μοτοσικλέτας
      description: Προσδιορίζει το κύριο στυλ ή σενάριο οδήγησης για το οποίο έχει
        σχεδιαστεί η ζώνη νεφρού της μοτοσικλέτας.
    motorcycle_luggage_capacity_class:
      name: Κατηγορία χωρητικότητας αποσκευών μοτοσικλέτας
      description: Υποδεικνύει την χωρητικότητα των αποσκευών της μοτοσικλέτας, εκφρασμένη
        σε λίτρα.
    motorcycle_luggage_mounting_system:
      name: Σύστημα στήριξης αποσκευών μοτοσικλέτας
      description: Σύστημα σύνδεσης/στερέωσης που χρησιμοποιείται για τη στερέωση
        της τσάντας/πλαϊνού σάκου στη μοτοσικλέτα (π.χ. ιμάντες ρίψης, σύστημα γρήγορης
        απελευθέρωσης τοποθετημένο σε σχάρα).
    motorcycle_luggage_side:
      name: Πλευρά αποσκευής μοτοσικλέτας
      description: Για πλαϊνούς σάκους/δισάκια, υποδεικνύει εάν το κομμάτι είναι για
        την αριστερή πλευρά, τη δεξιά πλευρά ή είναι ζευγάρι/σετ.
    motorcycle_protective_gear_size_system:
      name: Σύστημα μεγέθους προστατευτικού εξοπλισμού μοτοσυκλέτας
      description: Υποδεικνύει το σύστημα μεγεθών που χρησιμοποιείται στο προϊόν (π.χ.
        αλφαβητικό μέγεθος, αριθμητικό, ένα μέγεθος).
    motorcycle_rack_carrier_style:
      name: Τύπος σχάρας μοτοσικλέτας
      description: Περιγράφει το λειτουργικό στυλ μεταφοράς για τη μεταφορά μιας μοτοσικλέτας
        ή ενός σκούτερ (πλατφόρμα έναντι ράγας έναντι υποβοηθούμενης ανύψωσης, κ.λπ.).
    motorcycle_riding_discipline:
      name: Κατηγορία οδήγησης μοτοσικλέτας
      description: Καθορίζει την κύρια κατηγορία οδήγησης/χρήσης για την οποία έχει
        σχεδιαστεί το κολάρο αυχένα.
    motorcycle_tire_speed_rating:
      name: Βαθμολογία ταχύτητας ελαστικών μοτοσικλέτας
      description: Προσδιορίζει τη μέγιστη διατηρούμενη ταχύτητα για την οποία έχει
        ονομαστική τιμή το ελαστικό, χρησιμοποιώντας τον τυπικό κωδικό γραμμάτων (π.χ,
        H, V, W).
    motorsport_window_net_certification:
      name: Πιστοποίηση διχτυού παραθύρων μηχανοκίνητου αθλητισμού
      description: Πιστοποίηση ή έγκριση τύπου για την ασφάλεια αγώνων που πληροί
        το δίχτυ παραθύρου (π.χ. SFI ή FIA), συμπεριλαμβανομένου του αριθμού προδιαγραφών,
        όπου ισχύει.
    mound_usage_type:
      name: Τύπος χρήσης αναχώματος
      description: Προσδιορίζει το προβλεπόμενο περιβάλλον εφαρμογής του αναχώματος,
        όπως Προπόνηση, Παιχνίδι, Bullpen ή Πολλαπλών χρήσεων.
    mount_attachment_method:
      name: Μέθοδος στερέωσης της βάσης
      description: Καθορίζει τον τρόπο με τον οποίο η βάση στερεώνεται στην επιφάνεια/δομή
        του οχήματος.
    mountainboard_truck_type:
      name: Τύπος άξονα Mountainboard
      description: Ταξινομεί το στυλ των αξόνων που περιλαμβάνονται στη σανίδα, επηρεάζοντας
        την απόκριση στις στροφές και την ανθεκτικότητα.
    mounting_attachment_method:
      name: Μέθοδος τοποθέτησης/σύνδεσης
      description: Πώς έχει σχεδιαστεί η θήκη/τσάντα για να προσαρτάται σε τύμπανο,
        βάση, ζώνη ή άλλη επιφάνεια.
    mounting_attachment_type:
      name: Τύπος τοποθέτησης/προσάρτησης
      description: Πώς το εξάρτημα αναλογίας συνδέεται ή διασυνδέεται με τον τροχό
        περιστροφής.
    mounting_hardware_included_for_installation:
      name: Περιλαμβάνεται υλικός εξοπλισμός τοποθέτησης (για εγκατάσταση)
      description: Υποδεικνύει εάν το υλικό τοποθέτησης που απαιτείται για την τοποθέτηση
        του πίσω καθίσματος (π.χ. βραχίονες, μπουλόνια, ράγες) περιλαμβάνεται στο
        προϊόν.
    mounting_location:
      name: Θέση τοποθέτησης
      description: Καθορίζει την προβλεπόμενη περιοχή τοποθέτησης στον εξοπλισμό ή
        στο σώμα για το φως/ανακλαστήρα (π.χ. μπροστινό πιρούνι, κράνος, ακτίνες τροχού).
    mounting_method:
      name: Μέθοδος τοποθέτησης
      description: Πώς τοποθετείται ή προσαρτάται μια βάση ραβδιού/βούρτσας (π.χ.
        με σφίξιμο, με λουράκι, με αυτοκόλλητο).
    mounting_position:
      name: Θέση τοποθέτησης
      description: Καθορίζει πού προορίζεται να τοποθετηθεί/εγκατασταθεί το χειριστήριο
        χειρόφρενου στην καμπίνα του οχήματος.
    mounting_rail_type:
      name: Τύπος ράγας στήριξης
      description: Καθορίζει το πρότυπο ράγας ή διεπαφής στο οποίο συνδέεται το εξάρτημα,
        όπως Picatinny ή M-LOK.
    mounting_receiver_size:
      name: Μέγεθος υποδοχής στήριξης
      description: Το απαιτούμενο μέγεθος της υποδοχής του κοτσαδόρου για σχάρες αποσκευών
        που προσαρτώνται σε κοτσαδόρο.
    mounting_storage_type:
      name: Τύπος τοποθέτησης/αποθήκευσης
      description: Πώς η συσκευή προορίζεται να τοποθετηθεί ή να φυλάσσεται στο σκάφος/άτομο.
    mouth_grip_type:
      name: Τύπος λαβής στομίου
      description: Περιγράφει τον τύπο λαβής ή προστατευτικού στομίου της σφυρίχτρας
        για άνεση και υγιεινή.
    mouthguard_mold_type:
      name: Τύπος καλουπιού προστατευτικού στόματος
      description: Περιγράφει τον τρόπο εφαρμογής του προστατευτικού στόματος (νάρθηκας)
        στα δόντια του αθλητή (π.χ. τύπου Boil-and-bite, εξατομικευμένη οδοντική εφαρμογή).
    mouthpiece_facing_length:
      name: Μήκος επιφάνειας επιστομίου
      description: Υποδεικνύει την κατηγορία μήκους της καμπύλης που βλέπει το επιστόμιο
        (lay) (όχι το συνολικό μήκος του επιστομίου), η οποία επηρεάζει την απόκριση,
        την αντίσταση και τη συμβατότητα με τα καλάμια.
    mouthpiece_material:
      name: Υλικό επιστομίου
      description: Καθορίζει το υλικό του επιστομίου/τμήματος άκρης επαφής με το στόμα
        σε μία σφυρίχτρα πάρτι, το οποίο μπορεί να διαφέρει από το υλικό του κύριου
        σώματος.
    mouthpiece_shank_receiver_size:
      name: Μέγεθος ακροφυσίου/δέκτη
      description: Καθορίζει το πρότυπο υποδοχής/στελέχους επιστομίου που είναι συμβατό
        με το φλίγκελχορν (flugelhorn).
    mouthpiece_shank_size:
      name: Μέγεθος στελέχους επιστομίου
      description: Καθορίζει το πρότυπο εφαρμογής του στελέχους/δέκτη του επιστομίου
        για να διασφαλιστεί η συμβατότητα με το προβλεπόμενο χάλκινο όργανο.
    mouthpiece_shank_type:
      name: Τύπος κορμού επιστομίου
      description: Καθορίζει το πρότυπο υποδοχής/στελέχους επιστομίου για συμβατότητα
        (όπου ισχύει).
    mouthpiece_style:
      name: Στυλ επιστομίου
      description: Ταξινομεί το σχέδιο/σχήμα του τμήματος του στομίου του χαλινού
        (κουρμπάς), το οποίο επηρεάζει τα σημεία πίεσης, την ένταση και την προτίμηση
        του αλόγου.
    mouthpiece_type:
      name: Τύπος επιστομίου
      description: Τύπος επιστομίου στο άκρο εμφύσησης (ενσωματωμένο, αφαιρούμενο
        ή πρόσθετο).
    movement_mechanism:
      name: Μηχανισμός κίνησης
      description: Ορίζει τον τρόπο με τον οποίο κινείται ο πάγκος κατά τη χρήση (αιώρηση,
        ολίσθηση, κούνημα, κ.λπ.).
    muffin_size:
      name: Μέγεθος μάφιν
      description: Ταξινομεί την κατηγορία φυσικού μεγέθους του μάφιν (π.χ. μίνι,
        κανονικό, τζάμπο).
    mushroom_variety:
      name: Ποικιλία μανιταριών
      description: Προσδιορίζει το συγκεκριμένο είδος ή ποικιλία μανιταριού ή τρούφας
        που περιέχεται στο προϊόν (π.χ. Shiitake, King Oyster, Black Truffle).
    music_stand_desk_tilt_adjustment:
      name: Ρύθμιση κλίσης αναλογίου βάσης μουσικής
      description: Υποδεικνύει αν και πώς μπορεί να ρυθμιστεί η γωνία του γραφείου.
    music_stand_intended_use:
      name: Προβλεπόμενη χρήση βάσης μουσικής
      description: Υποδεικνύει το κύριο προβλεπόμενο περιβάλλον/σενάριο χρήσης για
        τη βάση.
    musical_block_pitch_type:
      name: Τύπος τονικότητας μουσικού μπλοκ
      description: Περιγράφει εάν το μουσικό μπλοκ παράγει καθορισμένη τονικότητα
        (κουρδισμένη) ή αόριστη τονικότητα.
    musical_box_mechanism_type:
      name: Τύπος μηχανισμού μουσικού κουτιού
      description: Ο τρόπος με τον οποίο το μουσικό κουτί παράγει/αναπαράγει ήχο (π.χ.
        κουρδιστός μηχανισμός έναντι ηλεκτρονικής αναπαραγωγής).
    musical_keyboard_case_fit_type:
      name: Τύπος εφαρμογής θήκης μουσικού πληκτρολογίου
      description: Περιγράφει τον τρόπο με τον οποίο το μέγεθος της θήκης προσαρμόζεται
        στο όργανο (π.χ. γενικό εύρος μεγεθών έναντι θήκης για συγκεκριμένο μοντέλο/ειδικής
        σχεδίασης).
    musical_ratchet_sound_character:
      name: Μουσικός χαρακτήρας ήχου καστάνιας
      description: Γενική περιγραφή του χαρακτήρα της χροιάς/έντασης της καστάνιας.
    musical_scraper_groove_surface_material:
      name: Υλικό ανάγλυφης επιφάνειας μουσικού ξύστρου
      description: Καθορίζει το υλικό της ραβδωτής/αυλακωτής επιφάνειας τριβής (μπορεί
        να διαφέρει από το υλικό του σώματος).
    musical_scraper_type:
      name: Τύπος μουσικού ξύστρου
      description: Καθορίζει το στυλ/σχέδιο του μουσικού ξύστρου (π.χ. γκίρο έναντι
        ρέκο-ρέκο), το οποίο επηρεάζει τον ήχο και την τεχνική παιξίματος.
    mute_attachment_method:
      name: Μέθοδος στερέωσης του σιγαστήρα
      description: Καθορίζει τον τρόπο με τον οποίο ένας σιγαστήρας πιατιού (cymbal
        mute) συνδέεται ή συγκρατείται στη θέση του πάνω στο πιάτο (π.χ. τζελ, στατική
        έλξη, μαγνήτης, κλιπ).
    mute_attenuation_level:
      name: Επίπεδο εξασθένησης σιγαστήρα
      description: Υποδεικνύει πόσο ο σιγαστήρας μειώνει την αντιληπτή ένταση του
        ήχου, κάτι που είναι ιδιαίτερα σημαντικό για σιγαστήρες μελέτης/εξάσκησης.
    mute_cork_padding_material:
      name: Υλικό φελλού/επένδυσης σιγαστήρα
      description: Καθορίζει το υλικό του εσωτερικού περιθώριο επαφής του σιγαστήρα
        (π.χ. λωρίδα/μαξιλαράκια από φελλό) που χρησιμοποιείται για καλό κράτημα/εφαρμογή
        και για την προστασία της καμπάνας (του οργάνου).
    mute_coverage_type:
      name: Τύπος κάλυψης σιγαστήρα
      description: Υποδεικνύει το στυλ/την κάλυψη του σιγαστήρα στην επιφάνεια παιξίματος,
        από μικρούς αποσβεστήρες σημείων έως σιγαστήρες πλήρους επιφάνειας για εξάσκηση.
    mute_finish:
      name: Φινίρισμα σιγαστήρα
      description: Φινίρισμα της επιφάνειας του σιγαστήρα που μπορεί να επηρεάσει
        την ανθεκτικότητα και την αισθητική (π.χ., γυαλισμένο ή σατινέ).
    name_label_text_template:
      name: Πρότυπο κειμένου ετικέτας ονόματος
      description: Καθορίζει το προκαθορισμένο κείμενο ή πρότυπο που εκτυπώνεται στην
        ετικέτα ονόματος (π.χ., 'Ανήκει σε', 'Κατασκευάστηκε από').
    napkin_ply:
      name: Φύλλο χαρτοπετσέτας
      description: Υποδεικνύει το πάχος της χαρτοπετσέτας κοκτέιλ με βάση τον αριθμό
        των στρώσεων (φύλλων).
    neck_brace_fit_system:
      name: Σύστημα εφαρμογής αυχενικού νάρθηκα
      description: Υποδεικνύει την κύρια μέθοδο που χρησιμοποιείται για τη ρύθμιση
        και τη στερέωση του νάρθηκα λαιμού στον αναβάτη.
    neck_brace_size_basis:
      name: Βάση μεγέθους νάρθηκα λαιμού
      description: Υποδεικνύει τη βάση μεγέθους που χρησιμοποιείται για την επιλογή
        του σωστού μεγέθους νάρθηκα λαιμού.
    neck_configuration:
      name: Διαμόρφωση αυχένα
      description: Καθορίζει το στυλ/διαμόρφωση λαιμού. Supply με το σαξόφωνο, το
        οποίο επηρεάζει την εργονομία και την παικτικότητα.
    neck_coverage_type:
      name: Τύπος κάλυψης αυχένα
      description: Καθορίζει το στυλ κάλυψης του λαιμού Supply μαζί με την κουβέρτα.
    neck_support_size_system:
      name: Σύστημα μεγέθους υποστήριξης λαιμού
      description: Υποδεικνύει το σύστημα μεγέθους, που χρησιμοποιείται για την αγωνιστική
        υποστήριξη/νάρθηκα λαιμού (π.χ., ενήλικες, νέοι ή ένα μέγεθος).
    necklace_length_type:
      name: Τύπος μήκους κολιέ
      description: Καθορίζει την κατηγορία μήκους του συμβατικού κολιέ, όπως τσόκερ
        ή όπερα, για να βοηθήσει στην αγορά με βάση το στυλ.
    needle_balance_zone:
      name: Ζώνη υπολειπόμενης βελόνας
      description: Υποδεικνύει τη μαγνητική ζώνη ισορροπίας ή το ημισφαίριο για το
        οποίο έχει ρυθμιστεί η βελόνα της πυξίδας, εξασφαλίζοντας ακριβείς μετρήσεις
        παγκοσμίως.
    needle_case_format:
      name: Μορφή θήκης βελόνας
      description: Συνολικός παράγοντας μορφής οργανωτή της θήκης βελόνας.
    needle_damping_type:
      name: Τύπος απόσβεσης βελόνας
      description: Περιγράφει τον τρόπο σταθεροποίησης της βελόνας της πυξίδας (π.χ.,
        γεμάτη με υγρό, στεγνή ή ηλεκτρονικά σταθεροποιημένη), επηρεάζοντας τον χρόνο
        καθίζησης και την ανθεκτικότητα.
    needle_felting_needle_profile:
      name: Προφίλ βελόνας για πλέξιμο με βελόνα
      description: Διατομή/προφίλ βελόνας πέλματος που επηρεάζει τον τρόπο με τον
        οποίο κινούνται οι ίνες και το φινίρισμα που παράγεται.
    needle_holder_features:
      name: Χαρακτηριστικά θήκης βελόνας
      description: Σημαντικά λειτουργικά χαρακτηριστικά της θήκης βελόνας
    needle_holder_mounting_attachment_method:
      name: Μέθοδος τοποθέτησης/σύνδεσης της θήκης βελόνας
      description: Πώς προορίζεται να τοποθετηθεί ή να χρησιμοποιηθεί η θήκη βελόνας
        κατά την αποθήκευση (π.χ. μαγνητική, κλιπ, ιμάντας).
    needle_holder_style:
      name: Στυλ θήκης βελόνας
      description: Το φυσικό στυλ/σχεδιασμός αποθήκευσης ή μεταφοράς της θήκης βελόνας.
    needle_pushing_surface_type:
      name: Τύπος επιφάνειας ώθησης βελόνας
      description: Ο τύπος/σχέδιο της επιφάνειας ώθησης της βελόνας στην παλάμη ραψίματος
        (π.χ. μεταλλικό λακκάκι, νόμισμα ή ενισχυμένο τμήμα).
    needle_requirement_beading_pattern:
      name: Απαιτούμενη βελόνα (σχέδιο με χάντρες)
      description: Τύπος/μέγεθος βελόνας που συνιστάται από το σχέδιο.
    needle_size_system:
      name: Σύστημα μεγέθους βελόνας
      description: Πρότυπο μεγέθους που χρησιμοποιείται για επισήμανση μεγέθους βελόνας
    needle_threader_compatible_needle_type:
      name: Τύπος βελόνας συμβατός με περαστή κλωστής βελόνας
      description: Καθορίζει τους τύπους βελονών με τους οποίους έχει σχεδιαστεί να
        λειτουργεί το περαστικό κλωστής (ανά κατηγορία/χρήση βελόνας).
    needle_threader_mechanism_type:
      name: Τύπος μηχανισμού περάσματος βελόνας
      description: Περιγράφει πώς το περαστικό κλωστής πιάνει/τραβάει τη κλωστή μέσα
        από την τρύπα της βελόνας.
    needle_threader_packaging_type:
      name: Τύπος συσκευασίας για περαστή κλωστής στη βελόνα
      description: Πώς πωλείται/συσκευάζεται το προϊόν (μονή συσκευασία έναντι πολυσυσκευασίας
        έναντι σετ).
    needlecraft_fabric_color_family:
      name: Οικογένεια υφασμάτων Needlecraft
      description: Ομαλοποιημένη οικογένεια χρωμάτων για ύφασμα ομοιόμορφης ύφανσης
        (χρησιμοποιείται σε συνδυασμό με το «Χρώμα» για την ομαδοποίηση).
    needlecraft_fabric_composition:
      name: Σύνθεση υφάσματος κεντήματος
      description: Καθορίζει τη σύνθεση/μείγμα ινών του υφάσματος κεντήματος (π.χ.,
        100% βαμβάκι, μείγμα λινού/βαμβακιού).
    needlecraft_fabric_weave_type:
      name: Τύπος ύφανσης υφάσματος κεντήματος
      description: Καθορίζει την ύφανση/κατασκευή του λινού κεντήματος (π.χ. ομοιόμορφη
        ύφανση έναντι παραδοσιακού λινού), επηρεάζοντας τη συμπεριφορά και την εμφάνιση
        της βελονιάς.
    needlecraft_kit_items_included:
      name: Περιλαμβάνονται αντικείμενα του κιτ χειροτεχνίας
      description: Παραθέτει τα κύρια εξαρτήματα που περιλαμβάνονται στο κιτ κεντήματος
        (εργαλεία και αναλώσιμα).
    needlecraft_kit_project_type:
      name: Τύπος έργου κιτ κεντήματος
      description: Προσδιορίζει τι τελικό αποτέλεσμα παράγει το κιτ (το αποτέλεσμα
        του έργου).
    needlecraft_stitching_coverage:
      name: Κάλυψη ραφής με βελονάκι
      description: Υποδεικνύει εάν το ύφασμα είναι ραμμένο σε 1 νήμα/τετράγωνο ή σε
        2 νήματα (κοινό για ομοιόμορφη ύφανση και λινό).
    needlepoint_canvas_mesh_count:
      name: Πυκνότητα πλέγματος σε καμβά κεντήματος
      description: Το προβλεπόμενο πλέγμα/πυκνότητα του καμβά (νήματα ανά ίντσα) για
        το οποίο έχει σχεδιαστεί το σχέδιο (κοινώς αποκαλούμενο πυκνότητα καμβά).
    needlepoint_frame_canvas_attachment_method:
      name: Μέθοδος στερέωσης καμβά σε πλαίσιο κεντήματος
      description: Περιγράφει τον τρόπο με τον οποίο στερεώνεται ο καμβάς κεντήματος
        στο πλαίσιο κεντήματος.
    needlepoint_frame_compatible_stand_type:
      name: Βάση συμβατή με πλαίσιο για κεντήματα
      description: Εάν το πλαίσιο έχει σχεδιαστεί για τοποθέτηση σε βάση, αναφέρετε
        τον τύπο ή τους τύπους βάσεων με τους οποίους είναι συμβατό.
    needlepoint_frame_contents:
      name: Περιεχόμενα πλαισίου κεντήματος
      description: Αναφέρει ποια εξαρτήματα και αξεσουάρ περιλαμβάνονται στο σετ πλαισίου
        για κεντήματα (π.χ. πλαίσιο, επιπλέον ράβδοι, καρφίτσες, ταινίες συγκράτησης,
        τσάντα μεταφοράς).
    needlepoint_frame_tension_adjustment_type:
      name: Τύπος προσαρμογής τάσης του πλαισίου κεντήματος
      description: Δείχνει πώς (ή αν) μπορεί να ρυθμιστεί η ένταση του πλαισίου κατά
        τη χρήση.
    needlepoint_pattern_chart_format:
      name: Μορφή διαγράμματος μοτίβου βελόνας
      description: Πώς απεικονίζεται το σχέδιο κεντήματος για την εκτέλεση του έργου
        (σε διάγραμμα ή σε τυπωμένο/ζωγραφισμένο οδηγό).
    needlepoint_project_type:
      name: Τύπος έργου κεντήματος
      description: Η προβλεπόμενη τελική κατηγορία/κομμάτι για την οποία προορίζεται
        το σχέδιο με βελονιά.
    net_design:
      name: Σχεδιασμός δικτύου
      description: Προσδιορίζει τον τύπο κατασκευής του διχτυού, αναφέροντας αν μπορεί
        να συρρικνωθεί ή να διπλωθεί για ευκολότερη μεταφορά.
    net_mesh_pattern:
      name: Μοτίβο πλέγματος δικτύου
      description: Καθορίζει το γεωμετρικό σχήμα των ανοιγμάτων του πλέγματος, το
        οποίο μπορεί να επηρεάσει την ορατότητα και την αντοχή.
    net_twine_gauge:
      name: Μετρητής καθαρού νήματος
      description: Δείχνει το πάχος του νήματος ή την αντοχή του διχτυού, που παραδοσιακά
        εκφράζεται με έναν αριθμό διαμέτρου (π.χ. 18, 36).
    nicotine_source:
      name: Πηγή νικοτίνης
      description: Δείχνει αν η νικοτίνη που περιέχει το προϊόν προέρχεται από καπνό,
        είναι συνθετική ή αν το προϊόν δεν περιέχει νικοτίνη.
    nipple_drive_interface:
      name: Διεπαφή κίνησης μέσω θηλής
      description: Προσδιορίζει τον τύπο/πρότυπο της διεπαφής κίνησης ή της κεφαλής
        της ακίδας (εξωτερική ή εσωτερική), καθορίζοντας το απαιτούμενο εργαλείο και
        τη μέθοδο συναρμολόγησης του τροχού.
    nock_activation_method:
      name: Μέθοδος ενεργοποίησης του ακροφυσίου
      description: Καθορίζει τον μηχανισμό με τον οποίο ενεργοποιείται ή απενεργοποιείται
        το LED της φωτιζόμενης άκρης του βέλους (π.χ. πίεση της χορδής, αισθητήρας
        κίνησης, χειροκίνητος διακόπτης).
    nock_fitment_code:
      name: Κωδικός τοποθέτησης βέλους
      description: Κωδικός κατασκευαστή ή κλάδου που προσδιορίζει την οικογένεια/σειρά
        βέλων στην οποία ανήκει.
    nock_throat_size:
      name: Διάμετρος λαιμού βέλους
      description: Καθορίζει το μέγεθος της εσοχής (αυλάκι) που κουμπώνει στη χορδή
        του τόξου.
    nock_transparency_level:
      name: Επίπεδο διαφάνειας nock
      description: Περιγράφει το βαθμό διαφάνειας του υλικού της εγκοπής —διαφανές,
        ημιδιαφανές, αδιαφανές ή φωσφορίζον στο σκοτάδι— και πώς αυτό επηρεάζει την
        ορατότητα και την αισθητική.
    nock_type:
      name: Τύπος εγκοπής
      description: Καθορίζει το σχέδιο της εγκοπής που χρησιμοποιείται σε ένα βέλος
        ή βέλος τόξου, όπως τύπου πείρου, ημισελήνου ή φωτιζόμενο.
    noise_reduction_type:
      name: Τύπος μείωσης θορύβου
      description: Αναφέρει την τεχνολογία μείωσης θορύβου που χρησιμοποιείται (ή
        δεν χρησιμοποιείται) στα ενσωματωμένα ακουστικά του κράνους, εφόσον υπάρχουν.
    noise_suppression_technology:
      name: Τεχνολογία καταστολής θορύβου
      description: Καθορίζει αν το προϊόν χρησιμοποιεί παθητική απόσβεση ή ενεργό
        ηλεκτρονικό κύκλωμα που μειώνει την ένταση των δυνατών ήχων και/ή ενισχύει
        τους ήχους του περιβάλλοντος.
    non_slip_base_features:
      name: Χαρακτηριστικά αντιολισθητικής βάσης
      description: Υποδηλώνει τα αντιολισθητικά χαρακτηριστικά που περιλαμβάνονται,
        ώστε να αποτρέπεται η μετακίνηση του πεντάλ κατά τη διάρκεια της εκτέλεσης.
    nose_bridge_type:
      name: Τύπος γέφυρας μύτης
      description: Δείχνει το σχήμα της γέφυρας της μύτης, το οποίο επηρεάζει την
        εφαρμογή σε διαφορετικά μεγέθη προσώπου.
    nose_clip_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ κλιπ μύτης
      description: Αναφέρει τυχόν πρόσθετα εξαρτήματα που παρέχονται μαζί με το κλιπ
        μύτης για κολύμβηση (π.χ. ωτοασπίδες, θήκη αποθήκευσης).
    nose_clip_features:
      name: Χαρακτηριστικά του κλιπ μύτης
      description: Επισημαίνει τα γενικά χαρακτηριστικά λειτουργικότητας ή άνεσης
        του κλιπ μύτης.
    nose_coverage_style:
      name: Στυλ κάλυψης μύτης
      description: Δείχνει την ύπαρξη και τον τύπο του προστατευτικού καλύμματος για
        τη μύτη ή το ρύγχος στη μάσκα για μύγες.
    noseband_type:
      name: Τύπος ιμάντα ρύγχους
      description: Προσδιορίζει το σχέδιο του ιμάντα μύτης (εάν υπάρχει) που παρέχεται
        μαζί με το χαλινάρι.
    number_of_canvas_meshes:
      name: Αριθμός πλεγμάτων καμβά
      description: Το μέγεθος των ματιών του πλαστικού καμβά, που εκφράζεται σε τρύπες
        ανά ίντσα (HPI) ή σε αριθμό, το οποίο καθορίζει το μέγεθος της βελονιάς και
        τη λεπτομέρεια του έργου.
    number_of_chainrings:
      name: Αριθμός γραναζιών
      description: Δείχνει πόσα γρανάζια έχει σχεδιαστεί να δέχεται ο στροφαλοφόρος
        άξονας ή με πόσα παρέχεται.
    number_of_control_stations:
      name: Αριθμός σταθμών ελέγχου
      description: Δείχνει τον αριθμό των σταθμών πηδαλιουχίας/ελέγχου που υποστηρίζει
        το σύστημα ελέγχου (μονός σταθμός έναντι διπλού σταθμού κ.λπ.).
    number_of_digits:
      name: Αριθμός ψηφίων
      description: Πόσα ψηφία εμφανίζει ο μετρητής (π.χ. 1 ψηφίο, 2 ψηφία, 3 ψηφία).
    number_of_guitar_slots:
      name: Αριθμός θέσεων για κιθάρες
      description: Δείχνει πόσες κιθάρες μπορεί να χωρέσει η θήκη ή η τσάντα μεταφοράς.
    number_of_needlecraft_fabrics:
      name: Αριθμός υφασμάτων κεντήματος
      description: Καθορίζει τον αριθμό υφασμάτων για καμβά/ύφασμα κεντήματος, που
        συνήθως εκφράζεται ως τετράγωνα/νήμα ανά ίντσα (π.χ., 14-τετράγωνα).
    number_of_plastic_canvas_meshes:
      name: Αριθμός πλαστικών πλεγμάτων καμβά
      description: Καθορίζει τον αριθμό των ματιών του πλαστικού καμβά (τρύπες ανά
        ίντσα), ο οποίος καθορίζει το μέγεθος της βελονιάς και το επίπεδο λεπτομέρειας
        του έργου.
    number_of_quilting_frame_rails:
      name: Αριθμός σκελών του πλαισίου κεντήματος
      description: Αριθμός σιδηροτροχιών/ροδών που περιλαμβάνονται στο πλαίσιο κεντήματος
        (π.χ. συστήματα με 2 σιδηροτροχιές έναντι συστημάτων με 3 σιδηροτροχιές).
    number_of_rope_slots:
      name: Αριθμός υποδοχών για σχοινιά
      description: Δείχνει αν η συσκευή ασφάλισης έχει σχεδιαστεί για χρήση με μονό
        ή διπλό σχοινί.
    number_of_switch_poles:
      name: Αριθμός πόλων του διακόπτη
      description: Ο αριθμός των ξεχωριστών κυκλωμάτων (πολών) που ελέγχονται από
        τον διακόπτη (π.χ. SPST, DPST).
    number_of_switch_throws:
      name: Αριθμός στροφών διακόπτη
      description: Ο αριθμός των διαδρομών εξόδου (θέσεων) ανά πόλο (π.χ. SPDT).
    number_of_timing_chain_rows:
      name: Αριθμός σειρών αλυσίδας χρονισμού
      description: Υποδεικνύει εάν η αλυσίδα χρονισμού είναι μονής ή πολλαπλών σειρών.
    number_of_trailer_axles:
      name: Αριθμός αξόνων ρυμουλκούμενου
      description: Αριθμός αξόνων στο ρυμουλκούμενο.
    number_of_wheel_pieces:
      name: Αριθμός κομματιών τροχού
      description: Καθορίζει αν ο τροχός είναι μονομερούς, δημερούς ή τριμερούς κατασκευής.
    numbering_style:
      name: Στυλ αρίθμησης
      description: Υποδεικνύει εάν και πώς οι αριθμοί συμμετοχής είναι προ αριθμημένοι
        για την αναγνώριση της ομάδας (π.χ., χωρίς αρίθμηση, 1-10, προσαρμοσμένοι).
    nunchuck_connector_type:
      name: Τύπος σύνδεσης νουντσάκ
      description: Τύπος σύνδεσης μεταξύ των δύο λαβών του νουντσάκ (π.χ. σχοινί,
        αλυσίδα, περιστρεφόμενη αλυσίδα).
    nursing_access:
      name: Πρόσβαση σε θηλασμό
      description: Αναφέρει τον τρόπο πρόσβασης για θηλασμό που ενσωματώνεται στο
        μαγιό, εφόσον υπάρχει.
    nursing_access_type:
      name: Τύπος πρόσβασης σε θηλασμό
      description: Καθορίζει τον τρόπο με τον οποίο το ένδυμα παρέχει πρόσβαση στο
        στήθος για θηλασμό ή άντληση.
    nut_butter_texture:
      name: Υφή βουτύρου ξηρών καρπών
      description: Περιγράφει τη φυσική υφή του βουτύρου ξηρών καρπών, ώστε ο αγοραστής
        να μπορεί εύκολα να επιλέξει ανάμεσα σε λείο, τραγανό κ.λπ.
    nutrient_fortification:
      name: Εμπλουτισμός με θρεπτικά συστατικά
      description: Προσδιορίζει τα βασικά θρεπτικά συστατικά με τα οποία είναι εμπλουτισμένο
        το ποτό ή το τρόφιμο.
    oak_product_form:
      name: Μορφή προϊόντος από δρυ
      description: Προσδιορίζει τη φυσική μορφή της βελανιδιάς που χρησιμοποιείται
        για την παλαίωση/αρωματισμό.
    oak_toast_level:
      name: Βαθμός καβουρδίσματος δρυός
      description: Καθορίζει το βαθμό καβουρδίσματος των προϊόντων από δρυ.
    oboe_case_capacity:
      name: Χωρητικότητα θήκης όμποε
      description: Δείχνει ποια όργανα και βασικά εξαρτήματα έχει σχεδιαστεί να μεταφέρει
        η θήκη.
    oboe_case_carry_configuration:
      name: Διαμόρφωση μεταφοράς θήκης όμποε
      description: Δείχνει τον κύριο τρόπο μεταφοράς που προσφέρει η θήκη/τσάντα μεταφοράς.
    oboe_case_design:
      name: Σχεδιασμός θήκης όμποε
      description: Κατηγοριοποιεί τη δομή/σκληρότητα μιας θήκης ή ενός σάκου μεταφοράς
        για όμποε (π.χ. σκληρή, ημίσκληρη, μαλακή) προκειμένου να υποδείξει το επίπεδο
        προστασίας.
    oboe_case_internal_fit_type:
      name: Τύπος εσωτερικής εφαρμογής θήκης όμποε
      description: Υποδεικνύει εάν το εσωτερικό είναι διαμορφωμένο για μια συγκεκριμένη
        διαμόρφωση οργάνου ή χρησιμοποιεί ρυθμιζόμενα διαμερίσματα.
    oboe_keywork_plating:
      name: Επιμετάλλωση κλειδιών όμποε
      description: Καθορίζει την επιμετάλλωση/φινίρισμα των κλειδιών του όμποε, ξεχωριστά
        από το υλικό του σώματος.
    oboe_strap_padding:
      name: Επένδυση ιμάντα όμποε
      description: Περιγράφει την ύπαρξη/το είδος της επένδυσης στην περιοχή επαφής
        του ιμάντα/του στηρίγματος για μεγαλύτερη άνεση (π.χ. επένδυση στην περιοχή
        των ώμων/του λαιμού).
    oboe_swab_style:
      name: Στυλ σφουγγαριού για όμποε
      description: Προσδιορίζει τον λειτουργικό τύπο/τη δομή ενός σφουγγαριού καθαρισμού
        για όμποε (π.χ. τύπου "pull-through", με βαρύ μεταξωτό υλικό).
    observation_window_material:
      name: Υλικό παραθύρου παρατήρησης
      description: Καθορίζει το υλικό των πλαισίων προβολής/του παραθύρου (συχνά επηρεάζει
        τη διαύγεια και την ανθεκτικότητα).
    ocarina_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ οκαρίνας
      description: Αξεσουάρ που περιλαμβάνονται μαζί με την οκαρίνα, όπως θήκη, λουράκι
        για το λαιμό ή πίνακας δακτυλισμών.
    ocarina_chamber_count:
      name: Αριθμός θαλάμων οκαρίνας
      description: Δείχνει πόσους θαλάμους έχει η οκαρίνα, κάτι που επηρεάζει το εύρος
        και την πολυπλοκότητα του παιξίματος (μονή/διπλή/τριπλή κ.λπ.).
    ocarina_fingering_system:
      name: Σύστημα παιξίματος οκαρίνας με τα δάκτυλα
      description: Καθορίζει το σύστημα/πρότυπο δακτυλισμού που ακολουθεί η οκαρίνα
        με κρεμαστό στοιχείο (εάν ισχύει).
    ocarina_finish_type:
      name: Τύπος φινιρίσματος οκαρίνας
      description: Το φινίρισμα της επιφάνειας του σώματος της οκαρίνας, που επηρεάζει
        την αίσθηση και την αισθητική.
    occupant_classification_sensor_support:
      name: Υποστήριξη αισθητήρα ταξινόμησης επιβατών
      description: Δείχνει αν το κάθισμα διαθέτει αισθητήρα ταξινόμησης/βάρους επιβατών
        ή αν υπάρχει δυνατότητα μεταφοράς/εγκατάστασης του εργοστασιακού αισθητήρα
        (συνήθως για τα καθίσματα του συνοδηγού).
    octave_harmonica_cover_plate_material:
      name: Υλικό πλακών κάλυψης φυσαρμόνικας οκτάβας
      description: Υλικό κατασκευής των εξωτερικών καλυμμάτων της οκτάβας φυσαρμόνικας.
    octave_harmonica_tuning_system:
      name: Σύστημα κουρδίσματος φυσαρμόνικας οκτάβας
      description: Η κλίμακα που χρησιμοποιείται για την οκτάβα φυσαρμόνικα.
    octoban_mounting_system_type:
      name: Σύστημα στήριξης τύπου Octoban
      description: Πώς τοποθετείται το Octoban κατά τη διάρκεια του παιχνιδιού (τοποθέτηση
        στη βάση στήριξης ή στο στήριγμα).
    odor_control_features:
      name: Χαρακτηριστικά ελέγχου οσμών
      description: Υποδεικνύει εάν το προϊόν παρέχει λειτουργία εξουδετέρωσης/αποσμητικότητας
        οσμών και με ποια προσέγγιση.
    office_furniture_items_included:
      name: Περιλαμβάνονται προϊόντα επίπλωσης γραφείου
      description: Προσδιορίζει τα συγκεκριμένα έπιπλα γραφείου που περιλαμβάνονται
        στο σετ, όπως ένα γραφείο ή ένα ντουλάπι αρχειοθέτησης.
    oil_cooler_core_type:
      name: Τύπος πλέγματος ψυγείου λαδιού
      description: Προσδιορίζει την εσωτερική δομή του ψυγείου λαδιού, η οποία επηρεάζει
        την απόδοση ψύξης, την πτώση πίεσης και την αντοχή.
    oil_cooler_mounting_style:
      name: Τρόπος στερέωσης του ψυγείου λαδιού
      description: Περιγράφει τον τρόπο με τον οποίο πρέπει να τοποθετηθεί/εγκατασταθεί
        ο ψύκτης λαδιού στο όχημα.
    oil_dipstick_component_type:
      name: Τύπος εξαρτήματος δείκτη στάθμης λαδιού
      description: Καθορίζει ποιο εξάρτημα μέτρησης στάθμης λαδιού πωλείται (π.χ.
        μόνο η λάμα/ράβδος του μετρητή στάθμης, μόνο η λαβή, το πλήρες συγκρότημα,
        ο σωλήνας του μετρητή στάθμης κ.λπ.).
    oil_dipstick_measurement_markings:
      name: Σημάδια μέτρησης στη ράβδο μέτρησης λαδιού
      description: Αναφέρει ποιες ενδείξεις/κλίμακα υπάρχουν στη ράβδο μέτρησης για
        την ένδειξη της στάθμης λαδιού.
    oil_dipstick_tube_mounting_type:
      name: Τύπος στήριξης σωλήνα δείκτη στάθμης λαδιού
      description: Περιγράφει τον τρόπο με τον οποίο ο σωλήνας της ράβδου μέτρησης
        στάθμης λαδιού συγκρατείται ή στερεώνεται στον κινητήρα ή στον μπλοκ του κινητήρα.
    oil_drain_plug_head_drive_type:
      name: Τύπος κεφαλής βίδας αποστράγγισης λαδιού
      description: Καθορίζει τη διεπαφή σύσφιξης του εργαλείου στην κεφαλή του βιδιού
        αποστράγγισης λαδιού που χρησιμοποιείται για την τοποθέτηση και την αφαίρεση.
    oil_drain_plug_magnet_type:
      name: Μαγνητικός βίδα αποστράγγισης λαδιού
      description: Δηλώνει αν η βίδα αποστράγγισης είναι μαγνητική και, αν ναι, τι
        τύπου είναι.
    oil_fill_cap_type:
      name: Τύπος καπακιού πλήρωσης λαδιού
      description: Τύπος/μορφή της σύνδεσης του πώματος πλήρωσης λαδιού που χρησιμοποιείται
        στο κάλυμμα της βαλβίδας (εάν υπάρχει).
    oil_filler_cap_attachment_type:
      name: Τύπος σύνδεσης καπακιού πλήρωσης λαδιού
      description: Προσδιορίζει τον τρόπο με τον οποίο το καπάκι πλήρωσης λαδιού συγκρατείται
        στον κινητήρα/στο στόμιο πλήρωσης λαδιού (π.χ. με σπείρωμα, τύπου μπαγιονέτ/στροφής
        ενός τετάρτου, με πίεση).
    oil_filler_cap_installation_position:
      name: Θέση εγκατάστασης του καπακιού πλήρωσης λαδιού
      description: Καθορίζει πού χρησιμοποιείται το καπάκι όταν υπάρχουν πολλά σημεία
        πλήρωσης λαδιού (π.χ. κάλυμμα βαλβίδων, σωλήνας απομακρυσμένης πλήρωσης).
    oil_filler_cap_locking_type:
      name: Τύπος κλειδώματος τάπας πλήρωσης λαδιού
      description: Δηλώνει αν το καπάκι του δοχείου λαδιού είναι χωρίς κλείδωμα ή
        αν χρησιμοποιεί μέθοδο κλειδώματος/ασφαλούς αφαίρεσης (π.χ. με κλειδί ή με
        τη χρήση εργαλείου) για την αποτροπή παραβίασης/κλοπής ή τυχαίου ανοίγματος.
    oil_filler_cap_tether_type:
      name: Τύπος πρόσδεσης τάπας πλήρωσης λαδιού
      description: Αναφέρει αν το καπάκι του δοχείου λαδιού είναι εξοπλισμένο με κορδόνι
        ασφαλείας για την αποφυγή απώλειας και ποιος τύπος κορδονιού χρησιμοποιείται.
    oil_filler_cap_venting_type:
      name: Τύπος εξαερισμού του καπακιού πλήρωσης λαδιού
      description: Καθορίζει αν το καπάκι διαθέτει εξαερισμό και τον μηχανισμό εξαερισμού
        (εάν υπάρχει).
    oil_filter_style:
      name: Στυλ φίλτρου λαδιού
      description: Καθορίζει το σχήμα του φίλτρου λαδιού και τον τρόπο στερέωσης/εγκατάστασης,
        ώστε να είναι συμβατό με τη βάση στήριξης του φίλτρου του κινητήρα.
    oil_pan_baffle_windage_features:
      name: Χαρακτηριστικά του διαφράγματος/του συστήματος μείωσης της τριβής του
        κάρτερ λαδιού
      description: Υποδεικνύει τα εσωτερικά χαρακτηριστικά ελέγχου λαδιού που περιλαμβάνονται
        στο κάρτερ.
    oil_pan_finish_coating:
      name: Φινίρισμα/επικάλυψη λαδόπανου
      description: Περιγράφει το φινίρισμα ή την επίστρωση της επιφάνειας του κάρτερ
        λαδιού (βαμμένο, με ηλεκτροστατική βαφή, επιμεταλλωμένο, ακατέργαστο κ.λπ.).
    oil_pressure_sensor_function_type:
      name: Τύπος λειτουργίας αισθητήρα πίεσης λαδιού
      description: Δείχνει αν το εξάρτημα είναι αισθητήρας πίεσης λαδιού μεταβλητής
        εξόδου για μετρητή/ECU ή διακόπτης πίεσης λαδιού τύπου on/off που ενεργοποιεί
        προειδοποιητική λυχνία.
    oil_pressure_sensor_signal_output_type:
      name: Τύπος εξόδου σήματος αισθητήρα πίεσης λαδιού
      description: Καθορίζει τον τύπο της ηλεκτρικής εξόδου/του σήματος που παράγεται
        από τον αισθητήρα/πομπό πίεσης λαδιού.
    oil_processing_method:
      name: Μέθοδος επεξεργασίας λαδιού
      description: Αναφέρει τον τρόπο παραγωγής ή διύλισης του ελαίου (π.χ. ψυχρής
        έκθλιψης, παρθένο, ραφιναρισμένο), ο οποίος επηρεάζει τη γεύση, τη θρεπτική
        αξία και τις κατάλληλες χρήσεις στη μαγειρική.
    oil_pump_drive_method:
      name: Μέθοδος κίνησης αντλίας λαδιού
      description: Υποδεικνύει τι κινεί την αντλία λαδιού μέσα στον κινητήρα.
    oil_pump_mounting_style:
      name: Στυλ τοποθέτησης αντλίας λαδιού
      description: Καθορίζει πού και πώς τοποθετείται η αντλία λαδιού στον κινητήρα
        (π.χ., εσωτερική έναντι εξωτερικής/απομακρυσμένης, τοποθέτηση καλύμματος,
        τοποθέτηση κάρτερ λαδιού).
    oil_system_connection_thread_standard:
      name: Πρότυπο σπειρώματος σύνδεσης συστήματος λαδιού
      description: Καθορίζει το πρότυπο σπειρώματος/σύνδεσης που χρησιμοποιείται στη
        διεπαφή του συστήματος λίπανσης του εξαρτήματος για λόγους εγκατάστασης/συμβατότητας
        (π.χ. M12x1,5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Βαθμός ιξώδους λαδιού
      description: Περιγράφει το σχετικό πάχος του λαδιού περιστροφής για εξοπλισμό
        Craft (όχι ποιότητες SAE για αυτοκίνητα).
    okra_variety:
      name: Ποικιλία μπάμιας
      description: Προσδιορίζει την συγκεκριμένη ποικιλία ή την ποικιλία μπάμιας που
        προσφέρεται στην αγορά, όπως Clemson Spineless, Red Burgundy ή Baby Okra.
    olfactory_arts_material_form:
      name: Μορφή υλικού για τις οσφρητικές τέχνες
      description: Καθορίζει τη φυσική μορφή του υλικού όπως πωλείται.
    olfactory_arts_tool_kit_content:
      name: Περιεχόμενο κιτ εργαλείων οσφρητικών τεχνών
      description: Παραθέτει τα εξαρτήματα που περιλαμβάνονται όταν το προϊόν πωλείται
        ως κιτ ή σετ για την παρασκευή κεριών/θυμιάματος/αρώματος.
    olive_variety:
      name: Ποικιλία ελιάς
      description: Καθορίζει την ποικιλία ελιάς που χρησιμοποιείται, η οποία επηρεάζει
        Taste, την υφή, το χρώμα και την τοπική αυθεντικότητα.
    onion_variety:
      name: Ποικιλία κρεμμυδιού
      description: Καθορίζει τον συγκεκριμένο τύπο κρεμμυδιού, ώστε ο αγοραστής να
        μπορεί να εντοπίσει γρήγορα τα προτιμώμενα προφίλ χρώματος, γεύσης και χρήσης,
        ενώ επιτρέπει στον έμπορο να παραθέτει με ακρίβεια τα Προϊόντα.
    opacity_level:
      name: Επίπεδο αδιαφάνειας
      description: Υποδεικνύει πόσο διαφανές ή αδιαφανές είναι το ύφασμα.
    operating_modes:
      name: Τρόποι λειτουργίας
      description: Κύριο ενσωματωμένο εφέ/ Mode Motion που υποστηρίζεται από το φως
        λέιζερ.
    operating_voltage:
      name: Τάση λειτουργίας
      description: Καθορίζει την ονομαστική τάση συστήματος για την οποία έχει σχεδιαστεί
        ο εγχυτήρας.
    optical_toy_features:
      name: Χαρακτηριστικά οπτικού παιχνιδιού
      description: Highlight το κύριο οπτικό/οπτικό εφέ που παράγεται από το παιχνίδι.
    orchestral_string_core_material:
      name: Ορχηστικό συμβολοσειρά υλικό πυρήνα
      description: Καθορίζει το υλικό κατασκευής του πυρήνα, το οποίο επηρεάζει έντονα
        την αίσθηση, την απόκριση και τον τόνο.
    orchestral_string_end_type:
      name: Ορχηστρικό συμβολοσειρά τέλος τύπου
      description: Καθορίζει το στυλ προσάρτησης στο άκρο της ουράς της συμβολοσειράς.
    orchestral_string_included_strings:
      name: Χορδές που περιλαμβάνονται στο πακέτο του ορχηστρικού έγχορδου οργάνου
      description: Λίστα ποια συγκεκριμένα συμβολοσειρά περιλαμβάνονται στη συσκευασία
        (διαφέρει ανάλογα με το όργανο).
    orchestral_string_instrument_fitting_part_type:
      name: Ορχηστρική συμβολοσειρά instrument fitting/part type
      description: Καθορίζει το είδος του εξαρτήματος/μέρους του προϊόντος (π.χ.,
        γέφυρα, τμήμα ουράς, υποσιάγωνο).
    orchestral_string_instrument_mute_type:
      name: Τύπος σιγαστήρα για ορχηστρικό έγχορδο όργανο
      description: Καθορίζει τον λειτουργικό τύπο της ορχηστρικής συμβολοσειρά σίγασης
        οργάνων (π.χ. πρακτική/ξενοδοχείο έναντι απόδοσης/συναυλίας) ή/και κοινό στυλ
        σχεδίασης.
    orchestral_string_instrument_part_position:
      name: Ορχηστρική συμβολοσειρά instrument part position
      description: Υποδεικνύει πού ανήκει το εξάρτημα στο όργανο (χρήσιμο όταν τα
        εξαρτήματα βρίσκονται στην άνω/κάτω ή αριστερή/δεξιά παράλλαξη).
    orchestral_string_winding_material:
      name: Υλικό περιτύλιξης χορδών για ορχηστρικό έγχορδο όργανο
      description: Καθορίζει το εξωτερικό υλικό περιέλιξης/περιτύλιξης που χρησιμοποιείται
        στη συμβολοσειρά.
    organza_finish_sheen:
      name: Φινίρισμα / γυαλάδα από οργάντζα
      description: Περιγράφει την εμφάνιση της επιφάνειας της οργάντζας (ματ έναντι
        λαμπερών/ιριδίζοντων εφέ).
    organza_ribbon_transparency_level:
      name: Επίπεδο διαφάνειας κορδέλας οργάντζας
      description: Περιγράφει πόσο διαφανής είναι η κορδέλα οργάντζας.
    organza_transparency_level:
      name: Επίπεδο διαφάνειας οργάντζας
      description: Περιγράφει πόσο διαφανές είναι το ύφασμα οργάντζας όταν τοποθετείται
        σε στρώσεις μία φορά.
    origami_paper_shape:
      name: Shapes Paper Origami
      description: Καθορίζει τα Shapes φύλλων που χρησιμοποιούνται για δίπλωση.
    origami_paper_sidedness:
      name: Πλευρική όψη Paper Origami
      description: Υποδεικνύει εάν το Paper origami έχει το ίδιο χρώμα/σχέδιο και
        στις δύο πλευρές ή αντίθετες πλευρές.
    ostrich_feather_part:
      name: Μέρος φτερού στρουθοκαμήλου
      description: Προσδιορίζει το στυλ/μέρος του φτερού στρουθοκαμήλου που χρησιμοποιείται
        (π.χ., λοφίο έναντι μονότονου) το οποίο Impact την απαλότητα, την πυκνότητα
        και την τυπική εφαρμογή Craft .
    outboard_motor_shaft_type:
      name: Τύπος άξονας μετάδοσης κίνησης εξωλέμβιου κινητήρα
      description: Τυπική κατηγορία μήκους άξονα που χρησιμοποιείται από εξωλέμβιες
        μηχανές (Έντυπο Label που χρησιμοποιείται στη ναυτιλιακή βιομηχανία).
    outboard_motor_steering_type:
      name: Τύπος διεύθυνσης εξωλέμβιου κινητήρα
      description: Καθορίζει τη διεπαφή/μηχανισμό διεύθυνσης που χρησιμοποιείται από
        τον εξωλέμβιο κινητήρα (π.χ., πηδάλιο ή σύστημα τηλεχειριστηρίου διεύθυνσης).
    outdoor_table_functionality:
      name: Λειτουργικότητα εξωτερικού τραπεζιού
      description: Προσδιορίζει εξειδικευμένες ενσωματωμένες Functions που Beyond
        μια απλή επιφάνεια τραπεζιού (π.χ., ψυγείο, ράφι αποθήκευσης, κάλυμμα ρεζερβουάρ
        αερίου, βάση ομπρέλας, σύγχρονος καρέκλας, πτυσσόμενος σχεδιασμός, χρηματοκιβώτιο
        μέσα στην πισίνα, ρυθμιζόμενο ύψος, ενσωματωμένοι τροχοί, φωτισμός LED).
    outerwear_length_type:
      name: Τύπος μήκους εξωτερικού ενδύματος
      description: Ταξινομεί το συνολικό μήκος ενός εξωτερικού ενδύματος σε τυπικά
        περιγραφικά εύρη.
    outerwear_pieces_included:
      name: Περιλαμβάνονται πανωφόρια
      description: Παραθέτει τα κομμάτια ενδύματος που παρέχονται όταν το προϊόν πωλείται
        ως σετ.
    outfit_attachment_mechanism:
      name: Μηχανισμός στερέωσης στολής
      description: Καθορίζει πώς προσκολλώνται στην κούκλα τα κομμάτια της ενδυμασίας
        ή των αξεσουάρ (π.χ. καρτέλα, αυτοκόλλητο, μαγνήτες).
    outfit_items_included:
      name: Περιλαμβάνονται αντικείμενα στολής
      description: Αναφέρει το συγκεκριμένο ένδυμα κομμάτι που περιλαμβάνεται στο
        σετ (π.χ. κορμάκι, σορτς, κορδέλα για το κεφάλι).
    outlet_thread_type:
      name: Τύπος εξόδου
      description: Πρότυπο νήμα που χρησιμοποιείται στις θύρες εξόδου της γραμμής
        φρένων του κύριου κυλίνδρου (π.χ. ποσοτικό μέγεθος φυσαλίδας vs SAE ανεστραμμένο
        φλας).
    output_jack_type_instrument:
      name: Τύπος υποδοχής εξόδου (όργανο)
      description: Καθορίζει τον τύπο της υποδοχής εξόδου ήχου στο ηλεκτρικό μαντολίνο.
    output_signal_type:
      name: Τύπος σήματος εξόδου
      description: Συμπεριφορά/τύπος ηλεκτρικής εξόδου που παράγεται από τον αισθητήρα
        (π.χ. αναλογική αντίσταση θερμίστορ NTC).
    outsole_marking_type:
      name: Τύπος σήμανσης εξωτερικής σόλας
      description: Υποδεικνύει εάν η εξωτερική σόλα του παπουτσιού αφήνει σημάδια
        στις επιφάνειες του γηπέδου, κάτι κρίσιμο για τα αθλήματα ρακέτας σε εσωτερικούς
        χώρους.
    outsole_material:
      name: Υλικό εξωτερικής σόλας
      description: Υποδεικνύει το υλικό της εξωτερικής σόλας του παπουτσιού που έρχεται
        σε επαφή με το έδαφος, επηρεάζοντας την πρόσφυση, την ευελιξία και την ανθεκτικότητα.
    outsole_stud_type:
      name: Τύπος εξωτερικής σόλας με καρφίτσα
      description: Περιγράφει τη διαμόρφωση εξωτερικής σόλας/σφηνιού (π.χ., χυτευμένα
        σφηνάκια, λαστιχένιες προεξοχές, προεξοχές χλοοτάπητα) που παρέχει πρόσφυση
        στην επιλεγμένη επιφάνεια παιχνιδιού.
    oven_bake_clay_formulation:
      name: Σύνθεση αργίλου που ψήνεται σε φούρνο
      description: Προσδιορίζει την οικογένεια σκευασμάτων του πηλού φούρνου (π.χ.
        πολυμερής άργιλος έναντι ρητινώδους αργίλου), η οποία Impact τη διακίνηση,
        τη συμπεριφορά σκλήρυνσης και τις τελικές ιδιότητες.
    oven_housing_configuration:
      name: Διαμόρφωση περιβλήματος φούρνου
      description: Ορίζει την προβλεπόμενη διάταξη της συσκευής που φιλοξενεί το ντουλάπι
        (π.χ., μονός φούρνος, διπλός φούρνος ή συνδυασμός φούρνου και φούρνου μικροκυμάτων).
    overhead_mount_installation_method:
      name: Μέθοδος εγκατάστασης πάνω από την οροφή
      description: Πώς στερεώνεται η βάση πάνω στο όχημα (υλικός εξοπλισμός/στυλ προσάρτησης).
    oversize_or_undersize_grade:
      name: Υπερμεγέθης ή υπομεγέθης βαθμός
      description: Καθορίζει το μέγεθος του κιτ (υπερμεγέθη έμβολα/δακτύλιοι ή/και
        υπομεγέθη ρουλεμάν) σε σχέση με το τυπικό μέγεθος του κατασκευαστή πρωτότυπου
        εξοπλισμού (OEM).
    p_tex_application_method:
      name: Μέθοδος εφαρμογής P-Tex
      description: Περιγράφει τον τρόπο εφαρμογής του υλικού P-Tex στη βάση του σκι
        ή του snowboard.
    p_tex_form:
      name: Φόρμα P-Tex
      description: Προσδιορίζει τη φυσική μορφή στην οποία βρίσκεται το υλικό επισκευής.
        Supply.
    packability:
      name: Συσκευασιμότητα
      description: Υποδεικνύει εάν και πώς το γιλέκο μπορεί να συσκευαστεί ή να φυλαχθεί
        όταν δεν χρησιμοποιείται.
    packaging_format:
      name: Μορφή συσκευασίας
      description: Πώς συσκευάζονται/πωλούνται τα συμβολοσειρά (φυσικό πρόσωπο φάκελοι,
        χύμα κ.λπ.).
    packaging_material:
      name: Υλικό συσκευασίας
      description: Καθορίζει το κύριο υλικό του μπουκαλιού ή κοντέινερ που συγκρατεί
        το νερό.
    packaging_type:
      name: Τύπος συσκευασίας
      description: Περιγράφει τον τρόπο συσκευασίας του bobblehead για αποθήκευση
        Retail/έκθεσης/συλλογής.
    packing_medium:
      name: Μέσο συσκευασίας
      description: Υποδεικνύει το υγρό ή το μέσο (όπως νερό, διάφορα σιρόπια, χυμό
        ή άλμη) που χρησιμοποιείται για τη συντήρηση των φρούτων μέσα στο κοντέινερ.
    pad_components_included:
      name: Περιλαμβάνονται εξαρτήματα ενίσχυσης
      description: Καθορίζει ποια κομμάτια περιλαμβάνονται όταν το προϊόν πωλείται
        ως σετ (π.χ., επιγονατίδες και επιαγκωνίδες, μόνο προστατευτικά καρπού).
    pad_controller_additional_control:
      name: Pad υπεύθυνος επεξεργασίας πρόσθετος έλεγχος
      description: Τύποι πρόσθετων φυσικών χειριστηρίων Beyond τα pads (κουμπιά, faders,
        κουμπί) που υπάρχουν στη μονάδα.
    pad_controller_performance_features:
      name: Pad υπεύθυνος επεξεργασίας απόδοσης features
      description: Βασικά χαρακτηριστικά pad που σχετίζονται με την απόδοση για παιχνίδι
        και εκφραστικό έλεγχο.
    pad_coverage_area:
      name: Περιοχή κάλυψης μαξιλαριού
      description: Καθορίζει τις ζώνες του σώματος που προστατεύουν τα ενσωματωμένα
        μαξιλαράκια της ζώνης.
    pad_material_or_technology:
      name: Υλικό ή τεχνολογία μαξιλαριού
      description: Καθορίζει την ιδιόκτητη τεχνολογία απορρόφησης πρόσκρουσης ή το
        επώνυμο υλικό που χρησιμοποιείται στο επίθεμα.
    pad_mounting_or_holding_style:
      name: Στυλ τοποθέτησης ή συγκράτησης μαξιλαριού
      description: Υποδεικνύει τον τρόπο με τον οποίο κρατιέται, φοριέται ή εγκαθίσταται
        το μαξιλαράκι κατά τη χρήση.
    pad_saver_style:
      name: Στυλ προστασίας pad
      description: Υποδεικνύει το φυσικό στυλ/σχεδιασμό του προστατευτικού τακακιού
        που χρησιμοποιείται για το στέγνωμα των τακακιών και της οπής.
    pad_shape:
      name: Σχήμα ενίσχυσης
      description: Ορίζει τη γεωμετρική μορφή ή την καμπυλότητα της επιφάνειας κρούσης
        του μαξιλαριού ή του συνολικού σώματος (π.χ., στρογγυλό, καμπύλη, ορθογώνιο,
        επίπεδο), βοηθώντας τους χρήστες να αντιστοιχίσουν τα μαξιλαράκια με τους
        στόχους προπόνησης και τους τύπους κρούσης.
    pad_shell_type:
      name: Τύπος κελύφους μαξιλαριού
      description: Ταξινομεί το στυλ κατασκευής της εξωτερικής επιφάνειας του μαξιλαριού
        (π.χ. σκληρό κέλυφος, μαλακό κέλυφος, εσωτερικό ένθετο).
    pad_style:
      name: Στυλ μαξιλαριού
      description: Καθορίζει τον τύπο ή τον σχεδιασμό του μαξιλαριού, που παρέχεται
        με το έλκηθρο.
    padding_layers:
      name: Στρώματα επένδυσης
      description: Υποδεικνύει τον αριθμό των στρώσεων αφρού που χρησιμοποιούνται
        για να επηρεάζουν την απορρόφηση.
    padding_level:
      name: Επίπεδο επένδυσης
      description: Υποδεικνύει την ποσότητα του εσωτερικού περιθώριο που έχει ενσωματωθεί
        στις περιοχές επαφής του ιμάντα/υποστήριξης (λαιμός/ώμος/πλάτη).
    padding_material:
      name: Υλικό επένδυσης
      description: Αναφέρεται στο εσωτερικό υλικό γέμισης που απορροφά τους κραδασμούς
        μέσα σε σάκους, ασπίδες, γάντια και προπλάσματα.
    paddle_ball_attachment_type:
      name: Τύπος σύνδεσης μπάλας κουπιού
      description: Καθορίζει πώς συνδέεται η μπάλα με το κουπί (ή αν δεν είναι δεμένη).
    paddle_leash_style:
      name: Στυλ λουριού με κουπί
      description: Προσδιορίζει το στυλ ή το σχέδιο του κορδονιού του λουριού του
        κουπιού.
    paddle_shape:
      name: Σχήμα κουπιού
      description: Ορίζει τη συνολική σιλουέτα της κεφαλής/σώματος του κουπιού (π.χ.,
        τυπικό, επίμηκες, φαρδύ σώμα), την επίδραση πρόσκρουσης, το μέγεθος γλυκού
        σημείου και την ευελιξία.
    paddleboard_intended_use:
      name: Προβλεπόμενη χρήση του paddleboard
      description: Ταξινομεί τον κύριο σκοπό σχεδιασμού ή τη δραστηριότητα για την
        οποία κατασκευάζεται η σανίδα (π.χ., περιηγήσεις, γιόγκα, αγώνες δρόμου).
    paint_application_method:
      name: Μέθοδος εφαρμογής βαφής
      description: Κύριος τρόπος με τον οποίο το προϊόν προορίζεται να εφαρμοστεί
        στη δαγκάνα.
    paint_by_number_surface_type:
      name: Τύπος επιφάνειας βαφής με αριθμό
      description: Η επιφάνεια στην οποία είναι τυπωμένο το αριθμημένο σχέδιο (π.χ.
        καμβάς, χαρτί, ξύλινο πάνελ).
    paint_medium_application_method:
      name: Μέθοδος εφαρμογής μέσου βαφής
      description: Υποδεικνύει τον συνιστώμενο τρόπο εφαρμογής του μέσου.
    paint_medium_intended_effect:
      name: Μέσο βαφής που προορίζεται για το αποτέλεσμα
      description: Αποτυπώνει το πρωταρχικό αποτέλεσμα που προορίζεται να δημιουργήσει
        το μέσο (υφή, γυαλάδα, γυάλισμα, ροή κ.λπ.).
    paint_safe_bristles:
      name: Τρίχες ασφαλείς για βαφή
      description: Υποδεικνύει εάν οι τρίχες της βούρτσας διατίθενται στην αγορά ως
        ασφαλείς για χρήση σε βαφή/διαφανές χρώμα αυτοκινήτου (χωρίς γρατσουνιές).
    paintable_surface:
      name: Βαφόμενη επιφάνεια
      description: Υποδεικνύει εάν τα σχήματα παπιέ μασέ είναι έτοιμα για βαφή ως
        έχουν (π.χ., ασταρωμένα/σφραγισμένα) ή απαιτούν προετοιμασία.
    paintball_caliber:
      name: Διαμέτρημα paintball
      description: Καθορίζει τη διάμετρο/διαμέτρημα για τις μπάλες paintball ή συμβατού
        εξοπλισμού.
    paintball_feed_system:
      name: Σύστημα τροφοδοσίας paintball
      description: Ορίζει τον τρόπο με τον οποίο οι μπάλες paintball τροφοδοτούνται
        στον μαρκαδόρο.
    paintball_fill_color:
      name: Χρώμα γεμίσματος paintball
      description: Υποδεικνύει το χρώμα του εσωτερικού γεμιστικού σημαδιού, το οποίο
        μπορεί να διαφέρει από το εξωτερικό κέλυφος και καθορίζει το χρώμα που μένει
        κατά την πρόσκρουση.
    paintball_fill_type:
      name: Τύπος πλήρωσης paintball
      description: Περιγράφει οποιαδήποτε ειδική σύνθεση ή ιδιότητα του υλικού πλήρωσης
        (π.χ. πλενόμενη, φωσφορίζουσα στο σκοτάδι, σκόνη).
    paintball_grade:
      name: Βαθμίδα paintball
      description: Περιγράφει την κατηγορία απόδοσης ή το προβλεπόμενο επίπεδο χρήσης
        (π.χ. είσοδος, αγώνισμα, διαγωνισμός, χειμώνας).
    paintball_mask_coverage_level:
      name: Επίπεδο κάλυψης μάσκας paintball
      description: Υποδεικνύει ποια τμήματα του προσώπου ή του κεφαλιού προστατεύει
        το προστατευτικό γυαλιά ή η μάσκα paintball (μόνο προστατευτικό γυαλιά, μισό
        πρόσωπο, ολόκληρο πρόσωπο ή ολόκληρο κεφάλι).
    paintball_tank_valve_type:
      name: Τύπος βαλβίδας δεξαμενής paintball
      description: Περιγράφει τη διεπαφή βαλβίδας ή ρυθμιστή που υπάρχει στη δεξαμενή.
    painting_surface_priming_type:
      name: Τύπος ασταρώματος επιφάνειας βαφής
      description: Καθορίζει το αστάρωμα/επίστρωση στην επιφάνεια βαφής (ξεπερνά το
        απλώς ασταρωμένο/μη ασταρωμένο), το οποίο επηρεάζει την πρόσφυση του χρώματος
        και τη συμβατότητα της τεχνικής.
    palette_knife_blade_edge_profile:
      name: Προφίλ ακμής μαχαιριού παλέτας
      description: Περιγράφει το προφίλ της ακμής εργασίας της λεπίδας ενός μαχαιριού
        παλέτας (όχι την αιχμηρότητα), το οποίο επηρεάζει τη δημιουργία σημαδιών και
        την ανάμειξη.
    palette_knife_flexibility:
      name: Ευελιξία μαχαιριού παλέτας
      description: Περιγράφει την ακαμψία/κάμψη της λεπίδας του μαχαιριού παλέτας.
    palette_surface_finish:
      name: Φινίρισμα επιφάνειας παλέτας
      description: Περιγράφει το φινίρισμα/επίστρωση της επιφάνειας ανάμειξης που
        επηρεάζει την αντοχή στους λεκέδες και την ευκολία καθαρισμού.
    palm_padding_level:
      name: Επίπεδο επένδυσης παλάμης
      description: Περιγράφει την ποσότητα απορρόφησης κραδασμών στην περιοχή της
        παλάμης του γαντιού ή του μαξιλαριού λαβής.
    palm_padding_type:
      name: Τύπος επένδυσης παλάμης
      description: Υποδεικνύει το υλικό ή την κατασκευή που χρησιμοποιείται για την
        προστασία της παλάμης (π.χ. τζελ, αφρός, διπλή στρώση).
    palm_wax_blend_readiness:
      name: Ετοιμότητα μείγματος κεριού φοινικέλαιου
      description: Είτε το προϊόν είναι καθαρό κερί φοινικέλαιου είτε προαναμεμειγμένη
        σύνθεση που προορίζεται για συγκεκριμένα χαρακτηριστικά απόδοσης.
    palm_wax_form:
      name: Μορφή κεριού φοινικέλαιου
      description: Φυσική μορφή του κεριού φοινικέλαιου όπως πωλείται, η οποία επηρεάζει
        την ευκολία μέτρησης, την ταχύτητα τήξης και τη διακίνηση.
    pan_flute_tuning_standard:
      name: Πρότυπο κούρδισμα φλάουτου του Παν
      description: Συχνότητα αναφοράς που χρησιμοποιείται για το κούρδισμα (π.χ.,
        A4=440 Hz), σημαντική για το παίξιμο με άλλα όργανα.
    pannier_configuration:
      name: Διαμόρφωση καλαθιού
      description: Υποδεικνύει εάν το προϊόν πωλείται ως μονή τσάντα, συνδεδεμένο
        διπλό ή δημιουργώ σύζευξη/τριπλό σετ πανιών.
    pannier_mounting_system:
      name: Σύστημα τοποθέτησης καλαθιού
      description: Ορίζει τον μηχανισμό που χρησιμοποιείται για τη σύνδεση της βαλίτσας
        στο Frame ή στο ράφι του ποδηλάτου, εξασφαλίζοντας συμβατότητα με διαφορετικές
        εγκαταστάσεις.
    pant_cuff_style:
      name: Στυλ μανσέτας παντελονιού
      description: Υποδεικνύει το φινίρισμα ή τη ρύθμιση στον αστράγαλο του παντελονιού
        (π.χ., ελαστικές μανσέτες, φερμουάρ στον αστράγαλο, ανοιχτό στρίφωμα).
    pant_leg_conversion_type:
      name: Τύπος μετατροπής παντελονιού
      description: Υποδεικνύει εάν και πώς τα πόδια του παντελονιού μπορούν να μετατραπούν
        ή να ρυθμιστούν για διαφορετικά μήκη.
    pantyhose_crotch_style:
      name: Στυλ καλσόν στον καβάλο
      description: Ορίζει τον σχεδιασμό της περιοχής του καβάλου, διακρίνοντας τις
        τυπικές εκδόσεις με κλειστό καβάλο, χωρίς καβάλο ή με ενισχυμένη ενίσχυση.
    papaya_variety:
      name: Ποικιλία παπάγιας
      description: Καθορίζει την καλλιεργητική ποικιλία ή την αγορά μιας παπάγιας
        (π.χ., Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Μορφή Paper και μαγνητικής κούκλας
      description: Καθορίζει εάν το προϊόν είναι ένα παραδοσιακό σετ χαρτιού για κούκλες,
        ένα μαγνητικό σετ κούκλων ή μια υβριδική μορφή.
    paper_color_family:
      name: Οικογένεια χρωμάτων χαρτιού
      description: Καθορίζει εάν η συσκευασία είναι μονόχρωμα, ανάμεικτα χρώματα ή
        ειδικά μείγματα (χρήσιμο όταν το χρώμα είναι ανά κομμάτι, αλλά η συσκευασία
        αναμειγνύεται).
    paper_magnetic_doll_set_contents:
      name: Χαρτί & μαγνητικό σετ κούκλας περιεχόμενο
      description: Υποδεικνύει ποια κύρια εξαρτήματα περιλαμβάνονται στο σετ.
    paper_opacity:
      name: Αδιαφάνεια χαρτιού
      description: Υποδεικνύει πόσο διαφανές είναι το χαρτί, από πολύ διαφανές έως
        αδιαφανές (χρήσιμο για την αντιγραφή).
    paraglider_certification_rating:
      name: Κατάταξη πιστοποίησης αλεξίπτωτου πλαγιάς
      description: Δηλώνει την επίσημη αξιολόγηση πτητικής ικανότητας που έχει αποδοθεί
        σε μια πτέρυγα αλεξίπτωτου πλαγιάς (π.χ., κατηγορίες EN ή LTF).
    parasite_types_controlled:
      name: Είδη παρασίτων που ελέγχονται
      description: Παραθέτει τα εσωτερικά παράσιτα που το προϊόν είναι αποτελεσματικό
        έναντι των αγοραστών, ώστε να μπορούν να καθορίσουν τα προγράμματα αποπαρασίτωσης
        σε συγκεκριμένες προσβολές.
    parking_camera_mounting_location:
      name: Θέση τοποθέτησης κάμερας στάθμευσης
      description: Πού στο όχημα προορίζεται να εγκατασταθεί η κάμερα (π.χ., περιοχή
        πινακίδας κυκλοφορίας, επιφανειακή τοποθέτηση στο πίσω μέρος, εντοιχιζόμενη
        τοποθέτηση).
    parking_camera_night_vision_technology:
      name: Τεχνολογία νυχτερινής όρασης με κάμερα στάθμευσης
      description: Η μέθοδος υποβοήθησης σε συνθήκες χαμηλού φωτισμού που χρησιμοποιείται
        από την κάμερα.
    parking_camera_orientation:
      name: Προσανατολισμός κάμερας στάθμευσης
      description: Είτε η κάμερα έχει σχεδιαστεί για προβολή από πίσω (δημιουργία
        αντιγράφων ασφαλείας), μπροστινή προβολή ή χρήση με δυνατότητα επιλογής/καθρέφτη.
    parking_sensor_finish:
      name: Φινίρισμα αισθητήρα στάθμευσης
      description: Υποδεικνύει το φινίρισμα της επιφάνειας της πρόσοψης/καλύμματος
        του αισθητήρα στάθμευσης (π.χ., βάφεται/ασταρώνεται, ματ, γυαλιστερό) για
        να ταιριάζει με την αισθητική του προφυλακτήρα.
    parking_sensor_type:
      name: Τύπος αισθητήρα στάθμευσης
      description: Καθορίζει την τεχνολογία ανίχνευσης που χρησιμοποιείται από τον
        αισθητήρα στάθμευσης (π.χ. υπερηχητικός, ηλεκτρομαγνητικός, ραντάρ, οπτικός).
    parsley_root_variety:
      name: Ποικιλία ρίζας μαϊντανού
      description: Καθορίζει την καλλιέργεια ή την ποικιλία της ρίζας του μαϊντανού
        όταν παρέχεται από τον προμηθευτή.
    parsnip_variety:
      name: Ποικιλία παστινάκι
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία ή ποικιλία παστινάδας, όπως
        το Hollow Crown ή το White Gem, επιτρέποντας στον αγοραστή να επιλέγω με βάση
        τις διαφορές γεύσης, γλυκύτητας ή μεγέθους.
    part_condition:
      name: Μέρος της κατάστασης
      description: Υποδεικνύει εάν το ανταλλακτικό είναι καινούργιο, μεταχειρισμένο,
        έχει υποστεί γενική επισκευή κ.λπ.
    part_placement:
      name: Μέρος τοποθέτησης
      description: Υποδεικνύει πού στο μηχάνημα (π.χ., σε σκάλα ή σε βαθμιδωτό μηχανισμό)
        είναι εγκατεστημένο το εξάρτημα, όπως αριστερά, δεξιά, μπροστά ή πίσω.
    partial_capo_covered_strings:
      name: Χορδές με μερικό κάλυμμα καπάκι
      description: Καθορίζει το εύρος συμβολοσειρά που καλύπτει το μερικό capo χρησιμοποιώντας
        τυπική αρίθμηση κιθάρας 6 συμβολοσειρά (1 = υψηλό E, 6 = χαμηλό E).
    parting_style:
      name: Στυλ χωρισμού
      description: Υποδεικνύει πώς χωρίζεται ή μπορεί να χωριστεί η περούκα (π.χ.,
        κέντρο, πλάι, ελεύθερο μέρος), επηρεάζοντας την ευελιξία του styling.
    party_favor_type:
      name: Τύπος εύνοιας για πάρτι
      description: Καθορίζει τι είδους δώρα πάρτι είναι (π.χ. αυτοκόλλητα, παιχνίδια
        Shop Mini , φυσαλίδες), για να επιτρέψει την περιήγηση/φιλτράρισμα εντός των
        δώρων πάρτι.
    party_game_format:
      name: Μορφή παιχνιδιού πάρτι
      description: Κύρια φυσική μορφή του παιχνιδιού για πάρτι.
    party_horn_mouthpiece_type:
      name: Τύπος επιστομίου κόρνας πάρτι
      description: Καθορίζει την κατασκευή του επιστομίου, η οποία επηρεάζει την υγιεινή
        και την άνεση.
    party_horn_style:
      name: Στυλ κόρνας πάρτι
      description: Περιγράφει το στυλ κατασκευής/συμπεριφοράς της κόρνας πάρτι (πώς
        εκτείνεται ή παράγει ήχο).
    passenger_car_type:
      name: Τύπος επιβατικού αυτοκινήτου
      description: Προσδιορίζει τον συγκεκριμένο τύπο τροχαίου υλικού επιβατών (επιβατικό
        αυτοκίνητο) για το μοντέλο (π.χ., πούλμαν, με κρεβάτι), που χρησιμοποιείται
        για περιήγηση και κατασκευή σκηνικών.
    passion_fruit_variety:
      name: Ποικιλία φρούτων του πάθους
      description: Προσδιορίζει/προσδιορίζει τη βοτανική ή εμπορική ποικιλία του φρούτου
        του πάθους που προσφέρεται (π.χ., μωβ, κίτρινο, Granadilla).
    pasta_sauce_texture:
      name: Υφή σάλτσας ζυμαρικών
      description: Περιγράφει την υφή της σάλτσας (π.χ., λεία, χοντρή, κρεμώδης) ώστε
        να ταιριάζει με τις προτιμήσεις της αίσθησης στο στόμα του καταναλωτή.
    pasta_sauce_variety:
      name: Ποικιλία σάλτσας ζυμαρικών
      description: Ταξινομεί τις σάλτσες ζυμαρικών με βάση τη συνταγή ή το στυλ, ώστε
        ο αγοραστής να μπορεί να εντοπίζει γρήγορα κλασικές όπως η μαρινάρα ή ειδικές
        σάλτσες όπως η βότκα ή το πέστο.
    pastry_crust_state:
      name: Κατάσταση κρούστας ζύμης
      description: Περιγράφει την κατάσταση προετοιμασίας ή ψησίματος της ζύμης κατά
        την αγορά.
    pastry_crust_style:
      name: Στυλ ζύμης ζαχαροπλαστικής
      description: Προσδιορίζει το συγκεκριμένο στυλ ζύμης ή τον τύπο ζύμης της βάσης.
    pastry_filling_type:
      name: Τύπος γέμισης ζύμης
      description: Καθορίζει την κύρια εσωτερική γέμιση της ζύμης ή του σκον.
    patch_adhesion_method:
      name: Μέθοδος προσκόλλησης έμπλαστρου
      description: Καθορίζει τον τρόπο με τον οποίο το έμπλαστρο προσκολλάται στον
        σωλήνα ή το ελαστικό (π.χ., αυτοκόλλητο, βουλκανισμός με τσιμέντο ή ενεργοποίηση
        με θερμότητα).
    patch_backing_material:
      name: Υλικό βάσης του επιθέματος
      description: Υλικό που χρησιμοποιείται στο πίσω μέρος/βάση του έμπλαστρου (π.χ.
        τσόχα, διαγώνιο ύφασμα) και το οποίο έρχεται σε επαφή με το διακοσμητικό κομμάτι.
    patch_backing_type:
      name: Τύπος βάσης επιθέματος
      description: Το υπόστρωμα που χρησιμοποιείται στο έμπλαστρο (π.χ., θερμική σφράγιση/σιδέρωμα,
        αυτοκόλλητο που ξεκολλάει και κολλάει, αυτοκόλλητο με γάντζο και θηλιά, καμία).
    patch_base_material:
      name: Υλικό βάσης επιθέματος
      description: Κύριο υφασμάτινο υλικό βάσης/υπόστρωμα του έμπλαστρου με το μοτίβο
        (όχι τα διακοσμητικά στοιχεία).
    patch_border_edge_finish:
      name: Φινίρισμα περιγράμματος/ακμής με μπάλωμα
      description: Η μέθοδος φινιρίσματος των άκρων του μπαλώματος (π.χ., ακμή με
        ρολό/επικάλυψη, ακμή κοπής με λέιζερ) που επηρεάζει την ανθεκτικότητα και
        την εμφάνιση.
    patch_placement_area:
      name: Περιοχή τοποθέτησης επιθέματος
      description: Κοινή προβλεπόμενη περιοχή τοποθέτησης για το έμπλαστρο σε ένδυση/αξεσουάρ.
    pathogen_removal_capability:
      name: Δυνατότητα αφαίρεσης παθογόνου
      description: Καθορίζει ποιες κατηγορίες μικροοργανισμών (βακτήρια, πρωτόζωα,
        ιοί) είναι πιστοποιημένες για την αφαίρεση από την αντλία.
    pattern_sizing_system:
      name: Σύστημα μεγέθους μοτίβων
      description: Καθορίζει το περιφερειακό σύστημα ή το πρότυπο μεγέθους που χρησιμοποιείται
        για το διάγραμμα μεγέθους του μοτίβου (π.χ., ΗΠΑ, Ηνωμένο Βασίλειο, ΕΕ).
    peak_style:
      name: Στυλ κορυφής
      description: Καθορίζει το στυλ της ζελατίνας ή της κορυφής στο κράνος, επηρεάζοντας
        την κάλυψη, την αισθητική και τους κανόνες πειθαρχίας.
    pear_variety:
      name: Ποικιλία αχλαδιών
      description: Προσδιορίζει την καλλιέργεια ή την ποικιλία των αχλαδιών (π.χ.
        Bartlett, Bosc, Conference), επιτρέποντας στον αγοραστή να επιλέξει την προτιμώμενη
        γεύση, υφή και μαγειρική χρήση.
    pearl_luster_grade:
      name: Βαθμός λάμψης μαργαριταριών
      description: Ποιοτικός βαθμός λάμψης/λάμψης της επιφάνειας των μαργαριταριών.
    pearl_matching_level:
      name: Επίπεδο αντιστοίχισης μαργαριταριών
      description: Υποδεικνύει πόσο καλά ταιριάζουν τα μαργαριτάρια μέσα σε μια παρτίδα
        ή κλωστή (π.χ., με βάση το χρώμα, το μέγεθος και τη λάμψη).
    pearl_shape:
      name: Σχήμα μαργαριταριών
      description: Η συνολική κατηγορία σχήματος του μαργαριταριού.
    pearl_surface_condition:
      name: Κατάσταση επιφάνειας μαργαριταριού
      description: Υποδεικνύει την ορατή κατάσταση της επιφάνειας ενός μαργαριταριού,
        με βάση την παρουσία και τη σοβαρότητα των κηλίδων ή των κηλίδων.
    pearl_treatment:
      name: Φροντίδα μαργαριταριού
      description: Αποκαλύπτει κάθε σενάριο δοκιμής που εφαρμόζεται στο μαργαριτάρι
        που επηρεάζει το χρώμα/εμφάνιση.
    pearl_type:
      name: Τύπος μαργαριταριού
      description: Καθορίζει την ποικιλία/Origin μαργαριταριών (π.χ. γλυκό νερό, Akoya,
        από Ταϊτή, Νότια Θάλασσα) για χύμα μαργαριτάρια.
    peat_level:
      name: Επίπεδο τύρφης
      description: Περιγράφει την ένταση της Influence του καπνού τύρφης στο ουίσκι,
        από μη τυρφωμένο έως έντονα τυρφωμένο.
    pedal_and_cleat_system_compatibility:
      name: Συμβατότητα συστήματος πεντάλ και σχαρών
      description: Καθορίζει με ποια πρότυπα πεταλιού ή σχαριού έχει σχεδιαστεί να
        λειτουργεί η σφήνα ή η σφήνα, διασφαλίζοντας ότι οι αγοραστές επιλέγουν ένα
        προϊόν που ταιριάζει στα πετάλια και τα παπούτσια τους.
    pedal_configuration:
      name: Διαμόρφωση πεντάλ
      description: Υποδεικνύει εάν η καρέκλα διαθέτει μονό πεντάλ, Split/ανεξάρτητα
        πεντάλ ή μετατρέψιμο σχεδιασμό.
    pedal_mounting_style:
      name: Στυλ τοποθέτησης πεντάλ
      description: Καθορίζει τον τρόπο με τον οποίο το πεντάλ ή το κάλυμμα/μαξιλάρι
        πεντάλ στερεώνεται στο όχημα (μέθοδος εγκατάστασης/στερέωσης).
    pedal_set_components:
      name: Εξαρτήματα σετ πεντάλ
      description: Καθορίζει ποια πετάλια περιλαμβάνονται στο σετ.
    pedal_spindle_material:
      name: Υλικό άξονα πεντάλ
      description: Υλικό που χρησιμοποιείται για τον άξονα/άξονα του πεντάλ, Influence
        στην αντοχή, το βάρος και την αντοχή στη διάβρωση.
    pedal_spindle_thread_size:
      name: Pedal spindle νήμα μέγεθος
      description: Καθορίζει το πρότυπο σπειρώματος του άξονα του πεντάλ που βιδώνεται
        στον βραχίονα του στροφάλου.
    pedal_type:
      name: Τύπος πεντάλ
      description: Περιγράφει το στυλ των πεταλιών Supply με το ποδήλατο, υποδεικνύοντας
        τη συμβατότητα των παπουτσιών και το στυλ οδήγησης.
    pellet_accessory_type:
      name: Τύπος αξεσουάρ σφαιριδίων
      description: Προσδιορίζει το συγκεκριμένο είδος αξεσουάρ pellet, ώστε οι ψαράδες
        να μπορούν να εντοπίζουν γρήγορα τρυπάνια, μπάντες ή στοπ ανάλογα με τις ανάγκες
        κατασκευής της εξέδρας τους.
    pellet_grade:
      name: Ποιότητας σφαιριδίων
      description: Υποδεικνύει την ακρίβεια κατασκευής ή τον βαθμό απόδοσης των σφαιριδίων
        airsoft.
    pen_ink_color:
      name: Μελάνι στυλό χρώμα
      description: Υποδεικνύει το πραγματικό χρώμα μελανιού που διανέμεται από την
        πένα, το οποίο μπορεί να διαφέρει από το εξωτερικό χρώμα του σώματος.
    penalty_card_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ κάρτας πέναλτι
      description: Αναφέρει τα πρόσθετα αξεσουάρ διαιτησίας που περιλαμβάνονται στην
        κάρτα ποινής, όπως ψηφιακό πορτοφόλι, μπλοκ σκορ, μολύβι, κέρμα, σφυρίχτρα
        ή θήκη.
    penalty_card_colors_included:
      name: Περιλαμβάνονται χρωματιστές κάρτες ποινής
      description: Εμφανίζει τα Colors της κάρτας ποινής που περιέχεται στο σετ προϊόντων.
    penalty_flag_throw_distance:
      name: Απόσταση ρίψης σημαίας πέναλτι
      description: Ταξινόμηση σχεδιασμού που υποδεικνύει την προβλεπόμενη εμβέλεια
        ρίψης της σημαίας.
    pendant_cutter_safety_features:
      name: Χαρακτηριστικά ασφαλείας κοπτικού κρεμαστού κοσμήματος
      description: Προσδιορίζει ενσωματωμένα στοιχεία ασφαλείας που μειώνουν τα τυχαία
        κοψίματα κατά τη μεταφορά/φθορά.
    pendant_cutter_wear_method:
      name: Μέθοδος φθοράς κοπτικού μενταγιόν
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να μεταφέρεται ή να
        φοριέται το κρεμαστό κόπτη.
    pepper_variety:
      name: Ποικιλία πιπεριάς
      description: Καθορίζει την ποικιλία ή το είδος πιπεριάς που χρησιμοποιείται
        στο προϊόν, επιτρέποντας στον αγοραστή να διακρίνει μεταξύ διαφορετικών γευστικών
        προφίλ και επιπέδων καυστικότητας.
    percussion_case_style:
      name: Στυλ θήκης κρουστών
      description: Ταξινομεί το συνολικό στυλ/κατασκευή της θήκης (μαλακή τσάντα vs
        σκληρή/άκαμπτη θήκη vs υβριδική).
    percussion_instruments_included:
      name: Περιλαμβάνονται κρουστά όργανα
      description: Παραθέτει τους τύπους κρουστών οργάνων που περιλαμβάνονται όταν
        το προϊόν είναι ένα σετ παιχνιδιών με πολλά όργανα.
    percussion_mallet_handle_grip_style:
      name: Κρουστικό σφυρί λαβής (προσδιοριστικό οντότητας) στυλ λαβής
      description: Προσδιορίζει τον τύπο της λαβής σενάριο δοκιμής στη λαβή (προσδιοριστικό
        οντότητας) (Beyond texture), όπως γυμνό ξύλο, λακαρισμένο, λαστιχένια λαβή
        ή περιτύλιγμα.
    percussion_mallet_head_construction:
      name: Κατασκευή κεφαλής σφυριού κρούσης
      description: Περιγράφει το στυλ κατασκευής της κεφαλής του σφυριού (π.χ. τυλιγμένο
        νήμα, τσόχα τυλιγμένο, καουτσούκ, ακατέργαστο ξύλο), το οποίο Impact τον ήχο
        και την ανθεκτικότητα.
    perfumery_base_carrier_type:
      name: Βάση αρωματοποιίας μεταφορέας τύπου
      description: Καθορίζει το σύστημα μεταφορέας/διαλύτη μιας βάσης αρωματοποιίας
        (από τι αποτελείται κυρίως η βάση για αραίωση και απόδοση).
    perfumery_base_intended_application:
      name: Προβλεπόμενη εφαρμογή βάσης αρώματος
      description: Υποδεικνύει τη μορφή τελικής χρήσης για την οποία έχει σχεδιαστεί
        η βάση (π.χ., σπρέι λεπτού αρώματος έναντι roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Συστατικό αρωματοποιίας μεταφορέας/solvent
      description: Προσδιορίζει τον μεταφορέα/διαλύτη στον οποίο ανήκει το συστατικό.
        Supply το προϊόν, εάν είναι αραιωμένο (π.χ. αιθανόλη, DPG, έλαιο jojoba).
    perfumery_ingredient_form:
      name: Μορφή συστατικού αρωματοποιίας
      description: Καθορίζει τη φυσική μορφή/κατάσταση του συστατικού αρωματοποιίας
        ως Supply.
    perfumery_ingredient_type:
      name: Τύπος συστατικού αρωματοποιίας
      description: Ταξινομεί το συστατικό της αρωματοποιίας με βάση αυτό που είναι
        στην αρωματοποιία (π.χ. αιθέριο έλαιο, αρωματική χημική ουσία).
    perfumery_ingredient_usage_note:
      name: Σημείωση για τη χρήση συστατικών αρωματοποιίας
      description: Υποδεικνύει τον τυπικό ρόλο σε μια αρωματική δομή (κορυφή, μέση/καρδιά,
        βάση), αναγνωρίζοντας ότι τα υλικά μπορούν να εκτείνονται σε νότες.
    perfumery_ingredients:
      name: Συστατικά αρωματοποιίας
      description: Παραθέτει τους τύπους αναλώσιμων αρωματικών υλικών που περιλαμβάνονται
        στο κιτ (π.χ. αιθέρια έλαια, αρωματικά έλαια, βάση αλκοόλης).
    perfumery_note_position:
      name: Θέση νότας αρωματοποιίας
      description: Υποδεικνύει τον τυπικό ρόλο του συστατικού σε μια δομή αρώματος
        (κορυφή/καρδιά/βάση).
    persimmon_variety:
      name: Ποικιλία λωτού
      description: Προσδιορίζει την καλλιέργεια ή την ποικιλία του λωτού, καθώς διαφορετικές
        ποικιλίες όπως η Fuyu ή η Hachiya διαφέρουν ως προς την υφή, τη γεύση, τη
        στυφότητα και τη μαγειρική χρήση.
    personalization_type:
      name: Τύπος εξατομίκευσης
      description: Καθορίζει εάν και πώς το προϊόν μπορεί να προσαρμόζω για Events
        (π.χ. μονόγραμμα, όνομα/ημερομηνία, ένθετο φωτογραφίας).
    phonics_focus:
      name: Εστίαση στη φωνητική
      description: Καθορίζει ποια φωνητική και ανάγνωση λέξεων δεξιότητα στοχεύει
        το παιχνίδι ανάγνωσης.
    physalis_variety:
      name: Ποικιλία Physalis
      description: Προσδιορίζει το συγκεκριμένο βοτανικό είδος, την ποικιλία ή την
        κοινή ποικιλία φυσαλίδας που πωλείται.
    pi_ata_filler_type_included:
      name: Περιλαμβάνεται τύπος πλήρωσης πινιάτας
      description: Εάν περιλαμβάνεται πληρωτικό, παρέχεται ο τύπος Περιεχόμενου.
    pi_ata_hanging_method:
      name: Μέθοδος κρεμάσματος πινιάτας
      description: Πώς έχει σχεδιαστεί η πινιάτα για να κρεμιέται ή να στηρίζεται
        (περιλαμβάνει θηλιά, γάντζο, συμβολοσειρά, κ.λπ.).
    pi_ata_opening_type:
      name: Τύπος ανοίγματος πινιάτας
      description: Πώς γίνεται η πρόσβαση/κλείσιμο του ανοίγματος πλήρωσης (κλείδα,
        Velcro, φερμουάρ, προσφράγιση κ.λπ.).
    piccolo_key_system:
      name: Σύστημα κλειδιών Piccolo
      description: Προσδιορίζει το σύστημα/σχεδιασμό κλειδιών που χρησιμοποιείται
        στο πίκολο (συνήθως το σύστημα Boehm για τα σύγχρονα πίκολο).
    piccolo_keywork_features:
      name: Χαρακτηριστικά Piccolo keywork
      description: Καθορίζει αξιοσημείωτους μηχανισμούς και επιλογές πλήκτρων στο
        piccolo.
    pick_grip_aid:
      name: Βοήθημα λαβής pick
      description: Υποδεικνύει το κύριο ενσωματωμένο βοήθημα λαβής στην πένα. Beyond
        τη γενική αίσθηση/υφή της επιφάνειας (π.χ. οπές λαβής, ανάγλυφο λογότυπο,
        ένθετο από καουτσούκ).
    pickleball_construction_type:
      name: Τύπος κατασκευής pickleball
      description: Κατασκευή της μπάλας, όπως μονοκόμματη ή συγκολλημένη δύο τεμαχίων
        χωρίς ραφή, η οποία Impact την ανθεκτικότητα και τη συνέπεια της πτήσης.
    pickling_method:
      name: Μέθοδος τουρσί
      description: Καθορίζει το μέσο ή την τεχνική συντήρησης που χρησιμοποιείται
        για την παρασκευή τουρσί, όπως άλμη με ξίδι ή γαλακτοζύμωση.
    pickup_and_preamp_configuration:
      name: παραλαβή and preamp configuration
      description: Υποδεικνύει εάν το Viola περιλαμβάνει στάδιο εξοικείωσης παραλαβή
        ή/και ενεργό προενισχυτή για ενισχυμένη απόδοση ή εγγραφή.
    pickup_configuration:
      name: Διαμόρφωση μαγνητών
      description: Περιγράφει τη γενική διάταξη των μαγνητών μιας ηλεκτρικής κιθάρας
        χρησιμοποιώντας κοινές συντομογραφίες (π.χ. SSS, HSS, HH).
    pickup_cover_material:
      name: Υλικό κάλυψης μαγνήτη
      description: Καθορίζει το κύριο υλικό του καλύμματος του μαγνήτη (εάν υπάρχει),
        συμπεριλαμβανομένων των συνηθισμένων επιμεταλλωμένων φινιρισμάτων, όταν αυτό
        ορίζεται από τον κατασκευαστή.
    pickup_cover_type:
      name: Τύπος καλύμματος μαγνήτη
      description: Προσδιορίζει αν ένας μαγνήτης ηλεκτρικής κιθάρας διαθέτει κάλυμμα,
        καθώς και το υλικό και το στιλ του (π.χ. μέταλλο ή πλαστικό).
    pickup_string_spacing:
      name: Διάστημα μεταξύ των χορδών του μαγνήτη
      description: Το πρότυπο απόστασης μεταξύ πόλων και χορδών για το οποίο έχει
        σχεδιαστεί ο μαγνήτης (π.χ. Fender/F-spaced έναντι Gibson/standard), το οποίο
        επηρεάζει την ευθυγράμμιση σε κιθάρες με tremolo.
    pie_crust_type:
      name: Τύπος ζύμης για πίτα
      description: Καθορίζει το στιλ ή τον τύπο της ζύμης που χρησιμοποιείται για
        την πίτα ή την τάρτα, όπως φύλλο ζύμης, μπισκότο γκράχαμ ολικής ή ζύμη χωρίς
        γλουτένη.
    piece_configuration:
      name: Σύνθεση κομματιού
      description: Δείχνει από πόσα ξεχωριστά μέρη αποτελείται η στέκα, ο σωλήνας
        ή η γέφυρα, γεγονός που επηρεάζει τη φορητότητα και τον τρόπο παιχνιδιού.
    pillow_form_size:
      name: Μέγεθος μαξιλαριού
      description: Τυποποιημένη ονομασία τελικού μεγέθους για μαξιλάρια/εσωτερικά
        μαξιλαριών (π.χ. 18" x 18").
    pilot_helmet_communications_integration:
      name: Ενσωμάτωση συστημάτων επικοινωνίας στο κράνος πιλότου
      description: Δείχνει αν το κράνος περιλαμβάνει ή είναι προδιαμορφωμένο για εξαρτήματα
        επικοινωνίας αεροπορίας.
    pilot_helmet_visor_configuration:
      name: Διαμόρφωση της μάσκας του κράνους πιλότου
      description: Καθορίζει τον τύπο της μάσκας/προστατευτικού προσώπου που περιλαμβάνεται
        στο κράνος του πιλότου.
    pin_attachment_type:
      name: Τύπος στερέωσης πείρου
      description: Καθορίζει τον μηχανισμό στερέωσης που χρησιμοποιείται για την τοποθέτηση
        της καρφίτσας σε ρούχα ή σε κάποια επιφάνεια (π.χ. κούμπωμα πεταλούδας, μαγνητική
        βάση).
    pin_backing_type:
      name: Τύπος βάσης πείρου
      description: Προσδιορίζει τον μηχανισμό στερέωσης/υποστήριξης που χρησιμοποιείται
        για τη στερέωση της καρφίτσας σε ρούχα ή αξεσουάρ.
    pin_cushion_attachment_style:
      name: Τύπος στερέωσης για μαξιλαράκι καρφιτσών
      description: Πώς φοριέται, στερεώνεται ή τοποθετείται το μαξιλαράκι για καρφίτσες
        κατά τη χρήση.
    pin_cushion_features:
      name: Χαρακτηριστικά του μαξιλαριού για καρφίτσες
      description: Λειτουργικά χαρακτηριστικά εκτός της βασικής στήριξης καρφίτσας.
    pin_face_customization_method:
      name: Μέθοδος προσαρμογής της πρόσοψης της κονκάρδας
      description: Καθορίζει τον τρόπο δημιουργίας της μπροστινής όψης (π.χ. σκληρός
        σμάλτος, μαλακός σμάλτος, εκτύπωση).
    pin_type:
      name: Τύπος κονκάρδας
      description: Καθορίζει το στιλ ή τη μορφή της κονκάρδας που χρησιμοποιείται
        για συλλεκτικά αντικείμενα αθλητικών οπαδών.
    ping_pong_certification:
      name: Πιστοποίηση πινγκ-πονγκ
      description: Αναφέρει το επίσημο πρότυπο ή το επίπεδο έγκρισης του αρμόδιου
        φορέα για το προϊόν.
    ping_pong_competition_certification:
      name: Πιστοποίηση διαγωνισμού πινγκ-πονγκ
      description: Δείχνει την επίσημη πιστοποίηση της μπάλας πινγκ-πονγκ για επίσημους
        αγώνες (π.χ. εγκεκριμένη από την ITTF).
    ping_pong_paddle_handle_style:
      name: Σχέδιο λαβής ρακέτας πινγκ πονγκ
      description: Καθορίζει το σχήμα και το στιλ της λαβής της ρακέτας, τα οποία
        επηρεάζουν την άνεση στο κράτημα και την τεχνική του παιχνιδιού.
    ping_pong_robot_accessory_type:
      name: Τύπος εξαρτήματος ρομπότ πινγκ-πονγκ
      description: Προσδιορίζει τον λειτουργικό υποτύπο του αξεσουάρ, ώστε οι αγοραστές
        να μπορούν να περιορίσουν γρήγορα τα αποτελέσματα (π.χ. δίχτυα έναντι τροφοδοτικών).
    ping_pong_rubber_surface_type:
      name: Τύπος επιφάνειας καουτσούκ πινγκ πονγκ
      description: Προσδιορίζει το στιλ/την υφή της επιφάνειας από καουτσούκ που έχει
        τοποθετηθεί στη ρακέτα, επηρεάζοντας τα χαρακτηριστικά περιστροφής και ταχύτητας.
    ping_pong_rubber_type:
      name: Τύπος καουτσούκ για πινγκ πονγκ
      description: Καθορίζει τον τρόπο κατασκευής της επιφάνειας ενός καουτσούκ πινγκ-πονγκ,
        ο οποίος επηρεάζει τα χαρακτηριστικά του παιχνιδιού.
    ping_pong_table_type:
      name: Τύπος τραπεζιού πινγκ-πονγκ
      description: Κατηγοριοποιεί το γενικό στιλ ή τη μορφή του τραπεζιού για ευκολότερη
        σύγκριση (π.χ. διαγωνισμός, επιφάνεια, μίνι).
    pipe_instrument_voicing_sound_production_method:
      name: Ρύθμιση ήχου πνευστών οργάνων/μέθοδος παραγωγής ήχου
      description: Καθορίζει τον τρόπο με τον οποίο το όργανο παράγει ήχο (μηχανισμός
        ροής αέρα), βοηθώντας στη διάκριση μεταξύ των οικογενειών φλάουτων, πνευστών
        με γλωττίδα και σωλήνων οργάνου στα φίλτρα.
    piston_application_type:
      name: Τύπος εφαρμογής εμβόλου
      description: Προβλεπόμενη χρήση του εμβόλου (αντικατάσταση, αγωνιστική χρήση
        ή βαριά χρήση).
    piston_crown_dish_style:
      name: Σχήμα κορυφής/κοιλότητας του εμβόλου
      description: Το σχήμα της κορυφής του εμβόλου που επηρεάζει τον όγκο του θαλάμου
        καύσης και τη συμπίεση (π.χ. επίπεδη κορυφή, θολωτή, κοίλη).
    piston_pin_retention_type:
      name: Τύπος συγκράτησης πείρου εμβόλου
      description: Προσδιορίζει τον τρόπο με τον οποίο ο πείρος του καρπού (εμβόλου)
        συγκρατείται στο συγκρότημα εμβόλου/συνδετικής ράβδου.
    pit_configuration:
      name: Διαμόρφωση pit
      description: Καθορίζει τη δομική μορφή της περιοχής προσγείωσης (ενιαία ή πολυμορφική)
        και, κατά συνέπεια, τον αριθμό των τμημάτων ή των μονάδων που παρέχονται.
    pit_cover_type:
      name: Τύπος καλύμματος pit
      description: Καθορίζει την προστατευτική επιφάνεια ή το κάλυμμα που παρέχεται
        μαζί με τον χώρο προσγείωσης, επηρεάζοντας την αντοχή στα καρφιά των παπουτσιών,
        την προστασία από τις καιρικές συνθήκες και τις προτιμήσεις των αθλητών.
    pitahaya_flesh_color:
      name: Χρώμα σάρκας της πιτάγιας
      description: Καθορίζει το χρώμα της εσωτερικής σάρκας της πιτάγιας (dragon fruit)
        (π.χ. λευκή, κόκκινη, ματζέντα), το οποίο αποτελεί βασικό χαρακτηριστικό διαφοροποίησης
        και επηρεάζει τη γεύση, την εμφάνιση και την εικόνα της θρεπτικής της αξίας.
    pitch_mat_coverage_length:
      name: Μήκος επιφάνειας κάλυψης του στρώματος προσγείωσης
      description: Κατηγοριοποιεί το στρώμα του γηπέδου κρίκετ ανάλογα με το τμήμα
        του wicket που καλύπτει (π.χ. ολόκληρο ή μισό γήπεδο).
    pitch_range:
      name: Τονικό εύρος
      description: Περιγράφει το αντιλαμβανόμενο τονικό εύρος/τη φωτεινότητα του ήχου
        του shaker.
    pitch_standard:
      name: Πρότυπο κουρδίσματος
      description: Καθορίζει το πρότυπο κουρδίσματος (κούρδισμα αναφοράς) για το οποίο
        έχει κατασκευαστεί η φλογέρα (π.χ. A=440, A=442, A=415)
    pitching_rubber_size_designation:
      name: Κατηγορία μεγέθους της πλάκας ρίψης
      description: Υποδεικνύει την τυπική κατηγορία μεγέθους της πλάκας ρίψης, διευκολύνοντας
        την επιλογή χωρίς να χρειάζεται οι αγοραστές να γνωρίζουν τις ακριβείς διαστάσεις.
    pitching_screen_style:
      name: Τύπος προστατευτικού διχτυού ρίψης
      description: Καθορίζει τον σχεδιασμό του προστατευτικού διχτυού, ώστε οι αγοραστές
        να μπορούν να επιλέγουν γρήγορα τη σωστή διάταξη προστασίας για το προπονητικό
        τους σενάριο.
    pitching_target_design:
      name: Σχεδιασμός στόχου ρίψης
      description: Κατηγοριοποιεί το συνολικό στυλ ή τη διαμόρφωση του στόχου ρίψης.
    pitching_wheel_count:
      name: Αριθμός τροχών εκτόξευσης
      description: Υποδεικνύει τον αριθμό των τροχών εκτόξευσης που χρησιμοποιεί η
        μηχανή ρίψης.
    pivot_adjustability:
      name: Ρυθμιζόμενος άξονας σύνδεσης
      description: Υποδεικνύει αν το ψαλίδι διαθέτει ρυθμιζόμενη βίδα στον άξονα σύνδεσης
        για τη ρύθμιση της τάσης κοπής.
    pivot_piece_type:
      name: Τύπος εξαρτήματος περιστροφής
      description: Διακρίνει τους διαφορετικούς τύπους εξαρτημάτων περιστροφής που
        παρέχονται, όπως παραδοσιακά κυπελλοειδή εξαρτήματα ή εξαρτήματα τύπου σωλήνα.
    place_card_holder_closure_mechanism:
      name: Μηχανισμός συγκράτησης καρτών θέσης
      description: Καθορίζει τον τρόπο με τον οποίο η βάση συγκρατεί ή ασφαλίζει την
        κάρτα.
    place_card_orientation:
      name: Προσανατολισμός των καρτών θέσης
      description: Καθορίζει τον προσανατολισμό της κάρτας θέσης όταν χρησιμοποιείται/εμφανίζεται.
    place_card_printing_status:
      name: Κατάσταση εκτύπωσης καρτών θέσης
      description: Δείχνει αν η κάρτα θέσης είναι κενή για χειρόγραφη/τυπωμένη γραφή,
        προτυπωμένη (χωρίς εξατομικευμένα ονόματα) ή εξατομικευμένη/με ειδική εκτύπωση.
    placket_type:
      name: Τύπος πατιλέτας
      description: Καθορίζει το στιλ του μπροστινού ανοίγματος στο πόλο, συμπεριλαμβανομένου
        του αριθμού κουμπιών ή εναλλακτικών τρόπων κλεισίματος.
    planetarium_content_theme:
      name: Θεματολογία περιεχομένου πλανητάριου
      description: Καθορίζει το βασικό περιεχόμενο που προβάλλεται από τον προβολέα
        πλανητάριου.
    planetarium_projection_content_format:
      name: Τύπος περιεχομένου προβολής πλανητάριου
      description: Καθορίζει τον μηχανισμό προβολής περιεχομένου που χρησιμοποιεί
        το πλανητάριο (φυσικοί δίσκοι/διαφάνειες έναντι ψηφιακών ή LED εφέ)
    plant_fiber_type:
      name: Τύπος φυτικής ίνας
      description: Καθορίζει τον συγκεκριμένο τύπο ίνας φυτικής προέλευσης όταν ο
        τύπος προέλευσης της κοντής ίνας (staple fiber) είναι φυτικός.
    plaster_gauze_finish:
      name: Τελικό φινίρισμα γάζας γύψου
      description: Περιγράφει την τελική υφή ή εμφάνιση της επιφάνειας μετά την εφαρμογή
        και την εξομάλυνση της γάζας γύψου.
    plaster_gauze_grade:
      name: Κατηγορία χρήσης γάζας γύψου
      description: Καθορίζει την κατηγορία χρήσης της γάζας γύψου (π.χ. για χειροτεχνία/εκπαιδευτική
        χρήση ή επαγγελματική χρήση).
    plaster_gauze_weave_density:
      name: Πυκνότητα ύφανσης γάζας γύψου
      description: Η σχετική αραιότητα ή πυκνότητα της ύφανσης της γάζας, η οποία
        επηρεάζει την αντοχή και την απορρόφηση του γύψου.
    plastic_canvas_finish:
      name: Φινίρισμα πλαστικού καμβά
      description: Επεξεργασία επιφάνειας/φινιρίσματος του ρολού πλαστικού καμβά.
    plastic_canvas_sheet_finish:
      name: Τελική επιφάνεια φύλλου πλαστικού καμβά
      description: Επεξεργασία επιφάνειας/άκρων του φύλλου πλαστικού καμβά.
    plastic_canvas_transparency:
      name: Διαφάνεια πλαστικού καμβά
      description: Πόσο διαφανής ή αδιαφανής είναι ο πλαστικός καμβάς.
    plate_bottom_design:
      name: Σχεδιασμός κάτω επιφάνειας της βάσης
      description: Περιγράφει την κατασκευή της κάτω πλευράς της βάσης, η οποία επηρεάζει
        την πρόσφυση, τη σταθερότητα και την ασφάλεια σε διαφορετικές επιφάνειες παιχνιδιού.
    plate_compatibility_standard:
      name: Τυποποιημένο σύστημα συμβατότητας πλακέτας
      description: Υποδεικνύει το πρότυπο πλάκας βάρους για το οποίο έχει σχεδιαστεί
        η μπάρα (π.χ. Ολυμπιακό 50 mm, Τυπικό 25 mm).
    plate_installation_type:
      name: Τύπος εγκατάστασης της βάσης
      description: Καθορίζει τον τρόπο με τον οποίο η βάση στερεώνεται ή τοποθετείται
        στο γήπεδο (π.χ. ενσωματωμένη στο έδαφος, με καρφιά ή φορητή throw-down),
        επιτρέποντας στους αγοραστές να επιλέγουν μεταξύ μόνιμων και φορητών επιλογών.
    plate_size_category:
      name: Κατηγορία μεγέθους πλακέτας
      description: Κατηγοριοποιεί τη βάση ανάλογα με το επίπεδο παιχνιδιού ή το πρότυπο
        κανονισμών, ώστε οι αγοραστές να μπορούν να εντοπίζουν γρήγορα εξοπλισμό συμβατό
        με τις απαιτήσεις της εκάστοτε λίγκας
    play_dough_putty_kit_contents:
      name: Περιεχόμενα σετ πλαστελίνης και πάστας
      description: Καθορίζει τα βασικά εξαρτήματα που περιλαμβάνονται πέρα από το
        ίδιο το υλικό (π.χ. εργαλεία, καλούπια, εξηλάτης, αποθηκευτικά δοχεία).
    play_dough_tool_set_items_included:
      name: Εργαλεία που περιλαμβάνονται στο σετ πλαστελίνης
      description: Καθορίζει τους τύπους εργαλείων και αξεσουάρ που περιλαμβάνονται
        σε ένα σετ εργαλείων πλαστελίνης (π.χ. πλάστες, κοπτικά, καλούπια).
    play_environment_suitability:
      name: Καταλληλότητα ανά περιβάλλον παιχνιδιού
      description: Καθορίζει το προβλεπόμενο περιβάλλον παιχνιδιού για το σετ (π.χ.
        εσωτερικός χώρος, εξωτερικός χώρος, νερό).
    play_food_features:
      name: Χαρακτηριστικά παιχνιδιών τροφίμων
      description: Ειδικά λειτουργικά χαρακτηριστικά ή χαρακτηριστικά ρεαλισμού των
        παιχνιδιών τροφίμων.
    play_food_items_included:
      name: Περιλαμβάνονται τρόφιμα-παιχνίδια
      description: Αναφέρει τα είδη των παιχνιδιών-τροφίμων που περιλαμβάνονται στο
        σετ κουζίνας.
    play_food_size_scale:
      name: Κλίμακα μεγέθους των παιχνιδιών τροφίμων
      description: Υποδεικνύει την κατά προσέγγιση κλίμακα μεγέθους των κομματιών
        παιχνιδιού τροφίμων, ώστε να είναι συμβατά με παιδικές κουζίνες, κούκλες και
        σετ παιχνιδιού.
    play_money_set_components_included:
      name: Περιλαμβάνονται χρήματα σετ παιχνιδιού
      description: Καθορίζει ποιοι τύποι στοιχείων περιλαμβάνονται στο σετ εικονικών
        χρημάτων/τραπεζικών συναλλαγών.
    play_pattern:
      name: Μοτίβο παιχνιδιού
      description: Ο κύριος τρόπος χρήσης του παιχνιδιού (π.χ. παιχνίδι για να απασχολεί
        τα χέρια/αντιμετώπιση του στρες, διακοσμητικό γραφείου/έργο τέχνης, κατασκευή/οικοδόμηση
        ή παζλ).
    play_sprinkler_mounting_type:
      name: Παιχνίδι τύπου ψεκαστήρα
      description: Πώς τοποθετείται/στερεώνεται ο ψεκαστήρας κατά τη χρήση.
    play_vehicle_lights_and_sounds:
      name: Παιχνίδια φώτων και ήχων οχημάτων
      description: Δείχνει αν το παιχνίδι-αυτοκίνητο διαθέτει ηλεκτρονικά εφέ, όπως
        φώτα ή/και ήχους.
    play_vehicle_scale:
      name: Κλίμακα μεγέθους οχήματος παιχνιδιού
      description: Δείχνει την κλίμακα του οχήματος παιχνιδιού (χρησιμοποιείται συνήθως
        για οχήματα-παιχνίδια τύπου die-cast και μοντέλα).
    player_size_category:
      name: Κατηγορία μεγέθους πλακέτας
      description: Καθορίζει το προβλεπόμενο μέγεθος/ηλικιακή κατηγορία παίκτη για
        την οποία είναι κατάλληλο το σετ εξοπλισμού catcher (π.χ. Tee Ball, Youth,
        Intermediate, Adult).
    player_size_range:
      name: Εύρος μεγέθους παίκτη
      description: Καθορίζει το προβλεπόμενο εύρος μεγέθους χρήστη για τον ιμάντα/στήριγμα
        (π.χ. παιδικό, ενηλίκων, universal)
    playing_environment:
      name: Περιβάλλον παιχνιδιού
      description: Καθορίζει την κύρια επιφάνεια ή το περιβάλλον παιχνιδιού για το
        οποίο έχει σχεδιαστεί η μπάλα χόκεϊ.
    playing_method:
      name: Τρόπος παιχνιδιού
      description: Καθορίζει τον βασικό τρόπο με τον οποίο προορίζεται να παίζεται
        ή να ενεργοποιείται το όργανο.
    playing_surface_material:
      name: Υλικό επιφάνειας παιχνιδιού
      description: Αναφέρεται στο υλικό της μπροστινής επιφάνειας του cajon (tapa),
        το οποίο επηρεάζει σημαντικά τον ήχο και την αίσθηση.
    playing_surface_type:
      name: Τύπος επιφάνειας παιχνιδιού
      description: Περιγράφει τη δομή και την αίσθηση της επιφάνειας παιχνιδιού του
        μαξιλαριού εξάσκησης.
    playset_activities_included:
      name: Οι δραστηριότητες του σετ παιχνιδιού περιλαμβάνουν
      description: Προσδιορίζει τις κύριες δραστηριότητες/στοιχεία παιχνιδιού που
        περιλαμβάνονται στην κούνια ή στο παιδικό πάρκο, ώστε να βοηθήσει τους αγοραστές
        να φιλτράρουν τα αποτελέσματα με βάση τις δραστηριότητες που μπορούν να κάνουν
        τα παιδιά στην κατασκευή.
    playset_installation_type:
      name: Τύπος εγκατάστασης σετ παιχνιδιού
      description: Περιγράφει τον τρόπο εγκατάστασης ή στερέωσης της κούνιας ή του
        παιδικού παιχνιδιού.
    playset_items_included:
      name: Περιλαμβάνονται προϊόντα σετ παιχνιδιού
      description: Προσδιορίζει τα είδη των αντικειμένων για παιχνίδι ρόλων που περιλαμβάνονται
        στο σετ πικνίκ (φαγητό, σερβίτσια, κουβέρτα, καλάθι κ.λπ.).
    pliers_jaw_style:
      name: Τύπος σιαγόνας πένσας
      description: Περιγράφει τη βασική διαμόρφωση των σιαγόνων ή το λειτουργικό στυλ
        της πένσας.
    plum_variety:
      name: Ποικιλία δαμάσκηνου
      description: Καθορίζει τη συγκεκριμένη καλλιεργούμενη ποικιλία δαμάσκηνου, επιτρέποντας
        στους αγοραστές να επιλέγουν με βάση τη γεύση, το χρώμα και τη γαστρονομική
        χρήση.
    plumcot_variety:
      name: Ποικιλία πλουμκότ
      description: Καθορίζει τη συγκεκριμένη καλλιεργούμενη ή εμπορική ποικιλία του
        plumcot (π.χ. Flavor King, Dapple Dandy), η οποία μπορεί να επηρεάζει τη γεύση,
        το χρώμα και την εποχικότητα.
    plunger_mute_handle_type:
      name: Τύπος λαβής της σουρντίνας
      description: Καθορίζει τον τύπο λαβής ή κρατήματος που χρησιμοποιείται για τον
        χειρισμό της σουρντίνας τύπου plunger, ώστε να παράγονται εφέ wa-wa.
    pocket_closure_type:
      name: Τύπος κλεισίματος τσέπης
      description: Καθορίζει τον τρόπο με τον οποίο ασφαλίζεται κάθε τσέπη, βοηθώντας
        τους χρήστες να επιλέγουν παντελόνια με ασφαλή αποθήκευση κατά τη διάρκεια
        δραστηριοτήτων.
    pocket_knife_opening_mechanism:
      name: Μηχανισμός ανοίγματος σουγιά
      description: Καθορίζει τον τρόπο με τον οποίο ανοίγει/αναπτύσσεται η λεπίδα
        (π.χ. εγκοπή νυχιού για χειροκίνητο άνοιγμα, thumb stud, flipper, υποβοηθούμενο
        ή αυτόματο άνοιγμα).
    pocket_style:
      name: Τύπος τσέπης
      description: Καθορίζει τον βασικό τύπο κατασκευής τσέπης που διαθέτει το παντελόνι.
    pocket_type:
      name: Τύπου τσέπης
      description: Καθορίζει το στυλ ή την ύπαρξη τσεπών στο ένδυμα.
    pod_retention_system:
      name: Σύστημα συγκράτησης κάψουλας
      description: Περιγράφει τον τρόπο με τον οποίο οι κάψουλες paintball συγκρατούνται
        και απελευθερώνονται από τη ζώνη ή το σακίδιο μεταφοράς.
    pogo_stick_footrest_type:
      name: Τύπος υποπόδιου του παιχνιδιού άλματος με ελατήριο
      description: Περιγράφει τον σχεδιασμό της πλατφόρμας ή των υποποδίων πάνω στα
        οποία στέκεται ο χρήστης στο παιχνίδι άλματος με ελατήριο.
    pogo_stick_suspension_type:
      name: Τύπος ανάρτησης παιχνιδιού άλματος με ελατήριο
      description: Καθορίζει τον μηχανισμό επαναφοράς του παιχνιδιού άλματος με ελατήριο,
        ο οποίος επηρεάζει την αίσθηση, την αντοχή και τη συντήρηση.
    poi_handle_type:
      name: Τύπος λαβής ποϊ
      description: Καθορίζει τον τύπο λαβής/χειρολαβής/πρόσδεσης που χρησιμοποιείται
        για το κράτημα του poi.
    poi_light_source:
      name: Πηγή φωτός poi
      description: Για φωτιζόμενα poi, καθορίζει την τεχνολογία φωτισμού.
    poi_tether_type:
      name: Τύπος πρόσδεσης poi
      description: Υποδεικνύει τον τύπο του ιμάντα/σχοινιού που συνδέει την κεφαλή
        του poi με τη λαβή, το πόμολο ή τη θηλιά καρπού (π.χ. κορδόνι, σχοινί, αλυσίδα).
    poi_type:
      name: Τύπος poi
      description: Καθορίζει τον βασικό τύπο κατασκευής/χρήσης του poi (π.χ. προπόνησης,
        LED, φωτιάς).
    point_type:
      name: Τύπος αιχμής
      description: Σχήμα ή στυλ της αιχμής που χρησιμοποιείται στη βελόνα κεντήματος.
    pointe_shoe_shank_length:
      name: Μήκος σόλας πουέντ
      description: Τμήμα του μήκους του παπουτσιού που υποστηρίζεται από τον κορμό
        (shank), όπως πλήρες ή 3/4 μήκος.
    pointe_shoe_shank_strength:
      name: Σκληρότητα κορμού παπουτσιού pointe
      description: Επίπεδο ακαμψίας του κορμού ενός παπουτσιού pointe, το οποίο επηρεάζει
        την υποστήριξη και τον χρόνο «στρωσίματος».
    poker_accessory_storage_included:
      name: Αποθηκευτικός χώρος για αξεσουάρ πόκερ που περιλαμβάνεται
      description: Καθορίζει ποια επιπλέον αντικείμενα πόκερ διαθέτουν ειδικό χώρο
        αποθήκευσης στο αξεσουάρ.
    poker_chip_tray_rack_configuration:
      name: Διαμόρφωση δίσκου ή θήκης για μάρκες πόκερ
      description: Περιγράφει τον τρόπο εσωτερικής οργάνωσης ενός δίσκου/θήκης μαρκών
        (σειρές και χωρητικότητα ανά σειρά).
    pole_anchoring_method:
      name: Μέθοδος αγκύρωσης στύλου
      description: Καθορίζει τον τρόπο με τον οποίο ο στύλος στερεώνεται στο έδαφος
        ή στην επιφάνεια παιχνιδιού.
    pole_basket_type:
      name: Τύπος καλαθιού στύλου
      description: Κατηγοριοποιεί το στυλ ή το μέγεθος του καλαθιού που τοποθετείται
        κοντά στην άκρη του μπαστουνιού του σκι, υποδεικνύοντας τις προβλεπόμενες
        συνθήκες χιονιού.
    pole_connection_system:
      name: Σύστημα σύνδεσης του στύλου
      description: Καθορίζει τον μηχανισμό που συνδέει τα τμήματα του στύλου, όπως
        σύστημα με ελαστικό κορδόνι (shock-corded), με σπείρωμα ή τύπου κόμβου (hub),
        βοηθώντας τους χρήστες να αξιολογήσουν την ταχύτητα συναρμολόγησης και τη
        συμβατότητα.
    pole_system_type:
      name: Τύπος συστήματος στύλου
      description: Περιγράφει το δομικό σύστημα στήριξης ή τον τρόπο στησίματος της
        σκηνής (π.χ. αλουμινένιοι στύλοι, φουσκωτοί αεροσωλήνες, στήσιμο με μπαστούνια
        πεζοπορίας).
    police_equipment_fitment:
      name: Συμβατότητα εξοπλισμού αστυνομίας
      description: Καθορίζει τον εξοπλισμό επιβολής του νόμου για τον οποίο το όχημα
        έχει διαμορφωθεί ή προετοιμαστεί καλωδιακά ώστε να τον υποστηρίζει.
    police_vehicle_equipment_package:
      name: Πακέτο εξοπλισμού αστυνομικών οχημάτων
      description: Υποδηλώνει τον ειδικό για την αστυνομία εξοπλισμό που περιλαμβάνεται
        στο όχημα κατά την πώλησή του.
    police_vehicle_light_siren_equipment:
      name: Εξοπλισμός φώτων και σειρήνων αστυνομικών οχημάτων
      description: Αναφέρει ποιες συσκευές προειδοποίησης έκτακτης ανάγκης είναι εγκατεστημένες
        στο περιπολικό.
    police_vehicle_upfit_level:
      name: Επίπεδο εξοπλισμού αστυνομικού οχήματος
      description: Περιγράφει τον ειδικό αστυνομικό εξοπλισμό και τις τροποποιήσεις
        που έχουν εγκατασταθεί στο φορτηγό.
    polish_formulation:
      name: Σύνθεση γυαλιστικού
      description: Υποδηλώνει τη βάση/χημική σύνθεση του γυαλιστικού για την ταστιέρα
        (όχι τον τρόπο εφαρμογής).
    polish_purpose:
      name: Σκοπός χρήσης γυαλιστικού
      description: Το κύριο επιδιωκόμενο αποτέλεσμα του γυαλιστικού στην επιφάνεια
        του εργαλείου.
    pollen_level:
      name: Επίπεδο γύρης
      description: Δείχνει την ποσότητα/πιθανότητα εμφάνισης λεκέδων από γύρη της
        συγκεκριμένης ποικιλίας κρίνου.
    polymer_clay_firmness_level:
      name: Βαθμός σκληρότητας του πολυμερούς πηλού
      description: Σχετική σκληρότητα/μαλακότητα του πολυμερούς πηλού πριν το ψήσιμο
        (επεξεργασιμότητα).
    polymer_clay_translucency:
      name: Η ημιδιαφάνεια του πολυμερούς πηλού
      description: Οπτική αδιαφάνεια/διαφάνεια του πολυμερούς πηλού μετά τη σκλήρυνση.
    pom_pom_handle_style:
      name: Στυλ λαβής πομ πομ
      description: Περιγράφει το στυλ ή τη δομή της λαβής που χρησιμοποιείται για
        να κρατάει κανείς το πομ πομ.
    pom_pom_trim_backing_tape_material:
      name: Υλικό για φόδρα/ταινία με πομ-πομ
      description: Προσδιορίζει το υλικό της ραμμένης ταινίας ή πλεξούδας στην οποία
        είναι στερεωμένα τα πομ-πομ (η βάση της διακοσμητικής λωρίδας).
    pom_pom_type:
      name: Τύπος πομ-πομ
      description: Υποδεικνύει την παρουσία και τον συγκεκριμένο τύπο φούντας ή μπαλίτσας
        (πομ-πομ) στο καπέλο.
    pomegranate_product_form:
      name: Μορφή προϊόντος ροδιού
      description: Περιγράφει τη μορφή στην οποία διατίθεται το προϊόν (ολόκληρο φρούτο,
        αποφλοιωμένοι σπόροι, κουκούτσια, κατεψυγμένοι σπόροι).
    pomegranate_variety:
      name: Ποικιλία ροδιού
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία του ροδιού (π.χ. Wonderful,
        Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Στυλ λαστιχάκι για αλογοουρά
      description: Περιγράφει τη συγκεκριμένη κατασκευή ή το σχήμα του λαστιχένιου
        κορδονιού για την αλογοουρά, ώστε οι αγοραστές να μπορούν να επιλέξουν το
        στυλ που προτιμούν.
    popcorn_form:
      name: Φόρμα για ποπ κορν
      description: Αναφέρεται στη μορφή του προϊόντος ποπ κορν, όπως έτοιμο προς κατανάλωση,
        κόκκοι, συσκευασία για φούρνο μικροκυμάτων, σετ καρυκευμάτων ή μεταλλικό κουτί
        δώρου.
    pork_rind_form:
      name: Μορφή χοιρινού δέρματος
      description: Κατηγοριοποιεί τη μορφή ή το στυλ των σνακ από χοιρινό δέρμα (π.χ.
        δέρμα, τραγανά, puff, σφαιρίδια κ.λπ.).
    portability_features:
      name: Χαρακτηριστικά φορητότητας
      description: Παραθέτει τα ενσωματωμένα στοιχεία που διευκολύνουν τη μετακίνηση,
        τη μεταφορά ή την αποθήκευση της ξαπλώστρας.
    portability_frame_type:
      name: Φορητότητα/Τύπος σκελετού
      description: Είτε τα κρουστά της ορχήστρας είναι φορητού τύπου (με πτυσσόμενο
        σκελετό) είτε σταθερού τύπου (με σκελετό συναυλίας).
    portable_electronic_game_features:
      name: Χαρακτηριστικά φορητών ηλεκτρονικών παιχνιδιών
      description: Βασικά χαρακτηριστικά παιχνιδιού/υλικού που υποστηρίζει η συσκευή.
    post_surgery_stage_suitability:
      name: Καταλληλότητα για τη μετεγχειρητική φάση
      description: Δείχνει για ποιο στάδιο αποκατάστασης (εάν υπάρχει) έχει σχεδιαστεί
        το κορμάκι, κάτι που είναι σημαντικό για όσους αγοράζουν ιατρικά κορμάκια.
    postage_stamp_format:
      name: Μορφή γραμματόσημου
      description: Ο τρόπος παρουσίασης/συσκευασίας του οριστικού γραμματοσήμου (μεμονωμένο,
        ζεύγος, σειρά, μπλοκ, φύλλο, φυλλάδιο, ρολό κ.λπ.).
    postmark_type:
      name: Τύπος σφραγίδας ταχυδρομείου
      description: Τύπος ακύρωσης/σφραγίδα ταχυδρομείου που φέρουν τα χρησιμοποιημένα
        γενικά γραμματόσημα.
    potato_cut_style:
      name: Τρόπος κοπής της πατάτας
      description: Δείχνει τον τρόπο κοπής ή την επεξεργασία των πατατών όταν δεν
        πωλούνται ολόκληρες.
    potato_intended_use:
      name: Προβλεπόμενη χρήση της πατάτας
      description: Χωρίζει τις πατάτες που προορίζονται για άμεση κατανάλωση από εκείνες
        που προορίζονται ως σπόροι ή ως κατεψυγμένα μεταποιημένα προϊόντα.
    potato_variety:
      name: Ποικιλία πατάτας
      description: Αναφέρει την ποικιλία των πατατών, επιτρέποντας στους αγοραστές
        να βρουν συγκεκριμένους τύπους όπως «Yukon Gold», «Maris Piper» ή «Purple
        Majesty».
    pottery_clay_firing_required:
      name: Απαιτείται ψήσιμο πηλού κεραμικής
      description: Εάν το υλικό απαιτεί ψήσιμο σε κλίβανο για να επιτευχθεί η επιθυμητή
        τελική σκληρότητα/φινίρισμα.
    pottery_slip_application_method:
      name: Μέθοδος εφαρμογής κεραμικού πολτού
      description: Καθορίζει την προβλεπόμενη τεχνική εφαρμογής του κεραμικού πολτού.
    pottery_slip_compatible_clay_body:
      name: Μάζα πηλού συμβατή με κεραμικό πολτό
      description: Υποδεικνύει τον τύπο ή τους τύπους πηλού για τους οποίους έχει
        σχεδιαστεί το υλικό επικάλυψης ώστε να ταιριάζει ή να χρησιμοποιείται μαζί
        τους.
    pottery_slip_form:
      name: Μορφή κεραμικού πολτού
      description: Δείχνει αν το προϊόν πωλείται ως έτοιμο προς χρήση υγρό ή ως ξηρό
        μείγμα/σκόνη που απαιτεί ανάμιξη.
    pouch_design:
      name: Σχεδιασμός θήκης
      description: Περιγράφει λεπτομερώς τα χαρακτηριστικά κατασκευής ή βελτίωσης
        της περιοχής της μπροστινής θήκης.
    pouch_style:
      name: Τύπος θήκης
      description: Καθορίζει τον σχεδιασμό της περιοχής της μπροστινής θήκης, λαμβάνοντας
        υπόψη την άνεση, τη στήριξη και τις αισθητικές προτιμήσεις.
    powdered_beverage_variety:
      name: Ποικιλία ενεργειακών ροφημάτων
      description: Κατηγοριοποιεί το προϊόν ανάλογα με το είδος του ποτού που παρασκευάζει
        (π.χ. λεμονάδα, αθλητικό ρόφημα, πρωτεϊνικό ρόφημα).
    power_rack_style:
      name: Τύπος διάταξης προπόνησης
      description: Προσδιορίζει τη συνολική σχεδίαση/διαμόρφωση του ραφιού, βοηθώντας
        τους αγοραστές να διακρίνουν μεταξύ πλήρων κλουβιών, μισών ραφιών και μοντέλων
        εξοικονόμησης χώρου.
    power_steering_fluid_formulation:
      name: Σύνθεση υγρού υδραυλικού τιμονιού
      description: Η γενική κατηγορία σύνθεσης του υγρού (με βάση το ATF έναντι ειδικών
        υδραυλικών υγρών/CHF έναντι γενικής χρήσης), η οποία χρησιμοποιείται για φιλτράρισμα
        με βάση την υψηλή συμβατότητα.
    practice_mute_audio_output:
      name: Έξοδος ήχου με σουρντίνα εξάσκησης.
      description: Καθορίζει τον τύπο της σύνδεσης εξόδου ήχου που είναι διαθέσιμη
        στη σουρντίνα εξάσκησης για παρακολούθηση και/ή ηχογράφηση (συνηθισμένο σε
        αθόρυβες/ηλεκτρονικές σουρντίνες εξάσκησης).
    practice_mute_intonation_impact:
      name: Επίδραση της σουρντίνας εξάσκησης στον τονισμό
      description: Περιγράφει την αναμενόμενη επίδραση στο κούρδισμα/τονισμό όταν
        χρησιμοποιείται η σουρντίνα εξάσκησης.
    practice_mute_venting_valve_type:
      name: Τύπος αεραγωγού/βαλβίδας της σουρντίνας εξάσκησης.
      description: Καθορίζει αν και με ποιον τρόπο η σουρντίνα εξάσκησης διαθέτει
        αεραγωγό ή ρυθμιζόμενη βαλβίδα για αλλαγή της αντίστασης/έντασης ήχου.
    practice_pad_features:
      name: Χαρακτηριστικά στρώματος εξάσκησης
      description: Αναδεικνύει τα λειτουργικά χαρακτηριστικά της σουρντίνας εξάσκησης
        πέρα από το μέγεθος/υλικό.
    practice_pad_mounting_style:
      name: Τρόπος στήριξης της σουρντίνας εξάσκησης.
      description: Υποδεικνύει τον τρόπο με τον οποίο η σουρντίνα εξάσκησης προορίζεται
        να τοποθετείται ή να στερεώνεται κατά τη χρήση.
    practice_pad_rebound_level:
      name: Επίπεδο αναπήδησης της σουρντίνας εξάσκησης.
      description: Υποδεικνύει τη σχετική αναπήδηση/απόκριση της σουρντίνας εξάσκησης
        σε σύγκριση με τα συνηθισμένα δέρματα τυμπάνου.
    practice_pad_surface_configuration:
      name: Διαμόρφωση επιφάνειας της σουρντίνας εξάσκησης.
      description: Περιγράφει αν η σουρντίνα εξάσκησης διαθέτει μία ή περισσότερες
        επιφάνειες παιξίματος και αν αυτές διαφέρουν στην αίσθηση.
    pregnancy_stage_suitability:
      name: Καταλληλότητα για στάδιο εγκυμοσύνης.
      description: Υποδεικνύει για ποιο στάδιο εγκυμοσύνης ή λοχείας έχει σχεδιαστεί
        το ένδυμα.
    preparation_state:
      name: Κατάσταση προετοιμασίας
      description: Υποδεικνύει το επίπεδο προετοιμασίας ή μαγειρέματος που απαιτείται
        πριν την κατανάλωση.
    preparation_style:
      name: Στυλ προετοιμασίας
      description: Καθορίζει τη μορφή κοπής ή επεξεργασίας των νεροκάστανων κατά την
        πώλησή τους (π.χ. ολόκληρα, σε φέτες, ψημένα, κατεψυγμένα).
    preservation_medium:
      name: Μέσο συντήρησης
      description: Καθορίζει το βασικό υγρό ή μέσο στο οποίο συντηρούνται οι ελιές
        ή τα κάπαρη (π.χ. άλμη, ελαιόλαδο, ξίδι).
    presser_foot_attachment_method:
      name: Τρόπος τοποθέτησης του ποδιού ραπτομηχανής.
      description: Υποδεικνύει τον τρόπο με τον οποίο το ποδαράκι ραπτομηχανής προσαρμόζεται
        στη βάση/βραχίονα συγκράτησης (π.χ. κουμπωτό ή βιδωτό), κάτι που επηρεάζει
        τη συμβατότητα.
    pressure_gauge_type:
      name: Τύπος μανόμετρου
      description: Υποδεικνύει τον τύπο μανόμετρου που περιλαμβάνεται στην αντλία
        ποδηλάτου, εφόσον υπάρχει.
    pressure_measurement_unit:
      name: Μονάδα μέτρησης πίεσης
      description: Υποδεικνύει τη μονάδα που χρησιμοποιείται για την ένδειξη ή τη
        βαθμονόμηση του αισθητήρα πίεσης, χρήσιμη για τη σύγκριση προϊόντων και τη
        διασφάλιση συμβατότητας με το μανόμετρο/ECU.
    pressure_plate_balance_type:
      name: Τύπος εξισορρόπησης της πλάκας πίεσης
      description: Υποδεικνύει αν η πλάκα πίεσης είναι εσωτερικά ζυγοσταθμισμένη ή
        αν απαιτεί/προϋποθέτει εξωτερική ζυγοστάθμιση συμβατή με τη διάταξη κινητήρα/βολάν.
    pressure_plate_components_included:
      name: Εξαρτήματα πλάκας πίεσης που περιλαμβάνονται
      description: Τι περιλαμβάνεται στη λίστα της πλάκας πίεσης.
    pressure_sensor_application:
      name: Εφαρμογή αισθητήρα πίεσης
      description: Προσδιορίζει το σύστημα του οχήματος ή το σημείο μέτρησης για το
        οποίο έχει σχεδιαστεί ο αισθητήρας πίεσης.
    pressure_sensor_port_thread_standard:
      name: Θύρα αισθητήρα πίεσης / πρότυπο σπειρώματος.
      description: Καθορίζει το μηχανικό πρότυπο θύρας/σπειρώματος που χρησιμοποιείται
        για την τοποθέτηση του αισθητήρα στο σύστημα του οχήματος.
    pressurization_method:
      name: Μέθοδος πίεσης
      description: Προσδιορίζει τον τρόπο με τον οποίο δημιουργείται ή διατηρείται
        η πίεση μέσα στη συσκευή.
    pretend_housekeeping_set_items_included:
      name: Προσομοιωμένα/παιχνιδιού αντικείμενα που περιλαμβάνονται στο σετ καθαριότητας.
      description: Καταγράφει ποια αξεσουάρ καθαριότητας περιλαμβάνονται στο σετ (π.χ.
        σφουγγαρίστρα, σκούπα, φαράσι, μπουκάλι ψεκασμού).
    pretend_play_electronic_features:
      name: Ηλεκτρονικές λειτουργίες παιχνιδιού ρόλων
      description: Ηλεκτρονικά/διαδραστικά χαρακτηριστικά που περιλαμβάνονται στο
        προϊόν παιχνιδιού ρόλων.
    pretend_play_set_pieces_included:
      name: Εξαρτήματα που περιλαμβάνονται στο σετ παιχνιδιού ρόλων.
      description: Κύρια αντικείμενα/εξαρτήματα που περιλαμβάνονται στο σετ παιχνιδιού
        ρόλων (π.χ. ταμειακή μηχανή, παιχνίδια φαγητού, εργαλεία).
    pretend_play_set_theme:
      name: Θέμα σετ παιχνιδιού ρόλων.
      description: Κύριο σενάριο/θέμα παιχνιδιού ρόλων που αναπαριστά το προϊόν (χρήσιμο
        για αναζήτηση και κατηγοριοποίηση σε όλη την ενότητα Παιχνίδια Ρόλων για παιδιά).
    pretzel_coating:
      name: Επικάλυψη πρέτσελ
      description: Προσδιορίζει τυχόν εξωτερικό καρύκευμα ή επικάλυψη που εφαρμόζεται
        στο πρέτσελ, καλύπτοντας τόσο αλμυρές (αλατισμένες, καρυκευμένες) όσο και
        γλυκές επιλογές (σοκολάτα, γιαούρτι, καραμέλα).
    pretzel_shape:
      name: Σχήμα πρέτσελ
      description: Καθορίζει τη φυσική μορφή του πρέτσελ (π.χ. στριφτό, σε ραβδί,
        σε μπουκιά), ένα βασικό χαρακτηριστικό που χρησιμοποιείται από τους πελάτες
        για αναζήτηση ή φιλτράρισμα.
    primary_component_material:
      name: Κύριο υλικό κατασκευής
      description: Κύριο υλικό κατασκευής του μπλοκ του κινητήρα.
    primary_dish_application:
      name: Κύρια χρήση σε πιάτο
      description: Προσδιορίζει το κύριο πιάτο ή την παρασκευή για την οποία προορίζεται
        η ζύμη.
    primary_plant_base:
      name: Κύρια φυτική βάση
      description: Υποδεικνύει το κύριο μη γαλακτοκομικό συστατικό(ά) που χρησιμοποιείται
        για την παραγωγή της εναλλακτικής τυριού.
    primary_plant_protein_source:
      name: Κύρια φυτική πηγή πρωτεΐνης
      description: Προσδιορίζει το κύριο φυτικό συστατικό που παρέχει πρωτεΐνη στο
        προϊόν.
    primary_sweetener_source:
      name: Κύρια πηγή γλυκαντικού
      description: Προσδιορίζει το φυτό ή την πρώτη ύλη από την οποία προέρχεται το
        σιρόπι.
    print_placement:
      name: Τοποθέτηση εκτύπωσης
      description: Υποδεικνύει το σημείο όπου βρίσκεται το κύριο γραφικό/λογότυπο
        στο μπλουζάκι.
    print_technique:
      name: Τεχνική εκτύπωσης
      description: Καθορίζει τη μέθοδο διακόσμησης/εκτύπωσης που χρησιμοποιείται στο
        σχέδιο της μπλούζας.
    printable_canvas_intended_use:
      name: Προοριζόμενη χρήση εκτυπώσιμου καμβά
      description: Η κύρια χρήση για την οποία έχει βελτιστοποιηθεί ο εκτυπώσιμος
        καμβάς.
    printable_fabric_format:
      name: Μορφή για εκτύπωση σε ύφασμα
      description: Καθορίζει τον τρόπο τροφοδοσίας του εκτυπώσιμου βαμβακιού (μεμονωμένα
        φύλλα ή συνεχές ρολό), κάτι που επηρεάζει την τροφοδοσία του εκτυπωτή και
        τη ροή εργασίας του έργου.
    prism_material:
      name: Υλικό πρίσματος
      description: Καθορίζει το υλικό του ίδιου του οπτικού στοιχείου (του πρίσματος),
        το οποίο επηρεάζει τη διαύγεια, την ανθεκτικότητα και την αντοχή στις γρατσουνιές.
    prisoner_transport_configuration:
      name: Διαμόρφωση μεταφοράς κρατουμένων
      description: Καθορίζει αν και με ποιον τρόπο το φορτηγό έχει διαμορφωθεί για
        τη μεταφορά κρατουμένων.
    prisoner_transport_partition_type:
      name: Τύπος διαχωριστικού για τη μεταφορά κρατουμένων
      description: Τύπος εσωτερικού διαχωριστικού/κλουβιού που χωρίζει το μπροστινό
        από το πίσω τμήμα.
    privacy_or_acoustic_feature:
      name: Λειτουργία προστασίας της ιδιωτικότητας ή ηχομόνωση
      description: Προσδιορίζει ενσωματωμένα στοιχεία προστασίας της ιδιωτικότητας
        ή ηχομόνωσης, όπως διαχωριστικά πάνελ, ηχομονωτικά παραπετάσματα ή πλήρεις
        καμπίνες.
    processing_state:
      name: Κατάσταση επεξεργασίας
      description: Είτε τα φτερά έχουν αποστειρωθεί/πλυθεί είτε έχουν προετοιμαστεί
        με άλλο τρόπο για χειροτεχνική χρήση.
    produce_grade:
      name: Κατηγορία προϊόντων
      description: Κατηγοριοποιεί την ποιότητα που αποδίδεται στα ακτινίδια με βάση
        το μέγεθος, την εμφάνιση και την κατάστασή τους.
    produce_growth_stage:
      name: Στάδιο ανάπτυξης των καρπών
      description: Καθορίζει το στάδιο ανάπτυξης στο οποίο πωλείται το προϊόν (π.χ.
        μικροφυτά, νεαρά φύλλα, ώριμα φύλλα, ζωντανά φυτά, σπόροι).
    produce_washing_state:
      name: Κατάσταση πλύσης των παραγωγών
      description: Δείχνει αν τα λαχανικά έχουν πλυθεί και είναι έτοιμα για κατανάλωση.
    profile_shape:
      name: Προφίλ/σχήμα
      description: Συνολική καμπυλότητα/προφίλ του κύμβαλου (πόσο ξαφνικά ανυψώνεται
        από την άκρη προς το καμπανάκι).
    projectile_ammunition_type:
      name: Τύπος βλήματος/πυρομαχικού
      description: Καθορίζει τον τύπο των βλημάτων ή των αναλώσιμων που χρησιμοποιεί
        το παιχνίδι όπλο, κατά περίπτωση.
    projectile_finish:
      name: Τελείωμα τύπου βλήματος
      description: Αναφέρεται σε οποιαδήποτε επίστρωση επιφάνειας που εφαρμόζεται
        στο BB, η οποία συμβάλλει στην αντοχή στη διάβρωση ή στην ορατότητα (π.χ.
        επικάλυψη χαλκού, γαλβάνισμα, βαφή).
    projectile_type:
      name: Τύπος βλήματος
      description: Προσδιορίζει τον τύπο του βλήματος που χρησιμοποιεί το προϊόν ή
        για τον οποίο προορίζεται.
    pronation_support:
      name: Υποστήριξη πρηνισμού
      description: Δείχνει τον τύπο βάδισης ή το μοτίβο πρηνισμού για το οποίο έχει
        σχεδιαστεί το παπούτσι.
    propellant_type:
      name: Τύπος προωθητικού
      description: Καθορίζει το προωθητικό υλικό για το οποίο έχει σχεδιαστεί το εξάρτημα
        ή το αξεσουάρ.
    propeller_blade_cup:
      name: Καμπυλότητα πτερυγίου έλικας
      description: Δείχνει το μέγεθος της καμπυλότητας (καμπύλη στο πίσω άκρο) στα
        πτερύγια.
    propeller_hub_type:
      name: Τύπος πλήμνης έλικα
      description: Καθορίζει το σύστημα πλήμνης/δακτυλίου που χρησιμοποιείται στην
        έλικα (ανταλλακτικά σετ πλήμνης έναντι ενσωματωμένων).
    propeller_rotation:
      name: Περιστροφή της έλικας
      description: Καθορίζει την κατεύθυνση περιστροφής μιας έλικας.
    protectant_formula_base:
      name: Βάση σύνθεσης προστατευτικού
      description: Καθορίζει τη βασική σύνθεση του προστατευτικού προϊόντος, η οποία
        επηρεάζει τη γυαλάδα, την υφή και τον καθαρισμό (π.χ. με βάση το νερό ή με
        βάση διαλύτη).
    protection_coverage_area:
      name: Περιοχή κάλυψης
      description: Δείχνει ποια μέρη του ρολογιού καλύπτει το προστατευτικό εξάρτημα.
    protection_level:
      name: Επίπεδο προστασίας
      description: Υποδεικνύει το επίπεδο προστασίας για το οποίο έχει σχεδιαστεί
        η θήκη, κατά τη μεταφορά και την αποθήκευση του οργάνου.
    protective_case_interior_protection_type:
      name: Τύπος εσωτερικής προστασίας της θήκης
      description: Περιγράφει την κύρια μέθοδο εσωτερικής προστασίας που χρησιμοποιείται
        για τη στερέωση και την προστασία του περιεχομένου.
    protective_case_shell_type:
      name: Θήκη προστασίας τύπου περιβλήματος
      description: Προσδιορίζει το γενικό στυλ κατασκευής του εξωτερικού του περιβλήματος
        (ακαμψία), το οποίο επηρεάζει την προστασία από συμπίεση και τη φορητότητα.
    protective_contact_padding_material:
      name: Υλικό προστατευτικής επένδυσης επαφής
      description: Υλικό που χρησιμοποιείται στα σημεία επαφής του οργάνου (στήριγμα/ένθετο
        καμπάνας) για την αποφυγή γρατσουνιών (π.χ. τσόχα, καουτσούκ).
    protective_cup_configuration:
      name: Διάταξη προστατευτικού περιβλήματος
      description: Προσδιορίζει αν περιλαμβάνεται προστατευτικό περίβλημα, αν είναι
        αφαιρούμενο ή αν το ρούχο διαθέτει μόνο θήκη για την τοποθέτηση περιβλήματος.
    protective_eyewear_standard_compliance:
      name: Συμμόρφωση με τα πρότυπα για τα προστατευτικά γυαλιά
      description: Αναφέρει τα πρότυπα ή τις πιστοποιήσεις ασφάλειας ή αντοχής σε
        κρούση που πληρούν ή υπερβαίνουν τα γυαλιά για αθλητική χρήση.
    protective_gear_certification_standard:
      name: Πρότυπο πιστοποίησης προστατευτικού εξοπλισμού
      description: 'Υποδεικνύει το πρότυπο ασφαλείας/πιστοποίησης με το οποίο συμμορφώνεται
        ο εξοπλισμός (διαφέρει ανάλογα με τον τύπο του είδους: πρότυπα για κράνη,
        πρότυπα για στολές, πρότυπα για προστατευτικό εξοπλισμό κατά των κρούσεων).'
    protective_gear_items_included:
      name: Περιλαμβάνονται είδη προστατευτικού εξοπλισμού
      description: Παρουσιάζει τα επιμέρους τεμάχια που περιλαμβάνονται σε ένα σετ
        προστατευτικού εξοπλισμού πολλαπλών τεμαχίων.
    protective_gear_padding_type:
      name: Τύπος επένδυσης προστατευτικού εξοπλισμού
      description: Καθορίζει τον τύπο της επένδυσης που χρησιμοποιείται στον προστατευτικό
        εξοπλισμό για την προστασία από κρούσεις.
    protective_gear_safety_certifications:
      name: Πιστοποιήσεις ασφαλείας για τον προστατευτικό εξοπλισμό
      description: Περιλαμβάνει τα αναγνωρισμένα πρότυπα ασφάλειας ή απόδοσης για
        συγκεκριμένα αθλήματα που πληροί το προϊόν, όπως τα πρότυπα NOCSAE ή ASTM
        για κράνη χόκεϊ επί χόρτου.
    protective_pad_components_included:
      name: Περιλαμβάνονται εξαρτήματα προστατευτικής ενίσχυσης
      description: Προσδιορίζει ποια συγκεκριμένα προστατευτικά είδη περιλαμβάνονται
        σε ένα σετ πολλαπλών τεμαχίων, ώστε οι αγοραστές να γνωρίζουν ακριβώς ποια
        μέρη του σώματος καλύπτονται.
    protective_shorts_intended_use:
      name: Προορισμός χρήσης των προστατευτικών σορτς
      description: Το κύριο είδος ποδηλασίας ή αγώνων για το οποίο έχουν σχεδιαστεί
        τα προστατευτικά σορτς.
    protective_shorts_padding_type:
      name: Τύπος ενίσχυσης προστατευτικού σορτς
      description: Προσδιορίζει τη δομή/μορφή των προστατευτικών στοιχείων που χρησιμοποιούνται
        στα σορτς.
    protective_shorts_padding_zones:
      name: Ζώνες ενίσχυσης προστατευτικού σορτς
      description: Δείχνει σε ποιες περιοχές του σώματος έχουν ενσωματωθεί επενδύσεις/προστατευτικά
        στοιχεία στα προστατευτικά σορτς.
    protective_treatment:
      name: Προστατευτική φροντίδα
      description: Αναφέρεται σε οποιαδήποτε προστατευτική επίστρωση ή επεξεργασία
        που εφαρμόζεται για αντοχή σε λεκέδες, νερό ή υπεριώδη ακτινοβολία (π.χ. Teflon).
    protector_coverage_area:
      name: Περιοχή κάλυψης προστατευτικής διάταξης
      description: Καθορίζει ποια περιοχή ή περιοχές του κορμού προορίζεται να καλύπτει
        ο προστατευτικός εξοπλισμός (π.χ. στήθος, πλάτη, πλευρές).
    puck_bottom_style:
      name: Τύπος κάτω επιφάνειας δίσκου
      description: Περιγράφει τη γεωμετρία της κάτω πλευράς του δίσκου, η οποία επηρεάζει
        την ολίσθηση και τον έλεγχο σε διαφορετικούς τύπους επιφανειών shuffleboard.
    puck_type:
      name: Τύπος δίσκου
      description: Κατηγοριοποιεί το λειτουργικό στυλ ή την προβλεπόμενη χρήση του
        δίσκου χόκεϊ, από επίσημους αγώνες έως συλλεκτικά αναμνηστικά.
    pull_buoy_style:
      name: Τύπος pull buoy
      description: Υποδεικνύει τον λειτουργικό τύπο ή τη διαμόρφωση του pull buoy,
        όπως standard, αστραγάλου ή συνδυασμό pull buoy–σανίδας (pullkick combo).
    pull_through_weight_material:
      name: Υλικό βαριδίου pull-through
      description: Για τους στυλεούς καθαρισμού τύπου pull-through, προσδιορίζει το
        υλικό του βαριδίου που χρησιμοποιείται για την καθοδήγηση του στυλεού μέσα
        στο όργανο.
    pulp_content:
      name: Περιεκτικότητα σε πολτό
      description: Υποδεικνύει την ποσότητα πολτού φρούτων ή λαχανικών που περιέχεται
        στο ρόφημα.
    pump_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ αντλίας
      description: Παραθέτει τα πρόσθετα εξαρτήματα που περιλαμβάνονται με την τρόμπα
        μπαλών, ώστε οι αγοραστές να γνωρίζουν το περιεχόμενο του πακέτου.
    pumping_compatibility:
      name: Συμβατότητα άντλησης
      description: Υποδεικνύει εάν το σουτιέν θηλασμού είναι σχεδιασμένο για άντληση
        γάλακτος χωρίς χρήση χεριών, καθώς και για θηλασμό.
    punch_pad_type:
      name: Τύπος στόχου προπόνησης
      description: Καθορίζει τη σχεδίαση ή τον τύπο του στόχου προπόνησης, ώστε οι
        αγοραστές να επιλέγουν τον κατάλληλο εξοπλισμό για τις ανάγκες τους.
    punching_training_bag_shape:
      name: Σχήμα σάκου πυγμαχίας ή προπόνησης
      description: Καθορίζει το γεωμετρικό σχήμα του σάκου προπόνησης, βοηθώντας τους
        αγοραστές να επιλέξουν μοντέλα κατάλληλα για συγκεκριμένες ασκήσεις χτυπημάτων
        (π.χ. uppercuts, χτυπήματα σώματος).
    puncture_protection_technology:
      name: Τεχνολογία προστασίας από διάτρηση
      description: Αναφέρει τυχόν ιδιόκτητες ή γενικές τεχνολογίες προστασίας από
        διάτρηση, όπως ενισχυτικές στρώσεις ή ενισχύσεις στα πλευρικά τοιχώματα/στον
        σκελετό του ελαστικού (π.χ. EXO, SnakeSkin, ζώνη Kevlar).
    puppet_features:
      name: Χαρακτηριστικά μαριονέτας
      description: Αναδεικνύει τα λειτουργικά χαρακτηριστικά ή τις δυνατότητες της
        μαριονέτας (π.χ. κινούμενο στόμα, ηχητικά εφέ, αναστρέψιμος σχεδιασμός).
    puppet_puppet_theater_accessory_type:
      name: Τύπος αξεσουάρ για κούκλες και κουκλοθέατρο
      description: Καθορίζει το είδος του αξεσουάρ του προϊόντος (π.χ. σκηνικό αντικείμενο,
        κοστούμι μαριονέτας, μπάρα χειρισμού, ανταλλακτικό νήμα).
    purity_unit:
      name: Μονάδα καθαρότητας
      description: Καθορίζει τον τρόπο έκφρασης της καθαρότητας του νομίσματος (π.χ.
        βαθμός καθαρότητας/fineness ή καράτια).
    push_up_bar_design:
      name: Σχεδίαση μπαρών push-up
      description: Υποδεικνύει τον λειτουργικό τύπο σχεδίασης των μπαρών push-up (π.χ.
        σταθερές, περιστρεφόμενες, parallettes).
    pushrod_end_type:
      name: Τύπος άκρου ωστήριας ράβδου
      description: Καθορίζει τον τύπο του άκρου/συνδέσμου της ωστήριας ράβδου που
        χρησιμοποιείται στη σύνδεση με το πεντάλ ή τον κύριο κύλινδρο.
    putty_glow_activation_method:
      name: Μέθοδος ενεργοποίησης φωσφορισμού
      description: Περιγράφει με ποιον τρόπο ενεργοποιείται το φωσφορίζον putty (π.χ.
        μέσω ηλιακού φωτός ή UV/blacklight).
    putty_glow_color:
      name: Χρώμα φωσφορισμού εύπλαστης μάζας
      description: Πώς ενεργοποιείται η φωσφορίζουσα εύπλαστη μάζα ώστε να λάμπει
        στο σκοτάδι.
    putty_inclusions:
      name: Ενσωματωμένα στοιχεία της μάζας
      description: Καθορίζει τα ενσωματωμένα πρόσθετα στοιχεία της μάζας (π.χ. γκλίτερ,
        κομφετί, αφρώδεις χάντρες).
    putty_texture:
      name: Υφή της εύπλαστης μάζας
      description: Περιγράφει τη βασική συμπεριφορά της εύπλαστης μάζας κατά τον χειρισμό
        της (π.χ. αναπηδά, τεντώνεται, έχει υφή παρόμοια με υγρό).
    puzzle_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ παζλ
      description: Λειτουργικά χαρακτηριστικά και στοιχεία σχεδίασης αξεσουάρ παζλ
        (διαφέρουν ανάλογα με τον τύπο αξεσουάρ).
    pyrometric_cone_range:
      name: Εύρος πυρομετρικών κώνων
      description: Καθορίζει τους προτεινόμενους πυρομετρικούς κώνους στους οποίους
        έχει σχεδιαστεί να ψηθεί το υάλωμα (π.χ. Cone 06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Τύπος κάλυψης πίσω πλαϊνού φτερού
      description: Προσδιορίζει την έκταση του πίσω πλαϊνού τμήματος αμαξώματος που
        αντικαθιστά ή επισκευάζει το προϊόν.
    quarter_panel_set_contents:
      name: Περιεχόμενα σετ πίσω πλαϊνού φτερού
      description: Προσδιορίζει τη σύνθεση του σετ πίσω πλαϊνού φτερού που περιλαμβάνεται
        στην προσφορά (μία πλευρά, ζεύγος ή με επιπλέον τμήματα επισκευής).
    quilting_ruler_markings:
      name: Διαγραμμίσεις χάρακα quilting
      description: Καθορίζει τους τύπους διαγραμμίσεων που υπάρχουν στον χάρακα quilting
        και χρησιμοποιούνται για κοπή ή ευθυγράμμιση.
    quilting_ruler_non_slip_feature:
      name: Αντιολισθητική λειτουργία χάρακα quilting
      description: Υποδεικνύει εάν ο χάρακας διαθέτει αντιολισθητική επένδυση ή επεξεργασία
        επιφάνειας για τη μείωση της ολίσθησης πάνω στο ύφασμα.
    quilting_ruler_transparency:
      name: Βαθμός διαφάνειας χάρακα quilting
      description: Καθορίζει πόσο διαφανές είναι το υλικό του χάρακα, ώστε να διευκολύνεται
        η ορατότητα του υφάσματος και των σημάνσεων κάτω από αυτόν.
    quilting_thread_usage:
      name: Χρήση κλωστής για quilting
      description: Υποδεικνύει την προβλεπόμενη χρήση της κλωστής στο quilting (δηλαδή
        τον τρόπο με τον οποίο προορίζεται να χρησιμοποιηθεί).
    quilting_thread_weight_system:
      name: Σύστημα αρίθμησης πάχους κλωστής quilting
      description: Προσδιορίζει το σύστημα αρίθμησης του πάχους της κλωστής (π.χ.
        wt, Tex, Denier), ώστε να γίνεται σωστή ερμηνεία του μεγέθους της.
    quince_variety:
      name: Ποικιλία κυδωνιού
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία κυδωνιού, καθώς η γεύση,
        το άρωμα και η καταλληλότητα για μαγειρική χρήση μπορεί να διαφέρουν ανάλογα
        με την ποικιλία.
    quinoa_variety:
      name: Ποικιλία κινόα
      description: Προσδιορίζει το συγκεκριμένο χρώμα ή την ποικιλία της κινόα, καθώς
        οι διαφορετικές ποικιλίες έχουν διακριτές γεύσεις, υφές και χρόνους μαγειρέματος.
    quinto_tuning_system:
      name: Σύστημα κουρδίσματος quinto
      description: Περιγράφει τον τρόπο κουρδίσματος/ρύθμισης τάσης του quinto.
    race_car_class:
      name: Κατηγορία αγωνιστικού αυτοκινήτου
      description: Προσδιορίζει την αγωνιστική κατηγορία/ομάδα homologation για την
        οποία είναι σχεδιασμένο το όχημα.
    racing_balaclava_face_opening_style:
      name: Τύπος ανοίγματος προσώπου αγωνιστικής μπαλακλάβας
      description: Καθορίζει τη διαμόρφωση του ανοίγματος προσώπου της μπαλακλάβας,
        η οποία επηρεάζει την εφαρμογή του κράνους, τη στεγανότητα και την άνεση.
    racing_balaclava_neck_coverage_length:
      name: Μήκος κάλυψης λαιμού αγωνιστικής μπαλακλάβας
      description: Καθορίζει το μήκος κάλυψης του προστατευτικού τμήματος λαιμού,
        το οποίο έχει σχεδιαστεί ώστε να τοποθετείται μέσα στη φόρμα ή στο σύστημα
        προστασίας αυχένα για καλύτερη στεγανοποίηση και προστασία.
    racing_balaclava_ventilation_zones:
      name: Ζώνες αερισμού αγωνιστικής μπαλακλάβας
      description: Καθορίζει τη θέση των διαπνέοντων, δικτυωτών ή αεριζόμενων ζωνών
        που βελτιώνουν τη ροή αέρα κάτω από το κράνος.
    racing_chest_guard_intended_use:
      name: Προβλεπόμενη χρήση αγωνιστικού προστατευτικού θώρακα
      description: Καθορίζει το βασικό είδος μηχανοκίνητου αθλητισμού ή το αγωνιστικό
        πλαίσιο για το οποίο έχει σχεδιαστεί το προστατευτικό θώρακα.
    racing_chest_guard_size_type:
      name: Τύπος μεγέθους αγωνιστικού προστατευτικού θώρακα
      description: Υποδεικνύει αν το προϊόν διατίθεται σε μέγεθος για παιδιά, ενήλικες
        ή είναι καθολικού/ρυθμιζόμενου μεγέθους.
    racing_glove_certification_standard:
      name: Πρότυπο πιστοποίησης αγωνιστικών γαντιών
      description: Καθορίζει την πιστοποίηση ή το πρότυπο ασφαλείας με το οποίο συμμορφώνονται
        τα αγωνιστικά γάντια (π.χ. FIA, SFI, CE), καθώς και προαιρετικά την κατηγορία
        ή το επίπεδο πιστοποίησης όπου εφαρμόζεται.
    racing_goggles_lens_system:
      name: Σύστημα φακών αγωνιστικών γυαλιών
      description: Καθορίζει το σύστημα εναλλαγής φακών ή/και τη δυνατότητα χρήσης
        αποσπώμενων μεμβρανών που υποστηρίζουν τα γυαλιά.
    racing_helmet_certification_standard:
      name: Πρότυπο πιστοποίησης αγωνιστικού κράνους
      description: Οι πιστοποιήσεις ασφαλείας που πληροί το αγωνιστικό κράνος.
    racing_kart_brake_type:
      name: Τύπος φρένων αγωνιστικού καρτ
      description: Τύπος κύριου συστήματος πέδησης που είναι εγκατεστημένο στο καρτ.
    racing_kart_class:
      name: Κατηγορία αγωνιστικών καρτ
      description: Η κατηγορία αγώνων ή ο κανονισμός με τον οποίο έχει κατασκευαστεί
        το καρτ ώστε να συμμορφώνεται
    racing_kart_frame_material:
      name: Υλικό κατασκευής πλαισίου αγωνιστικού καρτ
      description: Κύριο υλικό του σκελετού/του πλαισίου του καρτ.
    racing_kart_seat_size:
      name: Μέγεθος καθίσματος αγωνιστικού καρτ
      description: Ο χαρακτηρισμός του μεγέθους του καθίσματος του καρτ που χρησιμοποιείται
        για την προσαρμογή.
    racing_neck_support_style:
      name: Στυλ στήριξης λαιμού τύπου αγωνιστικού
      description: Δομικός σχεδιασμός του στηρίγματος λαιμού για αγώνες και ο τρόπος
        με τον οποίο εφαρμόζει στον κορμό και στο κράνος του αναβάτη.
    racing_suit_certification_standard:
      name: Πρότυπο πιστοποίησης αγωνιστικής στολής
      description: Αναφέρει την πιστοποίηση/homologation ασφάλειας αγώνων που πληροί
        η στολή (π.χ. πρότυπα FIA ή SFI).
    racing_suit_cuff_design:
      name: Σχεδιασμός μανικιών αγωνιστικής φόρμας
      description: Τύπος μανσέτας αστραγάλου/καρπού που χρησιμοποιείται για τη σύνδεση
        με γάντια/μπότες και τη βελτίωση της στεγανότητας/άνεσης.
    racing_suit_size_system:
      name: Σύστημα μεγέθους αγωνιστικής στολής
      description: Σύστημα μεγεθών που χρησιμοποιείται για τη στολή (π.χ. Alpha S-XXL,
        αριθμητικό σύστημα ΕΕ/ΗΠΑ, παιδικά μεγέθη).
    racing_truck_discipline:
      name: Κατηγορία αγωνιστικών φορτηγών
      description: Καθορίζει την κύρια αγωνιστική κατηγορία ή μορφή για την οποία
        έχει κατασκευαστεί το φορτηγό.
    rack_side_configuration:
      name: Διαμόρφωση πλευράς rack
      description: Προσδιορίζει αν το ράφι αποθηκεύει τα στρώματα από τη μία πλευρά
        ή και από τις δύο πλευρές, γεγονός που επηρεάζει την αποδοτική χρήση του χώρου
        και την πρόσβαση.
    rack_system_configuration:
      name: Διαμόρφωση συστήματος ραφιών
      description: Περιγράφει τη συνολική διάταξη/το σχήμα του συστήματος στήριξης
        τυμπάνων.
    racket_dampener_type:
      name: Τύπος αντικραδασμικού συστήματος για ρακέτες
      description: Καθορίζει τον μηχανισμό εγκατάστασης ή τον τρόπο λειτουργίας του
        αντικραδασμικού συστήματος της ρακέτας.
    racket_grip_size:
      name: Μέγεθος λαβής ρακέτας
      description: Καθορίζει την ταξινόμηση του μεγέθους της λαβής της ρακέτας με
        βάση την περιφέρεια (π.χ. G1–G6), ώστε να εξασφαλίζεται η σωστή εφαρμογή στο
        χέρι και η άνεση.
    racket_sport_shoe_court_surface:
      name: Επιφάνεια γηπέδου για παπούτσια αθλημάτων με ρακέτα
      description: Καθορίζει την επιφάνεια του γηπέδου τένις για την οποία έχει σχεδιαστεί
        ή βελτιστοποιηθεί το παπούτσι, βοηθώντας τους παίκτες να επιλέξουν υποδήματα
        με το κατάλληλο σχέδιο εξωτερικής σόλας και τη σωστή σύνθεση καουτσούκ για
        την επιφάνεια στην οποία παίζουν συνήθως.
    racket_string_pattern:
      name: Μοτίβο χορδών ρακέτας
      description: Καθορίζει τον αριθμό των κύριων και των εγκάρσιων χορδών στο πλέγμα
        (π.χ. 16 x 18), κάτι που επηρεάζει τον έλεγχο, το σπιν και την αντοχή.
    racket_stringing_status:
      name: Κατάσταση χορδών ρακέτας
      description: Δείχνει αν η ρακέτα πωλείται χωρίς χορδές, με χορδές ή με προετοιμασμένες
        χορδές.
    racket_weight_class:
      name: Κατηγορία βάρους ρακέτας
      description: Παρέχει τις τυπικές κατηγορίες βάρους «U» του μπάντμιντον, επιτρέποντας
        στους παίκτες να επιλέγουν ρακέτες εντός του εύρους βάρους που προτιμούν.
    racquet_toy_set_equipment_included:
      name: Περιλαμβάνεται σετ παιχνιδιών με ρακέτες
      description: Αναφέρει τα είδη που περιλαμβάνονται στο παιχνίδι ή στο σετ (π.χ.
        δίχτυ, μπάλες, ρακέτες).
    racquetball_squash_training_aid_type:
      name: Τύπος βοηθήματος προπόνησης ράκετμπολ και σκουος
      description: Κατηγοριοποιεί το συγκεκριμένο είδος βοηθήματος προπόνησης ή αξεσουάρ,
        ώστε οι αγοραστές να μπορούν να εντοπίζουν γρήγορα το προϊόν που χρειάζονται.
    radiator_cap_gasket_material:
      name: Υλικό φλάντζας τάπας ψυγείου
      description: Υλικό των παρεμβυσμάτων στεγανοποίησης που χρησιμοποιούνται στο
        καπάκι του ψυγείου.
    radiator_cap_pressure_relief_style:
      name: Καπάκι ψυγείου με βαλβίδα εκτόνωσης πίεσης
      description: Καθορίζει τον τύπο του μηχανισμού εκτόνωσης πίεσης/εξαερισμού/ενεργοποίησης
        του καπακιού του ψυγείου, ο οποίος μπορεί να επηρεάσει τη συμπεριφορά του
        οχήματος, την ασφάλεια και την προβλεπόμενη χρήση.
    radiator_expansion_tank_cap_application:
      name: Εφαρμογή καπακιού ψυγείου/δοχείου διαστολής
      description: Δείχνει αν το καπάκι προορίζεται για το στόμιο πλήρωσης του ψυγείου
        ή για το δοχείο διαστολής/υπερχείλισης του ψυκτικού.
    radiator_fan_control_type:
      name: Τύπος ελέγχου βεντιλατέρ ψυγείου
      description: Καθορίζει τον τρόπο ελέγχου/ενεργοποίησης του βεντιλατέρ ψυγείου
    radiator_fan_mounting_pattern:
      name: Σχήμα τοποθέτησης βεντιλατέρ ψυγείου
      description: Καθορίζει τον τρόπο ή το σχέδιο στερέωσης που χρησιμοποιείται για
        την τοποθέτηση του βεντιλατέρ ή του συστήματος.
    radiator_fan_type:
      name: Τύπος βεντιλατέρ ψυγείου
      description: Καθορίζει τον τύπο λειτουργίας/τη διαμόρφωση του συστήματος βεντιλατέρ
        ψυγείου.
    radiator_hose_end_type:
      name: Τύπος ακροφυσίου σωλήνα ψυγείου
      description: Καθορίζει τον κύριο τύπο σύνδεσης/σφράγισης που χρησιμοποιείται
        στα άκρα των σωλήνων του ψυγείου για τη σύνδεση με τις θύρες του ψυγείου/του
        κινητήρα.
    radiator_hose_position:
      name: Θέση του σωλήνα του ψυγείου
      description: Θέση/τύπος του σωλήνα του ψυγείου στο σύστημα ψύξης.
    radiator_hose_shape:
      name: Σχήμα σωλήνα καλοριφέρ
      description: Η συνολική γεωμετρία του σωλήνα και ο σχεδιασμός του, που χρησιμοποιούνται
        για τη διαδρομή και την τοποθέτησή του.
    radiator_overflow_tank_level_sensor_provision:
      name: Προεγκατάσταση αισθητήρα στάθμης στο δοχείο υπερχείλισης του ψυγείου
      description: Δείχνει αν το ρεζερβουάρ διαθέτει ή υποστηρίζει αισθητήρα στάθμης
        ψυκτικού υγρού.
    radiator_overflow_tank_shape:
      name: Σχήμα δοχείου υπερχείλισης ψυγείου
      description: Συνολική διαμόρφωση του σώματος του δοχείου υπερχείλισης.
    radish_variety:
      name: Ποικιλία ραπανάκι
      description: Αναφέρει την ποικιλία ή τον τύπο του ραπανάκι, ώστε οι αγοραστές
        να μπορούν να επιλέξουν συγκεκριμένα χαρακτηριστικά γεύσης, χρώματος ή μεγέθους
        (π.χ. Daikon, Watermelon, French Breakfast).
    radius_of_hollow:
      name: Ακτίνα κοιλότητας
      description: Καθορίζει το κοίλο προφίλ της λεπίδας που παράγεται από τον ακονιστή,
        εκφραζόμενο ως κοινά διακριτά μεγέθη ή ως επίπεδο.
    rail_coverage_configuration:
      name: Διαμόρφωση κάλυψης ράγας
      description: Δείχνει ποια μέρη της κούνιας προστατεύει το σετ καλύμματος, διευκρινίζοντας
        αν η αγορά αφορά ένα μεμονωμένο μπροστινό πάνελ ή ένα σετ περιμετρικών καλυμμάτων
        πολλαπλών τεμαχίων.
    rail_mount_standard:
      name: Πρότυπη βάση στήριξης σε ράγα
      description: Προσδιορίζει το πρότυπο ράγας ή διεπαφής στήριξης που χρησιμοποιείται
        για τη σύνδεση ενός εξαρτήματος (π.χ. σκοπευτικό, φακό) σε ένα αεροβόλο όπλο.
    rail_side:
      name: Πλευρά των ραγών
      description: Δείχνει αν η ράγα αντικατάστασης προορίζεται για την αριστερή πλευρά,
        τη δεξιά πλευρά ή αν πωλείται σε ζεύγος.
    rail_style:
      name: Στιλ ράγας
      description: Κατηγοριοποιεί τη γενική σχεδίαση ή τη διαμόρφωση της ράγας (π.χ.
        τύπου Α, τύπου ουράνιου τόξου, με στροφή), η οποία καθορίζει τις δυνατότητες
        εκτέλεσης κόλπων και τον απαιτούμενο χώρο.
    rail_system:
      name: Σύστημα ράγας
      description: Προσδιορίζει τη διεπαφή στήριξης εξαρτημάτων που υπάρχει στο όπλο
        (π.χ. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Τεχνολογία αισθητήρα βροχής
      description: Η αρχή λειτουργίας που χρησιμοποιείται για την ανίχνευση νερού
        στο παρμπρίζ.
    rain_suit_configuration:
      name: Σύνθεση αδιάβροχου
      description: Δείχνει αν το προϊόν είναι μια ολόσωμη φόρμα, ένα σετ πολλών τεμαχίων
        ή κάποια άλλη μορφή.
    rainstick_construction_type:
      name: Τύπος κατασκευής του rainstick
      description: Περιγράφει τον τρόπο κατασκευής του rainstick (παραδοσιακός σωλήνας
        από κάκτο/ξύλο έναντι σύγχρονων εναλλακτικών λύσεων).
    rainstick_fill_material:
      name: Υλικό πλήρωσης για rainstick
      description: Καθορίζει το εσωτερικό υλικό πλήρωσης που χρησιμοποιείται για τη
        δημιουργία του ήχου αλυσιδωτής αντίδρασης (π.χ. σπόροι, χάντρες).
    rainstick_playing_technique:
      name: Τεχνική χρήσης του rainstick
      description: Υποδεικνύει τη συνιστώμενη τεχνική ή τεχνικές εκτέλεσης ή τον τρόπο
        χειρισμού που χρησιμοποιείται για να επιτευχθεί το επιθυμητό αποτέλεσμα σε
        ένα rainstick.
    rainstick_sound_character:
      name: Χαρακτηριστικά του ήχου του rainstick
      description: Περιγράφει τον συνολικό ηχητικό χαρακτήρα που παράγει το rainstick.
    raising_method:
      name: Μέθοδος εκτροφής
      description: Περιγράφει τον τρόπο εκτροφής και πάχυνσης των ζώων πριν από τη
        σφαγή (π.χ. εκτροφή με χόρτα, εκτροφή σε βοσκοτόπια, εκτροφή με σιτηρά).
    rally_competition_class:
      name: Κατηγορία αγώνων ράλι
      description: Ο φορέας πιστοποίησης ή η κατηγορία κανονισμών σύμφωνα με την οποία
        έχει κατασκευαστεί το αυτοκίνητο ράλι (εφόσον είναι γνωστό).
    rally_surface_setup:
      name: Ρύθμιση της επιφάνειας του ράλι
      description: Κύρια επιφάνεια/έδαφος για τους στόχους ρύθμισης ή κατασκευής του
        αυτοκινήτου ράλι.
    ramp_surface_texture:
      name: Υφή επιφάνειας της ράμπας
      description: Περιγράφει την υφή ή το επίπεδο πρόσφυσης της επιφάνειας κύλισης
        της ράμπας.
    ratchet_mounting_style:
      name: Τρόπος στερέωσης καστάνιας
      description: Πώς κρατιέται ή τοποθετείται η ροκάνα κατά τη χρήση ή τη ρύθμιση.
    rattle_element_material:
      name: Υλικό του κροτάλου
      description: Υλικό από το οποίο κατασκευάζονται τα στοιχεία που παράγουν τον
        χαρακτηριστικό ήχο (π.χ. δόντια/κουδουνάκια/χάντρες).
    rattle_type:
      name: Τύπος κροτάλου
      description: Δείχνει αν το τεχνητό δόλωμα διαθέτει εσωτερικό κουδούνι ή θάλαμο
        ήχου και, αν ναι, τον τύπο του κουδουνιού που χρησιμοποιείται.
    rc_airship_lifting_gas_type:
      name: Τύπος αερίου ανύψωσης αερόπλοιου τηλεκατευθυνόμενου
      description: Δείχνει με ποιο αέριο προορίζεται να γεμίσει το περίβλημα του αερόπλοιου/του
        αερόστατου (αν ισχύει)
    rc_helicopter_control_frequency:
      name: Συχνότητα ελέγχου ελικοπτέρου τηλεκατευθυνόμενου
      description: Η ζώνη ραδιοσυχνοτήτων που χρησιμοποιείται μεταξύ του χειριστηρίου
        και του ελικοπτέρου, η οποία επηρεάζει την αντοχή στις παρεμβολές και τη συμβατότητα
        (π.χ. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Λειτουργίες σταθεροποίησης ελικοπτέρου τηλεκατευθυνόμενου
      description: Παραθέτει χαρακτηριστικά σταθερότητας και υποβοήθησης ελέγχου που
        διευκολύνουν την πτήση ή προσθέτουν δυνατότητες.
    rc_motorcycle_controller_type:
      name: Τύπος χειρισμού μοτοσικλέτας RC
      description: Σχεδιασμός του ελεγκτή που περιλαμβάνεται.
    rc_plane_takeoff_launch_method:
      name: Μέθοδος απογείωσης/εκτόξευσης τηλεκατευθυνόμενου αεροπλάνου
      description: Ο τρόπος με τον οποίο το αεροπλάνο συνήθως εκτοξεύεται/απογειώνεται,
        επηρεάζει το πού και πώς μπορεί να χρησιμοποιηθεί.
    rc_vehicle_controller_type:
      name: Τύπος χειριστηρίου τηλεκατευθυνόμενου οχήματος
      description: Καθορίζει τον τύπο του χειριστηρίου που χρησιμοποιείται για τον
        χειρισμό του τηλεκατευθυνόμενου οχήματος.
    rc_vehicle_scale:
      name: Κλίμακα οχήματος RC
      description: Καθορίζει την αναλογία κλίμακας (κατηγορία μεγέθους) του τηλεκατευθυνόμενου
        αυτοκινήτου/φορτηγού (π.χ. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Τύπος εδάφους για τηλεκατευθυνόμενα οχήματα
      description: Υποδεικνύει το κύριο έδαφος για το οποίο έχει σχεδιαστεί το τηλεκατευθυνόμενο
        αυτοκίνητο/φορτηγό.
    reach_adjustment_type:
      name: Τύπος ρύθμισης εμβέλειας
      description: Δείχνει αν η απόσταση μεταξύ της λάμας του μοχλού και του τιμονιού
        μπορεί να ρυθμιστεί και, αν είναι ρυθμιζόμενη, αν η ρύθμιση γίνεται χωρίς
        εργαλεία ή απαιτεί τη χρήση εργαλείου.
    rear_axle_spacing:
      name: Απόσταση μεταξύ των τροχών του πίσω άξονα
      description: Το μέγεθος της άκρης/του άξονα που μπορεί να δεχτεί το πίσω μέρος
        του πλαισίου, το οποίο επηρεάζει τη συμβατότητα των τροχών.
    rear_axle_standard:
      name: Βασικός πίσω άξονας
      description: Καθορίζει τη σύνδεση/το τύπο άξονα που χρησιμοποιεί ο πίσω τροχός
        (π.χ. γρήγορη απελευθέρωση, διάφορα μεγέθη διαμπερούς άξονα).
    rear_axle_type:
      name: Τύπος πίσω άξονα
      description: Προσδιορίζει το σύστημα στερέωσης και τη διάμετρο του άξονα που
        χρησιμοποιούνται για τη στερέωση του πίσω τροχού στο πλαίσιο.
    rear_coverage:
      name: Πίσω κάλυψη
      description: Καθορίζει πόσο μέρος των γλουτών καλύπτει το κάτω μέρος του μπικίνι
        (π.χ. cheeky, full).
    rear_opening_type:
      name: Με άνοιγμα προς τα πίσω
      description: Περιγράφει το στυλ της πρόσβασης από πίσω ή το χαρακτηριστικό «butt
        flap» για εύκολη χρήση στην τουαλέτα, όπως το καπάκι που ανασηκώνεται ή το
        φερμουάρ που φτάνει μέχρι το πίσω μέρος.
    rear_seat_configuration:
      name: Διαμόρφωση πίσω καθισμάτων
      description: Καθορίζει τη διαμόρφωση του συγκροτήματος των πίσω καθισμάτων,
        ώστε να διευκολύνεται η τοποθέτηση και η επιλογή της εσωτερικής διαρρύθμισης.
    rear_view_mirror_ornament_attachment_type:
      name: Τύπος στερέωσης διακοσμητικού στοιχείου πίσω καθρέφτη
      description: Προσδιορίζει τον τρόπο με τον οποίο το διακοσμητικό εξάρτημα στερεώνεται
        στο στέλεχος ή στο περίβλημα του καθρέφτη (π.χ. θηλιά, κλιπ, γάντζος).
    rearview_mirror_mount_attachment_type:
      name: Τύπος στερέωσης βάσης καθρέφτη οπισθοσκόπησης
      description: Προσδιορίζει τον τρόπο με τον οποίο η βάση στερεώνεται φυσικά στο
        συγκρότημα του καθρέφτη οπισθοπορείας (σώμα καθρέφτη ή βραχίονα), όπως με
        σφιγκτήρα, κλιπ, ιμάντα, αυτοκόλλητο ή βιδωτό βραχίονα.
    rebound_board_face_type:
      name: Τύπος επιφάνειας ταμπλό αναπήδησης
      description: Περιγράφει τη διαμόρφωση της επιφάνειας που καθορίζει τη συμπεριφορά
        κατά την αναπήδηση, όπως επίπεδες, γωνιακές ή πολυεδρικές κατασκευές.
    rebound_level:
      name: Επίπεδο αναπήδησης
      description: Δείχνει πόσο αναπηδά η μπάλα τοίχου μετά την πρόσκρουση, βοηθώντας
        τους χρήστες να επιλέξουν ανάμεσα σε μοντέλα χωρίς αναπήδηση και μοντέλα με
        μέτρια αναπήδηση.
    rebound_surface_configuration:
      name: Διαμόρφωση της επιφάνειας αναπήδησης
      description: Καθορίζει τη διάταξη των επιφανειών αναπήδησης και τον βαθμό προβλεψιμότητας
        των αναπηδήσεων (μονής, διπλής ή πολλαπλής, προβλέψιμες έναντι μη προβλέψιμων).
    rebounder_design:
      name: Σχεδιασμός rebounder
      description: Προσδιορίζει το δομικό στυλ ή τη διαμόρφωση της επιφάνειας αναπήδησης
        του προϊόντος.
    rebounder_design_type:
      name: Τύπος σχεδιασμού αναπήδησης
      description: Καθορίζει τον κύριο μηχανισμό αναπήδησης ή τον τύπο κατασκευής
        του προπονητικού εξοπλισμού (π.χ. βάση με ελαστικό κορδόνι, δίχτυ με πλαίσιο,
        αναδυόμενος στόχος).
    rebounder_sides:
      name: Πλευρές του rebounder
      description: Δείχνει αν το rebounder μπορεί να επιστρέφει μπάλες από τη μία
        πλευρά ή και από τις δύο πλευρές.
    rebounding_mechanism_type:
      name: Τύπος μηχανισμού αναπήδησης
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται για την επιστροφή
        του δίσκου ή της μπάλας (π.χ. ελαστικός προφυλακτήρας, ελαστικό κορδόνι).
    recipient_relationship:
      name: Σχέση με τον παραλήπτη
      description: Σχέση με τον παραλήπτη (π.χ. μαμά, μπαμπάς, φίλος) για την ευχετήρια
        κάρτα.
    recliner_control_type:
      name: Τύπος χειριστηρίου ανακλινόμενου καθίσματος
      description: Καθορίζει τον τρόπο λειτουργίας του μηχανισμού ανάκλισης (π.χ.
        χειροκίνητος μοχλός, ηλεκτρικό πίνακα κουμπιών, τηλεχειριστήριο).
    recliner_motion_type:
      name: Τύπος κίνησης ανακλινόμενης πολυθρόνας
      description: Καθορίζει τον κύριο τρόπο κίνησης της ανακλινόμενης πολυθρόνας
        (π.χ. κουνιστή, ολισθαίνουσα, περιστρεφόμενη, που κολλάει στον τοίχο, ανυψούμενη).
    reclining_mechanism:
      name: Μηχανισμός ανάκλισης
      description: Καθορίζει τον μηχανισμό που χρησιμοποιείται για τη λειτουργία της
        ανακλινόμενης θέσης του καναπέ.
    recommended_candle_format:
      name: Συνιστώμενη μορφή κεριού
      description: Υποδεικνύει τον τύπο ή τους τύπους κεριών για τους οποίους προορίζονται
        αυτές οι αυτοκόλλητες ετικέτες για φιτίλια.
    recommended_container_type:
      name: Συνιστώμενος τύπος δοχείου
      description: Υλικά για δοχεία που συνιστώνται/είναι ασφαλή για κεριά από κερί
        σε μορφή τζελ.
    recommended_fabric_type:
      name: Προτεινόμενος τύπος υφάσματος
      description: Συνιστώμενα υφάσματα για βέλτιστα αποτελέσματα με το πατρόν.
    recommended_fabric_weight:
      name: Συνιστώμενο βάρος υφάσματος
      description: Υποδεικνύει την προτεινόμενη κατηγορία βάρους υφάσματος για το
        πατρόν.
    recommended_food_pairing:
      name: Συνιστώμενοι συνδυασμοί φαγητού
      description: Αναφέρει τις κύριες πρωτεΐνες ή τα πιάτα για τα οποία προορίζεται
        η σάλτσα (π.χ. κοτόπουλο, χοιρινό, μοσχάρι, ψάρι, λαχανικά).
    recommended_lane_condition:
      name: Συνιστώμενη κατάσταση της λωρίδας
      description: Δείχνει το είδος του ελαίου ή τις συνθήκες της πίστας για τις οποίες
        έχει σχεδιαστεί η μπάλα.
    recommended_motor_impulse_class:
      name: Συνιστώμενη κατηγορία ώθησης κινητήρα
      description: Καθορίζει την προτεινόμενη κατηγορία συνολικής ώσης του κινητήρα
        μοντέλου πυραύλου για ασφαλή/βέλτιστη πτήση.
    recommended_reading_level:
      name: Προτεινόμενο επίπεδο ανάγνωσης
      description: Υποδεικνύει το συνιστώμενο επίπεδο ανάγνωσης/ικανότητα για το προϊόν,
        ώστε να βοηθήσει τους αγοραστές να το ταιριάξουν με το τρέχον στάδιο ανάπτυξης
        της ανάγνωσης του παιδιού.
    recommended_sleep_position:
      name: Συνιστώμενη στάση ύπνου
      description: Δείχνει ποιες στάσεις ύπνου έχει σχεδιαστεί το στρώμα να υποστηρίζει
        άνετα (π.χ. όσους κοιμούνται στο πλάι ή στην πλάτη).
    recommended_storage:
      name: Συνιστώμενες συνθήκες αποθήκευσης
      description: Δείχνει πώς πρέπει να φυλάσσεται το προϊόν για να διατηρηθεί η
        φρεσκάδα του.
    recommended_surfaces:
      name: Προτεινόμενες επιφάνειες
      description: Καθορίζει τις επιφάνειες συγκόλλησης ή τις κατηγορίες υλικών για
        τις οποίες προορίζεται η κόλλα, πέρα από τη γενική συμβατότητα για χειροτεχνίες
        (π.χ. μόνο για χαρτί ή για πολλαπλές επιφάνειες).
    recommended_use_case:
      name: Περίπτωση προτεινόμενης χρήσης
      description: Κύριο σενάριο χρήσης του στεγανωτικού (προσωρινή/επείγουσα επισκευή
        έναντι μακροπρόθεσμης επισκευής).
    recommended_use_location:
      name: Συνιστώμενος τόπος χρήσης
      description: Προβλεπόμενο περιβάλλον χρήσης της τραμπάλας (αυλή σπιτιού ή εμπορική
        παιδική χαρά κ.λπ.).
    recommended_vehicle_surfaces:
      name: Συνιστώμενες επιφάνειες οχημάτων
      description: Καθορίζει τις επιφάνειες/τα φινιρίσματα του οχήματος για τα οποία
        η βούρτσα έχει σχεδιαστεί ώστε να είναι ασφαλής (π.χ. βερνίκι, ματ/σατινέ
        βαφή, μεμβράνη βινυλίου/PPF, γυαλί, ζάντες).
    recorder_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ ηχογράφησης
      description: Παραθέτει τα εξαρτήματα που περιλαμβάνονται στη συσκευασία της
        great bass φλογέρας.
    recorder_bore_design:
      name: Σχεδιασμός της διαμέτρου του σωλήνα της φλογέρας
      description: Ο σχεδιασμός του προφίλ της εσωτερικής οπής του σώματος της φλογέρας.
    recorder_bore_type:
      name: Τύπος αυλού φλογέρας
      description: Καθορίζει τον τύπο σωλήνα της φλογέρας.
    recorder_case_shell_type:
      name: Τύπος θήκης για φλογέρα
      description: Περιγράφει τη διαρθρωτική σταθερότητα της θήκης.
    recorder_finish:
      name: Φινίρισμα φλογέρας
      description: Φινίρισμα/επεξεργασία της επιφάνειας του σώματος της φλογέρας (ιδιαίτερα
        σημαντικό για τις ξύλινες φλογέρες alto).
    recorder_hole_type:
      name: Τύπος οπής φλογέρας
      description: Είτε οι οπές τόνου είναι απλές (χωρίς διπλές οπές) είτε περιλαμβάνουν
        διπλές οπές για βελτιωμένες χρωματικές τεχνικές.
    recorder_joint_configuration:
      name: Διαμόρφωση συνδέσμων φλογέρας
      description: Περιγράφει τον αριθμό των τμημάτων του σώματος της φλογέρας, κάτι
        που επηρεάζει τη φορητότητα, τον καθαρισμό και την αντικατάσταση εξαρτημάτων.
    recorder_joint_style:
      name: Τύπος σύνδεσης φλογέρας
      description: Ο τρόπος σύνδεσης μεταξύ των τμημάτων της φλογέρας, εφόσον υπάρχει.
    recorder_keywork:
      name: Σύστημα πλήκτρων της φλογέρας
      description: Δείχνει αν η φλογέρα περιλαμβάνει πλήκτρα (μεταλλικούς ή πλαστικούς
        μηχανισμούς) για τις χαμηλές νότες, κάτι που είναι συνηθισμένο στις φλογέρες
        τενόρου, μπάσου και μεγάλου μεγέθους.
    recorder_mouthpiece_type:
      name: Τύπος επιστομίου φλογέρας
      description: Περιγράφει αν το επιστόμιο/το επάνω τμήμα της φλογέρας είναι ενιαίο
        (μονοκόμματο) ή αφαιρούμενο/ανταλλάξιμο.
    recorder_pitch_standard_a4:
      name: Πρότυπο τονικότητας φλογέρας (A4)
      description: Υποδεικνύει το πρότυπο συχνότητας για το οποίο έχει κατασκευαστεί
        η φλογέρα (π.χ. A=440 Hz σύγχρονη συχνότητα έναντι A=415 Hz μπαρόκ συχνότητα).
    recorder_thumb_hole_type:
      name: Τύπος οπής αντίχειρα φλογέρας
      description: Καθορίζει αν η φλογέρα διαθέτει μία ή δύο οπές για τον αντίχειρα.
    recreational_vehicle_holding_tank_type:
      name: Τύπος ρεζερβουάρ αποθήκευσης για τροχόσπιτο
      description: Δείχνει τα ρεζερβουάρ αποβλήτων που διαθέτει το τροχόσπιτο.
    recreational_vehicle_leveling_system:
      name: Σύστημα εξισορρόπησης για τροχόσπιτα
      description: Τύπος του εγκατεστημένου συστήματος εξισορρόπησης/σταθεροποίησης.
    recycled_material_content:
      name: Ποσοστό ανακυκλωμένων υλικών
      description: Δείχνει το ποσοστό του ενδύματος που αποτελείται από ανακυκλωμένες
        ίνες ή νήματα.
    reed_dent_material:
      name: Υλικό από καλαμιές
      description: Το υλικό από το οποίο κατασκευάζονται οι οδοντώσεις του πλέγματος
        (τα στοιχεία που διαχωρίζουν τις κλωστές στημονιού), το οποίο επηρεάζει την
        αντοχή και την τριβή του νήματος.
    reed_type:
      name: Τύπος καλαμιού
      description: Καθορίζει τον τύπο κατασκευής των γλωττίδων που χρησιμοποιούνται
        στον αυλό μελωδίας και στους αυλούς συνοδείας της γκάιντας.
    reeds_included:
      name: Περιλαμβάνονται καλάμια
      description: Αναφέρει ποια καλάμια περιλαμβάνονται στο σετ γκάιντας Great Highland
        (μελωδίας ή/και συνοδείας) και αν είναι από καλάμι ή συνθετικά.
    reefing_method:
      name: Μέθοδος ρύθμισης ιστίου
      description: Δείχνει τον μηχανισμό (αν υπάρχει) για τη μείωση ή την αποθήκευση
        του πανιού ενώ το σκάφος βρίσκεται στο νερό.
    reel_profile:
      name: Προφίλ καρουλιού
      description: Κατηγοριοποιεί το δομικό στυλ/το προφίλ του σώματος της πετονιάς.
    reel_seat_material:
      name: Υλικό βάσης μηχανισμού
      description: Καθορίζει το υλικό κατασκευής της βάσης του μηχανισμού, επηρεάζοντας
        το βάρος, την ευαισθησία και την αντοχή στη διάβρωση.
    reel_seat_type:
      name: Τύπος βάσης καρουλιού
      description: Καθορίζει τον τύπο του μηχανισμού ασφάλισης που συγκρατεί το μηχανισμό
        ψαρέματος στο καλάμι.
    reel_size_class:
      name: Κατηγορία μεγέθους μηχανισμού
      description: Ο δείκτης μεγέθους που καθορίζεται από τον κατασκευαστή (π.χ. 1000,
        3000, 5000), ο οποίος υποδηλώνει τη χωρητικότητα του καρουλιού και τη συνολική
        κατασκευή του μηχανισμού.
    referee_wallet_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για το πορτοφόλι του διαιτητή
      description: Παραθέτει τα επιπλέον είδη που περιλαμβάνονται σε ένα πορτοφόλι
        διαιτητή, όπως κόκκινες/κίτρινες κάρτες, φύλλα αγώνα ή είδη γραφής, ώστε οι
        αγοραστές να γνωρίζουν αν το πορτοφόλι πωλείται ως πλήρες σετ.
    refinement_level:
      name: Επίπεδο διευκόλυνσης
      description: Δείχνει τον βαθμό διύλισης που έχει υποστεί το λάδι, ο οποίος επηρεάζει
        τη γεύση, το χρώμα, τη θρεπτική αξία και το σημείο καπνίσματος.
    reflective_finish:
      name: Ανακλαστικό φινίρισμα
      description: Καθορίζει τον τύπο της ανακλαστικής επιφάνειας μιας σφαίρας ντίσκο
        (π.χ. πλακάκια καθρέφτη έναντι ολογραφικών/ιριδιζόντων εφέ).
    reflective_or_glow_effect:
      name: Αντανακλαστικό ή φωσφορίζον εφέ
      description: Δείχνει αν η σφαίρα της κεραίας διαθέτει χαρακτηριστικά ορατότητας,
        όπως ανακλαστικό υλικό, υλικό που λάμπει στο σκοτάδι ή φωτιζόμενα στοιχεία/LED.
    reflective_tape_pattern:
      name: Σχέδιο ανακλαστικής ταινίας
      description: Περιγράφει τη διάταξη της ανακλαστικής ταινίας στο ένδυμα, η οποία
        χρησιμοποιείται για την κάλυψη των απαιτήσεων ορατότητας.
    regulation_standard:
      name: Πρότυπο κανονισμού
      description: Αναφέρει το επίσημο πρότυπο ή τις διαστάσεις/την πιστοποίηση του
        αρμόδιου φορέα που πληροί το δίχτυ.
    regulator_diaphragm_material:
      name: Υλικό διαφράγματος ρυθμιστή
      description: Καθορίζει το υλικό του διαφράγματος, το οποίο επηρεάζει τη συμβατότητα
        με καύσιμα/αιθανόλη (π.χ. E85) και την αντοχή.
    regulator_port_thread_standard:
      name: Πρότυπο σπειρώματος θύρας ρυθμιστή
      description: Καθορίζει το πρότυπο σπειρώματος/σύνδεσης που χρησιμοποιείται στο
        σώμα του ρυθμιστή για τις θύρες εισόδου, εξόδου και επιστροφής.
    rein_features:
      name: Χαρακτηριστικά ηνίων
      description: Επισημαίνει τα ειδικά λειτουργικά χαρακτηριστικά ή τα χαρακτηριστικά
        ασφαλείας που διαθέτουν τα ηνία.
    rein_style:
      name: Στυλ ηνίων
      description: Περιγράφει τη δομή ή τη διαμόρφωση των ηνίων, επιτρέποντας στους
        αναβάτες να επιλέξουν τον κατάλληλο τύπο ανάλογα με την ειδικότητα που ασκούν
        και τις προσωπικές τους προτιμήσεις.
    reinforced_areas:
      name: Ενισχυμένες περιοχές
      description: Δείχνει ποια σημεία του ενδύματος είναι ενισχυμένα για μεγαλύτερη
        αντοχή στην τριβή.
    reinforcement_type:
      name: Τύπος ενίσχυσης
      description: Ενισχυτικό υλικό που χρησιμοποιείται στον σωλήνα του ψυγείου για
        μεγαλύτερη αντοχή και ανθεκτικότητα στη θερμοκρασία και την πίεση.
    release_activation_method:
      name: Μέθοδος ενεργοποίησης απελευθέρωσης
      description: Περιγράφει τον τρόπο με τον οποίο ο τοξότης ενεργοποιεί το βοηθητικό
        σύστημα απελευθέρωσης.
    release_bearing_material:
      name: Υλικό ρουλεμάν απελευθέρωσης
      description: Κύριο υλικό των εξαρτημάτων του ρουλεμάν/της επιφάνειας (όπου αυτό
        καθορίζεται από τον κατασκευαστή).
    release_jaw_style:
      name: Τύπος σιαγόνας απελευθέρωσης
      description: Περιγράφει τη σχεδίαση των σιαγόνων ή του γάντζου της κεφαλής απελευθέρωσης.
    release_strap_type:
      name: Τύπος ιμάντα απελευθέρωσης
      description: Προσδιορίζει τον ιμάντα ή το σύστημα σύνδεσης που παρέχεται μαζί
        με το βοηθητικό σύστημα απελευθέρωσης για τοξοβολία.
    remote_control_airship_envelope_material:
      name: Υλικό του περιβλήματος αερόπλοιου τηλεκατευθυνόμενου
      description: Καθορίζει το κύριο υλικό του περιβλήματος του αερόστατου/αεροσκάφους
        (σακούλα αερίου), το οποίο διαφέρει από το συνολικό υλικό του παιχνιδιού.
    remote_control_motorcycle_scale:
      name: Κλίμακα τηλεκατευθυνόμενης μοτοσικλέτας
      description: Κλίμακα της μοτοσικλέτας τηλεκατευθυνόμενης σε σχέση με μια πραγματική
        μοτοσικλέτα (εάν έχει σχεδιαστεί ως μοντέλο σε κλίμακα).
    remote_control_motorcycle_terrain_suitability:
      name: Κατάλληλο έδαφος για τηλεκατευθυνόμενες μοτοσικλέτες
      description: Το κύριο έδαφος στο οποίο έχει σχεδιαστεί να κινείται η τηλεκατευθυνόμενη
        μοτοσικλέτα.
    remote_control_motorcycle_water_resistance:
      name: Αδιάβροχη τηλεκατευθυνόμενη μοτοσικλέτα
      description: Βαθμός προστασίας από το νερό για τα ηλεκτρονικά συστήματα της
        τηλεκατευθυνόμενης μοτοσικλέτας.
    remote_control_plane_kit_completion_level:
      name: Βαθμός ολοκλήρωσης του κιτ τηλεκατευθυνόμενου αεροπλάνου
      description: Δείχνει τι περιλαμβάνεται και πόσο πλήρες είναι το σετ (π.χ. έτοιμο
        για πτήση ή απαιτεί ξεχωριστό πομπό/δέκτη/μπαταρία).
    remote_control_plane_landing_gear_type:
      name: Τύπος συστήματος προσγείωσης τηλεκατευθυνόμενου αεροπλάνου
      description: Δείχνει τη διάταξη του συστήματος προσγείωσης, η οποία επηρεάζει
        την αντοχή και τις επιφάνειες απογείωσης/προσγείωσης.
    remote_control_plane_power_type:
      name: Τύπος τροφοδοσίας τηλεκατευθυνόμενου αεροπλάνου
      description: Καθορίζει τον τρόπο τροφοδοσίας/πρόωσης του αεροπλάνου (ηλεκτρική
        έναντι βενζίνης/νίτρο), κάτι που επηρεάζει τη συντήρηση, τον θόρυβο και τα
        μέρη όπου μπορεί να πετάξει.
    remote_control_watercraft_features:
      name: Χαρακτηριστικά των τηλεκατευθυνόμενων σκαφών
      description: Επισημαίνει τα βασικά χαρακτηριστικά των τηλεκατευθυνόμενων σκαφών
        που επηρεάζουν τη χρηστικότητα και την ανθεκτικότητά τους.
    remote_control_watercraft_propulsion_drive_type:
      name: Τύπος πρόωσης/κίνησης σκαφών τηλεχειρισμού
      description: Καθορίζει τον τρόπο με τον οποίο κινείται το τηλεκατευθυνόμενο
        σκάφος στο νερό.
    remote_control_watercraft_water_environment:
      name: Τηλεκατευθυνόμενα σκάφη στο υδάτινο περιβάλλον
      description: Υποδεικνύει τις συνθήκες νερού στις οποίες το σκάφος RC αποδίδει
        καλύτερα.
    remote_keyless_system_programming_method:
      name: Μέθοδος προγραμματισμού συστήματος τηλεχειρισμού χωρίς κλειδί
      description: Πώς προγραμματίζεται ή συσχετίζεται το τηλεχειριστήριο/το σύστημα
        με το όχημα (π.χ. διαδικασία μέσω του οχήματος ή με επαγγελματικό εργαλείο).
    repair_compound_type:
      name: Τύπος υλικού επισκευής
      description: Τύπος/σύνθεση του αναλώσιμου υλικού επισκευής που περιλαμβάνεται
        (π.χ. τύπος στόκου αμαξώματος, τύπος ρητίνης παρμπρίζ, τύπος κόλλας/στεγανωτικού
        για βουλώματα ελαστικών).
    repair_kit_components:
      name: Εξαρτήματα του κιτ επισκευής
      description: Παραθέτει τα συγκεκριμένα είδη που περιλαμβάνονται στο κιτ επισκευής,
        επιτρέποντας στους αγοραστές να γνωρίζουν το περιεχόμενο και να συγκρίνουν
        τα πακέτα.
    repair_method:
      name: Μέθοδος επισκευής
      description: Καθορίζει την κύρια μέθοδο επισκευής που χρησιμοποιεί το κιτ, όπως
        αυτοκόλλητα επιθέματα ή αντικατάσταση βαλβίδας.
    replacement_part_purpose:
      name: Σκοπός εξαρτήματος αντικατάστασης
      description: Δείχνει αν το προϊόν είναι ανταλλακτικό OEM, εξάρτημα αναβάθμισης/βελτίωσης
        επιδόσεων ή πρόσθετο αξεσουάρ.
    replacement_part_type:
      name: Τύπος ανταλλακτικού
      description: Προσδιορίζει τη λειτουργική κατηγορία του εξαρτήματος του ελλιπτικού,
        επιτρέποντας στους αγοραστές να φιλτράρουν τα αποτελέσματα για το εξάρτημα
        που χρειάζονται.
    replacement_parts_availability:
      name: Διαθεσιμότητα ανταλλακτικών
      description: Δείχνει αν υπάρχουν αναλώσιμα/ανταλλακτικά εξαρτήματα για το εργαλείο
        εισαγωγής (π.χ. ανταλλακτικά άγκιστρα/σύρματα).
    replica_gun_action_type:
      name: Τύπος μηχανισμού ρεπλίκα όπλου
      description: Καθορίζει τον τύπο λειτουργίας/ενέργειας ρεπλίκας όπλου (όπως απεικονίζεται),
        όπως όπλο με κλείστρο ή όπλο με μοχλό.
    replica_gun_firing_mechanism:
      name: Μηχανισμός πυροδότησης ρεπλίκα όπλου
      description: Δείχνει αν και με ποιον τρόπο η ρεπλίκα προσομοιώνει τη λειτουργία
        πυροδότησης (μη θανατηφόρα), όπως π.χ. πυροδότηση με καψούλα ή χωρίς πυροδότηση.
    replica_gun_moving_parts:
      name: Λειτουργικά κινούμενα μέρη ρέπλικας όπλου
      description: Υποδεικνύει ποια μέρη της ρέπλικας είναι λειτουργικά ή κινούμενα.
    reservoir_orientation:
      name: Προσανατολισμός δοχείου υγρών
      description: Καθορίζει τον προβλεπόμενο προσανατολισμό ή τη διάταξη του ασκού
        νερού μέσα στο σακίδιο.
    reservoir_type:
      name: Τύπος δοχείου υγρών
      description: Τύπος διαμόρφωσης δοχείου υγρών για την αντλία συμπλέκτη.
    resin_suitability:
      name: Συμβατότητα με ρητίνη
      description: Καθορίζει αν η μπάλα χειροσφαίρισης είναι σχεδιασμένη για χρήση
        με ρητίνη (κόλλα) ή χωρίς ρητίνη.
    resistance_adjustability:
      name: Δυνατότητα ρύθμισης αντίστασης
      description: Καθορίζει αν η αντίσταση στην αναπνοή μπορεί να ρυθμιστεί από τον
        χρήστη.
    resistance_band_design:
      name: Τύπος λάστιχου αντίστασης
      description: Περιγράφει τη φυσική μορφή ή τον τύπο του λάστιχου αντίστασης (π.χ.
        θηλιά, σωληνωτό με λαβές, σχήμα «8»), βοηθώντας τους χρήστες να επιλέξουν
        τον κατάλληλο σχεδιασμό για την προπόνησή τους.
    resistance_loading_type:
      name: Τύπος φόρτισης αντίστασης
      description: Υποδεικνύει τον τρόπο με τον οποίο παρέχεται ή φορτώνεται η αντίσταση/το
        βάρος στο μηχάνημα Smith (π.χ. με δίσκους βαρών ή μέσω επιλεγόμενης στοίβας
        βαρών).
    response_fields_included:
      name: Περιλαμβανόμενα πεδία απόκρισης
      description: Καθορίζει ποια τυπικά πεδία/επιλογές απόκρισης περιλαμβάνονται
        στην κάρτα απάντησης (π.χ. αποδοχή/απόρριψη, επιλογή γεύματος).
    restoration_status:
      name: Κατάσταση αποκατάστασης
      description: Υποδεικνύει αν το βαν είναι σε αυθεντική κατάσταση, αναπαλαιωμένο,
        τροποποιημένο τύπου restomod ή υπό αποκατάσταση.
    rhinestone_base_color_family:
      name: Χρωματική κατηγορία βάσης στρας
      description: Προσδιορίζει τη χρωματική κατηγορία της βάσης του στρας (π.χ. διάφανο/κρυστάλλινο,
        χρυσό/κίτρινο, μπλε).
    rhinestone_facet_style:
      name: Στυλ επιφανειακής κοπής στρας
      description: Το μοτίβο των όψεων/εδρών του στρας, το οποίο επηρεάζει τη λάμψη
        και την εμφάνισή του (π.χ. Xilion rose, brilliant cut, πολύπλευρη ή λεία επιφάνεια).
    rhinestone_hole_reinforcement_material:
      name: Υλικό ενίσχυσης της οπής του στρας
      description: Το υλικό γύρω από ή στα σημεία των οπών (π.χ. μεταλλικό κρίκο ενίσχυσης,
        χυτευμένο πλαστικό), το οποίο επηρεάζει την αντοχή κατά το ράψιμο.
    rhinestone_setting_type:
      name: Τύπος τοποθέτησης στρας
      description: Ο τρόπος με τον οποίο το στρας στερεώνεται ή περιβάλλεται για ράψιμο
        (π.χ. στερέωση με νύχια, στερέωση τύπου bezel, στερέωση με περιμετρικό πλαίσιο).
    rhubarb_product_cut_type:
      name: Τύπος κοπής προϊόντος ραβέντι
      description: Περιγράφει τη φυσική προετοιμασία ή τον τύπο κοπής του προϊόντος
        ραβέντι.
    ribbon_construction:
      name: Κατασκευή κορδέλας
      description: Περιγράφει τα βασικά χαρακτηριστικά κατασκευής της κορδέλας γκρογκρέιν,
        όπως το αν είναι ενισχυμένη με σύρμα ή ελαστική, κάτι που επηρεάζει τη χρήση
        της (π.χ. για φιόγκους ή για ράψιμο).
    ribbon_packaging_type:
      name: Τύπος συσκευασίας με κορδέλα
      description: Δείχνει τον τρόπο με τον οποίο διατίθεται/πωλείται η κορδέλα.
    ribbon_pattern_style:
      name: Στυλ μοτίβου κορδέλας
      description: Κατηγοριοποιεί τη μέθοδο εφαρμογής μοτίβων που χρησιμοποιείται
        συνήθως στις κορδέλες γκρογκρέιν.
    ribbon_sheen_level:
      name: Επίπεδο γυαλάδας της κορδέλας
      description: Δείχνει την οπτική λάμψη/γυαλάδα της επιφάνειας της σατινέ κορδέλας.
    ribbon_style:
      name: Στυλ κορδέλας
      description: Καθορίζει το οπτικό μοτίβο/στυλ της κορδέλας (π.χ. μονόχρωμη, ριγέ,
        τρίχρωμη).
    ribbon_trim_backing_type:
      name: Τύπος βάσης κορδέλας/διακοσμητικού στοιχείου
      description: Δείχνει αν η κορδέλα/το διακοσμητικό έχει βάση και ποια είναι αυτή
        (για εύκολη εφαρμογή).
    ribbon_trim_edge_finish:
      name: Φινίρισμα κορδέλας/διακοσμητικό περίγραμμα
      description: Περιγράφει τη δομή και το φινίρισμα των άκρων της κορδέλας/του
        διακοσμητικού στοιχείου (χρήσιμο για τη συμπεριφορά κατά της φθοράς και την
        προβλεπόμενη χρήση).
    ric_rac_wave_size:
      name: Μέγεθος κυματισμού Ric-rac
      description: Περιγράφει το ύψος/την κλίμακα των κυμάτων του ric-rac (πόσο μεγάλα
        είναι τα ζιγκ-ζαγκ/τα κύματα).
    rice_grain_length:
      name: Μήκος κόκκου ρυζιού
      description: Ταξινομεί τα προϊόντα ρυζιού ανάλογα με το μήκος του κόκκου, όπως
        μικρό, μεσαίο ή μακρύ κόκκο, κάτι που επηρεάζει τις ιδιότητες μαγειρέματος
        και τη χρήση τους στην κουζίνα.
    rice_processing_method:
      name: Μέθοδος επεξεργασίας ρυζιού
      description: Περιγράφει τον τρόπο επεξεργασίας ή προετοιμασίας του ρυζιού (π.χ.
        προβρασμένο, αναπτυγμένο, σε νιφάδες), ο οποίος επηρεάζει τον χρόνο μαγειρέματος,
        τη θρεπτική αξία και τη χρήση του.
    rice_variety:
      name: Ποικιλία ρυζιού
      description: Αναφέρει τη συγκεκριμένη ποικιλία ή το συγκεκριμένο στέλεχος ρυζιού,
        επιτρέποντας στους αγοραστές να επιλέξουν κόκκους με την προτιμώμενη γεύση,
        το άρωμα, την υφή και την κουζίνα για την οποία προορίζονται.
    riding_toy_features:
      name: Χαρακτηριστικά του παιχνιδιού οδήγησης
      description: Επισημαίνει τα κοινά λειτουργικά χαρακτηριστικά και χαρακτηριστικά
        ασφαλείας που αφορούν τα παιχνίδια οδήγησης.
    rifle_action_type:
      name: Τύπος κλείστρου του τουφεκιού
      description: Ο μηχανισμός λειτουργίας του τυφεκίου (πώς γεμίζει/πυροβολεί/εκτοξεύει)
        είναι σημαντικός για την αναγνώριση και το ενδιαφέρον των συλλεκτών.
    rifle_finish:
      name: Φινίρισμα τουφεκιού
      description: Πρωτογενής εξωτερική επίστρωση/επίστρωση των μεταλλικών κατασκευών.
    rifle_magazine_type:
      name: Τύπος γεμιστήρα τουφεκιού
      description: Τύπος συστήματος εφοδιασμού για το τουφέκι.
    rifle_stock_material:
      name: Υλικό κατασκευής της λαβής του τυφεκίου
      description: Κύριο υλικό κατασκευής της λαβής/των εξαρτημάτων του τυφεκίου (π.χ.
        καρυδιά, πολυμερές).
    rim_clamping_method:
      name: Μέθοδος σύσφιξης στεφάνης
      description: Πώς η μηχανή συγκρατεί τον τροχό/τη ζάντα κατά την τοποθέτηση και
        την αφαίρεση.
    rim_strip_type:
      name: Τύπος ταινίας στεφάνης
      description: Κατηγοριοποιεί τη λωρίδα/ταινία ανάλογα με το στυλ, τη δομή ή τη
        συγκεκριμένη χρήση της (π.χ. ταινία ζάντας για ελαστικά χωρίς αεροθάλαμο έναντι
        προστατευτικής λωρίδας από καουτσούκ).
    rim_tubeless_compatibility:
      name: Συμβατότητα με χωρίς σαμπρέλα
      description: Δείχνει αν η ζάντα, η ταινία ή ο τροχός είναι σχεδιασμένοι για
        χρήση με ελαστικά χωρίς σαμπρέλα.
    ripeness_stage:
      name: Στάδιο ωρίμανσης
      description: Δείχνει το στάδιο ωρίμανσης του φρούτου κατά τη στιγμή της πώλησης
        (π.χ. άγουρο, ώριμο, έτοιμο για κατανάλωση).
    riser_pad_type:
      name: Τύπος βάσης στήριξης
      description: Κατηγοριοποιεί το λειτουργικό στυλ της ενίσχυσης (π.χ. τυπικός
        αποστάτης, απορροφητικό κραδασμών, γωνιακή σφήνα).
    roasted_malt_processing_type:
      name: Τύπος επεξεργασίας καβουρδισμένης βύνης
      description: Η συγκεκριμένη μέθοδος επεξεργασίας ή παραλλαγή που χρησιμοποιείται
        για την παραγωγή καβουρδισμένης βύνης ή καβουρδισμένων δημητριακών (π.χ. αβυνοποίητο
        καβουρδισμένο κριθάρι, black malt, εκδοχές μειωμένης πικράδας ή χωρίς φλοιό).
    robotic_toy_interaction_mode:
      name: Τρόπος αλληλεπίδρασης του ρομποτικού παιχνιδιού
      description: Περιγράφει τον βασικό τρόπο με τον οποίο το ρομποτικό παιχνίδι
        αλληλεπιδρά ή κινείται κατά τη διάρκεια του παιχνιδιού.
    robotic_toy_light_features:
      name: Φωτεινές λειτουργίες ρομποτικού παιχνιδιού
      description: Υποδεικνύει αν και με ποιον τρόπο το παιχνίδι χρησιμοποιεί φωτισμό
        ως μέρος του παιχνιδιού (π.χ. LED, προβολή φωτός).
    robotic_toy_programming_supported:
      name: Δυνατότητες προγραμματισμού του ρομποτικού παιχνιδιού
      description: Καθορίζει ποια μέθοδο προγραμματισμού, εφόσον υποστηρίζεται, διαθέτει
        το παιχνίδι.
    robotic_toy_skill_level:
      name: Επίπεδο δεξιοτήτων για ρομποτικό παιχνίδι
      description: Υποδεικνύει το επίπεδο πολυπλοκότητας λειτουργίας ή προγραμματισμού
        που αναμένεται από τον χρήστη.
    robotic_toy_sound_features:
      name: Ηχητικές λειτουργίες ρομποτικού παιχνιδιού
      description: Υποδεικνύει τις δυνατότητες ήχου του ρομποτικού παιχνιδιού.
    rod_butt_style:
      name: Τύπος λαβής βάσης ράβδου
      description: Καθορίζει τη διαμόρφωση του κάτω άκρου της ράβδου που χρησιμοποιείται
        σε εφαρμογές συρτής.
    rod_construction_type:
      name: Τύπος κατασκευής ράβδου
      description: Δείχνει τη γενική δομή της ράβδου όσον αφορά τον αριθμό των τμημάτων
        και τη δυνατότητα αναδίπλωσης.
    rod_guide_material:
      name: Υλικό οδηγού ράβδου
      description: Καθορίζει το υλικό από το οποίο κατασκευάζονται οι οδηγοί ή τα
        ένθετα της ράβδου ψαρέματος, επηρεάζοντας την ανθεκτικότητα, το βάρος και
        την τριβή της πετονιάς.
    rod_guide_type:
      name: Τύπος οδηγού ράβδου
      description: Καθορίζει το βασικό στυλ των οδηγών γραμμής που είναι τοποθετημένοι
        στη ράβδο.
    rod_handle_type:
      name: Τύπος λαβής ράβδου
      description: Καθορίζει τη διαμόρφωση της λαβής μιας ράβδου, συμβάλλοντας στην
        άνεση και στην επιλογή της τεχνικής.
    roll_cage_tubing_material:
      name: Υλικό κατασκευής σωλήνων του κλωβού ασφαλείας
      description: Καθορίζει το υλικό ή το κράμα των σωλήνων που χρησιμοποιούνται
        για το κλωβό ασφαλείας ή τη μπάρα προστασίας (π.χ. χάλυβας DOM έναντι χρωμομολυβδαινικού
        χάλυβα 4130).
    roller_skate_brake_shape:
      name: Σχήμα φρένου πατινιών με ρόδες
      description: Περιγράφει το γεωμετρικό σχήμα/το προφίλ της κεφαλής του φρένου,
        ανάλογα με τις απαιτήσεις απόδοσης ή τις αισθητικές προτιμήσεις.
    roller_skate_brake_type:
      name: Τύπος φρένου roller skate
      description: Αναφέρεται στο σύστημα πέδησης που χρησιμοποιείται στα πατίνια.
    roller_ski_technique:
      name: Τεχνική του ρόλερ σκι
      description: Αναφέρει την τεχνική του σκι αντοχής για την οποία έχουν σχεδιαστεί
        τα ρόλερ σκι.
    roller_technology:
      name: Τεχνολογία ρόλερ
      description: Υποδηλώνει ενσωματωμένη τεχνολογία που βελτιώνει την απόδοση του
        μασάζ, όπως η δόνηση ή η θερμότητα.
    rolling_case_wheel_configuration:
      name: Διάταξη τροχών τροχήλατης θήκης
      description: Καθορίζει τη διάταξη των τροχών που χρησιμοποιείται στις τροχήλατες
        θήκες μουσικών πληκτρολογίων.
    rolling_paper_format:
      name: Μορφές χαρτιού για στριφτά
      description: Περιγράφει τη φυσική μορφή του προϊόντος (π.χ. φύλλα, προ-τυλιγμένοι
        κώνοι, χαρτάκια).
    rolling_paper_gum_type:
      name: Τύπος κόλλας για χαρτάκια στριφτού
      description: Καθορίζει το συγκολλητικό υλικό (κόλλα) που χρησιμοποιείται στην
        άκρη του χαρτιού για τη σφράγιση, το οποίο μπορεί να επηρεάσει τη γεύση και
        την απόδοση.
    rolling_paper_size:
      name: Μέγεθος χαρτιού στριφτού
      description: Υποδεικνύει την τυπική ταξινόμηση μεγέθους του χαρτιού στριφτού
        ή του κώνου, επιτρέποντας στους αγοραστές να επιλέξουν γρήγορα το σωστό πλάτος/μήκος
        ανάλογα με τις ανάγκες τους.
    rolling_stock_type:
      name: Τύπος σιδηροδρομικού υλικού
      description: Καθορίζει τον τύπο του τρένου ή του σιδηροδρομικού οχήματος που
        αντιπροσωπεύει το μοντέλο (μηχανή έναντι επιβατικών/εμπορευματικών βαγονιών
        και συνήθεις υποκατηγορίες βαγονιών).
    roof_cargo_net_hook_fastener_style:
      name: Γάντζος/σύνδεσμος για πλέγμα μεταφοράς οροφής
      description: Καθορίζει τον τύπο του εξαρτήματος σύνδεσης που χρησιμοποιείται
        για τη σύνδεση του διχτυού με τα σημεία αγκύρωσης (π.χ. γάντζος τύπου S, καραμπινέρ,
        γάντζος τύπου J).
    roof_height_class:
      name: Κατηγορία ύψους οροφής
      description: Κατηγοριοποιεί τα συνήθη ύψη οροφής για φορτηγάκια (ιδιαίτερα σχετικό
        για μετατροπές/κατασκευές τροχόσπιτων).
    roof_type:
      name: Τύπος στέγης
      description: Διαμόρφωση της οροφής ή του τμήματος της οροφής του περιβλήματος.
    root_variety:
      name: Ποικιλία ρίζας
      description: Προσδιορίζει την ποικιλία ή τον συνηθισμένο τύπο της ρίζας (π.χ.
        ποικιλίες χρένου έναντι ποικιλιών γνήσιου wasabi).
    rope_buoyancy:
      name: Άνωση σχοινιού
      description: Δηλώνει αν το σχοινί έχει σχεδιαστεί ώστε να επιπλέει στην επιφάνεια
        του νερού, βοηθώντας τους χρήστες να αποφεύγουν το μπλέξιμο και διευκολύνοντας
        την ανάσυρσή του.
    rope_construction:
      name: Κατασκευή σχοινιού
      description: Προσδιορίζει λεπτομέρειες σχετικά με τη δομή του ινώδους υλικού
        πέρα από τον τύπο πλέξης, όπως για παράδειγμα αν ο πυρήνας και το περίβλημα
        είναι στριμμένα ή πλεγμένα, καθώς και αν το σχοινί είναι τύπου kernmantle.
    rope_material:
      name: Υλικό σχοινιού
      description: Αναφέρει το υλικό από το οποίο είναι κατασκευασμένο το σχοινί/κορδόνι
        συντονισμού.
    rope_strand_compatibility:
      name: Συμβατότητα των κλώνων του σχοινιού
      description: Δείχνει ποιες διαμορφώσεις κλώνων σχοινιού μπορεί να χειριστεί
        η συσκευή ασφάλισης (μονό, μισό/διπλό, δίδυμο ή συνδυασμούς).
    rope_stretch_type:
      name: Τύπος ελαστικού σχοινιού
      description: Περιγράφει τις ιδιότητες ελαστικότητας του σχοινιού, διακρίνοντας
        μεταξύ τύπων χωρίς ελαστικότητα, χαμηλής ελαστικότητας, τυπικών ή τύπου bungee.
    rose_bloom_stage:
      name: Στάδιο άνθησης της τριανταφυλλιάς
      description: Δείχνει πόσο ανοιχτά είναι τα άνθη του τριαντάφυλλου κατά την παράδοση/άφιξη
        (από μπουμπούκι έως πλήρως ανοιχτά).
    rose_grade:
      name: Κατηγορία τριαντάφυλλου
      description: Τα τριαντάφυλλα είναι εμπορικής ποιότητας.
    rosette_center_type:
      name: Τύπος κεντρικής ροζέτας
      description: Καθορίζει τον τύπο του κεντρικού διακοσμητικού στοιχείου ή του
        ενθέματος στην μπροστινή όψη της ροζέτας.
    rosin_dust_level:
      name: Επίπεδο σκόνης κολοφωνίου
      description: Υποδεικνύει την αναμενόμενη ποσότητα σκόνης κολοφωνίου που παράγεται
        κατά την κανονική χρήση.
    rosin_formula_additives:
      name: Σύνθεση / πρόσθετα κολοφωνίου
      description: Προσδιορίζει ιδιαίτερα χαρακτηριστικά της σύνθεσης, όπως υποαλλεργικές
        φόρμουλες, χαμηλή παραγωγή σκόνης ή μείγματα εμπλουτισμένα με μέταλλα.
    rosin_hardness:
      name: Σκληρότητα κολοφωνίου
      description: Υποδεικνύει τη σχετική σκληρότητα ή μαλακότητα του κολοφωνίου για
        δοξάρι, η οποία μπορεί να επηρεάσει το κράτημα και την παραγωγή σκόνης ανάλογα
        με το κλίμα και το στυλ παιξίματος.
    rotation_mechanism_type:
      name: Τύπος μηχανισμού περιστροφής
      description: Καθορίζει τον μηχανισμό που επιτρέπει την περιστροφή του σχοινιού,
        επηρεάζοντας την ομαλότητα της κίνησης και την επιτεύξιμη ταχύτητα (π.χ. ρουλεμάν
        έναντι δακτυλίων ολίσθησης / bushings).
    rotation_motion_features:
      name: Χαρακτηριστικά περιστροφής/κίνησης
      description: Υποδεικνύει αν και με ποιον τρόπο οι πλανήτες ή οι τροχιές περιστρέφονται
        ή κινούνται.
    rotor_configuration_type:
      name: Τύπος διαμόρφωσης ρότορα
      description: Προσδιορίζει τη διαμόρφωση των ρότορων και τον τύπο χειρισμού του
        RC ελικοπτέρου (π.χ. ομοαξονικό, μονού ρότορα σταθερού βήματος ή συλλογικού
        βήματος, πολυκόπτερα), στοιχεία που επηρεάζουν ουσιαστικά τα χαρακτηριστικά
        πτήσης και την καταλληλότητά του για διαφορετικά επίπεδα εμπειρίας.
    rotor_construction_type:
      name: Τύπος κατασκευής ρότορα
      description: Καθορίζει τον τύπο κατασκευής του ρότορα, ο οποίος επηρεάζει το
        βάρος, την ακαμψία και τη διαχείριση θερμότητας.
    rotor_mounting_interface:
      name: Διεπαφή στερέωσης ρότορα
      description: Καθορίζει το πρότυπο διεπαφής πλήμνης που χρησιμοποιείται για τη
        σύνδεση του ρότορα με τον τροχό.
    rotor_mounting_standard:
      name: Πρότυπο στερέωσης ρότορα
      description: Καθορίζει το πρότυπο σύνδεσης που χρησιμοποιείται για την τοποθέτηση
        του ρότορα στην πλήμνη (π.χ. 6-bolt ή Center Lock).
    roulette_set_components_included:
      name: Περιλαμβάνονται εξαρτήματα σετ ρουλέτας
      description: Βασικά εξαρτήματα που σχετίζονται με τη ρουλέτα και περιλαμβάνονται
        στον τροχό ή στο σετ.
    roulette_wheel_ball_track_type:
      name: Τύπος διαδρόμου μπάλας τροχού ρουλέτας
      description: Περιγράφει τον τύπο διαδρόμου της μπάλας που χρησιμοποιείται στον
        τροχό, ο οποίος επηρεάζει τον ρεαλισμό και την αίσθηση του παιχνιδιού.
    roulette_wheel_numbering_system:
      name: Σύστημα αρίθμησης τροχού ρουλέτας
      description: Υποδεικνύει τη διάταξη αρίθμησης και τη διαμόρφωση μηδενικού του
        τροχού ρουλέτας για συμβατότητα με τους κανόνες και τις πιθανότητες του παιχνιδιού.
    rounders_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός rounders
      description: Παραθέτει τα συγκεκριμένα είδη ή αξεσουάρ rounders που περιλαμβάνονται
        στο σετ ή στο πακέτο προπόνησης, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι
        περιέχει η συσκευασία.
    rounders_governing_body_approval:
      name: Έγκριση από επίσημο φορέα του rounders
      description: Υποδεικνύει πιστοποίηση ή έγκριση από επίσημο φορέα του rounders
        ή άλλον αθλητικό οργανισμό διοίκησης.
    row_counter_format:
      name: Τύπος μετρητή σειρών
      description: Καθορίζει τον τύπο ή το στυλ του μετρητή σειρών πλεξίματος (π.χ.
        δαχτυλίδι, αλυσίδα, clicker, ψηφιακός).
    row_counter_mechanism:
      name: Μηχανισμός μετρητή σειρών
      description: Καθορίζει τον τρόπο με τον οποίο προχωρά ή καταγράφεται η μέτρηση
        των σειρών στο εργαλείο.
    row_counter_mounting_method:
      name: Τρόπος στερέωσης μετρητή σειρών
      description: Ο τρόπος με τον οποίο στερεώνεται ο μετρητής ή ο δείκτης κατά τη
        χρήση (π.χ. στη βελόνα, στο δάχτυλο, στο έργο πλεξίματος κ.λπ.).
    rowel_type:
      name: Τύπος ακίδας
      description: Περιγράφει το σχήμα ή το προφίλ των άκρων της ροδέλας των σπιρουνιών,
        ανάλογα με τις προτιμήσεις του αναβάτη και την ευαισθησία του αλόγου.
    rowing_machine_part_type:
      name: Τύπος εξαρτήματος κωπηλατικής μηχανής
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα που προορίζεται να αντικαταστήσει
        το προϊόν σε μια κωπηλατική μηχανή, ώστε οι αγοραστές να μπορούν να βρίσκουν
        γρήγορα το ακριβές ανταλλακτικό που χρειάζονται χωρίς να δημιουργείται υπερβολικά
        μεγάλος αριθμός μικροκατηγοριών.
    rubber_ducky_character_theme:
      name: Χαρακτήρας/θέμα «λαστιχένιο παπάκι»
      description: Σχεδιασμός θέματος ή χαρακτήρα για το λαστιχένιο παπάκι (χρήσιμο
        για παπάκια-σουβενίρ ή συλλεκτικά).
    rubber_ducky_features:
      name: Χαρακτηριστικά του λαστιχένιας πάπιας
      description: Λειτουργικά χαρακτηριστικά και χαρακτηριστικά σχεδιασμού που αφορούν
        ειδικά τα παιχνίδια μπάνιου σε σχήμα λαστιχένιας πάπιας.
    rubber_ducky_size_class:
      name: Κατηγορία μεγέθους «λαστιχένιο παπάκι»
      description: Μια ομαδοποίηση μεγεθών για τα λαστιχένια παπάκια, φιλική προς
        τον αγοραστή, με βάση τη συνήθη χρήση (παιχνίδι για το μπάνιο, διακοσμητικό
        για τούρτα ή γιγάντιο).
    ruffle_style:
      name: Στυλ με βολάν
      description: Περιγράφει τη δομή ή το διακοσμητικό στυλ του βολάν στο κορδόνι
        μιας καρέκλας.
    rugby_headgear_safety_certification:
      name: Πιστοποίηση ασφάλειας κράνους ράγκμπι
      description: Δείχνει αν το κράνος πληροί τα επίσημα πρότυπα ασφάλειας του ράγκμπι
        ή τα γενικά πρότυπα ασφάλειας για τον αθλητισμό.
    rugby_size:
      name: Μέγεθος ράγκμπι
      description: Κατηγοριοποιεί τον εξοπλισμό με βάση τις συνήθεις ενδείξεις μεγεθών
        που χρησιμοποιούνται ειδικά για το ράγκμπι στους τίτλους των προϊόντων.
    rugby_variant:
      name: Παραλλαγή του ράγκμπι
      description: Καθορίζει την παραλλαγή του ράγκμπι (κώδικας ή μορφή) για την οποία
        προορίζεται το προϊόν.
    ruler_edge_type:
      name: Τύπος άκρου χάρακα
      description: Προσδιορίζει το προφίλ ή τη λειτουργία της άκρης που χρησιμοποιείται
        για τη μέτρηση ή τη σήμανση (π.χ. ευθεία άκρη, λαξευμένη, προεξοχή).
    ruler_marking_style:
      name: Στυλ σήμανσης με χάρακα
      description: Περιγράφει τη διάταξη των σημάνσεων και των οδηγών που είναι τυπωμένη
        στο χάρακα, πέρα από τις βασικές διαβαθμίσεις.
    runner_configuration:
      name: Διαμόρφωση διαδρόμου
      description: Περιγράφει τον αριθμό και τη διάταξη των ραγών στο έλκηθρο.
    runner_material:
      name: Υλικό πέδιλου
      description: Καθορίζει το υλικό που χρησιμοποιείται για τα πέδιλα ή τις λωρίδες
        ολίσθησης του έλκηθρου.
    saddle_cover_style:
      name: Στυλ καλύμματος σέλας
      description: Κατηγοριοποιεί τον γενικό σχεδιασμό ή τον τρόπο χρήσης του προϊόντος
        (π.χ. κάλυμμα αποθήκευσης, κάλυμμα για μεταφορά με το όχημα, τσάντα μεταφοράς).
    saddle_design:
      name: Σχεδιασμός σέλας
      description: Κατηγοριοποιεί τον γενικό εργονομικό σχεδιασμό ή το στυλ της σέλας
        (π.χ. με κοψίματα, χωρίς μύτη, με διαχωριστή μύτη, με ελατήρια).
    saddle_discipline:
      name: Πειθαρχία σέλας
      description: Καθορίζει την κύρια ιππική δραστηριότητα ή την προβλεπόμενη χρήση/το
        στυλ της σέλας.
    saddle_mounting_type:
      name: Τύπος στερέωσης σέλας
      description: Καθορίζει τη σύνδεση μεταξύ της σέλας και του σωλήνα σέλας για
        λόγους συμβατότητας (π.χ. με ράγες, περιστρεφόμενη, τύπου I-Beam).
    saddle_pad_shape:
      name: Σχήμα σέλας
      description: Περιγράφει το σχήμα και το περίγραμμα του προστατευτικού, τα οποία
        επηρεάζουν τη συμβατότητα με τη σέλα και τις αισθητικές προτιμήσεις.
    saddle_pad_style:
      name: Στυλ υποστρώματος σέλας
      description: Προσδιορίζει το λειτουργικό στυλ ή τον προορισμό του προστατευτικού,
        επιτρέποντας στους ποδηλάτες να επιλέξουν το κατάλληλο σχέδιο για τη δραστηριότητά
        τους ή τον τύπο της σέλας τους.
    saddle_padding_material:
      name: Υλικό επένδυσης σέλας
      description: Δείχνει το κύριο υλικό ή την τεχνολογία απορρόφησης κραδασμών στο
        εσωτερικό της σέλας που επηρεάζει την άνεση και την αίσθηση κατά την οδήγηση.
    saddle_rail_material:
      name: Υλικό ράγας σέλας
      description: Αναφέρεται στο υλικό από το οποίο κατασκευάζονται οι ράγες κάτω
        από τη σέλα ενός ποδηλάτου, το οποίο επηρεάζει την αντοχή, την άνεση, το βάρος
        και την τιμή.
    saddle_tree_material:
      name: Υλικός σκελετού σέλας
      description: Αναφέρεται στο υλικό από το οποίο κατασκευάζεται ο σκελετός της
        σέλας, δηλαδή το εσωτερικό πλαίσιο της σέλας.
    saddle_tree_width:
      name: Πλάτος σκελετού σέλας
      description: Περιγράφει την ταξινόμηση του σκελετού της σέλας ανάλογα με το
        πλάτος, η οποία καθορίζει την εφαρμογή στον ώμο του αλόγου.
    safety_documentation_available:
      name: Διατίθεται τεκμηρίωση ασφάλειας
      description: Δείχνει ποια έγγραφα συμμόρφωσης/ασφάλειας παρέχονται για το συστατικό
        (π.χ. δελτίο δεδομένων ασφάλειας, πιστοποιητικό/δήλωση IFRA, δήλωση αλλεργιογόνων).
    safety_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός ασφαλείας
      description: Είδη ασφάλειας/προστασίας που περιλαμβάνονται στο κιτ.
    safety_features:
      name: Χαρακτηριστικά ασφαλείας
      description: Υποδηλώνει ενσωματωμένα χαρακτηριστικά ασφαλείας που αποσκοπούν
        στη μείωση του κινδύνου τυχαίων κοψιμάτων ή στην προστασία της λεπίδας κατά
        την αποθήκευση.
    safety_harness_type:
      name: Τύπος ζώνης ασφαλείας
      description: Δείχνει τον τύπο και τη διαμόρφωση της ζώνης ασφαλείας για παιδιά
        που παρέχεται μαζί με το κάθισμα.
    safety_mechanism_type:
      name: Τύπος μηχανισμού ασφαλείας
      description: Περιγράφει τον τύπο του ενσωματωμένου συστήματος ασφαλείας που
        χρησιμοποιείται για τη συγκράτηση της μπάρας σε περίπτωση αποτυχίας της άρσης.
    safety_restraint_type:
      name: Τύπος συστήματος συγκράτησης
      description: Τύπος ενσωματωμένου συστήματος συγκράτησης παιδιών στο πίσω κάθισμα,
        εάν υπάρχει.
    safety_warning:
      name: Προειδοποίηση ασφαλείας
      description: Δείχνει αν το προϊόν φέρει τις συνήθεις προειδοποιήσεις ασφάλειας
        για τα παιχνίδια που αφορούν τις μπίλιες (π.χ. κίνδυνος πνιγμού).
    sail_shape:
      name: Σχήμα πανιού
      description: Περιγράφει το γεωμετρικό σχήμα του πανιού του καγιάκ, το οποίο
        επηρεάζει την απόδοση, τον χειρισμό και την τοποθέτηση.
    salad_dressing_type:
      name: Τύπος σάλτσας για σαλάτα
      description: Προσδιορίζει το βασικό στυλ ή την υφή της σάλτσας (π.χ. κρεμώδης,
        βινεγκρέτ, με βάση το γιαούρτι), βοηθώντας τους αγοραστές να διακρίνουν τις
        διάφορες βάσεις και υφές.
    salad_topping_base_ingredient:
      name: Βασικό συστατικό για γαρνιτούρα σαλάτας
      description: Καθορίζει την κύρια ομάδα συστατικών από την οποία αποτελείται
        η γαρνιτούρα, βοηθώντας τους πελάτες να φιλτράρουν τα αποτελέσματα βάσει διατροφικών
        προτιμήσεων, αλλεργιογόνων ή επιθυμητής υφής.
    salt_level:
      name: Επίπεδο αλατιού
      description: Δείχνει την ποσότητα αλατιού ή νατρίου που έχει προστεθεί στους
        ξηρούς καρπούς ή στους σπόρους.
    sand_cup_features:
      name: Χαρακτηριστικά κυπέλλου άμμου
      description: Λειτουργικά/φυσικά χαρακτηριστικά κυπέλλου άμμου που επηρεάζουν
        το παιχνίδι και τη χρήση.
    sand_shovel_handle_style:
      name: Στυλ λαβής φτυαριού για άμμο
      description: Περιγράφει το σχήμα της λαβής στο άκρο του σκελετού του φτυαριού.
    sand_toy_set_pieces_included:
      name: Περιλαμβάνονται τεμάχια παιχνιδιών άμμου
      description: Παραθέτει τα είδη των εξαρτημάτων παιχνιδιών για την άμμο που περιλαμβάνονται
        στο σετ (π.χ. κουβάς, φτυαράκι, καλούπια), ώστε να βοηθήσει τους αγοραστές
        να συγκρίνουν τα σετ με βάση το περιεχόμενό τους.
    sand_water_mill_items_included:
      name: Περιλαμβάνονται αντικείμενα με θέμα την άμμο και τον νερό
      description: Παραθέτει τα βασικά εξαρτήματα που περιλαμβάνονται στο παιχνίδι-μύλο
        (κουβάδες, φτυαράκια, καλούπια κ.λπ.).
    sandbag_style:
      name: Στιλ σάκου άμμου
      description: Προσδιορίζει τον συγκεκριμένο σχεδιασμό και τον προορισμό του σάκου
        άμμου (π.χ. Bulgarian, Strongman, Power), βοηθώντας τους αγοραστές να επιλέξουν
        ανάμεσα σε διαφορετικές μορφές προπόνησης.
    sandbox_bottom_type:
      name: Τύπος βάσης αμμοδόχου
      description: Ο τύπος κατασκευής της βάσης που χρησιμοποιείται κάτω από την άμμο.
    sandbox_drainage_type:
      name: Σύστημα αποστράγγισης αμμοδόχου
      description: Περιγράφει τον τρόπο με τον οποίο αποστραγγίζεται το νερό στην
        αμμοδόχο (εφόσον υπάρχει δυνατότητα), όπως οπές αποστράγγισης ή αφαιρούμενο
        πώμα.
    sandbox_seating_type:
      name: Τύπος καθίσματος δοχείου με άμμο
      description: Αν η αμμοδόχος διαθέτει ενσωματωμένα καθίσματα και τι είδους είναι
        αυτά.
    sapodillo_variety:
      name: Ποικιλία σαποδίγιο
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία ή καλλιεργούμενο είδος σαποδίγιο/τσίκου
        (sapodilla/chikoo) (π.χ. «Alano», «Prolific»), επιτρέποντας στους ενδιαφερόμενους
        να επιλέξουν προτιμώμενα γευστικά προφίλ και χαρακτηριστικά.
    sapote_variety:
      name: Ποικιλία sapote
      description: Καθορίζει το συγκεκριμένο είδος/τύπο σαπότε που προσφέρεται (π.χ.
        μαύρο, λευκό, mamey), επιτρέποντας στους αγοραστές να διακρίνουν μεταξύ των
        διαφορετικών ποικιλιών.
    satin_ribbon_face_type:
      name: Τύπος όψης σατέν κορδέλας
      description: Καθορίζει αν η κορδέλα έχει σατέν φινίρισμα στη μία πλευρά ή και
        στις δύο πλευρές.
    sauce_consistency:
      name: Υφή σάλτσας
      description: Περιγράφει την υφή ή το ιξώδες της σάλτσας πίτσας.
    sauce_product_form:
      name: Μορφή προϊόντος σάλτσας
      description: Υποδεικνύει τη φυσική μορφή του προϊόντος σάλτσας, όπως υγρό, λάδι,
        πάστα, σκόνη, νιφάδες ή σιρόπι.
    sauce_variety:
      name: Ποικιλία σάλτσας
      description: Προσδιορίζει το συγκεκριμένο στυλ ή οικογένεια συνταγής της λευκής
        ή κρεμώδους σάλτσας (π.χ. Alfredo, Béchamel, Hollandaise).
    saxophone_body_finish:
      name: Φινίρισμα σώματος σαξοφώνου
      description: Περιγράφει το βασικό φινίρισμα/επίστρωση του σώματος του σαξοφώνου
        (ξεχωριστά από τον μηχανισμό των πλήκτρων).
    saxophone_body_type:
      name: Τύπος σώματος σαξοφώνου
      description: Περιγράφει τη συνολική φυσική διαμόρφωση του σώματος και τον προσανατολισμό
        της καμπάνας του μπάσου σαξοφώνου.
    saxophone_construction_style:
      name: Στυλ κατασκευής σαξοφώνου
      description: Υποδεικνύει χαρακτηριστικά της κατασκευής του σαξοφώνου που επηρεάζουν
        την αντοχή, τον συντονισμό και τη συντήρηση.
    saxophone_included_accessories:
      name: Αξεσουάρ που περιλαμβάνονται στο σαξόφωνο
      description: Παραθέτει τα περιεχόμενα αξεσουάρ που συνήθως περιλαμβάνονται σε
        ένα σετ άλτο σαξοφώνου.
    saxophone_key_system:
      name: Σύστημα πλήκτρων σαξοφώνου
      description: Προσδιορίζει το σύστημα μηχανισμού πλήκτρων (keywork) του σαξοφώνου
        που χρησιμοποιείται στο όργανο.
    saxophone_key_touch_material:
      name: Υλικό επιφάνειας αφής πλήκτρων σαξοφώνου
      description: Καθορίζει το υλικό που χρησιμοποιείται στις επιφάνειες αφής των
        πλήκτρων του σαξοφώνου (π.χ. πλήκτρα με επένδυση από φίλντισι).
    saxophone_mouthpiece_baffle_type:
      name: Τύπος εσωτερικού διαφράγματος επιστομίου σαξοφώνου
      description: Περιγράφει τον σχεδιασμό του εσωτερικού διαφράγματος (baffle) που
        διαμορφώνει τη ροή του αέρα και επηρεάζει τη φωτεινότητα του ήχου.
    saxophone_neck_type:
      name: Τύπος λαιμού σαξοφώνου
      description: Καθορίζει τη διαμόρφωση του λαιμού που παρέχεται με το μπάσο σαξόφωνο.
    saxophone_package_contents:
      name: Περιεχόμενα συσκευασίας σαξοφώνου
      description: Παραθέτει τα βασικά αξεσουάρ που περιλαμβάνονται με το σαξόφωνο
        (π.χ. θήκη, επιστόμιο, δετικό, λουράκι λαιμού, σετ καθαρισμού).
    saxophone_reed_cut:
      name: Τύπος κοπής γλωττίδας σαξοφώνου
      description: Καθορίζει τον τύπο/στυλ κοπής του καλάμου του σαξοφώνου, ο οποίος
        επηρεάζει την απόκριση, τον ήχο και την αίσθηση παιξίματος.
    saxophone_reed_material_type:
      name: Τύπος υλικού γλωττίδας σαξοφώνου
      description: Καθορίζει την κατηγορία υλικού του καλάμου (reed), π.χ. φυσικός
        καλάμος (cane) ή συνθετικό υλικό.
    saxophone_reed_strength_scale:
      name: Κλίμακα σκληρότητας καλάμου σαξοφώνου
      description: Καθορίζει το σύστημα αρίθμησης/κλίμακα σκληρότητας που χρησιμοποιείται
        για τον κάλαμο (συχνά εξαρτάται από τη μάρκα), επιτρέποντας ευκολότερη σύγκριση
        μεταξύ καταχωρίσεων.
    saxophone_small_part_thread_size:
      name: Μέγεθος σπειρώματος μικρών εξαρτημάτων σαξοφώνου
      description: Καθορίζει το μέγεθος/πρότυπο σπειρώματος για τα βιδωτά μικροεξαρτήματα
        του σαξοφώνου (κυρίως βίδες), ώστε να διασφαλίζεται η σωστή εφαρμογή.
    saxophone_swab_application_area:
      name: Περιοχή εφαρμογής πανιού καθαρισμού σαξοφώνου
      description: Υποδεικνύει το τμήμα του σαξοφώνου για το οποίο προορίζεται το
        πανί καθαρισμού (swab) για καθαρισμό ή στέγνωμα.
    scabbard_material:
      name: Υλικό θηκαριού
      description: Καθορίζει το κύριο υλικό της περιλαμβανόμενης θήκης/θηκαριού (εφόσον
        υπάρχει).
    scale_model_assembly_status:
      name: Κατάσταση συναρμολόγησης μοντέλου κλίμακας
      description: Υποδεικνύει αν το μοντέλο κλίμακας είναι έτοιμο για επίδειξη ή
        αν απαιτεί συναρμολόγηση και/ή βαφή.
    scale_model_car_features:
      name: Χαρακτηριστικά μοντέλου αυτοκινήτου κλίμακας
      description: Αξιοσημείωτα χαρακτηριστικά του μοντέλου αυτοκινήτου κλίμακας,
        όπως ανοιγόμενες πόρτες/καπό, κατευθυνόμενοι τροχοί, ανάρτηση κ.λπ.
    scale_model_kit_assembly_requirements:
      name: Απαιτήσεις συναρμολόγησης κιτ μοντέλου κλίμακας
      description: Καθορίζει ποια επιπλέον βήματα συναρμολόγησης ή υλικά απαιτούνται
        πέρα από τη βασική συναρμολόγηση τύπου snap-fit.
    scale_model_kit_components_included:
      name: Περιλαμβανόμενα εξαρτήματα κιτ μοντέλου κλίμακας
      description: Παραθέτει τι περιλαμβάνεται στο μοντέλο/κιτ άρματος κλίμακας (π.χ.
        αυτοκόλλητα, φιγούρες, φωτοχαραγμένα εξαρτήματα).
    scale_model_paint_status:
      name: Κατάσταση βαφής μοντέλου κλίμακας
      description: Υποδεικνύει αν το μοντέλο ελικοπτέρου είναι προβαμμένο/έτοιμο ή
        αν απαιτεί βαφή.
    scale_model_pose:
      name: Στάση μοντέλου κλίμακας
      description: Καθορίζει τη στάση που απεικονίζει το μοντέλο αλόγου για λόγους
        έκθεσης ή προσαρμογής σε διοράματα.
    scale_model_rotor_configuration:
      name: Τύπος διάταξης ρότορα στο μοντέλο κλίμακας
      description: Καθορίζει τη διαμόρφωση του ρότορα ελικοπτέρου που απεικονίζεται
        από το μοντέλο.
    scale_model_truck_era:
      name: Εποχή μοντέλου φορτηγού κλίμακας
      description: Υποδεικνύει την εποχή/χρονική περίοδο του πραγματικού φορτηγού
        που αναπαριστά το μοντέλο (χρήσιμο για συλλέκτες που αναζητούν κλασικά ή σύγχρονα
        φορτηγά).
    scale_model_truck_propulsion_type:
      name: Τύπος πρόωσης μοντέλου φορτηγού κλίμακας
      description: Καθορίζει αν το φορτηγό που απεικονίζεται είναι πετρελαιοκίνητο,
        βενζινοκίνητο, ηλεκτρικό, υβριδικό ή άλλου τύπου πρόωσης (όπως αποδίδεται
        ή προβάλλεται από το μοντέλο).
    scale_units:
      name: Μονάδες κλίμακας
      description: Οι μονάδες μέτρησης που είναι τυπωμένες/χαραγμένες στη δοκό για
        τη ρύθμιση της ακτίνας/διαμέτρου.
    scent_function:
      name: Λειτουργία αρώματος
      description: Προσδιορίζει την κύρια λειτουργία ενός αρωματικού προϊόντος, ώστε
        οι κυνηγοί να μπορούν να επιλέξουν γρήγορα το κατάλληλο προϊόν (π.χ. ελκυστικό
        ή εξουδετερωτικό οσμών).
    scent_source:
      name: Πηγή αρώματος
      description: Παραθέτει τις κύριες βιολογικές ή αρωματικές πηγές που χρησιμοποιούνται
        στη σύνθεση του προϊόντος, όπως ούρα, αρώματα με βάση τρόφιμα, φυτικά αρώματα
        κ.λπ.
    school_bus_body_type:
      name: Τύπος αμαξώματος σχολικού λεωφορείου
      description: Ταξινομεί τα σχολικά λεωφορεία σύμφωνα με τα συνήθη πρότυπα αμαξώματος/κατηγορίας
        που χρησιμοποιούνται στην αγορά (π.χ. Τύποι Α–Δ).
    school_bus_safety_feature:
      name: Χαρακτηριστικό ασφαλείας σχολικού λεωφορείου
      description: Σημαντικός εξοπλισμός ασφαλείας που έχει εγκατασταθεί στο σχολικό
        λεωφορείο.
    school_glue_washability:
      name: Δυνατότητα πλυσίματος της σχολικής κόλλας
      description: Δείχνει πόσο εύκολα μπορεί να αφαιρεθεί η ξηρή/υγρή κόλλα από το
        δέρμα, τα ρούχα ή τις επιφάνειες.
    scissors_application:
      name: Εφαρμογή με ψαλίδι
      description: Κύρια προβλεπόμενη χρήση/υλικό κοπής για το ψαλίδι.
    scooter_brake_pad_material:
      name: Υλικό τακακιών φρένων σκούτερ
      description: Καθορίζει τη σύνθεση που χρησιμοποιείται στα τακάκια φρένων, επηρεάζοντας
        την απόδοση, τον θόρυβο και τη διάρκεια ζωής.
    scoring_method:
      name: Μέθοδος βαθμολόγησης
      description: Καθορίζει τον τρόπο καταγραφής της βαθμολογίας στο τραπέζι ποδοσφαιράκι,
        όπως με χειροκίνητους μετρητές πόντων ή ηλεκτρονικούς πίνακες αποτελεσμάτων.
    scoring_pattern:
      name: Σχέδιο βαθμολόγησης
      description: Διάταξη των ζωνών βαθμολόγησης που είναι τυπωμένες στο πεδίο παιχνιδιού.
    scoring_system_type:
      name: Τύπος συστήματος βαθμολόγησης
      description: Περιγράφει τον τύπο του μηχανισμού καταγραφής αποτελεσμάτων που
        περιλαμβάνεται στο τραπέζι, όπως χειροκίνητα ρυθμιστικά ή διάφορες ηλεκτρονικές
        οθόνες.
    scottish_smallpipes_bag_material:
      name: Υλικό ασκού για σκωτσέζικες μικρές γκάιντες
      description: Καθορίζει το υλικό του ασκού (αεροθαλάμου) που παρέχεται με τις
        σκωτσέζικες μικρές γκάιντες.
    scottish_smallpipes_drone_tuning_configuration:
      name: Διαμόρφωση κουρδίσματος ισοκράτηματων για σκωτσέζικες μικρές γκάιντες
      description: Καθορίζει τη ρύθμιση κουρδίσματος των ισοκρατημάτων που παρέχεται
        με το όργανο (τις τονικότητες/ρόλους των ισοκρατημάτων σε σχέση με τη βασική
        νότα).
    scottish_smallpipes_reed_type:
      name: Τύπος γλωττίδας για σκωτσέζικες μικρές γκάιντες
      description: Αναφέρει τον τύπο γλωττίδας που χρησιμοποιείται για το καντάρ (και/ή
        αν οι γλωττίδες είναι συνθετικές ή από καλάμι).
    scraping_surface_type:
      name: Τύπος επιφάνειας απόξεσης
      description: Προσδιορίζει τη δομή/γεωμετρία της επιφάνειας τριβής που παράγει
        ήχο (π.χ. αυλακωτή, με χτένα/δόντια, κυματοειδής).
    screw_drive_type:
      name: Τύπος κίνησης με κοχλία
      description: Καθορίζει τον τύπο της εσοχής στην κεφαλή της βίδας ή του μπουλονιού,
        υποδεικνύοντας το εργαλείο που απαιτείται για τη σύσφιξη ή την αφαίρεσή της
        (π.χ. εξάγωνο/Άλλεν, Torx).
    screw_thread_size:
      name: Μέγεθος σπειρώματος βίδας
      description: Καθορίζει το πρότυπο μεγέθους σπειρώματος των βιδών που περιλαμβάνονται
        ή είναι συμβατές (π.χ. M4, M5, M6).
    sculpting_clay_base_type:
      name: Τύπος βάσης από πλαστελίνη
      description: Περιγράφει τη σύνθεση/βάση της πλαστελίνης.
    seafood_cut:
      name: Τύπος κοπής θαλασσινών
      description: Περιγράφει την κοπή ή τον τρόπο παρουσίασης του προϊόντος θαλασσινών
        (π.χ. ολόκληρο, φιλέτο, μπριζόλα).
    seafood_processing_method:
      name: Μέθοδος επεξεργασίας θαλασσινών
      description: Καθορίζει την κύρια μέθοδο συντήρησης ή επεξεργασίας που εφαρμόζεται
        στα θαλασσινά, όπως κάπνισμα, αλάτισμα ή λυοφιλίωση (freeze-drying).
    seafood_source:
      name: Προέλευση θαλασσινών
      description: Υποδεικνύει αν τα θαλασσινά είναι αλιευμένα στη φύση, εκτροφής,
        φυτικής προέλευσης ή από άλλη πηγή, βοηθώντας τους αγοραστές να αξιολογήσουν
        τη βιωσιμότητα και την ποιότητα.
    seal_material:
      name: Υλικό στεγανοποίησης
      description: Υλικό που χρησιμοποιείται για τις στεγανοποιήσεις λαιμού, καρπών
        και αστραγάλων ή τις φλάντζες που διατηρούν τη στολή αδιάβροχη.
    seal_type:
      name: Τύπος στεγανοποίησης
      description: Καθορίζει τη μέθοδο στεγανοποίησης που χρησιμοποιείται από το εξάρτημα
        για την αποτροπή διαρροών ψυκτικού υγρού.
    sealant_formulation:
      name: Σύνθεση στεγανοποιητικού υλικού
      description: Υποδεικνύει την κύρια χημική σύνθεση ή τεχνολογία πρόσθετων του
        στεγανοποιητικού υλικού ελαστικών ποδηλάτου (π.χ. με βάση το λατέξ, ενισχυμένο
        με ίνες, ακρυλικό).
    seals_leak_type:
      name: Τύπος διαρροής στεγανοποίησης
      description: Τύπος ή σημείο διαρροής στο σύστημα ψύξης που προορίζεται να σφραγίσει
        το προϊόν.
    seam_construction:
      name: Κατασκευή ραφών
      description: Περιγράφει τον τρόπο κατασκευής της ραφής της μπάλας, ο οποίος
        επηρεάζει την τροχιά, την αντοχή και την αίσθηση.
    seam_design:
      name: Σχεδιασμός ραφής
      description: Καθορίζει την κατασκευή της ραφής ή τα διακοσμητικά χαρακτηριστικά
        ραφής των καλτσών.
    seam_gauge_scale_type:
      name: Τύπος κλίμακας μέτρησης ραφής
      description: Υποδεικνύει ποιες κλίμακες/χαράξεις περιλαμβάνονται στον οδηγό
        ραφής πέρα από την βασική κλίμακα χάρακα.
    seam_gauge_slider_material:
      name: Υλικό ρυθμιστικού οδηγού ραφής
      description: Προσδιορίζει το υλικό του ρυθμιζόμενου ρυθμιστικού/δείκτη, όταν
        υπάρχει.
    seam_ripper_tip_style:
      name: Στυλ άκρης ξηλωτή ραφών
      description: Περιγράφει τον λειτουργικό σχεδιασμό της άκρης που γλιστρά κάτω
        από τις ραφές και κόβει με ασφάλεια την κλωστή.
    seam_sealing_type:
      name: Τύπος στεγανοποίησης ραφών
      description: Περιγράφει τη μέθοδο που χρησιμοποιείται για την αποτροπή εισροής
        νερού στις ραφές της αδιάβροχης φόρμας (π.χ. πλήρως θερμοκολλημένες, συγκολλημένες).
    seam_type:
      name: Τύπος ραφής
      description: Περιγράφει τον τρόπο ραφής της μπάλας του μπέιζμπολ, ο οποίος επηρεάζει
        την πρόσφυση, την αεροδυναμική και το επίπεδο παιχνιδιού για το οποίο προορίζεται.
    season_condition_protection:
      name: Προστασία από εποχικές συνθήκες
      description: Υποδεικνύει τις κύριες καιρικές ή περιβαλλοντικές συνθήκες από
        τις οποίες προορίζεται να προστατεύει το κάλυμμα παρμπρίζ.
    season_rating:
      name: Αξιολόγηση εποχικότητας
      description: Καθορίζει την κατηγορία εποχικότητας της σκηνής, υποδεικνύοντας
        την καταλληλότητά της για διαφορετικές καιρικές συνθήκες (π.χ. 3 εποχών, 4
        εποχών, 5 εποχών/εξόρμησης).
    seasoning_variety:
      name: Ποικιλία καρυκευμάτων
      description: Κατηγοριοποιεί τα καρυκεύματα ανάλογα με τον τρόπο παρασκευής τους
        ή την παραδοσιακή μαγειρική χρήση τους.
    seat_adjustment_power_type:
      name: Ηλεκτρική ρύθμιση καθίσματος
      description: Καθορίζει τον τρόπο λειτουργίας των μηχανισμών ρύθμισης του καθίσματος
        (χειροκίνητοι μοχλοί ή ηλεκτροκινητήρες), κάτι που ενδέχεται να επηρεάσει
        την καλωδίωση ή τη συμβατότητα.
    seat_belt_attachment_type:
      name: Τύπος σύνδεσης της ζώνης ασφαλείας
      description: Περιγράφει τον τρόπο με τον οποίο ο ιμάντας συνδέεται με το όχημα
        ή τα εξαρτήματα της ζώνης ασφαλείας.
    seat_belt_buckle_electrical_connector_type:
      name: Τύπος ηλεκτρικής σύνδεσης της πόρπης της ζώνης ασφαλείας
      description: Καθορίζει τον σύνδεσμο/διεπαφή που χρησιμοποιείται για την καλωδίωση
        του διακόπτη πόρπης/προεντατήρα, όπου εφαρμόζεται.
    seat_belt_buckle_mounting_type:
      name: Τύπος στήριξης πόρπης ζώνης ασφαλείας
      description: Περιγράφει τον τρόπο με τον οποίο η πόρπη/ο υποδοχέας στερεώνεται
        στο όχημα, στο κάθισμα ή στον σωλήνα της ζώνης (π.χ. με βίδες, με κλιπ).
    seat_belt_buckle_release_button_color:
      name: Χρώμα του κουμπιού απελευθέρωσης της πόρπης της ζώνης ασφαλείας
      description: Καθορίζει το χρώμα του κουμπιού απελευθέρωσης της πόρπης.
    seat_belt_cover_placement:
      name: Τοποθέτηση καλύμματος ζώνης ασφαλείας
      description: Καθορίζει σε ποιο σημείο της ζώνης ασφαλείας προορίζεται να χρησιμοποιηθεί
        το κάλυμμα.
    seat_belt_integration:
      name: Ενσωμάτωση ζώνης ασφαλείας στο κάθισμα
      description: Καθορίζει αν το κάθισμα διαθέτει ενσωματωμένη ζώνη ασφαλείας ή/και
        υποδοχή πόρπης, ή αν για την εγκατάσταση πρέπει να μεταφερθεί η αρχική υποδοχή
        πόρπης του οχήματος.
    seat_belt_provision:
      name: Διάταξη για ζώνες ασφαλείας
      description: Υποδεικνύει αν οι ζώνες ασφαλείας και/ή τα σχετικά εξαρτήματα (π.χ.
        πόρπες) περιλαμβάνονται στη διάταξη του πίσω καθίσματος ή αν πρέπει να μεταφερθούν
        από το αρχικό κάθισμα.
    seat_belt_strap_installation_location:
      name: Θέση εγκατάστασης ιμάντα ζώνης ασφαλείας
      description: Υποδεικνύει το σημείο στο οποίο εγκαθίσταται ο ιμάντας μέσα στο
        σύστημα της ζώνης.
    seat_cover_placement:
      name: Τοποθέτηση καλύμματος καθίσματος
      description: Υποδεικνύει για ποιες θέσεις καθισμάτων του οχήματος προορίζεται
        το κάλυμμα.
    seat_cover_securement_method:
      name: Μέθοδος στερέωσης καλύμματος καθίσματος
      description: Υποδεικνύει τον βασικό τρόπο με τον οποίο το κάλυμμα καθίσματος
        στερεώνεται στο κάθισμα. Εάν χρησιμοποιούνται πολλαπλές μέθοδοι, επιλέγεται
        η κύρια/βασική.
    seat_cover_set_contents:
      name: Περιεχόμενα σετ καλύμματος καθισμάτων
      description: Περιγράφει ποια εξαρτήματα περιλαμβάνονται στη συσκευασία (π.χ.
        μόνο τα κάτω μέρη των καθισμάτων ή ολόκληρα καθίσματα + προσκέφαλα).
    seat_fabric:
      name: Ύφασμα καθισμάτων
      description: Κύριο ύφασμα που χρησιμοποιείται για το κάθισμα και την πλάτη της
        καρέκλας.
    seat_height_category:
      name: Κατηγορία ύψους καθίσματος
      description: Κατηγοριοποιεί το σκαμπό με βάση το τυπικό εύρος ύψους καθίσματος
        (π.χ., ύψος πάγκου ή μπαρ) για απλοποίηση της επιλογής.
    seat_material:
      name: Υλικό καθίσματος
      description: Προσδιορίζει το κύριο υλικό της επιφάνειας καθίσματος του πάγκου.
    seat_mounting_type:
      name: Τύπος τοποθέτησης καθίσματος
      description: Διαμόρφωση βάσης/ράγας που χρησιμοποιείται για τη στερέωση του
        καθίσματος στο δάπεδο του οχήματος.
    seating_surface_material:
      name: Υλικό επιφάνειας καθίσματος
      description: Καθορίζει το υλικό της περιοχής στην οποία ξαπλώνει ένα άτομο (π.χ.
        πλέγμα Textilene, ύφασμα sling, ψάθα, ταπετσαρία με επένδυση).
    seatpost_clamp_mechanism:
      name: Μηχανισμός σφιγκτήρα λαιμού σέλας
      description: Τύπος συστήματος σύσφιξης/κλεισίματος που ασφαλίζει τον λαιμό της
        σέλας.
    section_orientation_compatibility:
      name: Συμβατότητα προσανατολισμού ανάκλιντρου
      description: Υποδεικνύει εάν το αξεσουάρ ταιριάζει σε ανάκλιντρο με προσανατολισμό
        αριστερής γωνίας, δεξιάς γωνίας ή γενικής χρήσης
    sectional_configuration:
      name: Διαμόρφωση γωνιακού καναπέ
      description: Καθορίζει το συγκεκριμένο κομμάτι ή τον προσανατολισμό του γωνιακού
        καναπέ (π.χ. γωνία, άκρο αριστερής γωνίας, σεζλόνγκ) ώστε οι αγοραστές να
        μπορεί να συναρμολογήσουν την επιθυμητή διάταξη.
    sectional_shape:
      name: Σχήμα γωνιακού καναπέ
      description: Καθορίζει τη συνολική γεωμετρική διαμόρφωση/διάταξη του γωνιακού
        καναπέ.
    secured_components:
      name: Ασφαλισμένα εξαρτήματα
      description: Παραθέτει τα συγκεκριμένα μέρη του ποδηλάτου που προστατεύουν η
        κλειδαριά άξονα ή τα παξιμάδια ασφαλείας (π.χ. μπροστινός τροχός, πίσω τροχός,
        λαιμός σέλας).
    seed_content:
      name: Περιεχόμενο σε σπόρους
      description: Υποδεικνύει εάν το εσπεριδοειδές φρούτο δεν έχει σπόρους, έχει
        λίγους σπόρους ή είναι γεμάτο σπόρους.
    seed_size_classification:
      name: Κατηγοριοποίηση μεγέθους σπόρου
      description: Υποδεικνύει το σχετικό μέγεθος του μη βρώσιμου σπόρου μέσα στο
        λίτσι, το οποίο επηρεάζει την ποσότητα της βρώσιμης σάρκας.
    self_adhesive_backing_format:
      name: Μορφή αυτοκόλλητης πίσω όψης
      description: Φυσική μορφή της αυτοκόλλητης ράχης που παρέχεται με τη βάση φυτιλιού
        (προ-εφαρμοσμένη επιφάνεια έναντι ξεχωριστών αυτοκόλλητων κ.λπ.).
    self_adhesive_hook_loop_backing_type:
      name: Τύπος αυτοκόλλητης υποστήριξης με γάντζο και θηλιά
      description: Καθορίζει την κατασκευή υποστήριξης/επένδυσης και το σύστημα κόλλας
        που χρησιμοποιείται στην αυτοκόλλητη πλευρά.
    self_adhesive_hook_loop_fastener_shape:
      name: Σχήμα αυτοκόλλητου συνδετήρα hook & loop
      description: Καθορίζει την κοπή/το σχήμα των παρεχόμενων τμημάτων στερέωσης.
    self_hardening_clay_finish:
      name: Φινίρισμα αυτοσκληρυνόμενου πηλού
      description: Περιγράφει την εμφάνιση/γυαλάδα της επιφάνειας μετά την πλήρη σκλήρυνση
        (χρήσιμο για την επιλογή μεταξύ φυσικού ματ, σατινέ κ.λπ.).
    self_hardening_clay_water_resistance_after_curing:
      name: Αντοχή στο νερό του αυτοσκληρυνόμενου πηλού μετά τη σκλήρυνση
      description: Υποδεικνύει την αντοχή στην έκθεση σε νερό μετά την πλήρη σκλήρυνση
        (χωρίς πρόσθετο σφραγιστικό).
    sensor_functions:
      name: Λειτουργίες αισθητήρα
      description: Υποδεικνύει τα στοιχεία μέτρησης ποδηλασίας που μετρά ο αισθητήρας.
    sensor_measurement_mode:
      name: Λειτουργία μέτρησης αισθητήρα
      description: Υποδεικνύει τα στοιχεία μέτρησης που μπορεί να καταγράψει ο αισθητήρας
        (π.χ. μόνο ρυθμό, μόνο ταχύτητα, διπλή ταχύτητα και ρυθμό).
    sensor_mounting_position:
      name: Θέση τοποθέτησης αισθητήρα
      description: Καθορίζει τη θέση στο ποδήλατο ή στον αναβάτη όπου είναι εγκατεστημένος
        ο αισθητήρας, όπως βραχίονα στροφάλου, πλήμνη τροχού ή τακάκι. Αυτό επηρεάζει
        τη συμβατότητα με διαφορετικές διαμορφώσεις ποδηλάτου.
    sensor_mounting_type:
      name: Τύπος τοποθέτησης αισθητήρα
      description: Καθορίζει τον τρόπο με τον οποίο τοποθετείται ο αισθητήρας MAP
        στην πολλαπλή εισαγωγής/στον κινητήρα (π.χ. φλάντζα με βίδα έναντι κουμπωτού
        μπουντουζιού).
    sensor_or_gauge_mounting_location:
      name: Θέση τοποθέτησης αισθητήρα ή μετρητή
      description: Καθορίζει το σημείο στο όχημα όπου πρόκειται να εγκατασταθεί ο
        αισθητήρας ή ο μετρητής (σε επίπεδο συστήματος/θέσης, όχι αριστερά/δεξιά).
    sensory_modality:
      name: Αισθητηριακή τροπικότητα
      description: Πρωταρχικές αισθητηριακές εμπειρίες που έχει σχεδιαστεί να παρέχει
        το παιχνίδι (μπορεί να είναι πολυαισθητηριακές).
    sensory_toy_fidget_mechanism:
      name: Μηχανισμός νευρικότητας αισθητηριακού παιχνιδιού
      description: Πρωταρχική αλληλεπίδραση/μηχανισμός που χρησιμοποιείται για νευρικότητα
        και αυτορρύθμιση.
    sensory_toy_light_features:
      name: Χαρακτηριστικά φωτισμού αισθητηριακού παιχνιδιού
      description: Συμπεριφορές/εφέ φωτισμού που παρέχονται από το παιχνίδι.
    sensory_toy_texture_type:
      name: Τύπος υφής αισθητηριακού παιχνιδιού
      description: Κυρίαρχα στοιχεία αίσθησης/υφής επιφάνειας που χρησιμοποιούνται
        για απτική διέγερση.
    sequin_application_method:
      name: Μέθοδος εφαρμογής παγιέτας
      description: Πώς προορίζεται να εφαρμοστεί/χρησιμοποιηθεί η πούλια (ράψιμο έναντι
        κόλλας έναντι θερμικής στερέωσης κ.λπ.).
    sequin_finish:
      name: Φινίρισμα με πούλιες
      description: Περιγράφει την επιφάνεια/οπτικό φινίρισμα και το ανακλαστικό αποτέλεσμα
        από τις πούλιες που χρησιμοποιούνται στο επίραμμα (π.χ. ματ, μεταλλικό, ολογραφικό),
        όχι το υπόστρωμα ή τη μέθοδο στερέωσης του επιράμματος.
    serger_stitch_functions:
      name: Λειτουργίες ραφών κοπτοράπτη
      description: Οι λειτουργίες ραφών που υποστηρίζει ο κοπτοράπτης (παραλλαγές
        γαζώματος και ειδικές ραφές κοπτοράπτη).
    serger_thread_count:
      name: Αριθμός νημάτων κοπτοράπτη
      description: Αριθμός νημάτων που μπορεί να χρησιμοποιήσει ο κοπτοράπτης για
        ράψιμο (π.χ. δυνατότητα 2/3/4/5 νημάτων).
    service_interval:
      name: Διάστημα σέρβις
      description: Συνιστώμενος μέγιστος χρόνος μεταξύ των απαιτούμενων επιθεωρήσεων/σέρβις
        από εγκεκριμένο συνεργείο σέρβις.
    serving_temperature:
      name: Θερμοκρασία σερβιρίσματος
      description: Υποδεικνύει την προβλεπόμενη θερμοκρασία σερβιρίσματος ή την κατάσταση
        του προϊόντος κατά την κατανάλωση.
    sesame_seed_hull_status:
      name: Κατάσταση κελύφους σουσαμιού
      description: Καθορίζει εάν το ταχίνι παρασκευάζεται από αποφλοιωμένο ή μη αποφλοιωμένο
        σουσάμι, κάτι που επηρεάζει το χρώμα, τη γεύση και τη θρεπτική αξία.
    sesame_seed_roast_level:
      name: Επίπεδο καβουρδίσματος σουσαμιού
      description: Υποδεικνύει πόσο καβουρδίστηκαν οι σπόροι σουσαμιού πριν από την
        άλεση, βοηθώντας τους αγοραστές να επιλέξουν την προτιμώμενη ένταση γεύσης.
    sesame_seed_variety:
      name: Ποικιλία σουσαμιού
      description: Προσδιορίζει το χρώμα ή την ποικιλία του σουσαμιού που χρησιμοποιείται
        για την παρασκευή του λαδιού.
    set_classification:
      name: Κατηγοριοποίηση σετ
      description: Ορίζει το προβλεπόμενο επίπεδο παιχνιδιού ή το στυλ του σετ κροκέ
        (π.χ. τουρνουά, αναψυχή, ταξίδι).
    set_components:
      name: Μέρη του σετ
      description: Υποδεικνύει τα κομμάτια που περιλαμβάνονται στο προϊόν (π.χ. μόνο
        βασικό σφυρί έναντι του πλήρους σετ).
    set_items_included:
      name: Περιλαμβάνονται προϊόντα σετ
      description: Καθορίζει τα ενδύματα ή τα αξεσουάρ που περιλαμβάνονται στο σετ,
        όπως ύφασμα σάρι, ντουπάτα ή ζώνη.
    setup_mechanism:
      name: Μηχανισμός διαμόρφωσης
      description: Περιγράφει την κύρια μέθοδο ανοίγματος της σκηνής (π.χ. αυτόματη,
        φουσκωτή/με αεροθάλαμους, σκληρό κέλυφος οροφής).
    setup_type:
      name: Τύπος διαμόρφωσης
      description: Πώς συναρμολογείται ή ανοίγει η σκηνή/το τούνελ παιχνιδιού.
    sew_in_interfacing_elasticity:
      name: Ελαστικότητα κρυφής επένδυσης
      description: Υποδεικνύει εάν η κρυφή επένδυση είναι ελαστική και, εάν ναι, προς
        ποιες κατευθύνσεις, για να ταιριάζει με πλεκτά ή υφαντά σχέδια.
    sew_in_label_placement:
      name: Τοποθέτηση ραφτής ετικέτας
      description: Υποδεικνύει την προβλεπόμενη θέση τοποθέτησης στο έτοιμο κομμάτι.
    sew_on_edge_finish:
      name: Φινίρισμα με γαζί στο τελείωμα
      description: Υποδεικνύει εάν τα τελειώματα των ταινιών στερέωσης είναι ακατέργαστα/κομμένα
        ή φινιρισμένα για να αντέχουν στο ξέφτισμα.
    sew_on_rhinestone_hole_orientation:
      name: Προσανατολισμός οπών ραφτών στρας
      description: Διάταξη/προσανατολισμός των οπών σε σχέση με την πέτρα (π.χ. δίπλα-δίπλα,
        αντικριστά, χιαστί) για την υποστήριξη διαφορετικών στυλ ραφής.
    sewing_kit_components_included:
      name: Περιλαμβάνονται προϊόντα κιτ ραπτικής
      description: Παραθέτει τις έννοιες/τα εργαλεία ραπτικής που περιλαμβάνονται
        σε ένα κιτ ραπτικής, ώστε οι αγοραστές να μπορούν να συγκρίνουν τι περιλαμβάνεται
        σε κάθε κιτ.
    sewing_machine_bobbin_class:
      name: Κατηγορία μασουριού ραπτομηχανής
      description: Καθορίζει την κατηγορία/το σύστημα μασουριού που είναι συμβατό
        με τη ραπτομηχανή για μασούρια και θήκες μασουριών.
    sewing_machine_buttonhole_type:
      name: Τύπος κουμπότρυπας ραπτομηχανής
      description: Μέθοδος δημιουργίας κουμπότρυπας που υποστηρίζεται από τη μηχανή.
    sewing_machine_display_type:
      name: Τύπος οθόνης ραπτομηχανής
      description: Τύπος διεπαφής ελέγχου/οθόνης στη ραπτομηχανή.
    sewing_machine_needle_point_type:
      name: Τύπος μύτης βελόνας ραπτομηχανής
      description: Ορίζει τη γεωμετρία της μύτης/την ομάδα μυτών της βελόνας που καθορίζει
        τον τρόπο με τον οποίο διεισδύει σε διαφορετικά υφάσματα (π.χ. αιχμηρή έναντι
        στρογγυλεμένης έναντι πλατιάς).
    sewing_machine_needle_system:
      name: Σύστημα βελόνας ραπτομηχανής
      description: Το τυποποιημένο σύστημα βελονών/αριθμός μοντέλου που καθορίζει
        τη συμβατότητα της μηχανής (συχνά γράφεται ως 130/705 H, HAx1, DBx1, 15x1
        κ.λπ.).
    sewing_machine_needle_type:
      name: Τύπος βελόνας ραπτομηχανής
      description: Καθορίζει την προβλεπόμενη εφαρμογή/στυλ της βελόνας (π.χ. γενικής
        χρήσης, στρογγυλεμένη, τζιν/ντένιμ), η οποία επηρεάζει την ποιότητα της ραφής
        και την καταλληλότητα του υφάσματος.
    sewing_machine_shank_type:
      name: Τύπος στελέχους ραπτομηχανής
      description: Καθορίζει το πρότυπο διεπαφής βάσης ποδαριού/αντάπτορα για το οποίο
        έχει σχεδιαστεί το ποδαράκι, διασφαλίζοντας τη συμβατότητα με τη ραπτομηχανή
        (π.χ. χαμηλό στέλεχος, ψηλό στέλεχος, κεκλιμένο στέλεχος).
    sewing_pattern_accessory_type:
      name: Τύπος αξεσουάρ πατρόν ραπτικής
      description: Καθορίζει το αξεσουάρ που δημιουργεί το πατρόν ραπτικής.
    sewing_pattern_notions_required:
      name: Απαιτούνται πρόσθετα είδη πατρόν ραπτικής
      description: Παραθέτει σημαντικά πρόσθετα υλικά/υλικό εξοπλισμό που απαιτούνται
        για την ολοκλήρωση του έργου (πέραν του υφάσματος και της κλωστής).
    sewing_pattern_recommended_fabric:
      name: Συνιστώμενο ύφασμα πατρόν ραπτικής
      description: Παραθέτει τους συνιστώμενους τύπους/βάρη υφασμάτων για το πατρόν
        ραπτικής (όπως παρέχονται από τον σχεδιαστή πατρόν).
    sewing_pattern_size_range:
      name: Εύρος μεγεθών πατρόν ραπτικής
      description: Καθορίζει το προβλεπόμενο εύρος μεγεθών που καλύπτεται από το πατρόν
        (π.χ. βρέφη έως ενήλικες, μεγάλα μεγέθη).
    sewing_thread_size_system:
      name: Σύστημα μεγέθους κλωστών ραπτικής
      description: Το πρότυπο μεγέθους που χρησιμοποιείται για την έκφραση του μεγέθους
        της κλωστής (π.χ. Tex, Denier, Ticket, αριθμός βάρους, μέγεθος V).
    shaft_curvature:
      name: Καμπυλότητα άξονα
      description: Περιγράφει το συνολικό σχήμα του άξονα, που επηρεάζει την απόσταση,
        το χτύπημα και την εργονομία.
    shaft_kick_point:
      name: Σημείο κάμψης άξονα
      description: Προσδιορίζει τη θέση κατά μήκος του άξονα που κάμπτεται περισσότερο
        κατά τη διάρκεια ενός χτυπήματος, επηρεάζοντας την πορεία πτήσης της μπάλας.
    shaft_length_type:
      name: Τύπος μήκους άξονα
      description: Χαρακτηρισμός κατηγορίας μεγέθους που αποτελεί πρότυπο της βιομηχανίας
        για άξονες σε βελάκια (π.χ. κοντό, μεσαίο) και χρησιμοποιείται όταν δεν παρέχονται
        ακριβείς μετρήσεις χιλιοστών.
    shaft_shape:
      name: Σχήμα άξονα
      description: Ορίζει το προφίλ διατομής του άξονα tonfa (π.χ. στρογγυλό, τετράγωνο,
        οκταγωνικό).
    shaker_fill_material:
      name: Υλικό πλήρωσης shaker
      description: Καθορίζει το κύριο εσωτερικό γέμισμα που χρησιμοποιείται για να
        δημιουργήσει τον ήχο ανακίνησης (όταν ισχύει), όπως χάντρες, σπόροι ή σφαιρίδια.
    shaker_shell_material:
      name: Υλικό κελύφους shaker
      description: Καθορίζει το κύριο υλικό του σώματος/κελύφους του σέικερ αυγού
        (το εξωτερικό περίβλημα).
    shallot_variety:
      name: Ποικιλία εσαλότ
      description: Προσδιορίζει τη συγκεκριμένη καλλιεργητική ποικιλία, τον τύπο αγοράς
        ή την ποικιλία του προϊόντος εσαλότ.
    shank_style:
      name: Στυλ στελέχους
      description: Περιγράφει το συνολικό μέγεθος/διαμόρφωση των στελεχών του χαλιναριού
        (π.χ. ίσια, καμπυλωτά, αντίστροφα κεκλιμένα).
    shapewear_enhancement_feature:
      name: Χαρακτηριστικό βελτίωσης shapewear
      description: Επισημαίνει την κύρια λειτουργική βελτίωση που προσφέρει το ένδυμα
        (π.χ. συγκράτηση κοιλιάς, ανόρθωση των γλουτών, στεγανή επένδυση).
    sheath_type:
      name: Τύπος θηκαριού
      description: Τύπος θηκαριού που περιλαμβάνεται μαζί με το συλλεκτικό μαχαίρι.
    sheet_music_clip_padding_material:
      name: Υλικό γεμίσματος κλιπ για παρτιτούρες
      description: Υλικό οποιουδήποτε γεμίσματος μάνταλου/κλιπ που έρχεται σε επαφή
        με το χαρτί ή το χείλος της βάσης για να αποτρέψει το σκίσιμο και την ολίσθηση.
    sheet_music_clip_spring_tension_level:
      name: Επίπεδο τάσης ελατηρίου του κλιπ για παρτιτούρες
      description: Σχετική αντοχή του ελατηρίου κλιπ / της δύναμης σύσφιξης.
    sheet_music_clip_use_environment:
      name: Περιβάλλον χρήσης κλιπ για παρτιτούρες
      description: Το πρωταρχικό προοριζόμενο σημείο όπου το κλιπ έχει σχεδιαστεί
        να αποδίδει καλύτερα.
    shell_construction:
      name: Κατασκευή κελύφους
      description: Καθορίζει τον τρόπο κατασκευής του κελύφους του μπάσου τυμπάνου,
        το οποίο επηρεάζει έντονα τον τόνο και το βάρος.
    shell_finish:
      name: Φινίρισμα κελύφους
      description: Εξωτερική επεξεργασία φινιρίσματος του κελύφους doumbek.
    shell_hull_status:
      name: Κατάσταση κελύφους/φλοιού
      description: Καθορίζει εάν οι ξηροί καρποί ή οι σπόροι πωλούνται με άθικτα κελύφη
        ή τσόφλια ή χωρίς αυτά.
    shift_boot_attachment_method:
      name: Μέθοδος σύνδεσης φούσκας λεβιέ ταχυτήτων
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται η φούσκα λεβιέ ταχυτήτων
        στην κονσόλα/στο κάλυμμα του μοχλού ταχυτήτων του οχήματος (π.χ. κουμπωτό
        διακοσμητικό πλαίσιο, δακτύλιος συγκράτησης, αυτοκόλλητο).
    shift_boot_installation_hardware_included:
      name: Περιλαμβάνεται υλικός εξοπλισμός για την εγκατάσταση της φούσκας λεβιέ
        ταχυτήτων
      description: Παραθέτει τον υλικό εξοπλισμό και τα εξαρτήματα που περιλαμβάνονται
        μαζί με τη φούσκα λεβιέ ταχυτήτων.
    shift_knob_illumination:
      name: Φωτισμός πόμολου ταχυτήτων
      description: Καθορίζει εάν το πόμολο ταχυτήτων περιλαμβάνει φωτισμό, καθώς και
        τη μέθοδο/τον τύπο φωτισμού (π.χ. φωτοφωταυγής, LED, οπτική ίνα, μοτίβο οπίσθιου
        φωτισμού).
    shift_knob_installation_method:
      name: Μέθοδος εγκατάστασης πόμολου ταχυτήτων
      description: Καθορίζει τον τρόπο με τον οποίο συνδέεται το πόμολο ταχυτήτων
        στον λεβιέ/μοχλό.
    shift_knob_shape:
      name: Σχήμα πόμολου ταχυτήτων
      description: Περιγράφει τη συνολική εργονομική μορφή του πόμολου ταχυτήτων.
    shift_pattern_type:
      name: Τύπος μοτίβου ταχυτήτων
      description: Καθορίζει το στυλ σήμανσης ταχυτήτων στο πόμολο ταχυτήτων (εάν
        υπάρχει).
    shifter_compatibility:
      name: Συμβατότητα λεβιέ ταχυτήτων
      description: Υποδεικνύει εάν η προέκταση του τιμονιού είναι συμβατή με ηλεκτρονικούς
        λεβιέδες, μηχανικούς λεβιέδες, αμφότερους τους λεβιέδες ή μη συμβατή με λεβιέδες
        ταχυτήτων.
    shifter_mounting_interface:
      name: Διεπαφή τοποθέτησης λεβιέ ταχυτήτων
      description: Περιγράφει τον τρόπο με τον οποίο συνδέεται ο λεβιές ταχυτήτων
        στο ποδήλατο (π.χ. διακριτό μέγεθος σφιγκτήρα, I-Spec, MatchMaker, άκρο τιμονιού,
        κύριος σωλήνας σκελετού, ασύρματα).
    shifting_actuation_type:
      name: Τύπος ενεργοποίησης ταχυτήτων
      description: Προσδιορίζει τον μηχανισμό που χρησιμοποιείται για την αλλαγή ταχυτήτων
        στο σύνολο των μερών (μηχανικός, ηλεκτρονικός ενσύρματος, ηλεκτρονικός ασύρματος,
        υδραυλικός).
    shifting_mechanism:
      name: Μηχανισμός αλλαγής ταχυτήτων
      description: Προσδιορίζει εάν ο λεβιές ταχυτήτων λειτουργεί μηχανικά ή ηλεκτρονικά
        και εάν βασίζεται σε κλικ ή σε τριβή.
    shim_purpose:
      name: Σκοπός αντάπτορα
      description: Ορίζει τον λειτουργικό τύπο του προϊόντος (π.χ. αντάπτορας, σφήνα,
        αποστάτης), ώστε οι ποδηλάτες να μπορούν να βρουν γρήγορα τη σωστή λύση ρύθμισης
        χωρίς να χρειάζονται ξεχωριστές υποκατηγορίες.
    shin_guard_attachment_method:
      name: Μέθοδος σύνδεσης επικαλαμίδων
      description: Κατηγοριοποιεί τη συνολική σχεδιαστική μορφή της επικαλαμίδας,
        συμπεριλαμβανομένης της ενσωμάτωσης της επιστραγαλίδας ή της κατασκευής της
        κάλτσας.
    shirt_cuff_style:
      name: Στυλ μανσετών πουκαμίσου
      description: Προσδιορίζει την κατασκευή της μανσέτας, η οποία επηρεάζει την
        επισημότητα, τον συνδυασμό με μανικετόκουμπα και την άνεση.
    shochu_base_ingredient:
      name: Βασικό συστατικό shochu
      description: Προσδιορίζει την κύρια πηγή αμύλου ή σακχάρων που χρησιμοποιείται
        για την παραγωγή του shochu.
    shochu_soju_variety:
      name: Ποικιλία shochu και soju
      description: Κατηγοριοποιεί το προϊόν με βάση το αναγνωρισμένο στυλ ή τον τύπο
        παραγωγής του.
    shock_absorber_bushing_material:
      name: Υλικό δακτυλίου αμορτισέρ
      description: Υλικό των δακτυλίων/μονωτήρων στήριξης που παρέχονται μαζί με το
        αμορτισέρ ή είναι ενσωματωμένα σε αυτό.
    shock_absorber_charge_type:
      name: Τύπος πλήρωσης αμορτισέρ
      description: Καθορίζει την τεχνολογία πλήρωσης/απόσβεσης του αμορτισέρ (π.χ.
        υδραυλική/λαδιού, πλήρωση με αέριο, αέρας) ή/και τον σχετικό σχεδιασμό σωλήνων,
        όπου εφαρμόζεται.
    shock_absorber_mount_type_lower:
      name: Τύπος βάσης αμορτισέρ (χαμηλή)
      description: Στυλ διεπαφής τοποθέτησης στο κάτω μέρος του αμορτισέρ για αντιστοίχιση
        εφαρμογής.
    shock_absorber_mount_type_upper:
      name: Τύπος τοποθέτησης αμορτισέρ (άνω)
      description: Καθορίζει το στυλ διεπαφής άνω (πάνω) τοποθέτησης ενός αμορτισέρ
        μηχανοκίνητου οχήματος για αντιστοίχιση εφαρμογής/συμβατότητας.
    shock_absorber_position:
      name: Θέση αμορτισέρ
      description: Καθορίζει εάν το αμορτισέρ προορίζεται για την μπροστινή, την πίσω,
        την αριστερή ή τη δεξιά θέση του οχήματος (πιο λεπτομερής από την τοποθέτηση
        μόνο στον άξονα).
    shock_absorption_system:
      name: Σύστημα απορρόφησης κραδασμών
      description: Ορίζει τον μηχανισμό που χρησιμοποιείται για τη μείωση των κραδασμών
        και του θορύβου κατά την επαναφορά.
    shoe_collar_height:
      name: Ύψος κολάρου παπουτσιού
      description: Κατηγοριοποιεί τα παπούτσια κατά ύψος κολάρου/σχεδίασης (χαμηλό,
        μεσαίο, ψηλό) για να υποδείξει την κάλυψη και τη στήριξη του αστραγάλου.
    shoe_cover_height:
      name: Ύψος καλύμματος παπουτσιού
      description: Καθορίζει το επίπεδο κάλυψης του καλύμματος παπουτσιού ποδηλάτου,
        διαχωρίζοντας τα καλύμματα δακτύλων από τα καλύμματα πλήρους επιφάνειας πάνω
        από το γόνατο.
    shoe_sizing_system:
      name: Σύστημα μεγεθών παπουτσιών
      description: Προσδιορίζει το πρότυπο μεγέθους (ΗΠΑ, Ηνωμένο Βασίλειο, ΕΕ, Ιαπωνία,
        Mondopoint κ.λπ.) που χρησιμοποιείται για το δηλωμένο μέγεθος παπουτσιού.
    shoelace_aglet_material:
      name: Υλικό άκρων κορδονιού παπουτσιού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τα άκρα των κορδονιών,
        που επηρεάζει την ανθεκτικότητα και το στυλ.
    shooting_rest_design:
      name: Σχεδίαση βάσης στήριξης σκοποβολής
      description: Κατηγοριοποιεί το δομικό στυλ της βάσης στήριξης (σάκος, μεταλλική
        βάση, τρίποδο, ειδικός πάγκος κ.λπ.).
    shooting_stick_yoke_design:
      name: Σχεδίαση κεφαλής στηρίγματος όπλου
      description: Καθορίζει το στυλ βάσης ή κεφαλής που διασυνδέεται με το πυροβόλο
        όπλο ή το οπτικό σύστημα.
    shooting_target_style:
      name: Στυλ στόχου βολής
      description: Κατηγοριοποιεί το στυλ ή τη σχεδίαση των στόχων στο καλλιτεχνικό
        πατινάζ και το χόκεϊ, ώστε οι πελάτες να μπορούν να επιλέξουν την προπονητική
        εστίαση που χρειάζονται.
    shooting_target_type:
      name: Τύπος στόχου σκοποβολής
      description: Κατηγοριοποιεί του στόχους σκοποβολής με βάση το δομικό στυλ, το
        υλικό ή το σχέδιο (π.χ. γκονγκ, σιλουέτα, χάρτινος στόχος, περιστρεφόμενος
        στόχος), επιτρέποντας στους σκοπευτές να εντοπίζουν γρήγορα τον σωστό στόχο
        για το άθλημά τους και τον τύπο του πυροβόλου όπλου τους.
    short_block_assembly_balance_type:
      name: Τύπος εξισορρόπησης συγκροτήματος κάτω μέρους κινητήρα
      description: Υποδεικνύει εάν το περιστρεφόμενο συγκρότημα εξισορροπείται εσωτερικά
        ή εξωτερικά
    short_block_intended_use:
      name: Προβλεπόμενη χρήση κάτω μέρους κινητήρα
      description: Κύρια προβλεπόμενη περίπτωση χρήσης για το κάτω μέρος κινητήρα.
    short_block_rotating_assembly_included:
      name: Περιλαμβάνεται περιστρεφόμενο συγκρότημα κάτω μέρους κινητήρα
      description: Καθορίζει τα κύρια εξαρτήματα του περιστρεφόμενου συγκροτήματος
        που περιλαμβάνονται στο κάτω μέρος κινητήρα.
    shot_size:
      name: Μέγεθος σκαγιών
      description: Καθορίζει τον χαρακτηρισμό μεγέθους σκαγιών για χαλαρά σκάγια ή
        εξαρτήματα πυρομαχικών.
    shotgun_action_type:
      name: Τύπος δράσης καραμπίνας
      description: Καθορίζει τον μηχανισμό λειτουργίας/τη δράση της καραμπίνας.
    shotgun_choke_type:
      name: Τύπος τσοκ καραμπίνας
      description: Καθορίζει τη διαμόρφωση του τσοκ στις κάννες της καραμπίνας.
    shotgun_gauge:
      name: Διαμέτρημα καραμπίνας
      description: Καθορίζει το διαμέτρημα καραμπίνας (και διαμέτρημα .410 όπου ισχύει)
        για αναγνώριση και φιλτράρισμα σε καταχωρίσεις συλλεκτικών αντικειμένων.
    shotgun_stock_material:
      name: Υλικό κοντακιού καραμπίνας
      description: Καθορίζει το κύριο υλικό του κοντακιού (μη μεταλλικό μέρος).
    shuffleboard_speed_rating:
      name: Αξιολόγηση ταχύτητας shuffleboard
      description: Υποδεικνύει τη σχετική ταχύτητα ολίσθησης που παρέχει η σκόνη shuffleboard
        ή άλλο προϊόν συντήρησης στο τραπέζι, επιτρέποντας στους παίκτες να επιλέξουν
        την κατάλληλη ταχύτητα για το επίπεδο δεξιότητάς τους και το μήκος του τραπεζιού.
    shuffleboard_table_length_compatibility:
      name: Συμβατότητα μήκους τραπεζιού shuffleboard
      description: Τυπικό μήκος τραπεζιού shuffleboard για το οποίο έχει σχεδιαστεί
        για να ταιριάζει ή να λειτουργήσει συμπληρωματικά ένα προϊόν.
    shuttlecock_base_material:
      name: Υλικό βάσης φτερού μπάντμινγκτον
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τη μύτη/βάση του
        φτερού, το οποίο επηρεάζει την ανθεκτικότητα, την αίσθηση και την αναπήδηση.
    shuttlecock_feather_material:
      name: Υλικό φτερού μπάντμιντον
      description: Προσδιορίζει την κύρια πηγή ή τον τύπο κατασκευής του φτερού που
        χρησιμοποιείται στη φούστα του φτερού, επηρεάζοντας την ανθεκτικότητα, την
        πυκνότητα και την τιμή.
    shuttlecock_grade:
      name: Κατηγορία φτερού μπάντμιντον
      description: Καθορίζει το επιδιωκόμενο επίπεδο παιχνιδιού ή την ποιοτική ταξινόμηση
        (π.χ. προπόνηση, σύλλογος, αγώνας).
    shuttlecock_speed_rating:
      name: Βαθμολογία ταχύτητας φτερού μπάντμινγκτον
      description: Καθορίζει την καθορισμένη από τον κατασκευαστή ταχύτητα ή αξιολόγηση
        του φτερού, επιτρέποντας στους παίκτες να επιλέγουν τη σωστή ταχύτητα πτήσης
        για τις συνθήκες παιχνιδιού, τη θερμοκρασία και το υψόμετρο.
    side_panel_installation_state:
      name: Κατάσταση εγκατάστασης πλευρικού πάνελ
      description: Καθορίζει εάν το πλευρικό πάνελ παρέχεται ως έχει, ασταρωμένο,
        βαμμένο ή με άλλο τρόπο επικαλυμμένο/προετοιμασμένο για εγκατάσταση.
    side_wall_mechanism:
      name: Μηχανισμός πλευρικού τοιχώματος
      description: Περιγράφει πώς ανοίγει ή χαμηλώνει το τοίχωμα του λίκνου για να
        υπάρχει πρόσβαση στο μωρό.
    signal_source:
      name: Πηγή σήματος
      description: Υποδεικνύει τον τρόπο με τον οποίο το οδόμετρο λαμβάνει/εξάγει
        πληροφορίες απόστασης ή χρόνου.
    silk_fiber_type:
      name: Τύπος ινών μεταξιού
      description: Τύπος/πηγή ινών μεταξιού που χρησιμοποιούνται για την κατασκευή
        του υφάσματος (π.χ. μουριά ή tussah) και επηρεάζει την υφή, την ομοιομορφία
        και την τιμή.
    simulated_game_species:
      name: Είδη προσομοιωμένου παιχνιδιού
      description: Υποδεικνύει το συγκεκριμένο πτηνό ή ζώο που αναπαράγει το ομοίωμα
        για ρεαλιστική εκπαίδευση.
    singlet_cut_style:
      name: Στυλ κοψίματος σε κορμάκι
      description: Καθορίζει το κόψιμο/στυλ στο κορμάκι πάλης, λαμβάνοντας υπόψη το
        ύψος των τιραντών, το στυλ πλάτης και τις παραλλαγές για φύλα/νεότερες ηλικίες.
    sink_material:
      name: Υλικό νεροχύτη
      description: Καθορίζει το υλικό των ενσωματωμένων νιπτήρων που περιλαμβάνονται
        με τον πάγκο μπάνιου.
    sinker_attachment_style:
      name: Στυλ προσάρτησης βαριδιού
      description: Περιγράφει τον μηχανισμό που παρέχεται στο βαρίδι για την προσάρτησή
        του στην πετονιά ή το παραγάδι.
    sinker_finish:
      name: Φινίρισμα βαριδιού
      description: Καθορίζει την επεξεργασία της εξωτερικής επίστρωσης ή επιφάνειας
        του βαριδιού.
    sinker_shape:
      name: Σχήμα βαριδιού
      description: Ορίζει τη γεωμετρική μορφή του βαριδιού (π.χ. τορπίλη, κύλινδρος,
        σταγόνα) ώστε οι ψαράδες να μπορούν να επιλέξουν τη βέλτιστη παρουσίαση και
        αντοχή στα σκαλώματα.
    siren_system_included:
      name: Περιλαμβάνεται σύστημα σειρήνας
      description: Υποδεικνύει εάν έχει εγκατασταθεί σειρήνα/σύστημα αναγγελιών και
        τι είδους.
    siren_system_type:
      name: Τύπος συστήματος σειρήνας
      description: Καθορίζει τη διαμόρφωση της εγκατεστημένης σειρήνας/συστήματος
        αναγγελιών στο αστυνομικό όχημα.
    size_designation:
      name: Χαρακτηρισμός μεγέθους
      description: Ετικέτα τυποποιημένου μεγέθους για το τρίγωνο.
    size_system:
      name: Σύστημα μεγεθών
      description: Καθορίζει το σύστημα μεγεθών ή το περιφερειακό πρότυπο στο οποίο
        αντιστοιχεί η ετικέτα μεγέθους (π.χ. ΗΠΑ, ΗΒ, ΕΕ, Διεθνές γράμμα).
    sizzle_mechanism:
      name: Μηχανισμός sizzle
      description: Καθορίζει τον τρόπο με τον οποίο το κύμβαλο παράγει το εφέ sizzle
        (π.χ. πριτσίνια εγκατεστημένα στο κύμβαλο, προσαρτώμενη αλυσίδα/διάταξη sizzle
        ή μη συμπεριλαμβανόμενος υλικός εξοπλισμός).
    skate_blade_discipline:
      name: Τομέας λεπίδας σκέιτ
      description: Προσδιορίζει τον τομέα πατινάζ ή την εφαρμογή για την οποία έχει
        σχεδιαστεί η λεπίδα, όπως το χόκεϊ ή το καλλιτεχνικό πατινάζ, επιτρέποντας
        στους αγοραστές να φιλτράρουν για σχετικές λεπίδες.
    skate_brake_type:
      name: Τύπος φρένου πατινιού
      description: Προσδιορίζει το στυλ του μηχανισμού ακινητοποίησης που περιλαμβάνεται
        στα σκέιτ.
    skateboard_nut_thread_size:
      name: Μέγεθος σπειρώματος παξιμαδιού σκέιτμπορντ
      description: Καθορίζει το μέγεθος του σπειρώματος (διάμετρος και βήμα) του παξιμαδιού
        για να εξασφαλίζεται η συμβατότητα με άξονες σκέιτμπορντ, κεντρικούς άξονες
        ή υλικό εξοπλισμό τοποθέτησης.
    skein_winder_bearing_bushing_type:
      name: Τύπος ρουλεμάν/δακτυλίου τυλίγματος κουβαριού
      description: Καθορίζει τον τύπο του ρουλεμάν ή του δακτυλίου που χρησιμοποιείται
        στο περιστρεφόμενο συγκρότημα του μηχανισμού τυλίγματος κουβαριού.
    skein_winder_drive_type:
      name: Τύπος κίνησης τυλίγματος κουβαριού
      description: Πώς τροφοδοτείται/περιστρέφεται ο μηχανισμός τυλίγματος κουβαριού
        κατά τη χρήση.
    ski_binding_mechanism:
      name: Μηχανισμός δέστρας σκι
      description: Καθορίζει τη θεμελιώδη μηχανική σχεδίαση ή τον τομέα της δέστρας
        (π.χ. αλπικό, ορειβατικό tech/pin, τέλεμαρκ).
    ski_binding_part_type:
      name: Τύπος εξαρτήματος δέστρας σκι
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα ή αξεσουάρ για τις δέστρες
        του σκι, επιτρέποντας γρήγορο φιλτράρισμα σε πολλούς τύπους εξαρτημάτων.
    ski_boot_sole_standard:
      name: Πρότυπο σόλας μπότας σκι
      description: Προσδιορίζει το πρότυπο της σόλας ή το πρότυπο συμβατότητας δέστρας
        για το οποίο είναι πιστοποιημένη η μπότα του σκι.
    skill_focus:
      name: Εστίαση σε δεξιότητα
      description: Προσδιορίζει την κύρια δεξιότητα μπάσκετ που προορίζεται να αναπτύξει
        το βοήθημα προπόνησης.
    skimboard_construction:
      name: Κατασκευή skimboard
      description: Περιγράφει την κύρια κατασκευή της σανίδας, εστιάζοντας στον πυρήνα
        και την τεχνική τοποθέτησης (π.χ. πυρήνας από αφρώδες υλικό, πυρήνας από ξύλο).
    skin_presence:
      name: Παρουσία πέτσας
      description: Καθορίζει εάν το κοτόπουλο πωλείται με την πέτσα, χωρίς πέτσα ή
        με μερικώς αφαιρεμένη.
    slapstick_handle_type:
      name: Τύπος λαβής slapstick
      description: Περιγράφει το στυλ λαβής που είναι ενσωματωμένη στο slapstick,
        η οποία επηρεάζει την εργονομία και την άνεση του παιχνιδιού.
    slapstick_playing_surface_material:
      name: Υλικό επιφάνειας παιχνιδιού slapstick
      description: Καθορίζει το υλικό των στοιχείων κρούσης/χτυπήματος που έρχονται
        σε επαφή μεταξύ τους για να παράξουν τον ήχο.
    sled_brake_type:
      name: Τύπος φρένου έλκηθρου
      description: Καθορίζει τον μηχανισμό πέδησης που περιλαμβάνεται στο έλκηθρο,
        εάν υπάρχει.
    sled_towing_method:
      name: Μέθοδος ρυμούλκησης έλκηθρου
      description: Υποδεικνύει τον κύριο τρόπο με τον οποίο έλκεται ή ρυμουλκείται
        το έλκηθρο.
    sleep_position_suitability:
      name: Καταλληλότητα θέσης ύπνου
      description: Υποδεικνύει τις θέσεις ύπνου τις οποίες έχει σχεδιαστεί να υποστηρίζει
        με τον πιο αποτελεσματικό τρόπο το στρώμα.
    sleeping_bag_shape:
      name: Σχήμα υπνόσακου
      description: Συνολικό σχέδιο του υπνόσακου, που επηρεάζει τη ζεστασιά, το βάρος
        και την ευρυχωρία.
    sleeping_pad_type:
      name: Τύπος υποστρώματος
      description: Προσδιορίζει το στυλ κατασκευής του υποστρώματος (όπως αφρός κλειστών
        κυψελών ή φουσκωτό με αέρα) που επηρεάζει άμεσα την άνεση, το βάρος και τη
        μόνωση.
    sleepwear_set_pieces_included:
      name: Περιλαμβάνονται τεμάχια από σετ πιτζάμες
      description: Παραθέτει τα επιμέρους κομμάτια που παρέχονται σε ένα σετ πιτζάμας
        ή σετ για το σπίτι πολλών τεμαχίων.
    sleeve_bearing_type:
      name: Τύπος ρουλεμάν μανικιού
      description: Προσδιορίζει την τεχνολογία που επιτρέπει την περιστροφή του μανικιού,
        επηρεάζοντας την ποιότητα περιστροφής για τις Ολυμπιακές άρσεις.
    sleeve_style:
      name: Στυλ χιτωνίου
      description: Καθορίζει το στυλ μανικιού πέρα από το μήκος (π.χ. ραγκλάν).
    slide_board_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ slide board
      description: Παραθέτει συμπληρωματικά κομμάτια που παρέχονται στη συσκευασία
        μαζί με το slide board, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιλαμβάνεται
        και να μπορούν να συγκρίνουν τα σετ.
    slide_installation_type:
      name: Τύπος εγκατάστασης οδηγού
      description: Πώς προορίζεται να εγκατασταθεί ή να τοποθετηθεί η τσουλήθρα (αυτόνομη,
        προσαρτημένη σε σετ παιχνιδιού κ.λπ.).
    slide_intended_finger:
      name: Προοριζόμενο δάχτυλο για slide
      description: Υποδεικνύει το δάχτυλο στο οποίο προορίζεται να φορεθεί το slide
        ή αν δεν μπορεί να εφαρμοστεί (π.χ. tone bar).
    slide_safety_features:
      name: Χαρακτηριστικά ασφαλείας τσουλήθρας
      description: Στοιχεία σχεδίασης που σχετίζονται με την ασφάλεια και περιλαμβάνονται
        στην τσουλήθρα.
    slide_type:
      name: Τύπος slide
      description: Καθορίζει τους τύπους μηχανισμού χάλκινου slide που προορίζεται
        να καθαρίσει το προϊόν.
    slide_water_use_capability:
      name: Ικανότητα χρήσης νερού σε τσουλήθρα
      description: Εάν η τσουλήθρα έχει σχεδιαστεί για χρήση με νερό (π.χ. σύνδεση
        με λάστιχο) και πώς.
    slime_putty_kit_components_included:
      name: Περιλαμβάνονται εξαρτήματα κιτ χλαπάτσας και πλαστελίνης
      description: Παραθέτει τα εργαλεία και τα πρόσθετα που περιλαμβάνονται στο προϊόν
        χλαπάτσας/πλαστελίνης (ειδικά για κιτ/σετ).
    sling_material:
      name: Υλικό ιμάντα/σχοινιού μεταφοράς
      description: Καθορίζει την ίνα/το ύφασμα που χρησιμοποιείται στον ιμάντα quickdraw
        (τύπου dog-bone).
    smith_machine_bar_path:
      name: Διαδρομή μπάρας σε Smith machine
      description: Περιγράφει τη σταθερή διαδρομή κίνησης της μπάρας, ενημερώνοντας
        τους χρήστες σχετικά με τη βιομηχανική και τις απαιτήσεις χώρου.
    smoke_color:
      name: Χρώμα καπνού
      description: Το χρώμα του καπνού που παράγεται από τη φωτοβολίδα/το σήμα καπνού
        (διαφορετικό από το χρώμα του σώματος του προϊόντος).
    smoked_malt_smoking_material:
      name: Υλικό καπνίσματος καπνιστής βύνης
      description: Για καπνιστές βύνες, προσδιορίζει το υλικό που χρησιμοποιείται
        κατά το κάπνισμα (π.χ. συγκεκριμένο είδος ξύλου ή τύρφη).
    snack_mix_variety:
      name: Ποικιλία μειγμάτων σνακ
      description: Κατηγοριοποιεί το προϊόν με βάση το στυλ του μείγματος (π.χ. μείγμα
        ξηρών καρπών και αποξηραμένων φρούτων, μείγμα ξηρών καρπών, namkeen, sev).
    snack_processing_method:
      name: Μέθοδος επεξεργασίας σνακ
      description: Υποδεικνύει την κύρια τεχνική επεξεργασίας ή συντήρησης που χρησιμοποιείται
        για τη δημιουργία του σνακ (π.χ. λυοφιλίωση, ψήσιμο, καβούρδισμα).
    snack_texture:
      name: Υφή σνακ
      description: Υποδεικνύει το φυσικό δάγκωμα ή την αίσθηση στο στόμα των στικ
        σουσαμιού.
    snap_installation_method:
      name: Μέθοδος τοποθέτησης κουμπώματος
      description: Πώς εγκαθίσταται/συνδέεται το κούμπωμα στο υλικό του έργου.
    snare_drum_bearing_edge_profile:
      name: Προφίλ άκρης ρουλεμάν ταμπούρου
      description: Κομμένη άκρη ρουλεμάν/προφίλ του κελύφους του ταμπούρου.
    snare_drum_finish_type:
      name: Τύπος φινιρίσματος ταμπούρου
      description: Κατασκευή/τύπος υψηλού επιπέδου φινιρίσματος που χρησιμοποιείται
        στο κέλυφος του ταμπούρου.
    snare_drum_hoop_type:
      name: Τύπος στεφανιού ταμπούρου
      description: Τύπος στεφανιών/δακτυλίων που χρησιμοποιούνται στο ταμπούρο.
    snare_drum_mounting_type:
      name: Τύπος τοποθέτησης ταμπούρου
      description: Πώς προορίζεται να τοποθετηθεί/χρησιμοποιηθεί το ταμπούρο.
    snare_drum_shell_material:
      name: Υλικό κελύφους ταμπούρου
      description: Καθορίζει το μέταλλο/κράμα που χρησιμοποιείται για το κέλυφος του
        ταμπούρου (το κύριο σώμα), το οποίο επηρεάζει έντονα τον τόνο, το βάρος και
        την ανθεκτικότητα.
    snare_drum_strainer_mechanism:
      name: Μηχανισμός φίλτρου ταμπούρου
      description: Τύπος μηχανισμού strainer/throw-off ταμπούρου που χρησιμοποιείται
        για την ενεργοποίηση ή απενεργοποίηση των χορδών του.
    snare_drum_strainer_type:
      name: Τύπος φίλτρου ταμπούρου
      description: Τύπος μηχανισμού strainer/throw-off ταμπούρου που χρησιμοποιείται
        για την ενεργοποίηση ή απενεργοποίηση των χορδών του.
    snare_hoop_type:
      name: Τύπος στεφανιού ταμπούρου
      description: Είδος στεφανιών/χείλους στο τύμπανο ταμπούρου.
    snare_throw_off_type:
      name: Τύπος throw-off ταμπούρου
      description: Τύπος μηχανισμού strainer/throw-off ταμπούρου που χρησιμοποιείται
        για την ενεργοποίηση ή απενεργοποίηση των χορδών του.
    snip_cutter_spring_mechanism:
      name: Μηχανισμός ελατηρίου ψαλιδιού κοπής
      description: Υποδεικνύει εάν το ψαλίδι κοπής χρησιμοποιεί μηχανισμό ελατηρίου/επαναφοράς
        και το στυλ του.
    snorkel_mount_position:
      name: Θέση στήριξης για αναπνευστήρα
      description: Περιγράφει τη θέση του αναπνευστήρα στο κεφάλι του χρήστη κατά
        τη χρήση.
    snorkel_top_type:
      name: Τύπος πάνω μέρους αναπνευστήρα
      description: Περιγράφει το στυλ προστασίας από την είσοδο νερού στο πάνω μέρος
        του αναπνευστήρα που περιλαμβάνεται στο σετ.
    snow_condition_suitability:
      name: Καταλληλότητα συνθηκών χιονιού
      description: Περιγράφει τις βασικές συνθήκες χιονιού για τις οποίες προορίζεται
        το κερί.
    snow_sports_helmet_safety_certification:
      name: Πιστοποίηση ασφάλειας κράνους χειμερινών σπορ
      description: Προσδιορίζει τα πρότυπα ασφαλείας που πληροί το κράνος για χρήση
        σε σκι και σνόουμπορντ.
    snowboard_base_material:
      name: Υλικό βάσης για σνόουμπορντ
      description: Προσδιορίζει τη βασική σύνθεση ή το φινίρισμα (εξώθηση, βαθμοί
        πυροσυσσωμάτωσης, ιδιοταγείς συνθέσεις) που επηρεάζουν την ταχύτητα, την ανθεκτικότητα
        και τη συντήρηση.
    snowboard_width_class:
      name: Κατηγορία πλάτους σνόουμπορντ
      description: Κατηγοριοποιεί το συνολικό πλάτος της σανίδας σε σχέση με το μέγεθος
        της μπότας (π.χ. κανονικό, πλατύ).
    soccer_ball_compartment_type:
      name: Τύπος θήκης για μπάλα ποδοσφαίρου
      description: Καθορίζει πώς (ή αν) το σακίδιο χωράει μια μπάλα ποδοσφαίρου.
    soccer_ball_type:
      name: Τύπος μπάλας ποδοσφαίρου
      description: Καθορίζει την προβλεπόμενη χρήση ή το στυλ της μπάλας ποδοσφαίρου
        (π.χ. αγώνας, προπόνηση, ποδόσφαιρο σάλας), ώστε οι αγοραστές να μπορούν να
        βρουν γρήγορα τη σωστή παραλλαγή χωρίς να χρειάζονται πολλές υποκατηγορίες.
    soccer_dummy_base_type:
      name: Τύπος βάσης ομοιώματος ποδοσφαίρου
      description: Περιγράφει το στυλ της βάσης ή του μηχανισμού αγκύρωσης που χρησιμοποιείται
        στο ομοίωμα.
    soccer_dummy_design:
      name: Σχεδίαση ομοιώματος ποδοσφαίρου
      description: Καθορίζει το στυλ κατασκευής ενός ομοιώματος ποδοσφαιρικού τέρματος,
        όπως άκαμπτο ή φουσκωτό.
    soccer_goal_target_style:
      name: Στυλ στόχου ποδοσφαιρικού τέρματος
      description: Ορίζει τη φυσική μορφή ή τη σχεδίαση του στόχου εκπαίδευσης, ώστε
        οι αγοραστές να μπορούν να επιλέξουν το στυλ που ταιριάζει καλύτερα στις ασκήσεις
        τους.
    soccer_goal_type:
      name: Τύπος τέρματος ποδοσφαίρου
      description: Υποδεικνύει το δομικό στυλ ή την προβλεπόμενη χρήση του τέρματος
        (π.χ. αυτόματο άνοιγμα, επαναφορά μπάλας, παιχνίδι στη γειτονιά).
    sock_cushioning:
      name: Αντικραδασμική προστασία κάλτσας
      description: Υποδεικνύει την ποσότητα και το στυλ της αντικραδασμικής προστασίας
        ή της επένδυσης στο πέλμα που είναι ενσωματωμένα στην κάλτσα.
    sock_cushioning_level:
      name: Επίπεδο αντικραδασμικής προστασίας κάλτσας
      description: Καθορίζει την ποσότητα της αντικραδασμικής προστασίας στο πέλμα
        που είναι ενσωματωμένη στην κάλτσα.
    sock_grip_type:
      name: Τύπος κρατήματος κάλτσας
      description: Περιγράφει τυχόν χαρακτηριστικά πρόσφυσης ή αντιολισθητικότητας
        που εφαρμόζονται στο κάτω μέρος της κάλτσας.
    sock_toe_style:
      name: Στυλ κάλτσας με δάχτυλα
      description: Περιγράφει το στυλ κατασκευής της περιοχής των δακτύλων της κάλτσας.
    soft_bait_style:
      name: Στυλ μαλακού δολώματος
      description: Κατηγοριοποιεί τη σχεδίαση του σώματος ή το προφίλ του μαλακού
        πλαστικού δολώματος (π.χ. σκουλήκι, τεχνητά δολώματα με κίνηση, προνύμφη).
    soft_top_attachment_type:
      name: Τύπος στερέωσης του μαλακού πάνω μέρους
      description: Προσδιορίζει τον τρόπο με τον οποίο στερεώνεται η κουκούλα στο
        όχημα (κανάλια, κουμπώματα, αυτοκόλλητη ταινία κ.λπ.).
    soft_top_includes_frame_hardware:
      name: Η κουκούλα περιλαμβάνει πλαίσιο/υλικό εξοπλισμό
      description: Υποδεικνύει εάν το προϊόν περιλαμβάνει το πλαίσιο/τα κοντάρια ή/και
        τον υλικό εξοπλισμό τοποθέτησης για την κουκούλα.
    soft_top_installation_type:
      name: Τύπος εγκατάστασης κουκούλας
      description: Καθορίζει τον τρόπο εγκατάστασης/τοποθέτησης της κουκούλας του
        οχήματος, υποδεικνύοντας την αναμενόμενη μέθοδο εγκατάστασης και την απαιτούμενη
        προσπάθεια.
    soft_top_window_configuration:
      name: Διαμόρφωση παραθύρου υφασμάτινης οροφής
      description: Υποδεικνύει τα παράθυρα που έχει η κουκούλα και τις θέσεις που
        υπάρχουν.
    softball_certification:
      name: Πιστοποίηση softball
      description: Παραθέτει τις σφραγίδες ή τις εγκρίσεις των κρατικών φορέων που
        είναι τυπωμένες στην μπάλα και καθορίζουν την καταλληλότητα για πρωτάθλημα/αγώνα.
    softness_level:
      name: Επίπεδο απαλότητας
      description: Υποδεικνύει πόσο απαλή/χαμηλού προφίλ είναι η πλευρά με τις θηλιές,
        παράμετρος που έχει σχέση με την άνεση στο δέρμα και τις εφαρμογές χαμηλού
        όγκου.
    solar_system_model_included_bodies:
      name: Μοντέλο ηλιακού συστήματος που περιλαμβάνει σώματα
      description: Υποδεικνύει τα ουράνια σώματα που αναπαρίστανται στο σετ μοντέλου.
    solar_system_model_scaling:
      name: Κλίμακα μοντέλου ηλιακού συστήματος
      description: Υποδεικνύει εάν το μοντέλο του ηλιακού συστήματος είναι υπό κλίμακα
        για το μέγεθος των πλανητών, τις αποστάσεις/τις τροχιές, και τα δύο ή είναι
        μια σχηματική/μη υπό κλίμακα αναπαράσταση.
    sold_secure_certification_level:
      name: Επίπεδο πιστοποίησης Sold Secure
      description: Αναφέρει την αξιολόγηση Sold Secure που απονεμήθηκε στην κλειδαριά
        από τον ανεξάρτητο φορέα δοκιμών του Ηνωμένου Βασιλείου (Bronze, Silver, Gold,
        Diamond).
    sold_secure_rating:
      name: Αξιολόγηση Sold Secure
      description: Υποδεικνύει το επίπεδο πιστοποίησης Sold Secure που έχει αντιστοιχιστεί
        στην κλειδαριά.
    sole_construction:
      name: Κατασκευή σόλας
      description: Υποδεικνύει τον τρόπο κατασκευής της σόλας του παπουτσιού (ολόκληρη,
        διαχωρισμένη, δύο τεμαχίων κ.λπ.), κάτι που επηρεάζει άμεσα την ευκαμψία,
        την επαφή με το δάπεδο και την καταλληλότητα για συγκεκριμένες τεχνικές χορού.
    sole_type:
      name: Τύπος σόλας
      description: Περιγράφει το δομικό στυλ της σόλας, υποδεικνύοντας την ευκαμψία
        και την προβλεπόμενη χρήση.
    soprano_saxophone_body_style:
      name: Στυλ σώματος σαξοφώνου σοπράνο
      description: Περιγράφει τη φυσική διαμόρφωση του σώματος του σαξοφώνου σοπράνο.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Τύπος baffle επιστομίου για σοπράνο σαξόφωνο
      description: Περιγράφει τη σχεδίαση της καμπύλης/της οροφής του θαλάμου του
        επιστομίου (το περίγραμμα πίσω από το άκρο), που επηρεάζει την ένταση, την
        προβολή και την απόκριση.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Μέγεθος θαλάμου επιστομίου για σοπράνο σαξόφωνο
      description: Περιγράφει το μέγεθος του εσωτερικού θαλάμου του επιστομίου του
        σαξοφώνου σοπράνο, το οποίο επηρεάζει την αντίσταση και το τονικό χρώμα.
    soprano_saxophone_mouthpiece_finish:
      name: Φινίρισμα επιστομίου για σοπράνο σαξόφωνο
      description: Επιφανειακό φινίρισμα/επιμετάλλωση που εφαρμόζεται στο επιστόμιο
        (εάν υπάρχει).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Επιστόμιο σαξοφώνου σοπράνο μαζί με αξεσουάρ
      description: Προσδιορίζει τα αξεσουάρ που περιλαμβάνονται μαζί με το επιστόμιο.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Τονικός χαρακτήρας επιστομίου σαξοφώνου σοπράνο
      description: Τονικό προφίλ υψηλού επιπέδου που συνήθως συνδέεται με τη σχεδίαση
        του επιστομίου.
    sound_character:
      name: Χαρακτήρας ήχου
      description: Περιγράφει τη γενική χροιά που παράγεται από το slapstick.
    sound_expansion_method:
      name: Μέθοδος επέκτασης ήχου
      description: Καθορίζει πώς η μονάδα μπορούν να προσθέτει ή να αναπτύσσει την
        εσωτερική της βιβλιοθήκη ήχων πέρα από τους εργοστασιακούς ήχους (π.χ. πακέτα
        περιεχομένου, εισαγωγή δειγμάτων, κάρτα επέκτασης).
    sound_module_sound_library_focus:
      name: Εστίαση στη βιβλιοθήκη ήχων της μονάδας
      description: Κύρια έμφαση στο σετ εργοστασιακών ήχων που βοηθά τους αγοραστές
        να βρουν την κατάλληλη μονάδα για το στυλ τους/τη δική τους περίπτωση χρήσης.
    sound_port_type:
      name: Τύπος αεραγωγού
      description: Περιγράφει τη σχεδίαση της οπής/θύρας ήχου στο πίσω μέρος του cajon
        που επηρεάζει την προβολή και την απόκριση στις χαμηλές συχνότητες.
    sound_sensitivity_control:
      name: Έλεγχος ευαισθησίας ήχου
      description: Υποδεικνύει εάν και πώς μπορεί να ρυθμιστεί η ευαισθησία του ήχου.
    sound_synthesizer_patch_memory:
      name: Μνήμη patch συνθεσάιζερ ήχου
      description: Υποδεικνύει εάν το συνθεσάιζερ μπορεί να αποθηκεύει και να ανακαλεί
        προεπιλογές (patch).
    sound_type:
      name: Τύπος ήχου
      description: Βασικοί τύποι ήχου ή έξοδοι ήχου που παράγει το χαλάκι (π.χ. όργανα,
        τραγούδια, φωνητικές προτροπές) για καθοδήγηση στο παιχνίδι.
    soundboard_material:
      name: Υλικό κονσόλας ήχου
      description: Υλικό που χρησιμοποιείται για την κονσόλα ήχου άρπας (πάνω) που
        ενισχύει την αντήχηση και τον τόνο.
    soup_or_broth_variety:
      name: Ποικιλία σούπας ή ζωμού
      description: Καθορίζει το στυλ, τη συνταγή ή τη μαγειρική παρασκευή της σούπας
        ή του ζωμού, ώστε οι αγοραστές να μπορούν να εντοπίσουν γρήγορα τον προτιμώμενο
        τύπο.
    sour_cream_variety:
      name: Ποικιλία ξινής κρέμας
      description: Κατηγοριοποιεί τα προϊόντα ξινής κρέμας ανάλογα με τη συγκεκριμένη
        ποικιλία ή το πολιτισμικό στυλ τους, όπως η κρεμ φρες ή η μεξικάνικη crema.
    soy_sauce_variety:
      name: Ποικιλία σάλτσας σόγιας
      description: Προσδιορίζει το συγκεκριμένο στυλ ή σύνθεση της σάλτσας σόγιας
        (π.χ. ανοιχτόχρωμη, σκούρα, ταμάρι, πόνζου), επιτρέποντας στους αγοραστές
        να φιλτράρουν γρήγορα με βάση το γευστικό προφίλ και τη μαγειρική χρήση.
    spark_plug_electrode_material:
      name: Υλικό ηλεκτροδίου μπουζί
      description: Υλικό/τεχνολογία στα άκρα των ηλεκτροδίων ανάφλεξης του μπουζί
        (κεντρικά ή/και γείωσης), όπως διατίθενται στην αγορά (π.χ. χαλκός, πλατίνα,
        ιρίδιο).
    spark_plug_seat_type:
      name: Τύπος έδρας μπουζί
      description: Στυλ στεγανοποίησης/έδρας που χρησιμοποιείται από το μπουζί στη
        διεπαφή της κυλινδροκεφαλής.
    spark_plug_terminal_type:
      name: Τύπος ακροδέκτη αναφλεκτήρα
      description: Στυλ άνω ακροδέκτη που χρησιμοποιείται για τη σύνδεση του μπουζοκαλωδίου/της
        μπουζόπιπας.
    sparkler_shape:
      name: Σχήμα βεγγαλικού sparkler
      description: Συνολικό πρωτότυπο σχήμα/μορφή του βεγγαλικού sparkler.
    speaker_cone_material:
      name: Υλικό κώνου ηχείου
      description: Κύριο υλικό του κώνου του ηχείου (woofer/κώνος MID).
    speaker_size:
      name: Μέγεθος ηχείου
      description: Ονομαστικό μέγεθος οδηγού / μέγεθος τοποθέτησης του ηχείου component
        (π.χ. 6,5 in, 6x9 in), που χρησιμοποιείται για αντιστοίχιση με τις εργοστασιακές
        θέσεις και τους αντάπτορες ηχείων.
    special_effects_output_interface:
      name: Διεπαφή εξόδου ειδικών εφέ
      description: Καθορίζει την υποδοχή/διεπαφή εξόδου που χρησιμοποιείται για τον
        έλεγχο συσκευών ειδικών εφέ.
    special_effects_stand_stability_features:
      name: Χαρακτηριστικά σταθερότητας της βάσης ειδικών εφέ
      description: Καθορίζει τα ενσωματωμένα χαρακτηριστικά σταθερότητας και ασφάλειας
        που έχουν σχεδιαστεί για την αποτροπή ανατροπής ή ολίσθησης κατά τη διάρκεια
        εκδηλώσεων.
    specialty_malt_name_type:
      name: Ονομασία/τύπος ειδικής βύνης
      description: Προσδιορίζει τον συγκεκριμένο τύπο ειδικής βύνης βάσει ονομασίας
        (συχνά χρησιμοποιείται ως εμπορική ονομασία του είδους).
    specimen_presentation:
      name: Παρουσίαση δείγματος
      description: Υποδεικνύει τον τρόπο προετοιμασίας ή παρουσίασης του συλλεκτικού
        δείγματος (π.χ. ακατέργαστο/μη επεξεργασμένο, γυαλισμένο, κομμένο ή τοποθετημένο
        σε βάση).
    speed_bag_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ speed bag
      description: Παραθέτει τα πρόσθετα είδη που παρέχονται μαζί με τον σάκο ταχύτητας,
        όπως γάντια, τρόμπες, στριφτάρια, αλυσίδες ή βάσεις.
    speed_rating:
      name: Κατηγορία ταχύτητας
      description: Υποδεικνύει την ταχύτητα επιφάνειας παιχνιδιού που παρέχει το ύφασμα
        της τσόχας του τραπεζιού μπιλιάρδου (π.χ. αργή, μεσαία ή γρήγορη).
    speedometer_backlight_type:
      name: Τύπος οπίσθιου φωτισμού ταχύμετρου
      description: Υποδεικνύει αν και με ποιον τρόπο το ταχύμετρο διαθέτει οπίσθιο
        φωτισμό για ορατότητα κατά τη νύχτα.
    speedometer_display_type:
      name: Τύπος ένδειξης ταχύμετρου
      description: 'Υποδεικνύει τον τρόπο εμφάνισης της ένδειξης ταχύτητας στο ταχύμετρο:
        αναλογικός με δείκτη/καντράν, ψηφιακός με αριθμητική ένδειξη ή συνδυασμός
        αναλογικών και ψηφιακών στοιχείων.'
    speedometer_unit_of_measure:
      name: Μονάδα μέτρησης ταχύμετρου
      description: Καθορίζει τις μονάδες μέτρησης της ταχύτητας που εμφανίζονται στο
        καντράν/στην οθόνη.
    spike_replaceability:
      name: Δυνατότητα αντικατάστασης καρφιών
      description: Υποδεικνύει αν τα καρφιά του παπουτσιού είναι αντικαταστάσιμα,
        σταθερά ή αν το παπούτσι δεν διαθέτει καρφιά.
    spike_shape:
      name: Σχήμα καρφιού
      description: Προσδιορίζει το γεωμετρικό σχήμα της άκρης του καρφιού, το οποίο
        επηρεάζει την πρόσφυση και την καταλληλότητά του για διαφορετικές επιφάνειες
        στίβου.
    spike_thread_size:
      name: Μέγεθος σπειρώματος ακίδας
      description: Καθορίζει το μέγεθος ή το πρότυπο του σπειρώματος της βάσης που
        βιδώνει στο παπούτσι (π.χ. 1/4-20).
    spin_classification:
      name: Κατηγοριοποίηση περιστροφής
      description: Υποδεικνύει το προφίλ περιστροφής για το οποίο έχει σχεδιαστεί
        ο δίσκος (χαμηλή, μεσαία, υψηλή ή υπερυψηλή περιστροφή).
    spin_profile:
      name: Προφίλ περιστροφής
      description: Καθορίζει τα σχετικά χαρακτηριστικά περιστροφής που παρέχει ο άξονας.
    spin_types_supported:
      name: Υποστηριζόμενοι τύποι περιστροφής
      description: Παραθέτει τους τύπους περιστροφής που μπορεί να δώσει η μηχανή
        στις μπάλες, ώστε οι παίκτες να μπορούν να εξασκούνται σε διαφορετικά στυλ
        βολής.
    spinach_preparation_style:
      name: Στυλ προετοιμασίας σπανακιού
      description: Περιγράφει τη φυσική επεξεργασία των φύλλων σπανακιού ή τη μορφή
        του προϊόντος (π.χ. ολόκληρα φύλλα, ψιλοκομμένο, κύβοι).
    spinach_variety:
      name: Ποικιλία σπανακιού
      description: Προσδιορίζει την ποικιλία ή την εμπορική κατηγορία του σπανακιού
        (π.χ. baby, savoy, water, red), ώστε οι αγοραστές να μπορούν να επιλέγουν
        ακριβώς τον τύπο που επιθυμούν.
    spindle_bearing_surface_material:
      name: Υλικό επιφάνειας έδρασης ατράκτου
      description: Υλικό του σημείου ή της επιφάνειας έδρασης που χρησιμοποιείται
        στις ατράκτους στήριξης (άκρο/βάση), το οποίο επηρεάζει την ομαλότητα περιστροφής
        και τη φθορά.
    spindle_bearing_type:
      name: Τύπος ρουλεμάν άξονα
      description: Τύπος άκρης/διεπαφής έδρασης ατράκτου που μειώνει την τριβή κατά
        την επαφή με το μπολ/κύπελλο στήριξης.
    spindle_finish:
      name: Φινίρισμα ατράκτου
      description: Φινίρισμα/επίστρωση επιφάνειας της ατράκτου που επηρεάζει την αίσθηση,
        την ανθεκτικότητα και την εμφάνιση.
    spindle_hook_type:
      name: Τύπος γάντζου ατράκτου
      description: Ο μηχανισμός συγκράτησης νήματος στο επάνω μέρος της ατράκτου,
        που χρησιμοποιείται για τη στερέωση του νήματος οδηγού/νήματος.
    spindle_support_method:
      name: Μέθοδος στήριξης ατράκτου
      description: Προσδιορίζει τον τρόπο στήριξης της ατράκτου κατά το γνέσιμο.
    spindle_tip_style:
      name: Στυλ άκρου ατράκτου
      description: Σχήμα/σχεδιασμός του άκρου που εδράζεται στο μπολ/κύπελλο στήριξης
        (επιφάνεια έδρασης), το οποίο επηρεάζει την τριβή και την ομαλότητα περιστροφής.
    spindle_whorl_position:
      name: Θέση σφονδύλου
      description: Το σημείο στο οποίο βρίσκεται ο σφόνδυλος πάνω στον άξονα της ατράκτου.
    spinner_blade_shape:
      name: Σχήμα λεπίδας spinner (τεχνητό δόλωμα/πεταλούδα)
      description: Προσδιορίζει το βασικό σχήμα της λεπίδας που χρησιμοποιείται στο
        spinner, το οποίο επηρεάζει τους κραδασμούς, τις αντανακλάσεις και το βάθος
        κίνησης.
    spinner_control_card_design_type:
      name: Σχεδιασμός/τύπος κάρτας ελέγχου κλωστικής μηχανής
      description: Περιγράφει το είδος της κάρτας ελέγχου κλωστικής μηχανής ως προς
        τον τρόπο παρουσίασης των πληροφοριών ελέγχου (π.χ. αναφορά λόγου μετάδοσης,
        αναφορά τάσης, πίνακας μετατροπών).
    spinner_subtype:
      name: Επιμέρους τύπος περιστρεφόμενου εξαρτήματος
      description: Προσδιορίζει τον γενικό τύπο ή την οικογένεια του spinner (π.χ.
        inline spinner, spinnerbait).
    spinning_oil_application_area:
      name: Σημείο εφαρμογής λαδιού γνεσίματος
      description: Καθορίζει το προβλεπόμενο σημείο ή τα σημεία εφαρμογής του λαδιού
        σε τροχό γνεσίματος.
    spinning_oil_application_tool:
      name: Εργαλείο εφαρμογής λαδιού για περιστροφή
      description: Υποδεικνύει τον τύπο άκρου εφαρμογής/συσκευασίας που χρησιμοποιείται
        για την εφαρμογή λαδιού σε εξαρτήματα του τροχού γνεσίματος, για ελεγχόμενη
        δοσολογία.
    spinning_oil_features:
      name: Χαρακτηριστικά λαδιού γνεσίματος
      description: Αναδεικνύει λειτουργικές ιδιότητες που σχετίζονται με τα λάδια
        για τροχούς γνεσίματος (υπολείμματα, λεκέδες, οξείδωση και δυνατότητα πλυσίματος).
    spinning_top_features:
      name: Χαρακτηριστικά σβούρας
      description: Ειδικά χαρακτηριστικά παιχνιδιού που περιλαμβάνονται στη σβούρα
        πέρα από τη βασική περιστροφή.
    spinning_top_launch_mechanism:
      name: Μηχανισμός εκκίνησης σβούρας
      description: Τρόπος με τον οποίο η σβούρα τίθεται σε κίνηση/περιστροφή.
    spinning_wheel_brake_tension_system_type:
      name: Τύπος συστήματος φρένου/τάσης τροχού γνεσίματος
      description: Καθορίζει το σύστημα φρένου/τάσης πρόσληψης που χρησιμοποιείται
        για τον έλεγχο της πρόσληψης νήματος.
    spinning_wheel_drive_system:
      name: Σύστημα μετάδοσης κίνησης μηχανής κλωστοϋφαντουργίας
      description: Υποδεικνύει το σύστημα κίνησης για το οποίο προορίζεται η μπομπίνα.
    spinning_wheel_hook_system:
      name: Σύστημα γάντζων τροχού γνεσίματος
      description: Καθορίζει τον τρόπο με τον οποίο το νήμα καθοδηγείται κατά μήκος
        των βραχιόνων της φτερωτής.
    spinning_wheel_part_application:
      name: Εφαρμογή εξαρτήματος τροχού γνεσίματος
      description: Καθορίζει για ποια εξαρτήματα του τροχού γνεσίματος προορίζεται
        το λάδι.
    spinning_wheel_portability_foldability:
      name: Φορητότητα/δυνατότητα αναδίπλωσης τροχού γνεσίματος
      description: Υποδεικνύει αν ο τροχός είναι σχεδιασμένος ώστε να αναδιπλώνεται/συμπτύσσεται
        για μεταφορά.
    spinning_wheel_tension_adjustment_type:
      name: Τύπος ρύθμισης τάσης τροχού γνεσίματος
      description: Τρόπος με τον οποίο ρυθμίζεται η τάση στον τροχό για τον έλεγχο
        της πρόσληψης.
    splice_termination_type:
      name: Τύπος ματίσματος/απόληξης
      description: Προσδιορίζει τον τύπο απόληξης του σχοινιού αγκυροβολίας (π.χ.
        ματισμένη θηλιά, δακτυλήθρα, γάντζος αλυσίδας).
    split_shot_cut_type:
      name: Τύπος εγκοπής βαριδίου split shot
      description: Προσδιορίζει τον τύπο εγκοπής ή ανοίγματος που επιτρέπει τη στερέωση
        στην πετονιά.
    split_shot_shape:
      name: Σχήμα βαριδιού ψαρέματος
      description: Περιγράφει τη φυσική μορφή του βαριδίου split shot, η οποία επηρεάζει
        την υδροδυναμική συμπεριφορά και την αντοχή στα σκαλώματα.
    split_shot_size:
      name: Μέγεθος βαριδίου split shot
      description: Τυποποιημένος αλφαριθμητικός κωδικός μεγέθους (π.χ. SSG, AAA, BB,
        1) που χρησιμοποιείται από κατασκευαστές και ψαράδες για την ταξινόμηση των
        βαριδίων split shot. Συμπληρώνει τις ακριβείς μετρήσεις βάρους.
    spoiler_adjustability:
      name: Δυνατότητα ρύθμισης αεροτομής
      description: Υποδεικνύει αν η γωνία/το ύψος της αεροτομής είναι ρυθμιζόμενα.
    spoke_accessory_function:
      name: Λειτουργία αξεσουάρ ακτίνας
      description: Κατατάσσει το αξεσουάρ βάσει της κύριας λειτουργίας του στον τροχό,
        όπως διακοσμητική, ανακλαστική ή φωτιζόμενη.
    spoke_butting_profile:
      name: Προφίλ διατομής ακτίνας
      description: Περιγράφει τη διαβάθμιση της διαμέτρου της ακτίνας κατά μήκος της
        (σταθερή, μονής, διπλής, τριπλής ή τετραπλής διατομής), η οποία επηρεάζει
        το βάρος και την αντοχή της.
    spoke_gauge:
      name: Πάχος ακτίνας
      description: Καθορίζει το πάχος (ονομαστικό πάχος σύρματος) των ακτίνων με τις
        οποίες είναι συμβατό το καψούλι ακτίνας.
    spoke_interface_type:
      name: Τύπος διεπαφής ακτίνων
      description: Υποδεικνύει τον τύπο κεφαλής ακτίνας για τον οποίο έχει σχεδιαστεί
        η πλήμνη (J-bend, straight-pull, T-head).
    spoke_shape:
      name: Σχήμα ακτίνας
      description: Καθορίζει το εξωτερικό σχήμα διατομής του σύρματος της ακτίνας,
        το οποίο επηρεάζει την αεροδυναμική και την εμφάνιση.
    spool_form_factor:
      name: Παράγοντας μορφής καρουλιού
      description: Το σχήμα του σώματος της μπομπίνας και ο τρόπος συγκράτησης του
        νήματος (π.χ. με φλάντζα ή σε κωνικό σχήμα).
    spoon_style:
      name: Τύπος spoon (δόλωμα τύπου κουταλιού)
      description: Υποδεικνύει τον λειτουργικό υποτύπο ή τον τύπο του spoon, όπως
        casting, flutter ή trolling.
    sports_bra_padding_type:
      name: Τύπος επένδυσης αθλητικού στηθόδεσμου
      description: Καθορίζει τον τύπο επένδυσης που παρέχεται στον αθλητικό στηθόδεσμο.
    sports_cap_style:
      name: Στυλ αθλητικού καπέλου
      description: Προσδιορίζει τη συνολική κατασκευή/το στυλ του καπέλου (π.χ. καπέλο
        μπέιζμπολ, snapback), ανεξάρτητα από την εμπορική προσαρμογή της ομάδας.
    sports_governing_body_certification:
      name: Πιστοποίηση από αθλητικό διοικητικό φορέα
      description: Υποδεικνύει τις επίσημες πιστοποιήσεις ή εγκρίσεις από αναγνωρισμένους
        αθλητικούς διοικητικούς φορείς, που επιβεβαιώνουν ότι το προϊόν πληροί τα
        πρότυπα αγώνων.
    sports_surface_compatibility:
      name: Συμβατότητα με επιφάνειες αθλητισμού
      description: Παραθέτει τους τύπους παιχνιδιών ή επιφανειών στις οποίες μπορεί
        να εφαρμοστεί με ασφάλεια η βαφή.
    sports_toy_set_contents:
      name: Περιεχόμενα σετ αθλητικού παιχνιδιού
      description: Προσδιορίζει ποια εξαρτήματα περιλαμβάνονται στο σετ αθλητικού
        παιχνιδιού (π.χ. μπάλα, ρόπαλο, δίχτυ, στόχοι).
    spray_string_cleanup_method:
      name: Μέθοδος καθαρισμού σπρέι σερπαντίνας
      description: Προτεινόμενος τρόπος αφαίρεσης/καθαρισμού υπολειμμάτων σπρέι σερπαντίνας.
    spray_string_finish_effect:
      name: Φινίρισμα/εφέ σπρέι σερπαντίνας
      description: Οπτικό εφέ του σπρέι σερπαντίνας μετά την εφαρμογή του (γυαλάδα/ανακλαστικότητα
        και ειδικά εφέ).
    spray_string_formulation_type:
      name: Τύπος σύνθεσης σπρέι σερπαντίνας
      description: Περιγράφει τον τρόπο με τον οποίο συμπεριφέρεται το προϊόν κατά
        και μετά τον ψεκασμό (π.χ. πλενόμενο ή μόνιμου τύπου).
    spray_string_recommended_surface:
      name: Προτεινόμενη επιφάνεια χρήσης σπρέι σερπαντίνας
      description: Τύποι επιφανειών για τους οποίους προορίζεται η χρήση του σπρέι
        σερπαντίνας (και από τους οποίους πιθανόν να καθαρίζεται εύκολα).
    spray_string_scent:
      name: Άρωμα σπρέι σερπαντίνας
      description: Άρωμα ή οσμή του σπρέι σερπαντίνας, εφόσον υπάρχει.
    spray_string_suitable_age_group:
      name: Κατάλληλη ηλικιακή ομάδα για σπρέι σερπαντίνας
      description: Συνιστώμενη ελάχιστη ηλικία/ηλικιακή ομάδα χρηστών για ασφαλή χρήση.
    spread_consistency:
      name: Υφή αλείμματος
      description: Περιγράφει την υφή/σύσταση του ντιπ ή του αλείμματος, ώστε να διαμορφώνονται
        προσδοκίες σχετικά με την αίσθηση στο στόμα και τη χρήση του (π.χ. λεία, με
        κομμάτια, αφράτη).
    spread_variety:
      name: Ποικιλία αλείμματος
      description: Κατηγοριοποιεί τον συγκεκριμένο τύπο αλείμματος φρούτων (π.χ. μαρμελάδα,
        ζελέ φρούτων, μαρμελάδα εσπεριδοειδών, κρέμα φρούτων), ώστε οι αγοραστές να
        μπορούν να διακρίνουν μεταξύ διαφορετικών τρόπων παρασκευής και υφών.
    spreader_bar_type:
      name: Τύπος ράβδου διασποράς
      description: Υποδεικνύει τον τύπο spreader bar ή συστήματος γάντζων που παρέχεται
        ή είναι συμβατό με τη ζώνη.
    sprint_canoe_class:
      name: Κατηγορία κανόε καγιάκ σπριντ
      description: Καθορίζει την επίσημη κατηγορία αγώνων κανόε καγιάκ σπριντ.
    sprout_presentation:
      name: Μορφή παρουσίασης βλαστών
      description: Προσδιορίζει τη μορφή παρουσίασης του προϊόντος (π.χ. φρέσκοι βλαστοί,
        microgreens, γλάστρα ζωντανής καλλιέργειας, σκόνη).
    squash_and_gourd_variety:
      name: Ποικιλία κολοκυθιού και κολοκύθας
      description: Προσδιορίζει τη συγκεκριμένη καλλιεργητική ή εμπορική ποικιλία
        του κολοκυθιού ή της κολοκύθας, βοηθώντας τους αγοραστές να εντοπίζουν γρήγορα
        τον τύπο που επιθυμούν.
    stability_class:
      name: Κατηγορία σταθερότητας
      description: Γενική κατηγοριοποίηση της σταθερότητας του δίσκου βάσει αξιολογήσεων
        πτήσης ή εμπορικών χαρακτηρισμών.
    stabilizer_thread_size:
      name: Μέγεθος σπειρώματος σταθεροποιητή
      description: Προδιαγραφή σπειρώματος που χρησιμοποιείται για τη σύνδεση σταθεροποιητή
        ή αξεσουάρ σε τόξο ή βαλλίστρα.
    stabilizer_type:
      name: Τύπος σταθεροποιητή
      description: Προσδιορίζει τον τύπο ή την κατηγορία τοποθέτησης του σταθεροποιητή
        τόξου ή βαλλίστρας.
    stages_supported:
      name: Αριθμός υποστηριζόμενων σταδίων
      description: Υποδεικνύει για πόσα στάδια πτήσης έχει σχεδιαστεί ο πύραυλος ή
        το κιτ.
    stain_remover_format:
      name: Μορφή προϊόντος αφαίρεσης λεκέδων
      description: Καθορίζει τη μορφή/τον τρόπο εφαρμογής του προϊόντος που χρησιμοποιείται
        για την αφαίρεση λεκέδων από οχήματα (σπρέι, αερόλυμα, αφρός, τζελ, σκόνη,
        μαντηλάκια, στυλό/μαρκαδόρος).
    stake_shape:
      name: Σχήμα πασάλου
      description: Καθορίζει τη διατομή ή τον σχεδιασμό του πασάλου σκηνής, που επηρεάζει
        την ισχύ συγκράτησης σε διαφορετικούς τύπους εδάφους.
    stamp_block_features:
      name: Χαρακτηριστικά βάσης σφραγίδας
      description: Αναδεικνύει λειτουργικά χαρακτηριστικά των βάσεων σφραγίδας, όπως
        πλέγματα μέτρησης, λαβές ή αντιολισθητικές επιφάνειες.
    stamp_block_type:
      name: Τύπος βάσης σφραγίδας
      description: Καθορίζει την κατασκευή/το στυλ της βάσης σφραγίδας που χρησιμοποιείται
        για τη στερέωση σφραγίδων (π.χ. διάφανη ακρυλική βάση, ξύλινη βάση σφραγίδας
        ή βάση ευθυγράμμισης).
    stamp_set_pieces_included:
      name: Περιλαμβάνονται τεμάχια σετ γραμματοσήμων
      description: Υποδεικνύει ποια εξαρτήματα περιλαμβάνονται στο σετ σφραγίδων και
        ταμπόν σφραγίδων (π.χ. σφραγίδες, ταμπόν μελανιού, μαρκαδόροι).
    stand_padding_material:
      name: Υλικό επένδυσης βάσης
      description: Υλικό που χρησιμοποιείται στα σημεία επαφής για την προστασία του
        φινιρίσματος του οργάνου (π.χ. αφρός, καουτσούκ, σιλικόνη).
    staple_fiber_animal_fiber_type:
      name: Τύπος ζωικής ασυνεχούς ίνας
      description: Ειδικός τύπος ινών ζωικής προέλευσης όταν η πηγή ινών είναι ζωική.
    staple_fiber_crimp_level:
      name: Επίπεδο πτύχωσης ασυνεχών ινών
      description: Βαθμός φυσικής πτύχωσης/κυματισμού της ίνας.
    staple_fiber_preparation_type:
      name: Τύπος προετοιμασίας ασυνεχών ινών
      description: Η κατάσταση προετοιμασίας/επεξεργασίας της ίνας όπως πωλείται (ο
        βαθμός ευθυγράμμισης ή επεξεργασίας της), η οποία επηρεάζει σημαντικά τη μέθοδο
        νηματοποίησης, την ευκολία τραβήγματος και το τελικό αποτέλεσμα.
    staple_fiber_source_type:
      name: Τύπος προέλευσης ασυνεχούς ίνας
      description: Ευρεία κατηγορία προέλευσης του περιεχομένου της ίνας.
    starch_processing_type:
      name: Τύπος επεξεργασίας αμύλου
      description: Υποδεικνύει αν το άμυλο είναι φυσικό ή έχει υποστεί φυσική ή χημική
        τροποποίηση (π.χ. στιγμιαίο, προζελατινοποιημένο), ώστε να προσφέρει συγκεκριμένες
        λειτουργικές ιδιότητες, όπως ταχύτητα πήξης ή αντοχή στη θερμοκρασία.
    starch_source:
      name: Πηγή αμύλου
      description: Καθορίζει τη φυτική πηγή από την οποία προέρχεται το άμυλο μαγειρικής
        ή το πηκτικό μέσο (π.χ. καλαμπόκι, πατάτα, ταπιόκα). Η προέλευση αποτελεί
        το βασικό στοιχείο διαφοροποίησης των αμύλων μαγειρικής και επηρεάζει άμεσα
        την καταλληλότητα για συνταγές, την παρουσία αλλεργιογόνων και τις προτιμήσεις
        αναζήτησης των καταναλωτών.
    starfruit_variety:
      name: Ποικιλία Starfruit
      description: Προσδιορίζει τη συγκεκριμένη καλλιέργεια ή ποικιλία του starfruit
        (π.χ., Arkin, Fwang Tung).
    starter_drive_type:
      name: Τύπος εκκίνησης
      description: Τύπος μηχανισμού σύμπλεξης μίζας που χρησιμοποιείται για την εμπλοκή
        του γραναζιού εκκίνησης με τη στεφάνη του σφονδύλου.
    starter_pistol_action_type:
      name: Τύπος μηχανισμού λειτουργίας πιστολιού εκκίνησης
      description: Προσδιορίζει τον μηχανισμό λειτουργίας του πιστολιού εκκίνησης
        (π.χ. μονής ενέργειας, διπλής ενέργειας, ημιαυτόματο).
    starter_pistol_caliber:
      name: Διαμέτρημα πιστολιού εκκίνησης
      description: Καθορίζει το διαμέτρημα των αβολίδωτων φυσιγγίων ή του φυσιγγίου
        για το οποίο είναι σχεδιασμένη η θαλάμη του πιστολιού εκκίνησης.
    starter_terminal_type:
      name: Τύπος ακροδέκτη εκκινητή
      description: Καθορίζει τον τύπο ακροδέκτη/συνδέσμου που χρησιμοποιείται για
        τις ηλεκτρικές συνδέσεις στη μίζα ή στο ρελέ μίζας (π.χ. βιδωτός ακροδέκτης,
        συρταρωτός ακροδέκτης, σύνδεσμος plug).
    starting_block_anchoring_method:
      name: Μέθοδος στερέωσης βατήρων εκκίνησης
      description: Περιγράφει τον τρόπο με τον οποίο οι βατήρες εκκίνησης στερεώνονται
        στην επιφάνεια του στίβου (π.χ. αιχμές, βεντούζες, λαστιχένια πέλματα).
    steerer_tube_design:
      name: Σχεδιασμός σωλήνα λαιμού πιρουνιού
      description: Περιγράφει τον δομικό σχεδιασμό του σωλήνα λαιμού του πιρουνιού—ίσιος,
        κωνικός, με σπείρωμα κ.λπ.—ο οποίος καθορίζει τη συμβατότητα με το σετ διεύθυνσης
        και το πλαίσιο.
    steering_cable_end_fitting_type:
      name: Τύπος σύνδεσης άκρου καλωδίου διεύθυνσης
      description: Προσδιορίζει τον τύπο τερματισμού/σύνδεσης στα άκρα του καλωδίου
        διεύθυνσης ενός σκάφους (άκρο πηδαλίου και άκρο κινητήρα/λαγουδέρας) ώστε
        να διασφαλίζεται η συμβατότητα με τα σημεία σύνδεσης του πηδαλίου διεύθυνσης
        και του κινητήρα. Χρησιμοποιήστε την τυπική ονομασία ή την ονομασία του κατασκευαστή,
        όπου εφαρμόζεται.
    steering_column_adjustability_features:
      name: Λειτουργίες ρύθμισης κολόνας τιμονιού
      description: Υποδεικνύει ποιες λειτουργίες ρύθμισης είναι ενσωματωμένες στην
        κολόνα τιμονιού.
    steering_column_ignition_provision:
      name: Δυνατότητα τοποθέτησης διακόπτη ανάφλεξης στην κολόνα τιμονιού
      description: Υποδεικνύει εάν η κολόνα τιμονιού είναι σχεδιασμένη για την τοποθέτηση
        κυλίνδρου ή διακόπτη κλειδαριάς ανάφλεξης και/ή κλειδώματος τιμονιού.
    steering_column_shaft_end_interface_type:
      name: Τύπος διεπαφής άκρου άξονα κολόνας τιμονιού
      description: Προσδιορίζει τον τύπο διεπαφής στο άκρο του άξονα της κολόνας τιμονιού
        (π.χ. πολύσφηνο, διπλό D, με κλειδί).
    steering_column_shift_type:
      name: Τύπος επιλογέα ταχυτήτων κολόνας τιμονιού
      description: Καθορίζει εάν η κολόνα τιμονιού διαθέτει ενσωματωμένο επιλογέα
        ταχυτήτων και τον τύπο κιβωτίου ταχυτήτων.
    steering_component_drive_type:
      name: Τύπος κίνησης εξαρτημάτων διεύθυνσης
      description: Καθορίζει τον μηχανισμό κίνησης/υποβοήθησης που σχετίζεται με τα
        εξαρτήματα διεύθυνσης (ιδιαίτερα τις αντλίες και τα συστήματα EPS).
    steering_position:
      name: Θέση τιμονιού
      description: Καθορίζει εάν το όχημα είναι αριστεροτίμονο ή δεξιοτίμονο.
    steering_pump_pulley_type:
      name: Τύπος τροχαλίας αντλίας διεύθυνσης
      description: Καθορίζει τον τύπο μετάδοσης κίνησης/διεπαφής της τροχαλίας που
        χρησιμοποιείται με την αντλία διεύθυνσης.
    steering_rack_finish_coating:
      name: Φινίρισμα/επίστρωση κρεμαγιέρας τιμονιού
      description: Καθορίζει το εξωτερικό φινίρισμα/την επίστρωση για προστασία από
        τη διάβρωση.
    steering_rack_position:
      name: Θέση ράβδου διεύθυνσης
      description: Καθορίζει τη θέση τοποθέτησης ή χρήσης της κρεμαγιέρας στο σύστημα
        διεύθυνσης του οχήματος.
    steering_wheel_cover_installation_type:
      name: Τύπος τοποθέτησης καλύμματος τιμονιού
      description: Περιγράφει τον τρόπο με τον οποίο το κάλυμμα τιμονιού τοποθετείται/στερεώνεται
        στο τιμόνι.
    steering_wheel_grip_material:
      name: Υλικό λαβής τιμονιού
      description: Καθορίζει το υλικό της στεφάνης/λαβής του τιμονιού (στο σημείο
        επαφής με τα χέρια), το οποίο μπορεί να διαφέρει από το υλικό του πυρήνα/των
        ακτίνων του τιμονιού.
    steering_wheel_mounting_pattern:
      name: Μοτίβο στερέωσης τιμονιού
      description: Καθορίζει το μοτίβο στερέωσης με μπουλόνια/οπές που χρησιμοποιείται
        για την τοποθέτηση του τιμονιού σε πλήμνη ή αντάπτορα (π.χ. 3 μπουλόνια, 5
        μπουλόνια).
    steering_wheel_rim_material_grip_surface:
      name: Υλικό στεφάνης τιμονιού (επιφάνεια λαβής)
      description: Καθορίζει το κύριο υλικό επικάλυψης της στεφάνης/λαβής του τιμονιού
        (διαφορετικό από το συνολικό υλικό κατασκευής).
    stem_material:
      name: Υλικό στελέχους πίπας
      description: Καθορίζει το υλικό που χρησιμοποιείται ειδικά για το στέλεχος ή
        το επιστόμιο της πίπας (π.χ. ακρυλικό, εβονίτης, lucite).
    stencil_machine_consumable_type:
      name: Τύπος αναλώσιμων μηχανής στένσιλ
      description: Καθορίζει τα αναλώσιμα που απαιτούνται για τη λειτουργία της συσκευής
        (εάν υπάρχουν).
    step_surface_texture:
      name: Υφή επιφάνειας σκαλοπατιού
      description: Καθορίζει το σχέδιο ή το υλικό του σκαλοπατιού/της επιφάνειας που
        προορίζεται για βελτιωμένη πρόσφυση και άνεση όταν είναι βρεγμένο.
    stepper_motion_type:
      name: Τύπος κίνησης stepper
      description: Καθορίζει τη βασική κίνηση βηματισμού που προσφέρει η συσκευή.
    stick_bow_profile:
      name: Προφίλ καμπυλότητας μπαστουνιού
      description: Καθορίζει το προφίλ καμπυλότητας (ή τον «τύπο καμπύλης») του άξονα
        του μπαστουνιού χόκεϊ επί χόρτου, το οποίο αποτελεί βασικό παράγοντα που επηρεάζει
        τον έλεγχο της μπάλας, την απόδοση στα drag flick και το στυλ παιχνιδιού.
    stick_construction:
      name: Κατασκευή ραβδιού
      description: Καθορίζει τον τύπο κατασκευής του μπαστουνιού του χόκεϊ, όπως σύνθετο
        υλικό από ένα τεμάχιο, σύνθετο υλικό δύο τεμαχίων ή ξύλο.
    stick_curvature_type:
      name: Τύπος καμπυλότητας μπαστουνιού
      description: Περιγράφει το προφίλ καμπυλότητας του μπαστουνιού ρίψης, το οποίο
        επηρεάζει την απόσταση και την ακρίβεια ρίψης.
    stick_head_shape:
      name: Σχήμα κεφαλής μπαστουνιού
      description: Καθορίζει το σχήμα της κεφαλής του μπαστουνιού, το οποίο επηρεάζει
        το σταμάτημα της μπάλας, το στυλ χτυπήματος και τον έλεγχο της μπάλας σε κοντινή
        απόσταση.
    stick_size_compatibility:
      name: Συμβατότητα μεγέθους ραβδιού
      description: Προσδιορίζει την ομάδα μεγέθους μπαστουνιού χόκεϊ με την οποία
        είναι συμβατό το προϊόν (π.χ. Youth, Junior, Intermediate, Senior, Goalie,
        Universal).
    sticker_decal_features:
      name: Χαρακτηριστικά αυτοκόλλητων/διακοσμητικών
      description: Καταγράφει χαρακτηριστικά εφαρμογής και απόδοσης που αφορούν ειδικά
        τα αυτοκόλλητα/διακοσμητικά (π.χ. χωρίς φυσαλίδες, επανατοποθετούμενα).
    sticker_finish:
      name: Φινίρισμα αυτοκόλλητου
      description: Περιγράφει το φινίρισμα της επιφάνειας/το οπτικό εφέ των αυτοκόλλητων.
    sticker_format:
      name: Μορφή αυτοκόλλητων
      description: Καθορίζει τη μορφή λιανικής πώλησης των διακοσμητικών αυτοκόλλητων
        (π.χ. φύλλο, ρολό, μεμονωμένα τεμάχια, βιβλιαράκι).
    sticker_material_type:
      name: Τύπος υλικού αυτοκόλλητων
      description: Καθορίζει το βασικό υπόστρωμα/υλικό του διακοσμητικού αυτοκόλλητου
        (όχι τα διακοσμητικά στοιχεία).
    stilt_foot_attachment_type:
      name: Τύπος στερέωσης ποδιού σε ξυλοπόδαρο
      description: Καθορίζει τον τρόπο με τον οποίο το πόδι του χρήστη συνδέεται με
        το ξυλοπόδαρο (π.χ. ιμάντας με αγκράφα, Velcro, με κορδόνια).
    stirrup_style:
      name: Στυλ αναβολέα
      description: Κατηγοριοποιεί το σχεδιαστικό στυλ ή το στυλ χρήσης του αναβολέα
        ανάλογα με την ιππική δραστηριότητα, συμπεριλαμβανομένων παραλλαγών ασφαλείας,
        χρήσης και κατασκευής.
    stirrup_tread_material:
      name: Υλικό πέλματος αναβολέα
      description: Καθορίζει το υλικό του πέλματος ή της επιφάνειας πατήματος του
        αναβολέα, το οποίο επηρεάζει την πρόσφυση, την άνεση και τη φθορά.
    stitch_marker_and_counter_style:
      name: Τύπος δείκτη και μετρητή πόντων
      description: Καθορίζει τον τύπο ή τη μορφή δείκτη πόντων ή μετρητή πόντων/σειρών
        (π.χ. δείκτης με κλείδωμα, δείκτης τύπου split ring, μετρητής δακτυλίου, ψηφιακός
        μετρητής).
    stitch_types:
      name: Τύποι βελονιών
      description: Τύποι βελονιών (λειτουργικών και διακοσμητικών) που μπορεί δημιουργήσει
        η μηχανή.
    stitching_method:
      name: Μέθοδος ραφής
      description: Υποδεικνύει τον τρόπο με τον οποίο ενώνονται τα πάνελ της μπάλας.
    stitching_state:
      name: Κατάσταση ραφής
      description: Υποδεικνύει εάν τα κομμάτια του ενδύματος παρέχονται άραφα, ημιραμμένα,
        ραμμένα ή έτοιμα προς χρήση.
    stock_car_race_series:
      name: Σειρά αγώνων stock car
      description: Καθορίζει τον διοργανωτικό φορέα ή τη σειρά/κατηγορία αγώνων για
        την οποία έχει κατασκευαστεί για να αγωνιστεί το stock car.
    stone_adhesion:
      name: Τύπος κουκουτσιού
      description: Υποδεικνύει εάν το ροδάκινο ή το νεκταρίνι είναι εκπύρηνο, συμπύρηνο
        ή ημι-εκπύρηνο.
    stone_creation_method:
      name: Μέθοδος δημιουργίας πέτρας
      description: Καθορίζει εάν ο λίθος είναι φυσικός, εργαστηριακά δημιουργημένος,
        απομίμηση ή ανακυκλωμένος.
    stone_cut_grade:
      name: Βαθμός κοπής λίθου
      description: Υποδεικνύει τη συνολική αξιολόγηση της ποιότητας κοπής του λίθου.
    stone_cut_style:
      name: Τρόπος κοπής πέτρας
      description: Καθορίζει το στυλ κοπής/εδρών του γυάλινου λίθου (π.χ. κοπή με
        φασέτες ή κοπή cabochon).
    stone_fruit_cultivar:
      name: Καλλιεργητική ποικιλία πυρηνόκαρπων
      description: Προσδιορίζει τη συγκεκριμένη καλλιέργεια/ποικιλία του ροδάκινου
        ή του νεκταρινιού.
    stone_fruit_variety:
      name: Ποικιλία πυρηνόκαρπου
      description: Διακρίνει τον υποτύπο της κατηγορίας (π.χ. ροδάκινο, νεκταρίνι,
        ούφο/πλακέ).
    stone_setting_type:
      name: Τύπος δεσίματος λίθου
      description: Καθορίζει τον τρόπο με τον οποίο στερεώνεται ο λίθος στο κόσμημα
        (π.χ. bezel, prong, pavé κ.λπ.).
    stone_transparency:
      name: Διαφάνεια λίθου
      description: Οπτική διαφάνεια/αδιαφάνεια του γυάλινου λίθου.
    storage_case_type:
      name: Τύπος θήκης αποθήκευσης
      description: Υποδεικνύει τον τύπο δοχείου/θήκης με το οποίο παρέχεται το σετ
        για αποθήκευση και μεταφορά (π.χ. κουτί, θήκη, τσάντα).
    storage_compartment_type:
      name: Τύπος αποθηκευτικού χώρου
      description: Καθορίζει τον τύπο αποθηκευτικού χώρου που διαθέτει η σημαδούρα
        κολύμβησης για προσωπικά αντικείμενα.
    storage_media_and_transfer_methods_supported:
      name: Υποστηριζόμενα μέσα αποθήκευσης και μέθοδοι μεταφοράς
      description: Υποστηριζόμενα μέσα ή μέθοδοι σύνδεσης για εισαγωγή/εξαγωγή δειγμάτων
        και αποθήκευση/φόρτωση έργων.
    storage_requirements:
      name: Απαιτήσεις αποθήκευσης
      description: Καθορίζει τον τρόπο με τον οποίο πρέπει να αποθηκεύεται το προϊόν
        πριν ή/και μετά το άνοιγμα, ώστε να διατηρούνται η ποιότητα και η ασφάλειά
        του.
    stove_jack_compatibility:
      name: Συμβατότητα με υποδοχή σόμπας
      description: Υποδεικνύει εάν η σκηνή διαθέτει πυράντοχο άνοιγμα για σωλήνα σόμπας.
    straight_pin_application:
      name: Χρήση ίσιας καρφίτσας
      description: Καθορίζει την προβλεπόμενη χρήση της ίσιας καρφίτσας.
    straight_pin_finish:
      name: Φινίρισμα ίσιας καρφίτσας
      description: Περιγράφει το φινίρισμα ή την επίστρωση της καρφίτσας (π.χ. επινικελωμένη),
        που επηρεάζει την αντοχή στη διάβρωση και την ευκολία διείσδυσης στο ύφασμα.
    straight_pin_head_material:
      name: Υλικό κεφαλής καρφίτσας
      description: Καθορίζει το υλικό της κεφαλής της καρφίτσας (εφόσον υπάρχει),
        όπως πλαστικό ή γυαλί.
    straight_pin_head_shape:
      name: Σχήμα κεφαλής καρφίτσας
      description: Περιγράφει το σχήμα/στυλ της κεφαλής της καρφίτσας για χρηστικότητα
        και καλύτερη ορατότητα.
    strand_configuration:
      name: Διαμόρφωση κλωστής
      description: Υποδεικνύει πόσες ξεχωριστές αλυσίδες ή σειρές αποτελούν την αλυσίδα
        πορτοφολιού (μονή, διπλή, τριπλή).
    strand_material:
      name: Υλικό λωρίδων
      description: Καθορίζει το υλικό που χρησιμοποιείται για τις επιμέρους λωρίδες/streamers.
    strap_attachment_hardware:
      name: Υλικό στερέωσης ιμάντα
      description: Καθορίζει τον τύπο/σχεδιασμό του εξαρτήματος που χρησιμοποιείται
        για τη στερέωση του ιμάντα στο όργανο/σημείο στήριξης.
    strap_configuration:
      name: Διαμόρφωση ιμάντα
      description: Υποδεικνύει τον αριθμό σημείων στερέωσης του κράνους στον ιμάντα
        (π.χ. 2 σημείων, 4 σημείων), κάτι που είναι σημαντικό για την εφαρμογή, την
        ασφάλεια και τις απαιτήσεις των κανονισμών.
    strap_functionality:
      name: Λειτουργικότητα ιμάντα
      description: Καθορίζει την κύρια προβλεπόμενη χρήση ή τον σχεδιασμό του ιμάντα
        μεταφοράς στρώματος γιόγκα.
    strap_padding:
      name: Επένδυση ιμάντα
      description: Υποδεικνύει το επίπεδο επένδυσης του ιμάντα για μεγαλύτερη άνεση
        και καλύτερη κατανομή βάρους.
    strap_side:
      name: Πλευρά τοποθέτησης ιμάντα
      description: Υποδεικνύει αν ο ιμάντας έχει σχεδιαστεί για την αριστερή δέστρα,
        τη δεξιά δέστρα ή αν πωλείται ως ζεύγος.
    strap_width:
      name: Πλάτος ιμάντα
      description: Υποδεικνύει το σχετικό πλάτος του ιμάντα (στενό, μεσαίο, φαρδύ),
        ώστε να διευκολύνεται η επιλογή του επιθυμητού επιπέδου κάλυψης ή στήριξης.
    strength_classification:
      name: Κατάταξη ισχύος
      description: Προσδιορίζει την εμπορική κατηγορία αντοχής που χρησιμοποιείται
        συνήθως από τους κατασκευαστές (π.χ. Light, Strong, Extra Strong).
    strength_grade:
      name: Κατηγορία αντοχής
      description: Περιγράφει το προβλεπόμενο επίπεδο συγκράτησης/αντοχής του του
        βέλκρο.
    stretch_level:
      name: Επίπεδο ελαστικότητας
      description: Υποδεικνύει τον βαθμό ελαστικότητας του υφάσματος κατά τη χρήση.
    stretch_type:
      name: Τύπος ελαστικότητας
      description: Υποδεικνύει αν η ελαστικότητα του υφάσματος είναι μηχανική ή οφείλεται
        σε ελαστικές ίνες και σε ποια κατεύθυνση(-εις) εκτείνεται.
    stretcher_bar_material:
      name: Υλικό τελάρου καμβά
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για το τελάρο/πλαίσιο
        του καμβά (π.χ. πεύκο, έλατο, λεύκα, σημύδα, MDF ή τεχνικά επεξεργασμένο ξύλο).
    strike_shield_shape:
      name: Σχήμα ασπίδας χτυπημάτων
      description: Προσδιορίζει τη συνολική μορφή της επιφάνειας πρόσκρουσης της ασπίδας
        χτυπημάτων.
    string_core_shape:
      name: Σχήμα πυρήνα χορδής
      description: Προσδιορίζει το σχήμα του συρμάτινου πυρήνα που χρησιμοποιείται
        στις περιελιγμένες χορδές, επηρεάζοντας την αίσθηση και τη σταθερότητα.
    string_coverage:
      name: Κάλυψη χορδών
      description: Προσδιορίζει σε ποιες χορδές εφαρμόζεται το καποτάστο (βάσει αριθμού
        χορδών ή συνήθους συνδυασμού χορδών).
    string_end_type:
      name: Τύπος απόληξης χορδής
      description: Προσδιορίζει τον τύπο απόληξης της χορδής στο σημείο σύνδεσής της
        με τη γέφυρα ή τη χορδιέρα, για λόγους συμβατότητας (ιδιαίτερα σημαντικό για
        ακουστικές/ηλεκτρικές κιθάρες και ορισμένα μπάσα).
    string_set_type:
      name: Τύπος σετ χορδών
      description: Προσδιορίζει αν το προϊόν διατίθεται ως πλήρες σετ χορδών ή ως
        μεμονωμένη χορδή αντικατάστασης.
    strung_status:
      name: Κατάσταση πλέγματος
      description: Υποδεικνύει αν η κεφαλή του μπαστουνιού lacrosse διατίθεται με
        προεγκατεστημένο πλέγμα (pocket) ή χωρίς πλέγμα.
    strut_placement:
      name: Τοποθέτηση αντηρίδας
      description: Προσδιορίζει την προβλεπόμενη θέση τοποθέτησης του γονάτου ανάρτησης
        στο όχημα (εμπρός/πίσω και αριστερά/δεξιά).
    stud_attachment_type:
      name: Τύπος στερέωσης με καρφί
      description: Προσδιορίζει τον τρόπο με τον οποίο οι τάπες στερεώνονται ή διαμορφώνονται
        στην εξωτερική σόλα, επηρεάζοντας την πρόσφυση, τη συντήρηση και τη συμμόρφωση
        με τους κανονισμούς των διοργανώσεων.
    stud_configuration:
      name: Διαμόρφωση καρφιών
      description: Προσδιορίζει το σχήμα και τη διάταξη των ταπών στην εξωτερική σόλα,
        επηρεάζοντας την πρόσφυση και την απόδοση σε διαφορετικές επιφάνειες.
    stud_material:
      name: Υλικό καρφιών
      description: Προσδιορίζει το κύριο υλικό των ταπών, το οποίο επηρεάζει την ανθεκτικότητα,
        το βάρος και τη συμμόρφωση με τους κανονισμούς ασφαλείας.
    stuffed_animal_features:
      name: Ειδικά χαρακτηριστικά λούτρινου ζώου
      description: Αναδεικνύει τα ενσωματωμένα χαρακτηριστικά παιχνιδιού και άνεσης
        του λούτρινου ζώου.
    stump_base_type:
      name: Τύπος βάσης stump
      description: Προσδιορίζει τον τύπο βάσης ή συστήματος στερέωσης που χρησιμοποιεί
        το stump του κρίκετ (π.χ. αιχμή, βάση με επαναφορά μέσω ελατηρίου, βάση από
        βαρύ καουτσούκ κ.λπ.).
    stump_mechanism:
      name: Μηχανισμός στελέχους
      description: Προσδιορίζει τον μηχανισμό επαναφοράς ή στερέωσης των stumps του
        κρίκετ (π.χ. με επαναφορά μέσω ελατηρίου ή σταθερός).
    stump_size:
      name: Μέγεθος stump
      description: Προσδιορίζει την κατηγορία μεγέθους του stump, υποδεικνύοντας το
        τυπικό ύψος και την κατάλληλη ηλικιακή ομάδα παικτών.
    subwoofer_installation_type:
      name: Τύπος εγκατάστασης υπογούφερ
      description: Προσδιορίζει τον προβλεπόμενο τρόπο εγκατάστασης του υπογούφερ
        σε σύστημα ήχου οχήματος.
    sugar_cane_variety:
      name: Ποικιλία ζαχαροκάλαμου
      description: Προσδιορίζει τη συγκεκριμένη καλλιεργητική ή εμπορική ποικιλία
        ζαχαροκάλαμου, η οποία μπορεί να επηρεάζει το χρώμα, τη γλυκύτητα και την
        περιεκτικότητα σε ίνες.
    sugar_content_level:
      name: Επίπεδο περιεκτικότητας σε ζάχαρη
      description: Κατατάσσει το συμπύκνωμα ροφήματος βάσει της συνολικής περιεκτικότητας
        ή σύνθεσής του ως προς τη ζάχαρη, ώστε οι αγοραστές να μπορούν να εντοπίζουν
        εύκολα προϊόντα με κανονική, μειωμένη ή μηδενική περιεκτικότητα σε ζάχαρη.
    sugar_refinement_level:
      name: Βαθμός επεξεργασίας ζάχαρης
      description: Υποδεικνύει τον βαθμό ή τον τρόπο επεξεργασίας της ζάχαρης (ως
        προς το χρώμα, την περιεκτικότητα σε μελάσα ή το επίπεδο επεξεργασίας).
    sugar_source:
      name: Πηγή ζάχαρης
      description: Προσδιορίζει τη φυτική ή άλλη προέλευση από την οποία παράγεται
        η ζάχαρη.
    suit_fit:
      name: Γραμμή στολής
      description: Προσδιορίζει τη συνολική γραμμή της στολής, υποδεικνύοντας πόσο
        στενά εφαρμόζει στο σώμα.
    suit_pieces:
      name: Αριθμός τεμαχίων κοστουμιού
      description: Προσδιορίζει τον αριθμό των ενδυμάτων που περιλαμβάνονται στο σετ
        κοστουμιού (π.χ. 2 τεμαχίων, 3 τεμαχίων, 4 τεμαχίων).
    suitable_for_anchoring_use:
      name: Υποδεικνύει αν το προϊόν είναι κατάλληλο για αγκυροβόληση
      description: Υποδεικνύει την προβλεπόμενη χρήση του σχοινιού ή του κάβου για
        σκοπούς αγκυροβόλησης.
    suitable_for_craft_type:
      name: Κατάλληλο για τύπο χειροτεχνίας
      description: Υποδεικνύει την κύρια χρήση για την οποία προορίζεται το σύρμα
        μπλοκαρίσματος.
    suitable_for_paint_type:
      name: Κατάλληλο για τύπο βαφής
      description: Υποδεικνύει με ποιους τύπους χρωμάτων προορίζεται ή είναι ασφαλές
        να χρησιμοποιείται ο καμβάς.
    suitable_for_swim_stroke:
      name: Κατάλληλο για κολύμπι
      description: Υποδεικνύει για ποιο(α) στυλ κολύμβησης προορίζεται το κουπί χειρός.
    suitable_mounting_surface_material:
      name: Κατάλληλο υλικό επιφάνειας τοποθέτησης
      description: Προσδιορίζει την επιφάνεια ή το υλικό τοποθέτησης για το οποίο
        η αυτοκόλλητη επίστρωση έχει σχεδιαστεί να προσκολλάται.
    suitable_play_location:
      name: Κατάλληλη τοποθεσία παιχνιδιού
      description: Υποδεικνύει το κύριο περιβάλλον ή τα κύρια περιβάλλοντα παιχνιδιού
        για τα οποία προορίζεται ο μύλος άμμου και νερού.
    suitable_riding_conditions:
      name: Κατάλληλες συνθήκες οδήγησης
      description: Υποδεικνύει τις συνθήκες ποδηλασίας (π.χ. ξηρό, υγρό ή χειμερινό
        περιβάλλον) για τις οποίες έχει σχεδιαστεί η σύνθεση του λιπαντικού ή του
        καθαριστικού ποδηλάτου.
    suitable_snow_conditions:
      name: Κατάλληλες συνθήκες χιονιού
      description: Υποδεικνύει τις κύριες συνθήκες χιονιού για τις οποίες είναι κατάλληλο
        το κερί πρόσφυσης.
    suitable_surface_type:
      name: Κατάλληλος τύπος επιφάνειας
      description: Προσδιορίζει τις επιφάνειες βάδισης για τις οποίες έχει σχεδιαστεί
        το αντιολισθητικό πέλμα.
    suitable_table_size:
      name: Κατάλληλο μέγεθος τραπεζιού
      description: Υποδεικνύει το μήκος ή τα μήκη τραπεζιού μπιλιάρδου/snooker για
        τα οποία έχει σχεδιαστεί το φωτιστικό.
    sun_protection_rating_upf:
      name: Δείκτης αντηλιακής προστασίας (UPF)
      description: Υποδεικνύει το πιστοποιημένο επίπεδο αντηλιακής προστασίας UPF
        του ενδύματος.
    sun_shade_attachment_method:
      name: Μέθοδος στερέωσης σκίαστρου
      description: Περιγράφει τον τρόπο με τον οποίο στερεώνεται το σκίαστρο στο παράθυρο
        ή το παρμπρίζ.
    sun_shade_style:
      name: Τύπος σκιάστρου
      description: Περιγράφει τον τύπο κατασκευής του σκιάστρου και τον τρόπο ανάπτυξης
        και αποθήκευσής του.
    sunchoke_variety:
      name: Ποικιλία τοπιναμπούρ
      description: Προσδιορίζει τη συγκεκριμένη καλλιεργητική ποικιλία ή ποικιλία
        τοπιναμπούρ (αγκινάρας Ιερουσαλήμ), παρέχοντας λεπτομερείς πληροφορίες για
        κηπουρούς, σεφ και απαιτητικούς αγοραστές.
    sunflower_oil_variety:
      name: Ποικιλία ηλιελαίου
      description: Ταξινομεί το προφίλ λιπαρών οξέων ή την ποικιλία του ηλιελαίου
        (π.χ., Υψηλό Ολεϊκό, ΜΕΣΟ-Ολεϊκό, Λινολεϊκό).
    sunflower_variety:
      name: Ποικιλία ηλίανθου
      description: Ποικιλία/καλλιέργεια ηλίανθου (κοινές ποικιλίες της αγοράς για
        χρήση σε κομμένα άνθη).
    support_brace_features:
      name: χαρακτηριστικά στήριξης
      description: Παραθέτει αξιοσημείωτα λειτουργικά χαρακτηριστικά της υποστύλωσης
        του καρπού, όπως αναπνεύσιμο ύφασμα, αφαιρούμενο νάρθηκα ή ρυθμιζόμενη μεταλλική
        πλάκα.
    support_leg_count:
      name: Αριθμός ποδιών υποστήριξης
      description: Αριθμός ποδιών που έρχονται σε επαφή με το έδαφος όταν χρησιμοποιείται
        το ραβδί σκοποβολής (π.χ. μονόποδο, δίποδο, τρίποδο).
    support_padding:
      name: υποστήριξη εσωτερικό περιθώριο
      description: Υποδεικνύει εάν το λουράκι/υποστήριξη περιλαμβάνει ενσωματωμένο
        εσωτερικό περιθώριο σε σημεία επαφής (λαιμός/ώμος/ αντίχειρας).
    support_structure_type:
      name: τύπος δομής υποστήριξης
      description: Υποδεικνύει τη μέθοδο κατασκευής που χρησιμοποιείται για να διατηρείται
        ο ανεμοφράκτης σε όρθια θέση.
    supported_bowling_delivery_types:
      name: Υποστηριζόμενοι τύποι παράδοσης μπόουλινγκ
      description: Καθορίζει τις παραλλαγές του κρίκετ-μπόουλινγκ που μπορεί να προσομοιώσει
        το μηχάνημα, όπως τους τύπους inswing, outswing και spin.
    supported_dive_modes:
      name: Μέθοδοι κατάδυσης που υποστηρίζονται
      description: Καθορίζει τη λειτουργική λειτουργία Mode Υποστήριξη του υπολογιστή
        κατάδυσης, όπως Air, Nitrox ή Gauge.
    supported_equipment_type:
      name: Υποστηριζόμενος τύπος εξοπλισμού
      description: Προσδιορίζει τον εξοπλισμό χειμερινών σπορ που έχει σχεδιαστεί
        για να χωράει το ράφι (π.χ. σκι, snowboard, μπαστούνια του σκι).
    supported_spin_types:
      name: Υποστηριζόμενοι τύποι περιστροφής
      description: Καθορίζει τις παραλλαγές περιστροφής της μπάλας που μπορεί να εφαρμόσει
        ο εκτοξευτής.
    supported_spool_bobbin_types:
      name: Υποστηριζόμενοι τύποι καρουλιού/μασούρι
      description: Καθορίζει ποιες μορφές καρουλιού/μασούρι έχει σχεδιαστεί να δέχεται
        το ηλεκτρικό τυλικτικό μηχάνημα.
    surf_wax_temperature_rating:
      name: Βαθμολογία θερμοκρασίας κεριού σερφ
      description: Καθορίζει το εύρος θερμοκρασίας νερού για το οποίο έχει σχεδιαστεί
        το κερί, εξασφαλίζοντας βέλτιστη πρόσφυση σε διαφορετικά κλίματα.
    surface_coating_or_finish:
      name: Επικάλυψη επιφάνειας ή φινίρισμα
      description: Καθορίζει οποιαδήποτε προστατευτική ή ενισχυτική επιφάνεια σενάριο
        δοκιμής που εφαρμόζεται στην πένσα.
    surface_coating_or_wrap:
      name: Επιφανειακή επίστρωση ή περιτύλιγμα
      description: Η εξωτερική επιφάνεια σενάριο δοκιμής χρησιμοποιείται για πιάσιμο/έλεγχο
        στο κεντρικό μοχλό (και μερικές φορές ραβδιά χειρός).
    surface_finish:
      name: Φινίρισμα επιφάνειας
      description: Περιγράφει την αίσθηση/υφή της επιφάνειας της μπάλας που Impact
        πρόσκρουσης και κίνηση κατά τη διάρκεια ζογκλερικών επαφής.
    surface_finish_prep:
      name: Φινίρισμα/προετοιμασία επιφάνειας
      description: Υποδεικνύει την κατάσταση της επιφάνειας τριβής (π.χ., ανακατασκευασμένη,
        μηχανικά κατεργασμένη, ως χυτευμένη) κατά την πώληση.
    surface_types_included:
      name: Περιλαμβάνονται τύποι επιφανειών
      description: Καθορίζει την επιφάνεια που περιλαμβάνει το κιτ για σχέδιο/ζωγραφική
        (εάν υπάρχει), όπως καμβά, χαρτί, ξύλινα πάνελ ή κανένα.
    surfboard_construction:
      name: Κατασκευή σανίδας του σερφ
      description: Καθορίζει την κύρια τεχνολογία κατασκευής ή διάταξη της σανίδας
        του σερφ.
    surfboard_tail_shape:
      name: Σχήματα ουράς σανίδας του σερφ
      description: Ορίζει το περίγραμμα της ουράς της σανίδας, το οποίο Influence
        την ευελιξία και το κράτημα.
    suspension_bushing_type:
      name: Τύπος δακτυλίου ανάρτησης
      description: Καθορίζει το λειτουργικό/στυλ εγκατάστασης του δακτυλίου ανάρτησης.
    suspension_configuration:
      name: Διαμόρφωση ανάρτησης
      description: Περιγράφει εάν το τρίκυκλο διαθέτει ανάρτηση και πού βρίσκεται.
    suspension_material:
      name: Υλικό ανάρτησης
      description: Καθορίζει το υλικό των αλυσίδων, των σχοινιών ή των καλωδίων που
        χρησιμοποιούνται για να κρεμαστεί η κούνια.
    suspension_trainer_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ προπόνησης ανάρτησης
      description: Παραθέτει πρόσθετα κομμάτια Supply με το εκπαιδευτικό κιτ (π.χ.
        άγκυρα πόρτας, ιμάντας επέκτασης, τσάντα αποθήκευσης), βοηθώντας τον αγοραστή
        να κατανοήσει τι υπάρχει στο κουτί και να συγκρίνει την αξία σετ.
    suspension_trainer_anchor_type:
      name: Τύπος άγκυρας εκπαιδευτή ανάρτησης
      description: Ορίζει το στυλ τοποθέτησης ή το σημείο αγκύρωσης για το οποίο έχουν
        σχεδιαστεί οι ιμάντες (π.χ., πόρτα, οροφή, δέντρο), ενημερώνοντας για τη συμβατότητα
        με το περιβάλλον του χρήστη.
    suspension_type:
      name: Τύπος ανάρτησης
      description: Καθορίζει εάν το πιρούνι είναι άκαμπτο ή χρησιμοποιεί ένα συγκεκριμένο
        σύστημα ανάρτησης (αέρα, πηνίο, υβριδικό, ελαστομερές κ.λπ.), βοηθώντας τους
        αναβάτες να προσαρμόσουν το πιρούνι στο στυλ οδήγησης τους.
    sustain_pedal_form_factor:
      name: Συντελεστής μορφής πεντάλ Sustain
      description: Περιγράφει το φυσικό στυλ του πεντάλ sustain (π.χ., πεντάλ ποδιού
        τύπου πιάνου έναντι συμπαγούς ποδοδιακόπτη), την αίσθηση Impact και την προβλεπόμενη
        χρήση.
    sustain_pedal_switch_type:
      name: Τύπος διακόπτη πεντάλ Sustain
      description: Υποδεικνύει εάν το πεντάλ στέλνει ένα στιγμιαίο σήμα (διατήρηση
        κατά το πάτημα) ή ένα σήμα ασφάλισης (εναλλαγή).
    sustainability_certification:
      name: Πιστοποίηση βιωσιμότητας
      description: Περιβαλλοντική πιστοποίηση ή πιστοποίηση προέλευσης για το ξύλινο
        υλικό.
    swab_intended_bassoon_section:
      name: Τμήμα φαγκότου που προορίζεται για μπατονέτα
      description: Προσδιορίζει ποιο μέρος ενός φαγκότου έχει σχεδιαστεί για να καθαρίζει
        η μπατονέτα (διαφορετικές οπές/μέρη απαιτούν διαφορετικά Shapes και μέγεθος
        μπατονέτας).
    swab_style:
      name: Στυλ μπατονέτας
      description: Περιγράφει τον φυσικό σχεδιασμό/μορφή του στυλεού που χρησιμοποιείται
        για να περάσει μέσα από ή να φτάσει σε περιοχές του σαξόφωνου.
    swab_weight_material:
      name: Υλικό βάρους μπατονέτας
      description: Υλικό του βάρους/οδηγού έλξης (εάν υπάρχει), το οποίο επηρεάζει
        τον κίνδυνο γρατσουνιών και την ανθεκτικότητα.
    swab_weight_style:
      name: Στυλ βάρους για μπατονέτα
      description: Καθορίζει τον τρόπο με τον οποίο ζυγίζεται η μπατονέτα για να περάσει
        μέσα από την οπή του φαγκότου.
    sway_bar_adjustability:
      name: Ρύθμιση ράβδου ταλάντωσης
      description: Εάν και πώς είναι ρυθμιζόμενη η ακαμψία της ράβδου ταλάντωσης (συνήθως
        μέσω πολλαπλών οπών στερέωσης στις τελικές συνδέσεις).
    sway_bar_coating:
      name: Επίστρωση ράβδου ταλάντωσης
      description: Επιφάνεια σενάριο δοκιμής ή επίστρωση στη ράβδο ταλάντωσης για
        αντοχή στη διάβρωση και εμφάνιση.
    sway_bar_fitment_front_rear_kit:
      name: Τοποθέτηση ράβδου ταλάντωσης (εμπρός/πίσω/κιτ)
      description: Υποδεικνύει εάν η ράβδος ταλάντωσης προορίζεται για τον μπροστινό
        άξονα, τον πίσω άξονα ή πωλείται ως κιτ εμπρός και πίσω.
    sweatshirt_pocket_type:
      name: Τύπος τσέπης φούτερ
      description: Περιγράφει το στυλ των τσεπών που εμφανίζονται στο φούτερ.
    sweet_potato_variety:
      name: Ποικιλία γλυκοπατάτας
      description: Προσδιορίζει τη συγκεκριμένη καλλιέργεια ή ποικιλία αγοράς της
        γλυκοπατάτας.
    sweet_spot_position:
      name: Ιδανική θέση
      description: Προσδιορίζει πού βρίσκεται το ιδανικό σημείο του μπαστουνιού κατά
        μήκος της λεπίδας, επηρεάζοντας το στυλ παιχνιδιού και την κατάσταση του βήματος.
    sweetener_presence:
      name: Παρουσία γλυκαντικού
      description: Καθορίζει εάν υπάρχουν πρόσθετα γλυκαντικά στο βούτυρο ξηρών καρπών
        και σε ποιο επίπεδο.
    sweetening_type:
      name: Τύπος γλυκαντικού
      description: Περιγράφει τον τρόπο με τον οποίο γλυκαίνεται το προϊόν ή το επίπεδο
        γλυκύτητάς του.
    swim_armband_construction_type:
      name: Τύπος κατασκευής περιβραχιόνιου κολύμβησης
      description: Ορίζει το δομικό στυλ ή τον μηχανισμό επίπλευσης των περιβραχιόνων
        (φουσκωτά έναντι συμπαγούς αφρού, υβριδικά κ.λπ.).
    swim_belt_purpose:
      name: Σκοπός της ζώνης κολύμβησης
      description: Λειτουργική ταξινόμηση της ζώνης κολύμβησης (π.χ., υποστήριξη επίπλευσης,
        τζόκινγκ στο νερό, προπόνηση αντίστασης, στατικό δέσιμο, σύνδεση με αλεξίπτωτο
        έλξης, έρμα με βάρη, ασφαλές βάδισμα).
    swim_board_features:
      name: Χαρακτηριστικά σανίδας κολύμβησης
      description: Highlight ειδικά χαρακτηριστικά ή βελτιώσεις της σανίδας κολύμβησης
        που βελτιώνουν τη χρηστικότητα ή την ασφάλεια.
    swim_bottom_length:
      name: Μήκος κάτω μέρους κολύμβησης
      description: Ταξινομεί τη συνολική κάλυψη των ποδιών των κολυμβητικών μποξερών
        (π.χ. κοντό κορμάκι έναντι μήκους μέχρι το γόνατο).
    swim_buoy_features:
      name: Χαρακτηριστικά σημαδούρας κολύμβησης
      description: Καταγράφει πρόσθετα αξιοσημείωτα χαρακτηριστικά ή πρόσθετα που
        βελτιώνουν την ορατότητα, την ασφάλεια ή τη χρησιμότητα μιας σημαδούρας κολύμβησης.
    swim_cap_style:
      name: Στυλ σκουφιού κολύμβησης
      description: Ορίζει την κατασκευή ή το στυλ σχεδιασμού του σκουφιού κολύμβησης
        (π.χ., μακρύτριχο, dome/racing, bubble/turban).
    swim_diaper_feature:
      name: Χαρακτηριστικά πάνας κολύμβησης
      description: Υποδεικνύει εάν η κολύμβηση συνοπτική παρουσίαση διαθέτει ενσωματωμένη
        λειτουργία στεγανής πάνας ή απαιτεί/παραλείπει μια ξεχωριστή πάνα κολύμβησης.
    swim_trainer_features:
      name: Χαρακτηριστικά του προπονητή κολύμβησης
      description: Highlight πρόσθετα λειτουργικά ή άνετα χαρακτηριστικά του εκπαιδευτή
        κολύμβησης.
    swim_trainer_type:
      name: Τύπος εκπαιδευτικού βοηθήματος κολύμβησης
      description: Ορίζει το δομικό στυλ ή τη μορφή του εκπαιδευτή κολύμβησης για
        να βοηθήσει στο φιλτράρισμα ανάλογα με το σχεδιασμό και τον σκοπό της προπόνησης.
    swim_training_focus:
      name: Εστίαση προπόνησης κολύμβησης
      description: Προσδιορίζει τον πρωταρχικό στόχο προπόνησης, τους στόχους με το
        κουπί (π.χ. τεχνική, δύναμη, απομόνωση μυών).
    swim_weight_style:
      name: Στυλ βάρους κολύμβησης
      description: Ταξινομεί τον παράγοντα μορφής του βάρους κολύμβησης, βοηθώντας
        τους αγοραστές να διαφοροποιήσουν τους θεμελιωδώς διαφορετικούς τύπους προϊόντος
        ενώ μένουν στην ίδια κατηγορία.
    swimbait_buoyancy:
      name: Πλευστότητα Swimbait
      description: Υποδεικνύει πώς συμπεριφέρεται το swimbait στη στήλη νερού (επιπλέει,
        αιωρείται, βυθίζεται κ.λπ.), επιτρέποντας στους ψαράδες να επιλέξουν το σωστό
        δόλωμα για το βάθος-στόχο τους και το ανακτώ στυλ ψαρέματος.
    swimbait_style:
      name: Στυλ κολύμβησης
      description: Ταξινομεί την κατασκευή ή τον σχεδιασμό δράσης του swimbait, όπως
        δόλωμα με ουρά ή δόλωμα με ολίσθηση.
    swimwear_pieces_included:
      name: Περιλαμβάνονται τεμάχια μαγιό
      description: Παραθέτει τα επιμέρους είδη ένδυσης που περιλαμβάνονται στο σετ
        μπουρκίνι, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι περιέχει η συσκευασία.
    swimwear_set_pieces_included:
      name: Περιλαμβάνονται σετ μαγιό
      description: Παραθέτει τα είδη ένδυσης που περιλαμβάνονται στο σετ μπουρκίνι,
        ώστε οι αγοραστές να γνωρίζουν ακριβώς τι θα λάβουν (π.χ. μπλούζα, κολάν,
        χιτζάμπ/καπέλο).
    swing_attachment_connection_type:
      name: Τύπος περιστρεφόμενου εξαρτήματος/σύνδεσης
      description: Ο τύπος σύνδεσης που χρησιμοποιείται για να κρεμάσετε την κούνια
        από την υποστήριξη της (π.χ. σχοινί, αλυσίδα, ιμάντες).
    swing_trainer_type:
      name: Τύπος εκπαιδευτικού βοηθήματος αιώρησης
      description: Ταξινομεί το στυλ ή τον μηχανισμό του swing trainer, ώστε οι αγοραστές
        να μπορούν να εντοπίσουν γρήγορα συσκευές που ταιριάζουν με τους στόχους εκπαίδευσης
        τους.
    swing_training_objective:
      name: Στόχος προπόνησης αιώρησης
      description: Ταξινομεί την κύρια εστίαση, τον μηχανισμό ή τον στόχο της προπόνησης
        του swing trainer (π.χ., τέμπο, ταχύτητα, λαβή).
    switch_electrical_positions:
      name: Ηλεκτρικές θέσεις διακόπτη
      description: Καθορίζει τον αριθμό και τη συμπεριφορά των ηλεκτρικών θέσεων στον
        διακόπτη (π.χ., 3-θέση, στιγμιαία ενεργοποίηση).
    swivel_type:
      name: Περιστρεφόμενος τύπος
      description: Καθορίζει τη διαμόρφωση περιστροφής που χρησιμοποιείται για τη
        μείωση του μπερδέματος του λουριού.
    sword_scabbard_material:
      name: Υλικό θήκης σπαθιού
      description: Καθορίζει το κύριο υλικό της περιλαμβανόμενης θήκης/θηκαριού (εφόσον
        υπάρχει).
    synthesizer_form_factor:
      name: Συντελεστής μορφής συνθεσάιζερ
      description: Περιγράφει τη φυσική/μορφή διεπαφής αναπαραγωγής του συνθεσάιζερ.
    synthetic_feather_style:
      name: Στυλ συνθετικού φτερού
      description: Στυλ/κοπή του συνθετικού φτερού που χρησιμοποιείται για διαφορετικές
        εμφανίσεις και τεχνικές Craft .
    synthetic_formulation_type:
      name: Τύπος συνθετικής σύνθεσης
      description: Καθορίζει τον τύπο συνθετικής βασικής πρώτης ύλης/σύνθεσης (π.χ.,
        PAO, εστέρας, υδρογονοπυρόλυση ομάδας III).
    syrup_base_ingredient:
      name: Συστατικό βάσης σιροπιού
      description: Προσδιορίζει το κύριο φυτό ή την πηγή ζάχαρης από την οποία προέρχεται
        το σιρόπι ή το νέκταρ (π.χ. σφένδαμος, αγαύη, ζάχαρη από ζαχαροκάλαμο).
    syrup_variety:
      name: Ποικιλία σιροπιού
      description: Ορίζει το γενικό στυλ ή την κατηγορία του σιροπιού με βάση τη σύνθεση
        ή την παραδοσιακή του χρήση (π.χ. σφένδαμος, άρωμα καφέ, φρούτα, φαρμακευτικό).
    t_shirt_fit:
      name: Εφαρμογή σε μπλουζάκι
      description: Περιγράφει την προβλεπόμενη συνολική εφαρμογή/κοπή του μπλουζιού.
    tabla_included_components:
      name: Περιλαμβάνονται εξαρτήματα Tabla
      description: Υποδεικνύει ποια κομμάτια κλειδιού περιλαμβάνονται στην tabla καταχώριση
        προϊόντος (μονό τύμπανο εναντίον σετ, εξώφυλλα/θήκη, σφυρί συντονισμού κ.λπ.).
    tabla_set_pieces_included:
      name: Περιλαμβάνονται τεμάχια σετ τάμπλα
      description: Υποδεικνύει ποιά εξαρτήματα περιλαμβάνονται στο σετ tabla (π.χ.
        dayan, bayan, δαχτυλίδια, καλύμματα, εργαλεία κουρδίσματος, τσάντα).
    tabla_tonal_pitch_range_bayan:
      name: Τονικό/εύρος τόνου Tabla (bayan)
      description: Περιγράφει την τυπική κατηγορία ύψους/τονικού εύρους για τύμπανα
        bayan (μπάσο) με βάση το μέγεθος και την κατασκευή.
    table_base_material:
      name: Υλικό βάσης τραπεζιού
      description: Προσδιορίζει το κύριο υλικό της βάσης ή του βάθρου του τραπεζιού
        (ξεχωριστό από τα πόδια ή την επιφάνεια του τραπεζιού), βοηθώντας στο φιλτράρισμα
        που αφορά το συγκεκριμένο υλικό.
    table_base_type:
      name: Τύπος βάσης τραπεζιού
      description: Προσδιορίζει τη δομική σχεδίαση που υποστηρίζει την επιτραπέζια
        επιφάνεια (π.χ. βάθρο, τρίγωνο, βάση X).
    table_coverage_position:
      name: Θέση κάλυψης τραπεζιού
      description: 'Υποδεικνύει σε ποια(ες) θέση(εις) τραπεζιού πινγκ πονγκ έχει σχεδιαστεί
        το κάλυμμα: διπλωμένο, παιχνιδιάρικο ή και τα δύο.'
    table_hockey_part_type:
      name: Τύπος εξαρτήματος επιτραπέζιου χόκεϊ
      description: Προσδιορίζει τον συγκεκριμένο τύπο εξαρτήματος σε συστήματα χόκεϊ
        με τραπέζι/αέρα/ράβδου/φούσκας.
    table_leg_design:
      name: Σχεδιασμός ποδιών τραπεζιού
      description: Προσδιορίζει το δομικό στυλ ή τη γεωμετρία του ποδιού, επιτρέποντας
        στον αγοραστή να ταιριάζει με συγκεκριμένες ανάγκες αισθητικής και υποστήριξης.
    table_size:
      name: Πίνακας μεγέθους
      description: Εμπορικά διατυπωμένο τραπέζι μπιλιάρδου συνολικής διαστάσεων (σε
        πόδια), που επιτρέπει στον αγοραστή να επιλέγει γρήγορα κοινές επιλογές, όπως
        τραπέζια μπαρ 7 ποδιών ή τραπέζια τουρνουά 9 ποδιών.
    table_size_category:
      name: Κατηγορία μεγέθους τραπεζιού
      description: Κατηγοριοποιεί το τραπέζι του ποδοσφαιράκι με βάση το συνολικό
        του μέγεθος για να βοηθήσει στην αντιστοίχιση του διαθέσιμου χώρου χωρίς να
        υπολογίζει μετρήσεις.
    table_tennis_certification:
      name: Πιστοποίηση επιτραπέζιας αντισφαίρισης
      description: Καταγράφει τα επίσημα πρότυπα ή το διοικητικό όργανο έγκρισης που
        πληροί το προϊόν (π.χ. κλάσεις ITTF, EN 14468-2).
    tabletop_tilt_function:
      name: Functionsκλίσης τραπεζιού
      description: Καθορίζει εάν η επιφάνεια του τραπεζιού μπορεί να γέρνει, να αναστρέφεται
        ή να περιστρέφεται σε διαφορετικές γωνίες.
    tackle_components_included:
      name: Περιλαμβάνονται στοιχεία εξοπλισμού
      description: Παραθέτει τα συγκεκριμένα εξαρτήματα αλιευτικών εργαλείων που περιλαμβάνονται
        στο κιτ, ώστε ο αγοραστής να γνωρίζει ακριβώς τι παρέχεται.
    talking_drum_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για τύμπανα με ομιλία
      description: Παραθέτει τα αξεσουάρ που περιλαμβάνονται στο ομιλούν τύμπανο (στο
        κουτί).
    talking_drum_cord_material:
      name: Υλικό καλωδίου τυμπάνου με ομιλία
      description: Υλικό που χρησιμοποιείται για τα κορδόνια/σχοινιά τάσης που συνδέουν
        τις κεφαλές των τυμπάνων.
    talking_drum_tuning_mechanism:
      name: Μηχανισμός κουρδίσματος τυμπάνων με ομιλία
      description: Πώς αλλάζει το ύψος/εφαρμόζεται η τάση του τυμπάνου κατά τη διάρκεια
        του παιξίματος (ή όταν Ρυθμίσεις προς τα πάνω).
    tam_tam_construction_style:
      name: Στυλ κατασκευής Tam-tam
      description: Κατασκευή/στυλ σφυρηλάτησης του ταμ-ταμ.
    tam_tam_items_included:
      name: Περιλαμβάνεται κομμάτι Tam-tam
      description: Αξεσουάρ που περιλαμβάνονται στο tam-tam (π.χ. σφυρί, βάση, κάλυμμα).
    tamarillo_variety:
      name: Ποικιλία ταμαρίλλο
      description: Προσδιορίζει τη συγκεκριμένη ποικιλία ή χρώμα παραλλαγή του καρπού
        tamarillo.
    tamarind_variety:
      name: Ποικιλία ταμάρινδου
      description: Προσδιορίζει τη βοτανική ή εμπορική ποικιλία του ταμαρίνδου, η
        οποία μπορεί Influence τη γεύση, την υφή και τη μαγειρική χρήση.
    tambourine_frame_style:
      name: Στυλ Frame ντέφι
      description: Περιγράφει τη φυσική διαμόρφωση του φορητού Frame που χρησιμοποιείται
        για το κράτημα/παιξιμο του ντέφι.
    tambourine_head_material:
      name: Υλικό μεμβράνης ντεφιού
      description: Καθορίζει το υλικό της κεφαλής παιξίματος (μεμβράνης) στα ντέφια
        με κεφαλή.
    tambourine_jingle_configuration:
      name: Διαμόρφωση κουδουνίσματος ντέφι
      description: Πώς διατάσσονται ή κατασκευάζονται τα κουδουνίσματα στο ντέφι.
    tambourine_jingle_material:
      name: Υλικό για κουδούνισμα ντέφι
      description: Καθορίζει το υλικό των κουδουνισμάτων του ντέφι (οι μεταλλικοί
        δίσκοι), το οποίο επηρεάζει τον τόνο και την αντοχή.
    tambourine_mounting_type:
      name: Τύπος στήριξης ντέφι
      description: Πώς προορίζεται να κρατιέται ή να τοποθετείται το ντέφι κατά τη
        διάρκεια του παιχνιδιού.
    tambourine_tuning_mechanism:
      name: Μηχανισμός κουρδίσματος ντέφι
      description: Καθορίζει το σύστημα κουρδίσματος που χρησιμοποιείται σε κουρδιζόμενα
        φορητά ντέφια (εάν υπάρχει).
    tank_model_scale:
      name: Μοντέλο δεξαμενής κλίμακα
      description: Καθορίζει την αναλογία κλίμακας του μοντέλου κλίμακας δεξαμενής
        (π.χ., 1:35, 1:72).
    tank_top_back_style:
      name: Στυλ αμάνικης μπλούζας με πλάτη
      description: Καθορίζει τα Shapes ή την κοπή του πίσω μέρους του φανελάκι, τα
        οποία Influence την υποστήριξη, την κινητικότητα και την αισθητική.
    tape_application_area:
      name: Περιοχή εφαρμογής ταινίας
      description: Καθορίζει το μέρος του εξοπλισμού ή της συσκευής αναπαραγωγής όπου
        προορίζεται να εφαρμοστεί η κασέτα, βοηθώντας τον αγοραστή να επιλέξει το
        σωστό στυλ.
    tape_finish:
      name: Φινίρισμα ταινίας
      description: Επιφάνεια/οπτική εμφάνιση (γυαλάδα ή υφή) της ταινίας.
    tape_purpose:
      name: Σκοπός ταινίας
      description: Καθορίζει την κύρια λειτουργική χρήση της ταινίας στο πλαίσιο της
        συντήρησης ή της εξατομίκευσης της ρακέτας.
    tape_type:
      name: Τύπος ταινίας
      description: Κατηγοριοποιεί το λειτουργικό στυλ ή τη δομή της ταινίας χόκεϊ,
        όπως υφασμάτινη, διαφανής από πολυαιθυλένιο, αντιολισθητική, ελαστική και
        συγκολλητική, για επιγονατίδες ή από σαμουά.
    tapenade_main_ingredients:
      name: Κύρια συστατικά της ταπενάδας
      description: Αναφέρει το κύριο βασικό συστατικό που χαρακτηρίζει την ταπενάδα
        (ελιά, ντομάτα, μελιτζάνα, πιπεριά κ.λπ.), κάτι που είναι χρήσιμο για τους
        αγοραστές που έχουν προτιμήσεις ή περιορισμούς όσον αφορά τα συστατικά.
    tapestry_loom_loom_format:
      name: Μορφή αργαλειού ταπισερί
      description: Συνολικός συντελεστής μορφής/στυλ βάσης του χειροκίνητου αργαλειού
        ταπισερί.
    tapestry_loom_shedding_method:
      name: Μέθοδος αποβολής αργαλειού ταπισερί
      description: Πώς ο αργαλειός δημιουργεί ένα άνοιγμα (διαχωρίζει τα νήματα της
        κρόκης) για να περάσει η υφή
    tapestry_loom_tensioning_system:
      name: Σύστημα τάνυσης αργαλειού ταπισερί
      description: Η μέθοδος που χρησιμοποιείται για την τάνυση και τη στερέωση του
        στημονιού στον αργαλειό ταπισερί.
    tar_head_material:
      name: Υλικό μεμβράνης από δέρμα
      description: Προσδιορίζει το υλικό του τυμπάνου (μεμβράνη), το οποίο επηρεάζει
        σημαντικά την αίσθηση, την αντοχή και τον ήχο.
    tar_playing_style:
      name: Στυλ παιξίματος ταρ
      description: Καθορίζει την κύρια θέση/τεχνική παιξίματος για την οποία έχει
        σχεδιαστεί το ταρ.
    tar_tuning_system:
      name: Σύστημα κουρδίσματος ταρ
      description: Καθορίζει τον τρόπο κουρδίσματος του ταρ (πώς ρυθμίζεται η τάση
        της κεφαλής).
    target_components:
      name: Εξαρτήματα στόχου
      description: Καθορίζει ποια εξαρτήματα καυσίμου/εισαγωγής αέρα προορίζεται να
        καθαρίσει το προϊόν.
    target_relative_humidity_rh:
      name: Στόχος σχετικής υγρασίας (RH)
      description: Η επιδιωκόμενη σχετική υγρασία-στόχος που το προϊόν έχει σχεδιαστεί
        να διατηρεί μέσα στο περιβάλλον του οργάνου/θήκης.
    target_resetting_mechanism:
      name: Μηχανισμός επαναφοράς στόχου
      description: Περιγράφει πώς ή αν ένας στόχος επιστρέφει στην αρχική του θέση
        αφού χτυπηθεί.
    target_trainer_type:
      name: Τύπος εκπαιδευτικού στόχου
      description: Ταξινομεί το συνολικό στυλ ή τη μορφή του προπονητή στόχων ρακέτας
        ή σκουός.
    targeted_contaminants:
      name: Στοχευμένοι ρύποι
      description: Είδη μικροβίων ή παρασίτων για τα οποία το προϊόν είναι πιστοποιημένο
        ότι εξαλείφει.
    targeted_muscle_group:
      name: Στοχευμένη μυϊκή ομάδα
      description: Η κύρια μυϊκή ομάδα που προορίζεται να γυμναστεί ή να υποστηριχθεί
        από το βοηθητικό εξάρτημα.
    taro_variety:
      name: Ποικιλία τάρο
      description: Αναφέρει την ποικιλία, το είδος ή την εμπορική ονομασία της ρίζας
        ταρό που διατίθεται (π.χ. Μωβ Ταρό, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Τύπος κεφαλίδας με φούντες
      description: Περιγράφει τη δομή του άνω τμήματος της κεφαλίδας/στήριξης που
        χρησιμοποιείται για τη στερέωση της φούντας σε μια επιφάνεια (π.χ. ταινία,
        πλεξούδα, κορδόνι).
    tassel_trim_use_case:
      name: Παράδειγμα χρήσης διακοσμητικής τρέσας
      description: Κύριος προορισμός χρήσης της διακοσμητικής τρέσας.
    taste_profile:
      name: Γευστικά χαρακτηριστικά
      description: Περιγράφει τα κυρίαρχα γευστικά χαρακτηριστικά της ποικιλίας μήλου.
    tea_variety:
      name: Ποικιλία τσαγιού
      description: Κατηγοριοποιεί τον συγκεκριμένο τύπο ή το είδος του τσαγιού ή του
        αφεψήματος (π.χ. μαύρο, πράσινο, μάτσα, ρουίμπος), ώστε οι αγοραστές να μπορούν
        να φιλτράρουν τα αποτελέσματα σύμφωνα με τις προτιμήσεις τους.
    teasing_tool_style:
      name: Στυλ εργαλείου ξεφτισίματος
      description: Η μορφή ή ο σχεδιασμός του εργαλείου που χρησιμοποιείται για το
        ξεφτίσιμο και το ανακάτεμα των ινών (π.χ. βούρτσα, τσουγκράνα, χτένα).
    tee_base_style:
      name: Στυλ βάσης μικρού πασσάλου
      description: Περιγράφει τη δομή της βάσης ενός μικρού πασσάλου στο ράγκμπι,
        ο οποίος στηρίζει τη μπάλα.
    temper_hardness:
      name: Σκληρότητα
      description: Δείχνει πόσο μαλακό ή σκληρό είναι το σύρμα (πόσο καλά διατηρεί
        το σχήμα του).
    temperature_control_type:
      name: Τύπος ελέγχου θερμοκρασίας
      description: Πώς ελέγχεται/ρυθμίζεται η θερμοκρασία του εργαλείου.
    tenkara_action_ratio:
      name: Αναλογία δράσης Tenkara
      description: Υποδεικνύει την παραδοσιακή αναλογία κάμψης Tenkara που περιγράφει
        πού λυγίζει το καλάμι υπό τάση (π.χ., 6:4).
    tennis_ball_court_surface:
      name: Επιφάνεια γηπέδου τένις
      description: Καθορίζει την/τις επιφάνεια/ες του γηπέδου για την/τις οποία/ες
        έχει σχεδιαστεί η μπάλα, ώστε να διασφαλίζεται η βέλτιστη απόδοση και ανθεκτικότητα.
    tennis_ball_pressure_type:
      name: Τύπος πίεσης μπάλας τένις
      description: Προσδιορίζει την εσωτερική πίεση ή την κατασκευή της μπάλας (υπό
        πίεση, χωρίς πίεση, χαμηλή συμπίεση, αφρός) που επηρεάζει την αναπήδηση και
        την ανθεκτικότητα.
    tennis_racket_grip_size:
      name: Μέγεθος λαβής ρακέτας τένις
      description: Καθορίζει την τυποποιημένη περιφέρεια της λαβής της ρακέτας (L0–L5
        ή αντίστοιχα μεγέθη σε ίντσες) για να εξασφαλιστεί η σωστή εφαρμογή στο χέρι
        και η άνεση.
    tenor_flutophone_fingering_system:
      name: Σύστημα δακτυλισμών για φλαουτόφωνο τενόρου
      description: Καθορίζει το σύστημα δακτυλισμού που χρησιμοποιείται στο φλαουτόφωνο
        τενόρου (πρόγραμμα σπουδών/σύμβαση σημειογραφίας).
    tenor_recorder_joint_type:
      name: Τύπος σύνδεσης φλάουτου τενόρου
      description: Καθορίζει τον τύπο σύνδεσης μεταξύ των τμημάτων του φλάουτου τενόρου.
    tenor_saxophone_key_system:
      name: Σύστημα πλήκτρων σαξοφώνου τενόρου
      description: Καθορίζει το σύστημα/πρότυπο πλήκτρων που χρησιμοποιείται (συχνά
        αναφέρεται ως γαλλικό/μποεμικό στυλ για σαξόφωνα).
    tenor_saxophone_pad_material:
      name: Υλικό μαξιλαριού σαξοφώνου τενόρου
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται για τα μαξιλαράκια
        του οργάνου.
    tenor_trombone_slide_type:
      name: Τύπος σωλήνα τρομπονιού τενόρου
      description: Τύπος ολισθητήρα που χρησιμοποιείται στο τενόρο τρομπόνι (π.χ.
        τυπικός/ευθύγραμμος έναντι σκανδάλης/αξονικής ροής).
    tenor_trombone_valve_configuration:
      name: Διαμόρφωση βαλβίδας τενόρο τρομπονιού
      description: Υποδεικνύει εάν το τενόρο τρομπόνι διαθέτει σύνδεση βαλβίδας/ρότορα
        και ποια διαμόρφωση χρησιμοποιεί.
    tension_control_type:
      name: Τύπος ελέγχου τάνυσης
      description: Υποδεικνύει πώς (ή εάν) η σαΐτα παρέχει ρυθμιζόμενη αντίσταση/τάση
        στην μπομπίνα/πένα κατά την τροφοδοσία.
    tension_mechanism:
      name: Μηχανισμός τάνυσης
      description: Το είδος τάνυσης που χρησιμοποιείται για τον έλεγχο της τροφοδοσίας
        του υφαδιού από την μπομπίνα/καρούλι κατά την ύφανση.
    tension_pitch_modulation_system:
      name: Σύστημα διαμόρφωσης τάσης/βήματος
      description: Πώς το ομιλόν τύμπανο αλλάζει τον τόνο ή την ένταση κατά τη διάρκεια
        του παιξίματος (για παράδειγμα, σφίγγοντας τα κορδόνια έντασης).
    tension_system:
      name: Σύστημα τάνυσης
      description: Το σύστημα πρόσφυσης/τάνυσης του περιστρεφόμενου τροχού για το
        οποίο προορίζεται το κιτ φυλλαδίου.
    tent_fabric_material:
      name: Υλικό υφάσματος σκηνής
      description: Προσδιορίζει το κύριο ύφασμα που χρησιμοποιείται στο πέδιλο ή το
        σώμα της σκηνής, επηρεάζοντας το βάρος, την αναπνοή και την αντοχή στις καιρικές
        συνθήκες.
    tent_season_rating:
      name: Αξιολόγηση για την περίοδο κατασκήνωσης
      description: Κατηγοριοποιεί τη σκηνή ανάλογα με τον αριθμό των εποχών ή τις
        καιρικές συνθήκες για τις οποίες έχει σχεδιαστεί (π.χ. 3 εποχών, 4 εποχών,
        αποστολές).
    tent_setup_type:
      name: Τύπος εγκατάστασης σκηνής
      description: Υποδεικνύει το δομικό στυλ κλίσης της σκηνής, όπως ελεύθερη, ημι-ελεύθερη,
        μη-ελεύθερη, φουσκωτή/αεροδυναμική ή αναδυόμενο κατάστημα.
    tent_style:
      name: Στυλ σκηνής
      description: Περιγράφει τον δομικό σχεδιασμό της σκηνής (π.χ., θόλος, σήραγγα,
        Frame Α).
    test_result_output_method:
      name: Μέθοδος εξόδου αποτελέσματος δοκιμής
      description: Καθορίζει τον τρόπο με τον οποίο ο ελεγκτής μπαταρίας οχήματος
        παρουσιάζει ή παραδίδει τα αποτελέσματα δοκιμών στον χρήστη (π.χ. ένδειξη,
        οθόνη, εκτύπωση, εφαρμογή ή λογισμικό Αναφορές).
    tether_strap_system:
      name: Σύστημα πρόσδεσης/ιμάντα
      description: Τύπος ιμάντα ή συστήματος ιμάντων που χρησιμοποιείται για τη σύνδεση
        της υποστύλωσης του λαιμού με το κράνος/ζώνη (εάν υπάρχει).
    text_color:
      name: χρώμα κειμένου
      description: χρώμα του τυπωμένου ή κεντημένου κειμένου στην Label, διαφορετικό
        από το χρώμα φόντου Label .
    textile_craft_machine_operation_type:
      name: Τύπος λειτουργίας μηχανής Craft
      description: Τρόπος λειτουργίας του μηχανήματος (χειροκίνητο vs ποδοκίνητο vs
        μηχανοκίνητο/ηλεκτρικό).
    textile_finish_treatment:
      name: Textile finish / σενάριο δοκιμής
      description: Καθορίζει αξιοσημείωτη επιφάνεια σενάριο δοκιμής που εφαρμόζεται
        στην υφαντική ύλη.
    texture_inclusions:
      name: Συμπεριλήψεις υφής
      description: Καθορίζει τα πρόσθετα συστατικά υφής, όπως πολτό αλόης, σπόρους
        βασιλικού, nata de coco, popping boba ή κομμάτια φρούτων.
    therapeutic_technology:
      name: Θεραπευτική τεχνολογία
      description: Καθορίζει τυχόν ενσωματωμένες θεραπευτικές Functions, όπως ψυκτικό
        τζελ, μαγνητικές ταινίες ή υπέρυθρη κεραμική.
    thermal_set_components:
      name: Στοιχεία θερμικού σετ
      description: Προσδιορίζει εάν το προϊόν περιλαμβάνει μόνο τα κάτω μέρη, μόνο
        τα πάνω μέρη ή και τα δύο κομμάτια ως σύνολο.
    thermal_weight:
      name: Θερμικό βάρος
      description: Υποδεικνύει την κατηγορία ζεστασιάς του υφάσματος μπαλακλάβα.
    thermostat_type:
      name: Τύπος θερμοστάτη
      description: Ο λειτουργικός σχεδιασμός ή το στυλ ελέγχου ενός θερμοστάτη συστήματος
        ψύξης μηχανοκίνητου οχήματος.
    thimble_guide_size:
      name: Μέγεθος οδηγού δακτυλήθρας
      description: ονομασία μεγέθους της δαχτυλήθρας οδηγός (μέγεθος/κάλυψη), τυπικά
        πωλείται ως μικρό/μεσαίο/μεγάλο και όχι ως μετρημένη ποιοτική μεταβλητή.
    thread_connection_size:
      name: νήμα μέγεθος σύνδεσης
      description: Ορίζει την προδιαγραφή νήματος που συνδέει άξονες, άκρες και προσαρμογείς
        (π.χ., 6 mm, 5/16"-24).
    thread_construction:
      name: Κατασκευή νήματος
      description: Πώς κατασκευάζεται ή αντιμετωπίζεται το νήμα (π.χ., κλωστή κεντήματος
        έναντι συγκολλημένου νήματος).
    thread_cord_type_beading_pattern:
      name: νήμα/τύπος κορδονιού (μοτίβο με χάντρες)
      description: Συνιστώμενος τύπος νήματος ή κορδονιού που χρησιμοποιείται για
        την ολοκλήρωση του πατρόν.
    thread_cutter_form_factor:
      name: συντελεστής μορφής κοπτικού νήματος
      description: Προσδιορίζει το φυσικό στυλ του κόπτη νήμα, όπως ψαλίδι χειρός,
        μενταγιόν ή δαχτυλίδι.
    thread_cutter_mechanism:
      name: μηχανισμός κοπής νήματος
      description: Περιγράφει την ενέργεια ή τον μηχανισμό κοπής που χρησιμοποιείται
        από τον κόπτη νήμα.
    thread_cutter_safety_features:
      name: Χαρακτηριστικά ασφαλείας για κόφτη νήματος
      description: Υποδεικνύει ενσωματωμένα χαρακτηριστικά ασφαλείας που μειώνουν
        τον κίνδυνο τυχαίων κοψιμάτων ή προστατεύουν τις λεπίδες κατά την αποθήκευση.
    thread_cutter_usage_application:
      name: Χρήση/εφαρμογή κοπτικού νήματος
      description: Υποδεικνύει την κύρια προβλεπόμενη χρήση του κοπτικού σπειρωμάτων.
    thread_finish_treatment:
      name: Φινίρισμα/επεξεργασία σπειρώματος
      description: Επιφανειακό φινίρισμα ή σενάριο δοκιμής που εφαρμόζεται στο νήμα
        επηρεάζοντας τη διακίνηση και την απόδοση (π.χ. κερωμένο, κολλημένο, μερσερισμένο).
    thread_material:
      name: Υλικό νήματος
      description: Πρωτογενής ίνα/υλικό Περιεχόμενο του νήμα/νήμα (όχι ύφασμα).
    thread_material_fiber:
      name: Υλικό νήματος (ίνα)
      description: Καθορίζει την κύρια ίνα/υλικό του ίδιου του νήματος (όχι ύφασμα).
    thread_package_format:
      name: Μορφή πακέτου νήματος
      description: Μορφή συσκευασίας του νήματος ραψίματος (π.χ. καρούλι, κώνος, μπομπίνα).
    thread_rack_compatible_spool_type:
      name: νήμα ράφι compatible spool type
      description: Τύπος συσκευασίας νήματος για τον οποίο έχει σχεδιαστεί το ράφι
        (καρούλια έναντι κώνων, κ.λπ.).
    thread_standard_size:
      name: Τυπικό μέγεθος σπειρώματος
      description: Προσδιορίζει το πρότυπο νήμα μέγεθος/βάρος που χρησιμοποιείται
        στο προϊόν προϊόντος (π.χ. wt, Tex, denier).
    thread_type:
      name: Τύπος νήματος
      description: Καθορίζει την κατασκευή/τύπο της κλωστής/νήμα για σταυροβελονιά.
    thread_weight_system:
      name: Σύστημα βάρους νήματος
      description: Το πρότυπο που χρησιμοποιείται για την έκφραση πάχους/βάρους νήματος.
    thread_yarn_guide_mounting_attachment_style:
      name: Τρόπος τοποθέτησης/σύνδεσης του οδηγού νήματος
      description: Περιγράφει τον τρόπο με τον οποίο φοριέται ή τοποθετείται ο οδηγός
        κατά τη χρήση.
    thread_yarn_guide_tension_control:
      name: νήμα & νήμα οδηγός έλεγχος τάσης
      description: Υποδεικνύει εάν και πώς ο οδηγός παρέχει ρυθμιζόμενη τάση/οπισθέλκουσα
        στο νήμα ή στο νήμα.
    thread_yarn_organizer_features:
      name: Χαρακτηριστικά του οργανωτή για νήματα και κλωστές
      description: Επισημαίνει τα χαρακτηριστικά λειτουργικής οργάνωσης και μεταφοράς
        που αφορούν ειδικά την αποθήκευση νημάτων.
    threader_intended_use:
      name: Προβλεπόμενη χρήση βελόνας
      description: Υποδεικνύει το κύριο πεδίο χρήσης για το οποίο έχει σχεδιαστεί
        το χειροκίνητο εργαλείο για το πέρασμα της κλωστής στη βελόνα.
    threading_system:
      name: Σύστημα σπειρώματος
      description: Αναφέρει τη μέθοδο και τα βοηθήματα που χρησιμοποιούνται για το
        νήμα της ραπτομηχανής (π.χ. χειροκίνητη, με χρωματικό κώδικα, με οδηγό, με
        αέρα).
    threading_type:
      name: Τύπος σπειρώματος
      description: Υποδεικνύει εάν το κόσμημα χρησιμοποιεί εσωτερικό νήμα, εξωτερικό
        νήμα, είναι χωρίς σπείρωμα ή δεν εφαρμόζεται.
    throttle_type_scooter_conversion:
      name: Τύπος γκαζιού (μετατροπή σκούτερ)
      description: Καθορίζει τον τύπο/τη διεπαφή του γκαζιού που περιλαμβάνεται ή
        απαιτείται από το κιτ μετατροπής.
    throw_rope_end_attachment:
      name: Συνημμένο άκρου σχοινιού ρίψης
      description: Ο τερματισμός/προσάρτηση υλικού εξοπλισμού ή βρόχος που παρέχεται
        στο(τα) άκρο(α) εργασίας του σχοινιού ρίψης.
    throw_rope_storage_packaging_type:
      name: Τύπος αποθήκευσης/συσκευασίας σχοινιού ρίψης
      description: Ο τρόπος αποθήκευσης ή ανάπτυξης του σχοινιού ρίψης (π.χ. σε τσάντα
        ή σε καρούλι).
    throw_rope_visibility_features:
      name: Χαρακτηριστικά ορατότητας σχοινιού ρίψης
      description: Χαρακτηριστικά ορατότητας και αναγνώρισης που αποσκοπούν στην ευκολότερη
        ορατότητα του σχοινιού σε νερό/χαμηλό φωτισμό.
    thrower_operation_type:
      name: Τύπος λειτουργίας εκτοξευτή
      description: Ταξινομεί το μηχανικό/λειτουργικό στυλ του εκτοξευτή για γρήγορο
        φιλτράρισμα χειροκίνητων έναντι αυτόματων μηχανισμών.
    thumb_design:
      name: Σχεδιασμός αντίχειρα
      description: Περιγράφει τον τρόπο με τον οποίο ο αντίχειρας ενσωματώνεται στο
        γάντι, επηρεάζοντας την ασφάλεια και το κράτημα.
    tiara_design:
      name: Σχέδιο τιάρας
      description: Καθορίζει το συνολικό δομικό στυλ ή τη σιλουέτα της τιάρας.
    tie_down_points_straps_included:
      name: Περιλαμβάνονται σημεία/ιμάντες πρόσδεσης
      description: Καθορίζει εάν το ράφι περιλαμβάνει ενσωματωμένα σημεία πρόσδεσης
        ή/και ιμάντες για τη στερέωση της μοτοσικλέτας/σκούτερ.
    tiling_format:
      name: Μορφή παράθεσης
      description: Καθορίζει το στυλ διάταξης PDF για τη συναρμολόγηση εκτυπωμένων
        σελίδων.
    time_current_characteristic:
      name: Χαρακτηριστικό χρόνου-ρεύματος
      description: Υποδεικνύει τη συμπεριφορά χρόνου-ρεύματος της ασφάλειας (π.χ.,
        ταχείας δράσης έναντι χρονικής καθυστέρησης), η οποία επηρεάζει την καταλληλότητα
        για κυκλώματα ρεύματος εισροής.
    timer_count_mode:
      name: Λειτουργία μέτρησης χρόνου
      description: Καθορίζει τον τρόπο μέτρησης του χρονομέτρου, όπως αντίστροφη μέτρηση,
        αύξουσα μέτρηση (χρονόμετρο), και τα δύο, ή διαστήματα/επαναλήψεις.
    timer_display_type:
      name: Τύπος εμφάνισης χρονοδιακόπτη
      description: Υποδεικνύει πώς το χρονόμετρο του παιχνιδιού εμφανίζει τον υπολειπόμενο
        χρόνο (π.χ., ψηφιακή οθόνη, αναλογικό καντράν, κλεψύδρα άμμου ή χωρίς οπτική
        ένδειξη).
    timer_operating_modes:
      name: Τρόποι λειτουργίας χρονομέτρου
      description: Συμπεριφορές χρονοδιακόπτη που υποστηρίζονται για εφέ στοιχείου
        ενεργοποίησης.
    timing_belt_construction_material_rubber_compound:
      name: Υλικό κατασκευής ιμάντα χρονισμού (καουτσούκ)
      description: Το μείγμα καουτσούκ που χρησιμοποιείται στον κύριο ιμάντα (π.χ.
        HNBR), το οποίο επηρεάζει την αντοχή στη θερμότητα και στο λάδι καθώς και
        τη διάρκεια ζωής του.
    timing_belt_profile:
      name: Προφίλ ιμάντα χρονισμού
      description: Προφίλ δοντιών/σχημάτων του ιμάντα χρονισμού (π.χ., τραπεζοειδές
        έναντι καμπυλόγραμμου).
    timing_belt_reinforcement_cord_material:
      name: Υλικό καλωδίου ενίσχυσης ιμάντα χρονισμού
      description: Καθορίζει το υλικό του εσωτερικού ενισχυτικού καλωδίου στο εσωτερικό
        του ιμάντα χρονισμού (π.χ., υαλοβάμβακας, αραμίδιο), το οποίο επηρεάζει την
        αντοχή και την ελαστικότητα.
    timing_component_material:
      name: Υλικό εξαρτήματος χρονισμού
      description: Κύριο υλικό του εξαρτήματος χρονισμού (σύνθεση ιμάντα, μέταλλο
        αλυσίδας/γραναζιού, υλικό καλύμματος).
    tin_whistle_body_material:
      name: Υλικό κατασκευής του σώματος της φλογέρας
      description: Αποτυπώνει τα κοινά υλικά αριθμού φορολογικού μητρώου, πιο συγκεκριμένα
        από την ευρεία λίστα υλικών οργάνων όταν χρειάζεται.
    tin_whistle_bore_type:
      name: Τύπος διαμέτρου σωλήνα φλογέρας
      description: Καθορίζει το σχέδιο της οπής της φλογέρας.
    tin_whistle_included_accessories:
      name: Περιλαμβάνονται αξεσουάρ για τη φλογέρα
      description: Αξεσουάρ που περιλαμβάνονται μαζί με τη φλογέρα (π.χ. θήκη, καλάμι
        καθαρισμού).
    tip_finish_coating:
      name: Φινίρισμα/επικάλυψη ρύγχους
      description: Καθορίζει την επιφανειακή επεξεργασία στο λειτουργικό άκρο (π.χ.
        επιχρωμίωση, βαφή με σκόνη) που επηρεάζει την αντοχή στη διάβρωση και τη φθορά
        των ζαντών.
    tip_shape:
      name: Σχήμα μύτης
      description: Περιγράφει το σχήμα ή την ακρίβεια της άκρης της πένας της κιθάρας,
        που επηρεάζει την άρθρωση και την αίσθηση κατά το παίξιμο.
    tippet_rating:
      name: Αξιολόγηση Tippet
      description: Μέγιστη συνιστώμενη αντοχή ακροφυσίου εκφρασμένη σε ονομασίες X
        για ψάρεμα με μύγα (π.χ., 4X).
    tire_changer_operation_type:
      name: Τύπος λειτουργίας αλλαγής ελαστικών
      description: Καθορίζει τον τρόπο ενεργοποίησης/λειτουργίας ενός μηχανήματος
        αλλαγής ελαστικών (π.χ. χειροκίνητο, πνευματικό, υδραυλικό). Διαφορετικό από
        το γενικό χαρακτηριστικό «Πηγή ενέργειας»· χρησιμοποιείται κατά την περιγραφή
        της μεθόδου ενεργοποίησης λειτουργίας του μηχανήματος.
    tire_changer_type:
      name: Τύπος αλλαγής ελαστικών
      description: Το γενικό στυλ λειτουργίας, ο σχεδιασμός ή το επίπεδο Automation
        ενός μηχανήματος αλλαγής ελαστικών.
    tire_compound_type:
      name: Τύπος γόμας ελαστικού
      description: Καθορίζει την ταξινόμηση της γόμας που χρησιμοποιείται στα ελαστικά
        (π.χ. μαλακό, βροχής, σλικ), η οποία επηρεάζει την πρόσφυση και την ανθεκτικότητα
        υπό διαφορετικές συνθήκες.
    tire_load_range:
      name: Σειρά ελαστικών για φόρτωση
      description: Υποδεικνύει την ονομασία της κατηγορίας στρώσης ελαστικού/φορτωτική
        ικανότητα (συνήθως για ελαστικά LT) που αντικατοπτρίζει τη φέρουσα ικανότητα.
    tire_position:
      name: Θέση ελαστικού
      description: Συνιστώμενη θέση τοποθέτησης στο όχημα.
    tire_repair_kit_components:
      name: Εξαρτήματα κιτ επισκευής ελαστικών
      description: Καθορίζει το κομμάτι που περιλαμβάνεται στο κιτ, επιτρέποντας στον
        πελάτη να συγκρίνει την πληρότητα σετ.
    tire_sidewall_type:
      name: Τύπος πλευρικού τοιχώματος ελαστικού
      description: Καθορίζει το στυλ ή τα χαρακτηριστικά κατασκευής του πλευρικού
        τοιχώματος.
    tire_speed_rating:
      name: Δείκτης ταχύτητας ελαστικών
      description: Γράμμα δείκτη ταχύτητας ελαστικού (π.χ. H, V, W) που υποδεικνύει
        τη μέγιστη διατηρούμενη ταχύτητα.
    tire_spoon_type:
      name: Τύπος κουταλιού ελαστικού
      description: Κατηγοριοποιεί το κουτάλι ελαστικού ανά Shapes άκρων και προβλεπόμενη
        χρήση.
    tire_system_compatibility:
      name: Συμβατότητα συστήματος ελαστικών
      description: Υποδεικνύει εάν το στεγανωτικό προορίζεται για εγκατάσταση χωρίς
        σωλήνα, ελαστικά τύπου σωλήνα ή και τα δύο.
    tire_temperature_rating_utqg:
      name: Βαθμολογία θερμοκρασίας ελαστικών (UTQG)
      description: Βαθμός αντοχής στη θερμοκρασία UTQG για ελαστικά αυτοκινήτων (π.χ.,
        A, B, C).
    tire_traction_rating_utqg:
      name: Αξιολόγηση πρόσφυσης ελαστικών (UTQG)
      description: Βαθμός πρόσφυσης UTQG για απόδοση φρεναρίσματος σε βρεγμένο οδόστρωμα.
    tire_tread_style:
      name: Σχέδιο πέλματος ελαστικού
      description: Περιγράφει το γενικό μοτίβο πέλματος του σωληνωτού ελαστικού, υποδεικνύοντας
        το προοριζόμενο έδαφος και τα χαρακτηριστικά πρόσφυσης.
    tire_tube_type:
      name: Τύπος αεροθαλάμου ελαστικού
      description: Εάν το ελαστικό έχει σχεδιαστεί για χρήση χωρίς αεροθάλαμο ή για
        χρήση με αεροθάλαμο.
    title_status:
      name: Κατάσταση τίτλου
      description: Νομική κατάσταση/κατάσταση τίτλου ταξινόμησης του οχήματος.
    tobacco_application:
      name: Τρόπος χρήσης καπνού
      description: Υποδεικνύει την προβλεπόμενη μέθοδο κατανάλωσης ή τη συσκευή καπνίσματος
        για την οποία έχει σχεδιαστεί ο χύμα καπνός.
    tobacco_cut_type:
      name: Τύπος κοπής καπνού
      description: Καθορίζει το στυλ φυσικής κοπής ή προετοιμασίας του χύμα καπνού,
        που επηρεάζει τον ρυθμό καύσης, τη μέθοδο συσκευασίας και τη συνολική εμπειρία
        καπνίσματος.
    tobacco_strength:
      name: Ένταση καπνού
      description: Υποδεικνύει την αντιληπτή ένταση ή αίσθηση νικοτίνης που προσφέρει
        ο καπνός κατά την κατανάλωση, κάτι που βοηθά τους αγοραστές να επιλέγουν μια
        ένταση που ταιριάζει με τις προτιμήσεις τους.
    toe_construction:
      name: Κατασκευή πέλματος
      description: Καθορίζει τη διαμόρφωση της περιοχής των δακτύλων στις μπότες της
        στολής κατάδυσης, η οποία επηρεάζει την ισορροπία, την αίσθηση της σανίδας
        και τη θερμότητα.
    toe_coverage:
      name: Κάλυψη πέλματος
      description: Υποδεικνύει τον τύπο κάλυψης των δακτύλων που παρέχει η κάλτσα.
    toe_pick_style:
      name: Στυλ οδοντωτής άκρης
      description: Περιγράφει το σχέδιο της οδοντωτής άκρης στις λάμες καλλιτεχνικού
        πατινάζ.
    toe_protection_type:
      name: Τύπος προστασίας πέλματος
      description: Υποδεικνύει εάν και πώς ενισχύεται η περιοχή των δακτύλων για λόγους
        ασφαλείας (π.χ., ατσάλινο ή μαλακό προστατευτικό δακτύλων).
    toe_reinforcement_type:
      name: Τύπος ενίσχυσης πέλματος
      description: Περιγράφει την κατασκευή της περιοχής των δακτύλων, που επηρεάζει
        την ανθεκτικότητα και συμβατότητα των υποδημάτων.
    toe_stop_stem_thread_size:
      name: Μέγεθος σπειρώματος στελέχους φρένου toe stop
      description: Καθορίζει το μέγεθος σπειρώματος του στελέχους του φρένου toe stop
        ώστε να διασφαλίζεται η συμβατότητα με την πλάκα.
    tofu_preparation_style:
      name: Στυλ προετοιμασίας τόφου
      description: Κατηγοριοποιεί το παραδοσιακό στυλ ή τον υποτύπο του τόφου πέρα
        από τη σκληρότητα (π.χ., μεταξένιο, σε κύβο, αφρώδες, φύλλο τόφου, κόμπος
        τόφου, ζυμωμένο).
    tom_mount_adjustment_features:
      name: Χαρακτηριστικά ρύθμισης βάσης τομ
      description: Καθορίζει ποιες ρυθμίσεις παρέχει η βάση του τομ για την τοποθέτηση
        του τυμπάνου (π.χ. κλίση, περιστροφή, ύψος).
    tom_mount_components_included:
      name: Περιλαμβάνονται εξαρτήματα βάσης tom
      description: Καθορίζει ποια εξαρτήματα περιλαμβάνονται στη βάση του τομ (δέκτης,
        βραχίονας, μπίλια, σφιγκτήρες, κλειδαριές μνήμης κ.λπ.).
    tom_mount_mounting_position:
      name: Θέση τοποθέτησης βάσης τομ
      description: Καθορίζει πού προορίζεται να στερεωθεί η βάση του τομ (π.χ., τύμπανο
        μπάσου, βάση κυμβάλου, σύστημα στήριξης).
    tonneau_cover_mounting_style:
      name: Στυλ τοποθέτησης καλύμματος καρότσας
      description: Υποδεικνύει τον τρόπο τοποθέτησης/στερέωσης του καλύμματος καρότσας
        στις ράγες της καρότσας του φορτηγού.
    tool_case_form_factor:
      name: Μορφή θήκης εργαλείων
      description: Προσδιορίζει το φυσικό στυλ της θήκης εργαλείων, που επηρεάζει
        τη φορητότητα και την αποθήκευση (π.χ. βαλιτσάκι, σκληρό κέλυφος).
    tool_functions_included:
      name: Περιλαμβανόμενες λειτουργίες εργαλείων
      description: Παραθέτει τις συγκεκριμένες λειτουργίες επισκευής ή συντήρησης
        που μπορεί να εκτελέσει ένα πολυεργαλείο ή ένα σετ εργαλείων.
    top_bunk_access_method:
      name: Μέθοδος πρόσβασης στην επάνω κουκέτα
      description: Υποδεικνύει τον τρόπο με τον οποίο οι χρήστες φτάνουν στην επάνω
        κουκέτα του κρεβατιού, κάτι που συμβάλλει στην ασφάλεια και την εξοικονόμηση
        χώρου.
    top_fit:
      name: Εφαρμογή μπλούζας
      description: Καθορίζει τη συνολική γραμμή ή την εφαρμογή της μπλούζας στο σώμα
        (π.χ., στενή ή υπερμεγέθης).
    top_hat_style:
      name: Στυλ ψηλού καπέλου
      description: Προσδιορίζει τη συγκεκριμένη παραλλαγή στυλ ενός ψηλού καπέλου.
    top_soundboard_material:
      name: Υλικό καπακιού (ηχείου)
      description: Καθορίζει το υλικό του καπακιού/ηχείου της κιθάρας (της κύριας
        πλάκας παραγωγής ήχου).
    topping_form:
      name: Μορφή επικάλυψης
      description: Καθορίζει τη φυσική μορφή ή την υφή της επικάλυψης του γλυκού ώστε
        οι αγοραστές να εντοπίζουν γρήγορα την επιθυμητή εφαρμογή.
    topping_type:
      name: Τύπος επικάλυψης
      description: Υποδεικνύει την κύρια εξωτερική επικάλυψη ή επίστρωση που εφαρμόζεται
        στο ντόνατ.
    tow_hook_type:
      name: Τύπος γάντζου ρυμούλκησης
      description: Υποδεικνύει εάν η σανίδα για kneeboarding περιλαμβάνει ενσωματωμένο
        γάντζο ρυμούλκησης και καθορίζει το στυλ του μηχανισμού του.
    tow_point_configuration:
      name: Διαμόρφωση σημείου ρυμούλκησης
      description: Καθορίζει τη διαμόρφωση του σημείου ρυμούλκησης (μονό, διπλό, πολλαπλό)
        που προσφέρεται από τον σωλήνα ρυμούλκησης για διαφορετικές θέσεις ανάβασης.
    tow_strap_protective_features:
      name: Προστατευτικά χαρακτηριστικά ιμάντα ρυμούλκησης
      description: Αξιοσημείωτα χαρακτηριστικά κατασκευής για ασφάλεια και ανθεκτικότητα
        ενσωματωμένα στον ιμάντα ρυμούλκησης.
    tow_strap_type:
      name: Τύπος ιμάντα ρυμούλκησης
      description: Υποδεικνύει τη λειτουργική κατασκευή του ιμάντα ρυμούλκησης, όπως
        στατικός ιμάντας ρυμούλκησης ή κινητικός ιμάντας ανάκτησης.
    towable_tube_style:
      name: Στυλ σωλήνα ρυμούλκησης
      description: Προσδιορίζει τον γενικό σχεδιασμό ή τη μορφή του σωλήνα ρυμούλκησης,
        που υπαγορεύει τη θέση του αναβάτη και την εμπειρία χρήσης.
    towed_water_sport_discipline:
      name: Είδος θαλάσσιου σπορ με ρυμούλκηση
      description: Καθορίζει την κύρια δραστηριότητα με ρυμούλκηση στο νερό για την
        οποία έχει σχεδιαστεί το γάντι.
    towel_features:
      name: Χαρακτηριστικά πετσέτας
      description: Παραθέτει ειδικά χαρακτηριστικά ή πρόσθετα που περιλαμβάνονται
        σε μια πετσέτα.
    towel_style:
      name: Στυλ πετσέτας
      description: Ταξινομεί τον λειτουργικό σχεδιασμό ή τη μορφή της πετσέτας γκολφ.
    toy_airplane_control_type:
      name: Τύπος ελέγχου παιχνιδιού αεροπλάνου
      description: Καθορίζει τον τρόπο με τον οποίο ελέγχεται το παιχνίδι αεροπλάνο
        από τον χρήστη.
    toy_airplane_features:
      name: Χαρακτηριστικά παιχνιδιού αεροπλάνου
      description: Αναδεικνύει αξιοσημείωτα χαρακτηριστικά παιχνιδιού που υπάρχουν
        στο παιχνίδι αεροπλάνο.
    toy_airplane_flight_capability:
      name: Ικανότητα πτήσης παιχνιδιού αεροπλάνου
      description: Υποδεικνύει εάν το παιχνίδι αεροπλάνο έχει σχεδιαστεί για πραγματική
        πτήση/ολίσθηση ή προορίζεται κυρίως για παιχνίδι/επίδειξη στο έδαφος.
    toy_audio_features:
      name: Ηχητικά χαρακτηριστικά παιχνιδιού
      description: Εμφανίζει τις ηχητικές δυνατότητες και τα ηχητικά εφέ που είναι
        ενσωματωμένα στο παιχνίδι.
    toy_boat_play_features:
      name: Χαρακτηριστικά παιχνιδιού του παιχνιδιού βάρκας
      description: Αναδεικνύει αξιοσημείωτα διαδραστικά χαρακτηριστικά των παιχνιδιών
        βαρκών για ανακάλυψη και φιλτράρισμα.
    toy_boat_recommended_play_environment:
      name: Προτεινόμενο περιβάλλον παιχνιδιού για το παιχνίδι βάρκα
      description: Καθορίζει το προβλεπόμενο περιβάλλον παιχνιδιού για το παιχνίδι
        βάρκα για υποστήριξη των προσδοκιών και της ασφάλειας των αγοραστών (π.χ.
        μπανιέρα ή ανοιχτό νερό).
    toy_bowling_equipment_included:
      name: Περιλαμβανόμενος εξοπλισμός παιχνιδιού μπόουλινγκ
      description: Καθορίζει ποια εξαρτήματα μπόουλινγκ περιλαμβάνονται στο σετ παιχνιδιού
        μπόουλινγκ (π.χ. κορίνες, μπάλα, διάδρομος/χαλάκι, τσάντα μεταφοράς).
    toy_car_features:
      name: Χαρακτηριστικά παιχνιδιού αυτοκινήτου
      description: Αναδεικνύει τα χαρακτηριστικά παιχνιδιού που είναι ενσωματωμένα
        στο παιχνίδι αυτοκίνητο (ξεχωριστά από το σύστημα κίνησης), όπως φώτα, ήχοι
        ή ανοιγόμενα μέρη.
    toy_drawing_tablet_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ παιδικού tablet σχεδίασης
      description: Περιλαμβανόμενα πρόσθετα αξεσουάρ πέρα από την ίδια την ταμπλέτα
        (π.χ., πρόσθετη γραφίδα, σφραγίδες).
    toy_drawing_tablet_erase_method:
      name: Τρόπος σβησίματος στο παιχνίδι ταμπλέτα σχεδίασης
      description: Ο τρόπος με τον οποίο καθαρίζεται/σβήνεται η επιφάνεια σχεδίασης.
    toy_drawing_tablet_screen_type:
      name: Τύπος οθόνης παιχνιδιού ταμπλέτας σχεδίασης
      description: Ο τύπος της επιφάνειας σχεδίασης/οθόνης που χρησιμοποιείται (π.χ.,
        ταμπλέτα γραφής LCD ή μαγνητική).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Μέσο γραφής/σχεδίασης σε παιχνίδι ταμπλέτα σχεδίασης
      description: Κύριο εργαλείο που χρησιμοποιείται για σχεδίαση στην ταμπλέτα (τύπος
        γραφίδας).
    toy_figure_sound_feature:
      name: Ηχητικό χαρακτηριστικό φιγούρας παιχνιδιού
      description: Υποδεικνύει εάν η φιγούρα του ζώου παράγει ήχους και τι είδους
        (π.χ., βρυχηθμός, ρεαλιστικός ήχος ζώου).
    toy_game_features:
      name: Χαρακτηριστικά παιχνιδιού/ηλεκτρονικού παιχνιδιού
      description: Αναδεικνύει αξιοσημείωτα χαρακτηριστικά παιχνιδιού ή κατασκευής
        που σχετίζονται με παιχνίδια για την παραλία και την άμμο.
    toy_gift_basket_items_included:
      name: Περιλαμβάνονται είδη καλαθιού παιχνιδιού δώρων
      description: 'Παραθέτει τους κύριους τύπους παιχνιδιών που περιλαμβάνονται στο
        καλάθι δώρου (για παράδειγμα: λούτρινο παιχνίδι, σετ κατασκευών, παζλ).'
    toy_glider_launch_method:
      name: Μέθοδος εκτόξευσης παιχνιδιού ανεμόπτερου
      description: Καθορίζει τον τρόπο εκτόξευσης του παιχνιδιού ανεμοπλάνου, που
        επηρεάζει το στυλ παιχνιδιού και τις προσδοκίες των αγοραστών.
    toy_helicopter_control_type:
      name: Τύπος ελέγχου παιχνιδιού ελικοπτέρου
      description: Ο τρόπος με τον οποίο ελέγχεται/λειτουργεί το παιχνίδι ελικόπτερο
        (ανεξάρτητα από την πρόωση), όπως με τηλεχειριστήριο χειρός, έλεγχο μέσω εφαρμογής
        ή χωρίς έλεγχο (ελεύθερη πτήση).
    toy_helicopter_features:
      name: Χαρακτηριστικά παιχνιδιού ελικοπτέρου
      description: Βασικά λειτουργικά χαρακτηριστικά ενός παιχνιδιού ελικοπτέρου (ειδικά
        των μοντέλων RC) που επηρεάζουν τη χρηστικότητα και την αξία του παιχνιδιού.
    toy_jacks_set_items_included:
      name: Περιλαμβανόμενα είδη σετ παιχνιδιών jacks
      description: Καθορίζει ποια βασικά είδη περιλαμβάνονται στο σετ παιχνιδιών jacks
        (π.χ., jacks, μπάλα, τσάντα).
    toy_keyboard_learning_mode:
      name: Λειτουργία εκμάθησης παιχνιδιού πληκτρολογίου
      description: Υποδεικνύει την εκπαιδευτική/μαθησιακή προσέγγιση που υποστηρίζεται
        από το παιχνίδι πληκτρολόγιο (π.χ., φωτιζόμενα πλήκτρα, τραγούδια με καθοδήγηση,
        καθοδηγούμενα μαθήματα, εκμάθηση μέσω εφαρμογής).
    toy_keyboard_sound_theme:
      name: Ηχητικό θέμα παιχνιδιού πληκτρολογίου
      description: Τύποι ενσωματωμένων ήχων οργάνων/ηχητικών θεμάτων που προσφέρονται
        (πέρα από το απλό πιάνο).
    toy_kitchen_appliances_included:
      name: Περιλαμβανόμενες συσκευές παιχνιδιού κουζίνας
      description: Καθορίζει τη συσκευή ή τις συσκευές κουζίνας που αναπαριστώνται
        στο σετ παιχνιδιού όταν το προϊόν είναι μια συσκευή ή ένα σετ που εστιάζει
        σε συσκευές.
    toy_kitchen_assembly_requirement:
      name: Απαίτηση συναρμολόγησης παιχνιδιού κουζίνας
      description: Υποδεικνύει εάν απαιτείται συναρμολόγηση και την κατά προσέγγιση
        πολυπλοκότητα της συναρμολόγησης.
    toy_kitchen_interactive_features:
      name: Διαδραστικά χαρακτηριστικά παιχνιδιού κουζίνας
      description: Αναδεικνύει διαδραστικά στοιχεία που συναντώνται συνήθως σε παιχνίδια
        κουζίνες και σχετικά αξεσουάρ.
    toy_motorcycle_feature_set:
      name: Σύνολο χαρακτηριστικών παιχνιδιού μοτοσικλέτας
      description: Βασικά χαρακτηριστικά παιχνιδιού του παιχνιδιού μοτοσικλέτας (επιλέξτε
        όλα όσα ισχύουν).
    toy_motorcycle_scale:
      name: Κλίμακα παιχνιδιού μοτοσικλέτας
      description: Αναλογία κλίμακας για παιχνίδια/συλλεκτικές μοτοσικλέτες (π.χ.,
        1:12).
    toy_parachute_launch_method:
      name: Μέθοδος εκτόξευσης παιχνιδιού αλεξίπτωτου
      description: Τρόπος με τον οποίο προορίζεται να εκτοξεύεται/ανοίγει το παιχνίδι
        για πτήση.
    toy_piano_and_keyboard_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ παιχνιδιού πιάνου και πλήκτρων
      description: Περιλαμβανόμενα αξεσουάρ στο παιχνίδι πιάνο ή το παιχνίδι πλήκτρων.
    toy_playset_assembly_required:
      name: Απαιτείται συναρμολόγηση σετ παιχνιδιού
      description: Υποδεικνύει εάν απαιτείται συναρμολόγηση από ενήλικα πριν από το
        παιχνίδι (πέρα από το απλό κούμπωμα).
    toy_playset_items_included:
      name: Περιλαμβάνονται είδη σετ παιχνιδιού
      description: Παραθέτει τα κύρια εξαρτήματα που περιλαμβάνονται στο σετ παιχνιδιού
        (τι περιλαμβάνεται στη συσκευασία).
    toy_safety_certification:
      name: Πιστοποίηση ασφάλειας παιχνιδιού
      description: Πρότυπα/σήματα ασφάλειας και συμμόρφωσης που ισχύουν για τα παιχνίδια
        στην αγορά του αγοραστή (π.χ., EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Χαρακτηριστικά παιχνιδιού διαστημόπλοιου
      description: Υποδεικνύει κοινά διαδραστικά χαρακτηριστικά/χαρακτηριστικά παιχνιδιού
        που είναι ενσωματωμένα στο παιχνίδι διαστημόπλοιο.
    toy_spaceship_size_class:
      name: Κατηγορία μεγέθους παιχνιδιού διαστημόπλοιου
      description: Υποδεικνύει μια γενική κατηγορία μεγέθους για το παιχνίδι διαστημόπλοιο
        για γρήγορο φιλτράρισμα, ξεχωριστά από τις ακριβείς διαστάσεις (μήκος/πλάτος/ύψος)
        και όχι μια αριθμητική αναλογία κλίμακας μοντέλου (π.χ. 1:72).
    toy_tableware_pieces_included:
      name: Περιλαμβάνονται σετ παιχνιδιού με κουζινικά
      description: Καθορίζει ποια είδη παιχνιδιού σερβίτσιου περιλαμβάνονται (πιάτα,
        ποτήρια, μαχαιροπίρουνα, σκεύη σερβιρίσματος).
    toy_tool_electronic_features:
      name: Ηλεκτρονικά χαρακτηριστικά εργαλείου παιχνιδιού
      description: Περιγράφει διαδραστικές/ηλεκτρονικές λειτουργίες του εργαλείου
        παιχνιδιού (φώτα, ήχοι, περιστροφική κίνηση κ.λπ.).
    toy_tool_set_components_included:
      name: Περιλαμβάνονται είδη σετ εργαλείων παιχνιδιού
      description: Παραθέτει τα συγκεκριμένα είδη εργαλείων δημιουργικού παιχνιδιού
        ενίσχυσης της φαντασίας που περιλαμβάνονται στη συσκευασία (ειδικά για τα
        σετ εργαλείων).
    toy_train_scale:
      name: Κλίμακα σιδηροδρόμου παιχνιδιού
      description: Καθορίζει το πρότυπο κλίμακας του τρένου παιχνιδιού/μοντέλου (ή
        το μέγεθος συστήματος ράγας) για να διασφαλιστεί η συμβατότητα με υπάρχοντα
        τρένα και ράγες.
    toy_train_track_layout_type:
      name: Τύπος διάταξης ραγών τρένου παιχνιδιού
      description: Περιγράφει τη διάταξη/το σχήμα ραγών που περιλαμβάνονται στο σετ
        τρένου ή τη συσκευασία επέκτασης ραγών.
    toy_weapon_gadget_features:
      name: Χαρακτηριστικά παιχνιδιών όπλων και gadget
      description: Αναδεικνύει κοινά διαδραστικά και λειτουργικά χαρακτηριστικά που
        αφορούν ειδικά τα παιχνίδια όπλα και τα κατασκοπευτικά gadget.
    tpms_sensor_frequency_band:
      name: Ζώνη συχνοτήτων αισθητήρα TPMS
      description: Ζώνη ραδιοσυχνοτήτων που υποστηρίζεται από αξεσουάρ σχετιζόμενα
        με TPMS (όπου εφαρμόζεται).
    track_and_field_discipline:
      name: Άθλημα στίβου
      description: Προσδιορίζει το συγκεκριμένο αγώνισμα ή άθλημα για το οποίο προορίζεται
        το προϊόν (π.χ. σφαιροβολία, άλμα επί κοντώ, σπριντ).
    track_event_specialization:
      name: Εξειδίκευση αγωνίσματος στίβου
      description: Υποδεικνύει τον τύπο αγωνίσματος για το οποίο είναι βελτιστοποιημένο
        το παπούτσι με καρφιά.
    track_field_event_suitability:
      name: Καταλληλότητα για αγωνίσματα στίβου
      description: Προσδιορίζει το συγκεκριμένο αγώνισμα ή τα συγκεκριμένα αγωνίσματα
        στίβου για τα οποία προορίζεται το βοήθημα προπόνησης.
    track_set_special_features:
      name: Ειδικά χαρακτηριστικά σετ πίστας
      description: Αναδεικνύει αξιοσημείωτα χαρακτηριστικά παιχνιδιού που περιλαμβάνονται
        στο σετ πίστας πέρα από τη βασική πίστα και τα αυτοκίνητα.
    track_surface_compatibility:
      name: Συμβατότητα με επιφάνεια πίστας
      description: Υποδεικνύει την επιφάνεια ή τις επιφάνειες τρεξίματος για τις οποίες
        έχει σχεδιαστεί το καρφί ή το παπούτσι.
    tracking_aid_type:
      name: Τύπος βοηθήματος ευθυγράμμισης
      description: Υποδεικνύει εάν το καγιάκ περιλαμβάνει συσκευές που ενισχύουν τη
        διατήρηση πορείας σε ευθεία γραμμή.
    traction_pattern_type:
      name: Τύπος μοτίβου πρόσφυσης
      description: Περιγράφει το κύριο μοτίβο αυλακώσεων ή υφής της επιφάνειας που
        παρέχει πρόσφυση στο pad.
    trading_card_league:
      name: Διοργάνωση σχετική με τις κάρτες προς συλλογή
      description: Προσδιορίζει την αθλητική διοργάνωση που σχετίζεται με το σετ ή
        το θέμα των καρτών (όπου εφαρμόζεται).
    trailer_construction:
      name: Κατασκευή τρέιλερ
      description: Προσδιορίζει την κύρια κατασκευή του τρέιλερ για το πλαίσιο/αμάξωμα
        (π.χ., αλουμίνιο, χάλυβας ή μικτή κατασκευή).
    trailer_coupler_size:
      name: Μέγεθος συνδέσμου τρέιλερ
      description: Καθορίζει το μέγεθος της σφαίρας του συνδέσμου του τρέιλερ που
        απαιτείται για τη ρυμούλκηση.
    trailer_hitch_mounting_location_method:
      name: Θέση/μέθοδος τοποθέτησης κοτσαδόρου τρέιλερ
      description: Καθορίζει πού και πώς τοποθετείται ο κοτσαδόρος του τρέιλερ στο
        όχημα (π.χ., πίσω υποδοχή, μπροστινή υποδοχή, τοποθέτηση στο πλαίσιο, τοποθέτηση
        στον προφυλακτήρα, τοποθέτηση στην καρότσα).
    trailer_light_function:
      name: Λειτουργία φωτός τρέιλερ
      description: Κύρια λειτουργία/θέση του φωτός του τρέιλερ.
    trailer_suspension_type:
      name: Τύπος ανάρτησης ρυμουλκούμενου
      description: Καθορίζει τον τύπο του συστήματος ανάρτησης που χρησιμοποιείται
        στο τρέιλερ ποδηλάτου, όπως σπειροειδές ελατήριο ή ελατήριο φύλλου, για τη
        βελτίωση της άνεσης οδήγησης και της προστασίας του φορτίου.
    trailer_wiring_circuit:
      name: Κύκλωμα καλωδίωσης τρέιλερ
      description: Παραθέτει τα κυκλώματα/σήματα φωτισμού, πέδης και βοηθητικών στοιχείων
        που μεταφέρονται από την καλωδίωση του τρέιλερ (δηλαδή, ποιες γραμμές τροφοδοσίας/γείωσης
        και σημάτων υπάρχουν).
    trailer_wiring_connector_type:
      name: Τύπος συνδετήρα καλωδίωσης τρέιλερ
      description: Καθορίζει το πρότυπο βύσματος πλευράς τρέιλερ/πλευράς οχήματος
        που χρησιμοποιείται για τις πλεξούδες καλωδίωσης και τους αντάπτορες του τρέιλερ.
    train_whistle_intended_use:
      name: Προβλεπόμενη χρήση σφυρίχτρας τρένου
      description: Κύριο πλαίσιο προβλεπόμενης χρήσης για τη σφυρίχτρα.
    train_whistle_sound_character:
      name: Χαρακτήρας ήχου σφυρίχτρας τρένου
      description: Περιγράφει τον αντιληπτό τονικό χαρακτήρα του ήχου της σφυρίχτρας
        (ηχόχρωμα).
    trainer_mounting_type:
      name: Τύπος τοποθέτησης εξαρτήματος προπόνησης
      description: Περιγράφει τον τρόπο με τον οποίο συνδέεται το ποδήλατο με τον
        εξοπλισμό προπόνησης (π.χ., με τροχό ή άμεση μετάδοση).
    training_dummy_shape:
      name: Σχήμα ομοιώματος εκπαίδευσης
      description: Καθορίζει τον συνολικό σχεδιασμό ή τη μορφή του ομοιώματος, που
        επηρεάζει το κράτημα του σκύλου και τον ρεαλισμό της εκπαίδευσης.
    training_focus:
      name: Εστίαση προπόνησης
      description: Περιγράφει τον κύριο τομέα δεξιοτήτων στον οποίο στοχεύει το βοήθημα
        (π.χ. αντανακλαστικά, κινητικότητα ποδιών, συντονισμός χεριού-ματιού).
    training_focus_area:
      name: Τομέας εστίασης προπόνησης
      description: Καθορίζει την κύρια δεξιότητα λακρός για την ανάπτυξη της οποίας
        έχει σχεδιαστεί το βοήθημα.
    training_objective:
      name: Στόχος προπόνησης
      description: Καθορίζει την κύρια δεξιότητα ή τεχνική για τη βελτίωση της οποίας
        έχει σχεδιαστεί το προϊόν.
    training_surface_suitability:
      name: Καταλληλότητα επιφάνειας προπόνησης
      description: Καθορίζει σε ποιες επιφάνειες μπορεί να χρησιμοποιηθεί ο εξοπλισμός
        προπόνησης.
    training_surface_usage:
      name: Χρήση επιφάνειας προπόνησης
      description: Καθορίζει τις κύριες δραστηριότητες που υποστηρίζει η επιφάνεια
        προπόνησης, διακρίνοντας τα πάνελ συνθετικού πάγου για πατινάζ από τα στρώματα
        για στεγνό έδαφος ή για πολλαπλά αθλήματα.
    training_usage_type:
      name: Τύπος χρήσης προπόνησης
      description: Καθορίζει την κύρια προβλεπόμενη περίοδο χρήσης ή το πλαίσιο για
        το παντελόνι προπόνησης, όπως προπόνηση κατά τη διάρκεια της ημέρας ή της
        νύχτας.
    trampoline_enclosure_type:
      name: Τύπος περίφραξης τραμπολίνου
      description: Καθορίζει τη διαμόρφωση της περίφραξης που χρησιμοποιείται στο
        τραμπολίνο, συμπεριλαμβανομένου του τρόπου/σημείου τοποθέτησης του διχτυού.
    trampoline_safety_certifications:
      name: Πιστοποιήσεις ασφαλείας τραμπολίνου
      description: Υποδεικνύει με ποια πρότυπα/πιστοποιήσεις ασφαλείας σχετικά με
        τραμπολίνα ισχυρίζεται ότι συμμορφώνεται το προϊόν.
    transfer_application_method:
      name: Μέθοδος εφαρμογής μεταφοράς
      description: Καθορίζει τον τρόπο εφαρμογής του transfer στο ύφασμα (π.χ., με
        σιδέρωμα ή θερμική πρέσα).
    transfer_method:
      name: Μέθοδος μεταφοράς
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να μεταφερθεί το σχέδιο
        σε ύφασμα.
    transfer_peel_temperature:
      name: Θερμοκρασία για αφαίρεση transfer
      description: Καθορίζει τη συνιστώμενη θερμοκρασία (καυτή, θερμή ή κρύα) στην
        οποία πρέπει να αφαιρεθεί το φύλλο μεταφοράς μετά το πάτημα.
    transmission_cooler_construction:
      name: Κατασκευή ψύκτη μετάδοσης
      description: Καθορίζει τον σχεδιασμό κατασκευής του πυρήνα ενός ψύκτη μετάδοσης.
    transmission_fluid_specification:
      name: Προδιαγραφές υγρού μετάδοσης
      description: Πρότυπο OEM/προδιαγραφών που πληροί το υγρό μετάδοσης (π.χ., οικογένειες
        Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Υλικό δακτυλίου βάσης μετάδοσης
      description: Καθορίζει το υλικό ελαστομερούς ή αποζεύκτη που χρησιμοποιείται
        στον δακτύλιο/αποζεύκτη της βάσης (το στοιχείο απόσβεσης κραδασμών).
    transmission_mount_type:
      name: Τύπος βάσης μετάδοσης
      description: Καθορίζει την κατασκευή/τον σχεδιασμό μιας βάσης μετάδοσης (π.χ.,
        υδραυλική ή συμπαγής) για τον προσδιορισμό της εφαρμογής, των χαρακτηριστικών
        NVH και της προβλεπόμενης χρήσης.
    transparency_level:
      name: Επίπεδο διαφάνειας
      description: Περιγράφει πόσο διαφανή είναι τα τοιχώματα των κουτιών αποθήκευσης,
        βοηθώντας τους αγοραστές να αποφασίσουν μεταξύ αποθήκευσης με ορατότητα και
        κρυφής αποθήκευσης.
    transport_case_type:
      name: Τύπος θήκης μεταφοράς
      description: Ταξινομεί το δομικό στυλ/την ακαμψία της λύσης μεταφοράς, αντικατοπτρίζοντας
        το επίπεδο προστασίας και τη μέθοδο συσκευασίας.
    transposition_modes:
      name: Τρόποι μεταφοράς
      description: Καθορίζει τους τρόπους μεταφοράς/τονικού ύψους συναυλίας που υποστηρίζει
        ο δέκτης (π.χ., τονικό ύψος συναυλίας και πλήκτρα μεταφοράς όπως Σι♭ ή Μι♭).
    trap_design:
      name: Σχεδίαση παγίδας
      description: Προσδιορίζει το δομικό στυλ ή τον μηχανισμό της παγίδας, κάτι που
        καθορίζει τη μέθοδο ενεργοποίησης και το είδος ή το περιβάλλον για τα οποία
        είναι καταλληλότερη.
    trap_spring_configuration:
      name: Διαμόρφωση ελατηρίων παγίδας
      description: Υποδεικνύει τον αριθμό ή τη διάταξη των ελατηρίων που ενεργοποιούν
        την παγίδα, κάτι που επηρεάζει την αντοχή και τη νομιμότητα.
    travel_bassinet_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ κούνιας ταξιδιού
      description: Παραθέτει τα συμπληρωματικά αντικείμενα που παρέχονται μαζί με
        την κούνια ταξιδιού.
    travel_spinning_wheel_assembly_required:
      name: Απαιτείται συναρμολόγηση τροχού γνεσίματος ταξιδιού
      description: Εάν ο τροχός απαιτεί συναρμολόγηση/εγκατάσταση πέρα από το ξεδίπλωμα
        (π.χ., σύνδεση προγνέστριας, τάνυση, πεντάλ) πριν από τη χρήση.
    travel_spinning_wheel_portability_features:
      name: Χαρακτηριστικά φορητότητας τροχού γνεσίματος ταξιδιού
      description: Στοιχεία σχεδιασμού που σχετίζονται με τη φορητότητα για τροχούς
        γνεσίματος ταξιδιού, όπως αναδιπλούμενη κατασκευή και ενσωματωμένες λύσεις
        μεταφοράς.
    travel_trailer_appliances_fuel_type:
      name: Τύπος καυσίμου συσκευών τροχόσπιτου ταξιδιού
      description: Κύριο καύσιμο που χρησιμοποιείται για ενσωματωμένες συσκευές/θέρμανση/μαγείρεμα
        (όχι για το όχημα ρυμούλκησης).
    travel_trailer_holding_tank_type:
      name: Τύπος δεξαμενών αποθήκευσης στο τροχόσπιτο ταξιδιού
      description: Υποδεικνύει ποιες δεξαμενές αποθήκευσης υπάρχουν στο τροχόσπιτο
        ταξιδιού (επιλέξτε όλα όσα ισχύουν).
    travel_trailer_power_hookup_shore_power:
      name: Σύνδεση ηλεκτροδότησης τροχόσπιτου ταξιδιού (ηλεκτροδότηση από ξηράς)
      description: Υποστηριζόμενα πρότυπα ηλεκτρικής σύνδεσης για συνδέσεις ηλεκτροδότησης
        από ξηράς.
    tread_pattern_type:
      name: Τύπος σχεδίου πέλματος
      description: Ταξινομεί τον συνολικό σχεδιασμό του πέλματος του ελαστικού, όπως
        λείο, ημι-λείο ή με εξογκώματα, κάτι που επηρεάζει την πρόσφυση, την αντίσταση
        κύλισης και την προβλεπόμενη επιφάνεια.
    treadmill_key_type:
      name: Τύπος κλειδιού για διάδρομο
      description: Περιγράφει το φυσικό στυλ ή τον μηχανισμό λειτουργίας/σύνδεσης
        του κλειδιού ασφαλείας (π.χ., μαγνητικό στρογγυλό, πλαστικό ένθετο, κουμπωτό).
    treadmill_part_type:
      name: Τύπος εξαρτήματος διαδρόμου
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα του διαδρόμου που προορίζεται
        να αντικατασταθεί από το προϊόν, ώστε οι αγοραστές να μπορούν να επιβεβαιώσουν
        γρήγορα την εφαρμογή (π.χ., ιμάντας ή κινητήρας).
    treadmill_position:
      name: Θέση στον διάδρομο
      description: Δηλώνει τη θέση εγκατάστασης του εξαρτήματος στον διάδρομο (εμπρός,
        πίσω, πάνω, κάτω, κέντρο).
    triangle_striker_material:
      name: Υλικό μπαγκέτας τριγώνου
      description: Υλικό της περιλαμβανόμενης μπαγκέτας.
    trigger_input_connector:
      name: Σύνδεσμος εισόδου trigger
      description: Καθορίζει το φυσικό πρότυπο συνδέσμου που χρησιμοποιείται για τις
        εισόδους ενεργοποίησης.
    trigger_input_connector_type:
      name: Τύπος συνδέσμου εισόδου ενεργοποίησης
      description: Καθορίζει τον τύπο φυσικού συνδέσμου που χρησιμοποιείται για τις
        εισόδους των trigger.
    trigger_input_zone_support:
      name: Υποστήριξη ζώνης εισόδου trigger
      description: Υποδεικνύει εάν οι είσοδοι των trigger υποστηρίζουν trigger μίας
        ζώνης ή/και διπλής ζώνης (π.χ. κεφαλή/στεφάνι) και παρόμοιες εφαρμογές πολλαπλών
        ζωνών.
    trim_application_method:
      name: Μέθοδος εφαρμογής διακοσμητικού τελειώματος
      description: Υποδεικνύει τον τρόπο με τον οποίο η τρέσα προορίζεται να στερεωθεί
        σε ένα έργο (π.χ., με ράψιμο, με σιδέρωμα, με κόλλα).
    trim_detail:
      name: Λεπτομέρειες τρέσας
      description: Προσδιορίζει εμφανή διακοσμητικά άκρα ή φινιρίσματα στο ένδυμα
        (π.χ. τρέσα με φούντες, κρόσσια, τρέσα με διακοσμητική δαντέλα).
    trim_elasticity:
      name: Ελαστικότητα τρέσας
      description: Υποδεικνύει εάν η διακοσμητική τρέσα ζιγκ-ζαγκ έχει ελαστικότητα
        για χρήση σε πλεκτά/αθλητικά ενδύματα.
    trim_finish:
      name: Διακοσμητικό φινίρισμα
      description: Επεξεργασία επιφανειακού φινιρίσματος που έχει εφαρμοστεί στην
        τρέσα (π.χ. μεταλλική, με γκλίτερ, ανακλαστική).
    trim_tilt_type:
      name: Τύπος διαγωγής και κλίσης
      description: Εάν και πώς ο κινητήρας υποστηρίζει ρύθμιση διαγωγής/κλίσης.
    trolleybus_power_supply_type:
      name: Τύπος τροφοδοτικού τρόλεϊ
      description: Καθορίζει τον τρόπο με τον οποίο το τρόλεϊ λαμβάνει ισχύ έλξης
        από το ηλεκτρικό δίκτυο.
    truck_bed_body_type:
      name: Τύπος καρότσας/αμαξώματος φορτηγού
      description: Διαμόρφωση της καρότσας φορτίου ή του αμαξώματος πίσω από την καμπίνα.
    truck_bed_length_class:
      name: Κατηγορία μήκους καρότσας φορτηγού
      description: Υποδεικνύει την κατηγορία μήκους της καρότσας φορτηγού για την
        οποία έχει σχεδιαστεί το δίχτυ φορτίου (συνήθως αναφέρεται ως κοντή/τυπική/μακριά
        καρότσα).
    truck_mounting_hole_pattern:
      name: Μοτίβο οπών στερέωσης αξόνων
      description: Καθορίζει τη διάταξη των οπών που χρησιμοποιείται για τη στερέωση
        των αξόνων στη σανίδα (π.χ., παλαιού τύπου, νέου τύπου, καθολική).
    truck_mounting_style:
      name: Στυλ στήριξης φορτηγού
      description: Πώς στερεώνονται οι άξονες στη σανίδα (επάνω στήριξη, μέσα από
        τη σανίδα, κ.λπ.), κάτι που επηρεάζει το ύψος οδήγησης και τη σταθερότητα.
    truck_profile:
      name: Προφίλ άξονα
      description: Υποδεικνύει την κατηγορία ύψους του άξονα του σκέιτμπορντ σε σχέση
        με τη σανίδα, κάτι που επηρεάζει την απόσταση των τροχών και την αίσθηση της
        σανίδας.
    trumpet_bell_material:
      name: Υλικό καμπάνας τρομπέτας
      description: Υλικό που χρησιμοποιείται για το τμήμα της καμπάνας (μερικές φορές
        διαφέρει από το υπόλοιπο όργανο).
    trumpet_leadpipe_material:
      name: Υλικό σωλήνα εισαγωγής τρομπέτας
      description: Υλικό ή επεξεργασία που χρησιμοποιείται για τον κύριο σωλήνα (κύριος
        σωλήνας από το επιστόμιο έως τις βαλβίδες).
    trundle_mechanism:
      name: Μηχανισμός συρόμενου κρεβατιού
      description: Περιγράφει τον τρόπο με τον οποίο αναπτύσσεται το δευτερεύον τμήμα
        του κρεβατιού από το κύριο πλαίσιο.
    trunk_part_type:
      name: Τύπος εξαρτήματος πορτμπαγκάζ
      description: Καθορίζει ποιο εξάρτημα του αμαξώματος που σχετίζεται με το πορτμπαγκάζ
        πωλείται (π.χ. καπό πορτμπαγκάζ, μεντεσές, μάνταλο).
    tuba_leadpipe_material:
      name: Υλικό κύριου σωλήνα τούμπας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για το τμήμα του κύριου
        σωλήνα (επιστόμιο) της τούμπας.
    tube_base_type:
      name: Βασικός τύπος σωλήνα
      description: Καθορίζει τον τύπο βάσης/υποδοχής της λυχνίας που χρησιμοποιείται
        για φυσική/ηλεκτρική εφαρμογή (π.χ., Octal, Noval/9-pin).
    tube_matching_grade:
      name: Βαθμός αντιστοίχισης λυχνιών
      description: Υποδεικνύει εάν οι λυχνίες έχουν δοκιμαστεί/αντιστοιχιστεί ως σετ
        και τον τύπο της παρεχόμενης αντιστοίχισης.
    tube_weight_category:
      name: Κατηγορία βάρους σωλήνα
      description: Ταξινομεί τη σαμπρέλα βάσει κατασκευής/βάρους (π.χ. εξαιρετικά
        ελαφριά, τυποποιημένη, βαρέος τύπου) για γρήγορη σύγκριση της αντοχής έναντι
        της απόδοσης.
    tubeless_compatible:
      name: Συμβατότητα για χρήση χωρίς σαμπρέλα
      description: Υποδεικνύει εάν ο τροχός έχει σχεδιαστεί για χρήση χωρίς εσωτερική
        σαμπρέλα όταν συνδυάζεται με ελαστικά χωρίς σαμπρέλα.
    tubing_shape:
      name: Σχήμα σωλήνων
      description: Καθορίζει το σχήμα διατομής των σωλήνων στήριξης της βάσης.
    tubular_construction_type:
      name: Τύπος σωληνωτής κατασκευής
      description: Καθορίζει το στυλ κατασκευής των σωληνοειδών ελαστικών ποδηλάτου,
        με διάκριση μεταξύ των παραδοσιακών κολλημένων σωληνοειδών και των νεότερων
        παραλλαγών.
    tulip_type_flower_form:
      name: Τύπος τουλίπας (μορφή λουλουδιού)
      description: Καθορίζει τον κηπευτικό τύπο/τη μορφή λουλουδιού των τουλιπών στο
        μπουκέτο (π.χ., μονή, διπλή, παπαγάλος).
    tuner_input_method:
      name: Μέθοδος εισόδου κουρδιστηριού
      description: Καθορίζει τον τρόπο με τον οποίο το κουρδιστήρι ανιχνεύει το τονικό
        ύψος (μικρόφωνο, αισθητήρας δονήσεων/κλιπ, είσοδος καλωδίου οργάνου, αισθητήρας
        επαφής).
    tuning_mechanism:
      name: Μηχανισμός κουρδίσματος
      description: Πώς τεντώνονται/κουρδίζονται οι κεφαλές των μπόνγκο.
    tuning_system:
      name: Σύστημα κουρδίσματος
      description: Πώς κουρδίζεται το τύμπανο ή αν διαθέτει δυνατότητα κουρδίσματος.
    turn_signal_lens_color:
      name: Χρώμα φακού φλας
      description: Χρώμα του ορατού φακού/καλύμματος στο περίβλημα του φλας (όχι χρώμα
        εκπεμπόμενου φωτός).
    turn_signal_lighting_style:
      name: Στυλ φωτισμού φλας
      description: Το στυλ/η κίνηση οπτικής σηματοδότησης που παρέχεται από το φλας.
    turnip_and_rutabaga_variety:
      name: Ποικιλία γογγυλιού και γουλιού
      description: Προσδιορίζει τη συγκεκριμένη καλλιέργεια ή ποικιλία του γογγυλιού
        ή του γουλιού.
    tweeter_crossover_type:
      name: Τύπος crossover tweeter
      description: Υποδεικνύει τον τύπο υψιπερατού crossover ή/και του εξαρτήματος
        προστασίας που περιλαμβάνεται στο tweeter, εάν υπάρχει.
    tweeter_material:
      name: Υλικό tweeter
      description: Κύριο υλικό διαφράγματος/θόλου του tweeter.
    tweeter_mount_type:
      name: Τύπος βάσης tweeter
      description: Καθορίζει τον τρόπο με τον οποίο προορίζεται να εγκατασταθεί το
        tweeter στο όχημα (μέθοδος τοποθέτησης/υλικός εξοπλισμός).
    twill_direction:
      name: Κατεύθυνση twill
      description: Υποδεικνύει την κατεύθυνση της γραμμής twill μιας ύφανσης τζιν.
    twist_direction:
      name: Κατεύθυνση περιστροφής
      description: Κατεύθυνση περιστροφής των κλώνων που χρησιμοποιείται στο νήμα/στην
        κλωστή (περιστροφή S ή περιστροφή Z).
    u_joint_series_size:
      name: Σειρά/μέγεθος σταυρού
      description: Καθορίζει το πρότυπο σειράς ή μεγέθους του σταυρού που χρησιμοποιείται
        (π.χ., σειρά 1310).
    uilleann_pipes_bag_material:
      name: Υλικό ασκού ιρλανδικής γκάιντας
      description: Υλικό του εξαρτήματος του ασκού αέρα (εάν περιλαμβάνεται), το οποίο
        επηρεάζει την αίσθηση, την ανθεκτικότητα και τη συντήρηση.
    uilleann_pipes_handedness:
      name: Χρήση χεριού σε ιρλανδική γκάιντα
      description: Υποδεικνύει εάν το σετ έχει διαμορφωθεί για διάταξη παιξίματος
        με το δεξί ή με το αριστερό χέρι.
    uilleann_pipes_set_configuration:
      name: Διαμόρφωση σετ ιρλανδικής γκάιντας
      description: Καθορίζει ποια διαμόρφωση ιρλανδικής γκάιντας περιλαμβάνεται, με
        βάση την παρουσία ρυθμιστών και ισοκρατημάτων.
    uk_childrens_shoe_size:
      name: Βρετανικό μέγεθος παιδικών παπουτσιών
      description: Καθορίζει το βρετανικό μέγεθος παπουτσιού για παιδιά, όπως 4 ή
        4 Wide
    uk_clothing_size:
      name: Βρετανικά μεγέθη ένδυσης
      description: Καθορίζει το βρετανικό μέγεθος ένδυσης, όπως 12 ή 18.
    uk_cup_size:
      name: Βρετανικό μέγεθος cup
      description: Καθορίζει το βρετανικό μέγεθος cup σουτιέν, όπως C ή FF
    uk_mens_shoe_size:
      name: Βρετανικό μέγεθος ανδρικών παπουτσιών
      description: Καθορίζει το βρετανικό μέγεθος ανδρικών παπουτσιών, όπως 9 ή 9
        Wide
    uk_womens_shoe_size:
      name: Βρετανικό μέγεθος γυναικείων παπουτσιών
      description: Καθορίζει το βρετανικό μέγεθος γυναικείων παπουτσιών, όπως 6 ή
        6 Wide
    ukulele_back_and_sides_wood:
      name: Ξύλο πίσω μέρους και πλαϊνών ουκουλέλε
      description: Προσδιορίζει το ξύλο/υλικό που χρησιμοποιείται για το πίσω μέρος
        και τα πλαϊνά του ουκουλέλε.
    ukulele_body_cutaway:
      name: Κόψιμο στο σώμα του ουκουλέλε
      description: Υποδεικνύει εάν υπάρχει κόψιμο στο σώμα του ουκουλέλε συναυλίας
        για ευκολότερη πρόσβαση στο άνω τάστο.
    ukulele_body_shape:
      name: Σχήμα σώματος ουκουλέλε
      description: Γενικό στυλ/σχήμα σώματος που χρησιμοποιείται για το ουκουλέλε.
    ukulele_bridge_material:
      name: Υλικό γέφυρας ουκουλέλε
      description: Καθορίζει το υλικό που χρησιμοποιείται για τη γέφυρα του ουκουλέλε.
    ukulele_construction_type:
      name: Τύπος κατασκευής γιουκαλίλι
      description: Πώς είναι κατασκευασμένα τα επάνω/πίσω/πλαϊνά μέρη του οργάνου
        (συμπαγή ή πολλαπλών στρωμάτων).
    ukulele_electronics_configuration:
      name: Διαμόρφωση ηλεκτρονικών του ουκουλέλε
      description: Υποδεικνύει εάν το ουκουλέλε είναι μόνο ακουστικό ή περιλαμβάνει
        ενσωματωμένα ηλεκτρονικά (μαγνήτη ή/και προενισχυτή) για ενίσχυση.
    ukulele_string_re_entrant_tuning:
      name: Μη γραμμικό κούρδισμα χορδών χορδών ουκουλέλε
      description: Εάν το ουκουλέλε είναι ρυθμισμένο με μη γραμμικό κούρδισμα (high-G)
        ή γραμμικό/low-G, κοινή προτίμηση αγοραστών και επηρεάζει τον ήχο.
    ukulele_top_wood:
      name: Ξύλο καπακιού ουκουλέλε
      description: Προσδιορίζει το ξύλο/υλικό που χρησιμοποιείται για το καπάκι/ηχείο
        του ουκουλέλε.
    ukulele_tuner_mechanism:
      name: Μηχανισμός κουρδιστηριού ουκουλέλε
      description: Καθορίζει το στυλ/τον μηχανισμό κουρδιστηριού που χρησιμοποιείται
        στο ουκουλέλε.
    ukulele_tuner_type:
      name: Τύπος κουρδιστηριού ουκουλέλε
      description: Στυλ μηχανισμού κουρδίσματος που χρησιμοποιείται στην κεφαλή του
        ουκουλέλε.
    ukulele_tuning:
      name: Κούρδισμα ουκουλέλε
      description: Καθορίζει το προβλεπόμενο βασικό κούρδισμα για το ουκουλέλε τσέπης.
    ultralight_aircraft_wing_configuration:
      name: Διαμόρφωση υπερελαφριάς πτέρυγας αεροσκάφους
      description: Θέση και διαμόρφωση της κύριας πτέρυγας σε σχέση με την άτρακτο/κατασκευή.
    under_bed_features:
      name: Χαρακτηριστικά κάτω μέρους κρεβατιού
      description: Προσδιορίζει το κύριο λειτουργικό στοιχείο που βρίσκεται κάτω από
        την πλατφόρμα του κρεβατιού.
    underfoot_strap_type:
      name: Τύπος ιμάντα κάτω από το πέλμα
      description: Προσδιορίζει το υλικό ή το σχέδιο που χρησιμοποιείται για τον ιμάντα
        που περνά κάτω από το υπόδημα.
    underwear_fit:
      name: Γραμμή εφαρμογής εσώρουχου
      description: Υποδεικνύει τη γενική γραμμή εφαρμογής του σλιπ τύπου μποξέρ (π.χ.,
        στενή, άνετη, συμπίεσης).
    underwear_pieces_included:
      name: Περιλαμβάνονται είδη εσωρούχων
      description: Προσδιορίζει ποια κομμάτια του ενδύματος παρέχονται (επάνω μέρος,
        κάτω μέρος, και τα δύο ή ολόσωμη φόρμα), ώστε οι πελάτες να γνωρίζουν εάν
        αγοράζουν ένα πλήρες σετ ή ένα μεμονωμένο κομμάτι.
    uniform_pieces_included:
      name: Περιλαμβανόμενα μέρη στολής
      description: Προσδιορίζει ποια μέρη του ενδύματος παρέχονται (π.χ., πουκάμισο,
        παντελόνι, γιλέκο), διευκρινίζοντας το περιεχόμενο του σετ για χονδρικές αγορές
        ή αγορές σετ.
    uniform_role:
      name: Ρόλος στολής
      description: Καθορίζει τον επαγγελματικό ρόλο ή την υπηρεσία για την οποία προορίζεται
        το είδος της στολής (π.χ., αστυνομία, σερίφης, ιατρικές υπηρεσίες έκτακτης
        ανάγκης).
    update_method:
      name: Μέθοδος ενημέρωσης
      description: Πώς πραγματοποιούνται οι ενημερώσεις υλικολογισμικού/λογισμικού
        για τον σαρωτή.
    upholstery_fabric_backing_type:
      name: Τύπος υποστρώματος υφάσματος ταπετσαρίας
      description: Καθορίζει το υπόστρωμα/την επένδυση στο ύφασμα της ταπετσαρίας
        που επηρεάζει την τοποθέτηση και την αίσθηση.
    upholstery_fabric_water_resistance:
      name: Αντοχή υφάσματος ταπετσαρίας στο νερό
      description: Υποδεικνύει την αντοχή της επιφάνειας του υφάσματος ταπετσαρίας
        στο νερό και στους λεκέδες από υγρά.
    upper_material:
      name: Υλικό επάνω μέρους
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται στο επάνω μέρος του
        sneaker, το οποίο επηρεάζει τη διαπνοή, την ανθεκτικότητα και την αισθητική.
    upright_bass_pickup_system:
      name: Σύστημα μαγνήτη κοντραμπάσου
      description: Υποδεικνύει εάν το κοντραμπάσο περιλαμβάνει εγκατεστημένο σύστημα
        μαγνήτη/προενισχυτή που προορίζεται για ενίσχυση.
    upright_piano_power_source:
      name: Πηγή τροφοδοσίας όρθιου πιάνου
      description: Τρόπος τροφοδοσίας όρθιου πιάνου, που ισχύει τόσο για ακουστικά
        όρθια πιάνα χωρίς ρεύμα όσο και για όρθια πιάνα με αθόρυβα/υβριδικά συστήματα
        που απαιτούν ηλεκτρικό ρεύμα.
    urination_device_features:
      name: Χαρακτηριστικά συσκευής ούρησης
      description: Αναδεικνύει ειδικά χαρακτηριστικά σχεδιασμού που βελτιώνουν τη
        λειτουργικότητα ή την ευκολία.
    us_childrens_shoe_size:
      name: Αμερικανικό μέγεθος παιδικών παπουτσιών
      description: Καθορίζει το αμερικανικό μέγεθος παπουτσιού για παιδιά, όπως 5
        ή 5 Wide
    us_clothing_size:
      name: Αμερικανικά μεγέθη ένδυσης
      description: Καθορίζει το αμερικανικό μέγεθος ένδυσης, όπως 8 ή 14.
    us_cup_size:
      name: Αμερικανικό μέγεθος cup
      description: Καθορίζει το αμερικανικό μέγεθος cup σουτιέν, όπως C ή DDD
    us_mens_shoe_size:
      name: Αμερικανικό μέγεθος ανδρικών παπουτσιών
      description: Καθορίζει το αμερικανικό μέγεθος ανδρικών παπουτσιών, όπως 10 ή
        10 Wide
    us_ring_size:
      name: Αμερικανικό μέγεθος δαχτυλιδιών
      description: Καθορίζει το αμερικανικό μέγεθος δαχτυλιδιών, όπως 7 ή 9,5.
    us_womens_shoe_size:
      name: Αμερικανικό μέγεθος γυναικείων παπουτσιών
      description: Καθορίζει το αμερικανικό μέγεθος γυναικείων παπουτσιών, όπως 8
        ή 8 Wide
    usage:
      name: Χρήση
      description: Περιγράφει την προβλεπόμενη χρήση/ρύθμιση του εκκεντροφόρου.
    usda_honey_grade:
      name: Ποιότητα μελιού βάσει USDA
      description: Υποδεικνύει τον επίσημο βαθμό ποιότητας που έχει αποδοθεί στο μέλι
        από το Υπουργείο Γεωργίας των ΗΠΑ (USDA).
    user_control_method:
      name: Μέθοδος ελέγχου χρήστη
      description: Υποδεικνύει τον τρόπο με τον οποίο ο χρήστης αλληλεπιδρά με το
        μηχάνημα (π.χ., ενσωματωμένος πίνακας ελέγχου, τηλεχειριστήριο, εφαρμογή,
        φωνή), παρέχοντας πληροφορίες για ζητήματα ευκολίας χρήσης.
    vacuum_boost_reference_port:
      name: Θύρα αναφοράς κενού/ενίσχυσης
      description: Υποδεικνύει εάν ο ρυθμιστής περιλαμβάνει θύρα αναφοράς πολλαπλής
        για κενό/ενίσχυση και τι είδους είναι.
    valve_base_shape:
      name: Σχήμα βάσης βαλβίδας
      description: Προσδιορίζει τη γεωμετρία της διεπαφής μεταξύ της βάσης της βαλβίδας
        και της στεφάνης (στρογγυλή, κωνική, πλευρική, σχήματος Τ, κ.λπ.) που επηρεάζει
        τη σφράγιση και τη συμβατότητα με το ένθετο αφρού.
    valve_core_type:
      name: Τύπος πυρήνα βαλβίδας
      description: Υποδεικνύει εάν ο πυρήνας της βαλβίδας είναι αφαιρούμενος, σταθερός
        ή αν δεν υπάρχει πυρήνας, πληροφορίες που επηρεάζουν τις διαδικασίες συντήρησης
        και τη συμβατότητα με τα εργαλεία έγχυσης στεγανοποιητικού υλικού.
    valve_cover_gasket_material:
      name: Υλικό παρεμβύσματος καλύμματος βαλβίδας
      description: Καθορίζει το υλικό του παρεμβύσματος του καλύμματος της βαλβίδας
        που περιλαμβάνεται στο κάλυμμα της βαλβίδας ή το συνιστώμενο υλικό παρεμβύσματος
        όταν πωλείται χωρίς παρέμβυσμα (εάν ισχύει).
    valve_cover_material:
      name: Υλικό καλύμματος βαλβίδας
      description: Κύριο υλικό κατασκευής του καλύμματος της βαλβίδας.
    valve_design:
      name: Σχεδιασμός βαλβίδας
      description: Προσδιορίζει την κατασκευή/τον σχεδιασμό της βαλβίδας του κινητήρα.
    valve_guard_coverage_area:
      name: Περιοχή κάλυψης προστατευτικού βαλβίδας
      description: Υποδεικνύει ποια μέρη του τμήματος της βαλβίδας προστατεύει το
        προστατευτικό.
    valvetrain_configuration:
      name: Διαμόρφωση βαλβιδομηχανισμού
      description: Καθορίζει τη διάταξη του εκκέντρου/βαλβιδομηχανισμού.
    varnish_formulation_base:
      name: Βάση σύνθεσης βερνικιού
      description: Καθορίζει την κύρια σύνθεση/χημική σύσταση του βερνικιού έγχορδων
        οργάνων, η οποία επηρεάζει την εμφάνιση, την αναστρεψιμότητα και τη συμβατότητα
        με υπάρχοντα φινιρίσματα.
    varnish_transparency_tint:
      name: Διαφάνεια/χρώμα βερνικιού
      description: Περιγράφει εάν το βερνίκι είναι διαφανές ή με χρώμα και, εάν είναι
        με χρώμα, τη γενική κατηγορία χρώματος.
    vegetable_matter_vm_content:
      name: Περιεκτικότητα σε φυτική ύλη (VM)
      description: Ποσότητα φυτικών υπολειμμάτων/ακαθαρσιών που υπάρχουν στην ίνα.
    vegetable_preparation_style:
      name: Τρόπος προετοιμασίας λαχανικών
      description: Περιγράφει τον τρόπο παρουσίασης, κοπής ή άλλης προετοιμασίας του
        λαχανικού πριν από την πώληση (π.χ. ολόκληρο, σε κύβους, σε φούντες).
    vehicle_audio_dsp_form_factor:
      name: Μορφή DSP ήχου οχήματος
      description: Καθορίζει τη φυσική μορφή/μορφή εγκατάστασης της μονάδας DSP.
    vehicle_battery_charger_features:
      name: Χαρακτηριστικά φορτιστή μπαταρίας οχήματος
      description: Παραθέτει τους τρόπους λειτουργίας και τα ενσωματωμένα χαρακτηριστικά
        του φορτιστή της μπαταρίας του οχήματος (π.χ., λειτουργία συντήρησης φόρτισης,
        αποθείωση).
    vehicle_body_filler_form:
      name: Μορφή στόκου αμαξώματος οχήματος
      description: Η φυσική μορφή/το είδος συσκευασίας του προϊόντος στόκου αμαξώματος.
    vehicle_coaxial_speaker_nominal_size:
      name: Ονομαστικό μέγεθος ομοαξονικού ηχείου οχήματος
      description: Ονομαστικό μέγεθος ηχείου που χρησιμοποιείται στην τοποθέτηση (π.χ.,
        6,5 ίντσες, 6x9 ίντσες).
    vehicle_cover_size_class:
      name: Κατηγορία μεγέθους καλύμματος οχήματος
      description: Γενική ομαδοποίηση μεγέθους που υποδεικνύει το μέγεθος του οχήματος
        στο οποίο έχει σχεδιαστεί να ταιριάζει το κάλυμμα.
    vehicle_decor_set_items_included:
      name: Περιλαμβανόμενα είδη σετ διακόσμησης οχήματος
      description: Παραθέτει τους τύπους των ειδών διακόσμησης που περιλαμβάνονται
        στο σετ αξεσουάρ (ορατότητα σε επίπεδο εξαρτημάτων για τους αγοραστές).
    vehicle_door_lock_actuation_method:
      name: Μέθοδος ενεργοποίησης κλειδαριάς πόρτας οχήματος
      description: Υποδεικνύει τον τρόπο ενεργοποίησης ή ελέγχου της κλειδαριάς της
        πόρτας του οχήματος.
    vehicle_door_lock_actuator_kit_contents:
      name: Περιεχόμενα κιτ ενεργοποιητή κλειδαριάς πόρτας οχήματος
      description: Υποδεικνύει τι περιλαμβάνεται μαζί με τον ενεργοποιητή (μόνο ενεργοποιητής
        ή υλικός εξοπλισμός/ράβδοι/στηρίγματα/καλωδίωση).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Διαμόρφωση καλωδίωσης ενεργοποιητή κλειδαριάς πόρτας οχήματος
      description: Καθορίζει το στυλ καλωδίωσης που απαιτείται για την εγκατάσταση
        (αριθμός καλωδίων και ρόλος).
    vehicle_door_lock_included_components:
      name: Περιλαμβανόμενα εξαρτήματα κλειδαριάς πόρτας οχήματος
      description: Παραθέτει ποια εξαρτήματα περιλαμβάνονται στη συσκευασία (χρήσιμο
        για κιτ/συναρμολογήσεις).
    vehicle_electrical_connector_type:
      name: Τύπος ηλεκτρικού συνδέσμου οχήματος
      description: Καθορίζει τον τύπο ηλεκτρικού συνδέσμου ή βύσματος του ρυθμιστή/πεδίου
        του εναλλάκτη (εξαιρουμένου του κύριου ακροδέκτη εξόδου B+).
    vehicle_equipment_fit_out_level:
      name: Επίπεδο διαμόρφωσης εξοπλισμού οχήματος
      description: Υποδεικνύει το επίπεδο διαμόρφωσης για σκοπούς χρήσης από την αστυνομία
        το οποίο περιλαμβάνεται στο βαν.
    vehicle_glass_cleaner_form:
      name: Μορφή καθαριστικού τζαμιών οχήματος
      description: Φυσική μορφή προϊόντος καθαριστικού τζαμιών οχήματος (π.χ. σπρέι,
        αφρός, μαντηλάκια, τζελ, συμπύκνωμα).
    vehicle_hitch_cover_illumination_type:
      name: Τύπος φωτισμού καλύμματος κοτσαδόρου οχήματος
      description: Καθορίζει εάν το κάλυμμα του κοτσαδόρου διαθέτει φωτισμό και ποιος
        είναι ο τύπος του.
    vehicle_hitch_cover_mounting_type:
      name: Τύπος τοποθέτησης καλύμματος κοτσαδόρου οχήματος
      description: Υποδεικνύει τη μέθοδο που χρησιμοποιείται για τη συγκράτηση/την
        τοποθέτηση του καλύμματος του κοτσαδόρου στην υποδοχή του κοτσαδόρου.
    vehicle_license_plate_finish:
      name: Φινίρισμα πινακίδας κυκλοφορίας οχήματος
      description: Φινίρισμα επιφάνειας της πινακίδας.
    vehicle_license_plate_frame_anti_theft_design:
      name: Αντικλεπτικός σχεδιασμός πλαισίου πινακίδας κυκλοφορίας οχήματος
      description: Στοιχεία σχεδιασμού που σχετίζονται με την ασφάλεια και προορίζονται
        για αποτροπή αφαίρεσης ή αλλοίωσης.
    vehicle_license_plate_frame_plate_standard:
      name: Πρότυπο πλάκας πλαισίου πινακίδας κυκλοφορίας οχήματος
      description: Πρότυπο/περιοχή πινακίδας κυκλοφορίας για την οποία έχει διαμορφωθεί
        το πλαίσιο ώστε να ταιριάζει.
    vehicle_license_plate_frame_profile:
      name: Προφίλ πλαισίου πινακίδας κυκλοφορίας οχήματος
      description: Πώς το πλαίσιο οριοθετεί την πλάκα (κάλυψη/σχήματα) που επηρεάζουν
        την αναγνωσιμότητα και τη συμμόρφωση.
    vehicle_license_plate_mounting_hole_count:
      name: Αριθμός οπών στήριξης πινακίδας κυκλοφορίας οχήματος
      description: Αριθμός οπών στερέωσης στην πινακίδα.
    vehicle_license_plate_mounting_hole_pattern:
      name: Διάταξη οπών στερέωσης πινακίδας κυκλοφορίας οχήματος
      description: Σχέδιο τοποθέτησης οπών στερέωσης στην πινακίδα.
    vehicle_license_plate_reflectivity:
      name: Ανακλαστικότητα πινακίδας κυκλοφορίας οχήματος
      description: Εάν και πώς η επιφάνεια της πινακίδας αντανακλά το φως (σημαντικό
        για την ορατότητα και τη συμμόρφωση σε ορισμένες πρωτότυπες πλάκες).
    vehicle_license_plate_size_standard:
      name: Πρότυπο μεγέθους πινακίδας κυκλοφορίας οχήματος
      description: Υποδεικνύει το πρότυπο περιοχής/οχήματος το μέγεθος της πινακίδας
        που ταιριάζει (απόσταση οπών τοποθέτησης και συνολική ποιοτική μεταβλητή).
    vehicle_license_plate_text_style:
      name: Στυλ γραμματοσειράς πινακίδας κυκλοφορίας οχήματος
      description: Στυλ των χαρακτήρων της πινακίδας (εάν υπάρχουν), συμπεριλαμβανομένου
        του ανάγλυφου έναντι του τυπωμένου.
    vehicle_license_plate_theme:
      name: Θέμα πινακίδας κυκλοφορίας οχήματος
      description: Υψηλού επιπέδου θεματική σχεδίαση του εικαστικού της πλάκας.
    vehicle_lift_actuation_method:
      name: Μέθοδος ενεργοποίησης ανύψωσης οχήματος
      description: Πώς τροφοδοτείται/ενεργοποιείται ο ανυψωτήρας/γρύλος για την ανύψωση
        του οχήματος.
    vehicle_lift_mounting_type:
      name: Τύπος στήριξης ανύψωσης οχήματος
      description: Υποδεικνύει τον τρόπο εγκατάστασης ή αγκύρωσης του ανυψωτήρα στον
        χώρο εργασίας.
    vehicle_lift_type:
      name: Τύπος ανύψωσης οχήματος
      description: Καθορίζει το δομικό στυλ του ανυψωτήρα οχημάτων που χρησιμοποιείται
        για σέρβις ή αποθήκευση (π.χ., 2 στύλων, 4 στύλων, ψαλιδωτό).
    vehicle_magnet_attachment_type:
      name: Τύπος προσάρτησης μαγνήτη οχήματος
      description: Καθορίζει την κύρια μέθοδο σύνδεσης/τοποθέτησης για προϊόντα που
        πωλούνται ως μαγνήτες οχημάτων (για παράδειγμα, μόνο μαγνητικά έναντι μαγνητικών
        με αυτοκόλλητο υπόστρωμα).
    vehicle_magnet_intended_use:
      name: Προβλεπόμενη χρήση μαγνήτη οχήματος
      description: Υποδεικνύει την κύρια προβλεπόμενη χρήση του μαγνήτη οχήματος.
    vehicle_mirror_adjustment_type:
      name: Τύπος ρύθμισης καθρέφτη οχήματος
      description: Καθορίζει τον τρόπο ρύθμισης/ελέγχου του καθρέφτη.
    vehicle_mirror_glass_type:
      name: Τύπος γυαλιού καθρέφτη οχήματος
      description: Καθορίζει τον οπτικό τύπο ή το σχήμα της επιφάνειας του καθρέφτη.
    vehicle_organizer_features:
      name: Χαρακτηριστικά διάταξης οργάνωσης οχήματος
      description: Βασικά λειτουργικά χαρακτηριστικά των διατάξεων οργάνωσης οχημάτων,
        όπως η δυνατότητα αναδίπλωσης, η αδιάβροχη επένδυση, οι μονωμένες θήκες ή
        η αντιολισθητική βάση.
    vehicle_paint_chemistry_base:
      name: Χημεία/βάση χρώματος οχήματος
      description: Υποδεικνύει τη σύνθεση/χημεία του χρώματος που χρησιμοποιείται
        στη βαφή οχημάτων.
    vehicle_polish_application_method:
      name: Μέθοδος εφαρμογής γυαλιστικού οχήματος
      description: Καθορίζει τη συνιστώμενη μέθοδο ή εργαλείο για την εφαρμογή του
        γυαλιστικού οχήματος.
    vehicle_pursuit_package:
      name: Πακέτο καταδίωξης οχήματος
      description: Υποδεικνύει αν το όχημα διαθέτει πακέτο επιδόσεων για χρήση καταδίωξης,
        σχεδιασμένο για αστυνομική χρήση (π.χ. αναβαθμισμένη ψύξη, φρένα, ανάρτηση
        και ρυθμίσεις).
    vehicle_safety_equipment_position:
      name: Θέση εξοπλισμού ασφαλείας οχήματος
      description: Καθορίζει το σημείο πάνω ή μέσα στο όχημα όπου προορίζεται να χρησιμοποιηθεί
        ή να εγκατασταθεί ο εξοπλισμός ασφαλείας.
    vehicle_safety_equipment_visibility_features:
      name: Χαρακτηριστικά ορατότητας εξοπλισμού ασφαλείας οχήματος
      description: Υποδεικνύει χαρακτηριστικά βελτίωσης της ορατότητας που έχουν σχεδιαστεί
        για την αύξηση της ευκρίνειας.
    vehicle_seat_row:
      name: Σειρά καθισμάτων οχήματος
      description: Υποδεικνύει για ποια πίσω σειρά προορίζεται το κάθισμα (δεύτερη
        σειρά έναντι τρίτης σειράς), συμπεριλαμβανομένης της εφαρμογής για το πίσω
        αναδιπλούμενο κάθισμα.
    vehicle_steering_assist_type:
      name: Τύπος υποβοήθησης διεύθυνσης οχήματος
      description: Καθορίζει το σύστημα υποβοήθησης διεύθυνσης για το οποίο έχει σχεδιαστεί
        το εξάρτημα.
    vehicle_steering_wheel_lock_form_factor:
      name: Συντελεστής μορφής κλειδαριάς τιμονιού οχήματος
      description: Περιγράφει το φυσικό στυλ της κλειδαριάς και τον τρόπο με τον οποίο
        αλληλεπιδρά με το τιμόνι (και προαιρετικά με άλλα χειριστήρια).
    vehicle_wax_polish_product_form:
      name: Μορφή προϊόντος κεριού/γυαλιστικού οχήματος
      description: Η φυσική μορφή/μορφή χορήγησης του κεριού, του γυαλιστικού, του
        προστατευτικού ή του στεγανωτικού.
    vehicle_wheel_valve_stem_type:
      name: Τύπος στελέχους βαλβίδας τροχού οχήματος
      description: Καθορίζει τον τύπο στελέχους βαλβίδας που υποστηρίζεται ή περιλαμβάνεται.
    vehicle_windshield_fluid_formula:
      name: Φόρμουλα υγρού παρμπρίζ οχήματος
      description: Κύριος στόχος καθαρισμού/αφαίρεσης της σύνθεσης υγρού παρμπρίζ.
    veil_length_type:
      name: Τύπος μήκους πέπλου
      description: Κατηγοριοποιεί το πέπλο με βάση τυποποιημένη ορολογία μήκους αντί
        για αριθμητική μέτρηση.
    vellum_opacity_level:
      name: Επίπεδο αδιαφάνειας περγαμηνής
      description: Υποδεικνύει πόσο ημιδιαφανές ή αδιαφανές είναι το φύλλο περγαμηνής.
    ventilation_configuration:
      name: Διαμόρφωση αερισμού
      description: Διαμόρφωση κύριου αερισμού/εισαγωγής και εξαγωγής αέρα του κράνους.
    ventilation_control_type:
      name: Τύπος ελέγχου αερισμού
      description: Καθορίζει το στυλ διαχείρισης ροής αέρα που είναι ενσωματωμένο
        στο κράνος.
    ventilation_level:
      name: Επίπεδο αερισμού
      description: Υποδεικνύει τη σχετική σχεδίαση αερισμού/ροής αέρα της πανοπλίας.
    venting_design:
      name: Σχεδιασμός εξαερισμού
      description: Υποδεικνύει αν και πώς το κάλυμμα διαθέτει αερισμό για τη μείωση
        της συμπύκνωσης υγρασίας και της μούχλας κατά την αποθήκευση.
    vestibule_type:
      name: Τύπος προθαλάμου
      description: Ταξινομεί τη διάταξη του προθαλάμου σε σχέση με τη σκηνή.
    vibraphone_bar_material:
      name: Υλικό ράβδου βιμπραφώνου
      description: Υλικό των τονικών γραμμών/πλήκτρων του βιμπραφώνου (των γραμμών
        που παράγουν ήχο).
    vibraphone_motor_type:
      name: Τύπος μοτέρ βιμπραφώνου
      description: Τύπος μοτέρ που χρησιμοποιείται για την κίνηση των περιστρεφόμενων
        ανεμιστήρων συντονισμού για βιμπράτο (εάν υπάρχει).
    vibraphone_range_octaves:
      name: Εύρος βιμπραφώνου (οκτάβες)
      description: Το εύρος του τονικού ύψους του βιμπραφώνου εκφρασμένο σε οκτάβες
        (π.χ., 3 οκτάβες, 3,5 οκτάβες).
    vibraphone_resonator_tube_material:
      name: Υλικό σωλήνων αντήχησης βιμπραφώνου
      description: Υλικό των σωλήνων αντήχησης βιμπραφώνου κάτω από τις ράβδους.
    vibraphone_tuning_standard:
      name: Πρότυπο κουρδίσματος βιμπραφώνου
      description: Τονικό ύψος αναφοράς που χρησιμοποιείται για το κούρδισμα (A=440
        Hz, κ.λπ.).
    viewing_sides:
      name: Πλευρές προβολής
      description: Καθορίζει πόσες όψεις του πίνακα αποτελεσμάτων εμφανίζουν πληροφορίες
        (μονόπλευρη, διπλή, τετράπλευρη κ.λπ.).
    vintage_advertisement_decade:
      name: Δεκαετία vintage διαφήμισης
      description: Καθορίζει τη δεκαετία κατά την οποία τυπώθηκε ή παράχθηκε αρχικά
        η διαφήμιση (κατά προσέγγιση εάν το ακριβές έτος είναι άγνωστο).
    vintage_advertisement_format:
      name: Μορφή vintage διαφήμισης
      description: Καθορίζει τη φυσική μορφή ή το μέσο του συλλεκτικού αντικειμένου
        vintage διαφήμισης.
    vintage_advertisement_subject_category:
      name: Κατηγορία θέματος vintage διαφήμισης
      description: Προσδιορίζει την κατηγορία προϊόντος/υπηρεσίας που διαφημίζεται
        (για ποιον σκοπό προορίζεται η διαφήμιση).
    vintage_classic_truck_cab_type:
      name: Vintage και κλασικός τύπος καμπίνας φορτηγού
      description: Διαμόρφωση καμπίνας/στυλ αμαξώματος του χώρου επιβατών του φορτηγού.
    virginia_tech_helmet_star_rating:
      name: Βαθμολογία με αστέρια κράνους Virginia Tech
      description: Βαθμολογία αναφορικά με την ασφάλεια που έχει αποδοθεί από το Virginia
        Tech Helmet Lab (0–5 αστέρια).
    virtual_analog_synthesizer_form_factor:
      name: Μορφή/σχεδιαστικός παράγοντας εικονικού αναλογικού συνθεσάιζερ
      description: Καθορίζει τη φυσική μορφή του σασί του συνθεσάιζερ (π.χ. με πληκτρολόγιο
        ή μονάδα/rack).
    viscosity_thickness:
      name: Ιξώδες/πάχος
      description: Περιγράφει το ιξώδες ή την πυκνότητα του slip όπως πωλείται ή στη
        συνιστώμενη κατάσταση χρήσης.
    vise_configuration:
      name: Διαμόρφωση μέγγενης
      description: Καθορίζει τη δομική διάταξη ή τον αριθμό των τεμαχίων στο σετ μέγγενης,
        η οποία επηρεάζει τη φορητότητα και την πολυπλοκότητα της εγκατάστασης.
    visibility_features:
      name: Χαρακτηριστικά προβολής
      description: Επισημαίνει σχεδιαστικά στοιχεία που ενισχύουν την ορατότητα του
        αναβάτη σε κυκλοφορία.
    visor_brim_type:
      name: Τύπος γείσου/χείλους
      description: Υποδεικνύει την ύπαρξη και το στυλ γείσου ή προσωπίδας στο κράνος.
    visor_configuration:
      name: Διαμόρφωση προσωπίδας
      description: Περιγράφει την παρουσία και το στυλ οποιασδήποτε ενσωματωμένης
        ζελατίνας ή προσωπίδας.
    visor_lens_finish:
      name: Φινίρισμα φακού προσωπίδας
      description: Καθορίζει την απόχρωση, το οπτικό φινίρισμα ή το γραφικό στυλ που
        εφαρμόζεται στον φακό της προσωπίδας.
    visor_style:
      name: Στυλ προσωπίδας
      description: Υποδεικνύει εάν η κουκούλα περιλαμβάνει γείσο/προσωπίδα και τη
        διαμόρφωσή της.
    voc_compliance_standard:
      name: Πρότυπο συμμόρφωσης με VOC
      description: Δήλωση συμμόρφωσης με τους κανονισμούς VOC για το προϊόν (όπου
        ισχύει).
    voc_regulatory_class:
      name: Ρυθμιστική κατηγορία VOC
      description: Δηλωμένη κατηγορία συμμόρφωσης VOC (πτητικών οργανικών ενώσεων)
        του προϊόντος σύμφωνα με την ετικέτα/SDS, που χρησιμοποιείται για περιφερειακούς
        κανονισμούς και περιβαλλοντικούς περιορισμούς.
    vodka_base_ingredient:
      name: Βασικό συστατικό βότκας
      description: Κύριο γεωργικό συστατικό από το οποίο αποστάζεται η βότκα (π.χ.
        σιτάρι, πατάτα, καλαμπόκι).
    voice_coil_configuration:
      name: Διαμόρφωση πηνίου φωνής
      description: Αριθμός/διάταξη πηνίων φωνής για ευελιξία καλωδίωσης και επιλογές
        σύνθετης αντίστασης.
    voice_effects:
      name: Φωνητικά εφέ
      description: Ενσωματωμένοι τύποι φωνητικών εφέ που υποστηρίζονται από το σετ
        καραόκε.
    voltage_rating_type:
      name: Τύπος ονομαστικής τάσης
      description: Καθορίζει εάν η ονομαστική τάση της ασφάλειας ισχύει για AC, DC
        ή και τα δύο.
    voltage_regulator_connector_type:
      name: Τύπος συνδέσμου ρυθμιστή τάσης
      description: Καθορίζει το στυλ σύνδεσης/ακροδέκτη που χρησιμοποιείται για τη
        σύνδεση του ρυθμιστή στην καλωδίωση/εναλλάκτη/γεννήτρια του οχήματος.
    wader_foot_type:
      name: Τύπος ποδιού wader
      description: Υποδεικνύει αν οι στολές waders διαθέτουν ενσωματωμένες μπότες
        ή ξεχωριστά «stocking feet».
    wader_sole_type:
      name: Τύπος σόλας για wader
      description: Καθορίζει το υλικό της εξωτερικής σόλας ή τον τύπο πρόσφυσης που
        χρησιμοποιείται σε μπότες wading ή waders με ενσωματωμένη μπότα.
    waistband_style:
      name: Στυλ ζώνης
      description: Περιγράφει την κατασκευή της ζώνης και τον τρόπο με τον οποίο ασφαλίζεται
        ή ρυθμίζεται για εφαρμογή και άνεση.
    wakeboard_binding_mounting_pattern:
      name: Διάταξη οπών στερέωσης δέστρας wakeboard
      description: Καθορίζει το μοτίβο ενθέτων/πλακών στο wakeboard με το οποίο είναι
        συμβατές οι δέστρες.
    wakeboard_riding_style:
      name: Στυλ οδήγησης wakeboard
      description: Ταξινομεί το προβλεπόμενο περιβάλλον ή το στυλ χρήσης του wakeboard.
    wall_decal_style:
      name: Στυλ αυτοκόλλητου τοίχου
      description: Καθορίζει τον τρόπο παραγωγής/εφαρμογής του αυτοκόλλητου (π.χ.,
        κοπή με καλούπι, μεταφορά, φύλλο αυτοκόλλητου).
    wallyball_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός wallyball
      description: Απαριθμεί τα συγκεκριμένα εξαρτήματα που περιλαμβάνονται στο σετ
        wallyball, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι αγοράζουν και να μπορούν
        να συγκρίνουν πακέτα.
    warp_beam_type:
      name: Τύπος δοκού στημονιού
      description: Καθορίζει τη διαμόρφωση της δοκού στημονιού που περιλαμβάνεται
        ή είναι εγκατεστημένη στον αργαλειό.
    washability:
      name: Δυνατότητα πλυσίματος
      description: Υποδεικνύει εάν η κόλλα καθαρίζεται με νερό ή/και πλένεται μετά
        την εφαρμογή.
    watch_band_design:
      name: Σχεδιασμός λουριού ρολογιού
      description: Περιγράφει το στυλ κατασκευής ή το μοτίβο σχεδίασης ενός λουριού
        ρολογιού (π.χ., NATO, Milanese, Link).
    watch_movement:
      name: Κίνηση ρολογιού
      description: Καθορίζει τον μηχανισμό που τροφοδοτεί το ρολόι, έναν βασικό παράγοντα
        που χρησιμοποιεί ο αγοραστής για τη διαφοροποίηση μεταξύ των μοντέλων.
    water_activation:
      name: Ενεργοποίηση νερού
      description: Εάν ο φάρος μπορεί να ενεργοποιηθεί αυτόματα κατά την εμβάπτιση
        στο νερό (κοινό για τα EPIRB κατηγορίας I/II).
    water_chamber_configuration:
      name: Διαμόρφωση θαλάμου νερού
      description: Περιγράφει τη διάταξη των εσωτερικών θαλάμων αέρα του στρώματος,
        όπως μονός ή διπλός θάλαμος, κάτι που επηρεάζει τη στήριξη, τον έλεγχο θερμοκρασίας
        και την άνεση λόγω κινήσεων.
    water_dispensing_mechanism:
      name: Μηχανισμός διανομής νερού
      description: Ορίζει τον τρόπο με τον οποίο απελευθερώνεται το νερό από τη μονάδα,
        όπως με βρύσες, ακροφύσια ψεκασμού ή με σύστημα βαρύτητας.
    water_exposure_protection_level:
      name: Επίπεδο προστασίας από έκθεση σε νερό
      description: Υποδεικνύει το επίπεδο προστασίας του προϊόντος όταν εκτίθεται
        σε νερό (π.χ., πιτσιλιές έναντι προσωρινής βύθισης). Χρησιμοποιήστε βαθμολογία
        προστασίας εισχώρησης (IP rating) όταν υπάρχει επίσημος κωδικός IP.
    water_fed_design:
      name: Σχεδιασμός με τροφοδοσία νερού
      description: Υποδεικνύει αν η βούρτσα έχει σχεδιαστεί για χρήση με τρεχούμενο
        νερό μέσω λαβής ροής ή σύνδεσης σωλήνα.
    water_gun_features:
      name: Χαρακτηριστικά νεροπίστολου
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά και συμπεριλαμβανόμενη
        ικανότητα του πιστολιού νερού.
    water_gun_operating_mechanism:
      name: Μηχανισμός λειτουργίας πιστολιού νερού
      description: Πώς το πιστόλι νερού ασκεί πίεση και αποβάλλει το νερό κατά τη
        χρήση.
    water_gun_spray_pattern:
      name: Μοτίβο ψεκασμού με πιστόλι νερού
      description: Το είδος της ροής νερού που παράγεται από το ακροφύσιο κατά την
        πυρόσβεση.
    water_heating_method:
      name: Μέθοδος θέρμανσης νερού
      description: Περιγράφει πώς ή αν θερμαίνεται το νερό πριν από τη χρήση — για
        παράδειγμα μέσω ηλιακής απορρόφησης, καυστήρων προπανίου, ηλεκτρικών αντιστάσεων,
        θέρμανσης με μπαταρία, θερμομονωτικής διατήρησης θερμότητας ή χωρίς θέρμανση.
    water_mattress_construction:
      name: Κατασκευή στρώματος νερού
      description: Καθορίζει το στυλ κατασκευής του στρώματος νερού (π.χ., σκληρή
        ή μαλακή πλευρά), το οποίο καθορίζει τη συμβατότητα πλαισίου και τη συνολική
        αίσθηση.
    water_play_features:
      name: Χαρακτηριστικά παιχνιδιού νερού
      description: Στοιχεία υδάτινων δραστηριοτήτων που περιλαμβάνονται στο υδάτινο
        πάρκο/τσουλήθρα.
    water_polo_competition_approval:
      name: Έγκριση αγώνων υδατοσφαίρισης
      description: Προσδιορίζει τον φορέα διοίκησης ή το επίπεδο του αγώνα για το
        οποίο η μπάλα είναι επίσημα εγκεκριμένη ή πιστοποιημένη.
    water_polo_goal_type:
      name: Τύπος τέρματος υδατοσφαίρισης
      description: Ταξινομεί τη δομική ή υποστηρικτική διαμόρφωση του τέρματος (π.χ.,
        πλωτό, τοποθετημένο σε κατάστρωμα, φορητό).
    water_pump_drive_type:
      name: Τύπος κίνησης αντλίας νερού
      description: Καθορίζει τον τρόπο κίνησης/ενεργοποίησης της αντλίας νερού στο
        σύστημα ψύξης του οχήματος.
    water_pump_housing_material:
      name: Υλικό περιβλήματος αντλίας νερού
      description: Υλικό του περιβλήματος/σώματος της αντλίας νερού.
    water_pump_impeller_material:
      name: Υλικό πτερωτής αντλίας νερού
      description: Καθορίζει το υλικό της πτερωτής της αντλίας νερού (εσωτερικός ρότορας/πτερύγιο
        που κινεί το ψυκτικό υγρό).
    water_pump_mounting_type:
      name: Τύπος τοποθέτησης αντλίας νερού
      description: Καθορίζει τον τύπο στερέωσης ή τη μορφή κατασκευής της αντλίας
        νερού για εφαρμογή στον κινητήρα (π.χ., βιδωτό περίβλημα έναντι φυσιγγίου/ένθετου).
    water_purification_method:
      name: Μέθοδος καθαρισμού νερού
      description: Προσδιορίζει τον κύριο μηχανισμό με τον οποίο το προϊόν καθιστά
        το νερό ασφαλές για άμεση κατανάλωση (π.χ., αντλία έναντι τροφοδοσίας με βαρύτητα
        έναντι υπεριώδους ακτινοβολίας).
    water_resistance:
      name: Αντοχή στο νερό
      description: Αναφέρει τον βαθμό προστασίας από τις καιρικές συνθήκες που παρέχεται,
        όπως αδιάβροχη ή ανθεκτική στο νερό.
    water_resistance_level:
      name: Επίπεδο αντοχής στο νερό
      description: Υποδεικνύει εάν το ύφασμα απωθεί το νερό και σε ποιο επίπεδο.
    water_resistance_rating_case_protection_level:
      name: Βαθμός αντοχής στο νερό (επίπεδο προστασίας θήκης)
      description: Υποδεικνύει το επίπεδο αντοχής στο νερό που παρέχει η τροχήλατη
        θήκη (εμπορικής/marketing κλίμακας, όχι ηλεκτρονική πιστοποίηση IP), π.χ.
        ανθεκτική στο νερό ή αδιάβροχη.
    water_rocket_kit_items_included:
      name: Περιλαμβάνεται κιτ υδροπυραύλου
      description: Κύρια εξαρτήματα που περιλαμβάνονται στη συσκευασία του προϊόντος.
    water_rocket_propulsion_type:
      name: Τύπος πρόωσης υδροπυραύλου
      description: Κύρια πηγή πρόωσης/ενέργειας που χρησιμοποιείται για εκκίνηση του
        πυραύλου.
    water_rocket_recovery_system:
      name: Σύστημα ανάκτησης υδροπυραύλων
      description: Μέθοδος που χρησιμοποιείται για την ανάκτηση του πυραύλου μετά
        την εκκίνηση.
    water_ski_base_design:
      name: Σχεδιασμός βάσης θαλάσσιου σκι
      description: Καθορίζει το προφίλ του κάτω κύτους των θαλάσσιων σκι, το οποίο
        επηρεάζει τα χαρακτηριστικά χειρισμού.
    water_ski_fin_type:
      name: Τύπος πτερυγίου θαλάσσιου σκι
      description: Καθορίζει τη διαμόρφωση του πτερυγίου ενός θαλάσσιου σκι, η οποία
        επηρεάζει την πορεία και την ικανότητα ελιγμών.
    water_source:
      name: Πηγή νερού
      description: Προσδιορίζει την προέλευση του νερού πριν από την ανθράκωση.
    water_sports_safety_standard:
      name: Πρότυπο ασφαλείας για θαλάσσια σπορ
      description: Παραθέτει τα επίσημα πρότυπα ασφάλειας ή πλευστότητας που πληροί
        το προϊόν (π.χ., CE EN 1385 για κράνη, ISO 12402-5 για βοηθήματα πλευστότητας,
        USCG Τύπου III).
    water_table_feature_set:
      name: Σετ χαρακτηριστικών τραπεζιού νερού
      description: Επισημαίνει ενσωματωμένα χαρακτηριστικά παιχνιδιού του τραπεζιού
        νερού, όπως καταρράκτες, εκτοξευτήρες, αντλίες ή πολυεπίπεδες λεκάνες.
    water_table_items_included:
      name: Περιλαμβάνονται στοιχεία του τραπεζιού νερού
      description: Καθορίζει ποια αξεσουάρ περιλαμβάνονται στο σετ τραπεζιού νερού
        (π.χ. βαρκάκια, κύπελλα, διαδρομές, φιγούρες).
    water_table_water_source_type:
      name: Τύπος πηγής νερού τραπεζιού νερού
      description: Καθορίζει τον τρόπο με τον οποίο το τραπέζι νερού γεμίζει ή τροφοδοτείται
        με νερό.
    waterbed_stabilization_level:
      name: Επίπεδο σταθεροποίησης στρώματος νερού
      description: Υποδεικνύει τον βαθμό μείωσης κυμάτων ή ελέγχου κίνησης που παρέχει
        το στρώμα νερού.
    watercolor_ink_water_resistance_after_drying:
      name: Αντοχή στο νερό του μελανιού ακουαρέλας (μετά το στέγνωμα).
      description: Υποδεικνύει αν το μελάνι ακουαρέλας γίνεται ανθεκτικό ή αδιάβροχο
        στο νερό μετά το στέγνωμα (σύμφωνα με τη δήλωση του κατασκευαστή).
    watercraft_care_application_area:
      name: Περιοχή εφαρμογής φροντίδας σκαφών
      description: Υποδεικνύει την κύρια περιοχή ή το κύριο εξάρτημα ενός σκάφους
        στο οποίο προορίζεται να χρησιμοποιηθεί το προϊόν.
    watercraft_drive_mechanism:
      name: Μηχανισμός κίνησης σκάφους
      description: Περιγράφει τον συγκεκριμένο ενσωματωμένο μηχανισμό πρόωσης που
        είναι εγκατεστημένος ή υποστηρίζεται.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Μοτίβο μονάδας αποστολής δεξαμενής καυσίμου σκάφους
      description: Καθορίζει το μοτίβο/πρότυπο τοποθέτησης για μονάδες αποστολής δεξαμενών
        καυσίμου και συμβατούς μετρητές (π.χ., κοινά πρότυπα διάτρησης σκαφών).
    watercraft_fuel_tank_shape:
      name: Σχήμα δεξαμενής καυσίμου σκάφους
      description: Περιγράφει τη συνολική φυσική μορφή της δεξαμενής καυσίμου για
        την υποστήριξη του σχεδιασμού χώρου/εφαρμογής.
    watercraft_hull_material:
      name: Υλικό κύτους σκάφους
      description: Καθορίζει το κύριο υλικό κατασκευής του κύτους.
    watercraft_ignition_part_voltage:
      name: Τάση τμήματος ανάφλεξης σκάφους
      description: Ονομαστική τάση λειτουργίας/απαίτηση για το εξάρτημα ανάφλεξης
        (όπου εφαρμόζεται), όπως συστήματα 12 V.
    watercraft_impeller_material_grade:
      name: Βαθμός υλικού πτερωτής σκάφους
      description: Καθορίζει το υλικό της πτερωτής του σκάφους (π.χ., ελαστικό από
        νεοπρένιο, νιτρίλιο, μπρούντζος).
    watercraft_lighting_certification_compliance:
      name: Πιστοποίηση / συμμόρφωση με τον φωτισμό σκαφών
      description: Υποδεικνύει τη συμμόρφωση με τους κανονισμούς/πρότυπα για την οποία
        είναι πιστοποιημένο το φως για θαλάσσια χρήση (π.χ., συμβατό με τους κανονισμούς
        USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Χαρακτηριστικά ρύθμισης βάσης κινητήρα σκάφους
      description: Ρύθμιση της ικανότητας της βάσης (π.χ. κλίση, ανύψωση, ολίσθηση)
        που επηρεάζουν τη χρηστικότητα και την εφαρμογή.
    watercraft_piston_part_type:
      name: Τύπος εξαρτήματος εμβόλου σκάφους
      description: Προσδιορίζει ποιο εξάρτημα που σχετίζεται με το έμβολο αντιπροσωπεύει
        η καταχώριση.
    watercraft_propeller_blade_rake:
      name: Κλίση λεπίδας προπέλας σκάφους
      description: Καθορίζει την κλίση της λεπίδας (γωνία λεπίδας σε σχέση με την
        πλήμνη), η οποία επηρεάζει την ανύψωση και την απόδοση της πλώρης.
    watercraft_propeller_rotation_direction:
      name: Κατεύθυνση περιστροφής προπέλας σκάφους
      description: Υποδεικνύει την απαιτούμενη κατεύθυνση/χειροκίνητη περιστροφή της
        προπέλας για συμβατότητα με το σύστημα μετάδοσης κίνησης (π.χ., δεξιόστροφη/κανονική
        έναντι αριστερόστροφης/αντίστροφης περιστροφής).
    watercraft_pump_stage_impeller_role:
      name: Στάδιο αντλίας / ρόλος πτερωτής σκάφους
      description: Καθορίζει αν η πτερωτή προορίζεται για συγκεκριμένο τύπο αντλίας
        (π.χ. αντλία θαλασσινού νερού, κυκλοφορία ψυκτικού υγρού, αντλία τζετ).
    watercraft_registration_status:
      name: Κατάσταση εγγραφής σκάφους
      description: Υποδεικνύει εάν το ιστιοπλοϊκό περιλαμβάνει έγγραφα τίτλου ή/και
        νηολόγησης.
    watercraft_safety_equipment_activation_type:
      name: Τύπος ενεργοποίησης εξοπλισμού ασφαλείας σκαφών
      description: Κύρια μέθοδος ενεργοποίησης της συσκευής ασφαλείας (για φάρους/συναγερμούς
        MOB/PLB), διαφορετική από το φούσκωμα.
    watercraft_steering_cable_core_material:
      name: Υλικό πυρήνα καλωδίου τιμονιού σκάφους
      description: Καθορίζει το υλικό του εσωτερικού καλωδίου/πυρήνα που μεταδίδει
        ισχύ.
    watercraft_steering_cable_hardware_included:
      name: Περιλαμβανόμενα εξαρτήματα καλωδίου διεύθυνσης σκάφους
      description: Καθορίζει ποια εγκατάσταση υλικού εξοπλισμού και αξεσουάρ περιλαμβάνονται
        στο συρματόσχοινο του τιμονιού.
    watercraft_steering_cable_system_type:
      name: Τύπος συστήματος καλωδίου τιμονιού σκάφους
      description: Καθορίζει την αρχιτεκτονική του συστήματος διεύθυνσης για την οποία
        έχει σχεδιαστεί το καλώδιο (π.χ., περιστροφικό, rack).
    watercraft_steering_wheel_hub_bore_type:
      name: Τύπος πλήμνης/οπή τιμονιού υδροσκάφους
      description: Καθορίζει το στυλ κεντρικής τοποθέτησης/διεπαφής οπής (π.χ. κωνικό,
        με εγκοπή) όπου ο τροχός ταιριάζει με μια πλήμνη ή έναν προσαρμογέα.
    watercress_variety:
      name: Ποικιλία νεροκάρδαμου
      description: Προσδιορίζει την συγκεκριμένη ποικιλία ή τον τύπο κάρδαμου που
        πωλείται.
    waterproof_level:
      name: Επίπεδο αδιαβροχοποίησης
      description: Υποδεικνύει το επίπεδο προστασίας από το νερό του υποδήματος, συμπεριλαμβανομένων
        τυχόν εγγυημένων ισχυρισμών αδιαβροχοποίησης.
    wax_blend_composition:
      name: Σύνθεση μείγματος κεριού
      description: Παραθέτει τα υλικά κεριού που αναμειγνύονται στο προϊόν ή/και τον
        τύπο μείγματος που διατίθεται στην αγορά.
    wax_coat_type:
      name: Τύπος επικάλυψης κεριού
      description: Υποδεικνύει εάν το κερί προορίζεται ως βασική επίστρωση, τελική
        επίστρωση ή για γενική χρήση/μονή επίστρωση.
    wax_hardness:
      name: Σκληρότητα κεριού
      description: Υποδεικνύει τη σχετική σκληρότητα του κεριού, η οποία επηρεάζει
        την ανθεκτικότητα και την ολίσθηση σε διαφορετικούς τύπους χιονιού.
    wax_physical_form:
      name: Φυσική μορφή κεριού
      description: Υποδεικνύει τη φυσική μορφή/σχήμα με το οποίο παρέχεται το ακατέργαστο
        κερί.
    wax_recommended_candle_application:
      name: Συνιστώμενη εφαρμογή κεριού
      description: Υποδεικνύει τον κύριο τύπο/στυλ κεριών για τον οποίο είναι διαμορφωμένο
        το κερί.
    wax_tackiness_level:
      name: Επίπεδο δυνατότητας κολλήματος κεριού
      description: Περιγράφει το επίπεδο κολλώδους ιδιότητας/πρόσφυσης που παρέχει
        το κερί πάνω στη λεπίδα.
    weapon_system_integration:
      name: Ενσωμάτωση συστήματος όπλων
      description: Υποδεικνύει εάν το όχημα περιλαμβάνει ενσωματωμένα συστήματα όπλων
        ή βάσεις.
    weather_suitability:
      name: Καταλληλότητα καιρικών συνθηκών
      description: Υποδεικνύει τις περιβαλλοντικές συνθήκες για τις οποίες έχουν σχεδιαστεί
        τα γάντια, όπως κρύος ή βροχερός καιρός.
    weave_finish:
      name: Ύφανση/φινίρισμα
      description: Περιγράφει την κύρια ύφανση ή το φινίρισμα του υφάσματος που επηρεάζει
        την υφή και τη γυαλάδα της γραβάτας.
    weave_style:
      name: Στυλ ύφανσης
      description: Καθορίζει το παραδοσιακό μοτίβο ύφανσης που χρησιμοποιείται στην
        κατασκευή του καπέλου Panama, το οποίο επηρεάζει τη διαπνοή, την ευκαμψία,
        την εμφάνιση και την τιμή.
    weave_type:
      name: Τύπος ύφανσης
      description: Προσδιορίζει το στυλ ύφανσης/κατασκευής του υφάσματος (εμπορική
        ονομασία ύφανσης) που επηρεάζει την υφή, τη γυαλάδα και τη διακόσμηση.
    weaving_beater_edge_type:
      name: Τύπος άκρης χτενιού ύφανσης
      description: Περιγράφει το προφίλ της ακμής εργασίας του επίπεδου χτενιού που
        έρχεται σε επαφή με το υφάδι (π.χ. ευθεία ή οδοντωτή).
    weaving_beater_style:
      name: Στυλ χτενιού ύφανσης
      description: Προσδιορίζει το λειτουργικό στυλ/μορφή του χτενιού επίπεδης ύφανσης.
    weaving_shuttle_tip_style:
      name: Στυλ άκρης σαΐτας ύφανσης
      description: Καθορίζει τον σχεδιασμό της μπροστινής άκρης/μύτης της σαΐτας,
        ο οποίος επηρεάζει το πέρασμά της μέσα από το άνοιγμα του στημονιού και την
        πιθανότητα να πιαστεί στις κλωστές του στημονιού.
    weaving_shuttle_use_case:
      name: Περίπτωση χρήσης σαΐτας ύφανσης
      description: Καθορίζει την προβλεπόμενη εφαρμογή ύφανσης για την οποία έχει
        σχεδιαστεί ή βελτιστοποιηθεί η σαΐτα.
    webbing_construction_type:
      name: Τύπος κατασκευής ιμάντα
      description: Περιγράφει τον τύπο ύφανσης ή πλέξης του ιμάντα, ο οποίος επηρεάζει
        τον χειρισμό, την αντοχή και την προβλεπόμενη χρήση του.
    webbing_design:
      name: Σχεδίαση ιμάντα
      description: Περιγράφει το στυλ της μεμβράνης/ιμάντων μεταξύ των δακτύλων, που
        επηρεάζει την αντίσταση στην προπόνηση και την προώθηση.
    weight_adjustability:
      name: Ρυθμιζόμενη δυνατότητα βάρους
      description: Περιγράφει εάν η αντίσταση του προϊόντος μπορεί να αλλάξει από
        τον χρήστη (π.χ., επιλεκτική ή φορτίσιμη) ή εάν είναι σταθερή σε ένα μόνο
        βάρος.
    weight_integration_system:
      name: Σύστημα ενσωμάτωσης βάρους
      description: Περιγράφει αν και πώς τα βάρη έρματος είναι ενσωματωμένα στο BCD
        (π.χ. αφαιρούμενες θήκες βαρών, χωρίς σύστημα, προαιρετικό πρόσθετο).
    weight_plate_compatibility:
      name: Συμβατότητα με δίσκο βάρους
      description: Ορίζει ποιες πλάκες βάρους διαμέτρου δέχεται το μηχάνημα (Olympic,
        Standard ή και οι δύο).
    weight_plate_style:
      name: Στυλ πλάκας βάρους
      description: Ταξινομεί τον σχεδιασμό/τύπο της πλάκας βάρους (π.χ. Olympic, bumper,
        selectorized) για γρήγορο φιλτράρισμα συμβατότητας.
    weightlifting_belt_style:
      name: Στυλ ζώνης άρσης βαρών
      description: Κατηγοριοποιεί τον συνολικό σχεδιασμό ή τη διαμόρφωση του ιμάντα
        με βάση τον σκοπό (π.χ., lever belt, dip belt, tapered belt).
    weightlifting_federation_certification:
      name: Πιστοποίηση της Ομοσπονδίας Άρσης Βαρών
      description: Επίσημη έγκριση ή συμμόρφωση του προϊόντος από ομοσπονδίες αθλοδυναμικών
        αθλημάτων, όπως η IPF ή η IWF.
    wetsuit_boot_height:
      name: Ύψος μπότας στολής κατάδυσης
      description: Κατηγοριοποιεί το ύψος/κόψιμο της μπότας στο πόδι, επηρεάζοντας
        την κάλυψη, την κινητικότητα και την είσοδο νερού.
    wetsuit_entry_system:
      name: Σύστημα για να φορέσετε στολής κατάδυσης
      description: Περιγράφει τον τύπο και τη θέση του συστήματος ανοίγματος/φερμουάρ
        που χρησιμοποιείται για να φορέσετε τη στολή κατάδυσης.
    wetsuit_seam_construction:
      name: Κατασκευή ραφής στολής κατάδυσης
      description: Καθορίζει τον τρόπο κατασκευής και στεγανοποίησης των ραφών, επηρεάζοντας
        τη ζεστασιά, την ευελιξία και την ανθεκτικότητα.
    wheat_product_form:
      name: Μορφή προϊόντος σιταριού
      description: Προσδιορίζει τη φυσική ή επεξεργασμένη μορφή του προϊόντος σίτου.
    wheel_arrangement:
      name: Διάταξη τροχών
      description: Καθορίζει τη διάταξη τροχών της ατμομηχανής σύμφωνα με τη σημειογραφία
        Whyte, η οποία αποτελεί βασικό χαρακτηριστικό και συχνό όρο αναζήτησης για
        συλλεκτικά μοντέλα.
    wheel_brake_type:
      name: Τύπος φρένου τροχού
      description: Περιγράφει τη διαμόρφωση του συστήματος φρένων που διαθέτουν οι
        τροχοί ή οι ρόδες του καροτσιού.
    wheel_chock_grip_features:
      name: Χαρακτηριστικά πρόσφυσης τάκων τροχού
      description: Χαρακτηριστικά σχεδίασης πρόσφυσης που ενισχύουν τη συγκράτηση
        σε επιφάνειες και έναντι των ελαστικών.
    wheel_cleaner_acidity_ph_category:
      name: Κατηγορία οξύτητας / pH καθαριστικού ζαντών
      description: Υποδεικνύει εάν το καθαριστικό τροχών είναι όξινο, ουδέτερο ή αλκαλικό
        (και προαιρετικά αν διατίθεται ως ρυθμισμένο σε ισορροπημένο pH).
    wheel_cleaner_formula_type:
      name: Τύπος φόρμουλας καθαριστικού τροχών
      description: Για καθαριστικά ζαντών και σχετικά διαλύματα πλυσίματος, υποδεικνύει
        την κύρια κατηγορία σύνθεσης του προϊόντος (π.χ. με βάση οξέα, χωρίς οξέα,
        ουδέτερο pH/ισορροπημένο ή αντίδραση με σίδηρο).
    wheel_construction_type:
      name: Τύπος κατασκευής τροχού
      description: Καθορίζει τη μέθοδο παρασκευής/κατασκευής του τροχού.
    wheel_contaminant_target:
      name: Στόχος ρύπανσης τροχού
      description: Καθορίζει τους κύριους τύπους ρύπων τους οποίους έχει σχεδιαστεί
        να αφαιρεί το καθαριστικό.
    wheel_core_type:
      name: Τύπος κατασκευής τροχού
      description: Περιγράφει το στυλ κατασκευής του πυρήνα του τροχού, το οποίο επηρεάζει
        το βάρος, την ακαμψία και την ενέργεια.
    wheel_cylinder_inlet_port_thread_standard:
      name: Τυποποίηση σπειρώματος θύρας εισόδου κυλίνδρου τροχού
      description: Καθορίζει το πρότυπο σπειρώματος της θύρας εισόδου της γραμμής
        φρένων στον κύλινδρο τροχού (π.χ. μετρικό bubble flare ή SAE inverted flare).
    wheel_fastener_seat_type:
      name: Τύπος καθίσματος με στερέωση τροχού
      description: Καθορίζει τον τύπο έδρας του μπουλονιού/παξιμαδιού τροχού που εφάπτεται
        στη ζάντα (π.χ. κωνική/κωνική έδρα, σφαιρική/ακτινωτή, επίπεδη, mag/κυλινδρική).
    wheel_illumination:
      name: Φωτισμός τροχών
      description: Υποδεικνύει εάν ο τροχός διαθέτει ενσωματωμένο φωτισμό ή λειτουργίες
        λάμψης.
    wheel_material:
      name: Υλικό τροχού
      description: Προσδιορίζει την κύρια σύνθεση των τροχών, η οποία επηρεάζει την
        ανθεκτικότητα, την πρόσφυση και την απόσβεση κραδασμών.
    wheel_profile:
      name: Προφίλ τροχού
      description: Περιγράφει το σχήμα της εγκάρσιας διατομής του τροχού, το οποίο
        επηρεάζει την ταχύτητα, την πρόσφυση και την ευελιξία.
    wheel_setup_type:
      name: Τύπος διάταξης τροχών
      description: Ορίζει το στυλ διαμόρφωσης των τροχών που χρησιμοποιείται στα πατίνια.
    wheel_system_finish:
      name: Φινίρισμα συστήματος τροχών
      description: Φινίρισμα/επίστρωση επιφάνειας ζαντών/τροχών και ορισμένων εξαρτημάτων/παρελκομένων
        τροχών.
    whip_style:
      name: Στυλ μαστιγίου
      description: Κατηγοριοποιεί το προϊόν ανάλογα με τον συγκεκριμένο τύπο ιππικού
        μαστιγίου ή crop ή τη χρήση/ιππική πειθαρχία για την οποία προορίζεται.
    whipped_cream_base:
      name: Βάση σαντιγί
      description: Προσδιορίζει το κύριο βασικό συστατικό που χρησιμοποιείται για
        την παρασκευή της σαντιγί, όπως κρέμα γάλακτος ή καρύδα.
    whipped_cream_form:
      name: Μορφή σαντιγί
      description: Υποδεικνύει τη φυσική μορφή στην οποία πωλείται η σαντιγί.
    whistle_head_material:
      name: Υλικό κεφαλής σφυρίχτρας
      description: Καθορίζει το υλικό της κεφαλής/επιστομίου της σφυρίχτρας (μπλοκ/κεφαλή
        σφυρίχτρας).
    whistle_light_features:
      name: Χαρακτηριστικά σφυρίχτρας
      description: Υποδεικνύει εάν η σφυρίχτρα περιλαμβάνει ενσωματωμένα εφέ φωτισμού
        για πάρτι (π.χ. LED).
    whistle_purpose:
      name: Σκοπός σφυρίχτρας
      description: Προσδιορίζει την κύρια προβλεπόμενη εφαρμογή της σφυρίχτρας (αθλητική
        προπόνηση, θαλάσσια ασφάλεια, εκπαίδευση σκύλων, κ.λπ.).
    whistle_sound_style:
      name: Στυλ ήχου σφυρίχτρας
      description: Περιγράφει το στυλ/χαρακτήρα της εξόδου ήχου σφυρίχτρας (π.χ. μονοτονικό
        έναντι πολυτονικού).
    white_glue_finish_appearance_when_dry:
      name: Φινίρισμα/εμφάνιση λευκής κόλλας όταν στεγνώσει
      description: Καθορίζει την εμφάνιση της κόλλας μετά το στέγνωμα για χρήση σε
        χειροτεχνίες/γραφείο (π.χ., διαφανής έναντι αδιαφανούς).
    white_glue_washability:
      name: Δυνατότητα πλυσίματος λευκής κόλλας
      description: Υποδεικνύει εάν η κόλλα που έχει ξεραθεί μπορεί να ξεπλυθεί/καθαριστεί
        από υφάσματα ή δέρμα.
    whitewater_kayak_style:
      name: Καγιάκ κατάβασης ποταμών
      description: Κύρια σχεδιαστική χρήση για κατάβαση ποταμών (π.χ. Creekboat, River
        Runner, Playboat).
    whitewater_rating_class:
      name: Βαθμολογία κατάβασης ποταμών (κατηγορία)
      description: Η υψηλότερη κατηγορία της Διεθνούς Κλίμακας Δυσκολίας Ποταμού (International
        Scale of River Difficulty) στην οποία είναι αξιολογημένη η λέμβος για να ανταπεξέρχεται.
    whorl_mounting_interface:
      name: Διεπαφή στερέωσης σφονδύλου
      description: Τρόπος με τον οποίο ο σφόνδυλος προσαρτάται στον περιστρεφόμενο
        τροχό (τύπος άξονα/σύνδεσης).
    wick_construction_type:
      name: Τύπος κατασκευής φυτιλιού
      description: Η κατασκευή/στυλ του φυτιλιού (πλεγμένο, επίπεδο, τετράγωνη πλέξη,
        με πυρήνα, ξύλινο, κ.λπ.).
    wick_core_type:
      name: Τύπος πυρήνα φυτιλιού
      description: Καθορίζει αν το φυτίλι είναι χωρίς πυρήνα ή περιλαμβάνει υλικό
        πυρήνα (π.χ. με χάρτινο ή ψευδαργυρικό πυρήνα), κάτι που επηρεάζει την ακαμψία
        και τα χαρακτηριστικά καύσης.
    wick_tab_crimp_type:
      name: Τύπος πτύχωσης της μεταλλικής βάσης του φυτιλιού
      description: Πώς η μεταλλική βάση του φυτιλιού συγκρατεί το φυτίλι (τύπος κατασκευής/πτύχωσης).
    wick_tab_material:
      name: Υλικό γλωττίδας φυτιλιού
      description: Υλικό της μεταλλικής βάσης/στήριξης του φυτιλιού (συνήθως λευκοσίδηρος),
        σχετικό με την αντοχή στη διάβρωση και τις κανονιστικές απαιτήσεις (π.χ. αποφυγή
        μολύβδου).
    wick_tab_shape:
      name: Σχήμα βάσης στήριξης φυτιλιού
      description: Σχήμα/μορφή της μεταλλικής βάσης του φυτιλιού.
    wick_type_included:
      name: Περιλαμβάνεται τύπος φυτιλιού
      description: Καθορίζει το υλικό/τύπο του φυτιλιού που περιλαμβάνεται στο κιτ.
    wig_fiber_material:
      name: Υλικό ινών περούκας
      description: Προσδιορίζει την κύρια ίνα που χρησιμοποιείται για την τρίχα της
        περούκας, ώστε ο αγοραστής να μπορεί εύκολα να επιλέξει ανάμεσα σε ποικιλίες
        ανθρώπινης τρίχας και συνθετικές επιλογές με διαφορετικά χαρακτηριστικά styling
        και μακροζωίας.
    wildlife_attractant_scent:
      name: Άρωμα ελκυστικό για άγρια ζωή
      description: Προσδιορίζει το κύριο άρωμα που χρησιμοποιείται για να δελεάσει
        την άγρια ζωή, καλύπτοντας φυσικές μυρωδιές τροφίμων και μυρωδιές τύπου φερορμονών.
    willow_grade:
      name: Κατηγορία ποιότητας ιτιάς
      description: Καθορίζει την ποιοτική κατηγορία της ιτιάς που χρησιμοποιείται,
        υποδεικνύοντας τη δομή των ινών και το συνολικό επίπεδο απόδοσης.
    willow_type:
      name: Τύπος ιτιάς
      description: Καθορίζει το είδος ιτιάς ή εναλλακτικού υλικού που χρησιμοποιείται
        για τη λεπίδα του ρόπαλου, το οποίο επηρεάζει σημαντικά την απόδοση, την αντοχή
        και την τιμή.
    wind_up_mechanism_type:
      name: Τύπος μηχανισμού κουρδίσματος
      description: Καθορίζει τον τρόπο με τον οποίο το παιχνίδι κουρδίζεται ή ενεργοποιείται.
    wind_up_toy_movement_pattern:
      name: Μοτίβο κίνησης παιχνιδιού με κούρδισμα
      description: Περιγράφει την κύρια κίνηση που παράγεται όταν το παιχνίδι κουρδίζεται.
    windbreak_purpose:
      name: Σκοπός ανεμοφράκτη
      description: Ορίζει την κύρια προβλεπόμενη χρήση του ανεμοφράκτη.
    windfoil_board_mounting_system:
      name: Σύστημα τοποθέτησης σανίδας windfoil
      description: Καθορίζει το κουτί/διεπαφή στερέωσης foil που είναι ενσωματωμένο
        στη σανίδα windfoil.
    windfoil_sail_style:
      name: Στυλ πανιού windfoil
      description: Κατηγοριοποιεί το πανί ανάλογα με το στυλ οδήγησης ή την αγωνιστική/αθλητική
        χρήση για την οποία προορίζεται.
    winding_direction:
      name: Κατεύθυνση περιέλιξης
      description: Υποδεικνύει το μοτίβο περιστροφής που υποστηρίζεται από το κουρδιστήρι
        του ρολογιού (δεξιόστροφα, αριστερόστροφα ή αμφίδρομη).
    winding_method:
      name: Μέθοδος περιέλιξης
      description: Περιγράφει τον τρόπο με τον οποίο το υφάδι προορίζεται να τυλίγεται/φορτώνεται
        για χρήση στη σαΐτα.
    winding_speed_control_type:
      name: Τύπος ελέγχου ταχύτητας περιέλιξης
      description: Υποδεικνύει τη μέθοδο που χρησιμοποιείται για τον έλεγχο της ταχύτητας
        περιέλιξης κατά τη χρήση.
    winding_type:
      name: Τύπος περιέλιξης
      description: Καθορίζει την κατασκευή περιέλιξης των χορδών μπάσου (εξωτερικό
        προφίλ περιτύλιξης).
    windlass_control_station_type:
      name: Τύπος σταθμού ελέγχου βαρούλκου
      description: Τύπος διεπαφής ελέγχου που περιλαμβάνεται ή υποστηρίζεται για τη
        λειτουργία του βαρούλου.
    windlass_mount_type:
      name: Τύπος βάσης βαρούλκου
      description: Πού/πώς προορίζεται να τοποθετηθεί το βαρούλκο στο σκάφος.
    window_component_location:
      name: Τοποθεσία στοιχείου παραθύρου
      description: Καθορίζει σε ποιο παράθυρο/άνοιγμα του οχήματος εφαρμόζεται το
        εξάρτημα (π.χ. παρμπρίζ, τζάμι πόρτας, πίσω παράθυρο ή πλευρικό μικρό παράθυρο).
    window_configuration:
      name: Διαμόρφωση παραθύρου
      description: Υποδεικνύει την ύπαρξη και το σχετικό μέγεθος διαφανών «παραθύρων»
        ορατότητας στο φτερό wingfoil.
    window_glass_construction:
      name: Κατασκευή τζαμιού παραθύρου
      description: Καθορίζει την κατασκευή ασφαλείας/ελασματοποίησης του τζαμιού παραθύρου
        του οχήματος.
    window_glass_features:
      name: Χαρακτηριστικά τζαμιού παραθύρων
      description: Υποδεικνύει εάν το τζάμι υποστηρίζεται από ενσωματωμένες τεχνολογίες
        οχήματος (π.χ., βάση αισθητήρα βροχής, βάση κάμερας).
    window_glass_finish:
      name: Φινίρισμα τζαμιού παραθύρου
      description: Καθορίζει το φινίρισμα/τόνωση/σκουρότητα του τζαμιού παραθύρου
        οχήματος.
    window_glass_tint_color:
      name: Χρώμα φιμέ τζαμιού
      description: Καθορίζει την απόχρωση του φιμέ γυαλιού (τον χρωματικό τόνο της
        απόχρωσης), όχι το γενικό χρώμα του προϊόντος.
    window_glass_tint_level:
      name: Επίπεδο απόχρωσης φιμέ γυαλιού παραθύρου
      description: Υποδεικνύει την κατά προσέγγιση εργοστασιακού τύπου σκουρότητα
        φιμέ του τζαμιού παραθύρου (όχι μεμβράνη aftermarket). Χρησιμοποιήστε περιγραφικά
        επίπεδα όταν το ακριβές VLT δεν είναι γνωστό.
    window_net_latch_mechanism:
      name: Μηχανισμός κλειδώματος σίτας παραθύρου με μάνδαλο
      description: Καθορίζει τον μηχανισμό κλειδώματος/απασφάλισης που χρησιμοποιείται
        για τη σίτα παραθύρου (π.χ., κουμπί, μοχλός, πόρπη τύπου ζώνης ασφαλείας).
    window_net_mounting_hardware:
      name: Υλικό/εξαρτήματα στερέωσης σίτας παραθύρου
      description: Προσδιορίζει τον τύπο στερέωσης υλικού εξοπλισμού ή τη μέθοδο στερέωσης
        που χρησιμοποιείται για την εγκατάσταση της σίτας παραθύρου (π.χ. κλιπ, βίδες,
        στυλ γάντζου/ράβδου) ή εάν περιλαμβάνεται υλικός εξοπλισμός.
    window_net_opening_direction:
      name: Κατεύθυνση ανοίγματος σίτας παραθύρου
      description: Καθορίζει τον τρόπο ανοίγματος/απασφάλισης της σίτας παραθύρου
        σε σχέση με τον επιβάτη για την έξοδο και τη συμμόρφωση με τους κανόνες.
    window_regulator_operation:
      name: Λειτουργία του ρυθμιστή παραθύρων
      description: Καθορίζει τον τρόπο λειτουργίας του γρύλου παραθύρου (χειροκίνητος
        ή ηλεκτρικός).
    windshield_coverage_area:
      name: Περιοχή κάλυψης παρμπρίζ
      description: Καθορίζει ποια τμήματα της μπροστινής εξωτερικής πλευράς του οχήματος
        προορίζεται να προστατεύει το κάλυμμα παρμπρίζ (π.χ. μόνο παρμπρίζ ή και υαλοκαθαριστήρες,
        καθρέφτες, πλευρικά παράθυρα ή άκρη καπό).
    windshield_mount_attachment_method:
      name: Μέθοδος στερέωσης βάσης στο παρμπρίζ
      description: Καθορίζει τον τρόπο με τον οποίο η βάση προσκολλάται ή πιάνει την
        επιφάνεια του παρμπρίζ.
    windshield_washer_fluid_seasonality:
      name: Εποχικότητα υγρού πλύσης παρμπρίζ
      description: Υποδεικνύει την προβλεπόμενη εποχή/κλίμα ή την κύρια χρήση της
        σύνθεσης υγρού υαλοκαθαριστήρα (π.χ., χειμερινό αποπαγωτικό, καλοκαιρινό καθαριστικό,
        όλες τις εποχές).
    windsurf_fin_style:
      name: Στυλ πτερυγίου windsurf
      description: Ταξινομεί το πτερύγιο ανάλογα με το προβλεπόμενο άθλημα ιστιοπλοΐας
        ή το στυλ χρήσης (π.χ. κύμα, slalom, weed).
    windsurfing_connection_standard:
      name: Πρότυπο σύνδεσης για windsurf
      description: Μηχανική διεπαφή ή τύπος κουτιού που χρησιμοποιείται για τη σύνδεση
        του εξαρτήματος στην πλακέτα ή τη διάταξη.
    windsurfing_sail_style:
      name: Στυλ πανιού ιστιοσανίδας
      description: Κατηγοριοποιεί την προβλεπόμενη χρήση ή αγωνιστική/αθλητική κατηγορία
        του πανιού, όπως wave, freeride ή foil.
    wine_additive_type:
      name: Τύπος πρόσθετου κρασιού
      description: Καθορίζει το είδος του προϊόντος για την παραγωγή κόκκινου κρασιού
        (π.χ. συστατικό, πρόσθετο, μαγιά, μέσο διαύγασης, κιτ κ.λπ.).
    wine_body:
      name: Σώμα κρασιού
      description: Περιγράφει το αντιληπτό βάρος και την αίσθηση του κρασιού στο στόμα.
    wine_carbonation:
      name: Ανθράκωση κρασιού
      description: Υποδεικνύει αν το κρασί είναι μη αφρώδες, ημιαφρώδες ή αφρώδες
        και, όπου ισχύει, την ένταση της ανθράκωσης.
    wine_making_ingredient_type:
      name: Τύπος συστατικού οινοποίησης
      description: Καθορίζει την κατηγορία λειτουργικού συστατικού για αναλώσιμα πρόσθετα
        και συστατικά οινοποίησης.
    wine_making_stage:
      name: Στάδιο οινοποίησης
      description: Προσδιορίζει το στάδιο της διαδικασίας οινοποίησης για το οποίο
        προορίζεται το προϊόν.
    wine_style:
      name: Στυλ κρασιού
      description: Ταξινομεί το ευρύτερο στυλ παραγωγής του κρασιού πέραν από το χρώμα,
        όπως μη αφρώδες, αφρώδες ή ενισχυμένο.
    winemaking_process_stage:
      name: Στάδιο διαδικασίας οινοποίησης
      description: Υποδεικνύει το κύριο στάδιο της διαδικασίας οινοποίησης για το
        οποίο προορίζεται η προμήθεια.
    wing_count:
      name: Αριθμός πτερύγων
      description: Αριθμός πτερυγίων/βραχιόνων στο μπούμερανγκ.
    wing_handle_type:
      name: Τύπος λαβής πτερυγίου
      description: Καθορίζει το στυλ του συστήματος χειρολαβής στο πτερύγιο wingfoil.
    wing_part_type:
      name: Τύπος εξαρτήματος πτερυγίου
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα ή ανταλλακτικό για ένα πτερύγιο
        wingfoil.
    wingfoiling_style:
      name: Στυλ Wingfoiling
      description: Υποδεικνύει το συγκεκριμένο στυλ οδήγησης ή την τεχνική wingfoiling
        στα οποία στοχεύει το προϊόν.
    wiper_arm_finish:
      name: Φινίρισμα βραχίονα υαλοκαθαριστήρα
      description: Φινίρισμα επιφάνειας ή προστατευτική επίστρωση που εφαρμόζεται
        στον βραχίονα του υαλοκαθαριστήρα, που επηρεάζει διάβρωση από κρούση και εμφάνιση.
    wiper_arm_pivot_mount_type:
      name: Τύπος περιστρεφόμενης βάσης βραχίονα υαλοκαθαριστήρα
      description: Καθορίζει τον τρόπο με τον οποίο στερεώνεται ο βραχίονας του υαλοκαθαριστήρα
        στον σύνδεσμο ή τον άξονα περιστροφής του υαλοκαθαριστήρα του οχήματος.
    wiper_blade_attachment_type:
      name: Τύπος προσάρτησης μάκτρου υαλοκαθαριστήρα
      description: Καθορίζει τον τύπο συνδέσμου/προσαρμογής που χρησιμοποιείται για
        τη στερέωση του μάκτρου υαλοκαθαριστήρα στον βραχίονα.
    wiper_blade_rubber_material:
      name: Υλικό από καουτσούκ μάκτρων υαλοκαθαριστήρα
      description: Υλικό του στοιχείου καθαρισμού (ένθετο/ανταλλακτικό) που έρχεται
        σε επαφή με το τζάμι.
    wiper_system_position:
      name: Θέση συστήματος υαλοκαθαριστήρων
      description: Υποδεικνύει τη θέση τοποθέτησης στο όχημα για το σύστημα υαλοκαθαριστήρων.
    wire_coating_material:
      name: Υλικό επικάλυψης σύρματος
      description: Καθορίζει το εξωτερικό υλικό επικάλυψης/μανδύα του σύρματος (όχι
        το εσωτερικό σύρμα), το οποίο επηρεάζει την αντοχή στην τριβή και την ομαλή
        διέλευση μέσα από τις χαντρές.
    wire_coating_type:
      name: Τύπος επίστρωσης σύρματος
      description: Καθορίζει εάν και πώς το σύρμα είναι επικαλυμμένο/καλυμμένο (για
        χρώμα, προστασία και υφή).
    wire_construction_type:
      name: Τύπος κατασκευής ελαστικού
      description: Καθορίζει τη φυσική δομή του σύρματος για χάντρες, όπως πολύκλωνο
        ή μονόκλωνο, καθώς και αν είναι επικαλυμμένο.
    wire_finish:
      name: Φινίρισμα σύρματος
      description: Καθορίζει το φινίρισμα της επιφάνειας, την επίστρωση ή την επιμετάλλωση
        που εφαρμόζεται στο σύρμα (π.χ. γυαλισμένο, εμαγιέ, γαλβανισμένο, επιμεταλλωμένο),
        το οποίο επηρεάζει την εμφάνιση και την αντοχή στο θάμπωμα/διάβρωση.
    wire_gauge_awg:
      name: Πάχος σύρματος (AWG)
      description: Αμερικανικό μέγεθος σύρματος (AWG) των αγωγών που χρησιμοποιούνται
        στην καλωδίωση.
    wire_insulation_material:
      name: Υλικό μόνωσης σύρματος
      description: Υλικό της μόνωσης/επένδυσης του καλωδίου που χρησιμοποιείται στη
        δέσμη καλωδίων, το οποίο επηρεάζει την αντοχή σε θερμοκρασία και χημικά.
    wire_packaging_type:
      name: Τύπος συσκευασίας καλωδίου
      description: Καθορίζει τον τρόπο πώλησης/συσκευασίας του σύρματος.
    wire_shape_profile:
      name: Σχήμα/προφίλ σύρματος
      description: Περιγράφει το σχήμα της διατομής του σύρματος.
    wiring_configuration:
      name: Διαμόρφωση καλωδίωσης
      description: Υποδεικνύει εάν το ξίφος μονομαχίας (epee) ξιφασκίας παρέχεται
        με προεγκατεστημένη καλωδίωση για ηλεκτρονική καταγραφή πόντων, χωρίς καλωδίωση,
        ασύρματο, ή αν προορίζεται για μη ηλεκτρική εξάσκηση.
    wobbler_style:
      name: Τύπος Wobbler
      description: Ορίζει το συγκεκριμένο στυλ σχεδιασμού/κίνησης του τεχνητού δολώματος
        (wobbler), όπως crankbait ή jerkbait.
    wood_block_surface_preparation:
      name: Προετοιμασία επιφάνειας ξύλινου κύβου
      description: Υποδεικνύει την έτοιμη προς χρήση επιφάνεια του ξύλινου κύβου για
        φινίρισμα και χειροτεχνία.
    wood_grain_direction:
      name: Κατεύθυνση νερών ξύλου
      description: Η κατεύθυνση των νερών του ξύλου σε σχέση με τη μεγαλύτερη διάσταση
        του προϊόντος (σημαντική για την αντοχή, τη συμπεριφορά στην κοπή και την
        εμφάνιση).
    wood_slice_edge_style:
      name: Στυλ άκρης ξύλινης φέτας
      description: Κατάσταση της περιφέρειας/άκρης της φέτας, όπως φυσικός φλοιός
        (κούτσουρο) έναντι λείας/λειασμένης άκρης.
    wooden_block_special_features:
      name: Ειδικά χαρακτηριστικά ξύλινων κύβων
      description: Αξιοσημείωτα λειτουργικά χαρακτηριστικά που περιλαμβάνονται στο
        σετ ξύλινων κύβων.
    woodwind_body_construction:
      name: Κατασκευή σώματος ξύλινων πνευστών
      description: Υποδεικνύει εάν το όργανο είναι κατασκευασμένο σε ένα τεμάχιο ή
        σε πολλά τμήματα (π.χ., 2 τεμάχια/3 τεμάχια), επηρεάζοντας τον καθαρισμό,
        την αποθήκευση και τη φορητότητα.
    woodwind_polishing_cloth_intended_use:
      name: Προβλεπόμενη χρήση πανιού γυαλίσματος ξύλινων πνευστών
      description: Καθορίζει ποιο ύφασμα προορίζεται κυρίως να καθαρίζει/γυαλίζει
        ένα ξύλινο πνευστό όργανο.
    woodwind_small_part_type:
      name: Τύπος μικροεξαρτήματος ξύλινων πνευστών
      description: Καθορίζει τι είδους ανταλλακτικό κλαρινέτου είναι το κομμάτι (π.χ.,
        μηχανισμός κλειδιών, τάπες/φελλός/τσόχα, δακτύλιοι).
    woofer_mounting_type:
      name: Τύπος στερέωσης woofer
      description: Ο τρόπος με τον οποίο προορίζεται να εγκατασταθεί το γούφερ (ανοιχτού
        χώρου/free-air έναντι κουτιού/καμπίνας) καθώς και οι συνήθεις μορφές τοποθέτησης
        σε οχήματα.
    woofer_surround_material:
      name: Υλικό ανάρτησης (surround) woofer
      description: Το υλικό που χρησιμοποιείται για την εξωτερική ανάρτηση (surround)
        του woofer (ο εξωτερικός δακτύλιος συγκράτησης του κώνου).
    worn_on_finger:
      name: Δάχτυλο τοποθέτησης
      description: Καθορίζει σε ποιο δάχτυλο προορίζεται να φορεθεί ο οδηγός δακτυλήθρας.
    wrap_style:
      name: Στυλ τυλίγματος
      description: Υποδηλώνει πόσες φορές η ζώνη πρόκειται να τυλιχθεί γύρω από τη
        μέση.
    wrapping_occasion:
      name: Περίσταση δώρου
      description: Η κύρια εορταστική περίσταση ή εκδήλωση για την οποία προορίζεται
        το χαρτί περιτυλίγματος.
    wrapping_paper_features:
      name: Χαρακτηριστικά χαρτιού περιτυλίγματος
      description: Λειτουργικές ιδιότητες και χαρακτηριστικά βιωσιμότητας του χαρτιού
        περιτυλίγματος, όπως αντοχή στο σκίσιμο, περιεκτικότητα σε ανακυκλωμένο υλικό
        ή προ-κομμένα φύλλα.
    wrestling_dummy_design:
      name: Σχεδιασμός ανδρείκελου πάλης
      description: Το συνολικό σχήμα του σώματος ή η στάση του ανδρείκελου, όπως όρθια
        ανθρώπινη μορφή ή σάκος ρίψεων, που καθορίζει το είδος των ασκήσεων προπόνησης.
    wrestling_mat_safety_certifications:
      name: Πιστοποιήσεις ασφάλειας για τάπητα πάλης
      description: Παραθέτει τα πρότυπα ή τις πιστοποιήσεις ασφαλείας του κλάδου ή
        επίσημων αθλητικών φορέων/ομοσπονδιών που πληροί ο τάπητας.
    wrist_strap_style:
      name: Στυλ λουριού καρπού
      description: Περιγράφει το στυλ του περικάρπιου (ή την απουσία του), που επηρεάζει
        τη στήριξη και την εφαρμογή.
    wrist_support_style:
      name: Στυλ υποστήριξης καρπού
      description: Ο συγκεκριμένος σχεδιασμός ή ο τύπος του βοηθήματος καρπού (π.χ.
        νάρθηκας, γάντι, αθλητική ταινία/tape, επίδεσμος), ώστε να διευκολύνεται η
        επιλογή ανάλογα με την προτίμηση του χρήστη και την απαιτούμενη απόδοση.
    xylophone_range_octaves:
      name: Εύρος ξυλόφωνου (οκτάβες)
      description: Η συνολική έκταση του ξυλόφωνου εκφρασμένη σε οκτάβες (π.χ., 2.5,
        3 ή 4 οκτάβες).
    xylophone_resonator_type:
      name: Τύπος αντηχείου ξυλόφωνου
      description: Τύπος συστήματος συντονισμού που χρησιμοποιείται για την ενίσχυση
        του τόνου (εάν υπάρχει).
    yam_variety:
      name: Ποικιλία γιαμ
      description: Καθορίζει την καλλιεργητική ποικιλία ή την κοινή ποικιλία γιαμ
        που πωλείται (π.χ., μωβ, κίτρινο, elephant foot).
    yarn_cutter_physical_style:
      name: Φυσικό στυλ κοπής νήματος
      description: Προσδιορίζει το φυσικό στυλ ενός κόφτη νήματος (π.χ. μενταγιόν,
        δαχτυλίδι, ψαλίδι) για τη διευκόλυνση της αναζήτησης και του φιλτραρίσματος
        εντός αυτής της κατηγορίας.
    yarn_finish_or_effect:
      name: Φινίρισμα ή εφέ νήματος
      description: Επισημαίνει ειδικές οπτικές ή λειτουργικές επεξεργασίες που έχουν
        εφαρμοστεί στο νήμα, όπως ο φθορισμός ή η μεταλλική λάμψη (χρυσόσκονη).
    yarn_guide_style:
      name: Τύπος οδηγού νήματος
      description: Το φυσικό στυλ του εξαρτήματος που καθοδηγεί το νήμα.
    yarn_swift_adjustability:
      name: Δυνατότητα ρύθμισης ανέμης νήματος
      description: Υποδεικνύει εάν και με ποιο τρόπο μπορεί να ρυθμιστεί η ανέμη (επεκτάσιμη,
        πτυσσόμενη/αναδιπλούμενη), κάτι που επηρεάζει την αποθήκευση και το εύρος
        μεγεθών κούκλας/κουβαριού που μπορεί να δεχτεί.
    yarn_swift_bearing_type:
      name: Τύπος ρουλεμάν ανέμης νήματος
      description: Περιγράφει τον μηχανισμό υποστήριξης περιστροφής (π.χ. ένσφαιρα
        ρουλεμάν) που επηρεάζει την ομαλότητα και την ταχύτητα περιέλιξης.
    yeast_application:
      name: Εφαρμογή μαγιάς
      description: Υποδεικνύει την κύρια προβλεπόμενη χρήση του προϊόντος ζύμης στη
        μαγειρική ή στη ζύμωση.
    yo_yo_accessory_part_type:
      name: Τύπος αξεσουάρ/εξαρτήματος γιο-γιο
      description: Προσδιορίζει τι είδους ανταλλακτικό γιο-γιο ή αξεσουάρ είναι το
        προϊόν (π.χ. κορδόνι, ρουλεμάν, αυτοκόλλητα/επιθέματα απόκρισης).
    yo_yo_axle_system_type:
      name: Τύπος συστήματος άξονα γιο-γιο
      description: Ο τρόπος κατασκευής του άξονα του γιο-γιο (π.χ. σταθερός άξονας
        έναντι περιστρεφόμενου άξονα/transaxle), που επηρεάζει την αίσθηση του παιχνιδιού
        και τη συντήρηση.
    yo_yo_bearing_size_class:
      name: Κατηγορία μεγέθους ρουλεμάν γιο-γιο
      description: Η τυποποιημένη κατηγορία μεγέθους ρουλεμάν που χρησιμοποιείται
        στο γιο-γιο, όπου αυτό εφαρμόζεται.
    yo_yo_bearing_type:
      name: Τύπος ρουλεμάν γιο-γιο
      description: Διαμόρφωση ρουλεμάν που επηρεάζει την απόκριση και τα χαρακτηριστικά
        περιστροφής.
    yo_yo_play_style:
      name: Στυλ παιχνιδιού γιο-γιο
      description: Το κύριο προβλεπόμενο στυλ παιχνιδιού του γιο-γιο, αντικατοπτρίζοντας
        την κατηγορία κόλπων (tricks) ή χρήσης κορδονιού για την οποία έχει σχεδιαστεί
        το προϊόν.
    yo_yo_response_system:
      name: Σύστημα απόκρισης γιο-γιο
      description: Καθορίζει τον μηχανισμό απόκρισης γιο-γιο για τον οποίο έχει σχεδιαστεί
        αυτό το μέρος (συμβατότητα).
    yo_yo_responsiveness:
      name: Απόκριση γιο-γιο
      description: Ορίζει αν το γιο-γιο επιστρέφει στο χέρι με ένα απλό τράβηγμα (άμεσης
        απόκρισης) ή αν απαιτεί ειδικό κόλπο μαζέματος (χωρίς απόκριση).
    yo_yo_string_material:
      name: Υλικό σπάγκου γιο-γιο
      description: Η σύνθεση του υλικού του σπάγκου για το γιο-γιο.
    yogurt_base_ingredient:
      name: Βασικό συστατικό γιαουρτιού
      description: Προσδιορίζει την κύρια πηγή (ζωικό γάλα ή φυτική βάση) που χρησιμοποιείται
        για την παρασκευή του γιαουρτιού, στοιχείο εξαιρετικά σημαντικό για τις διατροφικές
        προτιμήσεις και την αποφυγή αλλεργιογόνων.
    yoke_type:
      name: Τύπος βάσης στήριξης (ζυγού)
      description: Καθορίζει τον τύπο της βάσης (λίκνου ή ζυγού) που στηρίζει το όπλο
        επάνω στο μονόποδο.
    zill_playing_style:
      name: Στυλ παιξίματος zill
      description: Προβλεπόμενο πλαίσιο χρήσης ή στυλ εκτέλεσης (συνήθως belly dance
        ή ορχηστρικές/πολιτισμικές παραλλαγές).
    zill_strap_material:
      name: Υλικό ιμάντα zill
      description: Υλικό του ιμάντα δακτύλου/λάστιχου που χρησιμοποιείται για τη συγκράτηση
        των κυμβάλων δακτύλου (ζίλια) (εάν περιλαμβάνονται), το οποίο επηρεάζει την
        άνεση, την ανθεκτικότητα και το κράτημα.
    zills_strap_adjustability:
      name: Δυνατότητα ρύθμισης του ιμάντα για τα ζίλια
      description: Εάν και πώς μπορεί να ρυθμιστεί η εφαρμογή του παρεχόμενου περικάρπιου.
    zipper_application:
      name: Εφαρμογή φερμουάρ
      description: Καθορίζει την προβλεπόμενη χρήση ή την εφαρμογή για την οποία έχει
        σχεδιαστεί το φερμουάρ.
    zipper_chain_type:
      name: Τύπος αλυσίδας με φερμουάρ
      description: Καθορίζει την κατασκευή/τύπο της αλυσίδας/της οδόντωσης του φερμουάρ.
    zipper_end_type:
      name: Τύπος στοπ φερμουάρ
      description: Υποδεικνύει τον τρόπο τερματισμού του φερμουάρ και αν είναι διαιρούμενο
        (ανοιχτού τύπου) ή μη διαιρούμενο (κλειστού τύπου), συμπεριλαμβανομένων των
        κοινών εξαρτημάτων διαχωρισμού που χρησιμοποιούνται σε φερμουάρ για χειροτεχνίες.
    zipper_gauge:
      name: Μέγεθος (νούμερο) φερμουάρ
      description: 'Υποδεικνύει τον χαρακτηρισμό του μεγέθους αλυσίδας/μέγεθος με
        φερμουάρ, που συνήθως εκφράζεται ως αριθμός με το σύμβολο # (για παράδειγμα,
        #3 ή #5) και συνδέεται με το πλάτος των δοντιών/της σπείρας και την προβλεπόμενη
        χρήση.'
    zipper_opening_length:
      name: Μήκος ανοίγματος φερμουάρ
      description: Καθορίζει το βαθμό στον οποίο ανοίγει το μπροστινό μέρος με φερμουάρ,
        διακρίνοντας τα σχέδια με πλήρες φερμουάρ, μισό φερμουάρ ή φερμουάρ μέχρι
        το στήθος.
    zipper_pull_material:
      name: Υλικό οδηγού φερμουάρ
      description: Καθορίζει το υλικό της λαβής ή της γλωττίδας του οδηγού (του εξαρτήματος
        που πιάνουμε), σε αντίθεση με τα δόντια/την οδόντωση και την υφασμάτινη ταινία
        του φερμουάρ.
    zipper_pull_side:
      name: Πλευρά έλξης φερμουάρ
      description: Καθορίζει από ποια(ποιες) πλευρά(-ές) του φερμουάρ είναι προσβάσιμη
        η λαβή του οδηγού.
    zipper_pull_strap_cord_tab_material:
      name: Υλικό για το λουράκι/κορδόνι/γλωττίδα του οδηγού φερμουάρ
      description: Υλικό του ιμάντα/κορδονιού/γλωττίδας/φούντας που είναι προσαρτημένο
        στον οδηγό του φερμουάρ (εάν υπάρχει), εξαιρουμένου του κυρίως σώματος/μηχανισμού
        του οδηγού.
    zipper_reversibility_mechanism:
      name: Μηχανισμός αναστρέψιμης λειτουργίας με φερμουάρ
      description: Καθορίζει τον τρόπο με τον οποίο το φερμουάρ γίνεται αναστρέψιμο
        (π.χ. οδηγός διπλής όψης έναντι οδηγού με αναστρεφόμενη λαβή/αυτόματο κλείδωμα,
        σχεδιασμένο για ρούχα διπλής όψης).
    zipper_separating_type:
      name: Τύπος διαχωρισμού με φερμουάρ
      description: Υποδεικνύει αν το φερμουάρ διαχωρίζεται πλήρως στο κάτω ή στο πάνω
        μέρος ή αν παραμένει κλειστό, ανάλογα με τη χρήση σε μπουφάν, υπνόσακους,
        τσάντες κ.λπ.
    zipper_side:
      name: Πλευρά τοποθέτησης φερμουάρ
      description: Καθορίζει την πλευρά στην οποία βρίσκεται το κύριο φερμουάρ όταν
        ο υπνόσακος είναι με την όψη προς τα πάνω.
    zipper_slider_material:
      name: Υλικό οδηγού φερμουάρ
      description: Καθορίζει το υλικό του οδηγού (δρομέα) του φερμουάρ (του κινούμενου
        μηχανισμού), το οποίο επηρεάζει την ανθεκτικότητα και την αντοχή στη διάβρωση.
    zipper_slider_pull_configuration:
      name: Διαμόρφωση Διάταξη οδηγών/λαβών φερμουάρ
      description: Υποδεικνύει αν το φερμουάρ διαθέτει έναν ή δύο οδηγούς/λαβές, καθώς
        και αν οι λαβές βρίσκονται στη μία ή και στις δύο πλευρές του οδηγού.
    zipper_style:
      name: Στυλ φερμουάρ
      description: Υποδεικνύει το μήκος ή την παρουσία φερμουάρ στο ένδυμα (π.χ. χωρίς
        φερμουάρ, φερμουάρ ως το στήθος, μισό φερμουάρ, πλήρες φερμουάρ).
    zipper_tape_material:
      name: Υλικό ταινίας φερμουάρ
      description: Καθορίζει το κύριο υλικό της ταινίας φερμουάρ (πλευρές από ύφασμα)
        που ράβεται στο έργο.
    zipper_teeth_type:
      name: Τύπος δοντιών φερμουάρ
      description: Καθορίζει το στυλ κατασκευής της αλυσίδας/δοντιών του φερμουάρ
        (π.χ. σπειροειδές, χυτευμένο πλαστικό, μεταλλικό, αόρατο), επιλογή που επηρεάζει
        την ευκαμψία, την ανθεκτικότητα και τις τυπικές χρήσεις.
    assembly_required:
      name: Απαιτείται συναρμολόγηση
      description: Υποδεικνύει εάν το προϊόν απαιτεί συναρμολόγηση πριν από τη χρήση
    organic_certification:
      name: Βιολογική πιστοποίηση
      description: Προσδιορίζει ποια βιολογική πιστοποίηση ή πιστοποίηση βιωσιμότητας
        διαθέτει το προϊόν
