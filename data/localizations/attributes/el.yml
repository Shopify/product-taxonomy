    stethoscope_design:
      name: Σχεδιασμός στηθοσκοπίου
      description: Περιγράφει τον τύπο του στηθοσκοπίου, όπως διπλής ή μονής κεφαλής
    stethoscope_technology:
      name: Τεχνολογία στηθοσκοπίου
