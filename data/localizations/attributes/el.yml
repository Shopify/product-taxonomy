---
el:
  attributes:
    3d_glasses_fit_design:
      name: Σχεδιασμός εφαρμογής γυαλιών 3D
      description: Υποδεικνύει πώς τα γυαλιά φοριούνται ή προσαρτώνται (π.χ., clip-on,
        wrap-around, fit-over).
    3d_glasses_material:
      name: Υλικό γυαλιών 3D
      description: Καθορίζει το υλικό που χρησιμοποιείται για γυαλιά 3D, όπως μπαμπού
        ή ανοξείδωτο ατσάλι
    3d_glasses_technology:
      name: Τεχνολογία γυαλιών 3D
      description: Καθορίζει την τεχνολογία εικόνας/συγχρονισμού 3D για την οποία
        έχουν σχεδιαστεί τα γυαλιά, καθορίζοντας τη συμβατότητα με συγκεκριμένες οθόνες
        ή προβολείς.
    3d_printer_case_style:
      name: Στυλ θήκης 3D εκτυπωτή
      description: Ταξινομεί τον συνολικό τύπο προϊόντος ώστε οι αγοραστές να μπορούν
        να διακρίνουν μεταξύ μαλακών τσαντών μεταφοράς, θηκών με σκληρό κέλυφος, σταθερών
        περιβλημάτων και απλών καλυμμάτων σκόνης.
    3d_printer_cleaning_kit_components_included:
      name: Εξαρτήματα κιτ καθαρισμού 3D εκτυπωτή που περιλαμβάνονται
      description: Αναφέρει τα επιμέρους εργαλεία και αναλώσιμα που παρέχονται στο
        κιτ ώστε οι αγοραστές να γνωρίζουν ακριβώς τι αγοράζουν.
    3d_printing_resin_type:
      name: Τύπος ρητίνης 3D εκτύπωσης
      description: Καθορίζει τη σύνθεση ή την προβλεπόμενη εφαρμογή της ρητίνης, βοηθώντας
        τους αγοραστές να αναγνωρίσουν γρήγορα εάν η ρητίνη είναι τυπική, μηχανικής
        ποιότητας, χυτεύσιμη ή άλλων εξειδικευμένων τύπων.
    80_plus_efficiency_rating:
      name: Βαθμολογία απόδοσης 80 Plus
      description: Δηλώνει το επίσημο επίπεδο πιστοποίησης ενεργειακής απόδοσης 80
        Plus που έχει επιτύχει το PSU.
    abrasive_material:
      name: Λειαντικό υλικό
      description: Προσδιορίζει τον τύπο λειαντικού που χρησιμοποιείται σε εργαλεία
        λείανσης, όπως το διαμάντι ή το καρβίδιο του πυριτίου
    absinthe_style:
      name: Στυλ αψεντιού
      description: Καθορίζει το στυλ του αψεντιού, π.χ. ανάμεικτο, αποσταγμένο
    absinthe_variety:
      name: Ποικιλία αψεντιού
      description: Διαφοροποιεί τα προϊόντα αψεντιού βάσει των μοναδικών ποικιλιών
        τους, π.χ. κόκκινο (rouge), πράσινο (verte)
    absorbency_level:
      name: Επίπεδο απορρόφησης
      description: Καθορίζει την ικανότητα απορρόφησης, συνήθως για είδη προσωπικής
        φροντίδας. π.χ. όλη τη νύχτα, ελαφρύ
    absorbent_hygiene_product_features:
      name: Χαρακτηριστικά απορροφητικού προϊόντος υγιεινής
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των προϊόντων υγιεινής,
        όπως αδιάβροχη στεγανότητα ή υποαλλεργικότητα
    academic_level:
      name: Ακαδημαϊκό επίπεδο
      description: Καθορίζει το ακαδημαϊκό επίπεδο περιεχομένου μέσων, όπως προπτυχιακό
        ή διδακτορικό περιεχόμενο
    accessibility_design_features:
      name: Χαρακτηριστικά σχεδιασμού προσβασιμότητας
      description: Παραθέτει ειδικά στοιχεία σχεδιασμού που βοηθούν τους χρήστες με
        προβλήματα ακοής, όρασης ή επιδεξιότητας.
    accessory_material:
      name: Υλικό κατασκευής αξεσουάρ
      description: Καθορίζει τον τύπο υλικού των αξεσουάρ, συνήθως για υλικά σε προμήθειες
        αποστολής. δηλαδή πλαστικό, χαρτόνι
    accessory_size:
      name: Μέγεθος αξεσουάρ
      description: Καθορίζει το μέγεθος ενός αξεσουάρ προϊόντος, όπως το μέγεθός του
        ή το πόσο συμπαγές είναι
    accordion_tuning:
      name: Κούρδισμα ενός ακορντεόν
      description: Καθορίζει τον τύπο κουρδίσματος που χρησιμοποιείται σε ένα ακορντεόν,
        όπως το ύψος συχνότητας ήχου τύπου dry ή concert
    activation_mechanism:
      name: Μηχανισμός ενεργοποίησης
      description: Καθορίζει την κύρια μέθοδο που ενεργοποιεί τον συναγερμό.
    activation_method:
      name: Μέθοδος ενεργοποίησης
      description: Περιγράφει τον τρόπο ενεργοποίησης της προπληρωμένης πίστωσης ή
        της κάρτας SIM από τον χρήστη.
    active_ingredient:
      name: Δραστικό συστατικό
      description: Προσδιορίζει τις κύριες ουσίες σε είδη προσωπικής φροντίδας, π.χ.
        βιταμίνη Α, ρετινόλη
    activewear_clothing_features:
      name: Χαρακτηριστικά αθλητικών ενδυμάτων
      description: Προσδιορίζει τα μοναδικά χαρακτηριστικά των αθλητικών ενδυμάτων,
        όπως το τέντωμα τεσσάρων κατευθύνσεων ή το σχέδιο που αναπνέει
    activity:
      name: Δραστηριότητα
      description: Καθορίζει το άθλημα ή τη δραστηριότητα για την οποία έχει σχεδιαστεί
        το προϊόν, όπως τένις ή pilates
    activity_tracker_design:
      name: Σχεδιασμός δείκτη παρακολούθησης δραστηριότητας
      description: Καθορίζει πώς φοριέται ο δείκτης παρακολούθησης δραστηριότητας,
        π.χ. κλιπαριστά, με περιβραχιόνιο
    acupuncture_model_format:
      name: Μορφή μοντέλου βελονισμού
      description: Καθορίζει το μέγεθος και την κλίμακα των μοντέλων βελονισμού, π.χ.
        φυσικό μέγεθος, μινιατούρα
    acupuncture_model_type:
      name: Τύπος μοντέλου βελονισμού
      description: 'Καθορίζει το μέρος του σώματος ή το είδος που αντιπροσωπεύει το
        μοντέλο βελονισμού, π.χ. κεφάλι, χέρι, ζώο '
    adapter_directionality:
      name: Κατευθυντικότητα προσαρμογέα
      description: Υποδεικνύει εάν ο προσαρμογέας υποστηρίζει ροή σήματος και προς
        τις δύο κατευθύνσεις ή μόνο προς μία καθορισμένη κατεύθυνση.
    adapter_operating_modes:
      name: Τρόποι λειτουργίας προσαρμογέα
      description: Καθορίζει εάν ο προσαρμογέας λειτουργεί ως δέκτης Bluetooth, πομπός
        ή και τα δύο.
    adaptive_sync_technology:
      name: Τεχνολογία προσαρμοστικού συγχρονισμού
      description: Καθορίζει την τεχνολογία μεταβλητού ρυθμού ανανέωσης (VRR) που
        υποστηρίζεται από την οθόνη για εικόνα χωρίς σχισίματα.
    adc_resolution:
      name: Ανάλυση ADC
      description: Καθορίζει την ανάλυση (σε bit) του ενσωματωμένου μετατροπέα αναλογικού
        σε ψηφιακό, καθορίζοντας την ακρίβεια μέτρησης.
    additional_animation_software_features:
      name: Πρόσθετες δυνατότητες λογισμικού κινουμένων σχεδίων
      description: Καθορίζει μοναδικές δυνατότητες σε λογισμικό επεξεργασίας κινούμενων
        εικόνων, όπως κινούμενα σχέδια χαρακτήρων ή οπτικά εφέ
    additional_cleaning_technology:
      name: Πρόσθετη τεχνολογία καθαρισμού
      description: Απαριθμεί τυχόν τεχνολογίες καθαρισμού που περιλαμβάνονται πέρα
        από τον ατμό (π.χ., υπερήχων, UV, όζον).
    additional_design_software_type:
      name: Πρόσθετος τύπος λογισμικού σχεδιασμού
      description: Καθορίζει πρόσθετες δυνατότητες λογισμικού σχεδιασμού, όπως εικονική
        περιήγηση ή σχεδιασμός τοπίου
    additional_financial_software_features:
      name: Πρόσθετες δυνατότητες χρηματοοικονομικού λογισμικού
      description: Προσδιορίζει επιπλέον δυνατότητες χρηματοοικονομικού λογισμικού,
        όπως διαχείριση περιουσιακών στοιχείων ή έλεγχος και συμμόρφωση
    additional_graphic_software_features:
      name: Πρόσθετες δυνατότητες λογισμικού γραφικών
      description: Επισημαίνει τις πρόσθετες δυνατότητες του λογισμικού γραφικών,
        όπως η ψηφιακή εικονογράφηση ή η διαμόρφωση μακέτας
    additional_publishing_software_features:
      name: Πρόσθετες λειτουργίες λογισμικού έκδοσης
      description: Υπογραμμίζει επιπλέον λειτουργίες σε λογισμικό εκδόσεων, όπως σχέδιο
        εκτύπωσης ή ψηφιακή δημοσίευση
    additional_security_software_features:
      name: Πρόσθετες λειτουργίες λογισμικού ασφαλείας
      description: Προσδιορίζει επιπλέον δυνατότητες λογισμικού ασφαλείας, π.χ. κρυπτογράφηση
        δίσκου, ανίχνευση εισβολής
    adhesive_application_type:
      name: Τύπος εφαρμογής κόλλας
      description: Καθορίζει την προτιθέμενη υπηρεσία βλεφαρίδων ή τη χρήση της κόλλας.
    adhesive_features:
      name: Χαρακτηριστικά κόλλας
      description: Επισημαίνει ειδικές ιδιότητες της κόλλας που χρησιμοποιείται σε
        επιθέματα ή ταινίες.
    adhesive_format:
      name: Μορφή κολλητικής ουσίας
      description: Υποδεικνύει τη φυσική μορφή με την οποία παρέχεται η κολλητική
        ουσία για χρήση επισκευής.
    adhesive_strength:
      name: Ισχύς κόλλας
      description: Καθορίζει το επίπεδο ισχύος συγκόλλησης ή ανύψωσης της κόλλας της
        ρινικής ταινίας (π.χ., κανονική, έξτρα ισχυρή).
    adhesive_type:
      name: Τύπος κόλλας
      description: Προσδιορίζει τον τύπο της κόλλας που χρησιμοποιείται σε ένα προϊόν,
        όπως αφαιρούμενη ή μόνιμη
    aftershave_product_form:
      name: Μορφή προϊόντος για μετά το ξύρισμα
      description: Προσδιορίζει τη σύνθεση ενός προϊόντος για μετά το ξύρισμα, όπως
        βάλσαμο ή κρέμα
    age_group:
      name: Ηλικιακή ομάδα
      description: Καθορίζει το εύρος ηλικίας-στόχου για ένα προϊόν, όπως ενήλικες
        ή παιδιά
    age_restrictions:
      name: Ηλικιακοί περιορισμοί
      description: Υποδεικνύει την ελάχιστη ηλικιακή απαίτηση για ένα προϊόν ή μία
        εκδήλωση, όπως 18 ετών και άνω
    ai_application:
      name: Εφαρμογή AI
      description: Καθορίζει τη λειτουργία του AI σε λογισμικό, όπως η προγνωστική
        ανάλυση ή η αναγνώριση ομιλίας
    air_freshener_form:
      name: Μορφή αρωματισμένου αποσμητικού χώρου
      description: Καθορίζει τον τύπο των αρωματισμένων αποσμητικών αυτοκινήτου, π.χ.
        λάδι, κλιπ εξαερισμού
    air_fryer_functions:
      name: Λειτουργίες φριτέζας αέρος
      description: Παραθέτει τους διάφορους τρόπους μαγειρέματος που διατίθενται σε
        φριτέζα αέρος ή παρόμοια συσκευή, π.χ. τηγάνισμα στον αέρα, ψήσιμο
    air_mattress_features:
      name: Χαρακτηριστικά στρώματος αέρος
      description: Περιγράφει τα μοναδικά χαρακτηριστικά ενός στρώματος αέρος, όπως
        το εύκολο φούσκωμα ή την ανθεκτικότητα στη διάτρηση
    air_tube_configuration:
      name: Διαμόρφωση σωλήνων αέρα
      description: Υποδεικνύει τον αριθμό ή το στυλ των σωλήνων αέρα που ενσωματώνονται
        με την περιχειρίδα.
    airbrush_feed_type:
      name: Τύπος τροφοδοσίας Airbrush
      description: Προσδιορίζει τη μέθοδο παροχής χρώματος σε αερογράφους, όπως μέσω
        της βαρύτητας ή του σιφονιού
    airbrush_operation_method:
      name: Μέθοδος λειτουργίας Airbrush
      description: Καθορίζει το στυλ λειτουργίας των αερογράφων, για παράδειγμα, διπλής
        ενέργειας ή απλής ενέργειας
    aircraft_engine_configuration:
      name: Διαμόρφωση κινητήρων αεροσκάφους
      description: Προσδιορίζει τον αριθμό κινητήρων που έχει ένα αεροσκάφος, όπως
        αν είναι μονοκινητήριο ή δικινητήριο
    aircraft_engine_type:
      name: Τύπος κινητήρα αεροσκάφους
      description: Καθορίζει τον τύπο του κινητήρα που κινεί το αεροσκάφος, όπως τζετ
        ή στροβιλοκινητήρα
    airflow_opening_design:
      name: Σχεδιασμός ανοίγματος ροής αέρα
      description: Περιγράφει τη διαμόρφωση αναπνοής ή εξαερισμού που είναι ενσωματωμένη
        στο επιστόμιο.
    airsoft_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός Airsoft
      description: Προσδιορίζει πρόσθετο εξοπλισμό που παρέχεται με προϊόντα airsoft,
        όπως προστατευτικά γυαλιά ή γιλέκο τακτικής
    album_type:
      name: Τύπος άλμπουμ
      description: Περιγράφει το στυλ βιβλιοδεσίας των σετ λευκωμάτων ή σφραγίδων,
        π.χ. σπειροειδές, λεύκωμα
    alcohol/solvent_content:
      name: Περιεκτικότητα σε αλκοόλη/διαλύτη
      description: Ταξινομεί το προϊόν με βάση την περιεκτικότητα σε αλκοόλ ή διαλύτη
        για σκοπούς αποστολής και κανονισμών (π.χ., αλκοόλ ≤24%, αλκοόλ >24%, μικρό
        δοχείο διαλύτη)
    alcohol_content:
      name: Περιεκτικότητα σε αλκοόλ
      description: Υποδεικνύει εάν το τόνερ είναι χωρίς αλκοόλ ή, εάν υπάρχει, περίπου
        πόση αλκοόλ περιέχει η φόρμουλα.
    alert_type:
      name: Τύπος ειδοποίησης
      description: Καθορίζει το είδος ειδοποίησης που παρέχει ένα προϊόν, όπως ηχητικούς
        συναγερμούς ή ειδοποιήσεις smartphone
    allergen_information:
      name: Πληροφορίες για αλλεργιογόνα
      description: Υποδεικνύει πιθανά αλλεργιογόνα που υπάρχουν σε τρόφιμα ή ποτά,
        όπως το σιτάρι ή τα φιστίκια
    allergen_test_type:
      name: Τύπος δοκιμής αλλεργιογόνου
      description: Καθορίζει τον τύπο αλλεργιογόνου που έχει σχεδιαστεί να ανιχνεύει
        το σετ δοκιμής, όπως τρόφιμα ή περιβάλλοντα
    allergens:
      name: Αλλεργιογόνα
      description: Υποδεικνύει πιθανά αλλεργιογόνα σε προϊόντα προστασίας της υγείας
        και ομορφιάς, π.χ. λιναλοόλη ή λεμονένιο
    allergy_friendly_features:
      name: Χαρακτηριστικά φιλικά προς τις αλλεργίες
      description: Προσδιορίζει εάν ένα προϊόν έχει ιδιότητες φιλικές προς τις αλλεργίες,
        όπως χωρίς λατέξ ή ανθεκτικό στη μούχλα
    amino_acid_subtype:
      name: Υποτύπος αμινοξέος
      description: Καθορίζει τον κύριο τύπο ή το προφίλ των αμινοξέων που περιέχονται
        στο συμπλήρωμα.
    amplifier/booster_suitable_location:
      name: Κατάλληλη θέση εξοπλισμού ενίσχυσης/ενισχυτή
      description: Καθορίζει τις βέλτιστες θέσεις για εξοπλισμό ενίσχυσης ή ενισχυτή
        σήματος, όπως όχημα ή μεγάλο χώρο
    amplifier_class:
      name: Κλάση εξοπλισμού ενίσχυσης
      description: Καθορίζει τον τύπο του εξοπλισμού ενίσχυσης, όπως AB ή D
    amplifier_configuration:
      name: Διαμόρφωση εξοπλισμού ενίσχυσης
      description: Καθορίζει τη ρύθμιση του εξοπλισμού ενίσχυσης μηχανοκίνητων οχημάτων,
        όπως δύο ή τεσσάρων καναλιών
    amputation_level:
      name: Επίπεδο ακρωτηριασμού
      description: Δηλώνει το επίπεδο ακρωτηριασμού για το οποίο έχει σχεδιαστεί το
        συμπιεστικό κάλυμμα.
    analyte_measured:
      name: Αναλύτης που μετράται
      description: Προσδιορίζει τον/τους βιοδείκτη(-ες) για τους οποίους το διάλυμα
        ελέγχου παρέχει βαθμονόμηση.
    anamorphic_squeeze_ratio:
      name: Αναμορφικός λόγος συμπίεσης
      description: Υποδεικνύει τον συντελεστή οριζόντιας συμπίεσης ενός αναμορφικού
        φακού, επιτρέποντας στους χρήστες να αντιστοιχίσουν τους φακούς με την επιθυμητή
        απόδοση αποσυμπίεσης.
    anatomical_detail_displayed:
      name: Ανατομική λεπτομέρεια που εμφανίζεται
      description: Υποδεικνύει ποια ανατομικά χαρακτηριστικά ή χαρακτηριστικά μεσημβρινών
        επισημαίνονται στο μοντέλο.
    anchor_type:
      name: Τύπος άγκυρας
      description: Καθορίζει την άγκυρα που χρησιμοποιείται σε εξοπλισμό θαλάσσιων
        σπορ με ρυμούλκηση, όπως άγκυρα τύπου fluke ή τύπου άροτρο.
    anemometer_application:
      name: Εφαρμογή ανεμόμετρου
      description: Προσδιορίζει την προβλεπόμενη χρήση ενός ανεμόμετρου, όπως βιομηχανικό
        ή μετεωρολογικό
    angles_supported:
      name: Γωνίες υποστήριξης
      description: Καθορίζει το εύρος των γωνιών που μπορεί να προσαρμόσει ένα προϊόν,
        συνήθως για ηλεκτρονικά, π.χ. με δυνατότητα ρύθμισης από 0° έως 180°
    angling_style:
      name: Στυλ ψαρέματος
      description: Καθορίζει την τεχνική ψαρέματος που έχει σχεδιαστεί το προϊόν,
        όπως ψάρεμα από παραλία (surfcasting) ή ψάρεμα με τεχνητή μύγα (fly fishing)
    animal_feed_form:
      name: Μορφή ζωοτροφών
      description: Καθορίζει τη μορφή της ζωοτροφής, όπως σε υγρή μορφή ή μορφή κόκκων
    animal_type:
      name: Τύπος ζώου
      description: Καθορίζει τον τύπο του ζώου για το οποίο προορίζεται ένα προϊόν,
        όπως πάπιες, ελάφια ή σκύλοι
    answering_machine_type:
      name: Τύπος τηλεφωνητή
      description: Καθορίζει την παρουσία και την τεχνολογία ενός ενσωματωμένου τηλεφωνητή.
    antenna_connector_type:
      name: Τύπος συνδέσμου κεραίας
      description: Καθορίζει τον σύνδεσμο RF που χρησιμοποιείται για την προσάρτηση
        εξωτερικών κεραιών.
    antenna_rf_connector_type:
      name: Τύπος συνδετήρα RF κεραίας
      description: Προσδιορίζει τον συνδετήρα RF που χρησιμοποιεί η κεραία.
    antenna_type:
      name: Τύπος κεραίας
      description: Καθορίζει τον τύπο της κεραίας για ηλεκτρονικές συσκευές, π.χ.
        πανκατευθυντική, πλέγμα
    anti_agin_skin_care_type:
      name: Τύπος αντιγηραντικής περιποίησης του δέρματος
      description: Ταξινομεί το είδος του αντιγηραντικού προϊόντος περιποίησης δέρματος,
        π.χ. μάσκα, τονωτική λοσιόν
    anti_perspirant_strength_level:
      name: Επίπεδο ισχύος αντιιδρωτικού
      description: Δηλώνει την ταξινόμηση αποτελεσματικότητας του αντιιδρωτικού (π.χ.,
        κλινική ισχύς, αθλητική ισχύς).
    antibody_class_tested:
      name: Κατηγορία αντισώματος που δοκιμάζεται
      description: Καθορίζει την ανοσοσφαιρίνη ή τον βιοδείκτη που ανιχνεύει το κιτ
        (π.χ., IgE, IgG4).
    antifreeze_type:
      name: Τύπος αντιψυκτικού
      description: Καθορίζει τον τύπο αντιψυκτικού για τη συντήρηση του οχήματος,
        π.χ. συμπυκνωμένο αντιψυκτικό, προ-αραιωμένο αντιψυκτικό
    antique_car_design:
      name: Σχέδιο αυτοκινήτου αντίκας
      description: Περιγράφει το βασικό στυλ σχεδιασμού ενός αυτοκινήτου αντίκας,
        όπως το t-bucket ή το grand tourer
    antique_vehicle_era:
      name: Εποχή αυτοκινήτου αντίκας
      description: Περιγράφει την ιστορική περίοδο ενός οχήματος αντίκας, όπως εποχή
        μπρούντζου ή εποχή βίντατζ
    appliance_board_function:
      name: Λειτουργία πλακέτας συσκευής
      description: Καθορίζει τον λειτουργικό ρόλο της πλακέτας εντός της συσκευής.
    appliance_unit_location:
      name: Θέση μονάδας συσκευής
      description: Υποδεικνύει το φυσικό τμήμα της συσκευής για το οποίο προορίζεται
        η πλακέτα (π.χ., εσωτερική ή εξωτερική μονάδα).
    application_area:
      name: Περιοχή εφαρμογής
      description: Καθορίζει το μέρος του σώματος ή την περιοχή όπου εφαρμόζεται το
        προϊόν, π.χ. στα χείλη, σε ολόκληρο το σώμα
    application_method:
      name: Μέθοδος εφαρμογής
      description: Καθορίζει τον τρόπο εφαρμογής ή χρήσης ενός προϊόντος, π.χ. τζελ,
        υγρό, σπρέι.
    application_type:
      name: Τύπος εφαρμογής
      description: Υποδεικνύει αν η θεραπεία παραμένει ή ξεπλένεται και οποιονδήποτε
        ειδικό τρόπο χρήσης.
    applicator_format:
      name: Μορφή απλικατέρ
      description: Περιγράφει τη φυσική μορφή ή το στυλ του απλικατέρ λοσιόν ή αντηλιακού.
    applicator_material:
      name: Υλικό απλικατέρ
      description: Καθορίζει το υλικό που χρησιμοποιείται στο απλικατέρ, συνήθως για
        ταμπόν. πχ πλαστικό, χαρτόνι
    applicator_type:
      name: Τύπος απλικατέρ
      description: Προσδιορίζει τον τύπο του απλικατέρ που περιλαμβάνεται στα ταμπόν,
        π.χ. απλικατέρ, μη απλικατέρ
    applique/patch_shape:
      name: Σχήμα απλικέ/επιρράματος
      description: Περιγράφει το σχήμα των απλικέ ή των επιρραμμάτων, όπως ζωόμορφα
        ή γεωμετρικά σχήματα
    applique_shape:
      name: Σχήμα απλικέ
      description: Περιγράφει τα αντικείμενα σχήματος απλικέ, όπως φλοράλ σχήματα
        ή ζωόμορφα σχήματα
    aquarium_filter_features:
      name: Χαρακτηριστικά φίλτρου ενυδρείου
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των φίλτρων ενυδρείου, π.χ.
        γρήγορη αλλαγή φυσιγγίων, φιλτράρισμα πολλαπλών σταδίων
    aquarium_light_spectrum:
      name: Φάσμα φωτός ενυδρείου
      description: Καθορίζει τον τύπο του φάσματος φωτός για φωτισμό ενυδρείου, π.χ.
        μπλε, φως ημέρας
    aquarium_overflow_box_design:
      name: Σχέδιο κουτιού υπερχείλισης ενυδρείου
      description: Περιγράφει τον τύπο εγκατάστασης ενός κουτιού υπερχείλισης ενυδρείου,
        όπως εξωτερικό ή κρεμαστό
    archery_activity:
      name: Δραστηριότητα τοξοβολίας
      description: Καθορίζει τον τύπο δραστηριότητας τοξοβολίας, π.χ. υπαίθριο κυνήγι,
        εξάσκηση σε στόχους
    archery_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός τοξοβολίας
      description: Καθορίζει τα περιλαμβανόμενα αξεσουάρ τοξοβολίας, π.χ. βάση σταθεροποιητή,
        βέλη από γυαλί ασφαλείας
    archery_style:
      name: Στυλ τοξοβολίας
      description: Καθορίζει τον συγκεκριμένο τύπο τοξοβολίας για τον οποίο έχει σχεδιαστεί
        το προϊόν, π.χ. τρισδιάστατη τοξοβολία, τοξοβολία για κυνήγι με τόξο
    archery_target_type:
      name: Τύπος στόχου τοξοβολίας
      description: Καθορίζει τον τύπο του στόχου τοξοβολίας που έχει σχεδιαστεί για
        διαφορετικές πρακτικές βολής, π.χ. τρισδιάστατος στόχος, στόχος σάκου
    aromatherapy:
      name: Αρωματοθεραπεία
      description: Καθορίζει το άρωμα ή το αιθέριο έλαιο που χρησιμοποιείται, π.χ.
        ευκάλυπτος, λεβάντα
    arrangement:
      name: Διαρρύθμιση
      description: Καθορίζει τον τρόπο διάταξης ή παρουσίασης των λουλουδιών, π.χ.
        βάζο, καλάθι
    arrow/bolt_material:
      name: Υλικό βέλους
      description: Προσδιορίζει το υλικό κατασκευής βελών, όπως αλουμίνιο ή μπαμπού
    arrow_fletching_material:
      name: Υλικό φτερού βέλους
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για τα φτερά βελών, όπως
        συνθετικό ή πλαστικό
    arrow_material:
      name: Υλικό βέλους
      description: Προσδιορίζει τη σύνθεση βελών, όπως μπαμπού ή υαλοβάμβακας
    art/crafting_tool_material:
      name: Υλικό εργαλείου τέχνης/χειροτεχνίας
      description: Προσδιορίζει το κύριο υλικό της τέχνης ή των εργαλείων χειροτεχνίας,
        όπως το ξύλο ή το μέταλλο
    art_fixative_application_method:
      name: Μέθοδος εφαρμογής στερέωσης τέχνης
      description: Περιγράφει πώς εφαρμόζεται ένα σταθεροποιητικό τέχνης, όπως αεροζόλ
        ή πινέλο
    art_movement:
      name: Καλλιτεχνικό κίνημα
      description: Καθορίζει τη στυλιστική προσέγγιση ή την καλλιτεχνικό κίνημα ενός
        πίνακα, π.χ. ιμπρεσιονισμός, εξπρεσιονισμός
    art_style:
      name: Τεχνοτροπία
      description: Περιγράφει το αισθητικό στυλ ενός προϊόντος, όπως art nouveau ή
        τυπογραφία
    artwork_authenticity:
      name: Αυθεντικότητα έργων τέχνης
      description: Υποδεικνύει την αυθεντικότητα του έργου τέχνης, διευκρινίζοντας
        εάν πρόκειται για πρωτότυπη δημιουργία ή αναπαραγωγή
    artwork_frame_material:
      name: Υλικό κορνίζας έργου τέχνης
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε κορνίζες έργων τέχνης,
        όπως ξύλο ή υλικό επιχρύσωσης
    artwork_type:
      name: Τύπος έργου τέχνης
      description: Καθορίζει το στυλ του ψηφιακού έργου τέχνης, όπως η τυπογραφία
        ή η ψηφιακή ζωγραφική
    assisted_braking_technology:
      name: Τεχνολογία υποβοηθούμενης πέδησης
      description: Υποδεικνύει τον τύπο υποβοηθούμενης πέδησης σε διατάξεις ασφάλισης,
        π.χ. ενεργός, παθητικός
    attachment_method:
      name: Μέθοδος τοποθέτησης
      description: Προσδιορίζει τη μέθοδο που χρησιμοποιείται για την τοποθέτηση ή
        την στερέωση του προϊόντος, π.χ. με βέλκρο, με κλιπ
    attachment_options:
      name: Επιλογές τοποθέτησης
      description: Καθορίζει τις μεθόδους τοποθέτησης ή ασφάλισης ενός προϊόντος,
        π.χ. κορδόνι
    attachment_type:
      name: Τύπος τοποθέτησης
      description: Καθορίζει τη μέθοδο τοποθέτησης ή σύνδεσης του προϊόντος, όπως
        με κούμπωμα ή με άγκιστρο και θηλιά
    atv/off_road_tire_type:
      name: Τύπος ελαστικού ATV/Εκτός δρόμου
      description: Προσδιορίζει τη συγκεκριμένη χρήση ελαστικών ATV ή εκτός δρόμου,
        όπως σε άμμο ή λάσπη
    audio/scan_converter_features:
      name: Λειτουργίες μετατροπέα ήχου/σάρωσης
      description: Περιγράφει τις δυνατότητες ενός μετατροπέα ήχου/σάρωσης, όπως αυτόματη
        μετατροπή ή απομακρυσμένος έλεγχος
    audio/video_cable_connector_type_end_a:
      name: Τύπος συνδετήρα καλωδίου ήχου/βίντεο (άκρο A)
      description: Καθορίζει τον ακριβή συνδετήρα ή τη διεπαφή που υπάρχει στο πρώτο
        άκρο (άκρο A) του καλωδίου.
    audio/video_cable_connector_type_end_b:
      name: Τύπος συνδετήρα καλωδίου ήχου/βίντεο (άκρο B)
      description: Καθορίζει τον ακριβή συνδετήρα ή τη διεπαφή που υπάρχει στο δεύτερο
        άκρο (άκρο B) του καλωδίου.
    audio_bypass_type:
      name: Τύπος παράκαμψης ήχου
      description: Καθορίζει πώς δρομολογείται το σήμα ήχου όταν το εφέ είναι απενεργοποιημένο
        (π.χ., αληθινή παράκαμψη, ενδιάμεσης μνήμης, ρελέ).
    audio_cassette_tape_type:
      name: Τύπος ταινίας κασέτας ήχου
      description: Καθορίζει τη σύνθεση ταινίας IEC (προκατάληψη) για κασέτες ήχου.
    audio_codecs/formats_supported:
      name: Υποστηριζόμενοι κωδικοποιητές/μορφές ήχου
      description: Καθορίζει τους τύπους αρχείων ήχου που μπορεί να αναπαράγει ένα
        προϊόν, όπως WAVE ή MP3
    audio_component_form_factor:
      name: Μορφή εξαρτήματος ήχου
      description: Καθορίζει το φυσικό στυλ ή τη μορφή εγκατάστασης του εξαρτήματος.
    audio_connectivity:
      name: Συνδεσιμότητα ήχου
      description: Καθορίζει τους τύπους σύνδεσης ήχου που υποστηρίζει ένα προϊόν,
        όπως HDMI ή USB
    audio_conversion_direction:
      name: Κατεύθυνση μετατροπής ήχου
      description: Καθορίζει τη ροή σήματος που υποστηρίζει ο μετατροπέας (π.χ., αναλογική
        σε ψηφιακή, ψηφιακή σε αναλογική, αμφίδρομη).
    audio_converter_features:
      name: Λειτουργίες μετατροπέα ήχου
      description: Παρουσιάζει επιγραμματικά τα κύρια χαρακτηριστικά ενός μετατροπέα
        ήχου, όπως υποστήριξη με AI ή αναλογική υποστήριξη
    audio_d/a_converter_dac:
      name: Μετατροπέας ήχου D/A (DAC)
      description: Καθορίζει τον τύπο του μετατροπέα ψηφιακού σε αναλογικό (DAC) σε
        συσκευές ήχου, π.χ. USB, οπτικός τύπος
    audio_duplex_capability:
      name: Δυνατότητα αμφίδρομης επικοινωνίας ήχου
      description: Καθορίζει εάν η συσκευή υποστηρίζει πλήρη αμφίδρομη (ταυτόχρονη
        αμφίδρομη) ή ημι-αμφίδρομη επικοινωνία ήχου.
    audio_mixer_type:
      name: Τύπος μίκτη ήχου
      description: Προσδιορίζει τον τύπο του μίκτη ήχου, όπως αναλογικός ή ζωντανής
        μετάδοσης
    audio_output_channel:
      name: Κανάλι εξόδου ήχου
      description: Υποδεικνύει τον αριθμό των καναλιών ή της διαμόρφωσης ηχείων στα
        οποία μπορεί να εξάγει ένα ηχητικό σύστημα, όπως 2 ή 5.1
    audio_output_format:
      name: Μορφή εξόδου ήχου
      description: Καθορίζει την ποιότητα και τον τύπο ήχου που παράγεται από τη συσκευή
        ήχου, όπως ψηφιακά ή αναλογικά
    audio_player/recorder_features:
      name: Χαρακτηριστικά συσκευής αναπαραγωγής/εγγραφής ήχου
      description: Προσδιορίζει μοναδικές δυνατότητες συσκευών αναπαραγωγής ήχου ή
        καταγραφής, όπως αναπαραγωγή MP3 ή φωνητικός έλεγχος
    audio_purpose:
      name: Σκοπός ήχου
      description: Καθορίζει την προβλεπόμενη χρήση ή τοποθεσία για προϊόντα ήχου,
        όπως ήχο αυτοκινήτου ή οικιακό κινηματογράφο
    audio_return_channel_support:
      name: Υποστήριξη καναλιού επιστροφής ήχου
      description: Δηλώνει εάν η συσκευή υποστηρίζει διέλευση ARC ή eARC για δρομολόγηση
        ήχου από μια οθόνη πίσω σε AVR ή soundbar.
    audio_signal_configuration:
      name: Διαμόρφωση σήματος ήχου
      description: Καθορίζει εάν το καλώδιο μεταφέρει μονοφωνικό, στερεοφωνικό, ισορροπημένο
        ή πολυκάναλο (π.χ., TRRS, ψηφιακό) ήχο.
    audio_system:
      name: Σύστημα ήχου
      description: Καθορίζει το σύστημα αναπαραγωγής/εγγραφής ήχου που υποστηρίζει
        το VCR (π.χ., Hi-Fi stereo, mono).
    audio_technology:
      name: Τεχνολογία ήχου
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται σε συσκευές ήχου,
        όπως AAC ή Dolby atmos
    authentication_technology:
      name: Τεχνολογία ελέγχου ταυτότητας
      description: Καθορίζει τη μέθοδο ασφαλείας που χρησιμοποιείται στην τεχνολογία
        ελέγχου ταυτότητας, π.χ. βιομετρική, με βάση την κάρτα
    authenticity:
      name: Αυθεντικότητα
      description: Καθορίζει την πρωτοτυπία των αντικειμένων, π.χ. γνήσιο, αντίγραφο
    auto_focusing_modes:
      name: Λειτουργίες αυτόματης εστίασης
      description: Προσδιορίζει τον τύπο της αυτόματης εστίασης στις κάμερες, όπως
        εστίαση ενός σημείου ή παρακολούθηση κινούμενου αντικειμένου
    autoclave_sterilization_method:
      name: Μέθοδος αποστείρωσης σε αυτόκαυστο
      description: Προσδιορίζει την τεχνική αποστείρωσης που χρησιμοποιείται σε αυτόκαυστα,
        όπως ατμός ή ξηρή θερμότητα
    autograph_type:
      name: Τύπος αυτόγραφου
      description: Προσδιορίζει την κατηγορία του αυτόγραφου αντικειμένου, όπως αθλήματα
        ή μουσική
    automation:
      name: Αυτοματοποίηση
      description: Περιγράφει το επίπεδο αυτοματισμού σε μηχανές συσκευασίας, όπως
        χειροκίνητες ή αυτόματες
    award_design:
      name: Σχεδίαση βραβείων
      description: Περιγράφει το στυλ ή το θέμα ενός βραβείου ή πιστοποιητικού, όπως
        μοντέρνο ή επίσημο
    award_occasion:
      name: Περίσταση απονομής
      description: Προσδιορίζει τον σκοπό ενός βραβείου, όπως την ένδειξη αναγνώρισης
        εργαζομένων ή ακαδημαϊκής επίδοσης
    awning_construction_type:
      name: Τύπος κατασκευής τέντας
      description: Καθορίζει το στυλ ρύθμισης μιας τέντας, όπως πτυσσόμενη ή σταθερή
    awning_design:
      name: Σχέδιο τέντας
      description: Περιγράφει το σχήμα ή το στυλ μιας τέντας, όπως επίπεδη ή κυρτή
    baby/toddler_car_seat_features:
      name: Χαρακτηριστικά βρεφικού/παιδικού καθίσματος αυτοκινήτου
      description: Επισημαίνει τα βασικά χαρακτηριστικά των βρεφικών/παιδικών καθισμάτων
        αυτοκινήτου, όπως ζώνη 5 σημείων ή προστασία από πλευρική πρόσκρουση
    baby/toddler_clothing_features:
      name: Χαρακτηριστικά βρεφικού/παιδικού ρουχισμού
      description: Επισημαίνει τα ιδιαίτερα χαρακτηριστικά του βρεφικού/παιδικού ρουχισμού,
        όπως ρυθμιζόμενη ζώνη μέσης ή προστασία UV
    baby/toddler_equipment_safety_features:
      name: Χαρακτηριστικά ασφαλείας βρεφικού/παιδικού εξοπλισμού
      description: Καθορίζει προστατευτικά χαρακτηριστικά βρεφικού/παιδικού εξοπλισμού,
        όπως αντιολισθητική βάση
    baby/toddler_furniture_features:
      name: Χαρακτηριστικά βρεφικών/παιδικών επίπλων
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των βρεφικών/παιδικών
        επίπλων, όπως δυνατότητα ρυθμιζόμενου ύψος ή αναδίπλωσης
    baby/toddler_furniture_items_included:
      name: Περιλαμβάνονται βρεφικά/παιδικά έπιπλα
      description: Καθορίζει τους τύπους βρεφικών/παιδικών επίπλων σε ένα σετ, π.χ.
        παιδικό καρεκλάκι, μπαούλο παιχνιδιών
    baby/toddler_hat_style:
      name: Στυλ βρεφικού/παιδικού καπέλου
      description: Περιγράφει το στυλ βρεφικών/παιδικών καπέλων, όπως καπέλο κουβά
        ή καπέλο ηλίου
    baby/toddler_hosiery_style:
      name: Στυλ βρεφικών/παιδικών καλτσών/καλσόν
      description: Περιγράφει το στυλ βρεφικών/παιδικών καλτσών ή καλσόν, όπως κάλτσες
        ή καλσόν
    baby/toddler_seat_features:
      name: Χαρακτηριστικά βρεφικού/παιδικού καθίσματος
      description: Επισημαίνει τις βασικές πτυχές των βρεφικών/παιδικών καθισμάτων,
        όπως ανακλινόμενο κάθισμα ή δίσκος
    baby/toddler_sleepwear_style:
      name: Στυλ βρεφικών/παιδικών ενδυμάτων ύπνου
      description: Περιγράφει το σχέδιο των βρεφικών/παιδικών ενδυμάτων ύπνου, όπως
        με ποδαράκια ή ολόσωμο φορμάκι
    baby_drink_packaging:
      name: Συσκευασία βρεφικών ροφημάτων
      description: Προσδιορίζει τον τύπο δοχείου για βρεφικά ροφήματα, π.χ. χάρτινη
        συσκευασία, μπουκάλι
    baby_equipment_safety_features:
      name: Χαρακτηριστικά ασφαλείας βρεφικού εξοπλισμού
      description: Προσδιορίζει τις πτυχές ασφαλείας του βρεφικού εξοπλισμού, όπως
        η ζώνη 3 σημείων ή η αντιολισθητική βάση
    baby_food_flavor:
      name: Γεύση βρεφικής τροφής
      description: Καθορίζει το γευστικό προφίλ των βρεφικών τροφών, όπως πράσινα
        φασόλια ή μπανάνα
    baby_formula_format:
      name: Μορφή βρεφικού γάλακτος
      description: Καθορίζει την κατάσταση προετοιμασίας του βρεφικού γάλακτος, όπως
        ξηρή σκόνη ή έτοιμο προς χρήση
    baby_gift_items_included:
      name: Περιλαμβάνονται βρεφικά είδη δώρου
      description: Αναφέρει λεπτομερώς τα εξαρτήματα μιας συσκευασίας βρεφικού δώρου,
        όπως βιβλία ή δακτύλιοι οδοντοφυΐας για βρέφη
    baby_health_items_included:
      name: Περιλαμβανόμενα βρεφικά είδη υγιεινής του μωρού
      description: Καθορίζει τα αντικείμενα που περιλαμβάνονται στα βρεφικά κιτ περιποίησης,
        όπως νυχοκόπτης ή θερμόμετρο
    baby_monitor_features:
      name: Λειτουργίες συσκευής ενδοεπικοινωνίας για την επιτήρηση βρεφών
      description: Περιγράφει τις δυνατότητες μιας συσκευής ενδοεπικοινωνίας για την
        επιτήρηση βρεφών, όπως αμφίδρομη επικοινωνία ή παρακολούθηση θερμοκρασίας
    baby_snack_flavor:
      name: Γεύση βρεφικού σνακ
      description: Καθορίζει το γευστικό προφίλ των βρεφικών σνακ, π.χ. φρούτα, λαχανικά
    baby_snack_texture:
      name: Υφή βρεφικού σνακ
      description: Περιγράφει την αίσθηση ή τη συνοχή των βρεφικών σνακ, π.χ. μαλακά
        κομματάκια, αφράτα ή ελαφριά τραγανά κομματάκια από σνακ
    back_type:
      name: Τύπος πλάτης
      description: Καθορίζει το στυλ στήριξης της πλάτης στα καθίσματα, όπως χωρίς
        πλάτη ή με χαμηλή πλάτη
    backboard_material:
      name: Υλικό ταμπλό
      description: Καθορίζει το υλικό κατασκευής του ταμπλό του παιχνιδιού, επηρεάζοντας
        την απόδοση αναπήδησης, την ανθεκτικότητα και το κόστος.
    background_design:
      name: Σχεδιασμός φόντου
      description: Περιγράφει τον οπτικό σχεδιασμό ή το μοτίβο σε φόντο στούντιο,
        όπως τυπωμένο ή με κλείδωμα χρώματος
    backing_color:
      name: Χρώμα υποστήριξης
      description: Προσδιορίζει το χρώμα της πίσω πλευράς ή της κάτω πλευράς ενός
        προϊόντος, όπως μπεζ ή μαύρο
    backing_material:
      name: Υλικό υποστήριξης
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην πίσω πλευρά προϊόντων
        όπως αξεσουάρ λείανσης, π.χ. πολυεστέρας, PVC
    backing_pattern:
      name: Μοτίβο υποστήριξης
      description: Προσδιορίζει το μοτίβο στην πίσω πλευρά ενός προϊόντος, συνήθως
        για αξεσουάρ λείανσης. π.χ. περίληψη, κείμενο
    backlighting_type:
      name: Τύπος οπίσθιου φωτισμού
      description: Περιγράφει το στυλ φωτισμού που παρέχεται σε οποιοδήποτε συμπεριλαμβανόμενο
        πληκτρολόγιο ή ποντίκι.
    backrest_type:
      name: Τύπος πλάτης καθίσματος
      description: Καθορίζει το υλικό ή το στυλ της πλάτης μιας καρέκλας. π.χ. με
        δίχτυ, με επένδυση
    backrest_upholstery_color:
      name: Χρώμα ταπετσαρίας πλάτης καθίσματος
      description: Προσδιορίζει το χρώμα της ταπετσαρίας της πλάτης καθίσματος σε
        έπιπλα, όπως μπεζ ή μπλε
    backrest_upholstery_material:
      name: Υλικό ταπετσαρίας πλάτης καθίσματος
      description: Προσδιορίζει τον τύπο υφάσματος στην πλάτη καθίσματος των επίπλων,
        όπως βελούδο ή λυγαριά
    backrest_upholstery_pattern:
      name: Μοτίβο ταπετσαρίας πλάτης καθίσματος
      description: Προσδιορίζει το μοτίβο στο ύφασμα της πλάτης καθίσματος του καναπέ,
        π.χ. ριγέ, καρό
    bag/case_closure:
      name: Κλείσιμο τσάντας/θήκης
      description: Προσδιορίζει τον τύπο κλεισίματος που χρησιμοποιείται σε τσάντες
        ή θήκες, π.χ. κλειδαριά με κλειδί, βέλκρο
    bag/case_features:
      name: Χαρακτηριστικά τσάντας/θήκης
      description: Περιγράφει τα μοναδικά χαρακτηριστικά μιας τσάντας ή θήκης, όπως
        ότι είναι αδιάβροχη ή ελαφριά
    bag/case_material:
      name: Υλικό τσάντας/θήκης
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε μια τσάντα ή
        θήκη, όπως δέρμα ή καμβάς
    bag/case_storage_features:
      name: Λειτουργίες αποθήκευσης τσάντας/θήκης
      description: Προσδιορίζει μοναδικά στοιχεία αποθήκευσης σε τσάντες ή θήκες,
        όπως ρυθμιζόμενα διαχωριστικά ή εξωτερικές τσέπες
    bag_closure:
      name: Κλείσιμο τσάντας
      description: Περιγράφει πώς ασφαλίζεται μια τσάντα, π.χ. κορδόνι, αγκράφα
    bag_strap_type:
      name: Τύπος λουριού τσάντας
      description: Καθορίζει τον τύπο του λουριού τσάντας, για παράδειγμα, χιαστί
        ή ώμου
    bag_style:
      name: Στυλ τσάντας
      description: Περιγράφει το σχέδιο ή τον τύπο μιας τσάντας, όπως σακίδιο πλάτης
        ή φάκελος
    bag_type:
      name: Τύπος τσάντας
      description: Καθορίζει την κατηγορία των τσαντών και βαλιτσών μοτοσικλέτας,
        όπως τσάντα ουράς ή τσάντα εργαλείων
    bakery_items_included:
      name: Περιλαμβάνονται είδη αρτοποιίας
      description: Προσδιορίζει τους τύπους αρτοσκευασμάτων που περιλαμβάνονται, π.χ.
        bagel, scone
    bakeware_features:
      name: Χαρακτηριστικά σκευών ψησίματος
      description: Επισημαίνει τα ιδιαίτερα χαρακτηριστικά των σκευών ψησίματος, όπως
        αντικολλητική επίστρωση ή καταλληλότητα για φούρνο
    bakeware_items_included:
      name: Σκεύη ψησίματος που περιλαμβάνονται
      description: Προσδιορίζει τα συγκεκριμένα σκεύη ψησίματος σε ένα σετ, όπως ταψί
        ψησίματος ή φόρμα για κέικ.
    bakeware_pieces_included:
      name: Περιλαμβανόμενα σκεύη ψησίματος
      description: Καθορίζει τα σκεύη ψησίματος που περιλαμβάνονται στο σετ, όπως
        φόρμα για μάφιν ή ταψί για κέικ
    bakeware_shape:
      name: Σχήμα σκευών ψησίματος
      description: Προσδιορίζει το σχήμα των σκευών ψησίματος, όπως στρογγυλό με τρύπα
        στη μέση ή ορθογώνιο
    baking_purpose:
      name: Σκοπός ψησίματος
      description: Καθορίζει για ποιον τύπο αρτοσκευασμάτων χρησιμοποιείται ένα προϊόν,
        π.χ. μπισκότα, μάφιν
    baking_sheet_material:
      name: Υλικό του ταψιού ψησίματος
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται σε ταψιά ψησίματος,
        όπως ανοξείδωτο ατσάλι ή σιλικόνη
    ball_material:
      name: Υλικό μπάλας
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται στην κατασκευή
        μιας μπάλας, όπως το δέρμα ή το καουτσούκ
    ball_size:
      name: Μέγεθος μπάλας
      description: Καθορίζει το μέγεθος μπάλας σε αθλήματα ή παιχνίδια, π.χ. 5, youth
        (για άτομα άνω των 12 ετών)
    balloon_kit_items_included:
      name: Περιλαμβάνονται είδη κιτ μπαλονιών
      description: Καθορίζει τα είδη που παρέχονται σε ένα κιτ μπαλονιών, όπως κλιπς
        ή βάρη
    balloon_shape:
      name: Σχήμα μπαλονιού
      description: Περιγράφει το σχήμα ή το σχέδιο ενός μπαλονιού, όπως στρογγυλό
        σχήμα ή σχήμα καρδιάς
    band_color:
      name: Χρώμα λουριού
      description: Καθορίζει το χρώμα του λουριού ρολογιού, π.χ. πολύχρωμο, ροζ χρυσό
    band_material:
      name: Υλικό λουριού
      description: Καθορίζει το υλικό που χρησιμοποιείται στο λουρί του ρολογιού,
        όπως δέρμα ή ανοξείδωτο ατσάλι
    band_pattern:
      name: Μοτίβο λουριού
      description: Υποδεικνύει το οπτικό θέμα στο λουρί των ειδών όπως ρολόγια, π.χ.
        ριγέ, λογότυπο
    band_strength:
      name: Δύναμη λουριού
      description: Περιγράφει την ανθεκτικότητα των λαστιχένιων λουριών, όπως κανονική
        ή βαρέως τύπου
    bandage_shape:
      name: Σχήμα επιδέσμου
      description: Περιγράφει την προκομμένη μορφή των αυτοκόλλητων επιδέσμων ή επιθεμάτων.
    banner_design:
      name: Σχεδίαση διακοσμητικών πανό
      description: Καθορίζει τα σχεδιαστικά χαρακτηριστικά των διακοσμητικών πανό
        για πάρτι, όπως φούντες ή γιρλάντες
    bar_mounting_type:
      name: Τύπος τοποθέτησης μπάρας
      description: Καθορίζει τη μέθοδο εγκατάστασης μπαρών άσκησης, όπως σε πόρτα
        ή δοκό
    barcode_scanner_form_factor:
      name: Παράγοντας μορφής σαρωτή barcode
      description: Καθορίζει το φυσικό στυλ σχεδίασης του σαρωτή barcode (π.χ., χειρός,
        παρουσίασης, δακτυλίου).
    barcode_scanner_interface:
      name: Διεπαφή σαρωτή γραμμωτού κώδικα
      description: Καθορίζει τη μέθοδο επικοινωνίας για σαρωτές γραμμωτού κώδικα,
        όπως USB ή Bluetooth
    barcode_supported:
      name: Υποστηρίζεται γραμμωτός κώδικας
      description: Καθορίζει τους τύπους γραμμωτών κωδίκων που μπορεί να διαβάσει
        ένας σαρωτής, π.χ. 1D, 2D
    barrel_material:
      name: Υλικό κυλίνδρου
      description: Καθορίζει το υλικό που χρησιμοποιείται στον κύλινδρο του προϊόντος
        μαλλιών, π.χ. τιτάνιο, κεραμικό
    barrel_shape:
      name: Σχήμα κυλίνδρου
      description: Προσδιορίζει το φυσικό σχήμα ή το προφίλ του κυλίνδρου, που επηρεάζει
        άμεσα το στυλ μπούκλας ή κύματος που παράγεται.
    barware_items_included:
      name: Περιλαμβάνεται εξοπλισμός ειδών για μπαρ
      description: Περιγράφει τα μέρη ενός σετ κοκτέιλ και μπαρ, π.χ. σέικερ για κοκτέιλ,
        παγάκια ψύξης
    barware_material:
      name: Υλικό εξοπλισμού για μπαρ
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται στα είδη εξοπλισμού
        μπαρ, όπως γυαλί ή ανοξείδωτο ατσάλι
    base_oil:
      name: Έλαιο βάσης
      description: Προσδιορίζει το κύριο έλαιο σε προϊόντα προσωπικής φροντίδας, όπως
        λάδι καρύδας ή ελαιόλαδο
    base_spirit:
      name: Αλκοολούχο ποτό ως βάση
      description: Καθορίζει την πρωτοταγή αλκοόλη που χρησιμοποιείται σε ένα προϊόν,
        όπως το ουίσκι ή το ρούμι
    base_type:
      name: Τύπος βάσης
      description: Καθορίζει τον τύπο βάσης, συνήθως για μικρόφωνα. π.χ. σφιγκτήρας
        βάσης, τρίποδο
    baseball/softball_ball_type:
      name: Τύπος μπάλας για μπέιζμπολ/σόφτμπολ
      description: Καθορίζει εάν μια μπάλα έχει σχεδιαστεί για σόφτμπολ ή μπέιζμπολ
    basket_material:
      name: Υλικό καλαθιού
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε ένα καλάθι,
        όπως λυγαριά ή μέταλλο
    basketball_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός μπάσκετ
      description: Καθορίζει τον εξοπλισμό μπάσκετ που περιλαμβάνεται με το προϊόν,
        όπως δίχτυ και στύλο
    bass_button_configuration:
      name: Διαμόρφωση κουμπιού μπάσου
      description: Καθορίζει τον αριθμό των κουμπιών μπάσου σε ακορντεόν, όπως μπάσο
        με 8 ή 24 τάστα.
    bat_material:
      name: Υλικό μπαστουνιού
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε ένα μπαστούνι,
        όπως αλουμίνιο ή ανθρακόνημα
    bat_standard:
      name: Κοινό πρότυπο μπαστουνιών
      description: Καθορίζει την πιστοποίηση των μπαστουνιών μπέιζμπολ ή σόφτμπολ,
        όπως το Little League ή το NCAA
    bath_brush_style:
      name: Στυλ βούρτσας μπάνιου
      description: Περιγράφει το φυσικό στυλ ή τον τύπο του απολεπιστικού εργαλείου
        (π.χ., βούρτσα με μακριά λαβή, γάντι, ζώνη).
    bathroom_furniture_items_included:
      name: Περιλαμβάνονται έπιπλα μπάνιου
      description: Προσδιορίζει τα συγκεκριμένα αντικείμενα που περιλαμβάνονται σε
        ένα σετ επίπλων μπάνιου, όπως έπιπλο μπάνιου με νιπτήρα ή καθρέφτης
    bathtub_base_design:
      name: Σχέδιο βάσης μπανιέρας
      description: Προσδιορίζει το σχέδιο της βάσης και των ποδιών της μπανιέρας,
        για παράδειγμα, με πόδια σε σχήμα νυχιών ή πλατφόρμα
    bathtub_features:
      name: Χαρακτηριστικά μπανιέρας
      description: Προσδιορίζει μοναδικά χαρακτηριστικά μιας μπανιέρας, όπως προστασία
        υπερχείλισης ή υδρομασάζ
    bathtub_skirt_shape:
      name: Σχήμα εξωτερικής πλευράς της μπανιέρας γύρω από τη βάση της
      description: Περιγράφει τη μορφή της εξωτερικής πλευράς της μπανιέρας γύρω από
        τη βάση της, όπως ίσια ή καμπυλωτή
    baton_grip_design:
      name: Σχεδιασμός λαβής μπαγκέτας
      description: Περιγράφει τον τύπο λαβής της μπαγκέτας του διευθυντή ορχήστρας,
        όπως φελλό ή καουτσούκ
    battery_cell_type:
      name: Τύπος κυψέλης μπαταρίας
      description: Καθορίζει τη χημική σύνθεση μιας μπαταρίας, όπως αλκαλική ή λιθίου-αέρα
    battery_charge_controller_type:
      name: Τύπος ελεγκτή φόρτισης μπαταρίας
      description: Καθορίζει την υποκείμενη τεχνολογία ρύθμισης ή φόρτισης ή τοπολογία
        που χρησιμοποιεί ο ελεγκτής.
    battery_connector_type:
      name: Τύπος συνδετήρα μπαταρίας
      description: Προσδιορίζει το κύριο στυλ συνδετήρα ή ακροδέκτη που χρησιμοποιείται
        για τη φόρτιση ή εκφόρτιση της μπαταρίας.
    battery_features:
      name: Χαρακτηριστικά μπαταρίας
      description: Περιγράφει τα ειδικά χαρακτηριστικά μιας μπαταρίας, όπως γρήγορη
        φόρτιση ή ανθεκτικότητα στη θερμότητα
    battery_management_features:
      name: Λειτουργίες διαχείρισης μπαταρίας
      description: Προσδιορίζει τις δυνατότητες ενός συστήματος διαχείρισης μπαταρίας,
        όπως ανίχνευση σφαλμάτων ή απομακρυσμένη παρακολούθηση
    battery_mounting_type:
      name: Τύπος τοποθέτησης μπαταρίας
      description: Προσδιορίζει το φυσικό πρότυπο τοποθέτησης ή σύνδεσης του πακέτου
        μπαταρίας.
    battery_size:
      name: Μέγεθος μπαταρίας
      description: Υποδεικνύει τη συμβατότητα μπαταρίας για το προϊόν, όπως AAA ή
        9V
    battery_technology:
      name: Τεχνολογία μπαταρίας
      description: Καθορίζει τον τύπο της μπαταρίας που χρησιμοποιείται σε ηλεκτρονικά
        είδη, όπως αλκαλική ή ιόντων λιθίου
    battery_terminal_type:
      name: Τύπος ακροδέκτη μπαταρίας
      description: Καθορίζει το φυσικό στυλ συνδετήρα στους ακροδέκτες της μπαταρίας.
    battery_type:
      name: Τύπος μπαταρίας
      description: 'Διακρίνει μεταξύ των τύπων μπαταριών, όπως μίας χρήσης ή επαναφορτιζόμενες '
    bead_shape:
      name: Σχήμα χάντρας
      description: Περιγράφει το σχήμα ή το σχέδιο των χαντρών, όπως στρογγυλό ή τετράγωνο
        σχήμα
    beard_care_benefits:
      name: Οφέλη περιποίησης γενειάδας
      description: Απαριθμεί τα κύρια λειτουργικά οφέλη που προσφέρει το προϊόν για
        τη γενειάδα και το υποκείμενο δέρμα.
    beat_subdivisions:
      name: Υποδιαιρέσεις του χτύπου
      description: Καθορίζει τη ρυθμική διαίρεση των χτύπων σε μετρονόμους, όπως τέταρτο
        ή όγδοο
    beater_head_size:
      name: Μέγεθος κεφαλής κοπάνου μπότας
      description: Καθορίζει τη διάσταση της κεφαλής κοπάνου της μπότας (μπάσο τύμπανο),
        όπως μεσαία (M) ή μεγάλη (L)
    bed/frame_features:
      name: Χαρακτηριστικά κρεβατιού/σκελετού
      description: Επισημαίνει μοναδικά χαρακτηριστικά κρεβατιών και σκελετών, όπως
        επιλογές αποθήκευσης ή συμπεριλαμβανόμενο κεφαλάρι
    bed_leveling_type:
      name: Τύπος ευθυγράμμισης πλατφόρμας
      description: Καθορίζει τη μέθοδο που χρησιμοποιεί ο εκτυπωτής για να ευθυγραμμίσει
        την επιφάνεια κατασκευής του πριν από την εκτύπωση.
    bed_pan_features:
      name: Χαρακτηριστικά σκωραμίδας
      description: Επισημαίνει πρόσθετα ειδικά στοιχεία σχεδιασμού ή λειτουργικές
        βελτιώσεις.
    bed_pan_handle_style:
      name: Στυλ λαβής σκωραμίδας
      description: Περιγράφει το στυλ λαβής ή χειρολαβής που παρέχεται για τοποθέτηση
        και αφαίρεση.
    bed_pan_type:
      name: Τύπος σκωραμίδας (πάπια)
      description: 'Καθορίζει τον σχεδιασμό των σκωραμίδων: π.χ. τυπικός, βαριατρικός'
    bedding_pieces_included:
      name: Περιλαμβάνονται τεμάχια κλινοσκεπασμάτων
      description: Καθορίζει τα είδη που περιλαμβάνονται σε ένα σετ κλινοσκεπασμάτων,
        π.χ. μαξιλαροθήκη, επάνω σεντόνι
    bedding_size:
      name: Μέγεθος κλινοσκεπασμάτων
      description: Καθορίζει την κατηγορία μεγέθους για είδη κλινοσκεπασμάτων, π.χ.
        κανονικό μέγεθος, υπέρδιπλο μέγεθος (king size)
    beer_style:
      name: Στυλ μπύρας
      description: Βοηθά στην κατηγοριοποίηση των μπυρών με βάση τα διακριτά χαρακτηριστικά
        τους, π.χ. πικρή, θολή
    beer_variety:
      name: Ποικιλία μπύρας
      description: Κατηγοριοποιεί τις μπύρες με βάση τον συγκεκριμένο τύπο ή στυλ
        τους, π.χ. stout, pilsner
    bell_design:
      name: Σχέδιο σε καμπανάκι
      description: Περιγράφει το στυλ σε καμπανάκια γραφείου, π.χ. πιεζόμενα, καμπανάκια
        κλήσης
    bell_size:
      name: Μέγεθος σε καμπανάκι
      description: Υποδεικνύει το μέγεθος σε καμπανάκι ή καμπάνα ενός μουσικού οργάνου,
        όπως μεγάλο (L) ή μεσαίο (M)
    bell_sound:
      name: Ήχος κουδουνιού
      description: Περιγράφει τον τύπο του ήχου που κάνει ένα κουδούνι, όπως το κουδούνισμα
        ή τον χαρακτηριστικό ήχο «ντινγκ»
    belt_type:
      name: Τύπος ζώνης
      description: Προσδιορίζει τον σχεδιασμό της ζώνης ασφαλείας ενός οχήματος, όπως
        ζώνη μέσης ή τριών σημείων
    best_uses:
      name: Βέλτιστες χρήσεις
      description: Επισημαίνει τις ιδανικές δραστηριότητες για τη χρήση του προϊόντος,
        όπως ταξίδια, πεζοπορία ή καταδύσεις
    bevel_type:
      name: Τύπος λοξότμησης
      description: Καθορίζει τον τύπο λοξότμησης στα εργαλεία, όπως μονή ή διπλή
    beverage_product_form:
      name: Μορφή προϊόντος ροφήματος
      description: Περιγράφει πώς παρουσιάζεται ή καταναλώνεται το ρόφημα, όπως έτοιμο
        προς κατανάλωση ή σε κάψουλες
    bib_design:
      name: Σχέδιο σαλιάρας
      description: Καθορίζει το στυλ ή τον τύπο της βρεφικής σαλιάρας, όπως σε σχέδιο
        μπαντάνας ή με μανίκια
    bicycle_brake_type:
      name: Τύπος φρένων ποδηλάτου
      description: Καθορίζει το σύστημα φρένων σε ένα ποδήλατο, όπως V-brake ή δίσκο
    bicycle_features:
      name: Χαρακτηριστικά ποδηλάτου
      description: Καθορίζει τα ιδιαίτερα χαρακτηριστικά ενός ποδηλάτου, π.χ. ελαστικά
        ανθεκτικά σε τρυπήματα, σχάρα αποσκευών
    bidet_mounting_type:
      name: Τύπος τοποθέτησης μπιντέ
      description: Καθορίζει τον τρόπο εγκατάστασης του μπιντέ, όπως επιτοίχιος ή
        δαπέδου
    binder_ring_shape:
      name: Σχήμα δακτυλίου βιβλιοδεσίας
      description: Περιγράφει τους δακτυλίους βιβλιοδεσίας σε είδη γραφείου, όπως
        σε στρογγυλό σχήμα ή σε σχήμα D
    binding_mount:
      name: Βάση πρόσδεσης
      description: Καθορίζει τον τύπο τοποθέτησης πρόσδεσης για εξοπλισμό χειμερινών
        σπορ, π.χ. 2x2 disc
    binding_style:
      name: Στυλ βιβλιοδεσίας
      description: Περιγράφει τη μέθοδο που χρησιμοποιείται για τη βιβλιοδεσία εγγράφων,
        όπως βιβλιοδεσία σε σπιράλ ή μεταλλικό σπιράλ
    binocular/monocular_design:
      name: Σχεδιασμός διόπτρας με δύο οπτικά πεδία/διόπτρας με ένα οπτικό πεδίο
      description: Περιγράφει τη συγκεκριμένη χρήση για διόπτρες με δύο οπτικά πεδία
        ή διόπτρες με ένα οπτικό πεδίο, όπως στην αστρονομία ή το κυνήγι
    binocular_design:
      name: Σχέδιο διόπτρας με δύο οπτικά πεδία
      description: Περιγράφει τη συγκεκριμένη χρήση ή τη λειτουργικότητα των διοπτρών
        με δύο οπτικά πεδία, όπως στο κυνήγι ή την αστρονομία
    biometric_authentication_method:
      name: Μέθοδος βιομετρικής επαλήθευσης ταυτότητας
      description: Παραθέτει τις ενσωματωμένες επιλογές βιομετρικής ασφάλειας που
        είναι διαθέσιμες στο τηλέφωνο, όπως αισθητήρα δακτυλικών αποτυπωμάτων ή αναγνώριση
        προσώπου.
    biometric_certifications:
      name: Βιομετρικές πιστοποιήσεις
      description: Απαριθμεί επίσημες βιομηχανικές ή κυβερνητικές βιομετρικές πιστοποιήσεις
        που πληροί η συσκευή (π.χ., FBI PIV, FIPS 201).
    biometric_monitor_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ βιομετρικής οθόνης
      description: Προσδιορίζει ειδικές λειτουργίες σε αξεσουάρ βιομετρικής οθόνης,
        όπως παρακολούθηση καρδιακών παλμών ή βηματόμετρο
    bios_type:
      name: Τύπος BIOS
      description: Καθορίζει τον τύπο του BIOS που χρησιμοποιείται στις μητρικές πλακέτες,
        π.χ. υβριδικός, παλαιού τύπου
    bird_cage/stand_design:
      name: Σχεδιασμός κλουβιού/βάσης πτηνών
      description: Προσδιορίζει το στυλ του κλουβιού ή της βάσης για πτηνά, π.χ. κλουβί
        με θολωτή οροφή, τροχήλατη βάση
    bird_food_form:
      name: Μορφή τροφής πτηνών
      description: Περιγράφει τη φυσική μορφή της τροφής πτηνών, όπως σε σπόρους ή
        σφαιρίδια
    bird_food_ingredients:
      name: Συστατικά τροφής πτηνών
      description: Καθορίζει τον τύπο των συστατικών στις τροφές πτηνών, όπως σκουλήκια
        ή ηλιόσπορους
    bird_treat_type:
      name: Τύπος λιχουδιάς
      description: Προσδιορίζει την κατηγορία λιχουδιών πτηνών, όπως μπισκότα ή φρούτα
    birthday_candle_design:
      name: Σχέδιο κεριού γενεθλίων
      description: Περιγράφει το οπτικό θέμα των κεριών γενεθλίων, όπως σε σχήμα ζώου
        ή χαρακτήρα κινουμένων σχεδίων
    birthday_candle_type:
      name: Τύπος κεριού γενεθλίων
      description: Προσδιορίζει τα μοναδικά χαρακτηριστικά των κεριών γενεθλίων, π.χ.
        αρωματικά, sparkler
    bitter_variety:
      name: Ποικιλία Bitter
      description: Ταξινομεί τα bitters με βάση τα γευστικά τους προφίλ, π.χ. φλοράλ,
        πικάντικο
    blade_coating:
      name: Επικάλυψη λεπίδας
      description: Καθορίζει οποιαδήποτε επίστρωση απόδοσης που εφαρμόζεται στη λεπίδα
        για κοφτερότητα ή ολίσθηση (π.χ., λευκόχρυσος, PTFE, τιτάνιο).
    blade_curve:
      name: Καμπυλωτό μέρος λεπίδας
      description: Καθορίζει το καμπυλωτό μέρος της λεπίδας σε ένα μπαστούνι χόκεϊ,
        π.χ. ανοιχτό, με μύτη
    blade_design:
      name: Σχέδιο λεπίδας
      description: Καθορίζει το στυλ λεπίδας στα μαχαίρια γενικής χρήσης, όπως ξυράφι
        ή λεπίδα εγχαράξεων θραύσης
    blade_edge_configuration:
      name: Διαμόρφωση ακμής λεπίδας
      description: Καθορίζει τη μορφή ακμής μιας μεμονωμένης λεπίδας (π.χ., μονής
        ακμής, διπλής ακμής, σύστημα κασέτας, μισή λεπίδα).
    blade_material:
      name: Υλικό λεπίδας
      description: Καθορίζει το υλικό που χρησιμοποιείται στην κατασκευή μιας λεπίδας,
        όπως ατσάλι ή αλουμίνιο
    blade_type:
      name: Τύπος λεπίδας
      description: Καθορίζει το σχήμα και το στυλ της λεπίδας ενός προϊόντος, όπως
        ίσια λεπίδα ή τύπου στιλέτο
    blanket_color:
      name: Χρώμα κουβέρτας
      description: Προσδιορίζει το βασικό χρώμα μιας κουβέρτας, όπως navy blue ή πολύχρωμο
    blanket_pattern:
      name: Μοτίβο κουβέρτας
      description: Περιγράφει το σχέδιο ή το μοτίβο σε μια κουβέρτα, όπως φλοράλ ή
        γεωμετρικό
    blending_type:
      name: Τύπος ανάμειξης
      description: Προσδιορίζει τη μέθοδο ανάμειξης που χρησιμοποιείται σε εργαστηριακό
        εξοπλισμό, όπως συνεχής ή παρτίδας
    blind/shade_style:
      name: Στυλ περσίδας/ρολού
      description: Προσδιορίζει το σχέδιο ή τον τύπο περσίδων ή ρολών, όπως το ρολό
        σκίασης ή κάθετες περσίδες
    blocked_signal_types:
      name: Τύποι μπλοκαρισμένων σημάτων
      description: Καθορίζει κατηγορίες ασύρματων σημάτων που μπορεί να μπλοκάρει
        ο παρεμβολέας.
    blood_group_systems_detected:
      name: Συστήματα ομάδων αίματος που ανιχνεύονται
      description: Προσδιορίζει ποια συστήματα ομάδων αίματος μπορεί να προσδιορίσει
        το κιτ.
    blood_test_kit_components:
      name: Συστατικά μέρη ενός κιτ εξέτασης αίματος
      description: Καθορίζει τα είδη που περιλαμβάνονται σε κιτ εξέτασης αίματος,
        π.χ. επίθεμα γάζας, αυτοκόλλητοι επίδεσμοι
    bluetooth_functionality:
      name: Λειτουργικότητα Bluetooth
      description: Υποδεικνύει εάν η συσκευή λειτουργεί ως πομπός, δέκτης ή και τα
        δύο (πομποδέκτης).
    board_concave_shape:
      name: Σχήμα κοίλανσης σανίδας
      description: Ορίζει την καμπύλη κοίλανσης των σανίδων του σερφ ή των σανίδων
        κωπηλασίας (paddleboards), π.χ. κοίλανση τύπου V, επίπεδη.
    board_game_features:
      name: Χαρακτηριστικά επιτραπέζιου παιχνιδιού
      description: Υπογραμμίζει μοναδικές πτυχές ενός επιτραπέζιου παιχνιδιού, π.χ.
        γρήγορο στήσιμο, διαθέσιμη επέκταση
    board_game_mechanics:
      name: Μηχανική επιτραπέζιου παιχνιδιού
      description: Περιγράφει τη διάρθρωση στρατηγικής ή το συνεργατικό πνεύμα ενός
        επιτραπέζιου παιχνιδιού
    board_material:
      name: Υλικό πίνακα
      description: Καθορίζει τον τύπο υλικού σε πίνακες παρουσίασης, όπως ακρυλικό
        ή πορσελάνη
    board_mounting_type:
      name: Τύπος τοποθέτησης πίνακα
      description: Καθορίζει το στυλ εγκατάστασης των πινάκων παρουσίασης, όπως με
        δυνατότητα φορητότητας ή με καβαλέτο
    board_profile:
      name: Προφίλ πίνακα
      description: Καθορίζει το προφίλ μιας ιστιοσανίδας, π.χ. επίπεδη, με καμπύλη
        (τύπου rocker)
    board_surface:
      name: Επιφάνεια πίνακα
      description: Περιγράφει τον τύπο της επιφάνειας σε έναν πίνακα οπτικής παρουσίασης,
        όπως ύφασμα ή φελλός
    board_type:
      name: Τύπος σανίδας
      description: Ταξινομεί τις σανίδες του σκέιτμπορντ με βάση τον σχεδιασμό και
        τον σκοπό τους, όπως κλασικού τύπου ή τύπου cruiser
    boat_type:
      name: Τύπος σκάφους
      description: Προσδιορίζει το συγκεκριμένο σχέδιο ή μοντέλο ενός σκάφους, όπως
        πλωτή δεξαμενή ή κατάστρωμα λέμβου
    body/facial_hair_type:
      name: Τύπος τρίχας σώματος/προσώπου
      description: Βοηθά στην αντιστοίχιση προϊόντων περιποίησης μαλλιών σε τύπους
        μαλλιών όπως λεπτά ή χοντρά, συνήθως για αποχρωματισμό μαλλιών
    body_area:
      name: Περιοχή σώματος
      description: Καθορίζει το μέρος του σώματος για το οποίο έχει σχεδιαστεί το
        προϊόν, π.χ. πρόσωπο, γραμμή μπικίνι
    body_color:
      name: Χρώμα σώματος
      description: Καθορίζει το κύριο χρώμα οχημάτων ή εξαρτημάτων, π.χ. λευκό ή ασημί
    body_jewelry_type:
      name: Τύπος κοσμήματος σώματος
      description: Προσδιορίζει το συγκεκριμένο είδος κοσμήματος σώματος, π.χ. σκουλαρίκι
        κοιλιάς, σκουλαρίκι αυτιού με κλιπ
    body_material:
      name: Υλικό σώματος
      description: Καθορίζει το κύριο υλικό ενός προϊόντος, συνήθως καλαμιών ψαρέματος.
        πχ σύνθετο υλικό, αλουμίνιο
    body_paint/foundation_type:
      name: Τύπος βαφής σώματος/foundation
      description: Καθορίζει την κατηγορία του προϊόντος μακιγιάζ σώματος, όπως foundation
        ή ψεύτικο αίμα
    body_paint_formula_base:
      name: Βάση φόρμουλας χρώματος σώματος
      description: Προσδιορίζει την πρωτεύουσα βάση σύνθεσης, η οποία επηρεάζει την
        ανθεκτικότητα, το φινίρισμα και τη μέθοδο αφαίρεσης.
    body_pattern:
      name: Σχέδιο σώματος
      description: Περιγράφει το οπτικό σχέδιο ή μοτίβο στην κύρια επιφάνεια ενός
        προϊόντος, π.χ. φλοράλ, γεωμετρικό
    body_side:
      name: Πλευρά σώματος
      description: Καθορίζει αν το προϊόν έχει σχεδιαστεί για την αριστερή πλευρά,
        τη δεξιά πλευρά ή είναι κατάλληλο για αμφίπλευρη χρήση.
    bodyboard_features:
      name: Χαρακτηριστικά σανίδας κολύμβησης bodyboard
      description: Περιγράφει μοναδικά χαρακτηριστικά μιας σανίδας κολύμβησης bodyboard,
        όπως το σκληρό επάνω μέρος της επιφάνειάς της ή τη φουσκωτή κατασκευή
    boiler_system:
      name: Σύστημα λέβητα
      description: Καθορίζει το σύστημα λέβητα για συσκευές θέρμανσης, π.χ. combi,
        solo
    bolt_form:
      name: Τύπος βέλους
      description: Περιγράφει το σχήμα των βιδών εξαρτημάτων, π.χ. εξάγωνες, μηχανικές
    bolt_material:
      name: Υλικό βέλους
      description: Προσδιορίζει τη σύνθεση των βελών τοξοβολίας, όπως μπαμπού ή υαλοβάμβακας
    bone_anchored_interface_type:
      name: Τύπος διεπαφής οστικής αγκύρωσης
      description: Καθορίζει πώς ο επεξεργαστής προσαρτάται στο εμφύτευμα, διακρίνοντας
        μεταξύ διαδερμικών συστημάτων στήριξης και διαδερμικών μαγνητικών συστημάτων.
    book/file_cover_material:
      name: Υλικό εξωφύλλου βιβλίου/φακέλου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στα εξώφυλλα βιβλίων
        ή φακέλων, όπως χαρτόνι ή δέρμα
    book_cover_material:
      name: Υλικό εξωφύλλου βιβλίου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για εξώφυλλα βιβλίων,
        όπως δέρμα ή χαρτί
    book_cover_type:
      name: Τύπος εξωφύλλου βιβλίου
      description: Προσδιορίζει τον τύπο εξωφύλλου ενός βιβλίου, όπως σκληρό εξώφυλλο
        ή χαρτόδετο
    bookmark_design:
      name: Σχεδίαση σελιδοδείκτη
      description: Περιγράφει το στυλ ή τον τύπο ενός σελιδοδείκτη, όπως μαγνητικό
        ή με κλιπ
    bookmark_shape:
      name: Σχήμα σελιδοδείκτη
      description: Περιγράφει τη σχήμα ή το περίγραμμα ενός σελιδοδείκτη, όπως στρογγυλό
        ή τετράγωνο σχήμα
    boombox_lighting_effects:
      name: Εφέ φωτισμού boombox
      description: Περιγράφει την παρουσία και το στυλ των ενσωματωμένων LED ή RGB
        light shows που είναι ενσωματωμένα στο ηχείο.
    boot_style:
      name: Στυλ μπότας
      description: Καθορίζει το στυλ μπότας, π.χ. μποτάκια
    boot_type:
      name: Τύπος μπότας
      description: Ταξινομεί το είδος της μπότας, π.χ. μαλακή μπότα, σκληρή μπότα
    borescope_design:
      name: Σχεδιασμός ενδοσκοπικής κάμερας
      description: Περιγράφει τον τύπο της ενδοσκοπικής κάμερας, όπως εύκαμπτη, άκαμπτη
        ή ινοσκοπική.
    bottle/container_closure:
      name: Κλείσιμο μπουκαλιού/δοχείου
      description: Προσδιορίζει τον τύπο κλεισίματος σε μπουκάλια ή δοχεία, όπως αντλία
        ή αναδιπλούμενο πώμα
    bottle_closure_type:
      name: Τύπος κλεισίματος μπουκαλιού
      description: Προσδιορίζει τον τύπο κλεισίματος που χρησιμοποιείται σε ένα μπουκάλι,
        όπως πώμα από φελλό ή μεταλλικό πώμα
    bottle_design:
      name: Σχεδιασμός μπουκαλιού
      description: Περιγράφει τα χαρακτηριστικά ενός μπουκαλιού, συνήθως για βρεφικά
        προϊόντα, π.χ. ευκολία στο κράτημα.
    bottle_material:
      name: Υλικό μπουκαλιού
      description: Προσδιορίζει την ουσία που χρησιμοποιείται για την κατασκευή ενός
        μπιμπερό, όπως γυαλί ή πλαστικό.
    bottle_sterilizer_features:
      name: Χαρακτηριστικά αποστειρωτή μπιμερό
      description: Επισημαίνει συγκεκριμένες λειτουργίες των αποστειρωτών μπιμπερό,
        όπως η αυτόματη απενεργοποίηση ή η λειτουργία απόψυξης
    bottle_type:
      name: Τύπος μπουκαλιού
      description: Καθορίζει τον τύπο του κλεισίματος σε ένα μπουκάλι, όπως π.χ. πίεσης
        ή σπρέι.
    bottle_warmer/sterilizer_features:
      name: Χαρακτηριστικά θερμαντήρα/αποστειρωτή μπιμπερό
      description: Επισημαίνει τα ειδικά χαρακτηριστικά των θερμαντήρων ή αποστειρωτών
        μπιμπερό, όπως η αυτόματη απενεργοποίηση ή ο χρονοδιακόπτης
    bottle_warmer_features:
      name: Χαρακτηριστικά θερμαντήρα μπιμπερό
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των θερμαντήρων μπιμπερό,
        όπως η οθόνη LCD ή ο χρονοδιακόπτης
    bottom_surface_material:
      name: Υλικό επιφάνειας βάσης
      description: Προσδιορίζει το υλικό της επιφάνειας βάσης του προϊόντος, όπως
        μέταλλο ή γυαλί.
    bow/crossbow_features:
      name: Χαρακτηριστικά τόξου/βαλλίστρας
      description: Περιγράφει τα ειδικά χαρακτηριστικά των τόξων/βαλλιστρών, όπως
        το ρυθμιζόμενο τράβηγμα ή το φωτιζόμενο σκόπευτρο
    bow_features:
      name: Χαρακτηριστικά τόξου
      description: Προσδιορίζει τα μοναδικά χαρακτηριστικά των τόξων τοξοβολίας, π.χ.
        ρυθμιζόμενο τράβηγμα, φωτιζόμενο σκόπευτρο
    bow_hair_material:
      name: Υλικό τρίχας δοξαριού
      description: Καθορίζει τη σύνθεση της τρίχας του δοξαριού στα έγχορδα όργανα,
        π.χ. συνθετική, αλογότριχα
    bow_material:
      name: Υλικό τόξου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στα τόξα τοξοβολίας,
        π.χ. αλουμίνιο, υαλοβάμβακα
    box_type:
      name: Τύπος κιβωτίου
      description: Προσδιορίζει το στυλ των κιβωτίων αποθήκευσης ή των οργανωτών για
        οχήματα, όπως σεντούκι ή crossover
    bra_closure_type:
      name: Τύπος κλεισίματος σουτιέν
      description: Προσδιορίζει τον τρόπο με τον οποίο δένουν ή ανοίγουν τα σουτιέν,
        π.χ. από μπροστά, με τράβηγμα (χωρίς κλείσιμο).
    bra_coverage:
      name: Καλυπτικότητα σουτιέν
      description: Καθορίζει το επίπεδο της κάλυψης που παρέχεται από ένα σουτιέν,
        όπως πλήρης ή μερική
    bra_features:
      name: Χαρακτηριστικά σουτιέν
      description: Αναφέρει λεπτομερώς τα μοναδικά χαρακτηριστικά των σουτιέν, π.χ.
        αφαιρούμενη επένδυση, ύφασμα που απορροφά τον ιδρώτα
    bra_strap_type:
      name: Τύπος τιράντας σουτιέν
      description: Καθορίζει το στυλ και τη λειτουργικότητα των τιραντών του σουτιέν,
        όπως racerback
    bra_style:
      name: Στυλ σουτιέν
      description: Προσδιορίζει το σχέδιο ή το στυλ ενός σουτιέν, όπως push-up ή στράπλες
    bra_support_level:
      name: Επίπεδο στήριξης σουτιέν
      description: Υποδεικνύει το επίπεδο στήριξης που παρέχει ένα σουτιέν, π.χ. χαμηλό,
        μεσαίο, υψηλό
    brace_support_level:
      name: Επίπεδο στήριξης νάρθηκα
      description: Υποδεικνύει το καθορισμένο από τον κατασκευαστή συνολικό επίπεδο
        στήριξης ή προστασίας που προσφέρει ο νάρθηκας.
    bracelet_design:
      name: Σχεδιασμός βραχιολιού
      description: Καθορίζει το σχέδιο ενός βραχιολιού, όπως γούρι ή χειροπέδα
    bracket/brace_design:
      name: Σχέδιο στηρίγματος/βραχίονα
      description: Περιγράφει το στυλ των στηριγμάτων ή των βραχιόνων, π.χ. γωνιακό
        στήριγμα, γωνιακός βραχίονας
    bracket_profile:
      name: Προφίλ βραχίονα
      description: Υποδεικνύει το φυσικό στυλ βραχίονα που παρέχεται με την κάρτα,
        καθορίζοντας τη συμβατότητα του πλαισίου.
    brandy_variety:
      name: Ποικιλία μπράντι
      description: Διακρίνει τους διαφορετικούς τύπους μπράντι, π.χ. κονιάκ, γκράπα.
    breadboard_type:
      name: Τύπος breadboard
      description: Ταξινομεί το breadboard με θεμελιώδη κατασκευή ή στυλ μεγέθους.
    breath_spray_benefit:
      name: Όφελος σπρέι αναπνοής
      description: Προσδιορίζει το κύριο όφελος στοματικής φροντίδας που ισχυρίζεται
        ότι παρέχει το σπρέι αναπνοής.
    breath_sprays_certifications:
      name: Πιστοποιήσεις σπρέι για δροσερή αναπνοή
      description: Προσδιορίζει τα πρότυπα που πληροί ένα σπρέι για δροσερή αναπνοή,
        όπως δίκαιου εμπορίου ή χωρίς γλουτένη
    bridge/router_advanced_features:
      name: Προηγμένες λειτουργίες γέφυρας/δρομολογητή
      description: Υπογραμμίζει προηγμένες λειτουργίες γεφυρών/δρομολογητών, όπως
        υποστήριξη τεχνολογίας AI ή VPN
    brightness_levels:
      name: Επίπεδα φωτεινότητας
      description: Καθορίζει το εύρος της εκπομπής φωτός για προϊόντα, όπως μεσαία
        ή υψηλή
    bristle_grade:
      name: Ποιότητα τριχών
      description: Προσδιορίζει την ποιότητα ή την ταξινόμηση των ζωικών ή συνθετικών
        τριχών που χρησιμοποιούνται (π.χ., silvertip ασβού, συνθετική ίνα silvertip).
    bristle_hardness:
      name: Σκληρότητα τριχών
      description: Υποδεικνύει τη σκληρότητα των τριχών της οδοντόβουρτσας.
    bristle_material:
      name: Υλικό από τρίχες
      description: Προσδιορίζει τη σύνθεση των τριχών της βούρτσας, όπως νάιλον ή
        τρίχες αλόγου
    bristle_shape:
      name: Σχήμα τριχών
      description: Καθορίζει το σχήμα των τριχών της βούρτσας, π.χ. ίσιες, με γωνίες
    broadcast_video_standard:
      name: Πρότυπο μετάδοσης βίντεο
      description: Υποδεικνύει το/τα αναλογικό/ά πρότυπο/α μετάδοσης με το/τα οποίο/α
        είναι συμβατό το VCR.
    broadcasting_standard_supported:
      name: Υποστηριζόμενο πρότυπο μετάδοσης
      description: Καθορίζει τα πρότυπα τηλεοπτικής μετάδοσης ή διαμόρφωσης (δορυφορικά,
        καλωδιακά, επίγεια) που μπορεί να αποκωδικοποιήσει ή να χειριστεί το προϊόν.
    broadhead/field_point_material:
      name: Η υλικό ευρείας κεφαλής/σημείου πεδίου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στις ευρείες κεφαλές
        βελών τοξοβολίας ή τα σημεία πεδίου, όπως ανοξείδωτο ατσάλι ή ανθρακούχο χάλυβα
    broadhead_design:
      name: Σχέδιο ευρείας κεφαλής
      description: Υποδεικνύει τον τύπο σχεδίασης της ευρείας κεφαλής που χρησιμοποιείται
        στην τοξοβολία, π.χ. σταθερή λεπίδα, μηχανική
    brush_application:
      name: Εφαρμογή πινέλου
      description: Περιγράφει την προβλεπόμενη χρήση των πινέλων ζωγραφικής, όπως
        ακρυλικά ή ακουαρέλα
    brush_end_type:
      name: Τύπος άκρου πινέλου
      description: Περιγράφει τη δομική μορφή των άκρων του πινέλου (π.χ., μονού άκρου,
        διπλού άκρου, αναδιπλούμενο).
    brush_head_shape:
      name: Σχήμα κεφαλής βούρτσας
      description: Καθορίζει τη συνολική μορφή της κεφαλής της βούρτσας, που επηρεάζει
        την εμβέλεια και την καταλληλότητα για διαφορετικούς χρήστες.
    brush_head_usage:
      name: Χρήση κεφαλής πινέλου
      description: Καθορίζει την προβλεπόμενη χρήση των κεφαλών πινέλων, συνήθως για
        καλλυντικά- π.χ. βαθύς καθαρισμός, απολέπιση.
    brush_material:
      name: Υλικό πινέλου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στην κατασκευή
        του πινέλου, όπως σιλικόνη ή πλαστικό.
    brush_size:
      name: Μέγεθος πινέλου
      description: Καθορίζει το μέγεθος ενός πινέλου ζωγραφικής, π.χ. 0, 12
    brush_type:
      name: Τύπος πινέλου
      description: Καθορίζει το υλικό που χρησιμοποιείται σε ένα πινέλο ξυρίσματος,
        όπως συνθετικές τρίχες ή τρίχες ασβού.
    brushing_mode:
      name: Λειτουργία βουρτσίσματος
      description: Απαριθμεί τα προκαθορισμένα προγράμματα καθαρισμού που μπορεί να
        εναλλάσσει η οδοντόβουρτσα (π.χ., καθαρισμός, ευαίσθητο, λεύκανση).
    bug_type:
      name: Τύπος ζωύφια
      description: Καθορίζει το είδος του εντόμου στο οποίο στοχεύει το προϊόν, όπως
        τα μυρμήγκια ή οι σφήκες.
    building_board_material:
      name: Υλικό οικοδομικών σανίδων
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε σανίδες κατασκευής,
        όπως κόντρα πλακέ ή τσιμέντο
    building_consumable_form:
      name: Μορφή καταναλωτικού υλικού κατασκευής
      description: Καθορίζει τη μορφή των υλικών επιδιορθώσεων τοίχου, όπως σε υγρή
        μορφή ή σκόνη
    building_toy_type:
      name: Τύπος παιχνιδιού κατασκευής
      description: Καθορίζει την κατηγορία του παιχνιδιού κατασκευής, π.χ. σετ κατασκευών
        STEM ή μαγνητικά πλακίδια
    bulb_cap_type:
      name: Τύπος καπακιού λαμπτήρα
      description: Καθορίζει τον τύπο του καπακιού ή της βάσης που έχει ένας λαμπτήρας
        ή μια συσκευή φωτισμού, π.χ. E12, GU10
    bulb_shape:
      name: Σχήμα λαμπτήρα
      description: Περιγράφει το σχήμα των προϊόντων φωτισμού, π.χ. σωλήνας, σπείρα
    bulb_size:
      name: Μέγεθος λαμπτήρα
      description: Καθορίζει το μέγεθος των λαμπτήρων, π.χ. A19, C7
    bulb_type:
      name: Τύπος λαμπτήρα
      description: Καθορίζει τον τύπο του λαμπτήρα που χρησιμοποιείται σε προϊόντα
        φωτισμού, π.χ. LED, αλογόνου
    bulldozer_blade_type:
      name: Τύπος λεπίδας μπουλντόζας
      description: Προσδιορίζει το είδος της λεπίδας σε μια μπουλντόζα, όπως σε γωνία
        ή ευθεία (λεπίδα τύπου S)
    bullet_protection_level:
      name: Επίπεδο προστασίας από σφαίρες
      description: Υποδεικνύει το επίπεδο προστασίας από σφαίρες σε γιλέκα, π.χ. IIA,
        IV
    bullhorn_features:
      name: Χαρακτηριστικά bullhorn
      description: Αναδεικνύει τις μοναδικές λειτουργίες ενός bullhorn, όπως η ηχογράφηση
        φωνής ή η λειτουργία σειρήνας
    bullion_form:
      name: Μορφή χρυσού
      description: Καθορίζει τον τύπο του χρυσού, όπως νομίσματα ή ράβδοι.
    bungee_arm_mechanism:
      name: Μηχανισμός βραχίονα bungee
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται για την ανάρτηση και
        καθοδήγηση του καλωδίου ποντικιού (π.χ., βραχίονας ελατηρίου, ελαστικό κορδόνι,
        μαγνητική ανάρτηση).
    burner_material:
      name: Υλικό καυστήρα
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην κατασκευή του καυστήρα
        μιας κουζίνας ή γκριλ, όπως χυτοσίδηρος ή ανοξείδωτος χάλυβας
    butt_cap_color:
      name: Χρώμα καπακιού της λαβής
      description: Καθορίζει το χρώμα του καπακιού της λαβής σε καλάμια ψαρέματος,
        όπως μαύρο ή μπλε
    butt_cap_material:
      name: Υλικό καπακιού της λαβής
      description: Καθορίζει τη σύνθεση του κατώτερου άκρου της λαβής σε αθλητικά
        είδη, π.χ. EVA (αιθυλένιο-οξικό βινύλιο), φελλός
    butt_cap_pattern:
      name: Μοτίβο καπακιού της λαβής
      description: Περιγράφει το σχέδιο ή το μοτίβο στο καπάκι άκρου του καλαμιού
        ψαρέματος, όπως καμουφλάζ ή φλοράλ
    button/snap_closure_type:
      name: Τύπος κλεισίματος με κουμπί/κλιπ
      description: Περιγράφει το στυλ του μηχανισμού στερέωσης, όπως μαγνητικό ή αόρατο
    button_surface_profile:
      name: Προφίλ επιφάνειας κουμπιού
      description: Περιγράφει το φυσικό περίγραμμα της επιφάνειας του εμβόλου του
        κουμπιού, επηρεάζοντας την εργονομία και το οπτικό στυλ.
    cabinet_type:
      name: Τύπος ντουλαπιού
      description: Καθορίζει τη σχεδίαση και το σχήμα των παιχνιδιών arcade, όπως
        bartop ή mini arcade
    cable_form_factor:
      name: Παράγοντας μορφής καλωδίου
      description: Περιγράφει το φυσικό στυλ σχεδίασης ή σχήμα του καλωδίου.
    cable_housing_material:
      name: Υλικό περιβλήματος καλωδίου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για το περίβλημα του
        καλωδίου, όπως νάιλον ή PVC
    cable_jacket_rating:
      name: Βαθμολογία μανδύα καλωδίου
      description: Καθορίζει την περιβαλλοντική βαθμολογία ή βαθμολογία ασφαλείας
        του εξωτερικού μανδύα του καλωδίου (π.χ., plenum, άμεση ταφή, ανθεκτικό στην
        UV).
    cable_shielding:
      name: Θωράκιση καλωδίου
      description: Καθορίζει τον τύπο προστασίας που χρησιμοποιείται σε καλώδια, π.χ.
        σε πλέγμα (STP), αλουμινένια θωράκιση (FTP)
    cable_style:
      name: Στυλ καλωδίου
      description: Περιγράφει τη φυσική σχεδίαση του καλωδίου (π.χ., πλεκτό, επίπεδο,
        σπειροειδές, ανασυρόμενο).
    cable_tie_type:
      name: Τύπος δεσμού καλωδίου
      description: Καθορίζει το στυλ κατασκευής ή τον μηχανισμό στερέωσης του δεσμού
        καλωδίου.
    cable_tray_style:
      name: Στυλ δίσκου καλωδίων
      description: Περιγράφει το δομικό στυλ του τμήματος δίσκου καλωδίων που καθορίζει
        τον εξαερισμό και τη μέθοδο στήριξης καλωδίων.
    cable_type:
      name: Τύπος καλωδίου
      description: Ταξινομεί την ποικιλία των καλωδίων, συνήθως σε εξοπλισμό ποδηλασίας.
        πχ φρένο, γρανάζι
    cache_level:
      name: Επίπεδο κρυφής μνήμης
      description: Υποδεικνύει τη θέση ιεραρχίας της κρυφής μνήμης (π.χ., L1, L2,
        L3), που επηρεάζει το μέγεθος, την καθυστέρηση και την εγγύτητα στους πυρήνες
        του επεξεργαστή.
    caffeine_content:
      name: Περιεκτικότητα σε καφεΐνη
      description: Υποδεικνύει την ποσότητα καφεΐνης που υπάρχει σε ένα προϊόν, π.χ.
        χωρίς καφεΐνη, χαμηλή καφεΐνη
    cage_type:
      name: Τύπος κλωβού
      description: Προσδιορίζει το στυλ του κλωβού ασφαλείας σε οχήματα, όπως ολόκληρος
        κλωβός ή μισός κλωβός
    calculator_accessory_type:
      name: Τύπος αξεσουάρ αριθμομηχανής
      description: Καθορίζει το είδος του εξαρτήματος της αριθμομηχανής, όπως ρολό
        χαρτιού ή προσαρμογέα εκτυπωτή
    calculator_features:
      name: Χαρακτηριστικά αριθμομηχανής
      description: Περιγράφει τις λειτουργίες που μπορεί να εκτελέσει μια αριθμομηχανή,
        όπως υπολογισμός δανείου ή στατιστική ανάλυση
    calendar/organizer_features:
      name: Χαρακτηριστικά ημερολογίου/οργανωτή
      description: Περιγράφει ειδικά χαρακτηριστικά των ημερολογίων ή οργανωτών, όπως
        διαθέσιμοι χρόνοι χρήσης ή επισημασμένες αργίες
    calendar_format:
      name: Μορφή ημερολογίου
      description: Καθορίζει το χρονικό πλαίσιο ενός προϊόντος ημερολογιακά, όπως
        σε ημερήσια ή μηνιαία βάση
    calibration_sensor_type:
      name: Τύπος αισθητήρα βαθμονόμησης
      description: Καθορίζει την υποκείμενη τεχνολογία υλικού ή τη μορφή του βαθμονομητή.
    call_blocking_method:
      name: Μέθοδος φραγής κλήσεων
      description: Καθορίζει πώς η συσκευή αναγνωρίζει και μπλοκάρει τις ανεπιθύμητες
        κλήσεις.
    caller_id_compatibility:
      name: Συμβατότητα αναγνώρισης κλήσης
      description: Δηλώνει εάν το τηλέφωνο υποστηρίζει υπηρεσίες αναγνώρισης κλήσης
        που παρέχονται από το τηλεφωνικό δίκτυο.
    caller_id_standard_compatibility:
      name: Συμβατότητα προτύπου αναγνώρισης κλήσης
      description: Υποδεικνύει ποιες μορφές σηματοδοσίας αναγνώρισης κλήσης μπορεί
        να αποκωδικοποιήσει η συσκευή.
    cam_system:
      name: Σύστημα εκκέντρου
      description: Καθορίζει το σύστημα εκκέντρου που χρησιμοποιείται στον εξοπλισμό
        τοξοβολίας, π.χ. υβριδικό, μονό
    camera_attachment:
      name: Εξάρτημα κάμερας
      description: Καθορίζει το εξάρτημα ή το αξεσουάρ της κάμερας, όπως γωνιακό σκόπευτρο
        κάμερας ή προσαρμογέας προσοφθάλμιου φακού
    camera_button/knob_type:
      name: Τύπος κουμπιού/διακόπτη κάμερας
      description: Προσδιορίζει το κουμπί ή τον διακόπτη σε μια κάμερα, π.χ. κουμπί
        απελευθέρωσης κλείστρου, διακόπτης περιστροφής λειτουργίας
    camera_control_type:
      name: Τύπος ελέγχου κάμερας
      description: Καθορίζει τον τύπο του τηλεχειριστηρίου της κάμερας, π.χ. τηλεχειριστήριο,
        απελευθέρωση κλείστρου
    camera_display_technology:
      name: Τεχνολογία απεικόνισης κάμερας
      description: Καθορίζει την τεχνολογία οθόνης μιας κάμερας, π.χ. OLED, Super
        AMOLED
    camera_features:
      name: Χαρακτηριστικά κάμερας
      description: Προσδιορίζει ειδικές δυνατότητες μιας κάμερας, όπως σταθεροποίηση
        εικόνας ή ανίχνευση προσώπου
    camera_gear_type:
      name: Τύπος εργαλείων κάμερας
      description: Προσδιορίζει τον συγκεκριμένο τύπο εργαλείου κάμερας, όπως η κίνηση
        της κάμερας ή η παρακολούθηση της εστίασης
    camera_hd_type:
      name: Τύπος κάμερας HD
      description: Καθορίζει την ποιότητα βίντεο της κάμερας, όπως Quad HD ή 8K ultra
        HD
    camera_lens_material:
      name: Υλικό φακού κάμερας
      description: Καθορίζει τη σύνθεση των φακών κάμερας ή βιντεοκάμερας, όπως γυαλί
        ή πλαστικό
    camera_lens_type:
      name: Τύπος φακού κάμερας
      description: Προσδιορίζει τον τύπο του φακού της κάμερας, όπως macro ή τηλεφακό
    camera_mounting_type:
      name: Τύπος τοποθέτησης κάμερας
      description: Καθορίζει τη μέθοδο προσάρτησης της κάμερας, π.χ. τρίποδο, κλιπ
    camera_sensor_type:
      name: Τύπος αισθητήρα κάμερας
      description: Προσδιορίζει τον τύπο του αισθητήρα σε κάμερες ή οπτικά συστήματα,
        π.χ. CMOS, CCD
    camera_shape:
      name: Σχήμα κάμερας
      description: Περιγράφει το στυλ σχεδιασμού των καμερών ασφαλείας, όπως bullet
        ή box
    candle_kit_items_included:
      name: Περιλαμβάνονται είδη κιτ κεριών
      description: Καθορίζει τα είδη που παρέχονται σε ένα κιτ κεριών, όπως φυτίλια
        κεριών ή δοχείο τήξης κεριού
    candle_material:
      name: Υλικό κεριού
      description: Καθορίζει τον τύπο κεριού ή υλικού που χρησιμοποιείται σε ένα κερί,
        όπως κερί παραφίνης ή κερί μέλισσας
    candle_shape:
      name: Σχήμα κεριού
      description: Περιγράφει το σχήμα ενός κεριού, όπως κυλινδρικό ή τετράγωνο σχήμα
    candle_type:
      name: Τύπος κεριού
      description: Καθορίζει τη σχεδίαση των κεριών, όπως σε κωνικό σχήμα ή σε κερί
        τύπου ρεσώ
    cane_base_design:
      name: Σχεδιασμός βάσης μπαστουνιού
      description: Προσδιορίζει τη διαμόρφωση της βάσης στήριξης του μπαστουνιού.
    canned_meat_variety:
      name: Ποικιλία σε κονσέρβα κρέατος
      description: Διακρίνει ανάμεσα σε ποικιλίες κονσερβοποιημένων κρεάτων, όπως
        γαλοπούλα ή ζαμπόν
    canopy_color:
      name: Χρώμα σκιάστρου
      description: Καθορίζει την απόχρωση της ομπρέλας ή του σκιάστρου της ομπρέλας,
        όπως το μαύρο
    canopy_material:
      name: Υλικό σκιάστρου
      description: Καθορίζει το υλικό που χρησιμοποιείται για ομπρέλες ή σκίαστρα,
        όπως βαμβάκι ή βινύλιο
    canopy_pattern:
      name: Μοτίβο σκιάστρου
      description: Προσδιορίζει το οπτικό μοτίβο σε σκίαστρα ομπρέλας ή αλεξηλίου,
        όπως καρό ή με σχέδιο
    cantilever_material:
      name: Υλικό προβόλου
      description: Υποδεικνύει το υλικό του προβόλου που συγκρατεί τη βελόνα, επηρεάζοντας
        την ικανότητα παρακολούθησης και την ηχητική υπογραφή.
    canvas_finish:
      name: Φινίρισμα καμβά
      description: Υποδεικνύει εάν ένας καμβάς είναι έτοιμος για ζωγραφική, π.χ. ασταρωμένος,
        μη ασταρωμένος
    canvas_material:
      name: Υλικό καμβά
      description: Προσδιορίζει τον τύπο υφάσματος που χρησιμοποιείται στη δημιουργία
        καμβά, όπως βαμβάκι ή λινό
    canvas_texture:
      name: Υφή καμβά
      description: Περιγράφει την υφή της επιφάνειας ενός καμβά, όπως λεία ή μεσαίου
        κόκκου
    capacitance_tolerance:
      name: Ανοχή χωρητικότητας
      description: Υποδεικνύει την επιτρεπτή απόκλιση της πραγματικής χωρητικότητας
        από την ονομαστική τιμή, εκφρασμένη ως ποσοστό.
    capacitor_application:
      name: Εφαρμογή πυκνωτή
      description: Υποδηλώνει την κύρια προβλεπόμενη χρήση ή κατηγορία εφαρμογής του
        πυκνωτή (π.χ., λειτουργία κινητήρα, ήχος, snubber).
    capacitor_polarity:
      name: Πολικότητα πυκνωτή
      description: Δηλώνει εάν ο πυκνωτής είναι πολωμένος, μη πολωμένος ή διπολικός,
        επηρεάζοντας τον προσανατολισμό εγκατάστασης και τις κατάλληλες θέσεις κυκλώματος.
    car_freshener_fragrance:
      name: Άρωμα αποσμητικού αυτοκινήτου
      description: Καθορίζει το άρωμα αποσμητικών χώρου οχημάτων, όπως άρωμα λεβάντας
        ή άρωμα «new car»
    car_seat_installation:
      name: Τοποθέτηση καθίσματος αυτοκινήτου
      description: Καθορίζει τη μέθοδο τοποθέτησης παιδικού καθίσματος αυτοκινήτου,
        όπως μάνδαλο ή ζώνη ασφαλείας
    car_seat_orientation:
      name: Προσανατολισμός καθίσματος αυτοκινήτου
      description: Καθορίζει την κατεύθυνση που βλέπει ένα παιδικό κάθισμα αυτοκινήτου,
        όπως προς τα πίσω ή προς τα εμπρός
    car_type:
      name: Τύπος αυτοκινήτου
      description: Καθορίζει την κατηγορία ενός οχήματος, όπως SUV ή sedan
    carabiner_gate_type:
      name: Τύπος πύλης καραμπίνερ
      description: Καθορίζει τον τύπο της πύλης στα καραμπίνερ αναρρίχησης, όπως βιδωτό
        πορτάκι ή κουμπωτή πύλη
    carabiner_shape:
      name: Σχήμα καραμπίνερ
      description: Προσδιορίζει τη μορφή των καραμπίνερ που χρησιμοποιούνται στην
        αναρρίχηση, όπως το HMS ή σε σχήμα αχλαδιού
    card/adapter_installation:
      name: Εγκατάσταση κάρτας/προσαρμογέα
      description: Προσδιορίζει τον τρόπο εγκατάστασης των καρτών I/O ή των προσαρμογέων,
        όπως εσωτερικές(-οί) ή εξωτερικές(-οί)
    card_attributes:
      name: Χαρακτηριστικά κάρτας
      description: Περιγράφει ειδικά χαρακτηριστικά συλλεκτικών καρτών συναλλαγών,
        όπως μεταλλικό φινίρισμα ή ολογραφικά εφέ
    card_design:
      name: Σχέδιο κάρτας
      description: Καθορίζει τη μορφή μιας κάρτας πρόσκλησης ή απάντησης, όπως διπλωμένη
        ή επίπεδη
    card_format:
      name: Μορφή κάρτας
      description: Περιγράφει το στυλ των προσκλήσεων ή των καρτών, όπως επίπεδη κάρτα
        ή διπλωμένη κάρτα
    card_holder_design:
      name: Σχέδιο θήκης κάρτας
      description: Περιγράφει το στυλ ή τη μορφή μιας θήκης για κάρτα θέσης, όπως
        με κλιπ ή αναδιπλούμενη
    card_interface_type:
      name: Τύπος διεπαφής κάρτας
      description: Περιγράφει εάν ο αναγνώστης επικοινωνεί μέσω φυσικών επαφών, ασύρματης
        RF ή και τα δύο.
    card_rechargeability:
      name: Δυνατότητα επαναφόρτισης κάρτας
      description: Υποδεικνύει εάν το υπόλοιπο της κάρτας μπορεί να επαναφορτιστεί
        μετά τη χρήση της αρχικής πίστωσης, καθώς και την κύρια μέθοδο επαναφόρτισης.
    card_size:
      name: Μέγεθος κάρτας
      description: Χρησιμοποιείται για να υποδείξει το μέγεθος των ευχετήριων καρτών
        ή καρτών σημειώσεων, π.χ. A4, letter
    card_usage_status:
      name: Κατάσταση χρήσης κάρτας
      description: Υποδεικνύει εάν η πίστωση της τηλεφωνικής κάρτας έχει χρησιμοποιηθεί
        ή παραμένει άθικτη.
    care_instructions:
      name: Οδηγίες φροντίδας
      description: Παρέχει οδηγίες για τη συντήρηση του προϊόντος, όπως μόνο πλύσιμο
        στο χέρι ή μόνο στεγνό καθάρισμα
    carry_options:
      name: Επιλογές μεταφοράς
      description: Καθορίζει τις διαθέσιμες μεθόδους μεταφοράς για αντικείμενα, όπως
        λαβή ή ιμάντα ώμου
    carrying_positions:
      name: Θέσεις μεταφοράς
      description: Καθορίζει τους διαφορετικούς τρόπους με τους οποίους μπορεί να
        φορεθεί ένας μάρσιπος βρέφους, όπως στο ισχίο ή με φορά προς τα πίσω
    carrying_type:
      name: Τύπος μεταφοράς
      description: Περιγράφει τη μέθοδο μεταφοράς ενός προϊόντος, όπως μεταφορά με
        το χέρι ή με ιμάντα ώμου
    cart_design:
      name: Σχεδιασμός καροτσιού
      description: Περιγράφει τη διάταξη ή τη δομή ενός ιατρικού καροτσιού, όπως με
        διπλό άγκιστρο ή με βάση
    cart_type:
      name: Τύπος καροτσιού
      description: Προσδιορίζει την πηγή ενέργειας για ένα καρότσι γκολφ, όπως ηλεκτρική
        ενέργεια ή φυσικό αέριο
    cartridge_authenticity:
      name: Γνησιότητα κασέτας
      description: Προσδιορίζει εάν το αναλώσιμο είναι πρωτότυπο του κατασκευαστή,
        συμβατό, ανακατασκευασμένο ή ξαναγεμισμένο.
    cartridge_mounting_style:
      name: Στυλ στήριξης κεφαλής
      description: Καθορίζει πώς η κεφαλή προσαρτάται στον βραχίονα ή το headshell
        (π.χ., στήριξη μισής ίντσας, στήριξη P), εξασφαλίζοντας μηχανική συμβατότητα.
    cartridge_type:
      name: Τύπος φυσιγγίου
      description: Προσδιορίζει την τεχνολογία φυσιγγίου σε συσκευές αναπαραγωγής
        δίσκων, όπως κεραμική ή μαγνητική
    cartridge_yield_type:
      name: Τύπος απόδοσης κασέτας
      description: Υποδεικνύει την κατηγορία χωρητικότητας που καθορίζεται από τον
        κατασκευαστή για την κασέτα (π.χ., τυπική, υψηλής απόδοσης).
    case_color:
      name: Χρώμα θήκης
      description: Καθορίζει το χρώμα της θήκης ενός προϊόντος, όπως διαφανές ή λευκό
    case_pattern:
      name: Μοτίβο θήκης
      description: Περιγράφει το σχέδιο ή το μοτίβο στη θήκη ενός προϊόντος, όπως
        φλοράλ ή γεωμετρικό
    case_transparency_level:
      name: Επίπεδο διαφάνειας θήκης
      description: Υποδεικνύει πόσο διαφανής είναι η θήκη.
    case_type:
      name: Τύπος θήκης
      description: Καθορίζει το είδος της θήκης για ηλεκτρονικά είδη και αξεσουάρ,
        όπως στυλ πορτοφολιού ή βιβλίου
    cassette_adapter_type:
      name: Τύπος προσαρμογέα κασέτας
      description: Προσδιορίζει τον τύπο του προσαρμογέα κασέτας, π.χ. 3,5 mm σε κασέτα,
        Bluetooth σε κασέτα
    cat_age_group:
      name: Ηλικιακή ομάδα γάτας
      description: Ορίζει προϊόντα κατάλληλα για συγκεκριμένα στάδια της ζωής της
        γάτας, π.χ. γατάκι, ηλικιωμένη γάτα
    cat_litter_formula:
      name: Φόρμουλα στρωμνής γάτας
      description: Προσδιορίζει τη σύνθεση στρωμνής γάτας, όπως από κόκκους ή άργιλο
    cbd_ingredients:
      name: Συστατικά CBD
      description: Προσδιορίζει τα συγκεκριμένα συστατικά που σχετίζονται με το CBD
        σε ένα προϊόν, όπως CBD πλήρους φάσματος ή γλυκαντικά
    celebration_type:
      name: Τύπος γιορτής
      description: Καθορίζει την περίσταση για την οποία είναι κατάλληλο το προϊόν,
        όπως Χριστούγεννα ή αποφοίτηση
    cellular_capability:
      name: Δυνατότητα κινητής τηλεφωνίας
      description: Υποδεικνύει εάν το μοντέλο υποστηρίζει δίκτυα κινητής τηλεφωνίας
        επιπλέον του Wi-Fi.
    cervix_height_suitability:
      name: Καταλληλότητα ύψους τραχήλου
      description: Υποδεικνύει για ποιο ύψος τραχήλου (π.χ., χαμηλό, μέτριο, υψηλό)
        είναι βελτιστοποιημένο το κύπελλο για να εξασφαλίσει σωστή εφαρμογή.
    chain_link_type:
      name: Τύπος συνδέσμου αλυσίδας
      description: Καθορίζει το στυλ του κρίκου της αλυσίδας για κοσμήματα, όπως αλυσίδα
        σχοινιού ή επίπεδη αλυσίδα
    chain_type:
      name: Τύπος αλυσίδας
      description: Προσδιορίζει τον τύπο της αλυσίδας που χρησιμοποιείται σε μέρη
        σκάφους, όπως αλυσίδα BBB ή υψηλής δοκιμής (HT)
    chair/sofa_features:
      name: Χαρακτηριστικά καρέκλας/καναπέ
      description: Προσδιορίζει μοναδικά χαρακτηριστικά των καθισμάτων, όπως ανθεκτικότητα
        στους λεκέδες ή ηλεκτρική ανάκλιση
    chair_features:
      name: Χαρακτηριστικά καρέκλας
      description: Υπογραμμίζει ειδικές λειτουργίες μιας καρέκλας, όπως λειτουργία
        μασάζ ή ηλεκτρική ανάκλιση
    chalkboard_surface:
      name: Επιφάνεια μαυροπίνακα
      description: Προσδιορίζει τον τύπο της επιφάνειας σε μαυροπίνακες, όπως μαγνητική
        ή παραδοσιακή επιφάνεια
    changing_mat/tray_features:
      name: Αλλαγή χαρακτηριστικών στρώματος/δίσκου αλλαξιέρας
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των στρωμάτων/δίσκων αλλαξιέρας,
        όπως ενσωματωμένες θήκες ή δυνατότητα φορητότητας
    changing_mat_features:
      name: Χαρακτηριστικά στρώματος αλλαξιέρας
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των στρωμάτων σε βρεφικές
        αλλαξιέρες, όπως ενσωματωμένες θήκες ή δυνατότητα φορητότητας
    changing_tray_features:
      name: Χαρακτηριστικά δίσκου αλλαξιέρας
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά του δίσκου σε βρεφικές αλλαξιέρες,
        όπως ενσωματωμένες θήκες ή ιμάντας ασφαλείας
    charcoal_source_material:
      name: Πρώτη ύλη άνθρακα
      description: Καθορίζει την πρώτη ύλη από την οποία προήλθε ο ενεργός άνθρακας.
    charger_style:
      name: Στυλ φορτιστή
      description: Καθορίζει τον φυσικό παράγοντα μορφής ή τη συνολική σχεδίαση του
        ασύρματου φορτιστή.
    charger_type:
      name: Τύπος φορτιστή
      description: Προσδιορίζει τον τύπο φορτιστή για μπαταρίες οχημάτων, όπως μη
        αυτόματος ή έξυπνος φορτιστής
    charging_cable_type:
      name: Τύπος καλωδίου φόρτισης
      description: Καθορίζει το είδος του καλωδίου φόρτισης EV, όπως το Επίπεδο 3
        ή τον προσαρμογέα
    charging_interface_type:
      name: Τύπος διεπαφής φόρτισης
      description: Καθορίζει τη φυσική θύρα ή τη μέθοδο που χρησιμοποιείται για την
        επαναφόρτιση του κιτ φωτισμού (π.χ., USB-C, Micro-USB, ασύρματη φόρτιση).
    charging_level:
      name: Επίπεδο φόρτισης
      description: Καθορίζει το επίπεδο ισχύος των σταθμών φόρτισης EV, όπως Επίπεδο
        1 (120v) ή Επίπεδο 2 (240v)
    charging_method:
      name: Μέθοδος φόρτισης
      description: Καθορίζει τον τρόπο φόρτισης μιας ηλεκτρονικής συσκευής, π.χ. ασύρματη,
        ενσύρματη
    chassis_type:
      name: Τύπος πλαισίου
      description: Καθορίζει τη μορφή του περιβλήματος υπολογιστών και διακομιστών,
        όπως πύργος ή τοποθέτηση σε ικρίωμα
    chemical_application:
      name: Χημική εφαρμογή
      description: Προσδιορίζει την κύρια χρήση ενός χημικού προϊόντος, π.χ. αδιαβροχοποίηση,
        καθαρισμός
    chemical_container_type:
      name: Τύπος δοχείου χημικών
      description: Καθορίζει τον τύπο του δοχείου για καθαριστικά αποχέτευσης, όπως
        μπιτόνι ή συσκευασία δόσεων
    chemical_grade:
      name: Βαθμός χημικής καθαρότητας
      description: Υποδεικνύει την ποιότητα και την καθαρότητα των χημικών ουσιών,
        όπως βαθμός τροφίμων ή βαθμός εργαστηρίου
    chemical_product_form:
      name: Μορφή χημικού προϊόντος
      description: Καθορίζει τη μορφή χημικών προϊόντων, π.χ. σε γέλη ή κόκκους
    chemical_purity:
      name: Χημική καθαρότητα
      description: Υποδεικνύει το επίπεδο καθαρότητας σε ένα χημικό προϊόν, όπως >90%
        ή >95%
    chemical_safety_features:
      name: Χαρακτηριστικά ασφάλειας των χημικών ουσιών
      description: Υπογραμμίζει τα χαρακτηριστικά ασφάλειας των χημικών ουσιών, όπως
        μη εύφλεκτα ή υποαλλεργικά
    chicken_feed_stage:
      name: Στάδιο τροφοδοσίας των κοτόπουλων
      description: Προσδιορίζει το κατάλληλο στάδιο ζωής για την τροφοδοσία των κοτόπουλων,
        όπως τροφή εκκίνησης ή στρώματος
    child_seat_placement:
      name: Τοποθέτηση παιδικού καθίσματος
      description: Καθορίζει τη θέση του παιδικού καθίσματος σε ένα ποδήλατο, όπως
        μπροστά ή πίσω
    chin_strap_style:
      name: Στυλ ιμάντα πηγουνιού
      description: Καθορίζει το δομικό σχέδιο ή τη διαμόρφωση του ιμάντα (π.χ., μονός
        ιμάντας, πλήρους κεφαλής, άλως).
    chipper_technology:
      name: Τεχνολογία μηχανής τεμαχισμού
      description: Προσδιορίζει τον τύπο της τεχνολογίας που χρησιμοποιείται στις
        μηχανές τεμαχισμού, όπως κοχλίας ή τύμπανο
    chiropractic_table_design:
      name: Σχεδιασμός τραπεζιού χειροπρακτικής
      description: Περιγράφει τα λειτουργικά χαρακτηριστικά ενός τραπεζιού χειροπρακτικής,
        όπως πτώση ή ανύψωση
    chocolate_type:
      name: Τύπος σοκολάτας
      description: Καθορίζει την ποικιλία της σοκολάτας με βάση τα συστατικά της και
        την περιεκτικότητά της σε κακάο, π.χ. μαύρη σοκολάτα, σοκολάτα γάλακτος
    cholesterol_analyte_measured:
      name: Μετρούμενος αναλύτης χοληστερόλης
      description: Απαριθμεί τους συγκεκριμένους βιοδείκτες που η συσκευή μπορεί να
        μετρήσει ή να υπολογίσει εκτός από τη συνολική χοληστερόλη.
    chuck_type:
      name: Τύπος τσοκ
      description: Καθορίζει το είδος του τσοκ σε εργαλεία χειρός (σιδηρικά), όπως
        SDS ή SDS max
    cigar_body:
      name: Ένταση πούρου
      description: Προσδιορίζει την ένταση και το γευστικό προφίλ των πούρων, π.χ.
        ήπιο, μέτριο έως πλήρες
    circuit_board_features:
      name: Χαρακτηριστικά πλακέτας κυκλώματος
      description: Περιγράφει μοναδικές πτυχές μιας πλακέτας κυκλώματος, όπως ενσωματωμένα
        γραφικά ή υποστήριξη overclocking
    circuit_breaker_design:
      name: Σχεδιασμός διακοπτών κυκλώματος
      description: Περιγράφει το στυλ τοποθέτησης ενός διακόπτη κυκλώματος, όπως με
        βίδες (bolt-on) ή με βύσμα (plug-in)
    circuit_breaker_panel_form:
      name: Μορφή πίνακα διακοπτών κυκλώματος
      description: Προσδιορίζει τον τύπο του πίνακα διακοπτών κυκλώματος, όπως μινιατούρα
        ή διαμορφωμένο περίβλημα
    circuit_breaker_type:
      name: Τύπος διακόπτη κυκλώματος
      description: Προσδιορίζει τον τύπο του διακόπτη κυκλώματος, όπως κανονικός τύπος
        ή τύπος AFCI
    clarinet_key_system:
      name: Σύστημα πλήκτρων κλαρινέτου
      description: Προσδιορίζει το σύστημα πλήκτρων για ένα κλαρινέτο, όπως σύστημα
        Άλμπερτ ή Μπέμ
    clasp_type:
      name: Τύπος κουμπώματος
      description: Καθορίζει τον τύπο κουμπώματος για αξεσουάρ, όπως πόρπη ή πεταλούδα
    claw_design:
      name: Σχέδιο νυχιών
      description: Καθορίζει το σχήμα νυχιού σε εργαλείο ξυσίματος πλάτης, όπως στρογγυλεμένο
        ή μυτερό
    clay/slip_texture:
      name: Υφή πηλού/λάσπης
      description: Περιγράφει την αίσθηση και τη συνοχή του πηλού ή της λάσπης, όπως
        τραχύς ή λείος
    clay_texture:
      name: Υφή πηλού
      description: Περιγράφει την αίσθηση και τη συνοχή των προϊόντων πηλού, όπως
        μέτρια ή λεία
    cleaner_purpose:
      name: Σκοπός καθαριστικού
      description: Προσδιορίζει τη συγκεκριμένη χρήση ενός καθαριστικού για σκάφη,
        όπως για γάστρα ή κατάστρωμα
    cleaning_instructions:
      name: Οδηγίες καθαρισμού
      description: Οδηγίες για τη συνιστώμενη μέθοδο καθαρισμού, όπως κατάλληλο για
        πλυντήριο πιάτων ή μόνο πλύσιμο στο χέρι
    cleaning_kit_components_included:
      name: Εξαρτήματα κιτ καθαρισμού που περιλαμβάνονται
      description: Αναφέρει τα συγκεκριμένα αντικείμενα που περιέχονται στο κιτ ώστε
        οι πελάτες να κατανοούν ποια εργαλεία και αναλώσιμα παρέχονται.
    cleaning_mode:
      name: Λειτουργία καθαρισμού
      description: Απαριθμεί τις συγκεκριμένες λειτουργίες καθαρισμού ή οδοντικού
        νήματος που είναι διαθέσιμες στη συσκευή.
    cleaning_purpose:
      name: Σκοπός καθαρισμού
      description: Καθορίζει την προβλεπόμενη χρήση προϊόντων καθαρισμού ή πλυντηρίου,
        π.χ. για φρεσκάρισμα, για λεκέδες
    cleaning_surfaces:
      name: Καθαρισμός επιφανειών
      description: Προσδιορίζει τις κατάλληλες επιφάνειες για ένα προϊόν καθαρισμού,
        όπως γυάλινες επιφάνειες ή εστίες μαγειρέματος
    cleaning_technology:
      name: Τεχνολογία καθαρισμού
      description: Περιγράφει την κύρια κίνηση ή τον μηχανισμό που χρησιμοποιεί η
        οδοντόβουρτσα για τον καθαρισμό των δοντιών.
    cleanse_focus:
      name: Εστίαση καθαρισμού
      description: Προσδιορίζει το κύριο σύστημα του σώματος ή τον σκοπό που στοχεύει
        το προϊόν καθαρισμού.
    cleanser_type:
      name: Τύπος καθαριστικού
      description: Περιγράφει τη συγκεκριμένη υφή ή μορφή του καθαριστικού.
    cleat_type:
      name: Τύπος δέστρας
      description: Καθορίζει το στυλ των δεστρών που χρησιμοποιούνται στην πρόσδεση,
        όπως με αναδίπλωση ή ανοιχτής βάσης
    climbing_activity:
      name: Δραστηριότητα αναρρίχησης
      description: Καθορίζει τον τύπο αναρρίχησης για τον οποίο έχει σχεδιαστεί το
        προϊόν, όπως ορειβασία ή αναρρίχηση στον πάγο
    clip_type:
      name: Τύπος βάσης σύσφιξης (κλιπ)
      description: Καθορίζει το στυλ της βάσης σύσφιξης (κλιπ) σε στοιχεία όπως οι
        πίνακες επικόλλησης, π.χ. υψηλής χωρητικότητας
    clipper/trimmer_type:
      name: Τύπος κουρευτικής μηχανής/μηχανής ψαλιδίσματος
      description: Προσδιορίζει την πηγή τροφοδοσίας των κουρευτικών μηχανών ή μηχανών
        ψαλιδίσματος, όπως ενσύρματα ή ασύρματα
    clipper_motor_type:
      name: Τύπος μοτέρ κουρευτικής μηχανής
      description: Περιγράφει το μηχανικό σχεδιασμό του μοτέρ που τροφοδοτεί τη συσκευή
        (π.χ., περιστροφικό, μαγνητικό, χωρίς ψήκτρες).
    clock_and_alarm_features:
      name: Χαρακτηριστικά ρολογιού και αφύπνισης
      description: Περιγράφει τις ενσωματωμένες δυνατότητες ρολογιού και αφύπνισης/ύπνου
        που προσφέρει το ραδιόφωνο.
    closure_style:
      name: Στυλ κλεισίματος
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για το κλείσιμο ενός αντικειμένου,
        συνήθως σε είδη κλινοσκεπασμάτων, π.χ. παραδοσιακό, κρυφό
    closure_type:
      name: Τύπος κλεισίματος
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για τη στερέωση ή το κλείσιμο
        ενός προϊόντος, όπως φερμουάρ ή πόρπες
    cloth_treatment:
      name: Επεξεργασία πανιού
      description: Προσδιορίζει αν το πανί είναι προεπεξεργασμένο και, αν ναι, τη
        φύση της επεξεργασίας.
    clothing_accessory_material:
      name: Υλικό αξεσουάρ ένδυσης
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε αξεσουάρ ένδυσης,
        όπως δέρμα ή λινό
    clothing_features:
      name: Χαρακτηριστικά ένδυσης
      description: Περιγράφει μοναδικές ιδιότητες των ενδυμάτων, όπως ανθεκτικότητα
        στο νερό ή το τσαλάκωμα
    club_subset:
      name: Υποκατηγορία μπαστουνιού
      description: 'Ταξινομεί τα μπαστούνια του γκολφ σε συγκεκριμένες υποκατηγορίες,
        π.χ. τύπου sand wedge ή blade putter '
    club_type:
      name: Τύπος μπαστουνιού
      description: Ταξινομεί τα μπαστούνια του γκολφ με βάση τη χρήση τους, π.χ. οδηγός,
        σίδηρος
    coating/sealant_application:
      name: Εφαρμογή επίστρωσης/ στεγανωτικού υλικού
      description: Περιγράφει τη λειτουργία των προστατευτικών επιστρώσεων και στεγανωτικών
        υλικών, π.χ. αντοχή στις καιρικές συνθήκες, πρόληψη σκουριάς
    coaxial_cable_series:
      name: Σειρά ομοαξονικού καλωδίου
      description: Προσδιορίζει την τυποποιημένη σειρά ή τον χαρακτηρισμό της βιομηχανίας
        του καλωδίου (π.χ., RG-6, RG-58, LMR-400), που υπαγορεύει τις φυσικές διαστάσεις
        και την ηλεκτρική απόδοση.
    cockpit_type:
      name: Τύπος πιλοτηρίου
      description: Καθορίζει τη σχεδίαση και την τεχνολογία που χρησιμοποιείται στο
        πιλοτήριο ενός αεροσκάφους, όπως αναλογικό ή υβριδικό
    cocktail_decoration_design:
      name: Σχέδιο διακόσμησης κοκτέιλ
      description: Προσδιορίζει το μοτίβο ή το στυλ των προμηθειών για κοκτέιλ πάρτι,
        όπως πουά ή πρωτότυπα σχήματα
    cocktail_decoration_material:
      name: Υλικό διακόσμησης κοκτέιλ
      description: Καθορίζει την ουσία από την οποία κατασκευάζονται τα διακοσμητικά
        για κοκτέιλ, όπως πλαστικό ή χαρτί
    coffee/tea_set_pieces_included:
      name: Περιλαμβάνονται σετ για καφέ/τσάι
      description: Αναφέρει λεπτομερώς τα μεμονωμένα αντικείμενα σε σετ καφέ ή τσαγιού,
        όπως φλιτζάνια και πιατάκια
    coffee_creamer_variety:
      name: Ποικιλία κρέμας καφέ
      description: Διακρίνει μεταξύ διαφορετικών τύπων κρέμας καφέ, π.χ. σε σκόνη,
        μη γαλακτοκομική
    coffee_input_type:
      name: Τύπος εισόδου καφέ
      description: Προσδιορίζει τη μορφή καφέ, π.χ. κάψουλες, κόκκοι
    coffee_product_form:
      name: Μορφή προϊόντος καφέ
      description: Καθορίζει τον τύπο του προϊόντος καφέ, όπως αλεσμένος ή σε κόκκους
    coffee_roast:
      name: Καβουρδισμένος καφές
      description: Καθορίζει το επίπεδο καβουρδίσματος των προϊόντων καφέ, π.χ. ελαφρύ,
        μεσαίο, σκούρο καβούρδισμα
    coil_connection:
      name: Σύνδεση πηνίου
      description: Καθορίζει τη δυνατότητα αντικατάστασης του πηνίου σε συσκευές ατμίσματος,
        π.χ. σταθερό, μεταβαλλόμενο
    coin_material:
      name: Υλικό νομίσματος
      description: Καθορίζει τον τύπο υλικού από το οποίο κατασκευάζεται ένα συλλεκτικό
        νόμισμα, π.χ. μπρούτζος, χαλκός
    collagen_source:
      name: Πηγή κολλαγόνου
      description: Προσδιορίζει την κύρια προέλευση του κολλαγόνου που χρησιμοποιείται
        στο συμπλήρωμα (π.χ., βόειο, θαλάσσιο, φυτικής βάσης).
    collagen_type:
      name: Τύπος κολλαγόνου
      description: Καθορίζει τον/τους μοριακό(-ούς) τύπο(-ους) κολλαγόνου που παρέχει
        το προϊόν (π.χ., Τύπος I, II, III).
    collar/mount_compatible_device:
      name: Συσκευή συμβατή με κλείθρο/στήριγμα
      description: Καθορίζει τη συμβατή συσκευή για κλείθρα ή βάσεις με τρίποδο, π.χ.
        για φακό, κάμερα
    collar/mount_design:
      name: Σχέδιο κλείθρου περιλαιμίου/στηρίγματος
      description: Περιγράφει τη σχεδίαση περιλαίμιων ή στηριγμάτων με τρίποδο, όπως
        ταχείας απελευθέρωσης ή δακτυλίου
    collar_lock_type:
      name: Τύπος κλείθρου περιλαιμίου
      description: Καθορίζει τον τύπο του κλείθρου περιλαιμίου στον εξοπλισμό άρσης
        βαρών, όπως περιστρεφόμενο ή ελατηριωτό σφιγκτήρα
    color:
      name: Χρώμα
      description: Καθορίζει το κύριο χρώμα ή μοτίβο, όπως μπλε ή ριγέ
    color_accuracy_standards:
      name: Πρότυπα ακρίβειας χρώματος
      description: Καθορίζει τα πρότυπα βαθμονόμησης χρώματος, συνήθως για οθόνες.
        π.χ. sRGB, Adobe RGB
    color_depth:
      name: Βάθος χρώματος
      description: Υποδεικνύει το οπτικό/εξόδου βάθος bit του σαρωτή (αριθμός bit
        ανά pixel), που καθορίζει την ακρίβεια χρώματος, τη διαβάθμιση και το εύρος
        επεξεργασίας.
    color_saturation:
      name: Κορεσμός χρώματος
      description: Υποδεικνύει την ένταση του χρώματος στο φιλμ της κάμερας, π.χ.
        υψηλή, χαμηλή
    comb/brush_size:
      name: Μέγεθος χτένας/βούρτσας
      description: Κατηγοριοποιεί το συνολικό φυσικό μέγεθος της βούρτσας ή της χτένας.
    comb_features:
      name: Χαρακτηριστικά χτένας
      description: Απαριθμεί αξιοσημείωτα χαρακτηριστικά απόδοσης ή σχεδιασμού της
        χτένας.
    comb_tooth_spacing:
      name: Απόσταση δοντιών χτένας
      description: Περιγράφει την απόσταση ή την πυκνότητα των δοντιών της χτένας.
    comic_edition:
      name: Έκδοση ενός κόμικ
      description: Υποδεικνύει τη συγκεκριμένη κυκλοφορία ή έκδοση ενός κόμικ, η οποία
        μπορεί να επηρεάσει τη σπανιότητα και τη συλλεκτική αξία του, π.χ. πρώτη έκδοση,
        εξώφυλλο παραλλαγής
    comic_tradition:
      name: Παράδοση ενός κόμικ
      description: Υποδεικνύει την παράδοση σε πολιτιστικό ή περιφερειακό επίπεδο
        από την οποία προέρχεται το κόμικ, όπως κινέζικα κόμικς ή manga
    commode_opening_type:
      name: Τύπος ανοίγματος καρέκλας τουαλέτας
      description: Προσδιορίζει την παρουσία και το στυλ οποιουδήποτε ανοίγματος τουαλέτας
        ή συμβατότητας κάδου στο κάθισμα.
    communication_device_features:
      name: Χαρακτηριστικά συσκευής επικοινωνίας
      description: Προσδιορίζει μοναδικά χαρακτηριστικά σε συσκευές επικοινωνίας,
        όπως οθόνη αφής ή φωνητικό έλεγχο
    communication_protocols:
      name: Πρωτόκολλα επικοινωνίας
      description: Καθορίζει το πρωτόκολλο δικτύου που χρησιμοποιείται, όπως Modbus
        ή Profibus
    compass_style:
      name: Στυλ πυξίδας
      description: Καθορίζει το στυλ των πυξίδων ναυσιπλοΐας, όπως πυξίδα κατάδυσης
        ή γυροσκοπική πυξίδα
    compatible_accessibility_equipment_type:
      name: Τύπος συμβατού εξοπλισμού προσβασιμότητας
      description: Καθορίζει τον τύπο εξοπλισμού προσβασιμότητας ή κινητικότητας με
        τον οποίο έχει σχεδιαστεί να λειτουργεί το αξεσουάρ.
    compatible_aircraft_type:
      name: Συμβατός τύπος αεροσκάφους
      description: Προσδιορίζει τον τύπο του αεροσκάφους για το οποίο είναι κατάλληλο
        το προϊόν, όπως αεροπλάνο ή ελικόπτερο
    compatible_amplifier:
      name: Συμβατός ενισχυτής
      description: Προσδιορίζει τον τύπο του ενισχυτή με τον οποίο είναι συμβατό ένα
        προϊόν, όπως μπάσο ή συνθεσάιζερ
    compatible_aquarium:
      name: Συμβατό ενυδρείο
      description: Καθορίζει για ποιους τύπους ενυδρείων είναι κατάλληλο ένα προϊόν,
        π.χ. όλα τα ενυδρεία, θαλασσινό νερό
    compatible_baby_bottle_design:
      name: Συμβατό σχέδιο μπιμπερό
      description: Υποδεικνύει τα στυλ μπιμπερό με τα οποία είναι συμβατό το προϊόν,
        όπως με φαρδύ λαιμό
    compatible_baby_carrier_type:
      name: Συμβατός τύπος μάρσιπου μωρού
      description: Καθορίζει τον τύπο μάρσιπου μωρού με τον οποίο είναι συμβατό το
        προϊόν, όπως μάρσιπος τύπου περιτύλιξης ή μάρσιπος τύπου σακιδίου μεταφοράς
    compatible_baby_chair_type:
      name: Συμβατός τύπος σε βρεφικό καρεκλάκι
      description: Καθορίζει τον τύπο σε βρεφικό καρεκλάκι με τον οποίον είναι συμβατό
        το προϊόν, όπως καρεκλάκι για καρότσι αγορών ή καρεκλάκι για εστιατόριο
    compatible_baby_transport_type:
      name: Συμβατός τύπος μεταφοράς μωρού
      description: Προσδιορίζει συμβατά αντικείμενα μεταφοράς μωρών, όπως καρότσι
        ή κάθισμα αυτοκινήτου
    compatible_ball_type:
      name: Συμβατός τύπος μπάλας
      description: Προσδιορίζει τους τύπους μπάλας που είναι κατάλληλοι για χρήση
        με το προϊόν, π.χ. τένις, wiffle
    compatible_battery_size:
      name: Συμβατό μέγεθος μπαταρίας
      description: Προσδιορίζει τα μεγέθη μπαταριών με τα οποία είναι συμβατό ένα
        προϊόν, π.χ. AAA, CR2032
    compatible_battery_technology:
      name: Συμβατή τεχνολογία μπαταρίας
      description: Καθορίζει τον τύπο της τεχνολογίας μπαταρίας με την οποία είναι
        συμβατό ένα προϊόν, όπως ιόντων λιθίου ή αλκαλική
    compatible_bench_positions:
      name: Συμβατές θέσεις πάγκου
      description: Καθορίζει το εύρος των θέσεων, συνήθως για πάγκο προπόνησης, π.χ.
        επίπεδος ή κεκλιμένος
    compatible_bike_type:
      name: Συμβατός τύπος ποδηλάτου
      description: Καθορίζει τον τύπο ποδηλάτου για το οποίο έχει σχεδιαστεί το προϊόν,
        όπως ηλεκτρικό ποδήλατο ή ποδήλατο δρόμου
    compatible_brass_instrument:
      name: Συμβατό χάλκινο πνευστό μουσικό όργανο
      description: Καθορίζει το χάλκινο πνευστό μουσικό όργανο με το οποίο μπορεί
        να χρησιμοποιηθεί το προϊόν, όπως τρομπέτα ή τούμπα
    compatible_cable_tie_material:
      name: Συμβατό υλικό δεσμού καλωδίου
      description: Προσδιορίζει τον τύπο δεσμού καλωδίου (π.χ., ανοξείδωτος χάλυβας,
        νάιλον) που το όπλο είναι σχεδιασμένο να εγκαταστήσει ή να αφαιρέσει.
    compatible_chemical_treatment_strength_level:
      name: Συμβατό επίπεδο ισχύος χημικής επεξεργασίας
      description: Υποδεικνύει τη συνιστώμενη από τον κατασκευαστή ισχύ ή δραστικότητα
        (π.χ., ήπια, κανονική, έξτρα) της χημικής επεξεργασίας.
    compatible_clarinet_type:
      name: Συμβατός τύπος κλαρινέτου
      description: Προσδιορίζει τον τύπο κλαρινέτου με το οποίο είναι συμβατό ένα
        προϊόν, όπως κλαρινέτο τύπου A ή universal
    compatible_contact_lens_type:
      name: Συμβατός τύπος φακών επαφής
      description: Προσδιορίζει ποιες κατηγορίες φακών επαφής μπορούν να αποθηκευτούν
        ή να καθαριστούν στη θήκη.
    compatible_contact_lenses:
      name: Συμβατοί φακοί επαφής
      description: Υποδεικνύει τους τύπους ή τα υλικά φακών επαφής με τα οποία το
        διάλυμα μπορεί να χρησιμοποιηθεί με ασφάλεια.
    compatible_cosmetic_tools:
      name: Συμβατά εργαλεία καλλυντικών
      description: Καθορίζει με ποια εργαλεία ομορφιάς μπορεί να χρησιμοποιηθεί το
        προϊόν, π.χ. σφουγγάρια, τσιμπιδάκια
    compatible_device:
      name: Συμβατή συσκευή
      description: Καθορίζει ποιες συσκευές λειτουργούν με ένα ηλεκτρονικό προϊόν,
        όπως έξυπνο ρολόι χειρός ή ασύρματα ακουστικά
    compatible_drum_configuration:
      name: Συμβατή διαμόρφωση τυμπάνου
      description: Προσδιορίζει τη διάταξη τυμπάνου για την οποία έχει σχεδιαστεί
        το προϊόν, όπως κοντραμπάσο ή hi-hat
    compatible_electric/acoustic_instrument:
      name: Συμβατό ηλεκτρικό/ακουστικό όργανο
      description: Προσδιορίζει το ηλεκτρικό ή ακουστικό όργανο για το οποίο έχει
        σχεδιαστεί το προϊόν, όπως ηλεκτρική κιθάρα ή συνθεσάιζερ
    compatible_electronic_card_type:
      name: Συμβατός τύπος ηλεκτρονικής κάρτας
      description: Καθορίζει τους τύπους ηλεκτρονικών καρτών με τις οποίες μπορεί
        να αλληλεπιδράσει το προϊόν, όπως κάρτες με μαγνητική λωρίδα ή κάρτες βιβλιοθήκης
    compatible_equipment_type:
      name: Συμβατός τύπος εξοπλισμού
      description: Καθορίζει την κατηγορία εξοπλισμού πισίνας ή spa για την οποία
        έχει σχεδιαστεί η πλακέτα κυκλώματος (π.χ., θερμαντήρας, αντλία, χλωριωτής).
    compatible_exercise_machine_type:
      name: Συμβατός τύπος μηχανήματος άσκησης
      description: Προσδιορίζει τον τύπο μηχανήματος άσκησης για το οποίο προορίζεται
        η πλακέτα (π.χ., διάδρομος, ελλειπτικό).
    compatible_exercises:
      name: Συμβατές ασκήσεις
      description: Καθορίζει τις ασκήσεις που μπορούν να εκτελεστούν με το προϊόν,
        όπως έλξεις ή κάμψεις
    compatible_eyewear_type:
      name: Συμβατός τύπος γυαλιών
      description: Προσδιορίζει το είδος των γυαλιών για τα οποία το αξεσουάρ είναι
        σχεδιασμένο να ταιριάζει ή να λειτουργεί.
    compatible_filament:
      name: Συμβατό νήμα
      description: Καθορίζει τους τύπους νήματος που μπορεί να χρησιμοποιήσει ένας
        τρισδιάστατος εκτυπωτής, όπως Πολυγαλακτικό οξύ (PLA) ή νάιλον
    compatible_film_type:
      name: Συμβατός τύπος φιλμ
      description: Προσδιορίζει τον τύπο φιλμ που μπορεί να χρησιμοποιήσει μια κάμερα,
        όπως αρνητικό φιλμ ή έγχρωμο φιλμ
    compatible_flute_type:
      name: Συμβατός τύπος φλάουτου
      description: Προσδιορίζει το είδος του φλάουτου με το οποίο είναι συμβατό ένα
        προϊόν, π.χ. universal, piccolo
    compatible_game_format:
      name: Συμβατή μορφή παιχνιδιού
      description: Καθορίζει τον τύπο της υποστηριζόμενης μορφής παιχνιδιού, όπως
        μόνο ψηφιακή λήψη ή φυσικό δίσκο
    compatible_gardening_tool:
      name: Συμβατό εργαλείο κηπουρικής
      description: Καθορίζει με ποια εργαλεία κηπουρικής μπορεί να χρησιμοποιηθεί
        ένα προϊόν, όπως τσουγκράνα ή φτυάρι
    compatible_hair_color:
      name: Συμβατό χρώμα μαλλιών
      description: Αντιστοιχεί προϊόντα σε συγκεκριμένα χρώματα μαλλιών, π.χ. ασημί,
        ξανθό
    compatible_hammock_design:
      name: Συμβατό σχέδιο αιώρας
      description: Καθορίζει τον τύπο αιώρας με τον οποίο είναι συμβατό ένα προϊόν,
        π.χ. τύπου κρεμαστή, με πλαίσιο
    compatible_harmonica_type:
      name: Συμβατός τύπος φυσαρμόνικας
      description: Προσδιορίζει τον τύπο φυσαρμόνικας για τον οποίο έχει σχεδιαστεί
        ένα προϊόν, όπως διατονική ή χρωματική φυσαρμόνικα
    compatible_hdcp:
      name: Συμβατότητα HDCP
      description: Καθορίζει τη συμβατότητα HDCP ηλεκτρονικών συσκευών, όπως HDCP
        2.2 ή τη μη συμβατότητα
    compatible_instrument:
      name: Συμβατό μουσικό όργανο
      description: Προσδιορίζει το μουσικό όργανο για το οποίο έχει σχεδιαστεί το
        προϊόν, όπως κιθάρα ή πιάνο
    compatible_keyboard_configuration:
      name: Συμβατή διαμόρφωση πληκτρολογίου
      description: Προσδιορίζει τη διάταξη πληκτρολογίου που είναι συμβατή με ένα
        προϊόν, όπως 61 πλήκτρων ή 76 πλήκτρων
    compatible_lock_type:
      name: Συμβατός τύπος κλειδαριάς
      description: Προσδιορίζει τους τύπους κλειδαριών με τους οποίους μπορεί να λειτουργήσει
        ένα προϊόν, όπως κλειδαριά συνδυασμού ή ηλεκτρονική
    compatible_makeup:
      name: Συμβατό μακιγιάζ
      description: Καθορίζει συμβατά προϊόντα μακιγιάζ, π.χ. κραγιόν, σκιά ματιών
    compatible_mattress_size:
      name: Συμβατό μέγεθος στρώματος
      description: Καθορίζει το μέγεθος του στρώματος που ταιριάζει στο προϊόν, δηλαδή
        μέγεθος king, twin
    compatible_memory_cards:
      name: Συμβατές κάρτες μνήμης
      description: Προσδιορίζει τους τύπους καρτών μνήμης που μπορεί να χρησιμοποιήσει
        ένα προϊόν, συνήθως για κάμερες. π.χ. SD, microSDHC
    compatible_microphone_thread:
      name: Συμβατό σπείρωμα μικροφώνου
      description: Καθορίζει το μέγεθος του σπειρώματος που είναι συμβατό με προϊόντα
        μικροφώνου, π.χ. 5/8"-27
    compatible_motherboard_form_factor:
      name: Συμβατός παράγοντας μορφής μητρικής πλακέτας
      description: Καθορίζει τα μεγέθη μητρικής πλακέτας που μπορεί να υποστηρίξει
        το προϊόν, όπως ATX
    compatible_oboe_type:
      name: Συμβατός τύπος όμποε
      description: Προσδιορίζει τον τύπο όμποε για τον οποίο έχει σχεδιαστεί ένα προϊόν,
        όπως τύπου universal ή αγγλικό κόρνο
    compatible_operating_system:
      name: Συμβατό λειτουργικό σύστημα
      description: Καθορίζει τη συμβατότητα λογισμικού ενός προϊόντος, π.χ. Windows,
        macOS
    compatible_orchestral_string_instrument:
      name: Συμβατό ορχηστρικό έγχορδο όργανο
      description: Προσδιορίζει το συγκεκριμένο ορχηστρικό έγχορδο όργανο για το οποίο
        έχει σχεδιαστεί το προϊόν, όπως βιολί ή τσέλο
    compatible_paper_size:
      name: Συμβατό μέγεθος χαρτιού
      description: Καθορίζει τα μεγέθη χαρτιού που μπορεί να υποστηρίξει μια συσκευή,
        συνήθως για εκτυπωτές. πχ Α4, καρτ ποστάλ
    compatible_patient_profile:
      name: Συμβατό προφίλ ασθενούς
      description: Προσδιορίζει την κατάλληλη ομάδα ασθενών για ένα ιατρικό προϊόν,
        όπως παιδιατρική ή γηριατρική ομάδα
    compatible_percussion_instrument:
      name: Συμβατό κρουστό όργανο
      description: Προσδιορίζει με ποια κρουστά όργανα μπορεί να χρησιμοποιηθεί ένα
        προϊόν, όπως τύμπανο ή μπόνγκο
    compatible_pinball_machine_edition:
      name: Συμβατή έκδοση μηχανής φλίπερ
      description: Καθορίζει σε ποια έκδοση ή επίπεδο εξοπλισμού της μηχανής φλίπερ
        ταιριάζει το αξεσουάρ (π.χ., Pro, Premium, LE).
    compatible_play_vehicle_type:
      name: Συμβατός τύπος οχήματος παιχνιδιού
      description: Προσδιορίζει τον τύπο οχήματος παιχνιδιού για το οποίο είναι κατάλληλο
        το προϊόν, όπως αυτοκίνητο ή σκάφος
    compatible_player:
      name: Συμβατή συσκευή αναπαραγωγής
      description: Προσδιορίζει τις συσκευές που μπορούν να χρησιμοποιηθούν με προσαρμογέα
        κασέτας, π.χ. iPad, φορητό υπολογιστή
    compatible_polish_thinner_type:
      name: Συμβατός τύπος αραιωτικού βερνικιού
      description: Υποδεικνύει τα συστήματα επίστρωσης νυχιών με τα οποία είναι σχεδιασμένο
        να λειτουργεί το αραιωτικό.
    compatible_power_supply_form_factor:
      name: Συμβατός παράγοντας μορφής τροφοδοτικού
      description: Καθορίζει το μέγεθος ή το πρότυπο μονάδας τροφοδοσίας (PSU) που
        το περίβλημα είναι σχεδιασμένο να φιλοξενεί.
    compatible_printer:
      name: Συμβατός εκτυπωτής
      description: Προσδιορίζει τον τύπο εκτυπωτή με τον οποίο είναι συμβατό ένα προϊόν,
        όπως εκτυπωτής λέιζερ ή ψεκασμού μελάνης
    compatible_processor_series:
      name: Συμβατή σειρά επεξεργαστών
      description: Καθορίζει τη σειρά επεξεργαστών με την οποία είναι συμβατό το προϊόν,
        όπως AMD Ryzen ή Intel core solo
    compatible_programming_languages:
      name: Συμβατές γλώσσες προγραμματισμού
      description: Προσδιορίζει τις γλώσσες προγραμματισμού με τις οποίες μπορεί να
        λειτουργήσει ένα προϊόν λογισμικού, όπως Python ή Java
    compatible_recipes:
      name: Συμβατές συνταγές
      description: Καθορίζει τις κατάλληλες συνταγές για το προϊόν, συνήθως για παγωτομηχανές.
        π.χ. σορμπέ, ιταλικού τύπου gelato
    compatible_resin_type:
      name: Συμβατός τύπος ρητίνης
      description: Καθορίζει τις κατηγορίες ρητίνης UV που μπορεί να χρησιμοποιήσει
        ένας εκτυπωτής SLA/MSLA.
    compatible_resolution:
      name: Συμβατή ανάλυση
      description: Καθορίζει την υποστηριζόμενη ανάλυση οθόνης, π.χ. 1080p, full HD
    compatible_satellite_radio_service:
      name: Συμβατή υπηρεσία δορυφορικού ραδιοφώνου
      description: Προσδιορίζει την/τις υπηρεσία/ες δορυφορικού ραδιοφώνου με την/τις
        οποία/ες έχει σχεδιαστεί να λειτουργεί ο δέκτης, εξασφαλίζοντας συμβατότητα
        με υπάρχουσες ή προβλεπόμενες συνδρομές.
    compatible_seat_type:
      name: Συμβατός τύπος καθίσματος
      description: Καθορίζει τον τύπο παιδικού καθίσματος αυτοκινήτου με τον οποίον
        είναι συμβατό το προϊόν, όπως κάθισμα booster ή βρεφικό κάθισμα αυτοκινήτου
    compatible_shoe_size:
      name: Συμβατό μέγεθος παπουτσιού
      description: Ταιριάζει προϊόντα σε συγκεκριμένα μεγέθη παπουτσιών, π.χ. 12,
        42
    compatible_software_platform:
      name: Συμβατή πλατφόρμα λογισμικού
      description: Προσδιορίζει τις πλατφόρμες λογισμικού με τις οποίες είναι συμβατό
        ένα προϊόν, όπως το Adobe Creative ή το Canva
    compatible_special_effects_device:
      name: Συμβατή συσκευή ειδικών εφέ
      description: Προσδιορίζει τις συσκευές ειδικών εφέ με τις οποίες μπορεί να λειτουργήσει
        ένα προϊόν, όπως φώτα LED ή μηχανές παραγωγής ομίχλης
    compatible_stove_top_type:
      name: Συμβατός τύπος επιφάνειας μιας εστίας
      description: Προσδιορίζει τον τύπο επιφανειών εστιών στις οποίες μπορεί να χρησιμοποιηθεί
        το προϊόν, όπως εστίες αερίου ή επαγωγικές εστίες
    compatible_string_instrument:
      name: Συμβατό έγχορδο όργανο
      description: Προσδιορίζει για ποιο έγχορδο όργανο έχει σχεδιαστεί το προϊόν,
        όπως γιουκαλίλι ή μπάσο
    compatible_stroller_type:
      name: Συμβατός τύπος καροτσιού
      description: Καθορίζει τον τύπο του καροτσιού με τον οποίο είναι συμβατό το
        προϊόν, όπως ομπρέλα ή τζόκινγκ
    compatible_vacuum_type:
      name: Συμβατός τύπος σκούπας
      description: Καθορίζει τον τύπο σκούπας με τον οποίο είναι συμβατό το προϊόν,
        όπως σκούπα χειρός ή σκούπα ατμού
    compatible_vehicle:
      name: Συμβατό όχημα
      description: Καθορίζει τον τύπο οχήματος για το οποίο έχει σχεδιαστεί ένα προϊόν,
        όπως αυτοκίνητο ή SUV
    compatible_voice_assistant:
      name: Συμβατός φωνητικός βοηθός
      description: Προσδιορίζει πλατφόρμες φωνητικού ελέγχου που μπορούν να λειτουργήσουν
        τον δέκτη.
    compatible_walking_aid_equipment:
      name: Συμβατός εξοπλισμός βοηθημάτων βάδισης
      description: Καθορίζει για ποια βοηθήματα βάδισης έχει σχεδιαστεί το προϊόν,
        π.χ. πατερίτσες, περιπατητήρες
    compatible_wax_container_size:
      name: Συμβατό μέγεθος δοχείου κεριού
      description: Αναφέρει τα τυπικά μεγέθη κασέτας, κουτιού ή δοχείου που μπορούν
        να τοποθετηθούν απευθείας στον θερμαντήρα χωρίς μετάγγιση.
    compatible_wax_form:
      name: Συμβατή μορφή κεριού
      description: Καθορίζει τις μορφές αποτριχωτικού κεριού που έχει σχεδιαστεί να
        λιώνει ο θερμαντήρας.
    compatible_weight_lifting_accessory:
      name: Συμβατό αξεσουάρ άρσης βαρών
      description: Καθορίζει τον εξοπλισμό άρσης βαρών με τον οποίο είναι συμβατό
        το προϊόν, όπως μπάρα ή αλτήρα
    compliance_certifications:
      name: Πιστοποιήσεις συμμόρφωσης
      description: Καθορίζει τις πιστοποιήσεις συμμόρφωσης ενός προϊόντος, όπως την
        πιστοποίηση HIPAA ή FedRAMP
    component_mounting_style:
      name: Στυλ στήριξης εξαρτήματος
      description: Καθορίζει την κύρια μέθοδο με την οποία ένα ηλεκτρονικό εξάρτημα
        ή πλακέτα προσαρτάται σε πλακέτα κυκλώματος, πάνελ, σασί ή ράγα.
    component_output_type:
      name: Τύπος εξόδου εξαρτήματος
      description: Καθορίζει τον τύπο σήματος εξόδου των ηλεκτρονικών εξαρτημάτων,
        όπως UART ή αναλογικό σήμα
    component_package_type:
      name: Τύπος συσκευασίας εξαρτημάτων
      description: Καθορίζει τον παράγοντα μορφής ή τη συσκευασία των ηλεκτρονικών
        εξαρτημάτων, π.χ. SDM (Συσκευή επιφανειακής τοποθέτησης), DIP (Διπλό πακέτο
        σε σειρά)
    component_size_code:
      name: Κωδικός μεγέθους εξαρτήματος
      description: Καθορίζει την τυποποιημένη ονομασία μεγέθους SMD ή through-hole
        (π.χ., 0603, 0805) που χρησιμοποιείται για το πακέτο του πυκνωτή.
    component_tolerance:
      name: Ανοχή εξαρτήματος
      description: Καθορίζει την επιτρεπτή απόκλιση από την ονομαστική τιμή (αντίσταση,
        χωρητικότητα, επαγωγή, συχνότητα, κ.λπ.) εκφρασμένη ως ποσοστό.
    components_included:
      name: Συμπεριλαμβανόμενα εξαρτήματα
      description: Απαριθμεί τα μέρη υλικού που παρέχονται στο αρχικό κιτ.
    compression_circuit_type:
      name: Τύπος κυκλώματος συμπίεσης
      description: Περιγράφει την υποκείμενη τεχνολογία μείωσης κέρδους (π.χ., VCA,
        FET, οπτική) που διαμορφώνει τον ήχο και την απόκριση του επεξεργαστή.
    compression_format:
      name: Μορφή συμπίεσης
      description: Καθορίζει τον τύπο συμπίεσης αρχείων βίντεο που χρησιμοποιείται,
        π.χ. MPEG-4, AVI
    compression_level:
      name: Επίπεδο συμπίεσης
      description: Υποδεικνύει την ένταση της πίεσης σε προϊόντα συμπίεσης, π.χ. ελαφριά,
        σταθερή
    computer_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ υπολογιστή
      description: Προσδιορίζει τα παρεχόμενα συμπληρωματικά αξεσουάρ υπολογιστή,
        όπως ποντίκι ή τσάντα φορητού υπολογιστή
    computer_form:
      name: Μορφή υπολογιστή
      description: Καθορίζει τη φυσική σχεδίαση ή διάταξη ενός υπολογιστή, όπως όλα
        σε ένα (all-in-one) ή φορητός υπολογιστής
    computer_server_features:
      name: Χαρακτηριστικά διακομιστή υπολογιστή
      description: Περιγράφει ειδικές δυνατότητες ενός διακομιστή, όπως πλεονάζον
        τροφοδοτικό ή υποστήριξη εικονικοποίησης
    computer_specialized_features:
      name: Εξειδικευμένα χαρακτηριστικά υπολογιστή
      description: Επισημαίνει συγκεκριμένα χαρακτηριστικά ενός υπολογιστή, όπως σύστημα
        υγρής ψύξης ή φωτισμό RGB
    concertina_button_configuration:
      name: Διαμόρφωση κουμπιού κονσερτίνας
      description: Καθορίζει τον αριθμό και τη διάταξη των κουμπιών σε μια κονσερτίνα,
        όπως η anglo concertina 20 κουμπιών
    condition:
      name: Κατάσταση
      description: Περιγράφει την κατάσταση ή την ποιότητα ενός προϊόντος, π.χ. άριστη
        (Α), κακή (Κ)
    conditioner_effect:
      name: Αποτέλεσμα conditioner μαλλιών
      description: Καθορίζει τα οφέλη ενός conditioner μαλλιών, όπως λείανση ή κατά
        της πιτυρίδας
    condom_compatibility:
      name: Συμβατότητα προφυλακτικού
      description: Καθορίζει με ποια υλικά προφυλακτικού είναι ασφαλής η χρήση του
        λιπαντικού.
    condom_fit_type:
      name: Τύπος εφαρμογής προφυλακτικού
      description: Περιγράφει το συνολικό μέγεθος ή το ανατομικό περίγραμμα που έχει
        σχεδιαστεί για τη βελτίωση της άνεσης και της αίσθησης.
    condom_type:
      name: Τύπος προφυλακτικού
      description: Διαφοροποιεί εάν το προφυλακτικό προορίζεται για άνδρες ή γυναίκες
    conductivity_gel_application:
      name: Εφαρμογή αγώγιμου τζελ
      description: Καθορίζει την ιατρική ή διαγνωστική διαδικασία για την οποία προορίζεται
        το αγώγιμο τζελ ή λοσιόν.
    conductor_core_type:
      name: Τύπος πυρήνα αγωγού
      description: Υποδεικνύει εάν ο εσωτερικός αγωγός είναι πολύκλωνος ή συμπαγής
        πυρήνας.
    connecting_thread:
      name: Σπείρωμα σύνδεσης
      description: Καθορίζει τον τύπο σπειρώματος για τη σύνδεση εξαρτημάτων υδραυλικών
        εγκαταστάσεων, π.χ. IPS 1/2 ίντσας
    connection_method:
      name: Μέθοδος σύνδεσης
      description: Καθορίζει τον τύπο σύνδεσης που χρησιμοποιεί ένα προϊόν, όπως ασύρματη
        ή ενσύρματη
    connection_type:
      name: Τύπος σύνδεσης
      description: Καθορίζει τον τύπο σύνδεσης που χρησιμοποιείται από ηλεκτρονικά
        μέσα, όπως ενσύρματος τύπος ή τύπος Bluetooth
    connectivity_technology:
      name: Τεχνολογία συνδεσιμότητας
      description: Καθορίζει τη μέθοδο μεταφοράς δεδομένων σε ένα προϊόν, π.χ. Bluetooth,
        USB
    connectivity_type:
      name: Τύπος συνδεσιμότητας
      description: Διευκρινίζει εάν η πλακέτα είναι χωρίς συγκόλληση (στυλ breadboard)
        ή σχεδιασμένη για συγκόλληση.
    connector_1_type:
      name: Τύπος συνδετήρα 1
      description: Καθορίζει τον συνδετήρα ή τη διεπαφή που υπάρχει στο πρώτο άκρο
        του προσαρμογέα ή του ζεύκτη.
    connector_2_type:
      name: Τύπος συνδετήρα 2
      description: Καθορίζει τον συνδετήρα ή τη διεπαφή που υπάρχει στο δεύτερο άκρο
        του προσαρμογέα ή του ζεύκτη.
    connector_contact_plating:
      name: Επιμετάλλωση επαφών συνδετήρα
      description: Καθορίζει την επιφανειακή επιμετάλλωση ή επικάλυψη που εφαρμόζεται
        στις ηλεκτρικές επαφές για βελτίωση της αγωγιμότητας και της αντίστασης στη
        διάβρωση.
    connector_design:
      name: Σχεδιασμός συνδετήρα
      description: Προσδιορίζει τη σχεδίαση συνδετήρων ή συνδέσμων αλυσίδας, όπως
        με ανοιχτό άκρο ή με κλιπ
    connector_gender:
      name: Φύλο συνδετήρα
      description: Καθορίζει το φύλο των άκρων συνδετήρα στα ηλεκτρονικά είδη, π.χ.
        αρσενικό, αρσενικό σε θηλυκό
    connector_mounting_style:
      name: Στυλ τοποθέτησης συνδετήρα
      description: Υποδεικνύει πώς ο συνδετήρας τοποθετείται μηχανικά ή ενσωματώνεται
        σε μια συναρμολόγηση (π.χ., PCB, πάνελ, πλαίσιο, καλώδιο, ζεύκτης).
    connector_orientation:
      name: Προσανατολισμός συνδετήρα
      description: Περιγράφει τον φυσικό προσανατολισμό της διεπαφής σύζευξης σε σχέση
        με την επιφάνεια τοποθέτησης ή το καλώδιο (π.χ., ευθεία, ορθή γωνία, κάθετη).
    connector_position:
      name: Θέση συνδετήρα
      description: Περιγράφει τη θέση του συνδετήρα βίντεο όταν η οθόνη προβάλλεται
        από μπροστά (π.χ., κάτω-δεξιά, πάνω-αριστερά).
    connector_type:
      name: Τύπος συνδέσμου
      description: Καθορίζει το στυλ ή το πρότυπο του συνδέσμου που υπάρχει στα άκρα
        του καλωδίου γέφυρας.
    console_accessories_included:
      name: Αξεσουάρ κονσόλας που περιλαμβάνονται
      description: Αναφέρει τα βασικά αξεσουάρ ή εξαρτήματα που συσκευάζονται με την
        κονσόλα (π.χ., χειριστήρια, καλώδια, βάση σύνδεσης, παιχνίδια).
    console_system:
      name: Σύστημα κονσόλας
      description: Καθορίζει τη συγκεκριμένη μάρκα μιας κονσόλας βιντεοπαιχνιδιών,
        όπως το Atari 2600 ή το Playstation
    console_type:
      name: Τύπος κονσόλας
      description: Ταξινομεί τη φυσική μορφή και το προβλεπόμενο περιβάλλον χρήσης
        της κονσόλας.
    constitutive_ingredients:
      name: Κύρια συστατικά
      description: Καθορίζει τα κύρια συστατικά που χρησιμοποιούνται στη σύνθεση ενός
        προϊόντος, π.χ. κερί μέλισσας, έλαιο αγριοτριανταφυλλιάς
    construction:
      name: Κατασκευές
      description: Υποδεικνύει τη μέθοδο ή την τεχνική επεξεργασίας του μετάλλου που
        χρησιμοποιείται στην παραγωγή κοσμημάτων (π.χ. επιχρυσωμένο, vermeil, filled,
        συμπαγές).
    construction_set_theme:
      name: Θέμα σετ κατασκευής
      description: Προσδιορίζει το θέμα ενός συνόλου κατασκευής, όπως πειρατές ή ζώα
    contact_lens_case_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ θήκης φακών επαφής
      description: Αναφέρει τα συμπληρωματικά αντικείμενα που συσκευάζονται με τη
        θήκη φακών επαφής.
    contact_lens_case_features:
      name: Χαρακτηριστικά θήκης φακών επαφής
      description: Επισημαίνει αξιοσημείωτα λειτουργικά χαρακτηριστικά ή στοιχεία
        της θήκης.
    contact_lens_material:
      name: Υλικό φακών επαφής
      description: Καθορίζει τη σύνθεση πολυμερούς ή την οικογένεια υλικών (π.χ.,
        υδροτζέλ, υδροτζέλ σιλικόνης) από την οποία είναι κατασκευασμένος ο φακός.
    contact_material:
      name: Υλικό επαφής
      description: Προσδιορίζει το μέταλλο ή την επιμετάλλωση που χρησιμοποιείται
        για τις επαφές της μπαταρίας εντός της βάσης.
    contrast:
      name: Αντίθεση
      description: Χρησιμοποιείται για τον καθορισμό του επιπέδου αντίθεσης στο φιλμ
        της κάμερας, π.χ. κανονικό ή υψηλό
    contrast_ratio_typical:
      name: Λόγος αντίθεσης (συνήθης)
      description: Υποδεικνύει τον λόγο αντίθεσης της οθόνης, π.χ. 3000:1
    control_functions:
      name: Λειτουργίες ελέγχου
      description: Καθορίζει τις δυνατότητες ελέγχου των ποδοδιακόπτων του ενισχυτή,
        όπως η εναλλαγή καναλιών
    control_interface:
      name: Διεπαφή ελέγχου
      description: Προσδιορίζει πώς μπορεί να διαμορφωθεί ή να ελεγχθεί η μονάδα (π.χ.,
        λογισμικό PC, εφαρμογή κινητού, LCD συσκευής, τηλεχειριστήριο).
    control_method:
      name: Μέθοδος ελέγχου
      description: Περιγράφει την τεχνική ελέγχου των εξαρτημάτων αυτοματισμού, όπως
        ο έλεγχος άμεσης ροπής ή ο βαθμωτός έλεγχος (V/f)
    control_solution_level:
      name: Επίπεδο διαλύματος ελέγχου
      description: Υποδεικνύει το επίπεδο συγκέντρωσης γλυκόζης του διαλύματος ελέγχου.
    control_technology:
      name: Τεχνολογία ελέγχου
      description: Καθορίζει τη μέθοδο λειτουργίας, συνήθως για συστήματα σκίασης
        παραθύρων, όπως χειροκίνητη ή μηχανοκίνητη
    control_type:
      name: Τύπος ελέγχου
      description: Καθορίζει τον τύπο του μηχανισμού ελέγχου, όπως με αισθητήρα ή
        κουμπί
    controller_design:
      name: Σχεδιασμός ελεγκτή
      description: Περιγράφει τον παράγοντα μορφής ελεγκτών αυτοματισμού, όπως συμπαγείς
        ή τοποθετημένους σε ράφι
    controller_drive_type:
      name: Τύπος μονάδας ελεγκτή
      description: Προσδιορίζει τον τύπο ισχύος που χρησιμοποιείται σε μονάδες ελέγχου
        αυτοματισμού, όπως με τροφοδοσία AC ή DC
    conversion_direction:
      name: Κατεύθυνση μετατροπής
      description: Περιγράφει τον τύπο και την κατεύθυνση μετατροπής που εκτελεί η
        συσκευή.
    converter_functionality:
      name: Λειτουργία μετατροπέα
      description: Προσδιορίζει τη συγκεκριμένη λειτουργία των μετατροπέων φακών,
        όπως ενισχυτής ταχύτητας ή ευρυγώνιος
    conveyor_operation:
      name: Λειτουργία μεταφορέα
      description: Προσδιορίζει τον τρόπο λειτουργίας ενός συστήματος μεταφορέα, όπως
        μηχανοκίνητο ή με βαρύτητα
    cooking_compartments:
      name: Χώροι μαγειρέματος
      description: Καθορίζει τον αριθμό των χώρων μαγειρέματος σε συσκευές κουζίνας,
        όπως φριτέζες αέρα, π.χ. μονή ή διπλή
    cooking_method:
      name: Μέθοδος μαγειρέματος
      description: Καθορίζει τη συνιστώμενη τεχνική μαγειρέματος, π.χ. ψήσιμο στη
        σχάρα, τηγάνισμα
    cooking_wine_variety:
      name: Ποικιλία κρασιού μαγειρικής
      description: Διακρίνει μεταξύ διαφορετικών ποικιλιών κρασιού μαγειρικής, π.χ.
        από ρύζι, από σέρι
    cookware/bakeware_features:
      name: Χαρακτηριστικά μαγειρικών σκευών/σκευών ψησίματος
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των μαγειρικών σκευών
        ή σκευών ψησίματος, όπως αντικολλητική επίστρωση ή καταλληλότητα για χρήση
        σε φούρνο
    cookware/bakeware_material:
      name: Υλικό μαγειρικών σκευών/σκευών ψησίματος
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε σκεύη μαγειρικής
        ή ζαχαροπλαστικής, όπως ανοξείδωτο ατσάλι ή κεραμικό υλικό
    cookware_features:
      name: Χαρακτηριστικά μαγειρικών σκευών
      description: Αναδεικνύει τα μοναδικά χαρακτηριστικά των μαγειρικών σκευών, όπως
        καταλληλότητα για φούρνο ή λαβή που παραμένει κρύα
    cookware_items_included:
      name: Περιλαμβάνονται μαγειρικά σκεύη
      description: Αναφέρει λεπτομερώς τα εξαρτήματα ενός σετ μαγειρικών σκευών, όπως
        γάστρα ή τηγάνι
    cooling_technology:
      name: Τεχνολογία ψύξης
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για την ψύξη ηλεκτρονικών
        ειδών, όπως ψύξη με αέρα ή απαγωγέα θερμότητας
    cord_fastening_system:
      name: Σύστημα στερέωσης κορδονιού
      description: Καθορίζει τον τύπο του συστήματος στερέωσης κορδονιών bungee, π.χ.
        σφαίρα περιστροφής, άγκιστρο
    cordless_phone_frequency_band:
      name: Ζώνη συχνοτήτων ασύρματου τηλεφώνου
      description: Καθορίζει τη ζώνη(-ες) ραδιοσυχνοτήτων στην οποία λειτουργεί το
        ασύρματο τηλεφωνικό σύστημα, βοηθώντας τους αγοραστές να διασφαλίσουν την
        περιφερειακή συμβατότητα και να αποφύγουν τις παρεμβολές.
    core_color:
      name: Χρώμα πυρήνα
      description: Προσδιορίζει το κύριο χρώμα του πυρήνα ενός τόξου ή βαλλίστρας,
        όπως μαύρο ή μπλε
    core_material:
      name: Υλικό πυρήνα
      description: Καθορίζει το κύριο υλικό που χρησιμοποιείται, συνήθως για τόξα
        και βαλλίστρες. π.χ. υαλοβάμβακας, ξύλο
    core_pattern:
      name: Μοτίβο σε πυρήνα
      description: Περιγράφει το κύριο σχέδιο σε έναν πυρήνα τόξου ή βαλλίστρας, όπως
        σχέδιο καμουφλάζ ή με πουλιά
    corrector_features:
      name: Χαρακτηριστικά διορθωτικών μέσων
      description: Περιγράφει τα μοναδικά χαρακτηριστικά των διορθωτικών υγρών, στυλό
        και ταινιών, π.χ. χωρίς να απαιτείται χρόνος στεγνώματος, μύτη ακριβείας
    corsage/boutonniere_design:
      name: Σχέδιο Κορσάζ/Μπουτονιέρα
      description: Περιγράφει το στυλ του κορσάζ ή της μπουτονιέρας, όπως με δέσιμο
        στο χέρι ή με στερέωση σε καρφίτσα
    cosmetic_condition:
      name: Κατάσταση καλλυντικού προϊόντος
      description: Καθορίζει τη φθορά και την κατάσταση των ηλεκτρονικών ειδών, π.χ.
        καινούργιο είδος, ανοιγμένο είδος, είδος που δε χρησιμοποιήθηκε ποτέ
    cosmetic_finish:
      name: Καλλυντικό φινίρισμα
      description: Καθορίζει το καλλυντικό φινίρισμα ενός προϊόντος, π.χ. ματ φινίρισμα,
        φυσικό φινίρισμα
    cosmetic_function:
      name: Λειτουργία καλλυντικού προϊόντος
      description: Καθορίζει το επιδιωκόμενο όφελος ή επίδραση ενός καλλυντικού προϊόντος,
        π.χ. καταπραϋντικό, επουλωτικό
    cosmetic_set_type:
      name: Τύπος καλλυντικού σετ
      description: Κατατάσσει το σετ ανάλογα με την πρωτεύουσα εστίασή του ή το θέμα
        του.
    costume_theme:
      name: Θέμα στολής
      description: Προσδιορίζει το κύριο θέμα ή την έννοια μιας στολής, όπως στολή
        τρόμου ή φαντασίας
    cotton_ball_size:
      name: Μέγεθος βαμβακερής μπάλας
      description: Δηλώνει τη σχετική κατηγορία μεγέθους κάθε βαμβακερής μπάλας (π.χ.,
        μικρή, μεγάλη, jumbo).
    counter_shape:
      name: Σχήμα πάγκου
      description: Περιγράφει τη μορφή ενός πάγκου ή γραφείου γύρω από τη βάση του,
        όπως ίσια ή καμπυλωτή
    country:
      name: Χώρα
      description: Καθορίζει τη χώρα που σχετίζεται με το προϊόν, όπως η Ιαπωνία ή
        η Γερμανία
    country_of_issue:
      name: Χώρα έκδοσης
      description: Υποδεικνύει τη χώρα στην οποία εκδόθηκε ή προορίζεται για χρήση
        η τηλεφωνική κάρτα.
    cover_closure_design:
      name: Σχέδιο κλεισίματος καλύμματος
      description: Καθορίζει το σχέδιο κλεισίματος, συνήθως για καλύμματα μαξιλαριού.
        π.χ. φάκελος, φερμουάρ
    cover_color:
      name: Χρώμα καλύμματος
      description: Καθορίζει το κύριο χρώμα του καλύμματος ενός προϊόντος, π.χ. διαφανές,
        navy
    cover_features:
      name: Χαρακτηριστικά καλύμματος
      description: Περιγράφει ειδικά χαρακτηριστικά του καλύμματος ενός προϊόντος,
        όπως ότι είναι αδιάβροχο ή ανθεκτικό στη θερμότητα
    cover_material:
      name: Υλικό καλύμματος
      description: Προσδιορίζει τον τύπο του υφάσματος ή του υλικού που χρησιμοποιείται
        στο κάλυμμα του προϊόντος, όπως μετάξι ή βαμβάκι
    cover_pattern:
      name: Μοτίβο καλύμματος
      description: Καθορίζει το οπτικό μοτίβο ή σχέδιο στο κάλυμμα ενός αντικειμένου,
        όπως φλοράλ ή σχέδιο tie-dye
    cover_type:
      name: Τύπος καλύμματος
      description: Περιγράφει το στυλ ή τη λειτουργικότητα ενός καλύμματος οχήματος,
        όπως το πλήρες κάλυμμα ή το πτυσσόμενο
    coverage_area:
      name: Περιοχή κάλυψης
      description: Υποδεικνύει τις χώρες ή τις περιοχές γεωγραφικής κάλυψης για το
        λογισμικό GPS, όπως οι Ηνωμένες Πολιτείες ή ο Καναδάς
    coverage_country:
      name: Χώρα κάλυψης
      description: Καθορίζει την κύρια χώρα στην οποία μπορεί να χρησιμοποιηθεί η
        προπληρωμένη πίστωση.
    coverage_level:
      name: Επίπεδο κάλυψης
      description: Υποδεικνύει την αδιαφάνεια ή την ένταση κάλυψης που παρέχει το
        προϊόν μετά την εφαρμογή (π.χ., ελαφριά, μέτρια, πλήρης).
    coverage_region:
      name: Μεγάλη περιοχή κάλυψης
      description: Υποδεικνύει τη μεγάλη περιοχή ευρείας γεωγραφικής κάλυψης για λογισμικό
        GPS, όπως η Βόρεια Αμερική ή η Ωκεανία
    craft/sculpting_project_type:
      name: Τύπος χειροτεχνίας/έργου γλυπτικής
      description: Προσδιορίζει τον τύπο της χειροτεχνίας ή του έργου γλυπτικής, όπως
        μοντελοποίηση ή κατασκευή μάσκας
    craft_cutter/embosser_type:
      name: Τύπος κόπτη/κοπτικού και διατρητικού εργαλείου για χειροτεχνίες
      description: Καθορίζει το είδος του κόφτη ή του κοπτικού και διατρητικού εργαλείου
        για χειροτεχνίες, π.χ. μηχανή κοπής, διάτρητα φύλλα (στένσιλ)
    craft_decoration_maker_type:
      name: Τύπος κατασκευαστή διακόσμησης χειροτεχνίας
      description: Καθορίζει το είδος του κατασκευαστή διακόσμησης χειροτεχνίας, όπως
        μηχανή σφράγισης ή αυτοκόλλητων
    craft_knife_design:
      name: Σχέδιο μαχαιριών χειροτεχνίας
      description: Περιγράφει το συγκεκριμένο στυλ ενός μαχαιριού χειροτεχνίας, όπως
        ότι είναι ίσιο ή ακριβείας
    craft_pipe_cleaner_design:
      name: Σχέδιο καθαριστικού σωλήνα χειροτεχνίας
      description: Περιγράφει το σχέδιο ή το στυλ των καθαριστικών σωλήνα χειροτεχνίας,
        όπως το στέλεχος σενίλ ή το fuzzy stick
    craft_project_type:
      name: Τύπος έργου χειροτεχνίας
      description: Προσδιορίζει τον τύπο του έργου χειροτεχνίας, όπως η δημιουργία
        λευκώματος ή η κατασκευή κοσμημάτων
    crafting_frame/stretcher_features:
      name: Χαρακτηριστικά κορνίζας/τελάρου χειροτεχνίας
      description: Περιγράφει τα μοναδικά χαρακτηριστικά κορνιζών/τελάρων χειροτεχνίας,
        όπως ασφαλές κράτημα ή λεία επιφάνεια
    crafting_frame_features:
      name: Χαρακτηριστικά κορνίζας χειροτεχνίας
      description: Περιγράφει τα μοναδικά χαρακτηριστικά κορνιζών χειροτεχνίας, όπως
        ρυθμιζόμενο τέντωμα ή ελαφριά κατασκευή
    crafting_hoop_features:
      name: Χαρακτηριστικά στεφάνης χειροτεχνίας
      description: Τονίζει τα χαρακτηριστικά των στεφανών για κέντημα, π.χ. ασφαλές
        κράτημα, λεία επιφάνεια
    crafting_mat/pad_features:
      name: Χαρακτηριστικά χαλιού/μαξιλαριού χειροτεχνίας
      description: Περιγράφει τα μοναδικά χαρακτηριστικά της κατασκευής χαλιών ή μαξιλαριών,
        όπως η ευκολία στο καθάρισμα ή το αντιολισθητικό υπόστρωμα
    crafting_stretcher_features:
      name: Χαρακτηριστικά τελάρου χειροτεχνίας
      description: Περιγράφει τα βασικά χαρακτηριστικά ενός τελάρου χειροτεχνίας,
        όπως ρυθμιζόμενο τέντωμα ή ελαφριά κατασκευή
    crampon_attachment_type:
      name: Τύπος προσάρτησης κραμπόν
      description: Προσδιορίζει τον τρόπο με τον οποίο τα κραμπόν προσαρτώνται στα
        υποδήματα, όπως υβριδικά ή με σύστημα step-in
    creatine_type:
      name: Τύπος κρεατίνης
      description: Καθορίζει τη χημική μορφή ή την εξειδικευμένη σύνθεση της κρεατίνης
        που χρησιμοποιείται στο συμπλήρωμα.
    creative_art_project_type:
      name: Τύπος έργου δημιουργικής τέχνης
      description: Προσδιορίζει τον τύπο του δημιουργικού έργου τέχνης, όπως το σχέδιο
        ή η δημιουργία λευκώματος
    crib/toddler_bed_features:
      name: Χαρακτηριστικά βρεφικής κούνιας/παιδικού κρεβατιού
      description: Περιγράφει μοναδικές πτυχές βρεφικών και παιδικών κρεβατιών, όπως
        μετατρέψιμος σχεδιασμός ή μηχανισμός λικνίσματος
    crib_features:
      name: Χαρακτηριστικά βρεφικής κούνιας
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των βρεφικών κρεβατιών,
        όπως μετατρέψιμες επιλογές ή επιλογές αποθήκευσης
    cricket_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός κρίκετ
      description: Προσδιορίζει τα συγκεκριμένα είδη κρίκετ που περιλαμβάνονται σε
        ένα σετ, όπως κράνος ή στύλοι
    crutch_folding_type:
      name: Τύπος αναδίπλωσης πατερίτσας
      description: Καθορίζει αν και πώς η πατερίτσα διπλώνει για μεταφορά ή αποθήκευση.
    crutch_type:
      name: Τύπος πατερίτσας
      description: Διακρίνει μεταξύ διαφορετικών στυλ πατερίτσες, π.χ. αγκώνα, μασχάλης,
    crystal_system:
      name: Σύστημα κρυστάλλου
      description: Προσδιορίζει τη γεωμετρική δομή ενός κρυστάλλου, όπως σε σχήμα
        εξαγώνου ή κύβου
    cue_style:
      name: Στυλ στέκας
      description: Καθορίζει το στυλ του άξονα του μπιλιάρδου, π.χ. ευθύς, κωνικός
    cue_type:
      name: Τύπος στέκας
      description: Καθορίζει τον τύπο στέκας ενός άξονα μπιλιάρδου, π.χ. για σπάσιμο,
        για jump
    cue_wrap:
      name: Περίβλημα στέκας
      description: Προσδιορίζει τον τύπο περιβλήματος στη στέκα μπιλιάρδου, όπως ιρλανδικό
        λινό ή χωρίς περιτύλιγμα
    cuff_connector_type:
      name: Τύπος συνδέσμου περιχειρίδας
      description: Καθορίζει τη μηχανική διεπαφή που συνδέει τη σωλήνωση της περιχειρίδας
        με το πιεσόμετρο.
    cuff_size_category:
      name: Κατηγορία μεγέθους περιχειρίδας
      description: Καθορίζει την τυποποιημένη κατηγορία μεγέθους της περιχειρίδας
        (π.χ., βρέφος, ενήλικας, μεγάλος ενήλικας).
    cuff_style:
      name: Στυλ περιχειρίδας
      description: Περιγράφει τον σχεδιασμό της περιχειρίδας του πήχη στις πατερίτσες
        αντιβραχίου.
    cuisine:
      name: Κουζίνα
      description: Ταξινομεί προϊόντα κατά γαστρονομικό στυλ ή περιοχή, π.χ. Νοτιοδυτικές
        Ηνωμένες Πολιτείες, Μεσόγειος
    culinary_botanical_name:
      name: Γαστρονομική βοτανική ονομασία
      description: Καθορίζει την επιστημονική ονομασία γαστρονομικών βοτάνων ή φυτών,
        π.χ. πιπεριά, μέντα
    cup_size:
      name: Μέγεθος κυπέλλου (cup)
      description: Καθορίζει το μέγεθος στήθους σε σουτιέν, όπως AA ή L
    curing_method:
      name: Μέθοδος σκλήρυνσης
      description: Υποδεικνύει πώς η κόλλα στεγνώνει ή σκληραίνει (π.χ., στέγνωμα
        στον αέρα, λάμπα UV/LED, θερμότητα).
    curler_pad_material:
      name: Υλικό μαξιλαριού ψαλιδιού
      description: Προσδιορίζει το υλικό του αντικαταστάσιμου μαξιλαριού που πιέζει
        ενάντια στις βλεφαρίδες, επηρεάζοντας την άνεση, την ανθεκτικότητα και τις
        εκτιμήσεις αλλεργίας.
    curler_size_compatibility:
      name: Συμβατότητα μεγέθους ψαλιδιού βλεφαρίδων
      description: Καθορίζει το μέγεθος ή το στυλ του μαξιλαριού του ψαλιδιού που
        ταιριάζουν τα ανταλλακτικά (π.χ., τυπικό, μίνι, μερικό).
    curler_type:
      name: Τύπος συσκευής για μπούκλες
      description: Καθορίζει το είδος της συσκευής για μπούκλες, όπως με εύκαμπτες
        ράβδους ή θερμαινόμενους κυλίνδρους
    currencies_supported:
      name: Υποστηριζόμενα νομίσματα
      description: Προσδιορίζει τους τύπους νομισμάτων που γίνονται δεκτά από ένα
        προϊόν, π.χ. Δολάριο Καναδά (CAD), Γιουάν Κίνας (CNY)
    currency:
      name: Νόμισμα
      description: Καθορίζει τον τύπο νομίσματος που υποστηρίζει ένα προϊόν, όπως
        Γιουάν Κίνας (CNY) ή Δολάριο Ηνωμένων Πολιτειών (USD)
    currency_type:
      name: Τύπος νομίσματος
      description: Προσδιορίζει τον τύπο νομίσματος που χρησιμοποιείται από ένα προϊόν,
        όπως νομίσματα ή μάρκες
    cushion_design:
      name: Σχεδιασμός μαξιλαριού
      description: Περιγράφει τη συνολική μορφή ή το στυλ του μαξιλαριού μεταταρσίου
        (π.χ., επίθεμα, μανίκι, θόλος).
    customer_support_channels:
      name: Κανάλια υποστήριξης πελατών
      description: Καθορίζει τους τρόπους με τους οποίους οι πελάτες μπορούν να λάβουν
        βοήθεια, όπως τηλεφωνική υποστήριξη ή εκπαιδευτικά βίντεο
    customization:
      name: Προσαρμογή
      description: Προσδιορίζει τον τύπο εξατομίκευσης που είναι διαθέσιμος σε σφραγίδες
        γραφείου, όπως προσαρμοσμένο κείμενο ή χάραξη λογότυπου
    cutter_options:
      name: Επιλογές κόπτη
      description: Προσδιορίζει το χαρακτηριστικό ενός κόπτη σε συσκευές ωστικής σφράγισης,
        π.χ. ενσωματωμένος κόπτης
    cutting_method:
      name: Μέθοδος κοπής
      description: Καθορίζει την τεχνική κοπής, που χρησιμοποιείται συνήθως για εργαλεία
        κηπουρικής. πχ με παράκαμψη, αμόνι
    cycling_style:
      name: Στυλ ποδηλασίας
      description: Καθορίζει την προβλεπόμενη χρήση ή το στυλ οδήγησης ποδηλατικών
        προϊόντων, όπως σε ποδηλατικούς αγώνες δρόμου ή αγώνες BMX
    cylinder_size_designation:
      name: Προσδιορισμός μεγέθους φιάλης
      description: Προσδιορίζει τον τυποποιημένο κωδικό γράμματος ή αριθμού που χρησιμοποιείται
        για την αναγνώριση των διαστάσεων και της χωρητικότητας μιας φιάλης οξυγόνου
        (π.χ., M6, D, E).
    daisy_chain_capability:
      name: Δυνατότητα αλυσιδωτής σύνδεσης
      description: Υποδεικνύει εάν πολλαπλές μονάδες συνδιάσκεψης μπορούν να συνδεθούν
        μεταξύ τους (αλυσιδωτή σύνδεση) για να επεκτείνουν την κάλυψη μικροφώνου και
        ηχείου, και τη μέθοδο σύνδεσης που χρησιμοποιείται.
    dance_style:
      name: Στυλ χορού
      description: Υποδεικνύει το συγκεκριμένο είδος ή είδη χορού, π.χ. φλαμένκο,
        μπαλέτο
    data_network:
      name: Δίκτυο δεδομένων
      description: Καθορίζει τη συμβατότητα δικτύου δεδομένων κινητών συσκευών, όπως
        LTE ή 3G
    data_network_generation:
      name: Δημιουργία δικτύου δεδομένων
      description: Υποδεικνύει την υψηλότερη τεχνολογία δικτύου κινητής τηλεφωνίας
        που υποστηρίζει η προπληρωμένη κάρτα ή η κάρτα SIM (π.χ., 3G, 4G LTE, 5G).
    data_rollover_policy:
      name: Πολιτική μεταφοράς δεδομένων
      description: Υποδεικνύει εάν τα αχρησιμοποίητα δεδομένα υψηλής ταχύτητας μεταφέρονται
        στην επόμενη περίοδο ισχύος ή λήγουν.
    decoder/encoder_function:
      name: Λειτουργία αποκωδικοποιητή/κωδικοποιητή
      description: Καθορίζει τη λογική λειτουργία που υλοποιείται από το IC.
    decoration_material:
      name: Διακοσμητικό υλικό
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για διακόσμηση, όπως
        πούλιες ή φτερά
    decorative_stamp_design:
      name: Διακοσμητικό σχέδιο σφραγίδας
      description: Περιγράφει το σχέδιο σε διακοσμητικά γραμματόσημα που αποτελεί
        έμπνευση, π.χ. από παραμύθια ή ρετρό/vintage
    denomination:
      name: Ονομαστική αξία
      description: Προσδιορίζει την ονομαστική αξία συλλεκτικών αντικειμένων όπως
        νομίσματα και γραμματόσημα, π.χ. 1.000 δολάρια, 1 σεντ/λεπτό
    dental_appliance_compatibility:
      name: Συμβατότητα οδοντιατρικής συσκευής
      description: Καθορίζει ποιες οδοντιατρικές συσκευές ή αποκαταστατικές εργασίες
        είναι ασφαλής ή προορίζεται ο αφρός (π.χ., ευθυγραμμιστές, σιδεράκια, όψεις).
    dental_floss_format:
      name: Μορφή οδοντικού νήματος
      description: Προσδιορίζει τη συνολική μορφή προϊόντος ή το στυλ παράδοσης του
        νήματος.
    dental_floss_shape:
      name: Σχήμα οδοντικού νήματος
      description: Προσδιορίζει το σχήμα ή το στυλ του οδοντικού νήματος, όπως ταινία
        ή κορδέλα
    dental_floss_thickness_level:
      name: Επίπεδο πάχους οδοντικού νήματος
      description: Διαφοροποιεί το οδοντικό νήμα με βάση το επίπεδο πάχους, όπως λεπτό
        ή κανονικό
    dental_floss_type:
      name: Τύπος οδοντικού νήματος
      description: Προσδιορίζει τον τύπο του οδοντικού νήματος, όπως μη κερωμένο ή
        κερωμένο
    dental_mouthgard_recommended_use:
      name: Συνιστώμενη χρήση προστατευτικού στόματος (μασελάκι)
      description: Προσδιορίζει τον σκοπό των προστατευτικών στόματος, π.χ. μείωση
        ροχαλητού, προστασία από ορθοδοντικά προβλήματα
    dental_mouthguard_arch_coverage:
      name: Κάλυψη οδοντικού τόξου νάρθηκα
      description: Καθορίζει ποιο(-α) οδοντικό(-ά) τόξο(-α) έχει σχεδιαστεί να καλύπτει
        ο νάρθηκας.
    dental_mouthguard_certifications:
      name: Πιστοποιήσεις προστατευτικού στόματος
      description: Υποδεικνύει πιστοποιήσεις ασφάλειας και ποιότητας για τα προστατευτικά
        στόματος, όπως χωρίς BPA ή πιστοποιημένο CE.
    dental_paste_flavor:
      name: Γεύση οδοντιατρικής πάστας
      description: Προσδιορίζει τη γεύση της οδοντιατρικής πάστας, για παράδειγμα,
        χωρίς γεύση ή με γεύση τσιχλόφουσκας
    dental_repair_kit_certifications:
      name: Πιστοποιήσεις κιτ οδοντιατρικής επισκευής
      description: Προσδιορίζει τις πιστοποιήσεις που έχει ένα κιτ οδοντιατρικής επισκευής,
        όπως εγκεκριμένο από τον FDA ή χωρίς BPA
    dental_water_jet_operation:
      name: Λειτουργία συσκευής ύδατος για την πλύση δοντιών και ούλων
      description: Καθορίζει την πηγή τροφοδοσίας για μία συσκευή ύδατος για την πλύση
        δοντιών και ούλων, όπως με καλώδιο ή χωρίς καλώδιο
    dentistry_items_included:
      name: Περιλαμβάνονται οδοντιατρικά είδη
      description: Προσδιορίζει τα οδοντιατρικά εργαλεία που περιλαμβάνονται σε ένα
        σετ, όπως οδοντιατρικό καθρέφτη ή εργαλείο αφαίρεσης πλάκας
    denture_arch_coverage:
      name: Κάλυψη οδοντικού τόξου οδοντοστοιχίας
      description: Προσδιορίζει ποιο οδοντικό τόξο προορίζεται να καλύπτει η οδοντοστοιχία
        (ή το κουμπωτός καπλαμάς).
    denture_base_color:
      name: Χρώμα βάσης οδοντοστοιχίας
      description: Καθορίζει την απόχρωση του τεχνητού ούλου στις οδοντοστοιχίες,
        π.χ. ροζ ή φυσικό ούλο
    denture_coverage:
      name: Κάλυψη οδοντοστοιχίας
      description: Προσδιορίζει την έκταση της κάλυψης της οδοντοστοιχίας, όπως πλήρη
        ή μερική
    denture_design:
      name: Σχέδιο οδοντοστοιχίας
      description: Περιγράφει τον τύπο της οδοντοστοιχίας, π.χ. εύκαμπτη, άμεση
    denture_retention_mechanism:
      name: Μηχανισμός συγκράτησης οδοντοστοιχίας
      description: Καθορίζει πώς η οδοντοστοιχία παραμένει στη θέση της στα δόντια
        ή τα ούλα.
    denture_teeth_color:
      name: Χρώμα δοντιών οδοντοστοιχίας
      description: Καθορίζει τη χρωματική απόχρωση των δοντιών της οδοντοστοιχίας,
        όπως υπόλευκο ή ανοιχτό κίτρινο
    deployment_type:
      name: Τύπος ανάπτυξης
      description: Περιγράφει πώς υλοποιείται το λογισμικό AI, όπως υβριδικό ή βάσει
        cloud
    desk_organizer_features:
      name: Χαρακτηριστικά επιτραπέζιου οργανωτή γραφείου
      description: Περιγράφει τα ειδικά χαρακτηριστικά ενός επιτραπέζιου οργανωτή,
        όπως ρυθμιζόμενα διαχωριστικά ή ενσωματωμένες θήκες
    desk_size:
      name: Μέγεθος γραφείου
      description: Υποδεικνύει την κατηγορία μεγέθους ενός γραφείου, όπως μικρό (S)
        ή μεγάλο (L)
    detailed_ingredients:
      name: Αναλυτικά συστατικά
      description: Αναφέρει συγκεκριμένα συστατικά που χρησιμοποιούνται στην υγεία
        και την ομορφιά, π.χ. βιταμίνη C, προβιοτικά
    detectable_drugs:
      name: Ανιχνεύσιμα φάρμακα
      description: Καθορίζει τους τύπους φαρμάκων που μπορεί να εντοπίσει μια δοκιμή,
        π.χ. μαριχουάνα, οπιούχα
    detection_technology:
      name: Τεχνολογία ανίχνευσης
      description: Καθορίζει την επιστημονική αρχή ή τον βιολογικό δείκτη που ανιχνεύει
        το τεστ HIV (π.χ., αντίσωμα, συνδυασμός αντιγόνου/αντισώματος, RNA PCR).
    detector_operation_mode:
      name: Τρόπος λειτουργίας ανιχνευτή
      description: Περιγράφει πώς λειτουργεί ένας ανιχνευτής ασφαλείας, όπως διασυνδεδεμένος
        ή αυτόνομος
    detector_sensitivity:
      name: Ευαισθησία ανιχνευτή
      description: Περιγράφει τη δυνατότητα προσαρμογής της ευαισθησίας ενός ανιχνευτή
        μετάλλων, όπως ρυθμιζόμενη ή σταθερή
    detector_type:
      name: Τύπος ανιχνευτή
      description: Καθορίζει τη μέθοδο ανίχνευσης που χρησιμοποιείται σε συσκευές
        ασφαλείας, π.χ. οπτικός ιονισμός, δειγματοληψία αέρα
    developer_strength:
      name: Ισχύς οξειδωτικού
      description: Καθορίζει τη συγκέντρωση υπεροξειδίου ή τον όγκο οξειδωτικών ή
        κιτ για να ταιριάζει με το επιθυμητό ξάνοιγμα.
    developmental_features:
      name: Αναπτυξιακά χαρακτηριστικά
      description: Υπογραμμίζει τα αναπτυξιακά οφέλη ενός προϊόντος, όπως η γλωσσική
        ανάπτυξη ή η συναισθηματική και κοινωνική ανάπτυξη
    device_interface:
      name: Διασύνδεση συσκευής
      description: Καθορίζει τη μέθοδο σύνδεσης μεταξύ ηλεκτρονικών συσκευών, π.χ.
        HDMI, USB
    device_technology:
      name: Τεχνολογία συσκευής
      description: Περιγράφει τον τύπο της τεχνολογίας σε εργαλεία υλικού, όπως ψηφιακό
        ή αναλογικό
    dexterity_skills:
      name: Δεξιότητες επιδεξιότητας
      description: Προσδιορίζει τις συγκεκριμένες ικανότητες επιδεξιότητας που απαιτούνται
        για ένα παιχνίδι, όπως η ισορροπία ή η ακρίβεια
    dial_color:
      name: Χρώμα στο καντράν
      description: Καθορίζει το χρώμα του καντράν ή της πρόσοψης ενός ρολογιού, όπως
        χρυσό ή πολύχρωμο
    dial_pattern:
      name: Μοτίβο στο καντράν
      description: Περιγράφει το σχέδιο ή το μοτίβο στο καντράν ενός ρολογιού, όπως
        κουκκίδες ή σχέδιο tie-dye
    dialing_method:
      name: Μέθοδος κλήσης
      description: Ορίζει τον μηχανισμό που χρησιμοποιεί το τηλέφωνο για την εισαγωγή
        αριθμών.
    diaper_bag_additional_features:
      name: Επιπλέον χαρακτηριστικά τσάντας για πάνες
      description: Καθορίζει επιπλέον χαρακτηριστικά στις τσάντες για πάνες, π.χ.
        περιλαμβάνεται αλλαξιέρα, θήκη για μπουκάλι
    diaper_bag_material:
      name: Υλικό τσάντας για πάνες
      description: Καθορίζει τον τύπο υλικού από το οποίο κατασκευάζεται μια τσάντα
        για πάνες, όπως δέρμα ή καμβάς
    diaper_bag_style:
      name: Στυλ τσάντας για πάνες
      description: Περιγράφει το σχέδιο ή τη μορφή μιας τσάντας για πάνες, όπως σακίδιο
        πλάτης ή τσάντα ώμου
    diaper_features:
      name: Χαρακτηριστικά πάνας
      description: Περιγράφει ειδικά χαρακτηριστικά των πάνων, π.χ. αδιάβροχες ή υποαλλεργικές
    diaper_kit_components:
      name: Περιεχόμενο του κιτ πάνας
      description: Καθορίζει τα είδη που περιλαμβάνονται σε ένα κιτ πάνας, όπως μαντηλάκια
        ή αλλαξιέρα
    diaper_organizer_features:
      name: Χαρακτηριστικά οργανωτή πάνας
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των οργανωτών πάνας, όπως
        πολλαπλές θήκες ή αδιάβροχη επένδυση
    diaper_size:
      name: Μέγεθος πάνας
      description: Καθορίζει το μέγεθος πάνας, όπως για βρέφη ή νήπια
    diaper_type:
      name: Τύπος πάνας
      description: Διακρίνει μεταξύ βοηθημάτων ακράτειας, όπως σερβιέτες, ελαστικά
        κιλοτάκια ή πάνες
    dice_shape:
      name: Σχήμα ζαριού
      description: Περιγράφει τη γεωμετρική μορφή ενός ζαριού, όπως ο κύβος (6 πλευρές)
        ή το εικοσάεδρο (20 πλευρές)
    dielectric_type:
      name: Διηλεκτρικός τύπος
      description: Καθορίζει το διηλεκτρικό ή μονωτικό υλικό που χρησιμοποιείται σε
        πυκνωτές, όπως κεραμικό ή ηλεκτρολυτικό
    dietary_preferences:
      name: Διατροφικές προτιμήσεις
      description: Βοηθά στον εντοπισμό προϊόντων κατάλληλων για συγκεκριμένες δίαιτες,
        π.χ. vegan, χωρίς ξηρούς καρπούς
    dietary_supplements:
      name: Συμπληρώματα διατροφής
      description: Προσδιορίζει τα προστιθέμενα θρεπτικά συστατικά σε ένα προϊόν,
        όπως το ασβέστιο ή τα προβιοτικά
    dietary_use:
      name: Διατροφική χρήση
      description: Ταξινομεί τα προϊόντα με βάση τα διατροφικά οφέλη, π.χ. μυϊκή ανάπτυξη,
        χαμηλοί υδατάνθρακες
    difficulty_level:
      name: Επίπεδο δυσκολίας
      description: Υποδεικνύει την πολυπλοκότητα ή το επίπεδο δυσκολίας ενός παζλ
        ή παιχνιδιού, όπως εύκολο ή εξαιρετικά δύσκολο
    diffuser_design:
      name: Σχεδιασμός διαχυτήρα
      description: Περιγράφει τη δομή ενός διαχυτήρα φλας, όπως δακτύλιος ή θόλος
    digestive_supplement_type:
      name: Τύπος πεπτικού συμπληρώματος
      description: Κατηγοριοποιεί το συγκεκριμένο είδος πεπτικού συμπληρώματος (π.χ.,
        προβιοτικό, ένζυμο, φυτικές ίνες).
    digital_sound_processing:
      name: Ψηφιακή επεξεργασία ήχου
      description: Καθορίζει τις τεχνικές τροποποίησης ήχου σε ηχητικά εξαρτήματα,,
        όπως καθυστέρηση ή αντήχηση
    digitizer_surface_finish:
      name: Φινίρισμα επιφάνειας ψηφιοποιητή
      description: Περιγράφει την επικάλυψη ή το φινίρισμα επιφάνειας του γυαλιού
        ψηφιοποιητή.
    din_size:
      name: Μέγεθος DIN
      description: Καθορίζει το τυποποιημένο μέγεθος ανοίγματος ταμπλό στο οποίο ταιριάζει
        ο δέκτης (π.χ., Single DIN, Double DIN).
    dinnerware_pieces_included:
      name: Τεμάχια σε σερβίτσιο φαγητού
      description: Καθορίζει τα τεμάχια μιας συλλογής σερβίτσιου, όπως πιάτα φαγητού
        ή μπολ σερβιρίσματος
    direct_box_type:
      name: Τύπος direct box
      description: Καθορίζει τη διαμόρφωση κυκλώματος του direct box (DI), που επηρεάζει
        τις απαιτήσεις ισχύος, τον ηχητικό χαρακτήρα και την προβλεπόμενη εφαρμογή.
    direction_detection_capability:
      name: Δυνατότητα ανίχνευσης κατεύθυνσης
      description: Δηλώνει εάν το ραντάρ μπορεί να αναφέρει την κατεύθυνση του αντικειμένου
        (π.χ., προσέγγιση, απομάκρυνση ή και τα δύο).
    dirt_separating_method:
      name: Μέθοδος διαχωρισμού βρωμιάς
      description: Περιγράφει την τεχνική που χρησιμοποιεί η σκούπα για τον διαχωρισμό
        της βρωμιάς, π.χ. κυκλωνική, φιλτράρισμα
    discharge_type:
      name: Τύπος εκφόρτωσης
      description: Καθορίζει τον τύπο εκφόρτωσης σε ανατρεπόμενα φορτηγά, όπως εκφόρτωση
        από πλάι ή μεταφορά
    disk_format_type:
      name: Τύπος μορφής δίσκου
      description: Προσδιορίζει τον τύπο της μορφής δίσκου για προϊόντα λογισμικού,
        όπως Blu-ray ή CD
    dispenser_type:
      name: Τύπος διανομέα
      description: Καθορίζει τη μορφή για τη διανομή του προϊόντος, συνήθως σε θέματα
        υγείας και ομορφιάς. πχ ξυλάκι, βάζο
    dispensing_operation_type:
      name: Τύπος λειτουργίας διανομής
      description: Περιγράφει αν η οδοντόκρεμα διανέμεται χειροκίνητα, ημιαυτόματα
        ή αυτόματα.
    display_board_features:
      name: Χαρακτηριστικά πινακίδας παρουσίασης
      description: Περιγράφει τα μοναδικά χαρακτηριστικά των πινακίδων παρουσίασης,
        όπως αυτοκόλλητη βάση ή ανθεκτικότητα
    display_color_mode:
      name: Λειτουργία χρώματος της οθόνης
      description: Καθορίζει το χρώμα οθόνης του προϊόντος, π.χ. έγχρωμη, ασπρόμαυρη
    display_features:
      name: Χαρακτηριστικά οθόνης
      description: Περιγράφει τον τύπο της οθόνης σε ένα προϊόν, όπως οθόνη αφής ή
        κουμπιά ελέγχου
    display_interface:
      name: Διεπαφή οθόνης
      description: Καθορίζει τη διεπαφή βίντεο ή δεδομένων που χρησιμοποιεί η μονάδα
        οθόνης.
    display_mode:
      name: Λειτουργία εμφάνισης
      description: Περιγράφει τη μέθοδο εμφάνισης ενός προϊόντος, όπως ψηφιακή ή αναλογική
        μέθοδο
    display_recommended_use:
      name: Συνιστώμενη χρήση εκθεσιακών περιπτέρων
      description: Προτείνει την ιδανική χρήση των εκθεσιακών περιπτέρων με βάση τη
        μορφή και τον σχεδιασμό τους, όπως για εμπορική ή εκπαιδευτική χρήση
    display_resolution:
      name: Ανάλυση οθόνης
      description: Καθορίζει την ανάλυση μιας ψηφιακής οθόνης, π.χ. 1280 x 1024, full
        HD
    display_sign_design:
      name: Σχέδιο πινακίδας οθόνης
      description: Προσδιορίζει τον τύπο πληροφοριών που παρέχει μια πινακίδα, όπως
        τουαλέτα, έκπτωση ή έξοδος
    display_technology:
      name: Τεχνολογία οθόνης
      description: Καθορίζει τον τύπο της τεχνολογίας οθόνης που χρησιμοποιείται σε
        ένα προϊόν, π.χ. LED, e-ink
    disposable/reusable_bag_features:
      name: Χαρακτηριστικά σακούλας μιας χρήσης/επαναχρησιμοποιήσιμης σακούλας
      description: Περιγράφει τα βασικά χαρακτηριστικά σε σακούλες απορριμμάτων για
        κατοικίδια ζώα, όπως βιοδιασπώμενες σακούλες ή σακούλες με στεγανότητα
    disposable/reusable_item_material:
      name: Υλικό είδους μίας χρήσης/Επαναχρησιμοποιήσιμου είδους
      description: Προσδιορίζει εάν το υλικό ενός προϊόντος είναι μίας χρήσης ή επαναχρησιμοποιήσιμο,
        δηλαδή βιοδιασπώμενα υλικά, χαρτί
    disposable_bag_features:
      name: Χαρακτηριστικά σακούλας μιας χρήσης
      description: Αναδεικνύει τα μοναδικά χαρακτηριστικά των ανταλλακτικών για δοχεία
        πάνας, όπως ο έλεγχος οσμών ή το άρωμα
    disposable_bag_material:
      name: Υλικό σακούλας μιας χρήσης
      description: Καθορίζει τη σύνθεση των σακουλών μιας χρήσης, π.χ. από πλαστικό,
        βιοδιασπώμενα υλικά
    disposable_glove_features:
      name: Χαρακτηριστικά γαντιών μιας χρήσης
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των γαντιών μιας χρήσης,
        όπως μακριά μανσέτα ή χωρίς πούδρα
    disposable_tableware_material:
      name: Υλικό επιτραπέζιου σκεύους μιας χρήσης
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε επιτραπέζια σκεύη
        μιας χρήσης, όπως πλαστικό ή χαρτί
    dive_computer_items_included:
      name: Περιεχόμενα συσκευασίας υπολογιστή κατάδυσης
      description: Καθορίζει τα είδη που περιλαμβάνονται με τον υπολογιστή κατάδυσης,
        όπως πομπός ή ιμάντας
    diving/snorkeling_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός κατάδυσης/κολύμβησης με αναπνευστήρα
      description: Καθορίζει τα αξεσουάρ κατάδυσης/κολύμβησης με αναπνευστήρα που
        περιλαμβάνονται, όπως στολή ή αναπνευστήρας
    diving_regulator_style:
      name: Στυλ ρυθμιστή κατάδυσης
      description: Καθορίζει το στυλ του ρυθμιστή κατάδυσης, όπως με ασύμμετρο έμβολο
        ή διάφραγμα
    dj_equipment_features:
      name: Χαρακτηριστικά εξοπλισμού DJ
      description: Καθορίζει τα μοναδικά χαρακτηριστικά του εξοπλισμού DJ, όπως έλεγχος
        MIDI ή αυτόνομη λειτουργία
    dj_software_compatibility:
      name: Συμβατότητα λογισμικού DJ
      description: Προσδιορίζει το λογισμικό DJ με το οποίο είναι συμβατό το προϊόν,
        π.χ. Rekordbox, Serato DJ
    docking_compatibility:
      name: Συμβατότητα σύνδεσης
      description: Υποδεικνύει εάν η κονσόλα μπορεί να συνδεθεί ή να φορτιστεί χωρίς
        την αφαίρεση της θήκης.
    docsis_standard:
      name: Πρότυπο DOCSIS
      description: Καθορίζει την έκδοση DOCSIS που υποστηρίζεται από τα καλωδιακά
        μόντεμ.
    dog_age_group:
      name: Ηλικιακή ομάδα σκύλου
      description: Βοηθά στην ταξινόμηση των προμηθειών του σκύλου ανάλογα με το στάδιο
        ζωής του σκύλου, π.χ. κουτάβι, ηλικιωμένος σκύλος
    dog_diaper_size:
      name: Μέγεθος πάνας σκύλου
      description: Καθορίζει το μέγεθος των πάνας σκύλου, π.χ. Extra large (XL), Small
        (S)
    dog_diaper_type:
      name: Τύπος πάνας σκύλου
      description: Προσδιορίζει τον συγκεκριμένο τύπο πάνας σκύλου, π.χ. για θηλυκό
        ενήλικο σκύλο, για κουτάβι
    dog_house_features:
      name: Χαρακτηριστικά που φέρει ένα σπιτάκι σκύλου
      description: Περιγράφει ιδιαίτερα χαρακτηριστικά που φέρει ένα σπιτάκι σκύλου,
        όπως ρυθμιζόμενες διαστάσεις ή προστασία από την υπεριώδη ακτινοβολία
    dog_kennel/run_features:
      name: Χαρακτηριστικά κλουβιού/πολλαπλών κλουβιών για σκύλους
      description: Αναδεικνύει τα μοναδικά χαρακτηριστικά ενός κλουβιού/πολλαπλών
        κλουβιών, π.χ. ανθεκτικότητα στις καιρικές συνθήκες, δυνατότητα μεταφοράς
    dog_kennel_features:
      name: Χαρακτηριστικά κλουβιού για σκύλους
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά ενός κλουβιού για σκύλους,
        όπως τη δυνατότητα κλειδώματος ή αναδίπλωσης
    dog_pen_features:
      name: Χαρακτηριστικά μεγάλου κλουβιού σκύλων
      description: Περιγράφει τα ειδικά χαρακτηριστικά των μεγάλων κλουβιών σκύλων,
        όπως προστασία από την υπεριώδη ακτινοβολία (UV) ή αντοχή στις καιρικές συνθήκες
    dog_toy_type:
      name: Τύπος παιχνιδιού για σκύλους
      description: Ταξινομεί τον τύπο του παιχνιδιού για σκύλους, όπως βελούδινο παιχνίδι
        ή παιχνίδι με ήχο
    doll/playset_features:
      name: Χαρακτηριστικά κούκλας/σετ παιχνιδιού
      description: Περιγράφει ιδιαίτερα χαρακτηριστικά κούκλων ή σετ παιχνιδιού, όπως
        αρθρώσεις ή συλλεκτικά στοιχεία
    doll_features:
      name: Χαρακτηριστικά κούκλας
      description: Περιγράφει ιδιαίτερα χαρακτηριστικά που φέρουν οι κούκλες, όπως
        αρθρώσεις ή ρεαλιστικές λεπτομέρειες
    doll_type:
      name: Τύπος κούκλας
      description: Προσδιορίζει την κατηγορία μιας κούκλας, όπως κούκλα μωρό ή συλλεκτική
        κούκλα
    door/frame_application:
      name: Εφαρμογή πόρτας/πλαισίου
      description: Προσδιορίζει πού προορίζεται να χρησιμοποιηθεί το πλαίσιο της πόρτας,
        π.χ. εσωτερικό, εξωτερικό πλαίσιο
    door_application:
      name: Εφαρμογή πόρτας
      description: Καθορίζει την εφαρμογή πορτών ή μεντεσέδων, όπως εσωτερικά ή εξωτερικά
    door_closer_application:
      name: Εφαρμογή μηχανισμού κλεισίματος πόρτας
      description: Καθορίζει την εφαρμογή μηχανισμών κλεισίματος πόρτας, όπως εσωτερικά
        ή εξωτερικά
    door_closer_design:
      name: Σχέδιο μηχανισμού κλεισίματος πόρτας
      description: Προσδιορίζει το στυλ σχεδίου των μηχανισμών κλεισίματος πόρτας,
        όπως δαπέδου ή με κρυφή τοποθέτηση στην οροφή
    door_color:
      name: Χρώμα πόρτας
      description: Καθορίζει το χρώμα της πόρτας ενός προϊόντος, όπως κόκκινο ή μαύρο
    door_frame_finish:
      name: Φινίρισμα πλαισίου πόρτας
      description: Καθορίζει το φινίρισμα της επιφάνειας ενός πλαισίου πόρτας, όπως
        προκατασκευασμένο ή με έτοιμο φινίρισμα
    door_glass_finish:
      name: Γυάλινο φινίρισμα πόρτας
      description: Καθορίζει τον τύπο γυάλινου φινιρίσματος στις πόρτες, όπως από
        μόλυβδο ή με μοτίβο
    door_insulation:
      name: Μόνωση πόρτας
      description: Καθορίζει την κατάσταση μόνωσης των πορτών, π.χ. με μόνωση, χωρίς
        μόνωση
    door_knob_function:
      name: Λειτουργία πόμολου πόρτας
      description: Καθορίζει τη λειτουργία των πόμολων και λαβών πορτών, όπως για
        διέλευση ή για ιδιωτικότητα
    door_mat_base_color:
      name: Χρώμα βάσης σε πατάκι πόρτας
      description: Προσδιορίζει το κύριο χρώμα της βάσης στο πατάκι πόρτας, όπως μπεζ
        ή μαύρο
    door_mat_base_material:
      name: Υλικό βάσης σε πατάκι πόρτας
      description: Καθορίζει το υλικό στο κάτω μέρος από ένα πατάκι πόρτας, όπως γιούτα
        ή λατέξ
    door_mat_base_pattern:
      name: Μοτίβο βάσης σε πατάκι πόρτας
      description: Περιγράφει το σχέδιο ή το μοτίβο στη βάση από ένα πατάκι πόρτας,
        όπως φλοράλ ή γεωμετρικό
    door_mat_surface_material:
      name: Υλικό επιφάνειας σε πατάκι πόρτας
      description: Καθορίζει το υλικό στην επιφάνεια από ένα πατάκι πόρτας, όπως φύκια
        ή καουτσούκ
    door_material:
      name: Υλικό πόρτας
      description: Καθορίζει το υλικό κατασκευής μιας πόρτας, όπως σκληρυμένο γυαλί
        ή ινόπλακες μέσης πυκνότητας (MDF)
    door_pattern:
      name: Μοτίβο πόρτας
      description: Περιγράφει το σχέδιο ή το μοτίβο σε μια πόρτα, συνήθως για μπουφέδες
        και βοηθητικά έπιπλα
    door_stop_placement:
      name: Τοποθέτηση στοπ πόρτας
      description: Προσδιορίζει πού είναι τοποθετημένο ένα στοπ πόρτας, όπως στο πάτωμα
        ή τον τοίχο
    door_stopper_design:
      name: Σχέδιο στοπ πόρτας
      description: Καθορίζει το στυλ ενός στοπ πόρτας, όπως σε σχήμα άγκιστρου ή σφηνοειδές
        σχήμα
    door_suitable_location:
      name: Κατάλληλη θέση πόρτας
      description: Προσδιορίζει την ιδανική τοποθέτηση μιας πόρτας, όπως μπροστινό
        μέρος ή αίθριο
    door_surface_finish:
      name: Φινίρισμα επιφάνειας πόρτας
      description: Καθορίζει το φινίρισμα της επιφάνειας σε πόρτες σπιτιού, όπως τζάμια
        ή χωρίς τζάμια
    door_type:
      name: Τύπος πόρτας
      description: Καθορίζει τον μηχανισμό ανοίγματος των πορτών, π.χ. μεντεσέδες,
        συρόμενες πόρτες
    double_stroller_configuration:
      name: Διαμόρφωση διπλού καροτσιού
      description: Καθορίζει τη διάταξη των καθισμάτων σε διπλά καρότσια, όπως σε
        σειρά ή δίπλα-δίπλα
    download_format:
      name: Μορφή λήψης
      description: Καθορίζει τη μορφή αρχείου για λήψεις ψηφιακής μουσικής, όπως MP3
        ή WAV
    downstream_port_types:
      name: Τύποι θυρών downstream
      description: Απαριθμεί τα είδη θυρών εξόδου που προσφέρει το hub για σύνδεση
        περιφερειακών (π.χ., USB-A, USB-C, HDMI, Ethernet).
    drain_location:
      name: Θέση αποχέτευσης
      description: Καθορίζει την τοποθέτηση αποχέτευσης σε μπανιέρες ή ντουζιέρες,
        όπως στο κέντρο ή στα αριστερά
    drainage_feature:
      name: Χαρακτηριστικό αποστράγγισης
      description: Καθορίζει οποιονδήποτε σχεδιασμό που επιτρέπει την αποστράγγιση
        υγρών ή το στέγνωμα μέσα στη θήκη.
    drawing/painting_kit_items_included:
      name: Περιλαμβάνονται είδη κιτ σχεδίου/ζωγραφικής
      description: Προσδιορίζει αντικείμενα σε κιτ ζωγραφικής ή χειροτεχνίας, π.χ.
        μπλοκ ζωγραφικής, κυπελλάκι μπογιάς
    dress_form_features:
      name: Χαρακτηριστικά τύπου φορέματος
      description: Τονίζει τα βασικά χαρακτηριστικά ενός τύπου φορέματος, όπως μία
        επιφάνεια που επιτρέπει καρφίτσωμα ή περιστρεφόμενη βάση
    dress_occasion:
      name: Περίσταση φορέματος
      description: Καθορίζει την προβλεπόμενη περίσταση για ένα φόρεμα, π.χ. γιορτές,
        καθημερινή χρήση
    dress_style:
      name: Στυλ φορέματος
      description: Προσδιορίζει το σχέδιο ενός φορέματος, όπως κρουαζέ (wrap) ή αυτοκρατορική
        μέση
    drill_features:
      name: Χαρακτηριστικά τρυπανιού
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά ενός τρυπανιού, όπως ρυθμιζόμενη
        ταχύτητα ή ενσωματωμένο φωτισμό
    drilling_method:
      name: Μέθοδος διάτρησης
      description: Προσδιορίζει την τεχνική που χρησιμοποιείται σε μηχανήματα διάτρησης,
        όπως η περιστροφική ή η κρουστική
    drilling_rig_orientation:
      name: Προσανατολισμός γεωτρύπανου
      description: Προσδιορίζει την κατεύθυνση διάτρησης από ένα γεωτρύπανο, όπως
        οριζόντια ή κάθετη
    drinkware_material:
      name: Υλικό εξοπλισμού ποτηριών για ροφήματα/ποτά
      description: Καθορίζει τη σύνθεση του εξοπλισμού ποτηριών, όπως από γυαλί ή
        πλαστικό
    drinkware_pieces_included:
      name: Περιλαμβάνεται εξοπλισμός ποτηριών
      description: Προσδιορίζει την ποικιλία του εξοπλισμού ποτηριών που περιλαμβάνονται
        σε ένα σετ, όπως κανάτα ή ποτήρια κρασιού
    drinkware_shape:
      name: Σχήμα εξοπλισμού ποτηριών
      description: Καθορίζει το περίγραμμα ή τη σιλουέτα ενός ποτηριού, π.χ. σε κυρτό
        ή κωνικό σχήμα
    drive_form_factor:
      name: Παράγοντας μορφής μονάδας
      description: Καθορίζει το ύψος ή την κατηγορία μεγέθους του μηχανισμού της μονάδας
        (π.χ., πλήρους ύψους, μισού ύψους, slimline).
    drive_size:
      name: Μέγεθος υποδοχής
      description: Περιγράφει το μέγεθος της υποδοχής σε κοίλα κλειδιά και δυναμομετρικά
        κλειδιά, π.χ. 1 ίντσα
    drive_type:
      name: Τύπος υποδοχής
      description: Προσδιορίζει τον τύπο του συστήματος υποδοχής σε οχήματα ή βαρέα
        μηχανήματα, όπως 2WD ή 4WD
    driver_configuration:
      name: Διαμόρφωση οδηγών
      description: Καθορίζει τον αριθμό των διακριτών οδηγών στο σύστημα ηχείων (π.χ.,
        2-way, 3-way).
    driver_technology:
      name: Τεχνολογία οδηγού
      description: Καθορίζει τον τύπο μετατροπέα που χρησιμοποιείται για την παραγωγή
        ήχου (π.χ., δυναμικός, ισορροπημένος οπλισμός, επίπεδος μαγνητικός, υβριδικός).
    drone_board_function:
      name: Λειτουργία πλακέτας drone
      description: Περιγράφει τον κύριο σκοπό της πλακέτας κυκλώματος εντός του συστήματος
        drone.
    drone_features:
      name: Χαρακτηριστικά drone
      description: Καθορίζει τα διάφορα χαρακτηριστικά λειτουργίας και σχεδίασης που
        διατίθενται σε ένα drone, όπως όπως πλοήγηση GPS ή αποφυγή εμποδίων
    drum_configuration:
      name: Διαμόρφωση τυμπάνου
      description: Χρησιμοποιείται για να υποδείξει τη ρύθμιση ενός σετ τυμπάνων,
        όπως συσκευασία 7 τεμαχίων ή κελύφους
    drum_hardware_adjustability:
      name: Δυνατότητα προσαρμογής εξοπλισμού τυμπάνου
      description: Αναφέρει λεπτομερώς τα ρυθμιζόμενα χαρακτηριστικά των αξεσουάρ
        τυμπάνου και κρουστών, π.χ. ρυθμιζόμενη γωνία κτυπήματος
    drum_hardware_material:
      name: Υλικό εξοπλισμού τυμπάνου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε εξοπλισμό τυμπάνων,
        όπως χάλυβας ή αλουμίνιο
    dry/wet_cleaning:
      name: Στεγνό/Υγρό καθάρισμα
      description: Καθορίζει εάν τα προϊόντα είναι κατάλληλα για στεγνό ή υγρό καθάρισμα
    dry_bean_variety:
      name: Ποικιλία ξηρών φασολιών
      description: Προσδιορίζει την ποικιλία των ξηρών φασολιών που χρησιμοποιούνται,
        π.χ. ρεβίθια, μαύρα φασόλια
    dryer_features:
      name: Χαρακτηριστικά στεγνωτηρίου
      description: Καθορίζει μοναδικά χαρακτηριστικά ενός στεγνωτηρίου ρούχων, όπως
        τεχνολογία αυτοκαθαρισμού ή μετατροπέα
    dryer_technology:
      name: Τεχνολογία στεγνωτηρίου
      description: Καθορίζει την τεχνολογία αφύγρανσης σε συστήματα HVAC, π.χ.με ξηραντικό
        ή ψυκτικό μέσο
    drying_method:
      name: Μέθοδος στεγνώματος
      description: Καθορίζει πώς η συσκευή στεγνώνει τις οδοντόβουρτσες μετά την αποστείρωση,
        εάν ισχύει.
    drying_speed:
      name: Ταχύτητα στεγνώματος
      description: Καθορίζει τον ρυθμό με τον οποίο ένα προϊόν στεγνώνει ή πήζει,
        όπως γρήγορο στέγνωμα ή κανονικό
    dsl_standard_compatibility:
      name: Συμβατότητα με πρότυπο DSL
      description: Προσδιορίζει ποια πρότυπα DSL υποστηρίζει ένα φίλτρο ή αξεσουάρ
        για να διασφαλίσει την κατάλληλη καταστολή θορύβου και την ποιότητα σύνδεσης.
    duct_design:
      name: Σχεδιασμός αγωγού
      description: Προσδιορίζει τη μορφή των αεραγωγών στα συστήματα HVAC, π.χ. συμπαγείς,
        εύκαμπτοι
    duct_shape:
      name: Σχήμα αγωγού
      description: Περιγράφει τη μορφή αεραγωγών σε συστήματα HVAC, όπως στρογγυλοί
        ή επίπεδοι
    duplex_component_type:
      name: Τύπος εξαρτήματος εκτύπωσης διπλής όψης
      description: Καθορίζει τη συγκεκριμένη μορφή του εξαρτήματος διπλής όψης που
        παρέχεται (π.χ., συναρμολόγηση, δίσκος, γρανάζι).
    duplexer_installation_type:
      name: Τύπος εγκατάστασης μονάδας διπλής όψης
      description: Διευκρινίζει πώς η μονάδα διπλής όψης προσαρτάται στον εκτυπωτή
        (π.χ., εσωτερική υποδοχή, πίσω εξωτερική προσάρτηση).
    duplexing_technology:
      name: Τεχνολογία διπλής όψης
      description: Καθορίζει εάν ένας εκτυπωτής υποστηρίζει εκτύπωση διπλής όψης,
        π.χ. δεν υποστηρίζεται, αυτόματη εκτύπωση διπλής όψης
    duplication_operation_mode:
      name: Λειτουργία αντιγραφής
      description: Υποδεικνύει εάν ο αντιγραφέας λειτουργεί ανεξάρτητα, απαιτεί σύνδεση
        σε υπολογιστή ή υποστηρίζει και τις δύο λειτουργίες.
    durability_features:
      name: Χαρακτηριστικά ανθεκτικότητας
      description: Υπογραμμίζει την ικανότητα ενός προϊόντος να αντέχει σε διάφορες
        συνθήκες, π.χ. με αντισκωριακή προστασία, ανθεκτικό στους κραδασμούς
    dust_container_type:
      name: Τύπος δοχείου σκόνης
      description: Προσδιορίζει τον τύπο του συστήματος συλλογής σκόνης σε ηλεκτρικές
        σκούπες και συσκευές, π.χ. χωρίς σακούλα, με σακούλα σκόνης
    dust_mask_type:
      name: Τύπος μάσκας σκόνης
      description: Καθορίζει τον τύπο σχεδίασης των προστατευτικών μασκών σκόνης,
        όπως κυπελλοειδής ή επίπεδη αναδιπλούμενη
    dvi_connection_type:
      name: Τύπος σύνδεσης DVI
      description: Προσδιορίζει τον συγκεκριμένο συνδετήρα DVI και τη μορφή σύνδεσης
        που υποστηρίζεται (π.χ., DVI-D single-link, DVI-I dual-link, Mini-DVI).
    dye_form:
      name: Μορφή βαφής
      description: Περιγράφει τη φυσική κατάσταση των βαφών χειροτεχνίας, όπως σε
        μορφή τζελ ή σκόνης
    dynamic_level:
      name: Δυναμικό επίπεδο
      description: Ταξινομεί τις μπάλες ρακέτας και σκουός με βάση την ταχύτητα και
        την αναπήδηση, π.χ. πράσινη κουκκίδα, κόκκινη κουκκίδα
    dynamics_processing_function:
      name: Λειτουργία επεξεργασίας δυναμικής
      description: Προσδιορίζει τις κύριες εργασίες δυναμικής που εκτελεί η μονάδα
        (π.χ., συμπιεστής, περιοριστής, πύλη θορύβου, de-esser).
    e_book_formats_supported:
      name: Υποστηριζόμενες μορφές ηλεκτρονικών βιβλίων
      description: Προσδιορίζει το εύρος των μορφών ηλεκτρονικών βιβλίων που είναι
        συμβατές με τη συσκευή, όπως PDF ή EPUB
    e_book_reader_part_location:
      name: Θέση εξαρτήματος αναγνώστη ηλεκτρονικών βιβλίων
      description: Καθορίζει πού στη συσκευή είναι εγκατεστημένο ή βρίσκεται το εξάρτημα.
    e_cigarette/vaporizer_style:
      name: Τύπος ηλεκτρονικού τσιγάρου/ατμιστή
      description: Ταξινομεί τα ηλεκτρονικά τσιγάρα και τους ατμιστές με βάση τον
        παράγοντα μορφής τους, π.χ. μιας χρήσης, στυλό
    e_liquid_flavor:
      name: Γεύση υγρών για ατμιστή
      description: Καθορίζει τη γεύση των υγρών για ατμιστή που προορίζονται για ηλεκτρονικά
        τσιγάρα και ατμιστές, π.χ. καφές, φράουλα.
    e_liquid_variety:
      name: Ποικιλία υγρών για ατμιστή
      description: Διακρίνει μεταξύ διαφορετικών επιλογών σε υγρά για ατμιστή, π.χ.
        κοντό γέμισμα, νικοτίνη σε σταγόνες
    e_reader_display_technology:
      name: Τεχνολογία οθόνης αναγνώστη ηλεκτρονικών βιβλίων
      description: Προσδιορίζει τον τύπο τεχνολογίας οθόνης που χρησιμοποιείται στους
        αναγνώστες ηλεκτρονικών βιβλίων, π.χ. LCD ή e-ink.
    ear_care_application_method:
      name: Μέθοδος εφαρμογής φροντίδας αυτιών
      description: Καθορίζει τη μέθοδο εφαρμογής για είδη φροντίδας αυτιών, όπως ακροφύσιο
        ή σταγονόμετρο
    ear_dryer_technology:
      name: Τεχνολογία στεγνωτήρα αυτιών
      description: Προσδιορίζει τον πρωτεύοντα μηχανισμό στεγνώματος που χρησιμοποιεί
        το προϊόν.
    ear_orientation:
      name: Προσανατολισμός αυτιού
      description: Καθορίζει εάν το ακουστικό έχει σχεδιαστεί για το αριστερό αυτί,
        το δεξί αυτί ή μπορεί να φορεθεί σε οποιοδήποτε.
    ear_pick_tip_style:
      name: Στυλ άκρης εργαλείου καθαρισμού αυτιών
      description: Καθορίζει το σχήμα ή τον σχεδιασμό του άκρου εργασίας που αφαιρεί
        το κερί αυτιών.
    ear_side:
      name: Πλευρά αυτιού
      description: Καθορίζει αν το βοήθημα προορίζεται για το αριστερό αυτί, το δεξί
        αυτί ή για χρήση ως αμφίπλευρο ζεύγος.
    ear_tip_size:
      name: Μέγεθος άκρου ακουστικού
      description: Παρέχει τη γενική ετικέτα μεγέθους που χρησιμοποιείται συνήθως
        για άκρα ενδοωτιαίων όταν δεν παρέχονται ακριβή μεγέθη σε χιλιοστά.
    ear_tip_style:
      name: Στυλ άκρου ακουστικού
      description: Καθορίζει το γεωμετρικό σχήμα του άκρου ακουστικού που επηρεάζει
        την εφαρμογή και την ακουστική σφράγιση.
    earphone_features:
      name: Χαρακτηριστικά ακουστικών
      description: Επισημαίνει μοναδικά χαρακτηριστικά στα ακουστικά, όπως ενσωματωμένο
        μικρόφωνο ή έλεγχο έντασης
    earplug_cord_style:
      name: Στυλ κορδονιού ωτασπίδων
      description: Υποδεικνύει εάν οι ωτασπίδες είναι συνδεδεμένες με κορδόνι, που
        βοηθά στην πρόληψη απώλειας και διευκολύνει την αφαίρεση.
    earplug_shape:
      name: Σχήμα ωτασπίδων
      description: Περιγράφει το φυσικό προφίλ της ωτασπίδας, επηρεάζοντας την άνεση
        και την εφαρμογή σε διαφορετικούς ακουστικούς πόρους.
    earplug_type:
      name: Τύπος ωτασπίδων
      description: Κατατάσσει το στυλ κατασκευής των ωτασπίδων που διανέμονται (π.χ.,
        αφρός, χυτευτές, φιλτραρισμένες).
    earplug_use:
      name: Χρήση ωτοασπίδας
      description: Καθορίζει τη συγκεκριμένη δραστηριότητα ή τον σκοπό των ωτοασπίδων,
        όπως το κολύμπι ή ο ύπνος
    earring_design:
      name: Σχέδιο σε σκουλαρίκι
      description: Περιγράφει το στυλ ή τη δομή σε σκουλαρίκια, όπως σκουλαρίκια κρίκοι
        ή καρφωτά
    edge_style:
      name: Στυλ άκρης
      description: Καθορίζει το σχήμα των άκρων σε αντικείμενα όπως πάγκοι, π.χ. καμπυλωτή,
        λοξευμένη άκρη
    edge_type:
      name: Τύπος άκρης
      description: Προσδιορίζει το στυλ της άκρης σε εργαλεία ή σκεύη, όπως μικροοδοντωτή
        ή με εγκοπές
    education_level:
      name: Επίπεδο εκπαίδευσης
      description: Καθορίζει το στάδιο εκπαίδευσης στο οποίο σχεδιάζεται το λογισμικό,
        όπως επίπεδο πρωτοβάθμιας εκπαίδευσης ή μεταπτυχιακών σπουδών
    effects_processor_form_factor:
      name: Μορφή επεξεργαστή εφέ
      description: Περιγράφει τη φυσική μορφή ή μορφή παράδοσης του επεξεργαστή.
    egg_decorating_items_included:
      name: Περιλαμβάνονται είδη διακόσμησης αυγών
      description: Καθορίζει τα αξεσουάρ που παρέχονται στα κιτ διακόσμησης αυγών,
        π.χ. ταμπλέτες βαφής, εργαλεία βυθίσματος αυγών
    egg_turning:
      name: Περιστροφή αυγών
      description: Περιγράφει τη μέθοδο περιστροφής των αυγών σε εκκολαπτικές μηχανές,
        όπως αυτόματη ή χειροκίνητη μέθοδος
    electric_scooter_motor_type:
      name: Τύπος μοτέρ ηλεκτρικού σκούτερ
      description: Καθορίζει τον τύπο και τη διαμόρφωση των κινητήρων σκούτερ, όπως
        brushed DC ή brushless dc
    electrode_connector_type:
      name: Τύπος συνδέσμου ηλεκτροδίου
      description: Περιγράφει τη φυσική διεπαφή που χρησιμοποιείται για την προσάρτηση
        ηλεκτροδίων ή επιθεμάτων.
    electronic_drum_components:
      name: Εξαρτήματα ηλεκτρονικού τυμπάνου
      description: Καθορίζει τα στοιχεία ενός σετ ηλεκτρονικού τυμπάνου, όπως η μονάδα
        τυμπάνου ή τα μαξιλαράκια τυμπάνου
    electronic_game_genre:
      name: Είδος ηλεκτρονικού παιχνιδιού
      description: Προσδιορίζει την κατηγορία ενός ηλεκτρονικού παιχνιδιού, όπως παιχνίδι
        γυμναστικής ή παζλ
    electrotherapy_modality:
      name: Μέθοδος ηλεκτροθεραπείας
      description: Καθορίζει τους τύπους τεχνολογιών διέγερσης που υποστηρίζει η συσκευή
        (π.χ., TENS, EMS, IFC).
    embellishment/trim_material:
      name: Υλικό διακόσμησης/τρέσας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για διακοσμητικές λεπτομέρειες
        ή φινιρίσματα, όπως πούλιες ή πέρλες
    embellishments:
      name: Διακοσμήσεις
      description: Προσδιορίζει τα προστιθέμενα διακοσμητικά στοιχεία σε ένα προϊόν,
        όπως πούλιες ή κουμπιά
    embossing_project_type:
      name: Τύπος έργου ανάγλυφης εκτύπωσης
      description: Προσδιορίζει τον τύπο του έργου ανάγλυφης εκτύπωσης, όπως η δημιουργία
        λευκώματος ή η κατασκευή καρτών
    embouchure_hole_shape:
      name: Σχήμα οπής επιστομίου
      description: Περιγράφει το σχήμα της οπής στο επιστόμιο του φλάουτου, όπως στρογγυλό
        ή οβάλ
    emergency/safety_sign_design:
      name: Σχεδιασμός πινακίδας έκτακτης ανάγκης/ασφαλείας
      description: Προσδιορίζει τον τύπο του μηνύματος ασφαλείας ή έκτακτης ανάγκης
        σε μια πινακίδα, όπως «έξοδος κινδύνου» ή «προσοχή σκύλος φύλακας»
    emergency_items_included:
      name: Περιλαμβάνονται είδη έκτακτης ανάγκης
      description: Καθορίζει είδη που περιλαμβάνονται στα κιτ έκτακτης ανάγκης, όπως
        ραδιόφωνο ή μπαταρίες
    enclosure_type:
      name: Τύπος περιβλήματος
      description: Καθορίζει τον τύπο περιβλήματος ή καλύμματος για τρισδιάστατους
        εκτυπωτές, όπως σε ανοιχτό πλαίσιο ή περίβλημα DIY
    end_design:
      name: Σχεδιασμός άκρου
      description: Καθορίζει τον αριθμό των λειτουργικών άκρων και εάν είναι αντικαταστάσιμα
        ή εναλλάξιμα.
    enema_device_type:
      name: Τύπος συσκευής κλύσματος
      description: Κατατάσσει τον πρωτεύοντα σχεδιασμό ή το σύστημα παράδοσης του
        προϊόντος.
    enema_nozzle_type:
      name: Τύπος ακροφυσίου κλύσματος
      description: Καθορίζει το στυλ ή το υλικό του ακροφυσίου ή της άκρης που παρέχεται
        με το κιτ (π.χ., λεπτή άκρη, παιδιατρική άκρη, ακροφύσιο ανοξείδωτου χάλυβα).
    energy_efficiency_class:
      name: Τάξη ενεργειακής απόδοσης
      description: Καθορίζει τη βαθμολογία ενεργειακής απόδοσης ενός προϊόντος, π.χ.
        A+++
    energy_efficiency_class_hdr:
      name: Τάξη ενεργειακής απόδοσης (HDR)
      description: Καθορίζει την ενεργειακή απόδοση συσκευών με δυνατότητα HDR, συνήθως
        τηλεοράσεων. πχ Α+++
    energy_efficiency_class_sdr:
      name: Τάξη ενεργειακής απόδοσης (SDR)
      description: Καθορίζει την ενεργειακή απόδοση συσκευών με δυνατότητα SDR, συνήθως
        τηλεοράσεων. πχ Α+++
    engine_design:
      name: Σχεδιασμός κινητήρα
      description: Περιγράφει τη διαμόρφωση του κινητήρα ενός οχήματος, π.χ. δίχρονος
    engine_purpose:
      name: Σκοπός κινητήρα
      description: Προσδιορίζει την προβλεπόμενη χρήση ενός μικρού κινητήρα, όπως
        χλοοκοπτικό ή αλυσοπρίονο
    engine_type:
      name: Τύπος κινητήρα
      description: Προσδιορίζει το είδος του κινητήρα σε ένα όχημα ή μέρος, όπως ηλεκτρικό
        ή ντίζελ
    engraving:
      name: Χάραξη
      description: Λεπτομερείς πληροφορίες για τον τύπο χάραξης σε ένα προϊόν, όπως
        εξατομικευμένο κείμενο ή χάραξη λογότυπου
    entry_orientation:
      name: Προσανατολισμός εισόδου
      description: Περιγράφει την κατεύθυνση εισαγωγής κερμάτων στον μηχανισμό (π.χ.,
        μπροστά, πάνω, πλάι, κάτω).
    envelope_features:
      name: Χαρακτηριστικά φακέλου
      description: Περιγράφει ιδιαίτερα χαρακτηριστικά φακέλων, όπως κλείσιμο με κούμπωμα
        ή επένδυση
    envelope_seal_design:
      name: Σχέδιο σφραγίδας φακέλου
      description: Περιγράφει την αισθητική ή το στυλ των σφραγίδων φακέλων, όπως
        φλοράλ ή μονόγραμμα
    equalizer_type:
      name: Τύπος ισοσταθμιστή
      description: Ταξινομεί την τοπολογία ισοστάθμισης ή το στυλ επεξεργασίας που
        παρέχεται από τη μονάδα.
    equipment_operation:
      name: Λειτουργία εξοπλισμού
      description: Περιγράφει τον τρόπο λειτουργίας ιατρικού εξοπλισμού, όπως χειροκίνητος
        ή ηλεκτροκίνητος τρόπος
    era:
      name: Ιστορική περίοδος
      description: Χρησιμοποιείται για την κατηγοριοποίηση συλλεκτικών αντικειμένων
        ή αντίκες με βάση την ιστορική τους περίοδο, όπως Άγρια δύση ή Β' Παγκόσμιος
        Πόλεμος
    error_correction_type:
      name: Τύπος διόρθωσης σφαλμάτων
      description: Υποδεικνύει εάν η μονάδα μνήμης περιλαμβάνει δυνατότητα διόρθωσης
        σφαλμάτων και, αν ναι, τη συγκεκριμένη τεχνολογία ECC ή το στυλ αποθήκευσης
        που χρησιμοποιείται.
    esrb_rating:
      name: Αξιολόγηση ESRB
      description: Προσδιορίζει την ηλικιακή καταλληλότητα βιντεοπαιχνιδιών, όπως
        E (Για όλους) ή T (Για εφήβους)
    ethernet_cable_category:
      name: Κατηγορία καλωδίου ethernet
      description: Υποδεικνύει τη βαθμολογία κατηγορίας TIA/EIA των καλωδίων ethernet
        συνεστραμμένου ζεύγους, καθορίζοντας το εύρος ζώνης και την απόδοση.
    ethernet_lan_interface_type:
      name: Τύπος διασύνδεσης LAN Ethernet
      description: Καθορίζει τον τύπο σύνδεσης Ethernet που υποστηρίζει ένα προϊόν,
        όπως LAN ή γρήγορη
    ev_battery_features:
      name: Χαρακτηριστικά μπαταρίας EV
      description: Επισημαίνει χαρακτηριστικά των μπαταριών EV, όπως μεγάλη διάρκεια
        ζωής ή έξυπνο σύστημα διαχείρισης μπαταριών
    ev_battery_type:
      name: Τύπος μπαταρίας EV
      description: Προσδιορίζει τον τύπο της μπαταρίας που χρησιμοποιείται σε ηλεκτρικά
        οχήματα, όπως ιόντων λιθίου ή μολύβδου-οξέος
    ev_connector/adapter_type:
      name: Τύπος συνδετήρα/προσαρμογέα EV
      description: Προσδιορίζει τον τύπο συνδετήρα ή προσαρμογέα για ηλεκτρικά οχήματα,
        όπως CCS ή Tesla
    ev_conversion_kit_components:
      name: Εξαρτήματα κιτ μετατροπής EV
      description: Προσδιορίζει τα εξαρτήματα που περιλαμβάνονται σε ένα κιτ μετατροπής
        EV, όπως κινητήρα ή μπαταρία
    evaporation_technology:
      name: Τεχνολογία εξάτμισης
      description: Καθορίζει το σύστημα εξάτμισης σε συσκευές ελέγχου κλίματος, όπως
        φυσικό σύστημα ή σύστημα υπερήχων
    event_type:
      name: Τύπος εκδήλωσης
      description: Ταξινομεί τη φύση μιας εκδήλωσης, όπως συναυλία, σεμινάριο ή φεστιβάλ
    exercise_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός γυμναστικής
      description: Προσδιορίζει τα συγκεκριμένα αντικείμενα άσκησης που περιλαμβάνονται
        σε ένα σετ, όπως στρώμα γιόγκα ή αλτήρες
    exercise_equipment_material:
      name: Υλικό εξοπλισμού γυμναστικής
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε εξοπλισμό γυμναστικής,
        όπως χάλυβας ή καουτσούκ
    exercise_machine_board_function:
      name: Λειτουργία πλακέτας μηχανήματος άσκησης
      description: Περιγράφει την κύρια λειτουργία ή θέση της πλακέτας εντός του μηχανήματος
        (π.χ., έλεγχος κινητήρα, οθόνη).
    exercise_machine_features:
      name: Χαρακτηριστικά μηχανήματος γυμναστικής
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά του εξοπλισμού άσκησης,
        όπως ρυθμιζόμενη ταχύτητα ή ενσωματωμένη οθόνη
    exercise_mat_material:
      name: Υλικό που χρησιμοποιείται στο χαλάκι γυμναστικής
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στα χαλάκια γυμναστικής,
        όπως PVC ή φελλός
    exfoliating_agent_type:
      name: Τύπος απολεπιστικού παράγοντα
      description: Προσδιορίζει το πρωτεύον λειαντικό ή χημικό απολεπιστικό που χρησιμοποιείται.
    exfoliation_level:
      name: Επίπεδο απολέπισης
      description: Υποδεικνύει πόσο απαλή ή σταθερή είναι η απολεπιστική δράση του
        σφουγγαριού.
    exfoliation_method:
      name: Μέθοδος απολέπισης
      description: Υποδεικνύει εάν και πώς το καθαριστικό απολεπίζει το δέρμα (π.χ.,
        φυσική, χημική, ένζυμα).
    expansion_slots:
      name: Υποδοχές επέκτασης
      description: Καθορίζει υποδοχές για την προσθήκη υλικού σε υπολογιστές ή διακομιστές,
        π.χ. PCIe, M.2
    exposure_control:
      name: Έλεγχος έκθεσης
      description: Καθορίζει τη μέθοδο προσαρμογής της ποσότητας φωτός σε μια φωτογραφία,
        π.χ. προτεραιότητα ταχύτητας κλείστρου, προτεραιότητα διαφράγματος
    extended_saxophone_range:
      name: Εκτεταμένο εύρος σαξοφώνου
      description: Καθορίζει το εκτεταμένο εύρος νότων ενός σαξόφωνου, όπως το κλειδί
        υψηλού F# ή το κλειδί χαμηλού Λα
    external_antenna_connector_type:
      name: Τύπος συνδέσμου εξωτερικής κεραίας
      description: Καθορίζει τον φυσικό σύνδεσμο που χρησιμοποιείται για την προσάρτηση
        εξωτερικών κεραιών.
    external_defibrillator_features:
      name: Χαρακτηριστικά εξωτερικού απινιδωτή
      description: Επισημαίνει βασικά χαρακτηριστικά των ιατρικών απινιδωτών, όπως
        η παιδιατρική λειτουργία ή η εμφάνιση ΗΚΓ στην οθόνη
    extinguisher_rating:
      name: Αξιολόγηση πυροσβεστήρα
      description: Υποδεικνύει τη βαθμολογία των πυροσβεστήρων, π.χ. Κατηγορία Α,
        Κατηγορία Β
    extinguishing_agent_type:
      name: Τύπος πυροσβεστικού μέσου
      description: Καθορίζει τον τύπο του πυροσβεστικού υλικού σε προϊόντα πυρασφάλειας,
        όπως νερό ή αφρός
    extraction_method:
      name: Μέθοδος εκχύλισης
      description: Προσδιορίζει την τεχνική που χρησιμοποιείται για την εκχύλιση κανναβινοειδών
        από το φυτικό υλικό κάνναβης.
    extraction_technology:
      name: Τεχνολογία εξαγωγής
      description: Περιγράφει τον πρωτεύοντα μηχανισμό που χρησιμοποιεί το προϊόν
        για την εξαγωγή ακαθαρσιών.
    extraction_type:
      name: Τύπος απορρόφησης
      description: Καθορίζει τη μέθοδο απομάκρυνσης του αέρα στους απορροφητήρες,
        όπως χωρίς αγωγούς ή μετατρέψιμους
    extractor_items_included:
      name: Περιλαμβανόμενα στοιχεία εκχυλιστή
      description: Αναφέρει τα διαφορετικά εργαλεία εκχύλισης ή αξεσουάρ που περιλαμβάνονται
        σε ένα σετ.
    extractor_tip_style:
      name: Στυλ άκρου εργαλείου εξαγωγής
      description: Καθορίζει τον σχεδιασμό του άκρου των εργαλείων εξαγωγής, π.χ.
        άκρη τύπου κουταλιού, βελόνας
    eye_care_applicator_type:
      name: Τύπος απλικατέρ περιποίησης ματιών
      description: Καθορίζει το στυλ του ενσωματωμένου απλικατέρ ή του άκρου διανομέα
        που παρέχεται με το προϊόν περιποίησης ματιών.
    eye_condition_treated:
      name: Οφθαλμική πάθηση που αντιμετωπίζεται
      description: Υποδεικνύει το πρωτεύον οφθαλμικό ζήτημα για το οποίο το προϊόν
        είναι σχεδιασμένο να ανακουφίσει ή να θεραπεύσει.
    eye_pillow_shape:
      name: Σχήμα σε μαξιλαράκι ματιού
      description: Καθορίζει τη φυσική μορφή σε μαξιλαράκι ματιού, όπως με περίγραμμα
        ή ορθογώνιο
    eye_shadow_effect:
      name: Εφέ σκιάς ματιών
      description: Καθορίζει την οπτική επίδραση της σκιάς ματιών, π.χ. τύπου smoky,
        γκλίτερ
    eye_shadow_palette_size:
      name: Μέγεθος παλέτας σκιών ματιών
      description: Κατατάσσει τα προϊόντα ανά κοινές μορφές παλέτας για γρήγορη περιήγηση.
    eyebrow_applicator_type:
      name: Τύπος απλικατέρ φρυδιών
      description: Περιγράφει το απλικατέρ ή την άκρη που χρησιμοποιείται για την
        εφαρμογή του προϊόντος φρυδιών.
    eyebrow_enhancer_color:
      name: Χρώμα ενίσχυσης φρυδιών
      description: Καθορίζει το χρώμα των προϊόντων ενίσχυσης φρυδιών, όπως μαύρο
        ή ανοιχτό ξανθό
    eyebrow_stencil_shape:
      name: Σχήμα στένσιλ φρυδιών
      description: Περιγράφει το πρωτεύον σχήμα φρυδιών ή το στυλ καμάρας που το στένσιλ
        προορίζεται να δημιουργήσει.
    eyelash_applicator_design:
      name: Σχέδιο απλικατέρ βλεφαρίδων
      description: Καθορίζει το στυλ των απλικατέρ ψεύτικων βλεφαρίδων, π.χ. ίσιες,
        κυρτές
    eyelash_curl_type:
      name: Τύπος μπούκλας βλεφαρίδων
      description: Καθορίζει την ταξινόμηση καμπυλότητας (π.χ., C-curl, D-curl) των
        ινών βλεφαρίδων.
    eyelash_curler_type:
      name: Τύπος ψαλιδιού βλεφαρίδων
      description: Καθορίζει τον σχεδιασμό ή τον μηχανισμό του ψαλιδιού βλεφαρίδων.
    eyelash_material:
      name: Υλικό για βλεφαρίδες
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται στις ψεύτικες
        βλεφαρίδες, όπως μετάξι ή συνθετικό
    eyelash_remover_formulation:
      name: Σύνθεση αφαιρετικού βλεφαρίδων
      description: Προσδιορίζει τον πρωτεύον τύπο φόρμουλας του αφαιρετικού.
    eyelash_style:
      name: Στυλ βλεφαρίδων
      description: Περιγράφει το συνολικό οπτικό εφέ ή τον σχεδιασμό του σετ βλεφαρίδων
        (π.χ., φυσικό, μάτι γάτας, δραματικό).
    eyelash_type:
      name: Τύπος βλεφαρίδων
      description: Καθορίζει τον τύπο των ψεύτικων βλεφαρίδων, π.χ. τρέσα βλεφαρίδων,
        extension
    eyepiece/adapter_material:
      name: Υλικό προσοφθαλμίου/προσαρμογέα
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε προσοφθάλμιους φακούς
        μικροσκοπίου ή προσαρμογείς, όπως γυαλί ή μέταλλο
    eyewear_compatibility:
      name: Συμβατότητα γυαλιών
      description: Υποδεικνύει τον τύπο γυαλιών για τον οποίο προορίζεται το λουρί.
    eyewear_frame_color:
      name: Χρώμα σκελετού γυαλιών
      description: Προσδιορίζει το χρώμα του σκελετού των γυαλιών, όπως μαύρο ή χρυσό
    eyewear_frame_design:
      name: Σχέδιο σκελετού γυαλιών
      description: Περιγράφει το στυλ των γυαλιών ηλίου, όπως aviator ή cat-eye
    eyewear_frame_material:
      name: Υλικό σκελετού γυαλιών
      description: Καθορίζει τον τύπο υλικού που χρησιμοποιείται για σκελετούς γυαλιών,
        όπως μπαμπού ή ανθρακόνημα
    eyewear_frame_pattern:
      name: Μοτίβο σκελετού γυαλιών
      description: Προσδιορίζει το μοτίβο σε σκελετούς γυαλιών, για παράδειγμα, ριγέ
        ή καρό
    eyewear_frame_shape:
      name: Σχήμα σκελετού γυαλιών
      description: Περιγράφει το σχήμα των γυαλιών, όπως στρογγυλά ή τετράγωνα
    eyewear_hinge_type:
      name: Τύπος μεντεσέ γυαλιών
      description: Περιγράφει τον μηχανισμό μεντεσέ που χρησιμοποιείται στους βραχίονες,
        επηρεάζοντας την ανθεκτικότητα και την ευελιξία.
    eyewear_lens_color:
      name: Χρώμα φακού γυαλιών
      description: Προσδιορίζει το χρώμα του φακού στα γυαλιά, όπως διαφανές ή πορτοκαλί
    eyewear_lens_material:
      name: Υλικό φακών γυαλιών
      description: Καθορίζει τον τύπο υλικού που χρησιμοποιείται για φακούς γυαλιών,
        για παράδειγμα, πλαστικό ή γυαλί υψηλού δείκτη
    eyewear_lens_pattern:
      name: Μοτίβο φακών γυαλιών
      description: Περιγράφει το σχέδιο ή την εκτύπωση σε φακούς γυαλιών, όπως καρδιές
        ή paisley
    eyewear_strap_features:
      name: Χαρακτηριστικά λουριού γυαλιών
      description: Επισημαίνει αξιοσημείωτα λειτουργικά χαρακτηριστικά του λουριού
        ή της αλυσίδας (π.χ., επιπλέουσα, ανακλαστική, γρήγορης απελευθέρωσης).
    eyewear_strap_or_chain_style:
      name: Στυλ λουριού ή αλυσίδας γυαλιών
      description: Καθορίζει το πρωτεύον στυλ κατασκευής ή μορφής του λουριού ή της
        αλυσίδας γυαλιών (π.χ., κορδόνι σχοινιού, μεταλλική αλυσίδα, λουρί νεοπρενίου).
    fabric:
      name: Ύφασμα
      description: Προσδιορίζει τον τύπο υφάσματος που χρησιμοποιείται σε ένα προϊόν,
        για παράδειγμα, βαμβάκι ή τζιν
    fabric_structure:
      name: Δομή υφάσματος
      description: Υποδεικνύει τη δομική σύνθεση του υφάσματος, όπως υφαντό ή μη
    face_area:
      name: Περιοχή προσώπου
      description: Καθορίζει την περιοχή του προσώπου που στοχεύει ένα προϊόν περιποίησης
        δέρματος, όπως τα μάτια ή ο λαιμός
    face_powder_color:
      name: Χρώμα πούδρας προσώπου
      description: Καθορίζει την απόχρωση της πούδρας προσώπου, όπως ροζ χρυσό ή βαθύ
        καφέ
    face_powder_type:
      name: Τύπος πούδρας προσώπου
      description: Προσδιορίζει το είδος της πούδρας προσώπου, όπως πούδρα για φινίρισμα
        ή χαλαρή πούδρα
    faceplate_design:
      name: Σχέδιο πρόσοψης
      description: Προσδιορίζει τον τύπο της πρόσοψης στα ηλεκτρονικά του οχήματος,
        όπως αποσπώμενη ή σταθερή
    facial_cleansing_kit_items_included:
      name: Περιλαμβανόμενα αντικείμενα κιτ καθαρισμού προσώπου
      description: Αναφέρει τα συγκεκριμένα προϊόντα ή εργαλεία που περιέχονται στο
        κιτ καθαρισμού προσώπου (π.χ., καθαριστικό, τόνερ, ορός, βούρτσα, τσαντάκι
        ταξιδίου).
    facial_steamer_features:
      name: Χαρακτηριστικά ατμοποιητή προσώπου
      description: Αναφέρει βασικές ενσωματωμένες λειτουργίες που ενισχύουν τη θεραπεία
        με ατμό.
    facility_sign_design:
      name: Σχεδιασμός πινακίδας εγκατάστασης
      description: Περιγράφει τη συγκεκριμένη περιοχή ή χώρο όπου προορίζεται η πινακίδα,
        όπως για κουζίνα ή γραφείο
    fader_type:
      name: Τύπος fader
      description: Προσδιορίζει το φυσικό στυλ των fader καναλιών στον μίκτη.
    false_eyelash_adhesive_formulation:
      name: Σύνθεση κόλλας ψεύτικων βλεφαρίδων
      description: Καθορίζει την πρωτεύουσα χημική σύνθεση της κόλλας.
    false_nail_adhesive_type:
      name: Τύπος κόλλας ψεύτικων νυχιών
      description: Προσδιορίζει το είδος της επιλογής κόλλας που παρέχεται ή απαιτείται
        για τα νύχια (π.χ., κόλλα, ταμπ, και τα δύο, κανένα).
    false_nail_application_method:
      name: Μέθοδος εφαρμογής ψεύτικων νυχιών
      description: Προσδιορίζει τον τρόπο με τον οποίο εφαρμόζονται τα ψεύτικα νύχια,
        όπως με κόλλα ή με πίεση
    fastener_finish:
      name: Φινίρισμα κλειδώματος
      description: Περιγράφει την επιφανειακή επίστρωση ενός εργαλείου, όπως ο ορείχαλκος
        ή το χρώμιο
    fastener_material:
      name: Υλικό κλειδώματος
      description: Καθορίζει τον τύπο υλικού που χρησιμοποιείται σε κλειδώματα, π.χ.
        ορείχαλκος, ανοξείδωτο ατσάλι.
    fastener_type:
      name: Τύπος κλειδώματος
      description: Καθορίζει τον τύπο μηχανισμού κλειδώματος που χρησιμοποιείται,
        όπως μαγνητικός.
    fat_content:
      name: Περιεκτικότητα σε λιπαρά
      description: Καθορίζει την ποσότητα λιπαρών στα τρόφιμα και τα ποτά, π.χ. πλήρων
        λιπαρών, χαμηλής περιεκτικότητας σε λιπαρά
    faucet_thread:
      name: Σπείρωμα της βρύσης
      description: Καθορίζει τον τύπο της σύνδεσης σπειρώματος της βρύσης, όπως διπλή
        ή θηλυκή
    features:
      name: Χαρακτηριστικά
      description: Περιγράφει πρόσθετες ιδιότητες ή χαρακτηριστικά ενός προϊόντος,
        όπως ελαφρύ ή αναδιπλούμενο
    feed_system:
      name: Σύστημα τροφοδοσίας
      description: Περιγράφει πώς τροφοδοτείται το χαρτί σε μια συσκευή, όπως αυτόματα
        ή χειροκίνητα
    feet_type:
      name: Τύπος ποδιών
      description: Καθορίζει τον τύπο των ποδιών σε ηλεκτρονικά αξεσουάρ, συνήθως
        σε ράβδους selfie, π.χ. αναδιπλούμενα
    felt_tip_design:
      name: Σχεδιασμός μύτης μαρκαδόρου
      description: Περιγράφει το πάχος της μύτης του μαρκαδόρου, όπως μεσαία ή λεπτή
    feminine_sanitary_supply_features:
      name: Χαρακτηριστικά προϊόντων γυναικείας υγιεινής
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά προϊόντων γυναικείας υγιεινής,
        π.χ. σχεδιασμός που αναπνέει, ταχεία απορρόφηση
    fencing_components:
      name: Στοιχεία συστήματος περίφραξης
      description: Προσδιορίζει τα μέρη ενός συστήματος περίφραξης, όπως δοκός ή πάνελ
    fertility_metrics_measured:
      name: Μετρούμενες μετρικές γονιμότητας
      description: Απαριθμεί τις βιολογικές μετρικές ή παραμέτρους που παρέχει το
        προϊόν στον χρήστη.
    fiber_art_project_type:
      name: Τύπος έργου τέχνης από ίνες
      description: Κατηγοριοποιεί την τέχνη από ίνες, όπως κέντημα ή μακραμέ
    fiber_optic_mode:
      name: Λειτουργία οπτικών ινών
      description: Καθορίζει εάν ένα εξάρτημα οπτικής ίνας έχει σχεδιαστεί για μονοτροπική
        ή πολυτροπική οπτική ίνα.
    field_flatness:
      name: Επιπεδότητα πεδίου
      description: Υποδεικνύει την επίπεδη απεικόνιση του πεδίου στους φακούς μικροσκοπίου,
        π.χ., υπερ-επίπεδος, ημι-επίπεδος
    filament_type:
      name: Τύπος νήματος
      description: Προσδιορίζει τον τύπο του νήματος που χρησιμοποιείται στην τρισδιάστατη
        εκτύπωση, όπως ρητίνη ή κατάλληλο για τρόφιμα
    file_format_type:
      name: Τύπος μορφής αρχείου
      description: Καθορίζει τη μορφή των ψηφιακών αρχείων, π.χ. GIF, PDF
    file_shape:
      name: Σχήμα λιμαρίσματος
      description: Σχήμα λιμαρίσματος, Περιγράφει το σχήμα λιμαρίσματος στα πόδια,
        όπως με περίγραμμα ή οβάλ
    filler_material:
      name: Υλικό γεμίσματος
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται για το γέμισμα
        ενός προϊόντος, συνήθως σε μαξιλάρια ή μαξιλαράκια, π.χ. αφρός μνήμης, φτερά
    filler_support:
      name: Υποστήριξη πλήρωσης
      description: Καθορίζει το επίπεδο σκληρότητας ή το στυλ του εσωτερικού ενός
        μαξιλαριού, όπως μαλακό μαξιλάρι ή αφρός μνήμης.
    filler_type:
      name: Τύπος πλήρωσης
      description: Καθορίζει τον τύπο πλήρωσης που χρησιμοποιείται στη συντήρηση του
        οχήματος, όπως υαλοβάμβακας ή ελαφρύς τύπος
    filling/padding_project_type:
      name: Τύπος έργου πλήρωσης/γεμίσματος
      description: Καθορίζει την προβλεπόμενη χρήση του υλικού πλήρωσης ή επένδυσης,
        π.χ. κατασκευή λούτρινων παιχνιδιών
    film_application_method:
      name: Μέθοδος εφαρμογής ταινίας
      description: Καθορίζει τον τρόπο εφαρμογής των ταινιών παραθύρων, π.χ. στατική
        προσκόλληση, αυτοκόλλητη εφαρμογή
    film_format:
      name: Μορφή φιλμ
      description: Καθορίζει τον τύπο φιλμ που χρησιμοποιείται σε κάμερες, όπως 35mm
        ή Instax mini
    film_type:
      name: Τύπος φιλμ
      description: Προσδιορίζει το μέγεθος και τη μορφή του φιλμ που χρησιμοποιείται
        σε κάμερες, όπως 35 mm ή 120 mm
    filter_form_factor:
      name: Μορφή φίλτρου
      description: Περιγράφει το φυσικό στυλ της μονάδας φίλτρου για ελέγχους συμβατότητας
        (π.χ., κασέτα, φίλτρο ανεμιστήρα, κάψουλα, δίσκος, σετ φίλτρων).
    filter_installation_type:
      name: Τύπος εγκατάστασης φίλτρου
      description: Καθορίζει το φυσικό στυλ και τη μέθοδο εγκατάστασης του φίλτρου
        DSL.
    filter_material:
      name: Υλικό φίλτρου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στα φίλτρα, συνήθως
        για καφέ. πχ χαρτί, κάνναβη
    filter_slope:
      name: Κλίση φίλτρου
      description: Καθορίζει τον ρυθμό εξασθένησης των φίλτρων του crossover, εκφρασμένο
        σε dB ανά οκτάβα.
    filter_topology:
      name: Τοπολογία φίλτρου
      description: Καθορίζει την οικογένεια απόκρισης του φίλτρου, που καθορίζει το
        σχήμα απόκρισης συχνότητας και τα χαρακτηριστικά φάσης.
    filter_type:
      name: Τύπος φίλτρου
      description: Διακρίνει μεταξύ φίλτρων, συνήθως για ενυδρεία. πχ μηχανικό, χημικό
        φίλτρο
    filtering_modes:
      name: Τρόποι φιλτραρίσματος
      description: Καθορίζει τους τρόπους λειτουργίας των ανιχνευτών ραντάρ ή ταχύτητας,
        π.χ. λειτουργία αυτοκινητόδρομου, κλείδωμα GPS
    filtration_class:
      name: Κατηγορία φιλτραρίσματος
      description: Ταξινομεί το επίπεδο φιλτραρίσματος των εξαρτημάτων αναπνευστήρα,
        όπως FFP1 ή B3
    filtration_technology:
      name: Τεχνολογία φιλτραρίσματος
      description: Προσδιορίζει την τεχνολογία ή το στάδιο που χρησιμοποιείται από
        το φίλτρο για την αφαίρεση αερομεταφερόμενων ρύπων που παράγονται κατά την
        εκτύπωση.
    fin_material:
      name: Υλικό πτερυγίων
      description: Καθορίζει τον τύπο υλικού στα πτερύγια κατάδυσης ή κολύμβησης με
        αναπνευστήρα, όπως πλαστικό ή καουτσούκ
    fin_pocket_type:
      name: Τύπος θήκης για πτερύγια
      description: Καθορίζει τον σχεδιασμό της θήκης ποδιού στα πτερύγια κατάδυσης,
        π.χ. κλειστού τύπου, ανοιχτής φτέρνας
    fin_profile:
      name: Προφίλ πτερυγίου
      description: Ταξινομεί τις σανίδες surf με βάση τη διαμόρφωση των πτερυγίων,
        π.χ. πεντάπτερνα, δίδυμα
    fingerboard_color:
      name: Χρώμα ταστιέρας
      description: Καθορίζει το χρώμα της ταστιέρας σε έγχορδα όργανα, π.χ. ασημί,
        λευκό
    fingerboard_material:
      name: Υλικό ταστιέρας
      description: Καθορίζει τον τύπο υλικού που χρησιμοποιείται για την ταστιέρα
        στις κιθάρες, όπως ξύλο έβενου ή συνθετικό
    fingerboard_pattern:
      name: Μοτίβο ταστιέρας
      description: Περιγράφει το σχέδιο ή το μοτίβο στην ταστιέρα μιας κιθάρας, όπως
        φλοράλ ή γεωμετρικό
    fingerprint_capture_method:
      name: Μέθοδος λήψης δακτυλικών αποτυπωμάτων
      description: Καθορίζει τον τύπο της μεθόδου ανίχνευσης δακτυλικών αποτυπωμάτων
        που χρησιμοποιείται, όπως χωρητική ή οπτική
    finial_shape:
      name: Σχήμα τελειώματος
      description: Καθορίζει το σχέδιο ή τη μορφή ενός διακοσμητικού τελειώματος,
        όπως βελανίδι ή μπάλα
    finish:
      name: Φινίρισμα
      description: Περιγράφει την ποιότητα της επιφάνειας ενός προϊόντος, όπως σατέν
        ή ματ
    fire_extinguisher_items_included:
      name: Περιλαμβάνονται είδη πυροσβεστήρα
      description: Καθορίζει τα πρόσθετα είδη που περιλαμβάνονται σε έναν πυροσβεστήρα,
        όπως σωλήνας εκκένωσης ή βραχίονας στερέωσης
    firewire_standard:
      name: Πρότυπο FireWire
      description: Προσδιορίζει την προδιαγραφή IEEE 1394 που υποστηρίζει το καλώδιο,
        που καθορίζει τη μέγιστη ταχύτητα και τη συμβατότητα συσκευών.
    firmness:
      name: Σταθερότητα
      description: Καθορίζει το επίπεδο σταθερότητας σε αντικείμενα όπως έπιπλα ή
        στρώματα, π.χ. εξαιρετικά μαλακό, σταθερό
    first_aid_container_type:
      name: Τύπος δοχείου πρώτων βοηθειών
      description: Καθορίζει το κύριο στυλ δοχείου ή περιβλήματος που παρέχεται με
        το κιτ.
    first_aid_kit_compliance_standard:
      name: Πρότυπο συμμόρφωσης κιτ πρώτων βοηθειών
      description: Καθορίζει οποιοδήποτε επίσημο πρότυπο ή κανονισμό που πληροί το
        κιτ.
    first_aid_kit_components:
      name: Περιεχόμενο του κιτ πρώτων βοηθειών
      description: Αναφέρει λεπτομερώς το περιεχόμενο των κιτ πρώτων βοηθειών, π.χ.
        επίδεσμοι, ψαλίδι
    first_aid_kit_usage:
      name: Χρήση κιτ πρώτων βοηθειών
      description: Καθορίζει την προβλεπόμενη χρήση για κιτ πρώτων βοηθειών, π.χ.
        ταξίδια, αθλήματα
    first_steps/crawlers_style:
      name: Στυλ για τα πρώτα βήματα/παπουτσάκια για μπουσούλημα
      description: Καθορίζει τον τύπο υποδημάτων για βρέφη που μαθαίνουν να περπατούν
        ή να μπουσουλάνε, π.χ. πριν αρχίσουν να περπατούν, παπούτσια με μαλακή σόλα
    fish_type:
      name: Τύπος ψαριού
      description: Βοηθά στην αντιστοίχιση με συγκεκριμένα είδη ψαριών, όπως τροπικά
        ψάρια ή ψάρια κρύου νερού
    fishing_rod_action:
      name: Ενέργεια καλαμιού ψαρέματος
      description: Υποδεικνύει την απόκριση του καλαμιού ψαρέματος, όπως αργή ή εξαιρετικά
        γρήγορη
    fishing_rod_power:
      name: Δύναμη καλαμιού ψαρέματος
      description: Υποδεικνύει την αντοχή του καλαμιού ψαρέματος, π.χ. εξαιρετικά
        ελαφρύ, εξαιρετικά βαρύ
    fishing_wire_material:
      name: Υλικό πετονιάς ψαρέματος
      description: Προσδιορίζει τη σύνθεση της πετονιάς ψαρέματος, όπως νάιλον ή ανοξείδωτο
        ατσάλι
    fit:
      name: Εφαρμογή
      description: Περιγράφει την εφαρμογή ενός ενδύματος, συνήθως το σχήμα του παντελονιού,
        π.χ. τύπου skinny, φαρδύ
    fit_type:
      name: Τύπος εφαρμογής
      description: Περιγράφει τον τύπο εφαρμογής για εξαρτήματα και αξεσουάρ οχήματος,
        όπως προσαρμοσμένο ή γενικό
    fixation_type:
      name: Τύπος στερέωσης
      description: Καθορίζει τον μηχανισμό στερέωσης, συνήθως για βάσεις χριστουγεννιάτικων
        δέντρων, π.χ. καρφί στερέωσης, βίδα στερέωσης
    flag_shape:
      name: Σχήμα σημαίας
      description: Καθορίζει τη γεωμετρική μορφή σημαιών και ανεμοδείκτων, όπως δάκρυ
        ή φλάμπουρο
    flammability_rating_ul_94:
      name: Βαθμολογία ευφλεκτότητας (UL 94)
      description: Δηλώνει την ταξινόμηση επιβραδυντικού φλόγας UL 94 του υλικού μανικιού.
    flare_type:
      name: Τύπος φωτοβολίδας
      description: Προσδιορίζει τον τύπο των φωτοβολίδων έκτακτης ανάγκης, όπως LED
        ή παραδοσιακές
    flash_card_theme:
      name: Θέμα καρτών εκμάθησης
      description: Καθορίζει το θέμα εκμάθησης των καρτών, όπως αλφάβητο ή αριθμοί
    flash_cell_type:
      name: Τύπος κελιού flash
      description: Προσδιορίζει τον αριθμό των bit που αποθηκεύονται ανά κελί flash
        εντός της αρχιτεκτονικής μνήμης (π.χ., SLC, MLC, TLC).
    flash_modes:
      name: Τρόποι λειτουργίας φλας
      description: Προσδιορίζει τις διαφορετικές ρυθμίσεις για το φλας της κάμερας,
        όπως αυτόματη ή χειροκίνητη
    flash_type:
      name: Τύπος φλας
      description: Προσδιορίζει τον τύπο του φλας που χρησιμοποιείται σε κάμερες,
        όπως τύπο δακτυλίου ή macro
    flashing_material:
      name: Υλικό στεγανοποίησης
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στις στεγανοποιήσεις
        οροφής, όπως πλαστικό ή χαλκός
    flat_shoe_style:
      name: Επίπεδο στυλ παπουτσιού
      description: Προσδιορίζει το συγκεκριμένο σχέδιο επίπεδων παπουτσιών, όπως μπαλαρίνες
        ή εσπαντρίγιες
    flatware_material:
      name: Είδη που περιλαμβάνονται σε ένα σερβίτσιο
      description: Προσδιορίζει τη σύνθεση των ειδών που περιλαμβάνονται σε ένα σερβίτσιο,
        όπως ανοξείδωτο ατσάλι ή ασήμι
    flatware_pieces_included:
      name: Περιλαμβάνονται είδη από σερβίτσιο
      description: Καθορίζει τους τύπους σκευών σε σετ σερβίτσιου, όπως μαχαίρι βουτύρου
        ή κουτάλι σούπας
    flavor:
      name: Γεύση
      description: Προσδιορίζει τη γεύση ενός προϊόντος, π.χ. βανίλια, μέντα
    flavor_profile:
      name: Προφίλ γεύσης
      description: Προσδιορίζει τις συγκεκριμένες γευστικές νότες των προϊόντων, συνήθως
        για ζυθοποιία. πχ από καραμέλα, ξηρούς καρπούς
    flexibility_rating:
      name: Αξιολόγηση ευελιξίας
      description: Υποδεικνύει το επίπεδο ευελιξίας των δεστρών snowboard ή χιονοπέδιλων,
        π.χ. 4
    floor_configuration:
      name: Διαμόρφωση δαπέδου
      description: Υποδεικνύει εάν η σκηνή περιλαμβάνει δάπεδο και, αν ναι, τον τύπο
        δαπέδου που παρέχεται.
    floral_wire_design:
      name: Σχέδιο για διακοσμητικές συνθέσεις
      description: Περιγράφει τον τύπο του σύρματος για διακοσμητικές συνθέσεις που
        χρησιμοποιείται στη χειροτεχνία, όπως σύρμα δεσίματος ή σύρμα καλυμμένο με
        ύφασμα
    flour/grain_type:
      name: Τύπος αλευριού/σιτηρού
      description: Καθορίζει τον τύπο σιτηρού ή αλευριού σε ένα προϊόν, π.χ. καλαμπόκι,
        σιτάρι
    flow_rate_type:
      name: Τύπος ταχύτητας ροής
      description: Καθορίζει την ταχύτητα με την οποία διανέμεται το υγρό, συνήθως
        για τα μπιμπερό. πχ μεσαία, αργή
    flower_color:
      name: Χρώμα λουλουδιού
      description: Καθορίζει το χρώμα του λουλουδιού, όπως ροζ ή πολύχρωμο
    flower_pattern:
      name: Μοτίβο λουλουδιού
      description: Περιγράφει το σχέδιο που βρίσκεται στα λουλούδια, π.χ. ριγέ, με
        κουκκίδες
    flue_type:
      name: Τύπος καμινάδας
      description: Προσδιορίζει τον τύπο του συστήματος καμινάδας στα τζάκια, όπως
        ισορροπημένο ή συμβατικό
    fluid_type:
      name: Τύπος υγρού
      description: Καθορίζει το υγρό που απαιτείται για τον εξοπλισμό ειδικών εφέ,
        όπως ξηρό πάγο ή υγρό ομίχλης
    fluoride_content:
      name: Περιεκτικότητα σε φθόριο
      description: Υποδεικνύει την παρουσία και τη σχετική συγκέντρωση φθορίου στο
        στοματικό διάλυμα.
    flush_plate_color:
      name: Χρώμα πλάκας έκπλυσης
      description: Προσδιορίζει το χρώμα της πλάκας έκπλυσης στις δεξαμενές τουαλέτας,
        όπως λευκό ή ασημί
    flush_plate_pattern:
      name: Μοτίβο πλάκας έκπλυσης
      description: Περιγράφει το σχέδιο ή το μοτίβο σε μια πλάκα έκπλυσης τουαλέτας,
        όπως φλοράλ ή καρό
    flush_system:
      name: Σύστημα έκπλυσης
      description: Καθορίζει το σύστημα έκπλυσης που χρησιμοποιείται σε υδραυλικά
        είδη, όπως μονό ή διπλό
    flute_configuration:
      name: Διαμόρφωση φλάουτου
      description: Προσδιορίζει τη συγκεκριμένη ρύθμιση ενός φλάουτου, όπως B footjoint
        ή Inline G
    fm_transmitter_playback_source:
      name: Πηγή αναπαραγωγής πομπού FM
      description: Προσδιορίζει τις επιλογές εισόδου πολυμέσων από τις οποίες μπορεί
        να αναπαράγει η συσκευή, πέρα από το Bluetooth (π.χ., USB stick, κάρτα microSD).
    foam_form:
      name: Μορφή αφρού
      description: Προσδιορίζει το σχήμα ή τον τύπο του προϊόντος αφρού χειροτεχνίας,
        όπως σε μπάλες ή φύλλα
    focus_adjustment:
      name: Ρύθμιση εστίασης
      description: Καθορίζει τον τρόπο με τον οποίο μια κάμερα προσαρμόζει την εστίασή
        της, π.χ. αυτόματη, χειροκίνητη
    focus_device_type:
      name: Τύπος συσκευής εστίασης
      description: Προσδιορίζει τον τύπο της συσκευής εστίασης που χρησιμοποιείται
        στις κάμερες, π.χ. εργαλείο υποστήριξης εστίασης, μανιβέλα εστίασης
    focus_type:
      name: Τύπος εστίασης
      description: Προσδιορίζει τη μέθοδο εστίασης σε κάμερες, όπως TTL ή TTL-CT-SIR
    fold_type:
      name: Τύπος δίπλωσης
      description: Προσδιορίζει το στυλ της δίπλωσης σε χαρτικά προϊόντα, όπως δίπλωση
        Ζ ή δίπλωση σε δύο
    folder/report_cover_material:
      name: Υλικό εξωφύλλου φακέλου/αναφοράς
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για την κατασκευή εξωφύλλων
        φακέλων ή αναφορών, όπως χαρτί ή δέρμα
    folding_mechanism:
      name: Μηχανισμός αναδίπλωσης
      description: Καθορίζει πώς αναδιπλώνεται ένα προϊόν, συνήθως για καροτσάκια.
        π.χ. συμπαγές, αναδίπλωση με το ένα χέρι
    font_style:
      name: Στυλ γραμματοσειράς
      description: Καθορίζει τον τύπο της γραμματοσειράς σε προϊόντα λογισμικού, όπως
        sans serif ή script
    food_bag_material:
      name: Υλικό σακούλας τροφίμων
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στις σακούλες αποθήκευσης
        τροφίμων, όπως χαρτί ή σιλικόνη
    food_dispenser_type:
      name: Τύπος διανομέα τροφίμων
      description: Καθορίζει τον τύπο τροφίμων για τον οποίο έχει σχεδιαστεί ο διανομέας,
        όπως δημητριακά ή ζυμαρικά
    food_product_form:
      name: Μορφή διατροφικού προϊόντος
      description: Καθορίζει τη μορφή με την οποία παρουσιάζεται το διατροφικό προϊόν,
        όπως αποξηραμένο ή κατεψυγμένο
    food_storage_material:
      name: Υλικό αποθήκευσης τροφίμων
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε δοχεία αποθήκευσης
        τροφίμων, όπως γυαλί ή πλαστικό
    food_supplement_form:
      name: Μορφή συμπληρώματος διατροφής
      description: Καθορίζει τη μορφή ενός συμπληρώματος υγείας, όπως υγρό ή δισκία
    foot_arch_type:
      name: Τύπος ποδικής καμάρας
      description: Καθορίζει τον τύπο ποδικής καμάρας που είναι σχεδιασμένο να υποστηρίξει
        το προϊόν.
    foot_side:
      name: Πλευρά ποδιού
      description: Υποδεικνύει αν η επιστραγαλίδα έχει σχεδιαστεί για το αριστερό
        πόδι, το δεξί πόδι ή μπορεί να χρησιμοποιηθεί σε οποιαδήποτε πλευρά.
    footage_type:
      name: Τύπος υλικού βίντεο
      description: Περιγράφει την κατηγορία φωτογραφιών ή υλικού βίντεο, π.χ. κινούμενα
        σχέδια, υφές
    footboard_type:
      name: Τύπος βάσης ποδιού
      description: Καθορίζει το στυλ της βάσης ποδιού σε πεντάλ τυμπάνων, όπως συμπαγής
        ή διάτρητη
    footwear_color:
      name: Χρώμα υποδημάτων
      description: Καθορίζει το κύριο χρώμα υποδήματος, όπως λευκό ή κόκκινο
    footwear_material:
      name: Υλικό υποδημάτων
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στα υποδήματα,
        όπως σουέτ ή καουτσούκ
    footwear_pattern:
      name: Μοτίβο υποδημάτων
      description: Περιγράφει το οπτικό μοτίβο στα υποδήματα, για παράδειγμα, με ρίγες
        ή φύλλα
    force_feedback_type:
      name: Τύπος ανάδρασης δύναμης
      description: Περιγράφει τον μηχανισμό κίνησης που χρησιμοποιείται για τη δημιουργία
        ανάδρασης δύναμης και αντίστασης διεύθυνσης.
    format_supported:
      name: Υποστηριζόμενη μορφή
      description: Καθορίζει τις συμβατές διαστάσεις, συνήθως για άλμπουμ φωτογραφιών.
        π.χ. 12 x 16 ίντσες, 13 x 18 εκ
    formula_level:
      name: Επίπεδο βρεφικού γάλακτος
      description: Καθορίζει την ηλικιακή καταλληλότητα του βρεφικού γάλακτος, π.χ.
        Επίπεδο 1 (για βρέφη 0-6 μηνών)
    formulation_strength:
      name: Ισχύς σύνθεσης
      description: Υποδεικνύει τη συγκριτική ισχύ της φόρμουλας του προϊόντος.
    fossil_type:
      name: Τύπος απολιθώματος
      description: Καθορίζει το είδος του απολιθώματος, όπως δόντια καρχαρία ή οστό
        δεινοσαύρου
    foundation_color:
      name: Χρώμα βάσης
      description: Προσδιορίζει το χρώμα μιας βάσης στρώματος, όπως το μπεζ ή το μαύρο
    foundation_material:
      name: Υλικό βάσης
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται στη βάση του στρώματος,
        όπως το μέταλλο ή το ξύλο
    foundation_pattern:
      name: Μοτίβο βάσης
      description: Περιγράφει το σχέδιο ή το μοτίβο σε βάση στρώματος, όπως chevron
        ή damask
    fragrance:
      name: Άρωμα
      description: Καθορίζει εάν ένα προϊόν έχει άρωμα ή όχι, π.χ. φλοράλ, χωρίς άρωμα
    fragrance_level:
      name: Επίπεδο αρώματος
      description: Καθορίζει την ένταση του αρώματος ενός προϊόντος, π.χ. άοσμο, ελαφρώς
        αρωματισμένο
    frame_color:
      name: Χρώμα πλαισίου
      description: Καθορίζει το χρώμα του πλαισίου ενός προϊόντος, όπως διαφανές ή
        χρυσό
    frame_design:
      name: Σχέδιο πλαισίου
      description: Περιγράφει το στυλ ή το υλικό του πλαισίου ενός προϊόντος, όπως
        μέταλλο ή ξύλο
    frame_material:
      name: Υλικό πλαισίου
      description: Καθορίζει το υλικό που χρησιμοποιείται στο πλαίσιο του προϊόντος,
        όπως ξύλο ή πλαστικό
    frame_pattern:
      name: Μοτίβο πλαισίου
      description: Περιγράφει τον οπτικό σχεδιασμό ή το στυλ του πλαισίου ενός προϊόντος,
        όπως γεωμετρικό ή ριγέ
    frame_style:
      name: Στυλ πλαισίου
      description: Περιγράφει το σχέδιο ή τον τύπο του πλαισίου για έργα τέχνης, όπως
        μοντέρνο ή ρουστίκ
    frequency/radio_bands_supported:
      name: Υποστηριζόμενες ζώνες συχνοτήτων/ραδιοσυχνοτήτων
      description: Υποδεικνύει τις ζώνες ραδιοσυχνότητας με τις οποίες είναι συμβατή
        μια συσκευή, π.χ. AM, UHF
    frequency_type:
      name: Τύπος συχνότητας
      description: Προσδιορίζει τη ρύθμιση συχνότητας σε ανιχνευτές μετάλλων, π.χ.
        μονή, ταυτόχρονη
    frequency_weighting:
      name: Στάθμιση συχνότητας
      description: Περιγράφει την απόκριση συχνότητας ενός ηχομέτρου, όπως A-weighting
    frog_material:
      name: Υλικό βατράχου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στον βάτραχο ενός δοξαριού
        εγχόρδου οργάνου, όπως έβενος ή ασήμι
    fruit_source:
      name: Πηγή φρούτων
      description: Προσδιορίζει εάν τα φρούτα στα ποτά είναι από συμπύκνωμα ή όχι
    fuel_additives:
      name: Πρόσθετα καυσίμων
      description: Προσδιορίζει τον τύπο πρόσθετου σε προϊόντα καυσίμου, όπως αντιπηκτικό
        ή αναστολέας διάβρωσης
    fuel_container_features:
      name: Χαρακτηριστικά δοχείου καυσίμου
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά δεξαμενών καυσίμου, όπως
        στόμιο ανθεκτικό στις διαρροές ή δείκτη καυσίμου
    fuel_grade:
      name: Κατηγορία καυσίμου
      description: Καθορίζει την ποιότητα των προϊόντων καυσίμου, για παράδειγμα,
        Bioheat ή 2-K
    fuel_purity:
      name: Καθαρότητα καυσίμου
      description: Καθορίζει το επίπεδο καθαρότητας του καυσίμου προπανίου, π.χ. HD-5,
        εμπορικό
    fuel_source:
      name: Πηγή καυσίμου
      description: Καθορίζει την πηγή ενέργειας που χρησιμοποιείται, συνήθως για κυψέλες
        καυσίμου. πχ υδρογόνο, προπάνιο
    fuel_supply:
      name: Παροχή καυσίμου
      description: Καθορίζει την πηγή καυσίμου για οχήματα ή κινητήρες, όπως με ντίζελ
        ή υβριδικό
    furniture/fixture_color:
      name: Χρώμα επίπλων/εξαρτήματος
      description: Προσδιορίζει το χρώμα των επίπλων ή εξαρτημάτων, όπως μπεζ ή μαύρο
    furniture/fixture_features:
      name: Χαρακτηριστικά επίπλων/εξαρτήματος
      description: Τονίζει ιδιαίτερα χαρακτηριστικά επίπλων ή εξαρτημάτων, όπως ρυθμιζόμενα
        ράφια ή ενσωματωμένος καθρέφτης
    furniture/fixture_material:
      name: Υλικό επίπλων/εξαρτήματος
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε έπιπλα ή εξαρτήματα,
        όπως ξύλο ή μέταλλο
    furniture/fixture_pattern:
      name: Μοτίβο επίπλων/εξαρτήματος
      description: Προσδιορίζει το οπτικό θέμα στα έπιπλα, όπως ριγέ ή καρό
    game_components:
      name: Στοιχεία παιχνιδιού
      description: Προσδιορίζει τα μέρη που περιλαμβάνονται σε ένα σετ παιχνιδιού,
        όπως ζάρια ή ταμπλό
    game_console_skin_coverage:
      name: Κάλυψη αυτοκόλλητου κονσόλας παιχνιδιών
      description: Υποδεικνύει ποια μέρη της συσκευής καλύπτει το σετ αυτοκόλλητων.
    game_difficulty:
      name: Δυσκολία παιχνιδιού
      description: Περιγράφει το επίπεδο δυσκολίας σε ένα παιχνίδι για πάρτι, όπως
        μεσαίο ή δύσκολο επίπεδο
    game_features:
      name: Χαρακτηριστικά παιχνιδιού
      description: Αναδεικνύει τα ιδιαίτερα χαρακτηριστικά ενός παιχνιδιού, για παράδειγμα,
        μεταφέρεται εύκολα στις μετακινήσεις σας ή με δυνατότητα προσαρμογής
    game_name:
      name: Όνομα παιχνιδιού
      description: Προσδιορίζει το συγκεκριμένο όνομα ενός παιχνιδιού ποτού, όπως
        το Beer pong ή το Kings Cup
    gameplay_skills:
      name: Δεξιότητες παιχνιδιού
      description: Προσδιορίζει τις δεξιότητες που ενισχύονται από ένα παιχνίδι, όπως
        η στρατηγική σκέψη ή η μνήμη
    games_included:
      name: Περιλαμβάνονται παιχνίδια
      description: Εμφανίζει τα παιχνίδια που συνοδεύουν το προϊόν, όπως κάρτες ή
        πούλια
    gaming_enhancement_features:
      name: Χαρακτηριστικά ενίσχυσης παιχνιδιού
      description: Υποδεικνύει τις τεχνολογίες HDMI 2.1 προσανατολισμένες στα παιχνίδια
        που υποστηρίζονται από τον δέκτη.
    garage_door_material:
      name: Υλικό γκαραζόπορτας
      description: Προσδιορίζει το υλικό κατασκευής των γκαραζόπορτων, όπως ατσάλι
        ή ξύλο
    gardening_use:
      name: Χρήση κηπουρικής
      description: Καθορίζει τον σκοπό κηπουρικής ενός προϊόντος, π.χ. επίστρωση,
        διαμόρφωση τοπίου
    garment_steamer_design:
      name: Σχέδιο ατμοκαθαριστή ρούχων
      description: Καθορίζει το στυλ ή τον τύπο ατμοκαθαριστή ρούχων, όπως χειροκίνητος
        ή βούρτσα ατμού
    gases_detected:
      name: Εντοπίστηκαν αέρια
      description: Προσδιορίζει τα συγκεκριμένα αέρια που μπορεί να εντοπίσει ένας
        ανιχνευτής, όπως το μεθάνιο ή το ραδόνιο
    gate_mounting_type:
      name: Τύπος τοποθέτησης φράκτη
      description: Καθορίζει το σημείο εγκατάστασης ενός φράκτη για μωρά ή κατοικίδια,
        όπως τοίχος ή πόρτα
    gauge_type:
      name: Τύπος μετρητή
      description: Καθορίζει το είδος του μετρητή οχήματος, όπως τη στάθμη καυσίμου
        ή τη θερμοκρασία
    gear_material:
      name: Υλικό γραναζιών
      description: Καθορίζει το υλικό που χρησιμοποιείται στην κατασκευή γραναζιών,
        όπως ανθρακόνημα ή τιτάνιο
    gear_ratio:
      name: Αναλογία γραναζιών
      description: Καθορίζει την αναλογία γραναζιών σε μηχανισμούς ψαρέματος, π.χ.
        6:1, 1:1
    gearing_type:
      name: Τύπος γραναζιών
      description: Καθορίζει τον τύπο συστήματος γραναζιών σε προϊόντα ποδηλασίας,
        όπως αλυσίδα ή ζώνη
    gel_strength:
      name: Δύναμη τζελ
      description: Υποδεικνύει τη δύναμη τζελ ή ανθοφορίας των προϊόντων τζελ, π.χ.
        υψηλή ανθοφορία, χαμηλή ανθοφορία
    gemstone_type:
      name: Τύπος πολύτιμου λίθου
      description: Καθορίζει τον κύριο πολύτιμο λίθο που χρησιμοποιείται στο αντικείμενο,
        με βάση την ορυκτή ή υλική κατάταξη του λίθου.
    genre:
      name: Είδος
      description: Ταξινομεί την κατηγορία ή το στυλ των μέσων, όπως τρόμου ή φαντασίας
    geological_era:
      name: Γεωλογική εποχή
      description: Ταξινομεί την ηλικία των συλλεκτικών πετρωμάτων ή απολιθωμάτων,
        όπως το Μεσοζωική ή Καινοζωική
    gift_bag_handle_design:
      name: Σχέδιο λαβής τσάντας δώρου
      description: Περιγράφει το στυλ των λαβών στις τσάντες δώρων, όπως σχοινί ή
        κορδέλα
    gift_set_format:
      name: Μορφή σετ δώρου
      description: Καθορίζει το στυλ παρουσίασης των σετ δώρων, όπως κουτί δώρου ή
        τσάντα δώρου
    gimbal_stabilization_axes:
      name: Άξονες σταθεροποίησης με gimbal
      description: Προσδιορίζει τον αριθμό των αξόνων ηλεκτρονικής ή μηχανικής σταθεροποίησης
        που παρέχονται όταν το selfie stick περιλαμβάνει λειτουργία gimbal.
    gin_variety:
      name: Ποικιλία τζιν
      description: Ταξινομεί τα προϊόντα τζιν κατά τον συγκεκριμένο τύπο τους, π.χ.
        αρωματισμένο, London dry
    glaze_finish:
      name: Φινίρισμα υαλώματος
      description: Υποδεικνύει την υφή και τη γυαλάδα ενός κεραμικού ή αγγειοπλαστικού
        υαλώματος, όπως το σατινέ ή το κρακελέ
    glazing_type:
      name: Τύπος υάλωσης
      description: Προσδιορίζει τον τύπο της υάλωσης του παραθύρου, όπως διπλός ή
        μονός υαλοπίνακας
    glide_style:
      name: Στυλ ολίσθησης
      description: Υποδεικνύει το προβλεπόμενο χαρακτηριστικό ολίσθησης των πατινών
        (π.χ., ταχύτητα, έλεγχος).
    glitter_particle_size:
      name: Μέγεθος σωματιδίων γκλίτερ
      description: Κατηγοριοποιεί το μέγεθος σωματιδίων του γκλίτερ, επηρεάζοντας
        την ένταση της λάμψης, την υφή και την ευκολία εφαρμογής.
    glitter_shape:
      name: Σχήμα γκλίτερ
      description: Καθορίζει το σχήμα του γκλίτερ, όπως καρδιά ή αστέρι
    glucose_measurement_units:
      name: Μονάδες μέτρησης γλυκόζης
      description: Υποδεικνύει σε ποιες μονάδες μέτρησης (mg/dL ή mmol/L) μπορεί η
        συσκευή να εμφανίσει αποτελέσματα.
    glucose_meter_features:
      name: Χαρακτηριστικά μετρητή γλυκόζης
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των μετρητών γλυκόζης, όπως
        φορητό ή με λειτουργία μνήμης
    glue_gun_features:
      name: Χαρακτηριστικά πιστολιού κόλλας
      description: Υπογραμμίζει μοναδικές πτυχές ενός πιστολιού κόλλας, όπως γρήγορη
        θέρμανση ή χαρακτηριστικά ασφαλείας
    glue_gun_operation:
      name: Λειτουργία πιστολιού κόλλας
      description: Προσδιορίζει την πηγή τροφοδοσίας ενός πιστολιού κόλλας, όπως ενσύρματο
        ή ασύρματο
    glue_gun_technology:
      name: Τεχνολογία πιστολιού κόλλας
      description: Καθορίζει τον τύπο της τεχνολογίας που χρησιμοποιείται σε πιστόλι
        κόλλας, π.χ. κρύα, ζεστή
    glue_strength:
      name: Δύναμη κόλλας
      description: Υποδεικνύει την ικανότητα κόλλησης μιας κόλλας, π.χ. ισχυρή, απαλή
    glue_viscosity:
      name: Ιξώδες κόλλας
      description: Περιγράφει το πάχος της κόλλας, επηρεάζοντας τη ροή και τον έλεγχο
        εφαρμογής.
    golf_ball_type:
      name: Τύπος σε μπαλάκια του γκολφ
      description: Καθορίζει τα χαρακτηριστικά απόδοσης σε μπαλάκια του γκολφ, όπως
        απόδοση σε τουρνουά ή μαλακή αίσθηση
    golf_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός γκολφ
      description: Προσδιορίζει τα επιπλέον είδη του γκολφ που περιλαμβάνονται στο
        σετ, όπως εργαλείο αποκατάστασης του γρασιδιού για γήπεδα γκολφ ή θήκη για
        μπαλάκι του γκολφ
    gps_compatible_device:
      name: Συσκευή συμβατή με GPS
      description: Καθορίζει συσκευές που μπορούν να χρησιμοποιούν λογισμικό GPS,
        όπως φορητοί υπολογιστές ή συσκευές αεροπορίας
    gps_device_features:
      name: Χαρακτηριστικά συσκευής GPS
      description: Περιγράφει ειδικές δυνατότητες μιας συσκευής GPS, όπως με τεχνολογία
        AI ή ενσωματωμένη κάμερα ταμπλό
    gps_map_type:
      name: Τύπος χάρτη GPS
      description: Καθορίζει το είδος του χάρτη που χρησιμοποιείται στο λογισμικό
        GPS, όπως τοπογραφικοί ή ναυτικοί χάρτες
    gps_software_focus:
      name: Εστίαση λογισμικού GPS
      description: Προσδιορίζει την κύρια χρήση του λογισμικού GPS, όπως η πλοήγηση
        αυτοκινήτων ή η γεωχωρική ανάλυση
    grading:
      name: Βαθμολόγηση
      description: Υποδεικνύει την ποιότητα ή την κατάσταση των συλλεκτικών καρτών
        συναλλαγών, όπως BCCG ή PSA
    grain:
      name: Kοκκώδης υφή
      description: Υποδεικνύει το επίπεδο κοκκώδους υφής του φιλμ κάμερας, π.χ. υψηλό
        ή λεπτό
    grape_variety:
      name: Ποικιλία σταφυλιού
      description: Προσδιορίζει τον τύπο σταφυλιού που χρησιμοποιείται στην οινοποίηση,
        όπως Cabernet Sauvignon ή Chardonnay
    graphics_card_type:
      name: Τύπος κάρτας γραφικών
      description: Καθορίζει τον τύπο της κάρτας γραφικών σε έναν υπολογιστή, π.χ.
        επαγγελματική, εξειδικευμένη
    graphics_tablet_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ γραφίδας tablet
      description: Προσδιορίζει τα πρόσθετα στοιχεία που περιλαμβάνονται σε μία γραφίδα
        tablet, όπως βάση γραφίδας ή κορδόνι γραφίδας
    graphics_tablet_specialized_features:
      name: Εξειδικευμένα χαρακτηριστικά γραφίδας tablet
      description: Παρέχει λεπτομέρειες για ειδικά χαρακτηριστικά μιας γραφίδας tablet,
        όπως αδιάβροχη κατασκευή ή οπίσθιος φωτισμός LED
    gravel/substrate_material:
      name: Υλικό χαλικιού/υποστρώματος
      description: Καθορίζει τη σύνθεση του χαλικιού ή του υποστρώματος ενυδρείου,
        π.χ. άργιλος, χαλαζίας
    gray_coverage_level:
      name: Επίπεδο κάλυψης γκρίζων
      description: Υποδεικνύει το ποσοστό ή τον βαθμό γκρίζων ή λευκών μαλλιών που
        μπορεί να καλύψει ή να αναμίξει το προϊόν.
    grease_filter_material:
      name: Υλικό φίλτρου λίπους
      description: Καθορίζει το υλικό που χρησιμοποιείται στο φίλτρο λίπους ενός προϊόντος,
        π.χ. μέταλλο, ανοξείδωτο ατσάλι
    grind_size:
      name: Μέγεθος άλεσης
      description: Προσδιορίζει την άλεση του καφέ σε χονδρή ή λεπτή, όπως πολύ χονδρή
        ή λεπτή άλεση
    grip_or_holder_style:
      name: Στυλ λαβής ή βάσης
      description: Προσδιορίζει την κύρια φυσική μορφή του προϊόντος, βοηθώντας τους
        πελάτες να φιλτράρουν γρήγορα για τον προτιμώμενο σχεδιασμό τους.
    grip_texture:
      name: Υφή λαβής
      description: Περιγράφει την επιφανειακή αίσθηση της λαβής ενός προϊόντος, όπως
        λεία ή υφή
    grip_type:
      name: Τύπος λαβής
      description: Καθορίζει το στυλ λαβής στον εξοπλισμό περίφραξης, π.χ. γαλλικό,
        πιστόλι
    grit_type:
      name: Τύπος τραχύτητας
      description: Καθορίζει το επίπεδο τραχύτητας εργαλείων ή οδοντιατρικών προϊόντων,
        όπως τραχύ ή εξαιρετικά λεπτό
    grooming_kit_format:
      name: Μορφή κιτ περιποίησης
      description: Καθορίζει τον τύπο συσκευασίας των κιτ περιποίησης, π.χ. τσάντα
        ή κουτί κιτ
    guitar_fitting/part_type:
      name: Εξάρτημα κιθάρας/τύπος ανταλλακτικού
      description: Καθορίζει τον τύπο του εξαρτήματος ή του ανταλλακτικού κιθάρας,
        όπως προστατευτικό πένας ή κλειδί χορδίσματος
    guitar_size:
      name: Μέγεθος κιθάρας
      description: Καθορίζει το μέγεθος της κιθάρας, όπως το πλήρες μέγεθος ή το μέγεθος
        3/4
    gutter_fitting_type:
      name: Τύπος εξαρτήματος υδρορροής
      description: Προσδιορίζει τον τύπο εξαρτήματος που χρησιμοποιείται σε συστήματα
        υδρορροών, όπως σύνδεσμος σωλήνα εκροής ή τάπα άκρου
    gutter_style:
      name: Στυλ υδρορροής
      description: Καθορίζει τον τύπο υδρορροής, όπως βαθιάς ροής ή βιομηχανική
    habitat_material:
      name: Υλικό ενδιαιτήματος
      description: Προσδιορίζει το κύριο υλικό των ενδιαιτημάτων κατοικίδιων ζώων,
        όπως ακρυλικό ή ξύλο
    hair_care_effect:
      name: Αποτέλεσμα περιποίησης μαλλιών
      description: Καθορίζει τα κύρια οφέλη ή αποτελέσματα που είναι σχεδιασμένο να
        παρέχει το σαμπουάν.
    hair_care_finish:
      name: Φινίρισμα περιποίησης μαλλιών
      description: Καθορίζει την τελική εμφάνιση ή υφή των μαλλιών μετά τη χρήση,
        π.χ. λαμπερό, ματ αποτέλεσμα
    hair_care_items_included:
      name: Περιλαμβάνονται είδη περιποίησης μαλλιών
      description: Καθορίζει τους τύπους ειδών περιποίησης μαλλιών που περιλαμβάνονται
        σε ένα σετ, όπως ορός για τα μαλλιά ή μάσκα μαλλιών
    hair_care_technology:
      name: Τεχνολογία περιποίησης μαλλιών
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται σε προϊόντα περιποίησης
        μαλλιών, π.χ. ατμός, θερμόλυση
    hair_color:
      name: Χρώμα μαλλιών
      description: Προσδιορίζει το χρώμα ή την απόχρωση των προϊόντων περιποίησης
        μαλλιών, όπως το ξανθό ή το βαθύ καστανό
    hair_color_formulation:
      name: Σύνθεση βαφής μαλλιών
      description: Υποδεικνύει τη μακροζωία ή τον λειτουργικό τύπο του αποτελέσματος
        χρώματος του προϊόντος (π.χ., μόνιμη βαφή, τόνερ, κάλυψη ρίζας).
    hair_concealer_fiber_material:
      name: Υλικό ινών κάλυψης μαλλιών
      description: Καθορίζει το κύριο υλικό των ινών ή σκονών δόμησης του προϊόντος.
    hair_dryer_motor_type:
      name: Τύπος μοτέρ σεσουάρ
      description: Καθορίζει το είδος του μοτέρ που χρησιμοποιείται στο πιστολάκι
        μαλλιών, επηρεάζοντας την ανθεκτικότητα, το επίπεδο θορύβου και τη δύναμη
        ροής αέρα.
    hair_dye_type_removed:
      name: Τύπος βαφής μαλλιών που αφαιρείται
      description: Καθορίζει ποια είδη βαφής μαλλιών έχει σχεδιαστεί να αφαιρεί το
        προϊόν (π.χ., μόνιμη, χένα).
    hair_loss_type:
      name: Τύπος τριχόπτωσης
      description: Οργανώνει προϊόντα με βάση τον τύπο της τριχόπτωσης, π.χ. γυροειδής
        αλωπεκία, φαλάκρα αντρικού τύπου
    hair_oil_application:
      name: Εφαρμογή λαδιού μαλλιών
      description: Καθορίζει πώς προορίζεται να χρησιμοποιηθεί ή να εφαρμοστεί το
        λάδι μαλλιών.
    hair_oil_effect:
      name: Αποτέλεσμα λαδιού μαλλιών
      description: Υποδεικνύει τα κύρια οφέλη ή αποτελέσματα που παρέχει το λάδι μαλλιών.
    hair_shear_type:
      name: Τύπος ψαλίδας
      description: Καθορίζει το στυλ των ψαλίδων μαλλιών που χρησιμοποιούνται στην
        περιποίηση των μαλλιών, π.χ. υφή, αραίωση
    hair_styling_benefits:
      name: Οφέλη styling μαλλιών
      description: Επισημαίνει τα βασικά οφέλη απόδοσης ή τις επιδράσεις που παρέχει
        το προϊόν στα μαλλιά.
    hair_styling_items_included:
      name: Περιλαμβάνονται είδη styling μαλλιών
      description: Προσδιορίζει τα εργαλεία styling μαλλιών που περιλαμβάνονται σε
        ένα σετ, όπως σίδερο για μπούκλες ή βούρτσα μαλλιών
    hair_styling_tool_features:
      name: Χαρακτηριστικά εργαλείου styling μαλλιών
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των εργαλείων styling
        μαλλιών, όπως ρυθμιζόμενος θερμοστάτης ή αυτόματη απενεργοποίηση
    hair_treatment_effect:
      name: Αποτέλεσμα θεραπείας μαλλιών
      description: Καθορίζει το/τα κύριο(-α) όφελος(-η) που παρέχει ο ορός μαλλιών.
    hair_type:
      name: Τύπος μαλλιών
      description: Ταξινομεί προϊόντα με βάση συγκεκριμένους τύπους ή παθήσεις μαλλιών,
        όπως σγουρά ή ξηρά μαλλιά
    hammer_head_material:
      name: Υλικό κεφαλής σφυριού
      description: Προσδιορίζει τη σύνθεση της κεφαλής ενός σφυριού, όπως ατσάλι ή
        υαλοβάμβακας
    hand_side:
      name: Πλευρά χρήσης χεριού
      description: Καθορίζει τον τύπο χρήσης χεριού για τον οποίο έχει σχεδιαστεί
        ένα προϊόν, π.χ. αριστερό, και τα δύο χέρια
    hand_soap_features:
      name: Χαρακτηριστικά σαπουνιού χεριών
      description: Επισημαίνει ειδικά χαρακτηριστικά ή οφέλη του σαπουνιού χεριών
        σε σκόνη.
    hand_warmer_type:
      name: Τύπος θερμαντικού χεριών
      description: Προσδιορίζει τον τύπο θερμαντικού χεριών, όπως ενεργοποιούμενο
        από τον αέρα ή με μπαταρία
    handcuff_lock_type:
      name: Τύπος κλειδώματος χειροπέδας
      description: Προσδιορίζει τον μηχανισμό κλειδώματος των χειροπέδων, όπως με
        κλειδί ή διπλή κλειδαριά
    handle_color:
      name: Χρώμα λαβής
      description: Καθορίζει το χρώμα της λαβής ενός προϊόντος, όπως μαύρο ή μπλε
    handle_design:
      name: Σχέδιο λαβής
      description: Περιγράφει το στυλ της λαβής ενός εργαλείου, όπως ίσιο ή πιστόλι
    handle_grip_texture:
      name: Υφή λαβής χειρός
      description: Καθορίζει την αίσθηση επιφάνειας της λαβής ενός προϊόντος, όπως
        με ραβδώσεις ή αίσθηση λείας λαβής
    handle_material:
      name: Υλικό λαβής
      description: Καθορίζει το υλικό που χρησιμοποιείται στη λαβή του προϊόντος,
        όπως μπαμπού ή πλαστικό
    handle_pattern:
      name: Μοτίβο λαβής
      description: Περιγράφει το σχέδιο ή το μοτίβο στη λαβή ενός προϊόντος, όπως
        φλοράλ ή γεωμετρικό
    handle_style:
      name: Στυλ λαβής
      description: Καθορίζει τον σχεδιασμό ή το σχήμα της λαβής του μπαστουνιού, επηρεάζοντας
        την άνεση λαβής, την εργονομία και την αισθητική.
    handle_type:
      name: Τύπος λαβής
      description: Καθορίζει το μήκος ή την παρουσία μιας λαβής σε ένα προϊόν, π.χ.
        κοντή, χωρίς λαβή
    handset_type:
      name: Τύπος ακουστικού
      description: Ορίζει ακουστικό για τηλέφωνα, όπως ενσύρματο ή ασύρματο
    handwear_features:
      name: Χαρακτηριστικά γαντιών
      description: Περιγράφει ιδιαίτερα χαρακτηριστικά κανονικών γαντιών ή γαντιών
        χωρίς υποδιαίρεση δακτύλων , όπως ρυθμιζόμενο κλείσιμο ή ενισχυμένο κράτημα
    handwear_material:
      name: Υλικό γαντιών
      description: Περιγράφει τον τύπο του υλικού που χρησιμοποιείται σε κανονικά
        γάντια ή γάντια χωρίς υποδιαίρεση δακτύλων, όπως ψεύτικη γούνα ή μαλλί
    handwear_type:
      name: Τύπος γαντιών
      description: Ταξινομεί τον τύπο γαντιών, π.χ. γάντια χωρίς δάχτυλα, γάντια χιονιού
    hanging_chair_design:
      name: Σχέδιο κρεμαστής καρέκλας
      description: Καθορίζει εάν μια κρεμαστή καρέκλα συνοδεύεται από βάση ή όχι
    haptic_feedback_type:
      name: Τύπος απτικής ανάδρασης
      description: Περιγράφει το είδος της απτικής ή κινητικής ανάδρασης που παρέχει
        ο ελεγκτής.
    hard_cider_variety:
      name: Σκληρή ποικιλία μηλίτη
      description: Καθορίζει το προφίλ γεύσης του σκληρού μηλίτη, όπως έντονη ή γλυκιά
    hard_drive_features:
      name: Χαρακτηριστικά σκληρού δίσκου
      description: Προσδιορίζει ειδικές δυνατότητες ενός σκληρού δίσκου, όπως τεχνολογία
        με AI ή αντοχή σε κραδασμούς
    hard_drive_form_factor:
      name: Συντελεστής μορφής σκληρού δίσκου
      description: Καθορίζει το φυσικό μέγεθος ενός σκληρού δίσκου, π.χ. 2,5 ιντσών,
        3,5 ιντσών
    hard_drive_installation:
      name: Εγκατάσταση σκληρού δίσκου
      description: Προσδιορίζει την τοποθέτηση ενός σκληρού δίσκου σε ηλεκτρονικά,
        όπως εσωτερική ή εξωτερική
    hardhat_class:
      name: Κατηγορία προστατευτικού κράνους
      description: Προσδιορίζει την κατηγοριοποίηση ασφαλείας των προστατευτικών κρανών,
        π.χ. C (αγώγιμα), E (ηλεκτρικά)
    hardness:
      name: Σκληρότητα
      description: Υποδεικνύει τη σκληρότητα ενός προϊόντος, π.χ. μαλακό, μεσαίο,
        σκληρό
    hardness_rating_pencil_scale:
      name: Βαθμολογία σκληρότητας (κλίμακα μολυβιού)
      description: Καθορίζει τη βαθμολογία σκληρότητας του σκληρυμένου γυαλιού με
        βάση την κλίμακα σκληρότητας μολυβιού.
    hardware_finish:
      name: Φινίρισμα υλικού
      description: Περιγράφει την επιφανειακή επεξεργασία ή την επίστρωση ειδών υλικού,
        όπως ορείχαλκος ή χρώμιο
    hardware_material:
      name: Υλικό εξαρτημάτων
      description: Καθορίζει τη σύνθεση των εξαρτημάτων, όπως μέταλλο ή ανοξείδωτο
        ατσάλι
    hardware_mounting_type:
      name: Τύπος τοποθέτησης υλικού
      description: Προσδιορίζει πώς εγκαθίσταται ή τοποθετείται ένα προϊόν υλικού,
        π.χ. επιτοίχια, ανεξάρτητη
    hardwood_lumber_grade:
      name: Βαθμός ξυλείας σκληρού ξύλου
      description: Κατηγοριοποιεί την ποιότητα της ξυλείας σκληρού ξύλου, π.χ. No.
        2A common
    harness_closure_type:
      name: Τύπος κλεισίματος ιμάντα
      description: Καθορίζει τον τύπο κλεισίματος που χρησιμοποιείται σε ιμάντες,
        όπως αγκράφα πλευρικής απελευθέρωσης ή φερμουάρ
    harp_size:
      name: Μέγεθος άρπας
      description: Καθορίζει την κατηγορία μεγέθους μιας άρπας, π.χ. μικρή, συναυλιακή
    hatch_suitable_location:
      name: Κατάλληλη τοποθεσία καταπακτής
      description: Προσδιορίζει την ιδανική τοποθέτηση καταπακτών, όπως στο δάπεδο
        ή τον τοίχο
    hazmat_suit_design:
      name: Σχέδιο στολής Hazmat
      description: Περιγράφει το στυλ των στολών για επικίνδυνες ουσίες, όπως ολόσωμη
        ή ενθυλακωμένη στολή
    hdmi_version_supported:
      name: Υποστηριζόμενη έκδοση HDMI
      description: Καθορίζει την υψηλότερη έκδοση προδιαγραφών HDMI που υποστηρίζει
        πλήρως η συσκευή (π.χ., HDMI 2.1 για 4K @ 120 Hz).
    hdr_format:
      name: Μορφή HDR
      description: Καθορίζει το High Dynamic Range (HDR) για τηλεοράσεις, π.χ. HDR10,
        Dolby Vision
    headjoint_cut:
      name: Κόψιμο επιστομίου
      description: Καθορίζει το κόψιμο του επιστομίου στις φλογέρες, π.χ. κυματιστό
        (wave), Z-cut
    headphone_cushion_shape:
      name: Σχήμα μαξιλαριού ακουστικών
      description: Περιγράφει το φυσικό περίγραμμα του μαξιλαριού για να βοηθήσει
        τους πελάτες να ταιριάξουν τη γεωμετρία του κυπέλλου αυτιού.
    headphone_driver_technology:
      name: Τεχνολογία οδηγού ακουστικών
      description: Καθορίζει τον τύπο μετατροπέα που χρησιμοποιείται για τη δημιουργία
        ήχου στα ακουστικά.
    headphone_jack_type:
      name: Τύπος υποδοχής ακουστικών
      description: Καθορίζει τον τύπο του μεγέθους της υποδοχής ακουστικών, όπως 3,5
        mm, USB type-C
    headphone_style:
      name: Στυλ ακουστικών
      description: Καθορίζει το σχέδιο των ακουστικών, π.χ. πίσω από τον λαιμό, ακουστικά
        αυτιών
    headset_connection_type:
      name: Τύπος σύνδεσης ακουστικών
      description: Καθορίζει τη διαθέσιμη διεπαφή(-ές) για τη σύνδεση εξωτερικών ακουστικών
        στο τηλέφωνο.
    headwear_features:
      name: Χαρακτηριστικά καπέλων και καλυμμάτων κεφαλής
      description: Τονίζει τα μοναδικά χαρακτηριστικά των καπέλων και καλυμμάτων κεφαλής,
        π.χ. αναδιπλούμενα, ευέλικτα
    hearing_aid_compatibility:
      name: Συμβατότητα ακουστικού βαρηκοΐας
      description: Καθορίζει εάν το τηλέφωνο πληροί τις απαιτήσεις συμβατότητας ακουστικών
        βαρηκοΐας (HAC) και, εάν ισχύει, το επίπεδο βαθμολογίας.
    hearing_aid_ear_side:
      name: Πλευρά αυτιού ακουστικού βαρηκοΐας
      description: Καθορίζει αν το ακουστικό βαρηκοΐας έχει σχεδιαστεί για το αριστερό
        αυτί, το δεξί αυτί ή και για τα δύο αυτιά.
    hearing_aid_features:
      name: Χαρακτηριστικά ακουστικών βαρηκοΐας
      description: Υπογραμμίζει τα ιδιαίτερα χαρακτηριστικά των ακουστικών βαρηκοΐας,
        όπως επαναφορτιζόμενη μπαταρία ή ψηφιακά
    hearing_aid_material:
      name: Υλικό ακουστικών βαρηκοΐας
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται στην κατασκευή
        ακουστικών βαρηκοΐας, όπως πλαστικό ή σιλικόνη
    hearing_loss_level:
      name: Επίπεδο απώλειας ακοής
      description: Καθορίζει τον βαθμό απώλειας ακοής που έχει σχεδιαστεί να αντιμετωπίσει
        το ακουστικό βαρηκοΐας.
    hearing_protection_class:
      name: Κατηγορία προστασίας ακοής
      description: Καθορίζει την τοπική κατηγορία πιστοποίησης που υποδεικνύει την
        απόδοση εξασθένησης σύμφωνα με τα περιφερειακά πρότυπα.
    heat_function:
      name: Λειτουργία θερμότητας
      description: Υποδεικνύει εάν ένα προϊόν διαθέτει λειτουργία θέρμανσης, συνήθως
        για είδη προσωπικής φροντίδας
    heat_level:
      name: Επίπεδο θερμότητας
      description: Υποδεικνύει το επίπεδο καυτερότητας των προϊόντων τροφίμων και
        ποτών, όπως ήπιο ή πολύ καυτερό
    heat_settings:
      name: Ρυθμίσεις θερμότητας
      description: Καθορίζει τα επίπεδα ελέγχου θερμοκρασίας ενός προϊόντος, π.χ.
        χαμηλή, μεσαία, υψηλή
    heat_source:
      name: Πηγή θερμότητας
      description: Καθορίζει τον τύπο της πηγής θερμότητας στα θερμαντικά επιθέματα,
        π.χ. κατάλληλο για φούρνο μικροκυμάτων, θερμικό τζελ
    heat_therapy_type:
      name: Τύπος θερμοθεραπείας
      description: Υποδεικνύει αν το προϊόν παρέχει υγρή θερμότητα, ξηρή θερμότητα
        ή και τις δύο.
    heating_instructions:
      name: Οδηγίες θέρμανσης
      description: Καθορίζει τον τρόπο σωστής θέρμανσης του προϊόντος, π.χ. φούρνος,
        εστίες μαγειρέματος
    heating_method:
      name: Μέθοδος θέρμανσης
      description: Καθορίζει την τεχνική που χρησιμοποιείται για τη θέρμανση, συνήθως
        για θερμαντήρες μπιμπερό. π.χ. ατμός, υδατόλουτρο
    heating_pad_design:
      name: Σχεδιασμός θερμαντικού επιθέματος
      description: Καθορίζει το φυσικό στυλ ή τη μορφή του θερμαντικού επιθέματος.
    heating_pad_features:
      name: Χαρακτηριστικά θερμαντικού επιθέματος
      description: Επισημαίνει ειδικά λειτουργικά χαρακτηριστικά ή χαρακτηριστικά
        ευκολίας που ενσωματώνονται στο θερμαντικό επίθεμα.
    heating_speed:
      name: Ταχύτητα θέρμανσης
      description: Υποδεικνύει τον ρυθμό με τον οποίο ένα προϊόν θερμαίνεται, π.χ.
        γρήγορα, αργά
    heel_height_type:
      name: Τύπος ύψους τακουνιού
      description: Καθορίζει το ύψος του τακουνιού ενός υποδήματος, όπως επίπεδο ή
        ψηλό
    heel_shoe_type:
      name: Τύπος υποδήματος με τακούνι
      description: Προσδιορίζει το στυλ του τακουνιού σε ένα υπόδημα, όπως τακούνια
        τύπου πλατφόρμας ή wedge
    height_adjustment:
      name: Ρύθμιση ύψους
      description: Καθορίζει εάν το ύψος ενός προϊόντος μπορεί να αλλάξει, π.χ. σταθερό
        ύψος, ρυθμιζόμενο ύψος
    helicobacter_pylori_detection_method:
      name: Μέθοδος ανίχνευσης ελικοβακτηριδίου του πυλωρού
      description: Προσδιορίζει τη βιολογική αρχή ή προσέγγιση που χρησιμοποιεί το
        κιτ για την ανίχνευση λοίμωξης από ελικοβακτηρίδιο του πυλωρού.
    helmet_shade_design:
      name: Σχέδιο σκίασης κράνους
      description: Περιγράφει τον τύπο μηχανισμού σκίασης σε κράνη συγκόλλησης, όπως
        σταθερή ή αυτόματη σκίαση
    herbal_supplement_health_goal:
      name: Στόχος υγείας φυτικού συμπληρώματος
      description: Υποδεικνύει τον κύριο στόχο ευεξίας, το σύστημα του σώματος ή τη
        φυσιολογική περιοχή που προορίζεται να υποστηρίξει το φυτικό συμπλήρωμα (π.χ.,
        υποστήριξη ανοσοποιητικού, ανακούφιση από το στρες, υποστήριξη ήπατος και
        αποτοξίνωση).
    hitch_class:
      name: Κατηγορία κοτσαδόρου
      description: Προσδιορίζει τη δυνατότητα ρυμούλκησης του κοτσαδόρου ενός οχήματος,
        όπως Κλάση Ι ή Κλάση II
    hitch_type:
      name: Τύπος κοτσαδόρου
      description: Καθορίζει τη μέθοδο τοποθέτησης για τα ρυμουλκούμενα ποδηλάτων,
        όπως τοποθέτηση στον άξονα ή τη σέλα
    hiv_test_generation:
      name: Γενιά τεστ HIV
      description: Υποδεικνύει τη γενιά του διαγνωστικού τεστ HIV, αντικατοπτρίζοντας
        βελτιώσεις στην ευαισθησία και το παράθυρο ανίχνευσης.
    hockey_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός χόκεϊ
      description: Καθορίζει τα είδη σε ένα σετ εξοπλισμού λακρός, όπως μπαστούνι
        λακρός ή επιθέματα ώμων
    hold_level:
      name: Επίπεδο συγκράτησης
      description: Καθορίζει τη δύναμη των προϊόντων styling μαλλιών, π.χ. ελαφρύ,
        δυνατό
    hole_plating_type:
      name: Τύπος επιμετάλλωσης οπών
      description: Υποδεικνύει εάν οι οπές της πλακέτας δεν είναι επιμεταλλωμένες,
        επιμεταλλωμένες ή διαθέτουν βαρέλια via, που επηρεάζει τη συγκόλληση και τη
        συνδεσιμότητα μεταξύ επιπέδων.
    hook_design:
      name: Σχεδιασμός γάντζου
      description: Προσδιορίζει το σχέδιο των γάντζων, αγκράφων και συνδετήρων, π.χ.
        με ελατήριο ή διπλής όψης
    hook_grip_design:
      name: Σχεδιασμός λαβής γάντζου
      description: Περιγράφει το στυλ λαβής των βελονών πλεξίματος, όπως αντιολισθητική
        ή εργονομική
    hook_size:
      name: Μέγεθος γάντζου
      description: Προσδιορίζει το μέγεθος των βελονών πλεξίματος, όπως B, G ή I
    hook_type:
      name: Τύπος γάντζου
      description: Προσδιορίζει το στυλ των γάντζων του σκάφους, όπως σταθεροί ή τηλεσκοπικοί
    hoop_shape:
      name: Σχήμα στεφάνης
      description: Περιγράφει το σχήμα ενός αντικειμένου με βάση στεφάνης, συνήθως
        δίχτυα ψαρέματος, π.χ. σχήματος D
    horse_category:
      name: Κατηγορία αλόγου
      description: Ταξινομεί τα υποθέματα εφαρμογής για άλογα με βάση το μέγεθος και
        τη φυλή του αλόγου, π.χ. πόνυ, κανονικό
    horse_grooming_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ περιποίησης αλόγων
      description: Προσδιορίζει πρόσθετα αντικείμενα που περιλαμβάνονται στα προϊόντα
        περιποίησης αλόγων, όπως λεπίδες ή θήκη μεταφοράς
    hose_material:
      name: Υλικό σωλήνα
      description: Προσδιορίζει τον τύπο υλικού που χρησιμοποιείται στους σωλήνες,
        όπως PVC ή αλουμίνιο
    host_interface:
      name: Διεπαφή κεντρικού υπολογιστή
      description: Καθορίζει τη μέθοδο που χρησιμοποιείται για τη σύνδεση με σκληρούς
        δίσκους, όπως Thunderbolt 3 ή SATA
    housing_color:
      name: Χρώμα περιβλήματος
      description: Προσδιορίζει το χρώμα του εξωτερικού περιβλήματος ενός προϊόντος,
        όπως μπεζ ή διάφανο
    housing_material:
      name: Υλικό περιβλήματος
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στο εξωτερικό στρώμα
        του προϊόντος, π.χ. ανοξείδωτο ατσάλι, ξύλο
    housing_pattern:
      name: Μοτίβο περιβλήματος
      description: Περιγράφει το σχέδιο ή το μοτίβο στο εξωτερικό ενός προϊόντος,
        όπως αφηρημένο ή με λογότυπο
    hub/switch_storage_options:
      name: Επιλογές αποθήκευσης κόμβων/διακοπτών
      description: Προσδιορίζει τις δυνατότητες αποθήκευσης των κόμβων ή διακοπτών,
        όπως στοιβαζόμενα ή μη στοιβαζόμενα
    humidification_system:
      name: Σύστημα ύγρανσης
      description: Περιγράφει τον τύπο επιλογής ύγρανσης που περιλαμβάνεται ή υποστηρίζεται
        από τη μηχανή PAP.
    humidifier_design:
      name: Σχεδιασμός υγραντήρα
      description: Περιγράφει το στυλ ενός υγραντήρα, όπως προσαρτώμενος ή φορητός
    humidity_control:
      name: Έλεγχος υγρασίας
      description: Υποδεικνύει την ικανότητα του προϊόντος να ρυθμίζει τα επίπεδα
        υγρασίας, συνήθως για υγραντήρες πούρων, π.χ. 0,65
    humidity_control_method:
      name: Μέθοδος ελέγχου υγρασίας
      description: Καθορίζει τον τύπο ρύθμισης της υγρασίας σε συσκευές, π.χ. ημιαυτόματη,
        χειροκίνητη
    hunting/survival_knife_design:
      name: Σχεδιασμός μαχαιριού κυνηγιού/επιβίωσης
      description: Προσδιορίζει το σχέδιο ενός μαχαιριού κυνηγιού/επιβίωσης, όπως
        αιχμή δόρατος ή αιχμή tanto
    hunting_blind_design:
      name: Σχεδιασμός κάλυψης κυνηγιού
      description: Προσδιορίζει τον τύπο κάλυψης κυνηγιού, π.χ. χωρίς οθόνη, διάφανη
        προς μία κατεύθυνση
    hvac_control_type:
      name: Τύπος ελέγχου HVAC
      description: Προσδιορίζει το είδος του ελέγχου HVAC, όπως ψηφιακός ή χειροκίνητος
        έλεγχος
    ice_pack_type:
      name: Τύπος παγοκύστης
      description: Προσδιορίζει το υλικό ή την τεχνολογία που χρησιμοποιείται σε μια
        παγοκύστη, π.χ. με τζελ ή αφρό
    icon_type:
      name: Τύπος εικονιδίου
      description: Καθορίζει τον τύπο του εικονιδίου του υπολογιστή, όπως φάκελο ή
        μέσα κοινωνικής δικτύωσης
    identity_verification_requirement:
      name: Απαίτηση επαλήθευσης ταυτότητας
      description: Καθορίζει εάν απαιτείται εγγραφή με πραγματικό όνομα ή επαλήθευση
        ταυτότητας eKYC πριν από τη χρήση της SIM ή eSIM.
    ignition_system:
      name: Σύστημα ανάφλεξης
      description: Προσδιορίζει τον τύπο του συστήματος ανάφλεξης σε γεννήτριες, όπως
        χειροκίνητη ή ηλεκτρονική
    illumination_technique:
      name: Τεχνική φωτισμού
      description: Προσδιορίζει τη μέθοδο φωτισμού που χρησιμοποιείται στα μικροσκόπια,
        όπως φωτισμός φωτεινού πεδίου ή σκοτεινού πεδίου
    image_formats_supported:
      name: Υποστηριζόμενες μορφές εικόνας
      description: Προσδιορίζει τους τύπους αρχείων εικόνας που μπορεί να παράγει
        μια κάμερα, όπως JPEG ή RAW
    image_sensor_size:
      name: Μέγεθος αισθητήρα εικόνας
      description: Υποδεικνύει το μέγεθος του αισθητήρα εικόνας σε κάμερες, όπως 1/1,7
        ή full frame
    immobilizer_type:
      name: Τύπος συστήματος ακινητοποίησης
      description: Προσδιορίζει τον τύπο της συσκευής που χρησιμοποιείται για την
        αποτροπή κλοπής οχήματος, όπως κλείδωμα τροχού ή κλείδωμα τιμονιού
    incense_fragrance:
      name: Άρωμα θυμιάματος
      description: Προσδιορίζει το άρωμα ενός προϊόντος θυμιάματος, όπως λεβάντα ή
        σανταλόξυλο
    incense_kit_items_included:
      name: Περιλαμβανόμενα αντικείμενα σε κιτ θυμιάματος
      description: Προσδιορίζει τα στοιχεία που περιλαμβάνονται σε ένα κιτ κατασκευής
        θυμιάματος, π.χ. μπαμπού ξυλάκια, καλούπια
    incense_type:
      name: Τύπος θυμιάματος
      description: Προσδιορίζει τη μορφή του θυμιάματος, όπως σε κώνο ή ραβδί
    incontinence_aid_features:
      name: Χαρακτηριστικά βοηθημάτων ακράτειας
      description: Περιγράφει ειδικά χαρακτηριστικά των βοηθημάτων ακράτειας, όπως
        αδιάβροχα ή υποαλλεργικά
    incontinence_pad_type:
      name: Τύπος επιθέματος ακράτειας
      description: Καθορίζει το συγκεκριμένο στυλ ή τη μορφή του επιθέματος (π.χ.,
        σερβιετάκι, προστατευτικό, ενισχυτικό επίθεμα).
    inductance_tolerance:
      name: Ανοχή επαγωγής
      description: Καθορίζει την επιτρεπόμενη ποσοστιαία απόκλιση από την ονομαστική
        τιμή επαγωγής.
    industry_focus:
      name: Εστίαση στη βιομηχανία
      description: Αναδεικνύει τους στοχευμένους τομείς για ένα προϊόν, όπως η εκπαίδευση
        ή η βιομηχανική παραγωγή
    infant_age_group:
      name: Βρεφική ηλικιακή ομάδα
      description: Ταξινομεί προϊόντα κατάλληλα για συγκεκριμένη βρεφική ηλικία, π.χ.
        νεογέννητο, 0-6 μηνών
    inflation_method:
      name: Μέθοδος φουσκώματος
      description: Προσδιορίζει τον τρόπο που φουσκώνει ένα προϊόν, όπως αυτόματο
        ή υδροστατικό
    ingredient_category:
      name: Κατηγορία συστατικών
      description: Ταξινομεί το είδος των συστατικών σε βιταμίνες και συμπληρώματα,
        π.χ. φυτικές ίνες, βότανα
    ingredient_origin:
      name: Προέλευση συστατικών
      description: Καθορίζει την πηγή των συστατικών του προϊόντος, π.χ. φυσικά, συνθετικά
    ingredient_pathway:
      name: Διαδρομή συστατικών
      description: Υποδεικνύει εάν τα συστατικά της αρωματοποιίας προέρχονται φυσικά
        μέσω φυσικού διαχωρισμού από τη βιομάζα χωρίς χημική αλλοίωση ή συντίθενται
        με άλλες μεθόδους
    ingredients:
      name: Συστατικά
      description: Καθορίζει τα συστατικά που χρησιμοποιούνται στη σύνθεση ενός προϊόντος,
        π.χ. οξείδιο ψευδαργύρου, αλόη βέρα
    ingress_protection_ip_rating:
      name: Βαθμός προστασίας από εισροή (IP)
      description: Παρέχει την επίσημη βαθμολογία αντοχής κατά IP στο νερό/σκόνη με
        την οποία συμμορφώνεται η θήκη (π.χ., IP68).
    ink_application_technique:
      name: Τεχνική εφαρμογής μελανιού
      description: Περιγράφει τη μέθοδο που χρησιμοποιείται για την εφαρμογή μελανιού
        σε τέχνες και χειροτεχνίες, όπως η μεταξοτυπία
    ink_color:
      name: Χρώμα μελανιού
      description: Προσδιορίζει το χρώμα του μελανιού, συνήθως για είδη γραφείου.
        πχ μαύρο, ασημί
    ink_form:
      name: Μορφή μελανιού
      description: Περιγράφει τη συσκευασία ή τη μέθοδο διάθεσης του μελανιού ζωγραφικής,
        όπως σε στυλό ή μπουκάλι
    ink_pattern:
      name: Μοτίβο μελανιού
      description: Προσδιορίζει το οπτικό θέμα των στυλό ή γραμματοσήμων, π.χ. με
        γεωμετρικό θέμα, με Χριστουγεννιάτικο θέμα
    ink_type:
      name: Τύπος μελανιού
      description: Προσδιορίζει το είδος του μελανιού που χρησιμοποιείται σε ένα προϊόν,
        όπως με βάση διαλύτη ή βαφή
    inline_skating_style:
      name: Στυλ πατινιών Inline
      description: Ορίζει το συγκεκριμένο στυλ πατινιών inline για το οποίο έχει σχεδιαστεί
        το προϊόν, όπως αναψυχής ή ταχύτητας
    input/output_ports:
      name: Θύρες εισόδου/εξόδου
      description: Προσδιορίζει τους τύπους θυρών που διατίθενται σε μια συσκευή,
        όπως υποδοχή USB ή έξοδος
    input_connection:
      name: Σύνδεση εισόδου
      description: Καθορίζει τον τύπο σύνδεσης εισόδου για καλώδια ήχου, όπως 3,5
        mm ή RCA
    input_connection_type:
      name: Τύπος σύνδεσης εισόδου
      description: Καθορίζει τον συνδετήρα ή το πρότυπο διεπαφής που γίνεται δεκτό
        στην πλευρά εισόδου του μετατροπέα.
    input_signal_interface:
      name: Διεπαφή σήματος εισόδου
      description: Καθορίζει τον τύπο ή τους τύπους σύνδεσης εισόδου που δέχεται ο
        μετατροπέας ήχου.
    input_video_interface:
      name: Διεπαφή εισόδου βίντεο
      description: Καθορίζει τον τύπο ή τους τύπους συνδετήρα βίντεο που γίνονται
        δεκτοί ως είσοδος από τον μετατροπέα σάρωσης.
    insole_length_type:
      name: Τύπος μήκους πάτου
      description: Καθορίζει την κάλυψη ή το στυλ μήκους του ένθετου.
    installation_accessories_included:
      name: Συμπεριλαμβανόμενα εξαρτήματα εγκατάστασης
      description: Προσδιορίζει τυχόν εργαλεία ή εκπαιδευτικά υλικά που συνοδεύουν
        τη μπαταρία για διευκόλυνση της εγκατάστασης.
    installation_tools_included:
      name: Συμπεριλαμβανόμενα εργαλεία εγκατάστασης
      description: Απαριθμεί τυχόν εργαλεία ή αναλώσιμα που συνοδεύουν το εξάρτημα
        για διευκόλυνση της εγκατάστασης.
    instruction_set_architecture:
      name: Αρχιτεκτονική συνόλου εντολών
      description: Ορίζει την αρχιτεκτονική του υπολογιστή που μπορεί να κατανοήσει
        ένας επεξεργαστής, π.χ. 32-bit
    instrument/accessory_finish:
      name: Φινίρισμα οργάνου/αξεσουάρ
      description: Περιγράφει την επιφανειακή επεξεργασία ή το χρώμα ενός μουσικού
        οργάνου ή αξεσουάρ, όπως επίχρυσο ή λακαρισμένο
    instrument_accessory_material:
      name: Υλικό αξεσουάρ οργάνων
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στα αξεσουάρ μουσικών
        οργάνων, όπως ξύλο ή ορείχαλκος
    instrument_bow_material:
      name: Υλικό δοξαριού οργάνου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην κατασκευή του δοξαριού
        ενός μουσικού οργάνου, όπως ανθρακόνημα ή ξύλο τύπου brazilwood
    instrument_color:
      name: Χρώμα οργάνου
      description: Προσδιορίζει το χρώμα ενός μουσικού οργάνου, όπως μαύρο ή ασημί
    instrument_controller_type:
      name: Τύπος ελεγκτή οργάνου
      description: Προσδιορίζει το μουσικό όργανο που προσομοιώνεται από ένα χειριστήριο
        παιχνιδιού, όπως κιθάρα ή μικρόφωνο
    instrument_material:
      name: Υλικό οργάνου
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται στην κατασκευή
        ενός μουσικού οργάνου, όπως ξύλο σφενδάμου ή ορείχαλκος
    instrument_part_material:
      name: Υλικό εξαρτήματος οργάνου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε εξαρτήματα
        οργάνων, όπως ξύλο έβενου ή επίχρυσο
    instrument_pattern:
      name: Μοτίβο οργάνων
      description: Περιγράφει το οπτικό σχέδιο ή μοτίβο σε ένα μουσικό όργανο, όπως
        μονόχρωμο ή με υφή
    instrument_string_color:
      name: Χρώμα χορδών οργάνου
      description: Προσδιορίζει το χρώμα των χορδών σε μουσικά όργανα, όπως χρυσό
        ή ασημί
    instrument_string_material:
      name: Υλικό χορδών οργάνου
      description: Καθορίζει τη σύνθεση χορδών μουσικών οργάνων, όπως μπρούντζος ή
        φθοράνθρακας
    instrument_string_pattern:
      name: Μοτίβο χορδών οργάνου
      description: Υποδεικνύει το μοτίβο σε χορδές κιθάρας, όπως μονόχρωμο ή γεωμετρικό
    instrument_support_type:
      name: Τύπος στήριξης οργάνου
      description: Προσδιορίζει τον τύπο στήριξης που χρησιμοποιείται για ένα μουσικό
        όργανο, όπως λουράκι λαιμού ή βάση παρτιτούρας
    insulation_material:
      name: Μονωτικό υλικό
      description: Καθορίζει τη σύνθεση της μόνωσης, όπως με ορυκτοβάμβακα ή πολυουρεθάνη
        (PU)
    integrated_led_lighting:
      name: Ενσωματωμένος φωτισμός LED
      description: Υποδεικνύει εάν το ηχείο ενσωματώνει ενσωματωμένο φωτισμό LED ή
        RGB και τον τύπο του.
    integrated_power/charging_options:
      name: Ενσωματωμένες επιλογές τροφοδοσίας/φόρτισης
      description: Καθορίζει εάν η βάση περιλαμβάνει ενσωματωμένες ηλεκτρικές πρίζες
        και/ή θύρες φόρτισης USB, ενισχύοντας τη χρησιμότητα για συνδεδεμένες συσκευές.
    integrated_stand_type:
      name: Ενσωματωμένος τύπος βάσης
      description: Περιγράφει το στυλ της ενσωματωμένης βάσης ή του μηχανισμού στήριξης
        στη θήκη.
    intended_application:
      name: Προβλεπόμενη εφαρμογή
      description: Προσδιορίζει τη συγκεκριμένη χρήση χρωμάτων και λεκέδων, π.χ. πόρτες,
        καταστρώματα/φράχτες
    intended_effect:
      name: Προβλεπόμενη επίδραση
      description: Περιγράφει το κύριο όφελος ευεξίας που προωθείται να παρέχει το
        συμπλήρωμα CBD.
    intended_jewelry_type:
      name: Προβλεπόμενος τύπος κοσμήματος
      description: Υποδεικνύει ποια είδη κοσμημάτων έχει σχεδιαστεί να κρατά ή να
        εκθέτει η βάση.
    intended_surface:
      name: Προοριζόμενη επιφάνεια
      description: Προσδιορίζει την κύρια επιφάνεια που έχει σχεδιαστεί να προστατεύει
        το επίθεμα.
    intercom_communication_type:
      name: Τύπος επικοινωνίας ενδοεπικοινωνίας
      description: Ταξινομεί τη θεμελιώδη μορφή επικοινωνίας που υποστηρίζει η μονάδα.
    intercom_wiring_type:
      name: Τύπος καλωδίωσης ενδοεπικοινωνίας
      description: Καθορίζει το σχήμα καλωδίωσης ή επικοινωνίας για το οποίο έχει
        σχεδιαστεί μια μονάδα ηχείου ενδοεπικοινωνίας.
    interface_type:
      name: Τύπος διεπαφής
      description: Προσδιορίζει τον τύπο σύνδεσης που χρησιμοποιεί ένα προϊόν, όπως
        Bluetooth ή USB
    interior_lining_material:
      name: Υλικό εσωτερικής επένδυσης
      description: Προσδιορίζει το κύριο υλικό που επενδύει το εσωτερικό του κουτιού
        κοσμημάτων, προστατεύοντας τα κοσμήματα από γρατσουνιές και φθορά.
    interior_texture:
      name: Εσωτερική υφή
      description: Καθορίζει το εσωτερικό μοτίβο επιφάνειας που βοηθά στη δημιουργία
        αφρού μέσα στο μπολ ή την κούπα.
    internal_drive_form_factor_supported:
      name: Υποστηρίζεται ο παράγοντας μορφής εσωτερικής μονάδας δίσκου
      description: Υποδεικνύει τα συμβατά μεγέθη σκληρού δίσκου για μια συσκευή, π.χ.
        2,5 ιντσών
    internet_radio_form_factor:
      name: Μορφή ραδιοφώνου διαδικτύου
      description: Καθορίζει το φυσικό στυλ ή τον προσανατολισμό στήριξης του ραδιοφώνου
        διαδικτύου.
    intimate_apparel_features:
      name: Χαρακτηριστικά εσωτερικών ενδυμάτων
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των εσωτερικών ενδυμάτων,
        όπως ο σχεδιασμός που αναπνέει ή η άνετη εφαρμογή
    inverter_type:
      name: Τύπος μετατροπέα
      description: Προσδιορίζει τον τύπο του μετατροπέα ισχύος σε εξαρτήματα ηλεκτρικών
        οχημάτων, όπως καθαρού ημιτόνου ή τετραγωνικού κύματος
    invitation_personalization_design:
      name: Σχεδιασμός εξατομίκευσης προσκλήσεων
      description: Καθορίζει τα χαρακτηριστικά σχεδιασμού μιας πρόσκλησης, π.χ. περιλαμβάνει
        RSVP, δυνατότητα εξατομίκευσης
    ironing_features:
      name: Χαρακτηριστικά σιδερώματος
      description: Καθορίζει τα ειδικά χαρακτηριστικά ενός σίδερου ή συστήματος σιδερώματος,
        π.χ. αυτόματη απενεργοποίηση, ενίσχυση ατμού
    item_condition:
      name: Κατάσταση αντικειμένου
      description: Υποδεικνύει την ποιότητα ενός αντικειμένου, συνήθως οχημάτων ή
        ανταλλακτικών, π.χ. πιστοποιημένο μεταχειρισμένο, ανακατασκευασμένο
    item_material:
      name: Υλικό αντικειμένου
      description: Προσδιορίζει την κύρια ουσία ενός αντικειμένου, συνήθως για ανταλλακτικά
        και αξεσουάρ οχημάτων, π.χ. χαλκός, υαλοβάμβακας
    item_style:
      name: Στυλ αντικειμένου
      description: Περιγράφει το αισθητικό ή σχεδιαστικό θέμα ενός προϊόντος, όπως
        μοντέρνο ή ρουστίκ
    j_cup_type:
      name: Τύπος J-Cup
      description: Καθορίζει το στυλ των J-cups στον εξοπλισμό άρσης βαρών, π.χ. επίπεδο
        ή sandwich
    jaw_advancement_adjustability:
      name: Ρυθμιζόμενη προώθηση γνάθου
      description: Υποδεικνύει εάν και πώς η θέση της κάτω γνάθου που παρέχεται από
        τη συσκευή μπορεί να ρυθμιστεί από τον χρήστη.
    jaw_material:
      name: Υλικό σιαγόνας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στη σιαγόνα ενός εργαλείου,
        όπως ατσάλι ή τιτάνιο
    jewelry_cleaning_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ καθαρισμού κοσμημάτων
      description: Απαριθμεί τυχόν επιπλέον εργαλεία ή αξεσουάρ που παρέχονται με
        το καθαριστικό (π.χ., βούρτσες, δίσκοι, πανιά στίλβωσης).
    jewelry_cleaning_purpose:
      name: Σκοπός καθαρισμού κοσμημάτων
      description: Υποδεικνύει την κύρια προβλεπόμενη λειτουργία του προϊόντος (π.χ.,
        αφαίρεση αμαύρωσης, στίλβωση, προστατευτική επίστρωση).
    jewelry_finding_type:
      name: Τύπος εξαρτήματος κοσμημάτων
      description: Προσδιορίζει το συγκεκριμένο εξάρτημα που χρησιμοποιείται στην
        κατασκευή κοσμημάτων, όπως καπάκι χαντρών ή κρίκος σύνδεσης
    jewelry_material:
      name: Υλικό κοσμήματος
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε κοσμήματα, όπως
        ο χρυσός ή το σμάλτο
    jewelry_project_type:
      name: Τύπος έργου κοσμήματος
      description: Καθορίζει τον τύπο του έργου κοσμήματος, όπως κατασκευή κολιέ ή
        εργασία με σύρμα
    jewelry_set_type:
      name: Τύπος σετ κοσμήματος
      description: Προσδιορίζει τον τύπο του κοσμήματος σε ένα κιτ κατασκευής κοσμημάτων,
        όπως δαχτυλίδι ή κολιέ
    jewelry_steam_cleaner_features:
      name: Χαρακτηριστικά ατμοκαθαριστή κοσμημάτων
      description: Απαριθμεί αξιοσημείωτα ενσωματωμένα χαρακτηριστικά ή λειτουργίες
        ασφαλείας που διαφοροποιούν τα μοντέλα.
    jewelry_type:
      name: Τύπος κοσμήματος
      description: Διακρίνει μεταξύ τύπων κοσμημάτων, όπως εκλεκτά κοσμήματα ή ψεύτικα
        κοσμήματα
    joint_connection:
      name: Σύνδεση ένωσης
      description: Προσδιορίζει τον τύπο σύνδεσης ένωσης στις στέκες μπιλιάρδου, π.χ.
        σύνθετος, χωρίς ένωση
    joint_face_type:
      name: Τύπος επιφάνειας ένωσης
      description: Προσδιορίζει τον τύπο της επιφάνειας ένωσης στους άξονες μπιλιάρδου,
        όπως πλήρης ή με οδηγό
    joint_style:
      name: Στυλ ένωσης
      description: Καθορίζει τον τύπο ένωσης που χρησιμοποιείται στις στέκες μπιλιάρδου,
        όπως uni-loc ή radial
    journey_type:
      name: Τύπος διαδρομής
      description: Καθορίζει τον τύπο διαδρομής που καλύπτει το εισιτήριο με βάση
        τον αριθμό ταξιδιών και την κατεύθυνση μετακίνησης.
    joystick_mounting_style:
      name: Στυλ τοποθέτησης χειριστηρίου
      description: Υποδεικνύει πώς η συναρμολόγηση του χειριστηρίου ασφαλίζεται σε
        έναν πίνακα ελέγχου ή ντουλάπι.
    joystick_sensor_technology:
      name: Τεχνολογία αισθητήρα joystick
      description: Προσδιορίζει την κύρια τεχνολογία ανίχνευσης που χρησιμοποιείται
        για την ανίχνευση κίνησης ή θέσης.
    jump_rope_design:
      name: Σχεδιασμός σχοινιού γυμναστικής
      description: Περιγράφει τον τύπο του σχοινιού, όπως κλασικό ή έξυπνο
    jumping_surface_color:
      name: Χρώμα επιφάνειας άλματος
      description: Προσδιορίζει το χρώμα της επιφάνειας άλματος του τραμπολίνου, όπως
        μπλε ή μαύρο
    jumping_surface_material:
      name: Υλικό επιφάνειας άλματος
      description: Καθορίζει το ύφασμα της επιφάνειας άλματος ενός τραμπολίνου, π.χ.
        συνθετικό, πολυπροπυλένιο
    jumping_surface_pattern:
      name: Μοτίβο επιφάνειας άλματος
      description: Προσδιορίζει το σχέδιο ή την εκτύπωση στην επιφάνεια άλματος ενός
        τραμπολίνου, όπως αστέρια ή ρίγες
    karaoke_modes:
      name: Λειτουργίες καραόκε
      description: Καθορίζει τον τύπο απόδοσης καραόκε, όπως μονό ή ντουέτο
    kerosene_application:
      name: Εφαρμογή κηροζίνης
      description: Προσδιορίζει τη συγκεκριμένη χρήση της κηροζίνης, όπως για θερμάστρες
        ή καύσιμα αεροπλάνων
    key_purpose:
      name: Σκοπός κλειδιού
      description: Προσδιορίζει πού προορίζεται να χρησιμοποιηθεί ένα κλειδί ή άκοπο
        κλειδί, π.χ. σε πόρτα ή λουκέτο
    keyboard_action:
      name: Δράση πλήκτρων
      description: Προσδιορίζει την αίσθηση των πλήκτρων σε πιάνο, όπως δράση με σφυρί
        ή σταθμισμένα πλήκτρα
    keyboard_assembly_type:
      name: Τύπος συναρμολόγησης πληκτρολογίου
      description: Καθορίζει τη φυσική συναρμολόγηση που παρέχεται (π.χ., αυτόνομο
        πληκτρολόγιο, υποστήριγμα παλάμης με πληκτρολόγιο, μεμονωμένο σετ πλήκτρων).
    keyboard_backlight_type:
      name: Τύπος οπίσθιου φωτισμού πληκτρολογίου
      description: Περιγράφει λεπτομερώς την τεχνολογία φωτισμού ή το στυλ που χρησιμοποιείται
        για τα πλήκτρα ή τη θήκη του πληκτρολογίου.
    keyboard_format:
      name: Μορφή πλήκτρων
      description: Καθορίζει το μέγεθος και τη διάταξη ενός πλήκτρου, όπως πλήρους
        μεγέθους ή συμπαγές
    keyboard_key_type:
      name: Τύπος πλήκτρου πληκτρολογίου
      description: Περιγράφει την απόκριση ή την αίσθηση των πλήκτρων σε μουσικά πληκτρολόγια,
        όπως πλήκτρα με βάρος ή ημι-βαρύτητα
    keyboard_language:
      name: Γλώσσα πληκτρολογίου
      description: Καθορίζει τη διάταξη γλώσσας ενός πληκτρολογίου, όπως ENG (Αγγλικά)
        ή DEU (Γερμανικά)
    keyboard_layout:
      name: Διάταξη πληκτρολογίου
      description: Καθορίζει τη διάταξη των πλήκτρων σε ένα πληκτρολόγιο, π.χ. QWERTY,
        Workman
    keyboard_mounting_style:
      name: Στυλ τοποθέτησης πληκτρολογίου
      description: Καθορίζει την εσωτερική μέθοδο τοποθέτησης πλάκας που επηρεάζει
        τον ήχο και την αίσθηση των μηχανικών πληκτρολογίων.
    keyboard_port_type:
      name: Τύπος θύρας πληκτρολογίου
      description: Καθορίζει τον τύπο θύρας για συνδεσιμότητα πληκτρολογίου, όπως
        USB τύπου C
    keyboard_specialized_features:
      name: Εξειδικευμένες λειτουργίες πληκτρολογίου
      description: Προσδιορίζει μοναδικά χαρακτηριστικά ενός πληκτρολογίου, όπως ρυθμιζόμενη
        γωνία ή οπίσθιο φωτισμό
    keyboard_switch_type:
      name: Τύπος διακόπτη πληκτρολογίου
      description: Καθορίζει το στυλ απόκρισης του πληκτρολογίου, όπως απτικό ή με
        ήχο κλικ
    keyboard_type:
      name: Τύπος πληκτρολογίου
      description: Καθορίζει τη σχεδίαση και τη λειτουργικότητα ενός πληκτρολογίου,
        π.χ. στάνταρ, οπίσθιου φωτισμού
    keycap_legend_printing_method:
      name: Μέθοδος εκτύπωσης επιγραφής καπακιού πλήκτρου
      description: Περιγράφει πώς εφαρμόζονται οι επιγραφές στα καπάκια πλήκτρων,
        επηρεάζοντας τη μακροζωία και την εμφάνιση.
    keycap_material:
      name: Υλικό καπακιού πλήκτρου
      description: Υποδεικνύει το κύριο υλικό ή τη διαδικασία κατασκευής των καπακιών
        πλήκτρων που επηρεάζει την ανθεκτικότητα, την υφή και τις επιγραφές.
    keycap_profile:
      name: Προφίλ καπακιού πλήκτρου
      description: Καθορίζει την οικογένεια σχήματος ή γλυπτού του σετ καπακιών πλήκτρων,
        επηρεάζοντας την αίσθηση πληκτρολόγησης και την αισθητική.
    keypad_style:
      name: Στυλ πληκτρολογίου
      description: Καθορίζει τη μέθοδο εισαγωγής για πληκτρολόγια, όπως ψηφιακό ή
        αλφαριθμητικό
    keystone_correction_type:
      name: Τύπος διόρθωσης τραπεζοειδούς παραμόρφωσης
      description: Περιγράφει τον τύπο τραπεζοειδούς ή γεωμετρικής διόρθωσης που υποστηρίζει
        ο προβολέας για την εξάλειψη της τραπεζοειδούς παραμόρφωσης (π.χ., χειροκίνητη
        κάθετη, αυτόματη τεσσάρων σημείων).
    kiln_features:
      name: Χαρακτηριστικά κλιβάνου
      description: Καθορίζει τις λειτουργικές δυνατότητες και τα σχεδιαστικά χαρακτηριστικά
        του κλιβάνου.
    kiln_loading_style:
      name: Τρόπος φόρτωσης κλιβάνου
      description: Καθορίζει τη μέθοδο με την οποία τα αντικείμενα τοποθετούνται και
        αφαιρούνται από τον θάλαμο του κλιβάνου.
    kit_construction_type:
      name: Τύπος κατασκευής κιτ
      description: Καθορίζει το ύφασμα επιφάνειας άλματος ενός τραμπολίνου, π.χ. συνθετικό,
        πολυπροπυλένιο
    kitchen/dining_furniture_items_included:
      name: Περιλαμβάνονται έπιπλα κουζίνας/τραπεζαρίας
      description: Προσδιορίζει τα συγκεκριμένα έπιπλα που περιλαμβάνονται σε ένα
        σετ, όπως καρέκλες τραπεζαρίας ή νησίδα κουζίνας
    kitchen_utensil_items_included:
      name: Περιλαμβάνονται είδη κουζίνας
      description: Προσδιορίζει τα εργαλεία που περιλαμβάνονται σε ένα σετ σκευών
        κουζίνας, όπως σύρμα ανάμειξης ή λαβίδες
    kitesurfing_style:
      name: Στυλ kitesurfing
      description: Καθορίζει το συγκεκριμένο στυλ kitesurfing για το οποίο έχει σχεδιαστεί
        το προϊόν, όπως κυματολίσθηση
    knee_brace_style:
      name: Στυλ νάρθηκα γόνατος
      description: Καθορίζει τον δομικό σχεδιασμό του νάρθηκα, αντικατοπτρίζοντας
        πώς φοριέται και το επίπεδο στήριξης που παρέχεται.
    kneeboard_features:
      name: Χαρακτηριστικά σανίδας κυματοδρομίας σε γονατιστή στάση (Kneeboard)
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά μιας σανίδας κυματοδρομίας
        σε γονατιστή στάση (kneeboard), όπως με ρυθμιζόμενο λουρί ή αντιολισθητική
        επιφάνεια
    knife_type:
      name: Τύπος μαχαιριού
      description: Ταξινομεί τα μαχαίρια με βάση τη χρήση ή τον σχεδιασμό για την
        οποία προορίζονται, όπως πολυεργαλείο ή EDC
    knitting/padding_project_type:
      name: Τύπος έργου πλεξίματος/γέμισης
      description: Προσδιορίζει την προβλεπόμενη χρήση των υλικών πλεξίματος ή γέμισης,
        όπως καπιτονέ ή κατασκευή μαξιλαριών
    knitting_project_type:
      name: Τύπος έργου πλέξης
      description: Προσδιορίζει τον τύπο του έργου πλέξης, όπως φτιάξιμο μαξιλαριών
        ή κατασκευή λούτρινων παιχνιδιών
    knob/handle_design:
      name: Σχέδιο κουμπιού/λαβής
      description: Περιγράφει το στυλ των εξαρτημάτων ντουλαπιού, όπως με στρογγυλό
        κουμπί ή λαβή μπάρας
    knob_function:
      name: Λειτουργία κουμπιού
      description: Προσδιορίζει τη λειτουργία των κουμπιών του ενισχυτή, όπως με ενίσχυση
        ή παρουσία
    knob_style:
      name: Στυλ κουμπιού
      description: Περιγράφει το σχέδιο των κουμπιών στους ενισχυτές μουσικών οργάνων,
        όπως κανονικό (standard) ή ρετρό/vintage
    knot_shape:
      name: Σχήμα κόμπου
      description: Καθορίζει το συνολικό σχήμα ή προφίλ του κόμπου ή της κεφαλής της
        βούρτσας.
    labeling_project_type:
      name: Τύπος έργου ετικέτας
      description: Καθορίζει τον σκοπό κατασκευής για ράψιμο ετικετών, όπως χειροτεχνία
        οικιακών υφασμάτων ή εξατομικευμένη κατασκευή δώρων
    laboratory_freezer_design:
      name: Σχεδιασμός καταψύκτη εργαστηρίου
      description: Περιγράφει τη διαμόρφωση ενός καταψύκτη εργαστηρίου, όπως κάθετος
        ή οριζόντιος
    lacrosse_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός λακρός
      description: Καθορίζει τα αντικείμενα σε ένα σετ εξοπλισμού λακρός, όπως μπαστούνι
        του λακρός ή επιθέματα ώμων
    ladder_type:
      name: Τύπος σκάλας
      description: Προσδιορίζει το είδος της σκάλας του σκάφους, όπως σταθερή ή τηλεσκοπική
    lamination_mode:
      name: Λειτουργία ελασματοποίησης
      description: Προσδιορίζει τον τύπο της διαδικασίας ελασματοποίησης που χρησιμοποιείται,
        όπως ψυχρή ελασματοποίηση ή θερμή ελασματοποίηση
    lamination_type:
      name: Τύπος πλαστικοποίησης
      description: Προσδιορίζει αν η επιφάνεια του χάρτη ή του μοντέλου είναι πλαστικοποιημένη
        και, αν ναι, αν είναι μονής ή διπλής όψης.
    lamp_assembly_type:
      name: Τύπος συναρμολόγησης λάμπας
      description: Καθορίζει εάν το προϊόν είναι γυμνός λαμπτήρας, λάμπα με θήκη,
        διπλή συσκευασία ή άλλη διαμόρφωση συναρμολόγησης.
    lamp_quality_grade:
      name: Βαθμός ποιότητας λάμπας
      description: Υποδεικνύει εάν η λάμπα είναι αυθεντική OEM, χρησιμοποιεί λαμπτήρα
        OEM σε συμβατή θήκη ή είναι πλήρως aftermarket/συμβατή.
    lamp_type:
      name: Τύπος λάμπας
      description: Καθορίζει την πηγή φωτός στις φωτογραφικές συσκευές μεγέθυνσης,
        π.χ. ψυχρό φως, διχρωμία
    lancet_mechanism_type:
      name: Τύπος μηχανισμού σκαρφιστήρα
      description: Καθορίζει τον μηχανισμό λειτουργίας ή τον σχεδιασμό ασφαλείας των
        σκαρφιστήρων (π.χ., αναδιπλούμενος ασφαλείας, ενεργοποιούμενος με πίεση).
    language:
      name: Γλώσσα
      description: Καθορίζει τη γλώσσα που χρησιμοποιείται ή τη συμβατή γλώσσα, π.χ.
        αγγλικά, πολλές γλώσσες
    language_version:
      name: Έκδοση γλώσσας
      description: Καθορίζει τη γλωσσική έκδοση ενός προϊόντος μέσων, όπως ENG-US
        ή ARA- Arabic
    laptop_cable_type:
      name: Τύπος καλωδίου φορητού υπολογιστή
      description: Προσδιορίζει τον λειτουργικό σκοπό του καλωδίου εντός του φορητού
        υπολογιστή.
    laptop_housing_part_type:
      name: Τύπος εξαρτήματος περιβλήματος φορητού υπολογιστή
      description: Καθορίζει ποιο εξωτερικό εξάρτημα παρέχεται (π.χ., κάτω βάση, υποστήριγμα
        παλάμης, πλαίσιο).
    laser_color:
      name: Χρώμα λέιζερ
      description: Προσδιορίζει το χρώμα ενός δείκτη λέιζερ, όπως κόκκινο ή πράσινο
    laser_light_source:
      name: Πηγή φωτός λέιζερ
      description: Καθορίζει την τεχνολογία φωτός που χρησιμοποιείται σε δείκτες λέιζερ,
        όπως LED
    laser_pattern:
      name: Μοτίβο λέιζερ
      description: Προσδιορίζει το σχέδιο ή το μοτίβο που παράγεται από ένα λέιζερ,
        όπως αστέρια ή ζώο
    lathe_application:
      name: Εφαρμογή τόρνου
      description: Καθορίζει τον τύπο εργασίας για τον οποίο έχει σχεδιαστεί ένας
        τόρνος, όπως ακρυλική νηματοποίηση ή κατεργασία γυαλιού
    laundry_detergent_features:
      name: Χαρακτηριστικά απορρυπαντικού ρούχων
      description: Περιγράφει τα ειδικά χαρακτηριστικά του απορρυπαντικού ρούχων,
        όπως η προστασία των χρωμάτων ή η αφαίρεση των λεκέδων
    lead_grade:
      name: Βαθμός γραφίτη
      description: Καθορίζει τον βαθμό γραφίτη σε όργανα γραφής, π.χ. H, 9B
    leash_design:
      name: Σχέδιο λουριού
      description: Περιγράφει τη λειτουργικότητα των λουριών για κατοικίδια, όπως
        αποσπώμενα ή πτυσσόμενα
    leather/vinyl_texture:
      name: Υφή δέρματος/βινυλίου
      description: Περιγράφει την αίσθηση της επιφάνειας των προϊόντων δέρματος ή
        βινυλίου, όπως λεία ή κοκκώδης
    leather_type:
      name: Τύπος δέρματος
      description: Καθορίζει την πηγή ζώων ή τον τύπο δέρματος που χρησιμοποιείται
        στο προϊόν (π.χ. δέρμα αγελάδας, δέρμα μοσχαριού, κροκόδειλου, πύθωνα, συνθετικό)
    lectern_mounting_type:
      name: Τύπος τοποθέτησης αναλογίου
      description: Καθορίζει το στυλ τοποθέτησης ενός αναλογίου, όπως επιτραπέζιο
        ή επιδαπέδιο
    led_light_mode:
      name: Λειτουργία φωτός LED
      description: Απαριθμεί τις επιλέξιμες λειτουργίες που συνδυάζουν διαφορετικά
        φάσματα ή εντάσεις (π.χ., μπλε, κόκκινο, μπλε και κόκκινο).
    leg_color:
      name: Χρώμα ποδιών
      description: Καθορίζει την απόχρωση των ποδιών ενός προϊόντος, π.χ. λευκό, καφέ
    leg_lock_type:
      name: Τύπος κλειδώματος ποδιών
      description: Προσδιορίζει τον τύπο κλειδώματος ποδιών που χρησιμοποιείται σε
        ηλεκτρονικά αξεσουάρ, συνήθως σε ράβδους selfie, π.χ. βιδωτό κλείδωμα
    leg_material:
      name: Υλικό ποδιών
      description: Καθορίζει το υλικό που χρησιμοποιείται για τα πόδια ενός προϊόντος,
        όπως ξύλο κερασιάς ή μπαμπού
    leg_pattern:
      name: Μοτίβο ποδιών
      description: 'Καθορίζει το σχέδιο ή την εκτύπωση στα πόδια του προϊόντος, όπως
        ζώα ή γεωμετρικά μοτίβα '
    leg_sections:
      name: Τμήματα ποδιών
      description: Υποδεικνύει τον αριθμό των τμημάτων ποδιών σε ηλεκτρονικά αξεσουάρ,
        συνήθως σε ράβδους selfie, π.χ. 5+
    legend_type:
      name: Τύπος επιγραφής
      description: Υποδεικνύει εάν ο δείκτης είναι κενός ή προτυπωμένος με αριθμούς,
        γράμματα, σύμβολα ή άλλες σημάνσεις.
    length_adjustability:
      name: Ρυθμιζόμενο μήκος
      description: Υποδεικνύει εάν το μήκος του λουριού ή της αλυσίδας μπορεί να τροποποιηθεί
        από τον χρήστη ή είναι σταθερό.
    lens/slide_material:
      name: Υλικό φακού/διαφάνειας
      description: Καθορίζει το υλικό που χρησιμοποιείται για την κατασκευή φακών
        ή διαφανειών, όπως πλαστικό ή γυαλί
    lens_cap_compatible_device:
      name: Συσκευή συμβατή με κάλυμμα φακού
      description: Καθορίζει τον εξοπλισμό που είναι συμβατός με καλύμματα φακών,
        όπως μονοκυάλι ή ψηφιακή φωτογραφική μηχανή
    lens_case_accessories_included:
      name: Περιλαμβανόμενα αξεσουάρ θήκης φακών
      description: Αναφέρει πρόσθετα αντικείμενα που συσκευάζονται με τη θήκη (π.χ.,
        τσιμπιδάκι, μπουκάλι διαλύματος).
    lens_characteristic:
      name: Χαρακτηριστικό φακών
      description: Απαριθμεί ειδικά λειτουργικά χαρακτηριστικά που εφαρμόζονται στους
        φακούς (π.χ., μπλοκάρισμα μπλε φωτός, UV400).
    lens_coating:
      name: Επίστρωση φακού
      description: Καθορίζει τον τύπο επίστρωσης στους φακούς γυαλιών όρασης, π.χ.
        αντιανακλαστική, ανθεκτική στις γρατσουνιές
    lens_color:
      name: Χρώμα φακού
      description: Καθορίζει το χρώμα των φακών γυαλιών όρασης, όπως κίτρινο ή μαύρο
    lens_color_combination:
      name: Συνδυασμός χρώματος φακών
      description: Καθορίζει το ζεύγος χρωμάτων φακών που χρησιμοποιείται για αναγλυφικά
        γυαλιά 3D.
    lens_configuration:
      name: Διαμόρφωση φακού
      description: Καθορίζει τη ρύθμιση του φακού σε αντικείμενα όπως οι μεγεθυντικοί
        φακοί, μονοί ή πολλαπλοί
    lens_filter_category:
      name: Κατηγορία φίλτρου φακού
      description: Καθορίζει την ευρωπαϊκή τυπική κατηγορία φίλτρου (0–4) που κατατάσσει
        τους φακούς ανάλογα με την πυκνότητα απόχρωσής τους και τις συνθήκες φωτισμού
        για τις οποίες είναι κατάλληλοι.
    lens_filter_effects:
      name: Εφέ φίλτρου φακού
      description: Περιγράφει τα συγκεκριμένα εφέ που παρέχει ένα φίλτρο φακού, όπως
        διόρθωση χρώματος ή μάκρο
    lens_filter_type:
      name: Τύπος φίλτρου φακού
      description: Καθορίζει την κατηγορία φίλτρου για τους φακούς φωτογραφικής μηχανής,
        π.χ. ντεγκραντέ, ουδέτερη πυκνότητα
    lens_kit_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ κιτ φακών
      description: Παραθέτει τα συμπληρωματικά είδη που παρέχονται με τον φακό του
        τηλεφώνου ή το κιτ φίλτρου, ώστε οι αγοραστές να γνωρίζουν ακριβώς τι αγοράζουν
        και να μπορούν να συγκρίνουν πακέτα.
    lens_material:
      name: Υλικό φακού
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται για τα οπτικά στοιχεία
        ή το περίβλημα του φακού, όπως οπτικό γυαλί, πλαστικό ή κράμα αλουμινίου.
    lens_pattern:
      name: Μοτίβο φακού
      description: Περιγράφει το σχέδιο ή την οπτική εμφάνιση σε φακούς γυαλιών όρασης,
        όπως συμπαγείς ή με υφή
    lens_polarization:
      name: Πόλωση φακού
      description: Υποδεικνύει τον τύπο της πόλωσης του φακού στα γυαλιά όρασης, π.χ.
        φωτοπόλωση
    lens_protector_coverage_style:
      name: Στυλ κάλυψης προστατευτικού φακού
      description: Ορίζει τον φυσικό παράγοντα μορφής ή τον σχεδιασμό κάλυψης ενός
        προστατευτικού φακού κάμερας κινητού τηλεφώνου.
    lens_protector_features:
      name: Χαρακτηριστικά προστατευτικού φακού
      description: Παραθέτει ειδικές λειτουργικές δυνατότητες που προσφέρει το προστατευτικό.
    lens_refractive_index:
      name: Δείκτης διάθλασης φακού
      description: Καθορίζει τον αριθμητικό δείκτη διάθλασης (π.χ., 1,50, 1,60, 1,67)
        που συσχετίζεται άμεσα με το πάχος και το βάρος του φακού.
    lens_storage_type:
      name: Τύπος αποθήκευσης φακού
      description: Περιγράφει τον τύπο αποθήκευσης για φακούς φωτογραφικής μηχανής,
        όπως θήκη φακού ή τσάντα φακού
    lens_tint_type:
      name: Τύπος απόχρωσης φακού
      description: Περιγράφει την απόχρωση που εφαρμόζεται στον φακό για ορατότητα
        χειρισμού ή καλλυντικούς σκοπούς.
    lens_type:
      name: Τύπος φακού
      description: Καθορίζει τον τύπο φακού σε προϊόντα γυαλιών όρασης, όπως πολωμένος
        ή προοδευτικός
    license_type:
      name: Τύπος άδειας
      description: Καθορίζει τον τύπο άδειας χρήσης λογισμικού, όπως ανοιχτού κώδικα
        ή εφάπαξ αγορά
    lid_material:
      name: Υλικό καπακιού
      description: Προσδιορίζει το είδος υλικού που χρησιμοποιείται στο καπάκι ενός
        προϊόντος, όπως γυαλί ή ανοξείδωτος χάλυβας
    lid_type:
      name: Τύπος καπακιού
      description: Καθορίζει το είδος του καπακιού που χρησιμοποιείται, όπως αρθρωτό
        ή κουμπωτό
    life_jacket_features:
      name: Χαρακτηριστικά σωσιβίου
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των σωσίβιων, όπως ανακλαστικά
        ή πλωτά
    light_attachment_type:
      name: Τύπος στερέωσης φωτός
      description: Περιγράφει πώς συνδέεται ένα φως βιβλίου, όπως εύκαμπτο ή σταθερό
    light_color:
      name: Χρώμα φωτός
      description: Καθορίζει το χρώμα ή την απόχρωση του φωτός, όπως λευκό ή πολύχρωμο
    light_control:
      name: Έλεγχος φωτός
      description: Καθορίζει το επίπεδο παρακώλυσης του φωτός από καλύμματα παραθύρων,
        π.χ. συσκότιση, διαφανής κουρτίνα
    light_design:
      name: Σχεδιασμός φωτισμού
      description: Περιγράφει τον τύπο σχεδιασμού φωτισμού σε αξεσουάρ φωτογραφικής
        μηχανής, όπως LED ή δακτύλιος
    light_exposure_modes:
      name: Λειτουργίες έκθεσης στο φως
      description: Καθορίζει τις επιλογές προσαρμογής του φωτός στις φωτογραφικές
        μηχανές, όπως προτεραιότητα κλείστρου AE (A) ή προτεραιότητα διαφράγματος
        AE (S)
    light_filtering:
      name: Φιλτράρισμα φωτός
      description: Καθορίζει τις δυνατότητες φιλτραρίσματος φωτός ενός προϊόντος,
        όπως διάχυση ή συσκότιση
    light_options:
      name: Επιλογές φωτός
      description: Καθορίζει τα χαρακτηριστικά φωτισμού ενός προϊόντος, όπως απαλή
        λάμψη ή αλλαγή χρώματος
    light_pattern:
      name: Μοτίβο φωτός
      description: Καθορίζει το οπτικό θέμα των προϊόντων φωτισμού, για παράδειγμα
        γεωμετρικό ή ουράνιο τόξο
    light_rejection_type:
      name: Τύπος απόρριψης φωτός
      description: Υποδεικνύει εάν και πώς η οθόνη απορρίπτει το περιβάλλον ή το φως
        οροφής, βελτιώνοντας την αντίθεση εικόνας σε φωτεινά περιβάλλοντα.
    light_source:
      name: Πηγή φωτός
      description: Προσδιορίζει το είδος του λαμπτήρα που χρησιμοποιείται σε ένα προϊόν,
        όπως LED ή φθορισμού
    light_spectrum:
      name: Φάσμα φωτός
      description: Καθορίζει το εύρος των μηκών κύματος φωτός που μπορεί να παράγει
        ένα προϊόν, π.χ. μπλε φως, υπέρυθρο φως
    light_temperature:
      name: Θερμοκρασία φωτός
      description: Καθορίζει τα χρωματικά χαρακτηριστικά των πηγών φωτός, όπως το
        θερμό λευκό ή το φως της ημέρας
    light_therapy_device_form_factor:
      name: Μορφή συσκευής φωτοθεραπείας
      description: Περιγράφει το φυσικό στυλ ή τη διαμόρφωση της συσκευής (π.χ., πάνελ,
        μάσκα, φορητή).
    light_type:
      name: Τύπος φωτός
      description: Προσδιορίζει τον συγκεκριμένο τύπο φωτός που χρησιμοποιείται σε
        σκάφη, π.χ. πλοήγησης, υποβρύχιο
    lighting_features:
      name: Χαρακτηριστικά φωτισμού
      description: Περιγράφει ειδικά χαρακτηριστικά φωτισμού, όπως ρυθμιζόμενη φωτεινότητα
        ή φωτισμός LED
    lighting_options:
      name: Επιλογές φωτισμού
      description: Καθορίζει τον τύπο φωτισμού για σήμανση, όπως φωτιζόμενη ή μη
    lighting_type:
      name: Τύπος φωτισμού
      description: Περιγράφει οποιαδήποτε ενσωματωμένα χαρακτηριστικά φωτισμού του
        headset.
    line/rope_type:
      name: Τύπος σύρματος/σχοινιού
      description: Προσδιορίζει το στυλ κατασκευής των σχοινιών ή των συρμάτων αγκύρωσης,
        όπως τρίκλωνα ή με διπλό πλέγμα
    line_spacing_options:
      name: Επιλογές διάστιχου
      description: Προσδιορίζει τις επιλογές διάστιχου, συνήθως για γραφομηχανές.
        π.χ. διπλό, ρυθμιζόμενο
    liner_features:
      name: Χαρακτηριστικά επένδυσης
      description: Περιγράφει ειδικά χαρακτηριστικά των επενδύσεων, π.χ. αδιάβροχες
        ή βιοδιασπώμενες
    lip_balm_tint_level:
      name: Επίπεδο απόχρωσης βάλσαμου χειλιών
      description: Κατατάσσει το επίπεδο απόχρωσης ή απόδοσης χρώματος που παρέχει
        το βάλσαμο.
    lip_gloss_applicator_type:
      name: Τύπος απλικατέρ γκλος χειλιών
      description: Προσδιορίζει το στυλ του απλικατέρ που περιλαμβάνεται με το γκλος
        χειλιών, που επηρεάζει την ευκολία εφαρμογής και την προτίμηση του χρήστη.
    lip_gloss_effect:
      name: Αποτέλεσμα λιπ γκλος
      description: Περιγράφει το αποτέλεσμα ή το φινίρισμα που παρέχει ένα λιπ γκλος,
        π.χ. λείανση, γέμισμα
    lip_gloss_formulation:
      name: Σύνθεση γκλος χειλιών
      description: Καθορίζει την πρωτεύουσα υφή ή μορφή του γκλος χειλιών.
    lip_liner_design:
      name: Σχέδιο μολυβιού χειλιών
      description: Προσδιορίζει τον τύπο του μολυβιού χειλιών, όπως πτυσσόμενο ή σταθερό
    lip_makeup_opacity:
      name: Αδιαφάνεια μακιγιάζ χειλιών
      description: Υποδεικνύει το επίπεδο κάλυψης ή αδιαφάνειας του προϊόντος μετά
        την εφαρμογή.
    lip_plate_material:
      name: Υλικό πλάκας επιστομίου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται για την πλάκα επιστομίου
        ενός φλάουτου, όπως ασήμι ή ξύλο
    lipstick_coverage:
      name: Κάλυψη κραγιόν
      description: Περιγράφει το επίπεδο αδιαφάνειας χρώματος που παρέχεται από το
        κραγιόν (π.χ., ελαφριά, μέτρια, πλήρης).
    lipstick_effect:
      name: Αποτέλεσμα κραγιόν
      description: Περιγράφει το αποτέλεσμα ή το φινίρισμα που παρέχει ένα κραγιόν,
        π.χ. λείανση, γέμισμα
    liqueur_variety:
      name: Ποικιλία λικέρ
      description: Ταξινομεί τα λικέρ με βάση το κύριο γευστικό τους προφίλ, π.χ.
        ξηροί καρποί, κρέμα
    livestock_food_ingredients:
      name: Συστατικά ζωοτροφών
      description: Καθορίζει τα κύρια συστατικά στις ζωοτροφές, όπως το κριθάρι ή
        το σογιάλευρο
    lnb_output:
      name: Έξοδος LNB
      description: Καθορίζει τον αριθμό των συνδέσεων δορυφορικού δέκτη, όπως μονή
        ή τετραπλή
    lnb_technology:
      name: Τεχνολογία LNB
      description: Ταξινομεί τον τύπο τεχνολογίας στους δορυφορικούς ενισχυτές χαμηλού
        θορύβου (LNB), όπως γενικής χρήσης ή χαμηλού θορύβου
    load_capacity:
      name: Φέρουσα ικανότητα
      description: Καθορίζει το όριο βάρους που μπορεί να χειριστεί ένα προϊόν, όπως
        για ελαφρά ή βαριά χρήση
    loading_ramp_type:
      name: Τύπος ράμπας φόρτωσης
      description: Προσδιορίζει το στυλ της ράμπας φόρτωσης για οχήματα, όπως μονή
        ή τριών πτυχώσεων
    loading_type:
      name: Τύπος γεμίσματος
      description: Καθορίζει τον τρόπο γεμίσματος των πλυντηρίων ρούχων, όπως από
        εμπρός ή από πάνω
    lock_placement:
      name: Τοποθέτηση κλειδαριάς
      description: Προσδιορίζει πού είναι τοποθετημένη η κλειδαριά σε μέρη του κινητήρα
        σκάφους, όπως εξωλέμβια ή εσωλέμβια
    lock_type:
      name: Τύπος κλειδαριάς
      description: Καθορίζει τον μηχανισμό κλειδώματος που χρησιμοποιεί ένα προϊόν,
        όπως κλειδί ή κωδικός
    locking_mechanism:
      name: Μηχανισμός κλειδώματος
      description: Καθορίζει τον τύπο κλειδαριάς που χρησιμοποιείται, συνήθως για
        προϊόντα ασφαλείας, π.χ. αυτόματο κλείσιμο, συρόμενη
    logic_family:
      name: Οικογένεια λογικής
      description: Προσδιορίζει την οικογένεια λογικής ημιαγωγών ή την τεχνολογία
        του IC.
    lovibond:
      name: Lovibond
      description: Υποδεικνύει την ένταση του χρώματος των σιτηρών και των βυνών της
        ζυθοποιίας, όπως ανοιχτό ή σκούρο
    lubricant_application:
      name: Εφαρμογή λιπαντικού
      description: Καθορίζει τις κατάλληλες περιοχές εφαρμογής για λιπαντικό ατομικής
        φροντίδας, όπως μασάζ ή κολπικό
    lubricant_composition:
      name: Σύνθεση λιπαντικού
      description: Καθορίζει το βασικό συστατικό των λιπαντικών ατομικής φροντίδας,
        όπως το νερό ή η σιλικόνη
    lubricant_dispenser_type:
      name: Τύπος διανομέα λιπαντικού
      description: Προσδιορίζει τον τύπο συσκευασίας ή δοχείου για λιπαντικά, όπως
        δοχείο ή μπουκάλι
    lubricant_effect:
      name: Επίδραση λιπαντικού
      description: Υποδεικνύει οποιαδήποτε λειτουργική επίδραση ή στυλ που παρέχεται
        από τη λίπανση του προφυλακτικού.
    lubricant_form:
      name: Μορφή λιπαντικού
      description: Περιγράφει την πυκνότητα ενός λιπαντικού, όπως γέλη ή πάστα
    luggage/bag_closure:
      name: Κλείσιμο αποσκευών/τσαντών
      description: Προσδιορίζει τον τύπο κλεισίματος που χρησιμοποιείται στις αποσκευές
        ή τις τσάντες, όπως φερμουάρ ή κούμπωμα
    lumber/wood_type:
      name: Τύπος ξυλείας/ξύλου
      description: Προσδιορίζει τον συγκεκριμένο τύπο ξύλου ή ξυλείας που χρησιμοποιείται
        σε ένα προϊόν, όπως δρυς ή πεύκο
    lyre/flip_folder_attachment_type:
      name: Τύπος προσάρτησης αναλογίου/τετραδίου αναλογίου
      description: Καθορίζει τον τύπο προσάρτησης για αναλόγια μουσικής και φακέλους
        αναλογίου, όπως ιμάντας ή σφιγκτήρας
    m_2_drive_length_supported:
      name: Υποστηριζόμενο μήκος δίσκου M.2
      description: Καθορίζει ποια μήκη καρτών M.2 μπορεί να δεχτεί το περίβλημα ή
        ο προσαρμογέας.
    magnet_type:
      name: Τύπος μαγνήτη
      description: Προσδιορίζει τον τύπο του μαγνήτη που χρησιμοποιείται σε ένα προϊόν,
        π.χ. κεραμικός, τιτανίου
    magnification:
      name: Μεγέθυνση
      description: Καθορίζει τη μεγεθυντική ισχύ ενός προϊόντος, όπως 1x ή 100x
    magsafe_compatibility:
      name: Συμβατότητα με MagSafe
      description: Υποδεικνύει εάν το αξεσουάρ υποστηρίζει το μαγνητικό εξάρτημα ή
        το οικοσύστημα φόρτισης MagSafe της Apple.
    makeup_brush_application:
      name: Εφαρμογή πινέλου μακιγιάζ
      description: Καθορίζει την πρωτεύουσα καλλυντική χρήση ή περιοχή για την οποία
        είναι σχεδιασμένο το πινέλο (π.χ., φοντ ντε τεν, σκιά ματιών, κοντούρ).
    makeup_features:
      name: Χαρακτηριστικά μακιγιάζ
      description: Επισημαίνει τα βασικά χαρακτηριστικά των καλλυντικών, όπως η υψηλή
        περιεκτικότητα σε χρωστικές ή η έλλειψη αρωματικών ουσιών
    makeup_shade:
      name: Απόχρωση μακιγιάζ
      description: Περιγράφει την απόχρωση των καλλυντικών, όπως το απαλό ροζ ή το
        έντονο καστανό
    mallet_material:
      name: Υλικό κόπανου
      description: Προσδιορίζει τον τύπο υλικού που χρησιμοποιείται στους κόπανους
        κρουστών, όπως ορείχαλκος ή καουτσούκ
    management_type:
      name: Τύπος διαχείρισης
      description: Περιγράφει το επίπεδο διαχείρισης της συσκευής (π.χ., πλήρως διαχειριζόμενη,
        έξυπνη διαχειριζόμενη, μη διαχειριζόμενη), ώστε οι αγοραστές να μπορούν να
        αντιστοιχίσουν τις δυνατότητες του προϊόντος με τις απαιτήσεις δικτύου.
    mandibular_device_fitting_method:
      name: Μέθοδος εφαρμογής γναθικής συσκευής
      description: Περιγράφει πώς η συσκευή προσαρμόζεται ή διαμορφώνεται στα δόντια
        του χρήστη.
    mandolin_back_shape:
      name: Σχήμα πλάτης μαντολίνου
      description: Διευκρινίζει την καμπύλη και το σχέδιο της πλάτης του μαντολίνου,
        όπως πλακέ ή κλασικό μαντολίνο.
    manufacturer_type:
      name: Τύπος κατασκευαστή
      description: Καθορίζει την προέλευση των ανταλλακτικών ή αξεσουάρ οχημάτων,
        όπως γνήσια ή τρίτων
    map_update_policy:
      name: Πολιτική ενημέρωσης χαρτών
      description: Δηλώνει πώς παρέχονται ή τιμολογούνται οι ενημερώσεις χαρτών για
        τη συσκευή.
    marine_navigator_features:
      name: Χαρακτηριστικά θαλάσσιου πλοηγού
      description: Καθορίζει τις δυνατότητες των εργαλείων θαλάσσιας πλοήγησης, όπως
        οθόνη αφής ή αδιάβροχο
    marker_format:
      name: Μορφή δείκτη
      description: Καθορίζει το φυσικό στυλ ή την κατασκευή του δείκτη.
    marker_text_color:
      name: Χρώμα κειμένου δείκτη
      description: Καθορίζει το χρώμα της τυπωμένης επιγραφής ή του κειμένου στην
        επιφάνεια του δείκτη (διακριτό από το χρώμα σώματος του δείκτη).
    marker_tip_design:
      name: Σχεδιασμός μύτης μαρκαδόρου
      description: Περιγράφει το σχήμα της μύτης ενός μαρκαδόρου, όπως σφαίρα ή σμίλη
    marquee_substrate:
      name: Υπόστρωμα μαρκίζας
      description: Καθορίζει το φυσικό μέσο στο οποίο εκτυπώνεται ή παρέχεται το έργο
        τέχνης (π.χ., φιλμ translite, ακρυλικό με αντίστροφη εκτύπωση, αυτοκόλλητο
        βινυλίου).
    mascara_brush_shape:
      name: Σχήμα βούρτσας μάσκαρα
      description: Καθορίζει το σχήμα ή τον σχεδιασμό του ενσωματωμένου ραβδιού ή
        βούρτσας πράιμερ, που επηρεάζει έντονα την εφαρμογή και τα αποτελέσματα.
    mascara_effect:
      name: Αποτέλεσμα μάσκαρα
      description: Περιγράφει το επιδιωκόμενο αποτέλεσμα ή χαρακτηριστικό της μάσκαρα,
        π.χ. γύρισμα, επιμήκυνση
    mascara_formulation:
      name: Σύνθεση μάσκαρα
      description: Υποδεικνύει τη βασική σύνθεση του προϊόντος ή την ειδική τεχνολογία
        (π.χ., υγρή, εμπλουτισμένη με ίνες, σωληνάρια) που επηρεάζει την υφή, τη φθορά
        και την αφαίρεση.
    mask_cushion_material:
      name: Υλικό μαξιλαριού μάσκας
      description: Περιγράφει λεπτομερώς το συγκεκριμένο υλικό που χρησιμοποιείται
        για το μαξιλάρι ή τη σφράγιση της μάσκας.
    mask_size:
      name: Μέγεθος μάσκας
      description: Καθορίζει την ονομασία μεγέθους που παρέχεται από τον κατασκευαστή.
    mask_type:
      name: Τύπος μάσκας
      description: Καθορίζει τον σχεδιασμό των μασκών, συνήθως για αναπνευστική φροντίδα,
        π.χ. προσώπου, ρινική
    masonry_material:
      name: Υλικό τοιχοποιίας
      description: Καθορίζει τη σύνθεση των ειδών τοιχοποιίας, όπως τσιμέντο ή ασβεστόλιθος
    masonry_product_form:
      name: Μορφή προϊόντος τοιχοποιίας
      description: Καθορίζει τη μορφή των προϊόντων τοιχοποιίας, όπως πάστα ή σκόνη
    massage_area:
      name: Σημείο μασάζ
      description: Καθορίζει το σημείο του σώματος στο οποίο έχει σχεδιαστεί να κάνει
        μασάζ το προϊόν, όπως τα πόδια ή ο λαιμός
    massage_mechanism_dimensionality:
      name: Διαστατικότητα μηχανισμού μασάζ
      description: Καθορίζει τον αριθμό αξόνων κίνησης στους οποίους λειτουργούν οι
        κύλινδροι μασάζ (π.χ., 2D, 3D, 4D, 5D).
    massage_stone_texture:
      name: Υφή λίθου μασάζ
      description: Περιγράφει την αίσθηση της επιφάνειας των λίθων μασάζ, όπως λεία
        ή τραχιά
    massage_technique:
      name: Τεχνική μασάζ
      description: Καθορίζει τις μεθόδους μασάζ που προσφέρει ένα προϊόν, π.χ. κρουστικό,
        βαθύ μασάζ ιστών
    mat/rug_shape:
      name: Σχήμα χαλακιών/χαλιών
      description: Περιγράφει το σχήμα που έχουν τα χαλάκια ή τα χαλιά, όπως στρογγυλά
        ή τετράγωνα
    mat_base_material:
      name: Υλικό βάσης σε χαλάκι
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται για τη βάση στα
        χαλάκια, δηλ. φελλό, αφρό μνήμης
    mat_features:
      name: Χαρακτηριστικά χαλακιών
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά που έχουν τα χαλάκια για
        το σπίτι ή το γραφείο, όπως αντιολισθητική βάση ή αδιάβροχο
    material:
      name: Υλικό
      description: Καθορίζει το κύριο υλικό ενός προϊόντος, όπως βαμβάκι ή μαλλί
    material_firmness:
      name: Ακαμψία υλικού
      description: Περιγράφει τη σκληρότητα ή την απαλότητα ενός προϊόντος, π.χ. άκαμπτο,
        εύκαμπτο
    material_hardness:
      name: Σκληρότητα υλικού
      description: Καθορίζει τη σκληρότητα του προϊόντος, συνήθως για αθλητικό εξοπλισμό
        ή εξοπλισμό γυμναστικής, π.χ. εξαιρετικά μαλακό, υψηλής αντοχής
    material_origin:
      name: Προέλευση υλικού
      description: Υποδεικνύει τη μορφή ή την κατάσταση στην οποία παρέχονται τα πολύτιμα
        υλικά (π.χ., χύμα/μη τοποθετημένα, ολοκληρωμένα κοσμήματα, έντυπη/ψηφιακή
        δωροκάρτα)
    material_treatment:
      name: Επεξεργασία υλικού
      description: Καθορίζει τις χημικές ή φυσικές επεξεργασίες που εφαρμόζονται στα
        υλικά για λόγους συντήρησης ή ασφάλειας (π.χ. θερμική επεξεργασία, υποκαπνισμός,
        χημική επεξεργασία)
    maternity_clothing_features:
      name: Χαρακτηριστικά ρούχων εγκυμοσύνης
      description: Περιγράφει μοναδικά χαρακτηριστικά του ρουχισμού εγκυμοσύνης, π.χ.
        χώρος για την ανάπτυξη της κοιλιάς, υποστηρικτικές υποδοχές
    maternity_sleepwear_style:
      name: Στυλ ρούχων ύπνου εγκυμοσύνης
      description: Καθορίζει το στυλ των ειδών ύπνου εγκυμοσύνης, όπως φόρμα ή πουκάμισο
        ύπνου
    mattress_features:
      name: Χαρακτηριστικά στρώματος
      description: Επισημαίνει τα ιδιαίτερα χαρακτηριστικά ενός στρώματος, όπως το
        ότι είναι υποαλλεργικό ή η λειτουργία ψύξης
    maximum_bit_depth:
      name: Μέγιστο βάθος bit
      description: Καθορίζει το υψηλότερο ψηφιακό μήκος λέξης (σε bit) που υποστηρίζει
        ο μετατροπέας, επηρεάζοντας το δυναμικό εύρος και την ανάλυση.
    maximum_magnification:
      name: Μέγιστη μεγέθυνση
      description: Υποδεικνύει τον υψηλότερο παράγοντα μεγέθυνσης που μπορεί να επιτύχει
        ένα μικροσκόπιο, όπως 10x ή 100x
    maximum_reel_diameter_supported:
      name: Μέγιστη υποστηριζόμενη διάμετρος καρουλιού
      description: Καθορίζει τη μεγαλύτερη διάμετρο καρουλιού που μπορεί να φιλοξενήσει
        το deck.
    measured_parameters:
      name: Μετρούμενες παράμετροι
      description: Απαριθμεί τις ηλεκτρικές μετρήσεις ή μετρήσεις μπαταρίας που μπορεί
        να μετρήσει ή να εμφανίσει η συσκευή.
    measuring_method:
      name: Μέθοδος μέτρησης
      description: Καθορίζει την τεχνική που χρησιμοποιείται για τον ποσοτικό προσδιορισμό
        του σωματικού λίπους, π.χ. οπτική, λιπομέτρηση
    measuring_tool_features:
      name: Χαρακτηριστικά εργαλείου μέτρησης
      description: Περιγράφει τα ειδικά χαρακτηριστικά των εργαλείων μέτρησης, όπως
        ενσωματωμένη κάμερα ή φορητό
    measuring_type:
      name: Τύπος μέτρησης
      description: Καθορίζει τη μέθοδο μέτρησης για συσκευές υγείας, π.χ. μέτωπο,
        δάχτυλο
    meat_cut:
      name: Κοπή κρέατος
      description: Βοηθά στον προσδιορισμό της συγκεκριμένης κοπής ή του τύπου κρέατος,
        π.χ. μπιφτέκι, φτερούγες
    meat_type:
      name: Τύπος κρέατος
      description: Προσδιορίζει την πηγή των ειδών κρέατος, π.χ. φυτικής προέλευσης,
        κοτόπουλο
    media_access:
      name: Πρόσβαση στα μέσα
      description: Καθορίζει τον τρόπο με τον οποίο οι πελάτες μπορούν να έχουν πρόσβαση
        σε μέσα, π.χ. ψηφιακή συνδρομή, έντυπα και ηλεκτρονικά
    media_content_type:
      name: Τύπος περιεχομένου μέσων
      description: Προσδιορίζει το είδος ή την κατηγορία περιεχομένου μέσων, όπως
        ριάλιτι τηλεόραση ή stand-up κωμωδία
    media_format:
      name: Μορφή μέσων
      description: Καθορίζει τις συμβατές μορφές μέσων για μια συσκευή, όπως βινύλιο
        ή VHS
    media_physical_size:
      name: Φυσικό μέγεθος μέσου
      description: Καθορίζει το τυποποιημένο φυσικό μέγεθος ή τον παράγοντα μορφής
        του κενού μέσου.
    media_player_form_factor:
      name: Μορφή συσκευής αναπαραγωγής πολυμέσων
      description: Περιγράφει το φυσικό στυλ της συσκευής, βοηθώντας τους αγοραστές
        να επιλέξουν μεταξύ συμπαγών sticks και μεγαλύτερων set-top boxes.
    media_section:
      name: Κατηγορία μέσων
      description: Προσδιορίζει τη συγκεκριμένη κατηγορία μιας εφημερίδας ή ενός περιοδικού,
        όπως αθλητικά ή πολιτική
    media_theme:
      name: Θέμα μέσων
      description: Κατηγοριοποιεί το περιεχόμενο μέσων με βάση την κύρια εστίασή του,
        όπως ταξίδια ή βιντεοπαιχνίδια
    medical_alarm_features:
      name: Χαρακτηριστικά ιατρικού συναγερμού
      description: Περιγράφει τις δυνατότητες ενός συστήματος ιατρικού συναγερμού,
        όπως μεγάλη διάρκεια ζωής μπαταρίας ή αμφίδρομη επικοινωνία
    medical_device_certification:
      name: Πιστοποίηση ιατρικής συσκευής
      description: Απαριθμεί κανονιστικές εγκρίσεις ή πρότυπα με τα οποία συμμορφώνεται
        η βιομετρική οθόνη (π.χ., CE, FDA 510(k)).
    medical_identification_type:
      name: Τύπος ιατρικής ταυτότητας
      description: Προσδιορίζει τη μορφή μιας ιατρικής ταυτότητας, όπως βραχιόλι ή
        κολιέ
    medical_symbol:
      name: Ιατρικό σύμβολο
      description: Καθορίζει το σύμβολο που εμφανίζεται στο κόσμημα ή την ετικέτα,
        βοηθώντας στη γρήγορη αναγνώριση από τους πρώτους βοηθούς.
    medical_syringe_purpose:
      name: Σκοπός ιατρικής σύριγγας
      description: Προσδιορίζει την προβλεπόμενη χρήση μιας ιατρικής σύριγγας, όπως
        για ένεση ή καταιονισμός
    medical_tape_material:
      name: Υλικό ιατρικής ταινίας
      description: Προσδιορίζει τη σύνθεση ιατρικής ταινίας, όπως πλαστικό ή λάτεξ
    medicine/drug_form:
      name: Μορφή φαρμάκου
      description: Προσδιορίζει τη φυσική μορφή ενός φαρμάκου, όπως δισκία ή υγρό
    medicine/supplement_form:
      name: Μορφή φαρμάκου/συμπληρώματος
      description: Προσδιορίζει τη φυσική μορφή ενός φαρμάκου ή συμπληρώματος, όπως
        κάψουλες ή υγρό
    medium:
      name: Μέσο
      description: Προσδιορίζει τον τύπο ενός συλλεκτικού είδους, όπως αναμνηστικό
        ή κάρτα προς συλλογή
    melodica_style:
      name: Στυλ μελόντικας
      description: Καθορίζει το στυλ διάταξης μιας μελόντικας, όπως στυλ πιάνου ή
        στυλ αρμονίου
    memory_channels:
      name: Κανάλια μνήμης
      description: Καθορίζει την ικανότητα μετάδοσης δεδομένων των επεξεργαστών υπολογιστών,
        όπως dual ή quad
    memory_form_factor:
      name: Συντελεστής μορφής μνήμης
      description: Καθορίζει τη φυσική διάταξη των μονάδων μνήμης, όπως DIMM ή micro-DIMM
    memory_rank:
      name: Τάξη μνήμης
      description: Υποδεικνύει τη διάταξη τάξης της μονάδας (πώς οργανώνονται τα chip),
        επηρεάζοντας τη συμβατότητα και τη ρύθμιση απόδοσης.
    memory_storage_type:
      name: Τύπος αποθήκευσης μνήμης
      description: Προσδιορίζει τον τύπο αποθήκευσης μνήμης που χρησιμοποιείται σε
        κάμερες, όπως κάρτα Micro SD ή ενσωματωμένη μνήμη
    memory_technology:
      name: Τεχνολογία μνήμης
      description: Καθορίζει τον τύπο της μνήμης που χρησιμοποιείται σε ηλεκτρονικές
        συσκευές, όπως DDR ή SDRAM
    menstrual_cup_shape:
      name: Σχήμα εμμηνορροϊκού κυπέλλου
      description: Περιγράφει τη μορφή των εμμηνορροϊκών κύπελλων, π.χ. καμπάνα, σε
        σχήμα V
    menstrual_cup_size:
      name: Μέγεθος κυπέλλου περιόδου
      description: Υποδεικνύει την κατηγορία μεγέθους με ετικέτα κατασκευαστή (π.χ.,
        μικρό, Μέγεθος 1).
    menstrual_cup_stem_type:
      name: Τύπος στελέχους κυπέλλου περιόδου
      description: Καθορίζει τον σχεδιασμό του στελέχους ή της λαβής αφαίρεσης του
        κυπέλλου.
    mesh_networking_technology:
      name: Τεχνολογία δικτύωσης mesh
      description: Καθορίζει εάν το σημείο πρόσβασης υποστηρίζει δυνατότητα mesh και
        το πρότυπο ή πρωτόκολλο που χρησιμοποιείται.
    mesh_type:
      name: Τύπος πλέγματος
      description: Καθορίζει το στυλ ή την κατασκευή του υφασμάτινου πλέγματος, υποδεικνύοντας
        την προβλεπόμενη χρήση ή τα χαρακτηριστικά του, π.χ. αθλητικό, ξυσμένο
    metal_detector_features:
      name: Χαρακτηριστικά ανιχνευτή μετάλλων
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των ανιχνευτών μετάλλων,
        π.χ. θήκη, αδιάβροχος
    metal_molding_application:
      name: Εφαρμογή χύτευσης μετάλλων
      description: Προσδιορίζει την προβλεπόμενη χρήση των καλουπιών χύτευσης μετάλλων,
        όπως κοσμήματα ή ειδώλια
    meter_type:
      name: Τύπος μετρητή
      description: Προσδιορίζει τον τύπο του μετρητή που χρησιμοποιείται στα συστήματα
        καυσίμων των σκαφών, όπως ψηφιακός ή αναλογικός
    metrics_supported:
      name: Υποστηριζόμενες μετρήσεις
      description: Καθορίζει τους τύπους βιομετρικών μετρήσεων που παρέχει ένα προϊόν,
        π.χ. οστική μάζα, μυϊκή μάζα
    micrometer_type:
      name: Τύπος μικρομέτρου
      description: Προσδιορίζει τη συγκεκριμένη εφαρμογή ή τον σχεδιασμό ενός μικρομέτρου,
        όπως λεπίδα ή κύλινδρος
    microphone_design:
      name: Σχεδιασμός μικροφώνου
      description: Καθορίζει την κατηγορία σχεδιασμού για μικρόφωνα, π.χ. πυκνωτικό,
        δυναμικό
    microphone_preamp_form_factor:
      name: Μορφή προενισχυτή μικροφώνου
      description: Προσδιορίζει το φυσικό στυλ ή τη μορφή περιβλήματος του προενισχυτή
        μικροφώνου για εγκατάσταση ή χρήση.
    microphone_thread:
      name: Σπείρωμα μικροφώνου
      description: Καθορίζει το μέγεθος του σπειρόματος για μικρόφωνα, π.χ. 1/4"-20,
        M6
    microphone_type:
      name: Τύπος μικροφώνου
      description: Καθορίζει την τεχνολογία μικροφώνου που χρησιμοποιείται, όπως πυκνωτικό
        ή δυναμικό
    microphone_windshield_type:
      name: Τύπος ανεμοθώρακα μικροφώνου
      description: Καθορίζει το στυλ κατασκευής του ανεμοθώρακα (π.χ., αφρώδες κάλυμμα,
        γούνινο deadcat, blimp, καλάθι), ώστε οι χρήστες να μπορούν να επιλέξουν γρήγορα
        την κατάλληλη λύση θορύβου ανέμου.
    microscope_features:
      name: Χαρακτηριστικά μικροσκοπίου
      description: Επισημαίνει τις μοναδικές πτυχές των μικροσκοπίων, όπως η φορητότητα
        ή η λειτουργία μνήμης
    microscope_slide_material:
      name: Υλικό αντικειμενοφόρου πλάκας μικροσκοπίου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στις αντικειμενοφόρες
        πλάκες μικροσκοπίου, όπως γυαλί ή πλαστικό
    midi_connectivity:
      name: Συνδεσιμότητα MIDI
      description: Προσδιορίζει τον τύπο σύνδεσης MIDI σε μουσικά όργανα, όπως MIDI
        in ή USB midi
    mimo_technology:
      name: Τεχνολογία MIMO
      description: Υποδεικνύει την ασύρματη τεχνολογία Multiple-Input Multiple-Output
        που υποστηρίζεται από τον δρομολογητή.
    mineral_class:
      name: Κατηγορία ορυκτού
      description: Προσδιορίζει τη συγκεκριμένη κατηγορία ενός ορυκτού, όπως οξείδια
        ή πυριτικά άλατα
    mineral_compound_form:
      name: Μορφή ανόργανης ένωσης
      description: Καθορίζει τη χημική μορφή ή το χηλικό του μετάλλου (π.χ., κιτρικό,
        γλυκινικό) που επηρεάζει την απορρόφηση.
    minimum_magnification:
      name: Ελάχιστη μεγέθυνση
      description: Υποδεικνύει το χαμηλότερο επίπεδο μεγέθυνσης ενός φακού μικροσκοπίου,
        όπως 1x ή 0,5x
    mirror_handle_design:
      name: Σχέδιο λαβής καθρέφτη
      description: Περιγράφει το στυλ της λαβής στους οδοντιατρικούς καθρέφτες, όπως
        διπλού ή μονού άκρου
    mirror_sides:
      name: Πλευρές καθρέφτη
      description: Υποδεικνύει τον αριθμό ή τη διαμόρφωση των ανακλαστικών επιφανειών
        που έχει ένας καθρέφτης (π.χ., μονής όψης, διπλής όψης, τριπλής).
    mist_application_area:
      name: Περιοχή εφαρμογής ομίχλης
      description: Υποδεικνύει την προτιθέμενη περιοχή(-ες) χρήσης για την ομίχλη
        (π.χ., σώμα, μαλλιά, δωμάτιο, λινό).
    mixer_type:
      name: Τύπος μίκτη
      description: Ταξινομεί τους μίκτες DJ βάσει του σχεδιασμού τους, όπως ψηφιακός
        ή scratch
    mobile_mounting_type:
      name: Τύπος τοποθέτησης μόμπιλε
      description: Καθορίζει πού μπορεί να στερεωθεί ένα βρεφικό μόμπιλε, π.χ. κούνια,
        καρότσι
    mobile_movement:
      name: Κινητή μόμπιλε
      description: Περιγράφει τον μηχανισμό των βρεφικών μόμπιλε, όπως λειτουργία
        με μπαταρία ή κουρδιστά
    mobile_phone_accessories_included:
      name: Αξεσουάρ κινητού τηλεφώνου που περιλαμβάνονται
      description: Αναφέρει τα συμπληρωματικά αντικείμενα που παρέχονται στο σετ αξεσουάρ
        κινητού τηλεφώνου ώστε οι αγοραστές να γνωρίζουν ακριβώς ποια εξαρτήματα περιλαμβάνονται.
    mobile_phone_case_features:
      name: Χαρακτηριστικά θήκης κινητού τηλεφώνου
      description: Περιγράφει τα μοναδικά χαρακτηριστικά μιας θήκης κινητού τηλεφώνου,
        όπως αντικραδασμική ή εφαρμοστή
    mobile_phone_connector_type:
      name: Τύπος υποδοχής κινητού τηλεφώνου
      description: Προσδιορίζει το πρότυπο διεπαφής μιας ανταλλακτικής μονάδας φόρτισης
        ή θύρας δεδομένων.
    mobile_phone_form_factor:
      name: Συντελεστής μορφής κινητού τηλεφώνου
      description: Φυσικό στυλ σχεδίασης της συσκευής.
    mobility/accessibility_equipment_features:
      name: Χαρακτηριστικά εξοπλισμού κινητικότητας/προσβασιμότητας
      description: Περιγράφει μοναδικά χαρακτηριστικά των βοηθημάτων προσβασιμότητας,
        όπως μεγάλη διάρκεια ζωής μπαταρίας ή διακοπή έκτακτης ανάγκης
    mobility_scooter_type:
      name: Τύπος σκούτερ μεταφοράς
      description: Κάνει διάκριση μεταξύ διαφορετικών τύπων σκούτερ μεταφοράς, π.χ.
        φορητά, τρίτροχα
    mobility_type:
      name: Τύπος κινητικότητας
      description: Υποδεικνύει το στυλ βάσης που επηρεάζει την κινητικότητα, διακρίνοντας
        μεταξύ σταθερών ποδιών, τροχών ή εναλλάξιμων επιλογών.
    model_control_technology:
      name: Τεχνολογία ελέγχου μοντέλου
      description: Καθορίζει τον τύπο του συστήματος ελέγχου για τα μοντέλα τρένων,
        όπως ασύρματο ή ψηφιακό
    model_gender_representation:
      name: Αναπαράσταση φύλου μοντέλου
      description: Καθορίζει αν το ανθρώπινο μοντέλο απεικονίζει ανδρική, γυναικεία
        ή ανατομία και για τα δύο φύλα.
    model_train_accessory_type:
      name: Τύπος αξεσουάρ μοντέλων τρένων
      description: Ταξινομεί τα αξεσουάρ μοντέλων τρένων, όπως υλικά φωτισμού ή τοπίου
    model_train_theme:
      name: Θέμα μοντέλου τρένου
      description: Προσδιορίζει το σκηνικό ή την εποχή ενός σετ μοντέλου τρένου, όπως
        σύγχρονο ή επιστημονικής φαντασίας
    modem_form_factor:
      name: Μορφή μόντεμ
      description: Περιγράφει το φυσικό στυλ σχεδίασης του μόντεμ (π.χ., USB dongle,
        μονάδα επιτραπέζια, μονάδα M.2).
    modem_technology:
      name: Τεχνολογία μόντεμ
      description: Καθορίζει το πρωτεύον μέσο μετάδοσης ή την τεχνολογία δικτύωσης
        που χρησιμοποιεί το μόντεμ για πρόσβαση στο δίκτυο παρόχου υπηρεσιών (π.χ.,
        Cable/DOCSIS, DSL, Κυψελοειδής).
    modulation_method:
      name: Μέθοδος διαμόρφωσης
      description: Καθορίζει την τεχνική που χρησιμοποιείται για την τροποποίηση ενός
        σήματος σε ηλεκτρονικές συσκευές, όπως AM ή PCM
    moisturizer_type:
      name: Τύπος ενυδατικής κρέμας
      description: Προσδιορίζει τον χρόνο χρήσης της ενυδατικής κρέμας, όπως ημέρας
        ή νυχτός
    mold/cut_shape:
      name: Σχήμα καλουπιού/κοπής
      description: Περιγράφει το σχήμα ή το σχέδιο ενός καλουπιού ή μιας κοπής χειροτεχνίας,
        όπως αστέρι ή ζώο
    mold_shape:
      name: Σχήμα καλουπιού
      description: Περιγράφει το σχήμα ή το σχέδιο ενός καλουπιού χειροτεχνίας, όπως
        στρογγυλό ή γράμμα
    molding_application:
      name: Εφαρμογή καλουπώματος
      description: Καθορίζει τον τύπο καλουπώματος που χρησιμοποιείται στις οικοδομές,
        όπως περίβλημα ή κιγκλίδωμα καρέκλας
    molding_shape:
      name: Σχήμα καλουπώματος
      description: Περιγράφει το σχήμα ή τον σχεδιασμό ενός καλουπιού από σκυρόδεμα,
        όπως κυβόσχημο τεμάχιο ή στήλη
    monitor/screen_specialized_features:
      name: Ειδικά χαρακτηριστικά μόνιτορ/οθόνης
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά μιας οθόνης, όπως ενσωματωμένα
        ηχεία ή καταλληλότητα για βιντεοπαιχνίδια
    monitor_mounting_type:
      name: Τύπος τοποθέτησης οθόνης
      description: Προσδιορίζει τον τρόπο εγκατάστασης μιας οθόνης ασφαλείας, όπως
        επιτοίχια ή ελεύθερης τοποθέτησης
    monitor_shape:
      name: Σχήμα οθόνης
      description: Καθορίζει το περίγραμμα μιας οθόνης, όπως επίπεδη ή κυρτή
    monitor_specialized_features:
      name: Ειδικά χαρακτηριστικά οθόνης
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά μιας οθόνης υπολογιστή,
        όπως υποστήριξη 3D ή ρυθμιζόμενη γωνία θέασης
    monitor_type:
      name: Τύπος οθόνης
      description: Καθορίζει τον τύπο της οθόνης μιας κάμερας, π.χ. οθόνη αφής, HDR
    monitoring_method:
      name: Μέθοδος παρακολούθησης
      description: Προσδιορίζει τη φυσιολογική τεχνική που χρησιμοποιεί η συσκευή
        για τη λήψη μετρήσεων γλυκόζης.
    monitoring_service_type:
      name: Τύπος υπηρεσίας παρακολούθησης
      description: Υποδεικνύει αν το σύστημα παρακολουθείται επαγγελματικά 24/7, αυτοπαρακολουθείται
        ή δεν παρακολουθείται.
    monocular_design:
      name: Σχεδιασμός μονοκυαλίου
      description: Προσδιορίζει τη λειτουργικότητα ενός μονοκυαλίου, όπως ζουμ ή νυχτερινή
        όραση
    motherboard_chipset_family:
      name: Οικογένεια chipset μητρικής πλακέτας
      description: Καθορίζει τον τύπο του chipset σε μια μητρική πλακέτα, όπως Intel
        ή NVIDIA
    motherboard_form_factor:
      name: Παράγοντας μορφής μητρικής πλακέτας
      description: Καθορίζει τις φυσικές διαστάσεις και τα πρότυπα της μητρικής πλακέτας,
        π.χ. ATX, Mini-ITX
    motherboard_memory_features:
      name: Χαρακτηριστικά μνήμης μητρικής πλακέτας
      description: Περιγράφει τα χαρακτηριστικά μνήμης μιας μητρικής πλακέτας, όπως
        ECC ή χωρίς προσωρινή μνήμη
    motion:
      name: Κίνηση
      description: Καθορίζει τον τύπο κίνησης του βρεφικού εξοπλισμού, όπως δόνηση
        ή αναπήδηση
    motion_sensor_type:
      name: Τύπος αισθητήρα κίνησης
      description: Προσδιορίζει την τεχνολογία που χρησιμοποιείται στους αισθητήρες
        κίνησης, όπως υπέρυθρες ή λέιζερ
    motor_starting_method:
      name: Μέθοδος εκκίνησης κινητήρα
      description: Προσδιορίζει τη μέθοδο που χρησιμοποιείται για την εκκίνηση ενός
        κινητήρα, όπως το DOL ή ο αυτομετασχηματιστής
    motor_type:
      name: Τύπος μοτέρ
      description: Καθορίζει εάν το τρυπάνι χρησιμοποιεί μοτέρ με ψήκτρες ή χωρίς
        ψήκτρες, επηρεάζοντας τον θόρυβο, τη μακροζωία και την τιμή.
    motor_vehicle_placement:
      name: Τοποθέτηση σε μηχανοκίνητο όχημα
      description: Προσδιορίζει το σημείο ενός οχήματος στο οποίο έχει σχεδιαστεί
        να τοποθετηθεί ένα εξάρτημα, όπως εμπρός ή πίσω
    motor_vehicle_type:
      name: Τύπος μηχανοκίνητου οχήματος
      description: Καθορίζει την κατηγορία ενός μηχανοκίνητου οχήματος, όπως αυτοκίνητο
        ή SUV
    motorcycle/scooter_type:
      name: Τύπος μοτοσικλέτας/σκούτερ
      description: Ταξινομεί τον τύπο μοτοσικλέτας ή σκούτερ, όπως εκτός δρόμου ή
        μοτοποδήλατο
    motorcycle_drive_type:
      name: Μετάδοση κίνησης μοτοσικλέτας
      description: Καθορίζει τον μηχανισμό μετάδοσης της μοτοσυκλέτας, όπως άξονας
        ή αλυσίδα
    motorcycle_glove_purpose:
      name: Σκοπός γαντιών μοτοσικλέτας
      description: Προσδιορίζει την προβλεπόμενη χρήση γαντιών μοτοσικλέτας, όπως
        για διαδρομές εκτός δρόμου ή περιηγήσεις
    motorcycle_tire_type:
      name: Τύπος ελαστικού μοτοσυκλέτας
      description: Ταξινομεί το ελαστικό της μοτοσικλέτας με βάση τη χρήση του, όπως
        αγωνιστικό ή για σκούτερ
    mount/stand_features:
      name: Χαρακτηριστικά στηρίγματος/βάσης
      description: Αναφέρει λεπτομερώς τα ειδικά χαρακτηριστικά του στηρίγματος ή
        της βάσης ενός προϊόντος, όπως ρυθμιζόμενη γωνία ή πτυσσόμενη
    mount_installation_point:
      name: Σημείο εγκατάστασης βάσης
      description: Υποδεικνύει πού στο όχημα ή τον εξοπλισμό είναι εγκατεστημένη η
        βάση.
    mount_interface_system:
      name: Σύστημα διεπαφής βάσης
      description: Προσδιορίζει την ιδιόκτητη ή βιομηχανική πλατφόρμα σύνδεσης προτύπου
        που είναι ενσωματωμένη στη βάση (π.χ., μοτίβο RAM AMPS, Quad Lock).
    mount_material:
      name: Υλικό στηρίγματος
      description: Καθορίζει τη σύνθεση του στηρίγματος ενός προϊόντος, όπως από ανοξείδωτο
        χάλυβα ή πλαστικό
    mounting_hardware:
      name: Υλικό τοποθέτησης
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται για την εγκατάσταση
        ή την τοποθέτηση ενός προϊόντος, όπως βίδες ή βεντούζα
    mounting_interface_pattern:
      name: Πρότυπο διεπαφής στήριξης
      description: Προσδιορίζει τη μηχανική διεπαφή ή το πρότυπο οπών που χρησιμοποιείται
        για τη σύνδεση της βάσης σε βάση ραδιοφώνου, βραχίονα ή σύστημα σφαίρας.
    mounting_interface_standard:
      name: Πρότυπο διεπαφής τοποθέτησης
      description: Καθορίζει το μοτίβο τοποθέτησης ή τη διεπαφή που υποστηρίζει η
        βάση ή το στήριγμα (π.χ., AMPS, VESA 75, RAM B ball).
    mounting_mechanism:
      name: Μηχανισμός τοποθέτησης
      description: Ορίζει τον τρόπο με τον οποίο το τηλέφωνο ή η κάμερα συνδέεται
        στο stick ή τη βάση.
    mounting_style:
      name: Στυλ τοποθέτησης
      description: Καθορίζει πώς το κουμπί ώθησης ασφαλίζεται σε έναν πίνακα ελέγχου,
        επηρεάζοντας τη μέθοδο εγκατάστασης και τη συμβατότητα πάχους πάνελ.
    mounting_technology:
      name: Τεχνολογία στήριξης
      description: Υποδεικνύει εάν το IC έχει σχεδιαστεί για συναρμολόγηση through-hole
        ή surface-mount.
    mounting_thread_size:
      name: Μέγεθος σπειρώματος στήριξης
      description: Υποδεικνύει το τυπικό μέγεθος σπειρώματος τριπόδου ή αξεσουάρ που
        παρέχεται στο προϊόν (π.χ., 1/4"-20).
    mounting_type:
      name: Τύπος τοποθέτησης
      description: Καθορίζει τον τρόπο εγκατάστασης ή πρόσδεσης ενός προϊόντος, όπως
        με κλιπ ή βεντούζα
    mouse/trackball_features:
      name: Χαρακτηριστικά ποντικιού/σφαίρας ελέγχου
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των ποντικιών/σφαιρών ελέγχου,
        όπως ο εργονομικός σχεδιασμός ή το ρυθμιζόμενο βάρος
    mouse_pad_features:
      name: Χαρακτηριστικά βάσης ποντικού
      description: Περιγράφει τα μοναδικά χαρακτηριστικά μιας βάσης ποντικιού, όπως
        φωτισμός ή ραμμένες άκρες
    mouse_port_type:
      name: Τύπος θύρας ποντικιού
      description: Καθορίζει τον τύπο σύνδεσης για ένα ποντίκι υπολογιστή, π.χ. ασύρματο
        UBS, Bluetooth
    mouse_technology:
      name: Τεχνολογία ποντικιού
      description: Καθορίζει τη λειτουργικότητα ή τον σχεδιασμό ενός ποντικιού υπολογιστή,
        όπως ασύρματο ή για gaming
    mouthgard_design:
      name: Σχεδιασμός αθλητικού προστατευτικού στόματος
      description: Προσδιορίζει τον σχεδιασμό των αθλητικών προστατευτικών στόματος,
        όπως μονό ή διπλό
    mouthpiece:
      name: Επιστόμιο
      description: Προσδιορίζει τον τύπο επιστομίου για μουσικά όργανα, όπως A ή Bass
    moving/shipping_box_material:
      name: Υλικό κιβωτίου μετακίνησης/αποστολής
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε κιβώτια μετακίνησης
        ή αποστολής, όπως χαρτόνι ή πλαστικό
    mp3_player_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ MP3 player
      description: Προσδιορίζει τα επιπλέον αξεσουάρ που περιλαμβάνονται στη συσκευασία
        ενός MP3 player, όπως θήκη ή φορτιστής αυτοκινήτου
    mpaa_rating:
      name: Αξιολόγηση MPAA
      description: Προσδιορίζει την αξιολόγηση της Ένωσης Κινηματογραφικών Εταιρειών
        Αμερικής (Motion Picture Association of America - MPAA) για μέσα, όπως G PG-13
    multi_gpu_technology:
      name: Τεχνολογία πολλαπλών GPU
      description: 'Υποδεικνύει τη δυνατότητα μιας μητρικής πλακέτας να υποστηρίζει
        πολλαπλές GPU, π.χ. δεν υποστηρίζεται, CrossFireX '
    multiplexer_technology:
      name: Τεχνολογία πολυπλέκτη
      description: Καθορίζει την υποκείμενη τεχνολογία σήματος ή μήκους κύματος που
        χρησιμοποιείται από τον πολυπλέκτη (π.χ., CWDM, DWDM).
    muscle_stimulator_design:
      name: Σχεδιασμός μυοδιεγέρτη
      description: Προσδιορίζει τον τύπο ενός μυοδιεγέρτη, όπως κρίκος ποδιού ή αυτοκόλλητη
        πλάκα
    music_genre:
      name: Είδος μουσικής
      description: Ταξινομεί τα προϊόντα ανάλογα με το συγκεκριμένο μουσικό είδος
        τους, όπως Χριστουγεννιάτικα ή ποπ ροκ
    music_stand_design:
      name: Σχεδιασμός αναλογίου
      description: Περιγράφει τον τύπο ενός αναλογίου, όπως επιδαπέδιο ή επιτοίχιο
    musical_key:
      name: Μουσικό κλειδί
      description: Καθορίζει το μουσικό κλειδί ενός οργάνου, π.χ. ντο μείζον, F#
    nail_art_items_included:
      name: Περιλαμβάνονται είδη διακόσμησης νυχιών
      description: Προσδιορίζει τα συγκεκριμένα αξεσουάρ για τη διακόσμηση νυχιών
        σε ένα κιτ, όπως χαλκομανίες ή εργαλείο διάστιξης
    nail_art_medium_type:
      name: Τύπος μέσου nail art
      description: Καθορίζει το πρωτεύον μέσο ή τη μορφή υλικού του υλικού nail art.
    nail_care_features:
      name: Χαρακτηριστικά προϊόντων περιποίησης νυχιών
      description: Περιγράφει συγκεκριμένες ιδιότητες των προϊόντων περιποίησης νυχιών,
        όπως ανθεκτικότητα στη θραύση ή γρήγορο στέγνωμα
    nail_design:
      name: Σχέδιο νυχιών
      description: Καθορίζει το αισθητικό μοτίβο ή φινίρισμα των ειδών νυχιών, π.χ.
        γαλλικό, ombre
    nail_polish_drying_form:
      name: Μορφή βοηθήματος στεγνώματος βερνικιού νυχιών
      description: Προσδιορίζει τη μέθοδο εφαρμογής των βοηθημάτων στεγνώματος βερνικιού
        νυχιών, όπως σταγόνες ή σπρέι
    nail_shape:
      name: Σχήμα νυχιών
      description: Περιγράφει το στυλ των άκρων των νυχιών για καλλυντικά προϊόντα,
        π.χ. αμυγδαλωτό, τετράγωνο
    national/regional_rating:
      name: Εθνική/Περιφερειακή αξιολόγηση
      description: Καθορίζει την εθνική ή περιφερειακή αξιολόγηση για ένα βιντεοπαιχνίδι,
        π.χ. MA 15+, για όλες τις ηλικίες
    native_aspect_ratio:
      name: Εγγενής αναλογία εικόνας
      description: Καθορίζει την αρχική αναλογία εικόνας μιας οθόνης, συνήθως για
        προτζέκτορες, π.χ. 16:8
    nebulizer_design:
      name: Σχεδιασμός νεφελοποιητή
      description: Καθορίζει τον σχεδιασμό και τη φορητότητα ενός νεφελοποιητή, π.χ.
        χειρός, επιτραπέζιος
    nebulizer_technology:
      name: Τεχνολογία νεφελοποιητή
      description: Καθορίζει την τεχνολογία που χρησιμοποιείται σε νεφελοποιητές,
        π.χ. πλέγμα, πίδακας
    neck_color:
      name: Χρώμα λαιμού
      description: Προσδιορίζει το χρώμα στην περιοχή του λαιμού μιας κιθάρας, όπως
        λευκό ή πολύχρωμο
    neck_material:
      name: Υλικό λαιμού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στο λαιμό εγχόρδων οργάνων,
        όπως ξύλο σφενδάμου ή τριανταφυλλιάς
    neck_pattern:
      name: Μοτίβο λαιμού
      description: Προσδιορίζει το σχέδιο ή την εκτύπωση στον λαιμό μιας κιθάρας,
        όπως φλοράλ ή ριγέ
    necklace_design:
      name: Σχέδιο κολιέ
      description: Περιγράφει το στυλ ενός κολιέ, όπως μενταγιόν ή τσόκερ
    neckline:
      name: Ντεκολτέ
      description: Χρησιμοποιείται για να περιγράψει το σχήμα του λαιμού ενός ενδύματος,
        όπως λαιμόκοψη V ή στρογγυλή
    needle_coating_type:
      name: Τύπος επικάλυψης βελόνας
      description: Καθορίζει οποιαδήποτε επιφανειακή επικάλυψη που εφαρμόζεται στον
        άξονα της βελόνας για τη βελτίωση της ολίσθησης ή των θεραπευτικών ιδιοτήτων.
    needle_eye_type:
      name: Τύπος ματιού βελόνας
      description: Περιγράφει το μέγεθος και το στυλ του ματιού της βελόνας, όπως
        μεγάλο ή χωρισμένο
    needle_gauge:
      name: Διάμετρος οπής βελόνας
      description: Υποδεικνύει το πάχος των βελονών που χρησιμοποιούνται σε ιατρικές
        πρακτικές ή τατουάζ, όπως 18 ή 22
    needle_housing_material:
      name: Υλικό περιβλήματος βελόνας
      description: Προσδιορίζει το υλικό του περιβλήματος της βελόνας, όπως πλαστικό
        ή ανοξείδωτος χάλυβας
    needle_material:
      name: Υλικό βελόνας
      description: Καθορίζει τη σύνθεση των βελονών, συνήθως στον βελονισμό, π.χ.
        από ανοξείδωτο χάλυβα, επίχρυση
    needle_size:
      name: Μέγεθος βελόνας
      description: Περιγράφει το μέγεθος των βελονών χειροτεχνίας, π.χ. 14, 100/16
    needlecraft_kit_type:
      name: Τύπος σετ ραπτικής
      description: Προσδιορίζει τον τύπο ενός σετ ραπτικής, όπως βελονάκι ή σταυροβελονιά
    negative/slide_storage_type:
      name: Τύπος αποθήκευσης φωτογραφικών αρνητικών και διαφανειών
      description: Καθορίζει τη μέθοδο αποθήκευσης φωτογραφικών αρνητικών ή διαφανειών,
        π.χ. κουτί αποθήκευσης αρχείου, καρουζέλ διαφανειών
    nema_enclosure_rating:
      name: Βαθμολογία περιβλήματος NEMA
      description: Καθορίζει την ταξινόμηση τύπου NEMA που καθορίζει την προστασία
        από περιβαλλοντικούς κινδύνους (π.χ., τύπος 4X, τύπος 12).
    net_material:
      name: Υλικό διχτυού
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται σε προϊόντα
        με βάση το δίχτυ, όπως νάιλον ή πολυεστέρας
    net_mounting_type:
      name: Τύπος τοποθέτησης διχτυού
      description: Προσδιορίζει τον τρόπο με τον οποίο τοποθετείται ένα δίχτυ τένις,
        όπως κούμπωμα ή βάση τρίποδου
    network_cable_interface:
      name: Διεπαφή καλωδίου δικτύου
      description: Καθορίζει τον τύπο σύνδεσης σε ένα καλώδιο δικτύου, π.χ. BNC, MPO/MTP
    network_layer_support:
      name: Υποστήριξη επιπέδου δικτύου
      description: Υποδεικνύει τις υψηλότερες δυνατότητες μεταγωγής ή δρομολόγησης
        επιπέδου OSI που παρέχονται από τον διακόπτη.
    network_protocols_supported:
      name: Υποστηριζόμενα πρωτόκολλα δικτύου
      description: Καθορίζει τα πρότυπα δικτύου που υποστηρίζει μια συσκευή, π.χ.
        TCP/IP, DNS
    networking_standards:
      name: Πρότυπα δικτύου
      description: 'Καθορίζει τα πρωτόκολλα που υποστηρίζει μια συσκευή δικτύου, π.χ.
        IEEE 802.3 '
    neutral_density_rating:
      name: Βαθμολογία ουδέτερης πυκνότητας
      description: Καθορίζει την οπτική πυκνότητα ή ισχύ ενός φίλτρου ND, εκφρασμένη
        με κοινούς παράγοντες ND ή μειώσεις στοπ.
    nightgown_style:
      name: Στυλ νυχτικού
      description: Καθορίζει το στυλ νυχτικού, π.χ μπέιμπι ντολ, κομπινεζόν
    nipple_material:
      name: Υλικό θηλής
      description: Καθορίζει το υλικό που χρησιμοποιείται για τη θηλή του μπουκαλιού,
        π.χ. λατέξ, καουτσούκ
    nipple_shape:
      name: Σχήμα θηλής
      description: Καθορίζει τη μορφή των θηλών στα μπιμπερό, όπως επίπεδες ή κεκλιμένες
    nipple_type:
      name: Τύπος θηλής
      description: Καθορίζει τον τύπο θηλής στα μπιμπερό, όπως με φαρδύ λαιμό ή κανονική
    nock_material:
      name: Υλικό ουράς
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται για την ουρά
        στα βέλη, όπως αλουμίνιο ή πλαστικό
    noise_cancellation_technology:
      name: Τεχνολογία ακύρωσης θορύβου
      description: Καθορίζει τον τύπο συστήματος μείωσης θορύβου που χρησιμοποιείται
        στα ακουστικά, βοηθώντας τους αγοραστές να αναγνωρίσουν μοντέλα με ενεργό,
        παθητικό ή προσαρμοστικό έλεγχο θορύβου.
    noise_intensity:
      name: Ένταση θορύβου
      description: Περιγράφει το επίπεδο του ήχου που παράγεται από ένα προϊόν, συνήθως
        πυροτεχνήματα, π.χ. χαμηλό, υψηλό
    noise_reduction_system:
      name: Σύστημα μείωσης θορύβου
      description: Καθορίζει το/τα ενσωματωμένο/α αναλογικό/ά πρότυπο/α μείωσης θορύβου
        που υποστηρίζεται από το deck.
    notepad_cover_type:
      name: Τύπος εξωφύλλου σημειωματάριου
      description: Προσδιορίζει τον τύπο εξωφύλλου ενός σημειωματαρίου, όπως σκληρό
        εξώφυλλο ή χαρτόδετο
    notepad_design:
      name: Σχέδιο σημειωματαρίου
      description: Περιγράφει το δέσιμο ή τη διάταξη ενός σημειωματάριου, όπως σπιράλ
        ή με κρίκους
    nozzle_coating:
      name: Επίστρωση ακροφυσίου
      description: Καθορίζει οποιαδήποτε επιφανειακή επεξεργασία που εφαρμόζεται στο
        ακροφύσιο για τη βελτίωση της αντίστασης στη φθορά ή τη μείωση της πρόσφυσης
        του νήματος.
    nozzle_thread_type:
      name: Τύπος σπειρώματος ακροφυσίου
      description: Καθορίζει το μηχανικό σπείρωμα ή πρότυπο στήριξης που χρησιμοποιείται
        για την προσάρτηση του ακροφυσίου (π.χ., M6, MK8, E3D V6, Volcano).
    nozzle_type:
      name: Τύπος ακροφυσίου
      description: Καθορίζει τον τύπο ακροφυσίου για οδοντιατρικούς πίδακες νερού,
        π.χ. ορθοδοντικό, όργανο καθαρισμού της γλώσσας
    nursery_theme:
      name: Θέμα βρεφικού δωματίου
      description: Καθορίζει το σχέδιο ή το μοτίβο προϊόντων που σχετίζονται με το
        βρεφικό δωμάτιο, όπως ζούγκλα ή δεινόσαυρος
    nursing_cover_coverage:
      name: Κάλυψη ενδύματος κάλυψης για θηλασμό
      description: Καθορίζει την κάλυψη που παρέχεται από ένα ένδυμα κάλυψης για θηλασμό,
