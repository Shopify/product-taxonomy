        μονάδα σκληρού δίσκου (HDD)
    stove_airflow:
      name: Ροή αέρα σόμπας
      description: Υποδεικνύει τη ροή αέρα σε ξυλόσομπες, όπως πρωτογενής ή τριτογενής
    stove_top_type:
      name: Τύπος εστίας
      description: Προσδιορίζει τον τύπο της εστίας για συσκευές κουζίνας, όπως υγραερίου
