    squeegee_blade_design:
      name: Σχέδιο λεπίδας μάκτρου
      description: Περιγράφει το σχήμα της λεπίδας του μάκτρου, όπως ίσιο ή στρογγυλό
    stack_configuration:
      name: Διαμόρφωση στοίβας
      description: Καθορίζει τη διάταξη των κυψελών καυσίμου σε συσκευές ισχύος, π.χ.
