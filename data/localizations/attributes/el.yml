    spout_type:
      name: Τύπος στομίου
      description: Καθορίζει τον τύπο του στομίου, συνήθως για παιδικά ποτήρια, π.χ.
        καλαμάκι, μαλακό
    spray_purpose:
      name: Σκοπός σπρέι
      description: Προσδιορίζει την πρωτεύουσα προτιθέμενη χρήση της ομίχλης προσώπου
