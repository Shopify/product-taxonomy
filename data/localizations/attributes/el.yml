    nursing_pad_design:
      name: Σχεδιασμός επιθέματος θηλασμού
      description: Περιγράφει τα φυσικά χαρακτηριστικά των επιθεμάτων θηλασμού, όπως
        παχιά ή στρογγυλά
    nursing_pillow_shape:
      name: Σχήμα μαξιλαριού θηλασμού
      description: Προσδιορίζει το περίγραμμα των μαξιλαριών θηλασμού, όπως σε σχήμα
        C ή U
    nut/seed_type:
      name: Τύπος ξηρών καρπών/σπόρων
      description: Προσδιορίζει τον συγκεκριμένο τύπο ξηρών καρπών ή σπόρων σε ένα
        προϊόν, όπως αμύγδαλα ή σπόροι τσία
    nut_butter_variety:
      name: Ποικιλία βουτύρων ξηρών καρπών
      description: Προσδιορίζει την ποικιλία ξηρών καρπών σε αλείμματα με βάση τους
        ξηρούς καρπούς, π.χ. φιστίκι, αμύγδαλο
    nut_form:
      name: Σχήμα περικοχλίου
      description: Περιγράφει το σχήμα των περικοχλίων, π.χ. τετράγωνα, με πτερύγια
    nut_processing_method:
      name: Μέθοδος επεξεργασίας ξηρών καρπών
      description: Καθορίζει πώς παρασκευάζονται οι ξηροί καρποί ή οι σπόροι, π.χ.
        ζαχαρωμένοι, ωμοί
    nutrient_content:
      name: Περιεκτικότητα σε θρεπτικά συστατικά
      description: Καθορίζει τα θρεπτικά στοιχεία που υπάρχουν, συνήθως για λιπάσματα,
        π.χ. άζωτο, φώσφορος
    oboe_key_system:
      name: Σύστημα κλειδιών όμποε
      description: Προσδιορίζει το σύστημα κλειδιών ενός όμποε, όπως γαλλικό ή ωδείου
    ocarina_style:
      name: Στυλ οκαρίνας
      description: Περιγράφει το στυλ των οκαρινών, π.χ. εγκάρσια ή κρεμαστή
    occasion:
      name: Περίσταση
      description: Καθορίζει την κατάλληλη εκδήλωση ή το περιβάλλον για ένα προϊόν,
        π.χ. καθημερινό, επίσημο
    occasion_style:
      name: Στυλ περίστασης
      description: Βοηθά στην κατηγοριοποίηση προϊόντων με βάση την περίσταση, π.χ.
        καθημερινό, φόρεμα
    odor_remover_application_area:
      name: Περιοχή εφαρμογής αφαιρετικού οσμής
      description: Καθορίζει πού προορίζεται να εφαρμοστεί το προϊόν για αφαίρεση
        οσμής.
    office_cart_features:
      name: Χαρακτηριστικά καροτσιού γραφείου
      description: Περιγράφει τα ειδικά χαρακτηριστικά ενός καροτσιού γραφείου, όπως
        ρυθμιζόμενα ράφια ή τροχοί που κλειδώνουν
    office_instrument_material:
      name: Υλικό οργάνων γραφείου
      description: Καθορίζει τη σύνθεση εργαλείων γραφείου, για παράδειγμα ξύλο ή
        ακρυλικό
    office_supply_material:
      name: Υλικό ειδών γραφείου
      description: Προσδιορίζει το κύριο υλικό των ειδών γραφείου, όπως δέρμα ή χαρτόνι
    oil_extraction_method:
      name: Μέθοδος εξαγωγής λαδιού
      description: Καθορίζει πώς το κύριο λάδι επεξεργάστηκε ή εξήχθη (π.χ., ψυχρής
        πίεσης, εξευγενισμένο).
    oil_type:
      name: Τύπος ελαίου
      description: Καθορίζει τον τύπο ελαίου που χρησιμοποιείται σε ένα προϊόν, π.χ.
        παραφίνη, κηροζίνη
    olfactory_family:
      name: Οσφρητική οικογένεια
      description: Προσδιορίζει τη γενική οσφρητική κατηγορία στην οποία ανήκει ένα
        άρωμα, π.χ. αλδεϋδικό, ζωώδες.
    one_piece_style:
      name: Ολόσωμο στυλ
      description: Προσδιορίζει το συγκεκριμένο στυλ ενός ολόσωμου ενδύματος, όπως
        μια φόρμα ή ένα φορμάκι
    open/closed_sign_design:
      name: Σχεδιασμός πινακίδων τύπου «Ανοιχτό»/«Κλειστό»
      description: Καθορίζει το στυλ μιας πινακίδας «Ανοιχτό»/«Κλειστό», π.χ. ώρες
        λειτουργίας, προσαρμοσμένες πληροφορίες
    opening_direction:
      name: Κατεύθυνση ανοίγματος
      description: Καθορίζει την κατεύθυνση προς την οποία ανοίγει ένα προϊόν, συνήθως
        για πύλες, π.χ. άνοιγμα μονής κατεύθυνσης
    opening_mechanism:
      name: Μηχανισμός ανοίγματος
      description: Καθορίζει το πώς ανοίγει ένα προϊόν, συνήθως για πόρτες για μωρά
        ή κατοικίδια, π.χ. μοχλός, πεντάλ ποδιού
    operating_mode:
      name: Τρόπος λειτουργίας
      description: Καθορίζει τη μέθοδο λειτουργίας, συνήθως για ιατρικό εξοπλισμό,
        π.χ. ημιαυτόματο
    operating_system:
      name: Λειτουργικό σύστημα
      description: Καθορίζει το λογισμικό συστήματος που χρησιμοποιεί μια συσκευή,
        όπως το iOS ή το ChromeOS
    operating_system_compatibility:
      name: Συμβατότητα λειτουργικού συστήματος
      description: Προσδιορίζει τα λειτουργικά συστήματα που υποστηρίζει το τηλεχειριστήριο
        κλείστρου αμέσως μόλις το αγοράσετε.
    operation_mechanism:
      name: Μηχανισμός λειτουργίας
      description: Περιγράφει πώς το εργαλείο εφαρμόζει τάση και κόβει τον δεσμό (π.χ.,
        χειροκίνητος, πνευματικός, αυτόματος).
    operation_method:
      name: Μέθοδος λειτουργίας
      description: Καθορίζει τον τρόπο λειτουργίας ενός προϊόντος, συνήθως για μηχανισμούς
        ανοίγματος γκαραζόπορτας, π.χ. μετάδοση με ιμάντα, υδραυλικός
    optical_disc_recordability:
      name: Δυνατότητα εγγραφής οπτικού δίσκου
      description: Καθορίζει εάν ένας οπτικός δίσκος είναι μιας εγγραφής ή επανεγγράψιμος
        και εάν είναι μονής ή διπλής στρώσης.
    optical_drive_form_factor:
      name: Παράγοντας μορφής οπτικής μονάδας
      description: Καθορίζει το φυσικό μέγεθος και το στυλ εγκατάστασης της μονάδας.
    optical_drive_loading_mechanism:
      name: Μηχανισμός φόρτωσης οπτικής μονάδας
      description: Υποδεικνύει πώς εισάγονται οι δίσκοι στη μονάδα (π.χ., φόρτωση
        με δίσκο, φόρτωση με σχισμή, φόρτωση από πάνω).
    optical_drive_type:
      name: Τύπος μονάδας οπτικού δίσκου
      description: Προσδιορίζει τις μορφές μέσων που μπορεί να διαβάσει και να γράψει
        η μονάδα οπτικού δίσκου μιας συσκευής, π.χ. CD-ROM, DVD-ROM
    optical_frame_design:
      name: Σχέδιο σκελετού γυαλιών
      description: Καθορίζει εάν τα γυαλιά έχουν σκελετό ή όχι, π.χ. χωρίς σκελετό,
        με πλήρη σκελετό
    optical_zoom:
      name: Οπτικό ζουμ
      description: Υποδεικνύει τη δυνατότητα ζουμ μιας κάμερας, π.χ. χωρίς ζουμ, πάνω
        από 30x
    oral_care_function:
      name: Λειτουργία στοματικής φροντίδας
      description: Επισημαίνει το κύριο οδοντιατρικό ή στοματικό όφελος υγείας που
        αντιμετωπίζει το προϊόν (π.χ., λεύκανση, ανακούφιση ευαισθησίας, υγεία ούλων).
    oral_care_items_included:
      name: Περιλαμβανόμενα είδη στοματικής φροντίδας
      description: Απαριθμεί τους τύπους προϊόντων στοματικής φροντίδας που περιέχονται
        στο σετ.
    organizer_type:
      name: Τύπος αντικειμένου οργάνωσης
      description: Καθορίζει την κατηγορία αντικειμένου αποθήκευσης σε οχήματα, όπως
        ποτηροθήκη ή ντουλαπάκι
    orientation:
      name: Προσανατολισμός
      description: Καθορίζει την προβλεπόμενη τοποθέτηση του προϊόντος, π.χ. οριζόντια,
        κατακόρυφη
    orthotic_coverage_length:
      name: Μήκος κάλυψης ορθοπεδικού
      description: Καθορίζει πόσο από το πέλμα καλύπτει η υποστήριξη καμάρας (π.χ.,
        πλήρους μήκους, 3/4 μήκους, κύπελλο φτέρνας).
    outdoor_equipment_features:
      name: Χαρακτηριστικά εξοπλισμού υπαίθριων δραστηριοτήτων
      description: Προσδιορίζει τα μοναδικά χαρακτηριστικά του εξοπλισμού υπαίθριων
        δραστηριοτήτων, όπως ανθεκτικότητα στις καιρικές συνθήκες ή φορητότητα
    outdoor_furniture_items_included:
      name: Περιλαμβάνονται έπιπλα εξωτερικού χώρου
      description: Προσδιορίζει τα συγκεκριμένα αντικείμενα που περιλαμβάνονται σε
        ένα σετ επίπλων εξωτερικού χώρου, όπως καρέκλες ή τραπέζι
    outdoor_power_accessories_included:
      name: Συμπεριλαμβάνονται ηλεκτρικά αξεσουάρ εξωτερικού χώρου
      description: Καθορίζει τα πρόσθετα αντικείμενα που παρέχονται με τον ηλεκτρικό
        εξοπλισμό εξωτερικού χώρου, π.χ. αλυσοπρίονο, ωτοασπίδες
    outdoor_walking_activity:
      name: Υπαίθρια δραστηριότητα πεζοπορίας
      description: Ταξινομεί προϊόντα με βάση την προβλεπόμενη υπαίθρια δραστηριότητα
        πεζοπορίας, π.χ. βάδισμα, τρέξιμο σε μονοπάτια
    outerwear_clothing_features:
      name: Χαρακτηριστικά εξωτερικών ενδυμάτων
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των εξωτερικών ενδυμάτων,
        όπως μονωμένα ή αδιάβροχα
    outlet_type:
      name: Τύπος πρίζας
      description: Καθορίζει τον τύπο βύσματος για ηλεκτρονικές συσκευές, π.χ. τύπου
        Α, τύπου L
    output_connection:
      name: Σύνδεση εξόδου
      description: Καθορίζει τον τύπο σύνδεσης εξόδου για καλώδια ήχου, όπως 3,5 mm
        ή RCA
    output_connection_type:
      name: Τύπος σύνδεσης εξόδου
      description: Καθορίζει τον συνδετήρα ή το πρότυπο διεπαφής που παρέχεται από
        τον μετατροπέα στην πλευρά εξόδου του.
    output_level:
      name: Επίπεδο εξόδου
      description: Περιγράφει το επίπεδο εξόδου των αξεσουάρ μουσικών οργάνων, όπως
        χαμηλό ή υψηλό
    output_signal_interface:
      name: Διεπαφή σήματος εξόδου
      description: Καθορίζει τον τύπο ή τους τύπους σύνδεσης εξόδου που παρέχει ο
        μετατροπέας.
    output_video_interface:
      name: Διεπαφή εξόδου βίντεο
      description: Καθορίζει τον τύπο ή τους τύπους συνδετήρα βίντεο που παρέχονται
        ως έξοδος από τον μετατροπέα σάρωσης.
    output_waveform:
      name: Κυματομορφή εξόδου
      description: Καθορίζει τον τύπο του σήματος που παράγει ένας ηλεκτρονικός ταλαντωτής,
        όπως πριονωτό ή ημιτονοειδές
    oven_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ φούρνου
      description: Αναφέρει λεπτομερώς τα επιπλέον εξαρτήματα του φούρνου που περιλαμβάνονται,
        όπως ταψί ψησίματος ή συρμάτινη σχάρα
    overclock_profile_support:
      name: Υποστήριξη προφίλ υπερχρονισμού
      description: Προσδιορίζει τυποποιημένα προφίλ υπερχρονισμού που αποθηκεύονται
        στη μονάδα (π.χ., Intel XMP, AMD EXPO).
    oxygen_cylinder_outlet_standard:
      name: Πρότυπο εξόδου φιάλης οξυγόνου
      description: Καθορίζει το πρότυπο σύνδεσης εξόδου CGA της βαλβίδας της φιάλης.
    oxygen_tank_valve_type:
      name: Τύπος βαλβίδας δεξαμενής οξυγόνου
      description: Καθορίζει τη βαλβίδα που χρησιμοποιείται σε δεξαμενές οξυγόνου,
        π.χ. με γλωσσίδα, βαλβίδα μετάδοσης
    pa_rating:
      name: Βαθμολογία PA
      description: Καθορίζει τον βαθμό προστασίας UVA του αντηλιακού (π.χ., PA+, PA+++,
        PA++++) με βάση τη μέθοδο Persistent Pigment Darkening (PPD).
    pacifier/teether_design:
      name: Σχεδιασμός πιπίλας/δακτυλίου οδοντοφυΐας
      description: Περιγράφει τον σχεδιασμό των πιπίλων και των δακτυλίων οδοντοφυΐας
        για μωρά, π.χ. σε σχήμα δακτυλίου, ορθοδοντικές
    package_type:
      name: Τύπος συσκευασίας
      description: Καθορίζει τον τύπο συσκευασίας ενός προϊόντος, π.χ. βάζο, αντλία
    packing_materials_included:
      name: Περιλαμβάνονται υλικά συσκευασίας
      description: Προσδιορίζει τον τύπο των παρεχόμενων υλικών συσκευασίας, όπως
        μαξιλάρια αέρα ή μεμβράνη με φυσαλίδες
    pad_display_profile:
      name: Προφίλ εμφάνισης ταμπλέτας ψηφιοποίησης υπογραφής
      description: Περιγράφει τη χρωματική εμφάνιση των ταμπλετών ψηφιοποίησης υπογραφής,
        όπως μονόχρωμη ή έγχρωμη
    pad_thickness:
      name: Πάχος σερβιέτας
      description: Κατατάσσει το συνολικό προφίλ πάχους της σερβιέτας (π.χ., εξαιρετικά
        λεπτή, maxi).
    pad_type:
      name: Τύπος επένδυσης
      description: Καθορίζει τον τύπο επένδυσης του προϊόντος, π.χ. πλένεται στο πλυντήριο,
        αντικαθίσταται
    pad_wing_style:
      name: Στυλ φτερών σερβιέτας
      description: Υποδεικνύει εάν η σερβιέτα περιλαμβάνει πλαϊνά φτερά για στερέωση
        και προστασία από διαρροές.
    paddle/oar_material:
      name: Υλικό κουπιού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην κατασκευή κουπιών,
        όπως αλουμίνιο ή ξύλο
    paddle_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός πάντελ
      description: Καθορίζει τον συμπληρωματικό εξοπλισμό στα σετ πάντελ, όπως στύλοι
        ή μπάλες πάντελ
    paddleboard_features:
      name: Χαρακτηριστικά σανίδας κωπηλασίας
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά μιας σανίδας κωπηλασίας,
        όπως φουσκωτή ή με σκληρή επιφάνεια
    page_layout:
      name: Διάταξη σελίδας
      description: Καθορίζει τη διάταξη των σελίδων, συνήθως σε βιβλία διευθύνσεων,
        π.χ. κενές, με καρτέλες
    page_size:
      name: Μέγεθος σελίδας
      description: Καθορίζει τις διαστάσεις ενός προϊόντος, όπως 11" x 17" ή Α4
    pager_application:
      name: Εφαρμογή βομβητή
      description: Προσδιορίζει την κύρια περίπτωση χρήσης ή το περιβάλλον για το
        οποίο προορίζεται ο βομβητής.
    pain_reduction_technology:
      name: Τεχνολογία μείωσης πόνου
      description: Προσδιορίζει τυχόν χαρακτηριστικά άνεσης που μειώνουν την ενόχληση
        κατά την αποτρίχωση (π.χ., ψύξη, ρολά μασάζ).
    paint/dye_form:
      name: Μορφή βαφής/χρωστικής ουσίας
      description: Περιγράφει την πυκνότητα ή τον τύπο μιας βαφής ή χρωστικής ουσίας,
        όπως τζελ ή σπρέι
    paint_brush_design:
      name: Σχέδιο πινέλου
      description: Περιγράφει το σχήμα ή το στυλ ενός πινέλου, όπως στρογγυλό ή επίπεδο
    paint_finish:
      name: Φινίρισμα βαφής
      description: Υποδεικνύει τον τύπο φινιρίσματος στη βαφή, συνήθως για οχήματα,
        π.χ. μεταλλικό, γυαλιστερό
    paint_form:
      name: Μορφή βαφής
      description: Προσδιορίζει τη μορφή της βαφής χειροτεχνίας, για παράδειγμα, τζελ
        ή σκόνη
    paint_medium_type:
      name: Τύπος μέσου χρώματος
      description: Καθορίζει το είδος του μέσου χρώματος σε είδη χειροτεχνίας, όπως
        βερνίκι ή νερομπογιά
    paint_type:
      name: Τύπος χρώματος
      description: Καθορίζει την ποικιλία χρωμάτων σε είδη χειροτεχνίας, όπως σμάλτο
        ή νερομπογιά
    paintball/airsoft_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός Paintball/Airsoft
      description: Καθορίζει τον εξοπλισμό paintball ή airsoft που περιλαμβάνεται,
        όπως προστατευτικά γυαλιά ή αλεξίσφαιρο γιλέκο
    paintball_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός paintball
      description: Καθορίζει τα πρόσθετα είδη που περιλαμβάνονται σε ένα προϊόν paintball,
        όπως μπαταρίες ή φορτιστής
    painting_canvas_material:
      name: Υλικό καμβά ζωγραφικής
      description: Προσδιορίζει τον τύπο υλικού που χρησιμοποιείται σε έναν καμβά
        ζωγραφικής, όπως βαμβάκι ή λινό
    painting_medium:
      name: Μέσο ζωγραφικής
      description: Υποδεικνύει το κύριο υλικό ή την τεχνική που χρησιμοποιείται σε
        έναν πίνακα, π.χ. ακρυλικό, λάδι
    pairing_method:
      name: Μέθοδος ζεύξης
      description: 'Καθορίζει τον τρόπο σύνδεσης ή ζεύξης του προϊόντος με άλλες συσκευές,
        π.χ. Bluetooth, Wi-Fi '
    palette_design:
      name: Σχεδιασμός παλέτας
      description: Περιγράφει τη διάταξη ή το στυλ της παλέτας ενός καλλιτέχνη, όπως
        πτυσσόμενη ή με τρύπα για τον αντίχειρα
    palette_knife_shape:
      name: Σχήμα σπάτουλας
      description: Περιγράφει το σχήμα μιας σπάτουλας που χρησιμοποιείται στις χειροτεχνίες,
        όπως ίσιο ή στρογγυλό
    panel_specification:
      name: Προδιαγραφές πίνακα
      description: Καθορίζει τον τύπο του πίνακα μικτονόμησης για τη διαχείριση καλωδίων,
        όπως οπτικές ίνες ή Cat6
    panel_termination:
      name: Τερματισμός πίνακα
      description: Καθορίζει τη μέθοδο τερματισμού για πίνακα μικτονόμησης, π.χ. RJ-45
        ή 110 punch down
    panel_transparency:
      name: Διαφάνεια πάνελ
      description: Περιγράφει εάν η σκηνή περιλαμβάνει διάφανα πάνελ ή παράθυρα στην
        οροφή ή τα πλάγια για να επιτρέπεται η είσοδος φωτός κατά το μαύρισμα.
    pants_length_type:
      name: Τύπος μήκους παντελονιού
      description: Χρησιμοποιείται για τον καθορισμό του μήκους του παντελονιού, όπως
        κοντό ή μακρύ
    panty_liner_style:
      name: Στυλ σερβιετάκι
      description: Καθορίζει το σχήμα ή το στυλ του σερβιετάκι (π.χ., στρινγκ, καμπύλη,
        μακριά).
    pantyhose_style:
      name: Στυλ καλσόν
      description: Περιγράφει το σχέδιο ή τη λειτουργικότητα του καλσόν, π.χ. χωρίς
        φτέρνες, μητρότητας
    paper_finish:
      name: Φινίρισμα χαρτιού
      description: Περιγράφει την υφή ή τη γυαλάδα προϊόντων από χαρτί, όπως σατέν
        ή ματ
    paper_format:
      name: Μορφή χαρτιού
      description: Προσδιορίζει τον τύπο της μορφής χαρτιού για τις χειροτεχνίες,
        όπως μπλοκ ή χωριστά φύλλα
    paper_size:
      name: Μέγεθος χαρτιού
      description: Καθορίζει τις διαστάσεις ενός προϊόντος χαρτιού, όπως A4 ή letter
    paper_texture:
      name: Υφή χαρτιού
      description: Περιγράφει την αίσθηση και το φινίρισμα του χαρτιού για καλλιτεχνική
        χρήση, όπως λείο ή τραχύ
    paper_type:
      name: Τύπος χαρτιού
      description: Καθορίζει το στυλ των χάρτινων αναλωσίμων γραφείου, όπως τετραγωνισμένα
        ή χαρτοπίνακες
    paperweight_design:
      name: Σχέδιο πρες παπιέ
      description: Περιγράφει την αισθητική ή το στυλ ενός πρες παπιέ, όπως διακοσμητικό
        ή απλό
    papier_mache_shape:
      name: Σχήμα χαρτοπολτού
      description: Καθορίζει το σχέδιο των προϊόντων από παπιέ μασέ, όπως κουτί ή
        ειδώλιο
    parachuting_activity:
      name: Δραστηριότητα πρώτης με αλεξίπτωτο
      description: Καθορίζει το άθλημα πτώσης με αλεξίπτωτο για το οποίο έχει σχεδιαστεί
        το προϊόν, όπως ελεύθερη πτώση ή αλεξίπτωτο πλαγιάς
    parallel_processing_technology_support:
      name: Υποστήριξη τεχνολογίας παράλληλης επεξεργασίας
      description: Καθορίζει τις δυνατότητες παράλληλης επεξεργασίας των μητρικών
        καρτών συστήματος, π.χ. πολλαπλών GPU, πολλαπλών πυρήνων
    parking_camera_features:
      name: Χαρακτηριστικά κάμερας στάθμευσης
      description: Περιγράφει τις δυνατότητες της κάμερας στάθμευσης ενός οχήματος,
        όπως υποστήριξη GPS ή βίντεο HD
    parking_sign_design:
      name: Σχεδιασμός πινακίδας στάθμευσης
      description: Προσδιορίζει τον σκοπό μιας πινακίδας στάθμευσης, π.χ. ζώνη φόρτωσης,
        δεσμευμένη θέση στάθμευσης
    pass_duration:
      name: Διάρκεια κάρτας
      description: Καθορίζει την περίοδο ισχύος ή τη διάρκεια ζωής της κάρτας μετακίνησης
        ή του εισιτηρίου.
    passband:
      name: Ζώνη διέλευσης
      description: Καθορίζει τη ζώνη συχνοτήτων από την οποία ένα ηλεκτρονικό φίλτρο
        επιτρέπει τη διέλευση, π.χ. υψηλής διέλευσης
    pasta_shape_type:
      name: Τύπος σχήματος ζυμαρικών
      description: Ταξινομεί τα ζυμαρικά με βάση το σχήμα τους, π.χ. μακαρόνια, τορτελίνια
    pasta_type:
      name: Τύπος ζυμαρικών
      description: Ταξινομεί τα ζυμαρικά ανάλογα με το σχήμα ή τη μορφή τους, π.χ.
        κοράλλι, πένες
    patch_shape:
      name: Σχήμα επιρράματος
      description: Περιγράφει το σχήμα ή το σχέδιο ενός επιρράματος, όπως ζωόμορφα
        ή γεωμετρικά σχήματα
    patella_opening_design:
      name: Σχεδιασμός ανοίγματος επιγονατίδας
      description: Καθορίζει αν ο νάρθηκας έχει ανοιχτή ή κλειστή περιοχή επιγονατίδας
        ή σταθεροποιητικό δακτύλιο.
    pattern:
      name: Μοτίβο
      description: Περιγράφει το σχέδιο ή το μοτίβο ενός προϊόντος, όπως φλοράλ ή
        ριγέ
    pattern_distribution_format:
      name: Μορφή διανομής μοντέλων
      description: Προσδιορίζει τον τρόπο με τον οποίο παραδίδεται ένα μοντέλο, όπως
        PDF ή διαδικτυακά εκπαιδευτικά προγράμματα
    payment_mechanism_type:
      name: Τύπος μηχανισμού πληρωμής
      description: Προσδιορίζει πώς οι παίκτες ενεργοποιούν τη μηχανή (π.χ., λειτουργία
        με κέρματα, σάρωση κάρτας).
    pbx_system_type:
      name: Τύπος συστήματος PBX
      description: Καθορίζει τη συνολική αρχιτεκτονική του προϊόντος PBX.
    pcb_surface_finish:
      name: Φινίρισμα επιφάνειας PCB
      description: Καθορίζει την προστατευτική επίστρωση που εφαρμόζεται σε εκτεθειμένα
        χάλκινα pads.
    pcb_type:
      name: Τύπος PCB
      description: Προσδιορίζει τον τύπο πλακέτας τυπωμένου κυκλώματος (PCB), όπως
        άκαμπτη ή εύκαμπτη
    pcie_lane_configuration:
      name: Διαμόρφωση γραμμών PCIe
      description: Καθορίζει το φυσικό πλάτος γραμμής που υποστηρίζει ο ανυψωτήρας
        (π.χ., x1, x4, x8, x16), υποδεικνύοντας το μέγεθος υποδοχής και το ηλεκτρικό
        εύρος ζώνης.
    pedal_polarity:
      name: Πόλωση πεταλιού
      description: Καθορίζει πώς λειτουργεί ο μηχανισμός μεταγωγής ενός πεταλιού αρμονίου
        σε προεπιλεγμένη, μη πατημένη κατάσταση, π.χ. NC (κανονικά κλειστό)
    pegi_rating:
      name: Αξιολόγηση PEGI
      description: Καθορίζει την αξιολόγηση του Πανευρωπαϊκού Συστήματος Πληροφόρησης
        για τα Ηλεκτρονικά Παιχνίδια (Pan European Game Information - PEGI) για βιντεοπαιχνίδια,
        π.χ. 3, 12
    pen/felt_tip_design:
      name: Σχεδιασμός μύτης στυλό/μαρκαδόρου
      description: Περιγράφει το πάχος και το στυλ της μύτης ενός στυλό, όπως έντονη
        ή λεπτή
    pen/pencil_features:
      name: Χαρακτηριστικά στυλό/μολυβιού
      description: Προσδιορίζει τα ειδικά χαρακτηριστικά των οργάνων γραφής, όπως
        με γόμα ή με ανταλλακτικά
    pen_color:
      name: Χρώμα στυλό
      description: Προσδιορίζει το χρώμα του μελανιού ενός στυλό, π.χ. κόκκινο, μπλε
    pen_features:
      name: Χαρακτηριστικά στυλό
      description: Περιγράφει τα μοναδικά χαρακτηριστικά των στυλό, όπως πτυσσόμενα
        ή αρωματισμένα
    pen_pattern:
      name: Μοτίβο στυλό
      description: Προσδιορίζει το οπτικό θέμα στα στυλό, όπως καμουφλάζ ή καρό
    pen_tip_design:
      name: Σχέδιο μύτης στυλό
      description: Περιγράφει το στυλ της μύτης ενός στυλό, όπως μεσαία ή λεπτή
    pen_type:
      name: Τύπος στυλό
      description: Προσδιορίζει τον τύπο του στυλό ή του οργάνου γραφής, όπως τζελ
        ή πένα
    pencil_features:
      name: Χαρακτηριστικά μολυβιού
      description: Προσδιορίζει συγκεκριμένα χαρακτηριστικά των μολυβιών, όπως με
        γόμα ή πτυσσόμενο
    pencil_sharpener_design:
      name: Σχεδιασμός ξύστρας μολυβιών
      description: Καθορίζει τα σχεδιαστικά χαρακτηριστικά μιας ξύστρας μολυβιών,
        π.χ. με δοχείο ρινισμάτων, απλή
    pencil_type:
      name: Τύπος μολυβιού
      description: Καθορίζει τον τύπο μολυβιού, όπως μηχανικό ή ξύλινο
    percussion_stand_design:
      name: Σχεδιασμός βάσης κρουστών
      description: Περιγράφει το στυλ μιας βάσης κρουστών, όπως ράφι ή στήριγμα
    percussion_tip_shape:
      name: Σχήμα άκρου κρουστών
      description: Προσδιορίζει τη μορφή των άκρων της μπαγκέτας ή του κόπανου, όπως
        βελανίδι και κύλινδρος
    performance_metrics:
      name: Μετρήσεις απόδοσης
      description: Επισημαίνει τους βασικούς τομείς αποδοτικότητας και αποτελεσματικότητας
        του λογισμικού τεχνητής νοημοσύνης και μηχανικής εκμάθησης, όπως ο χρόνος
        εκπαίδευσης και η ταχύτητα εξαγωγής συμπερασμάτων
    perfumery_instruments_included:
      name: Όργανα αρωματοποιίας που περιλαμβάνονται
      description: Καθορίζει τα όργανα που παρέχονται σε ένα κιτ αρωμάτων, όπως αρωματικές
        ταινίες ή πιπέτες
    peroxide_content:
      name: Περιεκτικότητα σε υπεροξείδιο
      description: Υποδεικνύει τον τύπο υπεροξειδίου που χρησιμοποιείται σε προϊόντα
        προσωπικής φροντίδας, όπως καρβαμίδιο ή χωρίς υπεροξείδιο
    personal_watercraft_type:
      name: Τύπος προσωπικού σκάφους
      description: Προσδιορίζει το στυλ των προσωπικών σκαφών, όπως όρθιας ή καθιστής
        πλοήγησης
    personalization_design:
      name: Σχεδιασμός εξατομίκευσης
      description: Περιγράφει τις επιλογές προσαρμογής για ένα προϊόν, συνήθως σημειωματάρια,
        π.χ. κενό, τυπωμένο
    personalization_options:
      name: Επιλογές εξατομίκευσης
      description: Καθορίζει τις διαθέσιμες επιλογές προσαρμογής, όπως μονόγραμμα
        ή προσαρμοσμένο μήνυμα
    pest_control_method:
      name: Μέθοδος καταπολέμησης των παρασίτων
      description: Καθορίζει τη μορφή του αποτρεπτικού παρασίτων, π.χ. σκόνη, κόκκοι
    pet_apparel/bedding_features:
      name: Χαρακτηριστικά ρουχισμού/κρεβατιών κατοικιδίων
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά ειδών για κατοικίδια, όπως
        ορθοπεδικά ή φιλικά προς το περιβάλλον
    pet_apparel_features:
      name: Χαρακτηριστικά ρουχισμού για κατοικίδια
      description: Επισημαίνει τα ειδικά χαρακτηριστικά των ρούχων για κατοικίδια,
        όπως είναι χωρίς υλικά ζωικής προέλευσης ή αδιάβροχα
    pet_bedding_features:
      name: Χαρακτηριστικά κρεβατιών για κατοικίδια
      description: Περιγράφει μοναδικές ιδιότητες των κρεβατιών για κατοικίδια, όπως
        ορθοπεδικά ή αδιάβροχα
    pet_control_accessory_features:
      name: Χαρακτηριστικά αξεσουάρ ελέγχου κατοικιδίων
      description: Περιγράφει τα ειδικά χαρακτηριστικά των αξεσουάρ ελέγχου κατοικίδιων
        ζώων, όπως ρυθμιζόμενα ή λάμπουν στο σκοτάδι
    pet_dietary_preferences:
      name: Διατροφικές προτιμήσεις για κατοικίδια
      description: Προσδιορίζει τις διατροφικές ανάγκες ή περιορισμούς ενός κατοικιδίου,
        όπως χωρίς σιτηρά ή μη ΓΤΟ
    pet_dietary_requirements:
      name: Διατροφικές απαιτήσεις για κατοικίδια
      description: Καθορίζει τα διατροφικά οφέλη που παρέχονται από ένα προϊόν για
        κατοικίδια, όπως ο έλεγχος βάρους ή η οδοντική υγεία
    pet_food_flavor:
      name: Γεύση τροφής για κατοικίδια
      description: Καθορίζει το γευστικό προφίλ των διατροφικών προϊόντων για κατοικίδια,
        π.χ. μπανάνα, γαλοπούλα
    pet_food_form:
      name: Μορφή τροφής για κατοικίδια
      description: Υποδεικνύει τη σύσταση των προϊόντων τροφής για κατοικίδια, όπως
        υγρά ή ξηρά
    pet_food_supplements:
      name: Συμπληρώματα διατροφής για κατοικίδια
      description: Προσδιορίζει τα πρόσθετα στις τροφές για κατοικίδια για διατροφικά
        οφέλη, όπως ιχθυέλαιο ή προβιοτικά
    pet_hair_dryer_design:
      name: Σχεδιασμός στεγνωτήρα μαλλιών για κατοικίδια
      description: Περιγράφει το στυλ ενός στεγνωτήρα μαλλιών για κατοικίδια, όπως
        κλουβί ή χειρός
    pet_hair_dryer_speed_settings:
      name: Ρυθμίσεις ταχύτητας στεγνωτήρα μαλλιών για κατοικίδια
      description: Περιγράφει τις προσαρμόσιμες ρυθμίσεις ταχύτητας στους στεγνωτήρες
        μαλλιών για κατοικίδια, π.χ. μεταβλητή ταχύτητα, σταθερή ταχύτητα
    pet_medical_collar_design:
      name: Σχεδιασμός ιατρικού περιλαίμιου κατοικιδίων
      description: Περιγράφει το στυλ ενός ιατρικού περιλαίμιου για κατοικίδια, όπως
        κώνος ή φουσκωτό
    pet_medical_supply_type:
      name: Τύπος ιατρικών προμηθειών για κατοικίδια
      description: Καθορίζει τον τύπο ιατρικού αντικειμένου για κατοικίδια, π.χ. ελαστικός
        επίδεσμος, γάζα
    pet_monitor_items_included:
      name: Περιλαμβάνονται αντικείμενα παρακολούθησης κατοικιδίων
      description: Καθορίζει τα εξαρτήματα που περιλαμβάνονται σε ένα μετρητή γλυκόζης
        για κατοικίδια, όπως θήκη μεταφοράς ή ταινίες μέτρησης
    pet_nail_tool_type:
      name: Τύπος εργαλείου για νύχια κατοικιδίων
      description: Προσδιορίζει το είδος του εργαλείου περιποίησης νυχιών για κατοικίδια,
        όπως νυχοκόπτες τύπου γκιλοτίνας ή εργαλεία λείανσης νυχιών
    pet_pad_features:
      name: Χαρακτηριστικά επιθεμάτων για κατοικίδια
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά των επιθεμάτων εκπαίδευσης
        κατοικίδιων, όπως υποαλλεργικά ή εύκολα στο καθάρισμα
    pet_spray/solution_type:
      name: Τύπος διαλύματος/σπρέι για κατοικίδια
      description: Προσδιορίζει τον σκοπό των σπρέι ή διαλυμάτων για κατοικίδια, όπως
        ηρεμιστικό ή αποσμητικό
    pet_supply_product_form:
      name: Μορφή προϊόντος προμηθειών κατοικιδίων
      description: Καθορίζει τη μορφή ενός προϊόντος για κατοικίδια, όπως υγρό, δισκίο
        ή σπρέι
    pet_thermometer_design:
      name: Σχεδιασμός θερμομέτρου για κατοικίδια
      description: Περιγράφει τον τύπο θερμομέτρου για κατοικίδια, όπως αναλογικό
        ή ψηφιακό
    pet_trainer_type:
      name: Τύπος εργαλείου εκπαίδευσης κατοικιδίων
      description: Προσδιορίζει τον τύπο του βοηθήματος εκπαίδευσης κατοικιδίων, όπως
        ένα τυπικό κλίκερ ή μια αυτόματη συσκευή διανομής λιχουδιών
    pet_treat_texture:
      name: Υφή λιχουδιών για κατοικίδια
      description: Καθορίζει την αίσθηση ή την πυκνότητα των λιχουδιών για κατοικίδια,
        όπως μαλακές ή τραγανές
    pet_treat_type:
      name: Τύπος λιχουδιάς για κατοικίδια
      description: Προσδιορίζει το είδος της λιχουδιάς για κατοικίδια, όπως λαστιχωτή
        ή τραγανή
    ph_level:
      name: επίπεδο PH
      description: Υποδεικνύει την οξύτητα ή την αλκαλικότητα μιας ουσίας, μετρούμενη
        σε κλίμακα από το 0 έως το 14, π.χ. 6,5 (ελαφρώς όξινη) ή 7,0 (ουδέτερη)
    phase_type:
      name: Τύπος φάσης
      description: Προσδιορίζει τον τύπο φάσης των ελεγκτών κινητήρα, όπως μονοφασικοί
        ή διφασικοί
    phone_camera_position:
      name: Θέση κάμερας τηλεφώνου
      description: Υποδεικνύει τη φυσική θέση ή λειτουργία της μονάδας κάμερας εντός
        του τηλεφώνου.
    phone_card_delivery_format:
      name: Μορφή παράδοσης τηλεφωνικής κάρτας
      description: Υποδεικνύει εάν η προπληρωμένη πίστωση παρέχεται ως φυσική κάρτα
        ξυστό ή ως ψηφιακός κωδικός/κουπόνι.
    phone_skin_coverage:
      name: Κάλυψη αυτοκόλλητου τηλεφώνου
      description: Καθορίζει ποια τμήματα του τηλεφώνου έχει σχεδιαστεί να καλύψει
        το αυτοκόλλητο ή το περιτύλιγμα.
    phone_strap_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ για λουράκι τηλεφώνου
      description: Παραθέτει επιπλέον εξαρτήματα που παρέχονται με το σετ που διαθέτει
        γούρι ή λουρί, όπως γλωττίδα προσαρμογέα, θήκη τηλεφώνου, πουγκί ή λουράκι
        καρπού.
    photo_effects_type:
      name: Τύπος φωτογραφικών εφέ
      description: Προσδιορίζει τον τύπο των φωτογραφικών εφέ που μπορεί να παράγει
        μια φωτογραφική μηχανή, π.χ. vintage, σέπια
    photographic_chemical_form:
      name: Μορφή φωτογραφικών χημικών ουσιών
      description: Προσδιορίζει τη μορφή φωτογραφικών χημικών ουσιών, όπως σκόνη ή
        υγρό
    photographic_paper_size:
      name: Μέγεθος φωτογραφικού χαρτιού
      description: Καθορίζει τις διαστάσεις του φωτογραφικού χαρτιού, όπως 4" x 6"
        ή Α3
    photographic_paper_type:
      name: Τύπος φωτογραφικού χαρτιού
      description: Καθορίζει τον τύπο του φωτογραφικού χαρτιού που χρησιμοποιείται,
        όπως σατέν ή μεταλλικό
    piano_additional_features:
      name: Πρόσθετα χαρακτηριστικά πιάνου
      description: Επισημαίνει τις επιπλέον λειτουργίες των πιάνων, όπως ενσωματωμένα
        ηχεία ή μετρονόμος
    piano_pedals:
      name: Πεντάλ πιάνου
      description: Προσδιορίζει τον τύπο των πεντάλ σε ένα πιάνο, όπως σταθερότητας
        ή sostenuto
    piano_size:
      name: Μέγεθος πιάνου
      description: Καθορίζει τον τύπο και το μέγεθος ενός πιάνου, όπως μικρό με ουρά
        ή όρθιο
    pick_design:
      name: Σχέδιο πενών
      description: Προσδιορίζει το σχέδιο των πενών της κιθάρας, π.χ. δάκρυ, Jazz
        III
    pickup_design:
      name: Σχεδιασμός μαγνήτη
      description: Προσδιορίζει τον σχεδιασμό του μαγνήτη σε έγχορδα όργανα, όπως
        μόνιμος ή προσωρινός
    pickup_mounting_type:
      name: Τύπος τοποθέτησης μαγνήτη
      description: Καθορίζει τη μέθοδο τοποθέτησης ενός μαγνήτη κιθάρας, όπως κόλλημα
        ή κούμπωμα
    pickup_position:
      name: Θέση μαγνήτη
      description: Υποδεικνύει πού είναι τοποθετημένος ο μαγνήτης σε μια ηλεκτρική
        κιθάρα, π.χ. γέφυρα, λαιμός
    pickup_type:
      name: Τύπος μαγνήτη
      description: Καθορίζει το στυλ του μαγνήτη της κιθάρας, για παράδειγμα, μαγνητικός
        ή ενεργός
    pig_feed_stage:
      name: Στάδιο διατροφής χοίρων
      description: Προσδιορίζει το στάδιο ζωής των χοίρων για το οποίο προορίζεται
        η τροφή, όπως απογαλακτισμένο χοιρίδιο ή βασικό επίπεδο
    pile_type:
      name: Τύπος πέλους
      description: Καθορίζει την υφή και το στυλ σε τάπητες, ψάθες και χαλιά, π.χ.
        πλούσα, berber
    pillbox_schedule:
      name: Πρόγραμμα θήκης χαπιών
      description: Περιγράφει το χρονικό σχήμα ή σύστημα επισήμανσης για το οποίο
        έχει σχεδιαστεί η θήκη χαπιών (π.χ., ημερήσιο, εβδομαδιαίο, ΠΜ/ΜΜ).
    pillow_shape:
      name: Σχήμα μαξιλαριού
      description: Καθορίζει το σχήμα ή το περίγραμμα ενός μαξιλαριού θηλασμού, όπως
        σε σχήμα U
    pin_size:
      name: Μέγεθος περόνης
      description: Καθορίζει το μέγεθος των περονών ασφαλείας, όπως 0 ή 00
    pin_tip_type:
      name: Τύπος άκρου καρφίτσας
      description: Περιγράφει τον σχεδιασμό των άκρων της καρφίτσας, που επηρεάζει
        την άνεση, την ασφάλεια και το κράτημα.
    pinata_design:
      name: Σχέδιο πινιάτας
      description: Περιγράφει το οπτικό θέμα μιας πινιάτας, όπως παραδοσιακή ή με
        μοτίβα ζώων
    pinball_machine_edition:
      name: Έκδοση μηχανής φλίπερ
      description: Προσδιορίζει τη συγκεκριμένη κατηγορία έκδοσης παραγωγής ή συλλεκτικής
        της μηχανής φλίπερ.
    pinball_machine_format:
      name: Μορφή μηχανής φλίπερ
      description: Καθορίζει τη φυσική ή ψηφιακή μορφή του προϊόντος (π.χ., μηχανική,
        εικονική, επιτραπέζια, κιτ).
    ping_pong_equipment_included:
      name: Περιλαμβάνεται εξοπλισμός πινγκ πονγκ
      description: Καθορίζει τον τύπο του εξοπλισμού πινγκ πονγκ που περιλαμβάνεται
        στο σετ, όπως δίχτυ ή ρακέτες του πινγκ πονγκ
    ping_pong_robot_features:
      name: Χαρακτηριστικά ρομπότ πινγκ πονγκ
      description: Περιγράφει τις λειτουργίες ενός ρομπότ πινγκ πονγκ, όπως ομαδοποίηση
        άσκησης ή τηλεχειρισμός
    pipe_clamp_design:
      name: Σχεδιασμός σφιγκτήρα σωλήνα
      description: Περιγράφει τον σχεδιασμό ενός σφιγκτήρα σωλήνα, όπως κουμπωτός
        ή σχήματος C
    pipe_shape:
      name: Σχήμα πίπας
      description: Καθορίζει το σχήμα της πίπας καπνού, π.χ. καλαμπάς, ημιγυριστή
    placement_supported:
      name: Υποστηριζόμενη τοποθέτηση
      description: Προσδιορίζει πού μπορεί να εγκατασταθεί ή να χρησιμοποιηθεί ένα
        προϊόν, π.χ. τοίχος, δάπεδο
    plan_service_type:
      name: Τύπος υπηρεσίας προγράμματος
      description: Ορίζει εάν το πρόγραμμα SIM αφορά μόνο δεδομένα ή περιλαμβάνει
        υπηρεσίες φωνής ή/και SMS.
    plant_characteristics:
      name: Χαρακτηριστικά φυτών
      description: Καθορίζει τα ειδικά χαρακτηριστικά των φυτών, π.χ. άνθηση, βρώσιμο
    plant_class:
      name: Κατηγορία φυτών
      description: Κατηγοριοποιεί τα φυτά σε συγκεκριμένες ταξινομικές ομάδες, π.χ.
        liliopsida, brassicales
    plant_material:
      name: Φυτικό υλικό
      description: Καθορίζει εάν τα φυτικά υλικά είναι ζωντανά, συντηρημένα ή τεχνητά
    plant_name:
      name: Όνομα φυτού
      description: Προσδιορίζει τη βοτανική ή κοινή ονομασία του φυτού, όπως τριαντάφυλλο,
        βασιλικός ή αγγούρι
    plant_stage:
      name: Στάδιο φυτού
      description: Προσδιορίζει τη συγκεκριμένη φάση του κύκλου ανάπτυξης ενός φυτού,
        για την υποστήριξη της οποίας έχει σχεδιαστεί ένα προϊόν, π.χ. δενδρύλλιο,
        βλαστική φάση
    plant_support_material:
      name: Υλικό στήριξης φυτών
      description: Καθορίζει το υλικό που χρησιμοποιείται σε κλωβούς ή στηρίγματα
        φυτών, όπως τερακότα ή πέτρα
    plate_type:
      name: Τύπος πλάκας
      description: Προσδιορίζει τον τύπο της πλάκας σε εργαλεία styling μαλλιών, π.χ.
        τιτάνιο, κεραμικό
    play_equipment_items_included:
      name: Περιλαμβάνονται είδη εξοπλισμού παιχνιδιού
      description: Παραθέτει τα πρόσθετα αντικείμενα που περιλαμβάνονται στον εξοπλισμό
        παιχνιδιού, όπως κρεμαστά παιχνίδια ή καθρέφτης
    play_slide_design:
      name: Σχεδιασμός τσουλήθρας παιχνιδιού
      description: Περιγράφει τον σχεδιασμό μας τσουλήθρας παιχνιδιού, όπως σπιράλ
        ή σωλήνας
    play_vehicle_propulsion:
      name: Πρόωση οχήματος παιχνιδιού
      description: Προσδιορίζει τον τρόπο με τον οποίο τροφοδοτείται ένα όχημα παιχνιδιού,
        όπως με τριβή ή τηλεχειρισμό
    play_yard_design_features:
      name: Χαρακτηριστικά σχεδιασμού παιδικής χαράς
      description: Προσδιορίζει τα ειδικά χαρακτηριστικά μιας παιδικής χαράς, όπως
        διχτυωτές πλευρές ή τσέπες
    playback_disc_formats:
      name: Μορφές δίσκων αναπαραγωγής
      description: Καθορίζει τις μορφές δίσκων που είναι συμβατές με συσκευή αναπαραγωγής
        DVD ή Blu-Ray, π.χ. CD audio, JPEG
    playback_speed_supported:
      name: Υποστηριζόμενη ταχύτητα αναπαραγωγής
      description: Αναφέρει τις ταχύτητες περιστροφής δίσκου στις οποίες μπορεί να
        λειτουργήσει το πικάπ ή ο δίσκος.
    player/recorder_specialized_features:
      name: Ειδικά χαρακτηριστικά συσκευής αναπαραγωγής/εγγραφής
      description: Επισημαίνει τα ειδικά χαρακτηριστικά των συσκευών αναπαραγωγής
        ή εγγραφής βίντεο, όπως η υποστήριξη τεχνητής νοημοσύνης ή ο γονικός έλεγχος
    player_drive_type:
      name: Τύπος μονάδας πικάπ
      description: Καθορίζει τον μηχανισμό που περιστρέφει ένα πικάπ, όπως ζώνη ή
        τροχαλία
    player_position:
      name: Θέση παίκτη
      description: Καθορίζει τη θέση παίκτη για την οποία προορίζεται το προϊόν, π.χ.
        τερματοφύλακας, μέσος
    player_specialized_features:
      name: Ειδικά χαρακτηριστικά συσκευής αναπαραγωγής
      description: Προσδιορίζει τις μοναδικές δυνατότητες των συσκευών αναπαραγωγής
        βίντεο, όπως υποστήριξη 4K ή υποστήριξη HDR
    playhouse_design:
      name: Σχεδιασμός παιδότοπου
      description: Καθορίζει τον τύπο του παιδότοπου, όπως δεντρόσπιτο ή επιδαπέδιος
        παιδότοπος
    playset_features:
      name: Χαρακτηριστικά σετ παιχνιδιού
      description: Επισημαίνει τις ειδικές πτυχές ενός σετ παιχνιδιού, π.χ. περιορισμένη
        έκδοση, αδιάβροχο
    plug_type:
      name: Τύπος βύσματος
      description: Προσδιορίζει τη συμβατότητα περιοχής ενός βύσματος, π.χ. US, FR
    plug_type_input:
      name: Τύπος βύσματος (είσοδος)
      description: Καθορίζει το βύσμα που μπορεί να φιλοξενήσει ένας μετασχηματιστής
        ή μετατροπέας, με βάση τον κωδικό χώρας ή επικράτειας, π.χ. US, EU
    plug_type_output:
      name: Τύπος βύσματος (έξοδος)
      description: Καθορίζει το βύσμα που μπορεί να φιλοξενήσει ένας μετασχηματιστής
        ή μετατροπέας ως έξοδο, με βάση τον κωδικό χώρας ή επικράτειας, π.χ. US, EU
    plumbing_primer_application:
      name: Εφαρμογή ασταριού υδραυλικών εγκαταστάσεων
      description: Καθορίζει πού μπορεί να χρησιμοποιηθεί αστάρι υδραυλικών εγκαταστάσεων,
        για παράδειγμα σε σωλήνες ή εξαρτήματα
    plumbing_trap_design:
      name: Σχεδιασμός σιφονιού υδραυλικών εγκαταστάσεων
      description: Καθορίζει τον τύπο σιφονιού υδραυλικών εγκαταστάσεων, όπως τύμπανο
        ή μπουκάλι
    plunger_shape:
      name: Σχήμα εμβόλου
      description: Καθορίζει το σχήμα μιας κεφαλής εμβόλου, όπως κύπελλο ή ακορντεόν
    plywood_grade:
      name: Κατηγορία κόντρα πλακέ
      description: Καθορίζει την κατηγοριοποίηση του κόντρα πλακέ για οικοδομικά υλικά,
        όπως η κατηγορία C ή D
    pneumatic_conveyor_operation:
      name: Λειτουργία πνευματικού μεταφορέα
      description: Προσδιορίζει τον τρόπο λειτουργίας των πνευματικών μεταφορέων,
        όπως η οικολογική φάση ή η πυκνή φάση
    poe_standard:
      name: Πρότυπο PoE
      description: Προσδιορίζει το πρωτόκολλο Power over Ethernet (PoE) με το οποίο
        συμμορφώνεται ένα προϊόν, π.χ. παθητικό, IEEE 802.3af
    point_design:
      name: Σχεδιασμός αιχμής
      description: Περιγράφει το στυλ μύτης των προμηθειών γραφείου όπως οι καρφίτσες
        ή οι πινέζες, π.χ. αιχμηρή, αμβλεία
    pointing_device:
      name: Συσκευή κατάδειξης
      description: Καθορίζει τη συσκευή που χρησιμοποιείται για πλοήγηση σε οθόνη
        υπολογιστή, π.χ. κουμπιά ποντικιού, touchpad
    polar_pattern:
      name: Μοτίβο πόλωσης
      description: Υποδεικνύει τον προσανατολισμό λήψης ήχου ενός μικροφώνου, όπως
        παγκατευθυντικός ή καρδιοειδής
    polarity_configuration:
      name: Διαμόρφωση πολικότητας
      description: Περιγράφει την εσωτερική διάταξη πολικότητας που σχετίζεται με
        LED, μονάδες οθόνης και παρόμοιες συσκευές.
    polarization:
      name: Πόλωση
      description: Καθορίζει την κατεύθυνση των κυμάτων των κεραιών, π.χ. κάθετη,
        κυκλική
    pole/post_material:
      name: Υλικό ράβδου/στύλου
      description: Καθορίζει το υλικό με το οποίο κατασκευάζονται οι ράβδοι για τα
        παρασόλια ή τις ομπρέλες, όπως υαλοβάμβακας ή χάλυβας
    pole_color:
      name: Χρώμα ράβδου
      description: Προσδιορίζει το χρώμα της ράβδου σε προϊόντα όπως ομπρέλες, π.χ.
        μαύρο, μπρονζέ
    pole_material:
      name: Υλικό ράβδου
      description: Καθορίζει το υλικό που χρησιμοποιείται στην κατασκευή ράβδων, π.χ.
        χάλυβας, ξύλο
    pole_pattern:
      name: Μοτίβο ράβδου
      description: Περιγράφει το σχέδιο ή το μοτίβο της ράβδου μιας ομπρέλας, όπως
        φλοράλ ή γεωμετρικό
    policy_sign_design:
      name: Σχεδιασμός πινακίδας πολιτικής
      description: Περιγράφει το συγκεκριμένο μήνυμα που εμφανίζεται σε μια πινακίδα
        πολιτικής, π.χ. απαγορεύεται το κάπνισμα, απαγορεύονται τα κινητά τηλέφωνα
    polish_dry_form:
      name: Μορφή προϊόντων στεγνώματος βερνικιού
      description: Προσδιορίζει τη σύνθεση των προϊόντων στεγνώματος βερνικιού νυχιών,
        π.χ. με βάση διαλύτη, με βάση τη σιλικόνη
    polish_remover_form:
      name: Μορφή αφαιρετικού βερνικιού
      description: Καθορίζει τον τύπο του προϊόντος αφαίρεσης βερνικιού νυχιών, π.χ.
        υγρό, μεμβράνες αφαίρεσης
    polish_remover_formulation:
      name: Σύνθεση αφαιρετικού βερνικιού
      description: Υποδεικνύει τη χημική σύνθεση του αφαιρετικού, ειδικά την περιεκτικότητα
        σε ασετόν ή εναλλακτικές βάσεις.
    polish_type:
      name: Τύπος βερνικιού
      description: Προσδιορίζει τον συγκεκριμένο τύπο βερνικιού που χρησιμοποιείται
        για τη φροντίδα σκαφών, όπως μέταλλο ή βινύλιο
    polyphony:
      name: Πολυφωνία
      description: Καθορίζει την ταυτόχρονη δυνατότητα νοτών ενός συνθεσάιζερ, π.χ.
        πολυφωνικό, multi-timbral
    portability:
      name: Φορητότητα
      description: Καθορίζει την ευκολία μετακίνησης ή μεταφοράς ενός προϊόντος, συνήθως
        για θήλαστρα, π.χ. φορητό, μικρών διαστάσεων
    post_material:
      name: Υλικό στύλου
      description: Καθορίζει τον τύπο υλικού για στύλους σε διάφορες κατηγορίες, π.χ.
        αλουμίνιο ή υαλοβάμβακας
    postage_stamp_features:
      name: Χαρακτηριστικά γραμματοσήμου
      description: Προσδιορίζει τα ειδικά χαρακτηριστικά των γραμματοσήμων, όπως το
        επιτύπωμα ή το υδατογράφημα
    postpartum_stage:
      name: Στάδιο μετά τον τοκετό
      description: Καθορίζει το χρονικό πλαίσιο μετά τη γέννα για το οποίο είναι σχεδιασμένη
        η σερβιέτα.
    potential_extract:
      name: Πιθανό εκχύλισμα
      description: Υποδεικνύει το δυνητικό επίπεδο εκχυλίσματος σε σπόρους και βύνες
        για ζυθοποίηση, όπως χαμηλό ή υψηλό
    pottery/sculpting_project_type:
      name: Τύπος έργου κεραμικής/γλυπτικής
      description: Προσδιορίζει τον ειδικό τύπο έργου κεραμικής ή γλυπτικής, όπως
        μινιατούρα ή κατασκευή μάσκας
    potty/toilet_seat_design:
      name: Σχεδιασμός καθίσματος γιογιό/τουαλέτας
      description: Καθορίζει το στυλ ή τη δομή των καθισμάτων γιογιό ή τουαλέτας,
        όπως πτυσσόμενα ή τυπικά
    potty_training_kit_components:
      name: Στοιχεία κιτ εκπαίδευσης τουαλέτας
      description: Καθορίζει τα αντικείμενα που περιλαμβάνονται σε ένα κιτ εκπαίδευσης
        τουαλέτας, π.χ. αυτοκόλλητα, σκαμπό
    power_connector_type:
      name: Τύπος συνδετήρα τροφοδοσίας
      description: Καθορίζει τον βοηθητικό συνδετήρα ή τους συνδετήρες τροφοδοσίας
        που απαιτούνται ή παρέχονται από τον ανυψωτήρα ή τον προσαρμογέα.
    power_conversion_semiconductor_type:
      name: Τύπος ημιαγωγού μετατροπής ισχύος
      description: Προσδιορίζει το κύριο υλικό ημιαγωγού που χρησιμοποιείται στο στάδιο
        ισχύος του φορτιστή, που επηρεάζει το μέγεθος, την απόδοση και την παραγωγή
        θερμότητας.
    power_source:
      name: Πηγή ενέργειας
      description: Καθορίζει την πηγή ενέργειας που χρησιμοποιεί ένα προϊόν για να
        λειτουργήσει, όπως ηλιακή ενέργεια ή μπαταρίες
    power_supply_efficiency_rating:
      name: Βαθμολογία απόδοσης τροφοδοτικού
      description: Δηλώνει το επίπεδο πιστοποίησης απόδοσης 80 Plus του PSU του επιτραπέζιου
        υπολογιστή.
    power_supply_form_factor:
      name: Παράγοντας μορφής τροφοδοτικού
      description: Καθορίζει το φυσικό μέγεθος και το πρότυπο τοποθέτησης του PSU
        (π.χ., ATX, SFX).
    power_supply_modularity:
      name: Αρθρωτότητα τροφοδοτικού
      description: Υποδεικνύει εάν τα καλώδια του PSU είναι μη αφαιρούμενα, μερικώς
        αφαιρούμενα ή πλήρως αφαιρούμενα.
    pregnancy_test_sensitivity:
      name: Ευαισθησία τεστ εγκυμοσύνης
      description: Καθορίζει την ικανότητα του τεστ να αναγνωρίζει την εγκυμοσύνη,
        π.χ. έγκαιρη ανίχνευση, τυπική ανίχνευση
    prescription_status:
      name: Κατάσταση συνταγογράφησης
      description: Υποδεικνύει εάν οι σταγόνες αυτιών είναι διαθέσιμες χωρίς συνταγή
        ή απαιτούν συνταγή από επαγγελματία υγείας.
    presentation_supply_features:
      name: Χαρακτηριστικά προμηθειών παρουσίασης
      description: Περιγράφει τα μοναδικά χαρακτηριστικά των προμηθειών παρουσίασης,
        όπως ρυθμιζόμενο ύψος ή επιφάνεια που μπορεί να σβηστεί
    preservation_type:
      name: Τύπος συντήρησης
      description: Προσδιορίζει τη μέθοδο που χρησιμοποιείται για τη διατήρηση των
        εργαστηριακών δειγμάτων, όπως σκλήρυνση ή αποξήρανση
    pretend_electronics_toy_type:
      name: Τύπος παιχνιδιού ψεύτικων ηλεκτρονικών συσκευών
      description: Καθορίζει την κατηγορία των ψεύτικων ηλεκτρονικών συσκευών, π.χ.
        κάμερα, κινητό τηλέφωνο
    pretend_housekeeping_toy_type:
      name: Τύπου παιχνιδιού ψεύτικων οικοκυρικών
      description: Προσδιορίζει τον τύπο του παιχνιδιού ψεύτικων οικοκυρικών, όπως
        ένα σετ καθαρισμού ή μια συσκευή κουζίνας
    primary_pcie_slot_version:
      name: Έκδοση κύριας υποδοχής PCIe
      description: Υποδεικνύει τη γενιά PCI Express που υποστηρίζεται από την κύρια
        υποδοχή x16 που χρησιμοποιείται συνήθως για κάρτες γραφικών.
    primary_region:
      name: Κύρια περιοχή
      description: Καθορίζει την κύρια αγορά ή τοποθεσία για ένα λογισμικό ή μια υπηρεσία
        νέφους, π.χ. Βόρεια Αμερική, Ασία-Ειρηνικός
    primer_use:
      name: Χρήση ασταριού
      description: Καθορίζει τη λειτουργία ενός ασταριού, όπως βαφή βάσης ή στεγανοποιητικό
    print_orientation:
      name: Προσανατολισμός εκτύπωσης
      description: Προσδιορίζει σε ποια πλευρά του υλικού εκτυπώνεται το γραφικό.
    print_server_form_factor:
      name: Μορφή διακομιστή εκτύπωσης
      description: Υποδεικνύει τη φυσική σχεδίαση του διακομιστή εκτύπωσης (π.χ.,
        εξωτερικό κουτί, εσωτερική κάρτα, USB dongle).
    print_technology:
      name: Τεχνολογία εκτύπωσης
      description: Καθορίζει τη διεργασία που χρησιμοποιείται από έναν εκτυπωτή, όπως
        ψεκασμός μελάνης ή λέιζερ
    printer/copier_specialized_features:
      name: Ειδικά χαρακτηριστικά εκτυπωτή/φωτοτυπικού μηχανήματος
      description: Επισημαίνει συγκεκριμένα χαρακτηριστικά των εκτυπωτών/φωτοτυπικών
        μηχανημάτων, όπως υποστήριξη εκτύπωσης από φορητές συσκευές ή φωνητικός έλεγχος
    printer_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ υπολογιστή
      description: Αναφέρει λεπτομερώς τα συμπληρωματικά εξαρτήματα που περιλαμβάνονται
        σε εκτυπωτή, φωτοτυπικό μηχάνημα ή φαξ, π.χ. δίσκος χαρτιού, μονάδα τήξης
    printer_color_capability:
      name: Δυνατότητα χρώματος εκτυπωτή
      description: Καθορίζει εάν η συσκευή εκτυπώνει μόνο μονόχρωμα ή υποστηρίζει
        πλήρη έγχρωμη εκτύπωση και αντιγραφή.
    printer_connection_interface:
      name: Διεπαφή σύνδεσης εκτυπωτή
      description: Καθορίζει τον τύπο θύρας που χρησιμοποιεί ο διακομιστής εκτύπωσης
        για να συνδεθεί στον ίδιο τον εκτυπωτή.
    printer_form_factor:
      name: Μορφή εκτυπωτή
      description: Ταξινομεί το φυσικό στυλ ή τη φορητότητα της συσκευής.
    printer_functions:
      name: Λειτουργίες εκτυπωτή
      description: Καθορίζει τις δυνατότητες των εκτυπωτών, των φωτοτυπικών μηχανημάτων
        και των μηχανημάτων φαξ, π.χ. σάρωση, εκτύπωση φωτογραφιών
    printing_color:
      name: Χρώμα εκτύπωσης
      description: Καθορίζει την απόδοση χρώματος των κασετών τόνερ και ψεκασμού μελάνης,
        π.χ. μαύρο, κυανό
    printing_method:
      name: Μέθοδος εκτύπωσης
      description: Καθορίζει τη διαδικασία εκτύπωσης, όπως εκτύπωση offset ή χάραξη
    privacy_filtering_direction:
      name: Κατεύθυνση φίλτρου απορρήτου
      description: Υποδεικνύει από ποιες κατευθύνσεις θέασης το φίλτρο μπλοκάρει την
        ορατότητα (π.χ., δίδρομη οριζόντια, τετράδρομη).
    processor_cores:
      name: Πυρήνες επεξεργαστή
      description: Υποδεικνύει τον αριθμό των πυρήνων στον επεξεργαστή ενός υπολογιστή,
        π.χ. διπλός
    processor_family:
      name: Οικογένεια επεξεργαστών
      description: Προσδιορίζει τη σειρά ή τη μάρκα της κεντρικής μονάδας επεξεργασίας
        της ηλεκτρονικής συσκευής, π.χ. Intel Core i7
    processor_socket:
      name: Υποδοχή επεξεργαστή
      description: Καθορίζει τον συμβατό τύπο υποδοχής επεξεργαστή σε ηλεκτρονικές
        συσκευές, όπως LGA 1151 (υποδοχή H4) ή υποδοχή  AM4
    processor_technology:
      name: Τεχνολογία επεξεργαστή
      description: Καθορίζει την τεχνολογία επεξεργαστή, συνήθως για εξοπλισμό ήχου,
        π.χ. με βάση το λογισμικό, σωλήνας/βαλβίδα
    product_benefits:
      name: Οφέλη προϊόντος
      description: Περιγράφει τα οφέλη που προσφέρει ένα προϊόν, συνήθως για την υγεία
        και την ομορφιά, π.χ. εξομάλυνση, σύσφιξη
    product_certifications_standards:
      name: Πιστοποιήσεις και πρότυπα προϊόντος
      description: Υποδεικνύει τις πιστοποιήσεις ή τα πρότυπα που πληροί ένα προϊόν,
        όπως βιολογικό ή φιλικό προς τα ζώα
    product_classification:
      name: Ταξινόμηση προϊόντος
      description: Κατηγοριοποιεί τον τύπο του πολύτιμου υλικού, του νομίσματος ή
        του πολύτιμου αντικειμένου (π.χ. νόμισμα, ράβδοι χρυσού, πολύτιμοι λίθοι,
        δωροκάρτα, NFT)
    product_form:
      name: Μορφή προϊόντος
      description: Καθορίζει τη μορφή ή την παρουσίαση ενός προϊόντος, συνήθως για
        την υγεία και την ομορφιά, π.χ. λοσιόν, ορός
    product_format:
      name: Μορφή προϊόντος
      description: Υποδεικνύει αν το αντικείμενο παραδίδεται ως φυσικό προϊόν ή ψηφιακή
        λήψη.
    product_formulation:
      name: Σύνθεση προϊόντος
      description: Προσδιορίζει τη σύνθεση των αναλώσιμων στις κατασκευές, π.χ. βασική
        ουσία, έτοιμη ανάμειξη
    product_manual_area:
      name: Τομέας εγχειριδίου προϊόντος
      description: Καθορίζει το θέμα ενός εγχειριδίου προϊόντος, π.χ. κάμερα και οπτικά,
        αναλώσιμα γραφείου
    product_sterility:
      name: Αποστείρωση προϊόντος
      description: Υποδεικνύει εάν ένα προϊόν είναι αποστειρωμένο για λόγους υγείας
        και ασφάλειας
    product_use:
      name: Χρήση προϊόντος
      description: Προσδιορίζει την κύρια προβλεπόμενη χρήση ή σκοπό πολύτιμων υλικών
        ή συλλεκτικών αντικειμένων (π.χ. νόμισμα/νόμιμο μέσο πληρωμής, συλλεκτικό
        αντικείμενο, κοσμήματα, δωροκάρτα)
    program_format:
      name: Μορφή προγράμματος
      description: Περιγράφει τη διάταξη των προγραμμάτων εκδηλώσεων, όπως φυλλάδιο
        ή μεμονωμένο φύλλο
    projection_design:
      name: Σχεδιασμός προβολής
      description: Περιγράφει το μοτίβο ή την εικόνα που προβάλλεται από ένα φίλτρο
        φωτισμού ή gobo, όπως κείμενο ή λογότυπο
    projector_light_source:
      name: Πηγή φωτός προβολέα
      description: Προσδιορίζει τον τύπο της πηγής φωτός σε έναν προβολέα, όπως LED
        ή λέιζερ
    prop_theme:
      name: Θέμα σκηνικών
      description: Προσδιορίζει το στυλ ή το είδος των κινηματογραφικών και τηλεοπτικών
        σκηνικών, όπως ιστορικά ή επιστημονικής φαντασίας
    propane_application:
      name: Εφαρμογή προπανίου
      description: Καθορίζει τον σκοπό του προπανίου, όπως θέρμανση ή ψήσιμο
    propeller_blade_design:
      name: Σχεδιασμός πτερυγίων προπέλας
      description: Περιγράφει τη διαμόρφωση των πτερυγίων σε μια προπέλα σκάφους,
        όπως 3 ή 4 πτερυγίων
    prophy_cup_design:
      name: Σχεδιασμός κυπελλοειδών προφύλαξης
      description: Περιγράφει τον σχεδιασμό των κυπελλοειδών προφύλαξης που χρησιμοποιούνται
        στην οδοντιατρική, όπως βούρτσα ή με ραβδώσεις
    propulsion_type:
      name: Τύπος πρόωσης
      description: Καθορίζει τη μέθοδο κίνησης για τον εξοπλισμό υπαίθριων δραστηριοτήτων,
        π.χ. ώθηση, ρυμούλκηση
    protected_component:
      name: Προστατευόμενο εξάρτημα
      description: Προσδιορίζει το μέρος της μηχανής φλίπερ που προστατεύει το κάλυμμα.
    protection_type:
      name: Τύπος προστασίας
      description: Προσδιορίζει το επίπεδο προστασίας που προσφέρει ο εξοπλισμός ασφαλείας,
        όπως ο Τύπος I ή ο Τύπος II
    protective_gear_features:
      name: Χαρακτηριστικά προστατευτικού εξοπλισμού
      description: Προσδιορίζει τα μοναδικά χαρακτηριστικά του προστατευτικού εξοπλισμού,
        όπως αντικραδασμικός ή αντιθαμβωτικός
    protective_mask_design:
      name: Σχεδιασμός προστατευτικής μάσκας
      description: Καθορίζει τον σχεδιασμό των προστατευτικών μασκών, όπως η μάσκα
        για ολόκληρο το πρόσωπο ή η μισή μάσκα
    protective_mask_features:
      name: Χαρακτηριστικά προστατευτικής μάσκας
      description: Αναφέρει λεπτομερώς τα μοναδικά χαρακτηριστικά των προστατευτικών
        μασκών, όπως ρυθμιζόμενος ιμάντα ή βαλβίδα
    protein_processing_type:
      name: Τύπος επεξεργασίας πρωτεΐνης
      description: Καθορίζει πώς εξευγενίζεται ή επεξεργάζεται η πρωτεΐνη (π.χ., απομόνωση
        έναντι συμπυκνώματος), επηρεάζοντας την καθαρότητα, τον ρυθμό πέψης και την
        προτίμηση του καταναλωτή.
    protein_source:
      name: Πηγή πρωτεΐνης
      description: Προσδιορίζει την κύρια προέλευση πρωτεΐνης που χρησιμοποιείται
        στο συμπλήρωμα.
    pstn_connectivity_options:
      name: Επιλογές συνδεσιμότητας PSTN
      description: Καθορίζει τις διασυνδέσεις του δημόσιου μεταγόμενου τηλεφωνικού
        δικτύου (PSTN) που υποστηρίζει ένα προϊόν, π.χ. FXO, POTS
    publication_frequency:
      name: Συχνότητα έκδοσης
      description: Υποδεικνύει πόσο συχνά εκδίδεται ένα περιοδικό ή μια εφημερίδα,
        όπως ημερησίως ή μηνιαίως
    publication_type:
      name: Τύπος δημοσίευσης
      description: Προσδιορίζει τον τύπο ακαδημαϊκής ή ερευνητικής δημοσίευσης, όπως
        ένα άρθρο σε επιθεώρηση ή μια διατριβή
    pull_up_bar:
      name: Μπάρα έλξης
      description: Καθορίζει τον τύπο λαβής σε εξοπλισμό γυμναστικής, όπως τυπική
        ή ανοιχτή
    pump_accessories:
      name: Αξεσουάρ θηλάστρων
      description: Προσδιορίζει τα αντικείμενα που περιλαμβάνονται με τα θήλαστρα,
        όπως θήκη μεταφοράς ή μπιμπερό
    pump_speed_settings:
      name: Ρυθμίσεις ταχύτητας αντλίας
      description: Καθορίζει τα χαρακτηριστικά ελέγχου ταχύτητας, συνήθως για θήλαστρα,
        π.χ. ρυθμιζόμενη ταχύτητα
    punching/training_bag_material:
      name: Υλικό σάκου μποξ/προπόνησης
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε έναν σάκο μποξ/προπόνησης,
        όπως δέρμα ή καμβάς
    puppet_theme:
      name: Θέμα κούκλας
      description: Κατηγοριοποιεί τις κούκλες με βάση το σχεδιαστικό τους θέμα, όπως
        ανθρώπινες ή φανταστικές
    puppet_type:
      name: Τύπος μαριονέτας
      description: Προσδιορίζει το στυλ της κούκλας, όπως ανδρείκελο χειρός ή μαριονέτα
    push_button_terminal_type:
      name: Τύπος τερματικού κουμπιού
      description: Καθορίζει το στυλ ηλεκτρικής σύνδεσης στο κουμπί, εξασφαλίζοντας
        συμβατότητα με καλωδιώσεις και γρήγορες συνδέσεις κατά την εγκατάσταση.
    puzzle_theme:
      name: Θέμα παζλ
      description: Περιγράφει το κύριο θέμα ή το μοτίβο ενός παζλ, όπως τα ζώα ή το
        διάστημα
    puzzle_type:
      name: Τύπος παζλ
      description: Προσδιορίζει τον συγκεκριμένο τύπο παζλ, όπως τρισδιάστατο ή γρίφος
    quiver_style:
      name: Στυλ φαρέτρας
      description: Καθορίζει το στυλ της φαρέτρας στην τοξοβολία, π.χ. γοφού, πλάτης
    rack_design:
      name: Σχεδιασμός ραφιού
      description: Περιγράφει τη διάταξη ή τη δομή ενός γυάλινου ραφιού, όπως ανοιχτό
        ή με διαμερίσματα
    rack_format:
      name: Μορφή ραφιού
      description: Καθορίζει το φυσικό περίβλημα ή το πρότυπο μεγέθους του καναλιού
        για τοποθέτηση σε ράφι ή επιτραπέζια.
    rack_mounting_style:
      name: Στυλ στήριξης σε ράφι
      description: Περιγράφει το δομικό στυλ της στήριξης σε ράφι (π.χ., σταθερό ράφι,
        συρόμενο ράφι, ράγες, κενό πάνελ).
    rack_type:
      name: Τύπος ραφιού
      description: Προσδιορίζει το στυλ του ραφιού αποθήκευσης ενός οχήματος, όπως
        πορτμπαγκάζ ή οροφή
    rack_width_standard:
      name: Πρότυπο πλάτους ραφιού
      description: Καθορίζει το βιομηχανικό πρότυπο οριζόντιου πλάτους τοποθέτησης
        που ακολουθεί το προϊόν.
    racket_balance:
      name: Ισορροπία ρακέτας
      description: Υποδεικνύει την κατανομή βάρους μιας ρακέτας, π.χ. βαριά κεφαλή,
        ομοιόμορφη ισορροπία
    racket_gauge:
      name: Διαμέτρημα ρακέτας
      description: Καθορίζει το πάχος των χορδών της ρακέτας του τένις, π.χ. 16
    racket_head_shape:
      name: Σχήμα κεφαλής ρακέτας
      description: Καθορίζει το σχήμα της κεφαλής της ρακέτας, π.χ. οβάλ, ισομετρικό
    racket_material:
      name: Υλικό ρακέτας
      description: Καθορίζει τον τύπο υλικού από το οποίο κατασκευάζεται μια αθλητική
        ρακέτα, όπως ξύλο ή ανθρακονήματα
    racket_string_design:
      name: Σχέδιο χορδής ρακέτας
      description: Προσδιορίζει την κατασκευή χορδών σε ρακέτες τένις, όπως μονόκλωνες
        και πολλαπλές
    racket_string_material:
      name: Υλικό χορδής ρακέτας
      description: Καθορίζει τη σύνθεση των χορδών ρακέτας τένις, όπως Kevlar ή Πολυουρεθάνη
        (PU)
    radar_bands:
      name: Ζώνες ραντάρ
      description: Καθορίζει τις ζώνες συχνοτήτων που μπορεί να ανιχνεύσει μια συσκευή
        ραντάρ, π.χ. X, K
    radar_technology:
      name: Τεχνολογία ραντάρ
      description: Καθορίζει την τεχνολογία ραντάρ που χρησιμοποιείται σε ένα προϊόν,
        π.χ. παλμικό, στερεάς κατάστασης
    radio_case_design:
      name: Σχεδιασμός θήκης ραδιοφώνου
      description: Καθορίζει το στυλ ή τη λειτουργικότητα των θηκών μεταφοράς ραδιοφώνου,
        όπως σταθερές ή περιστρεφόμενες
    radio_features:
      name: Χαρακτηριστικά ραδιοφώνου
      description: Καθορίζει τις μοναδικές δυνατότητες ενός ραδιοφώνου, όπως υποστήριξη
        GPS ή αναπαραγωγή MP3
    radio_form_factor:
      name: Μορφή ραδιοφώνου
      description: Προσδιορίζει τη φυσική κατηγορία του ερασιτεχνικού πομποδέκτη,
        επηρεάζοντας τις επιλογές στήριξης, τις απαιτήσεις ισχύος και τα τυπικά σενάρια
        χρήσης.
    radio_scanner_form_factor:
      name: Μορφή σαρωτή ραδιοφώνου
      description: Υποδεικνύει τη φυσική διαμόρφωση ή το στυλ στήριξης του σαρωτή
        ραδιοφώνου (π.χ., φορητός, βάση, επιτραπέζιος, τοποθετημένος σε όχημα).
    radiology_compatibility:
      name: Συμβατότητα με απεικονιστικές εξετάσεις
      description: Υποδεικνύει αν ο νάρθηκας μπορεί να παραμείνει στον ασθενή κατά
        τη διάρκεια διαδικασιών απεικόνισης (π.χ., MRI, CT, ακτινογραφίες).
    raid_levels_supported:
      name: Υποστηριζόμενα επίπεδα RAID
      description: Απαριθμεί όλες τις διαμορφώσεις RAID που μπορεί να δημιουργήσει
        ή να διαχειριστεί η συστοιχία σκληρών δίσκων.
    ramp_type:
      name: Τύπος ράμπας
      description: Καθορίζει τη σχεδίαση ή το στυλ των ραμπών skateboarding, όπως
        το half-pipe ή το fun box
    range_type:
      name: Τύπος εύρους
      description: Καθορίζει την περιοχή κάλυψης συσκευών όπως οθόνες μωρών, όπως
        μεγάλης εμβέλειας
    rarity:
      name: Σπανιότητα
      description: Καθορίζει τη μοναδικότητα των αντικειμένων, συνήθως για συλλεκτικά
        αντικείμενα. π.χ. περιορισμένη έκδοση, εξαιρετικά σπάνια
    razor_flexibility:
      name: Ευελιξία ξυραφιού
      description: Υποδεικνύει την ευελιξία ξυραφιών και κουρευτικών μηχανών, π.χ.
        εύκαμπτα ή σταθερά
    razor_head_design:
      name: Σχέδιο κεφαλής ξυραφιού
      description: Καθορίζει τον αριθμό των λεπίδων σε ένα ξυράφι, π.χ. μονή, τριπλή
    razor_type:
      name: Τύπος ξυραφιού
      description: 'Καθορίζει το σχέδιο του ξυραφιού, π.χ. ίσιο ή συνθετικό '
    read/write_speed:
      name: Ταχύτητα ανάγνωσης/εγγραφής
      description: Υποδεικνύει τον ρυθμό ή την ταχύτητα μεταφοράς δεδομένων, συνήθως
        για συσκευές αναπαραγωγής δίσκων. π.χ. 4x, 52x
    reading_toy_type:
      name: Τύπος παιχνιδιών ανάγνωσης
      description: Καθορίζει τον τύπο του εκπαιδευτικού παιχνιδιού ανάγνωσης, π.χ.
        παιχνίδι ορθογραφίας, tablet ανάγνωσης
    receipt_paper_features:
      name: Χαρακτηριστικά χαρτοταινίας ταμειακής μηχανής
      description: Προσδιορίζει μοναδικά χαρακτηριστικά της χαρτοταινίας ταμειακής
        μηχανής, όπως ένδειξη τέλους ρολού ή προεκτυπωμένο λογότυπο
    reclining_function:
      name: Λειτουργία ανάκλισης
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά ανάκλισης, όπως πλήρης ανάκλιση
        ή μηδενική βαρύτητα
    recommended_age_group:
      name: Προτεινόμενη ηλικιακή ομάδα
      description: Προσδιορίζει το κατάλληλο εύρος ηλικιών για ένα προϊόν, συνήθως
        παιχνίδια, π.χ. μωρά, έφηβοι
    recommended_skill_level:
      name: Συνιστώμενο επίπεδο δεξιοτήτων
      description: Καθορίζει το επίπεδο δεξιοτήτων, π.χ. αρχάριος, ειδικός
    recommended_use:
      name: Συνιστώμενη χρήση
      description: Προσδιορίζει την κύρια χρήση ή τον τομέα για τον οποίο έχει σχεδιαστεί
        ένα προϊόν υλικού, π.χ. βιομηχανικό, οικιακό
    record_cleaning_components_included:
      name: Εξαρτήματα καθαρισμού δίσκων που περιλαμβάνονται
      description: Αναφέρει τα συγκεκριμένα αντικείμενα που παρέχονται στο κιτ ώστε
        οι πελάτες να μπορούν να συγκρίνουν πακέτα με μια ματιά (π.χ., βούρτσα, υγρό,
        πανί).
    recorder_fingering_system:
      name: Σύστημα παιξίματος φλογέρας με τα δάχτυλα
      description: Καθορίζει τον τύπο του συστήματος παιξίματος φλογέρας με τα δάχτυλα,
        π.χ. γερμανικό, μπαρόκ
    recorder_specialized_features:
      name: Εξειδικευμένες δυνατότητες εγγραφής
      description: Προσδιορίζει προηγμένες λειτουργίες σε συσκευές εγγραφής βίντεο,
        π.χ. smart, υποστήριξη Dolby Atmos
    recording_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ ηχογράφησης
      description: Αναφέρει λεπτομερώς τα επιπλέον εξαρτήματα που περιλαμβάνονται
        στα πακέτα ηχογράφησης, όπως ακουστικά ή μικρόφωνο
    recording_capability_type:
      name: Τύπος δυνατότητας εγγραφής
      description: Υποδεικνύει εάν ο δέκτης μπορεί να εγγράψει τηλεοπτικό περιεχόμενο
        και τη μέθοδο που χρησιμοποιείται (π.χ., USB PVR, εσωτερικός HDD, cloud).
    recording_functionality:
      name: Λειτουργικότητα εγγραφής
      description: Υποδεικνύει εάν και πώς ο δέκτης μπορεί να εγγράψει τηλεοπτικό
        περιεχόμενο (π.χ., DVR σε εσωτερικό HDD, εξωτερικό USB).
    recording_mode:
      name: Λειτουργία εγγραφής
      description: Αναφέρει τους λειτουργικούς τρόπους που υποστηρίζει ο εγγραφέας
        (π.χ., συνεχής, χρονομετρημένη εγγραφή).
    recording_quality:
      name: Ποιότητα εγγραφής
      description: Περιγράφει την ευκρίνεια ήχου των μεταγραφέων και των συστημάτων
        υπαγόρευσης, όπως χαμηλή ή υψηλή
    recording_speed_modes_supported:
      name: Υποστηριζόμενοι τρόποι ταχύτητας εγγραφής
      description: Αναφέρει τους τρόπους ταχύτητας ταινίας που μπορεί να εγγράψει
        ή να αναπαράγει το VCR, επηρεάζοντας το χρόνο εγγραφής και την ποιότητα εικόνας.
    recreational_vehicle_type:
      name: Τύπος οχήματος αναψυχής
      description: Προσδιορίζει την κατηγορία ενός οχήματος αναψυχής, όπως κατηγορίας
        Α ή ρυμουλκούμενο ταξιδιού
    reed_strength:
      name: Αντοχή καλαμιού
      description: Υποδεικνύει την ευελιξία των καλαμιών για ξύλινα πνευστά όργανα,
        όπως μαλακό, μεσαίο ή σκληρό
    reel_capacity:
      name: Χωρητικότητα καρουλιού
      description: Καθορίζει την χωρητικότητα ενός καρουλιού σε ένα δοχείο εμφάνισης
        φιλμ, όπως μονή ή τετραπλή
    reflector_design:
      name: Σχέδιο ανακλαστήρα
      description: Περιγράφει το σχέδιο ενός ανακλαστήρα φλας, όπως κηρήθρα ή ομπρέλα
    regenerative_braking_features:
      name: Χαρακτηριστικά αναγεννητικής πέδησης
      description: Περιγράφει τα χαρακτηριστικά των μονάδων αναγεννητικής πέδησης
        ηλεκτρικών οχημάτων, π.χ. αντοχή στις καιρικές συνθήκες, εύκολη εγκατάσταση
    region:
      name: Περιοχή
      description: Προσδιορίζει τη συγκεκριμένη τοποθεσία από την οποία προέρχεται
        το προϊόν, συνήθως για κρασί και οινοπνευματώδη ποτά, π.χ. Καλιφόρνια, Μπορντό
    region_code:
      name: Κωδικός περιοχής
      description: Καθορίζει την περιοχή όπου έχει άδεια χρήσης ένα λογισμικό βιντεοπαιχνιδιών,
        όπως Ασία (AS) ή Παγκόσμια (GL)
    release_mechanism:
      name: Μηχανισμός απελευθέρωσης
      description: Υποδεικνύει την τεχνολογία χορήγησης ή απορρόφησης της βιταμίνης
        (π.χ., παρατεταμένης αποδέσμευσης, λιποσωμική, μασώμενη).
    release_schedule:
      name: Πρόγραμμα κυκλοφορίας
      description: Καθορίζει πόσο συχνά κυκλοφορούν νέα επεισόδια ή ενημερώσεις, π.χ.
        εβδομαδιαία, δύο φορές την εβδομάδα
    remote_control_functions:
      name: Λειτουργίες τηλεχειρισμού
      description: Παραθέτει τις συγκεκριμένες ενέργειες που μπορεί να ενεργοποιήσει
        το τηλεχειριστήριο κλείστρου πέρα από τη λήψη φωτογραφιών.
    remote_shutter_form_factor:
      name: Συντελεστής μορφής τηλεχειριστηρίου κλείστρου
      description: Προσδιορίζει το φυσικό στυλ ή το περίβλημα του τηλεχειριστηρίου
        κλείστρου, όπως το κουμπί/χειριστήριο, το χειριστήριο δακτυλίου ή το selfie
        stick με ενσωματωμένο κλείστρο.
    remote_technology:
      name: Τεχνολογία εξ αποστάσεως
      description: Προσδιορίζει την τεχνολογία που χρησιμοποιείται σε τηλεχειριστήρια
        κάμερας, όπως το Bluetooth ή το tethered
    removable_storage_formats_supported:
      name: Υποστηριζόμενες αφαιρούμενες μορφές αποθήκευσης
      description: Καθορίζει τις αφαιρούμενες μορφές αποθήκευσης με τις οποίες είναι
        συμβατή μια συσκευή, π.χ. SD, microUSB
    removal_target:
      name: Στόχος αφαίρεσης
      description: Καθορίζει ποια προϊόντα νυχιών είναι σχεδιασμένο να διαλύει το
        αφαιρετικό (π.χ., βερνίκι gel, ακρυλικά νύχια, σκόνη dip).
    replacement_lamp_type:
      name: Τύπος λάμπας αντικατάστασης
      description: Ταξινομεί το στυλ του ανταλλακτικού που παρέχεται (π.χ., μονάδα
        λάμπας και θήκης, λωρίδα οπίσθιου φωτισμού LED, συναρμολόγηση CCFL).
    reptile/amphibian_food_form:
      name: Μορφή τροφής ερπετών/αμφιβίων
      description: Καθορίζει τη μορφή τροφής για ερπετά/αμφίβια, για παράδειγμα λυοφιλοποιημένη
        ή σε σφαιρίδια
    reptile/amphibian_habitat_supply_type:
      name: Τύπος παροχής ενδιαιτήματος ερπετών/αμφιβίων
      description: Προσδιορίζει τον τύπο παροχής θέρμανσης ή φωτισμού για ενδιαιτήματα
        ερπετών/αμφιβίων, όπως λάμπα θερμότητας ή λάμπα UVB
    research_focus:
      name: Εστίαση της έρευνας
      description: Προσδιορίζει τον κύριο τομέα σπουδών σε ακαδημαϊκές εργασίες, όπως
        βιολογία ή οικονομικά
    research_methodology:
      name: Μεθοδολογία έρευνας
      description: Προσδιορίζει τον τύπο των μεθόδων έρευνας που χρησιμοποιούνται
        σε ακαδημαϊκές εργασίες, όπως έρευνα μέσω ερωτηματολογίου ή ποιοτική
    resistance_level:
      name: Επίπεδο αντίστασης
      description: Υποδεικνύει το επίπεδο αντίστασης του προϊόντος, συνήθως για ζώνες
        άσκησης, π.χ. πολύ μεγάλη
    resistance_system:
      name: Σύστημα αντίστασης
      description: Καθορίζει τον μηχανισμό που χρησιμοποιείται για τη δημιουργία αντίστασης
        σε εξοπλισμό γυμναστικής, π.χ. νερό, αέρας
    resistance_tolerance:
      name: Ανοχή αντίστασης
      description: Καθορίζει την επιτρεπτή απόκλιση της πραγματικής αντίστασης από
        την ονομαστική της τιμή, εκφρασμένη ως ποσοστό (π.χ., ±1%).
    restrictor_gate_shape:
      name: Σχήμα πύλης περιοριστή
      description: Καθορίζει το γεωμετρικό σχήμα της πύλης περιοριστή που περιλαμβάνεται
        με ή απαιτείται από το χειριστήριο.
    result_display:
      name: Εμφάνιση αποτελεσμάτων
      description: Καθορίζει τη μορφή του τεστ εγκυμοσύνης, π.χ. βάσει γραμμής, ψηφιακό
    retail/sale_sign_design:
      name: Σχέδιο πινακίδας λιανικής/πώλησης
      description: Υποδεικνύει το είδος του μηνύματος σε πινακίδες λιανικής ή πώλησης,
        π.χ. πώληση, ειδική προσφορά
    reticle_plane:
      name: Επίπεδο πλέγματος
      description: Καθορίζει το εστιακό επίπεδο του πλέγματος σε σκόπευτρα και σκοπευτικά
        όπλων, π.χ., πρώτο ή δεύτερο
    reticle_type:
      name: Τύπος πλέγματος
      description: Προσδιορίζει τον τύπο του πλέγματος σε σκόπευτρα όπλων, όπως Duplex
        ή Mildot
    rewinder_operation_mode:
      name: Τρόπος λειτουργίας επανατυλίκτη
      description: Καθορίζει τους λειτουργικούς τρόπους που υποστηρίζει ο επανατυλίκτης
        (π.χ., μόνο επανατύλιξη, επανατύλιξη και γρήγορη προώθηση).
    rf_output_standard:
      name: Πρότυπο εξόδου RF
      description: Καθορίζει το τηλεοπτικό ή ραδιοφωνικό πρότυπο εκπομπής που εξάγει
        ο διαμορφωτής.
    rfid_frequency:
      name: Συχνότητα RFID
      description: Καθορίζει τη συχνότητα λειτουργίας των προϊόντων RFID, π.χ. χαμηλή,
        εξαιρετικά υψηλή
    riding_style:
      name: Στυλ ανάβασης
      description: Καθορίζει την προβλεπόμενη χρήση ή το στυλ ανάβασης για εξοπλισμό
        χειμερινών σπορ, π.χ. σλάλομ, ελεύθερο
    riding_toy_propulsion_type:
      name: Τύπος προώθησης παιχνιδιού ιππασίας
      description: Προσδιορίζει τον τρόπο με τον οποίο προωθείται ένα παιχνίδι ιππασίας,
        όπως ηλεκτρικό ή πεντάλ
    rim/wheel_design:
      name: Σχέδιο ζάντας/τροχού
      description: Περιγράφει το στυλ ή την κατασκευή ζαντών/τροχών οχημάτων, όπως
        κράμα ή ακτίνες
    ring_design:
      name: Σχέδιο δαχτυλιδιού
      description: Περιγράφει το στυλ ενός δαχτυλιδιού, όπως στεφάνη ή μονόπετρο
    ring_size:
      name: Μέγεθος δαχτυλιδιού
      description: Καθορίζει το μέγεθος ενός δαχτυλιδιού, όπως L ή 6,5
    rinse_requirement:
      name: Απαίτηση ξεβγάλματος
      description: Διευκρινίζει εάν το καθαριστικό πρέπει να ξεπλυθεί, μπορεί να παραμείνει
        ή είναι χωρίς ξέβγαλμα (π.χ., νερό μικυλίων).
    rise_height_class:
      name: Κατηγορία ύψους ανύψωσης
      description: Κατηγοριοποιεί πόσο πρόσθετο ύψος προσθέτει η λαβή αντίχειρα σε
        σχέση με το στοκ στικ (π.χ., χαμηλής ανύψωσης, μέσης ανύψωσης, υψηλής ανύψωσης).
    riser_color:
      name: Χρώμα λαβής τόξου
      description: Προσδιορίζει το χρώμα της λαβής σε τόξα τοξοβολίας, όπως μαύρο
        ή μπλε
    riser_material:
      name: Υλικό λαβής τόξου
      description: Καθορίζει το υλικό της λαβής τόξου ή βαλλίστρας, όπως ανθρακονήματα
        ή ξύλο
    riser_pattern:
      name: Μοτίβο λαβής τόξου
      description: Περιγράφει το σχέδιο ή το μοτίβο της λαβής τόξου ή βαλλίστρας,
        όπως καμουφλάζ ή χαρακτηριστική υφή
    rivet_form:
      name: Μορφή πριτσινιού
      description: Περιγράφει τη μορφή των πριτσινιών υλικού, π.χ. συμπαγή, διακλαδιζόμενα
    road_sign_design:
      name: Σχεδιασμός οδικής πινακίδας
      description: Προσδιορίζει τον τύπο των πληροφοριών που εμφανίζονται σε μια πινακίδα,
        π.χ. στάση, όριο ταχύτητας
    robe_style:
      name: Στυλ ρόμπας
      description: Καθορίζει τον συνολικό τύπο σχεδιασμού ή το στυλ κατασκευής της
        ρόμπας, όπως ρόμπα σπα ή περιτύλιγμα.
    rock_composition:
      name: Σύνθεση πετρώματος
      description: Καθορίζει τη γεωλογική σύνθεση ενός πετρώματος, όπως μάρμαρο ή
        ασβεστόλιθος
    rock_formation:
      name: Σχηματισμός πετρώματος
      description: Καθορίζει τη γεωλογική ταξινόμηση των πετρωμάτων, όπως πυριγενή
        ή ιζηματογενή
    rocker_type:
      name: Τύπος rocker
      description: Καθορίζει το στυλ καμπυλότητας των snowboard ή των σκι, π.χ. flat,
        rocker
    rod_color:
      name: Χρώμα καλαμιού ψαρέματος
      description: Προσδιορίζει το χρώμα ενός καλαμιού ψαρέματος, π.χ. μαύρο ή μπλε
    rod_material:
      name: Υλικό ράβδου
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε αθλητικά είδη με ράβδο,
        όπως γραφίτης ή υαλοβάμβακας
    rod_pattern:
      name: Μοτίβο καλαμιού ψαρέματος
      description: Περιγράφει το σχέδιο ή την εκτύπωση σε καλάμι ψαρέματος, όπως καμουφλάζ
        ή ριγέ
    rod_shape:
      name: Σχήμα ράβδου
      description: Καθορίζει τη μορφή ή τη διαμόρφωση των ράβδων ντους, π.χ. ευθείες,
        σε σχήμα U
    roller_head:
      name: Κεφαλή κυλίνδρου
      description: Καθορίζει τον αριθμό των κεφαλών σε κυλίνδρους, συνήθως για εργαλεία
        περιποίησης δέρματος. πχ μονό, διπλό
    roller_material:
      name: Υλικό κυλίνδρου
      description: Καθορίζει το υλικό που χρησιμοποιείται σε έναν κύλινδρο, συνήθως
        για εργαλεία περιποίησης δέρματος, π.χ. νεφρίτης, σιλικόνη
    roller_type:
      name: Τύπος κυλίνδρου
      description: Προσδιορίζει τον τύπο του κυλίνδρου, συνήθως για εργαλεία περιποίησης
        δέρματος. π.χ. πάγου, μικροβελόνας
    roof_decor_shape:
      name: Σχήμα διακόσμησης στέγης
      description: Καθορίζει το σχέδιο ή τη μορφή διακοσμήσεων στέγης, όπως άλογο
        ή ιστιοφόρο
    room_correction_technology:
      name: Τεχνολογία διόρθωσης δωματίου
      description: Καθορίζει το αυτόματο σύστημα ακουστικής βαθμονόμησης ή διόρθωσης
        δωματίου που είναι ενσωματωμένο στον δέκτη.
    rosin_form:
      name: Μορφή κολοφωνίου
      description: Περιγράφει το σχήμα ή τη μορφή του κολοφωνίου για δοξάρια έγχορδων
        οργάνων, όπως μπλοκ ή πλάκα
    rosin_grade:
      name: Βαθμός κολοφωνίου
      description: Καθορίζει τον τύπο κολοφωνίου που χρησιμοποιείται για έγχορδα όργανα,
        π.χ. σκούρο, μεσαίο
    rotating_direction:
      name: Κατεύθυνση περιστροφής
      description: Καθορίζει την κατεύθυνση στροφής της μύτης σε τρυπάνια και κατσαβίδια,
        όπως αριστερόστροφο ή δεξιόστροφο
    rotation_direction:
      name: Κατεύθυνση περιστροφής
      description: Υποδεικνύει εάν το τρυπάνι νυχιών υποστηρίζει περιστροφή προς τα
        εμπρός, αντίστροφη περιστροφή ή και τα δύο.
    rotator_control_technology:
      name: Τεχνολογία ελέγχου περιστροφέα
      description: Καθορίζει τον μηχανισμό ελέγχου των περιστροφέων κεραίας, όπως
        οι χειροκίνητοι ή οι μηχανοκίνητοι
    route_of_administration:
      name: Οδός χορήγησης
      description: Προσδιορίζει πώς εφαρμόζεται ή καταναλώνεται το προϊόν, επηρεάζοντας
        την αποτελεσματικότητα και την ασφάλεια (π.χ., από το στόμα, τοπικά, διαδερμικό
        έμπλαστρο, υπογλώσσια, ενδομυϊκή ένεση).
    rug/mat_features:
      name: Χαρακτηριστικά κιλιμιού/ποδόμακτρου
      description: Περιγράφει τα ιδιαίτερα χαρακτηριστικά των κιλιμιών/ποδόμακτρων,
        όπως αντιολισθητική βάση ή γρήγορο στέγνωμα
    rug/mat_material:
      name: Υλικό κιλιμιού/ποδόμακτρου
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται σε κιλίμια ή
        ποδόμακτρα, όπως καουτσούκ ή μικροΐνες
    rug/mat_shape:
      name: Σχήμα κιλιμιού/ποδόμακτρου
      description: Καθορίζει το σχήμα των κιλιμιών και των ποδόμακτρων, π.χ. μακρόστενο,
        τετράγωνο
    rug_features:
      name: Χαρακτηριστικά κιλιμιού
      description: Περιγράφει συγκεκριμένα χαρακτηριστικά κιλιμιών, όπως αντιολισθητική
        βάση ή χρώματα ανθεκτικά στην υπεριώδη ακτινοβολία
    rug_material:
      name: Υλικό κιλιμιού
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην κατασκευή ενός κιλιμιού,
        όπως μαλλί ή γιούτα
    rug_shape:
      name: Σχήμα κιλιμιού
      description: Προσδιορίζει το γεωμετρικό σχέδιο των κιλιμιών, όπως τετράγωνο
        ή μακρόστενο
    rum_grade:
      name: Ποιότητα ρούμι
      description: Ταξινομεί το ρούμι με βάση τα χαρακτηριστικά ή την ποιότητα, π.χ.
        premium, καρυκευμένο
    saddle_base_color:
      name: Χρώμα βάσης σέλας
      description: Προσδιορίζει το κύριο χρώμα μιας βάσης σέλας ποδηλάτου, όπως μαύρο
        ή μπλε
    saddle_base_material:
      name: Υλικό βάσης σέλας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στη βάση μιας σέλας ποδηλάτου,
        όπως ατσάλι ή ανθρακονήματα
    saddle_base_pattern:
      name: Μοτίβο βάσης σέλας
      description: Περιγράφει το σχέδιο ή την εκτύπωση σε βάση σέλας ποδηλάτου, όπως
        αφηρημένο ή λογότυπο
    saddle_material:
      name: Υλικό σέλας
      description: Καθορίζει το υλικό που χρησιμοποιείται στις σέλες ποδηλάτων, όπως
        καουτσούκ ή δέρμα
    saddle_seat_color:
      name: Χρώμα καθίσματος σέλας
      description: Καθορίζει το χρώμα ενός καθίσματος σέλας ποδηλάτου, όπως ασημί
        ή κόκκινο
    saddle_seat_material:
      name: Υλικό καθίσματος σέλας
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην κατασκευή μιας σέλας
        ποδηλάτου, όπως δέρμα ή νάιλον
    saddle_seat_pattern:
      name: Μοτίβο καθίσματος σέλας
      description: Περιγράφει το σχέδιο ή την εκτύπωση σε κάθισμα σέλας ποδηλάτου,
        όπως φλοράλ ή γεωμετρικό
    safety_certifications:
      name: Πιστοποιήσεις ασφαλείας
      description: Υποδεικνύει τη συμμόρφωση του προϊόντος με τα πρότυπα ασφαλείας,
        συνήθως για βρεφικά προϊόντα, π.χ. χωρίς BPA
    safety_device_installation:
      name: Εγκατάσταση συσκευής ασφαλείας
      description: Καθορίζει τον τρόπο με τον οποίο τοποθετούνται ή προσαρμόζονται
        τα προϊόντα ασφαλείας, π.χ. με κόλλα, με βίδα
    safety_equipment_material:
      name: Υλικό εξοπλισμού ασφαλείας
      description: Καθορίζει τον τύπο υλικού σε είδη ασφαλείας οχημάτων, όπως νάιλον
        ή υαλοβάμβακας
    safety_rail_installation:
      name: Εγκατάσταση ράγας ασφαλείας
      description: Καθορίζει τον τρόπο με τον οποίο τοποθετούνται οι ράγες ασφαλείας,
        όπως ρυθμιζόμενες ή μόνιμες
    sailboat_type:
      name: Τύπος ιστιοφόρου
      description: Προσδιορίζει το συγκεκριμένο σχέδιο ή μοντέλο ενός ιστιοφόρου,
        όπως sloop ή cutter
    sandal_style:
      name: Στυλ σανδαλιών
      description: Καθορίζει το στυλ των σανδαλιών, όπως με λουράκι αστραγάλου ή κορδόνι
    sandblaster_application:
      name: Εφαρμογή εργαλείου αμμοβολής
      description: Καθορίζει την προβλεπόμενη λειτουργία των εργαλείων αμμοβολής,
        όπως γυάλισμα ή λείανση
    sander_type:
      name: Τύπος τριβείου
      description: Ταξινομεί τον τύπο του εργαλείου τριβείου, π.χ. με ιμάντα, τυχαίο
        τροχιακό
    sanding_application:
      name: Εφαρμογή λείανσης
      description: Καθορίζει τον σκοπό των εξαρτημάτων λείανσης, όπως το φινίρισμα
        ή η αφαίρεση του χρώματος
    satellite_coverage_area:
      name: Περιοχή δορυφορικής κάλυψης
      description: Καθορίζει τις γεωγραφικές περιοχές που μπορεί να έχει πρόσβαση
        ένα δορυφορικό τηλέφωνο, όπως η Αυστραλία ή η Αφρική
    satellite_messaging_capability:
      name: Δυνατότητα δορυφορικών μηνυμάτων
      description: Υποδεικνύει εάν το προϊόν υποστηρίζει μονόδρομη (μόνο εξερχόμενη)
        ή αμφίδρομη (αποστολή και λήψη) δορυφορική ανταλλαγή μηνυμάτων.
    satellite_navigation_systems_supported:
      name: Υποστηριζόμενα συστήματα δορυφορικής πλοήγησης
      description: Καθορίζει ποια παγκόσμια δορυφορικά συστήματα πλοήγησης (GNSS)
        μπορεί να λάβει το τηλέφωνο για εντοπισμό θέσης και παρακολούθηση.
    satellite_network_type:
      name: Τύπος δορυφορικού δικτύου
      description: Προσδιορίζει τον πάροχο υπηρεσιών για δορυφορικά τηλέφωνα, π.χ.
        Inmarsat, Iridium
    sauna_accessories_included:
      name: Περιλαμβάνονται αξεσουάρ σάουνας
      description: Προσδιορίζει τα πρόσθετα αντικείμενα που περιλαμβάνονται στη σάουνα,
        όπως κουτάλα ή πέτρες σάουνας
    scaffolding_mounting_type:
      name: Τύπος τοποθέτησης σκαλωσιάς
      description: Καθορίζει το στυλ διαμόρφωσης της σκαλωσιάς, π.χ. πλαίσιο, κινητή
    scale_material:
      name: Υλικό κλίμακας (μέτρου)
      description: Προσδιορίζει το υλικό που χρησιμοποιείται σε μια κλίμακα, συνήθως
        σε δαγκάνες δέντρων, π.χ. ανοξείδωτο, πλαστικό
    scale_model_accessory_type:
      name: Τύπος εξαρτήματος μακέτας
      description: Προσδιορίζει τον τύπο του εξαρτήματος για μακέτες, όπως κτίρια
        ή φιγούρες
    scale_model_kit_type:
      name: Τύπος κιτ μακέτας
      description: Καθορίζει την κατηγορία του κιτ μακέτας, όπως δεξαμενή ή διαστημόπλοιο
    scale_model_material:
      name: Υλικό μακέτας
      description: Προσδιορίζει το κύριο υλικό που χρησιμοποιείται σε μακέτες, όπως
        ξύλο ή χαρτόνι
    scale_model_theme:
      name: Θέμα μακέτας
      description: Προσδιορίζει το θέμα μιας μακέτας, όπως η φαντασία ή η ιστορία
    scalp_concern:
      name: Πρόβλημα τριχωτού κεφαλής
      description: Καθορίζει το κύριο πρόβλημα τριχωτού κεφαλής ή μαλλιών που είναι
        σχεδιασμένη να αντιμετωπίσει η θεραπεία.
    scalpel_blade_material:
      name: Υλικό λεπίδας νυστεριού
      description: Προσδιορίζει τη σύνθεση των λεπίδων νυστεριού, όπως από ανοξείδωτο
        χάλυβα ή τιτάνιο
    scalpel_blade_number:
      name: Αριθμός λεπίδας νυστεριού
      description: Προσδιορίζει τον συγκεκριμένο αριθμό ή τύπο λεπίδας νυστεριού,
        όπως 10 ή 15Α
    scalpel_blade_shape:
      name: Σχήμα λεπίδας νυστεριού
      description: Περιγράφει τη μορφή της λεπίδας του νυστεριού, όπως κυρτή ή ευθεία
    scalpel_handle_number:
      name: Αριθμός λαβής νυστεριού
      description: Προσδιορίζει τον συγκεκριμένο αριθμό λαβής για νυστέρια, όπως 4
        ή 3L
    scan_converter_features:
      name: Λειτουργίες μετατροπέα σάρωσης
      description: Επισημαίνει τα μοναδικά χαρακτηριστικά ενός μετατροπέα σάρωσης,
        όπως η αυτόματη βαθμονόμηση εικόνας ή ο τηλεχειρισμός
    scanner_features:
      name: Χαρακτηριστικά σαρωτή
      description: Επισημαίνει ειδικές λειτουργίες ενός σαρωτή, όπως τεχνητή νοημοσύνη
        ή σάρωση σε σύννεφο
    scanner_grip_compatibility:
      name: Συμβατότητα λαβής σαρωτή
      description: Υποδεικνύει εάν η θήκη ταιριάζει σε σαρωτές με λαβή πιστολιού/σκανδάλης,
        τυπική φορητή μορφή ή και τα δύο.
    scanner_maintenance_kit_type:
      name: Τύπος κιτ συντήρησης σαρωτή
      description: Ταξινομεί τη φύση του προϊόντος ώστε οι αγοραστές να μπορούν να
        διακρίνουν γρήγορα μεταξύ καρτών καθαρισμού, πλήρων κιτ, κιτ βαθμονόμησης,
        σετ κυλίνδρων, μαντηλάκια και διαλύματα.
    scanner_sensor_type:
      name: Τύπος αισθητήρα σαρωτή
      description: Καθορίζει τον τύπο του αισθητήρα σε σαρωτές, όπως συσκευή απεικόνισης
        2D ή λέιζερ
    scarf/shawl_style:
      name: Στυλ κασκόλ/εσάρπας
      description: Προσδιορίζει το στυλ για κασκόλ και εσάρπες, π.χ. κουβέρτα, περιτύλιξης
    scene_modes:
      name: Λειτουργίες σκηνής
      description: Καθορίζει τη λειτουργία της κάμερας για τη λήψη διαφορετικών σεναρίων,
        όπως νύχτα ή υποβρύχια
    scent:
      name: Άρωμα
      description: Καθορίζει τη μυρωδιά ή το άρωμα ενός προϊόντος, όπως βανίλια ή
        εσπεριδοειδή
    scissor_blade_type:
      name: Τύπος λεπίδας ψαλιδιού
      description: Περιγράφει το σχήμα και το στυλ των λεπίδων ψαλιδιού, όπως κυρτές
        ή ζιγκ-ζαγκ
    scooter_brake_type:
      name: Τύπος φρένου σκούτερ
      description: Καθορίζει τον μηχανισμό και τη σχεδίαση των φρένων του σκούτερ,
        όπως δισκόφρενα ή ταμπούρα
    scope/sight_design:
      name: Σχέδιο σκόπευτρου/σκοπευτικού
      description: Περιγράφει τον τύπο σχεδίασης για σκόπευτρα ή σκοπευτικά όπλων,
        π.χ. νυχτερινή όραση, λέιζερ
    scope/sight_features:
      name: Χαρακτηριστικά σκόπευτρου/σκοπευτικού
      description: Περιγράφει ειδικά χαρακτηριστικά σκόπευτρων ή σκοπευτικών όπλων,
        όπως φωτισμένο πλέγμα ή ηχογράφηση
    scope_design:
      name: Σχεδιασμός σκόπευτρου
      description: Προσδιορίζει τον τύπο σχεδιασμού των οπτικών σκόπευτρων, όπως γωνιακά
        ή ευθύγραμμα
    scope_lens_type:
      name: Τύπος φακού σκόπευτρου
      description: Προσδιορίζει τον τύπο του φακού που χρησιμοποιείται σε σκόπευτρα,
        όπως HD ή ευρυγώνιος
    scoreboard_features:
      name: Χαρακτηριστικά του πίνακα αποτελεσμάτων
      description: Περιγράφει τα ειδικά χαρακτηριστικά ενός πίνακα αποτελεσμάτων,
        όπως φορητό ή ανθεκτικό στις καιρικές συνθήκες
    scrapbook_paper_type:
      name: Τύπος χαρτιού λευκώματος
      description: Προσδιορίζει το στυλ ή το σχέδιο του χαρτιού λευκώματος, όπως ιδιαίτερο
        ή μοτίβο
    screen/display_design:
      name: Σχεδιασμός οθόνης
      description: Καθορίζει τα χαρακτηριστικά σχεδιασμού της οθόνης ενός προϊόντος,
        συνήθως για φωτογραφικές μηχανές, π.χ. σκόπευτρο
    screen_assembly_components_included:
      name: Συμπεριλαμβανόμενα εξαρτήματα συναρμολόγησης οθόνης
      description: Διευκρινίζει ποια μέρη έρχονται προσυναρμολογημένα με την οθόνη.
    screen_curvature_rating:
      name: Βαθμολογία καμπυλότητας οθόνης
      description: Καθορίζει την ακτίνα καμπυλότητας των καμπύλων οθονών (π.χ., 1000R),
        υποδεικνύοντας πόσο έντονη είναι η καμπύλη.
    screen_material:
      name: Υλικό οθόνης
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται για την οθόνη
        ενός προϊόντος, π.χ. γυαλί, πολυανθρακικό
    screen_operation_type:
      name: Τύπος λειτουργίας οθόνης
      description: Περιγράφει το δομικό στυλ ή στυλ ανάπτυξης της οθόνης (π.χ., σταθερό
        πλαίσιο, χειροκίνητο τράβηγμα προς τα κάτω, μηχανοκίνητο, τρίποδο, φουσκωτό).
    screen_protection_features:
      name: Χαρακτηριστικά προστασίας οθόνης
      description: Περιγράφει πώς η θήκη προστατεύει την οθόνη του τηλεφώνου πέρα
        από τη βασική κάλυψη.
    screen_protector_adhesion_type:
      name: Τύπος πρόσφυσης προστατευτικού οθόνης
      description: Καθορίζει τη μέθοδο κόλλησης ή προσάρτησης που χρησιμοποιείται
        για την επικόλληση του προστατευτικού στην οθόνη του τηλεφώνου.
    screen_protector_coverage_style:
      name: Στυλ κάλυψης προστατευτικού οθόνης
      description: Καθορίζει τη φυσική σχεδίαση κάλυψης ή τον παράγοντα μορφής του
        προστατευτικού σε σχέση με την οθόνη της συσκευής.
    screen_protector_features:
      name: Χαρακτηριστικά προστατευτικού οθόνης
      description: Επισημαίνει ειδικά λειτουργικά χαρακτηριστικά που προσφέρει το
        προστατευτικό πέρα από τη βασική προστασία από γρατζουνιές.
    screen_protector_finish:
      name: Φινίρισμα προστατευτικού οθόνης
      description: Προσδιορίζει το οπτικό φινίρισμα επιφάνειας του προστατευτικού
        (π.χ., γυαλιστερό, ματ, απορρήτου, αντιθαμβωτικό).
    screen_specialized_features:
      name: Εξειδικευμένα χαρακτηριστικά οθόνης
      description: Προσδιορίζει τις μοναδικές δυνατότητες μιας οθόνης υπολογιστή,
        όπως αντιθαμβωτική λειτουργία ή οθόνη αφής
    screen_surface_finish:
      name: Φινίρισμα επιφάνειας οθόνης
      description: Περιγράφει την επεξεργασία επιφάνειας του γυαλιού οθόνης, επηρεάζοντας
        την αντανάκλαση και την αίσθηση.
    seafood_type:
      name: Τύπος θαλασσινών
      description: Ταξινομεί τα θαλασσινά κατά είδος, όπως ο τόνος ή ο αστακός
    seal_stamp_design:
      name: Σχέδιο σφραγίδας
      description: Καθορίζει το στυλ μιας σφραγίδας, για παράδειγμα, μονόγραμμα ή
        καλλιγραφία
    season:
      name: Εποχή
      description: Υποδεικνύει την εποχή για την οποία το προϊόν ταιριάζει καλύτερα,
        όπως το καλοκαίρι ή το φθινόπωρο
    seat_color:
      name: Χρώμα καθίσματος
      description: Καθορίζει το χρώμα της επιφάνειας καθίσματος ενός προϊόντος, όπως
        μαύρο ή πράσινο
    seat_cushioning:
      name: Επένδυση καθίσματος
      description: Περιγράφει τον τύπο επένδυσης σε προϊόντα καθισμάτων, όπως με γέμισμα
        ή χωρίς γέμισμα
    seat_pattern:
      name: Μοτίβο καθίσματος
      description: Καθορίζει το οπτικό μοτίβο σε προϊόντα καθισμάτων, όπως αστέρια
        ή κουκκίδες
    seat_reservation:
      name: Κράτηση θέσης
      description: Καθορίζει αν το εισιτήριο περιλαμβάνει ανάθεση θέσης ή απαιτεί
        κράτηση εκ των προτέρων.
    seat_rotation:
      name: Περιστροφή καθίσματος
      description: Υποδεικνύει αν το κάθισμα περιστρέφεται και τις διαθέσιμες θέσεις
        κλειδώματος.
    seat_shape:
      name: Σχήμα καθίσματος
      description: Περιγράφει τη μορφή της επιφάνειας καθίσματος ενός προϊόντος, όπως
        στρογγυλό ή ορθογώνιο
    seat_structure:
      name: Δομή καθίσματος
      description: Ορίζει την κατασκευή ενός καθίσματος, π.χ. ψάθινο, συμπαγές
    seat_swivel_mechanism:
      name: Μηχανισμός περιστροφής καθίσματος
      description: Υποδεικνύει αν και πώς το κάθισμα μπορεί να περιστραφεί στις προσγειώσεις
        για ασφαλέστερες μεταφορές.
    seat_type:
      name: Τύπος καθίσματος
      description: 'Περιγράφει το σχέδιο μιας καρέκλας ή ενός πάγκου, όπως με επένδυση
        ή στρογγυλή '
    seat_upholstery_color:
      name: Χρώμα ταπετσαρίας καθισμάτων
      description: Προσδιορίζει το χρώμα της ταπετσαρίας της επιφάνειας καθίσματος
        ενός επίπλου, όπως μπεζ ή μπλε
    seat_upholstery_material:
      name: Υλικό ταπετσαρίας καθισμάτων
      description: Καθορίζει το ύφασμα ή το υλικό που χρησιμοποιείται για επενδύσεις
        καναπέδων, όπως μικροΐνες ή δερματίνη
    seat_upholstery_pattern:
      name: Μοτίβο ταπετσαρίας καθισμάτων
      description: Προσδιορίζει το σχέδιο ή το μοτίβο σε ύφασμα καναπέ, όπως λαχούρι
        ή δίνη
    security_algorithms:
      name: Αλγόριθμοι ασφαλείας
      description: 'Καθορίζει τις μεθόδους κρυπτογράφησης που χρησιμοποιούνται από
        την ηλεκτρονική, π.χ. AES '
    security_level:
      name: Επίπεδο ασφαλείας
      description: Καθορίζει το πρότυπο ασφάλειας αντικειμένων όπως κλειδαριές και
        μάνδαλα, π.χ. χαμηλό, μεσαίο, υψηλό
    selfie_stick_functionality_type:
      name: Τύπος λειτουργικότητας selfie stick
      description: Ορίζει την κύρια λειτουργική διαμόρφωση του προϊόντος (π.χ., μόνο
        stick, συνδυασμός stick-τρίποδου, gimbal).
    semiconductor_material:
      name: Υλικό ημιαγωγού
      description: Προσδιορίζει το βασικό υλικό υποστρώματος ημιαγωγού που χρησιμοποιείται
        στο εξάρτημα, επηρεάζοντας την ταχύτητα μεταγωγής, την τάση διάσπασης και
        τη θερμική συμπεριφορά.
    sensation_effect:
      name: Αποτέλεσμα αίσθησης
      description: Περιγράφει οποιοδήποτε πρόσθετο αισθητηριακό αποτέλεσμα παρέχει
        το λιπαντικό (π.χ., θέρμανση, μυρμήγκιασμα).
    sensor/measuring_tool_features:
      name: Χαρακτηριστικά αισθητήρα/εργαλείου μέτρησης
      description: Περιγράφει μοναδικά χαρακτηριστικά ενός αισθητήρα ή ενός εργαλείου
        μέτρησης, όπως φορητό ή έξυπνο
    sensor_features:
      name: Χαρακτηριστικά αισθητήρα
      description: Περιγράφει τα συγκεκριμένα χαρακτηριστικά του αισθητήρα ενός προϊόντος,
        όπως ο οπίσθιος φωτισμός ή η ενσωματωμένη κάμερα
    sensor_type:
      name: Τύπος αισθητήρα
      description: Προσδιορίζει τον τύπο του αισθητήρα που χρησιμοποιείται σε συσκευές
        ασφαλείας, π.χ. υπέρυθρος, υπερήχων
    sensory_effect:
      name: Αισθητηριακό αποτέλεσμα
      description: Υποδεικνύει την άμεση φυσική αίσθηση που παρέχει το προϊόν όταν
        εφαρμόζεται.
    sequin/glitter_shape:
      name: Σχήμα για πούλιες/γκλίτερ
      description: Περιγράφει τη μορφή που μπορούν να έχουν οι πούλιες ή το γκλίτερ,
        όπως στρογγυλά ή τετράγωνα
    sequin_shape:
      name: Σχήμα για πούλιες
      description: Καθορίζει το σχήμα της πούλιας, όπως στρογγυλό ή λουλούδι
    serum_target_areas:
      name: Περιοχές στόχου ορού
      description: Καθορίζει τις προβλεπόμενες περιοχές εφαρμογής για έναν ορό, όπως
        τα μάτια ή το πρόσωπο
    service_type:
      name: Τύπος υπηρεσίας
      description: Προσδιορίζει την κατηγορία των υπηρεσιών cloud, όπως η πλατφόρμα
        ως υπηρεσία (PaaS) ή το λογισμικό ως υπηρεσία (SaaS)
    sewing_foot_type:
      name: Τύπος ποδιού ραπτικής
      description: Καθορίζει το στυλ ραψίματος, όπως χάντρες ή τυφλό στρίφωμα
    sewing_machine_part_category:
      name: Κατηγορία ανταλλακτικών ραπτομηχανών
      description: Ταξινομεί τον τύπο του εξαρτήματος της ραπτομηχανής, όπως ιμάντας
        κινητήρα ή πόδι πίεσης
    sfx_control_technology:
      name: Τεχνολογία ελέγχου SFX
      description: Προσδιορίζει τον τρόπο λειτουργίας των συσκευών ειδικών εφέ, όπως
        DMX ή ενεργοποιούμενες με ήχο
    shaft_color:
      name: Χρώμα άξονα
      description: Καθορίζει την απόχρωση του άξονα σε αντικείμενα όπως έμβολα, π.χ.
        ασημί ή κόκκινο
    shaft_flex:
      name: Ευελιξία άξονα
      description: Υποδεικνύει το επίπεδο ευελιξίας των αξόνων ράβδου του γκολφ, π.χ.
        άκαμπτο, κυρίες
    shaft_material:
      name: Υλικό άξονα
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στον άξονα των εργαλείων,
        όπως ξύλο ή μέταλλο
    shaft_orientation:
      name: Προσανατολισμός άξονα
      description: Προσδιορίζει την κατεύθυνση του άξονα σε μικρούς κινητήρες, για
        παράδειγμα, οριζόντια ή κάθετα
    shaft_pattern:
      name: Μοτίβο άξονα
      description: Υποδεικνύει το οπτικό μοτίβο στον άξονα των αντικειμένων, συνήθως
        εμβόλων, π.χ. φύλλα, πουλιά
    shampoo/conditioner_effect:
      name: Αποτέλεσμα σαμπουάν/μαλακτικού
      description: Περιγράφει το επιδιωκόμενο αποτέλεσμα από τη χρήση του σαμπουάν
        ή του μαλακτικού, όπως κατά της πιτυρίδας ή ενυδάτωσης
    shampoo/conditioner_items_included:
      name: Περιλαμβάνονται είδη σαμπουάν/μαλακτικού
      description: Προσδιορίζει τον τύπο των αντικειμένων σε ένα σετ σαμπουάν και
        μαλακτικού, π.χ. σαμπουάν 2 σε 1
    shampoo_type:
      name: Τύπος σαμπουάν
      description: Ταξινομεί τα σαμπουάν με βάση τη σύνθεσή τους, όπως πούδρα ή 2-σε-1
    shape:
      name: Σχήμα
      description: Περιγράφει τη γεωμετρική μορφή ή σχήμα ενός προϊόντος, όπως στρογγυλό
        ή καρδιά
    shapewear_support_level:
      name: Επίπεδο στήριξης shapewear
      description: Υποδεικνύει το επίπεδο συμπίεσης των ειδών shapewear, π.χ. επίπεδο
        1
    shaving_cream_formulation:
      name: Σύνθεση κρέμας ξυρίσματος
      description: Καθορίζει την υφή των κρεμών ξυρίσματος, όπως τζελ ή αφρού
    shaving_kit_components:
      name: Εξαρτήματα κιτ ξυρίσματος
      description: Καθορίζει τα στοιχεία που περιλαμβάνονται σε ένα κιτ ξυρίσματος,
        όπως ξυράφι ή βούρτσα
    sheen/gloss_level:
      name: Επίπεδο στιλπνότητας/γυαλάδας
      description: Καθορίζει το επίπεδο γυαλάδας των προϊόντων βαφής ή βερνικιού,
        όπως ημιγυαλιστερό ή σατέν
    sheet_color:
      name: Χρώμα φύλλου
      description: Προσδιορίζει το χρώμα των χάρτινων προϊόντων, π.χ. λευκό, μπλε
    sheet_mask_material:
      name: Υλικό μάσκας φύλλου
      description: Καθορίζει το πρωτεύον υλικό ή υπόστρωμα των μασκών φύλλου ή υδρογέλης.
    sheet_pattern:
      name: Μοτίβο φύλλου
      description: 'Περιγράφει το σχέδιο ή την εκτύπωση σε προϊόντα χαρτιού, όπως
        καρό ή ουράνιο τόξο '
    shelf_color:
      name: Χρώμα ραφιού
      description: Περιγράφει το χρώμα του ραφιού ενός προϊόντος, όπως μπεζ ή μαύρο
    shelf_material:
      name: Υλικό ραφιού
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται στην κατασκευή
        ραφιών, όπως ξύλο ή μέταλλο
    shelf_pattern:
      name: Μοτίβο ραφιού
      description: Περιγράφει το σχέδιο ή το μοτίβο σε βιομηχανικά ράφια, όπως αφηρημένο
        ή σε σχήμα V
    shell/frame_color:
      name: Χρώμα κελύφους/πλαισίου
      description: Καθορίζει το χρώμα του κελύφους ή του πλαισίου σε αντικείμενα όπως
        πατίνια ή κράνη, π.χ. μαύρο, μπλε
    shell/frame_material:
      name: Υλικό κελύφους/πλαισίου
      description: Καθορίζει τη σύνθεση του κελύφους ή του πλαισίου ενός προϊόντος,
        συνήθως για πατίνια κυλίνδρων ή τροχοπέδιλα, π.χ. καουτσούκ, σύνθετο
    shell/frame_pattern:
      name: Μοτίβο κελύφους/πλαισίου
      description: Περιγράφει το σχέδιο ή την εκτύπωση στο κέλυφος ή το πλαίσιο ενός
        προϊόντος, συνήθως τροχοπέδιλα
    shingle/tile_material:
      name: Υλικό πλακιδίων στέγης/κεραμιδιών
      description: Προσδιορίζει τη σύνθεση των πλακιδίων στέγης ή κεραμιδιών, όπως
        τσιμέντο ή καουτσούκ
    shoe_binding_type:
      name: Τύπος στερέωσης παπουτσιού
      description: Καθορίζει τον μηχανισμό που χρησιμοποιείται για τη στερέωση των
        παπουτσιών στον εξοπλισμό, όπως step-in ή speed entry
    shoe_features:
      name: Χαρακτηριστικά παπουτσιών
      description: Προσδιορίζει τα ιδιαίτερα χαρακτηριστικά των παπουτσιών, όπως αδιάβροχα
        ή ελαφριά
    shoe_fit:
      name: Εφαρμογή παπουτσιού
      description: Καθορίζει το πλάτος των υποδημάτων, όπως στενό ή φαρδύ
    shoe_size:
      name: Μέγεθος παπουτσιού
      description: Χρησιμοποιείται για τον καθορισμό του μεγέθους των υποδημάτων,
        π.χ. extra large (XL), 9,5
    shooting_modes:
      name: Λειτουργίες λήψης
      description: Καθορίζει τις λειτουργικές ρυθμίσεις της κάμερας, όπως λειτουργία
        σκηνής ή ταινίας
    shopping_bag_material:
      name: Υλικό τσάντας αγορών
      description: Καθορίζει τον τύπο του υλικού που χρησιμοποιείται στις τσάντες
        αγορών, π.χ. χαρτί, βιοδιασπώμενα υλικά
    shower_base_design:
      name: Σχέδιο βάσης ντους
      description: Καθορίζει τη σχεδίαση των βάσεων ντους, όπως γωνιακές ή τεταρτημορίου
    shower_cap_lining_material:
      name: Υλικό επένδυσης σκουφάκι ντους
      description: Προσδιορίζει το υλικό που χρησιμοποιείται στην εσωτερική επένδυση
        που έρχεται σε επαφή με τα μαλλιά, επηρεάζοντας την άνεση, την υγεία των μαλλιών
        και τον έλεγχο του φριζαρίσματος.
    shower_curtain_mounting_type:
      name: Τύπος τοποθέτησης κουρτίνας μπάνιου
      description: Προσδιορίζει τον τρόπο με τον οποίο στερεώνεται μια κουρτίνα μπάνιου,
        όπως κρίκος ή δακτύλιος
    shower_design:
      name: Σχέδιο ντους
      description: Προσδιορίζει τη διαμόρφωση καμπινών και κιτ ντους, όπως εσοχή ή
        γωνία
    shower_features:
      name: Χαρακτηριστικά ντους
      description: Περιγράφει τα μοναδικά στοιχεία ενός ντους, όπως ενσωματωμένο κάθισμα
        ή φορητό ντους
    shower_opening_type:
      name: Τύπος ανοίγματος ντουζιέρας
      description: Προσδιορίζει το στυλ ανοίγματος της πόρτας της ντουζιέρας, όπως
        μεντεσέδες ή συρόμενο
    shrink_ratio:
      name: Αναλογία συρρίκνωσης
      description: Καθορίζει το ρυθμό συστολής του θερμοσυστελλόμενου σωλήνα, π.χ.
        2:1
    shutter_finish:
      name: Φινίρισμα παραθυρόφυλλου
      description: Περιγράφει την επιφανειακή επεξεργασία των παραθυρόφυλλων, όπως
        βαμμένα ή ασταρωμένα
    side_panel_style:
      name: Στυλ πλευρικού πάνελ
      description: Περιγράφει το στυλ ή το υλικό του κύριου πλευρικού πάνελ (π.χ.,
        παράθυρο σκληρυμένου γυαλιού, πλέγμα, συμπαγής χάλυβας).
    siding_material:
      name: Υλικό επένδυσης
      description: Προσδιορίζει τον τύπο του υλικού που χρησιμοποιείται σε προϊόντα
        επένδυσης, όπως ξύλο ή βινύλιο
    signal_path_technology:
      name: Τεχνολογία διαδρομής σήματος
      description: Προσδιορίζει την βασική τοπολογία κυκλώματος (π.χ., λυχνία, solid-state,
        υβριδική) που διαμορφώνει τον ηχητικό χαρακτήρα του καναλιού.
    signal_technology:
      name: Τεχνολογία σήματος
      description: Προσδιορίζει την κύρια ασύρματη τεχνολογία ή τεχνολογία δεδομένων
        που το προϊόν είναι σχεδιασμένο να ενισχύσει ή να επεκτείνει.
    signal_types_blocked:
      name: Τύποι σημάτων που μπλοκάρονται
      description: Απαριθμεί τα συγκεκριμένα ασύρματα ή ηλεκτρομαγνητικά σήματα που
        το προϊόν είναι σχεδιασμένο να μπλοκάρει ή να θωρακίζει.
    signature_placement:
      name: Τοποθέτηση υπογραφής
      description: Προσδιορίζει πού βρίσκεται μια υπογραφή σε ένα συλλεκτικό αντικείμενο,
