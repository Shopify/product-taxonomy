    input_connection_type:
      name: Loại kết nối đầu vào
      description: Xác định đầu nối hoặc tiêu chuẩn giao diện được chấp nhận ở phía
        đầu vào của bộ chuyển đổi.
    input_signal_interface:
      name: Giao diện tín hiệu đầu vào
      description: Chỉ định loại kết nối đầu vào mà bộ chuyển đổi âm thanh chấp nhận
    input_video_interface:
      name: Giao diện video đầu vào
