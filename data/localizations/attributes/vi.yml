    switch_management_type:
      name: Loại quản lý chuyển mạch
      description: 'Phân loại mức độ hoặc kiểu quản lý và cấu hình mà chuyển mạch
        hỗ trợ (ví dụ: không quản lý, thông minh, quản lý web, quản lý hoàn toàn).'
    switch_mechanism:
      name: Cơ chế công tắc
      description: 'Xác định công nghệ kích hoạt bên trong của nút (ví dụ: mạch ngắt
        cực nhỏ, quang học), ảnh hưởng đến cảm giác, tuổi thọ và độ nhạy.'
    switch_stem_compatibility:
      name: Khả năng tương thích thân công tắc
      description: Xác định kiểu dáng cơ học hoặc kiểu dáng thân công tắc khác phù
        hợp với nắp phím hoặc bộ phím
    switching_layer:
      name: Lớp chuyển mạch
      description: 'Cho biết lớp OSI cao nhất mà chuyển mạch hoạt động nguyên bản
        (ví dụ: Lớp 2, Lớp 3, lai).'
    switching_method:
      name: Phương pháp chuyển đổi
      description: Xác định phương pháp được sử dụng để chuyển đổi giữa các đầu vào
        khác nhau trong các sản phẩm điện tử; ví dụ như điều khiển từ xa
    synthesis_method:
      name: Phương pháp tổng hợp
      description: Chỉ định phương pháp tổng hợp âm thanh trong các nhạc cụ điện tử,
        chẳng hạn như analog ảo hoặc mô-đun
    system/power_cable_connector_type_end_a:
      name: Loại đầu nối cáp hệ thống/nguồn (đầu A)
      description: 'Xác định tiêu chuẩn đầu nối chính xác có ở đầu đầu tiên của cáp
        (ví dụ: IEC C14, NEMA 5-15P, USB-C).'
    system/power_cable_connector_type_end_b:
      name: Loại đầu nối cáp hệ thống/nguồn (đầu B)
      description: 'Xác định tiêu chuẩn đầu nối chính xác có ở đầu thứ hai của cáp
        (ví dụ: IEC C13, DC 5.5 × 2.1 mm, phích cắm banana).'
    system_components_included:
      name: Thành phần hệ thống được bao gồm
      description: Liệt kê các bộ phận phần cứng chính được vận chuyển với hệ thống
        để người mua hiểu phần nào có hoặc không phải là một phần của gói.
    system_of_measurement:
      name: Hệ thống đo lường
      description: Xác định đơn vị đo lường được sử dụng trong một sản phẩm, chẳng
        hạn như hệ Anh hoặc hệ mét
    system_range:
      name: Phạm vi hệ thống
      description: Xác định khu vực hoạt động của hệ thống cảm báo y tế, ví dụ như
        tại nhà, GPS
    systems_supported:
      name: Hệ thống được hỗ trợ
      description: Chỉ định nền tảng chơi game mà sản phẩm tương thích; ví dụ Xbox,
        Nintendo switch
    tab_style:
      name: Kiểu nhãn
      description: Chỉ định kiểu tab trên các phụ kiện bìa kẹp, ví dụ như in sẵn,
        đánh số
    tablet_case_functional_features:
      name: Tính năng chức năng vỏ máy tính bảng
      description: Làm nổi bật các tiện ích chức năng bổ sung chính đi kèm với hộp
        đựng máy tính bảng
    tabletop_color:
      name: Màu bàn cờ
      description: Xác định màu của mặt trên của bàn, chẳng hạn như đen hoặc trắng
    tabletop_material:
      name: Chất liệu bàn cờ
      description: Xác định thành phần của bề mặt bàn, ví dụ như gỗ ép, bê tông
    tabletop_pattern:
      name: Mẫu bàn cờ
      description: Xác định thiết kế hoặc họa tiết in trên bề mặt mặt bàn, chẳng hạn
        như Giáng sinh hoặc trên đồng nhất
    tabletop_shape:
      name: Hình dạng bàn cờ
      description: Mô tả hình dạng của mặt bàn, ví dụ như hình vuông, hình quả thận
    tableware_material:
      name: Vật liệu bộ đồ ăn
      description: Chỉ định thành phần của bộ đồ ăn, chẳng hạn như đồ sứ xương hoặc
        đồ đất nung
    tack/pushpin_head_design:
      name: Thiết kế đầu đinh/ghim
      description: Mô tả hình dạng của đầu đinh hoặc đinh ghim, giống như hình tròn
        hoặc trang trí
    tag_fastening:
      name: Dây thít
      description: Mô tả phương pháp được sử dụng để gắn thẻ vào hành lý, chẳng hạn
        như khóa hoặc vòng
    talc_content:
      name: Hàm lượng talc
      description: Nêu rõ liệu công thức có chứa talc, không chứa talc hay sử dụng
        mức talc giảm.
    tampon_absorbency_level:
      name: Mức độ thấm hút của băng vệ sinh
      description: Xác định khả năng thấm hút của tampon nhẹ hay nặng
    tampon_features:
      name: Tính năng băng vệ sinh
      description: Mô tả các đặc điểm cụ thể của băng vệ sinh, chẳng hạn như thiết
        kế thoải mái hoặc chống tràn
    tan_type:
      name: Loại rám nắng
      description: Xác định cường độ màu và quy trình áp dụng các sản phẩm nhuộm da,
        ví dụ như tối màu, tức thì
    tank_color:
      name: Màu bể
      description: Xác định màu sắc của sản phẩm, điển hình là bồn cầu; ví dụ đen,
        trắng
    tank_material:
      name: Chất liệu bể
      description: Chỉ định vật liệu của thùng chứa sản phẩm, thường dành cho dụng
        cụ làm vườn; ví dụ như kim loại, nhựa
    tank_pattern:
      name: Mẫu xe tăng
      description: Xác định mô típ trực quan trên bồn cầu, chẳng hạn như rắn hoặc
        trừu tượng
    tape_cartridge_format:
      name: Định dạng hộp băng
      description: 'Xác định các công nghệ hộp băng (ví dụ: LTO, DAT, DLT) mà ổ có
        thể đọc hoặc ghi.'
    tape_cartridge_generation:
      name: Thế hệ hộp băng
      description: Chỉ ra thế hệ hoặc phiên bản cụ thể trong một dòng công nghệ băng
        (thường là thế hệ LTO) mà ổ đĩa hỗ trợ
    tape_material:
      name: Chất liệu băng
      description: Chỉ định loại vật liệu được sử dụng trong các sản phẩm băng dính,
        như nhựa vinyl hoặc nhựa
    tape_speed_supported:
      name: Tốc độ băng được hỗ trợ
      description: Liệt kê các tốc độ phát lại và ghi băng (inch mỗi giây) mà thiết
        bị reel-to-reel có thể hoạt động.
    target_audience:
      name: Đối tượng mục tiêu
      description: Chỉ định đối tượng phù hợp với sản phẩm phù hợp, chẳng hạn như
        trẻ em hoặc mọi lứa tuổi
    target_facial_zone:
      name: Vùng mặt mục tiêu
      description: 'Xác định vùng mặt mà miếng dán lỗ chân lông được thiết kế để điều
        trị (ví dụ: mũi, cằm, vùng chữ T).'
    target_gender:
      name: Giới tính mục tiêu
      description: Xác định giới tính dự định cho một sản phẩm, chẳng hạn như nữ,
        nam hoặc unisex
    targeted_pests:
      name: Các loài gây hại
      description: Xác định loại sâu bệnh mà sản phẩm có thể chống lại, ví dụ như
        nấm mốc, tảo
    targeted_skin_concern:
      name: Vấn đề da mục tiêu
      description: Cho biết tổn thương hoặc tình trạng da cụ thể mà sản phẩm được
        công thức để điều trị.
    targeted_stains:
      name: Xóa vết làm bẩn
      description: Xác định các loại vết bẩn mà sản phẩm được thiết kế để xử lý, chẳng
        hạn như thức ăn hoặc vết bẩn
    tea_input_type:
      name: Loại trà đầu vào
      description: Chỉ định phong cách pha chế trà, ví dụ như túi trà, cốc K
    technology_level:
      name: Trình độ công nghệ
      description: 'Cho biết mức độ phức tạp của công nghệ sản phẩm, ví dụ: cơ bản,
        nâng cao'
    teeth_material:
      name: Chất liệu răng
      description: Xác định vật liệu được sử dụng trong răng, thường là dụng cụ làm
        vườn; ví dụ như nhựa, kim loại
    telephone_cable_interface:
      name: Giao diện cáp điện thoại
      description: Xác định loại phích cắm được sử dụng trong cáp điện thoại, chẳng
        hạn như RJ-10
    telephone_cable_second_interface:
      name: Giao diện cáp điện thoại thứ hai
      description: 'Xác định loại đầu nối ở đầu đối diện của cáp khi khác với giao
        diện chính (ví dụ: RJ45 sang RJ11).'
    telephone_cord_style:
      name: Kiểu dây điện thoại
      description: Cho biết hình dạng vật lý của dây điện thoại, giúp khách hàng chọn
        được loại dây thẳng, dây xoắn hoặc dây chuyên dụng phù hợp để thay thế tay
        cầm hoặc gắn tường.
    telephone_style:
      name: Kiểu điện thoại
      description: Xác định thiết kế hoặc hình thức thẩm mỹ của điện thoại, ví dụ
        như cổ điển, mới lạ
    telescope_level:
      name: Cấp độ kính viễn vọng
      description: Cho biết mức độ phức tạp hoặc mức độ kỹ năng cần thiết đối với
        kính thiên văn, chẳng hạn như người mới bắt đầu hoặc nâng cao
    telescope_tracking_system:
      name: Hệ thống theo dõi kính viễn vọng
      description: 'Xác định loại hệ thống theo dõi trong kính thiên văn, ví dụ: thủ
        công, cơ giới'
    television_circuit_board_type:
      name: Loại bo mạch tivi
      description: 'Xác định vai trò chức năng của bo mạch trong bộ tivi (ví dụ: bo
        mạch chính, bo mạch nguồn, bo mạch T-Con).'
    television_shape:
      name: Kiểu dáng ti vi
      description: Xác định đường viền vật lý của màn hình TV, chẳng hạn như cong
        hoặc phẳng
    television_speaker_position:
      name: Vị trí loa tivi
      description: 'Xác định vị trí vật lý hoặc vai trò của loa trong lắp ráp TV (ví
        dụ: trái, phải, trung tâm, loa siêu trầm).'
    television_specialized_features:
      name: Tính năng chuyên dụng của TV
      description: Xác định các khả năng riêng của TV, như điều khiển bằng giọng nói
        hoặc loa thanh tích hợp
    temperature:
      name: Nhiệt độ
      description: 'Chỉ định cài đặt mức nhiệt cho các thiết bị như súng bắn keo,
        ví dụ: kép, cao'
    temperature_control:
      name: Điều khiển nhiệt độ
      description: 'Xác định khả năng điều chỉnh nhiệt độ của sản phẩm, thường dành
        cho máy hâm sữa; ví dụ như có thể điều chỉnh, đặt trước '
    temperature_measurement:
      name: Đo nhiệt độ
      description: Cho biết sản phẩm đo bằng độ F hay độ C
    template_type:
      name: Loại mẫu
      description: 'Chỉ định loại mẫu tài liệu, ví dụ: danh thiếp, tờ rơi'
    temple_color:
      name: Bảng màu
      description: Chỉ định màu của càng kính mắt, chẳng hạn như màu đỏ hoặc trong
        suốt
    temple_pattern:
      name: Họa tiết đền chùa
      description: Mô tả thiết kế hoặc họa tiết trên gọng kính, như biểu tượng hoặc
        ca-rô
    tension:
      name: Độ căng
      description: Mô tả độ căng của dây dùng cho nhạc cụ, ví dụ như cực nặng
    tensioning_system:
      name: Hệ thống căng
      description: Chi tiết cơ chế được sử dụng để giữ bề mặt màn hình phẳng và không
        bị nhăn.
    tent_setup_style:
      name: Kiểu dựng lều
      description: Cho biết cách lều được triển khai hoặc lắp ráp.
    tequila_variety:
      name: Loại rượu Tequila
      description: Chỉ định loại rượu tequila, ví dụ như vàng, ủ lâu năm
    terminal_operation:
      name: Vận hành thiết bị đầu cuối
      description: Chỉ định loại hoạt động của máy tính tiền, chẳng hạn như thủ công
        hoặc điện tử
    termination_method:
      name: Phương pháp đấu nối
      description: 'Xác định kỹ thuật được sử dụng để gắn dây dẫn vào các tiếp điểm
        đầu nối (ví dụ: bấm, hàn, IDC).'
    terrain:
      name: Địa hình
      description: Chỉ định loại mặt đất mà sản phẩm được thiết kế, thường dành cho
        thiết bị ngoài trời; ví dụ như núi, lăn
    test_format:
      name: Định dạng xét nghiệm
      description: 'Xác định loại thử nghiệm cho các sản phẩm sức khỏe và làm đẹp,
        ví dụ: kỹ thuật số, que thử'
    test_method:
      name: Phương pháp xét nghiệm
      description: 'Xác định quy trình tiến hành xét nghiệm y tế, ví dụ: xét nghiệm
        tại nhà, phân tích trong phòng thí nghiệm'
    test_sample:
      name: Mẫu xét nghiệm
      description: Chỉ định loại mẫu cần thiết cho các kiểm tra sức khỏe và y tế,
        ví dụ như tăm bông, nước bọt
    tetherball_equipment_included:
      name: Bao gồm thiết bị Tetherball
      description: Cho biết bộ dụng cụ chơi bóng Tetherball có bao gồm các vật dụng
        thiết yếu không, chẳng hạn như dây thừng hoặc bóng Tetherball
    tethering_policy:
      name: Chính sách chia sẻ kết nối
      description: Làm rõ liệu điểm truy cập di động hoặc chia sẻ kết nối có được
        phép theo điều khoản gói eSIM hay không.
    text_plate_material:
      name: Chất liệu tấm văn bản
      description: Xác định chất liệu của tấm in chữ trên con dấu văn phòng, chẳng
        hạn như kim loại hoặc cao su
    textile_craft_machine_features:
      name: Tính năng khung cửi
      description: Mô tả các tính năng đặc biệt của khung cửi, như có thể điều chỉnh
        độ căng hoặc di động
    textile_craft_project_type:
      name: Loại dự án dệt thủ công
      description: Xác định loại dự án dệt thủ công, như đan hoặc may chần
    texture:
      name: Kết cấu
      description: Xác định cảm giác hoặc độ đặc của sản phẩm, chẳng hạn như dạng
        kem, dạng mờ hoặc dạng thấm
    texture_level:
      name: Mức độ kết cấu
      description: Cho biết độ mịn hoặc độ thô của sản phẩm, thường dành cho thực
        phẩm dinh dưỡng xay nhuyễn; ví dụ Cấp độ 1 (nghiền nhuyễn), Cấp độ 2 (băm
        nhỏ)
    theme:
      name: Chủ đề
      description: Mô tả chủ đề hoặc mô típ chính của sản phẩm, chẳng hạn như thể
        thao,vũ trụ hoặc ngày lễ
    therapeutic_features:
      name: Tính năng trị liệu
      description: Liệt kê các phương thức trị liệu bổ sung được tích hợp vào nẹp
        cổ.
    therapeutic_swing_accessories_included:
      name: Phụ kiện xích đu trị liệu đi kèm
      description: Liệt kê phần cứng hoặc phụ kiện bổ sung được cung cấp cùng với
        xích đu.
    therapy_mode_supported:
      name: Chế độ trị liệu được hỗ trợ
      description: Liệt kê các thuật toán trị liệu hô hấp mà thiết bị có thể hoạt
        động, ngoài APAP tiêu chuẩn.
    therapy_temperature_type:
      name: Loại nhiệt độ trị liệu
      description: Cho biết sản phẩm cung cấp liệu pháp nóng, liệu pháp lạnh hay cả
        hai.
    thermal_detector_type:
      name: Loại máy dò nhiệt
      description: Chỉ định công nghệ được sử dụng để phát hiện nhiệt trong các thiết
        bị, chẳng hạn như máy dò silicon vô định hình (a Si)
    thermal_sensation:
      name: Cảm giác nhiệt
      description: Mô tả hiệu ứng nhiệt độ cảm nhận được trên da sau khi thoa.
    thermocouple_type:
      name: Loại cặp nhiệt điện
      description: Chỉ định loại cặp nhiệt điện trong cảm biến, ví dụ Loại J, Loại
        S
    thickness_type:
      name: Loại độ dày
      description: Cho biết độ dày của các vật dụng, chẳng hạn như mỏng, trung bình
        hoặc dày
    thinner_application:
      name: Ứng dụng chất pha loãng
      description: Mô tả loại chất mà chất pha loãng được sử dụng, như sơn hoặc epoxy
    thread_direction:
      name: Vị trí ren
      description: Xác định hướng của ren trên các phần cứng, như bên trái hoặc bên
        phải
    threaded_rod_size:
      name: Kích thước thanh ren
      description: Chỉ định đường kính của thanh ren, ví dụ như M10, M20
    throw_pillow_shape:
      name: Hình dạng gối kê
      description: Xác định hình dạng của gối trang trí, chẳng hạn như gối tròn hoặc
        hình chữ nhật
    thumb_grip_profile:
      name: Cấu hình núm bấm
      description: 'Mô tả kiểu dáng hoặc bề mặt của phần trên của núm bấm (ví dụ:
        lõm, hình vòm), ảnh hưởng đến cảm giác cầm nắm và điều khiển'
    ticket_additional_features:
      name: Các tính năng bổ sung của vé
      description: Nêu bật các lợi ích bổ sung được cung cấp kèm theo vé, chẳng hạn
        như các hoạt động gặp gỡ trò chuyện hoặc sau sự kiện
    ticket_class:
      name: Hạng vé
      description: Xác định cấp độ dịch vụ hoặc hạng ghế được cung cấp với vé.
    ticket_type:
      name: Loại vé
      description: Xác định loại vé sự kiện, như vé phổ thông hoặc chỗ ngồi dành riêng
    tile_design:
      name: Thiết kế gạch lát
      description: Mô tả hoa văn hoặc kiểu dáng của gạch, chẳng hạn như hình học hoặc
        xương cá
    tile_game_type:
      name: Loại trò chơi xếp gạch
      description: Xác định loại trò chơi xếp hình cụ thể, chẳng hạn như domino hoặc
        mạt chược
    tile_installation_method:
      name: Phương pháp lát gạch
      description: 'Mô tả cách lắp đặt một sản phẩm, thường ốp trần hoặc ốp tường;
        ví dụ: lắp đặt kiểu thả'
    tile_look:
      name: Kiểu gạch lát
      description: Mô tả hình thức hoặc kiểu dáng của một viên gạch, chẳng hạn như
        đá cẩm thạch hoặc 3D
    tile_material:
      name: Vật liệu gạch
      description: Xác định thành phần của gạch, chẳng hạn như gốm hoặc đá
    tile_texture:
      name: Kết cấu gạch lát
      description: Mô tả cảm giác bề mặt của gạch, chẳng hạn như mịn hoặc có kết cấu
    time_period:
      name: Khoảng thời gian
      description: Chỉ định khung thời gian liên quan đến các bài báo hoặc nghiên
        cứu học thuật, chẳng hạn như cuộc cách mạng thời trung cổ hoặc công nghiệp
    time_signatures:
      name: Số chỉ nhịp
      description: Xác định cấu trúc nhịp, thường dành cho máy đếm nhịp; ví dụ 4/4,
        3/4
    time_weighting:
      name: Trọng số thời gian
      description: 'Được sử dụng để chỉ định tốc độ phản ứng của máy đo âm thanh với
        các biến động âm thanh, ví dụ: chậm, nhanh'
    timepiece_features:
      name: Tính năng đồng hồ
      description: Xác định đặc điểm đặc biệt của đồng hồ, như điều chỉnh được khoảng
        thời gian hoặc có đèn
    timer_design:
      name: Thiết kế hẹn giờ
      description: Mô tả loại bộ hẹn giờ được sử dụng trong thiết bị phòng rửa ảnh,
        chẳng hạn như kỹ thuật số hoặc analog
    timer_features:
      name: Tính năng hẹn giờ
      description: Mô tả các chức năng đặc biệt của bộ hẹn giờ, như có thể điều chỉnh
        thời lượng hoặc màn hình tích hợp
    timer_type:
      name: Loại bộ hẹn giờ
      description: 'Chỉ định cài đặt tần suất cho bộ hẹn giờ, ví dụ: hàng ngày, hàng
        tuần'
    tingle_intensity:
      name: Cường độ châm chích
      description: Mô tả mức độ nóng hoặc châm chích được tạo ra bởi sản phẩm khi
        bôi.
    tip_design:
      name: Thiết kế đầu
      description: Chỉ định loại đầu trên kim và ống tiêm y tế, chẳng hạn như khóa
        luer hoặc đầu trượt
    tip_material:
      name: Chất liệu mút
      description: Chỉ định chất liệu được sử dụng trong đầu sản phẩm, ví dụ như bông,
        silicone
    tip_opening:
      name: Độ mở của đầu
      description: Mô tả chiều rộng của lỗ thổi trên các nhạc cụ hơi, như loại vừa
        hoặc lớn
    tip_style:
      name: Kiểu đầu
      description: Mô tả thiết kế của đầu sản phẩm, ví dụ như góc cạnh, cong
    tip_type:
      name: Loại đầu
      description: Xác định loại đầu của rỉa đâm cá, như đục hoặc ngạnh đôi
    tire_bead_type:
      name: Loại mép lốp
      description: Chỉ định loại tanh trong lốp xe đạp, chẳng hạn như tanh sắt hoặc
        cứng
    tobacco_type:
      name: Loại thuốc lá
      description: Chỉ định giống thuốc lá, ví dụ như Thổ Nhĩ Kỳ, Virginia
    toddler_bed_features:
      name: Tính năng giường cho trẻ tập đi
      description: Mô tả các đặc điểm đặc biệt của giường cho trẻ tập đi, như có thể
        điều chỉnh độ cao hoặc đèn ngủ tích hợp
    toe_spacer_design:
      name: Thiết kế miếng đệm ngón chân
      description: Mô tả thiết kế của dụng cụ tách ngón chân được sử dụng trong chăm
        sóc bàn chân, ví dụ như thiết kế đường viền, vòng lặp
    toe_strap_type:
      name: Loại dây đeo chân
      description: Chỉ định thiết kế của dây đeo ngón chân, thường dùng để buộc ván
        trượt tuyết hoặc giày đi tuyết; ví dụ như mũ chân hoặc truyền thống
    toe_style:
      name: Kiểu mũi giày
      description: Xác định hình dạng hoặc thiết kế của mũi giày, chẳng hạn như mũi
        hở hoặc mũi nhọn
    toilet/bidet_mounting_type:
      name: Loại gắn bồn cầu/vòi cịt vệ sinh
      description: Xác định cách lắp đặt bồn cầu hoặc bồn vệ sinh nữ, như gắn trên
        sàn hoặc gắn trên tường
    toilet_cover_design:
      name: Thiết kế nắp bồn cầu
      description: Mô tả hình dạng của nắp bồn cầu, chẳng hạn như hình tròn hoặc thuôn
        dài
    toilet_cover_features:
      name: Tính năng nắp bồn cầu
      description: Mô tả các đặc điểm đặc biệt của nắp bồn cầu, như tháo lắp nhanh
        hoặc đóng êm
    toilet_mounting_type:
      name: Kiểu giá đỡ nhà vệ sinh
      description: 'Chỉ định phương pháp lắp đặt bồn cầu, ví dụ: treo tường, gắn sàn'
    toilet_shape:
      name: Hình dạng nhà vệ sinh
      description: Mô tả hình dạng của toilet, chẳng hạn như hình tròn hoặc hình chữ
        nhật
    tom_tom_design:
      name: Thiết kế tom-tom
      description: Mô tả loại trống tom-tom, chẳng hạn như để sàn hoặc giá kệ
    tonearm_type:
      name: Loại cánh tay
      description: Mô tả hình học của cánh tay, ảnh hưởng đến hiệu suất theo dõi và
        khả năng sử dụng của DJ.
    tool/utensil_material:
      name: Vật liệu dụng cụ/đồ dùng
      description: Xác định vật liệu chính được sử dụng trong một dụng cụ hoặc đồ
        dùng, như thép không gỉ hoặc gỗ tếch
    tool_key_tip:
      name: Đầu phím công cụ
      description: Chỉ định loại đầu khóa của dụng cụ, chẳng hạn như Phillips hoặc
        cờ lê
    tool_mobility:
      name: Tính di động của dụng cụ
      description: Mô tả xem dụng cụ có dây hay không dây, thường dành cho sản phẩm
        nha khoa
    tool_operation:
      name: Vận hành công cụ
      description: Mô tả cách vận hành một dụng cụ, chẳng hạn như bằng tay hoặc chạy
        bằng điện
    toothbrush_head_size:
      name: Kích cỡ đầu bàn chải đánh răng
      description: Xác định kích thước tương đối của đầu chải phù hợp với các kích
        cỡ miệng và nhu cầu làm sạch khác nhau.
    toothbrush_head_type:
      name: Loại đầu bàn chải đánh răng
      description: 'Phân loại kiểu chức năng của đầu (ví dụ: làm trắng, chăm sóc nướu,
        trẻ em).'
    toothpaste_type:
      name: Loại kem đánh răng
      description: Xác định chức năng cụ thể của kem đánh răng, chẳng hạn như chống
        sâu răng hoặc làm trắng
    toothpick_design:
      name: Thiết kế tăm
      description: Chỉ định hình dạng của tăm, chẳng hạn như tròn hoặc phẳng
    top_color:
      name: Màu hàng đầu
      description: 'Xác định màu cơ bản của bề mặt trên cùng của sản phẩm, ví dụ:
        trong suốt, đồng'
    top_length_type:
      name: Loại chiều dài trên
      description: Xác định độ dài của áo hoặc áo sơ mi, như áo crop top hoặc áo dài
    top_material:
      name: Chất liệu hàng đầu
      description: 'Xác định chất liệu bề mặt trên của sản phẩm, ví dụ: gỗ, thủy tinh'
    top_pattern:
      name: Mẫu áo
      description: Mô tả thiết kế hoặc hình in trên bề mặt sản phẩm, như hoa hoặc
        sọc
    top_surface_material:
      name: Vật liệu bề mặt trên cùng
      description: Chỉ định vật liệu được sử dụng trên bề mặt trên cùng của sản phẩm,
        chẳng hạn như thép không gỉ hoặc gốm thủy tinh
    top_up_method:
      name: Phương thức nạp tiền
      description: Cho biết các cách khách hàng có thể nạp thêm tiền hoặc gia hạn
        gói cước trên thẻ trả trước hoặc SIM.
    tote_handle_type:
      name: Loại tay cầm túi
      description: Xác định kiểu tay cầm trên túi tote, chẳng hạn như ngắn hoặc dài
    totem_design:
      name: Thiết kế vật tổ
      description: Chỉ định thiết kế cột quảng cáo của triển lãm thương mại, chẳng
        hạn như một mặt hoặc hai mặt
    touch_capabilities:
      name: Khả năng cảm ứng
      description: Cho biết loại tương tác cảm ứng mà thiết bị điện tử hỗ trợ, chẳng
        hạn như đơn hoặc kép
    touchpad_form_factor:
      name: Kiểu dáng bàn di chuột
      description: Xác định kiểu lắp đặt hoặc sử dụng dự định của bàn di chuột
    touchscreen_technology:
      name: Công nghệ màn hình cảm ứng
      description: Xác định công nghệ màn hình cảm ứng cho các thiết bị tương tác,
        chẳng hạn như điện dung hoặc điện trở
    touchscreen_wire_configuration:
      name: Cấu hình dây màn hình cảm ứng
      description: Chỉ ra số lượng dây hoặc đường dây được sử dụng bởi bộ số hóa điện
        trở, ảnh hưởng đến khả năng tương thích với bộ điều khiển
    toy/game_material:
      name: Vật liệu đồ chơi/trò chơi
      description: Xác định vật liệu chính được sử dụng trong đồ chơi hoặc trò chơi,
        chẳng hạn như nhựa hoặc gỗ
    toy_figure_features:
      name: Tính năng đồ chơi
      description: Nêu bật các đặc điểm đặc biệt của đồ chơi hình nhân vật, như có
        khớp nối hoặc chi tiết thực tế
    toy_figure_theme:
      name: Chủ đề đồ chơi
      description: Xác định chủ đề hoặc danh mục của một đồ chơi, chẳng hạn như động
        vật hoặc thể thao
    toy_tool_type:
      name: Loại dụng cụ đồ chơi
      description: Xác định loại dụng cụ đồ chơi trong bộ đồ chơi giả vờ, như máy
        khoan hoặc búa
    track_configuration:
      name: Cấu hình rãnh
      description: 'Cho biết định dạng rãnh băng và kênh mà máy có thể ghi hoặc phát
        (ví dụ: stereo so với mono, số lượng rãnh).'
    tracker_form_factor:
      name: Hình thức thiết bị theo dõi
      description: Xác định kiểu dáng vật lý và hình dạng của phần cứng theo dõi.
    tracking_metrics:
      name: Số liệu theo dõi
      description: 'Chỉ định dữ liệu sức khỏe và thể chất mà sản phẩm theo dõi, ví
        dụ: giấc ngủ, số bước'
    tracking_purpose:
      name: Mục đích theo dõi
      description: Chỉ định mục đích sử dụng của các thiết bị theo dõi GPS, chẳng
        hạn như theo dõi tài sản hoặc theo dõi thú cưng
    tractor_accessories_included:
      name: Đi kèm linh kiện máy kéo
      description: Chỉ định các tính năng bổ sung được cung cấp cùng với máy kéo,
        chẳng hạn như bộ che phủ hoặc lưỡi cắt tuyết
    trade_show_display_features:
      name: Tính năng trưng bày triển lãm thương mại
      description: Xác định các đặc điểm đặc biệt của buồng trưng bày triển lãm thương
        mại, như màn hình cảm ứng hoặc có đèn
    trading_card_packaging:
      name: Bao bì thẻ trao đổi
      description: Xác định cách đóng gói thẻ sưu tầm, chẳng hạn như gói vỉ hoặc tép
        bài
    traffic_control_device_features:
      name: Tính năng của thiết bị điều khiển giao thông
      description: Xác định các tính năng riêng của các thiết bị điều khiển giao thông,
        chẳng hạn như đế có thể xếp chồng lên nhau hoặc có trọng lượng
    trail_camera_design:
      name: Thiết kế máy ảnh hành trình
      description: Mô tả loại camera hành trình, chẳng hạn như camera tiêu chuẩn hoặc
        camera di động
    trailer_type:
      name: Loại toa moóc
      description: Xác định thiết kế hoặc kiểu dáng của xe moóc xe cơ giới, chẳng
        hạn như mở hoặc đóng
    training_data_requirements:
      name: Yêu cầu dữ liệu đào tạo
      description: 'Xác định loại dữ liệu và chất lượng cần thiết để đào tạo phần
        mềm AI hoặc máy học hiệu quả, ví dụ: dữ liệu được gắn nhãn'
    trampoline_design:
      name: Thiết kế tấm bạt lò xo
      description: Mô tả cấu trúc tấm bạt lò xo, chẳng hạn như không lò xo hoặc lò
        xo cuộn
    transceiver_form_factor:
      name: Hình thức bộ thu phát
      description: 'Xác định tiêu chuẩn mô-đun vật lý của bộ thu phát mạng (ví dụ:
        SFP, QSFP28).'
    transcriber/dictation_system_features:
      name: Tính năng của hệ thống ghi chép/đọc chính tả
      description: Xác định các tính năng đặc biệt của bộ chuyển đổi âm thanh thành
        văn bản hoặc hệ thống đọc chính tả, như được hỗ trợ bởi AI hoặc giảm tiếng
        ồn
    transfer_aid_type:
      name: Loại dụng cụ hỗ trợ di chuyển
      description: Phân loại kiểu dụng cụ hỗ trợ, phân biệt ván cứng với tấm mềm và
        thảm hỗ trợ khí.
    transfer_board_shape:
      name: Hình dạng ván di chuyển
      description: Xác định biên dạng hình học của ván hoặc tấm, ảnh hưởng đến đường
        di chuyển và khả năng tương thích với các độ cao ghế ngồi hoặc giường khác
        nhau.
    transfer_boards_surface_type:
      name: Loại bề mặt tấm đổi chỗ
      description: Chỉ định kết cấu bề mặt của tấm di chuyển di động, ví dụ như có
        đệm, mịn
    transfer_paper_technique:
      name: Kỹ thuật giấy in chuyển nhiệt
      description: Xác định phương pháp được sử dụng với giấy chuyển, chẳng hạn như
        giấy in phun hoặc giấy sắt
    transmission_type:
      name: Loại truyền
      description: Xác định loại hộp số trong xe hoặc các bộ phận, như hộp số sàn
        hoặc hộp số tự động
    transmitter_form_factor:
      name: Kiểu dáng bộ phát
      description: Phân loại kiểu vật lý hoặc vỏ của bộ phát để giúp người mua nhanh
        chóng tìm dạng phù hợp với ứng dụng của họ.
    transport_type:
      name: Loại phương tiện vận chuyển
      description: Xác định phương thức giao thông công cộng mà vé hoặc thẻ có hiệu
        lực.
    trash_can_features:
      name: Tính năng thùng rác
      description: Mô tả các đặc điểm đặc biệt của thùng rác, như kiểm soát mùi hoặc
        đạp chân
    travel_pillow_features:
      name: Tính năng gối du lịch
      description: Liệt kê các đặc tính chức năng đặc biệt, phụ kiện hoặc cải tiến
        thiết kế của gối du lịch.
    travel_pillow_shape:
      name: Kiểu dáng gối kê cổ đi du lịch
      description: 'Mô tả đường viền vật lý của gối du lịch, chẳng hạn như hình chữ
        J '
    tray_compatibility:
      name: Khả năng tương thích khay
      description: Xác định kiểu khay làm trắng hoặc ngậm miệng mà hộp được thiết
        kế để vừa.
    treatment_area:
      name: Khu vực điều trị
      description: Chỉ định bộ phận cơ thể mà sản phẩm hướng tới, thường dành cho
        các sản phẩm mát xa; ví dụ lưng, cổ
    treatment_method:
      name: Phương pháp điều trị
      description: 'Mô tả cơ chế hoặc công nghệ phân phối mà sản phẩm sử dụng để loại
        bỏ tổn thương (ví dụ: liệu pháp lạnh, axit hóa học, miếng dán vi kim).'
    treatment_modes:
      name: Chế độ điều trị
      description: 'Liệt kê các chế độ chức năng mà thiết bị hỗ trợ (ví dụ: HR, SHR,
        SR).'
    treatment_objective:
      name: Mục tiêu điều trị
      description: Xác định vấn đề mà sản phẩm xử lý, thường dành cho các sản phẩm
        chăm sóc cá nhân; ví dụ như ngáy, sốt
    treatment_target_area:
      name: Vùng mục tiêu điều trị
      description: Cho biết sản phẩm được công thức cho lông mi, lông mày hay cả hai.
    treatment_texture:
      name: Kết cấu đặc trị
      description: Xác định độ đặc của các sản phẩm điều trị, như kem chống hăm tã;
        ví dụ như dày, bột
    treatment_type:
      name: Loại điều trị
      description: Chỉ định phương pháp điều trị, thường là là điều trị rụng tóc;
        ví dụ như laser, tại chỗ
    tree_stand_material:
      name: Vật liệu giá đỡ cây
      description: Chỉ định vật liệu làm nên giá đỡ cây, chẳng hạn như nhựa hoặc kim
        loại
    trellis_design:
      name: Thiết kế lưới mắt cáo
      description: Xác định thiết kế của lưới mắt cáo trong hàng rào hoặc rào chắn,
        ví dụ như hình vuông, hình thoi
    tricycle_design:
      name: Thiết kế xe ba bánh
      description: Mô tả kiểu dáng của xe ba bánh, chẳng hạn như thẳng đứng hoặc nằm
        ngả lưng
    tricycle_propulsion_type:
      name: Loại động cơ đẩy ba bánh
      description: Chỉ định cách điều khiển xe ba bánh, chẳng hạn như dẫn động đẩy
        hoặc dẫn động trước
    trip_type:
      name: Loại cơ cấu nhả
      description: 'Chỉ định kiểu ngắt trong bộ ngắt mạch, ví dụ: không thể thay thế
        cho nhau'
    tripod/monopod_attachment_type:
      name: Loại phụ kiện giá đỡ ba chân/một chân
      description: Chỉ định loại kết nối cho các phụ kiện chân máy đơn hoặc ba chân,
        chẳng hạn như 3/8 hoặc phổ thông
    tripod/monopod_head_type:
      name: Loại giá đỡ ba chân/giá đỡ một chân
      description: Chỉ định cơ chế của các đầu ba chân/một chân, như có bánh răng
        hoặc đầu chống rung
    tripod_handle_type:
      name: Loại tay cầm ba chân
      description: 'Chỉ định chức năng của tay cầm ba chân, ví dụ: đa chức năng, kiểu
        báng súng'
    trophy_design:
      name: Thiết kế cúp
      description: Mô tả kiểu dáng hoặc hình dạng cụ thể của một chiếc cúp, chẳng
        hạn như chiếc cốc hoặc ngôi sao
    truck_type:
      name: Loại xe tải
      description: Phân loại các loại xe tải như xe ben hay xe tải sàn phẳng
    tube_component:
      name: Thành phần đèn ống
      description: 'Chỉ định loại ống trong bộ khuếch đại âm nhạc, ví dụ: vỏ, chân
        đế'
    tube_configuration:
      name: Hình dạng đèn ống
      description: Mô tả cách sắp xếp các ống trong bộ khuếch đại nhạc cụ, như ống
        đơn hoặc cặp tương ứng
    tuner_design:
      name: Thiết kế bộ chỉnh tần số
      description: Mô tả kiểu bộ chỉnh điện tử cho nhạc cụ, như kẹp hoặc bàn đạp
    tuner_type:
      name: Loại dụng cụ chỉnh
      description: Xác định loại tần số vô tuyến nhận được, chẳng hạn như đài AM/FM
        hoặc đài vệ tinh
    tuning_fork_design:
      name: Thiết kế âm thoa
      description: Mô tả thiết kế cụ thể của âm thoa, chẳng hạn như có trọng lượng
        hoặc không có trọng lượng
    tuning_fork_frequency:
      name: Tần số âm thoa
      description: Chỉ định tần số của âm thoa, chẳng hạn như 128 Hz hoặc 256 Hz
    tuning_modes:
      name: Chế độ điều chỉnh
      description: Xác định cài đặt nhạc cụ cụ thể cho bộ chỉnh điện tử, như guitar
        hoặc violin
    tuning_pitch:
      name: Khóa điều chỉnh dây
      description: Chỉ định cao độ điều chỉnh của một nhạc cụ, chẳng hạn như C# hoặc
        Ab
    tuning_range:
      name: Phạm vi điều chỉnh
      description: Chỉ định phạm vi tùy chọn điều chỉnh có sẵn, như tiêu chuẩn hoặc
        mở
    tv_broadcast_standards_supported:
      name: Tiêu chuẩn phát sóng TV được hỗ trợ
      description: Liệt kê các tiêu chuẩn phát sóng truyền hình hoặc cáp/vệ tinh cụ
        thể mà thẻ hoặc bộ chuyển đổi có thể giải mã hoặc nhận được
    uc_platform_certification:
      name: Chứng nhận nền tảng UC
      description: Xác định nền tảng giao tiếp hoặc họp hợp nhất mà thiết bị được
        chứng nhận chính thức.
    ultrasound_probe_type:
      name: Loại đầu dò siêu âm
      description: 'Xác định đặc điểm thiết kế của đầu dò được cung cấp cùng với màn
        hình (ví dụ: chống nước, nội bộ).'
    undershirt_style:
      name: Kiểu áo lót
      description: Mô tả thiết kế hoặc đường cắt của áo lót, chẳng hạn như cổ tròn
        hoặc cổ chữ V
    underwear_style:
      name: Đồ lót
      description: Xác định thiết kế và đường cắt của đồ lót, chẳng hạn như bikini
        hoặc quần lót cạp cao
    units_of_measurement:
      name: Các đơn vị đo lường
      description: 'Chỉ định hệ thống đo lường được sử dụng cho sản phẩm, ví dụ: milimet
        (mm), Fahrenheit (° F)'
    update_frequency:
      name: Tần suất cập nhật
      description: Cho biết tần suất của các bản cập nhật cho phần mềm hoặc dữ liệu,
        ví dụ như theo thời gian thực, hàng năm
    upholstery_color:
      name: Màu bọc ghế
      description: Xác định màu sắc của vải bọc sản phẩm, chẳng hạn như màu đỏ hoặc
        màu be
    upholstery_material:
      name: Vật liệu bọc
      description: Xác định loại vải được sử dụng để bọc, chẳng hạn như da hoặc nhung
    upholstery_pattern:
      name: Mẫu bọc ghế
      description: Mô tả thiết kế trực quan trên vải nội thất, ví dụ như sọc hoặc
        ca rô
    uplink_port_type:
      name: Loại cổng đường lên
      description: 'Xác định đầu nối đường lên tốc độ cao nhất có trên chuyển mạch
        (ví dụ: SFP+, QSFP28, 10GBase-T).'
    ups_topology:
      name: Cấu trúc liên kết UPS
      description: 'Chỉ ra phương pháp thiết kế bên trong mà UPS sử dụng để điều hòa
        và cung cấp điện (ví dụ: chế độ chờ, tương tác đường dây, trực tuyến)'
    urinal_mounting_type:
      name: Kiểu giá đỡ bồn tiểu
      description: Chỉ định cách lắp đặt bồn tiểu, chẳng hạn như gắn trên tường hoặc
        gắn trên sàn
    usage_conditions:
      name: Điều kiện sử dụng
      description: Chỉ định xem sản phẩm phù hợp để sử dụng trong điều kiện khô hay
        ướt, thường dùng cho dao cạo râu
    usage_environment:
      name: Môi trường sử dụng
      description: Xác định nơi sản phẩm tắm nắng dự định được sử dụng.
    usage_frequency:
      name: Tần suất sử dụng
      description: Chỉ định tần suất sử dụng sản phẩm được khuyến nghị, chẳng hạn
        như hàng ngày hoặc hàng tuần
    usage_type:
      name: Loại cách sử dụng
      description: Chỉ định chu kỳ sử dụng dự định của sản phẩm, ví dụ như có thể
        tái sử dụng, có thể nạp lại
    usb_connector_type:
      name: Loại cổng USB
      description: Xác định cổng USB vật lý được cung cấp trên thiết bị để truyền
        dữ liệu và/hoặc sạc điện.
    usb_standard:
      name: Tiêu chuẩn USB
      description: Chỉ định phiên bản USB cho các thiết bị điện tử, chẳng hạn như
        USB 2.0 hoặc USB 3.1 Gen 1
    user_type:
      name: Loại người dùng
      description: Xác định người dùng dự định của một sản phẩm phần mềm, chẳng hạn
        như cá nhân hoặc doanh nghiệp nhỏ
    utility/maintenance_task_type:
      name: Loại công tác Tiện ích/Bảo trì
      description: Phân loại tác vụ được thực hiện bởi một phần mềm, chẳng hạn như
        dọn dẹp ổ đĩa hoặc tối ưu hóa hệ thống
    uv_blocking_class:
      name: Cấp độ chặn UV
      description: Cho biết mức độ bảo vệ UV được tích hợp trong kính áp tròng theo
        định nghĩa của tiêu chuẩn ISO.
    uv_protection:
      name: Chống tia cực tím
      description: Chỉ định khả năng chặn tia UV của sản phẩm, thường là dành cho
        kính râm; ví dụ như UV400
    uva_protection_grade:
      name: Cấp độ bảo vệ UVA
      description: Cho biết xếp hạng bảo vệ UVA của sản phẩm, thường được biểu thị
        bằng cấp PA.
    vacuum_air_filtering_technology:
      name: Công nghệ lọc không khí chân không
      description: Chỉ định kiểu lọc không khí được sử dụng trong máy hút bụi, chẳng
        hạn như HEPA hoặc PET
    valve_type:
      name: Loại van
      description: Chỉ định loại van trong các bộ phận của xe đạp, ví dụ Presta, Schrader
    van_type:
      name: Loại xe van
      description: Phân biệt các loại xe tải như xe van chở khách hoặc xe van chuyển
        đổi
    vaping_style:
      name: Dạng hít khói
      description: 'Chỉ định kỹ thuật hút cho thuốc lá điện tử, ví dụ như trực tiếp
        vào phổi, từ miệng vào phổi '
    varnish/finish_application:
      name: Ứng dụng sơn bóng/lớp hoàn thiện
      description: Chỉ định các khu vực ứng dụng thích hợp cho lớp véc-ni hoặc lớp
        hoàn thiện, chẳng hạn như tường hoặc cửa
    vase_shape:
      name: Hình dáng bình hoa
      description: Mô tả hình dạng hình học hoặc hữu cơ của một chiếc bình, chẳng
        hạn như hình tròn hoặc hình chai
    vcr_configuration:
      name: Cấu hình VCR
      description: Xác định thiết bị là VCR độc lập hay thiết bị kết hợp với ổ đĩa
        hoặc bộ điều chỉnh bổ sung.
    vdi_protocol_support:
      name: Hỗ trợ giao thức VDI
      description: 'Chỉ định các giao thức Cơ sở hạ tầng máy tính để bàn ảo (VDI)
        được hỗ trợ, ví dụ: PCoIP, RDP'
    vehicle_alarm/lock_features:
      name: Tính năng báo động/khóa xe
      description: 'Chỉ định các đặc điểm riêng của hệ thống an ninh xe, ví dụ: khởi
        động từ xa hoặc chịu được thời tiết'
    vehicle_application_area:
      name: Khu vực ứng dụng xe
      description: Chỉ định bộ phận của chiếc xe mà sản phẩm áp dụng, chẳng hạn như
        nội thất hoặc ngoại thất
    vehicle_audio_system_features:
      name: Tính năng hệ thống âm thanh trên xe
      description: Xác định các tính năng đặc biệt của hệ thống âm thanh trên xe,
        như tăng âm bass hoặc màn hình LED
    vehicle_braking_features:
      name: Tính năng phanh xe
      description: Mô tả các tính năng cụ thể của các bộ phận phanh xe, như chống
        ăn mòn hoặc khoan
    vehicle_cleaning_item_features:
      name: Tính năng sản phẩm vệ sinh xe
      description: Nêu bật những lợi ích của các sản phẩm làm sạch xe, chẳng hạn như
        cải thiện hiệu quả sử dụng nhiên liệu hoặc độ bóng cao
    vehicle_decor_features:
      name: Tính năng trang trí xe
      description: Mô tả đặc điểm của các vật dụng trang trí xe, chẳng hạn như chống
        tia cực tím hoặc chống thấm nước
    vehicle_drive/handling_features:
      name: Tính năng điều khiển xe
      description: Mô tả các tính năng của các bộ phận của xe cơ giới, điển hình là
        trong hộp số, hệ thống truyền động, hệ thống kéo và bánh xe; ví dụ như hiệu
        suất cao, chịu nhiệt
    vehicle_engine/part_features:
      name: Tính năng động cơ/bộ phận của xe
      description: Cho biết các tính năng riêng của các bộ phận động cơ xe cơ giới,
        như tiết kiệm nhiên liệu hoặc nâng cấp về hiệu suất
    vehicle_engine_features:
      name: Tính năng động cơ xe
      description: Mô tả các đặc điểm cụ thể của động cơ xe, như hiệu suất cao hoặc
        tiết kiệm nhiên liệu
    vehicle_exhaust_type:
      name: Loại khí xả của xe
      description: Xác định loại hệ thống ống xả trên xe, chẳng hạn như trục sau hoặc
        turbo-back
    vehicle_features:
      name: Tính năng xe
      description: Mô tả các đặc điểm hoặc thiết bị đặc biệt trên xe, như ghế sưởi
        hoặc hệ thống định vị
    vehicle_floor_configuration:
      name: Cấu hình sàn xe
      description: Chỉ định thiết kế và bố cục sàn của phương tiện đi lại, chẳng hạn
        như sàn thấp hoặc sàn bán thấp
    vehicle_fluid_features:
      name: Tính năng chất lỏng của xe
      description: Mô tả các đặc tính đặc biệt của chất lỏng trong xe, như chống đóng
        băng hoặc phân hủy sinh học
    vehicle_fluid_type:
      name: Loại chất lỏng xe
      description: Xác định loại chất lỏng được sử dụng trong bảo dưỡng xe, như chất
        lỏng đậm đặc hoặc pha loãng trước
    vehicle_frame/body_features:
      name: Đặc điểm khung/thân xe
      description: Mô tả các tính năng đặc biệt của các bộ phận thân xe, như lớp sơn
        hoặc lớp mạ chrome
    vehicle_mirror_design:
      name: Thiết kế gương xe
      description: Chỉ định các đặc điểm thiết kế của gương xe cơ giới, như có thể
        mở rộng hoặc có thể gập lại
    vehicle_mirror_features:
      name: Tính năng gương xe
      description: Mô tả các tính năng đặc biệt của gương xe, như tự động chống chói
        hoặc làm nóng
    vehicle_mirror_type:
      name: Loại gương xe
      description: Xác định loại gương cụ thể trên xe, chẳng hạn như gương chiếu hậu
        hoặc gương chiếu hậu
    vehicle_mounting_location:
      name: Vị trí lắp đặt trên xe
      description: Chỉ định khu vực trong xe nơi giá đỡ dự định được lắp đặt.
    vehicle_oil_features:
      name: Tính năng dầu xe
      description: Mô tả các đặc tính riêng của dầu động cơ, như khả năng chống mài
        mòn hoặc hiệu quả lọc cao
    vehicle_paint_type:
      name: Loại sơn xe
      description: Chỉ định loại sơn xe, chẳng hạn như bộ sơn hoặc sơn thân xe cơ
        giới
    vehicle_placement:
      name: Vị trí xe
      description: 'Chỉ định vị trí có thể đặt sản phẩm trên xe đạp, ví dụ: khung,
        mặt trước'
    vehicle_seating_features:
      name: Tính năng ghế ngồi trên xe
      description: Mô tả các tính năng đặc biệt của ghế ngồi trên xe, chẳng hạn như
        sưởi ấm hoặc ngả lưng
    vehicle_suspension_features:
      name: Tính năng bộ phận giảm xóc cho xe
      description: Chỉ định các tính năng riêng của các bộ phận của hệ thống treo
        trên xe, chẳng hạn như có thể điều chỉnh hoặc thủy lực
    vehicle_tire_type:
      name: Loại lốp xe
      description: Chỉ định sự phù hợp theo mùa hoặc địa hình của lốp xe, như mùa
        đông hoặc mọi địa hình
    vehicle_type:
      name: Loại xe
      description: 'Phân loại loại phương tiện, ví dụ: SUV hoặc thuyền buồm'
    ventilation_type:
      name: Loại thông gió
      description: Mô tả kiểu lỗ thông gió chính hoặc các tính năng luồng không khí
        của vỏ bọc giúp quản lý nhiệt độ bên trong
    verification_technology:
      name: Công nghệ xác minh
      description: Xác định công nghệ được sử dụng trong máy soi tiền, chẳng hạn như
        từ tính hoặc hồng ngoại
    vesa_mounting_pattern:
      name: Mẫu lắp đặt VESA
      description: Xác định khoảng cách lỗ VESA ở mặt sau màn hình để tương thích
        với giá đỡ, cánh tay và chân đế.
    vg/pg_ratio:
      name: Tỷ lệ VG/PG
      description: 'Cho biết tỷ lệ glycerin thực vật và propylene glycol trong tinh
        dầu, ví dụ: 30:70'
    video_codecs/formats_supported:
      name: Các codec/định dạnh video được hỗ trợ
      description: Xác định codec và định dạng video mà thiết bị hỗ trợ, chẳng hạn
        như MP4 hoặc H.264
    video_game_content_features:
      name: Tính năng nội dung trò chơi điện tử
