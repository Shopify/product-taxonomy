    ski_construction:
      name: Xây dựng ván trượt tuyết
      description: Xác định kiểu xây dựng ván trượt tuyết, chẳng hạn như nắp kết hợp
        hoặc nắp một phần
    skiing_style:
      name: Phong cách đồ bơi
      description: Phân loại sản phẩm dựa trên kỹ thuật và phong cách trượt tuyết,
        chẳng hạn như trượt tuyết xuống dốc hoặc trượt tuyết kiểu Bắc Âu
    skill_level:
      name: Cấp độ kỹ năng
      description: Xác định trình độ cần thiết để sử dụng sản phẩm, chẳng hạn như
        người mới bắt đầu hoặc chuyên gia
    skin_care_effect:
      name: Hiệu quả chăm sóc da
      description: Xác định lợi ích mong muốn của các sản phẩm chăm sóc da, ví dụ
