    autograph_type:
      name: Loại chữ ký
      description: Xác định hạng mục của vật phẩm có chữ ký, chẳng hạn như thể thao
        hoặc âm nhạc
    automation:
      name: Tự động hoá
      description: Mô tả mức độ tự động hóa trong máy đóng gói, chẳng hạn như thủ
        công hoặc tự động
    award_design:
      name: Thiết kế giải thưởng
      description: Mô tả phong cách hoặc chủ đề của giải thưởng hoặc chứng chỉ, chẳng
        hạn như hiện đại hoặc chính thức
    award_occasion:
      name: Dịp trao giải
      description: Nêu rõ mục đích của giải thưởng, như ghi nhận nhân viên hoặc thành
