        hưởng đến thời gian ghi và chất lượng hình ảnh.
    recreational_vehicle_type:
      name: Loại xe dã ngoại
      description: Xác định loại phương tiện giải trí, chẳng hạn như Loại A hoặc xe
        kéo du lịch
    reed_strength:
      name: Độ bền lưỡi gà
      description: Cho biết tính linh hoạt của dăm kèn gió, chẳng hạn như mềm, trung
        bình hoặc cứng
    reel_capacity:
      name: Ding tích cuộn phim
      description: Chỉ định công suất của một cuộn trong hộp rửa phim, chẳng hạn như
        đơn hoặc bốn
    reflector_design:
      name: Thiết kế máy phản xạ
      description: Mô tả thiết kế của tấm tản sáng flash, chẳng hạn như tổ ong hoặc
