    camera_lens_material:
      name: Vật liệu ống kính máy ảnh
      description: Chỉ định thành phần của ống kính máy ảnh hoặc máy quay video, chẳng
        hạn như thủy tinh hoặc nhựa
    camera_lens_type:
      name: Loại ống kính máy ảnh
      description: Xác định loại ống kính máy ảnh, chẳng hạn như ống kính cận cảnh
        hoặc ống kính từ xa
    camera_mounting_type:
      name: Loại giá đỡ máy ảnh
      description: Chỉ định phương pháp gắn máy ảnh, ví dụ như giá ba chân, kẹp
    camera_sensor_type:
      name: Loại cảm biến máy ảnh
      description: 'Xác định loại cảm biến trong máy ảnh hoặc quang học, ví dụ: CMOS,
        CCD'
    camera_shape:
      name: Kiểu dáng máy ảnh
      description: Mô tả phong cách thiết kế của camera an ninh, chẳng hạn như hình
        viên đạn hoặc hình hộp
    candle_kit_items_included:
