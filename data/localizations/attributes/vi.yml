    sleeve_length_type:
      name: Loại chiều dài tay áo
      description: Chỉ định kiểu tay áo trên các mặt hàng quần áo, chẳng hạn như ngắn
        tay hoặc không tay
    sleeving_style:
      name: Kiểu ống bọc
      description: 'Phân loại kết cấu hoặc thiết kế cấu trúc của ống bọc (ví dụ: bện,
