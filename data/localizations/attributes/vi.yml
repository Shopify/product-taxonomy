        sức khỏe và làm đẹp; ví dụ như kem dưỡng da, huyết thanh
    product_format:
      name: Định dạng sản phẩm
      description: Cho biết sản phẩm được giao dưới dạng sản phẩm vật lý hay tải xuống
        kỹ thuật số.
    product_formulation:
      name: Hình thức sản phẩm
