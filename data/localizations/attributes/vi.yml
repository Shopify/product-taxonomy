---
vi:
  attributes:
    3d_glasses_fit_design:
      name: Thiết kế vừa vặn kính 3D
      description: Cho biết cách kính được đeo hoặc gắn (ví dụ, kẹp vào, bao quanh,
        đeo ngoài).
    3d_glasses_material:
      name: Vật liệu kính 3D
      description: Chỉ định vật liệu được sử dụng cho kính 3D, như tre hoặc thép không
        gỉ
    3d_glasses_technology:
      name: Công nghệ kính 3D
      description: Chỉ định công nghệ hình ảnh/đồng bộ 3D mà kính được thiết kế, xác
        định khả năng tương thích với màn hình hoặc máy chiếu cụ thể.
    3d_printer_case_style:
      name: Kiểu hộp máy in 3D
      description: Phân loại loại sản phẩm tổng thể để người mua có thể phân biệt
        giữa túi xách mềm, hộp cứng, vỏ bọc cố định và tấm phủ bụi đơn giản.
    3d_printer_cleaning_kit_components_included:
      name: Linh kiện trong bộ vệ sinh máy in 3D được bao gồm
      description: Liệt kê các dụng cụ và vật tư tiêu hao được cung cấp trong bộ để
        người mua biết chính xác họ đang mua gì.
    3d_printing_resin_type:
      name: Loại nhựa in 3D
      description: Chỉ định công thức hoặc ứng dụng dự kiến của nhựa, giúp người mua
        nhanh chóng xác định nhựa là loại tiêu chuẩn, cấp kỹ thuật, có thể đúc hoặc
        các loại chuyên dụng khác.
    80_plus_efficiency_rating:
      name: Xếp hạng hiệu suất 80 Plus
      description: Biểu thị mức chứng nhận hiệu quả năng lượng 80 Plus chính thức
        mà PSU đã đạt được.
    abrasive_material:
      name: Vật liệu kết dính
      description: Xác định loại chất mài mòn được sử dụng trong các công cụ chà nhám,
        như kim cương hoặc cacbua silic
    absinthe_style:
      name: Phong cách rượu absinthe
      description: Xác định phong cách của rượu áp-xin, ví dụ như hỗn hợp, chưng cất
    absinthe_variety:
      name: Loại rượu absinthe
      description: Phân biệt các sản phẩm rượu áp-xin bằng các giống riêng của chúng,
        ví dụ như rouge, verte
    absorbency_level:
      name: Mức độ hấp thụ
      description: Xác định khả năng thấm hút, thường dành cho các sản phẩm chăm sóc
        cá nhân; ví dụ như qua đêm, ánh sáng
    absorbent_hygiene_product_features:
      name: Tính năng sản phẩm vệ sinh thấm hút
      description: Xác định các đặc điểm đặc biệt của sản phẩm vệ sinh, như chống
        rò rỉ hoặc không gây dị ứng
    academic_level:
      name: Trình độ học thuật
      description: Chỉ định cấp độ học thuật của nội dung truyền thông, chẳng hạn
        như đại học hoặc tiến sĩ
    accessibility_design_features:
      name: Các tính năng thiết kế trợ năng
      description: Liệt kê các yếu tố thiết kế đặc biệt hỗ trợ người dùng gặp khó
        khăn về thính giác, thị giác hoặc vận động khéo léo.
    accessory_material:
      name: Vật liệu phụ kiện
      description: Chỉ rõ loại vật liệu trong các phụ tùng, thường dùng để vận chuyển
        vật tư; như nhựa, bìa cứng
    accessory_size:
      name: Kích cỡ phụ kiện
      description: Xác định kích thước của sản phẩm phụ kiện, chẳng hạn như một kích
        thước hoặc nhỏ gọn
    accordion_tuning:
      name: Điều chỉnh đàn phong cầm
      description: Chỉ định loại điều chỉnh được sử dụng trong đàn phong cầm, chẳng
        hạn như dry hoặc concert pitch
    activation_mechanism:
      name: Cơ chế kích hoạt
      description: Xác định phương pháp chính kích hoạt báo động.
    activation_method:
      name: Phương pháp kích hoạt
      description: Mô tả cách người dùng kích hoạt thẻ tín dụng trả trước hoặc SIM.
    active_ingredient:
      name: Thành phần hoạt tính
      description: Xác định các chất chính trong các sản phẩm chăm sóc cá nhân, ví
        dụ như vitamin A, retinol
    activewear_clothing_features:
      name: Đặc điểm quần áo thể thao
      description: Xác định các đặc điểm riêng của quần áo thể thao, chẳng hạn như
        thiết kế co giãn bốn chiều hoặc thoáng khí
    activity:
      name: Hoạt động
      description: Chỉ định môn thể thao hoặc hoạt động mà sản phẩm được thiết kế,
        chẳng hạn như quần vợt hoặc pilates
    activity_tracker_design:
      name: Thiết kế theo dõi hoạt động
      description: Chỉ định cách đeo thiết bị theo dõi sức khỏe, ví dụ như kẹp, băng
        tay
    acupuncture_model_format:
      name: Định dạng mô hình châm cứu
      description: Xác định kích thước và tỷ lệ của các mô hình châm cứu, ví dụ như
        kích thước thật, mô hình thu nhỏ
    acupuncture_model_type:
      name: Loại mô hình châm cứu
      description: 'Chỉ định bộ phận cơ thể hoặc loài mà mô hình châm cứu đại diện,
        ví dụ như đầu, tay, động vật '
    adapter_directionality:
      name: Hướng bộ chuyển đổi
      description: Cho biết bộ chuyển đổi có hỗ trợ luồng tín hiệu theo cả hai hướng
        hay chỉ theo một hướng được chỉ định.
    adapter_operating_modes:
      name: Chế độ hoạt động bộ chuyển đổi
      description: Chỉ định bộ chuyển đổi hoạt động như bộ thu Bluetooth, bộ phát
        hoặc cả hai.
    adaptive_sync_technology:
      name: Công nghệ đồng bộ thích ứng
      description: Chỉ định công nghệ tốc độ làm mới biến đổi (VRR) được màn hình
        hỗ trợ cho hình ảnh không bị xé.
    adc_resolution:
      name: Độ phân giải ADC
      description: Chỉ định độ phân giải (tính bằng bit) của Bộ chuyển đổi tương tự
        sang số tích hợp, xác định độ chính xác đo lường.
    additional_animation_software_features:
      name: Các tính năng phần mềm hoạt hình bổ sung
      description: Chỉ định các tính năng độc đáo trong phần mềm chỉnh sửa hoạt ảnh,
        chẳng hạn như hoạt ảnh nhân vật hoặc hiệu ứng hình ảnh
    additional_cleaning_technology:
      name: Công nghệ làm sạch bổ sung
      description: 'Liệt kê bất kỳ công nghệ làm sạch nào được bao gồm ngoài hơi nước
        (ví dụ: siêu âm, UV, ozone).'
    additional_design_software_type:
      name: Loại phần mềm thiết kế bổ sung
      description: Chỉ định các khả năng bổ sung của phần mềm thiết kế, chẳng hạn
        như chuyến tham quan ảo hoặc thiết kế cảnh quan
    additional_financial_software_features:
      name: Các tính năng phần mềm tài chính bổ sung
      description: Xác định các khả năng bổ sung của phần mềm tài chính, như quản
        lý tài sản hoặc kiểm toán và tuân thủ
    additional_graphic_software_features:
      name: Các tính năng phần mềm đồ họa bổ sung
      description: Làm nổi bật các khả năng bổ sung của phần mềm đồ họa, như minh
        họa kỹ thuật số hoặc thiết kế bố cục
    additional_publishing_software_features:
      name: Các tính năng phần mềm xuất bản bổ sung
      description: Làm nổi bật các chức năng bổ sung trong phần mềm xuất bản, như
        thiết kế in ấn hoặc xuất bản kỹ thuật số
    additional_security_software_features:
      name: Các tính năng phần mềm bảo mật bổ sung
      description: 'Xác định các khả năng bổ sung của phần mềm bảo mật, ví dụ: mã
        hóa ổ đĩa, phát hiện xâm nhập'
    adhesive_application_type:
      name: Loại ứng dụng keo dán
      description: Xác định dịch vụ lông mi hoặc trường hợp sử dụng dự định cho keo
        dán.
    adhesive_features:
      name: Tính năng dính
      description: Nêu bật các đặc tính đặc biệt của chất keo dính được sử dụng trên
        miếng dán hoặc băng dính.
    adhesive_format:
      name: Định dạng chất kết dính
      description: Chỉ ra hình thức vật lý mà chất kết dính được cung cấp để sử dụng
        sửa chữa
    adhesive_strength:
      name: Độ bền kết dính
      description: Xác định mức độ bền kết dính hoặc lực nâng của chất kết dính của
        miếng dán mũi (ví dụ, nguyên bản, siêu mạnh).
    adhesive_type:
      name: Loại chất kết dính
      description: Xác định loại chất kết dính được sử dụng trong sản phẩm, chẳng
        hạn như chất kết dính có thể tháo rời hoặc vĩnh viễn
    aftershave_product_form:
      name: Mẫu sản phẩm sau cạo râu
      description: Xác định tính nhất quán của sản phẩm sau cạo râu, chẳng hạn như
        dầu dưỡng hoặc kem
    age_group:
      name: Nhóm tuổi
      description: Xác định độ tuổi mục tiêu cho sản phẩm, chẳng hạn như người lớn
        hoặc trẻ em
    age_restrictions:
      name: Hạn chế về độ tuổi
      description: Cho biết yêu cầu về độ tuổi tối thiểu đối với một sản phẩm hoặc
        sự kiện, chẳng hạn như 18 tuổi trở lên
    ai_application:
      name: Ứng dụng trí tuệ nhân tạo
      description: Chỉ định chức năng của AI trong phần mềm, như phân tích dự đoán
        hoặc nhận dạng giọng nói
    air_freshener_form:
      name: Dạng bộ lọc không khí
      description: Xác định loại hệ thống tạo mùi hương trong ô tô, ví dụ như dầu,
        kẹp lỗ thông
    air_fryer_functions:
      name: Chức năng của nồi chiên không dầu
      description: 'Liệt kê các chế độ nấu khác nhau có trong nồi chiên không dầu
        hoặc thiết bị tương tự, ví dụ: chiên không dầu, nướng'
    air_mattress_features:
      name: Tính năng nệm hơi
      description: Mô tả các đặc điểm riêng của nệm hơi, như dễ bơm hoặc chống đâm
        thủng
    air_tube_configuration:
      name: Cấu hình ống khí
      description: Cho biết số lượng hoặc kiểu ống bơm hơi được tích hợp với băng
        quấn.
    airbrush_feed_type:
      name: Loại nguồn cấp phun sơn
      description: Xác định phương pháp phân phối sơn trong bình bơm phun, như trọng
        lực hoặc siphon
    airbrush_operation_method:
      name: Phương pháp vận hành phun sơn
      description: 'Chỉ định kiểu hoạt động của airbrush, ví dụ: hành động kép hoặc
        hành động đơn lẻ'
    aircraft_engine_configuration:
      name: Cấu hình động cơ máy bay
      description: Cho biết số lượng động cơ cung cấp năng lượng cho máy bay, chẳng
        hạn như động cơ đơn hoặc động cơ đôi
    aircraft_engine_type:
      name: Loại động cơ máy bay
      description: Cho biết loại động cơ cung cấp năng lượng cho máy bay, chẳng hạn
        như động cơ phản lực hoặc động cơ tua-bin cánh quạt
    airflow_opening_design:
      name: Thiết kế lỗ thông khí
      description: Mô tả cấu hình thở hoặc thông gió được tích hợp vào miếng ngậm.
    airsoft_equipment_included:
      name: Bao gồm thiết bị súng hơi hạng nhẹ
      description: Chỉ định các thiết bị bổ sung được cung cấp cùng với các sản phẩm
        súng hơi hạng nhẹ, chẳng hạn như kính bảo hộ hoặc áo chiến thuật
    album_type:
      name: Loại album
      description: Mô tả kiểu đóng bìa của bộ làm album ảnh hoặc bộ đóng dấu, ví dụ
        như bìa xoắn ốc, sổ lưu niệm
    alcohol/solvent_content:
      name: Hàm lượng cồn/dung môi
      description: 'Phân loại sản phẩm dựa trên hàm lượng cồn hoặc dung môi cho mục
        đích vận chuyển và quản lý (ví dụ: cồn ≤24%, cồn >24%, thùng nhỏ dung môi)'
    alcohol_content:
      name: Hàm lượng cồn
      description: Cho biết liệu toner không chứa cồn hay nếu có, công thức chứa khoảng
        bao nhiêu cồn.
    alert_type:
      name: Loại cảnh báo
      description: Chỉ định loại cảnh báo mà sản phẩm cung cấp, chẳng hạn như báo
        động bằng âm thanh hoặc thông báo trên điện thoại thông minh
    allergen_information:
      name: Thông tin về chất gây dị ứng
      description: Cho biết các chất gây dị ứng tiềm ẩn có trong thực phẩm hoặc đồ
        uống, chẳng hạn như lúa mì hoặc đậu phộng
    allergen_test_type:
      name: Loại thử nghiệm chất gây dị ứng
      description: Chỉ định loại chất gây dị ứng mà bộ dụng cụ xét nghiệm được thiết
        kế để phát hiện, chẳng hạn như thực phẩm hoặc môi trường
    allergens:
      name: Chất gây dị ứng
      description: Cho biết các chất gây dị ứng tiềm ẩn trong các sản phẩm chăm sóc
        sức khỏe và làm đẹp, ví dụ như linalool hoặc limonene
    allergy_friendly_features:
      name: Tính năng chống dị ứng
      description: Xác định xem sản phẩm có đặc tính chống dị ứng hay không, chẳng
        hạn như không chứa mủ cao su hoặc chống nấm mốc
    amino_acid_subtype:
      name: Loại phụ axit amin
      description: Xác định loại hoặc hồ sơ axit amin chính có trong thực phẩm bổ
        sung.
    amplifier/booster_suitable_location:
      name: Vị trí phù hợp của Bộ khuếch đại/Booster
      description: Chỉ định vị trí tốt nhất cho bộ khuếch đại hoặc bộ tăng cường tín
        hiệu, chẳng hạn như xe cộ hoặc địa điểm lớn
    amplifier_class:
      name: Lớp bộ khuếch đại
      description: Xác định loại bộ khuếch đại, chẳng hạn như AB hoặc D
    amplifier_configuration:
      name: Cấu hình bộ khuếch đại
      description: Chỉ định cách thiết lập bộ khuếch đại của xe cơ giới, chẳng hạn
        như hai kênh hoặc bốn kênh
    amputation_level:
      name: Mức độ cắt cụt
      description: Biểu thị mức độ cắt cụt mà bộ co được thiết kế cho.
    analyte_measured:
      name: Chất phân tích được đo
      description: Xác định dấu ấn sinh học mà dung dịch kiểm soát cung cấp hiệu chuẩn.
    anamorphic_squeeze_ratio:
      name: Tỷ lệ nén anamorphic
      description: Cho biết hệ số nén theo chiều ngang của thấu kính anamorphic, giúp
        người dùng có thể kết hợp ống kính phù hợp với kết quả hình ảnh khử nén mong
        muốn.
    anatomical_detail_displayed:
      name: Chi tiết giải phẫu được hiển thị
      description: Cho biết những đặc điểm giải phẫu hoặc kinh lạc nào được làm nổi
        bật trên mô hình.
    anchor_type:
      name: Loại neo
      description: Xác định mỏ neo được sử dụng trong các thiết bị thể thao dưới nước
        dạng kéo, chẳng hạn như fluke hoặc plow
    anemometer_application:
      name: Ứng dụng máy đo gió
      description: Xác định mục đích sử dụng của máy đo gió, chẳng hạn như công nghiệp
        hoặc khí tượng
    angles_supported:
      name: Góc được hỗ trợ
      description: 'Chỉ định phạm vi góc mà sản phẩm có thể đáp ứng, thường dành cho
        thiết bị điện tử; ví dụ: có thể điều chỉnh, 0° đến 180°'
    angling_style:
      name: Kiểu câu cá
      description: Xác định kỹ thuật câu cá mà sản phẩm được thiết kế, chẳng hạn như
        câu cá lướt sóng hoặc câu cá bằng ruồi nhân tạo
    animal_feed_form:
      name: Mẫu thức ăn chăn nuôi
      description: Chỉ định dạng thức ăn chăn nuôi, chẳng hạn như dạng lỏng hoặc dạng
        hạt
    animal_type:
      name: Loại động vật
      description: Chỉ định loại động vật là đối tượng của sản phẩm, chẳng hạn như
        vịt, hươu hoặc chó
    answering_machine_type:
      name: Loại máy trả lời tự động
      description: Chỉ định sự hiện diện và công nghệ của máy trả lời tự động tích
        hợp.
    antenna_connector_type:
      name: Loại đầu nối ăng-ten
      description: Chỉ định đầu nối RF được sử dụng để gắn ăng-ten ngoài.
    antenna_rf_connector_type:
      name: Loại đầu nối RF anten
      description: Xác định đầu nối RF mà ăng-ten sử dụng
    antenna_type:
      name: Loại ăng-ten
      description: Chỉ định loại ăng-ten cho các thiết bị điện tử, ví dụ như đa hướng,
        lưới
    anti_agin_skin_care_type:
      name: Loại chăm sóc da chống lão hóa
      description: Phân loại các loại sản phẩm chăm sóc da chống lão hóa, ví dụ như
        mặt nạ, toner
    anti_perspirant_strength_level:
      name: Mức độ mạnh chất chống mồ hôi
      description: Biểu thị phân loại hiệu quả của chất chống mồ hôi (ví dụ, độ mạnh
        lâm sàng, độ mạnh thể thao).
    antibody_class_tested:
      name: Loại kháng thể được kiểm tra
      description: 'Xác định immunoglobulin hoặc dấu ấn sinh học mà bộ kit phát hiện
        (ví dụ: IgE, IgG4).'
    antifreeze_type:
      name: Loại chất chống đông
      description: Chỉ định loại chất chống đông để bảo dưỡng phương tiện, ví dụ như
        cô đặc, pha loãng trước
    antique_car_design:
      name: Thiết kế xe cổ
      description: Mô tả phong cách thiết kế chính của một chiếc xe cổ, chẳng hạn
        như xe t-bucket hoặc xe grand tourer
    antique_vehicle_era:
      name: Thời đại xe cổ
      description: Mô tả giai đoạn lịch sử của một chiếc xe cổ, chẳng hạn như Thời
        đại Đồng thau hoặc Thời đại Cổ điển
    appliance_board_function:
      name: Chức năng bo mạch thiết bị
      description: Chỉ định vai trò chức năng của bo mạch trong thiết bị.
    appliance_unit_location:
      name: Vị trí đơn vị thiết bị
      description: Cho biết phần vật lý của thiết bị mà bo mạch dành cho (ví dụ, đơn
        vị trong nhà hoặc ngoài trời).
    application_area:
      name: Khu vực ứng dụng
      description: Chỉ định bộ phận cơ thể hoặc vùng cần thoa sản phẩm, ví dụ như
        môi, toàn thân
    application_method:
      name: Phương pháp ứng dụng
      description: Xác định cách áp dụng hoặc sử dụng một sản phẩm, ví dụ như gel,
        chất lỏng, dạng xịt
    application_type:
      name: Loại ứng dụng
      description: Cho biết liệu sản phẩm điều trị được giữ lại hay xả ra và bất kỳ
        chế độ sử dụng đặc biệt nào.
    applicator_format:
      name: Định dạng dụng cụ bôi
      description: Mô tả hình thức vật lý hoặc kiểu dáng của dụng cụ bôi kem dưỡng
        da hoặc kem chống nắng.
    applicator_material:
      name: Vật liệu dặm
      description: Chỉ định vật liệu được sử dụng trong dụng cụ áp dụng, thường dành
        cho băng vệ sinh dạng que tampon; ví dụ như nhựa, bìa cứng
    applicator_type:
      name: Loại dụng cụ
      description: Xác định loại dụng cụ bôi đi kèm với băng vệ sinh, ví dụ như dụng
        cụ bôi, dụng cụ không bôi
    applique/patch_shape:
      name: Hình dạng đính/vá
      description: Mô tả hình thức của các vật trang trí hoặc miếng dán, chẳng hạn
        như động vật hoặc hình khối
    applique_shape:
      name: Hình dạng đính
      description: Mô tả hình dạng của các miếng đính, chẳng hạn như hoa hoặc động
