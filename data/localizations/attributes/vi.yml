    audio_output_channel:
      name: Kênh đầu ra âm thanh
      description: Cho biết số lượng kênh hoặc cấu hình loa mà hệ thống âm thanh có
        thể xuất ra, chẳng hạn như 2 hoặc 5.1
    audio_output_format:
      name: Định dạng đầu ra âm thanh
      description: Xác định chất lượng và loại âm thanh do thiết bị âm thanh tạo ra,
        chẳng hạn như kỹ thuật số hoặc analog
    audio_player/recorder_features:
      name: Tính năng phát/ghi âm thanh
