    cable_form_factor:
      name: Kiểu dáng cáp
      description: Mô tả phong cách thiết kế vật lý hoặc hình dạng của cáp
    cable_housing_material:
      name: Vật liệu vỏ cáp
      description: Xác định vật liệu được sử dụng cho vỏ cáp, chẳng hạn như nylon
        hoặc PVC
    cable_jacket_rating:
      name: Xếp hạng vỏ cáp
      description: 'Chỉ định xếp hạng về môi trường hoặc an toàn của lớp vỏ ngoài
        của cáp (ví dụ: lớp vỏ kín, chôn trực tiếp, chống tia UV)'
    cable_shielding:
      name: Vỏ chống nhiễu dây cáp
      description: Chỉ định loại bảo vệ được sử dụng trong cáp, ví dụ như bện (STP),
        giấy bạc (FTP)
    cable_style:
      name: Kiểu cáp
      description: 'Mô tả thiết kế vật lý của cáp (ví dụ: bện, phẳng, cuộn, có thể
        thu vào)'
    cable_tie_type:
      name: Loại dây buộc
      description: Chỉ định kiểu dáng xây dựng hoặc cơ chế thít của dây buộc cáp
    cable_tray_style:
      name: Kiểu máng cáp
      description: Mô tả kiểu cấu trúc của phần máng cáp quyết định phương pháp thông
