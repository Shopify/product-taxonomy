        A) của cáp
    audio/video_cable_connector_type_end_b:
      name: Loại đầu nối cáp âm thanh/video (đầu B)
      description: Chỉ định đầu nối hoặc giao diện chính xác có ở đầu thứ hai (Đầu
        B) của cáp
    audio_bypass_type:
      name: Loại bypass âm thanh
      description: Chỉ định cách tín hiệu âm thanh được định tuyến khi hiệu ứng bị
        tắt (ví dụ, bypass thực, đệm, rơle).
