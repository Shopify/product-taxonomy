      name: Thiết kế tay cầm túi quà tặng
      description: Mô tả kiểu tay cầm trên túi quà, chẳng hạn như dây thừng hoặc ruy
        băng
    gift_set_format:
      name: Dạng bộ quà tặng
      description: Chỉ định phong cách đóng gói của bộ quà tặng, chẳng hạn như hộp
        quà hoặc túi quà
    gimbal_stabilization_axes:
      name: Trục ổn định gimbal
      description: Xác định số lượng trục ổn định điện tử hoặc cơ học được cung cấp
