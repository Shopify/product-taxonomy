    keycap_material:
      name: Vật liệu nắp phím
      description: Chỉ ra vật liệu chính hoặc quy trình sản xuất của các nắp phím,
        ảnh hưởng đến độ bền, kết cấu và chú giải
    keycap_profile:
      name: Cấu hình nắp phím
      description: Chỉ định kiểu dáng hoặc hình dạng của bộ nắp phím, ảnh hưởng đến
        cảm giác gõ và tính thẩm mỹ
    keypad_style:
      name: Kiểu bộ phím
      description: Xác định phương thức nhập cho bàn phím, chẳng hạn như kỹ thuật
        số hoặc chữ số
    keystone_correction_type:
      name: Loại hiệu chỉnh hình thang
      description: 'Mô tả loại hiệu chỉnh hình thang hoặc hình học mà máy chiếu hỗ
        trợ để loại bỏ biến dạng hình thang (ví dụ: dọc thủ công, bốn điểm tự động).'
    kiln_features:
      name: Tính năng lò nung
      description: Xác định các khả năng chức năng và đặc điểm thiết kế của lò nung.
    kiln_loading_style:
      name: Kiểu nạp lò nung
      description: Xác định phương pháp đặt và lấy sản phẩm vào và ra khỏi buồng lò.
    kit_construction_type:
      name: Loại kết cấu xây dựng
      description: 'Chỉ định loại vải của khu vực nhảy của tấm bạt lò xo, ví dụ: tổng
        hợp, polypropylen'
    kitchen/dining_furniture_items_included:
      name: Đi kèm đồ dùng nhà bếp
      description: Xác định các món đồ nội thất cụ thể có trong một bộ, như ghế ăn
        hoặc đảo bếp
    kitchen_utensil_items_included:
      name: Đã bao gồm các vật dụng nhà bếp
      description: Xác định các dụng cụ có trong bộ dụng cụ nhà bếp, chẳng hạn như
        máy đánh trứng hoặc kẹp gắp thức ăn
    kitesurfing_style:
      name: Loại lướt ván diều
      description: Xác định kiểu lướt ván diều cụ thể mà sản phẩm được thiết kế, chẳng
        hạn như cưỡi sóng
    knee_brace_style:
      name: Kiểu nẹp đầu gối
      description: Xác định thiết kế cấu trúc của nẹp, phản ánh cách đeo và mức độ
        hỗ trợ được cung cấp.
    kneeboard_features:
      name: Tính năng ván quỳ lướt sóng
      description: Mô tả các đặc điểm cụ thể của ván lướt sóng quỳ, như có thể điều
        chỉnh dây đeo hoặc chống trượt
    knife_type:
      name: Loại dao
      description: Phân loại dao dựa trên mục đích sử dụng hoặc thiết kế của chúng,
        chẳng hạn như dao đa năng hoặc EDC
    knitting/padding_project_type:
      name: Loại dự án đệm/lót
      description: Xác định mục đích sử dụng của vật liệu đan hoặc may chần, như chần
        bông hoặc làm gối
    knitting_project_type:
      name: Loại dự án đan
      description: Chỉ định loại dự án đan, chẳng hạn như làm gối hoặc làm đồ chơi
        nhồi bông
    knob/handle_design:
      name: Thiết kế quả đấm/tay cầm cửa
      description: Mô tả kiểu dáng của phần cứng tủ, chẳng hạn như núm tròn hoặc thanh
        kéo
    knob_function:
      name: Chức năng tay nắm cửa
      description: Chỉ định chức năng của các nút khuếch đại, chẳng hạn như độ lớn
        hay độ vang
    knob_style:
      name: Kiểu quả đấm cửa
      description: Mô tả thiết kế các nút bấm trên bộ khuếch đại âm thanh nhạc cụ,
        như tiêu chuẩn hoặc cổ điển
    knot_shape:
      name: Hình dạng nút
      description: Xác định hình dạng tổng thể hoặc biên dạng của nút hoặc đầu bàn
        chải.
    labeling_project_type:
      name: Loại dự án dán nhãn
      description: Chỉ định mục đích chế tạo cho các nhãn mác quần áo, như làm đồ
        dệt tại nhà hoặc làm quà tặng cá nhân
    laboratory_freezer_design:
      name: Thiết kế tủ đông trong phòng thí nghiệm
      description: Mô tả cấu hình của tủ đông phòng thí nghiệm, chẳng hạn như tủ đứng
        hoặc tủ ngăn kéo
    lacrosse_equipment_included:
      name: Bao gồm thiết bị bóng vợt
      description: Chỉ định các vật phẩm trong bộ thiết bị chơi bóng vợt, chẳng hạn
        như gậy bóng vợt hoặc miếng đệm vai
    ladder_type:
      name: Loại thang
      description: Xác định kiểu thang trên thuyền, chẳng hạn như loại cố định hoặc
        dạng ống lồng
    lamination_mode:
      name: Chế độ cán
      description: Xác định loại quy trình cán màng được sử dụng, như cán nguội hoặc
        cán nóng
    lamination_type:
      name: Loại cán màng
      description: Xác định xem bề mặt biểu đồ hoặc mô hình có được cán màng hay không
        và nếu có, là cán một mặt hay hai mặt.
    lamp_assembly_type:
      name: Loại lắp ráp đèn
      description: Chỉ định sản phẩm là bóng đèn trần, đèn có vỏ, gói đôi hoặc cấu
        hình lắp ráp khác.
    lamp_quality_grade:
      name: Cấp chất lượng đèn
      description: Cho biết đèn là OEM gốc, sử dụng bóng đèn OEM trong vỏ tương thích
        hoặc hoàn toàn là hàng thay thế/tương thích.
    lamp_type:
      name: Loại đèn
      description: Chỉ định nguồn sáng trong máy phóng ảnh, ví dụ như ánh sáng lạnh,
        lưỡng sắc
    lancet_mechanism_type:
      name: Loại cơ chế kim chích
      description: 'Xác định cơ chế hoạt động hoặc thiết kế an toàn của kim chích
        (ví dụ: có thể thu vào an toàn, kích hoạt bằng áp lực).'
    language:
      name: Ngôn ngữ
      description: Chỉ định ngôn ngữ được sử dụng hoặc ngôn ngữ tương thích, ví dụ
        tiếng Anh, đa ngôn ngữ
    language_version:
      name: Phiên bản ngôn ngữ
      description: Chỉ định phiên bản ngôn ngữ của một sản phẩm truyền thông, chẳng
        hạn như ENG-US hoặc ARA- Arabic
    laptop_cable_type:
      name: Loại cáp máy tính xách tay
      description: Xác định mục đích chức năng của cáp trong máy tính xách tay
    laptop_housing_part_type:
      name: Loại bộ phận vỏ máy tính xách tay
      description: 'Chỉ định thành phần bên ngoài nào được cung cấp (ví dụ: đế dưới,
        chỗ để tay, khung bezel)'
    laser_color:
      name: Màu laze
      description: Xác định màu của bút trình chiếu laser, như màu đỏ hoặc xanh lục
    laser_light_source:
      name: Nguồn ánh sáng laze
      description: Chỉ định công nghệ ánh sáng được sử dụng trong bút trình chiếu
        laser, chẳng hạn như đèn LED
    laser_pattern:
      name: Mẫu laser
      description: Xác định thiết kế hoặc họa tiết được tạo ra bởi tia laser, chẳng
        hạn như ngôi sao hoặc động vật
    lathe_application:
      name: Ứng dụng máy tiện
      description: Chỉ định loại công việc mà máy tiện được thiết kế, như kéo sợi
        acrylic hoặc chế tạo thủy tinh
    laundry_detergent_features:
      name: Tính năng giặt tẩy
      description: Mô tả các đặc tính đặc biệt của nước giặt, như bảo vệ màu sắc hoặc
        loại bỏ vết bẩn
    lead_grade:
      name: Loại chì
      description: Chỉ định loại chì trong dụng cụ viết, ví dụ H, 9B
    leash_design:
      name: Thiết kế dây xích
      description: Mô tả chức năng của dây xích thú cưng, chẳng hạn như có thể tháo
        rời hoặc thu vào
    leather/vinyl_texture:
      name: Kết cấu da/nhựa vinyl
      description: Mô tả cảm giác bề mặt của các sản phẩm da hoặc nhựa vinyl, như
        mịn hoặc sần sùi
    leather_type:
      name: Loại da
      description: 'Chỉ rõ nguồn gốc động vật hoặc loại da được sử dụng trong sản
        phẩm (ví dụ: da bò, da bê, cá sấu, trăn, tổng hợp)'
    lectern_mounting_type:
      name: Kiểu giá đỡ bục giảng
      description: Chỉ định kiểu thiết lập của bục giảng, như mặt bàn hoặc sàn
    led_light_mode:
      name: Chế độ đèn LED
      description: 'Liệt kê các chế độ hoạt động có thể chọn kết hợp các quang phổ
        hoặc cường độ khác nhau (ví dụ: xanh dương, đỏ, xanh dương và đỏ).'
    leg_color:
      name: Màu chân ghế
      description: 'Xác định màu sắc của chân sản phẩm, ví dụ: trắng, nâu'
    leg_lock_type:
      name: Loại khoá bằng chân
      description: Xác định loại khóa chân được sử dụng trong các phụ kiện điện tử,
        điển hình là gậy selfie; ví dụ như khóa xoắn
    leg_material:
      name: Chất liệu chân ghế
      description: Chỉ định vật liệu được sử dụng cho chân của sản phẩm, chẳng hạn
        như gỗ anh đào hoặc tre
    leg_pattern:
      name: Kiểu chân
      description: 'Xác định thiết kế hoặc họa tiết in trên chân sản phẩm, chẳng hạn
        như động vật hoặc hình dạng '
    leg_sections:
      name: Phần chân
      description: Cho biết số phần chân trong các phụ kiện điện tử, điển hình là
        gậy selfie; ví dụ 5+
    legend_type:
      name: Loại chú giải
      description: Chỉ ra liệu dấu đánh dấu đang trống hay được in sẵn số, chữ cái,
        ký hiệu hoặc các dấu hiệu khác
    length_adjustability:
      name: Khả năng điều chỉnh độ dài
      description: Cho biết liệu độ dài dây đeo hoặc xích có thể được người dùng thay
        đổi hay cố định.
    lens/slide_material:
      name: Vật liệu ống kính
      description: Chỉ rõ vật liệu được sử dụng để chế tạo thấu kính hoặc bản kính,
        như nhựa hoặc thủy tinh
    lens_cap_compatible_device:
      name: Thiết bị tương thích với nắp ống kính
      description: Chỉ định thiết bị tương thích với nắp ống kính, chẳng hạn như ống
        nhòm một mắt hoặc máy ảnh kỹ thuật số
    lens_case_accessories_included:
      name: Phụ kiện hộp kính đi kèm
      description: 'Liệt kê các vật dụng bổ sung được đóng gói cùng với hộp (ví dụ:
        nhíp, chai dung dịch).'
    lens_characteristic:
      name: Đặc điểm của kính
      description: 'Liệt kê các đặc tính chức năng đặc biệt được áp dụng cho thấu
        kính (ví dụ: chặn ánh sáng xanh, UV400).'
    lens_coating:
      name: Lớp phủ trên ống kính
      description: Chỉ định loại lớp phủ trên mắt kính, ví dụ như chống phản chiếu,
        chống trầy xước
    lens_color:
      name: Màu ống kính
      description: Chỉ định màu của tròng kính, chẳng hạn như màu vàng hoặc đen
    lens_color_combination:
      name: Kết hợp màu tròng kính
      description: Chỉ định cặp màu tròng kính được sử dụng cho kính 3D anaglyph.
    lens_configuration:
      name: Cấu hình ống kính
      description: Chỉ định thiết lập ống kính trong các vật như kính lúp, chẳng hạn
        như một hoặc nhiều
    lens_filter_category:
      name: Danh mục bộ lọc kính
      description: Xác định danh mục bộ lọc tiêu chuẩn châu Âu (0–4) phân loại kính
        theo mật độ màu và điều kiện ánh sáng phù hợp.
    lens_filter_effects:
      name: Hiệu ứng bộ lọc ống kính
      description: Mô tả các hiệu ứng cụ thể mà bộ lọc ống kính mang lại, như chỉnh
        màu hoặc macro
    lens_filter_type:
      name: Loại bộ lọc ống kính
      description: 'Chỉ định loại bộ lọc cho ống kính máy ảnh, ví dụ: gradient, bộ
        lọc đen trung tính'
    lens_kit_accessories_included:
      name: Phụ kiện đi kèm bộ ống kính
      description: Liệt kê các phụ kiện bổ sung đi kèm với bộ ống kính hoặc bộ lọc
        cho điện thoại, giúp người mua sắm biết chính xác những gì họ sẽ nhận được
        và có thể so sánh các gói sản phẩm.
    lens_material:
      name: Chất liệu ống kính
      description: Cho biết vật liệu chính được sử dụng cho các thành phần quang học
        hoặc vỏ ngoài của ống kính, chẳng hạn như thủy tinh quang học, nhựa hoặc hợp
        kim nhôm.
    lens_pattern:
      name: Mẫu ống kính
      description: Mô tả thiết kế hoặc hình thức trực quan trên tròng kính mắt, chẳng
        hạn như chất rắn hoặc kết cấu
    lens_polarization:
      name: Phân cực ống kính
      description: Cho biết loại phân cực của thấu kính trong kính mắt, ví dụ như
        phân cực hình ảnh
    lens_protector_coverage_style:
      name: Kiểu che phủ của tấm bảo vệ ống kính
      description: Xác định kiểu dáng vật lý hoặc thiết kế che phủ của tấm bảo vệ
        ống kính máy ảnh điện thoại di động.
    lens_protector_features:
      name: Tính năng của tấm bảo vệ ống kính
      description: Liệt kê các tính năng đặc biệt của tấm bảo vệ ống kính.
    lens_refractive_index:
      name: Chỉ số khúc xạ kính
      description: 'Xác định chỉ số khúc xạ số (ví dụ: 1.50, 1.60, 1.67) có liên quan
        trực tiếp đến độ dày và trọng lượng của kính.'
    lens_storage_type:
      name: Loại túi đựng ống kính
      description: Mô tả loại bảo quản ống kính máy ảnh, như hộp đựng ống kính hoặc
        túi đựng ống kính
    lens_tint_type:
      name: Loại nhuộm màu kính
      description: Mô tả màu nhuộm được áp dụng cho kính để dễ nhìn thấy khi cầm nắm
        hoặc cho mục đích thẩm mỹ.
    lens_type:
      name: Loại ống kính
      description: Chỉ định loại mắt kính trong các sản phẩm kính mắt, như phân cực
        hoặc đa tròng
    license_type:
      name: Loại giấy phép
      description: Chỉ định loại giấy phép phần mềm, chẳng hạn như nguồn mở hoặc mua
        một lần
    lid_material:
      name: Chất liệu nắp
      description: Xác định loại vật liệu được sử dụng làm nắp sản phẩm, chẳng hạn
        như thủy tinh hoặc thép không gỉ
    lid_type:
      name: Loại nắp
      description: Chỉ định loại nắp được sử dụng, chẳng hạn như nắp lật hoặc nắp
        đậy
    life_jacket_features:
      name: Tính năng áo phao
      description: Nêu bật các đặc điểm riêng của áo phao cứu hộ, như phản quang hoặc
        nổi
    light_attachment_type:
      name: Loại phụ kiện đèn
      description: Mô tả cách lắp đèn đọc sách, chẳng hạn như linh hoạt hoặc cố định
    light_color:
      name: Màu sáng
      description: Xác định màu hoặc sắc độ của ánh sáng, chẳng hạn như màu trắng
        hoặc nhiều màu
    light_control:
      name: Kiểm soát ánh sáng
      description: Xác định mức độ chặn ánh sáng của giải pháp trang trí cửa sổ, ví
        dụ như che sáng, mỏng
    light_design:
      name: Thiết kế chiếu sáng
      description: Mô tả kiểu thiết kế đèn trong các phụ kiện máy ảnh, chẳng hạn như
        đèn LED hoặc vòng
    light_exposure_modes:
      name: Chế độ phơi sáng
      description: Chỉ định các tùy chọn điều chỉnh ánh sáng trong máy ảnh, như ưu
        tiên màn trập AE hoặc ưu tiên khẩu độ AE
    light_filtering:
      name: Lớp lọc ánh sáng
      description: Chỉ định khả năng lọc ánh sáng của sản phẩm, chẳng hạn như khuếch
        tán hoặc chắn sáng
    light_options:
      name: Tuỳ chọn ánh sáng
      description: Chỉ định các tính năng chiếu sáng của sản phẩm, chẳng hạn như ánh
        sáng dịu hoặc thay đổi màu sắc
    light_pattern:
      name: Mẫu đèn
      description: 'Xác định chủ đề trực quan của các sản phẩm chiếu sáng, ví dụ:
        hình học hoặc cầu vồng'
    light_rejection_type:
      name: Loại loại bỏ ánh sáng
      description: Cho biết màn hình có loại bỏ ánh sáng xung quanh hoặc ánh sáng
        trần hay không và bằng cách nào, cải thiện độ tương phản hình ảnh trong môi
        trường sáng.
    light_source:
      name: Nguồn sáng
      description: Xác định loại bóng đèn được sử dụng trong sản phẩm, chẳng hạn như
        đèn LED hoặc đèn huỳnh quang
    light_spectrum:
      name: Quang phổ ánh sáng
      description: 'Xác định phạm vi bước sóng ánh sáng mà sản phẩm có thể tạo ra,
        ví dụ: ánh sáng xanh, ánh sáng hồng ngoại'
    light_temperature:
      name: Nhiệt độ ánh sáng
      description: Xác định đặc điểm màu sắc của nguồn sáng, chẳng hạn như màu trắng
        ấm hoặc ánh sáng ban ngày
    light_therapy_device_form_factor:
      name: Hình dạng thiết bị liệu pháp ánh sáng
      description: 'Mô tả kiểu dáng vật lý hoặc cấu hình của thiết bị (ví dụ: bảng,
        mặt nạ, cầm tay).'
    light_type:
      name: Loại ánh sáng
      description: Xác định loại đèn cụ thể được sử dụng trong tàu thủy, ví dụ như
        điều hướng, dưới nước
    lighting_features:
      name: Tính năng chiếu sáng
      description: Mô tả các đặc điểm đặc biệt của đèn chiếu sáng, như có thể điều
        chỉnh độ sáng hoặc đèn LED
    lighting_options:
      name: Tùy chọn chiếu sáng
      description: Chỉ định loại chiếu sáng cho biển báo, chẳng hạn như có đèn hoặc
        không có đèn
    lighting_type:
      name: Loại đèn
      description: Mô tả bất kỳ tính năng chiếu sáng tích hợp nào của tai nghe.
    line/rope_type:
      name: Loại dây thép/dây thừng
      description: Xác định kiểu chế tạo của dây neo hoặc dây thừng, như dây bện ba
        sợi hoặc dây bện đôi
    line_spacing_options:
      name: Tuỳ chọn khoảng cách dòng
      description: Xác định các tùy chọn khoảng cách dòng, thường dành cho máy đánh
        chữ; ví dụ như đôi, có thể điều chỉnh
    liner_features:
      name: Tính năng chì kẻ môi
      description: Mô tả các đặc tính cụ thể của lớp lót, chẳng hạn như chống rò rỉ
        hoặc phân hủy sinh học
    lip_balm_tint_level:
      name: Mức độ nhuộm màu son dưỡng môi
      description: Phân loại mức độ nhuộm màu hoặc độ lên màu mà son dưỡng cung cấp.
    lip_gloss_applicator_type:
      name: Loại dụng cụ bôi son bóng
      description: Xác định kiểu dụng cụ bôi đi kèm với son bóng, ảnh hưởng đến sự
        dễ dàng bôi và sở thích của người dùng.
    lip_gloss_effect:
      name: Hiệu ứng son bóng
      description: Mô tả tác dụng hoặc lớp hoàn thiện mà son bóng mang lại, ví dụ
        như làm mịn, căng mọng
    lip_gloss_formulation:
      name: Công thức son bóng
      description: Xác định kết cấu hoặc định dạng chính của son bóng.
    lip_liner_design:
      name: Thiết kế chì kẻ môi
      description: Xác định loại chì kẻ môi, chẳng hạn như loại có thể thu vào hoặc
        cố định
    lip_makeup_opacity:
      name: Độ mờ trang điểm môi
      description: Cho biết mức độ che phủ hoặc độ mờ của sản phẩm sau khi bôi.
    lip_plate_material:
      name: Chất liệu tấm kê môi
      description: Xác định vật liệu được sử dụng cho phần có lỗ thổi của sáo, như
        bạc hoặc gỗ
    lipstick_coverage:
      name: Độ che phủ son môi
      description: 'Mô tả mức độ mờ màu mà son môi mang lại (ví dụ: trong suốt, trung
        bình, hoàn toàn).'
    lipstick_effect:
      name: Hiệu ứng son môi
      description: Mô tả tác dụng hoặc lớp hoàn thiện mà son môi mang lại, ví dụ như
        làm mịn, căng mọng
    liqueur_variety:
      name: Loại rượu mùi
      description: Phân loại rượu liqueur theo hương vị chính của chúng, ví dụ như
        hạt, kem
    livestock_food_ingredients:
      name: Nguyên liệu thức ăn chăn nuôi
      description: Chỉ định các thành phần chính trong thức ăn chăn nuôi, chẳng hạn
        như bột lúa mạch hoặc đậu nành
    lnb_output:
      name: Đầu ra Lnb
      description: Chỉ định số lượng kết nối máy thu vệ tinh, chẳng hạn như đơn hoặc
        bốn
    lnb_technology:
      name: Công nghệ Lnb
      description: Phân loại loại công nghệ trong bộ chuyển đổi tần số sóng vệ tinh,
        chẳng hạn như phổ quát hoặc nhiễu thấp
    load_capacity:
      name: Dung lượng tải
      description: Chỉ định giới hạn trọng lượng mà sản phẩm có thể xử lý, chẳng hạn
        như tải nhẹ hoặc tải nặng
    loading_ramp_type:
      name: Loại cầu dẫn
      description: Xác định kiểu cầu dẫn xe nâng cho các phương tiện, như một đoạn
        hoặc ba đoạn
    loading_type:
      name: Loại tải
      description: Chỉ định cách cho đồ vào các thiết bị giặt, chẳng hạn như cửa trước
        hoặc cửa trên
    lock_placement:
      name: Vị trí khóa
      description: Xác định vị trí khóa được đặt trên các bộ phận của động cơ tàu
        thủy, chẳng hạn như phía ngoài hoặc phía trong
    lock_type:
      name: Loại khoá
      description: Chỉ định cơ chế khóa mà sản phẩm sử dụng, chẳng hạn như chìa khóa
        hoặc mã
    locking_mechanism:
      name: Cơ chế khoá
      description: Chỉ định loại khóa được sử dụng, thường dành cho các sản phẩm an
        toàn; ví dụ như tự động đóng, trượt
    logic_family:
      name: Họ logic
      description: Xác định họ logic bán dẫn hoặc công nghệ của IC.
    lovibond:
      name: Lovibond
      description: Cho biết cường độ màu của các loại ngũ cốc và mạch nha ủ bia, chẳng
        hạn như nhạt hoặc đậm
    lubricant_application:
      name: Ứng dụng bôi trơn
      description: Xác định các lĩnh vực ứng dụng phù hợp cho chất bôi trơn cá nhân,
        chẳng hạn như mát xa hoặc âm đạo
    lubricant_composition:
      name: Thành phần bôi trơn
      description: Xác định thành phần cơ bản của chất bôi trơn cá nhân, chẳng hạn
        như gốc nước hoặc gốc silicone
    lubricant_dispenser_type:
      name: Loại máy cấp dầu bôi trơn
      description: Xác định loại bao bì hoặc thùng chứa chất bôi trơn, như trống hoặc
        chai
    lubricant_effect:
      name: Hiệu ứng chất bôi trơn
      description: Cho biết bất kỳ hiệu ứng chức năng hoặc kiểu dáng nào được cung
        cấp bởi chất bôi trơn của bao cao su.
    lubricant_form:
      name: Dạng chất bôi trơn
      description: Mô tả độ đặc của chất bôi trơn, chẳng hạn như gel hoặc nhão
    luggage/bag_closure:
      name: Hành lý/túi đựng
      description: Xác định kiểu đóng được sử dụng trên hành lý hoặc túi xách, chẳng
        hạn như khóa kéo hoặc khóa cài
    lumber/wood_type:
      name: Loại gỗ
      description: Xác định loại gỗ cụ thể được sử dụng trong sản phẩm, như gỗ sồi
        hoặc gỗ thông
    lyre/flip_folder_attachment_type:
      name: Loại dụng cụ gập/lật giấy đính kèm
      description: Chỉ định loại phụ kiện cho đàn lia và folder nhạc dạng lật, như
        dây đeo hoặc kẹp đàn lia
    m_2_drive_length_supported:
      name: Độ dài ổ M.2 được hỗ trợ
      description: Chỉ định độ dài thẻ M.2 mà vỏ bọc hoặc bộ chuyển đổi có thể chấp
        nhận
    magnet_type:
      name: Loại nam châm
      description: 'Xác định loại nam châm được sử dụng trong sản phẩm, ví dụ: gốm,
        titan'
    magnification:
      name: Độ phóng đại
      description: Chỉ định khả năng phóng to của sản phẩm, chẳng hạn như 1x hoặc
        100x
    magsafe_compatibility:
      name: Khả năng tương thích với MagSafe
      description: Cho biết liệu phụ kiện có hỗ trợ hệ sinh thái sạc hoặc gắn từ tính
        MagSafe của Apple hay không.
    makeup_brush_application:
      name: Ứng dụng cọ trang điểm
      description: 'Xác định mục đích sử dụng mỹ phẩm chính hoặc khu vực mà cọ được
        thiết kế cho (ví dụ: kem nền, phấn mắt, tạo khối).'
    makeup_features:
      name: Tính năng trang điểm
      description: Nêu bật các đặc điểm chính của mỹ phẩm, chẳng hạn như lên màu tốt
        hoặc không hương liệu
    makeup_shade:
      name: Màu trang điểm
      description: Mô tả màu sắc của mỹ phẩm, chẳng hạn như màu hồng vừa hoặc màu
        nâu đậm
    mallet_material:
      name: Vật liệu búa gỗ
      description: Xác định loại vật liệu được sử dụng trong dùi gõ, chẳng hạn như
        đồng thau hoặc cao su
    management_type:
      name: Loại quản lý
      description: 'Mô tả mức độ quản lý của thiết bị (ví dụ: quản lý hoàn toàn, quản
        lý thông minh, không quản lý), để người mua có thể phù hợp khả năng sản phẩm
        với yêu cầu mạng.'
    mandibular_device_fitting_method:
      name: Phương pháp lắp thiết bị hàm dưới
      description: Mô tả cách thiết bị được lắp hoặc đúc theo răng của người dùng.
    mandolin_back_shape:
      name: Hình dạng mặt sau đàn măng cầm
      description: Chỉ định độ cong và thiết kế của mặt sau đàn măng cầm, chẳng hạn
        như mặt sau phẳng hoặc mặt cong
    manufacturer_type:
      name: Loại nhà sản xuất
      description: Chỉ định nguồn gốc của các bộ phận hoặc phụ kiện xe, chẳng hạn
        như chính hãng hoặc bên thứ ba
    map_update_policy:
      name: Chính sách cập nhật bản đồ
      description: Nêu cách bản cập nhật bản đồ được cung cấp hoặc định giá cho thiết
        bị
    marine_navigator_features:
      name: Tính năng hoa tiêu hàng hải
      description: Chỉ định khả năng của các công cụ điều hướng hàng hải, chẳng hạn
        như màn hình cảm ứng hoặc chống thấm nước
    marker_format:
      name: Định dạng dấu đánh dấu
      description: Xác định phong cách vật lý hoặc cấu trúc của dấu đánh dấu
    marker_text_color:
      name: Màu chữ dấu đánh dấu
      description: Chỉ định màu của chú giải hoặc văn bản được in trên bề mặt của
        dấu đánh dấu (khác với màu thân dấu đánh dấu)
    marker_tip_design:
      name: Thiết kế đầu bút đánh dấu
      description: Mô tả hình dạng của đầu bút đánh dấu, chẳng hạn như hình đạn hoặc
        đục
    marquee_substrate:
      name: Chất nền biển hiệu
      description: 'Xác định phương tiện vật lý mà tác phẩm nghệ thuật được in hoặc
        cung cấp cùng (ví dụ: phim translite, acrylic in ngược, decal vinyl).'
    mascara_brush_shape:
      name: Hình dạng cọ mascara
      description: Xác định hình dạng hoặc thiết kế của que primer hoặc cọ tích hợp,
        ảnh hưởng mạnh mẽ đến việc bôi và kết quả.
    mascara_effect:
      name: Hiệu ứng mascara
      description: Mô tả kết quả hoặc tính năng dự định của mascara, ví dụ như làm
        cong, làm dài mi
    mascara_formulation:
      name: Công thức mascara
      description: 'Cho biết thành phần cơ bản hoặc công nghệ đặc biệt của sản phẩm
        (ví dụ: dạng lỏng, chứa sợi, dạng ống) ảnh hưởng đến kết cấu, độ bền và cách
        tẩy.'
    mask_cushion_material:
      name: Chất liệu đệm mặt nạ
      description: Chi tiết về vật liệu cụ thể được sử dụng cho đệm hoặc miếng đệm
        kín của mặt nạ.
    mask_size:
      name: Kích cỡ mặt nạ
      description: Xác định ký hiệu kích cỡ được cung cấp bởi nhà sản xuất.
    mask_type:
      name: Loại mặt nạ
      description: Chỉ định thiết kế khẩu trang, thường dùng để chăm sóc hô hấp; ví
        dụ như miệng, mũi
    masonry_material:
      name: Vật liệu masonry
      description: Chỉ định thành phần của các vật liệu xây dựng, chẳng hạn như xi
        măng hoặc đá vôi
    masonry_product_form:
      name: Mẫu sản phẩm gạch
      description: Chỉ định hình thức của sản phẩm xây dựng, chẳng hạn như bột nhão
        hoặc bột
    massage_area:
      name: Vùng mát xa
      description: Chỉ định bộ phận cơ thể mà sản phẩm được thiết kế để mát xa, chẳng
        hạn như bàn chân hoặc cổ
    massage_mechanism_dimensionality:
      name: Số chiều cơ chế mát-xa
      description: 'Xác định số lượng trục chuyển động mà con lăn mát-xa hoạt động
        (ví dụ: 2D, 3D, 4D, 5D).'
    massage_stone_texture:
      name: Kết cấu đá mát-xa
      description: Mô tả cảm giác bề mặt của đá mát-xa, mịn hay thô
    massage_technique:
      name: Kỹ thuật xoa bóp
      description: Xác định các phương pháp mát xa được cung cấp bởi một sản phẩm,
        ví dụ như gõ, cơ sâu
    mat/rug_shape:
      name: Hình dạng chiếu/thảm
      description: Mô tả hình dạng của thảm hoặc thảm trải sàn, chẳng hạn như hình
        tròn hoặc hình vuông
    mat_base_material:
      name: Vật liệu nền thảm
      description: Chỉ rõ loại vật liệu được sử dụng làm đế thảm, như nút, cao su
        non
    mat_features:
      name: Tính năng thảm
      description: Mô tả các đặc điểm cụ thể của thảm gia đình hoặc văn phòng, chẳng
        hạn như đế chống trượt hoặc chống thấm nước
    material:
      name: Vật liệu
      description: Xác định chất liệu chính của sản phẩm, chẳng hạn như bông hoặc
        len
    material_firmness:
      name: Độ rắn chắc của vật liệu
      description: Mô tả độ cứng hoặc mềm của sản phẩm, ví dụ như cứng, mềm
    material_hardness:
      name: Độ cứng của vật liệu
      description: Xác định độ cứng của sản phẩm, thường dành cho thiết bị thể thao
        hoặc thể hình; ví dụ như cực mềm, sức cản cao
    material_origin:
      name: Nguồn gốc vật liệu
      description: 'Chỉ ra hình thức hoặc trạng thái mà vật liệu quý được cung cấp
        (ví dụ: đồ trang sức rời/chưa gắn, đồ trang sức thành phẩm, thẻ quà tặng in/kỹ
        thuật số)'
    material_treatment:
      name: Xử lý vật liệu
      description: 'Chỉ định những phương pháp xử lý hóa học hoặc vật lý được áp dụng
        cho vật liệu để bảo quản hoặc đảm bảo an toàn (ví dụ: xử lý nhiệt, hun trùng,
        xử lý hóa học)'
    maternity_clothing_features:
      name: Đặc điểm quần áo bà bầu
      description: Mô tả các đặc điểm riêng của trang phục dành cho bà bầu, ví dụ
        như điều chỉnh theo kích thước bụng, cúp nâng đỡ
    maternity_sleepwear_style:
      name: Kiểu dáng đồ ngủ bà bầu
      description: Chỉ định kiểu dáng của các mặt hàng quần áo ngủ dành cho bà bầu,
        như áo liền quần hoặc áo ngủ
    mattress_features:
      name: Tính năng nệm
      description: Nêu bật các đặc tính đặc biệt của nệm, chẳng hạn như chức năng
        không gây dị ứng hoặc làm mát
    maximum_bit_depth:
      name: Độ sâu bit tối đa
      description: Xác định độ dài từ kỹ thuật số cao nhất (tính bằng bit) mà bộ chuyển
        đổi hỗ trợ, ảnh hưởng đến phạm vi động và độ phân giải
    maximum_magnification:
      name: Độ phóng đại tối đa
      description: Cho biết hệ số phóng to cao nhất mà kính hiển vi có thể đạt được,
        chẳng hạn như 10x hoặc 100x
    maximum_reel_diameter_supported:
      name: Đường kính cuộn tối đa được hỗ trợ
      description: Chỉ định đường kính cuộn lớn nhất mà deck có thể chứa.
    measured_parameters:
      name: Thông số đo
      description: Liệt kê các số liệu về điện hoặc pin mà thiết bị có thể đo hoặc
        hiển thị
    measuring_method:
      name: Phương pháp đo
      description: Xác định kỹ thuật được sử dụng để định lượng lượng mỡ trong cơ
        thể, ví dụ như quang học, thước cặp
    measuring_tool_features:
      name: Tính năng dụng cụ đo
      description: Mô tả các đặc điểm đặc biệt của dụng cụ đo, như máy ảnh tích hợp
        hoặc thiết bị cầm tay
    measuring_type:
      name: Kiểu đo
      description: Chỉ định phương pháp đo cho các thiết bị y tế, ví dụ như trán,
        ngón tay
    meat_cut:
