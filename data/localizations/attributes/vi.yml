    sim_card_type_2:
      name: Thẻ SIM loại 2
      description: Chỉ định định dạng thẻ SIM tương thích cho khe cắm 2 của điện thoại
        di động, chẳng hạn như Nano SIM
    sink_mounting_type:
      name: Kiểu giá đỡ bồn rửa
      description: Chỉ định phương pháp lắp đặt cho chậu rửa, ví dụ như quầy bếp,
        treo tường
    sink_shape:
      name: Hình dạng bồn rửa
      description: Xác định thiết kế hình học của chậu rửa, chẳng hạn như hình bầu
