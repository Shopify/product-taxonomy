        dụ như điện tử, hệ thống ống nước
    soleplate_type:
      name: Loại đế
      description: Xác định loại tấm đế được sử dụng trong bàn ủi, chẳng hạn như gốm
        hoặc thép không gỉ
    solubility:
      name: Độ hoà tan
      description: 'Xác định mức độ hòa tan của sản phẩm trong chất lỏng, ví dụ: không
        hòa tan, hòa tan một phần'
    solution_type:
      name: Loại dung dịch
      description: Chỉ định loại giải pháp cho các sản phẩm chăm sóc thị lực, chẳng
        hạn như nước muối hoặc hydro peroxide
    solvent/thinner_application:
      name: Ứng dụng dung môi hoà tan/chất pha loãng
      description: Chỉ định vật liệu phủ hoặc chất kết dính mà sản phẩm được thiết
        kế để hòa tan hoặc làm loãng, ví dụ như epoxy, sơn
    solvent_application:
      name: Ứng dụng dung môi hoà tan
      description: Chỉ định vật liệu phủ hoặc chất kết dính mà sản phẩm được thiết
        kế để hòa tan, ví dụ như epoxy, sơn
    sonar_imaging_modes:
      name: Chế độ hình ảnh sonar
      description: Xác định các công nghệ xem sonar mà máy dò cá hỗ trợ.
    soothing_sounds:
      name: Âm thanh êm dịu
      description: Xác định nhiều loại âm thanh thư giãn được cung cấp, ví dụ như
        nhịp tim, tiếng ồn trắng
    sound_controls:
      name: Điều khiển âm thanh
      description: Xác định các tính năng điều khiển âm thanh trên nhạc cụ hoặc bộ
        khuếch đại, ví dụ như hồi âm, bộ chỉnh âm
    sound_effects:
      name: Hiệu ứng âm thanh
      description: Xác định các loại hiệu ứng âm thanh, thường dành cho nhạc cụ và
        phụ kiện; ví dụ như nén, trì hoãn
    sound_insulation:
      name: Cách âm
      description: Xác định khả năng cách âm của sản phẩm, chẳng hạn như cách âm hoặc
        không cách nhiệt
    sound_options:
      name: Tuỳ chọn âm thanh
      description: 'Chỉ định các tùy chọn âm thanh khác nhau có sẵn, thường dành cho
        máy đếm nhịp; ví dụ: đếm giọng nói, nhấp chuột'
    speaker_configuration:
