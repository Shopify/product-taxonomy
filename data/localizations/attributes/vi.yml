      name: Công nghệ hiển thị máy đọc sách điện tử
      description: Xác định loại công nghệ màn hình được sử dụng trong thiết bị đọc
        sách điện tử, chẳng hạn như LCD hoặc e-ink
    ear_care_application_method:
      name: Phương pháp ứng dụng chăm sóc tai
      description: Chỉ định phương pháp sử dụng cho các vật dụng chăm sóc tai, chẳng
        hạn như vòi phun hoặc ống nhỏ giọt
    ear_dryer_technology:
      name: Công nghệ máy sấy tai
      description: Xác định cơ chế làm khô chính được sử dụng bởi sản phẩm.
    ear_orientation:
      name: Hướng tai
      description: Chỉ định tai nghe được thiết kế cho tai trái, tai phải hoặc có
        thể đeo ở cả hai bên.
    ear_pick_tip_style:
      name: Kiểu đầu ngoáy tai
      description: Xác định hình dạng hoặc thiết kế của đầu làm việc loại bỏ ráy tai.
    ear_side:
      name: Bên tai
      description: Xác định xem thiết bị hỗ trợ được thiết kế cho tai trái, tai phải
        hay sử dụng như một cặp hai bên.
    ear_tip_size:
      name: Kích thước đầu tai nghe
      description: Cung cấp nhãn kích thước chung thường được sử dụng cho đầu trong
        tai khi không cung cấp kích thước milimét chính xác.
    ear_tip_style:
      name: Kiểu đầu tai nghe
      description: Xác định hình dạng hình học của đầu tai nghe ảnh hưởng đến sự vừa
        vặn và độ kín âm thanh.
    earphone_features:
      name: Tính năng tai nghe
      description: Nêu bật các tính năng riêng của tai nghe, chẳng hạn như micrô tích
        hợp hoặc điều khiển âm lượng
    earplug_cord_style:
      name: Kiểu dây nút tai
      description: Cho biết liệu nút tai có được kết nối bằng dây hay không, giúp
        ngăn mất và thuận tiện cho việc tháo ra.
    earplug_shape:
      name: Hình dạng nút tai
      description: Mô tả hình dạng vật lý của nút tai, ảnh hưởng đến sự thoải mái
        và vừa vặn trong các ống tai khác nhau.
    earplug_type:
      name: Loại nút tai
      description: 'Phân loại kiểu cấu tạo của nút tai được phân phối (ví dụ: xốp,
        đúc khuôn, có bộ lọc).'
    earplug_use:
      name: Sử dụng nút tai
      description: Xác định hoạt động hoặc mục đích cụ thể của nút bịt lỗ tai, chẳng
        hạn như bơi lội hoặc ngủ
    earring_design:
      name: Thiết kế hoa tai
      description: Mô tả kiểu dáng hoặc cấu trúc của khuyên tai, chẳng hạn như khuyên
        tai hoặc khuyên tai
    edge_style:
      name: Kiểu cạnh mép
      description: Chỉ định hình dạng của các cạnh trên các vật phẩm như mặt bàn,
        ví dụ như góc tròn, cạnh vuông
    edge_type:
      name: Loại cạnh
      description: Xác định kiểu cạnh trên các dụng cụ hoặc đồ dùng, chẳng hạn như
        răng cưa siêu nhỏ hoặc có khía
    education_level:
      name: Trình độ học vấn
      description: Chỉ định giai đoạn giáo dục mà phần mềm được thiết kế, chẳng hạn
        như tiểu học hoặc sau đại học
    effects_processor_form_factor:
      name: Kiểu dáng bộ xử lý hiệu ứng
      description: Mô tả định dạng vật lý hoặc phân phối của bộ xử lý.
    egg_decorating_items_included:
      name: Bao gồm các vật dụng trang trí trứng
      description: Chỉ định các phụ kiện được cung cấp trong bộ dụng cụ trang trí
        trứng, ví dụ như viên nhuộm, dụng cụ đỡ trứng
    egg_turning:
      name: Ấp trứng
      description: Mô tả phương pháp đảo trứng trong máy ấp, tự động hoặc thủ công
    electric_scooter_motor_type:
      name: Loại động cơ xe máy điện
      description: Chỉ định loại và cấu hình của động cơ xe máy, chẳng hạn như DC
        có chổi than hoặc DC không không chổi than
    electrode_connector_type:
      name: Loại đầu nối điện cực
      description: Mô tả giao diện vật lý được sử dụng để gắn điện cực hoặc miếng
        dán.
    electronic_drum_components:
      name: Linh kiện trống điện tử
      description: Chỉ định các thành phần của bộ trống điện tử, chẳng hạn như mô-đun
        trống hoặc miếng đệm trống
    electronic_game_genre:
      name: Thể loại trò chơi điện tử
      description: Xác định thể loại trò chơi điện tử, chẳng hạn như thể dục hoặc
        câu đố
    electrotherapy_modality:
      name: Phương thức điện trị liệu
      description: 'Xác định các loại công nghệ kích thích mà thiết bị hỗ trợ (ví
        dụ: TENS, EMS, IFC).'
    embellishment/trim_material:
      name: Vật liệu trang trí/viền
      description: Xác định vật liệu được sử dụng cho các chi tiết trang trí hoặc
        hoàn thiện, như sequin hoặc ngọc trai
    embellishments:
      name: Đồ trang trí
      description: Xác định các yếu tố trang trí bổ sung trên sản phẩm, như sequin
        hoặc nút
    embossing_project_type:
      name: Loại dự án dập nổi
      description: Xác định loại dự án dập nổi, chẳng hạn như làm album ảnh hoặc làm
        thiệp
    embouchure_hole_shape:
      name: Hình dạng lỗ thêu
      description: Mô tả hình dạng của lỗ trên khớp đầu sáo, chẳng hạn như hình tròn
        hoặc hình bầu dục
    emergency/safety_sign_design:
      name: Thiết kế biển báo khẩn cấp/an toàn
      description: Xác định loại thông báo an toàn hoặc khẩn cấp trên biển báo, chẳng
        hạn như lối thoát hiểm hoặc chó canh
    emergency_items_included:
      name: Bao gồm các vật dụng khẩn cấp
      description: Chỉ định các vật dụng đi kèm trong bộ dụng cụ khẩn cấp, chẳng hạn
        như radio hoặc pin
    enclosure_type:
      name: Kiểu đóng mở
      description: Chỉ định loại vỏ cho máy in 3D, chẳng hạn như khung mở hoặc vỏ
        DIY
    end_design:
      name: Thiết kế đầu
      description: Xác định số lượng đầu chức năng và liệu chúng có thể thay thế hoặc
        hoán đổi được hay không.
    enema_device_type:
      name: Loại thiết bị thụt tháo
      description: Phân loại thiết kế hoặc hệ thống phân phối chính của sản phẩm.
    enema_nozzle_type:
      name: Loại đầu vòi thụt tháo
      description: 'Xác định kiểu hoặc vật liệu của vòi hoặc đầu được cung cấp cùng
        bộ (ví dụ: đầu mỏng, đầu nhi khoa, vòi thép không gỉ).'
    energy_efficiency_class:
      name: Cấp hiệu suất năng lượng
      description: 'Xác định mức hiệu quả năng lượng của sản phẩm, ví dụ: A+++'
    energy_efficiency_class_hdr:
      name: Cấp hiệu suất năng lượng (Hdr)
      description: Chỉ định hiệu quả sử dụng năng lượng của các thiết bị hỗ trợ HDR,
        điển hình là TV; ví dụ như A+++
    energy_efficiency_class_sdr:
      name: Cấp hiệu suất năng lượng (Sdr)
      description: Chỉ định hiệu quả sử dụng năng lượng của các thiết bị hỗ trợ SDR,
        điển hình là TV; ví dụ như A+++
    engine_design:
      name: Thiết kế động cơ
      description: 'Mô tả cấu hình động cơ của xe, ví dụ: 2 kỳ'
    engine_purpose:
      name: Mục đích của động cơ
      description: Xác định mục đích sử dụng của một động cơ nhỏ, chẳng hạn như máy
        cắt cỏ hoặc máy cưa xích
    engine_type:
      name: Loại động cơ
      description: Xác định loại động cơ trong xe hoặc bộ phận, chẳng hạn như động
        cơ điện hoặc động cơ diesel
    engraving:
      name: Điêu khắc
      description: Chi tiết loại hình khắc trên sản phẩm, chẳng hạn như chữ tùy chỉnh
        hoặc khắc logo
    entry_orientation:
      name: Hướng đưa vào
      description: 'Mô tả hướng đưa xu vào cơ chế (ví dụ: trước, trên, bên, dưới).'
    envelope_features:
      name: Tính năng phong bì
      description: Mô tả các đặc điểm đặc biệt của phong bì, chẳng hạn như khóa móc
        cài hoặc có lớp lót
    envelope_seal_design:
      name: Thiết kế tem phong bì
      description: Mô tả thiết kế thẩm mỹ hoặc phong cách của dấu dán phong bì, chẳng
        hạn như hoa hoặc chữ lồng
    equalizer_type:
      name: Loại bộ cân bằng
      description: Phân loại cấu trúc cân bằng hoặc kiểu xử lý được cung cấp bởi thiết
        bị.
    equipment_operation:
      name: Hoạt động thiết bị
      description: Mô tả cách thức hoạt động của một thiết bị y tế, chẳng hạn như
        bằng tay hoặc bằng điện
    era:
      name: Thời kỳ
      description: Được sử dụng để phân loại đồ sưu tầm hoặc đồ cổ theo khoảng thời
        gian của chúng, chẳng hạn như miền Tây hoang dã hoặc Thế chiến thứ hai
    error_correction_type:
      name: Loại sửa lỗi
      description: Cho biết module bộ nhớ có bao gồm khả năng sửa lỗi hay không và
        nếu có, công nghệ ECC hoặc kiểu đệm cụ thể được sử dụng.
    esrb_rating:
      name: Xếp hạng từ Ủy ban Đánh giá Phần mềm Giải trí
      description: Xác định độ tuổi phù hợp của trò chơi điện tử, chẳng hạn như E
        (Tất cả mọi người) hoặc T (Thanh thiếu niên)
    ethernet_cable_category:
      name: Danh mục cáp Ethernet
      description: Cho biết xếp hạng loại TIA/EIA của cáp Ethernet xoắn đôi, xác định
        băng thông và hiệu năng.
    ethernet_lan_interface_type:
      name: Loại giao diện LAN Ethernet
      description: Chỉ định loại kết nối Ethernet mà sản phẩm hỗ trợ, chẳng hạn như
        mạng LAN hoặc kết nối nhanh
    ev_battery_features:
      name: Tính năng của pin EV
      description: Nêu bật các tính năng của pin EV, chẳng hạn như tuổi thọ dài hoặc
        hệ thống quản lý pin thông minh
    ev_battery_type:
      name: Loại pin xe điện
      description: Xác định loại pin được sử dụng trong xe điện, chẳng hạn như pin
        li-ion hoặc axit chì
    ev_connector/adapter_type:
      name: Loại đầu nối/bộ chuyển đổi sạc xe điện
      description: Xác định loại đầu nối hoặc bộ chuyển đổi cho xe điện, như CCS hoặc
        Tesla
    ev_conversion_kit_components:
      name: Các thành phần của bộ chuyển đổi sạc xe điện
      description: Xác định các bộ phận đi kèm trong bộ chuyển đổi EV, như động cơ
        hoặc bộ pin
    evaporation_technology:
      name: Công nghệ bay hơi
      description: Xác định hệ thống bay hơi trong các thiết bị kiểm soát khí hậu,
        chẳng hạn như tự nhiên hoặc siêu âm
    event_type:
      name: Loại sự kiện
      description: Phân loại tính chất của một sự kiện, chẳng hạn như buổi hòa nhạc,
        hội thảo hoặc lễ hội
    exercise_equipment_included:
      name: Bao gồm thiết bị tập thể dục
      description: Xác định các dụng cụ tập thể dục cụ thể có trong một bộ, chẳng
        hạn như thảm tập yoga hoặc tạ
    exercise_equipment_material:
      name: Vật liệu thiết bị tập thể dục
      description: Xác định vật liệu chính được sử dụng trong thiết bị thể dục, như
        thép hoặc cao su
    exercise_machine_board_function:
      name: Chức năng bo mạch máy tập
      description: 'Mô tả chức năng chính hoặc vị trí của bo mạch trong máy (ví dụ:
        điều khiển động cơ, hiển thị).'
    exercise_machine_features:
      name: Tính năng máy tập thể dục
      description: Mô tả các tính năng đặc biệt của thiết bị tập thể dục, như có thể
        điều chỉnh tốc độ hoặc tích hợp màn hình
    exercise_mat_material:
      name: Vật liệu thảm tập
      description: Chỉ định loại vật liệu được sử dụng trong thảm tập thể dục, chẳng
        hạn như PVC hoặc cork
    exfoliating_agent_type:
      name: Loại chất tẩy tế bào chết
      description: Xác định chất mài mòn hoặc chất tẩy tế bào chết hóa học chính được
        sử dụng.
    exfoliation_level:
      name: Mức độ tẩy tế bào chết
      description: Cho biết tác động tẩy tế bào chết của miếng bọt biển nhẹ nhàng
        hay mạnh mẽ.
    exfoliation_method:
      name: Phương pháp tẩy tế bào chết
      description: 'Cho biết liệu và cách sữa rửa mặt tẩy tế bào chết cho da (ví dụ:
        vật lý, hóa học, enzyme).'
    expansion_slots:
      name: Khe cắm mở rộng
      description: 'Chỉ định các khe để thêm phần cứng vào máy tính hoặc máy chủ,
        ví dụ: PCIe, M.2'
    exposure_control:
      name: Kiểm soát phơi sáng
      description: 'Xác định phương pháp điều chỉnh lượng ánh sáng trong ảnh, ví dụ:
        ưu tiên màn trập, ưu tiên khẩu độ'
    extended_saxophone_range:
      name: Phạm vi saxophone mở rộng
      description: Chỉ định phạm vi nốt mở rộng của saxophone, chẳng hạn như phím
        F# cao hoặc phím A thấp
    external_antenna_connector_type:
      name: Loại đầu nối ăng-ten ngoài
      description: Xác định đầu nối vật lý được sử dụng để gắn ăng-ten ngoài.
    external_defibrillator_features:
      name: Tính năng máy khử rung tim bên ngoài
      description: Nêu bật các tính năng chính của máy khử rung tim y tế, chẳng hạn
        như chức năng nhi khoa hoặc ECG trên màn hình
    extinguisher_rating:
      name: Cấp bình chữa cháy
      description: Cho biết xếp hạng của bình chữa cháy, ví dụ Loại A, Loại B
    extinguishing_agent_type:
      name: Loại chất chữa cháy
      description: Chỉ định loại chất chữa cháy trong các sản phẩm an toàn cháy nổ,
        chẳng hạn như nước hoặc bọt
    extraction_method:
      name: Phương pháp chiết xuất
      description: Xác định kỹ thuật được sử dụng để chiết xuất cannabinoid từ nguyên
        liệu cây gai dầu.
    extraction_technology:
      name: Công nghệ hút
      description: Mô tả cơ chế chính mà sản phẩm sử dụng để hút tạp chất.
    extraction_type:
      name: Loại chiết xuất
      description: Chỉ định phương pháp loại bỏ không khí trong các máy hút mùi bếp,
        chẳng hạn như máy hút mùi không có ống dẫn hoặc máy hút mùi có thể chuyển
        đổi
    extractor_items_included:
      name: Dụng cụ lấy mụn đi kèm
      description: Liệt kê các dụng cụ hoặc phụ kiện lấy mụn khác nhau có trong bộ.
    extractor_tip_style:
      name: Kiểu đầu bộ chiết
      description: Xác định thiết kế của phần đầu trên các công cụ chiết xuất, ví
        dụ như muỗng, kim
    eye_care_applicator_type:
      name: Loại dụng cụ bôi chăm sóc mắt
      description: Xác định kiểu dụng cụ bôi hoặc đầu bơm tích hợp được cung cấp với
        sản phẩm điều trị mắt.
    eye_condition_treated:
      name: Tình trạng mắt được điều trị
      description: Cho biết vấn đề mắt chính mà sản phẩm được công thức để giảm bớt
        hoặc điều trị.
    eye_pillow_shape:
      name: Kiểu dáng gối mắt
      description: Xác định hình dạng vật lý của túi chườm mắt, chẳng hạn như đường
        viền hoặc hình chữ nhật
    eye_shadow_effect:
      name: Hiệu ứng của phấn mắt
      description: Xác định tác động trực quan của phấn mắt, ví dụ như màu khói, nhũ
    eye_shadow_palette_size:
      name: Kích thước bảng phấn mắt
      description: Phân loại sản phẩm theo định dạng bảng phổ biến để duyệt nhanh.
    eyebrow_applicator_type:
      name: Loại dụng cụ bôi lông mày
      description: Mô tả dụng cụ bôi hoặc đầu được sử dụng để bôi sản phẩm lông mày.
    eyebrow_enhancer_color:
      name: Màu dưỡng long mày
      description: Chỉ định màu của các sản phẩm tăng cường lông mày, chẳng hạn như
        màu đen hoặc vàng nhạt
    eyebrow_stencil_shape:
      name: Hình dạng khuôn lông mày
      description: Mô tả hình dạng lông mày chính hoặc kiểu vòm cung mà khuôn được
        thiết kế để tạo ra.
    eyelash_applicator_design:
      name: Thiết kế kẹp gắn mi giả
      description: Xác định kiểu của kẹp gắn mi giả, ví dụ như thẳng, cong
    eyelash_curl_type:
      name: Loại độ cong lông mi
