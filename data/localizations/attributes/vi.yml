      name: Kích thước hạt kim tuyến
      description: Phân loại kích thước hạt kim tuyến, ảnh hưởng đến cường độ lấp
        lánh, kết cấu và dễ dàng bôi.
    glitter_shape:
      name: Hình dạng nhũ
      description: Xác định hình dạng của nhũ, như trái tim hoặc ngôi sao
