      name: Độ bền keo
      description: Biểu thị khả năng kết dính của keo, ví dụ mạnh, nhẹ
    glue_viscosity:
      name: Độ nhớt keo
      description: Mô tả độ đặc của keo, ảnh hưởng đến dòng chảy và khả năng kiểm
