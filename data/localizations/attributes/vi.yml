    baby_drink_packaging:
      name: Bao bì đồ uống trẻ em
      description: 'Xác định loại hộp đựng đồ uống trẻ em, ví dụ: thùng carton, chai'
    baby_equipment_safety_features:
      name: Tính năng an toàn của thiết bị trẻ em
