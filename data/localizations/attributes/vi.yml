      name: Độ bền gel
      description: Cho biết độ bền gel của các sản phẩm gelatin, ví dụ như độ bền
        gel cao, độ bền gel thấp
    gemstone_type:
      name: Loại đá quý
      description: Xác định loại đá quý chính được sử dụng trong sản phẩm, dựa trên
        phân loại khoáng chất hoặc vật liệu của đá.
    genre:
