      description: Chỉ định công nghệ của pin mặt trời, chẳng hạn như silicon màng
        mỏng hoặc đơn tinh thể
    solar_panel_connections:
      name: Kết nối bảng điều khiển năng lượng mặt trời
      description: 'Chỉ định đầu nối được sử dụng với các tấm pin mặt trời, ví dụ:
        kẹp cá sấu hoặc đầu nối DC'
    solar_panel_design:
      name: Thiết kế tấm pin mặt trời
      description: Mô tả phong cách lắp đặt các tấm pin mặt trời, như lắp đặt tự do
        hoặc gắn trên mái nhà
    solder/flux_application:
      name: Ứng dụng hàn/luồng
