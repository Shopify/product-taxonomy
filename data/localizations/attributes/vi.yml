    signal_technology:
      name: Công nghệ tín hiệu
      description: Xác định công nghệ dữ liệu hoặc không dây chính mà sản phẩm được
        thiết kế để khuếch đại hoặc mở rộng
    signal_types_blocked:
      name: Các loại tín hiệu bị chặn
      description: Liệt kê các tín hiệu điện từ hoặc không dây cụ thể mà sản phẩm
        được thiết kế để chặn hoặc che chắn
    signature_placement:
      name: Vị trí chữ ký
      description: Xác định vị trí của chữ ký trên một bộ sưu tập, chẳng hạn như mặt
