        hoặc trẻ tập đi, như đế chống trượt
    baby/toddler_furniture_features:
      name: Đặc điểm nội thất dành cho trẻ sơ sinh/trẻ tập đi
      description: Xác định các tính năng đặc biệt của đồ đạc cho trẻ nhỏ/trẻ tập
        đi, như điều chỉnh được độ cao hoặc có thể gập lại
    baby/toddler_furniture_items_included:
      name: Bao gồm đồ đạc dành cho trẻ sơ sinh/trẻ tập đi
      description: 'Chỉ định các loại đồ nội thất dành cho trẻ sơ sinh hoặc trẻ mới
        biết đi trong một bộ, ví dụ: ghế ăn, rương đồ chơi'
    baby/toddler_hat_style:
      name: Kiểu mũ trẻ em/trẻ tập đi
      description: Mô tả kiểu mũ dành cho trẻ sơ sinh hoặc trẻ mới biết đi, chẳng
        hạn như mũ xô hoặc mũ che nắng
    baby/toddler_hosiery_style:
      name: Phong cách hàng dệt kim cho trẻ sơ sinh/trẻ tập đi
      description: Mô tả kiểu tất hoặc quần bó dành cho trẻ sơ sinh hoặc trẻ mới biết
