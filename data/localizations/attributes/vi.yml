    slat_material:
      name: Chất liệu thanh
      description: Chỉ định loại vật liệu được sử dụng làm giường hoặc các thanh đồ
        nội thất, chẳng hạn như gỗ hoặc gỗ thông
    slat_pattern:
      name: Mẫu đá đen
      description: Xác định hình dạng trực quan của các thanh gỗ trên các vật dụng
