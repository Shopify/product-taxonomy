      name: Tính năng làm ấm/phân phối khăn lau
      description: Mô tả các tính năng đặc biệt của hộp nhả khăn ướt hoặc máy làm
        ấm khăn ướt, như phù hợp khi du lịch
    wipe_dispenser_features:
      name: Tính năng phân phối khăn lau
      description: Mô tả các đặc điểm đặc biệt của hộp đựng khăn lau, chẳng hạn như
        cơ chế phân phối hoặc đèn chỉ báo LED
    wipe_fragrance:
      name: Bay hương thơm
      description: Xác định mùi thơm của các sản phẩm khăn ướt, chẳng hạn như không
        mùi hoặc hoa oải hương
    wipe_packaging:
      name: Lau bao bì
      description: 'Xác định kiểu hộp đựng hoặc kiểu đóng gói cho khăn ướt, ví dụ:
        gói làm đầy, cỡ tiện dụng'
    wipe_purpose:
      name: Mục đích khăn lau
      description: Xác định mục đích sử dụng hoặc lợi ích chính của khăn lau.
    wipe_warmer_features:
      name: Tính năng làm ấm khăn lau
      description: Chi tiết các tính năng cụ thể của máy làm ấm khăn lau, chẳng hạn
        như khả năng giữ ẩm hoặc thuận tiện khi đi du lịch
    wire/rope_material:
      name: Vật liệu dây/dây thừng
      description: Chỉ định vật liệu được sử dụng trong các sản phẩm dây hoặc dây
        thừng, như đồng hoặc polyester
    wire_thickness:
      name: Độ dày của dây
      description: Chỉ định độ dày của dây, như dày hoặc mảnh
    wireless_charging_standard:
      name: Tiêu chuẩn sạc không dây
      description: Xác định các giao thức sạc cảm ứng mà điện thoại hỗ trợ.
    wireless_multi_room_platform:
      name: Nền tảng đa phòng không dây
      description: Xác định hệ sinh thái độc quyền hoặc của bên thứ ba được sử dụng
        để phát trực tuyến âm thanh đa phòng.
    wireless_streaming_protocols_supported:
      name: Giao thức phát trực tuyến không dây được hỗ trợ
      description: Xác định các tiêu chuẩn hoặc dịch vụ phát trực tuyến không dây
        mà stereo có thể nhận nguyên bản.
    wood_finish:
      name: Lớp hoàn thiện gỗ
      description: 'Mô tả phương pháp hoàn thiện hoặc chế tạo được áp dụng cho các
        sản phẩm gỗ (ví dụ: gỗ nguyên khối, gỗ dán, gỗ kỹ thuật, gỗ tẩm dầu, gỗ sơn
        mài, gỗ sơn)'
    woodwind_care_items_included:
      name: Bao gồm các thiết bị chăm sóc nhạc cụ hơi
      description: Xác định các vật dụng chăm sóc đi kèm với nhạc cụ hơi bằng gỗ,
        chẳng hạn như bàn chải làm sạch hoặc mỡ bần
    work_capacity:
      name: Năng lực công việc
      description: Mô tả mức độ hoạt động của sản phẩm, chẳng hạn như tải nặng hoặc
        tải nhẹ
    wreath_design:
      name: Thiết kế vòng hoa
      description: Xác định vật liệu chính hoặc hình dạng của vòng hoa, chẳng hạn
        như kim loại hoặc vòng
    wrist_rest_features:
      name: Tính năng kê cổ tay
      description: Liệt kê các đặc điểm chức năng hoặc thiết kế đặc biệt giúp làm
        tăng giá trị
    wrist_rest_type:
      name: Loại kê cổ tay
      description: 'Xác định cặp thiết bị dự định hoặc cấu hình bộ kê tay (ví dụ:
        chỉ bàn phím, chỉ chuột, bộ kết hợp)'
    xlr_pin_count:
      name: Số chân cắm XLR
      description: Chỉ ra cấu hình chân cắm cụ thể (số chân cắm) của đầu nối XLR
    yacht_type:
      name: Loại du thuyền
      description: Phân loại các loại du thuyền như thuyền gắn máy hoặc du thuyền
        thám hiểm
    yarn_weight_category:
      name: Loại trọng lượng sợi
      description: Xác định độ dày của sợi, như siêu dày hoặc thủ công
    zipper_pull_style:
      name: Kiểu dây kéo
      description: Mô tả thiết kế hoặc lớp hoàn thiện trên chân may khóa kéo, chẳng
        hạn như có họa tiết hoặc dập nổi
    zoom_type:
      name: Loại thu phóng
      description: Chỉ định loại chức năng thu phóng trong máy ảnh tài liệu, chẳng
        hạn như kỹ thuật số hoặc quang học
    air_fryer_accessory_type:
      name: Loại phụ kiện nồi chiên không dầu
      description: Xác định loại phụ kiện cụ thể đang được bán.
    air_purifier_filter_technology:
      name: Công nghệ bộ lọc máy lọc không khí
      description: Xác định phương pháp lọc hoặc làm sạch chính được thiết bị sử dụng.
    air_purifier_filtration_rating:
      name: Chỉ số hiệu suất lọc của máy lọc không khí
      description: Cho biết cấp độ hiệu suất được chứng nhận của vật liệu lọc.
    animal_care_set_components_included:
      name: Thành phần của bộ dụng cụ chăm sóc thú cưng
      description: Liệt kê các phụ kiện hoặc dụng cụ vệ sinh/chải chuốt đi kèm trong
        bộ sản phẩm để người mua sắm biết chính xác họ sẽ nhận được những gì.
    apron_features:
      name: Đặc điểm của tạp dề
      description: Làm nổi bật các tính năng chức năng đặc biệt của chiếc tạp dề.
    apron_style:
      name: Kiểu dáng tạp dề
      description: Xác định kiểu dáng hoặc cấu trúc tổng thể của chiếc tạp dề.
    aquatic_plant_growth_habit:
      name: Tập tính sinh trưởng của cây thủy sinh
      description: Phân loại các loại cây thủy sinh dựa trên vị trí thông thường và
        cách thức phát triển của chúng trong môi trường nước.
    arbor_top_design:
      name: Thiết kế mái vòm cổng
      description: Mô tả cụ thể hình dáng hoặc phong cách phần đỉnh của vòm cổng,
        giúp khách hàng lựa chọn phù hợp với sở thích kiến trúc.
    ashtray_type:
      name: Loại gạt tàn
      description: Phân loại gạt tàn dựa trên mục đích sử dụng chính hoặc ngữ cảnh
        sử dụng.
    attractant_type:
      name: Loại chất dẫn dụ
      description: Mô tả cụ thể cơ chế dẫn dụ được tích hợp vào keo, nếu có, giúp
        khách hàng lựa chọn loại bẫy hiệu quả nhất cho tình huống của họ.
    awning_operation_type:
      name: Loại hình vận hành mái hiên
      description: Mô tả cơ chế dùng để kéo dài và thu gọn mái hiên.
    bag_clip_style:
      name: Kiểu kẹp túi
      description: Mô tả kiểu dáng cơ học của cơ chế đóng kẹp.
    bag_configuration:
      name: Cấu hình túi
      description: Mô tả số lượng và kiểu dáng của các loại túi đi kèm trong hệ thống
        thu gom cỏ.
    bag_insulation:
      name: Khả năng cách nhiệt của túi
      description: Cho biết liệu túi đựng rượu có khả năng cách nhiệt hay không để
        giúp duy trì nhiệt độ của chai.
    baking_liner_size:
      name: Kích cỡ lớp lót khuôn nướng
      description: Quy ước kích thước theo danh mục được thợ làm bánh sử dụng để mô
        tả dung tích lớp lót so với kích thước bánh cupcake tiêu chuẩn.
    baking_sheet_style:
      name: Kiểu khay nướng
      description: Xác định kiểu dáng cấu tạo của khay nướng, chẳng hạn như có vành
        hay có lỗ.
    ballast_material:
      name: Vật liệu dằn
      description: Liệt kê các vật liệu có thể dùng để làm vật dằn (đổ đầy) cho tang
        trống của con lăn, giúp người mua chọn mẫu mã phù hợp với loại vật liệu làm
        đầy mà họ ưu tiên.
    base_features:
      name: Đặc điểm chân đế
      description: Làm nổi bật các đặc tính về độ ổn định hoặc độ bám của chân đế,
        hỗ trợ người dùng cần chức năng chống trượt hoặc hít cố định trên bề mặt làm
        việc.
    baster_tip_type:
      name: Loại đầu dụng cụ phết
      description: Phân loại kiểu đầu hoặc phụ kiện trên dụng cụ phết thực phẩm, cho
        phép người mua lọc giữa các loại ống phết bóng cao su tiêu chuẩn, kim tiêm
        gia vị và đầu bàn chải.
    bathroom_accessories_included:
      name: Phụ kiện phòng tắm đi kèm
      description: Liệt kê các mặt hàng cụ thể có trong bộ phụ kiện nhà tắm để người
        mua biết chính xác những món đồ nào được bao gồm.
    bathroom_accessory_compatibility:
      name: Khả năng tương thích của phụ kiện phòng tắm
      description: Cho biết giá đỡ này được thiết kế để giữ phụ kiện hoặc thiết bị
        phòng tắm nào.
    battery_backup_support:
      name: Hỗ trợ pin dự phòng
      description: Cho biết liệu pin dự phòng khẩn cấp được bao gồm, tùy chọn, hay
        không được hỗ trợ.
    bedskirt_corner_style:
      name: Kiểu góc ga phủ giường
      description: Mô tả rõ cách hoàn thiện các góc của ga phủ giường, ảnh hưởng đến
        độ vừa vặn trên các loại giường có tấm ván chân giường hoặc cột giường.
    bedskirt_style:
      name: Kiểu ga phủ giường
      description: Xác định cấu trúc và thiết kế hình ảnh của ga phủ giường, giúp
        người mua lựa chọn giữa các kiểu dáng như xếp nếp hoặc may đo vừa vặn.
    beer_glass_type:
      name: Loại ly bia
      description: 'Xác định kiểu dáng hoặc hình dạng cụ thể của ly bia, giúp người
        mua tìm thấy loại vật dụng lý tưởng cho loại bia yêu thích của họ (ví dụ:
        ly pint, pilsner, weizen).'
    belt_profile:
      name: Hình dạng dây đai
      description: Xác định mặt cắt ngang hoặc kiểu dáng của dây đai để đảm bảo độ
        vừa vặn phù hợp với thiết kế của ròng rọc.
    beverage_tub_features:
      name: Đặc điểm của thùng đựng đồ uống
      description: Làm nổi bật các tính năng thiết kế đáng chú ý hoặc các thành phần
        đi kèm nhằm tăng thêm chức năng hoặc sự tiện lợi cho thùng đựng đồ uống.
    blade_construction_method:
      name: Phương pháp chế tạo lưỡi dao
      description: Chỉ rõ cách thức chế tạo lưỡi dao.
    blade_finish:
      name: Lớp hoàn thiện lưỡi dao
      description: Lớp xử lý bề mặt hoặc lớp hoàn thiện mang tính thẩm mỹ được áp
        dụng cho phần lưỡi.
    blade_shape:
      name: Hình dạng lưỡi dao
      description: Mô tả hình dạng hình học hoặc biên dạng của lưỡi xẻng.
    blade_sidedness:
      name: Kiểu lưỡi cắt
      description: Cho biết lưỡi máy cắt tỉa hàng rào có răng cắt ở một bên hay cả
        hai bên.
    bleach_formulation:
      name: Công thức thuốc tẩy
      description: 'Cho biết thành phần hóa học cơ bản của sản phẩm thuốc tẩy (ví
        dụ: gốc clo hoặc oxy).'
    bleach_type:
      name: Loại thuốc tẩy
      description: Nêu rõ sự hiện diện và loại chất tẩy trắng hoặc làm trắng được
        sử dụng trong sản phẩm tẩy vết bẩn.
    blender_jar_material:
      name: Vật liệu cối máy xay
      description: Nêu rõ vật liệu được sử dụng để làm bình chứa/cối xay chính của
        máy xay.
    blooming_season:
      name: Mùa nở hoa
      description: Cho biết các mùa mà cây thường ra hoa.
    booster_pump_requirement:
      name: Yêu cầu bơm tăng áp
      description: Làm rõ liệu có cần một máy bơm tăng áp riêng biệt để thiết bị vệ
        sinh hồ bơi hoạt động hay không.
    bore_type:
      name: Loại lỗ khoan
      description: Xác định kiểu lỗ khoan hoặc giao diện được sử dụng để gắn ròng
        rọc vào trục.
    bottle_cap_gasket_material:
      name: Vật liệu gioăng nắp chai
      description: Xác định chất liệu của gioăng làm kín tiếp xúc với miệng chai.
    bottle_cap_liner_type:
      name: Loại lót nắp chai
      description: Mô tả cụ thể loại hoặc vật liệu của lớp lót niêm phong bên trong
        nắp chai, ảnh hưởng đến khả năng chống rò rỉ và khả năng tương thích với sản
        phẩm.
    bottle_fill_state:
      name: Tình trạng đóng chai
      description: Cho biết chai được bán ở dạng rỗng hay đã được đổ đầy nước uống.
    bottle_stopper_mechanism:
      name: Cơ chế nút chai
      description: Xác định cơ chế hoặc kiểu dáng niêm phong được sử dụng bởi nút
        chặn hoặc dụng cụ bảo quản.
    bowl_type:
      name: Kiểu bát (chén)
      description: Phân loại mục đích sử dụng chính hoặc kiểu dáng của chiếc bát.
    bread_storage_ventilation:
      name: Thông gió bảo quản bánh mì
      description: Mô tả việc hộp đựng có cho phép không khí lưu thông để giữ bánh
        mì tươi ngon hay không và bằng cách nào.
    brew_strength_options:
      name: Tùy chọn độ đậm khi pha
      description: Liệt kê các mức độ đậm nhạt có thể lựa chọn nhằm điều chỉnh thời
        gian chiết xuất hoặc dòng chảy để tạo ra cà phê nhẹ hơn hoặc đậm đà hơn.
    bridge_railing_style:
      name: Kiểu lan can cầu
      description: Mô tả sự hiện diện và kiểu dáng của lan can trên cầu, ảnh hưởng
        đến độ an toàn và diện mạo.
    briquette_ignition_type:
      name: Loại mồi lửa than bánh
      description: Cho biết liệu than bánh có bao gồm các chất hỗ trợ mồi lửa hay
        là loại tiêu chuẩn, giúp người dùng hiểu về sự tiện lợi khi nhóm lửa.
    bristle_stiffness:
      name: Độ cứng của lông bàn chải
      description: Cho biết độ cứng của lông bàn chải, ảnh hưởng đến khả năng cọ rửa
        và mức độ phù hợp cho các loại bề mặt hoàn thiện bồn cầu khác nhau.
    bristle_tip_type:
      name: Loại đầu lông chải
      description: Cho biết các đầu lông bàn chải có được chẻ ngọn (tạo xơ) để thu
        gom bụi mịn tốt hơn hay không được chẻ ngọn để quét các mảnh rác lớn, nặng.
    bucket_features:
      name: Tính năng của xô
      description: Làm nổi bật các tính năng đặc biệt hoặc những cải tiến về chức
        năng của xô để người mua có thể nhanh chóng tìm thấy sản phẩm có các tiện
        ích cần thiết.
    bulb_finish:
      name: Lớp hoàn thiện bóng đèn
      description: Mô tả lớp phủ bên ngoài hoặc lớp hoàn thiện của vỏ thủy tinh bóng
        đèn, yếu tố ảnh hưởng đến độ khuếch tán ánh sáng và phong cách.
    burner_shape:
      name: Hình dạng đầu đốt
      description: Mô tả thiết kế hình học của đầu đốt vỉ nướng, xác định độ vừa vặn
        và sự phân bổ nhiệt bên trong vỉ nướng.
    burr_shape:
      name: Hình dạng lưỡi nghiền
      description: Chỉ rõ hình dạng hình học của lưỡi nghiền trong máy xay cà phê,
        yếu tố ảnh hưởng đến độ đồng đều của bột xay và lượng nhiệt sinh ra.
    butterfly_feeder_food_type:
      name: Loại thức ăn cho máng ăn bướm
      description: Xác định loại thức ăn hoặc chất dẫn dụ mà máng ăn được thiết kế
        để chứa.
    cabinet_light_fixture_style:
      name: Kiểu dáng đèn tủ
      description: Mô tả kiểu dáng hoặc hình thức vật lý của đèn tủ.
    candle_container_material:
      name: Chất liệu cốc/ly đựng nến
      description: Xác định chất liệu của hũ hoặc hộp đựng nến (đối với nến hũ/nến
        thiếc).
    canner_type:
      name: Loại nồi đóng hộp
      description: Mô tả phương pháp hoặc kiểu đóng hộp mà máy đóng hộp được thiết
        kế.
    canopy_shape:
      name: Hình dạng mái che
      description: Chỉ rõ hình dạng hình học của mái che khi mở ra.
    canopy_venting:
      name: Hệ thống thông gió của mái che
      description: Cho biết cấu hình thông gió của mái che, yếu tố ảnh hưởng đến khả
        năng cản gió và tản nhiệt.
    car_cleaning_kit_items_included:
      name: Các món đồ trong bộ dụng cụ vệ sinh xe hơi đi kèm
      description: Liệt kê các công cụ và phụ kiện cụ thể được cung cấp trong bộ dụng
        cụ để người mua biết chính xác họ sẽ nhận được gì và có thể so sánh giữa các
        gói sản phẩm.
    carbonation_level_adjustment:
      name: Điều chỉnh mức độ cacbonat hóa
      description: Cho biết máy làm soda cung cấp mức độ cacbonat hóa cố định hay
        có thể điều chỉnh.
    catalytic_combustor_type:
      name: Loại buồng đốt xúc tác
      description: Cho biết bếp sử dụng hệ thống đốt xúc tác, không xúc tác hay hệ
        thống đốt hỗn hợp, điều này ảnh hưởng đến hiệu suất và lượng khí thải.
    ceiling_light_fixture_style:
      name: Kiểu dáng đèn trần
      description: Xác định kiểu dáng cấu trúc hoặc cấu hình chính của bộ đèn trần.
    center_hole_shape:
      name: Hình dạng lỗ trung tâm
      description: Mô tả hình dạng hình học của lỗ gắn/lỗ trung tâm của lưỡi cắt,
        giúp xác định khả năng tương thích với các trục máy cắt cỏ cụ thể.
    chainsaw_bar_mount_type:
      name: Loại ngàm gắn lam máy cưa
      description: Chỉ định kiểu lỗ gắn hoặc dạng rãnh của lam máy cưa để đảm bảo
        nó vừa khớp với đầu máy của cưa.
    chainsaw_bar_nose_type:
      name: Loại đầu thanh hướng dẫn cưa xích
      description: Xác định kiểu đầu lam, ảnh hưởng đến hiệu suất cắt và việc bảo
        trì.
    chainsaw_bar_type:
      name: Loại thanh hướng dẫn cưa xích
      description: Phân loại cấu tạo hoặc mục đích của lam.
    chainsaw_cutter_type:
      name: Loại răng cưa máy cưa
      description: Xác định biên dạng hoặc thiết kế răng của xích, ảnh hưởng đến tốc
        độ cắt, độ bền và đặc tính chống văng ngược.
    champagne_glass_type:
      name: Loại ly sâm panh
      description: Mô tả rõ thiết kế cụ thể của ly sâm panh, giúp người mua phân biệt
        các hình dáng được tối ưu hóa cho những trải nghiệm thưởng thức khác nhau.
    chandelier_shape:
      name: Hình dạng đèn chùm
      description: Xác định hình dạng cấu trúc tổng thể của đèn chùm.
    charcoal_chimney_features:
      name: Đặc điểm ống mồi than
      description: Liệt kê các đặc điểm chức năng đáng chú ý của ống mồi than.
    charcoal_ignition_type:
      name: Loại mồi than
      description: Cho biết liệu than đã được xử lý hoặc thiết kế kỹ thuật để giúp
        nhóm lửa dễ dàng hơn hoặc cháy sạch hơn không.
    chopstick_style:
      name: Kiểu dáng đũa
      description: Nêu rõ phong cách vùng miền hoặc văn hóa của đôi đũa, điều này
        có thể ảnh hưởng đến chiều dài, hình dáng và hoa văn trang trí.
    chopstick_trainer_design:
      name: Thiết kế bộ tập dùng đũa
      description: Mô tả thiết kế cơ học hoặc phương pháp hỗ trợ mà bộ tập dùng đũa
        sử dụng.
    cigar_cutter_type:
      name: Loại dụng cụ cắt xì gà
      description: Xác định cơ chế cắt hoặc kiểu dáng được sử dụng để loại bỏ đầu
        xì gà.
    cigar_punch_type:
      name: Loại đục xì gà
      description: Xác định cơ chế hoặc kiểu dáng của dụng cụ đục xì gà.
    clay_pot_material:
      name: Vật liệu làm nồi đất sét
      description: Xác định thành phần đất sét hoặc kiểu dáng được sử dụng trong nồi,
        chẳng hạn như đồ gốm đất nung hoặc đồ sành.
    cleaner_concentration:
      name: Nồng độ chất tẩy rửa
      description: Cho biết chất tẩy rửa được bán dưới dạng dung dịch sẵn sàng sử
        dụng hay dạng đậm đặc cần pha loãng trước khi sử dụng.
    cleaning_cloth_features:
      name: Đặc điểm khăn lau
      description: Làm nổi bật các đặc tính hiệu suất đặc biệt của các loại khăn lau.
    cleaning_solution_concentration:
      name: Nồng độ dung dịch tẩy rửa
      description: Cho biết sản phẩm được bán ở dạng sẵn sàng sử dụng, dạng đậm đặc,
        hay ở các dạng pha loãng khác.
    clock_chime_melody:
      name: Giai điệu chuông đồng hồ
      description: Chỉ định giai điệu hoặc kiểu đánh chuông mà đồng hồ phát ra vào
        mỗi giờ hoặc mỗi 15 phút.
    clock_display_type:
      name: Loại hiển thị đồng hồ
      description: Chỉ định cách hiển thị thời gian, hữu ích cho khách hàng thích
        kiểu hiển thị kỹ thuật số, kim, số lật, v.v.
    clock_hand_mounting_type:
      name: Kiểu gắn kim đồng hồ
      description: Xác định kiểu giao diện được sử dụng để gắn kim đồng hồ vào bộ
        máy.
    clock_hand_style:
      name: Kiểu dáng kim đồng hồ
      description: Xác định thiết kế hình ảnh của các kim đồng hồ, giúp người mua
        tìm được loại kim phù hợp với thẩm mỹ của đồng hồ.
    clock_movement_type:
      name: Loại bộ máy đồng hồ
      description: Xác định cơ chế giữ thời gian bên trong của đồng hồ.
    clothespin_type:
      name: Loại kẹp quần áo
      description: Xác định thiết kế/kiểu dáng cấu trúc của kẹp quần áo.
    co2_cylinder_compatibility:
      name: Khả năng tương thích của bình khí CO2
      description: Xác định loại hoặc kích thước bình khí CO2 mà máy làm soda chấp
        nhận, đảm bảo người mua có thể tìm được ống nạp phù hợp.
    co2_supplementation_requirement:
      name: Yêu cầu bổ sung CO2
      description: Cho biết mức độ bổ sung khí carbon dioxide cần thiết để thực vật
        trong bể thủy sinh phát triển tối ưu.
    coaster_features:
      name: Đặc điểm của miếng lót ly
      description: Xác định các đặc tính độc đáo của đế lót ly, chẳng hạn như khả
        năng thấm hút hoặc đế chống trượt.
    cocktail_strainer_type:
      name: Loại rây lọc cocktail
      description: Chỉ định thiết kế của rây lọc cocktail, điều này ảnh hưởng đến
        khả năng tương thích với bình lắc và phong cách sử dụng.
    code_technology:
      name: Công nghệ mã
      description: Xác định mã hoặc công nghệ bảo mật mà bộ điều khiển từ xa sử dụng
        để giao tiếp với thiết bị mở cửa gara.
    coffee_decanter_warmer_features:
      name: Đặc điểm đế hâm bình cà phê
      description: Làm nổi bật các tính năng an toàn hoặc chức năng đáng chú ý dành
        riêng cho đế hâm bình cà phê.
    coffee_filter_basket_size:
      name: Kích thước giỏ lọc cà phê
      description: Xác định ký hiệu kích thước tiêu chuẩn mà giỏ lọc hỗ trợ, đảm bảo
        khả năng tương thích với bộ lọc và máy.
    coffee_filter_shape:
      name: Hình dạng bộ lọc cà phê
      description: Nêu rõ hình dạng hình học của bộ lọc cà phê để đảm bảo khả năng
        tương thích với các loại máy pha cà phê khác nhau.
    coffee_filter_type:
      name: Loại bộ lọc cà phê
      description: Nêu rõ kiểu bộ lọc mà máy pha cà phê nhỏ giọt chấp nhận hoặc đi
        kèm, điều này có thể ảnh hưởng đến hương vị và chi phí tiêu hao liên tục.
    coffee_grinder_accessory_type:
      name: Loại phụ kiện máy xay cà phê
      description: Phân loại loại phụ kiện cụ thể để hỗ trợ việc lọc và tìm kiếm.
    colander_style:
      name: Kiểu dáng rổ lọc
      description: Phân loại thiết kế cấu trúc của rổ lọc, chẳng hạn như dạng bát
        có chân hoặc loại đặt trên bồn rửa.
    compatible_air_conditioner_type:
      name: Loại máy điều hòa không khí tương thích
      description: Xác định kiểu máy điều hòa mà phụ kiện đó được thiết kế để hoạt
        động cùng.
    compatible_awning_rail_type:
      name: Loại thanh ray mái hiên tương thích
      description: Nêu rõ loại thanh ray hoặc hệ thống ống của mái hiên mà kẹp treo
        được thiết kế để phù hợp.
    compatible_beverage_type:
      name: Loại đồ uống tương thích
      description: Nêu rõ loại đồ uống mà nút đậy hoặc dụng cụ bảo quản được thiết
        kế để bảo quản.
    compatible_can_size:
      name: Kích thước lon tương thích
      description: Liệt kê các kích thước lon đồ uống mà máy nghiền có thể đáp ứng.
    compatible_cigarette_size:
      name: Kích thước thuốc lá tương thích
      description: Liệt kê các chiều dài hoặc kích thước thuốc lá tiêu chuẩn phù hợp
        với hộp đựng.
    compatible_coffee_capsule_system:
      name: Hệ thống viên nén cà phê tương thích
      description: Nêu rõ hệ thống viên nén hoặc túi lọc mà bộ chuyển đổi được thiết
        kế để đáp ứng, đảm bảo người mua chọn được bộ chuyển đổi phù hợp với định
        dạng cà phê ưa thích của họ.
    compatible_coffee_maker_type:
      name: Loại máy pha cà phê tương thích
      description: Cho biết kiểu máy pha cà phê hoặc máy pha espresso mà phụ kiện
        được thiết kế dành cho.
    compatible_cooking_thermometer_type:
      name: Loại nhiệt kế nấu ăn tương thích
      description: Nêu rõ các loại nhiệt kế nấu ăn mà công cụ hiệu chuẩn này được
        thiết kế để điều chỉnh hoặc kiểm chứng.
    compatible_coupler_size:
      name: Kích thước đầu nối tương thích
      description: Nêu rõ kích cỡ đầu nối mà túi bắt kem có thể vừa vặn mà không cần
        cắt tỉa.
    compatible_dehumidifier_technology:
      name: Công nghệ máy hút ẩm tương thích
      description: Cho biết công nghệ máy hút ẩm mà bộ lọc tương thích, chẳng hạn
        như máy nén hoặc máy hút ẩm bằng chất hút ẩm.
    compatible_feeder_type:
      name: Loại máy cho ăn tương thích
      description: Xác định các kiểu máng ăn mà khay được thiết kế để lắp vừa.
    compatible_footwear_material:
      name: Vật liệu giày dép tương thích
      description: Liệt kê các loại vật liệu giày mà xi đánh bóng hoặc sáp phù hợp
        để sử dụng.
    compatible_fuel_type:
      name: Loại nhiên liệu tương thích
      description: Xác định loại nhiên liệu mà phụ kiện được thiết kế để tương thích,
        đảm bảo sự phù hợp với các thiết bị sưởi ngoài trời chạy bằng khí propane,
        khí thiên nhiên, điện hoặc các loại nhiên liệu khác.
    compatible_garment_steamer_design:
      name: Thiết kế máy bàn ủi hơi nước tương thích
      description: Xác định các kiểu máy bàn ủi hơi nước mà bộ phận giữ dây được thiết
        kế để hoạt động cùng.
    compatible_grill_type:
      name: Loại vỉ nướng tương thích
      description: Xác định các loại vỉ nướng mà phụ kiện dự định sẽ hoạt động cùng.
    compatible_hazardous_waste_type:
      name: Loại chất thải nguy hại tương thích
      description: Xác định loại chất thải nguy hại mà thùng chứa được thiết kế để
        lưu trữ.
    compatible_ironing_board_type:
      name: Loại cầu là (ván ủi) tương thích
      description: Cho biết kiểu bàn để ủi mà bộ phận đó phù hợp, hỗ trợ người mua
        xác định khả năng tương thích.
    compatible_lawn_mower_type:
      name: Loại máy cắt cỏ tương thích
      description: Cho biết kiểu máy cắt cỏ mà bộ dụng cụ tạo sọc được thiết kế để
        lắp vừa.
    compatible_leaf_blower_style:
      name: Kiểu máy thổi lá tương thích
      description: Nêu rõ cấu hình của máy thổi lá mà phụ kiện đó tương thích.
    compatible_mailbox_size:
      name: Kích thước hòm thư tương thích
      description: Cho biết (các) kích thước hòm thư mà phụ kiện được thiết kế để
        lắp vừa, tuân theo các phân loại phổ biến của USPS/ngành.
    compatible_mailbox_type:
      name: Loại hòm thư tương thích
      description: Nêu rõ kiểu hòm thư phù hợp bên trong hoặc đi kèm với vỏ bọc, giúp
        người mua xác nhận độ vừa vặn.
    compatible_napkin_size:
      name: Kích thước khăn ăn tương thích
      description: Nêu rõ kích thước hoặc định dạng khăn ăn mà giá đỡ/hộp đựng được
        thiết kế.
    compatible_outdoor_grill_style:
      name: Kiểu vỉ nướng ngoài trời tương thích
      description: Nêu rõ kiểu vỉ nướng ngoài trời hoặc cấu hình mà tấm bạt che được
        thiết kế.
    compatible_radiator_style:
      name: Kiểu lò sưởi tương thích
      description: Liệt kê các kiểu lò sưởi mà phụ kiện được thiết kế, chẳng hạn như
        lò sưởi bảng, lò sưởi cột, lò sưởi thanh treo khăn hoặc lò sưởi chân tường.
    compatible_refrigerator_compartment:
      name: Ngăn tủ lạnh tương thích
      description: Xác định vị trí trong tủ lạnh mà phụ kiện dự định được sử dụng.
    compatible_stove_fuel_type:
      name: Loại nhiên liệu bếp tương thích
      description: 'Xác định các loại nhiên liệu mà phụ kiện bếp di động tương thích,
        giúp khách hàng lựa chọn phụ kiện phù hợp với bếp của họ (ví dụ: khí đốt đóng
        hộp hoặc cồn).'
    compatible_stove_type:
      name: Loại bếp tương thích
      description: Xác định các loại bếp nấu di động mà đế này được thiết kế để ghép
        nối cùng.
    compatible_tissue_box_type:
      name: Loại hộp đựng khăn giấy tương thích
      description: Xác định kiểu dáng/kích thước hộp khăn giấy mà giá đỡ được thiết
        kế để vừa vặn.
    compatible_tractor_type:
      name: Loại máy kéo tương thích
      description: Chỉ định loại máy kéo mà phụ tùng/phụ kiện đó được thiết kế cho.
    compatible_umbrella_type:
      name: Loại ô (dù) tương thích
      description: Nêu rõ kiểu ô ngoài trời mà tấm bạt che được thiết kế để vừa vặn.
    compatible_washing_machine_type:
      name: Loại máy giặt tương thích
      description: 'Nêu rõ thiết kế máy giặt nào mà chất tẩy rửa phù hợp (ví dụ: cửa
        trước, cửa trên, hiệu suất cao).'
    compatible_waste_container_type:
      name: Loại thùng chứa chất thải tương thích
      description: Chỉ rõ loại thùng rác mà phụ kiện được thiết kế để phù hợp hoặc
        hoạt động cùng.
    compatible_water_cooler_type:
      name: Loại máy làm mát nước tương thích
      description: Cho biết kiểu máy làm mát nước nào mà phụ kiện tương thích, giúp
        khách hàng chọn đúng bộ phận cho thiết bị của họ.
    compatible_water_heater_type:
      name: Loại máy nước nóng tương thích
      description: Nêu rõ loại máy nước nóng mà sản phẩm tương thích.
    compatible_wrap_material:
      name: Chất liệu màng bọc tương thích
      description: Liệt kê các loại màng bọc thực phẩm mà dụng cụ cắt/đựng được thiết
        kế để chứa.
    compost_aerator_design:
      name: Thiết kế máy sục khí phân ủ
      description: Xác định thiết kế cơ học hoặc kiểu dáng của máy sục khí, mô tả
        cách thiết bị đảo trộn phân ủ.
    compost_form:
      name: Dạng phân ủ
      description: Mô tả hình thức vật lý hoặc kiểu đóng gói của sản phẩm phân ủ.
    compost_source_material:
      name: Nguyên liệu nguồn làm phân ủ
      description: Xác định (các) vật liệu hữu cơ chính cấu thành nên phân ủ.
    compression_method:
      name: Phương pháp nén
      description: Cho biết kỹ thuật được sử dụng để đẩy không khí ra ngoài hoặc tiết
        kiệm không gian trong túi.
    cooking_gel_fuel_base:
      name: Gốc nhiên liệu gel nấu ăn
      description: Xác định gốc hóa học chính của nhiên liệu gel, giúp người dùng
        lựa chọn giữa các loại gốc ethanol, methanol, glycol và các công thức nhiên
        liệu khác có sự khác biệt về mùi, nhiệt lượng tỏa ra và khả năng phù hợp sử
        dụng trong nhà/ngoài trời.
    cooking_surface_texture:
      name: Kết cấu bề mặt nấu ăn
      description: Nêu rõ kết cấu của bề mặt nấu ăn, chẳng hạn như phẳng, có gờ hoặc
        đa năng.
    cooking_thermometer_design:
      name: Thiết kế nhiệt kế nấu ăn
      description: 'Xác định kiểu hoạt động của nhiệt kế nấu ăn, ví dụ: Dạng cơ hoặc
        kỹ thuật số.'
    cookware_coating_material:
      name: Chất liệu lớp phủ dụng cụ nấu nướng
      description: Xác định loại lớp phủ nội thất hoặc ngoại thất được áp dụng cho
        dụng cụ nấu nướng, cung cấp thông tin về hiệu suất chống dính, độ bền và các
        yêu cầu bảo quản.
    cookware_coating_type:
      name: Loại lớp phủ dụng cụ nấu ăn
      description: Nêu rõ lớp phủ bên trong hoặc bề mặt của dụng cụ nấu nướng.
    cookware_lid_style:
      name: Kiểu nắp dụng cụ nấu nướng
      description: Mô tả kiểu dáng tổng thể hoặc cấu trúc chức năng của nắp.
    cooler_style:
      name: Kiểu thùng giữ nhiệt
      description: Xác định thiết kế cấu trúc của thùng giữ nhiệt thực phẩm/đồ uống
        di động, giúp người mua lựa chọn giữa thùng cứng, túi mềm, ba lô, v.v.
    corkscrew_accessories_included:
      name: Các phụ kiện đi kèm của đồ khui nút chai
      description: Nêu rõ các thành phần bổ sung được đóng gói cùng với đồ khui nút
        chai.
    corkscrew_hinge_type:
      name: Loại bản lề của đồ khui nút chai
      description: Xác định đồ khui nút chai sử dụng cơ chế đòn bẩy bản lề đơn hay
        bản lề đôi.
    corkscrew_tools_included:
      name: Các dụng cụ đi kèm của đồ khui nút chai
      description: 'Liệt kê các dụng cụ và phụ kiện được đóng gói cùng với đồ khui
        nút chai (ví dụ: dụng cụ cắt giấy bạc, dụng cụ mở nắp chai, lưỡi dao) để người
        mua có thể biết chính xác những gì bao gồm trong bộ sản phẩm.'
    crushing_method:
      name: Phương pháp nghiền
      description: Mô tả cơ chế được sử dụng để nén lon.
    crust_browning_level:
      name: Mức độ nướng vàng lớp vỏ
      description: Xác định các tùy chọn màu sắc/độ đậm nhạt của lớp vỏ có thể lựa
        chọn mà máy làm bánh mì cung cấp.
    cultivar_type:
      name: Loại giống cây trồng
      description: Nêu rõ loại hình lai tạo của giống cây trồng, cho biết đó là giống
        truyền thống, giống lai, giống thụ phấn tự nhiên hay giống biến đổi gen.
    cultivator_type:
      name: Loại máy xới đất
      description: Phân loại thiết kế cấu trúc của máy xới đất, chẳng hạn như loại
        có răng trước hoặc răng sau.
    cup_warmer_features:
      name: Đặc điểm của máy hâm nóng cốc
      description: Làm nổi bật các thiết kế đặc biệt hoặc các tính năng tiện lợi dành
        riêng cho thiết bị hâm nóng cốc.
    curtain_heading_style:
      name: Kiểu may đầu rèm
      description: Xác định kiểu may của cạnh trên/đầu rèm dùng để treo rèm hoặc màn,
        điều này quyết định loại phụ kiện cần thiết và diện mạo tổng thể.
    curtain_lining_type:
      name: Loại lớp lót rèm
      description: Cho biết rèm có được lót hay không và loại lớp lót được sử dụng,
        ảnh hưởng đến khả năng cách nhiệt, sự riêng tư và độ rủ của rèm.
    curtain_rod_type:
      name: Loại thanh treo rèm
      description: Phân loại kiểu dáng cấu trúc của thanh treo, giúp người mua nhanh
        chóng tìm được loại thanh phù hợp với nhu cầu lắp đặt của họ.
    cutting_disc_function:
      name: Chức năng đĩa cắt
      description: Xác định hành động xử lý thực phẩm cụ thể mà đĩa cắt thực hiện.
    cutting_head_type:
      name: Loại đầu cắt
      description: Xác định kiểu của bộ phận cắt được sử dụng bởi phụ kiện đi kèm.
    cutting_mechanism_type:
      name: Loại cơ chế cắt
      description: Mô tả kiểu dao cắt được tích hợp bên trong hộp đựng.
    cylinder_connector_type:
      name: Loại đầu nối xi lanh
      description: Xác định giao diện kết nối hoặc ren của xi lanh, quyết định khả
        năng tương thích với các mẫu máy làm soda cụ thể.
    decorating_bag_features:
      name: Đặc điểm của túi bắt bông kem
      description: Làm nổi bật các thiết kế đặc biệt hoặc tính năng chức năng của
        túi bắt bông kem.
    dehumidifier_refill_form:
      name: Dạng nạp lại của máy hút ẩm
      description: Xác định hình dạng/định dạng vật lý của lõi thay thế để khách hàng
        có thể lựa chọn các kiểu dáng tương thích.
    desiccant_material:
      name: Vật liệu hút ẩm
      description: Chỉ rõ loại chất hút ẩm được sử dụng, quan trọng đối với hiệu suất,
        khả năng tái sử dụng và các yếu tố an toàn.
    dial_finish:
      name: Hoàn thiện mặt số
      description: Mô tả lớp hoàn thiện bề mặt của mặt số, ảnh hưởng đến độ chói và
        phong cách.
    dinnerware_features:
      name: Tính năng đồ dùng ăn uống
      description: Nêu bật các tính năng chức năng đặc biệt của sản phẩm đồ dùng ăn
        uống.
    dish_detergent_features:
      name: Tính năng nước rửa chén
      description: Liệt kê các đặc điểm nổi bật về công thức hoặc tính chất sinh thái
        giúp người mua lọc và so sánh sản phẩm.
    dishwasher_accessory_type:
      name: Loại phụ kiện máy rửa chén
      description: Phân loại loại phụ kiện cụ thể, giúp người mua lọc nhanh.
    dishwasher_wash_programs:
      name: Chương trình rửa của máy rửa chén bát
      description: Liệt kê các chu trình rửa được cài đặt sẵn trên máy rửa chén, cho
        phép khách hàng lọc theo tính đa dụng của chương trình.
    dispensing_mechanism:
      name: Cơ chế phân phối
      description: Mô tả cách thức đồ uống được lấy ra từ bình giữ nhiệt, ảnh hưởng
        đến khả năng sử dụng trong các bối cảnh khác nhau.
    dispensing_temperature_options:
      name: Tùy chọn nhiệt độ lấy nước
      description: Cho biết các mức nhiệt độ mà máy làm mát nước có thể cung cấp.
    displayed_character:
      name: Ký tự được hiển thị
      description: Xác định ký tự chữ và số mà từng mảnh ghép thể hiện.
    diving_board_surface_texture:
      name: Kết cấu bề mặt ván nhảy
      description: Mô tả kết cấu bề mặt trên cùng của ván, ảnh hưởng đến độ bám và
        khả năng chống trơn trượt.
    door_configuration:
      name: Cấu hình cửa
      description: Cho biết bẫy có bao nhiêu cửa ra vào.
    door_hinge_orientation:
      name: Hướng bản lề cửa
      description: Chỉ rõ vị trí bản lề hoặc hướng mở của cửa hoặc nắp tủ đông.
    door_hinge_position:
      name: Vị trí bản lề cửa
      description: Chỉ rõ bản lề nằm ở bên nào của cửa, hoặc liệu có thể đảo chiều
        hay không, ảnh hưởng đến việc lắp đặt và bố trí không gian.
    draft_gas_type:
      name: Loại khí dùng cho vòi rót
      description: Chỉ rõ loại hệ thống khí được sử dụng để rót, quan trọng đối với
        mức độ tạo ga và phong cách đồ uống.
    drainage_design:
      name: Thiết kế hệ thống thoát nước
      description: Cho biết cách khay đựng xà phòng xử lý nước chảy ra để giữ cho
        xà phòng luôn khô ráo.
    drainage_method:
      name: Phương pháp thoát nước
      description: Mô tả cách nước thu gom được xả ra, cho biết có cần đổ thủ công
        hay không.
    drawer_organizer_features:
      name: Đặc điểm của khay sắp xếp ngăn kéo
      description: Nêu bật các tính năng chức năng đáng chú ý của khay chia ngăn kéo.
    drinkware_crystal_composition:
      name: Thành phần pha lê của đồ uống
      description: Xác định công thức thủy tinh/pha lê cụ thể được sử dụng, nêu bật
        hàm lượng chì và đặc tính độ trong suốt.
    drinkware_holder_style:
      name: Kiểu giá /khay đựng ly
      description: Phân loại thiết kế hoặc cấu hình tổng thể của giá đựng ly.
    drinkware_insulation:
      name: Cách nhiệt cho đồ uống
      description: Xác định cấu trúc cách nhiệt của đồ đựng đồ uống, ảnh hưởng đến
        khả năng giữ nhiệt.
    dripper_design:
      name: Thiết kế phễu lọc
      description: Chỉ rõ hình dạng tổng thể của phễu hoặc kiểu thoát nước, ảnh hưởng
        đến đặc tính pha chế.
    drum_grating_styles_included:
      name: Các kiểu trống bào đi kèm
      description: Liệt kê các kiểu trống bào hoặc cắt lát khác nhau có trong bộ để
        người dùng nhanh chóng thấy được các chức năng được cung cấp.
    dryer_drum_material:
      name: Chất liệu lồng sấy
      description: Cho biết vật liệu cấu tạo lồng sấy bên trong, ảnh hưởng đến độ
        bền, tích điện tĩnh và tiếng ồn.
    dryer_sheet_features:
      name: Tính năng giấy thơm máy sấy
      description: Nêu bật các đặc tính hoặc lợi ích đặc biệt của giấy thơm sấy quần
        áo.
    dryer_venting_type:
      name: Loại thông gió máy sấy
      description: Phân loại phương thức thông gió mà máy sấy sử dụng, ảnh hưởng đến
        yêu cầu lắp đặt và hiệu quả năng lượng.
    drying_system:
      name: Hệ thống sấy
      description: Cho biết công nghệ mà máy rửa chén sử dụng để làm khô chén đĩa
        vào cuối chu trình.
    duster_head_material:
      name: Chất liệu đầu chổi phất trần
      description: Chỉ rõ vật liệu của đầu thu gom bụi để xem xét về hiệu suất và
        dị ứng.
    dustpan_type:
      name: Loại hốt rác
      description: Phân loại kiểu dáng/hình dạng tổng thể của hốt rác.
    edge_finish:
      name: Hoàn thiện cạnh
      description: Mô tả kỹ thuật hoàn thiện được sử dụng ở các cạnh của thảm chạy,
        ảnh hưởng đến tính thẩm mỹ và độ bền.
    egg_cooker_functions:
      name: Chức năng của máy luộc trứng
      description: Liệt kê các chế độ nấu được máy luộc trứng hỗ trợ.
    egg_cup_design:
      name: Thiết kế cốc đựng trứng
      description: Chỉ rõ kiểu cấu trúc của cốc đựng trứng, chẳng hạn như có chân
        đế hoặc dạng trụ.
    electric_kettle_features:
      name: Đặc điểm của ấm đun nước điện
      description: Liệt kê các tính năng tiện lợi hoặc an toàn đáng chú ý đi kèm với
        ấm đun nước.
    emergency_blanket_features:
      name: Tính năng chăn chống cháy
      description: Nêu bật các đặc tính chức năng đặc biệt của chăn.
    emergency_lighting_operating_mode:
      name: Chế độ hoạt động của đèn chiếu sáng khẩn cấp
      description: Chỉ rõ cách đèn chiếu sáng khẩn cấp hoạt động trong điều kiện có
        điện bình thường và khi mất điện.
    entrance_slot_design:
      name: Thiết kế khe vào
      description: Mô tả kiểu dáng các khe hở cho phép bướm bay vào nhà.
    espresso_boiler_type:
      name: Loại nồi hơi Espresso
      description: Mô tả cấu hình hệ thống gia nhiệt được sử dụng để pha cà phê và
        tạo hơi nước.
    fabric_care_product_form:
      name: Dạng sản phẩm chăm sóc vải
      description: Chỉ rõ dạng vật lý của sản phẩm chăm sóc vải, chẳng hạn như nước
        xả vải hoặc chất phụ gia cho máy sấy.
    fabric_softener_features:
      name: Đặc điểm của nước xả vải
      description: Nêu bật các đặc tính hoặc lợi ích đặc biệt của nước xả vải.
    fabric_stiffness_level:
      name: Độ cứng của vải
      description: Cho biết mức độ cứng hoặc độ đứng vải do hồ vải tạo ra sau khi
        ủi.
    fabric_weave:
      name: Dệt vải
      description: Cho biết cấu trúc dệt cụ thể của vải, ảnh hưởng đến cảm giác và
        hình thức.
    feeder_design:
      name: Thiết kế máng ăn
      description: Chỉ rõ kiểu cấu trúc của máng ăn.
    fermentation_crock_type:
      name: Loại hũ muối dưa
      description: Xác định thiết kế cơ bản của bình chứa.
    filament_style:
      name: Kiểu dáng dây tóc bóng đèn
      description: Xác định cấu hình dây tóc bên trong, ảnh hưởng đến tính thẩm mỹ
        và sự phân bố ánh sáng.
    film_reusability:
      name: Khả năng tái sử dụng của màng
      description: Cho biết màng được thiết kế để dùng một lần hay có thể tháo ra,
        lưu trữ và dán lại.
    filter_bleaching_method:
      name: Phương pháp tẩy trắng bộ lọc
      description: Xác định trạng thái và quy trình tẩy trắng được sử dụng cho bộ
        lọc, cung cấp thông tin về hương vị và các ưu tiên về tính bền vững.
    filter_technology:
      name: Công nghệ lọc
      description: Xác định công nghệ kiểm soát mùi hoặc lọc được sử dụng.
    fire_alarm_panel_type:
      name: Loại bảng điều khiển báo cháy
      description: Xác định kiến trúc hệ thống của bảng điều khiển.
    fire_protection_class:
      name: Cấp độ phòng cháy
      description: 'Cho biết cấp chứng nhận quy định nhiệt độ tối đa bên trong được
        phép trong quá trình thử nghiệm cháy (ví dụ: UL Class 350).'
    fire_starter_type:
      name: Loại dụng cụ nhóm lửa
      description: Chỉ rõ dạng hoặc cơ chế chính của sản phẩm nhóm lửa, giúp người
        mua tìm đúng kiểu đánh lửa họ cần.
    fireplace_fuel_form:
      name: Dạng nhiên liệu lò sưởi
      description: Chỉ rõ dạng vật lý hoặc cách trình bày của nhiên liệu, cho phép
        người mua lựa chọn giữa củi khúc, viên nén, than bánh, gel đóng hộp và các
        tùy chọn khác phù hợp với thiết bị của họ.
    fireplace_tool_items_included:
      name: Các dụng cụ lò sưởi đi kèm
      description: Liệt kê các công cụ hoặc phụ kiện lò sưởi cụ thể đi kèm để khách
        hàng biết rõ họ nhận được gì và dễ dàng so sánh các gói sản phẩm.
    firewood_seasoning:
      name: Phơi củi
      description: Chỉ số này cho biết trạng thái khô của củi, ảnh hưởng đến độ ẩm
        bên trong phân, độ dễ bắt lửa và hiệu suất tỏa nhiệt.
    flag_attachment_style:
      name: Kiểu gắn cờ
      description: Mô tả cách lá cờ hoặc túi gió được cố định vào cột hoặc điểm lắp
        đặt.
    flame_adjustment:
      name: Điều chỉnh ngọn lửa
      description: Cho biết liệu cường độ ngọn lửa có thể điều chỉnh được hay không
        và điều chỉnh như thế nào.
    flask_insulation_type:
      name: Loại cách nhiệt của bình
      description: Cho biết cấu trúc cách nhiệt của bình, ảnh hưởng đến khả năng giữ
        nhiệt.
    flatware_finish:
      name: Lớp hoàn thiện bộ đồ ăn
      description: Mô tả cách xử lý bề mặt hoặc độ bóng của các vật dụng bộ đồ ăn,
        ảnh hưởng đến tính thẩm mỹ và khả năng lộ vết trầy xước.
    floor_protection_transparency_level:
      name: Mức độ trong suốt của tấm bảo vệ sàn
      description: Cho biết mức độ nhìn xuyên thấu của màng phim hoặc thảm trải sàn,
        từ trong suốt đến đục.
    floor_scrubber_brush_type:
      name: Loại bàn chải chà sàn
      description: Xác định cấu hình bàn chải hoặc miếng đệm chính được máy chà sàn
        sử dụng.
    floor_surface_compatibility:
      name: Khả năng tương thích với bề mặt sàn
      description: Chỉ rõ các loại vật liệu bề mặt sàn mà tấm bảo vệ an toàn và được
        thiết kế để bảo vệ.
    flow_control_type:
      name: Loại kiểm soát dòng chảy
      description: Mô tả liệu vòi phun có bao gồm cơ chế điều chỉnh để thay đổi lượng
        nước đầu ra hay không.
    flue_outlet_position:
      name: Vị trí cửa thoát khói
      description: Chỉ rõ vị trí ống khói thoát ra khỏi thân bếp, ảnh hưởng đến bố
        cục lắp đặt và kết nối ống khói.
    flue_pipe_connection_type:
      name: Loại kết nối ống khói
      description: Mô tả cơ chế khớp nối được sử dụng để kết nối phần mở rộng với
        các thành phần quản lý luồng khói khác.
    fluorescent_tube_output_type:
      name: Loại công suất đầu ra của bóng đèn huỳnh quang
      description: Chỉ rõ phân loại phụ về công suất đầu ra của bóng đèn huỳnh quang,
        điều này quan trọng cho sự tương thích của tăng phô (ballast) và độ sáng.
    fly_swatter_type:
      name: Loại vỉ đập ruồi
      description: Chỉ ra kiểu dáng hoặc cơ chế hoạt động của vỉ đập ruồi.
    foil_duty_rating:
      name: Cấp độ chịu tải của giấy bạc
      description: Phân loại độ bền hoặc cấp độ của lá nhôm cho mục đích sử dụng.
    foliage_color:
      name: Màu sắc lá cây
      description: Chỉ rõ màu sắc chủ đạo của lá cây, hỗ trợ việc lựa chọn cây cảnh
        bên cạnh màu sắc của hoa.
    fondue_pot_type:
      name: Loại nồi lẩu Fondue
      description: Phân loại kiểu làm nóng hoặc mục đích sử dụng dự kiến của bộ nồi
        lẩu fondue.
    fondue_set_pieces_included:
      name: Các thành phần trong bộ lẩu Fondue
      description: Xác định các thành phần có trong một bộ lẩu fondue, chẳng hạn như
        nồi hoặc nĩa.
    food_carrier_insulation_type:
      name: Loại cách nhiệt của hộp đựng thực phẩm
      description: Xác định xem sản phẩm có khả năng cách nhiệt hay không và công
        nghệ cách nhiệt được sử dụng là gì.
    food_dehydrator_surface_type:
      name: Loại bề mặt của máy sấy thực phẩm
      description: Mô tả kiểu bề mặt của các tấm lót/khay, có ảnh hưởng đến luồng
        không khí và khả năng chống dính của thực phẩm.
    food_dehydrator_tray_type:
      name: Loại khay máy sấy khô thực phẩm
      description: Xác định kiểu dáng hoặc thiết kế chức năng cụ thể của khay.
    food_grater_type:
      name: Loại dụng cụ bào thực phẩm
      description: Xác định kiểu dáng cấu trúc của dụng cụ bào.
    food_processor_attachments_included:
      name: Các phụ kiện đi kèm máy chế biến thực phẩm
      description: Liệt kê các loại phụ kiện cụ thể có trong bộ sản phẩm để khách
        hàng biết chính xác họ sẽ có được những chức năng nào khi mua.
    food_storage_bag_features:
      name: Đặc điểm của túi đựng thực phẩm
      description: Nêu bật các đặc tính chức năng đáng chú ý của túi.
    food_storage_bag_type:
      name: Loại túi đựng thực phẩm
      description: Chỉ rõ kiểu dáng chính hoặc phân loại mục đích sử dụng của túi
        đựng thực phẩm.
    food_storage_features:
      name: Đặc điểm bảo quản thực phẩm
      description: Nhấn mạnh các đặc tính đặc biệt giúp tăng thêm tính năng hoặc sự
        tiện lợi cho sản phẩm lưu trữ thực phẩm.
    food_wrap_features:
      name: Đặc điểm của màng bọc thực phẩm
      description: Nêu bật các đặc tính đặc biệt ảnh hưởng đến việc sử dụng và tính
        bền vững.
    footwear_type_compatibility:
      name: Khả năng tương thích với loại giày dép
      description: Xác định loại giày dép mà dụng cụ định hình này hướng tới.
    formulation_concentration:
      name: Nồng độ công thức
      description: Xác định sản phẩm là dạng đậm đặc hay công thức đã pha sẵn để sử
        dụng ngay.
    fountain_design:
      name: Thiết kế đài phun nước
      description: Phân loại kiểu cấu trúc hoặc hình dáng của đài phun nước.
    fragrance_oil_application:
      name: Công dụng của tinh dầu thơm
      description: Chỉ rõ trường hợp sử dụng phổ biến hoặc được khuyến nghị cho loại
        dầu đó, giúp khách hàng tự làm đồ thủ công hoặc có sở thích riêng lựa chọn
        đúng công thức.
    fragrance_oil_composition:
      name: Thành phần tinh dầu thơm
      description: Cho biết công thức là tinh dầu thiên nhiên nguyên chất, dầu thơm
        tổng hợp, hay là sự pha trộn của cả hai.
    fragrance_refill_type:
      name: Loại lõi hương liệu thay thế
      description: Xác định định dạng của lõi hương liệu thay thế mà máy khuếch tán
        chấp nhận.
    freezer_configuration:
      name: Cấu hình tủ đông
      description: Xác định hướng bố trí/kiểu thiết kế vật lý của tủ đông.
    freezing_method:
      name: Phương pháp cấp đông
      description: Chỉ rõ công nghệ được sử dụng để làm đông hỗn hợp trong máy làm
        kem, giúp người mua phân biệt giữa các dòng dùng máy nén, dòng có bát cấp
        đông trước, loại quay tay bằng muối và đá, cùng các thiết kế khác.
    fuel_compatibility:
      name: Khả năng tương thích nhiên liệu
      description: Chỉ rõ các loại nhiên liệu mà vỉ nướng được thiết kế để chứa một
        cách an toàn.
    funnel_type:
      name: Loại phễu
      description: Phân loại phễu dựa trên thiết kế hoặc mục đích sử dụng.
    furnace_configuration:
      name: Cấu hình lò đốt/lò sưởi
      description: Chỉ rõ hướng luồng không khí vật lý của tủ lò sưởi để phục vụ việc
        lắp đặt.
    furniture_anchor_type:
      name: Loại neo giữ nội thất
      description: Chỉ rõ kiểu cấu trúc của bộ dụng cụ neo giữ nội thất, cho biết
        cơ chế hoạt động của nó.
    garage_floor_mat_style:
      name: Kiểu thảm lót sàn gara
      description: Xác định định dạng hoặc kiểu dáng của thảm lót sàn gara.
    garbage_disposal_feed_type:
      name: Loại nạp của máy xử lý rác thải
      description: Xác định cách rác thải thực phẩm được đưa vào máy xử lý — nạp liên
        tục khi đang chạy hoặc nạp theo từng mẻ riêng biệt.
    garbage_disposal_stopper_style:
      name: Kiểu nút chặn máy xử lý rác
      description: Cho biết kiểu dáng chức năng của nút chặn.
    garden_hose_design:
      name: Thiết kế vòi tưới vườn
      description: Xác định kiểu cấu trúc của vòi, điều này quyết định mục đích sử
        dụng và đặc tính xử lý/cầm nắm.
    garden_hose_fitting_type:
      name: Loại đầu nối vòi tưới vườn
      description: Xác định kiểu dáng hoặc chức năng của đầu nối vòi tưới vườn, chẳng
        hạn như bộ chuyển đổi hoặc bộ chia chữ Y, để hỗ trợ việc tìm kiếm và lọc sản
        phẩm.
    gardening_fork_type:
      name: Loại xẻng làm vườn
      description: Phân loại kiểu dáng cụ thể hoặc mục đích sử dụng của nĩa.
    garland_style:
      name: Kiểu dây hoa trang trí
      description: Phân loại kiểu dáng hoặc phong cách trang trí của dây hoa.
    gas_type:
      name: Loại khí
      description: Xác định loại khí nén có trong bình nạp khí.
    gasket_profile_type:
      name: Loại cấu hình gioăng
      description: Chỉ rõ cấu hình tiêu chuẩn công nghiệp hoặc kiểu mặt cắt ngang
        của gioăng.
    gazebo_roof_material:
      name: Vật liệu mái che chòi nghỉ
      description: Chỉ rõ vật liệu của các tấm mái hoặc lớp phủ mái cứng của chòi
        nghỉ.
    glass_and_surface_cleaner_features:
      name: Đặc điểm của chất tẩy rửa kính và bề mặt
      description: Nhấn mạnh các đặc tính đặc biệt hoặc lợi ích của chất tẩy rửa kính
        và bề mặt.
    glass_cleaner_features:
      name: Đặc điểm của dung dịch tẩy rửa kính
      description: Nhấn mạnh các đặc tính hiệu suất hoặc công thức đặc thù của chất
        tẩy rửa kính.
    glazing_material:
      name: Vật liệu kính
      description: 'Xác định vật liệu che phủ khu vực ảnh (ví dụ: kính, acrylic, hoặc
        không có).'
    globe_map_content:
      name: Nội dung bản đồ trên quả địa cầu
      description: Mô tả nội dung bản đồ chính được hiển thị trên quả địa cầu.
    glue_trap_design:
      name: Thiết kế bẫy keo
      description: Xác định kiểu dáng hoặc hình dạng vật lý của bẫy, giúp đảm bảo
        tính tương thích với khu vực đặt bẫy và loại sâu bệnh.
    grab_bar_shape:
      name: Hình dáng thanh tay vịn
      description: Xác định thiết kế cấu trúc của thanh vịn, ảnh hưởng đến vị trí
        lắp đặt và kiểu hỗ trợ người dùng.
    grass_discharge_type:
      name: Kiểu xả cỏ
      description: 'Chỉ rõ cách máy cắt cỏ đẩy cỏ vụn ra ngoài (ví dụ: xả bên hông,
        gom túi phía sau).'
    grate_design:
      name: Thiết kế bào
      description: Xác định kiểu dáng cấu trúc của dụng cụ bào.
    grater_design:
      name: Thiết kế dụng cụ bào
      description: Phân loại thiết kế vật lý hoặc cơ chế của một dụng cụ bào hoặc
        dụng cụ nạo vỏ.
    grating_surface_coarseness:
      name: Độ nhám bề mặt bào
      description: Cho biết kích thước/kết cấu của các lỗ cắt hoặc gờ trên bề mặt
        bào.
    grill_grate_material:
      name: Vật liệu vỉ nướng
      description: Chỉ định vật liệu hoặc lớp phủ của vỉ nướng chính.
    grill_thermometer_type:
      name: Loại nhiệt kế nướng
      description: Cho biết thiết kế hoặc công nghệ chính của nhiệt kế nướng, giúp
        người mua sắm nhanh chóng tìm được kiểu dáng phù hợp với thiết bị nướng của
        họ.
    grinding_mechanism_material:
      name: Vật liệu cơ chế xay
      description: Chỉ rõ vật liệu của cơ chế xay bên trong/lưỡi xay trực tiếp nghiền
        nát gia vị.
    grinding_mechanism_type:
      name: Loại cơ chế nghiền
      description: Chỉ rõ cơ chế bên trong chịu trách nhiệm cho quá trình xay hoặc
        nghiền.
    growing_media_buffering:
      name: Xử lý đệm giá thể trồng
      description: Cho biết xơ dừa đã được xử lý đệm để loại bỏ muối thừa hay chưa,
        điều này ảnh hưởng đến việc quản lý dinh dưỡng.
    growing_media_form:
      name: Hình thức giá thể trồng
      description: Chỉ rõ hình thức vật lý của xơ dừa, giúp người trồng hiểu được
        nhu cầu xử lý và cấp nước.
    growing_medium_type:
      name: Loại giá thể trồng
      description: Xác định giá thể cần thiết cho sự nảy mầm và phát triển của hạt
        giống.
    growth_habit:
      name: Đặc tính sinh trưởng
      description: Mô tả hình dáng tổng thể của cây, hỗ trợ khách hàng trong việc
        quyết định khoảng cách trồng và lựa chọn chậu đựng.
    hand_dryer_accessory_type:
      name: Loại phụ kiện máy sấy tay
      description: Xác định loại phụ kiện máy sấy tay cụ thể để người mua có thể nhanh
        chóng hiểu được sản phẩm đó là gì.
    handle_connection_type:
      name: Loại kết nối tay cầm
      description: Chỉ rõ cơ chế được sử dụng để gắn tay cầm vào chổi, cây lau nhà
        hoặc các đầu làm sạch khác nhằm đảm bảo tính tương thích.
    handle_grip_style:
      name: Kiểu tay cầm
      description: Xác định hình dáng hoặc tính công thái học của phần tay cầm của
        nĩa.
    handle_length_adjustability:
      name: Khả năng điều chỉnh độ dài tay cầm
      description: Mô tả việc liệu độ dài tay cầm có thể điều chỉnh được không và
        điều chỉnh như thế nào, cho phép người mua lọc giữa các tùy chọn cố định hoặc
        dạng ống lồng.
    handle_position:
      name: Vị trí tay cầm
      description: Mô tả vị trí hoặc kiểu dáng của tay cầm trên bình tưới, có ảnh
        hưởng đến tính công thái học khi rót và việc lưu trữ.
    handrail_configuration:
      name: Cấu hình tay vịn
      description: Cho biết sản phẩm có bao gồm tay vịn hay không và cách sắp xếp
        của chúng.
    hanging_attachment_type:
      name: Loại móc treo
      description: Chỉ định trang thiết bị hoặc phương pháp cung cấp để treo vật trang
        trí bắt sáng.
    hardiness_zone:
      name: Vùng chịu lạnh
      description: Chỉ định vùng khí hậu USDA (hoặc tương đương) mà cây có thể sinh
        trưởng ngoài trời.
    hazards_detected:
      name: Các mối nguy hiểm được phát hiện
      description: Liệt kê các nguy hiểm cụ thể mà thiết bị này được thiết kế để cảm
        biến/phát hiện.
    heating_stages:
      name: Các giai đoạn gia nhiệt
      description: Chỉ rõ số lượng giai đoạn gia nhiệt hoặc mức độ điều biến mà thiết
        bị hỗ trợ.
    home_alarm_features:
      name: Đặc điểm của hệ thống báo động gia đình
      description: Xác định các chức năng đặc biệt của hệ thống báo động gia đình,
        chẳng hạn như pin dự phòng hoặc giám sát chuyên nghiệp.
    hook_style:
      name: Kiểu dáng móc treo
      description: Phân loại thiết kế/chức năng của móc treo để dễ dàng đối chiếu
        về mặt hình thái và công năng.
    humidifier_features:
      name: Tính năng của máy tạo độ ẩm
      description: Nhấn mạnh các chức năng hoặc tùy chọn bổ sung đáng chú ý giúp phân
        biệt các mẫu máy làm ẩm và hỗ trợ việc lọc sản phẩm.
    humidifier_filter_type:
      name: Loại bộ lọc máy tạo ẩm
      description: Xác định kiểu dáng hoặc cấu tạo của bộ lọc để khách hàng có thể
        chọn đúng loại thay thế phù hợp cho máy làm ẩm của họ.
    humidor_accessory_type:
      name: Loại phụ kiện hộp giữ ẩm xì gà
      description: Phân loại loại phụ kiện cụ thể, cho phép người mua lọc nhanh chóng
        trong danh mục sản phẩm chung.
    hydroponic_nutrient_system:
      name: Hệ thống dinh dưỡng thủy canh
      description: 'Cho biết số lượng thành phần trong hệ thống dinh dưỡng thủy canh
        (ví dụ: loại một thành phần, hai thành phần) cần phải được pha trộn trước
        khi sử dụng.'
    hygrometer_type:
      name: Loại ẩm kế
      description: Xác định kiểu ẩm kế đi kèm với hộp giữ ẩm, nếu có.
    ice_bucket_accessories_included:
      name: Các phụ kiện đi kèm xô đá
      description: Liệt kê các vật dụng quầy bar bổ sung được cung cấp kèm theo xô
        đá.
    ice_bucket_insulation:
      name: Khả năng cách nhiệt của xô đá
      description: Cho biết cấu trúc thành xô hoặc mức độ cách nhiệt của xô đá, điều
        này ảnh hưởng đến thời gian giữ đông của đá.
    ice_cream_maker_accessories_included:
      name: Phụ kiện máy làm kem đi kèm
      description: Xác định các vật dụng bổ sung được đóng gói trong một bộ phụ kiện
        nhiều món để khách hàng biết chính xác những gì họ sẽ nhận được.
    ice_shape:
      name: Hình dáng đá
      description: Mô tả hình dáng của đá mà máy tạo ra, giúp người dùng lựa chọn
        loại máy tạo ra kiểu đá yêu thích của họ.
    incense_holder_style:
      name: Kiểu giá cắm nhang/hương
      description: Xác định thiết kế cấu trúc của giá cắm, giúp người mua lựa chọn
        giữa các định dạng khác nhau về chức năng và thẩm mỹ.
    infuser_type:
      name: Loại lõi lọc
      description: Cho biết sản phẩm có bao gồm lõi lọc trái cây hay trà hay không
        và kiểu dáng của nó.
    inner_pot_coating:
      name: Lớp phủ lòng nồi
      description: Xác định loại lớp phủ bề mặt của lòng nồi, cho biết đặc tính chống
        dính và độ dễ dàng khi vệ sinh.
    insulation_capability:
      name: Khả năng cách nhiệt
      description: Cho biết liệu lớp bọc có cách nhiệt cho đồ uống hay không, và cách
        thức cách nhiệt như thế nào, phân biệt giữa các lớp bọc chỉ mang tính trang
        trí với các lớp bọc có chức năng kiểm soát nhiệt độ.
    insulation_status:
      name: Trạng thái cách điện
      description: Cho biết bình đựng nước có được cách nhiệt để giúp duy trì nhiệt
        độ đồ uống hay không.
    insulation_technology:
      name: Công nghệ cách nhiệt
      description: Xác định cấu trúc cách nhiệt được sử dụng để duy trì nhiệt độ.
    insulation_type:
      name: Loại cách nhiệt
      description: Chỉ rõ liệu thùng đựng đồ uống hoặc máy làm lạnh có được cách nhiệt
        hay không và cách thức cách nhiệt, điều này ảnh hưởng đến khả năng giữ đá
        và kiểm soát sự ngưng tụ hơi nước.
    intended_beverage_type:
      name: Loại đồ uống mục tiêu
      description: Cho biết loại đồ uống chính mà bình chiết được thiết kế hoặc thường
        xuyên được sử dụng cùng.
    internal_membrane_type:
      name: Loại màng ngăn bên trong
      description: Xác định thiết kế ngăn cách bên trong giúp tách biệt nước và không
        khí trong bình chứa.
    iron_cleaner_purpose:
      name: Mục đích của chất tẩy rửa bàn ủi
      description: Chỉ rõ ứng dụng chính được dự định của chất tẩy rửa.
    ironing_board_form_factor:
      name: Kiểu dáng bàn ủi
      description: Phân loại kiểu dáng tổng thể hoặc cách lắp đặt của bàn ủi để hỗ
        trợ người mua tìm đúng loại phù hợp.
    ironing_board_pad_shape:
      name: Kiểu dáng tấm lót bàn ủi
      description: Cho biết hình dáng hoặc cấu dạng tổng thể của tấm lót để đảm bảo
        nó phù hợp với các thiết kế bàn ủi khác nhau.
    jar_shape:
      name: Hình dáng bình
      description: Mô tả hình dáng hình học tổng thể hoặc hình dáng truyền thống của
        bình trang trí.
    juicer_type:
      name: Loại máy ép trái cây
      description: Phân loại cơ chế mà máy ép trái cây sử dụng để chiết xuất nước
        ép.
    key_blade_type:
      name: Loại lưỡi chìa khóa
      description: Phân loại kiểu dáng lưỡi chìa khóa, chẳng hạn như lưỡi phẳng/có
        khía, lưỡi hình ống hoặc lưỡi có rãnh.
    kitchen_layout:
      name: Bố cục nhà bếp
      description: 'Xác định cấu hình tổng thể của nhà bếp đóng sẵn (ví dụ: bếp chữ
        I hoặc bếp chữ L) để giúp người mua tìm thấy các bộ phù hợp với hình dạng
        phòng và sở thích quy trình làm việc của họ.'
    kitchen_linen_items_included:
      name: Các vật dụng vải bếp đi kèm
      description: Liệt kê các thành phần đồ vải nhà bếp cụ thể có trong bộ sản phẩm,
        giúp người mua hiểu chính xác những món đồ họ đang mua.
    label_content_type:
      name: Loại nội dung nhãn
      description: Mô tả bề mặt nhãn là nhãn trắng, được in sẵn theo mẫu, hay được
        định dạng theo cách khác.
    lamp_arm_style:
      name: Kiểu tay đèn
      description: 'Mô tả thiết kế của tay/cổ đèn, điều này ảnh hưởng đến khả năng
        điều chỉnh và vị trí đặt đèn (ví dụ: cổ ngỗng so với tay xoay).'
    lamp_post_base_mounting_type:
      name: Loại đế gắn cột đèn
      description: Chỉ rõ cách phần đế được lắp đặt hoặc cố định xuống đất hoặc bề
        mặt.
    lamp_shade_fitter_type:
      name: Loại đầu nối chao đèn
      description: Xác định cơ chế gắn kết giữa chao đèn và thân đèn, đảm bảo tính
        tương thích mà không cần phải đoán.
    lamp_shade_shape:
      name: Hình dáng chao đèn
      description: Chỉ rõ hình dáng hình học của chao đèn, cho phép khách hàng tìm
        thấy kiểu dáng mong muốn một cách nhanh chóng.
    lamp_shade_translucency:
      name: Độ xuyên sáng của chao đèn
      description: Mô tả lượng ánh sáng đi qua chao đèn, giúp người dùng lựa chọn
        bầu không khí mong muốn.
    lampshade_shape:
      name: Hình dáng chao đèn
      description: Mô tả hình dáng hình học hoặc hình thái của chao đèn.
    laundry_ball_texture:
      name: Kết cấu bóng giặt
      description: Mô tả kiểu bề mặt của bóng giặt, điều này ảnh hưởng đến khả năng
        tác động lên vải và loại bỏ xơ vải.
    laundry_wash_accessory_type:
      name: Loại phụ kiện giặt ủi
      description: Xác định loại túi giặt hoặc khung giặt cụ thể.
    lawn_aerator_type:
      name: Loại máy sục khí cho bãi cỏ
      description: Phân loại máy sục khí cho bãi cỏ dựa trên thiết kế hoạt động cốt
        lõi hoặc hình dạng của chúng.
    lawn_mower_belt_type:
      name: Loại dây curoa máy cắt cỏ
      description: Phân loại thiết kế cấu trúc hoặc biên hình của dây đai.
    lawn_mower_blade_type:
      name: Loại lưỡi máy cắt cỏ
      description: Chỉ rõ thiết kế cắt hoặc nâng của lưỡi máy cắt cỏ và mục đích sử
        dụng.
    lawn_spreader_type:
      name: Máy rải phân bón cỏ
      description: Chỉ rõ kiểu cơ chế hoặc cấu hình của máy rải sân vườn, chẳng hạn
        như rải rộng hoặc rải rơi trực tiếp.
    lawn_tractor_tread_type:
      name: Loại gai lốp xe kéo sân vườn
      description: Mô tả kiểu gai lốp dành cho các bề mặt cụ thể hoặc nhu cầu về độ
        bám đường.
    lid_features:
      name: Đặc điểm của nắp đậy
      description: Nhấn mạnh các yếu tố chức năng đặc biệt của nắp đậy giúp hỗ trợ
        việc nấu nướng hoặc vệ sinh tiện lợi.
    lid_vent_type:
      name: Loại lỗ thông hơi trên nắp
      description: Cho biết liệu nắp có cho phép hơi nước thoát ra ngoài hay không
        và thoát ra bằng cách nào.
    lift_mechanism:
      name: Cơ chế nâng
      description: Cho biết cơ chế vận hành được sử dụng để nâng, hạ hoặc nghiêng
        rèm cửa hay tấm che.
    light_exposure_requirement:
      name: Yêu cầu tiếp xúc ánh sáng
      description: Chỉ rõ mức độ ánh sáng mà hệ sinh thái cần để duy trì sự khỏe mạnh
        mà không làm quá nhiệt hoặc gây căng thẳng cho các sinh vật.
    liner_installation_method:
      name: Phương pháp lắp đặt tấm lót
      description: Mô tả cách tấm lót được giữ cố định trên bề mặt.
    lint_roller_type:
      name: Loại cây lăn bụi
      description: Phân loại cơ chế làm sạch hoặc thiết kế của cây lăn bụi.
    live_trap_design:
      name: Thiết kế bẫy nhân đạo
      description: Phân loại kiểu cấu trúc tổng thể của bẫy.
    lock_keying_option:
      name: Tùy chọn chìa khóa của ổ khóa
      description: Chỉ rõ cách đánh chìa cho ổ khóa, hỗ trợ những người mua cần nhiều
        ổ khóa dùng chung một chìa hoặc mỗi ổ khóa một chìa riêng biệt.
    lubricant_requirement:
      name: Yêu cầu về chất bôi trơn
      description: Chỉ rõ loại chất bôi trơn được khuyến nghị hoặc bắt buộc trong
        quá trình mài.
    lunch_set_items_included:
      name: Các thành phần trong bộ đồ ăn trưa
      description: Liệt kê các thành phần riêng lẻ có trong bộ hộp đựng đồ ăn trưa.
    machete_blade_style:
      name: Kiểu lưỡi dao rựa
      description: Xác định kiểu dáng truyền thống theo vùng miền hoặc kiểu dáng chức
        năng của lưỡi dao rựa.
    map_style:
      name: Kiểu bản đồ
      description: Xác định phong cách bản đồ hoặc trọng tâm chủ đề được hiển thị
        trên quả địa cầu.
    masher_head_design:
      name: Thiết kế đầu dụng cụ nghiền
      description: Phân loại thiết kế của bề mặt nghiền/giã, điều này ảnh hưởng đến
        kết cấu thực phẩm và công sức cần thiết.
    mattress_protector_features:
      name: Đặc điểm của tấm bảo vệ nệm
      description: Nhấn mạnh các đặc tính chức năng hoặc bảo vệ dành riêng cho tấm
        bảo vệ nệm, cho phép người mua lọc các đặc tính như chống thấm nước hoặc vật
        liệu không gây dị ứng.
    measuring_spoon_features:
      name: Đặc điểm của thìa đong
      description: Nhấn mạnh các đặc điểm thiết kế đặc biệt hoặc các tính năng chức
        năng của thìa đong.
    meat_tenderizer_face_type:
      name: Loại mặt dụng cụ làm mềm thịt
      description: Mô tả kết cấu bề mặt làm việc của đầu dụng cụ làm mềm thịt.
    meat_tenderizer_mechanism:
      name: Cơ chế làm mềm thịt
      description: Phân loại cơ chế hoạt động chính của dụng cụ làm mềm thịt.
    medical_specialty:
      name: Chuyên khoa y tế
      description: Xác định chuyên khoa y tế hoặc lĩnh vực chăm sóc sức khỏe mà thiết
        bị được thiết kế để sử dụng
    merv_rating:
      name: Chỉ số MERV
      description: Xác định Giá trị Báo cáo Hiệu suất Tối thiểu (MERV), cho biết khả
        năng của bộ lọc trong việc giữ lại các hạt có kích thước khác nhau.
    microwave_compatibility:
      name: Tính tương thích với lò vi sóng
      description: Chỉ rõ liệu sản phẩm có thể sử dụng an toàn trong lò vi sóng hay
        không.
    microwave_oven_functions:
      name: Chức năng của lò vi sóng
      description: Liệt kê các chế độ nấu sẵn hoặc nâng cao hiện có, cho phép khách
        hàng tìm thấy các mẫu máy có chức năng đối lưu, nướng, nấu cảm biến, v.v.
    milk_frother_type:
      name: Loại máy tạo bọt sữa
      description: Phân loại sản phẩm theo cơ chế tạo bọt hoặc kiểu dáng thiết kế.
    milk_frothing_method:
      name: Phương pháp tạo bọt sữa
      description: Chỉ rõ công nghệ hoặc cơ chế được sử dụng để tạo bọt sữa.
    milk_frothing_system:
      name: Hệ thống tạo bọt sữa
      description: Chỉ rõ loại cơ chế tạo bọt hoặc đánh sữa bằng hơi nước mà máy cung
        cấp.
    mirror_curvature:
      name: Độ cong của gương
      description: Chỉ rõ độ cong của bề mặt phản chiếu, có ảnh hưởng đến góc nhìn
        và độ biến dạng hình ảnh.
    mirror_type:
      name: Loại gương
      description: Phân loại kiểu dáng tổng quát hoặc danh mục chức năng của gương.
    mist_output_mode:
      name: Chế độ phun sương
      description: Cho biết các kiểu phun sương hoặc cài đặt cường độ có thể lựa chọn
        trên máy khuếch tán.
    mixing_bowl_features:
      name: Đặc điểm của bát trộn
      description: Nhấn mạnh các đặc điểm chức năng đặc biệt của bát giúp ảnh hưởng
        đến khả năng sử dụng và bảo quản.
    mixing_mechanism:
      name: Cơ chế trộn
      description: Mô tả cơ chế bên trong được sử dụng để trộn các thành phần nước
        sốt.
    mochi_maker_functions:
      name: Chức năng của máy làm bánh mochi
      description: Liệt kê các chế độ vận hành hoặc chương trình tích hợp mà thiết
        bị hỗ trợ.
    mode_of_action:
      name: Cơ chế tác động
      description: Cho biết cách thức hoạt động của thuốc diệt nấm, phân biệt giữa
        các sản phẩm bảo vệ tiếp xúc với các sản phẩm lưu dẫn hoặc xuyên thấu.
    moisture_absorber_form:
      name: Dạng hút ẩm
      description: Mô tả hình thức vật lý của sản phẩm, cho phép người mua chọn túi
        treo, hộp, gói, v.v.
    money_retrieval_method:
      name: Phương pháp lấy tiền
      description: Mô tả cách lấy tiền ra khỏi ống heo tiết kiệm.
    mop_head_type:
      name: Loại đầu cây lau nhà
      description: Cho biết thiết kế cấu trúc của đầu cây lau nhà hoặc miếng thay
        thế, giúp người mua tìm đúng kiểu dáng cho nhu cầu làm sạch của mình.
    mop_wringing_mechanism:
      name: Cơ chế vắt của cây lau nhà
      description: Cho biết cách loại bỏ chất lỏng dư thừa khỏi cây lau nhà, giúp
        người mua chọn kiểu vắt ưa thích.
    mounting_bolt_pattern:
      name: Kiểu bố trí bu lông lắp đặt
      description: 'Chỉ rõ số lượng và cách bố trí các lỗ bu lông lắp đặt trên vỏ
        trục chính (ví dụ: bộ 3 bu lông hình tam giác, bộ 4 bu lông hình vuông).'
    mouthpiece_shape:
      name: Hình dáng đầu ngậm
      description: Chỉ rõ hình dáng phần đầu ngậm của tẩu thuốc.
    mower_deck_material:
      name: Vật liệu sàn cắt của máy cắt cỏ
      description: Cho biết vật liệu chế tạo sàn cắt của máy cắt cỏ, điều này ảnh
        hưởng đến độ bền và trọng lượng.
    mulch_form:
      name: Dạng màng phủ
      description: Mô tả hình thức vật lý hoặc độ nhất quán của vật liệu phủ (phân
        bón/đất phủ).
    nap_mat_items_included:
      name: Các món đồ đi kèm thảm ngủ trưa
      description: Chi tiết các thành phần hoặc phụ kiện cụ thể đi kèm với thảm ngủ
        trưa.
    napkin_edge_finish:
      name: Kiểu hoàn thiện mép khăn ăn
      description: Chỉ rõ kiểu đường khâu hoặc cách hoàn thiện trang trí dọc theo
        mép hoặc gấu khăn ăn.
    noodle_core_design:
      name: Thiết kế lõi phao ống
      description: Mô tả lõi của phao ống là dạng đặc hay dạng rỗng.
    nozzle_adjustability:
      name: Khả năng điều chỉnh vòi phun
      description: Cho biết liệu vòi phun có thể điều chỉnh để thay đổi kiểu phun
        hoặc lưu lượng dòng chảy hay không.
    nozzle_material:
      name: Vật liệu vòi phun
      description: Chỉ rõ vật liệu của vòi phun sương để xem xét về độ bền và khả
        năng chống tắc nghẽn.
    nozzle_style:
      name: Kiểu dáng vòi phun
      description: Chỉ rõ hình dáng chức năng hoặc kiểu dáng phần đầu vòi của ống.
    nozzle_types_included:
      name: Các loại vòi phun đi kèm
      description: Liệt kê các hình dạng/kiểu dáng của vòi phun được cung cấp kèm
        theo súng làm thịt khô, giúp người mua biết họ có thể tạo ra các hình dạng
        sản phẩm nào.
    number_of_compartments:
      name: Số lượng ngăn
      description: Cho biết thùng rác có bao nhiêu phần riêng biệt để phân loại rác
        thải hoặc đồ tái chế.
    numeral_style:
      name: Kiểu chữ số
      description: Xác định kiểu dáng hoặc sự hiện diện của các chữ số trên mặt đồng
        hồ.
    oil_dispenser_spout_design:
      name: Thiết kế vòi của bình rót dầu
      description: Mô tả kiểu dáng của vòi hoặc đầu phun, ảnh hưởng đến việc kiểm
        soát dòng chảy và ngăn nhỏ giọt.
    organizer_application:
      name: Ứng dụng của khay có ngăn
      description: Chỉ rõ loại vật dụng chính mà khay ngăn được thiết kế để lưu trữ.
    ornament_hook_style:
      name: Kiểu móc treo đồ trang trí
      description: Xác định kiểu dáng hoặc hình dạng của móc treo được sử dụng để
        treo các vật dụng trang trí.
    oscillation_mode:
      name: Chế độ xoay/đảo gió
      description: Mô tả việc quạt có xoay hay không và xoay như thế nào để phân phối
        không khí.
    oscillation_type:
      name: Loại dao động
      description: Chỉ rõ liệu quạt có chế độ xoay hay không và cách thức hoạt động,
        hỗ trợ người mua cần lưu thông không khí trên diện rộng.
    outdoor_grill_rack_type:
      name: Loại vỉ nướng ngoài trời
      description: Chỉ rõ kiểu dáng chức năng của vỉ nướng để làm rõ mục đích sử dụng
        trong nấu nướng.
    oxygen_indicator_type:
      name: Loại chỉ báo oxy
      description: Chỉ rõ liệu có bao gồm chỉ báo trực quan để cho biết gói hút oxy
        có còn hoạt động hay không và hình thức của chỉ báo đó.
    pad_cleaning_action:
      name: Cơ chế làm sạch của miếng lót/miếng đệm
      description: Mô tả chức năng làm sạch chính hoặc kết quả hoàn thiện của miếng
        lót/miếng đệm.
    pan_bottom_type:
      name: Loại đáy chảo
      description: Cho biết chảo có đáy tháo rời hay đáy liền khối.
    pan_perforation_type:
      name: Loại đục lỗ của chảo
      description: Cho biết liệu đáy hoặc thành chảo là dạng đặc hay được đục lỗ để
        cho phép thoát nước/chất lỏng.
    parasol_opening_mechanism:
      name: Cơ chế mở ô/dù che nắng
      description: Mô tả cách mái che của ô được mở hoặc đóng.
    parchment_paper_coating:
      name: Lớp phủ của giấy nến
      description: Xác định phương pháp xử lý bề mặt áp dụng cho giấy nến để tạo đặc
        tính chống dính.
    particle_size_grade:
      name: Cấp độ kích thước hạt
      description: Mô tả phân loại kích thước hạt của đá khoáng, điều này ảnh hưởng
        đến đặc tính thông khí và giữ nước.
    patio_heater_safety_features:
      name: Các tính năng an toàn của máy sưởi hiên nhà
      description: Nhấn mạnh các cơ chế an toàn tích hợp được thiết kế để ngăn ngừa
        tai nạn và đảm bảo vận hành an toàn.
    pattern_match_type:
      name: Kiểu khớp hoa văn
      description: Chỉ rõ cách các hoa văn nên được căn chỉnh giữa các dải (giấy dán/vải)
        trong quá trình lắp đặt.
    pendulum_compatibility:
      name: Tính tương thích với con lắc
      description: Cho biết liệu bộ máy có thể điều khiển con lắc hay không và có
        bao gồm con lắc kèm theo hay không.
    perch_design:
      name: Thiết kế thanh đậu
      description: Mô tả kiểu dáng cấu trúc hoặc hình thái của thanh đậu.
    perch_surface_texture:
      name: Kết cấu bề mặt thanh đậu
      description: Xác định cảm giác bề mặt hoặc lớp hoàn thiện của thanh đậu, điều
        này ảnh hưởng đến độ bám và sự mài mòn móng.
    pet_safety:
      name: An toàn cho thú cưng
      description: Cho biết liệu loại cây đó có độc hay không độc đối với các vật
        nuôi phổ biến trong gia đình.
    pet_toxicity:
      name: Độ độc hại với thú cưng
      description: Cho biết cây có độc đối với thú cưng hay không, đảm bảo an toàn
        cho những khách hàng có nuôi thú cưng.
    ph_adjustment_direction:
      name: Hướng điều chỉnh độ pH
      description: Cho biết liệu sản phẩm được công thức hóa để tăng (pH Up) hay giảm
        (pH Down) mức độ pH của dung dịch.
    pie_pan_edge_style:
      name: Kiểu mép khuôn bánh
      description: Mô tả thiết kế của vành khuôn, ảnh hưởng đến ngoại hình của lớp
        vỏ bánh và độ dễ dàng khi lấy bánh ra.
    pin_shape:
      name: Hình dáng đinh ghim
      description: Mô tả hình dáng tổng thể của đinh ghim dùng để cố định vải.
    pipe_connection_method:
      name: Phương pháp kết nối đường ống
      description: 'Chỉ rõ kiểu kết nối tại các đầu của đoạn ống cong (ví dụ: ren
        ngoài, ren trong, khớp đẩy, nối ren) để đảm bảo tính tương thích khi lắp đặt.'
    piping_tip_shape:
      name: Hình dáng đầu bắt kem
      description: Xác định hình dạng hoặc thiết kế của đầu bắt kem/trang trí.
    pitcher_spout_style:
      name: Kiểu vòi bình rót
      description: Xác định thiết kế vòi, ảnh hưởng đến độ chính xác khi tạo hình
        nghệ thuật latte và khả năng kiểm soát việc rót.
    pizza_cutter_design:
      name: hiết kế dụng cụ cắt pizza
      description: Xác định kiểu cấu trúc của dụng cụ cắt pizza, giúp khách hàng lựa
        chọn giữa các cơ chế cắt khác nhau.
    pizza_pan_style:
      name: Kiểu khuôn bánh pizza
      description: Xác định kiểu thiết kế/cấu trúc của khuôn bánh pizza, cho biết
        cách khuôn nướng lớp vỏ và loại pizza mục tiêu.
    plant_care_difficulty:
      name: Độ khó khi chăm sóc cây
      description: Cho biết mức độ chăm sóc cần thiết để duy trì cây trồng, giúp người
        mới bắt đầu và các chuyên gia lựa chọn phù hợp.
    plant_container_type:
      name: Loại chậu/thùng đựng cây
      description: Xác định loại chậu/vật chứa đi kèm với cây bụi nhân tạo, nếu có.
    plant_life_cycle:
      name: Chu kỳ sống của cây
      description: Cho biết cây là loại cây một năm, hai năm hay cây lâu năm.
    planter_material:
      name: Vật liệu chậu trồng
      description: Cho biết vật liệu của chậu/bồn trồng đi kèm, nếu có cung cấp.
    plate_coupling_pattern:
      name: Kiểu khớp nối của đĩa
      description: Chỉ rõ cấu hình trục ở mặt dưới khớp với bộ nối động cơ bàn xoay
        của lò vi sóng, đảm bảo xoay đúng cách.
    plate_purpose:
      name: Mục đích của tấm chắn
      description: Xác định vai trò chức năng của tấm chắn trong hệ thống máy cắt
        cỏ.
    plate_style:
      name: Kiểu dáng đĩa
      description: Xác định kiểu dáng cụ thể hoặc mục đích sử dụng của đĩa ăn.
    pole_construction_type:
      name: Loại kết cấu cột
      description: Xác định kiểu cấu trúc của cột/trụ, ảnh hưởng đến việc lắp đặt
        và tính di động.
    pool_chemical_type:
      name: Loại hóa chất hồ bơi
      description: Phân loại chức năng chính hoặc thành phần hóa học của sản phẩm
        xử lý hồ bơi.
    pool_filter_type:
      name: Loại bộ lọc hồ bơi
      description: Xác định công nghệ lọc hoặc kiểu cấu trúc được sử dụng bởi bộ lọc
        hồ bơi hoặc spa.
    pool_game_type:
      name: Loại trò chơi trong hồ bơi
      description: Xác định loại trò chơi hoặc môn thể thao cụ thể mà sản phẩm hỗ
        trợ trong hồ bơi.
    pool_ladder_design:
      name: Thiết kế thang hồ bơi
      description: Phân loại thiết kế cấu trúc tổng thể của thang hồ bơi.
    pool_liner_installation_style:
      name: Kiểu lắp đặt tấm lót hồ bơi
      description: Xác định phương pháp gắn được sử dụng để cố định tấm lót vào thành
        bể bơi.
    pool_lounge_style:
      name: Kiểu ghế thư giãn bên hồ bơi
      description: Phân loại kiểu dáng cấu trúc của ghế thư giãn bên hồ bơi để phục
        vụ việc lọc theo thẩm mỹ hoặc chức năng.
    pool_lounger_features:
      name: Đặc điểm của ghế thư giãn bên hồ bơi
      description: Nhấn mạnh các tính năng tích hợp đặc biệt giúp tăng cường chức
        năng hoặc sự thoải mái cho ghế thư giãn.
    pool_skimmer_type:
      name: Loại thiết bị hớt váng hồ bơi
      description: Phân loại thiết kế của bộ vớt rác, giúp người mua so sánh giữa
        vợt cầm tay với các bộ vớt rác tự động hoặc dạng nổi.
    pool_toy_features:
      name: Đặc điểm của đồ chơi hồ bơi
      description: Nhấn mạnh các đặc điểm nổi bật về chức năng hoặc thiết kế dành
        riêng cho đồ chơi hồ bơi.
    pool_type:
      name: Loại hồ bơi
      description: Phân loại kiểu dáng kiến trúc của bể bơi.
    pool_vacuum_type:
      name: Loại máy hút bụi hồ bơi
      description: Cho biết kiểu vận hành hoặc cơ chế truyền động của máy hút bụi
        hồ bơi.
    popcorn_kernel_variety:
      name: Loại hạt bắp rang bơ
      description: Chỉ rõ giống tự nhiên hoặc hình dáng của hạt bắp rang bơ.
    portafilter_type:
      name: Loại tay cầm pha cà phê
      description: Xác định kiểu cấu trúc của tay cầm pha cà phê, ảnh hưởng đến phương
        pháp chiết xuất và quy trình làm việc.
    post_installation_method:
      name: Phương pháp lắp đặt cột
      description: Xác định cách cột hòm thư được lắp đặt hoặc cố định tại chỗ.
    pour_spout_design:
      name: Thiết kế vòi rót
      description: Chỉ rõ các tính năng đặc biệt hoặc kiểu dáng của vòi rót có ảnh
        hưởng đến việc kiểm soát dòng chảy.
    pour_spout_style:
      name: Kiểu dáng vòi rót
      description: Mô tả thiết kế vòi rót của bình đựng, ảnh hưởng đến việc kiểm soát
        dòng chảy và khả năng chống nhỏ giọt.
    power_equipment_hitch_type:
      name: Loại khớp nối thiết bị động lực
      description: Xác định giao diện kết nối mà bộ phận đi kèm sử dụng để lắp trên
        máy kéo hoặc các bộ phận động lực.
    predator_guard_style:
      name: Tấm bảo vệ chống thú săn mồi
      description: Phân loại thiết kế cấu trúc của tấm bảo vệ, giúp người mua nhanh
        chóng tìm thấy các giải pháp dạng nón, dạng đĩa, dạng lồng hoặc tấm có lỗ.
    preferred_soil_type:
      name: Loại đất ưa thích
      description: Cho biết thành phần đất mà cây phát triển tốt.
    preparation_type:
      name: Loại hình chuẩn bị
      description: Mô tả phương pháp cần thiết để chế biến thực phẩm sẵn sàng để ăn.
    preservation_method:
      name: Phương pháp bảo quản
      description: Mô tả chi tiết kỹ thuật được sử dụng để làm khô hoặc bảo quản hoa.
    pressure_cooker_handle_type:
      name: Loại tay cầm nồi áp suất
      description: Cho biết kiểu dáng hoặc vị trí của tay cầm nồi áp suất đang được
        thay thế.
    pressure_cooker_safety_features:
      name: Các tính năng an toàn của nồi áp suất
      description: Liệt kê các cơ chế an toàn tích hợp giúp ngăn ngừa tai nạn, chẳng
        hạn như nắp khóa hoặc van xả áp suất.
    pressure_settings:
      name: Các thiết lập áp suất
      description: Chỉ rõ có bao nhiêu mức áp suất riêng biệt mà nồi áp suất cung
        cấp cho người dùng.
    pressure_washer_outlet_connector_type:
      name: Loại đầu nối đầu ra máy rửa áp lực
      description: Xác định thông số kỹ thuật của đầu nối ở phía trước đầu súng dùng
        để gắn cần phun hoặc vòi phun.
    pressure_washer_spray_pattern:
      name: Kiểu phun của máy rửa áp lực
      description: Chỉ rõ góc phun hoặc kiểu phun được tạo ra bởi vòi phun của máy
        rửa áp lực.
    print_edition_type:
      name: Loại ấn bản in
      description: Phân loại loại ấn bản của bản in, thể hiện độ hiếm và giá trị.
    printed_sides:
      name: Mặt in
      description: Cho biết sản phẩm được in trên một mặt hay cả hai mặt.
    procedure:
      name: Thủ thuật
      description: Xác định thủ thuật y khoa hoặc loại hình đào tạo mà thiết bị được
        thiết kế để phục vụ
    protected_item_type:
      name: Loại vật dụng được bảo vệ
      description: Chỉ rõ loại tài liệu hoặc vật thể mà vỏ bọc RFID được thiết kế
        để bảo vệ.
    pulley_groove_profile:
      name: Hình dạng rãnh ròng rọc
      description: Xác định kiểu tiếp diện của dây đai đối với ròng rọc đệm.
    pulp_ejection_type:
      name: Loại thải bã
      description: Cho biết cách bã được đẩy ra khỏi máy ép.
    pump_type:
      name: Loại bơm
      description: Chỉ rõ thiết kế của cơ chế bơm trong máy rửa áp lực.
    punch_bowl_components_included:
      name: Các thành phần đi kèm bát đựng rượu punch
      description: Liệt kê các vật dụng bổ sung đi kèm với bát đựng rượu punch, giúp
        người mua hiểu nhanh các món có trong bộ sản phẩm.
    quilt_construction_type:
      name: Loại kết cấu chăn chần
      description: Mô tả phương pháp khâu hoặc tạo vách ngăn bên trong được sử dụng
        trong chăn bông, ảnh hưởng đến sự phân bổ nhiệt và độ bền.
    radiator_design_type:
      name: Kiểu thiết kế bộ tản nhiệt
      description: Xác định kiểu dáng cấu trúc của bộ tản nhiệt.
    rain_barrel_design:
      name: Thiết kế thùng chứa nước mưa
      description: Phân loại kiểu dáng cấu trúc của thùng hứng nước mưa.
    rain_chain_style:
      name: Kiểu dáng xích thoát nước mưa
      description: Chỉ rõ thiết kế cấu trúc của xích thoát nước mưa để khách hàng
        có thể lọc theo sở thích thẩm mỹ và hiệu suất dòng chảy.
    range_hood_filter_type:
      name: Loại bộ lọc máy hút mùi
      description: Phân loại kiểu dáng của bộ lọc thay thế để đảm bảo độ vừa vặn và
        hiệu suất chính xác.
    range_installation_type:
      name: Loại lắp đặt bếp nấu
      description: Mô tả cấu hình lắp đặt bếp trong nhà bếp.
    recorder_type:
      name: Loại thiết bị ghi hình
      description: 'Xác định công nghệ ghi hình được sử dụng (ví dụ: DVR, NVR) để
        giúp so sánh giữa giải pháp analog và giải pháp IP.'
    refrigerator_configuration:
      name: Cấu hình tủ lạnh
      description: Xác định kiểu bố trí tổng thể của cửa và các ngăn trong tủ lạnh.
    release_type:
      name: Loại phát hành
      description: Cho biết tốc độ giải phóng các chất dinh dưỡng từ phân bón.
    relief_style:
      name: Kiểu phù điêu
      description: Cho biết các bề mặt nhô lên trên quả địa cầu là dạng nổi, dạng
        lõm hay dạng phẳng.
    repellent_mechanism:
      name: Cơ chế đẩy lùi
      description: Chỉ rõ cơ chế xua đuổi chính được sản phẩm sử dụng, chẳng hạn như
        mùi hương hóa học, sóng siêu âm hoặc ánh sáng nhấp nháy.
    replaceable_brush_head:
      name: Đầu bàn chải có thể thay thế
      description: Chỉ rõ liệu đầu bàn chải có thể tháo rời và thay thế khi bị mòn
        hay không.
    rib_material:
      name: Vật liệu nan ô/dù
      description: Chỉ rõ vật liệu được sử dụng cho nan hoặc căm của ô/dù, chẳng hạn
        như sợi thủy tinh hoặc nhôm.
    rice_cooker_functions:
      name: Các chức năng của nồi cơm điện
      description: Liệt kê các chương trình nấu hoặc chế độ cài đặt sẵn có trên nồi
        cơm điện, cho phép người mua so sánh tính linh hoạt của sản phẩm.
    roaster_oven_functions:
      name: Chức năng của lò nướng điện
      description: Liệt kê các chức năng nấu ăn được hỗ trợ hoặc cài đặt sẵn có trên
        lò nướng điện.
    roasting_rack_shape:
      name: Hình dáng vỉ nướng
      description: Chỉ rõ hình dáng cấu trúc hoặc thiết kế của vỉ nướng, điều này
        ảnh hưởng đến độ vừa vặn và hiệu suất nấu nướng.
    rockwool_form:
      name: Hình dáng bông khoáng
      description: Chỉ rõ hình thái vật lý hoặc cấu hình của sản phẩm bông khoáng.
    roof_style:
      name: Kiểu mái nhà
      description: Xác định kiểu kiến trúc hoặc hình dáng của mái nhà.
    rose_attachment:
      name: Phụ kiện đầu vòi sen
      description: Cho biết liệu bình tưới có bao gồm đầu vòi sen có thể tháo rời,
        cố định hay không có đầu vòi sen.
    safety_mirror_features:
      name: Tính năng gương an toàn
      description: Nhấn mạnh các đặc điểm hiệu suất đặc biệt giúp tăng cường độ bền
        hoặc khả năng quan sát.
    salad_spinner_mechanism:
      name: Cơ chế máy quay rau salad
      description: Chỉ rõ cơ chế xoay được sử dụng để làm khô rau xanh, giúp người
        mua lựa chọn kiểu vận hành ưa thích.
    sand_color:
      name: Màu cát
      description: Cho biết màu sắc của cát hoặc hạt lấp đầy bên trong đồng hồ cát,
        độc lập với màu của khung bên ngoài.
    sand_type:
      name: Loại cát
      description: Chỉ rõ loại cát dựa trên thành phần hoặc ứng dụng phổ biến của
        nó.
    saucer_functionality:
      name: Chức năng của đĩa lót/khay lót
      description: Chỉ rõ kiểu chức năng của đĩa lót hoặc khay, chẳng hạn như thiết
        kế tự tưới nước hoặc có ngăn chứa nước.
    sauna_form_factor:
      name: Hình dáng thiết kế phòng xông hơi
      description: Xác định kiểu dáng cấu trúc tổng thể của phòng xông hơi.
    sauna_heater_type:
      name: Loại máy sưởi phòng xông hơi
      description: Cho biết loại máy sưởi đi kèm hoặc được hỗ trợ bởi bộ thiết bị
        xông hơi.
    scoop_release_mechanism:
      name: Cơ chế giải phóng của muỗng
      description: Mô tả kiểu cơ chế giải phóng sản phẩm được tích hợp trong muỗng.
    scoop_surface_design:
      name: Thiết kế bề mặt muỗng
      description: Mô tả bề mặt muỗng là dạng đặc hay có lỗ để cho phép thoát dầu.
    scoop_wall_design:
      name: Thiết kế thành muỗng
      description: Mô tả bề mặt muỗng là dạng đặc hay có lỗ/khe rãnh để cho phép các
        mảnh nhỏ hoặc dầu đi qua.
    scrubber_head_type:
      name: Loại đầu bàn chải chà
      description: Mô tả hoạt động cơ học hoặc thiết kế của đầu bàn chải chà.
    scrubbing_strength:
      name: Cường độ chà rửa
      description: Cho biết mức độ chà rửa hoặc tính mài mòn tương đối mà sản phẩm
        cung cấp.
    seafood_utensil_items_included:
      name: Các dụng cụ ăn hải sản đi kèm
      description: Liệt kê các dụng cụ ăn hải sản bổ sung đi kèm với kẹp, giúp người
        mua so sánh giữa kẹp đơn lẻ với bộ dụng cụ đầy đủ.
    sealing_modes:
      name: Các chế độ đóng gói
      description: Liệt kê các chương trình vận hành đóng gói hoặc hàn kín có sẵn
        trên thiết bị.
    security_sensor_subtype:
      name: Loại phụ của cảm biến an ninh
      description: Xác định chức năng hoặc loại cụ thể của cảm biến an ninh.
    seed_treatment:
      name: Xử lý hạt giống
      description: Chỉ rõ bất kỳ quy trình xử lý đặc biệt nào được áp dụng cho hạt
        giống.
    self_cleaning_method:
      name: Phương pháp tự làm sạch
      description: Chỉ rõ loại công nghệ tự làm sạch mà lò nướng sử dụng.
    serveware_pieces_included:
      name: Các món đồ dùng phục vụ bàn ăn đi kèm
      description: Liệt kê các thành phần đồ phục vụ khác nhau có trong một bộ sản
        phẩm gồm nhiều món.
    shaker_set_pieces_included:
      name: Các thành phần trong bộ bình lắc đi kèm
      description: Liệt kê các thành phần riêng lẻ đi kèm với bộ sản phẩm, ngoài các
        lọ rắc muối và tiêu cơ bản.
    sheath_material:
      name: Chất liệu bao vỏ
      description: Vật liệu vỏ bọc đầu dò cặp nhiệt điện, ảnh hưởng đến khả năng chống
        ăn mòn và nhiệt độ vận hành tối đa.
    shelf_location_in_appliance:
      name: Vị trí ngăn kệ trong thiết bị
      description: Chỉ ra vị trí bên trong thiết bị mà ngăn kệ đó được dự định lắp
        đặt.
    shoe_brush_type:
      name: Loại bàn chải giày
      description: Chỉ ra vị trí bên trong thiết bị mà ngăn kệ đó được dự định lắp
        đặt.
    shoe_dryer_technology:
      name: Công nghệ máy sấy giày
      description: Chỉ rõ công nghệ sấy chính được sử dụng bởi máy sấy giày.
    shoe_organizer_design:
      name: Thiết kế giá đựng giày
      description: Xác định kiểu dáng hoặc hình thức tổng thể của giá đựng giày để
        giúp người mua lọc sản phẩm.
    shoe_polish_form:
      name: Dạng xi đánh giày
      description: Xác định hình thái vật lý hoặc phương thức cung cấp của sản phẩm
        xi đánh giày.
    shoe_treatment_purpose:
      name: Mục đích xử lý giày dép
      description: Xác định chức năng hoặc lợi ích chính của sản phẩm chăm sóc giày.
    shoe_tree_design:
      name: Thiết kế cây giữ phom giày
      description: Xác định kiểu cấu trúc hoặc cơ chế của cây giữ phom giày, ảnh hưởng
        đến khả năng điều chỉnh, loại giày phù hợp và tính tiện dụng.
    shot_glass_style:
      name: Kiểu ly uống rượu
      description: Phân loại kiểu dáng hoặc định dạng cụ thể của ly uống rượu.
    shovel_handle_grip_type:
      name: Loại tay nắm của cán xẻng
      description: Chỉ rõ kiểu tay nắm ở phần cuối của cán xẻng.
    shovel_head_type:
      name: Loại lưỡi xẻng
      description: Phân loại hình dáng hoặc kiểu dáng chức năng của lưỡi xẻng hoặc
        mai.
    shower_curtain_ring_type:
      name: Loại vòng treo rèm phòng tắm
      description: Xác định kiểu dáng chức năng của vòng treo rèm phòng tắm.
    shrub_shape:
      name: Hình dáng cây bụi
      description: Mô tả hình dáng điêu khắc hoặc tạo hình tổng thể của cây bụi nhân
        tạo.
    signature_presence:
      name: Sự hiện diện của chữ ký
      description: Chỉ rõ liệu bức tranh có được ký bởi họa sĩ hay không và ký như
        thế nào.
    sink_caddy_features:
      name: Đặc điểm của khay đựng đồ bồn rửa chén
      description: Nhấn mạnh các yếu tố chức năng đặc biệt của khay đựng đồ bồn rửa
        chén.
    size_adjustability:
      name: Khả năng điều chỉnh kích cỡ
      description: Cho biết liệu vỏ bọc có cung cấp khả năng cách nhiệt để giữ đồ
        uống nóng hoặc lạnh hay không.
    skewer_tip_type:
      name: Loại đầu xiên
      description: Xác định loại đầu nhọn trên xiên, ảnh hưởng đến độ dễ dàng khi
        xiên thực phẩm và cách trình bày tổng thể.
    sleeping_position_suitability:
      name: Sự phù hợp với tư thế ngủ
      description: Cho biết gối được thiết kế dành cho tư thế ngủ nào.
    sleeve_insulation:
      name: Lớp cách nhiệt vỏ bọc
      description: Cho biết liệu vỏ bọc có cung cấp khả năng cách nhiệt để giữ đồ
        uống nóng hoặc lạnh hay không.
    slice_style:
      name: Kiểu lát cắt
      description: Chỉ rõ kiểu cắt chính mà máy cắt nhà bếp tạo ra, chẳng hạn như
        cắt sợi hoặc cắt hình tổ ong.
    slipcover_stretch_type:
      name: Kiểu co giãn của bọc ghế
      description: Chỉ rõ mức độ và hướng co giãn của loại vải được sử dụng cho bọc
        ghế.
    smoker_type:
      name: Loại máy xông khói
      description: Phân loại máy xông khói theo thiết kế cấu trúc hoặc phương pháp
        xông khói.
    smoking_chip_size:
      name: Kích thước mảnh gỗ xông khói
      description: Cho biết kích thước hoặc cách cắt vật lý của các mảnh gỗ xông khói,
        điều này ảnh hưởng đến tốc độ cháy và độ phù hợp với các loại bếp nướng hoặc
        máy xông khói khác nhau.
    snow_blower_stage_type:
      name: Máy thổi tuyết kiểu tầng
      description: Thông số này cho biết số lượng tầng trục vít/cánh quạt được sử
        dụng để di chuyển và xả tuyết, một thông số kỹ thuật chính được dùng để phân
        biệt máy một tầng, hai tầng và ba tầng.
    soap_dispenser_operation_type:
      name: Loại vận hành của bình xịt xà phòng
      description: Chỉ rõ cơ chế kích hoạt được sử dụng để lấy xà phòng hoặc sữa dưỡng
        thể.
    soil_texture:
      name: Kết cấu đất
      description: Mô tả kích thước hạt/thành phần chiếm ưu thế của đất ảnh hưởng
        đến khả năng thoát nước và thông khí.
    spa_installation_type:
      name: Loại lắp đặt bồn tắm spa
      description: Phân loại spa dựa trên cách nó được lắp đặt hoặc cấu hình tại chỗ.
    space_heater_safety_features:
      name: Các tính năng an toàn của máy sưởi ấm không gian
      description: Nêu bật các cơ chế an toàn tích hợp giúp bảo vệ người dùng và tài
        sản.
    spice_organizer_features:
      name: Đặc điểm của kệ sắp xếp gia vị
      description: Nêu bật các đặc tính chức năng đặc biệt của kệ sắp xếp gia vị.
    spray_pattern:
      name: Kiểu phun
      description: Xác định loại phân tán dầu được tạo ra bởi vòi phun của bình xịt.
    sprayer_operation_mechanism:
      name: Cơ chế vận hành bình xịt
      description: Chỉ rõ cách áp suất được tạo ra để phân phối dầu từ bình xịt.
    spring_type:
      name: Loại lò xo
      description: Xác định loại lò xo được sử dụng trong cơ chế của máy cắt viền.
    sprinkle_opening_style:
      name: Kiểu mở phun
      description: Xác định độ thô hoặc kiểu của các lỗ thủng/lưới được sử dụng để
        phân phối ca cao (lưới mịn so với lỗ lớn, v.v.).
    sprinkler_orientation:
      name: Hướng đầu phun nước
      description: Chỉ định hướng lắp đặt và kiểu dáng của đầu phun chữa cháy.
    sprinkler_response_type:
      name: Loại phản ứng của đầu phun
      description: Chỉ rõ đặc tính phản ứng nhiệt của đầu phun nước.
    sprinkler_type:
      name: Loại vòi phun nước
      description: Phân loại hành động cơ học hoặc kiểu phân phối của đầu phun để
        dễ dàng so sánh và lọc.
    sprinkler_valve_type:
      name: Loại van vòi phun
      description: Xác định chức năng hoặc loại kích hoạt của van đầu phun nước.
    squirrel_feed_type:
      name: Loại thức ăn cho sóc
      description: Xác định các loại thức ăn mà máng ăn được thiết kế để phân phối,
        đảm bảo tính tương thích với thức ăn ưa thích của sóc.
    squirrel_resistance:
      name: Khả năng chống sóc
      description: Cho biết liệu lồng đựng mỡ động vật có tích hợp các tính năng được
        thiết kế để ngăn sóc tiếp cận mỡ hay không.
    stackability:
      name: Khả năng xếp chồng
      description: Cho biết liệu nhiều đơn vị có thể được xếp chồng lên nhau một cách
        an toàn để lưu trữ tiết kiệm diện tích hay không.
    stackable_design:
      name: Thiết kế xếp chồng
      description: Cho biết liệu thùng chứa có được thiết kế để xếp chồng an toàn
        khi đầy hay khi rỗng.
    stacking_capability:
      name: Khả năng xếp chồng
      description: Chỉ rõ liệu thùng chứa có thể xếp chồng, xếp lồng, gấp gọn, hoặc
        không thể xếp chồng với các thùng chứa khác.
    stainless_steel_cleaner_features:
      name: Đặc điểm của chất tẩy rửa thép không gỉ
      description: Nêu rõ các đặc tính hiệu suất đặc biệt của sản phẩm, những đặc
        tính độc đáo hoặc đặc biệt liên quan đến việc chăm sóc thép không gỉ.
    staple/pin_shape:
      name: Hình dạng ghim/đinh
      description: Xác định hình dạng tổng thể của kẹp ghim, giúp khách hàng lựa chọn
        giữa ghim hình chữ U, đinh đầu tròn, v.v.
    staple_coating:
      name: Lớp phủ ghim
      description: Mô tả bất kỳ lớp phủ bảo vệ nào được áp dụng cho ghim hoặc đinh
        để ngăn gỉ sét hoặc cải thiện tuổi thọ.
    steam_nozzle_type:
      name: Loại đầu vòi phun hơi nước
      description: Xác định kiểu chức năng của phụ kiện vòi phun máy làm sạch hơi
        nước.
    steam_table_pan_cover_features:
      name: Tính năng nắp khay hâm nóng
      description: Nêu bật các đặc tính chức năng đặc biệt của nắp khay hâm nóng giúp
        hỗ trợ các hoạt động dịch vụ thực phẩm.
    steam_table_pan_size:
      name: Kích thước khay hâm nóng
      description: 'Cho biết phân số khay khách sạn/Gastronorm tiêu chuẩn (ví dụ:
        đầy đủ, 1/2, 1/3) mà khay hoặc nắp được thiết kế để vừa vặn.'
    steam_table_pan_size_compatibility:
      name: Khả năng tương thích kích thước khay hâm nóng
      description: Liệt kê các kích thước khay Gastronorm hoặc tiêu chuẩn mà thiết
        bị có thể đáp ứng.
    steam_table_pan_type:
      name: Loại khay giữ nóng thức ăn bằng hơi nước
      description: Chỉ rõ kiểu cấu tạo của khay, ảnh hưởng đến hiệu suất thoát nước
        và làm nóng.
    stemware_design:
      name: Thiết kế đồ dùng có chân
      description: Chỉ rõ liệu ly đồ uống có chân truyền thống hay không có chân.
    stick_tip_style:
      name: Kiểu đầu que
      description: Xác định thiết kế đầu của que, ảnh hưởng đến cách nó xiên hoặc
        nâng đỡ các mặt hàng thực phẩm.
    stocking_toe_orientation:
      name: Hướng mũi tất
      description: Chỉ định hướng mũi tất khi treo, ảnh hưởng đến sự đối xứng thị
        giác khi trưng bày nhiều chiếc tất.
    stopper_type:
      name: Loại nút chặn
      description: Chỉ rõ loại nút đóng đi kèm với bình đựng, nếu có.
    strainer_style:
      name: Kiểu dáng dụng cụ lọc/rây
      description: Phân loại thiết kế của rây hoặc đồ lọc.
    strainer_type:
      name: Loại rây
      description: Chỉ rõ kiểu dáng hoặc thiết kế của rây, cho biết mục đích sử dụng
        ẩm thực và cấu trúc lưới.
    strap_end_fitting_type:
      name: Loại đầu nối dây đeo
      description: Chỉ rõ phần cứng hoặc phụ kiện nằm ở đầu dây kéo giúp tạo điều
        kiện kết nối, neo giữ hoặc điều chỉnh.
    straw_dispensing_mechanism:
      name: Cơ chế phân phối ống hút
      description: Mô tả phương pháp phân phối ống hút, hỗ trợ người mua tìm kiếm
        các tính năng vệ sinh hoặc tiện lợi cụ thể.
    sugar_dispenser_mechanism:
      name: Cơ chế của bình rắc đường
      description: Chi tiết cách đường được phân phối từ thùng chứa, hỗ trợ người
        mua trong việc lựa chọn kiểu đổ ưa thích của họ.
    suitable_for_pool_shape:
      name: Phù hợp với hình dạng hồ bơi
      description: Cho biết hình dạng hồ bơi nào mà phụ kiện có thể sử dụng cùng,
        giúp người dùng đảm bảo sự phù hợp.
    suitable_pool_surface_type:
      name: Loại bề mặt hồ bơi phù hợp
      description: Xác định các vật liệu bề mặt hồ bơi mà bàn chải/chổi được thiết
        kế, nhằm ngăn ngừa hư hại bề mặt và đảm bảo làm sạch tối ưu.
    suitable_spread_material:
      name: Vật liệu rải phù hợp
      description: Xác định các loại vật liệu mà máy rải được thiết kế để phân phối.
    sundial_type:
      name: Loại đồng hồ mặt trời
      description: Xác định kiểu thiết kế hoặc cấu hình khoa học của đồng hồ mặt trời.
    supplement_function:
      name: Chức năng bổ sung
      description: Phân loại thực phẩm bổ sung theo mục đích chính của chúng, giúp
        người trồng chọn đúng chất phụ gia cho nhu cầu cụ thể của cây.
    surface_reflectivity:
      name: Độ phản quang bề mặt
      description: Cho biết liệu bề mặt biển báo có được thiết kế để phản xạ ánh sáng
        nhằm tăng cường khả năng hiển thị vào ban đêm hay không.
    sweetener_type:
      name: Loại chất tạo ngọt
      description: Xác định tác nhân tạo ngọt chính được sử dụng trong sirô.
    table_skirt_pleat_style:
      name: Kiểu xếp ly vây bàn
      description: Xác định kiểu xếp ly hoặc thu gom trang trí của vây bàn, hỗ trợ
        người mua trong việc phối hợp các chủ đề thẩm mỹ.
    tablecloth_clip_design:
      name: Thiết kế kẹp khăn trải bàn
      description: Mô tả cơ chế hoặc kiểu dáng của kẹp khăn trải bàn.
    tablecloth_features:
      name: Tính năng khăn trải bàn
      description: Nêu bật các tính năng hiệu suất hoặc thiết kế đặc biệt của khăn
        trải bàn.
    tamper_evident_feature:
      name: Tính năng chống giả mạo
      description: Cho biết sự hiện diện và kiểu chức năng chống làm giả được tích
        hợp vào nắp.
    tang_type:
      name: Loại chuôi dao
      description: Cho biết thiết kế chuôi của một con dao, chỉ rõ phần kim loại của
        lưỡi dao kéo dài bao xa vào trong tay cầm.
    teapot_spout_style:
      name: Kiểu vòi ấm trà
      description: Mô tả thiết kế vòi rót của ấm trà, ảnh hưởng đến việc kiểm soát
        dòng rót và tính thẩm mỹ.
    temperature_zones:
      name: Các vùng nhiệt độ
      description: Xác định có bao nhiêu vùng nhiệt độ có thể điều chỉnh độc lập mà
        tủ lạnh ướp rượu cung cấp.
    thermocouple_junction_type:
      name: Loại điểm nối cặp nhiệt điện
      description: Cho biết cấu tạo của điểm nối cảm biến, ảnh hưởng đến thời gian
        đáp ứng và cách điện.
    thermometer_design:
      name: Thiết kế nhiệt kế
      description: Chỉ rõ kiểu vận hành cơ bản hoặc công nghệ của nhiệt kế gia dụng.
    thermos_handle_type:
      name: Loại tay cầm bình giữ nhiệt
      description: Mô tả kiểu tay cầm hoặc phụ trợ vận chuyển được tích hợp vào bình
        giữ nhiệt.
    thread_standard:
      name: Tiêu chuẩn ren
      description: Xác định thông số kỹ thuật ren được sử dụng trên các kết nối của
        phụ kiện để đảm bảo khả năng tương thích chéo với các thành phần hệ thống
        ống nước.
    tilt_mechanism:
      name: Cơ chế nghiêng
      description: Chỉ rõ cơ chế cho phép mái che nghiêng để có vị trí che bóng tối
        ưu.
    time_format:
      name: Định dạng thời gian
      description: Cho biết liệu đồng hồ có thể hiển thị thời gian ở định dạng 12
        giờ, 24 giờ, hoặc cả hai.
    timer_mechanism:
      name: Cơ chế hẹn giờ
      description: Xác định cơ chế cơ bản được sử dụng để đo thời gian.
    tine_position:
      name: Vị trí răng cào
      description: Mô tả cấu hình của các răng cào so với bánh xe/động cơ, điều này
        ảnh hưởng đến khả năng điều động và sự xâm nhập vào đất.
    tire_construction:
      name: Kết cấu lốp xe
      description: Xác định phương pháp cấu tạo bên trong của khung lốp.
    tire_construction_type:
      name: Loại kết cấu lốp xe
      description: Xác định liệu lốp xe có cấu tạo lớp bố chéo (bias-ply) hay bố tỏa
        tròn (radial), điều này ảnh hưởng đến tính linh hoạt, khả năng chịu tải và
        chất lượng hành trình.
    tire_tread_pattern:
      name: Kiểu gai lốp
      description: Mô tả kiểu gai trên lốp xe, cho biết mức độ phù hợp với các điều
        kiện địa hình khác nhau và nhu cầu về lực kéo.
    tissue_lotion_content:
      name: Nội dung dưỡng chất trong khăn giấy
      description: Cho biết liệu khăn giấy có được tẩm dưỡng chất hoặc các chất phụ
        gia làm dịu khác hay không.
    toaster_features:
      name: Tính năng của máy nướng bánh mì
      description: Liệt kê các chức năng đặc biệt và các yếu tố thiết kế có sẵn trên
        máy nướng bánh mì.
    tong_type:
      name: Loại kẹp
      description: Chỉ rõ kiểu dáng chính hoặc mục đích sử dụng dự kiến của kẹp.
    toothbrush_holder_features:
      name: Tính năng của giá để bàn chải đánh răng
      description: Nêu bật các chức năng đặc biệt hoặc các yếu tố thiết kế tạo nên
        sự khác biệt cho giá đỡ.
    toothpick_dispensing_mechanism:
      name: Cơ chế phân phối tăm
      description: Xác định cơ chế phân phối tăm xỉa răng.
    topographical_relief:
      name: Phù điêu địa hình
      description: Cho biết liệu bề mặt quả địa cầu có các đặc điểm địa hình nhô cao
        hay không.
    towel_holder_design:
      name: Thiết kế giá treo khăn
      description: Mô tả kiểu dáng cấu trúc của giá treo khăn, chẳng hạn như dạng
        thanh hoặc dạng vòng.
    towel_weave:
      name: Dệt khăn
      description: Mô tả cấu trúc hoặc kiểu dệt của vải khăn, yếu tố ảnh hưởng đến
        kết cấu, khả năng thấm hút và thời gian khô.
    track_lighting_rail_type:
      name: Loại thanh ray đèn rọi
      description: Xác định tiêu chuẩn cơ/điện của thanh ray, xác định thiết bị cố
        định và đầu nối nào tương thích.
    track_lighting_system_compatibility:
      name: Khả năng tương thích hệ thống đèn ray
      description: Chỉ rõ tiêu chuẩn điện và cơ khí của thanh ray mà thiết bị cố định
        hoặc phụ kiện được thiết kế cho.
    track_rail_circuit_configuration:
      name: Cấu hình mạch ray đèn
      description: Cho biết số lượng hoặc kiểu mạch điện mà ray hỗ trợ, ảnh hưởng
        đến việc điều khiển độc lập các nhóm thiết bị cố định.
    track_system_standard:
      name: Tiêu chuẩn hệ thống ray
      description: 'Xác định tiêu chuẩn thanh ray vật lý mà bộ cấp nguồn phù hợp,
        cho phép người mua khớp các thành phần với thanh ray của họ (ví dụ: thanh
        ray H, J, hoặc L).'
    tractor_tire_application:
      name: Ứng dụng lốp xe máy kéo
      description: Cho biết ứng dụng chính hoặc môi trường mà lốp xe được thiết kế
        cho.
    tractor_tire_tread_classification:
      name: Phân loại gai lốp máy kéo
      description: Phân loại kiểu gai lốp xe máy kéo theo các tiêu chuẩn nông nghiệp
        và công nghiệp.
    tree_shape:
      name: Hình dáng cây
      description: Mô tả hình bóng hoặc hình dáng tổng thể của một cây nhân tạo.
    trigger_type:
      name: Loại cò bấm
      description: Chỉ rõ cơ chế cò bấm được sử dụng để kiểm soát dòng nước trên vòi
        phun.
    trimmer_line_feed_system:
      name: Hệ thống cấp dây cước của máy cắt cỏ
      description: Xác định cách dây cắt được đẩy ra từ đầu cắt trong quá trình vận
        hành.
    trimmer_line_shape:
      name: Hình dạng dây cước máy cắt cỏ
      description: Mô tả hình dạng mặt cắt ngang của dây cước máy cắt cỏ, điều này
        ảnh hưởng đến hiệu suất cắt và tiếng ồn.
    turntable_type:
      name: Loại bàn xoay
      description: Xác định kiểu bề mặt nấu nướng, phân biệt giữa bàn xoay bằng kính
        xoay truyền thống và thiết kế đáy phẳng hoặc không xoay.
    ultrasonic_cleaner_accessories_included:
      name: Bao gồm phụ kiện máy làm sạch siêu âm
      description: Liệt kê các thành phần bổ sung được cung cấp kèm theo máy làm sạch
        để người mua biết chính xác những gì có trong hộp.
    umbrella_base_type:
      name: Loại đế dù
      description: Xác định kiểu cấu trúc hoặc thiết kế lắp đặt của đế dù.
    umbrella_opening_mechanism:
      name: Cơ chế mở dù
      description: Xác định cách mái che của dù được triển khai và thu lại.
    umbrella_type:
      name: Loại dù
      description: Chỉ rõ thiết kế tổng thể hoặc hình dáng của chiếc dù.
    upf_rating:
      name: Chỉ số UPF
      description: Cho biết chỉ số chống tia cực tím (UPF) của vải mái che ô che nắng,
        định lượng hiệu quả của nó trong việc ngăn chặn các tia UV có hại.
    utensil_flexibility:
      name: Độ linh hoạt của dụng cụ
      description: Cho biết thân dụng cụ nạo cứng hay linh hoạt như thế nào, ảnh hưởng
        đến sự phù hợp cho bát cong hoặc bột cứng.
    utensil_holder_features:
      name: Tính năng của giá cắm dụng cụ
      description: Mô tả các đặc tính chức năng đặc biệt của giá cắm dụng cụ nhà bếp.
    utensil_tray_features:
      name: Tính năng của khay đựng dụng cụ
      description: Nêu bật các đặc điểm đặc biệt làm tăng chức năng của khay.
    vacuum_hose_connection_type:
      name: Loại kết nối ống hút máy hút bụi
      description: Mô tả kiểu đầu nối ở các đầu ống, đảm bảo sự phù hợp về cơ khí
        chính xác với máy hút bụi hoặc phụ kiện.
    valance_style:
      name: Kiểu rèm lá ngang
      description: Xác định thiết kế trang trí của rèm lá ngang, giúp khách hàng chọn
        kiểu dáng phù hợp với nội thất của họ.
    valet_organizer_features:
      name: Đặc điểm của khay để đồ cá nhân
      description: Nêu bật các tính năng sắp xếp cụ thể được tích hợp vào khay sạc.
    valve_configuration:
      name: Cấu hình van
      description: Xác định kiểu chức năng của van vòi vườn, giúp người mua nhanh
        chóng chọn giải pháp phù hợp cho hệ thống tưới của họ.
    valve_stem_angle:
      name: Góc thân van
      description: Chỉ rõ hướng/góc của thân van so với ống, ảnh hưởng đến sự dễ dàng
        khi bơm căng và độ khớp với vành.
    vase_filler_type:
      name: Loại vòi rót bình hoa
      description: Phân loại sản phẩm theo loại vật liệu hoặc hình dạng vật liệu làm
        đầy cụ thể.
    vent_pipe_type:
      name: Loại ống thông hơi
      description: Phân loại kiểu cấu tạo của ống khói hoặc ống thông hơi.
    vent_style:
      name: Kiểu thông gió
      description: Phân loại kiểu cấu trúc hoặc mục đích của thành phần thông gió.
    waffle_style:
      name: Kiểu bánh quế
      description: Xác định lưới hoặc hoa văn bánh quế được tạo ra bởi các tấm khuôn.
    wallpaper_removal_type:
      name: Loại hình gỡ bỏ giấy dán tường
      description: Cho biết mức độ dễ dàng tháo gỡ khi trang trí lại.
    wallpaper_washability_rating:
      name: Chỉ số khả năng giặt rửa của giấy dán tường
      description: Xác định cách làm sạch bề mặt giấy dán tường sau khi đã dán xong.
    warmer_type:
      name: Loại thiết bị làm ấm
      description: Chỉ rõ cơ chế làm ấm chính hoặc mục đích sử dụng dự kiến của thiết
        bị làm ấm nến hoặc dầu.
    warmth_level:
      name: Mức độ ấm
      description: Phân loại mức độ ấm tổng thể hoặc sự phù hợp theo mùa của chăn
        bông hoặc chăn mền.
    warmth_rating:
      name: Mức độ ấm áp
      description: Cho biết mức độ cách nhiệt của một chiếc chăn, tương tự như chỉ
        số TOG trong bộ đồ giường.
    waste_container_lid_features:
      name: Tính năng nắp thùng rác
      description: Nêu bật các chức năng đặc biệt hoặc các cải tiến được tích hợp
        vào nắp.
    waste_container_sign_message:
      name: Thông điệp biển báo thùng rác
      description: Xác định luồng rác cụ thể hoặc văn bản cảnh báo được in trên nhãn
        hoặc biển báo.
    water_filtration_technology:
      name: Công nghệ lọc nước
      description: Mô tả công nghệ cốt lõi hoặc cơ chế được sử dụng để làm sạch nước.
    water_heater_element_connection_type:
      name: Loại kết nối bộ phận sưởi nước
      description: Xác định kiểu lắp đặt của bộ phận, phân biệt giữa kiểu bắt vít
        và các kiểu mặt bích khác nhau.
    water_sensor_design:
      name: Thiết kế cảm biến nước
      description: Chỉ rõ kiểu dáng vật lý của phần tử cảm biến nước.
    water_supply_type:
      name: Loại nguồn cấp nước
      description: Xác định cách thiết bị nhận nước, phân biệt giữa bình chứa đổ bằng
        tay và đường dẫn nước cố định.
    watering_needs:
      name: Nhu cầu tưới nước
      description: Mô tả các yêu cầu về nước điển hình của cây trồng.
    wax_paper_form:
      name: Hình thức giấy nến
      description: Chỉ rõ liệu giấy nến được bán dưới dạng cuộn liên tục hay dạng
        tờ cắt sẵn.
    weather_guard_mounting_method:
      name: Phương pháp gắn tấm chắn thời tiết
      description: Chỉ rõ cách tấm chắn gắn vào máng ăn hoặc cấu trúc hỗ trợ.
    wheel_bearing_type:
      name: Loại vòng bi bánh xe
      description: Xác định cấu tạo vòng bi hoặc ống lót bên trong của bánh xe, ảnh
        hưởng đến độ trơn tru khi lăn và các yêu cầu bảo trì.
    wheel_tread_style:
      name: Kiểu gai bánh xe
      description: Chỉ rõ thiết kế gai của bánh xe, điều này ảnh hưởng đến lực kéo,
        mức độ tiếng ồn và khả năng để lại dấu vết trên sàn.
    whistling:
      name: Tiếng còi
      description: Chỉ rõ liệu ấm đun nước có phát ra tiếng còi khi nước đạt đến điểm
        sôi hay không.
    wick_material:
      name: Chất liệu bấc
      description: 'Xác định thành phần của bấc được sử dụng (ví dụ: bông, sợi thủy
        tinh).'
    window_film_installation_surface:
      name: Bề mặt lắp đặt phim dán cửa sổ
      description: Chỉ rõ liệu phim được thiết kế để dán nội thất, ngoại thất, hay
        ứng dụng trên cả hai bề mặt.
    window_film_type:
      name: Loại phim dán cửa sổ
      description: 'Phân loại kiểu chức năng của phim (ví dụ: riêng tư so với an ninh).'
    window_rod_type:
      name: Loại thanh treo rèm cửa sổ
      description: Phân loại kiểu chức năng của thanh treo rèm.
    window_screen_type:
      name: Loại lưới cửa sổ
      description: Xác định kiểu cấu trúc hoặc phương pháp vận hành của lưới.
    window_treatment_lining_type:
      name: Loại lớp lót trang trí cửa sổ
      description: Cho biết liệu rèm lá ngang hoặc phào cửa sổ có được lót hay không
        và loại lớp lót nào được sử dụng.
    wine_aerator_type:
      name: Loại thiết bị sục khí rượu vang
      description: Chỉ rõ kích thước hoặc kiểu vận hành của máy sục khí rượu.
    wine_glass_style:
      name: Kiểu dáng ly rượu vang
      description: Chỉ rõ loại rượu dự kiến hoặc thiết kế ly để tối ưu hóa hương thơm
        và mùi vị.
    wok_bottom_type:
      name: Loại đáy chảo lòng sâu
      description: Xác định hình dạng của đáy chảo wok, xác định khả năng tương thích
        với các loại mặt bếp và vòng kiềng chảo khác nhau.
    wood_grain_orientation:
      name: Hướng vân gỗ
      description: Chỉ rõ hướng của vân gỗ trong sản phẩm, chẳng hạn như vân ngang,
        vân đứng, hoặc vân mặt. Hướng vân gỗ ảnh hưởng đến độ bền và sự thân thiện
        với dao.
    wood_seasoning_method:
      name: Phương pháp sấy gỗ
      description: Cho biết cách nhiên liệu gỗ được làm khô hoặc sấyảnh hưởng đến
        độ ẩm và chất lượng cháy.
    wrap_format:
      name: Định dạng màng bọc
      description: Chỉ rõ hình thức vật lý mà màng bọc thực phẩm được cung cấp, chẳng
        hạn như dạng cuộn hoặc dạng tờ cắt sẵn.
    abacus_bead_material:
      name: Vật liệu hạt bàn tính
      description: Vật liệu chính của các hạt bàn tính.
    abec_rating:
      name: Xếp hạng ABEC
      description: Chỉ rõ cấp độ chính xác của vòng bi dựa trên xếp hạng ABEC, cho
        biết độ trơn tru và mức dung sai.
    abrasive_level:
      name: Mức độ mài mòn
      description: Độ chịu mài mòn tương đối của hợp chất/chất đánh bóng trên bề mặt
        sơn ô tô.
    absinthe_accessories_included:
      name: Phụ kiện Absinthe đi kèm
      description: Liệt kê chi tiết các phụ kiện đi kèm trong bao bì sản phẩm, chẳng
        hạn như thìa, ly hoặc viên đường.
    ac_compressor_mounting_style:
      name: Kiểu lắp đặt máy nén điều hòa
      description: Mô tả kiểu lắp đặt/gắn cơ khí hoặc giao diện giá đỡ của máy nén
        với hệ truyền động của động cơ / phụ kiện.
    ac_compressor_oil_type:
      name: Loại dầu máy nén điều hòa
      description: Chỉ rõ thành phần hóa học của dầu bôi trơn cần thiết/được sử dụng
        bởi máy nén điều hòa (các loại phổ biến bao gồm PAG và POE).
    accent_modes:
      name: Chế độ tạo điểm nhấn
      description: Chỉ rõ cách máy đếm nhịp có thể nhấn mạnh các phách trong một ô
        nhịp (ngoài nhịp nhấn cơ bản).
    access_mechanism:
      name: Cơ chế tiếp cận
      description: Mô tả cách người dùng tiếp cận sàn ngủ trên gác lửng.
    accessibility_features:
      name: Tính năng hỗ trợ tiếp cận
      description: Chỉ rõ các thiết bị và cấu hình liên quan đến khả năng tiếp cận
        trên xe buýt nhỏ.
    accessories_included:
      name: Phụ kiện đi kèm
      description: 'Danh sách mặt hàng bổ sung; các sản phẩm đi kèm gói sản phẩm đi
        kèm ghế (ví dụ: ghế dài, gối thắt lưng), mang đến cho người mua sắm cái nhìn
        rõ ràng về giá trị gia tăng.'
    accessory_pieces_included:
      name: Các phụ kiện đi kèm
      description: Liệt kê các mục phụ kiện; sản phẩm đi kèm trong bộ quà tặng phụ
        kiện quần áo nhiều món hoặc gói sản phẩm.
    acoustic_amplifier_feedback_control_features:
      name: Tính năng điều khiển phản hồi của bộ khuếch đại âm thanh
      description: 'Biểu thị các công cụ chống phản hồi tích hợp sẵn cho các nhạc
        cụ âm thanh (ví dụ: bộ lọc notch, công tắc pha, triệt tiêu phản hồi tự động).'
    acoustic_drum_kit_components_included:
      name: Bao gồm các bộ linh kiện của bộ trống acoustic
      description: Cho biết những thành phần chính nào được bao gồm trong bộ (chỉ
        có vỏ trống so với cả bộ hoàn chỉnh; bao gồm cả chũm chọe/trang thiết bị).
    acoustic_guitar_body_shape:
      name: Hình dạng thân đàn guitar acoustic
      description: Mô tả hình dạng/đường nét thân đàn guitar acoustic ảnh hưởng đến
        âm thanh, sự thoải mái và cách sử dụng thông thường.
    acoustic_guitar_string_core_design:
      name: Thiết kế lõi của dây đàn guitar acoustic
      description: Cấu trúc lõi của dây quấn.
    acoustic_piano_key_material:
      name: Vật liệu phím đàn piano acoustic
      description: Chỉ rõ vật liệu chính được sử dụng cho bề mặt phím đàn piano/phím
        ngà.
    acoustic_piano_lid_type:
      name: Loại nắp đàn piano acoustic
      description: Chỉ rõ kiểu cơ chế nắp/vỏ được sử dụng trên đàn piano cơ (phân
        biệt giữa đàn grand và đàn upright có nắp đậy/vỏ trên).
    acoustic_piano_plate_frame_material:
      name: Vật liệu tấm/khung đàn piano acoustic
      description: Chỉ rõ vật liệu chính của khung/mặt phím đàn piano (khung đàn),
        thường là gang.
    acoustic_piano_soundboard_material:
      name: Vật liệu mặt cộng hưởng đàn piano acoustic
      description: Chỉ rõ vật liệu chính được sử dụng cho mặt cộng hưởng của đàn piano.
    action_figure_scale:
      name: Tỷ lệ mô hình hành động
      description: 'Cho biết tỷ lệ kích thước dành cho người sưu tầm (ví dụ: 1:12)
        mà phụ kiện này được thiết kế để phù hợp.'
    action_type:
      name: Loại hành động
      description: 'Mô tả cơ chế bắn hoặc lên cò của súng (ví dụ: kiểu khóa nòng,
        kiểu bẻ nòng, kiểu cần gạt).'
    actuation_mechanism:
      name: Cơ chế truyền động
      description: 'Cho biết cách cần gạt tác động lên hệ thống phanh: cơ khí hoàn
        toàn bằng cáp, thủy lực hoàn toàn, thủy lực điều khiển bằng cáp hoặc điện
        tử/không dây.'
    actuation_method:
      name: Phương thức kích hoạt
      description: Cơ chế kích hoạt hoặc xả áp của hệ thống dập tắt.
    adapter_orientation:
      name: Hướng bộ chuyển đổi
      description: 'Chỉ rõ góc hoặc cấu hình của bộ chuyển đổi van lốp xe đạp có ảnh
        hưởng đến khả năng tiếp cận bơm (ví dụ: thẳng, 90°).'
    additive_application_stage:
      name: Giai đoạn ứng dụng chất phụ gia
      description: Cho biết thời điểm sản phẩm dự kiến được sử dụng trong quy trình.
    adhesive_backing:
      name: Mặt sau có keo dính
      description: Liệu loại vải lụa in được có lớp keo dính ở mặt sau để dễ dàng
        bóc và dán ứng dụng hay không.
    adhesive_formulation:
      name: Công thức chất kết dính
      description: Chỉ rõ thành phần hóa học hoặc công thức của chất kết dính, chẳng
        hạn như cyanoacrylate hoặc epoxy.
    adhesive_sides:
      name: Mặt dính
      description: Cho biết liệu lớp keo dán nhiệt nằm ở một mặt hay cả hai mặt của
        băng keo/vải.
    adjunct_grain_processing_form:
      name: Hình thức chế biến ngũ cốc phụ gia
      description: 'Cho biết dạng vật lý/chế biến của ngũ cốc phụ gia được bán để
        sản xuất bia (ví dụ: dạng mảnh, dạng rang, dạng mạch nha, dạng thô).'
    adjustability_type:
      name: Loại khả năng điều chỉnh
      description: Chỉ rõ loại điều chỉnh mà thanh chống hỗ trợ, nếu có.
    adjustable_cup_mutes:
      name: Cốc giảm âm có thể điều chỉnh
      description: Cho biết cốc có thể điều chỉnh/tháo rời được hay không và kiểu
        điều chỉnh.
    adjustable_zones:
      name: Các khu vực có thể điều chỉnh
      description: Chỉ rõ những phần nào của đế có thể điều chỉnh độc lập.
    adjustment_type:
      name: Loại điều chỉnh
      description: Cho biết bộ điều chỉnh có thể điều chỉnh được hay không và cách
        thức điều chỉnh được thực hiện như thế nào.
    administration_method:
      name: Phương pháp sử dụng
      description: 'Cho biết cách thức đưa thuốc tẩy giun cho ngựa (ví dụ: uống hoặc
        tiêm), giúp người mua thuốc tuân thủ hướng dẫn của bác sĩ thú y và lựa chọn
        phương pháp sử dụng phù hợp.'
    advice_card_prompt_type:
      name: Loại lời nhắc trên thẻ tư vấn
      description: Loại lời nhắc được in trên thẻ (hoặc không có lời nhắc).
    aeration_method:
      name: Phương thức sục khí
      description: Mô tả loại hình sục khí được cung cấp hoặc hỗ trợ bởi thùng chứa,
        đảm bảo đủ oxy cho mồi sống.
    aero_package_components:
      name: Các thành phần của gói khí động học
      description: Cho biết các thành phần khí động học chính nào được lắp đặt trên
        xe (chọn tất cả các mục phù hợp).
    aerodynamic_elements_included:
      name: Các yếu tố khí động học được bao gồm
      description: Chỉ rõ các thành phần khí động học nào được bao gồm trên xe công
        thức (chọn tất cả các thành phần phù hợp nếu được hỗ trợ).
    aftertouch_support:
      name: Hỗ trợ Aftertouch
      description: Cho biết bộ điều khiển có hỗ trợ aftertouch (kênh hoặc đa âm) trên
        các phím/pad hay không.
    agave_content_classification:
      name: Phân loại hàm lượng agave
      description: Chỉ rõ xem rượu tequila được sản xuất từ 100% agave Blue Weber
        hay là loại mixto có chứa tối thiểu 51% đường agave.
    aida_cloth_count:
      name: Mật độ vải Aida
      description: Chỉ rõ mật độ vải Aida (số ô vuông/mũi khâu trên mỗi inch), yếu
        tố quyết định kích thước mũi khâu và tỷ lệ thiết kế.
    aida_cloth_pre_cut_format:
      name: Định dạng cắt sẵn vải Aida
      description: Cho biết vải Aida được bán dưới dạng mảnh cắt sẵn, mảnh cắt liền
        từ cuộn hoặc dạng cuộn.
    air_bag_material:
      name: Chất liệu túi khí
      description: Chỉ rõ vật liệu của túi khí/bình chứa được sử dụng với loại kèn
        Irish warpipe.
    air_bed_internal_construction:
      name: Cấu trúc bên trong của nệm hơi
      description: Mô tả cấu trúc hỗ trợ bên trong hoặc công nghệ được sử dụng bên
        trong nệm hơi để tạo sự thoải mái và ổn định.
    air_dry_clay_color_form:
      name: Đất sét tự khô tạo màu
      description: Liệu đất sét được bán sẵn màu, màu trắng/trung tính để vẽ hay dưới
        dạng hỗn hợp/nhiều màu.
    air_hockey_items_included:
      name: Sản phẩm chơi khúc côn cầu trên không bao gồm
      description: 'Liệt kê cụ thể các phụ kiện có trong một bộ để khách hàng biết
        chính xác những gì họ nhận được (ví dụ: 2 dụng cụ đẩy, 4 quả bóng, 2 miếng
        đệm nỉ).'
    air_intake_temperature_sensor_mounting_style:
      name: Kiểu lắp đặt cảm biến nhiệt độ khí nạp
      description: Kiểu lắp đặt vật lý của cảm biến IAT trong hệ thống nạp khí.
    air_integration_capability:
      name: Khả năng tích hợp khí nén
      description: Cho biết máy tính lặn có hỗ trợ bộ truyền áp suất bình khí không
        dây hay không và hỗ trợ như thế nào.
    air_mattress_valve_type:
      name: Loại van nệm hơi
      description: Chỉ rõ kiểu van mà phụ kiện phù hợp hoặc chứa, đảm bảo tính tương
        thích giữa bơm, van và các bộ phận sửa chữa.
    air_water_rocket_kit_items_included:
      name: Bộ sản phẩm tên lửa khí và nước bao gồm
      description: Các thành phần chính được bao gồm trong bộ tên lửa (bệ phóng, bơm,
        cánh, phụ tùng thay thế).
    air_water_rocket_launch_method:
      name: Phương pháp phóng tên lửa khí và nước
      description: Cách nạp khí/phóng tên lửa (sự tương tác của người dùng và kiểu
        thiết bị).
    airbag_position:
      name: Vị trí túi khí
      description: Chỉ rõ vị trí/vùng an toàn dự định mà bộ phận túi khí hỗ trợ.
    aircraft_ads_b_capability:
      name: Khả năng ADS-B của máy bay
      description: Chỉ rõ xem máy bay có được trang bị để tuân thủ tiêu chuẩn ADS-B
        Out hay không.
    aircraft_airframe_material:
      name: Vật liệu khung máy bay
      description: Vật liệu chính được sử dụng trong cấu tạo khung máy bay.
    aircraft_cabin_configuration:
      name: Cấu hình khoang hành khách máy bay
      description: 'Chỉ rõ bố cục khoang hành khách của máy bay (ví dụ: nhóm hội nghị,
        ghế dài, khoang bốn khu vực).'
    aircraft_documentation_included:
      name: Tài liệu máy bay kèm theo
      description: 'Liệt kê các tài liệu được cung cấp kèm theo phụ tùng (ví dụ: 8130-3).'
    aircraft_galley_configuration:
      name: Cấu hình bếp trên máy bay
      description: Sự hiện diện và loại tiện nghi nhà bếp/phục vụ ăn uống trong khoang
        hành khách.
    aircraft_installation_location:
      name: Vị trí lắp đặt trên máy bay
      description: Vị trí lắp đặt hoặc sử dụng phụ tùng hoặc phụ kiện trên máy bay.
    aircraft_internet_connection:
      name: Kết nối Internet trên máy bay
      description: Cho biết sự hiện diện/loại kết nối Internet trong khoang hành khách.
    aircraft_landing_gear_type:
      name: Loại càng hạ cánh của máy bay
      description: Chỉ rõ cấu hình càng hạ cánh của máy bay trực thăng.
    aircraft_lavatory_configuration:
      name: Cấu hình nhà vệ sinh trên máy bay
      description: Loại cấu hình nhà vệ sinh trên máy bay.
    aircraft_maintenance_program_enrollment:
      name: Đăng ký chương trình bảo dưỡng máy bay
      description: Cho biết máy bay có được đăng ký chương trình bảo dưỡng động cơ
        và/hoặc khung máy bay hay không, và nếu có, loại bảo hiểm nào được áp dụng
        (động cơ, khung máy bay hoặc cả hai).
    aircraft_operational_certification:
      name: Chứng nhận vận hành máy bay
      description: 'Chỉ rõ cơ sở chứng nhận quy định hoặc vận hành mà máy bay được
        vận hành (tùy thuộc vào khu vực pháp lý, ví dụ: FAA Phần 91/135/121, EASA
        AOC).'
    aircraft_protective_gear_certification:
      name: Chứng nhận trang bị bảo hộ máy bay
      description: Chỉ rõ tiêu chuẩn hàng không/quy định hoặc tiêu chuẩn ngành mà
        trang bị bảo hộ được chứng nhận đáp ứng.
    aircraft_system_application:
      name: Ứng dụng hệ thống máy bay
      description: Chỉ rõ bộ phận/phụ kiện thuộc hệ thống hoặc khu vực máy bay nào
        (được sử dụng để duyệt và lọc các bộ phận máy bay khác nhau).
    airflow_resistance_level:
      name: Mức độ kháng lực luồng khí
      description: Cho biết mức độ hạn chế của bộ giảm âm về áp suất ngược/kháng lực
        không khí.
    airship_envelope_material:
      name: Vật liệu vỏ khí cầu
      description: Vật liệu chính cấu tạo nên lớp vỏ (lớp ngoài) của khí cầu.
    airsoft_part_type:
      name: Loại bộ phận súng hơi
      description: 'Chỉ rõ loại linh kiện chức năng hoặc phụ kiện cho súng hơi (ví
        dụ: băng đạn, nòng súng, ốp tay cầm).'
    airworthiness_approval_basis:
      name: Cơ sở phê duyệt khả năng bay
      description: 'Chỉ rõ cơ sở phê duyệt/chứng nhận cho bộ phận nếu có (ví dụ: PMA,
        TSO, STC).'
    alarm_volume_adjustability:
      name: Khả năng điều chỉnh âm lượng báo động
      description: Cho biết liệu người dùng có thể điều chỉnh độ lớn của báo động
        hay không và cách thức điều chỉnh.
    alcohol_ink_finish_effect:
      name: Hiệu ứng hoàn thiện mực cồn
      description: Mô tả hiệu ứng/lớp hoàn thiện trực quan được tạo ra bởi công thức
        mực cồn (ngoài màu sắc), chẳng hạn như kim loại hoặc ngọc trai.
    alignment_aid_style:
      name: Kiểu hỗ trợ căn chỉnh
      description: 'Mô tả loại hướng dẫn căn chỉnh được in hoặc nhúng trên bề mặt
        thảm (ví dụ: đường thẳng, vạch khoảng cách).'
    alternator_cooling_type:
      name: Kiểu làm mát máy phát điện
      description: Mô tả cách máy phát điện được làm mát và thông gió.
    alternator_marine_ignition_protection_rating:
      name: Xếp hạng bảo vệ chống cháy nổ cho máy phát điện hàng hải
      description: 'Cho biết máy phát điện có được bảo vệ chống cháy nổ cho khoang
        động cơ hàng hải hay không (ví dụ: tuân thủ SAE J1171 / ISO 8846).'
    alternator_mounting_configuration:
      name: Cấu hình lắp đặt máy phát điện
      description: Chỉ rõ cấu hình lắp đặt vật lý được sử dụng để gắn máy phát điện
        vào giá đỡ động cơ.
    alternator_pulley_type:
      name: Loại puly máy phát điện
      description: Chỉ rõ thiết kế puly/ly hợp trên máy phát điện (hoặc cho biết không
        có puly).
    alternator_regulator_type:
      name: Loại bộ điều chỉnh điện áp máy phát điện
      description: Cho biết bộ điều chỉnh điện áp nằm bên trong máy phát điện hay
        bên ngoài, và liệu nó có được điều khiển bởi nhà sản xuất thiết bị gốc (điều
        khiển bằng máy tính/PCM) hay không.
    alternator_terminal_connection_type:
      name: Kiểu kết nối đầu cuối máy phát điện
      description: Kiểu kết nối điện chính cho các đầu cuối đầu ra/kích thích của
        máy phát điện để giúp đảm bảo khả năng tương thích của bộ dây dẫn.
    altitude_suitability:
      name: Khả năng thích ứng với độ cao
      description: Cho biết liệu quả bóng có được thiết kế cho các điều kiện độ cao
        cụ thể hay không, điều này ảnh hưởng đến tốc độ và độ nảy.
    ambulance_stretcher_mount_type:
      name: Loại giá đỡ cáng cứu thương
      description: Chỉ rõ loại hệ thống tải/lắp cáng được xe cứu thương hỗ trợ.
    american_football_safety_certification:
      name: Chứng nhận an toàn bóng bầu dục Mỹ
      description: Cho biết các chứng nhận hoặc tiêu chuẩn an toàn dành riêng cho
        bóng bầu dục Mỹ mà sản phẩm đáp ứng.
    amplifier_tube_function:
      name: Chức năng của bóng khuếch đại
      description: 'Chỉ rõ vai trò chức năng của bóng trong mạch khuếch đại nhạc cụ
        (ví dụ: tiền khuếch đại so với khuếch đại công suất).'
    analog_synthesizer_cv_gate_i_o:
      name: Đầu vào/đầu ra CV/Gate của bộ tổng hợp âm thanh tương tự
      description: Cho biết các loại kết nối điện áp điều khiển và cổng được hỗ trợ
        để tích hợp với thiết bị mô-đun/tương tự.
    analog_synthesizer_keybed_configuration:
      name: Cấu hình bàn phím của bộ tổng hợp âm thanh tương tự
      description: Mô tả xem bộ tổng hợp có bao gồm bàn phím tích hợp hay không và
        nếu có, số lượng phím.
    anchor_configuration:
      name: Cấu hình điểm neo
      description: Cho biết hệ thống treo sử dụng một điểm neo tập trung duy nhất
        hay nhiều điểm neo độc lập, ảnh hưởng đến sự đa dạng bài tập và độ phức tạp
        khi thiết lập.
    animal_raising_method:
      name: Phương pháp chăn nuôi động vật
      description: Mô tả các phương pháp chăn nuôi hoặc nuôi dưỡng được sử dụng cho
        động vật nguồn.
    animal_species:
      name: Loài động vật
      description: 'Chỉ rõ loài động vật hoặc sinh vật được thể hiện bởi thú nhồi
        bông (ví dụ: gấu, thỏ, khủng long).'
    animal_trap_jaw_style:
      name: Kiểu hàm bẫy động vật
      description: Cấu hình của hàm bẫy, ảnh hưởng đến lực giữ và sức khỏe của động
        vật.
    animal_trap_type:
      name: Loại bẫy động vật
      description: Phân loại kiểu/thiết kế cơ khí của bẫy, cho phép người mua sắm
        nhanh chóng tìm thấy phương pháp bẫy chính xác mà họ cần hoặc được quy định
        cho phép.
    ankle_collar_style:
      name: Kiểu cổ giày
      description: Mô tả kiểu dáng hoặc cấu tạo của cổ giày, chẳng hạn như cổ thấp,
        cổ trung bình, cổ cao, cổ kiểu tất hoặc không dây buộc, ảnh hưởng đến độ nâng
        đỡ, độ vừa vặn và tính thẩm mỹ.
    ankle_guard_protection_level:
      name: Mức độ bảo vệ của miếng bảo vệ mắt cá chân
      description: Đánh giá mức độ bảo vệ tổng thể khỏi tác động mà miếng bảo vệ mắt
        cá chân cung cấp.
    ankle_strap_padding_type:
      name: Loại đệm dây đeo mắt cá chân
      description: Mô tả vật liệu đệm hoặc phương pháp đệm được sử dụng bên trong
        dây đeo ảnh hưởng đến sự thoải mái.
    ankle_strap_type:
      name: Loại quai cổ chân
      description: Phân loại cấu tạo hoặc thiết kế của dây đeo mắt cá chân của ván
        trượt tuyết.
    ant_farm_habitat_medium_type:
      name: Loại môi trường sống của trang trại kiến
      description: Chỉ rõ môi trường đào hầm/quan sát chính được cung cấp hoặc yêu
        cầu bởi trang trại kiến.
    ant_farm_kit_contents:
      name: Nội dung bộ dụng cụ trang trại kiến
      description: 'Chỉ rõ các thành phần được bao gồm trong bộ dụng cụ trang trại
        kiến (ví dụ: hộp đựng môi trường sống, cát/gel, mẫu kiến, dụng cụ cho ăn).'
    ant_farm_lighting_type:
      name: Loại chiếu sáng cho trang trại kiến
      description: Chỉ rõ loại đèn/chiếu sáng tích hợp (nếu có) được sử dụng để quan
        sát.
    antenna_fit_type:
      name: Kiểu lắp đặt ăng-ten
      description: Hình dạng ăng-ten mà quả cầu ăng-ten được thiết kế để phù hợp.
    anti_caking_agent:
      name: Chất chống vón cục
      description: Chỉ rõ loại chất chống vón cục được thêm vào để ngăn ngừa vón cục,
        thông tin quan trọng cho các cân nhắc về dị ứng và độ chính xác của công thức.
    anti_g_suit_bladder_material:
      name: Vật liệu túi khí bên trong bộ đồ chống trọng lực
      description: Vật liệu được sử dụng cho (các) túi khí bơm hơi bên trong bộ đồ
        chống trọng lực; liệt kê tất cả các vật liệu áp dụng nếu sử dụng nhiều vật
        liệu.
    anti_g_suit_connector_type:
      name: Loại đầu nối bộ đồ chống trọng lực
      description: Chỉ rõ kiểu/tiêu chuẩn của đầu nối ống dẫn khí/áp suất được sử
        dụng để kết nối với máy bay hoặc bộ điều chỉnh.
    anti_g_suit_inflation_method:
      name: Phương pháp bơm hơi bộ đồ chống trọng lực
      description: Cho biết cách các túi khí của bộ đồ được bơm áp suất để cung cấp
        khả năng bảo vệ chống trọng lực.
    anti_g_suit_size_system:
      name: Hệ thống kích cỡ bộ đồ chống trọng lực
      description: Tiêu chuẩn kích cỡ được sử dụng để xác định hệ thống kích cỡ/độ
        vừa vặn của bộ đồ.
    anti_reverse_type:
      name: Loại chống đảo chiều
      description: Chỉ rõ loại cơ chế chống đảo chiều được cung cấp, ảnh hưởng đến
        việc cài móc và độ rơ.
    anti_theft_feature:
      name: Tính năng chống trộm
      description: Chỉ rõ liệu giá đỡ/kẹp có cung cấp tính năng chống trộm như khóa
        cài hoặc thiết kế chống giả mạo hay không.
    antique_gun_ignition_system:
      name: Hệ thống đánh lửa súng cổ
      description: Chỉ rõ hệ thống bắn/đánh lửa lịch sử được sử dụng bởi súng cổ.
    apple_variety:
      name: Giống táo
      description: 'Chỉ rõ giống hoặc loại táo (ví dụ: Gala, Fuji, Granny Smith),
        giúp khách hàng lựa chọn dựa trên hương vị, kết cấu và mục đích sử dụng trong
        ẩm thực.'
    applique_edge_finish:
      name: Hoàn thiện cạnh thêu đắp
      description: Mô tả cách hoàn thiện các cạnh, ảnh hưởng đến vẻ ngoài và khả năng
        chống sờn.
    arbor_type:
      name: Loại trục cuộn dây
      description: Phân loại cuộn dây theo thiết kế trục cuộn dây, ảnh hưởng đến tốc
        độ thu dây, dung lượng chứa dây và độ nhớ dây.
    archery_accessory_type:
      name: Loại phụ kiện bắn cung
      description: Chỉ rõ loại phụ kiện dành cho dụng cụ bắn cung để người mua có
        thể nhanh chóng lọc sản phẩm.
    archery_part_type:
      name: Loại linh kiện bắn cung
      description: 'Xác định trang thiết bị hoặc bộ phận thay thế cụ thể đang được
        bán (ví dụ: tay cầm, cánh cung, dây cung), cho phép lọc chính xác mà không
        cần mở rộng cây danh mục.'
    archery_range_accessory_type:
      name: Loại phụ kiện sân bắn cung
      description: Phân loại loại phụ kiện cụ thể được sử dụng trên sân bắn cung,
        cho phép người mua nhanh chóng lọc ra mặt hàng chính xác họ cần.
    archery_target_features:
      name: Tính năng bia bắn cung
      description: 'Liệt kê các tính năng hiệu suất hoặc tiện lợi chuyên dụng không
        được đề cập trong các thuộc tính khác (ví dụ: bọt tự phục hồi, tay cầm).'
    archery_tool_type:
      name: Loại dụng cụ bắn cung
      description: Phân loại loại dụng cụ hoặc thiết bị bắn cung cụ thể.
    armband_features:
      name: Tính năng băng tay
      description: Liệt kê các tính năng chức năng hoặc hình ảnh đặc biệt giúp tăng
        cường băng tay.
    armguard_style:
      name: Kiểu dáng tấm bảo vệ tay
      description: Xác định kiểu dáng hoặc hình dạng của tấm bảo vệ tay, cung cấp
        thông tin chi tiết về phạm vi thiết kế và kiểu dáng truyền thống so với hiện
        đại.
    armor_protection_type:
      name: Loại bảo vệ của giáp
      description: Loại bảo vệ được cung cấp bởi hệ thống giáp xe.
    armrest_adjustability:
      name: Khả năng điều chỉnh tay vịn
      description: 'Xác định khả năng điều chỉnh kích thước và cấu hình của tay vịn
        ghế (ví dụ: cố định, 2D, 3D, gập lên).'
    armrest_type:
      name: Loại tay vịn
      description: 'Mô tả tình trạng và khả năng điều chỉnh của tay vịn trên ghế (ví
        dụ: không có tay vịn, cố định, có thể điều chỉnh, có thể tháo rời).'
    arrow_bolt_point_type:
      name: Loại đầu mũi tên/bu lông
      description: Xác định kiểu đầu mũi tên hoặc bu lông được lắp đặt.
    arrow_component_type:
      name: Loại linh kiện mũi tên
      description: Phân loại bộ phận hoặc phụ kiện cụ thể cho mũi tên (miếng chèn,
        lớp bọc, ống lót, keo, v.v.) để khách hàng có thể lọc các mặt hàng mà không
        cần hàng tá danh mục phụ bổ sung.
    arrow_containment_level:
      name: Mức độ chứa mũi tên
      description: Mô tả xem phần còn lại chứa hoàn toàn, chứa một phần hay không
        chứa mũi tên.
    arrow_fletching_orientation:
      name: Hướng lông đuôi tên
      description: 'Chỉ rõ hướng cánh hoặc độ lệch của lông đuôi (ví dụ: cánh trái,
        cánh phải, xoắn ốc) quyết định hướng quay của mũi tên.'
    arrow_nock_groove_size:
      name: Kích thước rãnh dây cung
      description: Chỉ rõ phân loại kích thước của rãnh/cổ dây cung, xác định khả
        năng tương thích với các đường kính dây cung khác nhau.
    arrow_nock_type:
      name: Loại đuôi tên
      description: Thiết kế/kiểu dáng của đuôi tên tiếp xúc với dây cung.
    arrow_rest_style:
      name: Kiểu giá đỡ mũi tên
      description: 'Chỉ rõ kiểu dáng/cơ chế hoạt động của giá đỡ mũi tên (ví dụ: kiểu
        rơi xuống, kiểu lưỡi dao, kiểu bánh quy râu). Kiểu dáng xác định cách giá
        đỡ hỗ trợ, giữ và thả mũi tên và là cách chính để người mua hàng phân biệt
        các sản phẩm.'
    arrow_shaft_compatibility:
      name: Khả năng tương thích với trục mũi tên
      description: 'Cho biết tiêu chuẩn trục/ống lót mũi tên mà đuôi tên có đèn phù
        hợp (ví dụ: X, H, S, GT).'
    art_crafting_tool_tip_style:
      name: Kiểu đầu dụng cụ nghệ thuật/thủ công
      description: 'Mô tả hình dạng/hình dạng của đầu dụng cụ (ví dụ: nhọn so với
        hình cầu tròn) để chỉ ra loại dấu dập nổi mà nó tạo ra.'
    art_ink_lightfastness_rating:
      name: Độ bền màu của mực in nghệ thuật
      description: Cho biết khả năng chống phai màu của mực khi tiếp xúc với ánh sáng,
        thường được thể hiện bằng các xếp hạng tiêu chuẩn.
    art_ink_opacity:
      name: Độ che phủ của mực in nghệ thuật
      description: Cho biết mức độ che phủ của mực sau khi sử dụng.
    art_security_rating:
      name: Xếp hạng bảo mật ART
      description: Chỉ rõ xếp hạng sao ART của Hà Lan (1-5 sao) mà khóa nhận được.
    artichoke_cut:
      name: Kiểu cắt atiso
      description: 'Cho biết phần hoặc cách chế biến nào của atiso được cung cấp (ví
        dụ: nguyên củ, lõi, gốc), để khách hàng hiểu được sản lượng và ứng dụng ẩm
        thực dự định.'
    artichoke_variety:
      name: Loại atiso
      description: Chỉ rõ giống hoặc chủng loại thực vật của atiso để giúp người mua
        phân biệt giữa các kích cỡ, màu sắc, hương vị và công dụng trong ẩm thực.
    articulation_features:
      name: Đặc điểm khớp nối
      description: Cho biết mô hình khủng long có các bộ phận chuyển động (hàm, chân
        tay, đuôi có thể điều chỉnh) và khả năng tạo dáng tổng thể hay không.
    artificial_bait_form:
      name: Hình dạng mồi nhân tạo
      description: Cho biết hình dạng vật lý hoặc kiểu trình bày của mồi câu cá.
    asa_mounting_type:
      name: Kiểu ngàm gắn ASA
      description: 'Cho biết kiểu giao diện Bộ chuyển đổi nguồn khí (ASA) hoặc tiêu
        chuẩn lắp đặt mà thiết bị tập luyện thả xuống sử dụng (ví dụ: kiểu đuôi én,
        kiểu ray, kiểu lắp trực tiếp).'
    ascender_descender_type:
      name: Loại thiết bị leo/xuống
      description: Phân loại kiểu thiết bị leo hoặc xuống để lọc chính xác hơn.
    aspiration_type:
      name: Loại hút khí
      description: Cho biết cách động cơ được hút/tăng áp.
    assembly_state:
      name: Trạng thái lắp ráp
      description: Cho biết liệu tủ được vận chuyển ở dạng chưa lắp ráp, đã lắp ráp
        sẵn hoặc ở dạng khác.
    assistance_mechanism:
      name: Cơ chế hỗ trợ
      description: Chỉ rõ bất kỳ hệ thống hỗ trợ hoặc kháng lực tích hợp nào mà tháp
        tập luyện cung cấp cho các bài tập kéo xà, nhúng người hoặc các bài tập khác.
    atemoya_cultivar:
      name: Giống cây Atemoya
      description: Chỉ rõ giống/loại cây atemoa cụ thể, cho phép người mua lựa chọn
        trái cây có hương vị, kích thước hoặc đặc điểm hạt mà họ ưa thích.
    athletic_cup_size:
      name: Kích thước cốc bảo vệ
      description: Cho biết kích thước cốc bảo vệ do nhà sản xuất quy định để đảm
        bảo vừa vặn với vận động viên.
    attachment_position:
      name: Vị trí gắn/Vị trí kết nối
      description: Chỉ rõ vị trí gắn túi trên yên xe hoặc người lái.
    attractant_scent_profile:
      name: Mùi hương thu hút
      description: Mô tả mùi hoặc vị cụ thể được sử dụng để thu hút động vật hoang
        dã hoặc che giấu mùi cơ thể người.
    atv_utv_intended_use:
      name: Mục đích sử dụng ATV/UTV
      description: Mục đích sử dụng/kiểu dáng chính của ATV/UTV.
    audio_channel_configuration:
      name: Cấu hình kênh âm thanh
      description: 'Số lượng kênh âm thanh riêng biệt mà bộ cân bằng/DSP hỗ trợ (ví
        dụ: âm thanh nổi 2 kênh, 4 kênh trước/sau, 6 kênh).'
    audio_inputs:
      name: Đầu vào âm thanh
      description: 'Chỉ rõ các loại kết nối đầu vào âm thanh có sẵn để lấy mẫu/ghi
        âm (ví dụ: 1/4 inch, XLR, 3.5 mm, tiền khuếch đại micro, phono).'
    audio_output:
      name: Đầu ra âm thanh
      description: Cho biết đồ chơi có phát ra âm thanh hay không và cách thức truyền
        tải âm thanh.
    audio_outputs:
      name: Các đầu ra âm thanh
      description: Chỉ rõ các kết nối đầu ra âm thanh có sẵn, bao gồm đầu ra chính
        và bất kỳ đầu ra phụ/có thể gán nào.
    audio_playback_source:
      name: Nguồn phát lại âm thanh
      description: Các nguồn phương tiện chính mà bộ karaoke có thể phát nhạc.
    autograph_authentication:
      name: Xác thực chữ ký
      description: Cho biết trạng thái/loại xác thực của chữ ký trên thẻ.
    autograph_format:
      name: Định dạng chữ ký
      description: Mô tả xem chữ ký là chữ ký tay gốc, bản sao in/đóng dấu hay chữ
        viết thêm/ghi chú.
    autogyro_cockpit_enclosure:
      name: Khoang lái máy bay trực thăng tự quay
      description: Chỉ rõ xem khoang lái là mở hay kín.
    available_firing_modes:
      name: Các chế độ bắn có sẵn
      description: Liệt kê các chế độ bắn có thể lựa chọn mà máy bắn bi hỗ trợ ngay
        từ đầu.
    avocado_variety:
      name: Giống bơ
      description: Chỉ rõ giống hoặc loại bơ, giúp người mua phân biệt sự khác biệt
        về hương vị, kết cấu, kích thước và hàm lượng dầu.
    award_customization_included:
      name: Bao gồm tùy chỉnh giải thưởng
      description: Cho biết những tùy chỉnh/cá nhân hóa nào được bao gồm khi mua giải
        thưởng.
    award_material:
      name: Nội dung giải thưởng
      description: Chỉ rõ nội dung chính của vật phẩm giải thưởng (cúp, bảng kỷ niệm,
        huy chương, ghim cài, ruy băng).
    award_mounting_display_type:
      name: Kiểu gắn/trưng bày giải thưởng
      description: Chỉ rõ cách thức giải thưởng được trưng bày hoặc gắn (treo tường,
        để bàn hay đeo được).
    award_plaque_plate_material:
      name: Chất liệu tấm bảng giải thưởng
      description: Chỉ rõ chất liệu của tấm bảng tên/tấm khắc được gắn vào bảng giải
        thưởng (khác với chất liệu nền).
    award_ribbon_attachment_type:
      name: Kiểu gắn ruy băng giải thưởng
      description: Chỉ rõ cách thức ruy băng được gắn hoặc đeo.
    award_ribbon_imprint_method:
      name: Phương pháp in ruy băng giải thưởng
      description: Chỉ rõ cách thức in chữ/hình ảnh lên ruy băng.
    award_ribbon_material:
      name: Chất liệu ruy băng giải thưởng
      description: 'Chất liệu chính của vải ruy băng (ví dụ: satin, polyester).'
    award_ribbon_placement_title:
      name: Vị trí/tiêu đề ruy băng giải thưởng
      description: 'Vị trí hoặc tiêu đề tiêu chuẩn được thể hiện bởi ruy băng (ví
        dụ: giải nhất, người tham gia).'
    axle_compatibility:
      name: Khả năng tương thích trục
      description: Cho biết tiêu chuẩn trục mà bánh xe phù hợp, đảm bảo khả năng tương
        thích với khung và càng xe đạp.
    back_beam_type:
      name: Loại thanh đỡ phía sau
      description: 'Loại/khả năng điều chỉnh của thanh đỡ phía sau (ví dụ: trơn hoặc
        có thể điều chỉnh độ cao).'
    back_design:
      name: Thiết kế mặt sau
      description: Chỉ rõ các chi tiết đáng chú ý ở phần lưng của trang phục, ảnh
        hưởng đến kiểu dáng và khả năng nâng đỡ.
    back_panel_type:
      name: Loại tấm lưng
      description: Chỉ định kiểu dáng hoặc chất liệu của tấm lưng tủ, ảnh hưởng đến
        khả năng hiển thị và sự phù hợp với nội thất.
    back_sides_material:
      name: Chất liệu mặt sau và hai bên
      description: Chỉ rõ chất liệu được sử dụng cho mặt sau và hai bên thân đàn guitar
        cổ điển.
    backing_type:
      name: Loại lớp lót mặt sau
      description: Mô tả kiểu đế/kiểu gắn của miếng đá đính kèm đang được bán (đối
        với các sản phẩm tự dính).
    backup_camera_mounting_location:
      name: Vị trí lắp đặt camera lùi
      description: Cho biết vị trí dự kiến lắp đặt camera lùi trên xe.
    backup_camera_video_interface:
      name: Giao diện video camera lùi
      description: 'Chỉ định đầu ra/giao diện/đầu nối video được camera lùi sử dụng
        để kết nối với màn hình, DVR hoặc bộ phận điều khiển trung tâm (ví dụ: RCA
        tổng hợp, LVDS OEM, IP qua Ethernet).'
    badminton_set_components_included:
      name: Các thành phần bộ cầu lông đi kèm
      description: Liệt kê các mặt hàng riêng lẻ được cung cấp trong một bộ cầu lông.
    bag_attachment_method:
      name: Phương thức gắn túi
      description: 'Cho biết phương pháp chính được sử dụng để gắn túi/giá đỡ nước
        uống vào các thiết bị khác (ví dụ: dây đeo MOLLE, vòng đeo thắt lưng, móc
        khóa).'
    bag_case_carrying_style:
      name: Kiểu dáng mang túi/vỏ
      description: Chỉ rõ kiểu dáng mang tổng thể chính của túi/vỏ (cách thức thiết
        kế để mang).
    bag_cover_material:
      name: Chất liệu vỏ bọc túi
      description: Chỉ rõ chất liệu của vỏ túi (vỏ ngoài), ảnh hưởng đến độ bền, độ
        bám và vẻ ngoài.
    bag_embellishment:
      name: Trang trí túi
      description: Mô tả các yếu tố trang trí nổi bật được áp dụng cho bên ngoài túi,
        chẳng hạn như tua rua, đinh tán hoặc đường may chần.
    bag_fill_medium:
      name: Chất liệu làm đầy túi
      description: 'Chỉ rõ chất được sử dụng để làm đầy hoặc tạo áp suất cho túi (ví
        dụ: không khí, nước, cát).'
    bag_material:
      name: Chất liệu túi
      description: Vật liệu cấu tạo nên túi khí/màng khí.
    bag_padding_level:
      name: Mức độ đệm của túi
      description: Chỉ rõ mức độ hoặc kiểu đệm được tích hợp vào túi hoặc vỏ.
    bag_size_descriptor:
      name: Mô tả kích thước túi
      description: 'Phân loại kích thước tiếp thị cho túi xô (ví dụ: mini, lớn) bổ
        sung cho kích thước chính xác.'
    bagel_size:
      name: Kích thước túi
      description: 'Xác định kích thước chung của túi, ví dụ: mini, mỏng, tiêu chuẩn,
        lớn, cực lớn hoặc khổng lồ.'
    bagpipe_accessories_included:
      name: Phụ kiện kèn túi đi kèm
      description: 'Liệt kê các thành phần/phụ kiện chính đi kèm với kèn túi (ngoài
        các ống kèn chính), ví dụ: hộp đựng, ống thổi tập, vỏ bọc, dây, bộ lọc ẩm.'
    bagpipes_playing_mode:
      name: Chế độ chơi kèn túi
      description: Cách cung cấp khí cho nhạc cụ trong khi chơi.
    bait_compatibility:
      name: Độ tương thích của mồi nhử
      description: Liệt kê các loại mồi mà phụ kiện viên nén được thiết kế để sử dụng
        cùng, giúp người câu cá đảm bảo công cụ đã chọn phù hợp với loại mồi ưa thích
        của họ.
    bait_species:
      name: Loại mồi câu
      description: Xác định sinh vật chính được dùng làm mồi câu, giúp người câu cá
        đảm bảo tính hợp pháp và hiệu quả đối với loài mục tiêu.
    baking_chip_form:
      name: Hình dạng vụn bánh quy
      description: Mô tả kích thước hoặc hình dạng vật lý của vụn bánh quy, ảnh hưởng
        đến quá trình tan chảy và hình thức của món ăn.
    balance_board_style:
      name: Kiểu ván thăng bằng
      description: Phân loại ván thăng bằng theo cơ chế hoặc kiểu cấu tạo để chỉ ra
        cách ván di chuyển và thử thách luyện tập mà nó mang lại.
    balance_cushion_accessories_included:
      name: Phụ kiện đệm cân bằng đi kèm
      description: Liệt kê bất kỳ phụ kiện nào được đóng gói cùng với đệm, cho phép
        người mua so sánh giá trị gói sản phẩm.
    balance_type:
      name: Loại cân bằng
      description: 'Cho biết trạng thái/cấp độ cân bằng của trục truyền động khi bán
        (ví dụ: cân bằng tại nhà máy, cân bằng tốc độ cao, không cân bằng).'
    ball_bladder_material:
      name: Chất liệu ruột bóng
      description: Chỉ rõ chất liệu được sử dụng cho ruột bóng bên trong của quả bóng
        ném, ảnh hưởng đến khả năng giữ khí, độ nảy và độ bền tổng thể.
    ball_certification:
      name: Chứng nhận bóng
      description: Cho biết các chứng nhận hoặc phê duyệt hiệu suất chính thức mà
        quả bóng đã đạt được.
    ball_construction:
      name: Cấu trúc bóng
      description: Cho biết phương pháp sản xuất được sử dụng để ghép các tấm của
        quả bóng, ảnh hưởng đến độ bền, cảm giác chạm, khả năng thấm nước và giá cả.
    ball_core_construction:
      name: Cấu trúc lõi bóng
      description: Mô tả chi tiết cấu tạo bên trong của quả bóng, ảnh hưởng đến độ
        nảy và cảm giác.
    ball_core_type:
      name: Loại lõi bóng
      description: Cho biết cấu trúc bên trong của quả bóng, ảnh hưởng đến độ nảy
        và phân bố trọng lượng.
    ball_cup_game_included_pieces:
      name: Các bộ phận đi kèm trò chơi bóng và cốc
      description: Xác định các thành phần được bao gồm trong gói sản phẩm cho trò
        chơi bóng và cốc.
    ball_drilling_state:
      name: Trạng thái khoan lỗ trên bóng
      description: Cho biết liệu có lỗ ngón tay được khoan trên bóng hay không và
        nếu có, ở mức độ nào.
    ball_holder_type:
      name: Loại giá đỡ bóng
      description: Xác định kiểu dáng cấu trúc hoặc hình dạng của giá đỡ bóng.
    ball_pit_ball_surface_finish:
      name: Bề mặt hoàn thiện của bể bóng
      description: Mô tả độ hoàn thiện về mặt xúc giác/thị giác của bề mặt quả bóng,
        ảnh hưởng đến độ bám, cảm giác khi chơi và việc vệ sinh.
    ball_pit_safety_features:
      name: Các tính năng an toàn của bể bóng
      description: Các tính năng thiết kế liên quan đến an toàn trong bể bóng.
    ball_pump_accessory_type:
      name: Loại phụ kiện bơm bóng
      description: Chỉ rõ loại phụ kiện bơm bóng cụ thể để thương nhân có thể dán
        nhãn đồng hồ đo áp suất, ống dẫn, chất bôi trơn và các phụ kiện khác trong
        cùng một danh mục.
    ball_return_mechanism:
      name: Cơ chế trả bóng
      description: Chỉ định kiểu trả bóng được tích hợp trong thảm, nếu có.
    ball_return_type:
      name: Loại hệ thống trả bóng
      description: Loại túi/hệ thống trả bóng thu gom bóng trong khi chơi.
    ball_speed_rating:
      name: Xếp hạng tốc độ bóng
      description: Danh mục tốc độ do nhà sản xuất chỉ định cho biết tốc độ bóng chơi
        trong điều kiện tiêu chuẩn.
    ball_surface_texture:
      name: Vân bề mặt bóng
      description: Mô tả kết cấu bên ngoài hoặc hoa văn sọc của bóng, có thể ảnh hưởng
        đến độ bám và tính thẩm mỹ.
    ball_surface_type:
      name: Loại bề mặt bóng
      description: Mô tả lớp hoàn thiện bên ngoài hoặc lớp đệm của bóng để chỉ ra
        cảm giác va chạm và độ bám.
    ballonet_configuration:
      name: Cấu hình túi khí nhỏ
      description: Loại/cấu hình hệ thống lưới bóng được sử dụng để điều chỉnh và
        quản lý áp suất (đối với khí cầu không cứng/bán cứng).
    balloon_closure_valve_type:
      name: Loại van/mở bóng bay
      description: 'Chỉ rõ cách bóng bay được bịt kín sau khi bơm hơi (ví dụ: buộc
        dây, van tự bịt kín).'
    balloon_kit_finish:
      name: Hoàn thiện của bộ bóng bay
      description: Mô tả bề mặt/hình thức hoàn thiện của các bóng bay có trong bộ.
    balloon_kit_material:
      name: Chất liệu bộ bóng bay
      description: Chỉ định chất liệu chính của các bóng bay có trong bộ.
    banana_variety:
      name: Giống chuối
      description: Nêu rõ giống hoặc loại chuối được cung cấp.
    banjo_head_type:
      name: Loại mặt đàn banjo
      description: Loại/chất liệu của mặt đàn banjo, ảnh hưởng đến độ sáng, âm lượng
        và cảm giác khi chơi.
    banjo_neck_material:
      name: Chất liệu cần đàn Banjo
      description: Chất liệu của cần đàn, ảnh hưởng đến cảm giác, độ ổn định và âm
        sắc.
    banjo_pickup_configuration:
      name: Cấu hình bộ thu âm banjo
      description: Cho biết đàn banjo có tích hợp bộ thu âm hay không và công nghệ
        thu âm chung mà nó sử dụng.
    banjo_rim_material:
      name: Chất liệu vành đàn banjo
      description: Chất liệu của vành/thân đàn (phần tròn), ảnh hưởng mạnh đến âm
        sắc và trọng lượng.
    banjo_tone_ring_type:
      name: Loại vòng cộng hưởng âm thanh banjo
      description: Chỉ định thiết kế/chất liệu của vòng cộng hưởng âm thanh banjo,
        định hình âm sắc và âm lượng.
    banjo_tuning_machine_type:
      name: Loại bộ chỉnh dây đàn banjo
      description: Loại bộ chỉnh dây được sử dụng trên đàn banjo.
    banknote_authentication_grading:
      name: Xác thực/phân loại tiền giấy
      description: Dịch vụ bên thứ ba (nếu có) đã xác thực/phân loại tiền giấy.
    banknote_grade:
      name: Phân loại tiền giấy
      description: Phân loại tiền giấy tiêu chuẩn theo thang điểm sưu tập tiền giấy.
    banknote_holder_type:
      name: Loại hộp đựng tiền giấy
      description: 'Cho biết tình trạng vật lý của tiền giấy (ví dụ: tiền rời so với
        hộp đựng được phân loại).'
    banknote_material:
      name: Chất liệu tiền giấy
      description: Chất liệu/Vật liệu chính của tiền giấy.
    banknote_security_features:
      name: Tính năng bảo an của tiền giấy
      description: Các đặc điểm bảo mật/thiết kế đáng chú ý có trên tiền giấy.
    banknote_serial_number_type:
      name: Loại số sê-ri tiền giấy
      description: Cho biết liệu số sê-ri có tồn tại hay không và/hoặc có đặc điểm
        sưu tầm đặc biệt nào không (không phải là số sê-ri thực tế).
    banner_display_location:
      name: Vị trí trưng bày biểu ngữ
      description: 'Chỉ rõ vị trí đặt biểu ngữ dự định (ví dụ: cửa ra vào, tường,
        phông nền bàn).'
    banner_hanging_hardware_type:
      name: Loại trang thiết bị treo biểu ngữ
      description: 'Chỉ rõ các trang thiết bị treo/gắn chính được tích hợp hoặc đi
        kèm với biểu ngữ (ví dụ: khoen, ống luồn cột, dây thừng).'
    banner_message_type:
      name: Loại thông điệp trên biểu ngữ
      description: Cho biết văn bản/thông điệp trên biểu ngữ được in sẵn (cố định)
        hay để trống/có thể tùy chỉnh.
    banner_shape:
      name: Hình dạng biểu ngữ
      description: Xác định hình dạng/kiểu cắt tổng thể của biểu ngữ dành cho fan
        hâm mộ thể thao.
    banquette_configuration:
      name: Cấu hình ghế dài
      description: Hình dạng hoặc hướng tổng thể của ghế dài.
    bar_coating:
      name: Lớp phủ thanh đòn
      description: Xác định lớp phủ ăn được bên ngoài được áp dụng cho thanh kẹo,
        nếu có.
    bar_pad_style:
      name: Kiểu đệm thanh kẹo
      description: Kiểu thiết kế của đệm thanh kẹo và cấu trúc vỏ bọc.
    bar_texture:
      name: Kết cấu thanh kẹo
      description: Mô tả kết cấu hoặc độ giòn tổng thể của thanh kẹo.
    barb_type:
      name: Loại ngạnh
      description: Cho biết liệu lưỡi câu có ngạnh hay không và kiểu ngạnh.
    barbell_finish:
      name: Lớp hoàn thiện tạ đòn
      description: Mô tả chi tiết lớp phủ/xử lý bề mặt bảo vệ hoặc thẩm mỹ được áp
        dụng cho thanh tạ và/hoặc tay cầm, ảnh hưởng đến khả năng chống ăn mòn, cảm
        giác cầm nắm và giá cả.
    barbell_knurling_pattern:
      name: Mẫu vân nhám trên thanh tạ
      description: Mô tả kiểu dáng và độ sắc nét của phần vân tay cầm trên tạ đòn,
        bao gồm các ký hiệu cụ thể dành cho cử tạ hoặc nâng tạ.
    barista_suitability:
      name: Phù hợp với Barista
      description: Mô tả liệu sản phẩm có được thiết kế để pha chế và tạo bọt cà phê
        hay không.
    barre_rail_configuration:
      name: Cấu hình thanh ngang của thanh múa ba lê
      description: Cho biết số lượng thanh ngang được cung cấp kèm theo thanh múa
        ba lê.
    barrel_or_cask_type:
      name: Loại thùng gỗ
      description: 'Chỉ rõ loại thùng gỗ được sử dụng để ủ hoặc hoàn thiện rượu tequila
        (ví dụ: gỗ sồi Mỹ, thùng gỗ đã từng chứa bourbon, thùng gỗ sherry).'
    barrel_profile:
      name: Hình dạng thân
      description: Mô tả hình dạng tổng thể hoặc độ cân bằng của thân phi tiêu.
    barrel_thread_standard:
      name: Tiêu chuẩn ren thân phi tiêu
      description: Chỉ rõ loại ren thân phi tiêu được sử dụng trên thiết bị đánh dấu
        để tương thích với các thân phi tiêu thay thế.
    base_anchoring_method:
      name: Phương pháp neo đế
      description: Xác định cách cố định đế xuống đất, cho biết độ phù hợp với các
        bề mặt và điều kiện chơi khác nhau.
    base_ballast_method:
      name: Phương pháp cân bằng đế
      description: 'Cho biết cách (hoặc có) làm tăng trọng lượng cho đế huấn luyện
        để ổn định (ví dụ: đổ nước, đổ cát).'
    base_configuration:
      name: Cấu hình đế
      description: Cho biết cấu hình kết cấu của đế bảng.
    base_fill_material:
      name: Vật liệu lấp đầy đế
      description: Chỉ rõ chất được sử dụng để lấp đầy hoặc làm tăng trọng lượng cho
        đế hình nộm bóng rổ có ảnh hưởng đến độ ổn định và khâu thiết lập.
    base_ingredient:
      name: Thành phần cơ bản
      description: Xác định thành phần nông nghiệp chính mà từ đó rượu shochu hoặc
        soju được chưng cất.
    base_oil_type:
      name: Loại dầu gốc
      description: 'Xác định công thức dầu gốc của dầu hộp số (ví dụ: tổng hợp hoàn
        toàn so với hỗn hợp tổng hợp so với thông thường).'
    base_storage_type:
      name: Loại ngăn lưu trữ ở đế
      description: Xác định xem đế có tích hợp kho chứa hay không và cơ chế được sử
        dụng.
    baseball_glove_type:
      name: Loại găng tay bóng chày
      description: Phân loại găng tay hoặc bao tay theo vị trí người chơi hoặc mục
        đích chức năng.
    baseball_softball_league_certification:
      name: Chứng nhận giải đấu bóng chày & bóng mềm
      description: Xác định cơ quan quản lý hoặc tiêu chuẩn giải đấu mà sản phẩm đáp
        ứng.
    baseball_softball_usage_role:
      name: Vai trò sử dụng bóng chày/bóng mềm
      description: 'Xác định vai trò trên sân hoặc loại người tham gia mà miếng bảo
        vệ chân dành cho (ví dụ: người bắt bóng, người đánh bóng, trọng tài, người
        chơi trên sân).'
    baseball_toy_set_components_included:
      name: Các thành phần đi kèm của bộ đồ chơi bóng chày
      description: 'Xác định các thành phần chơi bóng chày nào được bao gồm trong
        sản phẩm (ví dụ: gậy, bóng, tee, base).'
    baseplate_construction:
      name: Cấu tạo tấm đế
      description: Cho biết phương pháp sản xuất tấm đế của xe tải có ảnh hưởng đến
        độ bền và trọng lượng.
    basketball_hoop_accessory_type:
      name: Loại phụ kiện vòng bóng rổ
      description: Phân loại loại phụ tùng hoặc phụ kiện vòng bóng rổ cụ thể để lọc
        và so sánh.
    basketball_padding_location:
      name: Vị trí đệm bóng rổ
      description: Xác định bộ phận của hệ thống bóng rổ mà miếng đệm được thiết kế
        để che phủ.
    basketball_rim_type:
      name: Loại vành rổ bóng rổ
      description: Chỉ rõ kiểu dáng cấu trúc hoặc hiệu suất của vành rổ bóng rổ để
        người mua có thể chọn thiết kế phù hợp với trình độ chơi và nhu cầu lắp đặt
        của họ.
    basketball_toy_features:
      name: Tính năng đồ chơi bóng rổ
      description: Nêu bật các tính năng chơi/chức năng đáng chú ý của đồ chơi bóng
        rổ ngoài kích thước cơ bản.
    bass_clarinet_body_material:
      name: Chất liệu thân kèn clarinet bass
      description: Chất liệu chính của thân kèn clarinet bass (không bao gồm bộ phận
        phím, trụ và các phụ kiện kim loại khác).
    bass_clarinet_lowest_written_note:
      name: Nốt nhạc thấp nhất được viết trên kèn clarinet bass
      description: Nốt nhạc thấp nhất mà kèn clarinet bass có thể chơi (thường được
        người chơi mô tả là Mi giáng trầm, Rê trầm, Đô trầm hoặc Si giáng trầm mở
        rộng).
    bass_drum_beater_head_shape:
      name: Hình dạng đầu dùi trống bass
      description: Mô tả hình dạng/hình dạng hình học của bề mặt tiếp xúc của đầu
        dùi trống bass (mặt tiếp xúc với mặt trống).
    bass_drum_beater_shaft_material:
      name: Chất liệu trục dùi trống bass
      description: Xác định chất liệu của trục/thanh dùi (không phải đầu dùi).
    bass_drum_head_built_in_muffling:
      name: Hệ thống giảm âm tích hợp trên mặt trống bass
      description: Loại giảm âm/giảm chấn tích hợp được bao gồm trong thiết kế mặt
        trống.
    bass_drum_head_configuration:
      name: Cấu hình mặt trống bass
      description: Mô tả các mặt trống được bao gồm/lắp đặt trên trống bass khi mua.
    bass_drum_head_surface_finish:
      name: Hoàn thiện bề mặt mặt trống bass
      description: Kết cấu/hoàn thiện bề mặt của mặt trống bass.
    bass_drum_head_type:
      name: Loại mặt trống bass
      description: Kiểu thiết kế hoặc cấu tạo đặc biệt của mặt trống bass.
    bass_drum_hoop_material:
      name: Chất liệu vành trống bass
      description: Xác định chất liệu của vành trống bass (vành đối trọng), ảnh hưởng
        đến độ bền, tính thẩm mỹ và trọng lượng.
    bass_drum_mounting_style:
      name: Kiểu lắp đặt trống bass
      description: Cho biết cách trống bass được thiết kế để được đỡ/sử dụng (chân
        chống, giá đỡ, giá mang trống diễu hành, v.v.).
    bass_harmonica_comb_material:
      name: Chất liệu thân kèn của kèn Bass Harmonica
      description: Chất liệu của lược/thân (khối buồng khí) của kèn harmonica bass.
    bass_harmonica_mouthpiece_style:
      name: Kiểu ống ngậm kèn harmonica bass
      description: Cho biết cấu hình ống ngậm của kèn harmonica bass.
    bass_harmonica_reed_material:
      name: Chất liệu lưỡi kèn harmonica bass
      description: Chất liệu của lưỡi kèn được sử dụng trong kèn harmonica bass.
    bass_harmonica_tuning_system:
      name: Hệ thống điều chỉnh âm thanh kèn harmonica bass
      description: Chỉ định hệ thống điều chỉnh âm thanh/hệ thống điều chỉnh được
        sử dụng cho kèn harmonica bass.
    bass_recorder_bocal_type:
      name: Loại bocal kèn recorder bass
      description: Chỉ định loại bocal/ống dẫn khí được sử dụng để tiếp cận ống ngậm
        trên kèn recorder bass.
    bass_recorder_included_accessories:
      name: Phụ kiện đi kèm kèn recorder bass
      description: Liệt kê các phụ kiện đi kèm trong gói kèn recorder bass.
    bass_recorder_keywork_material:
      name: Vật liệu phím đàn recorder bass
      description: Xác định vật liệu của bộ phím đàn recorder (nếu có).
    bass_trombone_slide_material:
      name: Vật liệu ống trượt kèn trombone bass
      description: Xác định vật liệu/lớp mạ chính của ống trượt ngoài (và/hoặc cụm
        ống trượt) cho kèn trombone bass.
    bass_trombone_valve_wrap_style:
      name: Kiểu bọc van kèn trombone bass
      description: Xác định kiểu thiết kế bọc van được sử dụng trên nhạc cụ.
    bass_ukulele_string_type:
      name: Loại dây đàn ukulele bass
      description: Cho biết loại dây đàn chung được sử dụng trên đàn ukulele trầm.
    bassinet_cradle_accessory_features:
      name: Tính năng phụ kiện của nôi xách tay và nôi lắc cho bé
      description: 'Nêu bật các tính năng hoặc đặc điểm chức năng đáng chú ý của phụ
        kiện nôi và cũi (ví dụ: chống nước, được chứng nhận hữu cơ, không gây dị ứng).'
    bassoon_bell_material:
      name: Vật liệu loa kèn bassoon
      description: Xác định vật liệu của loa kèn bassoon.
    bassoon_bocal_system:
      name: Hệ thống bocal kèn bassoon
      description: Biến thể/loại bocal được sử dụng cho các hệ thống kèn bassoon và
        trường hợp sử dụng khác nhau.
    bassoon_case_shell_type:
      name: Loại vỏ hộp kèn bassoon
      description: Cho biết cấu trúc bảo vệ của hộp (mềm, cứng hoặc kết hợp).
    bassoon_keywork_material:
      name: Chất liệu hệ thống phím kèn Bassoon
      description: Vật liệu và/hoặc lớp mạ được sử dụng cho bộ phím đàn bassoon (phím
        và phần cứng cơ khí).
    bassoon_model_level:
      name: Cấp độ người chơi kèn bassoon
      description: Chỉ rõ cấp độ người chơi mục tiêu của mẫu kèn bassoon.
    bassoon_performance_level:
      name: Mức độ trình độ chơi kèn bassoon
      description: Cho biết mức độ người chơi mục tiêu của mẫu kèn bassoon.
    bassoon_reed_scrape_style:
      name: Kiểu mài lưỡi kèn bassoon
      description: Cho biết kiểu mài/hình dạng của lưỡi kèn bassoon.
    bassoon_reed_thread_color:
      name: Màu chỉ khâu lưỡi kèn bassoon
      description: Màu của chỉ khâu được sử dụng trên lưỡi kèn.
    bassoon_reed_type:
      name: Loại lưỡi kèn bassoon
      description: Chỉ rõ loại lưỡi kèn bassoon phù hợp với sản phẩm (nếu có).
    bassoon_system:
      name: Hệ thống kèn bassoon
      description: Xác định hệ thống phím/thiết kế truyền thống của kèn bassoon được
        sử dụng bởi nhạc cụ.
    bat_construction:
      name: Cấu tạo gậy bóng chày
      description: 'Cho biết có bao nhiêu mảnh riêng biệt hoặc các phần được liên
        kết tạo nên thân vợt (ví dụ: một mảnh, hai mảnh, lai), ảnh hưởng đến độ uốn,
        khả năng kiểm soát rung động và hiệu suất tổng thể.'
    bat_handle_size_compatibility:
      name: Khả năng tương thích kích thước cán vợt
      description: Cho biết kích thước cán vợt cricket mà tay cầm được thiết kế để
        phù hợp.
    bath_book_interactive_features:
      name: Các tính năng tương tác của sách tắm
      description: Các tính năng chơi/học tích hợp trong sách tắm.
    bath_bubble_machine_features:
      name: Các tính năng của máy tạo bong bóng tắm
      description: Các tính năng chức năng chính của máy tạo bong bóng tắm ngoài khả
        năng tạo bong bóng cơ bản.
    bath_crayon_features:
      name: Các tính năng của bút vẽ tắm
      description: Các tính năng chức năng/an toàn chính của bút vẽ tắm.
    bath_squirter_spray_pattern:
      name: Kiểu phun nước của đồ chơi tắm
      description: Mô tả cách đồ chơi tắm phun nước (kiểu phun) khi bóp hoặc kích
        hoạt.
    bath_toy_molded_drain_design:
      name: Thiết kế thoát nước đúc sẵn cho đồ chơi tắm
      description: Cho biết đồ chơi có được thiết kế để thoát nước/khô ráo nhằm giảm
        lượng nước đọng hay không.
    bath_toy_water_play_function:
      name: Chức năng chơi với nước của đồ chơi tắm
      description: Xác định cơ chế tương tác/chơi với nước chính của đồ chơi.
    baton_size_standard:
      name: Tiêu chuẩn kích thước gậy tiếp sức
      description: Phân loại kích thước gậy tiếp sức trong thi đấu (thiếu niên hoặc
        người lớn).
    battery_case_certification_standard:
      name: Chứng nhận/tiêu chuẩn hộp đựng pin
      description: Liệt kê các chứng nhận vận chuyển/an toàn hoặc tiêu chuẩn kiểm
        tra liên quan mà hộp đựng tuân thủ để vận chuyển/lưu trữ pin.
    battery_case_interior_padding_material:
      name: Chất liệu đệm bên trong hộp đựng pin
      description: Chỉ định chất liệu đệm/lớp lót chính được sử dụng bên trong hộp
        (nếu có).
    battery_configuration:
      name: Cấu hình pin
      description: Chỉ rõ bố cục/hình dạng vật lý của bộ pin (kiểu dáng) để người
        dùng có thể lựa chọn pin phù hợp với không gian khoang chứa hạn chế trong
        các mẫu súng Airsoft cụ thể.
    battery_group_size:
      name: Kích thước nhóm pin
      description: 'Kích thước vỏ pin tiêu chuẩn (ví dụ: BCI Nhóm 24F, H6) được sử
        dụng để lắp đặt trong nhiều loại xe.'
    battery_polarity:
      name: Cực tính của pin
      description: Chỉ định cực tính/hướng của đầu cực (vị trí đầu cực dương), đây
        là một yếu tố hạn chế quan trọng đối với nhiều loại pin ô tô và xe thể thao.
    battery_standards_supported:
      name: Các tiêu chuẩn pin được hỗ trợ
      description: Chỉ định các tiêu chuẩn xếp hạng pin mà thiết bị kiểm tra hỗ trợ
        khi kiểm tra hiệu suất khởi động hoặc tình trạng hoạt động.
    battery_voltage_class:
      name: Lớp điện áp pin
      description: 'Lớp điện áp hệ thống phổ biến cho bộ pin xe điện, được sử dụng
        để lọc nhanh (ví dụ: hệ thống 400V so với 800V).'
    batting_cage_components_included:
      name: Các bộ phận lồng tập đánh bóng đi kèm
      description: Liệt kê các bộ phận riêng lẻ được cung cấp kèm theo sản phẩm để
        người mua có thể xác nhận xem có bao gồm một hệ thống hoàn chỉnh hay chỉ các
        bộ phận thay thế cụ thể.
    batting_helmet_accessories_included:
      name: Phụ kiện mũ bảo hiểm đánh bóng đi kèm
      description: Liệt kê các phụ kiện bảo vệ hoặc trang trí được đóng gói kèm theo
        mũ bảo hiểm đánh bóng.
    batting_stuffing_form_factor:
      name: Hình dạng bông nhồi
      description: Xác định xem sản phẩm được bán dưới dạng bông nhồi rời, tấm, cuộn,
        miếng cắt sẵn hoặc hình dạng định hình.
    batting_stuffing_loft_level:
      name: Độ phồng của bông nhồi
      description: Cho biết độ phồng/độ cao của bông nhồi (độ phồng/chiều cao tương
        đối), thường được sử dụng để lựa chọn vật liệu chần bông và đệm.
    batting_stuffing_thermal_insulation_level:
      name: Mức độ cách nhiệt của bông nhồi
      description: Hiệu suất giữ ấm/cách nhiệt tương đối của bông nhồi được sử dụng
        trong chăn bông, áo khoác và chăn.
    batting_tee_base_design:
      name: Thiết kế đế đỡ bóng
      description: Mô tả kiểu dáng hoặc cấu tạo của đế đỡ bóng, ảnh hưởng đến độ ổn
        định và loại bề mặt sân chơi phù hợp.
    battle_top_arena_stadium_compatibility:
      name: Khả năng tương thích với sân đấu/sân vận động
      description: Cho biết sản phẩm được thiết kế để sử dụng với hệ thống sân đấu/sân
        vận động nào (đặc biệt đối với các bộ hoặc hình dạng sân đấu đặc biệt).
    battle_top_items_included:
      name: Các mặt hàng đi kèm trong bộ bóng
      description: 'Chỉ rõ các mặt hàng đi kèm trong gói (ví dụ: mặt bóng, dụng cụ
        phóng, sân đấu/sân vận động, dây giật, phụ tùng thay thế).'
    battle_top_performance_type:
      name: Loại hiệu suất của con quay chiến đấu
      description: Mô tả phong cách hoạt động chung của con quay chiến đấu, thường
        phản ánh cách nó hoạt động trong đấu trường (tấn công mạnh mẽ so với tập trung
        vào sức bền, v.v.).
    bayan_included_accessories:
      name: Phụ kiện đi kèm con quay
      description: Các phụ kiện đi kèm với con quay (trong hộp).
    bayan_tuning_system_type:
      name: Loại hệ thống điều chỉnh con quay
      description: Cách con quay được căng/điều chỉnh (kiểu cấu tạo), ảnh hưởng đến
        tính di động và độ dễ điều chỉnh.
    bb_gun_action_type:
      name: Loại cơ chế hoạt động của súng BB
      description: 'Cho biết cơ chế nạp hoặc lên đạn của súng BB (ví dụ: cần gạt,
        bơm, bẻ nòng).'
    bb_gun_caliber:
      name: Cỡ nòng súng BB
      description: Chỉ rõ đường kính của viên đạn BB mà súng được thiết kế để bắn,
        đảm bảo khả năng tương thích với đạn dược.
    bb_gun_part_type:
      name: Loại phụ tùng súng BB
      description: 'Phân loại các bộ phận hoặc phụ kiện cụ thể được thiết kế cho súng
        BB, cho phép người mua nhanh chóng tìm thấy bộ phận thay thế, nâng cấp hoặc
        bổ sung chính xác (ví dụ: nòng súng, gioăng piston, bộ nạp nhanh).'
    beach_ball_features:
      name: Đặc điểm của bóng bãi biển
      description: Các đặc điểm chức năng đáng chú ý dành riêng cho bóng bãi biển.
    beach_bucket_features:
      name: Tính năng của xô chơi cát bãi biển
      description: Các đặc điểm chức năng của xô bãi biển ảnh hưởng đến việc sử dụng,
        độ bền và sự tiện lợi.
    beach_sand_toy_items_included:
      name: Các mặt hàng đồ chơi bãi biển & cát đi kèm
      description: Các mặt hàng đồ chơi bãi biển/cát bổ sung được bao gồm trong xô
        (nếu bán theo bộ).
    bead_breaker_type:
      name: Loại dụng cụ tách hạt
      description: Loại/thiết kế của cơ chế tách hạt.
    bead_hole_style:
      name: Kiểu lỗ hạt
      description: Xác định kiểu dáng hoặc cấu hình của lỗ/rãnh trên hạt có ảnh hưởng
        đến cách hạt nằm trên móc hoặc dây.
    bead_type:
      name: Loại hạt
      description: Loại hạt chính được yêu cầu bởi mẫu.
    bead_type_patch_embellishment:
      name: Loại hạt (trang trí miếng vá)
      description: Loại hạt chính được sử dụng trên bề mặt miếng vá.
    beaded_accessory_project_type:
      name: Loại dự án phụ kiện đính hạtụ kiện đính hạt
      description: Loại phụ kiện mà mẫu hướng dẫn tạo ra.
    beading_needle_flexibility:
      name: Độ linh hoạt của kim đính hạt
      description: Độ linh hoạt tương đối của thân kim để luồn qua các đường đính
        hạt hẹp.
    beading_pattern_bead_size:
      name: Kích thước hạt trong mẫu đính hạt
      description: 'Kích thước hạt được khuyến nghị (thường là kích thước hạt cườm,
        ví dụ: 11/0, 8/0).'
    beading_pattern_chart_format:
      name: Định dạng biểu đồ mẫu đính hạt
      description: 'Cách biểu diễn mẫu trực quan (ví dụ: biểu đồ so với ảnh từng bước).'
    beading_pattern_stitch_technique:
      name: Mũi/kỹ thuật đính hạt trong mẫu
      description: Mũi hoặc kỹ thuật đính hạt chính được sử dụng trong mẫu.
    beading_technique_stitch:
      name: Kỹ thuật/mũi đính hạt
      description: 'Xác định kỹ thuật hoặc mũi đính hạt chính được sử dụng trong mẫu
        (ví dụ: mũi peyote, mũi brick).'
    beading_thread_fiber_type:
      name: Loại sợi chỉ đính hạt
      description: Chỉ rõ loại sợi/chất liệu phụ của chỉ đính hạt (cụ thể hơn so với
        chất liệu chung) liên quan đến hiệu suất.
    beading_thread_size:
      name: Kích cỡ chỉ xỏ hạt xâu chuỗi
      description: Chỉ rõ nhãn kích thước của nhà sản xuất/ngành công nghiệp được
        sử dụng cho chỉ xâu hạt (tùy thuộc vào thương hiệu/dòng sản phẩm), chẳng hạn
        như cỡ D hoặc 00.
    beading_thread_use_case:
      name: Trường hợp sử dụng chỉ xâu hạt
      description: Xác định mục đích sử dụng chính được khuyến nghị cho chỉ xâu hạt,
        giúp người mua sắm lựa chọn sản phẩm phù hợp cho dự án của họ.
    beading_wire_coating_material:
      name: Chất liệu lớp phủ dây xâu hạt
      description: Chỉ định chất liệu lớp phủ bên ngoài trên dây xâu hạt (nếu có),
        ảnh hưởng đến cảm giác, độ bền và khả năng chống xoắn.
    beading_wire_strand_count:
      name: Số lượng sợi dây xâu hạt
      description: 'Chỉ ra số lượng sợi trong dây xâu hạt nhiều sợi (ví dụ: 7 sợi,
        19 sợi, 49 sợi), ảnh hưởng đến độ linh hoạt và độ rủ.'
    beadlock_type:
      name: Loại khóa vành
      description: Chỉ ra liệu bánh xe có phải là loại khóa vành hay không và kiểu
        dáng (giúp người mua xe địa hình/UTV).
    beam_material:
      name: Chất liệu thanh dầm
      description: Chất liệu chính của chùm sáng/thanh đèn (thường khác với đầu đèn/phụ
        kiện).
    beam_pattern:
      name: Kiểu chùm sáng
      description: Kiểu phân bố ánh sáng được sử dụng để chiếu sáng khi lái xe/địa
        hình.
    bean_bag_fabric_material:
      name: Chất liệu vải túi đựng hạt xốp
      description: Xác định chất liệu vải bên ngoài được sử dụng cho túi đựng hạt
        xốp được cung cấp kèm theo bộ sản phẩm.
    bean_paste_variety:
      name: Loại tương đậu
      description: Phân loại loại tương đậu cụ thể dựa trên kiểu sản xuất hoặc thành
        phần chính.
    bean_preparation:
      name: Cách chế biến đậu
      description: 'Cho biết cách chế biến đậu trước khi bán (ví dụ: nguyên vỏ, bóc
        vỏ, băm nhỏ, nảy mầm).'
    bean_variety:
      name: Loại đậu
      description: 'Chỉ rõ giống thực vật hoặc giống trên thị trường của đậu (ví dụ:
        đậu xanh, đậu nành non, đậu đũa).'
    beanie_style:
      name: Kiểu mũ len
      description: Chỉ rõ thiết kế, cấu tạo hoặc hình dáng tổng thể của mũ len để
        người mua có thể nhanh chóng lựa chọn giữa các kiểu phổ biến.
    bearing_clearance:
      name: Khe hở ổ trục
      description: Cho biết cấp độ khe hở hướng tâm bên trong của ổ trục (lượng độ
        rơ bên trong); cấp C0 còn được gọi là CN hoặc khe hở bình thường.
    bearing_construction_type:
      name: Kiểu cấu tạo vòng bi
      description: 'Xác định kiểu thiết kế hoặc cấu tạo ổ trục được sử dụng trong
        trục bánh xe (ví dụ: ổ trục dạng hộp, ổ trục bi rời).'
    bearing_edge_type:
      name: Loại cạnh ổ trục
      description: Loại/hình dạng của cạnh ổ trục vỏ, ảnh hưởng đến lực tấn công và
        lực duy trì.
    bearing_lubrication:
      name: Bôi trơn ổ trục
      description: Cho biết loại chất bôi trơn được sử dụng cho ổ trục trong quá trình
        sản xuất, chẳng hạn như mỡ hoặc dầu.
    bearing_material:
      name: Chất liệu vòng bi
      description: 'Xác định vật liệu cấu tạo ổ bi (ví dụ: thép, hỗn hợp gốm), giúp
        người dùng lựa chọn giữa các tùy chọn về độ bền, chi phí và hiệu suất.'
    bearing_rating:
      name: Xếp hạng ổ bi
      description: 'Chỉ định dung sai hoặc cấp hiệu suất của ổ bi được sử dụng trong
        giày trượt (ví dụ: ABEC 7, ILQ 9, Swiss).'
    bearing_seal_code:
      name: Mã phớt chặn dầu vòng bi
      description: Cho biết kiểu niêm phong được sử dụng trên ổ bi, ảnh hưởng đến
        độ bền và lực cản lăn.
    bearing_seal_type:
      name: Kiểu phớt chặn dầu vòng bi
      description: 'Chỉ định thiết kế niêm phong hoặc lớp chắn bảo vệ các bộ phận
        bên trong ổ bi khỏi chất gây ô nhiễm và ảnh hưởng đến lực cản (ví dụ: 2RS,
        ZZ, LLU, hở).'
    bearing_shield_type:
      name: Loại lớp chắn ổ bi
      description: Kiểu lớp chắn hoặc lớp niêm phong bảo vệ các bộ phận bên trong
        ổ bi.
    bearing_size_code:
      name: Mã kích thước vòng bi
      description: 'Ký hiệu vòng bi tiêu chuẩn (ví dụ: 608, 688) kết hợp đường kính
        trong, đường kính ngoài và chiều rộng.'
    bearing_type:
      name: Loại ổ trục
      description: Chỉ rõ kiểu cấu tạo của các ổ bi được sử dụng trong bộ chén cổ.
    beater_head_material:
      name: Chất liệu đầu que đánh
      description: 'Chỉ rõ vật liệu tiếp xúc/đầu của dùi trống bass (ví dụ: nỉ, gỗ,
        cao su).'
    beaters_included:
      name: Số lượng dùi trống đi kèm
      description: 'Chỉ rõ số lượng dùi trống được bao gồm/lắp đặt cùng với bàn đạp
        trống (ví dụ: dùi đơn hoặc dùi đôi), hoặc nếu không có dùi trống nào được
        bao gồm.'
    bed_base_type:
      name: Loại dát giường
      description: 'Chỉ rõ kiểu cấu trúc của đế giường hoặc giường sofa (ví dụ: mặt
        phẳng, nan lò xo, có thể điều chỉnh).'
    bed_storage_type:
      name: Loại hộc lưu trữ của giường
      description: Chỉ rõ cơ chế lưu trữ tích hợp của khung giường.
    bedroom_furniture_items_included:
      name: Các món đồ nội thất phòng ngủ đi kèm
      description: 'Chỉ rõ các món đồ nội thất riêng lẻ có trong bộ phòng ngủ (ví
        dụ: giường, tủ quần áo, bàn đầu giường), cho phép người mua sắm nhanh chóng
        xem những gì được bao gồm mà không cần đọc mô tả dài dòng.'
    bedroom_vanity_items_included:
      name: Các vật dụng đi kèm bộ bàn trang điểm phòng ngủ
      description: 'Liệt kê các mặt hàng riêng lẻ được cung cấp kèm theo bộ bàn trang
        điểm phòng ngủ để khách hàng biết chính xác những gì được giao (ví dụ: gương,
        ghế đẩu, bộ đèn).'
    beer_based_cocktail_variety:
      name: Các loại cocktail pha từ bia
      description: 'Phân loại các loại cocktail pha từ bia theo loại cụ thể, ví dụ:
        Radler, Shandy, Michelada.'
    beet_variety:
      name: Loại củ dền
      description: 'Chỉ rõ giống hoặc loại củ dền, giúp người mua sắm xác định hương
        vị, màu sắc và công dụng trong ẩm thực (ví dụ: Củ dền đỏ, Củ dền vàng, Củ
        dền Chioggia).'
    bell_actuation_mechanism:
      name: Cơ chế kích hoạt chuông
      description: Chỉ rõ thao tác người dùng cần thiết để rung chuông, giúp người
        mua sắm lựa chọn tư thế làm việc thoải mái hơn.
    bell_guard_coverage_area:
      name: Khu vực bảo vệ chuông
      description: Cho biết phần nào của chuông được thiết kế để bảo vệ.
    bell_material:
      name: Chất liệu chuông
      description: Vật liệu của bộ phận chuông (nếu được chỉ định riêng biệt với vật
        liệu tổng thể của thiết bị).
    bellhousing_bolt_pattern:
      name: Kiểu bắt vít vỏ chuông
      description: Chỉ rõ tiêu chuẩn kiểu bắt vít vỏ chuông/phía động cơ hoặc nhóm
        kiểu bắt vít mà vỏ hộp số sử dụng.
    bellows_material:
      name: Chất liệu ống bọc nắp lò xo
      description: Vật liệu của thân/vỏ ống thổi (nếu có).
    bellows_orientation:
      name: Hướng của ống thổi
      description: Cho biết cấu hình ống thổi được sử dụng để cung cấp không khí cho
        các đường ống.
    belly_panel_style:
      name: Kiểu đai bụng
      description: Mô tả cấu tạo của đai lưng hoặc phần đai bụng phù hợp với bụng
        đang phát triển.
    belt_buckle_type:
      name: Loại khóa thắt lưng
      description: Mô tả cơ chế hoặc thiết kế khóa cụ thể được sử dụng trên dây thắt
        lưng.
    beret_style:
      name: Kiểu mũ nồi
      description: Xác định thiết kế mũ nồi cụ thể hoặc biến thể văn hóa.
    berry_species:
      name: Loại quả mọng
      description: Cho biết loại quả mọng có trong sản phẩm để người mua sắm có thể
        nhanh chóng lọc theo loại quả mọng mong muốn.
    beta_casein_variant:
      name: Biến thể Beta-casein
      description: 'Chỉ định biến thể protein beta-casein (ví dụ: A2) có trong sữa
        dành cho người tiêu dùng có vấn đề về tiêu hóa.'
    beverage_sweetness_level:
      name: Mức độ ngọt của đồ uống
      description: Phân loại đồ uống theo mức độ ngọt hoặc đường thêm vào.
    bezel_graduation_units:
      name: Đơn vị chia vạch trên vòng xoay
      description: Chỉ định các vạch chia trên vòng xoay (độ, mil hoặc thang đo kép).
    bicycle_brake_set_components_included:
      name: Các bộ phận của bộ phanh xe đạp đi kèm
      description: Liệt kê các bộ phận riêng lẻ được cung cấp trong bộ dụng cụ để
        người mua sắm biết chính xác những gì được bao gồm và có thể so sánh các cấu
        hình gói khác nhau.
    bicycle_cage_mounting_position:
      name: Vị trí lắp đặt giá đỡ bình nước trên xe đạp
      description: Chỉ rõ vị trí lắp đặt giá đỡ bình nước trên xe đạp.
    bicycle_computer_mount_placement:
      name: Vị trí lắp đặt giá đỡ máy tính xe đạp
      description: Chỉ rõ vị trí lắp đặt giá đỡ máy tính trên xe đạp, chẳng hạn như
        phía trước tay lái hoặc trên nắp chụp đầu pô tăng.
    bicycle_folding_mechanism:
      name: Cơ chế gấp xe đạp
      description: 'Chỉ rõ hệ thống gấp cơ học được sử dụng trên khung xe đạp (ví
        dụ: gấp một nửa, gấp dọc).'
    bicycle_frame_design:
      name: Thiết kế khung xe đạp
      description: Chỉ rõ kiểu dáng tổng thể của khung xe đạp, ảnh hưởng đến khả năng
        tiếp cận, sức chứa hàng hóa và không gian lưu trữ.
    bicycle_frame_style:
      name: Kiểu khung xe đạp
      description: Mô tả kiểu dáng cấu trúc của khung xe đạp (khung bước thấp, khung
        thấp kiểu lowrider, khung chopper kéo dài, v.v.), ảnh hưởng đến tư thế và
        tính thẩm mỹ của người lái.
    bicycle_handlebar_type:
      name: Loại ghi-đông xe đạp
      description: Chỉ rõ kiểu dáng hoặc hình dạng cụ thể của tay lái, giúp người
        lái lựa chọn tay lái phù hợp với tư thế và bộ môn đạp xe của họ.
    bicycle_headset_configuration:
      name: Cấu hình bộ chén cổ xe đạp
      description: 'Cho biết kiểu dáng cấu trúc hoặc tiêu chuẩn của bộ chén cổ xe
        đạp theo cách bố trí chén (ví dụ: Chén ngoài, ZeroStack, Tích hợp, Có ren).'
    bicycle_hub_type:
      name: Loại đùm xe đạp
      description: Mô tả cơ cấu trục bánh xe được cung cấp kèm theo bánh xe, ảnh hưởng
        đến khả năng tương thích của hệ thống truyền động và phong cách lái xe.
    bicycle_lock_security_certification:
      name: Chứng nhận an ninh khóa xe đạp
      description: 'Chứng nhận độc lập của bên thứ ba xác nhận hiệu suất chống trộm
        (ví dụ: Sold Secure, ART, Varefakta).'
    bicycle_pedal_type:
      name: Loại bàn đạp xe đạp
      description: Chỉ rõ kiểu dáng hoặc thiết kế hoạt động tổng thể của bàn đạp,
        chẳng hạn như bàn đạp phẳng, các biến thể không kẹp hoặc bàn đạp lai, giúp
        người lái lựa chọn giao diện phù hợp với phong cách lái xe của họ.
    bicycle_propulsion_type:
      name: Kiểu truyền động xe đạp
      description: Chỉ rõ cách thức vận hành của xe đạp, chẳng hạn như đạp bằng tay,
        hỗ trợ điện hoặc động cơ đốt trong.
    bicycle_pump_type:
      name: Loại bơm xe đạp
      description: Xác định kiểu dáng cấu trúc của bơm, giúp người mua hàng lựa chọn
        thiết kế phù hợp nhất với nhu cầu đi xe, cất giữ hoặc trường hợp khẩn cấp.
    bicycle_rack_mounting_type:
      name: Loại giá đỡ xe đạp
      description: Mô tả phương pháp hoặc vị trí chính được sử dụng để gắn giá đỡ
        vào xe đạp, giúp người dùng xác nhận khả năng tương thích với khung và trang
        thiết bị của họ.
    bicycle_suspension_type:
      name: Loại giảm xóc xe đạp
      description: Xác định sự hiện diện và cấu hình của hệ thống giảm xóc trên xe
        đạp.
    bicycle_tire_tread_pattern:
      name: Kiểu gai lốp xe đạp
      description: Chỉ rõ kiểu gai lốp, ảnh hưởng đến độ bám và lực cản lăn trên các
        bề mặt khác nhau.
    bidirectional_charging_capability:
      name: Khả năng sạc hai chiều
      description: Cho biết liệu xe điện có hỗ trợ các chế độ sạc hai chiều như V2G
        và/hoặc V2H hay không.
    bike_rack_mounting_style:
      name: Kiểu lắp đặt giá đèo hàng xe đạp
      description: Cách xe đạp được đỡ/cố định bởi giá đỡ.
    bike_rack_tilt_function:
      name: Chức năng nghiêng của giá đỡ xe đạp
      description: Có chức năng nghiêng nào để truy cập khu vực chứa đồ phía sau khi
        giá đỡ được lắp đặt hay không.
    bikini_top_style:
      name: Kiểu áo bikini
      description: Chỉ rõ thiết kế hoặc kiểu cắt của phần áo bikini, giúp người mua
        sắm tìm được kiểu dáng và kích thước phù hợp.
    billiard_brush_type:
      name: Loại bàn chải bi-a
      description: 'Chỉ rõ kiểu dáng cụ thể của dụng cụ làm sạch bàn bi-a (ví dụ:
        bàn chải bàn, bàn chải ray, khối chà).'
    billiard_glove_finger_coverage:
      name: Độ che phủ ngón tay của găng tay bi-a
      description: Xác định những ngón tay nào được thiết kế để che phủ, giúp lọc
        chính xác các kiểu găng tay chuyên dụng cho bi-a.
    billiard_pocket_style:
      name: Kiểu lỗ bàn bi-a
      description: Chỉ định kiểu dáng cấu trúc hoặc thẩm mỹ của túi bi, ảnh hưởng
        đến khả năng tương thích và trang trí bàn bi-a.
    billiard_rack_style:
      name: Kiểu giá bi-a
      description: 'Mô tả kiểu dáng vật lý hoặc cơ chế của giá (ví dụ: khung truyền
        thống, tấm mẫu, có thể gập lại).'
    billiard_table_type:
      name: Loại bàn bi-a
      description: 'Chỉ rõ bộ môn bi-a hoặc kiểu sử dụng mà bàn được thiết kế cho
        (ví dụ: bi-a lỗ, bi-a snooker, bi-a carom).'
    billiards_discipline:
      name: Bộ môn bi-a
      description: Cho biết biến thể cụ thể của bộ môn bi-a (loại trò chơi) mà sản
        phẩm hướng đến hoặc tương thích.
    binding_compatibility_standard:
      name: Tiêu chuẩn tương thích với khóa trượt tuyết
      description: Xác định giao diện khóa trượt tuyết (tiêu chuẩn đế) mà giày trượt
        tuyết được chứng nhận, đảm bảo việc ghép nối an toàn và chính xác với khóa
        trượt tuyết.
    binding_inclusion:
      name: Có bao gồm khóa trượt tuyết không
      description: Chỉ rõ xem ván trượt được bán riêng lẻ, với hệ thống tích hợp,
        hay kèm theo khóa trượt tuyết riêng biệt.
    binding_interface:
      name: Giao diện liên kết
      description: Cho biết tấm liên kết hoặc tiêu chuẩn giao diện mà ván trượt được
        gắn sẵn hoặc tương thích, đảm bảo tính tương thích giữa giày và liên kết.
    binding_liner_type:
      name: Loại lớp lót liên kết
      description: 'Mô tả kiểu lớp lót bên trong được sử dụng trong liên kết/giày
        (ví dụ: có thể tháo rời, có thể đi bộ, có thể định hình bằng nhiệt).'
    binding_mounting_system:
      name: Hệ thống gắn liên kết
      description: Xác định giao diện được sử dụng để gắn liên kết vào ván trượt (gắn
        phẳng, ray/rãnh, tấm, v.v.).
    binding_position:
      name: Vị trí đóng gáy
      description: 'Chỉ ra vị trí hoặc cấu hình gắn dự định cho liên kết (ví dụ: giày
        trước, giày sau, ARTP).'
    binding_strap_position:
      name: Vị trí dây đeo liên kết
      description: Chỉ định vị trí dự định lắp đặt dây đeo trên liên kết.
    bingo_components_included:
      name: Các thành phần đi kèm của bộ đồ chơi Bingo
      description: Liệt kê các thành phần được đóng gói cùng với bộ bingo, chẳng hạn
        như bóng bingo, thẻ và bút đánh dấu.
    bingo_number_range:
      name: Phạm vi số bingo
      description: Xác định phạm vi/mẫu mã số bingo được bộ sản phẩm hỗ trợ.
    bingo_set_features:
      name: Đặc điểm bộ Bingo
      description: Xác định định dạng sản phẩm chính của bộ Bingo (vật lý/thủ công
        so với điện tử/tương tác).
    bipod_mounting_interface:
      name: Giao diện gắn chân chống
      description: Chỉ rõ giao diện gắn được sử dụng để kết nối chân chống với súng
        hoặc hệ thống ray.
    bit_attachment_type:
      name: Kiểu chuôi gắn mũi khoan
      description: 'Chỉ rõ cách dây cương kết nối với hàm thiếc (ví dụ: đầu buộc,
        đầu khóa, đầu vít Chicago).'
    bit_mouthpiece_design:
      name: Thiết kế phần miệng hàm thiếc
      description: Chỉ rõ kiểu cấu trúc hoặc cấu hình khớp của phần miệng hàm thiếc,
        điều chỉnh sự phân bố áp lực, khoảng cách vòm miệng và độ nghiêm trọng tổng
        thể.
    bit_ring_style:
      name: Kiểu vòng hàm thiếc
      description: Chỉ rõ kiểu má hoặc vòng của hàm thiếc gắn vào dây cương, ảnh hưởng
        đến hoạt động, hướng dẫn bên và cảm giác dây cương.
    bladder_material:
      name: Chất liệu túi khí
      description: Chỉ rõ vật liệu được sử dụng cho túi khí bên trong.
    blade_attachment_type:
      name: Kiểu đầu gắn lưỡi dao
      description: Chỉ rõ giày trượt sử dụng cơ chế gập (có bản lề) hay kiểu gắn lưỡi
        cố định.
    blade_finish_coating:
      name: Lớp phủ/hoàn thiện lưỡi
      description: Xử lý bề mặt được áp dụng cho lưỡi dao để tăng tính thẩm mỹ hoặc
        chống ăn mòn.
    blade_hosel_type:
      name: Loại khớp nối lưỡi
      description: 'Xác định kiểu kết nối của khớp nối lưỡi với cán, ảnh hưởng đến
        khả năng tương thích (ví dụ: Tiêu chuẩn hoặc Hình nón).'
    blade_length_type:
      name: Loại chiều dài lưỡi
      description: Phân loại chiều dài lưỡi vợt là ngắn, trung bình hoặc dài, mỗi
        loại ảnh hưởng đến nhịp đá và mục tiêu huấn luyện.
    blade_lie:
      name: Góc nghiêng lưỡi
      description: Chỉ rõ số góc nghiêng của lưỡi gậy khúc côn cầu, cho biết lưỡi
        gậy nằm trên mặt băng như thế nào so với cán.
    blade_sharpness:
      name: Độ sắc bén của lưỡi
      description: Cho biết lưỡi vũ khí được mài sắc hay cùn để huấn luyện.
    blade_size_category:
      name: Loại kích thước lưỡi
      description: Mã kích thước lưỡi kiếm saber tiêu chuẩn quốc tế (0–5) được sử
        dụng để phân biệt lưỡi kiếm dành cho thanh thiếu niên và người lớn.
    blade_size_class:
      name: Phân loại kích thước lưỡi
      description: Phân loại lưỡi kiếm theo quy ước kích thước người chơi, phù hợp
        với kích thước cán như Thanh thiếu niên, Thiếu niên, Trung cấp hoặc Cao cấp.
    blade_size_number:
      name: Số kích thước lưỡi
      description: Mã kích thước số tiêu chuẩn (0–5) được xác định bởi các quy định
        về đấu kiếm, xác định chiều dài lưỡi và độ tuổi đủ điều kiện.
    blaster_mechanism:
      name: Cơ chế hoạt động của súng bắn gel
      description: 'Cơ chế hoạt động bên trong của súng bắn gel (ví dụ: GBB, AEG,
        lò xo).'
    block_edge_style:
      name: Kiểu cạnh khối
      description: Mô tả cách hoàn thiện các cạnh/góc của khối gỗ để tạo cảm giác
        và đảm bảo an toàn.
    blocking_mat_features:
      name: Tính năng của thảm định hình
      description: Các tính năng chức năng cụ thể của thảm định hình (lưu trữ, tính
        di động, tính dễ sử dụng).
    blocking_mat_grid_unit:
      name: Hệ thống đơn vị lưới thảm định hình
      description: Hệ thống đơn vị được sử dụng trên lưới in, giúp người dùng khớp
        các mẫu và kích thước.
    blocking_mat_surface_markings:
      name: Các dấu hiệu trên bề mặt thảm định hình
      description: Loại dấu hiệu đo lường/hướng dẫn được in hoặc đúc trên bề mặt thảm.
    blocking_wire_coating:
      name: Lớp phủ dây định hình
      description: Xử lý/lớp phủ bề mặt trên dây định hình ảnh hưởng đến khả năng
        chống gỉ, độ mịn và nguy cơ bị vướng.
    blocking_wire_end_cap_type:
      name: Loại nắp bịt đầu dây định hình
      description: Chỉ rõ loại bảo vệ/hoàn thiện đầu được sử dụng trên các đầu dây
        định hình để đảm bảo an toàn và bảo vệ vải.
    blocking_wire_set_includes:
      name: Bộ dây định hình bao gồm
      description: 'Chỉ rõ các thành phần được bao gồm trong sản phẩm dây định hình
        (ví dụ: ghim chữ T, ống đựng).'
    blocking_wire_usage:
      name: Công dụng của dây định hình
      description: Trường hợp sử dụng chính mà dây định hình linh hoạt được thiết
        kế.
    bloom_stage:
      name: Giai đoạn nở hoa
      description: Cho biết độ nở của hoa cúc khi giao hàng/vận chuyển.
    blower_motor_bearing_type:
      name: Loại ổ trục mô tơ quạt gió
      description: Xác định thiết kế ổ trục được sử dụng trong mô tơ quạt gió.
    blower_motor_mounting_position:
      name: Vị trí lắp đặt mô tơ quạt gió
      description: 'Vị trí lắp đặt mô tơ quạt gió trong mô-đun HVAC/xe (ví dụ: phía
        trước, phía sau).'
    blowpipe_valve_type:
      name: Loại van ống thổi
      description: Chỉ rõ kiểu van ống thổi đi kèm (nếu có).
    bo_staff_style:
      name: Kiểu gậy Bo
      description: 'Xác định kiểu dáng hoặc cấu tạo của gậy (ví dụ: thẳng, thon, có
        đệm mút, có thể gập lại).'
    board_game_theme:
      name: Chủ đề trò chơi trên bàn cờ
      description: Chủ đề cốt truyện/bối cảnh của trò chơi trên bàn cờ (sử dụng để
        khám phá và tìm hiểu).
    board_rail_shape:
      name: Hình dạng cạnh ván
      description: 'Xác định đường viền của cạnh ván (ví dụ: mềm, cứng, 50/50) ảnh
        hưởng đến độ bám và lực đẩy trên sóng.'
    board_size_classification:
      name: Phân loại kích thước ván
      description: Phân loại ván hoặc bộ ván cornhole thành các kích thước tiêu chuẩn
        thông dụng.
    board_type_compatibility:
      name: Khả năng tương thích với loại ván
      description: Xác định loại ván mà dây buộc được thiết kế cho.
    boat_construction_type:
      name: Kiểu cấu trúc/cấu tạo thuyền
      description: 'Mô tả kiểu dáng hoặc cấu trúc của thuyền chèo (ví dụ: bơm hơi,
        cứng).'
    boat_hook_flotation:
      name: Khả năng nổi của móc thuyền
      description: Cho biết móc thuyền có được thiết kế để nổi nếu rơi xuống nước
        hay không.
    boat_ladder_stowage_style:
      name: Kiểu cất giữ thang thuyền
      description: 'Mô tả cách cất giữ thang khi không sử dụng (ví dụ: gấp lại, thu
        gọn, có thể tháo rời).'
    boat_trailer_construction_type:
      name: Loại kết cấu rơ moóc thuyền
      description: Cho biết rơ moóc đỡ thuyền bằng giá đỡ, con lăn hoặc hệ thống kết
        hợp.
    boat_weaving_shuttle_weft_exit_type:
      name: Loại thoát sợi ngang của con thoi dệt thuyền
      description: Cách sợi ngang thoát ra khỏi con thoi trong quá trình dệt.
    bobbin_loading_type:
      name: Loại nạp suốt chỉ
      description: Chỉ rõ cách lắp/nạp suốt chỉ vào máy may.
    bobbin_system:
      name: Hệ thống suốt chỉ
      description: Hệ thống/loại nạp suốt chỉ được máy may sử dụng.
    bobbin_type:
      name: Loại suốt chỉ
      description: 'Chỉ rõ định dạng giá đỡ sợi mà con thoi được thiết kế để sử dụng
        (hoặc bao gồm), điều này xác định khả năng tương thích và cách sử dụng điển
        hình (ví dụ: con thoi thuyền thường sử dụng suốt chỉ; con thoi vải vụn có
        thể mở để chứa các dải chỉ).'
    bobbin_winder_winding_direction:
      name: Hướng cuộn chỉ của máy cuốn suốt chỉ
      description: Chỉ định hướng cuộn/quay được hỗ trợ bởi máy cuốn suốt chỉ.
    bobble_mechanism:
      name: Cơ cấu quả lắc
      description: Chỉ rõ kiểu cơ cấu quả lắc có ảnh hưởng đến chuyển động và độ bền.
    bocal_material:
      name: Chất liệu ống thổi bocal
      description: Chỉ định vật liệu của ống thổi đi kèm.
    bodhr_n_head_material:
      name: Vật liệu mặt trống Bodhrán
      description: Vật liệu của mặt trống (màng), ảnh hưởng mạnh đến âm thanh và yêu
        cầu bảo trì.
    bodhr_n_tuning_system_type:
      name: Kiểu hệ thống lên dây của trống Bodhrán
      description: Kiểu cơ chế điều chỉnh tích hợp được sử dụng để điều chỉnh độ căng
        của đầu chun (nếu có thể điều chỉnh).
    body_armor_coverage_area:
      name: Diện tích bảo vệ của áo giáp
      description: Cho biết sản phẩm bảo vệ những vùng nào.
    body_armor_intended_use:
      name: Mục đích sử dụng của áo giáp
      description: Chỉ định kịch bản lái xe hoặc sử dụng chính mà áo giáp ATV/UTV
        được thiết kế cho.
    body_cord_connector_style:
      name: Kiểu đầu nối dây
      description: 'Mô tả cấu hình đầu nối ở hai đầu dây (ví dụ: số lượng chấu hoặc
        kiểu lưỡi lê) để xác định khả năng tương thích với vũ khí và hộp ghi điểm.'
    body_panel_finish_state:
      name: Tình trạng hoàn thiện của tấm thân
      description: Mô tả tình trạng chuẩn bị/hoàn thiện bề mặt của tấm thân khi bán
        để sơn/lắp đặt.
    body_shape:
      name: Hình dạng thân
      description: Chỉ rõ hình dạng/kiểu dáng chung của đàn guitar điện.
    bodysuit_bottom_coverage:
      name: Độ che phủ phần dưới của bộ đồ liền thân
      description: Chỉ rõ kiểu cắt và độ che phủ của phần dưới bộ đồ liền thân, ảnh
        hưởng đến sự thoải mái và khả năng tương thích với trang phục.
    boilie_shape:
      name: Hình dạng mồi câu
      description: Chỉ rõ hình dạng của mồi câu được sản xuất bởi bàn cuộn, cho phép
        người câu cá lựa chọn giữa các hình dạng mồi khác nhau.
    boilie_stop_buoyancy:
      name: Độ nổi của nút chặn mồi câu
      description: Chỉ rõ xem nút chặn mồi câu được thiết kế để nổi, chìm hay giữ
        nguyên độ nổi trung tính, ảnh hưởng đến cách trình bày mồi câu trong cột nước.
    bok_choy_variety:
      name: Loại cải thìa
      description: 'Chỉ rõ giống, tên thương mại hoặc loại cải thìa (ví dụ: Cải thìa
        non, Cải thìa Thượng Hải, Cải thìa Nai Bai, Cải thìa Tatsoi, Cải thìa Tím),
        cho phép người mua sắm lựa chọn hương vị, kích thước và hình thức mong muốn.'
    bolt_drive_style:
      name: Kiểu đầu vít
      description: Chỉ rõ kiểu đầu vít của bu lông gắn ván trượt, phân biệt giữa các
        loại đầu/vít thông dụng như Allen hoặc Phillips.
    bone_content:
      name: Hàm lượng xương
      description: Xác định xem thịt có chứa xương hay không.
    bongo_center_block_material:
      name: Chất liệu khối trung tâm Bongo
      description: Chất liệu của khối trung tâm nối hai vỏ trống bongo (nếu có).
    bongo_shell_material:
      name: Chất liệu vỏ trống bongo
      description: Chất liệu của vỏ trống bongo (thân trống), không bao gồm mặt trống
        và trang thiết bị.
    bongo_tuning_system:
      name: Hệ thống điều chỉnh âm Bongo
      description: 'Cách điều chỉnh/cấu tạo âm của trống bongo (ví dụ: điều chỉnh
        bằng tai truyền thống so với điều chỉnh bằng dây), ảnh hưởng đến việc bảo
        trì và tính xác thực.'
    boning_type:
      name: Loại gọng định hình
      description: Chỉ rõ hệ thống hỗ trợ cấu trúc bên trong đai, kết hợp cả chất
        liệu và kiểu/hình dạng của xương được sử dụng, ảnh hưởng trực tiếp đến mức
        độ hỗ trợ, độ linh hoạt và độ bền.
    boot_liner_type:
      name: Loại lót giày trượt tuyết
      description: 'Mô tả cấu tạo hoặc khả năng tùy chỉnh của lớp lót bên trong giày
        trượt tuyết (ví dụ: có thể định hình bằng nhiệt, có thể tháo rời).'
    boot_sole_compatibility:
      name: Khả năng tương thích đế giày
      description: Liệt kê các tiêu chuẩn đế giày hoặc hệ thống giao diện mà bộ phận
        buộc giày chấp nhận.
    boot_support_level:
      name: Mức độ hỗ trợ giày
      description: Mô tả mức độ cứng/hỗ trợ tổng thể của mắt cá chân hoặc giày do
        giày trượt cung cấp.
    boot_width_code:
      name: Mã chiều rộng giày
      description: 'Ký hiệu chiều rộng dựa trên chữ cái của nhà sản xuất được sử dụng
        cụ thể trong việc định cỡ giày trượt băng nghệ thuật (ví dụ: AAA, AA, B, C,
        D).'
    booth_configuration:
      name: Cấu hình gian hàng
      description: 'Xác định cấu hình chỗ ngồi tổng thể của buồng (ví dụ: một bên,
        góc, mô-đun).'
    bootie_toe_design:
      name: Thiết kế mũi giày
      description: Xác định kiểu cấu tạo mũi giày của giày trượt sóng và giày trượt
        rạn san hô.
    border_type:
      name: Loại viền
      description: Kiểu hoàn thiện cạnh/viền của miếng vá thêu (ảnh hưởng đến vẻ ngoài,
        khả năng chống sờn và chất lượng cảm nhận).
    bore_cleaner_format:
      name: Định dạng dụng cụ làm sạch lỗ khoan
      description: Cho biết hình dạng vật lý của sản phẩm làm sạch lỗ khoan (dụng
        cụ so với vật tư tiêu hao).
    bore_cleaner_safe_for_finish:
      name: Chất tẩy rửa lỗ khoan an toàn cho bề mặt hoàn thiện
      description: Cho biết chất tẩy rửa lỗ khoan an toàn khi sử dụng với các bề mặt
        hoàn thiện dụng cụ bằng đồng thau thông thường nào.
    bottle_cage_loading_direction:
      name: Hướng lắp đặt giá đỡ chai
      description: Mô tả hướng lắp hoặc lấy chai ra khỏi giá đỡ.
    bottle_neck_finish_closure_size:
      name: Kích thước miệng chai/nắp chai
      description: 'Kích thước miệng chai/nắp chai tiêu chuẩn để đảm bảo tương thích
        với nắp, nút bần và dụng cụ đóng nắp (ví dụ: miệng chai 26 mm).'
    bottle_style:
      name: Kiểu chai
      description: Các kiểu chai đóng chai thông dụng được sử dụng trong sản xuất
        bia và rượu vang tại nhà.
    bottom_bracket_interface:
      name: Giao diện trục giữa
      description: Chỉ rõ tiêu chuẩn trục chính/trục giữa mà tay quay được thiết kế,
        đảm bảo tính tương thích giữa khung và trục giữa.
    bottom_bracket_standard:
      name: Tiêu chuẩn trục giữa
      description: Vỏ/giao diện trục giữa được khung hỗ trợ, xác định tính tương thích
        của bộ tay quay.
    bottom_type_suitability:
      name: Tính phù hợp của loại đáy
      description: Chỉ rõ điều kiện đáy biển/đáy biển mà neo được thiết kế để giữ
        tốt nhất.
    bounce_level:
      name: Mức độ nảy
      description: Cho biết bóng nảy lên bao nhiêu khi thả hoặc ném, giúp người dùng
        chọn đúng bóng cho các bài tập như ném vào tường hoặc đập bóng.
    bouncy_ball_surface_finish:
      name: Lớp hoàn thiện bề mặt của bóng nảy
      description: 'Chỉ rõ độ hoàn thiện bề mặt (cảm nhận và/hoặc thị giác) của quả
        bóng nảy (ví dụ: nhẵn, có gai, lấp lánh).'
    boundary_marker_type:
      name: Loại sản phẩm đánh dấu ranh giới
      description: 'Chỉ rõ hình dạng vật lý của sản phẩm đánh dấu ranh giới sân hoặc
        sân bóng (ví dụ: hình nón, băng dính, sơn, khuôn mẫu, máy móc).'
    bouquet_size_tier:
      name: Phân loại kích thước bó hoa
      description: Phân loại kích thước tiêu chuẩn cho bó hoa/chùm hoa, không phụ
        thuộc vào số lượng cành (hữu ích khi có nhiều loại cành khác nhau).
    bow_and_yo_yo_edge_finish:
      name: Hoàn thiện cạnh cung và yo-yo
      description: Mô tả kiểu hoàn thiện cạnh/viền được sử dụng trên cung/yo-yo (đặc
        biệt là đối với cung làm bằng ruy băng).
    bow_case_shell_type:
      name: Loại chất liệu vỏ hộp đựng vĩ cầm
      description: 'Mô tả cấu trúc bên ngoài của hộp đựng cung ví dụ: vỏ cứng so với
        vỏ mềm).'
    bow_compatibility:
      name: Độ tương thích của cây vĩ
      description: Chỉ rõ loại cung mà phần đầu được thiết kế hoặc được đánh giá là
        có thể sử dụng.
    bow_hair_color:
      name: Màu lông cung
      description: 'Xác định màu sắc/hình thức của lông được sử dụng trên cung nhạc
        cụ dây dàn nhạc (ví dụ: trắng/tẩy trắng, trắng tự nhiên, đen).'
    bow_stick_material:
      name: Chất liệu thân cây vĩ
      description: Xác định vật liệu được sử dụng cho cán cung (thân chính), yếu tố
        ảnh hưởng mạnh đến trọng lượng, cảm giác và giá cả.
    bow_type:
      name: Loại cung
      description: 'Chỉ rõ thiết kế cấu trúc của cung dành cho thanh thiếu niên (ví
        dụ: cung phức hợp, cung cong, cung dài), yếu tố ảnh hưởng mạnh đến phong cách
        bắn, phụ kiện cần thiết và chương trình huấn luyện.'
    bow_winding_material:
      name: Vật liệu quấn cung
      description: Chỉ rõ vật liệu được sử dụng để quấn/bọc cung, ảnh hưởng đến độ
        bám và cân bằng.
    bow_yo_yo_embellishment_style:
      name: Kiểu trang trí nơ/yo-yo
      description: Xác định kiểu dáng của phần trang trí (nơ hoặc yo-yo bằng vải).
    bowling_ball_core_type:
      name: Loại lõi bóng bowling
      description: Xác định thiết kế lõi bên trong hoặc tính đối xứng của quả bóng
        bowling, yếu tố ảnh hưởng đến chuyển động và khả năng tạo độ xoáy của bóng.
    bowling_ball_coverstock_type:
      name: Loại vỏ ngoài của quả bóng bowling
      description: Xác định chất liệu hoặc công nghệ vỏ ngoài của quả bóng bowling,
        yếu tố quyết định độ bám và khả năng tạo độ xoáy.
    bowling_set_style:
      name: Kiểu bộ bowling
      description: Xác định kiểu dáng chung hoặc trường hợp sử dụng của bộ bowling.
    box_lid_type:
      name: Loại nắp hộp
      description: Loại nắp/cơ chế mở được sử dụng bởi hộp quà hoặc hộp thiếc.
    box_spring_profile:
      name: Kiểu dáng khung lò xo
      description: 'Phân loại chiều cao tổng thể của khung lò xo thành các loại kiểu
        dáng thân thiện với người mua sắm (ví dụ: kiểu dáng thấp, tiêu chuẩn, kiểu
        dáng cao) để khách hàng có thể lọc nhanh chóng mà không cần biết kích thước
        chính xác.'
    box_spring_requirement:
      name: Yêu cầu khung lò xo
      description: Cho biết liệu có cần thêm khung lò xo hoặc đế cho nệm hay không.
    boxing_ring_style:
      name: Kiểu sàn đấu boxing
      description: 'Phân loại kiểu dáng cấu tạo tổng thể hoặc kịch bản sử dụng dự
        định của vòng (ví dụ: thi đấu so với tập luyện, nâng cao so với đặt trên sàn).'
    bra_length_type:
      name: Loại chiều dài áo ngực
      description: Xác định phân loại chiều dài của áo ngực dựa trên độ che phủ theo
        chiều dọc, chẳng hạn như tiêu chuẩn, dáng dài, dáng trung bình hoặc dáng ngắn.
    bra_padding_type:
      name: Loại đệm áo ngực
      description: Mô tả mức độ hoặc sự hiện diện của đệm trong cúp áo.
    braces_compatibility:
      name: Độ tương thích với niềng răng
      description: Chỉ định xem có thể đeo dụng cụ bảo vệ miệng với niềng răng chỉnh
        nha hay không và ở mức độ nào.
    brake_band_form:
      name: Hình dạng dây phanh
      description: Cho biết dây phanh được cung cấp dưới dạng vòng liên tục (không
        có điểm kết thúc) hay là đoạn cắt sẵn cần phải buộc lại.
    brake_band_material_type:
      name: Loại vật liệu dây phanh
      description: 'Chỉ rõ vật liệu chức năng của dây phanh (ví dụ: dây cotton so
        với dây nylon so với thép lò xo), ảnh hưởng đến độ bền, độ bám, độ co giãn
        và tiếng ồn.'
    brake_band_style:
      name: Kiểu dây phanh
      description: Chỉ rõ hệ thống/kiểu căng dây phanh được sử dụng trên máy kéo sợi
        để tạo lực căng cho con suốt/ống chỉ.
    brake_bleeding_method:
      name: Phương pháp xả khí phanh
      description: Phương pháp xả khí được hỗ trợ bởi bộ dụng cụ.
    brake_booster_assist_type:
      name: Loại hỗ trợ tăng áp phanh
      description: Cho biết cơ chế hỗ trợ được sử dụng bởi bộ tăng áp phanh.
    brake_booster_diaphragm_configuration:
      name: Cấu hình màng ngăn tăng áp phanh
      description: Cho biết số lượng/loại màng ngăn được sử dụng trong bộ tăng áp.
    brake_caliper_bleeder_screw_position:
      name: Vị trí vít xả khí kẹp phanh
      description: Chỉ rõ vị trí vít xả khí trên kẹp phanh khi lắp đặt (dùng để kiểm
        tra xem vít xả khí có hướng ở điểm cao nhất để xả khí đúng cách hay không).
    brake_caliper_finish:
      name: Lớp hoàn thiện kẹp phanh
      description: 'Xác định lớp hoàn thiện bề mặt hoặc lớp phủ bảo vệ được áp dụng
        cho thân kẹp phanh (ví dụ: sơn, mạ, anod hóa).'
    brake_caliper_included_hardware:
      name: Trang thiết bị đi kèm kẹp phanh
      description: Chỉ rõ những gì được bao gồm trong bộ kẹp phanh.
    brake_caliper_mount_type:
      name: Loại giá đỡ kẹp phanh
      description: Kiểu giao diện lắp đặt được sử dụng để gắn kẹp phanh vào khớp nối/giá
        đỡ.
    brake_caliper_paint_base_chemistry:
      name: Thành phần hóa học gốc sơn kẹp phanh
      description: Hệ thống sơn/nhựa hoặc nhóm hóa chất được sử dụng.
    brake_caliper_paint_kit_contents:
      name: Nội dung bộ dụng cụ sơn kẹp phanh
      description: Cho biết những gì được bao gồm trong gói ngoài chính sơn.
    brake_circuit_type:
      name: Loại mạch phanh
      description: Cấu hình mạch thủy lực được hỗ trợ bởi xi lanh chính.
    brake_clutch_fluid_base_chemistry:
      name: Thành phần hóa học cơ bản của dầu phanh/ly hợp
      description: Thành phần hóa học cơ bản chính của dầu thủy lực phanh/ly hợp,
        ảnh hưởng đến khả năng tương thích và khả năng trộn lẫn.
    brake_clutch_fluid_dot_specification:
      name: Thông số kỹ thuật DOT của dầu phanh/ly hợp
      description: 'Phân loại hiệu suất DOT cho dầu thủy lực phanh/ly hợp (ví dụ:
        DOT 3, DOT 4).'
    brake_drum_finish_coating:
      name: Lớp phủ/hoàn thiện tang trống phanh
      description: 'Lớp hoàn thiện bề mặt hoặc lớp phủ bảo vệ được áp dụng cho tang
        trống phanh (ví dụ: sơn tĩnh điện, sơn phủ, mạ kẽm).'
    brake_drum_type:
      name: Loại tang trống phanh
      description: Loại thiết kế của tang trống phanh (có hoặc không có trục/ổ trục
        tích hợp).
    brake_fluid_base:
      name: Loại gốc dầu phanh
      description: Chỉ rõ công thức dầu phanh thủy lực cần thiết hoặc được bao gồm.
    brake_fluid_base_chemistry:
      name: Thành phần hóa học cơ bản của dầu phanh
      description: Xác định thành phần hóa học cơ bản của dầu phanh, quyết định khả
        năng tương thích và các quy tắc pha trộn.
    brake_fluid_dot_specification:
      name: Thông số kỹ thuật dầu phanh theo tiêu chuẩn DOT
      description: 'Cho biết xếp hạng/thông số kỹ thuật dầu phanh DOT (ví dụ: DOT
        3, DOT 4) cho các sản phẩm dầu phanh.'
    brake_fluid_standards_compliance:
      name: Tuân thủ tiêu chuẩn dầu phanh
      description: Các tiêu chuẩn ngành mà dầu phanh tuyên bố đáp ứng (ngoài xếp hạng
        DOT).
    brake_fluid_type:
      name: Loại dầu phanh
      description: Chỉ định loại dầu phanh cần thiết cho kẹp phanh thủy lực xe đạp.
    brake_hose_end_fitting_type:
      name: Loại đầu nối ống phanh
      description: 'Kiểu kết nối ở mỗi đầu của ống phanh (ví dụ: banjo, flare, ren
        trong/ngoài), được sử dụng để đảm bảo khả năng tương thích với kẹp phanh/đường
        ống.'
    brake_lever_pull_type:
      name: Loại lực kéo cần phanh
      description: 'Chỉ rõ tỷ lệ/cơ chế kéo cáp mà cần phanh được thiết kế, đảm bảo
        khả năng tương thích với các kẹp phanh cụ thể (ví dụ: phanh vành kéo ngắn
        so với phanh V kéo dài).'
    brake_light_switch_actuation_type:
      name: Kiểu kích hoạt công tắc đèn phanh
      description: Xác định sự kiện vật lý nào kích hoạt công tắc (bàn đạp/piston
        so với áp suất thủy lực, v.v.).
    brake_light_switch_connector_type:
      name: Kiểu giắc cắm công tắc đèn phanh
      description: Chỉ rõ kiểu/định dạng đầu nối điện được công tắc đèn phanh sử dụng
        để kết nối với dây dẫn của xe.
    brake_light_switch_contact_type:
      name: Kiểu tiếp điểm công tắc đèn phanh
      description: 'Cấu hình/hoạt động tiếp điểm điện của công tắc đèn phanh (ví dụ:
        thường mở/đóng, chuyển mạch, hoặc đa mạch).'
    brake_light_switch_mounting_style:
      name: Kiểu lắp đặt công tắc đèn phanh
      description: 'Cách lắp đặt công tắc đèn phanh trên xe hoặc hệ thống phanh (ví
        dụ: ren, kẹp, giá đỡ, bu lông banjo).'
    brake_master_cylinder_mounting_type:
      name: Kiểu lắp đặt xi lanh chính phanh
      description: Cách xi lanh chính được lắp vào xe/bộ trợ lực phanh (kiểu lỗ bu
        lông / kiểu mặt bích).
    brake_master_cylinder_reservoir_type:
      name: Loại bình chứa dầu của xi-lanh phanh chính
      description: Loại/cấu hình của bình chứa dầu phanh được cung cấp hoặc yêu cầu
        bởi xi lanh chính.
    brake_mount_type:
      name: Kiểu ngàm gắn phanh
      description: Chỉ rõ giao diện phanh được tích hợp vào phuộc để người lái có
        thể xác nhận khả năng tương thích của hệ thống phanh.
    brake_mounting_flange_bolt_pattern:
      name: Kiểu lỗ bu lông mặt bích lắp phanh
      description: 'Chỉ rõ kiểu lỗ/lỗ bu lông mặt bích lắp đặt được sử dụng để gắn
        tấm đỡ phanh hoặc giá đỡ kẹp phanh vào trục rơ moóc (ví dụ: 4 bu lông).'
    brake_pad_backing_plate_material:
      name: Vật liệu tấm đỡ má phanh
      description: Chỉ rõ vật liệu của tấm đỡ má phanh, ảnh hưởng đến khả năng tản
        nhiệt và trọng lượng.
    brake_pad_compatible_rotor_type:
      name: Loại rôto tương thích với má phanh
      description: Chỉ định loại bề mặt rôto/đĩa phanh dự định mà má phanh được thiết
        kế để hoạt động cùng.
    brake_pad_compound:
      name: Thành phần má phanh
      description: Xác định công thức vật liệu ma sát của má phanh.
    brake_pad_form_factor:
      name: Kiểu dáng má phanh
      description: 'Chỉ định hệ thống phanh/kiểu dáng mà má phanh được thiết kế cho
        (ví dụ: phanh đĩa, phanh tang trống, phanh tay).'
    brake_pad_material:
      name: Vật liệu má phanh
      description: Chỉ định loại hợp chất/vật liệu ma sát được sử dụng trong lớp lót
        má phanh.
    brake_pad_shim_included:
      name: Miếng đệm giảm tiếng ồn má phanh đi kèm
      description: Cho biết có bao gồm hoặc gắn sẵn miếng đệm giảm tiếng ồn hay không.
    brake_pad_wear_indicator_type:
      name: Loại chỉ báo mòn má phanh
      description: 'Cho biết loại chỉ báo mòn nào được bao gồm cùng với má phanh (ví
        dụ: lẫy kêu cơ học hoặc cảm biến điện tử).'
    brake_position:
      name: Vị trí phanh
      description: Cho biết vị trí lắp đặt linh kiện phanh trên xe.
    brake_rotor_mount_type:
      name: Kiểu ngàm gắn đĩa phanh
      description: Xác định giao diện dùng để gắn rôto phanh vào moay ốc (nếu có).
    brake_service_kit_components_included:
      name: Các thành phần trong bộ dụng cụ bảo dưỡng phanh
      description: Danh sách các dụng cụ/bộ chuyển đổi/vật tư tiêu hao có trong bộ
        dụng cụ bảo dưỡng phanh.
    brake_shoe_friction_material:
      name: Vật liệu ma sát của má phanh
      description: Hợp chất ma sát/lớp lót được sử dụng trên má phanh (vật liệu tiếp
        xúc với tang trống).
    brake_shoe_set_contents:
      name: Nội dung bộ má phanh
      description: 'Những gì có trong gói (ví dụ: chỉ má phanh so với má phanh kèm
        phụ kiện/lò xo).'
    brake_system_type:
      name: Loại hệ thống phanh
      description: Chỉ định công nghệ cơ cấu phanh được sử dụng để kiểm soát sự quay
        của ống chỉ trong quá trình đúc.
    brake_type:
      name: Loại phanh
      description: Loại phanh trục dọc/cơ cấu căng.
    brandy_age_classification:
      name: Phân loại độ tuổi rượu Brandy
      description: 'Phân loại rượu brandy bằng cách sử dụng các ký hiệu chất lượng/tuổi
        tiêu chuẩn ngành (ví dụ: VS, VSOP, XO) phản ánh các yêu cầu ủ tối thiểu.'
    brass_cleaning_tool_type:
      name: Loại dụng cụ làm sạch đồ đồng thau
      description: Chỉ định loại dụng cụ được sử dụng để làm sạch hoặc bảo dưỡng các
        nhạc cụ bằng đồng thau.
    brass_instrument_application_area:
      name: Khu vực ứng dụng trên nhạc cụ bằng đồng thau
      description: Bộ phận (các bộ phận) của nhạc cụ bằng đồng thau mà dung dịch khử
        trùng dự định được sử dụng.
    brass_instrument_care_kit_purpose:
      name: Mục đích của bộ dụng cụ chăm sóc nhạc cụ bằng đồng thau
      description: Mô tả kịch bản sử dụng dự định cho bộ dụng cụ (bảo dưỡng định kỳ,
        vệ sinh sâu, du lịch/khẩn cấp, bộ dụng cụ khởi đầu cho học sinh, v.v.).
    brass_instrument_case_shell_material:
      name: Chất liệu vỏ hộp đựng nhạc cụ bằng đồng thau
      description: Chất liệu chính của vỏ/khung cứng (nếu có), khác với chất liệu
        túi/hộp đựng thông thường.
    brass_instrument_lubricant_additives_features:
      name: Phụ gia/đặc điểm của chất bôi trơn nhạc cụ bằng đồng thau
      description: Các đặc điểm chức năng đáng chú ý của công thức chất bôi trơn.
    brass_instrument_lubricant_base_composition:
      name: Thành phần cơ bản của chất bôi trơn nhạc cụ bằng đồng thau
      description: Thành phần cơ bản/hóa học chính được sử dụng cho chất bôi trơn
        nhạc cụ bằng đồng thau.
    brass_instrument_lubricant_viscosity_grade:
      name: Độ nhớt của chất bôi trơn nhạc cụ bằng đồng thau
      description: Độ đặc/độ chảy tương đối của chất bôi trơn dành cho nhạc cụ bằng
        đồng thau.
    brass_instrument_replacement_part_type:
      name: Loại linh kiện thay thế cho nhạc cụ bộ đồng
      description: Chỉ rõ loại phụ tùng thay thế cho nhạc cụ bằng đồng thau (các bộ
        phận van/trượt/khóa nước, nút bần/nỉ, tấm chắn, v.v.).
    brass_instrument_valve_configuration:
      name: Cấu hình van nhạc cụ bằng đồng thau
      description: Cách nhạc cụ thay đổi cao độ (cơ chế van/trượt).
    brass_lubricant_application_area:
      name: Vị trí tra dầu bôi trơn nhạc cụ bộ đồng
      description: Lỗ thoát hơi phía sau của ống ngậm nhạc cụ bằng đồng thau
    brass_mouthpiece_backbore:
      name: Ống ngậm bằng đồng thau
      description: Hình dạng/loại lỗ thoát hơi phía sau của ống ngậm (hình dạng/kích
        thước của lỗ thoát hơi), ảnh hưởng đến âm sắc và độ chuẩn âm.
    brass_mouthpiece_cup_depth:
      name: Độ sâu chén ngậm bằng đồng thau
      description: Phân loại độ sâu chén ngậm (độ sâu của chén), ảnh hưởng đến âm
        thanh và độ nhạy.
    brass_polishing_cloth_abrasiveness_level:
      name: Độ mài mòn của vải đánh bóng đồng thau
      description: Cho biết độ mạnh của vải trong việc loại bỏ vết ố so với việc tạo
        độ bóng nhẹ.
    bread_crumb_base_ingredient:
      name: Thành phần cơ bản của vụn bánh mì
      description: Cho biết thành phần chính được làm từ vụn bánh mì, chẳng hạn như
        lúa mì, gạo, bì lợn hoặc hạnh nhân.
    bread_variety:
      name: Loại bánh mì
      description: 'Chỉ rõ kiểu dáng hoặc loại bánh mì, giúp người mua hàng tìm thấy
        các loại cụ thể (ví dụ: bánh mì brioche, bánh mì baguette, bánh mì naan).'
    breadstick_style:
      name: Kiểu dáng bánh mì que
      description: Xác định kiểu dáng hoặc định dạng truyền thống cụ thể của bánh
        mì que.
    bridge_head_material:
      name: Chất liệu đầu gậy gác cơ
      description: Chất liệu được sử dụng riêng cho đầu cầu cơ, ảnh hưởng đến trọng
        lượng, cảm giác và độ bền.
    bridge_head_type:
      name: Loại đầu cầu cơ
      description: Xác định kiểu dáng của đầu cầu cơ, giúp người mua lựa chọn hình
        dạng giá đỡ cơ ưa thích.
    bridle_part_type:
      name: Loại bộ phận dây cương
      description: Xác định thành phần cụ thể của dây cương mà mặt hàng thay thế đại
        diện, giúp khách hàng tìm thấy chính xác bộ phận họ cần.
    bridle_style:
      name: Kiểu dây cương
      description: Phân loại kiểu dáng hoặc cấu tạo tổng thể của dây cương để người
        cưỡi ngựa có thể nhanh chóng tìm thấy thiết bị phù hợp với nhu cầu hoặc bộ
        môn của họ.
    broadhead_field_point_attachment_style:
      name: Kiểu gắn đầu mũi tên/đầu nhọn
      description: Chỉ rõ cách gắn đầu mũi tên hoặc đầu nhọn vào thân mũi tên.
    broadhead_thread_size:
      name: Kích thước ren đầu mũi tên
      description: Liệt kê thông số ren được sử dụng để gắn đầu mũi tên hoặc đầu nhọn
        vào đầu mũi tên hoặc thân mũi tên.
    broadhead_tip_type:
      name: Loại đầu mũi tên
      description: Xác định kiểu đầu/vòng đệm của đầu mũi tên giúp bắt đầu xuyên thấu,
        ảnh hưởng đến hiệu suất khi săn bắn các loại thú khác nhau.
    broccoli_cut:
      name: Cách cắt bông cải xanh
      description: 'Xác định cách bông cải xanh được cắt hoặc chế biến trước khi đóng
        gói (ví dụ: nguyên đầu, bông nhỏ, cắt hạt).'
    broccoli_variety:
      name: Giống bông cải xanh
      description: 'Xác định giống hoặc loại bông cải xanh cụ thể trên thị trường
        (ví dụ: Tenderstem, Romanesco).'
    broom_head_material:
      name: Chất liệu đầu chổi
      description: Xác định thành phần vật liệu của đầu chổi, ảnh hưởng đến độ bền
        và đặc tính khi sử dụng.
    brush_format:
      name: Hình dạng bàn chải
      description: Chỉ ra hình dạng vật lý của bàn chải trượt tuyết hoặc ván trượt
        tuyết, phân biệt giữa các khối cầm tay và các định dạng quay bằng máy khoan
        như xi lanh len quay hoặc nỉ quay.
    brush_shape:
      name: Hình dạng bàn chải
      description: Xác định hình dạng vật lý hoặc hình dáng của thân hoặc đầu bàn
        chải, ảnh hưởng đến diện tích tiếp xúc và khả năng cầm nắm.
    brussel_sprout_preparation:
      name: Cách chuẩn bị cải Brussels
      description: Mô tả cách chuẩn bị hoặc kiểu cắt của cải Brussels được cung cấp.
    brussels_sprout_variety:
      name: Giống cải Brussels
      description: Chỉ rõ giống hoặc chủng loại cải Brussels, bao gồm các giống hiện
        tại và tương lai.
    bubble_blower_features:
      name: Tính năng của máy thổi bong bóng
      description: Liệt kê các tính năng chức năng phổ biến của máy thổi bong bóng.
    bubble_gun_bubble_output_modes:
      name: Chế độ tạo bong bóng của súng thổi bong bóng
      description: Chỉ rõ các chế độ hoạt động của súng thổi bong bóng, chẳng hạn
        như tạo bong bóng đơn, liên tục hoặc nhiều tốc độ.
    bubble_machine_features:
      name: Tính năng của máy thổi bong bóng
      description: Nêu bật các tính năng chức năng phổ biến của máy thổi bong bóng
        ngoài hoạt động cơ bản.
    bubble_machine_items_included:
      name: Các mặt hàng đi kèm máy thổi bong bóng
      description: 'Liệt kê các mặt hàng chính có trong hộp (ví dụ: dung dịch tạo
        bong bóng, que thổi dự phòng, dây đeo, điều khiển từ xa).'
    bubble_output_rate:
      name: Tốc độ tạo bong bóng
      description: 'Cho biết tốc độ tạo bong bóng gần đúng/định tính của máy thổi
        bong bóng (ví dụ: thấp/trung bình/cao), bao gồm cả việc tốc độ tạo bong bóng
        có thay đổi hay không.'
    bubble_solution_container_type:
      name: Loại thùng đựng dung dịch tạo bong bóng
      description: 'Chỉ rõ cách cung cấp/sử dụng dung dịch tạo bong bóng với súng
        bắn bong bóng (ví dụ: bình chứa bên trong, chai gắn liền, khay/mâm riêng).'
    bubble_toy_included_accessories:
      name: Phụ kiện đi kèm đồ chơi bong bóng
      description: 'Liệt kê các mặt hàng thường đi kèm với đồ chơi bong bóng (ví dụ:
        chai dung dịch, khay, que thay thế).'
    buckwheat_processing_method:
      name: Phương pháp chế biến kiều mạch
      description: 'Mô tả quá trình chế biến kiều mạch trước khi bán (ví dụ: rang,
        nảy mầm, phồng).'
    buckwheat_product_form:
      name: Dạng sản phẩm kiều mạch
      description: 'Các dạng sản phẩm kiều mạch cụ thể không được liệt kê trong danh
        sách chung (ví dụ: dạng mảnh, dạng phồng, gói ăn liền).'
    bug_collecting_kit_items_included:
      name: Các dụng cụ đi kèm của bộ bắt/thu thập côn trùng
      description: Dụng cụ và tài liệu giáo dục đi kèm trong bộ dụng cụ thu thập côn
        trùng.
    built_in_storage_type:
      name: Loại lưu trữ tích hợp
      description: 'Xác định các loại lưu trữ được tích hợp vào khung giường tầng
        (ví dụ: ngăn kéo, kệ, ngăn chứa đồ cầu thang).'
    bumper_finish:
      name: Lớp hoàn thiện cản xe
      description: Xác định lớp phủ hoặc lớp hoàn thiện bề mặt được áp dụng cho cản
        xe.
    bumper_sensor_cutouts:
      name: Các lỗ cắt cảm biến cản xe
      description: Cho biết cản xe bao gồm hoặc hỗ trợ các lỗ/lỗ cắt hỗ trợ OEM nào.
    bunk_bed_configuration:
      name: Cấu hình giường tầng
      description: Cho biết bố cục cấu trúc và sự kết hợp kích thước nệm của giường
        tầng.
    buoyancy:
      name: Độ nổi
      description: Cho biết hành vi nổi của mồi câu trong cột nước, chẳng hạn như
        nổi, chìm hoặc lơ lửng.
    burkini_pieces_included:
      name: Các món đi kèm của bộ đồ bơi Burkini
      description: Liệt kê các thành phần trang phục được cung cấp trong bộ burkini
        để khách hàng biết chính xác những gì họ đang mua.
    burn_rate:
      name: Tốc độ cháy
      description: Mô tả tốc độ cháy của giấy cuốn thuốc lá sau khi được châm lửa.
    bus_model_type:
      name: Loại xe buýt
      description: Xác định cấu hình/loại xe buýt thực tế được thể hiện bởi mô hình
        tỷ lệ (loại thân xe/loại sử dụng).
    bust_design:
      name: Thiết kế phần ngực
      description: 'Mô tả cấu hình vùng ngực và độ che phủ đường viền cổ của áo liền
        thân (ví dụ: hở ngực, áo ngực tích hợp, cổ chữ V).'
    butter_variety:
      name: Loại bơ
      description: Chỉ rõ kiểu sản xuất hoặc loại bơ đặc trưng, chẳng hạn như bơ lên
        men, bơ kem ngọt, bơ kiểu châu Âu, bơ ghee (bơ tinh chế) hoặc bơ whey.
    buttermilk_variety:
      name: Loại bơ sữa
      description: 'Xác định kiểu dáng hoặc dạng bơ sữa cụ thể đang được bán (ví dụ:
        bơ sữa lên men, bơ sữa truyền thống, bơ sữa dạng bột).'
    button_application:
      name: Ứng dụng nút
      description: 'Cho biết ứng dụng hoặc loại dự án dự định cho nút (ví dụ: quần
        áo, bọc ghế).'
    button_attachment_type:
      name: Kiểu đính khuy
      description: 'Chỉ rõ cấu tạo của nút để gắn vào vải (ví dụ: lỗ may xuyên qua
        so với nút có chân), không phải kiểu đóng.'
    button_finish:
      name: Hoàn thiện nút
      description: 'Mô tả bề mặt/hình thức của nút (ví dụ: mờ so với bóng).'
    buttonhole_elastic_application:
      name: Ứng dụng dây thun khuy
      description: Mục đích sử dụng/ứng dụng chính của dây thun trang trí gấp mép.
    cab_type:
      name: Loại cabin
      description: Chỉ định cấu hình cabin xe tải.
    cabasa_construction_type:
      name: Kiểu cấu tạo nhạc cụ Cabasa
      description: Xác định cấu trúc/kiểu dáng vật lý của thân và cụm dây/hạt của
        giá đỡ cáp.
    cabbage_variety:
      name: Giống bắp cải
      description: 'Chỉ rõ giống hoặc loại bắp cải (ví dụ: bắp cải xanh, bắp cải Napa,
        bắp cải Savoy) để người mua sắm có thể lọc theo hương vị, kết cấu và cách
        sử dụng trong nấu nướng.'
    cabinet_door_style:
      name: Kiểu cửa tủ
      description: Xác định thiết kế trực quan của tấm cửa tủ, chẳng hạn như kiểu
        Shaker hoặc kiểu tấm nổi, để giúp phù hợp với thẩm mỹ của nhà bếp.
    cabinet_overlay_type:
      name: Kiểu phủ tủ
      description: Xác định cách cửa tủ phủ lên hoặc nằm so với khung tủ.
    cable_end_type:
      name: Kiểu đầu dây cáp
      description: Mô tả hình dạng hoặc kiểu dáng của đầu nối hoặc khớp nối cáp giao
        tiếp với cần phanh hoặc cần số.
    cable_housing_construction:
      name: Cấu trúc vỏ cáp
      description: Mô tả thiết kế cấu trúc của vỏ cáp—chẳng hạn như dạng cuộn xoắn,
        không nén hoặc liên kết phân đoạn—ảnh hưởng đến khả năng chống nén, độ linh
        hoạt và cảm giác khi sử dụng.
    cable_housing_liner_type:
      name: Loại lớp lót vỏ cáp
      description: Cho biết liệu vỏ cáp có bao gồm lớp lót bên trong và/hoặc xử lý
        bôi trơn hay không, và vật liệu hoặc công nghệ được sử dụng, ảnh hưởng đến
        việc giảm ma sát và khả năng chống chịu thời tiết.
    cable_management_type:
      name: Kiểu quản lý dây cáp
      description: Xác định loại tính năng quản lý cáp hoặc nguồn điện tích hợp mà
        bàn hội nghị cung cấp.
    cable_surface_treatment:
      name: Xử lý bề mặt cáp
      description: Xác định bất kỳ lớp phủ hoặc lớp hoàn thiện đặc biệt nào được áp
        dụng cho cáp để giảm ma sát hoặc chống ăn mòn.
    cabochon_back_type:
      name: Loại mặt sau Cabochon
      description: Cho biết hình dạng/lớp hoàn thiện mặt sau của cabochon, ảnh hưởng
        đến phương pháp gắn/dán và khả năng tương thích.
    cacao_bean_variety:
      name: Giống hạt cacao
      description: Chỉ định giống thực vật hoặc giống cây trồng của hạt cacao được
        sử dụng.
    cacao_roast_level:
      name: Mức độ rang cacao
      description: Mô tả mức độ rang cacao trước khi xay.
    cage_package_type:
      name: Loại bao bì lồng
      description: 'Xác định các thành phần được bao gồm trong gói hàng (ví dụ: chỉ
        lưới, bộ khung, gói đầy đủ).'
    cajon_body_shell_material:
      name: Chất liệu thân/vỏ Cajon
      description: Xác định chất liệu của thân/vỏ cajon (không bao gồm tapa).
    cajon_corner_control_system:
      name: Hệ thống điều chỉnh âm thanh góc Cajon
      description: 'Chỉ định xem cajon có hỗ trợ điều chỉnh âm thanh góc (ví dụ: ốc
        vít góc) để thay đổi phản hồi khi vỗ hay không.'
    cajon_corner_edge_design:
      name: Thiết kế góc/cạnh Cajon
      description: Mô tả cấu trúc góc/cạnh ảnh hưởng đến sự thoải mái và khả năng
        chơi.
    cajon_feet_type:
      name: Loại chân Cajon
      description: Xác định loại chân của cajon, ảnh hưởng đến độ ổn định và độ vang.
    cajon_snare_adjustability:
      name: Khả năng điều chỉnh dây snare của Cajon
      description: Cho biết liệu và cách điều chỉnh hiệu ứng snare (độ căng, độ ăn
        khớp hoặc cả hai).
    cajon_snare_system_type:
      name: Loại hệ thống snare của Cajon
      description: Xác định cơ chế snare bên trong được sử dụng để tạo ra hiệu ứng
        snare.
    cake_shape:
      name: Hình dạng bánh
      description: Mô tả hình dạng vật lý của bánh cà phê.
    cake_topping:
      name: Lớp phủ bánh
      description: Xác định lớp phủ hoặc lớp hoàn thiện chính được áp dụng cho bánh
        cà phê.
    cake_type:
      name: Loại bánh ngọt
      description: 'Mô tả kiểu dáng hoặc loại bánh (ví dụ: Bánh bông lan, Bánh xốp,
        Bánh phô mai).'
    caliper_mount_type:
      name: Loại giá đỡ kẹp phanh
      description: 'Xác định tiêu chuẩn giao diện khung hoặc càng xe mà kẹp phanh
        sử dụng (ví dụ: Giá đỡ trụ, Giá đỡ phẳng).'
    caliper_mounting_standard:
      name: Tiêu chuẩn lắp đặt kẹp phanh
      description: 'Chỉ định giao diện/tiêu chuẩn lắp đặt (ví dụ: Giá đỡ phẳng, Giá
        đỡ trụ, IS, v.v.) được sử dụng để gắn kẹp phanh vào khung hoặc càng xe đạp.'
    camera_mounting_location_vehicle_exterior:
      name: Vị trí lắp đặt camera (bên ngoài xe)
      description: 'Vị trí dự định lắp đặt camera trên xe (ví dụ: lưới tản nhiệt phía
        trước, phía sau, gương chiếu hậu).'
    camouflage_environment_type:
      name: Loại môi trường ngụy trang
      description: Cho biết môi trường chính mà mẫu ngụy trang được thiết kế, chẳng
        hạn như rừng cây, sa mạc hoặc đầm lầy.
    camping_oil_application:
      name: Công dụng dầu cắm trại
      description: 'Chỉ định mục đích sử dụng chính của dầu trong bối cảnh cắm trại
        (ví dụ: nhiên liệu đèn lồng so với nhiên liệu bếp).'
    camshaft_construction:
      name: Cấu tạo trục cam
      description: Kiểu sản xuất/kiểu phôi của trục cam.
    camshaft_material:
      name: Vật liệu trục cam
      description: Vật liệu chính của lõi/trục cam (vật liệu cơ bản).
    camshaft_position:
      name: Vị trí trục cam
      description: 'Xác định vị trí/loại trục cam dự định trong động cơ (ví dụ: nạp
        hoặc xả, hoặc một dãy xi lanh/vị trí cụ thể).'
    candle_container_type_included:
      name: Loại thùng đựng nến đi kèm
      description: Xác định loại hộp đựng nến đi kèm trong bộ dụng cụ, nếu có.
    candle_dye_form:
      name: Dạng thuốc nhuộm nến
      description: Xác định dạng vật lý của thuốc nhuộm/chất tạo màu được sử dụng
        trong quá trình làm nến.
    candle_fragrance_form:
      name: Dạng hương liệu nến
      description: Xác định loại/dạng thành phần hương liệu dự định sử dụng trong
        làm nến.
    candle_making_tool_type:
      name: Loại dụng cụ làm nến
      description: 'Xác định loại dụng cụ làm nến của sản phẩm (ví dụ: nồi rót, dụng
        cụ định tâm bấc, nhiệt kế).'
    candy_texture:
      name: Kết cấu kẹo
      description: Mô tả cảm giác khi ăn hoặc độ đặc của kẹo, không phụ thuộc vào
        hương vị hoặc hình dạng.
    candying_method:
      name: Phương pháp làm kẹo
      description: 'Mô tả cách trái cây được làm kẹo hoặc bảo quản bằng đường (ví
        dụ: kết tinh, tráng men, ngâm siro).'
    canned_meat_form:
      name: Thịt đóng hộp
      description: Phân loại hình thức chế biến hoặc cách trình bày của thịt trong
        bao bì.
    canoe_construction_type:
      name: Loại kết cấu thuyền Canoe
      description: Phân biệt giữa các kiểu cấu tạo thân thuyền canoe, chẳng hạn như
        vỏ cứng, bơm hơi và gấp gọn.
    canoe_hull_shape:
      name: Hình dạng thân thuyền canoe
      description: Xác định mặt cắt ngang chính hoặc hình dạng đáy của thân thuyền,
        ảnh hưởng đến độ ổn định và khả năng điều khiển.
    canoe_stern_design:
      name: Thiết kế đuôi thuyền canoe
      description: Xác định kiểu dáng đuôi thuyền, ảnh hưởng đến khả năng tương thích
        với động cơ và khả năng điều khiển.
    canopy_type:
      name: Loại canopy
      description: Mô tả kiểu canopy hoặc tấm phủ phía trên đi kèm với giường cabana.
    canvas_compatible_media:
      name: Chất liệu canvas tương thích
      description: Cho biết loại chất liệu nghệ thuật/thủ công nào mà canvas được
        thiết kế để sử dụng.
    canvas_format:
      name: Định dạng canvas
      description: Cho biết canvas in được bán dưới dạng tờ, cuộn hoặc tấm cắt sẵn.
    canvas_mounting_format:
      name: Kiểu/cách gắn canvas
      description: Định dạng vật lý/kiểu gắn của sản phẩm canvas vẽ tranh.
    canvas_stretcher_assembly_type:
      name: Loại khung căng canvas
      description: Cho biết khung căng được bán đã lắp ráp sẵn hay dưới dạng thanh/bộ
        dụng cụ cần lắp ráp.
    canvas_stretcher_corner_joint_type:
      name: Kiểu khớp góc khung căng vải
      description: 'Cách các góc khung căng được ghép/cấu tạo (ví dụ: mộng và chốt,
        khớp ngón tay, đóng ghim, có khóa).'
    canvas_surface_tone:
      name: Màu sắc bề mặt vải canvas
      description: 'Màu nền/màu cơ bản của bề mặt vải canvas đã được phủ lớp sơn lót
        (lớp nền), không phải bất kỳ thiết kế hoặc họa tiết in nào (ví dụ: trắng,
        đen, tông màu).'
    canvas_weave_type:
      name: Kiểu dệt vải canvas
      description: Mô tả cấu trúc dệt của bề mặt vải canvas, ảnh hưởng đến kết cấu
        và khả năng xử lý sơn.
    cap_attachment_style:
      name: Kiểu gắn nắp
      description: Xác định kiểu cấu tạo/gắn của nắp chụp miệng kèn saxophone, có
        thể ảnh hưởng đến khả năng bảo vệ và độ vừa vặn với hộp đựng.
    cap_construction:
      name: Cấu tạo nắp
      description: 'Xác định cách cấu tạo của mũ đội tóc giả (ví dụ: ren phía trước,
        ren toàn bộ, buộc tay), ảnh hưởng đến tính chân thực, sự thoải mái và tính
        linh hoạt trong tạo kiểu.'
    cap_crown_structure:
      name: Cấu trúc chóp mũ
      description: Cho biết chóp mũ có cấu trúc (cứng) hay không có cấu trúc (mềm).
    cap_fit_type:
      name: Kiểu vừa vặn của mũ
      description: 'Xác định cách mũ vừa vặn hoặc điều chỉnh trên đầu người đội (ví
        dụ: vừa khít so với có thể điều chỉnh).'
    cap_seal_type:
      name: Loại gioăng mũ
      description: 'Xác định thành phần niêm phong được sử dụng để ngăn rò rỉ dầu
        và thoát hơi (ví dụ: vòng chữ O, gioăng).'
    cap_size:
      name: Kích thước mũ
      description: Nhãn kích thước tiêu chuẩn cho biết kích thước đầu tổng thể phù
        hợp với mũ đội tóc giả.
    cap_type:
      name: Loại nắp
      description: Loại giao diện nắp/khóa được sử dụng trên bình tràn.
    caper_size_grade:
      name: Phân loại kích thước nụ bạch hoa
      description: Phân loại nụ bạch hoa theo tên cấp độ tiêu chuẩn ngành tương ứng
        với đường kính nụ.
    capo_clamping_mechanism:
      name: Cơ chế kẹp capo
      description: Chỉ định kiểu kẹp/kích hoạt được sử dụng để tạo áp lực lên dây
        đàn (cách vận hành capo).
    capo_finish:
      name: Hoàn thiện bề mặt capo
      description: 'Hoàn thiện bề mặt của thân capo (hình thức/cảm giác), không phụ
        thuộc vào màu sắc (ví dụ: mờ so với bóng).'
    capo_fit_type:
      name: Kiểu lắp capo
      description: Chỉ định hình dạng cần đàn mà capo được thiết kế để phù hợp (bao
        gồm bán kính/độ phẳng), ảnh hưởng đến việc kẹp không gây rè và độ chuẩn âm.
    capo_pad_material:
      name: Chất liệu đệm kẹp tăng tông đàn
      description: Chỉ định vật liệu của miếng đệm tiếp xúc với dây đàn/bàn phím (ảnh
        hưởng đến độ bám, độ ổn định khi điều chỉnh và khả năng làm xước lớp hoàn
        thiện).
    capo_tension_mechanism:
      name: Cơ chế căng capo
      description: Chỉ định cách tạo và điều chỉnh áp lực/căng trên dây đàn cho capo
        trượt.
    capture_method:
      name: Phương pháp bắt giữ
      description: Cho biết bẫy được thiết kế để bắt sống hay tiêu diệt.
    car_ev_conversion_kit_motor_type:
      name: Loại động cơ của bộ chuyển đổi xe điện
      description: 'Xác định công nghệ động cơ kéo được bao gồm hoặc yêu cầu bởi bộ
        chuyển đổi (ví dụ: động cơ cảm ứng AC so với động cơ nam châm vĩnh cửu).'
    car_playset_items_included:
      name: Các mặt hàng đi kèm trong bộ đồ chơi xe ô tô
      description: 'Liệt kê các thành phần chính đi kèm với bộ đồ chơi xe hơi ngoài
        cấu trúc cơ bản (ví dụ: xe ô tô, mô hình, biển báo).'
    car_shampoo_application_method:
      name: Phương pháp sử dụng xà phòng rửa xe
      description: Cách sử dụng xà phòng trong quá trình rửa xe.
    car_wash_solution_form:
      name: Dạng dung dịch rửa xe
      description: 'Xác định dạng vật lý của dung dịch rửa xe (ví dụ: dạng lỏng, dạng
        bọt, khăn lau).'
    car_wash_solution_scent:
      name: Mùi hương của dung dịch rửa xe
      description: Chỉ rõ mùi hương của dung dịch rửa xe (nếu có mùi thơm).
    carbonated_water_variety:
      name: Loại nước có ga
      description: 'Phân loại nước có ga dựa trên các loại và công thức phổ biến trên
        thị trường (ví dụ: nước tonic, nước seltzer, nước có ga chức năng).'
    carbonation:
      name: Độ sủi bọt khí
      description: 'Mô tả mức độ hoặc kiểu ga trong đồ uống (ví dụ: không ga, có ga
        nhẹ, có ga, có ga nitro).'
    carburetor_barrel_count:
      name: Số lượng họng ga trong bộ chế hòa khí
      description: Cho biết số lượng lỗ/họng ga trong bộ chế hòa khí.
    carburetor_choke_type:
      name: Loại bướm gió bộ chế hòa khí
      description: Cho biết kiểu hoạt động của bướm gió được sử dụng bởi bộ chế hòa
        khí.
    carburetor_mounting_flange_type:
      name: Loại mặt bích lắp đặt bộ chế hòa khí
      description: 'Xác định kiểu giao diện lắp đặt bộ chế hòa khí để đảm bảo phù
        hợp với đường nạp/ống dẫn (ví dụ: kiểu chốt so với kiểu mặt bích/bu lông).'
    card_binder_page_type:
      name: Loại trang bìa đựng thẻ
      description: 'Đối với bìa/tập hồ sơ: kiểu trang được sử dụng để lưu trữ thẻ.'
    card_box_holder_type:
      name: Loại hộp/giá đựng thẻ
      description: 'Xác định hình thức chức năng của sản phẩm để thu thập hoặc giữ
        thẻ tại một sự kiện (ví dụ: hộp, hộp kiểu hộp thư, giỏ, giá đỡ).'
    card_game_accessory_features:
      name: Tính năng phụ kiện trò chơi thẻ bài
      description: Các tính năng chức năng đáng chú ý của phụ kiện trò chơi thẻ bài.
    card_lot_type:
      name: Loại lô thẻ
      description: Cho biết sản phẩm là thẻ đơn hay lô/bộ nhiều thẻ.
    card_sleeve_size_format_compatibility:
      name: Kích thước/định dạng tương thích của bao đựng thẻ
      description: Chỉ định kích thước thẻ mà bao đựng/trang/hộp đựng thẻ được thiết
        kế để phù hợp.
    carding_surface_pin_material:
      name: Chất liệu kim chải bề mặt
      description: Chất liệu của kim/răng được sử dụng để tách và mở sợi.
    care_durability:
      name: Độ bền khi chăm sóc
      description: Độ bền khi giặt/chịu nhiệt của nhãn sau khi dán.
    care_label_attachment_type:
      name: Kiểu gắn nhãn chăm sóc
      description: 'Cách thiết kế nhãn chăm sóc để dán vào sản phẩm (ví dụ: may, ủi/ép
        nhiệt, keo dán).'
    care_label_format:
      name: Định dạng nhãn chăm sóc
      description: Định dạng vật lý/in ấn của nhãn chăm sóc.
    care_label_symbol_system:
      name: Hệ thống ký hiệu nhãn chăm sóc
      description: 'Các tiêu chuẩn/bộ ký hiệu được sử dụng trên nhãn (ví dụ: ký hiệu
        chăm sóc ISO, ký hiệu ASTM/US).'
    cargo_area_configuration:
      name: Cấu hình khu vực chở hàng
      description: 'Chỉ định kiểu cấu trúc hoặc vị trí của khu vực chở hàng trên xe
        đạp chở hàng (ví dụ: đuôi dài, xe nâng phía trước, xe ba bánh).'
    cargo_net_adjustability:
      name: Khả năng điều chỉnh lưới chở hàng
      description: Cho biết liệu lưới chở hàng có thể điều chỉnh độ căng/độ vừa vặn
        hay không và cách thức điều chỉnh.
    cargo_net_position:
      name: Vị trí lưới chở hàng
      description: Vị trí lưới được thiết kế để lắp đặt hoặc hoạt động trong khoang
        hành lý/khoang chở hàng.
    cargo_net_stretch_type:
      name: Loại co giãn của lưới chở hàng
      description: Lưới chở hàng trong khoang hành lý có tính đàn hồi/co giãn hay
        cố định/không co giãn.
    cargo_net_style:
      name: Kiểu lưới chở hàng
      description: 'Chỉ định kiểu cấu tạo hoặc hình dạng của lưới chở hàng (ví dụ:
        dây bungee, dây đai, lưới chắn, lưới võng).'
    cargo_rack_finish:
      name: Lớp hoàn thiện giá chở hàng
      description: Lớp hoàn thiện/lớp phủ bề mặt bên ngoài của giá chở hàng.
    carpet_cleaner_application_method:
      name: Phương pháp sử dụng chất tẩy rửa thảm
      description: Chỉ định cách thức sử dụng và làm sạch sản phẩm trên thảm (ngoài
        hình thức chung).
    carrier_style:
      name: Kiểu giá đỡ
      description: Cơ chế/kiểu dáng được sử dụng để đỡ thuyền trên xe.
    carrot_size:
      name: Kích thước củ cà rốt
      description: Phân loại kích thước chung của sản phẩm cà rốt.
    carrot_variety:
      name: Giống cà rốt
      description: Xác định giống hoặc chủng loại cụ thể của cà rốt.
    carrying_capacity_pairs_boards:
      name: Sức chứa (cặp/ván)
      description: 'Cho biết phụ kiện cho phép hoặc dự định hỗ trợ bao nhiêu ván trượt
        (cặp) hoặc ván trượt tuyết khi sử dụng với giá đỡ (ví dụ: bộ mở rộng).'
    cartridge_thread_compatibility:
      name: Khả năng tương thích ren hộp mực
      description: Cho biết tiêu chuẩn ren mà máy hóa hơi hoặc pin hỗ trợ, đảm bảo
        hộp mực và pin tương thích về mặt vật lý.
    case_capacity_butts_shafts:
      name: Sức chứa hộp (cán × thân)
      description: 'Xác định số lượng cán và thân cơ mà hộp có thể chứa, được biểu
        thị theo định dạng cán x thân (ví dụ: 2x4 = 2 cán & 4 thân).'
    case_features:
      name: Tính năng của hộp đựng
      description: Nêu bật các tính năng chức năng của hộp đựng chũm chọe/trống liên
        quan đến bảo vệ và vận chuyển.
    case_humidifier_refill_type:
      name: Loại chất làm ẩm hộp đựng
      description: Cho biết liệu chất làm ẩm sử dụng vật liệu có thể tái sử dụng (có
        thể làm ướt lại/tái tạo) hay chất làm ẩm thay thế dùng một lần.
    case_lining_material:
      name: Chất liệu lớp lót bên trong hộp đựng
      description: Xác định vật liệu chính lót bên trong hộp đựng hoặc túi đựng nhạc
        cụ tiếp xúc và bảo vệ nhạc cụ hoặc đồ vật bên trong.
    case_material:
      name: Chất liệu hộp đựng
      description: Xác định vật liệu chính của vỏ đồng hồ, ảnh hưởng đến độ bền, trọng
        lượng và tính thẩm mỹ.
    case_mounting_method:
      name: Phương pháp lắp đặt hộp đựng
      description: Cách thức đặt hoặc gắn máy tạo ẩm bên trong hộp đựng nhạc cụ.
    case_structure:
      name: Cấu trúc hộp đựng
      description: Cho biết độ cứng của cấu trúc hộp đựng.
    case_style_cymbal_drum:
      name: Kiểu hộp đựng (chũm chọe/trống)
      description: Chỉ rõ sản phẩm là túi mềm, hộp cứng hay thiết kế kết hợp để vận
        chuyển chũm chọe hoặc bộ trống.
    casing_material:
      name: Vật liệu vỏ lốp
      description: Xác định loại vải chính được sử dụng trong vỏ lốp, ảnh hưởng đến
        trọng lượng, cảm giác lái và khả năng chống thủ
    casino_set_chip_material:
      name: Vật liệu chip bộ bài casino
      description: Vật liệu chính của các chip đi kèm (nếu có).
    casino_set_layout_included:
      name: Bố cục bộ bài casino đi kèm
      description: Chỉ định loại bề mặt/bố cục chơi bài nào được bao gồm trong bộ
        bài.
    cask_finish:
      name: Lớp ủ hoàn thiện trong thùng gỗ sồi
      description: Chỉ định loại thùng hoặc xô được sử dụng để hoàn thiện hoặc ủ rượu,
        chẳng hạn như thùng bourbon hoặc thùng sherry.
    cassava_variety:
      name: Giống sắn
      description: Xác định giống sắn cụ thể được cung cấp, ảnh hưởng đến hương vị,
        màu sắc và đặc tính nấu nướng.
    cassette_body_type:
      name: Loại thân băng cassette
      description: 'Tiêu chuẩn trục tự do hoặc trục dẫn động mà trục sau hoặc bánh
        xe chấp nhận (ví dụ: HG 11, XDR, Microspline).'
    cassette_deck_feature_set:
      name: Bộ tính năng của đầu phát băng cassette
      description: Cho biết các tính năng vận chuyển và phát lại băng cassette phổ
        biến đối với đầu phát băng cassette gắn trên bảng điều khiển.
    cassette_speed_compatibility:
      name: Khả năng tương thích tốc độ của líp
      description: 'Cho biết số tốc độ (ví dụ: tốc độ 7, tốc độ 12) mà líp hoặc bánh
        răng tự do được thiết kế để hoạt động cùng, đảm bảo khả năng tương thích với
        xích, cần gạt số và bộ chuyển số.'
    castanet_shell_size_class:
      name: Kích thước vỏ castanet
      description: Kích thước tiêu chuẩn cho vỏ castanet, thường được người chơi/giáo
        viên sử dụng để lựa chọn kích thước và âm thanh.
    castanets_included_pieces:
      name: Số lượng castanet đi kèm
      description: Cho biết những gì được bao gồm trong sản phẩm (một cặp so với một
        chiếc, cộng thêm phụ kiện).
    castanets_pitch:
      name: Cao độ castanet
      description: Cho biết cao độ/kích thước thông dụng được các nhà sản xuất sử
        dụng để mô tả phạm vi âm thanh.
    castanets_type:
      name: Loại castanet
      description: Chỉ định kiểu dáng hoặc loại mục đích sử dụng của castanet.
    caster_type:
      name: Loại bánh xe đẩy
      description: 'Xác định kiểu bánh xe được lắp vào xe đẩy (ví dụ: xoay, khóa),
        cho biết khả năng cơ động và độ ổn định.'
    castle_playset_included_items:
      name: Các mặt hàng đi kèm trong bộ đồ chơi lâu đài
      description: 'Liệt kê các thành phần chính đi kèm với bộ đồ chơi lâu đài để
        người mua sắm có thể so sánh các bộ (ví dụ: hình nhân, đồ nội thất, xe cộ,
        phụ kiện).'
    catcher_equipment_included:
      name: Các thiết bị đi kèm của vị trí bắt bóng
      description: Chỉ định các thành phần có trong bộ dụng cụ bắt bóng chày, chẳng
        hạn như mũ bảo hiểm hoặc tấm bảo vệ ngực.
    catcher_helmet_style:
      name: Kiểu mũ bảo hiểm bắt bóng chày
      description: Cho biết kiểu thiết kế tổng thể của mũ bảo hiểm bảo vệ đầu của
        người bắt bóng chày.
    cattle_breed:
      name: Giống gia súc
      description: 'Xác định giống bò dùng để sản xuất thịt bò (ví dụ: Angus, Wagyu,
        Hereford).'
    cauliflower_variety:
      name: Giống súp lơ
      description: Xác định giống, màu sắc hoặc giống đặc biệt của súp lơ đang được
        bán.
    celery_form:
      name: Hình dạng cần tây
      description: Chỉ định hình dạng vật lý hoặc kiểu cắt mà cần tây được bán.
    celery_variety:
      name: Giống cần tây
      description: Ghi lại giống hoặc loại cần tây cụ thể, cho phép người mua sắm
        lựa chọn theo hương vị, màu sắc hoặc cách sử dụng trong nấu ăn.
    cereal_bar_texture:
      name: Kết cấu thanh ngũ cốc
      description: 'Mô tả cảm giác khi ăn và độ đặc của thanh ngũ cốc (ví dụ: dai,
        giòn).'
    cereal_type:
      name: Loại ngũ cốc
      description: Phân loại hình dạng hoặc định dạng của ngũ cốc hoặc granola (vảy,
        phồng, cụm granola, muesli, v.v.) để giúp người mua sắm tìm được kết cấu hoặc
        phương pháp chế biến ưa thích.
    certificate_border_style:
      name: Kiểu viền chứng nhận
      description: Mô tả kiểu viền trang trí được sử dụng trên chứng nhận.
    certificate_personalization_type:
      name: Loại cá nhân hóa chứng nhận
      description: Chỉ định cách chứng nhận có thể được cá nhân hóa (để trống để viết
        tay, mẫu in sẵn, in sẵn với các trường thông tin có thể thay đổi, v.v.).
    certification_service:
      name: Dịch vụ chứng nhận
      description: Công ty đánh giá/chứng nhận bên thứ ba (nếu có).
    certification_standard:
      name: Tiêu chuẩn chứng nhận
      description: Chỉ định tiêu chuẩn chứng nhận hoặc tiêu chuẩn tuân thủ về an toàn
        và khả năng chống cháy mà mũ trùm đầu đáp ứng.
    chain_coating_finish:
      name: Lớp phủ/hoàn thiện xích
      description: 'Chỉ định bất kỳ phương pháp xử lý bề mặt hoặc lớp hoàn thiện nào
        được áp dụng cho xích để cải thiện độ bền, giảm ma sát, ngăn ngừa ăn mòn hoặc
        thay đổi hình thức (ví dụ: Ti-nitride, DLC, niken, EPT chống gỉ).'
    chain_connection_type:
      name: Loại kết nối xích
      description: Chỉ định phương pháp khóa được cung cấp hoặc yêu cầu để nối các
        đầu xích.
    chain_tier_configuration:
      name: Cấu hình bậc xích
      description: Chỉ định số lượng/cách bố trí các bậc xích trong bộ phận giữ xích
        (một bậc, hai bậc hoặc ba bậc).
    chain_tool_type:
      name: Loại dụng cụ tháo lắp xích
      description: Phân loại loại dụng cụ tháo lắp xích xe đạp cụ thể để người mua
        sắm có thể nhanh chóng tìm thấy thiết bị phù hợp.
    chainring_shape:
      name: Hình dạng đĩa xích
      description: Cho biết hình dạng của đĩa xích, chẳng hạn như tròn hoặc hình bầu
        dục/hình elip.
    chair_accessories_included:
      name: Phụ kiện ghế đi kèm
      description: Liệt kê các phụ kiện tích hợp hoặc đi kèm giúp tăng cường chức
        năng của ghế.
    chair_sash_care_instructions:
      name: Hướng dẫn chăm sóc dây đai ghế
      description: Mô tả phương pháp làm sạch/bảo dưỡng được khuyến nghị cho dây đai
        ghế.
    chair_sash_finish:
      name: Lớp hoàn thiện dây đai ghế
      description: Mô tả độ bóng/lớp hoàn thiện bề mặt của vải dây đai.
    chair_storage_design:
      name: Thiết kế lưu trữ ghế
      description: 'Cho biết cách ghế xếp được thiết kế để cất giữ (ví dụ: gấp gọn,
        xếp chồng, không thể thu gọn) để giúp khách hàng đánh giá khả năng lưu trữ
        và tính di động.'
    chaise_or_sectional_orientation:
      name: Hướng đặt ghế dài hoặc ghế ghép
      description: Chỉ định phía có ghế dài tích hợp hoặc phần mở rộng khi đối diện
        với ghế sofa.
    chamber_size:
      name: Kích thước buồng
      description: Cho biết kích thước/thể tích buồng của ống thổi, ảnh hưởng đến
        độ cản và màu sắc âm thanh.
    chanter_finger_spacing:
      name: Khoảng cách ngón tay trên ống thổi
      description: Cho biết khoảng cách/kích thước ngón tay trên ống thổi (thường
        được mô tả là tiêu chuẩn, tay nhỏ hoặc tay lớn).
    chanter_type:
      name: Loại ống chanter
      description: Kiểu/cấu hình ống thổi đi kèm với nhạc cụ (hoặc được nhạc cụ sử
        dụng), chẳng hạn như đầu hở, đầu kín, luyện tập hoặc có phím.
    chard_variety:
      name: Giống cải cầu vồng
      description: Xác định giống hoặc màu sắc cụ thể của cải cầu vồng đang được bán.
    charging_port_location:
      name: Vị trí cổng sạc
      description: Vị trí vật lý của cổng sạc ngoài chính của xe (cổng sạc).
    chassis_construction_type:
      name: Kiểu cấu trúc khung gầm
      description: Mô tả phương pháp cấu tạo khung gầm chính được sử dụng cho xe.
    checkbook_loading_orientation:
      name: Hướng nạp sổ séc
      description: Cho biết bìa sổ séc có tương thích với kiểu nạp từ trên, nạp từ
        bên hông hay kiểu nạp phổ thông hay không.
    cheekpiece_style:
      name: Kiểu má hàm
      description: Xác định kiểu cấu hình má/vòng trên hàm thiếc, quyết định hoạt
        động của dây cương và độ ổn định bên.
    cheese_alternative_form:
      name: Hình thức thay thế phô mai
      description: Chỉ định hình thức vật lý hoặc kiểu cắt mà sản phẩm thay thế phô
        mai được bán.
    cheese_form:
      name: Hình dạng phô mai
      description: 'Mô tả hình thức trình bày vật lý của sản phẩm phô mai (ví dụ:
        bánh tròn, khối, thái lát, bào sợi).'
    cheese_texture:
      name: Kết cấu phô mai
      description: Phân loại phô mai theo kết cấu hoặc độ cứng chung.
    cheese_variety:
      name: Loại phô mai
      description: Xác định loại phô mai được sử dụng làm hương vị chính trong món
        ăn nhẹ.
    cherimoya_variety:
      name: Loại quả anh đào Cherimoya
      description: 'Xác định giống/loại cụ thể của quả anh đào Cherimoya (ví dụ: Fino
        de Jete, El Bumpo).'
    cherry_variety:
      name: Giống quả anh đào
      description: Chỉ định giống hoặc loại quả anh đào, giúp người mua sắm lựa chọn
        các loại cụ thể được biết đến với hương vị, màu sắc, kích thước hoặc mục đích
        sử dụng trong ẩm thực.
    chest_pocket_style:
      name: Kiểu túi ngực
      description: Xác định sự hiện diện và cấu hình của túi ngực trên áo sơ mi.
    chewing_tobacco_form:
      name: Dạng thuốc lá nhai
      description: 'Xác định dạng vật lý, kiểu cắt hoặc kích thước gói của sản phẩm
        thuốc lá nhai (ví dụ: lá rời, cắt dài, gói nhỏ).'
    chicory_variety:
      name: Giống rau diếp xoăn
      description: 'Xác định giống hoặc chủng loại cụ thể của rau diếp xoăn đang được
        bán (ví dụ: Radicchio, Belgian Endive, Escarole).'
    chiffon_recommended_use:
      name: Ứng dụng được đề xuất cho vải chiffon
      description: Ứng dụng may/thủ công chính được đề xuất cho vải chiffon.
    child_seat_accessory_type:
      name: Loại phụ kiện ghế trẻ em
      description: 'Xác định loại phụ kiện hoặc bộ phận thay thế ghế trẻ em cụ thể
        (ví dụ: đệm ghế, chỗ để chân, bộ chuyển đổi gắn), cho phép người mua nhanh
        chóng thu hẹp phạm vi tìm kiếm đến mặt hàng họ cần mà không cần tạo ra nhiều
        danh mục nhỏ.'
    child_seat_mounting_type:
      name: Loại lắp đặt ghế trẻ em
      description: Chỉ định cách ghế trẻ em gắn vào khung xe đạp, giá đỡ hoặc khu
        vực buồng lái.
    chime_sound_character:
      name: Đặc điểm âm thanh chuông
      description: Mô tả đặc điểm/âm sắc dự định của chuông.
    chin_cup_type:
      name: Loại đệm cằm
      description: Chỉ định kiểu dáng hoặc cấu tạo của đệm cằm, ảnh hưởng đến sự thoải
        mái và khả năng bảo vệ chống va đập.
    chin_strap_type:
      name: Loại quai cằm
      description: Chỉ định loại dây đeo cằm của mũ—không có, cố định, có thể điều
        chỉnh hoặc có thể tháo rời—để giúp người mua lựa chọn kiểu dáng giữ chắc chắn
        trong điều kiện gió hoặc hoạt động mạnh.
    china_cymbal_edge_shape:
      name: Hình dạng cạnh chũm chọe Trung Quốc
      description: Mô tả hình dạng cạnh/vành điển hình của chũm chọe Trung Quốc (độ
        cong của vành), ảnh hưởng đến cảm giác và âm thanh.
    china_cymbal_sound_character:
      name: Đặc điểm âm thanh chũm chọe Trung Quốc
      description: 'Các mô tả chính về âm thanh/đặc điểm âm sắc của chũm chọe Trung
        Quốc được sử dụng để tìm kiếm và lọc (ví dụ: rè, tối, sáng). Có thể áp dụng
        nhiều giá trị.'
    chinstrap_type:
      name: Loại dây đeo cằm
      description: Kiểu dây đeo cằm được cung cấp kèm theo mũ bảo hiểm.
    chip_cut_style:
      name: Khiểu cắt khoai tây chiên
      description: 'Chỉ định kiểu cắt hoặc kết cấu vật lý của khoai tây chiên (ví
        dụ: có vân, chiên bằng nồi, chiên nổ).'
    chip_denomination:
      name: Mệnh giá chip
      description: Bộ chip này bao gồm những mệnh giá (giá trị) nào (được in hoặc
        được chỉ định)?
    chocolate_form:
      name: Hình dạng sô cô la
      description: Mô tả hình dạng vật lý của sô cô la dùng để làm bánh.
    choy_sum_variety:
      name: Giống cải thìa
      description: Xác định thị trường hoặc giống thực vật cụ thể của cải thìa đang
        được bán.
    cigar_wrapper_color:
      name: Màu lá bọc xì gà
      description: Phân loại màu tiêu chuẩn của lá bọc xì gà.
    cigarette_filter_type:
      name: Loại đầu lọc thuốc lá
      description: Chỉ định xem thuốc lá có đầu lọc hay không và nếu có, cấu tạo hoặc
        đặc điểm đặc biệt của đầu lọc đó.
    cigarette_size:
      name: Kích cỡ điếu thuốc lá
      description: 'Phân loại thuốc lá theo chiều dài hoặc định dạng tiêu chuẩn của
        ngành (ví dụ: cỡ lớn, 100 điếu, loại nhỏ).'
    cigarette_strength_descriptor:
      name: Mô tả độ mạnh của thuốc lá
      description: 'Nhãn độ mạnh được các thương hiệu sử dụng truyền thống để chỉ
        ra hàm lượng hắc ín/nicotine (ví dụ: Nhẹ, Đậm, Bạc).'
    cinch_liner_material:
      name: Chất liệu lót đai
      description: Xác định chất liệu được sử dụng cho lớp lót hoặc lớp đệm tiếp xúc
        với ngựa.
    circular_knitting_needle_cable_type:
      name: Loại dây cáp kim đan tròn
      description: 'Chất liệu/đặc tính và cấu tạo của dây cáp (ví dụ: thép phủ, nylon)
        ảnh hưởng đến khả năng ghi nhớ/gập và xoay.'
    circular_knitting_needles_tip_material:
      name: Chất liệu đầu kim đan tròn
      description: Chất liệu của hai đầu kim (khác với chất liệu dây cáp).
    circumference_adjustment_mechanism:
      name: Cơ chế điều chỉnh chu vi
      description: Cơ chế được sử dụng để điều chỉnh hoặc khóa chu vi cuộn chỉ.
    clamp_design:
      name: Thiết kế kẹp
      description: Mô tả kiểu cấu trúc hoặc cơ chế của kẹp định vị.
    clamp_sheet_music_clip_features:
      name: Đặc điểm của kẹp bản nhạc
      description: 'Các đặc điểm chức năng và bảo vệ của kẹp bản nhạc (ví dụ: đệm,
        chống trượt, xoay).'
    clamping_closure_type:
      name: Loại kẹp/khóa
      description: Chỉ định cơ chế được sử dụng để siết chặt hoặc cố định khung thêu
        quanh vải.
    clarinet_bell_acoustic_design:
      name: Thiết kế âm học loa kèn clarinet
      description: Mô tả thiết kế âm thanh/lỗ thông hơi của loa kèn nhằm ảnh hưởng
        đến độ nhạy và độ chuẩn âm.
    clarinet_bell_adjustment_mechanism:
      name: Cơ chế điều chỉnh loa kèn clarinet
      description: Mô tả cách điều chỉnh chiều dài/hình dạng của loa kèn.
    clarinet_bell_ring_material:
      name: Chất liệu vòng bảo vệ loa kèn clarinet
      description: Xác định chất liệu của vòng/dải bảo vệ trên vành loa kèn clarinet,
        nếu có.
    clarinet_bell_tuning_effect:
      name: Hiệu ứng điều chỉnh âm của loa kèn clarinet
      description: Cho biết thiết kế loa ảnh hưởng đến việc điều chỉnh âm/ngữ điệu
        như thế nào (đặc biệt là âm thanh ở cổ họng và âm vực thấp) so với loa tiêu
        chuẩn.
    clarinet_body_type:
      name: Kiểu thân kèn Clarinet
      description: Cho biết loại cấu trúc thân chính của kèn clarinet A.
    clarinet_bore_type:
      name: Loại lỗ thoát khí của kèn clarinet
      description: Mô tả thiết kế lỗ thoát khí của kèn clarinet alto.
    clarinet_cap_style:
      name: Kiểu nắp kèn clarinet
      description: 'Kiểu thiết kế của nắp đi kèm với sản phẩm kẹp giữ lưỡi kèn và/hoặc
        nắp ống ngậm kèn clarinet (ví dụ: ngược hoặc có lỗ thông hơi).'
    clarinet_care_kit_intended_use:
      name: Mục đích sử dụng của bộ dụng cụ chăm sóc kèn clarinet
      description: 'Bối cảnh sử dụng chính mà bộ dụng cụ được thiết kế (ví dụ: làm
        khô nhanh hàng ngày so với làm sạch/bảo dưỡng sâu).'
    clarinet_included_accessories:
      name: Phụ kiện kèm theo của kèn Clarinet
      description: Xác định những gì có trong hộp với kèn clarinet Bb.
    clarinet_keywork_material:
      name: Chất liệu cơ cấu phím kèn clarinet
      description: 'Xác định chất liệu của cơ cấu phím kèn clarinet (ví dụ: đồng thau,
        bạc niken, mạ bạc).'
    clarinet_keywork_plating:
      name: Lớp mạ hệ thống phím kèn Clarinet
      description: Xác định lớp mạ/chất liệu hoàn thiện của bộ phím kèn clarinet.
    clarinet_mouthpiece_baffle_profile:
      name: Hình dạng vách ngăn bên trong của ống ngậm kèn clarinet
      description: Mô tả hình dạng vách ngăn/mái bên trong của ống ngậm kèn clarinet,
        ảnh hưởng đến độ sáng và độ vang của âm thanh.
    clarinet_mouthpiece_beak_shape:
      name: Hình dạng mỏ kèn clarinet
      description: Xác định hình dạng/góc mỏ kèn bên ngoài để tạo sự thoải mái cho
        người chơi và cảm giác khi đặt môi.
    clarinet_mouthpiece_chamber_size:
      name: Kích thước khoang đầu thổi kèn Clarinet
      description: Mô tả kích thước buồng tương đối của ống ngậm kèn clarinet (do
        nhà sản xuất quy định), có thể ảnh hưởng đến màu sắc âm thanh và lực cản khi
        chơi.
    clarinet_mouthpiece_intended_tone:
      name: Âm thanh mong muốn của ống ngậm kèn clarinet
      description: Mô tả mục tiêu âm thanh chung được quảng cáo cho ống ngậm.
    clarinet_mouthpiece_player_level:
      name: Trình độ người chơi của ống ngậm kèn clarinet
      description: Cho biết trình độ người dùng mục tiêu điển hình cho ống ngậm.
    clarinet_reed_cut:
      name: Kiểu cắt lưỡi kèn clarinet
      description: 'Xác định kiểu cắt/hình dạng lưỡi kèn (ví dụ: mài hoặc không mài
        và các kiểu cắt khác được bán trên thị trường) có ảnh hưởng đến độ nhạy và
        âm thanh.'
    clarinet_reed_material_type:
      name: Loại vật liệu lưỡi kèn clarinet
      description: Cho biết lưỡi kèn được làm từ gì (mía so với vật liệu tổng hợp
        và các loại vật liệu tổng hợp phổ biến).
    clarinet_thumb_rest_type:
      name: Loại giá đỡ ngón cái kèn clarinet
      description: Loại/đặc điểm của giá đỡ ngón cái tay phải.
    classical_guitar_string_3rd_string_type:
      name: Loại dây đàn guitar cổ điển (dây thứ 3)
      description: Dây G (thứ 3) là dây trơn (monofilament) hay dây quấn.
    classical_guitar_string_bass_winding_material:
      name: Chất liệu quấn dây bass đàn guitar cổ điển
      description: Chất liệu quấn được sử dụng cho các dây bass (thường là dây 4-6).
    classical_guitar_string_set_configuration:
      name: Cấu hình bộ dây đàn guitar cổ điển
      description: Xác định xem sản phẩm là một bộ hoàn chỉnh hay chỉ là các dây riêng
        lẻ (thường là dây treble hoặc bass) cho đàn guitar cổ điển.
    clay_modeling_dough_base_material:
      name: Chất liệu cơ bản của đất sét và bột nặn
      description: Công thức/loại cơ bản chính của chất liệu nặn.
    clay_modeling_dough_curing_method:
      name: Phương pháp làm cứng đất sét và bột nặn
      description: Cách vật liệu đông cứng (hoặc có thể tái sử dụng), điều này quyết
        định các dụng cụ cần thiết và các trường hợp sử dụng điển hình.
    clay_paintability:
      name: Khả năng sơn của đất sét
      description: Cho biết bề mặt đất sét đã đông cứng có thể sơn được hay không
        và các loại sơn được khuyến nghị.
    clay_primary_composition:
      name: Thành phần chính của đất sét
      description: 'Chất liệu cơ bản/chất kết dính chính của đất sét khô trong không
        khí (ví dụ: gốc giấy, gốc khoáng).'
    clay_shooting_discipline:
      name: Môn bắn súng đất sét
      description: Xác định môn bắn súng đất sét hoặc sự kiện mà sản phẩm hướng đến.
    cleaner_format:
      name: Định dạng bao bì
      description: Định dạng/bao bì của sản phẩm dung dịch vệ sinh slide.
    cleaner_sanitizer_intended_area:
      name: Khu vực cần vệ sinh/khử trùng
      description: Bộ phận chính của nhạc cụ bằng đồng mà sản phẩm được thiết kế để
        làm sạch/khử trùng.
    cleaning_formula:
      name: Công thức làm sạch
      description: Xác định nhóm hóa chất làm sạch/khử trùng chính của sản phẩm (không
        phải thương hiệu) để hỗ trợ việc lọc an toàn, tương thích và sử dụng.
    cleaning_task_focus:
      name: Mục tiêu làm sạch
      description: Xác định các vấn đề làm sạch chính mà dung dịch rửa không cần nước
        hướng đến giải quyết.
    cleanup_method:
      name: Phương pháp làm sạch
      description: Xác định cách làm sạch keo (khi còn ướt) khỏi tay/dụng cụ/bề mặt.
    clear_glue_application_method:
      name: Phương pháp bôi keo trong suốt
      description: Xác định kiểu dụng cụ phân phối/bôi keo đi kèm trong bao bì keo
        trong suốt.
    clear_glue_finish_after_drying:
      name: Độ hoàn thiện của keo trong suốt (sau khi khô)
      description: 'Mô tả hình thức của keo sau khi khô/đóng rắn (ví dụ: trong suốt
        như pha lê so với mờ đục, bóng so với mờ).'
    cleat_bolt_pattern:
      name: Kiểu bắt vít đế giày
      description: 'Xác định cấu hình bắt vít giày được sử dụng để gắn đế giày, quyết
        định khả năng tương thích giữa bàn đạp và giày (ví dụ: MTB 2 vít so với xe
        đạp đường trường 3 vít).'
    cleat_compatibility:
      name: Độ tương thích của cá giày
      description: Xác định hệ thống bàn đạp hoặc đế giày nào phù hợp với vỏ giày.
    cleat_finish:
      name: Lớp hoàn thiện đế giày
      description: Xác định lớp hoàn thiện/lớp phủ bề mặt của đế giày, ảnh hưởng đến
        khả năng chống ăn mòn và hình thức.
    cleat_receptacle_system:
      name: Hệ thống ổ cắm đinh giày
      description: Xác định giao diện gắn đinh/đinh tán tương thích được sử dụng trên
        giày chơi golf có đinh.
    cleat_release_mechanism:
      name: Cơ chế mở/tháo cá giày
      description: 'Chỉ định cách tháo đinh giày xe đạp khỏi bàn đạp (ví dụ: tháo
        một chiều hoặc tháo nhiều chiều).'
    cleat_stud_type:
      name: Loại đinh tán
      description: Chỉ định cấu tạo hoặc kiểu gắn của đinh tán/đinh tán trên đế ngoài
        của giày bóng bầu dục Mỹ.
    climate_control_module_function:
      name: Chức năng mô-đun điều khiển khí hậu
      description: Chỉ định vai trò chính của mô-đun trong hệ thống HVAC của xe.
    climbing_hold_mounting_type:
      name: Kiểu lắp đặt điểm bám leo núi
      description: Chỉ định cách cố định điểm bám vào tường hoặc bảng tập luyện.
    climbing_hold_type:
      name: Loại mấu bám leo núi
      description: Phân loại hình dạng hoặc kiểu của điểm bám xác định cách nắm giữ.
    climbing_protection_device_type:
      name: Loại thiết bị bảo hộ leo núi
      description: 'Chỉ định kiểu thiết bị bảo hộ (ví dụ: cam, đai ốc, chốt), giúp
        người leo núi nhanh chóng chọn đúng thiết bị cho một đặc điểm đá hoặc kiểu
        leo núi cụ thể.'
    climbing_rope_middle_marking:
      name: Dấu hiệu giữa dây leo
      description: Mô tả cách xác định điểm giữa (và/hoặc hai đầu) của dây để hỗ trợ
        việc leo xuống và xuống dây an toàn.
    climbing_rope_treatment:
      name: Xử lý dây leo
      description: Cho biết bất kỳ lớp phủ chống thấm nước, làm khô hoặc bảo vệ nào
        được áp dụng cho vỏ và/hoặc lõi dây.
    climbing_rope_type:
      name: Loại dây leo
      description: 'Phân loại dây theo chứng nhận UIAA và mục đích sử dụng (ví dụ:
        dây đơn động, dây đôi, dây kép, dây tĩnh, dây phụ kiện), giúp người mua sắm
        nhanh chóng tìm được loại dây phù hợp với hoạt động của họ.'
    climbing_safety_certifications:
      name: Chứng nhận an toàn leo núi
      description: Liệt kê các tiêu chuẩn an toàn leo núi và công nghiệp mà thiết
        bị đáp ứng.
    clip_color:
      name: Màu kẹp
      description: Màu chủ đạo của kẹp bản nhạc.
    clip_mechanism_type:
      name: Kiểu cơ chế kẹp
      description: Xác định cơ chế khóa được sử dụng bởi kẹp tiền hoặc ví kẹp tiền,
        giúp người mua sắm lựa chọn giữa kiểu từ tính, thanh lò xo, cần gạt và các
        kiểu khác.
    clip_style:
      name: Kiểu kẹp
      description: 'Xác định cơ chế kẹp cụ thể được sử dụng để gắn giá đỡ, cung cấp
        thông tin về khả năng tương thích (ví dụ: kẹp cá sấu, móc khóa carabiner).'
    clipper_motor_technology:
      name: Công nghệ động cơ kẹp
      description: Xác định thiết kế động cơ được sử dụng trong kẹp, ảnh hưởng đến
        công suất đầu ra, tiếng ồn, độ bền và bảo trì.
    closet_configuration:
      name: Cấu hình tủ quần áo
      description: 'Xác định hình dạng tổng thể hoặc bố cục của hệ thống tủ quần áo
        bege (ví dụ: hình chữ L, hình chữ U, kiểu đảo).'
    closing_mechanism:
      name: Cơ chế đóng
      description: Chỉ định kiểu đóng ngăn kéo, chẳng hạn như tiêu chuẩn, đóng êm,
        tự động đóng hoặc đẩy để mở.
    cloth_construction:
      name: Cấu trúc vải
      description: 'Cho biết kiểu dệt hoặc độ hoàn thiện của vải ảnh hưởng đến tốc
        độ và độ bền (ví dụ: vải len chải kỹ so với vải len).'
    cloth_thickness:
      name: Độ dày vải
      description: Cho biết độ dày/trọng lượng của vải đánh bóng.
    club_head_material:
      name: Vật liệu đầu gậy
      description: Chỉ định vật liệu chính được sử dụng trong cấu tạo của đầu gậy.
    clutch_hydraulic_system_type:
      name: Loại hệ thống thủy lực ly hợp
      description: 'Cho biết khả năng tương thích của hệ thống truyền động ly hợp/thủy
        lực (ví dụ: ly hợp thủy lực so với ứng dụng chuyển đổi cáp).'
    clutch_line_connection_type:
      name: Loại kết nối đường ống ly hợp
      description: Xác định giao diện kết nối/phụ kiện đầu cuối được sử dụng bởi đường
        ống ly hợp (quan trọng để tương thích với xi lanh chính/phụ và đường ống cứng).
    clutch_pressure_plate_actuation_type:
      name: Loại tác động của đĩa ép ly hợp
      description: Cho biết ly hợp được nhả bằng cơ chế nhả kiểu đẩy hay kiểu kéo
        (tác động bằng lò xo màng).
    clutch_pressure_plate_release_mechanism_type:
      name: Loại cơ chế nhả đĩa ép ly hợp
      description: Kiểu giao diện nhả/tác động được sử dụng bởi đĩa ép.
    clutch_pressure_plate_surface_type:
      name: Loại bề mặt đĩa ép ly hợp
      description: Kiểu bề mặt tiếp xúc ma sát của đĩa ép.
    clutch_slave_cylinder_connection_type:
      name: Kiểu kết nối xi-lanh con của ly hợp
      description: Giao diện kết nối đường ống thủy lực trên xi lanh phụ (cổng ren,
        kết nối nhanh, banjo, v.v.).
    clutch_slave_cylinder_mounting_type:
      name: Loại lắp đặt xi lanh phụ ly hợp
      description: 'Cách lắp đặt xi lanh phụ vào hộp số/vỏ chuông (ví dụ: bắt vít,
        kẹp, đồng tâm tích hợp).'
    coating_type:
      name: Loại lớp phủ
      description: 'Xác định bất kỳ lớp phủ bên ngoài, lớp phủ mỏng hoặc lớp tráng
        men nào được áp dụng cho thanh ngũ cốc (ví dụ: sô cô la, sữa chua).'
    cocking_mechanism:
      name: Cơ chế lên cò
      description: Xác định phương pháp hoặc thiết bị chính được sử dụng để lên cò
        hoặc hạ cò dây cung nỏ.
    cocktail_garnish_form:
      name: Hình thức trang trí cocktail
      description: 'Mô tả cách thức trình bày/chế biến đồ trang trí (ví dụ: tươi so
        với sấy khô).'
    cocktail_mix_variety:
      name: Loại hỗn hợp cocktail
      description: 'Cho biết loại cocktail cụ thể mà hỗn hợp này được dùng để pha
        chế (ví dụ: Margarita, Mojito, Piña Colada).'
    cocktail_napkin_features:
      name: Đặc điểm của khăn ăn cocktail
      description: Nêu bật các đặc điểm về chức năng, sự tiện lợi và thân thiện với
        môi trường của khăn ăn cocktail.
    cocktail_pick_tip_style:
      name: Kiểu đầu que xiên cocktail
      description: Mô tả hình dạng/đặc điểm của đầu que xiên được sử dụng để xiên
        hoặc giữ đồ trang trí.
    cocktail_pick_top_handle_style:
      name: Kiểu đầu/tay cầm que xiên cocktail
      description: Mô tả hình dạng đầu hoặc tay cầm trang trí được sử dụng để cầm
        nắm hoặc trình bày.
    cocktail_type:
      name: Loại cocktail
      description: 'Nêu rõ công thức hoặc kiểu cocktail cụ thể được thể hiện bởi sản
        phẩm pha sẵn (ví dụ: Margarita, Negroni, Piña Colada).'
    cocktail_umbrella_handle_pick_material:
      name: Chất liệu tay cầm/que xiên ô cocktail
      description: Chất liệu của phần que/gậy (không bao gồm canopy) của ô cocktail.
    cocoa_processing_method:
      name: Phương pháp chế biến ca cao
      description: 'Chỉ rõ cách chế biến bột ca cao (ví dụ: Tự nhiên, Chế biến kiểu
        Hà Lan, Ca cao đen).'
    cocoa_product_form:
      name: Dạng sản phẩm ca cao
      description: Xác định hình thức vật lý mà sản phẩm ca cao được bán ra.
    coconut_husk_status:
      name: Tình trạng vỏ dừa
      description: Cho biết mức độ loại bỏ vỏ ngoài của dừa, ảnh hưởng đến độ dễ sử
        dụng, bảo quản và lượng chất thải.
    coconut_maturity_stage:
      name: Giai đoạn chín của dừa
      description: 'Xác định giai đoạn phát triển của dừa khi thu hoạch, yếu tố ảnh
        hưởng mạnh mẽ đến hương vị, hàm lượng nước và cách sử dụng trong ẩm thực (ví
        dụ: uống hay nấu).'
    coconut_oil_refinement_type:
      name: Loại tinh chế dầu dừa
      description: 'Chỉ định độ tinh chế hoặc cấp độ của dầu dừa, ví dụ: dầu dừa nguyên
        chất, tinh chế, MCT, phân đoạn.'
    coconut_preparation_form:
      name: Dạng chế biến dừa
      description: Chỉ định cách dừa được chế biến hoặc cắt (nguyên quả, thái lát,
        bào sợi, xay nhuyễn, v.v.), giúp người mua sắm nhanh chóng tìm thấy hình thức
        cần thiết cho công thức nấu ăn hoặc ăn vặt.
    coffee_bean_species:
      name: Loại hạt cà phê
      description: Chỉ định loại hạt cà phê được sử dụng trong sản phẩm.
    coffee_beverage_variety:
      name: Loại đồ uống cà phê
      description: Phân loại đồ uống cà phê pha sẵn hoặc cà phê trộn theo kiểu.
    coffee_processing_method:
      name: Phương pháp sơ chế cà phê
      description: Cho biết kỹ thuật chế biến sau thu hoạch được sử dụng trên hạt
        cà phê.
    coil_material:
      name: Chất liệu cuộn dây
      description: Xác định vật liệu chính hoặc loại lưới được sử dụng trong cuộn
        dây gia nhiệt, ảnh hưởng đến hương vị, tuổi thọ và khả năng tương thích với
        việc kiểm soát nhiệt độ.
    coil_spring_design:
      name: Thiết kế lò xo cuộn
      description: Xác định thiết kế độ cứng/hình dạng của lò xo cuộn, ảnh hưởng đến
        đặc tính vận hành.
    coil_spring_finish_coating:
      name: Lớp phủ/hoàn thiện lò xo cuộn
      description: Lớp phủ hoặc hoàn thiện bề mặt được áp dụng để chống ăn mòn.
    coil_spring_material:
      name: Vật liệu lò xo cuộn
      description: Vật liệu/thành phần chính của lò xo cuộn.
    coil_system_type:
      name: Loại hệ thống lò xo
      description: Mô tả chi tiết hệ thống lò xo hoặc cuộn dây cụ thể được sử dụng
        trong các loại nệm áp dụng, chẳng hạn như lò xo túi hoặc lò xo Bonnell.
    coil_type:
      name: Loại lò xo
      description: Mô tả cấu trúc hoặc công nghệ lò xo được sử dụng có ảnh hưởng đến
        việc tạo ra hơi và hương vị.
    coin_grade_numismatic:
      name: Xếp hạng tiền xu (numismatic)
      description: 'Xếp hạng tiêu chuẩn của tiền xu (ví dụ: thang Sheldon hoặc xếp
        hạng tính từ).'
    coin_strike_or_finish:
      name: Kiểu dập hoặc hoàn thiện tiền xu
      description: 'Kiểu dập hoặc hoàn thiện của tiền xu (ví dụ: dập thông thường,
        proof).'
    coin_strike_type:
      name: Kiểu dập tiền xu
      description: 'Mô tả kiểu dập/hoàn thiện của tiền xu (ví dụ: proof, dập thông
        thường).'
    collar_style:
      name: Kiểu cổ áo
      description: Xác định thiết kế của cổ áo hoặc đường viền cổ trên quần áo.
    collectible_gun_accessories_included:
      name: Phụ kiện súng sưu tầm đi kèm
      description: 'Liệt kê các phụ kiện và tài liệu đi kèm với súng sưu tầm (ví dụ:
        bao súng, hộp đựng, lưỡi lê, giấy tờ).'
    collectible_gun_firing_mechanism:
      name: Cơ chế bắn súng sưu tầm
      description: Chỉ định loại cơ chế bắn/đánh lửa của súng đối với súng sưu tầm
        (đặc biệt là các loại súng cổ và lịch sử).
    collectible_knife_blade_finish:
      name: Hoàn thiện lưỡi dao sưu tầm
      description: Mô tả lớp hoàn thiện/xử lý bề mặt của lưỡi dao về mặt thẩm mỹ (và
        đôi khi là khả năng chống ăn mòn).
    color_code_system:
      name: Hệ thống mã màu sắc
      description: 'Xác định hệ thống mã màu được sử dụng cho mã màu số của chỉ (ví
        dụ: DMC, Anchor), nếu có.'
    color_coding_standard:
      name: Tiêu chuẩn mã màu
      description: 'Cho biết liệu tấm in có tuân theo mã màu quốc tế (ví dụ: IWF hoặc
        IPF) hay một hệ thống khác.'
    color_effect:
      name: Hiệu ứng màu sắc
      description: Chỉ định các kỹ thuật hoặc hiệu ứng màu đặc biệt được áp dụng cho
        tóc nối.
    color_family:
      name: Nhóm màu sắc
      description: 'Nhóm màu sắc cấp cao cho mực sumi (hữu ích khi Màu quá chi tiết,
        ví dụ: đen ấm so với đen xanh).'
    color_finish:
      name: Hoàn thiện màu sắc
      description: 'Chỉ định lớp hoàn thiện của các bộ phận bảo vệ tay có thể nhìn
        thấy (ví dụ: mờ so với bóng) khi chỉ màu sắc là không đủ.'
    coloring_finish:
      name: Hoàn thiện màu sắc
      description: Chỉ định lớp hoàn thiện trực quan hoặc hiệu ứng đặc biệt được tạo
        ra bởi màu sắc, chẳng hạn như kim loại hoặc neon.
    comb_material:
      name: Chất liệu lược
      description: Chất liệu của lược harmonica (phần thân tạo thành các buồng khí).
    comb_type:
      name: Loại lược
      description: 'Phân loại lược chải lông ngựa theo kiểu chức năng chính (ví dụ:
        lược chải bờm, lược chải bờm ngựa, lược kéo lông), giúp người mua sắm nhanh
        chóng tìm thấy dụng cụ phù hợp với nhu cầu chải chuốt cụ thể.'
    combat_shorts_cut_style:
      name: Kiểu cắt quần đùi chiến đấu
      description: 'Cho biết kiểu cắt hoặc kiểu dáng cụ thể của quần đùi thể thao
        chiến đấu (ví dụ: cắt cao, cắt cổ điển, nén).'
    comic_creator_role:
      name: Vai trò người sáng tạo truyện tranh
      description: 'Chỉ định vai trò người sáng tạo được ghi nhận có liên quan đến
        danh sách (ví dụ: nhà văn, họa sĩ).'
    commemorative_coin_finish:
      name: Lớp hoàn thiện bề mặt tiền xu kỷ niệm
      description: Mô tả loại dập/hoàn thiện của đồng xu kỷ niệm.
    commemorative_coin_mint_mark:
      name: Dấu hiệu xưởng đúc đồng xu kỷ niệm
      description: Cho biết dấu hiệu xưởng đúc (hoặc không có dấu hiệu xưởng đúc)
        trên đồng xu.
    commemorative_subject:
      name: Chủ đề kỷ niệm
      description: Chủ đề kỷ niệm chính (sự kiện, người, địa điểm, kỷ niệm, tổ chức,
        v.v.).
    commercial_vehicle_class:
      name: Phân hạng xe thương mại
      description: Phân loại quy định/ngành dựa trên GVWR được sử dụng để mô tả hạng
        cân của xe thương mại để duyệt và lọc.
    compass_damping_medium:
      name: Môi chất giảm chấn la bàn
      description: Chỉ định môi chất được sử dụng để ổn định chuyển động của kim la
        bàn bên trong vỏ la bàn.
    compass_illumination_type:
      name: Loại chiếu sáng la bàn
      description: 'Xác định cách các vạch chỉ la bàn hiển thị rõ trong điều kiện
        ánh sáng yếu (ví dụ: sơn phát quang, tritium, đèn nền LED).'
    compass_mounting_style:
      name: Kiểu lắp đặt la bàn
      description: Mô tả cách mang, đeo hoặc lắp đặt la bàn.
    compass_scale_units:
      name: Đơn vị thang đo la bàn
      description: Xác định đơn vị đo (độ, mil, hoặc cả hai) được đánh dấu trên vỏ
        la bàn.
    compatible_abs_system:
      name: Hệ thống ABS tương thích
      description: Cho biết xi lanh chính có dành cho xe được trang bị hệ thống ABS
        hay không.
    compatible_adapter_brand:
      name: Thương hiệu bộ chuyển đổi tương thích
      description: Xác định thương hiệu đầu gậy golf có bộ chuyển đổi mà trục được
        cấu hình sẵn để phù hợp.
    compatible_airbag_system_type:
      name: Loại hệ thống túi khí tương thích
      description: 'Cho biết thế hệ/bộ tính năng của hệ thống túi khí mà phụ tùng
        tương thích (ví dụ: một giai đoạn so với hai giai đoạn).'
    compatible_amplifier_fit_method:
      name: Phương pháp lắp đặt bộ khuếch đại tương thích
      description: Cho biết cách xác định tính tương thích cho vỏ/khung (phù hợp phổ
        quát so với dành riêng cho từng mẫu so với theo kích thước).
    compatible_apparatus:
      name: Thiết bị tương thích
      description: Chỉ định thiết bị hoặc hoạt động thể dục dụng cụ mà tay cầm được
        thiết kế cho.
    compatible_archery_tool:
      name: Dụng cụ bắn cung tương thích
      description: Cho biết dụng cụ hoặc thiết bị bắn cung chính mà phụ kiện được
        thiết kế để sử dụng cùng.
    compatible_axle_size:
      name: Kích thước trục tương thích
      description: 'Chỉ định đường kính trục/trục bánh xe hoặc tiêu chuẩn ren mà bàn
        đạp chân được thiết kế để phù hợp (ví dụ: 10 mm/3⁄8 in, 14 mm, 3/8 in 26 TPI).'
    compatible_axle_type:
      name: Loại trục tương thích
      description: Xác định tiêu chuẩn gắn trục sau mà thiết bị hỗ trợ, chẳng hạn
        như kích thước trục tháo nhanh hoặc trục xuyên.
    compatible_axle_weight_rating:
      name: Tải trọng trục tương thích
      description: Chỉ định tải trọng trục rơ moóc (khả năng chịu tải trên mỗi trục)
        mà cụm phanh rơ moóc được thiết kế để phù hợp.
    compatible_bait_type:
      name: Loại mồi câu tương thích
      description: Xác định các loại mồi câu cá mà máy khoan mồi tương thích, giúp
        người câu cá lựa chọn dụng cụ phù hợp với loại mồi ưa thích của họ.
    compatible_bass_scale_length:
      name: Chiều dài dây câu cá vược tương thích
      description: Cho biết chiều dài dây câu cá vược mà bộ dây được thiết kế cho
        (quan trọng để đảm bảo chiều dài quấn và độ vừa vặn chính xác).
    compatible_battle_top_system:
      name: Hệ thống mặt bàn chơi bi-a tương thích
      description: Xác định hệ sinh thái hoặc dòng sản phẩm mặt bàn chơi bi-a mà mặt
        bàn được thiết kế cho (được sử dụng để đảm bảo tính tương thích giữa các bộ
        phận và sân chơi).
    compatible_bb_size:
      name: Kích thước trục giữa tương thích
      description: Cho biết đường kính của viên đạn airsoft mà sản phẩm hỗ trợ.
    compatible_bed_frame_style:
      name: Kiểu khung giường tương thích
      description: Chỉ định kiểu giường hoặc khung giường mà phụ kiện được thiết kế
        để phù hợp.
    compatible_bicycle_tire_type:
      name: Loại lốp xe đạp tương thích
      description: Chỉ định loại lốp xe đạp nào mà sản phẩm có thể sửa chữa hoặc bịt
        kín.
    compatible_bike_component:
      name: Bộ phận xe đạp tương thích
      description: Chỉ định bộ phận nào của xe đạp mà dụng cụ hoặc sản phẩm được thiết
        kế để bảo dưỡng.
    compatible_billiard_game:
      name: Trò chơi bi-a tương thích
      description: Xác định định dạng trò chơi bi-a mà giá đỡ được thiết kế cho, đảm
        bảo khách hàng chọn giá đỡ phù hợp với trò chơi của họ.
    compatible_billiard_table_size:
      name: Kích thước bàn bi-a tương thích
      description: Chỉ định chiều dài bàn tiêu chuẩn mà tấm phủ được thiết kế để phù
        hợp, đảm bảo người mua sắm chọn tấm phủ có kích thước phù hợp cho bàn bi-a
        của họ.
    compatible_bit_type:
      name: Loại mũi khoan tương thích
      description: Các kiểu mũi khoan có thể sử dụng với bộ phận bảo vệ.
    compatible_blade_hosel:
      name: Cổ gậy gạt tương thích
      description: Cho biết kiểu khớp/độ côn của lưỡi dao mà trục chấp nhận, đảm bảo
        trục và lưỡi dao khớp với nhau đúng cách.
    compatible_blade_system:
      name: Hệ thống lưỡi cắt tương thích
      description: 'Cho biết hệ thống/định dạng lưỡi dao thay thế mà dao chấp nhận
        (ví dụ: tiêu chuẩn hobby #11, lưỡi dao phân đoạn bẻ gãy).'
    compatible_boat_weaving_shuttle_loom:
      name: Khung dệt thoi thuyền tương thích
      description: Loại khung dệt nào mà con thoi thuyền được thiết kế để sử dụng.
    compatible_bobbin_type:
      name: Loại suốt chỉ tương thích
      description: Cho biết kiểu cuộn chỉ/ống chỉ nào mà con thoi thuyền được thiết
        kế để sử dụng.
    compatible_bottle_mouth:
      name: Miệng chai tương thích
      description: Loại hoặc đường kính miệng chai mà ống hút hoặc nắp được thiết
        kế để vừa khít.
    compatible_bow_attachment_system:
      name: Hệ thống gắn cung tương thích
      description: 'Cho biết giao diện cánh cung hoặc phụ kiện mà bộ phận được thiết
        kế cho (ví dụ: ILF, khớp vít, tháo nhanh).'
    compatible_bow_crossbow_type:
      name: Loại cung/nỏ tương thích
      description: Cho biết kiểu cung hoặc nỏ mà phụ kiện được thiết kế để vừa khít.
    compatible_brake_fluid:
      name: Dầu phanh tương thích
      description: Thông số kỹ thuật DOT của dầu phanh mà các gioăng/vật liệu xi lanh
        chính được thiết kế để tương thích.
    compatible_brake_pad:
      name: Má phanh tương thích
      description: Cho biết loại hợp chất má phanh nào được phê duyệt cho rôto, đảm
        bảo an toàn và độ mài mòn tối ưu.
    compatible_brake_service_system:
      name: Hệ thống dịch vụ phanh tương thích
      description: Chỉ rõ bộ phận này dành cho phanh đĩa, phanh tang trống, hay cả
        hai.
    compatible_brake_system:
      name: Hệ thống phanh tương thích
      description: Chỉ rõ các lưu ý quan trọng về khả năng tương thích hệ thống đối
        với việc sử dụng dầu phanh.
    compatible_brake_type:
      name: Loại phanh tương thích
      description: Chỉ rõ loại phanh mà thanh răng tương thích, chẳng hạn như phanh
        đĩa hoặc phanh vành.
    compatible_brass_instrument_finish:
      name: Lớp mạ/hoàn thiện nhạc cụ bộ đồng tương thích
      description: Chỉ rõ loại bề mặt hoàn thiện bằng đồng thau nào mà chất tẩy rửa
        có thể sử dụng an toàn mà không làm hỏng bề mặt.
    compatible_building_toy_system:
      name: Hệ thống đồ chơi lắp ráp tương thích
      description: Cho biết hệ thống/tiêu chuẩn lắp ráp mà đồ chơi tương thích (hoặc
        kích thước tương đương), chẳng hạn như tương thích với LEGO hoặc hệ thống
        độc quyền.
    compatible_capo_fretboard_radius:
      name: Bán kính cần đàn tương thích với capo
      description: Chỉ định bán kính/hình dạng cần đàn mà capo được thiết kế để phù
        hợp nhằm đảm bảo tiếp xúc tối ưu và độ ổn định khi điều chỉnh.
    compatible_capo_number_of_strings:
      name: Số dây đàn tương thích với capo
      description: Cho biết capo được thiết kế để kẹp bao nhiêu dây (hữu ích cho đàn
        6, 7, 8, 12 dây và các loại đàn đặc biệt).
    compatible_cardio_machine_type:
      name: Loại máy tập cardio tương thích
      description: Xác định loại máy tập tim mạch mà phụ kiện hoặc bộ phận này được
        thiết kế để sử dụng.
    compatible_chain_link_type:
      name: Loại mắt xích tương thích
      description: Xác định kiểu mắt xích mà dụng cụ hỗ trợ (tiêu chuẩn, mắt xích
        nửa, mắt xích nhanh, v.v.).
    compatible_chain_size:
      name: Kích thước xích tương thích
      description: 'Chỉ định chiều rộng hoặc bước xích tiêu chuẩn (ví dụ: 1/8 inch,
        3/32 inch) mà dụng cụ hỗ trợ.'
    compatible_chain_width:
      name: Chiều rộng xích tương thích
      description: Cho biết bánh răng tự do được thiết kế để hoạt động với các kích
        thước xích nào.
    compatible_chip_denomination:
      name: Mệnh giá chip tương thích
      description: Cho biết khay/hộp đựng có các vị trí được dán nhãn hoặc dành riêng
        cho các mệnh giá chip nào (hoặc được thiết kế để sắp xếp).
    compatible_clarinet_mouthpiece_ligature:
      name: Kẹp giữ lưỡi kèn clarinet tương thích
      description: Xác định tiêu chuẩn lắp kẹp giữ lưỡi kèn hoặc các lưu ý về khả
        năng tương thích cho lưỡi kèn.
    compatible_classical_guitar_string_scale_length:
      name: Chiều dài thang âm dây đàn guitar cổ điển tương thích
      description: Chiều dài thang âm/chiều dài dây đàn guitar dự kiến tương thích
        với bộ sản phẩm.
    compatible_clay_target_size:
      name: Kích thước mục tiêu đất sét tương thích
      description: Liệt kê các kích thước hoặc hình dạng mục tiêu đất sét mà máy ném
        có thể chấp nhận để đảm bảo sự vừa vặn và hiệu suất phù hợp.
    compatible_cleat_system:
      name: Hệ thống cá giày tương thích
      description: Chỉ định giao diện kẹp hoặc kiểu bu lông mà bàn đạp hỗ trợ để người
        dùng có thể chọn giày phù hợp với hệ thống chính xác.
    compatible_clipless_pedal_system:
      name: Hệ thống bàn đạp không kẹp tương thích
      description: Xác định tiêu chuẩn bàn đạp/kẹp không kẹp cụ thể mà sản phẩm được
        thiết kế để tương thích.
    compatible_clutch_type:
      name: Loại ly hợp tương thích
      description: Khả năng tương thích giao diện ly hợp cho bánh đà (nếu có).
    compatible_coffee_pod_system:
      name: Hệ thống viên nén cà phê tương thích
      description: Chỉ định máy pha cà phê hoặc hệ thống pha chế mà các viên nang
        hoặc viên nén được thiết kế.
    compatible_construction_set_system:
      name: Hệ thống bộ lắp ráp tương thích
      description: 'Cho biết bộ sản phẩm tương thích với hệ thống/hệ sinh thái thương
        hiệu lắp ráp nào (ví dụ: tương thích với LEGO, tương thích với DUPLO).'
    compatible_contra_bass_clarinet_peg_stand:
      name: Giá đỡ/chốt kèn clarinet contrabass tương thích
      description: Cho biết kiểu giao diện hoặc kiểu hỗ trợ giá đỡ/chốt cần thiết.
    compatible_coolant_chemistry:
      name: Thành phần hóa học chất làm mát tương thích
      description: Chỉ định các nhóm thành phần hóa học chất làm mát mà chất phụ gia
        được pha chế để tương thích.
    compatible_cooling_system_material:
      name: Vật liệu hệ thống làm mát tương thích
      description: 'Chỉ định các hệ thống/vật liệu làm mát nào mà dung dịch súc rửa
        bộ tản nhiệt an toàn (ví dụ: bộ tản nhiệt bằng nhôm, hệ thống kim loại hỗn
        hợp).'
    compatible_crib_format:
      name: Định dạng cũi em bé tương thích
      description: Xác định loại kích thước hoặc hình dạng chung của nệm hoặc ga trải
        giường mà phụ kiện được thiết kế để phù hợp.
    compatible_cross_stitch_fabric_count:
      name: Số lượng vải thêu chữ thập tương thích
      description: Số lượng vải được khuyến nghị để thêu họa tiết.
    compatible_cross_stitch_frame:
      name: Khung thêu chữ thập tương thích
      description: Cho biết khung được thiết kế để sử dụng với loại nào (sử dụng cầm
        tay, giá đỡ để bàn, giá đỡ sàn hoặc đa năng).
    compatible_crossbar:
      name: Thanh ngang tương thích
      description: Khả năng tương thích của giá đỡ với thanh ngang giá nóc xe (nếu
        gắn trên nóc xe), bao gồm các tiêu chuẩn về hình dạng/mặt cắt thanh ngang.
    compatible_cycling_cleat:
      name: Đế giày đạp xe tương thích
      description: Chỉ định đế giày hoặc hệ thống bàn đạp mà giày đạp xe được thiết
        kế để sử dụng cùng.
    compatible_cymbal_size:
      name: Kích thước chũm chọe tương thích
      description: Chỉ định đường kính chũm chọe dự định (hoặc tối đa) mà hộp được
        thiết kế để vừa; đây là khả năng tương thích về kích thước chũm chọe, không
        phải đường kính bên ngoài của hộp.
    compatible_device_type:
      name: Loại thiết bị tương thích
      description: 'Cho biết loại thiết bị mà giá đỡ được thiết kế để giữ (ví dụ:
        màn hình/TV, máy tính bảng, điện thoại thông minh, đầu DVD di động).'
    compatible_dock_structure_type:
      name: Loại cấu trúc đế tương thích
      description: Cấu trúc đế mà các bước được thiết kế để gắn vào.
    compatible_dough_type:
      name: Loại bột nhào tương thích
      description: 'Chỉ định loại/thương hiệu bột nặn mà các dụng cụ được thiết kế
        để sử dụng (ví dụ: bột nặn tiêu chuẩn, đất sét nặn).'
    compatible_drawing_ink_surface:
      name: Bề mặt mực vẽ tương thích
      description: Cho biết các bề mặt/chất nền được khuyến nghị để có hiệu suất tốt
        nhất.
    compatible_drivetrain_brand:
      name: Thương hiệu hệ thống truyền động tương thích
      description: Liệt kê các thương hiệu hệ thống truyền động hoặc hệ thống phanh
        mà cáp được thiết kế để hoạt động cùng.
    compatible_drivetrain_speeds:
      name: Tốc độ truyền động tương thích
      description: 'Chỉ định số lượng tốc độ truyền động (ví dụ: 10 tốc độ) mà tay
        quay hoặc đĩa xích hỗ trợ.'
    compatible_equipment:
      name: Thiết bị tương thích
      description: Chỉ định loại thiết bị thể thao mùa đông mà kẹp được thiết kế để
        giữ.
    compatible_evap_system:
      name: Hệ thống kiểm soát khí thải bay hơi tương thích
      description: 'Cho biết nắp nhiên liệu có được thiết kế để đáp ứng các yêu cầu
        của hệ thống EVAP (ví dụ: niêm phong theo tiêu chuẩn OEM) và giảm đèn báo
        lỗi động cơ hay không.'
    compatible_exercise_bike_style:
      name: Kiểu xe đạp tập thể dục tương thích
      description: Cho biết phụ kiện hoặc bộ phận thay thế được thiết kế để phù hợp
        với những kiểu xe đạp tập thể dục nào.
    compatible_fencing_weapon:
      name: Vũ khí đấu kiếm tương thích
      description: Chỉ định loại vũ khí đấu kiếm hoặc bộ môn đấu kiếm mà áo khoác
        hoặc vải lamé được thiết kế cho.
    compatible_fiber_type:
      name: Loại sợi tương thích
      description: Các loại sợi chính mà máy chải trống được thiết kế để xử lý hiệu
        quả.
    compatible_fin_box_system:
      name: Hệ thống hộp vây tương thích
      description: 'Xác định hộp vây hoặc hệ thống lắp đặt mà vây được thiết kế để
        phù hợp, giúp người lướt sóng mua vây tương thích với ván lướt sóng của họ
        (ví dụ: FCS II, Futures, US Box).'
    compatible_fingerboard_radius:
      name: Bán kính mặt phím tương thích
      description: Chỉ định bán kính cần đàn (phẳng, cong hoặc phức hợp) mà kẹp capo
        được thiết kế để phù hợp nhằm tạo áp lực đều và giảm tiếng rè.
    compatible_finish_type:
      name: Loại lớp hoàn thiện tương thích
      description: Cho biết loại bề mặt nhạc cụ nào mà dung dịch xịt được cho là an
        toàn.
    compatible_fishing_reel_type:
      name: Loại máy câu tương thích
      description: 'Chỉ định kiểu máy câu mà phụ kiện được thiết kế để phù hợp hoặc
        hoạt động cùng (ví dụ: máy câu quay, máy câu mồi, máy câu ruồi).'
    compatible_fly_line_weight:
      name: Trọng lượng dây câu ruồi tương thích
      description: Cho biết trọng lượng dây câu ruồi AFTMA mà ống cuộn được thiết
        kế để chứa.
    compatible_flywheel_type:
      name: Loại bánh đà tương thích
      description: Chỉ định loại bánh đà mà tấm ép ly hợp được thiết kế để sử dụng
        cùng.
    compatible_football_kick_type:
      name: Loại cú đá bóng đá tương thích
      description: 'Xác định các tình huống đá mà sản phẩm được thiết kế để hỗ trợ
        (ví dụ: cú đá khai cuộc, cú đá phạt), giúp các vận động viên nhanh chóng tìm
        thấy thiết bị phù hợp.'
    compatible_fuel_system_type:
      name: Loại hệ thống nhiên liệu tương thích
      description: Chỉ định hệ thống cung cấp nhiên liệu mà chất tẩy rửa được thiết
        kế cho.
    compatible_gas_type:
      name: Loại khí gas tương thích
      description: Xác định loại khí nén mà bình khí paintball được thiết kế để chứa.
    compatible_gel_wax_additives:
      name: Các chất phụ gia sáp gel tương thích
      description: 'Chỉ định loại chất phụ gia nào tương thích với sáp gel này (ví
        dụ: loại thuốc nhuộm, chất nhúng).'
    compatible_glaze_layering:
      name: Khả năng phủ lớp men tương thích
      description: Cho biết lớp men có được thiết kế để phủ lên các lớp men khác nhằm
        tạo hiệu ứng hay không.
    compatible_golf_bag_type:
      name: Loại túi gậy golf tương thích
      description: Cho biết vỏ hoặc hộp đựng phù hợp với những loại túi golf nào.
    compatible_ground_polarity:
      name: Cực nối đất tương thích
      description: Cho biết bộ điều chỉnh điện áp có dành cho hệ thống điện xe hơi
        nối đất âm hay nối đất dương (hoặc không nhạy cảm với cực tính).
    compatible_guitar_body_shape:
      name: Hình dạng thân đàn guitar tương thích
      description: Cho biết vỏ được thiết kế để phù hợp với loại thân/hình dạng đàn
        guitar nào.
    compatible_guitar_case:
      name: Hộp đựng đàn guitar tương thích
      description: Chỉ định kiểu hộp đựng đàn guitar nào mà bộ giữ ẩm được thiết kế
        để vừa vặn và hoạt động đúng cách.
    compatible_guitar_scale_length:
      name: Chiều dài thang âm guitar tương thích
      description: Cho biết chiều dài thang âm đàn guitar nào mà bộ dây đàn được thiết
        kế để phù hợp (dựa trên chiều dài cuộn dây/chiều dài tổng thể).
    compatible_gun_platform:
      name: Nền tảng súng tương thích
      description: 'Chỉ định nền tảng hoạt động hoặc nguồn điện mà sản phẩm tương
        thích (ví dụ: AEG, GBB, HPA).'
    compatible_hair_length:
      name: Chiều dài tóc tương thích
      description: Chỉ định chiều dài hoặc độ dày tóc tối đa mà mũ đội đầu có thể
        chứa thoải mái.
    compatible_head_and_neck_restraint_system:
      name: Hệ thống hạn chế chấn thương đầu và cổ tương thích
      description: 'Cho biết mũ bảo hiểm có bao gồm các điểm neo và/hoặc tương thích
        với hệ thống hạn chế chấn thương đầu và cổ (ví dụ: HANS) hay không, bao gồm
        cả tình trạng bao gồm/lắp đặt trụ neo.'
    compatible_helmet_certification_standard:
      name: Tiêu chuẩn chứng nhận mũ bảo hiểm tương thích
      description: 'Cho biết bất kỳ tiêu chuẩn an toàn mũ bảo hiểm hoặc bối cảnh chứng
        nhận nào mà phụ kiện được thiết kế để hỗ trợ (ví dụ: miếng dán chống trầy
        xước dùng trong đua xe thường tham chiếu các quy tắc cụ thể của ban tổ chức).'
    compatible_helmet_shell_size:
      name: Kích thước vỏ mũ bảo hiểm tương thích
      description: Cho biết kích thước vỏ mũ bảo hiểm nào mà bộ phận bên trong thay
        thế phù hợp (kích thước vỏ thường tương ứng với các phạm vi kích thước như
        XS–S, M, L–XL).
    compatible_helmet_size:
      name: Kích thước mũ bảo hiểm tương thích
      description: Cho biết kích thước mũ bảo hiểm mà mặt nạ tương thích.
    compatible_helmet_type:
      name: Loại mũ bảo hiểm tương thích
      description: Loại mũ bảo hiểm mà bộ phận hỗ trợ cổ được thiết kế để hoạt động
        cùng.
    compatible_hitch_receiver_size:
      name: Kích thước lỗ móc kéo tương thích
      description: Kích thước lỗ móc kéo mà phụ kiện được thiết kế để phù hợp (đối
        với phụ kiện giá đỡ gắn trên móc kéo).
    compatible_hook_size:
      name: Kích thước lưỡi câu tương thích
      description: 'Hệ thống kích thước kim móc và/hoặc phạm vi kích thước mà bộ sắp
        xếp được thiết kế để phù hợp (ví dụ: kích thước chữ/số của Mỹ, phạm vi mm
        hệ mét).'
    compatible_horse_coat_type:
      name: Loại lông ngựa tương thích
      description: 'Xác định đặc điểm lông ngựa mà máy loại bỏ lông rụng phù hợp nhất
        (ví dụ: lông mùa đông dày hoặc lông nhạy cảm).'
    compatible_host_platform:
      name: Nền tảng máy chủ tương thích
      description: 'Xác định nền tảng máy chủ hoặc loại thiết bị nào mà bộ điều khiển
        tương thích (ví dụ: Windows, macOS, iOS, Android) hoặc liệu nó có thể hoạt
        động độc lập mà không cần máy tính hay không.'
    compatible_inflation_gas:
      name: Khí bơm tương thích
      description: Xác định loại khí dùng để bơm bóng bay (không khí, heli hoặc cả
        hai).
    compatible_injection_type:
      name: Kiểu phun nhiên liệu tương thích
      description: Cho biết hệ thống phun nhiên liệu nào mà sản phẩm được thiết kế
        để làm sạch.
    compatible_instrument_surface_material:
      name: Bề mặt/vật liệu thiết bị tương thích
      description: Cho biết bề mặt/vật liệu thiết bị nào mà chất đánh bóng được thiết
        kế để sử dụng.
    compatible_intercom_system:
      name: Hệ thống đàm thoại nội bộ tương thích
      description: Cho biết mũ bảo hiểm có sẵn sàng/tương thích để gắn hoặc lắp đặt
        hệ thống liên lạc nội bộ/liên lạc mũ bảo hiểm hay không.
    compatible_interior_material:
      name: Chất liệu nội thất tương thích
      description: 'Cho biết chất tẩy vết bẩn an toàn/hiệu quả trên các vật liệu nội
        thất xe nào (ví dụ: thảm, vải bọc, da, nhựa vinyl).'
    compatible_kayak_type:
      name: Loại thuyền Kayak tương thích
      description: Liệt kê các kiểu thuyền kayak chung mà bộ dụng cụ cánh buồm được
        thiết kế để gắn lên.
    compatible_license_plate_hole_pattern:
      name: Mẫu lỗ biển số tương thích
      description: Xác định cấu hình lỗ lắp đặt được hỗ trợ bởi giá đỡ/khung (phía
        xe và/hoặc phía biển số).
    compatible_license_plate_size:
      name: Kích thước biển số tương thích
      description: Cho biết kích thước biển số theo khu vực hoặc kích thước mà giá
        đỡ/khung được thiết kế để phù hợp.
    compatible_loom:
      name: Loại khung dệt tương thích
      description: Xác định loại khung dệt mà dụng cụ dệt phẳng được thiết kế để sử
        dụng cùng.
    compatible_loom_type:
      name: Loại khung dệt tương thích
      description: 'Cho biết cấu hình dệt mà dụng cụ được thiết kế để sử dụng cùng
        (ví dụ: khung dệt có thanh ngang cố định so với khung dệt thảm).'
    compatible_machine_type:
      name: Loại máy tương thích
      description: Cho biết loại thiết lập chần bông mà khung được thiết kế để hoạt
        động cùng (chỉ chần bông bằng tay, máy may gia đình, máy chần bông công nghiệp).
    compatible_mast_type:
      name: Loại cột buồm tương thích
      description: 'Xác định đường kính cột buồm mà cánh buồm được thiết kế cho: đường
        kính giảm (RDM), đường kính tiêu chuẩn (SDM) hoặc cả hai.'
    compatible_model_system_train_scale:
      name: Hệ thống mô hình tương thích (tỷ lệ tàu)
      description: 'Xác định tỷ lệ/hệ thống mô hình tàu mà phụ kiện phù hợp khi áp
        dụng (ví dụ: HO, N, O).'
    compatible_mounting_surface:
      name: Bề mặt lắp đặt tương thích
      description: Bề mặt hoặc vật thể dự định mà kẹp được thiết kế để kẹp vào.
    compatible_mouthpiece_patch:
      name: Miếng đệm miệng tương thích
      description: Cho biết miệng thổi có được thiết kế để sử dụng với miếng đệm/miếng
        dán miệng hay không và phạm vi độ dày miếng dán được đề xuất.
    compatible_mouthpiece_type:
      name: Loại đầu ngậm tương thích
      description: Cho biết loại/cán miệng mà kèn mellophone được thiết kế để sử dụng
        (thường là kiểu kèn Pháp hoặc kèn trumpet tùy thuộc vào kiểu máy).
    compatible_neck_profile_width:
      name: Kiểu dáng/chiều rộng cần đàn tương thích
      description: 'Cho biết kiểu dáng/chiều rộng cần đàn guitar mà kẹp capo được
        thiết kế để phù hợp (ví dụ: cần đàn điện hẹp so với cần đàn cổ điển rộng).'
    compatible_needle_size:
      name: Kích thước kim tương thích
      description: 'Cho biết kích thước/loại kim mà hộp đựng được thiết kế để phù
        hợp (ví dụ: kim thêu, kim thảm, kim may tay).'
    compatible_needle_system:
      name: Hệ thống kim tương thích
      description: 'Hệ thống kim mà máy tương thích (ví dụ: 130/705H).'
    compatible_parking_brake_mechanism:
      name: Cơ chế phanh đỗ tương thích
      description: Cho biết kẹp phanh có được thiết kế để hoạt động với cơ chế phanh
        đỗ tích hợp hay không.
    compatible_pedal_instrument_type:
      name: Loại nhạc cụ có bàn đạp tương thích
      description: 'Chỉ định loại bàn đạp được thiết kế để sử dụng cùng (ví dụ: đàn
        piano điện tử, bàn phím/synthesizer, bộ điều khiển MIDI).'
    compatible_pedal_type:
      name: Loại bàn đạp tương thích
      description: 'Cho biết kiểu dáng hoặc hệ thống bàn đạp mà dây đeo hoặc kẹp được
        thiết kế để phù hợp (ví dụ: bàn đạp phẳng, SPD, Look Keo).'
    compatible_pin_type:
      name: Loại chân cắm tương thích
      description: Loại ghim mà tấm đệm được thiết kế để sử dụng cùng (hoặc liệu nó
        có thể được ghim hay không).
    compatible_pipe_filter_size:
      name: Kích thước bộ lọc ống tương thích
      description: Cho biết kích thước hoặc kiểu bộ lọc mà ống được thiết kế để chấp
        nhận (hoặc không cần bộ lọc).
    compatible_plate_size:
      name: Kích thước đĩa tương thích
      description: Kích thước tấm chống đạn hoặc kích thước tiêu chuẩn mà áo vest
        có thể chấp nhận.
    compatible_play_vehicle_scale:
      name: Tỷ lệ mô hình xe đồ chơi tương thích
      description: 'Cho biết tỷ lệ đồ chơi mà phụ kiện được thiết kế để phù hợp (ví
        dụ: 1:64), cải thiện độ phù hợp/tương thích cho người sưu tập và hệ thống
        đường ray.'
    compatible_playing_surface:
      name: Bề mặt chơi tương thích
      description: Cho biết loại sân chơi hoặc bề mặt mà giày bóng bầu dục Mỹ được
        thiết kế cho.
    compatible_pole_dimensions:
      name: Kích thước cột tương thích
      description: Chỉ định kích thước mặt cắt ngang của cột mà phụ kiện phù hợp.
    compatible_pole_shape:
      name: Hình dạng cột tương thích
      description: Chỉ định hình dạng mặt cắt ngang của cột mà lớp đệm được thiết
        kế để phù hợp.
    compatible_power_steering_system:
      name: Hệ thống trợ lực lái tương thích
      description: Cho biết loại hệ thống lái mà chất lỏng này dành cho.
    compatible_powerplant_type:
      name: Loại hệ thống động cơ tương thích
      description: 'Cho biết hệ thống đẩy của súng BB mà phụ tùng này dành cho (ví
        dụ: piston lò xo, CO2, PCP).'
    compatible_presser_foot:
      name: Chân vịt tương thích
      description: 'Xác định hệ thống lắp/tương thích chân vịt được máy may hỗ trợ
        (ví dụ: kiểu bấm hay kiểu vặn; trục thấp/cao/nghiêng). Sử dụng ''Đa năng/Nhiều
        loại'' nếu hỗ trợ nhiều hệ thống hoặc có kèm theo bộ chuyển đổi.'
    compatible_protective_gear:
      name: Thiết bị bảo hộ tương thích
      description: Xác định các thiết bị bảo hộ khác mà đai cổ được thiết kế để sử
        dụng cùng.
    compatible_protective_gear_integration:
      name: Tích hợp thiết bị bảo hộ tương thích
      description: 'Mô tả cách đeo hoặc tích hợp thiết bị bảo hộ với các thiết bị
        khác (ví dụ: túi chèn, dây đeo độc lập).'
    compatible_punching_bag_type:
      name: Loại bao đấm tương thích
      description: Xác định kiểu bao đấm hoặc bao tập luyện nào tương thích với sản
        phẩm.
    compatible_racing_discipline:
      name: Bộ môn đua xe tương thích
      description: Bộ môn đua xe thể thao mà mũ bảo hiểm được thiết kế/chứng nhận.
    compatible_rc_scale:
      name: Tỷ lệ RC tương thích
      description: 'Cho biết tỷ lệ RC (ví dụ: 1:10) mà phụ kiện hoặc bộ phận được
        thiết kế để phù hợp.'
    compatible_recorder_size:
      name: Kích thước sáo dọc tương thích
      description: Xác định kích thước máy ghi âm nào mà vỏ được thiết kế để phù hợp.
    compatible_recorder_type:
      name: Loại sáo dọc tương thích
      description: 'Chỉ định loại sáo recorder (dòng/kích cỡ) mà phụ kiện tương thích
        (ví dụ: soprano, alto).'
    compatible_reed_cut:
      name: Kiểu vát dăm kèn tương thích
      description: 'Chỉ định kiểu cắt lưỡi gà mà kẹp lưỡi gà được thiết kế để tương
        thích (ví dụ: mài/cắt kiểu Pháp so với không mài/cắt kiểu Mỹ).'
    compatible_reed_type:
      name: Loại dăm kèn tương thích
      description: Chỉ định kiểu cắt/loại lưỡi gà mà ống ngậm được thiết kế cho.
    compatible_reel_type:
      name: Loại guồng/cuộn tương thích
      description: Chỉ định kiểu máy câu cá mà túi, hộp hoặc vỏ được thiết kế để vừa
        vặn.
    compatible_refrigerant_type:
      name: Loại chất làm lạnh tương thích
      description: Chỉ ra loại chất làm lạnh mà dàn bay hơi điều hòa không khí được
        thiết kế để sử dụng.
    compatible_ride_equipment:
      name: Thiết bị di chuyển tương thích
      description: Loại thiết bị thể thao có bánh xe mà đường dốc được thiết kế cho.
    compatible_roof_height:
      name: Chiều cao mái tương thích
      description: Chỉ ra kiểu mái mà vỏ được thiết kế cho (mái tiêu chuẩn so với
        mái mở rộng/cao).
    compatible_roof_rail_type:
      name: Loại thanh ray mái tương thích
      description: Chỉ định cấu hình mái mà hệ thống giá đỡ cơ bản được thiết kế để
        gắn vào.
    compatible_rope_count:
      name: Số lượng dây tương thích
      description: Chỉ định cấu hình dây võ đài quyền anh mà bộ phận được thiết kế
        cho, chẳng hạn như vòng 3 dây, vòng 4 dây hoặc phù hợp với mọi loại.
    compatible_rope_type:
      name: Loại dây tương thích
      description: Xác định các loại dây có thể sử dụng với thiết bị.
    compatible_saddle_type:
      name: Loại yên ngựa tương thích
      description: Xác định kiểu yên ngựa hoặc bộ môn cưỡi ngựa mà phụ kiện được thiết
        kế để phù hợp, đảm bảo tính tương thích chính xác giữa các loại yên ngựa kiểu
        Anh, kiểu phương Tây và các loại khác.
    compatible_saxophone_size:
      name: Kích thước kèn saxophone tương thích
      description: 'Cho biết sản phẩm tương thích với kích thước kèn saxophone nào
        (ví dụ: soprano, alto, tenor).'
    compatible_saxophone_type:
      name: Loại kèn saxophone tương thích
      description: Xác định loại kèn saxophone mà kẹp/nắp được thiết kế để phù hợp.
    compatible_scale_length:
      name: Chiều dài thang âm tương thích
      description: 'Xác định phạm vi chiều dài thang âm guitar mà dây đàn được thiết
        kế cho (ví dụ: thang âm ngắn, tiêu chuẩn, baritone).'
    compatible_seat_airbag:
      name: Túi khí ghế tương thích
      description: Cho biết ghế có hỗ trợ/chứa túi khí bên hông hay không hoặc có
        tương thích với các xe được trang bị túi khí gắn trên ghế hay không.
    compatible_seating_capacity:
      name: Sức chứa chỗ ngồi tương thích
      description: Xác định số lượng chỗ ngồi hoặc cấu hình mà phụ kiện được thiết
        kế để phù hợp.
    compatible_sensor_port_type:
      name: Loại cổng cảm biến tương thích
      description: Xác định xem chảo dầu có hỗ trợ cảm biến mức dầu và/hoặc nhiệt
        độ dầu hay không và kiểu cổng nếu có.
    compatible_shifter_type:
      name: Loại cần số tương thích
      description: Xác định loại cần số hoặc cấu hình mà bọc cần số được thiết kế
        để phù hợp.
    compatible_shis:
      name: SHIS tương thích
      description: 'Liệt kê mã Hệ thống Nhận dạng Tai nghe Tiêu chuẩn (SHIS) mà bộ
        phận đó phù hợp (ví dụ: IS42, EC34, ZS44/28.6).'
    compatible_skating_discipline:
      name: Bộ môn trượt băng tương thích
      description: Cho biết (các) bộ môn trượt băng mà bộ phận hoặc phụ kiện được
        thiết kế để phù hợp.
    compatible_snowshoe_deck_type:
      name: Loại ván trượt tuyết tương thích
      description: Chỉ định kiểu khung hoặc ván trượt tuyết mà bộ phận buộc giày tương
        thích.
    compatible_special_effects_lighting_features:
      name: Các tính năng chiếu sáng hiệu ứng đặc biệt tương thích
      description: Nêu bật các tính năng phổ biến ảnh hưởng đến quyết định mua đèn
        hiệu ứng (ngoài màu sắc/mẫu), chẳng hạn như liên kết các thiết bị hoặc phản
        ứng với âm thanh.
    compatible_spinning_wheel_drive_system:
      name: Hệ thống truyền động bánh xe quay tương thích
      description: Chỉ định (các) hệ thống truyền động bánh xe quay mà phụ kiện hỗ
        trợ.
    compatible_spoke_gauge:
      name: Độ dày nan hoa tương thích
      description: Cho biết kích thước dây nan hoa mà ren núm phù hợp, cho phép người
        mua ghép nan hoa và núm một cách chính xác.
    compatible_steering_wheel_airbag:
      name: Túi khí vô lăng tương thích
      description: Cho biết vô lăng có hỗ trợ giữ lại mô-đun túi khí OEM hay không
        (hoặc được thiết kế cho các ứng dụng không có túi khí).
    compatible_steering_wheel_control_button:
      name: Nút điều khiển vô lăng tương thích
      description: Cho biết khả năng tương thích với các nút điều khiển gắn trên vô
        lăng của nhà máy (âm thanh/hành trình/điện thoại) và hệ thống dây điện liên
        quan.
    compatible_stencil_material:
      name: Chất liệu khuôn stencil tương thích
      description: 'Vật liệu máy có thể tạo khuôn mẫu hoặc xử lý (ví dụ: giấy, màng
        nhựa, mylar).'
    compatible_stencil_media_format:
      name: Định dạng vật liệu khuôn mẫu tương thích
      description: 'Cho biết máy hỗ trợ các dạng vật liệu khuôn mẫu nào: dạng tấm,
        dạng cuộn hoặc cả hai.'
    compatible_strap_retractor:
      name: Bộ thu dây đai tương thích
      description: Cho biết dây đai có tương thích với hệ thống thu dây hay được thiết
        kế cho dây đai không thu dây (tĩnh).
    compatible_string_instrument_finish:
      name: Lớp sơn phủ nhạc cụ có dây tương thích
      description: Chỉ định loại bề mặt hoàn thiện bảng điều khiển nào an toàn để
        sử dụng chất đánh bóng.
    compatible_substrate_material:
      name: Chất liệu lớp nền tương thích
      description: Vật liệu bề mặt mà sơn được pha chế để bám dính.
    compatible_surface:
      name: Bề mặt tương thích
      description: Chỉ định bề mặt/vật liệu mà chất kết dính móc và vòng được thiết
        kế để liên kết.
    compatible_surface_material:
      name: Chất liệu bề mặt tương thích
      description: Vật liệu bề mặt xe mà sản phẩm được thiết kế để sử dụng.
    compatible_tear_off_system:
      name: Hệ thống kính xé bảo vệ tương thích
      description: Cho biết kính bảo hộ có hỗ trợ miếng dán chống trầy xước (tear-offs)
        và/hoặc cuộn (roll-offs) hay không, bao gồm cả việc có các trụ gắn miếng dán
        chống trầy xước hay không.
    compatible_thermostat_type:
      name: Loại bộ điều nhiệt tương thích
      description: Cho biết cổ/vỏ ống dẫn nước có được thiết kế để lắp bộ điều nhiệt
        hay không và nếu có, loại/kích thước nào.
    compatible_thread:
      name: Chỉ may tương thích
      description: Cho biết loại chỉ/sợi nào mà dụng cụ xỏ chỉ được thiết kế để xử
        lý (theo độ dày/loại).
    compatible_thread_spool_format:
      name: Định dạng chỉ/cuộn chỉ tương thích
      description: Cho biết hộp được thiết kế để chứa các định dạng chỉ nào (cuộn
        chỉ, ống chỉ, cuộn chỉ/thẻ chỉ nha khoa, hình nón, v.v.).
    compatible_thread_yarn_tool:
      name: Dụng cụ chỉ & sợi tương thích
      description: 'Khả năng tương thích máy/hệ thống đối với các dụng cụ được gắn
        vào hoặc sử dụng với các thiết bị khác (ví dụ: máy may, máy vắt sổ, máy dệt,
        máy kéo sợi).'
    compatible_tire_application:
      name: Ứng dụng lốp tương thích
      description: Cho biết phân khúc ứng dụng lốp/bánh xe mà dụng cụ tháo lốp được
        thiết kế (dựa trên lốp/bánh xe đang được bảo dưỡng, không phải kiểu xe).
    compatible_tom_pad_mounting:
      name: Giá đỡ trống tom điện tử tương thích
      description: 'Xác định loại giá đỡ trống tom điện tử (ví dụ: kẹp/thanh đỡ, thanh
        chữ L, giá đỡ), ảnh hưởng đến việc nó có phù hợp với hệ thống giá đỡ hiện
        có hay không.'
    compatible_toy_vehicle_scale:
      name: Tỷ lệ xe đồ chơi tương thích
      description: Cho biết tỷ lệ hoặc kích thước xe đồ chơi gần đúng mà bộ đồ chơi
        tương thích.
    compatible_tpms_sensor_type:
      name: Loại cảm biến TPMS tương thích
      description: Xác định xem bánh xe có hỗ trợ cảm biến TPMS và/hoặc bất kỳ loại
        van/cảm biến cần thiết nào hay không.
    compatible_training_equipment:
      name: Thiết bị tập luyện tương thích
      description: Liệt kê các loại thiết bị tập luyện hoặc thể dục có thể được gắn
        vào giá đỡ.
    compatible_treadmill_design:
      name: Thiết kế máy chạy bộ tương thích
      description: Xác định thiết kế máy chạy bộ mà phụ kiện tương thích, chẳng hạn
        như các mẫu có thể gập lại hoặc không thể gập lại.
    compatible_tube:
      name: Ống tương thích
      description: Cho biết cấu tạo săm hoặc lốp mà miếng vá được thiết kế cho, chẳng
        hạn như butyl, latex, TPU hoặc không săm.
    compatible_valve_type:
      name: Loại van tương thích
      description: Xác định loại van bằng đồng thau mà chất bôi trơn tương thích.
    compatible_vaporizing_material:
      name: Vật liệu hóa hơi tương thích
      description: Cho biết các loại vật liệu mà thiết bị được thiết kế để hóa hơi.
    compatible_vehicle_windshield_fluid:
      name: Dung dịch rửa kính chắn gió xe tương thích
      description: 'Các tuyên bố về khả năng tương thích liên quan đến thiết bị xe
        hoặc các phương pháp xử lý kính (ví dụ: an toàn cho lớp phủ chống mưa, an
        toàn cho hệ thống rửa đèn pha).'
    compatible_visor_system:
      name: Hệ thống kính chắn gió tương thích
      description: Cho biết mũ bảo hiểm xe máy tương thích với loại hệ thống kính
        chắn gió/miếng lót nào.
    compatible_water_board_type:
      name: Loại ván nước tương thích
      description: Giá đỡ được thiết kế để chở loại ván thể thao dưới nước nào.
    compatible_water_sport_board_type:
      name: Loại ván thể thao dưới nước tương thích
      description: Liệt kê các loại ván mà giá đỡ được thiết kế để vận chuyển.
    compatible_watercraft_communication_standard:
      name: Tiêu chuẩn giao tiếp đường thủy tương thích
      description: Chỉ định các tiêu chuẩn giao tiếp/mạng hàng hải hoặc giao thức
        tích hợp được hỗ trợ để tương tác với các thiết bị điện tử trên tàu.
    compatible_watercraft_engine_type:
      name: Loại động cơ đường thủy tương thích
      description: Cho biết cấu hình hệ thống truyền động mục tiêu mà bộ phận phù
        hợp (động cơ ngoài/động cơ trong/động cơ đuôi/động cơ phản lực).
    compatible_weight_plate_diameter:
      name: Đường kính đĩa tạ tương thích
      description: Xác định đường kính đĩa tạ mà máy chấp nhận.
    compatible_wheel_finish:
      name: Lớp hoàn thiện bánh xe tương thích
      description: Xác định lớp hoàn thiện/vật liệu bánh xe mà chất tẩy rửa có thể
        sử dụng an toàn (theo nhà sản xuất).
    compatible_whorl_drive_band_type:
      name: Loại dây đai truyền động bánh xe tương thích
      description: Xác định kiểu dây đai truyền động mà bánh xe được thiết kế để hoạt
        động cùng.
    compatible_wick_series:
      name: Dòng bấc tương thích
      description: Cho biết các dòng/loại bấc thông dụng mà tab được thiết kế để phù
        hợp (tên gọi trong ngành), nếu được người bán chỉ định.
    compatible_winder_head_bit:
      name: Đầu/mũi cuốn dây tương thích
      description: 'Xác định kiểu giao diện khóa/đầu cuốn dây mà máy cuốn dây hỗ trợ
        (ví dụ: đầu có rãnh, mũi cuốn có thể thay thế, đầu đa năng).'
    compatible_windlass_rode:
      name: Dây neo tời tương thích
      description: Xác định loại dây neo mà tời được thiết kế để xử lý.
    compatible_windshield_type:
      name: Loại kính chắn gió tương thích
      description: Xác định cấu hình kính chắn gió mà vỏ máy được thiết kế để hoạt
        động cùng.
    compatible_wood:
      name: Gỗ tương thích
      description: Xác định loại gỗ cần đàn nào mà chất đánh bóng được khuyến nghị/an
        toàn.
    compatible_writing_surface:
      name: Bề mặt viết tương thích
      description: Xác định bề mặt/giấy mà mực được thiết kế để hoạt động tốt nhất.
    compatible_zipper_size:
      name: Kích thước khóa kéo tương thích
      description: 'Chỉ ra kích thước khóa kéo mà tay kéo được thiết kế để phù hợp
        (thường được biểu thị là #3, #5, #8, #10), giúp cải thiện khả năng lọc tương
        thích.'
    compliance_certification:
      name: Chứng nhận hợp chuẩn / chứng nhận tuân thủ
      description: Tiêu chuẩn tuân thủ/phê duyệt mà thanh đèn đáp ứng cho việc sử
        dụng trên đường và khả năng tương thích điện từ.
    component_position:
      name: Vị trí linh kiện
      description: 'Chỉ định vị trí tương đối của bộ phận trong cụm định thời động
        cơ (ví dụ: nắp trước so với nắp sau, trên so với dưới). Không phải vị trí
        trước/sau của xe.'
    concentration_level:
      name: Mức độ đậm đặc
      description: Chỉ dẫn định tính về độ đậm đặc của tương cà chua (đơn, đôi, ba),
        hữu ích cho việc đáp ứng các yêu cầu của công thức.
    concentration_type:
      name: Loại nồng độ
      description: Cho biết sản phẩm là dạng sẵn sàng sử dụng hay dạng đậm đặc, và
        (nếu là dạng đậm đặc) hướng dẫn pha loãng điển hình.
    concert_bass_drum_mounting_stand_type:
      name: Loại giá đỡ trống bass hòa nhạc
      description: Cách trống bass hòa nhạc được đỡ hoặc gắn để biểu diễn.
    concert_pitch_standard:
      name: Tiêu chuẩn cao độ hòa nhạc
      description: 'Chỉ định cao độ tham chiếu hòa nhạc (A4) mà đàn piano được điều
        chỉnh tại thời điểm bán (ví dụ: A440, A442, A444).'
    condiment_form:
      name: Dạng gia vị
      description: 'Cho biết dạng vật lý hoặc độ đặc của sản phẩm cải ngựa (ví dụ:
        dạng sệt, dạng bột, dạng kem).'
    condiment_texture:
      name: Kết cấu gia vị
      description: 'Mô tả độ đặc của tương ớt hoặc chutney (ví dụ: dạng miếng, dạng
        mịn).'
    confetti_format:
      name: Định dạng pháo giấy
      description: 'Chỉ định định dạng sản phẩm pháo giấy dựa trên cách đóng gói hoặc
        bắn pháo giấy (ví dụ: rải rác rời rạc so với dạng pháo nổ/pháo).'
    conga_head_tensioning_system:
      name: Hệ thống căng mặt trống conga
      description: 'Loại trang thiết bị được sử dụng để căng/điều chỉnh mặt trống
        conga (ví dụ: điều chỉnh bằng chốt truyền thống so với cơ chế điều chỉnh nhanh
        hiện đại).'
    conga_set_included_drum_types:
      name: Các loại trống conga đi kèm trong bộ trống conga
      description: 'Những loại trống conga nào được bao gồm trong một bộ trống conga
        (ví dụ: quinto + conga + tumba).'
    connector_case_style:
      name: Kiểu dáng hộp đựng trống kết nối
      description: 'Phân loại kiểu dáng tổng thể của hộp đựng trống kết nối (ví dụ:
        vỏ cứng so với túi mềm) để phản ánh mức độ bảo vệ và tính di động.'
    console_cover_installation_method:
      name: Phương pháp lắp đặt tấm che bảng điều khiển
      description: 'Xác định cách gắn tấm che bảng điều khiển vào bảng điều khiển/tay
        vịn (ví dụ: kiểu trượt vào, dây chun, khóa dán, keo dán, kẹp).'
    console_display_type:
      name: Loại màn hình bảng điều khiển
      description: 'Xác định kiểu màn hình người dùng được cung cấp trên máy (ví dụ:
        LCD, LED, màn hình cảm ứng).'
    construction_design:
      name: Thiết kế thi công
      description: 'Cho biết có bao nhiêu mảnh ghép tạo nên tấm đệm, ảnh hưởng đến
        khả năng di chuyển (ví dụ: 1 mảnh so với 3 mảnh).'
    contact_angle:
      name: Góc tiếp xúc
      description: 'Xác định góc tiếp xúc của các vòng bi, được biểu thị bằng một
        góc đơn hoặc một cặp góc (ví dụ: 36°/45°).'
    contact_juggling_ball_fill_type:
      name: Loại vật liệu nhồi bóng tung hứng
      description: Xác định xem bóng là đặc hay có chất độn (và nếu có chất độn, loại
        chất độn nào), điều này ảnh hưởng đến sự phân bố trọng lượng và độ bền.
    contact_juggling_ball_transparency:
      name: Độ trong suốt của quả bóng tung hứng tiếp xúc
      description: Xác định độ trong suốt/hình thức quang học của quả bóng.
    contact_surface_material:
      name: Chất liệu bề mặt tiếp xúc
      description: 'Xác định vật liệu được sử dụng tại các điểm tiếp xúc với nhạc
        cụ (ví dụ: nút bần/cao su) để ngăn ngừa trầy xước và cải thiện độ bám.'
    container_material:
      name: Vật liệu thùng đựng
      description: 'Chỉ định vật liệu chính của thùng đựng bán lẻ sản phẩm (ví dụ:
        thủy tinh, nhựa PET, nhôm).'
    contaminant_removal:
      name: Loại bỏ chất gây ô nhiễm
      description: Liệt kê các loại chất gây ô nhiễm mà sản phẩm được chứng nhận có
        khả năng loại bỏ hoặc giảm thiểu.
    contra_alto_clarinet_body_configuration:
      name: Cấu hình thân kèn clarinet contra-alto
      description: 'Mô tả hình dạng cấu tạo vật lý của kèn clarinet contra-alto (ví
        dụ: thiết kế thẳng so với thiết kế gấp).'
    contra_alto_clarinet_lowest_note_extension:
      name: Âm vực thấp nhất của kèn clarinet contra-alto
      description: Chỉ định âm vực thấp nhất mà nhạc cụ có thể chơi được (nốt thấp
        nhất mà hệ thống phím cho phép), thường được sử dụng để phân biệt các mẫu
        E♭ thấp, D thấp và C thấp.
    contra_bass_clarinet_bell_type:
      name: Loại chuông kèn clarinet contra-bass
      description: Cấu hình chuông được sử dụng trên kèn clarinet contra-bass.
    contra_bass_clarinet_bore_type:
      name: Loại lòng ống của kèn clarinet đại trầm
      description: Thiết kế lỗ thoát khí của nhạc cụ.
    contra_bass_clarinet_lowest_written_note:
      name: Nốt nhạc thấp nhất viết cho kèn clarinet đại trầm
      description: Nốt nhạc thấp nhất được viết mà nhạc cụ có thể chơi (thường phụ
        thuộc vào âm vực C thấp so với Eb thấp).
    control_arm_bushing_material:
      name: Vật liệu bạc lót cần điều khiển
      description: Xác định vật liệu của các bạc lót đi kèm/đã lắp đặt, nếu có.
    control_arm_bushings_included:
      name: Bạc lót cần điều khiển đi kèm
      description: Cho biết cần điều khiển có được vận chuyển kèm theo bạc lót đã
        lắp đặt hay không.
    control_arm_finish:
      name: Lớp hoàn thiện cần điều khiển
      description: Xác định lớp hoàn thiện bảo vệ được áp dụng cho cần điều khiển
        (chống ăn mòn và hình thức).
    control_arm_grease_fitting_type:
      name: Loại đầu bôi trơn cần điều khiển
      description: Xác định xem cụm cần điều khiển/khớp cầu có bao gồm đầu bôi trơn
        (zerk) hay không và liệu nó có thể bảo dưỡng được hay không.
    control_arm_material:
      name: Vật liệu cần điều khiển
      description: Xác định vật liệu chính và cấu trúc sản xuất của thân cần điều
        khiển.
    control_arm_position:
      name: Vị trí cần điều khiển
      description: 'Xác định vị trí treo mà cần điều khiển được thiết kế cho trong
        bối cảnh góc/bên trục (ví dụ: trên/dưới, trước/sau, trái/phải).'
    control_arm_style:
      name: Kiểu cần điều khiển
      description: Xác định kiểu hình học/thiết kế của cần điều khiển được sử dụng
        trong bố trí hệ thống treo.
    control_cable_connector_type:
      name: Loại đầu nối cáp điều khiển
      description: 'Xác định kiểu đầu/đầu nối được sử dụng bởi (các) cáp điều khiển
        để giao tiếp với bộ điều khiển và động cơ (ví dụ: đầu nối dành riêng cho OEM).'
    control_voltage_or_gate_connectivity:
      name: Điện áp điều khiển hoặc kết nối cổng
      description: Chỉ định hỗ trợ kết nối điện áp điều khiển/cổng để tích hợp với
        các thiết bị dạng analog/mô-đun.
    controller_function:
      name: Chức năng của bộ điều khiển
      description: Xác định vai trò chính của bo mạch điều khiển máy chạy bộ, chẳng
        hạn như điều khiển động cơ, nguồn điện hoặc bộ biến tần.
    controller_type:
      name: Loại bộ điều khiển
      description: Chỉ định bộ điều khiển động cơ/hệ thống điều khiển đi kèm với bộ
        chuyển đổi xe tay ga điện (hoặc cần thiết để sử dụng), tập trung vào các đặc
        điểm của bộ điều khiển liên quan đến khả năng tương thích và hiệu suất.
    conversion_kit_cooling_method:
      name: Phương pháp làm mát bộ chuyển đổi
      description: Phương pháp quản lý nhiệt chính được sử dụng cho việc tích hợp
        động cơ/biến tần/pin.
    conversion_kit_installation_complexity:
      name: Độ phức tạp khi lắp đặt bộ chuyển đổi
      description: Mức độ nỗ lực lắp đặt dự kiến dựa trên kỹ năng/công cụ điển hình
        của khách hàng.
    converted_bed_size:
      name: Kích thước giường chuyển đổi
      description: Cho biết kích thước hoặc cấu hình giường mà cũi sẽ chuyển đổi thành
        khi bộ dụng cụ này được lắp đặt.
    convertible_configuration:
      name: Cấu hình chuyển đổi
      description: 'Cho biết sản phẩm có thể chuyển đổi thành bao nhiêu cấu hình giường
        khác nhau (ví dụ: cũi 3 trong 1 → giường trẻ em → giường nằm ban ngày).'
    convertible_high_chair_modes:
      name: Các chế độ của ghế ăn dặm thông minh
      description: Chỉ định các cấu hình chỗ ngồi mà ghế có thể chuyển đổi thành.
    cookie_decorating_kit_items_included:
      name: Các mặt hàng trong bộ trang trí bánh quy đi kèm
      description: 'Liệt kê các thành phần trang trí riêng lẻ được cung cấp để khách
        hàng biết chính xác những vật dụng nào có trong hộp (ví dụ: ống kem phủ, rắc
        đường, khuôn cắt bánh quy).'
    cookie_variety:
      name: Loại bánh quy
      description: Xác định kiểu dáng hoặc loại bánh quy cụ thể, giúp người mua sắm
        nhanh chóng tìm thấy loại ưa thích của họ.
    cooking_state:
      name: Trạng thái chế biến
      description: Cho biết mức độ sẵn sàng của sản phẩm gà khi bán (sống, chín hoàn
        toàn, ướp, v.v.).
    coolant_additive_purpose:
      name: Mục đích của chất phụ gia làm mát
      description: Chức năng chính của chất phụ gia làm mát (không phải sản phẩm súc
        rửa két nước hoặc chất bịt kín chuyên dụng).
    coolant_base_fluid:
      name: Chất lỏng gốc làm mát
      description: Xác định gốc glycol chính được sử dụng trong công thức chất chống
        đông/chất làm mát.
    coolant_outlet_connection_style:
      name: Kiểu kết nối đầu ra chất làm mát
      description: Kiểu giao diện kết nối đầu ra được sử dụng để gắn ống dẫn nước
        làm mát hoặc đường ống chất làm mát.
    coolant_outlet_neck_angle:
      name: Góc cổ ống dẫn chất làm mát
      description: Góc/hướng của đầu ra cổ ống dẫn nước so với mặt bích lắp đặt/động
        cơ (hữu ích cho việc định tuyến ống dẫn nước làm mát phía trên).
    coolant_technology:
      name: Công nghệ chất làm mát
      description: Chỉ định loại hóa chất/công nghệ chất làm mát được sử dụng bởi
        chất chống đông/chất làm mát (như thường được ghi trên bao bì).
    coolant_temperature_sensor_port:
      name: Cổng cảm biến nhiệt độ chất làm mát
      description: Cổ ống dẫn nước có bao gồm cổng cho cảm biến hoặc công tắc nhiệt
        độ chất làm mát hay không và giao diện mà nó sử dụng.
    coolant_temperature_sensor_seal_type:
      name: Loại gioăng cảm biến nhiệt độ chất làm mát
      description: Loại phương pháp làm kín được sử dụng giữa cảm biến và động cơ/đường
        dẫn chất làm mát.
    cooling_system_component_included:
      name: Thành phần hệ thống làm mát đi kèm
      description: Liệt kê các thành phần hệ thống làm mát bổ sung đi kèm với bơm
        nước.
    cooling_system_flush_application_step:
      name: Bước ứng dụng súc rửa hệ thống làm mát
      description: 'Cho biết sản phẩm phù hợp ở đâu trong quy trình bảo dưỡng (ví
        dụ: chất tẩy rửa trước khi súc rửa so với chất rửa/trung hòa cuối cùng).'
    cooling_system_type:
      name: Loại hệ thống làm mát
      description: 'Chỉ định cấu hình hệ thống làm mát được sử dụng bởi động cơ hàng
        hải gắn trong (ví dụ: nước thô/vòng hở, vòng kín/nước ngọt với bộ trao đổi
        nhiệt, làm mát bằng nước đáy tàu).'
    cord_material:
      name: Chất liệu dây
      description: Chỉ định chất liệu của dây/sợi dùng để kéo que lau qua kèn saxophone.
    core_type_bass_strings:
      name: Loại lõi (dây bass)
      description: Chỉ định hình dạng lõi của dây, ảnh hưởng đến cảm giác và độ linh
        hoạt.
    cork_grease_base_material:
      name: Chất liệu cơ bản của mỡ bôi trơn bằng nút bần
      description: 'Thành phần cơ bản chính của công thức mỡ bôi trơn bằng nút bần
        (ví dụ: gốc lanolin).'
    cork_grease_form:
      name: Dạng mỡ bôi trơn bằng nút bần
      description: Hình dạng vật lý của sản phẩm mỡ bôi trơn bằng nút bần.
    corn_presentation:
      name: Hình thức trình bày của ngô
      description: 'Chỉ định hình thức trình bày hoặc dạng vật lý của sản phẩm ngô
        (ví dụ: nguyên hạt, hạt, bột).'
    corn_syrup_variety:
      name: Loại siro ngô
      description: Chỉ định kiểu dáng hoặc biến thể chế biến cụ thể của siro.
    corn_variety:
      name: Loại ngô
      description: Xác định giống ngô cụ thể đang được bán, giúp người mua hàng phân
        biệt giữa các loại khác nhau về hương vị, kết cấu, màu sắc và cách sử dụng
        trong nấu ăn.
    corner_compatibility:
      name: Khả năng tương thích với góc bàn
      description: Chỉ định hình dạng góc bàn (vuông hoặc tròn) mà tấm phủ được thiết
        kế cho.
    corner_flag_features:
      name: Đặc điểm của cờ góc bàn
      description: 'Nêu bật các đặc điểm chức năng đặc biệt hoặc cải tiến của cờ góc
        bàn (ví dụ: cột có thể gập lại, vật liệu phản quang).'
    cornet_mouthpiece_shank_type:
      name: Loại cán ống ngậm kèn cornet
      description: Xác định tiêu chuẩn cán/đầu ống ngậm được kèn cornet hỗ trợ để
        đảm bảo tính tương thích.
    cornhole_league_certification:
      name: Chứng nhận của giải đấu Cornhole
      description: Cho biết các chứng nhận chính thức hoặc sự chấp thuận của giải
        đấu mà sản phẩm đáp ứng.
    corrosion_resistance:
      name: Khả năng chống ăn mòn
      description: Xác định phương pháp xử lý hoặc xếp hạng chống ăn mòn của giá đỡ/khung
        gắn khi tiếp xúc với môi trường ngoài trời.
    corrosion_resistance_level:
      name: Mức độ chống ăn mòn
      description: Cho biết khả năng chống ăn mòn phù hợp với môi trường nước ngọt/nước
        mặn.
    costume_components_included:
      name: Các thành phần trang phục đi kèm
      description: Liệt kê các mảnh quần áo và phụ kiện đi kèm với trang phục, làm
        rõ những gì thuộc về bộ sản phẩm.
    cotton_weave_type:
      name: Loại dệt cotton
      description: Mô tả cấu trúc dệt/đan của bề mặt cotton có thể in được, ảnh hưởng
        đến kết cấu và độ sắc nét của bản in.
    counter_type:
      name: Loại máy đếm
      description: Cho biết sự hiện diện và kiểu dáng của tính năng lặp lại hoặc theo
        dõi lực tích hợp.
    counterweight_fill_material:
      name: Vật liệu làm đầy đối trọng
      description: Cho biết chất liệu có thể được sử dụng để thêm vật nặng hoặc làm
        đầy trước đối trọng.
    counterweight_type:
      name: Loại đối trọng
      description: Xác định kiểu thiết kế hoặc cấu tạo của đối trọng, chẳng hạn như
        bao cát hoặc tấm thép, để hỗ trợ tính tương thích và lắp đặt.
    coupler_system:
      name: Hệ thống khớp nối
      description: Loại/hệ thống khớp nối được trang bị cho đầu máy xe lửa mô hình
        để đảm bảo tính tương thích với toa xe.
    court_surface_suitability:
      name: Độ phù hợp với bề mặt sân
      description: Cho biết bề mặt sân bóng rổ mà đế ngoài của giày được thiết kế
        cho, giúp người mua sắm lựa chọn độ bám và độ bền phù hợp cho sân gỗ trong
        nhà, sân nhựa đường/bê tông ngoài trời hoặc cả hai.
    cover_fit_style:
      name: Kiểu dáng vừa vặn của vỏ bọc
      description: Mô tả cách tấm phủ vừa khít với bàn, ảnh hưởng đến vẻ ngoài và
        mức độ bảo vệ.
    cover_fit_type:
      name: Loại vỏ bọc
      description: Cho biết vỏ bọc được may đo riêng (tùy chỉnh/bán tùy chỉnh) hay
        loại phổ thông, và liệu nó được thiết kế để neo đậu dưới nước hay để lưu trữ/sử
        dụng trên xe kéo.
    cowbell_beater_type:
      name: Loại dùi gõ chuông bò
      description: Loại dụng cụ gõ được khuyến nghị cho âm thanh/độ hoàn thiện của
        chuông bò (nếu sản phẩm chỉ định).
    cowbell_mounting_method:
      name: Phương pháp gắn chuông bò
      description: Cách lắp đặt/sử dụng chuông bò (cầm tay so với gắn vào trang thiết
        bị).
    cowbell_sound_character:
      name: Đặc tính âm thanh của chuông bò
      description: Đặc điểm âm thanh chung được sử dụng trong danh sách (hỗ trợ tìm
        kiếm ngoài kích thước).
    cradle_capacity:
      name: Sức chứa nôi
      description: Cho biết nôi được thiết kế để chứa một trẻ sơ sinh hay trẻ sinh
        đôi.
    craft_cutter_embosser_machine_operation:
      name: Cách vận hành máy cắt/dập nổi thủ công
      description: 'Chỉ định cách vận hành máy cắt/dập nổi từ góc độ quy trình làm
        việc của người dùng (ví dụ: tay quay, nút nhấn điện, điều khiển bằng ứng dụng).'
    craft_decoration_maker_accessories_included:
      name: Phụ kiện máy làm đồ trang trí thủ công đi kèm
      description: 'Liệt kê các phụ kiện chính đi kèm với máy làm đồ trang trí thủ
        công (ví dụ: băng/màng khởi động, giấy dán thay thế, hộp kim tuyến, dụng cụ
        vệ sinh).'
    craft_foil_application_method:
      name: Phương pháp dán giấy bạc thủ công
      description: Xác định cách thức dán/kích hoạt giấy bạc thủ công (keo dán, nhiệt,
        mực in/chất phản ứng, v.v.).
    craft_foil_format:
      name: Định dạng giấy bạc thủ công
      description: 'Cho biết định dạng vật lý của giấy bạc thủ công khi bán (ví dụ:
        dạng cuộn so với dạng tấm).'
    craft_glue_finish:
      name: Độ hoàn thiện của keo dán thủ công
      description: 'Mô tả hình thức của keo sau khi khô (ví dụ: trong suốt, trắng/mờ,
        bán trong suốt, bóng/mờ).'
    craft_magnet_application:
      name: Ứng dụng nam châm thủ công
      description: Mục đích sử dụng chính hoặc bề mặt gắn kết dự định cho sản phẩm
        nam châm.
    craft_magnet_holding_strength_level:
      name: Mức độ lực giữ của nam châm thủ công
      description: Phân loại lực giữ tương đối của nam châm thủ công để giúp người
        mua hàng lựa chọn lực giữ phù hợp cho dự án của họ.
    craft_organizer_storage_features:
      name: Tính năng lưu trữ của hộp đựng đồ thủ công
      description: 'Mô tả các tính năng tổ chức và các yếu tố lưu trữ bên trong của
        hộp đựng đồ thủ công (ví dụ: vách ngăn điều chỉnh, ngăn kéo, túi trong suốt).'
    craft_scoring_board_included_accessories:
      name: Phụ kiện đi kèm với bảng kẻ vạch thủ công
      description: 'Các phụ kiện đi kèm với bảng kẻ vạch (ví dụ: bút kẻ vạch/dụng
        cụ gấp giấy, hình tam giác, dụng cụ gấp phong bì).'
    craft_scoring_board_measurement_system:
      name: Hệ thống đo lường bảng điểm Craft
      description: Xác định hệ thống đo lường được đánh dấu trên bảng điểm (hệ đo
        lường Anh, hệ đo lường mét, hệ kép hoặc không đánh dấu).
    craft_wire_finish_coating:
      name: Lớp phủ/hoàn thiện dây Craft
      description: Xác định lớp hoàn thiện bề mặt hoặc lớp phủ được áp dụng cho dây
        để tạo màu, chống gỉ hoặc bảo vệ.
    craft_wood_surface_preparation:
      name: Chuẩn bị bề mặt gỗ Craft
      description: 'Cho biết bề mặt gỗ đã sẵn sàng để hoàn thiện/sơn hay cần chuẩn
        bị (ví dụ: chà nhám/sơn lót).'
    crank_spindle_interface:
      name: Giao diện trục khuỷu
      description: 'Xác định hệ thống trục khuỷu mà bộ trục giữa hỗ trợ (ví dụ: SRAM
        DUB, Square Taper), đảm bảo khả năng tương thích giữa bộ trục khuỷu và bộ
        trục giữa.'
    crankshaft_balance_type:
      name: Loại cân bằng trục khuỷu
      description: Cho biết trục khuỷu được cân bằng bên trong (trung tính) hay cân
        bằng bên ngoài (yêu cầu bộ cân bằng hài hòa/quả cân bằng bánh đà).
    crankshaft_bolt_pattern:
      name: Kiểu bố trí bu lông trục khuỷu
      description: Kiểu bố trí bu lông trên mặt bích phía sau để gắn bánh đà/tấm nối
        mềm.
    crankshaft_sensor_reluctor_type:
      name: Loại cảm biến vị trí trục khuỷu
      description: Cấu hình bánh răng cảm biến vị trí trục khuỷu được sử dụng (nếu
        có).
    craps_accessories_included:
      name: Phụ kiện đi kèm của trò chơi đổ xúc xắc
      description: Xác định các phụ kiện bổ sung dành riêng cho trò chơi craps ngoài
        xúc xắc/chip/bố cục.
    crash_cymbal_profile:
      name: Hình dạng chũm chọe va chạm
      description: Độ cong/hình dạng tổng thể của chũm chọe (độ cong rõ rệt), ảnh
        hưởng đến cao độ và độ nhạy.
    crash_cymbal_sound_character:
      name: Đặc tính âm thanh của chũm chọe
      description: Các mô tả đặc điểm âm thanh chính của chũm chọe va chạm.
    crash_pad_size_class:
      name: Phân loại kích thước miếng đệm chống va chạm
      description: Cho biết loại kích thước chung của miếng đệm chống va chạm dùng
        cho leo núi, giúp người mua nhanh chóng hình dung được diện tích bề mặt mà
        không cần kích thước chính xác.
    crate_engine_assembly_level:
      name: Mức độ lắp ráp bộ phận máy xúc
      description: Mức độ hoàn chỉnh của bộ phận máy xúc khi vận chuyển (các bộ phận
        chính được bao gồm).
    cream_base_ingredient:
      name: Thành phần kem nền
      description: Xác định nguồn gốc chính của kem, bao gồm cả các sản phẩm từ sữa
        và các sản phẩm thay thế từ thực vật.
    cream_cheese_base:
      name: Thành phần cơ bản của phô mai kem
      description: Xác định nguồn gốc chính từ sữa hoặc thực vật được sử dụng để làm
        phô mai kem, giúp người mua hàng cân nhắc về chế độ ăn uống, chất gây dị ứng
        và hương vị.
    cream_cheese_form:
      name: Dạng phô mai kem
      description: 'Mô tả hình dạng vật lý hoặc kiểu kết cấu của phô mai kem (ví dụ:
        dạng khối, dạng đánh bông, dạng chấm), ảnh hưởng đến khả năng phết và mục
        đích sử dụng.'
    cream_variety:
      name: Loại kem
      description: 'Xác định kiểu kem cụ thể dựa trên hàm lượng chất béo, kiểu chế
        biến hoặc mục đích sử dụng trong nấu ăn (ví dụ: Half & Half, Double cream,
        Cooking cream).'
    crib_accessory_features:
      name: Tính năng phụ kiện cũi em bé
      description: Liệt kê các tính năng chức năng hoặc hướng đến sự thoải mái cụ
        thể của phụ kiện giường cũi và giường trẻ em, chẳng hạn như khả năng thoáng
        khí hoặc các cạnh đàn hồi.
    crib_bumper_features:
      name: Đặc điểm của tấm chắn cũi
      description: Nêu bật các đặc tính chức năng đặc biệt của tấm chắn quây cũi em
        bé.
    crib_conversion_kit_components:
      name: Các thành phần trong bộ phụ kiện chuyển đổi cũi
      description: Liệt kê các bộ phận chính có trong bộ sản phẩm để người mua hàng
        có thể xác minh rằng họ có mọi thứ cần thiết để lắp đặt.
    cricket_ball_grade:
      name: Cấp độ bóng cricket
      description: Xác định mức chất lượng hoặc tiêu chuẩn chơi dự định của quả bóng.
    cricket_ball_piece_construction:
      name: Cấu tạo các mảnh của bóng cricket
      description: Cho biết số lượng các mảnh bên ngoài hoặc các phần được đúc được
        sử dụng để tạo nên vỏ bóng, một chỉ số quan trọng về chất lượng và giá cả.
    cricket_ball_type:
      name: Loại bóng cricket
      description: Xác định loại bóng cricket được cung cấp kèm theo sản phẩm hoặc
        cho biết nếu không có bóng nào được bao gồm.
    cricket_bat_accessory_type:
      name: Loại phụ kiện gậy cricket
      description: Xác định loại phụ kiện hoặc vật dụng bảo dưỡng gậy cricket để người
        mua có thể nhanh chóng lọc ra sản phẩm họ cần.
    cricket_bat_size:
      name: Kích thước gậy cricket
      description: Cho biết phân loại kích thước gậy cricket tiêu chuẩn (0–6, Harrow,
        SH, LH), thường được chọn dựa trên độ tuổi và chiều cao của người chơi.
    cricket_bat_size_compatibility:
      name: Khả năng tương thích kích thước gậy cricket
      description: Liệt kê các kích thước gậy mà phụ kiện được thiết kế để phù hợp,
        đảm bảo tính tương thích chính xác.
    cricket_helmet_role:
      name: Vai trò của mũ bảo hiểm cricket
      description: Cho biết vai trò chơi mà mũ bảo hiểm được thiết kế cho, chẳng hạn
        như đánh bóng hoặc bắt bóng.
    cricket_leg_guard_type:
      name: Loại bảo vệ chân cricket
      description: Cho biết kiểu dáng cụ thể của thiết bị bảo vệ chân cricket.
    cricket_player_role:
      name: Vai trò của người chơi cricket
      description: Xác định vai trò chơi chính mà giày được thiết kế cho.
    cricket_protection_grade:
      name: Cấp độ bảo vệ cricket
      description: Cho biết phân loại cấp độ bảo vệ do nhà sản xuất thiết bị cricket
        chỉ định.
    cricket_stump_base_type:
      name: Loại đế cọc gỗ môn Cricket
      description: Cho biết kiểu dáng hoặc chất liệu đế được cung cấp kèm theo cọc
        gôn, ảnh hưởng đến độ ổn định và sự phù hợp với bề mặt sân chơi.
    cricket_stump_target_features:
      name: Các tính năng mục tiêu của cọc gôn cricket
      description: Làm nổi bật các tính năng chức năng riêng biệt giúp tăng cường
        khả năng sử dụng trong huấn luyện, khả năng hiển thị, độ bền hoặc độ ổn định.
    cricket_stump_type:
      name: Loại cọc gôn cricket
      description: Phân loại kiểu dáng hoặc cấu tạo của cọc gôn để giúp người mua
        lựa chọn giữa cọc gôn thi đấu truyền thống, cọc gôn tập luyện hoặc các mẫu
        hiện đại có đèn chiếu sáng.
    cricket_training_focus:
      name: Trọng tâm huấn luyện môn Cricket
      description: Kỹ năng hoặc bộ môn cricket chính mà dụng cụ này được thiết kế
        để cải thiện.
    croquet_set_components_included:
      name: Các thành phần đi kèm trong bộ đồ chơi Croquet
      description: 'Liệt kê tất cả các thành phần chính được cung cấp kèm theo bộ
        sản phẩm (ví dụ: cọc gôn, cọc đóng, túi đựng) để khách hàng hiểu chính xác
        những gì họ đang mua.'
    cross_country_binding_system:
      name: Hệ thống buộc giày trượt tuyết địa hình
      description: Chỉ định tiêu chuẩn buộc giày trượt tuyết địa hình mà sản phẩm
        được khoan hoặc tương thích.
    cross_stitch_chart_symbol_type:
      name: Loại ký hiệu biểu đồ thêu chữ thập
      description: Cách biểu diễn biểu đồ (ký hiệu, màu sắc hoặc cả hai).
    cross_stitch_finishing_type:
      name: Loại hoàn thiện thêu chữ thập
      description: Loại hoàn thiện/hiển thị dự định cho sản phẩm thêu.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Cơ chế giữ vải khung thêu chữ thập
      description: 'Cho biết cách vải được cố định/căng trong khung (ví dụ: kẹp, ghim),
        điều này ảnh hưởng đến tính dễ sử dụng và khả năng tương thích của vải.'
    cross_stitch_frame_included_components:
      name: Các thành phần đi kèm khung thêu chữ thập
      description: 'Liệt kê những gì có trong hộp (ví dụ: chỉ khung so với khung +
        kẹp + giá đỡ), giảm sự mơ hồ và khả năng trả lại hàng.'
    cross_stitch_frame_type:
      name: Loại khung thêu chữ thập
      description: Xác định cấu tạo/loại khung thêu chữ thập (cách giữ vải), ảnh hưởng
        đến tính khả dụng và khả năng tương thích của dự án.
    cross_stitch_pattern_technique:
      name: Kỹ thuật thêu chữ thập
      description: Kỹ thuật/kiểu thêu chữ thập được yêu cầu bởi biểu đồ.
    crossbar_shape_profile:
      name: Hình dạng/hình dáng thanh ngang
      description: Xác định hình dạng khí động học/hình dáng của thanh ngang.
    crossbar_style:
      name: Kiểu thanh ngang
      description: Xác định kiểu cấu tạo của thanh ngang, phân biệt thanh ngang cứng
        dùng trong thi đấu với thanh ngang linh hoạt hoặc thanh ngang lai dùng trong
        huấn luyện.
    crossbow_type:
      name: Loại nỏ
      description: Xác định kiểu thiết kế cơ bản của nỏ, chẳng hạn như nỏ phức hợp,
        nỏ cong hoặc nỏ cầm tay. Kiểu cấu tạo quyết định hiệu suất, kích thước và
        trường hợp sử dụng, vì vậy người mua sắm thường lọc theo kiểu này.
    crossover_component_type:
      name: Loại thành phần giao nhau
      description: Xác định cấu trúc liên kết thành phần chính được sử dụng trong
        mạng giao nhau thụ động.
    crossover_configuration:
      name: Cấu hình bộ phân tần
      description: 'Cho biết liệu giao nhau sử dụng một điểm giao nhau hay nhiều điểm
        (ví dụ: thiết kế 2 chiều so với 3 chiều).'
    crossover_type:
      name: Loại giao nhau
      description: Loại mạng giao nhau được bao gồm trong bộ thành phần.
    crown_profile:
      name: Hình dáng chóp mũ
      description: Xác định chiều cao/hình dáng của chóp mũ phía trên vành mũ.
    crown_style:
      name: Kiểu chóp mũ
      description: Xác định hình dáng tổng thể của chóp mũ trên mũ bowler.
    crust_taste_profile:
      name: Hồ sơ hương vị vỏ bánh
      description: Cho biết liệu hương vị vốn có của vỏ bánh là ngọt, mặn hay trung
        tính.
    crystal_finish:
      name: Hoàn thiện pha lê
      description: 'Mô tả bề mặt hoàn thiện, lớp phủ hoặc trạng thái xử lý của pha
        lê rời (ví dụ: thô, đánh bóng, mài thô, mài giác, mờ, phủ lớp aura, nhuộm
        màu, xử lý nhiệt).'
    crystal_material:
      name: Chất liệu pha lê
      description: Chỉ định chất liệu được sử dụng cho mặt kính đồng hồ bảo vệ mặt
        số.
    crystalline_finish_style:
      name: Kiểu hoàn thiện pha lê
      description: Hình dạng pha lê/lông vũ đặc trưng được tạo ra bởi sáp cọ trong
        nến thành phẩm.
    cucumber_variety:
      name: Giống dưa chuột
      description: 'Chỉ định giống hoặc loại dưa chuột bán trên thị trường (ví dụ:
        Anh, Ba Tư, Kirby).'
    cue_compatibility:
      name: Độ tương thích của cơ bida
      description: Cho biết cấu hình khớp cơ bida mà hộp được thiết kế để chứa, chẳng
        hạn như cơ một mảnh hoặc cơ khớp 3/4.
    cue_construction:
      name: Kết cấu của cơ bida
      description: Cho biết cách cấu tạo của cơ bida—số lượng mảnh hoặc liệu đó có
        phải là một bộ phận riêng lẻ như chỉ có phần cán hoặc chỉ có phần thân—ảnh
        hưởng đến tính di động và khả năng tương thích.
    cue_head_material:
      name: Chất liệu đầu cơ bida
      description: Xác định chất liệu của đầu cơ (phần tiếp xúc với puck), ảnh hưởng
        đến độ bền và khả năng bảo vệ bề mặt.
    cue_sport_compatibility:
      name: Khả năng tương thích với môn thể thao bi-a
      description: Xác định môn thể thao bi-a mà phụ kiện được thiết kế cho.
    cue_thread_size:
      name: Kích thước ren cơ bi-a
      description: Chỉ định thông số kỹ thuật ren được sử dụng trên các phần mở rộng,
        bộ phận bảo vệ khớp nối, bu lông trọng lượng và các phụ kiện cơ bi-a khác
        để đảm bảo lắp đặt chính xác.
    cue_tip_hardness:
      name: Độ cứng đầu cơ bi-a
      description: Đánh giá độ cứng của đầu cơ bi-a, ảnh hưởng đến khả năng kiểm soát
        và phản hồi của bi cái.
    cuff_height:
      name: Chiều cao cổ giày
      description: Cho biết chiều cao của cổ giày (thấp, trung bình, cao, có thể tháo
        rời/điều chỉnh), ảnh hưởng đến khả năng hỗ trợ và tính linh hoạt.
    cuff_position:
      name: Vị trí cổ giày
      description: Cho biết vị trí trên cơ thể người chơi mà cổ giày được thiết kế
        để gắn vào.
    cultivation_method:
      name: Phương pháp canh tác
      description: Chỉ định cách thức canh tác sân cỏ, bao gồm các kỹ thuật trồng
        trọt và phương pháp canh tác.
    cup_type:
      name: Loại chén đính kim sa
      description: Cho biết hình dạng bề mặt của kim sa (phẳng so với lõm) và độ sâu
        của chén, có thể ảnh hưởng đến độ lấp lánh, kết cấu và cách nó nằm khi được
        may hoặc dán.
    cupcake_size:
      name: Kích thước bánh cupcake
      description: 'Chỉ định loại kích thước vật lý của bánh cupcake được bán (ví
        dụ: mini, tiêu chuẩn, jumbo).'
    curd_size:
      name: Kích thước cục đông
      description: Xác định kích thước hoặc kết cấu của các cục đông phô mai tươi.
    cure_method:
      name: Phương pháp lưu hóa
      description: 'Mô tả quy trình cần thiết để chất kết dính đông lại hoặc đóng
        rắn (ví dụ: tia cực tím, độ ẩm không khí, nhiệt độ).'
    curing_or_preparation_method:
      name: Phương pháp chế biến hoặc bảo quản
      description: 'Xác định cách thức ô liu được bảo quản hoặc chế biến (ví dụ: ngâm
        nước muối, ngâm dầu, nướng).'
    curling_broom_head_material:
      name: Chất liệu đầu chổi curling
      description: Xác định thành phần vật liệu chính của đầu chổi hoặc miếng đệm.
    curling_broom_head_type:
      name: Loại đầu chổi curling
      description: Xác định kiểu dáng hoặc cấu tạo của đầu/miếng đệm quét.
    curling_shoe_slider_material:
      name: Chất liệu đế giày curling
      description: Xác định chất liệu chính của đế giày curling.
    curling_training_aid_type:
      name: Loại dụng cụ hỗ trợ tập luyện curling
      description: Xác định loại dụng cụ hỗ trợ tập luyện curling.
    curry_variety:
      name: Loại cà ri
      description: Phân loại các sản phẩm nước sốt cà ri theo kiểu hoặc công thức
        cà ri cụ thể mà chúng được dùng để tạo ra, chẳng hạn như Tikka Masala, Massaman
        hoặc cà ri xanh Thái Lan, để cho phép lọc hương vị/kiểu dáng chính xác.
    cushion_rubber_profile:
      name: Hình dạng cao su đệm
      description: Mã hình dạng hoặc cấu hình của các miếng cao su đệm ray.
    cushioning_level:
      name: Mức độ đệm
      description: Cho biết lượng đệm dưới chân được cung cấp bởi tất để bảo vệ tác
        động và tạo sự thoải mái.
    custom_label_content_type:
      name: Loại nội dung nhãn tùy chỉnh
      description: 'Xác định thông tin nào được tùy chỉnh trên nhãn may (ví dụ: tên,
        logo, thông điệp, kích thước, ký hiệu chăm sóc, thông tin liên hệ).'
    customization_type:
      name: Loại tùy chỉnh
      description: Xác định xem áo đấu là loại trơn, do cầu thủ phát hành, hay loại
        tùy chỉnh với tên/số cá nhân.
    cut_or_preparation_style:
      name: Kiểu cắt hoặc chế biến
      description: 'Xác định cách các miếng rau được cắt hoặc chế biến bên trong hộp
        hoặc lọ (ví dụ: nguyên củ, thái hạt lựu, dạng que).'
    cut_resistance_rating:
      name: Xếp hạng khả năng chống cắt
      description: Xác định mức độ chống cắt đã được kiểm nghiệm chính thức của mặt
        hàng.
    cut_type:
      name: Loại cắt
      description: Cho biết vải được bán theo mét/yard, cắt sẵn, hay dạng cuộn/thùng.
    cutting_application:
      name: Ứng dụng cắt
      description: Mục đích sử dụng chính của kéo để cắt.
    cutting_mat_grid_style:
      name: Kiểu lưới thảm cắt
      description: Kiểu hướng dẫn in trên bề mặt thảm.
    cutting_mat_intended_use:
      name: Mục đích sử dụng thảm cắt
      description: Mục đích sử dụng chính của bề mặt làm việc/chế tạo mà thảm cắt
        được thiết kế.
    cv_boot_clamp_type:
      name: Loại kẹp bọc trục CV
      description: Xác định kiểu kẹp/dây đai được sử dụng để cố định bọc trục CV.
    cv_boot_kit_contents:
      name: Nội dung bộ bọc trục CV
      description: 'Liệt kê những gì được bao gồm trong bộ bọc trục CV (ví dụ: kẹp,
        gói mỡ bôi trơn, dây đai giữ).'
    cv_boot_material:
      name: Chất liệu bọc trục CV
      description: Xác định chất liệu cấu tạo chính của bọc trục CV.
    cv_boot_position:
      name: Vị trí bọc khớp CV
      description: Xác định xem bọc khớp CV phù hợp với vị trí khớp CV bên trong (phía
        trong) hay bên ngoài (phía ngoài) trên trục.
    cycling_apparel_fit:
      name: Kiểu dáng trang phục đạp xe
      description: 'Mô tả kiểu dáng của trang phục, cho biết độ bó sát và tính khí
        động học dự định (ví dụ: Đua, Thoải mái).'
    cylinder_head_assembly:
      name: Lắp ráp đầu xi lanh
      description: 'Xác định mức độ hoàn thiện của đầu xi lanh khi bán (ví dụ: đã
        lắp ráp hoàn chỉnh với các bộ phận hệ thống van đã được lắp đặt so với đầu
        xi lanh trần/chưa lắp ráp).'
    cylinder_head_material_grade:
      name: Cấp độ vật liệu đầu xi lanh
      description: Xác định vật liệu và cấp độ được sử dụng cho đầu xi lanh đúc.
    cylinder_head_position:
      name: Vị trí đầu xi lanh
      description: 'Xác định đầu xi lanh phù hợp với dãy xi lanh/bên nào hoặc hướng
        nào trên động cơ nhiều dãy xi lanh (ví dụ: bên trái/bên phải hoặc dãy 1/dãy
        2).'
    cymbal_alloy:
      name: Hợp kim chũm chọe
      description: Hợp kim/thành phần của chũm chọe trong bộ.
    cymbal_application:
      name: Ứng dụng chũm chọe
      description: Ứng dụng chơi chính mà chũm chọe được thiết kế/tiếp thị.
    cymbal_arm_mounting_interface:
      name: Giao diện gắn cần đỡ chũm chọe
      description: 'Xác định cách cần đỡ chũm chọe được gắn vào phần còn lại của trang
        thiết bị (ví dụ: kẹp, giá đỡ, bộ phận tiếp nhận chân đế).'
    cymbal_arm_rotation_positioning_features:
      name: Tính năng xoay/định vị cần đỡ chũm chọe
      description: Xác định các tính năng định vị ảnh hưởng đến góc độ/xoay và khóa
        cần đỡ.
    cymbal_arm_style:
      name: Kiểu cần đỡ chũm chọe
      description: Xác định cần đỡ chũm chọe là thẳng hay dạng cần, tùy thuộc vào
        tầm với và vị trí.
    cymbal_drum_case_wheel_configuration:
      name: Cấu hình bánh xe của hộp đựng chũm chọe và trống
      description: Cho biết hộp đựng có bánh xe hay không và (nếu có) cấu hình bánh
        xe để vận chuyển.
    cymbal_hammering_style:
      name: Kiểu gõ chũm chọe
      description: Quy trình/hình thức gõ ảnh hưởng đến độ phức tạp và cảm giác.
    cymbal_kit_components_included:
      name: Các thành phần đi kèm trong bộ chũm chọe
      description: Xác định các loại chũm chọe nào được bao gồm trong bộ/gói chũm
        chọe ride (ngoài chính chũm chọe ride).
    cymbal_kit_items_included:
      name: Các vật dụng đi kèm trong bộ chũm chọe
      description: Xác định các loại chũm chọe nào được bao gồm trong bộ/gói (theo
        loại chũm chọe).
    cymbal_lathing:
      name: Gia công tiện chũm chọe
      description: Xác định xem/bao nhiêu phần bề mặt chũm chọe được gia công tiện
        (tạo rãnh) so với không gia công tiện/thô.
    cymbal_playing_style_genre:
      name: Phong cách/thể loại chơi chũm chọe
      description: 'Xác định bối cảnh biểu diễn điển hình mà chũm chọe được thiết
        kế cho (ví dụ: chũm chọe múa bụng so với chũm chọe cầm tay trong dàn nhạc
        diễu hành/dàn nhạc).'
    cymbal_set_configuration:
      name: Cấu hình bộ chũm chọe
      description: 'Cho biết sản phẩm được bán dưới dạng một chiếc chũm chọe đơn lẻ,
        một cặp chũm chọe hoặc một bộ nhiều cặp (ví dụ: để hướng dẫn nhóm).'
    cymbal_sound_character:
      name: Đặc điểm âm thanh của chũm chọe
      description: 'Mô tả cấu hình âm sắc/âm điệu tổng thể của chũm chọe được sử dụng
        để khám phá (ví dụ: sáng so với tối).'
    cymbal_sustain:
      name: Độ ngân của chũm chọe
      description: Thời gian chũm chọe vang lên sau khi được đánh.
    cymbal_type:
      name: Loại chũm chọe
      description: Chỉ định vai trò chức năng của chũm chọe mà miếng đệm chũm chọe
        điện tử được thiết kế để mô phỏng.
    cymbal_volume_level:
      name: Mức âm lượng của chũm chọe
      description: Độ lớn/mức đầu ra cảm nhận được của chũm chọe.
    cymbal_weight_class:
      name: Phân loại trọng lượng của chũm chọe
      description: Cho biết phân loại trọng lượng của chũm chọe, ảnh hưởng đến âm
        sắc, âm lượng và độ phản hồi.
    dairy_heat_treatment:
      name: Xử lý nhiệt sữa.
      description: 'Xác định mức độ xử lý hoặc tiệt trùng được áp dụng cho kem (ví
        dụ: Kem tươi, Kem tiệt trùng, Kem UHT), ảnh hưởng đến thời hạn sử dụng, hương
        vị và khả năng đánh bông.'
    damage_type:
      name: Loại hư hỏng
      description: Chỉ định các loại hư hỏng kính chắn gió mà bộ dụng cụ này nhằm
        mục đích sửa chữa.
    damper_pedal_style:
      name: Kiểu bàn đạp giảm âm
      description: Mô tả kiểu dáng vật lý của bàn đạp giảm âm được sử dụng với bàn
        phím/đàn piano điện tử.
    damping_adjustability:
      name: Khả năng điều chỉnh giảm âm
      description: Cho biết các thông số giảm âm và/hoặc chiều cao có thể điều chỉnh
        trên bộ giảm xóc.
    damping_level:
      name: Mức độ giảm âm
      description: Cho biết lượng giảm âm lượng và độ ngân tương đối mà bộ phận giảm
        âm cung cấp.
    dance_occasion:
      name: Dịp sử dụng khi khiêu vũ
      description: Cho biết bối cảnh sử dụng dự định của trang phục trong việc luyện
        tập hoặc biểu diễn khiêu vũ.
    darbuka_accessories_included:
      name: Phụ kiện đi kèm của trống Darbuka
      description: Liệt kê các phụ kiện thông thường đi kèm với trống darbuka.
    darbuka_body_finish_type:
      name: Loại hoàn thiện thân trống darbuka
      description: Mô tả lớp hoàn thiện bên ngoài, lớp phủ hoặc phương pháp trang
        trí của thân trống darbuka.
    darbuka_head_material:
      name: Chất liệu mặt trống darbuka
      description: Chỉ định chất liệu của màng mặt trống trên trống darbuka.
    dart_barrel_material:
      name: Vật liệu thân phi tiêu
      description: Xác định vật liệu chính của thân phi tiêu, ảnh hưởng đến sự phân
        bố trọng lượng, độ bền và giá cả.
    dart_shaft_design:
      name: Thiết kế trục phi tiêu
      description: Phân loại thiết kế cơ khí của trục, chẳng hạn như trục cố định,
        xoay, thu gọn hoặc tích hợp cánh, ảnh hưởng đến hiệu suất và giá cả.
    dart_shaft_thread_type:
      name: Loại ren trục phi tiêu
      description: Cho biết kích thước/loại ren được sử dụng để vặn trục vào thân
        phi tiêu, đảm bảo tính tương thích giữa trục và thân.
    dart_thread_size:
      name: Kích thước ren của phi tiêu
      description: Xác định kích thước/tiêu chuẩn ren mà bộ phận tương thích, đảm
        bảo sự phù hợp giữa trục, đầu phi tiêu và thân.
    dart_tip_compatibility:
      name: Khả năng tương thích đầu phi tiêu
      description: Cho biết bộ phận phi tiêu có dành cho đầu phi tiêu thép, đầu mềm,
        hay cả hai loại.
    dart_tip_connection_type:
      name: Loại kết nối đầu phi tiêu
      description: Mô tả thông số kỹ thuật ren hoặc hệ thống lắp đặt mà đầu phi tiêu
        sử dụng để gắn vào thân hoặc trục phi tiêu, đảm bảo khả năng tương thích.
    dartboard_tournament_approval:
      name: Phê duyệt giải đấu phi tiêu
      description: Cho biết bảng phi tiêu có được các liên đoàn hoặc giải đấu phi
        tiêu cụ thể phê duyệt chính thức hay không.
    dartboard_type:
      name: Loại bảng phi tiêu
      description: 'Phân loại bảng phi tiêu theo công nghệ cấu tạo và khả năng tương
        thích với phi tiêu (ví dụ: lông cứng, điện tử, từ tính).'
    dash_cover_construction_type:
      name: Loại cấu tạo vỏ bọc táp-lô
      description: 'Mô tả cách vỏ bọc táp-lô được tạo hình/cấu trúc (ví dụ: đúc khuôn
        so với may) ảnh hưởng đến độ chính xác và hình thức.'
    dash_cover_cutout_configuration:
      name: Cấu hình cắt vỏ bọc táp-lô
      description: Cho biết vỏ bọc được cắt sẵn hoặc tạo hình cho các lỗ/cảm biến
        OEM nào trên táp-lô.
    dashboard_accessory_position:
      name: Vị trí phụ kiện táp-lô
      description: Chỉ định vị trí trên/xung quanh táp-lô mà phụ kiện dự định được
        đặt hoặc gắn.
    date_variety:
      name: Giống quả chà là
      description: 'Chỉ định giống/loại chà là (ví dụ: Medjool, Deglet Noor, Ajwa).
        Giống chà là ảnh hưởng mạnh đến hương vị, kích thước, kết cấu và được nhấn
        mạnh trong hầu hết các tiêu đề và mô tả sản phẩm, vì vậy việc ghi lại thông
        tin này giúp cải thiện khả năng lọc và tìm kiếm.'
    dayan_head_material:
      name: Chất liệu mặt trống Dayan
      description: Chất liệu của bề mặt chơi (pudi), chẳng hạn như loại da tự nhiên
        hoặc tổng hợp.
    dayan_strap_material:
      name: Chất liệu dây buộc trống Dayan
      description: Chất liệu của dây căng (baddhi) được sử dụng để buộc dây cho trống
        dayan.
    dayan_syahi_type:
      name: Loại syahi của trống dayan
      description: Loại syahi (bột bôi trơn màu đen) được bôi lên mặt trống dayan.
    decaffeination_method:
      name: Phương pháp khử caffeine
      description: Xác định quy trình được sử dụng để loại bỏ caffeine khỏi cà phê
        đã khử caffeine.
    decal_installation_method:
      name: Phương pháp dán decal
      description: 'Cách dán decal lên bề mặt xe (ví dụ: dán khô, dán ướt). Chi tiết
        về dụng cụ/yêu cầu (ví dụ: băng dính chuyển hoặc máy sấy nhiệt) nên được ghi
        lại trong hướng dẫn hoặc thuộc tính dụng cụ liên quan khi có thể áp dụng.'
    decal_orientation:
      name: Hướng dán decal
      description: Decal được thiết kế để dán bên trong kính hay bên ngoài bề mặt.
    decal_placement_type:
      name: Loại vị trí dán decal
      description: 'Cho biết vị trí dự định dán decal trên xe (ví dụ: thân xe, cản
        trước, nắp ca-pô).'
    decal_visibility_property:
      name: Đặc tính hiển thị của decal
      description: 'Các đặc tính quang học/khả năng hiển thị của decal nhằm mục đích
        cải thiện khả năng hiển thị hoặc phản ứng với ánh sáng (ví dụ: phản quang,
        huỳnh quang, phát sáng trong bóng tối hoặc trong suốt).'
    deck_concave_level:
      name: Độ lõm của ván trượt
      description: 'Cho biết độ sâu hoặc cường độ lõm của ván trượt (ví dụ: nhẹ, trung
        bình, sâu).'
    deck_flex_rating:
      name: Độ uốn cong của ván trượt
      description: Đánh giá định tính về độ linh hoạt/độ cứng của ván trượt.
    deck_material:
      name: Chất liệu ván trượt
      description: Xác định chất liệu cấu tạo chính của ván trượt.
    decoder_interface_socket_type:
      name: Giao diện/loại ổ cắm bộ giải mã
      description: Loại giao diện bộ giải mã kỹ thuật số hoặc cấu hình bộ giải mã
        tích hợp cho mô hình đầu máy.
    decoration_technique:
      name: Kỹ thuật trang trí
      description: Xác định phương pháp chính được sử dụng để áp dụng đồ họa hoặc
        trang trí lên áo phông.
    decorative_stamp_form_factor:
      name: Hình dạng con dấu trang trí
      description: Xác định định dạng vật lý của con dấu và cách in thiết kế (con
        dấu đơn, bộ, con lăn, nền, v.v.).
    decorative_tape_application:
      name: Ứng dụng của băng dính trang trí
      description: Trường hợp sử dụng chính trong thủ công mỹ nghệ mà băng dính trang
        trí được thiết kế hoặc tiếp thị.
    decorative_tape_format:
      name: Định dạng băng dính trang trí
      description: Xác định cách băng dính trang trí được cung cấp/đóng gói để sử
        dụng.
    decoy_buoyancy:
      name: Độ nổi của mồi nhử
      description: Mô tả cách mồi nhử hoạt động trong cột nước (nổi, lơ lửng hoặc
        chìm).
    decoy_joint_type:
      name: Loại khớp nối của mồi nhử
      description: Cho biết thân mồi nhử là liền khối hay có khớp nối, ảnh hưởng đến
        chuyển động bơi lội.
    decoy_motion_mechanism:
      name: Cơ chế chuyển động của mồi nhử
      description: Mô tả cách thức, nếu có, mồi nhử tạo ra chuyển động hoặc sự xáo
        động nước để thu hút con mồi.
    decoy_posture:
      name: Tư thế mồi nhử
      description: 'Cho biết tư thế hoặc hoạt động được mô phỏng của con vật (ví dụ:
        đang ăn, nghỉ ngơi, cảnh giác).'
    decoy_size_class:
      name: Kích thước mồi nhử
      description: 'Phân loại kích thước tương đối của mồi nhử so với con vật thật
        (ví dụ: Tiêu chuẩn, Cỡ lớn, Cỡ đại).'
    decoy_style:
      name: Kiểu mồi nhử
      description: Xác định hình dạng vật lý hoặc loại thiết kế của mồi nhử để giúp
        thợ săn lựa chọn thiết lập phù hợp.
    deli_meat_variety:
      name: Loại thịt nguội
      description: 'Phân loại kiểu thịt nguội cụ thể (ví dụ: xúc xích Ý, xúc xích
        Bologna, giăm bông Prosciutto, thịt bò nướng).'
    delivery_form:
      name: Hình thức vận chuyển
      description: Hình thức phân phối vật lý của chất tẩy rửa dạng phun.
    denim_composition:
      name: Thành phần vải denim
      description: Thành phần sợi chính của vải denim (sợi cơ bản không bao gồm thuốc
        nhuộm/chất hoàn thiện).
    denim_finish:
      name: Lớp hoàn thiện vải denim
      description: Lớp hoàn thiện bề mặt/xử lý được áp dụng cho vải denim.
    denim_intended_use:
      name: Mục đích sử dụng vải denim
      description: Dự án/mục đích sử dụng điển hình mà vải denim được tiếp thị.
    denim_stretch_type:
      name: Loại độ co giãn của vải denim
      description: Vải denim có độ co giãn cơ học, có thêm elastane/spandex hay không
        co giãn.
    denim_wash:
      name: Kiểu giặt vải denim
      description: 'Chỉ định màu sắc hoặc phương pháp xử lý giặt được áp dụng cho
        vải denim (ví dụ: sáng, tối, thô, axit).'
    derailleur_cage_length:
      name: Chiều dài lồng đề
      description: Chỉ định chiều dài lồng đề quyết định khả năng chứa xích (chủ yếu
        dành cho đề sau).
    derailleur_mounting_style:
      name: Kiểu lắp đặt đề
      description: 'Chỉ định cách gắn đề vào khung xe đạp hoặc móc treo (ví dụ: hàn,
        kẹp, gắn trực tiếp, UDH).'
    derailleur_type:
      name: Loại đề
      description: Chỉ định xem sản phẩm là đề trước hay đề sau.
    deshedder_tool_type:
      name: Loại dụng cụ loại bỏ lông rụng
      description: 'Phân loại kiểu cấu trúc của dụng cụ loại bỏ lông rụng để người
        mua sắm có thể chọn phương pháp chải chuốt ưa thích của họ (ví dụ: lưỡi dao,
        khối, dụng cụ chải hoặc găng tay).'
    diabolo_axle_system:
      name: Hệ thống trục Diabolo
      description: Chỉ định hệ thống/cấu hình trục diabolo ảnh hưởng đến độ mài, độ
        ổn định và độ mòn dây.
    diagnostic_functions_supported:
      name: Các chức năng chẩn đoán được hỗ trợ
      description: Chỉ định các chức năng chẩn đoán/bảo trì mà máy quét có thể thực
        hiện.
    diagnostic_interface_type:
      name: Loại giao diện chẩn đoán
      description: 'Kết nối/giao diện được sử dụng để giao tiếp với xe hoặc thiết
        bị (ví dụ: OBD-II, Bluetooth, Wi-Fi, USB).'
    diamond_color_grade:
      name: Cấp độ màu kim cương
      description: Cho biết cấp độ màu của kim cương, từ D (không màu) đến Z (màu
        nhạt), hoặc biểu thị kim cương màu đặc biệt.
    diaper_cover_style:
      name: Kiểu dáng vỏ tã
      description: Xác định hình dáng thiết kế hoặc kiểu trang trí của vỏ tã để hỗ
        trợ việc duyệt và lọc theo kiểu dáng.
    diastatic_power_unit:
      name: Đơn vị công suất diastatic
      description: 'Chỉ định hệ thống đơn vị được sử dụng để báo cáo giá trị công
        suất diastatic của sản phẩm (ví dụ: °Lintner so với Windisch-Kolbach).'
    diatonic_harmonica_tuning_system:
      name: Hệ thống điều chỉnh kèn harmonica diatonic
      description: Chỉ định bố cục nốt/hệ thống điều chỉnh được sử dụng bởi kèn harmonica
        diatonic.
    dice_sides:
      name: Số mặt của xúc xắc
      description: 'Số mặt (số cạnh) của mỗi viên xúc xắc có trong sản phẩm (ví dụ:
        d6, d20). .Đối với các bộ hỗn hợp, hãy sử dụng giá trị chiếm ưu thế hoặc liệt
        kê dưới dạng nhiều giá trị khi được hỗ trợ.'
    didgeridoo_construction_type:
      name: Loại cấu tạo của didgeridoo
      description: Cách chế tạo hoặc tạo hình didgeridoo (phương pháp chế tạo truyền
        thống hoặc hiện đại).
    dietary_formulation_claim:
      name: Tuyên bố về công thức dinh dưỡng
      description: 'Nêu bật các thuộc tính hoặc loại trừ chính của công thức liên
        quan đến dinh dưỡng cho ngựa (ví dụ: Không chứa ngũ cốc, Ít tinh bột, Hữu
        cơ).'
    dinosaur_playset_scale_figure_size_class:
      name: Tỷ lệ/kích thước mô hình khủng long trong bộ đồ chơi
      description: Mô tả tỷ lệ chung của các loài khủng long/mô hình đi kèm để đảm
        bảo tính tương thích với các bộ đồ chơi khác.
    dinosaur_species_included:
      name: Các loài khủng long có trong bộ đồ chơi
      description: Xác định các loài khủng long được thể hiện trong bộ đồ chơi (mô
        hình hoặc khủng long đúc).
    dipsy_diver_size_designation:
      name: Kích thước dụng cụ lặn Dipsy
      description: Cho biết mã kích thước do nhà sản xuất quy định cho dụng cụ lặn
        câu cá, tương ứng với trọng lượng và độ sâu lặn.
    disc_brake_rotor_mount_type:
      name: Loại ngàm gắn đĩa phanh
      description: 'Xác định cách gắn đĩa phanh vào trục bánh xe (ví dụ: 6 bu lông,
        Khóa Trung tâm).'
    disc_lock_accessories_included:
      name: Phụ kiện khóa đĩa đi kèm
      description: Chỉ định các vật dụng bổ sung được đóng gói cùng với khóa đĩa xe
        đạp, chẳng hạn như dây nhắc nhở, túi đựng, giá đỡ hoặc pin.
    disco_ball_mirror_tile_material:
      name: Chất liệu các ô gương nhỏ trên quả cầu disco
      description: Chất liệu của các tấm phản quang trên quả cầu disco (nếu có).
    disco_ball_mirror_tile_size:
      name: Kích thước tấm gương quả cầu disco
      description: Kích thước gần đúng của từng tấm/hình vuông gương trên quả cầu
        disco.
    display_backlight_color:
      name: Màu đèn nền màn hình
      description: Màu đèn nền/ánh sáng của màn hình/mặt số hiển thị.
    disposable_compostable_claim:
      name: Tuyên bố dùng một lần/có thể phân hủy sinh học
      description: Cho biết sản phẩm có thể phân hủy sinh học, phân hủy thành phân
        bón hữu cơ, có thể tái chế hoặc không (nếu có).
    distillation_method:
      name: Phương pháp chưng cất
      description: Xác định phương pháp chưng cất hoặc loại thiết bị chưng cất được
        sử dụng để sản xuất rượu.
    distilled_water_intended_use:
      name: Mục đích sử dụng nước cất
      description: 'Xác định ứng dụng chính của nước cất (ví dụ: Uống, máy CPAP, máy
        tạo ẩm, bàn ủi hơi nước).'
    distress_transmission_frequency:
      name: Tần số truyền tín hiệu khẩn cấp
      description: Tần số/các tần số vô tuyến chính được sử dụng để cảnh báo khẩn
        cấp.
    distressing_level:
      name: Mức độ làm cũ
      description: Chỉ định mức độ mài mòn, rách hoặc sờn được cố ý áp dụng cho vải.
    distressing_style:
      name: Kiểu làm cũ
      description: Cho biết loại hoặc mức độ làm cũ trên quần jean, chẳng hạn như
        hiệu ứng rách hoặc bạc màu.
    distributor_advance_mechanism:
      name: Cơ chế điều chỉnh thời điểm đánh lửa của bộ phận phân phối
      description: Chỉ định loại cơ chế điều chỉnh thời điểm đánh lửa được sử dụng
        bởi bộ phận phân phối.
    distributor_cap_terminal_type:
      name: Loại đầu nối nắp bộ phận phân phối
      description: Chỉ định kiểu đầu nối nắp bộ phận phân phối.
    distributor_gear_material:
      name: Vật liệu bánh răng bộ phận phân phối
      description: Chỉ định vật liệu của bánh răng dẫn động bộ phận phân phối.
    distributor_ignition_type:
      name: Loại hệ thống đánh lửa của bộ phận phân phối
      description: Chỉ định xem bộ phận phân phối được thiết kế cho hệ thống điểm
        tiếp xúc, đánh lửa điện tử hoặc hệ thống kiểu HEI.
    distributor_kit_contents:
      name: Nội dung bộ dụng cụ phân phối
      description: 'Cho biết các thành phần được bao gồm trong bộ phân phối (ví dụ:
        nắp, rôto, mô-đun đánh lửa, gioăng/vòng chữ O, bánh răng truyền động, dây
        dẫn/đầu nối).'
    dive_computer_form_factor:
      name: Kiểu dáng máy tính lặn
      description: Chỉ định thiết kế vật lý hoặc phương pháp lắp đặt của máy tính
        lặn, chẳng hạn như gắn trên bảng điều khiển hoặc kiểu đồng hồ đeo tay.
    diving_mask_design:
      name: Thiết kế mặt nạ lặn
      description: Xác định kiểu dáng cấu trúc tổng thể của mặt nạ lặn, ảnh hưởng
        đến độ vừa vặn, tầm nhìn và mục đích sử dụng.
    divot_tool_prong_configuration:
      name: Cấu hình ngạnh dụng cụ sửa vết lõm
      description: Chỉ định số lượng và cách bố trí các ngạnh trên dụng cụ sửa vết
        lõm được sử dụng để sửa chữa hư hại trên mặt cỏ.
    divot_tool_style:
      name: Kiểu dụng cụ sửa vết lõm
      description: Xác định kiểu dáng cấu trúc hoặc kiểu triển khai tổng thể của dụng
        cụ sửa vết lõm, chẳng hạn như cố định, dạng dao gập/gập, đa năng hoặc phụ
        kiện kẹp vào mũ hoặc gậy.
    djembe_shell_construction:
      name: Cấu tạo vỏ trống Djembe
      description: Mô tả phương pháp cấu tạo vỏ/thân trống djembe.
    djembe_tuning_system:
      name: Hệ thống điều chỉnh âm thanh trống Djembe
      description: Chỉ định cách căng/điều chỉnh âm thanh trống djembe.
    dmx_output_connector_type:
      name: Loại đầu nối đầu ra DMX
      description: Định dạng đầu nối vật lý được sử dụng cho (các) cổng đầu ra DMX
        của bộ điều khiển.
    doctor_playset_items_included:
      name: Các vật dụng đi kèm trong bộ đồ chơi bác sĩ
      description: 'Chỉ định các dụng cụ y tế giả và phụ kiện nhập vai đi kèm trong
        bộ đồ chơi bác sĩ (ví dụ: ống nghe, ống tiêm, búa phản xạ).'
    doctor_playset_role_play_setting:
      name: Bộ đồ chơi nhập vai bác sĩ
      description: Xác định bối cảnh nhập vai chính mà bộ đồ chơi bác sĩ thể hiện.
    doctor_playset_wearable_items_included:
      name: Các phụ kiện có thể mặc/đeo đi kèm trong bộ đồ chơi bác sĩ
      description: Cho biết các thành phần trang phục có thể mặc được đi kèm với bộ
        đồ chơi.
    doll_accessory_type:
      name: Loại phụ kiện búp bê
      description: 'Xác định loại phụ kiện búp bê hoặc mô hình hành động mà sản phẩm
        là (ví dụ: quần áo, giày dép, đồ nội thất, giá trưng bày), cho phép người
        mua sắm duyệt và lọc trong danh mục phụ kiện này.'
    doll_eye_type:
      name: Loại mắt búp bê
      description: 'Chỉ định kiểu cấu tạo của mắt búp bê (ví dụ: acrylic gắn liền,
        sơn, đèn LED phát sáng).'
    doll_hair_fiber_type:
      name: Loại sợi tóc búp bê
      description: Loại tóc/sợi được sử dụng trên búp bê (hoặc không có), ảnh hưởng
        đến tính chân thực, kiểu dáng và cách chăm sóc.
    doll_making_kit_components_included:
      name: Các thành phần đi kèm trong bộ dụng cụ làm búp bê
      description: Liệt kê các vật liệu và dụng cụ chính có trong bộ dụng cụ làm búp
        bê để người mua sắm có thể so sánh các gói sản phẩm và biết những gì họ cần
        tự chuẩn bị.
    dollhouse_installation_placement_type:
      name: Kiểu lắp đặt/đặt nhà búp bê
      description: 'Cách nhà búp bê được thiết kế để sử dụng hoặc đặt (ví dụ: để bàn
        so với đặt trên sàn so với treo tường).'
    dollhouse_items_included:
      name: Các sản phẩm nhà búp bê đi kèm
      description: Xác định những gì có trong hộp cùng với nhà búp bê (đồ nội thất,
        búp bê, phụ kiện).
    dollhouse_lighting_type:
      name: Loại đèn nhà búp bê
      description: Loại đèn được tích hợp hoặc hỗ trợ bởi nhà búp bê.
    dollhouse_room_type:
      name: Loại phòng nhà búp bê
      description: Xác định phòng/khu vực dự định trong nhà búp bê nơi phụ kiện thường
        được sử dụng.
    dollhouse_scale:
      name: Tỷ lệ nhà búp bê
      description: 'Tỷ lệ thu nhỏ của nhà búp bê hoặc phụ kiện nhà búp bê (ví dụ:
        1:12) để đảm bảo tính tương thích giữa các ngôi nhà, đồ nội thất và hình nhân.'
    dollhouse_style_theme:
      name: Phong cách/chủ đề nhà búp bê
      description: 'Phong cách hoặc chủ đề tổng thể của nhà búp bê để tham khảo và
        tặng quà (ví dụ: hiện đại so với thời Victoria).'
    donnos_playing_technique:
      name: Cách chơi Donnos
      description: Cách chơi/vận hành Donnos (chỉ bằng tay so với bằng gậy/cần gõ),
        để phù hợp với kỳ vọng của người mua và các phụ kiện đi kèm.
    donnos_tuning_system:
      name: Hệ thống chỉnh âm của trống Donnos
      description: 'Phương pháp chính được sử dụng để điều chỉnh hoặc thay đổi cao
        độ (ví dụ: dây căng/cơ chế bóp).'
    door_assembly_type:
      name: Kiểu lắp ráp cửa
      description: 'Cho biết những gì được bao gồm: chỉ vỏ cửa, lớp vỏ cửa hoặc bộ
        cửa hoàn chỉnh.'
    door_closure_mechanism:
      name: Cơ chế đóng cửa
      description: 'Xác định cơ chế điều khiển hoạt động đóng cửa (ví dụ: đóng nhẹ
        nhàng, chốt từ).'
    door_handle_components_included:
      name: Các bộ phận tay nắm cửa đi kèm
      description: 'Cho biết các bộ phận chính nào được bao gồm trong tay nắm cửa
        (ví dụ: xi lanh khóa, gioăng/vòng đệm, nắp trang trí, trang thiết bị lắp đặt,
        dây dẫn, chốt/bộ truyền động).'
    door_handle_operation:
      name: Hoạt động của tay nắm cửa
      description: 'Chỉ định kiểu truyền động/vận hành chính của cụm tay nắm cửa xe
        (ví dụ: liên kết cơ khí, xi lanh khóa, cảm ứng/nút bấm không cần chìa khóa,
        bật ra bằng điện).'
    door_lock_knob_attachment_method:
      name: Phương pháp gắn núm khóa cửa
      description: 'Chỉ định cách núm khóa cửa được gắn vào thanh khóa (ví dụ: ren,
        ấn vào).'
    door_lock_position:
      name: Vị trí khóa cửa
      description: Chỉ định vị trí cửa/mở nào mà khóa cửa hoặc bộ phận khóa cửa được
        thiết kế để phù hợp trên xe.
    door_seal_feature_set:
      name: Bộ tính năng gioăng cửa
      description: Các tính năng chức năng của gioăng cửa.
    door_seal_material_type:
      name: Loại vật liệu gioăng cửa
      description: Nhóm vật liệu/chất đàn hồi chính được sử dụng cho gioăng cửa (ngoài
        vật liệu thông dụng).
    door_seal_product_form:
      name: Hình thức sản phẩm gioăng cửa
      description: Cho biết hình thức bán hàng/đóng gói của gioăng cửa.
    door_window_operation:
      name: Cơ chế hoạt động của cửa sổ xe/cửa ra vào
      description: Xác định xem hệ thống cửa sổ của cửa có được thiết kế để vận hành
        bằng tay hay bằng điện, hoặc cửa không có cửa sổ.
    double_decker_bus_deck_configuration:
      name: Cấu hình sàn xe buýt hai tầng
      description: Xác định cấu hình lối lên xuống/mái của xe buýt hai tầng.
    double_drum_pedal_linkage_medium:
      name: Phương tiện liên kết bàn đạp trống kép
      description: 'Xác định phương tiện được sử dụng để liên kết bàn đạp phụ với
        bàn đạp chính (ví dụ: trục truyền động, xích, dây đai).'
    double_end_bag_core_type:
      name: Loại lõi túi hai đầu
      description: Xác định cấu trúc lõi gõ bên trong, quyết định tốc độ bật lại,
        cảm giác và yêu cầu bảo trì.
    double_pointed_needle_point_style:
      name: Kiểu đầu kim hai đầu
      description: Mô tả độ sắc/hình dạng đầu kim dành cho các loại sợi và kiểu đan
        khác nhau.
    dough_extruder_accessories_included:
      name: Phụ kiện máy ép bột đi kèm
      description: Các bộ phận bổ sung đi kèm với máy ép bột.
    dough_extruder_operation_type:
      name: Loại hoạt động của máy ép bột
      description: Cách bột được đẩy qua máy ép để tạo hình.
    dough_extruder_shape_disc_included:
      name: Đĩa tạo hình bột đi kèm
      description: Hình dạng mà máy ép có thể tạo ra thông qua các đĩa/vòi phun đi
        kèm.
    dough_format:
      name: Trạng thái khối bột nhào
      description: 'Xác định hình dạng/hình thức vật lý của bột bên trong bao bì (ví
        dụ: hình cầu, tấm, hình tròn, sợi vụn).'
    doumbek_accessories_included:
      name: Phụ kiện đi kèm của trống Doumbek
      description: 'Phụ kiện đi kèm với trống doumbek (ví dụ: khóa chỉnh dây, hộp
        đựng).'
    doumbek_head_material:
      name: Chất liệu mặt trống Doumbek
      description: Chất liệu của mặt trống (màng) trên trống doumbek.
    doumbek_head_type:
      name: Loại mặt trống doumbek
      description: Cấu tạo/loại mặt trống doumbek (cách màng được làm hoặc lắp đặt).
    doumbek_playing_style_technique:
      name: Phong cách/kỹ thuật chơi trống doumbek
      description: Bối cảnh/phong cách chơi dự định thường được liên kết với trống
        doumbek.
    doumbek_tuning_system:
      name: Hệ thống chỉnh âm của trống Doumbek
      description: Cách căng/chỉnh dây trống doumbek (hoặc nếu nó không thể chỉnh
        được).
    dowel_end_style:
      name: Kiểu đầu chốt gỗ
      description: Mô tả hình dạng/cắt của đầu chốt gỗ, ảnh hưởng đến độ dễ lắp đặt,
        an toàn và mục đích sử dụng.
    dowel_surface_texture:
      name: Kết cấu bề mặt của thanh chốt gỗ
      description: Mô tả tình trạng bề mặt của chốt gỗ, chẳng hạn như nhẵn hoặc có
        rãnh, ảnh hưởng đến hình thức và độ bám dính của keo.
    drafting_compass_adjustment_mechanism:
      name: Cơ chế điều chỉnh compa vẽ kỹ thuật
      description: Cơ chế điều chỉnh tinh chính được sử dụng để thiết lập bán kính
        chính xác.
    drafting_compass_fine_adjustment_mechanism:
      name: Cơ chế điều chỉnh tinh của compa vẽ kỹ thuật
      description: Loại điều chỉnh tinh được sử dụng để thiết lập bán kính chính xác
        (nếu có).
    drafting_compass_lead_holder_type:
      name: Loại giá đỡ ngòi compa vẽ kỹ thuật
      description: Loại giá đỡ/lõi vẽ được bao gồm hoặc hỗ trợ bởi compa.
    drag_system_material:
      name: Vật liệu hệ thống hãm
      description: Xác định vật liệu hoặc công nghệ được sử dụng trong bộ hãm, ảnh
        hưởng đến khả năng chịu nhiệt và độ mượt mà.
    drag_system_type:
      name: Loại hệ thống hãm dây
      description: Xác định kiểu cơ chế hãm được sử dụng trong máy câu, chẳng hạn
        như hãm trước, hãm sau, hãm cần gạt, hãm sao, hãm từ tính hoặc hãm đĩa.
    drag_type:
      name: Loại hãm
      description: Chỉ định kiểu cơ chế hãm được sử dụng bởi máy câu (vị trí hoặc
        phương pháp kích hoạt).
    drawer_features:
      name: Đặc điểm ngăn kéo
      description: 'Chi tiết các yếu tố cấu tạo hoặc chức năng đặc biệt của ngăn kéo
        (ví dụ: đóng êm, lót nỉ).'
    drawer_slide_type:
      name: Loại ray trượt ngăn kéo
      description: 'Xác định kiểu lắp đặt và kéo dài của ray trượt ngăn kéo (ví dụ:
        lắp đặt dưới đáy, kéo dài toàn bộ).'
    drawing_ink_compatible_tools:
      name: Dụng cụ tương thích với mực vẽ
      description: 'Xác định các dụng cụ ứng dụng mà mực vẽ được thiết kế cho (ví
        dụ: bút chấm mực so với cọ vẽ).'
    drawing_ink_permanence:
      name: Độ bền của mực vẽ
      description: Cho biết các đặc tính về độ bền quan trọng đối với tác phẩm nghệ
        thuật hoàn thiện và sao chép.
    dress_embellishment:
      name: Trang trí váy
      description: Làm nổi bật các yếu tố trang trí nổi bật được kết hợp vào thiết
        kế váy.
    dress_train_type:
      name: Kiểu đuôi váy
      description: Cho biết sự hiện diện và độ dài/kiểu dáng của đuôi váy, cho biết
        mức độ trang trọng và sự phù hợp với địa điểm.
    dried_surface_finish:
      name: Lớp phủ bề mặt sau khi khô
      description: Mô tả bề mặt điển hình sau khi khô (độ bóng/kết cấu).
    drink_tube_insulation:
      name: Cách nhiệt ống dẫn nước uống
      description: Cho biết ống dẫn nước uống có bao gồm lớp cách nhiệt hoặc ống bọc
        nhiệt để giữ cho chất lỏng không bị nóng hoặc đóng băng hay không.
    drive_band_cross_section_shape:
      name: Hình dạng mặt cắt ngang của dây đai truyền động
      description: Hình dạng mặt cắt ngang của dây đai truyền động (tròn, phẳng, v.v.).
    drive_band_join_type:
      name: Kiểu nối dây đai truyền động
      description: Cách nối/cấu tạo dây đai truyền động (liền mạch so với cần buộc,
        v.v.).
    drive_band_material_type:
      name: Loại chất liệu dây đai truyền động
      description: Xác định vật liệu/loại dây đai truyền động được sử dụng trên máy
        kéo sợi.
    drive_location:
      name: Vị trí truyền động
      description: Xác định vị trí của bánh đà/cơ cấu truyền động trên máy tập elip,
        ảnh hưởng đến diện tích tiếp xúc và cảm giác chuyển động.
    drive_mechanism:
      name: Cơ cấu truyền động
      description: Xác định loại hệ thống truyền động được sử dụng để truyền lực từ
        bàn đạp đến bánh đà.
    drive_shaft_material:
      name: Vật liệu trục truyền động
      description: Chỉ định vật liệu cấu tạo chính của ống trục truyền động hoặc toàn
        bộ cụm trục.
    drive_system:
      name: Hệ thống truyền động
      description: Chỉ định cơ chế truyền lực đạp đến hệ thống lực cản.
    drivetrain_configuration:
      name: Cấu hình hệ thống truyền động
      description: Chỉ định cấu hình hệ thống truyền động trên xe đạp, cho biết liệu
        trục sau là cố định, một tốc độ tự do hay hai tốc độ.
    drivetrain_speed_compatibility:
      name: Khả năng tương thích tốc độ hệ thống truyền động
      description: Liệt kê các tốc độ líp mà đĩa xích được thiết kế để hoạt động,
        đảm bảo hình dạng và khoảng cách răng phù hợp.
    drone_positioning_system:
      name: Hệ thống định vị máy bay không người lái
      description: Công nghệ định vị/giữ tích hợp được máy bay không người lái hỗ
        trợ để điều hướng và bay lơ lửng ổn định.
    drone_transmission_type:
      name: Loại truyền dẫn máy bay không người lái
      description: Phương pháp chính được sử dụng để điều khiển và/hoặc liên kết video
        giữa máy bay không người lái và bộ điều khiển/thiết bị.
    drop_spindle_whorl_position:
      name: Vị trí vòng răng trục chính
      description: Vị trí của vòng răng trên trục.
    drum_carder_accessories_included:
      name: Phụ kiện đi kèm của máy chải thô dạng trống
      description: Các mục thường đi kèm với bộ dụng cụ chải trống.
    drum_clamp_locking_mechanism:
      name: Cơ chế khóa kẹp trống
      description: 'Chỉ định cách kẹp khóa/siết chặt vào ống/vòng (ví dụ: bu lông
        cánh, bu lông khóa trống, khóa nhanh).'
    drum_clamp_mount_interface:
      name: Giao diện kẹp trống
      description: 'Xác định những gì kẹp cung cấp để gắn các phụ kiện (ví dụ: bộ
        phận tiếp nhận thanh chữ L, khớp cầu, bộ điều chỉnh độ nghiêng chũm chọe).'
    drum_clamp_type:
      name: Loại kẹp trống
      description: 'Xác định kiểu kẹp chức năng được sử dụng trong trang thiết bị
        gắn bộ trống (ví dụ: kẹp vành so với kẹp giá/ống).'
    drum_head_application_batter_resonant:
      name: Ứng dụng mặt trống (mặt đánh/mặt cộng hưởng)
      description: Xác định mặt/vai trò mà mặt trống được thiết kế cho trên trống
        (mặt chơi phía trên so với mặt cộng hưởng/mặt snare phía dưới).
    drum_head_collar_type:
      name: Loại cổ mặt trống
      description: Xác định xem mặt trống có cổ tiêu chuẩn, cổ thấp hoặc cấu hình
        cổ đặc biệt để phù hợp với các cạnh/vỏ trống nhất định.
    drum_head_damping_control:
      name: Kiểm soát giảm chấn mặt trống
      description: Các tính năng kiểm soát âm bội tích hợp hoặc kiểu giảm chấn được
        bao gồm trong thiết kế mặt trống.
    drum_head_film_material:
      name: Vật liệu màng mặt trống
      description: Vật liệu chính của màng mặt trống (thường là PET/Mylar, nhưng có
        thể bao gồm các vật liệu đặc biệt).
    drum_head_hoop_collar_type:
      name: Loại vành giữ mặt trống
      description: 'Xác định cấu tạo vành và vòng cổ của mặt trống (ví dụ: hình dạng
        vòng cổ và chất liệu vành), có thể ảnh hưởng đến độ vừa vặn và độ ổn định
        khi điều chỉnh trên một số loại vỏ và vành trống nhất định.'
    drum_head_hoop_rim_material:
      name: Chất liệu vành/vòng mặt trống
      description: Chất liệu của vành/vòng bên trong mặt trống (vòng được nhúng bên
        trong mặt trống), có thể ảnh hưởng đến độ bền và độ ổn định khi điều chỉnh.
    drum_head_included:
      name: Mặt trống đi kèm
      description: Cho biết liệu mặt trống đánh và/hoặc mặt trống cộng hưởng có được
        bao gồm cùng với trống hay không.
    drum_head_muffling_feature:
      name: Tính năng tiêu âm của mặt trống
      description: Các tính năng kiểm soát âm bội được tích hợp vào mặt trống.
    drum_head_muffling_type:
      name: Loại giảm âm mặt trống
      description: Cho biết liệu mặt trống có bao gồm các yếu tố kiểm soát/giảm âm
        bội tích hợp hay không.
    drum_head_ply_count:
      name: Số lớp màng mặt trống
      description: 'Số lớp màng được sử dụng trong cấu tạo mặt trống (ví dụ: 1 lớp,
        2 lớp).'
    drum_head_position:
      name: Vị trí mặt trống
      description: Cho biết liệu mặt trống được thiết kế để làm mặt trống đánh (mặt
        trên/đánh), mặt trống cộng hưởng (mặt dưới), mặt trống snare (mặt dưới) hay
        có thể được sử dụng theo cả hai cách.
    drum_head_reinforcement_type:
      name: Loại gia cố mặt trống
      description: Xác định xem mặt trống snare có bao gồm các tính năng gia cố như
        chấm trung tâm hoặc vòng điều khiển để tăng độ bền và tập trung âm thanh hay
        không.
    drum_head_surface_finish:
      name: Lớp phủ bề mặt của mặt trống
      description: Kết cấu/lớp hoàn thiện bề mặt của mặt trống ảnh hưởng đến độ nhạy
        khi đánh và phản hồi khi dùng chổi.
    drum_head_type:
      name: Loại mặt trống
      description: Xác định cấu trúc/loại mặt trống được sử dụng (chủ yếu dành cho
        mặt trống đánh/cộng hưởng như được cung cấp).
    drum_key_design_type:
      name: Kiểu thiết kế của khóa chỉnh trống
      description: 'Mô tả thiết kế chức năng của khóa căng trống (ví dụ: tiêu chuẩn,
        kiểu bánh răng, tay cầm chữ T).'
    drum_key_drive_type:
      name: Loại truyền động khóa trống
      description: Xác định kiểu truyền động/giao diện của khóa trống được sử dụng
        để khớp với cần căng hoặc trang thiết bị lắp đặt.
    drum_key_handle_style:
      name: Kiểu tay cầm khóa trống
      description: Mô tả kiểu tay cầm/thiết kế công thái học của khóa trống, ảnh hưởng
        đến sự thoải mái và lực đòn bẩy trong quá trình điều chỉnh.
    drum_kit_included_items:
      name: Các mặt hàng đi kèm bộ trống
      description: 'Liệt kê các mặt hàng chính được bao gồm trong bộ trống ngoài vỏ/miếng
        đệm (ví dụ: trang thiết bị, chũm chọe, ghế).'
    drum_kit_portability:
      name: Tính di động của bộ trống
      description: 'Cho biết bộ trống có được thiết kế để cất giữ/vận chuyển gọn nhẹ
        hay không (ví dụ: du lịch/gọn nhẹ/gấp gọn).'
    drum_kit_shell_construction_features:
      name: Đặc điểm cấu tạo vỏ trống
      description: Cách cấu tạo vỏ trống (số lớp/loại), ảnh hưởng đến âm thanh và
        độ bền.
    drum_mount_clamp_type:
      name: Loại kẹp gắn trống
      description: Mô tả kiểu dáng kẹp được sử dụng trong trang thiết bị gắn trống.
    drum_multi_clamp_clamp_type:
      name: Loại kẹp đa năng của trống
      description: Kiểu dáng/cấu hình chức năng của kẹp đa năng (cách kẹp và kết nối).
    drum_mute_material:
      name: Chất liệu giảm âm trống
      description: Chỉ định chất liệu chính của bộ giảm âm trống tiếp xúc với mặt
        trống và/hoặc làm giảm rung động.
    drum_pad_triggering_zones:
      name: Vùng kích hoạt mặt trống
      description: 'Cho biết số lượng/loại vùng kích hoạt được hỗ trợ bởi mặt trống
        tom (ví dụ: chỉ mặt trống so với mặt trống + vành trống), điều này ảnh hưởng
        đến khả năng biểu cảm và khả năng tương thích với mô-đun.'
    drum_pedal_accessories_included:
      name: Phụ kiện đi kèm của bàn đạp trống
      description: Liệt kê các phụ kiện và linh kiện chính được đóng gói cùng với
        bàn đạp trống.
    drum_pedal_baseplate_type:
      name: Loại đế bàn đạp trống
      description: Cho biết bàn đạp sử dụng đế hay thiết kế nổi/không khung.
    drum_pedal_bearing_type:
      name: Loại ổ trục bàn đạp trống
      description: 'Chỉ định cơ chế ổ trục được sử dụng tại các điểm trục chính (ví
        dụ: cần lắc, gót, cam).'
    drum_pedal_cam_type:
      name: Loại cam của bàn đạp trống
      description: 'Chỉ định hình dạng/hình học của cam bàn đạp trống ảnh hưởng đến
        cảm giác và phản hồi (ví dụ: tuyến tính so với gia tốc).'
    drum_pedal_chain_configuration:
      name: Cấu hình xích bàn đạp trống
      description: 'Chỉ định cách bố trí xích được sử dụng bởi bàn đạp trống truyền
        động bằng xích (ví dụ: xích đơn, xích đôi hoặc xích lệch).'
    drum_pedal_chain_type:
      name: Loại xích của bàn đạp trống
      description: 'Cho biết kiểu xích được sử dụng trong hệ thống truyền động (ví
        dụ: xích con lăn so với xích kiểu xe đạp), điều này có thể ảnh hưởng đến độ
        mượt mà và độ bền.'
    drum_pedal_clamp_type:
      name: Loại kẹp bàn đạp trống
      description: Chỉ định cách bàn đạp gắn vào vành trống bass.
    drum_pedal_intended_use:
      name: Mục đích sử dụng bàn đạp trống
      description: Cho biết bối cảnh chơi chính mà bàn đạp truyền động bằng dây đai
        được thiết kế/tiếp thị.
    drum_pedal_spring_adjustment_method:
      name: Phương pháp điều chỉnh lò xo bàn đạp trống
      description: Cho biết cách điều chỉnh độ căng của lò xo trên bàn đạp.
    drum_pedal_spring_type:
      name: Loại lò xo của bàn đạp trống
      description: Chỉ định cơ chế lò xo được sử dụng cho hoạt động trả bàn đạp.
    drum_shell_material:
      name: Chất liệu vỏ trống
      description: 'Chỉ định vật liệu cấu tạo vỏ chính cho trống acoustic (ví dụ:
        gỗ phong, gỗ bạch dương, acrylic).'
    drum_shell_wood_species:
      name: Loại gỗ vỏ trống
      description: Xác định loại gỗ được sử dụng cho vỏ trống, ảnh hưởng đến âm sắc
        và độ vang.
    drumhead_type:
      name: Loại mặt trống
      description: Cấu hình/loại mặt trống được sử dụng trên trống bát giác.
    drumstick_model:
      name: Mẫu dùi trống
      description: 'Ký hiệu mẫu/kích thước dùi trống tiêu chuẩn được nhiều thương
        hiệu sử dụng (ví dụ: 5A, 7A).'
    drumstick_taper:
      name: Độ côn của dùi trống
      description: Mô tả hình dạng côn từ thân đến đầu, ảnh hưởng đến độ nảy và độ
        cân bằng.
    drysuit_footwear_style:
      name: Kiểu giày của bộ đồ lặn khô
      description: 'Mô tả phần hoàn thiện tích hợp ở phần chân dưới của bộ đồ lặn
        khô (ví dụ: ủng liền thân, tất neoprene, tất chân hoặc bịt kín mắt cá chân).'
    dumbbell_style:
      name: Kiểu tạ tay
      description: Xác định thiết kế cơ bản của tạ tay—cho dù đó là một khối cố định,
        một hệ thống điều chỉnh được hay một kiểu tay cầm có thể điều chỉnh trọng
        lượng—điều này ảnh hưởng mạnh mẽ đến quyết định mua hàng và các trường hợp
        sử dụng trong tập luyện.
    dundun_playing_position:
      name: Vị trí chơi Dundun
      description: Vị trí chơi/mang trống dự định.
    dye_status:
      name: Tình trạng nhuộm màu
      description: Cho biết liệu sợi có được nhuộm, không nhuộm/tự nhiên, hay bao
        gồm nhiều màu/pha trộn.
    dye_style:
      name: Kiểu nhuộm màu
      description: Chỉ định xem màu sợi là màu đơn sắc, nhiều màu, hay được nhuộm
        theo kiểu đặc biệt khác.
    dye_technique:
      name: Kỹ thuật nhuộm
      description: 'Phương pháp được sử dụng để tạo màu cho sợi (ví dụ: nhuộm thủ
        công, nhuộm bằng nồi, nhuộm loang).'
    dye_type_needlecraft_fabric:
      name: Loại thuốc nhuộm (vải thêu)
      description: Cho biết vải lanh là màu trơn, nhuộm thủ công hay nhuộm đặc biệt.
    dyeing_color_processing:
      name: Quá trình nhuộm/xử lý màu
      description: 'Mô tả liệu sợi có được nhuộm màu hay không và cách thức nhuộm
        (ví dụ: không nhuộm, tẩy trắng/trắng, hoặc các kỹ thuật nhuộm cụ thể).'
    e_bike_certification_class:
      name: Chứng nhận hạng xe đạp điện
      description: 'Chỉ định xếp hạng tốc độ chính thức của lốp xe đạp điện (ví dụ:
        E-25, E-50).'
    e_bike_speed_rating:
      name: Xếp hạng tốc độ xe đạp điện
      description: 'Nêu rõ mức chứng nhận xe đạp điện chính thức cho lốp xe (ví dụ:
        E25 cho ≤25 km/h, E50 cho ≤50 km/h).'
    e_scooter_connector_type:
      name: Loại đầu nối xe tay ga điện
      description: Xác định kiểu đầu nối hoặc phích cắm điện được sử dụng bởi bộ phận
        để kết nối nguồn điện hoặc tín hiệu.
    e_scooter_throttle_type:
      name: Loại tay ga xe điện
      description: Xác định loại tay ga được sử dụng để điều khiển gia tốc trên xe
        điện.
    ear_coverage:
      name: Che tai
      description: Xác định xem mũ bảo hiểm có bao gồm bộ phận bảo vệ tai hay không
        và liệu bộ phận này có thể tháo rời được hay không.
    ear_coverage_style:
      name: Kiểu dáng độ che phủ tai
      description: Mô tả cách thức, hoặc liệu, tai có được che bởi mặt nạ chống ruồi
        hay không.
    ear_coverage_type:
      name: Loại che tai
      description: Xác định cách mũ che hoặc bảo vệ tai, bao gồm sự hiện diện và kiểu
        dáng của vành tai.
    ear_guard_type:
      name: Loại bảo vệ tai
      description: Mô tả kiểu dáng bảo vệ tai được tích hợp vào mũ, chẳng hạn như
        nhựa cứng, có đệm hoặc bảo vệ có thể tháo rời.
    earmuff_style:
      name: Kiểu chụp tai
      description: 'Xác định cách đeo chụp tai hoặc kiểu thiết kế cấu trúc của nó
        (ví dụ: đeo qua đầu hoặc quấn quanh phía sau đầu).'
    earring_closure_type:
      name: Loại khuy cài khuyên tai
      description: 'Xác định cơ chế được sử dụng để cố định khuyên tai vào tai (ví
        dụ: đẩy vào, cần gạt, kẹp).'
    easel_art_desk_features:
      name: Các tính năng của giá vẽ & bàn vẽ
      description: Nêu bật các tính năng chức năng phổ biến đi kèm với giá vẽ hoặc
        bàn vẽ.
    easel_art_desk_surface_type:
      name: Loại bề mặt giá vẽ & bàn vẽ
      description: 'Xác định bề mặt vẽ/viết có thể sử dụng được (ví dụ: bảng đen,
        bảng trắng, cuộn giấy, bảng từ).'
    eb_clarinet_body_type:
      name: Loại thân kèn clarinet giọng Mi giáng
      description: Chỉ rõ mẫu mã kèn clarinet Eb là loại soprano hay alto.
    eco_material_type:
      name: Loại vật liệu thân thiện với môi trường
      description: Nêu bật công nghệ vật liệu hoặc bọt xốp thân thiện với môi trường
        được sử dụng trong miếng đệm.
    edge_construction:
      name: Cấu trúc mép viền
      description: Cho biết ván trượt tuyết có cạnh kim loại dọc theo toàn bộ, một
        phần hoặc không có cạnh nào.
    edge_tuner_type:
      name: Loại dụng cụ mài cạnh
      description: Phân loại kiểu dụng cụ mài cạnh ván trượt tuyết, chẳng hạn như
        dụng cụ mài bằng dũa hoặc máy mài điện.
    edible_plant_part:
      name: Bộ phận thực vật ăn được
      description: Cho biết bộ phận nào của cây được bán để tiêu thụ.
    educational_guide_included:
      name: Tài liệu hướng dẫn giáo dục đi kèm
      description: Cho biết những tài liệu học tập nào được bao gồm trong mô hình.
    educational_topic:
      name: Chủ đề giáo dục
      description: Chủ đề học tập chính được hỗ trợ bởi nội dung giáo dục của trang
        trại kiến.
    egg_component:
      name: Thành phần trứng
      description: Xác định bộ phận nào của trứng mà sản phẩm chứa, chẳng hạn như
        trứng nguyên quả, chỉ lòng trắng, lòng đỏ hoặc hỗn hợp/chất thay thế.
    egg_component_replaced:
      name: Thành phần trứng được thay thế
      description: 'Cho biết phần nào của trứng mà sản phẩm này nhằm thay thế (ví
        dụ: trứng nguyên quả, lòng trắng trứng).'
    egg_enrichment:
      name: Làm giàu trứng
      description: Cho biết bất kỳ chất bổ sung dinh dưỡng nào được thêm vào trứng,
        chẳng hạn như Omega-3 hoặc Vitamin D.
    egg_farming_method:
      name: Phương pháp chăn nuôi trứng
      description: 'Cho biết phương pháp sản xuất hoặc chăn nuôi được sử dụng cho
        trứng (ví dụ: không nhốt trong lồng, thả vườn, hữu cơ).'
    egg_grade:
      name: Cấp độ trứng
      description: Cho biết cấp chất lượng được các cơ quan quản lý hoặc ngành công
        nghiệp quy định.
    egg_processing_state:
      name: Tình trạng chế biến trứng
      description: 'Cho biết bất kỳ quy trình chế biến nào được áp dụng cho trứng
        trước khi bán (ví dụ: trứng tươi, trứng muối, trứng bách thảo).'
    egg_production_method:
      name: Phương pháp sản xuất trứng
      description: 'Chỉ định hệ thống chăn nuôi hoặc chuồng trại được sử dụng để sản
        xuất trứng (ví dụ: nuôi thả rông, nuôi thả trên đồng cỏ, hữu cơ).'
    egg_replacer_main_ingredient:
      name: Thành phần chính của chất thay thế trứng
      description: Cho biết thành phần cơ bản chính được sử dụng để sản xuất chất
        thay thế trứng, giúp người dùng đáp ứng nhu cầu ăn kiêng hoặc mong muốn về
        đặc tính làm bánh.
    egg_size:
      name: Kích cỡ trứng
      description: Phân loại trứng theo kích cỡ tiêu chuẩn trên thị trường.
    egg_source_animal:
      name: Động vật cung cấp trứng
      description: Chỉ rõ loài động vật đẻ trứng.
    egg_white_processing_method:
      name: Phương pháp chế biến lòng trắng trứng
      description: 'Cho biết cách lòng trắng trứng được chế biến sau khi thu hoạch
        (ví dụ: tiệt trùng, sấy phun), ảnh hưởng đến an toàn thực phẩm, thời hạn sử
        dụng và các trường hợp sử dụng.'
    eggplant_variety:
      name: Giống cà tím
      description: Chỉ định giống hoặc loại cà tím trên thị trường, cho phép người
        mua sắm lựa chọn các loại khác nhau về kích thước, hương vị, màu sắc và cách
        sử dụng trong nấu nướng.
    eggshell_color:
      name: Màu vỏ trứng
      description: Chỉ định màu vỏ chủ đạo của trứng.
    elastic_edge_finish_type:
      name: Kiểu/hoàn thiện mép thun
      description: Xác định cấu trúc mép của thun dệt, ảnh hưởng đến sự thoải mái
        và ứng dụng.
    elastic_intended_use:
      name: Mục đích sử dụng của thun
      description: Ứng dụng chính mà thun được thiết kế cho (giúp dễ dàng tìm kiếm
        và giảm sự không phù hợp).
    elastic_recovery_performance:
      name: Hiệu suất phục hồi của thun
      description: Mô tả khả năng thun dệt trở lại chiều dài ban đầu sau khi bị kéo
        giãn.
    elastic_recovery_quality:
      name: Chất lượng phục hồi của thun
      description: Cho biết khả năng phục hồi độ giãn của thun—khả năng trở lại chiều
        dài ban đầu sau khi bị kéo giãn.
    elastic_stretch_level:
      name: Mức độ giãn của thun
      description: Mức độ thun có thể giãn ra khi chịu lực căng (thường được biểu
        thị bằng mức độ tương đối khi không cung cấp phần trăm chính xác).
    elastic_structure:
      name: Cấu trúc của thun
      description: 'Xác định cấu trúc của thun khuy (ví dụ: dệt kim, dệt thoi, bện),
        có thể ảnh hưởng đến độ giãn, khả năng phục hồi và hiệu suất may.'
    elastic_type:
      name: Loại dây thun
      description: 'Xác định loại cấu trúc của thun (ví dụ: thun gấp mép (FOE), bện,
        dệt kim, dệt thoi).'
    electric_assist_type:
      name: Loại hỗ trợ điện
      description: Cho biết xe đạp có hỗ trợ động cơ hay không và loại hỗ trợ được
        cung cấp.
    electric_bicycle_motor_position:
      name: Vị trí động cơ xe đạp điện
      description: Vị trí của động cơ truyền động trên xe đạp điện, chẳng hạn như
        động cơ đặt giữa, trục trước, trục sau hoặc trục kép.
    electric_bike_class:
      name: Phân loại xe đạp điện
      description: Phân loại xe đạp điện theo các lớp quy định xác định giới hạn tốc
        độ và hỗ trợ ga.
    electric_guitar_bridge_type:
      name: Loại cầu đàn guitar điện
      description: Chỉ định loại cầu/hệ thống rung trên đàn guitar điện.
    electric_instrument_output_connection_type:
      name: Loại kết nối đầu ra nhạc cụ điện tử
      description: Chỉ định (các) kết nối đầu ra âm thanh vật lý được cung cấp trên
        đàn cello điện.
    electric_riding_vehicle_control_options:
      name: Các tùy chọn điều khiển xe điện
      description: 'Các tùy chọn điều khiển/vận hành dành cho người lái/phụ huynh
        (ví dụ: bàn đạp, vô lăng, điều khiển từ xa).'
    electric_spinning_wheel_speed_control_type:
      name: Loại điều khiển tốc độ bánh xe quay điện
      description: Mô tả cách người dùng điều chỉnh tốc độ quay trên bánh xe điện.
    electric_ukulele_output_jack_type:
      name: Loại giắc cắm đầu ra đàn ukulele điện
      description: Chỉ định đầu nối đầu ra vật lý được sử dụng bởi đàn ukulele điện.
    electric_van_body_length_class:
      name: Phân khúc chiều dài thân xe tải van điện
      description: Phân loại kích thước xe tải dựa trên chiều dài cơ sở/chiều dài
        tổng thể thường được sử dụng trong danh sách.
    electric_van_roof_height_class:
      name: Phân loại chiều cao nóc xe tải điện
      description: Phân loại chiều cao nóc xe thường được sử dụng cho xe tải (đặc
        biệt là xe tải chở hàng).
    electric_vehicle_drivetrain_layout:
      name: Sơ đồ bố trí hệ thống truyền động xe điện
      description: Cấu hình động cơ/trục mô tả số lượng động cơ và vị trí của chúng
        (ngoài các kiểu đơn giản như dẫn động bốn bánh/dẫn động cầu trước/dẫn động
        cầu sau).
    electric_winder_accessories_included:
      name: Phụ kiện máy cuốn dây điện đi kèm
      description: 'Liệt kê các phụ kiện đi kèm với máy cuốn dây điện (ví dụ: kẹp,
        bộ chuyển đổi).'
    electrical_connector_type:
      name: Loại đầu nối điện
      description: Chỉ định kiểu đầu nối được sử dụng bởi hệ thống khóa cửa để tích
        hợp điện (nếu có).
    electrical_system_voltage:
      name: Điện áp hệ thống điện
      description: Cho biết điện áp định mức của hệ thống điện xe mà bộ điều chỉnh
        được thiết kế.
    electronic_cymbal_trigger_zones:
      name: Vùng kích hoạt chũm chọe điện tử
      description: 'Chỉ định số lượng vùng kích hoạt độc lập mà miếng đệm chũm chọe
        cung cấp (ví dụ: thân/cạnh/chuông).'
    electronic_drum_module_audio_interface_functionality:
      name: Chức năng giao diện âm thanh của mô-đun trống điện tử
      description: Cho biết liệu mô-đun có thể hoạt động như một giao diện âm thanh
        USB để ghi/phát lại (ngoài MIDI) hay không.
    electronic_drum_module_metronome_features:
      name: Tính năng máy đếm nhịp của mô-đun trống điện tử
      description: Chỉ định các khả năng luyện tập/máy đếm nhịp tích hợp.
    electronic_drum_module_power_source:
      name: Nguồn điện của mô-đun trống điện tử
      description: Chỉ định nguồn điện cần thiết hoặc được hỗ trợ cho mô-đun điều
        khiển.
    electronic_drum_module_sample_import_support:
      name: Hỗ trợ nhập mẫu của mô-đun trống điện tử
      description: Cho biết liệu mô-đun có thể nhập mẫu người dùng hay không và bằng
        phương pháp nào.
    electronic_drum_pad_playing_surface_type:
      name: Loại bề mặt chơi của trống điện tử
      description: 'Mô tả cấu tạo bề mặt chơi của trống tom (ví dụ: mặt lưới so với
        mặt cao su), ảnh hưởng đến độ nảy, âm thanh và cảm giác.'
    electronic_features:
      name: Tính năng điện tử
      description: Cho biết các tính năng điện tử/tương tác được bao gồm trong mặt
        hàng (nếu có).
    electronic_lights_and_sound:
      name: Đèn và âm thanh điện tử
      description: 'Cho biết bộ đồ chơi nhà búp bê có bao gồm các tính năng đèn và/hoặc
        âm thanh điện tử hay không (ví dụ: đèn, chuông cửa, nhạc, hiệu ứng âm thanh).'
    electronics_power_source:
      name: Nguồn điện điện tử
      description: Chỉ định cách cấp nguồn cho các thiết bị điện tử đang hoạt động
        (nếu có).
    eligible_race_series:
      name: Giải đua đủ điều kiện
      description: Giải đua hoặc tổ chức quản lý mà xe đủ điều kiện tham gia.
    elliptical_trainer_part_type:
      name: Loại phụ tùng máy tập thể dục hình elip
      description: 'Phân loại loại phụ kiện hoặc phụ tùng thay thế cụ thể cho máy
        tập thể dục hình elip (ví dụ: dây đai, bảng điều khiển, bàn đạp) để người
        mua sắm có thể nhanh chóng lọc ra mặt hàng họ cần mà không cần phải điều hướng
        qua nhiều danh mục nhỏ.'
    embellishment_technique:
      name: Kỹ thuật trang trí
      description: Mô tả chi tiết công việc trang trí hoặc bề mặt chính được áp dụng
        cho trang phục, chẳng hạn như thêu, in hoặc đính hạt.
    embellishment_type:
      name: Loại trang trí
      description: Xác định loại yếu tố trang trí được áp dụng cho dây đeo tất, chẳng
        hạn như ren, nơ hoặc ngọc trai.
    embossing_pen_ink_color:
      name: Màu mực bút dập nổi
      description: Xác định màu mực được tạo ra bởi bút dập nổi (có thể trong suốt/dính
        hoặc có màu). Khác với màu bút/thân bút.
    embossing_stylus_tip_shape:
      name: Hình dạng đầu bút dập nổi
      description: 'Mô tả hình dạng của đầu bút dập nổi được sử dụng để tạo ra các
        hiệu ứng khác nhau (ví dụ: đầu tròn so với đầu nhọn).'
    embroidered_coverage_level:
      name: Mức độ phủ chỉ thêu
      description: Lượng chỉ thêu phủ trên bề mặt miếng vá.
    embroidered_patch_backing_type:
      name: Loại lớp lót miếng vá thêu
      description: Lớp lót/lớp hỗ trợ ở mặt sau của miếng vá thêu ảnh hưởng đến độ
        bền và cách thức dán.
    embroidery_hoop_type:
      name: Loại khung thêu
      description: Xác định kiểu cấu tạo của khung thêu và cơ chế căng chỉ chính.
    embroidery_machine_bobbin_type:
      name: Loại suốt chỉ máy thêu
      description: Loại/kiểu nạp suốt chỉ.
    emergency_lighting_configuration:
      name: Cấu hình đèn chiếu sáng khẩn cấp
      description: 'Xác định cấu hình đèn cảnh báo khẩn cấp chính được lắp đặt trên
        xe (ví dụ: đèn báo hiệu trên nóc xe, đèn lưới tản nhiệt).'
    emergency_lighting_package:
      name: Gói đèn chiếu sáng khẩn cấp
      description: Chỉ định các loại đèn cảnh báo khẩn cấp được lắp đặt.
    emissions_compliance_standard:
      name: Tiêu chuẩn tuân thủ khí thải
      description: Cho biết chứng nhận/tuân thủ khí thải của động cơ (nếu có).
    emissions_standard:
      name: Tiêu chuẩn khí thải
      description: Tiêu chuẩn tuân thủ khí thải cho xe (thay đổi theo khu vực và năm).
    enclosure_panel_configuration:
      name: Cấu hình tấm chắn thùng xe
      description: Xác định các tấm chắn hoặc mặt bên của thùng xe được bao gồm (cấu
        hình che phủ), chẳng hạn như thùng xe kín hoàn toàn, chỉ có rèm che bên hông
        hoặc thùng xe 3 mặt (mở trước/sau).
    enclosure_window_material:
      name: Vật liệu cửa sổ thùng xe
      description: Xác định vật liệu được sử dụng cho các tấm cửa sổ trong suốt của
        thùng xe.
    end_fitting_type:
      name: Loại khớp nối đầu
      description: Kiểu đầu nối được sử dụng ở mỗi đầu của thanh chống (phía xe và
        phía nắp), xác định khả năng tương thích lắp đặt.
    end_type:
      name: Loại đầu dây
      description: Xác định kiểu kết thúc/gắn ở các đầu dây kéo để kết nối với các
        điểm cứu hộ.
    ends_style_blocking_wires:
      name: Kiểu đầu dây (dây chặn)
      description: Cách hoàn thiện các đầu dây chặn để đảm bảo an toàn và dễ dàng
        luồn qua các cạnh dây buộc.
    enduro_bike_suspension_adjustability:
      name: Khả năng điều chỉnh hệ thống treo xe Enduro
      description: Cho biết các điều chỉnh hệ thống treo nào có sẵn (thường dành cho
        phuộc trước và giảm xóc sau).
    engine_bay_mounting_location:
      name: Vị trí lắp đặt trong khoang động cơ
      description: Vị trí dự kiến lắp đặt bình chứa nước làm mát trong khoang động
        cơ (vị trí tương đối).
    engine_bearing_coating:
      name: Lớp phủ bạc lót động cơ
      description: Chỉ định bất kỳ lớp phủ bề mặt nào trên ổ trục (để chống mài mòn,
        độ bám dính, giảm ma sát).
    engine_bearing_position:
      name: Vị trí ổ trục động cơ
      description: Chỉ định vị trí/chức năng của ổ trục trong động cơ.
    engine_bearing_size:
      name: Kích thước ổ trục động cơ
      description: Chỉ định xem ổ trục có kích thước tiêu chuẩn hay là biến thể nhỏ
        hơn/lớn hơn (thường liên quan đến việc mài trục khuỷu và khe hở).
    engine_configuration:
      name: Cấu hình động cơ
      description: 'Mô tả bố cục/cấu hình xi lanh của động cơ (ví dụ: thẳng hàng,
        chữ V, phẳng/boxer).'
    engine_cooling_type:
      name: Loại làm mát động cơ
      description: Chỉ định phương pháp làm mát của động cơ.
    engine_degreaser_form:
      name: Dạng chất tẩy dầu mỡ động cơ
      description: Dạng vật lý/hình thức phân phối của chất tẩy dầu mỡ động cơ.
    engine_degreaser_rinse_requirement:
      name: Yêu cầu rửa lại chất tẩy dầu mỡ động cơ
      description: Cho biết chất tẩy dầu mỡ có cần được rửa lại bằng nước sau khi
        sử dụng hay không.
    engine_mount_type:
      name: Loại giá đỡ động cơ
      description: 'Chỉ định thiết kế chức năng của giá đỡ động cơ (ví dụ: thủy lực,
        cứng, thanh chống momen xoắn).'
    engine_oil_formulation:
      name: Công thức dầu động cơ
      description: Cho biết trọng tâm công thức của dầu động cơ, chẳng hạn như sử
        dụng tiêu chuẩn, bảo dưỡng cho xe chạy nhiều km, chu kỳ thay dầu kéo dài hoặc
        ứng dụng cho đội xe/xe tải nặng.
    engine_oil_specification:
      name: Thông số kỹ thuật dầu động cơ
      description: 'Thông số kỹ thuật/tiêu chuẩn mà dầu đáp ứng (ví dụ: API SP, API
        SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).'
    engine_rebuild_kit_contents:
      name: Nội dung bộ dụng cụ đại tu động cơ
      description: Xác định các thành phần chính được bao gồm trong bộ dụng cụ đại
        tu động cơ.
    engine_rotation_direction:
      name: Hướng quay của động cơ
      description: Chỉ định hướng quay của động cơ được sử dụng trong các ứng dụng
        hàng hải.
    engine_timing_system_drive_type:
      name: Loại truyền động hệ thống định thời động cơ
      description: Cho biết hệ thống định thời của động cơ là truyền động bằng dây
        đai, truyền động bằng xích hay truyền động bằng bánh răng để đảm bảo tính
        tương thích.
    engine_valve_coating:
      name: Lớp phủ xupap động cơ
      description: Xác định bất kỳ phương pháp xử lý bề mặt hoặc lớp phủ nào được
        áp dụng cho van để chống mài mòn/chịu nhiệt.
    engine_valve_position:
      name: Vị trí van động cơ
      description: Chỉ định van động cơ dành cho phía nạp hay phía xả của động cơ.
    engine_valve_stem_tip_type:
      name: Loại đầu thân van động cơ
      description: Chỉ định kiểu dáng hoặc cấu tạo đầu thân van tại điểm tiếp xúc
        với cần đẩy hoặc bộ điều chỉnh.
    engine_valvetrain_type:
      name: Loại hệ thống van động cơ
      description: Sắp xếp hệ thống van/trục cam.
    enhancement_level:
      name: Mức độ tăng kích thước
      description: 'Mức tăng thể tích ước tính do miếng độn mang lại, được biểu thị
        bằng cỡ áo ngực: Nhẹ (lên đến 1 cỡ), Trung bình (1-2 cỡ), Đáng kể (2 cỡ trở
        lên).'
    entry_zipper_location:
      name: Vị trí khóa kéo
      description: 'Xác định vị trí khóa kéo chính hoặc đường mở của bộ đồ bơi (ví
        dụ: phía trước, phía sau, vai, chéo).'
    epee_point_type:
      name: Loại mũi kiếm Epee
      description: Xác định nhãn hiệu hoặc tiêu chuẩn của mũi kiếm được lắp trên lưỡi
        kiếm, điều này ảnh hưởng đến khả năng tương thích và bảo trì.
    equestrian_discipline:
      name: Môn cưỡi ngựa
      description: Xác định môn cưỡi ngựa mà chiếc cựa được thiết kế hoặc phù hợp
        nhất.
    equestrian_helmet_safety_certification:
      name: Chứng nhận an toàn mũ bảo hiểm cưỡi ngựa
      description: Xác định tiêu chuẩn an toàn hoặc chứng nhận mà mũ bảo hiểm tuân
        thủ.
    equine_application_area:
      name: Vùng áp dụng trên cơ thể ngựa
      description: 'Xác định vùng cơ thể hoặc chất liệu mà sản phẩm được thiết kế
        cho (ví dụ: móng guốc, bờm, yên cương).'
    equipment_contact_material_brew_wine:
      name: Vật liệu tiếp xúc của thiết bị (bia/rượu)
      description: 'Vật liệu chính của mặt hàng tiếp xúc với chất lỏng (ví dụ: thủy
        tinh, thép không gỉ, nhựa).'
    eu_children_clothing_size:
      name: Kích cỡ quần áo trẻ em EU
      description: 'Chỉ định kích cỡ quần áo trẻ em EU theo chiều cao, ví dụ: 104
        hoặc 140'
    eu_clothing_size:
      name: Kích cỡ quần áo EU
      description: 'Chỉ định kích cỡ quần áo EU, ví dụ: 38 hoặc 46'
    eu_cup_size:
      name: Kích cỡ cúp ngực EU
      description: 'Chỉ định kích cỡ cúp ngực EU, ví dụ: C hoặc E'
    eu_ring_size:
      name: Kích cỡ nhẫn EU
      description: 'Chỉ định kích cỡ nhẫn EU theo chu vi, ví dụ: 52 hoặc 63'
    eu_shoe_size:
      name: Kích cỡ giày EU
      description: 'Chỉ định kích cỡ giày EU, ví dụ: 42 hoặc Rộng 42'
    euphonium_included_accessories:
      name: Phụ kiện đi kèm kèn euphonium
      description: 'Liệt kê các vật dụng thường được bán kèm với kèn euphonium (ví
        dụ: ống ngậm, hộp đựng).'
    euphonium_valve_configuration:
      name: Cấu hình van kèn euphonium
      description: Chỉ định số lượng van và liệu van thứ 4 được vận hành bằng tay
        hay bằng cơ chế tác động bên hông.
    european_sword_historical_period:
      name: Thời kỳ lịch sử kiếm châu Âu
      description: Thời kỳ lịch sử chính mà mẫu/bản sao kiếm dựa trên (hoặc thời đại
        của bản gốc).
    european_sword_pattern_type:
      name: Mẫu/kiểu kiếm châu Âu
      description: Mẫu/kiểu kiếm châu Âu cụ thể (phân loại) được thể hiện bởi thanh
        kiếm sưu tầm.
    ev_connector_adapter_direction:
      name: Hướng kết nối/bộ chuyển đổi EV
      description: Xác định bộ chuyển đổi chuyển đổi TỪ và ĐẾN (phía đầu vào của xe
        so với phía bộ sạc/cáp), cho phép lọc khả năng tương thích chính xác.
    ev_conversion_kit_completeness_level:
      name: Mức độ hoàn chỉnh của bộ chuyển đổi EV
      description: 'Cho biết sản phẩm là bộ chuyển đổi hoàn chỉnh hay bộ/gói một phần
        (ví dụ: chỉ động cơ + bộ điều khiển).'
    ev_conversion_kit_drivetrain_configuration:
      name: Cấu hình hệ thống truyền động của bộ chuyển đổi EV
      description: Xác định kiến trúc hệ thống truyền động của bộ chuyển đổi EV, bao
        gồm vị trí động cơ/bố trí truyền động và liệu nó có giữ lại hộp số hiện có
        hay không.
    ev_conversion_kit_voltage_class:
      name: Lớp điện áp của bộ chuyển đổi EV
      description: Lớp điện áp hệ thống danh nghĩa (khoảng) mà bộ chuyển đổi EV được
        thiết kế dựa trên. Sử dụng thông tin này để lọc theo các lớp điện áp hệ thống
        phổ biến ngoài phép đo điện áp chính xác.
    evaporator_core_type:
      name: Loại lõi dàn bay hơi
      description: Xác định thiết kế cấu tạo của lõi dàn bay hơi điều hòa không khí
        ô tô.
    evenweave_fabric_finish_treatment:
      name: Hoàn thiện/xử lý vải Evenweave
      description: Cho biết bất kỳ lớp hoàn thiện hoặc xử lý nào được áp dụng cho
        vải ảnh hưởng đến khả năng xử lý hoặc hình thức.
    evenweave_fabric_package_format:
      name: Định dạng bao bì vải Evenweave
      description: Cách thức bán vải (mảnh cắt so với vải liên tục theo mét).
    exercise_bike_accessory_part_type:
      name: Loại phụ kiện/phụ tùng xe đạp tập thể dục
      description: 'Mô tả chức năng chính hoặc loại linh kiện của sản phẩm (ví dụ:
        Bàn đạp, Dây đai truyền động, Giá đỡ bình nước, Tấm che màn hình, Tay quay).'
    exercise_bike_cushion_component:
      name: Bộ phận đệm xe đạp tập thể dục
      description: Chỉ định bộ phận liên quan đến ghế ngồi được cung cấp, chẳng hạn
        như miếng đệm ghế, yên xe hoặc vỏ bọc ghế.
    exercise_bike_metrics_tracked:
      name: Các chỉ số xe đạp tập thể dục được theo dõi
      description: Liệt kê các trường dữ liệu tập luyện mà máy tính có thể đo lường
        và hiển thị theo thời gian thực.
    exercise_mat_accessories_included:
      name: Các phụ kiện thảm tập thể dục đi kèm
      description: Liệt kê các bộ phận bổ sung được cung cấp kèm theo thảm, chẳng
        hạn như dây đeo hoặc miếng đệm đầu gối.
    exhaust_cooling_type:
      name: Loại làm mát khí thải
      description: Cho biết bộ phận khí thải được thiết kế cho hệ thống khí thải ướt
        (làm mát bằng nước/phun nước) hay hệ thống khí thải khô.
    exhaust_installation_position:
      name: Vị trí lắp đặt khí thải
      description: Cho biết vị trí lắp đặt bộ phận trên xe.
    exhaust_outlet_configuration:
      name: Cấu hình cửa thoát khí thải
      description: Chỉ định bố trí cửa thoát khí thải ở phía sau xe.
    expansion_tank_cap_connection_type:
      name: Loại kết nối nắp bình giãn nở
      description: Kiểu kết nối cơ khí được sử dụng để gắn và làm kín nắp vào cổ bình
        giãn nở.
    expansion_tank_cap_pressure_relief_feature:
      name: Tính năng xả áp suất của nắp bình giãn nở
      description: Cho biết nắp có chức năng xả áp suất/chân không hay không và cách
        thức hoạt động.
    expansion_tank_cap_seal_material:
      name: Vật liệu làm kín nắp bình giãn nở
      description: Vật liệu của gioăng/vòng đệm tiếp xúc với cổ bình giãn nở.
    extension_attachment_method:
      name: Phương pháp gắn phần mở rộng
      description: Cho biết cách phần mở rộng được gắn vào buồng lái/tay lái xe đạp,
        giúp người lái xác nhận khả năng tương thích với thiết lập hiện có của họ.
    extension_bend_type:
      name: Kiểu uốn cong của phần mở rộng
      description: Mô tả kiểu hình học hoặc độ uốn cong của phần mở rộng tay lái,
        ảnh hưởng đến công thái học và khí động học của người lái.
    extension_mechanism:
      name: Cơ chế mở rộng
      description: Mô tả phương pháp mà một bàn sử dụng để mở rộng chiều dài hoặc
        diện tích bề mặt của nó, nếu có.
    extension_table_features:
      name: Đặc điểm bàn mở rộng
      description: Nêu bật các tính năng chức năng cụ thể của bàn mở rộng máy may.
    eyelet_grommet_installation_method:
      name: Phương pháp lắp đặt khoen và khuy
      description: Chỉ định cách lắp đặt/cố định khoen/khuy vào vật liệu.
    eyewear_lens_shape:
      name: Hình dạng tròng kính
      description: Cho biết hình dạng hình học của tròng kính, chẳng hạn như hình
        trụ hoặc hình cầu, ảnh hưởng đến tầm nhìn, độ méo và kiểu dáng.
    eyewear_strap_material:
      name: Chất liệu dây đeo kính
      description: Chỉ định chất liệu của dây đeo điều chỉnh để cố định kính bảo hộ
        hoặc kính mắt vào đầu người dùng.
    fabric_backing_type:
      name: Loại vải lót
      description: Chỉ định xem vải cotton in có bao gồm lớp giấy lót ổn định (và
        loại nào), điều này quyết định xem nó có thể được đưa vào máy in tiêu chuẩn
        hay không.
    fabric_cut_format:
      name: Định dạng cắt vải
      description: Chỉ định kiểu cắt/định dạng của mảnh vải thêu.
    fabric_end_use:
      name: Mục đích sử dụng cuối cùng của vải
      description: Xác định ứng dụng chính dự định của vải (nó được sử dụng tốt nhất
        cho mục đích gì).
    fabric_finish:
      name: Hoàn thiện vải
      description: Hoàn thiện/xử lý bề mặt được áp dụng cho vải lụa ảnh hưởng đến
        độ bóng, cảm giác khi chạm vào và hiệu suất.
    fabric_intended_use:
      name: Mục đích sử dụng của vải
      description: Các ứng dụng/dự án chính được đề xuất cho vải lanh.
    fabric_opacity_level:
      name: Độ mờ đục của vải
      description: Cho biết độ trong suốt của vải, ảnh hưởng đến nhu cầu mặc nhiều
        lớp và lót.
    fabric_patch_shape:
      name: Hình dạng miếng vá vải
      description: Mô tả hình dạng của các miếng vá có trong bộ dụng cụ.
    fabric_repair_kit_application_method:
      name: Phương pháp ứng dụng bộ dụng cụ sửa chữa vải
      description: 'Chỉ định cách thức sửa chữa được áp dụng lên vải (ví dụ: ủi, may,
        dán).'
    fabric_repair_kit_components_included:
      name: Các thành phần có trong bộ dụng cụ sửa chữa vải
      description: 'Liệt kê các thành phần cụ thể được cung cấp trong bộ dụng cụ (ví
        dụ: miếng vá, chỉ, kim, keo dán).'
    fabric_repair_kit_intended_use:
      name: Mục đích sử dụng của bộ dụng cụ sửa chữa vải
      description: 'Chỉ định nhiệm vụ sửa chữa thông thường mà bộ dụng cụ được thiết
        kế cho (ví dụ: rách, thủng, may viền).'
    fabric_selling_format:
      name: Hình thức bán vải
      description: Chỉ định cách thức bán vải (chiều dài liên tục, mảnh cắt sẵn, cuộn/thùng
        hoặc mẫu).
    fabric_stretch_level:
      name: Mức độ co giãn của vải
      description: Mô tả độ co giãn/đàn hồi của vải, giúp người mua sắm lựa chọn loại
        vải phù hợp cho quần áo ôm sát hoặc các dự án có cấu trúc.
    fabric_stretch_type:
      name: Kiểu co giãn của vải
      description: Cho biết hiệu suất co giãn của vải quần short đi biển, điều quan
        trọng đối với sự linh hoạt khi lướt sóng hoặc bơi lội.
    fabric_texture:
      name: Kết cấu vải
      description: Mô tả cảm giác bề mặt hoặc cấu trúc dệt của vải được sử dụng trong
        áo mặc nhà.
    fabric_use_case:
      name: Trường hợp sử dụng vải
      description: Mục đích sử dụng chính của mảnh/cuộn vải satin.
    fabric_weight_class:
      name: Phân loại trọng lượng vải
      description: Phân loại vải flannel theo các dải trọng lượng sử dụng thông thường
        để giúp người mua sắm lọc mà không cần biết chính xác GSM/oz.
    face_mask_material:
      name: Chất liệu khẩu trang
      description: Thành phần vật liệu của khẩu trang đi kèm hoặc tương thích với
        mũ bảo hiểm.
    face_mask_style:
      name: Kiểu dáng khẩu trang
      description: Xác định hình dạng tổng thể hoặc kiểu cấu tạo của khẩu trang thời
        trang, giúp người mua sắm tìm được kiểu dáng và tính thẩm mỹ ưa thích.
    face_mask_style_code:
      name: Mã kiểu khẩu trang
      description: 'Xác định kiểu thanh cấu trúc hoặc nhóm mã ngành của khẩu trang
        (ví dụ: ROPO, OPO, RJOP).'
    face_protection_type:
      name: Loại bảo vệ mặt
      description: Cho biết loại bảo vệ mặt được cung cấp kèm theo hoặc tích hợp vào
        mũ bảo hiểm, chẳng hạn như lưới hoặc tấm che mặt.
    faceplate_security_features:
      name: Các tính năng bảo mật của mặt ốp
      description: Bao gồm các tính năng chống trộm và truy cập liên quan đến tấm
        che mặt ngoài thiết kế cơ bản.
    facing_length:
      name: Chiều dài mặt tiếp xúc
      description: Chỉ định chiều dài mặt tiếp xúc (chiều dài đường cong) của ống
        ngậm, ảnh hưởng đến phản hồi và lựa chọn lưỡi gà.
    fan_shroud_type:
      name: Loại vỏ quạt
      description: 'Chỉ định kiểu che phủ/hình dạng hình học của vỏ quạt (ví dụ: toàn
        phần so với một nửa so với vòng).'
    farming_method:
      name: Phương thức canh tác
      description: Nêu bật các biện pháp chăm sóc động vật hoặc chăn nuôi được sử
        dụng để nuôi động vật, chẳng hạn như chăn thả tự do hoặc hữu cơ.
    farming_practice:
      name: Phương pháp canh tác
      description: 'Xác định phương pháp canh tác chính được sử dụng cho sản phẩm
        (ví dụ: thông thường, hữu cơ, thủy canh).'
    fascinator_style:
      name: Kiểu mũ cài tóc
      description: Mô tả thiết kế cấu trúc hoặc hình dạng của mũ cài tóc để người
        mua sắm có thể nhanh chóng lọc theo các kiểu mũ phổ biến.
    fastener_grade:
      name: Cấp độ ốc vít
      description: Cho biết cấp độ/lớp độ bền của bu lông, chẳng hạn như Cấp 8 hoặc
        Lớp 10.9, quyết định khả năng chịu tải.
    fat_rendering_state:
      name: Trạng thái chế biến mỡ
      description: Chỉ rõ mỡ đã được chế biến, chưa chế biến (thô) hoặc chế biến một
        phần, ảnh hưởng đến thời hạn sử dụng và ứng dụng trong nấu ăn.
    fat_source:
      name: Nguồn gốc chất béo
      description: Xác định nguồn gốc chính của chất béo được sử dụng để sản xuất
        bơ, bơ ghee hoặc bơ thực vật (động vật hoặc thực vật), hỗ trợ lọc thông tin
        dị ứng và chế độ ăn kiêng.
    faucet_hole_configuration:
      name: Cấu hình lỗ vòi
      description: Cho biết số lượng và vị trí của các lỗ vòi đã được khoan sẵn trên
        mặt bàn trang điểm.
    feather_application:
      name: Ứng dụng của lông vũ
      description: Mục đích sử dụng chính của lông gà tây trong thủ công mỹ nghệ hoặc
        chế tạo.
    feather_attachment_format:
      name: Cách gắn/định dạng lông vũ
      description: Cách lông vũ tổng hợp được chuẩn bị/bán để sử dụng (rời, buộc dây,
        dán băng keo, v.v.).
    feather_coloration_style:
      name: Kiểu nhuộm màu lông vũ
      description: 'Mô tả cách màu sắc được áp dụng/hiển thị trên lông vũ (ví dụ:
        màu đơn sắc, nhuộm đầu lông, chuyển màu), độc lập với giá trị màu cơ bản.'
    feather_component:
      name: Thành phần lông vũ
      description: 'Chỉ định phần/kiểu lông công nào đang được bán (ví dụ: lông mắt
        so với lông đuôi).'
    feather_curvature:
      name: Độ cong của lông vũ
      description: Hình dạng/độ cong tổng thể của lông vũ.
    feather_finish:
      name: Hoàn thiện lông vũ
      description: 'Cho biết lông đà điểu là tự nhiên hay đã được xử lý (ví dụ: nhuộm
        hoặc tẩy trắng) để sử dụng trang trí.'
    feather_form:
      name: Hình dạng lông vũ
      description: Chỉ định hình dạng vật lý của các mảnh lông ngỗng đang được bán.
    feather_grade:
      name: Cấp độ lông vũ
      description: Chất lượng tổng thể/cấp độ lựa chọn của lông vũ cho mục đích thủ
        công so với mục đích trưng bày.
    feather_part:
      name: Phần của lông vũ
      description: Phần/cấu trúc của lông gà tây được bán (thường thấy trong danh
        sách vật tư thủ công và buộc ruồi giả).
    feather_processing_type:
      name: Loại xử lý lông vũ
      description: 'Cách lông vũ được xử lý/chế biến để sử dụng trong thủ công (ví
        dụ: nhuộm, tẩy trắng, tự nhiên/không nhuộm).'
    feather_product_form:
      name: Hình thức sản phẩm lông vũ
      description: 'Hình thức/cắt của sản phẩm lông vũ khi bán (ví dụ: lông rời so
        với khăn choàng lông vũ so với tua rua).'
    feather_quantity_unit:
      name: Đơn vị số lượng lông vũ
      description: 'Xác định cách sản phẩm được bán (ví dụ: theo từng chiếc, theo
        trọng lượng, theo bó) để hỗ trợ so sánh chính xác giữa các danh sách.'
    feather_source:
      name: Nguồn lông vũ
      description: Xác định nguồn gốc động vật của lông vũ được sử dụng trong cầu
        lông.
    feather_stiffness:
      name: Độ cứng của lông vũ
      description: Độ cứng/độ bền tương đối của các sợi lông/cấu trúc lông vũ.
    feed_mechanism:
      name: Cơ chế cấp liệu
      description: Cho biết cách đưa bóng vào máy ném cầu.
    feed_purpose:
      name: Mục đích của thức ăn
      description: Mô tả mục tiêu dinh dưỡng hoặc chức năng chính của thức ăn hoặc
        chất bổ sung.
    feeder_mechanism_type:
      name: Loại cơ chế nạp liệu
      description: Xác định cơ chế phân phối mà máy cấp liệu sử dụng để giải phóng
        thức ăn.
    feijoa_cultivar:
      name: Giống Feijoa
      description: Xác định giống hoặc chủng loại Feijoa cụ thể, vì các giống khác
        nhau có hương vị, kích thước và thời gian thu hoạch khác nhau.
    felt_duty:
      name: Độ bền của nỉ
      description: 'Xác định phân loại độ bền của nỉ cho quả bóng tennis (ví dụ: loại
        siêu bền, loại thông thường) ảnh hưởng đến độ bền trên các bề mặt khác nhau.'
    felting_mold_intended_use:
      name: Mục đích sử dụng của khuôn làm tranh nỉ
      description: Khuôn được thiết kế để tạo ra hoặc được sử dụng cho mục đích gì
        trong các dự án làm nỉ.
    felting_pad_surface_material:
      name: Vật liệu bề mặt của tấm lót nỉ
      description: Vật liệu được sử dụng trên bề mặt làm việc của tấm lót/thảm nỉ
        tiếp xúc với sợi/kim.
    fencing_certification:
      name: Chứng nhận đấu kiếm
      description: 'Liệt kê các chứng nhận chính thức từ các cơ quan quản lý (ví dụ:
        FIE, USFA) cho biết tính hợp pháp trong thi đấu và các tiêu chuẩn chất lượng.'
    fencing_connector_type:
      name: Loại đầu nối đấu kiếm
      description: 'Chỉ định cấu hình đầu nối được sử dụng để gắn dây, ổ cắm hoặc
        cuộn dây đấu kiếm (ví dụ: 2 chân, 3 chân, kiểu lưỡi lê), đảm bảo tính tương
        thích của các bộ phận.'
    fencing_discipline:
      name: Môn đấu kiếm
      description: Chỉ định loại vũ khí hoặc môn đấu kiếm mà sản phẩm được thiết kế
        hoặc tương thích.
    fencing_weapon_type:
      name: Loại vũ khí đấu kiếm
      description: Chỉ định kiểu vũ khí đấu kiếm hoặc vũ khí tập luyện mà dụng cụ
        hỗ trợ tập luyện tương thích hoặc đại diện, giúp người dùng tìm được thiết
        bị phù hợp.
    fender_finish_state:
      name: Tình trạng hoàn thiện của tấm chắn
      description: Cho biết tình trạng bề mặt/hoàn thiện của tấm chắn để sẵn sàng
        sơn và lắp đặt.
    fender_pieces_included:
      name: Các chi tiết chắn bùn đi kèm
      description: Liệt kê các bộ phận được cung cấp kèm theo sản phẩm để làm rõ đó
        là một tấm chắn đơn hay một bộ hoàn chỉnh với các phụ kiện.
    fender_type:
      name: Loại tấm chắn
      description: Phân loại thiết kế hoặc kiểu dáng tổng thể của tấm chắn.
    fennel_trimming:
      name: Cắt tỉa thì là
      description: 'Cho biết các bộ phận của cây được bao gồm trong củ thì là (ví
        dụ: có lá, phần ngọn đã cắt tỉa và rễ).'
    fennel_variety:
      name: Giống thì là
      description: Xác định giống hoặc loại thì là được bán trên thị trường.
    fermentation_application:
      name: Ứng dụng lên men
      description: 'Xác định loại thực phẩm hoặc đồ uống chính mà men được thiết kế
        để lên men (ví dụ: phô mai, sữa chua, kefir sữa, bánh mì chua).'
    fermentation_method:
      name: Phương pháp lên men
      description: 'Xác định cách sản xuất hoặc lên men nước tương (ví dụ: ủ tự nhiên,
        thủy phân hóa học).'
    fermentation_vessel_material:
      name: Vật liệu bình lên men
      description: Vật liệu chính của bình lên men có trong bộ dụng cụ (nếu có).
    ferrule_material:
      name: Vật liệu đầu nối
      description: 'Xác định vật liệu được sử dụng cho đầu nối trục (ví dụ: Juma,
        Phenolic, Polycarbonate, XTC hoặc không có), ảnh hưởng đến độ bền và cảm giác
        khi đánh.'
    fia_homologation_certification:
      name: Chứng nhận/đồng thuận FIA
      description: Cho biết xe (hoặc buồng an toàn) có được chứng nhận/đồng thuận
        hay không và theo tiêu chuẩn nào.
    fiber_animal_source_type:
      name: Loại động vật/nguồn gốc sợi
      description: Loại động vật hoặc nguồn gốc chính của sợi thô (hoặc tổng hợp),
        chẳng hạn như len merino, alpaca hoặc sợi thực vật.
    fiber_luster_level:
      name: Độ bóng của sợi
      description: Độ bóng trực quan của sợi, từ mờ đến bóng cao.
    fiber_preparation_processing_stage:
      name: Giai đoạn chuẩn bị/xử lý sợi
      description: 'Cho biết sợi đã được chuẩn bị/xử lý như thế nào để sử dụng (ví
        dụ: chải thô so với chải kỹ, pha trộn, giặt siêu sạch).'
    fiber_preparation_type:
      name: Loại chuẩn bị sợi
      description: 'Xác định cách sợi được chuẩn bị để chế tạo (ví dụ: sợi chải thô,
        sợi chải bằng trống, tấm nỉ sẵn).'
    field_hockey_ball_playing_surface:
      name: Bề mặt sân chơi bóng khúc côn cầu
      description: Xác định bề mặt sân chơi hoặc môi trường mà quả bóng được thiết
        kế.
    field_hockey_ball_type:
      name: Loại bóng khúc côn cầu
      description: Phân loại bóng khúc côn cầu theo mục đích sử dụng hoặc tính năng
        đặc biệt của nó.
    field_hockey_goal_size_standard:
      name: Tiêu chuẩn kích thước khung thành khúc côn cầu
      description: 'Phân loại khung thành theo các tiêu chuẩn khúc côn cầu thông thường
        hoặc kích thước huấn luyện (ví dụ: quy định ngoài trời FIH, trẻ em, mini).'
    field_hockey_training_objective:
      name: Mục tiêu huấn luyện khúc côn cầu
      description: Xác định kỹ năng chính hoặc lĩnh vực trọng tâm mà dụng cụ huấn
        luyện được thiết kế để cải thiện.
    field_point_attachment_method:
      name: Phương pháp gắn đầu mũi tên
      description: 'Cho biết cách đầu mũi tên được cố định vào thân mũi tên hoặc phần
        chèn (ví dụ: Vặn vít, Dán keo).'
    field_point_tip_style:
      name: Kiểu đầu mũi tên
      description: Xác định kiểu hình học hoặc cấu hình chức năng của đầu mũi tên,
        ảnh hưởng đến khả năng xuyên thấu, lực rút ra và tính hợp lệ.
    fielding_glove_position:
      name: Vị trí găng tay phòng thủ
      description: Xác định vị trí phòng thủ hoặc mục đích sử dụng mà găng tay được
        thiết kế trong bóng chày hoặc bóng mềm.
    fielding_training_focus:
      name: Trọng tâm huấn luyện bắt bóng
      description: Xác định lĩnh vực kỹ năng chính mà dụng cụ hỗ trợ nhắm đến trong
        các buổi tập luyện.
    fig_variety:
      name: Giống quả sung
      description: Xác định cụ thể chủng loại hoặc giống sung/vả đang được bán.
    figure_8_device_design:
      name: Thiết kế thiết bị hình số 8
      description: Xác định cấu hình cụ thể của thiết bị hình số 8, ảnh hưởng đến
        đặc điểm xử lý và mục đích sử dụng.
    figure_finish_type:
      name: Loại hoàn thiện mô hình
      description: Cho biết bề mặt/lớp sơn hoàn thiện của mô hình ngựa (hình thức/cảm
        giác khi sưu tầm).
    figurine_scale:
      name: Tỷ lệ mô hình
      description: 'Tỷ lệ/tỷ số của mô hình so với đối tượng thật (nếu có), ví dụ:
        1:6.'
    fill_status:
      name: Tình trạng đổ đầy
      description: Cho biết mô hình tập luyện được bán đã đổ đầy sẵn, chưa đổ đầy
        hoặc đổ đầy một phần, quyết định chi phí vận chuyển và công sức của người
        mua sắm.
    filling_consistency:
      name: Độ đặc của nhân
      description: 'Mô tả kết cấu hoặc độ nhớt của nhân khi được cung cấp (ví dụ:
        kem mịn, trái cây miếng, dạng sệt).'
    filling_type:
      name: Loại nhân
      description: Chỉ định nhân chính hoặc kem bên trong bánh quy, nếu có.
    filtration_and_mother_status:
      name: Tình trạng lọc và cặn giấm
      description: Cho biết giấm đã được lọc, chưa lọc, nguyên chất hay có chứa “cặn
        giấm”, phục vụ người tiêu dùng tìm kiếm các lựa chọn probiotic hoặc nguyên
        chất.
    filtration_method:
      name: Phương pháp lọc
      description: Vật liệu hoặc kỹ thuật được sử dụng để lọc và tinh chế rượu vodka
        sau khi chưng cất.
    fin_box_system:
      name: Hệ thống hộp vây
      description: Xác định hộp vây hoặc giao diện gắn mà ván sử dụng, quyết định
        khả năng tương thích của vây phụ kiện.
    fin_buoyancy:
      name: Độ nổi của vây
      description: Cho biết vây có nổi trên mặt nước, trung tính hay âm, ảnh hưởng
        đến tư thế lặn và cân bằng thiết bị.
    fin_flex_rating:
      name: Độ cứng của vây
      description: Cho biết độ cứng tương đối hoặc độ uốn của vây, ảnh hưởng đến hiệu
        suất tổng thể.
    fin_mounting_system:
      name: Hệ thống gắn vây
      description: 'Xác định giao diện gắn hoặc tiêu chuẩn được sử dụng để cố định
        vây vào ván lướt diều (ví dụ: FCS II, bắt vít, 4 lỗ), đảm bảo khả năng tương
        thích giữa vây và ván.'
    fin_position:
      name: Vị trí vây
      description: Xác định vị trí gắn dự định của vây trên ván.
    fin_strap_type:
      name: Loại dây đeo chân vịt
      description: Xác định kiểu dây đeo hoặc hệ thống giữ được sử dụng để cố định
        vây vào gót chân/bàn chân.
    fin_template:
      name: Mẫu vây
      description: Phân loại mẫu thủy động lực học hoặc đường viền của vây ván lướt
        sóng, ảnh hưởng đến kiểu xoay, tốc độ và cảm giác tổng thể của ván.
    finger_count:
      name: Số ngón tay
      description: Cho biết số ngón tay mà găng tay, miếng dán hoặc tay cầm tháo được
        thiết kế để hỗ trợ.
    finger_coverage:
      name: Độ che phủ ngón tay
      description: Cho biết mức độ che phủ của các ngón tay.
    finger_grip_adjustability:
      name: Khả năng điều chỉnh độ bám ngón tay
      description: Cho biết cách gắn hoặc điều chỉnh phần bám ngón tay để phù hợp
        với các kích cỡ bàn tay khác nhau.
    finger_hole_configuration:
      name: Cấu hình lỗ bấm ngón tay
      description: Chỉ định hướng tay của các lỗ ngón tay (thuận tay phải, thuận tay
        trái hoặc cả hai tay).
    finger_hole_count:
      name: Số lượng lỗ ngón tay
      description: Cho biết số lượng lỗ ngón tay trên lớp da cầm, một điểm khác biệt
        quan trọng giữa các mẫu không ngón, 2 lỗ, 3 lỗ và 4 lỗ.
    finger_pick_band_style:
      name: Kiểu dây đeo miếng gảy ngón tay
      description: Kiểu dây đeo/vòng gắn vào ngón tay, ảnh hưởng đến sự thoải mái
        và khả năng điều chỉnh.
    finger_pick_blade_length:
      name: Chiều dài lưỡi gảy ngón tay
      description: Chiều dài của lưỡi gảy nhô ra từ dây đeo.
    finger_pick_blade_shape:
      name: Hình dáng lưỡi gảy móng tay
      description: Hình dạng/hình dáng của bề mặt gảy (lưỡi) tiếp xúc với dây đàn.
    finger_pick_size:
      name: Kích thước miếng gảy ngón tay
      description: Kích thước của dây đeo/vòng của miếng gảy ngón tay để phù hợp với
        chu vi ngón tay hoặc ngón cái khác nhau (không phải kích thước nhạc cụ).
    finger_pick_wear_location:
      name: Vị trí đeo miếng gảy ngón tay
      description: Cho biết miếng gảy ngón tay được thiết kế để đeo vào ngón tay nào,
        hoặc sản phẩm là bộ dành cho cả ngón tay và ngón cái.
    finger_protection:
      name: Bảo vệ ngón tay
      description: Cho biết găng tay có bao gồm bảo vệ sống ngón tay hay không và
        liệu các sống ngón tay có thể tháo rời được hay không.
    fingerboard_bearing_type:
      name: Loại ổ trục bàn phím
      description: Chỉ định loại ổ trục được sử dụng trong bánh xe bàn phím.
    fingerboard_grip_type:
      name: Kiểu bề mặt bám của bàn phím
      description: Chỉ định chất liệu/loại bề mặt tay cầm được sử dụng trên mặt cần
        đàn.
    fining_agent_active_ingredient:
      name: Thành phần hoạt chất của chất làm trong
      description: Thành phần chính của chất làm trong hoặc làm sạch được sử dụng
        trong sản phẩm.
    fining_agent_type:
      name: Loại chất làm trong
      description: Chỉ định thành phần hóa học hoặc vật liệu của chất làm trong/làm
        sạch cho các sản phẩm làm trong rượu vang đỏ.
    finish_after_baking:
      name: Hoàn thiện sau khi nung
      description: Mô tả hình thức bề mặt điển hình sau khi nung/làm cứng.
    finish_effect:
      name: Hiệu ứng hoàn thiện
      description: Mô tả các hiệu ứng bề mặt/quang học đặc biệt được áp dụng cho đá
        quý.
    finish_type:
      name: Loại hoàn thiện
      description: Lớp hoàn thiện bề mặt được áp dụng cho thân đàn ukulele.
    finished_product_format:
      name: Định dạng sản phẩm hoàn chỉnh
      description: Chỉ định loại sản phẩm nước hoa mà bộ dụng cụ này dự định tạo ra.
    fire_pit_accessories_included:
      name: Phụ kiện đi kèm của hố lửa
      description: Liệt kê các phụ kiện đáng chú ý được cung cấp kèm theo lò lửa,
        chẳng hạn như màn chắn tia lửa hoặc đá nham thạch, giúp làm rõ những gì có
        trong hộp.
    firework_assortment_launch_type:
      name: Kiểu phóng pháo hoa
      description: Mô tả cách đốt/phóng pháo hoa đi kèm.
    firework_assortment_types_included:
      name: Các loại pháo hoa đi kèm
      description: 'Xác định các loại pháo hoa chính có trong bộ sưu tập để giúp người
        mua sắm so sánh nội dung gói hàng (ví dụ: pháo phun, pháo hoa La Mã, pháo
        nổ).'
    firework_effect_types:
      name: Các loại hiệu ứng pháo hoa
      description: Các nhóm hiệu ứng thị giác và/hoặc cảm giác chính được tạo ra bởi
        bộ pháo hoa (chọn tất cả các mục áp dụng).
    firework_ignition_method:
      name: Phương pháp đánh lửa pháo hoa
      description: 'Chỉ định cách pháo hoa được đánh lửa hoặc kích hoạt (ví dụ: dây
        cháy chậm hoặc diêm điện).'
    firework_visual_intensity_level:
      name: Mức độ cường độ thị giác của pháo hoa
      description: Cường độ/âm lượng tổng thể của tia lửa cho hiệu ứng phun nước.
    firing_mode:
      name: Chế độ bắn
      description: Liệt kê các chế độ bắn có thể lựa chọn hoặc chế độ bắn chính mà
        súng airsoft hỗ trợ.
    first_day_cover_cachet_type:
      name: Loại dấu kỷ niệm trên phong bì ngày đầu tiên phát hành
      description: 'Loại dấu đóng trên bì thư ngày đầu tiên (ví dụ: in, vẽ tay).'
    first_day_cover_cancellation_type:
      name: Loại đóng dấu bưu chính trên bì thư ngày đầu tiên
      description: 'Loại/kiểu đóng dấu bưu chính được áp dụng trên bì thư ngày đầu
        tiên (ví dụ: đóng dấu bằng máy, đóng dấu bằng tay).'
    first_day_cover_set_type:
      name: Loại bộ bì thư ngày đầu tiên
      description: Cho biết bì thư đó đại diện cho một ấn bản đơn lẻ, một bộ đầy đủ
        hoặc một tập hợp con/kết hợp.
    fishing_hook_size:
      name: Kích thước lưỡi câu cá
      description: 'Chỉ định ký hiệu kích thước tiêu chuẩn của lưỡi câu cá (ví dụ:
        #4, 1/0, 10/0), giúp người câu cá lựa chọn kích thước lưỡi câu phù hợp với
        loài cá và mồi câu.'
    fishing_hook_style:
      name: Kiểu dáng lưỡi câu
      description: Xác định thiết kế cụ thể hoặc kiểu uốn cong của lưỡi câu đơn, yếu
        tố ảnh hưởng đến cách trình bày, hiệu quả đóng cá và mục đích sử dụng.
    fishing_hook_type:
      name: Loại lưỡi câu
      description: Mô tả cấu hình lưỡi câu được cung cấp kèm theo mồi câu (nếu có).
    fishing_line_application:
      name: Ứng dụng dây câu
      description: 'Xác định mục đích sử dụng của dây câu hoặc vật liệu dẫn (ví dụ:
        dây dẫn, dây chính, dây nối).'
    fishing_line_buoyancy_type:
      name: Loại độ nổi của dây câu
      description: 'Phân loại cách dây câu hoạt động trong cột nước (ví dụ: nổi, trung
        bình, chìm), giúp người câu cá chọn độ sâu phù hợp.'
    fishing_needle_purpose:
      name: Mục đích của kim câu cá
      description: Xác định ứng dụng chính của kim trong các công việc buộc dây câu.
    fishing_needle_types_included:
      name: Các loại kim câu cá đi kèm
      description: Liệt kê các kiểu kim hoặc dụng cụ buộc dây cụ thể được cung cấp
        trong bộ sản phẩm để khách hàng có thể nhanh chóng xem nội dung bộ dụng cụ.
    fit_profile:
      name: Kiểu dáng
      description: Mô tả kiểu dáng và hình dạng tổng thể của miếng đệm, ảnh hưởng
        đến khả năng di chuyển và độ che phủ.
    fit_volume_classification:
      name: Phân loại thể tích bên trong
      description: 'Phân loại thể tích bên trong tổng thể của miếng đệm theo như các
        thương hiệu quảng cáo (ví dụ: LV cho thể tích thấp).'
    fitting_angle:
      name: Góc lắp đặt
      description: 'Chỉ định góc uốn cong của thân lắp đặt (ví dụ: thẳng, 45°, 90°).
        Sử dụng “Có thể điều chỉnh / xoay” cho các phụ kiện có góc thay đổi và “Khác”
        cho các góc không phổ biến.'
    flag_base_type:
      name: Loại đế cờ
      description: Xác định kiểu neo hoặc đế được sử dụng để cố định cờ góc trên các
        bề mặt sân chơi khác nhau.
    flag_design_theme:
      name: Chủ đề thiết kế cờ
      description: 'Mô tả chủ đề thiết kế chính được thể hiện trên cờ (ví dụ: quốc
        gia/dân tộc, đội thể thao, ngày lễ), hỗ trợ tìm kiếm và lọc cho việc mua sắm
        dựa trên ý định.'
    flag_mounting_method:
      name: Phương pháp gắn cờ
      description: 'Chỉ định cách gắn cờ vào xe (ví dụ: gắn trên ăng-ten, gắn vào
        móc kéo, từ tính).'
    flag_type:
      name: Loại cờ
      description: Phân loại mục đích hoặc kiểu dáng cụ thể của cờ golf, chẳng hạn
        như cờ ghim, cờ xe đẩy hoặc cờ tập luyện.
    flame_resistance_standard:
      name: Tiêu chuẩn chống cháy
      description: Cho biết tiêu chuẩn/chứng nhận chống cháy hoặc chống hồ quang điện
        cụ thể mà sản phẩm đáp ứng.
    flamenco_cajon_snare_system:
      name: Hệ thống dây snare trống cajon Flamenco
      description: Chỉ định cơ chế dây snare bên trong được sử dụng để tạo ra âm thanh
        đặc trưng của trống flamenco (hoặc không có).
    flammability_compliance:
      name: Tuân thủ tiêu chuẩn bắt lửa
      description: Chỉ định (các) tiêu chuẩn bắt lửa áp dụng mà vải đáp ứng cho nội
        thất xe.
    flannel_brushing_finish:
      name: Hoàn thiện chải vải flannel
      description: Cho biết vải flannel có được chải hay không và ở mặt nào, ảnh hưởng
        đến độ mềm mại, độ ấm và vẻ ngoài.
    flannel_use_type:
      name: Loại sử dụng vải nỉ
      description: Ứng dụng chính dự định cho mảnh vải nỉ/cuộn vải.
    flap_configuration:
      name: Cấu hình nắp đậy
      description: Xác định kiểu vạt của yên ngựa, chẳng hạn như vạt đơn hoặc vạt
        đôi.
    flare_color:
      name: Màu sắc ánh sáng lóe lên
      description: Màu sắc của ánh sáng/ngọn lửa phát ra (hoặc màu thấu kính đối với
        đèn LED lóe sáng).
    flash_card_included_features:
      name: Các tính năng đi kèm thẻ học
      description: Nổi bật các tính năng học tập/sử dụng chức năng đi kèm với thẻ
        học.
    flavor_intensity:
      name: Cường độ hương vị
      description: 'Cho biết độ đậm đặc của sản phẩm tạo hương vị, giúp người dùng
        xác định liều lượng thích hợp (ví dụ: độ mạnh tiêu chuẩn, độ mạnh siêu mạnh).'
    flavor_solvent_base:
      name: Chất mang hoặc dung môi chính được sử dụng trong hương vị
      description: 'Xác định chất mang hoặc dung môi chính được sử dụng trong hương
        vị (ví dụ: cồn, propylene glycol, glycerin).'
    fleece_fiber_animal_type:
      name: Loại động vật của sợi lông cừu
      description: Nguồn gốc động vật của sợi lông cừu (loài).
    fleece_finish_surface:
      name: Hoàn thiện/bề mặt lông cừu
      description: 'Mô tả bề mặt/hoàn thiện của lông cừu (ví dụ: chống xù lông, chải)
        ảnh hưởng đến khả năng chống xù lông, độ mềm mại và vẻ ngoài.'
    fleece_preparation_method:
      name: Phương pháp chuẩn bị lông cừu
      description: Cách lông cừu được chuẩn bị/xử lý để tạo hình và kéo sợi (trạng
        thái của sợi).
    flesh_color:
      name: Màu thịt quả
      description: Xác định màu thịt bên trong của quả dưa.
    fletching_orientation:
      name: Hướng gắn cánh tên
      description: 'Xác định cách gắn cánh tên lên thân tên (ví dụ: thẳng, lệch, xoắn
        ốc), ảnh hưởng đến độ xoay và đường bay của tên.'
    fletching_profile:
      name: Hình dạng cánh tên
      description: Xác định hình dạng hình học hoặc kiểu cắt của cánh tên, ảnh hưởng
        đến lực cản, khoảng cách, tiếng ồn và đặc tính bay tổng thể của tên.
    flight_system_type:
      name: Loại hệ thống cánh tên
      description: Xác định kiểu cấu tạo của cánh tên, phân biệt giữa các hệ thống
        cánh tên có thể gập lại, đúc khuôn và tích hợp với thân tên.
    float_attachment_method:
      name: Phương pháp gắn phao
      description: 'Mô tả cách phao được gắn vào dây câu (ví dụ: kiểu trượt hoặc cố
        định), cho phép người câu cá lọc theo kiểu buộc dây.'
    float_design:
      name: Thiết kế phao
      description: 'Phân loại kiểu dáng hoặc loại phao câu cá tổng thể (ví dụ: phao
        nổi, phao trôi, phao bút chì) để người câu cá có thể nhanh chóng chọn một
        mẫu phù hợp với kỹ thuật và điều kiện của họ.'
    float_raft_use_environment:
      name: Môi trường sử dụng phao/thuyền phao
      description: Môi trường nước chính dự định sử dụng cho phao bơm hơi (hồ bơi
        so với vùng nước lặng ngoài khơi so với sóng biển), phản ánh độ bền và kỳ
        vọng về thiết kế.
    floatation:
      name: Khả năng nổi
      description: Liệu phao có được thiết kế để nổi trên mặt nước hay không.
    floor_construction_type:
      name: Loại kết cấu sàn
      description: 'Xác định thiết kế của sàn bè (ví dụ: tự thoát nước, khâu chìm)
        ảnh hưởng đến khả năng thoát nước, độ cứng và hiệu suất.'
    floor_design:
      name: Thiết kế sàn
      description: Kiểu vật liệu trải sàn được cung cấp kèm theo khu vực bao quanh.
    floor_inclusion:
      name: Có bao gồm sàn không
      description: Cho biết khu vực tiền sảnh có bao gồm sàn hay không và sàn đó có
        thể tháo rời được không.
    floor_mat_cleaning_method:
      name: Phương pháp vệ sinh thảm trải sàn
      description: Cho biết phương pháp vệ sinh chính được nhà sản xuất khuyến nghị
        cho thảm trải sàn.
    floor_mat_edge_style:
      name: Kiểu mép thảm trải sàn
      description: Mô tả xem thảm có mép/viền nhô cao để giữ lại chất lỏng tràn và
        mảnh vụn hay không.
    floor_mat_format:
      name: Định dạng thảm trải sàn
      description: 'Xác định định dạng vật lý hoặc kiểu dáng của sản phẩm bảo vệ sàn
        (ví dụ: thảm đơn, gạch ghép nối, cuộn).'
    floor_mat_retention_system:
      name: Hệ thống giữ thảm trải sàn
      description: Chỉ định phương pháp được sử dụng để giữ thảm cố định tại chỗ.
    floor_mat_set_configuration:
      name: Cấu hình bộ thảm trải sàn
      description: 'Cho biết những vị trí nào được bao gồm trong gói (ví dụ: chỉ cặp
        phía trước, bộ đầy đủ).'
    floss_sugar_granulation_grade:
      name: Cấp độ hạt đường làm bông gòn
      description: Mô tả kích thước tinh thể của hỗn hợp đường (mịn, trung bình, thô),
        có thể ảnh hưởng đến hiệu suất máy và kết cấu cuối cùng.
    floss_sugar_product_form:
      name: Dạng sản phẩm đường làm kẹo bông gòn
      description: Cho biết đường làm kẹo bông gòn đã sẵn sàng sử dụng, là chất tạo
        hương vị cô đặc cần trộn với đường nền, hay là đường nền không màu.
    flour_grind_texture:
      name: Kết cấu xay bột
      description: Cho biết kích thước hoặc kết cấu xay của bột, chẳng hạn như siêu
        mịn, trung bình, thô hoặc xay bằng cối đá, điều này có thể ảnh hưởng đến hiệu
        quả của công thức.
    flour_processing_method:
      name: Phương pháp chế biến bột mì
      description: 'Ghi lại các phương pháp chế biến hoặc xử lý đáng chú ý được áp
        dụng cho bột (ví dụ: xay bằng cối đá, tẩy trắng, nảy mầm, làm giàu) ảnh hưởng
        đến hương vị, màu sắc hoặc dinh dưỡng.'
    flower_care_instructions:
      name: Hướng dẫn chăm sóc hoa
      description: 'Cung cấp các bước chăm sóc được khuyến nghị cụ thể cho hoa cắt
        tươi (ví dụ: tỉa cuống, thay đổi tần suất tưới nước).'
    flugelhorn_leadpipe_material:
      name: Chất liệu ống dẫn khí kèn flugelhorn
      description: Chất liệu của bộ phận ống dẫn hơi chính (nếu được nêu riêng biệt
        với chất liệu tổng thể của nhạc cụ).
    flugelhorn_trigger_type:
      name: Loại cần gạt kèn flugelhorn
      description: Cho biết kèn flugelhorn có cần gạt điều chỉnh âm thanh hay không
        và cần gạt/van nào điều khiển nó.
    fluorescence_grade:
      name: Cấp độ huỳnh quang
      description: Cho biết cường độ huỳnh quang của kim cương khi tiếp xúc với tia
        cực tím.
    fluorescence_under_uv:
      name: Huỳnh quang dưới tia cực tím
      description: Cho biết mẫu vật có/loại huỳnh quang nào hiển thị dưới ánh sáng
        cực tím.
    fluorocarbon_content:
      name: Hàm lượng fluorocarbon
      description: Cho biết sáp có chứa chất phụ gia fluorocarbon hay không và ở mức
        độ nào.
    flute_case_capacity:
      name: Dung tích hộp đựng sáo
      description: 'Cho biết hộp đựng được thiết kế để chứa những gì, ngoài thân sáo
        chính (ví dụ: sáo + sáo piccolo, đầu sáo phụ).'
    flute_cleaning_rod_tip_type:
      name: Loại đầu que vệ sinh sáo
      description: 'Mô tả thiết kế của đầu que dùng để giữ vải/que lau hoặc tiếp xúc
        với nhạc cụ (ví dụ: có rãnh, có ren, có lỗ).'
    flute_footjoint_type:
      name: Loại khớp nối chân sáo
      description: Chỉ định cấu hình khớp nối chân của sáo.
    flute_headjoint_cork_type:
      name: Loại nút bần đầu sáo
      description: Xác định vật liệu/loại nút bần/nút bịt đầu sáo được cung cấp kèm
        theo.
    flute_key_system:
      name: Hệ thống phím của sáo Tây
      description: 'Xác định hệ thống cơ khí/khóa được sử dụng bởi sáo (ví dụ: hệ
        thống Boehm) nếu có.'
    flute_keywork_material:
      name: Chất liệu hệ thống phím sáo
      description: Vật liệu và/hoặc lớp mạ của các khóa (bộ phận khóa), khi được chỉ
        định riêng biệt với vật liệu thân sáo.
    flute_offset_g:
      name: Khóa G lệch của sáo
      description: Xác định xem sáo có bố trí khóa G lệch hay không.
    flute_wall_thickness:
      name: Độ dày thành sáo
      description: Loại độ dày thành ống sáo (thành mỏng, tiêu chuẩn, thành dày).
    fly_pattern_type:
      name: Loại kiểu mồi giả
      description: Phân loại mồi giả theo kiểu câu cá hoặc bắt chước côn trùng/mồi
        để giúp người câu cá nhanh chóng lọc ra kiểu mồi phù hợp.
    fly_rod_style:
      name: Kiểu cần câu
      description: 'Phân loại cần câu theo kiểu câu hoặc ứng dụng dự định (ví dụ:
        một tay, Switch, Spey).'
    fly_style:
      name: Kiểu mồi ruồi
      description: Xác định loại mồi giả hoặc lỗ mở phía trước trên đáy ống câu dài.
    fly_tying_tools_included:
      name: Bộ dụng cụ buộc ruồi câu cá đi kèm
      description: Liệt kê các dụng cụ buộc ruồi câu cá cụ thể được cung cấp trong
        bộ sản phẩm để người mua sắm biết chính xác những gì được bao gồm và có thể
        so sánh các gói sản phẩm.
    fly_type:
      name: Loại ruồi câu cá
      description: Xác định xem quần dài có bao gồm ruồi câu cá chức năng hay không
        và kiểu ruồi câu cá đó.
    flyer_hook_mounting_method:
      name: Phương pháp gắn móc ruồi câu cá
      description: 'Cách móc được gắn vào ruồi câu cá (ví dụ: vặn vít so với ép chặt),
        điều này ảnh hưởng đến khả năng lắp đặt và tính tương thích.'
    flyer_hook_orientation:
      name: Hướng móc ruồi câu cá
      description: Móc được thiết kế cho phía bên trái hay bên phải của ruồi câu cá,
        hoặc có thể đảo ngược/đa năng.
    flyer_kit_finish_coating:
      name: Lớp hoàn thiện/lớp phủ bộ ruồi câu cá
      description: Lớp hoàn thiện bề mặt được áp dụng cho các bộ phận của bộ ruồi
        câu cá.
    flyer_kit_included_components:
      name: Các bộ phận đi kèm trong bộ ruồi câu cá
      description: Xác định những bộ phận nào được bao gồm trong bộ sản phẩm.
    flyer_orifice_type:
      name: Loại lỗ ruồi câu cá
      description: Xác định kiểu lỗ được sử dụng trên ruồi câu cá.
    flying_disc_feature_set:
      name: Bộ tính năng của đĩa bay
      description: Các tính năng chức năng đáng chú ý của đĩa bay.
    flysheet_material:
      name: Chất liệu vải phủ ngoài
      description: Xác định loại vải chính được sử dụng cho lều/vải phủ ngoài, ảnh
        hưởng đến trọng lượng, độ bền và khả năng chống chịu thời tiết.
    flywheel_balance_type:
      name: Loại cân bằng bánh đà
      description: Cho biết bánh đà được cân bằng trung tính hay sử dụng trọng lượng
        mất cân bằng bên ngoài.
    foam_blocks_size_class:
      name: Phân loại kích thước khối xốp
      description: Cho biết phân loại kích thước chung của các khối trong bộ.
    foam_blocks_surface_texture:
      name: Kết cấu bề mặt khối xốp
      description: Mô tả cảm giác/độ hoàn thiện bề mặt bên ngoài của các khối xốp.
    foam_surface_effect:
      name: Hiệu ứng bề mặt xốp
      description: Mô tả các hiệu ứng bề mặt trang trí phổ biến được áp dụng cho xốp
        thủ công hoặc xốp polystyrene, chẳng hạn như lấp lánh, kim loại hoặc lớp phủ
        ba chiều.
    foil_color:
      name: Màu lá kim loại
      description: Chỉ định màu lá kim loại nhấn được sử dụng trên chứng chỉ (nếu
        có).
    foil_curtain_mounting_method:
      name: Phương pháp lắp đặt màn lá kim loại
      description: 'Cách màn lá kim loại dự định được lắp đặt hoặc treo (ví dụ: dải
        keo, khoen).'
    foil_discipline:
      name: Bộ môn lướt ván lá kim loại
      description: Xác định phong cách hoặc bộ môn chính mà lá kim loại được thiết
        kế cho.
    foil_mast_board_mounting_type:
      name: Loại lắp đặt bảng cột lá kim loại
      description: Xác định giao diện ở đầu cột gắn vào bảng hoặc đường ray lá kim
        loại.
    foil_mast_fuselage_connection_type:
      name: Loại kết nối thân máy bay với cột lá kim loại
      description: Chỉ định cách cột kết nối với thân máy bay hoặc cụm cánh trước.
    foil_mounting_interface:
      name: Giao diện lắp đặt cánh ngầm
      description: Xác định tiêu chuẩn kết nối mà bộ phận sử dụng để gắn vào ván hoặc
        các bộ phận cánh nâng khác.
    foil_mounting_system:
      name: Hệ thống gắn cánh ngầm
      description: Chỉ định giao diện lắp đặt cho cánh nâng hoặc vây trên ván, đảm
        bảo khả năng tương thích với trang thiết bị hiện có của người dùng.
    foil_mounting_type:
      name: Loại gắn cánh ngầm
      description: Xác định hệ thống giao diện được sử dụng để gắn cánh nâng vào ván,
        đảm bảo khả năng tương thích giữa các bộ phận.
    fold_over_elastic_application:
      name: Ứng dụng dây thun gập
      description: Mục đích sử dụng/ứng dụng chính của dây thun khuy.
    foldability:
      name: Khả năng gập
      description: Mô tả liệu vách ngăn có thể gập hoặc thu gọn để cất giữ hoặc sắp
        xếp lại hay không.
    foldability_stow:
      name: Khả năng gập (cất giữ)
      description: 'Liệu giá đỡ có thể gập/cất giữ khi không sử dụng (ví dụ: gập lại
        sát vào xe).'
    folding_style:
      name: Kiểu gấp
      description: Cho biết cách tấm đệm chống va đập gập lại để vận chuyển và cất
        giữ, ảnh hưởng đến độ đồng nhất của bề mặt tiếp xúc và khả năng đóng gói.
    food_basket_items_included:
      name: Các mặt hàng thực phẩm trong giỏ quà
      description: Liệt kê các loại thực phẩm chính có trong giỏ quà để giúp người
        mua sắm lựa chọn giỏ quà phù hợp với sở thích hoặc nhu cầu ăn kiêng của người
        nhận.
    food_coloring_form:
      name: Dạng phẩm màu thực phẩm
      description: 'Chỉ định dạng vật lý hoặc định dạng phân phối phẩm màu thực phẩm
        (ví dụ: dạng gel, dạng lỏng, dạng bột, dạng xịt).'
    food_contact_material:
      name: Vật liệu tiếp xúc với thực phẩm
      description: Vật liệu chính của các thiết bị sản xuất rượu vang (bình lên men,
        ống siphon, phễu) được sử dụng với nước nho/rượu vang.
    food_packing_medium:
      name: Môi trường đóng gói thực phẩm
      description: 'Xác định môi trường đóng gói trái cây hoặc rau quả (ví dụ: nước,
        nước muối, siro, dầu).'
    foosball_rod_type:
      name: Loại cần điều khiển bóng bàn
      description: Cho biết cấu hình cơ học của cần điều khiển ảnh hưởng đến cảm giác
        chơi và độ an toàn.
    foot_arch_type_compatibility:
      name: Khả năng tương thích với loại vòm bàn chân
      description: Xác định hình dạng vòm bàn chân mà miếng lót được thiết kế cho.
    foot_arch_type_suitability:
      name: Độ phù hợp với các loại vòm bàn chân
      description: Xác định hình dạng vòm bàn chân mà miếng lót được thiết kế để hỗ
        trợ.
    foot_coverage:
      name: Độ che phủ bàn chân
      description: Cho biết quần có bàn chân, không có bàn chân, kiểu dây đai hoặc
        hở gót.
    foot_guard_type:
      name: Loại bảo vệ chân
      description: Cho biết miếng bảo vệ chân có bao gồm phần bảo vệ ngón chân/bàn
        chân hay không và chỉ rõ phần bảo vệ đó là cố định hay có thể tháo rời.
    foot_support_level:
      name: Mức độ hỗ trợ bàn chân
      description: Cho biết mức độ hỗ trợ cấu trúc hoặc độ cứng mà miếng lót giày
        cung cấp, chẳng hạn như thấp, trung bình, cao hoặc rất cao.
    footbag_play_style:
      name: Kiểu chơi bóng bàn
      description: Kiểu chơi chính được dự định cho trò chơi bóng bàn.
    football_ball_type:
      name: Loại bóng đá
      description: Chỉ định mục đích sử dụng hoặc bối cảnh chính được dự định cho
        quả bóng đá, chẳng hạn như chơi trận đấu, luyện tập hoặc trưng bày sưu tầm.
    football_dummy_type:
      name: Loại hình nộm bóng đá
      description: Phân loại kiểu dáng hoặc thiết kế chức năng của hình nộm để phản
        ánh mục đích huấn luyện cụ thể của nó.
    football_glove_certification:
      name: Chứng nhận găng tay bóng bầu dục
      description: 'Cho biết chứng nhận hoặc tiêu chuẩn tuân thủ cần thiết cho thi
        đấu (ví dụ: SFIA, NFHS, NCAA).'
    footboard_mounting_type:
      name: Kiểu lắp đặt ván chân giường
      description: Chỉ định cách gắn ván chân giường vào khung giường hoặc sàn nhà,
        giúp người mua lựa chọn phần cứng và phương pháp lắp đặt tương thích.
    footboard_style:
      name: Kiểu dáng tấm để chân
      description: Xác định kiểu dáng thiết kế cấu trúc hoặc thẩm mỹ của ván chân
        giường.
    footrest_adjustability:
      name: Khả năng điều chỉnh của chỗ để chân
      description: Chỉ định xem và cách điều chỉnh chỗ để chân để phù hợp với chiều
        dài chân khác nhau của trẻ.
    footrest_type:
      name: Loại chỗ để chân
      description: Xác định sự hiện diện và thiết kế của chỗ để chân trên ghế.
    footstrap_configuration:
      name: Cấu hình dây đeo chân
      description: Chỉ định kiểu chèn dây đeo chân trên mặt ván.
    footswitch_action_style:
      name: Kiểu hoạt động của công tắc chân
      description: Cho biết liệu hoạt động của công tắc là tạm thời hay giữ, và liệu
        nó có hỗ trợ cả hai hay không.
    footswitch_power_source:
      name: Nguồn điện của công tắc chân
      description: Chỉ định cách cấp nguồn cho công tắc chân, nếu có (thụ động qua
        giắc cắm ampli, pin, bộ chuyển đổi bên ngoài, USB, v.v.).
    footwear_construction_method:
      name: Phương pháp cấu tạo giày dép
      description: Xác định kỹ thuật được sử dụng để gắn phần trên của giày vào đế,
        ảnh hưởng đến độ bền, khả năng thay đế và giá cả.
    footwear_cut:
      name: Kiểu dáng giày dép
      description: Cho biết chiều cao cổ giày (cổ thấp, cổ trung bình, cổ cao), cân
        bằng giữa khả năng vận động và hỗ trợ.
    footwear_size_system:
      name: Hệ thống kích cỡ giày dép
      description: 'Xác định tiêu chuẩn kích cỡ khu vực được sử dụng cho kích cỡ giày
        đã nêu (ví dụ: Mỹ, EU, Anh).'
    footwear_support_type:
      name: Loại hỗ trợ giày dép
      description: 'Chỉ định mức độ hỗ trợ sinh học hoặc kiểm soát lật bàn chân mà
        giày cung cấp (ví dụ: Trung tính, Ổn định, Kiểm soát chuyển động).'
    fork_material:
      name: Chất liệu càng phuộc
      description: Chỉ định chất liệu được sử dụng cho càng phuộc trước của xe đạp,
        ảnh hưởng đến độ cứng, trọng lượng và chất lượng khi lái.
    form_factor:
      name: Kiểu dáng phần cứng
      description: Kiểu dáng phần cứng chính của bộ điều khiển DMX.
    formula_car_series_class:
      name: Dòng/hạng xe đua Công thức
      description: Chỉ định dòng hoặc hạng đua mà xe đua Công thức được chế tạo để
        tham gia.
    formulation_style:
      name: Dạng bào chế
      description: 'Làm nổi bật các công thức chuyên dụng được thiết kế cho các mục
        đích sử dụng hoặc sở thích cụ thể (ví dụ: Barista, Siêu kem).'
    formulation_type:
      name: Loại công thức
      description: Kiểu công thức của thuốc xịt khử trùng.
    fossil_preparation_level:
      name: Mức độ chuẩn bị hóa thạch
      description: 'Mức độ chuẩn bị/làm sạch được thực hiện trên mẫu vật (ví dụ: chưa
        được chuẩn bị trong ma trận so với đã được chuẩn bị đầy đủ).'
    fossil_preservation_type:
      name: Loại bảo tồn hóa thạch
      description: 'Loại bảo tồn hóa thạch (ví dụ: hóa thạch cứng, hóa thạch đúc,
        hóa thạch khuôn, hóa thạch dấu ấn).'
    fossil_restoration_status:
      name: Tình trạng phục hồi hóa thạch
      description: 'Cho biết mẫu vật đã được sửa chữa/phục hồi hay chưa và bằng cách
        nào (ví dụ: dán keo, tái tạo, ghép nối).'
    foundation_configuration:
      name: Cấu hình đế
      description: Chỉ định xem đế được sản xuất nguyên khối hay là bộ hai mảnh/chia
        đôi cho các kích thước nệm lớn hơn.
    foundation_profile:
      name: Kiểu dáng đế
      description: 'Phân loại chiều cao tổng thể của đế—ví dụ: siêu thấp, thấp, tiêu
        chuẩn hoặc cao—để người mua sắm có thể nhanh chóng lựa chọn chiều cao nệm
        và kích thước ga trải giường phù hợp.'
    frame_adjustability:
      name: Khả năng điều chỉnh của khung
      description: 'Cho biết khung có thể điều chỉnh được hay không và bằng cách nào
        (ví dụ: điều chỉnh chiều rộng/chiều cao, xoay/nghiêng), điều này ảnh hưởng
        đến tính tiện dụng và sự phù hợp của sản phẩm.'
    frame_drum_jingle_configuration:
      name: Cấu hình chuông khung
      description: Cho biết khung có bao gồm chuông hay không và nếu có, cấu hình
        chung là gì.
    frame_drum_tuning_system:
      name: Hệ thống điều chỉnh chuông khung
      description: Cách điều chỉnh chuông khung hoặc liệu nó có thể điều chỉnh được
        hay không.
    frame_finish:
      name: Lớp hoàn thiện khung
      description: Xác định lớp phủ bảo vệ hoặc vật liệu hoàn thiện được áp dụng cho
        khung, ảnh hưởng đến độ bền và tính thẩm mỹ.
    frame_mounting_standard:
      name: Tiêu chuẩn gắn khung
      description: 'Xác định thông số kỹ thuật giao diện giữa đế giày và khung (ví
        dụ: 195 mm 2 điểm, Trinity 3 điểm), rất quan trọng đối với khả năng tương
        thích của khung.'
    frame_steel_gauge:
      name: Độ dày thép khung
      description: Xác định độ dày (độ đo) của ống thép được sử dụng trong các thanh
        đứng của giá đỡ, một chỉ số quan trọng về độ bền và độ ổn định.
    frame_suspension_type:
      name: Loại hệ thống treo khung
      description: Cho biết thiết kế hệ thống treo của khung xe đạp, chẳng hạn như
        khung cứng, khung không có vách ngăn hoặc hệ thống treo toàn phần, để giúp
        người mua chọn khung phù hợp với cấu hình dự định của họ.
    free_reed_instrument_orientation:
      name: Hướng cầm/chơi nhạc cụ hơi
      description: Xác định cách cầm/chơi nhạc cụ (cầm tay với ống thổi, đeo vai,
        v.v.) để tối ưu hóa tính công thái học và lọc trường hợp sử dụng.
    free_weight_rack_type:
      name: Loại giá đỡ tạ tự do
      description: 'Phân loại kiểu dáng hoặc chức năng cấu trúc của giá đỡ (ví dụ:
        giá đỡ tạ đòn, giá đỡ tạ ấm, giá đỡ đĩa).'
    freehub_body_type:
      name: Loại thân trục tự do
      description: Xác định tiêu chuẩn thân trục tự do hoặc bộ truyền động líp được
        hỗ trợ bởi trục bánh sau xe đạp.
    freehub_driver_standard:
      name: Tiêu chuẩn trục bánh răng tự do
      description: 'Xác định giao diện líp/trục bánh răng mà bộ phận trục hỗ trợ (ví
        dụ: Shimano HG, SRAM XD).'
    freewheel_thread_standard:
      name: Tiêu chuẩn ren bánh răng tự do
      description: Chỉ định tiêu chuẩn hoặc kích thước ren trục mà bánh răng tự do
        tương thích.
    french_horn_bell_construction:
      name: Cấu tạo chuông kèn Pháp
      description: Chỉ định cách chế tạo chuông và liệu nó có thể tháo rời để vận
        chuyển/bảo dưỡng hay không.
    french_horn_bell_material:
      name: Chất liệu loa kèn của kèn thợ săn
      description: Chỉ định vật liệu/hợp kim của chuông (và thường là phần loe chuông)
        được sử dụng trên kèn Pháp.
    french_horn_bell_type:
      name: Loại chuông kèn Pháp
      description: Kiểu cấu tạo của chuông.
    french_horn_finish:
      name: Lớp hoàn thiện kèn Pháp
      description: Lớp hoàn thiện/mạ bên ngoài của nhạc cụ.
    french_horn_included_accessories:
      name: Phụ kiện đi kèm kèn Pháp
      description: Các phụ kiện đi kèm với kèn Pháp (hộp đựng, ống thổi, v.v.).
    french_horn_leadpipe_material:
      name: Chất liệu ống dẫn hơi chính của kèn French horn
      description: Chỉ định vật liệu/hợp kim của ống dẫn khí.
    french_horn_wrap_type:
      name: Kiểu quấn kèn Pháp
      description: Cấu hình/hình dạng tổng thể của kèn Pháp.
    fretboard_radius_fit:
      name: Độ phù hợp với bán kính cần đàn
      description: Cho biết độ cong của miếng đệm capo được thiết kế cho cần đàn phẳng
        hay cần đàn cong, hoặc có thể điều chỉnh để phù hợp với nhiều bán kính cần
        đàn khác nhau.
    friction_surface_included:
      name: Bề mặt ma sát đi kèm
      description: 'Cho biết bánh đà có bao gồm bề mặt ma sát có thể thay thế/lắp
        đặt (ví dụ: miếng chèn, vòng) hay là bề mặt ma sát liền khối.'
    fringe_curtain_finish:
      name: Lớp hoàn thiện rèm tua rua
      description: Mô tả lớp hoàn thiện trực quan của bề mặt tua rua (độ bóng/kết
        cấu).
    fringe_curtain_material:
      name: Vật liệu rèm tua rua
      description: 'Chỉ định vật liệu chính của các dải rèm (ví dụ: màng PET, nhựa,
        giấy, vải).'
    fringe_curtain_use_location:
      name: Vị trí sử dụng rèm tua rua
      description: Cho biết rèm tua rua được thiết kế để sử dụng trong nhà, ngoài
        trời, hoặc cả hai.
    fringe_trim_style:
      name: Kiểu viền tua rua
      description: Chỉ định cấu tạo/kiểu dáng của viền tua rua (cách các sợi hoặc
        vòng được tạo hình và trình bày).
    front_axle_standard:
      name: Tiêu chuẩn trục trước
      description: 'Liệt kê đường kính và khoảng cách trục mà càng xe được thiết kế
        để chấp nhận (ví dụ: 15 x 110 mm Boost), đảm bảo khả năng tương thích với
        trục bánh xe.'
    front_button_configuration:
      name: Cấu hình nút bấm phía trước
      description: Cho biết kiểu nút phía trước của áo khoác, chỉ rõ là kiểu một hàng
        nút hay hai hàng nút và số lượng nút phía trước.
    front_closure_style:
      name: Kiểu khóa phía trước
      description: Cho biết kiểu cấu tạo phía trước của áo khoác trench, chẳng hạn
        như một hàng nút hay hai hàng nút, mở, quấn hoặc khóa kéo.
    front_decoration_type:
      name: Loại trang trí phía trước
      description: 'Xác định loại trang trí hoặc miếng vá được gắn ở phía trước mũ
        (ví dụ: miếng vá thêu, miếng vá da).'
    front_point_configuration:
      name: Cấu hình mũi nhọn phía trước
      description: Chỉ định thiết kế của các mũi nhọn phía trước (một mũi nhọn, hai
        mũi nhọn, dạng mô-đun, có thể thay thế), ảnh hưởng đến độ chính xác xuyên
        thấu trên băng và địa hình hỗn hợp.
    front_seat_position:
      name: Vị trí ghế trước
      description: Vị trí ghế ngồi ở hàng ghế đầu.
    front_style:
      name: Kiểu dáng phía trước
      description: Mô tả cấu trúc phía trước của quần chinos, cho biết quần có kiểu
        dáng thẳng, xếp ly hay có chi tiết khác.
    frosting_or_icing_type:
      name: Loại kem phủ
      description: Chỉ định loại kem phủ được sử dụng cho bánh hoặc thanh tráng miệng.
    fruit_cultivar_or_variety:
      name: Giống hoặc loại trái cây
      description: 'Chỉ định tên giống hoặc loại cụ thể của trái cây (ví dụ: Gala,
        Granny Smith, Monthong, Cavendish).'
    fruit_cut_style:
      name: Kiểu cắt trái cây
      description: 'Mô tả cách chế biến hoặc cắt trái cây (ví dụ: để nguyên, thái
        lát, cắt hạt lựu).'
    fruit_mix_variety:
      name: Loại hỗn hợp trái cây
      description: 'Đặt tên cho hỗn hợp theo chủ đề hoặc loại chung của hỗn hợp trái
        cây (ví dụ: Hỗn hợp nhiệt đới, Hỗn hợp quả mọng).'
    fruit_piece_form:
      name: Hình dạng miếng trái cây
      description: 'Mô tả cách cắt hoặc trình bày các miếng trái cây sấy khô, ví dụ:
        để nguyên, thái lát, nghiền thành bột.'
    fruit_snack_form:
      name: Dạng kẹo dẻo trái cây
      description: Phân loại hình thức hoặc kiểu dáng trình bày món ăn nhẹ từ trái
        cây.
    fruit_topping_format:
      name: Định dạng lớp phủ trái cây
      description: Mô tả hình dạng, kết cấu hoặc kiểu dáng của lớp phủ để người mua
        sắm có thể lựa chọn giữa các loại nước sốt, siro, miếng trái cây lớn, hạt
        nổ, v.v.
    fruit_variety:
      name: Chủng loại trái cây
      description: 'Xác định loại trái cây chính được sử dụng cho công thức/bộ dụng
        cụ/nguyên liệu rượu trái cây (ví dụ: táo, anh đào, mâm xôi).'
    fuel_cap_gasket_seal_material:
      name: Vật liệu gioăng/vòng đệm nắp bình xăng
      description: Chỉ định vật liệu được sử dụng cho gioăng/vòng chữ O trên nắp bình
        xăng.
    fuel_cap_locking_mechanism:
      name: Cơ chế khóa nắp bình nhiên liệu
      description: Cho biết phương pháp khóa được sử dụng bởi nắp bình xăng có khóa.
    fuel_cap_type:
      name: Loại nắp bình nhiên liệu
      description: Chỉ định loại/thiết kế chức năng của nắp bình xăng được sử dụng
        cho cổ bình xăng của xe.
    fuel_cap_venting:
      name: Thông hơi nắp bình xăng
      description: Cho biết nắp bình xăng có thông hơi hay không và nếu có, kiểu thông
        hơi.
    fuel_filter_features:
      name: Đặc điểm bộ lọc nhiên liệu
      description: Liệt kê các đặc điểm chức năng đáng chú ý của bộ lọc nhiên liệu
        (tách nước, van xả, cổng cảm biến, v.v.).
    fuel_filter_media_material:
      name: Vật liệu lọc nhiên liệu
      description: Chỉ định vật liệu lọc chính được sử dụng bên trong lõi lọc nhiên
        liệu.
    fuel_filter_mounting_connection_type:
      name: Kiểu lắp/kết nối bộ lọc nhiên liệu
      description: Chỉ định cách kết nối/lắp đặt bộ lọc nhiên liệu (ren/xoay, kết
        nối nhanh, đầu nối ống, banjo, v.v.).
    fuel_injection_cleaning_method:
      name: Phương pháp làm sạch hệ thống phun nhiên liệu
      description: Cho biết cách sử dụng bộ dụng cụ để làm sạch hệ thống phun nhiên
        liệu.
    fuel_injector_electrical_connector_type:
      name: Loại đầu nối điện kim phun nhiên liệu
      description: Chỉ định tiêu chuẩn/hình dạng đầu nối điện kim phun.
    fuel_injector_seat_type:
      name: Loại đế kim phun nhiên liệu
      description: Chỉ định kiểu giao diện đầu/đế kim phun được sử dụng để làm kín
        tại đường ống nạp/đường dẫn nhiên liệu.
    fuel_injector_spray_pattern:
      name: Kiểu phun nhiên liệu của kim phun
      description: 'Xác định kiểu phun/phân phối nhiên liệu của kim phun bằng thuật
        ngữ của nhà sản xuất hoặc ngành (ví dụ: hình nón, hình quạt, tia hẹp, nhiều
        lỗ).'
    fuel_level_sensor_mounting_type:
      name: Loại lắp đặt cảm biến mức nhiên liệu
      description: Xác định giao diện lắp đặt vật lý được sử dụng để gắn cảm biến/bộ
        truyền tín hiệu mức nhiên liệu vào bình nhiên liệu hoặc mô-đun bơm.
    fuel_level_sensor_sensing_mechanism:
      name: Cơ chế cảm biến mức nhiên liệu
      description: Xác định cơ chế/công nghệ cảm biến được sử dụng để đo mức nhiên
        liệu trong cảm biến hoặc bộ truyền tín hiệu mức nhiên liệu.
    fuel_line_compliance_standard:
      name: Tiêu chuẩn tuân thủ đường ống nhiên liệu
      description: Xác định tiêu chuẩn quy định hoặc tiêu chuẩn ngành mà đường ống
        nhiên liệu đáp ứng (thường gặp trong các ứng dụng hàng hải).
    fuel_line_connector_interface_type:
      name: Loại giao diện đầu nối đường ống nhiên liệu
      description: Xác định kiểu kết nối/giao diện ở đầu (các đầu) của đường ống nhiên
        liệu hoặc phụ kiện.
    fuel_pressure_regulator_body_material:
      name: Vật liệu thân bộ điều chỉnh áp suất nhiên liệu
      description: Xác định vật liệu vỏ/thân bộ điều chỉnh để đảm bảo độ bền và khả
        năng chống ăn mòn.
    fuel_pressure_regulator_mounting_type:
      name: Loại lắp đặt bộ điều chỉnh áp suất nhiên liệu
      description: Xác định cách lắp đặt bộ điều chỉnh áp suất nhiên liệu, ảnh hưởng
        đến sự phù hợp và tương thích.
    fuel_pump_inlet_type:
      name: Loại đầu vào bơm nhiên liệu
      description: Kiểu kết nối tại đầu vào bơm.
    fuel_pump_mounting_location:
      name: Vị trí lắp đặt bơm nhiên liệu
      description: Vị trí lắp đặt bơm nhiên liệu trên/trong hệ thống nhiên liệu của
        xe.
    fuel_pump_outlet_connection_type:
      name: Loại kết nối đầu ra bơm nhiên liệu
      description: Xác định kiểu kết nối vật lý tại đầu ra bơm nhiên liệu để đảm bảo
        sự phù hợp/tương thích khi lắp đặt.
    fuel_system_application:
      name: Ứng dụng hệ thống nhiên liệu
      description: 'Kiến trúc hệ thống cung cấp nhiên liệu mà bơm nhiên liệu được
        thiết kế để hỗ trợ (ví dụ: bộ chế hòa khí, EFI, GDI, hệ thống nâng/chuyển
        nhiên liệu diesel).'
    fuel_system_connection_type:
      name: Loại kết nối hệ thống nhiên liệu
      description: Chỉ định tiêu chuẩn kết nối hệ thống nhiên liệu hoặc giao diện
        bộ chuyển đổi được bộ phụ kiện hỗ trợ.
    fuel_system_type:
      name: Loại hệ thống nhiên liệu
      description: 'Chỉ định hệ thống cung cấp nhiên liệu của động cơ (ví dụ: bộ chế
        hòa khí hoặc kiến trúc phun nhiên liệu).'
    fuel_tank_installation_position:
      name: Vị trí lắp đặt bình nhiên liệu
      description: Chỉ định vị trí lắp đặt điển hình của bình nhiên liệu trên xe.
    fuel_tank_orientation:
      name: Hướng lắp đặt bình nhiên liệu
      description: Chỉ định xem bình nhiên liệu được thiết kế để lắp đặt theo chiều
        ngang hay chiều dọc.
    fuel_tank_shape:
      name: Hình dạng bình nhiên liệu
      description: Mô tả hình dạng tổng thể của bình nhiên liệu để hỗ trợ việc lắp
        đặt và thay thế phù hợp.
    fur_type:
      name: Loại lông thú
      description: Xác định loài hoặc chất liệu giả lông thú ở bên ngoài túi hoặc
        bao tay giữ ấm.
    furniture_finish:
      name: Hoàn thiện bề mặt đồ nội thất
      description: Mô tả phương pháp xử lý bề mặt hoặc lớp hoàn thiện được áp dụng
        cho đồ nội thất, ảnh hưởng đến vẻ ngoài và yêu cầu bảo trì của nó.
    fuse_form_factor:
      name: Kiểu dáng thiết kế của cầu chì
      description: 'Chỉ định kiểu dáng/kích thước vật lý của cầu chì để đảm bảo nó
        phù hợp với hộp cầu chì hoặc khối cầu chì dự định (ví dụ: dạng lưỡi dao so
        với dạng hộp).'
    fuse_terminal_or_mount_style:
      name: Kiểu đầu nối hoặc lắp đặt cầu chì
      description: Xác định cách cầu chì kết nối cơ học/điện (cắm vào, bắt vít hoặc
        nối tiếp).
    fusible_application_method:
      name: Phương pháp gắn keo dựng
      description: 'Xác định cách kích hoạt/ứng dụng chất kết dính nhiệt (ví dụ: ủi,
        ép nhiệt, gia cố bằng đường may).'
    fusible_hem_tape_application_method:
      name: Phương pháp ứng dụng băng keo viền nhiệt
      description: 'Mô tả cách kích hoạt/ứng dụng băng keo (ví dụ: ủi, ép nhiệt).'
    fusible_seam_tape_activation_method:
      name: Phương pháp kích hoạt băng keo dán đường may
      description: Cho biết cách chất kết dính được kích hoạt trong quá trình ứng
        dụng.
    fusible_seam_tape_application:
      name: Ứng dụng băng keo đường may nhiệt
      description: Xác định trường hợp sử dụng chính của băng keo đường may nhiệt.
    fusible_seam_tape_material:
      name: Chất liệu băng keo đường may nhiệt
      description: Chất liệu hoặc thành phần của băng keo/vải/lớp nền (không phải
        vải mà nó liên kết).
    fusible_seam_tape_washability:
      name: Khả năng giặt của băng keo đường may nhiệt
      description: Cho biết đường may đã dán có còn nguyên vẹn sau khi giặt hoặc làm
        sạch hay không.
    fusible_seam_tape_waterproof_rating:
      name: Xếp hạng chống thấm nước của băng keo đường may nhiệt
      description: Cho biết băng keo đường may có mục đích tạo ra đường may chống
        thấm nước hoặc kháng nước sau khi ứng dụng hay không.
    fusible_tape_backing_type:
      name: Loại lớp lót băng keo nhiệt
      description: Xác định xem băng keo có lớp giấy/lớp lót bảo vệ hay không và hình
        dạng của lớp giấy/lớp lót đó, điều này ảnh hưởng đến việc xử lý và ứng dụng.
    futon_frame_conversion_mechanism:
      name: Cơ chế chuyển đổi khung ghế sofa
      description: Xác định cơ chế hoặc kiểu cấu trúc được sử dụng để chuyển đổi khung
        giữa vị trí ghế sofa, ghế dài và giường.
    gaiter_height_type:
      name: Loại chiều cao ống quần
      description: Phân loại ống quần theo chiều cao che phủ chân, chẳng hạn như mắt
        cá chân, giữa bắp chân, đến đầu gối hoặc đến đùi.
    game_variation:
      name: Biến thể trò chơi
      description: 'Xác định kiểu chơi mà bộ trò chơi được thiết kế (ví dụ: bóng ném
        dây cổ điển, quần vợt dây, bóng ném tốc độ).'
    garlic_preparation_style:
      name: Kiểu chế biến tỏi
      description: 'Xác định cách tỏi được chế biến trước khi bán (ví dụ: nguyên củ,
        băm nhỏ, nghiền thành bột).'
    garlic_variety:
      name: Giống tỏi
      description: Xác định giống/loại tỏi thương mại hoặc thực vật được cung cấp.
    garment_back_style:
      name: Kiểu lưng áo
      description: 'Xác định thiết kế hoặc cấu trúc của phần lưng áo (ví dụ: lưng
        hở, lưng kiểu racerback, lưng chéo).'
    garment_pattern_type:
      name: Loại mẫu may
      description: Xác định loại quần áo mà mẫu may này dùng để may.
    garnish_type:
      name: Loại trang trí
      description: Xác định loại đồ trang trí (thành phần hoặc kiểu trang trí) được
        sử dụng để hoàn thiện một ly cocktail.
    gas_lift_class:
      name: Cấp độ nâng bằng khí nén
      description: Xác định xếp hạng an toàn và độ bền của xi lanh nâng bằng khí nén
        được sử dụng để điều chỉnh độ cao ghế.
    gas_propellant_type:
      name: Loại khí đẩy
      description: Xác định loại khí đẩy được khuyến nghị hoặc tương thích khi súng
        bắn bi sử dụng khí nén.
    gatta_tabla_tuning_block_material:
      name: Chất liệu của khối chỉnh âm (gatta)
      description: Chất liệu của khối chỉnh âm (gatta) được sử dụng giữa dây đeo chỉnh
        âm và vỏ.
    gauge_mounting_type:
      name: Kiểu lắp đặt đồng hồ đo
      description: Cách lắp đặt đồng hồ đo nhiên liệu trên phương tiện đường thủy.
    gauge_style:
      name: Kiểu dáng đồng hồ đo
      description: Xác định loại đồng hồ đo áp suất mà bơm sử dụng, chẳng hạn như
        mặt số analog, màn hình hiển thị kỹ thuật số hoặc không có.
    gear_oil_api_classification:
      name: Phân loại dầu hộp số API
      description: Phân loại API GL cho dầu hộp số được sử dụng trong bộ vi sai/hộp
        số sàn.
    gel_wax_density_grade:
      name: Cấp độ mật độ của sáp gel
      description: Cho biết cấp độ mật độ của sáp gel, ảnh hưởng đến độ trong suốt,
        lượng hương thơm và sự phù hợp để nhúng.
    gel_wax_transparency_level:
      name: Độ trong suốt của sáp gel
      description: Mô tả độ trong/mờ của sáp gel khi sử dụng đúng cách.
    gelatin_form:
      name: Dạng gelatin
      description: Mô tả hình thức vật lý của gelatin để người dùng có thể chọn dạng
        phù hợp cho công thức nấu ăn và ứng dụng công nghiệp.
    gelatin_or_gelling_agent_source:
      name: Nguồn gốc gelatin hoặc chất tạo đông
      description: Cho biết nguồn gốc hoặc loại chất tạo đông được sử dụng trong sản
        phẩm, quan trọng đối với các cân nhắc về chế độ ăn uống và tôn giáo.
    gelatin_source:
      name: Nguồn gốc gelatin
      description: Cho biết nguồn gốc động vật, thực vật hoặc tổng hợp của gelatin
        để người mua sắm có thể xác minh tính tương thích với các yêu cầu về chế độ
        ăn uống, đạo đức hoặc tôn giáo.
    gelling_agent:
      name: Chất tạo đông
      description: Xác định chất chính được sử dụng để làm đông hoặc làm đặc món tráng
        miệng, quan trọng đối với sự phù hợp về chế độ ăn uống và kết cấu.
    gemstone_clarity_grade:
      name: Cấp độ tinh khiết của đá quý
      description: Cấp độ tinh khiết của đá quý (khi được phân loại).
    gemstone_creation_method:
      name: Phương pháp tạo đá quý
      description: Cho biết đá quý là tự nhiên, được tạo ra trong phòng thí nghiệm
        hay là hàng giả/mô phỏng.
    gemstone_cut_style:
      name: Kiểu cắt đá quý
      description: Mô tả kiểu cắt/hoàn thiện của mẫu đá quý.
    gemstone_treatment_status:
      name: Tình trạng xử lý đá quý
      description: Cho biết đá quý đã được xử lý/cải thiện hay chưa và bằng cách nào.
    geological_period:
      name: Kỷ địa chất
      description: 'Thời kỳ địa chất (và tùy chọn là kỷ) của hóa thạch khi biết (ví
        dụ: Jura, Phấn trắng, Eocen).'
    gift_box_tin_insert_type:
      name: Loại khay/vật liệu lót bên trong hộp quà
      description: Cấu hình khay/vật liệu lót bên trong để sắp xếp/bảo vệ các vật
        phẩm bên trong hộp/vật liệu lót.
    gift_box_tin_sustainability_features:
      name: Đặc điểm bền vững của hộp quà/hộp thiếc
      description: Các đặc điểm liên quan đến tính bền vững của bao bì hộp quà/hộp
        thiếc.
    gift_box_tin_window_type:
      name: Loại ô cửa sổ kính/nhựa trên hộp quà hoặc hộp thiếc
      description: Hộp quà có cửa sổ trưng bày hay không và kiểu dáng của cửa sổ đó.
    gift_message_option:
      name: Tùy chọn tin nhắn quà tặng
      description: Chỉ định xem có thể kèm theo tin nhắn/ghi chú quà tặng hay không
        và cách thức (không có, có, tùy chỉnh).
    ginger_maturity:
      name: Độ chín của gừng
      description: Cho biết giai đoạn thu hoạch của gừng, chẳng hạn như gừng non hoặc
        gừng chín, điều này ảnh hưởng đến cường độ hương vị và các ứng dụng ẩm thực
        ưa thích.
    ginger_variety:
      name: Giống gừng
      description: Chỉ định giống, loại hoặc củ liên quan trong họ gừng để phân biệt
        các đặc điểm hương vị và công dụng ẩm thực.
    glass_kiln_controller_type:
      name: Loại bộ điều khiển lò nung thủy tinh
      description: Loại bộ điều khiển nhiệt độ/nung đi kèm với lò nung.
    glass_kiln_firing_application:
      name: Ứng dụng nung thủy tinh
      description: Ứng dụng chế tác thủy tinh chính mà lò nung được thiết kế.
    glass_stone_application_method:
      name: Phương pháp gắn đá thủy tinh
      description: 'Chỉ định cách thức gắn/ứng dụng đá thủy tinh trong các dự án (ví
        dụ: dán keo, dán nhiệt, may).'
    glass_tint:
      name: Màu thủy tinh
      description: Màu thủy tinh/nhựa được sử dụng cho chai để kiểm soát độ tiếp xúc
        với ánh sáng (thường gặp trong sản xuất bia/rượu vang).
    glaze_firing_atmosphere:
      name: Môi trường nung men
      description: Môi trường nung mà men được thiết kế cho.
    glaze_opacity:
      name: Độ mờ của men
      description: Độ trong suốt của men sau khi nung.
    glaze_product_form:
      name: Dạng sản phẩm men gốm
      description: 'Dạng vật lý của sản phẩm men (ví dụ: dạng lỏng, dạng bột khô,
        dạng cô đặc, dạng xịt).'
    glider_avionics_package:
      name: Gói thiết bị điện tử hàng không cho tàu lượn
      description: Cho biết mức độ tổng thể của thiết bị điều hướng và bay được lắp
        đặt trong tàu lượn.
    glider_certification_rating:
      name: Xếp hạng chứng nhận tàu lượn
      description: 'Hạng chứng nhận chính thức biểu thị mức độ an toàn và hiệu suất
        của tàu lượn (ví dụ: EN-A, EN-B).'
    glider_landing_gear_configuration:
      name: Cấu hình càng hạ cánh của tàu lượn
      description: Chỉ định cấu hình càng hạ cánh được sử dụng bởi tàu lượn.
    glider_launch_method:
      name: Phương pháp cất cánh tàu lượn
      description: Chỉ định cách thức tàu lượn thường được cất cánh hoặc tự cất cánh.
    glider_performance_class:
      name: Hạng hiệu suất tàu lượn
      description: Hạng hoặc loại hình thi đấu/hiệu suất thường được sử dụng cho tàu
        lượn.
    glitter_application_method:
      name: Phương pháp phủ kim tuyến
      description: 'Chỉ rõ kỹ thuật dự định để sử dụng kim tuyến thủ công (ví dụ:
        rắc/lắc, trộn, chà xát, thoa lên chất kết dính, quét, xịt, làm khô bằng nhiệt/dập
        nổi).'
    glitter_eco_friendly_claim:
      name: Tuyên bố về tính thân thiện với môi trường của kim tuyến
      description: Các tuyên bố về môi trường/sinh thái dành riêng cho các công thức
        kim tuyến dạng bột.
    glitter_effect_type:
      name: Loại hiệu ứng lấp lánh
      description: 'Mô tả hiệu ứng thị giác của kim tuyến/hạt lấp lánh ngoài màu nền
        (ví dụ: ba chiều, óng ánh).'
    glitter_glue_base_solvent_type:
      name: Loại dung môi/chất nền keo kim tuyến
      description: Mô tả chất nền chính của keo kim tuyến (mối quan tâm phổ biến của
        người mua sắm về việc làm sạch và khả năng tương thích vật liệu).
    glitter_opacity_coverage:
      name: Độ mờ/độ che phủ của kim tuyến
      description: Cho biết độ mờ của hiệu ứng kim tuyến khi được phủ lên.
    glitter_use_suitability:
      name: Tính phù hợp khi sử dụng kim tuyến
      description: 'Cho biết bối cảnh sử dụng chính được dự định hoặc được phê duyệt
        cho bột kim tuyến (ví dụ: chỉ sử dụng cho thủ công, loại mỹ phẩm/an toàn cho
        cơ thể, hoặc an toàn thực phẩm).'
    glove_armor_placement:
      name: Vị trí giáp bảo vệ găng tay
      description: Xác định vị trí của giáp bảo vệ trên găng tay.
    glove_cuff_length:
      name: Chiều dài cổ tay găng tay
      description: Cho biết kiểu chiều dài che phủ cổ tay/găng tay đua xe ở cổ tay/cẳng
        tay.
    glove_finger_coverage:
      name: Độ che phủ ngón tay của găng tay
      description: Mô tả mức độ che phủ ngón tay của găng tay, từ thiết kế kín ngón
        đến thiết kế hở ngón.
    glove_finger_design:
      name: Kiểu thiết kế ngón tay của găng tay
      description: Chỉ định cấu hình ngón tay của găng tay, chẳng hạn như năm ngón
        hoặc kiểu găng tay hở ngón.
    glove_fit_profile:
      name: Hồ sơ độ vừa vặn của găng tay
      description: Mô tả hình dạng bên trong và hình dáng tổng thể của găng tay để
        người chơi có thể chọn cảm giác ưa thích.
    glove_insulation:
      name: Lớp cách nhiệt của găng tay
      description: 'Xác định lớp cách nhiệt/cấu trúc nhiệt hoặc hệ thống sưởi của
        găng tay (ví dụ: mức độ cách nhiệt, lớp lót/công nghệ cách nhiệt hoặc loại
        có sưởi).'
    glove_palm_material:
      name: Chất liệu lòng bàn tay
      description: Xác định chất liệu chính được sử dụng trên lòng bàn tay (bề mặt
        tiếp xúc/cầm nắm chính), có thể khác với mu bàn tay.
    glove_size:
      name: Kích cỡ găng tay
      description: Cho biết kích cỡ bàn tay chung mà găng tay được thiết kế để vừa
        vặn, thường được thể hiện bằng mã kích cỡ kiểu quần áo hoặc kích cỡ dành cho
        trẻ em.
    glove_webbing_style:
      name: Kiểu lưới găng tay
      description: Xác định thiết kế của lưới hoặc túi găng tay, ảnh hưởng đến khả
        năng kiểm soát bóng, sự phù hợp với vị trí và sở thích của người chơi.
    glow_effect:
      name: Hiệu ứng phát sáng
      description: Cho biết liệu bóng gel có tính năng phát sáng trong bóng tối hoặc
        có khả năng theo dõi đường đi của bóng trong điều kiện ánh sáng yếu hay không.
    glow_plug_connector_type:
      name: Loại đầu nối bugi đánh lửa
      description: Kiểu đầu nối/cực điện trên bugi đánh lửa được sử dụng để kết nối
        với hệ thống dây điện của xe.
    glow_plug_heating_element_type:
      name: Loại bộ phận gia nhiệt bugi đánh lửa
      description: Loại/công nghệ của bộ phận gia nhiệt được sử dụng bởi bugi đánh
        lửa.
    glue_application_format:
      name: Định dạng bôi keo
      description: Xác định định dạng dụng cụ/phân phối được sử dụng để bôi keo học
        sinh.
    glue_applicator_type:
      name: Loại dụng cụ bôi keo
      description: Xác định kiểu đầu bôi/phân phối tích hợp được sử dụng để bôi keo
        lỏng.
    glue_base_formulation:
      name: Thành phần cơ bản của keo
      description: Xác định công thức hóa học/cơ bản chính của keo lỏng thủ công (cho
        hiệu suất, an toàn và kỳ vọng về việc làm sạch).
    glue_gun_nozzle_style:
      name: Kiểu đầu vòi súng bắn keo
      description: Xác định kiểu đầu vòi súng bắn keo, ảnh hưởng đến độ chính xác
        khi bôi keo và độ phủ keo.
    glue_safety_standard:
      name: Tiêu chuẩn an toàn của keo
      description: Cho biết liệu keo có không độc hại / an toàn cho trẻ em theo nhãn
        mác và các tiêu chuẩn thông thường hay không.
    goal_frame_material:
      name: Vật liệu khung thành
      description: Xác định vật liệu của cột/khung thành, ảnh hưởng đến trọng lượng,
        tính di động và khả năng chống chịu thời tiết.
    goal_size:
      name: Kích thước khung thành
      description: Phân loại khung thành bóng đá vào các nhóm kích thước tiêu chuẩn
        hoặc kích thước huấn luyện để lựa chọn nhanh hơn so với chỉ dựa vào kích thước
        thô.
    goal_size_classification:
      name: Phân loại kích thước khung thành
      description: 'Chỉ định loại kích thước tiêu chuẩn của khung thành (ví dụ: kích
        thước tiêu chuẩn, trẻ em, mini) để người dùng có thể nhanh chóng chọn thiết
        bị phù hợp với trình độ chơi của mình.'
    goal_size_standard:
      name: Tiêu chuẩn kích thước khung thành
      description: 'Cho biết khung thành đáp ứng tiêu chuẩn chính thức hoặc nhóm tuổi
        nào (ví dụ: tiêu chuẩn của Liên đoàn Thể thao dưới nước Thế giới, 12U).'
    goalie_configuration:
      name: Cấu hình thủ môn
      description: Cho biết số lượng thủ môn mỗi bên được cấu hình trên bảng (kiểu
        Mỹ 3 thủ môn so với kiểu Châu Âu 1 thủ môn).
    goalie_playing_surface:
      name: Bề mặt sân thi đấu của thủ môn
      description: Chỉ định bề mặt hoặc môi trường chơi chính mà bộ dụng cụ thủ môn
        khúc côn cầu được thiết kế.
    goalkeeper_glove_cut:
      name: Kiểu cắt của găng tay thủ môn
      description: Cho biết kiểu cấu tạo lòng bàn tay/ngón tay (kiểu cắt) của găng
        tay thủ môn, ảnh hưởng đến độ vừa vặn, cảm giác bóng và khả năng kiểm soát.
    goalkeeper_training_aid_type:
      name: Loại thiết bị hỗ trợ tập luyện cho thủ môn
      description: Xác định kiểu dụng cụ hỗ trợ huấn luyện thủ môn, cho phép lọc chính
        xác.
    goblet_drum_playing_style:
      name: Kiểu chơi trống cốc
      description: Cho biết nhạc cụ được thiết kế chủ yếu để chơi bằng tay hay sử
        dụng với dùi/gõ.
    gobo_format:
      name: Định dạng Gobo
      description: Xác định kích thước/tiêu chuẩn gobo mà máy chiếu chấp nhận (đường
        kính và độ dày), đảm bảo khả năng tương thích với gobo thay thế/tùy chỉnh.
    gobo_root_variety:
      name: Loại rễ Gobo
      description: Xác định giống hoặc loại rễ gobo (cây ngưu bàng) cụ thể.
    gobo_rotation:
      name: Khả năng xoay của Gobo
      description: Xác định xem gobo có thể xoay được hay không và hướng xoay được
        hỗ trợ.
    goggle_accessory_type:
      name: Loại phụ kiện kính bảo hộ
      description: 'Phân loại loại phụ kiện (ví dụ: vỏ, hộp đựng, dây đeo) để người
        mua sắm có thể lọc các sản phẩm đa dạng trong danh mục này.'
    goggle_features:
      name: Tính năng của kính bảo hộ
      description: Liệt kê các tính năng chức năng hoặc thiết kế đặc biệt được cung
        cấp bởi kính bảo hộ.
    goggle_fit_design:
      name: Thiết kế vừa vặn của kính bảo hộ
      description: Mô tả cách kính bảo hộ được thiết kế để vừa vặn hoặc đeo, bao gồm
        cả khả năng tương thích với OTG (đeo ngoài kính mắt).
    goggle_gasket_material:
      name: Chất liệu gioăng kính bảo hộ
      description: Chất liệu của gioăng tiếp xúc với mặt, ảnh hưởng đến sự thoải mái,
        vấn đề dị ứng và khả năng chống rò rỉ.
    goggle_integration:
      name: Khả năng tích hợp kính bảo hộ
      description: Mũ bảo hiểm có được thiết kế để sử dụng với kính bảo hộ và/hoặc
        có tích hợp các tính năng giữ kính bảo hộ hay không.
    goggle_lens_shape:
      name: Hình dạng tròng kính bảo hộ
      description: 'Xác định hình dạng cong của tròng kính thay thế, ảnh hưởng đến
        độ méo hình và tầm nhìn (ví dụ: hình trụ, hình cầu, hình xuyến).'
    goggle_lens_tint:
      name: Màu sắc tròng kính bảo hộ
      description: Xác định màu sắc hoặc lớp phủ của tròng kính, ảnh hưởng đến khả
        năng truyền ánh sáng, nhận biết màu sắc và vẻ ngoài thẩm mỹ.
    goggle_strap_material:
      name: Chất liệu dây đeo kính bảo hộ
      description: Chất liệu chính được sử dụng cho dây đeo đầu, ảnh hưởng đến độ
        bền và sự thoải mái.
    golf_accessory_set_purpose:
      name: Mục đích sử dụng bộ phụ kiện golf
      description: Xác định mục đích sử dụng chính hoặc chủ đề của bộ phụ kiện golf.
    golf_bag_style:
      name: Kiểu dáng túi golf
      description: 'Cho biết kiểu dáng thiết kế hoặc ứng dụng chính của túi golf (ví
        dụ: túi đứng, túi xe đẩy, túi xách tay).'
    golf_ball_alignment_design:
      name: Thiết kế căn chỉnh bóng golf
      description: Chỉ định bất kỳ công cụ hỗ trợ căn chỉnh trực quan nào được in
        hoặc đúc trên bề mặt bóng.
    golf_ball_construction:
      name: Cấu tạo bóng golf
      description: Chỉ định số lớp/mảnh được sử dụng trong cấu tạo của bóng golf,
        ảnh hưởng đến độ xoáy, cảm giác và khoảng cách.
    golf_ball_cover_material:
      name: Chất liệu vỏ bóng golf
      description: Xác định chất liệu vỏ ngoài của bóng golf, ảnh hưởng đến độ xoáy,
        độ bền và cảm giác khi đánh.
    golf_cart_cover_climate_use:
      name: Điều kiện khí hậu sử dụng của vỏ xe golf
      description: Cho biết điều kiện khí hậu/mùa chính mà vỏ xe được thiết kế để
        chịu được.
    golf_cart_enclosure_fit_type:
      name: Loại khớp nối của vỏ xe golf
      description: Xác định xem vỏ xe được thiết kế cho số lượng/hình dạng ghế cụ
        thể hay có thể điều chỉnh/phù hợp với nhiều loại xe.
    golf_cart_intended_use:
      name: Mục đích sử dụng xe golf
      description: Mục đích sử dụng chính mà xe golf được thiết kế hoặc cấu hình.
    golf_club_number:
      name: Số gậy golf
      description: 'Xác định số cụ thể hoặc ký hiệu gậy wedge được in trên gậy (ví
        dụ: 5, PW, GW).'
    golf_club_part_type:
      name: Loại phụ tùng gậy golf
      description: 'Phân loại phụ kiện hoặc linh kiện gậy golf thành các loại phụ
        phổ biến (ví dụ: ống nối, vòng đệm, trọng lượng).'
    golf_grip_size:
      name: Kích thước tay cầm gậy golf
      description: Xác định loại kích thước bên ngoài tổng thể của tay cầm gậy golf,
        cho biết độ dày của tay cầm khi cầm.
    golf_shoe_spike_type:
      name: Loại đinh giày golf
      description: 'Xác định loại hệ thống lực kéo được sử dụng trên đế ngoài của
        giày golf (ví dụ: có đinh hoặc không đinh).'
    golf_tee_style:
      name: Kiểu dáng cọc đặt bóng golf
      description: Mô tả kiểu dáng/thiết kế cấu trúc hoặc chức năng của tee golf,
        ảnh hưởng đến độ cao của bóng, độ bền hoặc khả năng giảm độ xoáy.
    golf_training_focus:
      name: Trọng tâm huấn luyện golf
      description: Phân loại kỹ năng hoặc khía cạnh chính mà sản phẩm hướng đến cải
        thiện.
    golf_training_objective:
      name: Mục tiêu huấn luyện golf
      description: Xác định kỹ năng hoặc khía cạnh chơi golf chính mà thiết bị hỗ
        trợ tập luyện hướng tới cải thiện.
    gong_profile_type:
      name: Loại hình cồng chiêng
      description: 'Mô tả hình dạng vật lý của cồng chiêng opera (ví dụ: tâm phẳng
        so với tâm nhô cao), yếu tố ảnh hưởng mạnh đến âm thanh và phong cách chơi.'
    grading_scale:
      name: Thang điểm
      description: 'Thang điểm được sử dụng trên đồng xu vàng thỏi được phân loại
        (ví dụ: Sheldon 1–70).'
    grading_service:
      name: Dịch vụ phân loại
      description: 'Dịch vụ phân loại/chứng nhận của bên thứ ba cho đồng xu hoặc tiền
        giấy (ví dụ: PCGS, NGC).'
    graduation_increment:
      name: Bước chia độ
      description: Xác định vạch chia nhỏ nhất được in/khắc trên thang đo độ dày đường
        may (độ phân giải của các vạch).
    grain_processing_method:
      name: Phương pháp chế biến hạt ngũ cốc
      description: 'Xác định phương pháp chế biến chính được áp dụng cho hạt ngũ cốc
        (ví dụ: luộc sơ, cán, nảy mầm), ảnh hưởng đến thời gian nấu, kết cấu và dinh
        dưỡng.'
    grand_piano_soundboard_material:
      name: Chất liệu tấm cộng hưởng âm của đàn đại cầm
      description: Vật liệu chính được sử dụng cho bảng cộng hưởng của đàn piano,
        ảnh hưởng đến âm thanh và độ bền.
    grappling_dummy_pose:
      name: Tư thế hình nộm tập luyện
      description: Mô tả tư thế/vị trí mặc định của hình nộm, xác định các bài tập
        và kỹ thuật mà nó hỗ trợ.
    grease_application:
      name: Bôi mỡ bôi trơn
      description: Chỉ định bộ phận chính của xe hoặc trường hợp sử dụng chính mà
        mỡ bôi trơn được dành cho.
    grease_consistency_grade_nlgi:
      name: Cấp độ đặc của mỡ bôi trơn (NLGI)
      description: 'Chỉ định chỉ số độ đặc NLGI cho biết độ cứng của mỡ bôi trơn (ví
        dụ: NLGI 2 là loại đa dụng thông dụng).'
    grease_thickener_type:
      name: Loại chất làm đặc mỡ bôi trơn
      description: Xác định hệ thống chất làm đặc/xà phòng được sử dụng trong công
        thức mỡ bôi trơn.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Loại van ống thổi kèn túi Great Highland
      description: Chỉ định hệ thống van một chiều được sử dụng trong ống thổi.
    great_highland_bagpipes_drone_configuration:
      name: Cấu hình ống thổi kèn túi Great Highland
      description: Chỉ định các loại ống thổi có trong bộ.
    great_highland_bagpipes_mounting_material:
      name: Vật liệu gắn kèn túi Great Highland
      description: 'Chỉ định vật liệu của các bộ phận trang trí trên kèn túi (ví dụ:
        bạc niken, ngà voi giả).'
    greens_maturity_stage:
      name: Giai đoạn trưởng thành của cỏ xanh
      description: Cho biết giai đoạn phát triển của cỏ xanh khi thu hoạch.
    greens_preparation_state:
      name: Tình trạng chuẩn bị rau xanh
      description: 'Mô tả cách rau lá xanh được chế biến hoặc đóng gói (ví dụ: đã
        rửa sạch, thái nhỏ, sẵn sàng để ăn).'
    grenade_effect_type:
      name: Loại hiệu ứng lựu đạn
      description: 'Cho biết hiệu ứng chức năng chính được tạo ra bởi lựu đạn sơn
        khi được kích hoạt (ví dụ: khói, sơn, lựu đạn gây choáng).'
    grid_unit:
      name: Đơn vị lưới
      description: Hệ thống đo lường chính được in trên thảm (nếu có lưới/thang đo).
    grille_emblem_provision:
      name: Điều khoản về biểu tượng lưới tản nhiệt
      description: Chỉ định xem lưới tản nhiệt có hỗ trợ biểu tượng/huy hiệu OEM hay
        không và cách thức.
    grille_mounting_method:
      name: Phương pháp gắn lưới tản nhiệt
      description: 'Chỉ định cách lắp đặt lưới tản nhiệt lên xe (ví dụ: thay thế trực
        tiếp so với chèn/phủ lên; bắt vít so với kẹp/khóa; cần khoan so với không
        cần khoan).'
    grille_style:
      name: Kiểu lưới tản nhiệt
      description: Chỉ định kiểu dáng/thiết kế trực quan của lưới tản nhiệt xe.
    grip_chalk_form:
      name: Hình dạng phấn bám
      description: Xác định hình dạng vật lý của phấn được cung cấp hoặc sử dụng kèm
        với túi.
    grip_coverage:
      name: Độ bám
      description: Xác định sự hiện diện và vị trí của các yếu tố bám bằng silicon
        hoặc cao su trên tất.
    grip_design:
      name: Thiết kế tay cầm
      description: Xác định cấu hình tay cầm hoặc lỗ trên tấm để dễ dàng mang theo
        và linh hoạt trong các bài tập.
    grip_enhancer_effect:
      name: Hiệu quả tăng cường độ bám
      description: 'Mô tả tính năng hiệu suất chính mà sản phẩm cung cấp (ví dụ: khả
        năng hút ẩm hoặc lớp phủ nhựa dính).'
    grip_enhancer_form:
      name: Dạng sản phẩm tăng độ bám
      description: Xác định hình thức hoặc định dạng vật lý của sản phẩm tăng cường
        độ bám để vận động viên có thể lựa chọn phương pháp ứng dụng phù hợp.
    grip_features:
      name: Đặc điểm tay cầm
      description: Cho biết các đặc điểm tay cầm/cầm nắm tích hợp nhằm cải thiện độ
        bám, sự thoải mái hoặc khả năng kiểm soát trong khi chơi.
    grip_material:
      name: Chất liệu tay cầm
      description: Xác định chất liệu được sử dụng cho bề mặt tay cầm của quần.
    grip_shape:
      name: Hình dạng tay cầm
      description: Mô tả hình dạng hoặc kiểu dáng mặt cắt ngang của tay cầm, đặc biệt
        quan trọng đối với tay cầm gậy putt.
    grip_surface_type:
      name: Loại bề mặt bám tay
      description: Mô tả thiết kế bề mặt tiếp xúc/độ ma sát của mặt bàn đạp ảnh hưởng
        đến độ bám và cảm giác.
    grip_tackiness_level:
      name: Độ bám dính của tay cầm
      description: Đánh giá độ bám dính của bề mặt tay cầm, giúp người chơi lựa chọn
        giữa cảm giác khô ráo và khả năng kiểm soát siêu bám dính.
    grip_tape_form:
      name: Định dạng băng nhám trượt ván
      description: 'Cho biết hình thức đóng gói của sản phẩm băng dính tay cầm (ví
        dụ: tấm, cuộn, bộ xịt).'
    grip_wax_form:
      name: Dạng sáp bám dính
      description: Phân loại dạng vật lý của sáp bám dính được bán.
    gripper_coverage:
      name: Độ che phủ của bề mặt chống trượt
      description: Chỉ định kiểu dáng của miếng bám trên giày không trơn trượt, cho
        biết độ phủ bề mặt và khả năng tháo rời.
    grommet_application_material:
      name: Chất liệu ứng dụng khoen
      description: 'Chất liệu chính mà khoen được thiết kế để lắp đặt vào (ví dụ:
        vải, da, vinyl, bạt/vải bố).'
    grommet_duty_rating:
      name: Xếp hạng độ bền của gioăng
      description: Cho biết độ bền/lớp sử dụng dự định của gioăng.
    grommet_style:
      name: Kiểu gioăng
      description: Kiểu cấu tạo của bộ gioăng (cách lắp ráp/sử dụng).
    grooming_glove_texture_type:
      name: Loại kết cấu găng tay chải chuốt
      description: Xác định kết cấu bề mặt chính được sử dụng để chải chuốt, cho biết
        mục đích sử dụng như chà xát, đánh bóng hoặc rửa.
    groove_orientation:
      name: Hướng rãnh
      description: Mô tả hướng/bố cục của các rãnh hoặc gờ trên nhạc cụ.
    groove_sampler_onboard_effects:
      name: Hiệu ứng tích hợp trên bộ lấy mẫu rãnh
      description: Cho biết các loại xử lý hiệu ứng tích hợp có sẵn trên bộ lấy mẫu
        rãnh (insert/master), chẳng hạn như hồi âm, độ trễ, nén, méo tiếng, EQ, lọc.
    groove_sampler_storage_expansion_type:
      name: Loại mở rộng bộ nhớ bộ lấy mẫu rãnh
      description: Chỉ định các tùy chọn lưu trữ có thể tháo rời/mở rộng được hỗ trợ
        bởi bộ lấy mẫu rãnh.
    ground_attachment_method:
      name: Phương pháp cố định xuống đất
      description: Mô tả cách vòng cung truyền được cố định vào bề mặt chơi, ảnh hưởng
        đến độ ổn định và khả năng tương thích bề mặt.
    groupset_components_included:
      name: Các thành phần đi kèm trong bộ truyền động xe đạp
      description: Liệt kê các thành phần truyền động cụ thể được bao gồm trong bộ
        sản phẩm để khách hàng hiểu rõ nội dung gói sản phẩm.
    gt_racing_class:
      name: Hạng đua GT
      description: Xác định hạng mục/lớp GT mà xe được chế tạo hoặc được chứng nhận.
    guard_construction_type:
      name: Kiểu kết cấu của bộ phận bảo vệ
      description: Loại bảo vệ là loại vỏ cứng, miếng đệm mềm, hay kiểu ống tay/dây
        đeo.
    guard_size_measurement_basis:
      name: Cơ sở đo kích thước bảo vệ
      description: 'Kích thước dựa trên số đo nào (ví dụ: chu vi khuỷu tay, chu vi
        cổ tay, chu vi cẳng tay).'
    guard_style:
      name: Kiểu bảo vệ
      description: Phân loại cấu tạo hoặc loại bảo vệ lưỡi trượt băng để giúp người
        mua sắm nhanh chóng phân biệt giữa các loại bảo vệ cứng, loại mềm, loại lò
        xo và các kiểu thiết kế khác.
    guava_flesh_color:
      name: Màu thịt quả ổi
      description: Cho biết màu thịt bên trong của quả ổi.
    guava_variety:
      name: Giống ổi
      description: 'Xác định giống hoặc loại ổi cụ thể đang được bán (ví dụ: ổi táo,
        ổi kem Mexico, ổi Thái Lan, ổi hồng, ổi không hạt, ổi trắng).'
    guide_material:
      name: Chất liệu khoen dẫn dây
      description: Chất liệu được sử dụng cho các vòng dẫn dây hoặc miếng chèn của
        cần câu.
    guide_type:
      name: Loại vòng dẫn dây
      description: Xác định kiểu vòng dẫn dây được lắp đặt trên cần câu, chẳng hạn
        như vòng dẫn dây đơn, vòng dẫn dây lăn hoặc vòng dẫn dây hình rắn.
    guideline_markings:
      name: Vạch hướng dẫn
      description: Loại vạch hướng dẫn trực quan được in hoặc khảm trên bề mặt thảm
        tập ném bóng để hỗ trợ các bài tập ném bóng.
    guiro_scraper_material:
      name: Chất liệu dụng cụ cạo Guiro
      description: Chất liệu của dụng cụ cạo/đánh bóng đi kèm hoặc được khuyến nghị
        sử dụng với guiro.
    guiro_surface_style:
      name: Kiểu bề mặt Guiro
      description: Mô tả kiểu/hình dạng bề mặt chơi được cạo để tạo ra âm thanh.
    guitar_body_finish_type:
      name: Loại lớp hoàn thiện thân đàn guitar
      description: Xác định lớp hoàn thiện được sử dụng trên thân đàn guitar.
    guitar_bridge_system_type:
      name: Loại hệ thống cầu đàn guitar
      description: Loại thiết kế hệ thống cầu/đuôi đàn để tương thích và tham khảo.
    guitar_case_style:
      name: Kiểu hộp đựng đàn guitar
      description: Xác định kiểu dáng bảo vệ/cấu trúc tổng thể của hộp đựng đàn guitar
        hoặc túi đựng đàn.
    guitar_humidifier_placement:
      name: Vị trí đặt máy tạo ẩm cho đàn guitar
      description: Xác định vị trí dự định sử dụng/đặt máy tạo ẩm so với nhạc cụ hoặc
        môi trường.
    guitar_pedal_i_o_configuration:
      name: Cấu hình đầu vào/đầu ra của bàn đạp guitar
      description: Cho biết bàn đạp có hỗ trợ định tuyến đầu vào/đầu ra mono hay stereo
        hay không.
    guitar_pedal_output_connector_type:
      name: Loại đầu nối đầu ra của bàn đạp guitar
      description: Xác định loại đầu nối đầu ra âm thanh được sử dụng bởi bàn đạp.
    guitar_slide_finish:
      name: Lớp hoàn thiện của slide guitar
      description: Lớp hoàn thiện bề mặt của slide ảnh hưởng đến cảm giác và ma sát
        với dây đàn.
    guitar_slide_style:
      name: Kiểu slide guitar
      description: Xác định hình dạng của slide guitar hoặc thanh âm và cách đeo/sử
        dụng.
    guitar_stand_type:
      name: Loại giá đỡ đàn guitar
      description: Xác định hình dạng chính của giá đỡ đàn guitar (cách nó hỗ trợ/lưu
        trữ đàn guitar).
    guitar_strap_attachment_type:
      name: Loại gắn dây đeo đàn guitar
      description: Xác định cách dây đeo được gắn vào đàn guitar (hoặc các nút đeo
        dây), bao gồm cả việc sử dụng đầu nối truyền thống hay hệ thống tháo nhanh.
    guitar_strap_end_material:
      name: Chất liệu đầu dây đeo đàn guitar
      description: Chất liệu được sử dụng ở đầu/móc dây đeo (các bộ phận gắn vào nút
        đeo hoặc hệ thống khóa dây đeo).
    guitar_strap_features:
      name: Các tính năng của dây đeo đàn guitar
      description: Các tính năng nổi bật của dây đeo đàn guitar ngoài kích thước/chất
        liệu cơ bản (chọn nhiều tùy chọn).
    guitar_string_coating:
      name: Lớp phủ dây đàn guitar
      description: Cho biết dây đàn có lớp phủ bảo vệ hay không và nếu có, kiểu lớp
        phủ.
    guitar_string_gauge_type:
      name: Loại cỡ dây đàn guitar
      description: 'Cỡ dây được bán trên thị trường của một bộ dây đàn guitar acoustic
        (ví dụ: cực nhẹ, nhẹ, trung bình). Thường được ước tính bằng độ dày của dây
        E cao; phạm vi cỡ dây chính xác có thể khác nhau tùy theo nhà sản xuất.'
    guitar_string_set_gauge_category:
      name: Cỡ dây đàn guitar
      description: Các nhóm cỡ dây phổ biến trên thị trường cho một bộ dây đàn guitar
        (thường được lấy từ dây E cao / dây thứ nhất).
    guitar_string_winding_type:
      name: Kiểu quấn dây đàn guitar
      description: Chỉ định kiểu quấn ngoài của các dây quấn trong bộ dây.
    guitar_tuning_peg_button_shape:
      name: Hình dạng nút chỉnh dây đàn guitar
      description: Hình dạng/kiểu của nút chỉnh dây.
    guitar_tuning_peg_configuration:
      name: Cấu hình chốt chỉnh dây đàn guitar
      description: Bố cục bộ chỉnh dây cho đầu cần đàn.
    guitar_tuning_peg_mounting_style:
      name: Kiểu lắp đặt chốt lên dây guitar
      description: Cách lắp đặt bộ chỉnh dây vào đầu cần đàn (kiểu ống lót và phương
        pháp chống xoay).
    guitar_tuning_peg_shaft_type:
      name: Loại trục chốt chỉnh dây đàn guitar
      description: Cho biết chốt giữ dây là loại đặc hay loại tách rời, và cách cố
        định dây.
    guitar_tuning_peg_style:
      name: Kiểu dáng chốt lên dây guitar
      description: 'Kiểu dáng và định dạng lắp đặt của bộ chỉnh dây/chốt chỉnh dây
        được sử dụng trên đầu cần đàn (ví dụ: bánh răng kín so với bánh răng hở, khóa,
        chốt tách rời).'
    gum_condition:
      name: Tình trạng keo dán
      description: 'Tình trạng/trạng thái của keo dán tem ở mặt sau (ví dụ: chưa từng
        dán, đã dán, không có keo).'
    gun_action_type:
      name: Loại cơ chế lên đạn của súng
      description: 'Loại cơ chế hoạt động được sử dụng để nạp/bắn (ví dụ: kiểu chốt
        trượt, kiểu cần gạt).'
    gun_operational_status:
      name: Tình trạng hoạt động của súng
      description: Cho biết súng sưu tầm có bị vô hiệu hóa/không bắn được hay không
        (và cách trình bày).
    gun_type:
      name: Loại súng
      description: Xác định hình dạng chung của súng cổ.
    gusset_material:
      name: Chất liệu miếng đệm gia cường
      description: Chỉ định chất liệu được sử dụng trong lớp lót đáy quần/đệm quần,
        ảnh hưởng đến khả năng thoáng khí, vệ sinh và sự thoải mái.
    gymnastics_discipline:
      name: Bộ môn thể dục dụng cụ
      description: 'Chỉ định bộ môn thể dục dụng cụ mà sản phẩm dành cho (ví dụ: Thể
        dục nghệ thuật, Thể dục nhịp điệu, Thể dục nhào lộn).'
    hair_extension_texture:
      name: Kết cấu tóc nối
      description: Mô tả độ xoăn, gợn sóng hoặc kiểu kết cấu của các sợi tóc nối.
    hair_net_style:
      name: Kiểu lưới tóc
      description: 'Xác định kiểu dáng hoặc cấu tạo của lưới tóc (ví dụ: kiểu phồng,
        kiểu trùm đầu, kiểu che búi tóc).'
    hair_quality_grade:
      name: Cấp độ chất lượng tóc
      description: Chỉ định chất lượng/nguồn gốc xuất xứ của tóc trong ngành.
    halter_style:
      name: Kiểu dây buộc cổ
      description: 'Xác định kiểu dáng hoặc chức năng của dây buộc cổ (ví dụ: kiểu
        dây thừng, kiểu tháo rời, kiểu trình diễn), giúp người mua sắm lựa chọn dây
        buộc cổ phù hợp với mục đích sử dụng.'
    hammock_style:
      name: Kiểu võng
      description: Mô tả kiểu dáng hoặc cấu tạo của võng.
    hand_and_foot_coverage:
      name: Che phủ tay và chân
      description: Mô tả găng tay và giày tích hợp hoặc có thể tháo rời để che phủ
        tay và/hoặc chân.
    hand_cymbal_set_configuration:
      name: Cấu hình bộ chũm chọe cầm tay
      description: Cho biết sản phẩm được bán theo cặp, một chiếc chũm chọe đơn lẻ
        hoặc một bộ lớn hơn.
    hand_drum_head_material:
      name: Chất liệu mặt trống tay
      description: Chất liệu của mặt trống (màng) được sử dụng trên trống hình chén.
    hand_exerciser_style:
      name: Kiểu dụng cụ tập tay
      description: Phân loại kiểu dáng hoặc cơ chế tổng thể của dụng cụ tập tay.
    hand_guard_backbone_material:
      name: Vật liệu khung đỡ tay
      description: Vật liệu của khung đỡ/xương sống (nếu có), quyết định độ bền và
        khả năng bảo vệ.
    hand_guard_coverage_style:
      name: Kiểu dáng che phủ của bộ bảo vệ tay
      description: Mô tả độ che phủ/hình dạng của bộ bảo vệ tay, ảnh hưởng đến khả
        năng bảo vệ khỏi gió/va đập.
    hand_guard_mounting_type:
      name: Loại lắp đặt bộ bảo vệ tay
      description: 'Chỉ định cách gắn bộ bảo vệ tay vào xe máy (ví dụ: gắn vào đầu
        tay lái với kẹp bên trong so với chỉ kẹp).'
    hand_guard_set_configuration:
      name: Cấu hình bộ ốp bảo vệ tay
      description: Sản phẩm được bán theo cặp trái/phải hay bán lẻ từng bên.
    hand_guard_style:
      name: Kiểu dáng bộ bảo vệ tay
      description: 'Mô tả thiết kế hoặc kiểu dáng che phủ của bộ bảo vệ (ví dụ: Kín,
        Hở, Toàn diện, Nhẹ, Tiêu chuẩn).'
    hand_guard_weather_protection:
      name: Khả năng bảo vệ khỏi thời tiết của bộ bảo vệ tay
      description: Cho biết khả năng bảo vệ khỏi thời tiết mà bộ bảo vệ tay mang lại.
    hand_paddle_strap_type:
      name: Loại dây đeo tay bảo vệ
      description: Chỉ định loại dây đeo, hoặc không có dây đeo, được sử dụng để cố
        định tay bảo vệ vào tay người dùng.
    hand_percussion_mount_attachment_mechanism:
      name: Cơ chế gắn giá đỡ tay bảo vệ
      description: 'Chỉ định cách gắn giá đỡ vào giá đỡ, giá để đồ hoặc phần cứng
        khác (ví dụ: kẹp so với gắn thanh).'
    hand_percussion_mounting_handling:
      name: Cách lắp đặt/sử dụng nhạc cụ gõ cầm tay
      description: Cho biết nhạc cụ được cầm tay, đeo, gắn cố định hay đặt trên bàn/sàn
        trong quá trình sử dụng thông thường.
    hand_percussion_pitch_type:
      name: Loại cao độ của nhạc cụ gõ cầm tay
      description: Cho biết nhạc cụ tạo ra cao độ xác định (có thể điều chỉnh/có nốt)
        hay cao độ không xác định.
    hand_percussion_playing_method:
      name: Phương pháp chơi nhạc cụ gõ cầm tay
      description: 'Cách chơi nhạc cụ thường được sử dụng để tạo ra âm thanh (ví dụ:
        lắc so với cọ xát).'
    hand_percussion_set_configuration:
      name: Cấu hình bộ nhạc cụ gõ cầm tay
      description: Cho biết sản phẩm là một nhạc cụ đơn lẻ, một cặp nhạc cụ phù hợp
        hay một bộ nhiều mảnh.
    hand_percussion_size_class:
      name: Phân loại kích thước nhạc cụ gõ cầm tay
      description: Loại kích thước chung của nhạc cụ khi không có số đo chính xác
        hoặc để dễ dàng lọc.
    hand_sewing_needle_point_type:
      name: Loại đầu kim khâu tay
      description: 'Hình dạng/kiểu dáng của đầu kim khâu tay được sử dụng để xuyên
        qua các vật liệu khác nhau (ví dụ: vải dệt, vải dệt kim, da) hoặc sợi.'
    hand_support_level:
      name: Mức độ hỗ trợ bàn tay
      description: Xác định mức độ hỗ trợ hoặc nén được cung cấp bởi găng tay, băng
        quấn hoặc dây đeo.
    hand_support_size:
      name: Kích thước băng bảo vệ tay
      description: Kích thước do nhà sản xuất công bố của găng tay, dây đeo hoặc băng
        quấn (XS-XXL hoặc một kích thước).
    handball_ball_type:
      name: Loại bóng ném
      description: Cho biết loại hình sử dụng dự định của bóng ném, chẳng hạn như
        thi đấu, tập luyện hoặc bóng ném bãi biển.
    handball_playing_surface:
      name: Mặt sân chơi bóng ném
      description: Cho biết (các) mặt sân chơi mà bóng ném được tối ưu hóa.
    handball_target_type:
      name: Loại bia tập ném bóng ném
      description: Xác định kiểu dáng hoặc thiết kế của bia tập ném bóng ném dùng
        trong luyện tập đồng đội.
    handbrake_actuation_type:
      name: Loại cơ chế phanh tay
      description: Xác định cách thức kích hoạt phanh tay.
    handbrake_orientation:
      name: Hướng phanh tay
      description: Xác định xem phanh tay được thiết kế cho xe tay lái bên trái hay
        bên phải, hoặc là loại dùng chung cho tất cả các loại xe.
    handgun_grip_material:
      name: Chất liệu tay cầm súng lục
      description: Chất liệu chính của tay cầm/vỏ súng lục.
    handle_configuration:
      name: Cấu hình tay cầm
      description: 'Mô tả kiểu dáng cấu trúc của tay cầm ván trượt nước (ví dụ: đơn,
        đôi, chữ V sâu, kiểu chữ T) để người mua sắm có thể lựa chọn phù hợp với kỹ
        năng, thủ thuật hoặc loại ván.'
    handle_ergonomics:
      name: Công thái học của tay cầm
      description: Mô tả các tính năng công thái học của tay cầm nhằm cải thiện sự
        thoải mái và khả năng kiểm soát.
    handle_grip_material:
      name: Chất liệu bọc tay cầm
      description: Xác định chất liệu được sử dụng trên bề mặt tay cầm, ảnh hưởng
        đến sự thoải mái và độ bám, đặc biệt là khi ướt.
    handle_grip_type:
      name: Kiểu bọc tay cầm
      description: Xác định lớp phủ/chất liệu hoặc kiểu bề mặt tay cầm nhằm cải thiện
        sự thoải mái và khả năng kiểm soát.
    handle_shape:
      name: Hình dạng tay cầm
      description: Hình dạng mặt cắt ngang hoặc hình dáng của tay cầm.
    handlebar_design:
      name: Thiết kế tay lái
      description: Xác định loại tay lái trên máy tập leo cầu thang, chẳng hạn như
        không có, cố định, điều chỉnh độ cao, có thể gập lại hoặc tay lái có dây kháng
        lực.
    handlebar_type:
      name: Loại tay lái
      description: Xác định kiểu tay lái được lắp trên xe đạp, ảnh hưởng đến tư thế
        lái, khả năng điều khiển và sự thoải mái.
    handslide_bore_type:
      name: Loại lỗ trượt tay
      description: Xác định xem kèn trombone trầm sử dụng lỗ trượt đơn hay lỗ trượt
        kép.
    handwear_cuff_style:
      name: Kiểu cổ tay áo
      description: Mô tả kiểu cấu tạo cổ tay áo của găng tay hoặc bao tay, ảnh hưởng
        đến độ che phủ và độ vừa vặn.
    handwear_insulation_material:
      name: Chất liệu cách nhiệt của găng tay
      description: Xác định chất liệu cách nhiệt hoặc lớp lót được sử dụng bên trong
        găng tay hoặc bao tay.
    handwear_size:
      name: Kích thước găng tay
      description: Xác định kích thước của găng tay hoặc các loại găng tay khác để
        đảm bảo vừa vặn.
    hang_glider_design:
      name: Thiết kế dù lượn
      description: 'Phân loại kiểu cấu trúc của dù lượn (ví dụ: cánh mềm, cánh cứng,
        có động cơ).'
    hanger_thread_size:
      name: Kích thước ren móc treo
      description: Cho biết kích thước/tiêu chuẩn ren vít được sử dụng để gắn móc
        treo vào cọc cắm cần câu hoặc thiết bị báo động cá cắn câu, đảm bảo tính tương
        thích.
    hanging_suspension_method:
      name: Phương pháp treo
      description: 'Xác định trang thiết bị hoặc hệ thống chính được sử dụng để treo
        xích đu (ví dụ: dây thừng, xích, khung đỡ).'
    hardtop_finish_type:
      name: Loại hoàn thiện mui cứng
      description: 'Chỉ định trạng thái hoàn thiện bên ngoài của mui cứng (ví dụ:
        sơn lót so với sơn phủ), điều này ảnh hưởng đến khả năng lắp đặt và ngoại
        hình.'
    hardtop_shell_material:
      name: Vật liệu vỏ mui cứng
      description: Chỉ định vật liệu chính của vỏ cứng mui xe (không phải bất kỳ loại
        vải bọc nào), chẳng hạn như sợi thủy tinh hoặc nhôm.
    hardtop_window_configuration:
      name: Cấu hình cửa sổ mui cứng
      description: Mô tả các cửa sổ được bao gồm với mui cứng và cấu hình của chúng.
    harmonica_comb_material:
      name: Chất liệu thân kèn harmonica
      description: Vật liệu được sử dụng cho lược kèn harmonica (thân buồng khí).
    harmonica_cover_plate_finish:
      name: Hoàn thiện tấm che kèn harmonica
      description: Chỉ định lớp hoàn thiện hoặc lớp phủ trên các tấm che kèn harmonica.
    harmonica_cover_plate_material:
      name: Chất liệu tấm ốp vỏ kèn harmonica
      description: Vật liệu được sử dụng cho các tấm che bên ngoài.
    harmonica_finish:
      name: Hoàn thiện kèn harmonica
      description: Hoàn thiện bề mặt của các tấm che/thân kèn harmonica.
    harmonica_included_accessories:
      name: Phụ kiện đi kèm của kèn harmonica
      description: Cho biết những phụ kiện nào được bao gồm với kèn harmonica.
    harmonica_note_range:
      name: Phạm vi nốt nhạc của kèn harmonica
      description: 'Phân loại phạm vi nhạc cụ được sử dụng trong bối cảnh dàn nhạc
        (ví dụ: bass, baritone, tenor).'
    harmonica_reed_plate_material:
      name: Vật liệu làm tấm lưỡi gà kèn harmonica
      description: 'Vật liệu được sử dụng cho tấm lưỡi gà (ví dụ: đồng thau, thép
        không gỉ, nhôm).'
    harmonica_system_type:
      name: Hệ thống/loại kèn harmonica
      description: 'Xác định hệ thống hoặc kiểu dáng kèn harmonica dàn nhạc (ví dụ:
        chord, bass, baritone, polyphonia).'
    harmonica_tuning_system:
      name: Hệ thống chỉnh âm của kèn harmonica
      description: 'Chỉ định bố cục/hệ thống điều chỉnh âm thanh được sử dụng bởi
        kèn harmonica (ví dụ: Richter, Solo, Orchestra tuning).'
    harness_shell_type:
      name: Loại vỏ đai
      description: 'Mô tả độ cứng của vỏ đai (ví dụ: Softshell, Hardshell, Hybrid).'
    harness_style:
      name: Kiểu đai
      description: 'Xác định kiểu dáng/thiết kế cấu trúc của đai, ví dụ: đai eo, đai
        ngồi, đai ngực/áo vest, đai cánh, đai quần short hoặc hybrid.'
    harness_type:
      name: Loại dây đai an toàn
      description: Phân loại kiểu dáng cấu trúc của đai leo núi, chẳng hạn như đai
        ngồi, đai toàn thân hoặc đai ngực.
    harp_action_type:
      name: Loại cơ cấu máy của đàn đàn cầm
      description: Cơ chế chính được sử dụng để thay đổi cao độ/âm bội trên kèn harmonica.
    harp_finish:
      name: Lớp hoàn thiện đàn hạc
      description: 'Lớp hoàn thiện bề mặt của thân đàn hạc (ví dụ: tự nhiên, nhuộm
        màu, sơn, sơn mài).'
    harp_included_accessories:
      name: Phụ kiện đi kèm đàn hạc
      description: Liệt kê các phụ kiện đi kèm khi mua đàn hạc lớn.
    harvest_method:
      name: Phương pháp thu hoạch
      description: Cho biết hải sản được đánh bắt tự nhiên, nuôi trồng hoặc thu được
        bằng phương pháp khác.
    harvest_stage:
      name: Giai đoạn thu hoạch
      description: Xác định giai đoạn sinh trưởng khi thu hoạch rau arugula, chẳng
        hạn như rau mầm, lá non hoặc bó trưởng thành.
    hat_style:
      name: Kiểu dáng mũ
      description: 'Kiểu dáng/cấu trúc của mũ đội đầu (ví dụ: mũ hình nón, mũ vương
        miện, mũ chóp cao, mũ lưỡi trai) để phản ánh hình dáng cơ bản của sản phẩm.'
    hazard_signal_mode:
      name: Chế độ tín hiệu nguy hiểm
      description: Các kiểu/chế độ chiếu sáng có thể lựa chọn cho đèn báo hiệu đường
        bộ LED/điện tử.
    head_configuration:
      name: Cấu hình đầu
      description: Xác định xem đầu rìu có lưỡi rìu, búa, cả hai hoặc không có, ảnh
        hưởng trực tiếp đến chức năng trên băng và địa hình hỗn hợp.
    head_material:
      name: Chất liệu đầu
      description: Chất liệu của đầu chơi được cung cấp kèm theo quinto.
    head_movement_type:
      name: Loại chuyển động của đầu
      description: 'Khả năng chuyển động theo hướng của đầu chân đế hoặc đầu dùi (ví
        dụ: xoay ngang, xoay dọc, nghiêng).'
    head_side:
      name: Mặt đầu
      description: Xác định xem mặt trống được thiết kế cho mặt đánh (mặt dùi trống),
        mặt cộng hưởng (mặt trước) hoặc cả hai.
    head_weight_style:
      name: Kiểu trọng lượng đầu
      description: Xác định cấu hình trọng lượng ở đầu ruồi giả, ảnh hưởng đến tốc
        độ chìm và cách trình bày.
    headband_embellishment:
      name: Trang trí băng đô
      description: 'Xác định các yếu tố trang trí được gắn vào băng đô (ví dụ: nơ,
        ngọc trai, pha lê, tai động vật).'
    headboard_style:
      name: Kiểu đầu giường
      description: Mô tả kiểu thiết kế hoặc cấu tạo của đầu giường được cung cấp kèm
        theo giường.
    headgear_strap_configuration:
      name: Cấu hình dây đeo mũ bảo hiểm
      description: Cho biết số lượng dây đeo được sử dụng để cố định mũ bảo hiểm đấu
        vật.
    headjoint_crown_style:
      name: Kiểu đầu ống sáo
      description: Chỉ định kiểu dáng hoặc thiết kế của đầu ống sáo (nắp chụp cuối),
        có thể ảnh hưởng đến tính thẩm mỹ và trọng lượng/cân bằng.
    headjoint_pitch_standard:
      name: Tiêu chuẩn cao độ ống sáo
      description: 'Cho biết tiêu chuẩn điều chỉnh thiết kế của ống sáo (ví dụ: A=440
        so với A=442).'
    headliner_product_form:
      name: Hình thức sản phẩm lót trần
      description: Chỉ định xem sản phẩm là một bộ lót trần đúc hoàn chỉnh, vải thay
        thế hoặc một bộ phận sửa chữa/trang trí.
    headrest_mount_attachment_method:
      name: Phương pháp gắn giá đỡ tựa đầu
      description: Chỉ định cách gắn giá đỡ vào trụ tựa đầu/ghế.
    headrest_provision:
      name: Có bao gồm tựa đầu
      description: Cho biết liệu có bao gồm tựa đầu hay không và/hoặc liệu có điểm
        gắn tựa đầu hay không.
    headset_standard:
      name: Tiêu chuẩn tai nghe
      description: Loại giao diện ống đầu/tai nghe được khung sử dụng.
    headstall_style:
      name: Kiểu dây cương
      description: Phân loại thiết kế cấu trúc hoặc cấu hình tai/lông mày của dây
        cương.
    headwear_intended_use:
      name: Mục đích sử dụng của khăn đội đầu
      description: 'Cho biết mục đích hoặc bối cảnh chính khi đội khăn (ví dụ: rụng
        tóc do hóa trị, bơi lội, tôn giáo).'
    hearing_enhancer_style:
      name: Kiểu dáng thiết bị trợ thính
      description: Mô tả hình dạng vật lý của thiết bị để người dùng có thể lựa chọn
        giữa kiểu chụp tai, nhét tai, đeo sau đầu và các kiểu khác.
    heart_rate_monitoring_method:
      name: Phương pháp theo dõi nhịp tim
      description: Xác định cách máy thu thập dữ liệu nhịp tim trong quá trình tập
        luyện.
    heart_rate_sensing_technology:
      name: Công nghệ cảm biến nhịp tim
      description: 'Chỉ định phương pháp đo sinh lý mà máy theo dõi sử dụng để phát
        hiện nhịp tim (ví dụ: điện tâm đồ so với quang học PPG).'
    heart_rate_sensor_placement:
      name: Vị trí đặt cảm biến nhịp tim
      description: Cho biết vị trí đeo hoặc đặt cảm biến (trên cơ thể hoặc xe đạp),
        ảnh hưởng đến sự thoải mái và độ chính xác của phép đo.
    heat_retention_technology:
      name: Công nghệ giữ nhiệt
      description: 'Mô tả bất kỳ công nghệ, lớp phủ hoặc vật liệu nào giúp tăng cường
        đổ mồ hôi hoặc hoạt động nhiệt cho các loại đai nịt bụng tập trung vào tập
        luyện (ví dụ: hiệu ứng phòng xông hơi bằng neoprene).'
    heated_glass_feature:
      name: Tính năng kính có sưởi
      description: Cho biết liệu kính cửa sổ có bao gồm các yếu tố điện tích hợp như
        lưới sưởi phía sau và/hoặc ăng-ten được nhúng trong kính hay không.
    heater_control_actuation_method:
      name: Phương pháp điều khiển bộ sưởi
      description: 'Xác định cách bộ điều khiển sưởi/HVAC tác động đến hộp HVAC của
        xe (ví dụ: điều khiển bằng cáp, điều khiển bằng chân không hoặc tín hiệu điện
        tử).'
    heater_control_electrical_connector_type:
      name: Loại đầu nối điện của bộ điều khiển sưởi
      description: 'Xác định kiểu/giao diện đầu nối điện được sử dụng bởi cụm điều
        khiển sưởi (ví dụ: kiểu dây dẫn ngắn so với kiểu phích cắm).'
    heating_technology:
      name: Công nghệ sưởi ấm
      description: Xác định cơ chế sưởi ấm chính mà bộ hóa hơi sử dụng để chuyển đổi
        vật liệu thành hơi.
    heel_shape:
      name: Hình dạng gót giày
      description: 'Xác định kiểu dáng hình học hoặc hình bóng của gót giày, giúp
        người mua sắm lọc theo kiểu dáng cấu trúc và sở thích về độ ổn định (ví dụ:
        gót nhọn so với gót vuông).'
    helicopter_mission_type:
      name: Loại nhiệm vụ của máy bay trực thăng
      description: Mục đích sử dụng/vai trò chính của máy bay trực thăng.
    helicopter_rotor_configuration:
      name: Cấu hình cánh quạt máy bay trực thăng
      description: Xác định bố cục hệ thống cánh quạt máy bay trực thăng (bố trí cánh
        quạt chính/cánh quạt đuôi), chẳng hạn như cánh quạt chính đơn + đuôi, đồng
        trục, song song hoặc lồng vào nhau.
    helmet_accessory_type:
      name: Loại phụ kiện mũ bảo hiểm
      description: Xác định loại phụ tùng hoặc phụ kiện mũ bảo hiểm xe đạp cụ thể
        để người mua sắm có thể tìm thấy ngay mặt hàng phù hợp.
    helmet_audio_connector_type:
      name: Loại đầu nối âm thanh mũ bảo hiểm
      description: Xác định loại đầu nối âm thanh máy bay được sử dụng bởi dây dẫn
        liên lạc của mũ bảo hiểm, nếu có.
    helmet_communication_system_readiness:
      name: Khả năng tương thích với hệ thống liên lạc của mũ bảo hiểm
      description: Mũ bảo hiểm có được thiết kế để chấp nhận hệ thống liên lạc nội
        bộ/Bluetooth hay không.
    helmet_construction_type:
      name: Kiểu kết cấu mũ bảo hiểm
      description: 'Mô tả kiểu cấu tạo của vỏ và lớp lót mũ bảo hiểm (ví dụ: xốp,
        vỏ cứng, lai).'
    helmet_fit_head_shape:
      name: Độ vừa vặn của mũ bảo hiểm (hình dạng đầu)
      description: Hồ sơ độ vừa vặn bên trong dành cho các hình dạng đầu khác nhau.
    helmet_interior_liner_type:
      name: Loại lớp lót bên trong mũ bảo hiểm
      description: Loại lớp lót thoải mái và liệu nó có thể tháo rời/giặt được hay
        không.
    helmet_liner_material:
      name: Chất liệu lớp lót bên trong mũ bảo hiểm
      description: Xác định chất liệu của lớp lót hoặc lớp đệm bên trong mang lại
        sự thoải mái và khả năng hấp thụ va chạm.
    helmet_retention_closure_type:
      name: Loại khóa giữ mũ bảo hiểm
      description: 'Xác định cơ chế khóa/giữ dây đeo cằm của mũ bảo hiểm (ví dụ: vòng
        chữ D kép, khóa ratchet vi mô).'
    helmet_safety_certification:
      name: Chứng nhận an toàn mũ bảo hiểm
      description: Liệt kê các tiêu chuẩn hoặc chứng nhận an toàn mà mũ bảo hiểm tuân
        thủ.
    helmet_safety_certification_standard:
      name: Tiêu chuẩn chứng nhận an toàn của mũ bảo hiểm
      description: Các tiêu chuẩn an toàn/chứng nhận mà mũ bảo hiểm xe máy được chứng
        nhận đáp ứng.
    helmet_shell_material:
      name: Chất liệu vỏ ngoài mũ bảo hiểm
      description: Vật liệu hoặc cấu tạo vỏ ngoài chính được sử dụng cho mũ bảo hiểm.
    helmet_size_system:
      name: Hệ thống kích thước mũ bảo hiểm
      description: Hệ thống kích thước được sử dụng để thể hiện kích thước mũ bảo
        hiểm.
    helmet_sun_visor_type:
      name: Loại kính chắn nắng mũ bảo hiểm
      description: Xác định xem mũ bảo hiểm có kính chắn nắng bên trong có thể gập
        xuống, kính chắn nắng bên ngoài có màu, cả hai, hoặc không có cái nào.
    helmet_vehicle_fit:
      name: Độ phù hợp của mũ bảo hiểm với xe
      description: Loại xe/mục đích sử dụng mũ bảo hiểm.
    helmet_ventilation_adjustability:
      name: Khả năng điều chỉnh thông gió của mũ bảo hiểm
      description: Xác định cách người lái có thể điều chỉnh hệ thống thông gió của
        mũ bảo hiểm.
    helmet_ventilation_configuration:
      name: Cấu hình thông gió mũ bảo hiểm
      description: 'Mô tả bố cục và khả năng điều chỉnh hệ thống thông gió của mũ
        bảo hiểm (ví dụ: lỗ thông gió cằm, lỗ thông gió trán/hút gió, lỗ thông gió
        có thể đóng mở).'
    helmet_visor_peak_adjustability:
      name: Khả năng điều chỉnh tấm che/mặt nạ mũ bảo hiểm
      description: Cho biết mặt nạ/mặt nạ địa hình của mũ bảo hiểm có thể điều chỉnh
        và/hoặc tháo rời được hay không.
    helmet_visor_shield_optical_features:
      name: Đặc điểm quang học của tấm che (kính chắn) mũ bảo hiểm
      description: Các đặc điểm quang học và khả năng tương thích của tấm che/mặt
        nạ chính.
    helmet_visor_shield_type:
      name: Loại tấm che/mặt nạ mũ bảo hiểm
      description: Cấu hình tấm che/mặt nạ chính đi kèm với mũ bảo hiểm.
    hem_style:
      name: Kiểu viền
      description: Xác định kiểu hoàn thiện của ống quần—chẳng hạn như trơn, cuộn
        hoặc thô—ảnh hưởng mạnh đến vẻ ngoài của trang phục.
    hemisphere_compatibility:
      name: Khả năng tương thích bán cầu
      description: Chỉ định bán cầu mà bản đồ sao được thiết kế, dựa trên các chòm
        sao có thể nhìn thấy.
    hemline_style:
      name: Kiểu viền gấu
      description: Xác định kiểu cắt hoặc thiết kế của cạnh dưới của váy.
    herbal_infusion_function:
      name: Chức năng của trà thảo dược
      description: Cho biết lợi ích sức khỏe hoặc chức năng chính mà trà thảo dược
        được quảng cáo.
    hex_size:
      name: Kích thước lục giác
      description: Kích thước lục giác của cờ lê cần thiết để lắp/tháo bugi đánh lửa.
    hi_hat_pair_type:
      name: Loại cặp hi-hat
      description: Cho biết sản phẩm là một cặp hi-hat trên/dưới đồng bộ hay là một
        bộ phận cymbal riêng lẻ.
    hi_hat_sound_character:
      name: Đặc tính âm thanh của cặp chũm chọe chân
      description: Mô tả cấu hình âm thanh tổng thể để giúp người mua sắm lọc theo
        âm thanh họ muốn.
    high_visibility_class:
      name: Phân loại độ phản quang
      description: Chỉ định mức độ phân loại khả năng hiển thị ANSI/ISEA 107 của sản
        phẩm.
    highback_style:
      name: Kiểu lưng cao
      description: Mô tả kiểu dáng/thiết kế cấu trúc của lưng cao ảnh hưởng đến đặc
        tính khi sử dụng.
    hitch_ball_diameter:
      name: Đường kính đầu bi móc kéo
      description: 'Đường kính của đầu bi móc kéo (hình cầu) khớp với khớp nối rơ
        moóc (ví dụ: 1 7/8 inch, 2 inch, 2 5/16 inch, 50 mm).'
    hitch_ball_mounting_style:
      name: Kiểu lắp đặt bi móc kéo
      description: Cho biết bi móc kéo là loại bi gắn bằng đai ốc tiêu chuẩn, loại
        cố định/ép cho các đầu móc kéo cụ thể, hay bao gồm trang thiết bị tích hợp.
    hobby_horse_handle_type:
      name: Loại tay cầm ngựa đồ chơi
      description: Chỉ định cấu trúc tay cầm được sử dụng để giữ hoặc điều khiển ngựa
        đồ chơi.
    hobby_horse_sound_features:
      name: Tính năng âm thanh của ngựa đồ chơi
      description: Cho biết ngựa đồ chơi có bao gồm hiệu ứng âm thanh hay không và
        loại hiệu ứng nào.
    hockey_goal_type:
      name: Loại khung thành khúc côn cầu
      description: 'Xác định kiểu dáng hoặc mục đích sử dụng của khung thành khúc
        côn cầu (ví dụ: sân băng tiêu chuẩn, đường phố, mini).'
    hockey_size_category:
      name: Nhóm kích cỡ đồ dùng khúc côn cầu
      description: Chỉ định phân khúc kích thước thiết bị tiêu chuẩn mà bộ phận này
        phù hợp (Trẻ em, Thiếu niên, Trung cấp, Cao cấp).
    hockey_size_segment:
      name: Phân khúc kích thước khúc côn cầu
      description: Xác định phân khúc kích thước thiết bị khúc côn cầu tiêu chuẩn,
        quyết định kích thước tổng thể và độ vừa vặn của miếng đệm.
    hold_surface_texture:
      name: Kết cấu bề mặt mấu bám
      description: Mô tả độ nhám hoặc độ hoàn thiện xúc giác của bề mặt cầm nắm.
    home_decor_sewing_pattern_project_type:
      name: Loại dự án mẫu may trang trí nhà cửa
      description: 'Xác định loại mặt hàng trang trí nhà cửa mà mẫu may tạo ra (ví
        dụ: vỏ gối, rèm cửa, khăn trải bàn).'
    homologation_rule_set:
      name: Chứng nhận / bộ quy tắc
      description: Xác định cơ quan quản lý hoặc bộ quy tắc mà xe tuân thủ (nếu có).
    honey_form:
      name: Hình thức mật ong
      description: Xác định hình thức vật lý hoặc cách trình bày của sản phẩm mật
        ong.
    honey_processing_method:
      name: Phương pháp chế biến mật ong
      description: Cho biết mật ong đã được xử lý hoặc chế biến như thế nào trước
        khi đóng gói.
    honey_variety:
      name: Giống mật ong
      description: Xác định nguồn gốc thực vật hoặc hoa của mật ong — đơn hoa hay
        đa hoa — điều này ảnh hưởng trực tiếp đến hương vị, màu sắc và giá cả.
    hood_configuration:
      name: Cấu hình mũ trùm đầu
      description: Mô tả thiết kế và các tính năng điều chỉnh của mũ trùm đầu.
    hood_design:
      name: Thiết kế mũ trùm đầu
      description: Xác định sự có mặt và kiểu dáng của mũ trùm đầu trên trang phục.
    hood_style:
      name: Kiểu dáng mũ trùm đầu
      description: Cho biết sự hiện diện và kiểu dáng của mũ trùm đầu trên trang phục.
    hood_type:
      name: Loại mũ trùm đầu
      description: Cho biết đặc điểm thiết kế đặc biệt của phần mũ trùm đầu của trang
        phục.
    hook_and_eye_size_hook_number:
      name: Kích thước móc và khuy (số hiệu móc)
      description: Kích thước/số hiệu móc và khuy tiêu chuẩn (nếu có) được sử dụng
        trên bao bì để chỉ ra kích thước móc/khuy tổng thể.
    hook_and_loop_fastener_duty_rating:
      name: Độ bền của khóa dán
      description: Cho biết mức độ bền/độ chắc chắn dự kiến của khóa dán.
    hook_and_loop_fastener_format:
      name: Định dạng khóa dán
      description: 'Chỉ định hình thức vật lý hoặc định dạng đóng gói của sản phẩm
        khóa dán (ví dụ: cuộn/băng, chấm, dải).'
    hook_and_loop_fastener_side:
      name: Mặt của băng gai dính
      description: Chỉ định xem sản phẩm chỉ bao gồm mặt móc, chỉ mặt vòng, hoặc một
        bộ chứa cả hai mặt.
    hook_coating_finish:
      name: Lớp phủ/lớp mạ bề mặt lưỡi câu
      description: 'Xử lý bề mặt hoặc mạ được áp dụng cho móc để chống ăn mòn, tàng
        hình hoặc tạo màu (ví dụ: niken đen, thiếc sáng).'
    hook_configuration:
      name: Cấu hình móc
      description: Mô tả sự hiện diện và kiểu dáng của các móc được cung cấp kèm theo
        mồi nhử.
    hook_eye_style:
      name: Kiểu đuôi lưỡi câu
      description: Chỉ định hình dạng hoặc hướng của mắt móc, ảnh hưởng đến cách buộc
        hoặc gắn móc.
    hook_eye_type:
      name: Loại khuyên lưỡi câu
      description: Chỉ định thiết kế của mắt móc, ảnh hưởng đến lựa chọn nút thắt
        và cách buộc.
    hook_loop_format:
      name: Kiểu khóa dán
      description: Xác định hình dạng vật lý của khóa dán may.
    hook_loop_side:
      name: Mặt của băng gai dính
      description: Xác định xem sản phẩm là loại có móc, loại có vòng, hay là bộ khóa
        dán đồng bộ.
    hook_material:
      name: Chất liệu móc
      description: Xác định chất liệu được sử dụng cụ thể cho đầu/móc câu, một yếu
        tố quan trọng về độ bền và khả năng chống ăn mòn khi sử dụng trong nước mặn.
    hook_organizer_style:
      name: Kiểu dáng hộp đựng móc
      description: 'Kiểu dáng vật lý hoặc hình dạng của hộp đựng móc (ví dụ: hộp đựng,
        cuộn hoặc túi), được sử dụng để hỗ trợ duyệt và lọc theo loại hộp đựng.'
    hook_point_configuration:
      name: Cấu hình mũi móc
      description: Cho biết móc có hai mũi (móc đôi) hay ba mũi (móc ba).
    hook_point_type:
      name: Loại mũi móc
      description: Mô tả độ mài hoặc hình dạng của mũi móc câu, ảnh hưởng đến khả
        năng xuyên thấu và giữ chắc.
    hook_shank_length:
      name: Chiều dài thân móc
      description: 'Cho biết phân loại chiều dài tương đối của thân móc (ví dụ: ngắn,
        dài) để so sánh nhanh chóng về mặt trực quan và chức năng.'
    hooks_eyes_attachment_method:
      name: Phương pháp gắn móc và khuy
      description: Cách móc và khuy được gắn vào quần áo hoặc sản phẩm.
    hop_up_type:
      name: Loại Hop-up
      description: Xác định hệ thống hop-up được sử dụng để tạo độ xoáy ngược cho
        viên đạn BB nhằm tăng tầm bắn và độ chính xác.
    horse_blanket_type:
      name: Loại chăn ngựa
      description: Xác định kiểu dáng chính hoặc mục đích sử dụng của chăn hoặc tấm
        phủ ngựa.
    horse_brush_type:
      name: Loại bàn chải ngựa
      description: Phân loại bàn chải theo kiểu chải chuốt cụ thể hoặc mục đích sử
        dụng, cho phép khách hàng lọc mà không làm phân mảnh cấu trúc phân cấp danh
        mục.
    horse_care_purpose:
      name: Mục đích chăm sóc ngựa
      description: Mục đích chức năng chính của sản phẩm trong việc chăm sóc ngựa,
        bao gồm các nhu cầu về sức khỏe, chải chuốt và quản lý.
    horse_feed_stage:
      name: Giai đoạn thức ăn cho ngựa
      description: Cho biết giai đoạn sống hoặc tình trạng sinh lý của ngựa mà thức
        ăn được pha chế.
    horse_groomer_type:
      name: Loại dụng cụ chải lông ngựa
      description: Phân loại kiểu dáng dụng cụ chải lông để người mua sắm có thể nhanh
        chóng tìm thấy dụng cụ cụ thể mà họ cần.
    horse_leg_protection_type:
      name: Loại bảo vệ chân ngựa
      description: Phân loại kiểu dáng hoặc chức năng cụ thể của ủng, băng quấn hoặc
        băng bó cho ngựa.
    horse_model_breed:
      name: Giống ngựa mẫu
      description: Xác định giống ngựa được mô tả bởi mô hình tỷ lệ (nếu có).
    hosiery_toe_style:
      name: Kiểu mũi tất
      description: Xác định cấu tạo của phần mũi tất, quan trọng đối với độ bền và
        khả năng tương thích với giày hở mũi.
    hot_air_balloon_basket_type:
      name: Loại giỏ khí cầu
      description: 'Xác định cấu hình/kiểu giỏ chính (ví dụ: tiêu chuẩn thể thao,
        thương mại công suất lớn, có vách ngăn, có cửa) được sử dụng để lên xuống
        và hoạt động dự kiến.'
    hot_air_balloon_burner_type:
      name: Loại đầu đốt khí cầu
      description: Loại/cấu hình hệ thống đầu đốt được lắp đặt trên khinh khí cầu.
    hot_air_balloon_envelope_material:
      name: Vật liệu vỏ khinh khí cầu
      description: Vải/vật liệu chính được sử dụng cho vỏ khinh khí cầu (canopy).
    hotfix_application_tool:
      name: Dụng cụ dán đá nóng
      description: Dụng cụ hoặc nguồn nhiệt được khuyến nghị sử dụng để dán đá nóng.
    hub_axle_type:
      name: Loại trục bánh xe
      description: Xác định giao diện trục/hệ thống giữ trục mà trục bánh xe được
        thiết kế cho (tháo nhanh, trục xuyên, v.v.).
    hub_motor_type:
      name: Loại động cơ trục bánh xe
      description: Mô tả kiểu cấu tạo của động cơ trục bánh xe (có bánh răng, truyền
        động trực tiếp, chổi than, không chổi than) để cung cấp thông tin cho người
        mua sắm về đặc tính mô-men xoắn, trọng lượng và hiệu suất.
    hula_hoop_construction_type:
      name: Kiểu cấu tạo vòng lắc hula hoop
      description: Mô tả cách vòng lắc được cấu tạo/lắp ráp.
    hula_hoop_features:
      name: Đặc điểm của vòng lắc hula hoop
      description: Nêu bật các đặc tính chức năng hoặc thiết kế đáng chú ý của vòng
        lắc eo.
    hull_design:
      name: Thiết kế vỏ
      description: Mô tả hình dạng vỏ ảnh hưởng đến hiệu suất và đặc tính xử lý.
    hull_type:
      name: Loại vỏ
      description: Mô tả hình dạng vỏ ảnh hưởng đến hiệu suất và độ ổn định.
    humidifier_refill_medium_type:
      name: Loại môi chất nạp lại máy tạo ẩm
      description: Xác định môi chất giữ ẩm/nạp lại được sử dụng bởi máy tạo ẩm (cái
        gì được làm ướt hoặc thay thế).
    humidifier_refill_method:
      name: Phương pháp nạp lại máy tạo ẩm
      description: Mô tả cách máy tạo ẩm được nạp lại độ ẩm hoặc thay thế.
    humidifying_medium:
      name: Môi trường làm ẩm
      description: Xác định thành phần/môi trường làm ẩm được sản phẩm sử dụng (bộ
        phận nào bị làm ướt/kích hoạt).
    hummus_base_ingredient:
      name: Thành phần cơ bản của hummus
      description: Xác định loại đậu hoặc rau củ chính được sử dụng để làm hummus.
    hunting_call_type:
      name: Loại tiếng gọi săn bắn
      description: 'Phân loại kiểu hoạt động hoặc cơ chế chính của tiếng gọi (ví dụ:
        thổi bằng miệng, điện tử, hộp) để người săn bắn có thể nhanh chóng chọn kiểu
        phù hợp nhất với nhu cầu và trình độ kỹ năng của họ.'
    hunting_dog_collar_function:
      name: Chức năng của vòng cổ chó săn
      description: Phân loại kiểu chức năng hoặc mục đích chính của vòng cổ, giúp
        người mua sắm lọc sản phẩm theo các chức năng như theo dõi, huấn luyện, tăng
        khả năng hiển thị hoặc sử dụng tiêu chuẩn.
    hvac_control_functions:
      name: Các chức năng điều khiển HVAC
      description: Cho biết chức năng HVAC/rã đông/lưu lượng không khí nào được điều
        khiển bởi thiết bị (cơ khí hoặc điện tử).
    hybrid_drivetrain_configuration:
      name: Cấu hình hệ thống truyền động hybrid
      description: Cho biết kiến trúc hệ thống PHEV mô tả cách động cơ điện và động
        cơ đốt trong cung cấp lực đẩy.
    hybrid_system_type:
      name: Loại hệ thống hybrid
      description: Phân loại kiến trúc hybrid được xe sử dụng.
    hybrid_truck_cab_type:
      name: Loại cabin xe tải hybrid
      description: Chỉ định cấu hình cabin của xe tải, ảnh hưởng đến sức chứa chỗ
        ngồi và không gian nội thất.
    hydration_bag_features:
      name: Đặc điểm của túi đựng nước
      description: Nêu bật các tính năng thiết kế hoặc chức năng nổi bật dành riêng
        cho túi đựng nước.
    hydration_belt_features:
      name: Các tính năng của đai đeo hông đựng nước
      description: Liệt kê các tính năng tích hợp nổi bật giúp tăng cường khả năng
        sử dụng, an toàn hoặc tiện lợi của đai đựng nước.
    hydration_bladder_compatibility:
      name: Khả năng tương thích với túi đựng nước
      description: Cho biết liệu áo vest có bao gồm hoặc hỗ trợ hệ thống túi đựng
        nước hay không.
    hydration_mouthpiece_style:
      name: Kiểu ống ngậm nước
      description: Chỉ định kiểu dáng hoặc chức năng của ống ngậm hoặc van của hệ
        thống đựng nước, giúp người mua sắm lựa chọn giao diện uống ưa thích và đảm
        bảo khả năng tương thích.
    hydration_pack_style:
      name: Kiểu ba lô đựng nước
      description: Chỉ định kiểu dáng cấu trúc của ba lô đựng nước, chẳng hạn như
        ba lô hoặc áo vest, để hỗ trợ việc lựa chọn kích cỡ và lọc theo trường hợp
        sử dụng.
    hydration_system_insulation:
      name: Cách nhiệt hệ thống đựng nước
      description: Cho biết liệu bình chứa và/hoặc ống dẫn nước có được cách nhiệt
        để giúp duy trì nhiệt độ chất lỏng trong điều kiện nóng hoặc lạnh hay không.
    hydration_valve_type:
      name: Loại van đựng nước
      description: Xác định kiểu van uống hoặc ống ngậm được cung cấp kèm theo hệ
        thống hoặc bình, bao gồm các thiết kế van cắn và vòi phun lưu lượng cao thông
        dụng.
    hydraulic_fluid_type:
      name: Loại dầu thủy lực
      description: Chỉ định loại dầu phanh mà cần phanh xe đạp thủy lực được thiết
        kế để sử dụng. Thông tin này rất quan trọng cho việc bảo trì và an toàn.
    hydrogenation_level:
      name: Mức độ hydro hóa
      description: Cho biết chất béo chưa được hydro hóa, hydro hóa một phần hay hydro
        hóa hoàn toàn, điều này ảnh hưởng đến hàm lượng chất béo chuyển hóa và hiệu
        suất nướng bánh.
    hydrophobicity_level:
      name: Mức độ kỵ nước
      description: Cho biết mức độ tạo giọt/tạo màng nước được quảng cáo của sản phẩm.
    ice_cream_format:
      name: Định dạng kem
      description: 'Mô tả hình thức vật lý hoặc cách trình bày của sản phẩm kem (ví
        dụ: hộp pint, thanh, mochi).'
    ice_skate_sharpener_type:
      name: Loại dụng cụ mài lưỡi giày trượt băng
      description: Phân loại thiết kế hoặc định dạng tổng thể của dụng cụ mài (đá
        mài cầm tay, máy điện, đồ gá, v.v.).
    ice_temperature_suitability:
      name: Nhiệt độ phù hợp với băng
      description: Cho biết phạm vi nhiệt độ băng mà sáp gậy khúc côn cầu được pha
        chế, ảnh hưởng đến hiệu suất và đặc tính chống tuyết.
    icing_sugar_variety:
      name: Loại đường bột
      description: 'Phân loại công thức hoặc loại chức năng của đường bột (ví dụ:
        fondant, bột tuyết không tan chảy, có màu, có hương vị).'
    ignition_coil_configuration:
      name: Cấu hình cuộn dây đánh lửa
      description: Xác định kiểu dáng cuộn dây đánh lửa (cuộn đơn/cuộn trên bugi,
        bộ cuộn nhiều tháp theo số xi lanh, thanh cuộn/hộp cuộn, hoặc kiểu bộ phân
        phối).
    ignition_lead_compliance_standard:
      name: Tiêu chuẩn tuân thủ dây dẫn đánh lửa
      description: 'Tiêu chuẩn hoặc chứng nhận chính thức của ngành mà dây dẫn đánh
        lửa đáp ứng, theo tuyên bố của nhà sản xuất (ví dụ: SAE J2031, ISO 3808).'
    ignition_lead_insulation_material:
      name: Vật liệu cách điện dây dẫn đánh lửa
      description: Vật liệu cách điện/vỏ bọc chính được sử dụng trên dây dẫn đánh
        lửa (lớp cách điện cáp bên ngoài).
    ignition_lead_set_type:
      name: Loại bộ dây dẫn đánh lửa
      description: Cho biết sản phẩm là dây dẫn đánh lửa đơn hay bộ hoàn chỉnh, và
        bộ đó được dùng cho mục đích gì.
    ignition_lead_terminal_type:
      name: Loại đầu nối dây dẫn đánh lửa
      description: 'Kiểu đầu nối/đầu cực được sử dụng ở hai đầu dây dẫn đánh lửa (ví
        dụ: đầu cực bugi và kiểu đầu cực cuộn/bộ phân phối).'
    illumination_type:
      name: Loại chiếu sáng
      description: 'Xác định xem quả bóng có được chiếu sáng khi chơi ban đêm hay
        không và cách thức chiếu sáng (ví dụ: ánh sáng lân quang, đèn LED kích hoạt
        khi va chạm).'
    immobilizer_installation_type:
      name: Kiểu lắp đặt hệ thống chống trộm
      description: Cho biết cách lắp đặt hoặc kết nối thiết bị chống trộm với xe.
    immobilizer_unlock_method:
      name: Phương pháp mở khóa thiết bị chống trộm
      description: Chỉ định cách kích hoạt/vô hiệu hóa hoặc mở khóa thiết bị chống
        trộm.
    impact_protection_certifications:
      name: Chứng nhận bảo vệ chống va đập
      description: Nêu tên tiêu chuẩn an toàn cụ thể mà miếng bảo vệ đáp ứng hoặc
        vượt qua.
    impact_protection_level:
      name: Cấp độ bảo vệ chống va đập
      description: Chỉ định mức độ bảo vệ chống va đập hoặc công nghệ được cung cấp
        bởi dụng cụ bảo vệ vùng kín.
    impact_protection_rating:
      name: Xếp hạng bảo vệ chống va đập
      description: 'Chỉ định mức độ bảo vệ chống va đập được chứng nhận theo tiêu
        chuẩn (ví dụ: EN 1621-1 Cấp 1, EN 14120 Cấp 2), giúp người dùng lọc ra các
        sản phẩm có mức độ bảo vệ cao hơn.'
    impact_surface_material:
      name: Chất liệu bề mặt chịu va đập
      description: 'Mô tả vật liệu bề mặt tiếp xúc/va đập chính để đảm bảo an toàn
        và cảm giác (ví dụ: xốp, nhựa).'
    incense_base_material:
      name: Vật liệu nền của hương
      description: Vật liệu nền/chất kết dính chính được sử dụng để làm hương (dạng
        bột) trong bộ dụng cụ.
    incense_making_method:
      name: Phương pháp làm hương
      description: Quy trình chế tác dự định được hỗ trợ bởi bộ dụng cụ.
    incense_tool_type:
      name: Loại dụng cụ làm hương
      description: Chỉ định loại dụng cụ làm hương này là gì (được sử dụng để tạo
        hình, đo lường, ép, trộn hoặc sấy khô hương).
    incline_adjustment_type:
      name: Loại điều chỉnh độ nghiêng
      description: Mô tả cách (hoặc liệu) có thể thay đổi độ nghiêng trong quá trình
        tập luyện.
    included_accessories:
      name: Phụ kiện đi kèm
      description: Liệt kê các phụ kiện đi kèm như đầu/mũi khoan dự phòng, hộp đựng,
        cáp sạc hoặc bộ chuyển đổi AC.
    included_case_type:
      name: Loại hộp đựng đi kèm
      description: Loại hộp đựng/bảo quản đi kèm với kèn saxophone trầm (nếu có).
    included_components:
      name: Các thành phần đi kèm
      description: Liệt kê những gì được bao gồm trong gói sản phẩm (hữu ích cho các
        bộ dụng cụ và gói sản phẩm).
    included_fastener_components:
      name: Các thành phần khóa đi kèm
      description: Xác định xem sản phẩm là bộ móc cài, chỉ có móc cài, chỉ có khuy
        cài hoặc một biến thể khóa quần áo liên quan.
    included_hydration_vessel_type:
      name: Loại bình đựng nước đi kèm
      description: Xác định kiểu bình đựng nước được cung cấp hoặc hỗ trợ bởi đai
        đeo.
    included_items_woodwind_instrument:
      name: Bao gồm mặt hàng; mục (nhạc cụ hơi bằng gỗ)
      description: Các vật dụng đi kèm (nhạc cụ hơi)Liệt kê các vật dụng thường được
        đóng gói kèm theo gói kèn saxophone trầm.
    included_materials:
      name: Vật liệu đi kèm
      description: Cho biết các thành phần được bao gồm trong gói mua mẫu (chỉ mẫu
        so với mẫu + vật liệu).
    included_mounting_accessories:
      name: Phụ kiện lắp đặt đi kèm
      description: Liệt kê các phụ kiện lắp đặt/gắn kèm với loa phóng thanh.
    included_pump_type:
      name: Loại bơm đi kèm
      description: Xác định loại bơm được cung cấp hoặc tích hợp với đệm hơi.
    included_scraper_implement_type:
      name: Loại dụng cụ cạo đi kèm
      description: 'Cho biết dụng cụ chơi nào được bao gồm với dụng cụ cạo nhạc (ví
        dụ: que/thanh cạo, bàn chải sắt).'
    indicator_design:
      name: Thiết kế chỉ báo
      description: Phân loại hình dạng hoặc kiểu dáng của chỉ báo cá cắn câu.
    indicator_functions_tracked:
      name: Chức năng chỉ báo được theo dõi
      description: Liệt kê các chỉ số trò chơi cụ thể mà chỉ báo theo dõi, chẳng hạn
        như bóng, cú đánh, lượt ra ngoài, hiệp đấu, số lần ném, số lượt ném, số wicket,
        điểm số hoặc lượt xuống bóng.
    indoor_outdoor_use:
      name: Sử dụng trong nhà/ngoài trời
      description: Cho biết đồ chơi bowling được thiết kế để sử dụng trong nhà, ngoài
        trời, hay cả hai.
    inflatable_decoration_items_included:
      name: Các sản phẩm trang trí bơm hơi đi kèm
      description: 'Liệt kê các phụ kiện chính đi kèm với đồ trang trí bơm hơi (ví
        dụ: quạt thổi, cọc, dây buộc).'
    inflatable_decoration_type:
      name: Loại đồ trang trí bơm hơi
      description: Chỉ định loại đồ trang trí tiệc bơm hơi (hình dạng/kiểu dáng) để
        hỗ trợ duyệt và lọc.
    inflatable_raft_float_features:
      name: Đặc điểm của phao/thuyền bơm hơi
      description: Các tính năng chức năng có trên phao/thuyền bơm hơi.
    inflation_method_included:
      name: Phương pháp bơm hơi đi kèm
      description: Chỉ định loại dung dịch bơm hơi đi kèm trong bộ dụng cụ sửa chữa,
        nếu có.
    infused_scent:
      name: Mùi hương được tẩm
      description: Xác định các chất phụ gia tạo mùi hoặc hương vị được tẩm vào vật
        liệu mồi.
    ingredient_base_type:
      name: Loại nguyên liệu cơ bản
      description: 'Xác định nguyên liệu cơ bản chính được cung cấp để lên men (ví
        dụ: nước ép nho cô đặc so với nước ép tươi so với nước ép trái cây cô đặc).'
    ingredient_physical_form:
      name: Dạng vật lý của nguyên liệu
      description: Chỉ định dạng vật lý của nguyên liệu tạo mùi hương được cung cấp
        (được sử dụng để xử lý, đo lường và pha chế).
    ingredient_processing_method:
      name: Phương pháp chế biến thành phần nguyên liệu
      description: 'Chỉ định kỹ thuật chế biến chính được áp dụng cho nguyên liệu
        (ví dụ: sấy đông khô, rang, lên men).'
    ink_colors_included:
      name: Màu mực đi kèm
      description: Chỉ định màu mực có trong (các) miếng đệm mực trong bộ sản phẩm.
    ink_pad_application_method:
      name: Phương pháp sử dụng mực từ miếng đệm
      description: Cách mực được lấy ra/sử dụng từ miếng đệm (miếng đệm đóng dấu truyền
        thống so với miếng đệm chấm mực so với miếng đệm đầu cọ).
    ink_pad_permanence:
      name: Độ bền màu của hộp mực dấu
      description: Mực đóng dấu có bền màu và/hoặc có khả năng lưu trữ lâu dài hay
        không (khả năng chống phai màu và chống nước sau khi khô).
    ink_pad_size:
      name: Kích thước miếng mực
      description: Kích thước/hình dạng tiêu chuẩn của bề mặt/vỏ miếng mực.
    ink_pad_special_effects:
      name: Hiệu ứng đặc biệt của miếng mực
      description: 'Các hiệu ứng hình ảnh/chức năng đặc biệt của mực khi đóng dấu
        (ví dụ: kim loại, lấp lánh).'
    ink_permanence:
      name: Độ bền của mực
      description: Cho biết mực sumi khô có bền/lưu trữ lâu dài hay có thể giặt/không
        bền.
    ink_preparation_required:
      name: Yêu cầu chuẩn bị mực
      description: Cho biết mực sumi đã sẵn sàng để sử dụng hay cần pha loãng với
        nước hoặc nghiền trước khi sử dụng.
    inline_skate_brake_type:
      name: Loại phanh giày trượt patin
      description: Chỉ định cấu hình phanh đi kèm với giày trượt patin, chẳng hạn
        như phanh gót có thể tháo rời hoặc không có phanh.
    inner_tent_configuration:
      name: Cấu hình lều bên trong
      description: 'Chỉ định cấu hình hoặc kiểu dáng của lều bên trong, ví dụ: lớp
        lót toàn phần, lớp lót lưới hoặc lớp lót cách nhiệt.'
    innerspring_coil_type:
      name: Loại lò xo cuộn bên trong
      description: Chỉ định kiểu cấu tạo của hệ thống lò xo cuộn bên trong nệm, ảnh
        hưởng đến khả năng nâng đỡ, cách ly chuyển động và giá cả.
    input_connector_type:
      name: Loại đầu nối đầu vào
      description: Chỉ định loại đầu nối đầu vào âm thanh được sử dụng bởi bàn đạp
        (thường là 1/4 inch TS).
    input_valve_type:
      name: Loại van đầu vào
      description: Cho biết tiêu chuẩn van hiện có trên săm/bánh xe đạp mà bộ chuyển
        đổi kết nối TỪ đó.
    insecticide_treatment:
      name: Xử lý thuốc trừ sâu
      description: Cho biết liệu lưới đã được xử lý thuốc trừ sâu tại nhà máy hay
        chưa và nếu có, loại thuốc trừ sâu được sử dụng để bảo vệ thêm.
    insert_coverage_area:
      name: Diện tích che phủ của miếng lót
      description: 'Chỉ định phần nào của bàn chân mà miếng lót được thiết kế để che
        phủ (ví dụ: toàn bộ chiều dài, chỉ gót chân).'
    insert_length_type:
      name: Loại chiều dài phần chèn vào
      description: Cho biết phần nào của đế giày được che phủ bởi miếng đỡ vòm chân.
    inside_message_type:
      name: Loại thông điệp bên trong
      description: Cho biết liệu thẻ có bao gồm thông điệp được in sẵn ở bên trong
        hay không và liệu có thể tùy chỉnh được hay không.
    insole_attachment_method:
      name: Phương pháp gắn lót giày
      description: Chỉ định cách miếng đỡ vòm chân được giữ cố định bên trong giày
        (thả lỏng, dán keo, khóa dán, v.v.).
    insole_material:
      name: Chất liệu đế trong
      description: Mô tả chất liệu của đế giày mà bàn chân đặt lên, ảnh hưởng đến
        khả năng đệm và hỗ trợ.
    installation_fabrication_level:
      name: Mức độ chế tạo khi lắp đặt
      description: Cho biết lượng chế tạo hoặc sửa đổi tùy chỉnh điển hình cần thiết
        để lắp đặt bộ dụng cụ.
    installation_location:
      name: Vị trí lắp đặt
      description: 'Chỉ định điểm lắp đặt điển hình cho cảm biến áp suất dầu trong
        hệ thống dầu động cơ (ví dụ: cổng dẫn dầu trên khối động cơ, vỏ lọc, tấm kẹp
        hoặc giá đỡ đường ống từ xa).'
    installation_method:
      name: Phương pháp lắp đặt
      description: Xác định cách cố định hoặc lắp đặt thảm hoặc gạch trên sàn nhà.
    instant_coffee_form:
      name: Dạng cà phê hòa tan
      description: Mô tả dạng vật lý của cà phê hòa tan, ảnh hưởng đến phương pháp
        pha chế và thời hạn sử dụng.
    instep_coverage:
      name: Phạm vi bảo vệ mu bàn chân
      description: Xác định xem sản phẩm chỉ bảo vệ cẳng chân hay cả cẳng chân và
        mu bàn chân/bàn chân.
    instruction_format:
      name: Định dạng hướng dẫn
      description: Định dạng của hướng dẫn đi kèm với bộ dụng cụ.
    instrument_cleaning_swab_form_factor:
      name: Kiểu dáng que lau nhạc cụ
      description: 'Xác định kiểu dáng vật lý của que lau (ví dụ: vải kéo qua so với
        hệ thống que/bàn chải) để phù hợp với sở thích của người chơi và các hạn chế
        của nhạc cụ.'
    instrument_dimensions_unit_context:
      name: Ngữ cảnh đơn vị kích thước nhạc cụ
      description: 'Làm rõ các số đo Chiều cao/Chiều rộng/Chiều dài được cung cấp
        đề cập đến điều gì (ví dụ: tổng thể nhạc cụ, chiều dài ống đơn, chiều cao
        giá đỡ).'
    instrument_electronics_type:
      name: Loại điện tử nhạc cụ
      description: Cho biết hệ thống thu âm/tiền khuếch đại của nhạc cụ là chủ động
        hay thụ động.
    instrument_key:
      name: Tông của nhạc cụ
      description: Xác định ký hiệu phím nhạc cụ của sáo recorder được sử dụng trong
        các catalog (thường là C hoặc F cho sáo recorder lớn hơn).
    instrument_level:
      name: Trình độ nhạc cụ
      description: Trình độ người chơi mục tiêu cho nhạc cụ được cung cấp.
    instrument_part_mounting_method:
      name: Phương pháp lắp đặt bộ phận nhạc cụ
      description: 'Xác định cách thức gắn hoặc lắp đặt bộ phận (ví dụ: kẹp, dán hoặc
        bắt vít).'
    instrument_parts_included:
      name: Các bộ phận nhạc cụ đi kèm
      description: Liệt kê các bộ phận/linh kiện chính đi kèm trong hộp cho một cây
        kèn clarinet A.
    instrument_playing_technique:
      name: Kỹ thuật chơi nhạc cụ
      description: 'Cách chơi/kích hoạt nhạc cụ thường thấy (ví dụ: lắc, đánh, gõ).'
    instrument_size_class:
      name: Phân loại kích thước nhạc cụ
      description: Kích thước chung của nhạc cụ được thể hiện dưới dạng phân loại
        dễ hiểu cho người mua sắm hơn là kích thước chính xác.
    insulation_fill_material:
      name: Chất liệu bông nhồi cách nhiệt
      description: Xác định vật liệu chính được sử dụng để cách nhiệt cho áo khoác
        hoặc áo vest.
    integrated_bottom_type:
      name: Loại đáy tích hợp liền khối
      description: Cho biết liệu trang phục có bao gồm quần lót, quần đùi, áo liền
        quần hoặc lớp lót tương tự để che chắn khi vận động hay không.
    integrated_charging_options:
      name: Các tùy chọn sạc tích hợp
      description: Liệt kê các giao diện nguồn hoặc sạc tích hợp có sẵn trên tủ đầu
        giường.
    integrated_furniture_function:
      name: Chức năng nội thất tích hợp
      description: 'Xác định các yếu tố nội thất tích hợp bổ sung đi kèm với giường
        hoặc khung giường gắn tường (ví dụ: bàn làm việc, ghế sofa, kệ).'
    integrated_locking:
      name: Khóa tích hợp
      description: Cho biết giá đỡ có bao gồm khóa tích hợp để kết nối giá đỡ với
        xe và/hoặc xe đạp với giá đỡ hay không.
    integrated_power_options:
      name: Tùy chọn nguồn điện tích hợp
      description: Cho biết loại nguồn điện hoặc tính năng sạc tích hợp mà bàn trang
        điểm cung cấp.
    integrated_storage_features:
      name: Tính năng lưu trữ tích hợp
      description: Xác định các tính năng lưu trữ hoặc phụ kiện bổ sung mà giá đựng
        gậy bi-a bao gồm ngoài các khe cắm gậy.
    integrated_tool_functions:
      name: Chức năng công cụ tích hợp
      description: 'Các tính năng công cụ bổ sung được tích hợp vào cần gạt (ví dụ:
        móc nan hoa, dụng cụ tháo lõi van, dụng cụ thả hạt).'
    intended_board_type:
      name: Loại ván dự định
      description: 'Xác định kiểu ván lướt diều mà vây được thiết kế cho (ví dụ: ván
        hai đầu, ván lướt sóng định hướng, ván cánh ngầm).'
    intended_consumption:
      name: Mục đích sử dụng
      description: Xác định cách sản phẩm được dự định sử dụng, cho biết liệu sản
        phẩm có an toàn để ăn sống, cần nướng hay đã được nướng một phần.
    intended_craft:
      name: Ngành nghề dự định
      description: Ngành nghề chính mà bộ dẫn sợi được thiết kế cho.
    intended_culinary_use:
      name: Mục đích ẩm thực
      description: Cho biết ứng dụng ẩm thực chính của loại nước sốt, chẳng hạn như
        chấm, nấu ăn hoặc phết lên món ăn.
    intended_handlebar_style:
      name: Kiểu tay lái dự định
      description: 'Mô tả kiểu tay lái hoặc kiểu sử dụng dự định của cần gạt (ví dụ:
        tay lái phẳng, tay lái cong, tay lái khí động học). Điều này nhanh chóng thu
        hẹp khả năng tương thích mà không cần thêm các danh mục phụ.'
    intended_player_role:
      name: Vai trò người chơi dự định
      description: 'Xác định vai trò trên sân mà mũ bảo hiểm được thiết kế cho (ví
        dụ: người bắt bóng, trọng tài).'
    intended_playing_surface:
      name: Bề mặt chơi dự định
      description: Bề mặt mà quả bóng, puck hoặc vòng được thiết kế để chơi, chẳng
        hạn như băng, nhựa đường, sàn nhà thi đấu hoặc băng nhân tạo.
    intended_repair_location:
      name: Vị trí sửa chữa dự định
      description: Vị trí trên lốp xe mà bộ dụng cụ được thiết kế để sửa chữa.
    intended_seating_position:
      name: Vị trí ngồi dự định
      description: Chỉ định vị trí ngồi trên xe mà dây đai an toàn được thiết kế để
        lắp đặt hoặc sử dụng.
    intended_sewing_application:
      name: Ứng dụng may dự định
      description: 'Ứng dụng may dự định mà sợi chỉ được thiết kế dành cho (ví dụ:
        may quần áo đa năng, chần bông, bọc ghế).'
    intended_technique:
      name: Kỹ thuật dự định
      description: Kỹ thuật nỉ chính mà miếng đệm/thảm được thiết kế cho.
    intended_use:
      name: Mục đích sử dụng dự định
      description: Ngữ cảnh sử dụng chính của dụng cụ.
    intended_use_fleece_fabric:
      name: Mục đích sử dụng (vải nỉ)
      description: Dự án/ứng dụng chính mà vải nỉ được tiếp thị.
    intended_user:
      name: Người dùng dự định
      description: Cho biết thiết bị bảo hộ máy bay được thiết kế để sử dụng cho ai.
    intended_yarn_form:
      name: Dạng sợi dự định
      description: Chỉ định cách trình bày sợi tốt nhất được hỗ trợ bởi bát đựng sợi.
    interaction_mode:
      name: Chế độ tương tác
      description: Phương pháp tương tác chính được sử dụng để kích hoạt âm thanh
        hoặc hoạt động.
    interactive_effects:
      name: Hiệu ứng tương tác
      description: Xác định các hiệu ứng điện tử hoặc cơ khí tương tác đi kèm với
        bộ đồ chơi nhà bếp.
    interfacing_application_area:
      name: Lĩnh vực ứng dụng vải lót
      description: Xác định các khu vực may/thủ công thông thường mà vải lót được
        thiết kế để hỗ trợ.
    interfacing_color_family:
      name: Nhóm màu vải lót
      description: Cho biết màu nền vải lót điển hình được sử dụng cho vải sáng hoặc
        tối.
    interfacing_selling_format:
      name: Hình thức bán vải lót
      description: 'Mô tả hình thức bán vải lót (ví dụ: cắt liên tục bán theo chiều
        dài, các mảnh cắt sẵn, cuộn hoặc mẫu thử).'
    interfacing_stiffness_level:
      name: Độ cứng vải lót
      description: Mô tả độ cứng/độ chắc của vải lót.
    interior_padding_type:
      name: Loại đệm bên trong
      description: Loại đệm bên trong hoặc hệ thống chèn được sử dụng bên trong hộp
        để bảo vệ và sắp xếp đồ dùng.
    interior_stall_configuration:
      name: Cấu hình chuồng bên trong
      description: Chỉ định bố cục/cấu hình bên trong để vận chuyển động vật (hướng
        chuồng và kiểu ngăn).
    invitation_printing_coverage:
      name: Phạm vi in thiệp mời
      description: Mặt nào của thiệp mời được in (chỉ mặt trước hay hai mặt).
    iodization:
      name: Hàm lượng iốt
      description: Cho biết liệu có iốt được thêm vào muối hay không và ở mức độ nào.
    iridescence_level:
      name: Mức độ óng ánh
      description: Mô tả cường độ của độ bóng óng ánh tự nhiên/đã qua xử lý đặc trưng
        của lông công.
    irish_warpipe_set_configuration:
      name: Cấu hình bộ kèn túi Ireland
      description: Cho biết cấu hình nào đang được bán (bộ đầy đủ hay các bộ phận/bộ
        không hoàn chỉnh) dành riêng cho kèn túi Ireland.
    iron_on_applique_application_method:
      name: Phương pháp dán hình dán
      description: Chỉ rõ cách thức dán hình trang trí lên bề mặt vật liệu.
    ironing_center_features:
      name: Các tính năng của trung tâm ủi
      description: Liệt kê các tính năng chuyên dụng của trung tâm ủi giúp tăng cường
        khả năng sử dụng và sự tiện lợi.
    jacket_breast_style:
      name: Kiểu ngực áo khoác
      description: Chỉ định xem áo khoác vest là kiểu một hàng cúc hay hai hàng cúc.
    jacket_vent_style:
      name: Kiểu xẻ tà áo khoác
      description: Cho biết loại xẻ tà (lỗ) ở phía sau áo khoác vest.
    jam_and_jelly_consistency:
      name: Độ đặc của mứt và thạch
      description: Mô tả kết cấu của mứt, cho biết có chứa các miếng trái cây hoặc
        hạt hay không.
    jaw_shape:
      name: Hình dạng hàm
      description: 'Hình dạng hình học của hàm hoặc đầu hàm (ví dụ: thẳng, cong, mũi
        dài) ảnh hưởng đến độ chính xác và tầm với.'
    jerky_form:
      name: Hình dạng thịt khô
      description: 'Mô tả hình dạng vật lý hoặc cách cắt của các miếng thịt khô (ví
        dụ: dải, thanh, miếng nhỏ).'
    jersey_style:
      name: Kiểu dáng áo thể thao
      description: Xác định kiểu dáng hoặc kiểu mặc áo dành cho người hâm mộ.
    jew_harp_accessories_included:
      name: Phụ kiện đàn môi đi kèm
      description: 'Liệt kê các vật dụng đi kèm được đóng gói cùng với đàn môi (ví
        dụ: hộp đựng, túi đựng, hướng dẫn sử dụng).'
    jew_s_harp_frame_style:
      name: Kiểu khung đàn môi
      description: Mô tả kiểu cấu tạo của khung/thân đàn môi, ảnh hưởng đến cảm giác,
        độ bền và tính tiện dụng khi chơi.
    jew_s_harp_tongue_profile:
      name: Hình dạng lưỡi đàn môi
      description: Mô tả hình dạng/hình học của lưỡi (lưỡi sậy) đàn môi, ảnh hưởng
        đến độ nhạy và âm sắc.
    jewelry_pieces_included:
      name: Các món trang sức đi kèm
      description: Liệt kê các món đồ trang sức cụ thể có trong bộ để người mua sắm
        biết chính xác những món đồ họ đang mua.
    jigsaw_puzzle_piece_shape:
      name: Hình dạng mảnh ghép hình
      description: Kiểu cắt/hình dạng chung của các mảnh ghép và hình dạng cạnh.
    jockstrap_design_features:
      name: Đặc điểm thiết kế của quần lót thể thao
      description: Bao gồm các yếu tố thiết kế đặc biệt, độc đáo của quần lót thể
        thao, ảnh hưởng đến chức năng hoặc tính thẩm mỹ.
    juggling_club_construction_type:
      name: Loại cấu tạo của gậy tung hứng
      description: 'Xác định loại cấu tạo tổng thể của gậy tung hứng (ví dụ: đúc nguyên
        khối so với lắp ráp nhiều mảnh), có thể ảnh hưởng đến độ bền, cảm giác và
        bảo trì.'
    juggling_club_core_material:
      name: Chất liệu lõi của gậy tung hứng
      description: Chất liệu lõi chính được sử dụng bên trong gậy (khác với lớp bọc/băng
        dính bên ngoài).
    juggling_prop_set_size:
      name: Kích thước bộ dụng cụ tung hứng
      description: 'Số lượng dụng cụ chính có trong bộ (ví dụ: bộ 3 quả bóng, cặp
        poi).'
    juggling_ring_edge_style:
      name: Kiểu cạnh vòng tung hứng
      description: Kiểu dáng cạnh của vòng, ảnh hưởng đến sự thoải mái và khả năng
        bắt.
    juice_form:
      name: Dạng nước ép
      description: 'Xác định dạng vật lý hoặc giai đoạn chế biến của sản phẩm (ví
        dụ: dạng lỏng nguyên chất, dạng cô đặc, dạng bột).'
    juice_processing_method:
      name: Phương pháp chế biến nước quả
      description: Xác định kỹ thuật chế biến chính được áp dụng cho nước ép hoặc
        đồ uống, ảnh hưởng đến hương vị, khả năng giữ lại chất dinh dưỡng và thời
        hạn sử dụng.
    jump_rope_style:
      name: Kiểu dây nhảy
      description: 'Phân loại kiểu cấu tạo của dây/cáp (ví dụ: có hạt, bằng vải, cáp
        tốc độ), điều này ảnh hưởng mạnh mẽ đến mục đích sử dụng và hiệu suất.'
    kale_variety:
      name: Giống cải xoăn
      description: 'Xác định giống hoặc chủng loại cải xoăn cụ thể (ví dụ: Curly,
        Lacinato/Dinosaur, Red Russian). Điều này giúp người mua sắm lựa chọn dựa
        trên hương vị, kết cấu và cách sử dụng trong nấu nướng.'
    kaleidoscope_viewing_type:
      name: Loại hình quan sát kính vạn hoa
      description: 'Xác định định dạng quan sát hoặc kiểu vận hành của kính vạn hoa
        (ví dụ: ống kính mắt cổ điển, kính viễn vọng dựa trên thấu kính, vận hành
        bằng bánh xe, chiếu).'
    kayak_construction_type:
      name: Kiểu kết cấu thuyền kayak
      description: Xác định kiểu cấu tạo chính của thuyền kayak, chẳng hạn như vỏ
        cứng hoặc bơm hơi.
    kayak_design_type:
      name: Loại thiết kế thuyền kayak
      description: 'Phân loại mục đích thiết kế chính của thuyền kayak (ví dụ: surfski,
        playboat, touring).'
    kayak_hull_design:
      name: Thiết kế thân thuyền kayak
      description: Xác định hình dạng thân thuyền chính, ảnh hưởng đến các đặc tính
        điều khiển như độ ổn định và khả năng cơ động trong điều kiện sóng.
    kayak_storage_bag_type:
      name: Loại túi đựng đồ trên thuyền kayak
      description: Xác định kiểu dáng hoặc định dạng của túi đựng kayak, chẳng hạn
        như túi chống nước hoặc túi đựng mái chèo.
    kayak_style:
      name: Kiểu dáng kayak
      description: 'Chỉ định kiểu dáng thiết kế hoặc sử dụng chính của kayak (ví dụ:
        giải trí, du lịch, bơm hơi).'
    keel_type:
      name: Loại sống thuyền
      description: Xác định cấu hình sống thuyền của thuyền buồm.
    kettlebell_style:
      name: Kiểu dáng tạ kettlebell
      description: 'Xác định cấu tạo hoặc biến thể kiểu dáng của tạ kettlebell (ví
        dụ: thi đấu, điều chỉnh được, mềm), giúp người mua sắm chọn đúng loại tạ phù
        hợp với nhu cầu luyện tập của họ.'
    key_attachment_mechanism:
      name: Cơ chế gắn chìa khóa
      description: Chỉ rõ trang thiết bị được sử dụng để cố định chìa khóa bên trong
        hộp, chẳng hạn như vòng, kẹp hoặc trụ vít.
    key_retention_when_unlocked:
      name: Khả năng giữ chìa khóa khi mở khóa
      description: Cho biết liệu chìa khóa có thể được lấy ra khỏi khóa khi ở vị trí
        mở khóa hay không.
    keyboard_amplifier_inputs:
      name: Đầu vào bộ khuếch đại bàn phím
      description: 'Liệt kê các kết nối đầu vào được hỗ trợ bởi bộ khuếch đại bàn
        phím (ví dụ: 1/4 inch TRS, MIDI in, Bluetooth).'
    keyboard_amplifier_output_types:
      name: Các loại đầu ra bộ khuếch đại bàn phím
      description: Xác định các loại đầu nối đầu ra chính được bộ khuếch đại bàn phím
        hỗ trợ để định tuyến âm thanh đến các hệ thống khác.
    keyboard_case_handle_type:
      name: Loại tay cầm hộp bàn phím
      description: Hệ thống tay cầm chính được sử dụng để di chuyển/mang hộp bàn phím
        (ngoài dây đeo).
    keyboard_case_interior_padding_type:
      name: Loại đệm bên trong hộp bàn phím
      description: Phương pháp đệm/lót bên trong chính được sử dụng bên trong hộp
        cứng.
    keyboard_case_protection_level:
      name: Mức độ bảo vệ hộp bàn phím
      description: Mức độ bảo vệ/độ cứng tổng thể của hộp cứng, phân biệt hộp cứng
        đúc khuôn với hộp chịu tải nặng kiểu vận chuyển hàng không/ATA.
    keyboard_case_wheel_type:
      name: Loại bánh xe của hộp đựng đàn keyboard
      description: Cấu hình bánh xe cho hộp cứng có bánh xe.
    keyboard_pedal_connector_type:
      name: Loại đầu nối bàn đạp bàn phím
      description: Xác định loại đầu nối/phích cắm được sử dụng để kết nối bàn đạp
        duy trì với bàn phím hoặc đàn piano điện tử.
    keyboard_power_supply_type:
      name: Loại nguồn điện bàn phím
      description: Phương pháp cấp nguồn chính cho bàn phím (pin, bộ chuyển đổi AC,
        cấp nguồn qua USB).
    keyboard_stand_tier_type:
      name: Loại tầng giá đỡ bàn phím
      description: Cho biết giá đỡ được bán riêng lẻ hay bao gồm/thêm phụ kiện tầng
        thứ hai.
    keyboard_stand_tiers:
      name: Số tầng giá đỡ bàn phím
      description: 'Số tầng chơi được hỗ trợ bởi giá đỡ kiểu Z (ví dụ: một tầng hoặc
        hai tầng).'
    keychain_attachment_type:
      name: Loại móc khóa
      description: Xác định trang thiết bị gắn chính được sử dụng để cố định móc khóa
        vào chìa khóa, túi xách hoặc thắt lưng.
    keychain_style:
      name: Kiểu móc khóa
      description: Mô tả hình dạng tổng thể của móc khóa (hình dáng vật lý).
    keywork_finish:
      name: Lớp hoàn thiện phần chìa khóa
      description: Mô tả lớp hoàn thiện/mạ cụ thể trên phần chìa khóa, tách biệt với
        lớp hoàn thiện thân móc khóa.
    kick_point:
      name: Điểm uốn cong
      description: Xác định vị trí điểm uốn cong trên thân gậy khúc côn cầu, ảnh hưởng
        đến tốc độ và cảm giác khi sút bóng.
    kick_zone_grip_system:
      name: Hệ thống tay cầm vùng uốn cong
      description: Xác định công nghệ được sử dụng trong vùng uốn cong của ván trượt
        để tăng độ bám.
    kickboard_features:
      name: Các tính năng của phao tập bơi
      description: Nêu bật các đặc điểm đặc biệt của ván trượt giúp cải thiện việc
        luyện tập hoặc sự thoải mái, bao gồm kết cấu bề mặt và các tùy chọn tay cầm.
    kickboard_handle_style:
      name: Kiểu tay cầm ván trượt
      description: Xác định xem ván trượt có cung cấp tay cầm hoặc các phương pháp
        xử lý bề mặt ảnh hưởng đến khả năng điều khiển và sự thoải mái hay không.
    kickstand_mounting_position:
      name: Vị trí lắp chân chống
      description: 'Xác định vị trí lắp chân chống trên khung xe đạp (ví dụ: lắp giữa,
        lắp càng sau, lắp trục sau).'
    kickstand_type:
      name: Loại chân chống
      description: 'Mô tả kiểu dáng hoặc cơ chế của chân chống (ví dụ: chân chống
        bên đơn, chân chống giữa kép, chân chống dạng ống lồng).'
    kidney_belt_support_level:
      name: Mức độ hỗ trợ đai đỡ thận
      description: Mức độ hỗ trợ tổng thể do nhà sản xuất chỉ định, được cung cấp
        bởi đai đỡ thận để ổn định vùng lưng dưới và bụng.
    kiln_firing_atmosphere:
      name: Môi trường không khí nung trong lò
      description: 'Xác định môi trường nung mà lò có thể hỗ trợ trong quá trình hoạt
        động (ví dụ: oxy hóa hoặc khử).'
    kiln_heating_element_type:
      name: Loại bộ phận gia nhiệt của lò nung
      description: Loại/vật liệu của các bộ phận gia nhiệt được sử dụng trong lò nung.
    kingpin_design:
      name: Thiết kế chốt trục chính
      description: Mô tả kiểu cấu tạo của trang thiết bị chốt trục chính, ảnh hưởng
        đến trọng lượng và khoảng cách mài.
    kingpin_orientation:
      name: Hướng chốt trục chính
      description: Xác định hướng của chốt trục chính của xe tải, ảnh hưởng đến đặc
        tính vận hành và khả năng tương thích với sàn xe.
    kit_components_included:
      name: Các thành phần đi kèm trong bộ dụng cụ
      description: 'Liệt kê các bộ phận riêng lẻ được cung cấp trong bộ dụng cụ (ví
        dụ: cọc cắm đất, bu lông, dây đai, dụng cụ lắp đặt) để người mua sắm biết
        chính xác những gì họ đang mua.'
    kit_format:
      name: Định dạng bộ dụng cụ
      description: 'Xác định cách đóng gói và vận chuyển bộ dụng cụ (ví dụ: túi, hộp,
        thùng).'
    kit_items_included:
      name: Các vật dụng đi kèm trong bộ
      description: Liệt kê các thiết bị và vật tư chính được bao gồm trong bộ dụng
        cụ làm rượu vang để người mua sắm có thể phân biệt bộ dụng cụ khởi đầu với
        các bộ dụng cụ chỉ có nguyên liệu bổ sung.
    kit_pouch_case_type:
      name: Loại túi/hộp đựng bộ dụng cụ
      description: Xác định loại giải pháp lưu trữ đi kèm cho bộ dụng cụ chăm sóc
        (nếu có).
    kit_tools_included:
      name: Bộ dụng cụ bao gồm
      description: Liệt kê các dụng cụ chính được cung cấp trong bộ dụng cụ (nếu có)
        để hoàn thành dự án.
    kite_inflation_system:
      name: Hệ thống bơm diều
      description: Cho biết cách bơm mép trước và thanh chống của diều.
    kite_line_configuration:
      name: Cấu hình dây diều
      description: Cho biết số lượng dây điều khiển/bay mà cánh diều được thiết kế
        để sử dụng, một thông số kỹ thuật phổ biến để ghép thanh và dây đúng cách.
    kite_type:
      name: Loại diều
      description: Xác định loại thiết kế cấu trúc của diều (hình dạng và kiểu dây
        buộc).
    kiteboard_bag_style:
      name: Kiểu túi đựng ván diều
      description: 'Kiểu dáng hoặc loại phụ cụ thể của túi đựng ván diều (ví dụ: Túi
        đựng ván, Túi đựng gậy golf, Túi du lịch, Túi đựng ván foil).'
    kiwifruit_variety:
      name: Giống kiwi
      description: Xác định giống hoặc màu sắc cụ thể của kiwi (xanh lá, vàng, đỏ,
        v.v.).
    knee_pad_pocket_type:
      name: Kiểu túi đựng miếng đệm đầu gối
      description: Cho biết liệu quần áo có chứa miếng đệm bảo vệ đầu gối hay không
        và cách thức sử dụng.
    knee_pad_style:
      name: Kiểu dáng băng bảo vệ đầu gối
      description: 'Mô tả kiểu dáng hoặc hình dạng của miếng bảo vệ đầu gối (ví dụ:
        ống tay áo, nẹp, miếng bảo vệ).'
    knee_protection_design:
      name: Thiết kế bảo vệ đầu gối
      description: Cho biết số lượng phần khớp nối đầu gối được tích hợp vào miếng
        bảo vệ chân.
    kneeboard_construction:
      name: Cấu tạo ván trượt đầu gối
      description: 'Xác định kỹ thuật cấu tạo chính hoặc vật liệu composite của ván
        (ví dụ: nhựa đúc quay, đúc nén, sợi carbon).'
    kneeboard_strap_type:
      name: Loại dây đeo ván trượt đầu gối
      description: Mô tả kiểu hệ thống dây đeo đầu gối được sử dụng để cố định người
        dùng vào ván.
    knife_lock_mechanism:
      name: Cơ chế khóa lưỡi dao
      description: Chỉ định cơ chế được sử dụng để cố định lưỡi dao gấp ở vị trí mở,
        hoặc chỉ ra các thiết kế không khóa.
    knife_locking_mechanism:
      name: Cơ chế khóa bảo vệ của dao
      description: Chỉ định loại cơ chế cố định lưỡi dao ở vị trí mở, trực tiếp xác
        định độ an toàn, độ bền và tính dễ sử dụng cho dao có lưỡi khóa.
    knife_opening_mechanism:
      name: Cơ chế mở lưỡi dao
      description: Mô tả cách lưỡi dao được mở ra từ cán, phân biệt các kiểu mở bằng
        tay, hỗ trợ, tự động và đặc biệt.
    knife_system:
      name: Hệ thống dao
      description: Liệu và cách thức hoạt động của dao cắt trên máy may vắt sổ.
    knit_elastic_application:
      name: Ứng dụng dây thun dệt kim
      description: Chỉ định trường hợp sử dụng may/thủ công dự định cho dây thun dệt
        kim.
    knit_pattern:
      name: Mẫu dệt kim
      description: Xác định kiểu mũi dệt kim hoặc kết cấu chính được sử dụng trong
        vải áo khoác cardigan, chẳng hạn như kiểu cáp, kiểu gân hoặc kiểu waffle,
        cho phép người mua sắm tìm thấy các kết cấu và đặc tính nhiệt cụ thể.
    knit_style:
      name: Kiểu đan
      description: Xác định kiểu đan chính, chất liệu hoặc họa tiết trang trí trên
        vải áo len.
    knitting_marker_counter_type:
      name: Loại dụng cụ đánh dấu/đếm mũi đan
      description: Xác định loại sản phẩm chức năng trong nhóm dụng cụ đánh dấu và
        đếm mũi đan.
    knitting_needle_tip_style:
      name: Kiểu đầu kim đan
      description: Độ sắc/hình dạng đầu kim được tối ưu hóa cho các loại sợi và kỹ
        thuật đan khác nhau.
    knock_sensor_technology:
      name: Công nghệ cảm biến kích nổ
      description: Công nghệ cảm biến được sử dụng trong cảm biến va chạm.
    knurl_aggressiveness:
      name: Độ nhám
      description: Mô tả độ sắc nét hoặc kết cấu của hoa văn nhám trên thân thanh,
        ảnh hưởng đến sự thoải mái và an toàn khi cầm nắm.
    knurl_marking_standard:
      name: Tiêu chuẩn đánh dấu nhám
      description: 'Xác định vị trí của các vòng nhám tham chiếu được sử dụng để định
        vị tay (ví dụ: ký hiệu IPF hoặc IWF).'
    kohlrabi_variety:
      name: Giống củ cải Kohlrabi
      description: Xác định giống hoặc loại củ cải Kohlrabi trên thị trường, cho phép
        khách hàng lựa chọn giữa các hương vị, kích cỡ và màu sắc khác nhau.
    koji_mold_type:
      name: Loại nấm men Koji
      description: Cho biết loại hoặc chủng nấm men Koji được sử dụng trong quá trình
        lên men, ảnh hưởng đến mùi thơm và hương vị.
    kumquat_variety:
      name: Giống quất
      description: Xác định giống hoặc loại quất được cung cấp, cho phép người mua
        sắm lựa chọn trái cây dựa trên hương vị, kích cỡ hoặc ứng dụng ẩm thực.
    label_edge_type:
      name: Kiểu viền nhãn
      description: Xác định kiểu hoàn thiện viền được sử dụng để ngăn ngừa sờn rách
        và tạo tính thẩm mỹ.
    label_finish:
      name: Hoàn thiện nhãn
      description: Xác định lớp hoàn thiện bề mặt, kết cấu hoặc lớp phủ/xử lý bảo
        vệ được áp dụng cho nhãn.
    label_finish_edge_style:
      name: Kiểu hoàn thiện/viền nhãn
      description: 'Cách hoàn thiện các cạnh, ảnh hưởng đến sự thoải mái và độ bền
        (ví dụ: viền dệt so với viền cắt laser).'
    label_fold_type:
      name: Kiểu gấp nhãn
      description: 'Xác định cách nhãn may được thiết kế để may vào sản phẩm (ví dụ:
        gấp mép so với gấp giữa), ảnh hưởng đến cách dán và vị trí dán.'
    label_text_type:
      name: Loại chữ in trên nhãn
      description: Cho biết nhãn là trống, in sẵn hay được cá nhân hóa/tùy chỉnh.
    lace_area_size:
      name: Kích thước vùng ren
      description: 'Xác định kích thước hoặc cấu hình của phần ren (ví dụ: khóa 4×4,
        phần trước 13×6), quyết định không gian rẽ tóc có sẵn.'
    lace_tightener_style:
      name: Kiểu thiết bị siết ren
      description: Xác định thiết kế cơ học hoặc hình dạng của thiết bị siết ren.
    lace_type:
      name: Loại ren
      description: Mô tả chất liệu hoặc kiểu hoàn thiện của ren ở đường chân tóc/mũ,
        ảnh hưởng đến độ chân thực và sự phù hợp với màu da.
    lacrosse_ball_certification:
      name: Chứng nhận bóng Lacrosse
      description: Xác định các phê duyệt hoặc tiêu chuẩn của cơ quan quản lý thể
        thao mà bóng Lacrosse đáp ứng.
    lacrosse_goal_regulation_certification:
      name: Chứng nhận quy định khung thành Lacrosse
      description: 'Cho biết khung thành hoặc lưới Lacrosse có đáp ứng tiêu chuẩn
        của cơ quan quản lý cụ thể (ví dụ: NCAA hoặc NFHS) hay không.'
    lacrosse_pocket_type:
      name: Loại lưới Lacrosse
      description: Xác định kiểu dáng chung của lưới hoặc mặt lưới được căng vào đầu
        khung, ảnh hưởng đến khả năng kiểm soát và thả bóng.
    lacrosse_string_type:
      name: Loại dây Lacrosse
      description: Phân loại hình thức chính xác hoặc mục đích sử dụng của dây hoặc
        mặt lưới để khách hàng có thể phân biệt giữa các mảnh lưới, bộ dụng cụ và
        vai trò cụ thể của dây trong lưới.
    ladder_position:
      name: Vị trí thang
      description: Xác định vị trí thang hoặc cầu thang trên giường gác xép cho trẻ
        nhỏ.
    lanyard_attachment_hardware:
      name: Phần cứng gắn dây đeo
      description: Cho biết kiểu phần cứng ở cuối dây đeo dùng để kết nối với chìa
        khóa, thẻ, điện thoại hoặc các phụ kiện khác.
    lanyard_style:
      name: Kiểu dáng dây đeo thẻ
      description: Chỉ định cách đeo hoặc mang dây đeo.
    lanyard_type:
      name: Loại dây đeo
      description: Mô tả kiểu dây đeo được cung cấp kèm theo hoặc tương thích với
        còi.
    lap_hand_loom_accessories_included:
      name: Phụ kiện khung dệt cầm tay đi kèm
      description: Các phụ kiện đi kèm với gói khung dệt cầm tay.
    lapel_style:
      name: Kiểu ve áo
      description: 'Xác định kiểu thiết kế ve áo vest (ví dụ: ve khuyết, ve nhọn,
        ve khăn choàng).'
    laser_safety_class:
      name: Phân loại an toàn laser
      description: 'Phân loại an toàn laser của sản phẩm (ví dụ: Loại 2, 3R, 3B, 4)
        như được ghi trên tài liệu/nhãn thiết bị.'
    latex_processing_method:
      name: Phương pháp chế biến mủ cao su
      description: Xác định quy trình sản xuất được sử dụng để tạo ra bọt cao su thiên
        nhiên—thường là Dunlop hoặc Talalay—ảnh hưởng đến cảm giác, độ đàn hồi và
        giá cả.
    latex_type:
      name: Loại cao su thiên nhiên
      description: Cho biết nguồn gốc và thành phần của cao su thiên nhiên được sử
        dụng trong nệm (tự nhiên, hữu cơ, tổng hợp hoặc hỗn hợp), cung cấp thông tin
        cho người mua sắm về độ bền, tính thân thiện với môi trường và các chất gây
        dị ứng tiềm ẩn.
    launch_profile:
      name: Hồ sơ phóng
      description: Cho biết quỹ đạo phóng điển hình (thấp, trung bình, cao) mà trục
        gậy golf được thiết kế để tạo ra.
    launcher_mounting_configuration:
      name: Cấu hình lắp đặt bộ phóng
      description: Xác định cách bộ phóng được lắp đặt hoặc cấu hình để sử dụng, hỗ
        trợ người mua cần các tùy chọn độc lập, gắn dưới thân gậy hoặc gắn trên ray.
    layer_construction:
      name: Kết cấu các lớp
      description: 'Chỉ định cấu trúc lớp vải (ví dụ: 2 lớp, 2,5 lớp, 3 lớp) ảnh hưởng
        đến trọng lượng, khả năng đóng gói và độ bền.'
    layer_design:
      name: Thiết kế lớp
      description: Mô tả cấu trúc của lưới tóc về mặt lớp hoặc khả năng đảo ngược.
    lazy_kate_tension_control_type:
      name: Loại điều khiển lực căng Lazy kate
      description: Cách Lazy kate tác dụng lực kéo/lực căng lên các cuộn chỉ trong
        quá trình bện hoặc quấn.
    lead_hardware_type:
      name: Loại phần cứng dây dẫn
      description: Xác định kiểu gắn hoặc khóa ở cuối dây dẫn (khóa bấm, kẹp, vòng,
        xích, v.v.), ảnh hưởng đến sự dễ sử dụng, an toàn và tính phù hợp với bộ môn.
    leaf_gelatin_grade:
      name: Cấp độ gelatin lá
      description: Chỉ định cấp độ bền tiêu chuẩn được sử dụng cho các tấm gelatin.
    leaf_preparation:
      name: Phương pháp sơ chế lá
      description: Mô tả cách lá được chuẩn bị trước khi đóng gói, chẳng hạn như băm
        nhỏ, xé nhỏ hoặc thái sợi.
    leaf_spring_material:
      name: Chất liệu của nhíp xe
      description: Vật liệu cấu tạo chính của bộ lò xo lá.
    leak_protection_layer:
      name: Lớp chống rò rỉ
      description: Cho biết hệ thống tã (bỉm) tích hợp của quần bơi có sử dụng thiết
        kế một lớp hay hai lớp để chống rò rỉ.
    leash_clip_type:
      name: Loại kẹp dây
      description: 'Chỉ định kiểu kẹp hoặc phần cứng được sử dụng để gắn dây vào vòng
        cổ hoặc dây đeo (ví dụ: chốt gài, móc khóa carabiner, kẹp xoay).'
    leash_style:
      name: Kiểu dây
      description: Mô tả cấu hình dây hoặc kiểu cuộn của dây.
    leash_type:
      name: Loại dây dắt thú cưng
      description: Phân loại kiểu dáng tổng thể hoặc cấu hình theo mục đích của dây
        để lọc nhanh theo mục đích sử dụng.
    leavening_action_type:
      name: Loại tác dụng làm nở
      description: 'Xác định công thức hóa học hoặc kiểu làm nở của bột nở (ví dụ:
        tác dụng đơn, tác dụng kép, không chứa nhôm). Điều này ảnh hưởng trực tiếp
        đến hiệu suất nướng và tính phù hợp của công thức.'
    leavening_agent:
      name: Chất làm nở
      description: Chỉ định cơ chế làm nở chính được sử dụng trong bột nhào.
    led_color_options:
      name: Các tùy chọn màu đèn LED
      description: Liệt kê các màu đèn LED có thể lựa chọn trên thiết bị báo động
        để hiển thị tín hiệu cắn.
    led_indicator_color:
      name: Màu đèn LED báo hiệu
      description: Xác định màu sắc của đèn LED báo hiệu trên sản phẩm, giúp người
        câu cá dễ dàng lựa chọn nhiều loại báo động hoặc phù hợp với sở thích cá nhân.
    led_light_color:
      name: Màu đèn LED
      description: Xác định màu sắc của bất kỳ đèn LED tích hợp nào.
    leek_variety:
      name: Loại tỏi tây
      description: Xác định giống hoặc loại tỏi tây, cho phép phân biệt theo hương
        vị, kích thước và mùa vụ.
    leg_coverage:
      name: Độ che phủ chân
      description: 'Xác định phần chân mà bộ đồ lặn che phủ (ví dụ: ngắn, dài).'
    leg_cuff_style:
      name: Kiểu bo ống quần
      description: Xác định kiểu bo ống quần ở mắt cá chân.
    leg_cut_height:
      name: Chiều cao cắt ống quần
      description: Cho biết độ cao của đường cắt ống quần bikini.
    leg_cut_style:
      name: Kiểu cắt ống quần
      description: Mô tả hình dạng của đường cắt ống quần, ảnh hưởng đến vẻ ngoài,
        sự thoải mái và vết rám nắng.
    leg_length:
      name: Chiều dài chân
      description: Phân loại quần bơi theo chiều dài chân tương đối (ngắn, trung bình,
        dài) để người mua sắm có thể chọn độ che phủ ưa thích mà không cần chia nhỏ
        danh mục.
    leg_loop_type:
      name: Loại vòng đai đùi
      description: Mô tả thiết kế của các vòng chân.
    leg_opening_style:
      name: Kiểu ống quần
      description: Xác định cách hoàn thiện phần ống quần của quần jogger, chẳng hạn
        như bo chun, khóa kéo hoặc ống quần không bo chun.
    leg_style:
      name: Kiểu chân ghế
      description: Xác định kiểu thiết kế hoặc kiểu cấu tạo của chân hoặc đế ghế.
    legging_foot_design:
      name: Kiểu bàn chân quần legging
      description: Xác định xem quần legging có bàn chân, có bàn chân hoặc có thể
        chuyển đổi giữa cả hai kiểu.
    leggings_waistband_style:
      name: Kiểu cạp quần legging
      description: Quy định thiết kế cấu trúc của cạp quần legging, ảnh hưởng đến
        sự thoải mái, độ nâng đỡ và tính thẩm mỹ.
    lei_closure_style:
      name: Kiểu cài vòng hoa
      description: Mô tả xem vòng hoa là một vòng khép kín liên tục hay có hai đầu
        hở để buộc hoặc cài bằng ruy băng.
    lemon_variety:
      name: Giống chanh
      description: 'Xác định giống hoặc chủng loại cụ thể của chanh (ví dụ: Eureka,
        Meyer, Amalfi).'
    length_adjustment_method:
      name: Phương pháp điều chỉnh chiều dài
      description: Cho biết liệu chiều dài dây nhảy có thể điều chỉnh được cho phù
        hợp với người dùng hay không và điều chỉnh như thế nào.
    lens_color_tint:
      name: Màu/sắc độ của tròng kính
      description: Màu sắc hoặc sắc thái của tròng kính bảo hộ được cung cấp kèm theo
        sản phẩm.
    lens_construction:
      name: Cấu trúc tròng kính
      description: 'Chỉ định cấu trúc của thấu kính (ví dụ: thấu kính đơn lớp, thấu
        kính hai lớp cách nhiệt) để thể hiện khả năng chống sương mù và hiệu suất
        quang học.'
    lens_tint_category:
      name: Phân loại độ râm của tròng kính
      description: Phân loại độ tối của tròng kính dựa trên các danh mục màu sắc quốc
        tế, giúp khách hàng lựa chọn tròng kính phù hợp với các điều kiện ánh sáng
        khác nhau.
    lettuce_variety:
      name: Các loại rau diếp
      description: 'Xác định giống rau diếp cụ thể (ví dụ: rau diếp Iceberg, rau diếp
        Romaine, rau diếp Butterhead), cho phép lọc và so sánh chính xác.'
    level_of_play:
      name: Mức độ chơi
      description: Mức hiệu năng do nhà sản xuất công bố, phù hợp với khả năng cạnh
        tranh và ngân sách của người chơi.
    lever_configuration:
      name: Cấu hình cần gạt
      description: 'Chỉ định cấu hình cần gạt/tay cầm điều khiển động cơ tàu thủy
        (ví dụ: cần gạt đơn so với cần gạt kép).'
    lever_type:
      name: Loại cần gạt
      description: Loại/cơ chế của các cần gạt điều chỉnh cao độ được lắp đặt trên
        dây đàn hạc.
    license_plate_cover_style:
      name: Kiểu dáng vỏ biển số xe
      description: 'Chỉ định kiểu cấu tạo của vỏ biển số (ví dụ: vỏ che toàn bộ hay
        vỏ vặn).'
    license_plate_personalization_type:
      name: Loại cá nhân hóa biển số xe
      description: Xác định xem biển số xe là trống, in sẵn hay hỗ trợ tùy chỉnh do
        người mua cung cấp (văn bản và/hoặc hình ảnh).
    license_usage_terms:
      name: Điều khoản cấp phép/sử dụng
      description: 'Quyền sử dụng mẫu thiết kế (ví dụ: chỉ sử dụng cá nhân so với
        sử dụng thương mại hạn chế).'
    licensed_sports_property:
      name: Tài sản thể thao được cấp phép
      description: Cho biết sản phẩm có được cấp phép chính thức bởi một giải đấu/đội
        bóng/tổ chức nào đó hay không.
    lid_hinge_mechanism:
      name: Cơ chế bản lề nắp
      description: Chỉ định cơ chế bản lề được sử dụng cho nắp, ảnh hưởng đến độ an
        toàn và sự dễ sử dụng.
    lid_support_positions:
      name: Vị trí hỗ trợ nắp
      description: Chỉ định các vị trí mở nắp đàn piano được hỗ trợ cho đàn grand
        piano (mức độ mở nắp tối đa).
    lie_angle_color_code:
      name: Mã màu góc nằm
      description: 'Ký hiệu này thể hiện hệ thống góc nghiêng mặt gậy được mã hóa
        màu sắc của nhà sản xuất sử dụng trên một số loại gậy (ví dụ: chấm đen, chấm
        xanh lá cây).'
    life_jacket_certification_standard:
      name: Tiêu chuẩn chứng nhận áo phao cứu sinh
      description: Phân loại an toàn chính thức hoặc tiêu chuẩn mà sản phẩm đáp ứng,
        chẳng hạn như loại USCG hoặc cấp độ ISO/AS.
    life_raft_certification_standard:
      name: Tiêu chuẩn chứng nhận xuồng cứu sinh
      description: Tiêu chuẩn an toàn/chứng nhận mà bè cứu sinh phải đáp ứng khi chế
        tạo và bảo dưỡng.
    life_raft_container_type:
      name: Loại thùng chứa bè cứu sinh
      description: Cách đóng gói xuồng cứu sinh để cất giữ và triển khai.
    life_vest_approval_standard:
      name: Tiêu chuẩn chứng nhận của áo phao cứu sinh
      description: Chỉ định tiêu chuẩn chứng nhận/phê duyệt mà áo phao cứu sinh tuân
        thủ.
    life_vest_intended_user:
      name: Người sử dụng áo phao cứu sinh
      description: Chỉ định nhóm người dùng dự định để lựa chọn kích cỡ và trang bị
        phù hợp.
    lifebuoy_approval_standard:
      name: Tiêu chuẩn phê duyệt phao cứu sinh
      description: 'Phao cứu sinh phải đáp ứng các tiêu chuẩn hoặc chứng nhận an toàn
        (ví dụ: USCG/SOLAS).'
    lifebuoy_features:
      name: Đặc điểm của phao cứu sinh
      description: Các tính năng an toàn chức năng, lắp đặt/vận chuyển và phụ kiện
        đi kèm của phao cứu sinh.
    lift_mechanism_type:
      name: Loại cơ chế nâng
      description: Chỉ định cơ chế hỗ trợ nâng/hạ hoặc mở/đóng giường gấp tường.
    lift_stand_support_point:
      name: Điểm hỗ trợ nâng/đứng
      description: Vị trí mà thiết bị nâng/giá đỡ tiếp xúc/hỗ trợ xe.
    lifting_gas_type:
      name: Loại khí nâng
      description: Chỉ định loại khí nâng chính hoặc môi chất nổi được sử dụng bởi
        khinh khí cầu.
    lifting_support_type:
      name: Loại giá đỡ nâng
      description: Cho biết thang máy được điều khiển lên bằng đường ray hay được
        nâng lên bằng các tay/đệm tiếp xúc với khung/điểm nâng.
    ligature_and_cap_component_type:
      name: Loại dây buộc và nắp
      description: Cho biết sản phẩm là dây buộc, nắp đậy, hay bộ sản phẩm bao gồm
        cả hai.
    ligature_material:
      name: Vật liệu buộc
      description: 'Vật liệu chính của phần thân dây buộc tiếp xúc và giữ chặt lưỡi
        gà (ví dụ: kim loại, da, vải).'
    ligature_plating_or_finish:
      name: Mạ hoặc hoàn thiện dây buộc
      description: Chỉ định lớp mạ và/hoặc lớp hoàn thiện bề mặt được áp dụng cho
        kẹp và/hoặc nắp kim loại của kèn clarinet.
    ligature_reed_contact_style:
      name: Kiểu tiếp xúc lưỡi gà
      description: 'Chỉ định cách thức dây buộc tiếp xúc với lưỡi gà (ví dụ: tiếp
        xúc tối thiểu, nhiều điểm, quấn quanh).'
    ligature_screw_position_relative_to_reed:
      name: Vị trí vít buộc (so với lưỡi gà)
      description: Chỉ ra vị trí của vít siết dây buộc so với mặt tiếp xúc với lưỡi
        gà/người chơi khi được lắp vào ống ngậm.
    ligature_tension_adjustment_mechanism:
      name: Cơ chế điều chỉnh độ căng dây chằng
      description: Mô tả cách dây buộc tác động/điều chỉnh áp lực lên lưỡi gà (thiết
        kế kẹp).
    ligature_tightening_mechanism_type:
      name: Loại cơ chế siết chặt dây chằng
      description: 'Chỉ định cơ chế siết chặt dây buộc quanh ống ngậm và lưỡi gà (ví
        dụ: vít đơn, vít đôi, cần gạt/tháo nhanh).'
    light_bar_housing_material:
      name: Vật liệu vỏ đèn LED
      description: Vật liệu chính của vỏ/thân đèn LED ảnh hưởng đến độ bền và khả
        năng tản nhiệt.
    light_bar_lens_material:
      name: Chất liệu thấu kính của thanh đèn LED
      description: Vật liệu chính của thấu kính/vỏ đèn LED có thể ảnh hưởng đến khả
        năng chống va đập và độ rõ nét quang học.
    light_bar_mounting_location:
      name: Vị trí lắp đặt thanh đèn LED
      description: Vị trí lắp đặt chính dự kiến trên xe.
    light_stand_style:
      name: Kiểu chân đế nhẹ
      description: 'Thông số này chỉ định kiểu dáng hoặc hình dạng cấu trúc của giá
        đỡ được sử dụng để hỗ trợ đèn hiệu ứng đặc biệt (ví dụ: chân đế ba chân, thanh
        chữ T, tay quay), chứ không phải bề mặt lắp đặt (tường/trần), vốn được xác
        định bởi loại giá đỡ.'
    light_switch_function:
      name: Chức năng công tắc đèn
      description: Xác định mạch chiếu sáng hoặc chức năng nào mà công tắc điều khiển.
    lighting_control_protocols_supported:
      name: Các giao thức điều khiển ánh sáng được hỗ trợ
      description: Các giao thức điều khiển/mạng mà bộ điều khiển hỗ trợ ngoài hoặc
        thay thế cho DMX512.
    lighting_effects:
      name: Hiệu ứng ánh sáng
      description: Chỉ định bất kỳ tính năng chiếu sáng tích hợp nào giúp nâng cao
        trải nghiệm chơi game hoặc tính thẩm mỹ.
    lighting_mode:
      name: Chế độ chiếu sáng
      description: Liệt kê các chế độ chiếu sáng khả dụng, chẳng hạn như chiếu sáng
        liên tục, nhấp nháy, chớp tắt hoặc SOS.
    lily_variety:
      name: Giống hoa ly
      description: 'Chỉ định giống/loại thực vật của hoa ly được bán dưới dạng hoa
        cắt tươi (ví dụ: ly châu Á, ly phương Đông).'
    limb_articulation:
      name: Khớp chi
      description: Thể hiện mức độ linh hoạt hoặc khớp nối của các chi trên hình nộm
        (không có, cố định, bán linh hoạt, khớp nối hoàn toàn).
    limb_material:
      name: Chất liệu cánh cung
      description: Vật liệu chính được sử dụng trong các bộ phận của cung hoặc nỏ,
        ảnh hưởng đến trọng lượng, độ bền, độ rung và hiệu suất tổng thể.
    lime_variety:
      name: Giống chanh
      description: Xác định giống cây trồng hoặc giống thương mại cụ thể của cây chanh
        đang được bán.
    line_buoyancy:
      name: Độ nổi của dây câu
      description: Mô tả xem dây bện có tự nhiên nổi hay chìm và ở tốc độ nào, ảnh
        hưởng đến cách trình bày mồi câu và việc quản lý dây câu.
    line_purpose:
      name: Mục đích của dòng
      description: 'Xác định chức năng dự định của dây trong hệ thống diều (ví dụ:
        dây điều khiển phía trước, dây giảm lực, dây nối).'
    linen_finish_treatment:
      name: Hoàn thiện/xử lý vải lanh
      description: Bất kỳ quy trình hoàn thiện nào được áp dụng cho vải lanh làm thay
        đổi cảm giác khi chạm vào, vẻ ngoài hoặc tính năng của vải.
    linen_weave_type:
      name: Loại vải lanh dệt
      description: Chỉ định cấu trúc dệt của vải lanh, ảnh hưởng đến kết cấu, độ thoáng
        khí và độ rủ của vải.
    liner_padding_type:
      name: Loại đệm lót
      description: 'Chỉ định kiểu cấu tạo hoặc lớp đệm của lớp lót (ví dụ: lưới, đệm
        mỏng, chần bông).'
    liner_shape:
      name: Hình dạng đường kẻ
      description: Mô tả hình dạng tổng thể của lớp lót túi ngủ để khách hàng có thể
        lựa chọn sao cho phù hợp với túi ngủ và sở thích về độ thoải mái của mình.
    liner_type:
      name: Loại lót
      description: Cho biết quần short có lớp lót bên trong hay không, và nếu có thì
        kiểu dáng như thế nào.
    lining:
      name: Niêm mạc
      description: Cho biết quần bơi có lớp lót hay không và lớp lót được lót như
        thế nào, bao gồm cả mức độ che phủ của lớp lót bên trong quần.
    lining_material:
      name: Vật liệu lót
      description: Chỉ định chất liệu được sử dụng cho lớp lót bên trong giày, ảnh
        hưởng đến sự thoải mái, khả năng thoáng khí và độ ấm.
    lining_type:
      name: Loại lót
      description: Xác định xem đồ bơi có lớp lót hay không và lớp lót dày đến mức
        nào.
    link_connection_style:
      name: Kiểu kết nối liên kết
      description: 'Phân loại cách thức mắt xích được gắn vào dây xích (ví dụ: mắt
        xích nhanh, chốt nối), cho phép người lái lựa chọn phương pháp lắp đặt hoặc
        bộ phận thay thế phù hợp.'
    live_bait_form:
      name: Dạng mồi sống
      description: Chỉ định hình thức vật lý hoặc trạng thái bảo quản của mồi, chẳng
        hạn như mồi sống, đông lạnh hoặc sấy khô.
    living_room_furniture_items_included:
      name: Các món đồ nội thất phòng khách đi kèm
      description: 'Liệt kê chi tiết từng món đồ nội thất riêng lẻ thuộc bộ bàn ghế
        phòng khách, giúp người mua sắm nhanh chóng hiểu chính xác những thành phần
        nào (ví dụ: ghế sofa, ghế đôi, bàn cà phê) được bao gồm.'
    load_mechanism:
      name: Cơ chế tải
      description: 'Xác định phương pháp chính để tạo ra hoặc thêm lực cản vào máy
        (ví dụ: hệ thống tạ có thể điều chỉnh, hệ thống tạ đĩa, hệ thống tạ dây).'
    lock_cylinder_type:
      name: Loại xi lanh khóa
      description: Chỉ định loại xi lanh/lõi chìa khóa được sử dụng (liên quan đến
        khả năng chống phá khóa và chìa khóa thay thế).
    lock_security_level:
      name: Mức độ bảo mật khóa
      description: Mô tả các tính năng bảo mật chống lại việc cạy và khoan của khóa/xi
        lanh.
    lock_system:
      name: Hệ thống khóa
      description: Loại hệ thống khóa an toàn được sử dụng để giữ thang máy ở độ cao
        nhất định.
    locker_bench_configuration:
      name: Cấu hình ghế tủ khóa
      description: 'Mô tả hướng đặt hoặc cấu hình kết cấu của băng ghế tủ khóa (ví
        dụ: một mặt, hai mặt dạng đảo, gắn tường).'
    locomotive_prototype_power_type:
      name: Nguyên mẫu đầu máy xe lửa loại động cơ
      description: Xác định loại hệ thống động cơ đầu máy thực tế được mô phỏng bởi
        mô hình.
    locomotive_wheel_arrangement_whyte_notation:
      name: Sơ đồ bố trí bánh xe đầu máy (ký hiệu Whyte)
      description: 'Sơ đồ bố trí bánh xe của đầu máy nguyên mẫu (ví dụ: 4-6-2 Pacific).'
    loft_bed_height_classification:
      name: Phân loại chiều cao giường tầng
      description: Thể hiện kiểu chiều cao tổng thể của giường tầng (thấp, trung bình,
        cao, rất cao), giúp người mua sắm dễ dàng lựa chọn phù hợp với chiều cao trần
        nhà và không gian dưới gầm giường.
    logo_application_method:
      name: Phương pháp gắn logo
      description: 'Mô tả cách thức huy hiệu hoặc logo của trường được gắn lên trang
        phục (ví dụ: thêu hoặc in).'
    logo_label_compatible_fabric_weight:
      name: Trọng lượng vải phù hợp với nhãn logo
      description: Loại vải có trọng lượng phù hợp để gắn nhãn mà không bị biến dạng
        hoặc cồng kềnh.
    logo_label_edge_finish:
      name: Hoàn thiện cạnh nhãn logo
      description: Chỉ định cấu trúc/hoàn thiện mép của nhãn, yếu tố ảnh hưởng đến
        khả năng chống sờn và sự thoải mái khi tiếp xúc với da.
    logo_label_print_production_method:
      name: Phương pháp in/sản xuất nhãn logo
      description: Cách thức logo được in/tạo hình trên bề mặt nhãn.
    long_block_completeness:
      name: Hoàn thành khối dài
      description: Chỉ rõ các thành phần chính nào được bao gồm trong cụm khối dài.
    long_john_pieces_included:
      name: Bao gồm quần dài
      description: Làm rõ sản phẩm bao gồm chỉ phần đáy, chỉ phần trên, hay cả hai
        phần của bộ quần áo dài.
    longan_variety:
      name: Giống nhãn
      description: 'Chỉ rõ giống hoặc chủng loại thương mại của quả nhãn (ví dụ: Kohala,
        Biew Kiew), giúp người mua sắm xác định được hương vị, kích thước và độ ngọt
        mong muốn.'
    loom_accessories_included:
      name: Bao gồm các phụ kiện khung dệt.
      description: Các phụ kiện chính đi kèm với máy dệt được đựng trong hộp/gói hàng.
    loom_finish:
      name: Hoàn thiện khung dệt
      description: Lớp hoàn thiện bề mặt của khung dệt (chủ yếu dành cho khung dệt
        bằng gỗ).
    loom_folding_portability_design_type:
      name: Thiết kế máy dệt gấp gọn/di động
      description: Liệu máy dệt có thể gập/thu gọn để vận chuyển hoặc cất giữ gọn
        gàng hay không và cách thức thực hiện.
    loom_frame_folding_design:
      name: Thiết kế gấp gọn khung dệt
      description: Xác định xem khung dệt bàn có thể gập, thu gọn hoặc tháo rời để
        cất giữ hoặc vận chuyển hay không và bằng cách nào.
    loom_tension_adjustment_method:
      name: Phương pháp điều chỉnh độ căng khung dệt
      description: Phương pháp chính được sử dụng để điều chỉnh độ căng sợi dọc trên
        khung dệt.
    loom_tie_up_system:
      name: Hệ thống buộc khung dệt
      description: 'Loại hệ thống liên kết/kết nối được sử dụng giữa bàn đạp/thanh
        trượt/trục (ví dụ: Texsolv hoặc xích kim loại).'
    loquat_variety:
      name: Giống cây tỳ bà
      description: Chỉ định giống hoặc chủng loại của cây tỳ bà, phản ánh sự khác
        biệt về kích thước, hương vị, mùa chín và hình thức bên ngoài.
    lubricant_features:
      name: Đặc điểm của chất bôi trơn
      description: Nêu bật các đặc tính hiệu suất đặc biệt, chất phụ gia hoặc lợi
        ích của chất bôi trơn.
    lubrication_requirement:
      name: Yêu cầu bôi trơn
      description: Cho biết băng tải máy chạy bộ đã được xử lý trước/không cần bảo
        dưỡng hay cần bôi trơn hoặc đánh bóng thường xuyên.
    lubrication_type:
      name: Loại bôi trơn
      description: 'Xác định khả năng bôi trơn/mỡ của bạc lót và liệu nó có được thiết
        kế để bảo dưỡng bằng mỡ hay không (ví dụ: rãnh hoặc khớp nối zerk).'
    lug_nut_seat_profile:
      name: Hình dạng mặt ghế đai ốc bánh xe
      description: Xác định hình dạng rãnh lắp đai ốc bánh xe cần thiết để đảm bảo
        sự tương thích chính xác của đai ốc và việc lắp đặt an toàn.
    lumbar_support_type:
      name: Loại hỗ trợ thắt lưng
      description: 'Mô tả kiểu dáng hỗ trợ thắt lưng được cung cấp kèm theo ghế (ví
        dụ: gối rời, cơ chế điều chỉnh, chức năng massage).'
    lunge_trainer_style:
      name: Kiểu dụng cụ tập lunge
      description: Mô tả thiết kế cấu trúc của một dụng cụ huấn luyện ngựa.
    lure_buoyancy:
      name: Độ nổi của mồi giả
      description: 'Xác định cách mồi câu di chuyển trong cột nước khi ở trạng thái
        nghỉ hoặc trong quá trình thu dây (ví dụ: nổi trên mặt nước, lơ lửng giữa
        dòng hoặc chìm).'
    luster:
      name: Độ bóng
      description: 'Mô tả cách ánh sáng tương tác với bề mặt mẫu vật (ví dụ: thủy
        tinh, kim loại).'
    lychee_cultivar:
      name: Giống vải thiều
      description: Xác định giống hoặc chủng loại vải cụ thể—chẳng hạn như Brewster,
        Hak Ip hoặc Mauritius—có thể khác nhau về hương vị, kích thước hạt, mùa thu
        hoạch và giá cả.
    lyre_flip_folder_mounting_location:
      name: Vị trí gắn giá đỡ/thư mục lật
      description: 'Trường hợp giá đỡ hoặc kẹp gập được thiết kế để gắn vào nhạc cụ
        hoặc phụ kiện (ví dụ: chuông, ống dẫn khí, giá đỡ).'
    lyrics_display_type:
      name: Kiểu hiển thị lời bài hát
      description: Lời bài hát được hiển thị như thế nào (nếu có) trong khi hát karaoke.
    magazine_compatibility:
      name: Khả năng tương thích với băng đạn
      description: Xác định các cỡ đạn hoặc loại đạn chính mà các túi tích hợp trên
        áo gi lê được thiết kế để chứa.
    magnet_requirement:
      name: Yêu cầu về nam châm
      description: Cho biết cảm biến có cần nam châm ngoài để hoạt động hay không.
    magnet_toy_storage_included:
      name: Bao gồm hộp đựng đồ chơi nam châm
      description: Loại hộp/vỏ đựng đi kèm với đồ chơi nam châm để sắp xếp bàn làm
        việc và mang theo khi đi du lịch.
    malanga_variety:
      name: Giống Malanga
      description: Giúp người mua sắm xác định loại củ khoai môn/malanga cụ thể đang
        được bán, từ đó lựa chọn được hương vị, màu sắc hoặc cách chế biến phù hợp.
    malt_color_rating_system:
      name: Hệ thống đánh giá màu sắc mạch nha
      description: Chỉ định thang màu mà màu sắc được nêu thuộc về (Lovibond, SRM
        hoặc EBC).
    malt_crush:
      name: Nghiền mạch nha
      description: Cho biết liệu mạch nha cơ bản được bán nguyên hạt/chưa xay hay
        đã được nghiền sẵn, và nếu có thì kiểu nghiền như thế nào.
    malt_form:
      name: Dạng mạch nha
      description: 'Cho biết sản phẩm được bán dưới dạng hạt nguyên hay đã qua chế
        biến để nghiền (ví dụ: xay nhuyễn).'
    malt_intended_use:
      name: Mục đích sử dụng của mạch nha
      description: Mục đích sử dụng chính của mạch nha (sản xuất bia, chưng cất rượu
        hoặc sử dụng kép).
    malt_treatment:
      name: Xử lý mạch nha
      description: Mô tả cách thức chế biến ngũ cốc/mạch nha ngoài quy trình sấy khô
        tiêu chuẩn (các quy trình chuyên biệt thông thường).
    malt_usage_purpose:
      name: Mục đích sử dụng mạch nha
      description: Mô tả đóng góp chức năng chính của một loại mạch nha đặc biệt đối
        với công thức bia.
    man_overboard_system_type:
      name: Hệ thống cứu người rơi xuống biển
      description: Chỉ định loại giải pháp chính cứu người rơi xuống biển (MOB) do
        sản phẩm cung cấp.
    mandolin_back_sides_wood:
      name: Gỗ mặt sau và hai bên của đàn mandolin
      description: Chỉ định loại gỗ được sử dụng cho mặt lưng và hông đàn mandolin.
    mandolin_body_top_wood:
      name: Gỗ mặt trên thân đàn mandolin
      description: Loại gỗ/vật liệu chính được sử dụng cho mặt đàn mandolin (phía
        trên).
    mandolin_bridge_type:
      name: Kiểu bắt cầu đàn mandolin
      description: Xác định kiểu dáng của ngựa đàn được sử dụng trên đàn mandolin.
    mandolin_pickup_configuration:
      name: Cấu hình bộ khuếch đại âm thanh của đàn mandolin
      description: Cho biết đàn mandolin có tích hợp hệ thống điện tử hay không và
        loại hệ thống thu âm nào được lắp đặt.
    mandolin_string_configuration:
      name: Cấu hình dây của đàn mandolin
      description: 'Chỉ định cấu hình dây đàn mandolin bằng tổng số dây và số bộ dây
        (ví dụ: 8 dây / 4 bộ).'
    mangosteen_variety:
      name: Giống măng cụt
      description: Xác định loài hoặc giống cụ thể của măng cụt hoặc các loại quả
        thuộc họ Garcinia có liên quan mật thiết đang được bán.
    mannequin_style:
      name: Phong cách ma-nơ-canh
      description: Mô tả thiết kế cấu trúc hoặc kiểu xây dựng của ma-nơ-canh huấn
        luyện.
    manufacturing_process:
      name: Quy trình sản xuất
      description: 'Phương pháp sản xuất chính của thân cuộn dây hoặc ống cuộn (ví
        dụ: gia công CNC, đúc khuôn).'
    map_coverage_sky_planet_body:
      name: Phạm vi phủ sóng bản đồ (bầu trời/hành tinh)
      description: 'Cho biết bản đồ mô tả điều gì: bầu trời đêm (các chòm sao) hay
        một hành tinh cụ thể.'
    map_format:
      name: Định dạng bản đồ
      description: Xác định hình thức trình bày vật lý hoặc kỹ thuật số của bản đồ
        và sách hướng dẫn săn bắn.
    map_sensor_output_signal_type:
      name: Loại tín hiệu đầu ra của cảm biến MAP
      description: Xác định loại tín hiệu đầu ra mà cảm biến MAP cung cấp cho bộ điều
        khiển động cơ (ECU).
    map_size_sheet:
      name: Kích thước bản đồ (tờ)
      description: Chỉ định kích thước hoàn thiện của tờ bản đồ/áp phích/bản đồ sao
        để hỗ trợ việc trưng bày và khả năng tương thích (kích thước khung, không
        gian treo tường).
    marabou_feather_form:
      name: Hình dạng lông vũ Marabou
      description: Hình dạng và kích thước của sản phẩm lông vũ marabou khi được bán
        ra thị trường.
    marabou_feather_treatment:
      name: Xử lý lông vũ Marabou
      description: Quy trình xử lý hoặc hoàn thiện lông vũ marabou để sử dụng trong
        chế tác thủ công.
    marble_track_set_feature_modules:
      name: Bộ đường ray bi có các mô-đun đặc trưng
      description: 'Điểm nổi bật: Các mô-đun chức năng đặc biệt được bao gồm trong
        bộ sản phẩm (ví dụ: thang máy, bệ phóng, công tắc).'
    marine_flare_certification_standard:
      name: Chứng nhận/tiêu chuẩn pháo sáng hàng hải
      description: Cho biết chứng nhận hoặc tiêu chuẩn an toàn hàng hải nào mà thiết
        bị đốt khí thải này tuyên bố đáp ứng.
    marine_safety_standard_compliance:
      name: Tuân thủ tiêu chuẩn an toàn hàng hải
      description: Cho biết phụ kiện đó đáp ứng những tiêu chuẩn hoặc phê duyệt an
        toàn nước chính thức nào.
    marine_transmission_type:
      name: Loại hộp số dùng cho tàu thuyền
      description: 'Chỉ định loại hộp số hàng hải được ghép nối với động cơ gắn trong
        (ví dụ: truyền động trực tiếp so với truyền động chữ V).'
    marker_action_type:
      name: Loại cơ chế hoạt động của súng bắn sơn
      description: Mô tả cơ chế hoạt động/bắn cơ bản của thiết bị đánh dấu.
    marker_caliber:
      name: Cỡ nòng súng đánh dấu
      description: Chỉ định đường kính của viên bi sơn mà súng được thiết kế để bắn.
    marking_durability:
      name: Độ bền đánh dấu
      description: Chỉ số này cho biết vạch sơn dự kiến sẽ còn nhìn thấy được trong
        bao lâu trong điều kiện bình thường, chẳng hạn như tạm thời (tối đa 3 tuần),
        bán vĩnh viễn (tối đa 6 tháng) hoặc vĩnh viễn (hơn 6 tháng).
    marking_tip_type:
      name: Loại đầu đánh dấu
      description: 'Loại đầu đánh dấu mà compa sử dụng để vẽ (ví dụ: đầu chì, đầu
        mực hoặc đầu vạch).'
    marshmallow_processing_method:
      name: Phương pháp chế biến kẹo dẻo
      description: Mô tả bất kỳ quy trình chế biến đặc biệt nào được áp dụng cho kẹo
        dẻo, ảnh hưởng đến kết cấu, thời hạn sử dụng hoặc hương vị.
    marshmallow_size:
      name: Kích cỡ kẹo dẻo marshmallow
      description: Phân loại kích thước tương đối của từng viên kẹo dẻo.
    martial_arts_belt_rank:
      name: Cấp bậc đai võ thuật
      description: Chỉ định cấp độ kỹ năng/hạng bậc được thể hiện bằng màu sắc hoặc
        sự kết hợp màu sắc đặc biệt của đai.
    mask_bib_type:
      name: Khẩu trang dạng yếm
      description: Chỉ định loại yếm trên mặt nạ đấu kiếm, chẳng hạn như yếm vải tiêu
        chuẩn, yếm dẫn điện, yếm có thể tháo rời hoặc không có yếm.
    mask_cage_material:
      name: Vật liệu lồng mặt nạ
      description: Vật liệu được sử dụng đặc biệt cho khung mặt nạ hoặc khung bảo
        vệ khuôn mặt.
    mask_goggle_design:
      name: Thiết kế mặt nạ/kính bảo hộ
      description: Xác định thiết kế cấu trúc tổng thể hoặc kiểu dáng bao phủ của
        trang bị bảo hộ.
    mask_skirt_material:
      name: Chất liệu viền silicon ôm mặt của kính lặn
      description: Xác định chất liệu của lớp váy mềm tạo nên lớp bịt kín chống thấm
        nước giữa mặt nạ và khuôn mặt.
    mask_strap_material:
      name: Chất liệu dây đeo khẩu trang
      description: Chỉ định chất liệu của dây đeo dùng để cố định mặt nạ vào đầu.
    mass_air_flow_sensor_measurement_type:
      name: Loại cảm biến đo lưu lượng khí
      description: Chỉ định công nghệ cảm biến/kiểu đầu ra được sử dụng bởi cảm biến
        MAF.
    mass_air_flow_sensor_mounting_type:
      name: Kiểu lắp đặt cảm biến lưu lượng khí
      description: Cách lắp đặt cảm biến MAF hoặc cụm cảm biến trong hệ thống nạp
        khí.
    massage_feature:
      name: Tính năng massage
      description: Cho biết liệu đế điều chỉnh có tích hợp chức năng massage hay không
        và nếu có, thì có bao nhiêu vùng massage.
    mast_attachment_interface:
      name: Giao diện gắn cột buồm
      description: Xác định tiêu chuẩn kết nối giữa thân máy bay và cột ăng-ten, giúp
        người mua sắm đảm bảo sự phù hợp của các bộ phận.
    mast_base_type:
      name: Loại đế cột buồm
      description: Xác định giao diện lắp đặt kết nối cột ăng-ten với bo mạch hoặc
        bộ chuyển đổi.
    mast_bend_curve:
      name: Đường cong uốn cong của cột buồm
      description: Độ uốn cong của cột buồm quyết định khả năng tương thích và điều
        khiển buồm.
    mast_diameter_type:
      name: Loại đường kính cột
      description: 'Phân loại đường kính tiêu chuẩn của cột buồm lướt ván (ví dụ:
        RDM, SDM, MDM) được sử dụng để kiểm tra tính tương thích.'
    mat_backing_type:
      name: Loại lót thảm
      description: Chỉ định loại lớp lót ở mặt dưới của thảm giúp giữ thảm cố định
        trên nhiều bề mặt khác nhau.
    mat_installation_method:
      name: Phương pháp lắp đặt thảm
      description: Cho biết cách lắp đặt hoặc cố định tấm thảm.
    mat_style:
      name: Kiểu thảm
      description: 'Xác định kiểu dáng cấu trúc hoặc hình dạng của tấm thảm (ví dụ:
        thảm gấp, tấm ghép nối, tấm đệm chống va đập).'
    maternity_panel_type:
      name: Loại bảng xét nghiệm thai sản
      description: Chỉ định kiểu dáng của phần co giãn hoặc cạp quần được thiết kế
        để phù hợp với sự phát triển của thai kỳ.
    maternity_waistband_style:
      name: Kiểu đai lưng dành cho bà bầu
      description: Chỉ rõ thiết kế và vị trí của cạp quần hoặc phần đỡ bụng dành riêng
        cho quần bầu, mô tả cách thức trang phục hỗ trợ bụng bầu đang lớn dần.
    mattress_top_type:
      name: Loại mặt trên của nệm
      description: Chỉ định kiểu dáng của lớp trên cùng hoặc cấu trúc bề mặt của nệm,
        chẳng hạn như nệm có lớp đệm mềm (pillow top) hoặc nệm có lớp đệm cứng (tight
        top).
    maturation_vessel_material:
      name: Chất liệu của thùng/bình ủ chín
      description: Chỉ định vật liệu chính của bình hoặc thùng dùng để ủ rượu shochu.
    maximum_quilt_size_supported:
      name: Kích thước chăn tối đa được hỗ trợ
      description: Kích thước tối đa của chăn/dự án mà khung có thể chứa (thường được
        mô tả bằng kích thước giường hoặc chiều rộng tối đa).
    meal_course:
      name: Món ăn
      description: Xác định dịp dùng bữa điển hình cho sản phẩm.
    meal_preparation_state:
      name: Trạng thái chế biến của bữa ăn
      description: 'Cho biết mức độ chuẩn bị cần thiết trước khi sử dụng (ví dụ: Thực
        phẩm ăn liền, Bộ nguyên liệu nấu ăn).'
    meat_processing_state:
      name: Trạng thái chế biến thịt
      description: Thể hiện mức độ nấu chín hoặc ướp muối được áp dụng cho sản phẩm
        thịt trước khi bán.
    meat_quality_grade:
      name: Cấp độ phân loại chất lượng thịt
      description: 'Chỉ số này cho biết cấp độ chất lượng hoặc phân loại được ấn định
        cho thịt bởi một cơ quan phân loại được công nhận (ví dụ: USDA, MSA, Wagyu).'
    meat_raising_claim:
      name: Tuyên bố về việc chăn nuôi thịt
      description: 'Nêu bật những tuyên bố phổ biến về phúc lợi động vật hoặc thực
        tiễn chăn nuôi liên quan đến thịt (ví dụ: thịt bò ăn cỏ, thịt bò chăn thả
        tự do).'
    mechanical_loom_assembly_status:
      name: Trạng thái lắp ráp máy dệt cơ khí
      description: Cách thức vận chuyển hoặc giao nhận máy dệt, xét về mức độ lắp
        ráp cần thiết.
    mechanical_loom_weaving_type:
      name: Kiểu dệt máy dệt cơ khí
      description: Cơ chế/kiểu dệt chính được máy dệt hỗ trợ.
    mechanical_puzzle_primary_mechanism:
      name: Cơ chế chính của trò chơi xếp hình cơ học
      description: Phương pháp/cơ chế tương tác chính được sử dụng để giải quyết bài
        toán cơ học.
    mechanical_puzzle_solution_format:
      name: Định dạng giải câu đố cơ khí
      description: Định dạng trình bày gợi ý/giải pháp (nếu có).
    medal_attachment_style:
      name: Kiểu gắn huy chương
      description: 'Chỉ định cách thức đeo hoặc trưng bày huy chương (ví dụ: dây đeo
        cổ, ghim cài).'
    medal_award_level:
      name: Mức độ trao huy chương
      description: 'Chỉ định cấp độ giải thưởng mà huy chương thể hiện (ví dụ: giải
        nhất, người tham gia).'
    medal_finish:
      name: Hoàn thành huy chương
      description: Chỉ định độ hoàn thiện bề mặt của huy chương (độ bóng/kết cấu trực
        quan), không phụ thuộc vào vật liệu.
    medal_packaging:
      name: Bao bì huy chương
      description: Cho biết loại bao bì trình bày đi kèm với huy chương.
    melodica_accessory_set_included:
      name: Bộ phụ kiện Melodica đi kèm
      description: Những phụ kiện thông dụng nào được bao gồm trong bộ sản phẩm kèn
        melodica?
    melodica_air_chamber_material:
      name: Vật liệu buồng khí Melodica
      description: Chất liệu của buồng/thân đàn melodica (nhựa ABS, gỗ, v.v.) được
        người bán dùng để phân biệt với các bộ phận khác.
    melodica_included_accessories:
      name: Phụ kiện đi kèm của kèn melodica
      description: Các phụ kiện đi kèm sẵn với kèn melodica ở trong hộp.
    melodica_key_color_scheme:
      name: Sơ đồ màu sắc chủ đạo của đàn Melodica
      description: Màu sắc của các phím (không phải toàn bộ thân phím) ảnh hưởng đến
        khả năng đọc (đặc biệt là đối với trẻ em/người mới bắt đầu).
    melodica_mouthpiece_configuration:
      name: Cấu hình ống ngậm Melodica
      description: Cho biết (các) giao diện thổi nào được bao gồm/sử dụng để chơi
        đàn melodica.
    melodica_mouthpiece_type:
      name: Loại ống ngậm kèn Melodica
      description: Kiểu giao diện thổi hơi được bao gồm kèm theo đàn melodica (ống
        ngậm và/hoặc ống mềm).
    melodica_reed_plate_material:
      name: Chất liệu tấm chứa lam đồng của kèn melodica
      description: Chất liệu của tấm lưỡi gà (khác với chất liệu tổng thể của thân
        nhạc cụ), có thể ảnh hưởng đến độ bền và âm thanh.
    melodica_size_class:
      name: Kích thước Melodica
      description: 'Phân loại kích thước/độ di động chung cho đàn melodica, thường
        dựa trên nhóm số phím và kiểu dáng (ví dụ: mẫu mini/học sinh so với mẫu tiêu
        chuẩn so với mẫu có phạm vi âm rộng).'
    melon_variety:
      name: Giống dưa
      description: Ghi rõ loại dưa cụ thể trong sản phẩm để giúp người mua sắm hàng
        nhanh chóng xác định loại dưa họ muốn.
    memory_foam_infusion_material:
      name: Vật liệu thấm mút hoạt tính
      description: Xác định các chất đặc biệt được thêm vào mút hoạt tính để làm mát,
        khử mùi hoặc kháng khuẩn.
    memory_wire_gauge:
      name: Dây đo độ cứng của bộ nhớ
      description: Chỉ định kích thước dây dẫn theo tiêu chuẩn Mỹ (AWG) của dây dẫn
        nhớ hình dạng.
    memory_wire_project_size:
      name: Kích thước dự án dây nhớ
      description: 'Chỉ định hình dạng/kích thước cuộn dây trang sức dự định mà dây
        nhớ được tạo hình (ví dụ: vòng tay, dây chuyền, nhẫn).'
    metal_purity:
      name: Độ tinh khiết của kim loại
      description: Chỉ số này cho biết độ tinh khiết của kim loại được sử dụng trong
        đồ trang sức, thường được biểu thị bằng karat (K) hoặc phần nghìn.
    metrics_counted:
      name: Các chỉ số được tính toán
      description: Liệt kê các số liệu thống kê hoặc sự kiện riêng lẻ mà bộ đếm được
        thiết kế để theo dõi.
    metronome_display_style:
      name: Kiểu hiển thị máy đếm nhịp
      description: Chỉ định cách hiển thị/chỉ báo nhịp độ cho người dùng (kim/con
        lắc so với màn hình LED/LCD số so với đèn nhấp nháy).
    metronome_output_method:
      name: Phương pháp xuất tín hiệu của máy đếm nhịp
      description: Chỉ định các phương thức xuất tín hiệu khả dụng cho âm thanh/nhịp
        điệu của máy đếm nhịp.
    microphone_toy_feature_set:
      name: Bộ đồ chơi micro với nhiều tính năng
      description: Các tính năng chính của micro đồ chơi tập trung vào việc chơi đùa
        (hiệu ứng giọng nói, khuếch đại, ghi âm, v.v.).
    midi_output_type:
      name: Loại đầu ra MIDI
      description: Chỉ định loại (các) tín hiệu MIDI đầu ra do mô-đun kích hoạt cung
        cấp.
    military_branch:
      name: Ngành quân sự
      description: Xác định binh chủng mà bộ đồng phục đó được cấp phát hoặc lấy cảm
        hứng từ đó.
    milk_base_type:
      name: Loại sữa nền
      description: Chỉ định loại sữa chính hoặc sữa thay thế được sử dụng trong đồ
        uống, nếu có.
    milk_feeding_method:
      name: Phương pháp cho bú sữa
      description: 'Thông tin này cho biết cách thức chăn nuôi các động vật nguồn
        (ví dụ: ăn cỏ hay ăn ngũ cốc), điều này có thể ảnh hưởng đến hương vị và giá
        trị dinh dưỡng.'
    milk_processing_method:
      name: Phương pháp chế biến sữa
      description: Chỉ rõ phương pháp xử lý hoặc chế biến sữa đã trải qua, ảnh hưởng
        đến độ an toàn, thời hạn sử dụng và các đặc tính dinh dưỡng.
    milk_source_animal:
      name: Động vật cho sữa
      description: Thông tin này giúp xác định loại động vật lấy sữa, từ đó giúp người
        tiêu dùng lựa chọn sữa bò, sữa dê, sữa trâu hoặc các sản phẩm sữa từ động
        vật khác.
    millet_processing_method:
      name: Phương pháp chế biến kê
      description: 'Chỉ định phương pháp chế biến chính hoặc trạng thái của hạt kê
        (ví dụ: chưa xay xát, đã bóc vỏ, đã nảy mầm).'
    millet_variety:
      name: Giống kê
      description: 'Xác định loại hạt kê cụ thể có trong sản phẩm (ví dụ: kê ngọc
        trai, kê đuôi cáo, kê ngón tay).'
    milling_process:
      name: Quá trình nghiền
      description: Chỉ số này cho biết phương pháp sản xuất được sử dụng để xay bột,
        có thể ảnh hưởng đến hương vị, độ nhạy nhiệt và giá trị dinh dưỡng.
    mint_mark:
      name: Dấu hiệu xưởng đúc
      description: Dấu hiệu xưởng đúc như hiển thị trên đồng xu (nếu có).
    mirror_configuration:
      name: Cấu hình gương
      description: Chỉ định kiểu dáng hoặc cấu trúc của gương đi kèm với bộ bàn trang
        điểm.
    mirror_coverage:
      name: Thông tin phản chiếu
      description: Mô tả phạm vi của các tấm gương trên cửa trượt.
    mirror_curvature_type:
      name: Loại độ cong của gương
      description: Tham số này xác định xem bề mặt gương là lồi, phẳng hay lõm, ảnh
        hưởng đến trường nhìn.
    mirror_mounting_location:
      name: Vị trí lắp gương
      description: Xác định vị trí lắp đặt gương trên xe đạp hoặc người lái.
    mirror_shape:
      name: Hình dạng gương
      description: Chỉ định hình dạng hình học hoặc kiểu dáng của chiếc gương chính
        đi kèm với bộ bàn trang điểm.
    mix_ratio:
      name: Tỷ lệ pha trộn
      description: Chỉ định tỷ lệ pha loãng chất làm mát với nước được khuyến nghị
        (đối với chất cô đặc), hoặc xác nhận tỷ lệ pha trộn cố định cho các sản phẩm
        đã được pha loãng sẵn.
    mma_glove_type:
      name: Loại găng tay MMA
      description: Chỉ rõ mục đích sử dụng chính hoặc kiểu dáng của găng tay trong
        quá trình tập luyện hoặc thi đấu MMA.
    mobility_features:
      name: Tính năng di động
      description: Biểu thị các yếu tố di chuyển hoặc tính di động được tích hợp sẵn
        như bánh xe hoặc chân có thể gập lại.
    model_aircraft_assembly_level:
      name: Mức độ lắp ráp mô hình máy bay
      description: Cho biết cần phải xây dựng bao nhiêu công đoạn trước khi máy bay
        có thể được đưa vào sử dụng.
    model_making_kit_items_included:
      name: Bộ dụng cụ làm mô hình bao gồm các vật phẩm
      description: 'Liệt kê những gì có trong bộ dụng cụ hoặc gói sản phẩm làm mô
        hình (ví dụ: sơn, keo, cọ).'
    model_making_product_type:
      name: Loại sản phẩm làm mô hình
      description: Xác định bản chất cơ bản của mặt hàng trong lĩnh vực chế tạo mô
        hình (bộ dụng cụ, phụ kiện, công cụ hoặc vật tư) để cải thiện khả năng duyệt
        và lọc sản phẩm thuộc nhiều loại khác nhau trong ngành Chế tạo Mô hình.
    model_rocket_kit_contents:
      name: Nội dung bộ dụng cụ tên lửa mô hình
      description: 'Cho biết sản phẩm là bộ mô hình tên lửa nhiều tầng hoàn chỉnh
        hay là bộ phụ kiện/mô-đun/linh kiện bổ sung (ví dụ: các bộ phận của tầng đẩy
        hoặc tầng duy trì).'
    model_rocket_kit_format:
      name: Định dạng bộ mô hình tên lửa
      description: Xác định xem tên lửa được bán dưới dạng bộ phận lắp ráp hay không
        và mức độ sẵn sàng lắp ráp.
    model_rocket_motor_impulse_class:
      name: động cơ tên lửa mô hình loại xung lực
      description: 'Chỉ định cấp độ xung lực tổng thể tiêu chuẩn của động cơ tên lửa
        mô hình (ví dụ: A, B, C...).'
    model_rocket_motor_mount_size:
      name: Kích thước giá đỡ động cơ tên lửa mô hình
      description: Chỉ định đường kính vỏ động cơ mà giá đỡ động cơ của tên lửa được
        thiết kế để chấp nhận.
    model_rocket_power_source_required:
      name: Cần nguồn năng lượng cho tên lửa mô hình.
      description: Cho biết sản phẩm có cần pin/nguồn điện ngoài hay không, và loại
        nào.
    model_rocket_propellant_type:
      name: Loại nhiên liệu tên lửa mô hình
      description: Xác định hệ thống nhiên liệu/động cơ được sử dụng để đẩy trong
        các sản phẩm tên lửa mô hình.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Kích thước thanh phóng hoặc ray phóng được khuyến nghị cho mô hình tên
        lửa
      description: 'Chỉ định đường kính thanh phóng hoặc kích thước ray mà tên lửa
        được thiết kế cho (ví dụ: thanh 1/8 inch, ray phóng 1010).'
    model_rocket_recovery_method:
      name: Phương pháp thu hồi tên lửa mô hình
      description: Hệ thống thu hồi chính dùng để đưa tên lửa về an toàn sau khi bay.
    model_rocket_recovery_system_type:
      name: Hệ thống thu hồi tên lửa mô hình loại
      description: Chỉ định phương pháp thu hồi chính được sử dụng để đưa tên lửa
        trở về an toàn sau khi phóng.
    model_rocket_staging:
      name: Tên lửa mô hình phân tầng
      description: Cho biết tên lửa mô hình được thiết kế để bay với bao nhiêu tầng
        đẩy.
    model_train_accessory_electrical_connection_type:
      name: Loại kết nối điện cho phụ kiện mô hình tàu hỏa
      description: Chỉ định kiểu đầu nối hoặc cực đấu dây được sử dụng để kết nối
        các phụ kiện xe lửa mô hình có động cơ với bố cục đường ray (nếu có).
    model_train_coupler_type:
      name: Khớp nối mô hình tàu hỏa
      description: Chỉ định tiêu chuẩn khớp nối được lắp đặt trên toa xe hoặc đầu
        máy xe lửa mô hình.
    model_train_gauge:
      name: Khổ đường ray tàu hỏa mô hình
      description: Chỉ định hệ thống khổ đường sắt mô hình mà phụ kiện này dành cho
        (nếu có), giúp đảm bảo tính tương thích vật lý với đường ray và bố cục của
        người dùng.
    model_train_lighting_features:
      name: Tính năng đèn của tàu hỏa mô hình
      description: Chỉ định chức năng chiếu sáng được tích hợp trên mô hình tàu hỏa/đầu
        máy xe lửa.
    model_train_power_pickup_method:
      name: Phương pháp lấy nguồn điện cho mô hình tàu hỏa
      description: Chỉ định cách thức mô hình nhận nguồn điện để hoạt động (nguồn
        điện từ đường ray, pin, v.v.).
    model_train_scale:
      name: Tỷ lệ tàu hỏa mô hình
      description: Xác định tỷ lệ/kích thước tiêu chuẩn của mô hình tàu hỏa (mối quan
        hệ giữa mô hình và tàu hỏa thật).
    model_train_sound_features:
      name: Tính năng âm thanh của mô hình tàu hỏa
      description: Cho biết liệu mẫu máy có tích hợp hiệu ứng âm thanh hay không và
        loại âm thanh mà máy cung cấp.
    model_train_track_gauge:
      name: Khổ đường ray xe lửa mô hình
      description: 'Chỉ định khổ đường ray/tiêu chuẩn hệ thống đường ray mà mô hình
        được thiết kế để hoạt động (ví dụ: khổ tiêu chuẩn, các biến thể khổ hẹp, hoặc
        khổ đường ray dành riêng cho thương hiệu/hệ thống nếu có).'
    modeling_dough_base_material:
      name: Vật liệu nền dạng bột nặn
      description: 'Thành phần/nguyên liệu chính của bột nhào tạo hình (ví dụ: bột
        mì/bột mì so với bột polymer).'
    modeling_dough_features:
      name: Đặc điểm của bột nặn
      description: Các đặc điểm chức năng chính của bột nặn mà người mua thường lọc
        theo.
    modification_level:
      name: Mức độ sửa đổi
      description: Chỉ số này cho biết mức độ biến tính của mạch nha (mức độ phân
        giải nội nhũ/protein của lúa mạch), thường được tóm tắt là biến tính chưa
        đầy đủ/biến tính đầy đủ/biến tính quá mức.
    molasses_base_ingredient:
      name: Thành phần cơ bản của mật mía
      description: Xác định nguồn thực vật hoặc trái cây chính dùng để sản xuất mật
        mía.
    molasses_grade:
      name: Phân loại mật đường
      description: Phân loại mật đường theo giai đoạn chiết xuất/tinh chế, điều này
        ảnh hưởng trực tiếp đến độ đậm đà của hương vị, màu sắc và giá trị dinh dưỡng.
    mold_material:
      name: Chất liệu khuôn
      description: 'Thành phần vật liệu chính của khuôn (ví dụ: silicon, nhựa, kim
        loại).'
    molle_compatibility:
      name: Khả năng tương thích MOLLE
      description: Cho biết liệu áo gi lê có trang bị hệ thống dây đeo MOLLE/PALS
        để gắn các túi và phụ kiện dạng mô-đun hay không.
    motor_belt_type:
      name: Loại dây đai động cơ
      description: Xác định thiết kế/hình dạng của dây đai được sử dụng trong hệ thống
        truyền động của máy chạy bộ.
    motor_configuration:
      name: Cấu hình động cơ
      description: Cho biết xe tay ga sử dụng bao nhiêu động cơ dẫn động độc lập.
    motor_mounting_configuration:
      name: Cấu hình giá lắp động cơ
      description: Mô tả cách động cơ được lắp đặt/lắp ráp trong bộ dụng cụ chuyển
        đổi dành cho xe tay ga.
    motor_mounting_position:
      name: Vị trí lắp động cơ
      description: Cho biết vị trí lắp đặt động cơ trên xe điện, chẳng hạn như trục
        bánh trước, trục bánh sau, trục kép hoặc động cơ đặt giữa xe.
    motor_position:
      name: Vị trí động cơ
      description: Chỉ ra vị trí đặt động cơ trên xe đạp điện, ảnh hưởng đến khả năng
        điều khiển và bảo trì.
    motor_vehicle_a_v_integration_features:
      name: Tính năng tích hợp âm thanh/hình ảnh cho xe cơ giới
      description: 'Các tính năng tích hợp điện thoại thông minh và hệ thống trên
        xe được hỗ trợ bởi bộ điều khiển trung tâm (ví dụ: Apple CarPlay, Android
        Auto, MirrorLink).'
    motor_vehicle_bulb_application_position:
      name: Vị trí/cách lắp đặt bóng đèn xe cơ giới
      description: 'Chỉ định vị trí hoặc chức năng chiếu sáng dự định của bóng đèn
        trên xe (ví dụ: đèn chiếu gần, đèn phanh).'
    motor_vehicle_bulb_approval_standard:
      name: Tiêu chuẩn phê duyệt bóng đèn xe cơ giới
      description: Biểu thị dấu hiệu tuân thủ/phê duyệt theo quy định để sử dụng trên
        đường bộ tại thị trường mục tiêu.
    motor_vehicle_oxygen_sensor_bank:
      name: Cụm cảm biến oxy của xe cơ giới
      description: 'Chỉ định vị trí lắp đặt cảm biến oxy trên dãy xi-lanh nào của
        động cơ (ví dụ: Dãy 1 so với Dãy 2) đối với động cơ kiểu V/boxer; không áp
        dụng cho động cơ thẳng hàng.'
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Số lượng dây của cảm biến oxy trên xe cơ giới
      description: Số lượng dây trong bó dây cảm biến oxy.
    motor_vehicle_oxygen_sensor_position:
      name: Vị trí cảm biến oxy của xe cơ giới
      description: Xác định vị trí lắp đặt cảm biến oxy (O2) trong hệ thống khí thải
        so với bộ chuyển đổi xúc tác.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: số cảm biến oxy của xe cơ giới
      description: 'Chỉ định số thứ tự cảm biến (ví dụ: Cảm biến 1 hoặc Cảm biến 2)
        trong một nhóm/vị trí cụ thể.'
    motor_vehicle_oxygen_sensor_type:
      name: Loại cảm biến oxy cho xe cơ giới
      description: Chỉ định thiết kế/công nghệ cảm biến oxy.
    motor_vehicle_paint_application_method:
      name: Phương pháp sơn xe cơ giới
      description: Cách thức sơn được dự định áp dụng lên bề mặt xe.
    motor_vehicle_paint_system_step:
      name: Các bước trong hệ thống sơn xe cơ giới
      description: 'Cho biết sản phẩm này dành cho bước hoặc thành phần nào trong
        hệ thống sơn sửa chữa ô tô (ví dụ: sơn lót, sơn nền, sơn phủ bóng).'
    motor_vehicle_speaker_mounting_type:
      name: Loại giá đỡ loa xe cơ giới
      description: Cách thức lắp đặt loa trong xe (kiểu dáng giá đỡ).
    motor_vehicle_subwoofer_size:
      name: Kích thước loa trầm của xe cơ giới
      description: 'Đường kính danh nghĩa của củ loa siêu trầm (ví dụ: 8 inch, 10
        inch, 12 inch), được sử dụng để phù hợp với không gian trong xe và khả năng
        tương thích với thùng loa.'
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Cấu hình cuộn dây âm thanh của loa siêu trầm xe cơ giới
      description: 'Số lượng/cấu hình cuộn dây âm thanh được sử dụng để phù hợp với
        các tùy chọn đấu dây của bộ khuếch đại (ví dụ: SVC so với DVC).'
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Trở kháng cuộn dây loa siêu trầm xe hơi (mỗi cuộn dây)
      description: Thông số trở kháng của mỗi cuộn dây âm thanh (không phải tải cuối
        cùng khi đấu dây), được sử dụng cho các tính toán đấu dây.
    motor_vehicle_voltage_regulator_type:
      name: Bộ điều chỉnh điện áp xe cơ giới
      description: Chỉ định công nghệ/hình thức bộ điều chỉnh được sử dụng trong xe
        cơ giới.
    motorcycle_armor_certification_standard:
      name: Tiêu chuẩn chứng nhận áo giáp xe máy
      description: 'Cho biết tiêu chuẩn an toàn chính thức mà thiết bị bảo hộ được
        chứng nhận đáp ứng (ví dụ: EN 1621-2 cho thiết bị bảo hộ lưng, EN 1621-3 cho
        thiết bị bảo hộ ngực).'
    motorcycle_cover_size_class:
      name: Kích thước bạt che xe máy
      description: Thùng đựng có kích thước tiêu chuẩn dành cho bạt che xe máy, dựa
        trên loại/chiều dài xe máy thông thường mà nó phù hợp.
    motorcycle_glove_certification_standard:
      name: Tiêu chuẩn chứng nhận găng tay xe máy
      description: 'Ghi rõ chứng nhận/tiêu chuẩn bảo hộ mà găng tay tuân thủ (ví dụ:
        cấp độ EN 13594).'
    motorcycle_glove_waterproof_construction:
      name: Găng tay xe máy chống thấm nước
      description: Chỉ định loại phương pháp chống thấm nước được sử dụng trong găng
        tay (nếu có).
    motorcycle_guard_coverage_area:
      name: Khu vực bảo vệ xe mô tô
      description: Vùng bảo vệ chính của sản phẩm (khuỷu tay, cổ tay, cẳng tay, kết
        hợp).
    motorcycle_kidney_belt_construction_type:
      name: Loại đai bảo vệ thận dành cho xe mô tô
      description: Kiểu cấu tạo của đai đỡ thận ảnh hưởng đến độ cứng, khả năng thoáng
        khí và khả năng bảo vệ.
    motorcycle_kidney_belt_purpose:
      name: Mục đích của đai bảo vệ thận khi đi xe mô tô
      description: Xác định phong cách lái xe hoặc tình huống chính mà đai bảo vệ
        thận dành cho xe mô tô được thiết kế.
    motorcycle_luggage_capacity_class:
      name: Hạng dung tích hành lý xe mô tô
      description: Thể hiện dung tích của thùng hành lý xe mô tô, được biểu thị bằng
        lít.
    motorcycle_luggage_mounting_system:
      name: Hệ thống giá đỡ hành lý xe mô tô
      description: 'Hệ thống gắn/lắp dùng để cố định túi/thùng đựng đồ vào xe mô tô
        (ví dụ: dây đeo chéo, khóa nhanh gắn trên giá đỡ).'
    motorcycle_luggage_side:
      name: Thùng hành lý bên hông xe mô tô
      description: Đối với túi yên xe, ký hiệu này cho biết sản phẩm dành cho bên
        trái, bên phải hoặc cả cặp/bộ.
    motorcycle_protective_gear_size_system:
      name: Hệ thống kích thước trang bị bảo hộ xe mô tô
      description: 'Cho biết hệ thống kích cỡ được sử dụng trên sản phẩm (ví dụ: kích
        cỡ chữ cái, kích cỡ số, một kích cỡ duy nhất).'
    motorcycle_rack_carrier_style:
      name: Giá đỡ xe mô tô kiểu dáng
      description: Mô tả kiểu giá đỡ chức năng để vận chuyển xe mô tô hoặc xe tay
        ga (kiểu bệ đỡ, kiểu ray, kiểu nâng hạ, v.v.).
    motorcycle_riding_discipline:
      name: Kỷ luật lái xe mô tô
      description: Xác định mục đích sử dụng/bộ môn đạp xe chính mà đai bảo vệ cổ
        hướng tới.
    motorcycle_tire_speed_rating:
      name: Xếp hạng tốc độ của lốp xe mô tô
      description: 'Xác định tốc độ tối đa mà lốp xe được thiết kế để chịu được, sử
        dụng mã chữ cái tiêu chuẩn (ví dụ: H, V, W).'
    motorsport_window_net_certification:
      name: Chứng nhận lưới cửa sổ dành cho môn thể thao đua xe
      description: 'Chứng nhận an toàn hoặc tiêu chuẩn phê duyệt cho lưới cửa sổ (ví
        dụ: SFI hoặc FIA), bao gồm cả số hiệu kỹ thuật nếu có.'
    mound_usage_type:
      name: Loại hình sử dụng gò đất
      description: Xác định môi trường ứng dụng dự định của gò ném bóng, chẳng hạn
        như Luyện tập, Thi đấu, Khu vực khởi động hoặc Đa năng.
    mount_attachment_method:
      name: Phương thức gắn giá đỡ
      description: Chỉ định cách thức gắn giá đỡ vào bề mặt/cấu trúc của xe.
    mountainboard_truck_type:
      name: Loại trục ván trượt núi
      description: Phân loại kiểu trục bánh xe đi kèm với ván trượt, ảnh hưởng đến
        khả năng điều khiển và độ bền.
    mounting_attachment_method:
      name: Phương pháp lắp đặt/gắn
      description: Cách thiết kế giá đỡ/túi để gắn vào trống, giá đỡ, thắt lưng hoặc
        bề mặt khác.
    mounting_attachment_type:
      name: Loại giá đỡ/kiểu gắn
      description: Cách thức phụ kiện tỷ lệ được gắn hoặc kết nối với bánh xe quay
        sợi.
    mounting_hardware_included_for_installation:
      name: Bao gồm trang thiết bị lắp đặt (để lắp đặt)
      description: 'Cho biết liệu các trang thiết bị lắp đặt cần thiết để lắp đặt
        ghế sau (ví dụ: giá đỡ, bu lông, thanh ray) có được bao gồm trong sản phẩm
        hay không.'
    mounting_location:
      name: Vị trí lắp đặt
      description: 'Xác định vị trí dự định lắp đặt đèn/phản quang trên thiết bị hoặc
        cơ thể (ví dụ: phuộc trước, mũ bảo hiểm, nan hoa bánh xe).'
    mounting_method:
      name: Phương pháp lắp đặt
      description: 'Cách lắp đặt hoặc gắn giá đỡ que/cọ (ví dụ: kẹp, dây đeo, keo
        dán).'
    mounting_position:
      name: Vị trí lắp đặt
      description: Xác định vị trí dự kiến lắp đặt bộ điều khiển phanh tay trong khoang
        xe.
    mounting_rail_type:
      name: Loại thanh ray lắp đặt
      description: Chỉ định loại ray hoặc tiêu chuẩn giao diện mà phụ kiện được gắn
        vào, chẳng hạn như Picatinny hoặc M-LOK.
    mounting_receiver_size:
      name: Kích thước bộ thu tín hiệu lắp đặt
      description: Kích thước móc kéo cần thiết cho giá chở hàng gắn trên móc kéo.
    mounting_storage_type:
      name: Loại lắp đặt/lưu trữ
      description: Thiết bị này dự kiến sẽ được lắp đặt hoặc cất giữ như thế nào trên
        tàu/trên người.
    mouth_grip_type:
      name: Kiểu cầm miệng
      description: Mô tả loại tay cầm hoặc bộ phận bảo vệ miệng trên còi để tạo sự
        thoải mái và vệ sinh.
    mouthguard_mold_type:
      name: Khuôn bảo vệ miệng
      description: 'Mô tả cách lắp đặt dụng cụ bảo vệ răng miệng sao cho vừa khít
        với răng của vận động viên (ví dụ: phương pháp luộc và cắn, phương pháp tùy
        chỉnh theo răng).'
    mouthpiece_facing_length:
      name: Chiều dài tiếp xúc của ống ngậm
      description: Chỉ số này cho biết loại chiều dài đường cong tiếp xúc (độ nghiêng)
        của ống ngậm (không phải chiều dài tổng thể của ống ngậm), ảnh hưởng đến độ
        nhạy, lực cản và khả năng tương thích với lưỡi gà.
    mouthpiece_material:
      name: Vật liệu ống ngậm
      description: Chỉ định chất liệu của phần đầu/ống ngậm tiếp xúc với miệng của
        dụng cụ thổi (dụng cụ thổi trong các bữa tiệc), chất liệu này có thể khác
        với chất liệu của phần thân chính.
    mouthpiece_shank_receiver_size:
      name: Kích thước cán/đầu nối ống ngậm
      description: Chỉ định tiêu chuẩn phần nối/thân ống ngậm tương thích với kèn
        flugelhorn.
    mouthpiece_shank_size:
      name: Kích thước cán ống ngậm
      description: Quy định tiêu chuẩn về độ khít giữa cán và khớp nối ống ngậm để
        đảm bảo tính tương thích với nhạc cụ hơi bằng đồng dự định sử dụng.
    mouthpiece_shank_type:
      name: Kiểu chuôi phần ngậm
      description: Chỉ định tiêu chuẩn bộ phận tiếp nhận/cán ống ngậm để đảm bảo tính
        tương thích (nếu có).
    mouthpiece_style:
      name: Kiểu dáng phần ngậm
      description: Phân loại thiết kế/hình dạng của phần ngậm miệng của hàm thiếc,
        yếu tố ảnh hưởng đến các điểm chịu lực, độ nghiêm trọng và sở thích của ngựa.
    mouthpiece_type:
      name: Loại phần ngậm
      description: Loại đầu thổi (gắn liền, tháo rời hoặc gắn thêm).
    movement_mechanism:
      name: Cơ chế chuyển động
      description: Xác định cách ghế di chuyển trong quá trình sử dụng (đung đưa,
        trượt, lắc lư, v.v.).
    muffin_size:
      name: Kích thước bánh muffin
      description: 'Phân loại kích thước vật lý của sản phẩm bánh muffin (ví dụ: mini,
        tiêu chuẩn, jumbo).'
    mushroom_variety:
      name: Các loại nấm
      description: 'Xác định loài hoặc giống nấm cụ thể hoặc nấm cục có trong sản
        phẩm (ví dụ: Nấm Shiitake, Nấm sò vua, Nấm cục đen).'
    music_stand_desk_tilt_adjustment:
      name: Giá đỡ nhạc có thể điều chỉnh độ nghiêng
      description: Cho biết liệu góc nghiêng của bàn có thể điều chỉnh được hay không
        và điều chỉnh như thế nào.
    music_stand_intended_use:
      name: Mục đích sử dụng của giá để nhạc
      description: Cho biết mục đích sử dụng/ứng dụng chính của giá đỡ.
    musical_block_pitch_type:
      name: Loại cao độ khối nhạc
      description: Mô tả xem khối nhạc cụ đó tạo ra âm thanh có cao độ xác định (đã
        được điều chỉnh) hay cao độ không xác định.
    musical_box_mechanism_type:
      name: Loại cơ chế hộp nhạc
      description: 'Cách hộp nhạc tạo ra/phát âm thanh (ví dụ: cơ chế lên dây cót
        so với phát âm thanh điện tử).'
    musical_keyboard_case_fit_type:
      name: Loại hộp đựng đàn phím phù hợp
      description: 'Mô tả cách vỏ đựng được thiết kế sao cho phù hợp với nhạc cụ (ví
        dụ: phạm vi kích thước phổ thông/chung so với kích thước dành riêng cho từng
        loại nhạc cụ).'
    musical_ratchet_sound_character:
      name: Đặc điểm âm thanh bánh răng nhạc
      description: Mô tả chung về đặc điểm âm sắc/độ lớn của tiếng kêu cót két.
    musical_scraper_groove_surface_material:
      name: Vật liệu bề mặt rãnh cạo nhạc
      description: Chỉ định vật liệu của bề mặt cạo có rãnh/gờ (có thể khác với vật
        liệu thân máy).
    musical_scraper_type:
      name: Loại máy cạo nhạc
      description: 'Xác định kiểu dáng/thiết kế của nhạc cụ cào (ví dụ: guiro so với
        reco-reco), điều này ảnh hưởng đến âm thanh và kỹ thuật chơi.'
    mute_attachment_method:
      name: Phương thức gắn bộ giảm thanh
      description: 'Chỉ định cách gắn hoặc giữ bộ phận giảm âm cho chũm chọe trên
        chũm chọe (ví dụ: gel, tĩnh điện, nam châm, kẹp).'
    mute_attenuation_level:
      name: Mức độ suy giảm âm thanh
      description: Chỉ số này cho biết mức độ giảm âm lượng cảm nhận được của bộ phận
        giảm âm, đặc biệt hữu ích đối với các bộ phận giảm âm dùng để luyện tập.
    mute_cork_padding_material:
      name: Vật liệu đệm/nút bần giảm âm
      description: 'Chỉ định chất liệu của lớp đệm tiếp xúc (ví dụ: dải/miếng đệm
        bằng nút bần) được sử dụng để tạo độ bám/vừa khít và bảo vệ phần chuông của
        bộ phận giảm âm.'
    mute_coverage_type:
      name: Loại phạm vi che phủ của bộ giảm thanh
      description: Chỉ định kiểu dáng/phạm vi tác dụng của bộ phận giảm âm trên bề
        mặt phím đàn, từ các bộ phận giảm âm nhỏ đến các bộ phận giảm âm phủ toàn
        bề mặt dùng để luyện tập.
    mute_finish:
      name: Kết thúc bằng âm thanh
      description: 'Lớp hoàn thiện bề mặt của bộ giảm âm có thể ảnh hưởng đến độ bền
        và tính thẩm mỹ (ví dụ: bề mặt bóng loáng so với bề mặt mờ).'
    name_label_text_template:
      name: Mẫu văn bản nhãn tên
      description: 'Chỉ định văn bản hoặc mẫu được thiết lập sẵn để in trên nhãn tên
        (ví dụ: ''Thuộc về'', ''Được sản xuất bởi'').'
    napkin_ply:
      name: Lớp khăn ăn
      description: Chỉ số này thể hiện độ dày của khăn ăn cocktail theo số lớp.
    neck_brace_fit_system:
      name: Hệ thống điều chỉnh đai đỡ cổ
      description: Chỉ ra phương pháp chính được sử dụng để điều chỉnh và cố định
        đai đỡ cổ cho người lái.
    neck_brace_size_basis:
      name: Kích thước nẹp cổ dựa trên tiêu chuẩn
      description: Cho biết cơ sở định cỡ được sử dụng để chọn kích thước đai cổ phù
        hợp.
    neck_configuration:
      name: Cấu hình cần đàn
      description: Chỉ định kiểu/cấu hình cần đàn được trang bị kèm theo kèn saxophone,
        điều này ảnh hưởng đến tính tiện dụng và khả năng chơi đàn.
    neck_coverage_type:
      name: Loại che phủ cổ
      description: Chỉ định kiểu dáng khăn quàng cổ được cung cấp kèm theo chăn.
    neck_support_size_system:
      name: Hệ thống điều chỉnh kích thước hỗ trợ cổ
      description: 'Cho biết hệ thống kích thước được sử dụng cho đai/đệm đỡ cổ khi
        đua xe (ví dụ: người lớn, trẻ em hoặc một kích thước duy nhất).'
    necklace_length_type:
      name: Loại chiều dài dây chuyền
      description: Xác định các loại chiều dài dây chuyền thông thường, chẳng hạn
        như dây chuyền ôm sát cổ (choker) hoặc dây chuyền dài kiểu opera, để hỗ trợ
        việc mua sắm dựa trên kiểu dáng.
    needle_balance_zone:
      name: Vùng cân bằng kim
      description: Chỉ báo vùng cân bằng từ trường hoặc bán cầu mà kim la bàn được
        điều chỉnh, đảm bảo độ chính xác trên toàn thế giới.
    needle_case_format:
      name: Định dạng hộp kim
      description: Tổng thể thiết kế dạng hộp đựng kim khâu.
    needle_damping_type:
      name: Loại giảm chấn của kim
      description: 'Mô tả cách kim la bàn được ổn định (ví dụ: chứa chất lỏng, khô
        hoặc ổn định điện tử), ảnh hưởng đến thời gian ổn định và độ bền.'
    needle_felting_needle_profile:
      name: Hình dạng kim nỉ
      description: Mặt cắt ngang/hình dạng của kim làm nỉ, ảnh hưởng đến cách các
        sợi được di chuyển và thành phẩm cuối cùng.
    needle_holder_features:
      name: Đặc điểm của giá đỡ kim
      description: Các tính năng nổi bật của kẹp kim.
    needle_holder_mounting_attachment_method:
      name: Phương pháp gắn/lắp kẹp kim
      description: 'Cách thức gắn hoặc sử dụng kẹp kim trong quá trình bảo quản (ví
        dụ: nam châm, kẹp, dây đeo).'
    needle_holder_style:
      name: Kiểu dáng kẹp giữ kim
      description: Kiểu dáng/thiết kế lưu trữ hoặc mang theo vật lý của kẹp kim.
    needle_pushing_surface_type:
      name: Loại bề mặt đẩy kim
      description: 'Loại/thiết kế bề mặt đẩy kim trên lòng bàn tay may (ví dụ: vết
        lõm kim loại, hình đồng xu hoặc miếng vá gia cố).'
    needle_requirement_beading_pattern:
      name: Yêu cầu về kim khâu (mẫu đính cườm)
      description: Loại/kích cỡ kim đan được nhà sản xuất khuyến nghị.
    needle_size_system:
      name: Hệ thống kích thước kim
      description: Tiêu chuẩn kích thước được sử dụng để ghi nhãn kích cỡ kim.
    needle_threader_compatible_needle_type:
      name: Dụng cụ xỏ chỉ kim, loại kim tương thích.
      description: Chỉ định các loại kim mà dụng cụ xỏ chỉ được thiết kế để sử dụng
        cùng (theo loại/công dụng của kim).
    needle_threader_mechanism_type:
      name: Loại cơ chế xỏ chỉ kim
      description: Mô tả cách dụng cụ xỏ chỉ bắt/kéo chỉ qua lỗ kim.
    needle_threader_packaging_type:
      name: Loại bao bì dụng cụ xỏ kim
      description: Cách thức bán/đóng gói sản phẩm (bán lẻ, bán theo gói nhiều sản
        phẩm, bán theo bộ).
    needlecraft_fabric_color_family:
      name: Bảng màu vải thêu
      description: Bảng màu chuẩn hóa dành cho vải dệt đều (được sử dụng cùng với
        Màu sắc để tạo hiệu ứng bề mặt).
    needlecraft_fabric_composition:
      name: Thành phần vải thêu
      description: 'Chỉ định thành phần/hỗn hợp sợi của vải thêu (ví dụ: 100% cotton,
        hỗn hợp lanh/cotton).'
    needlecraft_fabric_weave_type:
      name: Loại vải dệt dùng trong thủ công mỹ nghệ
      description: 'Chỉ định kiểu dệt/cấu trúc của vải lanh dùng trong thêu (ví dụ:
        vải dệt đều so với vải lanh truyền thống), ảnh hưởng đến hành vi và hình thức
        của mũi khâu.'
    needlecraft_kit_items_included:
      name: Bộ dụng cụ thêu thùa bao gồm các vật dụng cần thiết
      description: Liệt kê các thành phần chính có trong bộ dụng cụ thêu thùa (dụng
        cụ và vật tư tiêu hao).
    needlecraft_kit_project_type:
      name: Loại dự án bộ dụng cụ thêu thùa
      description: Xác định mặt hàng hoàn chỉnh mà bộ dụng cụ tạo ra (kết quả của
        dự án).
    needlecraft_stitching_coverage:
      name: Phạm vi bao phủ đường khâu thêu thùa
      description: Cho biết vải được khâu trên 1 sợi/ô vuông hay trên 2 sợi (thường
        dùng cho vải dệt đều và vải lanh).
    needlepoint_canvas_mesh_count:
      name: Số mắt lưới trên vải thêu kim
      description: Số mắt lưới/mật độ sợi (số sợi trên mỗi inch) dự định sử dụng cho
        mẫu thiết kế (thường được gọi là mật độ sợi vải).
    needlepoint_frame_canvas_attachment_method:
      name: Phương pháp gắn khung thêu kim mũi chỉ
      description: Mô tả cách cố định vải thêu vào khung thêu.
    needlepoint_frame_compatible_stand_type:
      name: Khung thêu tương thích với loại giá đỡ
      description: Nếu khung được thiết kế để gắn vào giá đỡ, hãy chỉ rõ loại giá
        đỡ mà nó tương thích.
    needlepoint_frame_contents:
      name: Nội dung khung thêu
      description: 'Chỉ rõ các bộ phận và phụ kiện nào được bao gồm trong khung thêu
        (ví dụ: khung, thanh/que bổ sung, đinh ghim, miếng dán giữ, túi đựng).'
    needlepoint_frame_tension_adjustment_type:
      name: Loại điều chỉnh độ căng khung thêu
      description: Cho biết cách thức (hoặc liệu có thể) điều chỉnh độ căng của khung
        trong quá trình sử dụng.
    needlepoint_pattern_chart_format:
      name: Định dạng sơ đồ mẫu thêu len
      description: Cách thể hiện mẫu thêu kim để hướng dẫn thêu (biểu đồ so với bản
        in/hình vẽ).
    needlepoint_project_type:
      name: Loại dự án thêu kim
      description: Mẫu thêu này hướng đến loại mặt hàng/danh mục hoàn thiện dự định.
    net_design:
      name: Thiết kế mạng
      description: Xác định kiểu cấu tạo của lưới, cho biết liệu lưới có thể thu gọn
        hoặc gấp lại để dễ dàng mang theo hay không.
    net_mesh_pattern:
      name: Mẫu lưới
      description: Xác định hình dạng hình học của các lỗ lưới, điều này có thể ảnh
        hưởng đến khả năng quan sát và độ bền.
    net_twine_gauge:
      name: Độ dày dây lưới
      description: 'Chỉ số này cho biết độ dày hoặc độ bền của sợi dây lưới, theo
        truyền thống được biểu thị bằng số đo độ dày (ví dụ: 18, 36).'
    nicotine_source:
      name: Nguồn nicotine
      description: Cho biết nicotine trong sản phẩm có nguồn gốc từ thuốc lá, nicotine
        tổng hợp hay sản phẩm không chứa nicotine.
    nipple_drive_interface:
      name: Giao diện truyền động núm vú
      description: Xác định kiểu/tiêu chuẩn của giao diện truyền động hoặc đầu nối
        (bên ngoài hoặc bên trong) của núm vú, từ đó xác định dụng cụ và phương pháp
        lắp ráp bánh xe cần thiết.
    nock_activation_method:
      name: Phương pháp kích hoạt Nock
      description: 'Chỉ định cơ chế bật hoặc tắt đèn LED trên đầu mũi tên (ví dụ:
        lực căng dây cung, cảm biến chuyển động, công tắc thủ công).'
    nock_fitment_code:
      name: Mã lắp đặt Nock
      description: Mã nhà sản xuất hoặc mã ngành xác định dòng/chuỗi sản phẩm mà đầu
        mũi tên thuộc về.
    nock_throat_size:
      name: Kích thước họng mũi
      description: Xác định kích thước của rãnh (cổ) để gắn vào dây cung.
    nock_transparency_level:
      name: Độ trong suốt của chuôi tên
      description: Mô tả độ trong suốt của vật liệu phần đuôi mũi tên — trong suốt,
        mờ, đục hoặc phát sáng trong bóng tối — ảnh hưởng đến khả năng quan sát và
        tính thẩm mỹ.
    nock_type:
      name: Loại mũi tên
      description: Chỉ định kiểu thiết kế rãnh lắp mũi tên hoặc nỏ, chẳng hạn như
        hình chốt, hình bán nguyệt hoặc hình có đèn.
    noise_reduction_type:
      name: Loại giảm tiếng ồn
      description: Chỉ định công nghệ giảm tiếng ồn được sử dụng (hoặc không được
        sử dụng) trong tai nghe tích hợp của mũ bảo hiểm, nếu có.
    noise_suppression_technology:
      name: Công nghệ giảm tiếng ồn
      description: Xác định xem sản phẩm sử dụng phương pháp giảm chấn thụ động hay
        mạch điện tử chủ động để nén âm thanh lớn và/hoặc khuếch đại âm thanh xung
        quanh.
    non_slip_base_features:
      name: Đặc điểm đế chống trượt
      description: Cho biết các tính năng chống trượt được tích hợp để giữ cho bàn
        đạp không bị dịch chuyển trong quá trình hoạt động.
    nose_bridge_type:
      name: Loại sống mũi
      description: Chỉ ra thiết kế của sống mũi, ảnh hưởng đến độ vừa vặn trên các
        kích cỡ khuôn mặt khác nhau.
    nose_clip_accessories_included:
      name: Phụ kiện kẹp mũi đi kèm
      description: 'Liệt kê bất kỳ phụ kiện bổ sung nào được cung cấp kèm theo kẹp
        mũi bơi (ví dụ: nút bịt tai, hộp đựng).'
    nose_clip_features:
      name: Đặc điểm của kẹp mũi
      description: Nêu bật các đặc điểm chức năng hoặc sự thoải mái chung của kẹp
        mũi.
    nose_coverage_style:
      name: Kiểu dáng độ che phủ mũi
      description: Cho biết sự hiện diện và loại tấm bảo vệ mũi hoặc mõm trên mặt
        nạ chống ruồi.
    noseband_type:
      name: Loại dây đeo mũi
      description: Chỉ rõ thiết kế của dây mũi (nếu có) được cung cấp kèm theo bộ
        dây cương.
    number_of_canvas_meshes:
      name: Số lượng lưới canvas
      description: Kích thước mắt lưới của tấm vải nhựa, được biểu thị bằng số lỗ
        trên mỗi inch (HPI) hoặc số mũi khâu, quyết định kích thước mũi khâu và độ
        chi tiết của dự án.
    number_of_chainrings:
      name: Số lượng đĩa xích
      description: Cho biết số lượng đĩa xích mà tay quay được thiết kế để lắp hoặc
        được cung cấp kèm theo.
    number_of_control_stations:
      name: Số lượng trạm điều khiển
      description: Cho biết số lượng trạm điều khiển/lái được hỗ trợ bởi bộ điều khiển
        (một trạm so với hai trạm, v.v.).
    number_of_digits:
      name: Số chữ số
      description: 'Số chữ số mà bộ đếm hiển thị (ví dụ: 1 chữ số, 2 chữ số, 3 chữ
        số).'
    number_of_guitar_slots:
      name: Số lượng khe cắm đàn guitar
      description: Cho biết hộp đựng/túi đựng đàn guitar được thiết kế để chứa bao
        nhiêu cây đàn.
    number_of_needlecraft_fabrics:
      name: Số lượng vải thêu
      description: 'Chỉ định mật độ sợi vải cho vải thêu/thêu, thường được biểu thị
        bằng số ô vuông/sợi trên mỗi inch (ví dụ: 14-count).'
    number_of_plastic_canvas_meshes:
      name: Số lượng mắt lưới vải nhựa
      description: Chỉ định mật độ mắt lưới của vải nhựa (số lỗ trên mỗi inch), yếu
        tố quyết định kích thước mũi khâu và mức độ chi tiết của dự án.
    number_of_quilting_frame_rails:
      name: Số lượng thanh ray khung chần bông
      description: 'Số lượng thanh ray/con lăn có trong khung chần (ví dụ: hệ thống
        2 thanh ray so với hệ thống 3 thanh ray).'
    number_of_rope_slots:
      name: Số lượng khe cắm dây
      description: Cho biết thiết bị hãm dây được thiết kế để sử dụng với một dây
        hay hai dây.
    number_of_switch_poles:
      name: Số cực của công tắc
      description: 'Số lượng mạch điện riêng biệt (cực) được điều khiển bởi công tắc
        (ví dụ: SPST, DPST).'
    number_of_switch_throws:
      name: Số lần chuyển công tắc
      description: 'Số lượng đường dẫn đầu ra (chiều dài dây) trên mỗi cực (ví dụ:
        SPDT).'
    number_of_timing_chain_rows:
      name: Số hàng xích cam
      description: Cho biết liệu xích cam là loại một hàng hay nhiều hàng.
    number_of_trailer_axles:
      name: Số lượng trục rơ moóc
      description: Số lượng trục trên rơ moóc.
    number_of_wheel_pieces:
      name: Số lượng bánh xe
      description: Xác định xem bánh xe được cấu tạo từ 1 mảnh, 2 mảnh hay 3 mảnh.
    numbering_style:
      name: Kiểu đánh số
      description: 'Cho biết liệu số hiệu trên áo đấu có được đánh số sẵn để nhận
        dạng đội hay không và đánh số như thế nào (ví dụ: không đánh số, từ 1-10,
        tùy chỉnh).'
    nunchuck_connector_type:
      name: Loại đầu nối côn nhị khúc
      description: 'Kiểu liên kết giữa hai tay cầm của côn nhị khúc (ví dụ: dây thừng,
        xích, xích xoay).'
    nursing_access:
      name: Tiếp cận điều dưỡng
      description: Xác định phương pháp hỗ trợ cho con bú được tích hợp vào bộ đồ
        bơi, nếu có.
    nursing_access_type:
      name: Loại hình tiếp cận điều dưỡng
      description: Mô tả cách thức trang phục tạo điều kiện tiếp cận bầu ngực để cho
        con bú hoặc hút sữa.
    nut_butter_texture:
      name: Kết cấu bơ hạt
      description: Mô tả độ đặc của bơ hạt để người mua sắm có thể dễ dàng lựa chọn
        giữa loại mịn, giòn, v.v.
    nutrient_fortification:
      name: Bổ sung dưỡng chất
      description: Xác định các chất dinh dưỡng chính được bổ sung vào đồ uống hoặc
        thực phẩm.
    oak_product_form:
      name: Hình thức sản phẩm làm từ gỗ sồi
      description: Xác định dạng vật lý của gỗ sồi được sử dụng để ủ/tạo hương vị
        cho sản phẩm.
    oak_toast_level:
      name: Mức độ nướng gỗ sồi
      description: Chỉ định mức độ rang của các sản phẩm gỗ sồi.
    oboe_case_capacity:
      name: Dung tích hộp đựng kèn oboe
      description: Cho biết loại nhạc cụ và các bộ phận chính mà hộp đựng được thiết
        kế để chứa.
    oboe_case_carry_configuration:
      name: Cấu hình mang hộp đựng kèn oboe
      description: Cho biết cấu hình mang chính được cung cấp bởi hộp đựng/bao đựng
        đàn.
    oboe_case_design:
      name: Thiết kế hộp đựng kèn oboe
      description: 'Phân loại cấu tạo/độ cứng của hộp đựng kèn oboe hoặc túi đựng
        nhạc cụ (ví dụ: cứng, bán cứng, mềm) để chỉ ra mức độ bảo vệ.'
    oboe_case_internal_fit_type:
      name: Loại hộp đựng kèn oboe vừa khít bên trong
      description: Cho biết liệu nội thất được đúc khuôn cho một cấu hình thiết bị
        cụ thể hay sử dụng các ngăn có thể điều chỉnh.
    oboe_keywork_plating:
      name: Mạ phím kèn oboe
      description: Chỉ định lớp mạ/hoàn thiện của bộ phận phím (phím) kèn oboe, tách
        biệt với vật liệu thân kèn.
    oboe_strap_padding:
      name: Đệm dây đeo kèn oboe
      description: 'Mô tả sự hiện diện/loại lớp đệm ở khu vực tiếp xúc giữa dây đeo/giá
        đỡ để tạo sự thoải mái (ví dụ: vùng vai/cổ có đệm).'
    oboe_swab_style:
      name: Kiểu tăm bông kèn oboe
      description: 'Chỉ định kiểu dáng/cấu tạo chức năng của que vệ sinh kèn oboe
        (ví dụ: loại kéo qua, loại có trọng lượng bằng lụa).'
    observation_window_material:
      name: Vật liệu cửa sổ quan sát
      description: Chỉ định chất liệu của các tấm/cửa sổ quan sát (thường ảnh hưởng
        đến độ trong suốt và độ bền).
    ocarina_accessories_included:
      name: Phụ kiện đi kèm của kèn Ocarina
      description: Các phụ kiện đi kèm với ocarina bao gồm hộp đựng, dây đeo cổ hoặc
        bảng hướng dẫn cách bấm ngón.
    ocarina_chamber_count:
      name: Số lượng phòng Ocarina
      description: Chỉ số này cho biết ocarina thẳng hàng có bao nhiêu buồng, ảnh
        hưởng đến âm vực và độ phức tạp khi chơi (đơn/đôi/ba, v.v.).
    ocarina_fingering_system:
      name: Hệ thống bấm ngón của kèn Ocarina
      description: Chỉ định hệ thống/tiêu chuẩn bấm ngón mà ocarina treo tuân theo
        (nếu có).
    ocarina_finish_type:
      name: Loại hoàn thiện Ocarina
      description: Lớp hoàn thiện bề mặt của thân đàn ocarina ảnh hưởng đến cảm giác
        khi chơi và tính thẩm mỹ.
    occupant_classification_sensor_support:
      name: Hỗ trợ cảm biến phân loại người sử dụng
      description: Cho biết ghế có tích hợp cảm biến phân loại/trọng lượng người ngồi
        hay có chỗ để chuyển/lắp đặt cảm biến OEM (thường dành cho ghế hành khách
        phía trước).
    octave_harmonica_cover_plate_material:
      name: Chất liệu tấm ốp kèn harmonica Octave
      description: Chất liệu của các tấm vỏ ngoài của kèn harmonica quãng tám.
    octave_harmonica_tuning_system:
      name: Hệ thống chỉnh âm của kèn harmonica Octave
      description: Hệ thống điều chỉnh/âm vực được sử dụng cho kèn harmonica quãng
        tám.
    octoban_mounting_system_type:
      name: Loại hệ thống lắp đặt Octoban
      description: Cách lắp đặt/định vị bàn octoban trong khi chơi (cách gắn/giá đỡ/chân
        đế).
    odor_control_features:
      name: Tính năng kiểm soát mùi
      description: Cho biết sản phẩm có chức năng khử mùi/trung hòa mùi hôi hay không
        và bằng phương pháp nào.
    office_furniture_items_included:
      name: Các món nội thất văn phòng đi kèm
      description: Xác định các mặt hàng nội thất văn phòng cụ thể có trong bộ sản
        phẩm, chẳng hạn như bàn làm việc hoặc tủ hồ sơ.
    oil_cooler_core_type:
      name: Loại lõi làm mát dầu
      description: Quy định cấu trúc lõi bên trong của bộ làm mát dầu, ảnh hưởng đến
        hiệu quả làm mát, tổn thất áp suất và độ bền.
    oil_cooler_mounting_style:
      name: Kiểu lắp đặt bộ làm mát dầu
      description: Mô tả cách lắp đặt bộ làm mát dầu trên xe.
    oil_dipstick_component_type:
      name: loại linh kiện que thăm dầu
      description: 'Chỉ rõ bộ phận đo mức dầu nào đang được bán (ví dụ: chỉ có lưỡi/thanh
        que thăm dầu, chỉ có tay cầm, bộ phận hoàn chỉnh, ống que thăm dầu, v.v.).'
    oil_dipstick_measurement_markings:
      name: Vạch chia mức dầu trên que thăm dầu
      description: Chỉ rõ các vạch/thang đo có trên que thăm dầu để đọc mức dầu.
    oil_dipstick_tube_mounting_type:
      name: Kiểu lắp ống que thăm dầu
      description: Quy định cách giữ hoặc lắp ống que thăm dầu vào động cơ hoặc khối
        động cơ.
    oil_drain_plug_head_drive_type:
      name: Loại đầu nút xả dầu
      description: Chỉ định giao diện khớp nối dụng cụ trên đầu nút xả dầu được sử
        dụng để lắp đặt và tháo gỡ.
    oil_drain_plug_magnet_type:
      name: Nút xả dầu loại nam châm
      description: Xác định xem nút xả dầu có từ tính hay không và nếu có thì thuộc
        kiểu nào.
    oil_fill_cap_type:
      name: Loại nắp đổ dầu
      description: Kiểu/loại giao diện nắp đổ dầu được sử dụng bởi nắp van (nếu có).
    oil_filler_cap_attachment_type:
      name: Loại gắn nắp đổ dầu
      description: 'Chỉ định cách nắp đổ dầu được giữ cố định trên động cơ/cổ đổ dầu
        (ví dụ: ren, kiểu lưỡi lê/xoay một phần tư vòng, kiểu ép).'
    oil_filler_cap_installation_position:
      name: Vị trí lắp đặt nắp đổ dầu
      description: 'Chỉ định vị trí sử dụng nắp khi có nhiều điểm đổ dầu (ví dụ: nắp
        van, ống đổ dầu từ xa).'
    oil_filler_cap_locking_type:
      name: Nắp đổ dầu kiểu khóa
      description: 'Xác định xem nắp đổ dầu là loại không khóa hay sử dụng phương
        pháp tháo lắp có khóa/an toàn (ví dụ: dùng chìa khóa hoặc cần dụng cụ) để
        giúp ngăn ngừa việc giả mạo/trộm cắp hoặc mở nắp ngoài ý muốn.'
    oil_filler_cap_tether_type:
      name: Loại dây giữ nắp vặn dầu
      description: Xác định xem nắp đổ dầu có được buộc dây/giữ cố định để tránh bị
        mất hay không và kiểu dây buộc được sử dụng là loại nào.
    oil_filler_cap_venting_type:
      name: Nắp đổ dầu kiểu thông hơi
      description: Xác định xem nắp có lỗ thông hơi hay không và cơ chế thông hơi
        (nếu có).
    oil_filter_style:
      name: Kiểu lọc dầu
      description: Xác định hình dạng và kiểu lắp đặt của bộ lọc dầu để đảm bảo tương
        thích với giá đỡ bộ lọc của động cơ.
    oil_pan_baffle_windage_features:
      name: Các tính năng chắn gió/vách ngăn dầu trong chảo dầu
      description: Chỉ ra các tính năng kiểm soát dầu bên trong được tích hợp trong
        chảo dầu.
    oil_pan_finish_coating:
      name: Lớp hoàn thiện/lớp phủ của các-te dầu
      description: Mô tả lớp hoàn thiện bề mặt hoặc lớp phủ của chảo dầu (sơn, phủ
        bột, mạ, để nguyên, v.v.).
    oil_pressure_sensor_function_type:
      name: Loại chức năng của cảm biến áp suất dầu
      description: Cho biết bộ phận đó là cảm biến áp suất dầu có đầu ra thay đổi
        dành cho đồng hồ đo/ECU, hay là công tắc áp suất dầu bật/tắt kích hoạt đèn
        cảnh báo.
    oil_pressure_sensor_signal_output_type:
      name: Loại đầu ra tín hiệu cảm biến áp suất dầu
      description: Chỉ định kiểu tín hiệu/đầu ra điện do cảm biến/bộ phát áp suất
        dầu tạo ra.
    oil_processing_method:
      name: Phương pháp chế biến dầu
      description: 'Thông tin này chỉ rõ cách dầu được sản xuất hoặc tinh chế (ví
        dụ: ép lạnh, nguyên chất, tinh luyện), điều này ảnh hưởng đến hương vị, giá
        trị dinh dưỡng và các ứng dụng nấu ăn phù hợp.'
    oil_pump_drive_method:
      name: Phương pháp dẫn động bơm dầu
      description: Cho biết bộ phận nào dẫn động bơm dầu bên trong động cơ.
    oil_pump_mounting_style:
      name: Kiểu lắp đặt bơm dầu
      description: 'Chỉ định vị trí và cách lắp đặt bơm dầu trong động cơ (ví dụ:
        bên trong hay bên ngoài/từ xa, lắp trên nắp, lắp trên đáy dầu).'
    oil_system_connection_thread_standard:
      name: Tiêu chuẩn ren kết nối hệ thống dầu
      description: 'Chỉ định tiêu chuẩn ren/kết nối được sử dụng bởi giao diện hệ
        thống dầu của bộ phận để lắp đặt/đảm bảo tính tương thích (ví dụ: M12x1.5,
        1/8-27 NPT, BSPP).'
    oil_viscosity_grade:
      name: Cấp độ nhớt của dầu
      description: Mô tả độ nhớt tương đối của dầu bôi trơn dùng cho thiết bị chế
        tạo (không phải loại dầu bôi trơn tiêu chuẩn SAE dành cho ô tô).
    okra_variety:
      name: Giống đậu bắp
      description: Xác định giống hoặc chủng loại cụ thể của đậu bắp được bày bán
        trên thị trường, chẳng hạn như Clemson Spineless, Red Burgundy hoặc Baby Okra.
    olfactory_arts_material_form:
      name: Định dạng chất liệu nghệ thuật khứu giác
      description: Xác định hình dạng vật lý của vật liệu khi bán.
    olfactory_arts_tool_kit_content:
      name: Nội dung bộ công cụ nghệ thuật khứu giác
      description: Liệt kê các thành phần được bao gồm khi sản phẩm được bán dưới
        dạng bộ dụng cụ hoặc set để làm nến/hương/nước hoa.
    olive_variety:
      name: Giống ô liu
      description: Chỉ định giống ô liu được sử dụng, yếu tố ảnh hưởng đến hương vị,
        kết cấu, màu sắc và tính xác thực của vùng miền.
    onion_variety:
      name: Giống hành tây
      description: Chỉ định loại hành cụ thể để người mua sắm có thể nhanh chóng tìm
        thấy màu sắc, hương vị và cách sử dụng ưa thích, đồng thời cho phép thương
        gia liệt kê sản phẩm một cách chính xác.
    opacity_level:
      name: Mức độ mờ đục
      description: Cho biết độ trong suốt hoặc mờ đục của vải.
    operating_modes:
      name: Các chế độ vận hành
      description: Các chế độ hiệu ứng/chuyển động tích hợp chính được hỗ trợ bởi
        ánh sáng laser.
    operating_voltage:
      name: Điện áp hoạt động
      description: Chỉ định điện áp định mức của hệ thống mà kim phun được thiết kế.
    optical_toy_features:
      name: Đặc điểm của đồ chơi quang học
      description: Nêu bật hiệu ứng thị giác/quang học chính mà món đồ chơi tạo ra.
    orchestral_string_core_material:
      name: Chất liệu cốt lõi cho dàn nhạc dây
      description: Xác định vật liệu cấu tạo lõi của dây đàn, yếu tố ảnh hưởng mạnh
        mẽ đến cảm giác, độ nhạy và âm sắc.
    orchestral_string_end_type:
      name: Kiểu đầu dây đàn dàn nhạc
      description: Xác định kiểu gắn ở đầu dây đàn (phần đuôi đàn).
    orchestral_string_included_strings:
      name: Các dây đi kèm của nhạc cụ dây giao hưởng
      description: Liệt kê các loại dây cụ thể có trong bộ sản phẩm (tùy thuộc vào
        nhạc cụ).
    orchestral_string_instrument_fitting_part_type:
      name: Loại phụ kiện/bộ phận cho nhạc cụ dây dàn nhạc
      description: 'Chỉ định loại phụ kiện/bộ phận của sản phẩm (ví dụ: ngựa đàn,
        đuôi đàn, tựa cằm).'
    orchestral_string_instrument_mute_type:
      name: Loại giảm thanh của nhạc cụ dây giao hưởng
      description: 'Chỉ định loại chức năng của bộ phận giảm âm cho nhạc cụ dây trong
        dàn nhạc (ví dụ: dùng cho luyện tập/khách sạn so với biểu diễn/hòa nhạc) và/hoặc
        kiểu thiết kế phổ biến.'
    orchestral_string_instrument_part_position:
      name: Vị trí bè nhạc cụ dây trong dàn nhạc
      description: Chỉ ra vị trí lắp đặt của bộ phận trên dụng cụ (hữu ích khi các
        bộ phận có dạng trên/dưới hoặc trái/phải).
    orchestral_string_winding_material:
      name: Chất liệu lõi quấn dây nhạc cụ giao hưởng
      description: Chỉ định vật liệu quấn/bọc bên ngoài được sử dụng cho dây đàn.
    organza_finish_sheen:
      name: Bề mặt/độ bóng của vải organza
      description: Mô tả vẻ ngoài bề mặt của vải organza (mờ so với bóng/ánh kim).
    organza_ribbon_transparency_level:
      name: Độ trong suốt của ruy băng organza
      description: Mô tả độ trong suốt của dải ruy băng organza.
    organza_transparency_level:
      name: Độ trong suốt của vải organza
      description: Mô tả độ mỏng manh của vải organza khi được xếp lớp một lần.
    origami_paper_shape:
      name: Hình dạng giấy origami
      description: Chỉ định hình dạng tờ giấy được sử dụng để gấp.
    origami_paper_sidedness:
      name: Độ dày của giấy origami
      description: Cho biết giấy origami có cùng màu/hoa văn ở cả hai mặt hay hai
        mặt khác nhau.
    ostrich_feather_part:
      name: Phần lông đà điểu
      description: 'Xác định kiểu/bộ phận lông đà điểu được sử dụng (ví dụ: lông vũ
        so với lông thô) ảnh hưởng đến độ mềm mại, độ dày và các ứng dụng thủ công
        điển hình.'
    outboard_motor_shaft_type:
      name: Loại trục động cơ gắn ngoài thuyền
      description: Loại chiều dài trục tiêu chuẩn được sử dụng cho động cơ gắn ngoài
        (dạng nhãn được sử dụng trong ngành hàng hải).
    outboard_motor_steering_type:
      name: Kiểu lái động cơ ngoài
      description: 'Chỉ định giao diện/cơ cấu lái được sử dụng bởi động cơ gắn ngoài
        (ví dụ: tay lái hoặc hệ thống lái từ xa).'
    outdoor_table_functionality:
      name: Chức năng bàn ngoài trời
      description: 'Xác định các chức năng tích hợp chuyên dụng vượt xa bề mặt bàn
        đơn giản (ví dụ: ngăn làm mát, kệ đựng đồ, nắp bình xăng, đế dù che nắng,
        khớp nối ghế, thiết kế gấp gọn, két an toàn trong hồ bơi, chiều cao có thể
        điều chỉnh, bánh xe tích hợp, đèn LED).'
    outerwear_length_type:
      name: Kiểu chiều dài áo khoác ngoài
      description: Phân loại chiều dài tổng thể của một loại áo khoác ngoài thành
        các phạm vi mô tả tiêu chuẩn.
    outerwear_pieces_included:
      name: Các món đồ mặc ngoài đi kèm
      description: Liệt kê các món đồ may mặc được cung cấp khi sản phẩm được bán
        theo bộ.
    outfit_attachment_mechanism:
      name: Cơ chế gắn/đính của trang phục
      description: 'Chỉ định cách các mảnh trang phục hoặc phụ kiện được gắn vào búp
        bê (ví dụ: chốt, keo dán, nam châm).'
    outfit_items_included:
      name: Các món trong bộ trang phục đi kèm
      description: 'Liệt kê các mặt hàng cụ thể có trong bộ đồ (ví dụ: áo liền thân,
        quần short, băng đô).'
    outlet_thread_type:
      name: Loại ren đầu ra
      description: 'Tiêu chuẩn ren được sử dụng tại các cổng đầu ra đường ống phanh
        xi lanh chính (ví dụ: ren loe hình bong bóng hệ mét so với ren loe ngược hệ
        inch SAE).'
    output_jack_type_instrument:
      name: Loại giắc cắm đầu ra (nhạc cụ)
      description: Chỉ định loại giắc cắm đầu ra âm thanh trên đàn mandolin điện.
    output_signal_type:
      name: Loại tín hiệu đầu ra
      description: 'Đặc tính/loại tín hiệu điện đầu ra do cảm biến tạo ra (ví dụ:
        điện trở tương tự của nhiệt điện trở NTC).'
    outsole_marking_type:
      name: Loại ký hiệu trên đế ngoài
      description: Cho biết liệu đế ngoài của giày có để lại dấu vết trên bề mặt sân
        hay không, một yếu tố quan trọng đối với các môn thể thao dùng vợt trong nhà.
    outsole_material:
      name: Chất liệu đế ngoài
      description: Chỉ định chất liệu của đế ngoài giày tiếp xúc với mặt đất, ảnh
        hưởng đến độ bám, độ linh hoạt và độ bền.
    outsole_stud_type:
      name: Loại đinh tán đế ngoài
      description: 'Mô tả cấu hình đế ngoài/đinh tán (ví dụ: đinh tán đúc, gai cao
        su, gai cỏ nhân tạo) giúp tạo lực bám trên bề mặt sân chơi đã chọn.'
    oven_bake_clay_formulation:
      name: Công thức đất sét nung trong lò
      description: 'Xác định nhóm công thức của đất sét nung (ví dụ: đất sét polyme
        so với đất sét nhựa), yếu tố ảnh hưởng đến khả năng xử lý, đặc tính đóng rắn
        và các đặc tính của sản phẩm hoàn thiện.'
    oven_housing_configuration:
      name: Cấu hình vỏ lò nướng
      description: 'Xác định kiểu bố trí thiết bị dự kiến phù hợp với tủ bếp (ví dụ:
        lò nướng đơn, lò nướng đôi hoặc kết hợp lò nướng và lò vi sóng).'
    overhead_mount_installation_method:
      name: Phương pháp lắp đặt treo trên cao
      description: Cách thức cố định giá đỡ trên nóc xe vào xe (kiểu trang thiết bị/phương
        pháp gắn).
    oversize_or_undersize_grade:
      name: Kích thước quá khổ hoặc quá nhỏ
      description: Chỉ định cấp độ kích thước của bộ phụ tùng (piston/vòng piston
        quá khổ và/hoặc bạc đạn nhỏ hơn kích thước tiêu chuẩn) so với kích thước tiêu
        chuẩn của nhà sản xuất thiết bị gốc (OEM).
    p_tex_application_method:
      name: Phương pháp phủ P-Tex
      description: Mô tả cách vật liệu P-Tex được ứng dụng vào đế của ván trượt tuyết
        hoặc ván trượt ván.
    p_tex_form:
      name: Dạng P-Tex
      description: Xác định hình thức vật lý mà vật liệu sửa chữa được cung cấp.
    packability:
      name: Khả năng đóng gói
      description: Cho biết liệu và cách thức đóng gói hoặc cất giữ áo vest khi không
        sử dụng.
    packaging_format:
      name: Định dạng đóng gói
      description: Cách đóng gói/bán dây đàn (đóng gói riêng lẻ, bán sỉ, v.v.).
    packaging_material:
      name: Vật liệu đóng gói
      description: Xác định chất liệu chính của chai hoặc thùng chứa đựng nước.
    packaging_type:
      name: Loại bao bì
      description: Mô tả cách đóng gói tượng bobblehead để bán lẻ/trưng bày/lưu trữ
        cho người sưu tầm.
    packing_medium:
      name: Vật liệu đóng gói
      description: Chỉ định loại chất lỏng hoặc môi trường (như nước, các loại siro,
        nước ép hoặc nước muối) được sử dụng để bảo quản trái cây bên trong thùng
        chứa.
    pad_components_included:
      name: Các thành phần đi kèm của tấm đệm
      description: 'Chỉ định các bộ phận được bao gồm khi sản phẩm được bán theo bộ
        (ví dụ: miếng bảo vệ đầu gối và khuỷu tay, chỉ có miếng bảo vệ cổ tay).'
    pad_controller_additional_control:
      name: Bộ điều khiển Pad điều khiển bổ sung
      description: Ngoài các phím bấm (núm xoay, cần gạt, nút bấm), thiết bị còn có
        các loại điều khiển vật lý bổ sung khác.
    pad_controller_performance_features:
      name: Các tính năng hiệu suất của bộ điều khiển Pad
      description: Các tính năng chính của bàn phím liên quan đến hiệu suất chơi nhạc
        và khả năng điều khiển biểu cảm.
    pad_coverage_area:
      name: Khu vực phủ sóng của tấm đệm
      description: Xác định các vùng cơ thể mà các miếng đệm tích hợp của đai bảo
        vệ.
    pad_material_or_technology:
      name: Vật liệu hoặc công nghệ đệm
      description: Chỉ định công nghệ hấp thụ va chạm độc quyền hoặc vật liệu mang
        thương hiệu được sử dụng trong miếng đệm.
    pad_mounting_or_holding_style:
      name: Kiểu gắn hoặc giữ tấm đệm
      description: Cho biết cách cầm, đeo hoặc lắp đặt miếng đệm trong quá trình sử
        dụng.
    pad_saver_style:
      name: Kiểu bảo vệ miếng đệm
      description: Chỉ định kiểu dáng/thiết kế vật lý của bộ phận bảo vệ đệm dùng
        để làm khô đệm và lỗ khoan.
    pad_shape:
      name: Hình dạng tấm đệm
      description: 'Xác định hình dạng hình học hoặc độ cong của bề mặt tiếp xúc hoặc
        toàn bộ thân của miếng đệm (ví dụ: tròn, cong, hình chữ nhật, phẳng), giúp
        người dùng lựa chọn miếng đệm phù hợp với mục tiêu luyện tập và các loại cú
        đánh.'
    pad_shell_type:
      name: Loại vỏ đệm
      description: 'Phân loại kiểu cấu tạo bề mặt ngoài của miếng đệm (ví dụ: vỏ cứng,
        vỏ mềm, lớp lót bên trong).'
    pad_style:
      name: Kiểu đệm
      description: Chỉ định loại hoặc thiết kế miếng đệm được cung cấp kèm theo thiết
        bị trượt.
    padding_layers:
      name: Lớp đệm
      description: Chỉ số này cho biết số lớp mút được sử dụng để hấp thụ lực va chạm.
    padding_level:
      name: Mức đệm
      description: Thể hiện lượng đệm được tích hợp vào các khu vực tiếp xúc của dây
        đeo/giá đỡ (cổ/vai/lưng).
    padding_material:
      name: Vật liệu đệm
      description: Chỉ định chất liệu nhồi hoặc đệm bên trong có tác dụng hấp thụ
        lực tác động bên trong túi, tấm chắn, găng tay và hình nộm.
    paddle_ball_attachment_type:
      name: Loại phụ kiện bóng vợt
      description: Xác định cách quả bóng được kết nối với vợt (hoặc nếu nó không
        được buộc dây).
    paddle_leash_style:
      name: Kiểu dây buộc mái chèo
      description: Xác định kiểu dáng hoặc thiết kế của dây buộc mái chèo.
    paddle_shape:
      name: Hình dạng vợt pickleball
      description: 'Xác định hình dáng tổng thể của đầu/thân vợt (ví dụ: tiêu chuẩn,
        thon dài, thân rộng), điều này ảnh hưởng đến tầm với, kích thước điểm tiếp
        xúc lý tưởng và khả năng điều khiển.'
    paddleboard_intended_use:
      name: Mục đích sử dụng của ván chèo
      description: 'Phân loại mục đích thiết kế chính hoặc hoạt động mà ván được chế
        tạo cho (ví dụ: Du lịch, Yoga, Đua xe).'
    paint_application_method:
      name: Phương pháp sơn
      description: Cách sử dụng chính của sản phẩm này là dùng cho kẹp phanh.
    paint_by_number_surface_type:
      name: Loại bề mặt tranh tô màu theo số
      description: 'Bề mặt mà thiết kế được đánh số được in lên (ví dụ: vải bố, giấy,
        tấm gỗ).'
    paint_medium_application_method:
      name: Phương pháp ứng dụng chất liệu sơn
      description: Chỉ rõ cách thức khuyến nghị để sử dụng chất dẫn.
    paint_medium_intended_effect:
      name: Hiệu ứng mong muốn của chất liệu sơn
      description: Ghi lại kết quả chính mà chất liệu hướng đến (kết cấu, độ bóng,
        độ phủ, độ chảy, v.v.).
    paint_safe_bristles:
      name: Lông bàn chải an toàn cho sơn
      description: Cho biết liệu lông bàn chải có được quảng cáo là an toàn khi sử
        dụng trên lớp sơn/lớp phủ trong suốt của ô tô (không gây trầy xước) hay không.
    paintable_surface:
      name: Bề mặt có thể sơn
      description: 'Cho biết liệu hình dạng làm từ giấy bồi đã sẵn sàng để sơn (ví
        dụ: đã được sơn lót/phủ lớp bảo vệ) hay cần phải chuẩn bị thêm.'
    paintball_caliber:
      name: Cỡ paintball
      description: Chỉ định đường kính/cỡ nòng của viên đạn sơn hoặc thiết bị tương
        thích.
    paintball_feed_system:
      name: Hệ thống nạp đạn paintball
      description: Mô tả cách thức nạp đạn sơn vào súng bắn sơn.
    paintball_fill_color:
      name: Màu tô cho súng sơn
      description: Chỉ định màu sắc của lớp sơn đánh dấu bên trong, có thể khác với
        lớp vỏ bên ngoài và quyết định màu sắc còn lại sau va chạm.
    paintball_fill_type:
      name: Loại chất sơn bên trong đạn sơn
      description: 'Mô tả bất kỳ công thức hoặc đặc tính đặc biệt nào của chất làm
        đầy (ví dụ: có thể giặt sạch, phát sáng trong bóng tối, dạng bột).'
    paintball_grade:
      name: Phân hạng đạn sơn
      description: 'Mô tả hạng hiệu năng hoặc mức độ sử dụng dự định (ví dụ: cơ bản,
        ngoài trời, thi đấu, mùa đông).'
    paintball_mask_coverage_level:
      name: Mức độ che phủ của mặt nạ paintball
      description: Cho biết phần nào của khuôn mặt hoặc đầu được bảo vệ bởi kính hoặc
        mặt nạ chơi paintball (chỉ kính, nửa mặt, toàn mặt hoặc toàn đầu).
    paintball_tank_valve_type:
      name: Van bình khí paintball
      description: Mô tả giao diện van hoặc bộ điều chỉnh có trên bình chứa.
    painting_surface_priming_type:
      name: Loại sơn lót bề mặt
      description: Xác định lớp sơn lót/sơn phủ trên bề mặt cần sơn (ngoài việc chỉ
        đơn thuần là sơn lót/không sơn lót), điều này ảnh hưởng đến độ bám dính của
        sơn và khả năng tương thích kỹ thuật.
    palette_knife_blade_edge_profile:
      name: Hình dạng cạnh lưỡi dao phết sơn
      description: Mô tả hình dạng cạnh làm việc của lưỡi dao trộn màu (không phải
        độ sắc bén), yếu tố ảnh hưởng đến việc tạo nét vẽ và pha trộn màu.
    palette_knife_flexibility:
      name: Tính linh hoạt của dao trộn màu
      description: Mô tả độ cứng/độ dẻo của lưỡi dao trộn màu.
    palette_surface_finish:
      name: Hoàn thiện bề mặt bảng màu
      description: Mô tả lớp phủ/hoàn thiện bề mặt khi trộn, ảnh hưởng đến khả năng
        chống bám bẩn và độ dễ lau chùi.
    palm_padding_level:
      name: Mức độ đệm lòng bàn tay
      description: Mô tả độ dày của lớp đệm ở vùng lòng bàn tay của găng tay hoặc
        miếng đệm cầm nắm.
    palm_padding_type:
      name: Loại đệm lòng bàn tay
      description: 'Chỉ định chất liệu hoặc cấu trúc được sử dụng cho lớp đệm lòng
        bàn tay (ví dụ: gel, mút, hai lớp).'
    palm_wax_blend_readiness:
      name: Sự sẵn sàng của hỗn hợp sáp cọ
      description: Cho dù sản phẩm là sáp cọ nguyên chất hay công thức pha chế sẵn
        nhằm đạt được các đặc tính hiệu suất cụ thể.
    palm_wax_form:
      name: Dạng sáp cọ
      description: Dạng vật lý của sáp cọ khi bán ra thị trường ảnh hưởng đến độ dễ
        dàng đo lường, tốc độ tan chảy và thao tác.
    pan_flute_tuning_standard:
      name: Tiêu chuẩn điều chỉnh sáo Pan
      description: 'Tần số tham chiếu được sử dụng để điều chỉnh âm thanh (ví dụ:
        A4=440 Hz), rất quan trọng khi chơi cùng các nhạc cụ khác.'
    pannier_configuration:
      name: Cấu hình túi treo xe
      description: Cho biết sản phẩm được bán dưới dạng túi đơn, túi đôi nối liền
        hoặc bộ hai/ba túi đựng đồ.
    pannier_mounting_system:
      name: Hệ thống giá gắn túi treo xe
      description: Mô tả cơ chế dùng để gắn túi đựng đồ vào giá đỡ hoặc khung xe đạp,
        đảm bảo tính tương thích với nhiều cấu hình khác nhau.
    pant_cuff_style:
      name: Kiểu ống quần
      description: 'Chỉ định phần hoàn thiện hoặc điều chỉnh ở mắt cá chân của quần
        (ví dụ: bo chun ở gấu quần, khóa kéo ở mắt cá chân, gấu quần không có chun).'
    pant_leg_conversion_type:
      name: Kiểu chuyển đổi ống quần
      description: Cho biết liệu và cách thức ống quần có thể được chuyển đổi hoặc
        điều chỉnh độ dài.
    pantyhose_crotch_style:
      name: Kiểu đáy quần tất
      description: Xác định thiết kế vùng đáy quần, phân biệt giữa các phiên bản đáy
        quần kín tiêu chuẩn, không đáy quần hoặc có miếng đệm gia cố.
    papaya_variety:
      name: Giống đu đủ
      description: 'Chỉ định giống hoặc chủng loại đu đủ được bán trên thị trường
        (ví dụ: Solo, Maradol).'
    paper_and_magnetic_doll_format:
      name: Định dạng búp bê giấy và nam châm
      description: Xác định xem sản phẩm là bộ búp bê giấy truyền thống, bộ búp bê
        nam châm hay dạng kết hợp cả hai.
    paper_color_family:
      name: Nhóm màu giấy
      description: Chỉ định xem gói hàng là một màu duy nhất, nhiều màu khác nhau,
        hay hỗn hợp đặc biệt (hữu ích khi Màu sắc được chỉ định cho từng mặt hàng
        nhưng gói hàng lại là hỗn hợp).
    paper_magnetic_doll_set_contents:
      name: Nội dung bộ búp bê giấy và nam châm
      description: Cho biết những thành phần chính nào được bao gồm trong bộ sản phẩm.
    paper_opacity:
      name: Độ mờ của giấy
      description: Chỉ số này cho biết độ trong suốt của giấy, từ rất trong suốt đến
        mờ đục (hữu ích cho việc đồ lại hình).
    paraglider_certification_rating:
      name: Hạng chứng nhận của dù lượn
      description: 'Ghi rõ xếp hạng khả năng bay chính thức được ấn định cho cánh
        dù lượn (ví dụ: hạng EN hoặc LTF).'
    parasite_types_controlled:
      name: Các loại ký sinh trùng được kiểm soát
      description: Liệt kê các loại ký sinh trùng nội bộ mà sản phẩm có hiệu quả để
        người mua có thể điều chỉnh chương trình tẩy giun cho phù hợp với từng trường
        hợp nhiễm ký sinh trùng cụ thể.
    parking_camera_mounting_location:
      name: Vị trí lắp đặt camera lùi
      description: 'Vị trí dự định lắp đặt camera trên xe (ví dụ: khu vực biển số,
        lắp nổi phía sau, lắp chìm).'
    parking_camera_night_vision_technology:
      name: Công nghệ camera quan sát ban đêm cho bãi đỗ xe
      description: Phương pháp hỗ trợ chụp ảnh trong điều kiện thiếu sáng được máy
        ảnh sử dụng.
    parking_camera_orientation:
      name: Hướng camera đỗ xe
      description: Cho dù camera được thiết kế để quan sát phía sau (lùi xe), phía
        trước, hay chế độ xem có thể lựa chọn/phản chiếu.
    parking_sensor_finish:
      name: Cảm biến đỗ xe hoàn tất
      description: 'Chỉ định độ hoàn thiện bề mặt của mặt/nắp cảm biến đỗ xe (ví dụ:
        có thể sơn/sơn lót, mờ, bóng) để giúp phù hợp với thẩm mỹ của cản xe.'
    parking_sensor_type:
      name: Loại cảm biến đỗ xe
      description: 'Chỉ định công nghệ cảm biến được sử dụng bởi cảm biến đỗ xe (ví
        dụ: siêu âm, điện từ, radar, quang học).'
    parsley_root_variety:
      name: Các loại rễ rau mùi tây
      description: Chỉ định giống hoặc chủng loại rễ rau mùi tây khi được nhà cung
        cấp cung cấp thông tin.
    parsnip_variety:
      name: Giống củ cải vàng
      description: Giúp xác định giống hoặc chủng loại cụ thể của củ cải trắng, chẳng
        hạn như Hollow Crown hoặc White Gem, cho phép người mua lựa chọn dựa trên
        hương vị, độ ngọt hoặc sự khác biệt về kích thước.
    part_condition:
      name: Tình trạng bộ phận
      description: Cho biết linh kiện đó là mới, đã qua sử dụng, được tân trang lại,
        v.v.
    part_placement:
      name: Vị trí bộ phận
      description: 'Chỉ rõ vị trí lắp đặt bộ phận đó trên máy (ví dụ: máy leo cầu
        thang hoặc máy tập bước), chẳng hạn như bên trái, bên phải, phía trước hoặc
        phía sau.'
    partial_capo_covered_strings:
      name: Dây đàn được che một phần bằng kẹp capo
      description: Chỉ định phạm vi dây mà capo một phần bao phủ bằng cách sử dụng
        cách đánh số tiêu chuẩn cho đàn guitar 6 dây (1 = dây E cao, 6 = dây E thấp).
    parting_style:
      name: Kiểu rẽ ngôi
      description: 'Cho biết cách tóc giả được hoặc có thể được rẽ ngôi (ví dụ: giữa,
        bên, rẽ tự do), ảnh hưởng đến tính linh hoạt trong tạo kiểu.'
    party_favor_type:
      name: Loại quà tặng tiệc
      description: 'Chỉ định loại mặt hàng tiệc (ví dụ: nhãn dán, đồ chơi mini, bong
        bóng), để cho phép duyệt/lọc trong mục Quà tặng tiệc.'
    party_game_format:
      name: Định dạng trò chơi tiệc tùng
      description: Hình thức vật lý chính của trò chơi nhóm.
    party_horn_mouthpiece_type:
      name: Loại đầu thổi kèn tiệc tùng
      description: Quy định về cấu tạo của phần ngậm miệng, yếu tố ảnh hưởng đến vệ
        sinh và sự thoải mái.
    party_horn_style:
      name: Kiểu kèn tiệc tùng
      description: Mô tả cấu tạo/kiểu hoạt động của còi hơi (cách nó phát ra âm thanh).
    passenger_car_type:
      name: Loại xe chở khách
      description: 'Xác định loại toa xe chở khách cụ thể (toa hành khách) cho mô
        hình (ví dụ: toa hành khách thông thường, toa giường nằm), được sử dụng để
        duyệt và xây dựng mô hình.'
    passion_fruit_variety:
      name: Giống chanh dây
      description: 'Xác định/chỉ rõ giống cây trồng hoặc giống thương mại của chanh
        dây được cung cấp (ví dụ: Chanh dây tím, Chanh dây vàng, Chanh dây Granadilla).'
    pasta_sauce_texture:
      name: Độ đặc của nước sốt mì ống
      description: 'Mô tả độ đặc của nước sốt (ví dụ: mịn, đặc, sánh) để phù hợp với
        sở thích về cảm nhận khi ăn của người tiêu dùng.'
    pasta_sauce_variety:
      name: Các loại sốt mì ống
      description: Phân loại các loại sốt mì ống theo công thức hoặc kiểu dáng để
        người mua sắm có thể nhanh chóng tìm thấy các loại sốt cổ điển như marinara
        hoặc các loại sốt đặc biệt như vodka hoặc pesto.
    pastry_crust_state:
      name: Trạng thái vỏ bánh ngọt
      description: Mô tả tình trạng chuẩn bị hoặc nướng của lớp vỏ bánh tại thời điểm
        mua.
    pastry_crust_style:
      name: Kiểu vỏ bánh nướng
      description: Xác định kiểu bánh ngọt cụ thể hoặc loại bột làm vỏ bánh.
    pastry_filling_type:
      name: Loại nhân bánh ngọt
      description: Chỉ định loại nhân chính bên trong bánh ngọt hoặc bánh nướng.
    patch_adhesion_method:
      name: Phương pháp dán miếng vá
      description: 'Chỉ định cách miếng vá bám vào săm hoặc lốp (ví dụ: tự dính, lưu
        hóa bằng xi măng hoặc kích hoạt bằng nhiệt).'
    patch_backing_material:
      name: Vật liệu lót miếng vá
      description: 'Chất liệu được sử dụng ở mặt sau/đế của miếng vá (ví dụ: nỉ, vải
        chéo) tiếp xúc với mặt hàng được trang trí.'
    patch_backing_type:
      name: Loại mặt sau của miếng vá
      description: 'Lớp keo dán được sử dụng trên miếng vá (ví dụ: keo dán nhiệt/ủi,
        keo dán bóc dán, khóa dán, không có).'
    patch_base_material:
      name: Chất liệu nền của miếng vá
      description: Chất liệu vải nền/lớp lót chính của miếng vá họa tiết (không bao
        gồm các chi tiết trang trí).
    patch_border_edge_finish:
      name: Viền/cạnh miếng vá hoàn thiện
      description: 'Phương pháp hoàn thiện mép của miếng vá (ví dụ: mép may vắt sổ,
        mép cắt laser) ảnh hưởng đến độ bền và vẻ ngoài.'
    patch_placement_area:
      name: Khu vực đặt miếng vá
      description: Vị trí thường được dự định để gắn huy hiệu lên quần áo/phụ kiện.
    pathogen_removal_capability:
      name: Khả năng loại bỏ mầm bệnh
      description: Ghi rõ loại vi sinh vật (vi khuẩn, động vật nguyên sinh, vi rút)
        mà máy bơm được chứng nhận có khả năng loại bỏ.
    pattern_sizing_system:
      name: Hệ thống định cỡ mẫu
      description: 'Chỉ định hệ thống hoặc tiêu chuẩn kích thước khu vực được sử dụng
        cho bảng kích thước của mẫu (ví dụ: Mỹ, Anh, EU).'
    peak_style:
      name: Kiểu dáng lưỡi trai
      description: Quy định kiểu dáng của tấm che mặt hoặc vành mũ bảo hiểm, ảnh hưởng
        đến độ che phủ, tính thẩm mỹ và các quy tắc kỷ luật.
    pear_variety:
      name: Giống lê
      description: 'Giúp xác định giống hoặc chủng loại lê (ví dụ: Bartlett, Bosc,
        Conference), cho phép người mua sắm lựa chọn hương vị, kết cấu và cách chế
        biến ưa thích của họ.'
    pearl_luster_grade:
      name: Độ bóng ngọc trai
      description: Đánh giá chất lượng độ bóng/sáng của bề mặt ngọc trai.
    pearl_matching_level:
      name: Mức độ phù hợp của ngọc trai
      description: 'Cho biết mức độ đồng đều của các viên ngọc trai trong cùng một
        lô hoặc chuỗi (ví dụ: về màu sắc, kích thước và độ bóng).'
    pearl_shape:
      name: Hình dạng ngọc trai
      description: Phân loại hình dạng tổng thể của ngọc trai.
    pearl_surface_condition:
      name: Tình trạng bề mặt của ngọc trai
      description: Chỉ số này cho biết tình trạng bề mặt có thể nhìn thấy của một
        viên ngọc trai, dựa trên sự hiện diện và mức độ nghiêm trọng của các vết bẩn
        hoặc đốm.
    pearl_treatment:
      name: Xử lý bằng ngọc trai
      description: Tiết lộ bất kỳ phương pháp xử lý nào được áp dụng cho ngọc trai
        có ảnh hưởng đến màu sắc/hình thức bên ngoài.
    pearl_type:
      name: Loại ngọc trai
      description: 'Chỉ định loại/nguồn gốc ngọc trai (ví dụ: ngọc trai nước ngọt,
        Akoya, Tahiti, Nam Hải) cho ngọc trai rời.'
    peat_level:
      name: Mức độ than bùn
      description: Mô tả cường độ ảnh hưởng của khói than bùn trong rượu whisky, từ
        không có khói than bùn đến có nhiều khói than bùn.
    pedal_and_cleat_system_compatibility:
      name: Khả năng tương thích giữa bàn đạp và hệ thống kẹp
      description: Ghi rõ loại bàn đạp hoặc đế giày nào mà miếng đệm hoặc nêm được
        thiết kế để sử dụng cùng, đảm bảo người mua sắm chọn được sản phẩm phù hợp
        với bàn đạp và giày của họ.
    pedal_configuration:
      name: Cấu hình bàn đạp
      description: Cho biết ghế có bàn đạp đơn, bàn đạp tách rời/độc lập, hay thiết
        kế có thể chuyển đổi.
    pedal_mounting_style:
      name: Kiểu lắp đặt bàn đạp
      description: Chỉ định cách thức gắn bàn đạp hoặc tấm bọc/đệm bàn đạp vào xe
        (phương pháp lắp đặt/gắn).
    pedal_set_components:
      name: Các bộ phận của bộ bàn đạp
      description: Chỉ định những bàn đạp nào được bao gồm trong bộ sản phẩm.
    pedal_spindle_material:
      name: Vật liệu trục bàn đạp
      description: Vật liệu được sử dụng cho trục/trục quay bàn đạp ảnh hưởng đến
        độ bền, trọng lượng và khả năng chống ăn mòn.
    pedal_spindle_thread_size:
      name: Kích thước ren trục bàn đạp
      description: Chỉ định tiêu chuẩn ren của trục bàn đạp dùng để vặn vào tay quay.
    pedal_type:
      name: Loại bàn đạp
      description: Mô tả kiểu dáng bàn đạp được trang bị kèm theo xe đạp, cho biết
        khả năng tương thích với giày và phong cách đạp xe.
    pellet_accessory_type:
      name: Loại phụ kiện cho súng hơi viên chì
      description: Giúp xác định loại phụ kiện mồi câu cụ thể để người câu cá có thể
        nhanh chóng tìm thấy mũi khoan, dây buộc hoặc nút chặn theo nhu cầu lắp ráp
        mồi câu của họ.
    pellet_grade:
      name: Viên nén
      description: Thể hiện độ chính xác trong sản xuất hoặc cấp độ hiệu năng của
        viên đạn airsoft.
    pen_ink_color:
      name: Màu mực bút
      description: Chỉ báo màu mực thực tế được bút sử dụng, màu này có thể khác với
        màu bên ngoài của thân bút.
    penalty_card_accessories_included:
      name: Bao gồm các phụ kiện thẻ phạt.
      description: Liệt kê các phụ kiện bổ sung dành cho trọng tài đi kèm với thẻ
        phạt, chẳng hạn như ví, sổ ghi điểm, bút chì, đồng xu, còi hoặc túi đựng.
    penalty_card_colors_included:
      name: Các màu thẻ phạt đi kèm
      description: Liệt kê màu sắc của các thẻ phạt có trong bộ sản phẩm.
    penalty_flag_throw_distance:
      name: Khoảng cách ném cờ phạt
      description: Phân loại thiết kế cho biết tầm ném dự kiến của lá cờ.
    pendant_cutter_safety_features:
      name: Các tính năng an toàn của máy cắt mặt dây chuyền
      description: Xác định các yếu tố an toàn tích hợp giúp giảm thiểu các vết cắt
        ngoài ý muốn trong quá trình mang/đeo.
    pendant_cutter_wear_method:
      name: Phương pháp mài mòn của máy cắt mặt dây chuyền
      description: Xác định cách thức thiết kế để mang hoặc đeo dụng cụ cắt mặt dây
        chuyền.
    pepper_variety:
      name: Giống ớt
      description: Ghi rõ loại hoặc giống ớt được sử dụng trong sản phẩm, giúp người
        mua sắm phân biệt được các hương vị và độ cay khác nhau.
    percussion_case_style:
      name: Kiểu hộp đựng dụng cụ gõ
      description: Phân loại kiểu dáng/cấu trúc tổng thể của túi (túi mềm so với túi
        cứng/cứng cáp so với loại kết hợp).
    percussion_instruments_included:
      name: Các nhạc cụ gõ đi kèm
      description: Liệt kê các loại nhạc cụ gõ có trong sản phẩm khi đó là bộ đồ chơi
        nhiều nhạc cụ.
    percussion_mallet_handle_grip_style:
      name: Kiểu cầm cán dùi gõ
      description: Xác định loại xử lý bề mặt tay cầm (ngoài kết cấu), chẳng hạn như
        gỗ thô, sơn mài, tay cầm bọc cao su hoặc bọc vải.
    percussion_mallet_head_construction:
      name: Cấu tạo đầu búa gõ
      description: 'Mô tả kiểu cấu tạo/thiết kế đầu dùi trống (ví dụ: quấn sợi, quấn
        nỉ, cao su, gỗ thô), yếu tố ảnh hưởng đến âm thanh và độ bền.'
    perfumery_base_carrier_type:
      name: Loại chất mang nền nước hoa
      description: Xác định hệ dung môi/chất mang của một loại nước hoa cơ bản (thành
        phần chính của nước hoa cơ bản để pha loãng và phát huy tác dụng).
    perfumery_base_intended_application:
      name: Ứng dụng dự định của chất nền nước hoa
      description: 'Cho biết định dạng sử dụng cuối cùng mà sản phẩm cơ bản được thiết
        kế cho (ví dụ: dạng xịt thơm cao cấp so với dạng lăn).'
    perfumery_ingredient_carrier_solvent:
      name: Chất mang/dung môi nguyên liệu nước hoa
      description: 'Xác định chất mang/dung môi mà thành phần được cung cấp kèm theo,
        nếu được pha loãng (ví dụ: ethanol, DPG, dầu jojoba).'
    perfumery_ingredient_form:
      name: Định dạng thành phần nước hoa
      description: Chỉ định hình thức/trạng thái vật lý của thành phần nước hoa khi
        được cung cấp.
    perfumery_ingredient_type:
      name: Loại thành phần nước hoa
      description: 'Phân loại các thành phần nước hoa dựa trên công dụng của chúng
        trong ngành sản xuất nước hoa (ví dụ: tinh dầu, hóa chất tạo mùi).'
    perfumery_ingredient_usage_note:
      name: Ghi chú về cách sử dụng các thành phần nước hoa
      description: Chỉ ra vai trò điển hình trong cấu trúc hương thơm (hương đầu,
        hương giữa/hương trung, hương cuối), thừa nhận rằng các thành phần có thể
        trải rộng nhiều nốt hương.
    perfumery_ingredients:
      name: Các thành phần nước hoa
      description: 'Liệt kê các loại nguyên liệu tạo hương có thể tiêu hao được bao
        gồm trong bộ dụng cụ (ví dụ: tinh dầu, dầu thơm, cồn nền).'
    perfumery_note_position:
      name: Vị trí nốt hương nước hoa
      description: Chỉ ra vai trò điển hình của thành phần trong cấu trúc hương thơm
        (hương đầu/hương giữa/hương cuối).
    persimmon_variety:
      name: Giống hồng
      description: Xác định giống hoặc chủng loại của quả hồng, vì các giống khác
        nhau như Fuyu hoặc Hachiya có sự khác biệt về kết cấu, hương vị, độ chát và
        cách sử dụng trong ẩm thực.
    personalization_type:
      name: Loại cá nhân hóa
      description: 'Xác định xem sản phẩm có thể được tùy chỉnh cho một sự kiện hay
        không và bằng cách nào (ví dụ: chữ viết tắt, tên/ngày tháng, chèn ảnh).'
    phonics_focus:
      name: Tập trung vào ngữ âm
      description: Chỉ rõ những kỹ năng phát âm và đọc từ nào mà đồ chơi đọc này nhắm
        đến.
    physalis_variety:
      name: Giống Physalis
      description: Xác định loài thực vật cụ thể, giống cây trồng hoặc loại thông
        dụng của cây physalis đang được bán.
    pi_ata_filler_type_included:
      name: Bao gồm loại vật liệu nhồi piñata.
      description: Nếu có nội dung phụ, hãy ghi rõ loại nội dung được cung cấp.
    pi_ata_hanging_method:
      name: Phương pháp treo Piñata
      description: Cách thức thiết kế để treo hoặc đỡ chiếc piñata (bao gồm vòng,
        móc, dây, v.v.).
    pi_ata_opening_type:
      name: Kiểu mở Piñata
      description: Cách thức mở/đóng miệng bình (nắp đậy, khóa dán, khóa kéo, niêm
        phong sẵn, v.v.).
    piccolo_key_system:
      name: Hệ thống phím Piccolo
      description: Xác định hệ thống/thiết kế phím bấm được sử dụng trên sáo piccolo
        (thường là hệ thống Boehm cho các loại sáo piccolo hiện đại).
    piccolo_keywork_features:
      name: Đặc điểm khóa Piccolo
      description: Mô tả các cơ chế và tùy chọn phím đáng chú ý trên đàn piccolo.
    pick_grip_aid:
      name: Dụng cụ hỗ trợ cầm nắm
      description: 'Chỉ ra các yếu tố hỗ trợ cầm nắm chính được tích hợp trên miếng
        gảy đàn, ngoài cảm giác/kết cấu bề mặt thông thường (ví dụ: lỗ cầm nắm, logo
        dập nổi, lớp cao su lót).'
    pickleball_construction_type:
      name: Kiểu cấu trúc bóng pickleball
      description: Cấu trúc sản xuất của quả bóng, chẳng hạn như liền khối hoặc ghép
        hai mảnh, ảnh hưởng đến độ bền và tính ổn định của đường bay.
    pickling_method:
      name: Phương pháp ngâm chua
      description: Chỉ định môi trường hoặc kỹ thuật bảo quản được sử dụng để muối
        chua, chẳng hạn như nước muối giấm hoặc quá trình lên men lactic.
    pickup_and_preamp_configuration:
      name: Cấu hình pickup và tiền khuếch đại
      description: Cho biết liệu đàn viola có tích hợp bộ thu âm và/hoặc bộ tiền khuếch
        đại chủ động để biểu diễn hoặc thu âm có khuếch đại hay không.
    pickup_configuration:
      name: Cấu hình bộ thu âm của đàn guitar
      description: 'Mô tả cách bố trí tổng thể các pickup của đàn guitar điện bằng
        các ký hiệu viết tắt thông dụng (ví dụ: SSS, HSS, HH).'
    pickup_cover_material:
      name: Chất liệu nắp đậy bộ thu âm
      description: Chỉ định vật liệu chính của nắp chụp pickup (nếu có), bao gồm cả
        các lớp mạ thông thường khi nhà sản xuất quy định như vậy.
    pickup_cover_type:
      name: Loại nắp thùng xe bán tải
      description: 'Chỉ định xem bộ phận thu âm của đàn guitar điện có vỏ bảo vệ hay
        không và chất liệu/kiểu dáng của vỏ bảo vệ (ví dụ: kim loại so với nhựa).'
    pickup_string_spacing:
      name: Khoảng cách giữa các dây đàn
      description: 'Khoảng cách giữa các cực từ và dây đàn theo tiêu chuẩn mà pickup
        được sản xuất (ví dụ: Fender/khoảng cách F so với Gibson/tiêu chuẩn), ảnh
        hưởng đến sự căn chỉnh trên đàn guitar có hệ thống tremolo.'
    pie_crust_type:
      name: Loại vỏ bánh
      description: Chỉ định kiểu dáng hoặc loại vỏ bánh được sử dụng cho bánh nướng
        hoặc bánh tart, chẳng hạn như vỏ bánh xốp, vỏ bánh quy giòn hoặc vỏ bánh không
        chứa gluten.
    piece_configuration:
      name: Cấu hình mảnh
      description: Chỉ số này cho biết cơ gậy, cán gậy hoặc cầu gậy được cấu tạo từ
        bao nhiêu bộ phận riêng biệt, ảnh hưởng đến tính di động và phong cách chơi.
    pillow_form_size:
      name: Kích thước ruột gối
      description: 'Kích thước hoàn thiện tiêu chuẩn được quy định cho ruột gối/lõi
        gối (ví dụ: 18" x 18").'
    pilot_helmet_communications_integration:
      name: Tích hợp hệ thống liên lạc mũ phi công
      description: Cho biết mũ bảo hiểm có bao gồm hoặc được cấu hình sẵn cho các
        thành phần liên lạc hàng không hay không.
    pilot_helmet_visor_configuration:
      name: Cấu hình kính che mặt mũ phi công
      description: Chỉ định cấu hình tấm che mặt/kính chắn gió đi kèm với mũ bảo hiểm
        phi công.
    pin_attachment_type:
      name: Kiểu cài/gắn huy hiệu
      description: 'Chỉ định cơ chế ghim/đế ghim được sử dụng để gắn ghim vào quần
        áo hoặc bề mặt (ví dụ: chốt bướm, đế từ tính).'
    pin_backing_type:
      name: Loại chốt cài mặt sau của huy hiệu
      description: Chỉ định cơ chế cài/đế được sử dụng để cố định ghim vào quần áo
        hoặc phụ kiện.
    pin_cushion_attachment_style:
      name: Kiểu gắn ghim cài
      description: Cách đeo, gắn hoặc đặt ghim cài áo trong quá trình sử dụng.
    pin_cushion_features:
      name: Đặc điểm của gối kim
      description: Các tính năng chức năng vượt xa chức năng giữ ghim cơ bản.
    pin_face_customization_method:
      name: Phương pháp tùy chỉnh mặt ghim
      description: 'Chỉ định cách thức sản xuất thiết kế mặt trước (ví dụ: men cứng,
        men mềm, in).'
    pin_type:
      name: Loại chân cắm
      description: Chỉ định kiểu dáng hoặc định dạng huy hiệu được sử dụng cho các
        vật phẩm sưu tầm dành cho người hâm mộ thể thao.
    ping_pong_certification:
      name: Chứng chỉ bóng bàn
      description: Nêu rõ tiêu chuẩn chính thức hoặc mức độ phê duyệt của cơ quan
        quản lý đối với sản phẩm.
    ping_pong_competition_certification:
      name: Chứng chỉ thi đấu bóng bàn
      description: 'Cho biết trạng thái chứng nhận chính thức của quả bóng bàn để
        sử dụng trong các giải đấu chính thức (ví dụ: được ITTF phê duyệt).'
    ping_pong_paddle_handle_style:
      name: Kiểu cán vợt bóng bàn
      description: Nó xác định hình dạng/kiểu dáng của cán vợt, điều này ảnh hưởng
        đến sự thoải mái khi cầm nắm và kỹ thuật chơi.
    ping_pong_robot_accessory_type:
      name: Phụ kiện robot bóng bàn
      description: 'Xác định loại chức năng cụ thể của phụ kiện để người mua sắm có
        thể nhanh chóng thu hẹp kết quả tìm kiếm (ví dụ: lưới chống muỗi so với bộ
        chuyển đổi nguồn).'
    ping_pong_rubber_surface_type:
      name: Loại bề mặt cao su bóng bàn
      description: Xác định kiểu dáng/kết cấu của bề mặt cao su được phủ lên vợt,
        ảnh hưởng đến đặc tính xoay và tốc độ.
    ping_pong_rubber_type:
      name: Loại cao su bóng bàn
      description: Chỉ định kiểu cấu trúc bề mặt của tấm cao su bóng bàn, yếu tố ảnh
        hưởng đến đặc tính khi chơi.
    ping_pong_table_type:
      name: Loại bàn bóng bàn
      description: 'Phân loại kiểu dáng hoặc định dạng tổng thể của bảng để dễ dàng
        so sánh hơn (ví dụ: bảng cạnh tranh, bảng xếp hạng chuyển đổi, bảng thu nhỏ).'
    pipe_instrument_voicing_sound_production_method:
      name: Phương pháp tạo âm/phát âm cho nhạc cụ ống
      description: Chỉ định cách thức nhạc cụ tạo ra âm thanh (cơ chế luồng khí),
        giúp phân biệt các loại sáo pan, sáo sậy và sáo organ trong bộ lọc.
    piston_application_type:
      name: Loại ứng dụng piston
      description: Mục đích sử dụng/công dụng dự kiến của piston (thay thế so với
        hiệu suất/đua xe so với tải nặng).
    piston_crown_dish_style:
      name: Kiểu đỉnh/đĩa pít-tông
      description: 'Hình dạng đỉnh piston ảnh hưởng đến thể tích buồng đốt và tỷ lệ
        nén (ví dụ: đỉnh phẳng, hình vòm, hình lõm).'
    piston_pin_retention_type:
      name: Loại giữ chốt piston
      description: Quy định cách thức giữ chốt piston trong cụm piston/thanh truyền.
    pit_configuration:
      name: Cấu hình hố nhảy
      description: Xác định cấu trúc tổng thể của khu vực tiếp đất (nguyên khối hay
        đa mô-đun) và, từ đó, xác định số lượng các phần hoặc mô-đun được cung cấp.
    pit_cover_type:
      name: Loại nắp đậy hố
      description: Xác định bề mặt hoặc tấm bảo vệ được cung cấp kèm theo hố tập,
        ảnh hưởng đến khả năng chống chịu của gai giày, khả năng chống chịu thời tiết
        và sở thích của vận động viên.
    pitahaya_flesh_color:
      name: Màu thịt quả thanh long
      description: 'Chỉ định màu sắc phần thịt bên trong của quả thanh long (ví dụ:
        trắng, đỏ, tím), một yếu tố quan trọng ảnh hưởng đến hương vị, hình thức và
        giá trị dinh dưỡng.'
    pitch_mat_coverage_length:
      name: Chiều dài phạm vi phủ của tấm bạt sân cỏ
      description: 'Phân loại thảm sân cricket theo phần sân mà nó che phủ (ví dụ:
        toàn bộ hoặc một nửa sân).'
    pitch_range:
      name: Phạm vi góc
      description: Mô tả độ cao/độ sáng của âm thanh nhạc cụ gõ (shaker).
    pitch_standard:
      name: Tiêu chuẩn cao độ
      description: 'Chỉ định chuẩn cao độ (chuẩn âm tham chiếu) mà sáo được chế tạo
        (ví dụ: A=440, A=442, A=415).'
    pitching_rubber_size_designation:
      name: Ký hiệu kích thước cao su ném bóng
      description: Chỉ định kích thước sân tiêu chuẩn cho tấm cao su đánh bóng, giúp
        đơn giản hóa việc lựa chọn mà không yêu cầu người mua sắm phải biết kích thước
        chính xác.
    pitching_screen_style:
      name: Phong cách màn hình trình chiếu
      description: Xác định thiết kế cấu trúc của màn hình để người mua sắm có thể
        nhanh chóng chọn bố cục bảo vệ phù hợp với kịch bản huấn luyện của họ.
    pitching_target_design:
      name: Thiết kế mục tiêu ném bóng
      description: Phân loại kiểu dáng hoặc cấu hình tổng thể của mục tiêu ném bóng.
    pitching_wheel_count:
      name: Số bánh xe quay
      description: Chỉ số này cho biết số lượng bánh xe đẩy mà máy ném cỏ sử dụng.
    pivot_adjustability:
      name: Khả năng điều chỉnh trục
      description: Cho biết liệu kéo có vít điều chỉnh độ căng khi cắt hay không.
    pivot_piece_type:
      name: Loại khớp xoay
      description: Phân biệt giữa các hình dạng giao diện trục xoay khác nhau được
        cung cấp, chẳng hạn như kiểu cốc truyền thống hoặc kiểu ống.
    place_card_holder_closure_mechanism:
      name: Cơ chế đóng giá đỡ thẻ
      description: Chỉ định cách giá đỡ giữ hoặc cố định thẻ.
    place_card_orientation:
      name: Hướng đặt thẻ tên
      description: Chỉ định hướng đặt thẻ tên khi sử dụng/hiển thị.
    place_card_printing_status:
      name: Trạng thái in thẻ tên
      description: Cho biết thẻ ghi tên khách là loại để trống để viết tay/in chữ,
        loại in sẵn (tên không được cá nhân hóa), hoặc loại in theo yêu cầu/được cá
        nhân hóa.
    placket_type:
      name: Kiểu nẹp
      description: Chỉ định kiểu dáng phần mở phía trước của áo polo, bao gồm số lượng
        nút hoặc các kiểu khóa khác.
    planetarium_content_theme:
      name: Chủ đề nội dung cung thiên văn
      description: Nội dung chính được hiển thị bởi máy chiếu trong cung thiên văn.
    planetarium_projection_content_format:
      name: Định dạng nội dung trình chiếu tại cung thiên văn
      description: Xác định cơ chế trình chiếu nội dung mà cung thiên văn sử dụng
        (đĩa/slide vật lý so với hiệu ứng kỹ thuật số/LED).
    plant_fiber_type:
      name: Loại sợi thực vật
      description: Loại sợi có nguồn gốc thực vật cụ thể khi nguồn sợi Staple là thực
        vật.
    plaster_gauze_finish:
      name: Hoàn thiện bằng lưới thạch cao
      description: Xu hướng hoàn thiện bề mặt sau khi thi công và làm phẳng.
    plaster_gauze_grade:
      name: Băng gạc thạch cao cấp
      description: 'Mục đích sử dụng của gạc thạch cao (ví dụ: thủ công/sinh viên
        so với chuyên nghiệp).'
    plaster_gauze_weave_density:
      name: Mật độ dệt của gạc thạch cao
      description: Độ thưa/chặt tương đối của các sợi vải gạc ảnh hưởng đến độ bền
        và khả năng bám dính của thạch cao.
    plastic_canvas_finish:
      name: Hoàn thiện bằng vải nhựa
      description: Xử lý bề mặt/hoàn thiện cuộn vải bạt nhựa.
    plastic_canvas_sheet_finish:
      name: Lớp hoàn thiện bề mặt tấm canvas nhựa
      description: Xử lý bề mặt/cạnh của tấm canvas nhựa.
    plastic_canvas_transparency:
      name: Vải nhựa trong suốt
      description: Độ trong suốt/mờ đục của tấm nhựa.
    plate_bottom_design:
      name: Thiết kế đáy đĩa
      description: Mô tả cấu tạo mặt dưới của tấm đế, yếu tố ảnh hưởng đến độ bám,
        độ ổn định và độ an toàn trên các bề mặt sân chơi khác nhau.
    plate_compatibility_standard:
      name: Tiêu chuẩn tương thích của tấm đế
      description: 'Chỉ định tiêu chuẩn tạ mà thanh tạ được thiết kế cho (ví dụ: Olympic
        50 mm, Tiêu chuẩn 25 mm).'
    plate_installation_type:
      name: Loại lắp đặt tấm
      description: 'Quy định cách thức cố định hoặc định vị tấm bảng trên sân (ví
        dụ: chôn dưới đất, gắn đinh, ném xuống), cho phép người mua lựa chọn giữa
        các tùy chọn cố định và di động.'
    plate_size_category:
      name: Loại kích thước đĩa
      description: Phân loại các loại đĩa theo cấp độ thi đấu hoặc tiêu chuẩn quy
        định để người mua có thể nhanh chóng tìm thấy thiết bị tuân thủ quy định của
        giải đấu.
    play_dough_putty_kit_contents:
      name: Nội dung bộ đồ chơi bột nặn và đất sét
      description: 'Xác định các thành phần chính đi kèm ngoài bản thân hợp chất (ví
        dụ: dụng cụ, khuôn mẫu, máy đùn, kho chứa).'
    play_dough_tool_set_items_included:
      name: Các mặt hàng được bao gồm trong bộ dụng cụ đồ chơi đất nặn
      description: 'Xác định các loại dụng cụ và phụ kiện có trong bộ dụng cụ nặn
        đất sét (ví dụ: con lăn, dao cắt, khuôn).'
    play_environment_suitability:
      name: Sự phù hợp của môi trường chơi
      description: 'Xác định môi trường chơi dự kiến cho bộ sản phẩm (ví dụ: trong
        nhà, ngoài trời, dưới nước).'
    play_food_features:
      name: Tính năng đồ chơi
      description: Các tính năng đặc biệt về chức năng hoặc tính chân thực của các
        món đồ chơi thức ăn.
    play_food_items_included:
      name: Mặt hàng đồ chơi thức ăn bao gồm
      description: Cho biết các loại đồ chơi thức ăn có trong bộ đồ chơi nhà bếp.
    play_food_size_scale:
      name: Thang đo kích thước đồ chơi thức ăn
      description: Cho biết thang đo kích thước gần đúng của các món đồ chơi thức
        ăn để phù hợp với nhà bếp đồ chơi, búp bê và bộ đồ chơi.
    play_money_set_components_included:
      name: Các thành phần đi kèm của bộ đồ chơi tiền giả
      description: Chỉ định các loại thành phần nào được bao gồm trong bộ tiền đồ
        chơi/ngân hàng.
    play_pattern:
      name: Mô hình chơi
      description: 'Mục đích sử dụng chính của món đồ chơi (ví dụ: để giải tỏa căng
        thẳng, làm tượng/tác phẩm nghệ thuật trên bàn, xây dựng/lắp ráp, hoặc chơi
        xếp hình).'
    play_sprinkler_mounting_type:
      name: Kiểu lắp đặt vòi phun nước
      description: Cách đặt/cố định vòi phun nước đồ chơi trong quá trình sử dụng.
    play_vehicle_lights_and_sounds:
      name: Phát đèn và âm thanh xe cộ
      description: Cho biết xe đồ chơi có tích hợp các hiệu ứng điện tử như đèn và/hoặc
        âm thanh hay không.
    play_vehicle_scale:
      name: Tỷ lệ xe đồ chơi
      description: Chỉ số này thể hiện tỷ lệ thu nhỏ của xe đồ chơi (thường được sử
        dụng cho các loại xe đồ chơi đúc khuôn và mô hình).
    player_size_category:
      name: Nhóm kích cỡ theo người chơi
      description: 'Xác định kích thước/độ tuổi người chơi dự định mà bộ dụng cụ bắt
        bóng phù hợp (ví dụ: Bóng chày trẻ em, Thiếu niên, Trung cấp, Người lớn).'
    player_size_range:
      name: Phạm vi kích cỡ người chơi
      description: 'Chỉ định phạm vi kích thước người dùng dự định cho dây đeo/giá
        đỡ (ví dụ: trẻ em, người lớn, đa năng).'
    playing_environment:
      name: Môi trường chơi
      description: Xác định bề mặt hoặc bối cảnh chơi chính mà quả bóng khúc côn cầu
        được thiết kế cho.
    playing_method:
      name: Phương pháp chơi
      description: Cách chơi/kích hoạt chính của nhạc cụ này.
    playing_surface_material:
      name: Chất liệu bề mặt chơi
      description: Xác định chất liệu của bề mặt chơi phía trước (tapa) của cajon,
        yếu tố ảnh hưởng mạnh mẽ đến âm thanh và cảm giác khi chơi.
    playing_surface_type:
      name: Loại bề mặt sân chơi
      description: Mô tả cấu tạo/cảm giác bề mặt chơi của tấm đệm tập luyện.
    playset_activities_included:
      name: Các hoạt động trong bộ đồ chơi bao gồm
      description: Xác định các hoạt động/thành phần chơi chính được tích hợp trong
        bộ xích đu/bộ đồ chơi để giúp người mua sắm lọc sản phẩm theo những hoạt động
        mà trẻ em có thể thực hiện trên cấu trúc đó.
    playset_installation_type:
      name: Kiểu lắp đặt bộ đồ chơi vận động
      description: Quy định cách lắp đặt hoặc cố định bộ xích đu/khu vui chơi.
    playset_items_included:
      name: Các sản phẩm đi kèm trong bộ đồ chơi
      description: Xác định các loại đồ hàng có trong bộ đồ chơi dã ngoại (thức ăn,
        bát đĩa, chăn, giỏ, v.v.).
    pliers_jaw_style:
      name: Kiểu hàm kìm
      description: Mô tả cấu hình hàm chính hoặc kiểu chức năng của kìm.
    plum_variety:
      name: Giống mận
      description: Giúp xác định giống hoặc chủng loại mận cụ thể, cho phép người
        mua sắm lựa chọn dựa trên hương vị, màu sắc và mục đích sử dụng trong chế
        biến.
    plumcot_variety:
      name: Giống quả plumcot
      description: 'Xác định giống cây trồng hoặc giống thương mại cụ thể của cây
        mận lai (ví dụ: Flavor King, Dapple Dandy), điều này có thể ảnh hưởng đến
        hương vị, màu sắc và tính thời vụ.'
    plunger_mute_handle_type:
      name: Tay cầm giảm tiếng ồn kiểu pít tông
      description: Chỉ định kiểu tay cầm hoặc kiểu nắm được sử dụng để giữ và điều
        khiển bộ giảm âm dạng pít tông cho hiệu ứng wa-wa.
    pocket_closure_type:
      name: Kiểu đóng túi
      description: Xác định cách thức khóa của từng ngăn túi, giúp người dùng dễ dàng
        tìm thấy quần có ngăn chứa đồ an toàn trong khi hoạt động.
    pocket_knife_opening_mechanism:
      name: Cơ chế mở dao bỏ túi
      description: Cách thức mở/mở lưỡi dao (bằng rãnh móng tay, chốt ngón cái, cần
        gạt, trợ lực, tự động, v.v.).
    pocket_style:
      name: Kiểu túi
      description: Mô tả cấu trúc túi chính trên quần.
    pocket_type:
      name: Loại túi
      description: Xác định kiểu dáng hoặc sự hiện diện của túi trên trang phục.
    pod_retention_system:
      name: Hệ thống giữ hộp đạn
      description: Mô tả cách các hộp đựng đạn sơn được giữ cố định và tháo ra khỏi
        dây đeo hoặc ba lô.
    pogo_stick_footrest_type:
      name: kiểu gác chân dạng gậy nhún
      description: Mô tả thiết kế bệ đỡ/chốt để đứng trên gậy nhún.
    pogo_stick_suspension_type:
      name: Kiểu treo gậy nhún
      description: Chỉ định cơ chế đàn hồi của gậy nhún, ảnh hưởng đến cảm giác, độ
        bền và việc bảo trì.
    poi_handle_type:
      name: Loại tay cầm của dụng cụ múa lửa Poi
      description: Chỉ định kiểu tay cầm/cầm nắm/phụ kiện được sử dụng để giữ poi.
    poi_light_source:
      name: Nguồn sáng Poi
      description: Đối với poi có đèn chiếu sáng, cần nêu rõ công nghệ chiếu sáng.
    poi_tether_type:
      name: Loại dây buộc Poi
      description: 'Chỉ định loại dây buộc nối đầu poi với tay cầm, núm hoặc vòng
        đeo cổ tay (ví dụ: dây thừng, dây cáp, xích).'
    poi_type:
      name: Loại Poi
      description: 'Chỉ định loại cấu tạo/cách sử dụng chính của poi (ví dụ: luyện
        tập, LED, lửa).'
    point_type:
      name: Loại điểm
      description: Hình dạng/kiểu dáng của đầu kim thêu.
    pointe_shoe_shank_length:
      name: Chiều dài gân giày múa ba lê
      description: Phần chiều dài của giày được phần đế giữa nâng đỡ, ví dụ như chiều
        dài toàn bộ hoặc 3/4 chiều dài.
    pointe_shoe_shank_strength:
      name: Độ bền của phần đế giày múa ba lê
      description: Độ cứng của phần đế giày múa ba lê ảnh hưởng đến khả năng nâng
        đỡ và thời gian làm quen với giày.
    poker_accessory_storage_included:
      name: Bao gồm hộp đựng phụ kiện chơi bài poker
      description: Cho biết phụ kiện này có ngăn chứa riêng cho những vật dụng chơi
        bài poker bổ sung nào.
    poker_chip_tray_rack_configuration:
      name: Cấu hình khay/giá đựng chip poker
      description: Mô tả kiểu bố trí bên trong của khay/giá đựng chip (số hàng và
        sức chứa mỗi hàng).
    pole_anchoring_method:
      name: Phương pháp cố định/neo cột
      description: Xác định cách cột được cố định xuống đất hoặc bề mặt sân chơi.
    pole_basket_type:
      name: Loại vòng chắn tuyết của gậy
      description: Phân loại kiểu dáng hoặc kích thước của giỏ được gắn gần đầu gậy
        trượt tuyết, cho biết điều kiện tuyết dự định sử dụng.
    pole_connection_system:
      name: Hệ thống kết nối cột
      description: Xác định cơ chế kết nối các đoạn cột với nhau, chẳng hạn như hệ
        thống dây đàn hồi, ren hoặc khớp nối, giúp người dùng đánh giá tốc độ lắp
        đặt và khả năng tương thích.
    pole_system_type:
      name: Loại hệ thống cột
      description: 'Mô tả hệ thống khung đỡ hoặc kiểu dựng lều được sử dụng (ví dụ:
        cột nhôm, ống khí bơm hơi, dựng bằng gậy leo núi).'
    police_equipment_fitment:
      name: Trang bị thiết bị cho cảnh sát
      description: Chỉ định các thiết bị thực thi pháp luật mà xe được cấu hình hoặc
        được trang bị sẵn để hỗ trợ.
    police_vehicle_equipment_package:
      name: Gói trang thiết bị cho xe cảnh sát
      description: Cho biết các trang bị/thiết bị chuyên dụng dành cho cảnh sát được
        trang bị kèm theo xe khi bán.
    police_vehicle_light_siren_equipment:
      name: Thiết bị đèn/còi báo động cho xe cảnh sát
      description: Chỉ định các thiết bị cảnh báo khẩn cấp nào được lắp đặt trên xe
        cảnh sát.
    police_vehicle_upfit_level:
      name: Mức độ trang bị bổ sung cho xe cảnh sát
      description: Mô tả các thiết bị/phụ kiện chuyên dụng dành cho cảnh sát được
        lắp đặt trên xe tải.
    polish_formulation:
      name: Công thức Ba Lan
      description: Chỉ định thành phần cơ bản/hóa chất của sơn phủ cần đàn (không
        phải phương pháp thi công).
    polish_purpose:
      name: Mục đích đánh bóng
      description: Mục đích chính của việc đánh bóng bề mặt dụng cụ.
    pollen_level:
      name: Mức độ phấn hoa
      description: Cho biết mức độ/khả năng bị ố màu do phấn hoa từ giống hoa ly.
    polymer_clay_firmness_level:
      name: Độ cứng của đất sét polymer
      description: Độ cứng/mềm tương đối của đất sét polymer trước khi nung (khả năng
        tạo hình).
    polymer_clay_translucency:
      name: Độ trong suốt của đất sét polymer
      description: Độ mờ/trong suốt khi quan sát bằng mắt thường của đất sét polymer
        sau khi đóng rắn.
    pom_pom_handle_style:
      name: Kiểu dáng tay cầm của bông cổ vũ
      description: Mô tả kiểu dáng hoặc cấu tạo của tay cầm/báng cầm dùng để giữ quả
        bông.
    pom_pom_trim_backing_tape_material:
      name: Chất liệu lót/băng viền trang trí hình quả bông
      description: Xác định chất liệu của dải băng hoặc dây bện được may mà các quả
        bông được gắn vào (phần đế trang trí).
    pom_pom_type:
      name: Kiểu quả bông
      description: Cho biết sự hiện diện và loại quả bông hoặc bông trang trí cụ thể
        trên mũ.
    pomegranate_product_form:
      name: Sản phẩm từ quả lựu
      description: Mô tả hình thức vật lý được cung cấp (quả nguyên, hạt đã bóc vỏ,
        nhân, hạt đông lạnh).
    pomegranate_variety:
      name: Giống lựu
      description: 'Xác định giống hoặc chủng loại cụ thể của quả lựu (ví dụ: Wonderful,
        Bhagwa, Kandhari).'
    ponytail_holder_style:
      name: Kiểu dây buộc tóc đuôi ngựa
      description: Mô tả cấu tạo hoặc hình dạng cụ thể của dây buộc tóc để người mua
        sắm có thể chọn kiểu dáng ưa thích.
    popcorn_form:
      name: Hình dạng bỏng ngô
      description: Chỉ định dạng vật lý hoặc hình thức chế biến của sản phẩm bỏng
        ngô, chẳng hạn như bỏng ngô ăn liền, hạt bỏng ngô, gói dùng trong lò vi sóng,
        bộ gia vị hoặc hộp quà tặng.
    pork_rind_form:
      name: Hình dạng bì heo
      description: 'Phân loại hình thức hoặc kiểu dáng vật lý của các món ăn nhẹ làm
        từ da heo (ví dụ: da, tóp mỡ, phồng, viên, v.v.).'
    portability_features:
      name: Tính năng di động
      description: Liệt kê các yếu tố tích hợp giúp di chuyển, mang vác hoặc cất giữ
        ghế nằm.
    portability_frame_type:
      name: Tính di động/Loại khung
      description: Cho dù dàn chuông dàn nhạc là loại di động/khung dã chiến hay loại
        cố định/khung hòa nhạc.
    portable_electronic_game_features:
      name: Tính năng trò chơi điện tử cầm tay
      description: Các tính năng chính về lối chơi/trang thiết bị được thiết bị hỗ
        trợ.
    post_surgery_stage_suitability:
      name: Sự phù hợp ở giai đoạn sau phẫu thuật
      description: Thông tin này cho biết bộ đồ định hình cơ thể được thiết kế cho
        giai đoạn phục hồi nào (nếu có), rất quan trọng đối với những người mua sắm
        đồ định hình y tế.
    postage_stamp_format:
      name: Định dạng tem bưu chính
      description: Cách thức đóng gói/phân loại tem bưu chính (tem đơn, tem đôi, tem
        dải, tem khối, tem tờ, tem tập, tem cuộn, v.v.).
    postmark_type:
      name: Loại dấu bưu điện
      description: Loại dấu hủy/dấu bưu điện có trên tem thường đã sử dụng.
    potato_cut_style:
      name: Kiểu cắt khoai tây
      description: Chỉ định kiểu cắt hoặc chế biến khoai tây khi không bán nguyên
        củ.
    potato_intended_use:
      name: Mục đích sử dụng của khoai tây
      description: Phân biệt khoai tây dùng để ăn ngay với khoai tây dùng làm giống
        hoặc khoai tây chế biến đông lạnh.
    potato_variety:
      name: Giống khoai tây
      description: Chỉ định giống/loại khoai tây, cho phép người mua sắm tìm kiếm
        các loại cụ thể như “Yukon Gold”, “Maris Piper” hoặc “Purple Majesty”.
    pottery_clay_firing_required:
      name: Cần nung đất sét làm gốm.
      description: Vật liệu đó có cần nung trong lò để đạt được độ cứng/độ hoàn thiện
        cuối cùng như mong muốn hay không.
    pottery_slip_application_method:
      name: Phương pháp tráng men gốm
      description: Xác định kỹ thuật ứng dụng dự định cho lớp màng trượt.
    pottery_slip_compatible_clay_body:
      name: Đất sét tương thích với men gốm
      description: Cho biết loại đất sét mà lớp men được thiết kế để phù hợp hoặc
        kết hợp cùng.
    pottery_slip_form:
      name: Khuôn gốm tráng men
      description: Cho biết sản phẩm được bán dưới dạng dung dịch pha sẵn hay dạng
        bột khô cần pha trộn.
    pouch_design:
      name: Thiết kế túi
      description: Mô tả chi tiết các đặc điểm cấu tạo hoặc cải tiến của khu vực túi
        phía trước.
    pouch_style:
      name: Kiểu túi
      description: Xác định thiết kế của khu vực túi phía trước, đáp ứng các yêu cầu
        về sự thoải mái, hỗ trợ và thẩm mỹ.
    powdered_beverage_variety:
      name: Loại thức uống dạng bột
      description: 'Phân loại sản phẩm theo loại đồ uống mà nó pha chế (ví dụ: nước
        chanh, đồ uống thể thao, thức uống protein).'
    power_rack_style:
      name: Kiểu giá đỡ tạ
      description: Xác định thiết kế/cấu hình tổng thể của giá kệ, giúp người mua
        sắm phân biệt giữa các loại giá kệ đầy đủ, giá kệ một nửa và các loại giá
        kệ tiết kiệm không gian.
    power_steering_fluid_formulation:
      name: Công thức dầu trợ lực lái
      description: Nhóm công thức chung của chất lỏng (dựa trên ATF so với chất lỏng
        thủy lực/CHF chuyên dụng so với chất lỏng đa năng), được sử dụng để lọc ở
        mức độ tương thích cao.
    practice_mute_audio_output:
      name: Thực hành tắt âm thanh đầu ra
      description: Chỉ định loại kết nối đầu ra âm thanh có sẵn trên thiết bị giảm
        âm luyện tập để theo dõi và/hoặc ghi âm (thường thấy ở các thiết bị giảm âm
        luyện tập im lặng/điện tử).
    practice_mute_intonation_impact:
      name: Luyện tập tác động của ngữ điệu câm
      description: Mô tả hiệu ứng điều chỉnh âm thanh/ngữ điệu dự kiến khi sử dụng
        bộ phận giảm âm khi luyện tập.
    practice_mute_venting_valve_type:
      name: Thực hành loại van/thông hơi giảm âm
      description: Xác định xem bộ giảm âm luyện tập có lỗ thông hơi hay không, hoặc
        có bao gồm van điều chỉnh để thay đổi lực cản/âm lượng.
    practice_pad_features:
      name: Tính năng của đệm tập trống
      description: Bài viết này nêu bật các tính năng hữu ích của tấm đệm tập luyện,
        ngoài kích thước/chất liệu.
    practice_pad_mounting_style:
      name: kiểu gắn tấm đệm tập luyện
      description: Chỉ rõ cách đặt hoặc gắn miếng đệm tập luyện trong quá trình sử
        dụng.
    practice_pad_rebound_level:
      name: Mức độ bật nảy của tấm đệm tập luyện
      description: Thể hiện độ đàn hồi/phản hồi tương đối của miếng đệm tập trống
        so với mặt trống thông thường.
    practice_pad_surface_configuration:
      name: Cấu hình bề mặt đệm tập luyện
      description: Mô tả xem tấm lót có một hay nhiều bề mặt chơi và liệu chúng có
        khác nhau về cảm giác khi chạm vào hay không.
    pregnancy_stage_suitability:
      name: Phù hợp với giai đoạn mang thai
      description: Cho biết trang phục này được thiết kế cho giai đoạn nào của thai
        kỳ hoặc sau sinh.
    preparation_state:
      name: Trạng thái chế biến
      description: Chỉ số này cho biết mức độ chuẩn bị hoặc nấu nướng cần thiết trước
        khi tiêu thụ.
    preparation_style:
      name: Phong cách chế biến
      description: 'Xác định trạng thái cắt hoặc chế biến của củ năng khi bán (ví
        dụ: nguyên củ, thái lát, rang, đông lạnh).'
    preservation_medium:
      name: Môi trường bảo quản
      description: 'Chỉ định loại chất lỏng hoặc môi trường chính dùng để bảo quản
        ô liu hoặc nụ bạch hoa (ví dụ: nước muối, dầu ô liu, giấm).'
    presser_foot_attachment_method:
      name: Phương pháp gắn chân vịt
      description: 'Chỉ ra cách gắn chân vịt máy may vào giá đỡ/trục chân vịt (ví
        dụ: kiểu bấm hay kiểu vặn), điều này ảnh hưởng đến khả năng tương thích.'
    pressure_gauge_type:
      name: Loại đồng hồ đo áp suất
      description: Cho biết loại đồng hồ đo áp suất đi kèm với bơm xe đạp, nếu có.
    pressure_measurement_unit:
      name: Đơn vị đo áp suất
      description: Chỉ định đơn vị được sử dụng để đọc hoặc hiệu chuẩn cảm biến áp
        suất, hữu ích cho việc so sánh sản phẩm và đảm bảo tính tương thích giữa đồng
        hồ đo và ECU.
    pressure_plate_balance_type:
      name: Loại cân bằng tấm áp lực
      description: Cho biết liệu đĩa ép có được cân bằng bên trong hay cần/giả định
        sự cân bằng bên ngoài phù hợp với cấu hình động cơ/bánh đà.
    pressure_plate_components_included:
      name: Các bộ phận của tấm ép bao gồm
      description: Những gì được bao gồm trong sản phẩm tấm ép ly tâm.
    pressure_sensor_application:
      name: Ứng dụng cảm biến áp suất
      description: Xác định hệ thống/điểm đo trên xe mà cảm biến áp suất được thiết
        kế cho.
    pressure_sensor_port_thread_standard:
      name: Cổng/ren tiêu chuẩn của cảm biến áp suất
      description: Chỉ định tiêu chuẩn cổng/ren cơ khí được sử dụng để lắp đặt cảm
        biến vào hệ thống xe.
    pressurization_method:
      name: Phương pháp tạo áp suất
      description: Xác định cách thức tạo ra hoặc duy trì áp suất bên trong thiết
        bị.
    pretend_housekeeping_set_items_included:
      name: Bộ đồ chơi dọn dẹp nhà cửa bao gồm
      description: 'Liệt kê các phụ kiện dọn dẹp nhà cửa có trong bộ sản phẩm (ví
        dụ: cây lau nhà, chổi, hốt rác, bình xịt).'
    pretend_play_electronic_features:
      name: Tính năng điện tử đóng vai
      description: Sản phẩm đồ chơi đóng vai này bao gồm các tính năng điện tử/tương
        tác.
    pretend_play_set_pieces_included:
      name: Bao gồm các mảnh ghép của bộ đồ chơi đóng vai
      description: 'Các đạo cụ/thành phần chính có trong bộ đồ chơi đóng vai (ví dụ:
        máy tính tiền, đồ ăn đồ chơi, dụng cụ).'
    pretend_play_set_theme:
      name: Bộ đồ chơi đóng vai theo chủ đề
      description: Kịch bản/chủ đề chơi đóng vai chính mà sản phẩm thể hiện (hữu ích
        cho việc khám phá xuyên suốt các hoạt động chơi giả vờ của trẻ).
    pretzel_coating:
      name: Lớp phủ bánh quy xoắn
      description: Xác định bất kỳ loại gia vị hoặc lớp phủ nào được thêm vào bên
        ngoài bánh pretzel, bao gồm cả các lựa chọn mặn (mặn, gia vị) và ngọt (sô
        cô la, sữa chua, caramel).
    pretzel_shape:
      name: Hình dạng bánh quy xoắn
      description: 'Xác định hình dạng vật lý của bánh quy xoắn (ví dụ: dạng xoắn,
        dạng que, dạng miếng cắn), một yếu tố khác biệt quan trọng mà khách hàng sử
        dụng khi tìm kiếm hoặc lọc sản phẩm.'
    primary_component_material:
      name: Vật liệu cấu thành chính
      description: Vật liệu chính của khối động cơ.
    primary_dish_application:
      name: Ứng dụng món ăn chính
      description: Xác định món ăn chính hoặc cách chế biến mà bột được dùng cho.
    primary_plant_base:
      name: Cơ sở thực vật chính
      description: Cho biết thành phần chính không phải từ sữa được sử dụng để tạo
        ra sản phẩm thay thế phô mai.
    primary_plant_protein_source:
      name: Nguồn protein thực vật chính
      description: Xác định thành phần thực vật chính cung cấp protein trong sản phẩm.
    primary_sweetener_source:
      name: Nguồn chất làm ngọt chính
      description: Xác định loại cây hoặc nguyên liệu thô dùng để sản xuất siro.
    print_placement:
      name: Vị trí in ấn
      description: Chỉ định vị trí đặt hình ảnh/logo chính trên áo thun.
    print_technique:
      name: Kỹ thuật in
      description: Chỉ định phương pháp trang trí/in ấn được sử dụng trên hình ảnh
        áo thun.
    printable_canvas_intended_use:
      name: Vải in dùng cho mục đích sử dụng
      description: Ứng dụng chính mà khung vẽ in được tối ưu hóa cho.
    printable_fabric_format:
      name: Định dạng vải có thể in
      description: Chỉ định cách thức cung cấp giấy cotton in (tờ đơn hay cuộn liên
        tục), điều này ảnh hưởng đến việc cấp giấy cho máy in và quy trình làm việc
        của dự án.
    prism_material:
      name: Vật liệu lăng kính
      description: Chỉ định vật liệu của chính thấu kính (lăng kính), yếu tố ảnh hưởng
        đến độ trong suốt, độ bền và khả năng chống trầy xước.
    prisoner_transport_configuration:
      name: Cấu hình vận chuyển tù nhân
      description: Xác định xem xe có được cấu hình để vận chuyển người bị giam giữ/tù
        nhân hay không và cấu hình như thế nào.
    prisoner_transport_partition_type:
      name: Loại vách ngăn vận chuyển tù nhân
      description: Loại vách ngăn/lồng bên trong phân chia khoang trước và khoang
        sau.
    privacy_or_acoustic_feature:
      name: Tính năng riêng tư hoặc cách âm
      description: Chỉ định các yếu tố riêng tư hoặc cách âm được tích hợp sẵn như
        vách ngăn, màn chắn âm thanh hoặc vách bao kín hoàn toàn.
    processing_state:
      name: Trạng thái xử lý
      description: Cho dù lông vũ đã được khử trùng/rửa sạch hay được chuẩn bị theo
        cách khác để sử dụng trong thủ công mỹ nghệ.
    produce_grade:
      name: Sản phẩm đạt tiêu chuẩn
      description: Phân loại chất lượng quả kiwi dựa trên kích thước, hình thức và
        tình trạng của quả.
    produce_growth_stage:
      name: Giai đoạn phát triển sản phẩm
      description: 'Chỉ định giai đoạn sinh trưởng của sản phẩm khi bán (ví dụ: rau
        mầm, lá non, lá trưởng thành, cây sống, hạt giống).'
    produce_washing_state:
      name: Trạng thái rửa sản phẩm
      description: Cho biết rau đã được rửa sạch và sẵn sàng để ăn hay chưa.
    profile_shape:
      name: Hình dạng/hình dáng
      description: Độ cong/hình dạng tổng thể của chũm chọe (độ dốc từ mép đến phần
        chuông).
    projectile_ammunition_type:
      name: Loại đạn/súng phóng
      description: Chỉ định loại đạn hoặc vật phẩm tiêu hao được sử dụng bởi vũ khí
        đồ chơi, nếu có.
    projectile_finish:
      name: Lớp phủ đầu đạn
      description: 'Chỉ định bất kỳ lớp phủ bề mặt nào được áp dụng cho BB, giúp tăng
        khả năng chống ăn mòn hoặc độ hiển thị (ví dụ: phủ đồng, mạ kẽm, sơn).'
    projectile_type:
      name: Loại đạn
      description: Xác định loại đạn mà sản phẩm sử dụng hoặc được thiết kế cho.
    pronation_support:
      name: Hỗ trợ chống lật bàn chân
      description: Cho biết kiểu dáng đi hoặc kiểu lật bàn chân mà giày thể thao được
        thiết kế để phù hợp.
    propellant_type:
      name: Loại nhiên liệu đẩy
      description: Chỉ định loại nhiên liệu đẩy mà bộ phận hoặc phụ kiện đó được thiết
        kế để sử dụng.
    propeller_blade_cup:
      name: Cốc cánh quạt
      description: Chỉ số này cho biết độ cong (độ uốn ở mép sau) của cánh quạt.
    propeller_hub_type:
      name: Loại trục chân vịt
      description: Chỉ định hệ thống trục/bạc lót được sử dụng bởi cánh quạt (bộ trục
        thay thế được so với loại ép vào).
    propeller_rotation:
      name: Hướng quay của cánh quạt
      description: Xác định hướng quay của cánh quạt.
    protectant_formula_base:
      name: Công thức nền bảo vệ
      description: 'Xác định công thức cơ bản của chất bảo vệ, ảnh hưởng đến độ bóng,
        cảm giác và khả năng làm sạch (ví dụ: gốc nước so với gốc dung môi).'
    protection_coverage_area:
      name: Khu vực bảo vệ
      description: Xác định các bộ phận của đồng hồ mà phụ kiện bảo vệ này bao phủ.
    protection_level:
      name: Mức độ bảo vệ
      description: Thể hiện mức độ bảo vệ dự kiến của hộp đựng đối với việc vận chuyển
        và bảo quản nhạc cụ.
    protective_case_interior_protection_type:
      name: Loại bảo vệ bên trong hộp bảo vệ
      description: Mô tả phương pháp bảo vệ bên trong chính được sử dụng để giữ an
        toàn và giảm chấn cho các vật dụng bên trong.
    protective_case_shell_type:
      name: Loại vỏ bảo vệ
      description: Xác định kiểu cấu trúc tổng thể của vỏ ngoài (độ cứng) ảnh hưởng
        đến khả năng chống va đập và tính di động.
    protective_contact_padding_material:
      name: Vật liệu đệm tiếp xúc bảo vệ
      description: 'Vật liệu được sử dụng trên các điểm tiếp xúc của dụng cụ (phần
        chèn càng/chuông) để ngăn ngừa trầy xước (ví dụ: nỉ, cao su).'
    protective_cup_configuration:
      name: Cấu hình cốc bảo vệ
      description: Xác định xem sản phẩm có kèm theo miếng bảo vệ cốc nguyệt san,
        có thể tháo rời hay chỉ có túi để đựng miếng bảo vệ.
    protective_eyewear_standard_compliance:
      name: Tuân thủ tiêu chuẩn kính bảo hộ
      description: Ghi rõ các tiêu chuẩn hoặc chứng nhận về độ an toàn hoặc khả năng
        chống va đập mà kính mắt đáp ứng hoặc vượt qua để sử dụng trong thể thao.
    protective_gear_certification_standard:
      name: Tiêu chuẩn chứng nhận trang thiết bị bảo hộ
      description: 'Cho biết tiêu chuẩn an toàn/chứng nhận mà trang thiết bị tuân
        thủ (thay đổi tùy theo loại sản phẩm: tiêu chuẩn mũ bảo hiểm, tiêu chuẩn bộ
        đồ bảo hộ, tiêu chuẩn áo giáp chống va đập).'
    protective_gear_items_included:
      name: Các vật dụng bảo hộ được bao gồm
      description: Liệt kê các bộ phận riêng lẻ có trong một bộ đồ bảo hộ nhiều mảnh.
    protective_gear_padding_type:
      name: Loại đệm bảo hộ
      description: Chỉ định loại vật liệu đệm được sử dụng trong trang bị bảo hộ để
        chống va đập.
    protective_gear_safety_certifications:
      name: Chứng nhận an toàn về trang thiết bị bảo hộ
      description: Liệt kê các tiêu chuẩn an toàn hoặc hiệu suất dành riêng cho từng
        môn thể thao mà sản phẩm đáp ứng, chẳng hạn như tiêu chuẩn mũ bảo hiểm khúc
        côn cầu NOCSAE hoặc ASTM.
    protective_pad_components_included:
      name: Các bộ phận đệm bảo vệ được bao gồm
      description: Ghi rõ những vật dụng bảo hộ cụ thể nào được bao gồm trong bộ sản
        phẩm nhiều món để người mua sắm biết chính xác những bộ phận cơ thể nào được
        bảo vệ.
    protective_shorts_intended_use:
      name: Quần bảo hộ dùng cho mục đích sử dụng
      description: Loại hình đạp xe/đua xe chính mà quần bảo hộ này được thiết kế
        dành cho.
    protective_shorts_padding_type:
      name: Loại đệm của quần short bảo hộ
      description: Xác định cấu tạo/hình thức của các bộ phận bảo vệ được sử dụng
        trong quần short.
    protective_shorts_padding_zones:
      name: Vùng đệm của quần short bảo hộ
      description: Xác định những vùng cơ thể nào có lớp đệm/áo giáp tích hợp trong
        quần bảo hộ.
    protective_treatment:
      name: Điều trị bảo vệ
      description: 'Chỉ định bất kỳ lớp phủ hoặc phương pháp xử lý bảo vệ nào được
        áp dụng để chống bám bẩn, chống thấm nước hoặc chống tia cực tím (ví dụ: Teflon).'
    protector_coverage_area:
      name: Vùng bảo vệ của đồ bảo hộ
      description: 'Chỉ định khu vực nào trên thân người mà tấm bảo vệ được thiết
        kế để che chắn (ví dụ: ngực, lưng, hai bên).'
    puck_bottom_style:
      name: Kiểu đáy hình đĩa
      description: Mô tả hình dạng mặt dưới của quả puck, yếu tố ảnh hưởng đến tốc
        độ và khả năng điều khiển trên các bề mặt sân chơi shuffleboard khác nhau.
    puck_type:
      name: Loại puck
      description: Phân loại kiểu dáng chức năng hoặc mục đích sử dụng của quả bóng
        khúc côn cầu, từ dùng trong các trận đấu chính thức đến làm vật kỷ niệm sưu
        tầm.
    pull_buoy_style:
      name: Kiểu phao kéo
      description: Chỉ định kiểu dáng hoặc cấu hình chức năng của phao kéo, chẳng
        hạn như loại tiêu chuẩn, loại đeo mắt cá chân hoặc loại kết hợp kéo chân.
    pull_through_weight_material:
      name: Vật liệu trọng lượng kéo xuyên
      description: Đối với tăm bông kéo qua, phần này xác định chất liệu của vật nặng
        được sử dụng để dẫn tăm bông đi qua dụng cụ.
    pulp_content:
      name: Hàm lượng tép trái cây
      description: Cho biết lượng bột trái cây hoặc rau củ có trong đồ uống.
    pump_accessories_included:
      name: Phụ kiện máy bơm đi kèm
      description: Liệt kê các vật dụng bổ sung được cung cấp kèm theo bơm bóng để
        người mua sắm có thể hiểu rõ nội dung của gói sản phẩm.
    pumping_compatibility:
      name: Khả năng tương thích bơm
      description: Cho biết liệu áo ngực cho con bú có được thiết kế để hút sữa rảnh
        tay cũng như cho con bú hay không.
    punch_pad_type:
      name: Loại tấm đục lỗ
      description: Mô tả thiết kế hoặc kiểu dáng của tấm đệm tập đấm bốc/huấn luyện
        để người mua sắm có thể chọn được tấm đệm phù hợp với nhu cầu tập luyện của
        mình.
    punching_training_bag_shape:
      name: Hình dạng bao đấm/bao tập luyện
      description: 'Xác định kiểu dáng hình học của bao cát, giúp người mua sắm lựa
        chọn các mẫu phù hợp với các bài tập tấn công cụ thể (ví dụ: cú đấm móc, cú
        đấm vào thân).'
    puncture_protection_technology:
      name: Công nghệ chống thủng
      description: 'Liệt kê bất kỳ lớp chống thủng độc quyền hoặc chung nào hoặc các
        công nghệ gia cường thành lốp/vỏ lốp được tích hợp trong lốp xe (ví dụ: EXO,
        SnakeSkin, đai Kevlar).'
    puppet_features:
      name: Đặc điểm của con rối
      description: 'Nêu bật các tính năng chức năng hoặc hiệu suất của con rối (ví
        dụ: miệng có thể cử động, hiệu ứng âm thanh, có thể lật ngược).'
    puppet_puppet_theater_accessory_type:
      name: Loại phụ kiện cho rối và sân khấu rối
      description: 'Xác định loại phụ kiện của sản phẩm (ví dụ: đạo cụ sân khấu, trang
        phục rối, thanh điều khiển, dây thay thế).'
    purity_unit:
      name: Đơn vị độ tinh khiết
      description: Độ tinh khiết của đồng xu được thể hiện như thế nào (độ tinh khiết
        so với karat).
    push_up_bar_design:
      name: Thiết kế thanh chống đẩy
      description: 'Chỉ định kiểu thiết kế chức năng của thanh chống đẩy (ví dụ: cố
        định, xoay, thanh song song).'
    pushrod_end_type:
      name: Kiểu đầu cần đẩy
      description: Chỉ định kiểu dáng của đầu/bộ phận gắn cần đẩy được sử dụng tại
        giao diện bàn đạp hoặc xi lanh chính.
    putty_glow_activation_method:
      name: Phương pháp kích hoạt độ sáng của chất dẻo
      description: 'Cách thức chất dẻo được nạp năng lượng/kích hoạt để phát sáng
        (ví dụ: ánh sáng mặt trời, tia cực tím/đèn đen).'
    putty_glow_color:
      name: Màu phát sáng của bột trét
      description: Xác định màu sắc mà chất dẻo phát ra khi phát sáng trong bóng tối.
    putty_inclusions:
      name: Các tạp chất trong chất trám
      description: 'Đáng chú ý là có thêm các thành phần trộn lẫn bên trong bột nhào
        (ví dụ: kim tuyến, giấy vụn, hạt xốp).'
    putty_texture:
      name: Kết cấu bột trét
      description: 'Đặc tính thao tác cơ bản của chất dẻo (ví dụ: đàn hồi, co giãn,
        giống chất lỏng).'
    puzzle_accessory_features:
      name: Tính năng của phụ kiện chơi xếp hình
      description: Các tính năng chức năng và yếu tố thiết kế của phụ kiện trò chơi
        xếp hình (tùy thuộc vào loại phụ kiện).
    pyrometric_cone_range:
      name: Phạm vi nón đo nhiệt độ
      description: 'Nhiệt độ nung được khuyến nghị cho men gốm (ví dụ: Cone 06–04,
        Cone 5–6).'
    quarter_panel_coverage_type:
      name: Loại che phủ tấm chắn bên hông
      description: Xác định diện tích phần thân xe phía sau mà sản phẩm thay thế/sửa
        chữa.
    quarter_panel_set_contents:
      name: Nội dung bộ tấm ốp hông
      description: Chỉ định cấu hình bó tấm ốp góc xe được bao gồm trong danh sách
        (một bên, một cặp, hoặc kèm theo các phần sửa chữa bổ sung).
    quilting_ruler_markings:
      name: Vạch chia thước may chần
      description: Chỉ định các loại vạch in trên thước may chần dùng để cắt/căn chỉnh.
    quilting_ruler_non_slip_feature:
      name: Thước may chần bông có tính năng chống trượt
      description: Cho biết thước có lớp lót/bề mặt chống trơn trượt để giảm sự dịch
        chuyển trên vải hay không.
    quilting_ruler_transparency:
      name: Thước may chần trong suốt
      description: Cho biết độ trong suốt/khả năng nhìn thấy của chất liệu thước kẻ,
        giúp quan sát được vải và các ký hiệu bên dưới.
    quilting_thread_usage:
      name: Cách sử dụng chỉ may chần
      description: Chỉ rõ mục đích sử dụng của loại chỉ trong kỹ thuật chần bông.
    quilting_thread_weight_system:
      name: Hệ thống trọng lượng chỉ may chần
      description: 'Chỉ định hệ thống xếp hạng kích thước/trọng lượng ren được sử
        dụng để biểu thị độ dày của ren (ví dụ: wt, Tex, Denier), để kích thước số
        có thể được hiểu chính xác.'
    quince_variety:
      name: Giống mộc qua
      description: Xác định giống hoặc chủng loại mộc qua cụ thể, vì hương vị, mùi
        thơm và độ phù hợp trong chế biến món ăn có thể khác nhau tùy theo giống.
    quinoa_variety:
      name: Giống quinoa
      description: Giúp nhận biết màu sắc hoặc giống quinoa cụ thể, vì các giống khác
        nhau có hương vị, kết cấu và thời gian nấu khác nhau.
    quinto_tuning_system:
      name: Hệ thống chỉnh âm của trống Quinto
      description: Cách chỉnh dây/căng dây đàn quinto.
    race_car_class:
      name: Hạng xe đua
      description: Hạng mục/phân loại cạnh tranh mà xe được chế tạo để tham gia (bộ
        quy tắc/nhóm tiêu chuẩn phê duyệt).
    racing_balaclava_face_opening_style:
      name: Mũ trùm đầu kiểu đua xe có lỗ hở mặt
      description: Cấu hình phần mở phía trước của mũ trùm đầu ảnh hưởng đến độ vừa
        vặn, khả năng bịt kín và sự thoải mái khi đội mũ bảo hiểm.
    racing_balaclava_neck_coverage_length:
      name: Chiều dài che cổ của mũ trùm đầu đua xe
      description: Chiều dài của phần váy/khăn choàng cổ được thiết kế để nhét vào
        bên trong bộ đồ/dây đai cổ nhằm bịt kín và bảo vệ.
    racing_balaclava_ventilation_zones:
      name: Các khu vực thông gió của mũ trùm đầu đua xe
      description: Bố trí các vùng thoáng khí/lưới hoặc có lỗ thông hơi để cải thiện
        luồng không khí bên dưới mũ bảo hiểm.
    racing_chest_guard_intended_use:
      name: Mục đích sử dụng của tấm bảo vệ ngực dành cho đua xe
      description: Tấm bảo vệ ngực này được thiết kế cho bộ môn hoặc bối cảnh thể
        thao đua xe chính nào.
    racing_chest_guard_size_type:
      name: kích thước và loại bảo vệ ngực khi đua xe
      description: Cho biết sản phẩm được thiết kế cho trẻ em, người lớn hay là loại
        có thể điều chỉnh kích thước/phù hợp với mọi lứa tuổi.
    racing_glove_certification_standard:
      name: Tiêu chuẩn chứng nhận của găng tay đua xe
      description: 'Chỉ định chứng nhận/tiêu chuẩn an toàn mà găng tay đua xe tuân
        thủ (ví dụ: FIA, SFI, CE) và tùy chọn xếp hạng/cấp độ nếu có.'
    racing_goggles_lens_system:
      name: Hệ thống thấu kính kính bảo hộ đua xe
      description: Chỉ định hệ thống sẵn sàng thay thế/tháo rời thấu kính được kính
        bảo hộ hỗ trợ.
    racing_helmet_certification_standard:
      name: Tiêu chuẩn chứng nhận của mũ bảo hiểm đua xe
      description: Mũ bảo hiểm đua xe đáp ứng các chứng nhận an toàn nào.
    racing_kart_brake_type:
      name: Loại phanh xe đua kart
      description: Loại hệ thống phanh chính được trang bị cho xe kart.
    racing_kart_class:
      name: Hạng xe đua kart
      description: Xe kart này tuân thủ hạng mục thi đấu hoặc bộ quy tắc nào.
    racing_kart_frame_material:
      name: Vật liệu khung xe đua kart
      description: Vật liệu khung/khung gầm chính cho xe kart.
    racing_kart_seat_size:
      name: Kích thước ghế xe đua kart
      description: Kích thước yên xe kart được sử dụng để xác định sự phù hợp.
    racing_neck_support_style:
      name: Kiểu hỗ trợ cổ đua xe
      description: Kiểu dáng cấu trúc của đai/đỡ cổ dành cho đua xe và cách nó tương
        tác với thân/mũ bảo hiểm của người lái.
    racing_suit_certification_standard:
      name: Tiêu chuẩn chứng nhận của bộ đồ đua xe
      description: 'Ghi rõ chứng nhận/tiêu chuẩn an toàn đua xe mà bộ đồ đáp ứng (ví
        dụ: tiêu chuẩn FIA hoặc SFI).'
    racing_suit_cuff_design:
      name: Thiết kế cổ tay áo bộ đồ đua
      description: Loại đai cổ chân/cổ tay được sử dụng để kết nối với găng tay/giày
        bốt và cải thiện khả năng bịt kín/sự thoải mái.
    racing_suit_size_system:
      name: Hệ thống kích cỡ bộ đồ đua
      description: 'Hệ thống kích cỡ được sử dụng cho bộ đồ (ví dụ: Alpha S-XXL, Numeric
        EU/US, Youth).'
    racing_truck_discipline:
      name: bộ môn xe tải đua
      description: Xác định bộ môn/thể thức đua chính mà chiếc xe tải được chế tạo
        để tham gia.
    rack_side_configuration:
      name: Cấu hình mặt bên của giá đỡ
      description: Cho biết giá để thảm nằm ở một bên hay cả hai bên, ảnh hưởng đến
        hiệu quả sử dụng không gian và khả năng tiếp cận.
    rack_system_configuration:
      name: Cấu hình hệ thống giá đỡ
      description: Mô tả bố cục/hình dạng tổng thể của hệ thống giá để trống.
    racket_dampener_type:
      name: Loại giảm chấn vợt
      description: Xác định cơ chế lắp đặt hoặc kiểu chức năng của bộ giảm chấn rung
        vợt.
    racket_grip_size:
      name: Kích thước cán vợt
      description: 'Chỉ định phân loại kích thước dựa trên chu vi của cán vợt (ví
        dụ: G1–G6) để đảm bảo sự vừa vặn và thoải mái cho bàn tay.'
    racket_sport_shoe_court_surface:
      name: Giày thể thao vợt, bề mặt sân
      description: Thông số này chỉ rõ bề mặt sân tennis mà giày được thiết kế hoặc
        tối ưu hóa, giúp người chơi lựa chọn giày có kiểu đế ngoài và hợp chất cao
        su phù hợp với bề mặt sân chơi thường xuyên của họ.
    racket_string_pattern:
      name: Kiểu đan dây vợt
      description: 'Chỉ định số lượng dây dọc và dây ngang trong mặt vợt (ví dụ: 16
        x 18), ảnh hưởng đến khả năng kiểm soát, độ xoáy và độ bền.'
    racket_stringing_status:
      name: Tình trạng căng dây vợt
      description: Cho biết vợt được bán đã căng dây, chưa căng dây hoặc đã căng dây
        sẵn.
    racket_weight_class:
      name: Hạng cân vợt
      description: Cung cấp các hạng cân “U” tiêu chuẩn trong cầu lông, cho phép người
        chơi lựa chọn vợt trong phạm vi khối lượng ưa thích của mình.
    racquet_toy_set_equipment_included:
      name: Bộ đồ chơi vợt bao gồm các dụng cụ cần thiết.
      description: 'Liệt kê các mặt hàng có trong đồ chơi hoặc bộ đồ chơi (ví dụ:
        lưới, bóng, vợt).'
    racquetball_squash_training_aid_type:
      name: Loại dụng cụ hỗ trợ tập luyện bóng quần
      description: Phân loại các loại dụng cụ hoặc phụ kiện hỗ trợ đào tạo cụ thể
        để người mua sắm có thể nhanh chóng tìm thấy mặt hàng họ cần.
    radiator_cap_gasket_material:
      name: Vật liệu gioăng nắp két nước
      description: Vật liệu của gioăng làm kín được sử dụng trên nắp két nước.
    radiator_cap_pressure_relief_style:
      name: Nắp két nước kiểu giảm áp
      description: Chỉ định kiểu van xả áp/thông hơi/kích hoạt của nắp két nước, điều
        này có thể ảnh hưởng đến việc sử dụng, an toàn và mục đích sử dụng.
    radiator_expansion_tank_cap_application:
      name: Ứng dụng nắp bình tản nhiệt/bình giãn nở
      description: Xác định xem nắp đó dành cho cổ đổ nước làm mát của bộ tản nhiệt
        hay cho bình giãn nở/bình tràn nước làm mát.
    radiator_fan_control_type:
      name: Loại điều khiển quạt tản nhiệt
      description: Xác định cách quạt tản nhiệt được điều khiển/kích hoạt.
    radiator_fan_mounting_pattern:
      name: Mẫu lắp đặt quạt tản nhiệt
      description: Chỉ định kiểu/mẫu lắp đặt được sử dụng để gắn quạt hoặc cụm quạt.
    radiator_fan_type:
      name: Loại quạt tản nhiệt
      description: Xác định loại/cấu hình chức năng của cụm quạt tản nhiệt.
    radiator_hose_end_type:
      name: Đầu ốngĐầu ống tản nhiệt kiểu
      description: Chỉ định kiểu kết nối/làm kín chính được sử dụng ở đầu ống dẫn
        nước làm mát để tiếp xúc với các cổng của bộ tản nhiệt/động cơ.
    radiator_hose_position:
      name: Vị trí ống dẫn nước làm mát
      description: Vị trí/loại ống dẫn nước làm mát trong hệ thống làm mát.
    radiator_hose_shape:
      name: Hình dạng ống dẫn nước làm mát
      description: Tổng thể hình dạng/kiểu dáng ống mềm được sử dụng để định tuyến
        và lắp đặt.
    radiator_overflow_tank_level_sensor_provision:
      name: Cung cấp cảm biến mức nước trong bình chứa nước làm mát
      description: Cho biết bình chứa có bao gồm hoặc hỗ trợ cảm biến mức chất làm
        mát hay không.
    radiator_overflow_tank_shape:
      name: Hình dáng bình nước tràn của bộ tản nhiệt
      description: Hình dạng tổng thể của thân bình chứa tràn.
    radish_variety:
      name: Giống củ cải
      description: 'Chỉ định giống hoặc loại củ cải để người mua sắm có thể chọn các
        đặc điểm cụ thể về hương vị, màu sắc hoặc kích thước (ví dụ: Daikon, Watermelon,
        French Breakfast).'
    radius_of_hollow:
      name: Bán kính của lỗ rỗng
      description: Chỉ định hình dạng rỗng của lưỡi dao được tạo ra bởi máy mài, được
        biểu thị bằng các kích thước rời rạc thông thường hoặc dạng phẳng.
    rail_coverage_configuration:
      name: Cấu hình vùng phủ sóng đường ray
      description: Cho biết bộ phận nào của cũi được bộ ga phủ bảo vệ, làm rõ liệu
        bạn mua một tấm ga phủ phía trước riêng lẻ hay một bộ ga phủ nhiều mảnh xung
        quanh.
    rail_mount_standard:
      name: Tiêu chuẩn gắn ray
      description: 'Xác định tiêu chuẩn thanh ray hoặc giao diện gắn kết được sử dụng
        để gắn phụ kiện (ví dụ: ống ngắm, đèn pin) vào súng BB.'
    rail_side:
      name: Phía đường ray
      description: Cho biết thanh ray thay thế là dành cho bên trái, bên phải, hay
        được bán theo cặp.
    rail_style:
      name: Kiểu đường ray
      description: 'Phân loại thiết kế tổng thể hoặc cấu hình của đường ray (ví dụ:
        hình chữ A, hình cầu vồng, hình gấp khúc), từ đó xác định các khả năng thực
        hiện động tác và không gian cần thiết.'
    rail_system:
      name: Hệ thống đường sắt
      description: 'Xác định giao diện gắn phụ kiện hiện có trên súng (ví dụ: Picatinny,
        M-LOK).'
    rain_sensor_technology:
      name: Công nghệ cảm biến mưa
      description: Nguyên lý cảm biến được sử dụng để phát hiện nước trên kính chắn
        gió.
    rain_suit_configuration:
      name: Cấu hình bộ đồ đi mưa
      description: Xác định xem sản phẩm là bộ quần áo liền thân, bộ nhiều mảnh hay
        cấu hình khác.
    rainstick_construction_type:
      name: Kiểu cấu trúc nhạc cụ tạo tiếng mưa (rainstick)
      description: Mô tả cách chế tạo nhạc cụ tạo tiếng mưa (truyền thống bằng ống
        xương rồng/gỗ so với các lựa chọn hiện đại).
    rainstick_fill_material:
      name: Vật liệu nhồi cho ống tạo tiếng mưa (rainstick)
      description: 'Chỉ định vật liệu lấp đầy bên trong được sử dụng để tạo ra âm
        thanh thác đổ (ví dụ: hạt, chuỗi hạt).'
    rainstick_playing_technique:
      name: Kỹ thuật chơi nhạc cụ tạo tiếng mưa (rainstick)
      description: Chỉ ra kỹ thuật chơi hoặc phong cách xử lý được khuyến nghị để
        tạo ra hiệu ứng mong muốn trên nhạc cụ tạo tiếng mưa.
    rainstick_sound_character:
      name: Đặc điểm âm thanh của nhạc cụ tạo tiếng mưa (rainstick)
      description: Mô tả đặc điểm âm thanh tổng thể được tạo ra bởi nhạc cụ tạo tiếng
        mưa.
    raising_method:
      name: Phương pháp nuôi trồng
      description: 'Mô tả cách động vật được nuôi dưỡng và vỗ béo trước khi chế biến
        (ví dụ: ăn cỏ, chăn thả trên đồng cỏ, vỗ béo bằng ngũ cốc).'
    rally_competition_class:
      name: Hạng mục thi đấu xe đua
      description: Hạng mục thi đấu theo quy định hoặc bộ luật mà xe đua được chế
        tạo (nếu biết).
    rally_surface_setup:
      name: Thiết lập bề mặt đường đua
      description: Bề mặt/địa hình chính mà xe đua rally nhắm đến khi thiết lập hoặc
        chế tạo.
    ramp_surface_texture:
      name: Kết cấu bề mặt của đường dốc
      description: Mô tả độ hoàn thiện hoặc độ bám của bề mặt đường trượt.
    ratchet_mounting_style:
      name: Kiểu lắp đặt sử dụng cơ chế bánh cóc
      description: Cách thức giữ hoặc lắp đặt bộ phận bánh răng nhạc trong quá trình
        chơi hoặc thiết lập.
    rattle_element_material:
      name: Vật liệu tạo tiếng kêu lạch cạch
      description: 'Chất liệu của các bộ phận tạo tiếng kêu (ví dụ: răng/chuông/hạt)
        tạo nên âm thanh đặc trưng.'
    rattle_type:
      name: Loại lục lạc
      description: Cho biết mồi câu có chứa lục lạc bên trong hoặc buồng tạo âm thanh
        hay không, và nếu có, thì kiểu lục lạc được sử dụng là loại nào.
    rc_airship_lifting_gas_type:
      name: Khinh khí cầu RC loại khí nâng
      description: Cho biết loại khí dự định dùng để bơm vào vỏ khinh khí cầu (nếu
        có).
    rc_helicopter_control_frequency:
      name: Tần số điều khiển máy bay trực thăng RC
      description: 'Dải tần số vô tuyến được sử dụng giữa bộ điều khiển và máy bay
        trực thăng, ảnh hưởng đến khả năng chống nhiễu và tính tương thích (ví dụ:
        2,4 GHz).'
    rc_helicopter_stabilization_features:
      name: Tính năng ổn định của máy bay trực thăng RC
      description: Liệt kê các tính năng hỗ trợ ổn định/kiểm soát giúp việc bay dễ
        dàng hơn hoặc tăng thêm khả năng.
    rc_motorcycle_controller_type:
      name: Loại bộ điều khiển xe máy điều khiển từ xa
      description: Hình dạng của bộ điều khiển đi kèm.
    rc_plane_takeoff_launch_method:
      name: Phương pháp cất cánh/phóng máy bay RC
      description: Cách thức máy bay thường được phóng/cất cánh sẽ ảnh hưởng đến nơi
        và cách thức nó có thể được sử dụng.
    rc_vehicle_controller_type:
      name: Loại bộ điều khiển xe RC
      description: Chỉ định kiểu dáng bộ điều khiển được sử dụng để vận hành xe điều
        khiển từ xa.
    rc_vehicle_scale:
      name: Tỷ lệ của xe điều khiển từ xa
      description: 'Chỉ định tỷ lệ thu nhỏ (kích thước) của xe ô tô/xe tải điều khiển
        từ xa (ví dụ: 1:10, 1:16).'
    rc_vehicle_terrain_type:
      name: Loại địa hình xe RC
      description: Cho biết loại địa hình chính mà xe điều khiển từ xa (ô tô/xe tải)
        được thiết kế để hoạt động.
    reach_adjustment_type:
      name: Loại điều chỉnh tầm với
      description: Cho biết khoảng cách giữa lưỡi gạt và tay lái có thể điều chỉnh
        được hay không, và nếu có thể điều chỉnh, thì việc điều chỉnh đó có cần dụng
        cụ hay không.
    rear_axle_spacing:
      name: Khoảng cách trục sau
      description: Kích thước càng sau/trục bánh xe mà khung sau được thiết kế để
        chấp nhận, ảnh hưởng đến khả năng tương thích của bánh xe.
    rear_axle_standard:
      name: Trục sau tiêu chuẩn
      description: 'Xác định giao diện/định dạng trục được sử dụng bởi bánh sau (ví
        dụ: tháo lắp nhanh, các kích thước trục xuyên khác nhau).'
    rear_axle_type:
      name: Loại trục sau
      description: Chỉ định hệ thống buộc và đường kính trục được sử dụng để cố định
        bánh sau vào khung xe.
    rear_coverage:
      name: Độ che phủ phía sau
      description: 'Xác định mức độ che phủ của phần mông mà quần bikini che phủ (ví
        dụ: kiểu hở mông, kiểu che phủ toàn bộ).'
    rear_opening_type:
      name: Loại mở phía sau
      description: Mô tả kiểu thiết kế cửa sau hoặc "cửa lật" để thuận tiện cho việc
        sử dụng nhà vệ sinh, chẳng hạn như kiểu nắp gập hoặc khóa kéo toàn bộ phía
        sau.
    rear_seat_configuration:
      name: Cấu hình ghế sau
      description: Chỉ định cấu hình của cụm ghế sau để hỗ trợ việc lắp đặt và lựa
        chọn bố trí nội thất.
    rear_view_mirror_ornament_attachment_type:
      name: Kiểu gắn phụ kiện gương chiếu hậu
      description: 'Chỉ định cách gắn phụ kiện trang trí vào thân hoặc vỏ gương chiếu
        hậu (ví dụ: vòng dây, kẹp, móc).'
    rearview_mirror_mount_attachment_type:
      name: Loại khớp gắn chân gương chiếu hậu
      description: Xác định cách thức gắn giá đỡ vào cụm gương chiếu hậu (thân hoặc
        trục gương), chẳng hạn như kẹp, khóa cài, dây đeo, miếng dán hoặc giá đỡ bắt
        vít.
    rebound_board_face_type:
      name: Loại mặt bảng bật nảy
      description: Mô tả cấu hình bề mặt quyết định hành vi bật nảy, chẳng hạn như
        bề mặt phẳng, góc cạnh hoặc nhiều mặt.
    rebound_level:
      name: Mức độ bật lại
      description: Thông số này cho biết mức độ bóng bật trở lại sau khi va chạm,
        giúp người dùng lựa chọn giữa thiết kế không bật trở lại và thiết kế bật trở
        lại vừa phải.
    rebound_surface_configuration:
      name: Cấu hình bề mặt bật lại
      description: Xác định bố cục của các bề mặt bật nảy và khả năng dự đoán của
        các cú bật nảy (một mặt, hai mặt hoặc nhiều mặt; có thể dự đoán được hay không
        thể dự đoán được).
    rebounder_design:
      name: Thiết kế tấm bật nhảy
      description: Xác định kiểu cấu trúc hoặc cấu hình bề mặt đàn hồi của sản phẩm.
    rebounder_design_type:
      name: Kiểu thiết kế tấm bật nhảy
      description: 'Xác định cơ chế bật nảy chính hoặc kiểu cấu tạo của thiết bị huấn
        luyện (ví dụ: đế dây đàn hồi, lưới có khung, mục tiêu bật lên).'
    rebounder_sides:
      name: Mặt bật lại
      description: Cho biết người bắt bóng có thể trả bóng từ một phía hay cả hai
        phía.
    rebounding_mechanism_type:
      name: Loại cơ chế bật nảy
      description: 'Chỉ định công nghệ được sử dụng để trả lại quả bóng hoặc puck
        (ví dụ: tấm chắn cao su, dây chun).'
    recipient_relationship:
      name: Mối quan hệ người nhận
      description: 'Mối quan hệ dự định với người nhận (ví dụ: Mẹ, Bố, Bạn bè) của
        tấm thiệp chúc mừng.'
    recliner_control_type:
      name: Loại điều khiển ghế ngả
      description: 'Chỉ định cách vận hành cơ chế ngả lưng (ví dụ: cần gạt tay, bảng
        điều khiển nút điện, điều khiển từ xa).'
    recliner_motion_type:
      name: Loại chuyển động ghế ngả
      description: 'Xác định khả năng chuyển động chính của ghế tựa (ví dụ: bập bênh,
        trượt, xoay, sát tường, nâng hạ).'
    reclining_mechanism:
      name: Cơ chế ngả lưng
      description: Mô tả cơ chế được sử dụng để vận hành chức năng ngả lưng của ghế
        sofa.
    recommended_candle_format:
      name: Định dạng nến được đề xuất
      description: Cho biết loại nến được khuyến nghị sử dụng cho các miếng dán bấc
        tự dính này.
    recommended_container_type:
      name: Loại thùng chứa được đề xuất
      description: Các loại vật liệu làm thùng chứa được khuyến nghị/an toàn cho nến
        sáp gel.
    recommended_fabric_type:
      name: Loại vải khuyến nghị
      description: Loại vải được khuyến nghị để có kết quả tốt nhất khi may theo mẫu
        này.
    recommended_fabric_weight:
      name: Trọng lượng vải được khuyến nghị
      description: Cho biết loại trọng lượng vải được khuyến nghị cho mẫu thiết kế.
    recommended_food_pairing:
      name: Gợi ý kết hợp món ăn
      description: 'Xác định các loại protein chính hoặc món ăn chính mà nước sốt
        này được dùng kèm (ví dụ: gà, thịt lợn, thịt bò, cá, rau củ).'
    recommended_lane_condition:
      name: Điều kiện làn đường được khuyến nghị
      description: Chỉ định loại dầu trên đường băng hoặc điều kiện đường băng mà
        quả bóng được thiết kế cho.
    recommended_motor_impulse_class:
      name: Loại xung động cơ được khuyến nghị
      description: Chỉ định loại xung lực tổng thể được khuyến nghị cho động cơ tên
        lửa mô hình để đảm bảo chuyến bay an toàn/tối ưu.
    recommended_reading_level:
      name: Trình độ đọc khuyến nghị
      description: Cho biết trình độ/khả năng đọc được khuyến nghị cho sản phẩm, giúp
        người mua sắm lựa chọn sản phẩm phù hợp với sự phát triển khả năng đọc hiện
        tại của trẻ.
    recommended_sleep_position:
      name: Tư thế ngủ được khuyến nghị
      description: 'Xác định tư thế ngủ nào của nệm được thiết kế để hỗ trợ thoải
        mái (ví dụ: người ngủ nghiêng hoặc ngủ ngửa).'
    recommended_storage:
      name: Lưu trữ được khuyến nghị
      description: Hướng dẫn cách bảo quản sản phẩm để giữ được độ tươi ngon.
    recommended_surfaces:
      name: Các bề mặt khuyến nghị sử dụng
      description: 'Chỉ định các bề mặt/loại vật liệu dự định sử dụng keo, ngoài khả
        năng tương thích chung trong chế tác (ví dụ: chỉ dùng cho giấy so với nhiều
        bề mặt).'
    recommended_use_case:
      name: Trường hợp sử dụng khuyến nghị
      description: Mục đích sử dụng chính của chất trám kín này (sửa chữa tạm thời/khẩn
        cấp so với sửa chữa lâu dài).
    recommended_use_location:
      name: Vị trí sử dụng được đề xuất
      description: Môi trường sử dụng dự kiến cho bập bênh (sân sau nhà so với sân
        chơi thương mại, v.v.).
    recommended_vehicle_surfaces:
      name: Các bề mặt xe được khuyến nghị
      description: 'Chỉ định các bề mặt/lớp hoàn thiện của xe mà bàn chải được thiết
        kế để an toàn khi sử dụng (ví dụ: sơn phủ trong suốt, sơn mờ/bóng, màng bọc
        vinyl/PPF, kính, bánh xe).'
    recorder_accessories_included:
      name: Phụ kiện đi kèm của sáo recorder
      description: Liệt kê các phụ kiện đi kèm trong hộp đựng cây sáo trầm tuyệt vời
        này.
    recorder_bore_design:
      name: Thiết kế lỗ khoan máy ghi âm
      description: Thiết kế hình dạng lỗ khoan bên trong của thân máy ghi âm.
    recorder_bore_type:
      name: Loại lỗ ghi
      description: Chỉ định kiểu lỗ khoan của máy ghi âm.
    recorder_case_shell_type:
      name: Loại vỏ máy ghi âm
      description: Mô tả độ cứng vững về mặt cấu trúc của vỏ hộp.
    recorder_finish:
      name: Máy ghi âm kết thúc
      description: Hoàn thiện/xử lý bề mặt thân sáo (đặc biệt quan trọng đối với sáo
        alto bằng gỗ).
    recorder_hole_type:
      name: Loại lỗ ghi
      description: Cho dù lỗ thoát âm là loại đơn (không có lỗ đôi) hay loại có lỗ
        đôi để cải thiện cách bấm ngón trên các nốt nhạc bán cung.
    recorder_joint_configuration:
      name: Cấu hình khớp ghi
      description: Mô tả số lượng các bộ phận thân máy của máy ghi âm, điều này ảnh
        hưởng đến tính di động, việc vệ sinh và thay thế phụ tùng.
    recorder_joint_style:
      name: Kiểu khớp nối máy ghi âm
      description: Kiểu khớp nối giữa các phần của máy ghi âm, nếu có.
    recorder_keywork:
      name: Phím đàn ghi âm
      description: Cho biết liệu sáo recorder có bao gồm các phím (cơ chế kim loại/nhựa)
        để chơi các nốt trầm hay không, thường thấy trên các loại sáo recorder tenor/bass/lớn.
    recorder_mouthpiece_type:
      name: Loại ống ngậm sáo recorder
      description: Mô tả xem phần miệng/đầu của sáo recorder là liền khối (một mảnh)
        hay có thể tháo rời/thay thế được.
    recorder_pitch_standard_a4:
      name: Cao độ chuẩn của sáo recorder (A4)
      description: 'Chỉ số này cho biết tần số tham chiếu mà sáo được chế tạo (ví
        dụ: A=440 Hz theo tần số hiện đại so với A=415 Hz theo tần số thời Baroque).'
    recorder_thumb_hole_type:
      name: Loại lỗ ngón cái của sáo recorder
      description: Xác định xem máy ghi âm có thiết kế một lỗ ngón cái hay hai lỗ
        ngón cái.
    recreational_vehicle_holding_tank_type:
      name: Loại bể chứa cho xe giải trí
      description: Cho biết xe RV có những bể chứa chất thải nào.
    recreational_vehicle_leveling_system:
      name: Hệ thống cân bằng xe giải trí
      description: Loại hệ thống san lấp/ổn định được lắp đặt.
    recycled_material_content:
      name: Hàm lượng vật liệu tái chế
      description: Thể hiện tỷ lệ phần trăm của trang phục được làm từ sợi hoặc chỉ
        tái chế.
    reed_dent_material:
      name: Vật liệu răng lược
      description: Vật liệu của các răng lược (các bộ phận tách các sợi dọc) ảnh hưởng
        đến độ bền và khả năng chống mài mòn của sợi.
    reed_type:
      name: Loại lưỡi gà
      description: Chỉ định loại cấu tạo lưỡi gà được sử dụng cho ống thổi và các
        ống bè của kèn túi.
    reeds_included:
      name: Lưỡi gà được bao gồm
      description: Chỉ rõ những lưỡi gà nào được bao gồm trong bộ kèn túi Great Highland
        (lưỡi thổi và/hoặc lưỡi trầm) và liệu chúng được làm bằng tre hay vật liệu
        tổng hợp.
    reefing_method:
      name: Phương pháp cuốn buồm
      description: Cho biết cơ chế (nếu có) để thu gọn hoặc cất giữ buồm khi đang
        ở trên mặt nước.
    reel_profile:
      name: Kiểu dáng máy câu
      description: Phân loại kiểu dáng/hình dạng cấu trúc của thân máy câu baitcasting.
    reel_seat_material:
      name: Vật liệu đế cuộn dây
      description: Xác định vật liệu cấu tạo của đế cuộn dây, ảnh hưởng đến trọng
        lượng, độ nhạy và khả năng chống ăn mòn.
    reel_seat_type:
      name: Loại đế cuộn dây
      description: Chỉ định kiểu cơ chế khóa dùng để cố định máy câu vào cần câu.
    reel_size_class:
      name: Nhóm kích thước của máy câu cá
      description: 'Thông số kích thước do nhà sản xuất chỉ định (ví dụ: 1000, 3000,
        5000) cho biết dung lượng của ống cuộn và cấu tạo tổng thể của máy câu.'
    referee_wallet_accessories_included:
      name: Các phụ kiện đi kèm ví trọng tài
      description: Liệt kê các mặt hàng bổ sung được đóng gói kèm với ví trọng tài,
        chẳng hạn như thẻ đỏ/vàng, bảng điểm hoặc dụng cụ viết, để người mua biết
        liệu ví có được bán như một bộ dụng cụ hoàn chỉnh hay không.
    refinement_level:
      name: Mức độ tinh chế
      description: Chỉ số này cho biết mức độ tinh chế của dầu, ảnh hưởng đến mùi
        vị, màu sắc, giá trị dinh dưỡng và điểm bốc khói.
    reflective_finish:
      name: Bề mặt phản chiếu
      description: 'Chỉ định phương pháp xử lý bề mặt phản chiếu của quả cầu disco
        (ví dụ: gạch gương so với hiệu ứng ba chiều/ánh kim).'
    reflective_or_glow_effect:
      name: Hiệu ứng phản chiếu hoặc phát sáng
      description: Cho biết liệu quả cầu ăng-ten có các hiệu ứng về khả năng hiển
        thị như vật liệu phản quang, phát sáng trong bóng tối hoặc các yếu tố phát
        sáng/LED hay không.
    reflective_tape_pattern:
      name: Mẫu băng phản quang
      description: Mô tả cách bố trí băng phản quang trên quần áo nhằm đáp ứng yêu
        cầu về khả năng nhìn thấy.
    regulation_standard:
      name: Tiêu chuẩn quy định
      description: Chỉ định tiêu chuẩn chính thức hoặc kích thước/chứng nhận của cơ
        quan quản lý mà lưới đáp ứng.
    regulator_diaphragm_material:
      name: Vật liệu màng điều chỉnh
      description: 'Chỉ định vật liệu màng ngăn, yếu tố ảnh hưởng đến khả năng tương
        thích với nhiên liệu/ethanol (ví dụ: E85) và độ bền.'
    regulator_port_thread_standard:
      name: Tiêu chuẩn ren cổng điều chỉnh
      description: Chỉ định tiêu chuẩn ren/kết nối cổng được sử dụng trên thân bộ
        điều chỉnh cho các cổng đầu vào/đầu ra/cổng hồi.
    rein_features:
      name: Đặc điểm của dây cương
      description: Nêu bật các tính năng đặc biệt về chức năng hoặc an toàn có trên
        dây cương.
    rein_style:
      name: Kiểu dây cương
      description: Xác định thiết kế cấu trúc hoặc hình dạng của dây cương, cho phép
        người cưỡi ngựa lựa chọn loại phù hợp với bộ môn và sở thích cá nhân của họ.
    reinforced_areas:
      name: Khu vực được gia cố
      description: Xác định những phần nào của trang phục được gia cố để tăng độ bền
        chống mài mòn.
    reinforcement_type:
      name: Loại gia cố
      description: Vật liệu gia cường được sử dụng trong ống dẫn nước làm mát để tăng
        độ bền và khả năng chịu nhiệt/áp suất.
    release_activation_method:
      name: Phương pháp kích hoạt giải phóng
      description: Xác định cách người bắn cung kích hoạt thiết bị hỗ trợ thả dây
        cung.
    release_bearing_material:
      name: Vật liệu ổ trục giải phóng
      description: Vật liệu chính của các bộ phận ổ trục/mặt tiếp xúc (nếu nhà sản
        xuất quy định).
    release_jaw_style:
      name: Thả lỏng kiểu hàm
      description: Mô tả thiết kế của hàm hoặc móc đầu nhả.
    release_strap_type:
      name: Loại dây đeo tháo rời
      description: Xác định loại dây đeo hoặc hệ thống kết nối được cung cấp kèm theo
        dụng cụ hỗ trợ bắn cung.
    remote_control_airship_envelope_material:
      name: Vật liệu vỏ khí cầu điều khiển từ xa
      description: Chỉ định vật liệu chính của vỏ khinh khí cầu/tàu bay (túi khí),
        khác với vật liệu tổng thể của đồ chơi.
    remote_control_motorcycle_scale:
      name: Tỷ lệ của xe máy điều khiển từ xa
      description: Kích thước của xe máy điều khiển từ xa so với xe máy thật (nếu
        được mô phỏng theo tỷ lệ).
    remote_control_motorcycle_terrain_suitability:
      name: Khả năng thích ứng địa hình của xe máy điều khiển từ xa
      description: Địa hình chính mà xe máy điều khiển từ xa được thiết kế để hoạt
        động.
    remote_control_motorcycle_water_resistance:
      name: Xe máy điều khiển từ xa chống nước
      description: Mức độ chống nước cho hệ thống điện tử của xe mô tô RC.
    remote_control_plane_kit_completion_level:
      name: Mức độ hoàn thiện của bộ dụng cụ máy bay điều khiển từ xa
      description: 'Cho biết những gì được bao gồm và mức độ hoàn chỉnh của bộ sản
        phẩm (ví dụ: Sẵn sàng bay so với yêu cầu bộ phát/bộ thu/pin riêng).'
    remote_control_plane_landing_gear_type:
      name: Loại càng đáp máy bay điều khiển từ xa
      description: Chỉ định cấu hình càng đáp, ảnh hưởng đến độ bền và bề mặt cất
        cánh/hạ cánh.
    remote_control_plane_power_type:
      name: Loại nguồn điện mặt phẳng điều khiển từ xa
      description: Quy định này chỉ rõ cách máy bay được vận hành/đẩy (điện hay động
        cơ đốt trong/xăng/nitơ), điều này ảnh hưởng đến việc bảo trì, tiếng ồn và
        phạm vi hoạt động của máy bay.
    remote_control_watercraft_features:
      name: Đặc điểm của tàu thuyền điều khiển từ xa
      description: Bài viết nêu bật các tính năng quan trọng đặc trưng của mô tô nước
        điều khiển từ xa, ảnh hưởng đến khả năng sử dụng và độ bền.
    remote_control_watercraft_propulsion_drive_type:
      name: Loại động cơ/hệ thống đẩy cho tàu thuyền điều khiển từ xa
      description: Quy định cách thức điều khiển phương tiện thủy từ xa trên mặt nước.
    remote_control_watercraft_water_environment:
      name: Mô hình tàu thuyền điều khiển từ xa trong môi trường nước
      description: Chỉ định điều kiện mặt nước lý tưởng để tàu điều khiển từ xa hoạt
        động tốt nhất.
    remote_keyless_system_programming_method:
      name: Phương pháp lập trình hệ thống điều khiển từ xa không cần chìa khóa
      description: 'Cách lập trình hoặc ghép nối điều khiển từ xa/hệ thống với xe
        (ví dụ: quy trình trên xe so với công cụ chuyên nghiệp).'
    repair_compound_type:
      name: Loại hợp chất sửa chữa
      description: 'Loại/thành phần của vật liệu sửa chữa tiêu hao đi kèm (ví dụ:
        loại bột trét thân xe, loại nhựa dán kính chắn gió, loại keo/chất bịt kín
        lỗ vá lốp).'
    repair_kit_components:
      name: Các thành phần của bộ dụng cụ sửa chữa
      description: Liệt kê cụ thể các mặt hàng có trong bộ dụng cụ sửa chữa, giúp
        người mua sắm hiểu rõ nội dung và so sánh các gói sản phẩm.
    repair_method:
      name: Phương pháp sửa chữa
      description: Chỉ định phương pháp sửa chữa chính mà bộ dụng cụ sử dụng, chẳng
        hạn như miếng vá dán hoặc thay thế van.
    replacement_part_purpose:
      name: Mục đích của linh kiện thay thế
      description: Cho biết mặt hàng đó là phụ tùng thay thế chính hãng (OEM), phụ
        tùng nâng cấp/tăng hiệu năng hay phụ kiện bổ sung.
    replacement_part_type:
      name: Loại phụ tùng thay thế
      description: Xác định danh mục chức năng của bộ phận máy tập elip, cho phép
        người mua sắm lọc tìm kiếm linh kiện họ cần.
    replacement_parts_availability:
      name: Khả năng cung cấp phụ tùng thay thế
      description: 'Cho biết liệu máy xỏ chỉ có hỗ trợ các bộ phận tiêu hao/thay thế
        (ví dụ: móc/dây thay thế) hay không.'
    replica_gun_action_type:
      name: Loại súng mô phỏng
      description: Chỉ định loại hoạt động/cơ chế của súng mô phỏng (như được thể
        hiện), chẳng hạn như kiểu lên đạn bằng chốt hoặc kiểu lên đạn bằng cần gạt.
    replica_gun_firing_mechanism:
      name: Cơ chế bắn súng mô phỏng
      description: Cho biết liệu và bằng cách nào mô phỏng việc bắn/hoạt động (không
        gây chết người), chẳng hạn như bắn bằng kíp nổ hoặc không bắn.
    replica_gun_moving_parts:
      name: Các bộ phận chuyển động của súng mô phỏng
      description: Chỉ ra những bộ phận nào có chức năng/có thể di chuyển trên mô
        hình.
    reservoir_orientation:
      name: Hướng của hồ chứa
      description: Chỉ định hướng hoặc hình dạng dự định của túi nước bên trong ba
        lô.
    reservoir_type:
      name: Loại hồ chứa
      description: Loại cấu hình bình chứa cho xi lanh chính ly hợp.
    resin_suitability:
      name: Độ phù hợp của nhựa
      description: Xác định xem quả bóng ném có được thiết kế để sử dụng với nhựa
        (keo) hay không.
    resistance_adjustability:
      name: Khả năng điều chỉnh điện trở
      description: Xác định xem người dùng có thể thay đổi lực cản khi thở hay không.
    resistance_band_design:
      name: Thiết kế dây kháng lực
      description: 'Mô tả hình dạng hoặc kiểu dáng vật lý của dây kháng lực (ví dụ:
        dạng vòng, dạng ống có tay cầm, dạng hình số 8), giúp người mua sắm lựa chọn
        thiết kế phù hợp với bài tập của họ.'
    resistance_loading_type:
      name: Loại tải điện trở
      description: 'Cho biết cách thức cung cấp hoặc tải lực cản/trọng lượng lên máy
        Smith (ví dụ: tải bằng đĩa hoặc hệ thống tạ có thể điều chỉnh).'
    response_fields_included:
      name: Các trường phản hồi bao gồm
      description: 'Chỉ định các trường/tùy chọn phản hồi tiêu chuẩn nào có trên phiếu
        phản hồi (ví dụ: chấp nhận/từ chối, lựa chọn bữa ăn).'
    restoration_status:
      name: Trạng thái khôi phục
      description: Cho biết xe van ở trạng thái nguyên bản, đã được phục chế, độ lại
        (restomod) hay đang trong quá trình sửa chữa.
    rhinestone_base_color_family:
      name: Bảng màu nền đá quý
      description: 'Xác định nhóm màu của chất liệu nền đá giả kim cương (ví dụ: trong
        suốt/pha lê, vàng/vàng kim, xanh dương).'
    rhinestone_facet_style:
      name: Kiểu đính đá
      description: 'Kiểu bề mặt/mặt cắt của viên đá giả kim cương ảnh hưởng đến độ
        lấp lánh và vẻ ngoài (ví dụ: đá Xilion rose, kiểu cắt brilliant, có nhiều
        mặt cắt so với bề mặt nhẵn).'
    rhinestone_hole_reinforcement_material:
      name: Vật liệu gia cố lỗ đính đá
      description: 'Chất liệu xung quanh/tại các lỗ (ví dụ: khoen kim loại, nhựa đúc)
        ảnh hưởng đến độ bền trong quá trình may.'
    rhinestone_setting_type:
      name: Kiểu gắn đá giả kim cương
      description: 'Cách gắn/cắt cạnh viên đá để may (ví dụ: kiểu gắn chấu, kiểu gắn
        viền, kiểu gắn khung).'
    rhubarb_product_cut_type:
      name: Sản phẩm đại hoàng cắt sẵn
      description: Mô tả cách chuẩn bị hoặc cắt sản phẩm từ cây đại hoàng.
    ribbon_construction:
      name: Cấu trúc ruy băng
      description: 'Mô tả các đặc điểm cấu tạo chính của ruy băng grosgrain, chẳng
        hạn như có dây thép hoặc độ đàn hồi, điều này làm thay đổi cách sử dụng của
        nó (ví dụ: để làm nơ so với để may).'
    ribbon_packaging_type:
      name: Loại bao bì ruy băng
      description: Cho biết cách thức ruy băng được cung cấp/bán.
    ribbon_pattern_style:
      name: Kiểu họa tiết ruy băng
      description: Phân loại phương pháp ứng dụng họa tiết thường được sử dụng trên
        ruy băng grosgrain.
    ribbon_sheen_level:
      name: Độ bóng của ruy băng
      description: Thể hiện độ bóng/sáng của bề mặt ruy băng satin.
    ribbon_style:
      name: Kiểu ruy băng
      description: 'Chỉ định kiểu dáng/mẫu hình trực quan của dải ruy băng (ví dụ:
        trơn, sọc, ba màu).'
    ribbon_trim_backing_type:
      name: Loại nền ruy băng/viền
      description: Cho biết ruy băng/viền trang trí có lớp lót hay không và loại lớp
        lót đó là gì (để dễ dàng sử dụng).
    ribbon_trim_edge_finish:
      name: Hoàn thiện cạnh ruy băng/viền
      description: Mô tả cấu trúc/độ hoàn thiện của mép ruy băng/viền (hữu ích cho
        việc đánh giá khả năng bị sờn và mục đích sử dụng).
    ric_rac_wave_size:
      name: Kích thước sóng Ric-rac
      description: Mô tả biên độ/quy mô sóng của đường zig-zag (độ lớn của các đường
        zig-zag/sóng).
    rice_grain_length:
      name: Chiều dài hạt gạo
      description: Phân loại các sản phẩm gạo theo chiều dài hạt, chẳng hạn như hạt
        ngắn, hạt trung bình hoặc hạt dài, điều này ảnh hưởng đến đặc tính nấu nướng
        và cách sử dụng trong ẩm thực.
    rice_processing_method:
      name: Phương pháp chế biến gạo
      description: 'Mô tả cách thức chế biến hoặc chuẩn bị gạo (ví dụ: luộc sơ, nảy
        mầm, cán mỏng), ảnh hưởng đến thời gian nấu, giá trị dinh dưỡng và cách sử
        dụng.'
    rice_variety:
      name: Giống gạo
      description: Chỉ định loại hoặc giống gạo cụ thể, cho phép người mua sắm lựa
        chọn các loại hạt gạo có hương vị, mùi thơm, độ dai và món ăn dự định chế
        biến theo sở thích.
    riding_toy_features:
      name: Đặc điểm của đồ chơi cưỡi
      description: Nêu bật các tính năng an toàn/chức năng phổ biến dành riêng cho
        đồ chơi cưỡi.
    rifle_action_type:
      name: Loại cơ cấu hoạt động của súng trường
      description: Cơ chế hoạt động của súng trường (cách nạp đạn/bắn/đẩy vỏ đạn),
        rất quan trọng cho việc nhận dạng và thu hút sự quan tâm của nhà sưu tập.
    rifle_finish:
      name: Hoàn thiện súng trường
      description: Lớp phủ/hoàn thiện bên ngoài chính của kết cấu kim loại.
    rifle_magazine_type:
      name: Loại băng đạn súng trường
      description: Loại hệ thống nạp đạn cho súng trường.
    rifle_stock_material:
      name: Vật liệu làm báng súng trường
      description: 'Vật liệu chính được sử dụng cho báng súng/tay cầm súng trường
        (ví dụ: gỗ óc chó, polyme).'
    rim_clamping_method:
      name: Phương pháp kẹp vành
      description: Cơ chế máy móc giữ chặt bánh xe/vành trong quá trình lắp đặt và
        tháo dỡ.
    rim_strip_type:
      name: Loại dải vành
      description: 'Phân loại dải/băng theo kiểu dáng, cấu tạo hoặc ứng dụng cụ thể
        (ví dụ: băng dán vành không săm so với dải cao su bảo vệ).'
    rim_tubeless_compatibility:
      name: Khả năng tương thích với vành không săm
      description: Cho biết vành, băng quấn hoặc bánh xe có được thiết kế cho hệ thống
        lốp không săm hay không.
    ripeness_stage:
      name: Giai đoạn chín
      description: 'Cho biết mức độ chín của trái cây tại thời điểm bán (ví dụ: chưa
        chín, chín, sẵn sàng để ăn).'
    riser_pad_type:
      name: Loại tấm nâng
      description: 'Phân loại kiểu dáng chức năng của miếng đệm (ví dụ: miếng đệm
        tiêu chuẩn, miếng đệm giảm xóc, miếng đệm hình nêm).'
    roasted_malt_processing_type:
      name: Loại chế biến mạch nha rang
      description: 'Phương pháp chế biến cụ thể hoặc biến thể được sử dụng để tạo
        ra mạch nha rang hoặc ngũ cốc rang (ví dụ: lúa mạch rang chưa mạch nha, mạch
        nha đen, các biến thể đã khử vị đắng hoặc đã tách vỏ).'
    robotic_toy_interaction_mode:
      name: Chế độ tương tác đồ chơi robot
      description: Mô tả phương thức tương tác hoặc di chuyển chính của robot trong
        quá trình chơi.
    robotic_toy_light_features:
      name: Tính năng đèn của đồ chơi robot
      description: 'Cho biết đồ chơi có sử dụng đèn hay không và sử dụng như thế nào
        trong quá trình chơi (ví dụ: đèn LED, chiếu hình).'
    robotic_toy_programming_supported:
      name: Hỗ trợ lập trình đồ chơi robot
      description: Chỉ định phương pháp lập trình nào, nếu có, mà món đồ chơi này
        hỗ trợ.
    robotic_toy_skill_level:
      name: Mức độ kỹ năng của đồ chơi robot
      description: Thể hiện mức độ phức tạp của thao tác/lập trình mà người dùng cần
        thực hiện.
    robotic_toy_sound_features:
      name: Đặc điểm âm thanh của đồ chơi robot
      description: Thể hiện khả năng phát âm của đồ chơi robot.
    rod_butt_style:
      name: Kiểu cán cần câu
      description: Xác định cấu hình phần cuối cán cần câu được sử dụng trong các
        ứng dụng câu kéo.
    rod_construction_type:
      name: Kiểu kết cấu của cần câu
      description: Thể hiện kiểu cấu tạo tổng thể của cần câu về mặt các bộ phận và
        khả năng gấp gọn.
    rod_guide_material:
      name: Vật liệu dẫn hướng cần câu
      description: Quy định này chỉ rõ chất liệu được sử dụng cho các khoen hoặc miếng
        lót dây câu của cần câu, ảnh hưởng đến độ bền, trọng lượng và độ ma sát của
        dây câu.
    rod_guide_type:
      name: Loại dẫn hướng cần
      description: Chỉ định kiểu dáng chính của các khoen dẫn dây được lắp đặt trên
        cần câu.
    rod_handle_type:
      name: Loại tay cầm của cần câu
      description: Xác định cấu hình tay cầm của cần câu, giúp tăng sự thoải mái và
        lựa chọn kỹ thuật câu phù hợp.
    roll_cage_tubing_material:
      name: Vật liệu ống khung bảo vệ
      description: 'Chỉ định vật liệu/hợp kim ống được sử dụng cho khung bảo vệ/thanh
        chống lật (ví dụ: thép DOM so với thép crom moly 4130).'
    roller_skate_brake_shape:
      name: Hình dạng phanh giày trượt patin
      description: Mô tả hình dạng/cấu trúc hình học của đầu phanh, phù hợp với mục
        đích hiệu năng hoặc thẩm mỹ.
    roller_skate_brake_type:
      name: Loại phanh của giày trượt patin
      description: Chỉ định hệ thống phanh được sử dụng trên giày trượt patin.
    roller_ski_technique:
      name: Kỹ thuật trượt ván lăn
      description: Xác định kỹ thuật trượt tuyết băng đồng mà loại ván trượt có bánh
        xe này được thiết kế cho.
    roller_technology:
      name: Công nghệ con lăn
      description: Biểu thị công nghệ tích hợp giúp tăng cường hiệu quả massage, chẳng
        hạn như rung hoặc nhiệt.
    rolling_case_wheel_configuration:
      name: Cấu hình bánh xe vali kéo
      description: Chỉ định cấu hình bánh xe được sử dụng trên các hộp đựng đàn phím
        có bánh xe.
    rolling_paper_format:
      name: Dạng giấy cuốn
      description: 'Xác định hình thức trình bày vật lý của sản phẩm (ví dụ: tấm phẳng,
        cuộn sẵn, bao bì).'
    rolling_paper_gum_type:
      name: Loại keo dán giấy cuốn thuốc lá
      description: Chỉ định loại keo (chất dính) được sử dụng ở mép giấy để niêm phong,
        điều này có thể ảnh hưởng đến hương vị và chất lượng.
    rolling_paper_size:
      name: Kích thước giấy cuốn
      description: Ký hiệu này thể hiện phân loại kích thước tiêu chuẩn của giấy cuốn
        thuốc lá hoặc hình nón, giúp người mua sắm nhanh chóng chọn được chiều rộng/chiều
        dài phù hợp với nhu cầu của mình.
    rolling_stock_type:
      name: Loại toa xe
      description: Xác định loại tàu/phương tiện đường sắt mà mô hình đó thuộc về
        (đầu máy xe lửa so với toa hành khách/hàng hóa và các loại toa xe thông dụng).
    roof_cargo_net_hook_fastener_style:
      name: Lưới chở hàng trên nóc xe kiểu móc/khóa
      description: 'Chỉ định kiểu trang thiết bị đầu cuối được sử dụng để kết nối
        lưới với các điểm neo (ví dụ: móc chữ S, móc khóa carabiner, móc chữ J).'
    roof_height_class:
      name: Nhóm chiều cao trần xe
      description: Phân loại chiều cao mái thường dùng cho xe van (đặc biệt hữu ích
        cho việc cải tạo/chế tạo xe cắm trại).
    roof_type:
      name: Loại mái nhà
      description: Cấu hình phần mái hoặc trần của buồng chứa.
    root_variety:
      name: Giống củ
      description: 'Xác định loại hoặc kiểu phổ biến của củ (ví dụ: cải ngựa so với
        các giống wasabi thực sự).'
    rope_buoyancy:
      name: Độ nổi của dây thừng
      description: Cho biết liệu dây thừng có được thiết kế để nổi trên mặt nước hay
        không, giúp người sử dụng tránh bị vướng và dễ dàng thu hồi hơn.
    rope_construction:
      name: Kết cấu dây thừng
      description: Chỉ rõ các chi tiết về cấu trúc sợi ngoài kiểu bện, chẳng hạn như
        lõi/vỏ xoắn hay bện và liệu dây thừng có phải là kiểu kernmantle hay không.
    rope_material:
      name: Vật liệu dây thừng
      description: Xác định chất liệu của dây/dây điều chỉnh.
    rope_strand_compatibility:
      name: Khả năng tương thích của các sợi dây thừng
      description: Cho biết thiết bị hãm dây có thể xử lý những cấu hình sợi dây nào
        (đơn, đôi/nửa đôi, đôi hoặc kết hợp).
    rope_stretch_type:
      name: Loại dây kéo
      description: Mô tả đặc tính độ co giãn của dây thừng, phân biệt giữa các loại
        không co giãn, ít co giãn, tiêu chuẩn hoặc kiểu bungee.
    rose_bloom_stage:
      name: Giai đoạn nở hoa hồng
      description: Thể hiện độ nở của hoa hồng khi giao hàng (từ nụ đến khi nở hoàn
        toàn).
    rose_grade:
      name: Loại hoa hồng
      description: Hoa hồng cắt cành chất lượng thương mại.
    rosette_center_type:
      name: Kiểu trung tâm hình hoa hồng
      description: Chỉ định loại chi tiết trung tâm hoặc phần chèn ở mặt trước của
        họa tiết hoa hồng.
    rosin_dust_level:
      name: Mức độ bụi nhựa thông
      description: Thể hiện lượng bụi nhựa thông dự kiến sẽ được tạo ra trong quá
        trình sử dụng bình thường.
    rosin_formula_additives:
      name: Công thức/phụ gia nhựa thông
      description: Xác định các đặc điểm nổi bật trong công thức như không gây dị
        ứng, ít bụi hoặc hỗn hợp có chứa kim loại.
    rosin_hardness:
      name: Độ cứng của nhựa thông
      description: Chỉ số này cho biết độ cứng/mềm tương đối của nhựa thông dùng cho
        vĩ, có thể ảnh hưởng đến độ bám và khả năng phủ nhựa thông tùy thuộc vào điều
        kiện khí hậu và phong cách chơi.
    rotation_mechanism_type:
      name: Loại cơ chế xoay
      description: 'Xác định cơ chế cho phép dây quay, ảnh hưởng đến độ mượt mà và
        tốc độ đạt được (ví dụ: ổ bi so với bạc lót).'
    rotation_motion_features:
      name: Tính năng xoay/chuyển động
      description: Cho biết các hành tinh/quỹ đạo có quay hay chuyển động và chuyển
        động như thế nào.
    rotor_configuration_type:
      name: Loại cấu hình roto
      description: 'Bài viết này xác định cấu hình cánh quạt và kiểu điều khiển của
        máy bay trực thăng RC (ví dụ: đồng trục, cánh quạt đơn có bước cánh cố định
        so với bước cánh đồng bộ, nhiều cánh quạt), những yếu tố ảnh hưởng đáng kể
        đến đặc tính bay và mức độ phù hợp với các trình độ kỹ năng khác nhau.'
    rotor_construction_type:
      name: Kiểu kết cấu roto
      description: Xác định kiểu cấu tạo rôto, yếu tố ảnh hưởng đến trọng lượng, độ
        cứng và khả năng tản nhiệt.
    rotor_mounting_interface:
      name: Giao diện gắn roto
      description: Xác định tiêu chuẩn giao diện trục được sử dụng để gắn rôto vào
        bánh xe.
    rotor_mounting_standard:
      name: Tiêu chuẩn gắn roto
      description: 'Chỉ định tiêu chuẩn giao diện được sử dụng để gắn rôto vào moayơ
        (ví dụ: 6 bu lông hoặc Center Lock).'
    roulette_set_components_included:
      name: Các thành phần đi kèm của bộ đồ chơi Roulette
      description: Các bộ phận chính liên quan đến trò chơi roulette được bao gồm
        trong bộ/bánh xe.
    roulette_wheel_ball_track_type:
      name: Loại đường ray bi của bánh xe roulette
      description: Mô tả kiểu rãnh bi được sử dụng trên bánh xe, yếu tố ảnh hưởng
        đến tính chân thực và cảm giác khi chơi.
    roulette_wheel_numbering_system:
      name: Hệ thống số của bánh xe roulette
      description: Chỉ định cách bố trí số và số 0 trên bánh xe roulette để đảm bảo
        tính tương thích giữa lối chơi và tỷ lệ cược.
    rounders_equipment_included:
      name: Dụng cụ đi kèm của môn bóng Rounders
      description: Liệt kê cụ thể các vật dụng hoặc phụ kiện bóng chày được cung cấp
        kèm theo bộ dụng cụ huấn luyện để người mua biết chính xác những gì có trong
        hộp.
    rounders_governing_body_approval:
      name: Sự chấp thuận của cơ quan quản lý môn bóng chày
      description: Cho biết chứng nhận hoặc phê duyệt từ cơ quan quản lý chính thức
        của môn bóng chày hoặc các môn thể thao khác.
    row_counter_format:
      name: Định dạng bộ đếm hàng
      description: 'Chỉ định định dạng/kiểu của bộ đếm hàng đan (ví dụ: dạng vòng,
        dạng xích, dạng bấm, dạng kỹ thuật số).'
    row_counter_mechanism:
      name: Cơ chế đếm hàng
      description: Chỉ định cách số hàng được tăng/ghi lại trên công cụ.
    row_counter_mounting_method:
      name: Phương pháp lắp đặt bộ đếm hàng
      description: Cách gắn bộ đếm/dấu hiệu trong quá trình sử dụng (vào kim, vào
        ngón tay, vào vật cần đánh dấu, v.v.).
    rowel_type:
      name: Loại bánh răng của thúc ngựa
      description: Mô tả hình dạng hoặc đường viền cạnh của bánh răng để phù hợp với
        sở thích của người cưỡi và độ nhạy cảm của ngựa.
    rowing_machine_part_type:
      name: Loại phụ tùng máy chèo thuyền
      description: Giúp người mua sắm xác định chính xác bộ phận mà sản phẩm đó dùng
        để thay thế trên máy tập chèo thuyền, nhờ đó họ có thể nhanh chóng tìm thấy
        bộ phận cần thiết mà không cần phải tạo ra quá nhiều danh mục nhỏ chồng chéo.
    rubber_ducky_character_theme:
      name: Nhân vật/chủ đề vịt cao su
      description: Phong cách hoặc đặc điểm nhân vật của chú vịt cao su (hữu ích cho
        những chú vịt đồ chơi/sưu tầm).
    rubber_ducky_features:
      name: Đặc điểm của chú vịt cao su
      description: Các tính năng/thiết kế đặc trưng của đồ chơi vịt cao su dùng trong
        bồn tắm.
    rubber_ducky_size_class:
      name: Kích thước vịt cao su
      description: Phân loại kích thước vịt cao su thân thiện với người mua sắm dựa
        trên mục đích sử dụng thông thường (đồ chơi trong bồn tắm, đồ trang trí bánh
        kem, hay cỡ lớn).
    ruffle_style:
      name: Kiểu xếp nếp
      description: Mô tả cấu trúc hoặc kiểu dáng hình ảnh của đường viền xếp nếp trên
        dải vải buộc ghế.
    rugby_headgear_safety_certification:
      name: Chứng nhận an toàn mũ bảo hiểm rugby
      description: Cho biết mũ bảo hiểm có đáp ứng các tiêu chuẩn an toàn chính thức
        của môn rugby hoặc các môn thể thao nói chung hay không.
    rugby_size:
      name: Kích thước bóng rugby
      description: Phân loại thiết bị theo các nhãn kích thước thông dụng dành riêng
        cho môn bóng rugby được sử dụng trong tiêu đề sản phẩm.
    rugby_variant:
      name: Mẫu mã bóng rugby
      description: Chỉ định biến thể (mã hoặc định dạng) của môn bóng rugby mà sản
        phẩm này hướng đến.
    ruler_edge_type:
      name: Loại cạnh thước
      description: 'Xác định kiểu/chức năng của cạnh được sử dụng để đo hoặc đánh
        dấu (ví dụ: cạnh thẳng, cạnh vát, cạnh gờ).'
    ruler_marking_style:
      name: Kiểu vạch thước
      description: Mô tả cách bố trí các vạch/hướng dẫn được in trên thước, ngoài
        các vạch chia cơ bản.
    runner_configuration:
      name: Cấu hình thanh trượt
      description: Mô tả số lượng và cách bố trí các thanh trượt trên xe trượt tuyết.
    runner_material:
      name: Chất liệu của thanh trượt
      description: Chỉ định vật liệu được sử dụng cho các thanh trượt hoặc dải trượt
        của xe trượt tuyết.
    saddle_cover_style:
      name: Kiểu bọc yên ngựa
      description: 'Phân loại kiểu dáng tổng thể hoặc cách sử dụng của sản phẩm (ví
        dụ: vỏ bảo quản, vỏ bọc cho xe đẩy, túi đựng).'
    saddle_design:
      name: Thiết kế yên ngựa
      description: 'Phân loại thiết kế/kiểu dáng tổng thể về mặt công thái học hoặc
        khả năng giảm xóc của yên xe (ví dụ: loại có rãnh, không mũi, mũi chia đôi,
        có lò xo).'
    saddle_discipline:
      name: Kỷ luật cưỡi ngựa
      description: Xác định bộ môn cưỡi ngựa chính hoặc mục đích sử dụng/phong cách
        dự định của yên ngựa.
    saddle_mounting_type:
      name: Kiểu gắn yên xe
      description: 'Xác định giao diện giữa yên xe và cọc yên để đảm bảo tính tương
        thích (ví dụ: có ray, xoay, dạng chữ I).'
    saddle_pad_shape:
      name: Hình dạng miếng lót yên ngựa
      description: Mô tả hình dạng/đường viền vật lý của miếng đệm, ảnh hưởng đến
        khả năng tương thích với yên xe và sở thích thẩm mỹ.
    saddle_pad_style:
      name: Kiểu đệm yên ngựa
      description: Xác định kiểu dáng chức năng hoặc mục đích sử dụng của miếng đệm,
        cho phép người dùng lựa chọn thiết kế phù hợp với hoạt động hoặc loại yên
        xe của họ.
    saddle_padding_material:
      name: Vật liệu đệm yên ngựa
      description: Chỉ định chất liệu hoặc công nghệ đệm chính bên trong yên xe ảnh
        hưởng đến sự thoải mái và cảm giác khi lái.
    saddle_rail_material:
      name: Chất liệu đường ray yên xe
      description: Quy định này chỉ rõ chất liệu được sử dụng cho các thanh ray bên
        dưới yên xe đạp, yếu tố ảnh hưởng đến độ bền, sự thoải mái, trọng lượng và
        giá cả.
    saddle_tree_material:
      name: Chất liệu cốt yên
      description: Chỉ định vật liệu được sử dụng cho khung yên ngựa, tức là khung
        bên trong của yên ngựa.
    saddle_tree_width:
      name: Chiều rộng khung yên ngựa
      description: Mô tả cách phân loại độ rộng của khung yên ngựa, xác định độ vừa
        vặn với vai ngựa.
    safety_documentation_available:
      name: Tài liệu an toàn có sẵn
      description: 'Cho biết những tài liệu tuân thủ/an toàn nào được cung cấp cho
        thành phần đó (ví dụ: bảng dữ liệu an toàn, chứng nhận/tuyên bố IFRA, tuyên
        bố/công bố về chất gây dị ứng).'
    safety_equipment_included:
      name: Thiết bị bảo hộ đi kèm
      description: Các mặt hàng an toàn/bảo hộ được bao gồm trong bộ dụng cụ.
    safety_features:
      name: Tính năng an toàn
      description: Biểu thị các tính năng an toàn tích hợp nhằm giảm thiểu nguy cơ
        bị đứt tay do tai nạn hoặc bảo vệ lưỡi dao trong quá trình cất giữ.
    safety_harness_type:
      name: Loại đai an toàn
      description: Chỉ định kiểu dáng và cấu hình của đai an toàn cho trẻ em được
        cung cấp kèm theo ghế.
    safety_mechanism_type:
      name: Loại cơ chế an toàn
      description: Mô tả kiểu hệ thống an toàn tích hợp được sử dụng để giữ tạ trong
        trường hợp nâng tạ không thành công.
    safety_restraint_type:
      name: Loại dây đai an toàn
      description: Loại ghế an toàn cho trẻ em được tích hợp sẵn trên ghế đu, nếu
        có.
    safety_warning:
      name: Cảnh báo an toàn
      description: 'Cho biết sản phẩm có kèm theo các cảnh báo an toàn đồ chơi thông
        thường liên quan đến bi (ví dụ: nguy cơ nghẹn) hay không.'
    sail_shape:
      name: Hình dạng cánh buồm
      description: Mô tả kiểu dáng hình học của buồm thuyền kayak, yếu tố ảnh hưởng
        đến hiệu quả, khả năng điều khiển và lắp đặt.
    salad_dressing_type:
      name: Loại nước sốt salad
      description: 'Giúp nhận biết kiểu dáng hoặc kết cấu cơ bản của nước sốt (ví
        dụ: dạng kem, dạng giấm, dạng sữa chua), hỗ trợ người mua sắm phân biệt giữa
        các loại nước sốt và độ đặc khác nhau.'
    salad_topping_base_ingredient:
      name: Nguyên liệu cơ bản dùng để trang trí salad
      description: Chỉ định nhóm thành phần chính tạo nên lớp phủ, giúp khách hàng
        lọc theo sở thích dinh dưỡng, mối quan ngại về chất gây dị ứng hoặc kết cấu
        mong muốn.
    salt_level:
      name: Nồng độ muối
      description: Cho biết lượng muối hoặc natri được thêm vào các loại hạt.
    sand_cup_features:
      name: Đặc điểm của cốc cát
      description: Các đặc điểm chức năng/vật lý của cốc cát ảnh hưởng đến việc chơi
        và sử dụng.
    sand_shovel_handle_style:
      name: kiểu cán xẻng xúc cát
      description: Mô tả hình dạng tay cầm/phần nắm ở cuối cán xẻng/cuốc.
    sand_toy_set_pieces_included:
      name: Các chi tiết đi kèm trong bộ đồ chơi cát
      description: 'Liệt kê các loại linh kiện đồ chơi cát có trong bộ sản phẩm (ví
        dụ: xô, xẻng, khuôn), giúp người mua sắm so sánh các bộ sản phẩm dựa trên
        những gì chúng chứa.'
    sand_water_mill_items_included:
      name: Bao gồm các mặt hàng cối xay cát và cối xay nước.
      description: Liệt kê các phụ kiện chính đi kèm với bộ đồ chơi cối xay (xô, xẻng,
        khuôn, v.v.).
    sandbag_style:
      name: Kiểu bao cát
      description: 'Giúp người mua sắm lựa chọn giữa các phương pháp tập luyện khác
        nhau bằng cách xác định thiết kế cụ thể và mục đích sử dụng của bao cát (ví
        dụ: kiểu Bulgaria, Strongman, Power).'
    sandbox_bottom_type:
      name: Đáy hộp cát
      description: Loại kết cấu đáy/nền được sử dụng bên dưới lớp cát.
    sandbox_drainage_type:
      name: Loại hệ thống thoát nước hố cát
      description: Cách hộp cát thoát nước (nếu có), chẳng hạn như lỗ thoát nước hoặc
        nút bịt có thể tháo rời.
    sandbox_seating_type:
      name: Loại ghế ngồi kiểu hộp cát
      description: Liệu khu vui chơi cát có tích hợp chỗ ngồi hay không và đó là loại
        chỗ ngồi nào.
    sapodillo_variety:
      name: Giống Sapodillo
      description: 'Xác định giống hoặc chủng loại cụ thể của cây sapodillo/chikoo
        (ví dụ: "Alano", "Prolific"), cho phép những người đam mê lựa chọn hương vị
        và đặc điểm ưa thích.'
    sapote_variety:
      name: Loại quả hồng xiêm
      description: 'Chỉ định loài/loại sapote cụ thể được cung cấp (ví dụ: đen, trắng,
        mamey), cho phép người mua sắm phân biệt giữa các loại khác nhau.'
    satin_ribbon_face_type:
      name: Kiểu mặt ruy băng satin
      description: Chỉ định xem ruy băng có bề mặt satin ở một mặt hay cả hai mặt.
    sauce_consistency:
      name: Độ đặc của nước sốt
      description: Mô tả độ đặc hoặc kết cấu của nước sốt pizza.
    sauce_product_form:
      name: Dạng sản phẩm của nước xốt
      description: Chỉ định dạng vật lý của sản phẩm nước sốt, chẳng hạn như dạng
        lỏng, dầu, dạng sệt, dạng bột, dạng mảnh hoặc dạng siro.
    sauce_variety:
      name: Các loại nước sốt
      description: 'Xác định kiểu dáng hoặc nhóm công thức cụ thể của nước sốt trắng
        hoặc sốt kem (ví dụ: Alfredo, Béchamel, Hollandaise).'
    saxophone_body_finish:
      name: Hoàn thiện thân kèn saxophone
      description: Mô tả lớp hoàn thiện/mạ chính trên thân kèn saxophone (không bao
        gồm phần phím bấm).
    saxophone_body_type:
      name: Loại thân kèn saxophone
      description: Mô tả cấu hình vật lý tổng thể của thân kèn saxophone trầm và hướng
        của loa kèn.
    saxophone_construction_style:
      name: Kiểu cấu tạo kèn saxophone
      description: Chỉ ra các đặc điểm cấu tạo phổ biến của kèn saxophone ảnh hưởng
        đến độ bền, độ vang và việc bảo trì.
    saxophone_included_accessories:
      name: Bao gồm các phụ kiện kèn saxophone.
      description: Danh sách bao gồm các phụ kiện thường được bán kèm với bộ kèn saxophone
        alto.
    saxophone_key_system:
      name: Hệ thống phím kèn saxophone
      description: Xác định hệ thống phím bấm (bố cục/cơ chế tiêu chuẩn) của kèn saxophone
        được sử dụng trên nhạc cụ này.
    saxophone_key_touch_material:
      name: Vật liệu cảm ứng phím kèn saxophone
      description: 'Chỉ định chất liệu được sử dụng cho các miếng chạm phím saxophone
        (ví dụ: miếng chạm phím bằng ngọc trai).'
    saxophone_mouthpiece_baffle_type:
      name: Ống ngậm kèn saxophone kiểu vách ngăn
      description: Mô tả thiết kế vách ngăn giúp định hình luồng không khí và độ sáng.
    saxophone_neck_type:
      name: Loại cổ kèn saxophone
      description: Chỉ định cấu hình cần đàn được cung cấp kèm theo kèn saxophone
        trầm.
    saxophone_package_contents:
      name: Nội dung gói sản phẩm kèn saxophone
      description: 'Liệt kê các phụ kiện quan trọng đi kèm với kèn saxophone (ví dụ:
        hộp đựng, ống thổi, kẹp giữ lưỡi gà, dây đeo cổ, bộ dụng cụ vệ sinh).'
    saxophone_reed_cut:
      name: Cắt lưỡi kèn saxophone
      description: Xác định kiểu cắt/hình dạng của lưỡi kèn saxophone, yếu tố ảnh
        hưởng đến độ nhạy, âm sắc và cảm giác khi chơi.
    saxophone_reed_material_type:
      name: loại vật liệu lưỡi kèn saxophone
      description: 'Chỉ định loại vật liệu làm lưỡi gà (ví dụ: tre so với sợi tổng
        hợp).'
    saxophone_reed_strength_scale:
      name: Thang đo độ cứng lưỡi kèn saxophone
      description: Chỉ định hệ thống/thang đo độ cứng được sử dụng cho lưỡi gà (thường
        tùy thuộc vào thương hiệu), cho phép so sánh rõ ràng hơn giữa các danh sách.
    saxophone_small_part_thread_size:
      name: Kích thước ren nhỏ của kèn saxophone
      description: Xác định kích thước/tiêu chuẩn ren cho các bộ phận nhỏ có ren của
        kèn saxophone (chủ yếu là ốc vít), giúp lựa chọn kích thước phù hợp.
    saxophone_swab_application_area:
      name: Khu vực bôi tăm bông cho kèn saxophone
      description: Chỉ rõ phần nào của kèn saxophone mà que lau được thiết kế để làm
        sạch/lau khô.
    scabbard_material:
      name: Vật liệu vỏ kiếm
      description: Chỉ rõ chất liệu chính của bao kiếm/vỏ dao đi kèm (nếu có).
    scale_model_assembly_status:
      name: Tình trạng lắp ráp mô hình tỷ lệ
      description: Cho biết mô hình thu nhỏ đã sẵn sàng để trưng bày hay cần lắp ráp/sơn.
    scale_model_car_features:
      name: Đặc điểm của mô hình xe hơi thu nhỏ
      description: Những đặc điểm nổi bật của mô hình xe thu nhỏ như cửa/nắp ca-pô
        có thể mở, bánh xe có thể điều khiển, hệ thống treo, v.v.
    scale_model_kit_assembly_requirements:
      name: Yêu cầu lắp ráp bộ mô hình tỷ lệ
      description: Xác định các bước lắp ráp/vật tư bổ sung thường cần thiết ngoài
        việc lắp ráp cơ bản bằng cách ghép các bộ phận lại với nhau.
    scale_model_kit_components_included:
      name: Bao gồm các bộ phận của bộ mô hình tỷ lệ.
      description: 'Liệt kê những gì được bao gồm trong bộ mô hình/bộ lắp ráp xe tăng
        (ví dụ: đề can, tượng nhỏ, các chi tiết khắc bằng phương pháp quang hóa).'
    scale_model_paint_status:
      name: Tình trạng sơn của mô hình tỷ lệ
      description: Cho biết mô hình máy bay trực thăng đã được sơn sẵn/hoàn thiện
        hay cần phải sơn.
    scale_model_pose:
      name: Tư thế của mô hình lắp ráp theo tỷ lệ
      description: Chỉ định tư thế được mô tả của mô hình ngựa để trưng bày/phù hợp
        với mô hình diorama.
    scale_model_rotor_configuration:
      name: Cấu hình rôto mô hình tỷ lệ
      description: Chỉ định cấu hình cánh quạt trực thăng được mô tả trong mô hình.
    scale_model_truck_era:
      name: Kỷ nguyên xe tải mô hình
      description: Cho biết thời kỳ/giai đoạn sản xuất của chiếc xe tải thực tế mà
        mô hình đại diện (hữu ích cho những nhà sưu tập đang tìm kiếm sự khác biệt
        giữa xe tải cổ điển và hiện đại).
    scale_model_truck_propulsion_type:
      name: Mô hình xe tải tỷ lệ loại động cơ
      description: Chỉ rõ loại động cơ mà chiếc xe tải được mô tả sử dụng là động
        cơ diesel, xăng, điện, hybrid hay loại động cơ khác (như được thể hiện/tiếp
        thị bởi mẫu xe).
    scale_units:
      name: Đơn vị tỷ lệ
      description: Các đơn vị đo được in/khắc trên thanh để xác định bán kính/đường
        kính.
    scent_function:
      name: Chức năng mùi hương
      description: 'Xác định chức năng chính của sản phẩm tạo mùi hương để người đi
        săn có thể nhanh chóng chọn đúng công cụ (ví dụ: chất thu hút so với chất
        khử mùi).'
    scent_source:
      name: Nguồn mùi hương
      description: Liệt kê nguồn gốc sinh học hoặc hương liệu chính được sử dụng trong
        công thức sản phẩm, bao gồm các loại nước tiểu, hương liệu từ thực phẩm, hương
        liệu thực vật, v.v.
    school_bus_body_type:
      name: Loại thân xe buýt trường học
      description: 'Phân loại xe buýt trường học theo các kiểu thân xe/loại phổ biến
        trên thị trường (ví dụ: Loại A–D).'
    school_bus_safety_feature:
      name: Tính năng an toàn của xe buýt trường học
      description: Các trang thiết bị an toàn đáng chú ý được lắp đặt trên xe buýt
        trường học.
    school_glue_washability:
      name: Khả năng giặt sạch của keo dán học sinh
      description: Cho biết độ dễ dàng khi làm sạch keo khô/ướt khỏi da/quần áo/bề
        mặt.
    scissors_application:
      name: Ứng dụng kéo
      description: Ứng dụng/vật liệu cắt chính mà kéo này hướng đến.
    scooter_brake_pad_material:
      name: Vật liệu má phanh xe tay ga
      description: Chỉ định thành phần hợp chất được sử dụng trong má phanh, ảnh hưởng
        đến hiệu suất, độ ồn và tuổi thọ.
    scoring_method:
      name: Phương pháp chấm điểm
      description: Chỉ định cách theo dõi điểm số trên bàn bóng đá mini, chẳng hạn
        như bộ đếm bi thủ công hoặc bảng điểm điện tử.
    scoring_pattern:
      name: Mô hình chấm điểm
      description: Sơ đồ bố trí các khu vực tính điểm được in trên sân chơi.
    scoring_system_type:
      name: Loại hệ thống tính điểm
      description: Mô tả kiểu cơ chế tính điểm được tích hợp trong bàn, chẳng hạn
        như cần gạt thủ công hoặc các màn hình điện tử khác nhau.
    scottish_smallpipes_bag_material:
      name: Chất liệu túi kèn túi nhỏ Scotland
      description: Chỉ định vật liệu của túi (bình chứa khí) được cung cấp kèm theo
        các ống nhỏ.
    scottish_smallpipes_drone_tuning_configuration:
      name: Cấu hình điều chỉnh âm thanh drone của kèn túi nhỏ Scotland
      description: Chỉ định cấu hình điều chỉnh âm trầm được cung cấp kèm theo nhạc
        cụ (cao độ/vai trò của các âm trầm so với âm chủ).
    scottish_smallpipes_reed_type:
      name: Loại kèn nhỏ Scotland (dạng lưỡi gà)
      description: Xác định loại lưỡi gà được sử dụng cho ống thổi (và/hoặc liệu lưỡi
        gà là loại tổng hợp hay loại làm từ tre).
    scraping_surface_type:
      name: Loại bề mặt cạo/nạo
      description: 'Xác định cấu trúc/hình dạng của bề mặt cọ xát tạo ra âm thanh
        (ví dụ: có rãnh, dạng lược/răng, dạng lượn sóng).'
    screw_drive_type:
      name: Loại truyền động vít
      description: 'Chỉ định kiểu rãnh vặn vít trên đầu vít hoặc bu lông, cho biết
        loại dụng cụ cần thiết để siết chặt hoặc tháo chúng (ví dụ: lục giác/Allen,
        Torx).'
    screw_thread_size:
      name: Kích thước ren vít
      description: 'Chỉ định kích thước ren tiêu chuẩn của các ốc vít đi kèm hoặc
        tương thích (ví dụ: M4, M5, M6).'
    sculpting_clay_base_type:
      name: Loại đất sét nặn cơ bản
      description: Mô tả công thức/thành phần cơ bản của đất sét nặn.
    seafood_cut:
      name: Hải sản cắt lát
      description: 'Mô tả cách cắt hoặc hình thức trình bày của sản phẩm hải sản (ví
        dụ: nguyên con, phi lê, miếng).'
    seafood_processing_method:
      name: Phương pháp chế biến hải sản
      description: Chỉ định kỹ thuật bảo quản hoặc chế biến chính được áp dụng cho
        hải sản, chẳng hạn như hun khói, ướp muối hoặc sấy khô đông lạnh.
    seafood_source:
      name: Nguồn hải sản
      description: Thông tin này cho biết hải sản được đánh bắt tự nhiên, nuôi trồng,
        có nguồn gốc thực vật hay từ nguồn khác, giúp người mua sắm đánh giá tính
        bền vững và chất lượng.
    seal_material:
      name: Vật liệu niêm phong
      description: Vật liệu được sử dụng cho các vòng bịt kín ở cổ, cổ tay và mắt
        cá chân để giữ cho bộ đồ không bị thấm nước.
    seal_type:
      name: Loại niêm phong
      description: Chỉ rõ phương pháp làm kín được sử dụng bởi khớp nối để ngăn ngừa
        rò rỉ chất làm mát.
    sealant_formulation:
      name: Công thức chất trám kín
      description: 'Cho biết thành phần hóa học chính hoặc công nghệ phụ gia của chất
        làm kín lốp xe đạp (ví dụ: gốc latex, gia cường sợi, acrylic).'
    seals_leak_type:
      name: Loại gioăng bị rò rỉ
      description: Loại/địa điểm rò rỉ hệ thống làm mát mà sản phẩm được dùng để bịt
        kín.
    seam_construction:
      name: Cấu trúc đường may
      description: Mô tả cách tạo ra đường may của quả bóng, ảnh hưởng đến độ vung,
        độ bền và cảm giác khi đánh.
    seam_design:
      name: Thiết kế đường may
      description: Chỉ định kiểu đường may hoặc các đặc điểm đường may trang trí của
        sản phẩm tất.
    seam_gauge_scale_type:
      name: Loại thang đo độ dày đường may
      description: Cho biết các vạch chia/đánh dấu nào được bao gồm trên thước đo
        đường may ngoài vạch chia cơ bản của thước.
    seam_gauge_slider_material:
      name: Vật liệu trượt thước đo đường may
      description: Xác định chất liệu của bộ phận trượt/kim điều chỉnh (nếu có).
    seam_ripper_tip_style:
      name: Đầu mũi dụng cụ tháo chỉ
      description: Mô tả thiết kế đầu mũi tiện dụng được sử dụng để luồn dưới các
        mũi khâu và cắt chỉ một cách an toàn.
    seam_sealing_type:
      name: Loại hàn kín đường nối
      description: 'Mô tả phương pháp được sử dụng để ngăn nước thấm vào các đường
        may của bộ quần áo mưa (ví dụ: dán kín hoàn toàn, hàn kín).'
    seam_type:
      name: Loại đường may
      description: Mô tả kiểu đường khâu trên quả bóng chày, yếu tố ảnh hưởng đến
        độ bám, tính khí động học và cấp độ thi đấu dự định.
    season_condition_protection:
      name: Bảo vệ theo mùa/điều kiện
      description: Cho biết điều kiện thời tiết/tình trạng chính mà tấm che kính chắn
        gió được thiết kế để bảo vệ.
    season_rating:
      name: Xếp hạng theo mùa
      description: 'Chỉ định xếp hạng mùa của lều, cho biết mức độ phù hợp của nó
        với các điều kiện thời tiết khác nhau (ví dụ: 3 mùa, 4 mùa, 5 mùa/thám hiểm).'
    seasoning_variety:
      name: Sự đa dạng về gia vị
      description: Phân loại gia vị theo cách chế biến hoặc cách sử dụng truyền thống
        trong ẩm thực.
    seat_adjustment_power_type:
      name: Loại điều chỉnh ghế bằng điện
      description: Quy định cách thức vận hành các cơ chế điều chỉnh ghế (cần gạt
        thủ công so với động cơ điện), điều này có thể ảnh hưởng đến hệ thống dây
        điện/khả năng tương thích.
    seat_belt_attachment_type:
      name: Kiểu móc dây an toàn
      description: Chỉ định cách dây đeo được gắn vào xe/phần cứn của dây đai.
    seat_belt_buckle_electrical_connector_type:
      name: Loại đầu nối điện của khóa dây an toàn
      description: Chỉ định loại đầu nối/giao diện được sử dụng cho hệ thống dây điện
        công tắc khóa/bộ căng dây an toàn, nếu có.
    seat_belt_buckle_mounting_type:
      name: Kiểu lắp khóa dây an toàn
      description: 'Mô tả cách thức gắn khóa/bộ phận tiếp nhận vào xe, ghế hoặc chốt
        dây an toàn (ví dụ: bắt vít, kẹp).'
    seat_belt_buckle_release_button_color:
      name: Màu nút tháo khóa dây an toàn
      description: Chỉ định màu sắc của nút tháo khóa.
    seat_belt_cover_placement:
      name: Vị trí đặt vỏ dây an toàn
      description: Xác định vị trí trên dây an toàn mà tấm bọc được thiết kế để sử
        dụng.
    seat_belt_integration:
      name: Khả năng tích hợp dây an toàn
      description: Xác định xem ghế có tích hợp sẵn ổ cắm dây an toàn và/hoặc khóa
        cài hay không, hoặc liệu có cần phải chuyển ổ cắm khóa cài nguyên bản của
        xe sang để lắp đặt hay không.
    seat_belt_provision:
      name: Chỗ để dây an toàn
      description: 'Cho biết liệu dây an toàn và/hoặc các trang thiết bị liên quan
        đến dây an toàn (ví dụ: khóa cài) có được bao gồm trong cụm ghế sau hay phải
        được chuyển từ ghế nguyên bản.'
    seat_belt_strap_installation_location:
      name: Vị trí lắp đặt dây đai an toàn
      description: Cho biết vị trí lắp đặt dây đeo trong hệ thống đai.
    seat_cover_placement:
      name: Vị trí đặt bọc ghế
      description: Cho biết vị trí ngồi nào mà tấm bọc này được thiết kế cho trên
        xe.
    seat_cover_securement_method:
      name: Phương pháp cố định bọc ghế
      description: Cho biết phương pháp chính để cố định bọc ghế vào ghế. Nếu sử dụng
        nhiều phương pháp, hãy chọn phương pháp chính/ưu tiên.
    seat_cover_set_contents:
      name: Thành phần bộ bọc ghế bao gồm
      description: 'Mô tả các bộ phận có trong gói hàng (ví dụ: chỉ có đệm ghế so
        với cả bộ ghế + tựa đầu).'
    seat_fabric:
      name: Vải bọc ghế
      description: Chất liệu vải chính được sử dụng cho phần đệm ngồi và tựa lưng
        của ghế.
    seat_height_category:
      name: Hạng mục chiều cao ghế
      description: 'Phân loại ghế đẩu theo phạm vi chiều cao ghế điển hình (ví dụ:
        chiều cao quầy hoặc quầy bar) để đơn giản hóa việc lựa chọn.'
    seat_material:
      name: Chất liệu ghế
      description: Xác định chất liệu chính của bề mặt ghế ngồi của băng ghế.
    seat_mounting_type:
      name: Kiểu lắp đặt ghế ngồi
      description: Cấu hình giá đỡ/ray được sử dụng để gắn ghế vào sàn xe.
    seating_surface_material:
      name: Chất liệu bề mặt ghế ngồi
      description: 'Chỉ định chất liệu của khu vực mà người ta nằm ngả lưng lên (ví
        dụ: lưới Textilene, vải lưới, mây tre đan, đệm bọc).'
    seatpost_clamp_mechanism:
      name: Cơ chế kẹp cọc yên
      description: Loại hệ thống kẹp/khóa dùng để cố định cọc yên xe.
    section_orientation_compatibility:
      name: Khả năng tương thích định hướng phần
      description: Cho biết phụ kiện đó phù hợp với phần tay quay bên trái, tay quay
        bên phải hay phần có hướng lắp đặt универсальный (phù hợp với mọi loại bàn
        tay).
    sectional_configuration:
      name: Cấu hình phân đoạn
      description: 'Xác định mô-đun hoặc hướng cụ thể của bộ phận ghế sofa (ví dụ:
        góc, đầu bên trái, ghế dài) để người mua sắm có thể lắp ráp theo bố cục mong
        muốn.'
    sectional_shape:
      name: Hình dạng mặt cắt
      description: Xác định cấu hình/bố cục hình học tổng thể của bộ ghế sofa góc.
    secured_components:
      name: Các thành phần được cố định
      description: 'Liệt kê các bộ phận cụ thể của xe đạp mà chốt khóa hoặc đai ốc
        an toàn bảo vệ (ví dụ: bánh trước, bánh sau, cọc yên).'
    seed_content:
      name: Hàm lượng hạt
      description: Cho biết liệu quả họ cam quýt đó không hạt, có ít hạt hay có nhiều
        hạt.
    seed_size_classification:
      name: Phân loại kích cỡ hạt giống
      description: Chỉ số này cho biết kích thước tương đối của hạt không ăn được
        bên trong quả vải, yếu tố ảnh hưởng đến lượng thịt quả ăn được.
    self_adhesive_backing_format:
      name: Định dạng của lớp keo tự dính ở mặt sau
      description: Hình thức vật lý của lớp keo dán kèm theo miếng dán bấc (miếng
        dán sẵn hay nhãn dán riêng biệt, v.v.).
    self_adhesive_hook_loop_backing_type:
      name: Loại có lớp keo tự dính dạng móc và vòng
      description: Chỉ định cấu trúc lớp lót/lớp nền và hệ thống keo dán được sử dụng
        ở mặt tự dính.
    self_adhesive_hook_loop_fastener_shape:
      name: Hình dáng của miếng băng gai dính tự dính
      description: Chỉ định hình dạng/kiểu cắt của các chi tiết ốc vít được cung cấp.
    self_hardening_clay_finish:
      name: Lớp phủ đất sét tự khô
      description: Mô tả độ bóng/độ mờ của bề mặt sau khi khô hoàn toàn (hữu ích khi
        lựa chọn giữa bề mặt mờ tự nhiên, bóng mờ, v.v.).
    self_hardening_clay_water_resistance_after_curing:
      name: Đất sét tự đông cứng có khả năng chống nước sau khi đóng rắn
      description: Cho biết khả năng chống thấm nước sau khi đã khô hoàn toàn (không
        cần thêm chất bịt kín).
    sensor_functions:
      name: Chức năng cảm biến
      description: Cho biết cảm biến đo những chỉ số nào liên quan đến chu kỳ đạp
        xe.
    sensor_measurement_mode:
      name: Chế độ đo cảm biến
      description: 'Cho biết cảm biến có thể thu thập những chỉ số nào (ví dụ: chỉ
        nhịp đạp, chỉ tốc độ, cả tốc độ và nhịp đạp).'
    sensor_mounting_position:
      name: Vị trí lắp đặt cảm biến
      description: Chỉ định vị trí lắp đặt cảm biến trên xe đạp hoặc người lái, chẳng
        hạn như tay quay, trục bánh xe hoặc giày. Điều này ảnh hưởng đến khả năng
        tương thích với các cấu hình xe đạp khác nhau.
    sensor_mounting_type:
      name: Kiểu lắp đặt cảm biến
      description: 'Chỉ định cách lắp cảm biến MAP vào ống dẫn khí nạp/động cơ (ví
        dụ: mặt bích bắt vít so với gioăng đẩy).'
    sensor_or_gauge_mounting_location:
      name: Vị trí lắp đặt cảm biến hoặc đồng hồ đo
      description: Chỉ định vị trí lắp đặt cảm biến hoặc đồng hồ đo trên xe (ở cấp
        độ hệ thống/vị trí, không phải bên trái/bên phải).
    sensory_modality:
      name: Phương thức cảm giác
      description: Trải nghiệm giác quan chính mà món đồ chơi được thiết kế để mang
        lại (có thể là đa giác quan).
    sensory_toy_fidget_mechanism:
      name: Đồ chơi cảm giác, cơ chế giảm căng thẳng
      description: Tương tác/cơ chế chính được sử dụng cho sự bồn chồn và tự điều
        chỉnh.
    sensory_toy_light_features:
      name: Đặc điểm ánh sáng của đồ chơi cảm giác
      description: Đồ chơi này có các hiệu ứng/hành vi chiếu sáng khác nhau.
    sensory_toy_texture_type:
      name: Loại kết cấu đồ chơi cảm giác
      description: Các yếu tố cảm giác/kết cấu bề mặt chủ đạo được sử dụng để kích
        thích xúc giác.
    sequin_application_method:
      name: Phương pháp đính kim sa
      description: Cách thức sử dụng/gắn sequin (may, dán, ép nhiệt, v.v.) là như
        thế nào.
    sequin_finish:
      name: Hoàn thiện bằng kim sa
      description: 'Mô tả bề mặt/độ bóng và hiệu ứng phản chiếu của các hạt sequin
        được sử dụng trên miếng vá (ví dụ: mờ, kim loại, ba chiều), chứ không phải
        lớp nền hoặc phương pháp gắn miếng vá.'
    serger_stitch_functions:
      name: Chức năng may của máy may vắt sổ
      description: Chức năng của đường may này hỗ trợ máy may vắt sổ (các biến thể
        vắt sổ/viền và các đường may vắt sổ đặc biệt).
    serger_thread_count:
      name: Số lượng sợi chỉ của máy may vắt sổ
      description: 'Số lượng chỉ mà máy may vắt sổ có thể sử dụng để may (ví dụ: khả
        năng sử dụng 2/3/4/5 chỉ).'
    service_interval:
      name: Khoảng thời gian bảo dưỡng
      description: Thời gian tối đa được khuyến nghị giữa các lần kiểm tra/bảo dưỡng
        bắt buộc tại trạm dịch vụ được phê duyệt.
    serving_temperature:
      name: Nhiệt độ phục vụ
      description: Cho biết nhiệt độ hoặc trạng thái lý tưởng của sản phẩm khi dùng.
    sesame_seed_hull_status:
      name: Tình trạng vỏ hạt mè
      description: Chỉ rõ tahini được làm từ hạt mè đã bóc vỏ hay chưa bóc vỏ, điều
        này ảnh hưởng đến màu sắc, hương vị và giá trị dinh dưỡng.
    sesame_seed_roast_level:
      name: Mức độ rang hạt mè
      description: Thông tin này cho biết mức độ rang của hạt mè trước khi xay, giúp
        người mua sắm lựa chọn độ đậm đà hương vị ưa thích.
    sesame_seed_variety:
      name: Giống hạt mè
      description: Xác định màu sắc hoặc giống hạt mè được sử dụng để làm dầu.
    set_classification:
      name: Phân loại tập hợp
      description: 'Xác định cấp độ chơi hoặc phong cách chơi dự định của bộ croquet
        (ví dụ: giải đấu, giải trí, du lịch).'
    set_components:
      name: Bộ linh kiện
      description: 'Cho biết những mặt hàng nào được bao gồm trong sản phẩm (ví dụ:
        chỉ có que giữa so với cả bộ).'
    set_items_included:
      name: Các món đồ đi kèm trong bộ
      description: Chỉ định các loại trang phục hoặc phụ kiện có trong bộ, chẳng hạn
        như vải may sari, khăn choàng hoặc thắt lưng.
    setup_mechanism:
      name: Cơ chế thiết lập
      description: 'Mô tả phương pháp triển khai chính của lều (ví dụ: lều tự bung,
        lều bơm hơi/dạng khung khí, lều gắn trên nóc xe).'
    setup_type:
      name: Loại thiết lập
      description: Cách lắp ráp hoặc dựng lều/đường hầm chơi.
    sew_in_interfacing_elasticity:
      name: Độ đàn hồi của lớp lót may
      description: Cho biết liệu lớp vải lót may vào có độ co giãn hay không, và nếu
        có, thì theo hướng nào, để phù hợp với các sản phẩm dệt kim hoặc dệt thoi.
    sew_in_label_placement:
      name: Vị trí may nhãn
      description: Chỉ định vị trí dự định đặt trên mặt hàng hoàn thiện.
    sew_on_edge_finish:
      name: Đường viền may
      description: Cho biết mép khóa dán (hook & loop) là loại chưa xử lý/cắt hay
        đã được hoàn thiện để chống sờn.
    sew_on_rhinestone_hole_orientation:
      name: Hướng lỗ đính đá may
      description: 'Cách bố trí/hướng các lỗ so với viên đá (ví dụ: cạnh nhau, đối
        diện, chéo nhau) để hỗ trợ các kiểu khâu khác nhau.'
    sewing_kit_components_included:
      name: Các dụng cụ đi kèm trong bộ đồ may vá
      description: Liệt kê các vật dụng/dụng cụ may vá có trong bộ dụng cụ may để
        người mua sắm có thể so sánh những gì có trong mỗi bộ.
    sewing_machine_bobbin_class:
      name: Loại suốt chỉ máy may
      description: Chỉ định loại/hệ thống suốt chỉ tương thích với máy may, bao gồm
        suốt chỉ và hộp suốt chỉ.
    sewing_machine_buttonhole_type:
      name: Máy may kiểu khuy
      description: Phương pháp tạo khuy áo được thực hiện bằng máy.
    sewing_machine_display_type:
      name: Loại màn hình máy may
      description: Loại giao diện điều khiển/hiển thị trên máy may.
    sewing_machine_needle_point_type:
      name: Loại đầu kim máy may
      description: 'Xác định hình dạng/kiểu đầu kim, quyết định cách kim xuyên qua
        các loại vải khác nhau (ví dụ: đầu nhọn, đầu tròn hay đầu nêm).'
    sewing_machine_needle_system:
      name: Hệ thống kim máy may
      description: Mã số/hệ thống kim tiêu chuẩn xác định khả năng tương thích của
        máy (thường được viết là 130/705 H, HAx1, DBx1, 15x1, v.v.).
    sewing_machine_needle_type:
      name: Loại kim máy may
      description: 'Chỉ định mục đích sử dụng/kiểu dáng của kim (ví dụ: kim đa năng,
        kim đầu tròn, kim may quần jeans/vải denim), điều này ảnh hưởng đến chất lượng
        đường may và độ phù hợp của vải.'
    sewing_machine_shank_type:
      name: Loại trụ kim của máy may
      description: 'Chỉ định tiêu chuẩn giao diện giữa trục chân vịt và khớp nối chân
        vịt mà chân vịt được thiết kế cho, đảm bảo khả năng tương thích với máy may
        (ví dụ: trục thấp, trục cao, trục nghiêng).'
    sewing_pattern_accessory_type:
      name: Loại phụ kiện mẫu may
      description: Chỉ rõ loại phụ kiện mà mẫu may này tạo ra.
    sewing_pattern_notions_required:
      name: Các vật dụng cần thiết cho mẫu may
      description: Liệt kê các vật liệu/trang thiết bị bổ sung đáng chú ý cần thiết
        để hoàn thành dự án (ngoài vải và chỉ).
    sewing_pattern_recommended_fabric:
      name: Mẫu may được đề xuất loại vải
      description: Liệt kê các loại/trọng lượng vải được khuyến nghị cho mẫu may (do
        nhà thiết kế mẫu cung cấp).
    sewing_pattern_size_range:
      name: Phạm vi kích thước mẫu may
      description: 'Chỉ định phạm vi kích thước dự định mà mẫu thiết kế bao phủ (ví
        dụ: từ trẻ sơ sinh đến người lớn, cỡ lớn).'
    sewing_thread_size_system:
      name: Hệ thống kích thước chỉ may
      description: 'Tiêu chuẩn định cỡ được sử dụng để biểu thị kích thước sợi (ví
        dụ: Tex, Denier, Ticket, số trọng lượng, kích thước V).'
    shaft_curvature:
      name: Độ cong trục
      description: Mô tả hình dạng tổng thể của trục, yếu tố ảnh hưởng đến khoảng
        cách giữa trục và mặt đất, chuyển động vung gậy và tính công thái học.
    shaft_kick_point:
      name: Điểm uốn trục
      description: Xác định vị trí dọc theo thân gậy nơi nó uốn cong nhiều nhất trong
        quá trình vung gậy, ảnh hưởng đến quỹ đạo bay của bóng.
    shaft_length_type:
      name: Loại chiều dài trục
      description: 'Ký hiệu kích thước theo tiêu chuẩn ngành dành cho thân phi tiêu
        (ví dụ: Ngắn, Trung bình) được sử dụng khi không có số đo chính xác bằng milimét.'
    shaft_shape:
      name: Hình dạng trục
      description: 'Xác định hình dạng mặt cắt ngang của cán tonfa (ví dụ: tròn, vuông,
        bát giác).'
    shaker_fill_material:
      name: Chất liệu hạt nạp bên trong nhạc cụ lắc
      description: Chỉ định chất liệu chính bên trong được sử dụng để tạo ra âm thanh
        lắc (nếu có), chẳng hạn như hạt, hạt nhỏ hoặc viên bi.
    shaker_shell_material:
      name: Chất liệu vỏ ngoài của nhạc cụ lắc
      description: Chỉ định vật liệu chính của thân/vỏ máy lắc trứng (vỏ ngoài).
    shallot_variety:
      name: Giống hành tím
      description: Xác định giống, loại thị trường hoặc chủng loại cụ thể của sản
        phẩm hành tím.
    shank_style:
      name: Kiểu cán
      description: 'Mô tả hình dạng/cấu hình tổng thể của phần thân hàm thiếc (ví
        dụ: thẳng, cong, vát).'
    shapewear_enhancement_feature:
      name: Tính năng nâng cao của đồ định hình vóc dáng
      description: 'Nêu bật những cải tiến chức năng chính mà sản phẩm mang lại (ví
        dụ: kiểm soát vùng bụng, nâng mông, lớp lót chống rò rỉ).'
    sheath_type:
      name: Loại vỏ
      description: Loại bao đựng dao đi kèm với con dao sưu tầm này.
    sheet_music_clip_padding_material:
      name: Vật liệu đệm kẹp bản nhạc
      description: Chất liệu của bất kỳ lớp đệm kẹp/giữ nào tiếp xúc với giấy hoặc
        mép giá đỡ để tránh rách và trượt.
    sheet_music_clip_spring_tension_level:
      name: Mức độ căng lò xo của kẹp bản nhạc
      description: Độ bền tương đối của lò xo kẹp / lực kẹp.
    sheet_music_clip_use_environment:
      name: Môi trường sử dụng kẹp bản nhạc
      description: Môi trường sử dụng chính mà kẹp được thiết kế để hoạt động tốt
        nhất.
    shell_construction:
      name: Cấu trúc vỏ
      description: Quy định cách thức cấu tạo vỏ trống bass, yếu tố ảnh hưởng mạnh
        mẽ đến âm thanh và trọng lượng.
    shell_finish:
      name: Hoàn thiện vỏ
      description: Xử lý lớp hoàn thiện bên ngoài vỏ trống doumbek.
    shell_hull_status:
      name: Tình trạng vỏ/thân tàu
      description: Xác định xem các loại hạt được bán kèm vỏ hay đã được bóc vỏ.
    shift_boot_attachment_method:
      name: Phương pháp gắn bọc cần số
      description: 'Chỉ định cách gắn bọc cần số vào bảng điều khiển/viền cần số của
        xe (ví dụ: viền kẹp, vòng giữ, keo dán).'
    shift_boot_installation_hardware_included:
      name: Bao gồm trong trang thiết bị lắp đặt bọc cần số
      description: Liệt kê các phần cứng và trang thiết bị đi kèm với bộ bọc cần số.
    shift_knob_illumination:
      name: Đèn chiếu sáng cần số
      description: 'Xác định xem cần số có tích hợp đèn chiếu sáng hay không và phương
        pháp/loại đèn chiếu sáng (ví dụ: quang phát quang, LED, sợi quang, đèn nền
        theo mẫu).'
    shift_knob_installation_method:
      name: Phương pháp lắp đặt núm cần số
      description: Chỉ định cách núm cần số được gắn vào cần gạt/tay gạt.
    shift_knob_shape:
      name: Hình dạng cần số
      description: Mô tả hình dạng tổng thể, tính công thái học của cần số.
    shift_pattern_type:
      name: Kiểu bố trí cần số
      description: Xác định kiểu đánh dấu số trên cần số (nếu có).
    shifter_compatibility:
      name: Độ tương thích của bộ đề
      description: Cho biết liệu phần mở rộng tay lái có tương thích với cần số điện
        tử, cần số cơ học, cả hai, hay không tương thích với cần số.
    shifter_mounting_interface:
      name: Giao diện gắn bộ đề
      description: 'Mô tả cách cần gạt chuyển số được gắn vào xe đạp (ví dụ: kích
        thước kẹp riêng biệt, I-Spec, MatchMaker, gắn ở đầu ghi đông, gắn trên ống
        khung dưới, không dây).'
    shifting_actuation_type:
      name: Loại cơ cấu truyền động chuyển đổi
      description: Xác định cơ chế được sử dụng để chuyển số trong bộ truyền động
        (cơ khí, điện tử có dây, điện tử không dây, thủy lực).
    shifting_mechanism:
      name: Cơ chế chuyển số
      description: Xác định xem cần số hoạt động bằng cơ học hay điện tử, và liệu
        nó là loại có chỉ số hay loại ma sát.
    shim_purpose:
      name: Mục đích của miếng đệm
      description: 'Xác định loại chức năng của sản phẩm (ví dụ: miếng đệm, nêm, miếng
        lót) để người đi xe đạp có thể nhanh chóng tìm thấy giải pháp điều chỉnh phù
        hợp mà không cần phải tạo các danh mục phụ riêng biệt.'
    shin_guard_attachment_method:
      name: Phương pháp gắn miếng bảo vệ ống chân
      description: Phân loại kiểu dáng tổng thể của miếng bảo vệ ống chân, bao gồm
        cả việc tích hợp với miếng bảo vệ mắt cá chân hoặc cấu trúc dạng tất.
    shirt_cuff_style:
      name: Kiểu cổ tay áo sơ mi
      description: Bài viết này xác định cấu trúc của cổ tay áo, yếu tố ảnh hưởng
        đến tính trang trọng, việc phối hợp với khuy măng sét và sự thoải mái.
    shochu_base_ingredient:
      name: Thành phần cơ bản của rượu shochu
      description: Xác định nguồn tinh bột hoặc đường chính được sử dụng để sản xuất
        rượu shochu.
    shochu_soju_variety:
      name: Loại Shochu & Soju
      description: Phân loại sản phẩm theo kiểu dáng hoặc loại hình sản xuất đã được
        công nhận.
    shock_absorber_bushing_material:
      name: Vật liệu bạc lót giảm xóc
      description: 'Vật liệu của các bạc lót/bộ phận cách ly lắp đặt: Supply kèm theo
        hoặc tích hợp vào bộ giảm xóc.'
    shock_absorber_charge_type:
      name: Loại nạp giảm xóc
      description: 'Xác định công nghệ nạp/giảm chấn của giảm xóc (ví dụ: thủy lực/dầu,
        khí nén, không khí) và/hoặc thiết kế ống liên quan nếu có.'
    shock_absorber_mount_type_lower:
      name: Kiểu gắn giảm xóc (phía dưới)
      description: Kiểu giao diện lắp đặt phía dưới của bộ giảm xóc để phù hợp với
        kích thước.
    shock_absorber_mount_type_upper:
      name: Loại giá đỡ giảm xóc (phía trên)
      description: Chỉ định kiểu giao diện lắp đặt phía trên (trên cùng) của bộ giảm
        xóc xe cơ giới để đảm bảo sự phù hợp/tương thích.
    shock_absorber_position:
      name: Vị trí giảm xóc
      description: Xác định xem bộ giảm xóc được thiết kế cho vị trí phía trước, phía
        sau, bên trái hay bên phải của xe (chi tiết hơn so với chỉ định vị trí theo
        trục).
    shock_absorption_system:
      name: Hệ thống giảm xóc
      description: Mô tả cơ chế được sử dụng để giảm rung động và tiếng ồn khi bật
        trở lại.
    shoe_collar_height:
      name: Chiều cao cổ giày
      description: Phân loại giày theo chiều cao cổ/kiểu dáng (cổ thấp, cổ trung bình,
        cổ cao) để chỉ độ che phủ mắt cá chân và khả năng hỗ trợ.
    shoe_cover_height:
      name: Chiều cao bọc giày
      description: Chỉ định mức độ che phủ của bọc giày xe đạp, phân biệt giữa bọc
        ngón chân và bọc toàn bộ giày cao cổ.
    shoe_sizing_system:
      name: Hệ thống đo kích cỡ giày
      description: Xác định tiêu chuẩn kích cỡ (Mỹ, Anh, EU, Nhật Bản, Mondopoint,
        v.v.) được sử dụng cho kích cỡ lốp giày đã nêu.
    shoelace_aglet_material:
      name: Vật liệu đầu dây giày
      description: Xác định chất liệu được sử dụng cho phần đầu (đầu bịt) của dây
        giày, yếu tố Influence độ bền và kiểu dáng.
    shooting_rest_design:
      name: Thiết kế giá đỡ súng
      description: Phân loại kiểu dáng cấu trúc của giá đỡ (giá đỡ dạng túi, giá đỡ
        dạng trượt, giá đỡ ba chân, kẹp súng, v.v.).
    shooting_stick_yoke_design:
      name: Thiết kế càng đỡ gậy bắn súng
      description: Chỉ định kiểu giá đỡ hoặc khung gắn kết với súng hoặc thiết bị
        quang học.
    shooting_target_style:
      name: Kiểu bắn mục tiêu
      description: Phân loại kiểu dáng hoặc thiết kế của bia tập bắn trượt băng nghệ
        thuật và khúc côn cầu để khách hàng có thể chọn mục tiêu huấn luyện phù hợp
        với nhu cầu của mình.
    shooting_target_type:
      name: Loại mục tiêu bắn
      description: 'Phân loại các mục tiêu bắn theo kiểu dáng, chất liệu hoặc thiết
        kế (ví dụ: cồng, hình người, bia Paper , mục tiêu xoay), cho phép người bắn
        nhanh chóng xác định đúng mục tiêu phù hợp với bộ môn và loại súng của họ.'
    short_block_assembly_balance_type:
      name: Loại cân bằng cụm khối ngắn
      description: Cho biết cụm quay được cân bằng bên trong hay bên ngoài.
    short_block_intended_use:
      name: Khối ngắn dự định sử dụng
      description: Hộp đựng này chủ yếu được thiết kế cho khối ngắn.
    short_block_rotating_assembly_included:
      name: Bao gồm cụm lắp ráp xoay khối ngắn.
      description: Xác định các thành phần chính của cụm quay được bao gồm trong khối
        ngắn.
    shot_size:
      name: Kích thước viên đạn
      description: Xác định kích thước viên đạn cho các viên đạn rời hoặc các thành
        phần đạn dược.
    shotgun_action_type:
      name: Kiểu hoạt động súng săn
      description: Xác định cơ chế hoạt động/tác dụng của súng săn.
    shotgun_choke_type:
      name: Loại choke súng săn
      description: Chỉ định cấu hình choke của nòng súng săn.
    shotgun_gauge:
      name: Thông số đo đường kính nòng súng săn
      description: Thông số này xác định đường kính nòng súng săn (và cỡ nòng .410
        nếu có) để nhận dạng và lọc trong danh sách đồ sưu tầm.
    shotgun_stock_material:
      name: Vật liệu làm báng súng săn
      description: Chỉ định vật liệu chính của báng súng/phần ốp tay cầm (đồ nội thất).
    shuffleboard_speed_rating:
      name: Tốc độ đánh giá trò chơi shuffleboard
      description: Chỉ số này cho biết tốc độ trượt tương đối mà bột trượt hoặc các
        sản phẩm bảo dưỡng khác mang lại cho bàn chơi, cho phép người chơi lựa chọn
        tốc độ phù hợp với trình độ kỹ năng và chiều dài bàn của họ.
    shuffleboard_table_length_compatibility:
      name: Khả năng tương thích chiều dài bàn chơi shuffleboard
      description: Chiều dài tiêu chuẩn của bàn chơi shuffleboard mà sản phẩm được
        thiết kế để phù hợp hoặc bổ sung.
    shuttlecock_base_material:
      name: Chất liệu đế quả cầu lông
      description: Xác định chất liệu được sử dụng cho phần mũi/đế của quả cầu lông,
        yếu tố ảnh hưởng đến độ bền, cảm giác và độ nảy.
    shuttlecock_feather_material:
      name: Vật liệu lông cầu lông
      description: Xác định nguồn lông vũ chính hoặc loại cấu tạo được sử dụng trên
        phần đuôi của quả cầu lông, ảnh hưởng đến độ bền, tính đồng nhất và giá cả.
    shuttlecock_grade:
      name: Cầu lông loại
      description: 'Xác định cấp độ chơi hoặc phân loại chất lượng dự định (ví dụ:
        luyện tập, câu lạc bộ, thi đấu).'
    shuttlecock_speed_rating:
      name: Xếp hạng tốc độ của quả cầu lông
      description: Chỉ định tốc độ hoặc xếp hạng do nhà sản xuất quy định của quả
        cầu lông, cho phép người chơi lựa chọn tốc độ bay phù hợp với điều kiện thi
        đấu, nhiệt độ và độ cao.
    side_panel_installation_state:
      name: Trạng thái lắp đặt tấm bên
      description: Xác định xem tấm ốp hông được cung cấp ở dạng thô, đã sơn lót,
        đã sơn phủ, hoặc đã được xử lý/chuẩn bị theo cách khác để lắp đặt.
    side_wall_mechanism:
      name: Cơ cấu thành bên
      description: Mô tả cách vách cạnh giường nôi mở ra hoặc hạ xuống để tiếp cận
        em bé.
    signal_source:
      name: Nguồn tín hiệu
      description: Cho biết cách đồng hồ đo quãng đường nhận/xác định thông tin về
        khoảng cách hoặc thời gian.
    silk_fiber_type:
      name: Loại sợi tơ tằm
      description: 'Loại/nguồn gốc sợi tơ tằm được sử dụng để làm vải (ví dụ: tơ tằm
        dâu hoặc tơ tằm tussah), sẽ ảnh hưởng đến kết cấu, độ đồng đều và giá cả.'
    simulated_game_species:
      name: Loài vật mô phỏng trong trò chơi
      description: Cho biết loại chim săn mồi hoặc động vật cụ thể mà mô hình giả
        mô phỏng để huấn luyện thực tế.
    singlet_cut_style:
      name: Kiểu áo ba lỗ
      description: Xác định kiểu dáng/cắt may của bộ đồ đấu vật, có tính đến chiều
        cao dây đeo, kiểu lưng và sự khác biệt về giới tính/độ tuổi.
    sink_material:
      name: Chất liệu bồn rửa
      description: Chỉ định chất liệu của bồn rửa tích hợp đi kèm với tủ trang điểm.
    sinker_attachment_style:
      name: Kiểu gắn chì
      description: Mô tả cơ chế được trang bị trên chì neo để gắn nó vào dây câu hoặc
        bộ dây câu.
    sinker_finish:
      name: Hoàn thiện chìm
      description: Chỉ định lớp phủ bên ngoài hoặc phương pháp xử lý bề mặt của vật
        nặng.
    sinker_shape:
      name: Hình dáng chì lưới
      description: 'Xác định hình dạng hình học của chì câu (ví dụ: hình viên đạn,
        hình trụ, hình giọt nước) để người câu cá có thể chọn kiểu trình bày tối ưu
        và khả năng chống vướng.'
    siren_system_included:
      name: Hệ thống còi báo động được bao gồm
      description: Cho biết hệ thống còi báo động/loa phóng thanh có được lắp đặt
        hay không và thuộc loại nào.
    siren_system_type:
      name: Loại hệ thống còi báo động
      description: Chỉ định cấu hình còi báo động/hệ thống âm thanh công cộng được
        lắp đặt trên xe cảnh sát.
    size_designation:
      name: Chỉ định kích thước
      description: Nhãn kích thước tiêu chuẩn cho dụng cụ tam giác.
    size_system:
      name: Hệ thống kích thước
      description: 'Chỉ định hệ thống kích thước hoặc tiêu chuẩn khu vực mà nhãn kích
        thước tương ứng (ví dụ: Mỹ, Anh, EU, chữ cái quốc tế).'
    sizzle_mechanism:
      name: Cơ chế xèo xèo
      description: 'Mô tả cách chũm chọe tạo ra hiệu ứng tiếng xèo xèo (ví dụ: đinh
        tán được lắp vào chũm chọe, dây xích/bộ phận tạo tiếng xèo xèo có thể gắn
        thêm, hoặc không có trang thiết bị nào đi kèm).'
    skate_blade_discipline:
      name: Kỷ luật trượt băng
      description: Chức năng này xác định bộ môn trượt băng hoặc ứng dụng mà lưỡi
        dao được thiết kế cho, chẳng hạn như khúc côn cầu hoặc trượt băng nghệ thuật,
        cho phép người mua sắm lọc ra các lưỡi dao phù hợp.
    skate_brake_type:
      name: Loại phanh của giày trượt patin
      description: Xác định kiểu cơ chế dừng được trang bị trên giày trượt.
    skateboard_nut_thread_size:
      name: Kích thước ren ốc ván trượt
      description: Xác định kích thước ren (đường kính và bước ren) của đai ốc để
        đảm bảo tương thích với trục ván trượt, chốt trục hoặc các trang thiết bị
        lắp đặt khác.
    skein_winder_bearing_bushing_type:
      name: Loại ổ trục/bạc lót máy cuốn sợi
      description: Chỉ định loại ổ trục hoặc bạc lót được sử dụng trong cụm quay của
        máy cuốn sợi.
    skein_winder_drive_type:
      name: Loại truyền động máy cuốn cuộn len
      description: Cách máy cuốn sợi được vận hành/quay trong quá trình sử dụng.
    ski_binding_mechanism:
      name: Cơ chế gắn ván trượt
      description: 'Xác định thiết kế cơ khí cơ bản hoặc nguyên tắc của loại khóa
        cài (ví dụ: alpine, tech/pin, telemark).'
    ski_binding_part_type:
      name: Loại bộ phận gắn ván trượt tuyết
      description: Công cụ này xác định linh kiện hoặc phụ kiện cụ thể cho bộ phận
        gắn ván trượt tuyết, cho phép lọc nhanh chóng trên nhiều loại linh kiện khác
        nhau.
    ski_boot_sole_standard:
      name: Tiêu chuẩn đế giày trượt tuyết
      description: Xác định tiêu chuẩn duy nhất hoặc tiêu chuẩn tương thích về liên
        kết mà giày trượt tuyết được chứng nhận.
    skill_focus:
      name: Tập trung vào kỹ năng
      description: Xác định kỹ năng bóng rổ chính mà dụng cụ hỗ trợ tập luyện này
        nhằm mục đích phát triển.
    skimboard_construction:
      name: Kết cấu của ván lướt sóng skimboard
      description: 'Mô tả cấu tạo chính của ván trượt, tập trung vào lõi và kỹ thuật
        xếp lớp (ví dụ: lõi xốp, lõi gỗ).'
    skin_presence:
      name: Sự hiện diện trên da
      description: Xác định xem gà được bán còn da, đã lột da, hay chỉ lột một phần
        da.
    slapstick_handle_type:
      name: Kiểu tay cầm hài hước
      description: Mô tả kiểu dáng tay cầm/cán cầm được tích hợp vào gậy chơi nhạc
        cụ, ảnh hưởng đến tính công thái học và sự thoải mái khi chơi.
    slapstick_playing_surface_material:
      name: Vật liệu bề mặt sân chơi hài kịch
      description: Xác định chất liệu của các bộ phận tiếp xúc với nhau để tạo ra
        âm thanh.
    sled_brake_type:
      name: Loại phanh của xe trượt tuyết
      description: Chỉ định cơ chế phanh được trang bị trên xe trượt tuyết, nếu có.
    sled_towing_method:
      name: Phương pháp kéo xe trượt tuyết
      description: Cho biết phương thức chính mà xe trượt tuyết được kéo hoặc chở.
    sleep_position_suitability:
      name: Độ phù hợp với tư thế ngủ
      description: Cho biết tư thế ngủ nào mà nệm được thiết kế để hỗ trợ hiệu quả
        nhất.
    sleeping_bag_shape:
      name: Hình dạng túi ngủ
      description: Kiểu dáng tổng thể của túi ngủ ảnh hưởng đến độ ấm, trọng lượng
        và độ rộng rãi.
    sleeping_pad_type:
      name: Loại đệm ngủ
      description: Xác định kiểu cấu tạo của tấm đệm—chẳng hạn như bọt xốp kín hoặc
        khí nén—ảnh hưởng trực tiếp đến sự thoải mái, trọng lượng và khả năng cách
        nhiệt.
    sleepwear_set_pieces_included:
      name: Các món đồ đi kèm trong bộ đồ ngủ
      description: Liệt kê các thành phần riêng lẻ có trong một bộ đồ ngủ hoặc đồ
        mặc nhà nhiều món.
    sleeve_bearing_type:
      name: Loại ổ trượt
      description: Xác định công nghệ cho phép xoay ống tay áo, ảnh hưởng đến chất
        lượng quay của tay áo trong các bài tập cử tạ Olympic.
    sleeve_style:
      name: Kiểu dáng tay áo
      description: 'Chỉ định kiểu tay áo ngoài chiều dài (ví dụ: tay áo raglan).'
    slide_board_accessories_included:
      name: Bao gồm phụ kiện ván trượt.
      description: Liệt kê các mặt hàng bổ sung được đóng gói cùng với bảng trượt
        để người mua sắm biết chính xác những gì được bao gồm và có thể so sánh các
        gói sản phẩm.
    slide_installation_type:
      name: Kiểu lắp đặt máng trượt
      description: Cách thức lắp đặt hoặc gắn cầu trượt (độc lập, gắn vào bộ đồ chơi,
        v.v.) như thế nào?
    slide_intended_finger:
      name: Trượt ngón tay dự định
      description: 'Cho biết cần đeo nút trượt vào ngón tay nào, hoặc liệu nó có phù
        hợp hay không (ví dụ: thanh tạo âm).'
    slide_safety_features:
      name: Các tính năng an toàn của cầu trượt
      description: Các yếu tố thiết kế liên quan đến an toàn được tích hợp trên cầu
        trượt.
    slide_type:
      name: Loại cơ cấu trượt
      description: Chỉ định loại cơ cấu trượt bằng đồng thau mà sản phẩm này được
        thiết kế để làm sạch.
    slide_water_use_capability:
      name: Khả năng sử dụng nước của cầu trượt
      description: 'Liệu cầu trượt có được thiết kế để sử dụng với nước (ví dụ: kết
        nối với vòi nước) và cách sử dụng như thế nào.'
    slime_putty_kit_components_included:
      name: Bộ dụng cụ làm slime và đất sét bao gồm các thành phần.
      description: Liệt kê các dụng cụ và phụ kiện đi kèm với sản phẩm slime/putty
        (đặc biệt là đối với các bộ sản phẩm/gói hàng).
    sling_material:
      name: Chất liệu dây đai đỡ
      description: Chỉ định loại sợi/vải được sử dụng trong dây đeo (dây hình xương
        chó) của thiết bị rút nhanh.
    smith_machine_bar_path:
      name: Đường đi của thanh tạ máy Smith
      description: Mô tả đường chuyển động cố định của thanh tạ, cung cấp thông tin
        cho người dùng về cơ sinh học và yêu cầu về không gian.
    smoke_color:
      name: Màu khói
      description: Màu sắc của khói do pháo sáng/tín hiệu khói tạo ra (khác với màu
        sắc của thân sản phẩm).
    smoked_malt_smoking_material:
      name: Nguyên liệu hun khói mạch nha hun khói
      description: 'Đối với mạch nha hun khói, cần xác định nguyên liệu được sử dụng
        trong quá trình hun khói (ví dụ: loại gỗ cụ thể hoặc than bùn).'
    snack_mix_variety:
      name: Nhiều loại đồ ăn nhẹ hỗn hợp
      description: 'Phân loại sản phẩm theo kiểu trộn (ví dụ: trail mix, nut mix,
        namkeen, sev).'
    snack_processing_method:
      name: Phương pháp chế biến món ăn vặt
      description: 'Cho biết kỹ thuật chế biến hoặc bảo quản chính được sử dụng để
        tạo ra món ăn nhẹ (ví dụ: sấy đông khô, nướng, rang).'
    snack_texture:
      name: Kết cấu đồ ăn nhẹ
      description: Thể hiện độ dai hoặc cảm giác khi ăn của que mè.
    snap_installation_method:
      name: Phương pháp cài đặt nhanh
      description: Cách lắp/gắn móc cài vào vật liệu dự án.
    snare_drum_bearing_edge_profile:
      name: Hồ sơ cạnh ổ trục trống snare
      description: Đường cắt/hình dạng cạnh chịu lực của vỏ trống snare.
    snare_drum_finish_type:
      name: Kiểu lớp phủ hoàn thiện của trống Snare
      description: Chất liệu/kỹ thuật hoàn thiện cao cấp được sử dụng trên vỏ trống
        snare.
    snare_drum_hoop_type:
      name: Loại vành trống Snare
      description: Loại đai/vành được sử dụng trên trống Snare.
    snare_drum_mounting_type:
      name: Kiểu lắp đặt trống Snare
      description: Cách lắp đặt/sử dụng trống snare đúng cách.
    snare_drum_shell_material:
      name: Vật liệu vỏ trống snare
      description: Chỉ định loại kim loại/hợp kim được sử dụng cho vỏ trống snare
        (phần thân chính), yếu tố ảnh hưởng mạnh mẽ đến âm thanh, trọng lượng và độ
        bền.
    snare_drum_strainer_mechanism:
      name: Cơ chế căng dây trống bẫy
      description: Loại cơ chế căng/thả dây rè được sử dụng để đóng/mở các sợi dây
        rè của trống Snare.
    snare_drum_strainer_type:
      name: Loại lưới lọc trống bẫy
      description: Loại cơ chế căng/thả dây rè được sử dụng để đóng/mở các sợi dây
        rè.
    snare_hoop_type:
      name: Loại vòng snare
      description: Loại vành/vành trống trên trống snare.
    snare_throw_off_type:
      name: Loại bật dây bẫy
      description: Loại cơ cấu căng/tháo dây dùng để gài/tháo các dây bẫy.
    snip_cutter_spring_mechanism:
      name: Cơ chế lò xo của kìm cắt
      description: Cho biết liệu máy cắt có sử dụng cơ chế lò xo/hồi phục hay không
        và kiểu dáng của cơ chế đó.
    snorkel_mount_position:
      name: Vị trí gắn ống thở
      description: Mô tả vị trí đặt ống thở trên đầu người dùng trong quá trình sử
        dụng.
    snorkel_top_type:
      name: Loại áo lặn
      description: Mô tả kiểu thiết kế bảo vệ chống nước xâm nhập ở đầu ống thở đi
        kèm trong bộ sản phẩm.
    snow_condition_suitability:
      name: Điều kiện tuyết phù hợp
      description: Mô tả các điều kiện tuyết chính mà loại sáp này được thiết kế để
        sử dụng.
    snow_sports_helmet_safety_certification:
      name: Chứng nhận an toàn mũ bảo hiểm cho các môn thể thao trên tuyết
      description: Xác định tiêu chuẩn an toàn mà mũ bảo hiểm đáp ứng để sử dụng khi
        trượt tuyết và trượt ván trên tuyết.
    snowboard_base_material:
      name: Vật liệu đế ván trượt tuyết
      description: Xác định thành phần cơ bản hoặc lớp hoàn thiện (các loại ép đùn,
        thiêu kết, công thức độc quyền) ảnh hưởng đến tốc độ, độ bền và bảo trì.
    snowboard_width_class:
      name: Lớp chiều rộng ván trượt tuyết
      description: 'Phân loại chiều rộng tổng thể của ván trượt so với kích cỡ giày
        (ví dụ: Thông thường, Rộng).'
    soccer_ball_compartment_type:
      name: Loại ngăn đựng bóng đá
      description: Xác định cách thức (hoặc liệu) ba lô có thể chứa được quả bóng
        đá hay không.
    soccer_ball_type:
      name: Loại quả bóng đá
      description: 'Mục này chỉ rõ mục đích sử dụng hoặc kiểu dáng của quả bóng đá
        (ví dụ: bóng thi đấu, bóng tập luyện, bóng đá trong nhà) để người mua sắm
        có thể nhanh chóng tìm thấy loại bóng phù hợp mà không cần phải xem qua nhiều
        danh mục phụ.'
    soccer_dummy_base_type:
      name: Mô hình cơ bản bóng đá
      description: Mô tả kiểu dáng của đế hoặc cơ chế neo giữ mà hình nộm sử dụng.
    soccer_dummy_design:
      name: Thiết kế hình nộm bóng đá
      description: Chỉ định kiểu cấu tạo của hình nộm khung thành bóng đá, chẳng hạn
        như cứng hoặc bơm hơi.
    soccer_goal_target_style:
      name: Kiểu mục tiêu khung thành bóng đá
      description: Xác định hình dạng vật lý hoặc thiết kế của mục tiêu huấn luyện
        để người mua sắm có thể chọn kiểu dáng phù hợp nhất với các bài tập của họ.
    soccer_goal_type:
      name: Loại khung thành bóng đá
      description: 'Chỉ định kiểu cấu trúc hoặc mục đích sử dụng của khung thành (ví
        dụ: khung thành bật lên, khung thành bật lại, khung thành đường phố).'
    sock_cushioning:
      name: Độ đệm của tất chân
      description: Chỉ số này cho biết lượng và kiểu đệm lót dưới lòng bàn chân được
        tích hợp trong tất.
    sock_cushioning_level:
      name: Mức độ đệm của tất
      description: Chỉ định lượng lớp đệm dưới lòng bàn chân được tích hợp vào tất.
    sock_grip_type:
      name: Loại tất có độ bám
      description: Mô tả bất kỳ đặc điểm nào về độ bám hoặc khả năng chống trơn trượt
        được áp dụng cho đế tất.
    sock_toe_style:
      name: Kiểu tất chân
      description: Mô tả kiểu dáng cấu tạo của phần mũi tất.
    soft_bait_style:
      name: Kiểu mồi mềm
      description: 'Phân loại thiết kế hoặc hình dạng thân của mồi câu bằng nhựa mềm
        (ví dụ: mồi giun, mồi bơi, mồi sâu).'
    soft_top_attachment_type:
      name: Kiểu gắn mui mềm
      description: Xác định cách mui mềm được gắn vào xe (rãnh, khóa bấm, khóa dán,
        v.v.).
    soft_top_includes_frame_hardware:
      name: Mui mềm bao gồm khung/trang thiết bị
      description: Cho biết sản phẩm có bao gồm khung/vòm mui mềm và/hoặc trang thiết
        bị lắp đặt hay không.
    soft_top_installation_type:
      name: Kiểu lắp đặt mui mềm
      description: Mô tả cách lắp đặt/gắn mui mềm xe, nêu rõ phương pháp lắp đặt dự
        kiến và lực cần thiết.
    soft_top_window_configuration:
      name: Cấu hình cửa sổ mui mềm
      description: Cho biết mui mềm có bao nhiêu cửa sổ và vị trí của từng cửa sổ.
    softball_certification:
      name: Chứng nhận tiêu chuẩn của bóng mềm
      description: Liệt kê các con dấu hoặc phê duyệt của cơ quan quản lý được in
        trên quả bóng, quyết định tính hợp lệ của giải đấu/trận đấu.
    softness_level:
      name: Mức độ mềm mại
      description: Chỉ số này cho biết độ mềm/mỏng của mặt vòng, có liên quan đến
        sự thoải mái khi tiếp xúc với da và các ứng dụng ít cồng kềnh.
    solar_system_model_included_bodies:
      name: Mô hình hệ mặt trời bao gồm các thiên thể
      description: Cho biết những thiên thể nào được thể hiện trong bộ mô hình.
    solar_system_model_scaling:
      name: Mô hình hệ mặt trời thu nhỏ
      description: Cho biết mô hình hệ mặt trời có được vẽ theo tỷ lệ chính xác về
        kích thước hành tinh, khoảng cách/quỹ đạo, hay cả hai, hoặc chỉ là một biểu
        diễn sơ lược/không theo tỷ lệ.
    sold_secure_certification_level:
      name: Mức độ chứng nhận an toàn đã bán
      description: Ghi rõ xếp hạng Sold Secure do tổ chức kiểm định độc lập của Anh
        cấp (Đồng, Bạc, Vàng, Kim cương) cho ổ khóa.
    sold_secure_rating:
      name: Đã bán Xếp hạng an toàn
      description: Cho biết cấp độ chứng nhận Sold Secure được gán cho khóa.
    sole_construction:
      name: Kết cấu đế giày
      description: Thông tin này cho biết cấu tạo của đế giày (nguyên khối, tách rời,
        hai mảnh, v.v.), ảnh hưởng trực tiếp đến độ linh hoạt, khả năng tiếp xúc với
        sàn và sự phù hợp với các kỹ thuật nhảy cụ thể.
    sole_type:
      name: Loại đế
      description: Mô tả kiểu dáng cấu trúc của đế giày, thể hiện độ linh hoạt và
        mục đích sử dụng.
    soprano_saxophone_body_style:
      name: Kiểu dáng thân kèn saxophone soprano
      description: Mô tả cấu tạo vật lý của thân kèn saxophone soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Loại vách ngăn trong ống thổi của kèn Soprano Saxophone
      description: Mô tả thiết kế vách ngăn/mái của ống ngậm (đường viền phía sau
        đầu ống), ảnh hưởng đến độ sáng, độ vang và độ nhạy.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Kích thước buồng âm trong ống thổi của kèn Soprano Saxophone
      description: Mô tả kích thước khoang bên trong của ống ngậm kèn saxophone soprano,
        yếu tố ảnh hưởng đến lực cản và màu sắc âm thanh.
    soprano_saxophone_mouthpiece_finish:
      name: Lớp phủ hoàn thiện ống thổi của kèn Soprano Saxophone
      description: Lớp phủ/mạ bề mặt được áp dụng cho phần ngậm (nếu có).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Bao gồm phụ kiện cho kèn saxophone soprano
      description: Xác định các phụ kiện đi kèm với ống ngậm.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Đặc tính âm sắc của ống ngậm kèn saxophone soprano
      description: Đặc điểm âm thanh cao cấp thường thấy ở thiết kế ống ngậm.
    sound_character:
      name: Đặc điểm âm thanh
      description: Mô tả âm sắc tổng thể được tạo ra bởi trò hề.
    sound_expansion_method:
      name: Phương pháp mở rộng âm thanh
      description: 'Chỉ định cách mô-đun có thể thêm hoặc mở rộng thư viện âm thanh
        nội bộ của nó ngoài các âm thanh mặc định của nhà sản xuất (ví dụ: gói nội
        dung, nhập mẫu, thẻ mở rộng).'
    sound_module_sound_library_focus:
      name: Thư viện âm thanh mô-đun âm thanh tập trung
      description: Mục tiêu chính của bộ âm thanh mặc định từ nhà máy là giúp người
        mua sắm tìm được mô-đun phù hợp với phong cách/trường hợp sử dụng của họ.
    sound_port_type:
      name: Loại lỗ thoát âm
      description: Mô tả thiết kế lỗ thoát âm/cổng thoát âm ở phía sau trống cajon,
        yếu tố ảnh hưởng đến độ vang và khả năng tái tạo âm trầm.
    sound_sensitivity_control:
      name: Điều khiển độ nhạy âm thanh
      description: Cho biết liệu độ nhạy âm thanh có thể điều chỉnh được hay không
        và điều chỉnh như thế nào.
    sound_synthesizer_patch_memory:
      name: bộ nhớ vá âm thanh của bộ tổng hợp âm thanh
      description: Cho biết liệu bộ tổng hợp âm thanh có thể lưu trữ và gọi lại các
        thiết lập sẵn (bản vá) hay không.
    sound_type:
      name: Loại âm thanh
      description: 'Loại âm thanh chính hoặc đầu ra âm thanh mà tấm thảm tạo ra (ví
        dụ: nhạc cụ, bài hát, lời nhắc bằng giọng nói) để hướng dẫn trò chơi.'
    soundboard_material:
      name: Vật liệu bảng âm thanh
      description: Vật liệu được sử dụng cho mặt đàn hạc (phần trên) giúp tạo ra âm
        vang và âm sắc.
    soup_or_broth_variety:
      name: Loại súp hoặc nước dùng
      description: Thông tin này chỉ rõ kiểu dáng, công thức hoặc cách chế biến món
        súp hoặc nước dùng để người mua sắm có thể nhanh chóng tìm thấy loại mình
        muốn.
    sour_cream_variety:
      name: Loại kem chua
      description: Phân loại các sản phẩm kem chua theo giống hoặc phong cách văn
        hóa cụ thể, chẳng hạn như crème fraîche hoặc Mexican crema.
    soy_sauce_variety:
      name: Loại nước tương
      description: 'Công cụ này xác định kiểu dáng hoặc công thức cụ thể của nước
        tương (ví dụ: nước tương nhạt, nước tương đậm, tamari, ponzu), cho phép người
        mua sắm nhanh chóng lọc theo hương vị và mục đích sử dụng trong nấu nướng.'
    spark_plug_electrode_material:
      name: Vật liệu điện cực bugi
      description: 'Vật liệu/công nghệ của đầu điện cực đánh lửa (điện cực trung tâm
        và/hoặc điện cực nối đất) của bugi, theo thông số kỹ thuật trên thị trường
        (ví dụ: đồng, bạch kim, iridi).'
    spark_plug_seat_type:
      name: Loại đế bugi
      description: Kiểu gioăng/đế van được bugi sử dụng tại vị trí tiếp xúc với đầu
        xi lanh.
    spark_plug_terminal_type:
      name: Loại đầu nối bugi
      description: Kiểu đầu nối trên cùng được sử dụng để kết nối dây/vỏ bọc đánh
        lửa.
    sparkler_shape:
      name: Hình dạng pháo hoa
      description: Nhìn chung, pháo hoa có hình dạng/kiểu dáng độc đáo.
    speaker_cone_material:
      name: Vật liệu nón loa
      description: Vật liệu chính của màng loa (loa trầm/loa trung).
    speaker_size:
      name: Kích thước loa
      description: 'Kích thước danh nghĩa của củ loa / kích thước lắp đặt cho loa
        thành phần (ví dụ: 6,5 inch, 6x9 inch), được sử dụng để phù hợp với vị trí
        lắp đặt sẵn có và bộ chuyển đổi loa của nhà sản xuất.'
    special_effects_output_interface:
      name: Giao diện đầu ra hiệu ứng đặc biệt
      description: Chỉ định đầu nối/giao diện đầu ra được sử dụng để điều khiển các
        thiết bị hiệu ứng đặc biệt.
    special_effects_stand_stability_features:
      name: Đặc điểm ổn định của giá đỡ hiệu ứng đặc biệt
      description: Chỉ định các tính năng ổn định và an toàn tích hợp nhằm ngăn ngừa
        lật đổ hoặc trượt trong các sự kiện.
    specialty_malt_name_type:
      name: Tên/loại mạch nha đặc biệt
      description: Xác định loại mạch nha đặc biệt cụ thể (thường được sử dụng làm
        tên thương mại của loại mạch nha đó).
    specimen_presentation:
      name: Trình bày mẫu vật
      description: 'Cho biết cách thức chuẩn bị hoặc trình bày mẫu vật sưu tầm (ví
        dụ: thô/chưa qua xử lý, được đánh bóng, cắt hoặc gắn kết).'
    speed_bag_accessories_included:
      name: Phụ kiện đi kèm của bóng phản xạ tốc độ
      description: Liệt kê các vật dụng bổ sung được cung cấp kèm theo bao cát tốc
        độ, chẳng hạn như găng tay, bơm hơi, khớp xoay, dây xích hoặc giá đỡ.
    speed_rating:
      name: Tốc độ định mức
      description: 'Chỉ số này cho biết tốc độ bề mặt chơi do vải phủ bàn bi-a tạo
        ra (ví dụ: chậm, trung bình hoặc nhanh).'
    speedometer_backlight_type:
      name: Loại đèn nền đồng hồ tốc độ
      description: Chỉ định xem đồng hồ tốc độ có được chiếu sáng nền để dễ nhìn vào
        ban đêm hay không và cách thức chiếu sáng.
    speedometer_display_type:
      name: Loại hiển thị đồng hồ tốc độ
      description: 'Chỉ định kiểu hiển thị tốc độ của đồng hồ tốc độ: kim/mặt số analog,
        hiển thị số kỹ thuật số, hoặc sự kết hợp giữa các yếu tố analog và kỹ thuật
        số.'
    speedometer_unit_of_measure:
      name: Đơn vị đo tốc độ
      description: Chỉ định đơn vị tốc độ hiển thị trên mặt số/màn hình.
    spike_replaceability:
      name: Khả năng thay thế gai
      description: Cho biết liệu các gai trên giày có thể thay thế được, cố định hay
        giày không có gai.
    spike_shape:
      name: Hình dạng gai
      description: Xác định kiểu hình học của đầu đinh gai, yếu tố ảnh hưởng đến độ
        bám và sự phù hợp với các bề mặt đường đua khác nhau.
    spike_thread_size:
      name: Kích thước ren của đinh giày
      description: 'Chỉ định kích thước hoặc tiêu chuẩn của đế ren dùng để vặn vào
        giày (ví dụ: 1/4-20).'
    spin_classification:
      name: Phân loại độ xoáy
      description: Chỉ định kiểu quay mà đĩa ném được thiết kế (quay thấp, trung bình,
        cao, siêu nhanh).
    spin_profile:
      name: Biên dạng xoáy
      description: Xác định các đặc tính quay tương đối mà trục tạo ra.
    spin_types_supported:
      name: Các loại spin được hỗ trợ
      description: Liệt kê các loại độ xoáy mà máy có thể tạo ra cho bóng để người
        chơi có thể luyện tập với các kiểu đánh khác nhau.
    spinach_preparation_style:
      name: Phong cách chế biến rau bina
      description: 'Mô tả cách chế biến lá rau bina hoặc dạng sản phẩm (ví dụ: lá
        nguyên, thái nhỏ, cắt khối).'
    spinach_variety:
      name: Giống rau bina
      description: 'Giúp xác định giống rau bina (ví dụ: rau bina non, rau bina savoy,
        rau bina nước, rau bina đỏ), cho phép người mua sắm chọn đúng loại họ muốn.'
    spindle_bearing_surface_material:
      name: Vật liệu bề mặt ổ trục chính
      description: Vật liệu của bề mặt tiếp xúc/ổ trục được sử dụng trong các trục
        đỡ (đầu/đáy), ảnh hưởng đến độ nhẵn và độ mài mòn.
    spindle_bearing_type:
      name: Loại vòng bi trục chính
      description: Loại giao diện đầu trục/ổ trục giúp giảm ma sát với bát/cốc đỡ.
    spindle_finish:
      name: Hoàn thiện trục chính
      description: Lớp phủ/hoàn thiện bề mặt của trục quay ảnh hưởng đến cảm giác,
        độ bền và tính thẩm mỹ.
    spindle_hook_type:
      name: Loại móc trục chính
      description: Cơ cấu giữ sợi ở phía trên trục quay được sử dụng để cố định sợi
        dẫn/sợi chỉ.
    spindle_support_method:
      name: Phương pháp hỗ trợ trục chính
      description: Cách thức đỡ trục quay trong quá trình kéo sợi.
    spindle_tip_style:
      name: Kiểu đầu trục chính
      description: Hình dạng/thiết kế của điểm tiếp xúc với bát/cốc (bề mặt chịu lực),
        ảnh hưởng đến ma sát và độ trơn tru khi quay.
    spindle_whorl_position:
      name: Vị trí con quay trục chính
      description: Vị trí của con quay trên trục chính.
    spinner_blade_shape:
      name: Hình dạng lưỡi quay
      description: Xác định hình dạng lưỡi chính được sử dụng trên mồi câu xoay, ảnh
        hưởng đến độ rung, độ sáng và độ sâu khi hoạt động.
    spinner_control_card_design_type:
      name: Thiết kế/loại thẻ điều khiển máy quay sợi
      description: 'Mô tả loại thẻ điều khiển máy quay sợi về cách nó trình bày thông
        tin điều khiển (ví dụ: tham chiếu tỷ lệ, tham chiếu lực căng, bảng chuyển
        đổi).'
    spinner_subtype:
      name: Loại phụ của mồi cá giả spinner
      description: 'Phân loại thiết kế tổng thể hoặc dòng sản phẩm mồi câu (ví dụ:
        mồi câu xoay thẳng hàng, mồi câu xoay).'
    spinning_oil_application_area:
      name: Khu vực ứng dụng dầu quay
      description: Chỉ định điểm (các điểm) dự định bôi dầu lên bánh xe quay.
    spinning_oil_application_tool:
      name: Dụng cụ tra dầu kéo sợi
      description: Chỉ định kiểu đầu bôi/đầu đóng gói được sử dụng để bôi dầu lên
        các bộ phận của bánh xe quay nhằm kiểm soát liều lượng.
    spinning_oil_features:
      name: Đặc điểm dầu quay
      description: Bài viết nêu bật các đặc tính chức năng liên quan đến dầu bôi trơn
        cho máy kéo sợi (cặn bẩn, vết ố, quá trình oxy hóa và khả năng giặt rửa).
    spinning_top_features:
      name: Tính năng của con quay đồ chơi
      description: Ngoài chức năng quay cơ bản, con quay còn có những tính năng chơi
        đặc biệt khác.
    spinning_top_launch_mechanism:
      name: Cơ chế phóng con quay
      description: Cách thức khởi động/đẩy con quay để quay.
    spinning_wheel_brake_tension_system_type:
      name: Loại hệ thống phanh/căng của bánh xe quay
      description: Chỉ định hệ thống lực căng phanh/thu sợi được sử dụng để kiểm soát
        việc thu sợi.
    spinning_wheel_drive_system:
      name: Hệ thống truyền động bánh xe quay
      description: Cho biết hệ thống truyền động mà cuộn chỉ này được thiết kế cho.
    spinning_wheel_hook_system:
      name: Hệ thống móc quay sợi
      description: Xác định cách sợi chỉ được dẫn hướng dọc theo các cánh tay của
        máy dệt.
    spinning_wheel_part_application:
      name: Ứng dụng bộ phận của bánh xe quay
      description: Chỉ rõ loại dầu này dành cho những bộ phận nào của bánh xe quay
        sợi.
    spinning_wheel_portability_foldability:
      name: Tính di động/khả năng gấp gọn của khung dệt
      description: Cho biết bánh xe có được thiết kế để gập/thu gọn khi vận chuyển
        hay không.
    spinning_wheel_tension_adjustment_type:
      name: Loại điều chỉnh độ căng của bánh xe quay
      description: Cách điều chỉnh độ căng trên bánh xe để kiểm soát việc cuốn chỉ.
    splice_termination_type:
      name: Loại nối/kết thúc
      description: 'Chỉ định đầu bịt kín được cung cấp trên dây neo (ví dụ: mắt nối,
        khuyên, móc xích).'
    split_shot_cut_type:
      name: kiểu cắt ảnh chia đôi
      description: Chỉ định kiểu rãnh hoặc khe hở cho phép gắn vào đường ống.
    split_shot_shape:
      name: Hình dạng tách rời
      description: Mô tả hình dạng vật lý của chì tách đôi, ảnh hưởng đến động lực
        học thủy văn và khả năng chống vướng mắc.
    split_shot_size:
      name: Kích thước chì câu dạng tách rời
      description: 'Mã kích thước chữ số tiêu chuẩn (ví dụ: SSG, AAA, BB, 1) được
        các nhà sản xuất và người câu cá sử dụng để phân loại chì câu dạng tách rời.
        Bổ sung cho các phép đo trọng lượng chính xác.'
    spoiler_adjustability:
      name: Khả năng điều chỉnh cánh gió
      description: Cho biết góc/chiều cao của cánh gió có thể điều chỉnh được hay
        không.
    spoke_accessory_function:
      name: Chức năng phụ kiện nan hoa
      description: Phân loại chức năng chính của phụ kiện trên bánh xe, chẳng hạn
        như trang trí, phản quang hoặc chiếu sáng.
    spoke_butting_profile:
      name: Hồ sơ về việc đâm vào nan hoa
      description: Mô tả sự thay đổi đường kính nan hoa dọc theo chiều dài của nó
        (nan hoa trơn, đơn, đôi, ba hoặc bốn đầu vát), ảnh hưởng đến trọng lượng và
        độ bền.
    spoke_gauge:
      name: Độ dày nan hoa
      description: Chỉ định kích thước (độ dày dây) của nan hoa mà đầu nối tương thích.
    spoke_interface_type:
      name: Kiểu khớp nối của nan hoa
      description: Chỉ định kiểu đầu nan hoa mà moay ơ được thiết kế cho (hình chữ
        J, thẳng, hình chữ T).
    spoke_shape:
      name: Hình dạng nan hoa
      description: Thông số này xác định tiết diện bên ngoài của dây nan hoa, yếu
        tố ảnh hưởng đến tính khí động học và thẩm mỹ.
    spool_form_factor:
      name: Định dạng của cuộn dây
      description: 'Kiểu dáng vật lý của thân ống chỉ và cách giữ chỉ/sợi chỉ (ví
        dụ: dạng vành so với dạng hình nón).'
    spoon_style:
      name: Kiểu thìa
      description: Chỉ định loại hoặc kiểu chức năng của mồi câu, chẳng hạn như câu
        ném, câu rung hoặc câu kéo.
    sports_bra_padding_type:
      name: Loại đệm áo ngực thể thao
      description: Chỉ định loại đệm được sử dụng trong áo ngực thể thao.
    sports_cap_style:
      name: Kiểu mũ thể thao
      description: 'Xác định kiểu dáng/cấu trúc tổng thể của mũ (ví dụ: mũ lưỡi trai,
        mũ snapback), không phụ thuộc vào thương hiệu của đội.'
    sports_governing_body_certification:
      name: Chứng nhận của cơ quan quản lý thể thao
      description: Ghi chú này cho biết sản phẩm có chứng nhận hoặc phê duyệt chính
        thức từ các tổ chức quản lý thể thao được công nhận, xác nhận rằng sản phẩm
        đáp ứng các tiêu chuẩn thi đấu.
    sports_surface_compatibility:
      name: Khả năng tương thích với bề mặt sân thể thao
      description: Liệt kê các loại bề mặt hoặc đồ chơi mà loại sơn này có thể được
        sử dụng một cách an toàn.
    sports_toy_set_contents:
      name: Nội dung bộ đồ chơi thể thao
      description: 'Xác định các thành phần có trong bộ đồ chơi thể thao (ví dụ: bóng,
        gậy, lưới, bia tập).'
    spray_string_cleanup_method:
      name: Phương pháp làm sạch bằng cách phun sương
      description: Cách được khuyến nghị để loại bỏ/làm sạch cặn bám trên sợi xịt.
    spray_string_finish_effect:
      name: Hiệu ứng/lớp phủ dạng sợi phun
      description: Hiệu ứng thị giác của sợi dây phun sau khi thi công (độ bóng/độ
        phản chiếu và các hiệu ứng đặc biệt).
    spray_string_formulation_type:
      name: Loại công thức dây phun
      description: 'Tính chất của sản phẩm trong và sau khi xịt (ví dụ: có thể gội
        sạch hay giữ nếp lâu dài).'
    spray_string_recommended_surface:
      name: Dây phun được khuyến nghị cho bề mặt
      description: Các loại bề mặt mà dây phun được thiết kế để sử dụng (và có khả
        năng làm sạch).
    spray_string_scent:
      name: Mùi hương của dây xịt
      description: Mùi hương hoặc đặc điểm mùi (nếu có) của dây xịt.
    spray_string_suitable_age_group:
      name: Dây xịt phù hợp với nhóm tuổi
      description: Độ tuổi/nhóm tuổi tối thiểu được khuyến nghị để sử dụng an toàn.
    spread_consistency:
      name: Lan tỏa sự nhất quán
      description: 'Mô tả kết cấu/độ đặc của món chấm hoặc phết để tạo kỳ vọng về
        cảm giác khi ăn và cách sử dụng (ví dụ: mịn, đặc, bông xốp).'
    spread_variety:
      name: Lan tỏa sự đa dạng
      description: 'Phân loại các loại mứt trái cây cụ thể (ví dụ: mứt, thạch, mứt
        cam, sữa đông) để người mua sắm có thể phân biệt giữa các kiểu chế biến và
        kết cấu khác nhau.'
    spreader_bar_type:
      name: Loại thanh giằng ngang
      description: Chỉ định loại thanh giằng hoặc hệ thống móc được cung cấp hoặc
        tương thích với bộ dây đai.
    sprint_canoe_class:
      name: Hạng thuyền kayak nước rút
      description: Xác định hạng mục thi đấu chính thức của cuộc đua thuyền kayak
        nước rút.
    sprout_presentation:
      name: Bài thuyết trình về mầm cây
      description: 'Xác định hình thức trình bày vật lý của sản phẩm (ví dụ: giá đỗ
        tươi, rau mầm, chậu trồng sống, dạng bột).'
    squash_and_gourd_variety:
      name: Các loại bí và bầu
      description: Giúp người mua sắm nhanh chóng tìm thấy loại bí hoặc bầu mà họ
        mong muốn, nhờ đó xác định được giống hoặc chủng loại cụ thể trên thị trường.
    stability_class:
      name: Lớp ổn định
      description: Phân loại độ ổn định tổng quát dựa trên xếp hạng chuyến bay hoặc
        các tuyên bố tiếp thị.
    stabilizer_thread_size:
      name: Kích thước sợi ổn định
      description: Thông số ren dùng để gắn bộ ổn định hoặc phụ kiện vào cung hoặc
        nỏ.
    stabilizer_type:
      name: Loại bộ ổn định
      description: Xác định kiểu dáng hoặc phân loại vị trí của bộ phận ổn định cung
        hoặc nỏ.
    stages_supported:
      name: Các giai đoạn được hỗ trợ
      description: Cho biết tên lửa hoặc bộ dụng cụ được thiết kế để bay với bao nhiêu
        tầng.
    stain_remover_format:
      name: Định dạng chất tẩy vết bẩn
      description: Chỉ định dạng/hình thức sản phẩm được sử dụng để xử lý vết bẩn
        trên xe (bình xịt, bình phun, bọt, gel, bột, khăn lau, bút/bút dạ).
    stake_shape:
      name: Hình dạng cọc
      description: Thuộc tính này xác định mặt cắt ngang hoặc kiểu thiết kế của cọc
        lều, yếu tố ảnh hưởng đến khả năng giữ chắc cọc trên các loại địa hình khác
        nhau.
    stamp_block_features:
      name: Đặc điểm của khối đóng dấu
      description: Bài viết nêu bật các tính năng hữu ích của khối đóng dấu như lưới
        đo, tay cầm hoặc bề mặt chống trơn trượt.
    stamp_block_type:
      name: Loại khối đóng dấu
      description: 'Chỉ định cấu tạo/kiểu dáng của khối đóng dấu được sử dụng để gắn
        tem khi đóng dấu (ví dụ: khối acrylic trong suốt, khối gắn trên gỗ hoặc khối
        định vị).'
    stamp_set_pieces_included:
      name: Các chi tiết đi kèm trong bộ tem
      description: 'Cho biết các thành phần nào được bao gồm trong bộ tem và khay
        mực (ví dụ: tem, khay mực, bút đánh dấu).'
    stand_padding_material:
      name: Chất liệu đệm của giá đỡ
      description: 'Vật liệu được sử dụng tại các điểm tiếp xúc để bảo vệ lớp hoàn
        thiện của dụng cụ (ví dụ: xốp, cao su, silicon).'
    staple_fiber_animal_fiber_type:
      name: Sợi xơ ngắn, loại sợi động vật.
      description: Loại sợi có nguồn gốc động vật cụ thể khi nguồn sợi chính là động
        vật.
    staple_fiber_crimp_level:
      name: Mức độ uốn sợi ngắn
      description: Độ xoăn/gợn sóng tự nhiên của sợi vải.
    staple_fiber_preparation_type:
      name: Loại chuẩn bị sợi ngắn
      description: Tình trạng chuẩn bị/xử lý của sợi khi bán (cách sắp xếp/xử lý)
        ảnh hưởng mạnh mẽ đến phương pháp kéo sợi, độ dễ dàng khi kéo giãn và kết
        quả cuối cùng.
    staple_fiber_source_type:
      name: Loại nguồn sợi chính
      description: Phân loại nguồn gốc rộng cho hàm lượng chất xơ.
    starch_processing_type:
      name: Loại xử lý tinh bột
      description: 'Cho biết tinh bột là loại tự nhiên hay đã được biến đổi vật lý
        hoặc hóa học (ví dụ: tinh bột hòa tan nhanh, tinh bột tiền hồ hóa) để mang
        lại các đặc tính chức năng cụ thể như tốc độ làm đặc hoặc khả năng chịu nhiệt.'
    starch_source:
      name: Nguồn tinh bột
      description: 'Chỉ định nguồn gốc thực vật của tinh bột nấu ăn hoặc chất làm
        đặc (ví dụ: ngô, khoai tây, sắn). Nguồn gốc là yếu tố khác biệt chính đối
        với tinh bột dùng trong nấu ăn và ảnh hưởng trực tiếp đến tính phù hợp của
        công thức nấu ăn, các vấn đề liên quan đến chất gây dị ứng và hành vi tìm
        kiếm của người tiêu dùng.'
    starfruit_variety:
      name: Giống quả khế
      description: 'Xác định giống hoặc chủng loại cụ thể của cây khế (ví dụ: Arkin,
        Fwang Tung).'
    starter_drive_type:
      name: Kiểu truyền động bộ khởi động
      description: Cơ cấu truyền động/ăn khớp khởi động được sử dụng để ăn khớp bánh
        răng nhỏ với bánh răng lớn.
    starter_pistol_action_type:
      name: Loại súng lục khởi động
      description: 'Xác định cơ chế hoạt động/bắn của súng lục khởi động (ví dụ: tác
        động đơn, tác động kép, bán tự động).'
    starter_pistol_caliber:
      name: Cỡ nòng súng lục khởi động
      description: Chỉ định loại đạn không đầu hoặc cỡ nòng hộp đạn mà súng lục khởi
        động được thiết kế để sử dụng.
    starter_terminal_type:
      name: Loại đầu nối củ đề
      description: 'Chỉ định kiểu đầu nối/cọc đấu dây được sử dụng cho các kết nối
        điện trên bộ khởi động hoặc cuộn dây khởi động (ví dụ: đầu nối dạng đinh tán,
        dạng dẹt, dạng phích cắm).'
    starting_block_anchoring_method:
      name: Phương pháp neo khối khởi đầu
      description: 'Mô tả cách các khối được cố định vào bề mặt đường ray (ví dụ:
        đinh tán, giác hút, miếng đệm cao su).'
    steerer_tube_design:
      name: Thiết kế ống lái
      description: Mô tả thiết kế cấu trúc của ống lái – thẳng, côn, có ren, v.v.
        – yếu tố quyết định khả năng tương thích giữa bộ chén cổ và khung xe.
    steering_cable_end_fitting_type:
      name: Kiểu khớp nối đầu cáp lái
      description: Xác định kiểu đấu nối/gắn ở hai đầu dây cáp lái của tàu thuyền
        (đầu tay lái và đầu động cơ/cần lái) để đảm bảo tính tương thích với các điểm
        kết nối của tay lái và động cơ. Sử dụng tên gọi tiêu chuẩn hoặc tên gọi của
        nhà sản xuất nếu có.
    steering_column_adjustability_features:
      name: Các tính năng điều chỉnh cột lái
      description: Cho biết các chức năng điều chỉnh nào được tích hợp sẵn trong cột
        lái.
    steering_column_ignition_provision:
      name: Cung cấp hệ thống đánh lửa cột lái
      description: Cho biết liệu trụ lái có được thiết kế để lắp đặt xi lanh/công
        tắc khóa điện và/hoặc khóa vô lăng hay không.
    steering_column_shaft_end_interface_type:
      name: Kiểu giao diện đầu trục cột lái
      description: 'Xác định kiểu giao diện đầu trục lái (ví dụ: có khía, hình chữ
        D kép, có rãnh then).'
    steering_column_shift_type:
      name: Loại cần số trên cột lái
      description: Xác định xem cột lái có bao gồm cơ cấu chuyển số gắn trên cột lái
        hay không và loại hộp số của nó.
    steering_component_drive_type:
      name: Loại truyền động của bộ phận lái
      description: Chỉ định cơ chế dẫn động/hỗ trợ liên quan đến các bộ phận lái (đặc
        biệt là bơm và hệ thống EPS).
    steering_position:
      name: Vị trí lái
      description: Xác định xem xe tải nhỏ là loại tay lái bên trái hay tay lái bên
        phải.
    steering_pump_pulley_type:
      name: Loại puly bơm trợ lực lái
      description: Chỉ định loại/giao diện truyền động puly được sử dụng với bơm trợ
        lực lái.
    steering_rack_finish_coating:
      name: Lớp phủ/hoàn thiện của thước lái
      description: Chỉ định lớp phủ/lớp hoàn thiện bên ngoài để chống ăn mòn.
    steering_rack_position:
      name: Vị trí của thước lái
      description: Xác định vị trí lắp đặt/sử dụng thanh răng trong hệ thống lái của
        xe.
    steering_wheel_cover_installation_type:
      name: Kiểu lắp đặt bọc vô lăng
      description: Cách lắp/cố định bọc vô lăng vào vô lăng.
    steering_wheel_grip_material:
      name: Vật liệu bọc tay lái
      description: Chỉ định vật liệu trên vành/tay nắm bánh xe (nơi tay tiếp xúc),
        có thể khác với lõi/nan hoa của bánh xe.
    steering_wheel_mounting_pattern:
      name: Mẫu lắp đặt vô lăng
      description: 'Chỉ định kiểu bố trí bu lông/lỗ được sử dụng để gắn vô lăng vào
        trục hoặc bộ chuyển đổi (ví dụ: 3 bu lông, 5 bu lông).'
    steering_wheel_rim_material_grip_surface:
      name: Chất liệu vành vô lăng (bề mặt cầm nắm)
      description: Chỉ định vật liệu bọc vành/tay cầm chính (khác với vật liệu cấu
        tạo tổng thể).
    stem_material:
      name: Vật liệu thân cây
      description: 'Chỉ định chất liệu được sử dụng cụ thể cho phần thân hoặc đầu
        hút của tẩu (ví dụ: acrylic, ebonit, lucite).'
    stencil_machine_consumable_type:
      name: Loại vật tư tiêu hao cho máy làm khuôn mẫu
      description: Chỉ định các vật tư tiêu hao cần thiết để vận hành (nếu có).
    step_surface_texture:
      name: Kết cấu bề mặt bậc bước chân
      description: Chỉ định thiết kế/chất liệu bề mặt bậc thang nhằm cải thiện độ
        bám và sự thoải mái khi ướt.
    stepper_motion_type:
      name: Loại chuyển động bước
      description: Xác định chuyển động bước chính mà máy cung cấp.
    stick_bow_profile:
      name: Hồ sơ cung que
      description: Xác định hình dạng cong (hay "kiểu cung") của cán gậy khúc côn
        cầu, một yếu tố quan trọng ảnh hưởng đến khả năng kiểm soát bóng, hiệu suất
        cú đánh kéo và phong cách chơi.
    stick_construction:
      name: Kiểu kết cấu của gậy
      description: Chỉ định kiểu cấu tạo của gậy khúc côn cầu, chẳng hạn như loại
        liền khối, loại hai mảnh hoặc loại bằng gỗ.
    stick_curvature_type:
      name: Loại độ cong của que
      description: Mô tả hình dạng cong của gậy ném, yếu tố ảnh hưởng đến khoảng cách
        và độ chính xác khi ném.
    stick_head_shape:
      name: Hình dạng đầu que
      description: Nó xác định hình dạng của đầu gậy, ảnh hưởng đến khả năng khống
        chế bóng, phong cách đánh bóng và khả năng kiểm soát bóng ở cự ly gần.
    stick_size_compatibility:
      name: Độ tương thích về kích thước gậy
      description: 'Xác định nhóm kích thước gậy khúc côn cầu mà sản phẩm tương thích
        (ví dụ: Thanh thiếu niên, Thiếu niên, Trung cấp, Cao cấp, Thủ môn, Phổ thông).'
    sticker_decal_features:
      name: Đặc điểm của nhãn dán/decal
      description: 'Ghi lại các đặc điểm ứng dụng và hiệu năng cụ thể của nhãn dán/decal
        (ví dụ: không tạo bọt khí, có thể dán lại nhiều lần).'
    sticker_finish:
      name: Lớp phủ hoàn thiện của hình dán
      description: Mô tả độ hoàn thiện bề mặt/hiệu ứng thị giác của nhãn dán.
    sticker_format:
      name: Định dạng nhãn dán
      description: 'Chỉ định hình thức bán lẻ của các nhãn dán trang trí (ví dụ: tờ,
        cuộn, riêng lẻ, tập).'
    sticker_material_type:
      name: Loại vật liệu nhãn dán
      description: Chỉ định chất liệu/lớp nền chính của nhãn dán trang trí (không
        bao gồm các chi tiết trang trí).
    stilt_foot_attachment_type:
      name: Loại gắn chân cà kheo
      description: 'Chỉ định cách người dùng gắn chân vào cà kheo (ví dụ: dây khóa,
        khóa dán, dây buộc).'
    stirrup_style:
      name: Kiểu bàn đạp
      description: Phân loại kiểu dáng bàn đạp theo thiết kế hoặc theo từng bộ môn
        cụ thể, bao gồm các biến thể về an toàn, bộ môn và cấu tạo.
    stirrup_tread_material:
      name: Vật liệu mặt bàn đạp
      description: Chỉ định chất liệu được sử dụng cho phần đế hoặc mặt tiếp xúc của
        bàn đạp, ảnh hưởng đến độ bám, sự thoải mái và độ bền.
    stitch_marker_and_counter_style:
      name: Kiểu đánh dấu mũi khâu và kiểu đếm
      description: 'Chỉ định kiểu dáng hoặc hình dạng của dụng cụ đánh dấu mũi khâu
        hoặc bộ đếm mũi/hàng (ví dụ: dụng cụ đánh dấu có khóa, dụng cụ đánh dấu dạng
        vòng tách rời, bộ đếm dạng vòng, bộ đếm kỹ thuật số).'
    stitch_types:
      name: Các loại đường khâu
      description: Các loại mũi khâu (chức năng và trang trí) mà máy có thể tạo ra.
    stitching_method:
      name: Phương pháp khâu
      description: Thể hiện cách các tấm ghép hình cầu được nối với nhau.
    stitching_state:
      name: Trạng thái khâu
      description: Cho biết các mảnh vải may mặc được cung cấp ở dạng chưa may, may
        một phần, đã may hoàn chỉnh hoặc may sẵn.
    stock_car_race_series:
      name: Loạt giải đua xe stock car
      description: Chỉ định tổ chức quản lý hoặc giải đua/hạng mục mà xe đua được
        chế tạo để tham gia.
    stone_adhesion:
      name: Độ bám dính của hạt
      description: Cho biết hạt đào hoặc hạt xuân đào thuộc loại tách hạt, dính hạt
        hay bán tách hạt.
    stone_creation_method:
      name: Phương pháp tạo tác đá
      description: Xác định xem hạt là tự nhiên, nhân tạo, mô phỏng hay tái chế.
    stone_cut_grade:
      name: Chất lượng cắt hạt
      description: Cho biết đánh giá tổng thể về chất lượng cắt của hạt.
    stone_cut_style:
      name: Kiểu cắt đá
      description: 'Kiểu cắt/mặt của viên đá thủy tinh (ví dụ: cắt giác so với cắt
        cabochon).'
    stone_fruit_cultivar:
      name: Giống cây ăn quả hạch
      description: Xác định giống/loại cụ thể của quả đào hoặc quả xuân đào.
    stone_fruit_variety:
      name: Giống cây ăn quả hạch
      description: 'Phân biệt các loại phụ trong cùng một danh mục (ví dụ: đào, xuân
        đào, đào dẹt/hình bánh rán).'
    stone_setting_type:
      name: Kiểu gắn đá
      description: Chỉ định cách thức cố định đá quý trong món trang sức (khung viền,
        chấu, đính đá, v.v.).
    stone_transparency:
      name: Độ trong suốt của đá
      description: Độ trong suốt/mờ đục quang học của đá thủy tinh.
    storage_case_type:
      name: Loại hộp đựng
      description: 'Cho biết loại hộp đựng sản phẩm để bảo quản và vận chuyển (ví
        dụ: hộp, thùng, túi).'
    storage_compartment_type:
      name: Loại ngăn chứa
      description: Chỉ định loại ngăn chứa đồ mà phao bơi cung cấp để đựng đồ dùng
        cá nhân.
    storage_media_and_transfer_methods_supported:
      name: Các phương tiện lưu trữ và phương pháp truyền tải được hỗ trợ
      description: Các phương tiện hoặc phương thức kết nối được hỗ trợ để nhập/xuất
        mẫu và lưu/tải dự án.
    storage_requirements:
      name: Yêu cầu lưu trữ
      description: Quy định cách bảo quản sản phẩm trước và/hoặc sau khi mở để duy
        trì chất lượng và an toàn.
    stove_jack_compatibility:
      name: Khả năng tương thích của giắc cắm bếp
      description: Cho biết lều có lỗ thoát khói chống cháy dành cho ống khói bếp
        hay không.
    straight_pin_application:
      name: Ứng dụng ghim thẳng
      description: Xác định trường hợp sử dụng dự định cho các ghim thẳng.
    straight_pin_finish:
      name: Hoàn thiện bằng ghim thẳng
      description: 'Mô tả lớp phủ hoặc lớp hoàn thiện bề mặt của chốt (ví dụ: mạ niken)
        ảnh hưởng đến khả năng chống ăn mòn và độ trơn tru.'
    straight_pin_head_material:
      name: Vật liệu đầu kim thẳng
      description: Chỉ định chất liệu của đầu kim (nếu có), chẳng hạn như nhựa hoặc
        thủy tinh.
    straight_pin_head_shape:
      name: Hình dạng đầu kim thẳng
      description: Mô tả hình dạng/kiểu dáng của đầu kim để dễ sử dụng và dễ nhìn
        thấy.
    strand_configuration:
      name: Cấu hình lõi dây
      description: Cho biết có bao nhiêu hàng hoặc sợi riêng biệt tạo nên dây ví (đơn,
        đôi, ba).
    strand_material:
      name: Vật liệu dạng sợi
      description: Chỉ định chất liệu được sử dụng cho từng sợi/dải trang trí riêng
        lẻ.
    strap_attachment_hardware:
      name: Trang thiết bị gắn dây đeo
      description: Chỉ định loại/thiết kế phần cứng được sử dụng để gắn dây đeo vào
        dụng cụ/điểm đỡ.
    strap_configuration:
      name: Cấu hình dây đeo
      description: 'Chỉ số này cho biết số điểm gắn mũ bảo hiểm trên dây đeo (ví dụ:
        2 điểm, 4 điểm), điều này rất quan trọng đối với sự vừa vặn, an toàn và các
        yêu cầu của giải đấu.'
    strap_functionality:
      name: Chức năng dây đeo
      description: Xác định mục đích sử dụng chính hoặc thiết kế của dây đeo thảm
        yoga.
    strap_padding:
      name: Đệm dây đeo
      description: Thể hiện mức độ đệm của dây đeo nhằm cải thiện sự thoải mái và
        phân bổ trọng lượng.
    strap_side:
      name: Mặt dây đeo
      description: Cho biết dây đeo được thiết kế cho vị trí buộc giày bên trái, bên
        phải, hay được bán theo cặp.
    strap_width:
      name: Chiều rộng dây đeo
      description: Chỉ báo độ rộng tương đối của dây đeo vai (mỏng, trung bình, rộng)
        để hướng dẫn người mua hàng tìm kiếm độ che phủ hoặc hỗ trợ cụ thể.
    strength_classification:
      name: Phân loại độ bền
      description: 'Nhãn độ mạnh thường được các thương hiệu sử dụng (ví dụ: Nhẹ,
        Mạnh, Cực mạnh).'
    strength_grade:
      name: Cấp độ bền
      description: Mô tả độ bền/mức độ chịu lực dự kiến của khóa dán.
    stretch_level:
      name: Mức độ kéo giãn
      description: Cho biết độ co giãn của vải khi sử dụng.
    stretch_type:
      name: Loại co giãn
      description: Cho biết vải có độ co giãn cơ học hay đàn hồi và theo hướng nào.
    stretcher_bar_material:
      name: Vật liệu thanh căng
      description: 'Vật liệu dùng cho khung căng vải (ví dụ: gỗ thông, gỗ vân sam,
        gỗ bạch dương, gỗ MDF/gỗ công nghiệp).'
    strike_shield_shape:
      name: Hình dạng tấm chắn tấn công
      description: Xác định hình dạng tổng thể của bề mặt tiếp xúc của tấm chắn.
    string_core_shape:
      name: Hình dạng lõi dây
      description: Chỉ định hình dạng dây lõi được sử dụng trong dây đàn quấn, ảnh
        hưởng đến cảm giác và độ ổn định.
    string_coverage:
      name: Phạm vi phủ sóng chuỗi
      description: Chỉ định các dây đàn mà kẹp capo một phần được thiết kế để bấm/che
        phủ (theo số thứ tự hoặc theo bộ thông thường).
    string_end_type:
      name: Kiểu kết thúc chuỗi
      description: Chỉ định cách dây đàn kết thúc tại ngựa đàn/bộ phận giữ dây để
        đảm bảo tính tương thích (đặc biệt quan trọng đối với đàn acoustic/điện và
        một số loại đàn bass).
    string_set_type:
      name: Loại bộ dây đàn
      description: Xác định xem sản phẩm là một bộ dây hoàn chỉnh hay chỉ là các dây
        thay thế riêng lẻ.
    strung_status:
      name: Trạng thái chuỗi
      description: Cho biết đầu vợt lacrosse đã được căng dây sẵn hay được bán riêng
        lẻ (chưa có dây).
    strut_placement:
      name: Vị trí lắp đặt phuộc nhún
      description: Chỉ định vị trí lắp đặt dự kiến trên xe (trước/sau và trái/phải)
        cho thanh chống.
    stud_attachment_type:
      name: Kiểu gắn đinh tán
      description: Quy định cách thức gắn hoặc cấu hình các đinh/móng trên đế ngoài,
        ảnh hưởng đến độ bám, bảo trì và tuân thủ các quy định của giải đấu.
    stud_configuration:
      name: Cấu hình mũ đinh
      description: Xác định hình dạng và cách bố trí các đinh/móng trên đế ngoài,
        ảnh hưởng đến độ bám và hiệu suất trên các bề mặt khác nhau.
    stud_material:
      name: Vật liệu đinh tán
      description: Xác định chất liệu chính của đinh/gót giày, cung cấp thông tin
        về độ bền, trọng lượng và sự tuân thủ các quy định an toàn.
    stuffed_animal_features:
      name: Đặc điểm của thú nhồi bông
      description: Nhấn mạnh các tính năng vui chơi và thoải mái tích hợp sẵn của
        thú nhồi bông.
    stump_base_type:
      name: Loại gốc cây
      description: Xác định kiểu đế hoặc hệ thống lắp đặt mà cọc gôn cricket sử dụng
        (đinh nhọn, lò xo đàn hồi, cao su có trọng lượng, v.v.).
    stump_mechanism:
      name: Cơ chế gốc cây
      description: 'Chỉ định cơ chế trả về hoặc lắp đặt của cọc gôn cricket (ví dụ:
        lò xo hồi vị, cố định).'
    stump_size:
      name: Gốc cây kích
      description: Kích thước gốc câyNhãn kích thước phân loại được sử dụng cho cọc
        gôn cricket, cho biết chiều cao điển hình và nhóm tuổi người chơi phù hợp.
    subwoofer_installation_type:
      name: Loại lắp đặt loa siêu trầm
      description: Hướng dẫn cách lắp đặt loa siêu trầm trong hệ thống âm thanh ô
        tô.
    sugar_cane_variety:
      name: Giống mía
      description: Xác định giống mía cụ thể hoặc giống mía thương phẩm, điều này
        có thể ảnh hưởng đến màu sắc, độ ngọt và hàm lượng chất xơ.
    sugar_content_level:
      name: Mức độ đường
      description: Phân loại hàm lượng đường tổng thể hoặc công thức của nước giải
        khát cô đặc, giúp người mua sắm nhanh chóng tìm thấy các lựa chọn thông thường,
        giảm đường hoặc không đường.
    sugar_refinement_level:
      name: Mức độ tinh chế đường
      description: Chỉ định mức độ hoặc kiểu tinh chế (màu sắc, hàm lượng mật đường
        hoặc cấp độ chế biến).
    sugar_source:
      name: Nguồn đường
      description: Xác định nguồn gốc thực vật hoặc nguyên liệu mà từ đó đường được
        chiết xuất.
    suit_fit:
      name: Độ vừa vặn của bộ vest
      description: Tổng thể kiểu dáng của bộ vest, thể hiện độ ôm sát cơ thể.
    suit_pieces:
      name: Các chi tiết của bộ vest
      description: 'Chỉ định số lượng trang phục phối hợp có trong bộ vest (ví dụ:
        2 món, 3 món, 4 món).'
    suitable_for_anchoring_use:
      name: Thích hợp để sử dụng làm neo.
      description: Chỉ rõ trường hợp sử dụng dự kiến liên quan đến việc neo giữ dây/dây
        thừng.
    suitable_for_craft_type:
      name: Phù hợp với loại hình thủ công
      description: Dây căng định hình là công dụng chính của kỹ thuật thêu thùa thủ
        công.
    suitable_for_paint_type:
      name: Phù hợp với loại sơn
      description: Cho biết loại sơn nào phù hợp/an toàn để sử dụng với loại vải canvas
        này.
    suitable_for_swim_stroke:
      name: Thích hợp cho các kiểu bơi
      description: Cho biết kiểu bơi nào mà mái chèo tay được thiết kế hoặc tối ưu
        hóa.
    suitable_mounting_surface_material:
      name: Vật liệu bề mặt lắp đặt phù hợp
      description: Chỉ định bề mặt/vật liệu dự định để gắn mà lớp keo dán được thiết
        kế để liên kết.
    suitable_play_location:
      name: Địa điểm vui chơi phù hợp
      description: Môi trường chơi chính được dự định cho đồ chơi cối xay cát và nước.
    suitable_riding_conditions:
      name: Điều kiện lái xe phù hợp
      description: 'Chỉ định điều kiện sử dụng (ví dụ: khô, ướt, mùa đông) mà chất
        bôi trơn hoặc chất làm sạch xe đạp được pha chế để sử dụng.'
    suitable_snow_conditions:
      name: Điều kiện tuyết phù hợp
      description: Cho biết điều kiện tuyết chính mà sáp bám được pha chế để sử dụng.
    suitable_surface_type:
      name: Loại bề mặt phù hợp
      description: Chỉ định các bề mặt đi lại mà tay nắm được thiết kế cho.
    suitable_table_size:
      name: Kích thước bàn phù hợp
      description: Ghi rõ chiều dài bàn bi-a/snooker mà đèn được thiết kế để chiếu
        sáng.
    sun_protection_rating_upf:
      name: Chỉ số chống nắng (UPF)
      description: Cung cấp thông tin về chỉ số chống nắng UPF đã được chứng nhận
        của sản phẩm.
    sun_shade_attachment_method:
      name: Phương pháp gắn tấm chắn nắng
      description: Cách cố định tấm che nắng vào cửa sổ/kính chắn gió.
    sun_shade_style:
      name: Kiểu mái che nắng
      description: Cấu tạo/hình thức của sản phẩm để triển khai và cất giữ tấm che
        nắng.
    sunchoke_variety:
      name: Giống củ atiso Jerusalem
      description: Cho biết giống hoặc chủng loại cụ thể của cây atiso Jerusalem,
        cung cấp thông tin chi tiết cho người làm vườn, đầu bếp và người mua sắm sành
        sỏi.
    sunflower_oil_variety:
      name: Loại dầu hướng dương
      description: 'Phân loại cấu hình axit béo hoặc giống cây trồng của dầu hướng
        dương (ví dụ: hàm lượng Oleic cao, hàm lượng Oleic trung bình, hàm lượng Linoleic).'
    sunflower_variety:
      name: Giống hoa hướng dương
      description: Giống/loại hoa hướng dương (các giống phổ biến trên thị trường
        dùng để cắt cành).
    support_brace_features:
      name: Các tính năng của nẹp hỗ trợ
      description: Liệt kê các tính năng nổi bật của đai hỗ trợ cổ tay như chất liệu
        thoáng khí, nẹp có thể tháo rời hoặc tấm kim loại điều chỉnh được.
    support_leg_count:
      name: Số lượng chân hỗ trợ
      description: 'Số lượng chân tiếp xúc với mặt đất khi sử dụng gậy chụp ảnh (ví
        dụ: gậy đơn, gậy đôi, gậy ba).'
    support_padding:
      name: Đệm hỗ trợ
      description: Cho biết liệu dây đeo/giá đỡ có tích hợp lớp đệm tại các điểm tiếp
        xúc (cổ/vai/ngón tay cái) hay không.
    support_structure_type:
      name: Loại cấu trúc hỗ trợ
      description: Chỉ rõ phương pháp xây dựng được sử dụng để giữ cho hàng rào chắn
        gió đứng vững.
    supported_bowling_delivery_types:
      name: Các kiểu giao bóng bowling được hỗ trợ
      description: Chỉ định các biến thể ném bóng cricket mà máy có thể mô phỏng,
        chẳng hạn như kiểu ném xoáy vào trong, xoáy ra ngoài và kiểu xoay bóng.
    supported_dive_modes:
      name: Các chế độ lặn được hỗ trợ
      description: Chỉ định các chế độ lặn hoạt động mà máy tính lặn hỗ trợ, chẳng
        hạn như Air, Nitrox hoặc Gauge.
    supported_equipment_type:
      name: Loại thiết bị được hỗ trợ
      description: 'Xác định loại thiết bị thể thao mùa đông mà giá đỡ được thiết
        kế để chứa (ví dụ: ván trượt tuyết, ván trượt ván, gậy trượt tuyết).'
    supported_spin_types:
      name: Các loại spin được hỗ trợ
      description: Chỉ định các biến thể xoay bóng mà máy phóng có thể áp dụng.
    supported_spool_bobbin_types:
      name: Các loại ống chỉ/cuộn chỉ được hỗ trợ
      description: Chỉ định các định dạng cuộn chỉ/ống chỉ mà máy quấn chỉ điện được
        thiết kế để chấp nhận.
    surf_wax_temperature_rating:
      name: Xếp hạng nhiệt độ của sáp lướt sóng
      description: Chỉ định phạm vi nhiệt độ nước mà sáp được pha chế để hoạt động,
        đảm bảo độ bám tối ưu trong các điều kiện khí hậu khác nhau.
    surface_coating_or_finish:
      name: Lớp phủ bề mặt hoặc lớp hoàn thiện
      description: Chỉ định bất kỳ phương pháp xử lý bề mặt bảo vệ hoặc tăng cường
        hiệu suất nào được áp dụng cho kìm.
    surface_coating_or_wrap:
      name: Lớp phủ bề mặt hoặc lớp bọc
      description: Lớp phủ bề mặt bên ngoài được sử dụng để tăng độ bám/kiểm soát
        trên cần điều khiển trung tâm (và đôi khi cả cần điều khiển cầm tay).
    surface_finish:
      name: Hoàn thiện bề mặt
      description: Mô tả cảm giác/kết cấu của bề mặt quả bóng ảnh hưởng đến độ bám
        và chuyển động trong quá trình tâng bóng tiếp xúc.
    surface_finish_prep:
      name: Hoàn thiện/chuẩn bị bề mặt
      description: 'Cho biết tình trạng bề mặt ma sát (ví dụ: được làm mới bề mặt,
        gia công, nguyên trạng) tại thời điểm bán.'
    surface_types_included:
      name: Các loại bề mặt bao gồm
      description: Chỉ rõ bề mặt nào được bao gồm trong bộ dụng cụ để vẽ/tô màu (nếu
        có), chẳng hạn như vải bố, giấy vẽ, tấm gỗ hoặc không có bề mặt nào.
    surfboard_construction:
      name: Kết cấu của ván lướt sóng
      description: Chỉ định công nghệ cấu tạo chính hoặc phương pháp ghép lớp của
        ván lướt sóng.
    surfboard_tail_shape:
      name: Hình dạng đuôi ván lướt sóng
      description: Xác định hình dạng đuôi của ván, yếu tố ảnh hưởng đến khả năng
        điều khiển và độ bám.
    suspension_bushing_type:
      name: Loại ống lót giảm xóc
      description: Xác định kiểu dáng/chức năng lắp đặt của bạc lót giảm xóc.
    suspension_configuration:
      name: Cấu hình hệ thống treo
      description: Mô tả xem xe ba bánh có hệ thống giảm xóc hay không và vị trí của
        hệ thống giảm xóc.
    suspension_material:
      name: Vật liệu treo
      description: Chỉ định chất liệu của dây xích, dây thừng hoặc dây cáp được sử
        dụng để treo xích đu.
    suspension_trainer_accessories_included:
      name: Bao gồm phụ kiện cho dụng cụ tập luyện treo.
      description: 'Liệt kê các mặt hàng bổ sung được cung cấp kèm theo bộ dụng cụ
        huấn luyện (ví dụ: neo cửa, dây nối dài, túi đựng), giúp người mua sắm hiểu
        rõ những gì có trong hộp và so sánh giá trị của bộ sản phẩm.'
    suspension_trainer_anchor_type:
      name: Loại neo dụng cụ tập luyện treo
      description: 'Xác định kiểu lắp đặt hoặc điểm neo mà dây đai được thiết kế để
        sử dụng (ví dụ: cửa, trần nhà, cây), cho biết khả năng tương thích với môi
        trường của người dùng.'
    suspension_type:
      name: Loại hệ thống treo
      description: Thông số này chỉ định xem phuộc là loại cứng hay sử dụng hệ thống
        giảm xóc cụ thể (khí nén, lò xo, hỗn hợp, chất đàn hồi, v.v.), giúp người
        lái lựa chọn phuộc phù hợp với phong cách lái của mình.
    sustain_pedal_form_factor:
      name: Hình dạng bàn đạp duy trì
      description: 'Mô tả kiểu dáng vật lý của bàn đạp duy trì âm thanh (ví dụ: bàn
        đạp kiểu đàn piano so với công tắc chân nhỏ gọn), yếu tố ảnh hưởng đến cảm
        giác và mục đích sử dụng.'
    sustain_pedal_switch_type:
      name: Loại công tắc bàn đạp duy trì
      description: Cho biết bàn đạp gửi tín hiệu tức thời (duy trì khi nhấn) hay tín
        hiệu liên tục (chuyển đổi).
    sustainability_certification:
      name: Chứng nhận bền vững
      description: Chứng nhận về môi trường hoặc nguồn gốc xuất xứ của vật liệu gỗ.
    swab_intended_bassoon_section:
      name: ue tăm bông dùng cho phần kèn bassoon
      description: Xác định phần nào của kèn bassoon mà que lau được thiết kế để làm
        sạch (các lỗ/bộ phận khác nhau yêu cầu hình dạng và kích thước que lau khác
        nhau).
    swab_style:
      name: Kiểu tăm bông
      description: Mô tả thiết kế/hình dạng vật lý của que tăm bông được sử dụng để
        luồn vào hoặc tiếp cận các khu vực bên trong kèn saxophone.
    swab_weight_material:
      name: Vật liệu trọng lượng tăm bông
      description: Chất liệu của dây dẫn/tạ kéo (nếu có), yếu tố ảnh hưởng đến nguy
        cơ trầy xước và độ bền.
    swab_weight_style:
      name: Kiểu quả rọi trọng lượng của khăn lau
      description: Chỉ rõ trọng lượng của que thăm dò để nó có thể đi qua lỗ thoát
        khí của kèn bassoon.
    sway_bar_adjustability:
      name: Khả năng điều chỉnh thanh ổn định
      description: Liệu và cách điều chỉnh độ cứng của thanh ổn định (thường thông
        qua nhiều lỗ gắn đầu nối) hay không.
    sway_bar_coating:
      name: Lớp phủ thanh ổn định
      description: Xử lý bề mặt hoặc phủ lớp bảo vệ lên thanh ổn định để chống ăn
        mòn và tăng tính thẩm mỹ.
    sway_bar_fitment_front_rear_kit:
      name: Lắp đặt thanh ổn định (trước/sau/bộ)
      description: Cho biết thanh ổn định được thiết kế cho trục trước, trục sau,
        hay được bán theo bộ cho cả trục trước và trục sau.
    sweatshirt_pocket_type:
      name: Áo nỉ kiểu túi
      description: Mô tả kiểu dáng các túi trên áo nỉ.
    sweet_potato_variety:
      name: Giống khoai lang
      description: Xác định giống hoặc chủng loại cụ thể của khoai lang trên thị trường.
    sweet_spot_position:
      name: Vị trí điểm tối ưu
      description: Xác định vị trí điểm tiếp xúc tối ưu trên lưỡi gậy, ảnh hưởng đến
        phong cách chơi và điều kiện sân đấu.
    sweetener_presence:
      name: Sự hiện diện của chất tạo ngọt
      description: Cho biết bơ hạt có chứa chất tạo ngọt nhân tạo hay không và ở mức
        độ nào.
    sweetening_type:
      name: Loại chất làm ngọt
      description: Mô tả cách thức làm ngọt sản phẩm hoặc mức độ ngọt của sản phẩm.
    swim_armband_construction_type:
      name: Loại cấu tạo của phao tay bơi
      description: Xác định kiểu cấu trúc hoặc cơ chế nổi của phao tay (bơm hơi so
        với xốp đặc, kết hợp, v.v.).
    swim_belt_purpose:
      name: Công dụng của đai bơi
      description: 'Phân loại chức năng của đai bơi (ví dụ: hỗ trợ nổi, chạy bộ dưới
        nước, tập luyện sức cản, dây buộc cố định, phụ kiện dù hãm, vật nặng đối trọng,
        lội nước an toàn).'
    swim_board_features:
      name: Tính năng của ván tập bơi
      description: Nêu bật những đặc điểm hoặc cải tiến đặc biệt của ván bơi giúp
        nâng cao tính tiện dụng hoặc an toàn.
    swim_bottom_length:
      name: Chiều dài quần bơi
      description: 'Phân loại độ che phủ tổng thể của quần bơi (ví dụ: quần đùi ngắn
        so với quần đùi dài đến đầu gối).'
    swim_buoy_features:
      name: Đặc điểm của phao bơi
      description: Ghi nhận thêm các đặc điểm hoặc tính năng đáng chú ý khác giúp
        tăng cường khả năng hiển thị, độ an toàn hoặc tính hữu dụng của phao bơi.
    swim_cap_style:
      name: Kiểu mũ bơi
      description: 'Xác định kiểu dáng hoặc cấu trúc của mũ bơi (ví dụ: mũ bơi cho
        tóc dài, mũ bơi kiểu vòm/thi đấu, mũ bơi kiểu bong bóng/khăn xếp).'
    swim_diaper_feature:
      name: Tính năng của tã bơi
      description: Cho biết quần bơi có tích hợp tã chống rò rỉ hay cần/không cần
        dùng tã bơi riêng.
    swim_trainer_features:
      name: Tính năng của thiết bị huấn luyện bơi
      description: Nêu bật thêm các tính năng tiện ích hoặc sự thoải mái của thiết
        bị huấn luyện bơi.
    swim_trainer_type:
      name: Loại dụng cụ hỗ trợ tập bơi
      description: Xác định kiểu dáng hoặc định dạng cấu trúc của thiết bị huấn luyện
        bơi để hỗ trợ việc lọc theo thiết kế và mục đích huấn luyện.
    swim_training_focus:
      name: Trọng tâm bài tập bơi
      description: 'Xác định mục tiêu huấn luyện chính mà mái chèo hướng đến (ví dụ:
        kỹ thuật, sức mạnh, phân lập nhóm cơ).'
    swim_weight_style:
      name: Kiểu tạ chì tập bơi
      description: Phân loại hình dạng của tạ bơi, giúp người mua sắm phân biệt giữa
        các loại sản phẩm khác nhau về cơ bản trong cùng một danh mục.
    swimbait_buoyancy:
      name: Độ nổi của mồi giả
      description: Thông tin này cho biết cách mồi giả bơi lội di chuyển trong cột
        nước (nổi, lơ lửng, chìm, v.v.), giúp người câu cá lựa chọn loại mồi phù hợp
        với độ sâu và kiểu thu dây câu mong muốn.
    swimbait_style:
      name: Kiểu mồi giả
      description: Phân loại cấu tạo hoặc thiết kế chuyển động của mồi giả dạng cá
        bơi, chẳng hạn như mồi đuôi mái chèo hoặc mồi lướt.
    swimwear_pieces_included:
      name: Các món đi kèm trong bộ đồ bơi
      description: Liệt kê từng thành phần riêng lẻ của bộ burkini để người mua sắm
        biết chính xác những gì có trong gói hàng.
    swimwear_set_pieces_included:
      name: Các món đi kèm trong set đồ bơi
      description: 'Liệt kê các thành phần trang phục được cung cấp trong bộ burkini
        để người mua sắm biết chính xác những gì họ sẽ nhận được (ví dụ: áo, quần
        legging, khăn trùm đầu/mũ).'
    swing_attachment_connection_type:
      name: Loại kết nối/gắn xích đu
      description: 'Loại kết nối được sử dụng để treo xích đu vào giá đỡ (ví dụ: dây
        thừng, xích, dây đai).'
    swing_trainer_type:
      name: Loại dụng cụ huấn luyện swing
      description: Phân loại kiểu dáng hoặc cơ chế của dụng cụ huấn luyện swing để
        người mua sắm có thể nhanh chóng tìm thấy thiết bị phù hợp với mục tiêu luyện
        tập của họ.
    swing_training_objective:
      name: Mục tiêu tập luyện cú đánh
      description: 'Phân loại trọng tâm luyện tập chính, cơ chế hoặc mục tiêu của
        dụng cụ huấn luyện swing (ví dụ: nhịp độ, tốc độ, cách cầm gậy).'
    switch_electrical_positions:
      name: Công tắc vị trí điện
      description: 'Chỉ định số lượng và hoạt động của các vị trí điện trên công tắc
        (ví dụ: 3 vị trí, bật tức thời).'
    swivel_type:
      name: Loại xoay
      description: Chỉ định cấu hình khớp xoay được sử dụng để giảm tình trạng dây
        xích bị rối.
    sword_scabbard_material:
      name: Vật liệu vỏ kiếm
      description: Chỉ rõ chất liệu chính của bao kiếm/vỏ dao đi kèm (nếu có).
    synthesizer_form_factor:
      name: Hình dạng của bộ tổng hợp âm thanh
      description: Mô tả định dạng giao diện vật lý/chơi game của bộ tổng hợp âm thanh.
    synthetic_feather_style:
      name: Kiểu lông vũ tổng hợp
      description: Kiểu dáng/cắt của lông vũ tổng hợp được sử dụng cho các kiểu dáng
        và kỹ thuật chế tác khác nhau.
    synthetic_formulation_type:
      name: Loại công thức tổng hợp
      description: 'Chỉ định loại nguyên liệu gốc tổng hợp/công thức (ví dụ: PAO,
        este, hydrocracking Nhóm III).'
    syrup_base_ingredient:
      name: Thành phần nền của xi-rô
      description: 'Xác định loại cây hoặc nguồn đường chính dùng để sản xuất siro
        hoặc mật hoa (ví dụ: cây phong, cây thùa, mía).'
    syrup_variety:
      name: Các loại siro
      description: 'Xác định kiểu dáng hoặc loại siro nói chung dựa trên công thức
        hoặc công dụng truyền thống của nó (ví dụ: siro cây phong, siro hương cà phê,
        siro trái cây, siro dược liệu).'
    t_shirt_fit:
      name: Kiểu áo thun
      description: Mô tả kiểu dáng/độ vừa vặn tổng thể dự định của chiếc áo thun.
    tabla_included_components:
      name: Tabla bao gồm các thành phần
      description: Cho biết những vật dụng chính nào được bao gồm trong danh sách
        sản phẩm trống tabla (trống đơn hay trống đôi, vỏ/hộp đựng, búa chỉnh âm,
        v.v.).
    tabla_set_pieces_included:
      name: Các chi tiết đi kèm trong bộ trống Tabla
      description: 'Cho biết các thành phần nào được bao gồm trong bộ tabla (ví dụ:
        dayan, bayan, vòng, vỏ bọc, dụng cụ chỉnh âm, túi đựng).'
    tabla_tonal_pitch_range_bayan:
      name: Phạm vi âm/cao độ Tabla (bayan)
      description: Mô tả phạm vi âm vực/âm sắc điển hình của trống bayan (trống trầm)
        dựa trên kích thước và cấu tạo.
    table_base_material:
      name: Chất liệu chân bàn
      description: Xác định chất liệu chính của phần đế hoặc chân đế bàn (khác với
        chân bàn hoặc mặt bàn), hỗ trợ việc lọc theo chất liệu cụ thể.
    table_base_type:
      name: Loại cơ sở bảng
      description: 'Xác định kiểu thiết kế kết cấu đỡ mặt bàn (ví dụ: chân đế, giá
        đỡ, chân chữ X).'
    table_coverage_position:
      name: Vị trí bao phủ bảng
      description: 'Cho biết tấm phủ bàn bóng bàn này được thiết kế để vừa với vị
        trí nào: gấp gọn, chơi hoặc cả hai.'
    table_hockey_part_type:
      name: Loại phụ tùng khúc côn cầu bàn
      description: Xác định loại linh kiện cụ thể trong các hệ thống khúc côn cầu
        bàn/khí/thanh/bong bóng.
    table_leg_design:
      name: Thiết kế chân bàn
      description: Giúp xác định kiểu dáng hoặc hình dạng cấu trúc của chân, cho phép
        người mua sắm lựa chọn sản phẩm phù hợp với nhu cầu thẩm mỹ và hỗ trợ cụ thể.
    table_size:
      name: Kích thước bàn
      description: Kích thước tổng thể của bàn bi-a (tính bằng feet) được ghi rõ trên
        bao bì thương mại, giúp người mua sắm nhanh chóng lựa chọn các tùy chọn phổ
        biến như bàn bi-a quầy bar 7 feet hoặc bàn bi-a thi đấu 9 feet.
    table_size_category:
      name: Nhóm kích thước bàn
      description: Phân loại bàn bóng đá mini theo kích thước tổng thể để giúp người
        mua sắm lựa chọn phù hợp với không gian có sẵn mà không cần tính toán kích
        thước.
    table_tennis_certification:
      name: Chứng chỉ bóng bàn
      description: 'Liệt kê các tiêu chuẩn chính thức hoặc phê duyệt của cơ quan quản
        lý mà sản phẩm đáp ứng (ví dụ: ITTF, EN 14468-2).'
    tabletop_tilt_function:
      name: Chức năng nghiêng mặt bàn
      description: Xác định xem mặt bàn có thể nghiêng, lật hoặc xoay ở các góc độ
        khác nhau hay không.
    tackle_components_included:
      name: Các thành phần hộp đồ câu đi kèm
      description: Liệt kê cụ thể các thành phần dụng cụ câu cá có trong bộ sản phẩm
        để người mua sắm biết chính xác những gì được cung cấp.
    talking_drum_accessories_included:
      name: Bao gồm phụ kiện trống nói.
      description: Liệt kê các phụ kiện đi kèm với trống nói (trong hộp).
    talking_drum_cord_material:
      name: Vật liệu dây trống nói
      description: Vật liệu được sử dụng cho các dây căng/dây thừng nối các mặt trống.
    talking_drum_tuning_mechanism:
      name: Cơ chế điều chỉnh trống nói
      description: Cách thay đổi cao độ/điều chỉnh độ căng của trống trong khi chơi
        (hoặc khi thiết lập).
    tam_tam_construction_style:
      name: Kiểu cấu trúc tam-tam
      description: Kiểu cấu tạo/gõ trống tam-tam.
    tam_tam_items_included:
      name: Các mặt hàng đi kèm với trống tam-tam
      description: 'Các phụ kiện đi kèm với trống tam-tam (ví dụ: dùi, giá đỡ, vỏ
        bọc).'
    tamarillo_variety:
      name: Giống cà chua bi Tamarillo
      description: Xác định giống hoặc mẫu mã màu sắc cụ thể của quả tamarillo.
    tamarind_variety:
      name: Giống me
      description: Chỉ định giống me về mặt thực vật học hoặc thương mại, điều này
        có thể ảnh hưởng đến hương vị, kết cấu và cách sử dụng trong ẩm thực.
    tambourine_frame_style:
      name: Kiểu khung trống lắc
      description: Mô tả cấu hình khung cầm tay dùng để giữ/chơi trống lắc.
    tambourine_head_material:
      name: Chất liệu mặt trống lắc tay
      description: Chỉ định chất liệu của mặt trống (màng) trên trống lắc có mặt trống.
    tambourine_jingle_configuration:
      name: Cấu hình chuông trống lắc
      description: Cách sắp xếp hoặc cấu tạo các chuông trên trống lắc.
    tambourine_jingle_material:
      name: Chất liệu chuông trống lắc tay
      description: Chỉ định chất liệu của các chuông (đĩa kim loại) của trống lắc,
        ảnh hưởng đến âm thanh và độ bền.
    tambourine_mounting_type:
      name: Kiểu gắn trống lắc
      description: Cách cầm hoặc đặt trống lắc đúng cách khi chơi.
    tambourine_tuning_mechanism:
      name: Cơ chế điều chỉnh trống lắc
      description: Chỉ định hệ thống điều chỉnh âm thanh được sử dụng trên trống lắc
        tay có thể điều chỉnh âm (nếu có).
    tank_model_scale:
      name: Tỷ lệ mô hình xe tăng
      description: 'Chỉ định tỷ lệ thu nhỏ của mô hình xe tăng (ví dụ: 1:35, 1:72).'
    tank_top_back_style:
      name: Kiểu lưng áo tank top
      description: Chỉ định hình dạng hoặc đường cắt ở phía sau áo tank top, điều
        này ảnh hưởng đến khả năng nâng đỡ, sự thoải mái khi vận động và tính thẩm
        mỹ.
    tape_application_area:
      name: Vùng dán băng keo
      description: Chỉ rõ vị trí trên thiết bị hoặc máy phát nhạc mà băng dính được
        thiết kế để dán, giúp người mua sắm lựa chọn đúng kiểu băng dính.
    tape_finish:
      name: Hoàn thiện băng keo
      description: Độ bóng hoặc độ nhám bề mặt của băng keo.
    tape_purpose:
      name: Mục đích sử dụng băng keo
      description: Xác định công dụng chính của băng dính trong việc bảo dưỡng hoặc
        tùy chỉnh vợt.
    tape_type:
      name: Loại băng
      description: Phân loại kiểu dáng hoặc cấu tạo chức năng của băng quấn khúc côn
        cầu, chẳng hạn như vải, polyethylene trong suốt, có độ bám, co giãn, có keo
        dính, miếng đệm ống chân hoặc da lộn.
    tapenade_main_ingredients:
      name: Các thành phần chính của Tapenade
      description: Chỉ định thành phần cơ bản chính tạo nên món tapenade (ô liu, cà
        chua, cà tím, ớt, v.v.), hữu ích cho những người mua sắm có sở thích hoặc
        hạn chế về thành phần.
    tapestry_loom_loom_format:
      name: Khung dệt thảm định dạng khung dệt
      description: Kiểu dáng tổng thể/kiểu chân đế của khung dệt thảm thủ công.
    tapestry_loom_shedding_method:
      name: Phương pháp tách sợi trên khung dệt thảm
      description: Cách máy dệt tạo ra khe hở (tách các sợi dọc) để luồn sợi ngang.
    tapestry_loom_tensioning_system:
      name: Hệ thống căng khung dệt thảm
      description: Phương pháp dùng để căng và cố định sợi dọc trên khung dệt thảm.
    tar_head_material:
      name: Chất liệu mặt trống Tar
      description: Xác định chất liệu của mặt trống (màng trống), yếu tố ảnh hưởng
        mạnh mẽ đến cảm giác, độ bền và âm thanh.
    tar_playing_style:
      name: Phong cách chơi Tar
      description: Xác định vị trí/kỹ thuật chơi chính mà cây gậy được thiết kế cho.
    tar_tuning_system:
      name: Hệ thống điều chỉnh Tar
      description: Chỉ định cách điều chỉnh độ căng của đầu ghim.
    target_components:
      name: Các thành phần mục tiêu
      description: Chỉ rõ các bộ phận nhiên liệu/không khí mà sản phẩm này được thiết
        kế để làm sạch.
    target_relative_humidity_rh:
      name: Độ ẩm tương đối mục tiêu (RH)
      description: Độ ẩm tương đối mục tiêu mà sản phẩm được thiết kế để duy trì bên
        trong môi trường thiết bị/vỏ máy.
    target_resetting_mechanism:
      name: Cơ chế đặt lại mục tiêu
      description: Mô tả cách thức, hoặc liệu mục tiêu có quay trở lại vị trí ban
        đầu sau khi bị trúng đạn hay không.
    target_trainer_type:
      name: Loại thiết bị tập đánh mục tiêu
      description: Phân loại kiểu dáng hoặc định dạng tổng thể của dụng cụ tập luyện
        mục tiêu cho môn bóng vợt hoặc squash.
    targeted_contaminants:
      name: Chất gây ô nhiễm mục tiêu
      description: Các loại vi sinh vật hoặc ký sinh trùng mà sản phẩm được chứng
        nhận có khả năng tiêu diệt.
    targeted_muscle_group:
      name: Nhóm cơ mục tiêu
      description: Nhóm cơ chính mà phụ kiện này nhằm mục đích huấn luyện hoặc hỗ
        trợ.
    taro_variety:
      name: Giống khoai môn
      description: 'Chỉ định giống, loài hoặc tên thương mại của củ khoai môn được
        chào bán (ví dụ: Khoai môn tím, Eddoe, Dasheen).'
    tassel_trim_header_type:
      name: Kiểu đầu trang trí tua rua
      description: 'Chỉ định cấu tạo của phần đầu/phần gắn phía trên được sử dụng
        để gắn viền tua rua vào bề mặt (ví dụ: băng dính, dây bện, dây thừng).'
    tassel_trim_use_case:
      name: Trường hợp sử dụng viền tua rua
      description: Lĩnh vực ứng dụng chính của viền tua rua.
    taste_profile:
      name: Hồ sơ hương vị
      description: Mô tả các đặc điểm hương vị nổi bật của giống táo đó.
    tea_variety:
      name: Loại trà
      description: 'Phân loại loại trà hoặc kiểu trà cụ thể (ví dụ: trà đen, trà xanh,
        matcha, rooibos) để người mua sắm có thể lọc theo loại ưa thích của họ.'
    teasing_tool_style:
      name: Kiểu dụng cụ trêu chọc
      description: 'Kiểu dáng hoặc hình dạng vật lý của dụng cụ dùng để làm tơi và
        hòa quyện các sợi tóc (ví dụ: bàn chải, cào, lược).'
    tee_base_style:
      name: Kiểu áo thun cơ bản
      description: Xác định thiết kế cấu trúc của phần đế giá đỡ bóng bầu dục.
    temper_hardness:
      name: Độ cứng/độ tôi
      description: Chỉ số này cho biết độ mềm hay cứng của dây (khả năng giữ hình
        dạng của dây).
    temperature_control_type:
      name: Loại kiểm soát nhiệt độ
      description: Cách thức điều khiển/điều chỉnh nhiệt độ của dụng cụ.
    tenkara_action_ratio:
      name: Tỷ lệ hành động Tenkara
      description: 'Chỉ số này thể hiện tỷ lệ uốn cong truyền thống của cần câu Tenkara,
        mô tả vị trí cần câu bị uốn cong khi chịu tải (ví dụ: 6:4).'
    tennis_ball_court_surface:
      name: Mặt sân bóng tennis
      description: Chỉ định loại bề mặt sân mà quả bóng được thiết kế để đảm bảo hiệu
        suất và độ bền tối ưu.
    tennis_ball_pressure_type:
      name: Loại bóng tennis chịu áp lực
      description: Xác định áp suất bên trong hoặc cấu tạo của quả bóng (có áp suất,
        không áp suất, độ nén thấp, xốp) ảnh hưởng đến độ nảy và độ bền.
    tennis_racket_grip_size:
      name: Kích thước cán vợt tennis
      description: Chỉ định chu vi tiêu chuẩn của cán vợt (L0–L5 hoặc đơn vị inch
        tương đương) để đảm bảo sự vừa vặn và thoải mái khi cầm nắm.
    tenor_flutophone_fingering_system:
      name: Hệ thống bấm ngón cho sáo tenor
      description: Chỉ định hệ thống bấm ngón được sử dụng cho sáo tenor (theo chương
        trình giảng dạy/quy ước ký hiệu).
    tenor_recorder_joint_type:
      name: Loại khớp nối sáo tenor
      description: Chỉ định loại khớp nối giữa các phần của sáo tenor.
    tenor_saxophone_key_system:
      name: Hệ thống phím kèn saxophone tenor
      description: Chỉ định hệ thống/tiêu chuẩn phím bấm được sử dụng (thường được
        gọi là kiểu Pháp/Boehm đối với kèn saxophone).
    tenor_saxophone_pad_material:
      name: Vật liệu đệm kèn saxophone tenor
      description: Chỉ rõ chất liệu chính được sử dụng cho các miếng đệm nhạc cụ.
    tenor_trombone_slide_type:
      name: Kèn trombone tenor kiểu trượt
      description: 'Loại ống trượt được sử dụng trên kèn trombone tenor (ví dụ: loại
        tiêu chuẩn/thẳng so với loại có cò/trục).'
    tenor_trombone_valve_configuration:
      name: Cấu hình van kèn trombone tenor
      description: Cho biết kèn trombone tenor có bộ phận van/rotor hay không và cấu
        hình mà nó sử dụng.
    tension_control_type:
      name: Loại kiểm soát độ căng
      description: Cho biết cách thức (hoặc liệu) con thoi có cung cấp lực cản/lực
        căng điều chỉnh được trên suốt chỉ/ống chỉ trong quá trình cấp chỉ hay không.
    tension_mechanism:
      name: Cơ chế căng
      description: Kiểu căng chỉ được sử dụng để kiểm soát lượng chỉ ngang được cấp
        từ suốt chỉ/ống chỉ trong quá trình dệt.
    tension_pitch_modulation_system:
      name: Hệ thống điều chỉnh độ căng/cao độ
      description: Cách trống nói thay đổi cao độ/độ căng trong khi chơi (ví dụ, bằng
        cách bóp các dây căng).
    tension_system:
      name: Hệ thống căng dây
      description: Bộ phận căng/thu sợi của máy kéo sợi này được thiết kế dành cho
        hệ thống này.
    tent_fabric_material:
      name: Vật liệu vải lều
      description: Xác định loại vải chính được sử dụng cho lớp phủ ngoài hoặc thân
        lều, ảnh hưởng đến trọng lượng, khả năng thoáng khí và khả năng chống chịu
        thời tiết.
    tent_season_rating:
      name: Xếp hạng mùa cắm trại
      description: 'Phân loại lều theo số mùa hoặc điều kiện thời tiết mà nó được
        thiết kế để sử dụng (ví dụ: lều 3 mùa, lều 4 mùa, lều thám hiểm).'
    tent_setup_type:
      name: Kiểu dựng lều
      description: Cho biết kiểu dựng lều, chẳng hạn như lều tự đứng, lều bán tự đứng,
        lều không tự đứng, lều bơm hơi/khung khí hoặc lều bật tự động.
    tent_style:
      name: Kiểu lều
      description: 'Mô tả thiết kế cấu trúc của lều (ví dụ: mái vòm, đường hầm, khung
        chữ A).'
    test_result_output_method:
      name: Phương pháp xuất kết quả kiểm tra
      description: 'Chỉ định cách thiết bị kiểm tra ắc quy xe hiển thị hoặc cung cấp
        kết quả kiểm tra cho người dùng (ví dụ: đèn báo, màn hình, bản in, ứng dụng
        hoặc báo cáo phần mềm).'
    tether_strap_system:
      name: Hệ thống dây buộc/dây đeo
      description: Loại dây buộc hoặc hệ thống dây đai được sử dụng để kết nối đai
        đỡ cổ với mũ bảo hiểm/dây đai an toàn (nếu có).
    text_color:
      name: Màu chữ
      description: Màu chữ in hoặc thêu trên nhãn khác với màu nền của nhãn.
    textile_craft_machine_operation_type:
      name: Loại hình vận hành máy dệt may
      description: Cách vận hành máy (bằng tay, bằng chân hay bằng động cơ/điện).
    textile_finish_treatment:
      name: Hoàn thiện/xử lý vải dệt
      description: Nêu rõ các phương pháp xử lý bề mặt đáng chú ý được áp dụng cho
        vật liệu dệt.
    texture_inclusions:
      name: Các tạp chất kết cấu
      description: Chỉ định các thành phần tạo độ giòn được thêm vào, chẳng hạn như
        thịt nha đam, hạt húng quế, thạch dừa, trân châu nổ hoặc các miếng trái cây.
    therapeutic_technology:
      name: Công nghệ trị liệu
      description: Chỉ định bất kỳ chức năng trị liệu tích hợp nào, chẳng hạn như
        gel làm mát, dải từ tính hoặc gốm hồng ngoại.
    thermal_set_components:
      name: Các thành phần trong bộ quần áo giữ nhiệt
      description: Xác định xem sản phẩm bao gồm chỉ có quần, chỉ có áo, hay cả hai
        món tạo thành một bộ.
    thermal_weight:
      name: Trọng lượng nhiệt
      description: Chỉ số này cho biết mức độ ấm áp của chất liệu vải mũ trùm đầu.
    thermostat_type:
      name: Loại bộ điều nhiệt
      description: Thiết kế chức năng hoặc kiểu điều khiển của bộ điều nhiệt hệ thống
        làm mát xe cơ giới.
    thimble_guide_size:
      name: Hướng dẫn kích thước ngón tay giả
      description: Kích thước của dụng cụ khâu (kích thước vừa vặn/phủ), thường được
        bán theo cỡ nhỏ/vừa/lớn thay vì kích thước đo được.
    thread_connection_size:
      name: Kích thước ren kết nối
      description: 'Xác định thông số ren dùng để kết nối các trục, đầu nối và bộ
        chuyển đổi (ví dụ: 6 mm, 5/16"-24).'
    thread_construction:
      name: Cấu trúc sợi
      description: 'Cách thức cấu tạo hoặc xử lý sợi chỉ (ví dụ: chỉ thêu nhiều sợi
        so với chỉ dệt liền mạch).'
    thread_cord_type_beading_pattern:
      name: Loại chỉ/dây (mẫu xâu hạt)
      description: Loại chỉ hoặc dây được khuyến nghị sử dụng để hoàn thành mẫu này.
    thread_cutter_form_factor:
      name: Định dạng của dụng cụ cắt chỉ
      description: Xác định kiểu dáng vật lý của dụng cụ cắt chỉ, chẳng hạn như kéo
        cầm tay, kiểu treo hoặc kiểu vòng.
    thread_cutter_mechanism:
      name: Cơ cấu cắt chỉ
      description: Mô tả thao tác cắt hoặc cơ chế được sử dụng bởi dụng cụ cắt ren.
    thread_cutter_safety_features:
      name: Tính năng an toàn của dụng cụ cắt chỉ
      description: Biểu thị các tính năng an toàn tích hợp giúp giảm nguy cơ vô tình
        bị cắt trúng hoặc bảo vệ lưỡi dao trong quá trình bảo quản.
    thread_cutter_usage_application:
      name: Công dụng/ứng dụng của dụng cụ cắt ren
      description: Chỉ rõ mục đích sử dụng chính của dụng cụ cắt chỉ.
    thread_finish_treatment:
      name: Hoàn thiện/xử lý ren
      description: 'Lớp phủ hoặc phương pháp xử lý bề mặt được áp dụng cho sợi chỉ
        ảnh hưởng đến khả năng thao tác và hiệu suất (ví dụ: phủ sáp, liên kết, mercer
        hóa).'
    thread_material:
      name: Vật liệu sợi
      description: Thành phần sợi/vật liệu chính của sợi chỉ (không phải vải).
    thread_material_fiber:
      name: Chất liệu sợi (sợi xơ)
      description: Chỉ định loại sợi/vật liệu chính của sợi chỉ (không phải vải).
    thread_package_format:
      name: Định dạng bao bì chỉ may
      description: 'Hình thức đóng gói của chỉ may (ví dụ: cuộn, hình nón, suốt chỉ).'
    thread_rack_compatible_spool_type:
      name: Loại cuộn chỉ tương thích với giá để chỉ
      description: Loại bao bì chỉ mà giá đỡ được thiết kế để chứa (cuộn chỉ hay cuộn
        chỉ, v.v.).
    thread_standard_size:
      name: Kích thước tiêu chuẩn của ren
      description: 'Xác định tiêu chuẩn kích thước/trọng lượng sợi được sử dụng trên
        nhãn sản phẩm (ví dụ: wt, Tex, denier).'
    thread_type:
      name: Loại ren
      description: Chỉ định loại/cấu trúc của chỉ thêu chữ thập.
    thread_weight_system:
      name: Hệ thống trọng lượng sợi
      description: Tiêu chuẩn được sử dụng để biểu thị độ dày/trọng lượng của sợi
        chỉ.
    thread_yarn_guide_mounting_attachment_style:
      name: Kiểu lắp/gắn dẫn chỉ và sợi
      description: Mô tả cách thức đeo hoặc gắn thiết bị hướng dẫn trong quá trình
        sử dụng.
    thread_yarn_guide_tension_control:
      name: Điều khiển độ căng chỉ và sợi
      description: Cho biết liệu bộ phận dẫn hướng có cung cấp khả năng điều chỉnh
        độ căng/lực cản trên sợi chỉ hay không và bằng cách nào.
    thread_yarn_organizer_features:
      name: Đặc điểm của hộp đựng chỉ và sợi
      description: Bài viết nêu bật các tính năng tổ chức chức năng và tính di động
        đặc biệt dành cho việc lưu trữ chỉ/sợi.
    threader_intended_use:
      name: Mục đích sử dụng dự kiến của dụng cụ xỏ chỉ
      description: Cho biết bối cảnh chế tác chính mà dụng cụ xỏ kim cầm tay được
        thiết kế để sử dụng.
    threading_system:
      name: Hệ thống ren
      description: 'Chỉ rõ phương pháp và dụng cụ hỗ trợ được sử dụng để luồn chỉ
        vào máy may vắt sổ (ví dụ: thủ công, mã màu, có hướng dẫn, luồn chỉ bằng khí
        nén).'
    threading_type:
      name: Loại ren
      description: Cho biết trang sức đó sử dụng ren trong, ren ngoài, không có ren
        hay không áp dụng.
    throttle_type_scooter_conversion:
      name: Loại tay ga (chuyển đổi thành xe tay ga)
      description: Chỉ định kiểu dáng/giao diện bướm ga được bao gồm hoặc yêu cầu
        bởi bộ chuyển đổi.
    throw_rope_end_attachment:
      name: Đầu nối dây ném
      description: Bộ phận kết thúc/gắn hoặc vòng móc được cung cấp ở đầu (các đầu)
        làm việc của dây ném.
    throw_rope_storage_packaging_type:
      name: Loại hình lưu trữ/đóng gói dây ném
      description: 'Cách cất giữ hoặc sử dụng dây ném (ví dụ: trong túi hoặc cuộn).'
    throw_rope_visibility_features:
      name: các tính năng dễ nhìn thấy của dây ném
      description: Các tính năng nhận diện và khả năng quan sát được thiết kế để giúp
        dễ dàng nhìn thấy dây thừng trong nước/điều kiện ánh sáng yếu.
    thrower_operation_type:
      name: Loại cơ chế vận hành của máy bắn bóng
      description: Phân loại kiểu vận hành/cơ khí của máy ném để nhanh chóng phân
        biệt máy ném thủ công với máy ném tự động.
    thumb_design:
      name: Thiết kế ngón tay cái
      description: Mô tả cách ngón cái được tích hợp vào găng tay, ảnh hưởng đến độ
        an toàn và khả năng cầm nắm.
    tiara_design:
      name: Thiết kế vương miện
      description: Xác định kiểu dáng hoặc hình khối tổng thể của vương miện.
    tie_down_points_straps_included:
      name: Bao gồm các điểm/dây buộc cố định
      description: Xác định xem giá đỡ có bao gồm các điểm buộc dây tích hợp và/hoặc
        dây đai đi kèm để cố định xe máy/xe tay ga hay không.
    tiling_format:
      name: Định dạng lát gạch
      description: Chỉ định kiểu bố cục PDF để ghép các trang in.
    time_current_characteristic:
      name: Đặc tính thời gian-dòng điện
      description: 'Thông số này cho biết đặc tính dòng điện theo thời gian của cầu
        chì (ví dụ: tác động nhanh so với tác động chậm), ảnh hưởng đến tính phù hợp
        của nó đối với các mạch có dòng khởi động đột ngột.'
    timer_count_mode:
      name: Chế độ đếm hẹn giờ
      description: Chỉ định chế độ đếm của bộ hẹn giờ, chẳng hạn như đếm ngược, đếm
        xuôi (đồng hồ bấm giờ), cả hai hoặc đếm theo khoảng thời gian/lặp lại.
    timer_display_type:
      name: Loại hiển thị hẹn giờ
      description: 'Cho biết cách bộ đếm thời gian trò chơi hiển thị thời gian còn
        lại (ví dụ: màn hình kỹ thuật số, mặt số analog, đồng hồ cát hoặc không có
        hiển thị trực quan).'
    timer_operating_modes:
      name: Các chế độ hoạt động của bộ hẹn giờ
      description: Các hành vi hẹn giờ được hỗ trợ để kích hoạt các hiệu ứng.
    timing_belt_construction_material_rubber_compound:
      name: Vật liệu cấu tạo của dây đai truyền động (hợp chất cao su)
      description: 'Loại hợp chất cao su chính của dây đai được sử dụng (ví dụ: HNBR),
        có ảnh hưởng đến khả năng chịu nhiệt/dầu và tuổi thọ.'
    timing_belt_profile:
      name: Hình dạng dây đai truyền động
      description: 'Tiêu chuẩn hình dạng/mặt cắt răng của dây đai truyền động (ví
        dụ: hình thang so với hình cong).'
    timing_belt_reinforcement_cord_material:
      name: Vật liệu dây gia cường đai truyền động
      description: 'Quy định về vật liệu dây gia cường bên trong đai truyền động (ví
        dụ: sợi thủy tinh, aramid), ảnh hưởng đến độ bền và độ giãn.'
    timing_component_material:
      name: Chất liệu của linh kiện đếm thời gian
      description: Vật liệu chính của bộ phận truyền động (hợp chất dây đai, kim loại
        xích/bánh răng, vật liệu vỏ).
    tin_whistle_body_material:
      name: Vật liệu thân sáo thiếc
      description: Liệt kê chi tiết hơn các vật liệu thường dùng làm thân sáo thiếc
        so với danh sách vật liệu nhạc cụ chung khi cần thiết.
    tin_whistle_bore_type:
      name: Loại còi thiếc
      description: Chỉ định thiết kế đường kính bên trong của còi thiếc.
    tin_whistle_included_accessories:
      name: Bao gồm cả phụ kiện còi thiếc
      description: 'Các phụ kiện đi kèm với sáo thiếc (ví dụ: hộp đựng, que vệ sinh).'
    tip_finish_coating:
      name: Lớp phủ hoàn thiện/lớp mạ của đầu mũi
      description: 'Chỉ định phương pháp xử lý bề mặt ở đầu làm việc (ví dụ: mạ crom,
        sơn tĩnh điện) ảnh hưởng đến khả năng chống ăn mòn và trầy xước vành.'
    tip_shape:
      name: Hình dạng đầu
      description: Mô tả hình dạng hoặc độ sắc bén của đầu miếng gảy đàn guitar, yếu
        tố ảnh hưởng đến độ rõ nét của âm thanh và cảm giác khi gảy.
    tippet_rating:
      name: Độ bền dây buộc mồi
      description: 'Độ bền tối đa của dây buộc mồi được khuyến nghị thể hiện bằng
        ký hiệu X trong câu cá ruồi (ví dụ: 4X).'
    tire_changer_operation_type:
      name: Loại hình vận hành máy thay lốp
      description: 'Chỉ định cách thức vận hành/hoạt động của máy tháo lắp lốp (ví
        dụ: bằng tay, khí nén, thủy lực). Khác với thuộc tính "Nguồn năng lượng" chung;
        được sử dụng khi mô tả phương pháp vận hành của máy.'
    tire_changer_type:
      name: Loại máy tháo lốp
      description: Kiểu vận hành tổng thể, thiết kế hoặc mức độ tự động hóa của máy
        tháo lắp lốp.
    tire_compound_type:
      name: Loại hợp chất lốp
      description: 'Chỉ định loại hợp chất cao su được sử dụng trong lốp xe (ví dụ:
        mềm, mưa, trơn), yếu tố ảnh hưởng đến độ bám đường và độ bền trong các điều
        kiện khác nhau.'
    tire_load_range:
      name: Phạm vi tải trọng lốp
      description: Chỉ số này cho biết xếp hạng lớp bố/phạm vi tải trọng của lốp (thường
        dành cho lốp LT), phản ánh khả năng chịu tải.
    tire_position:
      name: Vị trí lốp xe
      description: Vị trí lắp đặt khuyến nghị trên phương tiện.
    tire_repair_kit_components:
      name: Các thành phần trong bộ dụng cụ sửa chữa lốp xe
      description: Chỉ rõ các mặt hàng có trong bộ sản phẩm, cho phép khách hàng so
        sánh độ đầy đủ của bộ sản phẩm.
    tire_sidewall_type:
      name: Loại thành lốp
      description: Chỉ định các đặc điểm về kiểu dáng hoặc cấu trúc của thành bên.
    tire_speed_rating:
      name: Chỉ số tốc độ của lốp
      description: 'Chữ cái chỉ tốc độ của lốp (ví dụ: H, V, W) cho biết khả năng
        đạt tốc độ tối đa có thể duy trì.'
    tire_spoon_type:
      name: Loại thìa lốp xe
      description: Phân loại thìa lốp xe theo hình dạng đầu và mục đích sử dụng.
    tire_system_compatibility:
      name: Khả năng tương thích của hệ thống lốp
      description: Cho biết chất làm kín này dành cho lốp không săm, lốp có săm, hay
        cả hai.
    tire_temperature_rating_utqg:
      name: Chỉ số nhiệt độ lốp (UTQG)
      description: 'Chỉ số chịu nhiệt UTQG dành cho lốp xe ô tô (ví dụ: A, B, C).'
    tire_traction_rating_utqg:
      name: Chỉ số độ bám đường của lốp (UTQG)
      description: Chỉ số độ bám đường UTQG đánh giá hiệu suất phanh trên đường ướt.
    tire_tread_style:
      name: Kiểu gai lốp
      description: Mô tả hoa văn gai lốp tổng quát của lốp xe dạng ống, phản ánh đặc
        tính địa hình và độ bám đường dự định.
    tire_tube_type:
      name: Loại săm lốp
      description: Lốp xe được thiết kế để sử dụng không săm hay có săm.
    title_status:
      name: Trạng thái tiêu đề
      description: Tình trạng pháp lý/đăng ký quyền sở hữu của xe.
    tobacco_application:
      name: Cách sử dụng thuốc lá
      description: Cho biết phương pháp sử dụng hoặc dụng cụ hút thuốc dự định dành
        cho loại thuốc lá rời này.
    tobacco_cut_type:
      name: Kiểu cắt sợi thuốc lá
      description: Chỉ định kiểu cắt hoặc chuẩn bị thuốc lá sợi, ảnh hưởng đến tốc
        độ cháy, phương pháp đóng gói và trải nghiệm hút thuốc nói chung.
    tobacco_strength:
      name: Cường độ thuốc lá
      description: Cho biết cảm nhận về độ đậm đặc hoặc tác dụng của nicotine khi
        hút thuốc, giúp người mua sắm lựa chọn độ đậm phù hợp với sở thích của họ.
    toe_construction:
      name: Cấu trúc ngón chân
      description: Chỉ định cấu hình khu vực ngón chân của ủng lặn, ảnh hưởng đến
        sự cân bằng, cảm giác tiếp xúc với ván và khả năng giữ ấm.
    toe_coverage:
      name: Bao phủ ngón chân
      description: Cho biết loại bao phủ ngón chân mà chiếc tất cung cấp.
    toe_pick_style:
      name: Kiểu mũi nhọn
      description: Mô tả thiết kế phần mũi nhọn của lưỡi giày trượt băng nghệ thuật.
    toe_protection_type:
      name: Loại bảo vệ mũi giày
      description: 'Cho biết liệu khu vực mũi giày có được gia cố để đảm bảo an toàn
        hay không và gia cố như thế nào (ví dụ: mũi thép, mũi mềm).'
    toe_reinforcement_type:
      name: Loại gia cố mũi giày
      description: Mô tả chi tiết cấu tạo của khu vực ngón chân, ảnh hưởng đến độ
        bền và khả năng tương thích với giày.
    toe_stop_stem_thread_size:
      name: Kích thước ren của trục chặn mũi giày
      description: Xác định kích thước ren của thân bộ phận chặn ngón chân để đảm
        bảo tính tương thích với tấm đế.
    tofu_preparation_style:
      name: Phong cách chế biến đậu phụ
      description: 'Phân loại các kiểu hoặc loại phụ truyền thống của đậu phụ dựa
        trên độ cứng (ví dụ: đậu phụ mềm, đậu phụ khối, đậu phụ phồng, đậu phụ có
        lớp vỏ mỏng, đậu phụ thắt nút, đậu phụ lên men).'
    tom_mount_adjustment_features:
      name: Các tính năng điều chỉnh giá đỡ Tom
      description: 'Chỉ định các điều chỉnh mà giá đỡ trống cung cấp để định vị trống
        (ví dụ: độ nghiêng, xoay, chiều cao).'
    tom_mount_components_included:
      name: Các linh kiện lắp gắn trống Tom đi kèm
      description: Chỉ rõ các bộ phận được bao gồm trong giá đỡ trống tom (bộ phận
        tiếp nhận, tay đỡ, khớp cầu, kẹp, khóa ghi nhớ, v.v.).
    tom_mount_mounting_position:
      name: Vị trí lắp đặt giá đỡ Tom
      description: 'Chỉ định vị trí lắp đặt giá đỡ trống tom (ví dụ: trống bass, giá
        đỡ chũm chọe, giá để đồ).'
    tonneau_cover_mounting_style:
      name: Kiểu lắp đặt nắp thùng xe bán tải
      description: Hướng dẫn cách lắp đặt/gắn nắp thùng xe vào thanh ray thùng xe.
    tool_case_form_factor:
      name: Hình dạng hộp đựng dụng cụ
      description: 'Xác định kiểu dáng vật lý của hộp đựng dụng cụ, ảnh hưởng đến
        tính di động và khả năng lưu trữ (ví dụ: cặp xách, hộp cứng).'
    tool_functions_included:
      name: Bao gồm các chức năng của công cụ
      description: Liệt kê các chức năng sửa chữa hoặc bảo dưỡng cụ thể mà một dụng
        cụ đa năng hoặc bộ dụng cụ có thể thực hiện.
    top_bunk_access_method:
      name: Phương pháp tiếp cận giường tầng trên
      description: Hướng dẫn cách người sử dụng lên giường tầng trên, giúp đảm bảo
        an toàn và tối ưu hóa không gian.
    top_fit:
      name: Phù hợp nhất
      description: 'Chỉ định kiểu dáng tổng thể hoặc độ vừa vặn của áo trên cơ thể
        (ví dụ: ôm sát hoặc rộng thùng thình).'
    top_hat_style:
      name: Kiểu mũ chóp cao
      description: Xác định kiểu dáng cụ thể của mũ chóp cao.
    top_soundboard_material:
      name: Vật liệu mặt trên (mặt đàn)
      description: Chỉ định chất liệu của mặt đàn guitar/bảng cộng hưởng (tấm tạo
        âm chính).
    topping_form:
      name: Hình thức phủ trên
      description: Xác định hình dạng hoặc độ đặc của lớp phủ món tráng miệng để giúp
        người sắm nhanh chóng tìm được sản phẩm phù hợp.
    topping_type:
      name: Loại phủ
      description: Chỉ định lớp phủ hoặc lớp trang trí bên ngoài chính được áp dụng
        cho bánh donut.
    tow_hook_type:
      name: Loại móc kéo
      description: Cho biết liệu bảng kê đầu gối có tích hợp móc kéo hay không và
        chỉ định kiểu cơ cấu của nó.
    tow_point_configuration:
      name: Cấu hình điểm kéo
      description: Chỉ định cấu hình điểm kéo (đơn, kép, nhiều điểm) mà phao kéo cung
        cấp cho các vị trí ngồi khác nhau.
    tow_strap_protective_features:
      name: Các tính năng bảo vệ của dây kéo
      description: Dây kéo được tích hợp các tính năng an toàn và độ bền đáng chú
        ý.
    tow_strap_type:
      name: Loại dây cáp kéo xe
      description: Thể hiện cấu tạo chức năng của dây kéo, chẳng hạn như dây kéo tĩnh
        so với dây kéo phục hồi động.
    towable_tube_style:
      name: Kiểu phao kéo
      description: Xác định thiết kế tổng thể hoặc hình dạng của phao kéo, yếu tố
        quyết định tư thế và trải nghiệm của người chơi.
    towed_water_sport_discipline:
      name: Môn thể thao dưới nước kéo
      description: Chỉ định hoạt động kéo nước chính mà găng tay được thiết kế cho.
    towel_features:
      name: Đặc điểm của khăn tắm
      description: Liệt kê các đặc điểm đặc biệt hoặc các tính năng bổ sung đi kèm
        với khăn tắm.
    towel_style:
      name: Kiểu khăn tắm
      description: Phân loại thiết kế hoặc kiểu dáng chức năng của khăn lau gậy golf.
    toy_airplane_control_type:
      name: Máy bay đồ chơi điều khiển
      description: Xác định cách người dùng điều khiển máy bay đồ chơi.
    toy_airplane_features:
      name: Đặc điểm của máy bay đồ chơi
      description: Nêu bật những tính năng chơi nổi bật có trên chiếc máy bay đồ chơi
        này.
    toy_airplane_flight_capability:
      name: Khả năng bay của máy bay đồ chơi
      description: Cho biết máy bay đồ chơi đó được thiết kế để thực sự bay/lướt hay
        chủ yếu để chơi/trưng bày trên mặt đất.
    toy_audio_features:
      name: Tính năng âm thanh của đồ chơi
      description: Liệt kê các khả năng âm thanh và hiệu ứng âm thanh được tích hợp
        trong đồ chơi.
    toy_boat_play_features:
      name: Đặc điểm chơi của thuyền đồ chơi
      description: Bài viết nêu bật các tính năng tương tác nổi bật của thuyền đồ
        chơi để người chơi khám phá và tìm kiếm.
    toy_boat_recommended_play_environment:
      name: Thuyền đồ chơi được khuyến nghị môi trường chơi
      description: 'Xác định môi trường chơi dự kiến cho chiếc thuyền đồ chơi để đáp
        ứng kỳ vọng của người mua sắm và đảm bảo an toàn (ví dụ: bồn tắm so với vùng
        nước mở).'
    toy_bowling_equipment_included:
      name: Bao gồm dụng cụ chơi bowling đồ chơi.
      description: 'Chỉ rõ các thành phần nào của bộ đồ chơi bowling (ví dụ: các quân
        bowling, quả bóng, làn/thảm, túi đựng).'
    toy_car_features:
      name: Đặc điểm của xe đồ chơi
      description: Điểm nổi bật là các tính năng chơi được tích hợp vào xe đồ chơi
        (tách biệt với cơ chế đẩy), chẳng hạn như đèn, âm thanh hoặc các bộ phận có
        thể mở ra.
    toy_drawing_tablet_accessories_included:
      name: Phụ kiện đi kèm của bảng vẽ đồ chơi
      description: 'Ngoài máy tính bảng, còn kèm theo các phụ kiện khác (ví dụ: bút
        cảm ứng bổ sung, tem).'
    toy_drawing_tablet_erase_method:
      name: Phương pháp xóa trên bảng vẽ đồ chơi
      description: Cách làm sạch/xóa bề mặt vẽ.
    toy_drawing_tablet_screen_type:
      name: Loại màn hình máy tính bảng đồ chơi
      description: 'Loại bề mặt vẽ/hiển thị được sử dụng (ví dụ: bảng viết LCD so
        với bảng viết từ tính).'
    toy_drawing_tablet_writing_drawing_instrument:
      name: Bảng vẽ đồ chơi, dụng cụ viết/vẽ.
      description: Công cụ chính được sử dụng để vẽ trên máy tính bảng (loại bút cảm
        ứng).
    toy_figure_sound_feature:
      name: Đặc điểm âm thanh của mô hình đồ chơi
      description: 'Cho biết hình tượng con vật có phát ra âm thanh hay không và đó
        là loại âm thanh gì (ví dụ: tiếng gầm, âm thanh động vật chân thực).'
    toy_game_features:
      name: Tính năng của đồ chơi/trò chơi
      description: Nêu bật những đặc điểm chơi hoặc cấu tạo nổi bật liên quan đến
        đồ chơi bãi biển và cát.
    toy_gift_basket_items_included:
      name: Các món đồ đi kèm trong giỏ quà đồ chơi
      description: 'Liệt kê các loại đồ chơi chính có trong giỏ quà (ví dụ: thú nhồi
        bông, bộ lắp ráp, trò chơi xếp hình).'
    toy_glider_launch_method:
      name: Phương pháp phóng máy bay lượn đồ chơi
      description: Quy định cách thức phóng máy bay lượn đồ chơi, điều này ảnh hưởng
        đến phong cách chơi và kỳ vọng của người mua sắm.
    toy_helicopter_control_type:
      name: Máy bay trực thăng đồ chơi điều khiển
      description: Cách điều khiển/vận hành máy bay trực thăng đồ chơi (độc lập với
        động cơ đẩy), chẳng hạn như điều khiển từ xa cầm tay, điều khiển qua ứng dụng
        hoặc không điều khiển (bay tự do).
    toy_helicopter_features:
      name: Đặc điểm của máy bay trực thăng đồ chơi
      description: Các tính năng chức năng chính của máy bay trực thăng đồ chơi (đặc
        biệt là các mẫu điều khiển từ xa) ảnh hưởng đến khả năng sử dụng và giá trị
        chơi.
    toy_jacks_set_items_included:
      name: Bộ đồ chơi ném tạ bao gồm
      description: 'Chỉ định các vật dụng chính được bao gồm trong bộ đồ chơi ném
        tạ (ví dụ: tạ, bóng, túi).'
    toy_keyboard_learning_mode:
      name: Chế độ học tập bàn phím đồ chơi
      description: 'Thể hiện phương pháp giáo dục/học tập được hỗ trợ bởi bàn phím
        đồ chơi (ví dụ: phím phát sáng, bài hát để học theo, bài học có hướng dẫn,
        học tập có hỗ trợ ứng dụng).'
    toy_keyboard_sound_theme:
      name: Chủ đề âm thanh bàn phím đồ chơi
      description: Các loại âm thanh/chủ đề nhạc cụ tích hợp sẵn được cung cấp (ngoài
        piano thông thường).
    toy_kitchen_appliances_included:
      name: Bao gồm các dụng cụ nhà bếp đồ chơi.
      description: Chỉ định (các) thiết bị nhà bếp được thể hiện trong bộ đồ chơi
        khi sản phẩm là một thiết bị gia dụng hoặc bộ đồ chơi tập trung vào thiết
        bị gia dụng.
    toy_kitchen_assembly_requirement:
      name: Yêu cầu lắp ráp nhà bếp đồ chơi
      description: Cho biết liệu có cần lắp ráp hay không và độ phức tạp lắp ráp ước
        tính.
    toy_kitchen_interactive_features:
      name: Đồ chơi nhà bếp có các tính năng tương tác.
      description: Bài viết này nêu bật các yếu tố tương tác thường thấy trong đồ
        chơi nhà bếp và các phụ kiện liên quan.
    toy_motorcycle_feature_set:
      name: Bộ đồ chơi xe máy có nhiều tính năng
      description: Các tính năng chính khi chơi của xe máy đồ chơi (chọn tất cả các
        tính năng phù hợp).
    toy_motorcycle_scale:
      name: Mô hình xe máy đồ chơi
      description: 'Tỷ lệ thu nhỏ cho mô hình xe máy đồ chơi/sưu tầm (ví dụ: 1:12).'
    toy_parachute_launch_method:
      name: Phương pháp phóng dù đồ chơi
      description: Cách thức đồ chơi này được thiết kế để phóng/triển khai để bay.
    toy_piano_and_keyboard_accessories_included:
      name: Bao gồm đàn piano đồ chơi và các phụ kiện bàn phím.
      description: Các phụ kiện đi kèm với đàn piano đồ chơi hoặc bàn phím đồ chơi.
    toy_playset_assembly_required:
      name: Cần lắp ráp bộ đồ chơi.
      description: Cho biết liệu có cần người lớn lắp ráp trước khi chơi hay không
        (ngoài việc chỉ cần ghép các bộ phận lại với nhau).
    toy_playset_items_included:
      name: Các món đồ đi kèm trong bộ mô hình đồ chơi
      description: Liệt kê các thành phần chính có trong bộ đồ chơi (những thứ có
        trong hộp).
    toy_safety_certification:
      name: Chứng nhận an toàn đồ chơi
      description: 'Các tiêu chuẩn/dấu hiệu an toàn và tuân thủ áp dụng cho đồ chơi
        trên thị trường tiêu dùng (ví dụ: EN 71, ASTM F963, UKCA).'
    toy_spaceship_features:
      name: Đặc điểm của tàu vũ trụ đồ chơi
      description: Thể hiện các tính năng tương tác/chơi phổ biến được tích hợp trong
        mô hình tàu vũ trụ đồ chơi.
    toy_spaceship_size_class:
      name: Cỡ tàu vũ trụ đồ chơi
      description: 'Chỉ định kích thước tổng quát cho tàu vũ trụ đồ chơi để hỗ trợ
        lọc nhanh, khác với kích thước chính xác (chiều dài/chiều rộng/chiều cao)
        và không phải tỷ lệ mô hình số (ví dụ: 1:72).'
    toy_tableware_pieces_included:
      name: Các chi tiết bộ dụng cụ ăn uống đồ chơi đi kèm
      description: Chỉ rõ những món đồ chơi bộ đồ ăn nào được bao gồm (đĩa, cốc, dao
        nĩa, đồ dùng phục vụ).
    toy_tool_electronic_features:
      name: Đặc điểm điện tử của dụng cụ đồ chơi
      description: Mô tả các chức năng tương tác/điện tử của đồ chơi (đèn, âm thanh,
        chuyển động xoay, v.v.).
    toy_tool_set_components_included:
      name: Các thành phần đi kèm trong bộ dụng cụ sửa chữa đồ chơi
      description: Liệt kê các công cụ đồ chơi giả vờ cụ thể có trong gói hàng (đặc
        biệt là đối với các bộ công cụ).
    toy_train_scale:
      name: Tỷ lệ của mô hình tàu hỏa đồ chơi
      description: Chỉ định tiêu chuẩn quy mô đồ chơi/mô hình xe lửa (hoặc kích thước
        hệ thống theo dõi) để đảm bảo khả năng tương thích với các đoàn tàu và thiết
        bị theo dõi hiện có.
    toy_train_track_layout_type:
      name: Đồ chơi xe lửa theo dõi loại địa phương
      description: Mô tả bố cục/hình dạng đường ray có sẵn trong bộ tàu hỏa hoặc bộ
        đường ray mở rộng.
    toy_weapon_gadget_features:
      name: Đặc điểm của đồ chơi vũ khí và thiết bị
      description: Highlight các tính năng tương tác và chức năng phổ biến đặc trưng
        của đồ chơi vũ khí và thiết bị gián điệp.
    tpms_sensor_frequency_band:
      name: Dải tần số cảm biến TPMS
      description: Dải tần số vô tuyến được hỗ trợ bởi các phụ kiện liên quan đến
        TPMS (nếu có).
    track_and_field_discipline:
      name: lý thuyết và kỷ luật thực địa
      description: 'Xác định nội dung thi đấu hoặc bộ môn điền kinh cụ thể mà sản
        phẩm hướng đến (ví dụ: ném tạ, nhảy sào, chạy nước rút).'
    track_event_specialization:
      name: Chuyên môn hóa nội dung thi đấu điền kinh
      description: Cho biết loại nội dung thi đấu mà giày đinh được tối ưu hóa.
    track_field_event_suitability:
      name: Tính phù hợp với các sự kiện điền kinh
      description: Xác định sự kiện điền kinh cụ thể mà dụng cụ hỗ trợ huấn luyện
        này dành cho.
    track_set_special_features:
      name: Các tính năng đặc biệt của bộ đường đua
      description: Nêu bật những tính năng chơi nổi bật đi kèm với bộ đường đua, ngoài
        đường ray và xe cơ bản.
    track_surface_compatibility:
      name: Độ tương thích với bề mặt đường chạy
      description: Chỉ định bề mặt chạy mà giày đinh hoặc giày thể thao được thiết
        kế cho.
    tracking_aid_type:
      name: Loại thiết bị theo dõi
      description: Cho biết liệu thuyền kayak có bao gồm các thiết bị giúp tăng cường
        khả năng giữ thăng bằng theo đường thẳng hay không.
    traction_pattern_type:
      name: Loại hoa văn lực kéo
      description: Mô tả rãnh hoặc hoa văn bề mặt chính giúp tạo độ bám trên má phanh.
    trading_card_league:
      name: Giải đấu thẻ giao dịch
      description: Xác định giải đấu thể thao liên quan đến bộ thẻ hoặc chủ đề (nếu
        có).
    trailer_construction:
      name: Xây dựng rơ moóc
      description: 'Xác định vật liệu chính cấu tạo khung/thân của rơ moóc (ví dụ:
        nhôm, thép hoặc vật liệu hỗn hợp).'
    trailer_coupler_size:
      name: Kích thước của khớp nối rơ-moóc
      description: Chỉ định kích thước bóng của bộ ghép rơ-moóc cần thiết để kéo.
    trailer_hitch_mounting_location_method:
      name: Địa điểm/phương thức gắn rơ-moóc
      description: 'Chỉ định vị trí và cách lắp đặt móc kéo rơ moóc trên xe (ví dụ:
        móc kéo phía sau, móc kéo phía trước, gắn trên Frame , gắn trên cản sau, gắn
        trên thùng xe).'
    trailer_light_function:
      name: Chức năng đèn rơ moóc
      description: Chức năng/vị trí chính của đèn rơ moóc.
    trailer_suspension_type:
      name: Loại hệ thống treo của rơ-moóc
      description: Chỉ định loại hệ thống treo được sử dụng trong rơ moóc xe đạp,
        chẳng hạn như lò xo cuộn hoặc lò xo lá, để cải thiện sự thoải mái khi di chuyển
        và bảo vệ hàng hóa.
    trailer_wiring_circuit:
      name: Mạch điện rơ moóc
      description: Liệt kê các mạch/tín hiệu chiếu sáng, phanh và phụ trợ được truyền
        tải bởi hệ thống dây điện của rơ moóc (tức là, các đường dây nguồn/nối đất
        và tín hiệu nào hiện có).
    trailer_wiring_connector_type:
      name: Loại kết nối dây dẫn của đoạn giới thiệu
      description: Quy định tiêu chuẩn phích cắm phía rơ moóc/phía xe được sử dụng
        cho bộ dây điện và bộ chuyển đổi rơ moóc.
    train_whistle_intended_use:
      name: Mục đích sử dụng còi tàu hỏa
      description: Bối cảnh sử dụng chính của chiếc còi.
    train_whistle_sound_character:
      name: Đặc điểm âm thanh còi tàu
      description: Mô tả đặc điểm âm sắc (âm điệu) cảm nhận được của tiếng còi.
    trainer_mounting_type:
      name: Kiểu lắp đặt của xe đạp tập cố định
      description: 'Mô tả cách xe đạp tương tác với thiết bị tập luyện (ví dụ: kiểu
        kết nối bánh xe trực tiếp hoặc kết nối trực tiếp).'
    training_dummy_shape:
      name: Hình dạng hình nộm huấn luyện
      description: Xác định thiết kế tổng thể hoặc hình dáng của hình nộm, điều này
        ảnh hưởng đến khả năng giữ của chó và tính thực tế của quá trình huấn luyện.
    training_focus:
      name: Trọng tâm đào tạo
      description: 'Mô tả lĩnh vực kỹ năng chính mà công cụ hỗ trợ nhắm đến (ví dụ:
        phản xạ, kỹ thuật di chuyển chân, phối hợp tay mắt).'
    training_focus_area:
      name: Lĩnh vực trọng tâm đào tạo
      description: Xác định kỹ năng chơi lacrosse chính mà dụng cụ hỗ trợ này được
        thiết kế để phát triển.
    training_objective:
      name: Mục tiêu đào tạo
      description: Xác định kỹ năng hoặc kỹ thuật chính mà sản phẩm được thiết kế
        để cải thiện.
    training_surface_suitability:
      name: Tính phù hợp của bề mặt huấn luyện
      description: Chỉ định các bề mặt mà thiết bị huấn luyện có thể được sử dụng.
    training_surface_usage:
      name: Sử dụng bề mặt huấn luyện
      description: Xác định các hoạt động chính mà bề mặt tập luyện hỗ trợ, phân biệt
        các tấm băng nhân tạo dùng để trượt băng với các tấm thảm tập trên cạn hoặc
        đa năng.
    training_usage_type:
      name: Loại hình sử dụng đào tạo
      description: Xác định khoảng thời gian sử dụng chính hoặc Context dự định cho
        quần tập luyện, chẳng hạn như tập luyện ban ngày hoặc ban đêm.
    trampoline_enclosure_type:
      name: Loại khung bao quanh bạt nhún
      description: Chỉ định cấu hình hàng rào bảo vệ được sử dụng trên tấm bạt lò
        xo, bao gồm cách thức/vị trí lắp đặt lưới.
    trampoline_safety_certifications:
      name: Các chứng nhận an toàn của bạt nhún
      description: Cho biết sản phẩm tuân thủ những tiêu chuẩn/chứng nhận an toàn
        nào liên quan đến bạt nhún.
    transfer_application_method:
      name: Phương pháp dập hình chuyển nhiệt
      description: 'Chỉ định cách thức áp dụng hình ảnh chuyển nhiệt lên vải (ví dụ:
        ủi trực tiếp so với ép nhiệt).'
    transfer_method:
      name: Phương thức chuyển giao
      description: Xác định cách thức thiết kế dự định được chuyển lên vải.
    transfer_peel_temperature:
      name: Nhiệt độ bóc vỏ chuyển tiếp
      description: Chỉ định trạng thái nhiệt độ được khuyến nghị (nóng, ấm hoặc lạnh)
        mà tấm hãng vận chuyển nên được lấy ra sau khi ép.
    transmission_cooler_construction:
      name: Cấu trúc bộ làm mát hộp số
      description: Quy định thiết kế cấu tạo của lõi làm mát hộp số.
    transmission_fluid_specification:
      name: Thông số kỹ thuật dầu hộp số
      description: 'Tiêu chuẩn OEM/thông số kỹ thuật mà dầu hộp số đáp ứng (ví dụ:
        các dòng Dexron/Mercon, ATF+4, JWS 3309).'
    transmission_mount_bushing_material:
      name: Vật liệu bạc lót giá đỡ hộp số
      description: Chỉ định vật liệu đàn hồi hoặc vật liệu cách ly được sử dụng trong
        ống lót/bộ phận cách ly của giá đỡ (phần tử giảm chấn rung động).
    transmission_mount_type:
      name: Loại giá đỡ hộp số
      description: 'Xác định cấu tạo/thiết kế của giá đỡ hộp số (ví dụ: thủy lực so
        với loại cứng) để giúp xác định độ phù hợp, đặc tính NVH và mục đích sử dụng.'
    transparency_level:
      name: Mức độ minh bạch
      description: Mô tả các bức tường của thùng (nhựa) trong suốt như thế nào, giúp
        người mua sắm quyết định giữa khả năng hiển thị trong suốt và khả năng cất
        giữ được giấu kín.
    transport_case_type:
      name: Loại hộp vận chuyển
      description: Phân loại kiểu dáng/độ cứng cấu trúc của giải pháp vận chuyển,
        phản ánh mức độ bảo vệ và phương pháp đóng gói.
    transposition_modes:
      name: Chế độ chuyển giọng
      description: 'Chỉ định các chế độ chuyển giọng/cao độ chuẩn mà máy chỉnh âm
        hỗ trợ (ví dụ: cao độ chuẩn và các giọng chuyển đổi như Si giáng hoặc Mi giáng).'
    trap_design:
      name: Thiết kế của bẫy
      description: Xác định kiểu dáng hoặc cơ chế cấu tạo của bẫy, từ đó quyết định
        phương pháp triển khai và loài hoặc môi trường mà bẫy phù hợp nhất.
    trap_spring_configuration:
      name: Cấu hình lò xo bẫy
      description: Thông số này cho biết số lượng hoặc cách bố trí các lò xo vận hành
        bẫy, ảnh hưởng đến độ chắc chắn và tính hợp pháp của bẫy.
    travel_bassinet_accessories_included:
      name: Bao gồm các phụ kiện nôi du lịch.
      description: Danh sách bổ sung mặt hàng; mục Supply nôi du lịch.
    travel_spinning_wheel_assembly_required:
      name: Cần có bộ phận máy kéo sợi di động
      description: 'Liệu bánh xe có cần lắp ráp/thiết lập thêm ngoài việc mở ra (ví
        dụ: gắn trục quay, điều chỉnh độ căng, bàn đạp) trước khi sử dụng hay không.'
    travel_spinning_wheel_portability_features:
      name: Tính năng di động của máy kéo sợi du lịch
      description: Các yếu tố thiết kế liên quan đến tính di động của máy kéo sợi
        du lịch, chẳng hạn như cấu trúc gấp gọn và các giải pháp vận chuyển đi kèm.
    travel_trailer_appliances_fuel_type:
      name: Loại nhiên liệu của thiết bị xe kéo du lịch
      description: Nhiên liệu chính dùng cho đào tạo ban đầu các thiết bị/sưởi ấm/nấu
        ăn (không phải xe kéo).
    travel_trailer_holding_tank_type:
      name: Loại bể chứa cho xe kéo du lịch
      description: Cho biết những bể chứa nào có trong xe kéo du lịch (chọn tất cả
        các mục phù hợp).
    travel_trailer_power_hookup_shore_power:
      name: Kết nối nguồn điện cho xe kéo du lịch (điện lưới)
      description: Các tiêu chuẩn kết nối điện được hỗ trợ cho các kết nối nguồn điện
        trên bờ.
    tread_pattern_type:
      name: Loại kiểu dáng gai lốp
      description: Phân loại thiết kế gai lốp tổng thể, chẳng hạn như trơn, bán trơn
        hoặc có gai, ảnh hưởng đến độ bám đường, lực cản lăn và bề mặt sử dụng dự
        định.
    treadmill_key_type:
      name: Loại chìa khóa máy chạy bộ
      description: 'Mô tả kiểu dáng vật lý hoặc cơ chế hoạt động/kết nối của khóa
        an toàn (ví dụ: nam châm tròn, miếng nhựa, kẹp).'
    treadmill_part_type:
      name: Loại linh kiện máy chạy bộ
      description: 'Xác định rõ bộ phận cụ thể của máy chạy bộ mà sản phẩm này dùng
        để thay thế, giúp người mua sắm nhanh chóng xác nhận sự phù hợp (ví dụ: dây
        đai so với động cơ).'
    treadmill_position:
      name: Vị trí máy chạy bộ
      description: Ký hiệu này chỉ vị trí lắp đặt của bộ phận trên máy chạy bộ (phía
        trước, phía sau, phía trên, phía dưới, ở giữa).
    triangle_striker_material:
      name: Vật liệu đánh dấu hình tam giác
      description: Chất liệu của dùi trống/quả bóng đi kèm.
    trigger_input_connector:
      name: Kết nối đầu vào kích hoạt yếu tố
      description: Quy định tiêu chuẩn vật lý của đầu nối được sử dụng cho các cổng
        vào kích hoạt.
    trigger_input_connector_type:
      name: Loại đầu nối của cổng vào kích hoạt
      description: Chỉ định loại kết nối vật lý được sử dụng cho đầu vào yếu tố kích
        hoạt.
    trigger_input_zone_support:
      name: Hỗ trợ vùng đầu vào kích hoạt yếu tố
      description: 'Cho biết liệu yếu tố kích hoạt đầu vào có hỗ trợ một vùng và/hoặc
        hai vùng yếu tố kích hoạt (ví dụ: đầu/vành) và việc triển khai đa vùng tương
        tự hay không.'
    trim_application_method:
      name: Phương pháp gắn viền trang trí
      description: 'Cho biết cách thức gắn viền trang trí vào sản phẩm (ví dụ: may,
        ủi, dán).'
    trim_detail:
      name: Chi tiết trang trí
      description: 'Xác định các cạnh hoặc đường viền trang trí nổi bật trên trang
        phục (ví dụ: viền tua rua, viền ren).'
    trim_elasticity:
      name: Độ đàn hồi của viền
      description: Cho biết liệu viền ric-rac có độ co giãn để sử dụng trên các ứng
        dụng quần áo dệt kim/thể thao hay không.
    trim_finish:
      name: Hoàn thiện viền
      description: 'Xử lý bề mặt được áp dụng cho phần viền (ví dụ: kim loại, lấp
        lánh, phản quang).'
    trim_tilt_type:
      name: Loại điều chỉnh độ nghiêng và nâng hạ
      description: Động cơ có hỗ trợ điều chỉnh độ nghiêng/cắt tỉa hay không và hỗ
        trợ như thế nào.
    trolleybus_power_supply_type:
      name: Loại nguồn điện xe buýt điện
      description: Quy định cách xe buýt điện nhận điện năng từ mạng lưới điện.
    truck_bed_body_type:
      name: Loại thùng xe tải/thân xe
      description: Cấu hình thùng xe hoặc khoang chứa hàng phía sau cabin.
    truck_bed_length_class:
      name: loại thùng xe tải dài
      description: Chỉ định loại chiều dài thùng xe tải mà lưới chở hàng được thiết
        kế để phù hợp (thường được gọi là thùng ngắn/tiêu chuẩn/dài).
    truck_mounting_hole_pattern:
      name: Mẫu lỗ lắp đặt trên xe tải
      description: 'Chỉ định bố cục lỗ được sử dụng để gắn trục bánh xe vào ván trượt
        (ví dụ: kiểu cũ, kiểu mới, kiểu phổ thông).'
    truck_mounting_style:
      name: Kiểu lắp đặt trục xe trượt
      description: Cách gắn trục bánh xe vào ván trượt (gắn trên, xuyên qua, v.v.)
        ảnh hưởng đến chiều cao và độ ổn định của xe.
    truck_profile:
      name: Hồ sơ xe tải
      description: Chỉ số này cho biết phân loại chiều cao của trục ván trượt so với
        ván, ảnh hưởng đến khoảng cách giữa bánh xe và mặt ván cũng như cảm giác khi
        trượt.
    trumpet_bell_material:
      name: Vật liệu chuông kèn
      description: Chất liệu dùng cho phần chuông (đôi khi khác với phần còn lại của
        nhạc cụ).
    trumpet_leadpipe_material:
      name: Chất liệu ống thổi chính của kèn Trumpet
      description: Vật liệu hoặc phương pháp xử lý được sử dụng cho ống chì (ống chính
        từ miệng hút đến van).
    trundle_mechanism:
      name: Cơ cấu trượt
      description: Mô tả cách thức triển khai bộ phận giường phụ từ khung chính.
    trunk_part_type:
      name: Loại bộ phận cốp xe
      description: 'Chỉ rõ bộ phận thân xe liên quan đến cốp xe nào đang được bán
        (ví dụ: nắp cốp, bản lề, chốt).'
    tuba_leadpipe_material:
      name: Vật liệu kèn Tuba
      description: Xác định chất liệu được sử dụng cho phần ống thổi (ống ngậm) của
        kèn tuba.
    tube_base_type:
      name: Loại chân đế của ống
      description: 'Chỉ định loại đế/ổ cắm ống được sử dụng để lắp ráp vật lý/điện
        (ví dụ: Octal, Noval/9- đã ghim).'
    tube_matching_grade:
      name: Ống phù hợp
      description: Cho biết liệu các ống nghiệm có được kiểm tra/ghép nối theo bộ
        hay không và loại ghép nối được cung cấp.
    tube_weight_category:
      name: Phân loại trọng lượng của ống
      description: 'Phân loại ống theo cấu tạo/trọng lượng (ví dụ: Siêu nhẹ, Tiêu
        chuẩn, Nặng) để so sánh nhanh độ bền so với hiệu suất.'
    tubeless_compatible:
      name: Tương thích với lốp không săm
      description: Cho biết liệu vành xe có được thiết kế để sử dụng mà không cần
        săm khi kết hợp với lốp không săm hay không.
    tubing_shape:
      name: Hình dạng ống
      description: Xác định hình dạng mặt cắt ngang của ống đỡ giá đỡ.
    tubular_construction_type:
      name: Kiểu kết cấu dạng ống
      description: Quy định kiểu cấu tạo của lốp xe đạp dạng ống, phân biệt giữa lốp
        ống dán truyền thống và các biến thể mới hơn.
    tulip_type_flower_form:
      name: Loại hoa tulip (hình dạng hoa)
      description: 'Chỉ định loại hình trồng trọt/hình dạng hoa của hoa tulip trong
        bó (ví dụ: hoa đơn, hoa kép, hoa hình vẹt).'
    tuner_input_method:
      name: Phương thức nhập bộ dò đài
      description: Chỉ định cách bộ chỉnh âm phát hiện cao độ (micro, cảm biến rung/kẹt,
        đầu vào cáp nhạc cụ, tiếp điểm lấy hàng).
    tuning_mechanism:
      name: Cơ chế điều chỉnh
      description: Cách căng/điều chỉnh mặt trống bongo.
    tuning_system:
      name: Hệ thống điều chỉnh
      description: Cách lên dây của trống hình chiếc cốc hoặc trống đó có thể lên
        dây được hay không.
    turn_signal_lens_color:
      name: Đèn xi nhan màu sắc
      description: màu sắc của thấu kính/vỏ nhìn thấy được trên vỏ đèn xi nhan (không
        phải màu sắc của ánh sáng phát ra).
    turn_signal_lighting_style:
      name: Kiểu đèn xi nhan
      description: Kiểu tín hiệu/hiệu ứng hình ảnh do đèn báo rẽ cung cấp.
    turnip_and_rutabaga_variety:
      name: Giống củ cải và củ cải Thụy Điển
      description: Xác định giống hoặc chủng loại cụ thể của củ cải trắng hoặc củ
        cải vàng.
    tweeter_crossover_type:
      name: Loại phân tần loa tweeter
      description: Cho biết loại mạch phân tần cao và/hoặc linh kiện bảo vệ đi kèm
        với loa tweeter, nếu có.
    tweeter_material:
      name: Chất liệu của loa treble
      description: Vật liệu màng loa/vòm loa chính của loa tweeter.
    tweeter_mount_type:
      name: Kiểu lắp đặt loa tweeter
      description: Chỉ định cách thức lắp đặt loa tweeter trong xe (phương pháp/trang
        thiết bị lắp đặt).
    twill_direction:
      name: Hướng dệt chéo
      description: Chỉ hướng đường dệt chéo của vải denim.
    twist_direction:
      name: Hướng xoắn
      description: Hướng xoắn sợi được sử dụng trong sợi (xoắn chữ S hoặc xoắn chữ
        Z).
    u_joint_series_size:
      name: Dòng/kích thước khớp nối chữ U
      description: 'Chỉ định dòng sản phẩm hoặc tiêu chuẩn kích thước khớp nối chữ
        U được sử dụng (ví dụ: dòng 1310).'
    uilleann_pipes_bag_material:
      name: Chất liệu túi đựng kèn Uilleann
      description: Chất liệu của bộ phận túi khí (nếu có), ảnh hưởng đến cảm giác,
        độ bền và việc bảo trì.
    uilleann_pipes_handedness:
      name: sự thuận tay của kèn Uilleann
      description: Cho biết bộ sản phẩm được cấu hình cho người chơi thuận tay phải
        hay thuận tay trái.
    uilleann_pipes_set_configuration:
      name: Cấu hình bộ ống Uilleann
      description: Xác định cấu hình nào của kèn uilleann được bao gồm, dựa trên sự
        hiện diện của bộ điều chỉnh và ống thổi.
    uk_childrens_shoe_size:
      name: Cỡ giày trẻ em UK
      description: Chỉ rõ cỡ giày trẻ em theo chuẩn Anh (UK), ví dụ như cỡ 4 hoặc
        cỡ 4 bản rộng (4 Wide).
    uk_clothing_size:
      name: Kích cỡ quần áo theo chuẩn Anh (UK)
      description: Chỉ rõ cỡ quần áo theo chuẩn Anh (UK), ví dụ như cỡ 12 hoặc cỡ
        18
    uk_cup_size:
      name: Kích cỡ cúp áo ngực theo chuẩn Anh (UK)
      description: Chỉ định kích cỡ áo lót áo ngực của Vương quốc Anh, chẳng hạn như
        C hoặc FF
    uk_mens_shoe_size:
      name: Cỡ giày nam theo chuẩn Anh (UK)
      description: Chỉ rõ cỡ giày nam theo chuẩn Anh (UK), ví dụ như cỡ 9 hoặc cỡ
        9 bản rộng (9 Wide)
    uk_womens_shoe_size:
      name: Kích thước giày nữ Anh
      description: Chỉ định kích thước cỡ giày nữ của Anh, ví dụ như 6 hoặc 6 Wide.
    ukulele_back_and_sides_wood:
      name: Mặt lưng và hông đàn ukulele bằng gỗ
      description: Xác định loại gỗ/chất liệu được sử dụng cho mặt sau và hai bên
        của đàn ukulele.
    ukulele_body_cutaway:
      name: Phần khoét trên thân đàn ukulele
      description: Cho biết liệu thân đàn ukulele cỡ concert có phần khoét để dễ dàng
        tiếp cận các phím đàn phía trên hay không.
    ukulele_body_shape:
      name: Hình dáng thân đàn Ukulele
      description: Kiểu dáng/hình dạng chung được sử dụng cho đàn ukulele.
    ukulele_bridge_material:
      name: Chất liệu ngựa đàn ukulele
      description: Chỉ định chất liệu được sử dụng cho ngựa đàn ukulele.
    ukulele_construction_type:
      name: Kiểu kết cấu của đàn Ukulele
      description: Cấu tạo mặt trên/mặt sau/mặt bên của nhạc cụ (vật liệu nguyên khối
        so với vật liệu ghép).
    ukulele_electronics_configuration:
      name: Cấu hình thiết bị điện tử Ukulele
      description: Cho biết đàn ukulele chỉ có âm thanh hay bao gồm đào tạo ban đầu
        thiết bị điện tử (lấy hàng và/hoặc preamp) để khuếch đại.
    ukulele_string_re_entrant_tuning:
      name: Cách chỉnh dây đàn ukulele kiểu re-entrant
      description: Đáp án cho việc đàn ukulele được chỉnh dây theo kiểu re-entrant
        (cao-G) hay kiểu linear/thấp-G; đây là sở thích phổ biến của người mua và
        ảnh hưởng đến âm thanh.
    ukulele_top_wood:
      name: Mặt đàn ukulele bằng gỗ
      description: Xác định loại gỗ/vật liệu được sử dụng cho mặt đàn ukulele/bảng
        cộng hưởng.
    ukulele_tuner_mechanism:
      name: Cơ chế chỉnh dây đàn ukulele
      description: Chỉ định kiểu/cơ chế chỉnh dây được sử dụng trên đàn ukulele.
    ukulele_tuner_type:
      name: Loại máy chỉnh âm Ukulele
      description: Kiểu dáng bộ chỉnh dây được sử dụng trên đầu cần đàn ukulele.
    ukulele_tuning:
      name: Cách chỉnh dây đàn ukulele
      description: Chỉ định cách chỉnh dây tiêu chuẩn dự định cho đàn ukulele bỏ túi.
    ultralight_aircraft_wing_configuration:
      name: Cấu hình cánh máy bay siêu nhẹ
      description: Vị trí và cấu hình của cánh chính so với thân/cấu trúc máy bay.
    under_bed_features:
      name: Đặc điểm của đồ dùng dưới gầm giường
      description: Xác định yếu tố chức năng chính nằm bên dưới bệ giường.
    underfoot_strap_type:
      name: Kiểu dây đeo dưới chân
      description: Xác định chất liệu hoặc thiết kế được sử dụng cho dây đeo nằm bên
        dưới giày.
    underwear_fit:
      name: Đồ lót vừa vặn
      description: 'Thể hiện kiểu dáng tổng thể của quần đùi boxer (ví dụ: ôm sát,
        rộng rãi, nén).'
    underwear_pieces_included:
      name: Các món đồ đi kèm trong bộ đồ lót
      description: Xác định các bộ phận trang phục được cung cấp (áo, quần, cả hai,
        hoặc bộ liền thân) để khách hàng biết liệu họ đang mua một bộ hoàn chỉnh hay
        một cá nhân mặt hàng; mục.
    uniform_pieces_included:
      name: Các bộ phận đồng phục bao gồm
      description: 'Xác định các thành phần may mặc nào là Supply (ví dụ: áo sơ mi,
        quần, áo vest), làm rõ gói sản phẩm nội dung cho hàng rời hoặc bộ mua.'
    uniform_role:
      name: Vai trò đồng nhất
      description: 'Chỉ định vai trò chuyên nghiệp hoặc cơ quan mà đồng phục mặt hàng;
        mục này dành cho (ví dụ: Cảnh sát, Cảnh sát trưởng, Dịch vụ cấp cứu).'
    update_method:
      name: Phương thức cập nhật
      description: Cách thức cập nhật phần mềm/firmware cho máy quét được thực hiện.
    upholstery_fabric_backing_type:
      name: Loại vải lót bọc nội thất
      description: Chỉ định lớp lót/lớp phủ trên vải bọc nội thất, ảnh hưởng đến quá
        trình lắp đặt và cảm giác khi chạm vào.
    upholstery_fabric_water_resistance:
      name: Khả năng chống nước của vải bọc nội thất
      description: Thể hiện khả năng chống nước và chống tràn của bề mặt vải bọc nội
        thất.
    upper_material:
      name: Chất liệu phần trên
      description: Chỉ định chất liệu chính được sử dụng ở phần trên của giày thể
        thao, ảnh hưởng đến khả năng thoáng khí, độ bền và tính thẩm mỹ.
    upright_bass_pickup_system:
      name: Hệ thống lấy hàng âm trầm thẳng đứng
      description: Cho biết liệu đàn bass đứng có tích hợp hệ thống lấy hàng/tiền
        khuếch đại dùng để khuếch đại âm thanh hay không.
    upright_piano_power_source:
      name: Nguồn điện cho đàn piano đứng
      description: Cách thức hoạt động của đàn piano đứng, áp dụng cho cả đàn piano
        đứng cơ học không có nguồn điện cũng như đàn piano đứng có hệ thống giảm tiếng
        ồn/lai cần điện.
    urination_device_features:
      name: Đặc điểm của thiết bị đi tiểu
      description: Highlight những đặc điểm thiết kế đặc biệt giúp tăng cường chức
        năng hoặc sự tiện lợi.
    us_childrens_shoe_size:
      name: Cỡ giày trẻ em theo chuẩn Mỹ (US)
      description: Chỉ rõ cỡ giày trẻ em theo chuẩn Mỹ (US), ví dụ như cỡ 5 hoặc cỡ
        5 bản rộng (5 Wide)
    us_clothing_size:
      name: Kích cỡ quần áo theo chuẩn Mỹ (US)
      description: Chỉ rõ cỡ quần áo theo chuẩn Mỹ (US), ví dụ như cỡ 8 hoặc cỡ 14
    us_cup_size:
      name: Kích cỡ cúp áo ngực theo chuẩn Mỹ (US)
      description: Chỉ rõ cỡ cúp áo ngực theo chuẩn Mỹ (US), ví dụ như cỡ C hoặc cỡ
        DDD
    us_mens_shoe_size:
      name: Cỡ giày nam US
      description: Chỉ rõ cỡ giày nam theo chuẩn Mỹ (US), ví dụ như cỡ 10 hoặc cỡ
        10 bản rộng (10 Wide)
    us_ring_size:
      name: Cỡ nhẫn USD
      description: Chỉ rõ cỡ nhẫn theo chuẩn Mỹ (US), ví dụ như cỡ 7 hoặc cỡ 9.5
    us_womens_shoe_size:
      name: Cỡ giày nữ USD
      description: Chỉ định kích thước giày nữ của US, ví dụ như 8 hoặc 8 Wide.
    usage:
      name: Cách sử dụng
      description: Mô tả mục đích sử dụng hộp/điều chỉnh của trục cam.
    usda_honey_grade:
      name: Honey đạt tiêu chuẩn USDA.
      description: Chỉ số này cho biết cấp độ chính thức do Bộ Nông nghiệp Hoa Kỳ
        (USDA) quy định cho Honey.
    user_control_method:
      name: Phương thức điều khiển của người dùng
      description: 'Cho biết cách người dùng tương tác với máy (ví dụ: bảng điều khiển
        trên máy, điều khiển từ xa, ứng dụng, giọng nói), từ đó đưa ra các cân nhắc
        về tính dễ sử dụng.'
    vacuum_boost_reference_port:
      name: Cổng tham chiếu chân không/tăng áp
      description: Cho biết bộ điều chỉnh có bao gồm cổng tham chiếu đường ống nạp
        cho chân không/tăng áp hay không và kiểu cổng đó là gì.
    valve_base_shape:
      name: Hình dạng đế van
      description: Xác định hình dạng giao diện giữa đế van và vành (tròn, hình nón,
        cổng bên, hình chữ T, v.v.) ảnh hưởng đến khả năng làm kín và tương thích
        với miếng đệm xốp.
    valve_core_type:
      name: Loại lõi van
      description: Thông tin này cho biết lõi van có thể tháo rời, cố định hay không
        có lõi, ảnh hưởng đến quy trình bảo trì và khả năng tương thích với các dụng
        cụ bơm chất làm kín.
    valve_cover_gasket_material:
      name: Vật liệu gioăng nắp van
      description: Chỉ định vật liệu của gioăng nắp van đi kèm với nắp van, hoặc vật
        liệu gioăng được khuyến nghị khi bán mà không kèm gioăng (nếu có).
    valve_cover_material:
      name: Chất liệu nắp giàn cò
      description: Vật liệu cấu tạo chính của nắp van.
    valve_design:
      name: Thiết kế van
      description: Xác định cấu tạo/thiết kế của van động cơ.
    valve_guard_coverage_area:
      name: Vùng bảo vệ của tấm che van
      description: Chỉ rõ các bộ phận nào của cụm van được tấm chắn bảo vệ.
    valvetrain_configuration:
      name: Cấu hình cơ cấu van động cơ
      description: Chỉ định bố trí trục cam/hệ thống van.
    varnish_formulation_base:
      name: Công thức nền của vecni
      description: Xác định công thức/thành phần hóa học chính của vecni nhựa dùng
        cho nhạc cụ, ảnh hưởng đến vẻ ngoài, khả năng phục hồi và khả năng tương thích
        với các lớp phủ hiện có.
    varnish_transparency_tint:
      name: Độ trong suốt/màu sắc của vecni
      description: Mô tả xem lớp sơn phủ là trong suốt hay có màu, và nếu có màu thì
        thuộc nhóm màu nào.
    vegetable_matter_vm_content:
      name: Nội dung thực vật (VM)
      description: Lượng tạp chất/mảnh vụn thực vật có trong sợi.
    vegetable_preparation_style:
      name: Kiểu chế biến rau củ
      description: 'Mô tả cách rau được trình bày, cắt hoặc chế biến trước khi giảm
        giá (ví dụ: để nguyên, thái hạt lựu, tách bông).'
    vehicle_audio_dsp_form_factor:
      name: Hình thức DSP âm thanh xe hơi
      description: Xác định định dạng vật lý/lắp đặt của thiết bị DSP.
    vehicle_battery_charger_features:
      name: Tính năng của bộ sạc pin xe hơi
      description: 'Liệt kê các chế độ hoạt động và các tính năng tích hợp của bộ
        sạc ắc quy xe (ví dụ: chế độ sạc duy trì, khử sunfat).'
    vehicle_body_filler_form:
      name: Dạng chất độn thân xe
      description: Hình thức vật lý/kiểu bao bì của sản phẩm phụ bên trong thân sản
        phẩm.
    vehicle_coaxial_speaker_nominal_size:
      name: Kích thước danh nghĩa loa đồng trục xe hơi
      description: 'Kích thước loa danh nghĩa được sử dụng trong thiết kế (ví dụ:
        6,5 inch, 6x9 inch).'
    vehicle_cover_size_class:
      name: Hạng kích thước bạt phủ xe
      description: Nhóm kích thước chung cho biết kích thước của loại xe mà nắp được
        thiết kế phù hợp.
    vehicle_decor_set_items_included:
      name: Bộ trang trí xe mặt hàng; mục bao gồm
      description: Liệt kê các loại mặt hàng trang trí; mục bao gồm trong bộ phụ kiện
        (thông tin chi tiết ở cấp độ thành phần dành cho người mua sắm).
    vehicle_door_lock_actuation_method:
      name: Phương pháp kích hoạt khóa cửa xe
      description: Cho biết cách thức hoạt động hoặc điều khiển khóa cửa xe.
    vehicle_door_lock_actuator_kit_contents:
      name: Nội dung thiết bị truyền động khóa cửa xe
      description: Cho biết những gì được bao gồm trong bộ truyền động (chỉ bộ truyền
        động so với trang thiết bị/thanh nối/giá đỡ/dây dẫn).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Cấu hình đấu dây bộ truyền động khóa cửa xe
      description: Chỉ định kiểu đấu dây cần thiết cho việc lắp đặt (số lượng dây
        và vai trò).
    vehicle_door_lock_included_components:
      name: Các bộ phận bao gồm khóa cửa xe
      description: Liệt kê các thành phần có trong gói sản phẩm (hữu ích cho các bộ
        dụng cụ/lắp ráp).
    vehicle_electrical_connector_type:
      name: Loại kết nối điện xe
      description: Chỉ định kiểu kết nối hoặc phích cắm của mạch điện điều chỉnh/cấu
        hình máy phát điện (không bao gồm đầu ra B+ chính).
    vehicle_equipment_fit_out_level:
      name: Mức độ trang bị thiết bị xe
      description: Thể hiện mức độ trang bị bổ sung dành cho cảnh sát trên xe.
    vehicle_glass_cleaner_form:
      name: Mẫu nước lau kính xe
      description: 'Dạng sản phẩm vật lý của dung dịch vệ sinh kính xe (ví dụ: dạng
        xịt, dạng bọt, khăn lau, dạng gel, dạng đậm đặc).'
    vehicle_hitch_cover_illumination_type:
      name: Loại đèn chiếu sáng nắp móc kéo xe
      description: Chỉ định xem nắp che móc kéo có đèn chiếu sáng hay không và loại
        đèn nào.
    vehicle_hitch_cover_mounting_type:
      name: Kiểu lắp đặt nắp bọc móc kéo của xe
      description: Chỉ ra phương pháp được sử dụng để giữ/gắn nắp che móc kéo vào
        bộ phận tiếp nhận móc kéo.
    vehicle_license_plate_finish:
      name: Xe tem nhãn định danh kết thúc
      description: Độ hoàn thiện bề mặt của tấm.
    vehicle_license_plate_frame_anti_theft_design:
      name: Xe tem nhãn định danh Frame thiết kế chống trộm
      description: Các yếu tố thiết kế liên quan đến an ninh nhằm ngăn chặn việc tháo
        gỡ hoặc can thiệp trái phép.
    vehicle_license_plate_frame_plate_standard:
      name: Khung biển số xe tiêu chuẩn
      description: Tiêu chuẩn biển số xe/khu vực mà khung biển số được thiết kế để
        phù hợp.
    vehicle_license_plate_frame_profile:
      name: Hình dạng khung biển số xe
      description: Cách khung viền quanh biển số (độ che phủ/hình dạng) ảnh hưởng
        đến khả năng đọc và tuân thủ quy định.
    vehicle_license_plate_mounting_hole_count:
      name: Số lượng lỗ gắn biển số xe
      description: Số lượng lỗ gắn biển số.
    vehicle_license_plate_mounting_hole_pattern:
      name: Kiểu sơ đồ lỗ lắp biển số xe
      description: Sơ đồ bố trí các lỗ lắp đặt trên tấm.
    vehicle_license_plate_reflectivity:
      name: Tem nhãn định nghĩa độ phản xạ của xe
      description: Bề mặt biển số phản chiếu ánh sáng như thế nào (điều quan trọng
        đối với khả năng hiển thị và tuân thủ quy định đối với một số biển số xe đặc
        biệt).
    vehicle_license_plate_size_standard:
      name: Tiêu chuẩn kích thước biển số xe
      description: Chỉ định tiêu chuẩn khu vực/phương tiện mà biển số được thiết kế
        để phù hợp (khoảng cách lỗ lắp đặt và kích thước tổng thể).
    vehicle_license_plate_text_style:
      name: Kiểu phông chữ trên biển số xe
      description: Kiểu chữ trên biển số (nếu có), bao gồm cả kiểu chữ nổi và chữ
        in.
    vehicle_license_plate_theme:
      name: Chủ đề thiết kế của biển số xe
      description: Đề xuất thiết kế cấp cao cho hình ảnh trên biển hiệu.
    vehicle_lift_actuation_method:
      name: Phương pháp kích hoạt kích nâng xe
      description: Cơ chế hoạt động/vận hành của thang nâng/kích để nâng xe.
    vehicle_lift_mounting_type:
      name: Loại giá đỡ nâng xe
      description: Chỉ rõ cách thức lắp đặt hoặc neo giữ thang nâng trong không gian
        làm việc.
    vehicle_lift_type:
      name: Loại kích nâng xe
      description: 'Chỉ định kiểu kết cấu của cầu nâng xe được sử dụng để bảo dưỡng
        hoặc lưu trữ (ví dụ: 2 trụ, 4 trụ, kiểu kéo).'
    vehicle_magnet_attachment_type:
      name: Loại gắn nam châm cho xe
      description: 'Xác định phương pháp gắn/lắp chính cho các sản phẩm được bán dưới
        dạng nam châm dán xe (ví dụ: chỉ dùng nam châm so với nam châm có thêm lớp
        keo dán).'
    vehicle_magnet_intended_use:
      name: Nam châm xe hơi
      description: Cho biết trường hợp sử dụng chính dự định của nam châm gắn trên
        xe.
    vehicle_mirror_adjustment_type:
      name: Loại điều chỉnh gương xe
      description: Chỉ định cách thức điều chỉnh/kiểm soát gương.
    vehicle_mirror_glass_type:
      name: Loại mặt kính gương chiếu hậu của xe
      description: Xác định loại quang học/hình dạng của bề mặt kính gương.
    vehicle_organizer_features:
      name: Tính năng của hộp sắp xếp đồ đạc trên xe
      description: 'Các tính năng chức năng chính của túi đựng đồ trên xe hơi bao
        gồm: khả năng gấp gọn, lớp lót chống thấm nước, ngăn cách nhiệt hoặc đế chống
        trượt.'
    vehicle_paint_chemistry_base:
      name: Thành phần/nguyên liệu cơ bản của sơn xe
      description: Cho biết công thức/thành phần hóa học của sơn được sử dụng trong
        sơn xe.
    vehicle_polish_application_method:
      name: Phương pháp đánh bóng xe
      description: Chỉ định phương pháp hoặc dụng cụ được khuyến nghị để đánh bóng
        xe.
    vehicle_pursuit_package:
      name: Gói theo đuổi xe
      description: 'Cho biết liệu xe có được trang bị gói nâng cấp hiệu suất dành
        cho nhiệm vụ truy đuổi của cảnh sát hay không (ví dụ: hệ thống làm mát, phanh,
        hệ thống treo và hiệu chỉnh được nâng cấp).'
    vehicle_safety_equipment_position:
      name: Vị trí thiết bị an toàn xe
      description: Xác định vị trí trên hoặc trong xe nơi thiết bị an toàn dự định
        được sử dụng hoặc lắp đặt.
    vehicle_safety_equipment_visibility_features:
      name: Các tính năng quan sát của thiết bị an toàn xe
      description: Biểu thị các tính năng tăng cường khả năng quan sát được thiết
        kế để tăng độ nổi bật.
    vehicle_seat_row:
      name: Hàng ghế xe
      description: Cho biết ghế đó dành cho hàng ghế sau nào (hàng thứ hai hay hàng
        thứ ba), bao gồm cả các trường hợp sử dụng ghế phụ phía sau.
    vehicle_steering_assist_type:
      name: Loại hỗ trợ lái xe
      description: Chỉ định hệ thống hỗ trợ lái mà bộ phận đó được thiết kế cho.
    vehicle_steering_wheel_lock_form_factor:
      name: Hình dạng khóa vô lăng xe
      description: Mô tả kiểu dáng vật lý của khóa và cách nó tương tác với vô lăng
        (và tùy chọn các nút điều khiển khác).
    vehicle_wax_polish_product_form:
      name: Dạng sản phẩm sáp/đánh bóng xe
      description: Hình thức vật lý/định dạng phân phối của sáp, chất đánh bóng, chất
        bảo vệ hoặc chất bịt kín.
    vehicle_wheel_valve_stem_type:
      name: Loại van bánh xe
      description: Chỉ định loại thân van được hỗ trợ hoặc bao gồm.
    vehicle_windshield_fluid_formula:
      name: Công thức dung dịch rửa kính chắn gió xe
      description: Công dụng chính của dung dịch rửa kính chắn gió là làm sạch/loại
        bỏ chất bẩn.
    veil_length_type:
      name: Kiểu chiều dài khăn voan trùm đầu
      description: Phân loại khăn che mặt bằng cách sử dụng thuật ngữ chiều dài tiêu
        chuẩn thay vì số đo cụ thể.
    vellum_opacity_level:
      name: Mức độ mờ đục của giấy da
      description: Cho biết độ trong suốt hoặc mờ đục của tờ giấy da.
    ventilation_configuration:
      name: Cấu hình hệ thống thông gió
      description: Cấu hình thông gió/hút và thoát khí chính của mũ bảo hiểm.
    ventilation_control_type:
      name: Loại điều khiển thông gió
      description: Chỉ định kiểu hệ thống điều chỉnh luồng khí được tích hợp trong
        mũ bảo hiểm.
    ventilation_level:
      name: Mức độ thông gió
      description: Thể hiện thiết kế luồng không khí/thông gió tương đối của lớp giáp.
    venting_design:
      name: Thiết kế thông gió
      description: Xác định xem nắp đậy có được thông gió hay không và thông gió như
        thế nào để giảm sự ngưng tụ hơi nước và nấm mốc trong quá trình bảo quản.
    vestibule_type:
      name: Loại tiền sảnh
      description: Phân loại bố cục tiền sảnh so với lều.
    vibraphone_bar_material:
      name: Vật liệu thanh đàn vibraphone
      description: Vật liệu cấu tạo nên các thanh/phím đàn vibraphone (các thanh tạo
        ra âm thanh).
    vibraphone_motor_type:
      name: Loại động cơ đàn vibraphone
      description: Loại động cơ được sử dụng để dẫn động các quạt cộng hưởng quay
        tạo hiệu ứng rung (nếu có).
    vibraphone_range_octaves:
      name: Âm vực của đàn vibraphone (quãng tám)
      description: 'Âm vực của đàn vibraphone được biểu thị bằng quãng tám (ví dụ:
        3 quãng tám, 3,5 quãng tám).'
    vibraphone_resonator_tube_material:
      name: Vật liệu ống cộng hưởng đàn vibraphone
      description: Vật liệu cấu tạo nên các ống cộng hưởng của đàn vibraphone nằm
        dưới các thanh đỡ.
    vibraphone_tuning_standard:
      name: Tiêu chuẩn điều chỉnh đàn vibraphone
      description: Cao độ tham chiếu được sử dụng để điều chỉnh (A=440 Hz, v.v.).
    viewing_sides:
      name: Các mặt quan sát
      description: Chỉ định số mặt hiển thị thông tin của bảng điểm (một mặt, hai
        mặt, bốn mặt, v.v.).
    vintage_advertisement_decade:
      name: Thập kỷ quảng cáo cổ điển
      description: Chỉ định thập kỷ mà quảng cáo được in hoặc sản xuất lần đầu (xấp
        xỉ nếu không biết năm chính xác).
    vintage_advertisement_format:
      name: Hình thức quảng cáo cổ điển
      description: Xác định định dạng vật lý hoặc phương tiện của vật phẩm quảng cáo
        cổ điển.
    vintage_advertisement_subject_category:
      name: Danh mục chủ đề quảng cáo cổ điển
      description: Xác định danh mục sản phẩm/dịch vụ đang được quảng cáo (quảng cáo
        này dành cho cái gì).
    vintage_classic_truck_cab_type:
      name: Loại cabin xe tải cổ điển và đời cũ
      description: Cấu hình cabin/kiểu dáng thân xe của khoang hành khách trên xe
        tải.
    virginia_tech_helmet_star_rating:
      name: Mũ bảo hiểm Virginia Tech được xếp hạng sao
      description: Xếp hạng an toàn do Phòng thí nghiệm Mũ bảo hiểm Virginia Tech
        đánh giá (0–5 sao).
    virtual_analog_synthesizer_form_factor:
      name: Hình thức của bộ tổng hợp âm thanh tương tự ảo
      description: Xác định định dạng vật lý của khung máy tổng hợp âm thanh (bàn
        phím so với Modules/giáo trình).
    viscosity_thickness:
      name: Độ nhớt/độ đặc
      description: Mô tả độ đặc hoặc lỏng của hỗn hợp khi bán hoặc ở độ đặc được khuyến
        nghị.
    vise_configuration:
      name: Cấu hình của ê-tô
      description: Xác định bố cục cấu trúc hoặc số lượng chi tiết trong bộ kẹp, điều
        này ảnh hưởng đến tính di động và độ phức tạp khi thiết lập.
    visibility_features:
      name: Các tính năng hiển thị
      description: Nhấn mạnh các yếu tố thiết kế giúp tăng khả năng quan sát người
        lái trong giao thông.
    visor_brim_type:
      name: Loại vành/mũ lưỡi trai
      description: Chỉ ra sự hiện diện và kiểu dáng của tấm che mặt hoặc vành mũ bảo
        hiểm.
    visor_configuration:
      name: Cấu hình tấm chắn nắng
      description: Mô tả sự hiện diện và kiểu dáng của bất kỳ tấm che mặt hoặc kính
        chắn gió tích hợp nào.
    visor_lens_finish:
      name: Lớp hoàn thiện thấu kính chắn gió
      description: Chỉ định màu sắc, lớp phủ quang học hoặc kiểu đồ họa được áp dụng
        cho thấu kính của tấm che mặt.
    visor_style:
      name: Kiểu mũ lưỡi trai
      description: Cho biết mũ trùm đầu có vành/mặt che nắng hay không và cấu hình
        của nó.
    voc_compliance_standard:
      name: Tiêu chuẩn tuân thủ VOC
      description: Tuyên bố tuân thủ quy định về VOC đối với sản phẩm (nếu có).
    voc_regulatory_class:
      name: Lớp quy định VOC
      description: Phân loại VOC theo quy định/tuân thủ được công bố cho sản phẩm
        (theo nhãn/SDS), được sử dụng cho các hạn chế về quy định và môi trường của
        khu vực.
    vodka_base_ingredient:
      name: Thành phần nguyên liệu nền của rượu Vodka
      description: 'Nguyên liệu nông sản chính dùng để chưng cất rượu vodka (ví dụ:
        lúa mì, khoai tây, ngô).'
    voice_coil_configuration:
      name: Cấu hình cuộn dây âm thanh
      description: Số lượng/cách bố trí cuộn dây âm thanh để linh hoạt trong việc
        đấu dây và lựa chọn trở kháng.
    voice_effects:
      name: Hiệu ứng giọng nói
      description: Bộ karaoke hỗ trợ các loại hiệu ứng giọng hát tích hợp sẵn.
    voltage_rating_type:
      name: Loại định mức điện áp
      description: Xác định xem điện áp định mức của cầu chì áp dụng cho dòng điện
        xoay chiều (AC), dòng điện một chiều (DC) hay cả hai.
    voltage_regulator_connector_type:
      name: Loại kết nối bộ điều chỉnh điện áp
      description: Chỉ định kiểu kết nối/máy đấu dây được sử dụng để kết nối bộ điều
        chỉnh với hệ thống dây điện/máy phát điện của xe.
    wader_foot_type:
      name: Kiểu thiết kế phần bàn chân của quần yếm chống nước
      description: Xác định xem ủng lội nước có liền thân với giày hay có phần chân
        dạng tất riêng biệt.
    wader_sole_type:
      name: Loại đế ủng
      description: Chỉ định chất liệu đế ngoài hoặc loại đế chống trượt được sử dụng
        trên ủng lội nước hoặc quần lội nước có phần ống rộng.
    waistband_style:
      name: Kiểu thắt lưng
      description: Mô tả cấu tạo của cạp quần và cách cố định hoặc điều chỉnh để vừa
        vặn và thoải mái.
    wakeboard_binding_mounting_pattern:
      name: kiểu gắn dây buộc ván trượt nước
      description: Chỉ định kiểu lỗ gắn/tấm trên ván trượt nước mà bộ phận buộc giày
        tương thích.
    wakeboard_riding_style:
      name: Phong cách lướt ván wakeboard
      description: Phân loại môi trường hoặc phong cách sử dụng dự định của ván wakeboard.
    wall_decal_style:
      name: Phong cách decal dán tường
      description: 'Chỉ định cách thức sản xuất/dán decal (ví dụ: cắt khuôn, chuyển
        nhiệt, tờ dán).'
    wallyball_equipment_included:
      name: Dụng cụ đi kèm của môn bóng chuyền trong nhà bạt
      description: Liệt kê cụ thể các bộ phận có trong bộ bóng Wallyball để người
        mua biết chính xác những gì họ đang mua và có thể so sánh các gói sản phẩm.
    warp_beam_type:
      name: Loại trục cuốn sợi của máy dệt
      description: Chỉ định cấu hình trục sợi dọc đi kèm hoặc được lắp đặt sẵn của
        máy dệt (trục thiết lập được cung cấp kèm theo máy dệt).
    washability:
      name: Khả năng giặt giũ
      description: Cho biết liệu keo có thể được làm sạch bằng nước và/hoặc có thể
        giặt sạch sau khi sử dụng hay không.
    watch_band_design:
      name: Thiết kế dây đeo đồng hồ
      description: 'Mô tả kiểu cấu tạo hoặc kiểu thiết kế của dây đeo đồng hồ (ví
        dụ: NATO, Milanese, Link).'
    watch_movement:
      name: Quan sát chuyển động
      description: Nó chỉ rõ cơ chế vận hành của đồng hồ, một yếu tố quan trọng mà
        người mua sắm sử dụng để phân biệt giữa các mẫu đồng hồ.
    water_activation:
      name: Kích hoạt bằng nước
      description: Liệu thiết bị định vị có thể tự động kích hoạt khi bị ngâm trong
        nước hay không (điều này thường thấy ở các thiết bị định vị khẩn cấp EPIRB
        loại I/II).
    water_chamber_configuration:
      name: Cấu hình buồng nước
      description: Mô tả cấu tạo bên trong của đệm, chẳng hạn như một hoặc hai ngăn,
        ảnh hưởng đến khả năng nâng đỡ, kiểm soát nhiệt độ và khả năng chống lại sự
        xáo động.
    water_dispensing_mechanism:
      name: Cơ chế phân phối nước
      description: Xác định cách nước được xả ra từ thiết bị, chẳng hạn như vòi, vòi
        phun hoặc chảy tự nhiên.
    water_exposure_protection_level:
      name: Mức độ bảo vệ khi tiếp xúc với nước
      description: 'Thể hiện mức độ bảo vệ của sản phẩm khi tiếp xúc với nước (ví
        dụ: nước bắn vào so với ngâm tạm thời). Hãy sử dụng chỉ số bảo vệ chống xâm
        nhập (IP) khi có mã IP chính thức.'
    water_fed_design:
      name: Thiết kế cấp nước
      description: Cho biết bàn chải được thiết kế để sử dụng với nước chảy thông
        qua tay cầm dẫn nước hoặc kết nối ống dẫn nước.
    water_gun_features:
      name: Tính năng của súng nước
      description: Các tính năng nổi bật và khả năng đi kèm của súng nước.
    water_gun_operating_mechanism:
      name: Cơ chế hoạt động của súng nước
      description: Cơ chế tạo áp suất và phun nước của súng nước trong quá trình sử
        dụng.
    water_gun_spray_pattern:
      name: Kiểu phun của súng nước
      description: Loại dòng nước được tạo ra từ vòi phun trong quá trình bắn.
    water_heating_method:
      name: Phương pháp đun nước
      description: 'Mô tả cách thức, hoặc liệu nước có được làm nóng trước khi sử
        dụng hay không — ví dụ: hấp thụ năng lượng mặt trời, bếp gas propan, bộ phận
        gia nhiệt điện, hệ thống sưởi bằng pin, lớp cách nhiệt giữ nhiệt, hoặc không
        cần làm nóng.'
    water_mattress_construction:
      name: Cấu trúc đệm nước
      description: 'Chỉ định kiểu cấu tạo của đệm nước (ví dụ: loại cứng hoặc loại
        mềm), điều này quyết định khả năng tương thích với khung và cảm giác tổng
        thể.'
    water_play_features:
      name: Tính năng của đồ chơi dưới nước
      description: Các hoạt động dưới nước được bao gồm trong công viên nước/cầu trượt.
    water_polo_competition_approval:
      name: Cuộc thi bóng nước được phê duyệt
      description: Xác định cơ quan quản lý hoặc cấp độ thi đấu mà quả bóng được chính
        thức phê duyệt hoặc chứng nhận.
    water_polo_goal_type:
      name: Loại khung thành bóng nước
      description: 'Phân loại cấu hình lắp đặt hoặc kết cấu của khung thành (ví dụ:
        nổi, gắn trên boong, di động).'
    water_pump_drive_type:
      name: Loại truyền động bơm nước
      description: Chỉ rõ cách thức vận hành/hoạt động của bơm nước trong hệ thống
        làm mát của xe.
    water_pump_housing_material:
      name: Vật liệu vỏ bơm nước
      description: Vật liệu cấu tạo thân/vỏ bơm nước.
    water_pump_impeller_material:
      name: Vật liệu cánh quạt bơm nước
      description: Xác định vật liệu của cánh quạt bơm nước (rôto/cánh bên trong chuyển
        động chất làm mát).
    water_pump_mounting_type:
      name: Loại lắp đặt bơm nước
      description: 'Chỉ định kiểu lắp đặt/hình dạng của bơm nước để phù hợp với động
        cơ (ví dụ: vỏ bắt vít so với dạng hộp/lắp ghép).'
    water_purification_method:
      name: Phương pháp làm sạch nước
      description: 'Xác định cơ chế chính mà sản phẩm sử dụng để làm cho nước an toàn
        để uống tại hiện trường (ví dụ: bơm, cấp nước bằng trọng lực hoặc chiếu tia
        cực tím).'
    water_resistance:
      name: Khả năng chống nước
      description: Thể hiện mức độ bảo vệ khỏi thời tiết, chẳng hạn như chống thấm
        nước hoặc kháng nước.
    water_resistance_level:
      name: Mức độ chống nước
      description: Cho biết liệu vải có khả năng chống thấm nước hay không và ở mức
        độ nào.
    water_resistance_rating_case_protection_level:
      name: Mức độ chống nước (mức độ bảo vệ)
      description: 'Chỉ số này cho biết mức độ chống nước/bảo vệ của hộp kéo (mức
        độ tiếp thị, không phải thiết bị điện tử chống nước IP), ví dụ: chống nước
        so với chống thấm nước.'
    water_rocket_kit_items_included:
      name: Bộ mặt hàng tên lửa nước; mục bao gồm
      description: Các thành phần chính được bao gồm trong gói sản phẩm.
    water_rocket_propulsion_type:
      name: Loại hệ thống đẩy của tên lửa nước
      description: Nguồn năng lượng/động lực chính được sử dụng để Launch tên lửa.
    water_rocket_recovery_system:
      name: Hệ thống thu hồi tên lửa nước
      description: Phương pháp được sử dụng để thu hồi tên lửa sau khi Launch.
    water_ski_base_design:
      name: Thiết kế đế trượt nước
      description: Xác định hình dạng đáy của ván trượt nước, yếu tố ảnh hưởng đến
        đặc tính điều khiển.
    water_ski_fin_type:
      name: kiểu vây trượt nước
      description: Chỉ định cấu hình vây của ván trượt nước, ảnh hưởng đến khả năng
        giữ hướng và điều khiển.
    water_source:
      name: Nguồn nước
      description: Xác định nguồn gốc của nước trước khi cacbonat hóa.
    water_sports_safety_standard:
      name: Tiêu chuẩn an toàn thể thao dưới nước
      description: 'Liệt kê các tiêu chuẩn an toàn hoặc tiêu chuẩn về khả năng nổi
        mà sản phẩm đáp ứng (ví dụ: CE EN 1385 cho mũ bảo hiểm, ISO 12402-5 cho áo
        phao cứu sinh, USCG Loại III).'
    water_table_feature_set:
      name: Bộ dụng cụ trang trí bàn nước
      description: Nổi bật các tính năng vui chơi tích hợp của bàn chơi nước như thác
        nước, vòi phun, máy bơm hoặc bể chứa nhiều tầng.
    water_table_items_included:
      name: Bàn nước mặt hàng; mục bao gồm
      description: 'Chỉ rõ những phụ kiện nào đi kèm với bộ đồ chơi bàn nước (ví dụ:
        thuyền, cốc, phễu, tượng nhỏ).'
    water_table_water_source_type:
      name: Mực nước ngầm loại nguồn nước
      description: Xác định cách thức mực nước ngầm được lấp đầy hoặc cung cấp nước.
    waterbed_stabilization_level:
      name: Mức độ ổn định của giường nước
      description: Thể hiện mức độ giảm sóng hoặc kiểm soát chuyển động mà nệm nước
        mang lại.
    watercolor_ink_water_resistance_after_drying:
      name: Khả năng chống nước của mực màu nước (sau khi khô)
      description: Cho biết liệu mực màu nước có trở nên chống nước/không thấm nước
        sau khi khô hay không (theo tuyên bố của nhà sản xuất).
    watercraft_care_application_area:
      name: Khu vực ứng dụng chăm sóc tàu thuyền
      description: Chỉ rõ khu vực hoặc bộ phận chính của phương tiện đường thủy mà
        sản phẩm được thiết kế để sử dụng.
    watercraft_drive_mechanism:
      name: Cơ chế truyền động tàu thủy
      description: Mô tả cơ chế đẩy cụ thể được lắp đặt hoặc hỗ trợ trên tàu.
    watercraft_fuel_tank_sending_unit_pattern:
      name: sơ đồ bộ phận cảm biến bình nhiên liệu tàu thuyền
      description: 'Chỉ định kiểu/tiêu chuẩn lắp đặt cho các bộ phận cảm biến mức
        nhiên liệu và các đồng hồ đo tương thích (ví dụ: các kiểu bắt vít thông dụng
        trong ngành hàng hải).'
    watercraft_fuel_tank_shape:
      name: Hình dạng bình nhiên liệu tàu thủy
      description: Mô tả hình dạng vật lý tổng thể của bình nhiên liệu để hỗ trợ việc
        lập kế hoạch không gian/lắp đặt.
    watercraft_hull_material:
      name: Vật liệu vỏ tàu thuyền
      description: Xác định vật liệu chính cấu tạo nên thân tàu.
    watercraft_ignition_part_voltage:
      name: Điện áp bộ phận đánh lửa của tàu thuyền
      description: Điện áp định mức/yêu cầu cho bộ phận đánh lửa (nếu có), ví dụ như
        hệ thống 12 V.
    watercraft_impeller_material_grade:
      name: cấp vật liệu cánh quạt tàu thủy
      description: 'Chỉ định vật liệu của cánh quạt tàu thủy (ví dụ: cao su neoprene,
        nitrile, màu đồng).'
    watercraft_lighting_certification_compliance:
      name: Chứng nhận/tuân thủ quy định về hệ thống chiếu sáng tàu thuyền
      description: 'Cho biết đèn đã được chứng nhận tuân thủ các quy định/tiêu chuẩn
        nào để sử dụng trong môi trường biển (ví dụ: tuân thủ USCG/ABYC/COLREGs).'
    watercraft_motor_mount_adjustment_features:
      name: Các tính năng điều chỉnh giá đỡ động cơ tàu thuyền
      description: 'Các khả năng điều chỉnh của giá đỡ (ví dụ: độ nghiêng, độ nâng,
        độ trượt) ảnh hưởng đến tính tiện dụng và độ vừa vặn.'
    watercraft_piston_part_type:
      name: Loại bộ phận piston tàu thủy
      description: Xác định hồ sơ đại diện cho bộ phận nào liên quan đến piston.
    watercraft_propeller_blade_rake:
      name: Góc nghiêng cánh quạt tàu thủy
      description: Xác định góc nghiêng cánh (góc của cánh so với trục), ảnh hưởng
        đến lực nâng mũi tàu và hiệu suất.
    watercraft_propeller_rotation_direction:
      name: Hướng quay của cánh quạt tàu thủy
      description: 'Chỉ định hướng quay/chiều quay của cánh quạt cần thiết để đảm
        bảo tính tương thích của hệ thống truyền động (ví dụ: chiều quay thuận/tiêu
        chuẩn so với chiều quay ngược/ngược chiều).'
    watercraft_pump_stage_impeller_role:
      name: Vai trò của tầng bơm/cánh quạt trong tàu thuyền
      description: 'Xác định xem cánh quạt có được thiết kế cho vai trò bơm cụ thể
        nào không (ví dụ: bơm nước thô/nước biển, tuần hoàn chất làm mát, bơm phản
        lực).'
    watercraft_registration_status:
      name: Tình trạng đăng ký phương tiện đường thủy
      description: Cho biết thuyền buồm có giấy tờ chứng nhận quyền sở hữu và/hoặc
        giấy đăng ký hay không.
    watercraft_safety_equipment_activation_type:
      name: Loại kích hoạt thiết bị an toàn tàu thuyền
      description: Phương pháp chính để kích hoạt thiết bị an toàn (đối với đèn hiệu/báo
        động MOB/PLB), khác với phương pháp phát.
    watercraft_steering_cable_core_material:
      name: Vật liệu lõi cáp lái tàu thuyền
      description: Chỉ định vật liệu của lõi/dây cáp bên trong truyền lực.
    watercraft_steering_cable_hardware_included:
      name: Trang thiết bị cáp lái tàu thủy đi kèm
      description: Chỉ rõ trang thiết bị và phụ kiện lắp đặt nào được bao gồm cùng
        với dây cáp lái.
    watercraft_steering_cable_system_type:
      name: Hệ thống cáp lái tàu thủy
      description: 'Chỉ định kiến trúc hệ thống lái mà cáp được thiết kế cho (ví dụ:
        quay, giá).'
    watercraft_steering_wheel_hub_bore_type:
      name: Kiểu lỗ moay-ơ/trục vô lăng của phương tiện dưới nước
      description: 'Chỉ định kiểu giao diện lắp đặt/lỗ trung tâm (ví dụ: hình nón,
        có khía) nơi bánh xe khớp với trục hoặc bộ chuyển đổi.'
    watercress_variety:
      name: Giống cải xoong
      description: Xác định loại hoặc giống cải xoong cụ thể đang được bán.
    waterproof_level:
      name: Mức độ chống thấm nước
      description: Thể hiện mức độ chống nước của giày dép, bao gồm cả các cam kết
        chống nước được bảo hành.
    wax_blend_composition:
      name: Thành phần hỗn hợp sáp
      description: Liệt kê các loại sáp được pha trộn trong sản phẩm và/hoặc loại
        hỗn hợp được bán trên thị trường.
    wax_coat_type:
      name: Loại lớp phủ sáp
      description: Cho biết loại sáp này được dùng làm lớp sơn lót, lớp sơn phủ hoặc
        công thức đa dụng/một lớp.
    wax_hardness:
      name: Độ cứng của sáp
      description: Chỉ số này cho biết độ cứng tương đối của sáp, ảnh hưởng đến độ
        bền và khả năng trượt trên các loại tuyết khác nhau.
    wax_physical_form:
      name: Hình thức vật lý của sáp
      description: Cho biết hình dạng vật lý của sáp nến thô khi được cung cấp.
    wax_recommended_candle_application:
      name: Ứng dụng sáp nến khuyên dùng
      description: Cho biết loại nến chính mà sáp được dùng để chế tạo.
    wax_tackiness_level:
      name: Độ dính của sáp
      description: Mô tả độ bám dính/độ ma sát mà sáp mang lại cho lưỡi dao.
    weapon_system_integration:
      name: Khả năng tích hợp hệ thống vũ khí
      description: Cho biết liệu phương tiện đó có tích hợp hệ thống vũ khí hoặc giá
        đỡ vũ khí hay không.
    weather_suitability:
      name: Sự phù hợp về thời tiết
      description: Chỉ định điều kiện môi trường mà găng tay được thiết kế cho, chẳng
        hạn như chơi trong thời tiết lạnh hoặc thời tiết ẩm ướt.
    weave_finish:
      name: Dệt/hoàn thiện
      description: Mô tả kiểu dệt vải chính hoặc lớp hoàn thiện bề mặt ảnh hưởng đến
        kết cấu và độ bóng của cà vạt.
    weave_style:
      name: Kiểu dệt
      description: Mô tả kiểu dệt truyền thống được sử dụng trong việc chế tạo mũ
        Panama, yếu tố ảnh hưởng đến độ thoáng khí, độ mềm mại, vẻ ngoài và giá cả.
    weave_type:
      name: Kiểu dệt
      description: Xác định kiểu dệt/cấu trúc vải (tên thương mại của kiểu dệt) ảnh
        hưởng đến kết cấu, độ bóng và độ rủ của vải.
    weaving_beater_edge_type:
      name: Loại máy dệt cạnh
      description: 'Mô tả hình dạng cạnh làm việc của thanh đập phẳng tiếp xúc với
        sợi ngang (ví dụ: thẳng so với răng cưa).'
    weaving_beater_style:
      name: Kiểu dáng thanh dập sợi
      description: Xác định kiểu dáng/hình thức chức năng của thanh đập sợi dệt phẳng.
    weaving_shuttle_tip_style:
      name: Kiểu đầu thoi dệt
      description: Xác định thiết kế đầu/mũi phía trước của con thoi, ảnh hưởng đến
        cách nó đi qua nhà chứa và khả năng bị vướng vào dây cáp quang.
    weaving_shuttle_use_case:
      name: Hộp đựng con thoi dệt
      description: Xác định ứng dụng dệt dự định mà con thoi được thiết kế hoặc tối
        ưu hóa cho.
    webbing_construction_type:
      name: Kiểu kết cấu của dây đai dệt
      description: Mô tả kiểu đan hoặc bện vật lý của dây đai, ảnh hưởng đến khả năng
        xử lý, độ bền và mục đích sử dụng.
    webbing_design:
      name: Thiết kế dây đai
      description: Mô tả kiểu màng da giữa các ngón tay, yếu tố ảnh hưởng đến quá
        trình tập luyện sức mạnh và lực đẩy.
    weight_adjustability:
      name: Khả năng điều chỉnh trọng lượng
      description: 'Mô tả xem lực cản của sản phẩm có thể thay đổi được bởi người
        dùng (ví dụ: có thể chọn hoặc điều chỉnh tải trọng) hay được cố định ở một
        mức trọng lượng duy nhất.'
    weight_integration_system:
      name: Hệ thống tích hợp trọng lượng
      description: 'Mô tả liệu và cách thức tích hợp trọng lượng dằn vào áo phao BCD
        (ví dụ: túi đựng trọng lượng có thể tháo rời, không có, tiện ích bổ sung tùy
        chọn).'
    weight_plate_compatibility:
      name: Khả năng tương thích với tạ
      description: Xác định đường kính tạ mà máy chấp nhận (tạ Olympic, tạ tiêu chuẩn
        hoặc cả hai).
    weight_plate_style:
      name: kiểu đĩa tạ
      description: 'Phân loại kiểu dáng/loại tạ (ví dụ: tạ Olympic, tạ bumper, tạ
        điều chỉnh trọng lượng) để lọc nhanh khả năng tương thích.'
    weightlifting_belt_style:
      name: Đai nâng tạ kiểu dáng
      description: 'Phân loại thiết kế tổng thể hoặc cấu hình theo mục đích sử dụng
        của dây đai (ví dụ: dây đai đòn bẩy, dây đai nhúng, dây đai côn).'
    weightlifting_federation_certification:
      name: Chứng chỉ của liên đoàn cử tạ
      description: Phê duyệt chính thức hoặc sự tuân thủ sản phẩm bởi các liên đoàn
        thể thao sức mạnh, chẳng hạn như IPF hoặc IWF.
    wetsuit_boot_height:
      name: Chiều cao ủng bộ đồ lặn
      description: Phân loại chiều cao/độ cắt của ủng trên chân, Influence độ che
        phủ, khả năng di chuyển và khả năng chống nước.
    wetsuit_entry_system:
      name: Hệ thống vào bộ đồ lặn
      description: Mô tả loại và vị trí của hệ thống khóa kéo/mở dùng để mặc bộ đồ
        lặn.
    wetsuit_seam_construction:
      name: Cấu trúc đường may của bộ đồ lặn
      description: Quy định cách thức may và bịt kín các đường may, ảnh hưởng đến
        độ ấm, độ mềm dẻo và độ bền.
    wheat_product_form:
      name: Dạng sản phẩm của lúa mì
      description: Xác định dạng vật lý hoặc dạng chế biến của sản phẩm lúa mì.
    wheel_arrangement:
      name: Bố trí bánh xe
      description: Chỉ định cách bố trí bánh xe của đầu máy hơi nước (ký hiệu Whyte),
        đây là đặc điểm xác định và là thuật ngữ phổ biến trong giới sưu tầm/tìm kiếm.
    wheel_brake_type:
      name: Loại phanh bánh xe
      description: Chi tiết cấu hình phanh được trang bị trên bánh xe hoặc bánh xe
        đẩy của hàng.
    wheel_chock_grip_features:
      name: Đặc điểm của kẹp chặn bánh xe
      description: Các tính năng thiết kế tăng cường lực kéo và độ bám giúp cải thiện
        khả năng bám dính trên các bề mặt và so với lốp xe.
    wheel_cleaner_acidity_ph_category:
      name: Độ axit/độ pH của dung dịch vệ sinh bánh xe
      description: Cho biết dung dịch vệ sinh bánh xe có tính axit, trung tính hay
        kiềm (và tùy chọn cho biết liệu nó có thị trường hay không, được biểu thị
        bằng độ pH dư).
    wheel_cleaner_formula_type:
      name: Công thức dung dịch vệ sinh bánh xe
      description: 'Đối với dung dịch vệ sinh mâm xe và các dung dịch rửa liên quan,
        ký hiệu này cho biết loại công thức chính của sản phẩm (ví dụ: gốc axit, không
        axit, pH trung tính/số dư, hoặc phản ứng với sắt).'
    wheel_construction_type:
      name: Kiểu kết cấu bánh xe
      description: Xác định phương pháp sản xuất/chế tạo bánh xe.
    wheel_contaminant_target:
      name: Mục tiêu chất gây ô nhiễm bánh xe
      description: Chỉ định các loại chất gây ô nhiễm chính mà chất tẩy rửa được thiết
        kế để loại bỏ.
    wheel_core_type:
      name: Loại lõi bánh xe
      description: Mô tả kiểu cấu tạo của lõi bánh xe, yếu tố Influence trọng lượng,
        độ cứng và khả năng truyền tải năng lượng.
    wheel_cylinder_inlet_port_thread_standard:
      name: Cổng vào xi lanh bánh xe chuỗi tiêu chuẩn hội thoại
      description: 'Chỉ định tiêu chuẩn cổng đầu vào đường ống phanh trên xi lanh
        bánh xe (ví dụ: đầu loe hình bong bóng hệ mét so với đầu loe ngược hệ inch
        SAE).'
    wheel_fastener_seat_type:
      name: Kiểu ghế bắt vít bánh xe
      description: 'Chỉ định kiểu dáng của đai ốc/bu lông bánh xe phù hợp với vành
        xe (ví dụ: hình nón/hình côn, hình cầu/hình bán kính, hình phẳng, hình trụ/hình
        cán).'
    wheel_illumination:
      name: Đèn bánh xe
      description: Cho biết bánh xe có tích hợp đèn chiếu sáng hoặc tính năng phát
        sáng hay không.
    wheel_material:
      name: Vật liệu bánh xe
      description: Xác định thành phần chính của bánh xe, yếu tố ảnh hưởng đến độ
        bền, độ bám và khả năng giảm chấn rung động.
    wheel_profile:
      name: Biên dạng bánh xe
      description: Mô tả Shapes mặt cắt ngang của bánh xe ảnh hưởng đến tốc độ, độ
        bám và khả năng điều khiển.
    wheel_setup_type:
      name: Kiểu thiết lập bánh xe
      description: Xác định kiểu cấu hình bánh xe được sử dụng trên giày trượt.
    wheel_system_finish:
      name: Hoàn thiện hệ thống bánh xe
      description: Lớp phủ/lớp hoàn thiện bề mặt của vành/bánh xe và một số bộ phận/phụ
        kiện bánh xe.
    whip_style:
      name: Kiểu roi
      description: Phân loại sản phẩm theo kiểu roi hoặc gậy cưỡi ngựa cụ thể hoặc
        theo bộ môn thể thao mà nó hướng đến.
    whipped_cream_base:
      name: Thành phần nền của kem tươi
      description: Xác định thành phần cơ bản chính được sử dụng để làm kem tươi,
        chẳng hạn như kem sữa hoặc kem dừa.
    whipped_cream_form:
      name: Dạng kem tươi
      description: Cho biết dạng bào chế vật lý mà kem tươi được bán ra thị trường.
    whistle_head_material:
      name: Chất liệu đầu còi
      description: Chỉ định chất liệu của đầu/ống ngậm còi (khối/đầu thổi).
    whistle_light_features:
      name: Tính năng đèn còi
      description: 'Cho biết còi có tích hợp hiệu ứng ánh sáng dành cho các bữa tiệc
        (ví dụ: đèn LED) hay không.'
    whistle_purpose:
      name: Mục đích của còi
      description: Xác định ứng dụng chính dự định của còi (huấn luyện thể thao, an
        toàn hàng hải, huấn luyện chó, v.v.).
    whistle_sound_style:
      name: Kiểu âm thanh huýt sáo
      description: 'Mô tả kiểu/đặc điểm của âm thanh còi phát ra (ví dụ: đơn âm so
        với đa âm).'
    white_glue_finish_appearance_when_dry:
      name: Màu trắng keo hoàn thiện/hình thức khi khô
      description: 'Chỉ định trạng thái của keo sau khi khô, thích hợp cho mục đích
        Craft/văn phòng (ví dụ: trong suốt so với mờ đục).'
    white_glue_washability:
      name: Khả năng lau sạch của keo sữa
      description: Cho biết liệu keo khô có thể giặt sạch khỏi vải hoặc da hay không.
    whitewater_kayak_style:
      name: Kiểu thuyền kayak vượt thác
      description: 'Mục tiêu thiết kế chính trong phân khúc thuyền vượt thác (ví dụ:
        Creekboat, River Runner, Playboat).'
    whitewater_rating_class:
      name: Xếp hạng (hạng) cho môn thể thao dưới nước xiết
      description: Quy mô Quốc tế cao nhất của hạng Độ khó trên sông bè được đánh
        giá theo tên định danh.
    whorl_mounting_interface:
      name: Giao diện gắn đĩa xoay sợi
      description: Cách trục quay gắn vào bánh xe quay sợi (kiểu trục/kết nối).
    wick_construction_type:
      name: Kiểu kết cấu của bấc
      description: Cấu tạo/kiểu dáng của bấc (bấc bện, bấc dẹt, bấc vuông, bấc lõi,
        bấc gỗ, v.v.).
    wick_core_type:
      name: Loại lõi bấc
      description: 'Việc bấc nến không có lõi hay có lõi (ví dụ: lõi giấy hoặc lõi
        kẽm) sẽ ảnh hưởng đến độ cứng và đặc tính cháy.'
    wick_tab_crimp_type:
      name: Loại tab bấc
      description: Cách mà tab kẹp giữ bấc cố định bấc (cấu trúc/kiểu kẹp).
    wick_tab_material:
      name: Chất liệu đế giữ bấc
      description: 'Vật liệu của tabgắn/giá đỡ (thường là thiếc), có liên quan đến
        khả năng chống ăn mòn và các yêu cầu quy định (ví dụ: tránh khách hàng tiềm
        năng).'
    wick_tab_shape:
      name: Hình dạng của tấm giữ bấc
      description: Hình dạng/kiểu dáng của tấm giữ bấc.
    wick_type_included:
      name: Bao gồm loại bấc.
      description: Chỉ định loại/chất liệu bấc có trong bộ sản phẩm.
    wig_fiber_material:
      name: Chất liệu sợi tóc giả
      description: Giúp người mua sắm dễ dàng lựa chọn giữa các loại tóc giả làm từ
        tóc thật và tóc tổng hợp với các đặc điểm về kiểu dáng và độ bền khác nhau,
        nhờ đó người mua sắm có thể dễ dàng tìm được loại tóc giả phù hợp.
    wildlife_attractant_scent:
      name: Mùi hương thu hút động vật hoang dã
      description: Xác định mùi hương chính được sử dụng để thu hút động vật hoang
        dã, bao gồm mùi hương thức ăn tự nhiên và mùi hương thuộc loại pheromone.
    willow_grade:
      name: Cấp độ Willow
      description: Chỉ định cấp độ chất lượng của cây liễu được sử dụng, cho biết
        cấu trúc vân gỗ và mức độ hiệu suất tổng thể.
    willow_type:
      name: Loại liễu
      description: Xác định loại liễu hoặc vật liệu thay thế được sử dụng cho lưỡi
        vợt, điều này ảnh hưởng rất lớn đến hiệu suất, độ bền và giá cả.
    wind_up_mechanism_type:
      name: Loại cơ chế vặn dây cót
      description: Chỉ định cách thức lên dây cót hoặc kích hoạt đồ chơi.
    wind_up_toy_movement_pattern:
      name: Mô hình chuyển động của đồ chơi lên dây cót
      description: Mô tả chuyển động chính được tạo ra khi lên dây cót.
    windbreak_purpose:
      name: Mục đích chắn gió
      description: Xác định mục đích sử dụng chính của hộp chắn gió.
    windfoil_board_mounting_system:
      name: Hệ thống lắp đặt ván cánh ngầm
      description: Chỉ định hộp chứa lá chắn hoặc giao diện gắn kết được tích hợp
        sẵn trên tấm ván cánh buồm.
    windfoil_sail_style:
      name: Kiểu cánh buồm
      description: Phân loại buồm theo phong cách cưỡi ngựa hoặc bộ môn thể thao dự
        định sử dụng.
    winding_direction:
      name: Hướng cuộn dây
      description: Cho biết kiểu quay mà máy lên dây đồng hồ hỗ trợ (quay theo chiều
        kim đồng hồ, ngược chiều kim đồng hồ hoặc quay hai chiều).
    winding_method:
      name: Phương pháp quấn dây
      description: Cách thức cuộn/nạp sợi ngang để sử dụng trong con thoi.
    winding_speed_control_type:
      name: Loại điều khiển tốc độ cuộn dây
      description: Cho biết phương pháp được sử dụng để điều khiển tốc độ cuộn dây
        trong quá trình sử dụng.
    winding_type:
      name: Loại cuộn dây
      description: Xác định cấu trúc quấn dây của bass (hình dạng quấn ngoài).
    windlass_control_station_type:
      name: Trạm điều khiển tời kiểu
      description: Loại giao diện điều khiển được tích hợp hoặc hỗ trợ để vận hành
        tời neo.
    windlass_mount_type:
      name: Loại giá đỡ tời
      description: Vị trí/cách thức lắp đặt tời neo trên thuyền.
    window_component_location:
      name: Địa điểm thành phần cửa sổ
      description: 'Chỉ định cửa sổ/lỗ nào mà bộ phận đó áp dụng trong xe (ví dụ:
        kính chắn gió, kính cửa, kính sau hay kính cửa sổ nhỏ).'
    window_configuration:
      name: Cấu hình cửa sổ
      description: Chỉ ra sự hiện diện và kích thước tương đối của các cửa sổ quan
        sát trong suốt trên cánh máy bay.
    window_glass_construction:
      name: Cấu trúc kính cửa sổ
      description: Quy định về cấu trúc an toàn/ghép lớp của kính cửa sổ xe ô tô.
    window_glass_features:
      name: Đặc điểm kính cửa sổ
      description: 'Cho biết liệu kính có hỗ trợ các công nghệ tích hợp trên xe (ví
        dụ: tấm cảm biến mưa, giá đỡ camera) hay không.'
    window_glass_finish:
      name: Hoàn thiện kính cửa sổ
      description: Chỉ định lớp hoàn thiện/màu sắc/phương pháp xử lý chống nhìn trộm
        cho kính cửa sổ xe cơ giới.
    window_glass_tint_color:
      name: kính cửa sổ màu sắc
      description: Chỉ định màu sắc của tông màu có trong kính (không phải sản phẩm
        màu sắc chung).
    window_glass_tint_level:
      name: Mức độ tối màu của kính cửa sổ
      description: Chỉ số này cho biết độ tối gần đúng của lớp phim dán kính nguyên
        bản (không phải phim dán thêm). Sử dụng các mức độ mô tả khi không biết chính
        xác VLT.
    window_net_latch_mechanism:
      name: Cơ chế chốt lưới cửa sổ
      description: 'Chỉ định cơ chế khóa/mở được sử dụng cho lưới cửa sổ (ví dụ: nút
        bấm, cần gạt, khóa kiểu dây an toàn).'
    window_net_mounting_hardware:
      name: Thiết bị gắn lưới cửa sổ
      description: 'Xác định loại trang thiết bị lắp đặt hoặc phương pháp gắn được
        sử dụng để lắp đặt lưới chống muỗi (ví dụ: kẹp, vít, kiểu móc/thanh), hoặc
        liệu trang thiết bị có được bao gồm hay không.'
    window_net_opening_direction:
      name: Hướng mở của lưới cửa sổ
      description: Quy định cách thức lưới cửa sổ mở/thả ra so với người bên trong
        để thoát hiểm và tuân thủ quy định.
    window_regulator_operation:
      name: Hoạt động của bộ điều chỉnh cửa sổ
      description: Chỉ định cách vận hành bộ điều chỉnh cửa sổ (quay tay hoặc điện).
    windshield_coverage_area:
      name: Khu vực bao phủ kính chắn gió
      description: 'Chỉ rõ những bộ phận nào của ngoại thất phía trước xe mà tấm che
        kính chắn gió được thiết kế để bảo vệ (ví dụ: chỉ kính chắn gió so với bao
        gồm cần gạt nước, gương chiếu hậu, cửa sổ bên hoặc mép nắp ca-pô).'
    windshield_mount_attachment_method:
      name: Phương pháp gắn khung lắp kính chắn gió
      description: Chỉ định cách giá đỡ bám vào hoặc giữ chặt bề mặt kính chắn gió.
    windshield_washer_fluid_seasonality:
      name: Tính thời vụ của dung dịch rửa kính chắn gió
      description: 'Chỉ định mùa/khí hậu hoặc mục đích sử dụng chính của dung dịch
        rửa kính chắn gió (ví dụ: dung dịch chống đóng băng mùa đông, dung dịch rửa
        kính chắn gió mùa hè, dung dịch dùng được cả bốn mùa).'
    windsurf_fin_style:
      name: Kiểu vây lướt ván
      description: 'Phân loại vây theo bộ môn chèo thuyền hoặc kiểu sử dụng dự định
        (ví dụ: lướt sóng, slalom, lướt rong).'
    windsurfing_connection_standard:
      name: Tiêu chuẩn kết nối lướt ván buồm
      description: Giao diện cơ khí hoặc dạng hộp được sử dụng để gắn bộ phận vào
        bo mạch hoặc giàn khoan.
    windsurfing_sail_style:
      name: Kiểu dáng buồm lướt sóng
      description: Phân loại mục đích sử dụng hoặc bộ môn của cánh buồm, chẳng hạn
        như lướt sóng, lướt tự do hoặc lướt ván có cánh nâng.
    wine_additive_type:
      name: Loại phụ gia rượu vang
      description: Chỉ rõ loại sản phẩm rượu vang màu đỏ này là gì (thành phần, phụ
        gia, men, chất làm trong, bộ, v.v.).
    wine_body:
      name: Thân rượu
      description: Mô tả cảm nhận về độ đậm đặc và hương vị của rượu vang.
    wine_carbonation:
      name: Sự sủi bọt của rượu vang
      description: Cho biết rượu vang là loại không sủi bọt, sủi bọt nhẹ hay sủi bọt
        mạnh, và nếu có, cả cường độ sủi bọt.
    wine_making_ingredient_type:
      name: Loại nguyên liệu làm rượu
      description: Xác định loại thành phần chức năng cho các chất phụ gia và thành
        phần tiêu hao trong sản xuất rượu vang.
    wine_making_stage:
      name: Giai đoạn sản xuất rượu vang
      description: Xác định sản phẩm đó dành cho bước nào trong quy trình sản xuất
        rượu vang.
    wine_style:
      name: Phong cách rượu vang
      description: Phân loại theo phong cách sản xuất rượu vang Beyond màu sắc, mà
        còn bao gồm rượu vang không sủi bọt, rượu vang sủi bọt hoặc rượu vang tăng
        độ cồn.
    winemaking_process_stage:
      name: Giai đoạn của quy trình sản xuất rượu vang
      description: Cho biết giai đoạn chính trong quy trình sản xuất rượu vang mà
        nguồn cung cấp này hướng đến.
    wing_count:
      name: Số lượng cánh
      description: Số lượng cánh/tay cầm trên boomerang.
    wing_handle_type:
      name: Loại tay cầm trên cánh
      description: Xác định kiểu dáng hệ thống tay cầm trên cánh buồm.
    wing_part_type:
      name: Loại bộ phận cánh
      description: Xác định thành phần hoặc bộ phận thay thế cụ thể cho cánh máy bay
        dạng lá chắn.
    wingfoiling_style:
      name: Kiểu cánh nâng
      description: Cho biết bộ môn hoặc phong cách lướt ván cánh buồm cụ thể mà sản
        phẩm hướng đến.
    wiper_arm_finish:
      name: Hoàn thiện cần gạt nước
      description: Lớp phủ bề mặt hoặc lớp phủ bảo vệ được áp dụng cho cần gạt nước,
        khả năng chống ăn mòn Impact và vẻ ngoài.
    wiper_arm_pivot_mount_type:
      name: Loại giá đỡ trục xoay cần gạt nước
      description: Chỉ định cách lắp cần gạt mưa vào hệ thống truyền động hoặc trục
        xoay của cần gạt mưa trên xe.
    wiper_blade_attachment_type:
      name: Loại gắn lưỡi gạt mưa
      description: Chỉ định kiểu kết nối/kiểu gắn được sử dụng để gắn lưỡi gạt mưa
        vào cần gạt mưa.
    wiper_blade_rubber_material:
      name: Vật liệu cao su của lưỡi gạt mưa
      description: Vật liệu của bộ phận lau (lõi/lõi thay thế) tiếp xúc với mặt kính.
    wiper_system_position:
      name: Vị trí hệ thống gạt nước
      description: Chỉ định vị trí lắp đặt hệ thống gạt mưa trên xe.
    wire_coating_material:
      name: Chất liệu lớp phủ vỏ dây điện
      description: Chỉ định vật liệu lớp phủ/vỏ bọc bên ngoài được áp dụng cho dây
        (không phải vật liệu lõi dây), có thể ảnh hưởng đến khả năng chống mài mòn
        và độ trơn tru khi luồn dây qua các lỗ đính hạt.
    wire_coating_type:
      name: Loại lớp phủ dây
      description: Xác định xem dây dẫn có được phủ/bọc hay không và bằng cách nào
        (về màu sắc, khả năng bảo vệ và kết cấu).
    wire_construction_type:
      name: Loại kết cấu dây
      description: Xác định cấu trúc vật lý của dây xâu hạt, chẳng hạn như dạng sợi
        hay dạng đặc và liệu nó có được phủ lớp bảo vệ hay không.
    wire_finish:
      name: Hoàn thiện dây
      description: 'Chỉ định lớp hoàn thiện bề mặt, lớp phủ hoặc lớp mạ được áp dụng
        cho dây dẫn (ví dụ: đánh bóng, tráng men, mạ kẽm, mạ), ảnh hưởng đến vẻ ngoài
        và khả năng chống oxy hóa/ăn mòn.'
    wire_gauge_awg:
      name: Độ dày dây (AWG)
      description: American Wire Gauge (AWG) là kích thước của các dây dẫn được sử
        dụng trong bộ dây điện.
    wire_insulation_material:
      name: Chất liệu cách điện của dây dẫn
      description: Vật liệu của lớp cách điện/vỏ bọc dây dẫn được sử dụng trong bó
        dây (ảnh hưởng đến khả năng chịu nhiệt/chống hóa chất).
    wire_packaging_type:
      name: Loại bao bì dây
      description: Quy định cách thức bán/đóng gói dây dẫn.
    wire_shape_profile:
      name: Hình dạng/mặt cắt ngang của dây
      description: Mô tả hình dạng mặt cắt ngang của dây.
    wiring_configuration:
      name: Cấu hình dây
      description: Cho biết liệu kiếm đấu kiếm có được cung cấp kèm dây điện để tính
        điểm điện tử, không dây, không dây, hay chỉ dành cho luyện tập không dùng
        điện.
    wobbler_style:
      name: Kiểu Wobbler
      description: Xác định kiểu thiết kế/hoạt động cụ thể của mồi giả dạng lắc lư,
        chẳng hạn như mồi giả dạng cá quay hoặc mồi giả dạng cá giật.
    wood_block_surface_preparation:
      name: Chuẩn bị bề mặt khối gỗ
      description: Cho biết trạng thái bề mặt sẵn sàng sử dụng của khối gỗ để hoàn
        thiện và Craft.
    wood_grain_direction:
      name: Hướng vân gỗ
      description: Hướng vân gỗ so với chiều dài nhất của sản phẩm (quan trọng đối
        với độ bền, khả năng cắt và vẻ ngoài).
    wood_slice_edge_style:
      name: Kiểu cạnh lát gỗ
      description: Cạnh của lát cắt, chẳng hạn như cạnh vỏ cây tự nhiên so với cạnh
        nhẵn/được mài.
    wooden_block_special_features:
      name: Đặc điểm đặc biệt của khối gỗ
      description: Bộ xếp hình bằng gỗ này có những tính năng nổi bật.
    woodwind_body_construction:
      name: Cấu trúc thân nhạc cụ hơi bằng gỗ
      description: 'Cho biết nhạc cụ được làm nguyên khối hay ghép nhiều mảnh (ví
        dụ: 2 mảnh/3 mảnh), ảnh hưởng đến việc vệ sinh, bảo quản và tính di động.'
    woodwind_polishing_cloth_intended_use:
      name: Khăn lau nhạc cụ hơi
      description: Ghi rõ loại khăn này chủ yếu được thiết kế để làm sạch/đánh bóng
        bộ phận nào trên nhạc cụ hơi bằng gỗ.
    woodwind_small_part_type:
      name: Loại phụ tùng nhỏ cho nhạc cụ hơi bằng gỗ
      description: 'Xác định loại phụ tùng thay thế nhỏ cho kèn clarinet (ví dụ: phụ
        kiện bàn phím, miếng đệm/nút bần/nỉ, vòng).'
    woofer_mounting_type:
      name: Kiểu lắp đặt loa trầm
      description: Cách thức lắp đặt/sử dụng loa trầm (lắp đặt ngoài trời hay trong
        thùng loa) và các kiểu lắp đặt phổ biến trong ô tô.
    woofer_surround_material:
      name: Vật liệu viền loa trầm
      description: Vật liệu được sử dụng cho vòng bao quanh loa trầm (vòng treo ngoài).
    worn_on_finger:
      name: Ngón tay bị mòn
      description: Chỉ rõ ngón tay nào mà chiếc kim khâu hướng dẫn này được thiết
        kế để đeo.
    wrap_style:
      name: Kiểu quấn
      description: Biểu thị số lần dây thắt lưng được thiết kế để quấn quanh eo.
    wrapping_occasion:
      name: Dịp gói quà
      description: Paper gói quà này chủ yếu dành cho dịp tặng quà/lễ kỷ niệm nào?
    wrapping_paper_features:
      name: Đặc điểm của Paper quà
      description: Các đặc tính về chức năng và tính bền vững của Paper gói, chẳng
        hạn như khả năng chống rách, hàm lượng nội dung tái chế hoặc định dạng tờ
        giấy cắt sẵn.
    wrestling_dummy_design:
      name: Thiết kế hình nộm đấu vật
      description: Hình dáng tổng thể hoặc tư thế của hình nộm, chẳng hạn như hình
        người đứng hoặc hình người ném, sẽ quyết định các bài tập huấn luyện phù hợp.
    wrestling_mat_safety_certifications:
      name: Chứng nhận an toàn thảm đấu vật
      description: Liệt kê bất kỳ chứng nhận hoặc tiêu chuẩn an toàn nào của ngành
        hoặc tổ chức thể thao mà thảm đáp ứng.
    wrist_strap_style:
      name: Kiểu dáng dây đeo cổ tay
      description: Mô tả kiểu dáng dây đeo cổ tay (hoặc việc không có dây đeo) ảnh
        hưởng đến khả năng hỗ trợ và độ vừa vặn.
    wrist_support_style:
      name: Kiểu hỗ trợ cổ tay
      description: Xác định cấu tạo hoặc kiểu dáng của dụng cụ hỗ trợ cổ tay, chẳng
        hạn như nẹp, găng tay, băng hoặc quấn, để hỗ trợ người dùng lựa chọn theo
        sở thích và hiệu suất.
    xylophone_range_octaves:
      name: Quãng âm của đàn Xylophone
      description: 'Tổng âm vực của đàn xylophone được biểu thị bằng quãng tám (ví
        dụ: 2,5 quãng tám, 3 quãng tám, 4 quãng tám).'
    xylophone_resonator_type:
      name: Loại đàn xylophone có bộ cộng hưởng
      description: Loại hệ thống cộng hưởng được sử dụng để khuếch đại âm thanh (nếu
        có).
    yam_variety:
      name: Giống khoai mỡ
      description: 'Chỉ rõ giống hoặc loại khoai lang phổ biến đang được bán (ví dụ:
        màu tím, màu vàng, chân voi).'
    yarn_cutter_physical_style:
      name: Phong cách thể chất của người cắt sợi
      description: 'Xác định kiểu dáng vật lý của dụng cụ cắt sợi (ví dụ: dạng treo,
        dạng vòng, dạng kéo) để hỗ trợ việc duyệt và lọc trong danh mục này.'
    yarn_finish_or_effect:
      name: Hoàn thiện hoặc hiệu ứng của sợi
      description: Điểm nổi bật là các phương pháp xử lý đặc biệt về mặt hình ảnh
        hoặc chức năng được áp dụng cho sợi, chẳng hạn như huỳnh quang hoặc lấp lánh
        kim loại.
    yarn_guide_style:
      name: Sợi hướng dẫn kiểu
      description: Kiểu dáng vật lý của bộ phận dẫn hướng sợi chỉ.
    yarn_swift_adjustability:
      name: Khả năng điều chỉnh nhanh chóng của sợi
      description: Cho biết liệu và cách thức điều chỉnh giá đỡ cuộn chỉ (có thể mở
        rộng, thu gọn/gập lại), ảnh hưởng đến khả năng lưu trữ và phạm vi cuộn chỉ
        mà nó có thể chứa.
    yarn_swift_bearing_type:
      name: Loại ổ trục sợi
      description: 'Mô tả cơ chế hỗ trợ quay (ví dụ: ổ bi) ảnh hưởng đến độ êm ái
        và tốc độ cuộn dây.'
    yeast_application:
      name: Ứng dụng của men nở
      description: Cho biết mục đích sử dụng chính của sản phẩm men trong nấu ăn hoặc
        lên men.
    yo_yo_accessory_part_type:
      name: Loại phụ kiện/bộ phận yo-yo
      description: 'Xác định loại phụ tùng hoặc phụ kiện thay thế yo-yo mà sản phẩm
        đó thuộc về (ví dụ: dây, vòng bi, miếng đệm phản hồi).'
    yo_yo_axle_system_type:
      name: Hệ thống trục Yo-yo
      description: 'Phương pháp chế tạo trục yo-yo (ví dụ: trục cố định so với trục
        truyền động), cảm giác Impact chơi và bảo trì.'
    yo_yo_bearing_size_class:
      name: Lớp kích thước mang Yo-yo
      description: Kích thước vòng bi tiêu chuẩn được sử dụng bởi yo-yo, nếu có.
    yo_yo_bearing_type:
      name: Loại ổ trục yo-yo
      description: Cấu hình ổ trục ảnh hưởng đến khả năng phản hồi và đặc tính quay
        của vòng bi.
    yo_yo_play_style:
      name: Phong cách chơi yo-yo
      description: Phong cách chơi chính mà yo-yo hướng đến, phản ánh bộ môn/kỹ thuật
        mà sản phẩm được thiết kế cho.
    yo_yo_response_system:
      name: Hệ thống phản hồi Yo-yo
      description: Chỉ định cơ chế phản hồi yo-yo mà bộ phận này được thiết kế cho
        (khả năng tương thích).
    yo_yo_responsiveness:
      name: Khả năng phản hồi của con lắc
      description: Liệu con yo-yo có tự động quay trở lại tay khi bị kéo (Responsive)
        hay cần phải buộc chặt (không phản hồi).
    yo_yo_string_material:
      name: Yo-yo vật liệu
      description: Thành phần vật liệu của yo-yo chuỗi.
    yogurt_base_ingredient:
      name: Thành phần nền của sữa chua
      description: Xác định nguồn sữa hoặc thực vật chính được sử dụng để làm sữa
        chua, điều này rất quan trọng đối với sở thích ăn uống và các yếu tố gây dị
        ứng.
    yoke_type:
      name: Loại gá
      description: Xác định kiểu giá đỡ hoặc khung đỡ súng dùng để giữ súng trên chân
        chống đơn.
    zill_playing_style:
      name: Phong cách chơi của Zill
      description: Bối cảnh/phong cách biểu diễn dự định (thường là múa bụng so với
        các biến thể dàn nhạc/văn hóa).
    zill_strap_material:
      name: Chất liệu dây đeo Zill
      description: Chất liệu của dây đeo ngón tay/dây thun dùng để giữ các chuông
        (nếu có), ảnh hưởng đến sự thoải mái, độ bền và độ bám.
    zills_strap_adjustability:
      name: Khả năng điều chỉnh dây đeo của Zills
      description: Liệu dây đeo/dây chun đi kèm có thể điều chỉnh được để vừa vặn
        hay không và điều chỉnh như thế nào.
    zipper_application:
      name: Khóa kéo ứng dụng
      description: Xác định dự án hoặc ứng dụng dự định mà khóa kéo được thiết kế
        cho.
    zipper_chain_type:
      name: Loại dây kéo
      description: Xác định cấu tạo/loại của dây kéo/răng kéo.
    zipper_end_type:
      name: Loại đầu khóa kéo
      description: Chỉ rõ cách khóa kéo kết thúc và liệu nó có tách rời (đầu mở) hay
        đóng (đầu không tách rời), bao gồm cả các loại khóa kéo có đầu tách rời thường
        được sử dụng trong các loại khóa kéo thủ công.
    zipper_gauge:
      name: Độ dày khóa kéo
      description: 'Ký hiệu này chỉ định kích thước/độ dày của dây kéo, thường được
        biểu thị bằng một con số kèm theo dấu # (ví dụ: #3 hoặc #5), tương ứng với
        chiều rộng răng/vòng xoắn và mục đích sử dụng.'
    zipper_opening_length:
      name: Chiều dài khóa kéo
      description: Xác định mức độ khóa kéo ở phần mở phía trước, phân biệt kiểu khóa
        kéo toàn bộ (full-ZIP), kiểu khóa kéo một nửa (half-ZIP) hoặc kiểu khóa kéo
        một phần tư (quarter-ZIP).
    zipper_pull_material:
      name: Chất liệu tay kéo khóa
      description: Chỉ định chất liệu của tab kéo khóa (phần bạn cầm nắm), khác với
        răng/dây kéo và dải khóa.
    zipper_pull_side:
      name: Phía kéo của khóa kéo
      description: Chỉ định phía nào của tab kéo mà người dùng có thể kéo khóa từ
        bên trong.
    zipper_pull_strap_cord_tab_material:
      name: Chất liệu dây kéo/dây buộc/tab
      description: Chất liệu của phần dây đeo/dây buộc/tab/dây tua rua được gắn vào
        khóa kéo (nếu có), không bao gồm khóa kéo chính.
    zipper_reversibility_mechanism:
      name: Cơ chế đảo chiều khóa kéo
      description: 'Chỉ định cách thức khóa kéo có thể đảo chiều (ví dụ: khóa kéo
        hai mặt so với khóa kéo lật/tự khóa được thiết kế cho quần áo có thể đảo chiều).'
    zipper_separating_type:
      name: Loại có khóa kéo
      description: Cho biết liệu khóa kéo có thể tách rời ở phía dưới/trên hay là
        loại khóa kéo kín, phù hợp với áo khoác, túi ngủ, túi xách, v.v.
    zipper_side:
      name: Khóa kéo bên hông
      description: Chỉ định vị trí của khóa kéo chính khi túi ngủ được đặt ngửa.
    zipper_slider_material:
      name: Chất liệu khóa kéo
      description: Chỉ định vật liệu của đầu kéo khóa (cơ cấu chuyển động), có khả
        năng chịu Impact và chống ăn mòn.
    zipper_slider_pull_configuration:
      name: Cấu hình khóa kéo/tay kéo
      description: Cho biết khóa kéo có một hay hai tay kéo, và tay kéo nằm ở một
        hay cả hai bên của tay kéo.
    zipper_style:
      name: Kiểu dáng khóa kéo
      description: 'Chỉ định độ dài hoặc sự hiện diện của khóa kéo trên trang phục
        (ví dụ: không có khóa kéo, khóa kéo ¼, khóa kéo ½, khóa kéo toàn bộ).'
    zipper_tape_material:
      name: Chất liệu băng vải của khóa kéo
      description: Xác định chất liệu chính của dây kéo (mặt vải) được may vào sản
        phẩm.
    zipper_teeth_type:
      name: Loại răng khóa kéo
      description: 'Chỉ định kiểu cấu tạo của dây/răng khóa kéo (ví dụ: dạng xoắn,
        nhựa đúc, kim loại, ẩn), điều này ảnh hưởng đến độ linh hoạt, độ bền và các
        ứng dụng điển hình.'
