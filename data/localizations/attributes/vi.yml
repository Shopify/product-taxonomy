      description: Phân loại thể loại của kiểu nội dung truyền thông, chẳng hạn như
        kinh dị hoặc giả tưởng
    geological_era:
      name: Kỷ địa chất
      description: Phân loại tuổi của đá hoặc hóa thạch sưu tầm, chẳng hạn như Mesozoi
