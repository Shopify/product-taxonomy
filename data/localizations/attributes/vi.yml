        giải phóng kéo dài, liposomal, nhai được).'
    release_schedule:
      name: Lịch phát hành
      description: 'Chỉ định tần suất phát hành các tập hoặc bản cập nhật mới, ví
        dụ: hàng tuần, hai tuần một lần'
    remote_control_functions:
      name: Chức năng điều khiển từ xa
