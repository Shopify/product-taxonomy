    keyboard_layout:
      name: Bố cục bàn phím
      description: Chỉ định cách sắp xếp các phím trên bàn phím, ví dụ QWERTY, Workman
    keyboard_mounting_style:
      name: Kiểu lắp bàn phím
      description: Xác định phương pháp lắp tấm bên trong, ảnh hưởng đến âm thanh
