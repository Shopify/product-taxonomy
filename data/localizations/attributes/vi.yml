        từ xa, nhả màn trập
    camera_display_technology:
      name: Công nghệ màn hình hiển thị
      description: 'Chỉ định công nghệ màn hình của máy ảnh, ví dụ: OLED, Super AMOLED'
    camera_features:
      name: Vật liệu ống kính máy ảnh
