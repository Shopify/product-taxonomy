        ngoài chức năng chụp ảnh.
    remote_shutter_form_factor:
      name: Kiểu dáng nút chụp từ xa
      description: Xác định kiểu dáng vật lý hoặc vỏ ngoài của nút chụp từ xa, chẳng
        hạn như dạng móc khóa/nút bấm, bộ điều khiển dạng nhẫn hoặc gậy selfie có
        tích hợp nút chụp.
    remote_technology:
      name: Công nghệ điều khiển từ xa
      description: Xác định công nghệ được sử dụng trong điều khiển từ xa của máy
        ảnh, chẳng hạn như Bluetooth hoặc dây nối
    removable_storage_formats_supported:
      name: Các định dạng lưu trữ di động được hỗ trợ
      description: 'Xác định các định dạng lưu trữ có thể tháo rời mà thiết bị tương
        thích, ví dụ: SD, microUSB'
    removal_target:
      name: Mục tiêu tẩy
      description: 'Xác định sản phẩm móng nào mà chất tẩy được thiết kế để hòa tan
        (ví dụ: sơn gel, móng acrylic, bột nhúng).'
    replacement_lamp_type:
      name: Loại đèn thay thế
      description: 'Phân loại kiểu bộ phận thay thế được cung cấp (ví dụ: mô-đun đèn
        và vỏ, dải đèn nền LED, lắp ráp CCFL).'
    reptile/amphibian_food_form:
      name: Thức ăn của động vật bò sát/lưỡng cư
      description: Chỉ định dạng thức ăn của loài bò sát/lưỡng cư, ví dụ như đông
        khô hoặc dạng viên
    reptile/amphibian_habitat_supply_type:
      name: Loại môi trường sống cho động vật bò sát/lưỡng cư
      description: Xác định loại nguồn cung cấp nhiệt hoặc chiếu sáng cho môi trường
        sống của loài bò sát/lưỡng cư, như đèn nhiệt hoặc đèn UVB
    research_focus:
      name: Trọng tâm nghiên cứu
      description: Xác định lĩnh vực nghiên cứu chính trong các bài báo học thuật,
        như sinh học hoặc kinh tế
    research_methodology:
      name: Phương pháp nghiên cứu
      description: Xác định loại phương pháp nghiên cứu được sử dụng trong các bài
        báo học thuật, như khảo sát hoặc định tính
    resistance_level:
      name: Mức độ kháng
      description: Cho biết sức cản của sản phẩm, thường dành cho vòng đeo tay tập
        thể dục; ví dụ rất nặng
    resistance_system:
      name: Hệ thống kháng
      description: Xác định cơ chế được sử dụng để tạo lực cản trong thiết bị thể
        hình, ví dụ như nước, không khí
    resistance_tolerance:
      name: Dung sai điện trở
      description: 'Xác định độ lệch cho phép của điện trở thực tế từ giá trị danh
        nghĩa, được biểu thị bằng phần trăm (ví dụ: ±1%).'
    restrictor_gate_shape:
      name: Hình dạng cổng giới hạn
      description: Xác định hình dạng hình học của cổng giới hạn đi kèm hoặc cần thiết
        cho cần điều khiển.
    result_display:
      name: Hiển thị kết quả
      description: 'Chỉ định định dạng thử thai, ví dụ: theo vạch, kỹ thuật số'
    retail/sale_sign_design:
      name: Thiết kế biển hiệu bán lẻ/giảm giá
      description: Cho biết loại thông điệp trên các biển báo bán lẻ hoặc giảm giá,
        ví dụ như giảm giá, ưu đãi đặc biệt
    reticle_plane:
      name: Tiêu diện kẻ
      description: 'Chỉ định mặt phẳng tiêu cự của tâm ngắm trong phạm vi và điểm
        ngắm của vũ khí, ví dụ: thứ nhất hoặc thứ hai'
    reticle_type:
      name: Loại đường chữ thập
      description: Xác định loại tâm ngắm trong ống ngắm vũ khí, như Duplex hoặc Mildot
    rewinder_operation_mode:
      name: Chế độ vận hành máy tua lại
      description: 'Xác định các chế độ chức năng mà máy tua lại hỗ trợ (ví dụ: chỉ
        tua lại, tua lại và tua nhanh).'
    rf_output_standard:
      name: Tiêu chuẩn đầu ra RF
      description: Chỉ định tiêu chuẩn phát sóng truyền hình hoặc đài mà bộ điều biến
        đưa ra
    rfid_frequency:
      name: Tần số RFID
      description: 'Chỉ định tần số hoạt động của các sản phẩm RFID, ví dụ: thấp,
        cực cao'
    riding_style:
      name: Kiểu đạp xe
      description: 'Chỉ định mục đích sử dụng hoặc kiểu sử dụng cho thiết bị thể thao
        mùa đông, ví dụ: trượt xuống dốc có chướng ngại vật, tự do'
    riding_toy_propulsion_type:
      name: Loại động cơ đẩy đồ chơi cưỡi ngựa
      description: Xác định cách đẩy đồ chơi cưỡi ngựa, chẳng hạn như bằng điện hoặc
        bàn đạp
    rim/wheel_design:
      name: Thiết kế vành/bánh xe
      description: Mô tả kiểu dáng hoặc kết cấu của vành/bánh xe, như hợp kim hoặc
        có nan hoa
    ring_design:
      name: Thiết kế nhẫn
      description: Mô tả phong cách của một chiếc nhẫn, chẳng hạn như ban nhạc hoặc
        solitaire
    ring_size:
      name: Kích cỡ nhẫn
      description: Chỉ định kích thước của một chiếc nhẫn, chẳng hạn như L hoặc 6.5
    rinse_requirement:
      name: Yêu cầu rửa sạch
      description: 'Làm rõ liệu sữa rửa mặt phải được rửa sạch, có thể để lại hay
        không cần rửa (ví dụ: nước tẩy trang micellar).'
    rise_height_class:
      name: Lớp độ cao nâng
      description: 'Phân loại chiều cao bổ sung mà núm bấm tăng thêm so với gậy gốc
        (ví dụ: thấp, trung bình, cao)'
    riser_color:
      name: Màu bậc thang
      description: Xác định màu của dây nâng trong cung bắn cung, chẳng hạn như màu
        đen hoặc xanh lam
    riser_material:
      name: Vật liệu nâng
      description: Chỉ định vật liệu làm dây cung hoặc nỏ, chẳng hạn như sợi carbon
        hoặc gỗ
    riser_pattern:
      name: Mẫu bậc thang
      description: Mô tả thiết kế hoặc họa tiết trên thanh nâng của cung và nỏ, như
        cách ngụy trang hoặc họa tiết
    rivet_form:
      name: Dạng đinh tán
      description: 'Mô tả hình thức của đinh tán phần cứng, ví dụ: rắn, tách'
    road_sign_design:
      name: Thiết kế biển báo đường bộ
      description: 'Xác định loại thông tin hiển thị trên biển báo đường bộ, ví dụ:
        dừng, giới hạn tốc độ'
    robe_style:
      name: Kiểu áo choàng
      description: Xác định loại thiết kế tổng thể hoặc kiểu cấu trúc của áo choàng,
        chẳng hạn như áo choàng spa hoặc áo quấn.
    rock_composition:
      name: Thành phần đá
      description: Chỉ định thành phần địa chất của đá, như đá cẩm thạch hoặc đá vôi
    rock_formation:
      name: Quá trình hình thành đá
      description: Chỉ định phân loại địa chất của đá, chẳng hạn như đá magma hoặc
        trầm tích
    rocker_type:
      name: Kiểu rocker
      description: 'Chỉ định độ cong của ván trượt tuyết hoặc ván trượt, ví dụ: phẳng,
        rocker'
    rod_color:
      name: Màu cần
      description: Xác định màu sắc của cần câu, ví dụ màu đen hoặc xanh
    rod_material:
      name: Vật liệu dây đeo bằng đồng
      description: Xác định vật liệu được sử dụng trong các mặt hàng thể thao dạng
        que, chẳng hạn như than chì hoặc sợi thủy tinh
    rod_pattern:
      name: Mẫu cần
      description: Mô tả thiết kế hoặc hình in trên cần câu, chẳng hạn như ngụy trang
        hoặc sọc
    rod_shape:
      name: Hình cần câu
      description: Xác định hình dạng hoặc cấu hình của cột vòi hoa sen, ví dụ như
        thẳng, hình chữ U
    roller_head:
      name: Đầu lăn
      description: Xác định số lượng đầu trên con lăn, thường dành cho các dụng cụ
        chăm sóc da; ví dụ đơn, kép
    roller_material:
      name: Vật liệu duỗi
      description: Chỉ định vật liệu được sử dụng trong con lăn, thường dùng cho các
        dụng cụ chăm sóc da; ví dụ như ngọc thạch, silicone
    roller_type:
      name: Loại đầu lăn
      description: Xác định loại con lăn, thường dùng cho các dụng cụ chăm sóc da;
        ví dụ như đá, kim nhỏ
    roof_decor_shape:
      name: Kiểu dáng trang trí mái nhà
      description: Xác định thiết kế hoặc hình thức trang trí mái nhà, chẳng hạn như
        ngựa hoặc thuyền buồm
    room_correction_technology:
      name: Công nghệ hiệu chỉnh phòng
      description: Chỉ định hệ thống hiệu chỉnh âm thanh tự động hoặc hiệu chỉnh phòng
        được tích hợp trong bộ thu.
    rosin_form:
      name: Dạng nhựa thông
      description: Mô tả hình dạng hoặc nhựa thông dùng cho các nhạc cụ dây, như khối
        hoặc bánh
    rosin_grade:
      name: Loại nhựa thông
      description: 'Chỉ định loại nhựa thông được sử dụng cho nhạc cụ dây, ví dụ:
        tối màu, trung bình'
    rotating_direction:
      name: Hướng quay
      description: Chỉ định hướng quay của mũi khoan và tuốc nơ vít, như tay trái
        hoặc tay phải
    rotation_direction:
      name: Hướng xoay
      description: Cho biết liệu máy khoan móng có hỗ trợ xoay thuận, xoay ngược hay
        cả hai.
    rotator_control_technology:
      name: Công nghệ điều khiển máy quay
      description: Xác định cơ chế điều khiển của bộ xoay anten, chẳng hạn như bằng
        tay hoặc bằng động cơ
    route_of_administration:
      name: Đường dùng
      description: 'Xác định cách sản phẩm được dùng hoặc tiêu thụ, ảnh hưởng đến
        hiệu quả và sự an toàn (ví dụ: uống, bôi ngoài da, miếng dán qua da, ngậm
        dưới lưỡi, tiêm bắp).'
    rug/mat_features:
      name: Tính năng thảm/chiếu
      description: Mô tả các đặc tính đặc biệt của thảm/thảm chùi chân, như đế chống
        trượt hoặc khô nhanh
    rug/mat_material:
      name: Vật liệu thảm/chiếu
      description: Chỉ định loại vật liệu được sử dụng trong thảm hoặc thảm chùi chân,
        chẳng hạn như cao su hoặc sợi nhỏ
    rug/mat_shape:
      name: Hình dạng thảm/chiếu
      description: Chỉ định hình dạng của thảm và tấm thảm, ví dụ như hình Á hậu,
        hình vuông
    rug_features:
      name: Tính năng thảm
      description: Mô tả các đặc điểm cụ thể của thảm, chẳng hạn như đế chống trượt
        hoặc màu sắc chống tia cực tím
    rug_material:
      name: Vật liệu thảm
      description: Xác định vật liệu được sử dụng để làm thảm, chẳng hạn như len hoặc
        đay
    rug_shape:
      name: Hình dạng thảm
      description: Xác định thiết kế hình học của thảm, chẳng hạn như hình vuông hoặc
        dài hẹp
    rum_grade:
      name: Loại rượu rum
      description: Phân loại rượu rum dựa trên đặc điểm hoặc cấp độ, ví dụ như loại
        hảo hạng, loại có gia vị
    saddle_base_color:
      name: Màu đế yên
      description: Xác định màu chính của đế yên xe đạp, như đen hoặc xanh
    saddle_base_material:
      name: Vật liệu đế yên
      description: Xác định vật liệu được sử dụng làm đế yên xe đạp, như thép hoặc
        sợi carbon
    saddle_base_pattern:
      name: Mẫu đế yên
      description: Mô tả thiết kế hoặc hình in trên đế yên xe đạp, chẳng hạn như trừu
        tượng hoặc logo
    saddle_material:
      name: Chất liệu yên xe
      description: Chỉ định vật liệu được sử dụng làm yên xe đạp, chẳng hạn như cao
        su hoặc da
    saddle_seat_color:
      name: Màu ghế yên
      description: Chỉ định màu của yên xe đạp, như bạc hoặc đỏ
    saddle_seat_material:
      name: Vật liệu ghế yên
      description: Xác định vật liệu được sử dụng để chế tạo yên xe đạp, chẳng hạn
        như da hoặc nylon
    saddle_seat_pattern:
      name: Mẫu ghế yên
      description: Mô tả thiết kế hoặc hình in trên yên xe đạp, chẳng hạn như hoa
        hoặc hình học
    safety_certifications:
      name: Chứng nhận an toàn
      description: Cho biết sản phẩm tuân thủ các tiêu chuẩn an toàn, thường dành
        cho sản phẩm dành cho trẻ em; ví dụ như không chứa BPA
    safety_device_installation:
      name: Lắp đặt thiết bị an toàn
      description: Xác định cách lắp hoặc gắn các sản phẩm an toàn, ví dụ như bằng
        keo, gắn bằng vít
    safety_equipment_material:
      name: Vật liệu thiết bị an toàn
      description: Chỉ định loại vật liệu trong các đồ dùng an toàn trên xe, chẳng
        hạn như nylon hoặc sợi thủy tinh
    safety_rail_installation:
      name: Lắp đặt đường ray an toàn
      description: Xác định cách lắp đặt thanh ray an toàn, chẳng hạn như thanh ray
        có thể điều chỉnh hoặc cố định
    sailboat_type:
      name: Loại thuyền buồm
      description: Xác định thiết kế hoặc mô hình cụ thể của một thuyền buồm, chẳng
        hạn như thuyền một buồm hoặc thuyền một cột buồm
    sandal_style:
      name: Kiểu sandal
      description: Chỉ định kiểu dép, chẳng hạn như dây đeo mắt cá chân hoặc dây buộc
    sandblaster_application:
      name: Ứng dụng thiết bị phun cát
      description: Xác định chức năng dự định của các công cụ phun cát, như đánh bóng
        hoặc chà nhám
    sander_type:
      name: Loại máy mài
      description: Phân loại loại dụng cụ chà nhám, ví dụ như đai, quỹ đạo ngẫu nhiên
    sanding_application:
      name: Ứng dụng chà nhám
      description: Chỉ định mục đích của các phụ kiện chà nhám, như hoàn thiện hoặc
        tẩy sơn
    satellite_coverage_area:
      name: Vùng phủ sóng vệ tinh
      description: Xác định các khu vực địa lý mà điện thoại vệ tinh có thể truy cập,
        chẳng hạn như Úc hoặc Châu Phi
    satellite_messaging_capability:
      name: Khả năng nhắn tin vệ tinh
      description: Cho biết sản phẩm có hỗ trợ nhắn tin vệ tinh một chiều (chỉ gửi
        đi) hay hai chiều (gửi và nhận).
    satellite_navigation_systems_supported:
      name: Hệ thống định vị vệ tinh được hỗ trợ
      description: Chỉ định hệ thống vệ tinh định vị toàn cầu (GNSS) mà điện thoại
        có thể nhận tín hiệu để định vị và theo dõi.
    satellite_network_type:
      name: Loại mạng vệ tinh
      description: Xác định nhà cung cấp dịch vụ cho điện thoại vệ tinh, ví dụ như
        Inmarsat, Iridium
    sauna_accessories_included:
      name: Đi kèm pụ kiện xông hơi
      description: Xác định các vật dụng bổ sung đi kèm với phòng xông hơi khô, như
        muôi hoặc đá xông hơi
    scaffolding_mounting_type:
      name: Kiểu giá đỡ giàn giáo
      description: Chỉ định kiểu thiết lập của giàn giáo, ví dụ như khung, di động
    scale_material:
      name: Chất liệu vảy
      description: Xác định vật liệu được sử dụng trong cân, điển hình là thước đo
        đường kính cây; ví dụ như thép không gỉ, nhựa
    scale_model_accessory_type:
      name: Loại phụ kiện mô hình theo tỷ lệ
      description: Xác định loại phụ kiện cho các mô hình thu nhỏ, chẳng hạn như tòa
        nhà hoặc mô hình người
    scale_model_kit_type:
      name: Loại bộ mô hình
      description: Chỉ định danh mục của bộ mô hình tỷ lệ, chẳng hạn như xe tăng hoặc
        tàu vũ trụ
    scale_model_material:
      name: Vật liệu mô hình
      description: Xác định vật liệu chính được sử dụng trong các mô hình thu nhỏ,
        chẳng hạn như gỗ hoặc giấy trơn
    scale_model_theme:
      name: Chủ đề mô hình quy mô
      description: Xác định chủ đề của một mô hình thu nhỏ, chẳng hạn như giả tưởng
        hoặc lịch sử
    scalp_concern:
      name: Vấn đề da đầu
      description: Xác định vấn đề da đầu hoặc tóc chính mà sản phẩm điều trị được
        điều chế để giải quyết.
    scalpel_blade_material:
      name: Vật liệu lưỡi dao mổ
      description: Xác định thành phần của lưỡi dao phẫu thuật, chẳng hạn như thép
        không gỉ hoặc titan
    scalpel_blade_number:
      name: Số lưỡi dao mổ
      description: Xác định số lượng hoặc loại lưỡi dao phẫu thuật cụ thể, chẳng hạn
        như 10 hoặc 15A
    scalpel_blade_shape:
      name: Hình dạng lưỡi dao mổ
      description: Mô tả hình dạng của lưỡi dao phẫu thuật, chẳng hạn như cong hoặc
        thẳng
    scalpel_handle_number:
      name: Số cán dao mổ
      description: Xác định số tay cầm cụ thể cho dao phẫu thuật, chẳng hạn như 4
        hoặc 3L
    scan_converter_features:
      name: Tính năng chuyển đổi quét
      description: Nêu bật các tính năng riêng của bộ chuyển đổi quét, như chỉnh ảnh
        tự động hoặc điều khiển từ xa
    scanner_features:
      name: Tính năng máy quét
      description: Nêu bật các chức năng đặc biệt của máy quét, chẳng hạn như hỗ trợ
        bởi AI hoặc quét lên đám mây
    scanner_grip_compatibility:
      name: Tính tương thích tay cầm máy quét
      description: Cho biết hộp có phù hợp với máy quét có tay cầm súng/cò, dạng cầm
        tay tiêu chuẩn hoặc cả hai.
    scanner_maintenance_kit_type:
      name: Loại bộ bảo trì máy quét
      description: Phân loại bản chất của sản phẩm để người mua có thể nhanh chóng
        phân biệt giữa thẻ làm sạch, bộ hoàn chỉnh, bộ hiệu chuẩn, bộ con lăn, khăn
        lau và dung dịch.
    scanner_sensor_type:
      name: Loại cảm biến máy quét
      description: Chỉ định loại cảm biến trong máy quét, chẳng hạn như máy chụp ảnh
        2D hoặc laser
    scarf/shawl_style:
      name: Kiểu khăn quàng cổ/khăn choàng
      description: Xác định kiểu khăn quàng cổ và khăn choàng, ví dụ như chăn, quấn
    scene_modes:
      name: Chế độ cảnh
      description: Xác định chế độ của máy ảnh để chụp các tình huống khác nhau, chẳng
        hạn như ban đêm hoặc dưới nước
    scent:
      name: Mùi hương
      description: Chỉ định mùi thơm hoặc mùi hương của sản phẩm, chẳng hạn như hương
        vani hoặc cam quýt
    scissor_blade_type:
      name: Loại lưỡi kéo
      description: Mô tả hình dạng và kiểu dáng của lưỡi kéo, chẳng hạn như lưỡi cong
        hoặc hình vỏ sò
    scooter_brake_type:
      name: Loại phanh xe máy
      description: Chỉ định cơ chế và thiết kế của phanh xe máy, chẳng hạn như phanh
        đĩa hoặc phanh tang trống
    scope/sight_design:
      name: Thiết kế phạm vi/tầm nhìn
      description: Mô tả kiểu thiết kế cho phạm vi hoặc điểm ngắm của vũ khí, ví dụ
        như tầm nhìn ban đêm, laser
    scope/sight_features:
      name: Tính năng lấy nét/tầm nhìn
      description: Mô tả các tính năng đặc biệt của kính ngắm hoặc ống ngắm vũ khí,
        chẳng hạn như kính ngắm có đèn hoặc ghi âm
    scope_design:
      name: Thiết kế lấy nét
      description: Xác định kiểu thiết kế của phạm vi quang học, chẳng hạn như góc
        cạnh hoặc thẳng
    scope_lens_type:
      name: Loại ống kính lấy nét
      description: Xác định loại ống kính được sử dụng trong phạm vi, chẳng hạn như
        HD hoặc góc rộng
    scoreboard_features:
      name: Tính năng bảng tỷ số
      description: Mô tả các đặc điểm đặc biệt của bảng tỷ số, chẳng hạn như di động
        hoặc chịu được thời tiết
    scrapbook_paper_type:
      name: Loại giấy sổ lưu niệm
      description: Xác định kiểu dáng hoặc thiết kế của giấy sổ lưu niệm, chẳng hạn
        như giấy đặc biệt hoặc có hoa văn
    screen/display_design:
      name: Thiết kế màn hình/hiển thị
      description: Chỉ định các đặc điểm thiết kế của màn hình sản phẩm, thường dành
        cho máy ảnh; ví dụ như kính ngắm
    screen_assembly_components_included:
      name: Linh kiện lắp ráp màn hình đi kèm
      description: Làm rõ những linh kiện nào được lắp ráp sẵn với màn hình
    screen_curvature_rating:
      name: Độ cong màn hình
      description: 'Chỉ định bán kính cong của màn hình cong (ví dụ: 1000R), cho biết
        mức độ rõ rệt của đường cong.'
    screen_material:
      name: Chất liệu màn hình
      description: 'Xác định loại vật liệu được sử dụng cho màn hình của sản phẩm,
        ví dụ: kính, polycarbonate'
    screen_operation_type:
      name: Loại vận hành màn hình
      description: 'Mô tả kiểu cấu trúc hoặc triển khai của màn hình (ví dụ: khung
        cố định, kéo xuống thủ công, có động cơ, chân ba, bơm hơi).'
    screen_protection_features:
      name: Tính năng bảo vệ màn hình
      description: Chi tiết cách vỏ bảo vệ màn hình điện thoại ngoài việc che phủ
        cơ bản.
    screen_protector_adhesion_type:
      name: Loại keo dán miếng dán màn hình
      description: Chỉ định phương pháp keo dán hoặc gắn được sử dụng để dán miếng
        dán vào màn hình điện thoại.
    screen_protector_coverage_style:
      name: Kiểu che phủ của tấm bảo vệ màn hình
      description: Xác định thiết kế che phủ vật lý hoặc hệ số hình thức của miếng
        bảo vệ so với màn hình thiết bị
    screen_protector_features:
      name: Tính năng miếng dán màn hình
      description: Nêu bật các đặc tính chức năng đặc biệt được cung cấp bởi miếng
        dán ngoài khả năng chống xước cơ bản.
    screen_protector_finish:
      name: Lớp hoàn thiện miếng dán màn hình
      description: 'Xác định lớp hoàn thiện bề mặt quang học của miếng dán (ví dụ:
        bóng, mờ, riêng tư, chống lóa).'
    screen_specialized_features:
      name: Tính năng chuyên dụng của màn hình
      description: Xác định các khả năng riêng của màn hình máy tính, như chống chói
        hoặc màn hình cảm ứng
    screen_surface_finish:
      name: Hoàn thiện bề mặt màn hình
      description: Mô tả cách xử lý bề mặt của kính màn hình, ảnh hưởng đến độ chói
        và cảm giác
    seafood_type:
      name: Loại hải sản
      description: Phân loại sản phẩm thủy sản theo loài, chẳng hạn như cá ngừ hoặc
        tôm hùm
    seal_stamp_design:
      name: Thiết kế tem niêm phong
      description: 'Chỉ định kiểu của con dấu, ví dụ: chữ lồng hoặc thư pháp'
    season:
      name: Mùa
      description: Cho biết mùa phù hợp với sản phẩm nhất, chẳng hạn như mùa hè hoặc
        mùa thu
    seat_color:
      name: Màu ghế
      description: Chỉ định màu của khu vực chỗ ngồi của sản phẩm, như đen hoặc xanh
        lục
    seat_cushioning:
      name: Đệm ghế
      description: Mô tả loại đệm trong các sản phẩm ghế ngồi, chẳng hạn như đệm hoặc
        không đệm
    seat_pattern:
      name: Hoạ tiết ghế
      description: Chỉ định họa tiết trực quan trên các sản phẩm chỗ ngồi, chẳng hạn
        như ngôi sao hoặc dấu chấm
    seat_reservation:
      name: Đặt chỗ ngồi
      description: Xác định xem vé có bao gồm chỗ ngồi được chỉ định hay yêu cầu đặt
        trước.
    seat_rotation:
      name: Xoay ghế
      description: Cho biết ghế có xoay được không và các vị trí khóa có sẵn.
    seat_shape:
      name: Hình dạng chỗ ngồi
      description: Mô tả hình dạng khu vực chỗ ngồi của sản phẩm, như hình tròn hoặc
        hình chữ nhật
    seat_structure:
      name: Cấu trúc ghế
      description: Xác định kết cấu của ghế, ví dụ lưng mây, rắn chắc
    seat_swivel_mechanism:
      name: Cơ chế xoay ghế
      description: Cho biết liệu và cách ghế có thể xoay tại các bậc thang để chuyển
        di an toàn hơn.
    seat_type:
      name: Loại ghế
      description: 'Mô tả thiết kế của một chiếc ghế hoặc ghế dài chẳng hạn như lót
        đệm hoặc ghế kiểu khung '
    seat_upholstery_color:
      name: Màu sắc bọc ghế
      description: Xác định màu sắc của ghế bọc đồ nội thất, chẳng hạn như màu be
        hoặc màu xanh
    seat_upholstery_material:
      name: Chất liệu bọc ghế
      description: Xác định loại vải hoặc vật liệu được sử dụng để bọc ghế sofa, chẳng
        hạn như sợi nhỏ hoặc giả da
    seat_upholstery_pattern:
      name: Mẫu bọc ghế
      description: Xác định thiết kế hoặc họa tiết trên vải của ghế sofa, chẳng hạn
        như hình hoa hoặc họa tiết xoáy
    security_algorithms:
      name: Thuật toán bảo mật
      description: 'Chỉ định các phương pháp mã hóa được sử dụng bởi thiết bị điện
        tử, ví dụ: AES '
    security_level:
      name: Cấp độ bảo mật
      description: 'Chỉ định tiêu chuẩn an toàn của các dụng cụ như ổ khóa và chốt,
        ví dụ: thấp, trung bình, cao'
    selfie_stick_functionality_type:
      name: Loại chức năng của gậy tự sướng
      description: 'Xác định cấu hình chức năng chính của sản phẩm (ví dụ: chỉ có
        gậy, kết hợp gậy và chân máy, thiết bị chống rung).'
    semiconductor_material:
      name: Vật liệu bán dẫn
      description: Xác định vật liệu nền bán dẫn cơ sở được sử dụng trong linh kiện,
        ảnh hưởng đến tốc độ chuyển mạch, điện áp đánh thủng và hành vi nhiệt.
    sensation_effect:
      name: Hiệu ứng cảm giác
      description: 'Mô tả bất kỳ hiệu ứng cảm giác bổ sung nào mà chất bôi trơn cung
        cấp (ví dụ: làm ấm, ngứa ran).'
    sensor/measuring_tool_features:
      name: Tính năng của cảm biến/dụng cụ đo lường
      description: Mô tả đặc điểm độc đáo của cảm biến hoặc dụng cụ đo, như di động
        hoặc thông minh
    sensor_features:
      name: Tính năng cảm biến
      description: Mô tả các tính năng cụ thể của cảm biến của sản phẩm, chẳng hạn
        như đèn nền hoặc camera tích hợp
    sensor_type:
      name: Loại cảm biến
      description: Xác định loại cảm biến được sử dụng trong các thiết bị an ninh
        hoặc an toàn, ví dụ như hồng ngoại, siêu âm
    sensory_effect:
      name: Hiệu ứng cảm giác
      description: Cho biết cảm giác vật lý tức thì mà sản phẩm cung cấp khi thoa.
    sequin/glitter_shape:
      name: Hình dạng vải kim sa/nhũ
      description: Mô tả dạng kim sa hoặc nhũ, như hình tròn hoặc hình vuông
    sequin_shape:
      name: Hình dạng vải kim sa
      description: Xác định hình dạng của kim sa, như hình tròn hoặc hoa
    serum_target_areas:
      name: Vùng mục tiêu huyết thanh
      description: Chỉ định các khu vực ứng dụng dự định cho huyết thanh, chẳng hạn
        như mắt hoặc mặt
    service_type:
      name: Loại dịch vụ
      description: Xác định danh mục dịch vụ đám mây, chẳng hạn như Nền tảng dạng
        dịch vụ (PaaS) hoặc Phần mềm dạng dịch vụ (SaaS)
    sewing_foot_type:
      name: Loại chân vịt máy may
      description: Chỉ định kiểu may, chẳng hạn như đính cườm hoặc chân may đường
        vải ẩn
    sewing_machine_part_category:
      name: Danh mục bộ phận máy may
      description: Phân loại loại linh kiện máy may, chẳng hạn như dây curoa động
        cơ hoặc chân vịt
    sfx_control_technology:
      name: Công nghệ điều khiển hiệu ứng đặc biệt
      description: Xác định cách vận hành các thiết bị hiệu ứng đặc biệt, chẳng hạn
        như DMX hoặc kích hoạt bằng âm thanh
    shaft_color:
      name: Màu trục
      description: Chỉ định màu sắc của trục trên các bộ phận như pít tông, ví dụ
        như bạc hoặc đỏ
    shaft_flex:
      name: Độ cứng thân gậy
      description: Cho biết mức độ linh hoạt của cán gậy đánh golf, ví dụ như cứng,
        dành cho phụ nữ
    shaft_material:
      name: Vật liệu trục
      description: Xác định vật liệu được sử dụng trong trục của dụng cụ, như gỗ hoặc
        kim loại
    shaft_orientation:
      name: Định hướng trục
      description: Xác định hướng của trục trong động cơ nhỏ, ví dụ như ngang hoặc
        dọc
    shaft_pattern:
      name: Mẫu trục
      description: Biểu thị họa tiết trực quan trên trục của các vật phẩm, điển hình
        là pít tông; ví dụ như lá, chim
    shampoo/conditioner_effect:
      name: Tác dụng dầu gội/dầu xả
      description: Mô tả kết quả mong muốn của việc sử dụng dầu gội hoặc dầu xả, chẳng
        hạn như trị gàu hoặc dưỡng ẩm
    shampoo/conditioner_items_included:
      name: Đi kèm các sản phẩm dầu gội/dầu xả
      description: Xác định loại sản phẩm trong bộ dầu gội và dầu xả, ví dụ dầu gội
        2 trong 1
    shampoo_type:
      name: Loại dầu gội
      description: Phân loại dầu gội dựa trên công thức của chúng, chẳng hạn như bột
        hoặc 2 trong 1
    shape:
      name: Hình dạng
      description: Mô tả hình dạng của sản phẩm, chẳng hạn như hình tròn hoặc hình
        trái tim
    shapewear_support_level:
      name: Mức nâng ngực định hình
      description: Cho biết cấp độ nén của các mặt hàng quần áo định hình, ví dụ cấp
        1
    shaving_cream_formulation:
      name: Công thức kem cạo râu
      description: Chỉ định kết cấu của kem cạo râu, chẳng hạn như gel hoặc bọt
    shaving_kit_components:
      name: Cấu tạo bộ dụng cụ cạo râu
      description: Chỉ định các vật phẩm đi kèm trong bộ dụng cụ cạo râu, chẳng hạn
        như dao cạo hoặc bàn chải
    sheen/gloss_level:
      name: Độ sáng/độ bóng
      description: Chỉ định độ bóng của các sản phẩm sơn hoặc vecni, chẳng hạn như
        nửa bóng hoặc satin
    sheet_color:
      name: Màu khăn trải
      description: 'Xác định màu sắc của sản phẩm bằng giấy, ví dụ: trắng, xanh'
    sheet_mask_material:
      name: Vật liệu mặt nạ giấy
      description: Xác định vật liệu hoặc chất nền chính của mặt nạ giấy hoặc hydrogel.
    sheet_pattern:
      name: Mẫu tấm
      description: 'Mô tả thiết kế hoặc in trên sản phẩm giấy, chẳng hạn như kẻ sọc
        hoặc cầu vồng '
    shelf_color:
      name: Màu kệ
      description: Mô tả màu sắc của kệ sản phẩm, chẳng hạn như màu be hoặc đen
    shelf_material:
      name: Chất liệu kệ đỡ
      description: Xác định loại vật liệu được sử dụng để làm kệ, như gỗ hoặc kim
        loại
    shelf_pattern:
      name: Mẫu kệ
      description: Mô tả thiết kế hoặc họa tiết trên kệ công nghiệp, chẳng hạn như
        trừu tượng hoặc chữ V
    shell/frame_color:
      name: Màu vỏ/khung
      description: 'Chỉ định màu của vỏ hoặc khung trên các vật phẩm như giày trượt
        hoặc mũ bảo hiểm, ví dụ: đen, xanh'
    shell/frame_material:
      name: Vật liệu vỏ/khung
      description: Chỉ định thành phần của vỏ hoặc khung của sản phẩm, thường dành
        cho giày trượt patin hoặc giày trượt một hàng; ví dụ như cao su, composite
    shell/frame_pattern:
      name: Mẫu vỏ/khung
      description: Mô tả thiết kế hoặc hình in trên vỏ hoặc khung của sản phẩm, điển
        hình là giày trượt một hàng
    shingle/tile_material:
      name: Vật liệu lợp/ngói
      description: Xác định thành phần của tấm lợp hoặc ngói lợp, chẳng hạn như xi
        măng hoặc cao su
    shoe_binding_type:
      name: Kiểu gắn giày
      description: Xác định cơ chế được sử dụng để cố định giày vào thiết bị, chẳng
        hạn như gài hoặc khóa mang vào nhanh
    shoe_features:
      name: Tính năng giày
      description: Xác định các đặc tính đặc biệt của giày, chẳng hạn như không thấm
        nước hoặc nhẹ
    shoe_fit:
      name: Độ vừa của giày
      description: Xác định chiều rộng của giày dép, chẳng hạn như hẹp hoặc rộng
    shoe_size:
      name: Kích cỡ giày
      description: 'Dùng để xác định cỡ giày dép, ví dụ: Cực lớn (XL), 9.5'
    shooting_modes:
      name: Chế độ chụp
      description: Chỉ định cài đặt hoạt động của máy ảnh, chẳng hạn như chế độ quang
        cảnh hoặc phim
    shopping_bag_material:
      name: Vật liệu túi mua sắm
      description: Chỉ định loại vật liệu được sử dụng trong túi mua sắm, ví dụ như
        giấy, vật liệu phân hủy sinh học
    shower_base_design:
      name: Thiết kế chân vòi hoa sen
      description: Chỉ định thiết kế của bệ tắm, chẳng hạn như góc cạnh hoặc góc phần
        tư
    shower_cap_lining_material:
      name: Vật liệu lót mũ tắm
      description: Xác định vật liệu được sử dụng trên lớp lót bên trong tiếp xúc
        với tóc, ảnh hưởng đến sự thoải mái, sức khỏe tóc và kiểm soát tóc xù.
    shower_curtain_mounting_type:
      name: Kiểu lắp rèm tắm
      description: Xác định cách gắn rèm tắm, chẳng hạn như vòng đệm hoặc vòng
    shower_design:
      name: Thiết kế vòi hoa sen
      description: Xác định cấu hình của bộ bồn tắm đứng, chẳng hạn như hốc tường
        hoặc góc
    shower_features:
      name: Tính năng vòi hoa sen
      description: Mô tả các đặc điểm riêng của vòi sen, chẳng hạn như ghế tích hợp
        hoặc vòi sen cầm tay
    shower_opening_type:
      name: Kiểu mở vòi hoa sen
      description: Xác định kiểu mở cửa phòng tắm, chẳng hạn như kiểu mở bản lề hoặc
        trượt
    shrink_ratio:
      name: Tỷ lệ co ngót
      description: Chỉ định tốc độ co của ống co nhiệt, ví dụ như 2:1
    shutter_finish:
      name: Độ hoàn thiện màn trập
      description: Mô tả cách xử lý bề mặt của cửa chớp và rèm cửa, như được sơn hoặc
        sơn lót
    side_panel_style:
      name: Kiểu tấm bên
      description: 'Mô tả kiểu dáng hoặc chất liệu của tấm ốp bên chính (ví dụ: cửa
        sổ kính cường lực, lưới, thép đặc)'
    siding_material:
      name: Vật liệu vách ngoài
      description: Xác định loại vật liệu được sử dụng trong các sản phẩm vách ngoài,
        chẳng hạn như gỗ hoặc nhựa vinyl
    signal_path_technology:
      name: Công nghệ đường tín hiệu
      description: 'Xác định cấu trúc mạch lõi (ví dụ: ống, chỉ dùng bán dẫn, lai)
