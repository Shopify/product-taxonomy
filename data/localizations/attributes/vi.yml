    skin_care_features:
      name: Tính năng chăm sóc da
      description: Xác định lợi ích của các sản phẩm chăm sóc da, chẳng hạn như bảo
        vệ lâu dài hoặc chống tia UVA/UVB
    skin_care_mask_type:
      name: Loại mặt nạ chăm sóc da
      description: Xác định loại mặt nạ chăm sóc da, chẳng hạn như đất sét hoặc lột
    skin_care_tool_features:
      name: Tính năng dụng cụ chăm sóc da
      description: 'Nêu bật các tính năng chức năng hoặc tiện lợi đáng chú ý của dụng
        cụ (ví dụ: chống nước, cường độ có thể điều chỉnh).'
    skin_tone:
      name: Màu da
      description: Làm cho sản phẩm phù hợp với tông màu da cụ thể, ví dụ như da sâu,
        da sáng
    skin_undertone:
      name: Sắc độ da
      description: Chỉ định sản phẩm phù hợp với tông màu da cụ thể, ví dụ như trung
        tính, ấm
    skirt/dress_length_type:
      name: Váy/Loại chiều dài váy
      description: Xác định độ dài của chân váy hoặc váy, chẳng hạn như mini hoặc
        maxi
    skirt_style:
      name: Kiểu chân váy
      description: Mô tả thiết kế hoặc đường cắt của váy, chẳng hạn như bút chì hoặc
        xếp li
    slat_color:
      name: Màu đá đen
      description: Chỉ định màu của các thanh trong nền nệm, chẳng hạn như màu be
