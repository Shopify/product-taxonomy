      description: Cho biết mức hỗ trợ hoặc bảo vệ tổng thể do nhà sản xuất chỉ định
        được cung cấp bởi nẹp.
    bracelet_design:
      name: Thiết kế vòng tay
      description: Chỉ định thiết kế của một chiếc vòng tay, chẳng hạn như bùa chú
        hoặc vòng bít
    bracket/brace_design:
      name: Thiết kế khung/nẹp
      description: Mô tả kiểu giá đỡ hoặc nẹp, ví dụ như ke góc, nẹp góc
    bracket_profile:
      name: Cấu hình giá đỡ
      description: Chỉ ra kiểu giá đỡ vật lý được cung cấp cùng với thẻ, xác định
        khả năng tương thích của khung máy
    brandy_variety:
      name: Loại rượu mạnh
      description: Phân biệt giữa các phong cách rượu mạnh khác nhau, ví dụ như cognac,
        grappa
    breadboard_type:
      name: Loại breadboard
      description: Phân loại breadboard theo kiểu xây dựng hoặc kích thước cơ bản.
    breath_spray_benefit:
      name: Lợi ích xịt thơm miệng
      description: Xác định lợi ích chăm sóc răng miệng chính mà xịt thơm miệng tuyên
        bố mang lại.
    breath_sprays_certifications:
      name: Chứng nhận thuốc xịt hơi thở
      description: Chỉ định các tiêu chuẩn mà nước xịt thơm miệng đáp ứng, chẳng hạn
        như thương mại công bằng hoặc không chứa gluten
    bridge/router_advanced_features:
      name: Các tính năng nâng cao của Bridge/Router
      description: Nêu bật các chức năng nâng cao của cầu nối/bộ định tuyến, như hỗ
        trợ VPN hoặc hỗ trợ bởi AI
    brightness_levels:
      name: Mức độ sáng
      description: Chỉ định phạm vi ánh sáng phát ra cho sản phẩm, chẳng hạn như trung
        bình hoặc cao
    bristle_grade:
      name: Cấp độ lông
      description: 'Xác định chất lượng hoặc phân loại của lông động vật hoặc sợi
        tổng hợp được sử dụng (ví dụ: lông lửng bạc, sợi tổng hợp silvertip).'
    bristle_hardness:
      name: Độ cứng lông bàn chải
      description: Cho biết độ cứng của lông bàn chải đánh răng.
    bristle_material:
      name: Chất liệu lông
      description: Xác định thành phần của lông bàn chải, chẳng hạn như lông nylon
        hoặc lông ngựa
    bristle_shape:
      name: Kiểu dáng lông
      description: Xác định hình dạng của lông bàn chải, ví dụ như phẳng, góc cạnh
    broadcast_video_standard:
      name: Tiêu chuẩn video phát sóng
      description: Cho biết tiêu chuẩn phát sóng tương tự mà VCR tương thích.
    broadcasting_standard_supported:
      name: Tiêu chuẩn phát sóng được hỗ trợ
      description: Chỉ định các tiêu chuẩn phát sóng truyền hình hoặc điều chế (vệ
        tinh, cáp, mặt đất) mà sản phẩm có thể giải mã hoặc xử lý.
    broadhead/field_point_material:
      name: Vật liệu đầu rộng/điểm trường
      description: Xác định vật liệu được sử dụng trong tên đầu rộng hoặc săn bắn,
        như thép không gỉ hoặc thép cacbon
    broadhead_design:
      name: Thiết kế đầu mũi tên rộng
      description: 'Chỉ ra loại thiết kế của đầu mũi tên rộng được sử dụng trong bắn
        cung, ví dụ: lưỡi cố định, cơ khí'
    brush_application:
      name: Ứng dụng cọ vẽ
      description: Mô tả mục đích sử dụng của cọ nghệ thuật, chẳng hạn như acrylic
        hoặc màu nước
    brush_end_type:
      name: Loại đầu cọ
      description: 'Mô tả định dạng cấu trúc của đầu cọ (ví dụ: một đầu, hai đầu,
        có thể thu vào).'
    brush_head_shape:
      name: Hình dạng đầu bàn chải
      description: Xác định hình dạng tổng thể của đầu bàn chải, ảnh hưởng đến khả
        năng tiếp cận và sự phù hợp cho người dùng khác nhau.
    brush_head_usage:
      name: Cách sử dụng đầu chuốt
      description: Chỉ định mục đích sử dụng đầu bàn chải, thường dành cho mỹ phẩm;
        ví dụ như làm sạch sâu, tẩy da chết
    brush_material:
      name: Vật liệu cọ
      description: Chỉ định loại vật liệu được sử dụng để chế tạo bàn chải, chẳng
        hạn như silicone hoặc nhựa
    brush_size:
      name: Kích cỡ cọ
      description: Chỉ định kích thước của cọ vẽ nghệ thuật, ví dụ 0, 12
    brush_type:
      name: Loại cọ
      description: Chỉ định vật liệu được sử dụng trong bàn chải cạo râu, chẳng hạn
        như lông tổng hợp hoặc lông lửng
    brushing_mode:
      name: Chế độ đánh răng
      description: 'Liệt kê các chương trình làm sạch cài đặt sẵn mà bàn chải đánh
        răng có thể chuyển đổi (ví dụ: sạch, nhạy cảm, làm trắng).'
    bug_type:
      name: Loại lỗi
      description: Chỉ định loài côn trùng mà sản phẩm nhắm đến, như kiến hoặc ong
        bắp cày
    building_board_material:
      name: Vật liệu các tông xây dựng
      description: Chỉ định loại vật liệu được sử dụng để chế tạo ván, chẳng hạn như
        gỗ ép hoặc xi măng
    building_consumable_form:
      name: Mẫu vật liệu xây dựng
      description: Chỉ định dạng hợp chất trát tường, chẳng hạn như chất lỏng hoặc
        bột
    building_toy_type:
      name: Loại đồ chơi xây dựng
      description: 'Chỉ định danh mục đồ chơi xây dựng, ví dụ: bộ xây dựng STEM, gạch
        từ tính'
    bulb_cap_type:
      name: Loại đui đèn
      description: 'Chỉ định loại nắp hoặc đế của bóng đèn hoặc đồ đạc, ví dụ: E12,
        GU10'
    bulb_shape:
      name: Hình dạng bóng đèn
      description: Mô tả hình dạng của các sản phẩm đèn chiếu sáng, ví dụ như ống,
        xoắn ốc
    bulb_size:
      name: Cỡ bóng đèn
      description: Chỉ định kích thước của bóng đèn, ví dụ A19, C7
    bulb_type:
      name: Loại bóng đèn
      description: 'Chỉ định loại bóng đèn được sử dụng trong các sản phẩm đèn chiếu
        sáng, ví dụ: đèn LED, halogen'
    bulldozer_blade_type:
      name: Loại lưỡi máy ủi
      description: Xác định kiểu lưỡi dao trên máy ủi, chẳng hạn như góc hoặc lưỡi
        thẳng (S-blade)
    bullet_protection_level:
      name: Cấp bảo vệ chống đạn
      description: Cho biết mức độ chống đạn của áo vest chống đạn, ví dụ như IIA,
        IV
    bullhorn_features:
      name: Tính năng loa pin
      description: Nêu bật các chức năng riêng của loa pin, như chức năng ghi âm giọng
        nói hoặc còi báo động
    bullion_form:
      name: Dạng vàng bạc
      description: Chỉ định loại vàng thỏi, chẳng hạn như tròn hoặc thanh
    bungee_arm_mechanism:
      name: Cơ chế cánh tay bungee
      description: 'Xác định công nghệ được sử dụng để treo và dẫn hướng cáp chuột
        (ví dụ: tay lò xo, dây đàn hồi, hệ thống treo từ tính)'
    burner_material:
      name: Vật liệu đèn dầu
      description: Xác định vật liệu được sử dụng để chế tạo bếp lò hoặc bếp nướng,
        chẳng hạn như gang hoặc thép không gỉ
    butt_cap_color:
      name: Màu nắp mông
      description: Chỉ định màu của nắp mông trên cần câu, chẳng hạn như đen hoặc
        xanh
    butt_cap_material:
      name: Chất liệu bọc cần câu cá
      description: 'Xác định thành phần của phần cuối của tay cầm trên đồ thể thao,
        ví dụ: EVA (Ethylene Vinyl Acetate), nút chai'
    butt_cap_pattern:
      name: Mẫu nắp vợt
      description: Mô tả thiết kế hoặc họa tiết trên nắp đầu cần câu cá, chẳng hạn
        như ngụy trang hoặc hoa
    button/snap_closure_type:
      name: Kiểu nút/khóa đóng
      description: Mô tả kiểu cơ chế cài, chẳng hạn như từ tính hoặc ẩn
    button_surface_profile:
      name: Hình dạng bề mặt nút
      description: Mô tả đường viền vật lý của bề mặt piston nút, ảnh hưởng đến công
        thái học và phong cách hình ảnh.
    cabinet_type:
      name: Loại tủ
      description: Chỉ định thiết kế và dạng thức của trò chơi điện tử arcade, chẳng
