        các thiết bị âm thanh, ví dụ: USB, quang học'
    audio_duplex_capability:
      name: Khả năng song công âm thanh
      description: Chỉ định thiết bị có hỗ trợ giao tiếp âm thanh song công toàn phần
        (hai chiều đồng thời) hay bán song công.
    audio_mixer_type:
      name: Loại bộ trộn âm thanh
      description: Xác định loại bộ trộn âm thanh, chẳng hạn như analog hoặc phát
