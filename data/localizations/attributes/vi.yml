    placement_supported:
      name: Vị trí được hỗ trợ
      description: 'Xác định nơi sản phẩm có thể được lắp đặt hoặc sử dụng, ví dụ:
        tường, sàn'
    plan_service_type:
      name: Loại gói dịch vụ
      description: Xác định gói SIM chỉ bao gồm dữ liệu hay có cả dịch vụ gọi thoại
        và/hoặc SMS.
    plant_characteristics:
      name: Đặc điểm thực vật
      description: Xác định các đặc điểm cụ thể của thực vật, ví dụ như ra hoa, ăn
        được
    plant_class:
      name: Lớp thực vật
      description: Phân loại thực vật thành các nhóm phân loại cụ thể, ví dụ như thực
        vật một lá mầm, họ cải
    plant_material:
      name: Vật liệu thực vật
      description: Chỉ rõ liệu vật liệu thực vật là sống, được bảo quản hay nhân tạo
    plant_name:
      name: Tên thực vật
      description: Xác định tên thực vật hoặc tên thông thường của cây, chẳng hạn
        như hoa hồng, húng quế hoặc dưa chuột
    plant_stage:
      name: Giai đoạn phát triển của cây
      description: 'Xác định giai đoạn cụ thể của chu kỳ sinh trưởng của cây mà sản
        phẩm được thiết kế để hỗ trợ, ví dụ: cây con, cây sinh dưỡng'
    plant_support_material:
      name: Vật liệu giàn trồng cây
      description: Chỉ định vật liệu được sử dụng trong lồng hoặc khung trồng cây,
        như đất nung hoặc đá
    plate_type:
      name: Loại tấm
      description: Xác định loại tấm trong các dụng cụ làm tóc, ví dụ như titan, gốm
    play_equipment_items_included:
      name: Đi kèm đồ dùng vui chơi
      description: Liệt kê các vật dụng bổ sung đi kèm với thiết bị vui chơi, như
        đồ chơi treo hoặc gương
    play_slide_design:
      name: Thiết kế cầu trượt
      description: Mô tả thiết kế của một cầu trượt, chẳng hạn như cầu trượt xoắn
        ốc hoặc ống
    play_vehicle_propulsion:
      name: Động cơ đẩy xe đồ chơi
      description: Xác định cách một phương tiện chơi được cung cấp năng lượng, chẳng
        hạn như bằng ma sát hoặc điều khiển từ xa
    play_yard_design_features:
      name: Tính năng thiết kế sân chơi
      description: Xác định các đặc điểm đặc biệt của sân chơi, chẳng hạn như các
        mặt lưới hoặc các túi
    playback_disc_formats:
      name: Định dạng đĩa phát lại
      description: 'Xác định các định dạng đĩa tương thích với đầu phát DVD hoặc Blu-Ray;
        ví dụ: âm thanh CD, JPEG'
    playback_speed_supported:
      name: Tốc độ phát lại được hỗ trợ
      description: Liệt kê các tốc độ quay đĩa than mà mâm đĩa hoặc máy phát đĩa than
        có thể hoạt động.
    player/recorder_specialized_features:
      name: Các tính năng chuyên dụng của đầu phát/đầu ghi
      description: Nêu bật các tính năng cụ thể của công cụ phát hoặc ghi video, chẳng
        hạn như hỗ trợ AI hoặc kiểm soát của phụ huynh
    player_drive_type:
      name: Loại dẫn động máy phát
      description: Chỉ định cơ chế quay máy quay đĩa, chẳng hạn như dây curoa hoặc
        bánh đệm
    player_position:
      name: Vị trí cầu thủ
      description: 'Chỉ định vị trí cầu thủ mà sản phẩm phục vụ, ví dụ: thủ môn, tiền
        vệ'
    player_specialized_features:
      name: Tính năng chuyên dụng của máy chơi game
      description: Xác định các khả năng riêng của trình phát video, như hỗ trợ 4K
        hoặc hỗ trợ HDR
    playhouse_design:
      name: Thiết kế nhà vui chơi
      description: Chỉ định loại nhà chơi, chẳng hạn như nhà trên cây hoặc nhà chơi
        đặt sàn
    playset_features:
      name: Tính năng bộ đồ chơi
      description: Nêu bật các đặc điểm đặc biệt của một bộ đồ chơi, ví dụ như phiên
        bản giới hạn, không thấm nước
    plug_type:
      name: Loại ổ cắm
      description: 'Xác định khả năng tương thích khu vực của phích cắm, ví dụ: US,
        FR'
    plug_type_input:
      name: Loại phích cắm (đầu vào)
      description: Chỉ định phích cắm mà bộ đổi nguồn hoặc bộ chuyển đổi có thể chứa,
        dựa trên mã quốc gia hoặc vùng lãnh thổ; ví dụ như Mỹ, EU
    plug_type_output:
      name: Loại phích cắm (đầu ra)
      description: Chỉ định phích cắm mà bộ đổi nguồn hoặc bộ chuyển đổi có thể sử
        dụng làm đầu ra, dựa trên mã quốc gia hoặc vùng lãnh thổ; ví dụ như Mỹ, EU
    plumbing_primer_application:
      name: Ứng dụng sơn lót hệ thống ống nước
      description: Chỉ định nơi có thể sử dụng lớp sơn lót cho hệ thống ống nước,
        ví dụ như trên đường ống hoặc phụ kiện
    plumbing_trap_design:
      name: Thiết kế bẫy ống nước
      description: Chỉ định loại bẫy ống nước, chẳng hạn như trống hoặc chai
    plunger_shape:
      name: Hình dạng pit tông
      description: Chỉ định hình dạng của đầu pít tông, chẳng hạn như cốc hoặc accordion
    plywood_grade:
      name: Phân loại ván ép
      description: Chỉ định loại gỗ ép cho vật liệu xây dựng, như loại C hoặc D
    pneumatic_conveyor_operation:
      name: Vận hành băng tải khí nén
      description: Xác định chế độ hoạt động của băng tải khí nén, chẳng hạn như pha
        sinh thái hoặc pha đậm đặc
    poe_standard:
      name: Tiêu chuẩn Poe
      description: Xác định giao thức Cấp nguồn qua Ethernet (PoE) mà sản phẩm tuân
        thủ; ví dụ thụ động, IEEE 802.3af
    point_design:
      name: Thiết kế điểm
      description: Mô tả kiểu đầu của văn phòng phẩm như đinh hoặc đinh ghim, ví dụ
        như sắc, cùn
    pointing_device:
      name: Thiết bị trỏ
      description: Xác định thiết bị được sử dụng để điều hướng trên màn hình máy
        tính, ví dụ như nút chuột, bàn di chuột
    polar_pattern:
      name: Mô hình cực
      description: Cho biết hướng thu âm thanh của micrô, chẳng hạn như đa hướng hoặc
        hướng hình tim
    polarity_configuration:
      name: Cấu hình cực tính
      description: Mô tả sự sắp xếp cực tính bên trong liên quan đến LED, mô-đun hiển
        thị và các thiết bị tương tự.
    polarization:
      name: Phân cực
      description: Xác định hướng sóng của anten, ví dụ như dọc, tròn
    pole/post_material:
      name: Vật liệu cọc
      description: Chỉ rõ vật liệu xây dựng của ô che nắng hoặc cột ô, như sợi thủy
        tinh hoặc thép
    pole_color:
      name: Màu cọc
      description: 'Xác định màu sắc của cột trong các sản phẩm như ô, ví dụ: đen,
        đồng'
    pole_material:
      name: Chất liệu cọc
      description: Chỉ định vật liệu được sử dụng trong xây dựng cột, ví dụ như thép,
        gỗ
    pole_pattern:
      name: Mẫu cọc
      description: Mô tả thiết kế hoặc họa tiết trên cột ô, chẳng hạn như hoa hoặc
        hình học
    policy_sign_design:
      name: Thiết kế bảng hiệu chính sách
      description: 'Mô tả thông điệp cụ thể hiển thị trên biển báo chính sách, ví
        dụ: không hút thuốc, không sử dụng điện thoại di động'
    polish_dry_form:
      name: Kiểu sơn móng khô
      description: Xác định công thức của các sản phẩm làm khô sơn móng tay, ví dụ
        như gốc dung môi, gốc silicone
    polish_remover_form:
      name: Nước tẩy sơn móng
      description: Chỉ định loại sản phẩm tẩy sơn móng tay, ví dụ như chất lỏng, miếng
        gỡ
    polish_remover_formulation:
      name: Công thức tẩy sơn móng tay
      description: Cho biết thành phần hóa học của chất tẩy, đặc biệt là hàm lượng
        acetone hoặc các nền thay thế.
    polish_type:
      name: Loại đánh bóng
      description: Xác định loại chất đánh bóng cụ thể được sử dụng để chăm sóc tàu
        thủy, như kim loại hoặc nhựa vinyl
    polyphony:
      name: Tính đa âm
      description: 'Chỉ định khả năng ghi chú đồng thời của bộ tổng hợp, ví dụ: đa
        âm sắc, đa thời gian'
    portability:
      name: Tính linh động
      description: Chỉ định mức độ dễ dàng khi di chuyển hoặc mang theo sản phẩm,
        điển hình là đối với máy hút sữa; ví dụ như di động, kích thước nhỏ gọn
    post_material:
      name: Vật liệu cột trụ
      description: 'Chỉ định loại vật liệu cho các cột thuộc nhiều loại khác nhau,
        ví dụ: nhôm hoặc sợi thủy tinh'
    postage_stamp_features:
      name: Đặc điểm tem bưu chính
      description: Xác định các đặc điểm đặc biệt của tem bưu chính, như in đè hoặc
        hình mờ
    postpartum_stage:
      name: Giai đoạn sau sinh
      description: Xác định khung thời gian sau sinh mà băng được thiết kế cho.
    potential_extract:
      name: Chiết xuất tiềm năng
      description: Cho biết mức độ chiết xuất tiềm năng trong các loại ngũ cốc và
        mạch nha ủ bia, chẳng hạn như thấp hay cao
    pottery/sculpting_project_type:
      name: Loại dự án Đồ gốm/Điêu khắc
      description: Xác định loại dự án gốm hoặc điêu khắc cụ thể, như làm mô hình
        hoặc làm mặt nạ
    potty/toilet_seat_design:
      name: Thiết kế bô/Bồn cầu
      description: Xác định kiểu dáng hoặc cấu trúc của bô hoặc bệ ngồi toilet, chẳng
        hạn như dạng gập hoặc tiêu chuẩn
    potty_training_kit_components:
      name: Các thành phần của bộ dụng cụ tập ngồi bô
      description: Chỉ định các vật dụng đi kèm trong bộ dụng cụ dạy bé ngồi bô, ví
        dụ như nhãn dán, ghế bậc thang
    power_connector_type:
      name: Loại bộ nối nguồn
      description: Chỉ định các bộ nối nguồn phụ được yêu cầu hoặc cung cấp bởi bộ
        tăng áp hoặc bộ chuyển đổi
    power_conversion_semiconductor_type:
      name: Loại bán dẫn chuyển đổi nguồn
      description: Xác định vật liệu bán dẫn chính được sử dụng trong tầng cấp nguồn
        của bộ sạc, ảnh hưởng đến kích thước, hiệu suất và khả năng sinh nhiệt
    power_source:
      name: Nguồn năng lượng
      description: Chỉ định nguồn năng lượng mà sản phẩm sử dụng để hoạt động, chẳng
        hạn như năng lượng mặt trời hoặc pin
    power_supply_efficiency_rating:
      name: Xếp hạng hiệu suất nguồn điện
      description: Nêu mức chứng nhận hiệu suất 80 Plus của bộ nguồn PSU của máy tính
        để bàn.
    power_supply_form_factor:
      name: Hệ số hình thức cấp điện
      description: 'Xác định kích thước vật lý và tiêu chuẩn lắp đặt của PSU (ví dụ:
        ATX, SFX).'
    power_supply_modularity:
      name: Tính mô-đun của nguồn điện
      description: Cho biết cáp của PSU không thể tháo rời, có thể tháo rời một phần
        hay có thể tháo rời hoàn toàn.
    pregnancy_test_sensitivity:
      name: Độ nhạy của que thử thai
      description: 'Chỉ định khả năng xác định mang thai của xét nghiệm, ví dụ: phát
        hiện sớm, phát hiện tiêu chuẩn'
    prescription_status:
      name: Tình trạng kê đơn
      description: Cho biết liệu thuốc nhỏ tai có sẵn không cần kê đơn hay cần kê
        đơn từ chuyên gia chăm sóc sức khỏe.
    presentation_supply_features:
      name: Tính năng cung cấp bài thuyết trình
      description: Mô tả các đặc điểm riêng của thiết bị thuyết trình, chẳng hạn như
        có thể điều chỉnh độ cao hoặc bề mặt xóa được
    preservation_type:
      name: Loại bảo quản
      description: Xác định phương pháp được sử dụng để bảo quản mẫu vật trong phòng
        thí nghiệm, như cố định hoặc sấy khô
    pretend_electronics_toy_type:
      name: Loại đồ chơi điện tử giả vờ
      description: 'Chỉ định danh mục thiết bị điện tử giả vờ, ví dụ: máy ảnh, điện
        thoại di động'
    pretend_housekeeping_toy_type:
      name: Loại đồ chơi dọn phòng giả vờ
      description: Xác định loại đồ chơi giả vờ dọn dẹp nhà cửa, chẳng hạn như bộ
        dụng cụ lau chùi hoặc thiết bị nhà bếp
    primary_pcie_slot_version:
      name: Phiên bản khe PCIe chính
      description: Cho biết thế hệ PCI Express được hỗ trợ bởi khe x16 chính thường
        được sử dụng cho card đồ họa.
    primary_region:
      name: Vùng sơ cấp
      description: 'Chỉ định thị trường hoặc khu vực chính cho phần mềm hoặc dịch
        vụ đám mây, ví dụ: Bắc Mỹ, Châu Á-Thái Bình Dương'
    primer_use:
      name: Sử dụng sơn lót
      description: Chỉ định chức năng của lớp sơn lót, chẳng hạn như sơn nền hoặc
        chất bịt kín
    print_orientation:
      name: Hướng in
      description: Xác định mặt nào của vật liệu mà đồ họa được in trên.
    print_server_form_factor:
      name: Kiểu dáng máy chủ in
      description: 'Cho biết thiết kế vật lý của máy chủ in (ví dụ: hộp ngoài, thẻ
        nội bộ, USB dongle).'
    print_technology:
      name: Công nghệ in
      description: Chỉ định quy trình được sử dụng bởi máy in, chẳng hạn như máy in
        phun hoặc máy in laser
    printer/copier_specialized_features:
      name: Tính năng chuyên dụng của máy in/photocopy
      description: Nêu bật các tính năng cụ thể của máy in/máy photocopy, chẳng hạn
        như hỗ trợ in di động hoặc điều khiển bằng giọng nói
    printer_accessories_included:
      name: Phụ kiện máy in đi kèm
      description: Chi tiết các thành phần bổ sung đi kèm với máy in, máy photocopy
        hoặc fax; ví dụ như khay giấy, bộ nhiệt áp
    printer_color_capability:
      name: Khả năng màu của máy in
      description: Chỉ định thiết bị chỉ xuất đơn sắc hay hỗ trợ in và sao chép màu
        đầy đủ.
    printer_connection_interface:
      name: Giao diện kết nối máy in
      description: Xác định loại cổng mà máy chủ in sử dụng để kết nối với máy in.
    printer_form_factor:
      name: Kiểu dáng máy in
      description: Phân loại kiểu vật lý hoặc tính di động của thiết bị.
    printer_functions:
      name: Chức năng của máy in
      description: Xác định khả năng của máy in, máy photocopy và máy fax; ví dụ như
        quét, in ảnh
    printing_color:
      name: Màu in
      description: 'Xác định màu đầu ra của hộp mực và hộp mực in phun, ví dụ: đen,
        lục lam'
    printing_method:
      name: Phương pháp in
      description: Chỉ định quy trình in, chẳng hạn như in offset hoặc khắc
    privacy_filtering_direction:
      name: Hướng lọc riêng tư
      description: 'Chỉ ra hướng xem mà bộ lọc chặn khả năng hiển thị (ví dụ: hai
        chiều ngang, bốn chiều)'
    processor_cores:
      name: Lõi bộ xử lý
      description: Cho biết số lượng lõi trong bộ xử lý của máy tính, ví dụ như lõi
        kép
    processor_family:
      name: Dòng bộ xử lý
      description: Xác định dòng hoặc nhãn hiệu CPU của thiết bị điện tử, ví dụ Intel
        Core i7
    processor_socket:
      name: Ổ cắm bộ xử lý
      description: Chỉ định loại ổ cắm bộ xử lý tương thích trong thiết bị điện tử,
        chẳng hạn như LGA 1151 (ổ cắm H4) hoặc Ổ cắm AM4
    processor_technology:
      name: Công nghệ xử lý
      description: Xác định công nghệ xử lý, thường dành cho thiết bị âm thanh; ví
        dụ dựa trên phần mềm, ống/van
    product_benefits:
      name: Lợi ích của sản phẩm
      description: Mô tả những lợi ích mà sản phẩm mang lại, điển hình là về sức khỏe
        và làm đẹp; ví dụ như làm mịn, làm săn chắc
    product_certifications_standards:
      name: Chứng nhận & tiêu chuẩn sản phẩm
      description: Cho biết các chứng nhận hoặc tiêu chuẩn mà sản phẩm đáp ứng, chẳng
        hạn như hữu cơ hoặc không độc hại
    product_classification:
      name: Phân loại sản phẩm
      description: 'Phân loại kiểu vật liệu quý, tiền tệ hoặc mặt hàng có giá trị
        (ví dụ: tiền tệ, vàng thỏi, đá quý, thẻ quà tặng, NFT)'
    product_form:
      name: Hình thức sản phẩm
