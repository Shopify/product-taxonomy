    hardness:
      name: Độ cứng
      description: Cho biết độ cứng của sản phẩm, ví dụ như mềm, trung bình, cứng
    hardness_rating_pencil_scale:
      name: Xếp hạng độ cứng (thang đo bút chì)
      description: Cho biết độ cứng của kính cường lực dựa trên thang đo độ cứng bút
        chì.
    hardware_finish:
      name: Hoàn thiện phần cứng
      description: Mô tả cách xử lý bề mặt hoặc lớp phủ của phần cứng, như đồng thau
        hoặc chrome
    hardware_material:
      name: Vật liệu phần cứng
      description: Chỉ định thành phần của các phần cứng, chẳng hạn như kim loại hoặc
        thép không gỉ
    hardware_mounting_type:
      name: Loại giá đỡ phần cứng
      description: 'Xác định cách lắp đặt hoặc đặt một sản phẩm phần cứng, ví dụ:
        treo tường, không có giá đỡ'
    hardwood_lumber_grade:
      name: Phân loại gỗ cứng
      description: Phân loại chất lượng gỗ cứng, ví dụ loại 2A thông dụng
    harness_closure_type:
      name: Loại dây đóng
      description: Chỉ định kiểu đóng được sử dụng trong dây nịt, chẳng hạn như khóa
        nhả bên hoặc dây kéo
    harp_size:
      name: Kích cỡ đàn hạc
      description: Chỉ định loại kích thước của đàn hạc, ví dụ như cỡ nhỏ, concert
        grand
    hatch_suitable_location:
      name: Vị trí cửa sập phù hợp
      description: Xác định vị trí lý tưởng cho các cửa sập, chẳng hạn như sàn hoặc
        tường
    hazmat_suit_design:
      name: Thiết kế quần áo bảo hộ
      description: Mô tả kiểu dáng của quần áo bảo hộ chống các vật liệu nguy hiểm,
        chẳng hạn như áo liền quần hoặc kín hoàn toàn
    hdmi_version_supported:
      name: Phiên bản HDMI được hỗ trợ
      description: 'Xác định phiên bản thông số kỹ thuật HDMI cao nhất mà thiết bị
        hỗ trợ đầy đủ (ví dụ: HDMI 2.1 cho 4K @ 120 Hz).'
    hdr_format:
      name: Định dạng Hdr
      description: 'Chỉ định Dải động cao (HDR) cho TV, ví dụ: HDR10, Dolby Vision'
    headjoint_cut:
      name: Đường cắt khớp đầu
      description: Chỉ định vết cắt đầu khớp trong sáo, ví dụ như sóng, cắt Z
    headphone_cushion_shape:
      name: Hình dạng đệm tai nghe
      description: Mô tả đường viền vật lý của đệm để giúp khách hàng phù hợp với
        hình học tai nghe.
    headphone_driver_technology:
      name: Công nghệ driver tai nghe
      description: Xác định loại bộ chuyển đổi được sử dụng để tạo âm thanh trong
        tai nghe.
    headphone_jack_type:
      name: Loại giắc cắm tai nghe chụp tai
      description: Chỉ định loại kích thước giắc cắm tai nghe chụp tai, chẳng hạn
        như 3,5 mm, USB type-C
    headphone_style:
      name: Loại tai nghe chụp tai
      description: Xác định tai nghe thiết kế, ví dụ như tai nghe đeo sau cổ, tai
        nghe nhét tai
    headset_connection_type:
      name: Kiểu kết nối tai nghe
      description: Cho biết cổng giao tiếp khả dụng để kết nối tai nghe ngoài với
        điện thoại.
    headwear_features:
      name: Tính năng mũ nón
      description: Nêu bật các tính năng riêng của mũ nón, ví dụ như có thể thu gọn,
        đa năng
    hearing_aid_compatibility:
      name: Khả năng tương thích máy trợ thính
      description: Chỉ định điện thoại có đáp ứng các yêu cầu tương thích máy trợ
        thính (HAC) hay không và, nếu có, mức xếp hạng.
    hearing_aid_ear_side:
      name: Bên tai của máy trợ thính
      description: Xác định xem máy trợ thính được thiết kế cho tai trái, tai phải
        hay cả hai tai.
    hearing_aid_features:
      name: Tính năng trợ thính
      description: Nêu bật các đặc điểm đặc biệt của máy trợ thính, như pin sạc hoặc
        máy trợ thính kỹ thuật số.
    hearing_aid_material:
      name: Vật liệu trợ thính
      description: Xác định vật liệu chính được sử dụng để chế tạo máy trợ thính,
        chẳng hạn như nhựa hoặc silicone
    hearing_loss_level:
      name: Mức độ mất thính lực
      description: Xác định mức độ mất thính lực mà máy trợ thính được thiết kế để
        giải quyết.
    hearing_protection_class:
      name: Cấp bảo vệ thính giác
      description: Xác định cấp chứng nhận địa phương cho biết hiệu suất giảm âm theo
        tiêu chuẩn khu vực.
    heat_function:
      name: Chức năng của nhiệt
      description: Cho biết sản phẩm có tính năng sưởi ấm hay không, thường dành cho
        các sản phẩm chăm sóc cá nhân
    heat_level:
      name: Mức nhiệt
      description: Cho biết độ cay của các sản phẩm thực phẩm và đồ uống, chẳng hạn
        như cay nhẹ hoặc rất cay
    heat_settings:
      name: Cài đặt mức nhiệt
      description: 'Chỉ định các mức kiểm soát nhiệt độ của sản phẩm, ví dụ: thấp,
        trung bình, cao'
    heat_source:
      name: Nguồn nhiệt
      description: Chỉ định loại nguồn nhiệt trong miếng đệm sưởi ấm, ví dụ như có
        thể sử dụng trong lò vi sóng, gel nhiệt
    heat_therapy_type:
      name: Loại liệu pháp nhiệt
      description: Cho biết sản phẩm cung cấp nhiệt ẩm, nhiệt khô hay cả hai.
    heating_instructions:
      name: Hướng dẫn cấp nhiệt
      description: Chỉ định cách làm nóng sản phẩm đúng cách, ví dụ như lò nướng,
        mặt bếp
    heating_method:
      name: Phương pháp cấp nhiệt
      description: Chỉ định kỹ thuật được sử dụng để làm nóng, thường là cho máy hâm
        sữa cho trẻ em; ví dụ như hơi nước, tắm nước
    heating_pad_design:
      name: Thiết kế túi sưởi
      description: Xác định kiểu dáng vật lý hoặc hình dạng của túi sưởi.
    heating_pad_features:
      name: Tính năng túi sưởi
      description: Nêu bật các tính năng chức năng hoặc tiện lợi đặc biệt được tích
        hợp trong túi sưởi.
    heating_speed:
      name: Tốc độ gia nhiệt
      description: Cho biết tốc độ sản phẩm nóng lên, ví dụ nhanh, chậm
    heel_height_type:
      name: Loại chiều cao gót giày
      description: Xác định chiều cao của gót giày, chẳng hạn như bệt hoặc cao
    heel_shoe_type:
      name: Kiểu già caoy gót
      description: Xác định kiểu gót chân trên giày, chẳng hạn như gót đế hoặc gót
        nêm
    height_adjustment:
      name: Điều chỉnh chiều cao
      description: 'Chỉ định xem có thể thay đổi chiều cao của sản phẩm hay không,
        ví dụ: chiều cao cố định, chiều cao có thể điều chỉnh'
    helicobacter_pylori_detection_method:
      name: Phương pháp phát hiện helicobacter pylori
      description: Xác định nguyên lý sinh học hoặc phương pháp mà bộ kit sử dụng
        để phát hiện nhiễm trùng Helicobacter pylori.
    helmet_shade_design:
      name: Thiết kế độ bóng của mũ bảo hiểm
      description: Mô tả loại cơ chế tạo bóng trong mũ bảo hiểm hàn xì, như tự động
        làm tối hoặc tự động
    herbal_supplement_health_goal:
      name: Mục tiêu sức khỏe của thực phẩm bổ sung thảo dược
      description: 'Cho biết mục tiêu sức khỏe chính, hệ thống cơ thể hoặc khu vực
        sinh lý mà thực phẩm bổ sung thảo dược nhằm hỗ trợ (ví dụ: hỗ trợ miễn dịch,
        giảm căng thẳng, hỗ trợ gan và thải độc).'
    hitch_class:
      name: Loại móc
      description: Xác định khả năng kéo của xe, chẳng hạn như Loại I hoặc Loại II
    hitch_type:
      name: Loại móc kéo
      description: Chỉ định phương pháp lắp cho rơ-moóc xe đạp, chẳng hạn như gắn
        trên trục hoặc trụ yên
    hiv_test_generation:
      name: Thế hệ xét nghiệm HIV
      description: Cho biết thế hệ của xét nghiệm chẩn đoán HIV, phản ánh những cải
        thiện về độ nhạy và cửa sổ phát hiện.
    hockey_equipment_included:
      name: Bao gồm thiết bị khúc côn cầu
      description: Chỉ định các vật phẩm trong bộ thiết bị chơi bóng vợt, chẳng hạn
        như gậy bóng vợt hoặc miếng đệm vai
    hold_level:
      name: Mức độ giữ nếp
      description: Xác định độ mạnh của sản phẩm tạo mẫu tóc, ví dụ như nhẹ, mạnh
    hole_plating_type:
      name: Loại mạ lỗ
      description: Cho biết các lỗ của bo mạch không được mạ, mạ xuyên hoặc có thùng
        via, ảnh hưởng đến hàn và kết nối giữa các lớp.
    hook_design:
      name: Thiết kế móc
      description: Xác định thiết kế của móc, khóa và dây buộc, ví dụ như lò xo, hai
        đầu
    hook_grip_design:
      name: Thiết kế tay cầm móc
      description: Mô tả kiểu cầm của kim móc, chẳng hạn như chống trượt hoặc tiện
        dụng
    hook_size:
      name: Kích cỡ móc
      description: Xác định kích thước của kim móc, chẳng hạn như B, G hoặc I
    hook_type:
      name: Loại móc
      description: Xác định kiểu sào kéo thuyền, chẳng hạn như móc cố định hoặc dạng
        ống lồng
    hoop_shape:
      name: Hình vòng
      description: Mô tả hình dạng của một vật có dạng vòng, điển hình là lưới đánh
        cá; ví dụ như hình chữ D
    horse_category:
      name: Hạng mục ngựa
      description: Phân loại ngựa dựa trên kích thước và giống ngựa, ví dụ như ngựa
        con, tiêu chuẩn
    horse_grooming_accessories_included:
      name: Đi kèm phụ kiện chải lông ngựa
      description: Xác định các vật dụng bổ sung đi kèm với các sản phẩm chải lông
        cho ngựa, như lưỡi dao hoặc hộp đựng
    hose_material:
      name: Vật liệu ống
      description: Chỉ định loại vật liệu được sử dụng trong ống mềm, chẳng hạn như
        PVC hoặc nhôm
    host_interface:
      name: Giao diện máy chủ
      description: Chỉ định phương thức được sử dụng để kết nối với ổ đĩa cứng, chẳng
        hạn như Thunderbolt 3 hoặc SATA
    housing_color:
      name: Màu nhà ở
      description: Xác định màu sắc của vỏ ngoài của sản phẩm, như màu be hoặc trong
        suốt
    housing_material:
      name: Vật liệu nhà ở
      description: 'Chỉ định vật liệu được sử dụng ở lớp ngoài của sản phẩm, ví dụ:
        thép không gỉ, gỗ'
    housing_pattern:
      name: Mô hình nhà ở
      description: Mô tả thiết kế hoặc họa tiết bên ngoài của sản phẩm, như trừu tượng
        hoặc biểu tượng
    hub/switch_storage_options:
      name: Tùy chọn lưu trữ Hub/Switch
      description: Xác định khả năng lưu trữ của hub hoặc switch, như có thể xếp chồng
        hoặc không thể xếp chồng
    humidification_system:
      name: Hệ thống làm ẩm
      description: Mô tả loại tùy chọn làm ẩm được bao gồm hoặc được hỗ trợ bởi máy
        PAP.
    humidifier_design:
      name: Thiết kế máy tạo độ ẩm
      description: Mô tả kiểu của máy tạo độ ẩm, như loại có thể gắn liền hoặc di
        động
    humidity_control:
      name: Kiểm soát độ ẩm
      description: Cho biết khả năng điều chỉnh độ ẩm của sản phẩm, điển hình là đối
        với hộp giữ ẩm xì gà; ví dụ 0,65
    humidity_control_method:
      name: Phương pháp kiểm soát độ ẩm
      description: Cho biết cách thức điều chỉnh độ ẩm trong thiết bị, ví dụ như bán
        tự động, thủ công
    hunting/survival_knife_design:
      name: Thiết kế dao cắm trại
      description: Xác định thiết kế của một con dao cắm trại, chẳng hạn như mũi nhọn
        hoặc dao tanto
    hunting_blind_design:
      name: Thiết kế vải ngụy trang săn bắn
      description: 'Chỉ định kiểu thiết kế rèm săn, ví dụ: không có màn hình, nhìn
        xuyên qua một chiều'
    hvac_control_type:
      name: Loại điều khiển điều hoà không khí
      description: Xác định loại điều khiển HVAC, chẳng hạn như kỹ thuật số hoặc thủ
        công
    ice_pack_type:
      name: Loại túi đựng đá
      description: 'Chỉ định vật liệu hoặc công nghệ được sử dụng trong túi nước đá,
        ví dụ: túi gel, túi xốp'
    icon_type:
      name: Loại biểu tượng
      description: Chỉ định loại biểu tượng máy tính, chẳng hạn như thư mục hoặc truyền
        thông xã hội
    identity_verification_requirement:
      name: Yêu cầu xác minh danh tính
      description: Xác định xem có yêu cầu đăng ký thực danh hoặc xác minh danh tính
        eKYC trước khi có thể sử dụng SIM hoặc eSIM hay không.
    ignition_system:
      name: Hệ thống đánh lửa
      description: Xác định loại hệ thống đánh lửa trong máy phát điện, chẳng hạn
        như bằng tay hoặc điện tử
    illumination_technique:
      name: Kỹ thuật chiếu sáng
      description: Xác định phương pháp chiếu sáng được sử dụng trong kính hiển vi,
        chẳng hạn như trường sáng hoặc trường tối
    image_formats_supported:
      name: Định dạng hình ảnh được hỗ trợ
      description: Xác định loại tệp hình ảnh mà máy ảnh có thể tạo ra, chẳng hạn
        như JPEG hoặc RAW
    image_sensor_size:
      name: Kích thước cảm biến ảnh
      description: Cho biết kích thước của cảm biến hình ảnh trong máy ảnh, chẳng
        hạn như 1/1.7 hoặc khung hình đầy đủ
    immobilizer_type:
      name: Loại hệ thống khoá động
      description: 'Chỉ định loại thiết bị được sử dụng để ngăn chặn hành vi trộm
        xe, ví dụ: khóa lốp hoặc khóa vô lăng'
    incense_fragrance:
      name: Mùi khói thơm
      description: Xác định mùi hương của một sản phẩm nhang, chẳng hạn như hoa oải
        hương hoặc gỗ đàn hương
    incense_kit_items_included:
      name: Đi kèm bộ nhang
      description: Xác định các thành phần có trong bộ dụng cụ làm nhang, ví dụ như
        que tre, khuôn
    incense_type:
      name: Loại nhang
      description: Xác định hình dạng của nhang, chẳng hạn như hình nón hoặc que
    incontinence_aid_features:
      name: Tính năng sản phẩm dành cho tình trạng không tự chủ vệ sinh
      description: Mô tả các đặc điểm đặc biệt của dụng cụ hỗ trợ tình trạng không
        tự chủ vệ sinh, như chống rò rỉ hoặc không làm dị ứng
    incontinence_pad_type:
      name: Loại băng tiểu không tự chủ
      description: 'Xác định kiểu dáng hoặc hình thức cụ thể của băng (ví dụ: băng
        lót, băng bảo vệ, băng tăng cường).'
    inductance_tolerance:
      name: Dung sai điện cảm
      description: Xác định độ lệch phần trăm cho phép từ giá trị điện cảm danh nghĩa.
    industry_focus:
      name: Trọng tâm ngành
      description: Nêu bật các lĩnh vực mục tiêu của sản phẩm, chẳng hạn như giáo
        dục hoặc sản xuất
    infant_age_group:
      name: Nhóm tuổi sơ sinh
      description: Phân loại sản phẩm phù hợp với độ tuổi cụ thể của trẻ sơ sinh,
        ví dụ trẻ sơ sinh, 0-6 tháng
    inflation_method:
      name: Phương pháp bơm
      description: Xác định cách sản phẩm được bơm phồng, chẳng hạn như tự động hoặc
        thủy tĩnh
    ingredient_category:
      name: Danh mục nguyên liệu
      description: Phân loại các loại thành phần trong vitamin và chất bổ sung, ví
        dụ như chất xơ, thảo mộc
    ingredient_origin:
      name: Nguồn gốc thành phần
      description: Chỉ định nguồn nguyên liệu sản phẩm, ví dụ tự nhiên, tổng hợp
    ingredient_pathway:
      name: Quá trình tạo ra thành phần
      description: Chỉ ra liệu các thành phần nước hoa có được lấy tự nhiên thông
        qua quá trình tách vật lý khỏi sinh khối mà không thay đổi cấu trúc hóa học
        hay được tổng hợp bằng các phương pháp khác
    ingredients:
      name: Nguyên liệu
      description: Chỉ định các thành phần được sử dụng trong công thức của sản phẩm,
        ví dụ như oxit kẽm, lô hội
    ingress_protection_ip_rating:
      name: Chỉ số bảo vệ chống xâm nhập (IP)
      description: 'Cung cấp chỉ số chống nước/chống bụi IP chính thức mà vỏ thiết
        bị tuân thủ (ví dụ: IP68).'
    ink_application_technique:
      name: Kỹ thuật bôi mực
      description: Mô tả phương pháp sử dụng mực trong mỹ thuật và thủ công, chẳng
        hạn như in lụa
    ink_color:
      name: Màu mực
      description: Xác định màu mực, thường dùng cho văn phòng phẩm; ví dụ như đen,
