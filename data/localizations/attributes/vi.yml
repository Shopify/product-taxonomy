    instrument_part_material:
      name: Vật liệu bộ phận nhạc cụ
      description: Chỉ định loại vật liệu được sử dụng trong các bộ phận của nhạc
        cụ, chẳng hạn như gỗ mun hoặc mạ vàng
    instrument_pattern:
      name: Mẫu nhạc cụ
      description: Mô tả thiết kế trực quan hoặc họa tiết trên một nhạc cụ, chẳng
