    region_code:
      name: Mã vùng
      description: Chỉ định khu vực nơi phần mềm trò chơi điện tử được cấp phép sử
        dụng, chẳng hạn như Châu Á (AS) hoặc Toàn cầu (GL)
    release_mechanism:
      name: Cơ chế giải phóng
