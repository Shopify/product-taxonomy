    glucose_meter_features:
      name: Tính năng của máy đo đường huyết
      description: Mô tả các đặc điểm đặc biệt của máy đo đường huyết, như chức năng
        di động hoặc bộ nhớ
    glue_gun_features:
      name: Tính năng súng bắn keo
      description: Nêu bật các đặc điểm riêng của súng bắn keo, chẳng hạn như tính
        năng làm nóng nhanh hoặc an toàn
    glue_gun_operation:
      name: Vận hành súng bắn keo
      description: Xác định nguồn điện của súng bắn keo, chẳng hạn như có dây hoặc
