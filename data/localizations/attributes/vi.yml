      name: Phụ kiện lắp đặt đi kèm
      description: Xác định bất kỳ công cụ hoặc tài liệu hướng dẫn nào được đóng gói
        cùng với pin để hỗ trợ việc lắp đặt
    installation_tools_included:
      name: Bao gồm các công cụ cài đặt
      description: Liệt kê bất kỳ công cụ hoặc vật tư tiêu hao nào được đóng gói cùng
