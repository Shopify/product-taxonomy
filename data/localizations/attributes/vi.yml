    sinker_material:
      name: Vật liệu bồn rửa
      description: Chỉ định thành phần của chì câu cá, chẳng hạn như chì hoặc kẽm
    size:
      name: Kích cỡ
      description: Dùng để chỉ định kích thước của sản phẩm, chẳng hạn như 0-3 tháng
        hoặc Cực lớn (XL)
    skate_shape:
      name: Hình dạng miếng trượt
      description: Mô tả hình dạng vật lý của giày trượt được cung cấp trong gói hàng
    skateboarding_style:
      name: Phong cách trượt ván
