    keyboard_format:
      name: Định dạng bàn phím
      description: Xác định kích thước và bố cục của bàn phím, chẳng hạn như kích
        thước đầy đủ hoặc nhỏ gọn
    keyboard_key_type:
      name: Loại phím bàn phím
      description: Mô tả phản hồi hoặc cảm giác của các phím trên keyboard nhạc cụ,
        chẳng hạn như nặng hoặc nặng vừa phải
    keyboard_language:
