    keyboard_assembly_type:
      name: Loại lắp ráp bàn phím
      description: 'Xác định cụm vật lý được cung cấp (ví dụ: bàn phím độc lập, phần
        kê tay đi kèm bàn phím, bộ phím riêng lẻ)'
    keyboard_backlight_type:
      name: Loại đèn nền bàn phím
      description: Trình bày chi tiết công nghệ chiếu sáng hoặc phong cách được sử
