        kèn phổ thông hoặc kèn oboe an-tô
    compatible_operating_system:
      name: Hệ điều hành tương thích
      description: 'Xác định khả năng tương thích phần mềm của sản phẩm, ví dụ: Windows,
        macOS'
    compatible_orchestral_string_instrument:
      name: Nhạc cụ dây trong dàn nhạc tương thích
      description: Xác định loại nhạc cụ dây cụ thể mà sản phẩm được thiết kế, chẳng
        hạn như violin hoặc cello
    compatible_paper_size:
      name: Kích thước giấy tương thích
      description: Chỉ định cỡ giấy mà thiết bị hỗ trợ, thường dành cho máy in; ví
        dụ A4, bưu thiếp
    compatible_patient_profile:
      name: Bệnh án tương thích
      description: Xác định nhóm bệnh nhân phù hợp cho một sản phẩm y tế, chẳng hạn
        như trẻ em hoặc cao tuổi
    compatible_percussion_instrument:
      name: Nhạc cụ gõ tương thích
      description: Xác định loại nhạc cụ gõ có thể sử dụng cùng với sản phẩm, chẳng
        hạn như trống hoặc bongo
    compatible_pinball_machine_edition:
      name: Phiên bản máy pinball tương thích
      description: 'Xác định phiên bản hoặc cấp độ trang trí nào của máy pinball mà
        phụ kiện phù hợp (ví dụ: Pro, Premium, LE).'
    compatible_play_vehicle_type:
      name: Loại xe đồ chơi tương thích
      description: Xác định loại xe đồ chơi mà sản phẩm phù hợp, chẳng hạn như ô tô
        hoặc thuyền
    compatible_player:
      name: Trình phát tương thích
      description: 'Xác định các thiết bị có thể được sử dụng với bộ chuyển đổi băng
        cassette, ví dụ: iPad, máy tính xách tay'
    compatible_polish_thinner_type:
      name: Loại chất làm loãng sơn móng tay tương thích
      description: Cho biết hệ thống phủ móng mà chất làm loãng được thiết kế để hoạt
        động cùng.
    compatible_power_supply_form_factor:
      name: Hệ số hình thức cấp điện tương thích
      description: Chỉ định kích thước hoặc tiêu chuẩn của bộ cấp điện (PSU) mà vỏ
        máy được thiết kế để chứa
    compatible_printer:
      name: Máy in tương thích
      description: Xác định loại máy in mà sản phẩm tương thích, chẳng hạn như máy
        in laser hoặc máy in phun
    compatible_processor_series:
      name: Dòng bộ xử lý tương thích
      description: Chỉ định dòng bộ xử lý mà sản phẩm tương thích, chẳng hạn như AMD
        Ryzen hoặc Intel core solo
    compatible_programming_languages:
      name: Ngôn ngữ lập trình tương thích
      description: Xác định các ngôn ngữ lập trình mà một sản phẩm phần mềm có thể
        hỗ trợ, như Python hoặc Java
    compatible_recipes:
      name: Công thức phù hợp
      description: Chỉ định các công thức phù hợp với sản phẩm, điển hình là dành
        cho các nhà sản xuất kem; ví dụ như kem, gelato
    compatible_resin_type:
      name: Loại nhựa tương thích
      description: Chỉ định các loại nhựa UV mà máy in SLA/MSLA có thể sử dụng.
    compatible_resolution:
      name: Độ phân giải tương thích
      description: 'Xác định độ phân giải màn hình được hỗ trợ, ví dụ: 1080p, full
        HD'
    compatible_satellite_radio_service:
      name: Dịch vụ radio vệ tinh tương thích
      description: Xác định dịch vụ radio vệ tinh mà bộ thu được thiết kế để hoạt
        động, đảm bảo khả năng tương thích với các thuê bao hiện có hoặc dự định.
    compatible_seat_type:
      name: Loại ghế tương thích
      description: Chỉ định loại ghế ngồi ô tô dành cho trẻ em mà sản phẩm phù hợp,
        chẳng hạn như ghế ngồi ô tô cho trẻ sơ sinh hoặc ghếp gấp gọn
    compatible_shoe_size:
      name: Cỡ giày tương thích
      description: 'Chỉ định sản phẩm phù hợp với các cỡ giày cụ thể, ví dụ: 12, 42'
    compatible_software_platform:
      name: Nền tảng phần mềm tương thích
      description: Xác định các nền tảng phần mềm mà sản phẩm tương thích, chẳng hạn
        như Adobe Creative hoặc Canva
    compatible_special_effects_device:
      name: Thiết bị hiệu ứng đặc biệt tương thích
      description: Xác định các thiết bị hiệu ứng đặc biệt mà sản phẩm có thể tương
        thích, như đèn LED hoặc máy tạo khói
    compatible_stove_top_type:
      name: Loại mặt bếp tương thích
      description: Xác định loại bếp mà sản phẩm có thể sử dụng được, chẳng hạn như
        bếp gas hoặc bếp từ
    compatible_string_instrument:
      name: Nhạc cụ dây tương thích
      description: Xác định loại nhạc cụ mà sản phẩm được thiết kế, chẳng hạn như
        đàn ukulele hoặc guitar bass
    compatible_stroller_type:
      name: Loại xe đẩy tương thích
      description: Chỉ định loại xe đẩy mà sản phẩm phù hợp, như ô hoặc xe chạy bộ
    compatible_vacuum_type:
      name: Loại máy hút bụi tương thích
      description: Chỉ định loại máy hút bụi mà sản phẩm tương thích, chẳng hạn như
        máy hút bụi cầm tay hoặc máy hút hơi nước
    compatible_vehicle:
      name: Xe tương thích
      description: Chỉ định loại phương tiện mà sản phẩm được thiết kế, chẳng hạn
        như ô tô hoặc SUV
    compatible_voice_assistant:
      name: Trợ lý giọng nói tương thích
      description: Xác định các nền tảng điều khiển bằng giọng nói có thể vận hành
        bộ thu.
    compatible_walking_aid_equipment:
      name: Thiết bị hỗ trợ đi bộ tương thích
      description: Chỉ định các thiết bị hỗ trợ đi lại mà sản phẩm được thiết kế,
        ví dụ như nạng, khung tập đi
    compatible_wax_container_size:
      name: Kích thước hộp sáp tương thích
      description: Liệt kê các kích thước hộp, lon hoặc lọ tiêu chuẩn có thể đặt trực
        tiếp vào máy hâm nóng mà không cần rót ra.
    compatible_wax_form:
      name: Dạng sáp tương thích
      description: Xác định các dạng sáp tẩy lông mà máy hâm nóng được thiết kế để
        làm tan chảy.
    compatible_weight_lifting_accessory:
      name: Phụ kiện nâng tạ tương thích
      description: Chỉ định thiết bị nâng tạ mà sản phẩm tương thích, chẳng hạn như
        thanh tạ hoặc tạ đôi
    compliance_certifications:
      name: Chứng nhận tuân thủ
      description: Chỉ định các chứng nhận tuân thủ của sản phẩm, chẳng hạn như HIPAA
        hoặc FedRAMP
    component_mounting_style:
      name: Kiểu lắp linh kiện
      description: Xác định phương pháp chính mà linh kiện điện tử hoặc bo mạch được
        gắn vào bo mạch, bảng điều khiển, khung gầm hoặc ray.
    component_output_type:
      name: Loại đầu ra thành phần
      description: Chỉ định loại tín hiệu đầu ra của các linh kiện điện tử, chẳng
        hạn như UART hoặc analog
    component_package_type:
      name: Loại bao bì tương thích
      description: 'Xác định dạng thức hoặc cách đóng gói của các linh kiện điện tử,
        ví dụ: SDM (Thiết bị gắn trên bề mặt), DIP (Gói nội tuyến kép)'
    component_size_code:
      name: Mã kích thước linh kiện
      description: 'Chỉ định chỉ định kích thước SMD hoặc through-hole tiêu chuẩn
        (ví dụ: 0603, 0805) được sử dụng cho gói tụ điện.'
    component_tolerance:
      name: Dung sai linh kiện
      description: Xác định độ lệch cho phép từ giá trị danh nghĩa (điện trở, điện
        dung, điện cảm, tần số, v.v.) được biểu thị bằng phần trăm.
    components_included:
      name: Linh kiện đi kèm
      description: Liệt kê những linh kiện trang thiết bị được cung cấp trong bộ khởi
        động
    compression_circuit_type:
      name: Loại mạch nén
      description: 'Mô tả công nghệ giảm khuếch đại cơ bản (ví dụ: VCA, FET, quang
        học) định hình âm thanh và phản hồi của bộ xử lý.'
    compression_format:
      name: Định dạng nén
      description: Xác định kiểu nén tệp video được sử dụng, ví dụ MPEG-4, AVI
    compression_level:
      name: Mức độ nén
      description: Cho biết cường độ áp suất trong các sản phẩm nén, ví dụ nhẹ, chắc
        chắn
    computer_accessories_included:
      name: Phụ kiện máy tính đi kèm
      description: Xác định các phụ kiện máy tính bổ sung đi kèm, chẳng hạn như chuột
        hoặc túi đựng máy tính xách tay
    computer_form:
      name: Dạng máy tính
      description: Xác định thiết kế hoặc bố cục vật lý của máy tính, chẳng hạn như
        máy tính tất cả trong một hoặc máy tính xách tay
    computer_server_features:
      name: Tính năng máy chủ máy tính
      description: Mô tả các tính năng đặc biệt của máy chủ, chẳng hạn như nguồn điện
        dự phòng hoặc hỗ trợ ảo hóa
    computer_specialized_features:
      name: Tính năng chuyên dụng của máy tính
      description: Nêu bật các tính năng cụ thể của máy tính, như hệ thống làm mát
        bằng chất lỏng hoặc hệ thống chiếu sáng RGB
    concertina_button_configuration:
      name: Cấu hình nút Concertina
      description: Chỉ định số lượng và cách bố trí các nút trên đàn concertina, chẳng
        hạn như đàn concertina 20 nút
    condition:
      name: Điều kiện
      description: Mô tả trạng thái hoặc chất lượng của sản phẩm, ví dụ như bạc hà
        (M), kém (P)
    conditioner_effect:
      name: Tác dụng của dầu xả
      description: Xác định lợi ích của dầu dưỡng tóc, chẳng hạn như làm mượt tóc
        hoặc chống gàu
    condom_compatibility:
      name: Khả năng tương thích bao cao su
      description: Xác định vật liệu bao cao su nào an toàn để sử dụng với chất bôi
        trơn.
    condom_fit_type:
      name: Loại vừa vặn bao cao su
      description: Mô tả kích cỡ tổng thể hoặc đường viền giải phẫu được thiết kế
        để cải thiện sự thoải mái và cảm giác.
    condom_type:
      name: Loại bao cao su
      description: Phân biệt bao cao su dành cho nam hay nữ
    conductivity_gel_application:
      name: Ứng dụng gel dẫn điện
      description: Xác định thủ thuật y tế hoặc chẩn đoán mà gel hoặc kem dưỡng dẫn
        điện được dự định sử dụng.
    conductor_core_type:
      name: Loại lõi dây dẫn
      description: Cho biết dây dẫn bên trong là dây bện hay lõi đặc.
    connecting_thread:
      name: Chuỗi kết nối
      description: 'Chỉ định loại ren để nối các bộ phận ống nước, ví dụ: IPS 1/2
        inch'
    connection_method:
      name: Phương thức kết nối
      description: Chỉ định loại kết nối mà sản phẩm sử dụng, chẳng hạn như không
        dây hoặc có dây
    connection_type:
      name: Loại kết nối
      description: Chỉ định loại kết nối được sử dụng bởi thiết bị điện tử, chẳng
        hạn như có dây hoặc Bluetooth
    connectivity_technology:
      name: Công nghệ kết nối
      description: 'Xác định phương thức truyền dữ liệu trong sản phẩm, ví dụ: Bluetooth,
        USB'
    connectivity_type:
      name: Loại kết nối
      description: Làm rõ bo mạch không cần hàn (kiểu breadboard) hay được thiết kế
        để hàn.
    connector_1_type:
      name: Loại đầu nối 1
      description: Chỉ định đầu nối hoặc giao diện có ở đầu thứ nhất (Đầu A) của bộ
        điều hợp hoặc bộ ghép nối
    connector_2_type:
      name: Loại đầu nối 2
      description: Chỉ định đầu nối hoặc giao diện có ở đầu thứ hai (Đầu A) của bộ
        điều hợp hoặc bộ ghép nối
    connector_contact_plating:
      name: Lớp mạ tiếp điểm đầu nối
      description: Chỉ định lớp mạ hoặc lớp phủ bề mặt được áp dụng cho các tiếp điểm
        điện để cải thiện độ dẫn điện và khả năng chống ăn mòn
    connector_design:
      name: Thiết kế đầu nối
      description: Xác định thiết kế của các mắt xích, chẳng hạn như đầu mở hoặc đầu
        móc
    connector_gender:
      name: Giới tính đầu nối
      description: 'Chỉ định giới tính của các đầu nối trong thiết bị điện tử, ví
        dụ: đực, đực đến cái'
    connector_mounting_style:
      name: Kiểu lắp đầu nối
      description: 'Chỉ ra cách đầu nối được gắn hoặc tích hợp cơ học trong một cụm
        lắp ráp (ví dụ: PCB, bảng điều khiển, khung máy, cáp, bộ ghép nối)'
    connector_orientation:
      name: Hướng đầu nối
      description: 'Mô tả hướng vật lý của giao diện ghép nối so với bề mặt lắp hoặc
        cáp (ví dụ: thẳng, góc vuông, thẳng đứng)'
    connector_position:
      name: Vị trí đầu nối
      description: 'Mô tả vị trí của đầu nối video khi màn hình được xem từ phía trước
        (ví dụ: góc dưới bên phải, góc trên bên trái)'
    connector_type:
      name: Loại đầu nối
      description: Chỉ định kiểu hoặc tiêu chuẩn của đầu nối có trên các đầu của dây
        jumper.
    console_accessories_included:
      name: Phụ kiện máy console được bao gồm
      description: 'Liệt kê các phụ kiện hoặc thành phần chính được đóng gói với console
        (ví dụ: tay cầm, cáp, đế, game).'
    console_system:
      name: Hệ thống điều khiển
      description: Xác định thương hiệu cụ thể của máy chơi trò chơi điện tử, chẳng
        hạn như Atari 2600 hoặc Playstation
    console_type:
      name: Loại console
      description: Phân loại hệ số hình dạng vật lý và môi trường sử dụng dự định
        của console.
    constitutive_ingredients:
      name: Thành phần cấu tạo
      description: 'Chỉ định các thành phần chính được sử dụng trong công thức sản
        phẩm, ví dụ: sáp ong, dầu tầm xuân'
    construction:
      name: Xây dựng
      description: 'Chỉ ra phương pháp hoặc kỹ thuật chế tác kim loại được sử dụng
        trong sản xuất đồ trang sức (ví dụ: mạ, mạ vàng, mạ đầy, đặc)'
    construction_set_theme:
      name: Chủ đề bộ xây dựng
      description: Xác định chủ đề của một bộ đồ chơi lắp ráp, chẳng hạn như cướp
        biển hoặc động vật
    contact_lens_case_accessories_included:
      name: Phụ kiện hộp kính áp tròng đi kèm
      description: Liệt kê các vật dụng bổ sung được đóng gói cùng với hộp kính áp
        tròng.
    contact_lens_case_features:
      name: Tính năng hộp kính áp tròng
      description: Nêu bật các tính năng chức năng đáng chú ý hoặc các bao gồm của
        hộp.
    contact_lens_material:
      name: Vật liệu kính áp tròng
      description: 'Xác định công thức polymer hoặc họ vật liệu (ví dụ: hydrogel,
        silicone hydrogel) mà kính được làm từ đó.'
    contact_material:
      name: Vật liệu tiếp điểm
      description: Xác định kim loại hoặc lớp mạ được sử dụng cho các điểm tiếp xúc
        của pin bên trong giá đỡ
    contrast:
      name: Độ tương phản
      description: Được sử dụng để chỉ định mức độ tương phản trong phim máy ảnh,
        ví dụ như bình thường hoặc cao
    contrast_ratio_typical:
      name: Tỷ lệ tương phản (Điển hình)
      description: Cho biết tỷ lệ tương phản của màn hình, ví dụ 3000:1
    control_functions:
      name: Chức năng điều khiển
      description: Chỉ định khả năng điều khiển của các công tắc chân của bộ khuếch
        đại, chẳng hạn như chuyển kênh
    control_interface:
      name: Giao diện điều khiển
      description: 'Xác định cách thiết bị có thể được cấu hình hoặc điều khiển (ví
        dụ: phần mềm PC, ứng dụng di động, LCD trên thiết bị, điều khiển từ xa).'
    control_method:
      name: Phương pháp điều khiển
      description: Mô tả kỹ thuật điều khiển các thành phần tự động hóa, như mô-men
        xoắn trực tiếp hoặc vô hướng (V/f)
    control_solution_level:
      name: Mức độ dung dịch kiểm soát
      description: Cho biết mức nồng độ glucose của dung dịch kiểm soát.
    control_technology:
      name: Công nghệ điều khiển
      description: Chỉ định phương pháp hoạt động, thường cho trang trí cửa sổ; ví
        dụ bằng tay, có động cơ
