    intended_surface:
      name: Bề mặt dự định
      description: Xác định bề mặt chính mà miếng lót được thiết kế để bảo vệ.
    intercom_communication_type:
      name: Loại giao tiếp intercom
      description: Phân loại định dạng giao tiếp cơ bản mà thiết bị hỗ trợ.
    intercom_wiring_type:
