        như phát lại MP3 hoặc điều khiển bằng giọng nói
    audio_purpose:
      name: Mục đích của âm thanh
      description: Chỉ định mục đích sử dụng hoặc vị trí cho các sản phẩm âm thanh,
        chẳng hạn như âm thanh trong xe hoặc rạp chiếu phim tại nhà
    audio_return_channel_support:
      name: Hỗ trợ kênh trả về âm thanh
