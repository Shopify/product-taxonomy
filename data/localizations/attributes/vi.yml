    data_network:
      name: Mạng dữ liệu
      description: Chỉ định khả năng tương thích mạng dữ liệu của thiết bị di động,
        như LTE hoặc 3G
    data_network_generation:
      name: Thế hệ mạng dữ liệu
      description: 'Cho biết công nghệ mạng di động cao nhất mà thẻ trả trước hoặc
        SIM hỗ trợ (ví dụ: 3G, 4G LTE, 5G).'
    data_rollover_policy:
      name: Chính sách chuyển dữ liệu
      description: Cho biết liệu dữ liệu tốc độ cao chưa sử dụng có được chuyển sang
        kỳ tiếp theo không hay sẽ hết hạn.
    decoder/encoder_function:
      name: Chức năng bộ giải mã/mã hóa
      description: Chỉ định chức năng logic được thực hiện bởi IC.
    decoration_material:
      name: Vật liệu trang trí
      description: Xác định vật liệu được sử dụng để trang trí, chẳng hạn như sequin
        hoặc lông vũ
    decorative_stamp_design:
      name: Thiết kế tem trang trí
      description: Mô tả thiết kế trên tem trang trí, chẳng hạn như truyện cổ tích
        hoặc phục cổ/cổ điển
    denomination:
      name: Mệnh giá
      description: Xác định mệnh giá của các đồ sưu tầm như tiền xu và tem, ví dụ
        1.000 đô la, 1 xu
    dental_appliance_compatibility:
      name: Khả năng tương thích dụng cụ nha khoa
      description: 'Xác định dụng cụ nha khoa hoặc công việc phục hồi nào mà bọt an
        toàn hoặc dự định sử dụng (ví dụ: máy chỉnh nha, niềng răng, veneer).'
    dental_floss_format:
      name: Định dạng chỉ nha khoa
      description: Xác định định dạng sản phẩm tổng thể hoặc kiểu phân phối của chỉ
        nha khoa.
    dental_floss_shape:
      name: Hình chỉ nha khoa
      description: Xác định hình dạng hoặc kiểu chỉ nha khoa, chẳng hạn như băng hoặc
        ruy băng
    dental_floss_thickness_level:
      name: Mức độ dày chỉ nha khoa
      description: Phân biệt chỉ nha khoa dựa trên độ dày, chẳng hạn như mỏng hoặc
        thường
    dental_floss_type:
      name: Loại chỉ nha khoa
      description: Xác định loại chỉ nha khoa, chẳng hạn như không có sáp hoặc có
        sáp
    dental_mouthgard_recommended_use:
      name: Máng bảo vệ miệng khuyên dùng
      description: Xác định mục đích của dụng cụ bảo vệ miệng, ví dụ như giảm ngáy,
        bảo vệ chỉnh nha
    dental_mouthguard_arch_coverage:
      name: Phạm vi cung răng của bảo vệ miệng
      description: Xác định cung răng nào mà bảo vệ miệng được thiết kế để che phủ.
    dental_mouthguard_certifications:
      name: Chứng nhận bảo vệ miệng nha khoa
      description: Cho biết các chứng nhận về an toàn và chất lượng của máng bảo vệ
        răng, chẳng hạn như không chứa BPA hoặc được chứng nhận CE
    dental_paste_flavor:
      name: Hương kem đánh răng
      description: Xác định hương vị của miếng dán răng, ví dụ, không có hương vị
        hoặc kẹo cao su
    dental_repair_kit_certifications:
      name: Chứng nhận bộ dụng cụ sửa răng
      description: Xác định các chứng nhận mà bộ dụng cụ sửa chữa nha khoa có, chẳng
        hạn như được FDA phê chuẩn hoặc không chứa BPA
    dental_water_jet_operation:
      name: Vận hành tia nước nha khoa
      description: Chỉ định nguồn điện cho tia nước nha khoa, chẳng hạn như có dây
        hoặc không dây
    dentistry_items_included:
      name: Các mặt hàng nha khoa đi kèm
      description: Xác định các dụng cụ nha khoa có trong bộ sản phẩm, như gương soi
        răng hoặc dụng cụ lấy cao răng
    denture_arch_coverage:
      name: Phạm vi cung răng giả
      description: Xác định cung răng nào mà răng giả (hoặc veneer gắn) được dự định
        che phủ.
    denture_base_color:
      name: Màu hàm giả
      description: Xác định màu sắc của kẹo cao su nhân tạo trong răng giả, chẳng
        hạn như kẹo cao su màu hồng hoặc tự nhiên
    denture_coverage:
      name: Bảo hiểm răng giả
      description: Xác định mức độ bao phủ răng giả, chẳng hạn như toàn bộ hoặc một
        phần
    denture_design:
      name: Thiết kế răng giả
      description: Mô tả loại hàm giả, ví dụ như linh hoạt, ngay lập tức
    denture_retention_mechanism:
      name: Cơ chế giữ răng giả
      description: Xác định cách răng giả giữ nguyên vị trí trên răng hoặc nướu.
    denture_teeth_color:
      name: Màu răng giả
      description: Chỉ định màu sắc của răng giả, chẳng hạn như màu trắng nhạt hoặc
        vàng nhạt
    deployment_type:
      name: Loại triển khai
      description: Mô tả cách triển khai phần mềm AI, chẳng hạn như phần mềm kết hợp
        hoặc dựa trên đám mây
    desk_organizer_features:
      name: Tính năng sắp xếp bàn làm việc
      description: Mô tả các tính năng cụ thể của kệ tủ để bàn, chẳng hạn như các
        ngăn có thể điều chỉnh hoặc các ngăn tích hợp
    desk_size:
      name: Kích thước bàn
      description: Cho biết loại kích thước của bàn làm việc, chẳng hạn như nhỏ (S)
        hoặc lớn (L)
    detailed_ingredients:
      name: Thành phần chi tiết
      description: Liệt kê các thành phần cụ thể được sử dụng trong sức khỏe và làm
        đẹp, ví dụ Vitamin C, men vi sinh
    detectable_drugs:
      name: Thuốc có thể phát hiện
      description: Chỉ định các loại ma túy mà xét nghiệm có thể xác định, ví dụ cần
        sa, thuốc phiện
    detection_technology:
      name: Công nghệ phát hiện
      description: 'Xác định nguyên lý khoa học hoặc dấu hiệu sinh học mà xét nghiệm
        HIV phát hiện (ví dụ: kháng thể, combo kháng nguyên/kháng thể, RNA PCR).'
    detector_operation_mode:
      name: Chế độ hoạt động của máy dò
      description: Mô tả cách thức hoạt động của bộ phát hiện an toàn, chẳng hạn như
        được kết nối với nhau hoặc độc lập
    detector_sensitivity:
      name: Độ nhạy của máy dò
      description: Mô tả khả năng điều chỉnh độ nhạy của máy dò kim loại, chẳng hạn
        như có thể điều chỉnh hoặc cố định
    detector_type:
      name: Loại máy dò
      description: Chỉ định phương pháp phát hiện được sử dụng trong các thiết bị
        an toàn, ví dụ như quang học ion hóa, lấy mẫu không khí
    developer_strength:
      name: Độ mạnh chất oxy hóa
      description: Xác định nồng độ peroxide hoặc thể tích của chất oxy hóa hoặc bộ
        kit để phù hợp với mức độ nâng tông mong muốn.
    developmental_features:
      name: Tính năng phát triển
      description: Nêu bật những lợi ích phát triển của sản phẩm, chẳng hạn như phát
        triển ngôn ngữ hoặc phát triển cảm xúc & xã hội
    device_interface:
      name: Giao diện thiết bị
      description: Chỉ định phương thức kết nối giữa các thiết bị điện tử, ví dụ như
        HDMI, USB
    device_technology:
      name: Công nghệ của thiết bị
      description: Mô tả loại công nghệ trong các dụng cụ phần cứng, chẳng hạn như
        kỹ thuật số hoặc analog
    dexterity_skills:
      name: Kỹ năng khéo tay
      description: Xác định các kỹ năng khéo léo cụ thể cần thiết cho trò chơi, như
        giữ thăng bằng hoặc độ chính xác
    dial_color:
      name: Màu mặt số
      description: Chỉ định màu của mặt số hoặc mặt đồng hồ, chẳng hạn như màu vàng
        hoặc nhiều màu
    dial_pattern:
      name: Kiểu quay số
      description: Mô tả thiết kế hoặc họa tiết trên mặt đồng hồ, chẳng hạn như dấu
        chấm hoặc kiểu nhuộm màu
    dialing_method:
      name: Cách thức quay số
      description: Xác định cơ chế mà điện thoại sử dụng để nhập số.
    diaper_bag_additional_features:
      name: Tính năng bổ sung của túi đựng bỉm sữa
      description: Chỉ định các tính năng bổ sung trong túi tã, ví dụ như bao gồm
        miếng lót thay tã, giá đỡ bình sữa
    diaper_bag_material:
      name: Vật liệu túi đựng bỉm sữa
      description: Chỉ định loại chất liệu dùng để làm túi đựng tã bỉm, chẳng hạn
        như da hoặc vải
    diaper_bag_style:
      name: Kiểu dáng túi đựng bỉm sữa
      description: Mô tả thiết kế hoặc hình thức của túi tã, chẳng hạn như ba lô hoặc
        túi đeo chéo
    diaper_features:
      name: Tính năng tã
      description: Mô tả các đặc tính đặc biệt của tã, chẳng hạn như chống rò rỉ hoặc
        không gây dị ứng
    diaper_kit_components:
      name: Thành phần bộ tã
      description: Chỉ định các vật dụng đi kèm trong bộ tã, chẳng hạn như khăn ướt
        hoặc đệm thay tã
    diaper_organizer_features:
      name: Tính năng sắp xếp tã
      description: Nêu bật các tính năng riêng của túi đựng tã, chẳng hạn như nhiều
        ngăn hoặc lớp lót chống thấm nước
    diaper_size:
      name: Cỡ tã
      description: Chỉ định kích thước của tã, chẳng hạn như trẻ sơ sinh hoặc trẻ
        mới biết đi
    diaper_type:
      name: Loại tã
      description: Phân biệt giữa các sản phẩm hỗ trợ tình trạng không tự chủ vệ sinh,
        chẳng hạn như miếng lót, tã quần hoặc bỉm
    dice_shape:
      name: Hình dáng xúc xắc
      description: Mô tả dạng hình học của xúc xắc, như khối lập phương (6 mặt) hoặc
        khối 20 mặt (20 mặt)
    dielectric_type:
      name: Loại điện môi
      description: Chỉ định vật liệu điện môi hoặc cách điện được sử dụng trong tụ
        điện, chẳng hạn như gốm hoặc điện phân
    dietary_preferences:
      name: Sở thích chế độ ăn uống
      description: Giúp xác định các sản phẩm phù hợp với chế độ ăn kiêng cụ thể,
        ví dụ như thuần chay, không có hạt
    dietary_supplements:
      name: Thực phẩm chức năng
      description: Xác định các chất dinh dưỡng bổ sung trong sản phẩm, như canxi
        hoặc men vi sinh
    dietary_use:
      name: Sử dụng chế độ ăn uống
      description: 'Phân loại sản phẩm dựa trên lợi ích của chế độ ăn kiêng, ví dụ:
        phát triển cơ bắp, ít carb'
    difficulty_level:
      name: Cấp độ khó
      description: Cho biết mức độ phức tạp hoặc thử thách của một câu đố hoặc trò
        chơi, chẳng hạn như dễ hoặc chuyên gia
    diffuser_design:
      name: Thiết kế máy khuếch tán
      description: Mô tả cấu trúc của dụng cụ tản sáng flash, chẳng hạn như vòng hoặc
        vòm
    digestive_supplement_type:
      name: Loại thực phẩm bổ sung tiêu hóa
      description: 'Phân loại loại thực phẩm bổ sung tiêu hóa cụ thể (ví dụ: probiotic,
        enzyme, chất xơ).'
    digital_sound_processing:
      name: Xử lý âm thanh kỹ thuật số
      description: Chỉ định các kỹ thuật sửa đổi âm thanh trong các thành phần âm
        thanh, chẳng hạn như độ trễ hoặc hiệu ứng vang
    digitizer_surface_finish:
      name: Hoàn thiện bề mặt bộ số hóa
      description: Mô tả lớp phủ bề mặt hoặc lớp hoàn thiện của bộ số hóa
    din_size:
      name: Kích thước DIN
      description: 'Xác định kích thước lỗ mở bảng điều khiển tiêu chuẩn mà bộ thu
        phù hợp (ví dụ: Single DIN, Double DIN).'
    dinnerware_pieces_included:
      name: Bao gồm bộ dụng cụ ăn
      description: Xác định các thành phần của bộ đồ dùng ăn tối, chẳng hạn như đĩa
        ăn tối hoặc bát phục vụ
    direct_box_type:
      name: Loại hộp trực tiếp
      description: Chỉ định cấu hình mạch của hộp trực tiếp (DI), ảnh hưởng đến yêu
        cầu nguồn điện, đặc tính âm thanh và ứng dụng dự định.
    direction_detection_capability:
      name: Khả năng phát hiện hướng
      description: 'Cho biết radar có thể báo cáo hướng đối tượng hay không (ví dụ:
        đang tiến lại, đang rời đi hoặc cả hai).'
    dirt_separating_method:
      name: Phương pháp tách bụi bẩn
      description: Mô tả kỹ thuật chân không sử dụng để tách bụi bẩn, ví dụ như lốc
        xoáy, lọc
    discharge_type:
      name: Lưu lượng xả
      description: Chỉ định kiểu dỡ hàng của xe ben, chẳng hạn như đổ bên hoặc chuyển
        hàng
    disk_format_type:
      name: Loại định dạng đĩa
      description: Xác định loại định dạng đĩa cho các sản phẩm phần mềm, như Blu-ray
        hoặc CD
    dispenser_type:
      name: Loại thiết bị phân phối
      description: Chỉ định định dạng phân phối sản phẩm, điển hình là về sức khỏe
        và làm đẹp; ví dụ như thanh, lọ
    dispensing_operation_type:
      name: Loại hoạt động phân phối
      description: Mô tả việc kem đánh răng được phân phối thủ công, bán tự động hay
        tự động.
    display_board_features:
      name: Tính năng màn hình hiển thị
      description: Mô tả các tính năng riêng của bảng hiển thị, chẳng hạn như mặt
        sau tự dính hoặc chắc chắn
    display_color_mode:
      name: Chế độ hiển thị màu
      description: 'Chỉ định màu hiển thị của sản phẩm, ví dụ: màu, đen trắng'
    display_features:
      name: Tính năng hiển thị
      description: Mô tả loại màn hình trên sản phẩm, chẳng hạn như màn hình cảm ứng
        hoặc nút điều khiển
    display_interface:
      name: Giao diện hiển thị
      description: Chỉ định giao diện video hoặc dữ liệu được mô-đun màn hình sử dụng
    display_mode:
      name: Chế độ hiển thị
      description: Mô tả phương pháp hiển thị cho một sản phẩm, chẳng hạn như kỹ thuật
        số hoặc analog
    display_recommended_use:
      name: Hiển thị khuyến nghị sử dụng
      description: Đề xuất cách sử dụng lý tưởng cho buồng triển lãm thương mại dựa
        trên định dạng và thiết kế, như thương mại hoặc giáo dục
    display_resolution:
      name: Độ phân giải màn hình
      description: 'Xác định độ phân giải của màn hình kỹ thuật số, ví dụ: 1280 x
        1024, full HD'
    display_sign_design:
      name: Thiết kế bảng hiệu hiển thị
      description: Xác định loại thông tin mà biển hiệu truyền tải, như phòng vệ sinh,
        bán giảm giá hoặc lối ra
    display_technology:
      name: Công nghệ màn hình
      description: 'Xác định loại công nghệ màn hình được sử dụng trong sản phẩm,
        ví dụ: LED, e-ink'
    disposable/reusable_bag_features:
      name: Tính năng túi dùng một lần/tái sử dụng
      description: Mô tả các đặc điểm chính của túi đựng chất thải thú nuôi, như có
        khả năng phân hủy sinh học hoặc chống rò rỉ
    disposable/reusable_item_material:
      name: Vật liệu dùng một lần/tái sử dụng
      description: Xác định xem vật liệu của sản phẩm là dùng một lần hay có thể tái
        sử dụng, như vật liệu có thể phân hủy sinh học, giấy
    disposable_bag_features:
      name: Tính năng túi dùng một lần
      description: Nêu bật các tính năng riêng của lõi thùng đựng tã/bỉm bẩn, chẳng
        hạn như kiểm soát mùi hoặc tạo hương thơm
    disposable_bag_material:
      name: Vật liệu túi dùng một lần
      description: Chỉ định thành phần của túi dùng một lần, ví dụ như nhựa, vật liệu
        phân hủy sinh học
    disposable_glove_features:
      name: Tính năng găng tay dùng một lần
      description: Xác định các đặc điểm đặc biệt của găng tay dùng một lần, như cổ
        dài hoặc không có bột
    disposable_tableware_material:
      name: Vật liệu bộ đồ ăn dùng một lần
      description: Xác định vật liệu được sử dụng trong bộ đồ ăn dùng một lần, chẳng
        hạn như nhựa hoặc giấy
    dive_computer_items_included:
      name: Bao gồm các vật dụng máy tính đi lặn
      description: Chỉ định những mục nào được bao gồm trong máy tính lặn, chẳng hạn
        như bộ phát hoặc dây đeo
