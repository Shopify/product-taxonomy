    baby/toddler_seat_features:
      name: Tính năng ghế trẻ em/trẻ tập đi
      description: Nêu bật các đặc điểm chính của ghế dành cho trẻ sơ sinh/trẻ tập
        đi, chẳng hạn như ghế ngả hoặc bàn ghế
    baby/toddler_sleepwear_style:
      name: Kiểu đồ ngủ trẻ em/trẻ tập đi
      description: Mô tả thiết kế của quần áo ngủ dành cho trẻ sơ sinh hoặc trẻ mới
