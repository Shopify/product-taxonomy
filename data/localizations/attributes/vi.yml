        đi đi, như dây đai 5 điểm hoặc chống va đập bên
    baby/toddler_clothing_features:
      name: Tính năng quần áo trẻ em/trẻ tập đi
      description: Nêu bật các tính năng đặc biệt của quần áo trẻ em/trẻ tập đi, như
        dây thắt lưng có thể điều chỉnh hoặc chống tia cực tím
    baby/toddler_equipment_safety_features:
      name: Các tính năng an toàn của thiết bị dành cho trẻ sơ sinh/trẻ tập đi
