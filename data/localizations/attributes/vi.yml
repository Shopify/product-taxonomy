      name: Độ hoàn thiện lớp men
      description: Biểu thị kết cấu và độ bóng của men gốm, như satin hoặc rạn
    glazing_type:
      name: Loại cửa kính
      description: Xác định số lớp kính cửa sổ, chẳng hạn như một lớp hoặc hai lớp
    glide_style:
      name: Kiểu trượt
      description: 'Chỉ ra đặc tính trượt mong muốn của giày trượt (ví dụ: tốc độ,
        khả năng kiểm soát)'
