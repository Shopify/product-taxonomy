      name: Kiểu dáng linh kiện âm thanh
      description: Xác định kiểu vật lý hoặc định dạng lắp đặt của linh kiện.
    audio_connectivity:
      name: Kết nối âm thanh
      description: Xác định loại kết nối âm thanh mà sản phẩm hỗ trợ, chẳng hạn như
