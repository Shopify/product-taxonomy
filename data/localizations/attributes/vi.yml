    candle_type:
      name: Loại nến
      description: Chỉ định thiết kế của nến, chẳng hạn như nến trụ hoặc nến cốc
    cane_base_design:
      name: Thiết kế đế gậy
      description: Xác định cấu hình của đế hỗ trợ của gậy.
    canned_meat_variety:
      name: Loại thịt đóng hộp
      description: Phân biệt giữa các loại thịt hộp, chẳng hạn như thịt gà tây hoặc
