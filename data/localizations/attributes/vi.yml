        chẳng hạn như tai nghe hoặc micrô
    recording_capability_type:
      name: Loại khả năng ghi hình
      description: 'Cho biết bộ thu có thể ghi nội dung TV hay không và phương pháp
        được sử dụng (ví dụ: USB PVR, HDD nội bộ, đám mây).'
    recording_functionality:
      name: Chức năng ghi hình
      description: 'Cho biết liệu và cách bộ thu có thể ghi nội dung TV (ví dụ: DVR
        vào HDD nội bộ, USB ngoài).'
    recording_mode:
      name: Chế độ ghi âm
      description: 'Liệt kê các chế độ hoạt động mà máy ghi hỗ trợ (ví dụ: liên tục,
        ghi âm theo thời gian).'
    recording_quality:
      name: Chất lượng ghi âm
      description: Mô tả độ rõ ràng của âm thanh của bộ chuyển đổi và hệ thống đọc
        chính tả, chẳng hạn như mức thấp hoặc mức cao
    recording_speed_modes_supported:
      name: Chế độ tốc độ ghi được hỗ trợ
