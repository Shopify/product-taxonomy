    keyboard_type:
      name: Loại bàn phím
      description: 'Chỉ định thiết kế và chức năng của bàn phím, ví dụ: tiêu chuẩn,
        có đèn nền'
    keycap_legend_printing_method:
      name: Phương pháp in chú giải nắp phím
      description: Mô tả cách các chú giải được áp dụng cho các nắp phím, ảnh hưởng
