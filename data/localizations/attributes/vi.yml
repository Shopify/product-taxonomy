      description: Mô tả cảm giác của khuôn làm gốm, chẳng hạn như vừa hoặc mịn
    slipper_style:
      name: Kiểu dép quai ngang
      description: Xác định kiểu dép, chẳng hạn như dép lê hoặc dép xỏ ngón
    slot_machine_type:
