    keyboard_port_type:
      name: Loại cổng kết nối với bàn phím
      description: Chỉ định loại cổng để kết nối bàn phím, chẳng hạn như USB type-C
    keyboard_specialized_features:
      name: Tính năng chuyên dụng của bàn phím
      description: Xác định các đặc điểm riêng của bàn phím, như góc có thể điều chỉnh
        hoặc đèn nền
    keyboard_switch_type:
      name: Loại bộ chuyển đổi bàn phím
      description: Chỉ định kiểu phản hồi của bàn phím, chẳng hạn như xúc giác hoặc
