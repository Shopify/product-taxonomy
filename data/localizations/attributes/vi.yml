    rack_format:
      name: Định dạng giá đỡ
      description: Xác định tiêu chuẩn vỏ hoặc kích thước vật lý của dải kênh để đặt
        giá đỡ hoặc máy tính để bàn.
    rack_mounting_style:
      name: Kiểu lắp giá đỡ
