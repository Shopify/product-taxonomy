      name: Loại dây cáp
      description: Phân loại các loại cáp, thường là trong thiết bị đi xe đạp; ví
        dụ như phanh, bánh răng
    cache_level:
      name: Cấp độ bộ nhớ đệm
      description: 'Cho biết vị trí phân cấp của bộ nhớ đệm (ví dụ: L1, L2, L3), ảnh
        hưởng đến kích thước, độ trễ và độ gần với lõi xử lý.'
    caffeine_content:
      name: Hàm lượng caffeine
      description: 'Chỉ ra lượng caffeine có trong sản phẩm, ví dụ: không chứa caffeine,
        caffeine thấp'
    cage_type:
