      description: Liemens apimtis yra per maža kliento kūnui.
    waist_too_tight:
      name: Per ankštas juosmuo
      description: Juosmens juosta nemaloniai spaudžia liemenį.
    warmth:
      name: Šiluma
      description: Daikto suteikiamas ar išlaikomas šilumos lygis netinka numatytoms
