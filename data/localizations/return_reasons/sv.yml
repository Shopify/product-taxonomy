    band_rolls_down:
      name: Bandet rullar ner
      description: Plagget sitter inte kvar på plats och glider ner längs kroppen.
    band_rolls_up:
      name: Bandet rullar upp sig
      description: Resår- eller tygbandet sitter inte kvar på plats och glider uppåt
