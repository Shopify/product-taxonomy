    color_too_bright:
      name: Färgen för stark
      description: Färgen är för intensiv eller livfull för kunden.
    color_too_muted:
      name: Färgen för dämpad
      description: Färgen är inte intensiv eller livfull nog för kunden.
    comfort:
      name: Komfort
      description: Artikelns fysiska känsla eller ergonomiska prestanda motsvarar
