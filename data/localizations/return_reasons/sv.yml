    assortment:
      name: Sortiment
      description: Utbudet av artiklar som ingår i paketet är inte vad kunden önskade.
    baby_refused:
      name: Bebisen vägrade
      description: Spädbarnet ville inte använda artikeln.
    balance:
      name: Balans
      description: Artikelns viktfördelning påverkar hanteringen eller stabiliteten
