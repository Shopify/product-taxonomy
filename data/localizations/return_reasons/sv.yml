    adhesive:
      name: Klister
      description: Produkten är inte adhesiv nog för det avsedda ändamålet.
    adhesive_strength:
      name: Fästförmåga
      description: Limmet är otillräckligt eller för starkt för den avsedda belastningen.
    adjustability:
      name: Justerbarhet
      description: Artikeln kan inte modifieras eller ändras i storlek i tillräckligt
        stor utsträckning för att passa kundens behov.
    age:
      name: Ålder
      description: Produktens ålder, årgång eller produktionsdatum är inte vad som
