    age_range:
      name: Åldersintervall
      description: Den rekommenderade åldersgruppen för artikeln passar inte den avsedda
        användaren.
    age_restriction:
      name: Åldersbegränsning
      description: Produkten har användningsbegränsningar baserade på minsta eller
        högsta ålder.
    amperage:
      name: Strömstyrka
      description: Märkströmmen är olämplig för kundens enhet eller systemkrav.
    angle:
      name: Vinkel
      description: Lutnings- eller böjningsgraden passar inte kundens krav.
    animal_didnt_like:
      name: Djuret gillade den inte
      description: Djuret vägrade konsumera eller interagera med produkten.
    animal_refused:
      name: Djuret vägrade
      description: Djuret använde eller konsumerade inte produkten.
    application:
      name: Applikation
      description: Den metod som krävs för att applicera produkten är oförlåtande,
