    bristles_too_coarse:
      name: Borsten för grov
      description: Borsten är för grov för den avsedda uppgiften.
    bristles_too_soft:
      name: Borsten för mjuka
      description: Borsten är för skonsam för den avsedda uppgiften.
    bubble_output:
      name: Bubbelproduktion
      description: Mängden eller storleken på de producerade bubblorna motsvarar inte
