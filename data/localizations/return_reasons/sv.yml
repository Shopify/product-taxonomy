    cold_duration:
      name: Kylans varaktighet
      description: Artikeln förblir inte kall så länge som kunden behöver.
    collar_too_loose:
      name: Kragen för lös
      description: Kragen sitter inte ordentligt runt halsen.
    collar_too_tight:
      name: Kragen för trång
      description: Plagget stramar på ett obekvämt sätt runt halsen.
    color:
