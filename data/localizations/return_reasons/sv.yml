    charging_speed:
      name: Laddningshastighet
      description: Enheten tar för lång tid att ladda batteriet.
    chest_too_big:
      name: Bröstet för stort
      description: Plaggets bröstmått är för stort för kunden.
    chest_too_small:
      name: Bröstet för litet
      description: Plaggets bröstmått är för litet för kunden.
    clarity:
      name: Klarhet
      description: Artikelns transparens uppfyller inte kundens krav.
    cleaning:
      name: Rengöring
