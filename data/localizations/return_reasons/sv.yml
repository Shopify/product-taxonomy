    energy_efficiency:
      name: Energieffektivitet
      description: Artikeln förbrukar för mycket energi för den prestanda den levererar.
    eye_strain:
      name: Ansträngda ögon
      description: Att använda produkten orsakar trötthet eller obehag i ögonen.
    fabric:
