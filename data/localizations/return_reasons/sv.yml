    burn_time:
      name: Brinntid
      description: Artikelns bränntid är kortare eller längre än förväntat.
    bust_too_big:
      name: Bysten för stor
      description: Plaggets byst är för stor för kundens kropp.
    bust_too_loose:
      name: Bysten för lös
      description: Passformen runt bysten är inte tillräckligt säker.
    bust_too_small:
      name: Bysten för liten
      description: Plaggets byst är för liten för kundens kropp.
    bust_too_tight:
      name: Bysten för trång
      description: Plagget stramar på ett obekvämt sätt runt bröstet.
    buttons_not_accessible:
      name: Knapparna inte åtkomliga
      description: Skalet eller fodralet blockerar enhetens knappar och förhindrar
