    cups_too_small:
      name: Kuporna för små
      description: Kupans volym är för liten för kunden byst.
    cups_too_thick:
      name: Kuporna för tjocka
      description: Utfyllnaden eller materialet i kuporna har för stor tjocklek.
    cups_too_thin:
      name: Kuporna för tunna
      description: Kuporna har inte nog med utfyllnad eller täckning.
    cups_too_tight:
      name: Kuporna för trånga
      description: Kuporna trycker åt eller stramar obekvämt kring bysten.
    cushioning:
      name: Dämpning
      description: Materialets mjukhet eller stötdämpning motsvarar inte förväntningarna
