    bitterness:
      name: Bitterhet
      description: Smakprofilen har en otrevlig skarp eller bitter smak.
    blade_type:
      name: Bladtyp
      description: Bladets specifika stil eller egg är inte lämplig för kundens användning.
    board_volume:
      name: Brädvolym
      description: Brädans volym ger för lite eller för mycket flytkraft för användarens
