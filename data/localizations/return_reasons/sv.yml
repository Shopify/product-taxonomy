    band_too_loose:
      name: Bandet för löst
      description: Bandets omkrets sitter inte säkert.
    band_too_small:
      name: Bandet för litet
      description: Bandets omkrets är otillräcklig, vilket gör att det stramar mot
        kroppen.
    band_too_thick:
      name: Bandet för tjockt
      description: Bandets bredd är för stor för kundens preferenser.
    band_too_thin:
      name: Bandet för tunt
      description: Bandets bredd är otillräcklig för komfort eller stöd.
    band_too_tight:
      name: Bandet för spänt
      description: Bandet stramar obehagligt runt kroppen.
    barrel_size:
      name: Diameter på slagdelen av basebollträet
