    cuff_too_small:
      name: Manschetten för liten
      description: Öppningen för handleden eller armen är för trång.
    cups_gaping:
      name: Kuporna glipar
      description: BH-kuporna formar sig inte efter kroppen, vilket skapar glapp.
    cups_too_big:
      name: Kuporna för stora
      description: Kupans volym är för stor för kunden byst.
    cups_too_loose:
      name: Kuporna för lösa
      description: Kupans passform är inte säker nog och ger inte tillräckligt med
