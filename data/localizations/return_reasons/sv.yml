---
sv:
  return_reasons:
    absorbency:
      name: Absorptionsförmåga
      description: Materialets förmåga att absorbera och behålla vätska är antingen
        otillräcklig eller för stor.
    absorption:
      name: Absorptionsförmåga
      description: Produkten absorberas inte av en yta som förväntat.
    academic_level:
      name: Akademisk nivå
      description: Innehållets komplexitet eller djup är inte lämpligt för kundens
        utbildningsbehov.
    accuracy:
      name: Noggrannhet
      description: Mätningarna eller uppgifterna som tillhandahålls av enheten är
        inte tillräckligt exakta.
    adhesion:
      name: Vidhäftning
      description: Produkten skapar inte en säker initial bindning med den avsedda
