      description: Chuť nebo konzistence je pro zákazníka příliš výrazná nebo těžká.
    too_sharp:
      name: Příliš ostré
      description: Hrana nebo špička je nebezpečně ostrá nebo způsobuje nepohodlí.
    too_short:
      name: Příliš krátké
      description: Délka výrobku je pro zamýšlené uložení, prostor nebo použití nedostatečná.
    too_simple:
      name: Příliš jednoduché
      description: Produkt postrádá složitost nebo funkce, které zákazník požadoval.
    too_small:
      name: Příliš malé
      description: Výrobek je menší, než zákazník v kontextu daného prostoru potřeboval.
    too_soft:
      name: Příliš měkké
      description: Poddajnost nebo nedostatečná pevnost položky je větší, než se očekávalo.
    too_sticky:
      name: Příliš lepivé
      description: Produkt nadměrně přilíná nebo zanechává nežádoucí lepivý film.
    too_stiff:
      name: Příliš tuhé
      description: Výrobek nebo jeho součásti jsou příliš tuhé, než aby se mohly podle
        potřeby ohýbat, pružit nebo přizpůsobit zamýšlenému použití.
    too_strong:
      name: Příliš silné
      description: Síla, výstup nebo účinek výrobku je nadměrný nebo neúměrný.
    too_subtle:
      name: Příliš jemné
      description: Charakter, detail nebo nuance účinku výrobku jsou méně výrazné,
        než si zákazník přál.
    too_sweet:
      name: Příliš sladké
      description: Množství cukru nebo sladkost překračuje preference zákazníka.
    too_thick:
      name: Příliš tlusté
      description: Výrobek je pro zamýšlené použití příliš objemný či robustní.
    too_thin:
      name: Příliš tenké
      description: Výrobek má menší hmotnost nebo pevnost, než je vhodné pro jeho
        zamýšlené použití.
    too_tight:
      name: Příliš těsné
      description: Výrobek škrtí nebo je pro pohodlí zákazníka příliš těsný.
    too_weak:
      name: Příliš slabé
      description: Síla, výkon nebo účinek výrobku je nedostatečný nebo sotva znatelný.
    too_wide:
      name: Příliš široké
      description: Výrobek je s ohledem na zamýšlené uložení, prostor nebo použití
        příliš široký.
    tooth_spacing:
      name: Rozteč zubů
      description: Vzdálenost mezi zuby na hřebenu nebo na čepeli neodpovídá potřebám
        zákazníka.
    touch_response:
      name: Odezva na dotyk
      description: Citlivost dotykového rozhraní je příliš vysoká nebo příliš nízká.
    transparency:
      name: Průhlednost
      description: Materiál je podle preferencí zákazníka příliš průhledný nebo není
        dostatečně průhledný.
    tread_type:
      name: Typ běhounu
      description: Vzor nebo provedení vnější podrážky nebo povrchu výrobku nevyhovuje
        zamýšlenému terénu nebo podmínkám.
    trial_period_ending:
      name: Konec zkušební verze
      description: Zákazník vrací produkt před uplynutím platnosti předplatného nebo
        zkušební verze.
    type_too_big:
      name: Písmo příliš velké
      description: Velikost písma nebo znaků je větší, než je požadováno.
    type_too_small:
      name: Písmo příliš malé
      description: Velikost písma nebo znaků je příliš malá pro pohodlné čtení.
    uncomfortable:
      name: Nepohodlné
      description: Celkový fyzický pocit při používání produktu je nepříjemný.
    uncomfortable_in_ear:
      name: Nepohodlné v uchu
      description: Tvar nebo velikost sluchátka způsobuje fyzické podráždění nebo
        bolest.
    underwire:
      name: Kostice
      description: Kovová nebo plastová výztuha v oděvu způsobuje nepohodlí nebo se
        nepřizpůsobuje tělu.
    unknown:
      name: Neznámý důvod
      description: Důvod vrácení nebyl uveden nebo jej nebylo možné určit.
    unstable:
      name: Nestabilní
      description: Výrobek se během provozu nebo používání posouvá, nadměrně vibruje
        nebo ztrácí stabilitu.
    vehicle_fit:
      name: Kompatibilita s vozidlem
      description: Výrobek nelze náležitě upevnit k zákazníkovu konkrétnímu vozidlu
        ani jej do něj vhodně umístit.
    ventilation:
      name: Větrání
      description: Výrobek nezajišťuje dostatečné proudění vzduchu ani prodyšnost.
    vibration:
      name: Vibrace
      description: Kmitavý pohyb vytvářený zařízením je nadměrný nebo nepříjemný.
    video_quality:
      name: Kvalita videa
      description: Ostrost, pohyb nebo věrnost barev vizuálního výstupu neodpovídají
        očekávání.
    viscosity:
      name: Viskozita
      description: Tloušťka nebo odpor proudění kapaliny není vhodná pro zamýšlené
        použití.
    vision_clarity:
      name: Ostrost vidění
      description: Průhled čočkou omezuje schopnost uživatele vidět jasně.
    voltage:
      name: Napětí
      description: Elektrické parametry zařízení neodpovídají zamýšlenému napájení.
    volume:
      name: Objem
      description: Zvuk produkovaný zařízením není dostatečně hlasitý nebo je příliš
        hlasitý.
    waist_too_big:
      name: Pas příliš velký
      description: Obvod pasu je na postavu zákazníka příliš velký.
    waist_too_high:
      name: Výška pasu příliš vysoká
      description: Pas oděvu je příliš vysoko na trupu.
    waist_too_loose:
      name: V pase příliš volné
      description: V oblasti pasu oděv dobře nesedí.
    waist_too_low:
      name: Výška pasu příliš nízká
      description: Pas oděvu je příliš nízko na bocích.
    waist_too_small:
      name: Pas příliš malý
      description: Obvod pasu je na postavu zákazníka (zákaznice) příliš malý.
    waist_too_tight:
      name: V pase příliš těsné
      description: V oblasti pasu oděv nepříjemně stahuje.
    warmth:
      name: Hřejivost
      description: Úroveň tepla, kterou výrobek vydává nebo zadržuje, není vhodná
        pro zamýšlené podmínky nebo činnost.
    washability:
      name: Pratelnost
      description: Požadovaná metoda čištění je nepřijatelná.
    water_resistance:
      name: Voděodolnost
      description: Schopnost výrobku odpuzovat vodu nebo vlhkost je pro zamýšlené
        podmínky použití nedostatečná.
    wear:
      name: Opotřebení
      description: Účinek kosmetického nebo osobního pečujícího produktu nevydrží
        tak dlouho, jak se očekávalo.
    weather:
      name: Počasí
      description: Environmentální podmínky brání uskutečnění služby nebo činnosti.
    weight:
      name: Hmotnost
      description: Hmotnost položky není vhodná pro zamýšlené použití.
    weight_capacity:
      name: Nosnost
      description: Maximální nosnost položky je nedostatečná pro zamýšlené použit.
    wheels_stick:
      name: Kola se zasekávají
      description: Válečkový mechanismus se nepohybuje plynule.
    whitening_results:
      name: Výsledky bělení
      description: Stupeň dosažené barevné změny je menší, než se očekávalo.
    width:
      name: Šířka
      description: Šířka výrobku není vhodná pro zamýšlené uložení nebo prostor.
    wind_resistance:
      name: Odolnost proti větru
      description: Schopnost položky chránit před větrem není vhodná pro zamýšlené
        podmínky nebo činnost.
    wrong_amount:
      name: Špatné množství
      description: Množství obdrženého produktu se liší od objednaného nebo očekávaného
        množství.
    wrong_dosage:
      name: Špatné dávkování
      description: Síla nebo koncentrace účinné látky neodpovídá požadavkům.
    wrong_format:
      name: Špatný formát
      description: Druh média nebo jeho fyzické provedení je nekompatibilní se zařízením
        nebo preferencemi zákazníka.
    wrong_hand:
      name: Špatná ruka
      description: Výrobek je určen pro opačnou dominantní ruku (levou vs. pravou),
        než zákazník potřebuje.
    pilling:
      name: Žmolkování
      description: Během používání nebo praní se na tkanině předčasně tvoří nežádoucí
        žmolky nebo chuchvalce.
