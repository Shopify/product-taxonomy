    wrong_amount:
      name: Cantitate greșită
      description: Cantitatea de produs primită diferă de cea comandată sau așteptată.
    wrong_dosage:
      name: Dozaj greșit
      description: Tăria sau concentrația ingredientului activ nu corespunde cerințelor.
    wrong_format:
