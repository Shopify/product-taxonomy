        nepotrivit pentru condițiile sau activitatea preconizate.
    washability:
      name: Lavabilitate
      description: Metoda de curățare necesară este inacceptabilă.
    water_resistance:
      name: Rezistență la apă
      description: Capacitatea articolului de a respinge apa sau umezeala este insuficientă
        pentru condițiile de utilizare prevăzute.
    wear:
      name: Uzură
      description: Efectul aplicat al produsului cosmetic sau de îngrijire personală
        nu durează atât de mult pe cât era de așteptat.
    weather:
      name: Vreme
      description: Condițiile ambientale împiedică desfășurarea serviciului sau a
        activității.
    weight:
      name: Greutate
      description: Greutatea sau ușurința articolului îl fac nepotrivit pentru utilizarea
        prevăzută de către client.
    weight_capacity:
      name: Greutate maximă admisă
      description: Sarcina maximă pe care articolul o poate susține este insuficientă
        pentru utilizarea prevăzută de client.
    wheels_stick:
      name: Roțile se blochează
      description: Mecanismul de rulare nu se mișcă lin.
    whitening_results:
      name: Rezultate de albire
      description: Gradul de modificare a culorii obținut este mai mic decât cel așteptat.
    width:
      name: Lățime
      description: Măsurătoarea articolului dintr-o parte în alta nu este potrivită
