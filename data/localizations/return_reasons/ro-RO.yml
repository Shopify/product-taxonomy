---
ro-RO:
  return_reasons:
    absorbency:
      name: Capacitate de absorbție
      description: Capacitatea materialului de a absorbi și reține lichidul este insuficientă
        sau excesivă.
    absorption:
      name: Absorbție
      description: Produsul nu se absoarbe în suprafețe sau în corp așa cum era de
        așteptat.
    academic_level:
      name: Nivel academic
      description: Complexitatea sau profunzimea conținutului nu este potrivită pentru
        nevoile educaționale ale clientului.
    accuracy:
      name: Acuratețe
      description: Măsurătorile sau datele furnizate de dispozitiv nu sunt suficient
        de precise.
    adhesion:
      name: Aderență
      description: Produsul nu creează o legătură inițială sigură cu suprafața dorită.
    adhesive:
      name: Adeziv
      description: Proprietățile de aderență ale produsului nu sunt adecvate pentru
        utilizarea prevăzută.
    adhesive_strength:
      name: Rezistența adezivului
      description: Puterea de fixare a adezivului este insuficientă sau excesivă pentru
        presiunea sau încărcătura urmărită.
    adjustability:
      name: Ajustabilitate
      description: Articolul nu poate fi modificat sau redimensionat suficient pentru
        a se potrivi nevoilor clientului.
    age:
      name: Vârstă
      description: Vârsta, recolta sau data de fabricație a produsului nu sunt cele
        așteptate.
    age_range:
      name: Interval de vârstă
      description: Grupul de vârstă recomandat pentru articol nu se aliniază cu utilizatorul
        vizat.
    age_restriction:
      name: Restricție de vârstă
      description: Produsul are limitări de utilizare bazate pe cerințele de vârstă
        minimă sau maximă.
    amperage:
      name: Amperaj
      description: Curentul electric nominal nu este potrivit pentru dispozitivul
        sau cerințele sistemului clientului.
    angle:
      name: Unghi
      description: Gradul de înclinare sau curbură nu corespunde cerințelor clientului.
    animal_didnt_like:
      name: Animalului nu i-a plăcut
      description: Animalul a refuzat să consume produsul sau să interacționeze cu
        acesta.
    animal_refused:
      name: Animalul a refuzat
      description: Animalul nu dorește să folosească sau să consume produsul.
    application:
      name: Aplicație
      description: Metoda necesară pentru aplicarea produsului este rigidă, excesiv
        de complexă sau predispusă la erori din partea utilizatorului.
    applicator:
      name: Aplicator
      description: Instrumentul furnizat distribuie produsul într-un mod neuniform
        sau necontrolat.
    arrived_late:
      name: A ajuns târziu
      description: Expedierea a avut loc după data sau ora prevăzută.
    articulation:
      name: Articulație
      description: Amplitudinea sau calitatea mișcării articulare din articol nu satisface
        nevoile clientului.
    artificial_tasting:
      name: Gust artificial
      description: Aroma are o calitate nenaturală sau sintetică.
    assembly:
      name: Asamblare
      description: Produsul necesită asamblare atunci când clientul se aștepta ca
        acesta să fie preasamblat.
    assortment:
      name: Sortiment
      description: Varietatea articolelor incluse în pachet nu este ceea ce și-a dorit
        clientul.
    baby_refused:
      name: Bebelușul a refuzat
      description: Sugarul nu ar folosi sau accepta articolul.
    balance:
      name: Echilibru
      description: Distribuția greutății în cadrul articolului afectează gestionarea
        sau stabilitatea acestuia într-un mod nedorit.
    band_rolls_down:
      name: Banda se rulează în jos
      description: Haina nu stă la locul ei și alunecă pe corp.
    band_rolls_up:
      name: Banda se rulează
      description: Banda elastică sau din material textil nu rămâne în poziție și
        alunecă în sus pe corp.
    band_too_big:
      name: Bandă prea mare
      description: Circumferința benzii este excesivă, împiedicând o fixare sigură
        pe corp.
    band_too_loose:
      name: Bandă prea largă
      description: Circumferința benzii nu se potrivește bine.
    band_too_small:
      name: Bandă prea mică
      description: Circumferința benzii este insuficientă, provocând constricție pe
        corp.
    band_too_thick:
      name: Bandă prea groasă
      description: Lățimea benzii este excesivă pentru preferința clientului.
    band_too_thin:
      name: Bandă prea subțire
      description: Lățimea benzii este insuficientă pentru confort sau susținere.
    band_too_tight:
      name: Bandă prea strâmtă
      description: Banda se strânge inconfortabil în jurul corpului.
    barrel_size:
      name: Barrel size
      description: Diametrul ondulatorului sau al instrumentului nu are dimensiunea
        potrivită pentru efectul dorit.
    base_curve:
      name: Curbură de bază
      description: Curbura lentilei nu se potrivește cu forma ochilor clientului sau
        cu cerințele din prescripție.
    battery_life:
      name: Durată de viață a bateriei
      description: Durata în care dispozitivul funcționează cu o singură încărcare
        nu corespunde așteptărilor clientului.
    bitterness:
      name: Amăreală
      description: Profilul aromatic are un gust neplăcut de pătrunzător sau acru.
    blade_type:
      name: Tip de lamă
      description: Stilul sau muchia specifică a lamei nu este potrivită pentru utilizarea
        de către client.
    board_volume:
      name: Volumul plăcii
      description: Volumul de deplasare al plăcii oferă o flotabilitate insuficientă
        sau excesivă pentru greutatea utilizatorului.
    bounce:
      name: Elasticitate
      description: Capacitatea de revenire a articolului este fie prea mare, fie prea
        mică pentru activitatea în cauză.
    breaks_easily:
      name: Se rupe ușor
      description: Articolul prezintă semne de fragilitate sau îi lipsește durabilitatea
        în condiții normale de utilizare.
    breathability:
      name: Respirabilitate
      description: Materialul nu permite trecerea umezelii, provocând supraîncălzire
        sau o senzație de umezeală.
    brightness:
      name: Luminozitate
      description: Intensitatea luminii emise sau reflectate de articol nu corespunde
        preferințelor clientului.
    bristles_too_coarse:
      name: Peri prea aspri
      description: Peria este prea aspră sau abrazivă pentru sarcina prevăzută.
    bristles_too_soft:
      name: Peri prea moi
      description: Peria este prea blândă pentru sarcina prevăzută.
    bubble_output:
      name: Producție de bule
      description: Cantitatea sau dimensiunea bulelor produse nu este cea așteptată.
    budget:
      name: Buget
      description: Costul serviciului depășește limitele financiare ale clientului.
    buoyancy:
      name: Flotabilitate
      description: Capacitatea articolului de a pluti sau de a suporta greutatea în
        apă nu satisface nevoile clientului.
    burn_rate:
      name: Viteză de ardere
      description: Viteza cu care articolul este consumat prin ardere este fie mai
        rapidă, fie mai lentă decât cea așteptată.
    burn_time:
      name: Timp de ardere
      description: Durata arderii articolului este mai scurtă sau mai lungă decât
        era de așteptat.
    bust_too_big:
      name: Bust prea mare
      description: Zona de la piept a îmbrăcămintei este prea mare pentru corpul clientului.
    bust_too_loose:
      name: Bust prea larg
      description: Croiala în jurul bustului nu este suficient de fixă.
    bust_too_small:
      name: Bust prea mic
      description: Zona de la piept a îmbrăcămintei este prea mică pentru corpul clientului.
    bust_too_tight:
      name: Bust prea strâmt
      description: Îmbrăcămintea strânge inconfortabil în zona bustului.
    buttons_not_accessible:
      name: Butoane inaccesibile
      description: Capacul sau husa blochează comenzile dispozitivului, împiedicând
        utilizarea.
    caffeine_level:
      name: Nivel de cofeină
      description: Concentrația de cafeină din produs este prea mare sau prea mică
        pentru utilizator.
    caliber:
      name: Calibru
      description: Diametrul specificat al proiectilului sau al țevii este incompatibil
        cu echipamentul clientului.
    calibration:
      name: Calibrare
      description: Procesul de setare sau ajustare a dispozitivului la un standard
        cunoscut este dificil sau nu funcționează conform așteptărilor.
    capacity:
      name: Capacitate
      description: Volumul sau cantitatea pe care articolul o poate conține sau prelucra
        nu îndeplinește cerințele clientului.
    carbonation:
      name: Carbonatare
      description: Nivelul de efervescență sau bule din băutură este prea mare sau
        prea scăzut.
    caused_allergic_reaction:
      name: A cauzat reacție alergică
      description: Produsul declanșează un răspuns alergic specific și semnificativ,
        cum ar fi urticarie, umflături sau o erupție cutanată severă.
    caused_irritation:
      name: A cauzat iritație
      description: Produsul a cauzat disconfort cutanat sau fizic.
    changed_my_mind:
      name: M-am răzgândit
      description: Clientul nu mai dorește articolul după achiziționarea acestuia,
        indiferent de calitatea sau acuratețea produsului.
    charging_speed:
      name: Viteză de încărcare
      description: Dispozitivul își reîncarcă bateria prea mult timp.
    chest_too_big:
      name: Piept prea mare
      description: Măsura de la piept a îmbrăcămintei este prea mare pentru client.
    chest_too_small:
      name: Piept prea mic
      description: Măsura de la piept a îmbrăcămintei este prea mică pentru client.
    clarity:
      name: Claritate
      description: Transparența vizuală a articolului nu îndeplinește cerințele clientului.
    cleaning:
      name: Curățare
      description: Articolul nu se curăță atât de ușor pe cât se anticipa.
    closeness:
      name: Finețe
      description: Bărbieritul sau tăietura oferite de instrument nu sunt atât de
        aproape de piele pe cât se dorește.
    closure:
      name: Închidere
      description: Mecanismul de deschidere sau închidere a articolului este dificil
        de acționat sau nesigur.
    cold_duration:
      name: Durată de menținere la rece
      description: Articolul nu rămâne rece atât timp cât are nevoie clientul.
    collar_too_loose:
      name: Guler prea larg
      description: Zgarda nu se potrivește bine în jurul gâtului.
    collar_too_tight:
      name: Guler prea strâmt
      description: Gulerul strânge inconfortabil în jurul gâtului.
    color:
      name: Culoare
      description: Nuanța, tonul sau aspectul vizual al articolului nu corespunde
        preferințelor sau așteptărilor clientului.
    color_too_bright:
      name: Culoare prea aprinsă
      description: Intensitatea sau vibranța culorii este excesivă pentru gustul clientului.
    color_too_muted:
      name: Culoare prea ternă
      description: Culoarea nu are suficientă intensitate pentru preferințele clientului.
    comfort:
      name: Confort
      description: Senzația fizică sau performanța ergonomică a articolului nu corespund
        așteptărilor.
    compartments:
      name: Compartimente
      description: Numărul sau aranjamentul secțiunilor de depozitare nu corespund
        nevoilor organizatorice ale clientului.
    compliance:
      name: Conformitate
      description: Produsul nu îndeplinește standardele de reglementare sau organizaționale
        specifice cerute de client.
    compression:
      name: Compresie
      description: Nivelul de presiune aplicat de îmbrăcăminte este fie prea mare,
        fie prea mic.
    condition:
      name: Stare
      description: Starea de conservare a articolului, inclusiv uzura minoră sau imperfecțiunile,
        nu corespunde gradului sau descrierii anunțate.
    configuration:
      name: Configurație
      description: Modul în care componentele modulare ale articolului pot fi aranjate
        sau interconectate este nepotrivit pentru aplicația prevăzută.
    connectivity:
      name: Conectivitate
      description: Capacitatea dispozitivului de a se conecta cu rețeaua sau cu alte
        dispozitive este nesigură sau insuficientă.
    consistency:
      name: Consistență
      description: Grosimea, corpul sau fluxul unui produs lichid sau semisolid nu
        sunt cele așteptate.
    content:
      name: Conținut
      description: Informațiile sau materialul inclus în articol nu sunt cele așteptate
        de client.
    cook_time:
      name: Timp de gătire
      description: Timpul necesar pentru prepararea produsului alimentar este nesatisfăcător
        sau nu este cel așteptat.
    cooling:
      name: Răcire
      description: Capacitatea dispozitivului de a reduce temperatura este insuficientă.
    coverage:
      name: Acoperire
      description: Măsura în care articolul ascunde, protejează sau se aplică pe o
        suprafață nu satisface nevoile clientului.
    cuff_too_big:
      name: Manșetă prea mare
      description: Deschiderea pentru încheietură sau braț este prea largă.
    cuff_too_small:
      name: Manșetă prea mică
      description: Deschiderea pentru încheietura mâinii sau braț este prea strânsă.
    cups_gaping:
      name: Cupe largi
      description: Cupele sutienului nu se mulează pe corp, creează spații.
    cups_too_big:
      name: Cupe prea mari
      description: Volumul cupei îmbrăcămintei este prea mare pentru bustul clientului.
    cups_too_loose:
      name: Cupe prea largi
      description: Potrivirea cupei nu este suficient de sigură sau nu oferă suficientă
        susținere.
    cups_too_small:
      name: Cupe prea mici
      description: Volumul cupei îmbrăcămintei este prea mic pentru bustul clientului.
    cups_too_thick:
      name: Cupe prea groase
      description: Grosimea spațierii sau a materialului din cupe este excesivă.
    cups_too_thin:
      name: Cupe prea subțiri
      description: Cupele nu au suficientă spațiere sau acoperire.
    cups_too_tight:
      name: Cupe prea strâmte
      description: Cupele pot comprima sau strânge bustul inconfortabil.
    cushioning:
      name: Amortizare
      description: Moliciunea sau absorbția șocurilor materialului nu sunt cele așteptate
        pentru utilizarea sa prevăzută.
    damaged_after_use:
      name: S-a deteriorat după utilizare
      description: Articolul prezintă deteriorare sau rupere după o utilizare normală.
    damaged_after_washing:
      name: S-a deteriorat după spălare
      description: Articolul a suferit deteriorări în timpul procesului de curățare.
    damaged_after_wear:
      name: S-a deteriorat după purtare
      description: Articolul prezintă semne de deteriorare în urma utilizării pe corp.
    damaged_or_defective:
      name: Deteriorat sau defect
      description: Articolul sosește cu deteriorări fizice, defecte de fabricație
        sau nu funcționează conform destinației.
    damaged_packaging:
      name: Ambalaj deteriorat
      description: Recipientul exterior a ajuns într-o stare compromisă.
    depth:
      name: Adâncime
      description: Măsurătoarea din față în spate sau de sus în jos nu este potrivită
        pentru spațiul sau croiala clientului.
    detail:
      name: Detaliu
      description: Nivelul de complexitate sau precizie în designul sau rezultatul
        articolului este insuficient.
    detection_range:
      name: Rază de detecție
      description: Distanța sau aria zonei de detecție a dispozitivului este nepotrivită
        pentru aplicația prevăzută.
    diameter:
      name: Diametru
      description: Lățimea secțiunii transversale circulare nu corespunde utilizării
        prevăzute sau cerințelor de compatibilitate.
    dietary_requirements:
      name: Cerințe dietetice
      description: Produsul conține ingrediente care intră în conflict cu nevoile
        de sănătate sau cu stilul de viață al clientului.
    difficult_to_adjust:
      name: Dificil de ajustat
      description: Mecanismele de modificare a potrivirii articolului sau a funcțiilor
        sale sunt greu de operat.
    difficult_to_assemble:
      name: Dificil de asamblat
      description: Procesul de asamblare a produsului este excesiv de dificil, complex
        sau instrucțiunile sunt neclare.
    difficult_to_blend:
      name: Dificil de amestecat
      description: Produsul nu se amestecă uniform cu alte substanțe sau suprafețe.
    difficult_to_clean:
      name: Dificil de curățat
      description: Designul sau materialul articolului face dificilă curățarea, chiar
        și atunci când se folosește metoda corectă.
    difficult_to_fasten:
      name: Dificil de încheiat
      description: Mecanismul de închidere necesită efort sau dexteritate excesivă
        pentru a fi fixat.
    difficult_to_fold:
      name: Dificil de pliat
      description: Restrângerea sau plierea articolului este mai greoaie sau mai complicată
        decât se anticipase.
    difficult_to_install:
      name: Dificil de instalat
      description: Procesul de instalare necesită mai mult efort sau aptitudine decât
        se aștepta clientul.
    difficult_to_refill:
      name: Dificil de reumplut
      description: Procesul de realimentare a produsului creează murdărie sau este
        complicat.
    difficult_to_use:
      name: Dificil de utilizat
      description: Articolul necesită mai multă aptitudine sau efort pentru a funcționa
        decât se aștepta.
    difficulty_level:
      name: Nivel de dificultate
      description: Provocarea prezentată de articol nu este potrivită pentru aptitudinile
        utilizatorului.
    dispenser:
      name: Dozator
      description: Mecanismul de dozare a produsului nu este satisfăcător.
    doesnt_apply_evenly:
      name: Nu se aplică uniform
      description: Produsul generează pete sau dungi în timpul aplicării.
    doesnt_blend_well:
      name: Nu se amestecă bine
      description: Produsul nu se amestecă sau nu se integrează uniform cu alte substanțe
        sau suprafețe.
    doesnt_dissolve_well:
      name: Nu se dizolvă bine
      description: Produsul lasă reziduuri sau aglomerări în loc să se amestece uniform
        în lichid.
    doesnt_fit_bed_frame:
      name: Nu se potrivește cu cadrul patului
      description: Dimensiunile saltelei sau ale așternutului nu corespund cu dimensiunile
        specifice ale cadrului patului.
    doesnt_fit_mattress:
      name: Nu se potrivește cu salteaua
      description: Dimensiunile așternutului nu se potrivesc cu dimensiunile saltelei.
    doesnt_fit_phone:
      name: Nu se potrivește cu telefonul
      description: Dimensiunile accesoriilor nu se potrivesc modelului specific de
        telefon.
    doesnt_fit_tv:
      name: Nu se potrivește cu televizorul
      description: Dimensiunile sau suportul articolului nu se potrivesc cu televizorul
        clientului.
    doesnt_stay_closed:
      name: Nu stă închis
      description: Zăvorul sau mecanismul de fixare nu rămâne închis.
    drainage:
      name: Drenaj
      description: Articolul nu permite lichidului să curgă corespunzător.
    draw_length:
      name: Lungime de tragere
      description: Distanța pe care poate fi trasă coarda arcului nu corespunde cu
        raza de acțiune fizică a arcașului.
    draw_weight:
      name: Greutate de tragere
      description: Forța necesară pentru a trage de coardă este prea mare sau prea
        mică pentru arcaș.
    dried_out:
      name: S-a uscat
      description: Produsul și-a pierdut prematur umiditatea, afectând capacitatea
        de utilizare.
    drying:
      name: Uscare
      description: Produsul provoacă un efect de uscare nedorit asupra pielii, părului
        sau a altei suprafețe.
    drying_speed:
      name: Viteză de uscare
      description: Timpul necesar pentru ca produsul să se usuce sau să se întărească
        este prea lent sau prea rapid.
    duplicate_order:
      name: Comandă duplicat
      description: Clientul a comandat articolul din greșeală de mai multe ori.
    duration:
      name: Durată
      description: Timpul alocat pentru serviciu, eveniment sau perioadă de acces
        este mai scurt sau mai lung decât cel preconizat.
    dye_transferred:
      name: Culoarea s-a transferat
      description: Culoarea de la articolul respectiv s-a împrăștiat pe alte suprafețe
        sau articole de îmbrăcăminte.
    edition:
      name: Ediție
      description: Versiunea sau lansarea specifică a produsului nu este ceea ce și-a
        dorit clientul.
    effectiveness:
      name: Eficacitate
      description: Produsul nu își îndeplinește funcțiile principale și nu oferă beneficiile
        promise la standardul așteptat.
    efficiency:
      name: Eficiență
      description: Cantitatea de combustibil sau energie consumată de articol pentru
        a funcționa este mai mare decât cea așteptată.
    embellishment_fell_off:
      name: Ornamentul a căzut
      description: Elementele decorative s-au desprins de articol.
    energy_efficiency:
      name: Eficiență energetică
      description: Cantitatea de energie utilizată de articol este excesivă pentru
        performanța pe care o oferă.
    eye_strain:
      name: Oboseală oculară
      description: Utilizarea produsului provoacă oboseală vizuală sau disconfort
        ocular.
    fabric:
      name: Material textil
      description: Compoziția, proprietățile sau senzația la atingere a textilelor
        nu corespund preferințelor clientului.
    fails_to_detect_threats:
      name: Nu detectează amenințările
      description: Dispozitivul de securitate sau siguranță nu identifică pericolele
        așa cum se anticipa.
    fastening:
      name: Sistem de prindere
      description: Metoda de fixare sau închidere a articolului este dificilă sau
        nesigură.
    fat_content:
      name: Conținut de grăsimi
      description: Procentul de grăsime din produsul alimentar nu corespunde preferințelor
        alimentare ale clientului.
    field_of_view:
      name: Câmp vizual
      description: Zona vizibilă oferită de dispozitivul optic este nepotrivită pentru
        utilizarea prevăzută.
    field_of_view_too_narrow:
      name: Câmp vizual prea îngust
      description: Zona vizibilă prin dispozitivul optic sau mască este prea restrânsă.
    filtration_class:
      name: Clasă de filtrare
      description: Clasificarea sau standardul de blocare a particulelor ale filtrului
        nu îndeplinesc cerințele.
    finish:
      name: Finisaj
      description: Aspectul suprafeței sau stratul final de acoperire al articolului
        îl face nepotrivit pentru utilizarea avută în vedere sau mediul clientului.
    firmness:
      name: Fermitate
      description: Nivelul de rigiditate sau cedare al articolului nu este cel așteptat.
    fit:
      name: Potrivire
      description: Modul în care articolul se așază pe, în sau lângă corp sau alt
        echipament este incorect
    fitment:
      name: Potrivire
