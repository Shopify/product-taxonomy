---
es:
  return_reasons:
    absorbency:
      name: Absorción
      description: La capacidad para absorber y retener líquido del material es insuficiente
        o excesiva.
    absorption:
      name: Absorción
      description: El producto no absorbe en una superficie o en el cuerpo como debería.
    academic_level:
      name: Nivel académico
      description: La complejidad o profundidad del contenido no es adecuada a las
        necesidades educativas del cliente.
    accuracy:
      name: Precisión
      description: Las medidas o los datos que proporciona el dispositivo no son lo
        suficientemente precisos.
    adhesion:
      name: Adhesión
      description: El producto no crea una unión inicial segura con la superficie
        deseada.
    adhesive:
      name: Adhesivo
      description: Las propiedades adhesivas del producto no son adecuadas para el
        uso previsto.
    adhesive_strength:
      name: Fuerza de adhesión
      description: La capacidad de sujeción del adhesivo es insuficiente o excesiva
        para la carga o tensión prevista.
    adjustability:
      name: Ajustabilidad
      description: El artículo no se puede modificar ni redimensionar lo suficiente
        para adaptarse a las necesidades del cliente.
    age:
      name: Edad
      description: La maduración, cosecha o fecha de producción del producto no es
        la esperada.
    age_range:
      name: Rango de edad
      description: La edad recomendada para el artículo no se ajusta al usuario previsto.
    age_restriction:
      name: Restricción de edad
      description: El producto tiene limitaciones de uso basadas en requisitos de
        edad mínima o máxima.
    amperage:
      name: Amperaje
      description: La clasificación de corriente eléctrica no es adecuada para los
        requisitos del dispositivo o sistema del cliente.
    angle:
      name: Ángulo
      description: El grado de inclinación o curvatura no coincide con los requisitos
        del cliente.
    animal_didnt_like:
      name: Al animal no le gustó
      description: El animal se ha negado a consumir o interactuar con el producto.
    animal_refused:
      name: El animal lo rechazó
      description: El animal no utilizaría ni consumiría el producto.
    application:
      name: Aplicación
      description: El método que se requiere para aplicar el producto es inflexible,
        excesivamente complejo o propenso a que el usuario cometa errores.
    applicator:
      name: Aplicador
      description: La herramienta que se proporciona distribuye el producto de forma
        desigual o descontrolada.
    arrived_late:
      name: Llegó tarde
      description: La entrega se ha producido después de la fecha prevista o del tiempo
        requerido.
    articulation:
      name: Articulación
      description: El rango o la calidad del movimiento articular del artículo no
        satisface las necesidades del cliente.
    artificial_tasting:
      name: Sabor artificial
      description: El sabor tiene una calidad antinatural o sintética.
    assembly:
      name: Montaje
      description: El producto requiere montaje pero el cliente esperaba que estuviera
        parcialmente montado.
    assortment:
      name: Surtido
      description: La variedad de artículos incluidos en el paquete no es la que el
        cliente deseaba.
    baby_refused:
      name: El bebé lo rechazó
      description: El bebé no ha querido usar el artículo ni lo ha aceptado.
    balance:
      name: Equilibrio
      description: La distribución de peso del artículo afecta a su gestión o estabilidad
        de forma no deseable.
    band_rolls_down:
      name: La banda se enrolla
      description: La prenda no se mantiene en su lugar y se desliza por el cuerpo.
    band_rolls_up:
      name: La banda se enrolla
      description: La banda elástica o de tela no permanece en su posición y se desliza
        hacia arriba en el cuerpo.
    band_too_big:
      name: Banda demasiado grande
      description: La talla de la banda es demasiado grande, lo que impide un ajuste
        seguro al cuerpo.
    band_too_loose:
      name: Banda demasiado holgada
      description: La talla de la banda no se ajusta de forma segura.
    band_too_small:
      name: Banda demasiado pequeña
      description: La talla de la banda es demasiado pequeña, por lo que aprieta el
        cuerpo.
    band_too_thick:
      name: Banda demasiado gruesa
      description: El ancho de la banda es excesivo según las preferencias del cliente.
    band_too_thin:
      name: Banda demasiado fina
      description: La medida de la banda no es suficiente para que sea cómoda o sujete
        bien.
    band_too_tight:
      name: Banda demasiado ajustada
      description: La banda aprieta de manera incómoda el cuerpo.
    barrel_size:
      name: Diámetro del bate de béisbol
      description: El diámetro del rizador no es el adecuado para el efecto que se
        desea.
    base_curve:
      name: Curva base
      description: La curvatura de la lente no coincide con la forma de los ojos del
        cliente ni con los requisitos de prescripción.
    battery_life:
      name: Duración de la batería
      description: La duración del funcionamiento del dispositivo con una sola carga
        no cumple con las expectativas del cliente.
    bitterness:
      name: Amargor
      description: El perfil de sabor es demasiado fuerte o presenta un regusto amargo.
    blade_type:
      name: Tipo de cuchilla
      description: El estilo o filo concreto de la hoja no es adecuado para el uso
        que le quiere dar el cliente.
    board_volume:
      name: Volumen de la tabla
      description: El volumen de desplazamiento de la tabla no proporciona una flotabilidad
        suficiente o lo hace de manera excesiva para el peso del usuario.
    bounce:
      name: Rebote
      description: La capacidad de rebote del artículo es demasiado alta o demasiado
        baja para la actividad.
    breaks_easily:
      name: Se rompe fácilmente
      description: El artículo muestra signos de fragilidad o no dura lo esperado
        con un uso normal.
    breathability:
      name: Transpirabilidad
      description: El material no permite que pase la humedad, lo que provoca sobrecalentamiento
        o una sensación húmeda.
    brightness:
      name: Brillo
      description: La intensidad de la luz que el artículo emite o refleja no se ajusta
        a las preferencias del cliente.
    bristles_too_coarse:
      name: Cerdas demasiado duras
      description: El cepillo es demasiado áspero o rasposo para la tarea para la
        cual está destinado.
    bristles_too_soft:
      name: Cerdas demasiado blandas
      description: El cepillo es demasiado suave para la tarea para la cual está destinado.
    bubble_output:
      name: Cantidad de burbujas
      description: La cantidad o tamaño de las burbujas producidas no es la que se
        esperaba.
    budget:
      name: Presupuesto
      description: El coste del servicio supera las limitaciones financieras del cliente.
    buoyancy:
      name: Flotabilidad
      description: La capacidad para flotar o soportar peso del artículo en el agua
        no se ajusta a las necesidades del cliente.
    burn_rate:
      name: Tasa de combustión
      description: La velocidad a la que se consume el artículo al quemarse es más
        rápida o más lenta de lo que se esperaba.
    burn_time:
      name: Tiempo de combustión
      description: La duración de la combustión del artículo es más corta o más larga
        de lo que se esperaba.
    bust_too_big:
      name: Busto demasiado grande
      description: La parte del pecho de la pieza es demasiado grande para el cuerpo
        del cliente.
    bust_too_loose:
      name: Busto demasiado holgado
      description: El ajuste de la parte del pecho no es lo suficientemente seguro.
    bust_too_small:
      name: Busto demasiado pequeño
      description: La parte del pecho de la pieza es demasiado pequeña para el cuerpo
        del cliente.
    bust_too_tight:
      name: Busto demasiado ajustado
      description: La pieza aprieta de manera incómoda la parte de alrededor del pecho.
    buttons_not_accessible:
      name: Botones inaccesibles
      description: La caja o tapa bloquea los controles del dispositivo y eso impide
        su uso.
    caffeine_level:
      name: Nivel de cafeína
      description: La concentración de cafeína en el producto es demasiado alta o
        demasiado baja para el usuario.
    caliber:
      name: Calibre
      description: El diámetro especificado del proyectil o cañón es incompatible
        con el equipo del cliente.
    calibration:
      name: Calibración
      description: El proceso de configuración o ajuste del dispositivo a un estándar
        conocido es difícil o no funciona como se espera.
    capacity:
      name: Capacidad
      description: El volumen o la cantidad que el artículo puede contener o procesar
        no satisface los requisitos del cliente.
    carbonation:
      name: Carbonatación
      description: El nivel de efervescencia o burbujas en la bebida es demasiado
        alto o demasiado bajo.
    caused_allergic_reaction:
      name: Provocó una reacción alérgica
      description: El producto produce una respuesta alérgica concreta significativa,
        como urticaria, hinchazón o un sarpullido grave.
    caused_irritation:
      name: Provocó irritación
      description: El producto ha provocado molestias físicas o en la piel.
    changed_my_mind:
      name: He cambiado de opinión
      description: El cliente ya no quiere el artículo después de comprarlo, independientemente
        de la calidad o precisión del producto.
    charging_speed:
      name: Velocidad de carga
      description: El dispositivo tarda demasiado tiempo en volver a cargar su batería.
    chest_too_big:
      name: Pecho demasiado grande
      description: La medida de pecho de la pieza es demasiado grande para el cliente.
    chest_too_small:
      name: Pecho demasiado pequeño
      description: La medida de pecho de la pieza es demasiado pequeña para el cliente.
    clarity:
      name: Claridad
      description: La transparencia visual del artículo no se ajusta a los requisitos
        del cliente.
    cleaning:
      name: Limpieza
      description: El artículo no se limpia tan fácilmente como se esperaba.
    closeness:
      name: Apurado
      description: El afeitado o corte que proporciona la herramienta no se acerca
        a la piel como se desea.
    closure:
      name: Cierre
      description: El mecanismo para abrir o cerrar el artículo es difícil de operar
        o inseguro.
    cold_duration:
      name: Duración del frío
      description: El artículo no se mantiene frío durante el tiempo que precisa el
        cliente.
    collar_too_loose:
      name: Cuello demasiado holgado
      description: El collar no se ajusta de manera segura alrededor del cuello.
    collar_too_tight:
      name: Cuello demasiado ajustado
      description: El cuello aprieta de manera incómoda.
    color:
      name: Color
      description: El tono, la sombra o la apariencia visual del artículo no se ajusta
        a las preferencias o expectativas del cliente.
    color_too_bright:
      name: Color demasiado brillante
      description: La intensidad o el brillo del color es excesivo según los gustos
        del cliente.
    color_too_muted:
      name: Color demasiado apagado
      description: El color carece de suficiente brillo o intensidad según las preferencias
        del cliente.
    comfort:
      name: Comodidad
      description: La sensación física o el rendimiento ergonómico del artículo no
        cumple con las expectativas.
    compartments:
      name: Compartimentos
      description: El número o la disposición de las secciones de almacenamiento no
        satisface las necesidades organizativas del cliente.
    compliance:
      name: Cumplimiento
      description: El producto no cumple con los estándares regulatorios u organizativos
        específicos que el cliente necesita.
    compression:
      name: Compresión
      description: El nivel de presión que la prenda aplica es demasiado grande o
        demasiado pequeño.
    condition:
      name: Estado
      description: El estado de conservación del artículo, incluido el desgaste o
        las imperfecciones menores, no coincide con el grado o descripción anunciados.
    configuration:
      name: Configuración
      description: La forma en que se pueden organizar o interconectar los componentes
        modulares del artículo no es adecuada para la aplicación prevista.
    connectivity:
      name: Conectividad
      description: La capacidad del dispositivo para vincularse con redes u otros
        dispositivos no es fiable ni suficiente.
    consistency:
      name: Consistencia
      description: El espesor, cuerpo o flujo de un producto líquido o semisólido
        no es el esperado.
    content:
      name: Contenido
      description: La información o el material incluidos en el artículo no es lo
        que el cliente esperaba.
    cook_time:
      name: Tiempo de cocción
      description: El tiempo necesario para preparar el producto alimenticio no es
        satisfactorio o no es el esperado.
    cooling:
      name: Refrigeración
      description: La capacidad del dispositivo para bajar de temperatura es insuficiente.
    coverage:
      name: Cobertura
      description: El grado en que el artículo oculta, protege o se aplica a una superficie
        no se ajusta a las necesidades del cliente.
    cuff_too_big:
      name: Puño demasiado grande
      description: La apertura para la muñeca o el brazo es demasiado holgada.
    cuff_too_small:
      name: Puño demasiado pequeño
      description: La abertura para la muñeca o el brazo es demasiado estrecha.
    cups_gaping:
      name: Las copas quedan abiertas
      description: Las copas del sujetador no se adaptan al cuerpo y se crean huecos.
    cups_too_big:
      name: Copas demasiado grandes
      description: La medida de la copa de la pieza es demasiado grande para el pecho
        del cliente.
    cups_too_loose:
      name: Copas demasiado holgadas
      description: El ajuste de la copa no es lo suficientemente seguro ni brinda
        el soporte suficiente.
    cups_too_small:
      name: Copas demasiado pequeñas
      description: La medida de la copa de la pieza es demasiado pequeña para el pecho
        del cliente.
    cups_too_thick:
      name: Copas demasiado gruesas
      description: El relleno o grosor del material de las copas es excesivo.
    cups_too_thin:
      name: Copas demasiado finas
      description: Las copas carecen de suficiente relleno o cobertura.
    cups_too_tight:
      name: Copas demasiado ajustadas
      description: Las copas comprimen o aprietan el pecho de manera incomoda.
    cushioning:
      name: Amortiguación
      description: La suavidad o absorción de impactos del material no es la que se
        espera para el uso previsto.
    damaged_after_use:
      name: Se dañó después del uso
      description: El artículo muestra deterioro o roturas después de un uso normal.
    damaged_after_washing:
      name: Se dañó después del lavado
      description: El artículo ha sufrido daños durante el proceso de limpieza.
    damaged_after_wear:
      name: Se dañó después de llevarlo puesto
      description: El artículo muestra daños después de usarlo en el cuerpo.
    damaged_or_defective:
      name: Dañado o defectuoso
      description: El artículo ha llegado con daños físicos, defectos de fabricación
        o no funciona como se esperaba.
    damaged_packaging:
      name: Embalaje dañado
      description: El contenedor exterior ha llegado en un estado peligroso.
    depth:
      name: Profundidad
      description: La medida de adelante hacia atrás o de arriba hacia abajo no es
        adecuada para el espacio o el ajuste del cliente.
    detail:
      name: Detalle
      description: El nivel de complejidad o precisión del diseño o la producción
        del artículo no es suficiente.
    detection_range:
      name: Alcance de detección
      description: La distancia o el área de la zona de detección del dispositivo
        no es adecuada para la aplicación prevista.
    diameter:
      name: Diámetro
      description: El ancho de la sección transversal circular no se ajusta al uso
        previsto ni a los requisitos de compatibilidad.
    dietary_requirements:
      name: Requisitos dietéticos
      description: El producto contiene ingredientes que entran en conflicto con las
        necesidades de salud o el estilo de vida del cliente.
    difficult_to_adjust:
      name: Difícil de ajustar
      description: Los mecanismos para modificar el ajuste o la configuración del
        artículo son difíciles de utilizar.
    difficult_to_assemble:
      name: Difícil de montar
      description: El proceso de montaje del producto es excesivamente difícil, complejo
        o las instrucciones no son claras.
    difficult_to_blend:
      name: Difícil de difuminar
      description: El producto no se mezcla fácilmente con otras sustancias o superficies.
    difficult_to_clean:
      name: Difícil de limpiar
      description: El diseño o el material del artículo dificultan su limpieza, incluso
        utilizando el método correcto.
    difficult_to_fasten:
      name: Difícil de abrochar
      description: Se requiere un esfuerzo excesivo o destreza para asegurar el mecanismo
        de cierre.
    difficult_to_fold:
      name: Difícil de plegar
      description: Contraer o doblar el artículo es más difícil o más complicado de
        lo previsto.
    difficult_to_install:
      name: Difícil de instalar
      description: El proceso de instalación requiere más esfuerzo o habilidad de
        lo que el cliente esperaba.
    difficult_to_refill:
      name: Difícil de rellenar
      description: El proceso de reposición del producto es desordenado o complicado.
    difficult_to_use:
      name: Difícil de usar
      description: Se requiere más habilidad o esfuerzo de lo esperado para utilizar
        el artículo.
    difficulty_level:
      name: Nivel de dificultad
      description: El desafío que presenta el artículo no es apropiado para las habilidades
        del usuario.
    dispenser:
      name: Dispensador
      description: El mecanismo dispensador del producto no funciona correctamente.
    doesnt_apply_evenly:
      name: No se aplica de forma uniforme
      description: El producto se presenta irregular o veteado durante la aplicación.
    doesnt_blend_well:
      name: No se difumina bien
      description: El producto no se mezcla o integra correctamente con otras sustancias
        o superficies.
    doesnt_dissolve_well:
      name: No se disuelve bien
      description: El producto deja residuos o grumos en lugar de mezclarse suavemente
        con el líquido.
    doesnt_fit_bed_frame:
      name: No encaja en el armazón de la cama
      description: Las medidas del colchón o de la ropa de cama no se ajustan al tamaño
        de la cama.
    doesnt_fit_mattress:
      name: No se ajusta al colchón
      description: Las medidas de la ropa de cama no se ajustan al tamaño del colchón.
    doesnt_fit_phone:
      name: No se ajusta al teléfono
      description: Las medidas del accesorio no se adaptan al modelo específico de
        teléfono.
    doesnt_fit_tv:
      name: No se ajusta al televisor
      description: Las dimensiones o el soporte del artículo no se adaptan al televisor
        del cliente.
    doesnt_stay_closed:
      name: No se mantiene cerrado
      description: El pestillo o mecanismo de fijación no se mantiene fijado.
    drainage:
      name: Drenaje
      description: El artículo no permite que el líquido fluya correctamente.
    draw_length:
      name: Longitud de tiro
      description: La distancia que se puede tirar de la cuerda del arco no coincide
        con el alcance físico del arquero.
    draw_weight:
      name: Peso de tiro
      description: La fuerza necesaria para tirar de la cuerda del arco es demasiado
        fuerte o demasiado ligera para el arquero.
    dried_out:
      name: Se secó
      description: El producto ha perdido humedad antes de tiempo y eso afecta su
        usabilidad.
    drying:
      name: Secado
      description: El producto provoca un efecto no deseado y reseca la piel, el cabello
        u otra superficie.
    drying_speed:
      name: Velocidad de secado
      description: El tiempo necesario para que el producto se seque o cuaje es demasiado
        lento o demasiado rápido.
    duplicate_order:
      name: Pedido duplicado
      description: El cliente ha pedido el artículo varias veces por accidente.
    duration:
      name: Duración
      description: El tiempo asignado para el servicio, evento o período de acceso
        es más corto o más largo de lo esperado.
    dye_transferred:
      name: Destiñó
      description: El color del artículo ha teñido otras superficies o prendas.
    edition:
      name: Edición
      description: La versión o el lanzamiento específico del producto no es lo que
        el cliente quería.
    effectiveness:
      name: Eficacia
      description: El producto no realiza sus funciones principales ni entrega los
        beneficios prometidos según el estándar esperado.
    efficiency:
      name: Eficiencia
      description: La cantidad de combustible o energía que el artículo consume para
        funcionar es mayor de lo esperado.
    embellishment_fell_off:
      name: Se desprendió el adorno
      description: Se han desprendido los elementos decorativos del artículo.
    energy_efficiency:
      name: Eficiencia energética
      description: La cantidad de energía que el artículo utiliza es excesiva para
        el rendimiento que ofrece.
    eye_strain:
      name: Fatiga visual
      description: El uso del producto provoca fatiga visual o molestias en los ojos.
    fabric:
      name: Tela
      description: La composición, las propiedades o el tacto del textil no satisfacen
        las preferencias del cliente.
    fails_to_detect_threats:
      name: No detecta amenazas
      description: El dispositivo de seguridad o protección no identifica los peligros
        como se esperaba.
    fastening:
      name: Cierre
      description: El método de asegurar o cerrar el artículo es difícil o inseguro.
    fat_content:
      name: Contenido de grasa
      description: El porcentaje de grasa del producto alimenticio no se ajusta a
        las preferencias dietéticas del cliente.
    field_of_view:
      name: Campo de visión
      description: El área visible proporcionada por el dispositivo óptico no es adecuada
        para el uso previsto.
    field_of_view_too_narrow:
      name: Campo de visión demasiado estrecho
      description: El área visible a través de la óptica o máscara es demasiado limitada.
    filtration_class:
      name: Clase de filtración
      description: La clasificación o el estándar de bloqueo de partículas del filtro
        no cumple con los requisitos.
    finish:
      name: Acabado
      description: El aspecto de la superficie o el revestimiento final del artículo
        lo hacen inadecuado para el uso o entorno previsto por el cliente.
    firmness:
      name: Firmeza
      description: El nivel de rigidez o elasticidad del artículo no es el que se
        esperaba.
    fit:
      name: Ajuste
      description: La forma en que el artículo se coloca sobre, dentro o contra el
        cuerpo u otro equipo es incorrecta.
    fitment:
      name: Montaje
      description: El artículo no se ajusta correctamente con el modelo o la pieza
        específica a la que está conectado.
    flange_size:
      name: Tamaño de la brida
      description: El diámetro de la abertura del protector del extractor de leche
        es incorrecto para el usuario, lo que afecta la comodidad o extracción de
        leche.
    flavor:
      name: Sabor
      description: El sabor que está en la etiqueta del artículo no es la variedad
        específica que el cliente quería.
    flex:
      name: Flexión
      description: La forma en que el artículo se dobla y rebota no es la adecuada
        para las necesidades o el estilo del usuario.
    flexibility:
      name: Flexibilidad
      description: La capacidad del artículo para doblarse o ceder bajo presión no
        es la que se esperaba.
    flight_distance:
      name: Distancia de vuelo
      description: La distancia que recorre el artículo a través del aire no es adecuada
        para la actividad o el estado para el cual está previsto.
    flow_rate:
      name: Caudal
      description: La velocidad a la que el líquido o el aire se mueven a través del
