      name: Çok geniş
      description: Ürünün genişliği çok büyük olduğu için ürün istenen şekilde oturmuyor,
        yerleşmiyor veya kullanılamıyor.
    tooth_spacing:
      name: Diş aralığı
      description: Tarak veya bıçak üzerindeki dişler arasındaki mesafe müşterinin
        ihtiyaçlarına uygun değil.
    touch_response:
      name: Dokunma tepkisi
      description: Dokunmatik arayüzün hassasiyeti çok yüksek veya çok düşük.
    transparency:
      name: Şeffaflık
      description: Malzemenin transparanlığı müşterinin beklentilerine göre ya çok
        fazla ya da yeterince şeffaf değil.
    tread_type:
      name: Diş türü
      description: Ürünün dış tabanının veya yüzeyinin deseni ya da tasarımı, amaçlanan
        arazi veya koşullara uygun değil.
    trial_period_ending:
      name: Deneme süresi bitiyor
      description: Müşteri, ürünü abonelik veya deneme süresi dolmadan iade ediyor.
    type_too_big:
      name: Yazı tipi çok büyük
      description: Yazı tipi veya karakter büyüklüğü istenenden daha büyük.
    type_too_small:
      name: Yazı tipi çok küçük
      description: Yazı tipi veya karakter büyüklüğü rahatça okunamayacak kadar küçük.
    uncomfortable:
      name: Rahatsız
      description: Ürünün kullanımı genel olarak fiziksel rahatsızlık hissi yaratıyor.
    uncomfortable_in_ear:
      name: Kulakta rahatsız ediyor
      description: Kulaklığın şekli veya kulağa oturuşu fiziksel tahrişe veya ağrıya
        neden oluyor.
    underwire:
      name: Balen
      description: Ürünün içindeki metal veya plastik destek rahatsız ediyor ya da
        vücuda uyum sağlamıyor.
    unknown:
      name: Bilinmeyen
      description: İade nedeni belirtilmedi veya belirlenemedi.
    unstable:
      name: Dengesiz
      description: Ürün çalışma veya kullanım sırasında yerinden oynuyor, çok fazla
        titreşiyor veya dengesini kaybediyor.
    vehicle_fit:
      name: Araç uyumu
      description: Ürün, müşterinin aracına düzgün şekilde takılamıyor veya araca
        sığmıyor.
    ventilation:
      name: Havalandırma
      description: Ürün yeterli hava akışı veya nefes alabilirlik sağlamıyor.
    vibration:
      name: Titreşim
      description: Cihazın ürettiği salınım hareketi çok fazla veya rahatsız edici.
    video_quality:
      name: Video kalitesi
      description: Görsel çıktının netliği, hareketliliği veya renk doğruluğu beklendiği
        gibi değil.
    viscosity:
      name: Viskozite
      description: Sıvının yoğunluğu veya akış direnci, amaçlanan uygulama için uygun
        değil.
    vision_clarity:
      name: Görüş netliği
      description: Lensin görüş açısı, kullanıcının net görme yeteneğini olumsuz etkiliyor.
    voltage:
      name: Voltaj
      description: Cihazın elektrik değerleri, amaçlanan güç kaynağıyla uyuşmuyor.
    volume:
      name: Hacim
      description: Cihazın çıkardığı ses yeterince yüksek değil veya çok yüksek.
    waist_too_big:
      name: Beli çok geniş
      description: Bel ölçüsü, müşterinin vücuduna göre gereğinden fazla geniş.
    waist_too_high:
      name: Beli çok yüksek
      description: Ürünün bel çizgisi çok yukarıda duruyor.
    waist_too_loose:
      name: Beli çok bol
      description: Bel bandı, bele tam oturmadığı için yerinde durmuyor.
    waist_too_low:
      name: Beli çok düşük
      description: Ürünün bel çizgisi kalçanın üzerinde gereğinden fazla aşağıda duruyor.
    waist_too_small:
      name: Beli çok dar
      description: Ürünün bel ölçüsü müşterinin vücuduna göre dar.
    waist_too_tight:
      name: Beli çok dar
      description: Bel bandı, beli rahatsız edecek şekilde sıkıyor.
    warmth:
      name: Sıcaklık
      description: Ürünün sağladığı veya muhafaza ettiği ısı seviyesi, amaçlanan koşullar
        veya faaliyet için uygun değil.
    washability:
      name: Yıkanabilirlik
      description: İstenen temizleme yöntemi kabul edilebilir bir yöntem değil.
    water_resistance:
      name: Suya dayanıklılık
      description: Ürünün su veya nemi uzaklaştırma özelliği, amaçlanan kullanım koşulları
        için yetersiz.
    wear:
      name: Aşınma
      description: Kozmetik veya kişisel bakım ürününün etkisi beklendiği kadar uzun
        sürmüyor.
    weather:
      name: Hava durumu
      description: Çevresel koşullar, hizmetin veya faaliyetin gerçekleşmesini engelliyor.
    weight:
      name: Ağırlık
      description: Ürünün ağırlığı veya hafifliği, ürünü müşterinin amaçladığı kullanım
        için uygunsuz hale getiriyor.
    weight_capacity:
      name: Ağırlık kapasitesi
      description: Ürünün destekleyebileceği maksimum yük, müşterinin kullanım amacı
        için yeterli değil.
    wheels_stick:
      name: Tekerlekler takılıyor
      description: Dönme mekanizması düzgün hareket etmiyor.
    whitening_results:
      name: Beyazlatma sonuçları
      description: Elde edilen renk değişimi beklenenden daha az.
    width:
      name: Genişlik
      description: Ürün, yanlamasına genişliği nedeniyle müşterinin istediği yere
        sığmıyor veya kullanım alanına uygun değil.
    wind_resistance:
      name: Rüzgar direnci
      description: Ürünün rüzgarı engelleme özelliği, amaçlanan koşullar veya faaliyet
        için uygun değil.
    wrong_amount:
      name: Yanlış miktar
      description: Teslim alınan ürün adedi, sipariş edilenden veya beklenenden farklı.
    wrong_dosage:
      name: Yanlış dozaj
      description: Etken maddenin gücü veya konsantrasyonu, gereken seviyeyi karşılamıyor.
    wrong_format:
      name: Yanlış format
      description: Medya türü veya fiziksel yapısı müşterinin cihazı ya da tercihleriyle
        uyumlu değil.
    wrong_hand:
      name: Yanlış el
      description: Ürün, müşterinin ihtiyacına uygun olmayan el kullanımına (sağ/sol)
        göre tasarlanmış.
