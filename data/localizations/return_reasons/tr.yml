---
tr:
  return_reasons:
    absorbency:
      name: Emicilik
      description: Malzemenin sıvıyı emme ve tutma kapasitesi yetersiz veya çok fazla.
    absorption:
      name: Emicilik
      description: Ürün, yüzeyler veya gövde tarafından beklendiği gibi emilmiyor.
    academic_level:
      name: Akademik seviye
      description: İçeriğin karmaşıklık düzeyi veya derinliği, müşterinin eğitim ihtiyaçlarına
        uygun değil.
    accuracy:
      name: Doğruluk
      description: Cihaz tarafından sağlanan ölçümler veya veriler yeterince hassas
        değil.
    adhesion:
      name: Yapışkanlık
      description: Ürün, hedeflenen yüzeyle güvenli bir ilk bağ oluşturmuyor.
    adhesive:
      name: Yapışkan
      description: Ürünün yapışma özellikleri, amaçlanan kullanıma uygun değil.
    adhesive_strength:
      name: Yapışma gücü
      description: Yapıştırıcının tutma gücü, amaçlanan yük veya gerilim için yetersiz
        ya da çok fazla.
    adjustability:
      name: Ayarlanabilirlik
      description: Ürün, müşterinin ihtiyaçlarına uygun hale getirilmek üzere gerektiği
        şekilde değiştirilemiyor veya boyutlandırılamıyor.
    age:
      name: Yaş
      description: Ürünün yaşı, eskiliği veya üretim tarihi beklendiği gibi değil.
    age_range:
      name: Yaş aralığı
      description: Ürün için önerilen yaş grubu, hedeflenen kullanıcıyla uyuşmuyor.
    age_restriction:
      name: Yaş kısıtlaması
      description: Ürün, minimum veya maksimum yaş gereklilikleri açısından kullanım
        sınırlamalarına tabi.
    amperage:
      name: Amper
      description: Elektrik akımı değeri, müşterinin cihazına veya sistem gerekliliklerine
        uygun değil.
    angle:
      name: Açı
      description: Eğim veya bükülme açısı, müşterinin ihtiyaçlarına uymuyor.
    animal_didnt_like:
      name: Hayvan beğenmedi
      description: Hayvan, ürünü tüketmeyi veya ürünle etkileşime girmeyi reddetti.
    animal_refused:
      name: Hayvan kabul etmedi
      description: Hayvan bu ürünü kullanmıyor veya tüketmiyor.
    application:
      name: Uygulama
      description: Ürünü uygulamak için gereken yöntem, fazla hassas, aşırı karmaşık
        ya da kullanıcı hatasına açık.
    applicator:
      name: Aplikatör
      description: Verilen alet, ürünü eşit olmayan veya kontrolsüz bir şekilde dağıtıyor.
    arrived_late:
      name: Geç geldi
      description: Teslimat, beklenen tarihten veya gereken süreden sonra gerçekleşti.
    articulation:
      name: Eklem yapısı
      description: Ürünün birleşim yerlerindeki hareket aralığı veya kalitesi müşterinin
        ihtiyaçlarını karşılamıyor.
    artificial_tasting:
      name: Yapay tat
      description: Lezzet, yapay veya doğal olmayan bir tat veriyor.
    assembly:
      name: Montaj
      description: Müşteri, ürünün hazır kurulu gelmesini beklediği hâlde ürün montaj
        gerektiriyor.
    assortment:
      name: Çeşitlilik
      description: Paketin ürün çeşitliliği, müşterinin istediği gibi değil.
    baby_refused:
      name: Bebek reddetti
      description: Küçük çocuk ürünü kullanmıyor veya kabul etmiyor.
    balance:
      name: Denge
      description: Ürünün içindeki ağırlık dağılımı, ürünün kullanımını veya dengesini
        olumsuz etkiliyor.
    band_rolls_down:
      name: Bant aşağı kayıyor
      description: Ürün yerinde durmuyor ve vücuttan aşağı kayıyor.
    band_rolls_up:
      name: Şerit kıvrılıyor
      description: Lastik veya kumaş bant yerinde durmuyor, vücutta yukarı doğru kayıyor.
    band_too_big:
      name: Bant çok büyük
      description: Bant çevresi çok geniş olduğu için ürün vücuda tam oturmuyor ve
        güvenli bir şekilde sabitlenmiyor.
    band_too_loose:
      name: Şerit çok gevşek
      description: Bant çevresi fazla geniş olduğu için güvenli şekilde oturmuyor.
    band_too_small:
      name: Bant çok küçük
      description: Bant çevresi yetersiz olduğu için vücuda baskı yapıyor.
    band_too_thick:
      name: Şerit çok kalın
      description: Bant, müşterinin beklentilerini karşılamayacak şekilde geniş.
    band_too_thin:
      name: Şerit çok ince
      description: Bandın genişliği konfor veya destek için yetersiz.
    band_too_tight:
      name: Şerit çok sıkı
      description: Bant vücudu rahatsız edici şekilde sıkıyor.
    barrel_size:
      name: Uç kısım kalınlığı
      description: Saç maşasının veya şekillendirme aletinin çapı, istenen model için
        uygun değil.
    base_curve:
      name: Temel eğri
      description: Lensin kavis derecesi, müşterinin göz yapısına veya reçetesine
        uymuyor.
    battery_life:
      name: Pil ömrü
      description: Cihazın tek şarjla çalışma süresi, müşterinin beklentisini karşılamıyor.
    bitterness:
      name: Acılık
      description: Lezzet profilinde rahatsız edici derecede keskin veya buruk bir
        tat var.
    blade_type:
      name: Bıçak türü
      description: Bıçağın tarzı veya kesici kenarı, müşterinin kullanımına uygun
        değil.
    board_volume:
      name: Board hacmi
      description: Tahtanın deplasman hacmi, kullanıcının kilosu için yetersiz veya
        fazla yüzdürme sağlıyor.
    bounce:
      name: Esneklik
      description: Öğenin geri tepme kapasitesi, faaliyet için çok yüksek veya çok
        düşük.
    breaks_easily:
      name: Kolay kırılıyor
      description: Ürün, normal kullanımda kırılganlık belirtileri gösteriyor veya
        yeterince dayanıklı değil.
    breathability:
      name: Nefes alabilirlik
      description: Malzeme nemin geçmesine izin vermiyor; bu da bunalmaya veya yapış
        yapış bir hisse neden oluyor.
    brightness:
      name: Parlaklık
      description: Ürünün yaydığı veya yansıttığı ışığın yoğunluğu, müşterinin tercihine
        uymuyor.
    bristles_too_coarse:
      name: Kıllar çok sert
      description: Fırça, amaçlanan iş için fazla sert veya tahriş edici.
    bristles_too_soft:
      name: Fırça kılları çok yumuşak
      description: Fırça, amaçlanan iş için fazla yumuşak.
    bubble_output:
      name: Baloncuk çıkışı
      description: Oluşan kabarcıkların miktarı veya boyutu beklendiği gibi değil.
    budget:
      name: Bütçe
      description: Hizmetin maliyeti, müşterinin bütçesini aşıyor.
    buoyancy:
      name: Kaldırma kuvveti
      description: Ürünün suda yüzme veya ağırlık taşıma performansı, müşterinin ihtiyacını
        karşılamıyor.
    burn_rate:
      name: Yanma hızı
      description: Ürünün yanarak tükenme hızı beklenenden daha hızlı veya daha yavaş.
    burn_time:
      name: Yanma süresi
      description: Ürünün yanma süresi beklenenden daha kısa veya daha uzun.
    bust_too_big:
      name: Göğüs kısmı çok büyük
      description: Giysinin göğüs bölgesi, müşterinin vücudu için fazla büyük.
    bust_too_loose:
      name: Göğüs kısmı çok bol
      description: Göğüs çevresine doğru bir şekilde oturmuyor.
    bust_too_small:
      name: Göğüs kısmı çok küçük
      description: Ürünün göğüs kısmı müşterinin vücuduna göre çok dar.
    bust_too_tight:
      name: Göğüs kısmı çok dar
      description: Ürün, göğüs çevresini rahatsız edecek şekilde sıkıyor.
    buttons_not_accessible:
      name: Düğmelere erişilemiyor
      description: Kılıf veya kapak, cihazın kontrollerini kapatıyor ve kullanımı
        engelliyor.
    caffeine_level:
      name: Kafein seviyesi
      description: Üründeki kafein oranı, kullanıcı için fazla yüksek veya fazla düşük.
    caliber:
      name: Kalibre
      description: Kovanın veya namlunun belirtilen çapı, müşterinin ekipmanıyla uyumsuz.
    calibration:
      name: Kalibrasyon
      description: Cihazı bilinen bir standarda göre ayarlama işlemi zor veya beklendiği
        gibi çalışmıyor.
    capacity:
      name: Kapasite
      description: Ürünün alabileceği veya işleyebileceği hacim, müşterinin gereksinimlerini
        karşılamıyor.
    carbonation:
      name: Karbonasyon
      description: İçeceğin gazlılık seviyesi fazla yüksek veya fazla düşük.
    caused_allergic_reaction:
      name: Alerjik reaksiyona neden oldu
      description: Ürün, kurdeşen, şişme veya şiddetli döküntü gibi belirgin bir alerjik
        reaksiyona neden oldu.
    caused_irritation:
      name: Tahrişe neden oldu
      description: Ürün, ciltte veya vücutta rahatsızlığa neden oldu.
    changed_my_mind:
      name: Fikrimi değiştirdim
      description: Müşteri, ürünün kalitesinden bağımsız olarak artık ürünü istemiyor.
    charging_speed:
      name: Şarj hızı
      description: Cihazın bataryası çok geç doluyor.
    chest_too_big:
      name: Göğüs kısmı çok büyük
      description: Ürünün göğüs ölçüsü müşteri için çok büyük.
    chest_too_small:
      name: Göğüs kısmı çok küçük
      description: Giysinin göğüs ölçüsü, müşteri için fazla küçük.
    clarity:
      name: Netlik
      description: Ürünün şeffaflık seviyesi, müşterinin gereksinimlerini karşılamıyor.
    cleaning:
      name: Temizlik
      description: Ürün, beklendiği kadar kolay temizlenmiyor.
    closeness:
      name: Yakınlık
      description: Aletin sağladığı tıraş veya kesim, istenen kadar dipten olmuyor.
    closure:
      name: Kapanma şekli
      description: Ürünün açma veya kapama mekanizması zor çalışıyor ya da sağlam
        değil.
    cold_duration:
      name: Soğuk kalma süresi
      description: Ürün, müşterinin ihtiyaç duyduğu süre boyunca soğuk kalmıyor.
    collar_too_loose:
      name: Yaka çok bol
      description: Yaka boyuna oturmuyor.
    collar_too_tight:
      name: Yaka çok dar
      description: Yaka, boynu rahatsız edecek şekilde sıkıyor.
    color:
      name: Renk
      description: Ürünün rengi, tonu veya görünümü müşterinin tercihine ya da beklentisine
        uymuyor.
    color_too_bright:
      name: Renk çok parlak
      description: Rengin yoğunluğu veya canlılığı müşteriye göre çok fazla.
    color_too_muted:
      name: Renk çok soluk
      description: Rengin yoğunluğu veya canlılığı müşteriye göre yeterli değil.
    comfort:
      name: Rahatlık
      description: Ürünün verdiği fiziksel his veya ergonomik performans beklentiyi
        karşılamıyor.
    compartments:
      name: Bölmeler
      description: Saklama bölmelerinin sayısı veya düzeni, müşterinin düzenleme ihtiyacına
        uymuyor.
    compliance:
      name: Uygunluk
      description: Ürün, müşterinin istediği belirli yasal veya kurumsal standartları
        karşılamıyor.
    compression:
      name: Sıkıştırma
      description: Ürünün sıkıştırma seviyesi fazla yüksek veya fazla düşük.
    condition:
      name: Durum
      description: Ürünün korunma durumu, küçük aşınma veya kusurlar dahil olmak üzere,
        ilan edilen derece veya açıklamayla uyuşmuyor
    configuration:
      name: Yapılandırma
      description: Modüler parçaların yerleşimi veya birbirine bağlanma şekli, amaçlanan
        kullanım için uygun değil.
    connectivity:
      name: Bağlantı
      description: Cihazın ağlara veya diğer cihazlara bağlanma performansı güvenilir
        değil.
    consistency:
      name: Kıvam
      description: Sıvı veya yarı katı ürünün kıvamı, yoğunluğu veya akışkanlığı beklendiği
        gibi değil.
    content:
      name: İçerik
      description: Ürünün içinden çıkan bilgiler veya materyal, müşterinin beklediği
        gibi değil.
    cook_time:
      name: Pişirme süresi
      description: Yiyecek ürününü hazırlamak için gereken süre tatmin edici veya
        beklendiği gibi değil.
    cooling:
      name: Soğutma
      description: Cihazın soğutma performansı yetersiz.
    coverage:
      name: Kapatıcılık
      description: Ürünün bir yüzeyi kapatma, koruma veya yüzeye uygulanma düzeyi,
        müşterinin ihtiyaçlarını karşılamıyor.
    cuff_too_big:
      name: Manşet çok büyük
      description: Bilek veya kol açıklığı fazla bol.
    cuff_too_small:
      name: Manşet çok küçük
      description: Bilek veya kol açıklığı fazla dar.
    cups_gaping:
      name: Kaplarda boşluk kalıyor
      description: Sütyen kapları vücuda oturmuyor ve boşluk yapıyor.
    cups_too_big:
      name: Kaplar çok büyük
      description: Ürünün kap büyüklüğü müşterinin göğüs ölçüsüne göre çok büyük.
    cups_too_loose:
      name: Kaplar çok bol
      description: Kaplar yeterince iyi oturmuyor ve yeterince destek sağlamıyor.
    cups_too_small:
      name: Kaplar çok küçük
      description: Ürünün kap büyüklüğü müşterinin göğüs ölçüsüne göre çok küçük.
    cups_too_thick:
      name: Kaplar çok kalın
      description: Kaplardaki dolgu veya malzeme çok kalın.
    cups_too_thin:
      name: Kaplar çok ince
      description: Kaplarda yeterli dolgu veya kapatıcılık yok.
    cups_too_tight:
      name: Kaplar çok dar
      description: Kaplar göğsü rahatsız edecek şekilde sıkıştırıyor.
    cushioning:
      name: Yastıklama
      description: Malzemenin yumuşaklığı veya darbe emme performansı beklendiği gibi
        değil.
    damaged_after_use:
      name: Kullandıktan sonra hasar gördü
      description: Ürün normal kullanım sonrası yıpranma veya kırılma belirtileri
        gösteriyor.
    damaged_after_washing:
      name: Yıkadıktan sonra hasar gördü
      description: Ürün, temizleme işlemi sırasında zarar gördü.
    damaged_after_wear:
      name: Giydikten sonra hasar gördü
      description: Ürün, vücutta kullanıldıktan sonra hasar belirtileri gösteriyor.
    damaged_or_defective:
      name: Hasarlı veya kusurlu
      description: Ürün fiziksel hasar veya üretim hatasıyla geldi ya da amaçlandığı
        gibi çalışmıyor.
    damaged_packaging:
      name: Ambalaj hasarlı
      description: Dış kutu hasarlı bir şekilde ulaştı.
    depth:
      name: Derinlik
      description: Önden arkaya veya yukarıdan aşağıya doğru yapılan ölçü, müşterinin
        alanı ya da yerleşimi için uygun değil.
    detail:
      name: Ayrıntı
      description: Ürünün tasarımındaki veya çıktısındaki karmaşıklık ya da hassasiyet
        düzeyi yetersiz.
    detection_range:
      name: Algılama menzili
      description: Cihazın algılama bölgesinin mesafesi veya kapsadığı alan, amaçlanan
        kullanım için uygun değil.
    diameter:
      name: Çap
      description: Dairesel kesitin genişliği, amaçlanan kullanım veya uyumluluk gereksinimlerine
        uymuyor.
    dietary_requirements:
      name: Diyet gereksinimleri
      description: Ürün, müşterinin sağlık ihtiyaçları veya yaşam tarzı tercihleriyle
        uyuşmayan bileşenler içermekte.
    difficult_to_adjust:
      name: Ayarlaması zor
      description: Ürünü ayarlama veya ayarlarını değiştirme mekanizmaları kullanımı
        zor.
    difficult_to_assemble:
      name: Montajı zor
      description: Ürünü birleştirme süreci gereğinden zor; adımlar karmaşık veya
        talimatlar net değil.
    difficult_to_blend:
      name: Karıştırması zor
      description: Ürün diğer maddelerle veya yüzeylerle homojen bir şekilde karışmıyor.
    difficult_to_clean:
      name: Temizlemesi zor
      description: Ürünün tasarımı veya malzemesi, doğru yöntemle bile temizlemeyi
        zorlaştırıyor.
    difficult_to_fasten:
      name: Kapatması zor
      description: Kapatma mekanizmasını sabitlemek fazla güç veya el becerisi gerektiriyor.
    difficult_to_fold:
      name: Katlaması zor
      description: Ürünü katlamak veya kapatmak beklenenden daha zor ve zahmetli.
    difficult_to_install:
      name: Kurulumu zor
      description: Kurulum süreci, müşterinin beklediğinden daha fazla çaba veya beceri
        gerektiriyor.
    difficult_to_refill:
      name: Yeniden doldurması zor
      description: Ürünü yeniden doldurma işlemi zorlayıcı veya karmaşık.
    difficult_to_use:
      name: Kullanımı zor
      description: Ürünü çalıştırmak beklenenden daha fazla beceri veya çaba gerektiriyor.
    difficulty_level:
      name: Zorluk seviyesi
      description: Ürünün zorluk seviyesi, kullanıcının beceri düzeyine uygun değil.
    dispenser:
      name: Dağıtıcı
      description: Ürünün dozajlama/akıtma mekanizması tatmin edici değil.
    doesnt_apply_evenly:
      name: Eşit uygulanmıyor
      description: Ürün uygulama sırasında lekeler veya çizgiler bırakıyor.
    doesnt_blend_well:
      name: İyi karışmıyor
      description: Ürün, diğer maddelerle homojen bir şekilde karışmıyor ya da yüzeye
        düzgün yayılmıyor.
    doesnt_dissolve_well:
      name: İyi çözünmüyor
      description: Ürün, sıvıya homojen bir şekilde karışmak yerine kalıntı veya topak
        bırakıyor.
    doesnt_fit_bed_frame:
      name: Karyolaya uymuyor
      description: Yatak veya yatak takımı ölçüleri, belirli karyola ölçüsüne uymuyor.
    doesnt_fit_mattress:
      name: Yatağa uymuyor
      description: Yatak takımı ölçüleri, yatak ölçüsüne uymuyor.
    doesnt_fit_phone:
      name: Telefona uymuyor
      description: Aksesuarın ölçüleri, belirli telefon modeline uymuyor.
    doesnt_fit_tv:
      name: TV'ye uymuyor
      description: Ürünün ölçüleri veya montaj aparatı, müşterinin televizyonuna uymuyor.
    doesnt_stay_closed:
      name: Kapalı kalmıyor
      description: Mandal veya kilitleme mekanizması sağlam şekilde tutmuyor.
    drainage:
      name: Drenaj
      description: Ürün, sıvının düzgün şekilde akmasına izin vermiyor.
    draw_length:
      name: Çekme mesafesi
      description: Yay kirişinin geri çekilebildiği mesafe, okçunun kol erişimine
        uymuyor.
    draw_weight:
      name: Çekme ağırlığı
      description: Yay kirişini çekmek için gereken güç, okçu için fazla yüksek veya
        fazla hafif.
    dried_out:
      name: Kurumuş
      description: Ürün, erken kuruyup nemini kaybediyor; bu da kullanımı etkiliyor.
    drying:
      name: Kurutucu
      description: Ürün; cildin, saçların veya diğer yüzeylerin kurumasına neden oluyor.
    drying_speed:
      name: Kuruma hızı
      description: Ürünün kuruması veya sabitlenmesi beklenenden daha yavaş veya daha
        hızlı.
    duplicate_order:
      name: Mükerrer sipariş
      description: Müşteri ürünü yanlışlıkla birden fazla kez sipariş etmiş.
    duration:
      name: Süre
      description: Hizmet, etkinlik veya erişim süresi beklenenden daha kısa veya
        daha uzun.
    dye_transferred:
      name: Boya verdi
      description: Ürünün boyası başka yüzeylere veya giysilere bulaştı.
    edition:
      name: Sürüm
      description: Ürünün sürümü veya versiyonu, müşterinin istediği değil.
    effectiveness:
      name: Etkililik
      description: Ürün ana işlevini yerine getirmiyor veya vaat edilen faydaları
        beklenen standartta sunmuyor.
    efficiency:
      name: Verimlilik
      description: Ürünün çalışması için tükettiği yakıt veya enerji beklenenden fazla.
    embellishment_fell_off:
      name: Süsü düştü
      description: Dekoratif parçalar üründen koptu.
    energy_efficiency:
      name: Enerji verimliliği
      description: Ürün, sağladığı performansa göre fazla enerji tüketiyor.
    eye_strain:
      name: Göz yorgunluğu
      description: Ürünü kullanmak göz yorgunluğuna veya göz rahatsızlığına neden
        oluyor.
