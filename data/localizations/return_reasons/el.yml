---
el:
  return_reasons:
    absorbency:
      name: Απορροφητικότητα
      description: Η ικανότητα του υλικού να απορροφά και να συγκρατεί υγρά είναι
        ανεπαρκής ή υπερβολική.
    absorption:
      name: Απορρόφηση
      description: Το προϊόν δεν απορροφάται σε μια επιφάνεια ή στο σώμα όπως αναμένεται.
    academic_level:
      name: Ακαδημαϊκό επίπεδο
      description: Η πολυπλοκότητα ή το βάθος του περιεχομένου δεν είναι κατάλληλα
        για τις εκπαιδευτικές ανάγκες του πελάτη.
    accuracy:
      name: Ακρίβεια
      description: Οι μετρήσεις ή τα δεδομένα που παρέχονται από τη συσκευή δεν είναι
        αρκετά ακριβή.
    adhesion:
      name: Πρόσφυση
      description: Το προϊόν δε δημιουργεί μία ασφαλή αρχική πρόσφυση με την επιλεγμένη
        επιφάνεια.
    adhesive:
      name: Κολλητική ουσία
      description: Οι ιδιότητες κολλώδους υφής του προϊόντος δεν είναι κατάλληλες
        για την προβλεπόμενη χρήση.
    adhesive_strength:
      name: Ισχύς συγκόλλησης
      description: Η ισχύς συγκράτησης της κόλλας είναι ανεπαρκής ή υπερβολική για
        το προβλεπόμενο φορτίο ή την καταπόνηση.
    adjustability:
      name: Δυνατότητα προσαρμογής
      description: Το κομμάτι δεν μπορεί να τροποποιηθεί ή να αλλάξει μέγεθος επαρκώς
        ώστε να ταιριάζει στις ανάγκες του πελάτη.
    age:
      name: Ηλικία
      description: Η ηλικία, η χρονολογία παραγωγής ή η ημερομηνία παραγωγής του προϊόντος
        δεν είναι η αναμενόμενη.
    age_range:
      name: Εύρος ηλικιών
      description: Η προτεινόμενη ηλικιακή ομάδα για το κομμάτι δεν Align με τον προβλεπόμενο
        χρήστη.
    age_restriction:
      name: Περιορισμός ηλικίας
      description: Το προϊόν έχει περιορισμούς χρήσης βάσει ελάχιστων ή μέγιστων απαιτήσεων
        ηλικίας.
    amperage:
      name: Ένταση ρεύματος
      description: Η βαθμολογία ηλεκτρικού ρεύματος δεν είναι κατάλληλη για τις απαιτήσεις
        της συσκευής ή του συστήματος του πελάτη.
    angle:
      name: Γωνία
      description: Ο βαθμός κλίσης ή κάμψης δεν ταιριάζει με τις απαιτήσεις της πελάτης.
    animal_didnt_like:
      name: Δεν άρεσε στο ζώο
      description: Το ζώο αρνήθηκε να καταναλώσει ή να αλληλεπιδράσει με το προϊόν.
    animal_refused:
      name: Άρνηση από το ζώο
      description: Το ζώο δε θα χρησιμοποιούσε ούτε θα κατανάλωνε το προϊόν.
    application:
      name: Εφαρμογή
      description: Η απαιτούμενη μέθοδος για την εφαρμογή του προϊόντος είναι άκαμπτη,
        υπερβολικά περίπλοκη ή επιρρεπής σε σφάλματα από τον χρήστη.
    applicator:
      name: Απλικατέρ
      description: Το παρεχόμενο εργαλείο κατανέμει το προϊόν με ανομοιόμορφο ή ανεξέλεγκτο
        τρόπο.
    arrived_late:
      name: Έφτασε αργά
      description: Η παράδοση πραγματοποιήθηκε μετά την αναμενόμενη ημερομηνία ή την
        απαιτούμενη ώρα.
    articulation:
      name: Άρθρωση
      description: Το εύρος ή η ποιότητα της κίνησης των αρθρώσεων στο κομμάτι δεν
        ανταποκρίνεται στις ανάγκες του πελάτη.
    artificial_tasting:
      name: Τεχνητή γεύση
      description: Η γεύση έχει μια αφύσικη ή συνθετική ποιότητα.
    assembly:
      name: Συναρμολόγηση
      description: Το προϊόν απαιτεί συναρμολόγηση όταν ο πελάτης ανέμενε ότι θα ήταν
        προσυναρμολογημένο.
    assortment:
      name: Ποικιλία
      description: Η ποικιλία των κομματιών που περιλαμβάνεται στη συσκευασία δεν
        είναι αυτό που ήθελε ο πελάτης.
    baby_refused:
      name: Το μωρό το αρνήθηκε
      description: Το βρέφος δε θα χρησιμοποιούσε ούτε θα δεχόταν το κομμάτι.
    balance:
      name: Ισορροπία
      description: Η διανομή του βάρους μέσα στο κομμάτι επηρεάζει τη διακίνηση ή
        τη σταθερότητά του με ανεπιθύμητο τρόπο.
    band_rolls_down:
      name: Η φάσα γυρίζει
      description: Το ένδυμα δε μένει στη θέση του και γλιστράει κατά μήκος του σώματος.
    band_rolls_up:
      name: Η ζώνη μαζεύει
      description: Η ελαστική ή υφασμάτινη ζώνη δεν παραμένει στη θέση της και γλιστράει
        προς τα πάνω στο σώμα.
    band_too_big:
      name: Πολύ μεγάλη φάσα
      description: Η περιφέρεια της ζώνης είναι υπερβολική, εμποδίζοντας τη σταθερή
        εφαρμογή στο σώμα.
    band_too_loose:
      name: Πολύ χαλαρή ζώνη
      description: Η περιφέρεια της ζώνης δεν εφαρμόζει σταθερά.
    band_too_small:
      name: Πολύ μικρή φάσα
      description: Η περιφέρεια της ζώνης είναι ανεπαρκής, προκαλώντας περίσφιξη στο
        σώμα.
    band_too_thick:
      name: Πολύ χοντρή ζώνη
      description: Το πλάτος της ζώνης είναι υπερβολικό για τις προτιμήσεις του πελάτη.
    band_too_thin:
      name: Πολύ λεπτή ζώνη
      description: Το πλάτος της ζώνης είναι ανεπαρκές για άνεση ή υποστήριξη.
    band_too_tight:
      name: Πολύ στενή ζώνη
      description: Η ζώνη σφίγγει άβολα γύρω από το σώμα.
    barrel_size:
      name: Μέγεθος κυλίνδρου
      description: Η διάμετρος του ψαλιδιού ή του εργαλείου για μπούκλες δεν είναι
        το σωστό μέγεθος για το επιθυμητό αποτέλεσμα.
    base_curve:
      name: Καμπύλη βάσης
      description: Η καμπυλότητα του φακού δεν ταιριάζει με το σχήμα του ματιού του
        πελάτη ή τις απαιτήσεις της συνταγής.
    battery_life:
      name: Διάρκεια μπαταρίας
      description: Η διάρκεια λειτουργίας της συσκευής με μία μόνο φόρτιση δεν ανταποκρίνεται
        στις προσδοκίες του πελάτη.
    bitterness:
      name: Πικράδα
      description: Το γευστικό προφίλ έχει μια δυσάρεστα έντονη ή δυσάρεστα έντονη
        γεύση.
    blade_type:
      name: Τύπος λεπίδας
      description: Το συγκεκριμένο στυλ ή κόψη της λεπίδας δεν είναι κατάλληλο για
        τη χρήση της πελάτης.
    board_volume:
      name: Όγκος σανίδας
      description: Ο όγκος μετατόπισης της σανίδας παρέχει ανεπαρκή ή υπερβολική άνωση
        για το βάρος του χρήστη.
    bounce:
      name: Αναπήδηση
      description: Η ικανότητα ανάκαμψης του κομματιού είναι είτε πολύ υψηλή είτε
        πολύ χαμηλή για τη δραστηριότητα.
    breaks_easily:
      name: Σπάει εύκολα
      description: Το κομμάτι παρουσιάζει σημάδια ευθραυστότητας ή έλλειψης ανθεκτικότητας
        υπό κανονική χρήση.
    breathability:
      name: Διαπνοή
      description: Το υλικό δεν επιτρέπει την διέλευση της υγρασίας, προκαλώντας υπερθέρμανση
        ή μια αίσθηση υγρασίας.
    brightness:
      name: Φωτεινότητα
      description: Η ένταση του φωτός που εκπέμπεται ή ανακλάται από το κομμάτι δεν
        ανταποκρίνεται στις προτιμήσεις του πελάτη.
    bristles_too_coarse:
      name: Πολύ σκληρές τρίχες
      description: Η βούρτσα είναι πολύ σκληρή ή τραχιά για την προβλεπόμενη εργασία.
    bristles_too_soft:
      name: Πολύ μαλακές τρίχες
      description: Η βούρτσα είναι πολύ απαλή για την προβλεπόμενη εργασία.
    bubble_output:
      name: Παραγωγή φυσαλίδων
      description: Η ποσότητα ή το μέγεθος των φυσαλίδων που παράγονται δεν είναι
        το αναμενόμενο.
    budget:
      name: Προϋπολογισμός
      description: Το κόστος της υπηρεσίας υπερβαίνει τους οικονομικούς περιορισμούς
        του πελάτη.
    buoyancy:
      name: Άνωση
      description: Η ικανότητα του κομματιού να επιπλέει ή να υποστηρίζει το βάρος
        στο νερό δεν ανταποκρίνεται στις ανάγκες του πελάτη.
    burn_rate:
      name: Ρυθμός καύσης
      description: Ο ρυθμός με τον οποίο καταναλώνεται το κομμάτι μέσω της καύσης
        είναι είτε ταχύτερος είτε βραδύτερος από τον αναμενόμενο.
    burn_time:
      name: Χρόνος καύσης
      description: Η διάρκεια καύσης του κομματιού είναι μικρότερη ή μεγαλύτερη από
        την αναμενόμενη.
    bust_too_big:
      name: Πολύ μεγάλο στο στήθος
      description: Η περιοχή του στήθους του ενδύματος είναι πολύ μεγάλη για το σώμα
        της πελάτισσας.
    bust_too_loose:
      name: Πολύ φαρδύ στο στήθος
      description: Η εφαρμογή γύρω από την περιοχή του στήθους δεν είναι αρκετά σταθερή.
    bust_too_small:
      name: Πολύ μικρό στο στήθος
      description: Η περιοχή του στήθους του ενδύματος είναι πολύ μικρή για το σώμα
        του πελάτη.
    bust_too_tight:
      name: Πολύ στενό στο στήθος
      description: Το ένδυμα σφίγγει δυσάρεστα την περιοχή του στήθους.
    buttons_not_accessible:
      name: Τα κουμπιά δεν είναι προσβάσιμα
      description: Η θήκη ή το κάλυμμα μπλοκάρει τα χειριστήρια της συσκευής, εμποδίζοντας
        τη χρήση.
    caffeine_level:
      name: Επίπεδο καφεΐνης
      description: Η συγκέντρωση καφεΐνης στο προϊόν είναι πολύ υψηλή ή πολύ χαμηλή
        για τον χρήστη.
    caliber:
      name: Διαμέτρημα
      description: Η καθορισμένη διάμετρος του βλήματος ή της κάννης είναι ασύμβατη
        με τον εξοπλισμό του πελάτη.
    calibration:
      name: Βαθμονόμηση
      description: Η διαδικασία ρύθμισης ή προσαρμογής της συσκευής σε ένα γνωστό
        πρότυπο είναι δύσκολη ή δε λειτουργεί όπως αναμένεται.
    capacity:
      name: Χωρητικότητα
      description: Ο όγκος ή η ποσότητα που μπορεί να χωρέσει ή να επεξεργαστεί το
        κομμάτι δεν πληροί τις απαιτήσεις του πελάτη.
    carbonation:
      name: Ανθράκωση
      description: Η στάθμη αφρίσματος ή φυσαλίδων στο ποτό είναι πολύ υψηλή ή πολύ
        χαμηλή.
    caused_allergic_reaction:
      name: Προκάλεσε αλλεργική αντίδραση
      description: Το προϊόν προκάλεσε μια συγκεκριμένη και σημαντική αλλεργική αντίδραση,
        όπως κνίδωση, οίδημα ή σοβαρό εξάνθημα.
    caused_irritation:
      name: Προκάλεσε ερεθισμό
      description: Το προϊόν προκάλεσε δερματική ή σωματική δυσφορία.
    changed_my_mind:
      name: Άλλαξα γνώμη
      description: Ο πελάτης δεν επιθυμεί πλέον το κομμάτι μετά την αγορά του, ανεξάρτητα
        από την ποιότητα ή την ακρίβεια του προϊόντος.
    charging_speed:
      name: Ταχύτητα φόρτισης
      description: Η συσκευή χρειάζεται υπερβολικό χρόνο για την επαναφόρτιση της
        μπαταρίας της.
    chest_too_big:
      name: Πολύ μεγάλο στο στήθος
      description: Η μέτρηση του στήθους του ενδύματος είναι πολύ μεγάλη για τον πελάτη.
    chest_too_small:
      name: Πολύ μικρό στο στήθος
      description: Η μέτρηση στήθους του ενδύματος είναι πολύ μικρή για τον πελάτη.
    clarity:
      name: Διαύγεια
      description: Η οπτική διαφάνεια του κομματιού δεν ανταποκρίνεται στις απαιτήσεις
        του πελάτη.
    cleaning:
      name: Καθαρισμός
      description: Το κομμάτι δεν καθαρίζεται τόσο εύκολα όσο αναμένεται.
    closeness:
      name: Εγγύτητα
      description: Το ξύρισμα ή το κούρεμα που παρέχεται από το εργαλείο δεν είναι
        τόσο βαθύ όσο επιθυμείτε.
    closure:
      name: Κλείσιμο
      description: Ο μηχανισμός ανοίγματος ή κλεισίματος του κομματιού είναι δύσκολος
        στον χειρισμό ή ασταθής.
    cold_duration:
      name: Διάρκεια ψύξης
      description: Το κομμάτι δεν παραμένει κρύο για όσο χρόνο απαιτεί ο πελάτης.
    collar_too_loose:
      name: Πολύ φαρδύς γιακάς
      description: Το κολάρο δεν εφαρμόζει σταθερά γύρω από τον λαιμό.
    collar_too_tight:
      name: Πολύ στενός γιακάς
      description: Ο γιακάς σφίγγει δυσάρεστα γύρω από τον λαιμό.
    color:
      name: Χρώμα
      description: Η απόχρωση, ο τόνος ή η οπτική εμφάνιση του κομματιού δεν ταιριάζει
        με τις προτιμήσεις ή τις προσδοκίες του πελάτη.
    color_too_bright:
      name: Πολύ έντονο χρώμα
      description: Η ένταση ή η ζωντάνια του χρώματος είναι υπερβολική για το γούστο
        του πελάτη.
    color_too_muted:
      name: Πολύ θαμπό χρώμα
      description: Το χρώμα δεν έχει επαρκή ζωντάνια ή ένταση για τις προτιμήσεις
        του πελάτη.
    comfort:
      name: Άνεση
      description: Η φυσική αίσθηση ή η εργονομική απόδοση του κομματιού δεν ανταποκρίνεται
        στις προσδοκίες.
    compartments:
      name: Θήκες
      description: Ο αριθμός ή η διάταξη των τμημάτων αποθήκευσης δεν ανταποκρίνεται
        στις οργανωτικές ανάγκες του πελάτη.
    compliance:
      name: Συμμόρφωση
      description: Το προϊόν δεν πληροί συγκεκριμένα ρυθμιστικά ή οργανωτικά πρότυπα
        που απαιτούνται από τον πελάτη.
    compression:
      name: Συμπίεση
      description: Το επίπεδο πίεσης που ασκείται από το ένδυμα είναι είτε υπερβολικό
        είτε ανεπαρκές.
    condition:
      name: Κατάσταση
      description: Η κατάσταση διατήρησης του κομματιού, συμπεριλαμβανομένων μικρών
        φθορών ή ατελειών, δεν ταιριάζει με την διαφημιζόμενη ποιότητα ή περιγραφή
        του.
    configuration:
      name: Διαμόρφωση
      description: Ο τρόπος με τον οποίο μπορούν να διαταχθούν ή να διασυνδεθούν τα
        αρθρωτά μέρη του κομματιού είναι ακατάλληλος για την προβλεπόμενη εφαρμογή.
    connectivity:
      name: Συνδεσιμότητα
      description: Η ικανότητα της συσκευής να συνδέεται με το δίκτυο ή άλλη συσκευή
        είναι αναξιόπιστη ή ανεπαρκής.
    consistency:
      name: Σύσταση
      description: Το πάχος, το σώμα ή η ροή ενός υγρού ή ημιστερεού προϊόντος δεν
        είναι τα αναμενόμενα.
    content:
      name: Περιεχόμενο
      description: Οι πληροφορίες ή το υλικό που περιλαμβάνεται στο κομμάτι δεν είναι
        αυτά που ανέμενε ο πελάτης.
    cook_time:
      name: Χρόνος μαγειρέματος
      description: Ο χρόνος που απαιτείται για την προετοιμασία του τροφίμου δεν είναι
        ικανοποιητικός ή δεν είναι ο αναμενόμενος.
    cooling:
      name: Ψύξη
      description: Η ικανότητα της συσκευής να μειώνει τη θερμοκρασία είναι ανεπαρκής.
    coverage:
      name: Κάλυψη
      description: Ο βαθμός στον οποίο το κομμάτι καλύπτει, προστατεύει ή εφαρμόζεται
        σε μια επιφάνεια δεν ανταποκρίνεται στις ανάγκες του πελάτη.
    cuff_too_big:
      name: Πολύ μεγάλη μανσέτα
      description: Το άνοιγμα για τον καρπό ή το μπράτσο είναι πολύ χαλαρό.
    cuff_too_small:
      name: Πολύ μικρή μανσέτα
      description: Το άνοιγμα για τον καρπό ή το μπράτσο είναι πολύ σφιχτό.
    cups_gaping:
      name: Κενό στις θήκες (cups)
      description: Τα κύπελλα του σουτιέν δεν εφαρμόζουν σωστά στο σώμα, δημιουργώντας
        κενά.
    cups_too_big:
      name: Πολύ μεγάλες κουπ
      description: Η χωρητικότητα της θήκης του ενδύματος είναι πολύ μεγάλη για το
        στήθος της πελάτισσας.
    cups_too_loose:
      name: Πολύ φαρδιές θήκες (cups)
      description: Η εφαρμογή του κυπέλλου δεν είναι αρκετά σταθερή ή υποστηρικτική.
    cups_too_small:
      name: Πολύ μικρές κουπ
      description: Η χωρητικότητα της θήκης του ενδύματος είναι πολύ μικρή για το
        στήθος της πελάτισσας.
    cups_too_thick:
      name: Πολύ χοντρές θήκες (cups)
      description: Η ενίσχυση ή το πάχος του υλικού στα κύπελλα είναι υπερβολικό.
    cups_too_thin:
      name: Πολύ λεπτές θήκες (cups)
      description: Τα κύπελλα δε διαθέτουν επαρκή ενίσχυση ή κάλυψη.
    cups_too_tight:
      name: Πολύ στενές θήκες (cups)
      description: Τα κύπελλα πιέζουν ή σφίγγουν το στήθος με άβολο τρόπο.
    cushioning:
      name: Αντικραδασμική προστασία
      description: Η απαλότητα ή η απορρόφηση κραδασμών του υλικού δεν είναι η αναμενόμενη
        για την προβλεπόμενη χρήση του.
    damaged_after_use:
      name: Υπέστη φθορά μετά τη χρήση
      description: Το κομμάτι παρουσιάζει φθορά ή θραύση μετά από κανονική χρήση.
    damaged_after_washing:
      name: Υπέστη φθορά μετά το πλύσιμο
      description: Το κομμάτι υπέστη ζημιές κατά τη διάρκεια του καθαρισμού.
    damaged_after_wear:
      name: Υπέστη φθορά μετά από χρήση
      description: Το κομμάτι εμφανίζει σημάδια ζημιάς στο σώμα μετά τη χρήση.
    damaged_or_defective:
      name: Χαλασμένο ή ελαττωματικό
      description: Το κομμάτι παρελήφθη με υλικές ζημιές, κατασκευαστικά ελαττώματα
        ή δε λειτουργεί όπως προβλέπεται.
    damaged_packaging:
      name: Κατεστραμμένη συσκευασία
      description: Η εξωτερική συσκευασία παρελήφθη σε αλλοιωμένη κατάσταση.
    depth:
      name: Βάθος
      description: Η μέτρηση από μπροστά προς τα πίσω ή από πάνω προς τα κάτω δεν
        είναι κατάλληλη για τον χώρο ή την εφαρμογή του πελάτη.
    detail:
      name: Λεπτομέρεια
      description: Το επίπεδο πολυπλοκότητας ή ακρίβειας στο σχεδιασμό ή την απόδοση
        του κομματιού είναι ανεπαρκές.
    detection_range:
      name: Εμβέλεια ανίχνευσης
      description: Η απόσταση ή η περιοχή της ζώνης ανίχνευσης της συσκευής δεν είναι
        κατάλληλη για την προβλεπόμενη εφαρμογή.
    diameter:
      name: Διάμετρος
      description: Η διάμετρος της κυκλικής διατομής δεν ανταποκρίνεται στις απαιτήσεις
        προβλεπόμενης χρήσης ή συμβατότητας.
    dietary_requirements:
      name: Διατροφικές απαιτήσεις
      description: Το προϊόν περιέχει συστατικά που δεν συνάδουν με τις ανάγκες υγείας
        ή τις επιλογές τρόπου ζωής του πελάτη.
    difficult_to_adjust:
      name: Δύσκολο στην προσαρμογή
      description: Οι μηχανισμοί προσαρμογής της εφαρμογής του κομματιού ή των ρυθμίσεων
        είναι δύσκολοι στον χειρισμό.
    difficult_to_assemble:
      name: Δύσκολη συναρμολόγηση
      description: Η διαδικασία συναρμολόγησης του προϊόντος είναι υπερβολικά δύσκολη,
        περίπλοκη ή οι οδηγίες είναι ασαφείς.
    difficult_to_blend:
      name: Δύσκολη ανάμειξη
      description: Το προϊόν δεν αναμειγνύεται ομαλά με άλλες ουσίες ή επιφάνειες.
    difficult_to_clean:
      name: Δύσκολο στον καθαρισμό
      description: Ο σχεδιασμός ή το υλικό του κομματιού δυσκολεύει τον καθαρισμό
        του, ακόμα και όταν χρησιμοποιείται η σωστή μέθοδος.
    difficult_to_fasten:
      name: Δύσκολο κούμπωμα
      description: Ο μηχανισμός κλεισίματος απαιτεί υπερβολική προσπάθεια ή επιδεξιότητα
        για να ασφαλίσει.
    difficult_to_fold:
      name: Δύσκολο στο δίπλωμα
      description: Η σύμπτυξη ή το δίπλωμα του κομματιού είναι πιο δύσκολο ή επίπονο
        από το αναμενόμενο.
    difficult_to_install:
      name: Δύσκολο στην εγκατάσταση
      description: Η διαδικασία εγκατάστασης απαιτεί περισσότερη προσπάθεια ή δεξιότητα
        από ό,τι περίμενε ο πελάτης.
    difficult_to_refill:
      name: Δύσκολο γέμισμα
      description: Η διαδικασία αναπλήρωσης του προϊόντος είναι επίπονη ή περίπλοκη.
    difficult_to_use:
      name: Δύσκολο στη χρήση
      description: Το κομμάτι απαιτεί περισσότερη δεξιότητα ή προσπάθεια για να λειτουργήσει
        από το αναμενόμενο.
    difficulty_level:
      name: Επίπεδο δυσκολίας
      description: Το επίπεδο δυσκολίας του κομματιού δεν είναι κατάλληλο για τη δεξιότητα
        του χρήστη.
    dispenser:
      name: Διανομέας
      description: Ο μηχανισμός διανομής του προϊόντος δεν είναι ικανοποιητικός.
    doesnt_apply_evenly:
      name: Δεν απλώνεται ομοιόμορφα
      description: Το προϊόν εφαρμόζεται ανομοιόμορφα ή αφήνει γραμμές κατά την εφαρμογή.
    doesnt_blend_well:
      name: Δεν αναμειγνύεται καλά
      description: Το προϊόν δεν αναμιγνύεται ή δεν ενσωματώνεται ομαλά με άλλες ουσίες
        ή επιφάνειες.
    doesnt_dissolve_well:
      name: Δεν διαλύεται καλά
      description: Το προϊόν αφήνει υπολείμματα ή σβόλους αντί να αναμιγνύεται ομαλά
        στο υγρό.
    doesnt_fit_bed_frame:
      name: Δεν ταιριάζει στο πλαίσιο του κρεβατιού
      description: Οι διαστάσεις του στρώματος ή των κλινοσκεπασμάτων δεν ταιριάζουν
        με το συγκεκριμένο πλαίσιο κρεβατιού.
    doesnt_fit_mattress:
      name: Δεν ταιριάζει στο στρώμα
      description: Οι διαστάσεις των κλινοσκεπασμάτων δεν αντιστοιχούν στο μέγεθος
        του στρώματος.
    doesnt_fit_phone:
      name: Δεν ταιριάζει στο τηλέφωνο
      description: Οι διαστάσεις του αξεσουάρ δεν είναι συμβατές με το συγκεκριμένο
        μοντέλο τηλεφώνου.
    doesnt_fit_tv:
      name: Δεν ταιριάζει στην τηλεόραση
      description: Οι διαστάσεις ή η βάση του κομματιού δεν είναι κατάλληλες για την
        τηλεόραση του πελάτη.
    doesnt_stay_closed:
      name: Δεν μένει κλειστό
      description: Το μάνδαλο ή ο μηχανισμός στερέωσης δεν παραμένει σταθερός.
    drainage:
      name: Αποστράγγιση
      description: Το κομμάτι δεν επιτρέπει τη σωστή ροή των υγρών.
    draw_length:
      name: Μήκος έλξης
      description: Η απόσταση που μπορεί να τραβηχτεί προς τα πίσω η χορδή του τόξου
        δεν αντιστοιχεί στο άνοιγμα των χεριών του τοξοβόλου.
    draw_weight:
      name: Βάρος έλξης
      description: Η δύναμη που απαιτείται για να τραβηχτεί η χορδή του τόξου είναι
        υπερβολικά μεγάλη ή πολύ μικρή για τον τοξοβόλο.
    dried_out:
      name: Ξεράθηκε
      description: Το προϊόν έχει χάσει πρόωρα την υγρασία του, επηρεάζοντας την χρηστικότητά
        του.
    drying:
      name: Αφυδατικό
      description: Το προϊόν προκαλεί ανεπιθύμητη ξηρότητα στο δέρμα, τα μαλλιά ή
        άλλες επιφάνειες.
    drying_speed:
      name: Ταχύτητα στεγνώματος
      description: Ο χρόνος που απαιτείται για το στέγνωμα ή τη σταθεροποίηση του
        προϊόντος είναι υπερβολικά μεγάλος ή μικρός.
    duplicate_order:
      name: Διπλή παραγγελία
      description: Ο πελάτης παρήγγειλε κατά λάθος το κομμάτι πολλές φορές.
    duration:
      name: Διάρκεια
      description: Ο χρόνος που έχει διατεθεί για την υπηρεσία, την εκδήλωση ή την
        περίοδο πρόσβασης είναι συντομότερος ή μεγαλύτερος από τον αναμενόμενο.
    dye_transferred:
      name: Ξέβαψε
      description: Το χρώμα από το κομμάτι ξέβαψε σε άλλες επιφάνειες ή ρούχα.
    edition:
      name: Έκδοση
      description: Η συγκεκριμένη έκδοση ή κυκλοφορία του προϊόντος δεν είναι αυτή
        που επιθυμούσε ο πελάτης.
    effectiveness:
      name: Αποτελεσματικότητα
      description: Το προϊόν δεν εκτελεί τις κύριες λειτουργίες του ούτε παρέχει τα
        υποσχόμενα οφέλη στο αναμενόμενο επίπεδο.
    efficiency:
      name: Αποδοτικότητα
      description: Η ποσότητα καυσίμου ή ενέργειας που καταναλώνει το κομμάτι για
        τη λειτουργία του είναι μεγαλύτερη από την αναμενόμενη.
    embellishment_fell_off:
      name: Έπεσε το διακοσμητικό
      description: Τα διακοσμητικά στοιχεία αποκολλήθηκαν από το κομμάτι.
    energy_efficiency:
      name: Ενεργειακή απόδοση
      description: Η ποσότητα ενέργειας που χρησιμοποιεί το κομμάτι είναι υπερβολική
        για την απόδοση που προσφέρει.
    eye_strain:
      name: Καταπόνηση ματιών
      description: Η χρήση του προϊόντος προκαλεί οπτική κόπωση ή δυσφορία στα μάτια.
    fabric:
      name: Ύφασμα
      description: Η σύνθεση, οι ιδιότητες ή η αίσθηση του υφάσματος δεν ανταποκρίνονται
        στις προτιμήσεις του πελάτη.
    fails_to_detect_threats:
      name: Αποτυχία εντοπισμού απειλών
      description: Η συσκευή ασφαλείας ή προστασίας δεν εντοπίζει τους κινδύνους όπως
        αναμενόταν.
    fastening:
      name: Κούμπωμα
      description: Η μέθοδος ασφάλισης ή κλεισίματος του κομματιού είναι δύσκολη ή
        ασταθής.
    fat_content:
      name: Περιεκτικότητα σε λιπαρά
      description: Το ποσοστό λίπους στο τρόφιμο δεν ανταποκρίνεται στις διατροφικές
        προτιμήσεις του πελάτη.
    field_of_view:
      name: Οπτικό πεδίο
      description: Η ορατή περιοχή που παρέχεται από την οπτική συσκευή είναι ακατάλληλη
        για την προβλεπόμενη χρήση της.
    field_of_view_too_narrow:
      name: Πολύ στενό οπτικό πεδίο
      description: Η ορατή περιοχή μέσω του οπτικού συστήματος ή της μάσκας είναι
        πολύ περιορισμένη.
    filtration_class:
      name: Κλάση φιλτραρίσματος
      description: Η βαθμολογία ή το πρότυπο αποκλεισμού σωματιδίων του φίλτρου δεν
        πληροί τις απαιτήσεις.
    finish:
      name: Φινίρισμα
      description: Η επιφανειακή εμφάνιση ή η τελική επίστρωση του κομματιού το καθιστά
        ακατάλληλο για την προβλεπόμενη χρήση ή το περιβάλλον του πελάτη.
    firmness:
      name: Σκληρότητα
      description: Το επίπεδο ακαμψίας ή ελαστικότητας του κομματιού δεν είναι το
        αναμενόμενο.
    fit:
      name: Εφαρμογή
      description: Ο τρόπος με τον οποίο το κομμάτι εφαρμόζει πάνω, μέσα ή έναντι
        του σώματος ή άλλου εξοπλισμού είναι λανθασμένος.
    fitment:
      name: Εφαρμογή
      description: Το κομμάτι δεν ευθυγραμμίζεται σωστά με το συγκεκριμένο μοντέλο
        ή το εξάρτημα στο οποίο συνδέεται.
    flange_size:
      name: Μέγεθος φλάντζας
      description: Η διάμετρος του ανοίγματος της χοάνης του θηλάστρου είναι λανθασμένη
        για τον χρήστη, επηρεάζοντας την άνεση ή την εξαγωγή γάλακτος.
    flavor:
      name: Γεύση
      description: Η αναγραφόμενη γεύση του κομματιού δεν είναι η συγκεκριμένη ποικιλία
        που ήθελε ο πελάτης.
    flex:
      name: Ευκαμψία
      description: Ο τρόπος με τον οποίο το κομμάτι λυγίζει και επανέρχεται δεν είναι
        ο σωστός για τις ανάγκες ή το στυλ του χρήστη.
    flexibility:
      name: Ευκαμψία
      description: Η ικανότητα του κομματιού να λυγίζει ή να υποχωρεί υπό πίεση δεν
        είναι η αναμενόμενη.
    flight_distance:
      name: Απόσταση πτήσης
      description: Η απόσταση που διανύει το κομμάτι στον αέρα είναι ακατάλληλη για
        την προβλεπόμενη δραστηριότητα ή τις συνθήκες.
    flow_rate:
      name: Ρυθμός ροής
      description: Η ταχύτητα με την οποία το υγρό ή ο αέρας κινείται μέσα στο κομμάτι
        είναι πολύ γρήγορη ή πολύ αργή για τις ανάγκες της πελάτης.
    footbed_too_deep:
      name: Πάτος πολύ βαθύς
      description: Η εσοχή για το πόδι έχει υπερβολικό βάθος.
    footbed_too_narrow:
      name: Πάτος πολύ στενός
      description: Το πλάτος του πέλματος δεν επαρκεί για το πόδι του πελάτη.
    footbed_too_shallow:
      name: Πάτος πολύ ρηχός
      description: Η εσοχή για το πόδι δεν έχει επαρκές βάθος.
    footbed_too_wide:
      name: Πάτος πολύ φαρδύς
      description: Το πλάτος του πέλματος είναι υπερβολικό, εμποδίζοντας τη σταθερή
        εφαρμογή.
    format:
      name: Μορφή
      description: Η διάταξη ή η φυσική μορφή του κομματιού δεν είναι κατάλληλη για
        τις ανάγκες του χρήστη.
    frame_color:
      name: Χρώμα σκελετού
      description: Το χρώμα του πλαισίου δεν ταιριάζει με τις αισθητικές προτιμήσεις
        του πελάτη.
    frame_crooked:
      name: Στραβός σκελετός
      description: Η δομή του κομματιού είναι λυγισμένη ή κακώς ευθυγραμμισμένη.
    frame_needs_adjustments:
      name: Ο σκελετός χρειάζεται προσαρμογή
      description: Το κομμάτι απαιτεί επαγγελματική τοποθέτηση ή τροποποίηση για να
        εφαρμόζει σωστά.
    frame_too_small:
      name: Πολύ μικρός σκελετός
      description: Οι διαστάσεις του σκελετού των γυαλιών δεν ταιριάζουν σωστά στο
        πρόσωπο του πελάτη.
    frequency:
      name: Συχνότητα
      description: Ο ρυθμός ταλάντωσης ή μετάδοσης σήματος δεν ταιριάζει με τον εξοπλισμό
        ή τις προτιμήσεις του πελάτη.
    fuel_capacity:
      name: Χωρητικότητα καυσίμου
      description: Η ποσότητα καυσίμου που μπορεί να χωρέσει η συσκευή είναι ανεπαρκής
        για τις ανάγκες του πελάτη.
    fuel_efficiency:
      name: Απόδοση καυσίμου
      description: Ο ρυθμός με τον οποίο η συσκευή καταναλώνει καύσιμο είναι υψηλότερος
        από τον επιθυμητό.
    gauge:
      name: Πάχος
      description: Το καθορισμένο πάχος ή διάμετρος του κομματιού δεν είναι κατάλληλο
        για την προβλεπόμενη εφαρμογή.
    grind_size:
      name: Μέγεθος άλεσης
      description: Η κοκκομετρία του αλεσμένου προϊόντος δεν είναι κατάλληλη για την
        προβλεπόμενη μέθοδο παρασκευής.
    grip:
      name: Κράτημα
      description: Η επιφανειακή υφή του κομματιού δεν παρέχει τον έλεγχο ή τη σταθερότητα
        που χρειάζεται ο πελάτης.
    grit:
      name: Τραχύτητα
      description: Η τραχύτητα της λειαντικής επιφάνειας δεν καλύπτει τις ανάγκες
        της πελάτης.
    hard_to_inflate:
      name: Φουσκώνει δύσκολα
      description: Η βαλβίδα ή ο μηχανισμός δυσχεραίνει την πλήρωση του κομματιού
        με αέρα.
    hardness:
      name: Σκληρότητα
      description: Η αντοχή του υλικού στη συμπίεση ή την επιφανειακή πίεση δεν είναι
        η αναμενόμενη.
    head_size:
      name: Μέγεθος κεφαλής
      description: Το μέγεθος της κεφαλής του κομματιού είναι ακατάλληλο για την προβλεπόμενη
        εφαρμογή ή χώρο.
    head_support:
      name: Υποστήριξη κεφαλής
      description: Το κομμάτι δεν παρέχει επαρκή σταθεροποίηση, σωστή στάση ή άνεση
        για το κεφάλι και τον αυχένα.
    heat:
      name: Θερμότητα
      description: Το επίπεδο έντασης ή καυτερής γεύσης στο τρόφιμο δεν είναι το αναμενόμενο.
    heat_resistance:
      name: Αντοχή στη θερμότητα
      description: Το κομμάτι δεν αντέχει σε υψηλές θερμοκρασίες όπως απαιτείται.
    heel_too_high:
      name: Πολύ ψηλό τακούνι
      description: Το ύψος του τακουνιού είναι υπερβολικό για την άνεση ή τις προτιμήσεις
        του πελάτη.
    heel_too_low:
      name: Πολύ χαμηλό τακούνι
      description: Το ύψος του τακουνιού είναι πολύ χαμηλό για τις προτιμήσεις του
        πελάτη.
    heel_too_thick:
      name: Πολύ χοντρό τακούνι
      description: Το πλάτος ή ο όγκος του τακουνιού είναι υπερβολικά.
    heel_too_thin:
      name: Πολύ λεπτό τακούνι
      description: Το πλάτος του τακουνιού δεν παρέχει επαρκή σταθερότητα.
    height:
      name: Ύψος
      description: Η κάθετη διάσταση του κομματιού δεν ταιριάζει στον χώρο ή στις
        εργονομικές ανάγκες του πελάτη.
    horsepower:
      name: Ιπποδύναμη
      description: Η ισχύς που παράγεται από τον κινητήρα δεν ανταποκρίνεται στις
        προσδοκίες απόδοσης σύμφωνα με τις προδιαγραφές του.
    incompatible:
      name: Μη συμβατό
      description: Το κομμάτι δε λειτουργεί ούτε συνδέεται με τον υπάρχοντα εξοπλισμό,
        συσκευή ή σύστημα του πελάτη.
    ingredients:
      name: Συστατικά
      description: Η σύνθεση του προϊόντος περιλαμβάνει συστατικά που ο πελάτης επιθυμεί
        να αποφύγει.
    inscription:
      name: Επιγραφή
      description: Το προσαρμοσμένο κείμενο ή η χάραξη στο κομμάτι είναι λανθασμένο
        ή κακώς εκτελεσμένο.
    inseam_too_long:
      name: Πολύ μακρύς καβάλος
      description: Η εσωτερική μέτρηση του ποδιού του ενδύματος υπερβαίνει το μήκος
        του ποδιού της πελάτης.
    inseam_too_short:
      name: Πολύ κοντός καβάλος
      description: Η εσωτερική μέτρηση του ποδιού του ενδύματος είναι ανεπαρκής για
        το μήκος του ποδιού του πελάτη.
    installation:
      name: Εγκατάσταση
      description: Η διαδικασία ρύθμισης ή τοποθέτησης του κομματιού είναι πιο δύσκολη
        ή περίπλοκη από το αναμενόμενο.
    instrument:
      name: Όργανο
      description: Το συγκεκριμένο μουσικό εξάρτημα για το οποίο σχεδιάστηκε το κομμάτι
        δεν ταιριάζει με τον εξοπλισμό του πελάτη.
    intensity:
      name: Ένταση
      description: Η ένταση της απόδοσης ή της αισθητηριακής επίδρασης της συσκευής
        δεν ταιριάζει με τις προτιμήσεις του χρήστη.
    inverter_type:
      name: Τύπος μετατροπέα
      description: Η συγκεκριμένη τεχνολογία ηλεκτρικής μετατροπής δεν καλύπτει τις
        απαιτήσεις του πελάτη.
    item_not_as_described:
      name: Το προϊόν δεν ανταποκρίνεται στην περιγραφή
      description: Το προϊόν δεν ταιριάζει με την περιγραφή, τις εικόνες ή τις προδιαγραφές
        που παρέχονται στην καταχώριση.
    lacks_required_certification:
      name: Δεν διαθέτει την απαιτούμενη πιστοποίηση
      description: Το προϊόν δεν έχει την απαραίτητη κανονιστική έγκριση ή συμμόρφωση
        με πρότυπα.
    lacks_security_features:
      name: Δεν διαθέτει χαρακτηριστικά ασφαλείας
      description: Το προϊόν δεν περιλαμβάνει τους αναμενόμενους μηχανισμούς ασφαλείας
        ή αντικλεπτικούς μηχανισμούς.
    language:
      name: Γλώσσα
      description: Η γλώσσα του κειμένου ή του ήχου δεν είναι αυτή που απαιτεί ο πελάτης.
    laptop_fit:
      name: Εφαρμογή σε laptop
      description: Η θήκη ή το μανίκι δε χωράει τις διαστάσεις του φορητού υπολογιστή
        του πελάτη.
    lather:
      name: Αφρός
      description: Η ποσότητα του αφρού που παράγεται από το προϊόν δεν καλύπτει τις
        προτιμήσεις του πελάτη.
    legs_too_loose:
      name: Πολύ φαρδιά μπατζάκια
      description: Τα τμήματα του ενδύματος που βρίσκονται στα πόδια δεν εφαρμόζουν
        σωστά.
    legs_too_tight:
      name: Πολύ στενά μπατζάκια
      description: Τα τμήματα του ενδύματος για τα πόδια περιορίζουν την κίνηση ή
        την άνεση.
    length:
      name: Μήκος
      description: Η γραμμική μέτρηση του κομματιού είναι είτε πολύ μεγάλη είτε πολύ
        μικρή για τις ανάγκες του πελάτη.
    lens_color:
      name: Χρώμα φακού
      description: Η απόχρωση ή η χροιά των φακών των γυαλιών είναι ακατάλληλη για
        την προβλεπόμενη οπτική κατάσταση ή δραστηριότητα.
    lens_popped_out_of_frame:
      name: Ο φακός βγήκε από τον σκελετό
      description: Ο οπτικός φακός αποκολλήθηκε από το περίβλημά του.
    lens_scratched:
      name: Γρατσουνισμένος φακός
      description: Η οπτική επιφάνεια έχει ορατά σημάδια που επηρεάζουν την όραση
        ή την εμφάνιση.
    lifting_capacity:
      name: Ικανότητα ανύψωσης
      description: Το μέγιστο βάρος που μπορεί να σηκώσει ο εξοπλισμός δεν επαρκεί.
    light_spectrum:
      name: Φάσμα φωτός
      description: Τα συγκεκριμένα μήκη κύματος του εκπεμπόμενου φωτός δεν πληρούν
        τις απαιτήσεις του πελάτη.
    light_temperature:
      name: Θερμοκρασία φωτός
      description: Η θερμοκρασία χρώματος του εκπεμπόμενου φωτός (θερμό έναντι ψυχρού)
        δεν ταιριάζει στις προτιμήσεις του πελάτη.
    lock:
      name: Κλειδαριά
      description: Ο ενσωματωμένος μηχανισμός κλειδιού ή κλειδαριάς με συνδυασμό είναι
        ελαττωματικός ή δεν λειτουργεί όπως αναμένεται.
    lock_type:
      name: Τύπος κλειδαριάς
      description: Ο συγκεκριμένος μηχανισμός που χρησιμοποιείται για την ασφάλιση
        του κομματιού δεν πληροί τις προτιμήσεις του πελάτη για ευκολία ή ασφάλεια.
    logo_peeling:
      name: Το λογότυπο ξεφλουδίζει
      description: Η εκτυπωμένη ή εφαρμοσμένη επωνυμία (branding) ξεκολλάει από το
        προϊόν.
    longevity:
      name: Διάρκεια ζωής
      description: Η διάρκεια του αποτελέσματος του προϊόντος είναι μικρότερη ή μεγαλύτερη
        από την αναμενόμενη.
    loose_around_ankle:
      name: Χαλαρό στον αστράγαλο
      description: Το ένδυμα δεν εφαρμόζει σταθερά γύρω από την περιοχή του αστραγάλου.
    loose_around_thighs:
      name: Χαλαρό στους μηρούς
      description: Το ένδυμα δεν εφαρμόζει σταθερά στην περιοχή των μηρών.
    loose_seams:
      name: Χαλαρές ραφές
      description: Οι ραφές δεν είναι ανθεκτικές/ασφαλείς, γεγονός που υποδηλώνει
        κακή κατασκευή.
    loose_threads:
      name: Κλωστές που ξηλώνονται
      description: Το προϊόν παρουσιάζει εμφανές ξέφτισμα ή προεξέχοντα νήματα, ένδειξη
        χαμηλής ποιότητας κατασκευής.
    low_light_performance:
      name: Απόδοση σε χαμηλό φωτισμό
      description: Η συσκευή καταγράφει κακής ποιότητας φωτογραφίες και βίντεο σε
        συνθήκες χαμηλού φωτισμού.
    low_resolution:
      name: Χαμηλή ανάλυση
      description: Το επίπεδο λεπτομέρειας ή σαφήνειας στο οπτικό αποτέλεσμα είναι
        ανεπαρκές.
    lubrication:
      name: Λίπανση
      description: Το προϊόν είναι υπερβολικά ξηρό ή υπερβολικά λιπαρό για σωστή λειτουργία.
    magnification:
      name: Μεγέθυνση
      description: Το επίπεδο οπτικής μεγέθυνσης που παρέχει το προϊόν δεν είναι κατάλληλο
        για τις ανάγκες του πελάτη.
    magnification_too_strong:
      name: Πολύ ισχυρή μεγέθυνση
      description: Το επίπεδο μεγέθυνσης είναι ανεπαρκές για τις οπτικές ανάγκες του
        πελάτη.
    magnification_too_weak:
      name: Πολύ ασθενής μεγέθυνση
      description: Το επίπεδο μεγέθυνσης που παρέχεται δεν επαρκεί για τις ανάγκες
        όρασης του πελάτη.
    maneuverability:
      name: Ευελιξία κινήσεων
      description: Η ευκολία μετακίνησης, οδήγησης ή χειρισμού του προϊόντος δεν ανταποκρίνεται
        στις ανάγκες του πελάτη.
    material:
      name: Υλικό
      description: Το υλικό ή το ύφασμα από το οποίο είναι κατασκευασμένο το προϊόν
        δεν ανταποκρίνεται στις προτιμήσεις του πελάτη ως προς την αίσθηση, την ανθεκτικότητα
        ή τη σύνθεση.
    material_not_breathable:
      name: Το υλικό δεν αναπνέει
      description: Το ύφασμα δεν επιτρέπει επαρκή κυκλοφορία αέρα.
    material_not_durable:
      name: Μη ανθεκτικό υλικό
      description: Το ύφασμα ή η ουσία δεν έχει την αναμενόμενη μακροζωία ή αντοχή
        στη φθορά.
    material_too_see_through:
      name: Πολύ διαφανές υλικό
      description: Το ύφασμα του ενδύματος είναι πιο διαφανές από το αναμενόμενο.
    material_too_stiff:
      name: Πολύ άκαμπτο υλικό
      description: Το ύφασμα δεν έχει την επιθυμητή ελαστικότητα ή απαλότητα.
    material_too_stretchy:
      name: Πολύ ελαστικό υλικό
      description: Το ύφασμα έχει υπερβολική ελαστικότητα, χάνοντας την επιθυμητή
        μορφή.
    mesh_size:
      name: Μέγεθος πλέγματος
      description: Το δίχτυ ή η σήτα έχει υπερβολικά μεγάλα ή υπερβολικά μικρά κενά
        μεταξύ των ανοιγμάτων του.
    messy:
      name: Προκαλεί ακαταστασία
      description: Η χρήση του προϊόντος δημιουργεί ανεπιθύμητη ακαταστασία ή αφήνει
        υπολείμματα.
    method:
      name: Μέθοδος
      description: Η τεχνική που απαιτείται για τη χρήση του προϊόντος δεν ταιριάζει
        στον πελάτη.
    metrics_supported:
      name: Υποστηριζόμενα ποσοτικά μεγέθη
      description: Η συσκευή δεν καταγράφει ή δεν εμφανίζει τα συγκεκριμένα δεδομένα
        που απαιτεί ο πελάτης.
    mileage:
      name: Χιλιομετρική απόδοση
      description: Η κατανάλωση καυσίμου ή το ιστορικό χρήσης του οχήματος δεν ανταποκρίνεται
        στις προσδοκίες.
    missing_desired_features:
      name: Λείπουν επιθυμητά χαρακτηριστικά
      description: Το προϊόν δεν διαθέτει συγκεκριμένες λειτουργίες ή χαρακτηριστικά
        που ανέμενε ο πελάτης.
    mixing_performance:
      name: Απόδοση ανάμειξης
      description: Η συσκευή δεν αναμειγνύει τα συστατικά όπως αναμένεται.
    mounting_difficulty:
      name: Δυσκολία τοποθέτησης
      description: Η διαδικασία στερέωσης του προϊόντος σε τοίχο ή άλλη επιφάνεια
        είναι υπερβολικά δύσκολη ή πολύπλοκη ή οι οδηγίες δεν είναι σαφείς.
    movement:
      name: Κίνηση
      description: Η αυτοματοποιημένη ή παθητική κίνηση του προϊόντος είναι πολύ γρήγορη,
        πολύ αργή ή γενικά μη ικανοποιητική.
    narration:
      name: Αφήγηση
      description: Η φωνή, ο τόνος ή το ύφος της ηχητικής αφήγησης δεν είναι ελκυστικά
        για τον πελάτη.
    nicotine_strength:
      name: Περιεκτικότητα σε νικοτίνη
      description: Η συγκέντρωση νικοτίνης στο προϊόν είναι πολύ υψηλή ή πολύ χαμηλή
        για τον πελάτη.
    night_vision:
      name: Νυχτερινή όραση
      description: Η εικόνα που παράγεται από τη λειτουργία υπερύθρων ή μηδενικού
        φωτισμού της συσκευής είναι ασαφής ή μη αποτελεσματική.
    no_pockets:
      name: Χωρίς τσέπες
      description: Το προϊόν δεν διαθέτει τους αποθηκευτικούς χώρους που ανέμενε ο
        πελάτης.
    noise_reduction:
      name: Μείωση θορύβου
      description: Το προϊόν δεν εμποδίζει ή δεν απομονώνει τον ήχο όσο αποτελεσματικά
        ανέμενε ο πελάτης.
    not_dishwasher_safe:
      name: Δεν είναι ασφαλές για πλυντήριο πιάτων
      description: Το προϊόν απαιτεί πλύσιμο στο χέρι, γεγονός που είναι μη πρακτικό
        για τον πελάτη.
    not_enough_support:
      name: Ανεπαρκής υποστήριξη
      description: Το προϊόν δεν διαθέτει επαρκή δομική ενίσχυση.
    not_pet_friendly:
      name: Μη φιλικό προς τα κατοικίδια
      description: Το προϊόν περιέχει συστατικά ή χαρακτηριστικά που είναι επιβλαβή
        ή ακατάλληλα για κατοικίδια.
    not_suitable_for_hair_type:
      name: Ακατάλληλο για τον τύπο μαλλιών
      description: Το προϊόν είναι είτε αναποτελεσματικό είτε προκαλεί ανεπιθύμητο
        αποτέλεσμα στα μαλλιά του χρήστη.
    not_suitable_for_skin_type:
      name: Ακατάλληλο για τον τύπο επιδερμίδας
      description: Το προϊόν είτε προκαλεί ερεθισμό είτε δεν είναι αποτελεσματικό
        για το δέρμα του χρήστη.
    not_suitable_for_terrain:
      name: Ακατάλληλο για το έδαφος
      description: Το προϊόν δεν αποδίδει ικανοποιητικά στη συγκεκριμένη επιφάνεια
        εδάφους που προορίζεται από τον πελάτη.
    nozzle:
      name: Ακροφύσιο
      description: Ο μηχανισμός διανομής του προϊόντος δεν είναι ικανοποιητικός.
    odor:
      name: Οσμή
      description: Το προϊόν αναδίδει μια δυσάρεστη ή απροσδόκητη οσμή.
    odor_control:
      name: Έλεγχος οσμών
      description: Η ικανότητα του προϊόντος να συγκρατεί ή να εξουδετερώνει οσμές
        είναι ανεπαρκής για τις ανάγκες του πελάτη.
    opacity:
      name: Αδιαφάνεια
      description: Το επίπεδο διαφάνειας ή σιθρού εικόνας δεν ανταποκρίνεται στις
        προτιμήσεις του πελάτη.
    operating_noise:
      name: Θόρυβος λειτουργίας
      description: Ο θόρυβος που παράγεται από τη συσκευή κατά τη χρήση είναι υπερβολικός
        ή ενοχλητικός.
    optic_didnt_fit:
      name: Το οπτικό δεν ταίριαζε
      description: Το οπτικό εξάρτημα δεν προσαρμόζεται σωστά στη συσκευή.
    ordered_multiple:
      name: Παραγγελία πολλαπλών τεμαχίων
      description: Ο πελάτης αγόρασε πολλές επιλογές με σκοπό να κρατήσει μόνο μία.
    ordered_wrong_format:
      name: Παραγγελία λανθασμένης μορφής
      description: Ο πελάτης επέλεξε λανθασμένη παραλλαγή ή διαμόρφωση προϊόντος.
    ordered_wrong_item:
      name: Παραγγελία λανθασμένου είδους
      description: Ο πελάτης αγόρασε κατά λάθος το λάθος προϊόν.
    organization:
      name: Οργάνωση
      description: Η διάταξη της αποθήκευσης ή των λειτουργιών δεν διευκολύνει την
        εύκολη χρήση ή πρόσβαση.
    other_reason:
      name: Άλλο
      description: Ο λόγος επιστροφής δεν εντάσσεται σε καμία από τις προκαθορισμένες
        κατηγορίες.
    packaging_not_sealed:
      name: Μη σφραγισμένη συσκευασία
      description: Το προϊόν παραδόθηκε με ανοιχτή ή παραβιασμένη συσκευασία.
    padding:
      name: Επένδυση
      description: Η ποσότητα ή η τοποθέτηση του μαλακού προστατευτικού υλικού δεν
        είναι όπως αναμενόταν.
    padding_not_removable:
      name: Η ενίσχυση δεν αφαιρείται
      description: Η επένδυση/ενίσχυση είναι μόνιμα προσαρτημένη ενώ ο πελάτης επιθυμούσε
        αφαιρούμενα ένθετα.
    painful:
      name: Επώδυνο
      description: Η χρήση του προϊόντος προκαλεί γενικό ή οξύ σωματικό πόνο.
    pattern:
      name: Μοτίβο
      description: Το επαναλαμβανόμενο διακοσμητικό σχέδιο ή μοτίβο του προϊόντος
        δεν ανταποκρίνεται στις αισθητικές προτιμήσεις του πελάτη.
    performance:
      name: Απόδοση
      description: Ο συνολικός χειρισμός ή η απόκριση του προϊόντος κατά τη λειτουργία
        δεν είναι όπως αναμενόταν.
    pet_didnt_like:
      name: Δεν άρεσε στο κατοικίδιο
      description: Το ζώο δείχνει σαφή έλλειψη προτίμησης για το προϊόν ή το χρησιμοποιεί
        απρόθυμα.
    pet_refused:
      name: Το κατοικίδιο αρνήθηκε
      description: Το ζώο δεν καταναλώνει, δεν χρησιμοποιεί ούτε αλληλεπιδρά με το
        προϊόν.
    piece_count:
      name: Αριθμός τεμαχίων
      description: Ο αριθμός των τεμαχίων που περιλαμβάνονται στο σετ διαφέρει από
        αυτόν που ανέμενε ο πελάτης.
    piece_size:
      name: Μέγεθος τεμαχίου
      description: Τα επιμέρους μέρη του σετ είναι υπερβολικά μεγάλα ή υπερβολικά
        μικρά για την επιθυμητή χρήση.
    pigmentation:
      name: Ένταση χρώματος
      description: Η ένταση ή η πυκνότητα του χρώματος στο καλλυντικό προϊόν δεν είναι
        ικανοποιητική.
    pitch:
      name: Τονικό ύψος
      description: Ο τόνος ή η συχνότητα του παραγόμενου ήχου δεν είναι κατάλληλα.
    plate_type:
      name: Τύπος πλάκας
      description: Το υλικό ή η επίστρωση του πιάτου δεν είναι αυτό που προτιμούσε
        ο πελάτης.
    pockets_too_deep:
      name: Πολύ βαθιές τσέπες
      description: Το βάθος των θηκών αποθήκευσης δυσκολεύει την πρόσβαση στα αντικείμενα.
    pockets_too_shallow:
      name: Πολύ ρηχές τσέπες
      description: Το βάθος των θηκών αποθήκευσης δεν επαρκεί για την ασφαλή συγκράτηση
        των αντικειμένων.
    polarization:
      name: Πόλωση
      description: Η ιδιότητα μείωσης αντανάκλασης του φακού είτε απουσιάζει είτε
        δεν είναι επιθυμητή.
    poor_stitching:
      name: Κακή ραφή
      description: Η ποιότητα ραφής είναι οπτικά κατώτερη των προδιαγραφών, ανομοιόμορφη
        ή στραβή, υποδηλώνοντας κατασκευαστικό ελάττωμα.
    portion_size:
      name: Μέγεθος μερίδας
      description: Η ποσότητα φαγητού που παρέχεται σε μία μερίδα είναι πολύ μικρή
        ή πολύ μεγάλη.
    power_output:
      name: Ισχύς εξόδου
      description: Η ενέργεια που αποδίδει η συσκευή είναι ανεπαρκής ή υπερβολική
        για την προβλεπόμενη χρήση.
    power_source:
      name: Πηγή τροφοδοσίας
      description: Ο τρόπος τροφοδοσίας της συσκευής είναι άβολος ή ασύμβατος για
        τον πελάτη.
    prescription:
      name: Συνταγή
      description: Η διορθωτική ισχύς του φακού ή του προϊόντος δεν ανταποκρίνεται
        στις οπτικές ανάγκες του πελάτη.
    prescription_processed_incorrectly:
      name: Εσφαλμένη επεξεργασία συνταγής
      description: Η εξατομικευμένη συνταγή που εφαρμόστηκε στο προϊόν δεν συμφωνεί
        με τις προδιαγραφές παραγγελίας του πελάτη.
    presentation:
      name: Παρουσίαση
      description: Ο τρόπος με τον οποίο το προϊόν ή το περιεχόμενό του είναι τοποθετημένα
        και παρουσιασμένα δεν είναι ικανοποιητικός.
    pressure:
      name: Πίεση
      description: Η ένταση της ροής εξόδου του προϊόντος είναι είτε πολύ υψηλή είτε
        πολύ χαμηλή.
    pressure_points:
      name: Σημεία πίεσης
      description: Το προϊόν ασκεί συγκεντρωμένη, άβολη πίεση σε συγκεκριμένα σημεία
        του σώματος.
    pressure_rating:
      name: Ονομαστική πίεση
      description: Η μέγιστη πίεση που μπορεί να αντέξει ή να παράγει το προϊόν δεν
        είναι κατάλληλη για την εφαρμογή.
    print_quality:
      name: Ποιότητα εκτύπωσης
      description: Το εκτυπωμένο αποτέλεσμα παρουσιάζει οπτικά ή δομικά ελαττώματα,
        όπως έλλειψη ευκρίνειας, ανακριβές χρώμα, επιφανειακές ατέλειες ή κακή συγκόλληση
        στρώσεων.
    printing:
      name: Εκτύπωση
      description: Το εκτυπωμένο κείμενο, γραφικό ή σχέδιο στο προϊόν είναι ελαττωματικό,
        μη ευθυγραμμισμένο ή ελλιπές.
    product_leaks:
      name: Το προϊόν έχει διαρροή
      description: Το δοχείο ή το προϊόν δεν συγκρατεί σωστά το περιεχόμενό του.
    product_overheats:
      name: Το προϊόν υπερθερμαίνεται
      description: Η συσκευή αναπτύσσει μη ασφαλείς ή δυσάρεστες θερμοκρασίες κατά
        τη λειτουργία.
    programming:
      name: Προγραμματισμός
      description: Η διαδικασία ρύθμισης της ηλεκτρονικής μονάδας στο συγκεκριμένο
        σύστημα είναι υπερβολικά δύσκολη.
    protection:
      name: Προστασία
      description: Το προϊόν δεν παρέχει επαρκή προστασία ή ασφάλεια από χτυπήματα
        ή περιβαλλοντικούς παράγοντες.
    provider_unavailable:
      name: Μη διαθέσιμος πάροχος
      description: Ο πάροχος υπηρεσίας δεν μπορεί να ικανοποιήσει το αίτημα στον επιθυμητό
        χρόνο ή τόπο.
    pulls_in_fabric:
      name: Τραβήγματα στο ύφασμα
      description: Το υλικό σκαλώνει ή εμφανίζει τραβηγμένες κλωστές κατά τη χρήση.
    quality:
      name: Ποιότητα
      description: Το συνολικό επίπεδο ή η ποιότητα κατασκευής του προϊόντος δεν ανταποκρίνεται
        στις προσδοκίες.
    quantity:
      name: Ποσότητα
      description: Η ποσότητα του προϊόντος που περιλαμβάνεται είναι μικρότερη ή μεγαλύτερη
        από αυτήν που ανέμενε ο πελάτης.
    range:
      name: Εμβέλεια
      description: Η απόσταση στην οποία λειτουργεί ή διανύει η συσκευή είναι ανεπαρκής
        για τις απαιτήσεις του πελάτη.
    razor_type:
      name: Τύπος ξυραφιού
      description: Η συγκεκριμένη διαμόρφωση ή στυλ λεπίδας δεν ταιριάζει με τις προτιμήσεις
        του πελάτη για το ξύρισμά του.
    reaction:
      name: Αντίδραση
      description: Το προϊόν προκάλεσε ανεπιθύμητη αντίδραση ή ερεθισμό στο δέρμα.
    readability:
      name: Αναγνωσιμότητα
      description: Το κείμενο ή η οθόνη στο προϊόν είναι δύσκολο να το δει κανείς
        ή να το ερμηνεύσει.
    realism:
      name: Ρεαλισμός
      description: Η εμφάνιση ή η λειτουργία δεν προσομοιώνει την πραγματικότητα με
        αρκετή πειστικότητα.
    received_the_wrong_item:
      name: Έλαβα λάθος προϊόν
      description: Ο πελάτης έλαβε διαφορετικό προϊόν από αυτό που παρήγγειλε ή ανέμενε.
    recoil:
      name: Ανάκρουση
      description: Η κίνηση προς τα πίσω ή το λάκτισμα της συσκευής είναι ισχυρότερα
        από ό,τι μπορεί να χειριστεί άνετα ο πελάτης.
    refraction:
      name: Διάθλαση
      description: Η κάμψη του φωτός από το οπτικό στοιχείο δεν παράγει το επιθυμητό
        οπτικό αποτέλεσμα.
    region:
      name: Περιοχή
      description: Η υπηρεσία ή το προϊόν είναι κλειδωμένο σε γεωγραφική περιοχή διαφορετική
        από την τοποθεσία του πελάτη.
    residue:
      name: Υπόλειμμα
      description: Το προϊόν αφήνει μια ανεπιθύμητη μεμβράνη ή ουσία μετά τη χρήση.
    resistance:
      name: Αντίσταση
      description: Το επίπεδο αντίστασης που παρέχει ο εξοπλισμός άσκησης είναι είτε
        πολύ υψηλό είτε πολύ χαμηλό.
    resolution:
      name: Ανάλυση
      description: Το επίπεδο λεπτομέρειας ή ευκρίνειας στο οπτικό αποτέλεσμα δεν
        ανταποκρίνεται στις προσδοκίες του πελάτη.
    responsiveness:
      name: Απόκριση
      description: Υπάρχει αισθητή καθυστέρηση ή έλλειψη απόκρισης στην άμεση εντολή
        του χρήστη.
    restrictive:
      name: Περιοριστικό
      description: Το προϊόν περιορίζει την κίνηση ή την ευελιξία περισσότερο από
        το επιθυμητό.
    results:
      name: Αποτελέσματα
      description: Το προϊόν δεν παρήγαγε την αναμενόμενη αλλαγή ή αποτέλεσμα μετά
        τη συνιστώμενη περίοδο χρήσης.
    results_display:
      name: Εμφάνιση αποτελεσμάτων
      description: Ο τρόπος με τον οποίο εμφανίζονται τα αποτελέσματα στη συσκευή
        είναι ασαφής ή δύσκολος στην ανάγνωση.
    results_time:
      name: Χρόνος αποτελεσμάτων
      description: Ο χρόνος που απαιτείται για την επίτευξη αποτελέσματος είναι είτε
        μεγαλύτερος είτε μικρότερος από τον αναμενόμενο.
    retention:
      name: Κατακράτηση
      description: Η ικανότητα του προϊόντος να συγκρατεί ένα αντικείμενο σταθερά
        στη θέση του δεν είναι η αναμενόμενη.
    ripeness:
      name: Ωριμότητα
      description: Η ωριμότητα του οπωροκηπευτικού προϊόντος δεν βρίσκεται στο επιθυμητό
        στάδιο για κατανάλωση.
    roast_level:
      name: Βαθμός καβουρδίσματος
      description: Ο βαθμός καβουρδίσματος των κόκκων καφέ δεν ταιριάζει με τις γευστικές
        προτιμήσεις του πελάτη.
    rod_action:
      name: Δράση καλαμιού
      description: Το σημείο στο οποίο το καλάμι ψαρέματος λυγίζει υπό πίεση δεν ανταποκρίνεται
        στην προτίμηση του πελάτη.
    rod_power:
      name: Ισχύς καλαμιού
      description: Η αντίσταση ή η δύναμη ανύψωσης του καλαμιού ψαρέματος είναι πολύ
        μικρή ή πολύ μεγάλη για την προβλεπόμενη χρήση.
    rubbing:
      name: Προκαλεί τριβή
      description: Το προϊόν προκαλεί τριβή ή ερεθισμό στο δέρμα λόγω επαναλαμβανόμενης
        κίνησης.
    sample_method:
      name: Μέθοδος δειγματοληψίας
      description: Η διαδικασία συλλογής του απαιτούμενου δείγματος είναι άβολη, δυσάρεστη
        ή δύσκολη.
    sample_type:
      name: Τύπος δείγματος
      description: Το συγκεκριμένο είδος δείγματος που παρέχεται ή απαιτείται δεν
        είναι αυτό που επιθυμούσε ο πελάτης.
    scale:
      name: Κλίμακα
      description: Οι αναλογίες ή οι διαστάσεις του προϊόντος δεν ανταποκρίνονται
        στις προσδοκίες.
    scent:
      name: Άρωμα
      description: Το άρωμα του προϊόντος είναι δυσάρεστο ή δεν είναι το αναμενόμενο.
    scheduling_conflict:
      name: Σύγκρουση προγραμματισμού
      description: Οι διαθέσιμες ώρες ραντεβού δεν ευθυγραμμίζονται με τη διαθεσιμότητα
        του πελάτη.
    scratched:
      name: Γρατσουνισμένο
      description: Το κομμάτι έχει επιφανειακά σημάδια ή γρατζουνιές που επηρεάζουν
        την εμφάνισή του.
    seal:
      name: Σφράγιση
      description: Η στεγανοποίηση του προϊόντος δεν είναι αεροστεγής ή υδατοστεγής
        όπως απαιτείται.
    seams_splitting:
      name: Οι ραφές ξηλώνονται
      description: Οι ραφές αρχίζουν να ανοίγουν ή παρουσιάζουν σημάδια αστοχίας.
    sensitivity:
      name: Ευαισθησία
      description: Το προϊόν αντιδρά υπερβολικά εύκολα ή όχι αρκετά εύκολα σε ένα
        ερέθισμα.
    service_area:
      name: Περιοχή εξυπηρέτησης
      description: Η τοποθεσία όπου παρέχεται η υπηρεσία δεν καλύπτει τη διεύθυνση
        του πελάτη.
    service_unavailable:
      name: Μη διαθέσιμη υπηρεσία
      description: Η ζητούμενη υπηρεσία δεν προσφέρεται ή δεν μπορεί να εκτελεστεί
        στην περιοχή ή στο πλαίσιο του πελάτη.
    shade:
      name: Απόχρωση
      description: Η συγκεκριμένη απόχρωση, ο τόνος ή το βάθος του χρώματος δεν είναι
        όπως αναμενόταν.
    shaft_length:
      name: Μήκος άξονα
      description: Το μήκος του κύριου άξονα ή σώματος του προϊόντος δεν είναι κατάλληλο
        για τον προβλεπόμενο εξοπλισμό ή χρήστη.
    shape:
      name: Σχήμα
      description: Το περίγραμμα, το σχήμα ή η γεωμετρία του προϊόντος δεν είναι κατάλληλα
        για την προβλεπόμενη χρήση ή αισθητική.
    sharpness:
      name: Οξύτητα
      description: Η κόψη ή η μύτη του εργαλείου δεν πληροί το απαιτούμενο επίπεδο
        οξύτητας.
    shedding:
      name: Μαδάει
      description: Το προϊόν χάνει υπερβολικά ίνες ή σωματίδια κατά τη χρήση.
    shelf_life:
      name: Διάρκεια ζωής στο ράφι
      description: Η διάρκεια κατά την οποία το προϊόν παραμένει χρησιμοποιήσιμο ή
        φρέσκο είναι μικρότερη από την αναμενόμενη.
    side_effects:
      name: Παρενέργειες
      description: Το προϊόν προκάλεσε ανεπιθύμητη και δυσάρεστη επίδραση στο σώμα.
    size:
      name: Μέγεθος
      description: Οι φυσικές αναλογίες του προϊόντος δεν ανταποκρίνονται στις προσδοκίες
        του πελάτη.
    skin_tone:
      name: Απόχρωση δέρματος
      description: Η αντιστοίχιση του χρώματος με τον τόνο του δέρματος του πελάτη
        είναι λανθασμένη.
    sleeves_too_long:
      name: Πολύ μακριά μανίκια
      description: Το μήκος του μανικιού του ενδύματος εκτείνεται πέρα από το χέρι
        του πελάτη.
    sleeves_too_loose:
      name: Πολύ φαρδιά μανίκια
      description: Τα μανίκια δεν εφαρμόζουν σωστά γύρω από τα χέρια.
    sleeves_too_short:
      name: Πολύ κοντά μανίκια
      description: Το μήκος του μανικιού είναι ανεπαρκές για τον πελάτη.
    sleeves_too_tight:
      name: Πολύ στενά μανίκια
      description: Τα μανίκια περιορίζουν την κίνηση ή την άνεση γύρω από τα χέρια.
    slippery:
      name: Γλιστράει
      description: Η επιφάνεια δεν παρέχει επαρκές κράτημα ή πρόσφυση.
    smears:
      name: Μουτζουρώνει
      description: Το προϊόν απλώνεται, θολώνει ή μετακινείται από την προβλεπόμενη
        θέση του κατά τη χρήση ή τη φθορά.
    smudges:
      name: Μουτζουρώνει
      description: Το προϊόν μεταφέρεται σε άλλες επιφάνειες ή αλλοιώνεται εύκολα
        με την επαφή, αφήνοντας σημάδια.
    softness:
      name: Απαλότητα
      description: Η αίσθηση απαλότητας ή βελούδινης υφής του προϊόντος δεν ανταποκρίνεται
        στις προτιμήσεις του πελάτη.
    sole_too_thick:
      name: Πολύ χοντρή σόλα
      description: Το κάτω μέρος των υποδημάτων είναι υπερβολικά παχύ.
    sole_too_thin:
      name: Πολύ λεπτή σόλα
      description: Το κάτω μέρος των υποδημάτων δεν παρέχει επαρκή απορρόφηση κραδασμών
        ή προστασία.
    sound_level:
      name: Στάθμη ήχου
      description: Ο παραγόμενος ήχος δεν πληροί συγκεκριμένο επίπεδο ντεσιμπέλ ή
        απαιτούμενο πρότυπο απόδοσης για τη λειτουργία του.
    sound_quality:
      name: Ποιότητα ήχου
      description: Η καθαρότητα, η πιστότητα ή ο τόνος της ηχητικής εξόδου δεν ανταποκρίνεται
        στις προσδοκίες του πελάτη.
    sourcing:
      name: Προέλευση
      description: Η προέλευση ή η ηθική προέλευση των υλικών του προϊόντος είναι
        μη ικανοποιητική.
    speed:
      name: Ταχύτητα
      description: Ο ρυθμός με τον οποίο λειτουργεί ή κινείται το προϊόν είναι πολύ
        γρήγορος ή πολύ αργός για τις ανάγκες του πελάτη.
    spin_time:
      name: Χρόνος περιστροφής
      description: Η διάρκεια κατά την οποία το προϊόν παραμένει σε λειτουργία ή σε
        κίνηση είναι μικρότερη από την αναμενόμενη.
    spout:
      name: Στόμιο
      description: Ο σχεδιασμός του μηχανισμού ροής έχει ως αποτέλεσμα ανεπιθύμητες
        σταγόνες, στάξιμο ή διαρροές.
    spray_pattern:
      name: Μοτίβο ψεκασμού
      description: Η κατανομή ή το σχήμα του ψεκασμού δεν ανταποκρίνεται στις ανάγκες
        του πελάτη.
    squeaks:
      name: Τρίζει
      description: Το προϊόν παράγει ανεπιθύμητους ήχους υψηλής συχνότητας κατά τη
        χρήση.
    stability:
      name: Σταθερότητα
      description: Το προϊόν ταλαντεύεται ή δεν είναι σταθερό κατά την τοποθέτηση
        ή τη χρήση.
    stained:
      name: Λεκιασμένο
      description: Το προϊόν παρουσιάζει αποχρωματισμό ή σημάδια που επηρεάζουν την
        εμφάνισή του.
    stains_easily:
      name: Λεκιάζει εύκολα
      description: Το υλικό απορροφά και συγκρατεί εύκολα σημάδια ή αποχρωματισμούς.
    stone_setting:
      name: Δέσιμο πέτρας
      description: Ο τρόπος τοποθέτησης των διακοσμητικών λίθων ή πολύτιμων λίθων
        είναι μη ικανοποιητικός ή μη ασφαλής.
    storage_capacity:
      name: Χωρητικότητα αποθήκευσης
      description: Ο διαθέσιμος χώρος για αποθήκευση ψηφιακών δεδομένων είναι ανεπαρκής.
    straps_too_long:
      name: Πολύ μακριές τιράντες
      description: Το υπερβολικό μήκος των ιμάντων/λουριών εμποδίζει τη σωστή εφαρμογή
        ή ρύθμιση.
    straps_too_short:
      name: Πολύ κοντές τιράντες
      description: Το μήκος των ιμάντων/λουριών δεν επιτρέπει σωστή ρύθμιση ή άνετη
        χρήση.
    straps_too_thick:
      name: Πολύ χοντρές τιράντες
      description: Το πλάτος των ιμάντων/λουριών είναι υπερβολικό ή ογκώδες.
    straps_too_thin:
      name: Πολύ λεπτές τιράντες
      description: Το πλάτος από τις τιράντες/λουράκια δεν επαρκεί για άνεση ή στήριξη.
    strength:
      name: Δύναμη
      description: Η χημική ισχύς ή η φυσική δύναμη του προϊόντος δεν ανταποκρίνεται
        στις προσδοκίες.
    stride_length:
      name: Μήκος διασκελισμού
      description: Η απόσταση της ελλειπτικής τροχιάς ή της διαδρομής κίνησης του
        μηχανήματος δεν ταιριάζει με τη μηχανική του σώματος του χρήστη.
    stuffing:
      name: Γέμιση
      description: Η ποσότητα ή ο τύπος του υλικού πλήρωσης είναι ανεπαρκής ή προκαλεί
        δυσφορία.
    sturdiness:
      name: Ανθεκτικότητα
      description: Το προϊόν δεν διαθέτει την αναμενόμενη δομική ακεραιότητα, δίνοντας
        αίσθηση ευθραυστότητας, αδυναμίας ή τάσης για κάμψη κατά τη συνήθη χρήση.
    style:
      name: Στυλ
      description: Ο σχεδιασμός, η κοπή ή ο αισθητικός χαρακτήρας του προϊόντος δεν
        ανταποκρίνεται στο προσωπικό γούστο του πελάτη.
    suction:
      name: Αναρρόφηση
      description: Η ισχύς αναρρόφησης που δημιουργεί το προϊόν δεν είναι κατάλληλη
        για την προβλεπόμενη χρήση.
    suction_strength:
      name: Ισχύς αναρρόφησης
      description: Η δύναμη της στεγανοποίησης κενού είναι είτε πολύ αδύναμη είτε
        πολύ ισχυρή για την προβλεπόμενη χρήση.
    support:
      name: Υποστήριξη
      description: Το προϊόν δεν παρέχει επαρκή δομική υποστήριξη ή ενίσχυση για το
        σώμα.
    surface_damage:
      name: Επιφανειακή φθορά
      description: Το εξωτερικό του προϊόντος παρουσιάζει αισθητικά ελαττώματα όπως
        γρατζουνιές, βαθουλώματα, χτυπήματα ή άλλες ατέλειες.
    sweetness:
      name: Γλυκύτητα
      description: Το επίπεδο ζάχαρης ή γλυκιάς γεύσης στο προϊόν δεν ταιριάζει τις
        προτιμήσεις του πελάτη.
    tangles_easily:
      name: Μπερδεύεται εύκολα
      description: Το προϊόν κάνει κόμπους ή πιάνεται κατά τη χρήση περισσότερο από
        το αναμενόμενο.
    tarnished:
      name: Οξειδωμένο
      description: Η μεταλλική επιφάνεια έχει χάσει τη λάμψη της ή έχει αποχρωματιστεί.
    taste:
      name: Γεύση
      description: Το γευστικό προφίλ του αναλώσιμου προϊόντος δεν ανταποκρίνεται
        στις γευστικές προτιμήσεις του πελάτη.
    temperature:
      name: Θερμοκρασία
      description: Το επίπεδο θερμότητας ή ψύχους που παράγεται ή διατηρείται από
        το προϊόν δεν ανταποκρίνεται στις προτιμήσεις του πελάτη.
    temperature_range:
      name: Εύρος θερμοκρασίας
      description: Το εύρος θερμοκρασίας λειτουργίας του προϊόντος είναι πολύ περιορισμένο
        για τις ανάγκες του χρήστη.
    temperature_rating:
      name: Ονομαστική θερμοκρασία
      description: Το καθορισμένο εύρος θερμοκρασίας λειτουργίας του προϊόντος δεν
        είναι κατάλληλο για το περιβάλλον του πελάτη.
    temperature_regulation:
      name: Ρύθμιση θερμοκρασίας
      description: Το υλικό παγιδεύει υπερβολική θερμότητα σώματος, με αποτέλεσμα
        ο χρήστης να υπερθερμαίνεται.
    terrain:
      name: Έδαφος
      description: Ο τύπος ή οι συνθήκες της επιφάνειας του εδάφους δεν είναι κατάλληλες
        για τις δυνατότητες του προϊόντος.
    test_format:
      name: Μορφή δοκιμής
      description: Η μορφή της δοκιμής ή τα αποτελέσματά της δεν ανταποκρίνονται στην
        προτίμηση του πελάτη.
    test_method:
      name: Μέθοδος δοκιμής
      description: Η διαδικασία που απαιτείται για τη χρήση του κιτ δοκιμής δεν ανταποκρίνεται
        στην προτίμηση του πελάτη.
    text_size:
      name: Μέγεθος κειμένου
      description: Το μέγεθος γραμματοσειράς του εκτυπωμένου ή προβαλλόμενου κειμένου
        είναι δύσκολο να διαβαστεί.
    texture:
      name: Υφή
      description: Η υφή ή η σύσταση του προϊόντος δεν ανταποκρίνεται στην προτίμηση
        του πελάτη.
    theme:
      name: Θέμα
      description: Το συγκεκριμένο θέμα ή στυλ του προϊόντος δεν είναι αυτό που επιθυμούσε
        ο πελάτης.
    thickness:
      name: Πάχος
      description: Το φυσικό βάθος ή η κατασκευή του προϊόντος είναι πιο ογκώδης ή
        πιο λεπτή από το αναμενόμενο.
    tight_around_ankles:
      name: Στενό στους αστραγάλους
      description: Το ένδυμα σφίγγει δυσάρεστα γύρω από την περιοχή του αστραγάλου.
    tight_around_thighs:
      name: Στενό στους μηρούς
      description: Το ένδυμα σφίγγει δυσάρεστα γύρω από την περιοχή του μηρού.
    timer:
      name: Χρονοδιακόπτης
      description: Η λειτουργία χρονισμού ή η ρύθμιση διάρκειας είναι μη ικανοποιητική.
    tip_size:
      name: Μέγεθος μύτης
      description: Η διάσταση του άκρου γραφής ή του εφαρμογέα δεν είναι κατάλληλη
        για την επιθυμητή ακρίβεια.
    tip_style:
      name: Στυλ μύτης
      description: Το σχήμα ή ο σχεδιασμός του εφαρμογέα ή του άκρου γραφής δεν ανταποκρίνεται
        στις ανάγκες του πελάτη.
    too_big:
      name: Πολύ μεγάλο
      description: Οι διαστάσεις του προϊόντος είναι μεγαλύτερες από τις απαιτούμενες
        για την εφαρμογή ή τον διαθέσιμο χώρο του πελάτη.
    too_bitter:
      name: Πολύ πικρό
      description: Το γευστικό προφίλ έχει μια δυσάρεστα έντονη ή δυσάρεστα έντονη
        γεύση.
    too_bulky:
      name: Πολύ ογκώδες
      description: Το προϊόν καταλαμβάνει υπερβολικό χώρο ή είναι δυσκίνητο στον χειρισμό.
    too_coarse:
      name: Πολύ τραχύ
      description: Η λειαντική επιφάνεια είναι πιο τραχιά ή πιο έντονη από την απαιτούμενη.
    too_complex:
      name: Πολύ περίπλοκο
      description: Ο αριθμός των χαρακτηριστικών, των ρυθμίσεων ή των βημάτων που
        απαιτούνται για τη χρήση του κομματιού είναι υπερβολικός.
    too_drying:
      name: Προκαλεί υπερβολική ξηρότητα
      description: Το προϊόν απομακρύνει υπερβολική υγρασία, προκαλώντας ξηρότητα
        στο δέρμα ή τα μαλλιά.
    too_fine:
      name: Πολύ λεπτό
      description: Η λειαντική επιφάνεια είναι πιο λεία ή λιγότερο τραχιά από όσο
        απαιτείται.
    too_firm:
      name: Πολύ σκληρό
      description: Η ακαμψία ή η έλλειψη ελαστικότητας του κομματιού είναι μεγαλύτερη
        από την αναμενόμενη.
    too_long:
      name: Πολύ μακρύ
      description: Το μήκος του προϊόντος υπερβαίνει αυτό που είναι κατάλληλο για
        την προβλεπόμενη εφαρμογή, χώρο ή χρήση.
    too_loose:
      name: Πολύ χαλαρό
      description: Το προϊόν δεν εφαρμόζει σταθερά ή δεν έχει επαρκή τάση.
    too_loud:
      name: Πολύ θορυβώδες
      description: Ο ήχος που παράγεται από το προϊόν είναι υπερβολικός ή διαταράσσει
        το προβλεπόμενο περιβάλλον χρήσης του.
    too_much_support:
      name: Υπερβολική υποστήριξη
      description: Το επίπεδο ενίσχυσης ή σκληρότητας είναι υπερβολικό για την άνεση
        του πελάτη.
    too_narrow:
      name: Πολύ στενό
      description: Το πλάτος του προϊόντος δεν επαρκεί για την προβλεπόμενη εφαρμογή,
        τον χώρο ή τη χρήση.
    too_quiet:
      name: Πολύ χαμηλός ήχος
      description: Ο ήχος που παράγεται από το προϊόν δεν επαρκεί για να ακουστεί
        καθαρά στο προβλεπόμενο περιβάλλον του.
    too_rich:
      name: Πολύ έντονη γεύση
      description: Η γεύση ή η υφή είναι υπερβολικά έντονη ή πολύ βαριά για τις προτιμήσεις
        του πελάτη.
    too_sharp:
      name: Πολύ αιχμηρό
      description: Η κόψη ή η άκρη είναι επικίνδυνα αιχμηρή ή προκαλεί δυσφορία.
    too_short:
      name: Πολύ κοντό
      description: Το μήκος του κομματιού δεν επαρκεί για την προβλεπόμενη εφαρμογή,
        τον χώρο ή τη χρήση.
    too_simple:
      name: Πολύ απλό
      description: Το προϊόν δεν διαθέτει την πολυπλοκότητα ή τα χαρακτηριστικά που
        επιθυμούσε ο πελάτης.
    too_small:
      name: Πολύ μικρό
      description: Οι διαστάσεις του κομματιού είναι μικρότερες από ό,τι απαιτείται
        για την εφαρμογή ή τον χώρο του πελάτη.
    too_soft:
      name: Πολύ μαλακό
      description: Η έλλειψη δομής ή η έλλειψη σταθερότητας του κομματιού είναι μεγαλύτερη
        από την αναμενόμενη.
    too_sticky:
      name: Πολύ κολλώδες
      description: Το προϊόν προσκολλάται υπερβολικά ή αφήνει ένα ανεπιθύμητο κολλώδες
        υπόλειμμα.
    too_stiff:
      name: Πολύ άκαμπτο
      description: Το κομμάτι ή τα εξαρτήματά του είναι πολύ άκαμπτα για να λυγίσουν
        ή να προσαρμοστούν όπως απαιτείται για την προβλεπόμενη χρήση τους.
    too_strong:
      name: Πολύ δυνατό
      description: Η ισχύς, η απόδοση ή η επίδραση του κομματιού είναι υπερβολική
        ή πολύ έντονη.
    too_subtle:
      name: Πολύ διακριτικό
      description: Ο χαρακτήρας, η λεπτομέρεια ή οι διαβαθμίσεις της επίδρασης του
        κομματιού έχουν μικρότερο αντίκτυπο από τον επιθυμητό.
    too_sweet:
      name: Πολύ γλυκό
      description: Το επίπεδο ζάχαρης ή γλυκιάς γεύσης ξεπερνά τις προτιμήσεις του
        πελάτη.
    too_thick:
      name: Πολύ παχύ
      description: Το κομμάτι έχει μεγαλύτερη υλική πυκνότητα ή ή όγκο από ό,τι απαιτείται
        για την προβλεπόμενη χρήση.
    too_thin:
      name: Πολύ λεπτό
      description: Το κομμάτι έχει λιγότερη πυκνότητα ή ή υλική υπόσταση από ό,τι
        απαιτείται για την προβλεπόμενη χρήση.
    too_tight:
      name: Πολύ στενό
      description: Το κομμάτι πιέζει ή εφαρμόζει πολύ σφιχτά, επηρεάζοντας την άνεση
        του πελάτη.
    too_weak:
      name: Πολύ αδύναμο
      description: Η ισχύς, η απόδοση ή η επίδραση του κομματιού είναι ανεπαρκής ή
        μόλις αισθητή.
    too_wide:
      name: Πολύ φαρδύ
      description: Το πλάτος του κομματιού είναι υπερβολικό για την προβλεπόμενη εφαρμογή,
        τον χώρο ή τη χρήση.
    tooth_spacing:
      name: Διάκενο δοντιών
      description: Η απόσταση μεταξύ των δοντιών στη χτένα ή τη λεπίδα δεν ταιριάζει
        στις ανάγκες του πελάτη.
    touch_response:
      name: Απόκριση αφής
      description: Η ευαισθησία της διεπαφής αφής είναι υπερβολικά υψηλή ή χαμηλή.
    transparency:
      name: Διαφάνεια
      description: Το υλικό είναι πολύ διαφανές ή όχι αρκετά διαυγές για τις προτιμήσεις
        του πελάτη.
    tread_type:
      name: Τύπος πέλματος
      description: Το σχέδιο της εξωτερικής σόλας ή της επιφάνειας του κομματιού είναι
        ακατάλληλο για το προβλεπόμενο έδαφος ή τις συνθήκες.
    trial_period_ending:
      name: Λήξη δοκιμαστικής περιόδου
      description: Ο πελάτης επιστρέφει το προϊόν πριν από τη λήξη της συνδρομής ή
        της δοκιμαστικής περιόδου.
    type_too_big:
      name: Πολύ μεγάλα γράμματα
      description: Το μέγεθος γραμματοσειράς ή χαρακτήρων είναι μεγαλύτερο από το
        επιθυμητό.
    type_too_small:
      name: Πολύ μικρά γράμματα
      description: Το μέγεθος της γραμματοσειράς ή των χαρακτήρων είναι πολύ μικρό
        για να διαβαστεί άνετα.
    uncomfortable:
      name: Άβολο
      description: Η γενική σωματική αίσθηση της χρήσης του προϊόντος προκαλεί δυσφορία.
    uncomfortable_in_ear:
      name: Άβολο στο αυτί
      description: Η εφαρμογή ή το σχήμα του ακουστικού προκαλεί σωματικό ερεθισμό
        ή πόνο.
    underwire:
      name: Μπανέλα
      description: Η μεταλλική ή πλαστική ενίσχυση του ενδύματος προκαλεί δυσφορία
        ή δεν εφαρμόζει σωστά στο σώμα.
    unknown:
      name: Άγνωστο
      description: Ο λόγος της επιστροφής δεν έχει προσδιοριστεί ή δεν μπορεί να προσδιοριστεί.
    unstable:
      name: Ασταθές
      description: Το κομμάτι μετατοπίζεται, δονείται υπερβολικά ή χάνει την ισορροπία
        του κατά τη λειτουργία ή τη χρήση.
    vehicle_fit:
      name: Εφαρμογή σε όχημα
      description: Το κομμάτι δε στερεώνεται σωστά ή δεν χωράει μέσα στο συγκεκριμένο
        όχημα του πελάτη.
    ventilation:
      name: Εξαερισμός
      description: Το κομμάτι δεν παρέχει επαρκή ροή αέρα ή διαπνοή.
    vibration:
      name: Δόνηση
      description: Η ταλαντωτική κίνηση που παράγεται από τη συσκευή είναι υπερβολική
        ή άβολη.
    video_quality:
      name: Ποιότητα βίντεο
      description: Η ευκρίνεια, η κίνηση ή η πιστότητα των χρωμάτων της εικόνας δεν
        είναι τα αναμενόμενα.
    viscosity:
      name: Ιξώδες
      description: Η πυκνότητα ή η αντίσταση ροής του υγρού δεν είναι κατάλληλες για
        την προβλεπόμενη εφαρμογή.
    vision_clarity:
      name: Καθαρότητα όρασης
      description: Η ορατότητα μέσα από τον φακό επηρεάζει αρνητικά την ικανότητα
        του χρήστη να βλέπει καθαρά.
    voltage:
      name: Τάση
      description: Η ηλεκτρική ονομαστική τιμή της συσκευής δεν ταιριάζει με την προβλεπόμενη
        παροχή ρεύματος.
    volume:
      name: Όγκος
      description: Ο ήχος που παράγεται από τη συσκευή δεν είναι αρκετά δυνατός ή
        είναι πολύ δυνατός.
    waist_too_big:
      name: Πολύ μεγάλη μέση
      description: Η διάσταση της μέσης είναι μεγαλύτερη από όσο απαιτείται για το
        σώμα του πελάτη.
    waist_too_high:
      name: Πολύ ψηλή μέση
      description: Η μέση του ενδύματος βρίσκεται πολύ ψηλά στον κορμό.
    waist_too_loose:
      name: Πολύ φαρδιά μέση
      description: Η ζώνη δεν εφαρμόζει σταθερά γύρω από τη μέση.
    waist_too_low:
      name: Πολύ χαμηλή μέση
      description: Η μέση του ενδύματος βρίσκεται πολύ χαμηλά στους γοφούς.
    waist_too_small:
      name: Πολύ μικρή μέση
      description: Η διάσταση της μέσης είναι μικρότερη από όσο απαιτείται για το
        σώμα του πελάτη.
    waist_too_tight:
      name: Πολύ στενή μέση
      description: Η ζώνη σφίγγει δυσάρεστα γύρω από τη μέση.
    warmth:
      name: Ζεστασιά
      description: Το επίπεδο θερμότητας που παρέχει ή διατηρεί το κομμάτι είναι ακατάλληλο
        για τις προβλεπόμενες συνθήκες ή δραστηριότητα.
    washability:
      name: Πλενιμότητα
      description: Η απαιτούμενη μέθοδος καθαρισμού είναι μη αποδεκτή.
    water_resistance:
      name: Αντοχή στο νερό
      description: Η ικανότητα του κομματιού να απωθεί το νερό ή την υγρασία είναι
        ανεπαρκής για τις προβλεπόμενες συνθήκες χρήσης.
    wear:
      name: Φθορά
      description: Το αποτέλεσμα του καλλυντικού ή του προϊόντος προσωπικής φροντίδας
        δεν έχει την αναμενόμενη διάρκεια.
    weather:
      name: Καιρός
      description: Οι περιβαλλοντικές συνθήκες εμποδίζουν την πραγματοποίηση της υπηρεσίας
        ή της δραστηριότητας.
    weight:
      name: Βάρος
      description: Το βάρος (πολύ βαρύ ή πολύ ελαφρύ) του κομματιού το καθιστά ακατάλληλο
        για την προβλεπόμενη χρήση του πελάτη.
    weight_capacity:
      name: Μέγιστο επιτρεπόμενο βάρος
      description: Το μέγιστο φορτίο που μπορεί να αντέξει το κομμάτι είναι ανεπαρκές
        για την προβλεπόμενη χρήση του πελάτη.
    wheels_stick:
      name: Οι ρόδες κολλάνε
      description: Ο μηχανισμός κύλισης δεν κινείται ομαλά.
    whitening_results:
      name: Αποτελέσματα λεύκανσης
      description: Ο βαθμός αλλαγής χρώματος που επιτυγχάνεται είναι μικρότερος από
        τον αναμενόμενο.
    width:
      name: Πλάτος
      description: Η μέτρηση του κομματιού από πλευρά σε πλευρά είναι ακατάλληλη για
        την εφαρμογή ή τον χώρο του πελάτη.
    wind_resistance:
      name: Αντοχή στον άνεμο
      description: Η ικανότητα του κομματιού να εμποδίζει τον αέρα είναι ακατάλληλη
        για τις προβλεπόμενες συνθήκες ή δραστηριότητα.
    wrong_amount:
      name: Λάθος ποσότητα
      description: Η ποσότητα του προϊόντος που παραλήφθηκε διαφέρει από την παραγγελία
        ή το αναμενόμενο.
    wrong_dosage:
      name: Λάθος δοσολογία
      description: Η ισχύς ή η συγκέντρωση του δραστικού συστατικού δεν πληροί τις
        προδιαγραφές.
    wrong_format:
      name: Λάθος μορφή
      description: Ο τύπος του μέσου ή η φυσική δομή δεν είναι συμβατά με τη συσκευή
        ή τις προτιμήσεις του πελάτη.
    wrong_hand:
      name: Λάθος χέρι
      description: Το κομμάτι έχει σχεδιαστεί για δεξιότητα του άλλου χεριού (αριστερόχειρας
        αντί για δεξιόχειρας ή το αντίστροφο) από αυτή που χρειάζεται ο πελάτης.
    pilling:
      name: Ευπαθή υφάσματα
      description: Το ύφασμα σχηματίζει πρόωρα ανεπιθύμητες μπάλες από ίνες ή χνούδι
        κατά τη χρήση ή το πλύσιμο.
