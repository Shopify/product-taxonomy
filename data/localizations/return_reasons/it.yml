    embellishment_fell_off:
      name: La decorazione si è staccata
      description: Gli elementi decorativi si sono staccati dall'articolo.
    energy_efficiency:
      name: Efficienza energetica
      description: La quantità di energia utilizzata dall'articolo è eccessiva rispetto
        alle prestazioni offerte.
    eye_strain:
      name: Affaticamento degli occhi
      description: L'uso del prodotto provoca affaticamento visivo o fastidio agli
