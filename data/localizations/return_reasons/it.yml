    field_of_view_too_narrow:
      name: Campo visivo troppo stretto
      description: L'area visibile attraverso l'ottica o la maschera è troppo limitata.
    filtration_class:
      name: Classe di filtrazione
      description: Il grado o lo standard di blocco delle particelle del filtro non
