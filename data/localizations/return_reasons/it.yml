    cups_too_big:
      name: Coppe troppo grandi
      description: Il volume della coppa del capo è troppo grande per il seno della
        cliente.
    cups_too_loose:
      name: Coppe troppo larghe
      description: La coppa non è sufficientemente aderente e non offre sufficiente
        supporto.
    cups_too_small:
      name: Coppe troppo piccole
      description: Il volume della coppa del capo è troppo piccolo per il seno della
        cliente.
    cups_too_thick:
      name: Coppe troppo spesse
      description: L'imbottitura o lo spessore del materiale nelle coppe è eccessivo.
    cups_too_thin:
      name: Coppe troppo sottili
      description: Le coppe non hanno sufficiente imbottitura o copertura.
    cups_too_tight:
      name: Coppe troppo strette
      description: Le coppe comprimono o stringono il seno causando disagio.
    cushioning:
      name: Ammortizzazione
      description: La morbidezza o l'assorbimento degli urti del materiale non è adeguato
        all'uso previsto.
    damaged_after_use:
      name: Danneggiato dopo l'uso
      description: L'articolo presenta deterioramento o rottura dopo il normale utilizzo.
    damaged_after_washing:
      name: Danneggiato dopo il lavaggio
      description: L'articolo ha subito danni durante il processo di pulizia.
    damaged_after_wear:
      name: Danneggiato con l'uso
      description: L'articolo presenta segni di danneggiamento dovuti all'uso sul
        corpo.
    damaged_or_defective:
      name: Danneggiato o difettoso
      description: L'articolo è arrivato con danni fisici, difetti di fabbricazione
        o non funziona come previsto.
    damaged_packaging:
      name: Imballaggio danneggiato
      description: Il contenitore esterno è arrivato in condizioni compromesse.
    depth:
      name: Profondità
      description: La misurazione dalla parte anteriore a quella posteriore o dall'alto
        in basso non è adatta allo spazio o alla vestibilità richiesti dal cliente.
    detail:
      name: Dettaglio
      description: Il livello di complessità o precisione nella progettazione o nella
