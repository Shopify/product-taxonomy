    fitment:
      name: Compatibilità
      description: L'articolo non corrisponde al modello specifico o alla parte a
        cui è collegato.
    flange_size:
      name: Dimensioni della flangia
      description: Il diametro dell'apertura della coppa del tiralatte non è adatto
