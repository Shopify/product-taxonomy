    content:
      name: Contenuto
      description: Le informazioni o il materiale inclusi nell'articolo non corrispondono
        a quanto previsto dal cliente.
    cook_time:
      name: Tempo di cottura
      description: Il tempo necessario per preparare il prodotto alimentare è insoddisfacente
