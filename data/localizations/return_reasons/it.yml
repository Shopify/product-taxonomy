    dispenser:
      name: Dispenser
      description: Il meccanismo di erogazione del prodotto non è soddisfacente.
    doesnt_apply_evenly:
      name: Non si applica in modo uniforme
      description: Il prodotto si stende a chiazze o con striature.
    doesnt_blend_well:
      name: Non si amalgama bene
      description: Il prodotto non si mescola o si integra facilmente con altre sostanze
