    difficult_to_refill:
      name: Difficile da ricaricare
      description: Il processo di ricarica del prodotto è poco pratico o complicato.
    difficult_to_use:
      name: Difficile da usare
      description: L'articolo richiede più competenza o impegno del previsto per funzionare.
    difficulty_level:
      name: Livello di difficoltà
      description: La sfida presentata dall'articolo non è adatta alle competenze
