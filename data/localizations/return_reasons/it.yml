    doesnt_stay_closed:
      name: Non rimane chiuso
      description: Il meccanismo di chiusura o di fissaggio non rimane in posizione.
    drainage:
      name: Drenaggio
      description: L'articolo non consente al liquido di fluire correttamente.
    draw_length:
      name: Lunghezza di trazione
