    dietary_requirements:
      name: Esigenze alimentari
      description: Il prodotto contiene ingredienti che sono in conflitto con le esigenze
        di salute o con le scelte di stile di vita del cliente.
    difficult_to_adjust:
      name: Difficile da regolare
      description: I meccanismi per modificare la vestibilità o le impostazioni dell'articolo
        sono difficili da utilizzare.
    difficult_to_assemble:
      name: Difficile da assemblare
      description: Il processo di assemblaggio del prodotto è eccessivamente difficile,
        complesso o le istruzioni non sono chiare.
    difficult_to_blend:
      name: Difficile da miscelare
      description: Il prodotto non si mescola facilmente con altre sostanze o superfici.
    difficult_to_clean:
      name: Difficile da pulire
      description: Il design o il materiale dell'articolo rende difficile la pulizia,
