    fails_to_detect_threats:
      name: Non rileva le minacce
      description: Il dispositivo di sicurezza non identifica i pericoli come previsto.
    fastening:
      name: Chiusura
      description: Il metodo di fissaggio o chiusura dell'articolo è difficile o per
