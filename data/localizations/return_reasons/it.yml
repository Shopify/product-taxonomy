    duplicate_order:
      name: Ordine doppio
      description: Il cliente ha ordinato l'articolo più volte per errore.
    duration:
      name: Durata
      description: Il tempo assegnato per il servizio, l'evento o il periodo di accesso
        è più breve o più lungo del previsto.
    dye_transferred:
      name: Il colore ha stinto
      description: Il colore dell'articolo si è trasferito su altre superfici o indumenti.
    edition:
      name: Edizione
      description: La versione o la release specifica del prodotto non corrisponde
