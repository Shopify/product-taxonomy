    cooling:
      name: Raffreddamento
      description: La capacità del dispositivo di abbassare la temperatura è insufficiente.
    coverage:
      name: Copertura
      description: Il grado in cui l'articolo copre, protegge o si applica a una superficie
        non soddisfa le esigenze del cliente.
    cuff_too_big:
      name: Polsino troppo grande
      description: L'apertura per il polso o il braccio è troppo lenta.
    cuff_too_small:
      name: Polsino troppo piccolo
      description: L'apertura per il polso o il braccio è troppo stretta.
    cups_gaping:
      name: Coppe larghe
      description: Le coppe del reggiseno non si adattano al corpo, creando degli
