---
it:
  return_reasons:
    absorbency:
      name: Capacità di assorbimento
      description: La capacità del materiale di assorbire e trattenere i liquidi è
        insufficiente o eccessiva.
    absorption:
      name: Assorbimento
      description: Il prodotto non viene assorbito dalla superficie o dal corpo come
        previsto.
    academic_level:
      name: Livello accademico
      description: La complessità o la profondità del contenuto non è adatta alle
        esigenze didattiche del cliente.
    accuracy:
      name: Precisione
      description: Le misurazioni o i dati forniti dal dispositivo non sono sufficientemente
        precisi.
    adhesion:
      name: Adesione
      description: Il prodotto non crea un'adesione iniziale sicura con la superficie
        prevista.
    adhesive:
      name: Adesivo
      description: Le proprietà adesive del prodotto non sono adatte all'uso previsto.
    adhesive_strength:
      name: Forza adesiva
      description: Il potere di tenuta dell'adesivo è insufficiente o eccessivo per
        il carico o la sollecitazione previsti.
    adjustability:
      name: Regolabilità
      description: L'articolo non può essere modificato o ridimensionato in modo sufficiente
        per soddisfare le esigenze del cliente.
    age:
      name: Età
      description: L'età, l'anno o la data di produzione del prodotto non corrisponde
        a quanto previsto.
    age_range:
      name: Fascia d'età
      description: La fascia d’età consigliata per l’articolo non corrisponde all’utente
        previsto.
    age_restriction:
      name: Limite di età
      description: Il prodotto presenta limitazioni di utilizzo basate sui requisiti
        di età minima o massima.
    amperage:
      name: Amperaggio
      description: La corrente elettrica nominale non è adatta ai requisiti del dispositivo
        o del sistema del cliente.
    angle:
      name: Angolo
      description: Il grado di inclinazione o curvatura non corrisponde alle esigenze
        del cliente.
    animal_didnt_like:
      name: Non è piaciuto all'animale
      description: L'animale si è rifiutato di consumare o interagire con il prodotto.
    animal_refused:
      name: Rifiutato dall'animale
      description: L'animale non utilizzerebbe né consumerebbe il prodotto.
    application:
      name: Applicazione
      description: Il metodo richiesto per applicare il prodotto è poco tollerante
        agli errori, eccessivamente complesso o facilmente soggetto a errori da parte
        dell'utente.
    applicator:
      name: Applicatore
      description: Lo strumento fornito distribuisce il prodotto in modo non uniforme
        o incontrollato.
    arrived_late:
      name: Arrivato in ritardo
      description: La consegna è avvenuta dopo la data prevista o l'orario richiesto.
    articulation:
      name: Articolazione
      description: L'ampiezza o la qualità del movimento delle articolazioni del prodotto
        non soddisfa le esigenze del cliente.
    artificial_tasting:
      name: Sapore artificiale
      description: Il sapore ha una connotazione artificiale o sintetica.
    assembly:
      name: Assemblaggio
      description: Il prodotto richiede il montaggio, mentre il cliente si aspettava
        che fosse pre-assemblato.
    assortment:
      name: Assortimento
      description: La varietà di articoli inclusi nella confezione non è quella desiderata
        dal cliente.
    baby_refused:
      name: Rifiutato dal bambino
      description: Il bambino non utilizzava né accettava l'articolo.
    balance:
      name: Equilibrio
      description: La distribuzione del peso all'interno dell'articolo ne influenza
        in modo indesiderato la gestione o la stabilità.
    band_rolls_down:
      name: La fascia si arrotola
      description: Il capo non rimane fermo e scende lungo il corpo.
    band_rolls_up:
      name: La fascia si arrotola
      description: La fascia elastica o in tessuto non rimane in posizione e risale
        lungo il corpo.
    band_too_big:
      name: Fascia troppo grande
      description: La circonferenza della fascia è eccessiva e impedisce una vestibilità
        aderente sul corpo.
    band_too_loose:
      name: Fascia troppo larga
      description: La circonferenza della fascia non si adatta correttamente.
    band_too_small:
      name: Fascia troppo piccola
      description: La circonferenza della fascia è insufficiente e comprime il corpo.
    band_too_thick:
      name: Fascia troppo spessa
      description: La larghezza della fascia è eccessiva per le preferenze del cliente.
    band_too_thin:
      name: Fascia troppo sottile
      description: La larghezza della fascia è insufficiente per garantire comfort
        o sostegno.
    band_too_tight:
      name: Fascia troppo stretta
      description: La fascia comprime il corpo provocando disagio.
    barrel_size:
      name: Dimensioni della mazza da baseball
      description: Il diametro del ferro arricciacapelli o dello strumento non è della
        misura corretta per ottenere l'effetto desiderato.
    base_curve:
      name: Curva di base
      description: La curvatura della lente non corrisponde alla forma degli occhi
        del cliente o ai requisiti della prescrizione.
    battery_life:
      name: Durata della batteria
      description: La durata di funzionamento del dispositivo con una singola ricarica
        non soddisfa le aspettative del cliente.
    bitterness:
      name: Gusto amaro
      description: Il profilo aromatico ha un gusto sgradevolmente forte o acre.
    blade_type:
      name: Tipo di lama
      description: Lo stile o il bordo specifico della lama non è adatto all'uso del
        cliente.
    board_volume:
      name: Volume della tavola
      description: Il volume di spostamento della tavola garantisce una galleggiabilità
        insufficiente o eccessiva rispetto al peso dell'utente.
    bounce:
      name: Rimbalzo
      description: La capacità di rimbalzo dell'articolo è eccessiva o insufficiente
        per l'attività.
    breaks_easily:
      name: Si rompe facilmente
      description: L'articolo mostra segni di fragilità o non è durevole in condizioni
        di normale utilizzo.
    breathability:
      name: Traspirabilità
      description: Il materiale non lascia passare l'umidità, causando surriscaldamento
        o una sensazione di bagnato.
    brightness:
      name: Luminosità
      description: L'intensità della luce emessa o riflessa dall'articolo non soddisfa
        le preferenze del cliente.
    bristles_too_coarse:
      name: Setole troppo ruvide
      description: La spazzola è troppo ruvida o graffiante per l'attività prevista.
    bristles_too_soft:
      name: Setole troppo morbide
      description: La spazzola è troppo delicata per l'attività a cui è destinata.
    bubble_output:
      name: Produzione di bolle
      description: La quantità o la dimensione delle bolle prodotte non è quella prevista.
    budget:
      name: Budget
      description: Il costo del servizio supera le possibilità finanziarie del cliente.
    buoyancy:
      name: Galleggiabilità
      description: La capacità dell'articolo di galleggiare o sostenere il peso in
        acqua non soddisfa le esigenze del cliente.
    burn_rate:
      name: Velocità di combustione
      description: La velocità con cui l'articolo viene consumato dalla combustione
        è più rapida o più lenta del previsto.
    burn_time:
      name: Durata della combustione
      description: La durata della combustione dell'articolo è più breve o più lunga
        del previsto.
    bust_too_big:
      name: Busto troppo grande
      description: La zona del torace del capo è troppo grande per il corpo del cliente.
    bust_too_loose:
      name: Busto troppo largo
      description: La vestibilità nella zona del busto non è sufficientemente aderente.
    bust_too_small:
      name: Busto troppo piccolo
      description: L'area del torace del capo è troppo piccola per il corpo del cliente.
    bust_too_tight:
      name: Busto troppo stretto
      description: Il capo stringe in modo fastidioso intorno al seno.
    buttons_not_accessible:
      name: Pulsanti non accessibili
      description: La custodia o copertura blocca i comandi del dispositivo, impedendone
        l'uso.
    caffeine_level:
      name: Livello di caffeina
      description: La concentrazione di caffeina nel prodotto è troppo alta o troppo
        bassa per l'utente.
    caliber:
      name: Calibro
      description: Il diametro specificato del proiettile o della canna non è compatibile
        con l'attrezzatura del cliente.
    calibration:
      name: Calibrazione
      description: Il processo di Impostazione o adattamento del dispositivo a uno
        standard noto è difficile o non avviene come previsto.
    capacity:
      name: Capacità
      description: Il volume o la quantità che l'articolo può contenere o processare
        non soddisfa le esigenze del cliente.
    carbonation:
      name: Carbonatazione
      description: Il livello di frizzantezza o di bollicine nella bevanda è eccessivo
        o insufficiente.
    caused_allergic_reaction:
      name: Ha causato una reazione allergica
      description: Il prodotto scatena una risposta allergica specifica e significativa,
        come orticaria, gonfiore o una grave eruzione cutanea.
    caused_irritation:
      name: Ha causato irritazione
      description: Il prodotto ha provocato irritazioni cutanee o fastidi fisici.
    changed_my_mind:
      name: Ho cambiato idea
      description: Dopo aver acquistato l'articolo, il cliente non lo desidera più,
        indipendentemente dalla qualità o dalla precisione del prodotto.
    charging_speed:
      name: Velocità di ricarica
      description: Il dispositivo impiega troppo tempo per ricaricare la batteria.
    chest_too_big:
      name: Petto troppo grande
      description: La misura del torace del capo è troppo grande per il cliente.
    chest_too_small:
      name: Petto troppo piccolo
      description: La misura del torace del capo è troppo piccola per la cliente.
    clarity:
      name: Chiarezza
      description: La trasparenza dell'articolo non soddisfa le esigenze del cliente.
    cleaning:
      name: Pulizia
      description: L'articolo non si pulisce facilmente come ci si aspettava.
    closeness:
      name: Aderenza
      description: La rasatura o il taglio dello strumento non raggiunge la vicinanza
        alla pelle prevista.
    closure:
      name: Chiusura
      description: Il meccanismo di apertura o chiusura dell'articolo è difficile
        da usare o non è sicuro.
    cold_duration:
      name: Durata del freddo
      description: L'articolo non rimane freddo per il tempo richiesto dal cliente.
    collar_too_loose:
      name: Colletto troppo largo
      description: Il collare non aderisce saldamente al collo.
    collar_too_tight:
      name: Colletto troppo stretto
      description: Il colletto stringe in modo fastidioso intorno al collo.
    color:
      name: Colore
      description: La tonalità, la sfumatura o l'aspetto dell'articolo non corrisponde
        alle preferenze o alle aspettative del cliente.
    color_too_bright:
      name: Colore troppo acceso
      description: L'intensità o la vivacità del colore è eccessiva per i gusti del
        cliente.
    color_too_muted:
      name: Colore troppo spento
      description: Il colore non ha una vivacità o intensità sufficiente per le preferenze
        del cliente.
    comfort:
      name: Comfort
      description: La sensazione fisica o le prestazioni ergonomiche dell'articolo
        non soddisfano le aspettative.
    compartments:
      name: Scomparti
      description: Il numero o la disposizione delle sezioni di stoccaggio non soddisfa
        le esigenze organizzative del cliente.
    compliance:
      name: Conformità
      description: Il prodotto non soddisfa gli standard normativi o organizzativi
        specifici richiesti dal cliente.
    compression:
      name: Compressione
      description: Il livello di pressione applicato dal capo è eccessivo o insufficiente.
    condition:
      name: Condizione
      description: Lo stato di conservazione dell'articolo, comprese piccole imperfezioni
        o segni di usura, non corrisponde al grado o alla descrizione pubblicizzati.
    configuration:
      name: Configurazione
      description: Il modo in cui i componenti modulari dell'articolo possono essere
        disposti o interconnessi non è adatto all'applicazione prevista.
    connectivity:
      name: Connettività
      description: La capacità del dispositivo di collegarsi alla rete o ad altri
        dispositivi è inaffidabile o insufficiente.
    consistency:
      name: Consistenza
      description: Lo spessore, la consistenza o il flusso di un prodotto liquido
