      description: 광학 표면에 시야 또는 외관에 영향을 주는 눈에 띄는 자국이 있습니다.
    lifting_capacity:
      name: 리프팅 용량
      description: 장비가 들어 올릴 수 있는 최대 중량이 부족합니다.
    light_spectrum:
      name: 광 스펙트럼
      description: 방출되는 특정 파장의 빛이 고객의 요구를 충족하지 않습니다.
    light_temperature:
      name: 색온도
      description: 방출되는 빛의 색온도(웜톤 또는 쿨톤)가 고객의 선호에 맞지 않습니다.
    lock:
      name: 잠금장치
      description: 내장된 열쇠 또는 번호 잠금 장치가 불량이거나 예상대로 작동하지 않습니다.
    lock_type:
      name: 잠금 장치 유형
      description: 품목을 고정하는 특정 장치가 편의성이나 보안에 대한 고객의 선호를 충족하지 않습니다.
    logo_peeling:
      name: 로고가 벗겨짐
      description: 품목에 인쇄되거나 부착된 브랜드 표시가 벗겨지고 있습니다.
    longevity:
      name: 지속력
      description: 제품 효과의 지속 시간이 예상보다 짧거나 깁니다.
    loose_around_ankle:
      name: 발목 부분이 헐렁함
      description: 옷의 발목 부분이 제대로 고정되지 않습니다.
    loose_around_thighs:
      name: 허벅지 부분이 헐렁함
      description: 의류가 허벅지 부위에 안정적으로 맞지 않습니다.
    loose_seams:
      name: 솔기가 풀림
      description: 봉제 연결 부위가 견고하지 않아 마감 품질이 좋지 않습니다.
    loose_threads:
      name: 실밥이 풀림
      description: 품목에 실밥이나 올 풀림이 눈에 띄며, 이는 마감 품질이 좋지 않음을 나타냅니다.
    low_light_performance:
      name: 저조도 성능
      description: 장치는 어두운 환경에서 저품질의 이미지 또는 영상을 촬영합니다.
    low_resolution:
      name: 낮은 해상도
      description: 시각적 출력의 디테일 또는 선명도가 부족합니다.
    lubrication:
      name: 윤활
      description: 제품이 정상적인 기능 수행에 비해 너무 건조하거나 지나치게 미끄럽습니다.
    magnification:
      name: 배율
      description: 품목이 제공하는 확대 수준이 고객의 요구에 적합하지 않습니다.
    magnification_too_strong:
      name: 배율이 너무 높음
      description: 제공되는 확대 수준이 과도하여 왜곡이나 불편함을 유발합니다.
    magnification_too_weak:
      name: 배율이 너무 낮음
      description: 제공된 확대 비율이 고객 시력의 요구 사항을 충족하기에 부족합니다.
    maneuverability:
      name: 조작성
      description: 품목을 이동, 조향 또는 조작하는 용이성이 고객의 요구를 충족하지 않습니다.
    material:
      name: 소재
      description: 품목의 소재 또는 원단이 촉감, 내구성 또는 구성에 대한 고객의 선호를 충족하지 않습니다.
    material_not_breathable:
      name: 소재의 통기성이 좋지 않음
      description: 원단이 충분한 공기 순환을 허용하지 않습니다.
    material_not_durable:
      name: 소재의 내구성이 좋지 않음
      description: 원단 또는 소재가 기대되는 내구성이나 마모 저항성을 갖추지 못했습니다.
    material_too_see_through:
      name: 소재가 너무 비침
      description: 의류의 원단이 예상보다 더 비칩니다.
    material_too_stiff:
      name: 소재가 너무 뻣뻣함
      description: 원단이 원하는 유연성이나 부드러움을 갖추지 못했습니다.
    material_too_stretchy:
      name: 소재가 너무 잘 늘어남
      description: 원단의 탄성이 과도하여 원하는 형태를 유지하지 못합니다.
    mesh_size:
      name: 메시 사이즈
      description: 그물 또는 스크린의 구멍 간격이 너무 크거나 작습니다.
    messy:
      name: 사용 시 지저분함
      description: 제품 사용 시 원치 않는 오염이 발생하거나 잔여물이 남습니다.
    method:
      name: 방식
      description: 제품 사용에 필요한 방식이 고객에게 적합하지 않습니다.
    metrics_supported:
      name: 지원되는 지표
      description: 장치가 고객이 요구하는 특정 데이터 항목을 추적하거나 표시하지 않습니다.
    mileage:
      name: 주행 거리
      description: 차량의 연비 또는 사용 이력이 기대에 미치지 못합니다.
    missing_desired_features:
      name: 원하는 기능 없음
      description: 제품에 고객이 기대한 특정 기능이나 속성이 없습니다.
    mixing_performance:
      name: 혼합 성능
      description: 장치가 재료를 예상대로 혼합하지 않습니다.
    mounting_difficulty:
      name: 설치 어려움
      description: 품목을 벽이나 다른 표면에 부착하는 과정이 지나치게 어렵거나 복잡하거나, 설명서가 명확하지 않습니다.
    movement:
      name: 움직임
      description: 품목의 자동 또는 수동 움직임이 너무 빠르거나 느리거나, 전반적으로 만족스럽지 않습니다.
    narration:
      name: 내레이션
      description: 음성 안내의 목소리, 톤 또는 스타일이 고객에게 매력적이지 않습니다.
    nicotine_strength:
      name: 니코틴 농도
      description: 제품의 니코틴 농도가 고객에게 너무 강하거나 너무 약합니다.
    night_vision:
      name: 야간 투시
      description: 장치의 적외선 또는 무광원 모드에서 생성되는 이미지가 선명하지 않거나 효과적이지 않습니다.
    no_pockets:
      name: 주머니 없음
      description: 품목에 고객이 기대한 수납 공간이 없습니다.
    noise_reduction:
      name: 소음 감소
      description: 품목이 고객이 기대한 만큼 효과적으로 소리를 차단하거나 상쇄하지 못합니다.
    not_dishwasher_safe:
      name: 식기세척기 사용 불가
      description: 품목이 손세탁만 가능하여 고객에게 불편합니다.
    not_enough_support:
      name: 지지력이 부족함
      description: 품목에 충분한 구조적 보강이 없습니다.
    not_pet_friendly:
      name: 반려동물에게 안전하지 않음
      description: 제품에 반려동물에게 해롭거나 적합하지 않은 성분이나 요소가 포함되어 있습니다.
    not_suitable_for_hair_type:
      name: 모발 타입에 맞지 않음
      description: 제품이 사용자 모발에 효과가 없거나 원치 않는 효과를 유발합니다.
    not_suitable_for_skin_type:
      name: 피부 타입에 적합하지 않음
      description: 제품이 사용자 피부에 자극을 주거나 효과가 없습니다.
    not_suitable_for_terrain:
      name: 지형에 적합하지 않음
      description: 품목이 고객이 의도한 특정 지면에서 충분한 성능을 발휘하지 못합니다.
    nozzle:
      name: 노즐
      description: 제품 분사 방식이 만족스럽지 않습니다.
    odor:
      name: 냄새
      description: 제품에서 불쾌하거나 예상치 못한 냄새가 발생합니다.
    odor_control:
      name: 냄새 제어
      description: 품목의 냄새 차단 또는 중화 기능이 고객의 요구를 충족하지 않습니다.
    opacity:
      name: 불투명도
      description: 투명도 수준이 고객의 선호를 충족하지 않습니다.
    operating_noise:
      name: 작동 소음
