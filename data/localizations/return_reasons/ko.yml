---
ko:
  return_reasons:
    absorbency:
      name: 흡수성
      description: 소재의 액체 흡수 및 유지력이 부족하거나 과도합니다.
    absorption:
      name: 흡수성
      description: 제품이 표면 또는 신체에 예상대로 흡수되지 않습니다.
    academic_level:
      name: 학업 수준
      description: 콘텐츠의 난이도 또는 깊이가 고객의 학습 목적에 적합하지 않습니다.
    accuracy:
      name: 정확도
      description: 장치가 제공하는 측정값 또는 데이터가 충분히 정확하지 않습니다.
    adhesion:
      name: 접착력
      description: 제품이 대상 표면에 충분히 강한 초기 접착을 형성하지 못합니다.
    adhesive:
      name: 접착제
      description: 제품의 접착 특성이 용도에 적합하지 않습니다.
    adhesive_strength:
      name: 접착력
      description: 접착제의 접착력이 예상 하중 또는 압력에 비해 부족하거나 과도합니다.
    adjustability:
      name: 조절 가능성
      description: 제품을 고객의 필요에 맞게 충분히 조정하거나 크기 변경할 수 없습니다.
    age:
      name: 나이
      description: 제품의 연식, 생산 연도 또는 제조일이 예상과 다릅니다.
    age_range:
      name: 연령대
      description: 제품의 권장 연령대가 사용 대상과 일치하지 않습니다.
    age_restriction:
      name: 연령 제한
      description: 제품이 최소 또는 최대 연령 제한으로 인해 사용에 제약이 있습니다.
    amperage:
      name: 전류량
      description: 정격 전류가 고객의 기기 또는 시스템 요구 사항에 적합하지 않습니다.
    angle:
      name: 각도
      description: 기울기 또는 굴곡 정도가 고객의 요구 사항과 맞지 않습니다.
    animal_didnt_like:
      name: 반려동물이 좋아하지 않음
      description: 동물이 제품을 먹거나 사용하지 않았습니다.
    animal_refused:
      name: 반려동물이 거부함
      description: 동물이 제품을 사용하거나 섭취하지 않습니다.
    application:
      name: 용도
      description: 제품의 사용 방법이 까다롭거나 지나치게 복잡하며 사용자 실수가 발생하기 쉽습니다.
    applicator:
      name: 어플리케이터
      description: 제공된 도구가 제품을 고르지 않거나 제어되지 않은 방식으로 분배합니다.
    arrived_late:
      name: 늦게 도착함
      description: 배송이 예상 날짜 또는 필요 시점 이후에 도착했습니다.
    articulation:
      name: 관절 움직임
      description: 품목의 관절 가동 범위 또는 품질이 고객의 요구를 충족하지 못합니다.
    artificial_tasting:
      name: 인공적인 맛
      description: 맛이 인위적이거나 합성적인 느낌을 줍니다.
    assembly:
      name: 조립
      description: 고객은 완제품을 기대했으나 제품이 조립이 필요한 상태로 제공되었습니다.
    assortment:
      name: 구색
      description: 패키지에 포함된 품목 구성은 고객이 원했던 내용과 다릅니다.
    baby_refused:
      name: 아기가 거부함
      description: 영아가 품목을 사용하거나 받아들이지 않습니다.
    balance:
      name: 균형
      description: 품목 내부의 무게 분포가 사용성 또는 안정성에 부정적인 영향을 줍니다.
    band_rolls_down:
      name: 밴드가 말려 내려감
      description: 의류가 제자리에 고정되지 않고 아래로 내려갑니다.
    band_rolls_up:
      name: 밴드가 말려 올라감
      description: 밴드 또는 고무 부분이 제자리에 유지되지 않고 위로 말리거나 올라갑니다.
    band_too_big:
      name: 밴드가 너무 큼
      description: 밴드 둘레가 너무 커서 신체에 안정적으로 맞지 않습니다.
    band_too_loose:
      name: 밴드가 너무 헐렁함
      description: 밴드 둘레가 안정적으로 맞지 않습니다.
    band_too_small:
      name: 밴드가 너무 작음
      description: 밴드 둘레가 너무 작아 신체를 조입니다.
    band_too_thick:
      name: 밴드가 너무 두꺼움
      description: 밴드 폭이 고객의 선호에 비해 너무 넓습니다.
    band_too_thin:
      name: 밴드가 너무 얇음
      description: 밴드 폭이 편안함 또는 지지력에 부족합니다.
    band_too_tight:
      name: 밴드가 너무 조임
      description: 밴드가 신체를 불편하게 조입니다.
    barrel_size:
      name: 배럴 크기
      description: 고데기 또는 도구의 직경이 원하는 효과에 맞지 않습니다.
    base_curve:
      name: 베이스 커브
      description: 렌즈 곡률이 고객의 눈 형태 또는 처방 조건에 맞지 않습니다.
    battery_life:
      name: 배터리 수명
      description: 한 번 충전으로 작동하는 시간이 고객의 기대에 미치지 못합니다.
    bitterness:
      name: 쓴맛
      description: 맛이 불쾌할 정도로 톡 쏘거나 자극적입니다.
    blade_type:
      name: 칼날 유형
      description: 칼날의 스타일 또는 날 형태가 고객의 용도에 적합하지 않습니다.
    board_volume:
      name: 보드 볼륨
      description: 보드의 부피가 사용자 체중에 비해 부력이 부족하거나 과도합니다.
    bounce:
      name: 탄력
      description: 품목의 반발력이 활동에 비해 너무 강하거나 약합니다.
    breaks_easily:
      name: 쉽게 파손됨
      description: 품목이 일반적인 사용 환경에서 쉽게 손상되거나 내구성이 부족합니다.
    breathability:
      name: 통기성
      description: 소재가 통기되지 않아 과열되거나 끈적이는 느낌을 줍니다.
    brightness:
      name: 밝기
      description: 품목이 방출하거나 반사하는 빛의 강도가 고객의 선호에 맞지 않습니다.
    bristles_too_coarse:
      name: 솔이 너무 뻣뻣함
      description: 브러시가 용도에 비해 너무 거칠거나 자극적입니다.
    bristles_too_soft:
      name: 솔이 너무 부드러움
      description: 브러시가 용도에 비해 너무 부드럽습니다.
    bubble_output:
      name: 거품량
      description: 생성되는 거품의 양 또는 크기가 예상과 다릅니다.
    budget:
      name: 예산
      description: 서비스 비용이 고객의 예산 범위를 초과합니다.
    buoyancy:
      name: 부력
      description: 품목의 수중 부력 또는 지지력이 고객의 요구를 충족하지 못합니다.
    burn_rate:
      name: 연소율
      description: 품목의 연소 속도가 예상보다 빠르거나 느립니다.
    burn_time:
      name: 연소 시간
      description: 품목의 연소 시간이 예상보다 짧거나 깁니다.
    bust_too_big:
      name: 가슴 부분이 너무 큼
      description: 의류의 가슴 부분이 고객의 체형에 비해 너무 큽니다.
    bust_too_loose:
      name: 가슴 부분이 너무 헐렁함
      description: 가슴 부분의 핏이 충분히 안정적이지 않습니다.
    bust_too_small:
      name: 가슴 부분이 너무 작음
      description: 옷의 가슴 부분이 고객 체형에 비해 너무 작습니다.
    bust_too_tight:
      name: 가슴 부분이 너무 조임
      description: 옷의 가슴 부분이 불편하게 조입니다.
    buttons_not_accessible:
      name: 버튼을 누르기 어려움
      description: 케이스 또는 커버가 장치 조작부를 가려 사용이 어렵습니다.
    caffeine_level:
      name: 카페인 함량
      description: 제품의 카페인 함량이 사용자에게 너무 높거나 낮습니다.
    caliber:
      name: 구경
      description: 명시된 탄두 또는 배럴 직경이 고객의 장비와 호환되지 않습니다.
    calibration:
      name: 보정
      description: 장치를 기준값에 맞게 설정하거나 조정하는 과정이 어렵거나 예상대로 작동하지 않습니다.
    capacity:
      name: 용량
      description: 품목의 용량 또는 처리 가능 양이 고객의 요구를 충족하지 못합니다.
    carbonation:
      name: 탄산
      description: 음료의 탄산 또는 거품 수준이 너무 높거나 낮습니다.
    caused_allergic_reaction:
      name: 알레르기 반응 유발
      description: 제품이 두드러기, 부기 또는 심한 발진과 같은 특정하고 심각한 알레르기 반응을 유발했습니다.
    caused_irritation:
      name: 자극 유발
      description: 제품 사용 후 피부 또는 신체적 불편함이 발생했습니다.
    changed_my_mind:
      name: 단순 변심
      description: 고객은 제품의 품질이나 정확성과 관계없이 구매 후 해당 품목을 더 이상 원하지 않습니다.
    charging_speed:
      name: 충전 속도
      description: 장치의 충전 시간이 너무 오래 걸립니다.
    chest_too_big:
      name: 가슴 부분이 너무 큼
      description: 옷의 가슴 부분이 고객에게 비해 너무 큽니다.
    chest_too_small:
      name: 가슴 부분이 너무 작음
      description: 의류의 가슴 치수가 고객에게 너무 작습니다.
    clarity:
      name: 선명도
      description: 품목의 투명도가 고객의 요구에 맞지 않습니다.
    cleaning:
      name: 세척
      description: 품목이 예상만큼 쉽게 세척되지 않습니다.
    closeness:
      name: 밀착감
      description: 도구가 제공하는 면도 또는 절삭 결과가 피부에 충분히 밀착되지 않습니다.
    closure:
      name: 잠금 장치
      description: 품목의 개폐 장치가 작동하기 어렵거나 안정적이지 않습니다.
    cold_duration:
      name: 냉기 지속 시간
      description: 품목이 고객이 원하는 만큼 오랫동안 차갑게 유지되지 않습니다.
    collar_too_loose:
      name: 목 부분이 너무 헐렁함
      description: 칼라가 목 둘레에 안정적으로 맞지 않습니다.
    collar_too_tight:
      name: 목 부분이 너무 조임
      description: 목 부분이 불편하게 조입니다.
    color:
      name: 색상
      description: 품목의 색조, 색상 또는 전반적인 시각적 외관이 고객의 선호나 기대와 일치하지 않습니다.
    color_too_bright:
      name: 색상이 너무 밝음
      description: 색상의 강도 또는 선명도가 고객의 취향에 비해 과도합니다.
    color_too_muted:
      name: 색상이 너무 칙칙함
      description: 색상이 고객의 선호에 비해 충분히 선명하거나 강하지 않습니다.
    comfort:
      name: 편안함
      description: 품목의 착용감 또는 인체공학적 성능이 기대에 미치지 못합니다.
    compartments:
      name: 수납 공간
      description: 수납 공간의 수 또는 배열이 고객의 정리 요구를 충족하지 못합니다.
    compliance:
      name: 규정 준수
      description: 제품이 고객이 요구하는 특정 규정 또는 인증 기준을 충족하지 않습니다.
    compression:
      name: 압축
      description: 의류가 가하는 압박 강도가 너무 강하거나 약합니다.
    condition:
      name: 상태
      description: 품목의 보존 상태(경미한 마모 또는 흠집 포함)가 광고된 등급 또는 설명과 일치하지 않습니다.
    configuration:
      name: 구성
      description: 품목의 모듈 구성 요소를 배열하거나 연결하는 방식이 용도에 적합하지 않습니다.
    connectivity:
      name: 연결성
      description: 장치가 네트워크 또는 다른 장치와 연결되는 기능이 불안정하거나 충분하지 않습니다.
    consistency:
      name: 농도
      description: 액체 또는 반고체 제품의 점도, 농도 또는 흐름성이 기대와 다릅니다.
    content:
      name: 콘텐츠
      description: 품목에 포함된 정보 또는 구성물이 고객의 기대와 다릅니다.
    cook_time:
      name: 조리 시간
      description: 식품을 준비하는 데 필요한 시간이 기대에 못 미치거나 만족스럽지 않습니다.
    cooling:
      name: 냉각 기능
      description: 장치의 냉각 기능이 충분하지 않습니다.
    coverage:
      name: 커버력
      description: 품목이 표면을 가리거나 보호하거나 도포되는 정도가 고객의 요구를 충족하지 않습니다.
    cuff_too_big:
      name: 소맷단이 너무 큼
      description: 손목이나 팔 부분이 너무 헐렁합니다.
    cuff_too_small:
      name: 소맷단이 너무 작음
      description: 손목 또는 팔 부분의 개구부가 너무 좁습니다.
    cups_gaping:
      name: 컵이 뜸
      description: 브라 컵이 몸에 밀착되지 않아 들뜸이 발생합니다.
    cups_too_big:
      name: 컵이 너무 큼
      description: 옷의 컵 사이즈가 고객의 가슴에 비해 너무 큽니다.
    cups_too_loose:
      name: 컵이 너무 헐렁함
      description: 컵의 밀착감이나 지지력이 충분하지 않습니다.
    cups_too_small:
      name: 컵이 너무 작음
      description: 옷의 컵 사이즈가 고객의 가슴에 비해 너무 작습니다.
    cups_too_thick:
      name: 컵이 너무 두꺼움
      description: 컵의 패딩 또는 소재 두께가 과도합니다.
    cups_too_thin:
      name: 컵이 너무 얇음
      description: 컵에 패딩이나 커버력이 충분하지 않습니다.
    cups_too_tight:
      name: 컵이 너무 조임
      description: 컵이 가슴을 불편하게 압박하거나 조입니다.
    cushioning:
      name: 쿠션감
      description: 소재의 부드러움이나 충격 흡수력이 용도에 비해 기대에 못 미칩니다.
    damaged_after_use:
      name: 사용 후 손상됨
      description: 정상적인 사용 후 품목이 마모되거나 파손되었습니다.
    damaged_after_washing:
      name: 세탁 후 손상됨
      description: 세척 과정에서 품목이 손상되었습니다.
    damaged_after_wear:
      name: 착용 후 손상됨
      description: 품목이 신체에 사용한 후 손상된 흔적이 나타납니다.
    damaged_or_defective:
      name: 파손 또는 불량
      description: 품목이 물리적 손상, 제조 결함이 있거나 정상적으로 작동하지 않는 상태로 도착했습니다.
    damaged_packaging:
      name: 패키지 손상
      description: 외부 포장이 손상된 상태로 도착했습니다.
    depth:
      name: 깊이
      description: 앞뒤 또는 상하 길이가 고객의 공간이나 착용 조건에 적합하지 않습니다.
    detail:
      name: 세부 정보
      description: 품목의 디자인이나 출력의 정밀도 또는 세밀함이 부족합니다.
    detection_range:
      name: 감지 범위
