    product_leaks:
      name: 제품이 샘
      description: 용기 또는 품목이 내용물을 제대로 보관하지 못합니다.
    product_overheats:
      name: 제품이 과열됨
      description: 장치가 작동 중 위험하거나 불편한 온도에 도달합니다.
    programming:
      name: 프로그래밍
      description: 전자 모듈을 특정 시스템에 설정하는 절차가 지나치게 어렵습니다.
    protection:
      name: 보호 기능
      description: 품목이 충격이나 외부 환경으로부터 충분한 보호 또는 안전성을 제공하지 않습니다.
    provider_unavailable:
      name: 제공업체를 이용할 수 없음
      description: 서비스 제공자가 고객이 원하는 시간이나 장소에서 요청을 이행할 수 없습니다.
    pulls_in_fabric:
      name: 원단 올이 나감
      description: 사용 중 소재에 올이 걸리거나 실이 풀립니다.
    quality:
      name: 품질
      description: 품목의 전반적인 품질이나 마감 수준이 기대에 미치지 못합니다.
    quantity:
      name: 수량
      description: 포함된 제품의 양이 고객이 예상한 것보다 적거나 많습니다.
    range:
      name: 범위
      description: 장치의 작동 또는 이동 거리가 고객의 요구에 부족합니다.
    razor_type:
      name: 면도기 유형
      description: 특정 블레이드 구성이나 스타일이 고객의 면도 선호에 맞지 않습니다.
    reaction:
      name: "(피부) 반응"
      description: 제품이 피부에 원치 않는 반응이나 자극을 유발했습니다.
    readability:
      name: 가독성
      description: 품목의 텍스트 또는 표시가 보기 어렵거나 해석하기 어렵습니다.
    realism:
      name: 사실성
      description: 외관이나 기능이 현실을 충분히 사실적으로 재현하지 못합니다.
    received_the_wrong_item:
      name: 오배송
      description: 고객이 주문하거나 기대한 것과 다른 제품을 받았습니다.
    recoil:
      name: 반동
      description: 장치의 반동이 고객이 편안하게 감당할 수 있는 수준보다 강합니다.
    refraction:
      name: 굴절
      description: 광학 장치에 의한 빛의 굴절이 원하는 시각 효과를 생성하지 못합니다.
    region:
      name: 지역
      description: 서비스 또는 제품이 고객의 위치와 다른 지역으로 제한되어 있습니다.
    residue:
      name: 잔여물
      description: 제품 사용 후 원치 않는 막이나 잔여물이 남습니다.
    resistance:
      name: 저항
      description: 운동 기구가 제공하는 저항 강도가 너무 강하거나 약합니다.
    resolution:
      name: 해상도
      description: 시각적 출력의 디테일이나 선명도가 고객의 기대에 미치지 못합니다.
    responsiveness:
      name: 반응성
      description: 사용자의 직접 입력에 대한 반응이 지연되거나 부족합니다.
    restrictive:
      name: 움직임이 불편함
      description: 품목이 원하는 것보다 움직임이나 유연성을 제한합니다.
    results:
      name: 결과
      description: 제품이 권장 사용 기간 이후에도 기대한 변화나 결과를 나타내지 않았습니다.
    results_display:
      name: 결과 표시
      description: 장치에 결과가 표시되는 방식이 명확하지 않거나 읽기 어렵습니다.
    results_time:
      name: 결과 확인 시간
      description: 결과를 얻는 데 필요한 시간이 예상보다 길거나 짧습니다.
    retention:
      name: 유지력
      description: 품목이 물체를 안정적으로 고정하는 능력이 예상과 다릅니다.
    ripeness:
      name: 숙성도
      description: 농산물의 숙성도가 섭취하기에 원하는 단계가 아닙니다.
    roast_level:
      name: 로스팅 강도
      description: 커피 원두의 로스팅 정도가 고객의 취향과 일치하지 않습니다.
    rod_action:
      name: 로드 액션
      description: 압력을 받을 때 낚싯대가 휘어지는 지점이 고객이 선호하는 사항과 일치하지 않습니다.
    rod_power:
      name: 로드 파워
      description: 낚싯대의 저항력 또는 들어 올리는 힘이 의도한 용도에 비해 너무 가볍거나 무겁습니다.
    rubbing:
      name: 쓸림
      description: 반복적인 동작으로 인해 제품이 피부에 마찰이나 쓸림을 유발합니다.
    sample_method:
      name: 샘플링 방식
      description: 필요한 샘플을 채취하는 과정이 불편하거나 불쾌하거나 어렵습니다.
    sample_type:
      name: 샘플 유형
      description: 제공되거나 요구된 샘플의 특정 종류가 고객이 원한 것과 다릅니다.
    scale:
      name: 스케일
      description: 제품의 비율이나 사이즈 관계가 예상과 일치하지 않습니다.
    scent:
      name: 향
      description: 제품의 향이 불쾌하거나 예상했던 향과 다릅니다.
    scheduling_conflict:
      name: 일정 충돌
      description: 이용 가능한 예약 시간이 고객의 일정과 맞지 않습니다.
    scratched:
      name: 흠집 있음
      description: 제품 표면에 외관을 해치는 자국이나 흠집(마모)이 있습니다.
    seal:
      name: 밀봉
      description: 제품의 밀봉 상태가 요구되는 기밀 또는 수밀 수준을 충족하지 못합니다.
    seams_splitting:
      name: 솔기가 터짐
      description: 박음질 연결 부위가 벌어지거나 손상될 조짐이 보입니다.
    sensitivity:
      name: 민감도
      description: 제품이 자극에 대해 너무 민감하게 반응하거나 충분히 반응하지 않습니다.
    service_area:
      name: 서비스 지역
      description: 서비스 제공 지역에 고객의 주소가 포함되지 않습니다.
    service_unavailable:
      name: 서비스를 이용할 수 없음
      description: 요청한 서비스가 해당 지역이나 환경에서 제공되지 않거나 수행할 수 없습니다.
    shade:
      name: 쉐이드
      description: 색상의 특정 뉘앙스, 톤 또는 깊이가 예상과 다릅니다.
    shaft_length:
      name: 샤프트 길이
      description: 제품의 메인 샤프트 또는 본체 길이가 의도한 장비나 사용자에게 적합하지 않습니다.
    shape:
      name: 모양
      description: 제품의 윤곽, 외형 또는 기하학적 구조가 의도한 목적이나 미적 기준에 부적합합니다.
    sharpness:
      name: 날카로움
      description: 도구의 절삭 날이나 뾰족한 끝이 요구되는 예리함 수준에 미치지 못합니다.
    shedding:
      name: 털 빠짐
      description: 사용 중 제품에서 섬유나 입자가 과도하게 떨어져 나옵니다.
    shelf_life:
      name: 유통기한
      description: 제품을 사용 가능하거나 신선하게 유지할 수 있는 기간이 예상보다 짧습니다.
    side_effects:
      name: 부작용
      description: 제품이 의도치 않게 신체에 바람직하지 않은 영향을 주었습니다.
    size:
      name: 사이즈
      description: 제품의 물리적 비율이 고객의 기대에 미치지 못했습니다.
    skin_tone:
      name: 피부톤
      description: 고객의 피부색(안색)과 색상이 맞지 않습니다.
    sleeves_too_long:
      name: 소매가 너무 긺
      description: 의류의 소매 길이가 고객의 팔보다 깁니다.
    sleeves_too_loose:
      name: 소매가 너무 헐렁함
      description: 소매가 팔에 딱 맞지 않습니다.
    sleeves_too_short:
      name: 소매가 너무 짧음
      description: 의류의 소매 길이가 고객에게 짧습니다.
    sleeves_too_tight:
      name: 소매가 너무 조임
      description: 소매가 팔의 움직임을 제한하거나 편안함을 저해합니다.
    slippery:
      name: 미끄러움
      description: 표면의 그립감이나 마찰력이 충분하지 않습니다.
    smears:
      name: 번짐
      description: 착용 또는 사용 중 제품이 번지거나 흐려지거나 의도한 위치에서 벗어납니다.
    smudges:
      name: 얼룩짐
      description: 제품이 다른 표면에 묻어나거나 접촉 시 쉽게 흠이 생겨 자국을 남깁니다.
    softness:
      name: 부드러움
      description: 아이템의 촉감의 부드러움이나 고급스러움이 고객의 취향을 충족하지 못합니다.
    sole_too_thick:
      name: 밑창이 너무 두꺼움
      description: 신발의 밑창이 지나치게 두껍습니다.
    sole_too_thin:
      name: 밑창이 너무 얇음
      description: 신발의 밑창에 쿠션감이나 보호 기능이 충분하지 않습니다.
    sound_level:
      name: 소음 수준
      description: 발생하는 소리가 특정 데시벨 등급이나 해당 기능에 요구되는 성능 표준을 충족하지 못합니다.
    sound_quality:
      name: 음질
      description: 오디오 출력의 선명도, 원음 충실도 또는 음색이 고객의 기대에 미치지 못합니다.
    sourcing:
      name: 소싱
      description: 제품 소재의 원산지나 윤리적 출처가 불만족스럽습니다.
    speed:
      name: 속도
      description: 제품이 작동하거나 움직이는 속도가 고객에게 필요한 수준에 비해 너무 빠르거나 너무 느립니다.
    spin_time:
      name: 회전 시간
      description: 제품이 움직임을 지속하는 시간이 예상보다 짧습니다.
    spout:
      name: 주둥이
      description: 따르는 장치의 설계로 인해 원치 않게 액체가 흐르거나, 뚝뚝 떨어지거나, 쏟아집니다.
    spray_pattern:
      name: 분사 패턴
      description: 분사되는 분포나 형태가 고객이 필요로 하는 수준을 충족하지 못합니다.
    squeaks:
      name: 삐걱거리는 소리가 남
      description: 사용 중에 제품에서 원치 않는 고음의 소리가 발생합니다.
    stability:
      name: 안정성
      description: 제품을 배치하거나 사용할 때 흔들리거나 불안정합니다.
    stained:
      name: 얼룩이 있음
      description: 제품에 외관을 해치는 변색이나 자국이 있습니다.
    stains_easily:
      name: 얼룩이 쉽게 생김
      description: 소재가 자국이나 변색을 쉽게 흡수하고 유지합니다.
    stone_setting:
      name: 보석 세팅
      description: 장식용 스톤이나 보석이 세팅된 방식이 불만족스럽거나 불안정합니다.
    storage_capacity:
      name: 저장 용량
      description: 디지털 데이터를 저장할 수 있는 공간이 부족합니다.
    straps_too_long:
      name: 스트랩이 너무 긺
      description: 스트랩 길이가 지나치게 길어 적절한 착용이나 조절을 방해합니다.
    straps_too_short:
      name: 스트랩이 너무 짧음
      description: 스트랩 길이 때문에 적절히 조절하거나 편안히 착용하기 어렵습니다.
    straps_too_thick:
      name: 스트랩이 너무 두꺼움
      description: 스트랩의 너비가 지나치게 넓거나 부피가 큽니다.
    straps_too_thin:
      name: 스트랩이 너무 얇음
      description: 끈 너비가 좁아서 불편하거나 지지력이 부족합니다.
    strength:
      name: 강도
      description: 제품의 화학적 효능이나 물리적 힘이 예상과 다릅니다.
    stride_length:
      name: 보폭 길이
      description: 일립티컬이나 운동 기구의 이동 경로 거리가 사용자의 신체 역학에 맞지 않습니다.
    stuffing:
      name: 충전재
      description: 충전재의 양이나 종류가 불충분하거나 불편합니다.
    sturdiness:
      name: 견고함
      description: 제품이 구조적으로 견고함이 부족하여, 일반적인 사용 시 조잡하거나 약하거나 쉽게 휘어지는 느낌을 줍니다.
    style:
      name: 스타일
      description: 제품의 디자인, 컷 또는 미적 특성이 고객의 개인 취향에 맞지 않습니다.
    suction:
      name: 흡입력
      description: 제품이 생성하는 진공의 강도가 의도한 용도에 부적합합니다.
    suction_strength:
      name: 흡입력
      description: 진공 밀봉의 힘이 의도한 용도에 비해 너무 약하거나 너무 강합니다.
    support:
      name: 지지력
      description: 제품이 신체에 적절한 구조적 보조나 지지력을 제공하지 못합니다.
    surface_damage:
      name: 표면 손상
      description: 제품 외관에 긁힘, 찌그러짐, 이가 나감 또는 기타 결함과 같은 미관상의 하자가 있습니다.
    sweetness:
      name: 단맛
      description: 제품의 당도나 단맛이 고객의 입맛에 맞지 않습니다.
    tangles_easily:
      name: 쉽게 엉킴
      description: 사용 중 제품이 예상보다 더 많이 엉키거나 꼬입니다.
    tarnished:
      name: 변색됨
      description: 금속 표면의 광택이 사라지거나 변색되었습니다.
    taste:
      name: 맛
      description: 식료품의 향미 특성이 고객이 선호하는 맛과 일치하지 않습니다.
    temperature:
      name: 온도
      description: 제품이 생성하거나 유지하는 온기 또는 냉기가 고객이 선호하는 사항에 미치지 못합니다.
    temperature_range:
      name: 온도 범위
      description: 제품의 작동 온도 범위가 사용자의 필요에 비해 너무 좁습니다.
    temperature_rating:
      name: 정격 온도
      description: 명시된 제품 작동 온도 범위가 고객의 환경 조건에 적합하지 않습니다.
    temperature_regulation:
      name: 온도 조절
      description: 소재가 체열을 너무 많이 가두어 사용자가 과도하게 더위를 느낍니다.
    terrain:
      name: 지형
      description: 지면의 종류나 상태가 제품의 성능에 적합하지 않습니다.
    test_format:
      name: 테스트 형식
      description: 테스트 형식이나 결과가 고객이 선호하는 방식이 아닙니다.
    test_method:
      name: 테스트 방식
      description: 테스트 키트 사용에 필요한 절차가 고객이 선호하는 사항과 맞지 않습니다.
    text_size:
      name: 텍스트 크기
      description: 인쇄되거나 표시된 텍스트의 크기가 읽기 어렵습니다.
    texture:
      name: 질감
      description: 제품의 물리적 감촉이나 구성 성분이 고객의 선호에 맞지 않습니다.
    theme:
      name: 테마
      description: 제품의 특정 주제나 스타일이 고객이 원한 것이 아닙니다.
    thickness:
      name: 두께
      description: 제품의 물리적 깊이나 만듦새가 예상보다 더 두껍거나 얇습니다.
    tight_around_ankles:
      name: 발목 부분이 조임
      description: 옷의 발목 부분이 불편하게 조입니다.
    tight_around_thighs:
      name: 허벅지 부분이 조임
      description: 옷의 허벅지 부분이 불편하게 조입니다.
    timer:
      name: 타이머
      description: 타이밍 기능이나 지속 시간 설정이 불만족스럽습니다.
    tip_size:
      name: 팁 크기
      description: 필기구 또는 도포기 팁의 규격이 원하는 정밀도에 적합하지 않습니다.
    tip_style:
      name: 팁 스타일
      description: 도포기 또는 필기구 팁의 모양이나 디자인이 고객의 필요를 충족하지 못합니다.
    too_big:
      name: 너무 큼
      description: 품목의 크기가 고객의 핏이나 공간에 필요한 것보다 큽니다.
    too_bitter:
      name: 너무 씀
      description: 맛이 불쾌할 정도로 톡 쏘거나 자극적입니다.
    too_bulky:
      name: 너무 부피가 큼
      description: 제품이 공간을 너무 많이 차지하거나 다루기 불편합니다.
    too_coarse:
      name: 너무 거침
      description: 연마 표면이 필요 이상으로 거칠거나 자극적입니다.
    too_complex:
      name: 너무 복잡함
      description: 제품 사용에 필요한 기능, 설정 또는 단계의 수가 너무 많아 부담스럽습니다.
    too_drying:
      name: 너무 건조함
      description: 제품이 수분을 과도하게 제거하여 피부나 모발 건조를 유발합니다.
    too_fine:
      name: 너무 고움
      description: 마찰면이 필요한 것보다 더 매끄럽거나 자극이 더 약합니다.
    too_firm:
      name: 너무 단단함
      description: 제품이 예상보다 뻣뻣하거나 신축성이 부족합니다.
    too_long:
      name: 너무 김
      description: 제품의 길이가 의도한 핏, 공간 또는 용도에 적합한 수준을 초과합니다.
    too_loose:
      name: 너무 헐거움
      description: 제품이 단단히 고정되지 않거나 장력이 부족합니다.
    too_loud:
      name: 너무 시끄러움
      description: 제품에서 발생하는 소리가 의도한 환경에 비해 과도하거나 방해됩니다.
    too_much_support:
      name: 지지력이 너무 강함
      description: 보강재의 수준이나 단단함이 고객이 편안함을 느끼기에 과도합니다.
    too_narrow:
      name: 폭이 너무 좁음
      description: 제품의 너비가 의도한 핏, 공간 또는 용도에 충분하지 않습니다.
    too_quiet:
      name: 너무 조용함
      description: 제품에서 발생하는 소리가 의도한 환경에서 명확하게 들릴 만큼 충분하지 않습니다.
    too_rich:
      name: 너무 진함
      description: 맛이나 질감이 고객의 입맛에 비해 너무 강하거나 무겁습니다.
    too_sharp:
      name: 너무 날카로움
      description: 모서리나 끝부분이 위험할 정도로 날카롭거나 불편을 초래합니다.
    too_short:
      name: 너무 짧음
      description: 제품의 길이가 의도한 핏, 공간 또는 용도에 충분하지 않습니다.
    too_simple:
      name: 너무 단순함
      description: 제품이 고객이 원하는 정도로 충분히 복잡하거나 충분한 기능을 갖추지 못했습니다.
    too_small:
      name: 너무 작음
      description: 제품의 치수가 고객의 핏이나 공간에 비해 작습니다.
    too_soft:
      name: 너무 부드러움
      description: 제품의 유연성(늘어남)이나 구조적 부족함이 예상보다 큽니다.
    too_sticky:
      name: 너무 끈적거림
      description: 제품이 과도하게 달라붙거나 원치 않는 끈적한 잔여물을 남깁니다.
    too_stiff:
      name: 너무 뻣뻣함
      description: 제품이나 그 구성 요소가 너무 단단하여 의도한 용도에 맞게 구부러지거나 휘거나 변형되지 않습니다.
    too_strong:
      name: 너무 강함
      description: 제품의 힘, 출력 또는 효과가 압도적이거나 과도합니다.
    too_subtle:
      name: 너무 약함
      description: 제품 효과의 특성, 디테일 또는 뉘앙스가 원하는 것보다 임팩트가 적습니다.
    too_sweet:
      name: 너무 달콤함
      description: 당도나 단맛의 수준이 고객의 선호도를 초과합니다.
    too_thick:
      name: 너무 두꺼움
      description: 제품의 외형적 무게나 부피가 의도한 용도에 적합하지 않습니다.
    too_thin:
      name: 너무 얇음
      description: 제품의 물리적 실체감이나 바디감이 의도한 용도에 비해 부족합니다.
    too_tight:
      name: 너무 조임
      description: 제품이 너무 조이거나 딱 맞아서 고객이 불편합니다.
    too_weak:
      name: 너무 약함
      description: 품목의 힘, 출력 또는 효과가 불충분하거나 거의 느껴지지 않습니다.
    too_wide:
      name: 너무 넓음
      description: 제품의 너비가 의도한 핏, 공간 또는 용도에 비해 너무 넓습니다.
    tooth_spacing:
      name: 빗살 간격
      description: 빗이나 칼날의 톱니 간격이 고객의 필요에 맞지 않습니다.
    touch_response:
      name: 터치 반응
      description: 터치 인터페이스의 감도가 너무 높거나 낮습니다.
    transparency:
      name: 투명도
      description: 소재가 너무 비치거나 고객이 선호하는 만큼 투명하지 않습니다.
    tread_type:
      name: 트레드 유형
      description: 품목의 밑창이나 표면의 패턴 또는 디자인이 의도한 지형이나 조건에 적합하지 않습니다.
    trial_period_ending:
      name: 체험 기간 종료
      description: 구독 또는 체험 기간이 만료되기 전에 고객이 제품을 반품하고 있습니다.
    type_too_big:
      name: 사이즈가 너무 큼
      description: 글꼴이나 문자 크기가 원하는 것보다 큽니다.
    type_too_small:
      name: 사이즈가 너무 작음
      description: 글꼴이나 문자 크기가 편안하게 읽기에 너무 작습니다.
    uncomfortable:
      name: 불편함
      description: 제품 사용 시 전반적인 물리적 감각이 불편함을 유발합니다.
    uncomfortable_in_ear:
      name: 귀에 불편함
      description: 이어피스의 착용감이나 모양이 물리적 자극이나 통증을 유발합니다.
    underwire:
      name: 언더와이어
      description: 의류의 금속 또는 플라스틱 지지대가 불편함을 주거나 몸에 맞지 않습니다.
    unknown:
      name: 알 수 없음
      description: 반품 사유가 명시되지 않았거나 확인할 수 없습니다.
    unstable:
      name: 불안정함
      description: 작동 또는 사용 중 제품이 움직이거나, 과도하게 진동하거나, 균형을 잃습니다.
    vehicle_fit:
      name: 차량에 맞지 않음
      description: 제품이 고객의 특정 차량에 제대로 장착되지 않거나 맞지 않습니다.
    ventilation:
      name: 통풍
      description: 제품이 충분한 공기 흐름이나 통기성을 제공하지 않습니다.
    vibration:
      name: 진동
      description: 장치에서 발생하는 진동 움직임이 과도하거나 불편합니다.
    video_quality:
      name: 동영상 화질
      description: 시각적 출력의 선명도, 움직임 또는 색상 충실도가 예상과 다릅니다.
    viscosity:
      name: 점도
      description: 액체의 점도나 흐름 저항이 의도한 용도에 적합하지 않습니다.
    vision_clarity:
      name: 시야 선명도
      description: 렌즈를 통해 보이는 시야가 사용자가 명확하게 볼 수 있는 능력을 방해합니다.
    voltage:
      name: 전압
      description: 장치의 전기 정격이 의도한 전원 공급 장치와 일치하지 않습니다.
    volume:
      name: 부피
      description: 장치에서 나는 소리가 충분히 크지 않거나 너무 큽니다.
    waist_too_big:
      name: 허리가 너무 큼
      description: 허리 치수가 고객의 신체에 필요한 것보다 큽니다.
    waist_too_high:
      name: 허리선이 너무 높음
      description: 의류의 허리선이 몸통 위쪽으로 너무 올라가 있습니다.
    waist_too_loose:
      name: 허리가 너무 큼
      description: 허리띠가 허리에 제대로 고정되지 않습니다.
    waist_too_low:
      name: 허리선이 너무 낮음
      description: 옷의 허리선이 엉덩이 아래로 너무 내려와 있습니다.
    waist_too_small:
      name: 허리가 너무 작음
      description: 허리 치수가 고객 체형에 비해 작습니다.
    waist_too_tight:
      name: 허리가 너무 작음
      description: 허리띠가 허리를 불편하게 조입니다.
    warmth:
      name: 보온성
      description: 제품이 제공하거나 유지하는 열의 수준이 의도한 조건이나 활동에 부적합합니다.
    washability:
      name: 세탁 용이성
      description: 요구되는 세탁/청소 방법이 수용하기 어렵습니다.
    water_resistance:
      name: 방수 기능
      description: 의도한 사용 조건에서 제품의 발수 또는 방습 능력이 충분하지 않습니다.
    wear:
      name: 착용감
      description: 화장품이나 퍼스널 케어 제품의 적용 효과가 예상만큼 오래 지속되지 않습니다.
    weather:
      name: 날씨
      description: 환경 조건으로 인해 서비스나 활동을 진행할 수 없습니다.
    weight:
      name: 무게
      description: 제품이 너무 무겁거나 가벼워서 고객이 의도한 용도에 적합하지 않습니다.
    weight_capacity:
      name: 허용 중량
      description: 품목 수 지원의 최대 부하가 고객이 의도한 용도에 비해 부족합니다.
    wheels_stick:
      name: 바퀴가 뻑뻑함
      description: 굴림 장치가 부드럽게 움직이지 않습니다.
    whitening_results:
      name: 미백 효과
      description: 색상이 변화하는 정도가 기대에 미치지 못합니다.
    width:
      name: 너비
      description: 제품의 가로 너비가 고객의 핏이나 공간에 적합하지 않습니다.
    wind_resistance:
      name: 내풍성
      description: 제품의 방풍 능력이 의도한 조건이나 활동에 부적합합니다.
    wrong_amount:
      name: 잘못된 수량
      description: 수령한 제품의 수량이 주문했거나 예상한 것과 다릅니다.
    wrong_dosage:
      name: 잘못된 복용량
      description: 유효 성분의 강도나 농도가 요구 사항과 일치하지 않습니다.
    wrong_format:
      name: 잘못된 형식
      description: 미디어 유형이나 물리적 구조가 고객의 장치나 선호도와 호환되지 않습니다.
    wrong_hand:
      name: 사용하는 손과 맞지 않음
      description: 제품이 고객이 필요로 하는 손잡이 방향(왼손잡이용 또는 오른손잡이용)과 반대로 설계되었습니다.
