      description: 세트에 포함된 품목 수가 고객이 예상한 것과 다릅니다.
    piece_size:
      name: 조각 크기
      description: 세트의 개별 구성품 크기가 의도된 용도에 비해 너무 크거나 작습니다.
    pigmentation:
      name: 발색력
      description: 화장품의 색상 농도나 발색이 만족스럽지 않습니다.
    pitch:
