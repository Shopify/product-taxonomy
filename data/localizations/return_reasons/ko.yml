    padding:
      name: 패딩
      description: 부드러운 보호재의 양이나 위치가 예상과 다릅니다.
    padding_not_removable:
      name: 패딩을 분리할 수 없음
      description: 고객은 분리 가능한 패드를 원했으나, 쿠션이 고정되어 있습니다.
    painful:
      name: 통증 유발
      description: 제품 사용 시 전반적이거나 날카로운 통증이 발생합니다.
    pattern:
      name: 패턴
      description: 품목의 반복되는 장식 디자인이나 패턴이 고객의 미적 선호에 맞지 않습니다.
    performance:
      name: 성능
      description: 품목의 전반적인 조작성이나 반응성이 예상과 다릅니다.
    pet_didnt_like:
      name: 반려동물이 좋아하지 않음
