    pockets_too_shallow:
      name: 주머니가 너무 얕음
      description: 수납 공간의 깊이가 부족하여 물건을 안정적으로 보관할 수 없습니다.
    polarization:
      name: 편광
      description: 렌즈의 눈부심 방지 기능이 없거나 원치 않는 기능입니다.
    poor_stitching:
      name: 바느질 불량
      description: 봉제 품질이 육안으로 보기에 불균일하거나 비뚤어져 있어 제조 결함을 나타냅니다.
    portion_size:
      name: 1회 제공량
      description: 1회 제공량이 너무 적거나 많습니다.
    power_output:
      name: 출력
      description: 장치가 제공하는 에너지가 의도된 작업에 비해 부족하거나 과도합니다.
    power_source:
      name: 전원
      description: 장치의 전원 방식이 고객에게 불편하거나 호환되지 않습니다.
    prescription:
      name: 처방전
      description: 렌즈 또는 품목의 교정 도수가 고객의 시력 요구와 맞지 않습니다.
    prescription_processed_incorrectly:
      name: 처방전이 잘못 처리됨
      description: 품목에 적용된 맞춤 도수가 고객의 주문 사양과 일치하지 않습니다.
    presentation:
      name: 포장
      description: 품목 또는 내용물의 배치나 표시 방식이 만족스럽지 않습니다
    pressure:
      name: 압력
      description: 품목의 출력 흐름 강도가 너무 강하거나 약합니다.
    pressure_points:
      name: 압박점
      description: 품목이 신체의 특정 부위에 집중된 불편한 압력을 가합니다.
    pressure_rating:
      name: 압력 등급
      description: 품목이 견디거나 생성할 수 있는 최대 압력이 해당 용도에 적합하지 않습니다.
    print_quality:
