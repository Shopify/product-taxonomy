      description: Der Bund des Kleidungsstücks sitzt zu weit unten auf der Hüfte.
    waist_too_small:
      name: Taille zu eng
      description: Der Taillenumfang ist kleiner als für den Körperbau der Kundin
        oder des Kunden erforderlich.
    waist_too_tight:
      name: Taille zu eng
      description: Der Bund engt unangenehm den Bauchraum ein.
    warmth:
      name: Wärme
      description: Die vom Artikel erzeugte oder gespeicherte Wärmemenge ist für den
        beabsichtigten Zustand oder die beabsichtigte Aktivität ungeeignet.
    washability:
      name: Waschbarkeit
      description: Die geforderte Reinigungsmethode ist inakzeptabel.
    water_resistance:
      name: Wasserbeständigkeit
      description: Die Fähigkeit des Artikels, Wasser oder Feuchtigkeit abzuweisen,
        ist für den vorgesehenen Verwendungszweck unzureichend.
    wear:
      name: Tragekomfort
      description: Die Wirkung des Kosmetik- oder Körperpflegeprodukts hält nicht
        so lange an wie erwartet.
    weather:
      name: Wetter
      description: Die Umweltbedingungen verhindern die Durchführung der Dienstleistung
        oder Aktivität.
    weight:
      name: Gewicht
      description: Aufgrund seines Gewichts oder seiner Leichtigkeit ist der Artikel
        für den von der Kundin oder vom Kunden beabsichtigten Verwendungszweck ungeeignet.
    weight_capacity:
      name: Tragfähigkeit
      description: Die maximale Beladung, die der Artikel tragen kann, ist für den
        von der Kundin oder vom Kunden beabsichtigten Verwendungszweck unzureichend.
    wheels_stick:
      name: Räder klemmen
      description: Der Rollmechanismus bewegt sich nicht reibungslos.
    whitening_results:
      name: Aufhellungsergebnisse
      description: Der Grad der erzielten Farbveränderung ist geringer als erwartet.
    width:
      name: Breite
      description: Die Abmessungen des Artikels von Seite zu Seite sind für die Passform
        oder den Platzbedarf der Kundin oder des Kunden ungeeignet.
    wind_resistance:
      name: Windwiderstand
      description: Die Fähigkeit des Artikels, Wind abzuhalten, ist für die gegebenen
        Bedingungen oder die vorgesehene Aktivität ungeeignet.
    wrong_amount:
      name: Falsche Menge
      description: Die gelieferte Produktmenge weicht von der bestellten bzw. erwarteten
        Menge ab.
    wrong_dosage:
      name: Falsche Dosierung
      description: Die Stärke oder Konzentration des Wirkstoffs entspricht nicht den
        Anforderungen.
    wrong_format:
      name: Falsches Format
      description: Der Medientyp bzw. der physische Aufbau ist mit dem Gerät bzw.
        den Konfigurationen der Kundin oder des Kunden inkompatibel.
    wrong_hand:
      name: Falsche Hand
      description: Der Artikel ist für die entgegengesetzte Handfertigkeit (links
        vs. rechts) ausgelegt, als die Kundin oder der Kunde sie benötigt.
