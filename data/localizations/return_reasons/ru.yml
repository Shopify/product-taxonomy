    tarnished:
      name: Потускневший
      description: Металлическая поверхность утратила блеск или изменила цвет.
    taste:
      name: Taste
      description: Вкусовой профиль пищевого продукта не соответствует предпочтениям
        клиента.
    temperature:
      name: Температура
      description: Уровень тепла или холода, создаваемый или поддерживаемый изделием,
        не соответствует предпочтениям клиента.
    temperature_range:
      name: Диапазон температур
      description: Диапазон рабочих температур изделия слишком узок для нужд пользователя.
    temperature_rating:
      name: Температурный режим
      description: Заявленный диапазон рабочих температур изделия не подходит для
        условий эксплуатации клиента.
    temperature_regulation:
      name: Терморегуляция
      description: Материал чрезмерно удерживает тепло тела, вызывая перегрев пользователя.
    terrain:
      name: Тип местности
      description: Тип или состояние поверхности не соответствуют возможностям изделия.
    test_format:
      name: Формат теста
      description: Формат тестирования или представления результатов не соответствует
        предпочтениям клиента.
    test_method:
      name: Метод тестирования
      description: Процедура использования тестового набора не соответствует предпочтениям
        клиента.
    text_size:
      name: Размер текста
      description: Размер шрифта печатного или отображаемого текста затрудняет чтение.
    texture:
      name: Текстура
      description: Физические ощущения от изделия или его состав не соответствуют
        предпочтениям клиента.
    theme:
      name: Тема
      description: Тематика или стиль изделия не соответствуют ожиданиям клиента.
    thickness:
      name: Толщина
      description: Физическая глубина изделия больше или меньше, чем ожидалось, либо
        его конструкция слишком или недостаточно массивна.
    tight_around_ankles:
      name: Тесно в лодыжках
      description: Изделие неприятно сдавливает в области щиколотки.
    tight_around_thighs:
      name: Тесно в бедрах
      description: Изделие неприятно сдавливает в области бедра.
    timer:
      name: Таймер
      description: Функция таймера или настройка продолжительности работы неудовлетворительны.
    tip_size:
      name: Размер наконечника
      description: Размер пишущего наконечника или аппликатора не обеспечивает требуемой
        точности.
    tip_style:
      name: Тип наконечника
      description: Форма или конструкция аппликатора либо пишущего наконечника не
        соответствуют потребностям клиента.
    too_big:
      name: Слишком большой
      description: Габариты изделия больше, чем требуется для посадки или доступного
        пространства клиента.
    too_bitter:
      name: Слишком горький
      description: Вкусовой профиль имеет неприятный резкий или едкий привкус.
    too_bulky:
      name: Слишком громоздкий
      description: Изделие занимает слишком много места или неудобно в обращении.
    too_coarse:
      name: Слишком грубый
      description: Абразивная поверхность более грубая или агрессивная, чем требуется.
    too_complex:
      name: Слишком сложный
      description: Количество функций, настроек или этапов, необходимых для использования
        изделия, чрезмерно и перегружает пользователя.
    too_drying:
      name: Слишком сушит
      description: Изделие чрезмерно удаляет влагу, вызывая сухость кожи или волос.
    too_fine:
      name: Слишком мелкий
      description: Абразивная поверхность более гладкая или менее агрессивная, чем
        требуется.
    too_firm:
      name: Слишком жесткий
      description: Жесткость изделия или отсутствие податливости выражены сильнее,
        чем ожидалось.
    too_long:
      name: Слишком длинный
      description: Длина изделия превышает допустимую для предполагаемой посадки,
        пространства или способа использования.
    too_loose:
      name: Слишком свободный
      description: Изделие не фиксируется надежно или имеет недостаточное натяжение.
    too_loud:
      name: Слишком громкий
      description: Звук, издаваемый изделием, чрезмерный или нарушает комфорт в предполагаемой
        среде использования.
    too_much_support:
      name: Слишком сильная поддержка
      description: Степень усиления или жесткости чрезмерна и вызывает дискомфорт
        у клиента.
    too_narrow:
      name: Слишком узко
      description: Ширина изделия недостаточна для предполагаемой посадки, пространства
        или использования.
    too_quiet:
      name: Слишком тихий
      description: Звук, издаваемый изделием, недостаточен для четкого восприятия
        в предполагаемой среде использования.
    too_rich:
      name: Слишком насыщенный
      description: Вкус или консистенция чрезмерно насыщенные или слишком тяжелые
        для предпочтений клиента.
    too_sharp:
      name: Слишком острый
      description: Кромка или острие чрезмерно острые и представляют опасность либо
        вызывают дискомфорт.
    too_short:
      name: Слишком короткий
      description: Длина изделия недостаточна для предполагаемой посадки, пространства
        или использования.
    too_simple:
      name: Слишком простой
      description: Изделию недостает функциональности или характеристик, ожидаемых
        клиентом.
    too_small:
      name: Слишком маленький
      description: Габариты изделия меньше, чем требуется для посадки или доступного
        пространства клиента.
    too_soft:
      name: Слишком мягкий
      description: Степень податливости или недостаток конструкционной жесткости изделия
        больше, чем ожидалось.
    too_sticky:
      name: Слишком липкий
      description: Изделие чрезмерно прилипает или оставляет нежелательный липкий
        след.
    too_stiff:
      name: Слишком жесткий
      description: Изделие или его компоненты слишком жесткие и не могут изгибаться,
        гнуться или адаптироваться в соответствии с назначением.
    too_strong:
      name: Слишком сильный
      description: Чрезмерная сила, выходная мощность или воздействие изделия.
    too_subtle:
      name: Слишком незаметно
      description: Характер, детализация или нюанс воздействия изделия менее выражены,
        чем ожидалось.
    too_sweet:
      name: Слишком сладкий
      description: Уровень сахара или сладости превышает предпочтения клиента.
    too_thick:
      name: Слишком толстый
      description: Изделие имеет чрезмерную плотность или массу для предполагаемого
        использования.
    too_thin:
      name: Слишком тонкий
      description: Изделие имеет недостаточную плотность или массу для предполагаемого
        использования.
    too_tight:
      name: Слишком тесный
      description: Изделие чрезмерно сдавливает или слишком плотно прилегает, вызывая
        дискомфорт.
    too_weak:
      name: Слишком слабый
      description: Сила, выходная мощность или эффект изделия недостаточны либо едва
        ощутимы.
    too_wide:
      name: Слишком широкий
      description: Габариты изделия недостаточны для предполагаемой посадки, пространства
        или использования.
    tooth_spacing:
      name: Расстояние между зубьями
      description: Расстояние между зубьями расчески или лезвия не соответствует потребностям
        клиента.
    touch_response:
      name: Отклик на касание
      description: Чувствительность сенсорного интерфейса слишком высокая или слишком
        низкая.
    transparency:
      name: Прозрачность
      description: Материал слишком прозрачный либо недостаточно прозрачный в соответствии
        с предпочтениями клиента.
    tread_type:
      name: Тип протектора
      description: Рисунок или конструкция подошвы либо внешней поверхности изделия
        не подходят для предполагаемой поверхности или условий эксплуатации.
    trial_period_ending:
      name: Пробный период заканчивается
      description: Клиент возвращает товар до окончания срока подписки или пробного
        периода.
    type_too_big:
      name: Слишком крупный шрифт
      description: Размер шрифта или символов больше желаемого.
    type_too_small:
      name: Слишком мелкий шрифт
      description: Размер шрифта или символов слишком мал для комфортного чтения.
    uncomfortable:
      name: Неудобный
      description: Общие физические ощущения при использовании изделия вызывают дискомфорт.
    uncomfortable_in_ear:
      name: Неудобно в ухе
      description: Посадка или форма наушника вызывают раздражение или боль.
    underwire:
      name: Косточки
      description: Металлические или пластиковые элементы поддержки в изделии вызывают
        дискомфорт либо не соответствуют форме тела.
    unknown:
      name: Неизвестно
      description: Причина возврата не указана или не может быть определена.
    unstable:
      name: Неустойчивый
      description: Изделие смещается, чрезмерно вибрирует или теряет устойчивость
        во время работы или использования.
    vehicle_fit:
      name: Совместимость с автомобилем
      description: Изделие не крепится надлежащим образом или не подходит для конкретного
        транспортного средства клиента.
    ventilation:
      name: Вентиляция
      description: Изделие не обеспечивает достаточной вентиляции или воздухопроницаемости.
    vibration:
      name: Вибрация
      description: Колебательное движение, создаваемое устройством, чрезмерное или
        вызывает дискомфорт.
    video_quality:
      name: Качество видео
      description: Четкость, плавность движения или точность цветопередачи изображения
        не соответствуют ожиданиям.
    viscosity:
      name: Вязкость
      description: Вязкость или сопротивление потоку жидкости не соответствуют предполагаемому
        применению.
    vision_clarity:
      name: Четкость зрения
      description: Обзор через линзу ухудшает способность пользователя ясно видеть.
    voltage:
      name: Напряжение
      description: Электрические параметры устройства не соответствуют предполагаемому
        источнику питания.
    volume:
      name: Объем
      description: Звук, издаваемый устройством, недостаточно или чрезмерно громкий.
    waist_too_big:
      name: Слишком большой в талии
      description: Изделие велико в области талии.
    waist_too_high:
      name: Слишком высокая талия
      description: Линия талии изделия расположена слишком высоко.
    waist_too_loose:
      name: Слишком свободно в талии
      description: Пояс изделия не фиксируется надежно на талии.
    waist_too_low:
      name: Слишком низкая талия
      description: Линия талии изделия расположена слишком низко на бедрах.
    waist_too_small:
      name: Слишком маленький в талии
      description: Изделие мало в области талии.
    waist_too_tight:
      name: Слишком тесно в талии
      description: Пояс изделия неприятно сдавливает талию.
    warmth:
      name: Тепло
      description: Уровень тепла, обеспечиваемый или удерживаемый изделием, не соответствует
        предполагаемым условиям или виду деятельности.
    washability:
      name: Возможность стирки
      description: Предложенный метод очистки неприемлем.
    water_resistance:
      name: Водостойкость
      description: Способность изделия отталкивать воду или влагу недостаточна для
        предполагаемых условий использования.
    wear:
      name: Износ
      description: Эффект от косметического или уходового средства длится не так долго,
        как ожидалось.
    weather:
      name: Погода
      description: Условия окружающей среды препятствуют оказанию услуги или выполнению
        действия.
    weight:
      name: Вес
      description: Масса изделия (чрезмерная или недостаточная) делает его непригодным
        для предполагаемого использования клиентом.
    weight_capacity:
      name: Грузоподъемность
      description: Максимальная нагрузка, которую изделие способно выдержать, недостаточна
        для предполагаемого использования клиентом.
    wheels_stick:
      name: Колеса заедают
      description: Механизм качения или вращения работает недостаточно плавно.
    whitening_results:
      name: Результаты отбеливания
      description: Степень изменения цвета ниже ожидаемой.
    width:
      name: Ширина
      description: Ширина изделия (от одной боковой стороны до другой) не соответствует
        требованиям к посадке или доступному пространству клиента.
    wind_resistance:
      name: Ветроустойчивость
      description: Способность изделия защищать от ветра не соответствует предполагаемым
        условиям или виду деятельности.
    wrong_amount:
      name: Неправильное количество
      description: Полученное количество товара отличается от заказанного или ожидаемого.
    wrong_dosage:
      name: Неправильная дозировка
      description: Сила действия или концентрация активного вещества не соответствуют
        требованиям.
    wrong_format:
      name: Неправильный формат
      description: Тип носителя или физическая структура несовместимы с устройством
        клиента либо его предпочтениями.
    wrong_hand:
      name: Не для той руки
      description: Изделие предназначено не для той руки, которая требуется клиенту
        (левой вместо правой или наоборот).
