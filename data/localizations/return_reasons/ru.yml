---
ru:
  return_reasons:
    absorbency:
      name: Впитываемость
      description: Способность материала впитывать и удерживать жидкость недостаточна
        или чрезмерна.
    absorption:
      name: Впитываемость
      description: Продукт не впитывается в поверхность или в кожу так, как ожидалось.
    academic_level:
      name: Академический уровень
      description: Сложность или глубина содержания не подходит для образовательных
        потребностей клиента.
    accuracy:
      name: Точность
      description: Измерения или данные, предоставляемые устройством, недостаточно
        точны.
    adhesion:
      name: Адгезия
      description: Продукт не обеспечивает надежное первоначальное сцепление с предполагаемой
        поверхностью.
    adhesive:
      name: Клей
      description: Клеящие свойства продукта не соответствуют его назначению.
    adhesive_strength:
      name: Сила сцепления
      description: Удерживающая способность клея недостаточна или чрезмерна для предполагаемой
        нагрузки или напряжения.
    adjustability:
      name: Регулируемость
      description: Изделие нельзя изменить или отрегулировать по размеру в соответствии
        с нуждами клиента.
    age:
      name: Возраст
      description: Возраст, год выпуска или дата производства товара не соответствуют
        ожиданиям.
    age_range:
      name: Возрастной диапазон
      description: Рекомендуемая возрастная группа товара не соответствует предполагаемому
        пользователю.
    age_restriction:
      name: Возрастное ограничение
      description: Товар имеет ограничения по использованию на основе минимального
        или максимального возраста.
    amperage:
      name: Сила тока
      description: Номинальный электрический ток не подходит для устройства или системных
        требований клиента.
    angle:
      name: Угол
      description: Степень наклона или изгиба не соответствует требованиям клиента.
    animal_didnt_like:
      name: Не понравилось животному
      description: Животное отказалось употреблять продукт или взаимодействовать с
        ним.
    animal_refused:
      name: Животное отказалось
      description: Животное не стало использовать или употреблять продукт.
    application:
      name: Применение
      description: Слишком сложный или трудоемкий способ нанесения продукта либо пользователь
        может легко допустить ошибку.
    applicator:
      name: Аппликатор
      description: Предоставленный инструмент распределяет продукт неравномерно или
        неконтролируемо.
    arrived_late:
      name: Доставлено с опозданием
      description: Доставка произошла позже ожидаемой даты или требуемого времени.
    articulation:
      name: Артикуляция
      description: Диапазон или качество движения шарнира в изделии не соответствует
        потребностям клиента.
    artificial_tasting:
      name: Искусственный вкус
      description: Вкус имеет неестественный или синтетический оттенок.
    assembly:
      name: Сборка
      description: Изделие требует сборки, хотя предполагалось, что оно будет предварительно
        собрано.
    assortment:
      name: Ассортимент
      description: Ассортимент предметов, входящих в комплект, не соответствует пожеланиям
        клиента.
    baby_refused:
      name: Ребенок отказался
      description: Младенец не стал использовать или не принял изделие.
    balance:
      name: Баланс
      description: Распределение веса в изделии негативно влияет на его управляемость
        или устойчивость.
    band_rolls_down:
      name: Пояс скатывается
      description: Одежда не держится на месте и сползает вниз по телу.
    band_rolls_up:
      name: Резинка скатывается
      description: Эластичная или тканевая резинка не держится на месте и сползает
        вверх по телу.
    band_too_big:
      name: Пояс слишком велик
      description: Слишком большая окружность ленты не позволяет обеспечить надежную
        посадку на теле.
    band_too_loose:
      name: Слишком свободная резинка
      description: Окружность ленты не обеспечивает надежную посадку.
    band_too_small:
      name: Пояс слишком мал
      description: Недостаточная окружность ленты вызывает сдавливание тела.
    band_too_thick:
      name: Слишком толстая резинка
      description: Лента слишком широкая, не соответствует пожеланиям клиента.
    band_too_thin:
      name: Слишком тонкая резинка
      description: Недостаточная ширина ленты для комфорта или поддержки.
    band_too_tight:
      name: Слишком тугая резинка
      description: Лента неприятно сдавливает тело.
    barrel_size:
      name: Размер барреля
      description: Диаметр плойки или другого инструмента не соответствует нужному
        размеру для желаемого эффекта.
    base_curve:
      name: Базовая кривизна
      description: Кривизна линзы не соответствует форме глаза клиента или требованиям
        рецепта.
    battery_life:
      name: Время работы от аккумулятора
      description: Время работы устройства на одном заряде не соответствует ожиданиям
        клиента.
    bitterness:
      name: Горечь
      description: Вкусовой профиль имеет неприятный резкий или едкий привкус.
    blade_type:
      name: Тип лезвия
      description: Конкретный стиль или кромка лезвия не подходят для использования
        клиентом.
    board_volume:
      name: Объём доски
      description: Водоизмещение доски обеспечивает недостаточную или чрезмерную плавучесть
        для веса пользователя.
    bounce:
      name: Отскок
      description: Амортизационная способность изделия слишком высока или слишком
        низка этой данной активности.
    breaks_easily:
      name: Легко ломается
      description: Изделие проявляет признаки хрупкости или недостаточной прочности
        при обычном использовании.
    breathability:
      name: Воздухопроницаемость
      description: Материал не пропускает влагу, вызывая перегрев или ощущение липкости.
    brightness:
      name: Яркость
      description: Интенсивность света, излучаемого или отражаемого изделием, не соответствует
        предпочтениям клиента.
    bristles_too_coarse:
      name: Слишком жесткая щетина
      description: Щетка слишком жесткая или царапающая для предполагаемой задачи.
    bristles_too_soft:
      name: Слишком мягкая щетина
      description: Щетка слишком мягкая для предполагаемой задачи.
    bubble_output:
      name: Количество пузырей
      description: Количество или размер образующихся пузырьков не соответствуют ожиданиям.
    budget:
      name: Бюджет
      description: Стоимость услуги превышает финансовые возможности клиента.
    buoyancy:
      name: Плавучесть
      description: Способность изделия держаться на воде или поддерживать вес в воде
        не соответствует потребностям клиента.
    burn_rate:
      name: Скорость сгорания
      description: Скорость сгорания изделия выше или ниже ожидаемой.
    burn_time:
      name: Время горения
      description: Продолжительность горения изделия меньше или больше ожидаемой.
    bust_too_big:
      name: Слишком большой в груди
      description: Предмет одежды велик в груди.
    bust_too_loose:
      name: Слишком свободный в груди
      description: Недостаточно надежная посадка в области груди.
    bust_too_small:
      name: Слишком маленький в груди
      description: Предмет одежды мал в груди.
    bust_too_tight:
      name: Слишком тесный в груди
      description: Изделие неприятно сдавливает в области груди.
    buttons_not_accessible:
      name: Неудобное расположение кнопок
      description: Чехол или крышка блокирует элементы управления устройства, препятствуя
        использованию.
    caffeine_level:
      name: Уровень кофеина
      description: Концентрация кофеина в продукте слишком высокая или слишком низкая
        для пользователя.
    caliber:
      name: Калибр
      description: Указанный диаметр снаряда или ствола несовместим с оборудованием
        клиента.
    calibration:
      name: Калибровка
      description: Процесс настройки или калибровки устройства по известному стандарту
        сложный или не работает как ожидалось.
    capacity:
      name: Вместимость
      description: Объем или количество, которое может вместить или обработать изделие,
        не соответствует требованиям клиента.
    carbonation:
      name: Газация
      description: Уровень газации или пузырьков в напитке слишком высокий или слишком
        низкий.
    caused_allergic_reaction:
      name: Вызвало аллергическую реакцию
      description: Продукт вызвал выраженную аллергическую реакцию, такую как крапивница,
        отек или сильная сыпь.
    caused_irritation:
      name: Вызвало раздражение
      description: Продукт вызвал кожный или физический дискомфорт.
    changed_my_mind:
      name: Передумал(а)
      description: Клиенту больше не нужно это изделие после покупки, независимо от
        его качества или соответствия.
    charging_speed:
      name: Скорость зарядки
      description: Устройству требуется слишком много времени для зарядки аккумулятора.
    chest_too_big:
      name: Слишком большой в груди
      description: Предмет одежды велик в груди.
    chest_too_small:
      name: Слишком маленький в груди
      description: Предмет одежды мал в груди.
    clarity:
      name: Четкость
      description: Визуальная прозрачность изделия не соответствует требованиям клиента.
    cleaning:
      name: Очистка
      description: Изделие не очищается так легко, как ожидалось.
    closeness:
      name: Чистота бритья
      description: Бритье или срез, обеспечиваемые инструментом, недостаточно близки
        к коже.
    closure:
      name: Застёжка
      description: Механизм открытия или закрытия изделия сложен в использовании или
        ненадежен.
    cold_duration:
      name: Длительность сохранения холода
      description: Изделие не сохраняет холод так долго, как требуется клиенту.
    collar_too_loose:
      name: Слишком свободный воротник
      description: Воротник неплотно прилегает к шее.
    collar_too_tight:
      name: Слишком тугой воротник
      description: Воротник неприятно сдавливает шею.
    color:
      name: Цвет
      description: Оттенок, тон или внешний вид изделия не соответствуют предпочтениям
        или ожиданиям клиента.
    color_too_bright:
      name: Слишком яркий цвет
      description: Слишком интенсивный или насыщенный цвет, по мнению клиента.
    color_too_muted:
      name: Слишком тусклый цвет
      description: Недостаточно интенсивный или насыщенный цвет, по мнению клиента.
    comfort:
      name: Комфорт
      description: Физические ощущения или эргономические характеристики изделия не
        соответствуют ожиданиям.
    compartments:
      name: Отделения
      description: Количество или расположение секций для хранения не соответствует
        потребностям клиента в организации.
    compliance:
      name: Соответствие
      description: Товар не соответствует конкретным нормативным или организационным
        стандартам, требуемым клиентом.
    compression:
      name: Сжатие
      description: Одежда слишком или недостаточно давит.
    condition:
      name: Состояние
      description: Состояние изделия, включая незначительный износ или дефекты, не
        соответствует заявленной категории или описанию.
    configuration:
      name: Конфигурация
      description: Способ размещения или соединения модульных компонентов изделия
        не подходит для предполагаемого применения.
    connectivity:
      name: Возможности подключения
      description: Устройство ненадежно или недостаточно качественно подключается
        к сетям или другим устройствам.
    consistency:
      name: Консистенция
      description: Толщина, плотность или текучесть жидкого или полутвердого продукта
        не соответствуют ожиданиям.
    content:
      name: Контент
      description: Информация или материал, включенные в изделие, не соответствуют
        ожиданиям клиента.
    cook_time:
      name: Время приготовления
      description: Время, необходимое для приготовления пищевого продукта, неудовлетворительно
        или не соответствует ожиданиям.
    cooling:
      name: Охлаждение
      description: Способность устройства снижать температуру недостаточна.
    coverage:
      name: Покрытие
      description: Степень, в которой изделие скрывает, защищает или наносится на
        поверхность, не соответствует потребностям клиента.
    cuff_too_big:
      name: Манжета слишком велика
      description: Слишком широкое отверстие для запястья или руки.
    cuff_too_small:
      name: Манжета слишком мала
      description: Слишком узкое отверстие для запястья или руки.
    cups_gaping:
      name: Чашки отстают
      description: Чашки бюстгальтера не прилегают к телу, образуя зазоры.
    cups_too_big:
      name: Чашки слишком велики
      description: Объем чашки изделия слишком велик.
    cups_too_loose:
      name: Слишком свободные чашки
      description: Чашки сидят недостаточно плотно или не обеспечивают достаточной
        поддержки.
    cups_too_small:
      name: Чашки слишком малы
      description: Объем чашки изделия слишком мал.
    cups_too_thick:
      name: Слишком толстые чашки
      description: Слишком толстый наполнитель чашек.
    cups_too_thin:
      name: Слишком тонкие чашки
      description: Чашки недостаточно плотно прилегают или не обеспечивают должного
        покрытия.
    cups_too_tight:
      name: Слишком тесные чашки
      description: Чашки сжимают или сдавливают грудь, вызывая дискомфорт.
    cushioning:
      name: Амортизация
      description: Мягкость материала или его амортизирующие свойства не соответствуют
        ожиданиям для предполагаемого использования.
    damaged_after_use:
      name: Повредилось после использования
      description: Изделие имеет признаки износа или поломки после нормального использования.
    damaged_after_washing:
      name: Повредилось после стирки
      description: Изделие было повреждено в процессе очистки.
    damaged_after_wear:
      name: Повредилось после носки
      description: Изделие демонстрирует признаки повреждения после использования
        на теле.
    damaged_or_defective:
      name: Товар повреждён или бракованный
      description: Изделие прибыло с физическими повреждениями, производственными
        дефектами или не функционирует должным образом.
    damaged_packaging:
      name: Поврежденная упаковка
      description: Внешняя упаковка прибыла в поврежденном состоянии.
    depth:
      name: Глубина
      description: Размер, измеренный от передней части до задней или от верха до
        низа, не соответствует размерам клиента.
    detail:
      name: Особенность
      description: Недостаточный уровень детализации или точности в конструкции или
        работе изделия.
    detection_range:
      name: Дальность обнаружения
      description: Дальность или площадь зоны обнаружения устройства не подходит для
        предполагаемого применения.
    diameter:
      name: Диаметр
      description: Ширина круглого сечения не соответствует предполагаемому использованию
        или требованиям совместимости.
    dietary_requirements:
      name: Диетические требования
      description: Товар содержит ингредиенты, противоречащие потребностям здоровья
        или образу жизни клиента.
    difficult_to_adjust:
      name: Сложно регулировать
      description: Механизмы регулировки посадки или настроек изделия сложны в использовании.
    difficult_to_assemble:
      name: Сложно собрать
      description: Процесс сборки изделия чрезмерно сложный или инструкции неясные.
    difficult_to_blend:
      name: Сложно смешивать
      description: Продукт плохо смешивается с другими веществами или поверхностями.
    difficult_to_clean:
      name: Сложно чистить
      description: Конструкция или материал изделия затрудняют его очистку даже при
        использовании правильного способа.
    difficult_to_fasten:
      name: Сложно застегнуть
      description: Механизм закрывания требует чрезмерных усилий или ловкости для
        фиксации.
    difficult_to_fold:
      name: Сложно складывать
      description: Складывание или сворачивание изделия сложнее, чем ожидалось.
    difficult_to_install:
      name: Сложно устанавливать
      description: Процесс установки требует больше усилий или навыков, чем ожидал
        клиент.
    difficult_to_refill:
      name: Сложно наполнить
      description: Сложный процесс пополнения продукта.
    difficult_to_use:
      name: Сложно использовать
      description: Изделие требует больше навыков или усилий для использования, чем
        ожидалось.
    difficulty_level:
      name: Уровень сложности
      description: Сложность, которую представляет изделие, не соответствует уровню
        навыков пользователя.
    dispenser:
      name: Дозатор
      description: Механизм подачи продукта неудовлетворителен.
    doesnt_apply_evenly:
      name: Наносится неравномерно
      description: Продукт наносится пятнами или полосами.
    doesnt_blend_well:
      name: Плохо смешивается
      description: Продукт плохо смешивается или неравномерно распределяется при взаимодействии
        с другими веществами или поверхностями.
    doesnt_dissolve_well:
      name: Плохо растворяется
      description: Вместо равномерного смешивания с жидкостью продукт оставляет осадок
        или комки.
    doesnt_fit_bed_frame:
      name: Не подходит к каркасу кровати
      description: Размеры матраса или постельных принадлежностей не соответствуют
        размеру конкретной кроватной рамы.
    doesnt_fit_mattress:
      name: Не подходит для матраса
      description: Размеры постельных принадлежностей не соответствуют размеру матраса.
    doesnt_fit_phone:
      name: Не подходит для телефона
      description: Размеры аксессуара не подходят для конкретной модели телефона.
    doesnt_fit_tv:
      name: Не подходит для телевизора
      description: Размеры изделия или крепление не подходят для телевизора клиента.
    doesnt_stay_closed:
      name: Не держится закрытым
      description: Защелка или механизм фиксации не удерживаются надежно.
    drainage:
      name: Дренаж
      description: Изделие не позволяет жидкости отводиться должным образом.
    draw_length:
      name: Длина натяжения
