      description: Hình ảnh nhìn qua thấu kính làm giảm khả năng nhìn rõ của người
        dùng.
    voltage:
      name: Voltage
      description: Thông số điện của thiết bị không phù hợp với nguồn điện dự kiến.
    volume:
      name: Volume
      description: Âm thanh do thiết bị phát ra quá nhỏ hoặc quá lớn.
    waist_too_big:
      name: Waist too big
      description: Cỡ eo lớn hơn so với yêu cầu đối với cơ thể khách hàng.
    waist_too_high:
      name: Waist too high
      description: Phần eo của trang phục nằm quá cao so với thân người.
    waist_too_loose:
      name: Waist too loose
      description: Cạp quần không ôm khít quanh eo.
    waist_too_low:
      name: Waist too low
      description: Đường eo của trang phục nằm quá thấp dưới hông.
    waist_too_small:
      name: Waist too small
      description: Số đo vòng eo nhỏ hơn yêu cầu của cơ thể khách hàng.
    waist_too_tight:
      name: Waist too tight
      description: Cạp quần bó sát gây khó chịu quanh eo.
    warmth:
      name: Warmth
      description: Mức nhiệt mà mặt hàng cung cấp hoặc giữ lại không phù hợp với điều
        kiện hoặc hoạt động dự định.
    washability:
      name: Washability
      description: Phương pháp vệ sinh được yêu cầu là không thể chấp nhận được.
    water_resistance:
      name: Water resistance
      description: Khả năng chống thấm nước hoặc ẩm của mặt hàng không đủ đáp ứng
        điều kiện sử dụng dự kiến.
    wear:
      name: Wear
      description: Hiệu quả của sản phẩm mỹ phẩm hoặc chăm sóc cá nhân khi sử dụng
        không kéo dài như mong đợi.
    weather:
      name: Weather
      description: Các điều kiện môi trường cản trở việc cung cấp dịch vụ hoặc thực
        hiện hoạt động.
    weight:
      name: Weight
      description: Độ nặng hoặc nhẹ của mặt hàng khiến nó không phù hợp với mục đích
        sử dụng dự định của khách hàng.
    weight_capacity:
      name: Weight capacity
      description: Khả năng chịu tải tối đa của mặt hàng không đủ cho mục đích sử
        dụng của khách hàng.
    wheels_stick:
      name: Wheels stick
      description: Cơ cấu lăn không hoạt động trơn tru.
    whitening_results:
      name: Whitening results
      description: Mức độ thay đổi màu sắc đạt được thấp hơn so với dự kiến.
    width:
      name: Width
      description: Kích thước mặt hàng đo từ cạnh này sang cạnh kia không phù hợp
        với chiều cao hoặc không gian của khách hàng.
    wind_resistance:
      name: Wind resistance
      description: Khả năng chắn gió của mặt hàng không phù hợp với điều kiện hoặc
        hoạt động dự định.
    wrong_amount:
      name: Wrong amount
      description: Số lượng sản phẩm nhận được khác với số lượng đã đặt hàng hoặc
        dự kiến.
    wrong_dosage:
      name: Wrong dosage
      description: Nồng độ hoạt chất không đáp ứng yêu cầu.
    wrong_format:
      name: Wrong format
      description: Loại phương tiện lưu trữ hoặc cấu trúc vật lý không tương thích
        với thiết bị hoặc sở thích của khách hàng.
    wrong_hand:
      name: Wrong hand
      description: Mặt hàng này được thiết kế cho người thuận tay trái chứ không phải
        tay phải như khách hàng mong muốn.
    pilling:
      name: Xù lông
      description: Vải sớm hình thành các hạt xơ hoặc lớp xơ không mong muốn trong
        quá trình sử dụng hoặc giặt giũ.
