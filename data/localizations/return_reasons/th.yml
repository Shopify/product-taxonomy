---
th:
  return_reasons:
    absorbency:
      name: การดูดซับ
      description: ความสามารถในการดูดซับและกักเก็บของเหลวของวัสดุนั้นไม่เพียงพอหรือมากเกินไป
    absorption:
      name: การดูดซับ
      description: ผลิตภัณฑ์ไม่ซึมเข้าสู่พื้นผิวหรือร่างกายอย่างที่คาดไว้
    academic_level:
      name: ระดับการศึกษา
      description: เนื้อหามีความซับซ้อนหรือลึกซึ้งเกินไป ไม่เหมาะสมกับความต้องการด้านการศึกษาของลูกค้า
    accuracy:
      name: ความแม่นยำ
      description: ค่าที่วัดได้หรือข้อมูลที่ได้จากอุปกรณ์นั้นไม่แม่นยำเพียงพอ
    adhesion:
      name: การยึดเกาะ
      description: ผลิตภัณฑ์นี้ไม่ได้สร้างการยึดเกาะเริ่มต้นที่แข็งแรงกับพื้นผิวที่ต้องการ
    adhesive:
      name: การยึดติด
      description: คุณสมบัติการยึดเกาะของผลิตภัณฑ์ไม่เหมาะสมกับการใช้งานตามที่ต้องการ
    adhesive_strength:
      name: ความแรงในการยึดติด
      description: แรงยึดเกาะของกาวไม่เพียงพอหรือมากเกินไปสำหรับน้ำหนักหรือแรงกดที่ต้องการ
    adjustability:
      name: ความสามารถในการปรับ
      description: สินค้าชิ้นนี้ไม่สามารถดัดแปลงหรือปรับขนาดให้เหมาะสมกับความต้องการของลูกค้าได้
    age:
      name: อายุ
      description: อายุ รุ่น หรือวันที่ผลิตของผลิตภัณฑ์ไม่ตรงตามที่คาดไว้
    age_range:
      name: ช่วงอายุ
      description: ช่วงอายุที่แนะนำสำหรับสินค้านี้ไม่ตรงกับกลุ่มผู้ใช้งานที่ตั้งใจไว้
    age_restriction:
      name: ข้อจำกัดด้านอายุ
      description: ผลิตภัณฑ์นี้มีข้อจำกัดในการใช้งานโดยขึ้นอยู่กับข้อกำหนดอายุขั้นต่ำหรือสูงสุด
    amperage:
      name: ปริมาณกระแสไฟฟ้า
      description: พิกัดกระแสไฟฟ้าไม่เหมาะสมกับอุปกรณ์หรือระบบของลูกค้า
    angle:
      name: มุม
      description: ระดับความเอียงหรือการโค้งงอไม่ตรงตามความต้องการของลูกค้า
    animal_didnt_like:
      name: สัตว์เลี้ยงไม่ชอบ
      description: สัตว์ปฏิเสธที่จะกินหรือเข้าไปยุ่งเกี่ยวกับผลิตภัณฑ์ดังกล่าว
    animal_refused:
      name: สัตว์เลี้ยงไม่ยอมใช้
      description: สัตว์ไม่น่าจะใช้หรือบริโภคผลิตภัณฑ์นี้
    application:
      name: การใช้งาน
      description: วิธีการใช้งานผลิตภัณฑ์ที่กำหนดไว้นั้นยุ่งยากซับซ้อนเกินไป หรือมีโอกาสเกิดข้อผิดพลาดจากผู้ใช้สูง
    applicator:
      name: อุปกรณ์สำหรับทา
      description: เครื่องมือที่ให้มานั้นกระจายผลิตภัณฑ์อย่างไม่สม่ำเสมอหรือไม่สามารถควบคุมได้
    arrived_late:
      name: ได้รับสินค้าล่าช้า
      description: การส่งมอบสินค้าเกิดขึ้นหลังจากวันที่คาดการณ์ไว้หรือเวลาที่กำหนดไว้
    articulation:
      name: ข้อต่อ
      description: ช่วงหรือคุณภาพของการเคลื่อนไหวของข้อต่อในสินค้าชิ้นนี้ไม่ตรงตามความต้องการของลูกค้า
    artificial_tasting:
      name: รสชาติสังเคราะห์
      description: รสชาติไม่เป็นธรรมชาติ หรือมีรสชาติเหมือนรสชาติสังเคราะห์
    assembly:
      name: การประกอบ
      description: สินค้าต้องประกอบเอง ทั้งที่ลูกค้าคาดหวังว่าสินค้าจะประกอบเสร็จเรียบร้อยแล้ว
    assortment:
      name: สินค้าคละแบบ
      description: ความหลากหลายของรายการสินค้าที่รวมอยู่ในแพ็คเกจไม่ใช่สิ่งที่ลูกค้าต้องการ
    baby_refused:
      name: ลูกน้อยไม่ยอมใช้
      description: เด็กทารกไม่น่าจะใช้หรือยอมรับสินค้าชิ้นนี้
    balance:
      name: ความสมดุล
      description: การกระจายน้ำหนักภายในตัวสินค้าส่งผลกระทบต่อความมั่นคงของสินค้าในทางที่ไม่พึงประสงค์เมื่อต้องจับถือ
    band_rolls_down:
      name: แถบรัดม้วนลง
      description: เสื้อผ้าชิ้นนี้ไม่กระชับอยู่กับที่และเลื่อนลงมาตามตัว
    band_rolls_up:
      name: แถบม้วนขึ้น
      description: แถบยางยืดหรือแถบผ้าไม่กระชับอยู่กับที่และเลื่อนขึ้นไปตามลำตัว
    band_too_big:
      name: แถบรัดใหญ่เกินไป
      description: สายรัดมีขนาดเส้นรอบวงใหญ่เกินไป ทำให้ไม่สามารถรัดกระชับกับร่างกายได้
    band_too_loose:
      name: แถบหลวมเกินไป
      description: เส้นรอบวงของสายรัดไม่กระชับพอดี
    band_too_small:
      name: แถบรัดเล็กเกินไป
      description: เส้นรอบวงของสายรัดสั้นเกินไป ทำให้เกิดการรัดแน่นกับร่างกาย
    band_too_thick:
      name: แถบหนาเกินไป
      description: สายรัดมีความกว้างเกินความต้องการของลูกค้า
    band_too_thin:
      name: แถบบางเกินไป
      description: สายรัดมีความกว้างไม่เพียงพอ ทำให้ไม่สามารถสวมใส่ได้สบายและพยุงได้ดี
    band_too_tight:
      name: แถบรัดเกินไป
      description: สายรัดรัดแน่นจนรู้สึกไม่สบายรอบบริเวณลำตัว
    barrel_size:
      name: เส้นผ่าศูนย์กลางของบาร์เรลเบสบอล
      description: เส้นผ่าศูนย์กลางของเครื่องม้วนผมหรืออุปกรณ์ม้วนผมมีขนาดไม่เหมาะสมกับผลลัพธ์ที่ต้องการ
    base_curve:
      name: ความโค้งของฐานเลนส์
      description: ความโค้งของเลนส์ไม่ตรงกับรูปทรงดวงตาหรือข้อกำหนดด้านค่าสายตาของลูกค้า
    battery_life:
      name: อายุการใช้งานแบตเตอรี่
      description: ระยะเวลาการใช้งานของอุปกรณ์ต่อการชาร์จหนึ่งครั้งไม่ตรงตามความคาดหวังของลูกค้า
    bitterness:
      name: ความขม
      description: รสชาติโดยรวมมีรสเผ็ดจัดหรือฝาดอย่างไม่พึงประสงค์
    blade_type:
      name: ประเภทใบมีด
      description: ลักษณะหรือคมของใบมีดไม่เหมาะสมกับการใช้งานของลูกค้า
    board_volume:
      name: ปริมาตรของบอร์ด
      description: ปริมาตรการแทนที่น้ำของกระดานนั้นให้แรงลอยตัวที่ไม่เพียงพอหรือมากเกินไปเมื่อเทียบกับน้ำหนักของผู้ใช้
    bounce:
      name: การเด้ง
      description: ความสามารถในการกระดอนกลับของสินค้าชิ้นนี้สูงหรือต่ำเกินไปสำหรับกิจกรรมที่ทำ
    breaks_easily:
      name: แตกหักง่าย
      description: สินค้าชิ้นนี้มีร่องรอยความเปราะบางหรือขาดความทนทานเมื่อใช้งานตามปกติ
    breathability:
      name: การระบายอากาศ
      description: วัสดุนี้ไม่ยอมให้ความชื้นผ่าน ทำให้เกิดความรู้สึกว่าร้อนเกินไปหรือเหนียวเหนอะหนะ
    brightness:
      name: ความสว่าง
      description: ความเข้มของแสงที่เปล่งออกมาหรือสะท้อนออกมาจากสินค้าไม่ตรงกับความต้องการของลูกค้า
    bristles_too_coarse:
      name: ขนแปรงหยาบเกินไป
      description: แปรงมีความหยาบหรือกระด้างเกินไปสำหรับงานที่ต้องการใช้งาน
    bristles_too_soft:
      name: ขนแปรงนุ่มเกินไป
      description: แปรงมีความนุ่มเกินไปสำหรับงานที่ต้องการใช้งาน
    bubble_output:
      name: ปริมาณฟอง
      description: ปริมาณหรือขนาดของฟองอากาศที่ผลิตได้ไม่เป็นไปตามที่คาดหวัง
    budget:
      name: งบประมาณ
      description: ค่าบริการสูงเกินกำลังทางการเงินของลูกค้า
    buoyancy:
      name: การลอยตัว
      description: ความสามารถในการลอยตัวหรือรับน้ำหนักในน้ำของสินค้าไม่ตรงกับความต้องการของลูกค้า
    burn_rate:
      name: อัตราการเผาไหม้
      description: อัตราการเผาไหม้ของตัวสินค้าเร็วกว่าหรือช้ากว่าที่คาดหวัง
    burn_time:
      name: ระยะเวลาการเผาไหม้
      description: ระยะเวลาการเผาไหม้ของตัวสินค้าสั้นหรือยาวกว่าที่คาดหวัง
    bust_too_big:
      name: รอบอกใหญ่เกินไป
      description: บริเวณหน้าอกของเสื้อผ้าชิ้นนี้ใหญ่กว่ารูปร่างของลูกค้ามากเกินไป
    bust_too_loose:
      name: รอบอกหลวมเกินไป
      description: การตัดเย็บบริเวณหน้าอกไม่กระชับพอ
    bust_too_small:
      name: รอบอกเล็กเกินไป
      description: บริเวณหน้าอกของเสื้อผ้าชิ้นนี้เล็กเกินไปสำหรับรูปร่างของลูกค้า
    bust_too_tight:
      name: รอบอกรัดเกินไป
      description: เสื้อผ้าชิ้นนี้รัดแน่นจนรู้สึกไม่สบายบริเวณหน้าอก
    buttons_not_accessible:
      name: ปุ่มใช้งานไม่สะดวก
      description: เคสหรือฝาครอบปิดกั้นปุ่มควบคุมของอุปกรณ์ ทำให้ไม่สามารถใช้งานได้
    caffeine_level:
      name: ระดับคาเฟอีน
      description: ปริมาณคาเฟอีนในผลิตภัณฑ์นั้นสูงหรือต่ำเกินไปสำหรับผู้ใช้
    caliber:
      name: ขนาดลำกล้อง
      description: ขนาดเส้นผ่านศูนย์กลางของกระสุนหรือลำกล้องที่ระบุไว้ไม่เข้ากันกับอุปกรณ์ของลูกค้า
    calibration:
      name: การปรับเทียบ
      description: กระบวนการตั้งค่าหรือปรับอุปกรณ์ให้เป็นไปตามมาตรฐานที่ทราบนั้นทำได้ยากหรือไม่ทำงานตามที่คาดหวัง
    capacity:
      name: ความจุ
      description: ปริมาณหรือจำนวนที่สินค้านี้สามารถบรรจุหรือจัดการได้นั้นไม่ตรงตามความต้องการของลูกค้า
    carbonation:
      name: ความซ่า
      description: ปริมาณฟองหรือความซ่าในเครื่องดื่มมากเกินไปหรือน้อยเกินไป
    caused_allergic_reaction:
      name: ทำให้เกิดอาการแพ้
      description: ผลิตภัณฑ์ทำให้เกิดอาการแพ้อย่างรุนแรงและเฉพาะเจาะจง เช่น ลมพิษ
        บวม หรือผื่นแดงอย่างรุนแรง
    caused_irritation:
      name: ทำให้เกิดการระคายเคือง
      description: ผลิตภัณฑ์ทำให้เกิดอาการไม่สบายผิวหรือความรู้สึกไม่สบายทางร่างกาย
    changed_my_mind:
      name: เปลี่ยนใจ
      description: ลูกค้าไม่ต้องการสินค้านี้อีกต่อไปหลังจากซื้อไปแล้ว แม้ว่าสินค้าจะมีคุณภาพหรือถูกต้องตามที่ระบุแค่ไหนก็ตาม
    charging_speed:
      name: ความเร็วในการชาร์จ
      description: อุปกรณ์นี้ใช้เวลานานเกินไปในการชาร์จแบตเตอรี่จนเต็ม
    chest_too_big:
      name: ช่วงอกใหญ่เกินไป
      description: ขนาดรอบอกของเสื้อผ้าชิ้นนี้ใหญ่เกินไปสำหรับลูกค้า
    chest_too_small:
      name: ช่วงอกเล็กเกินไป
      description: ขนาดรอบอกของเสื้อผ้าชิ้นนี้เล็กเกินไปสำหรับลูกค้า
    clarity:
      name: ความคมชัด
      description: ความโปร่งใสของสินค้าไม่ตรงตามความต้องการของลูกค้า
    cleaning:
      name: การทำความสะอาด
      description: สินค้าชิ้นนี้ทำความสะอาดได้ไม่ง่ายอย่างที่คาดไว้
    closeness:
      name: ความแนบสนิท
      description: การโกนหรือตัดด้วยเครื่องมือนี้ไม่แนบชิดผิวหนังเท่าที่ต้องการ
    closure:
      name: ตัวปิด
      description: กลไกการเปิดหรือปิดตัวสินค้าใช้งานยากหรือไม่ปลอดภัย
    cold_duration:
      name: ระยะเวลาเก็บความเย็น
      description: สินค้าไม่สามารถรักษาความเย็นได้นานเท่าที่ลูกค้าต้องการ
    collar_too_loose:
      name: ปกคอเสื้อหลวมเกินไป
      description: คอเสื้อไม่กระชับพอดีบริเวณรอบคอ
    collar_too_tight:
      name: ปกคอเสื้อรัดเกินไป
      description: คอเสื้อรัดแน่นจนรู้สึกไม่สบายบริเวณคอ
    color:
      name: สี
      description: สี เฉดสี หรือลักษณะภายนอกของสินค้าไม่ตรงกับความชอบหรือความคาดหวังของลูกค้า
    color_too_bright:
      name: สีสว่างเกินไป
      description: สีมีความเข้มหรือความสดใสมากเกินรสนิยมของลูกค้า
    color_too_muted:
      name: สีซีดเกินไป
      description: สีไม่สดใสหรือเข้มข้นเพียงพอตามความต้องการของลูกค้า
    comfort:
      name: ความสบาย
      description: ความรู้สึกทางกายภาพหรือประสิทธิภาพตามหลักสรีรศาสตร์ของผลิตภัณฑ์ไม่ตรงตามความคาดหวัง
    compartments:
      name: ช่องใส่ของ
      description: จำนวนหรือการจัดวางช่องเก็บของไม่ตรงกับความต้องการด้านการจัดระเบียบของลูกค้า
    compliance:
      name: การปฏิบัติตามข้อกำหนด
      description: ผลิตภัณฑ์ไม่เป็นไปตามมาตรฐานด้านกฎระเบียบหรือมาตรฐานองค์กรเฉพาะที่ลูกค้ากำหนด
    compression:
      name: การบีบอัด
      description: ระดับแรงกดที่เกิดจากเสื้อผ้านั้นมากเกินไปหรือน้อยเกินไป
    condition:
      name: สภาพสินค้า
      description: สภาพการเก็บรักษาของสินค้า รวมถึงร่องรอยการสึกหรอหรือตำหนิเล็กน้อย
        ไม่ตรงกับเกรดหรือคำอธิบายที่โฆษณาไว้
    configuration:
      name: การกำหนดค่า
      description: วิธีการจัดเรียงหรือเชื่อมต่อส่วนประกอบแบบแยกส่วนของผลิตภัณฑ์ไม่เหมาะสมกับการใช้งานที่ตั้งใจไว้
    connectivity:
      name: การเชื่อมต่อ
      description: ความสามารถในการเชื่อมต่อกับเครือข่ายหรืออุปกรณ์อื่นของอุปกรณ์นั้นไม่น่าเชื่อถือหรือไม่เพียงพอ
    consistency:
      name: ความสม่ำเสมอ
      description: ความหนืด ความหนาแน่น หรือการไหลของผลิตภัณฑ์ที่เป็นของเหลวหรือกึ่งของแข็งไม่เป็นไปตามที่คาดหวัง
    content:
      name: เนื้อหา
      description: ข้อมูลหรือเนื้อหาที่อยู่ในสินค้าไม่ตรงกับที่ลูกค้าคาดหวัง
    cook_time:
      name: เวลาในการปรุง
      description: ระยะเวลาที่ใช้ในการเตรียมผลิตภัณฑ์อาหารนี้ไม่น่าพอใจหรือไม่เป็นไปตามที่คาดหวัง
    cooling:
      name: การทำความเย็น
      description: ความสามารถในการลดอุณหภูมิของอุปกรณ์นี้ไม่เพียงพอ
    coverage:
      name: การปกปิด
      description: ผลิตภัณฑ์มีระดับการปกปิด การปกป้อง หรือการใช้งานบนพื้นผิวไม่ตรงกับความต้องการของลูกค้า
    cuff_too_big:
      name: ข้อมือใหญ่เกินไป
      description: ช่องสำหรับข้อมือหรือแขนหลวมเกินไป
    cuff_too_small:
      name: ข้อมือเล็กเกินไป
      description: ช่องสำหรับข้อมือหรือแขนคับเกินไป
    cups_gaping:
      name: คัพอ้า
      description: คัพของเสื้อชั้นในไม่แนบสนิทกับสรีระ ทำให้เกิดช่องว่าง
    cups_too_big:
      name: คัพใหญ่เกินไป
      description: ขนาดของคัพเสื้อใหญ่เกินไปสำหรับหน้าอกของลูกค้า
    cups_too_loose:
      name: คัพหลวมเกินไป
      description: คัพกระชับไม่พอดีและไม่ช่วยพยุงได้ดีพอ
    cups_too_small:
      name: คัพเล็กเกินไป
      description: ขนาดของคัพเสื้อเล็กเกินไปสำหรับหน้าอกของลูกค้า
    cups_too_thick:
      name: คัพหนาเกินไป
      description: ความหนาของวัสดุหรือแผ่นรองในคัพบรามากเกินไป
    cups_too_thin:
      name: คัพบางเกินไป
      description: คัพบรามีแผ่นรองหรือการปกปิดไม่เพียงพอ
    cups_too_tight:
      name: คัพรัดเกินไป
      description: คัพบราบีบหรือรัดหน้าอกจนรู้สึกไม่สบาย
    cushioning:
      name: การรองรับแรงกระแทก
      description: ความนุ่มนวลหรือการดูดซับแรงกระแทกของวัสดุไม่เป็นไปตามที่คาดหวังสำหรับการใช้งานที่ตั้งใจไว้
    damaged_after_use:
      name: เสียหายหลังการใช้งาน
      description: สินค้ามีร่องรอยการเสื่อมสภาพหรือชำรุดเสียหายหลังจากการใช้งานตามปกติ
    damaged_after_washing:
      name: เสียหายหลังการซัก
      description: สินค้าได้รับความเสียหายระหว่างกระบวนการทำความสะอาด
    damaged_after_wear:
      name: เสียหายหลังการสวมใส่
      description: สินค้านี้มีร่องรอยความเสียหายเกิดขึ้นหลังจากการใช้งานบนร่างกาย
    damaged_or_defective:
      name: เสียหายหรือมีตำหนิ
      description: สินค้าที่ได้รับมีตำหนิทางกายภาพ ข้อบกพร่องจากการผลิต หรือใช้งานไม่ได้ตามที่ตั้งใจไว้
    damaged_packaging:
      name: บรรจุภัณฑ์เสียหาย
      description: กล่องบรรจุด้านนอกมาถึงในสภาพที่เสียหาย
    depth:
      name: ความลึก
      description: การวัดจากด้านหน้าไปด้านหลังหรือจากบนลงล่างนั้นไม่เหมาะสมกับพื้นที่หรือขนาดที่ลูกค้าต้องการ
    detail:
      name: รายละเอียด
      description: ระดับความซับซ้อนหรือความแม่นยำในการออกแบบหรือผลผลิตของสินค้าไม่เพียงพอ
    detection_range:
      name: ระยะการตรวจจับ
      description: ระยะทางหรือพื้นที่ของโซนตรวจจับของอุปกรณ์ไม่เหมาะสมกับการใช้งานที่ต้องการ
    diameter:
      name: เส้นผ่านศูนย์กลาง
      description: ความกว้างของหน้าตัดวงกลมไม่เหมาะสมกับการใช้งานที่ต้องการหรือข้อกำหนดด้านความเข้ากันได้
    dietary_requirements:
      name: ข้อกำหนดด้านอาหาร
      description: ผลิตภัณฑ์มีส่วนผสมที่ขัดแย้งกับความต้องการด้านสุขภาพหรือวิถีชีวิตของผู้บริโภค
    difficult_to_adjust:
      name: ปรับยาก
      description: กลไกสำหรับปรับแต่งให้พอดีหรือการตั้งค่าของสินค้านั้นใช้งานยาก
    difficult_to_assemble:
      name: ประกอบยาก
      description: กระบวนการประกอบผลิตภัณฑ์นั้นยากเกินไป ซับซ้อนเกินไป หรือคำแนะนำไม่ชัดเจน
    difficult_to_blend:
      name: เกลี่ยยาก
      description: ผลิตภัณฑ์นี้ไม่สามารถผสมเข้ากับสารหรือพื้นผิวอื่นๆ ได้อย่างราบรื่น
    difficult_to_clean:
      name: ทำความสะอาดยาก
      description: การออกแบบหรือวัสดุของสินค้าทำให้ทำความสะอาดได้ยาก แม้จะใช้วิธีที่ถูกต้องแล้วก็ตาม
    difficult_to_fasten:
      name: ติดยาก
      description: กลไกการปิดต้องใช้แรงหรือความชำนาญมากเกินไปในการปิดให้สนิท
    difficult_to_fold:
      name: พับยาก
      description: การพับหรือหุบสินค้าทำได้ยากหรือยุ่งยากกว่าที่คาดไว้
    difficult_to_install:
      name: ติดตั้งยาก
      description: กระบวนการติดตั้งต้องใช้ความพยายามหรือทักษะมากกว่าที่ลูกค้าคาดไว้
    difficult_to_refill:
      name: เติมยาก
      description: กระบวนการเติมสินค้าใหม่นั้นยุ่งยากหรือซับซ้อน
    difficult_to_use:
      name: ใช้งานยาก
      description: การใช้งานสินค้าต้องใช้ทักษะหรือความพยายามมากกว่าที่คาดไว้
    difficulty_level:
      name: ระดับความยาก
      description: ความท้าทายที่เกิดจากสินค้านี้ไม่เหมาะสมกับทักษะของผู้ใช้
    dispenser:
      name: ที่กด
      description: กลไกการจ่ายของผลิตภัณฑ์ไม่เป็นที่น่าพอใจ
    doesnt_apply_evenly:
      name: ทาไม่สม่ำเสมอ
      description: ผลิตภัณฑ์มีลักษณะเป็นหย่อมๆ หรือเป็นริ้วๆ ในระหว่างการใช้งาน
    doesnt_blend_well:
      name: ผสมไม่เข้ากัน
      description: ผลิตภัณฑ์นี้ไม่สามารถผสมหรือผสานเข้ากับสารหรือพื้นผิวอื่นๆ ได้อย่างราบรื่น
    doesnt_dissolve_well:
      name: ละลายไม่ดี
      description: ผลิตภัณฑ์ดังกล่าวทิ้งคราบหรือก้อนไว้แทนที่จะผสมเข้ากับของเหลวได้อย่างราบรื่น
    doesnt_fit_bed_frame:
      name: ไม่พอดีกับโครงเตียง
      description: ขนาดของที่นอนหรือชุดเครื่องนอนไม่ตรงกับขนาดของโครงเตียงที่ระบุไว้
    doesnt_fit_mattress:
      name: ไม่พอดีกับที่นอน
      description: ขนาดของชุดเครื่องนอนไม่ตรงกับขนาดของที่นอน
    doesnt_fit_phone:
      name: ไม่พอดีกับโทรศัพท์
      description: ขนาดของอุปกรณ์เสริมไม่รองรับโทรศัพท์รุ่นที่ระบุ
    doesnt_fit_tv:
      name: ไม่พอดีกับทีวี
      description: ขนาดหรือฐานยึดของสินค้าไม่เหมาะสมกับโทรทัศน์ของลูกค้า
    doesnt_stay_closed:
      name: ปิดไม่สนิท
      description: กลไกการล็อกหรือตัวยึดไม่สามารถยึดได้อย่างแน่นหนา
    drainage:
      name: การระบายน้ำ
      description: สินค้าไม่สามารถระบายของเหลวออกไปได้อย่างเหมาะสม
    draw_length:
      name: ระยะน้าวสาย
      description: ระยะที่สามารถดึงสายธนูได้นั้นไม่สอดคล้องกับระยะการยืดแขนของนักยิงธนู
    draw_weight:
      name: น้ำหนักน้าวสาย
      description: แรงที่ใช้ในการดึงสายธนูนั้นมากเกินไปหรือน้อยเกินไปสำหรับนักยิงธนู
    dried_out:
      name: แห้ง
      description: ผลิตภัณฑ์สูญเสียความชื้นก่อนกำหนด ส่งผลต่อการใช้งาน
    drying:
      name: ทำให้ผิวแห้ง
      description: ผลิตภัณฑ์ส่งผลให้ผิวหนัง เส้นผม หรือพื้นผิวอื่นๆ แห้งกร้านโดยไม่พึงประสงค์
    drying_speed:
      name: ความเร็วในการแห้ง
      description: ระยะเวลาที่ผลิตภัณฑ์แห้งหรือเซ็ตตัวนั้นช้าหรือเร็วเกินไป
    duplicate_order:
      name: คำสั่งซื้อซ้ำซ้อน
      description: ลูกค้าสั่งซื้อสินค้าชิ้นนี้ซ้ำโดยไม่ได้ตั้งใจ
    duration:
      name: ระยะเวลา
      description: เวลาที่กำหนดไว้สำหรับบริการ กิจกรรม หรือช่วงเวลาการเข้าถึงนั้นสั้นหรือยาวกว่าที่คาดไว้
    dye_transferred:
      name: สีตกใส่
      description: สีจากสินค้าซึมไปติดบนเสื้อผ้าหรือพื้นผิวอื่นๆ
    edition:
      name: รุ่น
      description: รุ่นหรือเวอร์ชันที่ระบุของผลิตภัณฑ์ไม่ตรงกับความต้องการของลูกค้า
    effectiveness:
      name: ประสิทธิภาพ
      description: ผลิตภัณฑ์ไม่สามารถทำงานตามหน้าที่หลักหรือให้ประโยชน์ตามที่สัญญาไว้ได้ตามมาตรฐานที่คาดหวัง
    efficiency:
      name: ประสิทธิภาพ
      description: ปริมาณเชื้อเพลิงหรือพลังงานที่ตัวสินค้าใช้ในการทำงานนั้นมากกว่าที่คาดไว้
    embellishment_fell_off:
      name: ของตกแต่งหลุด
      description: ชิ้นส่วนตกแต่งหลุดออกจากตัวสินค้า
    energy_efficiency:
      name: ประสิทธิภาพการใช้พลังงาน
      description: ปริมาณพลังงานที่ตัวสินค้าใช้นั้นมากเกินไปเมื่อเทียบกับประสิทธิภาพที่ได้รับ
    eye_strain:
      name: ปวดตา
      description: การใช้ผลิตภัณฑ์นี้ทำให้เกิดอาการเมื่อยล้าทางสายตาหรือรู้สึกไม่สบายตา
    fabric:
      name: เนื้อผ้า
      description: องค์ประกอบ คุณสมบัติ หรือสัมผัสของเนื้อผ้าไม่ตรงกับความต้องการของลูกค้า
    fails_to_detect_threats:
      name: ตรวจไม่พบภัยคุกคาม
      description: อุปกรณ์รักษาความปลอดภัยหรืออุปกรณ์ป้องกันภัยไม่สามารถระบุอันตรายได้ตามที่คาดไว้
    fastening:
      name: ตัวยึด
      description: วิธีการยึดหรือปิดตัวสินค้าทำได้ยากหรือไม่ปลอดภัย
    fat_content:
      name: ปริมาณไขมัน
      description: เปอร์เซ็นต์ไขมันในผลิตภัณฑ์อาหารไม่ตรงกับความต้องการด้านโภชนาการของลูกค้า
    field_of_view:
      name: ขอบเขตการมองเห็น
      description: พื้นที่การมองเห็นที่ได้จากอุปกรณ์ออปติคัลนั้นไม่เหมาะสมกับการใช้งานตามวัตถุประสงค์
    field_of_view_too_narrow:
      name: มุมมองแคบเกินไป
      description: พื้นที่ที่มองเห็นได้ผ่านเลนส์หรือหน้ากากนั้นแคบเกินไป
    filtration_class:
      name: ระดับการกรอง
      description: ประสิทธิภาพการกรองอนุภาคหรือมาตรฐานของตัวกรองไม่เป็นไปตามข้อกำหนด
    finish:
      name: ลักษณะพื้นผิว
      description: ลักษณะพื้นผิวหรือการเคลือบผิวขั้นสุดท้ายของสินค้า ทำให้สินค้าไม่เหมาะสมกับการใช้งานหรือสภาพแวดล้อมที่ลูกค้าต้องการ
    firmness:
      name: ความแน่น
      description: ระดับความแข็งหรือความยืดหยุ่นของสินค้าไม่เป็นไปตามที่คาดไว้
    fit:
      name: ความพอดี
      description: ลักษณะการวางสินค้าบน ใน หรือแนบกับร่างกายหรืออุปกรณ์อื่นๆ นั้นไม่ถูกต้อง
    fitment:
      name: ความพอดีในการติดตั้ง
      description: สินค้าไม่เข้ากันกับรุ่นหรือชิ้นส่วนที่ต้องการติดตั้งอย่างถูกต้อง
    flange_size:
      name: ขนาดหน้าแปลน
      description: เส้นผ่านศูนย์กลางของช่องเปิดของอุปกรณ์ปั๊มนมมีขนาดไม่เหมาะสมกับผู้ใช้
        ซึ่งอาจส่งผลต่อความสะดวกสบายหรือการบีบน้ำนม
    flavor:
      name: รสชาติ
      description: รสชาติที่ระบุไว้บนฉลากของสินค้าไม่ตรงกับรสชาติที่ลูกค้าต้องการ
    flex:
      name: ความยืดหยุ่น
      description: ลักษณะการโค้งงอและการคืนตัวของสินค้าไม่เหมาะสมกับความต้องการหรือสไตล์ของผู้ใช้
    flexibility:
      name: ความยืดหยุ่น
      description: ความสามารถในการโค้งงอหรือยืดหยุ่นภายใต้แรงกดของสินค้าไม่เป็นไปตามที่คาดไว้
    flight_distance:
      name: ระยะการบิน
      description: ระยะทางที่ตัวสินค้าเคลื่อนที่ไปในอากาศนั้นไม่เหมาะสมกับกิจกรรมหรือสภาพแวดล้อมที่ตั้งใจไว้
    flow_rate:
      name: อัตราการไหล
      description: ความเร็วที่ของเหลวหรืออากาศเคลื่อนที่ผ่านสินค้านี้เร็วหรือช้ากว่าที่ลูกค้าต้องการ
    footbed_too_deep:
      name: พื้นรองรับฝ่าเท้าลึกเกินไป
      description: บริเวณที่เว้าเข้าไปสำหรับวางเท้ามีความลึกมากเกินไป
    footbed_too_narrow:
      name: พื้นรองรับฝ่าเท้าแคบเกินไป
      description: ความกว้างของพื้นรองเท้าไม่เพียงพอสำหรับเท้าของลูกค้า
    footbed_too_shallow:
      name: พื้นรองรับฝ่าเท้าตื้นเกินไป
      description: บริเวณที่เว้าเข้าไปสำหรับวางเท้ามีความลึกไม่เพียงพอ
    footbed_too_wide:
      name: พื้นรองรับฝ่าเท้ากว้างเกินไป
      description: พื้นรองเท้ากว้างเกินไป ทำให้สวมใส่ไม่กระชับ
    format:
      name: รูปแบบ
      description: รูปแบบหรือโครงสร้างทางกายภาพของสินค้าไม่เหมาะสมกับความต้องการของผู้ใช้
    frame_color:
      name: สีของกรอบ
      description: สีของกรอบไม่ตรงกับความชอบด้านสุนทรียศาสตร์ของลูกค้า
    frame_crooked:
      name: กรอบเบี้ยว
      description: โครงสร้างของสินค้าบิดเบี้ยวหรือผิดรูป
    frame_needs_adjustments:
      name: กรอบต้องปรับแต่ง
      description: สินค้าจำเป็นต้องได้รับการติดตั้งหรือดัดแปลงโดยช่างผู้เชี่ยวชาญเพื่อให้สวมใส่ได้อย่างถูกต้อง
    frame_too_small:
      name: กรอบเล็กเกินไป
      description: ขนาดของกรอบแว่นตาไม่พอดีกับรูปหน้าของลูกค้า
    frequency:
      name: ความถี่
      description: อัตราการสั่นหรือการส่งสัญญาณไม่ตรงกับอุปกรณ์หรือความต้องการของลูกค้า
    fuel_capacity:
      name: ความจุเชื้อเพลิง
      description: ปริมาณเชื้อเพลิงที่อุปกรณ์สามารถบรรจุได้ไม่เพียงพอต่อความต้องการของลูกค้า
    fuel_efficiency:
      name: ประสิทธิภาพการใช้เชื้อเพลิง
      description: อัตราการใช้เชื้อเพลิงของอุปกรณ์สูงกว่าที่ต้องการ
    gauge:
      name: เกจ
      description: ความหนาหรือเส้นผ่านศูนย์กลางที่ระบุไว้ของสินค้าไม่เหมาะสมกับการใช้งานที่ต้องการ
    grind_size:
      name: ขนาดบด
      description: ความละเอียดของผลิตภัณฑ์ที่บดแล้วไม่เหมาะสมกับวิธีการเตรียมที่ตั้งใจไว้
    grip:
      name: การยึดเกาะ
      description: พื้นผิวของสินค้าชิ้นไม่เอื้อต่อการควบคุมหรือความมั่นคงที่ลูกค้าต้องการ
    grit:
      name: ความหยาบ
      description: ความหยาบของพื้นผิวขัดไม่ตรงตามความต้องการของลูกค้า
    hard_to_inflate:
      name: สูบลมยาก
      description: วาล์วหรือกลไกทำให้การเติมอากาศเข้าไปในสินค้าทำได้ยาก
    hardness:
      name: ความแข็ง
      description: ความต้านทานของวัสดุต่อแรงอัดหรือแรงกดบนพื้นผิวไม่เป็นไปตามที่คาดไว้
    head_size:
      name: ขนาดหัว
      description: ขนาดของหัวสินค้าไม่เหมาะสมกับขนาดหรือพื้นที่ที่ต้องการใช้งาน
    head_support:
      name: การรองรับศีรษะ
      description: สินค้าให้การทรงตัว การจัดตำแหน่ง หรือความสบายที่ไม่เพียงพอสำหรับศีรษะและลำคอ
    heat:
      name: ความร้อน
      description: ระดับความเผ็ดและจัดจ้านของอาหารไม่เป็นไปตามที่คาดหวัง
    heat_resistance:
      name: การทนความร้อน
      description: สินค้าชิ้นไม่สามารถทนต่ออุณหภูมิสูงได้ตามที่ต้องการ
    heel_too_high:
      name: ส้นสูงเกินไป
      description: ความสูงของส้นรองเท้าสูงเกินไป ทำให้ไม่สบายเท้าและไม่เป็นที่ชื่นชอบ
    heel_too_low:
      name: ส้นเตี้ยเกินไป
      description: ความสูงของส้นรองเท้ามีความสูงที่เตี้ยเกินความต้องการของลูกค้า
    heel_too_thick:
      name: ส้นหนาเกินไป
      description: ส้นรองเท้ากว้างหรือหนาเกินไป
    heel_too_thin:
      name: ส้นบางเกินไป
      description: ส้นรองเท้ามีลักษณะกว้างเกินไป ขาดความมั่นคงหรือเนื้อสัมผัสที่แข็งแรงเพียงพอ
    height:
      name: ความสูง
      description: ขนาดความสูงของสินค้าไม่เหมาะสมกับพื้นที่หรือความต้องการด้านการใช้งานของลูกค้า
    horsepower:
      name: แรงม้า
      description: กำลังที่มอเตอร์หรือเครื่องยนต์ผลิตได้ไม่ตรงตามความคาดหวังด้านประสิทธิภาพตามพิกัดกำลังของมอเตอร์หรือเครื่องยนต์นี้
    incompatible:
      name: เข้ากันไม่ได้
      description: สินค้าชิ้นนี้ไม่สามารถใช้งานร่วมกับหรือติดตั้งกับอุปกรณ์ เครื่องมือ
        หรือระบบที่มีอยู่เดิมของลูกค้าได้
    ingredients:
      name: ส่วนผสม
      description: ส่วนประกอบของผลิตภัณฑ์มีส่วนผสมที่ลูกค้าต้องการหลีกเลี่ยง
    inscription:
      name: ข้อความสลัก
      description: ข้อความที่กำหนดเองหรือการแกะสลักบนตัวสินค้าไม่ถูกต้องหรือทำได้ไม่ดี
    inseam_too_long:
      name: ความยาวจากเป้าถึงปลายขายาวเกินไป
      description: ขนาดความยาวช่วงขาด้านในของเสื้อผ้าเกินกว่าความยาวขาของลูกค้า
    inseam_too_short:
      name: ความยาวจากเป้าถึงปลายขาสั้นเกินไป
      description: ขนาดความยาวช่วงขาด้านในของเสื้อผ้าไม่เพียงพอกับความยาวขาของลูกค้า
    installation:
      name: การติดตั้ง
      description: ขั้นตอนการติดตั้งหรือยึดสินค้ายากหรือซับซ้อนกว่าที่คาดไว้
    instrument:
      name: เครื่องมือ
      description: เครื่องดนตรีเฉพาะที่สินค้าชิ้นนี้ออกแบบมาให้ใช้ ไม่ตรงกับอุปกรณ์ของลูกค้า
    intensity:
      name: ความเข้ม
      description: ระดับความแรงของสัญญาณที่อุปกรณ์ส่งออกมาหรือผลกระทบต่อประสาทสัมผัสไม่เหมาะสมกับความต้องการของผู้ใช้
    inverter_type:
      name: ประเภทอินเวอร์เตอร์
      description: เทคโนโลยีการแปลงพลังงานไฟฟ้าที่ระบุไม่ตรงกับความต้องการของลูกค้า
    item_not_as_described:
      name: สินค้าไม่ตรงตามคำอธิบาย
      description: สินค้าไม่ตรงกับคำอธิบาย รูปภาพ หรือข้อมูลจำเพาะที่ระบุไว้ในรายการสินค้า
    lacks_required_certification:
      name: ไม่มีใบรับรองที่กำหนด
      description: ผลิตภัณฑ์นี้ไม่ได้รับการอนุมัติตามข้อกำหนดทางกฎหมายหรือเป็นไปตามมาตรฐานที่จำเป็น
    lacks_security_features:
      name: ไม่มีฟีเจอร์ความปลอดภัย
      description: ผลิตภัณฑ์ไม่มีกลไกด้านความปลอดภัยหรือระบบป้องกันการโจรกรรมตามที่คาดหวังไว้
    language:
      name: ภาษา
      description: ข้อความหรือเสียงอยู่ในภาษาที่ไม่ตรงกับความต้องการของลูกค้า
    laptop_fit:
      name: ความพอดีกับแล็ปท็อป
      description: ช่องหรือซองใส่แล็ปท็อปนั้นมีขนาดไม่พอดีกับแล็ปท็อปของลูกค้า
    lather:
      name: ฟอง
      description: ปริมาณโฟมที่ผลิตภัณฑ์ผลิตได้ไม่เพียงพอต่อความต้องการของลูกค้า
    legs_too_loose:
      name: ช่วงขาหลวมเกินไป
      description: ส่วนขาของเสื้อผ้าชิ้นนี้ไม่กระชับพอดีตัว
    legs_too_tight:
      name: ช่วงขารัดเกินไป
      description: ส่วนขาของเสื้อผ้าชิ้นนี้จำกัดการเคลื่อนไหวหรือความสบาย
    length:
      name: ความยาว
      description: ขนาดของสินค้าที่วัดได้นั้นยาวหรือสั้นเกินไปสำหรับความต้องการของลูกค้า
    lens_color:
      name: สีเลนส์
      description: สีหรือเฉดสีของเลนส์แว่นตาไม่เหมาะสมกับสภาพการมองเห็นหรือกิจกรรมที่ต้องการใช้งาน
    lens_popped_out_of_frame:
      name: เลนส์หลุดออกจากกรอบ
      description: เลนส์ออปติคอลหลุดออกจากตัวเรือน
    lens_scratched:
      name: เลนส์เป็นรอย
      description: พื้นผิวเลนส์มีร่องรอยที่มองเห็นได้ ซึ่งส่งผลต่อการมองเห็นหรือลักษณะที่ปรากฏ
    lifting_capacity:
      name: ความสามารถในการยก
      description: อุปกรณ์นี้สามารถยกน้ำหนักได้สูงสุดไม่เพียงพอ
    light_spectrum:
      name: สเปกตรัมแสง
      description: ความยาวคลื่นแสงที่ปล่อยออกมาไม่ตรงตามความต้องการของลูกค้า
    light_temperature:
      name: อุณหภูมิสีของแสง
      description: อุณหภูมิสีของแสงที่เปล่งออกมา (โทนอุ่นหรือโทนเย็น) ไม่ตรงกับความต้องการของลูกค้า
    lock:
      name: ตัวล็อก
      description: ระบบล็อคแบบใช้กุญแจและรหัสในตัวชำรุดหรือทำงานไม่เป็นไปตามที่คาดหวัง
    lock_type:
      name: ประเภทตัวล็อก
      description: กลไกเฉพาะที่ใช้ในการยึดสินค้าไม่ตรงกับความต้องการด้านความสะดวกสบายหรือความปลอดภัยของลูกค้า
    logo_peeling:
      name: โลโก้ลอก
      description: โลโก้หรือตราสินค้าที่พิมพ์หรือติดลงบนสินค้ากำลังหลุดลอกออก
    longevity:
      name: อายุการใช้งาน
      description: ระยะเวลาที่ผลิตภัณฑ์ออกฤทธิ์นั้นสั้นหรือยาวกว่าที่คาดไว้
    loose_around_ankle:
      name: หลวมช่วงข้อเท้า
      description: เสื้อผ้าชิ้นนี้ไม่กระชับบริเวณข้อเท้า
    loose_around_thighs:
      name: หลวมช่วงต้นขา
      description: เสื้อผ้าไม่กระชับบริเวณต้นขา
    loose_seams:
      name: ตะเข็บหลุดลุ่ย
      description: รอยเย็บไม่แน่นหนา แสดงให้เห็นถึงการตัดเย็บที่ไม่ได้มาตรฐาน
    loose_threads:
      name: ด้ายหลุดลุ่ย
      description: สินค้ามีรอยหลุดลุ่ยหรือปลายด้ายที่เห็นได้ชัด ซึ่งบ่งบอกถึงคุณภาพการผลิตที่ไม่ดี
    low_light_performance:
      name: ประสิทธิภาพในที่แสงน้อย
      description: อุปกรณถ่ายภาพหรือวิดีโอได้ภาพคุณภาพต่ำในสภาพแสงน้อย
    low_resolution:
      name: ความละเอียดต่ำ
      description: ระดับรายละเอียดหรือความชัดเจนของผลลัพธ์ทางภาพไม่เพียงพอ
    lubrication:
      name: การหล่อลื่น
      description: ผลิตภัณฑ์แห้งเกินไปหรือลื่นเกินไปจนใช้งานไม่ได้อย่างเหมาะสม
    magnification:
      name: กำลังขยาย
      description: ระดับการขยายภาพที่สินค้าทำได้ไม่เหมาะสมกับความต้องการของลูกค้า
    magnification_too_strong:
      name: กำลังขยายมากเกินไป
      description: ระดับการขยายที่ออกมามากเกินไป ทำให้เกิดการบิดเบี้ยวหรือความไม่สบายตา
    magnification_too_weak:
      name: กำลังขยายน้อยเกินไป
      description: ระดับการขยายภาพที่ออกมาไม่เพียงพอต่อความต้องการด้านการมองเห็นของลูกค้า
    maneuverability:
      name: ความคล่องตัวในการควบคุม
      description: ความง่ายในการเคลื่อนย้าย ควบคุมทิศทาง หรือจับถือสินค้าไม่ตรงกับความต้องการของลูกค้า
    material:
      name: วัสดุ
      description: วัสดุทางกายภาพหรือเนื้อผ้าที่ใช้ทำสินค้าไม่ตรงกับความต้องการของลูกค้าในด้านสัมผัส
        ความทนทาน หรือส่วนประกอบ
    material_not_breathable:
      name: เนื้อผ้าระบายอากาศได้ไม่ดี
      description: เนื้อผ้าไม่เอื้อต่อการระบายอากาศอย่างเพียงพอ
    material_not_durable:
      name: วัสดุไม่ทนทาน
      description: เนื้อผ้าหรือวัสดุนั้นขาดความทนทานหรือความคงทนต่อการสึกหรอตามที่คาดหวังไว้
    material_too_see_through:
      name: เนื้อผ้าบางเกินไป
      description: เนื้อผ้าของชุดนี้บางกว่าที่คิดไว้
    material_too_stiff:
      name: เนื้อผ้าแข็งเกินไป
      description: เนื้อผ้าขาดความยืดหยุ่นและความนุ่มนวลตามที่ต้องการ
    material_too_stretchy:
      name: เนื้อผ้ายืดเกินไป
      description: เนื้อผ้ามีความยืดหยุ่นมากเกินไป ทำให้เสียทรงที่ต้องการ
    mesh_size:
      name: ขนาดตาข่าย
      description: ช่องว่างระหว่างช่องตาข่ายหรือตะแกรงนั้นกว้างหรือแคบเกินไป
    messy:
      name: เลอะเทอะ
      description: การใช้ผลิตภัณฑ์ดังกล่าวทำให้เกิดคราบเลอะเทอะโดยไม่ได้ตั้งใจ หรือทิ้งคราบตกค้างที่ไม่พึงประสงค์ไว้
    method:
      name: วิธีการ
      description: เทคนิคการใช้งานผลิตภัณฑ์ไม่เหมาะสมกับลูกค้า
    metrics_supported:
      name: ตัวชี้วัดที่รองรับ
      description: อุปกรณ์นี้ไม่ได้ติดตามหรือแสดงข้อมูลเฉพาะที่ลูกค้าต้องการ
    mileage:
      name: ระยะการใช้งาน
      description: อัตราการสิ้นเปลืองน้ำมันเชื้อเพลิงหรือประวัติการใช้งานของยานพาหนะไม่เป็นไปตามที่คาดหวัง
    missing_desired_features:
      name: ไม่มีฟีเจอร์ที่ต้องการ
      description: ผลิตภัณฑ์ขาดฟังก์ชันการทำงานหรือคุณสมบัติเฉพาะที่ลูกค้าคาดหวัง
    mixing_performance:
      name: ประสิทธิภาพในการผสม
      description: อุปกรณ์ไม่สามารถผสมส่วนผสมต่างๆ ได้ตามที่คาดหวัง
    mounting_difficulty:
      name: ติดตั้งยาก
      description: กระบวนการติดตั้งตัวสินค้าเข้ากับผนังหรือพื้นผิวอื่นนั้นยากเกินไป
        ซับซ้อนเกินไป หรือคำแนะนำไม่ชัดเจน
    movement:
      name: การเคลื่อนไหว
      description: การเคลื่อนไหวอัตโนมัติหรือการเคลื่อนไหวแบบพาสซีฟของอุปกรณ์นั้นเร็วเกินไป
        ช้าเกินไป หรือไม่เป็นที่น่าพอใจ
    narration:
      name: การบรรยาย
      description: น้ำเสียง สไตล์ หรือรูปแบบการบรรยายเสียงนั้นไม่น่าดึงดูดใจสำหรับลูกค้า
    nicotine_strength:
      name: ความแรงของนิโคติน
      description: ปริมาณนิโคตินในผลิตภัณฑ์นั้นสูงหรือต่ำเกินไปสำหรับลูกค้า
    night_vision:
      name: การมองเห็นในเวลากลางคืน
      description: ภาพที่ได้จากโหมดอินฟราเรดหรือโหมดไร้แสงของอุปกรณ์นั้นไม่ชัดเจนหรือไม่สามารถใช้งานได้อย่างมีประสิทธิภาพ
    no_pockets:
      name: ไม่มีกระเป๋า
      description: สินค้าไม่มีช่องเก็บของตามที่ลูกค้าคาดหวัง
    noise_reduction:
      name: การลดเสียงรบกวน
      description: สินค้าไม่สามารถกันหรือลดเสียงรบกวนได้อย่างมีประสิทธิภาพตามที่ลูกค้าคาดหวัง
    not_dishwasher_safe:
      name: ไม่สามารถใช้กับเครื่องล้างจานได้
      description: สินค้าต้องซักด้วยมือ ซึ่งไม่สะดวกสำหรับลูกค้า
    not_enough_support:
      name: รองรับได้ไม่ดีพอ
      description: สินค้าไม่มีการเสริมแกร่งโครงสร้างที่เพียงพอ
    not_pet_friendly:
      name: ไม่เป็นมิตรกับสัตว์เลี้ยง
      description: ผลิตภัณฑ์มีส่วนผสมหรือคุณสมบัติที่เป็นอันตรายหรือไม่เหมาะสมสำหรับสัตว์เลี้ยง
    not_suitable_for_hair_type:
      name: ไม่เหมาะกับสภาพเส้นผม
      description: ผลิตภัณฑ์ไม่มีประสิทธิภาพหรือก่อให้เกิดผลเสียต่อเส้นผมของผู้ใช้
    not_suitable_for_skin_type:
      name: ไม่เหมาะกับสภาพผิว
      description: ผลิตภัณฑ์ก่อให้เกิดการระคายเคืองหรือไม่ได้ผลกับผิวของผู้ใช้
    not_suitable_for_terrain:
      name: ไม่เหมาะกับสภาพพื้นผิว
      description: สินค้าใช้งานได้ไม่ดีเท่าที่ควรบนพื้นผิวที่ลูกค้าต้องการใช้งาน
    nozzle:
      name: หัวฉีด
      description: กลไกการจ่ายของผลิตภัณฑ์ไม่เป็นที่น่าพอใจ
    odor:
      name: กลิ่น
      description: ผลิตภัณฑ์มีกลิ่นไม่พึงประสงค์หรือกลิ่นที่ไม่คาดคิด
    odor_control:
      name: การควบคุมกลิ่น
      description: ความสามารถในการกักเก็บหรือกำจัดกลิ่นของผลิตภัณฑ์ไม่เพียงพอต่อความต้องการของลูกค้า
    opacity:
      name: ความทึบแสง
      description: ระดับความโปร่งใสหรือความโปร่งแสงไม่ตรงกับความต้องการของลูกค้า
    operating_noise:
      name: เสียงดังขณะทำงาน
      description: ระหว่างการใช้งานอุปกรณ์ มีเสียงรบกวนที่เกิดขึ้นโดยบังเอิญมากเกินไปหรือก่อให้เกิดความรบกวน
    optic_didnt_fit:
      name: เลนส์ไม่พอดี
      description: อุปกรณ์เสริมออปติคัลไม่สามารถติดตั้งเข้ากับอุปกรณ์นี้ได้อย่างถูกต้อง
    ordered_multiple:
      name: สั่งซื้อหลายชิ้น
      description: ลูกค้าซื้อสินค้าหลายรายการโดยตั้งใจจะเก็บไว้เพียงรายการเดียว
    ordered_wrong_format:
      name: สั่งซื้อผิดรูปแบบ
      description: ลูกค้าเลือกตัวเลือกผลิตภัณฑ์หรือการกำหนดค่าที่ไม่ถูกต้อง
    ordered_wrong_item:
      name: สั่งซื้อผิดรายการ
      description: ลูกค้าสั่งซื้อสินค้าผิดประเภทโดยไม่ตั้งใจ
    organization:
      name: องค์กร
      description: การจัดวางพื้นที่จัดเก็บหรือสิ่งอำนวยความสะดวกต่างๆ ไม่ได้เอื้อต่อการใช้งานหรือการเข้าถึงได้ง่าย
    other_reason:
      name: อื่น ๆ
      description: เหตุผลในการส่งคืนสินค้าไม่ตรงกับหมวดหมู่ใดๆ ที่กำหนดไว้ล่วงหน้า
    packaging_not_sealed:
      name: บรรจุภัณฑ์ไม่ได้ซีล
      description: สินค้าที่ได้รับมีบรรจุภัณฑ์ที่เปิดอยู่หรือถูกดัดแปลงแก้ไข
    padding:
      name: การบุรอง
      description: ปริมาณหรือตำแหน่งของวัสดุอ่อนนุ่มที่ใช้ปกป้องนั้นไม่เป็นไปตามที่คาดไว้
    padding_not_removable:
      name: ฟองน้ำถอดไม่ได้
      description: แผ่นรองนั่งถูกติดไว้ถาวร ในขณะที่ลูกค้าต้องการแผ่นรองนั่งแบบถอดได้
    painful:
      name: ใส่แล้วเจ็บ
      description: การใช้ผลิตภัณฑ์นี้ก่อให้เกิดอาการปวดเมื่อยตามร่างกายโดยทั่วไปหรือปวดเมื่อยอย่างรุนแรง
    pattern:
      name: ลวดลาย
      description: ลวดลายหรือรูปแบบการตกแต่งที่ซ้ำกันบนสินค้าไม่ตรงกับความชอบด้านสุนทรียศาสตร์ของลูกค้า
    performance:
      name: ประสิทธิภาพ
      description: การควบคุมหรือการตอบสนองโดยรวมของอุปกรณ์ระหว่างการใช้งานไม่เป็นไปตามที่คาดหวัง
    pet_didnt_like:
      name: สัตว์เลี้ยงไม่ชอบ
      description: สัตว์ของลูกค้าแสดงให้เห็นอย่างชัดเจนว่าไม่ชอบผลิตภัณฑ์นั้น หรือใช้ผลิตภัณฑ์นั้นอย่างไม่เต็มใจ
    pet_refused:
      name: สัตว์เลี้ยงไม่ยอมใช้
      description: สัตว์จะไม่กิน ใช้ หรือเข้าไปยุ่งเกี่ยวกับผลิตภัณฑ์นี้
    piece_count:
      name: จำนวนชิ้น
      description: จำนวนสินค้าที่รวมอยู่ในชุดไม่ตรงกับที่ลูกค้าคาดหวังไว้
    piece_size:
      name: ขนาดชิ้น
      description: ชิ้นส่วนแต่ละชิ้นที่อยู่ในชุดสินค้ามีขนาดใหญ่หรือเล็กเกินไปสำหรับการใช้งานตามที่ตั้งใจไว้
    pigmentation:
      name: เม็ดสี
      description: ความเข้มหรือความหนาแน่นของสีในผลิตภัณฑ์เครื่องสำอางไม่เป็นที่น่าพอใจ
    pitch:
      name: ระดับเสียง
      description: โทนเสียงหรือความถี่ของเสียงที่เกิดขึ้นไม่เหมาะสม
    plate_type:
      name: ประเภทแผ่น
      description: วัสดุหรือสารเคลือบของจานไม่ตรงกับความต้องการของลูกค้า
    pockets_too_deep:
      name: กระเป๋าลึกเกินไป
      description: ความลึกของช่องเก็บของทำให้หยิบสิ่งของออกมาได้ยาก
    pockets_too_shallow:
      name: กระเป๋าตื้นเกินไป
      description: ความลึกของช่องเก็บของไม่เพียงพอที่จะเก็บสิ่งของได้อย่างปลอดภัย
    polarization:
      name: โพลาไรซ์
      description: คุณสมบัติลดแสงสะท้อนของเลนส์ไม่มีอยู่ หรือไม่เป็นที่ต้องการ
    poor_stitching:
      name: การเย็บไม่ดี
      description: คุณภาพการเย็บดูด้อยมาตรฐาน ไม่สม่ำเสมอ หรือคดงอ ซึ่งบ่งชี้ถึงข้อบกพร่องในกระบวนการผลิต
    portion_size:
      name: ขนาดหนึ่งหน่วยบริโภค
      description: ปริมาณอาหารที่จัดเตรียมในแต่ละเสิร์ฟน้อยเกินไปหรือมากเกินไป
    power_output:
      name: กำลังขับ
      description: พลังงานที่อุปกรณ์ส่งออกมาไม่เพียงพอหรือมากเกินไปสำหรับงานที่ต้องการใช้งาน
    power_source:
      name: แหล่งพลังงาน
      description: วิธีการจ่ายไฟให้กับอุปกรณ์ไม่สะดวกหรือไม่เหมาะสมกับลูกค้า
    prescription:
      name: ค่าสายตา
      description: กำลังหักเหของเลนส์หรือสินค้าไม่ตรงกับความต้องการด้านสายตาของลูกค้า
    prescription_processed_incorrectly:
      name: ค่าสายตาไม่ถูกต้อง
      description: ใบสั่งแพทย์เฉพาะบุคคลที่นำไปใช้กับสินค้าไม่ตรงกับข้อกำหนดในคำสั่งซื้อของลูกค้า
    presentation:
      name: การนำเสนอ
      description: วิธีการจัดวางและแสดงสินค้าหรือสิ่งของภายในนั้นไม่เป็นที่น่าพอใจ
    pressure:
      name: แรงดัน
      description: แรงดันของกระแสไหลออกของตัวสินค้าสูงเกินไปหรือต่ำเกินไป
    pressure_points:
      name: จุดกดทับ
      description: อุปกรณ์นี้ใช้แรงกดที่เน้นเฉพาะจุดและสร้างความไม่สบายตัวในบริเวณต่างๆ
        ของร่างกาย
    pressure_rating:
      name: พิกัดแรงดัน
      description: แรงดันสูงสุดที่สินค้าสามารถทนหรือสร้างได้นั้นไม่เหมาะสมกับการใช้งาน
    print_quality:
      name: คุณภาพการพิมพ์
      description: งานพิมพ์ที่ได้มีข้อบกพร่องทางด้านภาพหรือโครงสร้าง เช่น ความคมชัดต่ำ
        สีไม่ถูกต้อง พื้นผิวไม่เรียบ หรือการยึดเกาะระหว่างชั้นไม่ดี
    printing:
      name: การพิมพ์
      description: ข้อความ ภาพ หรือลวดลายที่พิมพ์บนผลิตภัณฑ์มีข้อบกพร่อง จัดวางไม่ตรง
        หรือไม่สมบูรณ์
    product_leaks:
      name: สินค้ารั่วซึม
      description: ภาชนะหรือสินค้านั้นไม่สามารถบรรจุสิ่งของภายในได้อย่างเหมาะสม
    product_overheats:
      name: สินค้าร้อนเกินไป
      description: อุปกรณ์มีอุณหภูมิสูงเกินไปจนไม่ปลอดภัยหรือรู้สึกไม่สบายขณะใช้งาน
    programming:
      name: การเขียนโปรแกรม
      description: ขั้นตอนการกำหนดค่าโมดูลอิเล็กทรอนิกส์ให้เข้ากับระบบเฉพาะซับซ้อนเกินไป
    protection:
      name: การป้องกัน
      description: สินค้าไม่สามารถป้องกันหรือให้ความปลอดภัยจากแรงกระแทกหรือสภาพแวดล้อมได้อย่างเพียงพอ
    provider_unavailable:
      name: ผู้ให้บริการไม่พร้อมใช้งาน
      description: ผู้ให้บริการไม่สามารถดำเนินการตามคำขอได้ในเวลาหรือสถานที่ที่ต้องการ
    pulls_in_fabric:
      name: เนื้อผ้าเป็นรอยเกี่ยว
      description: วัสดุไปเกี่ยวหรือทำให้เส้นด้ายหลุดลุ่ยระหว่างการใช้งาน
    quality:
      name: คุณภาพ
      description: คุณภาพโดยรวมหรือฝีมือการผลิตของสินค้าชิ้นนี้ไม่เป็นไปตามที่คาดหวัง
    quantity:
      name: จำนวน
      description: ปริมาณสินค้าที่ได้รับน้อยกว่าหรือมากกว่าที่ลูกค้าคาดหวังไว้
    range:
      name: ระยะ
      description: ระยะทางที่อุปกรณ์สามารถใช้งานหรือเคลื่อนที่ได้ไม่เพียงพอต่อความต้องการของลูกค้า
    razor_type:
      name: ประเภทมีดโกน
      description: รูปแบบหรือลักษณะของใบมีดไม่ตรงกับความต้องการในการโกนหนวดของลูกค้า
    reaction:
      name: อาการแพ้
      description: ผลิตภัณฑ์ดังกล่าวทำให้เกิดปฏิกิริยาที่ไม่พึงประสงค์หรือการระคายเคืองต่อผิวหนัง
    readability:
      name: ความสามารถในการอ่าน
      description: ข้อความหรือข้อมูลบนสินค้าชิ้นนั้นมองเห็นหรือตีความได้ยาก
    realism:
      name: ความสมจริง
      description: รูปลักษณ์หรือการทำงานไม่ได้เลียนแบบความเป็นจริงได้อย่างน่าเชื่อถือเพียงพอ
    received_the_wrong_item:
      name: ได้รับสินค้าผิดชิ้น
      description: ลูกค้าได้รับสินค้าที่แตกต่างจากที่สั่งซื้อหรือคาดหวังไว้
    recoil:
      name: แรงสะท้อนกลับ
      description: การเคลื่อนที่ถอยหลังหรือการดีดของอุปกรณ์นั้นแรงเกินกว่าที่ลูกค้าจะรับมือได้อย่างสะดวกสบาย
    refraction:
      name: การหักเหของแสง
      description: การหักเหของแสงโดยอุปกรณ์ทางแสงไม่ได้ก่อให้เกิดผลทางภาพที่ต้องการ
    region:
      name: ภูมิภาค
      description: บริการหรือผลิตภัณฑ์นั้นถูกจำกัดอยู่ในพื้นที่ทางภูมิศาสตร์ที่แตกต่างจากที่ตั้งของลูกค้า
    residue:
      name: คราบตกค้าง
      description: ผลิตภัณฑ์ดังกล่าวทิ้งคราบหรือสารที่ไม่พึงประสงค์ไว้หลังการใช้งาน
    resistance:
      name: ความต้านทาน
      description: ระดับแรงต้านที่เกิดจากอุปกรณ์ออกกำลังกายนั้นสูงเกินไปหรือต่ำเกินไป
    resolution:
      name: ความละเอียด
      description: ระดับรายละเอียดหรือความคมชัดของผลลัพธ์ทางภาพไม่ตรงตามความคาดหวังของลูกค้า
    responsiveness:
      name: การตอบสนอง
      description: มีความล่าช้าอย่างเห็นได้ชัดหรือไม่มีการตอบสนองต่อการป้อนข้อมูลโดยตรงจากผู้ใช้
    restrictive:
      name: อึดอัด
      description: สินค้าชิ้นนี้จำกัดการเคลื่อนไหวหรือความยืดหยุ่นมากกว่าที่ต้องการ
    results:
      name: ผลลัพธ์
      description: ผลิตภัณฑ์ดังกล่าวไม่ได้ก่อให้เกิดการเปลี่ยนแปลงหรือผลลัพธ์ตามที่คาดหวังหลังจากใช้งานครบตามระยะเวลาที่แนะนำ
    results_display:
      name: การแสดงผลลัพธ์
      description: ผลลัพธ์ที่แสดงบนอุปกรณ์นั้นไม่ชัดเจนหรืออ่านยาก
    results_time:
      name: ระยะเวลาแสดงผล
      description: ระยะเวลาที่ใช้ในการได้ผลลัพธ์นั้นอาจนานกว่าหรือเร็วกว่าที่คาดไว้
    retention:
      name: การกักเก็บ
      description: ความสามารถในการยึดวัตถุให้อยู่กับที่อย่างมั่นคงของผลิตภัณฑ์ชิ้นนี้ไม่เป็นไปตามที่คาดหวัง
    ripeness:
      name: ความสุก
      description: ความสุกงอมของผลผลิตยังไม่ถึงระยะที่เหมาะสมสำหรับการบริโภค
    roast_level:
      name: ระดับการคั่ว
      description: ระดับการคั่วเมล็ดกาแฟไม่ตรงกับรสชาติที่ลูกค้าชื่นชอบ
    rod_action:
      name: แอ็คชันคันเบ็ด
      description: จุดที่คันเบ็ดงอเมื่อรับแรงกดไม่ตรงกับความต้องการของลูกค้า
    rod_power:
      name: พาวเวอร์คันเบ็ด
      description: แรงต้านหรือกำลังยกของคันเบ็ดนั้นเบาหรือหนักเกินไปสำหรับการใช้งานที่ต้องการ
    rubbing:
      name: เสียดสี
      description: สินค้าดังกล่าวทำให้เกิดการเสียดสีหรือระคายเคืองต่อผิวหนังจากการเคลื่อนไหวซ้ำๆ
    sample_method:
      name: วิธีการเก็บตัวอย่าง
      description: กระบวนการเก็บตัวอย่างที่ต้องการนั้นไม่สะดวก ยุ่งยาก หรือซับซ้อน
    sample_type:
      name: ประเภทตัวอย่าง
      description: ชนิดตัวอย่างเฉพาะที่จัดเตรียมให้หรือที่กำหนดนั้น ไม่ตรงกับสิ่งที่ลูกค้าต้องการ
    scale:
      name: สัดส่วน
      description: สัดส่วนหรือความสัมพันธ์ด้านขนาดของสินค้าไม่ตรงกับที่คาดหวัง
    scent:
      name: กลิ่นหอม
      description: กลิ่นของผลิตภัณฑ์ไม่พึงประสงค์หรือไม่ตรงตามที่คาดหวัง
    scheduling_conflict:
      name: ตารางเวลาไม่ตรงกัน
      description: เวลาว่างสำหรับการนัดหมายไม่ตรงกับเวลาที่ลูกค้าสะดวก
    scratched:
      name: มีรอยขีดข่วน
      description: สินค้ามีรอยขีดข่วนหรือรอยถลอกที่พื้นผิว ส่งผลต่อรูปลักษณ์ภายนอก
    seal:
      name: ซีล
      description: ซีลของสินค้าไม่ได้กันอากาศเข้าหรือกันน้ำเข้าตามที่กำหนด
    seams_splitting:
      name: ตะเข็บปริ
      description: รอยเย็บเริ่มหลุดลุ่ยหรือแสดงสัญญาณของการชำรุด
    sensitivity:
      name: ความไว
      description: ผลิตภัณฑ์ตอบสนองต่อสิ่งกระตุ้นได้ง่ายเกินไปหรือช้าเกินไป
    service_area:
      name: พื้นที่ให้บริการ
      description: สถานที่ที่ให้บริการไม่ครอบคลุมที่อยู่ของลูกค้า
    service_unavailable:
      name: ไม่สามารถให้บริการได้
      description: บริการที่ร้องขอไม่มีให้บริการหรือไม่สามารถดำเนินการได้ในพื้นที่หรือบริบทของลูกค้า
    shade:
      name: เฉดสี
      description: ขั้นของสี โทนสี หรือความเข้มของสีไม่เป็นไปตามที่คาดหวัง
    shaft_length:
      name: ความยาวก้าน
      description: ความยาวของแกนหลักหรือตัวเครื่องของสินค้าไม่เหมาะสมกับอุปกรณ์หรือผู้ใช้งานที่ตั้งใจไว้
    shape:
      name: รูปทรง
      description: รูปทรง โครงร่าง หรือรูปทรงเรขาคณิตของสินค้าไม่เหมาะสมกับวัตถุประสงค์หรือความสวยงามที่ต้องการ
    sharpness:
      name: ความคม
      description: คมตัดหรือจุดที่คมของเครื่องมือไม่คมตามระดับที่ต้องการ
    shedding:
      name: ขนร่วง
      description: ผลิตภัณฑ์ดังกล่าวหลุดร่วงเป็นเส้นใยหรืออนุภาคมากเกินไปในระหว่างการใช้งาน
    shelf_life:
      name: อายุการเก็บรักษา
      description: ผลิตภัณฑ์มีระยะเวลาที่ยังคงใช้งานได้หรือคงความสดใหม่ได้ที่สั้นกว่าที่คาดไว้
    side_effects:
      name: ผลข้างเคียง
      description: ผลิตภัณฑ์ดังกล่าวทำให้เกิดผลกระทบที่ไม่พึงประสงค์ต่อร่างกายโดยไม่ตั้งใจ
    size:
      name: ขนาด
      description: สัดส่วนทางกายภาพของผลิตภัณฑ์ไม่ตรงกับความคาดหวังของลูกค้า
    skin_tone:
      name: สีผิว
      description: การเลือกสีให้เข้ากับสีผิวของลูกค้าไม่ถูกต้อง
    sleeves_too_long:
      name: แขนเสื้อยาวเกินไป
      description: ความยาวแขนของเสื้อผ้ายาวเกินกว่าแขนของลูกค้า
    sleeves_too_loose:
      name: แขนเสื้อหลวมเกินไป
      description: แขนเสื้อไม่กระชับพอดีกับแขน
    sleeves_too_short:
      name: แขนเสื้อสั้นเกินไป
      description: ความยาวแขนของเสื้อผ้าสั้นเกินไปสำหรับลูกค้า
    sleeves_too_tight:
      name: แขนเสื้อรัดเกินไป
      description: แขนเสื้อจะจำกัดการเคลื่อนไหวหรือทำให้รู้สึกอึดอัดบริเวณแขน
    slippery:
      name: ลื่น
      description: พื้นผิวขาดการยึดเกาะหรือแรงเสียดทานที่เพียงพอ
    smears:
      name: เป็นคราบ
      description: ผลิตภัณฑ์กระจายตัว เลือนราง หรือเคลื่อนตัวออกจากตำแหน่งที่ควรจะเป็นระหว่างการสวมใส่หรือการใช้งาน
    smudges:
      name: เป็นรอยเปื้อน
      description: ผลิตภัณฑ์นี้ติดไปยังพื้นผิวอื่น หรือเกิดรอยขีดข่วนได้ง่ายเมื่อสัมผัส
        ทำให้เกิดรอยเปื้อน
    softness:
      name: ความนุ่ม
      description: ความหนานุ่มหรือความหรูหราฟุ่มเฟือยที่สัมผัสได้ของสินค้าไม่ตรงกับความต้องการของลูกค้า
    sole_too_thick:
      name: พื้นรองเท้าหนาเกินไป
      description: ชั้นล่างสุดของรองเท้าหนาเกินไป
    sole_too_thin:
      name: พื้นรองเท้าบางเกินไป
      description: ชั้นล่างสุดของรองเท้าขาดการรองรับแรงกระแทกหรือการปกป้องที่เพียงพอ
    sound_level:
      name: ระดับเสียง
      description: เสียงที่เกิดขึ้นไม่ตรงตามระดับเดซิเบลที่กำหนด หรือมาตรฐานประสิทธิภาพที่จำเป็นสำหรับการใช้งาน
    sound_quality:
      name: คุณภาพเสียง
      description: ความคมชัด ความละเอียด หรือโทนเสียงที่ได้ไม่ตรงตามความคาดหวังของลูกค้า
    sourcing:
      name: แหล่งที่มา
      description: แหล่งที่มาหรือความน่าเชื่อถือของวัสดุที่ใช้ในการผลิตสินค้านั้นไม่น่าพอใจ
    speed:
      name: ความเร็ว
      description: อัตราการทำงานหรือการเคลื่อนที่ของสินค้าเร็วหรือช้ากว่าที่ลูกค้าต้องการ
    spin_time:
      name: ระยะเวลาการหมุน
      description: ระยะเวลาที่สินค้ายังเคลื่อนที่อยู่นั้นสั้นกว่าที่คาดไว้
    spout:
      name: พวยกา
      description: การออกแบบกลไกการเททำให้เกิดการหยด การไหล หรือการหกที่ไม่พึงประสงค์
    spray_pattern:
      name: รูปแบบการพ่น
      description: รูปแบบหรือลักษณะการกระจายตัวของละอองสเปรย์ไม่ตรงตามความต้องการของลูกค้า
    squeaks:
      name: มีเสียงดังเอี๊ยด
      description: สินค้านี้ส่งเสียงแหลมสูงที่ไม่พึงประสงค์ขณะใช้งาน
    stability:
      name: ความมั่นคง
      description: สินค้าดังกล่าวโยกเยกหรือไม่มั่นคงเมื่อวางหรือใช้งาน
    stained:
      name: มีคราบเปื้อน
      description: สินค้ามีรอยด่างหรือรอยตำหนิที่ส่งผลต่อรูปลักษณ์ภายนอก
    stains_easily:
      name: เป็นคราบง่าย
      description: วัสดุชนิดนี้ดูดซับและกักเก็บรอยเปื้อนหรือคราบได้ง่าย
    stone_setting:
      name: การฝังอัญมณี
      description: วิธีการติดตั้งหินประดับหรืออัญมณีไม่น่าพอใจหรือไม่มั่นคง
    storage_capacity:
      name: ความจุในการจัดเก็บ
      description: พื้นที่สำหรับจัดเก็บข้อมูลดิจิทัลไม่เพียงพอ
    straps_too_long:
      name: สายยาวเกินไป
      description: สายรัดที่ยาวเกินไปทำให้สวมใส่หรือปรับแต่งได้ไม่เหมาะสม
    straps_too_short:
      name: สายสั้นเกินไป
      description: สายรัดที่ยาวเกินไปทำให้ไม่สามารถปรับขนาดได้อย่างเหมาะสมหรือสวมใส่ได้อย่างสบาย
    straps_too_thick:
      name: สายหนาเกินไป
      description: สายรัดกว้างเกินไปหรือดูเทอะทะ
    straps_too_thin:
      name: สายบางเกินไป
      description: สายรัดมีความกว้างไม่เพียงพอ ทำให้ไม่สามารถสวมใส่ได้สบายและพยุงได้ดี
    strength:
      name: ความแข็งแรง
      description: ความเข้มข้นทางเคมีหรือแรงทางกายภาพของสินค้าไม่เป็นไปตามที่คาดไว้
    stride_length:
      name: ความยาวช่วงก้าว
      description: ความห่างของระยะก้าวของเครื่องเดินวงรีหรือเครื่องจักรนั้นไม่เหมาะสมกับกลไกการเคลื่อนไหวของร่างกายผู้ใช้
    stuffing:
      name: วัสดุที่ใช้ยัดไส้
      description: ปริมาณหรือชนิดของวัสดุอุดฟันไม่เพียงพอหรือทำให้รู้สึกไม่สบาย
    sturdiness:
      name: ความแข็งแรงทนทาน
      description: สินค้าขาดความแข็งแรงทนทานตามที่คาดหวัง รู้สึกบอบบาง อ่อนแอ หรือมีแนวโน้มที่จะงอได้ง่ายภายใต้การใช้งานปกติ
    style:
      name: สไตล์
      description: ดีไซน์ รูปทรง หรือลักษณะทางด้านสุนทรียศาสตร์ของสินค้าไม่ตรงกับรสนิยมส่วนตัวของลูกค้า
    suction:
      name: แรงดูด
      description: ระดับความแรงของสุญญากาศที่เกิดจากอุปกรณ์นี้ไม่เหมาะสมสำหรับการใช้งานตามวัตถุประสงค์
    suction_strength:
      name: แรงดูด
      description: แรงดูดของซีลสุญญากาศนั้นอ่อนเกินไปหรือแรงเกินไปสำหรับการใช้งานที่ต้องการ
    support:
      name: การรองรับ
      description: สินค้าชิ้นนี้ไม่ได้ให้ความช่วยเหลือหรือเสริมความแข็งแรงโครงสร้างให้กับร่างกายอย่างเพียงพอ
    surface_damage:
      name: พื้นผิวเสียหาย
      description: สินค้ามีตำหนิภายนอก เช่น รอยขีดข่วน รอยบุบ รอยแตก หรือความไม่สมบูรณ์อื่นๆ
    sweetness:
      name: ความหวาน
      description: ปริมาณน้ำตาลหรือรสหวานในผลิตภัณฑ์ไม่ตรงกับความชอบของลูกค้า
    tangles_easily:
      name: พันกันง่าย
      description: สินค้าเกิดการพันกันหรือเป็นปมระหว่างการใช้งานบ่อยกว่าที่คาดไว้
    tarnished:
      name: หมอง
      description: พื้นผิวโลหะสูญเสียความเงางามหรือเกิดการเปลี่ยนสี
    taste:
      name: รสชาติ
      description: ลักษณะรสชาติของผลิตภัณฑ์ที่บริโภคได้ไม่ตรงกับความชอบด้านรสชาติของลูกค้า
    temperature:
      name: อุณหภูมิ
      description: ระดับความร้อนหรือความเย็นที่ผลิตหรือรักษาไว้โดยสินค้าชิ้นนี้ไม่ตรงกับความต้องการของลูกค้า
    temperature_range:
      name: ช่วงอุณหภูมิ
      description: ช่วงอุณหภูมิการใช้งานของผลิตภัณฑ์แคบเกินไปสำหรับความต้องการของผู้ใช้
    temperature_rating:
      name: พิกัดอุณหภูมิ
      description: ช่วงอุณหภูมิการทำงานที่ระบุไว้ของผลิตภัณฑ์ไม่เหมาะสมกับสภาพแวดล้อมของลูกค้า
    temperature_regulation:
      name: การควบคุมอุณหภูมิ
      description: วัสดุชนิดนี้กักเก็บความร้อนจากร่างกายมากเกินไป ทำให้ผู้ใช้รู้สึกร้อนเกินไป
    terrain:
      name: สภาพภูมิประเทศ
      description: ลักษณะพื้นผิวหรือสภาพพื้นดินไม่เหมาะสมกับความสามารถของอุปกรณ์
    test_format:
      name: รูปแบบการทดสอบ
      description: รูปแบบการทดสอบหรือผลการทดสอบไม่ตรงกับความต้องการของลูกค้า
    test_method:
      name: วิธีการทดสอบ
      description: ขั้นตอนที่จำเป็นในการใช้ชุดทดสอบไม่ตรงกับความต้องการของลูกค้า
    text_size:
      name: ขนาดตัวอักษร
      description: ขนาดตัวอักษรของข้อความที่พิมพ์หรือแสดงผลนั้นอ่านยาก
    texture:
      name: เนื้อสัมผัส
      description: ลักษณะทางกายภาพหรือส่วนประกอบของผลิตภัณฑ์ไม่ตรงกับความต้องการของลูกค้า
    theme:
      name: ธีม
      description: รายละเอียดหรือรูปแบบของสินค้าไม่ตรงกับสิ่งที่ลูกค้าต้องการ
    thickness:
      name: ความหนา
      description: ความหนาหรือโครงสร้างทางกายภาพของสินค้าดูหนาหรือบางกว่าที่คาดไว้
    tight_around_ankles:
      name: รัดช่วงข้อเท้า
      description: เสื้อผ้าชิ้นนี้รัดแน่นจนรู้สึกไม่สบายบริเวณข้อเท้า
    tight_around_thighs:
      name: รัดช่วงต้นขา
