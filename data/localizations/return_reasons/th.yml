    too_small:
      name: เล็กเกินไป
      description: ขนาดของสินค้าเล็กกว่าที่จะพอดีกับความต้องการของลูกค้าหรือความเหมาะสมกับพื้นที่
    too_soft:
      name: นุ่มเกินไป
