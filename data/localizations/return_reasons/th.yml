    tip_style:
      name: รูปแบบปลาย
      description: รูปทรงหรือดีไซน์ของหัวอุปกรณ์ทาหรือหัวปากกาไม่ตรงกับความต้องการของลูกค้า
    too_big:
      name: ใหญ่เกินไป
      description: ขนาดของสินค้าใหญ่กว่าที่จะพอดีกับความต้องการของลูกค้าหรือความเหมาะสมกับพื้นที่
    too_bitter:
      name: ขมเกินไป
      description: รสชาติโดยรวมมีรสเผ็ดจัดหรือฝาดอย่างไม่พึงประสงค์
    too_bulky:
      name: เทอะทะเกินไป
      description: สินค้ากินพื้นที่มากเกินไปหรือใหญ่เทอะทะจนจัดการได้ยาก
    too_coarse:
      name: หยาบเกินไป
      description: พื้นผิวขัดเรียบหรือสร้างการกัดกร่อนน้อยกว่าที่ต้องการ
    too_complex:
      name: ซับซ้อนเกินไป
      description: จำนวนฟีเจอร์ การตั้งค่า หรือขั้นตอนที่จำเป็นในการใช้งานนั้นมีมากมายจนเกินไป
    too_drying:
      name: ทำให้แห้งเกินไป
      description: ผลิตภัณฑ์นี้ขจัดความชุ่มชื้นมากเกินไป ส่งผลให้ผิวหนังหรือเส้นผมแห้งกร้าน
    too_fine:
      name: ละเอียดเกินไป
      description: พื้นผิวขัดเรียบหรือสร้างการกัดกร่อนน้อยกว่าที่ต้องการ
    too_firm:
      name: แข็งเกินไป
      description: ความแข็งหรือความยืดหยุ่นของสินค้านั้นมากกว่าที่คาดไว้
    too_long:
      name: ยาวเกินไป
