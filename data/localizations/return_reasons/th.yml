      description: การเคลื่อนไหวแบบสั่นที่เกิดจากอุปกรณ์นั้นมากเกินไปหรือทำให้รู้สึกไม่สบาย
    video_quality:
      name: คุณภาพวิดีโอ
      description: ความคมชัด การเคลื่อนไหว หรือความถูกต้องของสีของภาพที่แสดงออกมาไม่เป็นไปตามที่คาดหวัง
    viscosity:
      name: ความหนืด
