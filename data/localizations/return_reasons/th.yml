    waist_too_low:
      name: เอวต่ำเกินไป
      description: ขอบเอวของเสื้อผ้าอยู่ต่ำเกินไปบนสะโพก
    waist_too_small:
      name: เอวเล็กเกินไป
      description: ขนาดรอบเอวเล็กกว่าขนาดที่เหมาะสมสำหรับร่างกายของลูกค้า
    waist_too_tight:
      name: เอวคับเกินไป
      description: ขอบกางเกงรัดแน่นจนรู้สึกไม่สบายบริเวณเอว
    warmth:
      name: ความอบอุ่น
      description: ระดับความร้อนที่อุปกรณ์นี้ผลิตออกมาหรือกักเก็บไว้ไม่เหมาะสมกับสภาพแวดล้อมหรือกิจกรรมที่ต้องการใช้งาน
    washability:
      name: ความสามารถในการซัก
      description: วิธีการทำความสะอาดที่กำหนดไว้นั้นไม่เป็นที่ยอมรับ
    water_resistance:
      name: การกันน้ำ
      description: ความสามารถในการกันน้ำหรือความชื้นของผลิตภัณฑ์ไม่เพียงพอต่อสภาพการใช้งานที่ตั้งใจไว้
    wear:
      name: การสวมใส่
      description: ผลลัพธ์จากการใช้เครื่องสำอางหรือผลิตภัณฑ์ดูแลผิวไม่คงอยู่นานเท่าที่คาดหวัง
    weather:
      name: สภาพอากาศ
      description: สภาพแวดล้อมไม่เอื้ออำนวยให้สามารถดำเนินการบริการหรือกิจกรรมดังกล่าวได้
    weight:
      name: น้ำหนัก
      description: ความหนักหรือความเบาของสินค้าทำให้ไม่เหมาะสมกับการใช้งานตามที่ลูกค้าต้องการ
    weight_capacity:
      name: ความสามารถในการรับน้ำหนัก
      description: น้ำหนักบรรทุกสูงสุดที่สินค้าสามารถรับได้นั้นไม่เพียงพอต่อการใช้งานตามที่ลูกค้าต้องการ
    wheels_stick:
      name: ล้อฝืด
      description: กลไกการกลิ้งไม่เคลื่อนที่อย่างราบรื่น
    whitening_results:
      name: ผลลัพธ์ความขาว
      description: ระดับการเปลี่ยนแปลงสีที่ได้นั้นน้อยกว่าที่คาดไว้
    width:
      name: ความกว้าง
      description: ขนาดของสินค้าจากด้านหนึ่งไปอีกด้านหนึ่งไม่เหมาะสมกับขนาดหรือพื้นที่ของลูกค้า
    wind_resistance:
      name: การต้านลม
      description: ความสามารถในการกันลมของผลิตภัณฑ์นี้ไม่เหมาะสมกับสภาพแวดล้อมหรือกิจกรรมที่ตั้งใจนำไปใช้งาน
    wrong_amount:
      name: จำนวนไม่ถูกต้อง
      description: ปริมาณสินค้าที่ได้รับแตกต่างจากที่สั่งซื้อหรือคาดหวังไว้
    wrong_dosage:
      name: ปริมาณการใช้ไม่ถูกต้อง
      description: ความเข้มข้นหรือความแรงของสารออกฤทธิ์ไม่ตรงตามข้อกำหนด
    wrong_format:
      name: รูปแบบไม่ถูกต้อง
      description: ประเภทของสื่อหรือโครงสร้างทางกายภาพไม่เข้ากันกับอุปกรณ์หรือความต้องการของลูกค้า
    wrong_hand:
      name: ผิดข้าง
      description: สินค้าชิ้นนี้ออกแบบมาสำหรับมือข้างที่ไม่ถนัด (ซ้ายหรือขวา) ซึ่งตรงข้ามกับที่ลูกค้าต้องการ
    pilling:
      name: การเกิดขุย
      description: เนื้อผ้าเกิดขุยหรือเป็นก้อนเส้นใยก่อนเวลาอันควรระหว่างการใช้งานหรือการซัก
